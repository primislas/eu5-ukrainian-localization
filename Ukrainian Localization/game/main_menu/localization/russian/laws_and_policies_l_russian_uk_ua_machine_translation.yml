l_russian:
  ASSIGN_LAW_POLICY_TITLE: "Призначити правову політику: $STRING$"
  forbids_no_policy: "Політики мають бути доступні"
  no_ai_propose_cd: "Можна запропонувати без штрафу за перерву"
  feudal_de_jure_law: "Феодальні «де-юре» закони"
  feudal_de_jure_law_desc: "Феодальне суспільство нашої країни ґрунтується на цих порядках."
  by_tradition: "Традиційні закони"
  by_tradition_desc: "Традиційні закони широко відомі та практикуються в нашій країні. Серед них такі відомі середньовічні зводи законів, як #italic «Про закони та звичаї Англії»#!, #italic «Саксонське зерцало»#! для Північної Німеччини та #italic «Барселонські звичаї»#! для Каталонії."
  by_blood: "Кровні закони"
  by_blood_desc: "Звід законів нашої країни не лише відображає природу нашого народу, а й слугує символом верховної влади правителя відповідно до знаменитого вислову #italic rex in regno suo est imperator regni sui#!, що означає: «Король — імператор у своєму королівстві»."
  medieval_levy_law: "Закон про ополчення"
  medieval_levy_law_desc: "Наше військо переважно складається з ополченців, що набираються з певних [Concept('estates', 'станів')|e] нашої країни. Вони битимуться за нас, доки ми не розпустимо ополчення."
  all_cultures: "Загальне ополчення"
  all_cultures_desc: "Наші піддані розділять тягар призову до зброї, незалежно від рідної [Concept('culture', 'культури')|e]."
  noble_levies: "Шляхетське ополчення"
  noble_levies_desc: "[ShowEstateTypeName('nobles_estate')] нашої країни першими відгукнуться на заклик до зброї, адже вони сильніше за інших прагнуть війни та готові до неї."
  peasant_levies: "Селянське ополчення"
  peasant_levies_desc: "[ShowEstateTypeName('peasants_estate')] складають кістяк нашого ополчення, тому в разі війни нам варто набирати якомога більше представників цього стану."
  longbow_competitions: "Змагання зі стрільби з лука"
  longbow_competitions_desc: "На святах кожен чоловік повинен демонструвати володіння луком, а також вивчати та відточувати свою майстерність стрільби. Подібні тренування допоможуть нашим воїнам здобути славу на полі бою та принести своїй країні незліченні багатства."
  ton_ta_jon_ta_ni_woro: "Тон-та-йон-та-ні-воро"
  ton_ta_jon_ta_ni_woro_desc: "На зорі імперії наше військо складалася з шістнадцяти кланів, чиї вожді поклялися захищати великого мансу #L [GetCountry('MAL').GetAdjective|l]ої#! країни. $ton_ta_jon_ta_ni_woro$, що в перекладі означає #italic «шістнадцять рабів, що несуть лук»#!, — це достопочтенні [ShowEstateTypeName('nobles_estate')|l] нашої країни, які служать командирами [GetCountry('MAL').GetAdjectiveWithNoTooltip|l]ої кінноти."
  alarde: "Аларде"
  alarde_desc: "#italic $alarde$#! — це #L [GetCountry('CAS').GetAdjective|l]ська#! система набору ополчення, яка приписує містам проводити особливі військові паради, призначені для навчання військ. Так можна постійно підтримувати воїнів у бойовій готовності на випадок військового походу."
  royal_court_customs_law: "Звичаї монаршого двору"
  royal_court_customs_law_desc: "[ShowGovernmentTypeName('monarchy')] для підтримання стабільності значною мірою спирається на традиції та культуру двору. Ці звичаї гарантують передачу влади від правителя до спадкоємця та значно послаблюють придворні інтриги."
  aristocratic_court_policy: "Аристократичний двір"
  aristocratic_court_policy_desc: "[ShowEstateTypeName('nobles_estate')] — це невіддільна частина нашого уряду. Завдяки тісним зв'язкам між знаттю, монархом і двором ми можемо контролювати та заохочувати аристократичні родини в обмін на їхню підтримку."
  balanced_court_policy: "Збалансований двір"
  balanced_court_policy_desc: "Монарший двір відіграє роль урядового та культурного центру. Управління, дипломатія та військові питання настільки ж важливі при дворі, як культура та внутрішня політика."
  court_of_culture_policy: "Культурний двір"
  court_of_culture_policy_desc: "Двір насамперед є володінням монаршої родини, символом культури та престижу. Урядові та адміністративні питання відокремлені від придворного життя."
  itinerant_court_policy: "Мандрівний двір"
  itinerant_court_policy_desc: "Керуючи країною подібних розмірів, монарший двір не може залишатися на одному місці. Він переміщується країною та вирішує адміністративні питання безпосередньо там, де це потрібно."
  military_court_policy: "Військовий двір"
  military_court_policy_desc: "Витрачати гроші на щось, окрім необхідного для функціонування двору, — це безглуздя, яке лише заохочує безтурботність і лінь. Монарх житиме ощадливо, спрямовуючи бюджет на підтримку війська."
  humanist_court_policy: "Гуманістичний двір"
  humanist_court_policy_desc: "Двору та правителю слід прагнути ідеалів гуманізму, а країні — стати найбажанішим місцем для творців і мислителів."
  timurid_court_policy: "Тимуридський двір"
  timurid_court_policy_desc: "Наша країна живе війною, проте для досягнення істинної величі ми також повинні приділяти увагу розвитку музики, мистецтва та поезії. Щоб прискорити цей процес, нам варто прийняти культурні традиції підкорених нами народів, які ми раніше вважали чужими."
  valide_sultan_court_policy: "Валіде-султан"
  valide_sultan_court_policy_desc: "Як відомо, «рай під ногами матері», тому мудра і милосердна королева-мати повинна займати найвище становище при дворі, керувати засіданнями ради та брати участь у вирішенні важливих державних питань."
  harem_policy: "Королівський гарем"
  harem_policy_desc: "Життя придворних протікає в усамітненні жіночих і чоловічих громад. У гаремі мешкають слуги та наложниці, які змагаються за вплив на правителя."
  harem_law: "Закони гарему"
  harem_law_desc: "Гарем — важливий інститут монаршого двору, що гарантує появу спадкоємців."
  secluded_harem_policy: "Закритий гарем"
  secluded_harem_policy_desc: "Гарем має бути недоступним для всіх, окрім членів двору. Тому його мешканці ведуть закритий спосіб життя і їм суворо заборонено втручатися у справи монарха."
  public_harem_policy: "Відкритий гарем"
  public_harem_policy_desc: "Наш гарем потрібен не тільки як джерело законних спадкоємців. Він також уособлює престиж, владу та багатство монаршої родини, а тому краса та таланти наложниць мають бути відомі народу."
  powerful_harem_policy: "Могутній гарем"
  powerful_harem_policy_desc: "Монарх — не більше ніж маріонетка в руках хитромудрих наложниць та євнухів. Справжня влада над країною перебуває в руках гарему, і державні справи вершаться жінками монаршого двору."
  dispersed_harem_policy: "Розділений гарем"
  dispersed_harem_policy_desc: "Гарем розділений на кілька частин, а наложниці переміщуються так само, як і придворні. Якщо у наложниці народжується син, її разом з дитиною відправляють у провінцію, де мати стежить за освітою дитини та готує її до правління."
  luxurious_harem_policy: "Екстравагантний гарем"
  luxurious_harem_policy_desc: "Гарем слугує для задоволення бажань правителя та демонстрації його величезного багатства. Лише жінки найблагородніших кровей гідні стати наложницями, які віддаватимуться неробству в розкішних чертогах монарха."
  republican_foundation_law: "Заснування республіки"
  republican_foundation_law_desc: "Наша республіка ґрунтується на принципі народовладдя, а не на пануванні беззмінного правителя. Проте громадський порядок вимагає бездоганного виконання законів та рішень уряду. Щоб цього досягти, нам необхідно створити продуману систему управління країною."
  republicanism_policy: "Республіканізм"
  republicanism_policy_desc: "Ця країна є оплотом республіканських ідеалів, просуваючи принципи народовладдя, громадянської чесноти та конституційного обмеження влади. При цьому громадяни країни активно беруть участь у її управлінні за допомогою голосування та державної служби."
  authoritarianism_policy: "Авторитаризм"
  authoritarianism_policy_desc: "Хоча ця республіка і не є монархією, будь-яке інакомислення тут суворо карається, а вся влада зосереджена в руках вузької групи людей, які не зобов'язані звітувати перед громадянами. Попри республіканську основу подібних країн, їхні уряди більше дбають про збереження власної влади, ніж про добробут народу."
  political_dynasties_policy: "Політичні династії"
  political_dynasties_policy_desc: "У цій країні кілька сімейств здобули значний вплив і фактично взяли управління країною на себе. Згодом цей порядок став настільки природним, що тепер народ сприймає їхню владу як належне, а країна охоче надає членам цих сімей важливі посади в уряді."
  meritocratic_rule_policy: "Меритократія"
  meritocratic_rule_policy_desc: "У нашій республіці правителі обираються незалежно від особистих зв'язків чи впливу олігархів — їх обирає народ, виходячи з відомих чеснот та навичок. Система меритократії не робить відмінностей між статями та охоплює всі аспекти суспільства."
  virtues_of_politeia_policy: "Чесноти політії"
  virtues_of_politeia_policy_desc: "Політія враховує інтереси як знатних громадян, так і простолюду, дозволяючи обом групам брати участь в управлінні країною. Така система забезпечує суспільну стабільність, при цьому не дозволяючи жодному стану здобути занадто велику владу."
  religious_values_policy: "Релігійні цінності"
  religious_values_policy_desc: "Релігійні цінності значною мірою визначають суспільне та політичне життя нашої республіки. Духовні діячі користуються великою повагою, спонукаючи правителів дотримуватися норм моралі та мотивуючи громадян голосувати відповідно до своїх релігійних переконань."
  republican_election_law: "Вибори"
  republican_election_law_desc: "Вибори відіграють найважливішу роль у нашій республіці. Вони не просто забезпечують змінюваність влади, а й дозволяють громадянам самим обирати правителів, які відстоюватимуть їхні інтереси."
  consolidated_power: "Консолідація влади"
  consolidated_power_desc: "Короткі терміни повноважень наших чиновників не дозволяють нам реалізовувати складніші та масштабніші проєкти. У зв'язку з цим уряд працює неефективно, а популісти набирають дедалі більше впливу. Нам потрібно реформувати систему виборів та продовжити терміни державної служби, щоб чиновники встигали виконувати свої зобов'язання перед народом."
  frequent_elections: "Часті вибори"
  frequent_elections_desc: "Довго перебуваючи при владі, правителі часто втрачають зв'язок із реальністю. Крім того, сама ідея довгого правління суперечить принципам республіки. Нам необхідно провести реформу виборчої системи, щоб скоротити терміни повноважень чиновників та посилити громадський контроль над їхньою діяльністю."
  republican_power_law: "Республіканська влада"
  republican_power_law_desc: "Республіка, як і будь-яка інша форма правління, повинна не тільки ухвалювати рішення, а й виконувати їх. Для цього виконавчій владі потрібно досягати навіть найвіддаленіших куточків країни."
  broad_executive_power_policy: "Широка виконавча влада"
  broad_executive_power_policy_desc: "Зі зростанням нашої країни зростає й необхідність діяти швидко та ефективно. Єдиний спосіб цього досягти — розширити повноваження виконавчої влади та надати їй усі необхідні інструменти для управління."
  devolution_of_powers_policy: "Делегування влади"
  devolution_of_powers_policy_desc: "Ніхто не здатен самотужки керувати такою складною країною, як наша. Крім того, настільки велика влада в руках однієї людини суперечить республіканським ідеалам наших предків. Найкращий спосіб реагувати на потреби зростаючої країни — це делегувати частину повноважень місцевим чиновникам, при цьому зберігаючи верховенство центральної влади."
  absolute_presidential_power_policy: "Абсолютна влада президента"
  absolute_presidential_power_policy_desc: "Наші чиновники представляють інтереси вузького кола своїх виборців, але важливо пам'ятати, що президент править від імені всього нашого народу. Виборні представники повинні служити лише помічниками та радниками президента, який, своєю чергою, має абсолютну владу над республікою."
  new_men_policy: "Нові люди"
  new_men_policy_desc: "Не можна довіряти тим, хто занадто довго при владі. На чолі нашої республіки повинні стати нові люди, чия репутація ще не заплямована корупцією та іншими темними справами."
  principle_of_administration_law: "Адміністративні принципи"
  principle_of_administration_law_desc: "Якщо ми хочемо стати прикладом для всіх громадян, республіка повинна відповідати керівним принципам нашої політики."
  political_principle: "Політичний принцип"
  political_principle_desc: "Ми — республіка, і керівні принципи нашої країни повинні підтримувати ефективність політичного апарату та дотримання політичних ідеалів."
  moral_principle: "Моральний принцип"
  moral_principle_desc: "Одна з головних функцій країни — це захист моральних цінностей. Оскільки республіка багато в чому покладається на чесноту громадян, ми повинні боротися з корупцією та гріхом, викорінюючи їх заради блага країни."
  protection_principle: "Принцип захисту"
  protection_principle_desc: "Найважливішим принципом республіки є захист громадян. Хоч це й не найпопулярніша тема в уряді, але збройні сили важливо підтримувати заради оборони та збереження внутрішньої стабільності."
  military_principle: "Військовий принцип"
  military_principle_desc: "Наша республіка оточена ворогами, які прагнуть її знищити. Нам необхідно задіяти всю свою військову міць, щоб розширити кордони країни та усунути загрозу, що нависла над нами."
  enlightened_principle: "Просвічений принцип"
  enlightened_principle_desc: "Просвіта — запорука інтелектуального та духовного розвитку нашого суспільства. Зробивши ідеї просвіти пріоритетними, ми зможемо ступити в нову добу."
  commercialist_principle: "Торговий принцип"
  commercialist_principle_desc: "Комерційний дух лежить в основі нашої республіки. Сама людська природа підштовхує наших #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#! до гонитви за прибутком, змушуючи їх продавати товари, накопичувати капітали та створювати підприємства."
  council_of_captains: "Рада капітанів"
  council_of_captains_desc: "На чолі нашої піратської республіки мають стояти найвідчайдушніші капітани. Їхній союз допомагає згуртувати наше суспільство, тому їхня думка має бути вирішальною."
  republican_electorate_law: "Закон про електорат республіки"
  republican_electorate_law_desc: "В основі нашої республіки лежать вибори, тому, перш ніж ми зможемо визначити вектор розвитку країни, нам необхідно вирішити, хто має право брати участь у голосуванні."
  landholders: "Землевласники"
  landholders_desc: "Землевласники становлять основу влади будь-якого суспільства, і наша країна — не виняток. Нам варто надати виборче право всім громадянам, які володіють землею, і розподілити кількість голосів відповідно до розміру їхньої власності."
  citizenry: "Громадяни"
  citizenry_desc: "Республіка в усьому спирається на своїх громадян, тому абсолютно логічно, що кожен із них повинен мати право голосувати на виборах глави країни. Надавши людям можливість отримати громадянські права, ми спонукаємо їх неухильно дотримуватися законів нашої республіки."
  dynastic_rule_policy: "Династичне правління"
  dynastic_rule_policy_desc: "Зв'язки сильніші за будь-який меч. Поставивши династію на чолі країни, ми зможемо налагодити дипломатичні зв'язки з монархіями, не відмовляючись при цьому від республіканських принципів.\nПриналежність обраного правителя до того ж сімейства — чистий збіг."
  board_of_admirals_policy: "Рада адміралтейства"
  board_of_admirals_policy_desc: "Рада адміралтейства — найвищий військово-морський заклад у країні. Цей орган, очолюваний лорд-адміралом, підтримує військовий і торговий потенціал нашого флоту."
  military_rulership_policy: "Військове керівництво"
  military_rulership_policy_desc: "Республіка має багато потенційних ворогів. Заради безпеки країни ми вручили кермо влади полководцям. Нехай їхній досвід і любов до батьківщини стануть на захист країни."
  theocratic_leadership: "Теократичне керівництво"
  theocratic_leadership_desc: "Ця країна є теократією, де політична влада належить духовенству, а релігійні норми часто мають більшу силу, ніж світські закони."
  clerical_state: "Клерикальна країна"
  clerical_state_desc: "Цією країною керують #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#!, користуючись ієрархією релігійних інститутів в інтересах країни."
  monastic_order: "Монаший орден"
  monastic_order_desc: "Цією країною керують члени монашого ордену. Ієрархія та закони ордену замінюють більшу частину законів та управлінських принципів."
  the_papacy: "Папство"
  the_papacy_desc: "На чолі політичної структури цієї країни стоїть духовний наставник — папа, глава #TOOLTIP:RELIGION,$catholic_tt$,X #L Римо-католицької#!#! церкви."
  patriarchate_reform: "Патріархат"
  patriarchate_reform_desc: "Тільки патріарх може очолювати нашу країну, бо він є найвищим представником Бога."
  caliphate_reform: "Халіфат"
  caliphate_reform_desc: "Халіфатом керує халіф — законний духовний спадкоємець Пророка. Усі мусульмани повинні підкорятися халіфу, адже в ісламі саме він є найвищою світською та духовною владою."
  holy_mission_law: "Священна місія"
  holy_mission_law_desc: "Священна місія, приписана нам божественним правителем, скеровує всі наші вчинки. Ми наблизимо майбутнє, призначене нам вищими силами."
  internal_mission_policy: "Внутрішня місія"
  internal_mission_policy_desc: "Нам потрібно спрямувати всі зусилля на несення священної місії всередині нашої країни. Ми повинні захищати вірян, допомагати знедоленим та виконувати свій релігійний обов'язок."
  external_mission_policy: "Зовнішня місія"
  external_mission_policy_desc: "Поширення святої віри стане нашою першочерговою місією. Ми не заспокоїмося, доки не будуть повалені всі вороги нашої релігії."
  balanced_mission_policy: "Збалансована місія"
  balanced_mission_policy_desc: "Ми не можемо кинути всі зусилля теократії на щось одне. В інтересах країни та віри ми повинні розподіляти сили рівномірно між внутрішньою та зовнішньою місіями."
  commercial_mission_policy: "Торгова місія"
  commercial_mission_policy_desc: "Нашими амбіціями рухає релігія, однак немає сенсу заперечувати, що ми залежимо від сили дуката. На щастя, релігія та збагачення крокують рука об руку."
  mission_of_protection_policy: "Місія захисту"
  mission_of_protection_policy_desc: "Нашій вірі постійно загрожують язичники та єретики. Ми можемо покладатися лише на інших послідовників нашої релігії — наших братів і сестер по вірі. Обов'язок велить нам захищати їх від сил зла."
  mission_to_civilize_policy: "Цивілізаційна місія"
  mission_to_civilize_policy_desc: "Місія велить нам шукати заблудлих невігласів по всьому світу та навчати їх життя в нашій вірі, щоб вони змогли розділити з нами благодать."
  mission_on_the_high_seas_policy: "Місія у відкритих морях"
  mission_on_the_high_seas_policy_desc: "Моря кишать язичниками та лиходіями, які безкарно грабують судна наших братів по вірі. В таких умовах паломники просто не можуть безпечно відвідувати наші святині, тому ми зобов'язані виконати свою місію та позбавити моря від піратської загрози."
  nature_of_our_faith_law: "Природа віри"
  nature_of_our_faith_law_desc: "Віра є стовпом нашого суспільства, тому цілком природно, що вона знаходить своє відображення у всіх аспектах нашої культури. З огляду на це наш уряд оцінює кожне рішення з точки зору його релігійного значення."
  faith_and_power_policy: "Віра і влада"
  faith_and_power_policy_desc: "Лише через боротьбу та владу ми стаємо ближчими до божественного. Своїми перемогами на полі бою наш народ демонструє благочестя та прихильність вірі."
  belief_and_unitiy_policy: "Віра і єдність"
  belief_and_unitiy_policy_desc: "Віра допомагає згуртувати країну та народ. Уряд існує лише для того, щоб підтримувати цю єдність."
  church_and_state_policy: "Церква і країна"
  church_and_state_policy_desc: "Віра і країна — це два стовпи, на яких тримається світ. Наші закони святі та не підлягають сумніву."
  god_and_man_policy: "Бог і людина"
  god_and_man_policy_desc: "Жодні стосунки, крім стосунків між смертними та безсмертними святими, не мають значення. Наша країна існує лише для того, щоб нагадувати людям про віру."
  organize_our_faith_policy: "Організація своєї віри"
  organize_our_faith_policy_desc: "Ми вкрай організована країна, серцем якої є вкрай неорганізована віра. Якщо вдасться створити для релігії офіційну ієрархію, нам буде простіше навчати нових послідовників істинної віри."
  divine_cause_law: "Вища мета"
  divine_cause_law_desc: "Якщо монархії та республіки задовольняються мирським існуванням, то священній країні потрібне глибше, духовне призначення. Лише знайшовши вищу мету, ми зможемо знайти свою долю в цьому світі."
  safeguard_holy_sites_policy: "Захист святинь"
  safeguard_holy_sites_policy_desc: "Священний обов'язок велить нам захищати святі місця в наших землях та оберігати паломників."
  combat_heresy_policy: "Боротьба з єрессю"
  combat_heresy_policy_desc: "Ми повинні поширювати істинну віру, бути стійкими у своїх переконаннях та боротися з будь-якою єрессю — якщо доведеться, то й силою."
  expulsion_of_heathens_policy: "Вигнання язичників"
  expulsion_of_heathens_policy_desc: "Наша країна зростає, через що до нас все частіше проникають хибні віровчення. Однак у жодному разі не можна виявляти терпимість до язичників та єретиків! Якщо вони хочуть жити в наших містах, то спершу повинні прийняти істинну віру."
  pursuit_of_knowledge_policy: "Погоня за знаннями"
  pursuit_of_knowledge_policy_desc: "Ми не ставимо за мету захист своєї релігії або її насильницьке насадження. Нас цікавлять питання буття та взаємовідносини між смертним і божественним."
  iqta_law: "Ікта"
  iqta_law_desc: "#italic $iqta_law$#!, #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламська#!#! практика відкупу, — це збір земельних податей з #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! у формі #italic закяту#!, тобто пожертвувань, які є основним джерелом доходів #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! країн."
  efficient_tax_farming: "Відкуп"
  efficient_tax_farming_desc: "Наша економіка головним чином залежить від ефективного збору земельних податків. Хоча #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! може бути незадоволений таким станом речей, ці доходи необхідні для фінансування різних державних проєктів та підприємств. Саме тому збір та розподіл податків слід довірити відданим та відповідальним іктадарам."
  jagir_taxation: "Оподаткування джагірів"
  jagir_taxation_desc: "Система #italic джагірів#! дозволяє країні передавати землю та право на збір податків з неї призначеним #italic джагірдарам#!. З часів свого створення ця система значно змінилася, і тепер джагірдари відповідають лише за збір та передачу податків до скарбниці, тоді як цивільне та військове управління довіреними територіями — це завдання центральної влади."
  land_acquisition: "Придбання земель"
  land_acquisition_desc: "Керувати нашими землями не так просто. Нам потрібно посилити контроль центральної влади над цими територіями, навіть якщо #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! буде проти."
  lenient_taxation: "Полегшені податки"
  lenient_taxation_desc: "Наш народ, незалежно від походження та віри, довгий час страждав від податкових поборів з боку місцевих #Italic муктів#!. Ми повинні простягнути людям руку допомоги, полегшивши їхній податковий тягар."
  society_of_jesus: "Товариство Ісуса"
  society_of_jesus_desc: "Товариство Ісуса, більш відоме як єзуїти, являє собою релігійний орден, який був створений Ігнатієм Лойолою для боротьби з ідеями Реформації. На відміну від інших католицьких орденів, єзуїти приділяють особливу увагу освіті, науці та місіонерській діяльності."
  jesuits_allowed: "Допуск єзуїтів"
  jesuits_allowed_desc: "Єзуїти — це #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! орден переважно іберійського походження, що розвинувся в ході Контрреформації. Ми зможемо скористатися їхнім впливом та здібностями, щоб за допомогою місіонерської діяльності та агресивного навернення у свою віру скоротити кількість язичників та єретиків ціною зниження терпимості."
  jesuits_not_allowed: "Недопуск єзуїтів"
  jesuits_not_allowed_desc: "Ми цілком можемо вдаватися до допомоги релігійних орденів для навернення єретиків, але замість цього намагаємося виявляти терпимість та повагу до всіх підданих незалежно від їхньої віри. З цієї причини в нашій країні заборонена будь-яка діяльність єзуїтів."
  fra_reformation_tolerance_edicts: "Укази про реформаторів"
  fra_reformation_tolerance_edicts_desc: "Ідеї Реформації стрімко розповзаються Європою і ось-ось дістануться до #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!. Від політики нашої країни залежить те, ким для нас стануть ці фанатики — друзями чи ворогами."
  protestant_tolerance: "Указ про терпимість до лютеран"
  protestant_tolerance_desc: "[GetCountry('FRA').GetGovernment.GetCourtTitle] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! дає #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранському#!#! населенню особливі привілеї та забороняє його переслідування. Однак #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьке#!#! [ShowEstateTypeName('clergy_estate')|l] вважає цю політику єрессю."
  reformist_tolerance: "Указ про релігійну терпимість"
  reformist_tolerance_desc: "Жителі #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, які сповідують різні протестантські віровчення, повинні мати особливі привілеї, що захищають їх від гонінь та дискримінації."
  edict_of_fontainebleau: "Едикт Фонтенбло"
  edict_of_fontainebleau_desc: "Двір визнав поширення протестантизму серйозною загрозою стабільності #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, а сповідування єретичної віри тепер прирівнюється до державної зради."
  expanded_edict_of_fontainebleau: "Доповнений едикт Фонтенбло"
  expanded_edict_of_fontainebleau_desc: "Подальше поширення протестантизму та інших релігій Реформації спонукало раду включити до едикту Фонтенбло всі єретичні течії."
  edict_of_chateaubriant: "Едикт Шатобріана"
  edict_of_chateaubriant_desc: "Хвиля протестантизму [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#! досягла апогею, і двір був змушений піти на крайні заходи. $edict_of_chateaubriant$ забороняє послідовникам єретичних течій обіймати державні посади та вести торгівлю [GetCountry('FRA').Custom('predlog_vvo')] [GetCountry('FRA').Custom('CL_PREP')]."
  edict_of_nantes: "Нантський едикт"
  edict_of_nantes_desc: "$edict_of_nantes$ значно розширює права релігійних меншин [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#!, фактично прирівнюючи їх до послідовників #L [ShowReligionAdjective('catholic')|l]ої#! віри. Крім того, цей закон покликаний припинити переслідування гугенотів та покласти край релігійним чварам усередині країни."
  french_colonial_ambition_focus: "Мрії про колонії"
  french_colonial_ambition_focus_desc: "Буря минула, і [GetCountry('FRA').GetName] нарешті мо[GetCountry('FRA').Custom('end_gegu')]же фінансувати морські експедиції. Двір ефективніше проводитиме колоніальну експансію, дотримуючись нової колоніальної політики."
  french_mercantile_colonies: "Поселення Нового Світу"
  french_mercantile_colonies_desc: "Ми й раніше намагалися заснувати колонії в Новому Світі, але щоразу стикалися з серйозними проблемами. Однак тепер країна відновила фінансову підтримку переселенців, тому створювати поселення в Новому Світі буде значно простіше та вигідніше."
  french_far_east_ambitions: "Амбіції на Далекому Сході"
  french_far_east_ambitions_desc: "Індійський торговий шлях, яким перевозять спеції, досі залишається потужним засобом впливу, хай на нього й претендують інші європейські країни."
  french_east_india_company: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]а Ост-Індська компанія"
  french_east_india_company_desc: "Зміцнення позицій в Індії та на Далекому Сході призвело до відкриття торгового підприємства під назвою «$french_east_india_company$». Його метою стало розширення #L [GetCountry('FRA').GetAdjective|l]ого#! впливу в регіоні. Однак тільки час покаже, чи принесе ця компанія прибуток."
  fra_jansenism_legality: "Становище янсеністів"
  fra_jansenism_legality_desc: "Прихильники #italic янсенізму#!, заснованого на вченні Святого Августина, просувають концепції приречення долі та первородного гріха, а також закликають суворо дотримуватися моральних ідеалів. Останнім часом цей рух опинився під загрозою заборони, що пов'язано зі зміцненням [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#! ідей абсолютизму та виданням #L [GetCountry('PAP').GetAdjective|l]ої#! булли #italic Unigenitus#!, що засуджує янсеністське вчення."
  jansenism_no_formal_law: "Закон відсутній"
  jansenism_no_formal_law_desc: "Указ #italic Unigenitus#! («Єдинородний син») поки не прийнятий, і янсеністи перебувають у підвішеному стані. До них ставляться так само, як і до послідовників інших релігійних напрямків."
  unigenitus_codified: "Указ Unigenitus"
  unigenitus_codified_desc: "Указ Unigenitus перетворився на закон, що забороняє будь-які янсеністські практики. Для виявлених послідовників янсенізму ввели новий податок — #italic Cinquantieme#! («П'ятдесята частина»)."
  patriarchate_law: "Роль патріархату"
  patriarchate_law_desc: "Патріархат є одним із головних стовпів нашої віри та впливовим інститутом."
  separated_patriarchate_policy: "Відокремлений патріархат"
  separated_patriarchate_policy_desc: "Країна та патріархат повністю розділені й не втручаються у справи одне одного."
  state_patriarchate_policy: "Державний патріархат"
  state_patriarchate_policy_desc: "Патріархат відіграє важливу роль у державних справах і має повну владу в релігійних питаннях."
  combined_patriarchate_policy: "Суміщений патріархат"
  combined_patriarchate_policy_desc: "Глава країни одночасно є главою патріархату. Релігійні питання розглядаються нарівні з державними справами."
  most_holy_synod_policy: "Святійший синод"
  most_holy_synod_policy_desc: "Церква відігравала важливу роль в історії країни, але очевидно, що виникла необхідність переглянути її положення. Заснувавши Святійший синод, правитель отримує можливість контролювати вплив патріархату."
  inquisition_law: "Закон про інквізицію"
  inquisition_law_desc: "Спочатку створена для боротьби з #TOOLTIP:RELIGION,$catharism_tt$,X #L катарською#!#! єрессю, інквізиція з часом стала основним інструментом #L [ShowReligionAdjective('catholic')|l]ої#! церкви для придушення будь-якого релігійного інакомислення. Спеціально навчені інквізитори розшукують єретиків, витягують з них зізнання в порушенні католицьких норм, а потім передають їх церковним судам. При цьому покарання бувають вкрай суворими — від примусу до покаяння до смертної кари."
  papal_control: "Папський контроль"
  papal_control_desc: "Печатка Святого Престолу має небачений вплив у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькому#!#! світі. Якщо [GetCountry('PAP').GetGovernment.GetRulerTitle|l] почне використовувати цей колосальний авторитет для вирішення релігійних питань усередині нашої країни, ми значно прискоримо навернення невіруючих і зміцнимо громадський порядок."
  local_courts: "Місцеві суди"
  local_courts_desc: "Язичники та єретики в нашій країні часто користуються тими ж правами та привілеями, що й правовірні громадяни. Настав час покласти цьому край і заснувати місцеві суди, які переслідуватимуть і каратимуть невірних, незважаючи на ризик громадських заворушень."
  state_inquisitors: "Державні інквізитори"
  state_inquisitors_desc: "Інквізитори повинні підкорятися не папі й навіть не місцевій владі, а лише центральному уряду. Призначені країною інквізитори отримають повноваження стежити за всіма, хто діє проти інтересів країни, і зможуть самостійно висувати проти них звинувачення."
  venetian_papal_relation_law: "Свята інквізиція"
  venetian_papal_relation_law_desc: "Свята інквізиція запитує ширші повноваження в релігійному житті Найяснішої Республіки. Нам потрібно або задовольнити це прохання, або захистити релігійну свободу наших підданих."
  venetian_first: "Насамперед венеціанець, по-друге — християнин"
  venetian_first_desc: "[GetCountry('VEN').Custom('predlog_vvo')|U] #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_PREP')|L]#!#! вірність республіці відіграє важливішу роль, ніж прихильність правильній течії #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#!."
  christian_first: "Насамперед усі — християни!"
  christian_first_desc: "Громадяни #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_GEN')|L]#!#! насамперед повинні бути добрими #TOOLTIP:RELIGIONGROUP,christian,X #L християнами#!#!."
  sumptuary_law: "Закон соціальних станів"
  sumptuary_law_desc: "Соціальна ієрархія #L [ShowReligionAdjective('nahuatl')|l]ого#! суспільства проявляється в одязі, який також відображає важливі події в житті людей, такі як шлюб, народження дітей або смерть. У побуті #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! зазвичай носить скромні вбрання з бавовни, тоді як еліта одягається в кольоровий одяг, прикрашений рідкісним пір'ям. Воїнам же дозволено носити лише прості накидки.\n\nНаразі Сіуакоатль працює над зведенням законів для станів, у якому чітко визначено, що піддані можуть купувати на ринку, а також який одяг і візерунки вони можуть носити залежно від свого соціального становища."
  sump_law_warrior_culture: "Воїнська культура"
  sump_law_warrior_culture_desc: "Доля нашої країни цілком і повністю залежить від наших хоробрих воїнів, тому під час війни кожен чоловік зобов'язаний братися за зброю. Прагнучи ще сильніше зміцнити воїнську культуру нашого народу, Сіуакоатль працює над низкою законів, які регулюють побут наших підданих. Зокрема, вони визначають, які товари можна купувати на ринку, а також який одяг і візерунки можна носити залежно від військових заслуг.\n\nХоча ці закони в основному захищають права #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!, вони насамперед спрямовані на винагороду доблесних воїнів. Так, одяг і привілеї #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! залежатимуть від їхніх бойових навичок. При цьому навіть аристократам доведеться спочатку проявити себе в бою, перш ніж вони зможуть отримати посаду в уряді."
  sump_law_tradition: "Традиція"
  sump_law_tradition_desc: "Нехай традиції минулого служать для нас орієнтиром!"
  eng_order_of_the_garter_law: "Орден Підв'язки"
  eng_order_of_the_garter_law_desc: "Орден Підв'язки — престижний і перевірений часом символ найвищих ідеалів нашої країни, який об'єднує гідних людей найрізноманітнішого походження та покликання.\n\nКим би не були його члени — фаворитами монарха, шанованими іноземцями, благочестивими священниками, талановитими ремісниками або доблесними воїнами, — цей поважний орден уособлює ідеали шляхетності та чесноти."
  eng_order_of_the_garter_nobility_policy: "Лицарі-компаньйони"
  eng_order_of_the_garter_nobility_policy_desc: "Ці найхоробріші та найшляхетніші представники своєї країни уособлюють відвагу, вірність і товариство. Піднісши найвірніших аристократів, #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! збережуть цей престижний орден як оплот лицарства, щоб кожен його член доблесно служив монарху та країні."
  eng_order_of_the_garter_foreign_policy: "Іноземні лицарі"
  eng_order_of_the_garter_foreign_policy_desc: "Цей орден іноземних лицарів, якому служать видатні іноземні правителі, дипломати та воїни, відкриває безліч перспектив і розширює вплив #TOOLTIP:ESTATE_TYPE,crown_estate,X #L корони#!#! за межами країни."
  eng_order_of_the_garter_clergy_policy: "Святе братство"
  eng_order_of_the_garter_clergy_policy_desc: "Відоме божественними настановами та непохитною вірою Святе братство Ордену Підв'язки складається з видатних єпископів та інших високопоставлених представників духовенства. Підносячи цих вірних служителів релігії, #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! посилюють духовний фундамент країни."
  eng_order_of_the_garter_arts_policy: "Покровитель мистецтв"
  eng_order_of_the_garter_arts_policy_desc: "Визнаючи силу культури та мистецтва, а також їхню здатність надихати та заохочувати, #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! підтримують найобдарованіших жителів країни завдяки Ордену Підв'язки."
  eng_order_of_the_garter_peasants_policy: "Жебракуючі лицарі"
  eng_order_of_the_garter_peasants_policy_desc: "Орден демонструє співчуття та милосердя, виявляючи милість до воїнів, які повернулися додому зі служби без гроша в кишені, а також лицарів, які втратили спадщину та землі внаслідок війни."
  censorship: "Цензура"
  censorship_desc: "Щоб підтримувати релігійну згуртованість, потрібно суворо контролювати розповсюдження текстів, що суперечать офіційним догматам нашої віри. [ShowEstateTypeName('clergy_estate')] цілком віддане цим заходам, тоді як вільнодумці та творчі люди очікувано виступають проти. Подібні обмеження можуть призвести до зниження кількості [Concept('artists', 'митців')|e] у країні та навіть до заборони [Concept('work_of_art', 'творів')|e], які будуть визнані єретичними."
  no_censorship: "Відсутність цензури"
  no_censorship_desc: "Вільнодумство не викликає осуду, а, навпаки, навіть заохочується. [Concept('artists', 'Митці')|e] охочіше залишаються в [Concept('country', 'країнах')|e], де є свобода самовираження, хоча навіть там знаходяться фанатики, що відкидають подібні права."
  limited_censorship: "Обмежена цензура"
  limited_censorship_desc: "[ShowEstateTypeName('clergy_estate')] згодне терпіти єретичні та суперечливі ідеї, але не варто випробовувати їхнє терпіння.\n\n[Concept('artists', 'Митці')|e] можуть покинути [Concept('country', 'країну')|e] або відмовитися переїжджати до неї, це залежатиме від ставлення до їхніх праць та побратимів по ремеслу."
  strict_censorship: "Сувора цензура"
  strict_censorship_desc: "Ми не потерпимо єретичних ідей. [ShowEstateTypeName('clergy_estate')] стежить за всім і без вагань карає тих, хто не підкоряється.\n\n[Concept('artists', 'Митці')|e] навряд чи наважаться переселитися до такої [Concept('country', 'країни')|e], якщо тільки вони не поділяють положення поточної релігійної доктрини."
  de_heretico_comburendo: "#italic De Heretico Comburendo#!"
  de_heretico_comburendo_desc: "Єресь неприйнятна в усіх сферах суспільного життя і карається спаленням на вогнищі. Єретичні служби, писання та ідеї будуть віддані очисному вогню.\n\n[Concept('artists', 'Митці')|e] навряд чи ризикнуть залишитися в нашій країні. Релігійні меншини будуть піддаватися гонінням, а їхнє майно — конфіскації."
  doktrinalnaya_ohrana: "Дозволені нальоти опричників"
  doktrinalnaya_ohrana_desc: "[ShowGovernmentReformName('oprichnina')] не робить винятку навіть для представників #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#!, особливо для тих із них, кого можна вважати загрозою. Монастирі регулярно розоряються, ченці піддаються насильству. Сувора цензура поширюється на теологічні праці, релігійні та історичні тексти, а до всіх послідовників інших течій #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! ставляться з підозрою."
  mandate_of_ofen: "Офенський мандат"
  mandate_of_ofen_desc: "Офенський мандат визначає наше ставлення до поширення єресі в країні. Він не тільки регламентує, що саме слід засуджувати як єресь, а й зобов'язує кожну парафіяльну церкву зачитувати його пастві двічі на рік, щоб населення не забувало про його постулати."
  slave_conversion: "Навернення рабів у нашу віру"
  slave_conversion_desc: "Раби — чужинці, і їхні вірування вельми різноманітні. Ми повинні суворо стежити за цими людьми, якщо не хочемо, щоб наш народ перейняв варварські практики та обряди."
  allow_slave_religion: "Повага до віри рабів"
  allow_slave_religion_desc: "Рабів і так уже позбавили дому та відправили служити чужоземним господарям. Віднімати в них віру та обряди було б занадто жорстоко. Неважливо, яким богам вони моляться, аби лише підкорялися нам."
  force_slave_conversion: "Насильницьке навернення рабів у нашу віру"
  force_slave_conversion_desc: "На яку покору та вірність ми можемо розраховувати, доки раби продовжують чіплятися за свої дурні забобони? Ми доб'ємося беззаперечної покори, лише коли змусимо їх відкинути язичницьких богів і всією душею прийняти істинну віру."
  heir_religion_law: "Віросповідання спадкоємця"
  heir_religion_law_desc: "Можливість визначати віросповідання [Concept('heir', 'спадкоємця')|e] відіграє важливу роль у питаннях управління. Вона дозволяє зберігати релігійну стабільність і гарантує, що правитель дотримуватиметься тієї ж віри, що й більшість його підданих. Зрештою, це важливий елемент у тонкій рівновазі між релігійною свободою, управлінням та гармонією в суспільстві."
  act_of_settlement_tt: "Відкрито за допомогою [Concept('dynamic_historical_event', 'динамічної історичної події')|e]"
  heir_special_succession: "Особливе престолонаслідування"
  heir_special_succession_desc: "Віросповідання [Concept('heir', 'спадкоємця')|e] визначається [Concept('heir_selection', 'законами престолонаслідування')|e], а не законами."
  heir_same_religion: "Та ж релігія"
  heir_same_religion_desc: "Вибір [Concept('heir', 'спадкоємця')|e] з панівним у країні віросповіданням гарантує відповідність вірувань населення та #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!. Ця політика сприяє релігійній єдності, але також позбавляє іновірців можливості займати керівні посади."
  heir_same_religion_group: "Та ж релігійна група"
  heir_same_religion_group_desc: "Вибір [Concept('heir', 'нащадка')|e] з віруваннями тієї ж релігійної групи часто є кращим. Це дозволяє підтримувати релігійну та культурну спадкоємність, а також запобігати потенційним релігійним конфліктам. Ця політика допоможе зберегти стабільність країни, скоротивши релігійні відмінності в уряді, проте представники релігій, названих язичницькими, зможуть обіймати керівні посади."
  heir_any_religion: "Будь-яка релігія"
  heir_any_religion_desc: "Віра — особиста справа кожного, вона не впливає на здатність керувати країною. [Concept('heir', 'Нащадок')|e] може дотримуватися будь-якої релігії і все одно зможе обійняти керівну посаду. Подібна політика несе в собі ризик релігійних конфліктів в уряді, але при цьому сприяє релігійній свободі та терпимості."
  precious_metal_distribution_law: "Розподіл дорогоцінних металів"
  precious_metal_distribution_law_desc: "[ShowGoodsName('goods_gold')|U] та #TOOLTIP:GOODS,silver,X срібло#! необхідні для карбування монет. Наша країна має завидну можливість самостійно видобувати ці дорогоцінні метали, тому ми маємо право вирішувати, хто матиме до них доступ."
  gold_export_ban: "Заборона на експорт"
  gold_export_ban_desc: "Ми встановимо сувору заборону, щоб наше [ShowGoodsName('goods_gold')|l] та [ShowGoodsName('silver')|l] не можна було вивозити за межі країни. Так ми збережемо багатства для самих себе та захистимо скарбниці від жадібних поглядів інших країн. Подібні заходи убезпечать наші багатства, проте ми позбавимо себе низки можливостей при укладанні міжнародних угод. Це рішення підійде тим, хто цінує недоторканність скарбниць вище, ніж участь у світовій торгівлі."
  regulated_gold_export: "Регульований експорт"
  regulated_gold_export_desc: "Ми уважно стежимо за тим, кому і куди продається наше [ShowGoodsName('goods_gold')|l] та [ShowGoodsName('silver')|l]. Подібний збалансований підхід обмежує кількість дорогоцінних металів, що надходять у продаж, і зберігає більшу частину багатств у межах наших кордонів. Це дозволяє досягти компромісу між зміцненням економіки та захистом національного надбання — розумне рішення для правителів, які прагнуть одночасно до фінансової стабільності та регіонального впливу."
  unlimited_gold_export: "Необмежений експорт"
  unlimited_gold_export_desc: "Ми дозволимо, щоб [ShowGoodsName('goods_gold')|l] та [ShowGoodsName('silver')|l] безперешкодно текли в інші країни. Це сміливе рішення відкриє перед нами можливість небаченого збагачення за допомогою міжнародної торгівлі. Однак є ризик, що наші скарби розлетяться по світу і стануть здобиччю жадібних країн-суперниць. Це сміливе рішення для правителів, які прагнуть встановити контроль над глобальним ринком і пожинати багаті плоди."
  coin_laws: "Закон про карбування"
  coin_laws_desc: "Цей закон визначає, з яких матеріалів у нашій країні карбуватимуться монети. Найбільш поширені монети із золота, срібла, міді, а також з різних сплавів цих металів. Втім, у світі є й інші системи обміну, де замість монет використовується худоба, тканини, мушлі, какао-боби та інші предмети."
  gold_and_silver_coins: "Золоті та срібні монети"
  gold_and_silver_coins_desc: "Ми випускаємо два різні набори монет, виготовлених із золота та срібла."
  gold_coins: "Тільки золоті монети"
  gold_coins_desc: "Ми випускаємо монети виключно із золота."
  silver_coins: "Тільки срібні монети"
  silver_coins_desc: "Ми випускаємо монети виключно зі срібла."
  copper_coins: "$swedish_copper_coins$"
  copper_coins_desc: "$swedish_copper_coins_desc$"
  custom_union_of_the_rhine_policy: "$custom_union_of_the_rhine$"
  custom_union_of_the_rhine_policy_desc: "$custom_union_of_the_rhine_desc$"
  hanseatic_coins_policy: "$lub_hanseatic_coins$"
  hanseatic_coins_policy_desc: "$lub_hanseatic_coins_desc$"
  bullion_coins: "Монети зі зливків"
  bullion_coins_desc: "Ми випускаємо монети з різних сплавів срібла та міді."
  barter_exchange: "Бартерний обмін"
  barter_exchange_desc: "Як засіб обміну можуть використовуватися різні матеріали та товари, такі як худоба, тканини, мушлі, какао-боби та інші."
  nobles_rights_laws: "Права знаті"
  nobles_rights_laws_desc: "Становище #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#! визначається не лише її привілеями, а й законами нашої країни."
  strengthen_nobles_rights_policy: "Зміцнені права знаті"
  strengthen_nobles_rights_policy_desc: "[ShowEstateTypeName('nobles_estate')] вже багато поколінь вірно служать нашій зростаючій країні. Буде справедливо надати шляхетним родинам ще більше привілеїв."
  curtail_nobles_policy: "Урізані права знаті"
  curtail_nobles_policy_desc: "У міру зростання нашої країни стає очевидно, що старі шляхетні родини мають занадто багато впливу та влади. Вони ревно чіпляються за свої давні привілеї, чим лише перешкоджають розвитку нашого уряду."
  rural_nobles_authority_policy: "Влада сільської знаті"
  rural_nobles_authority_policy_desc: "Аристократія — не ворог уряду, а продовження центральної влади. Залишивши за знаттю право на управління сільськими областями, винісши її представників за межі вирішення загальнонаціональних проблем, ми гарантуємо чіткий поділ ролей в уряді."
  nobles_electorate_policy: "Аристократичний електорат"
  nobles_electorate_policy_desc: "Останнім часом підтримувати вірність #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#! #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правлячому#!#! сімейству стає все складніше. Заснувавши виборчу систему, ми можемо підвищити їхню відданість країні та водночас забезпечити мирну зміну влади."
  por_lei_mental: "Lei Mental"
  por_lei_mental_desc: "Lei Mental визначає території корони як невідчужувані. Згідно з цим законом, землі, пожалувані монархом, не можна ділити, і лише старші сини мають право успадковувати території, надані #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!."
  burghers_rights_laws: "Права містян"
  burghers_rights_laws_desc: "Становище #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#! визначається не лише їхніми привілеями, а й законами нашої країни."
  strengthen_burghers_rights_policy: "Зміцнені права містян"
  strengthen_burghers_rights_policy_desc: "[ShowEstateTypeName('burghers_estate')] — важливі члени нашого суспільства, які значно впливають на економіку. Зміцнення та гарантія їхніх прав не лише забезпечать їхню вірність нашому уряду, а й зміцнять економічну стабільність країни."
  curtail_burghers_policy: "Урізані права містян"
  curtail_burghers_policy_desc: "Вплив купецьких родин стрімко зростає. Раніше працювати в уряді могли лише люди шляхетного походження, але тепер будь-який #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містянин#!#! з тугим гаманцем може обійняти важливу посаду. Настав час нагадати купцям, яке місце вони займають у нашому суспільстві."
  strong_guilds_policy: "Могутні гільдії"
  strong_guilds_policy_desc: "У містах усім заправляють гільдії — групи #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#!, які об'єднуються для захисту своїх інтересів та місцевої торгівлі. Підтримуючи гільдії, ми можемо зміцнити їхню вірність країні та одночасно забезпечити порядок у наших містах."
  colonial_burghers_authority_policy: "Передача влади в колоніях"
  colonial_burghers_authority_policy_desc: "Новий Світ відкриває неймовірні можливості для тих, хто прагне розбагатіти. Надавши #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містянам#!#! можливість управляти економікою наших колоній, ми зможемо відволікти їх від втручання у справи наших міст."
  clergy_rights_laws: "Права духовенства"
  clergy_rights_laws_desc: "Становище #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! визначається не лише їхніми привілеями, а й законами нашої країни."
  strengthen_clergy_rights_policy: "Зміцнені права духовенства"
  strengthen_clergy_rights_policy_desc: "Неможливо заперечувати, що #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! відіграє важливу роль у житті нашого народу, адже саме парафіяльні священики допомагають #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! знайти внутрішній спокій. Зміцнивши права духовенства, ми зможемо заручитися їхньою підтримкою, а отже, і підтримкою самого народу."
  curtail_clergy_policy: "Урізані права духовенства"
  curtail_clergy_policy_desc: "Багато священників вважають себе суддями, які вирішують, наскільки дії уряду відповідають релігійним та моральним нормам. Через це вони часто втручаються у справи, що знаходяться за межами духовної сфери, а тому їхній вплив необхідно терміново послабити."
  separate_clergy_from_state_policy: "Секуляризація країни"
  separate_clergy_from_state_policy_desc: "Сама по собі релігія не завдає нам клопоту, а ось значний вплив та привілеї #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! створюють цілком реальні проблеми для нашої країни. Щоб #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! не втручалися в мирські справи, нам необхідно відокремити цей стан від країни."
  sheikh_ul_islam_policy: "$common_string_shaikh_al_islam$"
  sheikh_ul_islam_policy_desc: "Старший представник #italic улемів#! отримає повноваження призначати #italic муфтіїв#! та тлумачити закони шаріату, а також затверджувати нових правителів країни. Втім, ні в кого не викликає сумніву той факт, що у правителя все одно буде більше влади. Подібну політику можна вважати компромісом, який забезпечує владу країни та підкреслює роль віри в державних справах."
  crown_rights_laws: "Права корони"
  crown_rights_laws_desc: "Становище #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#! визначається не тільки їхніми привілеями, а й законами нашої країни."
  absolute_rule_policy: "Абсолютна влада"
  absolute_rule_policy_desc: "Успіх будь-якої країни полягає у здійсненні планів та волі її правителя. Надавши монарху абсолютну владу, ми забезпечимо якнайшвидше виконання його рішень і тим самим приведемо наш народ до процвітання."
  equal_power_relation_policy: "Рівне співвідношення сил"
  equal_power_relation_policy_desc: "[Concept('estates', 'Стани')|e] знаходяться в крихкій рівновазі сил з #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителями#!#!. Найкращим варіантом для нас буде підтримувати цю рівновагу, не зміцнюючи, але й не підриваючи владу правителя."
  figurehead_position_policy: "Символічна посада"
  figurehead_position_policy_desc: "Правитель лише представляє нашу країну, але майже не має реальної влади. Тому всі важливі рішення приймаються не одноосібно, а обговорюються безліччю членів уряду, перш ніж набути чинності."
  peasants_rights_laws: "Права простолюду"
  peasants_rights_laws_desc: "Положення #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! визначається не тільки їхніми привілеями, а й законами нашої країни."
  strengthen_peasants_rights_policy: "Зміцнені права простолюду"
  strengthen_peasants_rights_policy_desc: "Якщо влада інших станів походить від їхнього багатства та володіння землею, то [ShowEstateTypeName('peasants_estate')|l] сильні своєю чисельністю. Вони значно перевершують за чисельністю всі інші групи населення, і якщо раптом вирішать об'єднатися, то стануть серйозною загрозою для стабільності нашої країни. Гарантуючи та зміцнюючи права робітників, ми можемо запобігти їхньому повстанню проти влади."
  curtail_peasants_policy: "Урізані права простолюду"
  curtail_peasants_policy_desc: "Нижчий стан у нашій країні вельми численний, а тому становить для уряду серйозну загрозу. Якщо на чолі країни раптом не виявиться сильного та харизматичного правителя, то вона в одну мить може скотитися в анархію. Необхідно позбавити простолюд частини їхніх прав та привілеїв, щоб вони знали своє місце і не прагнули піднімати заколоти."
  intelligence_agency: "Розвідувальна служба"
  intelligence_agency_desc: "Розвідувальна служба країни відповідає за розвідку, шпигунство, розшифровку даних та захист країни від внутрішніх загроз."
  home_security_policy: "Внутрішня безпека"
  home_security_policy_desc: "У нас безліч потенційних ворогів, а ось друзів знайти складно. Заради безпеки країни розвідникам потрібно припиняти будь-які таємні дії інших країн на нашій території."
  secret_police_policy: "Таємна поліція"
  secret_police_policy_desc: "Багато правителів вважають, що головною загрозою для них є зовнішні сили, проте часто країни гинуть від рук свого ж населення. Саме тому для збереження влади необхідна таємна поліція, яка стежитиме за найвпливовішими членами нашого суспільства."
  jinyiwei_policy: "Цзіньї-вей"
  jinyiwei_policy_desc: "#italic Цзіньї-вей#!, або «стража в парчевих шатах», — це особиста охорона нашого правителя. Ці люди мають право шукати та карати ворогів країни, ігноруючи будь-які судові процедури. Від їхнього суворого нагляду не можуть сховатися навіть рідні та близькі монарха."
  oprichnik_policy: "Опричники"
  oprichnik_policy_desc: "Опричники (#italic «окремі»#!) — це члени таємної служби, які шукають і переслідують тих, хто становить загрозу для країни. Вони безмежно вірні своєму правителю і набули в народі поганої слави через свої жорстокі методи роботи. Втім, така репутація лише допомагає їм залякувати ворогів."
  spy_office_policy: "Розвідувальне управління"
  spy_office_policy_desc: "Інформація також є зброєю. Щоб завжди на крок випереджати ворогів, нам необхідно створити мережу агентів та інформаторів."
  cabinet_noir_policy: "Чорний кабінет"
  cabinet_noir_policy_desc: "Чорний кабінет відповідає за розвідку та шпигунство на території чужих земель, а також за захист правителя від внутрішніх і зовнішніх загроз."
  secretnoye_byuro_policy: "Таємна канцелярія"
  secretnoye_byuro_policy_desc: "Хоча $secretnoye_byuro_policy$ має на меті карати #TOOLTIP:POPTYPE,nobles,X #L знать#!#!, яка винна в політичних злочинах, іноді цей орган також розглядає справи неполітичного характеру. Засуджених часто піддають жорстоким покаранням, щоб відвадити інших від критики уряду."
  secretnoye_byuro_policy_tt: "Під час [Concept('event', 'події')|e] #Y «$flavor_rus.66.title$»#! була заснована канцелярія"
  recruitment_law: "Закон про вербування"
  recruitment_law_desc: "Битву неможливо виграти без вояків, а тому набір придатних до бою чоловіків є одним із найважливіших завдань країни. З часом методи набору можуть змінюватися, і нашим військам так чи інакше доведеться до них пристосовуватися."
  expanded_levies_policy: "Розширене ополчення"
  expanded_levies_policy_desc: "Нашого ополчення явно недостатньо для майбутніх битв. Хоч би як болісно це було для населення, нам доведеться збільшити кількість ополченців і вояків у наших військах, щоб дати ворогам гідну відсіч."
  noble_levies_policy: "Військо знаті"
  noble_levies_policy_desc: "Ми дуже цінуємо своє населення, а наша #TOOLTIP:POPTYPE,nobles,X #L знать#!#! готова віддати життя заради захисту наших земель. Звісно, кров знаті цінніша, ніж у тих, кого вона захищає, але й воюють її представники, як правило, краще."
  burghers_levies_policy: "Регульована служба у флоті"
  burghers_levies_policy_desc: "У разі війни всі кораблі нашої країни мають бути передані на військові потреби, а для цього країна повинна мати докладний опис нашого торгового флоту."
  calpulli_policy: "Кальпулі"
  calpulli_policy_desc: "#italic Кальпулі#! — це житлові споруди для спільного проживання #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! за принципом кровної спорідненості. Подібна система не тільки допомагає зберігати стабільність у країні, але й забезпечує нас безліччю рекрутів, оскільки юнаки набагато охочіше вступають на військову службу, коли на кону стоїть честь і добробут їхньої родини."
  mercenary_army_policy: "Наймане військо"
  mercenary_army_policy_desc: "За необхідності ми можемо скликати ополчення, проте буде куди розумніше, якщо битву очолять найманці. У кращому випадку їхній досвід принесе нам перемогу, а в гіршому — вони прикриють своїми тілами наших воїнів."
  condottieri_contracts_policy: "Контракти кондотьєрів"
  condottieri_contracts_policy_desc: "Регулярні війська є радше винятком, ніж правилом, оскільки не кожна країна може собі їх дозволити. Як наслідок, у військових справах ми змушені покладатися на найманців, які в будь-який момент можуть зрадити нас і перейти на бік ворога. Лише перейшовши на розширені контракти #italic кондотьєрів#!, ми можемо розраховувати на вірність цих професійних воїнів нашій країні."
  military_slavery_policy: "Воїни-раби"
  military_slavery_policy_desc: "Війна виснажує не тільки матеріальні, а й людські ресурси. Прийняття рабів на військову службу допомагає частково вирішити цю проблему. Якщо ми надамо воїнам-рабам відповідні компенсації та привілеї, то вони з набагато більшою охотою присягнуть на вірність своїм панам."
  devshirme_system_policy: "Система девширме"
  devshirme_system_policy_desc: "Ми набуваємо рабів за допомогою практики #italic девширме#!: дітей немусульман, зазвичай християн віком від 12 до 14 років, передають до #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! сімей, де вони вивчають нашу мову та норми #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!, а потім їх відправляють до столиці. Більшість із них потрапляє до лав яничарів — регулярного війська, яке відрізняється особливою дисципліною. Ті ж, хто зумів проявити свої лідерські якості та гострий розум, стають слугами при монаршому дворі."
  devshirme_system_policy_why_tt: "Система не скасована за допомогою [Concept('event', 'події')|e]"
  black_army_policy: "Чорне військо"
  black_army_policy_desc: "Чорне військо є ефективною військовою силою, хоч знать й виступає проти її існування. Ми надамо їй офіційний статус та забезпечимо приплив ветеранів, охочих поповнити її лави."
  early_standing_army_policy: "Раннє регулярне військо"
  early_standing_army_policy_why: "Потрібна доба [ShowAgeName('age_5_absolutism')] або [ShowAgeName('age_6_revolutions')]"
  early_standing_army_policy_desc: "Протягом багатьох століть у нас не було потреби створювати регулярне військо, оскільки ополченці та найманці успішно справлялися з виконанням наших військових завдань. Однак часи змінилися, і масштаби війн вийшли за рамки можливостей непрофесійних бійців. Мабуть, настав час створити повноцінне регулярне військо."
  new_model_army_policy: "Армія нового зразка"
  new_model_army_policy_desc: "$early_standing_army_policy_desc$"
  allotment_system_policy: "Система наділів"
  allotment_system_policy_desc: "#italic Система індельти#! є особливим методом набору вояків для швидкої мобілізації військ. Відповідно до цієї системи кожен десятий чоловік віком від 15 до 44 років призивається до складу регулярної піхоти, тоді як звільнені від податків #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! надають рекрутів для кавалерії."
  canton_system_policy: "Система кантонів"
  canton_system_policy_desc: "Система #italic кантонів#! ділить країну на адміністративні райони. Кожен кантон відповідає за набір війська та пов'язує між собою місцевих жителів та уряд. Ця система покладається на добровольців, а не на примусовий набір. Однак кожен кантон повинен надавати не менше певної кількості воїнів."
  elite_training_policy: "Елітна підготовка"
  elite_training_policy_desc: "Багато країн збільшують розміри своїх військ, проте підготовка та бойовий дух їхніх вояків часто залишають бажати кращого. Наших же бійців не так багато, але вони вкрай дисципліновані, і їхніх навичок більш ніж достатньо, щоб переломити хід будь-якої битви."
  levee_en_masse_policy: "$mass_army$"
  levee_en_masse_policy_desc: "$mass_army_desc$"
  military_settlements_policy: "Військові поселення"
  military_settlements_policy_desc: "Наші вояки поєднують мирне життя на військових фермах зі службою в війську. Їхні сім'ї займаються сільським господарством і одночасно готують наступні покоління до військової служби, тим самим забезпечуючи безперервний приплив нових рекрутів."
  benefits_for_privateers: "Привілеї для каперів"
  benefits_for_privateers_desc: "Багато каперів мріють про піратське життя. Жага слави, скарбів та рому спонукає найхоробріших моряків вирушати в довгі подорожі, сповнені небезпек та пригод."
  mch_green_standard_army: "Військо Зеленого прапора"
  mch_green_standard_army_desc: "Ці допоміжні війська, що складаються переважно з #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#!, служать для зміцнення наших основних сил та підтримання порядку в завойованих нами землях #TOOLTIP:SUB_CONTINENT,east_asia,X #L Східної Азії#!#!."
  battle_leadership_law: "Закон військового керівництва"
  battle_leadership_law_desc: "Якість війська визначається якістю її командування. Некомпетентний полководець може занапастити свою країну, а видатний військовий лідер здобуде грізну славу на полі бою."
  noble_command_policy: "Командири-аристократи"
  noble_command_policy_desc: "Керувати людьми нелегко. Для цього потрібні харизма, відвага та розуміння, як проводити битви. На щастя для нас, [ShowEstateTypeName('nobles_estate')|l] чудово розуміються на мистецтві війни та командують нашими військами."
  loyal_pirate_crews: "Команди відданих каперів"
  loyal_pirate_crews_desc: "Моряки, яких ми наймаємо для ведення незаконної діяльності, добре знайомі з нашими стандартами та кодексом поведінки. Тепер нашим капітанам стало простіше знаходити людей для експедицій."
  mansabdari_system_policy: "Система мансабдарі"
  mansabdari_system_policy_desc: "#italic Мансабдари#! — це #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!, які отримують права на землю в обмін на військову та цивільну службу. На відміну від представників інших вищих станів, вони безпосередньо підпорядковуються правителю."
  meritocratic_leadership_policy: "Меритократичне керівництво"
  meritocratic_leadership_policy_desc: "Будь-хто, хто проявить себе не тільки як воїн, а й як командир, отримає право вести наші війська до слави. Шляхетне походження та наявність блакитної крові не мають значення."
  noble_cadets_policy: "Кадети-аристократи"
  noble_cadets_policy_desc: "[ShowEstateTypeName('nobles_estate')] цього не схвалюють, але ми прагнемо зробити військову кар'єру привабливою для молодших дворянських синів. Ми почнемо навчати їх з малих років і тим самим не тільки прив'яжемо їх до себе, а й створимо ядро навчених офіцерів-аристократів на майбутнє."
  ruler_general_policy: "Правитель-полководець"
  ruler_general_policy_desc: "Правитель країни повинен очолювати й збройні сили. Тільки тоді наші воїни зможуть іти на ворогів з належною безстрашністю."
  army_doctrine_law: "Військова доктрина"
  army_doctrine_law_desc: "Військові доктрини — це різні набори навичок, на яких може спеціалізуватися наше [Concept('army', 'військо')|e]. Чим довше ми використовуємо певну доктрину, тим міцніше вона закріплюється в нашій військовій культурі і тим краще їй слідують наші вояки. З часом доктрини починають давати нашим військам значні переваги."
  superior_firepower_policy: "Переважаюча вогнева міць"
  superior_firepower_policy_desc: "Деякі вважають за краще розтягувати битви та перетворювати їх на битви на виснаження. Але така тактика наражає на небезпеку життя наших воїнів. Ми повинні зосередитися на розвитку переважної вогневої міці та можливості стрімко долати ворогів."
  defensive_stance_policy: "Оборонна позиція"
  defensive_stance_policy_desc: "Наша головна сила не в наступі, а в здатності тримати оборону. Ми прийдемо до перемоги, якщо дозволимо ворогам виснажити себе, марно штурмуючи наші стіни раз за разом."
  large_army_policy: "Велике постійне військо"
  large_army_policy_desc: "Ми постійно збільшуємо своє військо. Однак від цього страждає його якість."
  sustained_discipline_policy: "Підтримувана дисципліна"
  sustained_discipline_policy_desc: "Вкрай важливо, щоб наші вояки були дисципліновані не тільки під час тренувань, а й у розпалі битви. Тільки за допомогою постійної муштри ми зможемо забезпечити виживання наших воїнів на полі бою."
  cavalry_warfare_policy: "Кінний бій"
  cavalry_warfare_policy_desc: "Кавалерія є мобільною силою нашого війська та відіграє ударну роль у битві. Ми вводимо вершників у свої полки, щоб розширити її застосування."
  amphibious_specialization_policy: "Спеціалізація на десанті"
  amphibious_specialization_policy_desc: "Війни виграються не тільки на суші, а й на морі. Тому наші війська повинні бути готові висадитися та обрушитися на берегову оборону ворогів."
  authority_of_the_captain: "Авторитет капітана"
  authority_of_the_captain_desc: "Кожен наш капітан користується величезною повагою, і варто нам лише віддати наказ, як вірні моряки негайно кинуться в бій під залпи гармат. Лише пригоди, слава та трофеї приносять їм задоволення в житті, і все це вони можуть отримати, несучи службу під нашим твердим та вмілим керівництвом."
  law_of_the_pious_emperor: "Закон вірного імператора"
  law_of_the_pious_emperor_desc: "Зібрання перекладів #L [GetCountry('BYZ').GetAdjective|l]их#! законів та давніх філософських трактатів з #TOOLTIP:LANGUAGE,greek_language,X #L грецької#!#! мови на сербську, створення якого організував цар [GetCharacter('ser_stefan_dusan').GetName]."
  zamanitchka_voyska: "Заманиця"
  zamanitchka_voyska_desc: "Назва цієї системи перекладається як «всі разом». Вона передбачає участь усіх боєздатних громадян, незалежно від їхньої статі та віку, у захисті наших рідних земель. На відміну від системи ополчень та професійних військ, це дозволяє нам закликати до зброї одразу всіх мешканців країни, що також свідчить про їхню загальну готовність відстоювати незалежність нашої країни."
  paik_system: "Система пайків"
  paik_system_desc: "$paik_system$ передбачає трудову повинність, за якої всі дорослі та здорові чоловіки — #italic пайки#! — зобов'язані служити в ополченні в обмін на отримання сільськогосподарських угідь."
  bureaucracy_law: "Бюрократія"
  bureaucracy_law_desc: "$modern_bureaucracy_desc$"
  centralized_bureaucracy_policy: "Централізована бюрократія"
  centralized_bureaucracy_policy_desc: "За централізованої бюрократії всі адміністративні питання вирішуються в столиці країни. Більшість рішень приймаються особисто правителем або його оточенням, після чого укази надсилають у провінції."
  decentralized_bureaucracy_policy: "Децентралізована бюрократія"
  decentralized_bureaucracy_policy_desc: "Децентралізована бюрократія залишає багато рішень на розгляд місцевих адміністраторів або губернаторів, які потім звітують монарху."
  namestnik_policy: "Канцелярія намісника"
  namestnik_policy_desc: "У бюрократичній системі положення #italic намісника#! можна порівняти з посадою віцекороля. Ці чиновники відповідають за управління нашими провінціями та забезпечують виконання волі нашого правителя на цих територіях."
  autonomous_offices: "Автономні служби"
  autonomous_offices_desc: "Купці нашої ліги користуються особливим заступництвом. Нехай вони й об'єднані в союз, заснований на спільних інтересах, однак їх не обмежують бюрократичні перепони та заборони."
  port_logs: "Портові журнали"
  port_logs_desc: "Якщо вести облік вантажів, що проходять через незаконні порти, можна краще стежити за товарами та суднами, що причалюють до нас."
  cabinet_laws: "Урядові закони"
  cabinet_laws_desc: "Владна рада є вищою інстанцією і складається з особистих радників правителя. Сановники, міністри та секретарі мають особливі привілеї та права."
  administrative_clergy_policy: "$clergy_estate$ у бюрократії"
  administrative_clergy_policy_desc: "[GetEstateTypeName('clergy_estate')] вже володіють багатьма навичками, які потрібні чиновникам. Вони добре освічені, майстерно володіють письмом, і переслідують вищу мету. Співпраця з духовенством забезпечить нам приплив умілих працівників уряду."
  nobles_of_the_robe_policy: "$nobles_estate$ у мантії"
  nobles_of_the_robe_policy_desc: "Знані родини нашої країни зобов'язані не тільки давати правителю поради, а й приносити клятву вічної вірності. Однак у міру розширення країни стає очевидно, що ці люди зі зброєю в руках повинні служити їй не тільки тілом, а й духом.\n\nНастав час нового покоління #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!, у мантіях та з пір'ям у руках. Вони відстоюватимуть добробут нашої країни не гірше, ніж їхні закуті в обладунки брати."
  meritocratic_recruitment_policy: "Меритократичний набір"
  meritocratic_recruitment_policy_desc: "Не можна, щоб традиції визначали, хто гідний привілею служити нашій зростаючій країні. Кожного претендента на посаду необхідно оцінювати за його здібностями. Меритократія дозволяє обирати управлінців, виходячи з їхніх талантів, а не походження."
  dynastic_administration_policy: "Династичне управління"
  dynastic_administration_policy_desc: "Стани — ненадійні союзники #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителя#!#!, оскільки вони завжди воліють нарощувати власний вплив на шкоду службі на благо країни. Лише родичам правителя можна довірити завдання управління країною."
  yorkist_tradition_policy: "Йоркістська традиція"
  yorkist_tradition_policy_desc: "Освічений простолюд може служити нам не гірше, ніж #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#!, і завдяки своєму життєвому досвіду стане чудовою підмогою будь-якій державній установі. Йоркістська традиція говорить, що будь-який гідний освічений чоловік може поповнити ряди чиновників поряд з тими, хто присвятив себе Богу."
  tribal_legal_basis_law: "Правова основа"
  tribal_legal_basis_law_desc: "Правова основа — фундамент для створення першого правового кодексу країни. Його мета проста і благородна: створити справедливе суспільство, де кожен може жити мирно і процвітати."
  codified_power_policy: "Кодифікована влада"
  codified_power_policy_desc: "Немає нічого вищого за закон. Він приносить у світ справедливість і робить рівними всіх членів племені."
  strong_community_customs_policy: "Сильні традиції громади"
  strong_community_customs_policy_desc: "Працювати разом у складі уряду — важлива, але невдячна робота. Інша справа — ділити один з одним їжу та воду і разом проводити ритуали під променями сонця. Звичаї та уклад нашого народу — спільний скарб, який потрібно ретельно берегти."
  yassa_decree_policy: "Яса"
  yassa_decree_policy_desc: "Яса — усний звід законів Монгольської імперії. Це уложення створив сам $genghis_khan_name_no_tooltip$, і воно об'єднує орду, гарантуючи стабільність уряду та вірність підданих своєму хану."
  tribal_organization_law: "Устрій племені"
  tribal_organization_law_desc: "Будь-якому об'єднанню потрібна хоч якась організація, інакше воно не зможе процвітати і загине. При племінному устрої (його масштаби бувають різними) особливе значення надається спільному почуттю приналежності та правовим звичаям."
  centralized_tribe_policy: "Централізоване плем'я"
  centralized_tribe_policy_desc: "Роз'єднання народу неминуче призводить до смути. Зосередження всієї племінної влади в руках вождя — це чіткі укази, що не суперечать один одному, суворий порядок підпорядкування та можливість швидко й узгоджено захищатися від загроз."
  federal_tribe_policy: "Федеральне плем'я"
  federal_tribe_policy_desc: "Разом ми сильніші. Ставши федерацією, ми отримуватимемо допомогу від союзників завдяки родинним зв'язкам, а не дипломатії."
  clan_council_policy: "Рада клану"
  clan_council_policy_desc: "Немає нічого важливішого за довіру народу до влади — як і влади до народу. Обравши раду, яка всіма силами відстоюватиме наші інтереси, ми виключимо можливість захоплення влади однією людиною, а отже, гідно подбаємо про потреби народу."
  steppe_warbands_policy: "Степові загони"
  steppe_warbands_policy_desc: "Племенем керує рада вождів-воєначальників, які постійно шукають умілих воїнів, що бажають вступити до їхніх загонів."
  jurchen_council: "Чжурчженська рада"
  jurchen_council_desc: "Ця вільна рада шляхетних лордів-вершників та представників місцевих кланів захищає наші маєтки та володіння від ворожих племен, а також підтримує порядок на наших територіях."
  tribal_religious_values_law: "Релігійні цінності племені"
  tribal_religious_values_law_desc: "Релігійні цінності нашого племені визначають не лише наш уклад, але й ставлення до тих, хто не розділяє наші переконання та традиції, — як серед своїх, так і серед чужих."
  religious_tribe_policy: "Релігійне плем'я"
  religious_tribe_policy_desc: "Розширення країни привело під нашу руку багато нових і різноманітних народів. Ми здатні на багато що завдяки вірності кланів, однак суспільство, де релігія відіграє важливу роль, дійсно здатне подолати простір і час, ставши джерелом згуртованості, без якої неможливе зростання."
  lip_service_policy: "Пусті слова"
  lip_service_policy_desc: "Поза всяким сумнівом, віра важлива для будь-якого суспільства. Однак вона не повинна загрожувати безпеці та стабільності племені. Тому нам варто простіше ставитися до релігії загалом, продовжуючи зовні виявляти увагу до питань духовності."
  complete_religious_autonomy_policy: "Повна релігійна автономія"
  complete_religious_autonomy_policy_desc: "Релігійні обряди допомагають нам підтримувати легітимність, однак не слід загрузнути в принципах праведного правління та моралі. Прагматизм, порівняно з духовністю, принесе нам більше користі та дозволить підтримувати велику країну."
  tribal_migration_law: "Міграція племен"
  tribal_migration_law_desc: "Наш народ не сидить на одному місці. Ми вільно мандруємо по світу; іноді нас веде доля, іноді — нужда."
  frequent_migration_policy: "Часта міграція"
  frequent_migration_policy_desc: "Ми не затримуємося на одному місці надовго, наш дух вільний, немов вітер. Ми кочівники до мозку кісток і жодні землі не вважаємо своїми."
  seasonal_travel_policy: "Сезонні міграції"
  seasonal_travel_policy_desc: "Світ змінюється протягом року, разом з ним повинні змінюватися і ми. Кожні кілька місяців наш народ змінює місце стоянки, переміщаючись від одного знайомого місця до іншого. Подібно до птахів, ми кочуємо в пошуках прожитку, притулку та можливості вивести нове потомство."
  permanent_settlement_policy: "Постійне поселення"
  permanent_settlement_policy_desc: "Часом потрібно не слідувати за бурею, а знайти від неї укриття. Настав час заснувати постійні поселення, де наш народ зможе жити роками, не покидаючи рідних країв."
  tribal_cultural_identity_law: "Культурна ідентичність племені"
  tribal_cultural_identity_law_desc: "З плином часу змінюється розуміння нас самих і нашої культури. Нам більше немає потреби побоюватися сусідніх племен. Ми підкорили природу і стали її володарями. Настав час прийняти себе як єдиний народ."
  dynastic_lineage_policy: "Походження династії"
  dynastic_lineage_policy_desc: "Династія наших правителів благословенна згори, а королівська кров — ознака їхньої гідності та права на владу. Вони здатні привести нашу країну до слави та процвітання, але тільки якщо ми будемо довіряти їм."
  rule_by_the_public_policy: "Народне правління"
  rule_by_the_public_policy_desc: "Щоб уряд був справедливим, можновладці повинні обиратися демократичним шляхом. Обираючи правителів, ми обираємо долю своєї країни."
  state_of_faith_policy: "Релігійна країна"
  state_of_faith_policy_desc: "Смертним не годиться вершити долю народу без духовного наставництва. Наш правитель повинен бути голосом богів, втіленням божественної справедливості в усьому."
  tribal_identity_policy: "Племінна ідентичність"
  tribal_identity_policy_desc: "Централізовані країни, хай навіть зі зводами законів, — зовсім не втілення цивілізації: вони не несуть природі нічого, крім загибелі. Нам потрібно йти іншим шляхом — традиційним шляхом рівноваги між царством природи та царством людським. Тільки так ми процвітатимемо."
  tribal_modernization_law: "Модернізація племені"
  tribal_modernization_law_desc: "Настав час відмовитися від старих звичок і зайняти своє місце у великому світі. Тепер у нас бачать не плем'я, а офіційну країну, яка представляє та захищає інтереси свого народу та його спосіб життя."
  modernize_into_monarchy_policy: "Перетворення на монархію"
  modernize_into_monarchy_policy_desc: "$dynastic_lineage_policy_desc$"
  modernize_into_republic_policy: "Перетворення на республіку"
  modernize_into_republic_policy_desc: "$rule_by_the_public_policy_desc$"
  modernize_into_theocracy_policy: "Перетворення на теократію"
  modernize_into_theocracy_policy_desc: "$state_of_faith_policy_desc$"
  legal_code_law: "Звід законів"
  legal_code_law_desc: "Протягом усього часу, що люди жили групами, вони створювали закони, щоб керувати вчинками та відносинами. Зводи законів відображають цінності та погляди суспільства, вони регулюють усе, від укладання угод до відносин між людьми. Закони — основа порядку та справедливості, це волокна, які не дають суспільству розпастися, наче ганчір'я. Попри різноманітність, зводи законів об'єднує спільна мета: створення справедливого та чесного суспільства, в якому кожен прагне мирного та благополучного життя."
  traditional_law_policy: "Традиційне право"
  traditional_law_policy_desc: "Існує величезна різноманітність неофіційних кримінальних систем, які створені групами людей на основі звичаїв, традицій та цінностей. Такі системи передаються усно з покоління в покоління, глибоко вкорінюючись у культурі та історії народу.\n\nСила традиційного закону полягає в його здатності відповідати унікальним запитам та цінностям конкретного народу. В основі такого закону лежить спільне розуміння того, що добре, а що погано, і часто він здається більш правильним та зрозумілим, ніж формальне законодавство. З іншого боку, подібним законам часом бракує гнучкості та здатності адаптуватися."
  civil_law_policy: "Цивільне право"
  civil_law_policy_desc: "Цивільне право сягає часів Стародавнього Риму і характеризується ретельно складеною системою законів та правил. Однак жорсткість такої системи може завадити її адаптуватися під мінливі потреби нашого народу. Попри це, цивільне право може принести мир і стабільність навіть у най неспокійнішу країну."
  common_law_policy: "Загальне право"
  common_law_policy_desc: "Загальне право виникло в англо-саксонських королівствах. Для нього властиво спиратися на прецеденти. Судді покладаються на свої попередні рішення, а не на суворе дотримання букви закону. Це створює певний ступінь передбачуваності та одноманітності в судових рішеннях, але може ускладнити адаптацію під змінені обставини, а також може призвести до вкорінення несправедливих або застарілих законів."
  court_of_appeals: "Апеляційний суд"
  court_of_appeals_desc: "$flavor_swe.15.historical_info$"
  vlach_law_policy: "Волоське право"
  vlach_law_policy_desc: "$vlach_law_policy$ є унікальною сумішшю сільських традицій та правових норм, які поширюються на системи законодавства #TOOLTIP:CULTUREGROUP,romanian_group,X #L румунських#!#! громад середньовічної Європи. Воно закріплює права на свободу пересування та носіння мисливської зброї, а також звільняє від примусової праці на землевласників, замінюючи її податками у вигляді худоби або грошей. Крім того, воно встановлює обов'язкову військову службу відповідно до потреб кожної з країн та формує загальнорумунську та законодавчу спадщину."
  sharia_law_policy: "Закони шаріату"
  sharia_law_policy_desc: "Закони шаріату — це всеосяжна та глибоко вкорінена система законів в ісламських країнах, яка регламентує найрізноманітніші аспекти життя, від поведінки окремих людей до питань державного рівня. Протягом століть вона була джерелом стабільності та спадкоємності, однак суворі, а часом і суворі заходи покарання можуть породжувати суперечності та розкол."
  sharia_law: "Шаріатське право"
  sharia_law_desc: "$sharia_law_policy_desc$"
  sharia_changed_through_main_school_tt: "Можна змінити лише через [Concept('action', 'дію')|e] «[ShowGenericActionName('change_main_school')]» за умови, що ми походимо з однієї з головних шкіл #Y юриспруденції#!"
  hanafi_policy: "Ханафітське право"
  hanafi_policy_desc: "$hanafi_school_desc$"
  hanbali_policy: "Ханбалітське право"
  hanbali_policy_desc: "$hanbali_school_desc$"
  maliki_policy: "Малікітське право"
  maliki_policy_desc: "$maliki_school_desc$"
  shafii_policy: "Шафіїтське право"
  shafii_policy_desc: "$shafii_school_desc$"
  zahiri_policy: "Загіритське право"
  zahiri_policy_desc: "$zahiri_school_desc$"
  ismaili_policy: "Ісмаїлітське право"
  ismaili_policy_desc: "$ismaili_school_desc$"
  jafari_policy: "Джафаритське право"
  jafari_policy_desc: "$jafari_school_desc$"
  zaidi_policy: "Зейдитське право"
  zaidi_policy_desc: "$zaidi_school_desc$"
  ibadi_policy: "Ібадитське право"
  ibadi_policy_desc: "$ibadi_school_desc$"
  pyrenean_law_policy: "Піренейське право"
  pyrenean_law_policy_desc: "Піренейське право — система законів, створена мешканцями Піренеїв. На нього вплинуло і цивільне, і готське право, однак піренейське право зберегло свої відмінності. Цей уклад, заснований на традиційних звичаях і порядках, з часом так міцно вкорінився в культурі нашого народу, що правителі змушені підлаштовуватися під нього, а не встановлювати власні правила."
  russkaya_pravda_policy: "Руська Правда"
  russkaya_pravda_policy_desc: "Скандинавське коріння сильно вплинуло на цей звід законів Київської Русі. За ті століття, що минули з дня його укладання, він неодноразово переписувався, залишаючись при цьому основним джерелом староруського права."
  pskov_judicial_charter_policy: "Псковська судна грамота"
  pskov_judicial_charter_policy_desc: "Псковська судна грамота — це старовинний руський звід законів, заснований на Руській Правді. Вона охоплює багато ключових особливостей політичного, суспільного та економічного життя Пскова."
  novgorod_judicial_charter_policy: "Новгородська судна грамота"
  novgorod_judicial_charter_policy_desc: "Новгородська судна грамота — це старовинний руський звід законів, що закріплює багато поширених у Новгороді практик. Він також визначає чотири посади в новгородському суді та охоплює питання управління країною."
  bav_codex_bavarica: "Права на землю Верхньої Баварії"
  bav_codex_bavarica_desc: "«Земельні права Верхньої Баварії» — правовий збірник, що впорядковує старовинні норми та практики Баварії. Крім того, в ньому визначається структура управління країною та роль #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#! при баварському дворі."
  brehon_law_policy: "Брегонський закон"
  brehon_law_policy_desc: "Брегонський закон — це система давніх ірландських законів, заснованих на дохристиянських звичаях і традиціях. Для нього характерне переважання компенсації над покаранням і підкреслення ролі суспільної гармонії та відносин. Однак відсутність формальних інститутів і механізмів виконання законів може призвести до протиріч і невизначеності в застосуванні цього закону."
  cyfraith_hywel_policy: "Закони Гівела"
  cyfraith_hywel_policy_desc: "Валлійське право, також відоме як #italic Закони Гівела#!, є унікальною правовою системою, яка походить від давніх звичаїв Уельсу. Воно відрізняється від загального та цивільного права тим, що підкреслює роль відновного правосуддя, компенсації та примирення, відмовляючись від покарання. Цей звід законів був створений королями та принцами Уельсу для підтримки єдності та порядку серед народу. Він відомий своєю складністю та прихильністю до прецедентів."
  fetha_negest_policy: "Фета Негаст"
  fetha_negest_policy_desc: "#italic Фета Негаст#!, або «Правосуддя Царів», — це видатний юридичний трактат, теократичний звід законів, складений Абул-Фадаїлом ібн аль-Ассалом. Він заснований на апостольських текстах і візантійському законодавстві з деяким впливом Римського права та охоплює церковні та мирські закони."
  byzantine_law: "Візантійське право"
  byzantine_law_desc: "Візантійське право є розвитком Римського права з християнським та елліністичним впливом. Воно переважно походить з затвердженого Юстиніаном #italic Corpus iuris civilis#!, підкреслює церемоніальну роль імператора та відображає філософські та релігійні ідеали."
  goryeon_code_policy: "Кодекс Корьо"
  goryeon_code_policy_desc: "$goryeon_code_policy$, також відомий як #italic Кьончже юнчжон#!, або #italic «Шість кодексів управління»#!, — корейський звід законів. Цей кодекс заснований на китайській бюрократії та багато століть був головним законом нашої країни."
  joseon_code_policy: "Кодекс Чосон"
  joseon_code_policy_desc: "$joseon_code_policy$, також відомий як #italic Кьонгук течжон#!, або #italic «Національний кодекс»#!, виник у результаті перегляду кодексу Корьо. З заснуванням нової династії багато законів і традицій попереднього кодексу були зібрані заново."
  chi_ming_dynasty_code_policy: "Повний звід законів"
  chi_ming_dynasty_code_policy_desc: "«$chi_ming_dynasty_code_policy$» покликаний викорінити корупцію та зловживання владою з боку чиновників — це найсерйозніші проблеми, які вже багато поколінь роз'їдають нашу країну зсередини."
  scottish_civil_law: "Цивільне право Шотландії"
  scottish_civil_law_desc: "Судова колегія реформувала наше цивільне право під новий стандарт. До цієї колегії входять добре освічені представники нашої країни, які вирішують будь-які важливі питання #italic права Шотландії#!."
  naval_doctrine_law: "Морська доктрина"
  naval_doctrine_law_desc: "Морська доктрина — це набір навичок, на яких може спеціалізуватися наш [Concept('navy', 'флот')|e]. Чим довше ми впроваджуємо доктрини, тим сильніше вони закріплюються в наших флотах і тим краще ми їм слідуємо. Згодом завдяки їм наші славні флотилії отримають помітні переваги."
  economical_policies_law: "Економічна політика"
  economical_policies_law_desc: "Економічною політикою країни визначаються основні завдання економіки та засоби їх досягнення. Від неї залежать рішення та положення, які стосуються оподаткування, витрат, валюти, торгівлі та багато чого іншого."
  lockean_proviso_policy: "Застереження Локка"
  lockean_proviso_policy_desc: "Це застереження обмежує привласнення власності. Згідно з ним заявити права на безхазяйне майно можна лише в тому випадку, якщо для інших залишиться достатня кількість ресурсів тієї ж якості. Уряд стежить за дотриманням цієї рівноваги, а заодно за справедливим розподілом приватної власності так, щоб в інших залишалися рівні можливості розбагатіти."
  war_economy_policy: "Військова економіка"
  war_economy_policy_desc: "Економічне благополуччя країни залежить від нашої здатності вести та вигравати війни. Наші мануфактури повинні служити лише одній меті — підживленню наших військових амбіцій."
  embrace_the_economic_theory_policy: "Впровадження економічної теорії"
  embrace_the_economic_theory_policy_desc: "Економіка відіграє важливу роль у державному апараті. Наші інтелектуали та вчені повинні взяти в свої руки складну систему торгівлі, фінансів та обігу предметів розкоші: тільки вони здатні поставити її на службу країні."
  free_trade_policy: "Вільна торгівля"
  free_trade_policy_desc: "Купці з усього світу повинні мати можливість торгувати в наших землях. У разі відмови від обмеженості меркантилізму країні буде простіше добувати іноземні товари — і дукати."
  royal_charter_policy: "Королівські хартії"
  royal_charter_policy_desc: "Королівські хартії — це дозволи, які #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! видають приватним особам або торговим компаніям, надаючи їм унікальні права та повноваження. Видача хартій — чудовий спосіб підтримати комерційні починання та заодно скористатися можливостями, що відкрилися нам за кордоном."
  cameralism_policy: "Камералізм"
  cameralism_policy_desc: "Щоб зміцнити своє економічне становище та залучити до країни іммігрантів, ми будемо спиратися на бюрократичну систему, чиє основне завдання — швидко та ефективно досягати бажаного результату. Палати займатимуться всіма організаційними питаннями: від будівництва нових мануфактур до розподілу поселенців, щойно прибулих до нашої країни."
  black_market_consortium: "Консорціум чорного ринку"
  black_market_consortium_desc: "Пірати, що сіють хаос у республіці, навіть помитися не можуть без пригод. Було б нерозумно довірити їм управління країною, майбутнє якої і так знаходиться на вістрі шаблі. Консорціум, куди входять найвпливовіші купці чорного ринку, покликаний регулювати їхню діяльність. Заради вигоди піратам доведеться поступитися свободою."
  legitimization_of_power_law: "Легітимізація влади"
  legitimization_of_power_law_desc: "Монархія існує доти, доки піддані вірять у легітимність правителя. У розпорядженні правителів є безліч способів обґрунтувати свою владу. З часом з'являтимуться нові філософські ідеї, що по-своєму пояснюватимуть потребу в сильному уряді."
  machiavellian_rule_policy: "Макіавеллівське правління"
  machiavellian_rule_policy_desc: "Країна стоїть вище моралі, вище чесноти та гріха. Уряд повинен ухвалювати рішення, керуючись виключно вигодою країни, навіть якщо такі рішення здаються «злом». Таким чином, суверен має право діяти в інтересах країни без огляду на мораль."
  six_livres_policy: "#italic Шість книг про країну#!"
  six_livres_policy_desc: "Абсолютна влада одного монарха настільки ж шкодить країні, як і влада народних мас. Монарх не повинен підкорятися жодній із фракцій всередині країни, але заради збереження рівноваги сил між правителем і підданими його влада повинна бути обмежена інститутами."
  two_treatises_of_government_policy: "#italic Два трактати про правління#!"
  two_treatises_of_government_policy_desc: "Природа людства характеризується розсудком і терпимістю. Ніхто не народжується злим. Однак та ж природа спонукає людей поводитися егоїстично і діяти у власних інтересах.\nУряд стежить, щоб проблеми, викликані егоїзмом, вирішувалися мирно. Він також захищає природне право на життя, здоров'я, свободу та приватну власність."
  the_leviathan_policy: "#italic Левіафан#!"
  the_leviathan_policy_desc: "Життя без цивілізації, тобто первісний стан, — це анархія. Коли кожен сам за себе, війна всіх проти всіх неминуча. Запобігти цьому можна лише одним чином: встановити абсолютну центральну владу.\nНаш народ відмовився від безлічі своїх прав, щоб здобути заступництво з боку суверена та уникнути вірної загибелі."
  the_social_contract_policy: "Суспільний договір"
  the_social_contract_policy_desc: "Суспільний договір — поняття, що передбачає, що легітимний уряд створюється в результаті взаємної угоди між людьми, що згуртувалися заради створення громадянського суспільства.\nНа свободи громадян такого суспільства накладаються деякі обмеження, проте натомість країна забезпечує йому безпеку та певні гарантії."
  the_liberty_of_ancients_vs_moderns_policy: "Свободи античні та сучасні"
  the_liberty_of_ancients_vs_moderns_policy_desc: "За останні кілька століть ідеї індивідуалізму та свободи кардинально змінилися. Колишні уявлення значно відрізняються від сучасних. Щоб належним чином захистити особисті та політичні свободи нашого народу, мудрість минулих століть треба об'єднати з мудрістю нашого часу."
  foreign_cultural_law: "Закон про чужі культури"
  foreign_cultural_law_desc: "Зі зростанням нашої країни зростає і складність її суспільних структур. Культурна єдність більше не є даністю. Щоб зберегти внутрішній мир, нам знадобиться конкретна політика."
  allow_foreign_rituals: "Дозвіл чужих ритуалів"
  allow_foreign_rituals_desc: "Культура багато в чому схожа з релігією: вони обидві — джерела суспільних цінностей і традицій, схильні до впливу свого оточення. Якщо ми будемо приймати чужинців такими, які вони є, і дозволимо безперешкодно жити в злагоді з їхнім укладом, то зможемо забезпечити мирне співіснування."
  integrate_foreign_traditions: "Інтеграція чужих традицій"
  integrate_foreign_traditions_desc: "Ідеї інших культур багато в чому чужі нам, проте все-таки ми повинні йти в ногу з часом, щоб своєчасно переймати цікаві ідеї та нововведення і ставити їх на службу суспільству. Це полегшить нам асиміляцію чужинців, а також збільшить вплив нашої власної культури."
  blood_tax_of_foreigners: "Кривавий податок з чужинців"
  blood_tax_of_foreigners_desc: "Культурні особливості меншин нас анітрохи не хвилюють. Нехай живуть за своїми традиціями, аби відправляли своїх рекрутів воювати за нас."
  agrarian_constitution: "Аграрна конституція"
  agrarian_constitution_desc: "Ця правова база прагне посилити економічну експлуатацію та зміцнити управління завойованими територіями. Підлегле населення зобов'язане пройти реорганізацію в сільські поселення. Метою цієї системи є інтеграція в нашу адміністрацію, поступове їхнє навернення та розширення нашого впливу."
  cultural_traditions_law: "Культурні традиції"
  cultural_traditions_law_desc: "В основі багатьох культур та цивілізацій лежать стародавні традиції. Поступ веде нас до величі, проте традиції не дадуть нам забути про своє походження, вони стануть джерелом сили та народної єдності."
  martial_society: "Військове суспільство"
  martial_society_desc: "Військові традиції завжди відігравали важливу роль у нашому суспільстві, а в міру розширення кордонів необхідність мілітаризації стає все очевиднішою. Нам слід йти тим же шляхом і створити сильну країну, яка спирається на військову міць."
  civil_society: "Громадянське суспільство"
  civil_society_desc: "Країна не може складатися з одних лише воїнів. Їй потрібне розвинене громадянське суспільство, де ремісники, купці, священники і навіть цілі інститути зможуть почуватися вільно, щоб приносити нам багатство, підтримувати порядок і робити свій неоціненний внесок у побудову цивілізованої країни."
  pietism_society: "Прусські чесноти"
  pietism_society_desc: "Ключові цінності нашого суспільства — чесноти пієтизму: працьовитість, щиросердність та почуття обов'язку."
  maritime_society: "Морське суспільство"
  maritime_society_desc: "Усе наше суспільство побудоване на морських традиціях. Об'єднавшись з метою підкорення моря та відвідування чужоземних портів, наші люди стали визнаними майстрами морехідного мистецтва."
  plc_sarmatism: "Сарматизм"
  plc_sarmatism_desc: "Коріння нашого суспільства сягає стародавніх сарматів. Однак сарматизм — це не просто теорія походження, а й культурно-політичне явище, яке просуває ідеали #TOOLTIP:SOCIETAL_VALUE,aristocracy_vs_plutocracy,X #L аристократії#!#! та #TOOLTIP:ESTATE_PRIVILEGE,golden_liberty,X #L золотої вольності#!#!."
  marriage_law: "Шлюбне право"
  not_catholic_theocracies: "Ця [Concept('policy', 'політика')|e] недоступна для країн, у яких встановлена #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! #TOOLTIP:GOVTYPE,theocracy,X #L теократія#!#!."
  marriage_law_desc: "Шлюбне право — це нормативна база, що регулює інститут шлюбу в країні."
  monogamous_marriage: "Моногамний шлюб"
  monogamous_marriage_desc: "Моногамний шлюб — це культурна або суспільна практика укладання союзу між двома людьми, заснована на усталених звичаях, цінностях та нормах."
  muslim_marriage: "Ніках"
  muslim_marriage_desc: "В ісламській культурі ніках є офіційним шлюбним договором між чоловіком і жінкою, що має юридичну силу."
  adamite_marriage: "Життя громадою"
  adamite_marriage_desc: "Члени секти адамитів відкидають традиційну концепцію шлюбу і воліють жити в громаді, де немає чіткого розподілу ролей."
  dishu_system: "Система дішу"
  dishu_system_desc: "$dishu_system$ є практикою утримання наложниць при дворі для продовження роду."
  polygyny: "Полігінія"
  polygyny_desc: "У більшості громад шлюб між чоловіком і кількома жінками вважається ознакою багатства та влади."
  celibacy: "Целібат"
  celibacy_desc: "Целібат являє собою утримання від шлюбу та сексу. Це рішення, часто пов'язане з релігійними поглядами або особистими переконаннями, передбачає життя без романтичних або статевих стосунків."
  slavery_laws: "Закони про рабство"
  slavery_laws_desc: "Приплив дешевої іноземної робочої сили — одна з основ нашої економіки як всередині країни, так і за її межами. Питання про введення або заборону рабства — наочне відображення того становища, яке в нашому суспільстві займають нижчі верстви, зокрема раби."
  slavery_allowed: "Введення работоргівлі"
  slavery_allowed_desc: "Работоргівля та рабство дозволені на всій території нашої країни."
  slavery_outlawed: "Заборона работоргівлі"
  slavery_outlawed_desc: "Відтепер работоргівля та рабство заборонені на всій території нашої країни."
  ottoman_war_slave_tax: "Пенчик"
  ottoman_war_slave_tax_desc: "Раніше, відповідно до степових традицій, п'ята частина військової здобичі відходила вождю, тепер же п'ята частина захоплених на війні рабів відходить країні."
  pte_slavery_allowed: "@slaves_goods! Рабство дозволено: #G Так#!"
  pte_slavery_export_allowed: "@slaves_goods! Вивіз рабів дозволений: #G Так#!"
  pte_slavery_export_import: "@slaves_goods! Ввезення рабів дозволено: #G так#!"
  fleet_in_being: "Боєздатний флот"
  fleet_in_being_desc: "Наш військово-морський вплив має відчуватися, навіть коли наш флот перебуває в портах, а використовувати його належить лише за найсприятливіших умов."
  free_oarsmen: "Вільні гребці"
  free_oarsmen_desc: "Ми всіма силами боротимемося з примусом рабів і ув'язнених до праці на галерах. Вільні люди, стійкі до негод і не схильні тікати за першої можливості, повинні стати опорою нашого флоту."
  merchant_navy: "Торговий флот"
  merchant_navy_desc: "Головне завдання нашого флоту — забезпечувати фінансові інтереси країни. Треба докласти всіх можливих зусиль, щоб наші торгові кораблі завжди були заповнені чужоземними багатствами."
  ship_boarding: "Абордаж"
  ship_boarding_desc: "Ми заохочуватимемо практику захоплення ворожих кораблів цілими та неушкодженими за допомогою введення морського призового права та видачі щедрих каперських свідоцтв."
  wooden_wall: "Флот — наша стіна"
  wooden_wall_desc: "У мінливому світі контроль над морями залишається життєво важливим для нашої країни. Флот забезпечить нам панування на морі, а також послужить як перша лінія оборони."
  grand_armada: "Велика армада"
  grand_armada_desc: "Потужний конвой супроводжуватиме наші золоті флоти, які везуть багатства із заморських володінь до наших портів."
  portuguese_marines: "[GetCountry('POR').GetAdjectiveWithNoTooltip]а морська піхота"
  portuguese_marines_desc: "Якщо ми прагнемо створити воістину світову імперію, то мусимо навчитися штурмувати ворожі фортеці з моря."
  ordinance_sea: "Морський ордонанс"
  ordinance_sea_desc: "У Середземномор'ї багато морських країн, але жодна з них не має нашого досвіду та законодавчих традицій. Закони нашого флоту гарантують, що ми завжди готові до будь-яких дій на морі."
  danish_admirality: "[GetCountry('DAN').GetAdjectiveWithNoTooltip]е адміралтейство"
  danish_admirality_desc: "Одні хваляться своїми чудовими кораблями, інші — відважними моряками, які б'ються до своєї безглуздої смерті. Але ми-то знаємо, що жоден флот — і неважливо, наскільки міцні його кораблі та наскільки хоробрі його моряки — не може здобути перемоги без хорошого флотоводця. Саме це знання допоможе нам зробити військово-морський флот нашої країни воістину грізною силою."
  norwegian_sailors: "[GetCountry('NOR').GetAdjectiveWithNoTooltip]і моряки"
  norwegian_sailors_desc: "Від самого заснування королівства для нашого народу було важливим море та його узбережжя. Ми жили риболовлею, набігами та морськими битвами. У наших моряків більше знань, ніж у представників будь-якої іншої морської країни. І ми стаємо тільки досвідченішими."
  venetian_galleys: "[GetCountry('VEN').GetAdjectiveWithNoTooltip]ські галери"
  venetian_galleys_desc: "Галери — основа нашої національної та торговельної безпеки, тому більша частина нашої військово-морської тактики ґрунтується на боротьбі з будь-яким противником на морі за допомогою галер."
  venetian_oarsmen_conscription: "Призов [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]их гребців"
  venetian_oarsmen_conscription_desc: "Великий флот нашої країни гостро потребує моряків. Щоб вирішити це питання, ми готові запровадити військову повинність для гребців і приковувати їх до лав ланцюгом. Неважливо, наскільки їм це не сподобається — так ми закриємо потребу в моряках."
  dutch_trade_fleet: "Голландський торговий флот"
  dutch_trade_fleet_desc: "Європейським країнам потрібен флот для демонстрації своєї військової могутності на морі. Ми ж, поки наші сусіди обстрілюють чужі береги, за допомогою флоту доберемося до найдальших куточків світу і будемо торгувати з іноземцями."
  basque_mariners: "[ShowCultureNameWithNoTooltip('basque')]ські мореплавці"
  basque_mariners_desc: "Протягом багатьох років наші люди добували китів на самому краю землі, здійснювали набіги на узбережжя та привозили дорогоцінні товари з інших країн, осягаючи за довгі роки плавань таємниці океану. Ці знання зробили наших моряків сміливими та надійними, безцінними для будь-якого флоту, в якому вони служать."
  maritime_law: "Морське право"
  maritime_law_desc: "Морське право, іменоване також адміралтейським або військово-морським правом, — це особливий звід правових принципів і норм, що регулюють різні аспекти морської діяльності та торгівлі. Він охоплює широкий спектр питань навігації, перевезень, торгівлі та супутньої діяльності в океанах, морях та на інших судноплавних шляхах. Він регулює морські контракти, купівлю та реєстрацію суден, морське страхування, порятунок вантажів та права на товари, підняті із затонулих кораблів, відповідальність та компенсації за події в морі, права та обов'язки екіпажу, а також багато інших аспектів. Морське право покликане забезпечити безпечне, організоване та справедливе судноплавство та вирішити суперечки, які можуть виникнути в межах морської діяльності."
  forestry_ordinance: "Лісовий ордонанс"
  forestry_ordinance_desc: "Не всяке дерево в лісі придатне для будівництва кораблів. Щоб без винятку кожен корабель відрізнявся чудовою якістю, ми встановимо закон, за яким кожне звалене дерево, що заслужило схвалення наших корабелів, буде негайно відправлятися на верф."
  mandatory_impressment: "Примусове вербування"
  mandatory_impressment_desc: "Кожне прибережне поселення буде зобов'язане відправляти молодих рекрутів на морську службу. Нашому флоту вони присвячуватимуть не менше року."
  navy_audits: "Військово-морська інспекція"
  navy_audits_desc: "Флот, що складається з ветхих кораблів, може підвести у важку хвилину. З цієї причини ми планомірно проводитимемо інспекції на головних верфях та в портах, щоб кораблі постійно перебували в ідеальному стані."
  protect_trade_routes: "Захист торгових шляхів"
  protect_trade_routes_desc: "Флот займеться охороною основних торгових шляхів, щоб тримати піратів та інший набрід подалі від наших торгових кораблів."
  shipwright_standard_regulation: "Положення про корабельних майстрів"
  shipwright_standard_regulation_desc: "Щоб підвищити ефективність будівництва суден, ми виробимо спеціальні правила для корабелів."
  ara_consulate_sea: "Консолято дель маре"
  ara_consulate_sea_desc: "Консолято дель маре, або «Морський консулат», — це новий квазісудовий орган, який забезпечуватиме дотримання норм морського та торговельного права."
  nav_maritime_code: "Наваррський морський кодекс"
  nav_maritime_code_desc: "Цей кодекс ґрунтується на оригінальному «Фуеро Сан-Себастьяна» — найстарішому зводі морських законів у #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Він регулює діяльність усіх портів у наших володіннях та описує права й обов'язки їхніх мешканців."
  piracy_law: "Закони про піратство"
  piracy_law_desc: "Закони про піратство визначають офіційну позицію нашої країни у вирішенні проблем, пов'язаних із піратами. Туди входять акти, положення та правові доктрини, розроблені для ефективної боротьби з піратством. Ці закони втілюють нашу колективну стратегію, а також заходи безпеки на морі та захисту вод від піратів. Хоча, можливо, ми просто дотримуємося цих правил, коли самі промишляємо піратством…"
  state_piracy_policy: "Державне піратство"
  state_piracy_policy_desc: "Наша країна цілком схвалює дії піратів проти наших ворогів. Нехай репутація і страждає, проте така тактика приносить країні неймовірну економічну вигоду."
  has_state_piracy_policy_access: "Має [Concept('advance', 'поступ')|e] #TOOLTIP:ADVANCE_DEFINITION,privateers,X #L «Капери»#!#! або #TOOLTIP:ADVANCE_DEFINITION,letters_of_marque,X #L «Каперські свідоцтва»#!#!, або є однією з відповідних країн."
  issue_letter_of_marque_policy: "Каперські свідоцтва"
  issue_letter_of_marque_policy_desc: "Піратство ми не підтримуємо прямо, але можемо задіяти цих розбійників проти наших ворогів. Ми видаватимемо капітанам каперські свідоцтва, щоб вони могли вільно нападати на судна наших ворогів, не побоюючись переслідування."
  has_privateers_or_LoM_advances: "Має [Concept('advance', 'поступ')|e] «[ShowAdvanceName('privateers')]» або «[ShowAdvanceName('letters_of_marque')]»."
  anti_piracy_policy: "Боротьба з піратством"
  anti_piracy_policy_desc: "Наша країна поставила собі за мету викорінювати будь-які види піратства, які тільки можуть тут зародитися. Кожен акт піратства каратиметься за законом, а кораблі, замішані в цих злодіяннях, знищуватимуться без пощади."
  anti_piracy_policy_at: "Думка про нас кожної відомої [Concept('country', 'країни')|e], яка прийняла [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,state_piracy_policy,X #L «Державне піратство»#!#!, змінюється на [ShowBiasValue('allows_state_piracy_modifier')|+=0]."
  anti_piracy_policy_dt: "Думка про нас кожної відомої [Concept('country', 'країни')|e], яка прийняла [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,state_piracy_policy,X #L «Державне піратство»#!#!, змінюється на [ShowBiasValue('allows_state_piracy_modifier')|-=0]."
  witchcraft_act: "Закон про чаклунство"
  witchcraft_act_desc: "Якщо ми прагнемо до правовірної життя та позбавлення суспільства від морального розкладу і зла, треба звернути увагу на зростаючу тривогу людей щодо відьом та окультизму."
  witchcraft_banned: "Заборона чаклунства"
  witchcraft_banned_desc: "Богомерзне чаклунство та звернення до відьом за допомогою або порадою відтепер караються смертю. Будь-хто, хто порушить цей закон, поплатиться за своє перегрішення…"
  witchcraft_ignored: "Ігнорування чаклунства"
  witchcraft_ignored_desc: "Так зване чаклунство — всього лише забобон або результат нетравлення шлунка. У будь-якому випадку, уряд не має наміру витрачати на нього час."
  language_of_pleading: "Мова клопотань"
  language_of_pleading_desc: "Основи нашої соціальної ієрархії та принципи судочинства мають бути лаконічно й одноманітно викладені відповідною для нас мовою."
  language_of_pleading_court: "Придворна мова"
  language_of_pleading_court_desc: "Чернь не зможе втручатися у справи країни, якщо #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! вестимуть судочинство виключно мовою еліт."
  language_of_pleading_common: "Загальноприйнята мова"
  language_of_pleading_common_desc: "Якщо повсякденне судочинство вестиметься доступною мовою, простолюд рідше порушуватиме закон."
  multi_lingual_court: "Багатомовний двір"
  multi_lingual_court_desc: "Надаючи рівні права всім мовам нашої країни, ми підтримуємо #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! та стабільність країни."
  statutes_of_lithuania_policy: "Статути [GetCountry('LIT').Custom('CL_GEN')]"
  statutes_of_lithuania_policy_desc: "Цей звід записаних норм закріплює права та обов'язки вищих станів, а також сприяє централізації."
  articles_of_agreement: "Статті угоди"
  articles_of_agreement_desc: "$articles_of_agreement$ покликані забезпечити громадський порядок на борту піратського судна. Усі члени команди мають однакове право голосу з усіх питань, а вся здобич ділиться порівну. Подібні статті потрібні, щоб забезпечити в республіці загальну свободу та рівність перед законом."
  colonial_policy: "Колоніальна політика"
  colonial_policy_desc: "Це рішення визначає політику, якою наша країна керуватиметься в колоніальних справах."
  settled_colonies: "Поселенські колонії"
  settled_colonies_desc: "Ми проводимо колоніальну політику, згідно з якою заохочується створення поселень на нововідкритих землях, де переселенці з серця нашої країни займаються видобутком і збором [Concept('raw_materials', 'ресурсів')|e] та продовжують просуватися вглиб території."
  trade_colonies: "Торгові колонії"
  trade_colonies_desc: "Ми проводимо колоніальну політику, яка заохочує створення торгових постів і портів у стратегічно важливих місцевостях для обміну різними товарами та відкриття нових [Concept('markets', 'ринків')|e] на благо нашої економіки."
  encomienda_system_policy: "Енком'єнда"
  encomienda_system_policy_desc: "Ми призначимо регіонального губернатора, який від нашого імені збиратиме данину з корінного населення області. Така організація управління прискорює та здешевлює заснування колоній, однак місцеві жителі напевно стануть гірше до нас ставитися."
  valladolid_sepulveda: "Тези Сепульведи"
  valladolid_sepulveda_desc: "Ми проводимо колоніальну політику відповідно до тез Сепульведи, які свідчать, що корінним жителям від природи судилося бути рабами і що рабство — найкращий спосіб для #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! володарів навернути їх в істинну віру. Завдяки цьому землевласники в наших колоніях можуть не боятися покарання за жорстоке поводження з місцевим населенням та отримувати більше прибутку від його праці."
  valladolid_las_casas: "Тези де лас Касаса"
  valladolid_las_casas_desc: "Ми проводимо колоніальну політику відповідно до тез де лас Касаса, згідно з якими місцеві жителі не варвари й мають свободу волі, тому повинні прийняти християнство за власним бажанням, а їхнє навернення в рабство суворо карається."
  has_unlocked_this_policy_tt: "Цю політику було відкрито"
  portuguese_colonial_captains: "[GetCountry('POR').GetAdjectiveWithNoTooltip]кі капітанства"
  portuguese_colonial_captains_desc: "Ми проводимо колоніальну політику, згідно з якою чиновники, що представляють нашу імперію, отримують чисто символічну платню, але натомість можуть претендувати на значну частку від колоніальних доходів."
  portuguese_governorate_general: "[GetCountry('POR').GetAdjectiveWithNoTooltip]е генерал-губернаторство"
  portuguese_governorate_general_desc: "Нашими колоніями керуватиме одне відомство, йому підпорядковуватимуться всі регіональні капітанства. Завдяки цьому управління колоніями стане централізованим."
  native_policy: "Тубільна політика"
  native_policy_desc: "Цією політикою країна керуватиметься щодо корінних жителів, що населяють наші колонії."
  native_trade: "Торгівля"
  native_trade_desc: "Наші колоніальні влади розвиватимуть торгівлю з тубільним населенням, щоб налагодити постійний приплив цінних товарів на наші ринки."
  native_subjugation: "Підкорення"
  native_subjugation_desc: "Наші колоніальні влади спробують підкорити тубільне населення, щоб отримати нове вигідне джерело робочої сили для країни."
  native_integration: "Інтеграція"
  native_integration_desc: "Наші колоніальні влади спробують інтегрувати тубільне населення, щоб зробити його більш самодостатнім та зміцнити стабільність у суспільстві."
  administrative_system: "Форма державного устрою"
  administrative_system_desc: "Будь-якій країні потрібна система управління та організації своєї території. Вибравши відповідну структуру, ми зможемо домогтися поваги до влади навіть у найвіддаленіших куточках нашої країни."
  autonomous_councils: "Незалежні ради"
  autonomous_councils_desc: "Наша країна складається з безлічі провінцій, і кожна має свої закони та звичаї. Кожною провінцією керує рада, яка бере участь у державних справах та підлаштовує місцеву політику під загальний курс."
  central_councils: "Центральна рада"
  central_councils_desc: "Нашою країною керує єдина рада, її учасники приймають усі ключові політичні рішення. Мешканцям віддалених областей буде непросто до неї достукатися."
  local_courts_administration: "Місцеві суди"
  local_courts_administration_desc: "Країна передала частину своїх повноважень владі на місцях, дозволивши їм адаптувати органи управління, щоб ефективніше справлятися з проблемами та потребами місцевого населення."
  feudal_administration: "Феодальна країна"
  feudal_administration_desc: "Ми правимо не напряму, а через ленників, що присягнули нам на вірність. Впливові #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!, чия відданість не викликає сумнівів, служать радниками в країнах, залежних від нашої країни, і стежать за тим, щоб ті зберігали лояльність #TOOLTIP:ESTATE_TYPE,crown_estate,X #L верховній владі#!#!."
  confederal_union: "Конфедерація"
  confederal_union_desc: "Це союз безлічі самостійних країн, які мають верховну владу на своїх територіях. Повноваження центрального уряду обмежені питаннями зовнішньої політики, а внутрішні справи вирішуються країнами у складі конфедерації."
  federal_state: "Федеративна країна"
  federal_state_desc: "Країна являє собою об'єднання безлічі дрібніших країн зі своїми звичаями та законами. При цьому всіма країнами керує федеральний уряд, і вони дотримуються федерального зведення законів."
  unitary_administration: "Унітарна країна"
  unitary_administration_desc: "Країна є єдиною структурою, а центральний уряд володіє верховною владою в країні. Провінції практично не мають права голосу у внутрішній політиці країни."
  pyatina_policy: "П'ятина"
  pyatina_policy_desc: "#italic П'ятина#! — вища одиниця адміністративно-територіального поділу Новгорода. Республіка ділиться на п'ять п'ятин, чотири з яких прилягають до самого Новгорода, а п'ята включає віддалені території."
  eyalet_division: "Еялети"
  eyalet_division_desc: "#italic Еялети#! — це основний вид адміністративного поділу [GetCountry('TUR').Custom('longname_ru_GEN')]. Кожним #italic еялетом#! керує паша, а той, у свою чергу, підпорядковується великому візиру — голові центрального уряду. При цьому основні закони країни не завжди дотримувалися в еялетах, і кожен паша був вільний використовувати місцеві традиції та звичаї для більш ефективного управління населенням."
  merindad_policy: "Мерінії"
  merindad_policy_desc: "#italic Мерінії#! — це вид адміністративно-територіального поділу в королівствах [GetCountry('ARA').GetName], [GetCountry('CAS').GetName] та [GetCountry('NAV').GetName], свого роду проміжні органи управління між урядом, містами та феодальними володіннями. На чолі мерінії стоїть меріно — представник центральної влади, наділений адміністративними та судовими повноваженнями на ввіреній йому території."
  ara_royal_ordinances_policy: "[GetCountry('ARA').GetAdjectiveWithNoTooltip]ські королівські ордонанси"
  ara_royal_ordinances_policy_desc: "Королівські ордонанси — це звід положень, що регулюють різні аспекти діяльності та побуту королівського дому. У ньому детально описані обов'язки та завдання придворних чиновників, а також правила проведення коронації для арагонських монархів."
  calpixque_system_policy: "Кальпікски"
  calpixque_system_policy_desc: "#TOOLTIP:CULTURE,$nahua_culture_tt$,X #L Науаська#!#! система управління виникла на основі більш ранньої структури з спадкових правителів провінцій, або #italic тлатоані#!. Тепер провінціями керують призначені зі столиці чиновники-#italic кальпікски#!, над якими стоять #italic уекальпікски#!, або верховні намісники. Вони забезпечують збір данини в провінціях під наглядом столичного чиновника #italic петлакалькатля#!. Для посилення контролю над особливо непокірними провінціями призначалися військові губернатори, або #italic куаутлатоані#!."
  tongues_policy: "Мови"
  tongues_policy_desc: "Система мов розподіляє членів та майно Ордену на основі етнолінгвістичного поділу. Кожна мова підрозділяється на пріорати, великі пріорати, бальяжі та командорства. У столиці Ордену у кожної мови є своє #italic подвір'я#!."
  rajya_policy: "Радж'я"
  rajya_policy_desc: "#italic Радж'я#! — це основні провінції [GetCountry('VIJ').Custom('longname_ru_GEN')]. Кожною з них керує воєначальник разом з представником правлячої династії. Управління здійснюється рідною мовою регіону, що дозволяє більш ефективно застосовувати закони."
  poligar_system_policy: "Палаяккарари"
  poligar_system_policy_desc: "На наших землях проживає безліч дрібних племен та кланів. Якщо інтегрувати їх у нашу систему управління країною, вони могли б принести чималу користь. Ці #italic палаяккарари#! могли б відповідати за правопорядок, будівництво укріплень, працювати в місцевих органах влади або займати офіцерські посади в війську. А головне — вони могли б залучити на наш бік своїх одноплемінників та забезпечити нас постійним притоком рекрутів."
  zabt_system_policy: "Забті"
  zabt_system_policy_desc: "Наша країна зацікавлена в тому, щоб підвищувати продуктивність праці, водночас зберігаючи суворий контроль за економікою регіонів. На жаль, управління економічною діяльністю наших численних підданих вимагає колосальних матеріальних та людських ресурсів, і ми не завжди справляємося з цим завданням.\nЩоб вирішити цю проблему, ми придумали систему #italic забті#!, яка передбачає регулярний облік орних земель, збір відомостей про врожайність та оцінку якості ґрунтів. Володіючи цією інформацією, ми розраховуємо стандартну суму податків та стягуємо її грошима, а не продуктами. Це створює ґрунт для систематичного та передбачуваного оподаткування, при якому доходи скарбниці відображають реальну продуктивність нашого сільського господарства."
  adelantamiento_system: "Аделантам'єнто"
  adelantamiento_system_desc: "#italic Аделантам'єнто#! — це система управління, розроблена [GetCountry('CAS').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_PREP')|L]#!#!. За цією системою в прикордонних провінціях та нещодавно завойованих територіях губернаторами призначаються представники #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!, або #italic аделантадо#!, що підпорядковуються безпосередньо правителю. У своїх віддалених регіонах аделантадо володіють широкими військовими, судовими та адміністративними повноваженнями. Часто вони фінансують експедиції з власної скарбниці, отримуючи натомість нові землі та владу."
  decentralized_trade_federations: "Децентралізована торгова федерація"
  decentralized_trade_federations_desc: "Ми вирішили, що #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#!, які керують цими регіонами, повинні отримати певну самостійність у вирішенні економічних питань на місцях. Це дозволить значно розширити нашу торгову мережу."
  regulations_of_the_royal_court: "Статут королівського двору"
  regulations_of_the_royal_court_desc: "Низка документів, де прописані основні функції нашого уряду: починаючи з церемоніального етикету при коронації, продовжуючи організацією повсякденної діяльності #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!, і закінчуючи утриманням нашого війська. Ці документи слугують основою для уряду та таємної ради, відомої як #italic савазіро#!."
  maj_office_of_the_mahapatih: "Посада Магапаті"
  maj_office_of_the_mahapatih_desc: "#Italic Магапаті#! по суті замінює прем'єр-міністра та має колосальний вплив на політику. Той, хто обіймає цю посаду, стає другою особою в країні та відповідає за вирішення таких важливих державних питань, як військова експансія та безперебійна робота уряду."
  education_elites_law: "Елітарна освіта"
  education_elites_law_desc: "Навчання нашої еліти — вкрай важливе завдання. Якщо вище суспільство отримає широкий доступ до перевірених творів мистецтва, то ми зможемо досягти культурних цілей як всередині країни, так і за кордоном, а також зможемо створювати нові шедеври та примножимо нашу велич!"
  forums_of_thought: "Відкриті навчальні заклади"
  forums_of_thought_desc: "Освіта має бути доступною для всіх, хто хоче її отримати. Ми розчинимо двері наших навчальних закладів і дозволимо ділитися знаннями з усіма жителями нашої країни. Ми не боїмося нововведень і хочемо розвивати мислення наших підданих — ось що відрізняє нашу країну від інших країн."
  clerical_institutions: "Богословські навчальні заклади"
  clerical_institutions_desc: "Національна ідентичність нашого народу невіддільна від віри та керівної ролі духовенства. Для закріплення ролі релігії в країні слід об'єднати релігійні та освітні установи, щоб вони виховували наших підданих за єдиною програмою."
  mixed_institutions: "Змішані навчальні заклади"
  mixed_institutions_desc: "Оптимальним може виявитися виважений підхід, який надасть людям цінні знання та забезпечить доступ до освіти, не викликавши обурення з боку духовенства та населення загалом. Ми спробуємо знайти компроміс між релігійним та світським мисленням."
  education_of_the_theocrat: "Теократична освіта"
  education_of_the_theocrat_desc: "Доля нашої країни — в руках божественних сил, яким підвладне все суще. Священний обов'язок нашого правителя полягає в тому, щоб тлумачити знамення небес та оголошувати їх підданим, щоб ми й надалі користувалися благоволінням згори. Щоб уникнути помилкових тлумачень, країна повинна спрямувати всі зусилля на навчання майбутніх правителів."
  education_of_the_court: "Придворна освіта"
  education_of_the_court_desc: "Глава нашої країни втілює волю всього уряду, проте всім людям властиво помилятися. Освічений двір забезпечить правителю необхідну підтримку, яка дозволить звести його промахи до мінімуму."
  education_of_the_missionaries: "Місіонерська освіта"
  education_of_the_missionaries_desc: "Язичники та єретики постійно випробовують нашу віру на міцність. Вони отруюють розуми наших благочестивих послідовників згубними ідеями, збиваючи їх зі шляху істинного та ведучи в темряву. Щоб протистояти цьому злу, наші місіонери повинні чітко усвідомлювати загрозу та бути міцними у своїй вірі."
  education_of_the_people: "Народна освіта"
  education_of_the_people_desc: "Знання та освіта — найвищі цінності в житті людини. Ми повинні подбати про те, щоб вони були доступні всім нашим підданим. Людина народжується зі свободою волі та думки, і країна зобов'язана захищати ці природні права кожного жителя нашої країни."
  confucian_academies_education: "Конфуціанські академії"
  confucian_academies_education_desc: "Ці приватні навчальні заклади, в яких поєднуються функції школи та релігійного святилища, наставляють найкращих учнів у класичних текстах та конфуціанській філософії, готуючи їх до іспитів на державну службу. Офіційно ці академії вважаються частиною системи освіти країни, але фактично мають чималу автономію та низку привілеїв, які відрізняють їх від інших державних інститутів."
  scottish_noble_education: "Обов'язкова освіта для знаті"
  scottish_noble_education_desc: "Для підвищення ефективності роботи уряду відтепер усі #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! повинні отримувати повноцінну освіту. Кожен представник привілейованого стану зобов'язаний знати латину та розбиратися в праві та мистецтвах."
  scottish_presbyterian_education: "Пресвітеріанська освіта"
  scottish_presbyterian_education_desc: "За навчання жителів нашої країни відповідатиме церква. Кошти на це підуть з податків, які стягуються із землевласників."
  education_masses_law: "Масова освіта"
  education_masses_law_desc: "Народна освіта має величезне значення для країни. Ми повинні надати своїм підданим широкий доступ до необхідних навчальних матеріалів незалежно від їхнього місця в соціальній ієрархії. З освіченим і підкованим у мистецтві населенням уряду буде легше досягти цілей як усередині країни, так і за її межами."
  uneducated_masses_education: "Неосвічені маси"
  uneducated_masses_education_desc: "Яка користь від читання та письма тим, чиє єдине призначення — орати землю? Маси повинні займатися своїми полями та худобою, їх слід тримати подалі від небезпечних ідей, які ховаються під обкладинками книг."
  basic_religious_education: "Релігійні вчення"
  basic_religious_education_desc: "Випробуваний століттями спосіб, за якого релігійні інститути беруть на себе відповідальність за освіту та виховання нових поколінь, а країна зосереджена на важливіших завданнях…"
  theocratic_education: "Благочестива освіта"
  theocratic_education_desc: "Мета благочестивої освіти — навчити чітко розпізнавати божественний промисел. Зрештою, теологія може бути кориснішою, ніж математика… хай і не в усіх ситуаціях."
  apprenticeships_education: "Індивідуальне навчання"
  apprenticeships_education_desc: "Священний процес, у ході якого досвідчений наставник передає своєму учневі всі знання, накопичені ним за довге життя. Зазвичай про відносини між майстром і підмайстром домовляються офіційно, проте жадібних до знань учнів також можуть навчати батьки, шановані старійшини або цеховий старшина."
  oral_tradition_education: "Усний переказ"
  oral_tradition_education_desc: "Мудрість старших поколінь передається молодим через усні перекази та театралізовані вистави. Авторитетні члени громади переказують стародавні історії та пояснюють їхні уроки, щоб молодь могла запам'ятати їх і повторити в майбутньому. Таким чином, історія нашого народу зберігається з покоління в покоління завдяки тим, хто був її свідком."
  personal_religious_education: "Персональна релігійна освіта"
  personal_religious_education_desc: "Навіщо зводити всю освіту до викладання в офіційних навчальних закладах, якщо друкарський верстат дозволяє влаштувати школи прямо вдома? Нехай наші піддані займаються самоосвітою і самі вирішують, які знання потрібні їм у житті."
  epic_tradition_education: "Епічний переказ"
  epic_tradition_education_desc: "Молодь найкраще засвоює знання, коли вони подаються у формі захопливих, пам'ятних історій — цікавих і простих для розуміння. Багато чого можна почерпнути з дивовижних оповідей наших предків, і ми подбаємо про те, щоб їхні уроки не були забуті."
  epic_tradition_education_sects: "$epic_tradition_education$"
  epic_tradition_education_sects_desc: "$epic_tradition_education_desc$"
  secular_education: "Світська освіта"
  secular_education_desc: "Храми — не навчальні заклади, а божественні обителі. Світське навчання та релігійне наставництво повинні бути відокремлені одне від одного, як грішний світ відокремлений від царства небесного."
  distribution_of_power_law: "Розподіл влади"
  distribution_of_power_law_desc: "Розподіл влади визначає межі повноважень правителя, станів та органів управління. Країна — це складний і крихкий механізм, збалансований розподіл влади забезпечує їй стабільність, тоді як надмірний перекіс на користь одного з інститутів закінчується тиранією або паралічем управління."
  dop_traditional_distribution_of_power: "Традиційний розподіл"
  dop_traditional_distribution_of_power_desc: "Влада традиційно розподіляється між правителем та елітами суспільства. Такий порядок не порушує встановлені норми і не створює перекосу ні в бік глави країни, ні в бік аристократії."
  dop_law_parliament: "Парламент"
  dop_law_parliament_desc: "Парламент — це зібрання представників різних станів країни. Його завдання — допомагати правителю порадою, затверджувати нові закони та податки, а також запобігати зловживанням королівською владою. Не маючи можливості звернутися до трону безпосередньо, піддані можуть передавати скарги через своїх парламентських представників, що дає їм обмежену можливість впливати на управління країною."
  dop_law_gbara: "Гбара"
  dop_law_gbara_desc: "Гбара — це дорадчий орган #ONCLICK:COUNTRY,[GetCountry('MAL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MAL').Custom('CL_tt')],X [GetCountry('MAL').Custom('CL_GEN')|L]#!#!, чиї повноваження закріплені в малійському зводі законів Курукан-Фуга. #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! представляє численні клани нашої країни та стримує владу правлячого манси."
  dop_law_english_parliament: "[GetCountry('ENG').GetAdjectiveWithNoTooltip]ий парламент"
  dop_law_english_parliament_desc: "Парламент, одна з опор #L [GetCountry('ENG').GetAdjective|l]ого#! уряду, фактично є наступником #italic Великої ради#!, або Magnum Concilium, що виникла ще в Середні віки. Його основна функція — стежити за тим, щоб [GetCountry('ENG').GetGovernment.GetRulerTitle|l] не [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'зловживала', 'зловживав' )] своєю владою. Питання оподаткування та законодавства обов’язково обговорюються в парламенті, що дозволяє уникнути абсолютизації влади."
  dop_law_navarrese_courts: "Наваррські кортеси"
  dop_law_navarrese_courts_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#!, #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! та #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#! сформували дорадчий орган під назвою #italic «наваррські кортеси»#!, який затверджує закони та податки, а також розслідує правові порушення. Усі стани обговорюють там питання спільно, проте голосують окремо. Позиція кожного стану попередньо визначається більшістю голосів. Щоб ухвалити рішення, потрібна згода всіх трьох станів. Наваррські кортеси можуть не тільки скидати та обирати правителів за потреби, а й загалом стримувати владу монарха."
  dop_law_governing_senate: "Урядовий сенат"
  dop_law_governing_senate_desc: "Урядовий сенат — вищий державний орган руської влади, створений замість Боярської думи. Сенат поєднує в собі функції законодорадчої, судової та виконавчої гілок влади. Ця впливова установа підпорядковується лише імператору."
  dop_law_estates_general: "Генеральні штати"
  dop_law_estates_general_desc: "Генеральні штати — це зібрання феодального уряду Франції, яке виконує законодавчу та консультативну функцію, а також представляє інтереси #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!, #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! та #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#!, причому до останніх зараховуються і #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#!. На відміну від інших парламентів та зібрань, роль Генеральних штатів незначна, оскільки їх схвалення не потрібне для ухвалення поправок до законів, наприклад для підвищення податків."
  dop_law_assemblee_nationale: "Національні збори"
  dop_law_assemblee_nationale_desc: "Національні збори є сучасним парламентом, народженим з праху Старого режиму та колишньої асамблеї станів, відомої під назвою Генеральні штати. #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! та #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! вже не займають провідних позицій у зборах, а #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#! та #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! активніше беруть участь у справах країни."
  dop_favor_the_ruler: "Прихильність до правителя"
  dop_favor_the_ruler_desc: "Співвідношення сил має бути на боці глави країни, оскільки тільки він щиро дбає про інтереси країни."
  dop_favor_the_nobles: "Прихильність до еліт"
  dop_favor_the_nobles_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! — сама основа нашого суспільства, без їхньої керівної ролі наша країна приречена. $dop_last_sentence$"
  dop_favor_the_burghers: "Прихильність до багатіїв"
  dop_favor_the_burghers_desc: "Гільдії та #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#! — сіль землі, серце нашої країни… і важливе джерело доходів скарбниці. $dop_last_sentence$"
  dop_favor_the_clergy: "Прихильність до духовенства"
  dop_favor_the_clergy_desc: "Завдяки мудрим настановам #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священнослужителів#!#! віра раз за разом оберігає наше суспільство від негод. $dop_last_sentence$"
  dop_favor_the_commoners: "Прихильність до простолюду"
  dop_favor_the_commoners_desc: "[ShowEstateTypeName('peasants_estate')] працюють щодня, забезпечуючи країну основними ресурсами, такими як їжа, без якої не проживе ніхто, яке б високе становище не займав. Вони, мабуть, більше за інших хотіли б, щоб наша країна досягла нових висот процвітання та величі. $dop_last_sentence$"
  dop_last_sentence: "Нам слід зміцнювати вплив цього стану."
  dop_law_state_council: "Державна рада"
  dop_law_state_council_desc: "Державна рада — це вищий дорадчий орган #ONCLICK:COUNTRY,[GetFormableCountry('RUS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetFormableCountry('RUS').Custom('CL_tt')],X [GetFormableCountry('RUS').Custom('CL_GEN')|L]#!#!. Вона створена як проміжна ланка між самодержавством та губернськими думами, запровадженими в ході #TOOLTIP:GOVERNMENT_REFORM,speransky_liberalization_reform,X #L ліберальних реформ Сперанського#!#!. Рада розглядає пропоновані закони, а також контролює виконання бюджету та державні витрати, проте не має права пропонувати зміни. Замість цього вона дає рекомендації з розглядуваних питань."
  dop_law_castilian_courts: "Кастильські кортеси"
  dop_law_castilian_courts_desc: "#italic Кастильські кортеси#! представляють інтереси станів та ряду кастильських міст з правом голосу [GetCountry('CAS').Custom('endlong_predlog_vvo')] [GetCountry('CAS').Custom('longname_ru_PREP')]."
  dop_law_castilian_courts_reinforced: "Посилені Кастильські кортеси"
  dop_law_castilian_courts_reinforced_desc: "Внаслідок заколоту #italic комунерос#! [ShowEstateTypeName('crown_estate')|l] зміцнять свій вплив над #italic кастильськими кортесами#!."
  dop_favor_the_kontors: "Прихильність до контор"
  dop_favor_the_kontors_desc: "Основою нашого фінансового успіху є #TOOLTIP:BUILDING_TYPE,hanseatic_kontor,X #L ганзейська контора#!#!. Наші представництва відкриті по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Вони допомагають підтримувати дипломатичні відносини між нами та іноземними країнами, а також виступають у якості центрів влади для #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#!."
  dop_office_of_the_eristavi: "Еріставі"
  dop_office_of_the_eristavi_desc: "Титул #italic еріставі#!, що позначає одну з найвпливовіших державних посад, присвоюється членам могутніх аристократичних родин, даючи їм право збирати своє військо та командувати ним. Володарі цього титулу відіграють важливу роль у внутрішній політиці нашої країни."
  press_law: "Закони про пресу"
  press_law_desc: "Вони визначають порядок діяльності та регулювання друкованої преси в країні."
  state_press_only: "Державна преса"
  state_press_only_desc: "Виняткове право на публікацію новин належить країні. Всі інші форми друку є протизаконними."
  censored_press: "Підцензурна преса"
  censored_press_desc: "Вся друкована продукція має бути схвалена країною, яка має право піддавати цензурі будь-які матеріали, визнані небажаними."
  free_press: "Вільна преса"
  free_press_desc: "Громадяни можуть друкувати все, що захочуть, без будь-яких заборон та перешкод."
  immigration_law: "Прикордонний контроль"
  immigration_law_desc: "Це правило визначає, чи можуть люди [Concept('migration', 'відвідувати та покидати')|e] нашу країну."
  open_borders_law: "Відкриті кордони"
  open_borders_law_desc: "Кордони нашої країни відкриті для всіх, і кожен може вільно відвідати або покинути її."
  closed_borders_law: "Закриті кордони"
  closed_borders_law_desc: "Нікому не дозволяється відвідувати або покидати нашу країну."
  mining_law: "Гірниче право"
  mining_law_desc: "Це правило визначає, кому належить видобуток корисних копалин у країні."
  german_mining_law: "Гірничий статут"
  german_mining_law_desc: "Країна розподіляє права на видобуток корисних копалин, завдяки чому гірничі роботи проводяться оперативно та ефективно."
  zimbabwe_mining_law: "Під контролем правителя"
  zimbabwe_mining_law_desc: "Усі рідкісні мінерали належать самому правителю, завдяки цьому він суворо контролює їх видобуток."
  nobles_mining_law: "Гірничі роботи під контролем знаті"
  nobles_mining_law_desc: "[ShowEstateTypeName('nobles_estate')] контролюють видобуток корисних копалин."
  burghers_mining_law: "Гірничі роботи під контролем містян"
  burghers_mining_law_desc: "[ShowEstateTypeName('burghers_estate')] контролюють видобуток корисних копалин."
  peasants_mining_law: "Гірничі роботи під контролем простолюду"
  peasants_mining_law_desc: "[ShowEstateTypeName('peasants_estate')] контролюють видобуток корисних копалин."
  novo_brdo_mining_law: "Ново-Брдський законник"
  novo_brdo_mining_law_desc: "#italic Ново-Брдський#! законник регулює права власності, заходи безпеки та економічну діяльність, а також допомагає нашим шахтарським спільнотам розвиватися та процвітати."
  royal_fifth_law: "Королівська п'ята"
  royal_fifth_law_desc: "Стародавнє майнове право дозволяє #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителям#!#! претендувати на природні багатства країни. Однак сучасному монарху не личить бути тираном, тому ми замінили це право двадцятивідсотковим податком на видобуток усіх дорогоцінних металів у країні та її колоніях."
  amazigh_familial_connections: "Родинні зв'язки амазигів"
  amazigh_familial_connections_desc: "Багато племен, що населяють наші землі, беруть участь у вирішенні місцевих питань. Наше ставлення до них може суттєво вплинути на хід історії."
  reliance_on_local_tribes: "Залежність від місцевих племен"
  reliance_on_local_tribes_desc: "Місцеві вожді та керівники користуються великим впливом серед підданих. Якщо прихилити їх до нас і заручитися їхньою підтримкою, ми зможемо швидше досягати своїх цілей."
  cordial_relations: "Теплі стосунки"
  cordial_relations_desc: "Хоча ми безпосередньо не визнаємо верховенство племен у вирішенні місцевих питань, збереження здорових і шанобливих стосунків з ними буде корисним для всіх нас."
  refuse_recognition: "Жодної автономії"
  refuse_recognition_desc: "Племена, яким ми великодушно дозволяємо жити на наших землях, надто довго намагалися послабити нашу владу. Щоб зміцнити її, ми повинні продемонструвати силу і приборкати ці бунтівні фракції."
  prince_very_friendly_policy_opinion_impact_all_members: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_prince_very_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  prince_friendly_policy_opinion_impact_all_members: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_prince_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  mild_prince_friendly_policy_opinion_impact_all_members: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_mild_prince_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  controversial_policy_opinion_impact_all_members: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_controversial_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  opposed_policy_opinion_impact_all_members: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_opposed_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  rebellious_policy_opinion_impact_all_members: "Всі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_rebellious_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  prince_very_friendly_policy_opinion_impact_free_cities: "Всі #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільні імперські міста#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_prince_very_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  prince_friendly_policy_opinion_impact_free_cities: "Всі #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільні імперські міста#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_prince_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  mild_prince_friendly_policy_opinion_impact_free_cities: "Всі #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільні імперські міста#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_mild_prince_friendly_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
  controversial_policy_opinion_impact_free_cities: "Всі #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільні імперські міста#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('opinion_hre_passed_controversial_law')|+=0] до [Concept('opinion', 'думки')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#!\n"
