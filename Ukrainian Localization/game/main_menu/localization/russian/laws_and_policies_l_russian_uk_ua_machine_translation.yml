  io_policy_vote_active_cooldown: "Міжнародне голосування щодо зміни політики"
  sc_policy_proposal_frequency: "Частота пропозицій щодо політики"
  sc_policy_proposal_frequency_desc: "Правило адміністрування законопроєктів у #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарській конфедерації#!#!."
  sc_frequent_policy_proposals: "Часті пропозиції щодо політики"
  sc_frequent_policy_proposals_desc: "Зміна правил і політик — часте явище, що відбувається в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарській конфедерації#!#! кожні 4 роки."
  sc_moderate_policy_proposals: "Помірні пропозиції щодо політики"
  sc_moderate_policy_proposals_desc: "Хоча це й важливий процес, адміністрування законів і пропозицій щодо політики в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарській конфедерації#!#! вимагає значних зусиль, тому законопроєкти вносяться лише раз на 8 років."
  sc_religious_affairs: "Релігійні справи"
  sc_religious_affairs_desc: "[ShowSituationName('reformation')] набирає обертів, через що релігійна єдність конфедерації перебуває в хиткому становищі. Необхідно вирішити цю проблему, інакше конфлікт віри загрожує розірвати унію на частини."
  sc_clear_religious_chaos_tt: "[ShowLawName('sc_internal_politics')] та [ShowLawName('sc_war_politics')|l] тепер поширюються на всіх учасників, незалежно від їхньої [Concept('religion', 'релігії')|e]."
  sc_mending_schism: "Виправлення розколу"
  sc_mending_schism_desc: "Стабільність і безпека #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! вищі за релігійні чвари #TOOLTIP:SITUATION,reformation,X #L Католицької Реформації#!#!. Усі учасники повинні утриматися від ворожнечі через віру."
  sc_enforcing_religious_unity: "Встановлення релігійної єдності"
  sc_enforcing_religious_unity_desc: "Релігія відіграє важливу роль у житті учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#!, а тому її релігійна єдність має першочергове значення. Усі кантони повинні так чи інакше дотримуватися однієї й тієї ж віри."
  sc_only_defending_same_religion_allies_tt: "Поточна #TOOLTIP:LAW,sc_war_politics,X #L військова політика#!#! йде на користь лише учасникам, які дотримуються однієї віри."
  sc_relations_with_hre: "Імперські відносини"
  sc_relations_with_hre_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! є частиною #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священної Римської імперії#!#! з моменту свого створення. Однак #TOOLTIP:SITUATION,reformation,X #L Католицька Реформація#!#! викликала невдоволення у багатьох учасників конфедерації…"
  sc_remain_in_the_hre: "Залишатися в імперії"
  sc_remain_in_the_hre_desc: "Хоча #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! — успішне об'єднання, здатне захистити своїх учасників від іноземних держав, але воно погано підходить для протистояння військовій могутності набагато більших держав. Залишаючись у #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священній Римській імперії#!#!, ми надамо #TOOLTIP:CULTURE,$swiss_group_tt$,X #L швейцарському#!#! народу більше необхідної підтримки."
  sc_remain_in_the_hre_tt: "Залишатися в #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священній Римській імперії#!#!"
  sc_prestige_malus_tt: "Кожен учасник втрачає [ShowNamedValue('prestige_extreme_penalty')|+=2%] од. [Concept('prestige', 'престижу')|e]"
  sc_leave_the_hre: "Покинути імперію"
  sc_leave_the_hre_desc: "Хоча зовнішні вороги не рідкість, найбільші загрози для #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! походять зсередини самої #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священної Римської імперії#!#!, яка обіцяла захищати своїх учасників. Залишаючись в імперії, ми лише наражаємося на ризик."
  sc_leave_the_hre_tt: "Покинути #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священну Римську імперію#!#!"
  sc_every_member_leaves_hre_tt: "Усі учасники покидають #ONCLICK:INTERNATIONAL_ORGANIZATION,hre #TOOLTIP:INTERNATIONAL_ORGANIZATION,hre,X #L Священну Римську імперію#!#! і не зможуть більше до неї приєднатися, доки залишаються учасниками #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#!"
  sc_representative: "#L [ShowCultureGroupNameWithNoTooltip('swiss_group')]ий#! представник"
  sc_representative_desc: "Кожному виду організації потрібен спікер — представник, який буде обличчям політичних суб'єктів всередині та за межами організації. Однак #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! може бути винятком із цього правила…"
  sc_canton_representative: "Представник-кантон"
  sc_canton_representative_desc: "Деякі кантони багатші або впливовіші за інші. Таким чином, #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарську конфедерацію#!#! представлятиме не людина, а місто-держава."
  sc_councillor_representative: "Радник-представник"
  sc_councillor_representative_desc: "Кантонам #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! слід відмовитися від частини свого впливу і призначити одну людину обличчям конфедерації."
  sc_power_of_the_sovereign: "На чолі конфедерації стоїть [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle]"
  sc_power_of_the_sovereign_desc: "Представник конфедерації міг би вимагати більше повноважень та впливу в унії, щоб зміцнити свої позиції на суспільній арені."
  sc_sovereign_representative_power: "Представницька влада"
  sc_sovereign_representative_power_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] має право попросити допомоги в учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! з різних питань, починаючи від фінансової допомоги і закінчуючи військовою підтримкою."
  sc_sovereign_religious_power: "Релігійна влада"
  sc_sovereign_religious_power_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] не має широких повноважень і завідує лише релігійними справами #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#!."
  sc_sovereign_absolute_power: "Абсолютна влада"
  sc_sovereign_absolute_power_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] управляє #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарською конфедерацією#!#! як єдиною державою. Таким чином, правитель користується всіма привілеями та виконує всі обов'язки, начебто він був монархом конфедерації."
  sc_election_method: "Система виборів"
  sc_election_method_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! обирається за належним рішенням з боку відповідного законодавчого органу."
  sc_direct_vote: "Пряме голосування"
  sc_direct_vote_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] обирається безпосередньо учасниками #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#!. Кожен учасник має один голос і право представляти конфедерацію."
  sc_lottery: "Жеребкування"
  sc_lottery_desc: "Лише Господь Бог може вирішувати, хто представлятиме #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарську конфедерацію#!#!. Вибори здійснюються за допомогою таємного жеребкування, вирішальним фактором у якому є доля."
  sc_rotation: "Чергування"
  sc_rotation_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] призначається по черзі. Кожен учасник #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! повинен представляти конфедерацію хоча б раз, перш ніж колишній лідер зможе знову отримати владу."
  sc_ruling_period: "Період правління"
  sc_ruling_period_desc: "У конфедерації може бути [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle]. Однак потрібно визначити, чи буде [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] служити унії довічно чи протягом певного часу."
  sc_timed: "Тимчасове лідерство"
  sc_timed_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! перебуває при владі лише протягом встановленого періоду. Після цього термін повноважень закінчується, і обирається новий [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle|l]."
  sc_lifelong: "Довічне лідерство"
  sc_lifelong_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! служить їй усе життя. Вибори проводяться лише після смерті або примусової відставки правителя."
  sc_election_frequency: "Частота виборів"
  sc_election_frequency_desc: "Тепер, коли [ShowLawName('sc_ruling_period')|l] визначений, перейдемо до наступного питання — частоти проведення виборів, на яких обиратиметься новий [GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle]."
  sc_biyearly_elections: "Вибори раз на два роки"
  sc_biyearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! обирається кожні 2 роки."
  sc_four_yearly_elections: "Вибори раз на 4 роки"
  sc_four_yearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! обирається кожні 4 роки."
  sc_eight_yearly_elections: "Вибори раз на 8 років"
  sc_eight_yearly_elections_desc: "[GetUniqueInternationalOrganization('swiss_confederation').GetLeaderTitle] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! обирається кожні 8 років."
  sc_internal_politics: "Внутрішня політика"
  sc_internal_politics_desc: "Хоча #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! — це передусім союз, створений в оборонних цілях, очевидно, що внутрішні справи конфедерації також мають вирішуватися спільними силами."
  sc_forbid_internal_wars: "Заборона на внутрішні війни"
  sc_forbid_internal_wars_desc: "Не можна допустити, щоб дрібні суперечки переросли в криваві конфлікти. Кожен учасник #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! повинен вирішувати свої проблеми з іншим учасником за допомогою суддів конфедерації, а не на полі бою."
  sc_forbid_internal_wars_tt: "Жоден учасник #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарської Конфедерації#!#! не може атакувати іншого учасника"
  sc_forbid_same_religion_internal_wars_tt: "Жоден учасник #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарської Конфедерації#!#! не може атакувати іншого учасника, який сповідує одну з ним [Concept('religion','релігію')|e]"
  sc_allow_internal_wars: "Дозволені внутрішні війни"
  sc_allow_internal_wars_desc: "Війни — невід'ємна частина людської історії. Так, приємного в них мало, але будь-які конфлікти роблять нас сильнішими."
  sc_membership_regulation: "Регламентація членства"
  sc_membership_regulation_desc: "[GetInternationalOrganizationType('swiss_confederation').GetName] спочатку створена #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарцями#!#! для захисту від династії Габсбургів, чий вплив у регіоні став надто значним. Однак досі так і не вирішено, хто має право вступити до об'єднання…"
  sc_swiss_culture_and_geography: "Тільки корінні швейцарці"
  sc_swiss_culture_and_geography_desc: "Конфедерація — суто #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарське#!#! об'єднання, тому до неї можуть приєднатися лише держави конкретної культури та регіону."
  sc_swiss_culture_and_geography_tt: "Приєднатися до об'єднання можуть лише держави зі #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарською#!#! культурою як [Concept('primary_culture','основною')|e]. При цьому їхня [Concept('capital','столиця')|e] повинна знаходитися в #TOOLTIP:AREA,central_switzerland_area,X #L центральній#!#, #TOOLTIP:AREA,eastern_switzerland_area,X #L східній#!# або #TOOLTIP:AREA,western_switzerland_area,X #L західній Швейцарії#!#"
  sc_just_swiss_culture: "Швейцарська культура"
  sc_just_swiss_culture_desc: "Незважаючи на природні кордони, вплив #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарської#!#! культури поширюється далеко за межі Швейцарської Конфедерації. Тому варто переглянути закон про те, кому можна приєднуватися до об'єднання."
  sc_just_swiss_culture_tt: "Приєднатися до об'єднання можуть лише держави зі #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарською#!#! культурою як [Concept('primary_culture','основною')|e]"
  sc_swiss_or_swiss_relative: "Родичі швейцарців"
  sc_swiss_or_swiss_relative_desc: "[GetInternationalOrganizationType('swiss_confederation').GetName] має велику міць та вплив не лише завдяки #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарцям#!#, а й за рахунок внеску інших народів, близьких до нашої культури."
  sc_swiss_or_swiss_relative_tt: "Приєднатися до об'єднання можуть лише держави, чия [Concept('primary_culture','основна культура')|e] або [Concept('language','мова')|e] є #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарськими#!#!"
  sc_war_politics: "Військова політика"
  sc_war_politics_desc: "У #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! багато зовнішніх загроз. #TOOLTIP:CULTUREGROUP,swiss_group,X #L Швейцарський#!#! народ має бути єдиним у захисті один одного — тоді конфедерація зможе вижити в оточуючій її політичній анархії."
  sc_defensive_pact: "Оборонний пакт"
  sc_defensive_pact_desc: "Учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! будуть покликані до зброї лише в оборонній війні проти зовнішніх загроз."
  sc_alliance: "Швейцарський союз"
  sc_alliance_desc: "Учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! можуть звертатися один до одного за допомогою у прагненні розширити свою територію. У разі зовнішнього вторгнення всі учасники закликаються до зброї, щоб захистити своїх товаришів по конфедерації."
  sc_united_war_efforts: "Спільні військові дії"
  sc_united_war_efforts_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! стає єдиним політичним центром для всіх зовнішніх держав. У кожній війні — наступальній чи оборонній — мають брати участь військові сили всіх учасників конфедерації."
  sc_call_to_arms_conditions_tt: "[Custom('GetSCCallToArmsTooltip')]"
  sc_call_to_arms_only_same_religion_tt: "$sc_call_to_arms_always_tt$, а сторона, що закликає, та закликані сповідують одну й ту саму [Concept('religion', 'релігію')|e]"
  sc_call_to_arms_always_tt: "Ворог НЕ є членом #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської Конфедерації#!#!"
  sc_unification: "$SWI_ADJ$е об'єднання"
  sc_unification_desc: "#L [ShowCultureGroupName('swiss_group')]і#! землі були роздроблені надто довго. Якщо жителі Альп хочуть процвітання та безпеки, їм потрібно об'єднатися під спільним прапором."
  sc_unification_movement_event_happened_tt: "Відбулася [Concept('event','подія')|e] #Y «$flavor_swi.999.title$»#!. Для її спрацьовування потрібні наступні умови:\n\n[ShowTriggerConditions('flavor_swi_999_trigger',PlayerScope.Self)]"
  sc_unification_same_religion_tt: "Кожен учасник сповідує або [ShowReligionName('catholic')|l], або [ShowReligionName('lutheran')|l], або [ShowReligionName('calvinist')|l]"
  sc_found_swiss_republic: "$SWI_ADJ$а $republic$"
  sc_found_swiss_republic_desc: "Принципи та методи #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#! добре сприймаються кожним кантоном, оскільки всі вони прагнуть, щоб їхній голос був врахований. Проте децентралізованість конфедерації завжди ставитиме під загрозу безпеку та захищеність #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарського#!#! народу. Настав час об'єднати конфедерацію в одну державу, а #TOOLTIP:GOVTYPE,republic,X #L республіка#!#! при цьому має зберегтися."
  sc_found_swiss_republic_specific_tt: "Влада #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_RP')|L]#!#! об'єднує #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарську Конфедерацію#!#!. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,republic,X #L республіка#!#!"
  sc_found_swiss_republic_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська Конфедерація#!#! об'єднується. У результаті формується #L [GetCountry('SWI').GetAdjective]а#! #TOOLTIP:GOVTYPE,republic,X #L республіка#!#!"
  sc_found_swiss_monarchy: "$SWI_ADJ$а $monarchy$"
  sc_found_swiss_monarchy_desc: "Хоча спочатку #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! була республіканською унією, їй довелося зіткнутися з безліччю випробувань, протистояти яким було б куди простіше під керівництвом єдиного сильного лідера. Світле майбутнє #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарського#!#! народу забезпечить лише #TOOLTIP:GOVTYPE,monarchy,X #L монархія#!#!, яка має прийти на зміну конфедерації."
  sc_found_swiss_monarchy_specific_tt: "Влада #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_RP')|L]#!#! об'єднує #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарську Конфедерацію#!#!. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,monarchy,X #L монархія#!#!"
  sc_found_swiss_monarchy_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська Конфедерація#!#! об'єднується. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,monarchy,X #L монархія#!#!"
  sc_found_swiss_theocracy: "$SWI_ADJ$а $theocracy$"
  sc_found_swiss_theocracy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарська конфедерація#!#! завдячує своїм нинішнім становищем не вільній волі республіканських голосів чи авторитарній владі монархії, а лише божественному провидінню. Лише #TOOLTIP:GOVTYPE,theocracy,X #L теократія#!#! дозволить #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарському#!#! народу процвітати в цьому світі."
  sc_found_swiss_theocracy_specific_tt: "Влада #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_RP')|L]#!#! об'єднує #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарську Конфедерацію#!#!. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,theocracy,X #L теократія#!#!"
  sc_found_swiss_theocracy_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська Конфедерація#!#! об'єднується. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,theocracy,X #L теократія#!#!"
  colonial_federation_unification: "Об'єднання колоніальної федерації"
  colonial_federation_unification_desc: "Наші узи кувалися в полум'ї боротьби за незалежність. Настав час замислитися про об'єднання земель союзників у повноцінну державу."
  colonial_federation_found_republic: "Заснувати нову республіку"
  colonial_federation_found_republic_desc: "Лише #TOOLTIP:GOVTYPE,republic,X #L республіканські#!#! принципи та процедури забезпечать права та свободи країн-учасниць і всіх підданих нашої держави."
  colonial_federation_found_republic_specific_tt: "Влада #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_GEN')|L]#!#! об'єднує #ONCLICK:INTERNATIONAL_ORGANIZATION,swiss_confederation #TOOLTIP:INTERNATIONAL_ORGANIZATION,swiss_confederation,X #L Швейцарську Конфедерацію#!#!. У результаті формується #L #L [GetCountry('SWI').GetAdjective|l]#!а#! #TOOLTIP:GOVTYPE,republic,X #L республіка#!#!"
  colonial_federation_found_republic_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L Колоніальна федерація#!#! перетворюється на єдину #TOOLTIP:GOVTYPE,republic,X #L республіку#!#!"
  colonial_federation_found_monarchy: "Заснувати нову монархію"
  colonial_federation_found_monarchy_desc: "Лише нова, справедлива #TOOLTIP:GOVTYPE,monarchy,X #L монархія#!#! забезпечить процвітання країнам-учасницям."
  colonial_federation_found_monarchy_specific_tt: "Під владою #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_GEN')|L]#!#! наша #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L колоніальна федерація#!#! буде перетворена на єдину #TOOLTIP:GOVTYPE,monarchy,X #L монархію#!#!"
  colonial_federation_found_monarchy_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L Колоніальна федерація#!#! перетворюється на єдину #TOOLTIP:GOVTYPE,monarchy,X #L монархію#!#!"
  colonial_federation_found_theocracy: "Заснувати нову теократію"
  colonial_federation_found_theocracy_desc: "Наша #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L колоніальна федерація#!#! завдячує своєю незалежністю не вільній волі республіканських голосів чи авторитарній владі монархії, а лише божественному провидінню. Лише #TOOLTIP:GOVTYPE,theocracy,X #L теократія#!#! дозволить нашому народу процвітати в цьому світі."
  colonial_federation_found_theocracy_specific_tt: "Під владою #ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_GEN')|L]#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L колоніальна федерація#!#! буде перетворена на єдину #TOOLTIP:GOVTYPE,theocracy,X #L теократію#!#!"
  colonial_federation_found_theocracy_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,colonial_federation,X #L Колоніальна федерація#!#! перетворюється на єдину #TOOLTIP:GOVTYPE,theocracy,X #L теократію#!#!"
  AVERAGE_GREAT_POWER_SCORE_OF_IO: "Середній [Concept('great_power_score','рахунок великої держави')|e] [Concept('international_organization','міжнародного об'єднання')|e]"
  AVERAGE_MILITARY_STRENGTH_OF_IO: "Середня [Concept('military_strength', 'військова чисельність')|e] [Concept('international_organization','міжнародного об'єднання')|e]"
  mutual_defense_law: "Взаємна оборона"
  mutual_defense_law_desc: "Політика, що описує, як учасники захищатимуть один одного в разі оголошення їм війни."
  assured_defense_policy: "Гарантована оборона"
  assured_defense_policy_desc: "Учасники автоматично вступають в оборонні війни, оголошені іншим учасникам."
  automatic_defense_policy: "Автоматична оборона"
  automatic_defense_policy_desc: "Учасників автоматично закликають вступити в оборонні війни, оголошені іншим учасникам, але вони не зобов'язані відгукуватися на заклик."
  possible_defense_policy: "Можлива оборона"
  possible_defense_policy_desc: "Учасників можуть закликати вступити в оборонні війни, оголошені іншим учасникам, але вони не зобов'язані відгукуватися на заклик."
  no_defense_policy: "Без оборони"
  no_defense_policy_desc: "Учасників не можуть закликати вступити в оборонні війни, оголошені іншим учасникам."
  mutual_offense_law: "Взаємний напад"
  mutual_offense_law_desc: "Політика, що описує, як учасники підтримуватимуть один одного у випадку оголошення ними війни іншій державі."
  assured_offense_policy: "Гарантований напад"
  assured_offense_policy_desc: "Учасники автоматично приєднуються до наступальних війн, оголошених іншими учасниками."
  automatic_offense_policy: "Автоматичний напад"
  automatic_offense_policy_desc: "Учасників автоматично закликають вступити в наступальні війни, оголошені іншими учасниками, але вони не зобов'язані відгукуватися на заклик."
  possible_offense_policy: "Можливий напад"
  possible_offense_policy_desc: "Учасників можуть закликати вступити в наступальні війни, оголошені іншими учасниками, але вони не зобов'язані відгукуватися на заклик."
  no_offense_policy: "Без нападу"
  no_offense_policy_desc: "Учасників не можуть закликати приєднатися до наступальних війн, оголошених іншими учасниками."
  lordship_of_ireland_rule_law: "Влада в Ірландії"
  lordship_of_ireland_rule_law_desc: "Правити Ірландією — завдання не з легких. Її політичний ландшафт одночасно нагадує хвилі бурхливого Атлантичного океану, що розбиваються об скелясті кручі, і стоячу болотну воду."
  lordship_of_ireland_rule_laudabiliter_policy: "Laudabiliter"
  lordship_of_ireland_rule_laudabiliter_policy_desc: "Колись Ірландію захопили англо-нормандські лицарі, що прагнули слави та земель. Однак нині королівська влада слабка."
  lordship_of_ireland_rule_laudabiliter_policy_tt: ""
  lordship_of_ireland_rule_statutes_of_kilkenny_policy: "Кілкеннський статут"
  lordship_of_ireland_rule_statutes_of_kilkenny_policy_desc: "Згідно з цим статутом англійські закони поширюються на всі ірландські графства. Він забороняє носіння кельтського одягу та змішані шлюби задля збереження самобутньої культури поселенців та їхньої переваги."
  lordship_of_ireland_rule_statutes_of_kilkenny_policy_tt: ""
  lordship_of_ireland_rule_ascendancy_policy: "Релігійний вплив"
  lordship_of_ireland_rule_ascendancy_policy_desc: "Ми можемо насильно навертати учасників маєтку в нашу віру."
  lordship_of_ireland_rule_ascendancy_policy_tt: ""
  UNION_TREASURY_COST: "Витрати скарбниці унії"
  union_foundation_law: "Створення унії"
  union_foundation_law_desc: "Закони #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, які визначають її характер і форму правління, централізовану або федеративну — якщо унія витримає перевірку часом."
  union_establish_seniority_policy: "Визначення старшинства"
  union_establish_seniority_policy_desc: "[GetInternationalOrganizationType('union').GetName] може управлятися лише одним із престолів. Призначення старшого партнера унії визначає, чий престол представлятиме всю унію загалом."
  union_maintain_federal_status_policy: "Збереження федерального статусу"
  union_maintain_federal_status_policy_desc: "Суверенітет країн, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, священний і не підлягає обговоренню. Навіть якщо над ними царює один володар, він не має права змінювати традиційні порядки країн-учасниць."
  union_senior_partner_policy_at: "Доступний особливий статус [#TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого#!#!')] та #TOOLTIP:SPECIAL_STATUS,junior_partner,X #L молодшого#!#! партнерів"
  union_senior_partner_policy_tt: "[ROOT.GetInternationalOrganization.GetCountryWithHighestGreatPower.GetName] ста[ROOT.GetInternationalOrganization.GetCountryWithHighestGreatPower.Custom('end_ityat')] #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшим партнером#!#! (держава має найвищий [Concept('great_power_score', 'рахунок великої держави')|e] в [Concept('union', 'унії')|e])"
  union_senior_partner_policy_specific_tt: "[ROOT.GetInternationalOrganization.MakeScope.GetVariable('pre_selected_senior_partner').GetCountry.GetName] ста[ROOT.GetInternationalOrganization.MakeScope.GetVariable('pre_selected_senior_partner').GetCountry.Custom('end_ityat')] #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшим партнером#!#!"
  union_unlocks_independence_casus_belli_tt: "Відкриває [Concept('casus_belli', 'привід для війни')|e] #TOOLTIP:CASUS_BELLI,cb_union_independence,X #L «Незалежність унії»#!#! для кожного молодшого партнера, який #Y слабший#!, ніж #TOOLTIP:SPECIAL_STATUS,senior_partner_tt,X #L старший партнер#!#!"
  union_unlocks_war_for_seniority_casus_belli_tt: "Відкриває [Concept('casus_belli', 'привід для війни')|e] #TOOLTIP:CASUS_BELLI,cb_union_war_for_seniority,X #L «Війна за старшинство»#!#! для кожного молодшого партнера, який #Y не слабший#!, ніж #TOOLTIP:SPECIAL_STATUS,senior_partner_tt,X #L старший партнер#!#!"
  union_codified_inheritance_law: "Систематизована спадщина"
  union_codified_inheritance_law_desc: "Для стабільності #ONCLICK:INTERNATIONAL_ORGANIZATION,union #TOOLTIP:INTERNATIONAL_ORGANIZATION,union,X #L унії#!#! правила успадкування для кожного її учасника мають бути систематизовані таким чином, щоб кожна держава мала однаковий порядок престолонаслідування."
  union_senior_succession_law: "Єдині правила престолонаслідування"
  union_senior_succession_law_desc: "Порядок престолонаслідування в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! визначається законом, якого дотримується #TOOLTIP:SPECIAL_STATUS,senior_partner_tt,X #L старший партнер#!#!. Решта країн-учасниць повинні за можливості дотримуватися цього закону."
  union_sovereign_succession_law: "Місцеві правила престолонаслідування"
  union_sovereign_succession_law_desc: "Жодна держава, що входить до #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, не має права диктувати свої закони про престолонаслідування іншим країнам. Порядок престолонаслідування — внутрішня справа кожного учасника унії."
  union_codified_inheritance_policy_at: "Кожен учасник #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! за можливості приймає [Concept('heir_selection', 'правило престолонаслідування')|e], якого дотримується #TOOLTIP:SPECIAL_STATUS,senior_partner_tt,X #L старший партнер#!#!"
  union_codified_inheritance_policy_bt: "#R Заблоковані [Concept('heir_selections', 'правила престолонаслідування')|e] не можна застосувати або скасувати#!"
  union_economic_law: "Економіка унії"
  union_economic_law_desc: "Навіть якщо монарх займає кілька престолів, економіка підвладних йому держав може бути роз'єднана. Цей закон сприяє зближенню країн-учасниць #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!."
  union_unified_treasury_policy: "Спільна скарбниця"
  union_unified_treasury_policy_desc: "Державна скарбниця держав, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, об'єднується в єдиний інститут, який поповнюватиме скарбницю монарха, дозволяючи йому витрачати золото в інтересах усієї унії."
  union_cooperative_investment_policy: "Спільне фінансування"
  union_cooperative_investment_policy_desc: "Казна держав, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, не належить нікому конкретно. Королівський двір розпоряджається цими коштами, щоб удосконалювати інфраструктуру всіх країн-учасниць."
  union_diplomatic_law: "Принципи дипломатії"
  union_diplomatic_law_desc: "Через те, що #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унією#!#! править один монарх, важливо визначити, як саме ведеться дипломатична політика країн-учасниць."
  union_unified_external_diplomacy_policy: "Єдина зовнішня політика"
  union_unified_external_diplomacy_policy_desc: "Дипломатичну політику #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! визначає #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старший партнер#!#!. Інші країни-учасниці не мають власної зовнішньої політики."
  union_organized_diplomats_policy: "Дипломати унії"
  union_organized_diplomats_policy_desc: "Посланці #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! служать не конкретній державі, а унії в цілому. Кожна країна-учасниця може користуватися їхніми послугами в інтересах своєї зовнішньої політики."
  union_legislature_law: "Законодавство унії"
  union_legislature_law_desc: "Управління #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унією#!#! потребує уніфікованих правил. Лише єдине законодавство може забезпечити довгострокове функціонування унії."
  union_aligned_legislature_policy: "Узгоджене законодавство"
  union_aligned_legislature_policy_desc: "Для забезпечення одноманітності та уніфікації всі закони та політики учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! будуть приведені у відповідність із законодавством #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#!."
  union_aligned_legislature_policy_at: "Кожен учасник #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! за можливості приймає [Concept('government_reforms', 'державні принципи')|e] та [Concept('policies', 'політики')|e], яких дотримується #TOOLTIP:SPECIAL_STATUS,senior_partner_tt,X #L старший партнер#!#!"
  union_federal_legislature_policy: "Місцеве законодавство"
  union_federal_legislature_policy_desc: "Різноманіття законів та звичаїв — це зовсім не недолік #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, а її основна перевага. Внутрішня політика повинна залишатися приватною справою кожної з країн-учасниць."
  union_mutual_offense_law: "Взаємний напад"
  union_mutual_offense_law_desc: "[GetInternationalOrganizationType('union').GetName] — це насамперед оборонний союз, однак у разі військових конфліктів учасники можуть допомагати один одному, якщо висловлять згоду на подібні дії."
  union_assured_offense_policy: "Гарантований напад"
  union_assured_offense_policy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L Унія#!#! виступає як агресивний союз. Вороги здригнуться, коли наші солдати єдиним фронтом виступлять проти них."
  union_automatic_offense_policy: "Обов'язковий напад"
  union_automatic_offense_policy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L Унія#!#! віддає перевагу агресивній зовнішній політиці. Підтримка товаришів по унії в наступальних війнах заохочується."
  union_possible_offense_policy: "Можливий напад"
  union_possible_offense_policy_desc: "[GetInternationalOrganizationType('union').GetName] повинна завойовувати нові землі та підвищувати свою міць, щоб вижити. У разі війни кожен учасник має право закликати на допомогу інших учасників."
  union_unification_of_crowns_law: "Перспектива об'єднання"
  union_unification_of_crowns_law_desc: "У більшості випадків #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унія#!#! — не більше ніж пухка конфедерація різних держав, які волею випадку опинилися під владою спільного монарха. Однак можливість їхнього остаточного об'єднання під прапором #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#! теж не варто виключати…"
  union_rapid_crown_unification_policy: "Стрімке об'єднання корон"
  union_rapid_crown_unification_policy_desc: "Подальше підвищення ефективності чиновницького апарату #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#! прискорює процес приєднання #TOOLTIP:SPECIAL_STATUS,junior_partner,X #L молодшого партнера#!#!."
  union_swift_crown_unification_policy: "Швидке об'єднання корон"
  union_swift_crown_unification_policy_desc: "Дипломатичний та адміністративний апарати #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#! значно вдосконалилися, що дозволить швидше інтегрувати країни-учасниці."
  union_crown_unification_policy: "Об'єднання корон"
  union_crown_unification_policy_desc: "Настав слушний час для повної централізації #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!. Усі країни-учасниці висловлюють свою згоду на дипломатичне приєднання до #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#!."
  union_federal_union_policy: "Федеративна унія"
  union_federal_union_policy_desc: "[GetInternationalOrganizationType('union').GetName] — це насамперед оборонний союз. Ніхто з учасників не зацікавлений у тому, щоб об'єднати корони в єдину державу, і суверенітет усіх країн-учасниць має залишатися непорушним."
  dop_rudolfine_house_rules: "Реформовані правила династії"
  dop_rudolfine_house_rules_desc: "Реформовані правила династії — це система спільного управління австрійськими землями, яка надає рівний статус усім чоловікам у родині, але при цьому старший має особливі привілеї."
  foreign_court_customs_policy: "Чужоземні звичаї"
  foreign_court_customs_policy_desc: "Обмеженість до добра не доведе. Ми можемо збагатити свою культуру, почерпнувши натхнення у чужоземних дворів."
  colonial_representation_law: "Колоніальне представництво"
  colonial_representation_law_desc: "Наш вплив на підвладні нам території залежить від примх нашого сюзерена."
  colonial_representation_law_no: "Відсутність представництва"
  colonial_representation_law_no_desc: "Ми не маємо права брати участь у засіданнях парламенту, а наш сюзерен суттєво впливає на економіку."
  colonial_representation_law_yes: "Представництво в парламенті"
  colonial_representation_law_yes_desc: "Ми отримали право голосу в ухваленні парламентських рішень нашої країни, при цьому вплив нашого сюзерена було обмежено."
  mongol_law_policy: "Монгольське право"
  mongol_law_policy_desc: "Населенню нічого не відомо про монгольське право, але саме воно забезпечує досягнення трьох важливих цілей: об'єднання народу, покора правителю та суворе покарання за злочини проти держави. Зберігаючи це право в таємниці, ми можемо легко змінювати його, підлаштовуючи під поточні потреби держави."
  dahsala_system: "Система дахсала"
  dahsala_system_desc: "Поточна система оподаткування надто хаотична: через місцеві порядки індійські простолюдини платять різні податки залежно від регіону, де вони проживають. Запровадивши систему дахсали, ми зможемо збирати податки більш організовано."
  zabiti: "Система забті"
  zabiti_desc: "Система, за якої податок залежить від розміру землі та її вартості. Власники землі мають виплачувати його або сріблом, або врожаєм. При цьому, якщо їхня земля довгий час не оброблялася, вони звільняються від податку доти, доки вона знову не почне приносити врожай."
  ghalla_bakshi: "Система гхалла бакші"
  ghalla_bakshi_desc: "Простий люд підтримує цю форму оподаткування, оскільки вона дозволяє виплачувати потрібну суму врожаєм, а не грошима."
  nasaq: "Система насак"
  nasaq_desc: "З трьох систем ця — найнечесніша. Сума податку залежить від середнього попиту на землю за останні десятиліття."
  mansabdar_system: "Мансабдари"
  mansabdar_system_desc: "Замість того, щоб покладатися на феодальну аристократію, ми могли б надати можливість обіймати будь-яку армійську посаду всім, хто доведе, що здатен на це."
  hab_military_frontier: "Військові на прикордонній смузі"
  hab_military_frontier_desc: "Тепер наш кордон охороняють військові. Вони повинні захистити нашу державу від вторгнення армій язичників."
  frontier_maintained: "Кордон захищений"
  frontier_maintained_desc: "Кордон чудово охороняється: наші солдати готові захищати країну від ворожих загарбників."
  frontier_not_maintained: "Кордон не захищений"
  frontier_not_maintained_desc: "Наш кордон не охороняється через проблеми з фінансуванням. У разі вторгнення ворог без зусиль перейде його."
  vedic_education: "Ведична освіта"
  vedic_education_desc: "Система освіти, за якої люди можуть разом навчатися #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстським#!#! практикам без розділення на касти."
  guru_nanak_guruship: "Вчення гуру Нанака"
  guru_nanak_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_nanak').GetName]."
  vand_chhako: "Ванд чхако"
  vand_chhako_desc: "Один з основних принципів вчення, яке розробив [GetCharacter('guru_nanak').GetName]. Він говорить, що сикхи повинні ділитися своїм майном з громадою."
  kirat_karo: "Кірат каро"
  kirat_karo_desc: "Один з основних принципів вчення, яке розробив [GetCharacter('guru_nanak').GetName]. Він говорить, що сикхи повинні старанно працювати, використовуючи таланти та навички, даровані їм Богом."
  naam_japo: "Нам джапо"
  naam_japo_desc: "Один з основних принципів вчення, яке розробив [GetCharacter('guru_nanak').GetName]. Він говорить, що сикхи повинні медитувати та повторювати мантри з ім'ям Бога, щоб знайти з ним духовний зв'язок.ੴ"
  guru_angad_guruship: "Вчення гуру Ангада"
  guru_angad_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_angad').GetName]."
  gurmukhi_script: "Писемність гурмукхі"
  gurmukhi_script_desc: "Ця писемність, яку винайшов [GetCharacter('guru_angad').GetName], буде використовуватися для написання різних священних текстів #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхізму#!#!."
  langar_community: "Лангари"
  langar_community_desc: "Лангари — це їдальні при храмах, де безкоштовно годуватимуть усіх, незалежно від їхнього віросповідання, становища в суспільстві та національності."
  mall_akhara: "Малл Акхара"
  mall_akhara_desc: "Бійцівські арени для тренувань. Тут можна буде не лише зміцнити тіло, а й відточити свої бойові навички."
  guru_amar_das_guruship: "Вчення гуру Амар Даса"
  guru_amar_das_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_amar_das').GetName]."
  dasvandh_tax: "Податок дасвандх"
  dasvandh_tax_desc: "Ця форма оподаткування передбачає виплату десятої частини доходу на користь гуру, який надалі може використовувати ці гроші для потреб громади."
  ananda_karaja: "Анада караджа"
  ananda_karaja_desc: "Це #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхська#!#! весільна церемонія, яку вигадав [GetCharacter('guru_amar_das').GetName]. Її назва означає «діяння в ім'я щастя». Під час церемонії виконуються особливі релігійні гімни, спрямовані на досягнення духовної рівноваги та зв'язку з божественним."
  sangat_equality: "Рівність в общині Сангат"
  sangat_equality_desc: "Чоловіки та жінки рівні перед Богом, тому й ті, й інші мають право бути частиною чернечої громади Сангат і навіть очолювати її."
  guru_ram_das_guruship: "Вчення гуру Рам Даса"
  guru_ram_das_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_ram_das').GetName]."
  urbanization_projects: "Проєкти міського розвитку"
  urbanization_projects_desc: "Маючи завзятість і працюючи спільно, можна побудувати найвеличніше місто, яке багато століть слугуватиме для #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхів#!#! священним місцем."
  scripture_hymns: "Священні гімни"
  scripture_hymns_desc: "Писання — головна книга вірян. Ми повинні увічнити божественну мудрість у прекрасних гімнах."
  masand_system: "Система масанд"
  masand_system_desc: "Ця система передбачає відправлення місіонерів у різні області з метою поширення #L #L [ShowReligionAdjective('sikhism')|l]#!ого#! вчення та збору податків на користь гуру."
  guru_arjan_guruship: "Вчення гуру Арджана"
  guru_arjan_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_arjan').GetName]."
  adi_granth: "Аді Грантх"
  adi_granth_desc: "Збірник гімнів, який уклав [GetCharacter('guru_arjan').GetName]. Він містить безліч гімнів минулих гуру, які послугують основою для наших священних писань."
  holy_abode: "Свята обитель"
  holy_abode_desc: "Якщо зберігати релігійні тексти у священних храмах, вони стануть священними місцями, до яких здійснюватимуть паломництва всі прихильники #L [ShowReligionAdjective('sikhism')|l]#!ого#! вчення."
  martyrdom: "Мучеництво"
  martyrdom_desc: "Наша #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхська#!#! віра міцна, і ми не відречемося від неї навіть під загрозою тортур і смерті."
  guru_hargobind_guruship: "Вчення гуру Хар Ґобінда"
  guru_hargobind_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_hargobind').GetName]."
  akal_takht: "Акал Тахт"
  akal_takht_desc: "Назва цієї споруди можна перекласти як «Трон Вічного». Вона слугуватиме резиденцією #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхських#!#! лідерів і символом їхньої влади."
  protection_of_the_poor: "Захист бідняків"
  protection_of_the_poor_desc: "Наша армія не повинна бути інструментом гноблення та тиранії. Її завдання — захищати від самодурів найуразливіші верстви населення."
  miri_piri: "Мірі пірі"
  miri_piri_desc: "#TOOLTIP:RELIGION,$sikhism_tt$,X #L Сикхізм#!#! зможе розквітнути повною мірою лише тоді, коли гуру об'єднають у своїх руках і духовну, і світську владу."
  guru_har_rai_guruship: "Вчення гуру Хар Рая"
  guru_har_rai_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_har_rai').GetName]."
  impartial_manji_heads: "Непідкупні голови манджі"
  impartial_manji_heads_desc: "Ті, хто стоїть на чолі духовної ієрархії, повинні відкинути упередженість і сумлінно служити інтересам #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхів#!#!."
  fragance_of_a_flower: "Аромат квітки"
  fragance_of_a_flower_desc: "Якщо зірвати квітку однією рукою, а подарувати — іншою, обидві руки пахнутимуть однаково. Яке б вчення ми не сповідували, божественна десниця торкається всіх нас."
  nature_guardian: "Турбота про природу"
  nature_guardian_desc: "Ми повинні жити в гармонії з природою, а не ставити її на службу людству. Захищайте її та дбайте про неї так само, як вона дбає про вас."
  guru_har_krishan_guruship: "Вчення гуру Хар Крішана"
  guru_har_krishan_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_har_krishan').GetName]."
  treat_the_sick: "Лікування хворих"
  treat_the_sick_desc: "Хвороби та епідемії — прокляття людства. Ми будемо старанно лікувати всіх хворих, щоб наше суспільство залишалося здоровим."
  unexpected_knowledge: "Неоднозначна природа знання"
  unexpected_knowledge_desc: "Духовна сила гуру незаперечна, оскільки їм відомі такі істини, які неможливо осягнути звичайним способом. Разом з тим, ці мудрі наставники можуть вільно спілкуватися на богословські теми з будь-якими, навіть неписьменними людьми."
  young_humility: "Юні уми"
  young_humility_desc: "Ніхто не знає всіх відповідей. Завжди знайдуться сфери, недоступні нашому розумінню, і люди, які пізнали приховану від нас істину. Часом дитина може бути в чомусь розумнішою за дорослого. У цьому світі ми всі немовлята."
  guru_tegh_bahadur_guruship: "Вчення гуру Тегха Бахадура"
  guru_tegh_bahadur_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_tegh_bahadur').GetName]."
  word_of_a_sikh: "Слово сикха"
  word_of_a_sikh_desc: "#TOOLTIP:RELIGION,$sikhism_tt$,X #L Сикхи#!#! переконані, що Бог всюдисущий, а отже, кожне слово вимовляється в його присутності. Саме тому вони не мають права порушувати свої клятви."
  guru_travels: "Подорожі гуру"
  guru_travels_desc: "Залишаючись в одному й тому ж місці, гуру просто не зможе поширювати вчення #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхізму#!#!. Отже, він повинен багато подорожувати та спілкуватися з представниками інших народів і вірувань."
  resist_persecution: "Жодних переслідувань"
  resist_persecution_desc: "Вороги істинного вчення завжди переслідуватимуть вірян, але наші переконання сильні, і ніхто не зможе похитнути їх."
  guru_gobind_singh_guruship: "Вчення гуру Ґобінда Сінґха"
  guru_gobind_singh_guruship_desc: "Набір практик і настанов, які створив [GetCharacter('guru_gobind_singh').GetName]."
  sikh_pluralism: "Різнорідність сикхізму"
  sikh_pluralism_desc: "Представники громади [ShowLawName('khalsa_law')|l] — поборники #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхської#!#! віри, однак далеко не всі сикхи зараховують себе до цієї групи. Це доводить, що всередині нашої релігії є безліч течій, і ця різноманітність робить нас сильнішими."
  dharamyudh: "Дгарам'юдг"
  dharamyudh_desc: "Дгарам'юдг, що означає «війна за справедливість», покликана захищати #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхську#!#! віру та її послідовників. До неї можна вдаватися лише в крайньому разі, коли інші методи вже вичерпані. Проте кожен сикх повинен бути готовий взятися за зброю та дати відсіч гнобителям."
  dasam_granth: "Дасам Ґрантг"
  dasam_granth_desc: "Збірник гімнів і віршів, які написав [GetCharacter('guru_gobind_singh').GetName]. За своєю важливістю цей твір не поступається «Аді Ґрантг», тому в храмах вони часто зберігаються поруч."
  khalsa_law: "Хальса"
  khalsa_law_desc: "Громада воїнів, які поклялися захищати #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхську#!#! віру та її послідовників. Їхні обряди посвячення та норми поведінки — приклад праведності та самовідданості для всіх вірян."
  guru_panth: "Гуру Пантг"
  guru_panth_desc: "Духовними лідерами #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхізму#!#! повинні бути всі представники громади [ShowLawName('khalsa_law')|l]. Таким чином вони разом будуть єдиним гуру."
  khalsa_fauj: "Хальса Фаудж"
  khalsa_fauj_desc: "[ShowLawName('khalsa_law')] повинна організувати власну повноцінну армію. Тільки так її представники зможуть стати захисниками #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхської#!#! віри."
  amrit_sanskar: "Амріт Санскар"
  amrit_sanskar_desc: "Представники громади [ShowLawName('khalsa_law')|l] не якісь дикуни, що бездумно рвуться в бій. Це найдостойніші люди, які проходять через обряди посвячення та дотримуються суворих правил поведінки, прийнятих у громаді. Престиж цих воїнів полягає зовсім не в силі, а в благочесті та духовній чистоті."
  guru_granth_sahib_guruship: "Вчення «Гуру Грантх Сахіб»"
  guru_granth_sahib_guruship_desc: "Набір практик і настанов, представлених у «[ShowWorkOfArtName('guru_granth_sahib')]»."
  eternally_living_guru: "Вічний гуру"
  eternally_living_guru_desc: "«[ShowWorkOfArtName('guru_granth_sahib')]» — священний текст, який шанується як останній з гуру. Він вічно слугуватиме дороговказом для всіх послідовників #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхізму#!#!."
  divine_justice: "Божественна справедливість"
  divine_justice_desc: "Вчення, викладене у «[ShowWorkOfArtName('guru_granth_sahib')]», заповідає людям жити у мирі та гармонії, тобто відповідно до природних законів, встановлених справедливим Богом."
  unchanging_writing: "Незмінний текст"
  unchanging_writing_desc: "«[ShowWorkOfArtName('guru_granth_sahib')]» укладався різними гуру протягом кількох сотень років, і тепер нарешті досяг повної та вічної форми. З цього моменту жодна літера цього священного тексту не буде змінена."
  tur_kanum_i_osmani: "Османський закон"
  tur_kanum_i_osmani_desc: "Сукупність правил та уложень, що утворюють законодавство #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#!. Його основне завдання — забезпечити внутрішню стабільність багатонаціональної держави, а не полегшити завоювання нових земель."
  tur_has_not_first_option_in_flavor_tur_208_event: "У [Concept('event', 'події')|e] #Y «$flavor_tur.208.title$»#! НЕ обрано перший варіант відповіді"
  tur_has_picked_first_option_in_flavor_tur_208_event: "У [Concept('event', 'події')|e] #Y «$flavor_tur.208.title$»#! обрано перший варіант відповіді"
  reformed_hussite_armies_policy: "Доопрацьована гуситська тактика"
  reformed_hussite_armies_policy_desc: "Наші предки були майстрами оборони. Довгі роки вони давали відсіч ворогам. Настав час перейти в наступ і продемонструвати єретикам та язичникам, що живуть по сусідству, на що здатна наша реформована та вкрай агресивна армія."
  ira_alcohol_ban: "Обмеження вживання алкоголю"
  ira_alcohol_ban_desc: "Щоб віднайти золоту середину між релігійними обов'язками служителів нашої віри та бажаннями населення, ми повинні вирішити, чи запроваджувати обмеження на вживання спиртного."
  ban_on_alcohol: "Заборона алкоголю"
  ban_on_alcohol_desc: "Заборонивши всім громадянам держави вживати спиртне, ми отримаємо підтримку служителів нашої віри, але розгніваємо населення."
  no_restriction_on_alcohol: "Вільне вживання алкоголю"
  no_restriction_on_alcohol_desc: "Якщо ми не заборонятимемо алкоголь, а, навпаки, дозволимо всім громадянам його вживати, це забезпечить нам лояльність населення."
  act_of_navigation: "Навігаційний акт"
  act_of_navigation_desc: "Ми повинні оскаржувати панування наших конкурентів на всіх ринках. За допомогою централізованих розпоряджень та торгових привілеїв ми спробуємо домогтися переваги наших купців над купцями наших ворогів та суперників."
  lit_casimir_code_policy: "Судебник Великого князівства Литовського"
  lit_casimir_code_policy_desc: "$lit_casimir_code_policy$ покликаний вирішити проблему відсутності зведення законів і побороти злочинні дії облечених владою. З його допомогою [GetEstateName('crown_estate')|l] зможуть приборкати хаос та отримають більше повноважень."