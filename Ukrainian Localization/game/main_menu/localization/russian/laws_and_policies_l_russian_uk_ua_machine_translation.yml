  hre_emperor_bonus_tt: "[Concept('hre_emperor', 'імператор')|e] отримує такі модифікатори:"
  hre_elector_bonus_tt: "[Concept('electors','Виборщики')|e] отримують такі модифікатори:"
  hre_free_city_bonus_tt: "[Concept('free_cities','Вільні міста')|e] отримують такі модифікатори:"
  hre_location_bonus_tt: "[Concept('locations','Райони')|e] держави [GetUniqueInternationalOrganization('hre').GetName] отримують такі модифікатори:"
  imperial_religion: "Імперська релігія"
  imperial_religion_desc: "[GetUniqueInternationalOrganization('hre').GetName] ґрунтується на вірі."
  hre_religion_catholic: "$imperial_religion$ — $catholic$"
  hre_religion_catholic_desc: "Традиційне [ShowReligionName('catholic')|l], його чесноти та цінності визначають життя в межах держави [GetUniqueInternationalOrganization('hre').GetName]."
  hre_religion_lutheran: "$imperial_religion$ — $lutheran$"
  hre_religion_lutheran_desc: "[ShowSituationName('reformation')] назавжди змінила погляд на питання віри, завдяки чому [ShowReligionName('lutheran')|l] стало панівною релігією імперії."
  hre_religion_hussite: "$imperial_religion$ — $hussite$"
  hre_religion_hussite_desc: "[ShowSituationName('western_schism')] приніс світові #L #L [ShowReligionAdjective('hussite')|l]#!е#! вчення, яке тепер визначає життя в імперії."
  hre_religion_calvinist: "$imperial_religion$ — $calvinist$"
  hre_religion_calvinist_desc: "Віра міцна в імперії, а [ShowReligionName('calvinist')|l] — її світоч. Сам Господь заповідав нам слідувати #L [ShowReligionAdjectiveWithNoTooltip('calvinist')|l]ому#! вченню."
  hre_religion_christian: "$imperial_religion$ — $christian$"
  hre_religion_christian_desc: "Тонкощі релігії більше не мають значення. Усе #L #L [ShowReligionAdjective('christian')|l]#!е#! вчення має бути прийняте як панівна релігія імперії."
  golden_bull: "Золота булла"
  golden_bull_desc: "$golden_bull$ — це законодавчий акт, за допомогою якого [GetUniqueInternationalOrganization('hre').GetName] визначає та закріплює свій конституційний устрій і, зокрема, роботу колегії виборців. Усі закони та імперські реформи ґрунтуються на Золотій буллі."
  golden_bull_policy: "Закріплення Золотої булли"
  golden_bull_policy_desc: "$golden_bull_desc$"
  no_golden_bull_policy: "Невпорядкований виборчий процес"
  no_golden_bull_policy_desc: "Без Золотої булли принципи організації та виборча система #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! залишаються хаотичним нагромадженням звичаїв, прецедентів та мінливих альянсів. За відсутності формального уложення [Concept('hre_electoral_college', 'колегія виборців')|e] схильна до розбратів, інтриг та закулісної боротьби."
  no_golden_bull_policy_tt: "Після прийняття #TOOLTIP:LAW,golden_bull,X #L Золотої булли#!#! [GetUniqueInternationalOrganization('hre').GetName] за жодних обставин не зможе її скасувати."
  hre_golden_bull_formalizes_electorate_tt: "Формалізує виборчу поведінку: [Concept('hre_electoral_college', 'CONCEPT_PLACEHOLDER')|e]"
  hre_golden_bull_self_voting_regulated_via_electorate_law: "Можливість голосувати за себе визначається [Concept('law', 'правилами')|e] #TOOLTIP:LAW,imperial_voting_law,X #L імперського голосування#!#!. Спочатку діє правило, що дозволяє #TOOLTIP:POLICY,free_electorate_policy,X #L вибори без обмежень#!#!."
  monetary_contribution: "Імперський податковий закон"
  monetary_contribution_desc: "[GetUniqueInternationalOrganization('hre').GetName], як і будь-яке політичне утворення, потребує золота. Щоб забезпечити фінансову стабільність імперії, можна ухвалити низку різних податкових законів, які допоможуть переводити золото з приватних рук у державні."
  no_monetary_contribution: "Відсутність податків"
  no_monetary_contribution_desc: "Імперії більше не потрібне додаткове золото. Зменшивши оподаткування, можна перенаправити частину адміністрації на інші завдання."
  only_emperor_payment: "Пряме оподаткування"
  only_emperor_payment_desc: "[ShowParliamentIssueTypeName('hre_roman_month')] — недостатньо, щоб покрити витрати на захист #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Потрібно ввести новий податок, бенефіціаром якого буде наш [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  only_treasury_payment: "Казначейське оподаткування"
  only_treasury_payment_desc: "Хоч [GetUniqueInternationalOrganization('hre').GetLeaderTitle] і в змозі покривати багато витрат за рахунок власних коштів, фінансовий буфер у вигляді імперської скарбниці дозволив би теперішньому та майбутнім імператорам ефективніше фінансувати внутрішні справи #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  complete_imperial_contribution: "Імперське оподаткування"
  complete_imperial_contribution_desc: "Лише повне оподаткування всіх учасників допоможе впоратися з фінансовими проблемами #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  military_contribution: "Імперський облік"
  military_contribution_desc: "$military_contribution$ — список імперських станів, де вказана точна чисельність військ, які має отримати від кожного стану [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  no_military_contribution: "Немає військової повинності"
  no_military_contribution_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] не вимагає від жодного зі станів додаткових солдатів."
  manpower_from_cities: "Міський внесок"
  manpower_from_cities_desc: "[ShowSpecialStatusNamePlural('free_city')] зобов'язані надати додаткові війська, які отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_cities_tt: "[ShowSpecialStatusNamePlural('free_city')] повинні надати [Concept('manpower','рекрутів')|e], яких отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_electors: "Внесок виборців"
  manpower_from_electors_desc: "[ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] зобов'язані надати додаткові війська, які отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_electors_tt: "[ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] повинні надати [Concept('manpower','рекрутів')|e], яких отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_princes: "Внесок принців"
  manpower_from_princes_desc: "[ShowSpecialStatusNamePlural('imperial_prince')] зобов'язані надати додаткові війська, які отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_princes_tt: "[ShowSpecialStatusNamePlural('imperial_prince')] повинні надати [Concept('manpower','рекрутів')|e], яких отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  great_imperial_army: "Велика імперська армія"
  great_imperial_army_desc: "Усі держави у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! зобов'язані надати додаткові війська, які отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  great_imperial_army_tt: "Усі держави у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! повинні надати [Concept('manpower','рекрутів')|e], яких отримає у своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  perpetual_diet_policy_tt: "[Concept('location','Район')|e], в якому знаходиться #Y Постійний рейхстаг#!, отримує такі модифікатори:"
  imperial_voting_law: "Імперське голосування"
  imperial_voting_law_desc: "В основі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! лежить принцип обрання імператора. Особливості виборчого процесу безпосередньо впливають на співвідношення сил всередині імперії."
  rotating_emperorship_policy: "Змінюваність імператорів"
  rotating_emperorship_policy_desc: "Щоб не допустити консолідації влади в руках однієї людини, імперія запровадила систему, що перешкоджає переобранню правителів."
  free_electorate_policy: "Вибори без обмежень"
  free_electorate_policy_desc: "Виборці незалежно обирають наступного імператора. Дозволено голосувати за самого себе."
  emperor_successor_preference_policy: "Перевага наступнику імператора"
  emperor_successor_preference_policy_desc: "Імператор висуває кандидатом свого наступника. Влада в імперії набуває рис династичної."
  emperor_successor_preference_policy_opinion_impact: "Усі держави, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, знизять свою [Concept('opinion','думку')|e] про #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 50#!"
  emperor_dynastic_preference_policy: "Перевага династії імператора"
  emperor_dynastic_preference_policy_desc: "Виборці переважно голосують за членів родини імператора, що ще більше посилює вплив династії на виборчу систему."
  emperor_dynastic_preference_policy_opinion_impact: "Усі держави, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, знизять свою [Concept('opinion','думку')|e] про #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 75#!"
  erbkaisertum_policy: "Спадкова імперія"
  erbkaisertum_policy_desc: "Вибори скасовуються, і імперія стає повноцінною спадковою монархією, де династична влада ставиться понад легітимність."
  imperial_succession_law: "Імперське престолонаслідування"
  imperial_succession_law_desc: "Порядок престолонаслідування в державі [GetUniqueInternationalOrganization('hre').GetName] — доволі делікатне питання. Право успадкування імперського престолу прописано в імперських законах."
  hre_agnatic_succession_policy: "Агнатичне успадкування"
  hre_agnatic_succession_policy_desc: "Імператорська корона держави [GetUniqueInternationalOrganization('hre').GetName] передається лише по чоловічій лінії."
  hre_agnatic_succession_policy_custom_tooltip: "Лише [Concept('rulers', 'правителі')|e] чоловічої статі можуть успадковувати трон #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!"
  hre_pragmatic_sanction_policy: "Прагматична санкція"
  hre_pragmatic_sanction_policy_desc: "Стать правителя не має значення. І чоловіки, і жінки можуть успадковувати імператорську корону держави [GetUniqueInternationalOrganization('hre').GetName]."
  hre_pragmatic_sanction_policy_opinion_impact: "Держави, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! і дотримуються принципів #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічного закону#!#! або #TOOLTIP:HEIRSELECTION,partition_inheritance,X #L поділу спадщини#!#!, знизять свою [Concept('opinion','думку')|e] про #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 75#!"
  electorate_organization_law: "Об'єднання виборців"
  electorate_organization_law_desc: "Виборці являють собою групу могутніх аристократів і священнослужителів, які мають право обирати наступного імператора."
  integrated_electors_policy: "Скорочення числа виборців"
  integrated_electors_policy_desc: "Число виборців скорочується, а [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] отримує одне з місць, які вони займали раніше."
  integrated_electors_policy_tt: "Найслабший #TOOLTIP:SPECIAL_STATUS,elector,X #L князь-виборець#!#! і #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископ-виборець#!#! втратять свій статус виборців #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!"
  limited_electors_policy: "Обмеження числа виборців"
  limited_electors_policy_desc: "Число виборців обмежується до семи. Голоси за кандидата на імперський престол можна отримати в обмін на різноманітні подарунки та послуги, хоча обіцянки та посули — дієвий і перевірений спосіб залучення голосів виборців."
  electorate_policy: "Зміцнення колегії виборців"
  electorate_policy_desc: "Число виборців збільшується на два місця. До складу колегії додатково входить один світський та один духовний князь-виборець. Крім того, отримання голосу виборця як ніколи залежить від обіцянок та посулів."
  expanded_electors_policy: "Збільшення числа виборців"
  expanded_electors_policy_desc: "Число виборців збільшується на чотири місця. До складу колегії додатково входять два світських і два духовних князі-виборці. Прихильність виборців можна заслужити тільки суттєвими обіцянками."
  elector_council_policy: "Рада виборців"
  elector_council_policy_desc: "Виборці перебувають на піку своєї могутності, оскільки до складу колегії додатково входять три світських і три духовних князі-виборці. Крім того, вони отримують право обирати антикороля, а чинний [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] може бути замінений ним у Рейхстазі, якщо ніхто не виступить проти. Фактично, чинний [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] може бути підданий процедурі переобрання за рішенням виборців."
  electorate_religion_law: "Релігійний закон для виборців"
  electorate_religion_law_desc: "Релігія — це найважливіший стовп держави [GetUniqueInternationalOrganization('hre').GetName] як для імператорів, так і для виборців."
  only_imperial_religion_policy: "Тільки імперська релігія"
  only_imperial_religion_policy_desc: "Щоб зберегти своє становище, виборці повинні сповідувати тільки імперську релігію."
  only_imperial_religion_group_policy: "Тільки імперська релігійна група"
  only_imperial_religion_group_policy_desc: "Виборцям дозволяється сповідувати свою релігію, якщо тільки вони не впадають у безбожжя."
  free_city_law: "Вільні міста"
  free_city_law_desc: "Вільні міста держави [GetUniqueInternationalOrganization('hre').GetName] — міста, що отримали права самоврядування та певної самостійності у внутрішніх справах. Зазвичай вони слугують місцем проведення засідань Рейхстагу."
  direct_imperial_cities_policy: "Імперські міста прямого підпорядкування"
  direct_imperial_cities_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] вирішив, що відтепер вільні міста перебуватимуть під його безпосереднім управлінням. Після суттєвого обмеження самостійності міста-держави фактично перетворилися на форпости держави [GetUniqueInternationalOrganization('hre').GetName] для імперської корони."
  cities_of_the_emperor_policy: "Міста імператора"
  cities_of_the_emperor_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] обмежив самостійність вільних міст. Незважаючи на те що міста поки ще можуть вести власну зовнішню політику, вони стали на крок ближче до того, щоб [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] включив їх до складу своїх володінь."
  free_cities_policy: "Вільні міста"
  free_cities_policy_desc: "Вільні міста користуються захистом, який їм надає [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], а також великою автономією, що полегшує ведення торгівлі на великих ринках."
  no_emperor_allegiance_policy: "Незахищені вільні міста"
  no_emperor_allegiance_policy_desc: "Вільні міста більше не користуються захистом від честолюбних князів, який їм надавав [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  no_free_cities_policy: "Скасування вільних міст"
  no_free_cities_policy_desc: "Вільні імперські міста були скасовані, і тепер жодне місто, жодне поселення не користується захистом, який їм надавав [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  free_city_rights_law: "Право на статус вільного міста"
  free_city_rights_law_desc: "Право отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! — винятковий привілей, дарувати який може тільки [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  german_free_cities_only_policy: "Тільки німецькі вільні міста"
  german_free_cities_only_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] — це в першу чергу #TOOLTIP:CULTUREGROUP,german_group,X #L германська#!#! держава, і привілей вважатися #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільним імперським містом#!#! відображає цей факт."
  german_free_cities_only_policy_at: "Тільки #TOOLTIP:CULTUREGROUP,german_group,X #L германські#!#! держави можуть отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  german_and_german_adjacent_free_cities_policy: "Вільні міста з родинною культурою"
  german_and_german_adjacent_free_cities_policy_desc: "Протягом всієї своєї історії імперія була тісно пов'язана з #TOOLTIP:CULTUREGROUP,netherlandish_group,X #L нідерландським#!#!, #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарським#!#! та #TOOLTIP:CULTUREGROUP,italian_group,X #L італійським#!#! народами, тому бажаний для багатьох статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! не повинен обмежуватися одними лише #TOOLTIP:CULTUREGROUP,german_group,X #L германськими#!#! містами."
  german_and_german_adjacent_free_cities_policy_at: "Тільки держави з #TOOLTIP:CULTUREGROUP,german_group,X #L германською#!#!, #TOOLTIP:CULTUREGROUP,netherlandish_group,X #L нідерландською#!#!, #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарською#!#! та #TOOLTIP:CULTUREGROUP,italian_group,X #L італійською#!#! [Concept('culture_group', 'культурної групи')|e] можуть отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  empire_wide_free_cities_policy: "Статус вільного міста для всіх"
  empire_wide_free_cities_policy_desc: "Статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! більше не залежить від культури чи географії. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] може дарувати його всім, хто попросить."
  empire_wide_free_cities_policy_at: "Будь-яка держава-учасниця може отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  landfriede_law: "Земський мир"
  landfriede_law_desc: "Земський мир — це особливий інститут, який забороняє членам держави [GetUniqueInternationalOrganization('hre').GetName] використовувати військову силу для вирішення конфліктів і наказує переносити суперечки до залів Імперського суду."
  outlaw_internal_warfare_policy: "Заборона міжусобиць"
  outlaw_internal_warfare_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] обмежує самостійність учасників, що входять до неї, та остаточно забороняє міжусобиці в своїх межах."
  landfriede_rank_4_policy: "Вічний Земський мир"
  landfriede_rank_4_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] досягла апогею в застосуванні Земського миру. Усі імперські стани зобов'язані дотримуватися рішень та правил, які приймає [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  landfriede_rank_3_policy: "Зміцнення Земського миру"
  landfriede_rank_3_policy_desc: "Земський мир тепер є впливовим правовим інститутом. [GetUniqueInternationalOrganization('hre').GetName] в особі всіх її станів визнає його авторитет."
  landfriede_rank_2_policy: "Розширення Земського миру"
  landfriede_rank_2_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] наділяє Земський мир додатковим впливом, його визнають усі імперські стани."
  landfriede_policy: "Запровадження Земського миру"
  landfriede_policy_desc: "$landfriede_law_desc$"
  no_landfriede_policy: "Відсутність Земського миру"
  no_landfriede_policy_desc: "Конфлікти вирішуються за допомогою військової сили. [GetUniqueInternationalOrganization('hre').GetName] живе за принципом «кулачного права»."
  landfriede_parliament_issue_rank_2: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 3#! роки."
  landfriede_parliament_issue_rank_3: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 5#! років."
  landfriede_parliament_issue_rank_4: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 10#! років."
  imperial_diet_law: "Рейхстаг"
  imperial_diet_law_desc: "Традиційний звичай #TOOLTIP:PARLIAMENT_TYPE,hre_court_assembly,X #L придворного зібрання#!#! — спадщина далекого минулого, багато його правил і процедур безнадійно застаріли. Настав час перетворити зібрання на повноправний рейхстаг, здатний відстоювати інтереси всіх учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#!."
  no_imperial_diet_policy: "Традиційний парламент"
  no_imperial_diet_policy_desc: "Принципи роботи #TOOLTIP:PARLIAMENT_TYPE,hre_court_assembly,X #L придворного зібрання#!#! ніяк не кодифіковані, цей інститут давно потребує масштабної реформи."
  hre_early_imperial_diet_policy: "$hre_early_imperial_diet$"
  hre_early_imperial_diet_policy_desc: "$hre_early_imperial_diet_desc$"
  hre_bi_camerial_imperial_diet_policy: "$hre_bi_camerial_imperial_diet$"
  hre_bi_camerial_imperial_diet_policy_desc: "$hre_bi_camerial_imperial_diet_desc$"
  hre_tri_camerial_imperial_diet_policy: "$hre_tri_camerial_imperial_diet$"
  hre_tri_camerial_imperial_diet_policy_desc: "$hre_tri_camerial_imperial_diet_desc$"
  perpetual_diet_law: "Постійний рейхстаг"
  perpetual_diet_law_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] щоразу [Select_CString(GetUniqueInternationalOrganization('hre').GetLeader.IsFemale,'змушена','змушений')] об'їжджати Священну Римську Імперію в пошуках відповідного місця для скликання парламенту. Ми можемо покінчити з цими виснажливими поїздками, призначивши одне з міст постійною резиденцією парламенту."
  no_perpetual_diet_policy: "Виїзний парламент"
  no_perpetual_diet_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] їздить з міста в місто, скликаючи імперський парламент за потреби."
  perpetual_diet_policy: "$perpetual_diet_law$"
  perpetual_diet_policy_desc: "$perpetual_diet_law_desc$"
  perpetual_diet: "Тут засідає #Y Постійний рейхстаг#!"
  power_of_the_emperor_law: "Повноваження імператора"
  power_of_the_emperor_law_desc: "Повноваження, якими наділяється [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], — це досить делікатне питання, оскільки інтереси імперських станів і, зокрема, виборців вступають у протиріччя з інтересами, які переслідує [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]. Проте всі визнають, що [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], який не має жодної влади, не зможе захистити імперію від зовнішніх загроз."
  renovatio_policy: "Renovatio Imperii"
  renovatio_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] вирішує покінчити з децентралізацією! Імперія об'єднається в одну державу, яка відтепер визначатиме світову політику!"
  revoke_privilegia_policy: "Скасування привілеїв"
  revoke_privilegia_policy_desc: "Традиційні вольності та привілеї імперських князів скасовуються. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] зосередить усю владу в своїх руках, трансформувавши #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#! в єдину централізовану державу."
  improved_imperial_authority_policy: "Посилення влади імператора"
  improved_imperial_authority_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] суттєво розширює свої повноваження, що дозволяє йому проводити політики через Рейхстаг, в результаті [GetUniqueInternationalOrganization('hre').GetName] має стати сильнішою."
  kaisertum_policy: "Імперія"
  kaisertum_policy_desc: "Влада, якою володіє [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], ідеально збалансована: вона не настільки мала, щоб [GetUniqueInternationalOrganization('hre').GetName] залишилася без захисту та необхідних реформ, і не настільки велика, щоб загрожувати виборцям та імперським станам загалом."
  holy_roman_figurehead_policy: "Номінальний імператор"
  holy_roman_figurehead_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] більше не має жодної влади. [GetUniqueInternationalOrganization('hre').GetName] тепер держава, де всі правила та політики приймаються Рейхстагом та виборцями."
  main_philosophy_law: "Основна філософія"
  main_philosophy_law_desc: "Основна філософська течія та вчення, які формують фундаментальні ідеї релігійного напряму."
  disfavoring_sect_tt: "Якщо ми #Y засуджуємо#! цей напрям:"
  promoting_sect_tt: "Якщо ми #Y підтримуємо#! інший напрям:"
  confucianism_policy: "$SECT_CONFUCIANISM_NAME$"
  confucianism_policy_desc: "$SECT_CONFUCIANISM_NAME$ — це філософія, розроблена на основі вчення Конфуція, або Кун Фу-цзи, що акцентує увагу на соціальній гармонії та доброчесності державних інститутів."
  daoism_policy: "$SECT_DAOISM_NAME$"
  daoism_policy_desc: "$SECT_DAOISM_NAME$ — це філософія, заснована на прагненні жити в гармонії з животворною силою всесвіту «Дао» та що спирається на концепцію «У-вей», або «дія через бездіяльність»."
  vajrayana_law: "Тантричні практики"
  vajrayana_law_desc: "Ваджраяна, також відома як тантричний або езотеричний $buddhist$, — це течія в буддизмі, яка включає безліч тантричних або езотеричних та ритуальних практик, що часто зазнали суттєвого впливу з боку інших релігій, особливо індуїзму."
  vajrayana_policy: "$vajrayana_law$"
  vajrayana_policy_desc: "$vajrayana_law_desc$"
  no_vajrayana_policy: "Немає тантричних практик"
  no_vajrayana_policy_desc: "$no_vajrayana_policy$"
  pure_land_school_policy: "$SECT_PURE_LAND_SCHOOL_NAME$"
  pure_land_school_policy_desc: "$SECT_PURE_LAND_SCHOOL_NAME$ є однією з найпопулярніших шкіл східноазійського буддизму, в основі якої лежить ідея переродження в Чистій землі Сукхаваті. Найвідомішою Чистою землею при цьому вважається Чиста земля Будди Амітабхи, а найважливішими вченнями цієї школи — #italic Три сутри Чистої землі#!. Головна форма релігійної практики — пам'ятання Будди за допомогою повторення мантри з його ім'ям."
  tiantai_policy: "Школа лотоса"
  tiantai_policy_desc: "$tiantai_policy$, названа так через особливе значення #italic Сутри лотоса#!, являє собою одну з найраніших буддистських шкіл, що виникли в Китаї. Її доктрина #italic Єдиного шляху#! сприяє всебічному розумінню всіх буддійських вчень."
  dharma_school_policy: "$SECT_DHARMA_SCHOOL_NAME$"
  dharma_school_policy_desc: "$SECT_DHARMA_SCHOOL_NAME$, іменована #italic Вейши#! або #italic Фасян#! в Китаї та #italic Хоссо#! в Японії, з'явилася в Індії та справила значний вплив на Махаяну, хоча пізніше на зміну їй прийшли молодші школи. Основна увага в ній приділяється питанню ідеалізму та ідеї про те, що реальність — лише плід свідомості. Крім того, школа широко практикує йогу та медитацію."
  flower_garland_school_policy: "$SECT_FLOWER_GARLAND_SCHOOL_NAME$"
  flower_garland_school_policy_desc: "Що запозичила свою назву від #italic Сутри квіткової гірлянди#! $SECT_FLOWER_GARLAND_SCHOOL_NAME$, що іменується #italic Хуаянь#! в Китаї, #italic Кеґон#! в Японії та #italic Хваом#! в Кореї, вважається однією з основних буддійських традицій, що отримали розвиток у Китаї. У ній особлива увага приділяється взаємопроникненню всього сущого, причому всі речі існують лише як частина спільної реальності, взаємопов'язані та присутні одна в одній."
  meditation_school_policy: "$SECT_MEDITATION_SCHOOL_NAME$"
  meditation_school_policy_desc: "Традиційно вважається, що $SECT_MEDITATION_SCHOOL_NAME$ була заснована Бодхідхармою та здобула популярність під назвою #italic Чань#! в Китаї, #italic Дзен#! в Японії, #italic Сон#! в Кореї і, нарешті, #italic Тхієн#! у В'єтнамі. Медитація практикується в буддизмі повсюдно, але в цій школі акцент робиться на її застосуванні як способу досягнення просвітлення — зазвичай у сидячому положенні, а також під час фізичної активності, наприклад під час занять бойовими мистецтвами."
  mantra_school_policy: "$SECT_MANTRA_SCHOOL_NAME$"
  mantra_school_policy_desc: "$SECT_MANTRA_SCHOOL_NAME$ відома як #italic Чженьян#! в Китаї та #italic Шінґон#! в Японії. У ній особлива увага приділяється езотеричним практикам Ваджраяни, особливо так званим «трьом таємницям»: мудрі, мантрі та мандалі. Її практики мали величезний вплив на розвиток цілої низки інших шкіл буддизму."
  shugendo_policy: "$SECT_SHUGENDO_NAME$"
  shugendo_policy_desc: "Виникнувши як поєднання різнорідних буддійських положень і практик, синтоїзму та оммьодо, $SECT_SHUGENDO_NAME$ прагне до здобуття надприродних здібностей за допомогою віровчительних тренувань у горах. Основна увага в вченні приділяється відвідуванню гір та поклонінню їм у поєднанні з різноманітними езотеричними практиками та ритуалами."
  azhaliism_policy: "$SECT_AZHALIISM_NAME$"
  azhaliism_policy_desc: "Після своєї появи в Юньнані тантричні практики буддизму змішалися з традиціями китайського, тибетського та бірманського походження, породивши щось абсолютно нове. $SECT_AZHALIISM_NAME$ по суті сформувався у вигляді досить місцевої традиції, схожої, але водночас відмінної від інших сусідніх великих шкіл."
  musok_policy: "$SECT_MUSOK_NAME$"
  musok_policy_desc: "Вірування корейського шаманізму, відомого також під назвою «$SECT_MUSOK_NAME$», ґрунтуються на поклонінні божествам та духам предків і існували в Кореї ще до появи буддизму. Однак ці вірування, практики та ритуали досі продовжують залишатися важливою частиною культури місцевого населення."
  mulasarvastivada_policy: "$SECT_MULASARVASTIVADA_NAME$"
  mulasarvastivada_policy_desc: "Одна з перших буддійських шкіл в Індії, $SECT_MULASARVASTIVADA_NAME$, майже зникла з догматів більшості буддійських течій, зберігшись лише у вченнях, які проповідує $tibetan_buddhism$, а також у регіоні $indonesia_region$. Першою там з'явилася Хінаяна, а $SECT_MULASARVASTIVADA_NAME$ та тантричні практики здобули популярність за часів Шривіджайського царства."
  mahavihara_policy: "$SECT_MAHAVIHARA_NAME$"
  mahavihara_policy_desc: "Школа $theravada$ виникла на острові $sailan_area$ після появи буддизму. Завдяки їй острів перетворився на центр релігійної думки, а буддизм отримав розвиток та поширення в сусідніх областях, особливо з часу початку занепаду буддизму в материковій Індії."
  burmese_buddhism_policy: "$SECT_BURMESE_BUDDHISM_NAME$"
  burmese_buddhism_policy_desc: "Незважаючи на те, що буддійська течія $mahavihara_policy$ з острова $sailan_area$ мала суттєвий вплив на Бірму, найбільшого поширення на її території набули інші форми буддизму — $mahayana$ та $theravada$, при цьому там зберігалися індуїзм та деякі пережитки добуддійських вірувань. Все це змішалося, породивши особливий вид Тхеравади, дуже схожий з тим, що практикується на острові $sailan_area$, але з численними вкрапленнями з Махаяни та інших езотеричних традицій."
  lankavong_policy: "$SECT_LANKAVONG_NAME$"
  lankavong_policy_desc: "Століттями на тайських землях поширювалися різні форми буддизму: від Махаяни, що виникла під впливом китайських шкіл, до інших ранніх буддійських традицій родом з Індії. Зрештою панівним стало вчення $theravada$, що прийшло з острова $sailan_area$, однак вплив більш ранніх традицій і навіть народних тайських вірувань досі зберігається."
  khmer_buddhism_policy: "$SECT_KHMER_BUDDHISM_NAME$"
  khmer_buddhism_policy_desc: "Першою формою буддизму, що з'явилася на кхмерських землях, була $mahayana$ з суттєвими вкрапленнями тантричних вчень. Вона замінила індуїстські вірування, що існували там раніше. З часом $theravada$ змінила Махаяну та викликала суттєвий зсув у бік чернечого життя."
  sect_school_law: "Школа напрямку"
  sect_school_law_desc: "Конкретна школа цього напрямку, чиє вчення може дещо відрізнятися від основного."
  jodou_shinshuu_policy: "$SECT_JOUDO_SHINSHUU$"
  jodou_shinshuu_policy_desc: "$SECT_PURE_LAND_SCHOOL_NAME$ була заснована Сінраном — ченцем, який спочатку був прихильником вчення $SECT_TENDAI_NAME$. З часом він у ньому розчарувався і почав досліджувати практики школи Чистої землі, а потім створив на їхній основі власну релігійну течію. Один з основних її ритуалів — це повторення формули #italic нембуцу#!, яка звучить як #italic «Наму Аміда Буцу»#!. Цей вислів символізує подяку Будді Амітабсі."
  nichiren_policy: "$SECT_NICHIREN_NAME$"
  nichiren_policy_desc: "Ця школа, заснована буддійським ченцем Нітіреном, запозичила більшу частину своєї доктрини з #italic Сутри лотоса#!, проте виступає проти будь-яких відхилень від вчення, езотеричних практик і ритуалів. У її догматах стверджується, що основний шлях до просвітлення — це вчинки людини та їх наслідки, а не лише медитація."
  nyigma_policy: "$SECT_NYIGMA_NAME$"
  nyigma_policy_desc: "Найстаріша школа тибетського буддизму має найунікальніші вчення серед усіх буддійських течій. Беручи до уваги, що #italic Дзогчен#!, або «Велике вдосконалення», вважається найпрямішим шляхом до просвітлення, Ньїнґма ставить його вище вчень, які відстоюють інші школи. Вона також піддається критиці з боку інших шкіл за відсутність зв'язку з пізнішими індійськими тантричними практиками, оскільки її тексти належать до періоду першого приходу буддизму в Тибеті."
  kadam_policy: "$SECT_KADAM_NAME$"
  kadam_policy_desc: "Приділяючи особливу увагу співчуттю, навчанню та дисципліні, школа Кадам прагне розробити всеосяжний і послідовний спосіб досягнення просвітлення в рамках махаянського буддизму. Вона також ставить своєю метою залучення мирян до повсякденного буддійського життя, при цьому усвідомлюючи, що тантричні практики слід залишити для більш досвідчених посвячених."
  kagyu_policy: "$SECT_KAGYU_NAME$"
  kagyu_policy_desc: "$SECT_KAGYU_NAME$ ставить у центр уваги Махамудру, або «Велику печатку», що символізує здобуття знання або усвідомлення внутрішньої порожнечі реальності. Попри те, що школа сама по собі розпалася на кілька підшкіл, кожна з яких має певні розбіжності в тлумаченнях і практиках, усі вони визнають Махамудру."
  sakya_policy: "$SECT_SAKYA_NAME$"
  sakya_policy_desc: "З'явившись в однойменному монастирі Сак'я, ця віддає перевагу системі медитації ламдре, суть якої полягає в тому, що як шлях, так і його результат взаємно укладені один в одному. Ці вказівки до практики містяться в Хеваджра-тантрі та пояснювальних тантрах школи."
  jonang_policy: "$SECT_JONANG_NAME$"
  jonang_policy_desc: "Основною практикою школи Джонанг є Калачакра-тантра, а сама школа вважається захисницею філософського вчення Жентонг. Згідно з її вченням, фізична реальність «вільна» або ж «порожня» від притаманного їй власного існування, тоді як абсолютна реальність, або Будда-природа, «вільна» або ж «порожня» від усього, крім себе самої. Будда-природа наповнена власними незліченними пробудженими якостями."
  hun_frontier_fortresses: "Прикордонні фортеці"
  hun_frontier_fortresses_desc: "Наші володіння давно оточені безліччю агресивних сусідів. Для захисту свого народу ми повинні вкладати кошти в будівництво, утримання та облаштування прикордонних фортець."
  vegvar_system: "Лінія Вегвар"
  vegvar_system_desc: "Корона регулярно виплачує додаткові кошти на утримання мережі потужних укріплень по всьому королівству."
  not_maintained: "Застарілі фортеці"
  not_maintained_desc: "Наразі великі фортеці перебувають у жалюгідному стані, оскільки угорська корона не може зібрати з угорських станів достатньо коштів на їх ремонт."
  enclosure_movement: "Обгороджування"
  enclosure_movement_desc: "Обгороджування являє собою процедуру обнесення общинних земель стінами або огорожею та їх перетворення на приватні володіння."
  enclosure_allowed: "Дозвіл обгороджування"
  enclosure_allowed_desc: "Даючи свою згоду на обгороджування, ми дозволяємо вилучити землі, що належали місцевому населенню, та передати їх окремій людині або людям у одноосібне користування."
  enclosure_disallowed: "Заборона обгороджування"
  enclosure_disallowed_desc: "Общинні землі отримують захист від обгороджування та не можуть бути передані в приватну власність."
  enclosure_act: "Закон про обгороджування"
  enclosure_act_desc: "Общинні землі підлягають подальшому обгороджуванню або передачі у приватну власність для сприяння розвитку товарного сільського господарства та промисловості."
  fra_taille: "Талья"
  fra_taille_desc: "Талья — це податок, що стягується з кожного господарства залежно від кількості належної йому землі, за винятком духовенства та аристократії."
  permanent_tax: "Постійний податок"
  permanent_tax_desc: "Можна встановити талью як основний податок, що дозволить ще більше збільшити державні доходи."
  exceptional_only: "Надзвичайний податок"
  exceptional_only_desc: "Можна встановити талью як надзвичайний податок, який може стягуватися лише у важкі часи."
  fra_5_percent_tax: "П'ятивідсотковий податок Машо"
  fra_5_percent_tax_desc: "Генеральний контролер фінансів Франції запропонував новий податок у розмірі однієї двадцятої частини річного доходу."
  five_percent_tax: "Для всіх станів"
  five_percent_tax_desc: "П'ятивідсотковий податок стягується з усіх підданих, незважаючи на їхнє становище."
  no_five_percent_tax: "Лише для селян"
  no_five_percent_tax_desc: "Лише [ShowEstateTypeName('peasants_estate')|l] зобов'язані сплачувати п'ятивідсотковий податок."
  eng_taxation_law: "Оподаткування"
  eng_taxation_law_desc: "Стабільні доходи — це запорука ефективності уряду. Створивши законодавчу базу, ми зможемо регулювати збір податків з людей та організацій."
  income_tax: "Прибутковий податок"
  income_tax_desc: "Податок стягується безпосередньо з [Concept('pops','груп населення')|e], при цьому застосовується прогресивна шкала ставок, згідно з якою [Concept('estates','стани')|e] сплачують податки в розмірі, що залежить від отриманого доходу."
  trade_tax: "Торгові податки"
  trade_tax_desc: "Основна частина податкових надходжень припадає на митні збори та акцизи, які сплачують міщани."
  traditional_tax: "Традиційне оподаткування"
  traditional_tax_desc: "Податки стягуються з [Concept('estates','станів')|e], а привілеї визначають їхню величину. Усе як зазвичай."
  factory_working_conditions_law: "Умови праці на фабриках"
  factory_working_conditions_law_desc: "Зростання кількості фабрик підвищує виробничі потужності та прискорює поточний процес індустріалізації економіки. Центральне місце в цих перетвореннях посідають працівники фабрик, яких часто нещадно експлуатують, якщо їхні права не регулюються належним чином."
  decent_conditions: "Гідні умови"
  decent_conditions_desc: "У країні діє 12-годинний робочий день та проводяться регулярні інспекції фабрик."
  fair_conditions: "Справедливі умови"
  fair_conditions_desc: "Окрім регламентованого графіка та інспекцій фабрик, неповнолітнім учням надається додатковий захист у вигляді обмеження тривалості робочого дня та можливості здобути освіту."
  unregulated_conditions: "Нерегламентовані умови"
  unregulated_conditions_desc: "Власники фабрик вільні розпоряджатися справами на свій розсуд. Нещасні випадки трапляються регулярно, працівники нещадно експлуатуються і часто гинуть на виробництві."
  trade_unions_law: "Профспілки"
  trade_unions_law_desc: "На ранніх етапах індустріалізації профспілки відіграють вирішальну роль у захисті трудових прав та визначенні умов праці. Вони ведуть переговори з роботодавцями про укладення колективних договорів, домагаючись підвищення заробітної плати, скорочення робочого дня та створення безпечних умов роботи."
  trade_unions_allowed: "Дозвіл профспілок"
  trade_unions_allowed_desc: "Працівники можуть брати участь у переговорах про укладення колективних договорів, а також організовувати страйки та акції протесту, щоб призупинити виробництво та змусити роботодавців виконати вимоги."
  trade_unions_prohibited: "Заборона профспілок"
  trade_unions_prohibited_desc: "Працівникам не дозволяється об'єднуватися або вживати будь-яких колективних дій. Страйки заборонені законом."
  guilds_of_florence: "Панування флорентійських цехів"
  guilds_of_florence_desc: "Купецькі гільдії або цехи — впливові комерційні інститути, що визначають соціально-історичну обстановку у Флоренції. Вони є важливим фактором нашого процвітання та достатку. Усі вони важливі, проте деякі з них безсумнівно можуть здобути більше влади та впливу, ніж інші."
  consiglio_maggiore: "Велика рада"
  consiglio_maggiore_desc: "Велика рада, що складається з аристократів та представників інших станів, у тому числі купців, ремісників та банкірів, відповідає за олігархічний апарат нашої республіки."
  arti_minori: "Молодші цехи"
  arti_minori_desc: "Молодші цехи — це дрібні торговельні об'єднання, що представляють ремесла та професії меншого масштабу та значення. Ці цехи займаються, наприклад, шевською, кравецькою або палітурною справою і представляють те купецтво, яке вийшло з простого народу."
  arti_mediane: "Середні цехи"
  arti_mediane_desc: "Середні цехи займають проміжне положення між молодшими та старшими. Вони представляють ремесла та професії невеликого масштабу та впливу, виступаючи як сполучна ланка між менш значущими вузькоспеціалізованими ремеслами та головними галузями."
  arti_maggiori: "Старші цехи"
  arti_maggiori_desc: "Терміном «Старші цехи» позначаються найбільш великі та впливові купецькі гільдії. Вони представляють великі галузі та ремесла, що мають значну економічну та політичну вагу, такі як текстильна промисловість, банківська та фінансова справа."
  ordinances_of_justice: "Установлення справедливості"
  ordinances_of_justice_desc: "Це сукупність правових норм, що обмежують владу впливових дворян, які не узгоджують свої дії з порядком денним центральних органів управління. Ці зводи законів були розроблені з метою обмеження могутності дворянства."
  por_estudo_geral_law: "Дім загального навчання"
  por_estudo_geral_law_desc: "У 1290 році був заснований [ShowModifier('por_estudo_geral')|l] — національний [ShowBuildingTypeName('university')|l], де жителі нашої скромної держави можуть отримати гідну освіту. При цьому особливо важливе його близьке розташування до столиці."
  por_estudo_in_coimbra: "$por_estudo_geral_law$ у #TOOLTIP:LOCATION,coimbra_tt,X #L Коїмбрі#!#!"
  por_estudo_in_coimbra_desc: "Побудувавши національний [ShowBuildingTypeName('university')|l] у #TOOLTIP:LOCATION,coimbra_tt,X #L Коїмбрі#!#!, ми забезпечимо собі незалежність та переконаємо стани у своїх благих намірах."
  por_estudo_in_lisbon: "$por_estudo_geral_law$ у Лісабоні"
  por_estudo_in_lisbon_desc: "Будівництво будинку загального навчання в зоні впливу двору не тільки посприяє централізації влади, а й дозволяє контролювати діяльність #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!."
  teu_amber_monopoly_law: "Монополія на бурштин"
  teu_amber_monopoly_law_desc: "[ShowGoodsName('amber')] — один із найцінніших ресурсів нашої держави. Торгівля бурштином має величезне значення для країни та повинна ретельно регулюватися."
  state_controlled_amber_gathering: "Держава контролює видобуток"
  state_controlled_amber_gathering_desc: "Держава зберігає за собою виключне право розпоряджатися запасами #TOOLTIP:GOODS,amber,X бурштину#!. Експорт цього цінного товару повністю контролюється урядом, що сприяє зміцненню влади правлячого класу."
  burghers_controlled_amber_gathering: "Бурштин належить купцям"
  burghers_controlled_amber_gathering_desc: "Нехай контроль над #TOOLTIP:GOODS,amber,X бурштином#! буде в руках тих, хто ним торгує. Втручання держави лише заважає комерції, а без зайвих посередників торгівля піде в ріст."
  peasant_controlled_amber_gathering: "Видобутком займаються селяни"
  peasant_controlled_amber_gathering_desc: "[ShowGoodsName('amber')] повинен належати тим, хто його видобуває. Контролем над його видобутком займатимуться [ShowEstateTypeName('peasants_estate')|l]."
  jap_sakoku_law: "Взаємодія із заморськими країнами"
  jap_sakoku_law_desc: "$japan_region$ завжди мала перевагу, оскільки була відокремлена морем від інших країн. Це дозволяє офіційно ізолювати нашу державу від зовнішнього світу."
  sakoku_enabled: "Сакоку"
  sakoku_enabled_desc: "Позбувшись зовнішнього впливу, наша країна неодмінно підвищить продуктивність та забезпечить собі економічне зростання."
  sakoku_disabled: "Відкриття країни для світу"
  sakoku_disabled_desc: "Завдяки тому, що держава відкрита для світу, до неї вільно проникає не тільки торгівля, а й різноманітні ідеї."
  jap_buke_shohatto: "Буке сьохатто"
  jap_buke_shohatto_desc: "Цей збірник основоположних законів, що дають загальні рекомендації щодо належної поведінки, покликаний мотивувати самураїв до самовдосконалення."
  jap_buke_shohatto_enforced: "Суворе дотримання «Буке сьохатто»"
  jap_buke_shohatto_enforced_desc: "У наших самураїв є чітка модель поведінки, якої вони повинні дотримуватися заради самовдосконалення."
  jap_buke_shohatto_guidelines: "Настанови «Буке сьохатто»"
  jap_buke_shohatto_guidelines_desc: "«Буке сьохатто» є радше загальними рекомендаціями, ніж суворими правилами. Це не більше ніж ідеал, до якого за можливості слід прагнути."
  clan_residence: "Обитель клану"
  clan_residence_desc: "Необхідно ухвалити чіткі закони, що визначають місця проживання голів різних кланів, щоб забезпечити політичну рівновагу в країні."
  appointed_posts_policy: "Призначення"
  appointed_posts_policy_desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] призначає очільників різних кланів на певні посади в обмін на відданість. Цей підхід забезпечує гнучкість в управлінні країною."
  enable_grant_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('grant_shugo_office')]»"
  enable_revoke_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('revoke_shugo_office')]»"
  enable_claim_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('claim_shugo_office')]»"
  established_domains_policy: "Визнані володіння"
  established_domains_policy_desc: "Клани мають свої власні спадкові володіння. Це полегшить роботу бюрократії #TOOLTIP:INTERNATIONAL_ORGANIZATION,japanese_shogunate_tt,X #L сьоґунату#!#! та дозволить зосередитися на важливіших завданнях. Однак таке становище також призведе до посилення кланів."
  sankin_kotai_policy: "Санкін котай"
  sankin_kotai_policy_desc: "Санкін котай — це система, згідно з якою васали #TOOLTIP:INTERNATIONAL_ORGANIZATION,japanese_shogunate_tt,X #L сьоґуна#!#! поперемінно живуть то в столиці, то у своїх землях. Під час перебування в столиці вони, природно, повинні демонструвати своє багатство, і ці витрати заважають їм лиходіяти проти сюзерена."
  nav_adaptability: "Наваррська пристосовність"
  nav_adaptability_desc: "Наша країна затиснута між великими державами і була змушена пристосуватися або загинути. Попри невеликі розміри, наше королівство змогло вижити завдяки продуманим союзам і стрімким військовим діям. Ця здатність співвідносити свої дії зі своїми потребами і є тією перевагою, яку ми зобов'язані зберегти."
  belligerent_stance: "Войовнича позиція"
  belligerent_stance_desc: "Лише агресивна позиція забезпечить нашу безпеку. Ми всіма наявними в нас засобами даватимемо зрозуміти, що будь-хто, хто нападе на нас, заплатить високу ціну."
  conciliatory_stance: "Примирлива позиція"
  conciliatory_stance_desc: "Час бійок має канути в минуле і поступитися місцем дипломатії, зрештою, «на мед спіймаєш більше мух, ніж на оцет»."
  defensive_stance: "Оборонна позиція"
  defensive_stance_desc: "Наш край суворий, як і наш народ. Нехай приходять і окроплять нашу землю своєю кров'ю, майбутні врожаї будуть тільки ряснішими."
  offensive_stance: "Наступальна позиція"
  offensive_stance_desc: "Ми нікого не боїмося, адже, як свідчить старе прислів'я, «найкращий захист — це напад». Ми нападемо першими і будемо смертоноснішими за тих, хто загрожує нашому існуванню."
  maiestas_carolina: "Кодекс Maiestas Carolina"
  maiestas_carolina_desc: "Цей звід правил і положень був складений у зв'язку з тим, що представники вищого стану володіли величезною владою, яку планувалося суттєво обмежити. Кодекс передбачає передачу дворянської власності державі за певних обставин, а також обмеження найширших повноважень, якими були наділені дворяни на всій території королівства."
  order_of_chivalry_law: "Лицарський орден"
  order_of_chivalry_law_desc: "Цей закон сягає корінням у поєднання релігійних і придворних традицій та втілює спадщину лицарів, які присвятили себе дотриманню #L #L [ShowReligionGroupAdjective('christian')|l]#!их#! ідеалів і благодійності. Засновані спочатку для захисту паломників, що прямують до Святої землі, та дотримання обітниць безкорисливості, послуху й безшлюбності, ці ордени з часом трансформувалися в символ престижу та спосіб віддати шану видатним персонам."
  has_not_assumed_chivalric_order_in_last_25_years_tt: "За останні #Y 25 років#! ми не засновували жодного #Y $order_of_chivalry_law$#!."
  order_of_saint_george_policy: "Орден Святого Георгія"
  order_of_saint_george_policy_desc: "Орден Святого Георгія був заснований у 1326 році королем Угорщини Карлом I Робертом і первісно називався «Братство лицарів Святого Георгія». Цей державний принцип втілює прихильність ідеалам лицарства та честі, пропагуючи ці цінності за допомогою лицарських турнірів і фестивалів."
  order_of_the_ermine_policy: "Орден Горностая"
  order_of_the_ermine_policy_desc: "Орден Горностая черпає натхнення в Ордені Підв'язки, який раніше був заснований в Англії. Символом горностая, що уособлює бездоганну особисту честь, орден нагороджує чоловіків і жінок, незалежно від їхнього соціального статусу, за виняткові заслуги перед герцогством Бретань."
  order_of_the_dragon_policy: "Орден Дракона"
  order_of_the_dragon_policy_desc: "Орден Дракона, або #italic «Товариство Дракона»#!, покликаний захищати угорську монархію, католицьку церкву та християнство загалом від Османської імперії, єретиків і язичників. Створений за образом Ордену Святого Георгія та під впливом духу епохи хрестових походів, він об'єднує дворян і монархію під символами уробороса та червоного хреста, забезпечуючи колективний захист від зовнішніх і внутрішніх загроз і пропонуючи дворянам королівський захист і почесті в обмін на їхню вірність."
  order_of_the_band_policy: "Орден Пов'язки"
  order_of_the_band_policy_desc: "Орден Пов'язки складається з найкращих лицарів, які присягають на вірність і послух королю Кастилії. Його члени зобов'язані мати суворі та бездоганні манери при дворі, брати участь у поєдинках, надавати підтримку іншим і, перш за все, бути відданими своєму правителю."
  order_of_the_swan_policy: "Орден Лебедя"
  order_of_the_swan_policy_desc: "Орден Лебедя присвячений зміцненню правовірності та поширенню культу Діви Марії. Серед затятих прихильників ордену багато принців правлячої династії, а також чимало дворян."
  order_of_the_black_eagle_policy: "Орден Чорного орла"
  order_of_the_black_eagle_policy_desc: "Світський орден Чорного орла — це радше військова організація, ніж духовна. Серед учасників ордену є члени королівської родини, іноземні монарші особи, а також багато видатних генералів, відзначених за свої заслуги."
  order_of_the_white_eagle_policy: "Орден Білого орла"
  order_of_the_white_eagle_policy_desc: "Військовий $order_of_the_white_eagle_policy$ вручається найвідданішим прихильникам держави та нашим найвидатнішим громадянам за їхню службу вітчизні. Крім того, ним удостоюють високопоставлених гостей, які вшанували нас своєю присутністю."
  six_ministries_overseer_law: "Нагляд за шістьма міністерствами"
  six_ministries_overseer_law_desc: "Роботу #TOOLTIP:LAW,six_ministries,X #L шести міністерств#!#! повинен контролювати окремий орган влади, а можливо, і сам монарх."
  chi_grand_chancellorship: "Верховна канцелярія"
  chi_grand_chancellorship_desc: "Шість міністрів підпорядковуються канцелярії, куди входять старший (лівий) і молодший (правий) канцлери, причому в руках першого з них зосереджено більше міністерських повноважень."
  chi_grand_secretariat: "Верховний секретаріат"
  chi_grand_secretariat_desc: "Шість міністерств повинні будуть передати всі свої документи до верховного секретаріату, який проведе перевірку та підготує їх для подальшої передачі монарху."
  chi_direct_report: "Пряме підпорядкування"
  chi_direct_report_desc: "Монарх отримує відомості про роботу шести міністерств з перших вуст, що зміцнює його авторитет, але може негативно позначитися на ефективності правління."
  ashta_pradhan_council_law: "Ашта Прадхан"
  ashta_pradhan_council_law_desc: "$mhr_ashta_pradhan_desc$"
  apc_peshwa_focus_policy: "Пешва"
  apc_peshwa_focus_policy_desc: "Пешва — це перший міністр, відповідальний за загальне управління державою.\nРада, або Ашта Прадхам, надасть пешві більше повноважень, збільшивши тим самим його вплив у державі."
  apc_mazumdar_focus_policy: "Мазумдар"
  apc_mazumdar_focus_policy_desc: "Мазумдар — це міністр фінансів, відповідальний за фінансові справи держави.\nРада, або Ашта Прадхам, надасть мазумдару більше повноважень, збільшивши тим самим його вплив у державі."
  apc_sacheev_focus_policy: "Сачив"
  apc_sacheev_focus_policy_desc: "Сачив — це секретар, відповідальний за підготовку королівських указів та інших політик держави.\nРада, або Ашта Прадхам, надасть сачиву більше повноважень, збільшивши тим самим його вплив у державі."
  apc_waqia_navis_focus_policy: "Вакія-навіс"
  apc_waqia_navis_focus_policy_desc: "Вакія-навіс — це міністр внутрішніх справ, відповідальний за розвідку та шпигунство.\nРада, або Ашта Прадхам, надасть вакія-навісу більше повноважень, збільшивши тим самим його вплив у державі."
  apc_senapati_focus_policy: "Сенапаті"
  apc_senapati_focus_policy_desc: "Сенапаті — це головнокомандувач, відповідальний за збройні сили та оборону держави.\nРада, або Ашта Прадхам, надасть сенапаті більше повноважень, збільшивши тим самим його вплив у державі."
  apc_dabir_focus_policy: "Дабір"
  apc_dabir_focus_policy_desc: "Дабір — це міністр закордонних справ, відповідальний за дипломатію держави.\nРада, або Ашта Прадхам, надасть дабіру більше повноважень, збільшивши тим самим його вплив у державі."
  apc_nyayadhish_focus_policy: "Ньядхіш"
  apc_nyayadhish_focus_policy_desc: "Ньядхіш — це головний суддя, відповідальний за розгляд цивільних та кримінальних справ.\nРада, або Ашта Прадхам, надасть ньядхішу більше повноважень, збільшивши тим самим його вплив у державі."
  apc_panditrao_focus_policy: "Пандітрао"
  apc_panditrao_focus_policy_desc: "Пандітрао — це верховний жрець, відповідальний за релігійні питання.\nРада, або Ашта Прадхам, надасть пандітрао більше повноважень, збільшивши тим самим його вплив у державі."
  civil_registration: "Облік населення"
  civil_registration_desc: "Це система, створена для обліку всіх підданих у межах нашої держави з метою підвищення їхнього рівня життя."
  delegated_civil_registration_policy: "Делегований $civil_registration$"
  delegated_civil_registration_policy_desc: "Ми дозволимо губернаторам провінцій контролювати процес реєстрації у своїх провінціях. Це може знизити ефективність процесу, але натомість губернатори не вважатимуть, що їхню владу зменшують."
  centralized_civil_registration_policy: "Централізований $civil_registration$"
  centralized_civil_registration_policy_desc: "Ми зосередимо реєстрацію населення в руках центральної влади, щоб підвищити її ефективність. Губернатори на місцях не схвалять втручання в їхню діяльність."
  tax_base_system: "Базова система оподаткування"
  tax_base_system_desc: "Оподаткування — основа економіки будь-якої країни. Заснувавши робочу систему стягнення податків у всьому #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній Державі#!#!, ми зможемо ефективніше використовувати весь потенціал її багатств."
  rice_based_tax: "Рисовий податок"
  rice_based_tax_desc: "[ShowGoodsName('rice')] — традиційний засіб розрахунків та стягнення податків уже кілька століть. Він і далі слугуватиме основою нашої податкової системи."
  single_whip_policy: "Політика одного батога"
  single_whip_policy_desc: "$single_whip_policy$ допоможе нам використовувати [ShowGoodsName('silver')] як основу для стягнення податків, зафіксувавши всі зобов'язання населення перед центральним урядом у вигляді виплат сріблом."
  provincial_governorship: "Провінційне губернаторство"
  provincial_governorship_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединна Держава#!#! обширна і велика, як жодна інша держава у світі. Щоб керувати такою величезною територією, потрібна відповідна система."
  curtailed_governors_policy: "Обмеження губернаторів"
  curtailed_governors_policy_desc: "Губернатори провінцій здебільшого лише поширюють хабарництво та лінь. Ми повинні тримати їх на короткому повідку, щоб влада центрального уряду не зменшувалася в далеких провінціях ні на краплю."
  established_provincial_governors: "Стабільність губернаторських посад"
  established_provincial_governors_desc: "Посада губернатора провінції вельми престижна, конкуренція за неї велика. Призначаючи губернаторів на чітко визначені території з чітко заданими обов'язками, ми забезпечимо безперебійний хід механізму управління."
  zongdu_policy: "Цзунду"
  zongdu_policy_desc: "Простори #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединної Держави#!#! занадто великі, щоб ними могли керувати прості губернатори. Ми створимо посаду намісника, або цзунду, який відповідає за декілька провінцій. Таким чином місцевим чиновникам не доведеться звертатися до столиці через дрібниці, а [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle|l] зможе зосередитися на більш важливих справах."
  zongdu_policy_scaling: "Обсяг #TOOLTIP:GOODS,silver,X #L срібла#!#!, видобутого в [Concept('country','державі')|e]"
  introduce_gaituguiliu_policy: "Гайтугуйлю"
  introduce_gaituguiliu_policy_desc: "Вожді племен у віддалених префектурах, також відомі під назвою «[ShowSubjectTypeName('tusi')]», є спадковими правителями місцевих етнічних меншин. Часом вони можуть бути корисні завдяки своїм зв'язкам з місцевими жителями, але в довгостроковій перспективі часто становлять загрозу для регіональної стабільності. Якщо поступово замінювати їх звичайними чиновниками, призначуваними центральним урядом, підтримувати спокій у регіонах стане простіше."
  unlock_gaituguiliu_tt: "Відкриває [Concept('cabinet_action','дію ради')|e] «[ShowCabinetActionName('gaituguiliu_policy')]» для лідера #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Срединної держави#!#!"
  lifan_yuan_policy: "Ліфаньюань"
  lifan_yuan_policy_desc: "Одного міністерства церемоній більше недостатньо для ефективного управління численними підданими та ленниками з віддалених регіонів у межах імперського кордону та поза ними. Ми створимо відомство, яке займатиметься лише ними."
  cefeng_tizhi: "Цэфэн Тичжи"
  cefeng_tizhi_desc: "Система данників із самого початку була невід'ємною частиною #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Срединної держави#!#!, адже всі навколишні народи визнають владу, якою володіє [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle]"
  free_cefeng_tizhi_policy: "Вільний $cefeng_tizhi$"
  free_cefeng_tizhi_policy_desc: "Держави самі природним чином визнаватимуть владу, яку уособлює собою [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle], і падатимуть ниць перед Троном Дракона, приносячи йому данину без будь-яких спеціальних указів щодо цього."
  codified_cefeng_tizhi_policy: "Кодифікований $cefeng_tizhi$"
  codified_cefeng_tizhi_policy_desc: "Затверджена ієрархічна система данників — найвигідніший варіант для влади, яку уособлює [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle], адже в ній ті країни, що приносять Трону Дракона найбільше користі, повинні бути належним чином винагороджені."
  keju_examination: "Іспити Кецзюй"
  keju_examination_desc: "Імператорський іспит — система відбору найкращих і найосвіченіших людей для служби на чиновницьких посадах в уряді. Завдяки йому біля важелів адміністративної машини стануть перші уми держави, і машина ця працюватиме без перебоїв."
  new_keju_formats_policy: "Нові формати Кецзюя"
  new_keju_formats_policy_desc: "Метою цієї реформи є вдосконалення процесу відбору кандидатів та потенційних чиновників під час імперських іспитів. Запровадження нових форматів випробувань та підвищення стандартів, безумовно, піде на користь нашій системі державного управління."
  new_keju_formats_policy.tt: "Відтепер дія «[ShowGenericActionName('conduct_keju_examination')]» відбиратиме найкращих кандидатів"
  focus_on_classics: "Увага до класики"
  focus_on_classics_desc: "Протягом століть Кецзюй спирався на класичні тексти #TOOLTIP:POLICY,confucianism_policy,X #L конфуціанства#!#! та #TOOLTIP:POLICY,daoism_policy,X #L даосизму#!#!. Від подібних усталених традицій непросто відмовитися."
  direct_appointment: "Пряме призначення"
  direct_appointment_desc: "Освіченість не обов'язково рівносильна придатності до виконання обов'язків в уряді. Куди ефективніше буде безпосередньо призначати людей, рекомендованих для виконання завдання."
  direct_appointment.tt: "Відключає [Concept('action','дію')|e] «[ShowGenericActionName('conduct_keju_examination')]»"
  military_examination: "Введення іспиту з бойової підготовки"
  military_examination_desc: "Імперські іспити повинні включати не тільки перевірку навичок державного управління, а й стрільби з лука та верхової їзди."
  outwards_view: "Погляд назовні"
  outwards_view_desc: "З самого свого виникнення #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединна держава#!#! розширювала свій вплив на навколишні землі, але з урахуванням загроз на кордоні не варто пускати до своїх земель усіх підряд."
  allow_trade: "Дозвіл на торгівлю"
  allow_trade_desc: "Невипадково Шовковий шлях був джерелом багатств для #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединної держави#!#!, адже саме торгівля та контакти з іноземцями сприяють процвітанню держави."
  haijin_policy: "Хайцзінь"
  haijin_policy_desc: "Моря та океани борознить безліч небезпечних людей: пірати, контрабандисти та навіть узурпатори. Але водночас морська торгівля приносить багатства та відкриття. Якщо ми хочемо залучити багатих купців та нові технології до нашої великої держави, нам слід встановити заборону морської торгівлі."
  tianxia: "Тянься"
  tianxia_desc: "Ідеї нашого територіального впливу та експансії ґрунтуються на нашому праві на владу, дарованому самими Небесами."
  expand_the_tianxia_policy: "Розширення Тянься"
  expand_the_tianxia_policy_desc: "Суверенітет #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединної держави#!#! та її право на владу залишаються незаперечними, доки виконується божественний обов'язок. Усі жителі землі під Небом перебувають під захистом Драконячого трону, доки піддані схиляються перед ним."
  chi_have_extra_celestial_governor_tt: "[GetUniqueInternationalOrganization('middle_kingdom').GetName] тепер може призначити ще одного губернатора."
  restrict_the_tianxia_policy: "Обмеження Тянься"
  restrict_the_tianxia_policy_desc: "Тільки володарю #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединної держави#!#! можна довірити правити всіма землями під небом. Для Трону Дракона було б принизливо передати частину своїх повноважень молодшим державам."
  jakun_gusa: "«Вісім знамен»"
  jakun_gusa_desc: "Хоча система «Восьми знамен» насамперед є нашою армією, вона також закладає основу устрою суспільства в #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединній державі#!#!. Щоб знамена не втратили свого сенсу, їхня роль має бути чітко визначена."
  revise_the_jakun_gusa_policy: "Перегляд «Восьми знамен»"
  revise_the_jakun_gusa_policy_desc: "Восьмизнаменна армія служить нам вірою і правдою — громить ворогів і здобуває вирішальні перемоги. Якщо ми хочемо зберегти відмінну форму та дисципліну військ, нам потрібні реформи та покращення, інакше армія прийде в плачевний стан."
  chinese_jakun_gusa: "Китайські Вісім прапорів"
  chinese_jakun_gusa_desc: "«Вісім прапорів» вірою і правдою служили нам у північних степах, але в #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Срединній державі#!#! вони повинні влитися в #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайську#!#! систему."
  six_ministries: "Шість міністерств"
  six_ministries_desc: "Шість міністерств — це унікальний адміністративний поділ #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Срединної держави#!#!. У кожного міністерства свої завдання та обов'язки."
  ministry_of_rites: "Міністерство церемоній"
  ministry_of_rites_desc: "Релігійні та палацові справи, що перебувають у віданні Лібу, вимагають граничної делікатності та уваги. Ми зможемо підтримувати проведення ритуалів та церемоній на високому рівні, якщо створимо ефективне та здібне міністерство, яке відповідає за збереження та здійснення обрядів."
  countries_more_likely_to_accept_invite_to_sect_tt: "З більшою охотою вступлять у наш [Concept('sect','напрямок')|e]"
  ministry_of_personnel: "Міністерство персоналу"
  ministry_of_personnel_desc: "Лібу розпоряджається всіма людьми на службі нашої адміністрації та є основою нашого уряду. Завдяки бездоганній роботі цього міністерства у нас буде достатньо чиновників для всіх урядових посад."
  better_exams_results_tt: "[Concept('action','Дія')|e] «[ShowGenericActionName('conduct_keju_examination')]» надаватиме кращих кандидатів"
  ministry_of_revenue: "Міністерство доходів"
  ministry_of_revenue_desc: "Хубу відповідає за все пов'язане з грошима, від перепису населення до збору податків та визначення цінності грошей. Процвітання нашої держави залежить від бездоганної роботи цього міністерства."
  better_census_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('conduct_population_census_decree')]» призводитиме до кращих результатів"
  ministry_of_war: "Міністерство війни"
  ministry_of_war_desc: "Бінбу відповідає за всі військові питання, куди входять не тільки набір та утримання військ, а й обслуговування військових будівель, спорядження та забезпечення військ припасами. Наші військові перемоги безпосередньо залежать від наявності вмілих чиновників у цьому міністерстві."
  better_reinforce_fortification_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('reinforce_fortifications_decree')]» призводитиме до кращих результатів"
  ministry_of_justice: "Міністерство правосуддя"
  ministry_of_justice_desc: "Сінбу займається всіма судовими питаннями, від дрібних правопорушень і до більш серйозних злочинів, але при цьому не має влади у вищих урядових колах. Бездоганна робота цього міністерства забезпечить мирне життя в наших землях."
  better_warning_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('issue_great_warnings_decree')]» призводитиме до кращих результатів"
  ministry_of_works: "Міністерство праці"
  ministry_of_works_desc: "Гунбу завідує всім будівництвом у нашій державі та відповідає за будівництво та підтримання всієї інфраструктури — не тільки будівель, а також каналів та доріг. У віданні міністерства також знаходиться управління ресурсами та стандартизація мір та ваг. Завдяки бездоганній роботі цього міністерства інфраструктура нашої держави завжди стоятиме на міцному фундаменті."
  better_infrastructure_works_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('commence_infrastructure_works_decree')]» призводитиме до кращих результатів"
  middle_kingdom_decrees: "$middle_kingdom$"
  middle_kingdom_decrees_desc: "Імперські укази відіграють важливу роль у функціонуванні #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Срединної держави#!#! — завдяки їм [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle|l] може нав'язувати свою владу підпорядкованим землям."
  expand_palace_bureaucracy_decree: "Розширення палацової бюрократії"
  expand_palace_bureaucracy_decree_desc: "Якщо ми прагнемо зберегти ефективність та оперативність вирішення завдань, наш двір вимагає розширення та нарощування бюрократичних зусиль."
  conduct_population_census_decree: "Проведення перепису населення"
  conduct_population_census_decree_desc: "Наша величезна держава покоїться на плечах ефективної бюрократичної системи, а надійна система оподаткування спирається на ретельне ведення записів. Щоб забезпечити належну роботу бюрократії, ми розпочнемо перепис населення по всіх наших землях."
  increase_tariff_control_decree: "Посилення контролю над митами"
  increase_tariff_control_decree_desc: "Багатства Китаю викликають пожадливість чужоземних купців. Було б розумно запровадити регулювання мит та поставити під контроль потік товарів, що перетинають наші кордони."
  issue_great_warnings_decree: "Видання Великих закликів"
  issue_great_warnings_decree_desc: "Поняття «дбайливе управління», «ефективні бюрократи» та «протидія корупції» часто залежать одне від одного. Таким чином, державне управління — це одна з форм моральності."
  commence_infrastructure_works_decree: "Проведення інфраструктурних робіт"
  commence_infrastructure_works_decree_desc: "Дороги — це запорука нашого подальшого процвітання. Ми займемося створенням надійної інфраструктури, щоб зв'язати свої віддалені провінції зі столицею та полегшити торгівлю."
  reinforce_fortifications_decree: "Підтримання укріплень"
  reinforce_fortifications_decree_desc: "Укріплення відіграють найважливішу роль для виживання нашої держави. Ми повинні підтримувати їх в ідеальному стані та не забувати зміцнювати вразливі ділянки."
  middle_kingdom_members: "Усього [Concept('members','учасників')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединної держави#!#!"
  sinicized_cabinet_policy: "Китаїзована рада міністрів"
  sinicized_cabinet_policy_desc: "Наша рада міністрів створена за образом урядів низки наймогутніших китайських династій. Наші міністри орієнтуються на ті ж віяння та прагнуть бути компетентними й ефективними."
  limit_chinese_influence_policy: "Обмеження впливу китайців при дворі"
  limit_chinese_influence_policy_desc: "[GetCountry('CHI').GetName] чинить тиск на нас і поширює свій вплив, однак інтереси наших власних станів повинні стояти на першому місці."
  limit_chinese_traditions: "Обмеження китайських традицій"
  limit_chinese_traditions_desc: "Прагнучи вписати свої традиції в аннали історії, ми повинні бути пильними, щоб не перетворитися на ще одну державу, залежну від великої держави."
  promote_chinese_traditions: "Популяризація китайських традицій"
  promote_chinese_traditions_desc: "Попри наш інтерес до культури та збереження своїх традицій, ми можемо отримати суттєву вигоду, вивчивши традиції наших китайських сусідів."
  vestiarium: "Вестіарій"
  vestiarium_desc: "Розробка та дотримання правових норм для управління державним майном відіграє важливу роль у справі ефективного розподілу ресурсів та контрольованого витрачання коштів. Це необхідно для державного управління та допомагає правлячим колам приймати рішення згідно зі своїми пріоритетами."
  diplomatic_focus: "Дипломатична мета"
  diplomatic_focus_desc: "Предмети розподілені за категоріями відповідно до їхнього практичного та символічного значення. Вони призначені для використання на пишних державних церемоніях з метою справити враження на іноземних високопосадовців, а також як дипломатичні подарунки."
  administrative_focus: "Адміністративна мета"
  administrative_focus_desc: "Предмети розподіляються залежно від тієї користі, яку несуть для управління та фінансового планування, щоб їх можна було з толком використовувати в ході різних будівельних проєктів та для контролю над державними витратами."
  monastic_reformation_movement: "Чернечий реформаторський рух"
  monastic_reformation_movement_desc: "Стяжателі та нестяжателі розрізняються поглядами на значення багатства для церкви та його вплив на духовне життя священників та пастви."
  non_possessors: "Нестяжателі"
  non_possessors_desc: "Нестяжателі вважають, що церква повинна дистанціюватися від матеріальних благ та вести більш чернечий та споглядальний спосіб життя. Відмова від земних благ важлива, оскільки тільки так можна встановити більш тісні відносини з Богом. Рух знаходиться під сильним впливом вчення Ніла Сорського."
  possessors: "Стяжателі"
  possessors_desc: "Стяжателі виступають на підтримку церкви в питанні володіння землею та майном, вважаючи, що церкві необхідно володіти матеріальними благами, щоб виконувати свої духовні та соціальні зобов'язання, такі як благодійна діяльність, утримання духовних установ, розвиток інфраструктури та надання освіти."
  sobornoye_ulozheniye_policy: "Соборне уложення"
  sobornoye_ulozheniye_policy_desc: "Соборне уложення є основоположним зведенням правових та суспільних норм, яке адаптує закони до умов країни з сильною централізованою владою та чіткою соціальною ієрархією. Воно засноване на чинному зведенні законів та включає деякі елементи візантійського права, закріплюючи станові відмінності та створюючи правову систему, яка відображає переважаючі політичні та релігійні віяння того часу."
  intellectual_movements: "Рухи інтелектуалів"
  intellectual_movements_desc: "Ідеологічні течії XIX століття розділяють людей настільки, що виникають цілі рухи, кожен з яких виростає з очевидних розбіжностей між різними філософськими, політичними та культурними точками зору."
  slavophiles: "Слов'янофіли"
  slavophiles_desc: "Слов'янофіли підкреслюють важливу роль православ'я, общинності, збереження традиційних цінностей, а крім того, піддають критиці матеріалізм, індивідуалізм та поверхневу природу західної культури. Вони віддають перевагу більш ізольованому шляху розвитку, що сприяє збереженню унікальної культурної та духовної спадщини."
  westernizers: "Західники"
  westernizers_desc: "Західники цінують більш тісні зв'язки з Європою та вважають, що всі повинні орієнтуватися на західну культуру. Запозичення західних ідей, інститутів та технологій повинно стати пріоритетом, який дозволить провести швидку модернізацію, індустріалізацію та соціальні реформи. Такі поняття, як культурна самобутність та духовна єдність, не мають великого значення."
  fra_fouage_tax: "Подимна подать"
  fra_fouage_tax_desc: "Це великий податок на осередок, що стягується з селян, який йде на покриття зростаючих витрат державної скарбниці."
  allowed_fouage_tax: "Введення подимної податі"
  allowed_fouage_tax_desc: "Держава почне стягувати податок на осередок для покриття зростаючих витрат скарбниці, що сильно розлютить селян."
  pause_on_fouage_collection: "Скасування подимної податі"
  pause_on_fouage_collection_desc: "Після скасування податку на осередок невдоволення селян державою вщухло."
  couteume_de_normaundie: "Норманське право"
  couteume_de_normaundie_desc: "У закріплених законом звичаях [GetCountry('NRM').Custom('longname_ru_GEN')] підкреслюються земельні права феодалів, привілеї знаті та регіональна автономія. Спираючись на традиції децентралізації, норманське право є стійкою правовою системою, яка забезпечує міцність влади аристократії та зберігає самобутній вигляд [GetCountry('NRM').Custom('rank_ru_GEN')|l]."
  pronoia_system: "Система проній"
  pronoia_system_desc: "Система проній використовується для тимчасового пожалування імператорських фіскальних прав окремим особам або організаціям. До них належать права на збір податків або отримання доходів з різних джерел. На відміну від феодальної системи, що існувала в Європі того часу, пронії не підлягали поступці або передачі у спадок, і право власності в кінцевому підсумку залишалося за імператором. В обмін на ці привілеї система надавала главі держави можливість скликання військ у разі необхідності та передбачала їх самозабезпечення."
  reformed_pronoia_system: "Реформована система проній"
  reformed_pronoia_system_desc: "Щоб уникнути зміцнення влади проніарів на наших землях, ми змінили систему таким чином, щоб закрити будь-які лазівки, які дозволяли поступатися або передавати титул проніара у спадок."
  new_corpus_juris_civilis: "Corpus Juris Civilis"
  new_corpus_juris_civilis_desc: "Цей вичерпний звід законів, указів і постанов створений за наказом імператора Юстиніана та охоплює багатовікову історію римського права. Він складається з чотирьох частин — «Кодексу», «Дигестів», «Інституцій» і «Новел», — де висвітлені фундаментальні принципи управління та правосуддя. Збірник надає базу нашої легітимності, дозволяє уніфікувати правозастосовні практики та забезпечити належне функціонування уряду."
  council_of_three_lands_policy: "Ваад трьох земель"
  council_of_three_lands_policy_desc: "Цей центральний орган єврейського самоврядування, що відповідає за питання віри та судочинства, створений з метою поширення релігійної терпимості та захисту свого народу від переслідувань."
  piotrokow_wislica_statutes: "Віслицько-Петроковські статути"
  piotrokow_wislica_statutes_desc: "Віслицько-Петроковські статути є всеосяжним і надзвичайно важливим зведенням правил і норм, що визначають наше законодавство та створюють міцну основу для майбутнього нашого народу. Їхня дія зачіпає різні аспекти життя суспільства — від приватного та публічного права до обов'язків кожного соціального класу."
  rentekammer_policy: "Казначейство"
  rentekammer_policy_desc: "#italic Казначейство#! займеться нашими фінансами, а #italic скарбник#! звітуватиме особисто перед правителем. Це дозволить нам ефективніше управляти фінансами країни."
  dan_regional_law: "Регіональні закони Данії"
  dan_regional_law_desc: "Наявні у нас регіональні правові системи включають зводи законів Ютландії, Зеландії та Сконе. Попри їхній регіональний характер, вони представлятимуть волю всього #L [ShowCultureName('danish')|l]ого#! народу."
  dan_danske_lov: "Данський кодекс"
  dan_danske_lov_desc: "Єдиний звід законів для нашої держави дозволить створити нову уніфіковану правову систему, в рамках якої працюватиме наш уряд і до якої апелюватимуть наші піддані."
  examination_system_policy_korean: "Кваго"
  examination_system_policy_chinese: "Кецзюй"
  examination_system_policy_shu_language: "Коцзюй"
  examination_system_policy_xiang_language: "Коцзюй"
  examination_system_policy_gan_language: "Куоцзюй"
  examination_system_policy_yue_language: "Фокьой"
  examination_system_policy_min_language: "Куогу"
  examination_system_policy_wu_language: "Кхуцзюй"
  examination_system_policy_kejia_language: "Кхокі"
  examination_system_policy_jin_language: "Кхуецзюй"
  examination_system_policy_vietnam: "Кхоа банг"
  imperial_examination_law: "Система іспитів"
  imperial_examination_law_desc: "Охочі вступити на службу та стати урядовими чиновниками мусять скласти низку іспитів, що перевіряють знання конфуціанської літератури та питань управління державою."
  continue_the_imperial_examination: "Безперервна дія"
  continue_the_imperial_examination_desc: "Ця політика забезпечує безперервну дію системи державних іспитів, як це й було протягом століть."
  abolish_imperial_examination: "Скасувати систему іспитів"
  abolish_imperial_examination_desc: "Скасування системи іспитів значно знизить соціальну мобільність, що безперечно вигідно тим, хто зараз при владі. При призначенні нових чиновників враховуватимуться не їхні реальні заслуги, а особисті рекомендації впливових людей, які, поза всяким сумнівом, керуватимуться своїми інтересами."
  status_of_the_han_law: "Становище ханьців"
  status_of_the_han_law_desc: "Наша династія зародилася за межами споконвічних територій #TOOLTIP:INTERNATIONAL_ORGANIZATION,middle_kingdom_tt,X #L Серединної держави#!#!, тому більшість #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#! вважають нас чужинцями."
  maintain_status_quo_in_han_policies: "Прийняття китайської бюрократії"
  maintain_status_quo_in_han_policies_desc: "Нашому уряду варто забути про колишні порядки та освоїти нові методи роботи, щоб заслужити повагу чиновників з-поміж #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#!."
  limit_the_han_powers: "Заборона на чиновницькі посади"
  limit_the_han_powers_desc: "Вплив #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#! настільки великий, що ставить під загрозу владу старої #L [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderCountry.GetCulture.GetName]ої#! гвардії. Треба негайно заборонити їм обіймати важливі державні посади."
  mch_queue_hair: "Тіфаїфу"
  mch_queue_hair_desc: "Політика тіфаїфу спрямована на культурну асиміляцію #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#!. Насамперед, вони муситимуть змінити свої зачіски на маньчжурські коси."
  enforce_queue_hair: "Насадження біаньцзи"
  enforce_queue_hair_desc: "#TOOLTIP:CULTUREGROUP,chinese_group,X #L Ханьці#!#! будуть зобов'язані голити передню частину голови та відрощувати волосся на потилиці, щоб заплітати їх у традиційні маньчжурські коси."
  queue_hair_status_quo: "Носіння ханьфу"
  queue_hair_status_quo_desc: "Щоб відповідати панівній культурі нашої держави, маньчжурські чиновники носитимуть ханьфу — традиційний #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьський#!#! одяг."
  kor_currency: "Основна валюта"
  kor_currency_desc: "Вибір основної валюти значно вплине на економічні та соціальні процеси всередині нашої країни."
  kor_jeohwa: "Чохва"
  kor_jeohwa_desc: "Щоб стимулювати розвиток економіки, можна створити нову паперову валюту — чохва. Серед іншого, це дозволить перейти до #TOOLTIP:SOCIETAL_VALUE,capital_economy,X #L капіталістичної#!#! системи."
  kor_barter_economy: "Бартерна економіка"
  kor_barter_economy_desc: "Люди також можуть обмінюватися рівними за вартістю товарами або послугами."
  kor_metal_coinage: "Карбування металевих монет"
  kor_metal_coinage_desc: "Наші спроби впровадити металеві монети завжди закінчувалися невдачею через брак ресурсів. Можливо, тепер усе буде інакше."
  kor_chinese_currency: "Китайська валюта"
  kor_chinese_currency_desc: "Щоб не витрачати сили та ресурси на створення й підтримання власної валюти, ми можемо просто завозити в країну монети з Китаю."
  kor_scale_chinese_currency: "За рахунок думки #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_RP')|L]#!#! про нашу державу."
  spa_inquisition_policy: "Іспанська інквізиція"
  spa_inquisition_policy_desc: "Наша зброя — раптовість! Раптовість і страх… Страх і раптовість… А ще — безжальність!"
  mesta_council_law: "Рада Мести"
  mesta_council_law_desc: "Рада Мести захищає права та інтереси власників домашньої худоби в нашій державі."
  quadrillas_organization: "Куадрильяс"
  quadrillas_organization_desc: "Куадрильяс, основна організація Мести, виникла в низці найважливіших міст, що займаються вівчарством. Вона наглядає за нашими стадами мериносових овець та забезпечує їхню безпеку."
  right_of_possesion: "Право володіння"
  right_of_possesion_desc: "Право володіння регулює орендну плату за користування пасовищами та є юридичною підставою для випасу овечих стад Мести."
  laws_of_burgos: "Бургоські закони"
  laws_of_burgos_desc: "Цей звід законів є правовою основою для нас та наших підданих у колоніальних володіннях. Особливу увагу в ньому приділено правам туземного населення та його організації в систему енком'єнд."
  new_laws_indies: "Нові закони"
  new_laws_indies_desc: "Нові закони є вдосконаленим варіантом Бургоських законів та посилюють наш контроль над колоніальними володіннями."
  siete_partidas_law: "Сім партид"
  siete_partidas_law_desc: "#italic $siete_partidas_law$#!, або Семичастинний кодекс, є збіркою законів, складеною королем Кастилії Альфонсом X з метою уніфікації законодавства королівства. У них увага приділяється не тільки правовим нормам, а й питанням моральності."
  dop_law_comuneros_parliament: "Посилені кортеси"
  dop_law_comuneros_parliament_desc: "Наш парламент, кортеси, посилився та став основною політичною силою в державі завдяки боротьбі з комунерос."
  cas_mita_system: "Міта"
  cas_mita_system_desc: "$cas_mita_system$ — це примусова праця корінного населення, яка спочатку практикувалася в імперії інків. Громади зобов'язані постачати нам робочу силу, зокрема для видобутку срібла на рудниках у Потосі."
  nueva_recopilacion_policy: "Новий звід"
  nueva_recopilacion_policy_desc: "Новий обширний звід правил нашої держави, який прискорить процес централізації та забезпечить контроль над нашими територіями."
  spa_reformed_nueva_recopilacion_policy_tt: "У результаті [Concept('event', 'події')|e] «$flavor_cas.50.title$» сформовано «Новий звід»."
  leyes_de_toro_policy: "Закони Торо"
  leyes_de_toro_policy_desc: "Збірник законів, укладений на догоду різним станам нашої держави, і зокрема — дворянам. Окрім іншого, він встановлює майорат як основний порядок успадкування майна."
  ordenamiento_de_alcala_policy: "Закони Алькали"
  ordenamiento_de_alcala_policy_desc: "$ordenamiento_de_alcala_policy$ — це правовий збірник, що об'єднує та впорядковує місцеві закони. Він також скасовує низку старих звичаїв та привілеїв, тим самим зміцнюючи центральну владу."
  sea_beggars_policy: "Морські жебраки"
  sea_beggars_policy_desc: "Видавши каперські свідоцтва всім охочим нам служити, ми збільшимо свій флот без необхідності будувати нові кораблі."
  kilwan_merchant_navy: "$ZAN_ADJ$ий торговий флот"
  kilwan_merchant_navy_desc: "Завдяки віковому досвіду мореплавства та доступу до якісних бавовни й деревини ми змогли створити найвеличніший торговий флот. Ці кораблі, збудовані за передовими технологіями та з використанням новітніх матеріалів, стали гордістю нашого народу."
  smugglers_haven: "Рай для контрабандистів"
  smugglers_haven_desc: "Пірати не змогли б займатися морським розбоєм без можливості збуту награбованого. Ми повинні створити в республіці сприятливі умови для їхньої діяльності."
  sco_clan_holdings: "Розподіл земель шотландських кланів"
  sco_clan_holdings_desc: "Порядок розподілу #L #L [GetCountry('SCO').GetAdjective|l]#!их#! земель між кланами залежить від їхнього впливу: що більший і сильніший клан, то більше володінь він отримує. Землі клану передаються безпосередньо спадкоємцю за винятком тих випадків, коли він позбавляється титулу або сам титул скасовується."
  inherited_clan_holdings: "Пряме успадкування"
  inherited_clan_holdings_desc: "Клани зберігають свої володіння та титули доти, доки їхній рід не згасне. Лише після цього правитель зможе повернути ці землі собі."
  revert_to_the_crown: "Землі розподіляє правитель"
  revert_to_the_crown_desc: "Правитель сам вирішує, кому надати нові володіння та титули. Як правило, великі клани користуються більшою прихильністю, а тому отримують більше земель і титулів, ніж інші."
  dynastic_holdings_conslidated: "Династичні володіння"
  dynastic_holdings_conslidated_desc: "Нові володіння та титули автоматично переходять до правлячої династії, і лише в рідкісних випадках дістаються іншим #L #L [GetCountry('SCO').GetAdjective|l]#!им#! кланам."
  sco_authority_over_the_clergy: "Контроль над духовенством"
  sco_authority_over_the_clergy_desc: "Постійні внески до курії виснажують #L #L [GetCountry('SCO').GetAdjective|l]#!у#! скарбницю. Щоб позбутися цього тягаря, уряд може взяти духовенство під свій прямий контроль."
  crown_religious_jurisdiction: "Юрисдикція уряду"
  crown_religious_jurisdiction_desc: "Урядовий контроль над усіма релігійними організаціями #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_RP')|L]#!#! значно послабив вплив #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_RP')|L]#!#! та курії."
  limited_curia_oversight: "Обмежений зв'язок із курією"
  limited_curia_oversight_desc: "Хоча уряд багато в чому зберігає владу над релігійними організаціями #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_RP')|L]#!#!, деякі високопоставлені представники духовенства все ж отримали право підтримувати спілкування з курією."
  sco_colonial_affairs_law: "Шотландські колоніальні амбіції"
  sco_colonial_affairs_law_desc: "Розповіді про простори та багатства Нового Світу нікого не залишать байдужим. [GetCountry('SCO').GetName] також може збагатитися за рахунок далеких земель, заснувавши там свою колонію. Однак такі підприємства вимагають великих витрат і можуть спричинити катастрофічні наслідки для економіки країни."
  sco_no_colonial_affairs: "Заборона колоніальних підприємств"
  sco_no_colonial_affairs_desc: "Заснування колоній та торгових компаній у Новому Світі заборонено, оскільки подібні підприємства можуть підірвати фінансову стабільність #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_RP')|L]#!#!."
  sco_limited_colonial_ventures: "Обмеження колоніальних підприємств"
  sco_limited_colonial_ventures_desc: "Колоніальні підприємства дозволені державою. Вигода від них перевищує потенційні економічні ризики."
  sco_colonial_administration: "Досвідчена колоніальна адміністрація"
  sco_colonial_administration_desc: "Завдяки зусиллям дослідників та інвесторів [GetCountry('SCO').GetName] стала справжньою колоніальною державою і тепер може отримувати солідний дохід за рахунок своїх заморських володінь."
