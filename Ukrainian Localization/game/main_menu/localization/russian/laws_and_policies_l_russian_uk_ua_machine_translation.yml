  hre_emperor_bonus_tt: "[Concept('hre_emperor', 'Імператор')|e] отримує наступні модифікатори:"
  hre_elector_bonus_tt: "[Concept('electors', 'Виборщики')|e] отримують наступні модифікатори:"
  hre_free_city_bonus_tt: "[Concept('free_cities', 'Вільні міста')|e] отримують наступні модифікатори:"
  hre_location_bonus_tt: "[Concept('locations', 'Місцевості')|e] країни [GetUniqueInternationalOrganization('hre').GetName] отримують наступні модифікатори:"
  imperial_religion: "Імперська релігія"
  imperial_religion_desc: "[GetUniqueInternationalOrganization('hre').GetName] ґрунтується на вірі."
  hre_religion_catholic: "$imperial_religion$ — $catholic$"
  hre_religion_catholic_desc: "Традиційне #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, його чесноти та цінності визначають життя в межах #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  hre_religion_lutheran: "$imperial_religion$ — $lutheran$"
  hre_religion_lutheran_desc: "#TOOLTIP:SITUATION,reformation,X #L Реформація#!#! назавжди змінила наш погляд на питання віри, завдяки чому #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#! стало головною релігією імперії."
  hre_religion_hussite: "$imperial_religion$ — $hussite$"
  hre_religion_hussite_desc: "#TOOLTIP:SITUATION,western_schism,X #L Великий західний розкол#!#! приніс світу #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситське#!#! вчення, яке тепер визначає життя в імперії."
  hre_religion_calvinist: "$imperial_religion$ — $calvinist$"
  hre_religion_calvinist_desc: "Наша віра в #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#! непохитна, і віднині він має стати основоположною частиною імперії. Ось чому слідування вченню #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізму#!#! є нашим священним обов'язком."
  hre_religion_christian: "$imperial_religion$ — $christian$"
  hre_religion_christian_desc: "Релігійні тонкощі більше не такі важливі, як раніше. #TOOLTIP:RELIGIONGROUP,christian,X #L Християнське#!#! вчення має бути прийняте як головна релігія імперії — причому без поділу на напрямки."
  golden_bull: "Золота булла"
  golden_bull_desc: "Золота булла — це законодавчий акт, який визначає і закріплює конституційний устрій #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! — зокрема, регулює роботу колегії виборців. Інші закони та імперські реформи також ґрунтуються на положеннях Золотої булли."
  golden_bull_policy: "Закріплення Золотої булли"
  golden_bull_policy_desc: "$golden_bull_desc$"
  no_golden_bull_policy: "Невпорядкований виборчий процес"
  no_golden_bull_policy_desc: "Без Золотої булли принципи організації та виборча система #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! залишаються хаотичним нагромадженням звичаїв, прецедентів і нестійких альянсів. Поки формального уложення немає, [Concept('hre_electoral_college', 'колегія виборців')|e] більше займається розбратом, інтригами та закулісною боротьбою."
  no_golden_bull_policy_tt: "Після прийняття #TOOLTIP:LAW,golden_bull,X #L Золотої булли#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! за жодних обставин не зможе її скасувати"
  hre_golden_bull_formalizes_electorate_tt: "Формалізує виборчу поведінку: [hre_electoral_college|e]"
  hre_golden_bull_self_voting_regulated_via_electorate_law: "Можливість голосувати за себе визначається [Concept('law', 'правилами')|e] #TOOLTIP:LAW,imperial_voting_law,X #L імперського голосування#!#!, спочатку #TOOLTIP:POLICY,free_electorate_policy,X #L вибори проводяться без обмежень#!#!"
  monetary_contribution: "Імперський податковий закон"
  monetary_contribution_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!, як і будь-яке політичне утворення, існує за рахунок золота. Щоб забезпечити її фінансову стабільність, можна прийняти серію податкових законів, що дозволяють переводити золото з приватних рук у державні."
  no_monetary_contribution: "Відсутність податків"
  no_monetary_contribution_desc: "Імперія більше не потребує додаткових доходів. Якщо зменшити оподаткування, адміністрація зможе зосередитися на інших завданнях."
  only_emperor_payment: "Пряме оподаткування"
  only_emperor_payment_desc: "«[ShowParliamentIssueTypeName('hre_roman_month')]» покриває далеко не всі витрати на захист #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Потрібно ввести новий податок, від якого отримуватиме вигоду [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  only_treasury_payment: "Казначейське оподаткування"
  only_treasury_payment_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] в змозі вирішувати багато питань за рахунок власних коштів, однак фінансовий буфер у вигляді повноцінної казни дозволив би нинішньому та майбутнім імператорам ефективніше фінансувати внутрішні справи #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  complete_imperial_contribution: "Імперське оподаткування"
  complete_imperial_contribution_desc: "Лише оподаткування всіх учасників допоможе впоратися з фінансовими проблемами #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  military_contribution: "Імперський облік"
  military_contribution_desc: "$military_contribution$ — це список з точною чисельністю військ, які [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] очікує отримати від кожного стану."
  no_military_contribution: "Немає військової повинності"
  no_military_contribution_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] не вимагає від станів додатково надавати воїнів."
  manpower_from_cities: "Міський внесок"
  manpower_from_cities_desc: "[ShowSpecialStatusNamePlural('free_city')] зобов'язані надати додаткові війська, які отримає в своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_cities_tt: "#TOOLTIP:SPECIAL_STATUS,free_city,X #L Вільні імперські міста#!#! повинні надати [Concept('manpower', 'рекрутів')|e], яких зможе задіяти [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  manpower_from_electors: "Внесок виборців"
  manpower_from_electors_desc: "[ShowSpecialStatusNamePlural('elector')] та [ShowSpecialStatusNamePlural('archbishop_elector')] зобов'язані надати додаткові війська, які отримає в своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_electors_tt: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князі-виборці#!#! та #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископи-виборці#!#! повинні надати [Concept('manpower', 'рекрутів')|e], яких зможе задіяти [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  manpower_from_princes: "Внесок принців"
  manpower_from_princes_desc: "[ShowSpecialStatusNamePlural('imperial_prince')] зобов'язані надати додаткові війська, які отримає в своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  manpower_from_princes_tt: "#TOOLTIP:SPECIAL_STATUS,imperial_prince,X #L Імперські князі#!#! повинні надати [Concept('manpower', 'рекрутів')|e], яких зможе задіяти [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  great_imperial_army: "Велике імперське військо"
  great_imperial_army_desc: "Усі країни у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! зобов'язані надати додаткові війська, які отримає в своє розпорядження [GetUniqueInternationalOrganization('hre').GetLeaderTitle]."
  great_imperial_army_tt: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! повинні надати [Concept('manpower', 'рекрутів')|e], яких зможе задіяти [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  perpetual_diet_policy_tt: "[Concept('location', 'Місцевість')|e], в якій знаходиться #Y постійний рейхстаг#!, отримує такі модифікатори:"
  imperial_voting_law: "Імперське голосування"
  imperial_voting_law_desc: "В основі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! лежить принцип імперських виборів. Особливості цього виборчого процесу безпосередньо впливають на співвідношення сил всередині імперії."
  rotating_emperorship_policy: "Змінюваність імператорів"
  rotating_emperorship_policy_desc: "Щоб не допустити консолідації влади в руках однієї людини, імперія запровадила систему, що перешкоджає переобранню правителів."
  free_electorate_policy: "Вибори без обмежень"
  free_electorate_policy_desc: "Виборці незалежно обирають наступного імператора. Дозволено голосувати за самого себе."
  emperor_successor_preference_policy: "Перевага наступнику імператора"
  emperor_successor_preference_policy_desc: "Імператор висуває кандидатом свого наступника. Влада в імперії набуває рис династичної."
  emperor_successor_preference_policy_opinion_impact: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! понизять своє [Concept('opinion', 'ставлення')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 50#!"
  emperor_dynastic_preference_policy: "Перевага династії імператора"
  emperor_dynastic_preference_policy_desc: "Виборці частіше голосують за членів імператорської родини, що тільки посилює вплив династії на виборчу систему."
  emperor_dynastic_preference_policy_opinion_impact: "Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! понизять свою [Concept('opinion', 'думку')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 75#!"
  erbkaisertum_policy: "Спадкова імперія"
  erbkaisertum_policy_desc: "Вибори скасовуються, імперія стає повноцінною спадковою монархією, де династична влада ставиться вище легітимності."
  imperial_succession_law: "Імперське престолонаслідування"
  imperial_succession_law_desc: "Порядок престолонаслідування в країні [GetUniqueInternationalOrganization('hre').GetName] — доволі делікатне питання. Право успадкування імперського престолу прописано в імперських законах."
  hre_agnatic_succession_policy: "Агнатичне успадкування"
  hre_agnatic_succession_policy_desc: "Імператорська корона країни [GetUniqueInternationalOrganization('hre').GetName] передається лише по чоловічій лінії."
  hre_agnatic_succession_policy_custom_tooltip: "Лише [Concept('rulers', 'правителі')|e] чоловічої статі можуть успадкувати трон #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!"
  hre_pragmatic_sanction_policy: "Прагматична санкція"
  hre_pragmatic_sanction_policy_desc: "Стать нашого правителя не має значення. Успадкувати імператорську корону #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! можуть і чоловіки, і жінки."
  hre_pragmatic_sanction_policy_opinion_impact: "Країни, які входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! та дотримуються принципів #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічного закону#!#! або #TOOLTIP:HEIRSELECTION,partition_inheritance,X #L розділення спадщини#!#!, понизять свою [Concept('opinion', 'думку')|e] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_PREP')|L]#!#! на #R 75#!"
  electorate_organization_law: "Об'єднання виборців"
  electorate_organization_law_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князі-виборці#!#! — це могутні [ShowEstateTypeName('nobles_estate')|l] та [ShowEstateTypeName('clergy_estate')|l], у яких є право обирати наступного імператора #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  integrated_electors_policy: "Скорочення числа виборців"
  integrated_electors_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князів-виборців#!#! стає менше, одне з цих місць отримує [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  integrated_electors_policy_tt: "Найслабші #TOOLTIP:SPECIAL_STATUS,elector,X #L князь-виборець#!#! та #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископ-виборець#!#! втратять свій статус виборців #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  limited_electors_policy: "Обмеження числа виборців"
  limited_electors_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князів-виборців#!#! може бути не більше семи. Голоси за кандидата на імперський престол можна отримати в обмін на різноманітні подарунки та послуги, хоча обіцянки та обіцянки — дієвий і перевірений спосіб залучити голоси #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#!."
  electorate_policy: "Зміцнення колегії виборців"
  electorate_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князів-виборців#!#! стає вдвічі більше: до складу колегії додатково входить один світський та один духовний виборець. Крім того, отримання голосу #TOOLTIP:SPECIAL_STATUS,elector,X #L князя-виборця#!#! як ніколи залежить від обіцянок та обіцянок."
  expanded_electors_policy: "Збільшення числа виборців"
  expanded_electors_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князів-виборців#!#! стає вчетверо більше: до складу колегії додатково входять два світських виборці та два #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископи-виборці#!#!. Прихильність #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#! можна заслужити лише суттєвими обіцянками."
  elector_council_policy: "Рада виборців"
  elector_council_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князі-виборці#!#! перебувають на піку своєї могутності, оскільки до складу колегії додатково входять три світських князі-виборці та три #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископи-виборці#!#!. Крім того, вони отримують право обирати антикороля, а [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] може замінюватися в рейхстазі за їхнім рішенням, якщо ніхто не виступить проти. Фактично, главу країни можна переобрати за рішенням виборців."
  electorate_religion_law: "Релігійний закон для виборців"
  electorate_religion_law_desc: "Релігія — це найважливіший стовп #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! як для імператорів, так і для #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#!."
  only_imperial_religion_policy: "Тільки імперська релігія"
  only_imperial_religion_policy_desc: "Щоб зберегти своє становище, #TOOLTIP:SPECIAL_STATUS,elector,X #L князі-виборці#!#! повинні сповідувати тільки імперську релігію."
  only_imperial_religion_group_policy: "Тільки імперська релігійна група"
  only_imperial_religion_group_policy_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князі-виборці#!#! вільні дотримуватися будь-якої з течій нашої державної релігії на свій розсуд. Однак язичництво не отримує заохочення — його ми не потерпимо."
  free_city_law: "Вільні міста"
  free_city_law_desc: "Вільні міста #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримали права самоврядування та автономії у внутрішніх справах. Зазвичай у них проходять засідання рейхстагу."
  direct_imperial_cities_policy: "Імперські міста прямого підпорядкування"
  direct_imperial_cities_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] вирішив, що відтепер вільні міста перебуватимуть під його безпосереднім управлінням. Після суттєвого обмеження самостійності міста-країни фактично перетворилися на форпости країни [GetUniqueInternationalOrganization('hre').GetName] для імперської корони."
  cities_of_the_emperor_policy: "Міста імператора"
  cities_of_the_emperor_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] обмежує самостійність вільних міст. Попри те що міста поки ще можуть вести власну зовнішню політику, вони стали на крок ближче до того, щоб увійти до складу володінь глави країни."
  free_cities_policy: "Вільні міста"
  free_cities_policy_desc: "Вільні міста користуються захистом, який їм надає [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], а також розширеною автономією, завдяки чому їм простіше торгувати на своїх ринках."
  no_emperor_allegiance_policy: "Незахищені вільні міста"
  no_emperor_allegiance_policy_desc: "Вільні міста більше не користуються захистом від честолюбних князів, який зазвичай надає [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  no_free_cities_policy: "Скасування вільних міст"
  no_free_cities_policy_desc: "Вільні імперські міста скасовано, і тепер [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] не надає захист жодному поселенню."
  free_city_subjugation_antagonism_tt: "Кожне #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільне імперське місто#!#! отримує [SCOPE.GetValue('average_free_city_antagonism')|R2] од. [Concept('antagonism', 'ворожості')|e] до #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_DAT')|L]#!#!"
  free_city_rights_law: "Право на статус вільного міста"
  free_city_rights_law_desc: "Отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! нелегко. Цей почесний статус присуджуватиме особисто [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  german_free_cities_only_policy: "Тільки німецькі вільні міста"
  german_free_cities_only_policy_desc: "[GetUniqueInternationalOrganization('hre').GetName] — це насамперед #TOOLTIP:CULTUREGROUP,german_group,X #L німецька#!#! країна, і привілей вважатися #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільним імперським містом#!#! відображає цей факт."
  german_free_cities_only_policy_at: "Тільки #TOOLTIP:CULTUREGROUP,german_group,X #L німецькі#!#! країни можуть отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  german_and_german_adjacent_free_cities_policy: "Вільні міста братніх народів"
  german_and_german_adjacent_free_cities_policy_desc: "Протягом усієї своєї історії імперія була тісно пов'язана з #TOOLTIP:CULTUREGROUP,netherlandish_group,X #L нідерландським#!#!, #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарським#!#! та #TOOLTIP:CULTUREGROUP,italian_group,X #L італійським#!#! народами. У зв'язку з цим бажаний для багатьох статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! не повинен обмежуватися одними лише #TOOLTIP:CULTUREGROUP,german_group,X #L німецькими#!#! країнами."
  german_and_german_adjacent_free_cities_policy_at: "Лише країни #TOOLTIP:CULTUREGROUP,german_group,X #L германської#!#!, #TOOLTIP:CULTUREGROUP,netherlandish_group,X #L нідерландської#!#!, #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарської#!#! та #TOOLTIP:CULTUREGROUP,italian_group,X #L італійської#!#! [Concept('culture_group', 'культурних груп')|e] можуть отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  empire_wide_free_cities_policy: "Статус вільного міста для всіх"
  empire_wide_free_cities_policy_desc: "Статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! більше не пов'язаний з культурою чи географією. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] може дарувати його будь-якій країні, що заявить про бажання отримати такий статус."
  empire_wide_free_cities_policy_at: "Будь-яка країна-учасниця може отримати статус #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#!"
  landfriede_law: "Земський мир"
  landfriede_law_desc: "#italic Земський мир#! (Landfriede) — це указ про те, що суперечки між учасниками #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! повинні вирішуватися при імператорському дворі, а не на полі бою. Цей мандат сприяє згуртованості імперії, запобігаючи ослабленню через міжусобні чвари."
  outlaw_internal_warfare_policy: "Заборона міжусобиць"
  outlaw_internal_warfare_policy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! обмежує самостійність її учасників і забороняє міжусобиці на своїй території."
  landfriede_rank_4_policy: "Вічний Земський мир"
  landfriede_rank_4_policy_desc: "#italic Земський мир#! досяг вершини свого впливу та влади в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!, і приватні війни між країнами-учасниками повністю заборонені. Усі суперечки, що виникають, підлягають вирішенню при імператорському дворі."
  landfriede_rank_3_policy: "Зміцнення Земського миру"
  landfriede_rank_3_policy_desc: "#italic Земський мир#! тепер є впливовим правовим інститутом. #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! в особі всіх її учасників визнає його авторитет."
  landfriede_rank_2_policy: "Розширення Земського миру"
  landfriede_rank_2_policy_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! наділяє #italic земський мир#! додатковим впливом, і його визнають усі учасники."
  landfriede_policy: "Запровадження Земського миру"
  landfriede_policy_desc: "$landfriede_law_desc$"
  no_landfriede_policy: "Відсутність Земського миру"
  no_landfriede_policy_desc: "«Право сильного» — ось що найточніше описує нинішню реальну політику #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!; суперечки між її учасниками вирішуватимуться на полі бою."
  landfriede_parliament_issue_rank_2: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 3#! роки."
  landfriede_parliament_issue_rank_3: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 5#! років."
  landfriede_parliament_issue_rank_4: "Мир, встановлений [Concept('parliament_issue', 'парламентською')|e] #TOOLTIP:PARLIAMENT_ISSUE,hre_demand_internal_peace,X #L вимогою припинити внутрішні чвари#!#!, триватиме #G 10#! років."
  imperial_diet_law: "Рейхстаг"
  imperial_diet_law_desc: "#TOOLTIP:PARLIAMENT_TYPE,hre_court_assembly,X #L Придворне зібрання#!#! — це система з далекого минулого, і багато її умов та процедур безнадійно застаріли. Час перетворити зібрання на повноправний рейхстаг, здатний відстоювати різнобічні інтереси всіх учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#!."
  no_imperial_diet_policy: "Традиційний парламент"
  no_imperial_diet_policy_desc: "Принципи роботи #TOOLTIP:PARLIAMENT_TYPE,hre_court_assembly,X #L придворного зібрання#!#! ніколи офіційно не кодифікувалися, а тому цей інститут давно потребує масштабної реформи."
  hre_early_imperial_diet_policy: "$hre_early_imperial_diet$"
  hre_early_imperial_diet_policy_desc: "$hre_early_imperial_diet_desc$"
  hre_bi_camerial_imperial_diet_policy: "$hre_bi_camerial_imperial_diet$"
  hre_bi_camerial_imperial_diet_policy_desc: "$hre_bi_camerial_imperial_diet_desc$"
  hre_tri_camerial_imperial_diet_policy: "$hre_tri_camerial_imperial_diet$"
  hre_tri_camerial_imperial_diet_policy_desc: "$hre_tri_camerial_imperial_diet_desc$"
  perpetual_diet_law: "Постійний рейхстаг"
  perpetual_diet_law_desc: "Раніше рейхстаг збирався нерегулярно в різних містах #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#!, через що [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] та інші його представники щоразу були змушені здійснювати подорожі. Заснувавши постійно діючий рейхстаг, ми створимо місцеве зібрання, в основі роботи якого будуть безперервні обговорення, а не епізодичні зустрічі."
  no_perpetual_diet_policy: "Виїзний парламент"
  no_perpetual_diet_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] та інші представники їздитимуть у різні міста #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, скликаючи рейхстаг коли це необхідно і в підходящому місці, а не за розкладом або в якомусь одному місці."
  perpetual_diet_policy: "$perpetual_diet_law$"
  perpetual_diet_policy_desc: "$perpetual_diet_law_desc$"
  perpetual_diet: "Тут засідає #Y постійний рейхстаг#!"
  power_of_the_emperor_law: "Повноваження імператора"
  power_of_the_emperor_law_desc: "Влада, якою володіє [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], — питання складне. Учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#! та #TOOLTIP:SPECIAL_STATUS,elector,X #L князі-виборщики#!#! переслідують свої інтереси, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] — свої, і часто вони суперечать один одному. Однак усі визнають, що якщо [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] не матиме сильної влади, імперія виявиться беззахисною."
  renovatio_policy: "Renovatio Imperii"
  renovatio_policy_desc: "З децентралізацією #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! покінчено. Вся імперія об'єднається в одну країну, яка визначатиме долю всього світу!"
  revoke_privilegia_policy: "Скасування привілеїв"
  revoke_privilegia_policy_desc: "Традиційні вольності та привілеї імперських князів скасовуються. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] зосередить усю владу в своїх руках, трансформувавши #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#! в єдину централізовану країну."
  improved_imperial_authority_policy: "Посилення влади імператора"
  improved_imperial_authority_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] суттєво розширює свої повноваження, що дозволяє йому проводити політики через рейхстаг. У результаті #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! має стати сильнішою."
  kaisertum_policy: "Імперія"
  kaisertum_policy_desc: "Влада, якою володіє [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], ретельно збалансована: вона достатньо сильна, щоб захищати та реформувати #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#!, але не настільки всесильна, щоб загрожувати нашим #TOOLTIP:SPECIAL_STATUS,elector,X #L князям-виборщикам#!#! або країнам-учасникам."
  holy_roman_figurehead_policy: "Номінальний імператор"
  holy_roman_figurehead_policy_desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] більше не має влади. Тепер #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! — це країна, де всі правила та політики приймаються рейхстагом та #TOOLTIP:SPECIAL_STATUS,elector,X #L князями-виборщиками#!#!."
  main_philosophy_law: "Основна філософія"
  main_philosophy_law_desc: "Основна філософська течія та вчення, що формують фундаментальні ідеї релігійного напряму."
  disfavoring_sect_tt: "Якщо ми #Y засуджуємо#! цей напрям:"
  promoting_sect_tt: "Якщо ми #Y підтримуємо#! інший напрям:"
  confucianism_policy: "$SECT_CONFUCIANISM_NAME$"
  confucianism_policy_desc: "Конфуціанство — це філософія, яка розроблена на основі вчення Конфуція, або Кун Фу-цзи. Вона зосереджена на соціальній гармонії та доброчесності державних інститутів."
  daoism_policy: "$SECT_DAOISM_NAME$"
  daoism_policy_desc: "Даосизм — це філософія, яка заснована на прагненні жити в гармонії з животворною силою всесвіту #italic дао#! та спирається на концепцію #italic у-вей#!, або «дія через бездіяльність»."
  vajrayana_law: "Тантричні практики"
  vajrayana_law_desc: "Ваджраяна, також відома як тантричний або езотеричний буддизм, — це течія, яка включає безліч тантричних, езотеричних та ритуальних практик. Її розвиток завжди зазнавав сильного впливу з боку інших релігій, особливо індуїзму."
  vajrayana_policy: "$vajrayana_law$"
  vajrayana_policy_desc: "$vajrayana_law_desc$"
  no_vajrayana_policy: "Немає тантричних практик"
  no_vajrayana_policy_desc: "$no_vajrayana_policy$"
  pure_land_school_policy: "$SECT_PURE_LAND_SCHOOL_NAME$"
  pure_land_school_policy_desc: "$SECT_PURE_LAND_SCHOOL_NAME$ є однією з найпопулярніших шкіл східноазійського буддизму, в основі якої лежить ідея переродження в Чистій землі Сукхаваті. Найвідомішою Чистою землею при цьому вважається Чиста земля Будди Амітабхи, а найважливішими вченнями цієї школи — #italic Три сутри Чистої землі#!. Головна форма релігійної практики — пам'ятання Будди за допомогою повторення мантри з його ім'ям."
  tiantai_policy: "Школа лотоса"
  tiantai_policy_desc: "Школа лотоса, названа так через велике шанування #italic Сутри лотоса#!, є однією з найраніших буддійських шкіл, що виникли в Китаї. Її доктрина #italic Єдиного шляху#! сприяє всебічному розумінню буддійських вчень."
  dharma_school_policy: "$SECT_DHARMA_SCHOOL_NAME$"
  dharma_school_policy_desc: "Школа дхарми, яку називають #italic вейші#! або #italic фасян#! в Китаї та #italic хоссо#! в Японії, з'явилася в Індії та мала значний вплив на махаяну. Основна увага в ній приділяється питанню ідеалізму та ідеї про те, що реальність — лише плід свідомості. Крім того, школа широко практикує йогу та медитацію."
  flower_garland_school_policy: "$SECT_FLOWER_GARLAND_SCHOOL_NAME$"
  flower_garland_school_policy_desc: "Ця школа запозичила свою назву від #italic Сутри квіткової гірлянди#!. $SECT_FLOWER_GARLAND_SCHOOL_NAME$ називається #italic хуаянь#! в Китаї, #italic кегон#! в Японії та #italic хваом#! в Кореї. Вона вважається однією з основних буддійських традицій, що розвинулися в Китаї. У ній робиться акцент на ідеї взаємопроникнення, згідно з якою все існує в стані взаємозалежності та одночасно присутнє одне в одному."
  meditation_school_policy: "$SECT_MEDITATION_SCHOOL_NAME$"
  meditation_school_policy_desc: "Традиційно вважається, що школа медитації була заснована Бодхідхармою і здобула популярність під назвою #italic чань#! в Китаї, #italic дзен#! в Японії, #italic сон#! в Кореї та #italic тхіен#! у В'єтнамі. Медитація практикується в буддизмі повсюдно, але саме ця школа робить акцент на її застосуванні як способу досягнення просвітлення — зазвичай у сидячому положенні, а також під час фізичної активності, наприклад під час занять бойовими мистецтвами."
  mantra_school_policy: "$SECT_MANTRA_SCHOOL_NAME$"
  mantra_school_policy_desc: "Школа мантри відома як #italic чженьян#! в Китаї та #italic сінгон#! в Японії. Особлива увага в ній приділяється езотеричним практикам ваджраяни, особливо так званим «трьом таємницям»: мудрі, мантрі та мандалі. Її практики мали величезний вплив на розвиток цілої низки інших буддійських шкіл."
  shugendo_policy: "$SECT_SHUGENDO_NAME$"
  shugendo_policy_desc: "Виникнувши як злиття різнорідних буддійських положень і практик, синтоїзму та оммьодо, сюгендо прагне до здобуття надприродних здібностей за допомогою віровчительних тренувань у горах. Основна увага в цьому напрямку приділяється відвідуванню гір і поклонінню їм, а також іншим езотеричним практикам і ритуалам."
  azhaliism_policy: "$SECT_AZHALIISM_NAME$"
  azhaliism_policy_desc: "Після своєї появи в Юньнані тантричні практики буддизму змішалися з китайськими, тибетськими та бірманськими традиціями, породивши щось абсолютно нове. Ачжалізм, по суті, сформувався у вигляді місцевої традиції, яка нагадує інші великі школи, але водночас відрізняється від них."
  musok_policy: "$SECT_MUSOK_NAME$"
  musok_policy_desc: "Вірування корейського шаманізму, відомого також під назвою «мусок», будуються на поклонінні божествам і духам предків. Вони існували в Кореї ще до появи буддизму. Практики та ритуали мусок досі вважаються важливою частиною корейської культури."
  mulasarvastivada_policy: "$SECT_MULASARVASTIVADA_NAME$"
  mulasarvastivada_policy_desc: "Традиції муласарвастівади, однієї з перших буддійських шкіл в Індії, майже зникли з догматів більшості буддійських течій і збереглися лише у вченнях, які проповідує тибетський буддизм, а також в Індонезії. Першою там з'явилася школа хінаяна, а муласарвастівада і тантричні практики здобули популярність за часів Шрівіджайського царства."
  mahavihara_policy: "$SECT_MAHAVIHARA_NAME$"
  mahavihara_policy_desc: "Школа тхеравада виникла на острові Сайлан після появи буддизму. Завдяки їй острів перетворився на центр релігійної думки, а буддизм отримав розвиток і поширення в сусідніх областях, особливо з початку занепаду буддизму в материковій Індії."
  burmese_buddhism_policy: "$SECT_BURMESE_BUDDHISM_NAME$"
  burmese_buddhism_policy_desc: "Попри те що буддійська течія махавіхара з острова Сайлан мала суттєвий вплив на Бірму, найбільшого поширення на її території набули інші форми буддизму — махаяна і тхеравада. При цьому там зберігалися індуїзм і деякі пережитки добуддійських вірувань. Усе це змішалося, породивши особливий вид тхеравади, дуже схожий на той, що практикується на Сайлані, але з численними вкрапленнями з махаяни та інших езотеричних традицій."
  lankavong_policy: "$SECT_LANKAVONG_NAME$"
  lankavong_policy_desc: "Століттями тайською землею поширювалися різні форми буддизму: від махаяни, що виникла під впливом китайських шкіл, до інших ранніх буддійських традицій родом з Індії. Нарешті, головним стало вчення тхеравада, що прийшло з острова Сайлан, проте досі там зберігається вплив більш ранніх традицій і навіть народних тайських вірувань."
  khmer_buddhism_policy: "$SECT_KHMER_BUDDHISM_NAME$"
  khmer_buddhism_policy_desc: "Першою формою буддизму, що з'явилася на кхмерських землях, була махаяна з суттєвими вкрапленнями тантричних вчень. Вона замінила індуїстські вірування, вже поширені в регіоні. З часом тхеравада змінила махаяну, через що відбувся суттєвий зсув у бік чернечого життя."
  sect_school_law: "Школа напряму"
  sect_school_law_desc: "Конкретна школа цього напряму, вчення якої може відрізнятися від основного."
  jodou_shinshuu_policy: "$SECT_JOUDO_SHINSHUU$"
  jodou_shinshuu_policy_desc: "Буддизм Чистої землі заснував монах на ім'я Сінран. Спочатку Сінран був прихильником вчення тендай, але з часом розчарувався в ньому і захопився практиками школи Чистої землі. Пізніше він створив на їх основі власну релігійну течію. Одним з головних ритуалів буддизму Чистої землі є повторення мантри #italic нембуцу#! для вираження подяки Будді Амітабхі. Звучить вона так: #italic «наму аміда буцу»#!."
  nichiren_policy: "$SECT_NICHIREN_NAME$"
  nichiren_policy_desc: "Ця школа, яку заснував буддійський монах Нітірен, запозичила більшу частину своєї доктрини з #italic Сутри лотоса#!, проте виступає проти будь-яких відхилень від основного вчення, езотеричних практик і ритуалів. У її догматах стверджується, що на досягнення просвітлення впливають вчинки людини та їх наслідки, а не тільки медитація."
  nyigma_policy: "$SECT_NYIGMA_NAME$"
  nyigma_policy_desc: "Найстаріша школа тибетського буддизму володіє унікальними вченнями, які не зустрічаються в інших буддійських течіях. Вона вважає, що #italic Дзогчен#!, або «Велике вдосконалення», є найпрямішим шляхом до просвітлення, ставлячи це вчення вище за інші, що просуваються в інших школах. Однак вона піддається критиці з боку конкуруючих шкіл за відсутність зв'язку з пізнішими індійськими тантричними практиками, оскільки її тексти сягають періоду першої появи буддизму в Тибеті."
  kadam_policy: "$SECT_KADAM_NAME$"
  kadam_policy_desc: "Приділяючи особливу увагу співчуттю, навчанню та дисципліні, школа кадам прагне відшукати прямий і зрозумілий шлях до просвітлення в межах махаянського буддизму. Вона також ставить своєю метою залучення мирян у повсякденне буддійське життя, залишаючи тантричні практики більш досвідченим посвяченим."
  kagyu_policy: "$SECT_KAGYU_NAME$"
  kagyu_policy_desc: "Школа каг'ю ставить у центр уваги #italic махамудру#!, або «Велику печатку», що символізує пізнання внутрішньої порожнечі реальності. Попри те що школа розпалася на кілька підшкіл, у кожної з яких є свої тлумачення та практики, усі вони визнають махамудру."
  sakya_policy: "$SECT_SAKYA_NAME$"
  sakya_policy_desc: "Цей напрямок з'явився в однойменному монастирі Сак'я і віддає перевагу системі медитації #italic ламдре#!, суть якої полягає в тому, що шлях і його результат взаємно укладені один в одному. Ці вказівки до практики містяться в #italic хеваджра-тантрі#! та пояснювальних тантрах школи."
  jonang_policy: "$SECT_JONANG_NAME$"
  jonang_policy_desc: "Основною практикою школи джонанг є калачакра-тантра, а сама школа вважається захисницею філософського вчення жентонг. Згідно з її вченням, фізична реальність «порожня», «вільна» від власного існування, тоді як абсолютна реальність, або Будда-природа, «вільна» від усього, крім себе самої. Будда-природа наповнена власними пробудженими якостями."
  hun_frontier_fortresses: "Прикордонні фортеці"
  hun_frontier_fortresses_desc: "Наші володіння оточує безліч агресивних сусідів. Щоб захистити наш народ, ми повинні зводити укріплення на кордонах і стежити за їх належним фінансуванням та постачанням."
  vegvar_system: "Лінія Вегвар"
  vegvar_system_desc: "[GetEstateName('crown_estate')] регулярно виділяють кошти на підтримання мережі потужних укріплень по всьому нашому королівству."
  not_maintained: "Занедбані фортеці"
  not_maintained_desc: "Наші колись великі фортеці в занепаді, оскільки [GetEstateName('crown_estate')|l] не в змозі оплачувати їхнє утримання."
  enclosure_movement: "Обгороджування"
  enclosure_movement_desc: "При обгороджуванні общинні землі обносять стінами або огорожею, завдяки чому ці землі стають приватними володіннями."
  enclosure_allowed: "Дозвіл обгороджування"
  enclosure_allowed_desc: "Дозволяючи обгороджування, ми дозволяємо передачу общинних земель, які використовує місцеве населення, у приватну власність для виняткового користування власника."
  enclosure_disallowed: "Заборона обгороджування"
  enclosure_disallowed_desc: "Общинні землі отримують захист від обгороджування і не можуть передаватися в приватну власність."
  enclosure_act: "Закон про обгороджування"
  enclosure_act_desc: "Общинні землі потрібно й надалі обгороджувати або передавати в приватну власність, щоб допомагати розвитку товарного сільського господарства та промисловості."
  fra_taille: "Талья"
  fra_taille_desc: "#italic Талья#! — це податок, що стягується з кожного господарства залежно від кількості належної йому землі. [GetEstateName('clergy_estate')] та [GetEstateName('nobles_estate')|l] цим податком не обкладаються."
  permanent_tax: "Постійний податок"
  permanent_tax_desc: "Вводиться #italic талья#! як основний податок, що розширить можливості країни щодо отримання доходів."
  exceptional_only: "Надзвичайний податок"
  exceptional_only_desc: "Можна встановити #italic талью#! як надзвичайний податок на випадок важких часів."
  fra_5_percent_tax: "П'ятивідсотковий податок Машо"
  fra_5_percent_tax_desc: "Генеральний контролер фінансів Франції запропонував новий податок у розмірі однієї двадцятої частини річного доходу."
  five_percent_tax: "Для всіх станів"
  five_percent_tax_desc: "П'ятивідсотковий податок стягується з усіх підданих, незважаючи на їхнє становище."
  no_five_percent_tax: "Тільки для селян"
  no_five_percent_tax_desc: "Тільки [ShowEstateTypeName('peasants_estate')|l] зобов'язані платити п'ятивідсотковий податок."
  eng_taxation_law: "Оподаткування"
  eng_taxation_law_desc: "Стабільні доходи — запорука ефективності уряду. Створивши законодавчу базу, ми зможемо регулювати збір податків з людей та організацій."
  income_tax: "Прибутковий податок"
  income_tax_desc: "Податок стягується безпосередньо з [Concept('pops', 'груп населення')|e], при цьому застосовується прогресивна шкала ставок, згідно з якою [Concept('estates', 'стани')|e] сплачують податки в розмірі, що залежить від отриманого доходу."
  trade_tax: "Торгові податки"
  trade_tax_desc: "Основна частина податкових надходжень припадає на митні збори та акцизи, які сплачують [GetEstateName('burghers_estate')|l]."
  traditional_tax: "Традиційне оподаткування"
  traditional_tax_desc: "Податки стягуються з [Concept('estates', 'станів')|e], а привілеї визначають їхню величину. Все як зазвичай."
  factory_working_conditions_law: "Умови праці на фабриках"
  factory_working_conditions_law_desc: "Розширення нашої обробної промисловості прискорює індустріалізацію та підвищує виробничі потужності. Враховуючи, наскільки важливими для економіки стають працівники фабрик, необхідно узаконити їхні права, щоб не дозволити їх експлуатувати."
  decent_conditions: "Гідні умови"
  decent_conditions_desc: "Робочий день обмежений дванадцятьма годинами, проводяться регулярні інспекції робочих місць."
  fair_conditions: "Справедливі умови"
  fair_conditions_desc: "Крім регламентованого графіка та трудових інспекцій, неповнолітнім працівникам надається додатковий захист у вигляді обмеження тривалості робочого дня та можливості здобути освіту."
  unregulated_conditions: "Нерегламентовані умови"
  unregulated_conditions_desc: "Власники фабрик вільні розпоряджатися справами на свій розсуд. Нещасні випадки трапляються регулярно, працівники нещадно експлуатуються та часто гинуть на виробництві."
  trade_unions_law: "Профспілки"
  trade_unions_law_desc: "На ранніх етапах індустріалізації профспілки відіграють вирішальну роль у захисті прав робітників та визначенні умов праці. Ці об'єднання пропонують роботодавцям укладати колективні договори, домагаючись підвищення заробітної плати, скорочення робочого дня та створення безпечного робочого середовища."
  trade_unions_allowed: "Дозвіл профспілок"
  trade_unions_allowed_desc: "Працівники можуть брати участь в обговоренні умов колективних договорів, а також проводити страйки та акції протесту, щоб за допомогою призупинення виробництва змусити роботодавців виконати вимоги."
  trade_unions_prohibited: "Заборона профспілок"
  trade_unions_prohibited_desc: "Працівникам не дозволяється об'єднуватися або вживати будь-яких колективних дій. Страйки заборонені законом."
  guilds_of_florence: "Панування флорентійських цехів"
  guilds_of_florence_desc: "Купецькі гільдії або цехи — комерційні інститути, які впливають на життя у Флоренції та є важливим чинником нашого процвітання. При всій загальній важливості таких організацій деякі з них можуть розраховувати на особливу владу."
  consiglio_maggiore: "Велика рада"
  consiglio_maggiore_desc: "#italic Велика рада#!, куди входять аристократи та представники інших станів, зокрема [GetEstateName('burghers_estate')|l], ремісники та банкіри, відповідає за олігархічний апарат нашої республіки."
  arti_minori: "Молодші цехи"
  arti_minori_desc: "#italic Молодші цехи#! — це дрібні торговельні об'єднання, що представляють ремісників та інші професії меншого масштабу та значення. Ці цехи спеціалізуються на таких навичках, як виготовлення сідел, слюсарна або столярна справа, і мають найнижчий статус у купецькому середовищі."
  arti_mediane: "Середні цехи"
  arti_mediane_desc: "#italic Середні цехи#! займають проміжне положення між #italic молодшими#! та #italic старшими#!. Вони представляють ремесла та професії невеликого масштабу та впливу (наприклад, ковалів та шевців), виступаючи як сполучна ланка між менш значущими вузькоспеціалізованими ремеслами та головними галузями."
  arti_maggiori: "Старші цехи"
  arti_maggiori_desc: "#italic Старші цехи#! — це найбільші та найвпливовіші купецькі гільдії. Вони представляють великі галузі та ремесла зі значною економічною та політичною вагою, такі як текстильна промисловість, а також банківська та фінансова справа."
  ordinances_of_justice: "Установлення справедливості"
  ordinances_of_justice_desc: "Це сукупність правових норм, що обмежують вплив аристократів, які не узгоджують свої дії з вимогами центральної влади. Ці зводи законів розроблені, щоб обмежити могутність представників знаті."
  por_estudo_geral_law: "Дім загального навчання"
  por_estudo_geral_law_desc: "Дім загального навчання — національний #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!, в якому жителі нашої скромної країни можуть отримати гідну освіту. При цьому особливо важливе його близьке розташування до столиці."
  por_estudo_in_coimbra: "$por_estudo_geral_law$ у #TOOLTIP:LOCATION,coimbra,X #L Коїмбрі#!#!"
  por_estudo_in_coimbra_desc: "Побудувавши національний #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#! в #TOOLTIP:LOCATION,coimbra,X #L Коїмбрі#!#!, ми забезпечимо собі незалежність та переконаємо стани здобути освіту."
  por_estudo_in_lisbon: "$por_estudo_geral_law$ у Лісабоні"
  por_estudo_in_lisbon_desc: "Будівництво дому загального навчання в зоні впливу двору дозволить нам не тільки централізувати владу, а й краще контролювати діяльність #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!."
  teu_amber_monopoly_law: "Монополія на бурштин"
  teu_amber_monopoly_law_desc: "[ShowGoodsName('amber')] — один із найцінніших ресурсів нашої країни. Торгівля бурштином має величезне значення для країни і повинна ретельно регулюватися."
  state_controlled_amber_gathering: "Країна контролює видобуток"
  state_controlled_amber_gathering_desc: "Країна зберігає за собою виключне право розпоряджатися запасами #TOOLTIP:GOODS,amber,X #L бурштину#!#!. Експорт цього цінного товару повністю контролюється урядом, що сприяє зміцненню влади правлячого класу."
  burghers_controlled_amber_gathering: "[GetEstateNameWithNoTooltip('burghers_estate')] як розпорядники бурштину"
  burghers_controlled_amber_gathering_desc: "Мабуть, найкраще, щоб #TOOLTIP:GOODS,amber,X #L бурштином#!#! безпосередньо розпоряджалися ті, хто ним торгує. Усунувши посередників, ми значно збільшимо наші загальні доходи."
  peasant_controlled_amber_gathering: "Видобутком займаються [GetEstateNameWithNoTooltip('peasants_estate')|l]"
  peasant_controlled_amber_gathering_desc: "#TOOLTIP:GOODS,amber,X Бурштином#! повинні розпоряджатися ті, хто його видобуває. Контролювати його видобуток буде #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#!."
  jap_sakoku_law: "Взаємодія із заморськими країнами"
  jap_sakoku_law_desc: "$japan_region$ завжди мала перевагу, оскільки була відокремлена морем від інших країн. Ця віддаленість дозволяє легко закрити кордони нашої країни для зовнішнього світу."
  sakoku_enabled: "Сакоку"
  sakoku_enabled_desc: "Позбувшись зовнішнього впливу, наша країна неодмінно підвищить продуктивність та забезпечить собі економічне зростання."
  sakoku_disabled: "Відкриття країни для світу"
  sakoku_disabled_desc: "Як наші кордони відкриті для світу, так і ми відкриті для нових товарів та ідей."
  jap_buke_shohatto: "Буке сьохатто"
  jap_buke_shohatto_desc: "Це збірка основоположних правил належної поведінки для самурая. Вони покликані надихати самураїв на самовдосконалення."
  jap_buke_shohatto_enforced: "Суворе дотримання «Буке сьохатто»"
  jap_buke_shohatto_enforced_desc: "Самураї мають чітку модель поведінки, якої вони зобов'язані дотримуватися на шляху самовдосконалення."
  jap_buke_shohatto_guidelines: "Настанови «Буке сьохатто»"
  jap_buke_shohatto_guidelines_desc: "$jap_buke_shohatto$ вважається збіркою загальних настанов і є романтичним ідеалом для наслідування, а не суворим кодексом для сліпої покори."
  clan_residence: "Обитель клану"
  clan_residence_desc: "Необхідно ухвалити чіткі закони для визначення місць, де можуть жити голови різних кланів, щоб забезпечити політичну рівновагу в країні."
  appointed_posts_policy: "Призначення"
  appointed_posts_policy_desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] призначає голів різних кланів на певні посади в обмін на відданість. Такий підхід забезпечує гнучкість в управлінні країною."
  enable_grant_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('grant_shugo_office')]»"
  enable_revoke_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('revoke_shugo_office')]»"
  enable_claim_shugo_office_tt: "Доступна [Concept('action', 'дія')|e] «[ShowGenericActionName('claim_shugo_office')]»"
  established_domains_policy: "Визнані володіння"
  established_domains_policy_desc: "Клани мають спадкові володіння. Це полегшить роботу бюрократії #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L сьогунату#!#! та дозволить зосередитися на важливіших завданнях. Однак таке становище призведе і до посилення кланів."
  sankin_kotai_policy: "Санкін котай"
  sankin_kotai_policy_desc: "Санкін котай — це система, згідно з якою васали #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L сьогуна#!#! поперемінно живуть то в столиці, то на своїх землях. Перебуваючи в столиці, вони, звісно ж, повинні демонструвати своє багатство, що заважає їм замишляти проти сюзерена."
  nav_adaptability: "Наваррська пристосовність"
  nav_adaptability_desc: "Ми затиснуті між двома великими державами, тому були змушені пристосуватися або загинути. Попри невеликі розміри, наше королівство вижило завдяки продуманим союзам та стрімким військовим діям. Здатність швидко співвідносити свої дії з певними потребами — перевага, яку ми зобов'язані зберегти."
  belligerent_stance: "Войовнича позиція"
  belligerent_stance_desc: "Щоб убезпечити країну, ми повинні діяти непримиренно. Потрібно будь-якими способами донести до агресорів, що напад на нас дорого їм обійдеться."
  conciliatory_stance: "Примирлива позиція"
  conciliatory_stance_desc: "Час битв минув, і ми повинні активніше задіювати дипломатію. Зрештою, перо може бути сильнішим за меч."
  defensive_stance: "Оборонна позиція"
  defensive_stance_desc: "Наш край суворий, як і наш народ. Нехай вороги прийдуть і окроплять ці землі своєю кров'ю, це лише підвищить врожаї."
  offensive_stance: "Наступальна позиція"
  offensive_stance_desc: "Ми нікого не боїмося, адже, як свідчить стара приказка, «найкращий захист — це напад». Вдаримо першими і доведемо, що ми небезпечніші за тих, хто загрожує нашому існуванню!"
  maiestas_carolina: "Кодекс Maiestas Carolina"
  maiestas_carolina_desc: "Цей звід правил і положень був складений через те, що #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! набули величезної влади, і її планувалося суттєво обмежити. Кодекс передбачає передачу власності знатних сімей країні за певних обставин, а також обмеження найширших повноважень, якими була наділена аристократія на всій території королівства."
  order_of_chivalry_law: "Лицарський орден"
  order_of_chivalry_law_desc: "Цей закон сягає корінням у поєднання релігійних і придворних традицій. Він втілює спадщину лицарів, які присвятили себе дотриманню #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! ідеалів і благодійності. Ці ордени були засновані для захисту паломників, які прямували до Святої землі, дотримання обітниць нестяжання, послуху та безшлюбності, але з часом трансформувалися в символ престижу та спосіб віддавати почесті видатним особистостям."
  has_not_assumed_chivalric_order_in_last_25_years_tt: "За останні #Y 25 років#! ми не засновували жоден #Y $order_of_chivalry_law$#!."
  order_of_saint_george_policy: "Орден Святого Георгія"
  order_of_saint_george_policy_desc: "Орден Святого Георгія спочатку називався Братством лицарів Святого Георгія. Ця державна реформа втілює прихильність ідеалам лицарства та честі, а також оспівує ці цінності за допомогою лицарських турнірів і фестивалів."
  order_of_the_ermine_policy: "Орден Горностая"
  order_of_the_ermine_policy_desc: "Орден Горностая черпає натхнення в #L [GetCountry('ENG').GetAdjective|l]ому#! Ордені Підв'язки. Символом горностая, що уособлює бездоганну особисту честь, орден нагороджує чоловіків і жінок незалежно від їхнього соціального статусу за виняткові заслуги перед герцогством #TOOLTIP:AREA,brittany_area,X #L Бретань#!#!."
  order_of_the_dragon_policy: "Орден Дракона"
  order_of_the_dragon_policy_desc: "Орден Дракона, або #italic «Товариство Дракона»#!, покликаний захищати #L [GetCountry('HUN').GetAdjective|l]у#! монархію, #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! церкву та #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#! загалом від [GetCountry('TUR').Custom('longname_ru_GEN')], єретиків і язичників. Він створений за образом Ордена Святого Георгія та під впливом духу доби хрестових походів. Цей орден об'єднує #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#! та #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#! під символами уробороса та червоного хреста, забезпечує колективний захист від зовнішніх і внутрішніх загроз, а також пропонує #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#! королівський захист і почесті в обмін на їхню вірність."
  order_of_the_band_policy: "Орден Пов'язки"
  order_of_the_band_policy_desc: "Орден Пов'язки складається з найкращих лицарів, які клянуться у вірності та послуху правителю #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_GEN')|L]#!#!. Його члени зобов'язані дотримуватися високих стандартів бездоганної придворної поведінки, регулярно брати участь у лицарських турнірах і, перш за все, бути відданими та вірними своєму правителю."
  order_of_the_swan_policy: "Орден Лебедя"
  order_of_the_swan_policy_desc: "Орден Лебедя покликаний зміцнювати благочестя та поширювати культ Діви Марії. Серед прихильників цього ордену багато принців правлячої династії, а також чимало #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!."
  order_of_the_black_eagle_policy: "Орден Чорного орла"
  order_of_the_black_eagle_policy_desc: "Світський орден Чорного орла — це скоріше військова, ніж духовна організація. Серед учасників ордену є члени королівської родини, іноземні монарші особи та видатні полководці, відзначені нагородами за свої заслуги."
  order_of_the_white_eagle_policy: "Орден Білого орла"
  order_of_the_white_eagle_policy_desc: "Військовий орден Білого орла вручається найвідданішим прихильникам країни та нашим найвидатнішим громадянам за їхню службу вітчизні. Крім того, цим орденом удостоюють високопоставлених гостей, які вшанували нас своєю присутністю."
  society_with_the_donkey: "$noble_society_baden_palatine$"
  society_with_the_donkey_desc: "$noble_society_baden_palatine_desc$"
  society_lion_nassau: "$noble_society_nassau$"
  society_lion_nassau_desc: "$noble_society_nassau_desc$"
  society_bengler_mainz: "$noble_society_mainz$"
  society_bengler_mainz_desc: "$noble_society_mainz_desc$"
  society_furspang_franconia: "$noble_society_franconia$"
  society_furspang_franconia_desc: "$noble_society_franconia_desc$"
  society_elephant_tyrol: "$noble_society_tyrol$"
  society_elephant_tyrol_desc: "$noble_society_tyrol_desc$"
  society_hubertus_cologne: "$noble_society_cologne$"
  society_hubertus_cologne_desc: "$noble_society_cologne_desc$"
  six_ministries_overseer_law: "Нагляд за шістьма міністерствами"
  six_ministries_overseer_law_desc: "Роботу #TOOLTIP:LAW,six_ministries,X #L шести міністерств#!#! повинен контролювати окремий орган влади — а можливо, і сам монарх."
  chi_grand_chancellorship: "Державна рада"
  chi_grand_chancellorship_desc: "Шість міністрів підпорядковуються канцелярії, куди входять старший (лівий) і молодший (правий) канцлери, причому в руках першого з них зосереджено більше міністерських повноважень."
  chi_grand_secretariat: "Внутрішньопалацовий секретаріат"
  chi_grand_secretariat_desc: "Шість міністерств повинні будуть передати всі свої документи до внутрішньопалацового секретаріату, який проведе перевірку та підготує їх для подальшої передачі монарху."
  chi_direct_report: "Пряме підпорядкування"
  chi_direct_report_desc: "Шість міністерств звітують про свою роботу безпосередньо перед монархом. Це зміцнює його авторитет, але може негативно позначитися на ефективності правління."
  ashta_pradhan_council_law: "Ашта Прадхан"
  ashta_pradhan_council_law_desc: "$mhr_ashta_pradhan_desc$"
  apc_peshwa_focus_policy: "Пешва"
  apc_peshwa_focus_policy_desc: "Пешва — це перший радник, відповідальний за загальне управління країною.\nРада, або Ашта Прадхам, надасть пешві більше повноважень, збільшивши тим самим його вплив у країні."
  apc_mazumdar_focus_policy: "Мазумдар"
  apc_mazumdar_focus_policy_desc: "Мазумдар — це скарбничий, відповідальний за фінансові справи країни.\nРада надасть мазумдару більше повноважень, збільшивши тим самим його вплив у країні."
  apc_sacheev_focus_policy: "Сачів"
  apc_sacheev_focus_policy_desc: "Сачів — це писар, відповідальний за підготовку королівських указів та інших політик країни.\nРада, або Ашта Прадхам, надасть сачиву більше повноважень, збільшивши тим самим його вплив у країні."
  apc_waqia_navis_focus_policy: "Вакія-навіс"
  apc_waqia_navis_focus_policy_desc: "Вакія-навіс — це радник з внутрішніх справ, відповідальний за розвідку та шпигунство.\nРада надасть вакія-навісу більше повноважень, збільшивши тим самим його вплив у країні."
  apc_senapati_focus_policy: "Сенапаті"
  apc_senapati_focus_policy_desc: "Сенапаті — це головнокомандувач, відповідальний за збройні сили та оборону країни.\nРада, або Ашта Прадхам, надасть сенапаті більше повноважень, збільшивши тим самим його вплив у країні."
  apc_dabir_focus_policy: "Дабір"
  apc_dabir_focus_policy_desc: "Дабір — це міністр закордонних справ, відповідальний за дипломатію країни.\nРада, або Ашта Прадхам, надасть дабіру більше повноважень, збільшивши тим самим його вплив у країні."
  apc_nyayadhish_focus_policy: "Ньядхіш"
  apc_nyayadhish_focus_policy_desc: "Ньядхіш — це головний суддя, відповідальний за розгляд цивільних та кримінальних справ.\nРада, або Ашта Прадхам, надасть ньядхішу більше повноважень, збільшивши тим самим його вплив у країні."
  apc_panditrao_focus_policy: "Пандітрао"
  apc_panditrao_focus_policy_desc: "Пандітрао — це верховний жрець, відповідальний за релігійні питання.\nРада, або Ашта Прадхам, надасть пандитрао більше повноважень, збільшивши тим самим його вплив у країні."
  civil_registration: "Облік населення"
  civil_registration_desc: "Це система, створена для обліку всіх підданих у межах нашої країни як крок до підвищення їхнього рівня життя."
  delegated_civil_registration_policy: "Делегований $civil_registration$"
  delegated_civil_registration_policy_desc: "Ми дозволимо губернаторам контролювати процес реєстрації у своїх провінціях. Це може знизити його ефективність, але губернатори не відчуватимуть, що їхню владу обмежують."
  centralized_civil_registration_policy: "Централізований $civil_registration$"
  centralized_civil_registration_policy_desc: "Центральна влада візьме під контроль процес реєстрації, щоб підвищити її ефективність, хоча губернатори на місцях не схвалять втручання в їхню роботу."
  tax_base_system: "Базова система оподаткування"
  tax_base_system_desc: "Оподаткування — основа економіки будь-якої країни. Установивши належну податкову систему по всьому #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединному Царству#!#!, ми зможемо ефективніше користуватися багатствами наших земель."
  rice_based_tax: "Рисовий податок"
  rice_based_tax_desc: "#TOOLTIP:GOODS,rice,X #L Рис#!#! вже кілька століть вважається традиційним засобом розрахунків і збору податків. Він і далі слугуватиме основою нашої податкової системи."
  single_whip_policy: "Політика одного батога"
  single_whip_policy_desc: "$single_whip_policy$ допоможе нам зробити #TOOLTIP:GOODS,silver,X #L срібло#!#! основою для збору податків, оскільки встановлює, що всі фінансові зобов'язання перед центральним урядом повинні виплачуватися цим дорогоцінним металом."
  provincial_governorship: "Провінційне губернаторство"
  provincial_governorship_desc: "Простори #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединного Царства#!#! не мають собі рівних. Для ефективного управління нашими великими володіннями ми заснуємо систему провінційних адміністраторів."
  curtailed_governors_policy: "Обмеження губернаторів"
  curtailed_governors_policy_desc: "Губернатори провінцій здебільшого лише поширюють хабарництво та лінь. Ми повинні тримати їх на короткому повідку, щоб влада центрального уряду не зменшувалася в далеких провінціях ні на краплю."
  established_provincial_governors: "Стабільність губернаторських посад"
  established_provincial_governors_desc: "Посада губернатора провінції вельми престижна та затребувана. Призначаючи губернаторів на чітко визначені території з чітко прописаними обов'язками, ми полегшимо роботу нашого адміністративного апарату."
  zongdu_policy: "Цзунду"
  zongdu_policy_desc: "Простори #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединного Царства#!#! занадто великі, щоб ними могли керувати прості губернатори. Ми створимо посаду намісника, або цзунду, який відповідає за кілька провінцій. Таким чином місцевим чиновникам не доведеться звертатися до столиці через дрібниці, а [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle|l] зможе зосередитися на важливіших справах."
  zongdu_policy_scaling: "Обсяг #TOOLTIP:GOODS,silver,X #L срібла#!#!, видобутого в [Concept('country', 'країні')|e]"
  introduce_gaituguiliu_policy: "Гайтугуйлю"
  introduce_gaituguiliu_policy_desc: "[ShowSubjectTypeName('tusi')] — вожді племен у віддалених префектурах — є спадковими правителями місцевих етнічних меншин. Вони можуть бути корисні завдяки своєму зв'язку з народом, але в довгостроковій перспективі часто загрожують регіональній стабільності. Якщо поступово замінювати їх чиновниками, яких призначає центральний уряд, то підтримувати порядок у регіонах стане простіше."
  unlock_gaituguiliu_tt: "Відкриває [Concept('cabinet_action', 'доручення')|e] «[ShowCabinetActionName('gaituguiliu_policy')]» для лідера #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединного царства#!#!"
  lifan_yuan_policy: "Ліфаньюань"
  lifan_yuan_policy_desc: "Міністерства церемоній більше недостатньо для ефективного управління численними підданими та ленниками з віддалених регіонів усередині та за межами імперського кордону. Ми створимо відомство, яке займатиметься лише ними."
  cefeng_tizhi: "Цефен Тичжи"
  cefeng_tizhi_desc: "Система данників від самого початку була невіддільною частиною #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!, адже всі навколишні народи визнають владу, якою володіє [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle]"
  free_cefeng_tizhi_policy: "Вільний $cefeng_tizhi$"
  free_cefeng_tizhi_policy_desc: "Країни самі собою визнаватимуть владу, яку уособлює [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle|l], і падатимуть ниць перед Троном Дракона, приносячи йому данину без будь-яких спеціальних указів."
  codified_cefeng_tizhi_policy: "Кодифікований $cefeng_tizhi$"
  codified_cefeng_tizhi_policy_desc: "[GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle] отримає найбільшу вигоду від данницької системи, якщо вона буде кодифікованою та ієрархічною, адже в такому разі буде зрозуміло, які країни приносять найбільше користі Трону Дракона і, отже, заслуговують на відповідну винагороду."
  keju_examination: "Іспити Кецзюй"
  keju_examination_desc: "Імператорський іспит — система відбору найкращих та найосвіченіших кандидатів для служби в нашому бюрократичному апараті. Завдяки йому біля важелів адміністративної машини стоятимуть лише найсвітліші уми країни, і машина ця працюватиме без перебоїв."
  new_keju_formats_policy: "Нові формати Кецзюя"
  new_keju_formats_policy_desc: "Метою цієї реформи є поліпшення відбору кандидатів та потенційних чиновників під час імперських іспитів. Запровадження нових форматів випробувань та підвищення стандартів без жодних сумнівів підуть на користь системі державного управління."
  new_keju_formats_policy.tt: "Відтепер [ShowGenericActionName('conduct_keju_examination')|l] відбиратимуть найкращих кандидатів"
  focus_on_classics: "Увага до класики"
  focus_on_classics_desc: "Екзаменаційна система кецзюй століттями спиралася на класичні тексти #TOOLTIP:POLICY,confucianism_policy,X #L конфуціанства#!#! та #TOOLTIP:POLICY,daoism_policy,X #L даосизму#!#!. Відмовитися від такої традиції буде непросто."
  direct_appointment: "Пряме призначення"
  direct_appointment_desc: "Освіченість не завжди рівносильна придатності до роботи в уряді. Завдання краще доручати безпосередньо тим, хто підходить для їх виконання."
  direct_appointment.tt: "Відключає [Concept('action', 'дію')|e] «[ShowGenericActionName('conduct_keju_examination')]»"
  military_examination: "Запровадження іспиту з бойової підготовки"
  military_examination_desc: "Крім навичок державного управління, імперські іспити повинні оцінювати навички верхової їзди та стрільби з лука."
  outwards_view: "Погляд назовні"
  outwards_view_desc: "Від самого свого виникнення #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединна країна#!#! розширювала свій вплив на навколишні землі, але з огляду на загрози на кордоні не варто пускати до своїх земель усіх підряд."
  allow_trade: "Дозвіл на торгівлю"
  allow_trade_desc: "Невипадково Шовковий шлях був джерелом багатств для #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!, адже саме торгівля та контакти з іноземцями сприяють процвітанню країни."
  haijin_policy: "Хайцзінь"
  haijin_policy_desc: "Моря та океани борознить безліч небезпечних людей: пірати, контрабандисти та навіть узурпатори-початківці. Водночас морська торгівля приносить гроші та відкриття. Якщо ми хочемо залучити багатих купців та нові технології до нашої великої держави, нам слід встановити заборону морської торгівлі."
  tianxia: "Тянься"
  tianxia_desc: "Ідеї нашого територіального впливу та експансії ґрунтуються на нашому праві володарювати, дарованому самими Небесами."
  expand_the_tianxia_policy: "Розширення Тянься"
  expand_the_tianxia_policy_desc: "Суверенітет #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#! та її право на владу залишаються незаперечними, доки виконується божественний обов'язок. Усі жителі землі під Небом перебувають під захистом Драконового трону, доки піддані схиляються перед ним."
  chi_have_extra_celestial_governor_tt: "[GetUniqueInternationalOrganization('middle_kingdom').GetName] тепер може призначити ще одного губернатора."
  restrict_the_tianxia_policy: "Обмеження Тянься"
  restrict_the_tianxia_policy_desc: "Лише володарю #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#! можна довірити правити всіма землями під небом. Для Трону Дракона було б принизливо передати частину своїх повноважень молодшим країнам."
  jakun_gusa: "«Вісім прапорів»"
  jakun_gusa_desc: "Хоча система «Восьми прапорів» насамперед є нашим військом, вона також закладає основу устрою суспільства в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній країні#!#!. Щоб прапори не втратили свого сенсу, їхня роль має бути чітко визначена."
  revise_the_jakun_gusa_policy: "Перегляд «Восьми прапорів»"
  revise_the_jakun_gusa_policy_desc: "Восьмипрапорна військо служить нам вірою і правдою — громить ворогів і здобуває вирішальні перемоги. Якщо ми хочемо зберегти відмінну форму та дисципліну військ, нам потрібні реформи та поступ, інакше військо прийде в плачевний стан."
  chinese_jakun_gusa: "Китайські Вісім прапорів"
  chinese_jakun_gusa_desc: "«Вісім прапорів» вірою і правдою служили нам у північних степах, але в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній країні#!#! вони повинні влитися в #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайську#!#! систему."
  six_ministries: "Шість міністерств"
  six_ministries_desc: "Шість міністерств — це унікальний адміністративний поділ #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!. У кожного міністерства свої завдання та обов'язки."
  ministry_of_rites: "Міністерство церемоній"
  ministry_of_rites_desc: "Релігійні та палацові справи, що перебувають у віданні Лібу, вимагають граничної делікатності та уваги. Ми зможемо підтримувати проведення ритуалів та церемоній на високому рівні, якщо створимо ефективне та здібне міністерство, яке відповідає за збереження та здійснення обрядів."
  countries_more_likely_to_accept_invite_to_sect_tt: "З більшою охотою вступлять у наш [Concept('sect', 'напрямок')|e]"
  ministry_of_personnel: "Міністерство персоналу"
  ministry_of_personnel_desc: "Лібу розпоряджається всіма людьми на службі нашої адміністрації та є основою нашого уряду. Завдяки бездоганній роботі цього міністерства у нас буде достатньо чиновників для всіх урядових посад."
  better_exams_results_tt: "[Concept('action', 'Дія')|e] «[ShowGenericActionName('conduct_keju_examination')]» надаватиме кращих кандидатів"
  ministry_of_revenue: "Міністерство доходів"
  ministry_of_revenue_desc: "Хубу відповідає за все, пов'язане з грошима, від перепису населення до збору податків та визначення цінності грошей. Процвітання нашої країни залежить від бездоганної роботи цього міністерства."
  better_census_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('conduct_population_census_decree')]» призводитиме до кращих результатів"
  ministry_of_war: "Міністерство війни"
  ministry_of_war_desc: "Бінбу відповідає за всі військові питання, куди входять не тільки набір та утримання військ, а й обслуговування військових будівель, спорядження та забезпечення військ припасами. Наші військові перемоги безпосередньо залежать від наявності вмілих чиновників у цьому міністерстві."
  better_reinforce_fortification_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('reinforce_fortifications_decree')]» призведе до кращих результатів"
  ministry_of_justice: "Міністерство правосуддя"
  ministry_of_justice_desc: "Сінбу займається всіма судовими питаннями, від дрібних правопорушень і до більш серйозних злочинів, але при цьому не має влади у вищих урядових колах. Бездоганна робота цього міністерства забезпечить мирне життя в наших землях."
  better_warning_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('issue_great_warnings_decree')]» призведе до кращих результатів"
  ministry_of_works: "Міністерство праці"
  ministry_of_works_desc: "Ґунбу завідує всім будівництвом у нашій країні та відповідає за спорудження й підтримання всієї інфраструктури — не тільки будівель, але також каналів і доріг. У віданні міністерства також знаходиться управління ресурсами та стандартизація мір і ваг. Завдяки бездоганній роботі цього міністерства інфраструктура нашої країни завжди стоятиме на міцному фундаменті."
  better_infrastructure_works_results_tt: "[ShowGenericActionName('proclaim_decree')] «[ShowPolicyName('commence_infrastructure_works_decree')]» призведе до кращих результатів"
  middle_kingdom_decrees: "$middle_kingdom$"
  middle_kingdom_decrees_desc: "Імперські укази відіграють важливу роль у функціонуванні #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#! — завдяки їм [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderTitle|l] може нав'язувати свою владу підлеглим землям."
  expand_palace_bureaucracy_decree: "Розширення палацової бюрократії"
  expand_palace_bureaucracy_decree_desc: "Якщо ми хочемо зберегти ефективність та оперативність вирішення завдань, наш двір вимагає розширення та нарощування бюрократичних зусиль."
  conduct_population_census_decree: "Проведення перепису населення"
  conduct_population_census_decree_desc: "Наша величезна країна покоїться на плечах ефективної бюрократичної системи, а надійна система оподаткування спирається на ретельне ведення записів. Щоб забезпечити належну роботу бюрократії, ми почнемо перепис населення по всіх наших землях."
  increase_tariff_control_decree: "Посилення контролю над митами"
  increase_tariff_control_decree_desc: "Багатства Китаю викликають бажання чужоземних купців. Було б розумно ввести регулювання мит та поставити під контроль потік товарів, що перетинають наші кордони."
  issue_great_warnings_decree: "Видання Великих відозв"
  issue_great_warnings_decree_desc: "Поняття «дбайливе управління», «ефективні бюрократи» та «протидія корупції» часто залежать одне від одного. Таким чином, державне управління — це одна з форм моральності."
  commence_infrastructure_works_decree: "Проведення інфраструктурних робіт"
  commence_infrastructure_works_decree_desc: "Дороги — це запорука нашого подальшого процвітання. Ми займемося створенням надійної інфраструктури, щоб зв'язати свої віддалені провінції зі столицею та полегшити торгівлю."
  reinforce_fortifications_decree: "Підтримання укріплень"
  reinforce_fortifications_decree_desc: "Укріплення відіграють найважливішу роль для виживання нашої країни. Ми повинні підтримувати їх в ідеальному стані та не забувати зміцнювати вразливі ділянки."
  middle_kingdom_members: "Усього [Concept('members', 'учасників')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!"
  sinicized_cabinet_policy: "Китаїзована державна рада"
  sinicized_cabinet_policy_desc: "Наша державна рада створена за образом урядів низки наймогутніших китайських династій. Наші радники-шаншу орієнтуються на ті ж віяння та прагнуть бути компетентними й ефективними."
  limit_chinese_influence_policy: "Обмеження впливу китайців при дворі"
  limit_chinese_influence_policy_desc: "[GetCountry('CHI').GetName] чинить тиск на нас і поширює свій вплив, проте інтереси наших власних станів повинні стояти на першому місці."
  limit_chinese_traditions: "Обмеження китайських традицій"
  limit_chinese_traditions_desc: "Прагнучи вписати свої традиції в аннали історії, ми мусимо бути пильними, щоб не перетворитися на ще одну країну, залежну від великої держави."
  promote_chinese_traditions: "Популяризація китайських традицій"
  promote_chinese_traditions_desc: "Попри наш інтерес до культури та збереження своїх традицій, ми можемо отримати суттєву вигоду, вивчивши традиції наших китайських сусідів."
  vestiarium: "Вестіарій"
  vestiarium_desc: "Розробка та дотримання правових норм для управління державним майном відіграє важливу роль у справі ефективного розподілу ресурсів та контрольованого витрачання коштів. Це необхідно для державного управління та допомагає правлячим колам ухвалювати рішення згідно зі своїми пріоритетами."
  diplomatic_focus: "Дипломатична мета"
  diplomatic_focus_desc: "Предмети розподілені за категоріями відповідно до їхнього практичного та символічного значення. Вони призначені для використання на пишних державних церемоніях з метою справити враження на іноземних високопосадовців, а також як дипломатичні подарунки."
  administrative_focus: "Адміністративна мета"
  administrative_focus_desc: "Предмети розподіляються залежно від тієї користі, яку несуть для управління та фінансового планування, щоб їх можна було з толком використовувати в ході різних будівельних проєктів та для контролю над державними витратами."
  monastic_reformation_movement: "Монастирський реформаторський рух"
  monastic_reformation_movement_desc: "Стяжателі та нестяжателі розрізняються поглядами на значення багатства для церкви та його вплив на духовне життя духовенства та пастви."
  non_possessors: "Нестяжателі"
  non_possessors_desc: "Нестяжателі вважають, що церква повинна дистанціюватися від матеріальних благ і вести більш монастирський та споглядальний спосіб життя. Відмова від земних благ важлива, оскільки тільки так можна встановити тісніші стосунки з Богом. Рух перебуває під сильним впливом вчення Ніла Сорського."
  possessors: "Стяжателі"
  possessors_desc: "Стяжателі виступають на підтримку церкви в питанні володіння землею та майном, вважаючи, що церкві необхідно володіти матеріальними благами, щоб виконувати свої духовні та соціальні зобов'язання, такі як благодійна діяльність, утримання духовних установ, розвиток інфраструктури та надання освіти."
  sobornoye_ulozheniye_policy: "Соборне уложення"
  sobornoye_ulozheniye_policy_desc: "Соборне уложення є основоположним зведенням правових та суспільних норм, яке адаптує закони до умов країни з сильною централізованою владою та чіткою соціальною ієрархією. Воно ґрунтується на чинному зведенні законів та включає деякі елементи візантійського права, закріплюючи станові відмінності та створюючи правову систему, яка відображає переважаючі політичні та релігійні віяння того часу."
  intellectual_movements: "Рухи інтелектуалів"
  intellectual_movements_desc: "Ідеологічні течії XIX століття розділяють людей настільки, що виникають цілі рухи, кожен з яких виростає з очевидних розбіжностей між різними філософськими, політичними та культурними точками зору."
  slavophiles: "Слов'янофіли"
  slavophiles_desc: "Слов'янофіли підкреслюють важливу роль православ'я, общинності, збереження традиційних цінностей, а крім того, піддають критиці матеріалізм, індивідуалізм та поверхневу природу західної культури. Вони віддають перевагу більш ізольованому шляху розвитку, що сприяє збереженню унікальної культурної та духовної спадщини."
  westernizers: "Західники"
  westernizers_desc: "Західники цінують тісніші зв'язки з Європою та вважають, що всі повинні орієнтуватися на західну культуру. Запозичення західних ідей, інститутів та технологій має стати пріоритетом, який дозволить провести швидку модернізацію, індустріалізацію та соціальні реформи. Такі поняття, як культурна самобутність та духовна єдність, не мають великого значення."
  fra_fouage_tax: "Подимна подать"
  fra_fouage_tax_desc: "Це великий податок на вогнище, що стягується з селян, який йде на покриття зростаючих витрат державної скарбниці."
  allowed_fouage_tax: "Введення подимної податі"
  allowed_fouage_tax_desc: "Країна почне стягувати податок на вогнище для покриття зростаючих витрат скарбниці, що сильно розлютить селян."
  pause_on_fouage_collection: "Скасування подимної податі"
  pause_on_fouage_collection_desc: "Після скасування податку на вогнище невдоволення селян країною вщухло."
  couteume_de_normaundie: "Норманське право"
  couteume_de_normaundie_desc: "У закріплених законом звичаях [GetCountry('NRM').Custom('longname_ru_GEN')] підкреслюються земельні права феодалів, привілеї знаті та регіональна автономія. Спираючись на традиції децентралізації, норманське право є стійкою правовою системою, яка забезпечує міцність влади аристократії та зберігає самобутній вигляд [GetCountry('NRM').Custom('rank_ru_GEN')|l]."
  pronoia_system: "Система проній"
  pronoia_system_desc: "Система проній використовується для тимчасового пожалування імператорських фіскальних прав окремим особам або організаціям. До них належать права на збір податків або отримання доходів з різних джерел. На відміну від феодальної системи, що існувала в Європі того часу, пронії не підлягали поступці або передачі у спадок, і право власності зрештою залишалося за імператором. В обмін на ці привілеї система надавала главі країни можливість скликання військ у разі потреби та передбачала їх самозабезпечення."
  reformed_pronoia_system: "Реформована система проній"
  reformed_pronoia_system_desc: "Щоб уникнути зміцнення влади проніарів на наших землях, ми змінили систему таким чином, щоб закрити будь-які лазівки, які дозволяли поступатися або передавати титул проніара у спадок."
  new_corpus_juris_civilis: "Corpus Juris Civilis"
  new_corpus_juris_civilis_desc: "Цей вичерпний звід законів, указів та постанов створений за наказом імператора Юстиніана та охоплює багатовікову історію римського права. Він складається з чотирьох частин — «Кодексу», «Дигестів», «Інституцій» та «Новел», — де висвітлені фундаментальні принципи управління та правосуддя. Збірник надає базу нашої легітимності, дозволяє уніфікувати правозастосовні практики та забезпечити належне функціонування уряду."
  council_of_three_lands_policy: "Ваад трьох земель"
  council_of_three_lands_policy_desc: "Цей центральний орган єврейського самоврядування, відповідальний за питання віри та судочинства, створений з метою поширення релігійної терпимості та захисту свого народу від переслідувань."
  piotrokow_wislica_statutes: "Віслицько-Петроковські статути"
  piotrokow_wislica_statutes_desc: "Віслицько-Петроковські статути є всеосяжним і надзвичайно важливим зводом правил та норм, що визначають наше законодавство та створюють міцну основу для майбутнього нашого народу. Їхня дія зачіпає різні аспекти життя суспільства — від приватного та публічного права до обов'язків кожного соціального класу."
  rentekammer_policy: "Казначейство"
  rentekammer_policy_desc: "#italic Казначейство#! займеться нашими фінансами, а #italic скарбник#! буде звітувати особисто перед правителем. Це дозволить нам ефективніше управляти фінансами країни."
  dan_regional_law: "Регіональні закони Данії"
  dan_regional_law_desc: "Наявні у нас регіональні правові системи включають зводи законів Ютландії, Зеландії та Сконе. Незважаючи на їхній регіональний характер, вони представлятимуть волю всього #L [ShowCultureName('danish')|l]ого#! народу."
  dan_danske_lov: "Данський кодекс"
  dan_danske_lov_desc: "Єдиний звід законів для нашої країни дозволить створити нову уніфіковану правову систему, в межах якої працюватиме наш уряд і до якої апелюватимуть наші піддані."
  examination_system_policy_korean: "Кваго"
  examination_system_policy_chinese: "Кецзюй"
  examination_system_policy_shu_language: "Коцзюй"
  examination_system_policy_xiang_language: "Коцзюй"
  examination_system_policy_gan_language: "Куоцзюй"
  examination_system_policy_yue_language: "Фокьой"
  examination_system_policy_min_language: "Куогу"
  examination_system_policy_wu_language: "Кхуцзюй"
  examination_system_policy_kejia_language: "Кхокі"
  examination_system_policy_jin_language: "Кхуецзюй"
  examination_system_policy_vietnam: "Кхоа банг"
  imperial_examination_law: "Система іспитів"
  imperial_examination_law_desc: "Охочі вступити на службу та стати урядовими чиновниками повинні скласти низку іспитів на знання конфуціанської літератури та питань управління країною."
  continue_the_imperial_examination: "Безперервна дія"
  continue_the_imperial_examination_desc: "Ця політика забезпечує безперервну дію системи державних іспитів, як це й було протягом століть."
  abolish_imperial_examination: "Скасувати систему іспитів"
  abolish_imperial_examination_desc: "Скасування системи іспитів значно знизить соціальну мобільність, що, безумовно, вигідно тим, хто зараз при владі. При призначенні нових чиновників враховуватимуться не їхні реальні заслуги, а особисті рекомендації впливових людей, які, поза всяким сумнівом, керуватимуться своїми інтересами."
  status_of_the_han_law: "Становище ханьців"
  status_of_the_han_law_desc: "Наша династія зародилася за межами споконвічних територій #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!, тому більшість #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#! вважають нас чужинцями."
  maintain_status_quo_in_han_policies: "Прийняття китайської бюрократії"
  maintain_status_quo_in_han_policies_desc: "Нашому уряду варто забути про колишні порядки та освоїти нові методи роботи, щоб заслужити повагу чиновників з числа #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#!."
  limit_the_han_powers: "Заборона на чиновницькі посади"
  limit_the_han_powers_desc: "Вплив #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайців#!#! настільки великий, що ставить під загрозу владу старої #L [GetUniqueInternationalOrganization('middle_kingdom').GetLeaderCountry.GetCulture.GetName|l]ої#! гвардії. Треба негайно заборонити їм обіймати важливі державні посади."
  mch_queue_hair: "Тіфаіфу"
  mch_queue_hair_desc: "Політика тіфаіфу спрямована на культурну асиміляцію #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьців#!#!. Насамперед, вони повинні будуть змінити свої зачіски на маньчжурські коси."
  enforce_queue_hair: "Насадження біаньцзи"
  enforce_queue_hair_desc: "#TOOLTIP:CULTUREGROUP,chinese_group,X #L Ханьці#!#! будуть зобов'язані голити передню частину голови та відрощувати волосся на потилиці, щоб заплітати їх у традиційні маньчжурські коси."
  queue_hair_status_quo: "Носіння ханьфу"
  queue_hair_status_quo_desc: "Щоб відповідати панівній культурі нашої країни, маньчжурські чиновники носитимуть ханьфу — традиційний #TOOLTIP:CULTUREGROUP,chinese_group,X #L ханьський#!#! одяг."
  kor_currency: "Основна валюта"
  kor_currency_desc: "Вибір основної валюти значно вплине на економічні та соціальні процеси всередині країни."
  kor_jeohwa: "Чохва"
  kor_jeohwa_desc: "Щоб стимулювати розвиток економіки, можна створити нову паперову валюту — чохва. Серед іншого, це дозволить перейти до #TOOLTIP:SOCIETAL_VALUE,capital_economy_vs_traditional_economy,X #L капіталістичної#!#! системи."
  kor_barter_economy: "Бартерна економіка"
  kor_barter_economy_desc: "Люди також можуть обмінюватися рівними за вартістю товарами або послугами."
  kor_metal_coinage: "Карбування металевих монет"
  kor_metal_coinage_desc: "Наші спроби впровадити металеві монети завжди закінчувалися невдачею через брак ресурсів. Можливо, тепер усе буде інакше."
  kor_chinese_currency: "Китайська валюта"
  kor_chinese_currency_desc: "Щоб не витрачати сили та ресурси на створення та підтримку власної валюти, ми можемо просто завозити в країну монети з Китаю."
  kor_scale_chinese_currency: "За рахунок думки #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! про нашу країну."
  spa_inquisition_policy: "Іспанська інквізиція"
  spa_inquisition_policy_desc: "Наша зброя — раптовість! Раптовість і страх… Страх і раптовість… А ще — безжальність!"
  mesta_council_law: "Рада Мести"
  mesta_council_law_desc: "Рада Мести захищає права та інтереси власників домашньої худоби в нашій країні."
  quadrillas_organization: "Куадрильяс"
  quadrillas_organization_desc: "Куадрильяс, основна організація Мести, виникла в ряді найважливіших міст, що займаються вівчарством. Вона наглядає за нашими стадами мериносових овець та забезпечує їх безпеку."
  right_of_possesion: "Право володіння"
  right_of_possesion_desc: "Право володіння регулює орендну плату за користування пасовищами та є юридичною підставою для випасу овечих стад Мести."
  laws_of_burgos: "Бургоські закони"
  laws_of_burgos_desc: "Цей звід законів є правовою основою для нас та наших підданих у колоніальних володіннях. Особливу увагу в ньому приділено правам туземного населення та його організації в систему енком'єнд."
  new_laws_indies: "Нові закони"
  new_laws_indies_desc: "Нові закони є вдосконаленим варіантом Бургоських законів та посилюють наш контроль над колоніальними володіннями."
  siete_partidas_law: "Сім партид"
  siete_partidas_law_desc: "#italic $siete_partidas_law$#!, або Семичастинний кодекс, є збірником законів, складеним королем Кастилії Альфонсо X з метою уніфікації законодавства королівства. У них увага приділяється не тільки правовим нормам, а й питанням моралі."
  dop_law_comuneros_parliament: "Посилені кортеси"
  dop_law_comuneros_parliament_desc: "Наш парламент, кортеси, посилився і став основною політичною силою в країні завдяки боротьбі з комунерос."
  cas_mita_system: "Міта"
  cas_mita_system_desc: "$cas_mita_system$ — це примусова праця корінного населення, яка спочатку практикувалася в імперії інків. Громади зобов'язані постачати нам робочу силу, зокрема для видобутку срібла на рудниках у Потосі."
  nueva_recopilacion_policy: "Новий звід"
  nueva_recopilacion_policy_desc: "Новий обширний звід правил нашої країни, який прискорить процес централізації та забезпечить контроль над територіями."
  spa_reformed_nueva_recopilacion_policy_tt: "В результаті [Concept('event', 'події')|e] «$flavor_cas.50.title$» сформовано «Новий звід»."
  leyes_de_toro_policy: "Закони Торо"
  leyes_de_toro_policy_desc: "Збірник законів, складений на догоду різним станам нашої країни, і зокрема — дворянам. Крім іншого, він встановлює майорат як основний порядок успадкування майна."
  ordenamiento_de_alcala_policy: "Закони Алькали"
  ordenamiento_de_alcala_policy_desc: "$ordenamiento_de_alcala_policy$ — це правовий збірник, що об'єднує та впорядковує місцеві закони. Він також скасовує низку старих звичаїв та привілеїв, тим самим зміцнюючи центральну владу."
  sea_beggars_policy: "Морські жебраки"
  sea_beggars_policy_desc: "Видавши каперські свідоцтва всім охочим нам служити, ми збільшимо свій флот без необхідності будувати нові кораблі."
  kilwan_merchant_navy: "$ZAN_ADJ$ий торговий флот"
  kilwan_merchant_navy_desc: "Завдяки віковому досвіду мореплавства та доступу до якісних бавовни та деревини ми змогли створити найвеличніший торговий флот. Ці кораблі, побудовані за передовими технологіями та з використанням новітніх матеріалів, стали гордістю нашого народу."
  smugglers_haven: "Рай для контрабандистів"
  smugglers_haven_desc: "Пірати не змогли б займатися морським розбоєм без можливості збуту награбованого. Ми повинні створити в республіці сприятливі умови для їхньої діяльності."
  sco_clan_holdings: "Розподіл земель шотландських кланів"
  sco_clan_holdings_desc: "Порядок розподілу #L [GetCountry('SCO').GetAdjective|l]их#! земель між кланами залежить від їхнього впливу: чим більший і сильніший клан, тим більше володінь він отримує. Землі клану передаються безпосередньо спадкоємцю за винятком тих випадків, коли він позбавляється титулу або сам титул скасовується."
  inherited_clan_holdings: "Пряме успадкування"
  inherited_clan_holdings_desc: "Клани зберігають свої володіння та титули доти, доки їхній рід не згасне. Лише після цього правитель зможе повернути ці землі собі."
  revert_to_the_crown: "Землі розподіляє правитель"
  revert_to_the_crown_desc: "Правитель сам вирішує, кому надати нові володіння та титули. Як правило, великі клани користуються більшою прихильністю, а тому отримують більше земель та титулів, ніж інші."
  dynastic_holdings_conslidated: "Династичні володіння"
  dynastic_holdings_conslidated_desc: "Нові володіння та титули автоматично переходять до правлячої династії, і лише в рідкісних випадках дістаються іншим #L [GetCountry('SCO').GetAdjective|l] кланам#!."
  sco_authority_over_the_clergy: "Контроль над духовенством"
  sco_authority_over_the_clergy_desc: "Постійні внески до курії виснажують #L [GetCountry('SCO').GetAdjective|l]у#! скарбницю. Щоб позбутися цього тягаря, уряд може взяти духовенство під свій прямий контроль."
  crown_religious_jurisdiction: "Юрисдикція уряду"
  crown_religious_jurisdiction_desc: "Урядовий контроль над усіма релігійними організаціями #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! значно послабив вплив #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#! та курії."
  limited_curia_oversight: "Обмежений зв'язок з курією"
  limited_curia_oversight_desc: "Хоча уряд багато в чому зберігає владу над релігійними організаціями #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!, деякі високопоставлені представники духовенства все ж отримали право підтримувати спілкування з курією."
  sco_colonial_affairs_law: "Шотландські колоніальні амбіції"
  sco_colonial_affairs_law_desc: "Розповіді про простори та багатства Нового Світу нікого не залишать байдужим. [GetCountry('SCO').GetName] також може збагатитися за рахунок далеких земель, заснувавши там свою колонію. Однак такі підприємства вимагають великих витрат і можуть спричинити катастрофічні наслідки для економіки країни."
  sco_no_colonial_affairs: "Заборона колоніальних підприємств"
  sco_no_colonial_affairs_desc: "Заснування колоній та торгових компаній у Новому Світі заборонено, оскільки подібні підприємства можуть підірвати фінансову стабільність #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!."
  sco_limited_colonial_ventures: "Обмеження колоніальних підприємств"
  sco_limited_colonial_ventures_desc: "Колоніальні підприємства дозволені країною. Вигода від них перевищує потенційні економічні ризики."
  sco_colonial_administration: "Досвідчена колоніальна адміністрація"
  sco_colonial_administration_desc: "Завдяки зусиллям дослідників та інвесторів [GetCountry('SCO').GetName] стала справжньою колоніальною країною і тепер може отримувати солідний дохід за рахунок своїх заморських володінь."
