  ALERT_BEING_ANNEXED_LOYAL: "#T  Нас поглинають#!\nНаш [Concept('overlord', 'сюзерен')|e] $OVERLORD$ починає дипломатичне [Concept('annex', 'поглинання')|e] нашої країни.\n\nОскільки ми не є [Concept('disloyal_subject', 'нелояльним васалом')|e], цей процес розвиватиметься щомісяця і досягне успішного завершення приблизно до цього терміну: $TIME$.\n\nЯкщо нас [Concept('annex', 'поглинуть')|e], на цьому для нас усе закінчиться!\n\nМирно сповільнити цей процес нам допоможуть [Concept('cabinet_actions', 'доручення')|e] «#TOOLTIP:CABINET_ACTION,frustrate_annexation,X #L Зрив поглинання#!#!» та «#TOOLTIP:CABINET_ACTION,sow_disloyalty,X #L Поширення нелояльності#!#!». Можна завершити цей процес і по-іншому — оголосити сюзерену [Concept('war', 'війну')|e], [Concept('casus_belli', 'приводом')|e] для якої буде «#TOOLTIP:CASUS_BELLI,cb_resist_annexation,X #L Опір поглинанню#!#!»!\n\n"
