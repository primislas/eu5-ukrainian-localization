  ALERT_DOOM_TITLE: "Висока приреченість"
  ALERT_DOOM: "Наша [Concept('doom', 'приреченість')|e] становить $VAL|2R$. Якщо вона досягне 100 од., наслідки для країни та правлячої родини будуть катастрофічними."
