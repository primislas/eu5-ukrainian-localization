l_russian:
  colonial_nation: "Колоніальна нація"
  colonial_nation_desc: "$colonial_nation$ — це [Concept('subject', 'ленник')|e], чиїм основним завданням є управління [Concept('overseas', 'заморськими')|e] [Concept('colonies', 'колоніями')|e] від імені [Concept('overlord', 'сюзерена')|e]. У колоніальних країн підвищена #TOOLTIP:MODIFIER_TYPE,global_population_capacity_modifier,X #P #V межа населення#!#!, а також є можливість залучати #TOOLTIP:POPTYPE,slaves,X #L рабів#!#! до [Concept('rgo', 'видобутку ресурсів')|e]. Колоніальні країни покращують [Concept('merchant_power', 'торговельну перевагу')|e] своїх [Concept('overlord', 'сюзеренів')|e], а крім [Concept('gold', 'дукатів')|e] надають також [Concept('manpower', 'рекрутів')|e] та [Concept('sailors', 'моряків')|e]."
  dominion: "Домініон"
  dominion_desc: "$dominion$ — це [Concept('subject', 'ленник')|e] із самоврядуванням та відносною автономією. Такий тип ленника доступний лише #TOOLTIP:GOVTYPE,monarchy,X #L монархіям#!#! тієї ж [Concept('religion_group', 'релігійної групи')|e], що й їх [Concept('overlord', 'сюзерен')|e]. Щоб створити домініон, обидві країни повинні перебувати в [Concept('union', 'унії')|e] або країною-сюзереном повинні бути $ENG$ чи $GBR$. #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V Ефективність у нашій раді#!#! у домініонів вища, ніж у простих #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  fiefdom: "Феод"
  fiefdom_desc: "$fiefdom$ — молодший титул, особисте володіння [Concept('ruler', 'правителя')|e] країни-[Concept('overlord', 'сюзерена')|e]. Цей тип ленника доступний лише #TOOLTIP:GOVTYPE,monarchy,X #L монархіям#!#! тієї ж [Concept('religion_group', 'релігійної групи')|e], що й їх сюзерен. #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V Ефективність у нашій раді#!#! у феодів вища, але править ними безпосередньо [Concept('monarch', 'монарх')|e] сюзерена."
  march: "Марка"
  march_desc: "$march$ — країна-[Concept('subject', 'ленник')|e], яка захищає володіння свого [Concept('overlord', 'сюзерена')|e] від зовнішніх загроз. У марок краща #TOOLTIP:MODIFIER_TYPE,discipline,X #P #V дисципліна#!#! та #TOOLTIP:MODIFIER_TYPE,global_defensive,X #P #V оборона фортеці#!#!, а витрати на #TOOLTIP:MODIFIER_TYPE,fort_maintenance_cost,X #P #V утримання укріплень#!#! зменшені. Крім того, платіжні зобов'язання перед сюзереном у марок менші, ніж у звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  hanseatic_member: "Ганзейське місто"
  hanseatic_member_desc: "Ганзейський союз — це конфедерація торгових міст, створена заради оборони та торгівлі. Очолює його $HSA$. У [Concept('subject', 'ленника')|e] у союзі вища #TOOLTIP:MODIFIER_TYPE,trade_efficiency,X #P #V торговельна ефективність#!#! та #TOOLTIP:MODIFIER_TYPE,loyalty_to_overlord,X #P #V лояльність до сюзерена#!#!, а витрати на #TOOLTIP:MODIFIER_TYPE,merchant_maintenance_cost,X #P #V утримання торгівлі#!#! зменшені. У [Concept('overlord', 'сюзерена')|e] (ним може бути лише $HSA$) збільшений #TOOLTIP:MODIFIER_TYPE,global_merchant_capacity_modifier,X #P #V торговий потенціал#!#!. Крім того, він отримує звідси більше виплат у вигляді [Concept('manpower', 'рекрутів')|e] та [Concept('sailors', 'моряків')|e], але менше [Concept('gold', 'дукатів')|e], ніж від звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  state_bank: "Державний банк"
  state_bank_desc: "Цей тип [Concept('subject', 'ленника')|e] являє собою особливий різновид васальної залежності. [Concept('overlord', 'Сюзереном')|e] цієї компанії може бути лише країна, яка прийняла [Concept('government_reform', 'державний принцип')|e] #TOOLTIP:GOVERNMENT_REFORM,banking_country,X #L «Династія банкірів»#!#!. У банку краща #TOOLTIP:MODIFIER_TYPE,diplomatic_reputation,X #P #V дипломатична репутація#!#!, а сюзерен може брати кошти під менший #TOOLTIP:MODIFIER_TYPE,bank_interest,X #P #V відсоток#!#!. Крім того, він може забрати половину скарбниці державного банку за допомогою [Concept('country_interaction', 'взаємодії з країною')|e] #TOOLTIP:COUNTRY_INTERACTION,siphon_income,X #L «Привласнення доходів»#!#!, отримавши більше коштів, ніж зазвичай."
  secessionists: "Сецесіоністи"
  secessionists_desc: "Цей [Concept('subject', 'ленник')|e] схожий зі своїм [Concept('overlord', 'сюзереном')|e] у багатьох аспектах управління та прагне до політичного об'єднання з ним, тому його порівняно легко можна [Concept('annexed', 'приєднати')|e]. У сецесіоністів підвищені #TOOLTIP:MODIFIER_TYPE,loyalty_to_overlord,X #P #V лояльність до сюзерена#!#! та #TOOLTIP:MODIFIER_TYPE,annexation_speed,X #P #V швидкість приєднання#!#!."
  trade_company: "Торгова компанія"
  trade_company_desc: "$trade_company$ — це інвестиційний конгломерат, який прагне отримувати прибуток для себе та свого [Concept('overlord', 'сюзерена')|e]. Будь-яка торгова компанія завжди #TOOLTIP:GOVTYPE,republic,X #L республіка#!#!. У них вища #TOOLTIP:MODIFIER_TYPE,trade_efficiency,X #P #V торговельна ефективність#!#!, а платіжні зобов'язання цього ленника перед сюзереном більші, ніж у звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  vassal: "Васал"
  vassal_desc: "Це найпоширеніший різновид [Concept('subject', 'ленника')|e]. $vassal$ контролює землі, платить данину та бере участь у військових походах свого [Concept('overlord', 'сюзерена')|e]. Завдяки цьому у васала ефективніше діє модифікатор #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V «Ефективність у нашій раді»#!#!, а у сюзерена — #TOOLTIP:MODIFIER_TYPE,monthly_prestige,X #P #V «Престиж за місяць»#!#!. Крім того, в обох країн швидше поширюються [Concept('institutions', 'інститути')|e]."
  conquistador: "Конкістадор"
  conquistador_desc: "Конкістадор — це ватажок приватного війська, який підписав з [Concept('rulers', 'правителем')|e] контракт про дослідження та завоювання певних територій. За це він отримує титул губернатора, а також частку в нових землях та трофеях. Цей унікальний [Concept('subject_types', 'тип ленника')|e] може з'являтися лише за допомогою [Concept('action', 'дії')|e] #TOOLTIP:GENERIC_ACTION,create_conquistador,X #L Відправлення конкістадора#!#!. Це завжди [Concept('army_based', 'стратократична країна')|e], яка отримує підвищені модифікатори #TOOLTIP:MODIFIER_TYPE,military_tactics,X #P #V «Військова тактика»#!#!, #TOOLTIP:MODIFIER_TYPE,global_max_control,X #P #V «Максимальний контроль»#!#! та #TOOLTIP:MODIFIER_TYPE,wrong_culture_levy_size,X #P #V «Розмір ополчення чужої культури»#!#!."
  appanage: "Апанаж"
  appanage_desc: "Апанаж — це [Concept('subject', 'ленник')|e], яким керує молодша гілка правлячої династії. У нього підвищується #TOOLTIP:MODIFIER_TYPE,monthly_prestige,X #P #V престиж за місяць#!#!, #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V ефективність у нашій раді#!#! та #TOOLTIP:MODIFIER_TYPE,global_max_control,X #P #V максимальний контроль#!#!, а також збільшується #TOOLTIP:MODIFIER_TYPE,global_manpower_modifier,X #P #V кількість рекрутів#!#!. У [Concept('overlord', 'сюзерена')|e] підвищується #TOOLTIP:MODIFIER_TYPE,monthly_legitimacy,X #P #V легітимність за місяць#!#!, але при цьому сильніше #TOOLTIP:MODIFIER_TYPE,stability_decay,X #P #V знижується стабільність#!#! та слабшає #TOOLTIP:MODIFIER_TYPE,global_crown_estate_power,X #P #V сила корони#!#!."
  samanta: "Саманта"
  samanta_desc: "$samanta$ — тип [Concept('subject', 'ленника')|e], доступний лише країнам з [Concept('advance', 'поступом')|e] #TOOLTIP:ADVANCE_DEFINITION,samanta_advance,X #L «Саманта»#!#!, специфічним для #TOOLTIP:CULTUREGROUP,indian_group,X #L індійської культури#!#!. Саманти багато в чому схожі зі звичайними #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалами#!#!, однак платіжні зобов'язання такого ленника менші, а також його не можна [Concept('annexed', 'приєднати')|e], доки зв'язки саманти з [Concept('overlord', 'сюзереном')|e] не стануть тіснішими — у цьому випадку він отримає назву #TOOLTIP:SUBJECT_TYPE,maha_samanta,X #L «Магасаманта»#!#!. Для цього необхідно скористатися [Concept('country_interaction', 'взаємодією з країною')|e] #TOOLTIP:COUNTRY_INTERACTION,upgrade_to_maha_samanta,X #L «Підвищення до магасаманти»#!#!."
  maha_samanta: "Магасаманта"
  maha_samanta_desc: "Отримавши статус магасаманти, [ShowSubjectTypeName('samanta')|l] починає сплачувати збільшену данину, а [Concept('overlord', 'сюзерен')|e] отримує можливість [Concept('annexed', 'приєднати')|e] цю країну до своїх володінь швидше, ніж якби вона була звичайним #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#!. З іншого боку, якщо магасаманта користується довірою [Concept('overlord', 'сюзерена')|e], той може скористатися [Concept('country_interaction', 'взаємодією з країною')|e] #TOOLTIP:COUNTRY_INTERACTION,upgrade_to_pradhana_maha_samanta,X #L «Підвищення до прадхана-магасаманти»#!#! і надати їй #TOOLTIP:SUBJECT_TYPE,pradhana_maha_samanta,X #L відповідний#!#! статус, що передбачає підвищений ступінь автономії."
  pradhana_maha_samanta: "Прадхана-магасаманта"
  pradhana_maha_samanta_desc: "Це вища форма #TOOLTIP:SUBJECT_TYPE,maha_samanta,X #L магасаманти#!#! і найвірніший з [Concept('subjects', 'ленників')|e]. $pradhana_maha_samanta$ не підлягає [Concept('annexed', 'приєднанню')|e]; крім того, у нього покращуються #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V ефективність у раді#!#!, #TOOLTIP:MODIFIER_TYPE,discipline,X #P #V дисципліна#!#! та #TOOLTIP:MODIFIER_TYPE,global_defensive,X #P #V оборона фортеці#!#!, а #TOOLTIP:MODIFIER_TYPE,fort_maintenance_cost,X #P #V утримання укріплень#!#! обходиться дешевше. Прадхана-магасаманта віддає своєму [Concept('overlord', 'сюзерену')|e] більше [Concept('gold', 'дукатів')|e], [Concept('manpower', 'рекрутів')|e] та [Concept('sailors', 'моряків')|e]."
  tusi: "Туси"
  tusi_desc: "Це особливий тип адміністрації в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединній країні#!#! — спадкові губернатори племінних земель, що керують ними від імені імператорського трону. Туси не можна приєднати, зате там швидше відбувається #TOOLTIP:MODIFIER_TYPE,monthly_towards_sinicized,X #P #V рух до китаїзації за місяць#!#!. Також вони змушені користуватися [Concept('court_language', 'придворною мовою')|e] свого [Concept('overlord', 'сюзерена')|e] і витрачають менше [Concept('diplomatic_capacity', 'дипломатичного потенціалу')|e]."
  uc_bey: "Удж-бей"
  uc_bey_desc: "$uc_bey$ — прикордонна [Concept('army_based', 'стратократична країна')|e] — це правитель, що підкоряється могутньому тюркському володарю. Таким напівавтономним правителям доручено захищати кордони, влаштовувати набіги та розширювати території. Під їх началом перебувають вірні газі, якими рухають релігійне завзяття, жага наживи та земель. Вони відіграють важливу роль у забезпеченні стабільності прикордоння та експансії. Створити удж-бей можна лише за допомогою #TOOLTIP:GENERIC_ACTION,create_uc_bey,X #L відповідної#!#! [Concept('action', 'дії')|e]. Їм завжди доступні [Concept('reform', 'принцип')|e] #TOOLTIP:GOVERNMENT_REFORM,uc_bey_reform,X #L «Уряд удж-бея»#!#! та #TOOLTIP:MODIFIER_TYPE,always_allow_army_levies,X #P #V ополчення#!#!, а платіжні зобов'язання набагато менші, ніж у звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!. При цьому удж-беї витрачають більше [Concept('diplomatic_capacity', 'дипломатичного потенціалу')|e] та посилюють у сюзерена #TOOLTIP:MODIFIER_TYPE,monthly_towards_decentralization,X #P #V зміщення до децентралізації за місяць#!#!."
  imperial_free_city: "Вільне імперське місто"
  imperial_free_city_desc: "$imperial_free_city$ — особливий тип ленника, що підкоряється [Concept('hre_emperor', 'імператору')|e]. Цей статус зберігається, доки ленник є #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільним імперським містом#!#! і #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священна Римська Імперія#!#! визнає його у своєму складі. Подібних ленників не можна приєднувати, вони не надають своєму [Concept('overlord', 'сюзерену')|e] жодних переваг і не можуть брати участь у його війнах, але при цьому не витрачають [Concept('diplomatic_capacity', 'дипломатичний потенціал')|e]. Їх можна перетворювати на #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L імперські міста прямого підпорядкування#!#! за допомогою #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L відповідної#!#! [Concept('policy', 'політики')|e]."
  direct_imperial_free_city: "Вільне імперське місто прямого підпорядкування"
  direct_imperial_free_city_desc: "$direct_imperial_free_city$ — особливий тип ленника, що підкоряється [Concept('hre_emperor', 'імператору')|e] в рамках [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,direct_imperial_cities_policy,X #L «Імперські міста прямого підпорядкування»#!#!. Цей статус зберігається, доки ленник є #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільним імперським містом#!#! і #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священна Римська Імперія#!#! визнає його у своєму складі. Подібні ленники нічим не відрізняються від звичайних #TOOLTIP:SUBJECT_TYPE,imperial_free_city,X #L вільних імперських міст#!#!, крім зниженої автономії, — це означає, що їх можна приєднувати, причому швидше, ніж звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  tributary: "Данник"
  tributary_desc: "Данник — країна, змушена періодично платити данину своєму [Concept('overlord', 'сюзерену')|e] у вигляді [Concept('gold', 'дукатів')|e], [Concept('manpower', 'рекрутів')|e] та [Concept('sailors', 'моряків')|e]. Цей тип данника доступний лише за певних форм правління. На відміну від звичайних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#! данники можуть самостійно оголошувати війни (зокрема один одному), але не будуть автоматично вступати у війни своїх сюзеренів."
  tributary_join_defensive_wars_always_tt: "Ленник атакований іншою країною, яка не є данником того ж сюзерена."
  BUILDING_COUNTRY_NAME: "$ADJ$ий $REGION$"
  PLAY_AS_RELEASED_SUBJECT: "Грати за звільненого ленника"
  SELECT_SUBJECT_TYPE_CLICK: "Вибрати цей [Concept('subject_type', 'тип ленника')|e]"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_ALWAYS_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] приєднуватися до наступальних війн #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_AUTOCALL_IF: "[COUNTRY.GetName] буд[COUNTRY.Custom('end_etut')] автоматично призиватися на наступальні війни #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_CANCALL_IF: "[COUNTRY.GetName] може бути призван[COUNTRY.Custom('end_fem')] на наступальні війни #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!, якщо:"
  SUBJECT_TYPE_JOIN_OFFENSIVE_WARS_NEVER_IF: "[COUNTRY.GetName] НЕ буд[COUNTRY.Custom('end_etut')] приєднуватися до наступальних війн #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#!."
