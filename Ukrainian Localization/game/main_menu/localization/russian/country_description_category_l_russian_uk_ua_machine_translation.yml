l_russian:
  COUNTRY_DESCRIPTION_CATEGORY_LABEL: "Категорія"
  COUNTRY_DESCRIPTION_CATEGORY_DESC: "Підхід країни"
  country_description_category_name_administrative: "Економіка"
  country_description_category_desc_administrative: "Ця [Concept('country', 'країна')|e] зосереджена на зростанні та розвитку економіки."
  country_description_category_name_diplomatic: "Політика"
  country_description_category_desc_diplomatic: "Ця [Concept('country', 'країна')|e] зосереджена на внутрішніх справах та міжнародній [Concept('diplomacy', 'дипломатії')|e]."
  country_description_category_name_military: "Експансія"
  country_description_category_desc_military: "Ця [Concept('country', 'країна')|e] зосереджена на [Concept('conquer', 'завоюваннях')|e] для розширення території."
  DIFFICULTY_LEVEL_DESC: "Наскільки складно починати гру за цю країну."
  DIFFICULTY_LEVEL_LABEL: "Рівень складності"
  difficulty_level_name_1: "#G Дуже низька #!"
  difficulty_level_desc_1: "#T Дуже низький#! Ця [Concept('country', 'країна')|e] має #G дуже легке#! стартове положення, вона добре підійде #G новачкам#!.\n\n[Concept('countries', 'Країни')] #G дуже низького#! рівня складності зазвичай мають помірний розмір, належать до одного [Concept('market', 'ринку')|e], їхні сусіди слабкі або дуже дружні, а самі ці країни не скуті жодними особливими механіками."
  difficulty_level_name_2: "#G Низька#!"
  difficulty_level_desc_2: "#T Низький#! Ця [Concept('country', 'країна')|e] має #G легке#! стартове положення, вона добре підійде #G новачкам#!.\n\n[Concept('countries', 'Країни')] #G низького#! рівня складності зазвичай мають помірний розмір і належать до одного [Concept('market', 'ринку')|e], а їхні сусіди слабкі або дружні."
  difficulty_level_name_3: "#l Середня#!"
  difficulty_level_desc_3: "#T Середній#! Ця [Concept('country', 'країна')|e] має середнє стартове положення, за неї краще грати, коли ви вже познайомитеся з основами гри.\n\n[Concept('countries', 'Країни')] #W середнього#! рівня складності зазвичай мають більший розмір, належать до кількох [Concept('markets', 'ринків')|e], а їхні сусіди можуть становити значну загрозу.\n\nКрім того, [Concept('countries', 'країни')] #W середнього#! рівня складності на ранніх етапах взаємодіють з таким особливим контентом, як [Concept('situations', 'ситуації')|e], [Concept('disasters', 'лиха')|e] або [Concept('international_organizations', 'міжнародні об’єднання')|e], через що стиль гри за ці країни може відрізнятися від звичайного."
  difficulty_level_name_4: "#R Висока#!"
  difficulty_level_desc_4: "#T Високий#! За цю [Concept('country', 'країну')|e] #R складно#! грати. Не радимо братися за неї, якщо ви тільки освоюєте основи #italic Europa Universalis V#!.\n\n[Concept('countries', 'Країнами')] #R високого#! рівня складності або важко керувати, або вони мають занадто великий розмір чи складний склад. А ще їм можуть із самого початку загрожувати сильні сусіди."
  difficulty_level_name_5: "#R Дуже висока#!"
  difficulty_level_desc_5: "#T Дуже високий#! За цю [Concept('country', 'країну')|e] #R дуже складно#! грати. Не радимо братися за неї, поки ви не опануєте всі можливості #italic Europa Universalis V#! досконало.\n\n#R [Concept('countries', 'Країнами')] #R дуже високого#! рівня складності або важко керувати, або вони мають занадто великий розмір чи складний склад. А ще їм можуть із самого початку загрожувати сильні сусіди."