l_russian:
  country_history_ARA: "[GetCountry('ARA').GetLongName] — одна з наймогутніших країн на заході Середземномор’я. Вона домоглася цього завдяки флоту, дипломатичному впливу та розвиненим торговим мережам.\n\nЗміцнення влади в #TOOLTIP:LOCATION,valencia,X #L Валенсії#!#! та завоювання нещодавно створеного Сардинського королівства можуть надовго забезпечити нам панування на морі, однак, попри відносну стабільність, на горизонті починають згущуватися хмари. [GetCountry('MLL').GetLongName] на сході пережива[GetCountry('MLL').Custom('endlong_etyut')] економічні труднощі, і ворожість місцевих правителів до арагонського короля може призвести до конфлікту. При цьому #italic Реконкіста#! добігає свого завершення. [GetCountry('CAS').GetLongName] станов[GetCountry('CAS').Custom('endlong_ityat')]ся дедалі грізнішою силою на Піренейському півострові. На півночі леж[GetCountry('FRA').Custom('endlong_itat')] [GetCountry('FRA').GetLongName], де за останнє століття зміцнилася влада над регіоном [ShowAreaName('languedoc_area')], тому ця країна також залишається потенційним противником.\n\nЯк же [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'юна', 'юний')] [GetCountry('ARA').GetGovernment.GetRuler.GetShortName|l] подолає прийдешні випробування? [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'Вона', 'Він')] може звернути погляд до Середземного моря, щоб встановити свою владу над водами від #TOOLTIP:LOCATION,barcelona,X #L Барселони#!#! до Святої землі, або ж спробувати домогтися панування на самому півострові. І, звісно, завжди можна взяти реванш за битву при Мюре та повернути давно втрачені володіння на північ від Піренеїв…"
  country_history_AZT: "За останні два століття багато #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науа#!#!, нащадки чичимеків, переселилися до центру Мексики зі своєї міфічної прабатьківщини — Ацтлана. Серед цих переселенців був і наш народ.\n\nЯк і багато інших науа, ми заснували власний #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетль#!#!, який отримав назву #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтітлан#!#!. Він розташований на штучному острові посеред #TOOLTIP:LOCATION,texcoco_lake,X #L озера Тескоко#!#!.\n\nПри цьому наші правителі опинилися під сильним впливом #TOOLTIP:CULTURE,$toltec_culture_tt$,X #L тольтекської#!#! культури, що сприяло розвитку нашої озерної цивілізації. Незабаром сусіди також визнали нас вправними воїнами, і наша майстерність перетворила війська [GetCountry('AZT').Custom('longname_ru_GEN')] на грізну силу…\n\nЗараз ми є васалами альтепетля #ONCLICK:COUNTRY,[GetCountry('TEP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TEP').Custom('CL_tt')],X [GetCountry('TEP').Custom('CL_GEN')|L]#!#!, а тому наші можливості для розширення обмежені його навколишніми територіями. У такій ситуації тільки мудрий і здібний правитель зможе привести [GetCountry('AZT').Custom('CL_ACC')] до підкорення долини Мехіко та земель за її межами. Може, [Select_CString(GetCountry('AZT').GetGovernment.GetRuler.IsFemale, 'нею', 'ним' )] виявиться [GetCountry('AZT').GetGovernment.GetRuler.GetShortName|l]?"
  country_history_BOH: "Населені #TOOLTIP:CULTUREGROUP,slavic_group,X #L слов'янами#!#! землі [GetCountry('BOH').Custom('CL_GEN')] знаходяться в самому серці германської #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Довгий час цими територіями правили #TOOLTIP:DYNASTY,$premyslid_dynasty_tt$,X #L Пржемисловичі#!#!, але тепер до влади прийшла династія #TOOLTIP:DYNASTY,$luxembourg_dynasty_tt$,X #L Люксембургів#!#!, яка може ще тісніше пов'язати країну з Імперією. Втім, [GetCountry('BOH').GetGovernment.GetRuler.GetName|l] скоріше #TOOLTIP:CULTURE,$french_tt$,X #L французького#!#! походження, ніж #TOOLTIP:CULTUREGROUP,german_group,X #L німецького#!#!, завдяки вихованню при королівському дворі в #TOOLTIP:LOCATION,paris,X #L Парижі#!#!… Так чи інакше, [GetCountry('BOH').GetGovernment.GetRulerTitle|l] родом з чужих земель вирішує складне завдання: тримати в узді і аристократів, і простий народ, одночасно намагаючись розібратися в хитросплетіннях імперської політики. Звісно, [GetCountry('BOH').GetNameWithNoTooltip] — вельми могутня країна, але чи вдасться її правителям здійснити свої амбітні плани?"
  country_history_BYZ: "Колись [GetCountry('BYZ').GetName] простяга[GetCountry('BYZ').Custom('endrank_assya')]ся від #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#! та #TOOLTIP:AREA,levant_area,X #L Леванту#!#! до #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! та #TOOLTIP:REGION,italy_region,X #L Італії#!#!, але тепер ця країна в занепаді. Причиною цьому став Четвертий хрестовий похід, і навіть те, що династія [GetCountry('BYZ').GetGovernment.GetRuler.GetDynasty.GetName] повернула #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! під контроль країни, не виправило становище. [GetCharacter('byz_andronikos_ii_palaiologos').GetName] під час свого правління відчайдушно [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'намагалася', 'намагався' )] вирішити економічні проблеми, і з цією метою навіть [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'розпустила', 'розпустив' )] імперський флот. Проте [GetCountry('BYZ').GetFlavorRank|l] продовжував[GetCountry('BYZ').Custom('endrank_fem')] втрачати території, через що #TOOLTIP:GOVERNMENT_REFORM,theme_system,X #L фемна система#!#! там постраждала і фактично перестала працювати.\n\n[GetCharacter('byz_andronikos_iii_palaiologos').GetName] тепер [Select_CString(GetCharacter('byz_andronikos_iii_palaiologos').IsFemale, 'повинна', 'повинен' )] докласти всіх зусиль, щоб принаймні зберегти те, що залишилося від нашої імперії, однак домогтися цього буде непросто. На сході величезне військо #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#! має намір стерти з лиця землі останні візантійські володіння в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! та переправитися через протоки. [GetCharacter('ser_stefan_dusan').GetName] водночас замишляє захоплення #TOOLTIP:LOCATION,thessaloniki,X #L Фессалонік#!#! та #TOOLTIP:PROVINCE_DEFINITION,north_epirus_province,X #L Північного Епіру#!#!. Тим часом наша скарбниця практично спустошена, а імператорська рідня та [GetCountry('BYZ').GetGovernment.GetEstateName('nobles_estate')|l] явно затівають якусь змову, через що країну будь-якої миті може захлеснути громадянська війна. Чи зможе [GetCountry('BYZ').GetGovernment.GetRulerTitle|l] підняти колись велику країну з руїн?"
  country_history_CAS: "Утворенню [GetCountry('CAS').Custom('longname_ru_GEN')] сприяла унія [GetCountry('CAS').Custom('CL_GEN')] та [GetCountry('LON').Custom('longname_ru_GEN')]. У 1230 році [GetCharacter('cas_fernando_iii_burgundy').GetName] [Select_CString(GetCharacter('cas_fernando_iii_burgundy').IsFemale, 'успадкувала', 'успадкував' )] їх, возз'єднавши ці королівства. Через сто років [GetCharacter('cas_alfonso_xi_burgundy').GetName] успішно править країною, практично не зустрічаючи політичних опонентів, хоча початок його правління був непростим, до нього тривав довгий період регентства, коли при владі перебувала його бабуся [GetCharacter('cas_maria_molina').GetName].\n\nЗумівши приборкати аристократію, на чолі якої стояв його родич [GetCharacter('cas_juan_manuel').GetName], і зміцнивши становище країни, [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] звернув увагу на південний кордон. Від емірату [GetCountry('GRA').GetLongName], що отримав незалежність сотню років тому, як і раніше, походить загроза за впливової підтримки [GetCountry('MOR').Custom('longname_ru_GEN')] — ця країна володіє землями в Іберії через підпорядковане їй королівство, чиї володіння розташовуються біля #TOOLTIP:LOCATION,algeciras,X #L Альхесіраса#!#! та #TOOLTIP:LOCATION,ronda,X #L Ронди#!#!. Править там [GetCharacter('mor_abu_malik_abd_al_wahid').GetName], чиїм батьком є [GetCharacter('mor_abu_al_hasan_ali').GetName].\n\nОднак це не всі проблеми, з якими стикається [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip]. Його кохана [GetCharacter('cas_leonor_guzman').GetName] народила йому кількох дітей, і це загострило стосунки в сім'ї. [GetCountry('CAS').GetGovernment.GetRulerTitle] та його законна дружина [GetCharacter('cas_maria_portugal').GetName] живуть окремо, і на тлі цього розколу в правлячій сім'ї питання престолонаслідування актуальне як ніколи.\n\nЧи зможуть [GetCharacter('cas_alfonso_xi_burgundy').GetShortNameWithNoTooltip] та його спадкоємці впоратися з внутрішніми та зовнішніми загрозами, що постають перед [GetCountry('CAS').Custom('longname_ru_nott_INST')]?"
  country_history_CHA: "[GetCountry('CHA').GetName] — це група розрізнених, напівавтономних тямських князівств, що об'єдналися [GetCountry('CHA').Custom('endrank_predlog_vvo')] [GetCountry('CHA').Custom('rank_ru_ACC')|l]. [GetCountry('CHA').GetLongNameWithNoTooltip] — єдина #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстська#!#! країна в #TOOLTIP:REGION,indochina_region,X #L Індокитаї#!#!, тому їй постійно загрожують підступні та агресивні вороги: [GetCountry('KHM').GetLongName] на заході та [GetCountry('DAI').GetLongName] на півночі. Однак, попри зовнішні небезпеки, [GetCountry('CHA').GetAdjectiveWithNoTooltip|l]ий народ зміг нажити величезні багатства, використовуючи свій флот як для торгівлі, так і для піратських нальотів у морях #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#!.\n\nКолись це був союз розрізнених племен, але тепер [GetCountry('CHA').GetName] — це потужна сила, з якою доведеться рахуватися. Чи зможе ця країна зайняти місце на чолі всіх країн?"
  country_history_CHI: "[GetCharacter('kublai_khan').GetName] [Select_CString(GetCharacter('kublai_khan').IsFemale, 'заснувала', 'заснував' )] [GetCountry('CHI').Custom('longname_ru_ACC')], а сьогодні його неосяжна імперія вже простягається до самого горизонту. Під владою свого легендарного правителя вона підкорила собі весь Китай, а також досягла неймовірних висот слави та пишноти.\n\nОднак останнім часом її вплив у регіоні слабшає, а на зміну процвітанню прийшли міжусобиці, бунти та культурні розбіжності. Вороги навколо набирають сили, щоб повалити країну та привласнити її мандат собі. За допомогою змов та підступів [GetCountry('CHI').Custom('end_predlog_vvo')] [GetCountry('CHI').Custom('CL_PREP')] ці зрадники прагнуть відшукати в імперії слабке місце, щоб урвати собі крихту влади та хоча б один рядок на сторінках історії. Але скільки б таких вискочок не намагалися домогтися слави, сидіти на Троні Дракона та виконувати волю Небес може лише один правитель."
  country_history_CHK: "Місто #TOOLTIP:LOCATION,cahokia,X #L Кахокія#!#! стоїть на місці злиття священних річок, оточене родючими землями, і в міру його зростання в ньому сформувалося розвинене суспільство. Жителі #TOOLTIP:LOCATION,cahokia,X #L Кахокії#!#! обробляють землі навколишньої долини та вирощують там «три сестри»: кукурудзу, квасолю та гарбуз. Владу в місті утримує [GetCountry('CHK').GetGovernment.GetEstateName('clergy_estate')|l], яке активно будує тут храми. #TOOLTIP:CULTURE,$cahokia_culture_tt$,X #L Кахокійська#!#! культура поширюється на навколишні землі та формує велику сферу впливу, а також приваблює до міста нових жителів з усього регіону.\n\nНаше суворо організоване суспільство та впливова культура дозволили нам піднятися на висоти, про які інші народи можуть тільки мріяти. Однак ми ще можемо зіткнутися з колосальними, непередбаченими труднощами. Чи зуміємо ми далі будувати та розвивати своє суспільство, чи всі наші досягнення будуть зруйновані та забуті назавжди?"
  country_history_CSU: "Наш перший вождь, ведений богом сонця Інті, заснував #TOOLTIP:LOCATION,qusqu,X #L Куску#!#! в тому самому місці, де торкнувся землі його золотий посох. Після багатьох століть сусідства з іншими племенами #TOOLTIP:CULTURE,$inca_culture_tt$,X #L інки#!#! нарешті взяли гору над ними та завоювали право називатися синами цих чудових місць. Величезні вулкани та бурхливі річки Анд приховують і живлять Священну долину інків, де ми, сини Сонця, живемо в очікуванні обіцяного світлого майбутнього в нашому величному місті. Нас оточують непереборні стіни гір та родючі терасові поля, а інші народи із заздрістю дивляться на наші багатства.\n\nМи довгі роки набирали силу та зміцнювали свою владу, і тепер настав час розгромити сусідів, щоб розширити свої володіння за межі долини та вирушити вздовж гір для поневолення всього світу. Питання лише в тому, чи зможемо ми осилити цей великий похід, чи вороги знищать нас перш, ніж ми досягнемо могутності?"
  country_history_DAI: "[GetCountry('DAI').GetLongName] утвори[GetCountry('DAI').Custom('endlong_assya')]ся в 968 році внаслідок громадянської війни династії Нго. З тих самих пір ми наполегливо ведемо боротьбу проти зростаючого впливу Китайської Імперії на півночі країни. Колись ці території належали #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній Країні#!#!, тому #L [GetCountry('DAI').GetCulture.GetName|l]ому#! народу здавна доводиться захищати свою землю від #L [GetCountry('CHI').GetCulture.GetName|l]их#! набігів, це породжує глибокі та давні образи.\n\nКрім зовнішніх загроз, наша країна страждає від надмірної роздробленості: #TOOLTIP:ESTATE_PRIVILEGE,peasants_autonomous_villages,X #L незалежні села#!#! фактично живуть за своїми законами, а при дворі не вщухає боротьба за владу.\n\nПроте зараз перед нами відкривається багато можливостей. [GetCountry('CHA').Custom('longname_ru_ACC')] з усіх боків оточують вороги, а [GetCountry('KHM').GetName] пережива[GetCountry('KHM').Custom('end_etyut')] занепад. Це означає, що у нас з'являється можливість здобути статус панівної імперії #TOOLTIP:REGION,indochina_region,X #L Індокитаю#!#!."
  country_history_DAN: "[GetCountry('DAN').GetLongName] колись бу[GetCountry('DAN').Custom('endlong_fem')] важливою фігурою, а тепер пережива[GetCountry('DAN').Custom('endlong_etyut')] непрості часи. Попередній король [GetCharacter('dan_chistopher_ii').GetName], прагнучи виправити економічне становище, заклав великі території впливовим #TOOLTIP:CULTURE,$danish_tt$,X #L данським#!#! та #TOOLTIP:CULTUREGROUP,german_group,X #L германським#!#! #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!. [GetCountry('SLV').Custom('longname_ru_ACC')] відтіснили від королівських земель, і навіть території #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! довелося продати [GetCountry('SWE').Custom('longname_ru_DAT')]. І без того непроста ситуація стала ще важчою, коли невдачливого короля скинув [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetName] і посадив на його місце свого племінника на ім'я [GetCharacter('dan_valdemar_iii').GetName]. Незабаром [GetCharacter('dan_chistopher_ii').GetNameWithNoTooltip] знову зайняв престол, але в ролі маріонеткового правителя. Після його смерті [GetCharacter('shl_gerhard_iii_holstein_rendsburg').GetShortNameWithNoTooltip] став де-факто правителем [GetCountry('DAN').Custom('CL_GEN')].\n\nВибратися зі становища, що склалося, буде непросто, але #L [GetCountry('DAN').GetAdjective|l]ий!#! народ відрізняється завзятістю та рішучістю, а [GetCharacter('dan_valdemar_atterdag').GetName], син покійного короля, вже готує план повернути [GetCountry('DAN').Custom('rank_ru_DAT')|l] колишню велич. Чи вийде це у нього? Час покаже."
  country_history_DHM: "[GetCountry('DHM').GetLongName] — це не просто маєток, а [GetCountry('DHM').GetFlavorRank|l] під владою [GetCountry('ENG').Custom('longname_ru_GEN')], і місцевий [GetCountry('DHM').GetGovernment.GetRulerTitle|l] володіє там практично королівською владою. Єпископ #TOOLTIP:LOCATION,durham,X #L Дарема#!#! має право збирати війська, карбувати монету та вершити правосуддя, він відіграє роль світського правителя #TOOLTIP:AREA,northumbria_area,X #L Нортумбрії#!#!.\n\nБагато століть подібна унікальна автономія дозволяла єпископам оберігати північний кордон від #L [GetCountry('SCO').GetAdjective|l]их#! набігів, а укріплення Дарема є оплотом вірності монарху в прикордонних землях.\n\nОднак у смутні часи на кордоні стає неспокійно, ставлення #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! залишається ворожим, і навіть [GetCountry('DHM').GetGovernment.GetEstateName('clergy_estate')|l] заговорило про реформи та амбіції. [GetCountry('DHM').GetFlavorRank] #TOOLTIP:LOCATION,durham,X #L Дарема#!#! носить церковне вбрання, але по суті є політичним утворенням і ще може зіграти більш значну роль у справах країни.\n\nЧи залишиться [GetCountry('DHM').GetFlavorRank|l] тихим куточком на службі короля чи стане незалежною країною та невизнаним великим північним королівством?"
  country_history_DLH: "Низка стрімких і вирішальних завоювань минулого століття породила нашу велику країну — [GetCountry('DLH').GetLongName] — яка простягається від #TOOLTIP:REGION,deccan_region,X #L Декану#!#! до родючих земель #TOOLTIP:LOCATION,lahore,X #L Лахора#!#!. Жодна інша країна не може зрівнятися з нашою могутністю та славою.\n\nОднак нині влада [GetCountry('DLH').Custom('rank_ru_GEN')|l] поширилася на настільки великі території, що керувати ними все складніше. Нас оточують численні вороги, які прагнуть знищити нашу велику спадщину та розвинену культуру. На сході наші піддані в #TOOLTIP:AREA,bengal_area,X #L Бенгалії#!#! почали сумніватися у своїх правителях, а південні провінції вже давно оскаржують нашу владу. #TOOLTIP:RELIGION,$hindu_tt$,X #L Індуїстські#!#! країни на півдні Індії, ведені #ONCLICK:COUNTRY,[GetCountry('VIJ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VIJ').Custom('CL_tt')],X [GetCountry('VIJ').Custom('CL_INST')|L]#!#!, можуть посилити опір нашому правлінню.\n\n[GetCharacter('dlh_muhammad_bin_tughluq').GetName] своїм мудрим керівництвом та пильним поглядом убереже наші землі від бід та запобіжить краху країни. Ми в це віримо…"
  country_history_DMS: "[GetCountry('DMS').GetLongName] знаходиться у важкодоступному регіоні на південно-західній околиці Ірландії. Попри віддаленість від #TOOLTIP:LOCATION,dublin,X #L Дубліна#!#!, ці землі складно назвати глухим закутком. Ними править [GetCharacter('dms_maurice_fitzgerald').GetName] — 1-й граф Десмонд, голова південної гілки могутньої династії #TOOLTIP:DYNASTY,$fitzgerald_dynasty_tt$,X #L Фіцджеральдів#!#! та один із найвпливовіших лордів #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!.\n\nУ 1329 році Моріс отримав титул графа і швидко вирвав своє королівство з лап гельських вождів #ONCLICK:COUNTRY,[GetCountry('THO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THO').Custom('CL_tt')],X [GetCountry('THO').Custom('CL_GEN')|L]#!#! та англійської влади #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_GEN')|L]#!#!.\n\nЗміна союзників, напруженість у відносинах з Дубліном та Лондоном і постійна боротьба прикордонних баронів — ось головні особливості політичного ландшафту Десмонда. Влада Англії на заході слабшає. Як ми вчинимо? Спробуємо домогтися незалежності, нацькуємо гельські клани один на одного або заявимо свої права на престол?\n\nЧи стане Десмонд оплотом гіберно-нормандського відродження? Або ж загрузне у війнах та міжусобицях?"
  country_history_ENG: "#L [GetCountry('ENG').GetAdjective]а#! корона досі оговтується від підступного заколоту. [GetCharacter('eng_edward_ii').GetShortName] був у результаті вбитий десять років тому. Головних призвідників стратили, але деяких співучасників все ж помилували заради збереження стабільності — дуже крихкої стабільності.\n\n[GetCharacter('eng_edward_iii').GetShortName], його син, своєю чергою, вже проявив себе як здібний правитель. Нині він відкрито заявляє про свої права на #L [GetCountry('FRA').GetAdjective|l]ий#! престол, стверджуючи, що він — онук правителя з династії #TOOLTIP:DYNASTY,$capet_dynasty_tt$,X #L Капетингів#!#!, а отже, є його законним спадкоємцем.\n\nНа півночі наш #L [GetCountry('SBL').GetAdjective|l]ий#! ставленик безуспішно бореться за #L [GetCountry('SCO').GetAdjective|l]у#! корону, тоді як наші вірні васали утримують контроль над #ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_INST')|L]#!#!, #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('AQN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('AQN').Custom('CL_tt')],X [GetCountry('AQN').Custom('CL_INST')|L]#!#!.\n\nЯсно одне: на нас чекають неспокійні часи. Чи варто нам кинутися через Ла-Манш, щоб підкорити Францію і стати континентальною країною, чи краще спрямувати зусилля на забезпечення нашого панування на морі?"
  country_history_ERE: "Цей бейлик заснував [GetCharacter('ere_eretna').GetName] — офіцер Ільханідів #TOOLTIP:CULTURE,$uyghur_culture_tt$,X #L уйгурського#!#! походження, — після перемоги над #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольськими#!#! вождями в битві при Каранбюке. Проголосивши незалежність від своїх колишніх сюзеренів, [GetCharacter('ere_eretna').GetNameWithNoTooltip] став султаном і навіть отримав прізвисько #italic «безбородий пророк»#! за своє мудре правління. $anatolia_desc$"
  country_history_ETH: "[GetCountry('ETH').GetLongName] — стародавня країна з багатою історією та традиціями. Вона розташована на Африканському Розі серед відкритих усім вітрам нагір'їв та рівнин. Мало що може зрівнятися з її Великою рифтовою долиною та Сименськими горами, коли їх осяває сонце. Це видовище вражає кожного, хто опиняється тут вперше.\n\n[GetCountry('ETH').Custom('CL_ACC')] населяє безліч різних народів, зокрема #TOOLTIP:CULTURE,$amhara_tt$,X #L амхара#!#!, #TOOLTIP:CULTURE,$afar_culture_tt$,X #L афар#!#!, #TOOLTIP:CULTURE,$tigre_tt$,X #L тигре#!#! та інші. Разом вони пережили багато труднощів, що лише сильніше згуртувало їх попри релігійні та культурні відмінності.\n\nЖителі [GetCountry('ETH').Custom('CL_GEN')] пишаються легендами про своє коріння: вважається, що члени правлячої династії #TOOLTIP:DYNASTY,$solomonid_dynasty_tt$,X #L Соломонідів#!#! походять від Менеліка I — сина цариці Савської та біблійного царя Соломона. Таким чином, цей міф пов'язує народ Ефіопії зі стародавніми євреями.\n\nЗа свою довгу історію наша країна подолала безліч випробувань, але їм так і не вдалося зламати наш дух.\n\nОднак останніми роками над нами знову нависає загроза: ми оточені ворогами, які вичікують слушного моменту для удару. Витримати їхній натиск — саме по собі подвиг, однак ми маємо намір не просто вижити, а забезпечити своїй країні процвітання на довгі століття."
  country_history_EWY: "[GetCountry('EWY').GetLongName] розташову[GetCountry('EWY').Custom('endlong_etyut')]ся на стратегічно важливих прикордонних землях між #TOOLTIP:AREA,wales_area,X #L Уельсом#!#! та [GetCountry('ENG').Custom('longname_ru_INST')], а також відповіда[GetCountry('EWY').Custom('endlong_etyut')] за захист західних кордонів.\n\nЗараз там править [GetCharacter('eng_bartholomew_burghersh_the_elder').GetName], вірний слуга корони, досвідчений воїн і придворний. [GetCharacter('eng_edward_iii').GetShortName] довіряє йому, і він гідно проявив себе не тільки на полях битв, а й як представник короля, а також у ролі констебля #TOOLTIP:LOCATION,dover,X #L Дувра#!#! та лорда-наглядача П'яти портів. Володіння в прикордонні зробили його багатим і впливовим, але він ніколи не забуває про те, що вірність у цьому регіоні мінлива, а у його сусідів вистачає амбіцій.\n\nЧи зуміє рід [ShowDynastyName('burghersh_dynasty')] зберегти прихильність Плантагенетів і з честю оберігати прикордоння? Або ж кругообіг політики, воєн і успадкування змете цей прикордонний оплот?"
  country_history_FLO: "#L [GetCountry('FLO').GetAdjective]а#! республіка стоїть на порозі нової доби! За останні століття наша країна зіткнулася з безліччю випробувань, але завдяки своїй завзятості ми змогли подолати їх і зайняти вельми вигідне становище, яке дозволяє нам отримувати прибуток з багатих земель регіону. Втім, наші сусіди теж не сидять склавши руки і невпинно розмірковують про те, як розширити свої #TOOLTIP:REGION,italy_region,X #L італійські#!#! володіння.\n\nОднак небагато хто може похвалитися такими досягненнями в науці та культурі, які є [GetCountry('FLO').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FLO').Custom('CL_tt')],X [GetCountry('FLO').Custom('CL_PREP')|L]#!#!. Під керівництвом талановитих правителів наш народ і надалі створюватиме приголомшливі витвори мистецтва та винаходи, які неодмінно приведуть нашу країну в золотий вік. За належного старання, звісно…"
  country_history_FRA: "[GetCharacter('fra_charles_iv_capet').GetShortName] помер у 1328 році, не залишивши спадкоємця чоловічої статі, і так закінчилося правління #TOOLTIP:DYNASTY,$capet_dynasty_tt$,X #L Капетингів#!#! [GetCountry('FRA').Custom('endlong_predlog_vvo')] [GetCountry('FRA').Custom('longname_ru_PREP')]. Наступним корону отримав [GetCharacter('fra_philip_vi_valois').GetName], родич покійного короля з молодшої гілки династії. Однак [GetCharacter('eng_edward_iii').GetName] з #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! оскаржує його владу, стверджуючи, що #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічний закон#!#! хоч і відсторонює самих жінок від престолонаслідування, але не скасовує право на корону по жіночій лінії. [GetCharacter('eng_isabella_of_france').GetName], остання з живих сестер попереднього короля, доводиться йому матір'ю, тому він вирішив заявити про свої законні претензії на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий трон.\n\n[GetCharacter('sco_david_ii').GetName], юний правитель #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!, нещодавно попросив у нас притулку, це посилює і без того складні відносини між нашими королівствами. Надавши йому захист, ми викликали гнів [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого двору, який підтримує #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_ACC')|L]#!#! — ще одного претендента на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]у корону. [GetCharacter('eng_robert_iii_artois').GetName], засуджений у #TOOLTIP:LOCATION,paris,X #L Парижі#!#! за претензії на [GetCountry('ARS').Custom('longname_ru_ACC')], водночас втік до Англії, де його тепло прийняв [GetCharacter('eng_edward_iii').GetShortNameWithNoTooltip]. За чутками, [GetCharacter('eng_robert_iii_artois').GetShortNameWithNoTooltip] підбурює свого гостинного господаря захопити [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий престол силою…\n\nЯкщо відносини продовжать загострюватися, [GetCharacter('fra_philip_vi_valois').GetShortNameWithNoTooltip] буде змушений звернутися за допомогою до своїх васалів. Однак багато амбітних #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанажів#!#!, утворених ще старою королівською династією, можуть скористатися важким становищем корони і вимагати нових привілеїв за свою допомогу, що ризикує стати більшою загрозою, ніж наявність зовнішнього ворога. Так чи інакше, доля [GetCountry('FRA').Custom('CL_GEN')] визначиться в найближчі роки. Нам доведеться одночасно вирішувати питання і із зовнішньою [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ою загрозою, і з зухвалою [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ою знаттю. Чи вдасться [GetCountry('FRA').Custom('CL_DAT')] вистояти перед обличчям труднощів і стати головною силою #TOOLTIP:CONTINENT,europe,X #L Європи#!#!?"
  country_history_GEN: "Місто #TOOLTIP:LOCATION,genoa,X #L Генуя#!#! — найважливіший торговий порт #TOOLTIP:AREA,western_mediterranean_sea_area,X #L Західного Середземномор'я#!#!, який зумів далеко поширити свій вплив торговими та військовими методами.\n\nРозгромивши [GetCountry('PIS').Custom('longname_ru_ACC')], ми зайняли Корсику та зміцнилися на #TOOLTIP:AREA,sardinia_area,X #L Сардинії#!#!, але ці землі можуть принести нам більше проблем, ніж вигод, оскільки багато місцевих жителів виступають проти нашої влади. [GetCharacter('ara_peter_iv_arago').GetName] нещодавно взагалі [Select_CString(GetCharacter('ara_peter_iv_arago').IsFemale, 'проголосила', 'проголосив' )] себе королем обох островів, тому напевно спробує взяти їх під свій контроль.\n\nІнша загроза може виникнути на сході, де ми стали головною торговою силою #TOOLTIP:AREA,black_sea_area,X #L Чорного моря#!#!, спираючись на східні колонії з центром у #TOOLTIP:LOCATION,kaffa,X #L Кафі#!#!. Однак [GetCountry('VEN').GetName], [GetCountry('BYZ').GetName] та [GetCountry('GLH').GetLongName] становлять велику загрозу для наших володінь у цьому регіоні.\n\nЧи вдасться [GetCountry('GEN').Custom('CL_DAT')] вирішити всі нагальні проблеми, поклавшись на численні #TOOLTIP:BUILDING_TYPE,fondaco,X #L фондако#!#! та багатих банкірів?"
  country_history_GRM: "Після розпаду Сельджуцької імперії плем'я Герміян під проводом Якуба I міцно закріпилося на її колишніх землях. Наш народ підняв повстання проти сельджуків у 1283 році, і до 1314 року нарешті здобув довгоочікувану незалежність, водночас завоювавши великі території, включно з #TOOLTIP:LOCATION,ankara,X #L Анкарою#!#!. $anatolia_desc$"
  country_history_HUN: "[GetCountry('HUN').GetLongName] вже багато століть охороня[GetCountry('HUN').Custom('endlong_etyut')] рубежі #TOOLTIP:RELIGION,$catholic_tt$,X #L католицького#!#! світу від язичників та нехристів. Своїми недавніми заколотами [GetCountry('HUN').GetGovernment.GetEstateName('nobles_estate')|l] поставили цю важливу місію під загрозу, однак [GetCountry('HUN').GetGovernment.GetRuler.GetName|l] [Select_CString(GetCountry('HUN').GetGovernment.GetRuler.IsFemale, 'змогла', 'зміг' )] приборкати бунтівників і знову затвердити роль нашої країни як християнського оплоту.\n\nАле розслаблятися рано, бо на південному сході зріє нова загроза, яка випробує #italic Regnum Marianum#! на міцність.\n\nЧас покаже, яка доля чекає [GetCountry('HUN').Custom('CL_ACC')] — впаде ця країна перед натиском іновірців, чи впевнено витримає всі прийдешні випробування?"
  country_history_JAP_common: "Після довгих років миру, встановленого Камакурським сьогунатом, японські острови знову занурилися в безодню війни під час #L [GetCountry('MGE').GetAdjective|l]их#! нашесть. Ці події підірвали авторитет сьогуна настільки, що [GetCountry('STC').GetGovernment.GetRuler.GetName] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'зуміла', 'зумів')] вирвати владу з його рук. Однак [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'її', 'його')] мрії про відновлення імператорського правління так і не здійснилися — колишній союзник [GetCountry('JAP').GetGovernment.GetRuler.GetName] заснував новий #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L Японський сьогунат#!#!, затвердивши свою владу над країною."
  country_history_JAP: "$country_history_JAP_common$\n\nТепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip|l] править країною після того, як [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'втекла', 'втік')] зі столиці та [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'закріпилася', 'закріпився')] у столичному місті [GetCountry('STC').GetCapital.GetName]. Однак боротьба між центральним урядом та главою країни у вигнанні ще далека від завершення."
  country_history_NTC: "$country_history_JAP_common$\n\nТепер [GetCountry('JAP').GetGovernment.GetRuler.GetNameWithNoTooltip|l] [Select_CString(GetCountry('JAP').GetGovernment.GetRuler.IsFemale, 'звела', 'звів')] на престол нового імператора, яким [Select_CString(GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.IsFemale, 'стала', 'став' )] [GetCountry('NTC').GetGovernment.GetRulerOrHeirIfRegent.GetName|l] у столичнім місті [GetCountry('NTC').GetCapital.GetName], але й [Select_CString(GetCountry('NTC').GetGovernment.GetRulerOrRegent.IsFemale, 'вона', 'він' )] залишається лише маріонеткою — верховну владу має [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]."
  country_history_STC: "$country_history_JAP_common$\n\nФактично опинившись у вигнанні, [GetCountry('STC').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'змушена', 'змушений')] шукати прихильників, якщо хоче вижити й кинути виклик владі, яку намагається нав'язати [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]. Настав час піднестися — або впасти."
  country_history_japanese_clan_common: "$country_history_JAP_common$\n\nРозрізнені клани тепер мусять обирати, якій стороні зберегти вірність."
  country_history_japanese_clan_north: "$country_history_japanese_clan_common$ [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] та [GetCountry('NTC').GetLongName] бачать у цьому клані відданих прихильників, тому клан відкидає домагання на Хризантемовий трон, які намагається нав'язати [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip|l]."
  country_history_japanese_clan_south: "$country_history_japanese_clan_common$ [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'Вигнана', 'Вигнаний')] [GetCountry('STC').GetGovernment.GetRuler.GetNameWithNoTooltip|l] бачить у цьому клані відданих прихильників, тому клан підтримує [Select_CString(GetCountry('STC').GetGovernment.GetRuler.IsFemale, 'її', 'його')] законні права на Хризантемовий трон і виступає проти влади, яку намагається нав'язати [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle|l]."
  country_history_KAR: "Бувши найбільшим суб'єктом колись великої імперії, ми опинилися в самій гущі боротьби за владу в регіоні. У нас на очах утворюються нові бейлики, кожен з яких прагне об'єднати розрізнені народи, що залишилися після розпаду Румського султанату. Налагодивши дипломатичні та торговельні зв'язки з правителями #TOOLTIP:LOCATION,cairo,X #L Каїра#!#!, нам вдалося поповнити скарбницю та узаконити свою владу, а також зміцнити контроль над багатими містами на кшталт #TOOLTIP:LOCATION,konya,X #L Коньї#!#! та #TOOLTIP:LOCATION,ermenek,X #L Ерменека#!#!. $anatolia_desc$"
  country_history_KBO: "На зорі XIV століття представники правлячої династії #TOOLTIP:DYNASTY,$sayfawa_dynasty_tt$,X #L Сайфава#!#! відчайдушно борються один з одним за владу.\n\n[GetCharacter('kbo_salmama').GetShortName] щосили намагається зберегти єдність нашого народу всупереч підступним планам внутрішніх і зовнішніх ворогів. Кожному ясно, що для країни настали важкі часи, які або загартують нас, або остаточно роз'єднають і відправлять країну на смітник історії."
  country_history_KHM: "[GetCountry('KHM').GetLongName] — велика держава, яку століттями всі визнавали центром #TOOLTIP:REGION,indochina_region,X #L Індокитаю#!#!. Однак після навернення в #TOOLTIP:RELIGION,$theravada_tt$,X #L тхераваду#!#! вона поступово втратила абсолютне панування в регіоні. Зростаючі країни на захід і схід від стародавньої столиці #TOOLTIP:LOCATION,angkor,X #L Ангкора#!#! загрожують порушити сформований баланс сил.\n\nНарод [GetCountry('KHM').Custom('CL_GEN')], обтяжений труднощами утримання іригаційних систем і грандіозних храмових комплексів, тепер захищається ще й від зовнішніх вторгнень, щоб вижити й повернути собі домінуюче становище в Індокитаї."
  country_history_KNI: "Після падіння Акри в 1291 році [GetCountry('KNI').GetName] захопив[GetCountry('KNI').Custom('end_fem')] острів #TOOLTIP:LOCATION,rodos,X #L Родос#!#! на початку XIV століття, щоб звести там потужну фортецю для захисту #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! паломників. Відтоді цей мальовничий куточок #TOOLTIP:AREA,aegean_sea_area,X #L Егейського моря#!#! слугує головним плацдармом нашого #TOOLTIP:GOVERNMENT_REFORM,military_order_reform,X #L ордену#!#! в регіоні та жвавим торговельним вузлом. Процвітанню острова заважають лише постійні напади #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!, але ми не поступаємося ворогу й щоразу доблесно відбиваємо його безглузді атаки.\n\nПроте майбутнє ордену стоїть під питанням: противник набирає сили, а #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! країни роз'єднані й не готові об'єднуватися проти спільної загрози. З кожним днем визволення Святої землі стає все менш імовірним, однак ми не здамося й будемо битися до останнього воїна!"
  country_history_KOR: "Утворення [GetCountry('KOR').Custom('longname_ru_GEN')] під владою однойменної династії ознаменувало нову добу в історії нашого народу. Це був час процвітання мистецтва, літератури, дипломатії та віри, що назавжди змінило культурні традиції #TOOLTIP:REGION,korea_region,X #L Кореї#!#!.\n\n[GetCharacter('kublai_khan').GetName] [Select_CString(GetCharacter('kublai_khan').IsFemale, 'змусила', 'змусив' )] наших правителів підкоритися собі, але [GetCountry('KOR').Custom('CL_DAT')] досі вдається бути вельми впливовою країною завдяки своєму потужному флоту та освіченому населенню.\n\nОднак у повітрі витає вітер змін: із занепадом #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійських#!#! традицій і поширенням бентежних, революційних ідей неоконфуціанства свідомість людей починає змінюватися… Чи змо[GetCountry('KOR').Custom('end_gegu')]же [GetCountry('KOR').GetNameWithNoTooltip] скористатися цією ситуацією, щоб знову здобути незалежність? Або ж країна залишиться вірним васалом #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#!?"
  country_history_LIT: "[GetCountry('LIT').GetLongName], перебуваючи між #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_GEN')|L]#!#! та могутньою #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#!, пишається своїм статусом останнього оплоту язичництва. Правляча династія #TOOLTIP:DYNASTY,$gediminid_dynasty_tt$,X #L Гедиміновичів#!#! вже досягла чималих успіхів, розширивши свої володіння за рахунок земель Київської Русі. Однак зростаючий тиск і безперервний хрестовий похід, який очолюють [GetCountry('TEU').GetLongName], [GetCountry('LIV').GetLongName] та [GetCountry('BOH').GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!, слугують грізним нагадуванням: релігійні розбіжності можуть стати нашою загибеллю. Численні спроби прийняти #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! віру поки не увінчалися успіхом, а наростаюча напруженість на кордонах загрожує стабільності країни."
  country_history_MAC: "[GetCountry('MAC').Custom('longname_ru_INST')] керує амбітна династія #TOOLTIP:DYNASTY,$mortimer_dynasty_tt$,X #L Мортімерів#!#! — це одна з найвпливовіших марок на кордоні між #TOOLTIP:AREA,wales_area,X #L Уельсом#!#! та [GetCountry('ENG').Custom('longname_ru_INST')].\n\nПокійний [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName], що мав майже королівську владу, тримав [GetCountry('ENG').Custom('CL_ACC')] у своїх руках після того, як за його наказом було підступно вбито [GetCharacter('eng_edward_ii').GetShortName], і завдяки цьому [GetCountry('ENG').GetGovernment.GetActiveRegentTitle|l] здобув надзвичайний вплив. Однак такі амбіції стали смертельними — у 1330 році його скинули та стратили, а на ім'я Мортімерів лягла незмивна пляма узурпаторів і зрадників.\n\n[Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'Молода', 'Молодий' )] [GetCharacter('eng_roger_mortimer_2nd_earl_of_march').GetName] [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'успадкувала', 'успадкував' )] не лише великі маєтки та престиж лорда марки, а й тягар зганьбленого роду. І хоча зараз молодість [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'її', 'його' )] береже, англійська корона пильно спостерігає за [Select_CString(GetCharacter('eng_roger_mortimer_2nd_earl_of_march').IsFemale, 'юною спадкоємицею', 'юним спадкоємцем' )].\n\nЧи стануть [ShowDynastyNameWithNoTooltip('mortimer_dynasty')] просто ще одним шляхетним родом, канувши в безвість, чи ж їм вдасться повернути собі колишній вплив по обидва боки від марки?"
  country_history_MAJ: "[GetCharacter('maj_raden_wijaya').GetName] [Select_CString(GetCharacter('maj_raden_wijaya').IsFemale, 'створила', 'створив' )] [GetCountry('MAJ').Custom('longname_ru_ACC')] — могутню країну вздовж берегів #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#!. Однак після [Select_CString(GetCharacter('maj_raden_wijaya').IsFemale, 'її', 'його' )] смерті, на престол [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'зійшла', 'зійшов' )] [GetCharacter('maj_jayanagara').GetName], [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'яка проявила', 'який проявив' )] себе куди гірше: [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'її', 'його' )] правління було відзначене внутрішніми та зовнішніми негараздами, а також відкритими повстаннями проти верховної влади.\n\nУ 1328 році [GetCharacter('maj_jayanagara').GetShortNameWithNoTooltip] [Select_CString(GetCharacter('maj_jayanagara').IsFemale, 'була нарешті вбита', 'був нарешті вбитий' )] внаслідок замаху, і владу в країні [Select_CString(GetCharacter('maj_tribhuwana').IsFemale, 'зосередила', 'зосередив' )] у своїх руках [GetCharacter('maj_tribhuwana').GetName], [GetCountry('MAJ').GetGovernment.GetActiveRegentTitle|l] при своєму синові на ім'я [GetCharacter('maj_hayam_wuruk').GetName]. Початок [Select_CString(GetCharacter('maj_tribhuwana').IsFemale, 'її', 'його' )] регентства ознаменував нову добу для [GetCountry('MAJ').Custom('CL_GEN')], причому країну всіляко підтримує [GetCharacter('maj_gajah_mada').GetName] — зараз це #italic махапаті#!, віце-[GetCountry('ENG').GetGovernment.GetActiveRegentTitle|l].\n\nБез сумніву, під чуйним наглядом таких видатних державних діячів [GetCountry('MAJ').Custom('CL_ACC')] чекає золотий вік!"
  country_history_MAL: "[GetCharacter('mal_musa_keita').GetName] з #ONCLICK:COUNTRY,[GetCountry('MAL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MAL').Custom('CL_tt')],X [GetCountry('MAL').Custom('CL_GEN')|L]#!#! тринадцять років тому вразив увесь світ, коли здійснив #italic хадж#! до Мекки. Дорогою він щедро витрачав золото на благо віри: будував молитовні будинки та залучав до своєї свити талановитих людей. Менестрелі прославляли його як найбагатшу людину в усьому світі, а літописці в барвах описували, який щедрий #italic закят#! (милостиню) він роздає скрізь, де проходить його довгий і розкішний караван.\n\nПодібна демонстрація щедрості безумовно відображала неймовірне багатство [GetCountry('MAL').Custom('CL_GEN')], чиї землі значно розширилися та об'єдналися під владою династії [GetCountry('MAL').GetGovernment.GetRuler.GetDynasty.GetName] внаслідок налагодженої та розгалуженої мережі торговельних шляхів. Втім, коли [GetCharacter('mal_musa_keita').GetShortNameWithNoTooltip] покине цей світ, його спадкоємцям буде непросто втримати в руках його незліченні багатства та населені такими різними народами володіння…"
  country_history_MAM: "Мамлюцька держава, викувана у вогні перевороту та підтримана мечами воїнів-рабів з #TOOLTIP:REGION,caucasus_region,X #L Кавказу#!#!, була народжена після падіння #ONCLICK:COUNTRY,[GetCountry('HSN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HSN').Custom('CL_tt')],X [GetCountry('HSN').Custom('CL_GEN')|L]#!#!. Під управлінням таких прославлених правителів, як [GetCharacter('mam_baybars_ii').GetName], мамлюки зупинили #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольську#!#! навалу біля міста #TOOLTIP:LOCATION,nablus,X #L Наблус#!#! в битві при Айн-Джалуті та розгромили останній оплот хрестоносців — [GetCountry('KOJ').Custom('longname_ru_ACC')]. Тепер [GetCountry('MAM').GetLongName] став[GetCountry('MAM').Custom('endlong_fem')] домінуючою #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманською#!#! силою всього Східного Середземномор'я, керуючи #TOOLTIP:REGION,egypt_region,X #L Єгиптом#!#! та #TOOLTIP:AREA,levant_area,X #L Левантом#!#! зі своєї блискучої столиці — #TOOLTIP:LOCATION,cairo,X #L Каїра#!#!.\n\nОтримавши легітимність завдяки цим перемогам, авторитету маріонеткового халіфа, що оселився в Каїрі, а також статусу хранителів #TOOLTIP:LOCATION,mecca,X #L Мекки#!#! та #TOOLTIP:LOCATION,medina,X #L Медіни#!#!, [GetCharacter('mam_an_nasir_bahri').GetName] [Select_CString(GetCharacter('mam_an_nasir_bahri').IsFemale, 'зуміла', 'зумів' )] домогтися рідкісної стабільності в країні, що розбагатіла на торгівлі. Однак виживання [GetCountry('MAM').Custom('rank_ru_GEN')|l] залежить від лояльності розрізненої військової еліти, і неминучі кризи успадкування постійно загрожують зруйнувати цю могутню країну."
  country_history_MLO: "Політичні хитросплетіння на Італійському півострові не так просто розібрати. Вороги та друзі, союзники та противники — це лише ярлики, які змінюються, немов маски, і [GetCountry('MLO').GetName] не виняток. Спираючись на розвинене місто #TOOLTIP:LOCATION,milano,X #L Мілан#!#!, ми можемо поширювати свій вплив на нещодавно завойовані землі, одночасно захищаючись від вторгнень зі сходу та заходу. Водночас інші міста нашої країни також починають набувати все більше могутності та автономії, що може призвести до роздробленості та ослаблення нашої влади. Словом, небезпеки чатують на нас, ніби гострі кинджали в темному провулку.\n\nОднак навіть у такій недружній ситуації #TOOLTIP:LOCATION,milano,X #L Мілан#!#! займає вельми вигідне становище. І якщо нам вдасться усунути всі внутрішні та зовнішні загрози, ми здобудемо неймовірне багатство, славу та престиж."
  country_history_MOR: "Магриб бачив злети та падіння багатьох династій — від Ідрісидів до Альморавідів та Альмохадів — одна за одною змінювалися могутні #L [GetCountry('MOR').GetAdjective|l]і#! країни. Доба нестабільності та невпевненості завершилася, коли до влади прийшла династія #TOOLTIP:DYNASTY,$marinid_dynasty_tt$,X #L Маринідів#!#! та [GetCharacter('mor_abu_al_hasan_ali').GetName]. Завдяки майстерному поєднанню військової сили та дипломатичної хитрості нам вдалося зміцнити владу у своїх землях.\n\nТепер наші прагнення звернені на схід, де ми кинемо виклик #TOOLTIP:DYNASTY,$zayyanid_dynasty_tt$,X #L зайянідському#!#! пануванню #ONCLICK:COUNTRY,[GetCountry('TLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TLE').Custom('CL_tt')],X [GetCountry('TLE').Custom('CL_GEN')|L]#!#!. А на півночі, від #TOOLTIP:LOCATION,algeciras,X #L Альхесіраса#!#! до #TOOLTIP:LOCATION,ronda,X #L Ронди#!#!, ми утримуємо стратегічний плацдарм по той бік #TOOLTIP:LOCATION,strait_of_gibraltar,X #L Гібралтарської протоки#!#!, виступаючи в союзі зі своїми братами по вірі — мусульманами з #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_GEN')|L]#!#! — у спільній боротьбі проти християнських правителів Іберії. Наш шлях не буде простим, але нам вистачить сил і рішучості подолати всі перешкоди на шляху до мети."
  country_history_MOS: "[GetCountry('MOS').Custom('longname_ru_ACC')] терзають політичні інтриги, економічні труднощі під татарським ярмом і безперервна боротьба за владу між руськими князівствами, кожне з яких прагне до панування над роздробленими землями Русі. Татарська навала, як і раніше, нависає тінню над усім регіоном, влада [GetCountry('MOS').Custom('CL_GEN')], як і інші руські князівства, залишаються данниками #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#!.\n\nЧерез усі ці складнощі [GetCountry('MOS').Custom('CL_ACC')] веде [GetCountry('MOS').GetGovernment.GetRuler.GetName|l] — [Select_CString(GetCountry('MOS').GetGovernment.GetRuler.IsFemale, 'яка добре розуміє', 'який добре розуміє')], наскільки тонка межа, по якій ми змушені ходити заради виживання під владою татар. Завдяки дипломатичній хитрості та стратегічним союзам [Select_CString(GetCountry('MOS').GetGovernment.GetRuler.IsFemale, 'вона', 'він')] вміло керує справами князівства, а тепер ще прагне зміцнити свою владу та підвищити статус [GetCountry('MOS').Custom('CL_GEN')] у складі ярма, бо мріє об'єднати руські землі під одним прапором."
  country_history_NAP: "Історія [GetCountry('NAP').Custom('longname_ru_GEN')] сповнена злетів і падінь, і зараз ми знову на роздоріжжі. [GetCountry('NAP').Custom('CL_ACC')] заснували амбітні правителі з впливових династій, які прагнули підкорити собі землі на півдні Італії. Сьогодні це місто є найважливішим культурним центром, де збереглися сліди найрізноманітніших народів і цивілізацій, починаючи від стародавніх греків і римлян, закінчуючи готвільськими, #TOOLTIP:DYNASTY,$hohenstaufen_dynasty_tt$,X #L гогенштауфенськими#!#! та #TOOLTIP:DYNASTY,$anjou_dynasty_tt$,X #L анжуйськими#!#! династіями.\n\nУ 1337 році нашим королівством править [GetCountry('NAP').GetGovernment.GetRuler.GetName|l] — [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'мудра і справедлива правителька', 'мудрий і справедливий монарх' )] з гострим розумом і тонким політичним чуттям. Завдяки [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'їй', 'йому' )] наша країна переживає період відносного спокою після низки важких випробувань.\n\nАле що чекає [GetCountry('NAP').GetAdjectiveWithNoTooltip|l]і землі, коли [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'правительки', 'правителя' )] не стане? Чи зможе [Select_CString(GetCountry('NAP').GetGovernment.GetRuler.IsFemale, 'її', 'його' )] наступник дати відсіч ворогам, які тільки й чекають, щоб прибрати до рук нашу країну? Історія нашої країни ще далека від завершення…"
  country_history_NAV: "[GetCountry('NAV').GetLongName], або #italic Королівство Памплона#!, як його [Select_CString(GetCharacter('nav_inigo_arista').IsFemale, 'назвала', 'назвав' )] [GetCharacter('nav_inigo_arista').GetName] після заснування країни навколо #TOOLTIP:LOCATION,pamplona,X #L однойменного міста#!#!, нині пережива[GetCountry('NAV').Custom('endlong_etyut')] занепад. Країна затиснута між землями більших сусідів, що жадібно дивляться на її землі. Вона з'явилася на світ як #TOOLTIP:CULTURE,$basque_tt$,X #L баскська#!#! марка Каролінзької імперії, пережила як схід і падіння місцевих династій, так і їх заміну #TOOLTIP:CULTURE,$french_tt$,X #L французами#!#!, внаслідок чого почала політично тяжіти в бік [GetCountry('FRA').Custom('longname_ru_GEN')].\n\nЧи змо[GetCountry('NAV').Custom('endlong_gegu')]же [GetCountry('NAV').GetLongNameWithNoTooltip] повернути колишню славу та чинити опір волі могутніших сусідів, коли всі шляхи для розширення закриті, а культурний тиск лише зростає?"
  country_history_NOV: "#TOOLTIP:LOCATION,novgorod,X #L Новгород#!#! був заснований #TOOLTIP:CULTUREGROUP,slavic_group,X #L слов'янами#!#! та скандинавами під іменем #italic Хольмгард#!, а сьогодні є головним політичним і торговельним центром на півночі #TOOLTIP:CULTUREGROUP,russian_group,X #L східнослов'янських#!#! земель. Формально ним керує [GetCountry('NOV').GetGovernment.GetRulerTitle|l] після перемоги на виборах з-поміж правителів сусідніх країн, однак справжньою владою тут володіє [GetCountry('NOV').GetGovernment.GetParliament.GetName|l]. А завдяки торговельним шляхам, які пов'язують багаті на ресурси #L [GetCountry('NOV').GetAdjective|l]і#! місцевості з Балтикою та Білим морем, наша країна процвітає.\n\nПроте останні десятиліття нашої історії затьмарені постійними конфліктами [GetCountry('SWE').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#!, і лише створення фортеці на території #ONCLICK:COUNTRY,[GetCountry('ORE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ORE').Custom('CL_tt')],X [GetCountry('ORE').Custom('CL_GEN')|L]#!#! як прикордонного плацдарму забезпечило нам відносне затишшя. Тим часом на півдні набира[GetCountry('MOS').Custom('end_etyut')] міць [GetCountry('MOS').GetName], а за цією країною сто[GetCountry('GLH').Custom('endlong_ityat')] [GetCountry('GLH').GetLongName]. Ймовірно, найближчими роками горді та незалежні новгородці опиняться на роздоріжжі та прийматимуть нелегкі, але все ж необхідні рішення для захисту своїх земель."
  country_history_PAL: "$country_history_german_group$\n\n[GetCountry('PAL').GetLongName], отримавши за Павійським договором незалежність і статус курфюрства, тепер сто[GetCountry('PAL').Custom('endlong_ityat')] перед важливим завданням об'єднання розрізнених володінь. [GetCharacter('pal_rudolf_ii_wittelsbach').GetName] [Select_CString(GetCharacter('pal_rudolf_ii_wittelsbach'.IsFemale, 'повинна', 'повинен' )] зосередитися на зміцненні країни. На берегах Рейну розташований політичний та економічний центр #ONCLICK:COUNTRY,[GetCountry('PAL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAL').Custom('CL_tt')],X [GetCountry('PAL').Custom('CL_GEN')|L]#!#! з родючими землями та жвавими торговельними шляхами. Водночас #italic Верхній Пфальц#! зберігає тісний зв'язок з баварським корінням правлячої династії [GetCountry('PAL').GetGovernment.GetRuler.GetDynasty.GetName].\n\nЯким би курсом не пішла країна, [GetCountry('PAL').Custom('CL_DAT')] доведеться подолати опір регіональних суперників, щоб не опинитися під загрозою поглинання сильнішими сусідами."
  country_history_PAP: "З тих самих часів, як святий Петро заснував католицьку церкву, її служителі ревно займаються спасінням людських душ під чуйним керівництвом Єпископа #TOOLTIP:LOCATION,rome,X #L Римського#!#!, якого називають «[GetCountry('PAP').GetGovernment.GetRulerTitle]».#italic Піпінів дар#! став підставою для створення #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#! — справжнього оплоту віри, який покликаний допомагати людям і наставляти їх на вірний шлях.\n\nОднак в останні десятиліття ми зіткнулися з безліччю випробувань. Коли помер [GetCharacter('pap_boniface_viii').GetName], наш уряд був змушений переміститися до #TOOLTIP:LOCATION,avignon,X #L Авіньйона#!#!, де на нього почав впливати [GetCharacter('fra_philippe_iv_capet').GetName]. Крім того, наші #TOOLTIP:REGION,italy_region,X #L італійські#!#! володіння опинилися в руках ворогуючих династій.\n\nВоістину, [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale,'Намісниця', 'Намісник')] Христа [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'опинилася', 'опинився' )] у важкому становищі. Чи стане [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'вона', 'він' )] маріонеткою [GetCountry('FRA').Custom('longname_ru_GEN')], чи дозволить світській владі піднестися над духовною? Або ж [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'їй', 'йому' )] вдасться вирватися з-під іноземного впливу та знову зайняти уготоване [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'їй', 'йому' )] Богом місце на чолі церкви?"
  country_history_POL: "[GetCountry('POL').GetLongName] століттями стражда[GetCountry('POL').Custom('endlong_etyut')] від війн, династичних чвар і мінливих кордонів. Нинішній правитель [GetCharacter('pol_casimir_iii_piast').GetName] розпочав своє енергійне правління в 1333 році, але попри всі його зусилля з об'єднання країни, багато [GetCountry('POL').GetAdjectiveWithNoTooltip|l]их васалів продовжують відстоювати свої традиційні свободи на противагу дипломатичним прагненням, які плекає [GetCountry('POL').GetGovernment.GetRulerTitle|l]. Проте, бажаючи змінити життя та закони в країні, [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] вже [Select_CString(GetCharacter('pol_casimir_iii_piast').IsFemale, 'закріпила', 'закріпив' )] деякі права за #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейською#!#! меншиною країни, як і за [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ими селянами, заслуживши собі прізвисько «[GetCountry('POL').GetGovernment.GetRulerTitle] холопів».\n\nОднак не вщухає війна проти [GetCountry('TEU').Custom('longname_ru_GEN')], в якій [GetCharacter('pol_casimir_iii_piast').GetShortNameWithNoTooltip] та [GetCharacter('lit_gediminas_gediminids').GetName] б'ються пліч-о-пліч проти спільного ворога, сподіваючись повернути зайняті ним землі.\n\nЧи зможе [GetCountry('POL').GetGovernment.GetRuler.GetName|l] встановити міцний мир [GetCountry('TEU').Custom('endlong_predlog_sso')] [GetCountry('TEU').Custom('longname_ru_INST')] і продовжити свої внутрішні реформи, чи війна й далі розорятиме [GetCountry('POL').GetAdjectiveWithNoTooltip|l]і землі?"
  country_history_PLE: "[GetCountry('PLE').GetName|U] (від англ. pale, букв. «кордон, огорожа, застава») — останній оплот [GetCountry('ENG').Custom('CL_GEN')] в #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!. Саме тут знаходиться #TOOLTIP:LOCATION,dublin,X #L Дублінський#!#! замок. Землі Пейла примикають до східного узбережжя, а його кордони укріплені ровами та огорожами.\n\nРештою Ірландії керують #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ірландські#!#! графи, чиї володіння входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манору Ірландія#!#!. За роки життя в гельських диких землях вони зблизилися з місцевими #TOOLTIP:CULTURE,$irish_tt$,X #L ірландськими#!#! лордами та розгубили колишні зв'язки.\n\nПроте Дублін залишається політичним, правовим і торговельним центром #TOOLTIP:CULTURE,$english_tt$,X #L англійської#!#! колонії в Ірландії. Поки королівські намісники намагаються зміцнити владу корони, слабкий ірландський парламент ухвалює закони, які ніхто не збирається виконувати.\n\nЧи вдасться манору Ірландія повернути втрачені території? Або ж він продовжить втрачати землі та вплив, поки гельські лорди та прикордонні графи ділять Смарагдовий острів між собою?"
  country_history_POR: "[GetCountry('POR').GetLongName] здобу[GetCountry('POR').Custom('endlong_fem')] незалежність після довгої та напруженої боротьби як з #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманськими#!#!, так і з #TOOLTIP:RELIGIONGROUP,christian,X #L християнськими#!#! правителями #TOOLTIP:REGION,iberia_region,X #L Іберії#!#!. Після того, як [GetCharacter('por_dinis_i_portugal').GetShortName] провів важливі соціальні, економічні та культурні реформи, його син і спадкоємець [GetCharacter('por_afonso_iv_portugal').GetName], а також весь #TOOLTIP:CULTURE,$portuguese_tt$,X #L португальський#!#! народ тепер стоять перед новими завданнями та можливостями.\n\nНа заході та півдні простягається безкрайній #TOOLTIP:REGION,north_atlantic_ocean_region,X #L Північний Атлантичний океан#!#!, завдяки чому ми можемо торгувати з далекими землями. На сході лежить могутня країна — [GetCountry('CAS').GetLongName] — яка пов'язана [GetCountry('POR').Custom('endlong_predlog_sso')] [GetCountry('POR').Custom('CL_INST')] тісними династичними узами. Вона може як завадити, так і допомогти об'єднанню Іберії під португальським началом.\n\nЯк би там не було, [GetCountry('POR').Custom('CL_DAT')] належить зміцнити позиції, щоб гарантувати собі незалежність у майбутньому."
  country_history_SCO: "Над #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! знову нависає загроза!\n\n[GetCharacter('sco_robert_the_bruce').GetName], наш колишній король, а також доблесний лицар Вільям Воллес зовсім недавно звільнили країну від #L [GetCountry('ENG').GetAdjective|l]ого#! гніту.\n\n[GetCharacter('sco_david_ii').GetName], юний спадкоємець короля, тепер змушений шукати притулку [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#!, поки шотландська знать бореться проти #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_GEN')|L]#!#! — [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого поплічника, що претендує на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ий престол.\n\nЗараз народ єдиний у своєму прагненні звільнитися, але ця згуртованість може впасти будь-якої миті, оскільки в королівстві вже давно назрів конфлікт між заможними англомовними шотландцями з низин і незалежними кланами з Північно-Шотландського нагір'я.\n\nКолись римські загарбники збудували навколо нас стіну в страху перед [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ою жорстокістю. Можливо, саме час проявити її…"
  country_history_SBL: "Над #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! згущуються хмари.\n\n[GetCharacter('sco_robert_the_bruce').GetName] лише пару десятиліть тому самовільно привласнив шотландську корону і вигнав #L [GetCountry('ENG').GetAdjective|l]і#! війська з країни.\n\n[GetCharacter('sco_edward_balliol').GetName], його [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'дочка', 'син' )], за логікою речей є [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'спадкоємицею', 'спадкоємцем' )] і вирішує виправити цю несправедливість, заявивши про права на [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ий престол. Заручившись підтримкою [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]их поплічників, [Select_CString(GetCharacter('sco_edward_balliol').IsFemale, 'вона готова', 'він готовий' )] кинути виклик узурпатору, щоб повернути собі [GetCountry('SCO').Custom('CL_ACC')]. Але це буде непросто…"
  country_history_SER: "[GetCountry('SER').GetName] займа[GetCountry('SER').Custom('end_etyut')] родючі низовини та рівнини півночі, порізані течією могутніх річок Дунай та Сава. На південь ландшафт змінюється суворими лісистими землями, які переходять у неприступні Динарські Альпи.\n\n[GetCountry('SER').GetNameWithNoTooltip] став[GetCountry('SER').Custom('end_fem')] значущою силою в регіоні за часів правління династії #TOOLTIP:DYNASTY,$nemanjic_dynasty_tt$,X #L Неманичів#!#!. Ця королівська династія, заснована Стефаном Неманею в XII столітті, заклала основи єдиної [GetCountry('SER').GetAdjectiveWithNoTooltip|l]ої країни, зміцнила її #TOOLTIP:RELIGION,$orthodox_tt$,X #L православну#!#! ідентичність і домоглася церковної самостійності. У 1219 році ці зусилля увінчалися успіхом: [GetCountry('SER').GetAdjectiveWithNoTooltip]а православна церква отримала незалежність.\n\nПри Стефані Першовінчаному почалося стрімке розширення кордонів. Захоплення прибережних земель на #TOOLTIP:PROVINCE_DEFINITION,adriatic_sea_province,X #L Адріатиці#!#! відкрило країні доступ до морської торгівлі та привнесло західний вплив. Син правителя, король Радослав, заохочував розвиток культури, підтримуючи освіту та мистецтво. Монастирі — такі як Студениця та Жича — стали центрами просвіти, в яких зберігаються безцінні рукописи та фрески.\n\nОднак, незважаючи на розквіт, [GetCountry('SER').GetNameWithNoTooltip] зіткну[GetCountry('SER').Custom('end_assya')] із зовнішніми загрозами та внутрішніми чварами. #L [GetCountry('MGE').GetAdjective]е#! вторгнення в XIII столітті завдало країні важкої шкоди, а також спровокувало конфлікти всередині династії Неманичів. [GetCharacter('ser_stefan_milutin').GetName] та [GetCharacter('ser_stefan_dragutin').GetName], король та його брат, остаточно підірвали у своїй боротьбі єдність країни. Хоча тепер все може змінитися, адже [GetCharacter('ser_stefan_dusan').GetName] твердо тримає владу в своїх руках, отримавши нагоду переламати хід історії."
  country_history_SWE: "[GetCountry('SWE').GetLongName] — це [GetCountry('SWE').GetFlavorRank|l] у своїй феодальній епосі. [GetCharacter('swe_magnus_eriksson').GetName] править не тільки цією країною, а й #ONCLICK:COUNTRY,[GetCountry('NOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOR').Custom('CL_tt')],X [GetCountry('NOR').Custom('CL_INST')|L]#!#!. Лише кілька років тому ми викупили у збіднілих данців [GetCountry('SKE').Custom('longname_ru_ACC')]. Наша країна величезна, але слабо заселена і в основному покрита густими лісами. Однак у надрах під ними лежать #TOOLTIP:GOODS,iron,X залізні#! та #TOOLTIP:GOODS,copper,X мідні#! руди, і їх видобуток може збагатити нашу країну.\n\nПеред нами стоять важкі завдання: [GetCountry('NOV').GetLongName] оспорю[GetCountry('NOV').Custom('endlong_etyut')] наш контроль над Інгрією, а [GetCountry('DAN').GetLongName] та [GetCountry('TEU').GetLongName] контролюють великі землі на півдні — ці землі могли б стати в пригоді нашій країні.\n\nУ [GetCountry('SWE').Custom('CL_GEN')] є нагода стати однією з найвеличніших країн світу. Чи зможемо ми подолати всі перешкоди, набути заслуженої могутності та досягти #italic Dominium Maris Baltici#! — панування над Балтійським морем?"
  country_history_TEU: "Славний #italic Орден братів Німецького дому Святої Марії в Єрусалимі#!, більш відомий як [GetCountry('TEU').GetLongName], продовжує розширювати свої володіння на суворих берегах Балтійського моря. Хоча спочатку орден був заснований для захисту #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! паломників на Святій землі, сьогодні ми ставимо за мету поширення християнства серед язичницьких племен #TOOLTIP:AREA,prussia_area,X #L Пруссії#!#! та #TOOLTIP:AREA,baltic_area,X #L Балтики#!#!. Саме для виконання такої важливої місії і було вирішено створити тут нову країну.\n\n[GetCharacter('teu_werner_von_orseln').GetName], попередній Великий магістр, [Select_CString(GetCharacter('teu_werner_von_orseln').IsFemale, 'змогла', 'зміг' )] приєднати до ордену значні території, але це призвело до неприємних наслідків: язичники об'єдналися проти нас, тому тепер нам протистоїть набагато грізніший противник — [GetCountry('LIT').GetLongName]. Гірше того, вони змогли залучити на свій бік [GetCountry('POL').Custom('longname_ru_ACC')], чиї #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! правителі охоче забули про свій християнський обов'язок заради можливої вигоди.\n\nНастав час довести, що ми гідні покликання, яке було послано нам згори. Нехай вороги оточують нас з усіх боків, ми все одно не відречемося від своєї віри!"
  country_history_THO: "[GetCharacter('mcm_brian_boruma').GetName], великий верховний король Ірландії, був родоначальником клану [ShowDynastyName('o_brien_dynasty')]. Колись наші предки твердою рукою правили #ONCLICK:COUNTRY,[GetCountry('MCM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MCM').Custom('CL_tt')],X [GetCountry('MCM').Custom('CL_INST')|L]#!#!, чия територія займала п'яту частину всього острова. Однак підступний клан [ShowDynastyName('mac_carthaigh_dynasty')] відібрав наші землі та витіснив нас на північ.\n\nВідтоді ми оселилися біля гирла річки Шаннон, де й заснували #ONCLICK:COUNTRY,[GetCountry('THO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THO').Custom('CL_tt')],X [GetCountry('THO').Custom('CL_ACC')|L]#!#!. Тут ми оточені могутніми #TOOLTIP:CULTURE,$irish_tt$,X #L ірландськими#!#! королівствами та #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ірландськими#!#! графствами, між якими зберігаються напружені відносини.\n\nНезважаючи на всі труднощі, сьогодні перед нами відкривається безліч доріг. Ми можемо спробувати повернути собі контроль над [GetCountry('MCM').Custom('CL_INST')], або піти ще далі і знову об'єднати Верховне Королівство під прапором династії [ShowDynastyNameWithNoTooltip('o_brien_dynasty')]."
  country_history_TRE: "[GetCountry('TRE').GetLongName] — останній оплот колись могутньої династії [GetCountry('TRE').GetGovernment.GetRuler.GetDynasty.GetName]. Ця країна на березі Чорного моря стала свідком злету та падіння Нікейської імперії. Щоб пережити бурю під час тюркських набігів, що спустошують Анатолію, [GetCharacter('tre_basil_komnenos').GetName] [Select_CString(GetCharacter('tre_basil_komnenos').IsFemale, 'змушена', 'змушений' )] покладатися на хиткий союз [GetCountry('BYZ').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_INST')|L]#!#!. Тим часом #L [GetCountry('GEN').GetAdjective|l]ські#! купці практично монополізували торгові потоки через Крим та Чорне море, позбавивши [GetCountry('TRE').Custom('CL_ACC')] значної частини доходів. [GetCharacter('byz_andronikos_iii_palaiologos').GetName] [Select_CString(GetCharacter('byz_andronikos_iii_palaiologos').IsFemale, 'видала', 'видав' )] заміж свою позашлюбну дочку, але цей союз не виправдав надій. А ситуація в столиці все погіршується через набіги з півдня та внутрішні конфлікти зі схоларіями…\n\nЩоб зберегти те, за що ми боролися, ми повинні всіма силами триматися за владу, не гребуючи ні підступністю, ні золотом, ні силою."
  country_history_TUR: "[GetCountry('TUR').Custom('longname_ru_ACC')] [Select_CString(GetCharacter('tur_osman').IsFemale, 'заснувала', 'заснував' )] приблизно в 1299 році вождь племені Каї з огузьких тюрків на ім'я [GetCharacter('tur_osman').GetName]. Спочатку це був лише один з багатьох бейликів на північно-західному узбережжі #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!, які займали прикордонні землі колись могутнього Румського султанату. За влади цього вождя османи зміцнили та значно розширили свої володіння, захопивши стратегічно важливі землі вздовж #TOOLTIP:LOCATION,bosphorus,X #L Босфору#!#!. Завдяки успішним набігам, військовим перемогам та майстерній дипломатії вони перетворилися на один з наймогутніших бейликів регіону, що стрімко набирає силу. Наш народ винахідливий і відкритий до всього нового, ми терпимі до невірних і готові приймати поневолені народи разом з їхніми традиціями та звичаями. Ось чому наше суспільство — унікальний сплав всього найкращого, що є в людях.\n\n[GetCountry('TUR').GetLongNameWithNoTooltip] — унікальний приклад витонченої цивілізації, але це не означає, що ми не знаємо бід. Наші дні затьмарюють чвари між незалежними племенами та нескінченні кризи престолонаслідування, а також постійна загроза з боку сусідніх #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! та Ільханату, не кажучи вже про інші бейлики.\n\nАле незважаючи на цих собак, що кусають нас за ноги, ми сміливо крокуємо в майбутнє. Чи станемо ми завойовниками, послами, торговцями чи митцями, покаже час."
  country_history_ULS: "Колись могутнє графство [GetCountry('ULS').GetLongName] нині лежить у руїнах. [GetCharacter('uls_william_donn_de_burgh_3rd_earl_ulster').GetName] був зрадницьки вбитий у 1333 році. [GetCharacter('uls_elizabeth_de_burgh_4th_countess_ulster').GetShortName] [Select_CString(GetCharacter('uls_elizabeth_de_burgh_4th_countess_ulster').IsFemale, 'залишилася його єдиною однорічною спадкоємицею', 'залишився його єдиним однорічним спадкоємцем' )]. Через ослаблення нашої влади молодші гілки роду де Бург, а саме їхні країни [GetCountry('CLR').GetName], [GetCountry('MYO').GetName] та [GetCountry('CWM').GetName], почали боротися між собою за контроль над родовими землями.\n\nТим часом ворогуючі представники роду #TOOLTIP:DYNASTY,$o_neill_dynasty_tt$,X #L О’Нілл#!#!, під управлінням яких знаходяться [GetCountry('TYR').GetName] та [GetCountry('CLA').GetName], теж користуються нашим скрутним становищем і безкарно спустошують наші законні володіння.\n\nСвоєю чергою королівська адміністрація, що управляє #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_INST')|L]#!#!, теж переживає кризу, а тому не в змозі втрутитися і втихомирити розбійників. У зв'язку з цим нам залишається лише вичікувати за стінами свого неприступного замку #TOOLTIP:LOCATION,carrickfergus,X #L Каррікфергус#!#!. Але що нас чекає в майбутньому? Чи канемо ми в безвість, чи все-таки зможемо повернути собі статус впливової #TOOLTIP:CULTURE,$anglo_irish_tt$,X #L англо-ірландської#!#! країни?"
  country_history_VEN: "[GetCountry('VEN').GetLongName] — найважливіша і наймогутніша з торгових республік на Середземному морі. Вона контролює ключові торгові порти та острови, які називаються #italic Stado do Mar#!, а також багато внутрішніх районів на півночі #TOOLTIP:REGION,italy_region,X #L Італії#!#!, або #italic Domini di Terraferma#!. Процвітаючи завдяки розвиненій торгівлі, [GetCountry('VEN').GetNameWithNoTooltip] став[GetCountry('VEN').Custom('end_fem')] зразком багатства та культури, справжньою перлиною #TOOLTIP:AREA,adriatic_sea_area,X #L Адріатики#!#!.\n\nІ все ж, місту в лагуні не слід спочивати на лаврах: навколо з'являються нові загрози. На сході [GetCountry('BYZ').GetLongName] ще нескоро забуд[GetCountry('BYZ').Custom('endlong_etut')] Четвертий хрестовий похід та [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]у роль у тих подіях. На заході розширюють вплив [GetCountry('GEN').GetLongName] та [GetCountry('ARA').GetLongName], захоплюючи нові землі та торгові шляхи. Нарешті, [GetCountry('VER').GetLongName] станов[GetCountry('VER').Custom('endlong_ityat')]ся все більш відчутною загрозою для #italic Терраферми#!.\n\nЩо обіцяє [GetCountry('VEN').Custom('rank_ru_DAT')|l] майбутнє? Падіння від рук недругів чи вознесіння на вершини, до повного та беззаперечного контролю над #italic Mare Nostrum#!?"
  country_history_VIJ: "[GetCountry('VIJ').GetLongName] — це нещодавно заснована країна, що зміцнила свої позиції після рішучого розгрому #L [GetCountry('DLH').GetAdjective|l]их#! військ у #TOOLTIP:REGION,deccan_region,X #L Декані#!#!. На чолі боротьби проти #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманських#!#! правителів Індії стоять [GetCharacter('vij_harihara_sangama').GetName] та його брат [GetCharacter('vij_bukka_raya_sangama').GetName].\n\nХоча [GetCountry('VIJ').GetAdjectiveWithNoTooltip|l]а влада встановилася лише нещодавно, поточна ситуація в Декані відкриває перед нами можливості для стрімкого піднесення. Грамотно скориставшись моментом, ми зможемо встановити контроль над важливими торговими шляхами між Китаєм та #TOOLTIP:CONTINENT,europe,X #L Європою#!#!, а також отримати вигоду з експорту цінних товарів з наших багатих на ресурси земель.\n\n[GetCountry('VIJ').GetNameWithNoTooltip] зараз на порозі великих змін. Чи наважимося ми переступити цей поріг і голосно заявити про себе?"
  country_history_WLS: "#L [GetCountry('WLS').GetAdjective]ий#! народ є нащадком стародавніх кельтських племен Британії. Колись наші володіння простягалися від туманних північних нагір'їв до суворих крейдяних скель на півдні. Земля фей та поетів, дощів та моря, [GetCountry('WLS').GetName] був[GetCountry('SUK').Custom('endlong_fem')] ні на що не схожим краєм. Але цей народ не зміг утримати владу над своєю батьківщиною.\n\nСпочатку прийшли англосаксонські завойовники, які фактично зайняли місце Римської імперії, що впала, і відтіснили нас до скелястих околиць острова. Потім з'явилися норманські лицарі, які остаточно зайняли наші землі та відібрали у наших принців спадкових прав.\n\nНинішні правителі Уельсу підкоряються #L [GetCountry('ENG').GetAdjective|l]ій#! короні. За її мандатом вони управляють як англо-норманськими марками в південних долинах, так і [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]ими землями в північних горах.\n\nОднак за піснями наших музикантів та розміреним шумом дощу чути тихий бунтівний гомін. Це стане початком звільнення наших рідних земель, чи #TOOLTIP:DYNASTY,$plantagenet_dynasty_tt$,X #L Плантагенети#!#! завжди пануватимуть над [GetCountry('WLS').Custom('CL_INST')]?"
  country_history_ZAN: "[GetCountry('ZAN').GetLongName] управля[GetCountry('ZAN').Custom('endlong_etyut')] великою мережею торгових шляхів #TOOLTIP:REGION,indian_ocean_region,X #L Індійського океану#!#! і володі[GetCountry('ZAN').Custom('endlong_etyut')] міцним становищем могутньої морської країни на #TOOLTIP:REGION,swahili_coast_region,X #L узбережжі Суахілі#!#!. Понад століття правителі [GetCountry('ZAN').Custom('CL_GEN')] використовували своє стратегічне положення, щоб контролювати прибуткові маршрути, що пов'язують #TOOLTIP:CONTINENT,africa,X #L Африку#!#!, #TOOLTIP:REGION,arabia_region,X #L Аравію#!#!, Індію і навіть Китай.\n\nЇхнє багатство будувалося на обміні золота з глибинних районів Африки, #TOOLTIP:GOODS,ivory,X #L слонової кістки#!#!, #TOOLTIP:POPTYPE,slaves,X #L рабів#!#! та інших місцевих товарів на розкішні вироби — #TOOLTIP:CULTURE,$farsi_culture_tt$,X #L перські#!#! шовкові тканини, #TOOLTIP:CULTUREGROUP,indian_group,X #L індійські#!#! текстильні вироби та #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайський#!#! фарфор. Процвітання [GetCountry('ZAN').Custom('CL_GEN')] відображалося у чудовій архітектурі, що уособлювала велич та витонченість.\n\nЧас покаже, яке майбутнє уготоване [GetCountry('ZAN').Custom('CL_DAT')]. [GetCountry('ZMW').GetName] зміцню[GetCountry('ZMW').Custom('end_etyut')] свою владу на південному заході, а конкуренція на закордонних ринках стає все більш запеклою.\n\nЯкі таємниці чекають попереду? Час покаже."
  country_history_ZMW: "Завдяки контролю над багатствами Південно-Східної Африки [GetCountry('ZMW').GetLongName] пережива[GetCountry('ZMW').Custom('endlong_etyut')] період стабільності та процвітання. Жвава торгівля з купцями #TOOLTIP:REGION,swahili_coast_region,X #L узбережжя Суахілі#!#! забезпечує постійний приплив екзотичних товарів з далеких Індії та Китаю, а рудники в глибині континенту здаються невичерпним джерелом скарбів. Наша столиця, найбільше місто в околиці, знаменита своїми могутніми кам'яними спорудами, які багато століть будуть свідченнями #L [GetCountry('ZMW').GetAdjective|l]их#! досягнень.\n\nАле незважаючи на все це, нашій славній країні загрожує небезпека. Ми не зможемо вічно сподіватися на нескінченні ресурси, а посушливий клімат часто призводить до неврожаїв. Наше населення нечисленне. І хоча ми вважаємося могутньою торговою країною, торговий баланс через нашу необережність будь-якої миті може зміститися на чужу користь. Крім того, з нас не зводять очей жадібні сусіди.\n\nЯке майбутнє уготоване [GetCountry('ZMW').Custom('CL_GEN')]? Чи зможе наша країна подолати численні перешкоди та реалізувати свій потенціал, ставши головною на всьому узбережжі Суахілі? Чи її розірвуть на частини шакали внутрішніх та зовнішніх конфліктів?"
  country_history_haudenosaunee: "Предки дивляться на нас зі схваленням. Засновники нашого славного народу — Великий Миротворець, Гайавата та Джигонсасе — показали нам, що співпраця та мир між племенами куди кращі за нескінченні чвари минулого. Завдяки цьому ми досягли небаченого раніше процвітання. Наш спільний Великий закон миру допоміг зібрати разом наші розрізнені племена і дав нам спосіб вирішувати конфлікти та разом ухвалювати рішення. Цей закон заохочує мирне сусідство та допомагає придушувати міжусобні чвари. Організовані поселення дозволили нам створити грізне військо, а завдяки системі запису повідомлень на шнурах-вампумах наші дипломатичні зв'язки поширюються на небачені досі відстані.\n\nОднак наші сусіди не поділяють цього погляду на світ і за першої ж нагоди спробують нас знищити. Ми повинні переконати їх жити з нами в гармонії — якщо буде потрібно, то й силою."
  country_history_puebloan: "Колись ми зводили будинки на вітряних гірських схилах і зрошували сади за допомогою розвинених систем іригації. Ми проводили складні ритуали, віддаючи шану великому колу життя. У ті часи ми були знаменитими торговцями, а сфера нашого впливу простягалася на всі ці посушливі землі.\n\nОднак слава народу #TOOLTIP:CULTUREGROUP,puebloan_group,X #L пуебло#!#! залишилася в минулому. Наші колись процвітаючі та галасливі міста тепер не більше ніж тінь себе колишніх. Сама земля ніби зрадила нас. Ґрунт, який був колись родючим, став сухим і твердим як камінь. Наші селяни більше не можуть прогодувати всю країну.\n\nМоже, нашій культурі скоро прийде кінець? Чи обернемося ми на прах, залишившись лише у спогадах, чи ж знайдемо нового вождя, здатного об'єднати наш народ і повернути йому колишню велич?"
  country_history_nahua: "За останні два століття багато груп #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науаських#!#! народів, що ведуть своє походження від чичимеків, переселилися до Центральної Мексики з Ацтлану, своєї легендарної прабатьківщини. Разом з ними прийшли сюди і наші предки.\n\nЯк і багато інших науа, ми заснували свій #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетль#!#!. Тим самим ми заклали основу своєї власної самобутньої цивілізації, незалежної від навколишніх міст і володінь, адже в кожному альтепетлі обряди та влада влаштовані по-своєму.\n\nНаше прекрасне місто прикрашають плавучі сади, хитромудрі зелені тераси та дорогоцінне каміння, яке везуть до нас торговці з далеких земель. Ми задоволені своєю долею на цьому світі, але це не означає, що у нас немає ворогів. Багато хто навколо зазіхає на наші ресурси, та й природа в цьому жаркому місці буває немилосердна.\n\nЧи готові ми прокласти собі шлях у майбутнє і стати творцями своєї долі, чи ж станемо жертвами інтриг та інтересів наших суперників, а то й взагалі зникнемо зі сторінок історії?"
  country_history_mayan: "З тих самих пір, як його прабатьки були виліплені з кукурудзяного тіста, народ #TOOLTIP:CULTUREGROUP,maya_group,X #L майя#!#! жив у джунглях #TOOLTIP:AREA,mayaab_area,X #L Маяаба#!#!, славлячи богів і дотримуючись їхньої мудрості. Наші предки заснували безліч багатих міст, своєю мережею покривши землі від океану до найглухіших хащів. Наші мудреці розгадали таємниці Сонця, Місяця та незліченних зірок, створивши календарі, що в точності описують їхній таємничий рух по небосхилу.\n\nНа жаль, зараз побудовані нами центри торгівлі та культури, колись повні життя, стоять занедбаними, їхні колодязі пересохли, вулиці заростають деревами, а ті, хто колись підтримував полум'я, живуть у тіні колишньої слави.\n\nНевже нашому народу судилося стати холодним попелом, прихованим під зеленим пологом джунглів? Чи нам все-таки вдасться змінити долю і повернути своє минуле золоте століття?"
  country_history_tonal: "Наш народ, народжений під мудрим наглядом Крилатого Змія #TOOLTIP:GOD,quetzalcoatl_god,X #L Кетцалькоатля#!#!, створив власну цивілізацію на родючих землях #TOOLTIP:REGION,mesoamerica_region,X #L Мезоамерики#!#!. Ми віримо у свій зв'язок з тваринним світом: день і година народження кожного з нас пов'язані з певним звіром, чиї риси визначають характер людини. Наша віра має велику вагу в цьому регіоні, і ми впевнені, що люди шануватимуть її ще не одну сотню років.\n\nАле незважаючи на славне майбутнє, на горизонті згущуються хмари: безмежні амбіції наших сусідів загрожують повалити весь регіон у хаос, і ця пожежа погубить нас, якщо ми не зробимо все, щоб захистити свій спосіб життя."
  country_history_andean: "Священні гори #TOOLTIP:REGION,andes_region,X #L Анд#!#! дивилися на наших предків з початку часів. Місцевий суворий клімат і круті долини виховали сильних і винахідливих людей, здатних не тільки виживати, а й процвітати на цих непривітних землях з високими горами, вузьким узбережжям і дрімучими джунглями. У таких суворих місцях ми будуємо міцні кам'яні будівлі, які легко витримують часті підземні поштовхи. Незважаючи на ці непрості умови, ми навчилися займатися промислами, шанувати богів і добре ткати.\n\nОднак не кожен рік приносить нам багаті врожаї, та й сусіди не завжди привітні. Чи благословить доля наш народ, чи ж ми здригнемося під її ударами?"
  country_history_low_countries_common: "Народами Нідерландів з моменту виникнення цієї країни керували то [GetCountry('FRA').GetLongName], то #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!. Нідерланди — немов цінний приз, що чекає свого переможця. Це один з найбагатших регіонів #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, і зараз країни на його території стоять перед вибором: стати частиною інших країн або ж відчайдушно захищати свою незалежність."
  country_history_low_countries_minors: "$country_history_low_countries_common$\n\nНайменші країни цього регіону щодня борються за збереження незалежності від більших і жадібних сусідів."
  country_history_BRB: "$country_history_low_countries_common$\n\nБудучи найбільшою та найгустонаселенішою країною Нідерландів, ми найкраще підходимо для об'єднання сусідів під нашою владою — особливо враховуючи нинішню слабкість [GetCountry('FLA').Custom('longname_ru_GEN')]. Завдавши удару в потрібний момент, ми зможемо заслужено зайняти найвищі позиції."
  country_history_FLA: "$country_history_low_countries_common$\n\nФранко-фламандська війна (1297–1305) завдала [GetCountry('FLA').Custom('longname_ru_DAT')] серйозного удару. Країна зберегла незалежність, але була змушена поступитися #TOOLTIP:PROVINCE_DEFINITION,roman_flanders_province,X #L Римською Фландрією#!#!. Тепер ця провінція належить [GetCountry('FRA').Custom('longname_ru_DAT')].\n\nОднак за останні роки [GetCountry('FLA').Custom('CL_DAT')], як одній з найбагатших країн регіону, вдалося відновити сили. Тепер країна зможе повернути те, що по праву належить їй."
  country_history_FRI: "$country_history_low_countries_common$\n\nНаша країна оточена феодальними володарями і розривається між прихильниками збереження незалежності та тими, хто поступово прибирає до рук владу за чужоземним зразком сусідніх країн. [GetCountry('FRI').GetLongName] сто[GetCountry('FRI').Custom('endlong_ityat')] на роздоріжжі, пам'ятаючи про колишню славу нашого народу. Чи готові ми нарешті зробити крок уперед і вирішити, який устрій підходить нам більше?"
  country_history_GEL: "$country_history_low_countries_common$\n\n[GetCountry('GEL').GetLongName], найвойовничіша країна регіону, однаково успішна як у дипломатії, так і у війні. Ми ведемо експансію не лише мечем, а й золотом. Таке прекрасне поєднання дає нам можливість піднестися над нашими жалюгідними сусідами."
  country_history_HAI: "$country_history_low_countries_common$\n\nЗавдяки мудрій матримоніальній політиці [GetCountry('HAI').GetName], [GetCountry('HOL').GetName] та [GetCountry('ZEE').GetName] опинилися під владою династії #TOOLTIP:DYNASTY,$avesnes_dynasty_tt$,X #L Авенів#!#!. Тепер [GetCountry('HAI').GetLongNameWithNoTooltip] мо[GetCountry('HAI').Custom('endlong_gegu')] продовжити об'єднання регіону під своїм началом. Однак це буде непросте завдання…"
  country_history_HOL: "$country_history_low_countries_common$\n\nНаша країна зародилася на жалюгідних болотах, але поступово [GetCountry('HOL').GetLongName] перетвори[GetCountry('HOL').Custom('endlong_assya')]ся на серйозного претендента на регіональне панування. Поява династії #TOOLTIP:DYNASTY,$avesnes_dynasty_tt$,X #L Авенів#!#! вигідно зблизила нас [GetCountry('HAI').Custom('endlong_predlog_sso')] [GetCountry('HAI').Custom('longname_ru_INST')], і ми вже направили погляд на [GetCountry('FRI').Custom('longname_ru_ACC')], плануючи розширити володіння. Однак наші [GetCountry('HOL').GetGovernment.GetEstateName('nobles_estate')|l] та [GetCountry('HOL').GetGovernment.GetEstateName('burghers_estate')|l] знову гризуться між собою, що завжди згубно позначається на справах…"
  country_history_LIE: "$country_history_low_countries_common$\n\n[GetCountry('LIE').GetLongName] — батьківщина безлічі релігійних лідерів і духовний орієнтир для всіх Нідерландів. Наша країна — незаперечний центр просвіти, а тому ми маємо значний вплив на сусідів. Подібний вплив забезпечить нам велике майбутнє, якщо ми скористаємося ним мудро."
  country_history_LUX: "$country_history_low_countries_common$\n\n[GetCountry('LUX').GetLongName], родове гніздо династії #TOOLTIP:DYNASTY,$luxembourg_dynasty_tt$,X #L Люксембургів#!#!, — лише бліда тінь володінь, підконтрольних наймогутнішим гілкам нашої династії. Однак, беручи до уваги престиж, який здобули наші родичі, ми все ж можемо встановити контроль над регіоном та об'єднати його під нашою владою."
  country_history_UTR: "$country_history_low_countries_common$\n\nЗанадто довго [GetCountry('GEL').GetLongName] та [GetCountry('HOL').GetLongName] утискали свого сусіда, тому [GetCountry('UTR').GetLongName] прагн[GetCountry('UTR').Custom('endlong_ityat')]ть позбутися їхнього впливу та об'єднати Нідерланди під своїм духовним проводом. Гамірний #TOOLTIP:LOCATION,utrecht,X #L Утрехт#!#! — центр культури та мистецтва — міг би стати чудовою столицею для єдиного регіону. Будемо сподіватися, що інші з цим погодяться… і не будуть сильно чинити опір."
  country_history_swiss_group: "$country_history_german_group$\n\nНа заході Альп #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарці#!#! люто чинять опір спробам #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#! підкорити їхні землі. Після перемоги в битві при Моргартені кантони #TOOLTIP:AREA,eastern_switzerland_area,X #L Східної Швейцарії#!#! згуртувалися в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарську Конфедерацію#!#!, до якої приєднуються все нові землі. Однак їхній старий ворог, династія #TOOLTIP:DYNASTY,$habsburg_dynasty_tt$,X #L Габсбургів#!#!, накопичує сили. [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] підтримує їх у прагненні остаточно підкорити волелюбних жителів #ONCLICK:COUNTRY,[GetCountry('SWI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWI').Custom('CL_tt')],X [GetCountry('SWI').Custom('CL_GEN')|L]#!#!. Ми повинні дати серйозну відсіч цій загрозі. Доля батьківщини залежить від нас!"
  country_history_baltic_german: "Разом [GetCountry('TEU').Custom('endlong_predlog_sso')] [GetCountry('TEU').Custom('longname_ru_INST')], нашими братами по зброї, ми готові виконати священну місію — привести Північну #TOOLTIP:CONTINENT,europe,X #L Європу#!#! до світла християнства. За підтримки #TOOLTIP:CULTUREGROUP,german_group,X #L німецьких#!#! лицарів та аристократів наша країна повинна не лише навернути язичників до світла істинної віри, а й захистити тих, хто вже прийняв #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!. На жаль, #L [GetCountry('LIT').GetAdjective|l]ий#! опір все ще сильний, а інші країни, наприклад, [GetCountry('DAN').GetLongName], легко можуть використати наше протистояння у власних жадібних цілях.\n\nНаше майбутнє нерозривно пов'язане з християнською проповіддю, однак нам також варто думати й про інші матерії, крім навернення язичників. Чи повинні ми звернути свої зусилля проти #TOOLTIP:RELIGION,$orthodox_tt$,X #L православних#!#! схизматиків, чи ж наша країна повинна бути реформована?"
  country_history_german_group: "Серце #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!, переживши довгий період Великого міжцарства, з тривогою дивиться в майбутнє. [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] вже в похилому віці, і правлячі династії — [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName], [GetCountry('BOH').GetGovernment.GetRuler.GetDynasty.GetName] та [GetCountry('HAB').GetGovernment.GetRuler.GetDynasty.GetName] — знову готуються до боротьби за імператорську корону. Поки імперська влада на південь від Альп слабшає, #TOOLTIP:CULTUREGROUP,german_group,X #L німецькі#!#! купці поспішно зміцнюють свої торгові шляхи в #TOOLTIP:REGION,italy_region,X #L Італії#!#!, а [GetCountry('HSA').GetLongName] зміцнює панування над #TOOLTIP:REGION,north_german_region,X #L Північною Німеччиною#!#!."
  country_history_BAV: "$country_history_german_group$\n\nКоли [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName] [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'прийшла', 'прийшов' )] до влади, Баварія досягла вершини своєї могутності. Оскільки [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'вона', 'він' )] править усією #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священною Римською Імперією#!#!, [GetCountry('UBV').GetLongName] користу[GetCountry('UBV').Custom('endlong_etyut')]ся особливою повагою та авторитетом серед імперських правителів. На чолі [GetCountry('LBV').Custom('longname_ru_GEN')] зараз стоїть [GetCharacter('lbv_heinrich_xiv_wittelsbach').GetName], але [Select_CString(GetCharacter('lbv_heinrich_xiv_wittelsbach').IsFemale, 'її', 'його')] здоров'я неухильно погіршується через проказу, і швидка смерть може призвести до возз'єднання Баварії.\n\nУ династії [GetCountry('UBV').GetGovernment.GetRuler.GetDynasty.GetName] є міцні зв'язки з правлячими домами #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, тому Баварія готова відстоювати свою владу в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! та поширювати вплив у Центральній Європі, кинувши виклик давнім суперникам — #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_DAT')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_DAT')|L]#!#!."
  country_history_BRA: "$country_history_german_group$\n\n[GetCountry('BRA').Custom('longname_ru_ACC')] заснували як #italic Північну марку#! на землях слов'ян-вендів — де зустрічаються суглинисті височини та вологі низини, соснові ліси та вересові пустища. Земля тут переважно суха та піщана, але придатна для землеробства, за що регіон прозвали «пісочницею #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!».\n\n[GetCharacter('bra_albrecht_i_askanier').GetName], відвоювавши ці землі у Якши з Копаниці, у 1157 році офіційно прийняв титул, і тепер він [GetCountry('BRA').GetGovernment.GetRulerTitle|l]. Спочатку володіння обмежувалися Гафельландом та Цаухе, але він активно заохочував поширення #italic Ostsiedlung#! (германізації) у бік Ноймарка на схід від Одера, поступово включаючи ці території до своїх володінь. Колоністи з Фландрії та Рейнської області отримували запрошення селитися тут і попутно зміцнювали свої поселення.\n\nПісля його смерті у 1170 році династія #TOOLTIP:DYNASTY,$askanier_dynasty_tt$,X #L Асканіїв#!#! продовжувала експансію понад 150 років, приєднавши сусідні регіони, такі як #TOOLTIP:PROVINCE_DEFINITION,stettin_province,X #L Лагуна Одера#!#! та #TOOLTIP:PROVINCE_DEFINITION,uckermark_province,X #L Уккермарк#!#!, що розширило вплив династії до Балтійського моря, але призвело до конфліктів [GetCountry('DAN').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_INST')|L]#!#!. [GetCharacter('bra_heinrich_ii_askanier').GetShortName], останній Асканій, помер у 1320 році, не залишивши прямого спадкоємця.\n\nТепер при владі династія #TOOLTIP:DYNASTY,$wittelsbach_dynasty_tt$,X #L Віттельсбахів#!#!, але їхній слабкий інтерес до управління цими землями залишає майбутнє [GetCountry('BRA').Custom('longname_ru_nott_GEN')] під питанням."
  country_history_MEI: "$country_history_german_group$\n\n[GetCountry('MEI').GetLongName], володіння впливової династії [GetCountry('MEI').GetGovernment.GetRuler.GetDynasty.GetName], спочатку бул[GetCountry('MEI').Custom('endlong_fem')]а східною маркою #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! на землях лужичан та інших слов'янських народів, які поступово зазнали германізації. Ці землі, колись вкриті густими лісами, виявилися неймовірно родючими, а м'який клімат поблизу Ельби навіть дозволив місцевим саксонцям займатися #TOOLTIP:GOODS,wine,X #L виноробством#!#!.\n\nРудні гори, що відокремлюють країну від #L [GetCountry('BOH').GetAdjective|l]их#! володінь, багаті на різні корисні копалини, особливо #TOOLTIP:GOODS,silver,X #L срібло#!#!, за рахунок якого розвивається економіка [GetCountry('MEI').Custom('rank_ru_GEN')|l]. Однак ці багатства ще можуть зіграти з нами злий жарт, оскільки наші сусіди цілком можуть спробувати їх захопити. Проте, незважаючи на загрози, [GetCountry('MEI').GetNameWithNoTooltip] процвіта[GetCountry('MEI').Custom('end_etyut')]є і, як і раніше, є[GetCountry('MEI').Custom('end_etyut')] одним із найважливіших імперських володінь у #TOOLTIP:AREA,upper_saxony_area,X #L Верхній Саксонії#!#! навіть з урахуванням нестабільності, викликаної Великим міжцарством. Тим часом у сільських місцевостях #ONCLICK:COUNTRY,[GetCountry('THU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THU').Custom('CL_tt')],X [GetCountry('THU').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_GEN')|L]#!#! помітно ослабла місцева влада. #TOOLTIP:DYNASTY,$wettin_dynasty_tt$,X #L Веттіни#!#! можуть скористатися цією ситуацією та приєднати ці території до своїх володінь, щоб вже напевно стати панівною країною на сході імперії…\n\nВтім, завдяки своїм родючим землям, багатим надрам та вигідному розташуванню ми вже зараз вважаємося одним із ключових суб'єктів імперії, що викликає у сусідніх країн захоплення та заздрість."
  country_history_HAB: "$country_history_german_group$\n\n[GetCharacter('hab_albrecht_ii_habsburg').GetName] та його предки зміцнили владу #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#!, розширивши її кордони до земель #TOOLTIP:AREA,austria_area,X #L Нижньої Австрії#!#!, #TOOLTIP:AREA,styria_area,X #L Штирії#!#! та #TOOLTIP:AREA,carinthia_area,X #L Каринтії#!#!. Тепер, коли південно-східні рубежі Священної Римської імперії надійно захищені, [GetCountry('HAB').GetNameWithNoTooltip] може зосередитися на головній меті династії #TOOLTIP:DYNASTY,$habsburg_dynasty_tt$,X #L Габсбургів#!#! — поверненні імператорської корони."
  country_history_irish_minors: "Гельські вожді правлять #TOOLTIP:REGION,ireland_region,X #L Ірландією#!#! — стародавні традиції на цих землях настільки ж міцні, як узи між правителем і народом. Хоча титул Верховного короля Ірландії тепер лише смутний спогад, мрія про об'єднання острова все ще живе в серцях честолюбних вождів. Ірландські клани гордо зберігають незалежність, черпаючи силу у своїх воїнах і багатовікових звичаях. Однак роздробленість робить їх уразливими — як перед зовнішніми загрозами, так і перед міжусобицями.\n\nНа сході гіберно-нормандські графи поступово захоплюють гельські землі, а за морем королі #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! не приховують інтересу до ірландських берегів. Однак Ірландія не вперше стикається з чужоземними домаганнями — її народ не раз доводив, що вміє чинити опір і може постояти за себе. Якщо знайдеться вождь, здатний згуртувати клани та відродити стародавні традиції королівської влади, острів повстане з попелу роздроблення — вже не як клаптикова ковдра ворогуючих кланів, а як єдине королівство."
  country_history_anglo_irish_minors: "Великі графства за [GetCountry('PLE').Custom('longname_ru_INST')] — спадкоємці норманського завоювання, але вони вже тісно вплетені в тканину ірландського життя. Через 150 років після висадки Стронгбоу гіберно-нормандські лорди правлять великими землями. Вони зводять кам'яні замки там, де раніше стояли лише кільцеві форти, і командують дружинами, що не поступаються в лютості військам гельських вождів. Однак під іменами знатних родів #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!, #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_GEN')|L]#!#!, вони стали все ж особливим народом — вже не зовсім чужоземцями, але ще й не ірландцями.\n\nЇхні стіни міцні, але становище хистке. Влада [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ої корони в Ірландії слабка, і лорди давно звикли правити на власний розсуд, їх пов'язують більше місцеві союзи та чвари, ніж вірність королю, що сидить десь за тридев'ять земель. А тим часом гельські вожді на заході набираються сміливості, відвойовують втрачені землі та кидають виклик норманському пануванню.\n\nБез твердої руки ці лорди можуть загрузнути в тих самих міжусобицях, що колись розкололи острів. Але якщо знайдеться той, хто зуміє скористатися моментом — відновити сильну владу або навіть об'єднати Ірландію під своїм прапором, — то майбутнє вирішуватиме саме він, а не [GetCountry('ENG').GetGovernment.GetRulerTitle|l] Англії та бунтівні гели."
  country_history_finnic: "На півночі Європи, серед хвойних лісів, мешкають #TOOLTIP:CULTUREGROUP,finnic_group,X #L фінські#!#! народи. Ми — самобутні племена, і щоб вижити в суворому краю, покладаємося на кмітливість та знання. Ми обробляємо землю, але також і живемо дарами лісу; ми будуємо будинки та лазні з дерева, яке щедро дарує нам ліс, але можемо і перенести своє поселення, слідуючи за кращою долею, коли пори року змінюють одна одну. Життя наше нелегке, але сповнене достатку, і ми досягли успіху у своєму укладі.\n\nОднак боротьбу за виживання обтяжують вороги, які обступили нас з усіх боків. #TOOLTIP:CULTUREGROUP,german_group,X #L Німці#!#! з півдня, #TOOLTIP:CULTURE,$swedish_tt$,X #L шведи#!#! із заходу та #TOOLTIP:CULTUREGROUP,russian_group,X #L східнослов'янські#!#! народи зі сходу — всі вони загрожують нам, бажаючи повернути землі, які вважають спадщиною предків. Що ще гірше, наші стародавні вірування витісняються #TOOLTIP:RELIGIONGROUP,christian,X #L християнськими#!#! звичаями, а наші власні боги йдуть у забуття.\n\nЧи зуміє могутній вождь піднятися та утвердити владу фінів над цим регіоном? Чи ж узурпатори з усіх боків зрештою зітруть з лиця землі нашу живу спадщину?"
  country_history_italian: "З часів падіння #TOOLTIP:FORMABLE_COUNTRY,ROM_f,X #L старої Римської імперії#!#! #TOOLTIP:REGION,italy_region,X #L Італія#!#! залишалася роз'єднаною і чекала сильного правителя, який зможе об'єднати її знову. Однак така роздробленість породила гостре суперництво між країнами півострова, не кажучи вже про люте суперництво в культурній сфері. Немає такої #TOOLTIP:CULTUREGROUP,italian_group,X #L італійської#!#! країни, де не жив би відомий художник, або не з'явився б винахід, що змінив світову історію. Ось чому Італія — серце #TOOLTIP:CONTINENT,europe,X #L Європи#!#! та діамант у її короні. Всі навколо нам заздрять — це і вигідне, і неймовірно небезпечне становище одночасно."
  country_history_polish: "На берегах Вісли #TOOLTIP:CULTUREGROUP,polish_group,X #L польський#!#! народ щосили намагається зберегти свою країну. Раз за разом крихкий союз розпадався на безліч дрібних країн, що відчайдушно борються між собою за нагоду правити #TOOLTIP:CULTUREGROUP,polish_group,X #L польським#!#! народом.\n\nОднак хоч би якою божевільною була ця боротьба за владу, вона відбувалася не відірвано від решти світу, і сусіди давно помітили, як часто ми зайняті міжусобицями. Поки #TOOLTIP:CULTUREGROUP,polish_group,X #L польські#!#! князівства борються між собою, майбутні завойовники будують підступні плани, щоб забрати собі шматки їхніх земель.\n\nТільки сильний правитель зможе об'єднати ці землі та побудувати міцну країну, здатну не просто вистояти перед загарбниками, а й остаточно розгромити їх. Інакше польський народ може просто зникнути з лиця землі, розсіяний вітрами змін."
  country_history_bohemian: "Століттями наші землі перебували у сфері впливу #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!, ними часто правили князі з богемських правлячих родів. Династія, до якої зараховує себе [GetCountry('BOH').GetGovernment.GetRuler.GetName|l], підтримувала цю традицію [GetCountry('MVA').Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('MVA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MVA').Custom('CL_tt')],X [GetCountry('MVA').Custom('CL_PREP')|L]#!#! після коронації, однак землі #TOOLTIP:PROVINCE_DEFINITION,niederlausitz_province,X #L Нижньої Лужиці#!#! були втрачені на користь [GetCountry('BRA').Custom('longname_ru_GEN')], а ця країна щосили прагне зміцнити свій вплив [GetCountry('SOR').Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('SOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SOR').Custom('CL_tt')],X [GetCountry('SOR').Custom('CL_PREP')|L]#!#!.\n\nПодальший приплив #TOOLTIP:CULTUREGROUP,german_group,X #L німецьких#!#! поселенців може привести більше людей на наші землі, але якщо правителям не вдасться зберегти свій суверенітет, у недалекому майбутньому це може поставити їхню владу під загрозу."
  country_history_east_slavic: "Східні князівства, підкорені в ході #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольського#!#! вторгнення, перебувають у непростих відносинах зі своїми непередбачуваними володарями з [GetCountry('GLH').Custom('longname_ru_GEN')]. Багато князів продовжують виплачувати данину, яку збирає [GetCountry('MOS').GetName], чиї правителі носять титул #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великих князів володимирських#!#!, однак інші вже скинули з себе #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарське іго#!#!.\n\nЛавіруючи між одвічною загрозою з боку #TOOLTIP:CULTUREGROUP,mongolian_group,X #L татаро-монголів#!#! та зростаючою міццю [GetCountry('MOS').Custom('longname_ru_GEN')], наша країна повинна докласти чималих дипломатичних зусиль, щоб досягти процвітання. Однак саме ми, досягнувши успіху в цих прагненнях, зможемо претендувати на спадщину стародавньої Київської Русі."
  country_history_iberian: "Стародавня Іспанія бачила злети та падіння #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! та #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!, чиї послідовники невпинно борються за владу над півостровом і донині. Нині удача на боці першої релігії, тоді як друга ледь утримує контроль над своїми сильно скороченими володіннями. Однак все ще може змінитися: ісламські країни єдині в боротьбі, тоді як християнські країни розрізнені та загрузли в міжусобицях.\n\nЧи стане цей неспокійний час моментом, коли мусульмани остаточно будуть витіснені з #TOOLTIP:REGION,iberia_region,X #L Іберії#!#!, чи ж їм вдасться повернути втрачені землі Аль-Андалуса?"
  country_history_georgian: "#TOOLTIP:CULTURE,$georgian_culture_tt$,X #L Грузинський#!#! народ пишається своєю гордою та стародавньою історією — його предки жили біля підніжжя #TOOLTIP:REGION,caucasus_region,X #L Кавказу#!#! ще до виникнення перших великих імперій давнини. Грузини одними з перших прийняли #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#! та побудували своє суспільство на його основі. Навіть після #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманської#!#! експансії, опинившись в оточенні язичницьких народів, вони зберегли віру, ставши оплотом християнства на кордоні між Сходом і Заходом.\n\nНі #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольським#!#! ордам, ні $genghis_khan_name$у не вдалося повністю зламати цей народ — як тільки влада загарбників ослабла, грузини знову піднялися духом і кинули виклик поневолювачам.\n\nОдного разу вони вже були об'єднані у велике царство і здатні знову досягти небувалих висот."
  country_history_GEO: "$country_history_georgian$\n\nМи досягли піку своєї слави, коли нашою країною правили [GetCharacter('geo_david_iv').GetName] та [GetCharacter('geo_tamar_the_great').GetName]. Тепер [GetCountry('GEO').GetLongName] після довгого періоду роздробленості знову об'єдну[GetCountry('GEO').Custom('endlong_etyut')]ється. [GetCharacter('geo_george_v').GetName] [Select_CString(GetCharacter('geo_george_v').IsFemale, 'підкорила', 'підкорив')] захід [GetCountry('GEO').Custom('CL_GEN')] та [Select_CString(GetCharacter('geo_george_v').IsFemale, 'відновила', 'відновив')] контроль над усіма грузинськими землями. Навіть [GetCountry('ARM').GetName] схилил[GetCountry('ARM').Custom('end_assya')]ся перед могутністю [GetCountry('GEO').Custom('CL_GEN')].\n\nФормально країна залишається васалом #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Країни Хулагуїдів#!#!, однак сама вона сильно роз'єднана, і зараз [GetCountry('GEO').GetNameWithNoTooltip] застигл[GetCountry('GEO').Custom('end_fem')]а в очікуванні великого правителя, який підніметься та візьме владу у свої руки. Хіба може народ [GetCountry('GEO').Custom('CL_GEN')] не повстати з новою силою в таких умовах?"
  country_history_armenian: "#TOOLTIP:CULTURE,$armenian_culture_tt$,X #L Вірменський#!#! народ населяє ці землі з найдавніших часів, а початок його державності зародився біля підніжжя гори Арарат. Цей народ не тільки від щирого серця пишається своїм статусом першої #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! країни, а й пережив вторгнення #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!, #TOOLTIP:REGION,persia_region,X #L персів#!#! та #TOOLTIP:CULTUREGROUP,turkic_group,X #L тюркських#!#! племен, хоча виявився розділений на дрібні царства, а слава великої Вірменії минулого залишилася лише в пам'яті людей.\n\nОднак вірмени виявили неймовірну стійкість — вони витримали навіть недавні #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольські#!#! завоювання і тепер чекають години, щоб знову заявити про себе."
  country_history_ARM: "$country_history_armenian$ [GetCountry('ARM').GetLongName], хоч і перебуває під сюзеренітетом #ONCLICK:COUNTRY,[GetCountry('GEO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GEO').Custom('CL_tt')],X [GetCountry('GEO').Custom('CL_GEN')|L]#!#! та #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L країни Хулагуїдів#!#!, зберігає достатню автономію для самостійних дій. Нехай від колишньої величі сьогодні залишилася лише тінь, але правляча династія #TOOLTIP:DYNASTY,$zakarid_dynasty_tt$,X #L Закарідів#!#! зуміла зміцнити свою владу і продовжує гордо нести вірменський прапор серед інших народів світу."
  country_history_persian: "Землі #TOOLTIP:REGION,persia_region,X #L Персії#!#! споконвіку займали особливе становище, слугуючи мостом між Заходом і Сходом, а також перехрестям, де сходяться найважливіші торгові шляхи. Персія дала життя великим імперіям минулого: від Ахеменідів до Сасанідів. Наші землі стали центром, де змішувалися ідеї, культури та релігії — #TOOLTIP:RELIGION,$zoroastrian_tt$,X #L зороастризм#!#!, #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#! і навіть #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! знаходили тут своїх послідовників. Тому #TOOLTIP:RELIGIONGROUP,iranian_group,X #L іранські#!#! народи — це люди, відкриті всьому світу.\n\nВнаслідок #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольської#!#! навали та воцаріння #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Країни Хулагуїдів#!#! персам нав'язали чужоземне панування, але вони готові піднятися і повернути собі колишню велич."
  country_history_indian: "Індія вражає уяву своєю різноманітністю та відрізняється дуже давньою і багатою історією. Якщо вірити стародавнім #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстським#!#! епосам, таким як #TOOLTIP:ADVANCE_DEFINITION,mahabarata,X #L «Махабхарата»#!#! та #TOOLTIP:ADVANCE_DEFINITION,ramayana,X #L «Рамаяна»#!#!, #TOOLTIP:CULTUREGROUP,indian_group,X #L індійській#!#! культурі вже тисяча років. Величезні землі та незліченні багатства цієї країни завжди приваблювали місцевих і чужих завойовників, які прагнули привласнити все це собі. Однак Індія завжди залишалася непохитною перед обличчям жадібних загарбників.\n\nВіднедавна на наші володіння поклав око новий завойовник, цього разу з числа #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!. Релігія [GetCountry('DLH').Custom('longname_ru_GEN')] поширилася на значну частину Індії, хоча багато індуїстських країн на субконтиненті залишаються вірними собі. Інші індійські релігії, #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! та #TOOLTIP:RELIGION,$jain_tt$,X #L джайнізм#!#!, подекуди ще збереглися, хоча поширені далеко не так, як раніше.\n\nТепер майбутнє, віра та самовизначення Індії залежать від того, куди схилиться шалька терезів, і лише час покаже, чим закінчиться ця боротьба."
  country_history_thai: "#TOOLTIP:CULTURE,$thai_culture_tt$,X #L Тайські#!#! народи переселилися з #TOOLTIP:REGION,south_china_region,X #L Південного Китаю#!#! до #TOOLTIP:REGION,indochina_region,X #L Індокитаю#!#! століття тому, опинившись на перехресті торгових шляхів, а також культурного впливу Індії та Китаю. Увібравши риси обох цивілізацій, а також #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїзму#!#! та #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизму#!#!, вони сформували унікальну ідентичність. Виниклі тайські країни кинули виклик домінуванню #TOOLTIP:CULTURE,$mon_culture_tt$,X #L монських#!#! народів, чиї території скоротилися, а стародавні царства поступилися місцем тайським. [GetCountry('KHM').GetLongName] — ця країна також давно в занепаді, від її колишнього впливу не залишилося й сліду. Яких висот досягнуть тайці — покаже лише час."
  country_history_LAV: "$country_history_thai$\n\n[GetCountry('LAV').GetName] стал[GetCountry('LAV').Custom('end_fem')] одним із монських царств, що зазнали краху — ці землі не тільки були завойовані тайцями, а й розділилися на тайські царства [GetCountry('SPN').GetName] та [GetCountry('LAV').GetNameWithNoTooltip]. Останнє, хоч і зберегло колишню назву, опинилося під владою тайців, змушених визнати сюзеренітет [GetCountry('KHM').Custom('longname_ru_nott_GEN')].\n\nОднак останніми роками [GetCountry('KHM').GetAdjectiveWithNoTooltip|l]а потужність помітно зменшилася, завдяки чому [GetCountry('SUK').GetLongName] сформував[GetCountry('SUK').Custom('endlong_fem')] незалежну країну, а [GetCountry('LAV').GetNameWithNoTooltip] остаточно скинув[GetCountry('LAV').Custom('end_fem')] кайдани. Серед молодих незалежних країн зростаюче поселення [ShowLocationName('ayodhya')] також демонструє потенціал до розширення. У нас нарешті з'явилася можливість для великих змін."
  country_history_SUK: "$country_history_thai$\n\nОдна з таких нових країн, [GetCountry('SUK').GetLongName], домоглася незалежності від свого колишнього сюзерена #ONCLICK:COUNTRY,[GetCountry('LAV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LAV').Custom('CL_tt')],X [GetCountry('LAV').Custom('CL_GEN')|L]#!#!, який сам потрапив у підданство [GetCountry('KHM').Custom('longname_ru_nott_DAT')]. [GetCharacter('suk_ram_khamhaeng').GetName] [Select_CString(GetCharacter('suk_ram_khamhaeng').IsFemale, 'провела', 'провів' )] низку блискучих завоювань, після чого [GetCountry('SUK').GetNameWithNoTooltip] став[GetCountry('SUK').Custom('end_fem')] беззаперечним лідером регіону, розширивши свій вплив далі, ніж будь-яка інша тайська країна до цього. Ми повинні зробити все можливе, щоб зберегти перевагу та розширювати свій вплив далі…"
  country_history_tibet: "#TOOLTIP:CULTUREGROUP,tibetan_group,X #L Тибетці#!#!, що живуть на самій вершині світу, завжди перебували у відносній ізоляції біля підніжжя гір. Хоча #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійська#!#! віра проникла туди з Індії, вона також набула особливої місцевої форми. Споконвічна релігія #TOOLTIP:REGION,tibet_region,X #L Тибету#!#! під назвою #TOOLTIP:RELIGION,$bon_tt$,X #L «бон»#!#! також прийняла в себе нові буддійські елементи, причому до такої міри, що зараз ці релігії майже невідмінні одна від одної для зовнішнього спостерігача. Все це зробило тибетське самовизначення досить особливим, і лише небагатьом зовнішнім завойовникам вдавалося підкорити собі цей край. Стародавня Тибетська імперія зникла багато століть тому, але хто сказав, що вона не може відродитися?"
  country_history_jurchen: "#TOOLTIP:CULTUREGROUP,jurchen_group,X #L Чжурчжені#!#! населяють #TOOLTIP:REGION,manchuria_region,X #L Маньчжурію#!#! і поділяються на цзяньчжоуських, хайсійських та диких чжурчженів, які ведуть різний спосіб життя. Одні з них залишаються мисливцями-збирачами, інші — скотарями, але більшість перейшла до осілого землеробства.\n\n#TOOLTIP:CULTUREGROUP,chinese_group,X #L Китайські#!#! чиновники класифікували чжурчженів за ступенем близькості до кордонів та особливостями побуту. Цзяньчжоуські чжурчжені, що мешкають біля річки Муданьцзян, перейняли китайські звичаї. Хайсійські чжурчжені — це кочові та осілі племена, що живуть уздовж річки Хайсі. Єжень (дикі чжурчжені) на малонаселеному півночі Маньчжурії добувають їжу полюванням та примітивним землеробством.\n\nВідчуваючи вплив сусідніх династій, чжурчжені зберігають систему, за якої їхні вожді, сплачуючи данину, отримують номінальні посади командирів прикордонних гарнізонів. Однак у душі наш народ прагне набагато більшого…"
  country_history_mongolian_group: "Великий $genghis_khan_name$ викував могутню імперію, об'єднавши всі #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольські#!#! народи та підкоривши величезні території від #TOOLTIP:CONTINENT,europe,X #L Європи#!#! до Китаю. Ця імперія не знала собі рівних ні за силою, ні за грандіозністю планів. Народи по всьому світу навчилися боятися тупоту копит монгольської кінноти та могутності Великого хана.\n\nМи — продовжувачі цієї спадщини, а тому в наших серцях горить мрія про відродження найвеличнішої монгольської орди."
  country_history_CHG: "$country_history_mongolian_group$\n\n[GetCharacter('chagatai_khan').GetName] був сином $genghis_khan_name_no_tooltip$а, а отже — прямим спадкоємцем його імперії.\n\nРозташування #ONCLICK:COUNTRY,[GetCountry('CHG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHG').Custom('CL_tt')],X [GetCountry('CHG').Custom('CL_GEN')|L]#!#! в центрі монгольських країн має ключове значення — через ці землі проходить Великий шовковий шлях, що дозволяє контролювати багато з його найважливіших міст. Це ставить [GetCountry('CHG').Custom('CL_ACC')] у найкраще становище для управління торгівлею та зв'язками між іншими спадкоємцями Великого хана. І якщо хтось із них виступить проти нас, ми дамо їм рішучу відсіч…"
  country_history_GLH: "$country_history_mongolian_group$ [GetCharacter('jochi_borjigin').GetName], син $genghis_khan_name_no_tooltip$а, та його син [GetCharacter('batu_borjigin').GetName] продовжили справу Великого хана, заснувавши [GetCountry('GLH').Custom('longname_ru_ACC')].\n\nМи контролюємо безкраї степи західних меж імперії, а багато #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн служать нам, боячись нашої легендарної могутності. Так і має бути…"
  country_history_scandinavia: "В останні десятиліття #TOOLTIP:REGION,scandinavian_region,X #L Скандинавія#!#! та #TOOLTIP:REGION,north_atlantic_islands_region,X #L Північноатлантичні острови#!#! під її впливом жили благополучно. #TOOLTIP:GOODS,fish,X Рибні#! ринки та морська торгівля #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('NOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOR').Custom('CL_tt')],X [GetCountry('NOR').Custom('CL_GEN')|L]#!#! процвітають, жителі #TOOLTIP:REGION,north_atlantic_islands_region,X #L Північноатлантичних островів#!#! насолоджуються автономією та незалежністю від будь-якого прямого впливу монарха.\n \n Однак цей золотий вік під загрозою. Зростаючий вплив #ONCLICK:COUNTRY,[GetCountry('HSA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HSA').Custom('CL_tt')],X [GetCountry('HSA').Custom('CL_GEN')|L]#!#! створює конкуренцію для місцевих торговців, а дрейфуючі льоди, які все частіше зустрічаються морякам останнім часом, загрожують такому важливому для нас зв'язку [GetCountry('GRL').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('GRL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRL').Custom('CL_tt')],X [GetCountry('GRL').Custom('CL_INST')|L]#!#!. Незгоди ширяться як зсередини, так і ззовні, і лише сильний лідер зможе гарантувати нам виживання."
  country_history_ruthenia: "[GetCharacter('kie_rurik').GetName] заклав основи управління руськими землями з #TOOLTIP:LOCATION,kyiv,X #L Києва#!#! — міста, яке пізніше впало під натиском #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольських#!#! кочівників. Хоча велика Київська Русь канула в Лету, її спадщина живе в нас, а військова кров предків продовжує текти в наших жилах. Нині, роздроблені на безліч дрібних князівств, руські землі знову будуть об'єднані під #TOOLTIP:CULTURE,$ruthenian_tt$,X #L руським#!#! прапором.\n\nОднак на цьому шляху нас чекають грізні випробування. Інші #TOOLTIP:CULTUREGROUP,russian_group,X #L руські#!#! князівства також претендують на роль об'єднувача, а [GetCountry('GLH').GetName] нависає постійною загрозою на наших кордонах. #TOOLTIP:RELIGION,$catholic_tt$,X #L Католицька#!#! [ShowContinentName('europe')] на заході теж не залишиться осторонь, і молоді #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецькі#!#! країни #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! навряд чи стануть засиджуватися на задвірках континенту. Щоб знову об'єднати Русь, доведеться подолати всі ці перешкоди."
  country_history_france: "Два великих королівства борються за #TOOLTIP:REGION,france_region,X #L Францію#!#!. Протягом десятиліть #L [GetCountry('FRA').GetAdjective|l]а#! корона намагалася утвердити свою владу над могутніми васалами. У цей же час по інший бік Ла-Маншу #L [GetCountry('ENG').GetAdjective|l]і#! королі загрожували цілісності [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их земель. Вугілля старих війн може розгорітися яскравіше колишнього, на горизонті нависає тінь доби негараздів.\n\nПрийдешні десятиліття стануть перевіркою на міцність, коли [GetCharacter('eng_edward_iii').GetShortName] направить [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]і війська [GetCountry('FRA').Custom('end_predlog_vvo')] [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]і землі. Союзи ненадійні, і великі доми #TOOLTIP:DYNASTY,$valois_dynasty_tt$,X #L Валуа#!#! розриваються між вірністю та амбіціями."
  country_history_britain: "#TOOLTIP:REGION,great_britain_region,X #L Британія#!#! розділена між правителями та кланами, єдність цього регіону видається радше мрією, ніж реальністю. #L [GetCountry('ENG').GetAdjective]і#! королі правлять на півдні, їхня влада стримується зусиллями неспокійних баронів та невгамовними амбіціями старих династій. На півночі [GetCountry('SCO').GetFlavorRank|l] [GetCountry('SCO').GetName] сто[GetCountry('SCO').Custom('end_ityat')] всупереч усьому, хоча там вирує кривава громадянська війна проти #ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_GEN')|L]#!#!.\n\n[GetCharacter('eng_edward_iii').GetShortName] бачить у тому, що відбувається, і можливості, і загрози. Прикордонні війни та безперервне суперництво між [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ою та [GetCountry('SCO').GetAdjectiveWithNoTooltip|l]ою коронами зрештою визначать, чи об'єднається острів під одним прапором, чи йому судилося залишатися вічним полем бою між двома країнами."
  country_history_balkan: "На #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! стикаються імперії, релігії та культури. Слабнуча влада #L [GetCountry('BYZ').GetAdjective|l]их#! імператорів поставила регіон під загрозу, і нові країни набирають сили, щоб зайняти його роз'єднані землі. Місцеві володарі, амбітні князі та чужоземці-гази з #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! бачать можливості в цьому пануючому хаосі.\n\n#TOOLTIP:CULTUREGROUP,turkic_group,X #L Тюркські#!#! народи підбираються все ближче, і майбутні десятиліття визначать, чи збережеться [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]а спадщина, чи буде зметена під натиском суперницьких сусідів."
  country_history_maghreb: "У #TOOLTIP:REGION,maghreb_region,X #L Магрибі#!#! найвпливовішими вважаються культури #TOOLTIP:CULTUREGROUP,amazigh_group,X #L амазигів#!#! та #TOOLTIP:CULTUREGROUP,arabic_group,X #L арабів#!#!, які населяли ці землі та постійно ворогували з часів завоювань VII століття. Династії з обох народів, а часом і змішаного походження, раз за разом приходили до влади та зазнавали краху в цьому регіоні #TOOLTIP:SUB_CONTINENT,north_africa,X #L Північної Африки#!#!.\n\nІ знову розкол серед різних країн зробив їх потенційними жертвами сильніших країн. Чи повернеться єдність на ці землі?"
  country_history_sahel: "#TOOLTIP:REGION,sahel_region,X #L Сахель#!#! та #TOOLTIP:REGION,guinea_region,X #L Гвінея#!#! відображають поступовий перехід від пустелі Сахара до берегів #TOOLTIP:AREA,gulf_of_guinea_area,X #L Гвінейської затоки#!#!, проходячи через савани Сахелю та джунглі Нижнього Нігеру. Імперії [GetCountry('MAL').GetName] та [GetCountry('KBO').GetName] володіють великими територіями на цих землях і контролюють торгові шляхи через Сахару, тоді як інші народи, наприклад, #TOOLTIP:CULTURE,$mossi_tt$,X #L моссі#!#!, #TOOLTIP:CULTURE,$hausa_tt$,X #L хауса#!#! та #TOOLTIP:CULTURE,$yoruba_tt$,X #L йоруба#!#!, вичікують моменту, щоб об'єднати свої землі та розширитися за рахунок сусідів."
  country_history_kongo: "#TOOLTIP:REGION,kongo_region,X #L Конго#!#! — це земля річкових королівств та густих лісів, де клани та вожді укладають союзи за допомогою крові, торгівлі та війн. В останні десятиліття амбітні правителі почали об'єднувати ці землі в більші країни, прагнучи встановити контроль над родючими долинами та торгівлею на великій річці.\n\nРівновага сил залишається крихкою, і в майбутні десятиліття сильний правитель може об'єднати [GetCountry('KON').GetAdjectiveWithNoTooltip|l]і народи або вкинути їх в добу нескінченного суперництва. Чужоземці не забаряться скористатися цією слабкістю."
  country_history_east_africa: "Від родючих заплав Нілу до мальовничих берегів #TOOLTIP:REGION,madagascar_region,X #L Мадагаскару#!#!, від стародавніх портів #TOOLTIP:REGION,somalia_region,X #L Сомалі#!#! до різношерстих поселень #TOOLTIP:REGION,swahili_coast_region,X #L узбережжя Суахілі#!#! багато народів боролися з нещадною природою та загарбниками, що посягали на їхні землі, але все ж вистояли. Ця земля можливостей таїть у собі незліченні багатства, які так і чекають, щоб лягти в основу сильної імперії, чий вплив пошириться навіть за океан."
  country_history_anatolia: "Наш народ сформувався в регіоні, який не з чуток знайомий з війнами та постійним перерозподілом сил. Ворожість сусідів загартувала нас, а розпад старих імперій та султанатів залишив після себе невизначеність у владі — і тепер безліч бейликів навколо нас готові заповнити цю порожнечу. $anatolia_desc$"
  anatolia_desc: "Однак тепер у цьому й без того нестабільному регіоні починають розгорятися нові війни, і вся #TOOLTIP:REGION,anatolia_region,X #L Анатолія#!#! перебуває на межі масштабного конфлікту…"
  country_history_caucasus: "#TOOLTIP:REGION,caucasus_region,X #L Кавказ#!#! завжди був особливою територією. Багато імперій намагалися завоювати його — і багато зазнали невдачі. Навіть коли їм вдавалося здобути перемогу, вони не могли викорінити традиції та вірування місцевих народів, упертих і непокірних, як самі гори, де вони мешкають.\n\nОстанніми, хто спробував захопити цей регіон, були #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монголи#!#!, $genghis_khan_name$ та їхні спадкоємці — #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Країна Хулагуїдів#!#! та [GetCountry('GLH').GetLongName]. Їм вдалося підкорити нас, але влада їхня над найвіддаленішими землями слабка. Багато хто з нас або взагалі не думав підкорятися, або вже скинув кайдани та діє самостійно. Можливо, настав час явити нашу силу в усій повноті…"
  country_history_middle_east: "На землях #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#!, #TOOLTIP:REGION,crescent_region,X #L Родючого півмісяця#!#! та #TOOLTIP:REGION,arabia_region,X #L Аравії#!#! беззаперечно пану[GetCountry('MAM').Custom('endlong_etyut')] [GetCountry('MAM').GetLongName], сприяючи торгівлі між Середземним та Червоним морями та захищаючи паломників, які стікаються до святинь #TOOLTIP:LOCATION,jerusalem,X #L Єрусалима#!#!, #TOOLTIP:LOCATION,mecca,X #L Мекки#!#! та #TOOLTIP:LOCATION,medina,X #L Медіни#!#!. Однак культурні відмінності цих земель та зовнішні загрози можуть підірвати це панування та відкрити дорогу іншим гравцям, які свого не проґавлять."
  country_history_china: "Землі Китаю споконвіку шанувалися осередком світової культури. Його називають #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединною Країною#!#! — ця імперія багато століть служить іншим народам зразком для наслідування. Про його вплив на віру та культуру сусідніх країн, так само як і про багатство його двору, давно складають легенди. Мандрівники та купці прибувають з усього світу, щоб на власні очі побачити пишність Трону Дракона, і багато заздрісних країн намагалися облаштувати свої двори за його образом і подобою.\n\nАле є чимало й тих, хто хоче привласнити собі ці багатства. Нині Трон Дракона перебуває під владою [GetCountry('CHI').Custom('longname_ru_GEN')] після завоювань великого $genghis_khan_name$а. Однак лише Небесам відомо, яке майбутнє уготоване цьому дракону."
  country_history_indonesia: "#TOOLTIP:REGION,indonesia_region,X #L Індонезія#!#! завжди була роз'єднана — така природа архіпелагу. Однак це не заважало місцевим народам розвиватися та процвітати. Купці та торговці всіх мастей перетинають ці води, прямуючи зі #TOOLTIP:SUB_CONTINENT,east_asia,X #L Східної Азії#!#! до Індії та назад, що сприяє постійному культурному обміну. Чужоземні релігії також не оминули ці народи. Унікальне індонезійське змішання #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїзму#!#! та #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизму#!#! породило могутні індуїстсько-буддистські царства, такі як Шривіджая та Сінгасарі.\n\nБагато країн, зокрема [GetCountry('MAJ').GetLongName] та [GetCountry('JMB').GetLongName], борються за владу над цими водами, але тільки час покаже, хто візьме гору."
  country_history_indochina: "#TOOLTIP:REGION,indochina_region,X #L Індокитай#!#! розташований між Індією та Китаєм, тому перебував під впливом обох країн. З давніх часів тут існували могутні царства та імперії, серед них [GetCountry('PEG').GetLongName], [GetCountry('KHM').GetLongName] та [GetCountry('DAI').GetLongName]. У недавньому минулому група #TOOLTIP:CULTUREGROUP,thai_group,X #L тайських#!#! народів прийшла сюди з півночі та створила власні громади. Індокитай — різноманітний та роз'єднаний регіон, занурений у нескінченну боротьбу за владу."
  country_history_america: "Наш народ жив і процвітав задовго до того, як з'явилися перші міфи та легенди. Духи захищали нас, а стародавні традиції не давали збитися зі шляху. Ми пережили багато труднощів, але вони не зломили нас. Чи залишимося ми хранителями мудрості предків, чи ризикнемо ступити в незвідане?"
  country_history_europe: "З настанням доби Відродження наша країна опинилася на роздоріжжі. Новий сплеск інтересу до мистецтв та нововведень кидає виклик старим засадам і обіцяє культурне оновлення. Однак розвиток військових технологій відкриває й інший шлях — шлях до військової переваги.\n\nНам належить зробити вибір: посприяти культурно-інтелектуальній революції чи спрямувати сили на зміцнення військової могутності. Рішення, прийняті зараз, визначать нашу долю на століття — чи станемо ми світочем просвітництва, чи символом військової могутності?"
  country_history_africa: "Землі #TOOLTIP:CONTINENT,africa,X #L Африки#!#! настільки ж різноманітні та самобутні, наскільки й народи, що їх населяють. Пустелі та джунглі, гори та болота, савани та річкові дельти — все це різноманіття ландшафтів сформувало також і відмінності між нашими суспільствами, породивши землеробів, скотарів та мисливців-збирачів. Незліченна безліч культурних, мовних та релігійних традицій робить африканські народи одними з найрізнобічніших у світі."
  country_history_asia: "Землі #TOOLTIP:CONTINENT,asia,X #L Азії#!#! завжди були багаті своїми ресурсами та культурою. Між тисячолітнім Китаєм та багатою стародавніми віруваннями Індією пролягли незліченні торгові шляхи, такі як Великий шовковий шлях, які сприяють обміну не лише багатствами, а також ідеями та віруваннями. Усі азіатські країни черпають сили з цих багатовікових зв'язків, і попереду нас чекає ще чимало звершень."
  country_history_fallback: "У цей переломний момент наша країна стоїть перед новими можливостями та випробуваннями. З розширенням світових торгових шляхів до нас приходять нові ідеї, товари та культурні віяння. Однак збереження традицій та суверенітету в умовах цих змін залишається найважливішим завданням.\n\nНам належить зробити вибір: розвивати культурну спадщину чи зміцнювати військову міць? Від цього рішення залежить наше майбутнє у світі, що стрімко змінюється."