l_russian:
  rule_player_difficulty: "Рівень складності для гравців"
  setting_player_very_easy_difficulty: "Дуже низький"
  setting_player_very_easy_difficulty_desc: "Найпростіший режим. Країни під управлінням гравців отримають серйозні переваги."
  setting_player_easy_difficulty: "Низький"
  setting_player_easy_difficulty_desc: "Підійде для тих, кому до душі розслаблена гра. Країни під управлінням гравців отримають низку переваг."
  setting_player_normal_difficulty: "Середній"
  setting_player_normal_difficulty_desc: "Збалансований режим. Країни під управлінням гравців не мають переваг."
  setting_player_hard_difficulty: "Високий"
  setting_player_hard_difficulty_desc: "Режим для тих, у кого достатньо досвіду. Країни під управлінням гравців матимуть низку недоліків."
  setting_player_very_hard_difficulty: "Дуже високий"
  setting_player_very_hard_difficulty_desc: "Найскладніший режим. Країни під управлінням гравців матимуть серйозні недоліки."
  rule_ai_difficulty: "Рівень складності для комп'ютера"
  setting_ai_very_easy_difficulty: "Дуже низький"
  setting_ai_very_easy_difficulty_desc: "Найпростіший режим. На країни під управлінням комп'ютера будуть накладені обмеження. Вони виявлятимуть менше агресії до гравців."
  setting_ai_easy_difficulty: "Низький"
  setting_ai_easy_difficulty_desc: "Підійде для тих, кому до душі розслаблена гра. Країни під управлінням комп'ютера виявлятимуть менше агресії до гравців, ніж у складніших режимах."
  setting_ai_normal_difficulty: "Середній"
  setting_ai_normal_difficulty_desc: "Збалансований режим. Країни під управлінням комп'ютера однаково ставитимуться до всіх інших, незалежно від того, хто ними керує."
  setting_ai_hard_difficulty: "Високий"
  setting_ai_hard_difficulty_desc: "Режим для тих, у кого достатньо досвіду. Країни під управлінням комп'ютера отримають низку переваг і діятимуть агресивніше."
  setting_ai_very_hard_difficulty: "Дуже високий"
  setting_ai_very_hard_difficulty_desc: "Найскладніший режим. Країни під управлінням комп'ютера отримають серйозні переваги і діятимуть агресивніше."
  rule_ai_aggression: "Агресивність ШІ"
  setting_ai_low_aggression: "Низька агресивність"
  setting_ai_low_aggression_desc: "Підходить для розслабленої гри. Країни під управлінням комп'ютера починають [Concept('war', 'війни')|e] лише за наявності [Concept('casus_belli', 'приводу')|e]."
  setting_ai_normal_aggression: "Звичайна агресивність"
  setting_ai_normal_aggression_desc: "Звичайний ігровий режим. Країни під керуванням комп’ютера починають [Concept('war', 'війни')|e] за власним бажанням, часом навіть без [Concept('casus_belli', 'приводу')|e]."
  setting_ai_high_aggression: "Висока агресивність"
  setting_ai_high_aggression_desc: "Режим підвищеної складності. Країни під керуванням комп’ютера починають [Concept('war', 'війни')|e] з набагато більшою ймовірністю."
  rule_ahistorical_formable_countries: "Створювані країни"
  setting_no_ahistorical_formable_countries: "Тільки історичні"
  setting_no_ahistorical_formable_countries_desc: "Можна буде створювати тільки ті [Concept('formable_country_formed', 'країни')|e], які існували в реальності."
  setting_allow_plausible_ahistorical_formable_countries: "Дозволити можливі"
  setting_allow_plausible_ahistorical_formable_countries_desc: "Дозвольте створення неправдоподібних [Concept('formable_country_formation', 'країн')|e], які теоретично могли б виникнути."
  setting_allow_ahistorical_formable_countries: "Дозволити неправдоподібні"
  setting_allow_ahistorical_formable_countries_desc: "Можна створювати всі [Concept('formable_country_formed', 'країни')|e], зокрема неісторичні, що ламають атмосферу гри."
  rule_historical_ai: "Вибір під керуванням комп’ютера"
  setting_historical_ai_choices: "Історично достовірний"
  setting_historical_ai_choices_desc: "Країни під керуванням комп’ютера завжди обиратимуть історично достовірні варіанти під час [Concept('dynamic_historical_events', 'динамічних історичних подій')|e]."
  setting_weighted_ai_choices: "Ситуативний"
  setting_weighted_ai_choices_desc: "Вибір варіантів залежатиме від ситуації."
  setting_random_ai_choices: "Випадковий"
  setting_random_ai_choices_desc: "Країни під керуванням комп’ютера робитимуть абсолютно випадковий вибір."
