  setting_mission_packs_enabled: "Завдання увімкнено"
  setting_mission_packs_enabled_desc: "Якщо вибрати цей параметр, у нас буде доступ до всіх [Concept('missions', 'завдань')|e]."
  setting_mission_packs_disabled: "Завдання вимкнено"
