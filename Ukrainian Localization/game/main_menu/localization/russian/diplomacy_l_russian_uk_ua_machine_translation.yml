  generic_war_goal_take_province: "Захоплення провінції [PROVINCE.GetNameWithNoTooltip]"
  generic_war_goal_take_province_desc: "[Concept('war_goal', 'Ціль війни')|e] — захопити обрану [Concept('province', 'провінцію')|e]. Ми отримаємо прибавку до [Concept('war_score', 'воєнного рахунку')|e] за окупацію обраної [Concept('province', 'провінції')]. При окупації та утриманні кожного [Concept('location', 'місцевості')|E] [Concept('province', 'провінції')] наш [Concept('war_score', 'воєнний рахунок')|e] буде поступово збільшуватися."
