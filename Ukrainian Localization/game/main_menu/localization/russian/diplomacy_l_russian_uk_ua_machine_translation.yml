  generic_war_goal_take_capital_desc: "[Concept('war_goal', 'Ціль війни')|e] — захопити ворожу столичну [Concept('province', 'провінцію')|e]. При окупації всіх [Concept('locations', 'місцевостей')|E] [Concept('province', 'провінції')] наш [Concept('war_score', 'воєнний рахунок')|e] буде поступово збільшуватися."
  generic_war_goal_defend_capital: "Захист столиці в провінції [PROVINCE.GetNameWithNoTooltip]"
  generic_war_goal_defend_capital_desc: "[Concept('war_goal', 'Ціль війни')|E] — захистити нашу столичну [Concept('province', 'провінцію')|E]. За оборону [Concept('capital', 'столиці')] та будь-яких [Concept('location', 'місцевостей')|E] у цій провінції наш [Concept('war_score', 'воєнний рахунок')|E] буде поступово збільшуватися."
  generic_war_goal_naval_superiority: "Демонстрація морської переваги"
  generic_war_goal_naval_superiority_desc: "[Concept('war_goal', 'Ціль війни')|e] — показати перевагу на морі. Ви отримуєте прибавку до [Concept('war_score', 'воєнного рахунку')|e] за перемогу в морських битвах. При [Concept('blockade', 'блокаді')|e] порту (якщо противник не зробив того ж) ваш [Concept('war_score', 'воєнний рахунок')|e] буде поступово збільшуватися."
  generic_war_goal_superiority: "Демонстрація переваги"
  generic_war_goal_superiority_desc: "[Concept('war_goal', 'Ціль війни')|e] — продемонструвати перевагу. Учасники отримають прибавку до [Concept('war_score', 'воєнного рахунку')|e] за перемогу в битвах.\nПри накопиченні понад $THRESHOLD|Y%$ [Concept('war_score', 'воєнного рахунку')|e] за перемоги в битвах наш [Concept('war_score', 'воєнний рахунок')|e] буде поступово збільшуватися."
