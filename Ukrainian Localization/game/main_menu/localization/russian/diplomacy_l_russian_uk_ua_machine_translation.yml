  generic_war_goal_independence: "Визволення [PROVINCE.GetCountry.Custom('CL_GEN')]"
  generic_war_goal_independence_desc: "[Concept('war_goal', 'Ціль війни')|e] — контроль над усією [Concept('country', 'територією')|e] #ONCLICK:COUNTRY,[PROVINCE.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[PROVINCE.GetCountry.Custom('CL_tt')],X [PROVINCE.GetCountry.Custom('CL_GEN')|L]#!#!.\n[Concept('war_score_with_icon', 'Воєнний рахунок')|e] борців за незалежність буде поступово збільшуватися, якщо вони не дадуть колишньому [Concept('overlord', 'сюзерену')|e] [Concept('occupying', 'окупувати')|e] свою територію.\n\nКолишній [Concept('subject', 'васал')|e] повинен буде затвердити свою незалежність за допомогою [Concept('peace_treaty', 'мирного договору')|e]. [Concept('white_peace_with_icon', 'Мир на умовах «статус-кво»')|e] відновить положення, яке склалося до [Concept('war', 'війни')|e]."
