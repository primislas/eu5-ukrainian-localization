 #Diplomatic Agendas
 pa_break_alliance: "Расторжение союза"
 pa_break_alliance_simple: "$pa_break_alliance$"
 pa_break_alliance_desc: "Этот [Concept('alliance', 'союз')|e] противоречит интересам [Concept('estate', 'сословия')|e], и его представители считают, что получат выгоду в результате его расторжения."
 pa_reduce_opinion: "Снижение мнения"
 pa_reduce_opinion_simple: "$pa_reduce_opinion$"
 pa_reduce_opinion_desc: "Одна только мысль об установлении связей с этой державой приводит [Concept('estate', 'сословие')|e] в ярость. Его представители требуют немедленно отправить её правителю послание, составленное в довольно резких выражениях."
