 #$mamluk$ Actions
 promote_mamluks: "Возвышение мамлюка"
 promote_mamluks_desc: "Мамлюки — это элитные солдаты, способные занять видные должности в нашей администрации. На солдатах и чиновниках из мамлюков держится наша стратократическая администрация, и они обладают огромным влиянием."
 new_mamluk_appears_tt: "#Y Новый мамлюк получит повышение#!"
 promote_mamluks_tt: "В результате [Concept('event', 'события')|e] появятся новые кандидаты-мамлюки"
 ### IO Parliament Agendas ###
 #HRE
 pa_hre_lessen_tax_burden: "Снижение налогового бремени"
 pa_hre_lessen_tax_burden_simple: "$pa_hre_lessen_tax_burden$"
 pa_hre_lessen_tax_burden_desc: "Мы обещаем сократить повинность по #TOOLTIP:PAYMENT,imperial_contribution,X #L вкладу империи#!#! в обмен на их поддержку."
 pa_hre_elevate_prussia_to_kingdom: "Возведение Пруссии в ранг королевства"
 pa_hre_elevate_prussia_to_kingdom_simple: "Возведение Пруссии в ранг королевства"
 pa_hre_elevate_prussia_to_kingdom_desc: "Правители #ONCLICK:COUNTRY,[GetCountry('PRU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').Custom('CL_tt')],X [GetCountry('PRU').Custom('CL_GEN')|L]#!#! всегда были крайне амбициозны. Многие из них даже просили предоставить им формальные титулы королей, хотя у них и не было собственного королевства. Возможно, возведя эту державу в ранг #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королевства#!#!, мы сможем заручиться её полной поддержкой…"
 pa_hre_elevate_prussia_to_kingdom_tt: "В связи с нашим решением в #ONCLICK:COUNTRY,[GetCountry('PRU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').Custom('CL_tt')],X [GetCountry('PRU').Custom('CL_PREP')|L]#!#! произойдёт соответствующее [Concept('event', 'событие')|e]."
 pa_hre_grant_imperial_titles: "Присвоение имперских титулов"
 pa_hre_grant_imperial_titles_simple: "$pa_hre_grant_imperial_titles$"
 pa_hre_grant_imperial_titles_desc: "Выборщики наверняка будут благодарны за предоставление дополнительных титулов."
 pa_hre_affirmation_of_free_city_rights: "Признание прав вольных городов"
 pa_hre_affirmation_of_free_city_rights_desc: "Стоит продлить действие привилегий вольных городов, чтобы обеспечить их стабильное развитие и процветание в составе империи."
 opinion_hre_pa_supports_free_cities: "Поддержка вольных городов"
 pa_hre_affirmation_of_free_city_rights_tt: "Каждый [ShowSpecialStatusName('free_city')|l] получит [ShowNamedValue('stability_mild_bonus')|+=2] ед. [Concept('stability', 'стабильности')|e]. При этом все воюющие с ним державы понизят своё мнение о главе #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской империи#!#! на [ShowBiasValue('opinion_hre_pa_supports_free_cities')|+] ед."
 ### New Generic Parliament Issues – 1.2 Expansion ###
 ## Crown
 royal_monopoly_on_trade: "Государственная монополия на торговлю"
 royal_monopoly_on_trade_desc: "Купцы в нашем государстве уже слишком долго жиреют на доходах от торговли. Мы установим королевскую монополию на основные товары и направим эти доходы в руки короны, чтобы они могли служить на пользу всего государства."
 charter_subject_governors: "Назначение губернаторов в зависимых территориях"
 charter_subject_governors_desc: "Наши далёкие ленники требуют внимания, но корона занята другими делами. Обличённые королевской властью губернаторы укрепят контроль над этими землями и обеспечат приток денег от них в нашу казну."
 establish_colonial_administration: "Учреждение колониальной администрации"
 establish_colonial_administration_desc: "Нашими заморскими колониями нужно управлять как полноценным продолжением нашего государства, а не оставлять на произвол авантюристов. Для этого нам нужно создать полноценные административные структуры."
 reform_the_royal_treasury: "Реформа королевского казначейства"
 reform_the_royal_treasury_desc: "Бесконтрольная чеканка привела к росту цен и обесценила наши деньги. Тщательная ревизия королевской казны и реформа работы казначейства снова укрепят нашу монету."
 issue_royal_censure: "Королевское порицание"
 issue_royal_censure_desc: "Наши соперники предприняли действия, которые нельзя оставить без нашего официального осуждения. Королевское порицание, поддержанное парламентом, даст всем понять, что мы не оставим такого поведения без ответа."
 mandate_emergency_levies: "Срочный сбор ополчения"
 mandate_emergency_levies_desc: "Наши военные нужды требуют большего участия от всего нашего государства. Все сословия и подданные должны дать короне как можно больше во имя нашей победы."
 fund_royal_art_patronage: "Государственный патронаж искусств"
 fund_royal_art_patronage_desc: "Величие государства измеряется не только армиями и золотом в казне, но и создаваемыми в нём произведениями искусства и культуры. Нам нужно вкладывать деньги в поддержку творцов и ремесленников, которые увековечат славу нашей династии."
 ## Nobles
 institute_feudal_levies: "Организация феодального ополчения"
 institute_feudal_levies_desc: "Основа любой великой армии это всадники из числа аристократов. Закрепив в законах военные обязательства благородных домов — в частности, обязательство снаряжать тяжёлую конницу — мы укрепим наши войска на поле боя."
 establish_military_exercises: "Организация военных учений"
 establish_military_exercises_desc: "Наши благородные воины расслабляются и теряют опыт во времена мира. Приказав проводить регулярные военные учения и турниры, мы сделаем так, чтобы наши бойцы оставались в лучшей форме, а армии были готовы к битве."
 establish_heralds_college: "Учреждение геральдической палаты"
 establish_heralds_college_desc: "Старшинство титулов, права гербов и порядок дворянских званий это вопросы огромной важности. Геральдическая палата наведёт порядок в этих делах и поддержит престиж нашего государства за рубежом."
 promote_chivalric_orders: "Поддержка рыцарских орденов"
 promote_chivalric_orders_desc: "Наши рыцарские ордены это воплощение благородной военной добродетели. Предоставив им королевское признание и финансирование, мы укрепим связь между короной и её лучшими воинами."
 license_noble_privateers: "Каперские патенты для аристократии"
 license_noble_privateers_desc: "Моря сулят богатства смелым, и благородные дома могут использовать военные суда для дохода. Выдача каперских патентов позволит нам легализовать их авантюры, а корона в свою очередь получит выгоды от нарушения неприятельской торговли."
 monopolize_land_trade_routes: "Монополия на наземные торговые пути"
 monopolize_land_trade_routes_desc: "Наша аристократия контролирует дороги, перевалы и мосты, по которым идёт вся наземная торговля. Выдача им прав на взимание пошлин с наземных купцов позволит нам перенаправить эти доходы в карманы самых преданных сторонников."
 fund_noble_colonization: "Финансирование аристократической колонизации"
 fund_noble_colonization_desc: "Влиятельные благородные дома нашего государства имеют средствами и мотивацией финансировать колониальные экспедиции. Нам нужно поощрять и финансировать эти предприятия, чтобы расширять своё влияние далеко за морями."
 grant_exclusive_hunting_rights: "Выдача исключительных прав на охоту"
 grant_exclusive_hunting_rights_desc: "Леса нашего государства и обитающая в них дичь с незапамятных времён принадлежат знати. Вы выдадим им исключительные права на охоту и управление этими землями: это укрепит их сословие и лояльность короне."
 establish_noble_garrison_law: "Закон об организации гарнизонов за счёт аристократов"
 establish_noble_garrison_law_desc: "Нашему государству грозят беспорядки, и мы не сможем их подавить без сильных местных гарнизонов. Нам нужно обязать благородные дома содержать укрепления в своих владениях и быть готовыми защитить державу и корону."
 ## Clergy
 establish_clergy_charity: "Учреждение церковных богаделен"
 establish_clergy_charity_desc: "Наш народ голодает, а закрома господ ломятся от зерна. Долг духовенства — организовать помощь нищим и голодным. И этот долг мы должны сделать законом и финансировать."
 launch_religious_missions: "Духовные миссии"
 launch_religious_missions_desc: "Многие пределы нашего государства до сих пор лишена света истинной веры. Церковь должна отправить туда миссионеров, чтобы направить заблудшие души на пусть истинный, и мы обеспечим им необходимую поддержку."
 institute_canonical_law: "Каноническое право"
 institute_canonical_law_desc: "Государство, расколотое в вере, расколото в духе. Составив свод канонического права и добившись его единого исполнения во всех провинциях, мы укрепим веру, которая объединяет наш народ."
 establish_inquisition_courts: "Учреждение судов инквизиции"
 establish_inquisition_courts_desc: "Семя ереси дало всходы, и только методичная работа церковных судов сможет их искоренить. Мы должны действовать решительно, пока зараза не распространилась дальше."
 promote_religious_tolerance: "Поощрение веротерпимости"
 promote_religious_tolerance_desc: "В нашем государстве живёт много людей, которые не разделяют нашу веру, и их недовольство может привести к беспорядкам. Церковь проявит мудрость, если признает, что терпимость сохранит мир скорее, чем вечные конфликты."
 fund_monastery_network: "Финансирование сети монастырей"
 fund_monastery_network_desc: "Монастыри в наших землях это очаги образования, благотворительности и порядка. Нам нужно расширять их сеть и не жалеть на их содержание средств, чтобы своими благими делами они озаряли все концы государства."
 establish_pilgrimage_routes: "Организация маршрутов паломничеств"
 establish_pilgrimage_routes_desc: "Святые места нашей веры привлекают паломников со всех концов земли. Организовав охрану и облагораживание этих маршрутов, мы продемонстрируем свою набожность и повысим известность и престиж нашего государства."
 regulate_tithe_collection: "Регулировать сбор десятины"
 regulate_tithe_collection_desc: "Сбор десятины становится всё хаотичнее и всё чаще приводит к скандалам. Стандартизация церковной доли от барышей по всему государству обеспечит священникам постоянный доход и устранит тревоги в народе."
 sponsor_theological_seminaries: "Спонсирование духовных семинарий"
 sponsor_theological_seminaries_desc: "Образованное духовенство это основа духовно здорового государства. Мы должны финансировать строительство и расширение семинарий, где будет учиться новое поколение священников."
 ## Burghers
 promote_export_trade: "Поощрение экспортной торговли"
 promote_export_trade_desc: "Наши купцы готовы отправиться с нашими товарами в самые дальние уголки мира, но для расширения торговой сети им нужна поддержка парламента. Вложившись в экспортную торговлю, мы обогатим государство и укрепим влияние за рубежом."
 establish_import_controls: "Регулирование импорта"
 establish_import_controls_desc: "Нам нельзя допустить, чтобы наши производители теряли прибыль из-за чужеземных товаров. Мы начнём официально ограничивать поток поступающих на наш рынок товаров, чем защитим отечественную промышленность и обеспечим конкурентоспособность наших купцов."
 fund_trade_expeditions: "Финансирование торговых экспедиций"
 fund_trade_expeditions_desc: "Купеческие гильдии готовы вкладываться в заморские коммерческие экспедиции, но такие предприятия требуют законного оформления и поддержки со стороны парламента."
 establish_commodity_exchange: "Открыть товарную биржу"
 establish_commodity_exchange_desc: "В наших рыночных центрах кипит жизнь, но нет биржи, где можно было бы организованно торговать оптовыми товарами. Полноценная товарная биржа поднимет прибыльность наших рынков на зависть всем соседям."
 promote_maritime_trade: "Поощрение морской торговли"
 promote_maritime_trade_desc: "Морские пути это широкие дороги, ведущие смелых к богатствам. Мы должны вкладываться в развитие инфраструктуры и институтов, которые обеспечивают морскую торговлю, и способствовать тому, чтобы наши купцы властвовали над морями."
 license_trading_companies: "Лицензирование торговых компаний"
 license_trading_companies_desc: "Риски и награды, связанные с заморской торговлей, настолько велики, что отдельные купцы с ними не справятся. Нам нужно лицензировать создание официальный торговых компаний, которые будут накапливать ресурсы и делить риск между участниками. Их деятельность пойдёт на пользу всему государству."
 establish_customs_houses: "Учреждение таможен"
 establish_customs_houses_desc: "Наши границы проницаемы, и чужеземные купцы получают большой барыш от товаров, которые без учёта проникают на наши рынки. Строительство таможен позволит урегулировать импорт, и государство вместе с отечественными купцами получат свою справедливую долю."
 fund_artisan_guilds: "Финансирование ремесленных гильдий"
 fund_artisan_guilds_desc: "Искусные ремесленники в нашей стране производят товары исключительного качества, но без должной организации и поддержки они не могут реализовать весь свой потенциал. Мы должны профинансировать и защитить гильдии, представляющие их интересы."
 establish_trade_insurance: "Страхование для купцов"
 establish_trade_insurance_desc: "Торговля сопряжена со многими опасностями: кораблекрушения, нападения бандитов, войны. Нередко это отпугивает торговцев от выгодных для государства предприятий. Мы создадим инструменты страхования, чтобы наши купцы охотнее шли на риск."
 expand_postal_relay_network: "Расширение сети почтовых станций"
 expand_postal_relay_network_desc: "Надёжная связь это основа коммерции. Наши купеческие дома готовы финансировать систему почтовых станций, благодаря которым передача сообщений и перевозка товаров станут быстрее, чем когда-либо раньше. Такое вложение окупится во много крат."
 ## Peasants
 establish_common_food_stores: "Общинные продовольственные склады"
 establish_common_food_stores_desc: "Наши подданные живут в страхе перед неурожаями и голодом. Мы построим общие зерновые склады, чтобы даже в самый страшный неурожай у людей оставались запасы."
 promote_farming_innovation: "Поощрение новшеств в земледелии"
 promote_farming_innovation_desc: "Новые методы севооборота и культивации показали замечательные результаты в других землях. Нашим земледельцам нужно перенимать чужеземный опыт, чтобы и наши поля давали богатые урожаи, а соотечественники меньше страдали от нужды."
 sponsor_irrigation_projects: "Субсидирование ирригационных проектов"
 sponsor_irrigation_projects_desc: "Во многих регионах нашего государства поля могли бы давать больше урожаев, если бы к ним можно было подвести воду. Нам нужно субсидировать строительство оросительных каналов и ирригационных сооружений, чтобы сухая земля превратилась в тучные пашни."
 reduce_serfdom: "Сокращение крепостной зависимости"
 reduce_serfdom_desc: "Крепостное право тяжёлым ярмом висит на шее простого народа. Оно привязывает крестьян к земле и душит их труд, которым они кормят нас всех. Мы облегчим это бремя, дадим людям больше свободы перемещения, и они отблагодарят нас лояльностью и ростом продуктивности."
 establish_village_councils: "Организация сельских советов"
 establish_village_councils_desc: "Наши деревни и сёла управляются со стороны господами, которые не понимают местные заботы и не особо ими интересуются. Мы создадим сельские советы и наделим их властью решать местные вопросы: у селян появится право голоса и возможность самостоятельно поддерживать порядок."
 charter_artisan_guilds: "Ремесленные гильдии"
 charter_artisan_guilds_desc: "Мастера и рабочие трудятся в своих мастерских без официального королевского признания. Объединение ремесленников в гильдии позволит регламентировать их труд и поможет завоевать доверие тех, чьими руками богатеет наша страна."
 subsidize_grain_imports: "Субсидирование импорта зерна"
 subsidize_grain_imports_desc: "Наши рынки способны прокормить народ, но только если цены на зерно будут оставаться доступными для простых людей. Субсидии на импорт зерна позволят нам не допустить голода и отчаяния."
 rural_crafts_charter: "Организация сельских ремесленников"
 rural_crafts_charter_desc: "Монополии гильдий душат кустарные производства, которыми сельские семьи кормят себя во времена недорода. Нам следует организовать и защитить сельских ремесленников от такого гнёта и дать простому народу экономическую свободу, которой он заслуживает."
 prevent_noble_enclosure: "Остановить помещичье огораживание"
 prevent_noble_enclosure_desc: "Знатные землевладельцы нашего государства уже слишком давно отбирают общинную землю, на которой крестьяне добывают себе пропитание. Нам нужно защитить то немногое, что у них осталось, пока не начались беспорядки."
 ## Wartime
 declare_war_taxes: "Введение военного налога"
 declare_war_taxes_desc: "Военные нужды требуют затрат, которые наши обычные доходы покрыть не могут. Парламент должен одобрить чрезвычайные налоги для всех сословий, общий долг во имя выживания и славы государства."
 wartime_cavalry_reserve: "Военный резерв кавалерии"
 wartime_cavalry_reserve_desc: "Решающее сражение может случиться в любой момент, и мы должны быть уверены, что наша тяжёлая кавалерия к нему готова. Пускай благородные семьи поддерживают своих лучших всадников в состоянии полной готовности до окончания войны."
 fortify_frontier_passes: "Укрепления пограничных перевалов"
 fortify_frontier_passes_desc: "Слабое место наших границ — перевалы, по которым враг может прийти на наши земли. Нам следует вкладываться в укрепление каждого уязвимого перехода, чтобы природные границы нашей земли стали неприступной крепостью для любого, кто придёт к нам с войной."
 military_chaplaincy: "Военные священники"
 military_chaplaincy_desc: "Наши армии сражаются не только за монарха и отечество, но и за веру. Полковые священники в составе войск укрепят боевой дух солдат и помогут им стойко переносить тяготы и лишения походов."
 establish_field_hospitals: "Полевые госпитали"
 establish_field_hospitals_desc: "Слишком многие наши воины погибают не от вражеских мечей, но от ран, которые можно было бы вылечить и болезней, которые можно было бы предотвратить. Пускай церковь организует в наших армиях полевые госпитали, которые будут спасть жизни наших бойцов."
 naval_supply_contracts: "Подрядное снабжение флота"
 naval_supply_contracts_desc: "Наш флот не может выходить в море без снабжения, и купеческие гильдии обладают способны его обеспечить. Если мы заключим с ними подряды на тыловое обеспечение флота, наши суда смогут действовать без страха остаться без припасов."
 fund_siege_engineers: "Спонсирование осадных инженеров"
 fund_siege_engineers_desc: "Стены врагов не падут без специалистов по их разрушению. Наши городские гильдии могут спонсировать обучение инженеров и строительство осадных орудий для взятия самых мощных крепостей."
 wartime_harvest_pooling: "Запасы продовольствия для войск"
 wartime_harvest_pooling_desc: "Война войной, а обед по расписанию: голодные солдаты сражаются плохо. Необходимо организовать запасы продовольствия на региональных складах, чтобы наш народ мог кормить войска, которые его защищают."
 supply_line_labor_draft: "Трудовая повинность на путях снабжения"
 supply_line_labor_draft_desc: "Дороги, по которым припасы поставляются в войска, нужно обслуживать без ущерба движению ресурсов. Мирные люди могут помогать фронту, работая на линиях снабжения. Такой труд важен не меньше, чем ратное дело."
 ## Proximity
 royal_road_commission: "Королевская комиссия путей сообщения"
 royal_road_commission_desc: "Дороги нашей страны это сосуды, обеспечивающие порядок и движение товаров. Создание и обслуживание полноценной сети государственных дорог позволит нам обеспечить контроль над всеми уголками нашей земли."
 mountain_pass_charters: "Хартии над горными перевалами"
 mountain_pass_charters_desc: "Наши благородные дома владеют горными перевалами, которые разделяют нашу страну. Обязав их обслуживать и организовывать оборону этих переходов, мы снизим изоляцию отдельных провинций от центральной власти."
 establish_parish_waypoints: "Учреждение приходских станций"
 establish_parish_waypoints_desc: "Дороги в нашей страны длинные, и путешествовать по ним утомительно и для посланников, и для простых путников. Церковь может построить станции на основных маршрутах и помогать всем, кто путешествует по нашим землям."
 coastal_trading_post_network: "Сеть береговых факторий"
 coastal_trading_post_network_desc: "Наша береговая линия богата естественными гаванями и остановками, которые не используются из-за отсутствия инфраструктуры. Спонсированная купцами сеть береговых факторий снизит издержки и риски морской торговли и сделает далёкие провинции ближе к столице."
 rural_road_upkeep_corvee: "Повинность по обслуживанию дорог"
 rural_road_upkeep_corvee_desc: "Наши сельские дороги зарастают от отсутствия организованного обслуживания. Если мы возложим на крестьян небольшую повинность расчищать местные дороги, ни один из пределов нашей страны не будет отрезан от центра."
 ## Modifier names
 STATIC_MODIFIER_NAME_parl_royal_monopoly_mod: "Государственная торговая монополия"
 STATIC_MODIFIER_NAME_parl_charter_governors_mod: "Назначенные губернаторы в зависимых территориях"
 STATIC_MODIFIER_NAME_parl_colonial_admin_mod: "Колониальное управление"
 STATIC_MODIFIER_NAME_parl_royal_treasury_mod: "Реформа казначейства"
 STATIC_MODIFIER_NAME_parl_royal_censure_mod: "Королевское порицание"
 STATIC_MODIFIER_NAME_parl_emergency_levies_mod: "Срочное ополчение"
 STATIC_MODIFIER_NAME_parl_royal_art_patronage_mod: "Государственный патронаж искусств"
 STATIC_MODIFIER_NAME_parl_feudal_levies_mod: "Феодальное ополчение"
 STATIC_MODIFIER_NAME_parl_military_exercises_mod: "Военные учения"
