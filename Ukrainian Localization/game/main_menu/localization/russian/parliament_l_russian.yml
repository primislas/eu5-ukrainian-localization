 PARLIAMENT_SPECIAL_STATUS_EXTRA_POWER_WHEN_DEBATED: "Выбор этого вопроса подтолкнёт больше держав с особым статусом предоставить нам $VAL|2+=%$ ед. парламентской поддержки"
 EXTRA_SUPPORT_INFO_FOR_ISSUE_NONE: "#T Вопрос властей#!\nВласти считают, что этот вопрос отвечает их интересам, поэтому он не нуждается в дальнейшей [Concept('parliament', 'парламентской')|e] поддержке."
 EXTRA_SUPPORT_INFO_FOR_ISSUE: "#T [PARLIAMENT_ISSUE.GetEstateType.GetNameWithNoTooltip] и их вопрос#!\nВыбор этого вопроса принесёт $VAL|2+=%$ ед. парламентской поддержки, поскольку [PARLIAMENT_ISSUE.GetEstateType.GetName|l] его поддерживают."
 BASE_SPECIAL_STATUS_SUPPORT: "Поддержка статуса"
