  reform_taxation_system: "Реформа податкової системи"
  reform_taxation_system_desc: "Некомпетентні місцеві губернатори вже навіть не прикидаються, що втратили будь-який контроль у справі збору податків. Тепер виправляти становище та проводити реформу податкової системи будуть наші вищі ради. Цей процес досить складний і може зайняти кілька років, проте нам він вкрай необхідний, щоб подолати поточну кризу."
