  abbess_elective_female_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Правителька')|e] обирається на [Concept('election', 'виборах')|e] з-поміж аббатис."
