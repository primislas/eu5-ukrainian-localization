  no_parliament: "Відсутність парламенту"
  no_parliament_desc: "Єдиний привід, з якого правитель може скликати підданих — це віддавати розпорядження, а не обговорювати політику."
  assembly: "Збори"
  assembly_desc: "Скликання всіх вільних людей наших володінь — єдиний спосіб визначити шлях нашої країни."
  council: "Рада"
  council_desc: "У багатьох культурах влада зосереджена в руках монарха, проте інші країни обирають альтернативу у вигляді ради, де рішення приймаються після колективного обговорення."
  estate_parliament: "Становий парламент"
  estate_parliament_desc: "Представники станів зберуться в парламенті, щоб обговорити нагальні питання та виробити спільні рішення щодо досягнення цілей."
  autocratic_parliament: "Автократичний парламент"
  autocratic_parliament_desc: "Проблема з делегуванням повноважень полягає в тому, що багато термінових дій уряду можуть легко загрузнути в бюрократичному хаосі та затягнутих обговореннях. Заради процвітання нашої країни влада в країні має бути зосереджена в руках суверена."
  constitutional_parliament: "Конституційний парламент"
  constitutional_parliament_desc: "Вплив правителя слід контролювати, а влада і правосуддя повинні належати народу. За конституційної системи роль мас суттєво зростає."
  dutch_parliament: "Голландський парламент"
  dutch_parliament_desc: "Заможні члени парламенту отримують більше повноважень, а духовенство в цьому органі влади не представлене."
  plc_parliament: "Парламент Речі Посполитої"
  plc_parliament_desc: "У парламенті Речі Посполитої найбільшим впливом володіють представники знаті."
