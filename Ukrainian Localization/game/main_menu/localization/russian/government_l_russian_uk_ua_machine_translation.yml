  belligerent_vs_conciliatory: "Войовничість — миролюбність"
  belligerent_vs_conciliatory_desc: "Войовничу державу не турбує [Concept('opinion','думка')|e] інших [Concept('countries','країн')|e]. Миролюбна держава проводить політику умиротворення інших країн, тому що вона або слабша, або добре розуміє свою вигоду такої політики."
