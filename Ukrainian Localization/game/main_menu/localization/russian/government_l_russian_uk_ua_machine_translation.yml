  tribal_matrilineal: "Племінні вибори: найстарша жінка"
  tribal_matrilineal_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для племені. Новим [Concept('ruler', 'вождем')|e] стає старша дочка попереднього [Concept('ruler', 'правителя')|e]."
  matrilineal_non_exclusive: "Будь-який спадкоємець по матері"
  matrilineal_non_exclusive_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для країн, де новим [Concept('ruler', 'вождем')|e] стає найздібніший член династії попереднього [Concept('ruler', 'правителя')|e]."
  bank_selection: "Вибори нового голови банку"
  elective_succession: "Виборне престолонаслідування"
  elective_succession_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Нового правителя обирає #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!. Незважаючи на те, що монархом може бути обраний будь-який аристократ, виборці віддають перевагу члену правлячої династії.\n\n$UNSTABLE_UNION_WARNING$"
  dynastic_elective_succession: "Династичне виборне престолонаслідування"
  dynastic_elective_succession_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Нового правителя обирає #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!. Тільки члени правлячої династії можуть бути обрані як монарх.\n\n$UNSTABLE_UNION_WARNING$"
  dynastic_elective_succession_best_candidate_desc: "Визначається голосуванням #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!."
  papal_election: "Папський конклав"
  papal_election_desc: "Коли Папа Римський помирає, [Concept('cardinals', 'кардинали')|e] збираються і вирішують, хто стане його наступником. Ця процедура може пройти швидко, але іноді займає кілька років."
  papal_election_best_candidate_desc: "Визначається голосуванням [Concept('cardinals', 'кардиналів')|e]."
  lottery_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Главу')|e] обирають за допомогою предмета, випадково вибраного з безлічі інших."
  lottery_election_best_candidate_desc: "Визначається шляхом жеребкування."
  doge_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається елітами країни і править до кінця життя.\nНезважаючи на це, правитель все одно може бути усунений зі своєї посади, якщо #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! або #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#! вважатимуть, що він втратив популярність."
  diarchic_election_desc: "Цей унікальний тип [Concept('heir_selection', 'зміни влади')|e] віддають перевагу в Республіці [GetCountry('GEN').GetName]. [Concept('ruler', 'Глава')|e] обирається з членів двох знатних сімей: #TOOLTIP:DYNASTY,$spinola_dynasty_tt$,X #L Спінола#!#! та #TOOLTIP:DYNASTY,$doria_dynasty_tt$,X #L Доріа#!#!."
  veche_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається в результаті народного сходу або віча з одного або кількох кандидатів.\n\n$veche_selection_best_candidate_desc$"
  veche_selection_best_candidate_desc: "Новий [Concept('ruler', 'правитель')|e] вибирається шляхом [Concept('country_interaction', 'взаємодії з країною')|e] типу #TOOLTIP:COUNTRY_INTERACTION,invite_prince,X #L «Запрошення князя»#!#!."
  bank_selection_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] віддають перевагу в банкірській родині. [Concept('ruler', 'Глава')|e] обирається серед членів династії."
  pirate_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] віддають перевагу в піратській #TOOLTIP:GOVTYPE,republic,X #L республіці#!#!. [Concept('ruler', 'Глава')|e] обирається з одного або кількох кандидатів, запропонованих екіпажами кораблів."
  cognatic_primogeniture_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. [Concept('heir', 'Спадкоємцем')|e] стає старший син чинної [Concept('ruler', 'правительки')|e], хоча жінки також можуть успадковувати корону, якщо немає відповідного кандидата чоловічої статі."
  absolute_cognatic_primogeniture_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. [Concept('heir', 'Спадкоємцем')|e] стає старша дитина будь-якої статі чинного [Concept('ruler', 'правителя')|e]."
  salic_law_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e]. Дочки не можуть ні успадковувати, ні передавати право на трон своїм синам."
  semi_salic_law_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e]. Дочки не успадковують трон, проте можуть передати це право своїм синам."
  partition_inheritance_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e], а всі інші нащадки чоловічої статі отримують другорядні титули та землі. Дочки не можуть ні успадковувати, ні передавати право на трон своїм синам.\n\nКоли до влади приходить новий правитель, найменш контрольовані провінції країни отримують додаткові штрафи до свого показника [Concept('control', 'контролю')|e], оскільки розподіляються між братами нового правителя."
  youngest_son_of_ruler_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] надають перевагу в королівстві. Новим [Concept('ruler', 'правителем')|e] стає молодший син попереднього [Concept('ruler', 'правителя')|e]."
  fratricide_succesion: "Братовбивство"
  fratricide_succesion_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новий [Concept('ruler', 'правитель')|e] сходить на трон, довівши, що він удачливіший за суперників, — зазвичай шляхом їх усунення."
  fratricide_succesion_best_candidate_desc: "Нового [Concept('ruler', 'правителя')|e] обирають після того, як він доведе, що його удача перевершує удачу суперників, зазвичай шляхом їх усунення."
  unigeniture: "Унігенітура"
  unigeniture_desc: "Така система передбачає наявність єдиного спадкоємця. Передача влади старшому сину правлячої династії може призводити до конфліктів між спадкоємцями другого ряду — зокрема молодшими синами, яким дістаються лише дрібні титули, — та іншими претендентами на престол, що загрожує стабільності країни."
  mamluk_succesion: "Наслідування мамлюків"
  mamluk_succesion_desc: "$mamluk_succesion_regency_desc$"
  oligarchic_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] [Concept('election', 'обирається')|e] з числа правлячої меншості."
  podesta_elective: "Виборна влада"
  podesta_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається з [Concept('country', 'країни')|e], що має представництво в [Concept('capital', 'столичній')|e] [Concept('region', 'місцевості')|e]."
  republic_4_year_terms_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] і керує протягом встановленого терміну тривалістю 4 роки."
  republic_2_year_terms_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] і керує протягом встановленого терміну тривалістю 2 роки."
  peasant_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] з числа селян."
  theocratic_elective_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Глава')|e] визначається на [Concept('election', 'виборах')|e] з числа теократів."
  bishopric_elective_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Глава')|e] визначається на [Concept('election', 'виборах')|e] з числа доступних місцевих та міжнародних єпископів."
  grandmaster_elective_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!, що прийняла #TOOLTIP:GOVERNMENT_REFORM,military_order_reform,X #L духовно-лицарський орден#!#! як свою основоположну [Concept('government_reform', 'державну реформу')|e]. [Concept('ruler', 'Правитель')|e] обирається на [Concept('election', 'виборах')|e] з числа членів ордену."
  abbot_elective_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Правитель')|e] обирається на [Concept('election', 'виборах')|e] з числа абатів."
  tribal_oldest_male_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для племені. Новим [Concept('ruler', 'вождем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e]."
  military_dictatorship: "Військова диктатура"
  military_dictatorship_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. Найвидатніший [Concept('character', 'полководець')|e] стає довічним правителем."
  signoria_selection: "Синьйоріальні вибори"
  signoria_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається з представників якоїсь впливової родини і править до кінця свого життя. Зазвичай це дитина попереднього [Concept('ruler', 'глави')|e] республіки."
  judicial_election: "Юдикатні вибори"
  judicial_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L Монархії#!#!. Новий глава обирається з членів верховного суду. Цей процес є бюрократичним хаосом і може зайняти кілька місяців або навіть років."
  admiralty_regime_heir_selection: "Адміралтейські вибори"
  admiralty_regime_heir_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] надають перевагу країни, де встановився #TOOLTIP:GOVERNMENT_REFORM,admiralty_regime_reform,X #L режим адміралтейства#!#!. Новий очільник обирається з-поміж найвидатніших адміралів. Якщо адмірала немає, то до знаходження відповідного кандидата країною керує тимчасова рада."
  admiralty_regime_heir_selection_best_candidate_desc: "Обирається з-поміж здібних флотоводців"
  general_heir_selection: "Військові вибори"
  general_heir_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] надають перевагу країни, в яких встановився #TOOLTIP:GOVERNMENT_REFORM,Adel_reform,X #L військовий режим#!#!. Новий очільник обирається з-поміж найвидатніших полководців. Якщо полководця немає, то до знаходження відповідного кандидата країною керує тимчасова рада."
  ritual_selection: "Ритуальні вибори"
  ritual_selection_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] поширений у багатьох культурах світу. Новий правитель обирається з-поміж синів попереднього правителя внаслідок ритуального змагання, переможець якого отримує право на найвищу владу."
  ritual_selection_best_candidate_desc: "Визначається внаслідок змагання."
  union_of_crowns_succession: "Престолонаслідування в союзі корон"
  union_of_crowns_succession_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!, яка уклала особливу угоду з іншою країною. У разі смерті одного з правителів будь-якої з країн і за відсутності законного [Concept('heir', 'спадкоємця')|e] чоловічої статі трон померлого перейде до іншого правителя."
  union_of_crowns_succession_tt: "Укласти [Concept('union', 'унію')|e], якщо наш наступник не є спадкоємцем чоловічої статі попереднього правителя"
  austrian_cognatic_primogeniture: "Династична когнатична примогенітура"
  austrian_cognatic_primogeniture_desc: "$cognatic_primogeniture_desc$ Цей тип успадкування стає доступним після введення реформи [ShowGovernmentReformName('libertas_affectandi')]. На додаток до правил когнатичної примогенітури правляча династія має переважне право щодо прямої чоловічої лінії."
  matrilineal_salic_law: "Матрилінійний салічний закон"
  matrilineal_salic_law_desc: "$semi_salic_law_desc$ Дітям жінок, що входять до правлячої династії, віддається більша перевага, ніж дітям з інших сімей."
  favorite_son_elective_succession: "Успадкування улюбленим сином"
  favorite_son_elective_succession_desc: "За такого типу [Concept('heir_selection', 'престолонаслідування')|e] поточний правитель призначає спадкоємцем одного зі своїх синів, виходячи з особистих уподобань, причому вік сина значення не має."
