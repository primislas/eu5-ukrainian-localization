  tanistry_elective: "Таністрі"
  tanistry_elective_desc: "Традиційна гельська форма державного устрою, за якої правлячий клан визначає найдостойнішого спадкоємця зі своїх лав. Нащадок правителя по чоловічій лінії має більше шансів бути обраним, однак вважається неналежним обирати дитину чинного правителя.\n\nПроцедура справді побудована таким чином, щоб обрати найздібнішого кандидата. Однак оскільки кермо влади часто переходить від однієї гілки сім'ї до іншої внаслідок досить довільного відбору, це нерідко призводить до розбрату."
