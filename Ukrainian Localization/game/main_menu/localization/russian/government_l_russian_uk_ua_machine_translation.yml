  grandmaster_elective: "Вибори великого магістра"
  tribal_oldest_male: "Племінні вибори: старший чоловік"
  tribal_matrilineal: "Племінні вибори: старша жінка"
  tribal_matrilineal_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] віддають перевагу в племені. Новим [Concept('ruler', 'вождем')|e] стає старша дочка попереднього [Concept('ruler', 'правителя')|e]."
  matrilineal_non_exclusive: "Будь-який спадкоємець по матері"
  matrilineal_non_exclusive_desc: "Цей тип [Concept('heir_selection', 'наслідування')|e] характерний для держав, де новим [Concept('ruler', 'вождем')|e] стає найбільш здібний член династії попереднього [Concept('ruler', 'правителя')|e]."
  bank_selection: "Вибори нового голови банку"
  elective_succession: "Виборне престолонаслідування"
  elective_succession_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Нового правителя обирають [ShowEstateTypeName('nobles_estate')|l]. Незважаючи на те, що монархом може бути обраний будь-який аристократ, виборці віддають перевагу члену правлячої династії."
  dynastic_elective_succession: "Династичне виборне престолонаслідування"
  dynastic_elective_succession_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Нового правителя обирають [ShowEstateTypeName('nobles_estate')|l]. Лише члени правлячої династії можуть бути обрані як монарх."
  dynastic_elective_succession_best_candidate_desc: "Визначається голосуванням #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!."
  papal_election: "Папський конклав"
  papal_election_desc: "Коли Папа Римський помирає, [Concept('cardinals','кардинали')|e] збираються і вирішують, хто стане його наступником. Ця процедура може пройти швидко, але часом займає кілька років."
  papal_election_best_candidate_desc: "Визначається голосуванням [Concept('cardinals', 'кардиналів')|e]."
  lottery_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Главу')|e] обирають за допомогою предмета, випадково обраного з-поміж багатьох інших."
  lottery_election_best_candidate_desc: "Визначається шляхом жеребкування."
  doge_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається елітами держави і править до кінця життя.\nНезважаючи на це, правитель все одно може бути усунутий зі своєї посади, якщо [ShowEstateTypeName('nobles_estate')|l] або [ShowEstateTypeName('burghers_estate')|l] вважатимуть, що він втратив популярність."
  diarchic_election_desc: "Цей унікальний тип [Concept('heir_selection', 'зміни влади')|e] віддають перевагу в Республіці [GetCountry('GEN').GetName]. [Concept('ruler', 'Глава')|e] обирається з-поміж членів двох знатних родин: #TOOLTIP:DYNASTY,spinola_dynasty_tt,X #L Спінола#!#! та #TOOLTIP:DYNASTY,doria_dynasty_tt,X #L Доріа#!#!."
  veche_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається в результаті народного сходу або віча з одного або кількох кандидатів.\n\n$veche_selection_best_candidate_desc$"
  veche_selection_best_candidate_desc: "Новий [Concept('ruler', 'правитель')|e] обирається шляхом [Concept('country_interaction', 'взаємодії з державою')|e] з #TOOLTIP:COUNTRY_INTERACTION,invite_prince,X #L запрошених князів#!#!."
  bank_selection_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] віддають перевагу в банкірській родині. [Concept('ruler', 'Глава')|e] обирається з-поміж членів династії."
  pirate_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] віддають перевагу в піратській #TOOLTIP:GOVTYPE,republic,X #L республіці#!#!. [Concept('ruler', 'Глава')|e] обирається з-поміж одного або кількох кандидатів, запропонованих екіпажами кораблів."
  cognatic_primogeniture_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. [Concept('heir', 'Спадкоємцем')|e] стає старший син чинного [Concept('ruler', 'правителя')|e], хоча жінки теж можуть успадковувати корону, якщо немає відповідного кандидата чоловічої статі."
  absolute_cognatic_primogeniture_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. [Concept('heir', 'Спадкоємцем')|e] стає старша дитина будь-якої статі чинного [Concept('ruler', 'правителя')|e]."
  salic_law_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e]. Доньки не можуть ні успадковувати, ні передавати право на трон своїм синам."
  semi_salic_law_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e]. Доньки не успадковують трон, однак можуть передати це право своїм синам."
  partition_inheritance_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новим [Concept('ruler', 'правителем')|e] стає старший син попереднього [Concept('ruler', 'правителя')|e], а всі інші нащадки чоловічої статі отримують другорядні титули та землі. Доньки не можуть ні успадковувати, ні передавати право на трон своїм синам.\n\nКоли до влади приходить новий правитель, найменш контрольовані провінції держави отримують додаткові штрафи до свого показника [Concept('control', 'контролю')|e], оскільки розподіляються між братами нового правителя."
  youngest_son_of_ruler_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] віддають перевагу в королівстві. Новим [Concept('ruler', 'правителем')|e] стає молодший син попереднього [Concept('ruler', 'правителя')|e]."
  fratricide_succesion: "Братовбивство"
  fratricide_succesion_desc: "Цей тип [Concept('heir_selection', 'престолонаслідування')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новий [Concept('ruler', 'правитель')|e] сходить на трон, довівши, що він удачливіший за суперників, — зазвичай шляхом їх усунення."
  fratricide_succesion_best_candidate_desc: "Нового [Concept('ruler', 'правителя')|e] обирають після того, як він доведе, що його удача перевершує удачу суперників, зазвичай шляхом їх усунення."
  unigeniture: "Унігенітура"
  unigeniture_desc: "Така система передбачає наявність єдиного спадкоємця. Передача влади старшому сину правлячої династії може призводити до конфліктів між спадкоємцями другого ряду — зокрема молодшими синами, яким дістаються лише дрібні титули, — та іншими претендентами на престол, що загрожує стабільності держави."
  mamluk_succesion: "Успадкування мамлюків"
  mamluk_succesion_desc: "$mamluk_succesion_regency_desc$"
  oligarchic_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] [Concept('election', 'обирається')|e] з-поміж правлячої меншості."
  podesta_elective: "Виборна влада"
  podesta_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається з [Concept('country', 'держави')|e], що має представництво в [Concept('capital', 'столичному')|e] [Concept('region', 'регіоні')|e]."
  republic_4_year_terms_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] і керує протягом встановленого терміну тривалістю 4 роки."
  republic_2_year_terms_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] і керує протягом встановленого терміну тривалістю 2 роки."
  peasant_elective_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається на [Concept('election', 'виборах')|e] з-поміж селян."
  theocratic_elective_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Глава')|e] визначається на [Concept('election', 'виборах')|e] з-поміж теократів."
  bishopric_elective_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Глава')|e] визначається на [Concept('election', 'виборах')|e] з-поміж доступних місцевих та міжнародних єпископів."
  grandmaster_elective_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!, що прийняла [ShowGovernmentReformName('military_order_reform')|l] як свій основоположний [Concept('government_reform', 'державний принцип')|e]. [Concept('ruler', 'Правитель')|e] обирається на [Concept('election', 'виборах')|e] з-поміж членів ордену."
  abbot_elective_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] характерний для #TOOLTIP:GOVTYPE,theocracy,X #L теократії#!#!. [Concept('ruler', 'Правитель')|e] обирається на [Concept('election', 'виборах')|e] з-поміж абатів."
  tribal_oldest_male_desc: "Цей тип [Concept('heir_selection', 'успадкування')|e] полюбляють у племені. Новим [Concept('ruler', 'вождем')|e] стає найстарший син попереднього [Concept('ruler', 'правителя')|e]."
  military_dictatorship: "Військова диктатура"
  military_dictatorship_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. Найвидатніший [Concept('character', 'полководець')|e] стає довічним правителем."
  signoria_selection: "Синьйоріальні вибори"
  signoria_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. [Concept('ruler', 'Глава')|e] обирається з представників якоїсь впливової родини і править до кінця свого життя. Зазвичай це дитина попереднього [Concept('ruler', 'глави')|e] республіки."
  judicial_election: "Юдикатні вибори"
  judicial_election_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] характерний для #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#!. Новий глава обирається з членів верховного суду. Цей процес є бюрократичним хаосом і може зайняти кілька місяців або навіть років."
  admiralty_regime_heir_selection: "Адміралтейські вибори"
  admiralty_regime_heir_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] полюбляють держави, в яких встановився [ShowGovernmentReformName('admiralty_regime_reform')|l]. Новий глава обирається з-поміж найвидатніших адміралів. Якщо адмірала немає, то до знаходження відповідного кандидата державою керує тимчасова рада."
  admiralty_regime_heir_selection_best_candidate_desc: "Обирається з-поміж здібних адміралів"
  general_heir_selection: "Генеральські вибори"
  general_heir_selection_desc: "Цей тип [Concept('heir_selection', 'зміни влади')|e] полюбляють держави, в яких встановився #TOOLTIP:GOVERNMENT_REFORM,Adel_reform,X #L військовий режим#!#!. Новий глава обирається з-поміж найвидатніших генералів. Якщо генерала немає, то до знаходження відповідного кандидата державою керує тимчасова рада."
  ritual_selection: "Ритуальні вибори"
