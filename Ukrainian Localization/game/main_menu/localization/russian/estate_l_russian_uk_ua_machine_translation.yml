l_russian:
  nobles_estate: "Знать"
  nobles_estate_desc: "До цього стану належать знатні землевласники. Їхні привілеї закріплені давніми традиціями, більша частина яких була дарована за виняткову службу країні. Історично на них лежить відповідальність захищати країну від зовнішніх загроз і допомагати правителю в підтриманні миру.\n$estate_common_crown_ending$"
  clergy_estate: "Духовенство"
  clergy_estate_desc: "До цього стану належать освічені служителі нашої державної релігії. Їхній традиційний обов'язок — дбати про духовне благополуччя країни та нашого народу, але вони також здавна служать у державній адміністрації. Протягом століть благочестиві громадяни та колишні правителі дарували їм цінні володіння та привілеї.\n$estate_common_crown_ending$"
  burghers_estate: "Міщани"
  burghers_estate_desc: "До цього стану належать підприємці нашої країни, включно з ремісниками, купцями та торговцями. Їхня традиційна роль — підтримувати та розвивати економіку. Тому вони зазвичай отримують особливі права та привілеї, що полегшують торгівлю та товарообіг.\n$estate_common_crown_ending$"
  peasants_estate: "Простолюд"
  peasants_estate_desc: "До цього стану належить населення, яке перебуває на найнижчому щаблі суспільства. Часто вони не мають ні престижу, ні влади. Проте простий народ становить основу нашої країни і може стати напрочуд могутньою силою, коли виступає єдиним фронтом."
  crown_estate: "Правителі"
  crown_estate_desc: "Ці люди стоять над іншими станами та мають повну й безмежну владу.\nЯк правило, для представників урядового стану влади ніколи не буває забагато."
  dhimmi_estate: "Зіммі"
  dhimmi_estate_desc: "До цього стану належать релігійні меншини всередині нашої [Concept('country', 'країни')|e], які в #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламі#!#! вважаються «людьми Писання». Зазвичай цей статус стосується #TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#! та #TOOLTIP:RELIGION,$judaism_tt$,X #L юдеїв#!#!, але іноді поширюється і на людей з інших [Concept('religions', 'конфесій')|e]. Положення та привілеї зіммі, їхня чисельність та устрій громад можуть значно відрізнятися залежно від країни.\n$estate_common_crown_ending$"
  tribes_estate: "Племена"
  tribes_estate_desc: "До цього стану належать різні племена та клани, що живуть у нашій [Concept('country', 'країні')|e]. Зазвичай вони поділяються на родові та сімейні громади, розташовані найчастіше в сільській місцевості. Їхній спосіб життя та заняття можуть сильно відрізнятися від однієї громади до іншої. Віддаленість та відносна незалежність від основних центрів влади не дозволяє встановити над ними надійне управління, а унікальні звичаї роблять їх лютими та непередбачуваними воїнами.\n$estate_common_crown_ending$"
  cossacks_estate: "Козаки"
  cossacks_estate_desc: "До цього стану належать найрізноманітніші представники #TOOLTIP:CULTURE,$cossack_culture_tt$,X #L козацтва#!#!, що проживають у нашій [Concept('country', 'країні')|e]. Козаки об'єднуються у воєнізовані групи та ведуть напівкочовий спосіб життя далеко від погляду можновладців. Однак, якщо надати їм достатню мотивацію, ці люди можуть послужити нам відмінну службу.\n$estate_common_crown_ending$"
  estate_common_crown_ending: "Загалом краще, якщо у правлячого стану більше влади, ніж у інших станів."
