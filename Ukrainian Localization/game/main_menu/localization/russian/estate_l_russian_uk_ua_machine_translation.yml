  tribes_estate_chibaloob: "Чібалооб"
  formal_guilds: "Формалізовані гільдії"
  formal_guilds_desc: "Різноманітні купецькі об'єднання вільно існували в нашій країні протягом усієї її історії. При цьому ми можемо задобрити найвпливовіших купців, законодавчо затвердивши їхнє місце в централізованій та організованій державній структурі. Такий привілей безперечно вплине як на наші внутрішні справи, так і на зовнішню політику."
  trade_monopolies: "Торгові монополії"
  trade_monopolies_desc: "Передавши монопольні права на торгівлю деякими товарами найвпливовішим купцям наших країн, ми значно посилимо вплив могутніх торговців. Своєю чергою, така політика вплине на наші відносини з іноземними купцями."
  control_over_monetary_policy: "Контроль над грошовою політикою"
  control_over_monetary_policy_desc: "Фінансова система відіграє дуже важливу роль у нашій країні, і ми постійно намагаємося її покращувати. Можливо, заможні представники нашої спільноти впораються з цим завданням ще краще. Ми можемо доручити їм управління фінансами, а взамін знизити податки на їхні товари та активи."
  building_rights: "Будівельні права"
  building_rights_desc: "Розвиток міських та сільських територій обходиться досить дорого. Якщо дарувати місцевому населенню право зводити споруди, витрати на будівництво суттєво знизяться. Однак слід враховувати, що вплив народу при цьому помітно зросте."
  burghers_royal_burgh_commissioners: "Комісари королівських бургів"
  burghers_royal_burgh_commissioners_desc: "Комісари представляють інтереси бургів #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!, які отримали хартію від #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!. До їхніх обов'язків входять захист привілеїв таких міст, нагляд за торгівлею та консультування правителя. Конвент королівських бургів [GetCountry('SCO').Custom('CL_GEN')], куди входять комісари, забезпечує збереження політичного, економічного та правового статусу бургів, а також виступає як противага владі знаті та #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#!."
  burghers_land_rights: "Земельні права містян"
  burghers_land_rights_desc: "Закони про землеволодіння завжди були предметом запеклих суперечок у судах нашої країни. Якщо #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#! отримають розширені привілеї в цьому питанні, різні гільдії стануть набагато поступливішими, але, з іншого боку, здобудуть більше влади."
  commercial_advisory_council: "Радники з купців"
  commercial_advisory_council_desc: "Торгівля — рушійний механізм нашої економіки, тому ми повинні оточувати главу країни лише найобдарованішими та найобізнанішими людьми, досвідченими в торгівлі і по морю, і по суші. Це розширить наші торгові можливості на батьківщині та за кордоном."
  building_roads_rights: "Права на будівництво доріг"
  building_roads_rights_desc: "Потрібно дозволити багатим #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщанам#!#! будувати [Concept('roads', 'дороги')|e]. Таке рішення вигідне не лише окремим торговцям, а й країні. Воно посприяє розвитку інфраструктури та прискорить економічне зростання."
  clergy_literacy_rights: "Доступ священників до освіти"
  clergy_literacy_rights_desc: "Наша релігійна традиція породила безліч літературних творів, які описують її принципи, моральні основи та закони. Наше #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! повинно мати нічим не обмежений доступ до письмового слова, щоб вільно вивчати священні тексти."
  clergy_strengthen_faith: "Зміцнення віри"
  clergy_strengthen_faith_desc: "Віра об'єднує народ навіть у найважчі часи. Стараннями нашого #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! віра наших підданих тільки зміцніє перед лицем зовнішніх загроз."
  clergy_lecture_oaths: "Клятва вірності університету"
  clergy_lecture_oaths_desc: "Наші стародавні університети славляться своїми випускниками — це найсвітліші уми країни. Саме тому за ними потрібен особливий контроль та нагляд. Кожен випускник зобов'язується принести клятву не викладати ніде, крім цих центрів просвіти."
  clergy_enforced_unity: "Встановлення релігійної єдності"
  clergy_enforced_unity_desc: "У нашій країні живуть представники різних конфесій, і забезпечувати їх мирне співіснування все важче. Це послаблює нас, тому ми повинні змусити підданих слідувати тільки державній релігії. Так ми покінчимо з розбратами і зміцнимо свій авторитет."
  clergy_military_orders: "Військові ордени"
  clergy_military_orders_desc: "Військові ордени з'явилися з початком хрестових походів як спосіб об'єднати дисципліну та ревну віру ченців з майстерністю та досвідом лицарів. Вони поширилися по всьому християнському світу, але й інші релігії стали створювати подібні ордени, щоб брати участь у священних війнах."
  clergy_land_rights: "Земельні права священників"
  clergy_land_rights_desc: "Ми ухвалили рішення: віряни отримають право самостійно володіти землею. Це дасть їм більше влади та впливу, зате ми завжди зможемо розраховувати на сприяння праведних людей."
  clerical_advisory_council: "Радники зі священників"
  clerical_advisory_council_desc: "[ShowEstateTypeName('clergy_estate')] сформують раду зі своїх представників у нашій країні. Таким чином, вони отримають більше влади, але будуть задоволені можливістю безпосередньо доносити до нас побоювання та відстоювати свої інтереси."
  clergy_powerful_dioceses: "Більше влади єпархіям"
  clergy_powerful_dioceses_desc: "Управління нашими землями перебуває в руках країни. Однак релігійна структура не завжди збігається з нашим адміністративним поділом: церква управляється за допомогою єпархій, які значно впливають на внутрішню політику країни."
  nobles_land_rights: "Земельні права"
  nobles_land_rights_desc: "Наша #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! має значні права щодо землі та жителів у своїй владі. Крім іншого, аристократи зазвичай можуть стягувати з підлеглих #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селян#!#! податки, призивати їх до ополчення та самостійно вершити правосуддя на своїй землі. До того ж вони мають право передавати цю землю спадкоємцям."
  auxilium_et_consilium: "Auxilium et consilium"
  auxilium_et_consilium_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократи#!#! користуються привілеями, але у них є й обов'язки перед вищою владою. Знать зобов'язана підтримувати війська (лат. #italic auxilium#!), зокрема утримувати укріплення та інфраструктуру на своїх землях; але крім того — допомагати уряду порадою (лат. #italic consilium#!) за потреби."
  noble_serfdom_rights: "Кріпосне право під контролем знаті"
  noble_serfdom_rights_desc: "У #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#! є безліч прав щодо підвладних їм #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селян#!#!. Наприклад, право вводити податки, скликати ополчення та вершити правосуддя. У цих умовах селяни стають кріпаками, а часто ще й виявляються прикріплені до землі, на якій працюють."
  noble_fortification_licenses: "Право на зведення укріплень"
  noble_fortification_licenses_desc: "Одним із плодів феодалізму виявилося повсюдне поширення замків та фортів, що зводяться #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаттю#!#! заради зміцнення своєї влади. Це безпосередньо впливає на наше суспільство, оскільки аристократи можуть перетворити свої спадкові землі на неприступні фортеці."
  noble_marriage_rights: "Право на династичний шлюб"
  noble_marriage_rights_desc: "У нашій країні #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! стоять на одній суспільній сходинці з правителями, тому можуть вступати в шлюб з представниками правлячої родини, що збільшує їхню роль при дворі та в уряді."
  noble_leaders_only: "Тільки знатні лідери"
  noble_leaders_only_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократи#!#! переконані, що тільки вони здатні командувати військами та флотами нашої країни, виправдовуючи це колишніми заслугами. Проте інші стани незадоволені таким станом речей і вважають аристократів зарозумілими дурнями."
  banal_lordship: "Баналітет"
  banal_lordship_desc: "Це один із різновидів маноріалізму, що розвинувся в межах феодального ладу. Його основа — «бан», тобто право землевласника розпоряджатися своїми васалами, віддавати їм накази та карати за непокору. Це призвело до того, що #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! мають величезну владу у своїх володіннях, оскільки вершать там правосуддя та стягують з #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селян#!#! податки майже за все."
  primacy_of_nobility: "Верховенство аристократії"
  primacy_of_nobility_desc: "Аристократи є головним станом у нашій країні — їхніми силами втілюється більшість наших планів, до того ж вони становлять основу нашого війська. В результаті вони вважають себе рівнею з нами, а уряд змушений радитися з ними з усіх важливих питань."
  elaborate_court_ceremonies: "Складне придворне життя"
  elaborate_court_ceremonies_desc: "Ми вирішили перетворити придворне життя на низку неймовірно ускладнених формальностей. Усі, хто хоч щось із себе представляє, повинні з'являтися на столичних прийомах у правителя. Це сильно обмежує можливості аристократів плести інтриги, проте дуже дорого нам обходиться."
  tysiatskii_privilege: "Тисяцький"
  tysiatskii_privilege_desc: "Тисяцькі — це військові керівники, що обираються з числа бояр. У більшості інших країн повноваження подібних чиновників обмежуються військовим командуванням, але у нас тисяцькі ще й представляють інтереси #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селян#!#!, ухвалюють судові рішення з торговельних питань, а також стежать за станом укріплень."
  the_ryad_privilege: "Ряд"
  the_ryad_privilege_desc: "$the_ryad_privilege$ — це договір між країною та боярами. Він захищає інтереси та владу бояр, одночасно закріплюючи права та обов'язки князя."
  bashtinas_and_pronijas_grants: "Баштини"
  bashtinas_and_pronijas_grants_desc: "Ця система, за якою представники вищого суспільства отримують землю, бере за основу візантійські #italic пронії#!. Вона передбачає цілу низку прав та обов'язків, які феодали, обдаровані землею, отримують в області управління своїми новими територіями."
  zupa_districts: "Жупи"
  zupa_districts_desc: "Склад і поділ нашого суспільства описані та закріплені у великій кількості чинних законів. Одним із найважливіших елементів нашої країни та її бюрократичного апарату є поділ провінцій на жупи — це райони, організовані задля більшої ефективності в управлінні місцевими справами."
  vlastele_krayishnik: "Властель-країшник"
  vlastele_krayishnik_desc: "Наші прикордонні землі потребують постійного захисту. Це завдання виконує система #italic країн#!, згідно з якою такі землі діляться на кілька добре керованих районів. Кожним районом командує #italic властель-країшник#! — це один із місцевих землевласників, якому доручено захищати людей та підтримувати добробут своєї території."
  feudal_mercenary_contracts: "Феодальні контракти з найманцями"
  feudal_mercenary_contracts_desc: "Зібрані нами ополчення часто залишають бажати кращого. Щоб захистити своїх підданих і перевершити суперників, ми змушені покладатися на іноземних найманців. Контракти з ними укладатимуть представники вищого суспільства."
  tax_exemption: "Звільнення від податків"
  tax_exemption_desc: "Наша релігія тримається на доброчесних людях, які все життя присвятили турботі про духовний добробут народу. Було б правильно звільнити їх від будь-яких податків і податей."
  peasants_represented_in_parliament: "Право на представництво"
  peasants_represented_in_parliament_desc: "Якщо представники нижчого стану отримають місце в головному представницькому органі нашої країни, це дозволить #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селянам#!#! озвучувати свої бажання, а також закріпить за ними ширші права."
  peasants_free_peasantry: "Свобода пересування для селян"
  peasants_free_peasantry_desc: "Народ — найбільше багатство будь-якої країни, без них ми б не змогли уникнути голоду та безладів. Однак еліти довгий час бачили в них лише власність, неживі об'єкти, прив'язані до землі.\nЯкщо народні маси отримають свободу пересування, то влада над власним життям повернеться до них у руки і вони зможуть покинути своїх колишніх господарів, вирушивши на нові, кращі землі."
  peasant_owns_their_food: "Засоби виробництва"
  peasant_owns_their_food_desc: "Вище суспільство — справжні паразити, які, не віддаючи нічого взамін, привласнюють собі все, що прості люди створюють важкою працею. Якщо ми віднімемо у гнобителів засоби виробництва, трудовий народ нарешті поверне собі владу над власною долею."
  peasants_fewer_levies: "Урізане ополчення"
  peasants_fewer_levies_desc: "#TOOLTIP:ESTATE_TYPE,peasants_estate,X #L Селяни#!#! — це плоть і кров нашої країни. Вони годують населення, заготовляють будівельні матеріали та виробляють товари, які потім продають купці.\nВійна — це завжди важкий час для країни, але не можна дозволити, щоб прості люди величезними натовпами потрапляли в жорна конфлікту, інакше після війни нас чекатимуть голод і розруха."
  peasants_yeomanry: "Йомени"
  peasants_yeomanry_desc: "Дрібні землевласники отримують більше прав в обмін на те, що беруть на себе частину обов'язків дрібних аристократів — зокрема від них очікують більшого внеску в справу захисту країни."
  creaghts_privilege: "Крейти"
  creaghts_privilege_desc: "Багато представників нижчого суспільства в нашій країні належать до числа #italic крейтів#! — кочівників-скотарів, які мігрують на свіжі пасовища при зміні сезонів. Вони отримали своє ім'я на честь тимчасових жител, які облаштовують, переміщаючись з місця на місце. Крейти не прив'язані до певної землі, тому існують поза традиційною феодальною структурою."
  coign_and_livery_privilege: "Утримання та постій"
  coign_and_livery_privilege_desc: "Ця система, також відома під назвою #italic боннахт#!, приписує молодшим вождям надавати за свій рахунок постій та утримання нашим воякам, коли ті розквартировані на території їхніх земель."
  peasants_allowed_weapons_privilege: "Ополчення селян"
  peasants_allowed_weapons_privilege_desc: "Селянам дозволяється брати свою зброю при призові на службу в ополчення і потім користуватися нею. Це збільшує ринковий попит на зброю."
  gradozadanje_and_gradobljudenlje_rights: "Градозадання та градоблюдення"
  gradozadanje_and_gradobljudenlje_rights_desc: "У наших володіннях багато фортець і могутніх замків. Обов'язки щодо утримання цих укріплень та поповнення їх гарнізонів покладаються на місцеве населення та міщан."
  peasants_autonomous_villages: "Незалежні села"
  peasants_autonomous_villages_desc: "У сільській місцевості ходить така приказка: «Країна закінчується там, де починається село». Селяни будують своє життя незалежно від централізованої влади нашої країни."
  clergy_protected_faith: "Недоторканність віри праведників"
  clergy_protected_faith_desc: "Святі мужі та жінки отримали релігійну недоторканність і тому захищені від будь-яких спроб навернення в іншу віру з боку країни."
  burghers_protected_faith: "Недоторканність віри багатіїв"
  burghers_protected_faith_desc: "Багаті члени суспільства отримали релігійну недоторканність і тому захищені від будь-яких спроб навернення в іншу віру з боку країни."
  nobles_protected_faith: "Недоторканність віри еліт"
  nobles_protected_faith_desc: "Еліти отримали релігійну недоторканність і тому захищені від будь-яких спроб навернення в іншу віру з боку країни."
  peasants_protected_faith: "Недоторканність віри селян"
  peasants_protected_faith_desc: "Селяни отримали релігійну недоторканність і тому захищені від будь-яких спроб навернення в іншу віру з боку країни."
  reduced_from_military_obligations: "Урізані військові зобов'язання"
  reduced_from_military_obligations_desc: "В обмін на лояльність нашій владі ми можемо урізати або скасувати військову повинність для тих, хто обере праведне життя на службі вищим силам."
  office_of_the_sankar_zouma_privilege: "Санкар-зума"
  office_of_the_sankar_zouma_privilege_desc: "Санкар-зума — це престижна посада, яку [GetCountry('MAL').GetGovernment.GetEstateName('nobles_estate')|l] можуть отримати від вищої влади. Повноваженнями вона схожа на фарима-суру — люди на цій посаді контролюють усі торгові шляхи, що проходять через південний кордон."
  office_of_the_farima_soura_privilege: "Фарима-сура"
  office_of_the_farima_soura_privilege_desc: "Фарима-сура захищає північний кордон країни, контролює переміщення через Сахару, а також забезпечує безпеку та легкість проходження торгового потоку в нашу країну та за її межі."
  liberum_veto: "Liberum veto"
  liberum_veto_desc: "Відтепер голосування в сеймі має бути одноголосним. Кожен дворянин може зупинити голосування або обговорення закону, вставши та прокричавши #italic sisto activitatem!#! («Я припиняю діяльність!») латиною або #italic nie pozwalam!#! («Я не схвалюю це!») польською мовою."
  visconti_city_states: "Міста-країни Вісконті"
  visconti_city_states_desc: "[GetCountry('MLO').GetLongName] під владою сімейства Вісконті є децентралізованою та роздробленою країною. [GetCountry('MLO').GetFlavorRank] постійно перебува[GetCountry('MLO').Custom('endlong_ityat')] у стані боротьби за владу між усіма значущими членами династії, що призвело до ряду внутрішніх конфліктів. Багато хто, включно з Аццоне, Джан Галеаццо та Бернабо, прагнуть одноосібної влади, формуючи альянси, плануючи зради та проводячи воєнні кампанії один проти одного. Через безперервні чвари [GetCountry('MLO').GetLongNameWithNoTooltip] втрача[GetCountry('MLO').Custom('endlong_etyut')] будь-яку подобу надійного управління, що лише сприяє розколу та нестабільності в усьому регіоні."
  milanese_cloth_guilds_privileges: "Міланські гільдії ткачів"
  milanese_cloth_guilds_privileges_desc: "Наша прибуткова ткацька промисловість стоїть на плечах найкращих ремісників у всій #TOOLTIP:REGION,italy_region,X #L Італії#!#!. Довіривши купцям управління виробництвом, ми досягнемо рекордних темпів випуску продукції та отримаємо величезний прибуток. Деяка влада, яку набудуть купецькі гільдії, — невелика ціна за це."
  novgorod_ivans_hundred: "Іванівське сто"
  novgorod_ivans_hundred_desc: "Іванівське сто — це купецька гільдія, голови якої є постійними членами торгового суду та #TOOLTIP:LOCATION,novgorod,X #L новгородської#!#! Ради панів. Їхня присутність у політиці, а також угоди між ними та #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L боярами#!#! забезпечують подальший успіх нашої країни в торгових справах."
  ordinance_of_laborers: "Закони про робітників"
  ordinance_of_laborers_desc: "На превелике невдоволення селян, ці закони покликані обмежити постійно зростаючу платн селян, фактично закріпивши їх на рівні до епідемії чуми. Роботодавцям також заборонено наймати зайві руки, а всі #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! віком до 60 років зобов'язуються працювати."
  masaniellos_fight: "Боротьба Мазаньєлло"
  masaniellos_fight_desc: "Цей привілей покликаний відображати вимоги рибалки Мазаньєлло — захистити простий народ від звірячих поборів і врятувати його від розорення."
  peasants_no_poll_tax_privilege: "Звільнення від подушного податку"
  peasants_no_poll_tax_privilege_desc: "Після повстання Вота Тайлера влада скасувала подушну подать і гарантувала, що вона ніколи не буде введена знову."
  land_owning_farmers: "Селяни-землевласники"
  land_owning_farmers_desc: "Сильна позиція #L [GetCountry('SWE').GetAdjective|l]их#! селян відрізняла їх від більшої частини феодальної #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Вони особисто володіли землями, платили податки безпосередньо правителям і часто мали право голосу на місцевих зборах, що давало їм певну автономію та юридичний захист. Ці фермери не були кріпаками. Багато з них володіли зброєю і служили в ополченні. Їхні права закріплені в давньому законі, і їхня відносна незалежність стала основоположним елементом раннього шведського сільського суспільства."
  general_privilege: "Генеральний привілей [GetCountry('ARA').Custom('CL_GEN')]"
  general_privilege_desc: "Генеральний привілей — це список законів і компромісів, який зобов'язує монарха гарантувати традиційні права аристократам і не оголошувати війни без санкції парламенту."
  union_privilege: "Привілей унії"
  union_privilege_desc: "Попри спротив #TOOLTIP:ESTATE_TYPE,crown_estate,X #L корони#!#!, #italic Арагонська унія#! змусила короля прийняти набір досягнутих угод як закон. Відповідно до нього, арагонські #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! та містяни отримують широкі права на шкоду традиційним повноваженням правителя."
  justicia_de_aragon: "Арагонська юстиція"
  justicia_de_aragon_desc: "Арагонська юстиція — впливовий юридичний і судовий орган. [GetCountry('ARA').GetLongName] створи[GetCountry('ARA').Custom('endlong_fem')] його задля дотримання місцевих законів, вирішення суперечок та захисту прав підданих від надмірного втручання корони."
  formalized_oath: "Офіційна клятва вірності"
  formalized_oath_desc: "Монархія пов'язана офіційною угодою, яка гарантує визнання та дотримання прав і свобод станів перед принесенням клятви вірності."
  double_sabbath: "Дводенний шабат"
  double_sabbath_desc: "Наперекір загальноприйнятим нормам, наш народ здавна святкував і сьомий день Шабат у суботу, і день Господній у неділю. Цей привілей перетворює традицію на закон і захищає селян від гонінь за дотримання її."
  signoria_council: "Синьйорія"
  signoria_council_desc: "[GetCountry('FLO').GetName] сформувал[GetCountry('FLO').Custom('end_fem')] синьйорію — раду з дев'яти осіб, яка керує містом. Там засідають представники різних міських гільдій, і кожні два місяці проходить лотерея, за результатами якої рада переобирається. Постійна заміна членів гарантує, що інтереси республіки в рішеннях ради домінуватимуть над особистими. Проте той факт, що радники висуваються від гільдій, означає, що влада постійно перебуває в руках одних і тих самих сімей."
  florence_guilds: "Гільдії [GetCountry('FLO').Custom('CL_GEN')]"
  florence_guilds_desc: "#L [GetCountry('FLO').GetAdjective]і#! ремісники та купці зазвичай належать до певних гільдій. Це дозволяє не тільки витримувати стандарт якості продукції, а й уникати нечесної конкуренції. Проте в результаті ці гільдії мають незаперечний вплив.\n\nВідкриває доступ до [Concept('law', 'закону')|e] #TOOLTIP:LAW,guilds_of_florence,X #L «Панування флорентійських цехів»#!#!."
  scholar_officials: "Вчені-чиновники"
  scholar_officials_desc: "Наша еліта — мудрі державні службовці та політики, які заслужили завидне становище, продемонструвавши багаті пізнання на державному іспиті.\nСім'ї цих чиновників збережуть привілеї, якщо такий вчений з'являтиметься там хоча б раз на три покоління."
  petty_bureaucracy: "Мала бюрократія"
  petty_bureaucracy_desc: "Чиновницький кістяк нашої країни складається з навчених фахівців та управлінців, які вирішують повсякденні питання та підтримують структуру уряду."
  powerful_italian_families: "Впливові італійські родини"
  powerful_italian_families.tt: "Наша столиця не в Італії"
  powerful_italian_families_desc: "#TOOLTIP:LOCATION,rome,X #L Рим#!#! та #TOOLTIP:CULTUREGROUP,italian_group,X #L італійські#!#! стани ще глибше занурюються в безодню безвладдя та анархії, коли [GetCountry('PAP').GetGovernment.GetRulerTitle|l] переносить свій двір до #TOOLTIP:LOCATION,avignon,X #L Авіньйона#!#!. Тепер ці землі перебувають під контролем впливових італійських родин, таких як Колонна та [ShowDynastyName('orsini_dynasty')], і [GetCountry('PAP').GetGovernment.GetRulerTitle|l] майже не має над ними влади."
  french_cardinals: "Французькі кардинали"
  french_cardinals_desc: "З того моменту, як помер [GetCharacter('pap_boniface_viii').GetName] і новим місцем перебування двору стало місто [ShowLocationName('avignon')], кардинали #L [ShowCultureGroupName('french_group')|l]ого#! походження отримали більшість у конклаві. [GetCountry('FRA').GetGovernment.GetRulerTitle] країни [GetCountry('FRA').GetName] має на них величезний вплив і не дозволить, щоб країна [GetCountry('PAP').GetName] знову повернулася до своєї колишньої столиці — [ShowLocationName('rome')]."
  cardinal_lead_guilds: "Кардинал на чолі гільдій"
  cardinal_lead_guilds_desc: "Гільдії та інші купецькі об'єднання — неминуче зло. Але якщо їх очолить благочестивий кардинал, ми будемо впевнені, що гільдійці не сходять з Божого шляху, а гріх жадібності не затуманює розум наших #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#!."
  kbo_kaigama: "Кайгама"
  kbo_kaigama_desc: "Кайгама — це намісник наших південних територій і командувач війська. #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократи#!#! з цим титулом, як правило, володіли силою, енергією та колосальною владою, а часом навіть впливали на корону, вирішуючи, хто в підсумку виявиться правителем країни."
  kbo_yerima: "Єріма"
  kbo_yerima_desc: "Єріма — це намісник наших північних територій. На його плечах лежить відповідальність за набір міцних воїнів із нижчих каст. Єріма не користується таким впливом, як кайгама, але, можливо, нам незабаром доведеться рахуватися з ним, оскільки саме він завідує зростанням нашого війська, що веде боротьбу з ворогами — як зовнішніми, так і внутрішніми."
  kbo_lake_chad_trade_privilege: "Контроль над озером Чад"
  kbo_lake_chad_trade_privilege_desc: "По всьому узбережжю озера Чад наші #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! зустрічають людей із далеких країв та обмінюються з ними товарами. Обсяги торгівлі під нашим контролем — плоть і кров нашої економіки, що гарантує країні стабільність."
  kbo_serfdom_economy: "Рабська економіка"
  kbo_serfdom_economy_desc: "Наша велика держава гордо стоїть на спинах підкорених ворогів. Безперервний потік невільників, що йде в країну, є основою її економіки. Часті набіги та завоювання роблять нас ще сильнішими."
  amenokal_salt_traders: "Солеторговці аменокаля"
  amenokal_salt_traders_desc: "Ці випробувані ветерани транссахарської торгівлі стежать за караванами, що перевозять #TOOLTIP:GOODS,salt,X #L сіль#!#! та направляють їх під час переходів по негостинній пустелі."
  kbo_cima: "Земельні посібники для кіма"
  kbo_cima_desc: "В нагороду за бойові перемоги ми можемо дарувати успішним командирам землі на прикордонні. Так ми отримаємо їхню лояльність, а в довгостроковій перспективі збільшимо вплив столиці на околицях країни."
  clergy_religious_state: "Релігійна адміністрація"
  clergy_religious_state_desc: "Зробивши релігію основним пріоритетом країни, ми зможемо згуртувати народ в єдине ціле."
  clergy_papal_emissary: "Папські посланники"
  clergy_papal_emissary_desc: "Легати та інші представники, яких присилає [GetCountry('PAP').GetGovernment.GetRulerTitle|l], зазвичай знаходять у наших землях не просто теплий прийом — ми завжди намагаємося слідувати їхнім рішенням та не втручатися у відносини, які встановили місцеві #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! та [GetCountry('PAP').GetGovernment.GetRulerTitle|l]."
  freedom_of_interpretation: "Свобода трактувань"
  freedom_of_interpretation_desc: "Численні вчення нашої віри — не що інше, як тінь, під якою ми можемо відпочити та насолодитися розсудливим і праведним життям. Вона надихає людей та спонукає шукати істини, розширюючи та уточнюючи догмати. Така свобода інтерпретації дозволить нашій релігії адаптуватися до найрізноманітніших спільнот без шкоди для її фундаментальних основ."
  expansionist_zealotry: "Фанатична експансія"
  expansionist_zealotry_desc: "Битися на священній війні — це головне покликання будь-якого щиро віруючого."
  religious_diplomats: "Посли з духовенства"
  religious_diplomats_desc: "Дипломатія — складне ремесло. Іноді вистачає найменшого непорозуміння, щоб відносини між країнами безнадійно зіпсувалися. Відправляючи до наших побратимів по вірі виключно послів з духовенства, ми віримо, що однодумність стане фундаментом для довгих та плідних політичних відносин."
  promote_cultural_unity: "Підтримка культурної єдності"
  promote_cultural_unity_desc: "Основа сильного та стійкого суспільства — просування єдиної культури, яка об'єднає весь народ та захистить його від іноземного впливу."
  embellish_great_works_of_faith: "Зведення великих храмів віри"
  embellish_great_works_of_faith_desc: "Немає кращого способу продемонструвати великодушність та прихильність вірі, ніж зведення грандіозних храмів. Чудова архітектура збуджує в людях ні з чим не зрівнянне благоговіння перед вищими силами."
  dhimmi_land_rights: "Гарантія місцевих прав на землю"
  dhimmi_land_rights_desc: "Дім людини — її фортеця. Гарантувавши земельні права нашим підданим, які не дотримуються істинної віри, ми створимо узи довіри між ними та нашою владою."
  dhimmi_lighter_taxes: "Зниження податків"
  dhimmi_lighter_taxes_desc: "Щоб побудувати стійке суспільство, в якому зможуть мирно співіснувати прихильники різних релігій, потрібне справедливе та добре ставлення і, що особливо важливо, податкові пільги. Знизивши податки, які сплачують наші піддані-іновірці, ми зможемо забезпечити їхню покірність."
  dhimmi_military_service: "Допуск до військової служби"
  dhimmi_military_service_desc: "Багато іновірців, що мирно живуть на нашій землі, будуть готові захистити свій дім та сім'ю, якщо ми дозволимо їм вступити до лав війська."
  dhimmi_promote_tolerance: "Заохочення терпимості"
  dhimmi_promote_tolerance_desc: "Наш народ досить часто виявляє схильність до створення більш різноманітного та терпимого співтовариства. Діючи в повній відповідності з волею іновірців та наслідуючи їхній приклад, ми виявимо до них доброту та забезпечимо країні стабільність і процвітання."
  dhimmi_administrative_posts: "Посади в адміністрації"
  dhimmi_administrative_posts_desc: "Багато людей, що живуть усередині наших кордонів, дотримуються іншої віри, і їхні місцеві ватажки вельми зацікавлені в тому, щоб зберегти свій статус. Для будь-якої далекоглядної влади буде корисно співпрацювати з ними та переймати їхні знання."
  dhimmi_traditions: "Збереження місцевих традицій"
  dhimmi_traditions_desc: "Наші васали-іновірці мають найрізноманітніше походження, а отже — інші вірування та спосіб життя. Це і прості трудівники в полях, і колишні аристократи з багатим минулим, історією, традиціями. Повага до їхніх звичаїв та дозвіл їм слідувати — лише ознака гармонійного та самодостатнього суспільства."
  dhimmi_legal_autonomy: "Судове самоврядування"
  dhimmi_legal_autonomy_desc: "Багато гідних жителів наших земель дотримуються іншої віри, проте включені в нашу судову систему на рівних правах. Якщо ми не будемо слухати незадоволених і дозволимо іновірцям бути юристами, свідками, опікунами та навіть законними представниками своїх спільнот, підтримка нашої влади серед іновірців помітно зросте."
  dhimmi_promote_dhimmi_hierarchy: "Підтримка місцевої ієрархії"
  dhimmi_promote_dhimmi_hierarchy_desc: "Ми прагнемо підтримувати порядок у суспільстві, тому наші радники вважали за необхідне, щоб представники місцевих спільнот, які дотримуються іншої віри, також взяли участь у цій справі."
  dhimmi_pact_of_umar: "Договір Умара"
  dhimmi_pact_of_umar_desc: "Цей договір чітко регламентує статус, права та обов'язки «підзахисних осіб» нашої країни, зокрема християн, юдеїв, зороастрійців та представників інших визнаних релігій."
  dhimmi_mazalim_court: "Суди мазалім"
  dhimmi_mazalim_court_desc: "Світські суди мазалім, де розглядаються справи невіруючих, існують паралельно з релігійно-судовою адміністрацією та судами шаріату. Засідання таких судів відбуваються у Палаці правосуддя #italic (Дар аль-Адле)#! або в церемоніальній залі цитаделі #italic (Іван-Кабіре)#!."
  local_tribal_strongholds: "Фортеці племен"
  local_tribal_strongholds_desc: "Численні осілі племена, розкидані по всьому Магрибу, мають великий вплив на місцеве населення. Якщо ми будемо ставитися до цих племен з повагою, то керувати володіннями стане значно простіше."
  jaysh_armies: "Джейш аль-Іслам"
  jaysh_armies_desc: "Місцева влада найняла цих людей для виконання різних військових завдань. Рекрути займаються придушенням заколотів як у цій області, так і на своїй батьківщині, а також забезпечують регулярне поповнення нашого війська."
  tribes_in_administration: "Племінна рада"
  tribes_in_administration_desc: "Племінні громади є невід'ємною частиною нашого суспільства. Буде справедливо, якщо ми дозволимо їхнім представникам обіймати посади в уряді."
  tribes_land_rights: "Земельні права племен"
  tribes_land_rights_desc: "Наша земля є домом для багатьох племінних громад. Розширення населених ними територій та повага до їхніх земельних прав — чудовий спосіб продовжувати з ними плідну співпрацю."
  tribes_fosterage: "Передача на виховання"
  tribes_fosterage_desc: "Представники племінних спільнот, а точніше — їхнього молодого покоління, проводитимуть кілька років, виховуючись у сусідів, щоб діти перейняли унікальні знання, а ми змогли зміцнити узи спорідненості та взаєморозуміння між спільнотами."
  tribes_manrent: "Манрент"
  tribes_manrent_desc: "Згідно з правилами військової повинності за контрактом, багато представників племен вступають на службу до найвпливовіших місцевих сімей."
  tribes_allow_gatherings: "Дозвіл на зібрання"
  tribes_allow_gatherings_desc: "Регулярні зібрання наших племінних спільнот — чудове місце для обговорення політики, обміну новинами та налагодження ділових зв'язків з громадами по всій країні. Тому ми повинні їх дозволити."
  tribes_creach: "Крех"
  tribes_creach_desc: "#TOOLTIP:GOODS,livestock,X #L Худоба#!#! часто дістається нам як здобич на війні та в набігах. Її розведення може забезпечити нашим племінним народам процвітання та добробут."
  tribes_pasture_access: "Допуск до пасовищ"
  tribes_pasture_access_desc: "Якщо племінні громади отримають від нас доступ до пасовищ, ми зможемо скористатися їхніми обширними знаннями у розведенні #TOOLTIP:GOODS,livestock,X худоби#!."
  tribes_tribal_levies: "Право на племінні ополчення"
  tribes_tribal_levies_desc: "Воїни племінних народів знамениті своїм бойовим досвідом. Прийнявши цих загартованих бійців до лав війська, ми посилимо її та зміцнимо владу над землями, які контролюємо."
  tribes_tribal_registry: "Розширений облік"
  tribes_tribal_registry_desc: "Хоча племена найчастіше живуть відокремлено від нашого суспільства, ми все ж повинні налагодити їхній скрупульозний облік."
  tribes_protected_faith: "Недоторканність віри племен"
  tribes_protected_faith_desc: "У жителів диких земель зустрічаються вірування, відмінні від загальноприйнятих. Втім, поки вони залишаються нашими вірними підданими, нам слід виявляти повагу до їхніх релігійних відмінностей."
  tribes_respect_tribal_traditions: "Повага до традицій племен"
  tribes_respect_tribal_traditions_desc: "У наших племінних громад зустрічаються найдивовижніші традиції. Країна повинна виявляти до них повагу та підтримку."
  cossacks_land_rights: "Земельні права козаків"
  cossacks_land_rights_desc: "Козаки живуть громадами, де діють свої закони. Якщо ми гарантуємо незалежність їхніх територій, вони залишаться нам вірними."
  cossacks_sanctioned_atamans: "Визнання влади отаманів"
  cossacks_sanctioned_atamans_desc: "Козаки називають вождів своїх громад #italic отаманами#!. Якщо ми офіційно визнаємо право отаманів на владу, то їхній вплив зросте, однак вони потраплять у залежність від нас."
  cossacks_allowed_free_roaming: "Право на кочівництво"
  cossacks_allowed_free_roaming_desc: "Козаки здавна ведуть напівкочовий спосіб життя і ніде подовгу не затримуються. Дозволивши їм вільно пересуватися країною, ми не тільки зробимо великий внесок у збереження їхньої культури, а й зміцнимо їхнє бажання з нами співпрацювати."
  cossacks_government_positions: "Козаки в уряді"
  cossacks_government_positions_desc: "Суворе життя козаків виховує в них мужність та стійкість. Можливо, найталановитіші з них повинні не кочувати нашими землями, а допомагати нам з державними справами."
  cossacks_military_service: "Військова служба для козаків"
  cossacks_military_service_desc: "Козаки живуть за військовими законами. Замість того, щоб просто блукати нашими землями, вони могли б стати частиною нашої військової системи та перевагою на полі бою."
  cossacks_protected_faith: "Недоторканність віри козаків"
  cossacks_protected_faith_desc: "Козаки традиційно дотримуються найрізноманітніших релігійних переконань, проте більшість з них все ж сповідують одну віру. Якщо ми будемо з повагою ставитися до їхніх вірувань, це послабить напруженість в їхніх власних лавах, і нам теж буде простіше з ними домовитися."
  cossacks_respected_traditions: "Повага до козацьких традицій"
  cossacks_respected_traditions_desc: "Козаки мають свої традиції та соціальну структуру. Щоб ці люди по-справжньому відчували свою приналежність до країни, ми повинні поважати їхній уклад."
  cossacks_rada_autonomy: "Незалежність ради"
  cossacks_rada_autonomy_desc: "Козаки називають свій головний орган самоврядування #italic радою#!. Це зібрання, на якому вирішуються всі цивільні та військові питання. Визнавши незалежність таких рад від нашої влади та дозволивши козакам самостійно керувати своїми територіями, ми безперечно заслужимо їхню прихильність."
  cossacks_register: "Реєстрові козаки"
  cossacks_register_desc: "Козаки не просто увійдуть до складу нашого війська. Ми об’єднаємо їх в особливий реєстр і дозволимо мати власні офіцерські звання, щоб вони краще билися за нашу країну."
  cossacks_explorers: "Козаки-першопрохідці"
  cossacks_explorers_desc: "Козаки звикли до кочового життя і почуваються як риба у воді практично скрізь. Ми можемо отримати з цього вигоду, відправляючи козаків в експедиції для дослідження земель, які в подальшому будуть приєднані до нашої країни."
  cossacks_colonization: "Козаки-колоністи"
  cossacks_colonization_desc: "Завдяки кочовому способу життя козаки ідеально підходять для освоєння безхазяйних земель і підготовки їх до будівництва постійних поселень."
  plc_cossack_treaty_of_hadiach: "Гадяцький договір"
  plc_cossack_treaty_of_hadiach_desc: "Згідно з Гадяцьким договором, козаки отримують нові права та повноваження. Найважливішою поступкою стало входження країни до складу Речі Посполитої під назвою «Великого Князівства Руського» як третього рівноправного члена двосторонньої унії Польщі та Литви."
  cossack_identity: "Козацька ідентичність"
  cossack_identity_desc: "Козаки пишаються своєю унікальною ідентичністю, власними традиціями та звичаями. І вони навряд чи відмовляться від них під чужим впливом, воліючи зберегти свій спосіб життя."
  reduced_trade_regulations: "Послаблення контролю над торгівлею"
  reduced_trade_regulations_desc: "Наступати на горло іноземній торгівлі — нерозумна затія. Ми повинні зробити так, щоб потенційні торгові партнери почувалися як удома. Тоді приплив товарів на наші ринки буде безперервним."
  increased_trade_regulations: "Посилення контролю над торгівлею"
  increased_trade_regulations_desc: "Чужоземні #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! не повинні захопити наші ринки! Підвищивши контроль над торгівлею, ми припинимо вплив закордонних торговців і забезпечимо конкурентну перевагу нашим купцям."
  land_of_commerce: "Земля торгівлі"
  land_of_commerce_desc: "Ми пишаємося тим, що #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! можуть розраховувати на заступництво з боку країни. Вони мають право на судовий захист і вільне переміщення, а також можливість розпоряджатися своїми товарами так, як вони вважатимуть за потрібне."
  treasury_rights: "Право нагляду за скарбницею"
  treasury_rights_desc: "Отримавши право наглядати за нашою скарбницею, багаті та могутні члени суспільства зможуть ефективніше відстоювати свої інтереси та стануть лояльнішими до влади. Натомість нам доведеться пожертвувати частиною податкових надходжень."
  urban_development_grants: "Допомога на розвиток міст"
  urban_development_grants_desc: "Очевидно, що майбутнє — за містами. Щоб наблизити настання доби урбанізації, міщани отримають від нас кошти на реалізацію планів, що сприяють розвитку наших міст."
  sponsor_maritime_contracts: "Субсидовані морські контракти"
  sponsor_maritime_contracts_desc: "Морська торгівля — важливе джерело доходів нашої скарбниці. Уклавши ексклюзивні контракти з #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщанами#!#!, ми зможемо регулювати комерцію, отримуючи при цьому стабільний дохід від морських перевезень і торгівлі."
  control_over_the_coinage: "Контроль над карбуванням монет"
  control_over_the_coinage_desc: "Карбування та випуск в обіг нових монет належної якості — складний, але дуже важливий процес для розвитку суверенної країни. Взявши під контроль карбування, ми зміцнимо не тільки економічні основи, а й свою владу."
  shipwright_contracts: "Суднобудівні контракти"
  shipwright_contracts_desc: "Отримавши вигідні контракти з державною підтримкою, багаті члени суспільства допоможуть нам ефективніше контролювати суднобудування та скоротити зайве адміністративне регулювання."
  allow_trade_center_sponsorship: "Спонсорування центрів торгівлі"
  allow_trade_center_sponsorship_desc: "Підтримавши центри торгівлі по всій країні, ми забезпечимо #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщанам#!#! та всім людям, чиє ремесло пов'язане з грошима, достатні можливості для обміну товарами, а також підтримаємо здоровий потік торгівлі."
  market_fairs: "Ринкові ярмарки"
  market_fairs_desc: "Фінансування та розвиток купецьких центрів привабить торговельні потоки, дозволяючи нам накопичити величезні багатства та отримати доступ до широкого вибору екзотичних товарів. До того ж ці центри славляться своєю безпекою."
  nobility_council: "Рада еліт"
  nobility_council_desc: "Коли представники вищих станів настільки впливові, що можуть зміцнювати або знищувати цілі династії, вельми розумно віддати їм на відкуп деякі ключові позиції в управлінні."
  manorial_courts: "Маноріальні суди"
  manorial_courts_desc: "Можливість вершити правосуддя, не бувши правителями, — один із найважливіших привілеїв #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!. Наслідуючи сюзерена, васали судять суперечки, стягують податки та вводять закони, накопичуючи величезні багатства та користуючись чималою владою у своїх володіннях — на добро чи на зло."
  increased_civic_engagement: "Підтримка громадянської активності"
  increased_civic_engagement_desc: "Підтримка громадянської активності в питаннях, пов'язаних із країною та суспільством, — хороший спосіб оздоровити країну. Чим більше громадяни залучені в політику, тим старанніше вони працюватимуть на благо країни."
  inherited_offices: "Спадкові посади"
  inherited_offices_desc: "У більшості країн із ладом, подібним до нашого, керівні посади зазвичай обіймають обрані кандидати, проте ми дійшли висновку, що представники вищого стану стануть до нас лояльнішими, якщо дозволити їм передавати посади у спадок."
  recognized_communes: "Визнання комун"
  recognized_communes_desc: "Багато наших поселень — як міста, так і села — під владою землевласницьких еліт набули суттєвої автономії. Визнавши їх повноцінними суб'єктами права, ми втратимо частину контролю над їхніми внутрішніми справами, але #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#!, безсумнівно, оцінять наш жест."
  maintain_clerical_proceedings: "Збереження впливу релігії"
  maintain_clerical_proceedings_desc: "Попри те, що ми дотримуємося республіканських ідеалів, #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! збережуть свої традиційні привілеї, а також владу над питаннями віри, моралі та церковного права."
  state_official_oaths: "Клятви чиновників"
  state_official_oaths_desc: "Перш ніж вступити на посаду, всі урядовці повинні висловити прихильність єдино істинній вірі, щоб #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! дали їм своє благословення."
  mandatory_clerical_donations: "Обов'язкові пожертви храмам"
  mandatory_clerical_donations_desc: "Наші піддані повинні виплачувати десятину релігійним інститутам. Такі пожертви — священний обов'язок, що підкреслює благочестя та силу нашої віри."
  toll_and_tariff_exemptions: "Звільнення від сплати мит"
  toll_and_tariff_exemptions_desc: "Звільнивши торгові судна від сплати мит за перевезення товарів, ми напевно доб'ємося того, що #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! стануть набагато лояльнішими до нашої влади."
  dedicated_merchant_courts: "Особливі торгові суди"
  dedicated_merchant_courts_desc: "Особливі суди, де #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! можуть вирішувати суперечки, — одна з найсильніших гілок нашого уряду. Вони мають величезний вплив на комерційні та торгові справи."
  noble_patronage: "Заступництво еліт"
  noble_patronage_desc: "Наша торгова присутність у жодному разі не повинна слабшати. Щоб #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! могли безперешкодно вести торгівлю, #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! повинні надавати їм заступництво та забезпечувати їх засобами для доставки товарів."
  appoint_ecclesiastical_offices: "Призначення на релігійні посади"
  appoint_ecclesiastical_offices_desc: "Поняття знатності та божественності тісно переплетені в нашому побожному суспільстві. Корона зберігає за собою право призначати високопоставлених служителів церкви, забезпечуючи їхню відданість країні, і водночас дозволяє їм зміцнювати власний вплив."
  control_of_the_borderlands: "Контроль над прикордонням"
  control_of_the_borderlands_desc: "Захист вірян далеко від столиці — нелегке завдання. Доручивши його місцевим #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!, ми убезпечимо свій народ від єретиків та язичників."
  sponsor_printing_of_religious_texts: "Підтримка друку релігійних текстів"
  sponsor_printing_of_religious_texts_desc: "Друк священних книг не лише сприяє поширенню грамотності, а й допомагає закріпити догмати нашої віри в серцях людей. Широке розповсюдження релігійної літератури зробить підданих більш освіченими та нагадає їм про їхні священні обов'язки."
  printing_of_religious_texts: "Друк релігійних текстів"
  printing_of_religious_texts_desc: "Винахід друку, поширення та вільний продаж релігійних текстів — усе це важливі явища, які допоможуть навчити наш народ грамоті та прищепити йому благочестя!\n\nВідкриває доступ до #TOOLTIP:ESTATE_PRIVILEGE,sponsor_printing_of_religious_texts,X #L підтримки друку релігійних текстів#!#!."
  liturgical_mural_art: "Фрески"
  liturgical_mural_art_desc: "Стіни нашого палацу будуть прикрашені вражаючими релігійними сценами. Найталановитіші художники країни створили ці твори, щоб продемонструвати красу віри та висловити нашу любов до божественного."
  golden_liberty: "Золота вольність"
  golden_liberty_desc: "Золота вольність (відома польською як #italic złota wolność#!) уособлює величезний вплив та привілеї, якими зараз володіють наші #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#!, — включно з можливістю обирати правителя та визначати політику країни. Також передбачається, що всі #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! незалежно від рангу, багатства та етнічної приналежності рівні між собою."
  nieszawa_privileges: "Нешавські статути"
  nieszawa_privileges_desc: "Це набір законів, за яким #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! отримують суттєві привілеї. Ухвалення законів, комплектування військ, запровадження нових податків — усе це стає можливим лише за схвалення знаті. Статути також накладають обмеження на можливості найбагатших родин на користь ширших верств аристократії."
  pacta_conventa: "Pacta conventa"
  pacta_conventa_desc: "Ці статути, спочатку задумані як угоди між знаттю та країною, регламентують обов'язки центральної влади в таких галузях, як зовнішня політика, військове керівництво, податки та багато інших."
  polish_merchant_seal: "[GetCountry('POL').GetAdjectiveWithNoTooltip]а торгова печатка"
  polish_merchant_seal_desc: "Це печатка з гербом нашої центральної влади. З таким документом #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! отримують право вільно переміщатися без жодних перешкод, що дозволить купцям швидше розвозити товари між містами. Натомість вони сплачують невеликий додатковий податок."
  privateer_contracts: "Каперські патенти"
  privateer_contracts_desc: "Щоб розширити наш військово-морський потенціал, не вкладаючись у дороге будівництво флоту, ми регламентуємо та візьмемо під контроль акти піратства, що йдуть на користь країні. Капери діятимуть з офіційного дозволу влади, віддаючи частку здобичі в обмін на заступництво корони. Втім, грань між каперством і піратством досить тонка: доведеться дотримуватися обережності, щоб не нашкодити міжнародній репутації країни…"
  noble_armies: "Війська знаті"
  noble_armies_desc: "Якщо дозволити #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#! утримувати особисті війська, вони активніше братимуть участь у зборі спільного війська, але водночас отримають більше впливу."
  chancellor_nobles: "Канцлери зі знаті"
  chancellor_nobles_desc: "Канцлер — це одна з посад, яку в нашій адміністрації обіймають #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! (особливо представники побічних гілок). Їхнє завдання — оформляти рішення країни у вигляді документів, тому вони становлять основу всієї нашої структури управління."
  ayuntamientos: "Аюнтам'єнто"
  ayuntamientos_desc: "Це одна з найпомітніших і фундаментальних особливостей нашої країни: #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! мають право створювати міські ради з чітко регламентованими законодавчими та виконавчими функціями."
  right_to_inherit: "Право успадкування"
  right_to_inherit_desc: "У #TOOLTIP:CULTUREGROUP,german_group,X #L німецької#!#! аристократії є давня традиція розділяти землі батька між усіма його синами. Це дозволяє підтримувати мир між братами та уникати зайвих війн."
  fund_karimi: "Спонсорування купців-карімі"
  fund_karimi_desc: "Впливові #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#!, відомі як карімі, торгують #TOOLTIP:GOODS,spices,X #L прянощами#!#! та іншими цінними товарами. Підтримка та фінансування їхньої діяльності дуже важливі для добробуту країни."
  waqf_payments: "Призначення вакфів"
  waqf_payments_desc: "Щоб показати наше благочестя та правовірність, ми будемо жертвувати #italic вакфи#! на будівництво медресе, лікарень та мечетей, допомогу незаможним та іншу благодійну діяльність."
  allow_hunting: "Дозволи на полювання"
  allow_hunting_desc: "#TOOLTIP:ESTATE_TYPE,peasants_estate,X #L Селяни#!#! отримають право полювати та добувати дичину в юридичних та фізичних межах володінь свого пана або поселення."
  no_labor_sunday: "Вихідний у неділю"
  no_labor_sunday_desc: "З нашого боку буде розумно наслідувати вчення #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! церкви та закріпити неділю як вихідний день для селян. Так ми продемонструємо не лише наше благочестя, а й співчуття."
  communal_lands: "Общинні землі"
  communal_lands_desc: "Незважаючи на те, що #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! за визначенням перебувають у підпорядкованому становищі, ми все ж повинні однозначно затвердити, що всі представники нижчих верств мають право заводити общинні стада та вирощувати врожай на спільних полях."
  partial_yield: "Право на частину врожаю"
  partial_yield_desc: "Землі еліти та багатіїв часто обробляються силами селян, рабів або кріпаків. Тому ми можемо зробити так, щоб #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! щороку отримували хоча б частину врожаю з тієї землі, яку обробляють."
  access_to_royal_and_ecclesiastical_courts: "Доступ до монарших і церковних судів"
  access_to_royal_and_ecclesiastical_courts_desc: "Юридичне представлення інтересів знедолених необхідне, щоб суспільство розвивалося справедливо та розумно. Тому державні та релігійні суди повинні якомога сумлінніше розглядати справи, в яких один проти одного виступають #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! та еліти."
  peasants_in_administration: "Селяни у владі"
  peasants_in_administration_desc: "Найбільш ініціативні та талановиті #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! повинні мати право брати участь в управлінні країною. Довіривши їм деякі важливі посади, ми підвищимо ефективність уряду у віддалених краях нашої країни."
  ius_teutonicum: "Ius Teutonicum"
  ius_teutonicum_desc: "З часів східних марок Каролінзької імперії #TOOLTIP:CULTUREGROUP,german_group,X #L германські#!#!! народи постійно розселялися на схід, займаючи все більше земель. Німецькою цей процес називається #italic Ostsiedlung#! і часто заохочується місцевою владою, яка розраховує відправити більше людей на свої малонаселені території. Ці поселенці є суб'єктами особливого права, #italic $ius_teutonicum$#!, яке дає їм деякі привілеї, наприклад звільнення від податків або право створювати самоврядні міста."
  kormlenije: "Кормління"
  kormlenije_desc: "Кормління — це система, яка покликана задовольняти матеріальні та фінансові потреби руської #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократії#!#!, одночасно сковуючи її узами грошової залежності. Своєю чергою, ця залежність відіграє ключову роль у підтримці лояльності аристократів."
  haudenosaunee_labor_division: "Розподіл праці у гауденосауні"
  haudenosaunee_labor_division_desc: "Наші люди знають, що від них вимагається, і між членами племені заняття розподіляються так, щоб кожен працював заради спільного блага. Ті, кому дісталося одне й те саме завдання, виконують його разом. Жінки та чоловіки допомагають одне одному, роблячи кожен свою роботу. Таким чином виникає природний розподіл праці."
  manifesto_of_freedom: "Маніфест про вільності"
  manifesto_of_freedom_desc: "За підсумками періоду політичної нестабільності представники вищого стану отримали великі громадянські свободи в обмін на гарантії лояльності.\n\nЦей маніфест діятиме протягом усього нинішнього правління, і відкликати його може бути вельми непросто."
  inaugural_diplomas: "Інавгураційні дипломи"
  inaugural_diplomas_desc: "Прагнучи налагодити міцні зв'язки, представники #TOOLTIP:ESTATE_TYPE,crown_estate,X #L вищих станів#!#! отримали набір пільг за угодами, які мають назву «$inaugural_diplomas$». Серед цих посібників — зниження зобов'язань щодо ополчення та право платити урізані податки."
  district_paving_privilege: "Порайонний податок"
  district_paving_privilege_desc: "Утримання доріг між безліччю різних частин #TOOLTIP:LOCATION,prague,X #L Праги#!#! є каменем спотикання для міських еліт. Отримавши право стягувати податок з мощення нових доріг, вони допоможуть нам з'єднати одне з одним ще більше районів."
  joint_assembly_decrees: "Укази загальних зборів"
  joint_assembly_decrees_desc: "Еліти нашої країни отримають низку прав, які дозволять їм зміцнювати єдність між ними та їхніми побратимами, якими повниться #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!."
  commons_petition: "Петиція громад"
  commons_petition_desc: "Це список скарг, який складений учасниками повстання, що отримало назву «Паломництво благодаті»."
  austere_monastic_life: "Суворе чернече життя"
  austere_monastic_life_desc: "Життя в наших чернечих орденах нарешті повертається до ідеалів суворості та усамітнення. Накопичення багатств забороняється, і цілями монастирів знову стають споглядання та молитва.\n\nМи зможемо заснувати нові монастирі."
  warrior_tribunal: "Воїнський трибунал"
  warrior_tribunal_desc: "Це правова система, яка діє в нашій країні та визначає юридичні повноваження виносити рішення щодо деяких видів злочинів."
  ceremonial_tax_exemptions: "Звільнення від податків за підтримку церемоній"
  ceremonial_tax_exemptions_desc: "Участь у приготуваннях до дарів, жертвоприношень та святкувань — величезна честь для наших #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#!. В обмін на виконання цієї відповідальної ролі вони звільняються від сплати рядових податків."
  mita_system: "Міта"
  mita_system_desc: "З виникненням системи #italic міта#! всі чоловіки віком від 15 до 50 років зобов’язані протягом року безкоштовно працювати на благо країни. При цьому трудова повинність влаштована так, щоб не заважати людям забезпечувати свої сім’ї."
  kulm_law: "Кульмське право"
  kulm_law_desc: "Кульмське право, дещо змінена версія Магдебурзького права, — це привілей, який був дарований усім #TOOLTIP:AREA,prussia_area,X #L прусським#!#! містам, що захищають інтереси міських купецьких гільдій. Кульмське право дає їм чималу свободу у відносинах із сюзеренами."
  invite_german_settlers: "Запрошення [ShowCultureGroupNameWithNoTooltip('german_group')|l]их поселенців"
  invite_german_settlers_desc: "Переселенці зроблять нашу країну сильнішою, забезпечивши приріст населення та змінивши на нашу користь баланс сил у регіоні."
  invite_german_settlers.tt: "Хвилі німецьких переселенців почнуть регулярно прибувати до нашої країни"
  autonomous_local_commanders: "Самостійні місцеві командири"
  autonomous_local_commanders_desc: "Місцеві командири, які збирають війська для аванпостів нашого ордену, вже давно просять нас розширити їхню самостійність задля ефективного самоврядування та підвищення відданості нашій справі."
  apostolic_tax_privilege: "Апостольський податок"
  apostolic_tax_privilege_desc: "Наша вірність вищому ієрарху #L [ShowReligionAdjective('catholic')|l]ої#! віри повинна проявлятися не тільки на словах, а й на ділі. Взявши на себе зобов’язання, за яким [GetCountry('PAP').GetGovernment.GetRulerTitle|l] завжди користуватиметься нашою повною підтримкою, ми однозначно доб’ємося його прихильності."
  golden_bull_of_1222: "Золота булла 1222 року"
  golden_bull_of_1222_desc: "Цей основоположний для Угорщини документ закріплює права та привілеї угорських еліт. Згідно з цим договором #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! звільняються від прямого оподаткування, що гарантує недоторканність їхніх доходів з боку державної скарбниці. Ба більше, цей привілей обмежує їхні зобов’язання щодо надання військовозобов’язаних, захищаючи їхні свободи та водночас посилюючи їхній вплив у королівстві."
  monetary_fiefs: "Грошові феоди"
  monetary_fiefs_desc: "Більша частина землі в нашій країні належить короні. Замість того щоб передавати її у спадкове володіння #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!, уряд призначає тимчасових губернаторів. Вони керують територіями та отримують доходи лише до тих пір, поки залишаються на посаді: після їхньої смерті або звільнення земля повертається короні. Це перешкоджає виникненню могутньої родової аристократії та зміцнює вірність чиновників."
  ghazi_privilege: "Владики-газі"
  ghazi_privilege_desc: "Ці воїни б’ються на наших далеких рубежах в ім’я здобичі, слави та віри. Загони релігійних фанатиків і розбійників із кочових племен охороняють наші кордони, постійно здійснюючи набіги, захоплюючи чужі землі, розширюючи наш вплив і сіючи страх."
  autonomous_kadiluks: "Автономні кадиліки"
  autonomous_kadiluks_desc: "Слід розширити повноваження #italic каді#! в межах призначених їм #italic кадиліків#!. Це дозволить їм ефективніше застосовувати свої знання на благо країни."
  ayans_privilege: "Аристократи-аяни"
  ayans_privilege_desc: "Ніхто не знає розстановку сил у віддалених провінціях краще, ніж аристократи, що там проживають. Отримавши статус аянів, вони самостійно керують землями, і країна нечасто втручається в їхні справи."
  bra_kreditwerk: "Кредитверк"
  bra_kreditwerk_desc: "Істотною частиною наших коштів керує #italic Кредитверк#!, що підриває наші фінансові можливості."
  bra_kreditwerk_reformed: "Реформований Кредитверк"
  bra_kreditwerk_reformed_desc: "#italic Кредитверк#!, реформований і поставлений під прямий контроль #TOOLTIP:ESTATE_TYPE,crown_estate,X #L корони#!#!, дозволить ефективніше фінансувати наші задуми."
  share_of_the_spoils: "Частка здобичі"
  share_of_the_spoils_desc: "Смак перемоги стає ще солодшим, коли вся військова здобич іде в засіки нашого великого клану. Однак, ділячись частиною трофеїв, ми доб'ємося прихильності інших могутніх кланів, і в майбутньому це принесе нам чималу користь."
  tribal_host: "Племінне військо"
  tribal_host_desc: "Розведення найсильніших коней стане запорукою могутності нашого війська. Якщо цим займуться представники #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократії#!#!, ми ніколи не зіткнемося з нестачею скакунів для наших славних воїнів."
  tribal_autonomy: "Племінне самоврядування"
  tribal_autonomy_desc: "Наші праотці, як і їхні предки, завжди цінували вільне життя за межами поселень, оточених стінами. Нам варто наслідувати їхній приклад, відійшовши подалі від чужинців, які хочуть збити нас з істинного шляху."
  libro_d_oro: "Золота книга"
  libro_d_oro_desc: "Щоб отримати право обиратися до Великої ради #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_GEN')|L]#!#!, кандидат повинен відповідати цілому ряду вимог. У #italic Золотій книзі#! наведено список сімей, які відповідають цим вимогам і можуть вважатися справжньою #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократією#!#! [GetCountry('VEN').Custom('CL_GEN')]. Внести зміни до цієї книги може лише той, хто має величезний вплив і готовий витратити безліч золота."
  libro_d_argento: "Срібна книга"
  libro_d_argento_desc: "У той час як #italic Золота книга#! перелічує всі шляхетні родини [GetCountry('VEN').Custom('longname_ru_GEN')], #italic Срібна книга#! містить прізвища всіх уроджених (італійською #italic originarii#!) родин, що ведуть своє походження від початкових мешканців лагуни. Вони мають право торгувати як [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]і громадяни та займати управлінські посади, які їм надає [GetCountry('VEN').GetGovernment.GetGovernmentType.GetName|l]."
  zontas: "Зонта"
  zontas_desc: "Чинні радники, що керують #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_INST')|L]#!#!, обрали людей шляхетного походження. Ці #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! формують так звані #italic зонти#! і наділені деякими привілеями, а також зобов'язані захищати [GetCountry('VEN').Custom('rank_ru_ACC')] від зосередження влади в руках однієї особи."
  avogadoria_de_comun: "Авогадори"
  avogadoria_de_comun_desc: "Управління країною зосереджено в руках об'єднання аристократів і заможних родин, що займають ключові пости в #L [GetCountry('VEN').GetAdjective|l]ому#! уряді. Заради захисту інтересів країни і, отже, інтересів цих родин Рада створила інститут #italic авогадорів#! — це #italic державні прокурори#!, які стежать за діяльністю вищих посадових осіб, розслідують звинувачення в корупції та карають за порушення закону.\nНавіть самі дожі не можуть ухилитися від їхнього пильного ока."
  scottish_clans: "Шотландські клани"
  scottish_clans_desc: "Народ #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#!, особливо на сільській півночі, історично розділений на безліч кланів, які пов'язані узами спорідненості та близькістю проживання, а також підкоряються єдиному вождю. Кланові збори та міжкланові відносини — одна з рушійних сил #L [GetCountry('SCO').GetAdjective|l]ої#! політики."
  autonomous_scottish_clans: "Незалежні шотландські клани"
  autonomous_scottish_clans_desc: "$scottish_clans_desc$"
  tribes_scotland_gaelic_heritage: "Спільна шотландська спадщина"
  tribes_scotland_gaelic_heritage_desc: "Протягом сотень років гірські клани зберігали свої #TOOLTIP:LANGUAGE,gaelic_language,X #L гельські#!#! звичаї та традиції, тоді як клани низин поступово формували власну #L [ShowCultureName('scottish')|l]у#! культуру. Проте всі вони готові забути про відмінності, щоб разом дати відсіч ворогам, що зазіхають на #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_ACC')|L]#!#!."
  autonomous_tribes_scotland_gaelic_heritage: "Спільна гельська спадщина незалежних кланів"
  autonomous_tribes_scotland_gaelic_heritage_desc: "$tribes_scotland_gaelic_heritage_desc$"
  sco_statutes_of_iona: "Статут Айоні"
  sco_statutes_of_iona_desc: "Згідно з цим статутом, гірські клани повинні відправляти своїх спадкоємців для навчання в низинну частину країни. Завдяки цьому майбутні #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! стануть більш грамотними та освіченими, проте така практика може призвести до руйнування багатовікової гельської культури."
  salt_tax_exemption: "Податкові пільги на сіль"
  salt_tax_exemption_desc: "Нестача солі та її висока ціна завдають селянським господарствам чимало труднощів. Тому #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#! будуть звільнені від будь-якого податку, яким зазвичай обкладається #TOOLTIP:GOODS,salt,X #L сіль#!#!, щоб швидше подолати кризу та припинити заворушення."
  charter_of_the_nobility: "Жалувана грамота дворянству"
  charter_of_the_nobility_desc: "Грамота, складена після повстання Омеляна Пугачова. Вона розширює привілеї #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#! та підкреслює їхню роль у збереженні порядку."
  villes_franches: "Вільфранші"
  villes_franches_desc: "Деякі з наших торгових міст значно зросли за останні кілька десятиліть і, як наслідок, домоглися певного рівня автономії. Тепер вони являють собою щось схоже на вільні міста і явно схиляються на користь менш централізованого підходу в управлінні."
  residence_in_versailles: "Резиденція у Версалі"
  residence_in_versailles_desc: "[GetCountry('FRA').GetGovernment.GetAdjective|l]а родина пропонує представникам найвидатніших дворянських династій переселитися до Версальського палацу."
  permanent_residence_in_versailles: "Постійна резиденція у Версалі"
  permanent_residence_in_versailles_desc: "Після реконструкції Версаля [GetCountry('FRA').GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] змогли жити в палаці на постійній основі разом з [GetCountry('FRA').GetGovernment.GetAdjective|l]ою родиною. Тих, хто не входить до [GetCountry('FRA').GetGovernment.GetAdjective|l]ої династії, безумовно, захоплює місцева розкіш, проте їхній політичний вплив суттєво ослаб, адже [GetCountry('FRA').GetGovernment.GetRulerTitle|l] тепер може в будь-який момент втратити до них прихильність. Крім того, покинувши свої маєтки та потрапивши в пряму залежність від Версаля, дворяни залишили собі менше простору для змов та інтриг."
  great_offices_of_the_crown_of_france: "Вищі коронні чини [GetCountry('FRA').Custom('predlog_vvo')] [GetCountry('FRA').Custom('CL_PREP')]"
  great_offices_of_the_crown_of_france_desc: "Це найважливіші пости в центральній адміністрації, доступні лише #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#! нашої країни."
  fra_marcel_great_ordinance: "Великий ордонанс"
  fra_marcel_great_ordinance_desc: "Внаслідок зусиль Етьєна Марселя [GetCountry('FRA').GetName] нині існу[GetCountry('FRA').Custom('end_etyut')] за статтями Великого ордонансу. В обмін на розширення власного впливу Генеральні штати надали країні право збирати більше податків."
  fra_leadership_of_marcel: "Під керівництвом Етьєна Марселя"
  fra_leadership_of_marcel_desc: "Внаслідок зусиль Етьєна Марселя #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! стали серйозною силою в Генеральних штатах."
  fra_marcel_compromise_ordinance: "Компромісний Великий ордонанс"
  fra_marcel_compromise_ordinance_desc: "Між короною та Етьєном Марселем було досягнуто угоди, відповідно до якої #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#! дають Марселю більше влади, а натомість Генеральні штати дозволяють короні збирати більше податків."
  fra_papacy_pragmatic_sanctions: "Бурзька Прагматична санкція"
  fra_papacy_pragmatic_sanctions_desc: "Відповідно до неї #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! церква #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! отримує ширшу незалежність від папства. Зокрема, функція виборного призначення на церковні посади переходить до церковної ради. [ShowEstateTypeName('clergy_estate')] задоволені, проте ці зміни призведуть до зниження впливу на Святий Престол та погіршать наші відносини з папами."
  vij_tamil_trading_rights: "Торгові права тамілів"
  vij_tamil_trading_rights_desc: "[ShowAreaName('tamil_land_area')] — це земля з безліччю торгових міст, де живуть люди, що розмовляють #TOOLTIP:CULTURE,$tamil_tt$,X #L тамільською#!#! мовою. Давши їм привілеї самоврядування та вільної торгівлі, ми отримаємо їхню лояльність та збільшимо доходи країни."
  jain_banking_rights: "[ShowReligionAdjectiveWithNoTooltip('jain')]е право на лихварство"
  jain_banking_rights_desc: "#TOOLTIP:RELIGION,$jain_tt$,X #L Джайнізм#!#! вже не є домінуючою релігією в Індії ані за кількістю вірян, ані за впливом на політику, але самі прихильники цієї віри все ще залишаються досить помітною частиною суспільства. Вони зробили своїм ремеслом лихварство та бюрократію, ставши цінним ресурсом для будь-якої країни, готової надати їм заступництво."
  jain_scholars: "[ShowReligionAdjectiveWithNoTooltip('jain')]і вчені"
  jain_scholars_desc: "Хоча #TOOLTIP:RELIGION,$jain_tt$,X #L джайнізм#!#! втратив свою колишню значущість, він все ще залишається релігією вельми активної меншості. Її сповідують мудрі та освічені вчені, які можуть надати нашій країні чималі послуги, якщо ми дамо цим людям таку можливість."
  dhimmi_abrahamic_communities: "Авраамічні громади"
  dhimmi_abrahamic_communities_desc: "У #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! країнах прихильники #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! та #TOOLTIP:RELIGIONGROUP,israelite_group,X #L юдейської#!#! віри вважаються так званими #italic зіммі#!. Традиційно передбачається, що правитель повинен захищати цих людей і при цьому тримати їх окремо від #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! більшості. Спільноти #italic зіммі#! можуть зберігати вірність країні, не загрожуючи при цьому #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламським#!#! традиціям."
  dhimmi_in_administration: "Зіммі-бюрократи"
  dhimmi_in_administration_desc: "Деякі з наших найкращих чиновників не розділяють нашу віру, але при цьому є зразковими громадянами, всім серцем відданими країні. Не допускати до влади тих, хто щиро хоче нам служити, — велика помилка, і ми повинні негайно її виправити."
  dharmic_dhimmi_communities: "Дхармічні громади зіммі"
  dharmic_dhimmi_communities_desc: "Спочатку саме поняття #italic «зіммі»#! в #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! країнах позначало прихильників #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! та #TOOLTIP:RELIGIONGROUP,israelite_group,X #L юдейської#!#! віри, однак у цьому випадку йдеться про послідовників #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстської#!#! та інших #TOOLTIP:RELIGIONGROUP,dharmic,X #L дхармічних#!#! релігій. Традиційно вважається, що правитель повинен захищати цих людей, проте це може бути непросто, враховуючи, що в нашій країні вони становлять більшість населення. Завдяки підтримці істинної віри спільноти #italic зіммі#! можуть зберігати вірність країні, не загрожуючи при цьому #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламським#!#! традиціям."
  clergy_in_administration: "Священники-чиновники"
  clergy_in_administration_desc: "У служителів віри вже є багато навичок, які потрібні чиновникам. Вони добре освічені, чудово володіють письмом, і в них є вища мета. Співпраця з ними забезпечить нам приплив ефективних і вмілих управлінців."
  rajput_society: "Громада раджпутів"
  rajput_society_desc: "Раджпути — це давня каста благородних воїнів і гордих #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!. Серце їхніх володінь — сувора #TOOLTIP:AREA,rajputana_area,X #L Раджпутана#!#!, але вони зустрічаються по всій Північній Індії, і багато великих раджів претендують на раджпутське походження.\n\n#italic Значення модифікатора збільшується пропорційно долі представників #TOOLTIP:CULTURE,$mewari_tt$,X #L меварської#!#!, #TOOLTIP:CULTURE,$harauti_tt$,X #L хараутської#!#!, #TOOLTIP:CULTURE,$dhundhari_tt$,X #L дхундхарської#!#!, #TOOLTIP:CULTURE,$shekhawati_tt$,X #L шекхаватської#!#! та #TOOLTIP:CULTURE,$mewati_tt$,X #L меватської#!#! народностей, до якої додається 100%.#!"
  zamindar_tax_privilege: "Податкові привілеї для заміндарів"
  zamindar_tax_privilege_desc: "$mug_zamindar_system_desc$ Під час війни заміндари мають право збирати з населення податки на утримання війська. Цей привілей сильно збільшить наші доходи, але дасть більше влади #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!."
  corruption_desc: "у нашій країні давно запустили свої лапи в казну та справи двору, забезпечуючи себе необтяжливими посадами та розкладаючи суспільство своєю продажностю."
  consolidated_corruption_of_the_burghers: "Загальне розкладання багатіїв"
  consolidated_corruption_of_the_burghers_desc: "Укорінені середній та вищий класи $corruption_desc$"
  consolidated_corruption_of_the_peasants: "Загальне розкладання селян"
  consolidated_corruption_of_the_peasants_desc: "Наші піддані зовсім перестали поважати владу. Дуже часто, коли їх змушують платити податки, вони погрожують взятися за зброю…"
  consolidated_corruption_of_the_nobles: "Загальне розкладання еліт"
  consolidated_corruption_of_the_nobles_desc: "Укорінені представники вищого суспільства $corruption_desc$"
  consolidated_corruption_of_the_clergy: "Загальне розкладання вірян"
  consolidated_corruption_of_the_clergy_desc: "Правда в тому, що релігійні лідери здатні впливати на внутрішню політику лише на тій підставі, що отримали несправедливі переваги, погрожуючи нам відлученням від церкви."
  noble_sponsored_navy: "Флот аристократів"
  noble_sponsored_navy_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократи#!#! утримують наші військово-морські сили та командують ескадрами. Завдяки їхній фінансовій підтримці ми можемо створити потужний флот, однак натомість вони отримають більше впливу на морську політику країни."
  magdeburg_rights: "Магдебурзьке право"
  magdeburg_rights_desc: "Це набір привілеїв, спочатку складений на основі фламандського права та поширений по Центральній #TOOLTIP:CONTINENT,europe,X #L Європі#!#! з потоками #TOOLTIP:CULTUREGROUP,german_group,X #L німецьких#!#! переселенців. Цей звід законів, зосереджений навколо свобод окремо взятого громадянина, гарантує та регламентує самоврядування влади на місцях."
  novi_fori: "Сродське право"
  novi_fori_desc: "Ця юридична норма вийшла з набору привілеїв, колись дарованих #TOOLTIP:LOCATION,magdeburg,X #L Магдебургу#!#!. У міру поширення цього права за межі корінних #TOOLTIP:CULTUREGROUP,german_group,X #L германських#!#! земель до нього увійшли західні уявлення про містобудування, а також деякі кримінальні та цивільні закони."
  shooting_societies: "Стрілецькі товариства"
  shooting_societies_desc: "Це організовані ополчення #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#! та ремісників, метою яких є військова підготовка та захист рідного міста від зовнішніх загроз. З дозволу #TOOLTIP:ESTATE_TYPE,crown_estate,X #L корони#!#! цим товариствам даровано право носити особливе обмундирування та символи, які раніше були дозволені лише #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!."
  reduced_responsibilities_for_the_nobles: "Скорочення зобов'язань еліт"
  reduced_responsibilities_for_the_nobles_desc: "Щоб зберегти лояльність вищих верств суспільства, ми вирішили дарувати їм цей привілей, звільнивши від багатьох традиційних зобов'язань."
  reduced_taxation_for_the_nobles: "Скорочення податків еліт"
  reduced_taxation_for_the_nobles_desc: "Вищі верстви суспільства мають значні владу та вплив, їхні примхи та побажання мають реальну вагу. Якщо ми не хочемо, щоб баланс сил змістився на користь шляхетного стану, доведеться дати їм податкові послаблення."
  habshi_advisors_privilege: "Хабші-радники"
  habshi_advisors_privilege_desc: "Ці раби, привезені колись зі #TOOLTIP:SUB_CONTINENT,east_africa,X #L Східної Африки#!#!, активно беруть участь у житті країни. Здобувши освіту у сфері управління або військової справи, вони можуть принести країні велику користь. За вірну службу ми навіть можемо дарувати їм свободу — за умови, що вони приймуть нашу віру."
  bavarian_share_of_land: "[GetCountry('BAV').GetAdjectiveWithNoTooltip]і земельні розділи"
  bavarian_share_of_land_desc: "За законом і принципом справедливості ми розділили наші землі між членами правлячої династії. Це призвело до ще більшої роздробленості та децентралізації. Щоб вважатися гідним суперником серед князів, з володінь яких складається #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!, ми повинні знову повернути прямий контроль та посилити центральну владу."
  mch_tribal_favor: "Прихильність племені"
  mch_tribal_favor_desc: "Чжурчженська знать має пріоритетне право на участь у державних справах, і її представники вдячні нам за відмову переймати іноземні звичаї."
  nihil_novi: "Nihil novi"
  nihil_novi_desc: "Представники еліти домоглися привілею, який обмежує видання законів без їхньої згоди. Крім того, ця ініціатива обмежує свободу пересування кріпаків і звужує права міського населення."
  privilege_of_koszyce: "Кошицький привілей"
  privilege_of_koszyce_desc: "Представники вищих станів отримали обширні права в обмін на дозвіл зійти на трон іноземному спадкоємцю. Тепер вони не можуть бути обтяжені податками без їхньої на те згоди."
  plc_empower_orthodox_nobility: "Зміцнення влади православних аристократів"
  plc_empower_orthodox_nobility_desc: "Завдяки цьому рішенню #TOOLTIP:RELIGION,$orthodox_tt$,X #L православні#!#! дворяни отримають низку привілеїв та гарантій, які раніше надавалися лише іншим представникам еліт суспільства."
  cas_fuero_viejo: "Звід старих законів Кастилії"
  cas_fuero_viejo_desc: "Прагнучи систематизувати привілеї #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#! та гарантувати їм високе становище в нашій країні, ми зібрали воєдино розрізнені правила та закони цього стану."
  cas_caballeros_villanos: "Лицарі-лиходії"
  cas_caballeros_villanos_desc: "Прикордонні землі #TOOLTIP:AREA,castile_area,X #L Кастилії#!#! та #TOOLTIP:AREA,leon_area,X #L Леона#!#! останні кілька століть населяли унікальні лицарі-скотарі. Вони звикли проводити зими, оберігаючи стада у своїх прикордонних цитаделях, а влітку влаштовувати набіги або вести війни проти своїх #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! ворогів."
  cas_regimiento: "Рехім'єнто"
  cas_regimiento_desc: "Рехім'єнто — це система місцевого самоврядування [GetCountry('CAS').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_PREP')|L]#!#!, за якої рішення приймає особлива рада, що складається з членів найбагатших та найвпливовіших сімей."
  royal_factories_privilege: "Королівські фабрики"
  royal_factories_privilege_desc: "Королівські фабрики — це приватні підприємства, які отримують підтримку країни, монарші привілеї та нагляд. Вони мають офіційне розпорядження зміцнювати домашню промисловість зі збереженням комерційної автономії."
  austrian_monastery_reform_melk: "Мелькська монастирська реформа"
  austrian_monastery_reform_melk_desc: "Дотримуючись настанов найкращих радників від церкви, ми реформували монастирі, щоб вони повністю відповідали #L [ShowReligionAdjective('catholic')|l]им#! принципам."
  vienna_concordat_privilege: "Віденський конкордат"
  vienna_concordat_privilege_desc: "[GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle] укладає з нами угоду, покликану врегулювати наші відносини. Однак ми змушені зробити так, щоб #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! отримали більше влади — це задобрить папство."
  hab_tractatus_incorporalibus: "Tractatus de Iuribus Incorporalibus"
  hab_tractatus_incorporalibus_desc: "Регулювання відносин між землевласниками та #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селянами#!#! забезпечить останнім деякий юридичний захист, однак ускладнить розвиток сільського господарства."
  kannada_literature_aid: "Підтримка каннадської літератури"
  kannada_literature_aid_desc: "Якщо багаті представники суспільства отримають права на #TOOLTIP:LANGUAGE,kannada_language,X #L каннадські#!#! тексти, ми врятуємо нашу літературу від занепаду."
  vij_patronization_of_local_gods: "Турбота про шанувальників малих божеств"
  vij_patronization_of_local_gods_desc: "#TOOLTIP:RELIGION,$hindu_tt$,X #L Індуїстським#!#! божествам немає числа. Буде краще, якщо ми дозволимо нашим підданим молитися богам, які їм подобаються."
  vij_allowance_of_religious_practices: "Узаконення релігійних практик"
  vij_allowance_of_religious_practices_desc: "Можливо, нам варто змістити фокус уваги з індуїстів у нашій країні, щоб дозволити й іншим релігійним меншинам публічно практикувати свою віру."
  promotion_of_muslim_scholars: "Сприяння ісламським богословам"
  promotion_of_muslim_scholars_desc: "[ROOT.GetCountry.GetName] вважа[ROOT.GetCountry.Custom('end_etyut')]ся центром #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! освіти. Щоб зміцнити цей статус, треба залучати до наших справ більше вчених, незалежно від того, кому вони вірні."
  ira_iranian_art_patronage: "Покровительство іранським мистецтвам"
  ira_iranian_art_patronage_desc: "Покровительство мистецтвам з боку #TOOLTIP:CULTUREGROUP,iranian_group,X #L іранських#!#! еліт забезпечило появу та розвиток у країні розкішних стилів."
  ira_clerical_aristocracy: "Клерикальна аристократія"
  ira_clerical_aristocracy_desc: "Це союз багатих землевласників та #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священників#!#!, у межах якого наділи передаються в дар духовенству, тому країна не може їх конфіскувати."
  mam_muhtasibs: "Мухтасіби"
  mam_muhtasibs_desc: "#italic Мухтасіб#! забезпечує чесну торгівлю на ринку, перевіряючи #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#!, публічно караючи шахраїв та використовуючи посібники з поширених хитрощів для запобігання обману."
  heritable_iqta: "Спадкова ікта"
  heritable_iqta_desc: "Позиція власника #TOOLTIP:LAW,iqta_law,X #L ікти#!#! зазвичай не передається у спадок. Перетворення її на успадковану стане нечуваною справою та збільшить вірність #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!."
  trunk_road_to_erzurum_privilege: "Колісний шлях до $erzurum$"
  trunk_road_to_erzurum_privilege_desc: "Анатолія з'єднана з Табризом і Персією надійною мережею колісних доріг. Оскільки ми безпосередньо контролюємо важливий вузол цих доріг, наші #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L торговці#!#! отримують велику вигоду."
  lit_integrated_ruthenian_laws: "Інтеграція руських законів"
  lit_integrated_ruthenian_laws_desc: "Інтегруючи в систему закони наших #TOOLTIP:CULTURE,$ruthenian_tt$,X #L руських#!#! народів, ми зможемо ефективніше працювати над створенням єдиного зводу законів у країні."
  lit_equal_status_of_orthodox_nobility: "Захист православних аристократів"
  lit_equal_status_of_orthodox_nobility_desc: "Численні #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#!, що сповідують #TOOLTIP:RELIGION,$orthodox_tt$,X #L православ'я#!#!, заслуговують бути рівними тим, хто не дотримується цієї віри. Якщо гарантувати їм рівність, вони охочіше підтримають нас."
  ukr_kholop_protection: "Захист прав холопів"
  ukr_kholop_protection_desc: "#TOOLTIP:ESTATE_TYPE,peasants_estate,X #L Селянам#!#! в нашій країні даровані та гарантовані базові права для захисту від свавілля багатіїв."
  tur_banned_weaponry_for_peasants: "[GetEstateNameWithNoTooltip('peasants_estate')] не можуть володіти зброєю"
  tur_banned_weaponry_for_peasants_desc: "Нашу країну населяють найрізноманітніші народи, і часом це призводить до конфліктів. Якщо ми залишимо підданим право на носіння зброї, дрібні сварки можуть перерости в справжню війну. З цієї причини #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селянам#!#! більше не можна мати при собі зброю."
  noble_patronage_of_the_arts: "Шляхетне покровительство мистецтв"
  noble_patronage_of_the_arts_desc: "Кілька видатних #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знатних#!#! родин вирішили надати покровительство поетам, художникам і вченим при своїх дворах та на віллах. Хоча дехто може вважати це марнославством, подібне покровительство часто сприяє появі нових філософських шкіл в обмін на зростання придворного впливу."
  guild_investments: "Інвестиції гільдій"
  guild_investments_desc: "Гільдії погодилися виділяти частину своїх коштів на розвиток виробничих процесів. І хоча багато подібних починань зазнають невдачі, якась частина призведе до відкриттів, що докорінно змінять економіку."
  statutes_of_piotrkow: "Пйотрковський статут"
  statutes_of_piotrkow_desc: "Цей статут символізує спроби аристократії зміцнити свої привілеї та утримати кріпаків і владу в країні. Послабивши нижчі класи та міста, #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! сподіваються закріпити власний вплив."
  peasants_estate_chlopstvo: "Холопи"