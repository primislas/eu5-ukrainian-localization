l_russian:
  game_concept_with_icon: "$ICON$ $NAME$"
  game_concept_modifier: "Модифікатор"
  game_concept_modifiers: "Модифікатори"
  game_concept_modifier_desc: "Модифікатори — це числові значення, що впливають на хід гри. Вони можуть, наприклад, додаватися або множитися під час певних розрахунків.\nМодифікатори пов'язані з певними об'єктами. Так, [Concept('country_modifiers', 'модифікатори країни')|e] впливають на цілу [Concept('countries', 'країну')|e], [Concept('location_modifiers', 'модифікатори місцевості')|e] — на окремі [Concept('locations', 'місцевості')|e], [Concept('character_modifiers', 'модифікатори персонажа')|e] — на [Concept('characters', 'персонажів')|e], а [Concept('international_organization_modifiers', 'модифікатори міжнародного об'єднання')|e] — на [Concept('international_organizations', 'міжнародні об’єднання')|e]."
  game_concept_location_modifier: "Модифікатор місцевості"
  game_concept_location_modifiers: "Модифікатори місцевості"
  game_concept_location_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на [Concept('location', 'місцевість')|e]."
  game_concept_province_modifier: "Модифікатор провінції"
  game_concept_province_modifiers: "Модифікатори провінції"
  game_concept_province_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на [Concept('province', 'провінцію')|e]."
  game_concept_country_modifier: "Модифікатор країни"
  game_concept_country_modifiers: "Модифікатори країни"
  game_concept_country_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на всю [Concept('country', 'країну')|e]."
  game_concept_unit_modifier: "Модифікатор загону"
  game_concept_unit_modifiers: "Модифікатори загону"
  game_concept_unit_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на конкретний [Concept('unit', 'загін')|e]."
  game_concept_character_modifier: "Модифікатор персонажа"
  game_concept_character_modifiers: "Модифікатори персонажа"
  game_concept_character_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на [Concept('character', 'персонажа')|e]. Модифікатори, що зачіпають [Concept('country', 'країну')|e], діють лише в тому випадку, якщо персонаж — її [Concept('ruler', 'правитель')|e]."
  game_concept_dynasty_modifier: "Модифікатор династії"
  game_concept_dynasty_modifiers: "Модифікатори династії"
  game_concept_dynasty_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на [Concept('dynasty', 'династію')|e]. Модифікатори, що зачіпають [Concept('character', 'персонажів')|e], діють для всіх живих членів династії, тоді як [Concept('country_modifiers', 'модифікатори країни')|e] застосовуються лише в тому випадку, якщо персонаж — її [Concept('ruler', 'правитель')|e]."
  game_concept_international_organization_modifier: "Модифікатор міжнародного об'єднання"
  game_concept_international_organization_modifiers: "Модифікатори міжнародного об'єднання"
  game_concept_international_organization_modifier_desc: "Це [Concept('modifier', 'модифікатор')|e], що впливає на [Concept('international_organization', 'міжнародне об'єднання')|e]."
  game_concept_effect: "Ефект"
  game_concept_effects: "Ефекти"
  game_concept_effect_desc: "Ефекти динамічно впливають на хід гри. Вони можуть бути простими, як нарахування [Concept('gold', 'золота')|e], або складними, як відкриття доступу до [Concept('government_reform', 'державної реформи')|e]. Як правило, ефекти виникають у результаті завершення [Concept('event', 'подій')|e] або виконання [Concept('missions', 'завдань')|e]."
  game_concept_trigger: "Умова"
  game_concept_triggers: "Умови"
  game_concept_condition: "Умова"
  game_concept_conditions: "Умови"
  game_concept_trigger_desc: "Умова — це вимога для виникнення певного [Concept('effects', 'ефекту')|e], [Concept('events', 'події')|e], [Concept('tasks', 'етапу')|e] та інших елементів гри."
  game_concept_action: "Дія"
  game_concept_actions: "Дії"
  game_concept_action_desc: "Дія виконується при натисканні на кнопку та викликає певний [Concept('effect', 'ефект')|e]. Найчастіше зустрічається у вигляді [Concept('country_interactions', 'взаємодій з країною')|e], [Concept('situation_actions', 'ситуативних дій')|e] або [Concept('unit_abilities', 'здібностей загону')|e]."
  game_concept_country: "Країна"
  game_concept_country_s: "Країни"
  game_concept_countries: "Країни"
  game_concept_nation: "Нація"
  game_concept_nations: "Нації"
  game_concept_country_desc: "Країна — це політичне утворення, здатне брати участь у [Concept('diplomacy', 'дипломатії')|e]. У країни є [Concept('government', 'уряд')|e], [Concept('primary_culture', 'основна культура')|e] та [Concept('primary_religion', 'основна релігія')|e], а також можуть бути військові сили у вигляді [Concept('armies', 'військ')|e] та [Concept('navies', 'флотів')|e].\n\nІснують [Concept('settled', 'осілі')|e], [Concept('extraterritorial', 'екстериторіальні')|e] та [Concept('army_based', 'стратократичні')|e] країни, а також [Concept('society_of_pops', 'народні спільноти')|e].\n\nКожною країною керує або гравець, або комп'ютер."
  game_concept_settled_country: "Осіла країна"
  game_concept_settle: "Осісти"
  game_concept_settled: "Осіла"
  game_concept_location_based: "Сухопутна країна"
  game_concept_settled_country_desc: "Осілою вважається та [Concept('country', 'країна')|e], яка не може існувати без [Concept('own', 'володіння')|e] [Concept('locations', 'місцевостями')|e]."
  game_concept_army_based: "Стратократична країна"
  game_concept_army_based_countries: "Стратократичні країни"
  game_concept_army_based_desc: "Стратократичною вважається та [Concept('country', 'країна')|e], яка може [Concept('own', 'володіти')|e] [Concept('locations', 'місцевостями')|e], але своїм існуванням зобов'язана виключно [Concept('armies', 'військам')|e]. $game_concept_country$ впаде, якщо війська будуть розбиті."
  game_concept_navy_based: "Флотська країна"
  game_concept_navy_based_countries: "Флотські країни"
  game_concept_navy_based_desc: "Флотською вважається [Concept('country', 'країна')|e], яка може [Concept('own', 'володіти')|e] [Concept('locations', 'місцевостями')|e], але своїм існуванням завдячує виключно [Concept('navies', 'флотам')|e]. Країна впаде, якщо флоти будуть розбиті."
  game_concept_extraterritorial_country: "Екстериторіальна країна"
  game_concept_extraterritorial_countries: "Екстериторіальні країни"
  game_concept_extraterritorial: "Екстериторіальна"
  game_concept_building_based: "Екстериторіальна країна"
  game_concept_extraterritorial_country_desc: "Екстериторіальною вважається та [Concept('country', 'країна')|e], яка володіє виключно [Concept('buildings', 'спорудами')|e] без необхідності [Concept('own', 'володіти')|e] цілими [Concept('locations', 'місцевостями')|e]."
  game_concept_society_of_pops: "Народна спільнота"
  game_concept_societies_of_pops: "Народні спільноти"
  game_concept_pop_based: "Народна спільнота"
  game_concept_society_of_pops_desc: "$game_concept_society_of_pops$ — це [Concept('country', 'країна')|e], яка володіє виключно [Concept('pops', 'групами населення')|e] без необхідності [Concept('own', 'володіти')|e] цілими [Concept('locations', 'місцевостями')|e]."
  game_concept_diplomacy: "Дипломатія"
  game_concept_diplomacy_desc: "Дипломатія — це взаємодія між двома [Concept('countries', 'країнами')|e] в межах їхньої [Concept('diplomatic_range', 'дипломатичної відстані')|e]. Вона виконується за допомогою [Concept('diplomats', 'дипломатичних дій')|e].\n\nЗа допомогою дипломатії укладають [Concept('alliances', 'союзи')|e], підписують [Concept('treaties', 'договори')|e], визначають [Concept('subjects', 'ленників')|e] та [Concept('overlords', 'сюзеренів')|e], а також оголошують [Concept('war', 'війну')|e] та [Concept('peace', 'мир')|e].\n\nВисокий [Concept('prestige', 'престиж')|e] країни спрощує дипломатію, а високий ступінь [Concept('antagonism', 'ворожості'|e] — ускладнює."
  game_concept_threat: "Загроза"
  game_concept_threatening: "Загрозливий"
  game_concept_threat_desc: "Показує, наскільки [Concept('country', 'країну')|e] турбує інша країна. Чим могутніший сусід, тим вищий його рівень загрози."
  game_concept_war_enthusiasm: "Бажання воювати"
  game_concept_war_enthusiasm_desc: "Відображає готовність [Concept('country', 'країни')|e] продовжувати [Concept('war', 'війну')|e]."
  game_concept_decaying_modifier: "Згасаючий модифікатор"
  game_concept_decaying_modifier_desc: "Згасаючий [Concept('modifiers', 'модифікатор')|e] не відрізняється від звичайного, однак його ефект зменшується в міру того, як спливає термін його дії. Такий модифікатор створює тимчасові зміни, ефект яких поступово зникає."
  game_concept_overseas: "Заморські землі"
  game_concept_overseas_desc: "Ця [Concept('location', 'місцевість')|e] не має сухопутного зв'язку зі [Concept('capital', 'столицею')|e] своєї [Concept('country', 'країни')|e], оскільки знаходиться на іншому [Concept('continent', 'континенті')|e]."
  game_concept_goods_demand: "Попит на товари"
  game_concept_goods_demands: "Попит на товари"
  game_concept_goods_demand_desc: "Це [Concept('goods', 'товари')|e], необхідні для [Concept('construction', 'будівництва')|e] та впровадження [Concept('production_method', 'методів виробництва')|e], а також для задоволення [Concept('pop_needs', 'потреб населення')|e] та інших потреб, які вимагають наявності товарів."
  game_concept_government_needs: "Потреби уряду"
  game_concept_government_needs_desc: "[Concept('government_needs', 'Потреби уряду')] — це [Concept('goods', 'товари')|e], необхідні [Concept('country', 'країні')|e] для [Concept('constructions', 'будівництва')|e] [Concept('buildings', 'споруд')|e], підвищення [Concept('location_rank', 'рангу місцевостей')|e], найму [Concept('armies', 'військ')|e] та [Concept('navies', 'флоту')|e] або спорядження [Concept('explorations', 'експедицій')|e].\n\nЯкщо на [Concept('market', 'ринку')|e] [Concept('location', 'місцевості')|e] не виявиться потрібних товарів, будівництво буде призупинено."
  game_concept_production_method: "Метод виробництва"
  game_concept_production_methods: "Методи виробництва"
  game_concept_production_method_desc: "Якщо змінити метод виробництва в [Concept('building', 'споруді')|e], то зміняться необхідні для її роботи [Concept('goods', 'товари')|e] або призначення самої споруди."
  game_concept_ruler: "Правитель"
  game_concept_ruler_s: "Правителя"
  game_concept_rulers: "Правителі"
  game_concept_ruler_desc: "На чолі кожної [Concept('country', 'країни')|e] може стояти [Concept('character', 'персонаж')|e]-правитель. Залежно від прийнятої [Concept('government_type', 'форми правління')|e] він може стояти при владі все життя або керувати тимчасово, доки його не змінять. [Concept('traits', 'Властивості')|e] правителя відбиваються на всій [Concept('country', 'країні')|e], а його [Concept('adm', 'адміністративні')|e], [Concept('mil', 'військові')|e] та [Concept('dip', 'дипломатичні')|e] навички прямо впливають на ефективність [Concept('cabinet', 'ради')|e].\n\nМайбутні правителі обираються за [Concept('heir_selection', 'законами престолонаслідування')|e]. Якщо немає [Concept('adult', 'дорослого')] спадкоємця, якому можна передати владу, [Concept('government', 'уряд')] очолює [Concept('regent', 'регент')|e]."
  game_concept_title_history: "Історія титулів"
  game_concept_title_history_desc: "$game_concept_title_history$ — це перелік усіх [Concept('countries', 'країн')|e], якими [Concept('character', 'персонаж')|e] правив протягом свого життя."
  game_concept_monarch: "Монарх"
  game_concept_monarchs: "Монархи"
  game_concept_road: "Дорога"
  game_concept_roads: "Дороги"
  game_concept_road_desc: "Дорога зв'язує дві [Concept('locations', 'місцевості')|e] і цим спрощує [Concept('country', 'країні')|e] [Concept('trade', 'торгівлю')|e] та [Concept('control', 'контроль')|e] над територією. Крім того, дорогами [Concept('armies', 'війська')|e] пересуваються швидше."
  game_concept_employment_system: "Система найму"
  game_concept_employment_systems: "Системи найму"
  game_concept_employment_system_desc: "Система найму описує принцип, за яким [Concept('locations', 'місцевості')|e] залучають працівників до своїх [Concept('buildings', 'споруд')|e]."
  game_concept_subject_military_stance: "Військова позиція"
  game_concept_subject_military_stances: "Військові позиції"
  game_concept_subject_military_stance_desc: "Визначає поведінку [Concept('subjects', 'ленників')|e] у тих випадках, коли їхні [Concept('overlords', 'сюзерени')|e] ведуть [Concept('war', 'війни')|e]."
  game_concept_location_size: "Розмір місцевості"
  game_concept_location_size_desc: "Фізичний розмір території, що відрізняє одні [Concept('location', 'місцевості')|e] від інших."
  game_concept_province: "Провінція"
  game_concept_provinces: "Провінції"
  game_concept_province_desc: "Провінція — це група [Concept('locations', 'місцевостей')|e] [Concept('owned', 'у володінні')|e] однієї й тієї ж [Concept('country', 'країни')|e]. Запас [Concept('food', 'їжі')|e] єдиний для всієї провінції та розподіляється між її місцевостями. [Concept('army_levies', 'Військове')|e] та [Concept('navy_levies', 'флотське')|e] ополчення збираються одразу з усієї провінції. Кілька [Concept('cabinet_actions', 'дій ради')|e] спрямовані на всю провінцію."
  game_concept_province_definition: "Розділена провінція"
  game_concept_province_definitions: "Розділені провінції"
  game_concept_province_definition_desc: "Розділена провінція — це заздалегідь задана група [Concept('locations', 'місцевостей')|e], які визначають принцип створення [Concept('provinces', 'провінцій')|e] у грі.\n\n[areas_with_icon|e] діляться на розділені провінції, до кожної з яких входять [locations_with_icon|el]. Усі [Concept('locations', 'місцевості')] у межах однієї розділеної провінції, якими [Concept('owned', 'володіє')|e] одна [country_with_icon|el], входитимуть до складу однієї [Concept('province', 'провінції')|e].\n\nЯкщо кілька [Concept('countries', 'країн')] [Concept('own', 'володіють')] [Concept('locations', 'місцевостями')] в одній розділеній провінції, вона буде розділена на кілька окремих [Concept('provinces', 'провінцій')], у кожній з яких будуть свої [province_capital_with_icon|el] та [food_stockpile_with_icon|el]."
  game_concept_province_capital: "Столиця провінції"
  game_concept_province_capitals: "Столиці провінції"
  game_concept_province_capital_desc: "Столиця провінції — це [Concept('location', 'місцевість')|e], яка є центром відповідної [Concept('province', 'провінції')|e]. Найбільш густонаселена або розвинена [Concept('location', 'місцевість')|e] у [Concept('province', 'провінції')|e] автоматично стає її столицею. Якщо столицю [Concept('occupied', 'окупують')|e] під час [Concept('war', 'війни')|e], то інші місцевості провінції швидко й автоматично перейдуть під контроль загарбника.\n\nСтолиця також визначає, на якому [Concept('market', 'ринку')|e] купує та продає [Concept('food', 'їжу')|e] вся [Concept('province', 'провінція')|e]."
  game_concept_location: "Місцевість"
  game_concept_locations: "Місцевості"
  game_concept_location_desc: "Місцевість — це найменша адміністративна одиниця. Входить до складу [Concept('province', 'провінції')|e]. Її основні характеристики залежать від [Concept('topography', 'рельєфу')|e], [Concept('vegetation', 'флори')|e] та [Concept('climate', 'клімату')|e]. Крім того, у місцевості може протікати [Concept('river', 'річка')|e].\n\nУ кожній місцевості є [Concept('raw_material', 'ресурси')|e], які можна видобувати за допомогою місцевих [Concept('pops', 'груп населення')|e]. Там можна будувати [Concept('buildings', 'споруди')|e] та [Concept('employ', 'наймати')|e] населення на роботу. Майже всі місцевості є [Concept('rural', 'сільськими')|e], проте можуть отримати статус [Concept('town_or_city', 'міського')|e].\n\nКожна місцевість може перебувати [Concept('owned', 'у володінні')|e] або [Concept('controlled', 'під контролем')|e] якоїсь [Concept('countries', 'країни')|e]. Під час [Concept('war', 'війни')|e] між місцевостями можуть пересуватися [Concept('armies', 'війська')|e] та завойовувати їх."
  game_concept_lake: "Озеро"
  game_concept_lakes: "Озера"
  game_concept_lake_desc: "Озера — це внутрішні водойми, які або не мають виходу до моря, або пов'язані з морями через річки. Через це жоден з більш-менш великих [Concept('ships', 'кораблів')|e] не зможе потрапити в озеро."
  game_concept_seazone: "Акваторія"
  game_concept_seazones: "Акваторії"
  game_concept_seazone_desc: "Акваторія схожа на [Concept('location', 'місцевість')|e], але складається цілком з води. Ця ділянка мапи не перебуває [Concept('owned', 'у володінні')|e] або [Concept('controlled', 'під контролем')|e] якоїсь країни. У прибережних акваторіях є [Concept('maritime_presence', 'морська присутність')|e] прилеглих [Concept('countries', 'країн')|e]."
  game_concept_sea_current: "Морська течія"
  game_concept_sea_currents: "Морські течії"
  game_concept_sea_current_desc: "$game_concept_sea_current$ — особливість певної [Concept('seazones', 'акваторії')|e], що дозволяє [Concept('navies', 'флотам')|e] швидше переміщатися в тому чи іншому напрямку."
  game_concept_frozen: "Замерзла акваторія"
  game_concept_frozen_freeze_over: "Замерзати"
  game_concept_frozen_desc: "Замерзлою [Concept('seazone', 'акваторією')|e] можуть пересуватися [Concept('armies', 'війська')|e], що полегшує контроль над прилеглими територіями. Однак [Concept('navies', 'флоти')|e] застрягають у льоду і змушені чекати відлиги. Будьте уважні до зміни погоди: якщо на льоду [Concept('army', 'військо')|e], відлига може його погубити."
  game_concept_impassable: "Непрохідна територія"
  game_concept_passable: "Прохідна територія"
  game_concept_wasteland: "Пустка"
  game_concept_wastelands: "Пустки"
  game_concept_impassable_desc: "Це [Concept('location', 'місцевість')|e] або [Concept('seazone', 'акваторія')|e], куди не можуть увійти [Concept('units', 'загони')|e]. Жити тут постійно також неможливо."
  game_concept_area: "Область"
  game_concept_areas: "Області"
  game_concept_area_desc: "Область — це група [Concept('provinces', 'провінцій')|e]. Входить до складу [Concept('region', 'регіону')|e]."
  game_concept_region: "Регіон"
  game_concept_regions: "Регіони"
  game_concept_region_desc: "Регіон — це група [Concept('areas', 'областей')|e]. Входить до складу [Concept('sub_continent', 'макрорегіону')|e]. Приклад: [ShowRegionName('scandinavian_region')]."
  game_concept_sub_continent: "Макрорегіон"
  game_concept_sub_continents: "Макрорегіони"
  game_concept_sub_continent_desc: "Макрорегіон — це група [Concept('regions', 'регіонів')|e]. Входить до складу [Concept('continent', 'континенту')|e]. Приклади: [ShowSubContinentName('western_europe')], Індія."
  game_concept_geography: "Географія"
  game_concept_geography_desc: "Географія — це природа, а також взаємне розташування місць та особливостей рельєфу. [Concept('continents', 'Континенти')|e], [Concept('sub_continents', 'макрорегіони')|e], [Concept('regions', 'регіони')|e], [Concept('areas', 'області')|e], [Concept('provinces', 'провінції')|e] та [Concept('locations', 'місцевості')|e] — все це елементи світової географії."
  game_concept_continent: "Континент"
  game_concept_continents: "Континенти"
  game_concept_continent_desc: "Світ складається з кількох континентів, які, у свою чергу, діляться на [Concept('sub_continents', 'макрорегіони')|e]."
  game_concept_geographical_term: "Географічний термін"
  game_concept_geographical_terms: "Географічні терміни"
  game_concept_geographical_term_desc: "Це умовний набір географічних понять, куди входять [Concept('continents', 'континенти')|e], [Concept('sub_continents', 'макрорегіони')|e], [Concept('regions', 'регіони')|e], [Concept('areas', 'області')|e], [Concept('provinces', 'провінції')|e] та [Concept('locations', 'місцевості')|e]."
  game_concept_men: "Рекрути"
  game_concept_men_i: "@army_strength!"
  game_concept_manpower: "Число рекрутів"
  game_concept_manpower_i: "@manpower!"
  game_concept_manpower_desc: "Число рекрутів показує, скільки негідників та мерзотників можуть вступити до лав регулярного [Concept('army', 'війська')|e] якоїсь [Concept('country', 'країни')|e].\n\nЦей людський ресурс витрачається на підготовку та утримання професійних [Concept('regiments', 'полків')|e] — зазвичай ефективніших загонів, ніж [Concept('army_levies', 'військове ополчення')|e].\n\nЧисло рекрутів може зростати швидше, якщо будувати певні [Concept('buildings', 'споруди')|e] або досліджувати певні [Concept('advances', 'поступи')|e]."
  game_concept_sailors: "Моряки"
  game_concept_sailors_i: "@sailors!"
  game_concept_sailors_desc: "[Concept('country', 'Країна')|e] може мати певне число моряків — це рибалки, торгові матроси та морські офіцери, які заробляють у відкритому морі.\n\nЦі досвідчені морські вовки необхідні для будівництва [Concept('ships', 'кораблів')|e] та утримання [Concept('navy', 'флоту')|e]. Вони не складають [Concept('navy_levies', 'флотське ополчення')|e] та діють ефективніше. Без них також неможлива жодна [Concept('exploration', 'експедиція')|e].\n\nЧисло моряків може зростати швидше, якщо будувати певні портові [Concept('buildings', 'споруди')|e] або досліджувати певні [Concept('advances', 'поступи')|e]."
  game_concept_river: "Річка"
  game_concept_rivers: "Річки"
  game_concept_river_desc: "Територією [Concept('location', 'місцевості')|e] може протікати річка — природний водний потік.\n\n[Concept('navies', 'Флот')|e] не може переміщатися річкою, а [Concept('armies', 'військо')|e], входячи до [Concept('location', 'місцевості')] з річкою, отримує штраф до бойових показників за [Concept('crossing', 'форсування річки')|e]. Крім того, річки трохи підвищують [Concept('population_capacity', 'межу населення')|e] місцевості."
  game_concept_religion: "Релігія"
  game_concept_faith: "Віра"
  game_concept_religions: "Релігії"
  game_concept_religion_desc: "Релігія — це система вірувань, що входить до певної [Concept('religion_group', 'релігійної групи')|e]. Кожна [Concept('person', 'людина')|e] сповідує якусь релігію (і може бути [Concept('converted', 'навернена')|e] в іншу). Кожна [Concept('country', 'країна')|e] має [Concept('primary_religion', 'основну релігію')|e].\n\nПрихильники релігій з однієї [Concept('religion_group', 'релігійної групи')] вважають одне одного [Concept('heretic', 'єретиками')|e], а прихильники релігій з різних [Concept('religion_groups', 'груп')] вважають одне одного [Concept('heathen', 'язичниками')|e]. Крім того, прихильники будь-якої релігії можуть мати певну думку про інші релігії."
  game_concept_religion_group: "Релігійна група"
  game_concept_religion_groups: "Релігійні групи"
  game_concept_religion_group_desc: "Релігійна група — це сукупність схожих [Concept('religions', 'релігій')|e]. Їхні прихильники вважають, що ті, хто сповідує іншу релігію з цієї ж групи, не вороги, а всього лиш ідуть хибним шляхом. Однак навіть за такого ставлення вони можуть [Concept('wars', 'воювати')|e] одне з одним."
  game_concept_culture_group: "Культурна група"
  game_concept_culture_groups: "Культурні групи"
  game_concept_culture_group_short: "Група"
  game_concept_culture_groups_short: "Групи"
  game_concept_culture_group_desc: "Культурна група — це сукупність [Concept('cultures', 'культур')|e], об'єднаних спільним походженням, схожими традиціями або просто територіальною близькістю.\n\n[Concept('culture', 'Культура')] може входити до кількох груп одночасно або, навпаки, не входити до жодної.\n\n[Concept('countries', 'Країни')|e], чиї [Concept('primary_cultures', 'основні культури')|e] входять хоча б до однієї спільної групи, отримують невелику надбавку до [Concept('opinion', 'думки')|e] одне про одне, яка, однак, не сумується, якщо спільних груп кілька.\n\nЗ часом деякі [Concept('culture_groups', 'культурні групи')] можуть [Concept('merged_culture_group_merged', 'об'єднатися')|e]."
  game_concept_dominant_country: "Домінуюча країна"
  game_concept_dominant_country_dominant: "Домінує"
  game_concept_dominant_country_desc: "[Concept('country', 'Країна')] з найбільшою кількістю представників [Concept('primary_culture', 'основної культури')|e] серед [Concept('population', 'населення')|e] стає [Concept('dominant_country', 'домінуючою країною')|e] цієї [Concept('culture', 'культури')|e]. Країна, чий [Concept('overlord', 'сюзерен')|e] належить до тієї ж культури, не може бути домінуючою."
  game_concept_merged_culture_group: "Об'єднана культурна група"
  game_concept_merged_culture_groups: "Об'єднані культурні групи"
  game_concept_merged_culture_group_merged: "Об'єднані"
  game_concept_merged_culture_group_merge: "Об'єднати"
  game_concept_merged_culture_group_merges: "Об'єднує"
  game_concept_merged_culture_group_merged_culture: "Об'єднана культура"
  game_concept_merged_culture_group_merging: "Об'єднання"
  game_concept_merged_culture_group_desc: "Деякі [Concept('culture_groups', 'культурні групи')|e] можна об'єднати в одну [Concept('culture', 'культуру')|e].\n\nКраїна може об'єднувати групи своєї [Concept('primary_culture', 'основної культури')|e], що призводить до створення нової культури. У такому випадку [Concept('pops', 'групи населення')|e], які розмовляють однією [Concept('language', 'мовою')|e] та належать до колишньої основної культури та [Concept('accepted_cultures', 'визнаних культур')|e] з однієї групи, миттєво асимілюються.\n\n$game_concept_merged_culture_groups$ значно спрощують [Concept('assimilating', 'асиміляцію')|E] культур з цієї групи.\n\nКультурну групу можна об'єднати з іншою лише один раз."
  game_concept_dominant_religion: "Домінуюча релігія"
  game_concept_dominant_religion_desc: "Домінуючою вважається [Concept('religion', 'релігія')|e], яку сповідує більшість [Concept('pops', 'груп населення')|e] у [Concept('location', 'місцевості')|e] або [Concept('country', 'країні')|e].\nДомінування не є абсолютною перевагою."
  game_concept_convert: "Навернення"
  game_concept_converts: "Навертає"
  game_concept_converting: "Навертається"
  game_concept_conversion: "Навернення"
  game_concept_conversion_rate: "Швидкість навернення"
  game_concept_converted: "Навернені"
  game_concept_conversion_desc: "Навернення — це процес, при якому [Concept('pops', 'групи населення')|e] поступово переходять з однієї [Concept('religion', 'релігії')|e] в іншу. За допомогою [Concept('cabinet', 'ради')|e] [Concept('country', 'країна')|e] може найефективніше впливати на навернення, однак [Concept('laws', 'закони')|e], [Concept('privileges', 'привілеї')|e], [Concept('advances', 'поступ')|e] та [Concept('societal_values', 'суспільні цінності')|e] не менш важливі для цього процесу."
  game_concept_reform_desire: "Прагнення до реформації"
  game_concept_reform_desire_desc: "#TOOLTIP:RELIGION,$catholic_tt$,X #L Католицтво#!#! страждає від внутрішніх суперечностей: його прихильники сперечаються, яке віровчення вважати правильним і що взагалі належить до цієї релігії. З часом серед них зростає прагнення до реформації, яке вплине на будь-які майбутні обговорення доктрини католицтва."
  game_concept_reformation: "Реформація"
  game_concept_protestant: "Протестант"
  game_concept_protestants: "Протестанти"
  game_concept_reformation_desc: "$game_concept_reformation$ — це значущий рух у #TOOLTIP:RELIGIONGROUP,christian,X #L християнстві#!#!, який призвів до розколу #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтва#!#! та виникнення ще кількох релігій. Цей процес запускається під час [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,reformation,X #L «Католицька Реформація»#!#!.\nВ результаті Реформації з'являються наступні релігії:\n$BULLET_WITH_TAB$[ShowReligionName('hussite')]\n$BULLET_WITH_TAB$[ShowReligionName('lutheran')]\n$BULLET_WITH_TAB$[ShowReligionName('calvinist')]\n$BULLET_WITH_TAB$[ShowReligionName('anglican')]"
  game_concept_culture: "Культура"
  game_concept_cultures: "Культури"
  game_concept_culture_desc: "Культура — це група [Concept('people', 'людей')|e], об'єднаних почуттям спорідненості.\n\nУ кожної культури є [Concept('language', 'мова')|e], якою можуть розмовляти представники й інших культур.\n\nКожній культурі властиві [Concept('cultural_tradition', 'традиції')|e] та [Concept('cultural_influence', 'вплив')|e]. У представників культури є [Concept('cultural_opinions', 'думки про інші культури')|e], і ці думки можуть змінюватися.\n\nУ кожної [Concept('country', 'країни')|e] є [Concept('primary_culture', 'основна культура')|e]. Крім неї, одна або кілька культур можуть вважатися [Concept('accepted_cultures', 'визнаними')|e] або [Concept('tolerated_cultures', 'прийнятними')|e]. Всі інші культури в країні вважаються [Concept('non_accepted_cultures', 'невизнаними')|e]. Одні культури можуть бути [Concept('assimilated', 'асимільовані')|e] іншими.\n\nБагато культур входять в одну або відразу кілька [Concept('culture_groups', 'культурних груп')|e]."
  game_concept_cultural_opinion: "Думка про культуру"
  game_concept_cultural_opinion_short: "Думка"
  game_concept_cultural_opinions: "Думки про культури"
  game_concept_cultural_opinion_desc: "У представників кожної [Concept('culture', 'культури')|e] є думка про інші культури. Вона впливає на [Concept('opinion', 'думку')|e] [Concept('country', 'країни')|e] з однією [Concept('culture', 'культурою')] про [Concept('country', 'країну')] з іншою, а також на [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pop', 'групи населення')|e]."
  game_concept_non_accepted_culture: "Пригноблена культура"
  game_concept_non_accepted_culture_short: "Пригноблена"
  game_concept_non_accepted_cultures: "Пригноблені культури"
  game_concept_non_accepted_culture_desc: "Кожна представлена в [Concept('country', 'країні')|e] [Concept('culture', 'культура')|e], яка не є [Concept('primary_culture', 'основною')|e], [Concept('accepted_culture', 'визнаною')|e] або [Concept('tolerated_culture', 'прийнятною')|e], вважається пригнобленою культурою.\n\nГрупи населення, що належать до цієї [Concept('culture', 'культури')], не можуть набиратися до [Concept('army_levies', 'військового')|e] та [Concept('navy_levies', 'флотського')|e] ополчення, якщо не прийнято особливий [Concept('law', 'закон')|e]."
  game_concept_accepted_culture: "Визнана культура"
  game_concept_accept: "Визнати"
  game_concept_accepted_culture_short: "Визнана"
  game_concept_accepted_cultures: "Визнані культури"
  game_concept_accepted_culture_desc: "У кожній [Concept('country', 'країні')|e] може бути кілька [Concept('cultures', 'культур')|e], які визнаються на тих же правах, що й [Concept('primary_culture', 'основна')|e].\n\nТочна кількість визнаних культур, за якої країна не отримує штраф, може бути різною та збільшується з [Concept('advances', 'поступом')|e].\n\n[Concept('pops', 'Групи населення')|e], що належать до визнаної культури, можуть складати [Concept('army_levies', 'військове')|e] та [Concept('navy_levies', 'флотське')|e] ополчення, навіть якщо не ухвалено особливий [Concept('law', 'закон')|e].\n\n[Concept('pop_satisfaction_with_icon', 'Задоволення')|e] [Concept('pops_with_icon', 'груп населення')|e] визнаної культури збільшується на [GetDefine('NPop', 'ACCEPTED_CULTURE_SATISFACTION')|%G]."
  game_concept_tolerated_culture: "Прийнятна культура"
  game_concept_tolerated_culture_short: "Прийнятна"
  game_concept_tolerate: "Терпимість"
  game_concept_tolerated_cultures: "Прийнятні культури"
  game_concept_tolerated_culture_desc: "Прийнятними вважаються [Concept('cultures', 'культури')|e], у яких у [Concept('country', 'країні')|e] більше прав, ніж у [Concept('non_accepted_cultures', 'пригноблених культур')|e], але їхнє становище нижче, ніж у [Concept('primary_culture', 'основної')|e].\n\nКількість прийнятних культур, за якої країна не отримує штраф, може бути різною та збільшується з [Concept('advances', 'поступом')|e].\n\n[Concept('pops', 'Групи населення')|e], що належать до прийнятних культур, можна набирати до [Concept('army_levies', 'військового')|e] та [Concept('navy_levies', 'флотського')|e] ополчення, навіть якщо не прийнято особливий [Concept('law', 'закон')|e].\n\n[Concept('pop_satisfaction_with_icon', 'Задоволення')|e] [Concept('pops_with_icon', 'груп населення')|e] прийнятної культури збільшується на [GetDefine('NPop', 'TOLERATED_CULTURE_SATISFACTION')|%G]."
  game_concept_primary_culture: "Основна культура"
  game_concept_primary_culture_short: "Основна"
  game_concept_primary_cultures: "Основні культури"
  game_concept_primary_culture_desc: "Це [Concept('culture', 'культура')|e], до якої належить [Concept('country', 'країна')|e]. За відповідних умов з цією культурою [Concept('assimilate', 'асимілюються')|e] [Concept('pops', 'групи населення')|e] з інших культур.\n\n[Concept('common_language', 'Загальноприйнята мова')|e] кожної [Concept('country', 'країни')] — це [Concept('language', 'мова')] основної культури.\n\n[Concept('pop_satisfaction_with_icon', 'Задоволення')|e] [Concept('pops', 'груп населення')] основної культури [Concept('country', 'країни')] збільшується на [GetDefine('NPop', 'PRIMARY_CULTURE_SATISFACTION')|%G]."
  game_concept_primary_or_accepted_culture: "Основна або визнана культура"
  game_concept_primary_or_accepted_culture_desc: "Це [Concept('culture', 'культура')|e], яка вважається в [Concept('country', 'країні')|e] [Concept('primary_culture_short', 'основною')|e] або [Concept('accepted_culture', 'визнаною')|e]."
  game_concept_cultural_capacity: "Культурний потенціал"
  game_concept_cultural_capacity_desc: "Витрати [Concept('country', 'країни')|e] на підтримку тієї чи іншої [Concept('culture', 'культури')|e] як [Concept('accepted_culture', 'визнаної')|e] залежать від [Concept('cultural_opinion', 'думки')|e] її представників про [Concept('primary_culture', 'основну культуру')|e], а також від розміру цієї культури порівняно з основною."
  game_concept_religious_status: "Статус релігії"
  game_concept_religious_status_desc: "Якась [Concept('religion', 'релігія')|e] стосовно [Concept('primary_religion', 'основної')|e] може мати один із таких статусів:\n$BULLET_WITH_TAB$[Concept('primary_religion', 'Основна релігія')|e]\n$BULLET_WITH_TAB$[Concept('heretic', 'Єретики')|e]\n$BULLET_WITH_TAB$[Concept('heathen', 'Язичники')|e]"
  game_concept_religious_opinion: "Думка про релігію"
  game_concept_religious_opinions: "Думки про релігії"
  game_concept_religious_opinion_desc: "У прихильників кожної [Concept('religion', 'релігії')|e] є думка про інші [Concept('religion', 'релігії')]. Вона впливає на [Concept('opinion', 'думку')|e] [Concept('country', 'країни')|e] з однією [Concept('religion', 'релігією')] про [Concept('country', 'країну')] з іншою, а також на [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pop', 'групи населення')|e]."
  game_concept_primary_religion: "Основна релігія"
  game_concept_primary_religion_short: "Основна"
  game_concept_true_faith: "Основна релігія"
  game_concept_official_religion: "Основна релігія"
  game_concept_state_religion: "Основна релігія"
  game_concept_state_religion_desc: "Це офіційна [Concept('religion', 'релігія')|e] [Concept('country', 'країни')|e]. Відкриває доступ до різного вмісту та механік, а також дозволяє обирати абсолютно різні стилі гри.\n\n[Concept('pops', 'Групи населення')|e], що сповідують основну релігію, відрізняються вищим [Concept('pop_satisfaction', 'задоволенням')|e], тоді як інші групи населення поступово [Concept('convert', 'звертаються')|e] в основну релігію за дотримання певних умов.\n\n$game_concept_primary_religion$ також сильно впливає на [Concept('diplomacy', 'дипломатію')|e], оскільки країни, об'єднані однією основною релігією, як правило, більш прихильні одна до одної."
  game_concept_heretic: "Єретики"
  game_concept_heretics: "Єретики"
  game_concept_heretic_desc: "Будь-яка [Concept('religion', 'релігія')|e] з тієї ж [Concept('religion_group', 'групи')|e], що й [Concept('primary_religion', 'основна релігія')|e] [Concept('country', 'країни')|e], вважається єретичною.\n\nЗалежно від рівня [Concept('heretic_tolerance', 'терпимості')|e] в країні, єретичні [Concept('pops', 'групи населення')|e] загалом відрізнятимуться нижчим [Concept('pop_satisfaction', 'задоволенням')|e], а [Concept('diplomacy', 'дипломатичні відносини')|e] з єретичними країнами можуть вимагати набагато більше зусиль."
  game_concept_heathen: "Язичники"
  game_concept_heathens: "Язичники"
  game_concept_heathen_desc: "Будь-яка [Concept('religion', 'релігія')|e] не з тієї ж [Concept('religion_group', 'групи')|e], що й [Concept('primary_religion', 'основна релігія')|e] [Concept('country', 'країни')|e], вважається язичницькою.\n\nЗалежно від рівня [Concept('heathenry_tolerance', 'терпимості')|e] в країні, язичницькі [Concept('pops', 'групи населення')|e] загалом відрізнятимуться нижчим [Concept('pop_satisfaction', 'задоволенням')|e], а [Concept('diplomacy', 'дипломатичні відносини')|e] з язичницькими країнами можуть вимагати набагато більше зусиль."
  game_concept_dominant_upper_class_culture: "Домінуюча культура вищого суспільства"
  game_concept_dominant_upper_class_culture_desc: "Домінуючою культурою [Concept('upper_class', 'вищого суспільства')|e] вважається [Concept('culture', 'культура')|e], до якої належить більшість привілейованих [Concept('pops', 'груп населення')|e] [Concept('country', 'країни')|e]. При її визначенні враховується [Concept('control', 'контроль')|e] над [Concept('locations', 'місцевостями')|e], де живуть представники вищого суспільства, а також [Concept('political_power', 'політична вага')|e] [Concept('estate', 'стану')|e], до якого вони належать.\n\nДомінування не є абсолютною перевагою."
  game_concept_dominant_culture: "Домінуюча культура"
  game_concept_dominant_culture_desc: "Домінуючою вважається [Concept('culture', 'культура')|e], до якої належить більшість жителів [Concept('location', 'місцевості')|e] або [Concept('country', 'країни')|e].\nДомінування не є абсолютною перевагою."
  game_concept_foreign_culture: "Чужа культура"
  game_concept_foreign_culture_short: "Чужа"
  game_concept_foreign_culture_desc: "Це [Concept('cultural_status', 'статус')|e] [Concept('culture', 'культури')|e], до якої не належать [Concept('pops', 'групи населення')|e] в [Concept('country', 'країні')|e]."
  game_concept_cultural_status: "Статус культури"
  game_concept_cultural_status_short: "Статус"
  game_concept_cultural_status_desc: "У будь-якій [Concept('country', 'країні')|e] кожна [Concept('culture', 'культура')|e] може мати один із таких статусів:\n$BULLET_WITH_TAB$[Concept('primary_culture', 'Основна культура')|e]\n$BULLET_WITH_TAB$[Concept('accepted_culture', 'Визнана культура')|e]\n$BULLET_WITH_TAB$[Concept('non_accepted_culture', 'Пригноблена культура')|e]\n$BULLET_WITH_TAB$[Concept('tolerated_culture', 'Прийнятна культура')|e]\n$BULLET_WITH_TAB$[Concept('foreign_culture', 'Чужа культура')|e]"
  game_concept_assimilate: "Асиміляція"
  game_concept_assimilates: "Асимілює"
  game_concept_assimilating: "Асимілюється"
  game_concept_assimilated: "Асимільовані"
  game_concept_assimilation: "Асиміляція"
  game_concept_assimilation_rate: "Швидкість асиміляції"
  game_concept_assimilate_desc: "У процесі асиміляції [Concept('pops', 'групи населення')|E], що належать до однієї [Concept('culture', 'культури')|E], поступово переймають [Concept('primary_culture', 'основну культуру')|E] [Concept('owns', 'володіючої')|E] ними [Concept('country', 'країни')|E].\n\nЦей процес прискорюється, якщо [Concept('culture_war_power', 'міць')|E] [Concept('primary_culture', 'основної культури')] більша, ніж міць культури в даній [Concept('pop', 'групі населення')|E].\n\nПевні [Concept('cultures', 'культури')|E] прив'язані до своєї [Concept('faith', 'віри')|E], що перешкоджає їхній асиміляції без попереднього [Concept('converted', 'навернення')|E] в іншу релігію.\n\nЩоб ви могли обрати культуру, вона повинна бути присутня у вашій країні або у вашого населення повинна бути як мінімум нейтральна думка про неї."
  game_concept_occupation: "Окупація"
  game_concept_occupations: "Окупації"
  game_concept_occupied: "Окуповано"
  game_concept_occupier: "Окупант"
  game_concept_occupy: "Окупувати"
  game_concept_occupying: "Окупує"
  game_concept_occupation_desc: "При окупації [Concept('location', 'місцевості')|e] її [Concept('controller', 'контролює')|e] не та сторона, яка нею [Concept('owner', 'володіє')|e]. Окупація відбувається, коли [Concept('location', 'місцевість')] потрапляє в [Concept('zone_of_control', 'зону контролю')] [Concept('fortification', 'укріплення')|e], що знаходиться [Concept('controlled', 'під контролем')] [Concept('enemy', 'ворога')|e], або коли [Concept('army', 'військо')|e] успішно провело [Concept('sieges', 'облогу')|e] місцевості.\n\nЯк правило, щоб включити [Concept('location', 'місцевість')|e] в умови [Concept('peace_treaty', 'мирного договору')|e], її треба спочатку окупувати."
  game_concept_siege: "Облога"
  game_concept_besieged: "В облозі"
  game_concept_sieged: "Захоплені"
  game_concept_sieges: "Облоги"
  game_concept_siege_desc: "Облога починається, щойно [Concept('army', 'військо')|e] прибуває до [Concept('location', 'місцевості')|e] [Concept('controller', 'під контролем')|e] [Concept('enemy', 'ворога')|e] цього війська.\n\nОблога місцевості без [Concept('fortification', 'укріплень')|e] триває близько місяця. За наявності укріплення потрібно набагато більше часу залежно від рівня цього укріплення.\n\nЯкщо військо здобуває перемогу в місцевості, [Concept('owned', 'належній')|e] ворогу, така місцевість стає [Concept('occupied', 'окупованою')|e], а [Concept('war_score', 'військовий рахунок')|e] власника переможного війська збільшується.\n\nЩоб [Concept('siege', 'облога')|e] могла тривати, чисельність війська, що облягає, повинна бути не меншою за чисельність [Concept('garrison', 'гарнізону')|e], що обороняється. Для облоги [Concept('location', 'місцевості')|e] без [Concept('fortifications', 'укріплень')|e] потрібно не менше #V 100#! вояків."
  game_concept_assault: "Штурм"
  game_concept_assault_desc: "Штурм — це спроба [Concept('siege', 'сторони, що облягає')|e] взяти приступом [Concept('fortification', 'укріплення')|e], щоб якнайшвидше захопити його. Це дуже дорогий крок — атакуюча сторона зазнає великих втрат."
  game_concept_garrison: "Гарнізон"
  game_concept_garrisons: "Гарнізони"
  game_concept_garrison_desc: "Це вояки, які захищають [Concept('fortifications', 'укріплення')|e] [Concept('location', 'місцевості')|e]. Якщо всі вони загинуть або втратять [Concept('morale', 'бойовий дух')|e], сторона, що обороняється, програє [Concept('siege', 'облогу')|e].\n\nЩоб [Concept('siege', 'облога')|e] могла тривати, чисельність війська, що облягає, повинна бути не меншою за чисельність [Concept('garrison', 'гарнізону')|e], що обороняється. Для облоги [Concept('location', 'місцевості')|e] без [Concept('fortifications', 'укріплень')|e] потрібно не менше #V 100#! вояків."
  game_concept_combat: "Бій"
  game_concept_battle: "Битва"
  game_concept_battles: "Битви"
  game_concept_combats: "Бої"
  game_concept_combat_desc: "Якщо в [Concept('location', 'місцевості')|e] зустрічаються два або більше [Concept('hostile', 'ворожих')|e] [Concept('armies', 'війська')|e], а в [Concept('seazone', 'акваторії')|e] — два або більше ворожих [Concept('navies', 'флоти')|e], між ними розгориться битва.\nНайчастіше вона починається з [Concept('bombard_phase', 'фази обстрілу')|e], за якою слідує [Concept('combat_phase', 'фаза бою')|e]. Кожен [Concept('regiment', 'полк')|e] або [Concept('ship', 'корабель')|e] намагатиметься [Concept('engage', 'вступити в бій')|e] і буде битися, доки одна зі сторін не [Concept('retreats', 'відступить')|e]."
  game_concept_attacker: "Сторона, що атакує"
  game_concept_attacker_desc: "Під час [Concept('battle', 'битви')|e] сторона, що атакує, може мати менш вигідне положення: [Concept('topography', 'рельєф')|e], [Concept('vegetation', 'флора')|e] та [Concept('crossing', 'форсування')|e] накладають штрафи на тих, хто атакує. Протилежна сторона називається [Concept('defender', 'оборонною')|e]."
  game_concept_defender: "Оборонна сторона"
  game_concept_defender_desc: "Оборонна сторона не піддається штрафам, від яких у [Concept('battle', 'битві')|e] може страждати [Concept('attacker', 'сторона, що атакує')|e]. Як правило, оборонними стають [Concept('army', 'військо')|e] або [Concept('navy', 'флот')|e], які першими з'явилися в якійсь [Concept('location', 'місцевості')|e], якщо тільки вони не зайняті в [Concept('siege', 'облозі')|e]."
  game_concept_crossing: "Форсування"
  game_concept_river_crossing: "Форсування річки"
  game_concept_strait_crossing: "Форсування протоки"
  game_concept_sea_landing: "Висадка з моря"
  game_concept_crossing_desc: "[Concept('army', 'Військо')|e], яка переправляється через [Concept('strait', 'протоку')|e] або річку, що розділяє дві [Concept('locations', 'місцевості')|e], або здійснює висадку з [Concept('seazone', 'акваторії')|e], отримає штраф у [Concept('battle', 'битві')|e], якщо це військо [Concept('attacker', 'нападає')|e]."
  game_concept_army_experience: "Військовий досвід"
  game_concept_navy_experience: "Морський досвід"
  game_concept_experience: "Досвід"
  game_concept_experience_desc: "Досвід зменшує [Concept('damage_taken', 'отримувану шкоду')|e] в [Concept('battle', 'битві')|e]. Нараховується головним чином за участь у [Concept('battle', 'битвах')], [Concept('siege', 'облогах')|e] або [Concept('blockade', 'блокадах')|e]. З часом [Concept('regiment', 'полки')|e] та [Concept('ship', 'кораблі')|e] повільно втрачають накопичений досвід.\n[Concept('regiments', 'Полки')] також можуть отримувати досвід, застосовуючи [Concept('unit_ability', 'здатність')|e] #TOOLTIP:UNIT_ABILITY,drill_army,X #L «Військові навчання»#!#!.\nЗавдяки певним [Concept('recruitment_methods', 'методам набору')|e] нові загони можуть мати спочатку більше досвіду."
  game_concept_capital: "Столиця"
  game_concept_capital_desc: "Це [Concept('location', 'місцевість')|e], яка вважається політичним центром [Concept('country', 'країни')|e], тут розташовується [Concept('government', 'уряд')|e]. Наслідки [Concept('occupied', 'окупації')|e] цієї місцевості в ході [Concept('war', 'війни')|e] можуть бути катастрофічними."
  game_concept_price: "Ціна"
  game_concept_prices: "Ціни"
  game_concept_cost: "Вартість"
  game_concept_costs: "Вартість"
  game_concept_price_desc: "Ціна — це витрати [Concept('country', 'країни')|e] на будь-яку діяльність. Може виражатися в [Concept('gold', 'золоті')|e], [Concept('manpower', 'числі рекрутів')|e], впливі на [Concept('stability', 'стабільність')|e] або в чомусь іншому."
  game_concept_unit: "Загін"
  game_concept_units: "Загони"
  game_concept_unit_desc: "Загін — це або [Concept('army', 'військо')|e], або [Concept('navy', 'флот')|e]. Кожен загін складається з [Concept('sub_units', 'підрозділів')|e]."
  game_concept_unit_template: "Шаблон загону"
  game_concept_unit_templates: "Шаблони загонів"
  game_concept_unit_template_desc: "Шаблон загону — це набір [Concept('unit_types', 'типів військ')|e], який дозволяє безпосередньо наймати різні [Concept('units', 'загони')|e]. За допомогою шаблонів можна створювати як [Concept('regiments', 'полки')|e], так і [Concept('ships', 'кораблі')|e]."
  game_concept_sub_unit: "Підрозділ"
  game_concept_sub_units: "Підрозділи"
  game_concept_sub_unit_desc: "Підрозділ — це окреме військо у складі [Concept('unit', 'загону')|e], яке бере участь у битві як [Concept('regiments', 'полк')|e] або [Concept('ships', 'корабель')|e]. Воно завжди належить до певного [Concept('unit_type', 'типу')|e] та [Concept('unit_category', 'роду військ')|e]."
  game_concept_distributing_food: "Розподіл їжі"
  game_concept_distribute_food: "Розподілити їжу"
  game_concept_distributing_food_desc: "[Concept('navy', 'Флот')|e] постачатиме [Concept('food', 'їжу')|e] [Concept('army', 'війська')|e] у сусідній [Concept('location', 'місцевості')|e], якщо та не може здобути [Concept('food', 'їжу')] в цій [Concept('location', 'місцевості')] або на найближчому [Concept('supply_depot', 'продовольчому складі')|e]."
  game_concept_gathering_food: "Збір їжі"
  game_concept_gather_food: "Зібрати їжу"
  game_concept_gathering_food_desc: "[Concept('navy', 'Флот')|e], зайнятий збором [Concept('food', 'їжі')|e], отримуватиме її з усіх близьких [Concept('locations', 'місцевостей')|e], в яких у нього є [Concept('food_access', 'доступ до продовольства')|e], і таким чином поповнюватиме свій [Concept('food_capacity', 'запас продовольства')|e]. Після цього [Concept('navy', 'флот')] зможе [Concept('distribute_food', 'розподіляти їжу')|e] за потреби."
  game_concept_food_source: "Джерело їжі"
  game_concept_food_source_desc: "[Concept('army', 'Військо')|e] отримує їжу з тієї [Concept('province', 'провінції')|e], де у нього є [Concept('food_access', 'доступ до продовольства')|e], а також з дружнього [Concept('supply_depot', 'продовольчого складу')|e] або від [Concept('navy', 'флоту')|e], зайнятого [Concept('distributing_food', 'розподілом їжі')|e]."
  game_concept_food_decay: "Псування їжі"
  game_concept_food_decay_desc: "Всяка [Concept('food', 'їжа')|e] має властивість псуватися, тому щомісяця якась її кількість безповоротно пропадає."
  game_concept_logistics_distance: "Дальність постачання"
  game_concept_logistics_distance_desc: "Визначає, як далеко можуть бути прокладені лінії постачання, що зв'язують [Concept('army', 'військо')|e] з [Concept('food_source', 'джерелом їжі')|e]. Війська отримують їжу з тієї [Concept('province', 'провінції')|e], де у них є [Concept('food_access', 'доступ до продовольства')|e], а також з дружнього [Concept('supply_depot', 'продовольчого складу')|e] або від [Concept('navy', 'флоту')|e], зайнятого [Concept('distributing_food', 'розподілом їжі')|e]. Укріплення в [Concept('zone_of_control', 'зоні контролю')|e] та [Concept('hostile', 'ворожі')|e] війська блокують лінії постачання."
  game_concept_military_objective: "Військова ціль"
  game_concept_military_objectives: "Військові цілі"
  game_concept_military_objective_desc: "[Concept('armies', 'Військам')|e] та [Concept('navies', 'флотам')|e] можна призначати цілі, які вони намагатимуться досягти автоматично."
  game_concept_army: "Військо"
  game_concept_armies: "Війська"
  game_concept_army_desc: "Військо складається з [Concept('regiments', 'полків')|e] під командуванням [Concept('character', 'персонажа')|e]. Може брати участь у [Concept('battles', 'битвах')|e] та [Concept('siege', 'облягати')|e] ворожі [Concept('fortifications', 'укріплення')|e]."
  game_concept_navy: "Флот"
  game_concept_navies: "Флоти"
  game_concept_navy_desc: "[Concept('country', 'Країна')|e], що має флоти, здатна застосовувати силу за межами своїх сухопутних кордонів. Флот складається з [Concept('ships', 'кораблів')|e] під командуванням [Concept('character', 'персонажа')|e]. Він може брати участь у [Concept('battles', 'битвах')|e], влаштовувати [Concept('blockade', 'блокади')|e] [Concept('hostile', 'ворожих')|e] берегів, заважати [Concept('maritime_presence', 'морській присутності')|e] ворога та перевозити [Concept('armies', 'війська')|e]. Крім того, флот може брати участь у логістиці, [Concept('distribute_food', 'розподіляючи')|e] та [Concept('gather_food', 'збираючи їжу')|e]."
  game_concept_ship: "Корабель"
  game_concept_ships: "Кораблі"
  game_concept_ship_desc: "Це основна структурна одиниця [Concept('navy', 'флоту')|e]. Це велике судно, здатне перевозити [Concept('food', 'їжу')|e], [Concept('regiments', 'полки')|e] та свій екіпаж. Кожен корабель належить до певного [Concept('ship_type', 'типу')|e]."
  game_concept_regular_regiment: "Регулярний полк"
  game_concept_regular_regiments: "Регулярні полки"
  game_concept_regular: "Регулярне військо"
  game_concept_regulars: "Регулярні війська"
  game_concept_regular_regiment_desc: "Регулярні полки [Concept('country', 'країна')|e] набирає вручну. Для цього зазвичай потрібні [Concept('manpower', 'рекрути')|e] та [Concept('gold', 'золото')|e]. З таких полків формуються регулярні [Concept('armies', 'війська')|e]. Їхня чисельність обмежена, а щоб її збільшити, потрібно досліджувати [Concept('advances', 'поступи')|e] в пізніші [Concept('ages', 'епохи')|e]."
  game_concept_regular_ship: "Регулярний корабель"
  game_concept_regular_ships: "Регулярні кораблі"
  game_concept_regular_ship_desc: "Регулярні кораблі [Concept('country', 'країна')|e] набирає вручну. Для цього потрібні [Concept('sailors', 'моряки')|e] та [Concept('gold', 'дукати')|e]. З таких кораблів формуються регулярні [Concept('navies', 'флоти')|e]. Їхня чисельність обмежена, а щоб її збільшити, потрібно досліджувати [Concept('advances', 'поступи')|e] в пізніші [Concept('ages', 'епохи')|e]."
  game_concept_regiment: "Полк"
  game_concept_regiments: "Полки"
  game_concept_regiment_desc: "Це основна структурна одиниця [Concept('army', 'війська')|e]. Кожен полк має свою [Concept('maximum_strength', 'максимальну чисельність')|e] [Concept('manpower', 'рекрутів')|e] і належить до певного [Concept('unit_type', 'типу військ')|e]. Крім того, є три різновиди полків: [Concept('army_levy', 'військове ополчення')|e], [Concept('mercenary', 'найманці')|e] та [Concept('regular_regiment', 'регулярні полки')|e]."
  game_concept_average_morale: "Середній бойовий дух"
  game_concept_average_morale_desc: "Це усереднений показник [Concept('morale', 'бойового духу')|e] всіх [Concept('regiments', 'полків')|e] або [Concept('ships', 'кораблів')|e] у [Concept('unit', 'загоні')|e]."
  game_concept_army_morale: "Бойовий дух війська"
  game_concept_navy_morale: "Бойовий дух флоту"
  game_concept_morale: "Бойовий дух"
  game_concept_morale_i: "@morale!"
  game_concept_morale_desc: "Бойовий дух визначає, як довго [Concept('army', 'військо')|e] або [Concept('navy', 'флот')|e] будуть битися, перш ніж здадуться.\n\nПід час [Concept('battle', 'битви')|e] кожен [Concept('regiment', 'полк')|e] або [Concept('ship', 'корабель')|e] завдає [Concept('morale_damage_done', 'шкоди бойовому духу')|e] ворога. Ефект залежить від [Concept('morale_damage_taken', 'отриманої шкоди бойовому духу')|e] ворога. Коли бойовий дух впаде до нуля, військо або флот [Concept('retreat', 'відступить')|e] і програє в [Concept('battle', 'битві')]."
  game_concept_locked: "Заблокований загін"
  game_concept_locked_desc: "Заблоковане [Concept('army', 'військо')|e] чи [Concept('navy', 'флот')|e] не може отримувати накази, доки доступ до цього загону не відновиться."
  game_concept_trade_profit: "Торговий прибуток"
  game_concept_trade_profit_desc: "Торговий прибуток в основному залежить від різниці між [Concept('market_prices', 'ринковими цінами')|e] [Concept('goods', 'товарів')|e] на [Concept('export_market', 'ринку експорту')|e] та [Concept('import_market', 'ринку імпорту')|e]. Витрати на забезпечення зменшують торговий прибуток. До того ж при торгівлі деякими товарами стягується [Concept('sound_toll', 'плата за прохід')|e]."
  game_concept_trade: "Торгівля"
  game_concept_trading: "Торгівля"
  game_concept_trades: "Торгові угоди"
  game_concept_trade_desc: "Торгівля — це рух [Concept('good', 'товарів')|e] з одного [Concept('market', 'ринку')|e] на інший. [Concept('merchant', 'Купець')|e] купує їх на одному ринку і продає на іншому, розраховуючи принести власнику [Concept('trade_profit', 'торговий прибуток')|e]. Необхідний для цього [Concept('merchant_capacity', 'торговий потенціал')|e] залежить від відстані між ринками, а також від кількості купованих і продаваних [Concept('goods', 'товарів')].\n\n[Concept('trade_income', 'Доходи від торгівлі')|e] розподіляються між правителем та [Concept('estates_with_icon', 'станами')|e] виходячи з показника [Concept('estate_power_with_icon', 'станової влади')|e]. До [Concept('treasury', 'скарбниці')|e] йде лише частка, належна [Concept('crown_power_with_icon', 'правителю')|e]."
  game_concept_import: "Імпорт"
  game_concept_importing: "Імпортується"
  game_concept_imported: "Імпортовано"
  game_concept_imports: "Імпортує"
  game_concept_import_desc: "Імпорт — це [Concept('trade', 'торгівля')|e], при якій [Concept('goods', 'товари')|e] постачаються на [Concept('market', 'ринок')|e], тим самим збільшуючи їх [Concept('supply', 'пропозицію')|e] на цьому [Concept('market', 'ринку')]."
  game_concept_export: "Експорт"
  game_concept_exporting: "Експортується"
  game_concept_exported: "Експортовано"
  game_concept_exports: "Експортує"
  game_concept_export_desc: "Експорт — це [Concept('trade', 'торгівля')|e], при якій [Concept('goods', 'товари')|e] вивозяться з [Concept('market', 'ринку')|e], збільшуючи [Concept('demand', 'попит')|e] цього ринку на них.\n\nЯкщо один і той же товар експортується в кількох угодах, його кількість розподіляється за спаданням [Concept('merchant_power', 'торгової переваги')|e]."
  game_concept_trade_income: "Доходи від торгівлі"
  game_concept_trade_income_desc: "Це гроші, зароблені на [Concept('trades_with_icon', 'торгівлі')|e] — при продажу [Concept('goods_with_icon', 'товарів')|e] на [Concept('markets_with_icon', 'ринках')|e].\n\nДоходи від торгівлі розподіляються між правителем та [Concept('estates_with_icon', 'станами')|e] виходячи з показника [Concept('estate_power_with_icon', 'станової влади')|e]. До [Concept('treasury', 'скарбниці')|e] йде лише відсоток [Concept('crown_power_with_icon', 'влади правителя')|e]."
  game_concept_trade_expense: "Витрати на торгівлю"
  game_concept_trade_expense_desc: "Це гроші, витрачені на [Concept('trades', 'торгівлю')|e] — при купівлі [Concept('goods', 'товарів')|e] на [Concept('markets', 'ринках')|e] та витратах на [Concept('merchant_maintenance', 'забезпечення торгівлі')|e]."
  game_concept_burgher_trade: "Участь містян у торгівлі"
  game_concept_burgher_trades: "Участь містян у торгівлі"
  game_concept_burgher_trade_desc: "[ShowPopTypeName('burghers')] за допомогою самостійної [Concept('trades', 'торгівлі')|e] намагатимуться забезпечити себе необхідними [Concept('goods', 'товарами')|e] на [Concept('market', 'ринку')|e] свого [Concept('town_or_city', 'міста')|e]."
  game_concept_burghers_exporting: "Участь містян у експорті"
  game_concept_burghers_importing: "Участь містян у імпорті"
  game_concept_common_goods: "Товари широкого вжитку"
  game_concept_base_production: "Базове виробництво"
  game_concept_common_goods_desc: "Деякі [Concept('goods', 'товари')|e], такі як #TOOLTIP:GOODS,stone,X #L камінь#!#! або #TOOLTIP:GOODS,clay,X #L глина#!#!, можна виробляти будь-де — для цього не потрібно [Concept('rgo', 'видобувати ресурси')|e]. Вони вважаються товарами широкого вжитку і постачаються на [Concept('market', 'ринок')|e] як звичайні товари."
  game_concept_topography: "Рельєф"
  game_concept_topography_desc: "Рельєф — це нерівності та перепади висот у [Concept('location', 'місцевості')|e]. На рівній місцевості простіше розвивати [Concept('towns_and_cities', 'міста')|e], на пересіченій простіше оборонятися."
  game_concept_vegetation: "Флора"
  game_concept_vegetation_desc: "Флора характеризує рослинність, якою вкрита [Concept('location', 'місцевість')|e]."
  game_concept_construction: "Будівництво"
  game_concept_constructions: "Будівництво"
  game_concept_construction_desc: "Це процес створення чогось у [Concept('location', 'місцевості')|e], наприклад, набір [Concept('regiment', 'полку')|e], зведення [Concept('building', 'споруди')|e] або #TOOLTIP:LOCATIONRANK,city,X #L міста#!#!.\n\nПід час будівництва [Concept('location', 'місцевість')|e] споживає [Concept('goods', 'товари')|e] з [Concept('market', 'ринку')|e], до якого вона належить. За відсутності необхідних [Concept('goods', 'товарів')] [Concept('construction', 'будівництво')|e] призупиниться."
  game_concept_regular_army: "Регулярне військо"
  game_concept_regular_army_desc: "Це постійні [Concept('army', 'війська')|e] [Concept('country', 'країни')|e] без урахування [Concept('levies', 'ополчення')|e]."
  game_concept_unit_type: "Тип військ"
  game_concept_ship_type: "Тип корабля"
  game_concept_unit_types: "Типи військ"
  game_concept_unit_type_short: "Тип"
  game_concept_unit_types_short: "Типи"
  game_concept_unit_type_desc: "Типи в кожному [Concept('unit_category', 'роді військ')|e] дуже різноманітні. Вони залежать від [Concept('culture', 'культури')|e], досліджених [Concept('advances', 'поступів')|e] та інших чинників. Загони відрізняються один від одного саме типом військ, він визначає їхні здібності та характеристики. Приклади типів [Concept('ships', 'кораблів')|e]: [ShowUnitDefinitionName('n_cog')|l], [ShowUnitDefinitionName('n_twodecker')|l], [ShowUnitDefinitionName('n_xebec')|l]. Приклади типів [Concept('regiments', 'полків')|e]: [ShowUnitDefinitionName('a_arquebusiers')|l], [ShowUnitDefinitionName('a_cavaliers')|l]."
  game_concept_unit_category: "Рід військ"
  game_concept_unit_categories: "Роди військ"
  game_concept_unit_category_short: "Рід"
  game_concept_unit_categories_short: "Роди"
  game_concept_unit_category_upper_desc: "[Concept('regiment', 'Полк')|e] або [Concept('ship', 'корабель')|e] завжди належить до одного з наступних родів військ."
  game_concept_unit_category_list_title: "Список родів військ"
  game_concept_unit_category_desc: "$game_concept_unit_category_upper_desc$\n[ShowDatabase('unit_category')]"
  game_concept_language: "Мова"
  game_concept_languages: "Мови"
  game_concept_language_desc: "У кожної [Concept('culture', 'культури')|e] є [Concept('language', 'мова')], якою можуть говорити представники й інших [Concept('cultures', 'культур')]. [Concept('language', 'Мова')] має [Concept('language_power', 'силу')|e] та деяку кількість [Concept('dialects', 'діалектів')|e], що визначають імена [Concept('character', 'персонажів')|e].\n\nУ [Concept('country', 'країни')|e] можуть бути окремі [Concept('court_language', 'придворна')|e] та [Concept('liturgical_language', 'літургійна')|e] мови, а її [Concept('common_language', 'загальноприйнята мова')|e] відповідає мові [Concept('primary_culture', 'основної культури')|e].\n\nДеякі мови входять до тієї чи іншої [Concept('language_family', 'мовної сім’ї')|e], тоді як інші [Concept('isolated_language_short', 'ізольовані')|e]."
  game_concept_isolated_language: "Ізольована мова"
  game_concept_isolated_languages: "Ізольовані мови"
  game_concept_isolated_language_short: "Ізольована"
  game_concept_isolated_language_desc: "[Concept('language', 'Мова')|e] вважається [Concept('isolated_language_short', 'ізольованою')], якщо вона не входить до [Concept('language_family', 'сім’ї')|e] інших [Concept('languages', 'мов')|e]."
  game_concept_language_family: "Мовна сім’я"
  game_concept_language_families: "Мовні сім’ї"
  game_concept_language_family_short: "Сім’я"
  game_concept_language_families_short: "Сім’ї"
  game_concept_language_family_desc: "Мовна сім’я — це сукупність [Concept('languages', 'мов')|e], об’єднаних спільним походженням і тому мають багато спільного.\n\nДеякі [Concept('languages', 'мови')] не входять до жодної [Concept('language_family_short', 'мовної сім’ї')] і тому вважаються [Concept('isolated_language', 'ізольованими')|e]."
  game_concept_dialect: "Діалект"
  game_concept_dialects: "Діалекти"
  game_concept_dialect_desc: "[Concept('dialect', 'Діалект')] — це різновид [Concept('language', 'мови')|e], яка впливає в основному на найменування — наприклад, визначає імена [Concept('characters', 'персонажів')|e] та назви [Concept('locations', 'місцевостей')|e]."
  game_concept_language_power: "Сила мови"
  game_concept_language_power_desc: "Сила [Concept('language', 'мови')|e] — це показник її поширеності, впливу та престижу, що виражається у відсотковому відношенні до найсильнішої мови у світі.\n\nРозраховується сила за загальною [Concept('political_power', 'політичною вагою')|e] [Concept('pops', 'груп населення')|e], що належать до [Concept('primary_culture', 'основної культури')|e] в тих [Concept('countries', 'країнах')|e], де ця мова є [Concept('court_language', 'придворною')|e], а також за кількістю священників, які сповідують [Concept('primary_religion', 'основну релігію')|e] в тих країнах, де ця мова є [Concept('liturgical_language', 'літургійною')|e].\n\nВелика сила [Concept('liturgical_language', 'літургійної мови')] прискорює [Concept('research', 'дослідження')|e]. Велика сила [Concept('court_language', 'придворної мови')] підвищує [Concept('estate_satisfaction', 'задоволення')|e] знаті."
  game_concept_dominant_language: "Домінуюча мова"
  game_concept_dominant_language_desc: "Домінуючою вважається [Concept('language', 'мова')|e], якою говорить більшість [Concept('pops', 'груп населення')|e] у [Concept('location', 'місцевості')|e].\nДомінування не є абсолютною перевагою."
  game_concept_dominant_dialect: "Домінуючий діалект"
  game_concept_dominant_dialect_desc: "Домінуючим вважається [Concept('dialect', 'діалект')|e], яким говорить більшість [Concept('pops', 'груп населення')|e] у [Concept('location', 'місцевості')|e].\nДомінування не є абсолютною перевагою."
  game_concept_ability: "Навичка"
  game_concept_abilities: "Навички"
  game_concept_ability_desc: "Навичка — це певна схильність [Concept('character', 'персонажа')|e]. Значення кожної навички знаходиться в діапазоні від 0 до 100. У новонароджених воно дорівнює нулю і поступово збільшується в міру дорослішання.\n\nЄ три види навичок:\n$BULLET_WITH_TAB$[Concept('adm_short', 'адміністративна')|e]\n$BULLET_WITH_TAB$[Concept('dip_short', 'дипломатична')|e]\n$BULLET_WITH_TAB$[Concept('mil_short', 'військова')|e]\n\nРазом вони складають [Concept('total_ability', 'суму навичок')|e] [Concept('character', 'персонажа')]."
  game_concept_liturgical_language: "Літургійна мова"
  game_concept_liturgical_languages: "Літургійні мови"
  game_concept_liturgical_language_desc: "Це офіційна [Concept('language', 'мова')|e], що використовується [Concept('country', 'країною')|e] у питаннях державної [Concept('religion', 'релігії')|e]. Деякі релігії, наприклад, #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, не дозволяють змінювати літургійну мову, а в інших це можливо. [Concept('language_power', 'Сила')|e] літургійної мови країни впливає на швидкість [Concept('research', 'дослідження')|e] нових [Concept('advances', 'поступів')|e]."
  game_concept_common_language: "Загальноприйнята мова"
  game_concept_common_languages: "Загальноприйняті мови"
  game_concept_common_language_desc: "Це [Concept('language', 'мова')|e] носіїв [Concept('primary_culture', 'основної культури')|e] в [Concept('country', 'країні')|e]. Якщо загальноприйнята мова збігається з [Concept('court_language', 'придворною')|e], [ShowEstateTypeName('peasants_estate')|l] будуть задоволені."
  game_concept_market_language: "Торгова мова"
  game_concept_market_language_desc: "Це [Concept('language', 'мова')|e], якою розмовляє більшість #TOOLTIP:POPTYPE,burghers,X #L містян#!#! у [Concept('market_center', 'ринковому центрі')|e].\n\nМістяни, які розмовляють місцевою торговою мовою, не стануть [Concept('assimilate', 'асимілюватися')|e] в [Concept('culture', 'культуру')|e], де не використовується ця мова."
  game_concept_foreign_language: "Чужа мова"
  game_concept_foreign_language_desc: "Чужою вважається [Concept('language', 'мова')|e], яка не є в [Concept('country', 'країні')|e] ані [Concept('common_language', 'загальноприйнятою')|e], ані [Concept('liturgical_language', 'літургійною')|e]."
  game_concept_court_language: "Придворна мова"
  game_concept_court_language_desc: "Це [Concept('language_with_icon', 'мова')|e] уряду [Concept('country_with_icon', 'країни')|e].\n\nМови можуть по-різному впливати на [Concept('estate_satisfaction', 'вдоволеність')|e] [Concept('estates', 'станів')|e]:\n$BULLET$ #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знаті#!#! до вподоби велика [Concept('language_power_with_icon', 'сила мови')|e].\n$BULLET$ #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L Духовенство#!#! віддає перевагу [Concept('liturgical_language_with_icon', 'літургійній мові')|e].\n$BULLET$ #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L Простолюд#!#! віддає перевагу [Concept('common_language_with_icon', 'загальноприйнятій мові')|e].\n$BULLET$ [Concept('trade_efficiency', 'Торгова ефективність')|e] підвищується при використанні [Concept('market_language_with_icon', 'торгової мови')|e] нашої [Concept('capital', 'столиці')].\n\n[Concept('language_power', 'Сила')] придворної мови збільшується разом із загальною [Concept('political_power', 'політичною вагою')|e] [Concept('pops', 'груп населення')|e], що належать до [Concept('primary_culture', 'основної культури')|e] країни.\n\nПридворну мову завжди можна змінити на [Concept('common_language', 'загальноприйняту')] або [Concept('liturgical_language', 'літургійну')], на мову [Concept('great_power', 'великої держави')|e], яка сповідує релігію з тієї ж [Concept('religion_group', 'групи')|e], що й ми, або на мову [Concept('overlord', 'сюзерена')|e]."
  game_concept_estates_enrichment: "Багатство стану"
  game_concept_estate_enrichment: "Багатство стану"
  game_concept_estates_enrichment_desc: "Це сума, яка щомісяця утримується з оподатковуваного доходу [Concept('estate', 'стану')|e]."
  game_concept_political_power: "Політична вага"
  game_concept_political_power_desc: "Політична вага — це вплив, яким [Concept('pops', 'групи населення')|e] володіють в [Concept('government', 'уряді')|e]. За цією вагою розраховується [Concept('estate_power', 'станова влада')|e] та [Concept('language_power', 'сила мови')|e], а також визначається [Concept('dominant_upper_class_culture', 'домінантна культура вищого суспільства')|e] [Concept('country', 'країни')|e].\n\nКожна [Concept('pop', 'група населення')] має політичну вагу залежно від її [Concept('estate', 'стану')|e]. Наприклад, #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! має в сотні разів більшу політичну вагу, ніж #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L селяни#!#!."
  game_concept_cultural_tradition: "Культурні традиції"
  game_concept_cultural_tradition_short: "Традиція"
  game_concept_cultural_tradition_desc: "Це оборонна сила [Concept('culture', 'культури')|e] в [Concept('culture_war', 'культурній війні')|e], що відображає близькість народу до своїх традицій.\n\nВони змінюються щомісяця — на це впливають відповідні [Concept('buildings', 'споруди')|e], [Concept('societal_values', 'суспільні цінності')|e], [Concept('advances', 'поступ')|e] та безліч інших чинників."
  game_concept_cultural_influence: "Культурний вплив"
  game_concept_cultural_influence_short: "Вплив"
  game_concept_cultural_influence_desc: "Це наступальна сила [Concept('culture', 'культури')|e] в [Concept('culture_war', 'культурній війні')|e]. Показує, наскільки культура вражає представників інших культур, а також яке її охоплення за межами власних кордонів.\n\nВплив зростає щомісяця при створенні [Concept('work_of_art', 'творів')|e], а також від багатьох інших чинників, наприклад [Concept('prestige', 'престижу')|e], певних [Concept('buildings', 'споруд')|e], [Concept('advances', 'поступу')|e] та [Concept('laws', 'законів')|e]. Слід пам'ятати, що за відсутності зовнішніх чинників вплив щомісяця слабшатиме."
  game_concept_culture_war_power: "Культурна міць"
  game_concept_culture_war: "Культурна війна"
  game_concept_culture_war_power_desc: "Це сила [Concept('cultural_influence', 'впливу')|e] наступаючої [Concept('culture', 'культури')|e] порівняно з [Concept('cultural_tradition', 'традиціями')|e] [Concept('culture', 'культури')], що обороняється від нападу.\n\nВелика культурна міць впливає на такі аспекти, як [Concept('assimilation', 'асиміляція')|e], [Concept('integration', 'інтеграція')|e], [Concept('spy_networks', 'шпигунські мережі')|e], [Concept('diplomacy', 'дипломатія')|e] і навіть [Concept('siege', 'облога')|e]."
  game_concept_climate: "Клімат"
  game_concept_climate_upper_desc: "Клімат [Concept('location', 'місцевості')|e] визначає, наскільки сприятливі умови для життя її [Concept('pops', 'груп населення')|e], зокрема скільки [Concept('food', 'їжі')|e] там можна виробити. Крім того, клімат впливає на максимальний [Concept('winter_level', 'рівень зими')|e] в [Concept('location', 'місцевості')].\n\nРізновиди клімату:"
  game_concept_climate_list_title: "Список різновидів клімату"
  game_concept_climate_desc: "$game_concept_climate_upper_desc$\n[ShowDatabase('climate')]"
  game_concept_immortality: "Безсмертя"
  game_concept_immortal: "Безсмертя"
  game_concept_immortality_desc: "Якщо [Concept('character', 'персонаж')|e] безсмертний, то він не помре від старості. Втім, на нього можуть чатувати інші небезпеки: наприклад, загибель у [Concept('battle', 'битві')|e] або, що страшніше, — внаслідок [Concept('disease', 'епідемії')|e]."
  game_concept_character: "Персонаж"
  game_concept_characters: "Персонажі"
  game_concept_character_desc: "Персонаж — це [Concept('person', 'людина')|e], яка володіє [Concept('abilities', 'навичками')|e] та [Concept('traits', 'властивостями')|e], є носієм [Concept('culture', 'культури')|e] та сповідує певну [Concept('religion', 'релігію')|e]. Персонажі шляхетного походження можуть бути членами [Concept('dynasty', 'династії')|e].\n\n[Concept('adult', 'Подорослішавши')|e], персонаж може стати [Concept('ruler', 'правителем')|e] або [Concept('regent', 'регентом')|e], отримати посаду в [Concept('cabinet', 'раді')|e], звання [Concept('general', 'полководця')|e] або [Concept('admiral', 'адмірала')|e].\n\n[Concept('adults', 'Дорослі')] персонажі також можуть [Concept('marry', 'вступати в шлюб')|e] та заводити [Concept('children', 'дітей')|e]."
  game_concept_courtier: "Придворний"
  game_concept_courtiers: "Придворні"
  game_concept_courtier_desc: "Будь-який [Concept('character', 'персонаж')|e] у [Concept('country', 'країні')|e], який не виконує певну [Concept('role', 'роль')|e], вважається придворним. Придворних можна наймати як [Concept('cabinet_members', 'радників')|e], [Concept('generals', 'полководців')|e], [Concept('admirals', 'адміралів')|e] або [Concept('explorers', 'дослідників')|e]."
  game_concept_fertility: "Фертильність"
  game_concept_fertility_desc: "Цей показник впливає на здатність [Concept('character', 'персонажа')|e] зачати дитину."
  game_concept_consort: "Консорт"
  game_concept_consorts: "Консорти"
  game_concept_spouse: "Чоловік або дружина"
  game_concept_spouses: "Подружжя"
  game_concept_consort_desc: "Консорт — це [Concept('character', 'персонаж')|e] у [Concept('married', 'шлюбі')|e] з [Concept('ruler', 'правителем')|e]. За певного державного устрою може отримати владу, однак у більшості випадків роль консорта зводиться до народження [Concept('heirs', 'спадкоємців')|e]."
  game_concept_heir: "Спадкоємець"
  game_concept_heirs: "Спадкоємці"
  game_concept_heir_desc: "Це [Concept('character', 'персонаж')|e], який наступним займе престол після того, як чинний [Concept('ruler', 'правитель')|e] помре або відречеться. Черговість визначається [Concept('heir_selection', 'правилами престолонаслідування')|e], які затверджує [Concept('government', 'уряд')|e].\n\nЯкщо до моменту переходу влади немає спадкоємців, здатних зайняти престол, або якщо спадкоємець ще [Concept('child', 'дитина')|e], починається період [Concept('regency', 'регентства')|e]."
  game_concept_dynasty: "Династія"
  game_concept_dynasties: "Династії"
  game_concept_dynasty_desc: "Це група персонажів, яких об'єднує спільне походження, тобто кровна спорідненість. Найважливіший [Concept('character', 'персонаж')|e] з цієї групи — [Concept('dynasty_head', 'глава династії')|e]."
  game_concept_dynastic_power: "Вплив династії"
  game_concept_dynastic_power_hausmacht: "Вплив династії"
  game_concept_dynastic_power_desc: "$game_concept_dynastic_power$ відображає політичну вагу [Concept('dynasty', 'династії')|e] в [Concept('international_organization', 'міжнародному об’єднанні')|e]. Цей показник відіграє особливо важливу роль у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській імперії#!#!. Його значення визначається множенням [Concept('great_power_score', 'рахунку великої держави')|e] на кількість [Concept('pops', 'груп населення')|e], якими [Concept('country', 'країна')|e] володіє як член [Concept('international_organization', 'міжнародного об’єднання')]."
  game_concept_dynasty_founder: "Засновник династії"
  game_concept_dynasty_founder_desc: "Засновник цієї [Concept('dynasty', 'династії')|e]."
  game_concept_dynasty_head: "Глава династії"
  game_concept_dynasty_head_desc: "Це найпрестижніший і найзначущий [Concept('character', 'персонаж')|e] у [Concept('dynasty', 'династії')|e]. [Concept('dialect', 'Діалект')|e] династії визначається діалектом її глави. Деякі [Concept('events', 'події')|e] та інші ігрові механіки можуть вимагати участі глави династії."
  game_concept_dynasty_seat: "Резиденція династії"
  game_concept_dynasty_seat_desc: "У кожної династії в певному [Concept('location', 'місцевості')|e] є своє родове помістя. У [Concept('locations', 'місцевостях')], де розташовуються такі помістя, живе більше #TOOLTIP:POPTYPE,nobles,X #L знаті#!#!."
  game_concept_lowborn: "Простолюд"
  game_concept_lowborn_desc: "Це [Concept('character', 'персонаж')|e], який не належить до жодної вартісної уваги [Concept('dynasty', 'династії')|e]."
  game_concept_government: "Уряд"
  game_concept_government_desc: "Це орган влади в кожній [Concept('country', 'країні')|e], який дотримується певної [Concept('government_type', 'форми правління')|e] та розташовується в [Concept('capital', 'столиці')|e].\n\nСкладається з [Concept('ruler', 'правителя')|e] та [Concept('cabinet', 'ради')|e], регулюється на основі [Concept('societal_values', 'суспільних цінностей')|e], [Concept('government_reforms', 'державних реформ')|e] та [Concept('laws', 'зводу правил')|e]."
  game_concept_government_type: "Форма правління"
  game_concept_government_types: "Форми правління"
  game_concept_government_type_upper_desc: "$game_concept_government_type$ визначає те, як влаштований уряд [Concept('country', 'країни')|e]. Головні чинники, що нею визначаються, — це [Concept('government_power', 'влада уряду')|e] та [Concept('heir_selections', 'правила престолонаслідування')|e]. $game_concept_government_type$ також відкриває доступ до певних [Concept('laws', 'законів')|e], [Concept('government_reforms', 'державних реформ')|e], [Concept('estate_privileges', 'станових привілеїв')|e] та [Concept('advances', 'поступу')|e]. Різновиди форм правління:"
  game_concept_government_type_list_title: "Список форм правління"
  game_concept_government_type_desc: "$game_concept_government_type_upper_desc$\n[ShowDatabase('government_type')]"
  game_concept_international_organization: "Міжнародне об'єднання"
  game_concept_international_organizations: "Міжнародні об'єднання"
  game_concept_international_organization_desc: "Це об'єднання кількох [Concept('countries', 'країн')|e] на основі будь-якої угоди. Іноді вони об'єднуються проти іншої [Concept('country', 'країни')]."
  game_concept_international_organization_type: "Тип міжнародного об'єднання"
  game_concept_international_organization_types: "Типи міжнародних об'єднань"
  game_concept_international_organization_type_upper_title: "Тип [Concept('international_organization', 'міжнародного об'єднання')|e] визначає його устрій, наприклад, можливі взаємодії з цим об'єднанням або відносини з лідером."
  game_concept_international_organization_type_upper_desc: "Кожне міжнародне об'єднання належить до одного з таких типів:"
  game_concept_international_organization_type_list_title: "Список типів міжнародних об'єднань"
  game_concept_international_organization_type_desc: "$game_concept_international_organization_type_upper_title$\n\n$game_concept_international_organization_type_upper_desc$\n[ShowDatabaseWithIcon('international_organization_type')]"
  game_concept_member: "Учасник"
  game_concept_members: "Учасники"
  game_concept_member_desc: "Це [Concept('countries', 'країна')|e], яка входить до [Concept('international_organization', 'міжнародного об'єднання')|e]."
  game_concept_elector: "Виборник"
  game_concept_electors: "Виборники"
  game_concept_electorship: "Виборче право"
  game_concept_elector_desc: "Це [Concept('members', 'учасник')|e], який користується [Concept('special_status', 'особливим статусом')|e], що дозволяє обирати наступного [Concept('international_organization_leader_short', 'лідера')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]."
  game_concept_imperial_religion: "Імперська релігія"
  game_concept_imperial_religion_imperial: "Імперська"
  game_concept_imperial_religion_desc: "Імперська релігія визначає, яку [Concept('religion', 'релігію')|e] повинен сповідувати [Concept('member', 'учасник')|e], щоб цю країну могли обрати [Concept('international_organization_leader_short', 'лідером')|e] [Concept('holy_roman_empire', 'Священної Римської Імперії')|e]. Імперську релігію також можна виділити в окрему [Concept('religion_group', 'релігійну групу')|e] або взагалі скасувати, виключивши таким чином її як важливий чинник у процесі голосування."
  game_concept_leader_type: "Тип лідера"
  game_concept_leader_type_desc: "Визначає, ким є [Concept('international_organization_leader_short', 'лідер')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]. Існує три типи таких лідерів:\n$BULLET$#Y  $LEADER_TYPE_CHARACTER$#! — об’єднання очолюється [Concept('character', 'персонажем')|e] та його країною.\n$BULLET$#Y  $LEADER_TYPE_COUNTRY$#! — об’єднання очолюється певною [Concept('country', 'країною')|e], яка залишається на чолі об’єднання, навіть якщо змінюється її власний [Concept('ruler', 'правитель')|e].\n$BULLET$#Y  $LEADER_TYPE_NONE$#! — об’єднання перебуває в стані безперервного безвладдя, і ні персонаж, ні країна не можуть його представляти."
  game_concept_leader_change_method: "Спосіб зміни лідера"
  game_concept_leader_change_method_desc: "Визначає, за яким принципом обирається [Concept('international_organization_leader_short', 'лідер')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]. Існує п’ять способів зміни лідера:\n• #Y $LEADER_CHANGE_METHOD_ROTATION$#! — чинний лідер стає останнім у черзі на переобрання після завершення свого терміну на цій посаді.\n• #Y $LEADER_CHANGE_METHOD_VOTE$#! — лідер визначається на основі [Concept('leadership_election_resolution', 'резолюції про вибір лідера')|e].\n• #Y $LEADER_CHANGE_METHOD_LOTTERY$#! — лідер обирається з-поміж можливих кандидатів випадковим чином.\n• #Y $LEADER_CHANGE_METHOD_SCORE$#! — лідер обирається на основі внутрішньої системи очок, що діє в конкретному міжнародному об’єднанні.\n• #Y $LEADER_CHANGE_METHOD_NONE$#! — порядок обрання лідера не визначений, оскільки лідер не потрібен або міжнародне об’єднання ще не затвердило правила його визначення."
  game_concept_leader_change_trigger: "Умова зміни лідера"
  game_concept_leader_change_trigger_desc: "Визначає умови, за яких змінюється [Concept('international_organization_leader_short', 'лідер')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]. Існує три умови зміни лідера:\n• #Y $LEADER_CHANGE_TRIGGER_TYPE_RULER_CHANGE$#! — щойно лідер змінюється, починається розгляд кандидатури нового лідера.\n• #Y $LEADER_CHANGE_TRIGGER_TYPE_TIMED$#! — кандидатура нового лідера розглядається після закінчення певної кількості місяців.\n• #Y $LEADER_CHANGE_TRIGGER_TYPE_NONE$#! — лідер залишається при владі без обмеження терміну повноважень."
  game_concept_leadership_election_resolution: "Резолюція про вибір лідера"
  game_concept_leadership_election_resolution_desc: "Це особлива [Concept('resolution', 'резолюція')|e], яка приймається для визначення порядку обрання [Concept('international_organization_leader_short', 'лідера')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]."
  game_concept_candidate: "Кандидат"
  game_concept_candidates: "Кандидати"
  game_concept_candidate_desc: "Це [Concept('countries', 'країна')|e], яку розглядають на роль наступного [Concept('international_organization_leader_short', 'лідера')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]."
  game_concept_free_city: "Вільне місто"
  game_concept_free_cities: "Вільні міста"
  game_concept_free_imperial_city: "Вільне імперське місто"
  game_concept_free_imperial_cities: "Вільні імперські міста"
  game_concept_free_city_desc: "$free_city_desc$"
  game_concept_god: "Бог"
  game_concept_gods: "Боги"
  game_concept_goddess: "Богиня"
  game_concept_goddesses: "Богині"
  game_concept_god_desc: "Бог, богиня або божество — це надприродна істота, якій поклоняються прихильники тієї чи іншої релігії. Богам зазвичай приписується влада над різними аспектами цього світу або людського життя."
  game_concept_avatar: "Аватар"
  game_concept_avatars: "Аватари"
  game_concept_avatar_desc: "Аватар — це втілення або прояв конкретного [Concept('god', 'божества')|e] в уявленні прихильників #L [ShowReligionName('hindu')|l]у#!."
  game_concept_disease: "Епідемія"
  game_concept_diseases: "Епідемії"
  game_concept_disease_desc: "Епідемія може сильно вдарити по [Concept('people', 'людях')|e]. Епідемії можуть мати різні шанси виникнення [Concept('outbreak', 'спалахів')|e], способи та ймовірність поширення, а також рівень смертності. Чим вища [Concept('disease_resistance', 'опірність епідеміям')|e], тим меншої шкоди вони можуть завдати."
  game_concept_disease_outbreak: "Спалах епідемії"
  game_concept_disease_outbreaks: "Спалахи епідемії"
  game_concept_outbreak: "Спалах"
  game_concept_disease_outbreak_desc: "Коли в певному [Concept('location', 'місцевості')|e] відбувається спалах [Concept('disease', 'епідемії')|e], зараза може поширитися, забираючи на своєму шляху життя… або майже не завдаючи шкоди."
  game_concept_holy_site: "Святиня"
  game_concept_holy_sites: "Святині"
  game_concept_holy_site_desc: "Це особливо важливе місце для прихильників відповідної [Concept('religion', 'релігії')|e]. Святиня може надавати різноманітні бонуси [Concept('location', 'місцевості')|e] або [Concept('owner', 'власнику')|e] залежно від її [Concept('holy_site_importance_short', 'значущості')|e]."
  game_concept_holy_site_type: "Тип святині"
  game_concept_holy_site_types: "Типи святинь"
  game_concept_holy_site_type_short: "Тип"
  game_concept_holy_site_types_short: "Типи"
  game_concept_holy_site_type_upper_desc: "Кожна [Concept('holy_site', 'святиня')|e] належить до одного з таких типів:"
  game_concept_holy_site_type_list_title: "Список типів святинь"
  game_concept_holy_site_type_desc: "$game_concept_holy_site_type_upper_desc$\n[ShowDatabase('holy_site_type')]"
  game_concept_holy_site_importance: "Значущість святині"
  game_concept_holy_site_importance_short: "Значущість"
  game_concept_holy_site_importance_desc: "Значущість [Concept('holy_site', 'святині')|e] визначає величину бонусів, що надаються [Concept('location', 'місцевості')|e] або [Concept('owner', 'власнику')|e]."
  game_concept_heir_selection: "Правило престолонаслідування"
  game_concept_heir_selections: "Правила престолонаслідування"
  game_concept_succession_law: "Правило престолонаслідування"
  game_concept_heir_selection_desc: "Кожен [Concept('government', 'уряд')|e] задає правила престолонаслідування, що визначають, який [Concept('character', 'персонаж')|e] стане наступним [Concept('ruler', 'правителем')|e], коли чинний помре або зречеться.\n\nПравила престолонаслідування різняться: десь [Concept('heir', 'спадкоємець')|e] стає відомий ще до переходу влади згідно з [Concept('heir_selection_score', 'рахунком спадкоємця')|e], десь проводяться [Concept('election', 'вибори')|e].\n\nІноді правила престолонаслідування такі, що спадкоємець має належати до тієї ж [Concept('dynasty', 'династії')|e] або конкретного [Concept('estates', 'стану')|e].\n\n[Concept('country', 'Країна')|e] може обирати власні правила престолонаслідування. Доступні варіанти залежать від таких чинників, як поточна [Concept('government_type', 'форма правління')|e] та чинні [Concept('government_reforms', 'державні реформи')|e]."
  game_concept_heir_selection_score: "Рахунок спадкоємця"
  game_concept_heir_selection_score_short: "Рахунок"
  game_concept_heir_selection_score_desc: "$game_concept_heir_selection_score$ визначає ймовірність обрання [Concept('character', 'персонажа')|e] спадкоємцем відповідно до [Concept('heir_selection', 'правил престолонаслідування')|e] [Concept('country', 'країни')|e]. Зазвичай персонаж із найбільшим рахунком стає новим [Concept('ruler', 'правителем')|e] після зміни влади."
  game_concept_eligibility_rules: "Правила відповідності"
  game_concept_eligibility_rules_desc: "$game_concept_eligibility_rules$ визначають, який [Concept('characters', 'персонаж')|e] має право стати [Concept('heir', 'спадкоємцем')|e] [Concept('country', 'країни')|e] за її [Concept('heir_selection', 'правилами престолонаслідування')|e]."
  game_concept_election: "Вибори"
  game_concept_elections: "Вибори"
  game_concept_election_desc: "Деякі [Concept('heir_selections', 'правила престолонаслідування')|e] вимагають проведення виборів. На них визначається [Concept('character', 'персонаж')|e], який стане наступним [Concept('ruler', 'правителем')|e].\n\nЗалежно від [Concept('heir_selection', 'правил престолонаслідування')] вибори можуть відбуватися як регулярно, так і після смерті попереднього [Concept('ruler', 'правителя')].\n\nЯкщо [Concept('ruler', 'правителя')] немає, [Concept('government', 'уряд')|e] очолить регент. Період [Concept('regency', 'регентства')|e] триватиме доти, доки не завершаться вибори."
  game_concept_people: "Люди"
  game_concept_person: "Людина"
  game_concept_people_desc: "Це частково поновлюваний ресурс. Люди можуть складати [Concept('pops', 'групи населення')|e] або бути [Concept('characters', 'персонажами')|e]."
  game_concept_population_growth: "Приріст населення"
  game_concept_population_growth_desc: "Приріст серед [Concept('pops', 'груп населення')|e] у [Concept('location', 'місцевості')|e] — це щомісячне співвідношення числа народжених до числа померлих. Брак [Concept('food', 'їжі')|e], поширення епідемії, [Concept('siege', 'облога')|e] та інші негаразди можуть підвищувати смертність."
  game_concept_pop: "Група населення"
  game_concept_pops: "Групи населення"
  game_concept_pop_desc: "Група населення — це [Concept('people', 'люди')|e], що належать до одного [Concept('pop_type', 'суспільного класу')|e], однієї [Concept('religion', 'релігії')|e] та [Concept('culture', 'культури')|e]. Вони потребують різних [Concept('goods', 'товарів')|e], а [Concept('pop_satisfaction', 'задоволення їхньої групи')|e] впливає на ту [Concept('location', 'місцевість')|e], де вони живуть."
  game_concept_upper_class: "Вище суспільство"
  game_concept_upper_class_desc: "Ця категорія [Concept('pop_types', 'суспільних класів')|e] характеризує [Concept('estates', 'стани')|e] з найбільшим впливом у [Concept('country', 'країні')|e] та належить до одного з таких [Concept('pop_types', 'класів')]:\n$BULLET_WITH_TAB$[ShowPopTypeName('nobles')]\n$BULLET_WITH_TAB$[ShowPopTypeName('clergy')]\n$BULLET_WITH_TAB$[ShowPopTypeName('burghers')]"
  game_concept_lower_class: "Нижче суспільство"
  game_concept_lower_class_desc: "Ця категорія [Concept('pop_types', 'суспільних класів')|e] характеризує низи в структурі суспільства та належить до одного з таких [Concept('pop_types', 'класів')]:\n$BULLET_WITH_TAB$[ShowPopTypeName('peasants')]\n$BULLET_WITH_TAB$[ShowPopTypeName('slaves')]"
  game_concept_promote: "Підвищення"
  game_concept_promoted: "Підвищені"
  game_concept_promotes: "Підвищує"
  game_concept_promotion: "Підвищення"
  game_concept_promote_desc: "[Concept('pops', 'Групи населення')|e] можуть [Concept('promote', 'піднятися')|e] з #TOOLTIP:POPTYPE,peasants,X #L селян#!#!, якщо в [Concept('location', 'місцевості')|e] є відповідні для них посади. Для підвищення група населення повинна належати хоча б до [Concept('tolerated_culture', 'прийнятної культури')|e]."
  game_concept_demoted: "Понижені"
  game_concept_demotion: "Пониження"
  game_concept_demote: "Пониження"
  game_concept_demote_desc: "[Concept('pops', 'Групи населення')|e] можуть отримати пониження до типу «[ShowPopTypeName('peasants')|l]», коли в [Concept('location', 'місцевості')|e] вже занадто багато представників їхнього поточного [Concept('pop_type', 'суспільного класу')|e]."
  game_concept_pop_type: "Суспільний клас"
  game_concept_pop_types: "Суспільні класи"
  game_concept_pop_type_upper_desc: "Кожна [Concept('pop', 'група населення')|e] належить до одного з наступних суспільних класів:"
  game_concept_pop_type_list_title: "Список суспільних класів"
  game_concept_pop_type_desc: "$game_concept_pop_type_upper_desc$\n[ShowDatabase('pop_type')]"
  game_concept_good: "Товар"
  game_concept_goods: "Товари"
  game_concept_goods_desc: "Це або [Concept('raw_materials', 'ресурси')|e], які видобуваються в дикій природі, на фермах, у шахтах, на лісозаготівлях або на полюванні, або [Concept('produced_goods', 'вироблені товари')|e], які виготовляються насамперед у містах.\n\nТакож товарами можуть бути [Concept('food_raw_materials', 'ресурси для виробництва')|e] [Concept('food', 'їжі')|e]."
  game_concept_raw_materials: "Сировинні товари"
  game_concept_raw_material: "Сировина"
  game_concept_raw_materials_desc: "У кожній [Concept('location', 'місцевості')|e] [Concept('produces', 'виробляється')|e] один тип ресурсів, а їх кількість залежить від рівня розвитку [Concept('location', 'місцевості')|e]. Ресурси відрізняються від [Concept('produced_goods', 'вироблених товарів')|e] тим, що для їх виробництва не завжди потрібні [Concept('buildings', 'споруди')|e], достатньо [Concept('rgo_pops', 'селян або рабів')|e]. Проте бувають ресурси, для виробництва яких не обійтися без [Concept('buildings', 'споруд')]."
  game_concept_produced_goods: "Вироблені товари"
  game_concept_produced_good: "Вироблений товар"
  game_concept_produced_goods_desc: "Цей вид [Concept('goods', 'товарів')|e] створюють [Concept('pops', 'групи населення')|e], які працюють у [Concept('building', 'спорудах')|e]. Часто виробництво в таких спорудах вимагає [Concept('raw_materials', 'ресурсів')|e] або інших вироблених товарів."
  game_concept_rgo: "Видобуток ресурсів"
  game_concept_resource_gathering_operations: "Видобуток ресурсів"
  game_concept_rgo_desc: "У кожній [Concept('location', 'місцевості')|e] є свої [Concept('raw_material', 'ресурси')|e], що видобуваються збиранням та полюванням, у шахтах, на лісозаготівлях та на фермах.\n\nКожен рівень видобутку ресурсів дозволяє [Concept('employ', 'найняти')|e] до #V 1000#! [Concept('rgo_pops', 'робітників або рабів')|e]. На максимальний рівень видобутку впливають [Concept('development', 'розвиток')|e], [Concept('advances', 'поступ')|e] та інші чинники."
  game_concept_prosperity: "Процвітання"
  game_concept_prosperity_desc: "Це рівень добробуту [Concept('location', 'місцевості')|e]. У процвітаючих місцевостях поступово зростає показник [Concept('development', 'розвитку')|e], і в них охочіше [Concept('migration', 'мігрує')|e] населення.\n\nПроцвітання поступово підвищується саме по собі, але може й знижуватися під впливом таких чинників, як низьке [Concept('pop_satisfaction', 'задоволення груп населення')|e], [Concept('diseases', 'епідемії')|e], [Concept('sieges', 'облоги')|e], [Concept('blockades', 'блокади')|e], [Concept('occupation', 'окупація')|e] та [Concept('looted', 'розграбування')|e] ворожими [Concept('army', 'військами')|e]. Занадто низький показник процвітання завдає серйозної шкоди [Concept('population', 'населенню')|e] [Concept('location', 'місцевості')]."
  game_concept_development: "Розвиток"
  game_concept_development_desc: "Це рівень обробки та використання землі, на якій живуть [Concept('pops', 'групи населення')|e]. Чим вищий розвиток, тим більше людей можуть жити в місцевості і тим більше користі вона приносить."
  game_concept_control: "Контроль"
  game_concept_control_desc: "Контроль [Concept('owner', 'власника')|e] над [Concept('location', 'місцевістю')|e] визначає [Concept('tax_base', 'податкову базу')|e], [Concept('army_levies', 'військове ополчення')|e] та [Concept('navy_levies', 'флотське ополчення')|e] в [Concept('location', 'місцевості')]. Він також впливає на швидкість [Concept('promotion', 'підвищення')|e], [Concept('assimilation', 'асиміляції')|e] та [Concept('conversion', 'навернення')|e], а також на щомісячне [Concept('manpower', 'число рекрутів')|e] та [Concept('sailors', 'моряків')|e]. Контроль над місцевістю поступово зміщується в бік [Concept('max_control', 'максимального значення')|e]. Іншими словами, він зменшуватиметься, якщо перевищує максимальне значення, або збільшуватиметься, якщо він нижчий за максимальне.\n\nДеякі [Concept('buildings', 'споруди')|e] збільшують максимальне значення контролю, але найбільше воно залежить від [Concept('proximity', 'досяжності')|e] місцевості по відношенню до [Concept('capital', 'столиці')|e] [Concept('country', 'країни')|e]. Прокладаючи [Concept('roads', 'дороги')|e] та збільшуючи [Concept('maritime_presence', 'морську присутність')|e] вздовж берегів, можна збільшити [Concept('proximity', 'досяжність')|e] до столиці та підвищити [Concept('max_control', 'максимальний контроль')] над [Concept('location', 'місцевістю')]."
  game_concept_max_control: "Максимальний контроль"
  game_concept_max_control_desc: "[Concept('control', 'Контроль')] над [Concept('location', 'місцевістю')] поступово зміщуватиметься в бік максимального значення. Цей показник в основному визначається [Concept('proximity', 'досяжністю')|e] по відношенню до столиці, однак [Concept('integration_status', 'статус інтеграції')|e] та [Concept('pop_satisfaction', 'задоволення населення')|e] теж впливають на нього.\n\nМаксимальний контроль над місцевістю можна тимчасово підвищити, розмістивши військо в його [Concept('province', 'провінції')|e], а також за допомогою [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,increase_control_province,X #L «Посилення контролю над провінцією»#!#!."
  game_concept_power_projection: "Дипломатична вага"
  game_concept_power_projection_desc: "[Concept('countries', 'Країни')|e] з великою дипломатичною вагою можуть експлуатувати слабші країни. Якщо ми перевершуємо іншу країну в дипломатичній вазі, то зможемо будувати #TOOLTIP:BUILDING_TYPE,trade_office,X #L торгові контори#!#!, #TOOLTIP:BUILDING_TYPE,slave_center,X #L центри работоргівлі#!#!, #TOOLTIP:BUILDING_TYPE,missionary_building,X #L місії#!#! та інші специфічні споруди в її [Concept('locations', 'місцевостях')|e]. Чим більша наша дипломатична вага, тим швидше наші [Concept('colonial_charters', 'колоніальні поселення')|e] встановлять контроль над відповідними місцевостями. Крім того, більша дипломатична вага зменшує витрати [Concept('stability', 'стабільності')|e] та зростання [Concept('war_exhaustion', 'втоми від війни')|e] при оголошенні [Concept('war', 'війни')|e] країні з меншою вагою."
  game_concept_proximity: "Досяжність"
  game_concept_proximity_desc: "Досяжність [Concept('location_with_icon', 'місцевості')|E] — показник її близькості до [Concept('capital_with_icon', 'столиці')|E] [Concept('owner', 'власника')|E]. Від досяжності залежить ступінь [Concept('control_with_icon', 'контролю')|E] над [Concept('locations', 'місцевостями')].\n\n[Concept('proximity', 'Досяжність')] поширюється зі [Concept('capital', 'столиці')] кожної [Concept('country', 'країни')|E], де її показник становить #high 100%#!, на найближчі [Concept('location', 'місцевості')], які теж отримують певне значення [Concept('proximity', 'досяжності')]. З кожним наступним кроком частина поширюваної [Concept('proximity', 'досяжності')] втрачається. Витрати на поширення з однієї [Concept('location', 'місцевості')] в іншу залежать від ландшафту та інфраструктури [Concept('location', 'місцевості')].\n\nВитрати досяжності можуть сильно відрізнятися: на них впливають [Concept('topography_with_icon', 'рельєф')|E] та [Concept('vegetation_with_icon', 'флора')|E] [Concept('locations', 'місцевостей')]. Щоб знизити витрати на суші, прокладайте [Concept('roads_with_icon', 'дороги')|E], прискорюйте [Concept('development_with_icon', 'розвиток')|E] та прийміть [Concept('societal_value_with_icon', 'суспільну цінність')|E] «[ShowSocietyDirectionName('land')]». Щоб знизити витрати на морі, збільшуйте [Concept('harbor_capacity_with_icon', 'розмір гавані')|E], нарощуйте [Concept('maritime_presence_with_icon', 'морську присутність')|E] та прийміть [Concept('societal_value', 'суспільну цінність')] «[ShowSocietyDirectionName('naval')]»."
  game_concept_output: "Обсяг випуску"
  game_concept_produce: "Виробництво"
  game_concept_produces: "Виробляє"
  game_concept_producing: "Виробництво"
  game_concept_output_desc: "Це кількість [Concept('goods', 'товарів')|e], створюваних у [Concept('building', 'споруді')|e], — як [Concept('produced_goods', 'вироблених товарів')|e], так і [Concept('raw_materials', 'ресурсів')|e], що видобуваються в [Concept('location', 'місцевості')|e]."
  game_concept_foreign_building: "Чужа споруда"
  game_concept_foreign_buildings: "Чужі споруди"
  game_concept_foreign_building_desc: "Це [Concept('building', 'споруда')|e], яка належить іншій [Concept('country', 'країні')|e], а не [Concept('owner', 'власнику')|e] [Concept('location', 'місцевості')|e]."
  game_concept_building: "Споруда"
  game_concept_buildings: "Споруди"
  game_concept_building_desc: "Споруди — це унікальні приклади будівель різного [Concept('building_types', 'типу')|e] в [Concept('location', 'місцевості')|e].\n\nСпоруди виконують безліч функцій — від зростання [Concept('supply', 'пропозиції')|e] вироблених там [Concept('goods', 'товарів')|e] до відкриття доступу до унікальних [Concept('unit_types', 'типів військ')|e]. На ефективність споруди впливає кількість [Concept('pops', 'груп населення')|e], [Concept('employed', 'найнятих')|e] для роботи.\n\nЩоб побудувати більшість споруд, потрібне [Concept('gold', 'золото')|e], а після зведення вони збільшують [Concept('demand', 'попит')|e] щодо певних [Concept('goods', 'товарів')] на [Concept('market', 'ринку')|e] [Concept('location', 'місцевості')]. Якщо споруда стає збитковою, [Concept('owner', 'власник')|e] може її [Concept('subsidize', 'субсидувати')|e].\n\n[Concept('estates', 'Стани')|e] теж можуть зводити свої споруди.\n\nКрім того, споруди можна знищувати.\n\nСпоруда має один або кілька [Concept('production_methods', 'методів виробництва')|e], які можна змінювати, щоб впливати на обсяг випуску."
  game_concept_building_type: "Тип споруди"
  game_concept_building_types: "Типи споруд"
  game_concept_building_type_desc: "Тип споруди — це різновид [Concept('building', 'споруди')|e] з певної [Concept('building_category', 'категорії')|e]. Більшість функцій [Concept('building', 'споруди')] залежить від її типу."
  game_concept_building_category: "Категорія споруди"
  game_concept_building_categories: "Категорії споруд"
  game_concept_building_category_desc: "[Concept('building_types', 'Типи споруд')|e] об’єднані в різні категорії за схожістю своїх функцій."
  game_concept_supported_building_levels: "Допустимий рівень споруд"
  game_concept_supported_building_levels_desc: "Для кожного [Concept('location', 'місцевості')|e] встановлено обмеження за рівнем [Concept('building', 'споруд')|e]. Якщо його перевищити, ціни на будівництво збільшуються.\n\nОбмеження за рівнем споруд насамперед залежить від [Concept('location_rank', 'рангу')|e] та [Concept('development', 'розвитку')|e] [Concept('location', 'місцевості')].\n\n[Concept('building', 'Споруди')|e] без працівників не враховуються в обмеженні за рівнем споруд."
  game_concept_building_maintenance: "Утримання споруди"
  game_concept_building_maintenance_desc: "[Concept('owner', 'Власник')] повинен оплачувати утримання [Concept('buildings', 'споруд')], що не виробляють [Concept('goods', 'товари')|e]. Сума залежить від [Concept('market', 'ринкової')|e] ціни [Concept('goods', 'товарів')], що використовуються в споруді, а також від [Concept('crown_power', 'влади правителя')|e], якою володіє власник."
  game_concept_employ: "Наймання"
  game_concept_employed: "Найняті"
  game_concept_employment: "Зайнятість"
  game_concept_employ_desc: "[Concept('pops', 'Групи населення')|e] можна наймати на роботу в [Concept('building', 'споруді')|e] або на [Concept('rgo', 'видобуток ресурсів')|e]. Споруда вміщує представників лише одного [Concept('pop_type', 'суспільного класу')|e], а максимальна кількість працівників залежить від типу та рівня споруди."
  game_concept_unemploy: "Доступне населення"
  game_concept_unemployed: "Незайняті"
  game_concept_available: "Доступні"
  game_concept_available_population: "Незайняте населення"
  game_concept_unemploy_desc: "[Concept('pops', 'Групи населення')|e] можна [Concept('employed', 'наймати')|e] на роботу в [Concept('building', 'споруді')|e] або на [Concept('rgo', 'видобуток ресурсів')|e]. Населення, не залучене до роботи, вважається доступним для наймання, тобто незайнятим."
  game_concept_peasant_enfranchisement: "$MODIFIER_TYPE_NAME_global_peasant_enfranchisment$"
  game_concept_peasant_enfranchisement_desc: "$MODIFIER_TYPE_DESC_global_peasant_enfranchisment$\n\nЗвільнення здебільшого залежить від [Concept('societal_value_with_icon', 'суспільної цінності')|e] #TOOLTIP:SOCIETAL_VALUE,serfdom_vs_free_subjects,X #L «Особиста свобода»#!#!. Як правило, у [Concept('towns_and_cities', 'міських місцевостях')|e] значення цього показника вище, ніж у [Concept('rural_locations', 'сільських')|e], проте на нього також впливають деякі [Concept('buildings', 'споруди')|e]."
  game_concept_foreign: "Чужа місцевість"
  game_concept_foreign_desc: "Цією [Concept('location', 'місцевістю')|e] володіє [Concept('country', 'країна')|e], за яку граєте не ви."
  game_concept_estate: "Стан"
  game_concept_estates: "Стани"
  game_concept_estate_type: "Тип стану"
  game_concept_estate_types: "Типи станів"
  game_concept_estate_desc: "Це група людей з особливими інтересами у складі [Concept('country_with_icon', 'країни')|E]. Стани мають низку показників: [Concept('estate_power_with_icon', 'влада')|E] відображає рівень їхнього політичного впливу в уряді, [Concept('estate_satisfaction_with_icon', 'задоволення')|E] — ступінь задоволення їхніх потреб, а [Concept('estate_opinions', 'думка')|E] — їхнє ставлення до інших країн.\n\nУряд може наділяти стани [Concept('estate_privileges_with_icon', 'привілеями')|E] — особливими правами, що посилюють їхні позиції в суспільстві, — які, втім, не завжди вдається зберегти. Взамін [Concept('estates', 'стани')] платять [Concept('country', 'країні')] [Concept('taxes_with_icon', 'податки')|E], а також служать в [Concept('army_levies_with_icon', 'військовому')|E] та [Concept('navy_levies_with_icon', 'флотському ополченні')|E].\n\nКрім того, стани відповідальні за збір [Concept('tax_base_with_icon', 'податків')|E] у [Concept('locations_with_icon', 'місцевостях')|E], забезпечують частину доходів від [Concept('trade', 'торгівлі')|E], фінансують будівництво [Concept('buildings_with_icon', 'споруд')|E] та виділяють кошти на задоволення [Concept('pop_needs_with_icon', 'потреб населення')|E]. За низького показника [Concept('estate_satisfaction', 'задоволення')] стани зводять лише споруди, що зміцнюють їхню власну [Concept('estate_power', 'владу')].\n\nКожен [Concept('character_with_icon', 'персонаж')|E] є представником одного зі станів. Засідаючи в [Concept('cabinet_with_icon', 'раді')|E], командуючи [Concept('armies', 'військом')|E] або [Concept('navies', 'флотом')|E], персонаж підвищує вплив своєї групи. Деякі [Concept('heirs', 'спадкоємці')|E] можуть належати лише до певного стану згідно з [Concept('heir_selections', 'правилами престолонаслідування')|E]."
  game_concept_estate_opinion: "Думка стану"
  game_concept_estate_opinions: "Думки станів"
  game_concept_estate_opinion_desc: "У станів [Concept('country', 'країни')|e] є певне ставлення до інших країн. Проти одних вони налаштовані [Concept('hostile', 'вороже')|e], з іншими хочуть подружитися — на догоду своїм потребам."
  game_concept_food: "Їжа"
  game_concept_food_desc: "Їжа дозволяє [Concept('armies', 'військам')|e] воювати, а [Concept('pops', 'населенню')|e] — виживати. Без неї військам загрожує [Concept('attrition', 'виснаження')|e], а населенню — [Concept('starvation', 'голод')|e]. [Concept('food_raw_materials', 'Ресурси для виробництва їжі')|e] є основним джерелом їжі, хоча деякі [Concept('buildings', 'споруди')|e] також відіграють у цьому певну роль.\n\nЄ три рівні виробництва та розподілу їжі:\n\n@location! [Concept('local_food', 'Місцева їжа')|e]\nЇжа виробляється та споживається в [Concept('locations', 'місцевостях')|e], а її надлишок або дефіцит додається до запасу їжі в провінції.\n\n@province! [Concept('provincial_food', 'Запас їжі в провінції')|e]\nЦе найважливіший рівень. Якщо [Concept('province', 'провінція')|e] не виробляє достатньо їжі для забезпечення всіх своїх місцевостей, запас їжі в провінції скорочується. Як тільки цей запас повністю вичерпається, всі місцевості провінції почнуть страждати від [Concept('starvation', 'голоду')|e]. Але перш ніж це станеться, провінція спробує [Concept('buy_food', 'купити їжу')|e] на ринку.\n\n@market! [Concept('market_food', 'Їжа на ринку')|e]\nУсі провінції на [Concept('market', 'ринку')|e] прагнуть [Concept('sell_food', 'продати їжу')|e] при надлишку запасів і [Concept('buy_food', 'купити')] її при нестачі. Поки на ринку вистачає їжі, голод не загрожує нікому."
  game_concept_monthly_food: "Щомісячний залишок їжі"
  game_concept_monthly_food_desc: "Будь-яка [Concept('food', 'їжа')|e], не з'їдена населенням тієї чи іншої території, поповнює [Concept('provincial_food', 'запас їжі в провінції')|e]."
  game_concept_local_food: "Місцева їжа"
  game_concept_local_food_desc: "Це кількість [Concept('food', 'їжі')|e], якою [Concept('location', 'місцевість')|e] поповнює [Concept('provincial_food', 'запас їжі в провінції')|e]. Якщо вона від'ємна, то місцевість забирає їжу в інших місцевостей у своїй [Concept('province', 'провінції')|e].\n\nКожна місцевість виробляє певні види їжі залежно від того, яким [Concept('subsistence_agriculture', 'натуральним господарством')|e] та [Concept('food_productivity', 'ефективністю виробництва їжі')|e] вона володіє, проте більшу її частину виробляють місцевості, які мають [Concept('food_raw_materials', 'ресурси для виробництва їжі')|e].\n\nКожна місцевість також відрізняється показниками [Concept('pop_food_consumption', 'споживання їжі')|e] залежно від свого [Concept('population', 'населення')|e].\n\nКількість місцевої їжі в [Concept('towns_and_cities', 'містах')|e] часто від'ємна, але це не страшно, поки провінція має її достатні запаси."
  game_concept_provincial_food: "Запас їжі в провінції"
  game_concept_provincial_food_desc: "Це кількість [Concept('food', 'їжі')|e], яка зберігається в [Concept('province', 'провінції')|e]. Якщо [Concept('monthly_food', 'щомісячний залишок їжі')|e] від'ємний, то вона рано чи пізно закінчиться. Якщо виник дефіцит, провінція буде [Concept('buy_food', 'купувати їжу')|e] на місцевому [Concept('market', 'ринку')|e], а якщо надлишок — то [Concept('sell_food', 'продавати її')|e].\n\nБудь-яка [Concept('food', 'їжа')], не з'їдена [Concept('pops', 'населенням')|e] [Concept('location', 'місцевості')|e], поповнює запас їжі в провінції.\n\nУсі території провінції можуть брати їжу з цього запасу, щоб годувати своїх жителів. [Concept('armies', 'Війська')|e], розташовані в провінції, також можуть брати їжу із запасу, щоб уникнути голодного [Concept('attrition', 'виснаження')|e]."
  game_concept_market_food: "Їжа на ринку"
  game_concept_market_food_desc: "Кожна [Concept('province', 'провінція')|e] [Concept('buy_food', 'купує')|e] або [Concept('sell_food', 'продає їжу')|e] на [Concept('market', 'ринку')|e], до якого належить. Ринкова ціна залежить від того, скільки їжі зберігається в [Concept('stockpile', 'запасах')|e] ринку. [Concept('owner', 'Власник')|e] провінції разом з доходами приймає і ризики витрат, тобто провінції при надлишку їжі збільшують [Concept('income', 'дохід')|e], а при нестачі — [Concept('expenses', 'витрати')|e].\n\n[Concept('food_raw_materials', 'Ресурсами для виробництва їжі')|e] можна [Concept('trades', 'торгувати')|e], щоб переміщувати її запаси між ринками."
  game_concept_pop_food_consumption: "Споживання їжі групою населення"
  game_concept_pop_food_consumption_desc: "Це кількість [Concept('food', 'їжі')|e], щомісячно споживана [Concept('pop', 'населенням')|e]."
  game_concept_food_productivity: "Ефективність виробництва їжі"
  game_concept_food_productivity_desc: "$game_concept_food_productivity$ впливає на те, з якою ефективністю [Concept('location', 'місцевість')|e] виробляє [Concept('food', 'їжу')|e].\n\nНайбільше ця ефективність залежить від місцезнаходження місцевості, проте деякі [Concept('laws', 'закони')|e], [Concept('societal_values', 'суспільні цінності')|e] та [Concept('advances', 'поступ')|e] також можуть на неї впливати. [Concept('towns_and_cities', 'Міські місцевості')|e] менш ефективні у виробництві їжі, ніж [Concept('rural_locations', 'сільські')|e]."
  game_concept_subsistence_agriculture: "Натуральне господарство"
  game_concept_subsistence_agriculture_desc: "[Concept('rgo_pops', 'Робітники або раби')|e], які не найняті на роботу в [Concept('building', 'споруді')|e] або на [Concept('rgo', 'видобуток ресурсів')|e], займаються натуральним господарством і виробляють їжу в набагато меншому обсязі, ніж при видобутку [Concept('food_raw_materials', 'ресурсів для виробництва їжі')|e]. Зачасту їм ледь вистачає її для задоволення власних потреб. Передбачається, що [Concept('unemployed', 'безробітне')|e] населення займається натуральним господарством, тобто найпростішим збором [Concept('food', 'їжі')|e], навіть якщо в [Concept('location', 'місцевості')|e] є [Concept('raw_material', 'ресурси')|e], не пов'язані з [Concept('food', 'їжею')|e] безпосередньо."
  game_concept_starvation: "Голод"
  game_concept_starving: "Голод"
  game_concept_starving_desc: "Якщо в [Concept('province', 'провінції')|e] вичерпається [Concept('provincial_food', 'запас')|e] [Concept('food', 'їжі')|e], [Concept('pops', 'населення')|e] почне голодувати і вмирати.\n\nПровінція отримає наступний ефект:\n[ShowModifierEffect('province_starving')]"
  game_concept_food_raw_material: "Ресурс для виробництва їжі"
  game_concept_food_raw_materials: "Ресурси для виробництва їжі"
  game_concept_food_raw_material_desc: "Як будь-які інші [Concept('goods', 'товари')|e], [Concept('raw_materials', 'ресурси')|e] можна купувати, продавати та використовувати. Деякі з цих ресурсів застосовуються у виробництві [Concept('food', 'їжі')|e]. Такі ресурси з'являються в результаті [Concept('rgo', 'видобутку')|e] і вважаються набагато ефективнішим джерелом їжі, ніж [Concept('subsistence_agriculture', 'натуральне господарство')|e].\n\n$game_concept_food$ також переміщується між [Concept('markets', 'ринками')|e] при купівлі-продажу ресурсів для її виробництва."
  game_concept_food_raw_material_list_title: "Список ресурсів для виробництва їжі"
  game_concept_selling_food: "Продаж їжі"
  game_concept_sell_food: "Продати харчі"
  game_concept_sell_food_short: "Продати"
  game_concept_selling_food_desc: "Надлишок [Concept('food', 'харчів')|e], які ніде зберігати, [Concept('province', 'провінція')|e] продає на місцевому [Concept('market', 'ринку')|e]. Це можна робити, тільки якщо провінція не в [Concept('siege', 'облозі')|e].\n\nНа місяць [Concept('province', 'провінція')] може закуповувати кількість [Concept('food', 'харчів')|e], що дорівнює сумарній місткості [Concept('food_stockpile', 'запасів харчів')|e] [Concept('province', 'провінції')]."
  game_concept_buying_food: "Купівля харчів"
  game_concept_buy_food: "Купити харчі"
  game_concept_buy_food_short: "Купити"
  game_concept_buying_food_desc: "При нестачі [Concept('food', 'харчів')|e] [Concept('province', 'провінція')|e] купує їх на місцевому [Concept('market', 'ринку')|e]. Це можна робити, тільки якщо провінція не в [Concept('siege', 'облозі')|e].\n\nНа місяць [Concept('province', 'провінція')] може закуповувати кількість [Concept('food', 'харчів')|e], що дорівнює сумарній місткості [Concept('food_stockpile', 'запасів харчів')|e] [Concept('province', 'провінції')]."
  game_concept_food_stockpile: "Запас харчів"
  game_concept_food_stockpile_desc: "Щомісячний залишок [Concept('food', 'харчів')|e] у @location! [Concept('locations', 'місцевостях')|e] переходить у запаси @province! [Concept('province', 'провінції')|e]. Щомісячний залишок [Concept('food', 'харчів')] у [Concept('province', 'провінціях')] переходить у запаси @market! [Concept('market', 'ринку')|e].\n\nДостатній [Concept('food_stockpile', 'запас харчів')] запобігає [Concept('starvation', 'голоду')|e] під час суворих [Concept('winter', 'зим')|e], коли [Concept('food_productivity', 'ефективність виробництва харчів')|e] невелика.\n\nВеликі запаси в @province! [Concept('province', 'провінції')|e] також дозволяють їй щомісяця [Concept('buy_food', 'закуповувати')|e] та [Concept('sell_food', 'продавати')|e] більше харчів."
  game_concept_construction_material: "Будівельний матеріал"
  game_concept_construction_materials: "Будматеріали"
  game_concept_construction_material_desc: "Будівельні матеріали — це [Concept('raw_materials', 'ресурси')|e], які використовуються в [Concept('construction', 'будівництві')|e] [Concept('buildings', 'споруд')|e]. Будматеріали необхідні для розвитку [Concept('towns_and_cities', 'міст')|e], а основним їх джерелом є [Concept('rgo', 'видобуток ресурсів')|e]."
  game_concept_construction_material_list_title: "Список будматеріалів"
  game_concept_loan: "Позика"
  game_concept_loaned: "Взято в позику"
  game_concept_lent: "Дано в позику"
  game_concept_lend: "Дати в позику"
  game_concept_lends: "Дає в позику"
  game_concept_loans: "Позики"
  game_concept_loan_desc: "Позика — це [Concept('gold', 'золото')|e], отримане від [Concept('lender', 'позикодавця')|e], яке вимагає повернення та виплати щомісячного [Concept('interest', 'відсотка')|e]. Позика може стати в пригоді, якщо [Concept('country', 'країні')|e] терміново потрібне [Concept('gold', 'золото')|e]. При отриманні позики [Concept('debt', 'борг')|e] [Concept('country', 'країни')] збільшується."
  game_concept_loan_capacity: "Позиковий потенціал"
  game_concept_loan_capacity_desc: "Визначає, скільки грошей [Concept('country', 'країна')|e] може [Concept('lend', 'дати в позику')|e] з власних запасів. [Concept('estates', 'Стани')|e], що вклали в позику свої кошти, отримуватимуть [Concept('interest', 'відсоток')|e], який повинна виплачувати [Concept('country', 'країна')|e], що взяла в позику. На позиковий потенціал також впливають деякі [Concept('buildings', 'споруди')|e], [Concept('advances', 'поступ')|e] та [Concept('government_reforms', 'державні реформи')|e]."
  game_concept_interest: "Відсоток"
  game_concept_interest_desc: "Це сума за [Concept('loan', 'позикою')|e], яку позичальник щомісяця виплачує [Concept('lender', 'позикодавцю')|e]."
  game_concept_debt: "Борг"
  game_concept_debts: "Борги"
  game_concept_debt_desc: "Це загальна кількість [Concept('loans', 'позик')|e] у країни, включно з усіма невиплаченими [Concept('interest', 'відсотками')|e]. Коли борг [Concept('country', 'країни')|e] надто великий, вона може стати [Concept('bankrupt', 'банкрутом')|e]."
  game_concept_lender: "Позикодавець"
  game_concept_lender_desc: "Це або банк, або інша [Concept('country', 'країна')|e], які дають [Concept('gold', 'золото')|e] в позику та отримують за це [Concept('interest', 'відсоток')|e]."
  game_concept_borrower: "Позичальник"
  game_concept_borrower_desc: "Це [Concept('country', 'країна')|e], яка взяла [Concept('gold', 'золото')|e] в позику та повинна сплачувати [Concept('interest', 'відсоток')|e] за позикою або іншій [Concept('country', 'країні')|e], або [Concept('estate', 'стану')|e]."
  adm_concept: "[Concept('adm', 'Адміністративна навичка')|e]"
  dip_concept: "[Concept('dip', 'Дипломатична навичка')|e]"
  mil_concept: "[Concept('mil', 'Військова навичка')|e]"
  game_concept_adm: "Адміністративна навичка"
  game_concept_adm_short: "Управління"
  game_concept_adm_i: "@adm!"
  game_concept_adm_desc: "Ця [Concept('ability', 'навичка')|e] показує, наскільки добре [Concept('character', 'персонаж')|e] справляється з адміністративними завданнями та економікою, займається державними справами та рухає країну вперед."
  game_concept_dip: "Дипломатична навичка"
  game_concept_dip_short: "Дипломатія"
  game_concept_dip_i: "@dip!"
  game_concept_dip_desc: "Ця [Concept('ability', 'навичка')|e] показує, наскільки добре [Concept('character', 'персонаж')|e] вміє переконувати та прихиляти до себе інших."
  game_concept_mil: "Військова навичка"
  game_concept_mil_short: "Військова справа"
  game_concept_mil_i: "@mil!"
  game_concept_mil_desc: "Ця [Concept('ability', 'навичка')|e] показує, наскільки добре [Concept('character', 'персонаж')|e] розуміється на військових аспектах та тактиці, а також приймає непрості рішення."
  game_concept_inflation: "Інфляція"
  game_concept_inflation_i: "@inflation!"
  game_concept_inflation_desc: "Інфляція характеризує підвищення всіх цін. Вона зростає при [Concept('minting', 'карбуванні')|e], пов'язаному з необхідністю збільшити [Concept('income', 'доходи')|e], і може знижуватися завдяки певним [Concept('cabinet_action', 'діям ради')|e]."
  game_concept_stability: "Стабільність"
  game_concept_stability_i: "@stability!"
  game_concept_stability_desc: "Стабільність — міра внутрішнього благополуччя [Concept('country', 'країни')|e]. Коли це значення негативне, виникає безлад, а коли позитивне — панує мир. За відсутності зовнішніх чинників стабільність поступово знижується до #Y 0#!. Одним із негативних чинників, що знижують стабільність, є [Concept('wars', 'війни')|e]."
  game_concept_complacency: "Самовдоволення"
  game_concept_complacency_i: "@complacency!"
  game_concept_complacency_desc: "Показує, наскільки лінивим і безтурботним стало населення [Concept('country', 'країни')|e] за відсутності будь-яких зовнішніх загроз."
  game_concept_prestige: "Престиж"
  game_concept_prestige_i: "@prestige!"
  game_concept_prestige_desc: "Престиж — це образ [Concept('country', 'країни')|e] в очах оточуючих. Він збільшує [Concept('cultural_influence', 'вплив')|e] її [Concept('primary_culture', 'основної культури')|e] та спрощує [Concept('diplomacy', 'дипломатію')|e]."
  game_concept_war_exhaustion: "Втома від війни"
  game_concept_war_exhaustion_i: "@war_exhaustion!"
  game_concept_war_exhaustion_desc: "Втома від війни показує, наскільки наша [Concept('country', 'країна')|e] виснажена [Concept('war', 'воєнними діями')|e]. Якщо значення цього показника стане занадто великим, ми будемо змушені підписати [Concept('peace_treaty', 'мирний договір')|e]. Кожна одиниця втоми від війни накладає наступні ефекти:\n[ShowAutoModifierEffect('war_exhaustion_impact')]"
  game_concept_exile: "Вигнання"
  game_concept_exiled: "Вигнанці"
  game_concept_exile_desc: "Якщо [Concept('army', 'військо')|e] або [Concept('navy', 'флот')|e] перебувають у вигнанні, то вони не можуть вести облогу або битися з будь-якими [Concept('units', 'загонами')|e], доки не повернуться на дружню територію. Таке відбувається, коли вони опиняються на території, де не повинні перебувати, зазвичай після укладення [Concept('peace_treaty', 'мирного договору')|e]."
  game_concept_retreat: "Відступ"
  game_concept_retreats: "Відступи"
  game_concept_retreating: "У відступі"
  game_concept_retreat_desc: "Коли [Concept('morale', 'бойовий дух')|e] занадто низький, [Concept('army', 'військо')|e] або [Concept('navy', 'флот')|e] можуть вимушено покинути програну битву або відступити за своєю волею. При [Concept('retreat', 'відступі')|e] вони не підкоряються наказам і не можуть битися, доки не досягнуть того пункту, куди відступають."
  game_concept_army_tradition: "Військові традиції"
  game_concept_army_tradition_i: "@army_tradition!"
  game_concept_army_tradition_desc: "Характеризують досвід [Concept('armies', 'військ')|e] [Concept('country', 'країни')|e], накопичений у [Concept('battles', 'битвах')|e] та [Concept('sieges', 'облогах')|e]."
  game_concept_navy_tradition: "Морські традиції"
  game_concept_navy_tradition_i: "@navy_tradition!"
  game_concept_navy_tradition_desc: "Характеризують досвід [Concept('navies', 'флотів')|e] [Concept('country', 'країни')|e], накопичений у [Concept('battles', 'битвах')|e], [Concept('blockades', 'блокадах')|e] та інших подіях, пов'язаних з діяльністю в морі."
  game_concept_recruit: "Набір"
  game_concept_recruiting: "Набір"
  game_concept_recruit_desc: "Набір — це перетворення людей з [Concept('manpower', 'числа рекрутів')|e] на [Concept('units', 'загони')|e] на карті. Зазвичай вимагає [Concept('gold', 'золота')|e] та збільшує [Concept('demand', 'попит')|e] на супутні [Concept('goods', 'товари')|e] — адже вершника без коня навряд чи можна назвати вершником."
  game_concept_unit_formation_preference: "Переважний стрій загону"
  game_concept_unit_formation_preference_desc: "TODO"
  game_concept_recruitment_method: "Метод набору"
  game_concept_recruitment_methods: "Методи набору"
  game_concept_recruitment_method_desc: "При наборі можна витратити більше часу на підготовку, щоб війська стали більш [Concept('experience', 'досвідченими')|e], а можна створити [Concept('regiment', 'полк')|e] швидше, але його [Concept('maximum_strength', 'максимальна чисельність')|e] буде меншою."
  game_concept_age: "Доба"
  game_concept_ages: "Доби"
  game_concept_age_upper_desc: "Гра ділиться на кілька діб, зазвичай по одній на століття. Кожній епосі притаманні свої правила та механіки, а також унікальне дерево [Concept('advances', 'поступу')|e]."
  game_concept_age_lower_desc: "На початку кожної доби ми обираємо, як розвивати [Concept('adm_short', 'управління')], [Concept('dip_short', 'дипломатію')] та [Concept('mil_short', 'військову справу')]. Від цього вибору залежить, яке дерево поступу отримає [Concept('country', 'країна')|e] в поточній епосі."
  game_concept_age_list_title: "Список діб"
  game_concept_age_desc: "$game_concept_age_upper_desc$\n\n[ShowDatabase('age')]\n\n$game_concept_age_lower_desc$"
  game_concept_institution: "Інститут"
  game_concept_institutions: "Інститути"
  game_concept_institution_desc: "У кожній [Concept('age', 'епосі')|e] є три різні інститути, які з'являються у відповідних [Concept('location', 'місцевостях')|e] на мапі. При [Concept('embrace', 'впровадженні')|e] інститутів [Concept('countries', 'країна')|e] поширює свій вплив по мапі та відкриває доступ до нових [Concept('advances', 'поступів')|e] поточної доби.\n\nЯкщо якийсь інститут у [Concept('country', 'країні')|e] розвивається недостатньо швидко, можна #TOOLTIP:CABINET_ACTION,study_institutions,X #L підтримати його#!#!."
  game_concept_embrace: "Впровадження"
  game_concept_embraced: "Впроваджено"
  game_concept_embrace_desc: "[Concept('country', 'Країна')|e] може впровадити [Concept('institution', 'інститут')|e], якщо достатня кількість її [Concept('population', 'населення')|e] живе в [Concept('locations', 'місцевостях')|e], де цей інститут широко поширений. Впровадження [Concept('institution', 'інституту')] дозволяє країні [Concept('research', 'досліджувати')|e] пов'язані з ним [Concept('advances', 'поступи')|e]."
  game_concept_advance: "Поступ"
  game_concept_advances: "Поступ"
  game_concept_advance_desc: "До поступу належать ідеї, відкриття, технології та досягнення в різних галузях знань.\n\nЗа раз можна [Concept('researched', 'дослідити')|E] лише один поступ, і швидкість цього процесу залежить від показника [Concept('research_progress_with_icon', 'дослідницьких напрацювань')|E] у відповідній [Concept('country', 'країні')|E].\n\nКожна [Concept('age', 'доба')|E] надає [Concept('countries', 'країнам')] свої потенційні поступи. Деякі з них унікальні для окремих [Concept('countries', 'країн')], [Concept('cultures', 'культур')|E] або [Concept('religions', 'релігій')|E], але здебільшого вони вимагають лише [Concept('embraced', 'впровадження')|E] певних [Concept('institutions_with_icon', 'інститутів')|E].\n\nШвидкість дослідження нових [Concept('advances_with_icon', 'поступів')|E] головним чином визначається силою [Concept('liturgical_language_with_icon', 'літургійної мови')|E], середнім рівнем [Concept('literacy_with_icon', 'грамотності')|E] [Concept('pops_with_icon', 'населення')|E], ступенем [Concept('estate_satisfaction', 'задоволення')|E] #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! та тим, скільки [Concept('institutions_with_icon', 'інститутів')|E] вже [Concept('embraced', 'впроваджено')|E]."
  game_concept_research: "Дослідження"
  game_concept_researched: "Досліджено"
  game_concept_researching: "Дослідження"
  game_concept_research_desc: "Дослідження [Concept('advance', 'поступу')|e] вимагає часу, тому [Concept('country', 'країна')|e] може проводити лише одне дослідження за раз. Коли набереться достатньо [Concept('research_progress', 'дослідницьких напрацювань')|e], країна отримає доступ до переваг поступу.\n\nШвидкість дослідження нових [Concept('advances_with_icon', 'поступів')|e] головним чином визначається силою [Concept('liturgical_language_with_icon', 'літургійної мови')|e], середнім рівнем [Concept('literacy_with_icon', 'грамотності')|e] [Concept('pops_with_icon', 'населення')|e], ступенем [Concept('estate_satisfaction', 'задоволення')|e] #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! та тим, скільки [Concept('institutions_with_icon', 'інститутів')|e] вже [Concept('embraced', 'впроваджено')|e]."
  game_concept_research_progress: "Дослідницькі напрацювання"
  game_concept_research_progress_desc: "Напрацювання [Concept('research', 'дослідження')|e] головним чином визначається силою [Concept('liturgical_language_with_icon', 'літургійної мови')|e], середнім рівнем [Concept('literacy_with_icon', 'грамотності')|e] [Concept('pops_with_icon', 'населення')|e], ступенем [Concept('estate_satisfaction', 'задоволення')|e] #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! та кількістю  [Concept('embraced', 'впроваджених')|e] [Concept('institutions_with_icon', 'інститутів')|e]."
  game_concept_stored_research: "Накопичені дослідницькі напрацювання"
  game_concept_stored_research_desc: "Поки для дослідження не вибрано жодного [Concept('advance', 'поступу')|e], цей параметр поступово зростає. При виборі того чи іншого [Concept('advance', 'поступу')|e] накопичені дослідницькі напрацювання одразу застосовується."
  game_concept_literacy: "Грамотність"
  game_concept_literacy_desc: "Показує, як добре [Concept('pops', 'населення')|e] вміє читати та писати. Підвищення грамотності загалом вигідне, оскільки прискорює [Concept('research_progress', 'дослідницькі напрацювання')|e]. Однак чим грамотніше населення, тим більше на його [Concept('pop_satisfaction', 'задоволення')|e] впливають [Concept('market_price', 'ринкові ціни')|e] необхідних для нього товарів."
  game_concept_artillery_bonus: "Бонус артилерії"
  game_concept_artillery_bonus_desc: "Характеризує здатність артилерійських [Concept('regiments', 'полків')|e] обстрілювати [Concept('fortifications', 'укріплення')|e] противника. Сила обстрілу залежить від [Concept('artillery_barrage', 'артилерійського залпу')|e] та рівня [Concept('fort', 'фортеці')|e]."
  game_concept_artillery_barrage: "Артилерійський залп"
  game_concept_artillery_barrage_desc: "Якщо під час [Concept('siege', 'облоги')|e] значення цього показника перевершує рівень [Concept('fort', 'фортеці')|e], атакуюча сторона може отримати бонус!"
  game_concept_estate_privilege: "Станова привілея"
  game_concept_estate_privileges: "Станові привілеї"
  game_concept_privileges: "Привілеї"
  game_concept_privilege: "Привілей"
  game_concept_estate_privilege_desc: "[Concept('ruler', 'Правитель')|e] може наділяти різні групи людей привілеями — податковими послабленнями, монополіями та іншими правами, які дають переваги тому чи іншому [Concept('estate', 'станові')|e]. Зазвичай привілеї обходяться правителю недешево та збільшують витрати, зокрема на сам [Concept('estate', 'стан')|e]."
  game_concept_supply_depot: "Продовольчий склад"
  game_concept_supply_depots: "Продовольчі склади"
  game_concept_supply_depot_desc: "[Concept('armies', 'Війська')|e] можуть створювати продовольчі склади у [Concept('hostile', 'ворожих')|e] [Concept('locations', 'місцевостях')|e] та зберігати там [Concept('food', 'їжу')|e]. Цими складами можуть користуватися [Concept('friendly', 'дружні')|e] війська на відстані до #V 2#! [Concept('locations', 'місцевостей')] від складу."
  game_concept_unit_ability: "Здібність загону"
  game_concept_unit_abilities: "Здібності загону"
  game_concept_unit_ability_desc: "Так називаються накази, які можна віддавати [Concept('units', 'загонам')|e], наприклад [ShowUnitAbilityName('drill_army')|l] або [ShowUnitAbilityName('march_to_sound_of_guns')|l]. Деякі здібності — це миттєві дії, інші ж — стани, між якими можна перемикатися."
  game_concept_character_interaction: "Взаємодія з персонажем"
  game_concept_character_interactions: "Взаємодії з персонажем"
  game_concept_character_interaction_desc: "Це [Concept('actions', 'дія')|e], яку можна здійснювати від імені [Concept('character', 'персонажа')|e]. Приклади: [ShowCharacterInteractionName('marry_noble')|l], [ShowCharacterInteractionName('seppuku')|l] або [ShowCharacterInteractionName('resign_as_grand_master')|l]."
  game_concept_integration_status: "Статус інтеграції"
  game_concept_integration_status_desc: "Це ступінь включеності [Concept('location', 'місцевості')|e] до адміністративного апарату [Concept('owner', 'володаря')|e]. Кожна [Concept('owned', 'підвладна')] [Concept('location', 'місцевість')] має один із чотирьох статусів:\n\n$BULLET$[Concept('colonized', 'Колонізована')|e]\n$BULLET$[Concept('conquered', 'Завойована')|e]\n$BULLET$[Concept('integrated', 'Інтегрована')|e]\n$BULLET$[Concept('core', 'Корінна')|e]\n\nБудь-яку [Concept('conquered', 'завойовану')] [Concept('location', 'місцевість')] можна інтегрувати за допомогою відповідного [Concept('cabinet_action', 'доручення')|e], однак щоб вона стала вважатися [Concept('core', 'корінною')], значна частина її [Concept('pops', 'населення')|e] має належати до [Concept('primary_culture', 'основної культури')|e] або однієї з [Concept('accepted_cultures', 'визнаних')|e]."
  game_concept_integration_status_desc_intro: "Це ступінь включеності [Concept('location', 'місцевості')|e] до адміністративного апарату [Concept('owner', 'власника')|e]. Кожна [Concept('owned', 'володіюча')] [Concept('location', 'місцевість')] має один із чотирьох статусів:"
  game_concept_integration_status_list: "$BULLET$[Concept('colonized', 'Колонізована')|e]\n$BULLET$[Concept('conquered', 'Завойована')|e]\n$BULLET$[Concept('integrated', 'Інтегрована')|e]\n$BULLET$[Concept('core', 'Корінна')|e]"
  game_concept_integration_status_lower_desc: "Будь-яку [Concept('conquered', 'завойовану')] [Concept('location', 'місцевість')] можна [Concept('integrated', 'інтегрувати')] за допомогою відповідного [Concept('cabinet_action', 'доручення')|e], однак щоб вона стала вважатися [Concept('core', 'корінною')], значна частина її [Concept('pops', 'населення')|e] має належати до [Concept('primary_culture', 'основної культури')|e] або однієї з [Concept('accepted_cultures', 'визнаних')|e]."
  game_concept_integration: "Інтеграція"
  game_concept_integrated: "Інтегровано"
  game_concept_integrate: "Інтегрувати"
  game_concept_integrating: "Інтеграція"
  game_concept_integration_list_title: "Інтегрована [Concept('location', 'місцевість')] має такі ефекти:"
  game_concept_integration_list: "[ShowModifierEffect('integration_integrated')]"
  game_concept_integration_desc: "Інтегрована [Concept('location', 'місцевість')|e] стає повноцінною частиною країни, завдяки чому нею набагато легше керувати, ніж [Concept('conquered', 'завойованою')|e].\n\n[Concept('conquered', 'Завойовані')|e] [Concept('location', 'місцевості')] потрібно інтегрувати за допомогою [Concept('cabinet_action', 'доручення')|e], яке застосовується до всієї [Concept('province', 'провінції')|e]. Швидкість інтеграції залежить від низки чинників, зокрема кількості [Concept('locations', 'місцевостей')], їх [Concept('culture', 'культури')|e] або [Concept('location_rank', 'рангу')|e]."
  game_concept_government_reform: "Державна реформа"
  game_concept_government_reforms: "Державні реформи"
  game_concept_reforms: "Реформи"
  game_concept_reform: "Реформа"
  game_concept_government_reform_desc: "Державна реформа визначає характер управління [Concept('country', 'країною')|e]. Спектр таких принципів широкий, вони можуть як слідувати давнім традиціям, так і бути прогресивними. Кожен принцип по-своєму унікальний, але часто дає значущу перевагу або неповторну можливість для гри.\n\nУ [Concept('countries', 'країн')] є доступ до обмеженого числа державних реформ, яке можна збільшити за допомогою певних [Concept('advances', 'поступів')|e].\n\nІснують також [Concept('major_reforms', 'засадничі реформи')|e]. У деяких [Concept('country', 'країн')] може бути тільки одна така реформа."
  game_concept_major_reform: "Засаднича реформа"
  game_concept_major_reforms: "Засадничі реформи"
  game_concept_major_reform_desc: "Засадничою називається особлива [Concept('government_reform', 'державна реформа')|e], яка формує вигляд [Concept('country', 'країни')|e]. У кожної [Concept('country', 'країни')] може одночасно бути тільки одна засаднича реформа."
  game_concept_cabinet_action: "Доручення"
  game_concept_cabinet_actions: "Доручення"
  game_concept_cabinet_action_desc: "Учаснику [Concept('cabinet', 'ради')|e] можна доручати певні дії. Кожна така дія виконується доти, доки не буде завершена або доки ми не вирішимо її змінити. \nДоступні такі дії: \n\n#T Управління #!\n[ShowCabinetTypeDatabase('adm')] \n\n#T Дипломатія #!\n[ShowCabinetTypeDatabase('dip')] \n\n#T Військова справа #!\n[ShowCabinetTypeDatabase('mil')]"
  game_concept_cabinet_seat: "Місце в раді"
  game_concept_cabinet_seats: "Місця в раді"
  game_concept_cabinet_seats_desc: "Визначає кількість [Concept('cabinet_members', 'учасників')|e], які можуть одночасно засідати в [Concept('cabinet', 'раді')|e] [Concept('country', 'країни')|e]. Цю кількість можна збільшити за допомогою певних [Concept('advances', 'поступів')|e]."
  game_concept_cabinet_efficiency: "Ефективність ради"
  game_concept_cabinet_efficiency_desc: "Це швидкість і результативність, з якими [Concept('characters', 'персонажі')|e] в [Concept('cabinet', 'раді')|e] виконують відповідні [Concept('cabinet_actions', 'дії')|e]. Ефективність залежить від [Concept('crown_power', 'влади правителя')|e] та [Concept('societal_values', 'суспільних цінностей')|e], на неї можуть впливати [Concept('advances', 'поступ')|e], [Concept('government_reforms', 'державні реформи')|e], [Concept('policies', 'політики')|e] та [Concept('buildings', 'споруди')|e]."
  game_concept_cabinet: "Рада"
  game_concept_cabinet_desc: "$game_concept_cabinet$ — це зібрання високопоставлених державних діячів. Вони допомагають управляти [Concept('country', 'країною')|e], виконуючи певні [Concept('cabinet_actions', 'дії')|e]. Кількість [Concept('cabinet_seats', 'місць у раді')|e] можна збільшити за допомогою певних [Concept('advances', 'поступів')|e]."
  game_concept_cabinet_member: "Радник"
  game_concept_cabinet_members: "Радники"
  game_concept_cabinet_member_desc: "$game_concept_cabinet_member$ — це [Concept('character', 'персонаж')|e], який засідає в [Concept('cabinet', 'раді')|e]."
  game_concept_artist: "Творець"
  game_concept_artists: "Творці"
  game_concept_artist_upper_desc: "Це [Concept('character', 'персонаж')|e], який створює [Concept('works_of_art', 'твори')|e]. До творців належать такі типи персонажів:"
  game_concept_artist_list_title: "Список різновидів творців"
  game_concept_artist_desc: "$game_concept_artist_upper_desc$\n[ShowDatabase('artist')]"
  game_concept_religious_figure: "Релігійний діяч"
  game_concept_religious_figures: "Релігійні діячі"
  game_concept_religious_figure_upper_desc: "Релігійний діяч — це [Concept('character', 'персонаж')|e], який мандрує світом і надає релігійні переваги тим місцям, де вирішує оселитися. Країни, які дотримуються відповідної [Concept('religion', 'релігії')|e], отримують право наймати релігійних діячів. Дотримуватися можна лише однієї [Concept('religious_school', 'релігійної школи')|e], однак є можливість запрошувати релігійних діячів з інших шкіл, щоб отримувати натхнення та частину їхніх переваг. Релігійний діяч може належати до одного з таких типів:"
  game_concept_religious_figure_list_title: "Список типів релігійних діячів"
  game_concept_religious_figure_desc: "$game_concept_religious_figure_upper_desc$\n[ShowDatabase('religious_figures')]"
  game_concept_invited_religious_figure: "Запрошений релігійний діяч"
  game_concept_invited_religious_figures: "Запрошені релігійні діячі"
  game_concept_invite_religious_figure: "Запросити релігійного діяча"
  game_concept_work_of_art: "Творіння"
  game_concept_works_of_art: "Творіння"
  game_concept_work_of_art_desc: "Це результат роботи [Concept('artist', 'творця')|e]. Після створення воно збільшує [Concept('cultural_influence', 'вплив')|e] [Concept('primary_culture', 'основної культури')|e] тієї [Concept('country', 'країни')|e], де працює творець. Творіння можуть знищити або захопити, якщо [Concept('location', 'місцевість')|e], де воно знаходиться, буде [Concept('occupied', 'окупована')|e] [Concept('enemy', 'ворогом')|e].\nНаявність творінь позитивно позначається на [Concept('prestige', 'престижі')|e] та [Concept('cultural_tradition', 'культурних традиціях')|e] [Concept('country', 'країни')]."
  game_concept_work_of_art_list_title: "Види творінь"
  game_concept_art_quality: "Якість творіння"
  game_concept_art_quality_desc: "Якість [Concept('works_of_art', 'творіння')|e] впливає на величину [Concept('cultural_tradition', 'культурних традицій')|e] та [Concept('prestige', 'престижу')|e], які воно приносить країні.\n\n$game_concept_work_of_art$ може мати один із таких рівнів якості, від найнижчого до найвищого:\n$BULLET_WITH_TAB$ $art_quality_bad$\n$BULLET_WITH_TAB$ $art_quality_below_average$\n$BULLET_WITH_TAB$ $art_quality_average$\n$BULLET_WITH_TAB$ $art_quality_above_average$\n$BULLET_WITH_TAB$ $art_quality_good$\n$BULLET_WITH_TAB$ $art_quality_very_good$\n$BULLET_WITH_TAB$ $art_quality_great$\n$BULLET_WITH_TAB$ $art_quality_best$"
  game_concept_legitimacy: "Легітимність"
  game_concept_legitimacy_i: "@legitimacy!"
  game_concept_legitimacy_desc: "Показує, наскільки населення та стани згодні з тим, як управляється [Concept('country', 'країна')|e]. Коли легітимність знаходиться на низькому рівні, зростає ризик виникнення повстань, мета яких — передати владу в руки [Concept('ruler', 'правителя')|e], більш угодного масам."
  game_concept_republican_tradition: "Республіканські традиції"
  game_concept_republican_tradition_i: "@republican_tradition!"
  game_concept_republican_tradition_desc: "Показують, як добре республіканізм укорінився в країні та наскільки [ShowGovernmentTypeName('republic')|l] дотримується традицій загалом. [ShowGovernmentTypeNameWithNoTooltip('republic')] проводить вибори нового [Concept('ruler', 'правителя')|e] кожні кілька років. Якщо один і той же [Concept('ruler', 'правитель')] перебуває при владі після кількох [Concept('elections', 'виборів')|e], це негативно позначається на республіканських традиціях. Сильне зниження їхнього рівня може призвести до розвитку автократії. Щоб республіканський уряд працював добре, цей рівень повинен залишатися високим."
  game_concept_devotion: "Благочестя"
  game_concept_devotion_i: "@devotion!"
  game_concept_devotion_desc: "Благочестя показує, наскільки в нашій країні розвинена [Concept('faith', 'віра')|e]. Чим вище благочестя, тим ефективніша наша [ShowGovernmentTypeName('theocracy')|l]."
  game_concept_horde_unity: "Згуртованість орди"
  game_concept_horde_unity_i: "@horde_unity!"
  game_concept_horde_unity_desc: "Згуртованість орди показує, як сильно племена підтримують хана. За відсутності зовнішніх чинників згуртованість поступово знижується. Щоб її підвищити, потрібно займатися грабунками та розоряти провінції. Якщо згуртованість низька, то #TOOLTIP:GOVTYPE,steppe_horde,X #L кочова орда#!#! з більшою ймовірністю піддасться внутрішнім розбратам."
  game_concept_tribal_cohesion: "Племінна єдність"
  game_concept_tribal_cohesion_i: "@tribal_cohesion!"
  game_concept_tribal_cohesion_desc: "Показує, наскільки наше [ShowGovernmentTypeName('tribe')|l] єдине в галузі [Concept('religion', 'релігії')|e] та [Concept('culture', 'культури')|e]. На низьких рівнях [ShowGovernmentTypeNameWithNoTooltip('tribe')|l] нагадуватиме збіговисько кішок, які гуляють самі по собі. Щоб [ShowGovernmentTypeNameWithNoTooltip('tribe')|l] процвітало, єдність повинна бути високою."
  game_concept_government_power: "Влада уряду"
  game_concept_government_power_i: "@government_power!"
  game_concept_government_power_desc: "Цей загальний термін показує, наскільки добре працює [Concept('government', 'уряд')|e]. Є кілька показників влади уряду: [Concept('legitimacy', 'легітимність')|e], [Concept('republican_tradition', 'республіканські традиції')|e], [Concept('devotion', 'благочестя')|e], [Concept('horde_unity', 'згуртованість орди')|e] та [Concept('tribal_cohesion', 'племінна єдність')|e]."
  game_concept_policy: "Політика"
  game_concept_policies: "Політики"
  game_concept_policy_desc: "Для кожного [Concept('law', 'закону')|e] потрібно обрати одну або кілька політик. Вони визначають, як закон застосовується в [Concept('country', 'країні')|e]."
  game_concept_law: "Правило"
  game_concept_laws: "Звід правил"
  game_concept_law_desc: "Для кожного правила потрібно обрати [Concept('policy', 'політику')|e], інакше воно не набуде чинності. У різних [Concept('government_types', 'формах правління')|e] та [Concept('religions', 'релігіях')|e] бувають різні правила, їх кількість можна збільшити за допомогою [Concept('advances', 'поступу')|e]. [Concept('policy', 'Політика')], обрана для правила, часто впливає на [Concept('societal_values', 'суспільні цінності')|e]."
  game_concept_antagonism: "Ворожість"
  game_concept_antagonism_i: "@antagonism!"
  game_concept_antagonism_desc: "Ворожість — це елемент ставлення до нас інших [Concept('countries', 'країн')|e], який впливає на їхню [Concept('opinion', 'думку')|e] про нас. Якщо країни, у чиїй зоні інтересів ми перебуваємо, відчувають до нас ворожість, то вони менш схильні вдаватися до [Concept('diplomacy', 'дипломатії')|e] та можуть діяти проти нас. Рівень ворожості між країнами залежить від їхніх відмінностей у [Concept('societal_values', 'суспільних цінностях')|e], [Concept('government_types', 'формах правління')|e], [Concept('religion', 'релігії')|e], [Concept('culture', 'культурі')|e] та [Concept('language', 'мові')|e]. Деякі дії в прикордонних [Concept('location', 'місцевостях')|e] також можуть викликати в сусідніх країн ворожість, ступінь якої залежить від їхнього ставлення до цих місцевостей та до самої країни, що вчинила дію. Однак з часом більшість ефектів від подібних дій повністю зникає."
  game_concept_antagonism_received_modifier: "Отримувана ворожість"
  game_concept_antagonism_received_modifier_desc: "Визначає, наскільки сильно ворожі дипломатичні дії, наприклад [Concept('war', 'війна')|e], вплинуть на рівень [Concept('antagonism', 'ворожості')|e] до нас."
  game_concept_diplomatic_action: "Дипломатична дія"
  game_concept_diplomatic_actions: "Дипломатичні дії"
  game_concept_diplomatic_action_desc: "Це дія, яку одна [Concept('country', 'країна')|e] вживає щодо іншої із залученням [Concept('diplomats', 'дипломатів')|e]. До дипломатичних дій належать укладення [Concept('alliances', 'союзів')|e], оголошення [Concept('war', 'війни')|e] та багато іншого."
  game_concept_diplomatic_limitation: "Обмеження дипломатії"
  game_concept_diplomatic_limitations: "Обмеження дипломатії"
  game_concept_diplomatically_limited: "Дипломатія обмежена"
  game_concept_limited_diplomacy: "Часткова дипломатія"
  game_concept_unlimited_diplomacy: "Повноцінна дипломатія"
  game_concept_diplomatic_limitation_desc: "Дипломатичні можливості [Concept('country', 'країни')|e] — вкрай залежного [Concept('subject', 'ленника')|e] або [Concept('junior_partner', 'молодшого партнера')|e] в [Concept('union', 'унії')|e] — можуть бути обмежені. Це означає, що будуть недоступні або серйозно обмежені такі дії:\n\n$BULLET$ Укладення #TOOLTIP:SCRIPTED_RELATION_TYPE,alliance,X #L союзу#!#!\n$BULLET$ #TOOLTIP:SCRIPTED_RELATION_TYPE,food_access,X #L Доступ до продовольства#!#!\n$BULLET$ Пред'явлення #TOOLTIP:SCRIPTED_RELATION_TYPE,guarantee,X #L гарантій#!#!\n$BULLET$ #TOOLTIP:SCRIPTED_RELATION_TYPE,military_access,X #L Право на прохід військ#!#!\n$BULLET$ #TOOLTIP:SCRIPTED_RELATION_TYPE,fleet_basing_rights,X #L Право на розміщення флоту#!#!\n$BULLET$ #TOOLTIP:GENERIC_ACTION,create_building_subject,X #L Створення ленника-будівельника#!#!\n$BULLET$ #TOOLTIP:GENERIC_ACTION,create_province_subject,X #L Створення ленника#!#!\n\nБільшість дипломатично обмежених ленників нездатні самостійно оголошувати [Concept('wars', 'війни')|e]. Виняток — деякі конкретні цілі."
  game_concept_diplomats: "Дипломати"
  game_concept_diplomat: "Дипломат"
  game_concept_diplomat_desc: "Кількість дипломатів визначає, скільки [Concept('diplomacy', 'дипломатичних')|e] можливостей доступно зараз [Concept('country', 'країні')|e]. Збільшується за допомогою деяких [Concept('advances', 'поступів')|e] або [Concept('societal_values', 'суспільних цінностей')|e]."
  game_concept_opinion: "Думка"
  game_concept_diplomatic_opinion: "Дипломатична думка"
  game_concept_diplomatic_opinions: "Дипломатичні думки"
  game_concept_opinion_i: "@opinion!"
  game_concept_opinion_desc: "Відображає характер відносин між [Concept('country', 'країнами')|e]. Різниця між [Concept('trust', 'довірою')|e] та думкою в тому, що при високій думці [Concept('country', 'країна')] перестане поводитися вороже, але для співпраці потрібна ще й довіра."
  game_concept_bias: "Схильність"
  game_concept_bias_desc: "Схильність — це особливе ставлення, яке може бути у [Concept('country', 'країни')|e] до іншої країни. Є три види схильностей: [Concept('opinion', 'думка')|e], [Concept('trust', 'довіра')|e] та [Concept('antagonism', 'ворожість')|e]. [Concept('country_interactions', 'Взаємодії з країною')|e], [Concept('events', 'події')|e] та історичне тло зазвичай впливають на той чи інший вид схильності."
  game_concept_rival: "Суперник"
  game_concept_rivals: "Суперники"
  game_concept_rivals_tooltip: "[Concept('rivals', 'Суперники')|e]"
  game_concept_rival_desc: "[Concept('countries', 'Країни')|e] можуть заявляти про свою ворожість до інших країн, оголошуючи їх суперниками. Щодо суперників можна виконувати додаткові ворожі дії, наприклад фабрикувати [Concept('casus_belli', 'приводи для війни')|e] та втручатися в їхні [Concept('wars', 'війни')|e].\n\n$game_concept_country$-суперник не погодиться на дружні [Concept('treaties', 'договори')|e] на кшталт [Concept('alliances', 'союзів')|e], проте [Concept('countries', 'країнам')] зі спільними суперниками буде простіше укладати [Concept('treaties', 'договори')] між собою.\n\nСуперництво не є взаємним: якщо країну оголосити суперником, вона не обов'язково відповість тим самим. [Concept('country', 'Країна')], яка оголосила іншу суперником, вважається її [Concept('rival_enemy', 'ворогом')|e].\n\nСуперництво можливе лише щодо [Concept('countries', 'країн')] із порівнянним [Concept('great_power_score', 'рахунком великої держави')|e] та невисокою [Concept('opinion', 'думкою')|e] одна про одну. Максимально можлива кількість суперників залежить від [Concept('country_rank', 'рангу країни')|e]."
  game_concept_rival_enemy: "Ворог"
  game_concept_rival_enemies: "Вороги"
  game_concept_rival_enemy_desc: "[Concept('country', 'Країна')|e], яка оголосила іншу [Concept('rival', 'суперником')|e], вважається ворогом останньої. [Concept('country', 'Країна')] може мати багато [Concept('rivals', 'суперників')], але не мати ворогів, якщо жодна інша [Concept('country', 'країна')] не оголосила суперником її у відповідь."
  game_concept_cobelligerent: "Співвоююча сторона"
  game_concept_cobelligerents: "Співвоюючі сторони"
  game_concept_cobelligerent_desc: "[Concept('country', 'Країна')|e], яка стала співвоюючою стороною, може закликати своїх [Concept('allies', 'союзників')|e] для участі у [Concept('war', 'війні')|e].\n\nПри укладенні [Concept('peace_treaty', 'мирного договору')|e] [Concept('locations', 'місцевості')|e] співвоюючої країни матимуть ту ж вартість, що й території лідера війни."
  game_concept_enemy: "Ворог на війні"
  game_concept_enemies: "Вороги на війні"
  game_concept_enemies_tooltip: "[Concept('enemies', 'Вороги')|e]"
  game_concept_enemy_desc: "Дві [Concept('countries', 'країни')|e] у стані [Concept('war', 'війни')|e] вважають одна одну ворогами, а їхні [Concept('armies', 'війська')|e] та [Concept('navies', 'флоти')|e] при зустрічі вступають у [Concept('battle', 'битву')|e].\n\n[Concept('rebels', 'Мятежники')|e] та [Concept('pirates', 'пірати')|e] — це вороги для всіх без винятку."
  game_concept_royal_marriage: "Династичний шлюб"
  game_concept_royal_marriages: "Династичні шлюби"
  game_concept_married: "У шлюбі"
  game_concept_marry: "Укласти шлюб"
  game_concept_marriage: "Шлюб"
  game_concept_marrying: "Шлюб"
  game_concept_royal_marriage_desc: "Династичний шлюб укладається між двома [Concept('characters', 'персонажами')|e] з різних [Concept('countries', 'країн')|e], щоб покращити державні взаємини та підвищити [Concept('prestige', 'престиж')|e] їхніх [Concept('rulers', 'правителів')|e]."
  game_concept_union: "Унія"
  game_concept_senior_partner: "Старший партнер"
  game_concept_junior_partner: "Молодший партнер"
  game_concept_junior_partners: "Молодші партнери"
  game_concept_union_partner: "Партнер по унії"
  game_concept_union_partners: "Партнери по унії"
  game_concept_personal_union: "Особиста унія"
  game_concept_personal_unions: "Особисті унії"
  game_concept_union_desc: "Унія — це різновид [Concept('treaty', 'договору')|e], за якого дві або більше [Concept('countries', 'країни')|e] керуються одним [Concept('ruler', 'правителем')|e] на підставі [Concept('royal_marriages', 'династичного шлюбу')|e]. Таке співтовариство діє як оборонний [Concept('alliance', 'союз')|e] — країни автоматично допоможуть одна одній, якщо на них нападуть, — але при цьому можна вводити [Concept('laws', 'закони')|e], які змінюють положення унії. Найголовніший учасник унії називається старшим партнером, а решта — молодшими."
  game_concept_union_integration_level: "Рівень інтеграції унії"
  game_concept_union_integration_level_short: "Рівень інтеграції"
  game_concept_union_integration_level_member: "Рівень інтеграції учасника"
  game_concept_union_integration_level_desc: "$game_concept_union_integration_level$ відображає ступінь централізації [Concept('personal_union', 'особистої унії')|e] на підставі різних [Concept('laws', 'законів')|e] та [Concept('policies', 'політик')|e]. Рівень інтеграції всіх поточних [Concept('member', 'учасників')|e] унії підвищується при ухваленні відповідних політик. Після завершення централізації всі молодші партнери, які мають спільний рівень інтеграції з унією, об'єднаються під владою старшого партнера.\n\nТим учасникам, хто приєднався до унії пізніше за інших, доведеться спочатку підвищити рівень інтеграції за допомогою [Concept('parliament', 'парламенту')|e], а потім вони зможуть об'єднатися зі старшим партнером."
  game_concept_ally: "Союзник"
  game_concept_allies: "Союзники"
  game_concept_allied: "У союзі"
  game_concept_alliance: "Союз"
  game_concept_alliances: "Союзи"
  game_concept_alliance_desc: "Союз — це [Concept('treaty', 'договір')|e] між двома [Concept('countries', 'країнами')|e]. Країни в союзі не можуть оголошувати одна одній [Concept('war', 'війну')|e] та отримують можливість закликати союзників на допомогу в разі [Concept('wars', 'війни')] проти себе."
  game_concept_war_allies: "Воєнний союзник"
  game_concept_war_ally: "Воєнні союзники"
  game_concept_war_ally_desc: "Це [Concept('countries', 'країни')|e], які надають одна одній підтримку у [Concept('war', 'війні')|e]."
  game_concept_war_leader: "Лідер війни"
  game_concept_war_leaders: "Лідери війни"
  game_concept_war_leader_desc: "$game_concept_war_leader$ — одна з двох головних [Concept('countries', 'країн')|e], що беруть участь у [Concept('war', 'війні')|e]. Саме лідери війни визначають її результат під час [Concept('peace_treaties', 'мирних переговорів')|e]."
  game_concept_call_to_arms: "Заклик до зброї"
  game_concept_call_to_arms_desc: "Заклик до зброї — це [Concept('diplomatic_action', 'дипломатична дія')|e], яку можна виконати під час [Concept('war', 'війни')|e], закликавши на допомогу [Concept('ally', 'союзників')|e] та інші [Concept('countries', 'країни')|e], що пообіцяли брати участь у ваших збройних конфліктах.\n\n[Concept('war_defender', 'Країни-оборонці')|e] автоматично надсилають заклик до зброї своїм союзникам, а [Concept('war_attacker', 'країнам-нападникам')|e] доведеться скликати союзників вручну. При цьому стороні-нападнику буде набагато складніше вмовити інші країни приєднатися до війни."
  game_concept_treaty: "Договір"
  game_concept_treaties: "Договори"
  game_concept_treaty_desc: "Договір — це дипломатична угода, підписана двома або більше [Concept('countries', 'країнами')|e]. Може діяти протягом певного часу або до подальшого розпорядження.\nДо договорів належать [Concept('alliances', 'союз')|e], [Concept('military_access', 'право на прохід військ')|e], [Concept('truce', 'перемир’я')|e] та інші угоди, що досягаються за допомогою [Concept('diplomacy', 'дипломатії')|e]."
  game_concept_blocked_treaties: "Заборона договорів"
  game_concept_blocked_treaties_desc: "Якщо щодо [Concept('country', 'країни')|e] діє ця заборона, вона не може підписувати будь-які [Concept('treaty', 'договори')|e] з іншою [Concept('country', 'країною')|e]."
  game_concept_economic_support: "Фінансова підтримка"
  game_concept_economic_support_desc: "Це [Concept('treaty', 'договір')|e], згідно з яким одна [Concept('country', 'країна')|e] щомісяця надсилає [Concept('gold', 'золото')|e] іншій [Concept('country', 'країні')] для підтримки її [Concept('finances', 'фінансів')|e]. Найчастіше такий договір укладається, коли країна не хоче безпосередньо брати участь у [Concept('war', 'війні')|e], яку веде інша країна, але бажає її підтримати."
  game_concept_war_reparations: "Контрибуції"
  game_concept_war_reparations_desc: "Це мирний [Concept('treaty', 'договір')|e], за яким [Concept('country', 'країна')|e] зобов’язана щомісяця надсилати [GetDefine('NDiplomacy', 'WAR_REPARATIONS_FACTOR')|Y%0] отримуваного [Concept('gold', 'золота')|e] на підтримку [Concept('finances', 'фінансів')|e] іншої [Concept('country', 'країни')], найчастіше тієї, що перемогла в недавній війні."
  game_concept_guarantee: "Гарантія"
  game_concept_guaranteed: "Гарантовано"
  game_concept_guaranteeing: "Гарантує"
  game_concept_guarantee_desc: "Це [Concept('treaty', 'договір')|e], за яким одна [Concept('country', 'країна')|e] гарантує іншій [Concept('country', 'країні')] захист у разі [Concept('war', 'війни')|e]."
  game_concept_estate_satisfaction_equilibrium: "Рівноважне задоволення"
  game_concept_estate_satisfaction_equilibrium_desc: "Це значення, до якого прагне [Concept('estate_satisfaction', 'задоволення')|e] [Concept('estate', 'стану')|e]. Швидкість наближення до рівноважного задоволення залежить від багатьох чинників."
  game_concept_estate_satisfaction: "Задоволення стану"
  game_concept_estate_satisfaction_short: "Задоволення"
  game_concept_estate_satisfaction_desc: "Показує, наскільки [Concept('estate', 'стан')|e] задоволений тим, як зараз управляється [Concept('country', 'країна')|e]. Високе задоволення приносить країні різні переваги, а низьке — штрафи. Крім того, за низького задоволення [Concept('estate', 'стану')] з його представників не можна набирати [Concept('army_levies', 'військове')|e] та [Concept('navy_levies', 'флотське')|e] ополчення.\n\nЗадоволення [Concept('estate', 'стану')] також безпосередньо впливає на [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pops', 'груп населення')|e], що належать до нього."
  game_concept_estate_power: "Станова влада"
  game_concept_estate_power_desc: "Це сила, якою володіє [Concept('estate', 'стан')|e] у [Concept('country', 'країні')|e]. Більшою мірою на неї впливає кількість [Concept('population', 'населення')|e] того [Concept('pop_types', 'класу')|e], до якого належить цей [Concept('estate', 'стан')], а також [Concept('estate_privileges', 'привілеї')|e].\n\nДеякі [Concept('pop_types', 'суспільні класи')|e], наприклад #TOOLTIP:POPTYPE,nobles,X #L знать#!#!, мають набагато більшу станову владу на [Concept('pop', 'групу населення')|e], ніж #TOOLTIP:POPTYPE,slaves,X #L раби#!#!.\n\n$BULLET_WITH_TAB$Чим більша загальна влада [Concept('estate', 'станів')], тим менша [Concept('crown_power', 'влада правителя')|e] в [Concept('country', 'країні')].\n$BULLET_WITH_TAB$[Concept('tax_base', 'Податкова база')|e] [Concept('location', 'місцевості')|e] розподіляється залежно від розміру, станової влади та [Concept('pop_types', 'суспільного класу')] груп населення, що там мешкають."
  game_concept_crown_power: "Влада правителя"
  game_concept_crown_power_desc: "Це сила, якою володіє правитель [Concept('country', 'країни')|e]. Чим більша ця влада, тим впливовішою та ефективнішою стає [Concept('country', 'країна')]. Якщо у [Concept('estates', 'станів')|e] забагато [Concept('estate_privileges', 'привілеїв')|e], то влада правителя може зменшитися настільки, що країна почне отримувати штрафи.\n\nУ різних [Concept('ages', 'добах')|e] є [Concept('advances', 'поступи')|e], які збільшують [Concept('crown_power', 'владу правителя')|e]. Одна з найефективніших діб у цьому плані — доба #TOOLTIP:AGE,age_5_absolutism,X #L Абсолютизму#!#!."
  game_concept_estate_tax_base: "Податкова база стану"
  game_concept_estate_tax_base_desc: "Кожен [Concept('estate', 'стан')|e] отримує частину [Concept('gold', 'золота')|e] з [Concept('tax_base', 'податкової бази')|e] кожної [Concept('location', 'місцевості')|e]. Частка залежить від [Concept('estate_power', 'влади')|e] цього стану порівняно з іншими [Concept('estates', 'станами')]. Потім з неї віднімається [Concept('estate_enrichment', 'багатство стану')|e]."
  game_concept_civil_war: "Громадянська війна"
  game_concept_civil_wars: "Громадянські війни"
  game_concept_civil_war_desc: "Громадянська війна — це особливий різновид [Concept('war', 'воєнних дій')|e], при яких [Concept('country', 'країна')|e] ворогує не з іншою [Concept('country', 'країною')], а з частиною власного населення. Крім того, на відміну від звичайних [Concept('wars', 'війн')], тут не відбувається [Concept('occupation', 'окупація')|e] [Concept('locations', 'місцевостей')|e], але в разі успішної [Concept('sieged', 'облоги')|e] ці місцевості одразу ж змінюють [Concept('controller', 'контролюючу сторону')|e]."
  game_concept_war_goal: "Ціль війни"
  game_concept_war_goals: "Цілі війни"
  game_concept_war_goal_desc: "У кожної [Concept('war', 'війни')|e] є ціль, яку визначає обраний [Concept('casus_belli', 'привід для війни')|e]. При виконанні цієї цілі країна значно збільшить свій [Concept('war_score', 'військовий рахунок')|e]."
  game_concept_war_score: "Військовий рахунок"
  game_concept_war_score_desc: "Військовий рахунок показує, наскільки успішні дії [Concept('country', 'країни')|e] в конкретній [Concept('war', 'війні')|e]. Щоб збільшити військовий рахунок, потрібно перемагати в [Concept('battles', 'битвах')|e], [Concept('siege', 'облягати')|e] [Concept('enemy', 'ворожі')|e] [Concept('locations', 'місцевості')|e], досягати [Concept('war_goal', 'цілі війни')|e] та влаштовувати [Concept('blockades', 'блокади')|e]."
  game_concept_war_participation: "Участь у війні"
  game_concept_war_participation_desc: "Цей показник відображає внесок [Concept('country', 'країни')|e] в хід [Concept('war', 'війни')|e]. Збільшити його можна за допомогою [Concept('battles', 'битв')|e], [Concept('blockades', 'блокад')|e] та [Concept('sieges', 'облог')|e]."
  game_concept_peace_cost: "Вартість миру"
  game_concept_peace_cost_desc: "Визначає, скільки коштує включити [Concept('peace_treaty', 'мирний договір')|e] в [Concept('peace_offer', 'пропозицію про мир')|e]. Зазвичай вартість миру зіставляється з [Concept('war_score', 'військовим рахунком')|e], щоб визначити, чи погодиться інша [Concept('country', 'країна')|e] на мир."
  game_concept_war: "Війна"
  game_concept_wars: "Війни"
  game_concept_offensive_war: "Наступальна війна"
  game_concept_defensive_war: "Оборонна війна"
  game_concept_offensive_wars: "Наступальні війни"
  game_concept_defensive_wars: "Оборонні війни"
  game_concept_war_desc: "Війна починається, коли [Concept('country', 'країна')|e] за допомогою [Concept('diplomat', 'дипломатичної дії')|e] вступає в конфлікт з іншою [Concept('country', 'країною')|e]. [Concept('allied', 'Союзники')|e] будь-якої з таких країн можуть бути призвані для участі у війні.\n\nПід час війни [Concept('armies', 'війська')|e] та [Concept('navies', 'флоти')|e] ворогуючих сторін при зустрічі будуть [Concept('battle', 'битися')|e] один з одним. [Concept('armies', 'Війська')] зможуть [Concept('siege', 'облягати')|e] [Concept('enemies', 'ворожі')|e] [Concept('locations', 'місцевості')|e], а [Concept('navies', 'флоти')|e] зможуть влаштовувати [Concept('blockade', 'блокади')|e] ворожих [Concept('ports', 'портів')|e].\n\nВійна триває доти, доки не буде підписаний [Concept('peace_treaty', 'мирний договір')|e] і між ворогуючими [Concept('countries', 'країнами')] не відновиться [Concept('peace', 'мир')|e]."
  game_concept_war_attacker: "Сторона, що атакує"
  game_concept_war_attackers: "Ті, хто атакують"
  game_concept_war_attacker_desc: "На [Concept('war_with_icon', 'війні')|E] атакуючою вважається сторона, лідер якої обрав [Concept('casus_belli_with_icon', 'привід для війни')|E] і розв'язав конфлікт.\n\nЩоб збільшити свій [Concept('war_score_with_icon', 'військовий рахунок')|E], атакуюча сторона повинна прагнути досягнення [Concept('war_goal_with_icon', 'цілі війни')|e]."
  game_concept_war_defender: "Сторона, що обороняється"
  game_concept_war_defenders: "Ті, хто обороняються"
  game_concept_war_defender_desc: "На [Concept('war_with_icon', 'війні')|E] обороняється сторона, лідеру якої оголосили війну. Сторона, що обороняється, автоматично закликає своїх [Concept('allies_with_icon', 'союзників')|E] на [Concept('war', 'війну')].\n\nЩоб збільшити свій [Concept('war_score_with_icon', 'військовий рахунок')|E], ті, хто обороняються, повинні перешкодити [Concept('war_attacker', 'стороні, що атакує')|E] досягти [Concept('war_goal_with_icon', 'цілі війни')|e]."
  game_concept_peace: "Мир"
  game_concept_peace_desc: "Мир — це стан, за якого [Concept('country', 'країна')|e] не бере участі в жодній [Concept('war', 'війні')|e]."
  game_concept_white_peace: "Мир «статус-кво»"
  game_concept_white_peace_desc: "Це [Concept('peace_treaty', 'мирний договір')|e], який повертає країни до довоєнних умов."
  game_concept_peace_treaty: "Мирний договір"
  game_concept_peace_treaties: "Мирні договори"
  game_concept_peace_treaty_desc: "Це умови [Concept('peace_offer', 'пропозиції про мир')|e], до яких належать передача [Concept('location', 'місцевостей')|e] між двома [Concept('countries', 'країнами')|e], виплата в [Concept('gold', 'дукатах')|e] або навіть особливі договори, наприклад, #TOOLTIP:SCRIPTED_PEACE_TREATY,abandon_colonial_claim,X #L відмова від претензії на колонію#!#!, #TOOLTIP:SCRIPTED_PEACE_TREATY,peace_take_over_market_center,X #L захоплення ринкового центру#!#! або #TOOLTIP:SCRIPTED_PEACE_TREATY,peace_humiliate,X #L приниження#!#!."
  game_concept_peace_offer: "Пропозиція про мир"
  game_concept_peace_offer_desc: "Ця дипломатична дія припиняє [Concept('war', 'війну')|e] між двома та більше [Concept('countries', 'країнами')|e]. При цьому одна сторона може висунути свої умови іншій у формі [Concept('peace_treaties', 'мирних договорів')|e]. Щойно ці умови буде прийнято, укладається мир, а [Concept('war', 'війна')] припиняється.\n\n[Concept('war_score', 'Військовий рахунок')] [Concept('country', 'країни')] визначає вигоду, яку вона отримає від мирного договору."
  game_concept_casus_belli: "Привід для війни"
  game_concept_casus_bellis: "Приводи для війни"
  game_concept_casus_belli_desc: "Привід для оголошення війни, він же #italic казус беллі#!, — це юридичне виправдання, яким користується [Concept('country', 'країна')|e], щоб розпочати [Concept('war', 'війну')|e]. Привід впливає на характер [Concept('war', 'війни')] та її [Concept('war_goal', 'мету')|e]."
  game_concept_stockpile: "Запаси"
  game_concept_stockpile_desc: "Це поточна кількість [Concept('good', 'товарів')|e], які зберігаються на [Concept('market', 'ринкових')|e] складах. Якщо [Concept('supply', 'пропозиція')|e] більша, ніж [Concept('demand', 'попит')|e], запаси збільшуються — і навпаки. Їх витрачають на потреби [Concept('buildings', 'споруд')|e], [Concept('constructions', 'будівництва')|e], [Concept('units', 'загонів')|e] та різних [Concept('pops', 'груп населення')|e]."
  game_concept_effective_supply: "Ефективна пропозиція"
  game_concept_effective_supply_desc: "Це [Concept('supply', 'пропозиція')|e] щодо [Concept('good', 'товарів')|e] на [Concept('market', 'ринку')|e], коли знижено вплив [Concept('imports', 'імпорту')|e]."
  game_concept_effective_demand: "Ефективний попит"
  game_concept_effective_demand_desc: "Це [Concept('demand', 'попит')|e] щодо [Concept('good', 'товарів')|e] на [Concept('market', 'ринку')|e], коли знижено вплив [Concept('exports', 'експорту')|e]."
  game_concept_supply: "Пропозиція"
  game_concept_supply_desc: "Це кількість [Concept('good', 'товарів')|e], які виробляються в [Concept('buildings', 'спорудах')|e], видобуваються у вигляді [Concept('raw_materials', 'ресурсів')|e] або [Concept('imported', 'імпортуються')|e] на [Concept('market', 'ринок')|e]."
  game_concept_demand: "Попит"
  game_concept_demands: "Попит"
  game_concept_demand_desc: "Це кількість [Concept('good', 'товарів')|e], які потрібні для роботи [Concept('buildings', 'споруд')|e] та життя [Concept('pops', 'населення')|e], а також для [Concept('exports', 'експорту')|e] на [Concept('market', 'ринок')|e] та [Concept('constructions', 'будівництва')|e]."
  game_concept_market_balance: "Баланс товару"
  game_concept_market_balance_short: "Баланс"
  game_concept_market_balance_desc: "$game_concept_market_balance$ — це різниця між [Concept('supply_with_icon', 'пропозицією')|e] та [Concept('demand_with_icon', 'попитом')|e] на [Concept('good', 'товар')] на конкретному [Concept('market_with_icon', 'ринку')|e]."
  game_concept_market_value: "Оборот ринку"
  game_concept_market_value_desc: "Цей показник відображає сукупну вартість усіх угод на [Concept('market', 'ринку')|e] за місяць і слугує для оцінки його загального добробуту."
  game_concept_price_impact: "Вплив ціни"
  game_concept_price_impact_desc: "[Concept('market_price', 'Ринкова ціна')|e] [Concept('goods', 'товарів')|e], що покривають [Concept('pop_needs', 'потреби')|e] певної [Concept('pop', 'групи населення')|e], безпосередньо впливає на [Concept('pop_satisfaction', 'задоволення')|e] цієї групи."
  game_concept_price_stability: "Цінова стійкість"
  game_concept_price_stability_desc: "Цінова стійкість залежить від поточної [Concept('age', 'доби')|e] та визначає, як сильно на [Concept('target_price', 'очікувану ціну')|e] впливають [Concept('supply', 'пропозиція')|e] та [Concept('demand', 'попит')|e]."
  game_concept_market_price: "Ринкова ціна"
  game_concept_market_prices: "Ринкові ціни"
  game_concept_market_price_desc: "Це ціна, за якою продається той чи інший [Concept('good', 'товар')|e] у [Concept('market_center', 'ринковому центрі')|e].\nРинкова ціна поступово коригується в бік [Concept('target_price', 'очікуваної ціни')|e].\nЗалежно від [Concept('market_access', 'доступу до ринку')|e] [Concept('sell_price', 'ціна продажу')|e] в різних місцевостях може відрізнятися від ринкової."
  game_concept_target_price: "Очікувана ціна"
  game_concept_target_price_desc: "Очікувана ціна залежить від [Concept('supply', 'пропозиції')|e], [Concept('demand', 'попиту')|e] та [Concept('price_stability', 'цінової стійкості')|e].\nВона є часткою основної вартості товару, тому дорівнює [Concept('price_stability', 'ціновій стійкості')] при дуже великій пропозиції та обернена [Concept('price_stability', 'ціновій стійкості')] при дуже великому попиті."
  game_concept_export_market: "Ринок експорту"
  game_concept_export_market_desc: "Це [Concept('market', 'ринок')|e], на якому [Concept('goods', 'товари')|e] купуються, створюючи [Concept('export', 'експорт')|e]."
  game_concept_import_market: "Ринок імпорту"
  game_concept_import_market_desc: "Це [Concept('market', 'ринок')|e], на якому [Concept('goods', 'товари')|e] продаються, створюючи [Concept('import', 'імпорт')|e]."
  game_concept_market: "Ринок"
  game_concept_markets: "Ринки"
  game_concept_market_desc: "Ринок — це місце, де купують і продають [Concept('goods', 'товари')|E].\nВін розташовується в [Concept('market_center', 'ринковому центрі')|E] та охоплює інші місцевості залежно від [Concept('market_access', 'доступу до ринку')|E] та [Concept('protectionism', 'протекціонізму')|E].\nУсі ці місцевості купуватимуть і продаватимуть товари лише із [Concept('stockpile', 'запасів')|E] свого ринку.\n\n[Concept('markets', 'Ринки')] позначаються різними кольорами залежно від їхнього зв'язку з вашою країною.\n\n[Concept('markets', 'Ринки')] можуть бути [Concept('domestic_markets', 'внутрішніми')], [Concept('trading_markets', 'відкритими')], [Concept('foreign_markets', 'зовнішніми')] або [Concept('distant_markets', 'далекими')]."
  game_concept_domestic_market: "Внутрішній ринок"
  game_concept_domestic_markets: "Внутрішні ринки"
  game_concept_domestic_market_desc: "Це [Concept('market_with_icon', 'ринок')|e], у межах якого є належні вам [Concept('locations_with_icon', 'місцевості')|e]. На цьому [Concept('market', 'ринку')] ваші [Concept('locations', 'місцевості')] купують усе необхідне, чи то [Concept('food_with_icon', 'їжа')|e], матеріали для [Concept('construction_with_icon', 'будівництва')|e] та роботи [Concept('buildings_with_icon', 'споруд')|e], чи товари для задоволення [Concept('pop_needs_with_icon', 'потреб населення')|e].\n\nВажливо стежити за тим, щоб на внутрішньому ринку завжди були необхідні [Concept('goods', 'товари')], інакше ваша [Concept('country', 'країна')] не зможе будувати [Concept('buildings', 'споруди')] та набирати [Concept('regiments', 'полки')|e]."
  game_concept_trading_market: "Торговий ринок"
  game_concept_trading_markets: "Торгові ринки"
  game_concept_trading_market_desc: "Це [Concept('market_with_icon', 'ринок')|e], у межах якого у вас немає [Concept('own', 'володінь')|e], але є [Concept('merchant_capacity_with_icon', 'торговельний потенціал')|e] завдяки вашим [Concept('foreign_buildings_with_icon', 'закордонним спорудам')|e].\n\nВам не потрібно дбати про запаси [Concept('food', 'їжі')|e] та [Concept('good_with_icon', 'товарів')|e] для [Concept('population', 'населення')|e] на такому [Concept('market', 'ринку')]. При цьому ви можете вільно задіяти свій [Concept('merchant_capacity', 'торговельний потенціал')], щоб отримувати тут прибуток і купувати необхідні товари для своїх [Concept('domestic_markets_with_icon', 'внутрішніх ринків')|e]."
  game_concept_foreign_market: "Зовнішній ринок"
  game_concept_foreign_markets: "Зовнішні ринки"
  game_concept_foreign_market_desc: "Це [Concept('market_with_icon', 'ринок')|e], у межах якого ви не маєте ні [Concept('own', 'володінь')|e], ні [Concept('merchant_capacity_with_icon', 'торговельного потенціалу')|e]. З таким ринком не можна [Concept('trade_with_icon', 'торгувати')|e] безпосередньо, але можна задіяти свій [Concept('merchant_capacity', 'торговельний потенціал')] на інших [Concept('markets', 'ринках')] у межах його [Concept('trade_range_with_icon', 'торговельної відстані')]."
  game_concept_distant_market: "Далекий ринок"
  game_concept_distant_markets: "Далекі ринки"
  game_concept_distant_market_desc: "Це [Concept('market_with_icon', 'ринок')|e], що знаходиться за межами [Concept('trade_range_with_icon', 'торговельної відстані')] всіх ваших [Concept('domestic_markets_with_icon', 'внутрішніх ринків')|e]. З таким ринком неможливо [Concept('trade_with_icon', 'торгувати')|e]."
  SUBTAB_TRADING_TT_TEXT: "На цій вкладці ви можете керувати своїми [Concept('trades', 'торговельними угодами')|e], якщо у вас є [Concept('merchant_capacity', 'торговельний потенціал')|e] на будь-якому з [Concept('market', 'ринків')|e]."
  game_concept_protectionism: "Захист ринку"
  game_concept_trade_protection: "Захист ринку"
  game_concept_protectionism_desc: "$MODIFIER_TYPE_DESC_local_trade_protection_factor$\n\nЗахист ринку збільшується зі зростанням [Concept('control', 'контролю')|e] над [Concept('location', 'місцевістю')|e]."
  game_concept_market_center: "Ринковий центр"
  game_concept_market_centers: "Ринкові центри"
  game_concept_market_center_desc: "Це [Concept('location', 'місцевість')|e], в центрі якої розташований [Concept('market', 'ринок')|e]. [Concept('owner', 'Власник')|e] цієї місцевості отримує низку переваг і, що найважливіше, визначає, хто має доступ до ринку."
  game_concept_market_owner: "Власник ринку"
  game_concept_market_owner_desc: "Власником [Concept('market', 'ринку')|e] вважається [Concept('country', 'країна')|e], якій [Concept('owns', 'належить')|e] [Concept('market_center', 'ринковий центр')|e]. Власник ринку може знищити [Concept('market', 'ринок')] або перенести його в інше місце, щоб інші [Concept('countries', 'країни')] не могли торгувати на ньому."
  game_concept_market_access: "Доступ до ринку"
  game_concept_market_access_desc: "Доступ до ринку показує, наскільки легко [Concept('location', 'місцевості')|e] взаємодіяти з місцевим [Concept('market', 'ринком')|e], і залежить від відстані до [Concept('market_center', 'ринкового центру')|e].\n\nДоступ до ринку впливає на три ключові аспекти.\n\n$BULLET$Гарний доступ до [Concept('markets', 'ринку')] підвищує його [Concept('market_attraction_with_icon', 'привабливість')|e] для місцевості, тому [Concept('locations', 'місцевості')] зазвичай примикають до найближчого [Concept('market', 'ринку')].\n\n$BULLET$[Concept('locations', 'Місцевості')] з найкращим доступом до [Concept('market', 'ринку')] купують [Concept('goods_with_icon', 'товари')|e] та [Concept('food_with_icon', 'їжу')|e] першими, місцевості з найгіршим доступом — останніми.\n\n$BULLET$Поганий доступ до ринку призводить до зниження [Concept('output', 'обсягу виробництва')|e] в [Concept('buildings_with_icon', 'спорудах')|e] та падіння доходів від [Concept('rgo_with_icon', 'видобутку ресурсів')|e].\n\nДоступ до ринку вищий, якщо до ринку можна дістатися морем або [Concept('rivers', 'річкою')|e]. Крім того, щоб покращити цей показник, можна побудувати [Concept('roads', 'дороги')|e] та порти, а також створити новий [Concept('market', 'ринок')]."
  game_concept_market_attraction: "Ринкова привабливість"
  game_concept_market_attraction_desc: "Це привабливість [Concept('market_center', 'ринкового центру')|e] для тієї чи іншої [Concept('location', 'місцевості')|e]. Вона впливає на бажання місцевості стати частиною даного [Concept('market', 'ринку')|e].\n\nНівелюється [Concept('protectionism', 'протекціонізмом')|e]."
  game_concept_sell_price: "Ціна продажу"
  game_concept_sell_price_desc: "Це ціна, за якою [Concept('goods', 'товари')|e] продаються в конкретній [Concept('location', 'місцевості')|e].\nВона може бути нижчою за [Concept('market_price', 'ринкову ціну')|e] при поганому [Concept('market_access', 'доступі до ринку')|e]."
  game_concept_counterespionage: "Контррозвідка"
  game_concept_counterespionage_desc: "Контррозвідка визначає, наскільки ефективно [Concept('country', 'країна')|e] перешкоджає поширенню [Concept('foreign', 'чужих')|e] [Concept('spy_networks', 'шпигунських мереж')|e]."
  game_concept_spy_network: "Шпигунська мережа"
  game_concept_spy_network_i: "@spy_network!"
  game_concept_spy_networks: "Шпигунські мережі"
  game_concept_spy_network_desc: "Визначає ступінь проникнення однієї [Concept('country', 'країни')|e] у справи іншої за допомогою інформаторів, подвійних агентів та перебіжчиків — тобто впливає на кількість доступних відомостей про іншу країну. За допомогою шпигунської мережі можна виконувати недружні дипломатичні дії."
  game_concept_favor: "Прихильність"
  game_concept_favors_i: "@favors!"
  game_concept_favors: "Прихильності"
  game_concept_favors_desc: "Прихильність показує, наскільки одна [Concept('country', 'країна')|e] пообіцяла або заборгувала [Concept('country', 'іншій')].\nЗавдяки прихильності можна попросити іншу [Concept('country', 'країну')] виконати якусь дію. Якщо баланс прихильності занадто сильно порушений, то відмова на таке прохання може призвести до втрати [Concept('trust', 'довіри')|e] або навіть погіршення [Concept('diplomatic_reputation', 'дипломатичної репутації')|e]."
  game_concept_trust: "Довіра"
  game_concept_trust_i: "@trust!"
  game_concept_trusted: "Заслужена довіра"
  game_concept_trust_desc: "Довіра показує, з якою ймовірністю [Concept('country', 'країна')|e] вважатиме дії іншої [Concept('country', 'країни')] щодо себе добропорядними.\nДовіра є ключем до взаєморозуміння як між друзями, так і між ворогами."
  game_concept_supportrebels: "Підтримка повстанців"
  game_concept_support_rebels: "Підтримка повстанців"
  game_concept_supportrebels_desc: "Це ситуація, за якої [Concept('country', 'країна')|e] вирішує запропонувати підтримку групі [Concept('rebels', 'повстанців')|e] в іншій [Concept('country', 'країні')], сподіваючись, що після їхньої перемоги новий уряд буде більш дружнім."
  game_concept_great_power: "Велика держава"
  game_concept_great_powers: "Великі держави"
  game_concept_great_power_desc: "[Concept('great_power', 'Великою')] вважається [Concept('country', 'країна')|e], яка завдяки своїм [Concept('advances', 'поступу')|e], [Concept('population', 'населенню')|e], площі, [Concept('development', 'розвитку')|e] та іншим чинникам стала однією з найсильніших у світі. Цей статус дозволяє впливати на інші країни.\n\n[Concept('countries', 'Країни')] з найбільшим [Concept('great_power_score', 'рахунком великої держави')|e] стають [Concept('great_powers', 'великими')]. Загальна кількість великих держав залежить від [Concept('great_power_score', 'рахунку')|e] найсильнішої з них у порівнянні з іншими.\n\n[Concept('subjects', 'Васали')|e], а також [Concept('countries', 'країни')], які борються за свою незалежність, не можуть стати великими."
  game_concept_normal_power: "Звичайна країна"
  game_concept_normal_power_desc: "[Concept('normal_power', 'Звичайною')] називається [Concept('country', 'країна')|e], яка не є [Concept('great_power', 'великою')|e]."
  game_concept_hegemony: "Гегемонія"
  game_concept_hegemon: "Гегемон"
  game_concept_hegemons: "Гегемони"
  game_concept_hegemonies: "Гегемонії"
  game_concept_hegemony_desc: "[Concept('great_power', 'Велика держава')|e], що досягла лідерства в тій чи іншій сфері, проголошується в ній гегемоном і отримує значні бонуси.\n[ShowDatabase('hegemony')]"
  game_concept_tier: "Рівень"
  game_concept_tiers: "Рівні"
  game_concept_tier_desc: "Це назва рівня [Concept('formable_country', 'створюваної країни')|e]. У кожної [Concept('country', 'країни')|e] є рівень з I по IV залежно від того, наскільки складно її створити. Найважливіше те, що рівень створюваних [Concept('countries', 'країн')] повинен перевищувати поточний рівень країни-творця."
  game_concept_country_rank: "Ранг країни"
  game_concept_country_ranks: "Ранги країн"
  game_concept_country_rank_upper_desc: "$game_concept_country_rank$ — це рівень поваги, яку одні [Concept('countries', 'країни')|e] викликають в інших. В основному ранг залежить від площі та могутності країни, хоча для його отримання буває достатньо лише традицій. Отриманий ранг вже не можна втратити.\n\nКожен ранг країни відкриває нові дипломатичні можливості — чим він вищий, тим їх більше. Ранги відкривають нові способи впливу на інші країни за допомогою [Concept('diplomacy', 'дипломатії')|e]."
  game_concept_country_rank_list_title: "Список рангів країн"
  game_concept_country_rank_desc: "$game_concept_country_rank_upper_desc$\n[ShowDatabaseWithIcon('country_rank')]"
  game_concept_country_type: "Тип країни"
  game_concept_type_of_country: "Тип країни"
  game_concept_country_type_list_title: "Список типів країн"
  game_concept_country_type_list: "$BULLET_WITH_TAB$[settled_country|e]\n$BULLET_WITH_TAB$[army_based|e]\n$BULLET_WITH_TAB$[extraterritorial_country|e]\n$BULLET_WITH_TAB$[society_of_pops|e]"
  game_concept_country_type_desc: "$game_concept_country_type$ визначає умови її існування та сильно впливає на ігровий процес. Деякі [Concept('country', 'країни')|e] залежать від [Concept('locations', 'місцевостей')|e] у своєму [Concept('own', 'володінні')|e] і не можуть існувати без них. Інші залежать від [Concept('armies', 'військ')|e], [Concept('buildings', 'споруд')|e] або [Concept('pops', 'груп населення')|e]."
  game_concept_diplomatic_range: "Дипломатична відстань"
  game_concept_diplomatic_range_desc: "Це максимальна відстань, яку можуть подолати наші дипломати. Розраховується як дальність від однієї столиці до іншої."
  game_concept_diplomatic_capacity: "Дипломатичний потенціал"
  game_concept_diplomatic_capacity_used: "Використаний дипломатичний потенціал"
  game_concept_diplomatic_upkeep: "Дипломатичне утримання"
  game_concept_diplomatic_capacity_desc: "Союз з усіма — це союз ні з ким. [Concept('country', 'Країна')|e], що перевищила кількість зв'язків, які може мати згідно зі своїм дипломатичним потенціалом, отримує штрафи до [Concept('diplomatic_reputation', 'дипломатичної репутації')|e] та [Concept('prestige', 'престижу')|e]. Деякі [Concept('subject_types', 'типи ленників')|e] вимагають дипломатичного утримання, знижуючи доступний потенціал.\n\nУчасть в окремих [Concept('international_organizations', 'міжнародних об’єднаннях')|e] витрачає деяку кількість дипломатичного потенціалу, а силою вашого [Concept('ally', 'союзника')|e] визначається вартість укладення [Concept('alliance', 'союзу')|e]."
  game_concept_diplomatic_reputation: "Дипломатична репутація"
  game_concept_diplomatic_reputation_desc: "Дипломатична репутація показує, як [Concept('country', 'країну')|e] сприймають у ході міжнародних відносин. Зокрема, така репутація впливає на [Concept('trusted', 'довіру')|e] з боку інших країн."
  game_concept_naval_range: "Морехідна відстань"
  game_concept_naval_range_desc: "Це максимальна відстань, яку можуть подолати наші [Concept('ships', 'кораблі')|e] без необхідності повернутися і поповнити припаси."
  game_concept_colonial_range: "Колонізаційна відстань"
  game_concept_colonial_range_desc: "Ця відстань характеризує, як далеко ми можемо [Concept('explore', 'відправляти експедиції')|e] та [Concept('colonize', 'створювати колонії')|e]."
  game_concept_military_access: "Право на прохід військ"
  game_concept_military_access_desc: "Право на прохід військ дозволяє нашим військам переміщатися територією інших [Concept('countries', 'країн')|e]."
  game_concept_fleet_basing_rights: "Право на розміщення флоту"
  game_concept_fleet_basing_rights_desc: "Право на розміщення флоту дозволяє [Concept('ships', 'кораблям')|e] однієї країни використовувати [Concept('ports', 'порти')|e] іншої. Збільшує дальність експедицій та дозволяє проводити [Concept('repair', 'ремонт')|e] далеко від дому."
  game_concept_mothballed: "Консервація"
  game_concept_mothball: "Законсервувати"
  game_concept_mothballed_desc: "Законсервовані [Concept('ships', 'кораблі')|e] вимагають менше [Concept('gold', 'золота')|e] на утримання, але не підтримуються в готовності до [Concept('combat', 'бою')|e], тому над ними простіше здобути гору."
  game_concept_country_interaction: "Взаємодія з країною"
  game_concept_country_interactions: "Взаємодії з країною"
  game_concept_country_interaction_desc: "Це [Concept('actions', 'дія')|e], яку можна здійснювати щодо [Concept('country', 'країни')|e]. Виконується за допомогою [Concept('diplomacy', 'дипломатії')|e] або взаємодії з [Concept('subject', 'ленником')|e].\n\nПриклади: [ShowCountryInteractionName('sabotage_reputation')|l], [ShowCountryInteractionName('pay_off_debt')|l], [ShowCountryInteractionName('give_location_to_subject')|l]."
  game_concept_relation_type: "Тип відносин"
  game_concept_relation_types: "Типи відносин"
  game_concept_relation_type_desc: "Це відносини, які можна встановлювати з [Concept('country', 'країною')|e]. Виконуються за допомогою [Concept('diplomacy', 'дипломатії')|e] або взаємодії з [Concept('subject', 'ленником')|e].\n\nПриклади: [ShowRelationTypeName('embargo_nation')|l], [ShowRelationTypeName('sound_toll_exemption')|l], [ShowRelationTypeName('scutage')|l]."
  game_concept_army_levy: "Військове ополчення"
  game_concept_army_levies: "Військове ополчення"
  game_concept_army_levy_desc: "Військове ополчення — це [Concept('regiment', 'полк')|e], набраний безпосередньо з [Concept('pops', 'груп населення')|e]. При його наборі зменшується чисельність [Concept('pops', 'груп населення')], а при розпуску бійці, що вижили, повертаються до своїх [Concept('pops', 'груп населення')]. Такі полки гірше навчені, ніж регулярне [Concept('army', 'військо')|e], що набирається за рахунок [Concept('manpower', 'рекрутів')|e], до того ж ополчення не можна поповнювати.\n\nЦі [Concept('regiment', 'полки')|e] перебувають під дією наступного ефекту:\n\n[ShowModifierEffect('is_army_levy')]"
  game_concept_navy_levy: "Флотське ополчення"
  game_concept_navy_levies: "Флотське ополчення"
  game_concept_navy_levy_desc: "Флотське ополчення — це [Concept('ship', 'корабель')|e], екіпаж якого набраний безпосередньо з [Concept('pops', 'груп населення')|e]. При наборі його власників та екіпажу зменшується чисельність [Concept('pops', 'груп населення')] з відповідних [Concept('locations', 'місцевостей')|e], а при розпуску ті, що вижили, повертаються до своїх [Concept('pops', 'груп населення')]. Такі кораблі менш надійні, ніж [Concept('navy', 'флот')|e], що набирається за рахунок [Concept('sailors', 'моряків')|e], до того ж ополченню потрібна підтримка кораблів з гарматами."
  game_concept_levy: "Ополчення"
  game_concept_levies: "Ополчення"
  game_concept_levy_desc: "Ополчення — це військовий загін, що набирається з представників [Concept('pop', 'групи населення')|e] за призовом. Ополчення може бути [Concept('army_levy', 'військовим')|e] або [Concept('navy_levy', 'флотським')|e]."
  game_concept_levy_combat_efficiency: "Ефективність ополчення в бою"
  game_concept_levy_combat_efficiency_desc: "Впливає на те, наскільки ефективний у [Concept('combat', 'бою')|e] [Concept('regiment', 'полк')|e] [Concept('levies', 'ополченців')|e] порівняно з полком [Concept('regular', 'регулярних військ')|e]."
  game_concept_weather_system: "Погодна модель"
  game_concept_weather_systems: "Погодні моделі"
  game_concept_weather_system_desc: "Це набори погодних умов, здатні викликати в різних [Concept('locations', 'місцевостях')|e] руйнівні природні катаклізми — сильні вітри, дощі, хуртовини та піщані бурі."
  game_concept_mercenaries: "Наймані війська"
  game_concept_mercenary: "Найманець"
  game_concept_mercenary_desc: "Найманець — це приватна особа, яка воює за [Concept('gold', 'дукати')|e], але не є зацікавленою стороною конфлікту. [Concept('country', 'Країна')|e] може передавати свої загони іншим країнам як найманців.\n\nБазова вартість найманців на 50% вища, ніж вартість [Concept('regulars', 'регулярних військ')|e]."
  game_concept_mercenary_hiring_fee: "Вартість найму"
  game_concept_mercenary_hiring_fees: "Витрати на найм"
  game_concept_mercenary_hiring_fee_desc: "Початкові витрати на найм загону найманців (без урахування [Concept('mercenary_contract_length', 'терміну контракту')|e])."
  game_concept_mercenary_monthly_fee: "Щомісячна плата"
  game_concept_mercenary_monthly_fees: "Щомісячні плати"
  game_concept_mercenary_monthly_fee_desc: "Щомісячна вартість утримання загону. Залежить переважно від кількості та якості [Concept('regiments', 'полків')|e], а також від [Concept('abilities', 'навичок')|e] [Concept('commander', 'командира')|e]."
  game_concept_mercenary_contract_length: "Термін контракту"
  game_concept_mercenary_contract_length_desc: "Тривалість служби загону найманців (у місяцях) своєму наймачеві."
  game_concept_prisoner: "Полонений"
  game_concept_prisoners: "Полонені"
  game_concept_prisoner_desc: "Полонені — це ворожі [Concept('regiments', 'полки')|e], захоплені після битви. Їх можна підкупити і зробити [Concept('mercenaries', 'найманцями')|e], що б'ються на боці свого полонителя, отримати за них викуп або просто позбутися їх… гуманно чи не дуже."
  game_concept_privateer_maintenance: "Утримання каперів"
  game_concept_privateer_maintenance_desc: "[Concept('privateers', 'Капери')|e] можуть розбагатіти, але їм не здобути собі [Concept('sailors', 'моряків')|e] без підтримки [Concept('country', 'країни')|e]."
  game_concept_privateer_durability: "Витривалість каперів"
  game_concept_privateer_durability_desc: "[Concept('privateers', 'Каперам')|e] можна завдати шкоди і навіть знищити за допомогою [Concept('anti_piracy_warfare', 'впливу на піратів')|e] в їхній [Concept('area', 'області')|e]. Більш витривалі капери можуть довше протриматися."
  game_concept_civil_construction: "Цивільний об'єкт"
  game_concept_civil_constructions: "Цивільні об'єкти"
  game_concept_civil_construction_desc: "Цивільний об'єкт — це все, що в даний момент створюється в [Concept('location', 'місцевості')|e], крім [Concept('army', 'війська')|e] та [Concept('navy', 'флоту')|e]. Наприклад, зведені [Concept('buildings', 'споруди')|e], перенесена [Concept('capital', 'столиця')|e], побудовані [Concept('market', 'ринки')|e] або [Concept('roads', 'дороги')|e] — це цивільні об'єкти."
  game_concept_country_strength: "Міць країни"
  game_concept_country_strength_desc: "Міць [Concept('country', 'країни')|e] залежить від [Concept('military_strength', 'військової чисельності')|e], [Concept('income', 'доходу')|e] та кількості [Concept('population', 'населення')|e]."
  game_concept_military_strength: "Військова чисельність"
  game_concept_military_strength_desc: "Військова чисельність [Concept('country', 'країни')|e] розраховується на основі її максимального [Concept('manpower', 'числа рекрутів')|e], розміру [Concept('army', 'війська')|e] та чисельності [Concept('levy', 'ополчення')|e]."
  game_concept_naval_strength: "Чисельність флоту"
  game_concept_naval_strength_desc: "Чисельність флоту [Concept('country', 'країни')|e] розраховується на основі максимального числа [Concept('sailors', 'моряків')|e], розміру [Concept('navy', 'флоту')|e] та чисельності [Concept('navy_levy', 'флотського ополчення')|e]."
  game_concept_privateer: "Капер"
  game_concept_privateers: "Капери"
  game_concept_privateer_desc: "Капер — це підприємлива людина, що відгукнулася на заклик [Concept('country', 'країни')|e] посіяти хаос там, де є потенційно [Concept('hostile', 'ворожа')|e] [Concept('maritime_presence', 'морська присутність')|e]. Для тих, хто зустрівся з каперами, вони нічим не відрізняються від [Concept('pirates', 'піратів')|e]."
  game_concept_pirate: "Пірат"
  game_concept_pirates: "Пірати"
  game_concept_pirate_desc: "Пірати на своїх кораблях атакують інші [Concept('ships', 'кораблі')|e] або прибережні області, викрадаючи [Concept('goods', 'товари')|e] або [Concept('gold', 'золото')|e]."
  game_concept_core: "Корінна місцевість"
  game_concept_cores: "Корінні місцевості"
  game_concept_cored: "Вкорінено"
  game_concept_core_list_title: "Корінна [Concept('location', 'місцевість')] має такі ефекти:"
  game_concept_core_desc: "Корінною називають [Concept('location', 'місцевість')|e] [Concept('country', 'країни')|e], яка вважається її невіддільною частиною.\nЯкщо така [Concept('location', 'місцевість')] втрачена в ході [Concept('war', 'бойових дій')|e], то країні буде набагато простіше сфабрикувати [Concept('casus_belli', 'привід для війни')|e], щоб спробувати її повернути.\nБудь-яка [Concept('integrated', 'інтегрована')|e] [Concept('location', 'місцевість')], в якій переважає [Concept('primary_culture', 'основна культура')|e] [Concept('owner_s', 'володаря')|e] або будь-яка з [Concept('accepted_culture', 'визнаних культур')|e], стає корінною."
  game_concept_colonial_charter: "Колоніальне поселення"
  game_concept_colonial_charters: "Колоніальні поселення"
  game_concept_colonial_charter_desc: "Колоніальне поселення створюється [Concept('country', 'країною')|e], що бажає цілком [Concept('colonize', 'колонізувати')|e] [Concept('province', 'провінцію')|e].\nКолоніальне поселення стимулює [Concept('migrate', 'міграцію')|e] [Concept('pops', 'груп населення')|e] до цієї [Concept('province', 'провінції')]. Після [Concept('fully_settled', 'повного заселення')|e] [Concept('location', 'місцевість')] переходить [Concept('owned', 'у володіння')|e] колонізатора."
  game_concept_fully_settled: "Повне заселення"
  game_concept_fully_settled_desc: "Коли в [Concept('location', 'місцевості')|e] живе не менше #G  1000#! [Concept('pops', 'груп населення')|e], а також достатня їх кількість у [Concept('location', 'місцевості')] [Concept('colonial_charter', 'колоніального поселення')|e] належить до [Concept('primary_or_accepted_culture', 'основної або визнаної культури')|e] та офіційної [Concept('primary_religion', 'основної релігії')|e] власника такого поселення, ця місцевість вважається повністю заселеною. Необхідний відсоток від кількості розраховується на основі [Concept('power_projection', 'дипломатичної ваги')|e]."
  game_concept_colonized: "Колонізація"
  game_concept_colonization: "Колонізація"
  game_concept_colonize: "Колонізувати"
  game_concept_colony: "Колонія"
  game_concept_colonies: "Колонії"
  game_concept_colonized_list_title: "Колонізована [Concept('location', 'місцевість')] має такі ефекти:"
  game_concept_colonized_desc: "Колонія утворюється, коли [Concept('country', 'країна')|e] має [Concept('colonial_charter', 'колоніальне поселення')|e] в будь-якій [Concept('province', 'провінції')|e]. Країна поступово відправляє туди своє [Concept('population', 'населення')|e], доки воно не стане там новою більшістю."
  game_concept_conquer: "Завоювання"
  game_concept_conquered: "Завойовано"
  game_concept_conquer_list_title: "Завойована [Concept('location', 'місцевість')] має такі ефекти:"
  game_concept_conquer_desc: "При завоюванні [Concept('location', 'місцевості')|e] одна [Concept('country', 'країна')|e] змінює іншу в ролі її [Concept('owner', 'власника')|e]. Зазвичай завоювання відбувається при підписанні [Concept('peace_treaty', 'мирного договору')|e], але є й інші способи. Наприклад, продаж [Concept('location', 'місцевості')|e] за допомогою дипломатії.\n\nЩоб ефективно керувати завойованою [Concept('location', 'місцевістю')], її необхідно [Concept('integrated', 'інтегрувати')|e]."
  game_concept_separatism: "Сепаратизм"
  game_concept_separatism_desc: "У [Concept('pops', 'груп населення')|e], які не належать до [Concept('primary_culture', 'основної культури')|e], знижено [Concept('pop_satisfaction', 'задоволення')|e], якщо вони живуть у завойованій, але ще не [Concept('integrated', 'інтегрованій')|e] [Concept('location', 'місцевості')|e]."
  game_concept_owner: "Власник"
  game_concept_owners: "Власники"
  game_concept_ownership: "Володіння"
  game_concept_owner_s: "Власника"
  game_concept_owned: "У володінні"
  game_concept_owns: "Володіє"
  game_concept_own: "Володіти"
  game_concept_owner_desc: "Це [Concept('country', 'країна')|e], за якою юридично визнано володіння [Concept('location', 'місцевістю')|e], навіть якщо вона в даний момент [Concept('controller', 'контролюється')|e] іншою країною."
  game_concept_controller: "Контролююча сторона"
  game_concept_controlled: "Під контролем"
  game_concept_controls: "Контролює"
  game_concept_controller_desc: "[Concept('country', 'Країна')|e], яка в даний момент володіє фактичною владою над [Concept('location', 'місцевістю')|e].\n\nЯк правило, це [Concept('owner', 'власник')|e] місцевості, але в ході [Concept('war', 'війни')|e] контроль над [Concept('occupied', 'окупованою')|e] [Concept('location', 'місцевістю')] може перейти до [Concept('enemy', 'ворога')|e]."
  game_concept_rgo_pops: "Робітники або раби"
  game_concept_rgo_pops_desc: "Це [Concept('pop_types', 'суспільні класи')|e], які можуть займатися видобутком [Concept('raw_materials', 'ресурсів')|e].\n\n$BULLET_WITH_TAB$[ShowPopTypeName('laborers')]\n$BULLET_WITH_TAB$[ShowPopTypeName('slaves')]"
  game_concept_plantation: "Плантація"
  game_concept_plantations: "Плантації"
  game_concept_plantation_desc: "Це особливі [Concept('buildings', 'споруди')|e], необхідні для отримання деяких [Concept('raw_materials', 'ресурсів')|e]. До таких ресурсів належать [ShowGoodsName('cotton')|l], [ShowGoodsName('sugar')|l] та [ShowGoodsName('tobacco')|l].\n\nДля роботи цих споруд потрібні [ShowPopTypeName('slaves')|l]."
  game_concept_friend: "Друг"
  game_concept_friendly: "Дружній"
  game_concept_friend_desc: "Дружньою вважається [Concept('country', 'країна')|e] або сторона, яка є нашим [Concept('subject', 'ленником')|e], [Concept('overlord', 'сюзереном')|e] або [Concept('war', 'військовим')|e] союзником. Звісно, наша країна для нас завжди дружня."
  game_concept_hostile: "Ворожість"
  game_concept_hostile_desc: "Ворожою вважається [Concept('country', 'країна')|e] або сторона, яка прагне заподіяти нам шкоду. До них належать [Concept('rebels', 'бунтівники')|e], [Concept('pirates', 'пірати')|e] та країни, з якими ми [Concept('war', 'воюємо')|e]."
  game_concept_regency: "Регентство"
  game_concept_regencies: "Регентства"
  game_concept_regency_desc: "Це період, коли [Concept('government', 'уряд')|e] замість законного [Concept('ruler', 'правителя')|e] очолює [Concept('regent', 'регент')|e].\n\nЗазвичай це відбувається, якщо в країні немає відповідного [Concept('heir', 'спадкоємця')|e] згідно з [Concept('heir_selection', 'правилами престолонаслідування')|e] або якщо [Concept('heir', 'спадкоємець')] ще [Concept('child', 'дитина')|e].\n\n[ShowGovernmentTypeName('monarchy')] допускає ситуацію, коли [Concept('regent', 'регентом')] може стати [Concept('consort', 'консорт')|e], але зазвичай ним стає [Concept('character', 'персонаж')|e] з наймогутнішого [Concept('estate', 'стану')|e] або навіть [Concept('overlord', 'сюзерен')|e].\n\nРегентство триває доти, доки до влади не прийде відповідний [Concept('ruler', 'правитель')]."
  game_concept_situation: "Ситуація"
  game_concept_situations: "Ситуації"
  game_concept_situation_desc: "Ситуація — це найважливіша історична подія, в якій бере участь кілька [Concept('country', 'країн')|e] і яка може бути тривалою в часі.\n\nДо числа найважливіших ситуацій належать #TOOLTIP:SITUATION,black_death,X #L чорна смерть#!#! та #TOOLTIP:SITUATION,reformation,X #L Реформація#!#!.\n\nСитуації доби #TOOLTIP:AGE,age_1_traditions,X #L Традицій#!#!:\n$BULLET$Столітня війна\n$BULLET$Гвельфи та гібеліни\n$BULLET$Сходження турків\n$BULLET$Період Намбокутьо\n$BULLET$Падіння Делі\n\nСитуації доби #TOOLTIP:AGE,age_2_renaissance,X #L Відродження#!#!:\n$BULLET$Чорна смерть\n$BULLET$Гуситські війни\n$BULLET$Повстання «Червоних пов'язок»\n$BULLET$Сходження Тимура\n$BULLET$Великий західний розкол\n\nСитуації доби #TOOLTIP:AGE,age_3_discovery,X #L Відкриттів#!#!:\n$BULLET$Чорна смерть\n$BULLET$Італійські війни\n$BULLET$Реформація\n$BULLET$Період Сенґоку\n$BULLET$Договір [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]\n\nСитуації доби #TOOLTIP:AGE,age_4_reformation,X #L Реформації#!#!:\n$BULLET$Тридентський собор\n$BULLET$Релігійна війна\n\nСитуації доби #TOOLTIP:AGE,age_5_absolutism,X #L Абсолютизму#!#!:\n$BULLET$Колумбів обмін\n$BULLET$Золотий вік піратства\n$BULLET$Малий льодовиковий період\n\nСитуації доби #TOOLTIP:AGE,age_6_revolutions,X #L Революцій#!#!:\n$BULLET$Колоніальна революція\n$BULLET$Народне повстання"
  game_concept_situation_action: "Ситуативна дія"
  game_concept_situation_actions: "Ситуативні дії"
  game_concept_situation_action_desc: "Це [Concept('actions', 'дія')|e], яку можна здійснювати в певній [Concept('situation', 'ситуації')|e]. Щойно ситуація завершується, такі дії стають недоступними.\n\nПриклади: [ShowGenericActionName('hide_from_black_death')|l], [ShowGenericActionName('rtr_rekindle_revolt')|l]."
  game_concept_disaster: "Лихо"
  game_concept_disasters: "Лиха"
  game_concept_disaster_desc: "Лихо — це значний і руйнівний інцидент, що зачіпає одну [Concept('country', 'країну')|e]. Лихо може тривати або залишатися активним протягом довгого періоду часу, доки країні не вдасться з ним впоратися.\n\nДо числа найважливіших лих належать #TOOLTIP:DISASTER_TYPE,ambrosian_republic_disaster,X #L Золота Амброзіанська Республіка#!#! та #TOOLTIP:DISASTER_TYPE,dissolution_of_delhi,X #L Розпад Делійського Султанату#!#!."
  game_concept_tax_efficiency: "Податкова ефективність"
  game_concept_tax_efficiency_desc: "Показує, наскільки ефективно наша [Concept('country', 'країна')|e] збирає [Concept('tax', 'податки')|e]. Чим вищий цей показник, тим більше податків від [Concept('estates', 'станів')|e] надходить до [Concept('treasury', 'скарбниці')|e]."
  game_concept_trade_efficiency: "Торговельна ефективність"
  game_concept_trade_efficiency_desc: "Змінює кількість золота, яке ви отримуєте від [Concept('trades', 'торгівлі')|e], безпосередньо впливаючи на ціну, за якою ви продаєте [Concept('goods', 'товари')|e] на вибраному [Concept('market', 'ринку')|e]."
  game_concept_production_efficiency: "Виробнича ефективність"
  game_concept_production_efficiency_desc: "Впливає на [Concept('output', 'обсяг випуску')|e] товарів у [Concept('buildings', 'спорудах')|e]. При позитивному значенні виробничої ефективності збільшується дохід, при негативному споруда може стати нерентабельною."
  game_concept_economical_base: "Економічна база"
  game_concept_economical_base_desc: "Обчислюється на основі [Concept('tax_base', 'податкової бази')|e] та загального обсягу [Concept('trades', 'торговельних угод')|e] [Concept('country', 'країни')|e], а також потенційного прибутку [Concept('sound_tolls', 'за прохід')|e]."
  game_concept_tax_rate: "Податкова ставка"
  game_concept_tax_rate_desc: "Відсоток від [Concept('max_tax', 'максимального податку')|e], який [Concept('estate', 'стан')|e] сплачує у вигляді [Concept('taxes', 'податків')|e]."
  game_concept_max_tax: "Макс. податок"
  game_concept_maximum_tax: "Максимальний податок"
  game_concept_max_tax_desc: "Максимальний відсоток [Concept('tax', 'податку')|e], що стягується з [Concept('estate', 'стану')|e]."
  game_concept_min_tax: "Мін. податок"
  game_concept_minimum_tax: "Мінімальний податок"
  game_concept_min_tax_desc: "Мінімальний відсоток [Concept('tax', 'податку')|e], що стягується з [Concept('estate', 'стану')|e]."
  game_concept_profit: "Прибуток"
  game_concept_profit_desc: "Це величина внеску [Concept('building', 'споруди')|e] або місця [Concept('rgo', 'видобутку ресурсів')|e] у [Concept('wealth', 'багатство')|e] своєї [Concept('location', 'місцевості')]. Іншими словами, це кількість [Concept('gold', 'дукатів')|e], які створює ця [Concept('building', 'споруда')].\n\nЯкщо прибуток стане від’ємним, споруда вважатиметься збитковою та припинить роботу."
  game_concept_taxable_profit: "Оподатковуваний прибуток"
  game_concept_taxable_profit_desc: "Це кількість оподатковуваних [Concept('taxes', 'податками')|e] [Concept('gold', 'дукатів')|e], створюваних [Concept('building', 'спорудою')] або місцем [Concept('rgo', 'видобутку ресурсів')]. При розрахунку цього показника враховується значення [Concept('control', 'контролю')|e]."
  game_concept_tax: "Податок"
  game_concept_taxes: "Податки"
  game_concept_tax_desc: "Ми можемо збирати податки з наших [Concept('estates', 'станів')|e]. Це поповнить [Concept('treasury', 'скарбницю')|e], однак високі податки знижуватимуть [Concept('estate_satisfaction', 'задоволення цих станів')|e].\n\nОбсяг [Concept('wealth', 'багатства')|e], яке можна оподаткувати, залежить від [Concept('control', 'контролю')|e] над [Concept('locations', 'місцевостями')|e], які є джерелами [Concept('wealth', 'багатства')] для [Concept('estates', 'станів')]."
  game_concept_tax_base: "Податкова база"
  game_concept_tax_base_desc: "Податкова база — це загальне [Concept('wealth', 'багатство')|e] [Concept('location', 'місцевості')], оподатковуване [Concept('taxes', 'податками')|e], яке безпосередньо залежить від ступеня [Concept('control', 'контролю')|e] над районом. За низького рівня [Concept('control', 'контролю')] багатство безпосередньо переходить до [Concept('estates', 'станів')] і не оподатковується.\n\n[Concept('wealth', 'Багатство')] розподіляється між [Concept('estates', 'станами')] залежно від їхньої [Concept('wealth_share', 'частки багатства')|e] в [Concept('location', 'місцевості')]. При цьому кожен [Concept('estate', 'стан')] виплачує частину податкової бази до [Concept('treasury', 'скарбниці')|e] відповідно до своєї [Concept('tax_rate', 'податкової ставки')|e]."
  game_concept_wealth: "Багатство"
  game_concept_wealth_desc: "Багатство [Concept('location', 'місцевості')|e] — це сукупний прибуток [Concept('location', 'місцевості')] від продажу на [Concept('market', 'ринку')|e] своїх [Concept('goods', 'товарів')|e], які виробляються [Concept('buildings', 'спорудами')|e] та місцями [Concept('rgo', 'видобутку ресурсів')|e]. #TOOLTIP:POPTYPE,burghers,X #L Міщани#!#! можуть збільшити багатство [Concept('location', 'місцевості')] за рахунок своєї [Concept('burgher_trade', 'участі в торгівлі')|e].\n\nБагатство розподіляється між [Concept('estates', 'станами')] залежно від їхньої [Concept('wealth_share', 'частки багатства')] в [Concept('location', 'місцевості')]. Багатство, помножене на значення [Concept('control', 'контролю')|e], визначає [Concept('tax_base', 'податкову базу')|e] [Concept('location', 'місцевості')] — ту суму [Concept('gold', 'дукатів')|e], яка оподатковується. За низького значення [Concept('control', 'контролю')] багатство безпосередньо переходить до [Concept('estates', 'станів')] і не оподатковується."
  game_concept_wealth_share: "Частка багатства"
  game_concept_wealth_share_desc: "[Concept('wealth', 'Багатство')|e] [Concept('location', 'місцевості')|e] розподіляється між [Concept('estates', 'станами')|e] відповідно до їхньої відносної чисельності [Concept('population', 'населення')|e] в [Concept('location', 'місцевості')]. Як правило, у кожного #TOOLTIP:POPTYPE,nobles,X #L аристократа#!#! частка більша, ніж у #TOOLTIP:POPTYPE,burghers,X #L міщанина#!#!, а у нього, своєю чергою, частка більша, ніж у #TOOLTIP:POPTYPE,peasants,X #L селянина#!#!.\n\nЗалежно від ступеня #TOOLTIP:MODIFIER_TYPE,local_peasant_enfranchisment,X #L звільнення#!#! #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! [Concept('location', 'місцевості')] деяка частина їхньої частки багатства передається #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!."
  game_concept_bankrupt: "Банкрут"
  game_concept_bankruptcy: "Банкрутство"
  game_concept_bankrupt_desc: "[Concept('country', 'Країна')|e], що оголосила себе банкрутом, позбавляється всіх [Concept('debt', 'боргів')|e]. Однак при цьому вона отримує потужні негативні [Concept('modifiers', 'модифікатори')|e] терміном на 5 років.\nКрім того, [Concept('country', 'країна')] змушена стати банкрутом, якщо більше не може брати [Concept('loans', 'позики')|e] і в неї закінчилися гроші."
  game_concept_formable_country: "Створювана країна"
  game_concept_formable: "Створювана"
  game_concept_formables: "Створювані"
  game_concept_formable_country_formed: "Створена"
  game_concept_formable_country_form: "Створити"
  game_concept_formable_country_formation: "Створення"
  game_concept_formable_forming: "Створюється"
  game_concept_formable_countries: "Створювані країни"
  game_concept_formable_country_desc: "Створювана країна — це нова національна ідентичність, яка може бути створена або відтворена [Concept('country', 'країною')|e] за дотримання певних умов.\n\nСеред них може бути контроль над певною часткою [Concept('locations', 'місцевостей')|e] у [Concept('region', 'регіоні')|e] або наявність відповідної [Concept('primary_culture', 'основної культури')|e].\n\nМи можемо створювати лише країни, чий [Concept('tier', 'рівень')|e] вищий за наш.\n\nЗазвичай такі країни являють собою історичні союзи або навіть відображають прагнення, описані в легендах. При цьому стара [Concept('country', 'країна')] змінить прапор, назву та колір на ті, що відповідають створюваній країні."
  game_concept_revolter: "Заколот"
  game_concept_revolt: "Заколот"
  game_concept_revolter_desc: "Під час заколоту кілька [Concept('locations', 'місцевостей')|e] відокремлюються від [Concept('country', 'країни')|e] та оголошують [Concept('war', 'війну')|e] колишньому [Concept('owner', 'власнику')|e]."
  game_concept_rebel_movement: "Заколотницький рух"
  game_concept_rebel_movements: "Заколотницькі рухи"
  game_concept_rebel: "Заколотник"
  game_concept_rebels: "Заколотники"
  game_concept_rebellion: "Заколот"
  game_concept_rebellions: "Заколоти"
  game_concept_rebel_movement_desc: "Заколотницький рух — це об'єднання [Concept('pops', 'груп населення')|e], що виступають проти уряду через своє низьке [Concept('pop_satisfaction', 'вдоволення')|e].\n\nЄ різні типи заколотницьких рухів. Наприклад, [Concept('pops', 'групи населення')|e] іншої [Concept('culture', 'культури')|e] або [Concept('religion', 'релігії')|e] спробують підняти [Concept('revolt', 'заколот')|e], тоді як невдоволене [Concept('estate', 'становище')|e] спробує розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_minor_revolt: "Локальний бунт"
  game_concept_minor_revolts: "Локальні бунти"
  game_concept_minor_revolt_desc: "Якщо [Concept('rebel_movement', 'заколотницький рух')] не зможе зібрати достатньої підтримки, досягнувши #W 100%#!, то він не зуміє влаштувати повномасштабний [Concept('revolt', 'заколот')|e]. У такому випадку в непокірних [Concept('locations', 'місцевостях')|e] станеться [ShowModifier('minor_rebel_uprising')|l], який дає такі штрафи:\n\n[ShowModifierEffect('minor_rebel_uprising')]."
  game_concept_estate_rebels: "Станові заколотники"
  game_concept_estate_rebels_desc: "Заколотники — це [Concept('pops', 'групи населення')|e], що належать до іншої [Concept('culture', 'культури')|e] або сповідують іншу [Concept('religion', 'релігію')|e], які об'єдналися з метою підняти [Concept('revolt', 'заколот')|e]. Крім того, заколотники можуть з'явитися в невдоволеному [Concept('estate', 'становищі')|e], яке намагається розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_nationalist_rebels: "Націоналістичні заколотники"
  game_concept_nationalist_rebels_desc: "Заколотники — це [Concept('pops', 'групи населення')|e], що належать до іншої [Concept('culture', 'культури')|e] або сповідують іншу [Concept('religion', 'релігію')|e], які об'єдналися з метою підняти [Concept('revolt', 'заколот')|e]. Крім того, заколотники можуть з'явитися в невдоволеному [Concept('estate', 'становищі')|e], яке намагається розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_pretender_rebels: "Заколотники-претенденти"
  game_concept_pretender_rebels_desc: "Заколотники — це [Concept('pops', 'групи населення')|e], що належать до іншої [Concept('culture', 'культури')|e] або сповідують іншу [Concept('religion', 'релігію')|e], які об'єдналися з метою підняти [Concept('revolt', 'заколот')|e]. Крім того, заколотники можуть з'явитися в невдоволеному [Concept('estate', 'становищі')|e], яке намагається розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_religious_rebels: "Релігійні заколотники"
  game_concept_religious_rebels_desc: "Заколотники — це [Concept('pops', 'групи населення')|e], що належать до іншої [Concept('culture', 'культури')|e] або сповідують іншу [Concept('religion', 'релігію')|e], які об'єдналися з метою підняти [Concept('revolt', 'заколот')|e]. Крім того, заколотники можуть з'явитися в невдоволеному [Concept('estate', 'становищі')|e], яке намагається розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_slave_rebels: "Заколотні раби"
  game_concept_slave_rebels_desc: "Заколотники — це [Concept('pops', 'групи населення')|e], що належать до іншої [Concept('culture', 'культури')|e] або сповідують іншу [Concept('religion', 'релігію')|e], які об'єдналися з метою підняти [Concept('revolt', 'заколот')|e]. Крім того, заколотники можуть з'явитися в невдоволеному [Concept('estate', 'становищі')|e], яке намагається розв'язати [Concept('civil_war', 'громадянську війну')|e]."
  game_concept_disloyal_subjects: "Нелояльний ленник"
  game_concept_disloyal_subject: "Нелояльний ленник"
  game_concept_disloyal_subjects_short: "Нелояльні"
  game_concept_disloyal_subjects_desc: "[Concept('subject', 'Ленник')] стає нелояльним, коли його [Concept('subject_loyalty', 'лояльність')|e] по відношенню до [Concept('overlord', 'сюзерена')|e] становить менше [GetDefine('NDiplomacy', 'TOO_DISLOYAL_THRESHOLD')].\n\nТакий ленник не братиме участі у [Concept('wars', 'війнах')|e] свого [Concept('overlord', 'сюзерена')], і його неможливо [Concept('annexed', 'приєднати')|e]."
  game_concept_loyal_subjects: "Вірні ленники"
  game_concept_loyal_subject: "Вірний ленник"
  game_concept_loyal_subjects_short: "Вірні"
  game_concept_loyal_subjects_desc: "Коли [Concept('subject_loyalty', 'лояльність')|e] по відношенню до [Concept('overlord', 'сюзерена')|e] становить більше [GetDefine('NDiplomacy', 'TOO_DISLOYAL_THRESHOLD')], [Concept('subject', 'ленник')] стає вірним.\n\nТакий ленник братиме участь у [Concept('wars', 'війнах')|e] свого [Concept('overlord', 'сюзерена')], і його можна [Concept('annexed', 'приєднати')|e]."
  game_concept_pop_needs: "Потреби населення"
  game_concept_pop_needs_desc: "Кожній [Concept('pop_with_icon', 'групі населення')|e] потрібні певні [Concept('goods_with_icon', 'товари')|e]. Перелік товарів залежить від [Concept('pop_type', 'суспільного класу')|e] групи, її [Concept('culture', 'культури')|e], [Concept('religion', 'релігії')|e] та місця проживання. Наприклад, у #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! запити набагато вищі, ніж у представників [Concept('lower_class', 'нижчого суспільства')|e]. Якщо потреби групи населення не задовольняються, її [Concept('pop_satisfaction_with_icon', 'задоволення')|e] знижується.\n\nЗ [Concept('development_with_icon', 'розвитком')|e] [Concept('location', 'місцевості')|e] потреба її [Concept('pop', 'населення')] в [Concept('goods', 'товарах')] зростає."
  game_concept_pop_satisfaction: "Задоволення групи населення"
  game_concept_pop_satisfaction_desc: "Показує, наскільки [Concept('pop', 'група населення')|e] задоволена життям. На це впливають такі чинники, що стосуються групи населення:\n$BULLET_WITH_TAB$[Concept('estate_satisfaction', 'Задоволення стану')|e]\n$BULLET_WITH_TAB$[Concept('unrest', 'Заворушення')|e] в [Concept('location', 'місцевості')|e]\n$BULLET_WITH_TAB$[Concept('tolerance', 'Терпимість')|e] до її [Concept('religion', 'релігії')|e]\n$BULLET_WITH_TAB$[Concept('accepted_culture', 'Визнання')|e] її культури\n$BULLET_WITH_TAB$Задоволення [Concept('pop_needs', 'потреб')|e]\n$BULLET_WITH_TAB$[Concept('market_price', 'Ринкова ціна')|e] на товари для покриття [Concept('pop_needs', 'потреб')|e]\n$BULLET_WITH_TAB$[Concept('cultural_opinion', 'Думка')|e] про її [Concept('culture', 'культуру')|e] з боку носіїв [Concept('culture', 'культури')] в [Concept('country', 'країні')|e]"
  game_concept_average_satisfaction: "Середнє задоволення"
  game_concept_average_satisfaction_desc: "Це усереднений показник [Concept('pop_satisfaction', 'задоволення груп населення')|e] в тій чи іншій [Concept('location', 'місцевості')|e]. Може негативно позначатися на [Concept('prosperity', 'процвітанні')|e] місцевості та [Concept('control', 'контролі')|e] над нею."
  game_concept_port: "Порт"
  game_concept_ports: "Порти"
  game_concept_port_desc: "Порт — це сухопутна [Concept('location', 'місцевість')|e] поруч із морем, де є можливість будувати та швартувати [Concept('ships', 'кораблі')|e]."
  game_concept_colonial_migration: "Колоніальна міграція"
  game_concept_colonial_migration_desc: "[Concept('colonial_migration', 'Колоніальною')|e] називається [Concept('migrate', 'міграція')|e] [Concept('pops', 'груп населення')|e] з [Concept('core', 'корінних')|e] [Concept('locations', 'місцевостей')|e] у [Concept('colonial_charter', 'колоніальне поселення')|e]."
  game_concept_disease_resistance: "Опірність епідеміям"
  game_concept_disease_resistance_desc: "Ця характеристика [Concept('pops', 'груп населення')|e] та [Concept('characters', 'персонажів')|e] впливає на їхній шанс вижити під час [Concept('diseases', 'епідемій')|e], таких як [ShowDiseaseName('bubonic_plague')|l]."
  game_concept_migration_attraction: "Міграційна привабливість"
  game_concept_migration_attraction_desc: "Коли [Concept('pops', 'групи населення')|e] живуть у [Concept('location', 'місцевості')|e] з негативною міграційною привабливістю, вони хочуть переселитися в [Concept('location', 'місцевість')] з найбільшою міграційною привабливістю в межах того ж [Concept('market', 'ринку')|e]. Деякі типи [Concept('pops', 'груп населення')|e], наприклад [ShowPopTypeName('slaves')|l], позбавлені права на міграцію, а інші, наприклад [ShowPopTypeName('peasants')|l], можуть мігрувати, тільки якщо це дозволяють їхні [Concept('estate_privileges', 'станові привілеї')|e]."
  game_concept_migration: "Міграція"
  game_concept_migrate: "Мігрувати"
  game_concept_migrates: "Мігрувати"
  game_concept_migrated: "Мігрували"
  game_concept_migration_desc: "[Concept('pops', 'Групи населення')|e] мігруватимуть з однієї [Concept('location', 'місцевості')|e] до іншої, якщо вважають, що там живеться краще. [Concept('pops', 'Групи населення')] з певних [Concept('estates', 'станів')|e] можуть бути позбавлені права вільно мігрувати, це визначається їхніми [Concept('estate_privileges', 'становими привілеями')|e] в [Concept('country', 'країні')|e]. Зазвичай [Concept('pops', 'групи населення')] мігрують лише в межах одного й того ж [Concept('market', 'ринку')|e]. Винятками є міграція до [Concept('colonial_charter', 'колоніального поселення')|e] або міграція в межах [Concept('event', 'події')|e]."
  game_concept_unrest: "Заворушення"
  game_concept_unrest_desc: "Цей показник негативно впливає на [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pops', 'груп населення')|e] в конкретній [Concept('location', 'місцевості')|e]."
  game_concept_truce: "Перемир'я"
  game_concept_truce_desc: "Перемир'я автоматично укладається після підписання [Concept('peace_treaty', 'мирного договору')|e] між двома [Concept('countries', 'країнами')|e]. Оголошення [Concept('war', 'війни')|e] країні, з якою у нас перемир'я, призведе до серйозних штрафів. Деякі дипломатичні дії можуть бути недоступні щодо країн, з якими у нас укладено перемир'я."
  game_concept_trait: "Риса"
  game_concept_traits: "Риси"
  game_concept_trait_upper_desc: "$game_concept_traits$ визначають характер і поведінку [Concept('character', 'персонажа')|e] в різних обставинах. Їх можна отримати під час виконання певних [Concept('roles', 'ролей')|e], однак $game_concept_character$ використовуватиме лише ті $game_concept_traits$, які відповідають виконуваній [Concept('role', 'ролі')|e]."
  game_concept_trait_desc: "$game_concept_trait_upper_desc$"
  game_concept_ruler_trait: "Риса правителя"
  game_concept_ruler_traits: "Риси правителя"
  game_concept_ruler_trait_desc: "$game_concept_ruler_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('ruler', 'правитель')|e] або [Concept('regent', 'регент')|e].\n\n$game_concept_character$, що керує [Concept('country', 'країною')|e], може отримати до трьох таких [Concept('trait', 'рис')|e]."
  game_concept_general_trait: "Риса полководця"
  game_concept_general_traits: "Риси полководця"
  game_concept_general_trait_desc: "$game_concept_general_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('general', 'полководець')|e].\n\n$game_concept_character$, що бере участь у сухопутних [Concept('battles', 'битвах')|e], може отримати одну [Concept('trait', 'рису')|e] полководця."
  game_concept_admiral_trait: "Риса адмірала"
  game_concept_admiral_traits: "Риси адмірала"
  game_concept_admiral_trait_desc: "$game_concept_admiral_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('admiral', 'адмірал')|e].\n\n$game_concept_character$, що бере участь у морських [Concept('battles', 'битвах')|e], може отримати одну [Concept('trait', 'рису')|e] адмірала."
  game_concept_explorer_trait: "Риса дослідника"
  game_concept_explorer_traits: "Риси дослідника"
  game_concept_explorer_trait_desc: "$game_concept_explorer_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('explorer', 'дослідник')|e].\n\n$game_concept_character$, що очолює [Concept('exploration', 'експедиції')|e], може отримати одну [Concept('trait', 'рису')|e] дослідника."
  game_concept_artist_trait: "Риса митця"
  game_concept_artist_traits: "Риси митця"
  game_concept_artist_trait_desc: "$game_concept_artist_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('artist', 'митець')|e].\n\nКожен митець у момент своєї появи як персонажа отримує таку [Concept('trait', 'рису')|e]."
  game_concept_child_trait: "Риса дитини"
  game_concept_child_traits: "Риси дитини"
  game_concept_child_trait_desc: "У кожного [Concept('child', 'дитяти')|e] та [Concept('adolescent', 'підлітка')|e] є одна властивість, яка зникає, щойно він стає [Concept('adult', 'дорослим')|e]. Ці властивості впливають на швидкість розвитку [Concept('abilities', 'навичок')|e]."
  game_concept_religious_figure_trait: "Властивість релігійного діяча"
  game_concept_religious_figure_traits: "Властивості релігійного діяча"
  game_concept_religious_figure_trait_desc: "$game_concept_religious_figure_trait$ діє лише в тому випадку, якщо [Concept('character', 'персонаж')|e] — [Concept('religious_figure', 'релігійний діяч')|e].\n\n$game_concept_character$, що володіє [Concept('trait', 'властивістю')|e] релігійного діяча, може надати перевагу [Concept('country', 'країні')|e], яка вирішить його найняти."
  game_concept_fortification: "Укріплення"
  game_concept_fortifications: "Укріплення"
  game_concept_fort: "Фортеця"
  game_concept_forts: "Фортеці"
  game_concept_fortification_desc: "Це оборонна [Concept('buildings', 'споруда')|e], яка захищає [Concept('locations', 'місцевості')|e] [Concept('country', 'країни')|e] від [Concept('enemy', 'ворожих')|e] [Concept('armies', 'військ')|e]. [Concept('location', 'Місцевість')] під захистом фортеці не можна [Concept('sieged', 'захопити')|e] швидко, знадобиться тривала [Concept('siege', 'облога')|e]. За допомогою певних [Concept('advances', 'поступів')|e] можна будувати ефективніші фортеці, кожен їх рівень підвищує складність [Concept('siege', 'облоги')], необхідної для [Concept('occupy', 'окупації')|e] місцевості.\n\nФортеці мають [Concept('zone_of_control', 'зону контролю')|e] над прилеглими [Concept('locations', 'місцевостями')].\n\nФортеці вимагають [Concept('fort_maintenance_with_icon', 'утримання')|e] з [Concept('treasury', 'скарбниці')] країни. Витрати залежать від вартості [Concept('goods', 'товарів')] на її [Concept('market', 'ринку')|e]. У всіх [Concept('countries', 'країн')] є [Concept('fort_limit', 'ліміт фортець')], що визначає, скільки фортець країна в змозі ефективно підтримувати. Перевищення цього ліміту значно збільшує [Concept('fort_maintenance', 'утримання фортець')]."
  game_concept_fort_limit: "Ліміт фортець"
  game_concept_fort_limit_desc: "Ліміт фортець відображає здатність [Concept('country_with_icon', 'країни')|E] утримувати свої [Concept('fortifications_with_icon', 'укріплення')|E], не перевантажуючи управлінський апарат. Якщо [Concept('country', 'країна')] перевищить ліміт фортець, витрати на їх [Concept('fort_maintenance_with_icon', 'утримання')|E] почнуть зростати.\n\nЛіміт фортець підвищується в основному за рахунок приєднання нових [Concept('locations_with_icon', 'місцевостей')|E], але також залежить від [Concept('country_rank_with_icon', 'рангу країни')|E] та кількості [Concept('locations', 'місцевостей')] [Concept('location_rank', 'рангу')|E] #TOOLTIP:LOCATIONRANK,city,X #L «Місто»#!#!. Цей ліміт можна підвищити за допомогою деяких [Concept('advances_with_icon', 'поступів')|E] та [Concept('societal_value_with_icon', 'суспільної цінності')|E] [ShowSocietyDirectionName('defensive')]."
  game_concept_zone_of_control: "Зона контролю"
  game_concept_zones_of_control: "Зони контролю"
  game_concept_zone_of_control_desc: "Характеризує здатність [Concept('fortification', 'укріплення')|e] блокувати пересування [Concept('enemy', 'ворожих')|e] [Concept('armies', 'військ')|e] через [Concept('locations', 'місцевості')|e], що межують з цим укріпленням. [Concept('army', 'Військо')] нападника, яка розташовується у [Concept('enemy', 'ворожій')] [Concept('location', 'місцевості')] поблизу [Concept('enemy', 'ворожої')] [Concept('fort', 'фортеці')], буде змушена спершу [Concept('siege', 'обложити')|e] цю [Concept('fort', 'фортецю')] і тільки потім зможе пройти повз неї в будь-яку [Concept('location', 'місцевість')], що межує з цією [Concept('fort', 'фортецею')]."
  game_concept_role: "Роль"
  game_concept_roles: "Ролі"
  game_concept_role_list_title: "Список ролей"
  game_concept_role_list: "[Concept('ruler', 'Правитель')|e]\n[Concept('regent', 'Регент')|e]\n[Concept('cabinet_member', 'Радник')|e]\n[Concept('general', 'Полководець')|e]\n[Concept('admiral', 'Адмірал')|e]\n[Concept('explorer', 'Дослідник')|e]\n[Concept('artist', 'Творець')|e]"
  game_concept_role_desc: "$game_concept_roles$ — це різні обов'язки, які доступні [Concept('adult', 'дорослим')|e] [Concept('character', 'персонажам')|e], що живуть у [Concept('country', 'країні')|e]. Дія [Concept('abilities', 'навичок')|e] персонажа буде відрізнятися залежно від його ролі. Крім того, персонажі, що виконують роль, можуть отримувати різні [Concept('traits', 'властивості')|e].\n\n$game_concept_character$ зазвичай не може виконувати більше однієї ролі одночасно, але іноді [Concept('rulers', 'правителі')|e] та [Concept('regents', 'регенти')|e] можуть бути [Concept('generals', 'полководцями')|e] та [Concept('admirals', 'адміралами')|e]."
  game_concept_regent: "Регент"
  game_concept_regents: "Регенти"
  game_concept_regent_desc: "Це [Concept('character', 'персонаж')|e], що виконує обов'язки [Concept('ruler', 'правителя')|e] [Concept('country', 'країни')|e] в період [Concept('regency', 'регентства')|e]."
  game_concept_commander: "Командир"
  game_concept_commanders: "Командири"
  game_concept_commander_desc: "Командир — це [Concept('admiral', 'адмірал')|e] або [Concept('general', 'полководець')|e], що стоїть на чолі [Concept('unit', 'загону')|e]."
  game_concept_admiral: "Адмірал"
  game_concept_admirals: "Адмірали"
  game_concept_admiral_desc: "Це [Concept('character', 'персонаж')|e], призначений командувати [Concept('navy', 'флотом')|e]."
  game_concept_general: "Полководець"
  game_concept_generals: "Полководці"
  game_concept_general_desc: "Це [Concept('character', 'персонаж')|e], призначений командувати [Concept('army', 'військом')|e]."
  game_concept_artistic_skill: "Талант"
  game_concept_artistic_skill_desc: "Цей навик найсильніше впливає на [Concept('art_quality', 'якість')|e] [Concept('work_of_art', 'творів')|e], які може створювати [Concept('artist', 'творець')|e]."
  game_concept_artist_salary: "Творчий гонорар"
  game_concept_artist_salary_desc: "Кількість [Concept('gold', 'золота')|e], яку отримає [Concept('artist', 'творець')|e]."
  game_concept_merchant: "Купець"
  game_concept_merchants: "Купці"
  game_concept_merchant_desc: "Купці — це спільнота підприємців, вірних своїй [Concept('country', 'країні')|e]. Вони відповідальні за операції на [Concept('market', 'ринку')|e]. Купці можуть використовувати [Concept('merchant_power', 'торгову перевагу')|e] та [Concept('merchant_capacity', 'торговий потенціал')|e], щоб отримувати більше прибутку від [Concept('trade', 'обміну')|e] [Concept('goods', 'товарами')|e] з іншими [Concept('market', 'ринками')|e]."
  game_concept_merchant_power: "Торгова перевага"
  game_concept_merchant_power_desc: "$game_concept_merchant_power$ [Concept('countries', 'країн')|e] на [Concept('market', 'ринку')|e] визначає черговість [Concept('exports', 'експорту')|e].\n\nЯкщо [Concept('supply', 'пропозиція')|e] [Concept('goods', 'товарів')|e] на ринку обмежена, то їх кількість розподіляється за спаданням торгового переваги кожної [Concept('country', 'країни')|e] на цьому ринку."
  game_concept_merchant_capacity: "Торговий потенціал"
  game_concept_merchant_capacity_desc: "Показує, скільки товарів [Concept('country', 'країна')|e] може [Concept('export', 'експортувати')|e] та [Concept('import', 'імпортувати')|e] на [Concept('market', 'ринку')|e].\n\nКожна [Concept('trade', 'угода')|e] на певному [Concept('market', 'ринку')] задіює [Concept('merchant_capacity', 'торговий потенціал')|e] залежно від відстані до іншого [Concept('market', 'ринку')] та кількості [Concept('goods', 'товарів')|e], що беруть участь в [Concept('trade', 'угоді')]."
  game_concept_merchant_maintenance: "Забезпечення торгівлі"
  game_concept_merchant_maintenance_desc: "Відображає витрати на проведення [Concept('trades', 'торгових угод')|e] між [Concept('markets', 'ринками')|e]. Процес торгівлі потрібно забезпечувати: кораблям, возам, обозам і самим купцям потрібне грошове утримання.\n\nЗабезпечення торгівлі зростає залежно від відстані. На нього також впливає [Concept('sound_tolls', 'плата за прохід')|e]."
  game_concept_subject_taxation: "Податки з ленників"
  game_concept_subject_taxation_desc: "Податки з ленників — це [Concept('gold', 'золото')|e], яке [Concept('overlord', 'сюзерен')|e] отримує зі своїх [Concept('subjects', 'ленників')|e]. Конкретна сума залежить від [Concept('subject_type', 'типу')|e] та економічного становища [Concept('subject', 'ленника')]."
  game_concept_subject_loyalty: "Лояльність ленника"
  game_concept_subject_loyalty_desc: "У кожного [Concept('subject', 'ленника')|e] є показник лояльності по відношенню до [Concept('overlord', 'сюзерена')|e]. Лояльність варіюється в діапазоні від 0 до 100. Коли вона опускається нижче 50, [Concept('subject', 'ленник')] стає [Concept('disloyal_subject', 'нелояльним')|e].\n\nЛояльність залежить від [Concept('liberty_desire', 'бажання свободи')|e]. Знизити її можна за допомогою [Concept('cabinet_action', 'доручення')|e] «[ShowCabinetActionName('sow_disloyalty')]»."
  game_concept_subject_type: "Тип ленника"
  game_concept_subject_types: "Типи ленників"
  game_concept_subject_type_desc: "Тип [Concept('subject', 'ленника')|e] визначає його поведінку щодо [Concept('war', 'війни')|e] та [Concept('heir_selection', 'правил престолонаслідування')|e].\n\nТип [Concept('subject', 'ленника')] також впливає на його [Concept('great_power_score', 'рахунок великої держави')|e] та суму [Concept('subject_taxation', 'податку')|e], які належать [Concept('overlord', 'сюзерену')|e]."
  game_concept_subject: "Ленник"
  game_concept_subjects: "Ленники"
  game_concept_subjugate: "Підкорити"
  game_concept_subjugated: "Підкорений"
  game_concept_subject_desc: "Ленник — це [Concept('country', 'країна')|e], підпорядкована [Concept('overlord', 'сюзерену')|e].\n\nСтатус ленника зазвичай обмежує можливості [Concept('diplomacy', 'дипломатії')|e] в обмін на захист під час [Concept('war', 'війни')|e].\n\nЛенники також можуть сплачувати [Concept('subject_taxation', 'податки')|e] та віддавати [Concept('overlord', 'сюзерену')] певну частку свого [Concept('great_power_score', 'рахунку великої держави')|e]. Крім того, ленник не може стати [Concept('great_power', 'великою державою')|e]. Конкретні правила залежать від [Concept('subject_type', 'типу ленника')|e].\n\nСтавлення ленників до свого підлеглого становища характеризують такі параметри, як [Concept('subject_loyalty', 'лояльність')|e] [Concept('overlord', 'сюзерену')] та [Concept('liberty_desire', 'бажання свободи')|e]. Ці показники визначають, [Concept('loyal_subjects', 'лояльні')|e] ленники чи [Concept('disloyal_subjects', 'нелояльні')|e].\n\nБудь-який ленник, у свою чергу, може бути [Concept('overlord', 'сюзереном')] для інших [Concept('countries', 'країн')]. Це породжує протяжні ланцюжки відносин «ленник — [Concept('overlord', 'сюзерен')]».\n\nДеякі ленники є [Concept('non_sovereign_subjects', 'несуверенними')|e]."
  game_concept_non_sovereign_subject: "Несуверенний ленник"
  game_concept_non_sovereign_subjects: "Несуверенні ленники"
  game_concept_non_sovereign_subject_desc: "Несуверенними вважаються [Concept('subject', 'ленники')|e], які не можуть діяти незалежно від [Concept('overlord', 'сюзерена')|e], обмежені в [Concept('diplomacy', 'дипломатії')|e] та не можуть вести [Concept('wars', 'війни')|e] самостійно."
  game_concept_overlord: "Сюзерен"
  game_concept_overlords: "Сюзерени"
  game_concept_direct_overlord: "Безпосередній сюзерен"
  game_concept_overlord_desc: "Сюзерен — це [Concept('country', 'країна')|e], якій підпорядковується будь-яка кількість [Concept('subjects', 'ленників')|e].\n\nНадаючи захист [Concept('subject', 'ленникам')] у разі [Concept('wars', 'війни')|e], сюзерен зазвичай отримує з них [Concept('subject_taxation', 'податки')|e] та певну частку їхнього [Concept('great_power_score', 'рахунку великої держави')|e]. Конкретні умови залежать від [Concept('subject_type', 'типу')|e] [Concept('subject', 'ленника')].\n\nБудь-який сюзерен, у свою чергу, може бути [Concept('subject', 'ленником')] інших [Concept('countries', 'країн')]. Це породжує протяжні ланцюжки відносин «[Concept('subject', 'ленник')] — сюзерен»."
  game_concept_liberty_desire: "Бажання свободи"
  game_concept_liberty_desire_desc: "Бажання свободи характеризує поточне прагнення [Concept('subject', 'ленника')|e] до незалежності від [Concept('overlord', 'сюзерена')|e] та впливає на [Concept('subject_loyalty', 'лояльність ленника')|e].\n\nЦей показник варіюється від −100 до +100 і щомісяця зсувається в бік 0.\n\nТакож використовується як валюта при взаємодії з ленниками."
  game_concept_societal_value: "Суспільна цінність"
  game_concept_societal_values: "Суспільні цінності"
  game_concept_societal_value_upper_desc: "Суспільні цінності визначають соціальну та політичну структуру [Concept('country', 'країни')|e], її правову систему, а також традиції та звичаї її народу. Вони помітно впливають на ігровий процес, оскільки для прийняття деяких [Concept('government_reforms', 'державних реформ')|e] необхідний конкретний набір [Concept('societal_values', 'суспільних цінностей')|e]. Крім того, вони відіграють важливу роль у [Concept('diplomacy', 'дипломатії')|e], оскільки [Concept('country', 'країни')] зі схожими цінностями схильні мати вищу [Concept('opinion', 'думку')|e] одна про одну.\n\nКожна суспільна цінність являє собою шкалу, на обох кінцях якої знаходяться протилежні поняття. Залежно від прийнятих [Concept('laws', 'законів')|e], [Concept('estate_privileges', 'станових привілеїв')|e] та [Concept('cabinet_actions', 'дій ради')|e] [Concept('country', 'країна')|e] буде поступово зміщуватися до одного з кінців шкали. При цьому рух уздовж шкали обмежений кількістю чинників, що впливають на нього. Чим вище поточне значення суспільної цінності, тим більше чинників необхідно, щоб його збільшити."
  game_concept_societal_value_list_title: "Список суспільних цінностей"
  game_concept_societal_value_desc: "$game_concept_societal_value_upper_desc$\n\n[ShowDatabase('societal_values')]"
  game_concept_religious_head: "Глава релігії"
  game_concept_pope: "Папа"
  game_concept_religious_head_desc: "Цей [Concept('character', 'персонаж')|e] вважається першою особою та головним представником [Concept('religion', 'релігії')|e]."
  game_concept_excommunication: "Відлучення від церкви"
  game_concept_excommunications: "Відлучення від церкви"
  game_concept_excommunicate: "Відлучити від церкви"
  game_concept_excommunicates: "Відлучає від церкви"
  game_concept_excommunicated: "Відлучений від церкви"
  game_concept_excommunication_desc: "Це політичний статус [Concept('ruler', 'правителя')|e], що накладає суттєві релігійні та дипломатичні штрафи. Усі [Concept('countries', 'країни')|e], що сповідують ту ж [Concept('religion', 'релігію')|e], отримують [ShowBiasValue('opinion_excommunicated')|+=0] од. до [Concept('opinion', 'думки')|e] про відлучену [Concept('country', 'країну')] та [Concept('casus_belli', 'привід для війни')|e] #TOOLTIP:CASUS_BELLI,cb_excommunication,X #L «Відлучений правитель»#!#! проти неї. Крім того, на відлучену [Concept('country', 'країну')] накладаються такі штрафи до зміни правителя:\n[ShowModifierEffect('excommunicated')]"
  game_concept_karma: "Карма"
  game_concept_karma_i: "@karma!"
  game_concept_karma_desc: "Карма змінюється в межах від #R −100#! до #R +100#! і відображає вплив попередніх дій [Concept('country', 'країни')|e].\nНайвигідніше підтримувати рівновагу карми в межах від #G −33#! до #G +33#!."
  game_concept_pious: "Правовірний"
  game_concept_purity: "Чистота"
  game_concept_purity_i: "@purity!"
  game_concept_purity_desc: "Характеризує чистоту нашої [Concept('country', 'країни')|e] з точки зору #L [ShowReligionName('shinto')|l]#!. Чистота зменшується при взаємодії з чимось нечистим: наприклад, при вбивстві та загибелі [Concept('people', 'людей')|e] в ході [Concept('battles', 'битв')|e] або епідемій, тому що смерть і кров вважаються нечистими. Чистота збільшується при виконанні релігійних актів, наприклад паломництва до [Concept('holy_sites', 'святинь')|e] або ритуального самогубства."
  game_concept_honor: "Честь"
  game_concept_honor_i: "@honor!"
  game_concept_honor_desc: "Визначає, наскільки піддані поважають [Concept('country', 'країну')].\n\nПри [Concept('purity', 'чистоті')|e] понад 75 одиниць показник [Concept('honor', 'честі')|e] збільшується, а при низьких значеннях чистоти — зменшується.\n\nРелігійні та дипломатичні дії впливають на честь по-різному."
  game_concept_yanantin: "Янантін"
  game_concept_yanantin_i: "@yanantin!"
  game_concept_yanantin_desc: "Янантін характеризує рівновагу між двома взаємодоповнюючими, але протилежними сутностями. #L [ShowCultureGroupName('andean_group')]і#! [Concept('cultures', 'культури')|e] вважають, що гармонія досягається, лише коли істота, чоловік, темрява або Сонце знаходить свою протилежність і зливається з нею, наприклад з жінкою, світлом або Місяцем."
  game_concept_righteousness: "Доброчесність"
  game_concept_righteousness_i: "@righteousness!"
  game_concept_righteousness_desc: "Доброчесність показує, наскільки країна дотримується філософії та ідеалів конфуціанства з точки зору народу."
  game_concept_harmony: "Гармонія"
  game_concept_harmony_i: "@harmony!"
  game_concept_harmony_desc: "Гармонія показує, наскільки добре [Concept('country', 'країна')|e] дотримується принципів дао. [GetAutoModifier('negative_harmony').GetNameWithTooltip] та [GetAutoModifier('positive_harmony').GetNameWithTooltip|l] повинні знаходитися в рівновазі. Схилившись в одну зі сторін, країна отримає безліч ефектів, в основному через [Concept('events', 'події')|e]. [GetAutoModifier('balanced_harmony').GetNameWithTooltip] є найкращим з варіантів."
  game_concept_self_control: "Самоконтроль"
  game_concept_self_control_i: "@self_control!"
  game_concept_self_control_desc: "Самоконтроль характеризує готовність [Concept('country', 'країни')|e] та її [Concept('ruler', 'правителя')|e] відкинути насолоди та матеріальні блага, щоб слідувати шляхом йоги.\n\nПозитивне значення самоконтролю показує схильність до аскетизму — при цьому покращується [Concept('stability', 'стабільність')|e], [Concept('migration', 'міграція')|e] та [Concept('annexation', 'приєднання')|e], а також знижується споживання [Concept('food', 'їжі')|e]. Негативне значення самоконтролю показує схильність до порочності — при цьому підвищуються [Concept('tax', 'податки')|e] та споживання [Concept('food', 'їжі')|e], але знижується [Concept('war_exhaustion', 'втома від війни')|e]. Збалансований самоконтроль прискорює [Concept('research', 'дослідження')|e], підвищує [Concept('prestige', 'престиж')|e] та [Concept('estate_satisfaction', 'задоволення станів')|e]."
  game_concept_doom: "Приреченість"
  game_concept_doom_i: "@doom!"
  game_concept_doom_desc: "Приреченість — це особливий показник [Concept('countries', 'країн')|e], що сповідують #TOOLTIP:RELIGION,$nahuatl_tt$,X #L науаську#!#! [Concept('religion', 'релігію')|e].\n\nОволодіння [Concept('locations', 'місцевостями')|e], особливо [Concept('towns_and_cities', 'міськими')|e], поступово підвищує приреченість.\n\nПри високій приреченості знижуються [ShowModifierTypeName('subject_loyalty')|l] та [ShowModifierTypeName('global_estate_target_satisfaction')|l], але також сильніше #TOOLTIP:MODIFIER_TYPE,stability_decay,X #P #V знижується стабільність#!#!#!.\n\nЄ ряд способів знизити приреченість, зокрема:\n• Вбивство [Concept('enemy', 'ворожих')|e] військ у [Concept('combat', 'бою')|e]\n• Розграбування [Concept('development', 'високорозвинених')|e] [Concept('locations', 'місцевостей')]\n\nПри досягненні максимальної приреченості [Concept('ruler', 'правитель')|e] з усією своєю [Concept('dynasty', 'династією')|e] приносяться в жертву, і це місце займає новий [Concept('ruler', 'правитель')]."
  game_concept_religious_reform: "Релігійна реформа"
  game_concept_religious_reform_desc: "Іноді необхідно або корисно провести реформу в інтересах [Concept('religion', 'релігії')|e]. Така реформа характеризує постійну адаптацію ритуалів та віри відповідно до бажань її прихильників та інститутів."
  game_concept_patriarch: "Патріарх"
  game_concept_patriarchs: "Патріархи"
  game_concept_patriarch_desc: "Патріарх — це найбільш високопоставлений єпископ у певних #L [ShowReligionGroupAdjective('christian')|l]их#! [Concept('religions', 'релігіях')|e]. У кожній такій [Concept('religion', 'релігії')|e] може бути більше одного патріарха, кожен з яких очолює власний патріархат."
  game_concept_religious_influence: "Релігійний вплив"
  game_concept_religious_influence_i: "@religious_influence!"
  game_concept_religious_influence_desc: "Характеризує здатність [Concept('country', 'країни')|e] взаємодіяти з [Concept('primary_religion', 'основною релігією')|e] та впливати на неї. Практичне застосування впливу залежить від [Concept('religion', 'релігії')|e] та від того, як [Concept('country', 'країна')] отримала цю здатність."
  game_concept_rite_power: "Сила обрядів"
  game_concept_rite_power_i: "@rite_power!"
  game_concept_rite_power_desc: "Характеризує здатність [Concept('country', 'країни')|e], яка є [Concept('international_organization_leader_short', 'лідером')|e] [Concept('autocephalous_patriarchate', 'автокефального патріархату')|e], змінювати свою [Concept('religion', 'релігію')|e] за допомогою вибору різних [Concept('laws', 'зводів правил')|e]."
  game_concept_papal_bull: "Папська булла"
  game_concept_papal_bulls: "Папські булли"
  game_concept_papal_bull_desc: "Папська булла — це міжнародний указ, який видається за [Concept('gold', 'золото')|e] та впливає на [Concept('countries', 'країни')|e], що сповідують #L [ShowReligionAdjective('catholic')|l]у#! [Concept('religion', 'релігію')|e]. Хоча деякі булли мають [Concept('effects', 'ефекти')|e] та діють як [Concept('law', 'закони')|e], усі вони накладають [Concept('modifiers', 'модифікатори')|e] на країни, чия ефективність залежить від [Concept('papal_authority', 'папського авторитету')|e]."
  game_concept_papal_authority: "Папський авторитет"
  game_concept_papal_authority_desc: "Папський авторитет — це міра поваги та визнання [Concept('pope', 'папи')|e]. Авторитет підвищує ймовірність, що #L [ShowReligionAdjective('catholic')|l]і#! [Concept('countries', 'країни')|e] виконуватимуть розпорядження папства. Низький авторитет призведе до того, що [Concept('countries', 'країни')] частіше діятимуть у своїх інтересах, іноді суперечних інтересам #L [ShowReligionAdjectiveWithNoTooltip('catholic')|l]ої#! віри.\n\nЕфективність [Concept('papal_bulls', 'папських булл')|e] зростає пропорційно авторитету з множником #Y 2#! — тобто у [Concept('papal_bull', 'папської булли')|e], виданої при 100%-му авторитеті, ефективність буде #G 200%#!, а при 0%-му авторитеті знизиться до #R 0%#!."
  game_concept_religious_war: "Релігійна війна"
  game_concept_crusade: "Хрестовий похід"
  game_concept_jihad: "$jihad$"
  game_concept_religious_war_desc: "Релігійну війну оголошує [Concept('international_organization', 'міжнародне об’єднання')|e] країн однієї й тієї ж віри проти [Concept('heathen', 'язичницької')|e] країни. Найбільш яскравими прикладами таких війн є #Y хрестові походи#! #L [ShowReligionGroupAdjective('christian')|l]ої#! та #Y джихади#! #L [ShowReligionGroupAdjective('muslim')|l]ої#! [Concept('religions', 'релігій')|e]."
  game_concept_religious_school: "Релігійна школа"
  game_concept_religious_schools: "Релігійні школи"
  game_concept_religious_school_desc: "Священне Писання непогрішне, але спроби адаптувати до нього закони та життєві норми призвели до появи кількох релігійних шкіл.\nВибір школи вплине на майбутнє [Concept('country', 'країни')|e]."
  game_concept_religious_faction: "Релігійна течія"
  game_concept_religious_factions: "Релігійні течії"
  game_concept_religious_faction_desc: "Це організації в межах однієї [Concept('religion', 'релігії')|e], що представляють собою різні філософські течії. Вони боротимуться за заступництво [Concept('country', 'країни')|e], а сама [Concept('country', 'країна')] може взаємодіяти з ними, щоб отримувати різні переваги."
  game_concept_religious_focus: "Релігійна мета"
  game_concept_religious_focuses: "Релігійні цілі"
  game_concept_religious_focus_desc: "Деякі [Concept('religions', 'релігії')|e] мають характеристики, на яких [Concept('country', 'країна')|e] може зосередити зусилля, щоб отримати додаткові переваги. Виконавши достатньо таких цілей, можна провести [Concept('religion', 'релігійну')] реформу."
  game_concept_religious_aspect: "Релігійна особливість"
  game_concept_religious_aspects: "Релігійні особливості"
  game_concept_religious_aspect_desc: "Деякі [Concept('religions', 'релігії')|e] мають особливості, які додатково відокремлюють конкретну [Concept('religion', 'релігійну')|e] течію, що сповідується в [Concept('country_s', 'країні')|e]."
  game_concept_location_rank: "Ранг місцевості"
  game_concept_location_rank_desc: "Кожна [Concept('location', 'місцевість')|e] має свій ранг. Місцевість може бути [Concept('urban_location', 'міською')|e] або [Concept('rural_location', 'сільською')|e].\n\n[ShowDatabase('location_rank')]"
  game_concept_corridor: "Коридор"
  game_concept_corridors: "Коридори"
  game_concept_corridor_desc: "Коридори — це особливі непридатні для життя [Concept('locations', 'місцевості')|e], які не можуть [Concept('owned', 'належати')|e] жодній із [Concept('country', 'країн')|e], але, на відміну від [Concept('wastelands', 'пустошей')|e], їх можуть перетинати [Concept('armies', 'війська')|e]."
  game_concept_strait: "Протока"
  game_concept_straits: "Протоки"
  game_concept_strait_desc: "Протока з'єднує дві [Concept('locations', 'місцевості')|e], які розділені [Concept('seazone', 'акваторією')|e], але знаходяться досить близько, щоб [Concept('armies', 'війська')|e] могли переміщатися між ними без допомоги [Concept('navy', 'флоту')|e]."
  game_concept_katun: "Катун"
  game_concept_katun_desc: "Катун — це одиниця виміру часу у #TOOLTIP:RELIGION,$mayan_tt$,X #L мая#!#!, яка відповідає 19,7 року. Завершення одного катуна та початок наступного супроводжувалися церемоніями та святкуваннями, в силу чого це був справді знаменний день для правителів та їхніх підданих.\n\nЯкщо до закінчення катуна ми витратимо достатньо ресурсів на святкування, ми отримаємо модифікатор #TOOLTIP:STATIC_MODIFIER,katun_celebration,X #V #L «Святкування катуна»#!#! на 10 років. Якщо ж ми не готові до цієї дати, то отримаємо модифікатор #TOOLTIP:STATIC_MODIFIER,katun_celebration_bad,X #V #L «Невдале святкування катуна»#!#! на 10 років. Готовність настане, коли наш [Concept('religious_influence', 'релігійний вплив')|e] досягне 90."
  game_concept_town_and_city: "Міська місцевість"
  game_concept_urban_location: "Міська місцевість"
  game_concept_urban_locations: "Міські місцевості"
  game_concept_towns_and_cities: "Міські місцевості"
  game_concept_towns_or_cities: "Міські місцевості"
  game_concept_town_or_city: "Міська місцевість"
  game_concept_town_and_city_desc: "У цій [Concept('location', 'місцевості')|e] знаходиться велике поселення, що дозволяє #TOOLTIP:POPTYPE,burghers,X #L міщанам#!#! процвітати. Крім того, тут можна будувати особливі [Concept('buildings', 'споруди')|e]. Цей тип місцевості протилежний [Concept('rural_location', 'сільській')|e].\n\nЗалежно від розміру [Concept('urban_location', 'міські місцевості')] діляться на #TOOLTIP:LOCATIONRANK,town,X #L містечка#!#! та #TOOLTIP:LOCATIONRANK,city,X #L міста#!#!."
  game_concept_rural_location: "Сільська місцевість"
  game_concept_rural_locations: "Сільські місцевості"
  game_concept_rural: "Сільський"
  game_concept_rural_location_desc: "Це [Concept('location', 'місцевість')|e] без великого поселення, через що там менше можливостей будувати особливі [Concept('buildings', 'споруди')|e]. Протилежна [Concept('town_or_city', 'міській')|e] місцевості."
  game_concept_cardinal: "Кардинал"
  game_concept_cardinals: "Кардинали"
  game_concept_cardinal_s: "Кардинали"
  game_concept_cardinal_desc: "Кардинал представляє #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! церкву і є другою після [Concept('pope', 'папи')] духовною особою. Щоб призначити кардинала в ту чи іншу [Concept('locations', 'місцевість')|e], потрібно побудувати особливу [Concept('building', 'споруду')|e] — #TOOLTIP:BUILDING_TYPE,seat_of_cardinal,X #L кафедру кардинала#!#!. Він буде вірний [Concept('country', 'країні')|e], яка [Concept('owns', 'володіє')|e] цією [Concept('location', 'місцевістю')].\n\nКардинали дозволяють [Concept('country', 'країні')] брати участь у [Concept('curia_actions', 'діяльності курії')|e]."
  game_concept_saint: "Святий"
  game_concept_saints: "Святі"
  game_concept_saint_desc: "Святий — це [Concept('character', 'персонаж')|e], який заслужив своїми праведними справами визнання в #TOOLTIP:RELIGIONGROUP,christian,X #L християнській#!#! [Concept('religion', 'релігії')|e]. Внесення персонажа до списку [Concept('saint', 'святих')|e] називається [Concept('canonization', 'канонізацією')|e]."
  game_concept_canonization: "Канонізація"
  game_concept_canonize: "Канонізувати"
  game_concept_canonized: "Канонізований"
  game_concept_canonization_desc: "Колишнього [Concept('ruler', 'правителя')|e] [Concept('country', 'країни')|e] можна канонізувати, тобто оголосити [Concept('saint', 'святим')|e]. Завдяки цьому [Concept('country', 'країна')] отримає переваги, які залежать від навичок [Concept('character', 'персонажа')|e], здобутих за життя."
  game_concept_resolutions: "Резолюції"
  game_concept_resolution: "Резолюція"
  game_concept_vote: "Голосування"
  game_concept_votes: "Голосування"
  game_concept_vote_verb: "Голосувати"
  game_concept_voting: "Голосування"
  game_concept_resolution_desc: "Це дія, що здійснюється [Concept('international_organizations', 'міжнародним об’єднанням')|e]. Її результат впливає на все об’єднання цілком. Будь-яка [Concept('country', 'країна')|e]-[Concept('member', 'учасник')|e] може запропонувати резолюцію іншим [Concept('members', 'учасникам')]. Кожен [Concept('member', 'учасник')] об’єднання може або підтримати резолюцію, або виступити проти, впливаючи таким чином на результат обговорення.\n\nЯкщо резолюція буде прийнята, вона матиме свій ефект."
  game_concept_curia_actions: "Дії курії"
  game_concept_curia_action: "Дія курії"
  game_concept_curia_action_desc: "Це дія, що здійснюється [Concept('curia', 'курією')|e]. Її результат впливає на весь #L [ShowReligionAdjective('catholic')|l]ий#! світ. Будь-яка #L [ShowReligionAdjective('catholic')|l]а#! [Concept('country', 'країна')|e] може запропонувати [Concept('curia', 'курії')] дію. Кожна [Concept('country', 'країна')], в якій є [Concept('cardinal', 'кардинал')|e], може або підтримати дію, або виступити проти, впливаючи таким чином на результат обговорення.\n\nЯкщо дія курії буде прийнята, вона матиме свій ефект на всі #L [ShowReligionAdjective('catholic')|l]і#! [Concept('countries', 'країни')]."
  game_concept_curia: "Курія"
  game_concept_curia_desc: "Курія — адміністративний орган Святого Престолу, а отже, і всієї #L [ShowReligionAdjective('catholic')|l]ої#! церкви. Будь-яка #L [ShowReligionAdjective('catholic')|l]а#! [Concept('country', 'країна')|e] може взаємодіяти з курією та пропонувати їй будь-які [Concept('curia_action', 'дії')|e] за допомогою свого [Concept('religious_influence', 'релігійного впливу')|e]."
  game_concept_population_capacity: "Межа населення"
  game_concept_population_capacity_desc: "Гранична чисельність [Concept('population', 'населення')|e] у [Concept('location', 'місцевості')|e]. Якщо межа перевищена, чисельність [Concept('population', 'населення')] припинить збільшуватися, а при значному перевищенні може навіть почати знижуватися."
  game_concept_total_population: "Сукупне населення"
  game_concept_total_population_desc: "Це кількість [Concept('pops', 'груп населення')|e], що проживають у [Concept('country', 'країні')|e]."
  game_concept_population: "Населення"
  game_concept_population_i: "@population!"
  game_concept_population_desc: "Це кількість [Concept('pops', 'груп населення')|e], що проживають у [Concept('location', 'місцевості')|e]."
  game_concept_maritime_presence: "Морська присутність"
  game_concept_maritime: "Присутність"
  game_concept_maritime_presence_power: "Сила морської присутності"
  game_concept_maritime_presence_desc: "Морська присутність біля наших берегів необхідна як для [Concept('control', 'контролю')|e] над територією, так і для [Concept('trade', 'торгівлі')|e].\n\nУ мирний час морська присутність поступово збільшується — для цього потрібна лише наявність [Concept('ports', 'портів')|e], — а [Concept('blockade', 'блокада')|e], своєю чергою, швидко її зменшує. [Concept('navy', 'Флот')|e] в [Concept('seazone', 'акваторії')|e] може швидко відновити присутність.\n\nВелика морська присутність скорочує [Concept('proximity', 'досяжність')|e], втрачену між [Concept('seazones', 'акваторіями')|e] при визначенні контролю. Крім того, морська присутність у прибережних акваторіях [Concept('market', 'ринку')|e] є важливим джерелом [Concept('merchant_power', 'торговельної переваги')|e]."
  game_concept_merchant_maritime_power: "Морська $game_concept_merchant_power$"
  game_concept_merchant_maritime_power_desc: "$game_concept_merchant_maritime_power$ визначає здатність [Concept('navies', 'флотів')|e] країни ефективно захищати морську торгівлю та впливати на неї. Воно також визначає величину [Concept('merchant_power', 'торговельної переваги')|e], яку [Concept('country', 'країна')|e] отримує завдяки [Concept('maritime_presence', 'морській присутності')|e] в прибережних [Concept('seazones', 'акваторіях')|e] [Concept('market', 'ринку')|e]."
  game_concept_blockade: "Блокада"
  game_concept_blockaded: "У блокаді"
  game_concept_blockades: "Блокади"
  game_concept_blockading: "Блокує"
  game_concept_blockade_desc: "Блокада — це присутність [Concept('hostile', 'ворожого')|e] [Concept('navy', 'флоту')|e] в [Concept('seazone', 'акваторії')|e] за межами [Concept('port', 'порту')|e]. Кількість необхідних для блокади [Concept('ships', 'кораблів')|e] залежить від [Concept('population', 'населення')|e] та [Concept('development', 'розвитку')|e] блокованих [Concept('ports', 'портів')|e].\n\nНайважливіші ефекти блокади:\n$BULLET_WITH_TAB$Зниження виробництва [Concept('food', 'їжі')|e]\n$BULLET_WITH_TAB$Зменшення [Concept('maritime_presence', 'морської присутності')|e]\n$BULLET_WITH_TAB$Зниження [Concept('development', 'розвитку')]\n$BULLET_WITH_TAB$Зниження [Concept('control', 'контролю')|e]\n$BULLET_WITH_TAB$Зниження [Concept('prosperity', 'процвітання')|e]"
  game_concept_religious_unity: "Релігійна єдність"
  game_concept_religious_unity_desc: "Релігійна єдність — відсоткова частка [Concept('population', 'населення')|e] [Concept('country', 'країни')|e], яке сповідує офіційну державну [Concept('religion', 'релігію')|e]."
  game_concept_cultural_unity: "Культурна єдність"
  game_concept_cultural_unity_desc: "Культурна єдність — відсоткова частка [Concept('population', 'населення')|e] [Concept('country', 'країни')|e], яке належить до [Concept('primary_culture', 'основної культури')|e]."
  game_concept_transport_capacity: "Межа транспортування"
  game_concept_transport_capacity_desc: "Межа транспортування — максимальна [Concept('strength', 'чисельність')|e] [Concept('regiments', 'полків')|e], тобто кількість людей, яка поміститься на [Concept('ship', 'корабель')|e]."
  game_concept_food_storage: "Обсяг їжі"
  game_concept_food_storage_desc: "Загальна кількість [Concept('food', 'їжі')|e], яку може нести з собою [Concept('regiment', 'полк')|e] або везти [Concept('ship', 'корабель')|e]."
  game_concept_food_storage_per_strength: "Обсяг їжі"
  game_concept_food_storage_per_strength_desc: "Це загальна кількість [Concept('food', 'їжі')|e], яку може нести з собою [Concept('regiment', 'полк')|e] або везти [Concept('ship', 'корабель')|e]."
  game_concept_food_capacity: "Запас продовольства"
  game_concept_food_capacity_desc: "Це кількість [Concept('food', 'їжі')|e], яку може нести з собою [Concept('unit', 'загін')|e]."
  game_concept_food_capacity_per_strength: "Запас продовольства"
  game_concept_food_capacity_per_strength_desc: "$game_concept_food_capacity_desc$"
  game_concept_food_consumption: "Споживання їжі полком"
  game_concept_food_consumption_desc: "Це кількість [Concept('food', 'їжі')|e], щомісячно споживана [Concept('regiment', 'полком')|e]."
  game_concept_food_consumption_per_strength: "Споживання їжі"
  game_concept_food_consumption_per_strength_desc: "$game_concept_food_consumption_desc$"
  game_concept_food_access: "Доступ до продовольства"
  game_concept_food_access_desc: "Доступ до продовольства дозволяє нашим [Concept('armies', 'військам')|e] та [Concept('navies', 'флотам')|e] збирати [Concept('food', 'їжу')|e] в [Concept('locations', 'місцевостях')|e], якими володіють інші [Concept('countries', 'країни')|e]."
  game_concept_hull_size: "Розмір корпусу"
  game_concept_hull_size_desc: "Чим більший корпус, тим менше шкоди [Concept('ship', 'корабель')|e] отримує в [Concept('combat', 'бою')|e]."
  game_concept_cannons: "Гармати"
  game_concept_cannons_desc: "Чим більше гармат у [Concept('ship', 'корабля')|e], тим більше шкоди він завдає в [Concept('combat', 'бою')|e]."
  game_concept_flanking_ability: "Навичка фланкування"
  game_concept_flanking_ability_desc: "Визначає, скільки шкоди загін завдає ворогу в іншій [Concept('section', 'частині бойового порядку')|e]."
  game_concept_secure_flanks: "Захист флангів"
  game_concept_secure_flanks_defense: "Бонус від захисту флангів"
  game_concept_secure_flanks_desc: "Дає надбавку до захисту, якщо в сусідній [Concept('section', 'частині бойового порядку')|e] є [Concept('friendly', 'дружні')|e] війська. Подвоюється, якщо захищені обидва фланги."
  game_concept_secure_flanks_defense_desc: "$game_concept_secure_flanks_desc$"
  game_concept_combat_power: "Бойова міць"
  game_concept_combat_power_desc: "Це показник прямої шкоди, що завдається [Concept('regiment', 'полком')|e] у [Concept('combat', 'бою')|e]. Множиться на значення [Concept('strength', 'чисельності')|e] при підрахунку загальної шкоди, що завдається [Concept('regiment', 'полком')]."
  game_concept_frontage: "Ширина фронту"
  game_concept_frontage_desc: "Одночасно брати участь у [Concept('combat', 'бою')|e] може обмежена кількість [Concept('regiments', 'полків')|e] або [Concept('ships', 'кораблів')|e]. Це обмеження і називається шириною фронту. Деякі [Concept('locations', 'місцевості')|e] з більш складними [Concept('topography', 'рельєфом')|e] або [Concept('vegetation', 'флорою')|e] можуть додатково зменшити ширину фронту. Крім того, одні [Concept('sub_units', 'підрозділи')|e] займають менше місця, інші — більше."
  game_concept_anti_piracy_warfare: "Вплив на піратів"
  game_concept_anti_piracy_warfare_desc: "Це вплив, який [Concept('ship', 'корабель')|e] чинить на [Concept('privateers', 'каперів')|e] у тій області, де вони промишляють."
  game_concept_section: "Частина бойового порядку"
  game_concept_sections: "Частини бойового порядку"
  game_concept_section_desc: "Кожна сторона в [Concept('combat_with_icon', 'битві')|e] ділиться на чотири частини бойового порядку. Три з них — [Concept('center', 'центр')|e], лівий і правий [Concept('flank', 'фланги')|e], — беруть безпосередню участь у [Concept('combat', 'битві')], а в кінці строю знаходиться [Concept('reserves', 'резерв')|e].\n\nПід час бою [Concept('regiments', 'полки')|e] або [Concept('ships', 'кораблі')|e] з передніх частин [Concept('engage', 'атакуватимуть')|e] протилежні частини бойового порядку, якщо там є вороги. Якщо ворогів немає, вони нападуть на будь-яку іншу частину противника, причому загони з розвиненим [Concept('flanking_ability', 'навичкою фланкування')|e] зможуть завдати більше шкоди.\n\nЯкщо передові загони будуть знищені або відступлять через низький [Concept('morale', 'бойовий дух')|e], загони з [Concept('reserves', 'резерву')] спробують вийти вперед і замінити їх, зробивши кидок на [Concept('combat_speed_with_icon', 'бойову швидкість')|e]. [Concept('combat', 'Битва')] закінчується, коли в однієї зі сторін не залишається загонів у передніх частинах."
  game_concept_center: "Центр"
  game_concept_center_desc: "Це центральна [Concept('section', 'частина бойового порядку')|e] в [Concept('unit', 'загоні')|e]. Якщо в центрі немає противника, лівий і правий ворожі [Concept('flank', 'фланги')|e] стануть уразливі для удару."
  game_concept_reserves: "Резерв"
  game_concept_reserves_desc: "Ці [Concept('regiments', 'полки')|e] та [Concept('ships', 'кораблі')|e] не беруть участі в [Concept('battle', 'битві')|e], але за потреби можуть висунутися в [Concept('center', 'центр')|e] або на [Concept('flank', 'фланг')|e].\nДля кожного [Concept('regiment', 'полку')] або [Concept('ship', 'корабля')|e] викидається кубик [Concept('d20', 'К20')|e]. Якщо результат, що випав, нижчий за [Concept('combat_speed', 'бойову швидкість')|e] загону, то він зможе вступити в битву. Однак щогодини в бій вступає обмежена кількість резервів залежно від [Concept('frontage', 'ширини фронту')|e]."
  game_concept_broken_units: "Розбиті загони"
  game_concept_broken_units_desc: "Це [Concept('regiments', 'полки')|e] або [Concept('ships', 'кораблі')|e], які звернуті у втечу і не здатні далі брати участь у поточній [Concept('battle', 'битві')|e]."
  game_concept_flank: "Фланг"
  game_concept_right_flank: "Правий фланг"
  game_concept_left_flank: "Лівий фланг"
  game_concept_flanks: "Фланги"
  game_concept_flank_desc: "Фланги — це [Concept('sections', 'частини бойового порядку')|e] [Concept('army', 'війська')|e] за межами [Concept('center', 'центру')|e]. Ліва частина бойового порядку зазвичай б'ється з правою частиною бойового порядку противника — і навпаки. Однак, [Concept('flanking_ability', 'навичка фланкування')|e] дозволяє завдавати шкоди і сусідній частині бойового порядку."
  game_concept_bombard_efficiency: "Ефективність обстрілу"
  game_concept_bombard_efficiency_desc: "Це шанс для артилерійських [Concept('regiments', 'полків')|e] здійснити постріл під час [Concept('bombard_phase', 'фази обстрілу')|e]."
  game_concept_phase: "Фаза"
  game_concept_phases: "Фази"
  game_concept_phase_desc: "Існують дві фази [Concept('combat', 'бою')|e]: [GetDefine('NCombat', 'BOMBARD_HOURS')|W]-годинна [Concept('bombard_phase', 'фаза обстрілу')|e] (за наявності [Concept('regiments', 'полків')|e], здатних вести [Concept('bombard', 'обстріл')|e]) і наступна за нею [Concept('combat_phase', 'фаза бою')|e]."
  game_concept_combat_phase: "Фаза бою"
  game_concept_combat_phase_desc: "Фаза бою — це основна [Concept('phase', 'фаза')|e] [Concept('combat', 'бою')|e], яка слідує за початковою [Concept('bombard_phase', 'фазою обстрілу')|e]. Протягом цієї фази [Concept('regiments', 'полки')|e] або [Concept('ships', 'кораблі')|e] намагатимуться [Concept('engage', 'вступити в бій')|e] з протистоячим їм [Concept('enemy', 'ворогом')|e]."
  game_concept_bombard_phase: "Фаза обстрілу"
  game_concept_bombard_phase_desc: "Фаза обстрілу — це початкова [GetDefine('NCombat', 'BOMBARD_HOURS')|W]-годинна [Concept('phase', 'фаза')|e] [Concept('combat', 'бою')|e], за якою слідує [Concept('combat_phase', 'фаза бою')|e]. Брати участь у першій фазі можуть тільки [Concept('regiments', 'полки')|e], здатні вести [Concept('bombard', 'обстріл')|e], наприклад #TOOLTIP:UNITCATEGORY,army_artillery,X #L артилерія#!#!.\n\nЩогодини фази обстрілу [Concept('regiments', 'полки')] отримують можливість [Concept('bombard', 'вистрілити')] і згідно зі своєю [Concept('combat_power', 'бойовою міццю')|e] завдати шкоди ворожому [Concept('regiment', 'полку')] в тій же [Concept('section', 'частині бойового порядку')|e]."
  game_concept_bombard: "Обстріл"
  game_concept_bombarding: "Обстріл"
  game_concept_bombard_desc: "[Concept('regiments', 'Полки')|e], здатні вести обстріл, під час першої [Concept('bombard_phase', 'фази')|e] в [Concept('combat', 'бою')|e] завдають ворогу шкоди згідно зі своєю [Concept('combat_power', 'бойовою міццю')|e]."
  game_concept_initiative: "Ініціатива"
  game_concept_initiative_desc: "Ініціатива — це ймовірність, що [Concept('regiment', 'полк')|e] [Concept('engage', 'вступить')|e] у [Concept('combat', 'бій')|e] під час [Concept('combat_phase', 'фази бою')|e].\n\nЩогодини (за достатньої [Concept('frontage', 'ширини фронту')|e]) всі [Concept('regiments', 'полки')], що ще не беруть участі [Concept('engaged', 'в бою')], намагатимуться в нього вступити.\n\nЙмовірність розраховується за формулою: ініціатива × [GetDefine('NCombat', 'INITIATIVE_CHANCE_EACH')]) + ([GetDefine('NCombat', 'INITIATIVE_CHANCE_EACH')] × кількість годин у бою). Якщо ця ймовірність перевищує результат кидка кубика [Concept('d100', 'К100')|e], [Concept('regiment', 'полк')] вважається [Concept('engaged', 'таким, що вступив у бій')].\n\nЯк правило, найвищою ініціативою володіють легкоозброєні та стрілецькі [Concept('regiments', 'полки')|e]."
  game_concept_engagement: "Участь у бою"
  game_concept_engage: "Вступити в бій"
  game_concept_engaged: "У бою"
  game_concept_engagement_desc: "На початку [Concept('combat_with_icon', 'бою')|e] [Concept('regiments_with_icon', 'полки')|e] у передній [Concept('sections_with_icon', 'частині бойового порядку')|e] щогодини кидають кубик, що визначає їх [Concept('initiative_with_icon', 'ініціативу')|e]. Вступивши в [Concept('combat', 'бій')], [Concept('regiment', 'полк')] завдає шкоди. Відступаючий загін перестане брати участь у бою і не зможе повернутися в той же [Concept('combat', 'бій')].\n\nКожна [Concept('section', 'частина бойового порядку')] може одночасно битися тільки на певній [Concept('frontage_with_icon', 'ширині фронту')|e]."
  game_concept_d10: "К10"
  game_concept_d10_desc: "К10 — це десятигранний кубик, який кидають у [Concept('combat', 'бою')|e], щоб визначити успіхи сторони, що б'ється."
  game_concept_d20: "К20"
  game_concept_d20_desc: "К20 — це двадцятигранний кубик, який кидають у [Concept('combat', 'бою')|e] при виході [Concept('regiment', 'полку')|e] або [Concept('ship', 'корабля')|e] з [Concept('reserves', 'резерву')|e]."
  game_concept_d100: "К100"
  game_concept_d100_desc: "К100 — це стогранний кубик для перевірки відсоткових ймовірностей."
  game_concept_dice: "Кидок кубика"
  game_concept_dice_upper_desc: "Кидок кубика використовується для визначення результату деяких дій, наприклад, [Concept('phases', 'фаз')|e] [Concept('siege', 'облоги')|e] або [Concept('battle', 'битви')|e]."
  game_concept_dice_desc: "$game_concept_dice_upper_desc$\n[Concept('d10', 'К10')|e]\n[Concept('d20', 'К20')|e]\n[Concept('d100', 'К100')|e]"
  game_concept_combat_speed: "Бойова швидкість"
  game_concept_combat_speed_desc: "Це здатність переміщатися з [Concept('reserves', 'резерву')|e] в іншу [Concept('section', 'частину бойового порядку')|e] посеред [Concept('battle', 'битви')|e]. У [Concept('ships', 'кораблів')|e] бойова швидкість також впливає на те, як швидко пошкоджений корабель може покинути свою [Concept('section', 'частину бойового порядку')|e] та відступити."
  game_concept_blockade_capacity: "Блокадний потенціал"
  game_concept_blockade_capacity_desc: "Характеризує ефективність, з якою [Concept('ship', 'корабель')|e] проводить блокаду. Безпосередньо порівнюється зі значенням у блокованій [Concept('location', 'місцевості')|e], яке залежить від її [Concept('development', 'розвитку')|e], [Concept('population', 'населення')|e], [Concept('imports', 'імпорту')|e] та [Concept('exports', 'експорту')|e]."
  game_concept_crew_size: "Екіпаж"
  game_concept_crew_size_desc: "Визначає кількість [Concept('sailors', 'моряків')|e], необхідну для експлуатації [Concept('ship', 'корабля')|e]."
  game_concept_maximum_strength: "Максимальна чисельність"
  game_concept_max_strength: "Максимальна чисельність"
  game_concept_maximum_strength_desc: "Визначає максимальну кількість людей у [Concept('regiment', 'полку')|e] та необхідну для нього [Concept('manpower', 'кількість рекрутів')|e]. [Concept('regiment', 'Полк')], що займає однакову [Concept('frontage', 'ширину фронту')|e] при більшій [Concept('manpower', 'кількості рекрутів')|e], більш ефективний у [Concept('combat', 'бою')|e]."
  game_concept_max_strength_desc: "$game_concept_maximum_strength_desc$"
  game_concept_strength: "Чисельність"
  game_concept_strength_desc: "Кількість людей у [Concept('regiment', 'полку')|e]."
  game_concept_total_strength: "Загальна чисельність"
  game_concept_total_strength_desc: "Це загальна кількість людей в [Concept('army', 'війську')|e]. Складається з показників [Concept('strength', 'чисельності')|e] кожного окремого [Concept('regiment', 'полку')|e]."
  game_concept_non_avoidable_attrition: "Нездоланне виснаження"
  game_concept_non_avoidable_attrition_desc: "[Concept('armies', 'Війська')|e] у [Concept('zone_of_control', 'зоні контролю')|e] [Concept('fort', 'фортеці')|e], яка знаходиться [Concept('own', 'у володінні')|e] та [Concept('control', 'під контролем')|e] їхньої країни, зазвичай не піддаються [Concept('attrition', 'виснаженню')|e]. Однак деяким явищам (наприклад, таким як [ShowSituationName('black_death')|l]) не страшні навіть фортечні мури."
  game_concept_attrition_losses: "Втрати від виснаження"
  game_concept_attrition_loss: "Втрати від виснаження"
  game_concept_attrition_loss_desc: "Показує, скільки шкоди [Concept('attrition', 'виснаження')|e] щомісяця завдає [Concept('regiment', 'полку')|e] або [Concept('ship', 'кораблю')|e]."
  game_concept_attrition: "Виснаження"
  game_concept_attrition_desc: "Виснаження настає на початку кожного місяця: [Concept('regiments', 'полки')|e] втрачають людей, [Concept('ships', 'кораблі')|e] отримують шкоду. Деякі види виснаження є [Concept('non_avoidable_attrition', 'неминучими')|e]. Основні причини виснаження:\n$BULLET_WITH_TAB$Відсутність [Concept('food', 'їжі')|e] у [Concept('army', 'війську')|e]\n$BULLET_WITH_TAB$[Concept('unit_weight', 'Вага підрозділу')|e] більша, ніж [Concept('supply_limit', 'межа постачання')|e] в [Concept('location', 'місцевості')|e]\n$BULLET_WITH_TAB$[Concept('winter', 'Зима')|e], [Concept('topography', 'рельєф')|e], [Concept('vegetation', 'рослинність')|e] та [Concept('climate', 'клімат')|e]"
  game_concept_supply_limit: "Межа постачання"
  game_concept_supply_limit_desc: "Це максимальний [Concept('unit_weight', 'розмір загону')|e], який підтримується [Concept('location', 'місцевістю')|e] без додаткового [Concept('food_consumption', 'споживання їжі')|e] [Concept('army', 'військом')|e]."
  game_concept_unit_weight: "Розмір загону"
  game_concept_unit_weight_desc: "Це накопичуване значення залежить від поточної [Concept('strength', 'чисельності')|e] [Concept('regiment', 'полку')|e] та [Concept('unit_type', 'типу військ')|e].\nПри підрахунку [Concept('attrition', 'виснаження')|e] вага безпосередньо порівнюється з [Concept('supply_limit', 'межею постачання')|e] в поточній [Concept('location', 'місцевості')|e]."
  game_concept_loot: "Грабунок"
  game_concept_looted: "Розграбовано"
  game_concept_loot_desc: "[Concept('occupy', 'Окуповуючи')|e] [Concept('locations', 'місцевість')|e], [Concept('armies', 'військо')|e] викрадає запас її [Concept('gold', 'золота')|e]. Постраждала від цього [Concept('location', 'місцевість')|e] приблизно на #V 12#! місяців отримує [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,looted,X #V #L «Розграбовано»#!#!."
  game_concept_reinforce: "Поповнення"
  game_concept_reinforced: "Поповнення прибуло"
  game_concept_reinforcement: "Поповнення"
  game_concept_reinforce_desc: "[Concept('regiment', 'Полк')|e], чия чисельність менша за [Concept('maximum_strength', 'максимальну')|e], намагатиметься поповнити свій склад за рахунок [Concept('manpower', 'числа рекрутів')|e] та [Concept('gold', 'золота')|e] [Concept('country', 'країни')|e]. Поповнювати можна лише [Concept('regular_regiment', 'регулярні полки')|e] і лише в [Concept('friendly', 'дружніх')|e] [Concept('location', 'місцевостях')|e]."
  game_concept_repair: "Ремонт"
  game_concept_repaired: "Відремонтовано"
  game_concept_repair_desc: "Пошкоджений [Concept('ship', 'корабель')|e] можна відремонтувати в одному з наших [Concept('ports', 'портів')|e] або там, де у нас є [Concept('fleet_basing_rights', 'право на розміщення флоту')|e]. Для ремонту відповідна [Concept('country', 'країна')|e] виділяє [Concept('sailors', 'моряків')|e] та [Concept('gold', 'золото')|e]."
  game_concept_naval_damage: "Морська шкода"
  game_concept_naval_damage_desc: "Впливає на шкоду, що отримується або завдається [Concept('ships', 'кораблями')|e] в [Concept('combat', 'бою')|e]."
  game_concept_damage_taken: "Отримувана шкода"
  game_concept_damage_taken_desc: "Під час [Concept('battle', 'битви')|e] [Concept('regiment', 'полк')|e] або [Concept('ship', 'корабель')|e] отримує шкоду, втрачаючи як [Concept('morale', 'бойовий дух')|e], так і [Concept('strength', 'чисельність')|e]. Величина шкоди залежить від [Concept('combat_power', 'бойової потужності')|e], [Concept('strength', 'чисельності')|e] та інших показників ворога. Зменшити шкоду можуть [Concept('experience', 'досвід')|e], [Concept('strength_damage_taken', 'отримувана шкода живій силі')|e] та [Concept('morale_damage_taken', 'отримувана шкода бойовому духу')|e]."
  game_concept_strength_damage_taken: "Отримувана шкода живій силі"
  game_concept_strength_damage_taken_desc: "Впливає на кількість шкоди, що отримується загоном у [Concept('combat', 'бою')|e]. [Concept('ships', 'Кораблі')|e] отримують шкоду безпосередньо, а в [Concept('regiments', 'полках')|e] зменшується [Concept('manpower', 'число рекрутів')|e]."
  game_concept_morale_damage_taken: "Отримувана шкода бойовому духу"
  game_concept_morale_damage_taken_desc: "Впливає на кількість [Concept('morale', 'бойового духу')|e], що втрачається загоном у [Concept('combat', 'бою')|e]."
  game_concept_strength_damage_done: "Завдана шкода живій силі"
  game_concept_strength_damage_done_desc: "Впливає на кількість шкоди, що завдається ворогу. [Concept('ships', 'Кораблі')|e] супротивника отримують шкоду безпосередньо, а в його [Concept('regiments', 'полках')|e] зменшується [Concept('manpower', 'число рекрутів')|e]."
  game_concept_morale_damage_done: "Завдана шкода бойовому духу"
  game_concept_morale_damage_done_desc: "Впливає на кількість [Concept('morale', 'бойового духу')|e], що втрачається ворогом у [Concept('combat', 'бою')|e]."
  game_concept_movement_speed: "Швидкість пересування"
  game_concept_movement_speed_desc: "Визначає, як швидко [Concept('unit', 'загін')|e] переміщується по карті."
  game_concept_discipline: "Дисципліна"
  game_concept_discipline_desc: "Впливає на завдану та [Concept('damage_taken', 'отриману')|e] [Concept('regiment', 'полком')|e] шкоду в [Concept('combat', 'бою')|e]. Чим вища дисципліна, тим більше шкоди полк завдає і тим менше [Concept('damage_taken', 'отримує')|e]."
  game_concept_military_tactics: "Військова тактика"
  game_concept_military_tactics_desc: "Зменшує [Concept('damage_taken', 'отриману')|e] [Concept('regiment', 'полком')|e] шкоду в [Concept('combat', 'бою')|e]."
  game_concept_combined_arms: "Різнорідні війська"
  game_concept_combined_arms_desc: "Цей показник відображає різноманітність поточного складу війська. Його значення можна збільшити, залучаючи кілька різних [Concept('unit_categories', 'родів військ')|e]. При цьому їх легкі та важкі варіанти рахуються окремо."
  game_concept_adult: "Дорослий персонаж"
  game_concept_adults: "Дорослі персонажі"
  game_concept_adult_desc: "Це [Concept('character', 'персонаж')|e], якому вже виповнилося #Y [ShowAdultAge]#!. Такий персонаж може виконувати роль [Concept('rulers', 'правителя')|e] без участі [Concept('regent', 'регента')|e], служити [Concept('general', 'полководцем')|e] або [Concept('admiral', 'адміралом')|e], а також обіймати посади в [Concept('cabinet', 'раді')|e] та вступати в [Concept('married', 'шлюб')|e]. Персонаж, який не досяг дорослого віку, вважається [Concept('infant', 'немовлям')|e], [Concept('child', 'дитиною')|e] або [Concept('adolescent', 'підлітком')|e]."
  game_concept_infant: "Немовля"
  game_concept_infants: "Немовлята"
  game_concept_infant_desc: "[Concept('character', 'Персонаж')|e], якому ще не виповнилося #Y [ShowMaxInfantAge]#!, вважається немовлям. Він не може отримувати [Concept('child_education', 'дитячу освіту')|e] та служити [Concept('country', 'країні')|e]."
  game_concept_child: "Дитина"
  game_concept_children: "Діти"
  game_concept_child_desc: "Це [Concept('character', 'персонаж')|e] віком від #Y [ShowMinChildAge]#! до #Y [ShowMaxChildAge]#!. Такий персонаж ще не може служити [Concept('country', 'країні')|e]. Якщо це дитина з [Concept('dynasty', 'династії')|e] [Concept('ruler', 'правителя')|e], їй можна дати [Concept('child_education', 'дитячу освіту')|e]."
  game_concept_adolescent: "Підліток"
  game_concept_adolescents: "Підлітки"
  game_concept_adolescent_desc: "[Concept('character', 'Персонаж')|e] віком від #Y [ShowMinAdolescentAge]#! до #Y [ShowMaxAdolescentAge]#! вважається підлітком. Він ще не зовсім [Concept('adult', 'дорослий')|e], але вже не [Concept('child', 'дитина')|e]."
  game_concept_child_education: "Дитяча освіта"
  game_concept_education: "Освіта"
  game_concept_child_education_desc: "[Concept('children', 'Дітям')|e] можна давати освіту, починаючи з #Y трьох#! років. Вона впливає на розвиток їхніх [Concept('abilities', 'навичок')|e] з плином часу.\n\nЩомісяця [Concept('child', 'дитина')] з ймовірністю [GetDefine('NCharacter', 'MONTHLY_STAT_INCREASE_CHANCE_FOR_CHILD')|Y]% може покращити свої [Concept('abilities', 'навички')] відповідно до отримуваної освіти."
  game_concept_exploration: "Експедиція"
  game_concept_explorations: "Експедиції"
  game_concept_exploring: "Експедиція"
  game_concept_exploration_desc: "Експедиція — це похід під командою [Concept('explorer', 'дослідника')|e] з метою [Concept('discovering', 'відкрити')|e] невідомі [Concept('area', 'області')|e] в морі або на суші (доступні в межах [Concept('naval_range', 'морехідної відстані')|e]).\n\nКожна експедиція вимагає витрат, які збільшуються залежно від відстані до [Concept('capital', 'столиці')|e], однак [Concept('naval_range', 'морехідна відстань')|e] зменшує ці витрати. Швидкість експедиції залежить від [Concept('mil', 'військового навику')|e] [Concept('explorer', 'дослідника')].\n\nКожна експедиція щомісяця витрачає [Concept('gold', 'золото')|e], ці витрати зменшуються пропорційно [Concept('adm', 'адміністративному навику')|e] [Concept('explorer', 'дослідника')].\n\nЩойно експедиція досягне максимального [Concept('exploration_progress', 'прогресу')|e]), [Concept('explorer', 'дослідник')] повернеться, а вивчана [Concept('area', 'область')] буде [Concept('discovered', 'відкрита')]."
  game_concept_exploration_success: "Успіх експедиції"
  game_concept_exploration_progress: "Прогрес експедиції"
  game_concept_exploration_progress_desc: "Щоб повністю вивчити [Concept('area', 'область')|e] в ході [Concept('explored', 'експедиції')|e], потрібні витрати, які залежать від цілої низки чинників, насамперед — від навичок [Concept('explorer', 'дослідника')|e]."
  game_concept_known_world: "Відомий світ"
  game_concept_known_world_desc: "Це частина світу, яку ви [Concept('discovered', 'відкрили')|e] на даний момент. Будь-яка територія, ще не відкрита вашою [Concept('country', 'країною')|e], вважається [Concept('terra_incognita', 'терра інкогніта')|e]."
  game_concept_terra_incognita: "Терра інкогніта"
  game_concept_terra_incognita_desc: "[Concept('location', 'Місцевість')|e], не [Concept('discovered', 'відкрита')|e] [Concept('country', 'країною')|e] в ході [Concept('exploration', 'експедиції')|e] або будь-яким іншим чином, не видно на карті, і ця країна не може з нею взаємодіяти. Така місцевість називається «терра інкогніта», від латинського «невідома земля»."
  game_concept_discover: "Відкриття"
  game_concept_discovered: "Відкрито"
  game_concept_discovering: "Відкриття"
  game_concept_explore: "Відправити експедицію"
  game_concept_explored: "Вивчено"
  game_concept_discover_desc: "Відкриті [Concept('location', 'місцевості')|e] втрачають статус «[Concept('terra_incognita', 'терра інкогніта')|e]» і стають видимими, після чого з ними можна взаємодіяти."
  game_concept_explorer: "Дослідник"
  game_concept_explorers: "Дослідники"
  game_concept_explorer_desc: "Дослідник — це [Concept('character', 'персонаж')|e] з певними [Concept('traits', 'властивостями')|e], корисними в [Concept('exploration', 'експедиції')|e]."
  game_concept_conquistador: "Конкістадор"
  game_concept_conquistadors: "Конкістадори"
  game_concept_conquistador_desc: "Конкістадор — це [Concept('character', 'персонаж')|e], якому доручено завоювати чужі землі та створити на їхній території нового [Concept('subject', 'ленника')|e] для нашої [Concept('country', 'країни')|e]."
  game_concept_budget: "Баланс"
  game_concept_balance: "Баланс"
  game_concept_finances: "Фінанси"
  game_concept_budget_desc: "Щомісячний баланс розраховується при додаванні [Concept('incomes', 'доходів')|e] та [Concept('expenses', 'витрат')|e] [Concept('country', 'країни')|e]. Підсумкова сума впливає на розмір державної [Concept('treasury', 'скарбниці')|e]."
  game_concept_income: "Дохід"
  game_concept_incomes: "Доходи"
  game_concept_income_desc: "Це [Concept('gold', 'золото')|e], яке [Concept('country', 'країна')|e] отримує щомісяця. Сюди входять [Concept('taxes', 'податки')|e] з кожного [Concept('estate', 'стану')|e] та доходи від [Concept('trades', 'торгівлі')|e]."
  game_concept_expense: "Витрата"
  game_concept_expenses: "Витрати"
  game_concept_expense_desc: "Це поточні витрати країни. Сюди входить утримання [Concept('armies', 'військ')|e], [Concept('navies', 'флотів')|e], [Concept('trades', 'торгівлі')|e], [Concept('artists', 'митців')|e], [Concept('fortifications', 'укріплень')|e], [Concept('colonial_charters', 'колоніальних поселень')|e] та інші щомісячні витрати."
  game_concept_treasury: "Скарбниця"
  game_concept_treasury_desc: "Це кількість [Concept('gold', 'золота')|e] у [Concept('country', 'країни)|e]. Якщо вона стає від’ємною, країні автоматично видається [Concept('loan', 'позика')|e]. Якщо країна більше не може брати [Concept('loans', 'позики')|e], вона стає [Concept('bankrupt', 'банкрутом')|e]."
  game_concept_minting: "Карбування"
  game_concept_mint: "Карбувати"
  game_concept_minting_desc: "Карбування монет поповнює [Concept('treasury', 'скарбницю')|e], але підвищує [Concept('inflation', 'інфляцію')|e]. Якщо не карбувати монети, [Concept('inflation', 'інфляція')] може знизитися."
  game_concept_annexation: "Приєднання"
  game_concept_annexations: "Приєднання"
  game_concept_annex: "Приєднання"
  game_concept_annexing: "Приєднує"
  game_concept_annexed: "Приєднано"
  game_concept_annexation_desc: "Це повне поглинання [Concept('overlord', 'сюзереном')|e] будь-якого [Concept('subjects', 'ленника')|e].\n\nВ результаті [Concept('overlord', 'сюзерен')] заволодіває всіма [Concept('locations', 'місцевостями')|e] (зокрема [Concept('cores', 'корінними')|e]) та [Concept('characters', 'персонажами')|e], [Concept('owned', 'підвладними')|e] [Concept('subjects', 'леннику')]). Сам [Concept('subject', 'ленник')|e] перестане існувати як [Concept('country', 'країна')|e].\n\nЛенник може або уповільнити приєднання за допомогою [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,frustrate_annexation,X #L «Зрив приєднання»#!#!, або оголосити у відповідь [Concept('war', 'війну')|e] за допомогою особливого [Concept('casus_belli', 'приводу')|e] #TOOLTIP:CASUS_BELLI,cb_resist_annexation,X #L «Опір приєднанню»#!#!.\n\n[Concept('disloyal_subject', 'Нелояльного ленника')|e] не можна приєднати."
  game_concept_court_maintenance: "Утримання двору"
  game_concept_court: "Двір"
  game_concept_court_maintenance_desc: "Двір — це вся родина [Concept('ruler', 'правителя')|e], а також люди, які регулярно йому прислуговують. До великого двору можуть належати тисячі осіб: політичне оточення, слуги, священники, охорона, гарем, наложниці, євнухи та багато інших людей. Їх усіх потрібно утримувати — цей параметр відображає вартість витрат на двір."
  game_concept_diplomatic_maintenance: "Витрати на дипломатію"
  game_concept_diplomatic_maintenance_desc: "Кількість [Concept('diplomats_with_icon', 'дипломатів')|e], що служать нам, а також [Concept('diplomatic_capacity_with_icon', 'дипломатичний потенціал')|e] можна збільшити, якщо виникне така потреба. Для цього знадобиться витратити [Concept('gold', 'дукати')|e].\n\nВитрати на дипломатію також збільшують [Concept('subject_loyalty_with_icon', 'лояльність ленника')|e]."
  game_concept_maintenance: "Утримання"
  game_concept_maintaining: "Утримання"
  game_concept_maintain: "Утримувати"
  game_concept_maintenance_desc: "Щоб задіяти [Concept('regiments', 'полки')|e] та [Concept('ships', 'кораблі')|e], щомісяця потрібно платити за [Concept('army_maintenance', 'утримання війська')|e] та [Concept('navy_maintenance', 'флоту')|e]."
  game_concept_army_maintenance: "Утримання війська"
  game_concept_army_maintenance_desc: "Щоб [Concept('armies', 'війська')|e] були ефективними, потрібно платити бійцям, забезпечувати їх спорядженням, їжею та одягом. Утримання війська визначає кількість [Concept('gold', 'золота')|e] на забезпечення [Concept('armies', 'війська')] всім необхідним. Якщо про це не дбати, [Concept('morale', 'бойовий дух')|e] буде низьким, а наші війська — менш ефективними."
  game_concept_navy_maintenance: "Утримання флоту"
  game_concept_navy_maintenance_desc: "Великий потужний флот [Concept('ships', 'кораблів')|e], готових вирушити в плавання, — це чудово. Однак судна самі себе не забезпечать: щоб підтримувати їх на плаву, потрібні [Concept('gold', 'дукати')|e]. Утримання флоту визначає кількість дукатів на підтримку наших кораблів у доброму стані.\n\nЯкщо про це не дбати, [Concept('morale', 'бойовий дух')|e] буде низьким, а наші кораблі — менш ефективними і в бою, і в підтримці [Concept('maritime_presence', 'морської присутності')|e]."
  game_concept_fort_maintenance: "Утримання фортець"
  game_concept_fort_maintenance_desc: "[Concept('forts', 'Фортеці')|e] допомагають відбивати напад [Concept('armies', 'військ')|e]. Однак щоб фортеці захищали вас завжди, потрібне [Concept('gold', 'золото')|e]. Утримання фортець визначає, скільки золота [Concept('country', 'країна')|e] витрачає на підтримку своїх [Concept('forts', 'фортець')|e] у доброму стані. Чим більше витрачати золота, тим ефективнішими будуть фортеці."
  game_concept_cultural_maintenance: "Вкладення в культуру"
  game_concept_cultural_maintenance_s: "Вкладення в культуру"
  game_concept_cultural_maintenance_desc: "Ці гроші потрібні, щоб [Concept('artists', 'митці')|e] могли створювати більш видатні [Concept('work_of_art', 'твори')|e]. Крім того, такі вкладення безпосередньо впливають на [Concept('prestige', 'престиж')|e] нашої [Concept('country', 'країни')|e]."
  game_concept_colonial_maintenance: "Утримання колоній"
  game_concept_colonial_maintenance_desc: "Щоб відправляти кораблі, людей та припаси для підтримки [Concept('colonial_charter', 'колоніального поселення')|e], потрібне [Concept('gold', 'золото')|e]. Цей параметр визначає вартість такого утримання."
  game_concept_mercenary_income: "Доходи від найманців"
  game_concept_mercenary_income_desc: "Це [Concept('gold', 'золото')|e], яке ми отримуємо, відправляючи свої [Concept('armies', 'війська')|e] або [Concept('navies', 'флоти')|e] іншим [Concept('countries', 'країнам')|e] як [Concept('mercenaries', 'найманців')|e]."
  game_concept_mercenary_expense: "Витрати на найманців"
  game_concept_mercenary_expense_desc: "Це витрати на [Concept('mercenaries', 'найманців')|e], які воюють за нас."
  game_concept_subsidy_expense: "Субсидії на споруди"
  game_concept_subsidy_expense_desc: "Деякі [Concept('buildings', 'споруди')|e] не приносять прибутку, але виробляють потрібні нам [Concept('goods', 'товари')|e]. На такі споруди можна виділяти [Concept('subsidy', 'субсидії')|e]."
  game_concept_subsidy: "Субсидії"
  game_concept_subsidy_desc: "Якщо [Concept('building', 'споруда')|e] не приносить прибутку, то не зможе купувати необхідні їй [Concept('goods', 'товари')|e] і перестане працювати. [Concept('country', 'Країна')|e] може субсидувати таку [Concept('building', 'споруду')] і щомісяця підтримувати її достатньою для роботи кількістю [Concept('gold', 'золота')|e]."
  game_concept_exploration_expense: "Вартість експедицій"
  game_concept_exploration_expense_desc: "[Concept('exploration', 'Експедиції')|e] коштують грошей, однак ці витрати можна зменшити завдяки окремим [Concept('advances', 'поступом')|e], [Concept('laws', 'законами')|e], [Concept('privileges', 'привілеями')|e] та [Concept('adm', 'адміністративним хистом')|e] [Concept('explorer', 'дослідника')|e]."
  game_concept_diplomatic_income: "Доходи від дипломатії"
  game_concept_diplomatic_income_s: "Дипломатія"
  game_concept_diplomatic_income_desc: "Це гроші, що надходять до нашої [Concept('treasury', 'скарбниці')|e] від інших [Concept('countries', 'країн')|e], незалежно від того, подобається їм це чи ні."
  game_concept_diplomatic_expense: "На дипломатію"
  game_concept_diplomatic_expense_s: "Дипломатія"
  game_concept_diplomatic_expense_desc: "Це гроші, що отримуються іншими [Concept('countries', 'країнами')|e] з нашої [Concept('treasury', 'скарбниці')|e] силою або за [Concept('treaty', 'договором')|e]."
  game_concept_stability_investment: "Вкладення в стабільність"
  game_concept_stability_investment_s: "Стабільність"
  game_concept_stability_investment_desc: "Щоб підвищувати [Concept('stability', 'стабільність')|e], можна витрачати на це частину [Concept('budget', 'бюджету')|e], а також виконувати відповідні [Concept('cabinet_actions', 'доручення')|e] або збільшувати кількість #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! [Concept('primary_religion', 'основної релігії')|e]."
  game_concept_sound_toll: "Плата за прохід"
  game_concept_sound_tolls: "Плата за прохід"
  game_concept_sound_toll_desc: "У світі є вузькі протоки, і сторона, що їх контролює, може брати плату за [Concept('trades', 'перевезення товарів')|e] через них. Приклади:\n$BULLET_WITH_TAB$#TOOLTIP:LOCATION,oresund,X #L Ересунн#!#!\n$BULLET_WITH_TAB$#TOOLTIP:LOCATION,gulf_izmit,X #L Ізмітська затока#!#!\n\nДля контролю над протокою необхідно володіти прив'язаною до неї сухопутною [Concept('location', 'місцевістю')|e]. Своєю чергою, рівень контролю над цією [Concept('location', 'місцевістю')] визначає розмір [Concept('income', 'доходу')|e], який ви отримуєте від плати за прохід через протоку."
  game_concept_great_power_score: "$game_concept_great_power_score_short$ великої держави"
  game_concept_great_power_score_short: "Рахунок"
  game_concept_great_power_score_desc: "Рахунок великої держави — незаперечний показник переваги. [Concept('country', 'Країни')|e] з найбільшим рахунком є [Concept('great_powers', 'великими державами')|e]. Загальна кількість великих держав залежить від різниці між рахунком найбільшої з них і всіма іншими.\n\nКраїни можуть йти до успіху по-різному, зокрема збільшувати [Concept('population', 'населення')|e], а також підвищувати [Concept('prestige', 'престиж'|e] та [Concept('country_rank', 'ранг країни')|e].\n\nКрім того, [Concept('subjects', 'ленники')|e] віддають [Concept('overlord', 'сюзерену')|e] певну частку свого рахунку, яка залежить від [Concept('subject_type', 'типу ленника')|e]."
  game_concept_great_power_rank: "$game_concept_great_power_rank_short$ великої держави"
  game_concept_great_power_rank_short: "Ранг"
  game_concept_great_power_rank_desc: "Ранг великої держави показує, на якому місці [Concept('country', 'країна')|e] знаходиться в гонці за остаточною перемогою. Ранг визначається сумарним [Concept('great_power_score', 'рахунком великої держави')|e]."
  game_concept_event: "Подія"
  game_concept_events: "Події"
  game_concept_event_desc: "Під час гри з [Concept('country', 'країною')|e] відбуваються різні події за дотримання потрібних умов. Зазвичай події супроводжуються якимось [Concept('effect', 'ефектом')|e] і розкривають сюжет гри.\nУ деяких [Concept('countries', 'країн')] відбуваються [Concept('dynamic_historical_events', 'динамічні історичні події')|e]."
  game_concept_dynamic_historical_event: "Динамічна історична подія"
  game_concept_dynamic_historical_events: "Динамічні історичні події"
  game_concept_dynamic_historical_event_desc: "Це історичні [Concept('events', 'події')|e], що відбуваються з [Concept('country', 'країною')|e] у визначений період часу за дотримання потрібних умов."
  game_concept_historical_option: "Історично достовірний варіант"
  game_concept_historical_option_desc: "Цей [Concept('event_option', 'варіант')|e] в історичній [Concept('event', 'події')|e] вирішила обрати [Concept('country', 'країна')|e] в реальних історичних обставинах."
  game_concept_event_option: "Варіант події"
  game_concept_event_option_desc: "У кожній [Concept('event', 'події')|e] гравець може обрати щонайменше один варіант. Якщо це [Concept('dynamic_historical_event', 'динамічна історична подія')|e], гравцеві може бути доступний [Concept('historical_option', 'історично достовірний варіант')|e]."
  game_concept_mission: "Завдання"
  game_concept_missions: "Завдання"
  game_concept_mission_desc: "Це набір [Concept('tasks', 'етапів')|e], доступних [Concept('country', 'країні')|e]. Завдання визначають напрямок дій для [Concept('country', 'країни')] і, залежно від налаштувань, надають корисні нагороди за виконання етапу або всіх етапів."
  game_concept_mission_task: "Етап завдання"
  game_concept_mission_tasks: "Етапи завдання"
  game_concept_task: "Етап"
  game_concept_tasks: "Етапи"
  game_concept_mission_task_desc: "Етап — це частина [Concept('mission', 'завдання')|e]. За виконання етапів може видаватися нагорода. Щоб завершити [Concept('mission', 'завдання')], потрібно виконати всі його етапи."
  game_concept_infiltrate_administration: "Впровадження у владу"
  game_concept_infiltrate_administration_desc: "Дозволяє на час прибрати [Concept('fog_of_war', 'туман війни')|e] над іншою [Concept('country', 'країною')|e]."
  game_concept_coastal: "Прибережна місцевість"
  game_concept_coast: "Узбережжя"
  game_concept_coastal_desc: "Прибережна [Concept('location', 'місцевість')|e] межує з [Concept('seazone', 'акваторією')|e]. У такій місцевості можна будувати [Concept('port', 'порт')|e] та [Concept('ships', 'кораблі')|e] за наявності відповідної [Concept('building', 'споруди')|e], наприклад #TOOLTIP:BUILDING_TYPE,wharf,X #L пристані#!#! або #TOOLTIP:BUILDING_TYPE,dock,X #L дока#!#!."
  game_concept_inland: "Внутрішня місцевість"
  game_concept_inland_desc: "Внутрішня [Concept('location', 'місцевість')|e] не межує з [Concept('seazone', 'акваторією')|e], тому там не можна будувати [Concept('port', 'порт')|e] та [Concept('ships', 'кораблі')|e].\n\nПротилежністю внутрішньої місцевості є [Concept('coastal', 'прибережна місцевість')|e]."
  game_concept_disembark: "Висадка"
  game_concept_embarking: "Завантаження"
  game_concept_disembarked: "Висадилися"
  game_concept_embarking_desc: "[Concept('army', 'Військо')|e], яке перевозить [Concept('navy', 'флот')|e], може переправитися через [Concept('seazone', 'акваторію')|e] та висадитися в сусідній [Concept('coastal', 'прибережній')|e] [Concept('location', 'місцевості')|e]."
  game_concept_embarkings: "Завантаження"
  game_concept_embarkings_desc: "[Concept('army', 'Військо')|e], яке перевозить [Concept('navy', 'флот')|e], може переправитися через [Concept('seazone', 'акваторію')|e] та висадитися в сусідній [Concept('coastal', 'прибережній')|e] [Concept('location', 'місцевості')|e]."
  game_concept_gold: "Дукати"
  game_concept_gold_i: "@gold!"
  game_concept_gold_desc: "Це мірило багатства та основна валюта кожної [Concept('country', 'країни')|e]. [Concept('treasury', 'Казна')|e] [Concept('country', 'країни')] — це кількість дукатів, якими вона зараз володіє.\n\nДукати можна отримувати, збираючи [Concept('taxes', 'податки')|e] з [Concept('estates', 'станів')|e] та [Concept('subjects', 'ленників')|e], а витрачати майже на що завгодно: від будівництва [Concept('buildings', 'споруд')|e] до утримання [Concept('armies', 'військ')|e]. Дукати переходять з рук у руки під час торгівлі [Concept('food', 'їжею')|e] та [Concept('goods', 'товарами')|e]. Їх можна вкладати в [Concept('stability', 'стабільність')|e] або добробут [Concept('court', 'двору')|e]."
  game_concept_improve_relations: "Поліпшення відносин"
  game_concept_improve_relation: "Поліпшити відносини"
  game_concept_improve_relations_desc: "Це [Concept('diplomacy', 'дипломатична')|e] дія, мета якої — поліпшити [Concept('opinion', 'думку')|e] іншої [Concept('country', 'країни')|e] про нашу [Concept('country', 'країну')]."
  game_concept_winter: "Зима"
  game_concept_winters: "Зими"
  game_concept_winter_desc: "Зима негативно впливає на життя [Concept('locations', 'місцевості')|e]. Не можна передбачити, якою буде наступна зима, але від [Concept('climate', 'клімату')|e] залежить [Concept('winter_level', 'рівень зими')|e] — тобто наскільки вона може бути суворою.\n\nМісяці, коли настає зима, залежать від [Concept('hemisphere', 'півкулі')|e], в якій розташована [Concept('location', 'місцевість')]."
  game_concept_winter_level: "Рівень зими"
  game_concept_winter_levels: "Рівні зими"
  game_concept_winter_level_max: "Максимальний рівень зими"
  game_concept_winter_level_desc: "Рівень зими характеризує суворість [Concept('winter', 'зими')|e] в [Concept('location', 'місцевості')|e]. За вищого рівня [Concept('winter', 'зими')] зупиняється [Concept('constructions', 'будівництво')|e], а неглибокі [Concept('seazones', 'акваторії')|e] навіть можуть [Concept('frozen_freeze_over', 'замерзнути')|e].\n\nПід час звичайної або суворої [Concept('winter', 'зими')] [Concept('armies', 'війська')|e] не можуть заходити на територію [Concept('locations', 'місцевостей')], в [Concept('topography', 'рельєфі')|e] яких присутні [ShowTopographyName('mountains')|l].\n\nМаксимальний рівень зими в [Concept('location', 'місцевості')] залежить від місцевого [Concept('climate', 'клімату')|e].\n\nЄ кілька рівнів зими:\n• [ShowModifier('winter_none')]\n• [ShowModifier('winter_mild')]\n• [ShowModifier('winter_normal')]\n• [ShowModifier('winter_severe')]"
  game_concept_hemisphere: "Півкуля"
  game_concept_hemisphere_desc: "Кожна [Concept('location', 'місцевість')|e] знаходиться в одній із двох півкуль — на північ або на південь від екватора.\n\nВід півкулі залежить, у які місяці настає [Concept('winter', 'зима')|e]: у північній її початок зазвичай припадає на січень, а в південній — на липень."
  game_concept_tolerance: "Терпимість"
  game_concept_tolerance_desc: "Терпимість характеризує, з якою повагою в суспільстві ставляться до прихильників певної [Concept('religion', 'релігії')|e]. У кожної [Concept('country', 'країни')|e] є показник терпимості до своєї [Concept('primary_religion', 'основної релігії')|e], [Concept('heretics', 'єретиків')|e] та [Concept('heathens', 'язичників')|e].\n\nПозитивне значення терпимості підвищує [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pops', 'груп населення')|e], а також [Concept('diplomatic_opinion', 'дипломатичну думку')|e] про країни, які сповідують ту саму релігію. Негативне значення терпимості збільшує кількість [Concept('unrest', 'заворушень')|e] та знижує дипломатичну думку."
  game_concept_tolerance_list: "$BULLET_WITH_TAB$[Concept('primary_religion_tolerance', 'Терпимість до основної релігії')|e]\n$BULLET_WITH_TAB$[Concept('heretic_tolerance', 'Терпимість до єретиків')|e]\n$BULLET_WITH_TAB$[Concept('heathenry_tolerance', 'Терпимість до язичників')|e]"
  game_concept_true_faith_tolerance: "Терпимість до основної релігії"
  game_concept_primary_religion_tolerance: "Терпимість до основної релігії"
  game_concept_true_faith_tolerance_desc: "Терпимість до основної релігії характеризує, наскільки [Concept('country', 'країна')|e] прихильна до прихильників своєї [Concept('primary_religion', 'основної релігії')|e]. Вона впливає на [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pops', 'груп населення')|e], які сповідують основну релігію, та [Concept('diplomatic_opinion', 'дипломатичну думку')|e] країни про країни тієї ж віри.\n\nЯк правило, терпимість до основної релігії позитивна і може підвищуватися завдяки окремим [Concept('laws', 'законам')|e], [Concept('privileges', 'привілеям')|e] та [Concept('societal_values', 'суспільним цінностям')|e]."
  game_concept_heretic_tolerance: "Терпимість до єретиків"
  game_concept_heretic_tolerance_desc: "Терпимість до єретиків характеризує, якої соціальної та політичної дискримінації зазнають [Concept('heretics', 'єретики')|e] в [Concept('country', 'країні')|e]. Вона впливає на [Concept('pop_satisfaction', 'задоволення')|e] єретичних [Concept('pops', 'груп населення')|e] та [Concept('diplomatic_opinion', 'дипломатичну думку')|e] країни про країни, що впали в єресь.\n\nЯк правило, терпимість до єретиків низька і може змінюватися завдяки окремим [Concept('laws', 'законам')|e], [Concept('privileges', 'привілеям')|e] та [Concept('societal_values', 'суспільним цінностям')|e]."
  game_concept_heathenry_tolerance: "Терпимість до язичників"
  game_concept_heathenry_tolerance_desc: "Терпимість до язичників характеризує, якої соціальної та політичної дискримінації зазнають [Concept('heathens', 'язичники')|e] в [Concept('country', 'країні')|e]. Вона впливає на [Concept('pop_satisfaction', 'задоволення')|e] язичницьких [Concept('pops', 'груп населення')|e] та [Concept('diplomatic_opinion', 'дипломатичну думку')|e] країни про язичницькі країни.\n\nЯк правило, терпимість до язичників вкрай низька і може змінюватися завдяки окремим [Concept('laws', 'законам')|e], [Concept('privileges', 'привілеям')|e] та [Concept('societal_values', 'суспільним цінностям')|e]."
  game_concept_autocephalous_patriarchate: "Автокефальний патріархат"
  game_concept_autocephalous_patriarchates: "Автокефальні патріархати"
  game_concept_autocephalous_patriarchate_desc: "Автокефальний патріархат — це об'єднання [Concept('countries', 'країн')|e] однієї й тієї ж східної #L [ShowReligionGroupAdjective('christian')|l]ої#! [Concept('religion', 'релігії')|e]. Його очолює один єпископ, який не відповідає ні перед ким іншим у межах даної [Concept('religion', 'релігії')]. [Concept('international_organization_leader_short', 'Лідер')|e] автокефального патріархату отримує додаткові привілеї. Участь у цьому об'єднанні теж дає переваги, але коли [Concept('country', 'країна')] в його складі стає могутнішою, ніж лідер, їй має сенс відокремитися і створити свій автокефальний патріархат. Якщо на території патріархату є [Concept('holy_site', 'святиня')|e], його резиденцію можна перенести туди, щоб отримати додаткові переваги."
  game_concept_sect: "Напрямок"
  game_concept_sects: "Напрямки"
  game_concept_sect_desc: "$sect_desc$"
  game_concept_hindu_branch: "Відгалуження індуїзму"
  game_concept_hindu_branches: "Відгалуження індуїзму"
  game_concept_hindu_branch_desc: "$hindu_branch_desc$"
  game_concept_subsidization: "Субсидування"
  game_concept_subsidize: "Субсидувати"
  game_concept_subsidized: "На субсидуванні"
  game_concept_subsidization_desc: "[Concept('owner', 'Власники')|e] виробничих [Concept('buildings', 'споруд')|e] можуть [Concept('subsidized', 'субсидувати')|e] їх — якщо така споруда зазнає збитків у [Concept('gold', 'золоті')|e], ці фінансові втрати будуть покриті прямо з [Concept('balance', 'бюджету')|e] [Concept('country', 'країни')|e], і споруда зможе нормально працювати."
  game_concept_special_status: "Особливий статус"
  game_concept_special_statuses: "Особливі статуси"
  game_concept_special_status_desc: "Учасники [Concept('international_organization', 'міжнародного об'єднання')|e], що володіють особливим статусом, набувають певних привілеїв або обов'язків. У деяких випадках особливим статусом наділяється [Concept('international_organization_leader_short', 'лідер')|e] об'єднання, щоб підкреслити його виняткове становище. В інших об'єднаннях особливий статус покладається [Concept('electors', 'виборцям')|e]."
  game_concept_special_status_power: "Сила особливого статусу"
  game_concept_special_status_power_short: "Сила"
  game_concept_special_status_power_desc: "Політична вага групи [Concept('members', 'учасників')|e], що мають [Concept('special_status', 'особливий статус')|e] у межах [Concept('international_organization', 'міжнародного об'єднання')|e]. Влада допомагає вирішувати деякі [Concept('parliament_issues', 'питання')|e] в [Concept('parliament', 'парламенті')|e], якщо по них не прийнято жодної [Concept('resolution', 'резолюції')|e]."
  game_concept_international_organization_variable: "Показник міжнародного об'єднання"
  game_concept_international_organization_variable_desc: "Показники [Concept('international_organization', 'міжнародного об'єднання')|e] використовуються в різних ігрових механіках, унікальних для кожного об'єднання. Для деяких об'єднань — наприклад, для #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! або #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!, — ці показники відображають авторитет їхнього [Concept('international_organization_leader_short', 'лідера')|e]. Для інших, таких як #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,sect,X #L напрямку#!#! буддизму, показники відображають вплив самого об'єднання. Залежно від різновиду об'єднання його показники можуть використовуватися по-різному."
  game_concept_land_ownership_rule: "Правила володіння землею"
  game_concept_land_ownership_rule_desc: "Деякі [Concept('international_organizations', 'міжнародні об’єднання')|e] можуть володіти [Concept('locations', 'місцевостями')|e]. Характер управління та [Concept('modifiers', 'модифікатори')|e] таких місцевостей визначаються правилами володіння землею."
  game_concept_international_organization_leader: "Лідер міжнародного об'єднання"
  game_concept_international_organization_leader_short: "Лідер"
  game_concept_international_organization_leader_desc: "[Concept('country', 'Країна')|e] може бути [Concept('international_organization_leader_short', 'лідером')|e] [Concept('international_organization', 'міжнародного об'єднання')|e]. Ці [Concept('international_organization', 'об'єднання')] бувають різними, але зазвичай лідером є наймогутніша [Concept('country', 'країна')|e].\n\nУ деяких [Concept('international_organization', 'об'єднаннях')] [Concept('country', 'країна')] стає [Concept('international_organization_leader_short', 'лідером')] за результатами виборів, але бувають й інші системи визначення лідерства. Зустрічаються також об'єднання, де [Concept('international_organization_leader_short', 'лідера')] немає зовсім."
  game_concept_hre_emperor: "Імператор"
  game_concept_hre_emperor_desc: "Імператор [Concept('international_organization_leader_short', 'очолює')] [Concept('holy_roman_empire', 'Священну Римську Імперію')|e]. До його обов'язків входить захист країн-[Concept('members', 'учасників')|e] від зовнішніх та внутрішніх загроз."
  game_concept_hre_law_level: "Рівень імперського правила"
  game_concept_hre_law_level_desc: "Рівень правила визначає співвідношення між централізацією та децентралізацією, яке привноситься окремим правилом у устрій [Concept('holy_roman_empire', 'Священної Римської імперії')|e]. Нижчий рівень відображає більший вплив [Concept('hre_emperor', 'імператора')|e], а вищий — децентралізацію в країні.\n\nРеформи можна приймати лише на суміжному рівні, тобто імператор не може впровадити реформу рівня 2, якщо поточне правило є реформою рівня 4. Більша частина [Concept('laws', 'законів')|e] доступна лише з рівня #Y  3#!."
  game_concept_holy_roman_empire: "Священна Римська Імперія"
  game_concept_hre: "СРІ"
  game_concept_holy_roman_empire_desc: "[GetUniqueInternationalOrganization('hre').GetName] — це [Concept('international_organization', 'міжнародне об'єднання')|e], яке домінує в політичному житті кількох регіонів: [ShowRegionName('north_german_region')], [ShowRegionName('south_german_region')], частково [ShowRegionName('italy_region')] та [ShowRegionName('france_region')]. [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip] об'єднує безліч не наймогутніших [Concept('countries', 'країн')|e] під захистом [Concept('international_organization_leader_short', 'лідера')|e].\n\n[GetUniqueInternationalOrganization('hre').GetLeaderTitle] — [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale,'виборна', 'виборний')] глава цього об'єднання."
  game_concept_hre_electoral_college: "Колегія виборців"
  game_concept_hre_electoral_college_desc: "$game_concept_hre_electoral_college$ складається з #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!.\n\nПравило #TOOLTIP:LAW,golden_bull,X #L «Золота булла»#!#! визначає, як саме вони голосують залежно від наступних чинників:\n• Встановлення впливу [Concept('country_rank', 'рангу країни')|e]\n• Зниження впливу [Concept('opinion', 'думки')|e] вдвічі\n• Збільшення впливу [Concept('great_power_score', 'рахунку великої держави')|e] вчетверо"
  game_concept_trade_range: "Торгова відстань"
  game_concept_trade_range_desc: "Максимальна відстань, на якій [Concept('country', 'країна')|e] може вести [Concept('trade', 'торгівлю')|e] між двома [Concept('markets', 'ринками')|e]. Вимірюється від [Concept('market_centers', 'ринкових центрів')|e]. Якщо у [Concept('country', 'країни')] є [Concept('merchant_capacity', 'торговий потенціал')|e] на будь-якому [Concept('markets', 'ринку')], вона може торгувати з усіма [Concept('markets', 'ринками')] в межах торгової відстані.\n\nТоргова відстань головним чином зростає завдяки [Concept('advances', 'поступу')|e], однак її також можна збільшити за рахунок деяких [Concept('laws', 'законів')|e], [Concept('privileges', 'привілеїв')|e] та [Concept('reforms', 'реформ')|e]."
  game_concept_parliament: "Парламент"
  game_concept_parliament_desc: "[Concept('country', 'Країна')|e] може скликати свої [Concept('estates', 'стани')|e] на засідання парламенту. Там можна вирішувати будь-які [Concept('parliament_issue', 'парламентські питання')|e], створювати [Concept('casus_belli', 'приводи для війни')|e], підвищувати [Concept('taxes', 'податки')|e], поповнювати [Concept('army_levies', 'військове')|e] та [Concept('navy_levies', 'флотське')|e] ополчення або змінювати будь-який з чинних [Concept('laws', 'законів')|e]. У кожного [Concept('estate', 'стану')|e] може бути своя [Concept('parliament_agenda', 'парламентська вимога')|e]. Щоб заручитися підтримкою стану, цю вимогу потрібно задовольнити.\n\n$game_concept_parliament$ може знаходитися як у [Concept('capital', 'столичній')|e], так і в іншій [Concept('location', 'місцевості')|e], яка отримує за це невеликі переваги. Якщо ця [Concept('location', 'місцевість')] [Concept('occupied', 'окупована')|e], то парламент перестає працювати.\n\nУ [Concept('international_organizations', 'міжнародних об’єднань')|e] на зразок #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! також може бути парламент, однак його устрій залежить від типу об'єднання. Наприклад, у деяких парламентах для вирішення питань потрібна [Concept('special_status_power', 'сила')|e] [Concept('members', 'учасників')|e] з [Concept('special_status', 'особливим статусом')|e]."
  game_concept_parliament_seat: "Розташування парламенту"
  game_concept_parliament_seat_desc: "У цій [Concept('location', 'місцевості')|e] засідає [Concept('parliament', 'парламент')|e] [Concept('country', 'країни')|e] або [Concept('international_organization', 'міжнародного об'єднання')|e]."
  game_concept_parliament_type: "Тип парламенту"
  game_concept_parliament_types: "Типи парламенту"
  game_concept_parliament_type_desc: "[Concept('parliament', 'Парламенти')|e] можуть бути різних [Concept('parliament_type', 'типів')|e]. Від них залежить принцип роботи парламенту.\n\n[ShowParliamentTypes]"
  game_concept_parliament_agenda: "Парламентська вимога"
  game_concept_parliament_agenda_short: "Вимога"
  game_concept_parliament_agendas: "Парламентські вимоги"
  game_concept_parliament_agendas_short: "Вимоги"
  game_concept_parliament_agenda_desc: "У кожного [Concept('estate', 'стану')|e] може бути своя парламентська вимога. Щоб заручитися підтримкою стану, цю вимогу потрібно задовольнити. Для [Concept('country', 'країни')|e] це може бути затратно, так як обсяг підтримки залежить від [Concept('estate_power', 'станової влади')|e].\n\nУ [Concept('international_organizations', 'міжнародних об’єднаннях')|e] парламентські вимоги висувають [Concept('members', 'учасники')|e] з [Concept('special_status', 'особливим статусом')|e]. Якщо прийняти їх вимоги, ці країни можуть надати підтримку у вигляді своєї [Concept('special_status_power', 'сили особливого статусу')|e]."
  game_concept_parliament_issue: "Парламентське питання"
  game_concept_parliament_issue_short: "Питання"
  game_concept_parliament_issues: "Парламентські питання"
  game_concept_parliament_issues_short: "Питання"
  game_concept_parliament_issue_desc: "Проблема, яка якийсь час є предметом суперечки. Її потрібно вирішити в [Concept('parliament', 'парламенті')|e] за участю [Concept('estates', 'станів')|e], інакше [Concept('country', 'країна')|e] стане слабшою.\n\nУ [Concept('international_organizations', 'міжнародних об’єднаннях')|e] вирішення питань необхідно обговорювати з [Concept('members', 'учасниками')|e], які мають [Concept('special_status', 'особливий статус')|e]."
  game_concept_parliament_support: "Парламентська підтримка"
  game_concept_parliament_support_short: "Підтримка"
  game_concept_parliament_support_desc: "Характеризує бажання [Concept('parliament', 'парламенту')|e] вирішити [Concept('parliament_issue', 'питання')|e]. Підтримка необхідна, коли країна збирається звернутися з певною [Concept('parliament_request', 'проханням до парламенту')|e]."
  game_concept_parliament_base_support: "Базова парламентська підтримка"
  game_concept_parliament_base_support_short: "Базова підтримка"
  game_concept_parliament_base_support_desc: "Впливає на початкову [Concept('parliament_support', 'парламентську підтримку')|e] при скликанні [Concept('parliament', 'парламенту')|e]. Підвищується в основному за допомогою [Concept('crown_power', 'влади правителя')|e], але також за допомогою [Concept('laws', 'законів')|e], [Concept('government_reforms', 'державних реформ')|e] та [Concept('advances', 'поступу')|e]."
  game_concept_parliament_requests: "Прохання до парламенту"
  game_concept_parliament_requests_desc: "Це дії, на які [Concept('country', 'країна')|e] може витратити [Concept('parliament_support', 'парламентську підтримку')|e] для вирішення питань."
  game_concept_parliament_request: "Прохання до парламенту"
  game_concept_parliament_request_desc: "Це дія, на яку [Concept('country', 'країна')|e] може витратити [Concept('parliament_support', 'парламентську підтримку')|e] для вирішення питань."
  game_concept_isolate: "Ізоляція"
  game_concept_isolation: "Ізоляція"
  game_concept_isolated: "В ізоляції"
  game_concept_isolate_desc: "[Concept('country', 'Країна')|e] в ізоляції не дає іншим [Concept('country', 'країнам')|e] [Concept('export', 'експортувати')|e] або [Concept('import', 'імпортувати')|e] [Concept('goods', 'товари')|e] на своїх [Concept('markets', 'ринках')|e], але у винятковому порядку може знімати ці обмеження з деяких країн."
  game_concept_total_ability: "Сума навичок"
  game_concept_total_ability_desc: "Сума навичок [Concept('character', 'персонажа')|e] — це сукупність значень його [Concept('adm_short', 'адміністративних')|e], [Concept('dip_short', 'дипломатичних')|e] та [Concept('mil_short', 'військових')|e] [Concept('ability', 'навичок')|e]."
  game_concept_legislative_efficiency: "Законодавча ефективність"
  game_concept_legislative_efficiency_desc: "Впливає на те, як швидко [Concept('country', 'країна')|e] може керувати [Concept('laws', 'зводом правил')|e], [Concept('government_reforms', 'державними реформами')|e] та [Concept('estate_privileges', 'становими привілеями')|e]."
  game_concept_victory_card: "Переможна картка"
  game_concept_victory_cards: "Переможні картки"
  game_concept_victory_card_desc: "[Concept('country', 'Країна')|e] отримує переможну картку, цілком завоювавши [Concept('area', 'область')|e] на карті. Якщо ця область цілком перебувала у когось [Concept('owned', 'у володінні')|e] та [Concept('controlled', 'під контролем')|e], а також складалася з [Concept('core', 'корінних місцевостей')|e], [Concept('score', 'рахунок')|e] країни збільшується."
  game_concept_score: "Рахунок"
  game_concept_score_desc: "Дозволяє відстежувати стан справ [Concept('country', 'країни')|e]. Кожна країна оцінюється за [Concept('adm_short', 'адміністративними')|e], [Concept('dip_short', 'дипломатичними')|e] та [Concept('mil_short', 'військовими')|e] результатами, які визначають її рахунок.\nВеликі держави також збільшують рахунок завдяки отриманню [Concept('victory_cards', 'переможних карток')|e] — по одній на кожну [Concept('age', 'добу')|e]."
  game_concept_tithe: "Десятина"
  game_concept_tithe_desc: "Це кількість [Concept('gold', 'золота')|e], яке стягується з усіх #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! [Concept('pops', 'груп населення')|e] у країнах, що сповідують католицтво. Зібрану десятину отримує папство. Країни з негативною [Concept('opinion', 'думкою')|e] про папський престол десятину не сплачують."
  game_concept_legal_male: "Чоловік за законом"
  game_concept_legal_male_plural: "Чоловіки за законом"
  game_concept_legally_male: "Чоловік за законом"
  game_concept_legal_male_desc: "Чоловік за законом — це жіночий [Concept('character', 'персонаж')|e], який за законом визнається чоловіком. У результаті жінка отримує ті ж права в межах [Concept('heir_selection', 'правил престолонаслідування')|e], що й її конкуренти чоловічої статі. [ShowCharacterInteractionName('prefection')] — це [Concept('character_interaction', 'взаємодія з персонажем')|e], яка дозволяє жінці отримати такий статус."
  game_concept_coalition: "Коаліція"
  game_concept_coalition_desc: "[Concept('countries', 'Країни')|e], чия [Concept('antagonism', 'ворожість')|e] до певної [Concept('country', 'країни')] перевищила терпиме значення, можуть сформувати проти неї коаліцію."
  game_concept_head_of_the_cabinet: "Голова ради"
  game_concept_head_of_the_cabinet_desc: "Голова ради — це [Concept('character', 'персонаж')|e], якого двір уповноважив представляти [Concept('cabinet', 'раду')|e].\n\nТакий [Concept('character', 'персонаж')] отримує низку переваг:\n[ShowModifierEffect('head_of_the_cabinet_modifier')]"
  game_concept_natural_harbor_suitability: "Придатність природної гавані"
  game_concept_natural_harbor_suitability_desc: "Характеризує, наскільки придатна [Concept('location', 'місцевість')|e] для швартування кораблів, посадки та висадки людей, завантаження та розвантаження товарів завдяки особливостям свого рельєфу, тобто до внесення будь-яких рукотворних перетворень. Здешевлює будівництво портових [Concept('buildings', 'споруд')|e] та збільшує [Concept('harbor_capacity', 'розмір гавані')|e]."
  game_concept_harbor_capacity: "Розмір гавані"
  game_concept_harbor_capacity_desc: "Розмір гавані знижує вартість переходу з моря на сушу і навпаки при розрахунку [Concept('proximity', 'досяжності')|e] та [Concept('trade', 'торгівлі')|e].\n\nРозмір гавані місцевості в основному залежить від [Concept('natural_harbor_suitability', 'придатності природної гавані')|e], але також може значно збільшитися завдяки портовим [Concept('buildings', 'спорудам')|e]."
  game_concept_payment: "Виплата"
  game_concept_payments: "Виплати"
  game_concept_payment_desc: "Заради членства в певних [Concept('international_organization', 'міжнародних об’єднаннях')|e] деякі їх [Concept('members', 'учасники')|e] зобов’язані здійснювати виплати на користь інших — це може бути не тільки [Concept('gold', 'золото')|e], а й [Concept('manpower', 'рекрути')|e], [Concept('sailors', 'моряки')|e] або щось інше. Різновиди та необхідність виплат регулюються [Concept('laws', 'законами')|e]."
  game_concept_fow: "Туман війни"
  game_concept_fog_of_war: "Туман війни"
  game_concept_fow_vision: "Видимість"
  game_concept_fow_desc: "Пелена, яка покриває [Concept('discovered', 'відкриті')|e] ділянки карти, називається [Concept('fow', 'туманом війни')].\n\n[Concept('units', 'Загони')|e] інших [Concept('countries', 'країн')|e], що ховаються в [Concept('fow', 'тумані війни')], вважаються [Concept('hidden', 'прихованими')|e].\n\n[Concept('controller', 'Контролюючій країні')|e] завжди видно належну їй [Concept('location', 'місцевість')|e]. Крім того, [Concept('country', 'країні')|e] завжди видно [Concept('cores', 'корінні місцевості')|e] в її [Concept('own', 'володінні')|e], навіть якщо їх [Concept('occupied', 'окупував')|e] [Concept('enemy', 'ворог')|e].\n\nЧиїсь [Concept('allies', 'союзники')|e], [Concept('subjects', 'ленники')|e] та [Concept('overlords', 'сюзерени')|e] завжди бачать територію один одного.\n\nДеякі [Concept('locations', 'місцевості')|e] будуть завжди покриті [Concept('fow', 'туманом війни')] — це залежить від [Concept('topography', 'рельєфу')|e]. Наприклад, [ShowVegetationName('forest')|l], [Concept('vegetation', 'флора')|e] та [ShowTopographyName('mountains')|l] забезпечують постійний туман війни.\n\n[Concept('seazones', 'Акваторії')|e], де є [ShowTopographyName('narrows')|l], тільки ускладнюють огляд з інших [Concept('seazones', 'акваторій')]."
  game_concept_hidden: "Прихований загін"
  game_concept_hidden_desc: "[Concept('unit', 'Загін')|e] у [Concept('fow', 'тумані війни')|e] вважається [Concept('hidden', 'прихованим')]: його не бачать інші [Concept('countries', 'країни')|e].\n\nНевідомим для інших [Concept('countries', 'країн')] буде не тільки склад [Concept('unit', 'загону')], а й взагалі його існування.\n\nПриховані [Concept('units', 'загони')] не отримують переваг у [Concept('combat', 'битві')|e], проте вдала засідка нерідко приносить перемогу."
  game_concept_location_importance: "Важливість місцевості"
  game_concept_location_importance_desc: "Визначається цілою низкою чинників, таких як придатність до створення в цій [Concept('location', 'місцевості')|e] гавані, чисельність її [Concept('population', 'населення')|e], кількість ведучих до неї [Concept('roads', 'доріг')|e], число її [Concept('buildings', 'споруд')|e], її [Concept('capital', 'столичний')|e] статус та [Concept('market_access', 'доступ до ринку')|e]. Також важливо, чи є там [ShowBuildingTypeName('castle')|l]."
  game_concept_monthly_income_trade_and_tax: "Щомісячний дохід від торгівлі та податків"
  game_concept_monthly_income_trade_and_tax_desc: "Це сукупний щомісячний [Concept('income', 'дохід')|e] від [Concept('trading', 'торгівлі')|e] та [Concept('taxes', 'податків')|e]."
  game_concept_monthly_manpower: "Число рекрутів на місяць"
  game_concept_monthly_manpower_desc: "Щомісячний приріст [Concept('manpower', 'числа рекрутів')|e] у [Concept('country', 'країні')|e]."
  game_concept_revolutionary: "Революція"
  game_concept_revolution: "Революціонер"
  game_concept_revolutionary_desc: "[Concept('revolution', 'Революція')] — це унікальне перетворення суспільства [Concept('country', 'країни')|e] в добу #TOOLTIP:AGE,age_6_revolutions,X #L Революцій#!#!. Країни, які пережили #TOOLTIP:DISASTER_TYPE,revolution_disaster,X #L революцію#!#! і не змогли захистити свій абсолютистський режим, можуть стати [Concept('revolutionary', 'революційними')], завдяки чому отримують доступ до більш ефективних [Concept('actions', 'дій')|e], [Concept('reforms', 'реформ')|e] та [Concept('laws', 'законів')|e] ціною перетворення на потенційну ціль для не[Concept('revolutionary', 'революційних')] країн."
  game_concept_revolutionary_target: "Ціль-революціонер"
  game_concept_revolutionary_target_desc: "Це головна рушійна сила революції та наймогутніша [Concept('revolutionary', 'революційна')|e] [Concept('country', 'країна')|e]."
  game_concept_celestial_authority_gc: "Небесний авторитет"
  game_concept_celestial_authority_gc_desc: "Відображає рівень легітимності голови #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. За допомогою небесного авторитету ухвалюються [Concept('laws', 'закони')|e] та [Concept('policies', 'політики')|e], що діють у межах цього [Concept('international_organization', 'міжнародного об’єднання')|e]."
  game_concept_share_of_power_gc: "Частка влади"
  game_concept_share_of_power_gc_desc: "Характеризує силу кожної з протиборчих сторін у [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,fall_of_delhi,X #L «Падіння Делі»#!#!. #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_DAT')|L]#!#! нарощувати цю частку допомагають:\n• Ситуативні дії\n• [Concept('events', 'Події')|e]\n• Особливі мирні договори\n• Дипломатична підтримка з боку інших [Concept('countries', 'країн')|e]\n\nПротивники можуть нарощувати частку влади за допомогою наступальних війн та перемог над #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_INST')|L]#!#!."