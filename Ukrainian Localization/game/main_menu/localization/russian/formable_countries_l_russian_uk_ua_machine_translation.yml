l_russian:
  SCA_f: "Скандинавія"
  SCA_f_desc: "Протягом довгих століть розрізнені північні королівства боролися між собою за владу. Якщо ми хочемо вистояти проти великих світових країн, нам потрібно прагнути до створення постійного союзу наших народів, хоч би якою складною здавалася ця задача."
  sweden_f: "Швеція"
  sweden_f_desc: "Широкі землі Швеції були єдині протягом століть, і цю єдність потрібно зміцнити. Значна частина шведських земель у наших руках, тому ми нарешті можемо повернути до життя спадщину минулих часів і знову об'єднати шведську країну."
  denmark_f: "Данія"
  denmark_f_desc: "Данія розташовується між Північним і Балтійським морями, займаючи особливе місце в #TOOLTIP:REGION,scandinavian_region,X #L Скандинавії#!#!. Встановивши контроль над достатньою частиною її територій, ми зможемо відродити цю країну і відновити спадщину наших предків."
  DRD_f: "$DRD$"
  DRD_f_desc: "#TOOLTIP:LANGUAGE,gaelic_language,X #L Гельські#!#! народи на берегах #TOOLTIP:AREA,hebrides_area,X #L Гебридів#!#! в далекому минулому об'єдналися і створили королівство, відоме своєю культурою мореплавців і сильним флотом. Ми повинні відродити спадщину предків і відновити королівство."
  GBR_f: "Велика Британія"
  GBR_f_desc: "Досягнувши єдності нашої внутрішньої політики та розширивши наш вплив за межі кордонів, ми зможемо зміцнити своє становище на світовій арені та стати однією з провідних європейських країн, Британською Імперією."
  GBR_f_trigger_eng: "Ми повинні або знищити @[GetCountry('ENG').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  GBR_f_trigger_sco: "Ми повинні або знищити @[GetCountry('SCO').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  GBR_f_trigger_wls: "Ми повинні або знищити @[GetCountry('WLS').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  GBR_f_trigger_sbl: "Ми повинні або знищити @[GetCountry('SBL').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('SBL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SBL').Custom('CL_tt')],X [GetCountry('SBL').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  SPA_f_not_christian: "Усі [Concept('location', 'місцевості')|e] в #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! повинні [Concept('owned', 'належати')|e] #TOOLTIP:RELIGIONGROUP,christian,X #L християнській#!#! [Concept('country', 'країні')|e] або одному з наших [Concept('subjects', 'ленників')|e]!"
  ADU_f_not_muslim: "Усі [Concept('location', 'місцевості')|e] в #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! повинні [Concept('owned', 'належати')|e] #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманській#!#! [Concept('country', 'країні')|e] або одному з наших [Concept('subjects', 'ленників')|e]!"
  ENG_f: "$ENG$"
  ENG_f_desc: "Торгівля давно стала в Англії основою державної політики. Посилюючи вплив за кордоном і контролюючи розвиток своєї політичної системи, ми перетворилися на одну з провідних європейських країн. Колоніальна експансія стає ключовим фактором нашого економічного зростання та зміцнює наші позиції на міжнародній арені."
  WLS_f: "$WLS$"
  WLS_f_desc: "Звільнившись від впливу далеких правителів, валлійці створять власну країну, щоб керувати своєю землею без стороннього втручання чи схвалення. Уельс, немов великий червоний дракон із давніх сказань, зуміє подолати всі негаразди і вийти з боротьби переможцем!"
  SCO_f: "$SCO$"
  SCO_f_desc: "Колись горда Шотландія занепала, але, незважаючи на це, серед кланів залишилися й ті, хто готовий відновити наше королівство. Ми повинні набратися мужності й розпочати боротьбу за свободу та незалежність Шотландії."
  NOL_f: "Нортумберленд"
  NOL_f_desc: "Занадто довго землі Нортумбрії перебували під владою південців або людей із-за моря. Час нам взяти на себе кермо правління країною і воскресити славу предків."
  IRE_f: "Ірландія"
  IRE_f_desc: "Десятиліттями Англія намагалася підкорити собі ірландців, щоб правити островом та його мешканцями, залишаючись далеко. Швидше за все, об'єднання ірландських земель під єдиним прапором і прагнення до єдиної мети — наш єдиний шанс дати відсіч нещадним загарбникам."
  SPA_f: "Іспанія"
  SPA_f_desc: "Відтоді, як Вестготське королівство впало внаслідок #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламського#!#! вторгнення у VIII столітті, на землях Іберії розташовується кілька незалежних королівств. Безліч правителів намагалося об'єднати регіон, проголосивши себе правителями Хіспанії або Спанії, нині відомої як Іспанія. Ми станемо тими, хто раз і назавжди об'єднає цей півострів!"
  ADU_f: "Аль-Андалус"
  ADU_f_desc: "Колись уся Іберія перебувала під владою славетних мусульманських правителів Аль-Андалуса — справжніх поціновувачів і розповсюджувачів неперевершеної пишноти та різних нововведень. Настав час покінчити з ганебною #TOOLTIP:RELIGIONGROUP,christian,X #L християнською#!#! Реконкістою та повернути собі те, що належить нам по праву, — землі наших предків."
  EGY_f: "Єгипет"
  EGY_f_desc: "Історія Єгипту сягає корінням у глибину віків, але надто довго цими краями керували чужинці, а не уродженці єгипетської землі. Подібно до того, як Ніл, що рясно розливається, живить свої береги, так і ми вдихнемо в Єгипет нове життя та відновимо легендарну імперію, позбувшись втручання ззовні."
  KOA_f: "Африка"
  KOA_f_desc: "Колись нормани створили в Африці християнське королівство, що стало мостом між двома берегами Середземного моря, але вік цієї країни виявився коротким: її розорили та захопили вороги Христа. Сьогодні ж доля надала нам можливість відбити ці землі та повернути їх до слави Божої, а значить, наш обов'язок — вчинити саме так."
  BEJ_f: "Беджа"
  BEJ_f_desc: "Наш народ споконвіку був розділений на кілька кланів і сімейств. Деякі з них набули достатньої ваги, щоб називати себе королівствами. Але насправді їхня сила досить крихка. Лише країна, що об'єднує всі клани під спільним прапором, принесе нашому народу процвітання та справжню владу."
  ETH_f: "Ефіопія"
  ETH_f_desc: "Стародавня Ефіопська імперія — це духовна спадкоємиця Аксумського царства, батьківщина сина легендарного царя Соломона, а також непорушний оплот коптської віри. Падіння країни стало трагедією для кожного правовірного копта, однак дух єдиної Ефіопії все ще живе і чекає, коли його відродить гідний наступник, такий як ми!"
  BAV_f: "Баварія"
  BAV_f_desc: "Колись величне герцогство Баварія славилося міцною економікою та вмілими дипломатами — цьому сприяли його вигідне розташування та гострий розум баварців. Сьогодні ж воно, попри таке яскраве спадкоємство, розрізнене та слабке. Ми повинні зібрати воєдино свої колишні землі та повернути собі колишню славу, щоб не залишитися лише виноскою на полях історії!"
  HAB_f: "Австрія"
  HAB_f_desc: "Дім Габсбургів, що правив із Відня, колись володів абсолютною владою в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священній Римській Імперії#!#!, а ядром їхньої могутності було ерцгерцогство Австрія. Імперія давно канула в Лету, і нам настав час відвоювати ерцгерцогство та центр влади в імперії!"
  BOH_f: "$BOH$"
  BOH_f_desc: "Відтоді як Отокар I у 1212 році отримав золоту сицилійську буллу, землі #TOOLTIP:AREA,bohemia_area,X #L Богемії#!#! мали особливий статус у Центральній #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Тепер, коли ми контролюємо ці землі, ми можемо відродити старий титул і назвати себе наступниками старих богемських династій."
  SAX_f: "Саксонія"
  SAX_f_desc: "У минулому Саксонія була впливовим племінним герцогством у складі старої імперії, і хоча з часом її національні території змістилися, цей титул зберіг престиж і славу. Якщо ми хочемо, щоб нас вважали повноправними наступниками саксонського титулу, потрібно переконати імператора #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#! зробити нас виборщиком, адже подібна роль личить герцогу Саксонії."
  NSA_f: "Нассау"
  NSA_f_desc: "Герцогство Нассау ніколи не могло похвалитися ні політичною стабільністю, ні видатною славою порівняно з сусідніми країнами, однак країна, що його заснувала — наша країна — має тісні зв'язки з багатьма монархами #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, а тому підстави наших домагань на владу вельми тверді. Щоб уся Німеччина почула наш голос, ми повинні назавжди об'єднати землі Нассау і довести оточуючим, що наша династія досить сильна і не допустить подальшого розколу земель, що належать їй по праву."
  MKL_f: "Мекленбург"
  MKL_f_desc: "З об'єднанням мекленбурзьких територій ми зможемо створити нове незалежне герцогство на півночі Німеччини. Ця нова країна зможе виправити помилки минулого, уникнути розколу наших земель на безліч незалежних країн і створити противагу суперникам, що націлилися на наші землі."
  POM_f: "Померанія"
  POM_f_desc: "Померанські землі займають важливе положення на Балтійському узбережжі. Щоб отримати вигоду з цього стратегічного розташування — через Балтійське море пролягає жвавий торговий шлях — нам доведеться покласти край суперечкам про престолонаслідування та відтворити єдине Померанське герцогство."
  PRU_f: "Пруссія"
  PRU_f_desc: "Землі, колись завойовані та германізовані Тевтонським орденом, потрібно постійно захищати від жадібних чужинців. Якщо Орден не впорається з покладеним на нього завданням, ми займемо його місце і започаткуємо нову еру процвітання та прусської дисципліни."
  LIV_f: "Лівонія"
  LIV_f_desc: "Землі Куронії, Лівонії та Естонії колись були частиною Лівонського ордену, що вважав своїм священним обов'язком навертати підкорені території в #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#!. І хоча орден зумів побудувати життєздатну країну, тримається вона виключно на праці завойованих ним народів, і перші зерна обурення вже впали в землю. Якщо орден не впорається з покладеним на нього завданням підтримувати громадський порядок, змістити його буде неважко — знадобиться лише трохи сили та дещиця лівонської хоробрості."
  LVA_f: "Балтика"
  LVA_f_desc: "З незапам'ятних часів обширні землі Балтики були роздроблені між численними племенами та германськими країнами, жодна з яких не змогла піднестися над іншими. Але нині прийшов час новій країні зміцніти в цих землях, щоб об'єднати розрізнені балтійські народи під єдиним стягом і зі спільною долею."
  GER_f: "Німеччина"
  GER_f_desc: "Попри відсутність сильної центральної влади, наша країна процвітає. Це процвітання забезпечив багатий Ганзейський союз, утворений сотнями міст Північної Німеччини. Інтелектуальний розвиток у поєднанні з морською та сухопутною торгівлею допоміг перетворенню нашої країни на центр промисловості та поступу."
  HRE_f: "Священна Римська Імперія"
  HRE_f_desc: "$hre_desc$"
  HRE_f_tt: "$HRE_f$ може сформуватися тільки завдяки [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,renovatio_policy,X #L Renovatio Imperii#!#!, якої дотримується #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!"
  LAT_f: "Латинська Імперія"
  LAT_f_desc: "Стара Римська Імперія вижила у вигляді Візантії зі столицею в #TOOLTIP:LOCATION,constantinople,X #L Константинополі#!#!, хоча її жителі сповідують #TOOLTIP:RELIGION,$orthodox_tt$,X #L православ'я#!#! замість праведної #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! віри #TOOLTIP:LOCATION,rome,X #L Риму#!#!. А тому нам потрібно замінити Східний Рим і встановити католицького імператора в Константинополі."
  SAR_f: "Сардинія"
  SAR_f_desc: "Наш острів, на жаль, давно розділений між юдикатами та іноземними правителями. Потрібно покласти край цим темним часам. Той, хто об'єднає Сардинію, правитиме нами всіма. Народу дістанеться мир і процвітання, а ворогам — заслужена поразка."
  MSI_f: "Моссі"
  MSI_f_desc: "Наш народ твердо шанує рідні вірування та традиції, а також пишається своєю політичною хваткою та військовою силою. Однак спільної культури виявилося недостатньо, щоб об'єднатися, і наслідки цього розділення вельми сумні. Тільки за допомогою єдності ми зможемо знайти мир і домогтися процвітання. Тож спрямуймося до цього!"
  MAZ_f: "Мазовія"
  MAZ_f_desc: "Мазовецька культура — одна з найбільших #TOOLTIP:CULTUREGROUP,polish_group,X #L польських#!#! культур, але при цьому вона вельми самобутня, зокрема в мовному відношенні. Ось чому з боку нашого народу вельми розумно закликати до об'єднання всіх мазовецьких земель під владою одного правителя: тільки в цьому випадку ми зможемо явити світу всю славу і силу своєї країни."
  KRY_f: "Гілян"
  KRY_f_desc: "Ця країна розташована на берегах #TOOLTIP:AREA,caspian_sea_area,X #L Каспійського моря#!#! і є серцем #TOOLTIP:CULTURE,$gilak_culture_tt$,X #L гілянської#!#! культури. Вона століттями існувала в тіні #TOOLTIP:REGION,persia_region,X #L Персії#!#!. Настав час заявити про себе світу."
  RYU_f: "Рюкю"
  RYU_f_desc: "Населені #TOOLTIP:CULTURE,$ryukyu_culture_tt$,X #L рюкюським#!#! народом, що створив власну культуру та ідентичність, острови #TOOLTIP:AREA,ryuukyuu_area,X #L Рюкю#!#! завжди були роз'єднаними. Однак, об'єднане царство трьох гір безперечно стане силою, з якою доведеться рахуватися."
  CHI_f: "Китай"
  CHI_f_desc: "$middle_kingdom_desc$"
  MOL_f: "Молдова"
  MOL_f_desc: "Занадто довго молдовани жили під владою дрібних тиранів, слухняних могутнішим правителям. Час порушити цей протиприродний порядок і скинути ярмо наших гнобителів! Настав час об'єднати народ під знаменом бика та забезпечити нашій країні світле й незалежне майбутнє."
  SIL_f: "Сілезія"
  SIL_f_desc: "Століттями Сілезія була розділена на герцогства і підпорядковувалася владі чужих столиць. Вона подібна до розірваного намиста: щоб повернути колишній блиск і красу, всі розрізнені дорогоцінні камені потрібно буде зібрати воєдино. Настав час скинути кайдани іноземного панування, покінчити з внутрішніми чварами та створити єдину сілезьку країну."
  POL_f: "Польща"
  POL_f_desc: "Королівство, над возз'єднанням якого так старанно свого часу трудилися П'ясти, позбулося короля і розпалося. Однак ми не можемо допустити, щоб польські землі існували порізно: надто славна наша історія, надто світле наше майбутнє. Ми повинні об'єднати польський народ і створити країну, яка засяє ще яскравіше за королівства минулих часів!"
  PLC_f: "Річ Посполита"
  PLC_f_desc: "Об'єднавши корони Литви та Польщі під єдиним знаменом, ми станемо світочем надії та віри у Східній Європі. Наше світло осяє навіть найтемніші хащі та проникне в кожен куточок країни."
  PLC_f_trigger_pol: "Ми повинні або знищити @[GetCountry('POL').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  PLC_f_trigger_lit: "Ми повинні або знищити @[GetCountry('LIT').GetFlag]!#ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_ACC')|L]#!#!, або зробити її своїм [Concept('subject', 'ленником')|e]!"
  UKR_f: "Русь"
  UKR_f_desc: "Багато століть тому землі Русі були об'єднані під єдиним знаменом і управлялися зі славного граду #TOOLTIP:LOCATION,kyiv,X #L Києва#!#!. Але потім з великого степу прийшли монгольські орди, що грабували і спалювали все на своєму шляху. Навіть великий Київ не зміг уникнути цієї гіркої долі. В жаху наш народ пішов на північ, у далекі краї тієї землі, що сьогодні ми називаємо Росією.\nТепер же на півночі набирає силу нове місто під владою надмірно самовпевненого правителя. Він малює у своїй уяві нову Русь, зосереджену навколо #TOOLTIP:LOCATION,moscow,X #L Москви#!#!, а не Києва. Однак ми, русини, не дозволимо вискочкам зазіхати на спадщину наших предків! Київ, а разом з ним і Русь, знову відродяться."
  ROM_f: "Римська Імперія"
  ROM_f_desc: "Жодна імперія з другого століття нашої ери не могла поширити свою владу на все Середземномор'я і за його межі, крім римлян. Якщо ми захопимо цю землю і одночасно проголосимо себе істинними спадкоємцями Риму, то зможемо вдосталь поглумитися над усіма претендентами в Константинополі або Священній Римській Імперії. #italic Cives Romani sumus#! — «Ми римські громадяни!»."
  CTH_f: "Карфаген"
  CTH_f_desc: "Брудні пси з Римської імперії спалили оселю карфагенян дотла і спробували стерти саму пам'ять про цю стародавню цивілізацію. Їхня самобутність, культура та релігія можуть зникнути, але, поки живий хоча б один римський претендент на владу, нам потрібно протистояти цим пройдисвітам. Ми станемо бичем для всіх дурнів, які звеличують римлян. Ми станемо спадкоємцями Карфагена!"
  NSE_f: "Імперія Північного Моря"
  NSE_f_desc: "Колись землі, якими [Select_CString(GetCharacter('eng_cnut_the_great').IsFemale, 'правила', 'правив' )] [GetCharacter('eng_cnut_the_great').GetName], простягалися по обидва боки #TOOLTIP:AREA,north_sea_area,X #L Північного моря#!#! від #TOOLTIP:REGION,scandinavian_region,X #L Скандинавії#!#! до #TOOLTIP:REGION,great_britain_region,X #L Британії#!#!. І хоча з часом ця територія розкололася на безліч окремих володінь, ще не все втрачено: вона терпляче чекає, поки ми наберемо достатньо сил, щоб відродити велику імперію та об'єднати всі її землі під нашим знаменом."
  MAY_f: "Майя"
  MAY_f_desc: "Століттями наш народ був розділений на незалежні міста, що люто змагалися одне з одним. Така обстановка сприяє розвитку, але нам бракує головного: єдності перед обличчям тиску ззовні. Якщо об'єднати всі поселення майя в єдину країну, наш народ прийде до процвітання і зможе досягти по праву призначених йому висот."
  AIA_f: "Аравія"
  AIA_f_desc: "Піски #TOOLTIP:REGION,arabia_region,X #L Аравії#!#! — дім та історична батьківщина #TOOLTIP:CULTUREGROUP,arabian_group,X #L аравійських#!#! народів. І хоча протягом усього свого існування вони були розділені на окремі племена, спільність їхньої самосвідомості та традицій неможливо заперечити: ці цінності наші співвітчизники завжди носять із собою, куди б їх не заніс пустельний вітер. У минулому Аравія була єдиною і зуміла завоювати майже весь світ. Сьогодні вона повинна повторити це досягнення."
  ULS_f: "Ольстер"
  ULS_f_desc: "$ULS_f$ — це серце #TOOLTIP:LANGUAGE,gaelic_language,X #L гельського#!#! світу та одна з традиційних #italic куге#!, тобто п'яти провінцій #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!. Його положення у світі вельми незвичайне, однак нашому народу цього мало: він прагне більшого і вимагає, щоб Ольстер став помітним гравцем на світовій арені."
  CEL_f: "Кельтика"
  CEL_f_desc: "Давня історія #TOOLTIP:CULTUREGROUP,celtic_group,X #L кельтського#!#! народу налічує тисячі років. І хоча протягом сотень років кельти страждали від вторгнень іноземців, а їхні землі стали жалюгідною тінню володінь предків, людям все-таки вдалося зберегти головне — традиційні вірування, культуру та уклад. Якщо на чолі кельтів стане сильний вождь, здатний вказати їм новий шлях, народ з радістю об'єднається під його владою і займе своє законне місце у світі серед могутніх країн."
  MLC_f: "Малакка"
  MLC_f_desc: "Протоки #TOOLTIP:LOCATION,malacca,X #L Малакки#!#! знаходяться на одному з найважливіших торгових шляхів і завжди дозволяли контролювати потік товарів, багатіючи за рахунок торгівлі. #TOOLTIP:CULTURE,$malay_culture_tt$,X #L Малайський#!#! народ завжди процвітав у цих землях, а спільна ідентичність лише посприяє цьому."
  NED_f: "Нідерланди"
  NED_f_desc: "Нідерланди поступово стають однією з провідних морських і колоніальних країн Європи. Виняткові торгові переваги на місцевому та заморському ринках призвели до швидкого перетворення цієї країни на одну з перших капіталістичних країн світу. Голландський народ може похвалитися не тільки чудовою діловою хваткою, а й схильністю до винаходів та творчості, завдяки чому світ нашої культури сьогодні осяює весь світ. Об'єднана нідерландська країна здатна стати однією з найбагатших і найвпливовіших країн в історії."
  EUR_f: "$EUR$"
  EUR_f_desc: "Землі #TOOLTIP:CONTINENT,europe,X #L Європи#!#! — батьківщина величезної кількості найрізноманітніших народів. Тут сусідять між собою десятки культур, релігій, мов і укладів, а тому зіткнення та розбрат між сусідами такі ж часті, як і взаємодія, і культурне злиття. Спонукати настільки різних людей до руху до єдиної мети — завдання, здавалося б, майже нездійсненне, однак якщо все населення Європи об'єднається під одним прапором і знайде спільну самосвідомість, жодна інша світова країна не наважиться кинути нам виклик."
  RUS_f: "Росія"
  RUS_f_desc: "За допомогою завоювань і дипломатії Росії вдалося перетворитися зі скромного князівства на могутню країну. Після низки східних походів вона змогла диктувати волю монгольським ордам. Так виникла централізована руська країна, очолювана царем. Вплив Західної Європи допомагає нам осучаснити та реформувати країну, а також переймати сучасний підхід до освіти. Країна стрімко розвивається, а її народ виявляє неабияку хватку в питаннях сучасної політики та культури. Російській імперії, що зароджується, самою долею призначено досягти неймовірних висот і панувати над менш впливовими країнами."
  ITA_f: "Італія"
  ITA_f_desc: "Саме в нашій країні почалася епоха Відродження — затяжна революція в галузі культури та мистецтва, особливо в архітектурі та літературі. І хоча ми рясно пожинаємо плоди цього процесу, одне питання все-таки не дає нам спокою: культурний розквіт анітрохи не допомагає нам підтримувати мир на своїх землях і захищати країну від постійних нападів з боку сусідніх країн, що прагнуть влади та територіальних надбань. Настав час об'єднатися в єдиний фронт і рішуче продемонструвати їм, що ми сильні — хоча б для того, щоб залякати загарбників."
  TWS_f: "Королівство Обох Сицилій"
  TWS_f_desc: "Королівство Обох Сицилій — це не країна, а мрія. Мрія об'єднати землі, омивані Мессінською протокою, Сицилії по обидва боки Пунта-дель-Фаро. Обов'язок велить нам здійснити цю мрію."
  FRA_f: "$FRA$"
  FRA_f_desc: "Цей рік ознаменує початок епохи нашого розвитку. Старі феодальні порядки повинні відійти в минуле, поступаючись місцем сучасній централізованій країні."
  LOT_f: "$LOT$"
  LOT_f_desc: "Ставши новими претендентами на корону Лотарингії, ми заснували свою легітимність на спадщині, яку залишили [GetCharacter('fra_charlemagne').GetName] та [GetCharacter('fra_lothair').GetName]. Під нашим покровительством звершення предків знову стануть широко відомі не тільки серед наших підданих, а й при дворах Європи."
  BGP_f: "$BGP$"
  BGP_f_desc: "У минулому бургундці, що переселилися з Борнхольма, осіли на цих землях, які отримали назву на їхню честь. Ми їхні нащадки, і наша честь велить нам відтворити ту країну і правити цими землями до кінця часів."
  GRE_f: "Греція"
  GRE_f_desc: "Вже багато століть, ще з перших днів після зародження нашої цивілізації, Еллада не знає єдності: вона або розділена на ворогуючі між собою царства, або захоплена іноземцями — нашими спільними ворогами. Протягом віків ми тільки слабшаємо. Вороги приходять на наші землі, дроблять їх на частини та забирають наші безцінні скарби. Ми — люди мистецтва, спорту та науки, і роздробленість не просто нам не до лиця — вона глибоко образлива! Об'єднання грецьких земель під єдиним прапором і на чолі з єдиним правителем — єдиний шлях до відродження колишньої слави."
  BYZ_f: "Візантійська Імперія"
  BYZ_f_desc: "Час славної Візантійської імперії давно минув, але, поки в #TOOLTIP:LOCATION,constantinople,X #L Константинополі#!#! живуть греки, є надія на її відродження. Східний Рим ще повстане з руїн, немов птах фенікс, що відроджується з попелу. Але перед цим доведеться покласти край внутрішньому невдоволенню та спрямувати народ до спільної мети. Ми скільки завгодно можемо називати себе Візантією, але по-справжньому гідними цього імені ми станемо лише тоді, коли доведемо це на ділі…"
  CNN_f: "Коннахт"
  CNN_f_desc: "$CNN_f$ — одне з давніх традиційних королівств #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#! з довгою та багатою історією, причому досить впливове, щоб оголосити себе верховним королівством усього острова. $CNN_f$ може вважати себе продовжувачем традицій та зразком лідерства, але лише від успіху нашого об'єднання залежить, чи зможемо ми дати гідну відсіч будь-кому, хто посміє на нас зазіхнути."
  HEN_f: "Давня Північ"
  HEN_f_desc: "#TOOLTIP:LANGUAGE,brythonic_language,X #L Бриттські#!#! народи колись проживали по всій #TOOLTIP:REGION,great_britain_region,X #L Британії#!#!. Хоча римляни та англо-сакси вигнали їх з південних земель, до прибуття #TOOLTIP:LANGUAGE,gaelic_language,X #L гельських#!#! народів вони зберігали значну владу над північними частинами острова. Згодом, втім, ми поступово почали забувати рідну мову та культуру… але більше ми не маємо наміру з цим миритися! Настав час відродити давнє північне королівство та об'єднати бриттський народ, щоб той жив за одним законом і говорив однією мовою."
  USA_f: "Сполучені Штати Америки"
  USA_f_desc: "Народ колоній втомився від знущань правителів-іноземців, для яких ми не кращі за рабів, від гнітючої та обтяжливої податкової політики, від відсутності представників у власному уряді та від жорстокості сусідів-лоялістів. Занадто довго ці колонії страждали від жадібності та утисків з боку європейських країн. Досить! Зародження духу свободи в колоніях дало нам можливість створити горду федерацію незалежних штатів, вільних від тиранії. Дайте нам свободу, або дайте нам смерть!"
  CAN_f: "Канада"
  CAN_f_desc: "Простори #TOOLTIP:REGION,canada_region,X #L Канади#!#! обширні та небезпечні, але водночас неймовірно рясні. І хоча сама природа тут нерідко буває смертоносна, земля готова поділитися своїми надрами зі сміливцями. Якщо ми проголосимо єдину канадську країну та встановимо владу над нею, багатства наші будуть безмежними!"
  MEX_f: "Мексика"
  MEX_f_desc: "Землі #TOOLTIP:REGION,mesoamerica_region,X #L Мезоамерики#!#! багаті та рясні. З давніх часів їх населяє безліч народів і культур. Однак ми роз'єднані, роздроблені на численні племена, ослаблені суперництвом за владу та багатство. Настав час вселити кожному з нас нову єдину самосвідомість, щоб приналежність до сильного, могутнього та великого народу з багатою історією відчули всі без винятку. Ми повинні стати перед рештою світу єдиною та непорушною стіною."
  DEC_f: "Декан"
  DEC_f_desc: "Колись ця земля була чужою для наших предків, але ми зробили її своєю. Тут ми побудували нове суспільство, в якому перське панування сплелося з давніми індійськими традиціями. Тепер у нас своя мова, свої традиції управління країною, свої міфи та легенди. Прийшов час показати всьому світу, що південь подолав свої відмінності та єдиний як ніколи."
  MHR_f: "Маратха"
  MHR_f_desc: "#TOOLTIP:CULTURE,$marathi_culture_tt$,X #L Маратхські#!#! народи виявилися роз'єднаними багато століть тому, але гордість за рідну самобутню мову, а особливо — написані нею твори, і сьогодні відчуває кожен без винятку. #TOOLTIP:CULTURE,$marathi_culture_tt$,X #L Маратхські#!#! воїни з усього Декану зберуться під нашими прапорами, якщо ми продемонструємо готовність і бажання повести їх за собою та заволодіємо всіма великими фортецями Деша. Прийшов час об'єднати клани та встановити владу над Індією раз і назавжди!"
  HIN_f: "$HIN$"
  HIN_f_desc: "Народи Індії, незважаючи на різноманітність культур, традицій та вірувань, живуть на одній землі та розділяють спільну історію. Нам слід скоріше забути про відмінності, які розділяють нас, і спрямуватися до спільної для всіх мети: заснувати сильну та єдину індостанську країну, здатну протистояти будь-якій загрозі."
  PUN_f: "$PUN$"
  PUN_f_desc: "#TOOLTIP:CULTURE,$punjabi_tt$,X #L Пенджабському#!#! народу не звикати до нальотів іноземних загарбників: за минулі століття він витримав не одну низку завоювань. Однак немає лиха без добра: завдяки цим вторгненням у країні вражаючими темпами розвиваються економіка та релігія, а також процвітає мистецтво літератури. З іншого боку, давно назріла необхідність об'єднатися, оскільки лише разом #TOOLTIP:CULTURE,$punjabi_tt$,X #L пенджабський#!#! народ зможе успішно протистояти підступам жадібних сусідів. Разом ми побудуємо сучасну країну з могутнім військом, здатним захистити рідну землю та вберегти нашу віру!"
  RJP_f: "$RJP$"
  RJP_f_desc: "З часів мусульманського вторгнення багато століть тому землі #TOOLTIP:AREA,rajputana_area,X #L Раджпутани#!#! були роздроблені та ослаблені. Але за минулі віки наш стомлений від гніту народ почав поступово піднімати голову та спрямовувати погляд до зірок, оскільки наше місце — там, на висоті. Ми повинні відвоювати великі міста колишніх могутніх династій та об'єднати князів цього регіону!"
  GUJ_f: "$GUJ$"
  GUJ_f_desc: "#TOOLTIP:AREA,gujarat_area,X #L Гуджарат#!#! завжди відрізнявся від решти Індії, #TOOLTIP:LANGUAGE,gujarati_language,X #L гуджаратський#!#! народ пишається своєю давньою історією та унікальною самосвідомістю. Все, чого нам не вистачає, — це власної країни, в якій ці особливості стануть опорою для нашої влади. На щастя, можливість заявити про свою незалежність представиться вже дуже скоро…"
  SHA_f: "Шан"
  SHA_f_desc: "#TOOLTIP:LANGUAGE_FAMILY,tai_language_family,X #L Тайські#!#! народи — мешканці #TOOLTIP:AREA,shan_highland_area,X #L Шанського нагір'я#!#! осіли на цій землі багато століть тому. Ми перетворили пагорби на тераси та побудували в ім'я наших божеств храми, здатні простояти вічність. Але також ми приречені існувати в оточенні великих і сильних країн, не завжди здатних співіснувати одна з одною мирно. Досить! Колись ми жили порізно, але зараз шани готові виступити проти всього світу."
  MSA_f: "Малайя"
  MSA_f_desc: "$MLC_f_desc$"
  SIA_f: "Сіам"
  SIA_f_desc: "#TOOLTIP:CULTURE,$thai_culture_tt$,X #L Тайський#!#! народ живе розрізнено: гори та річкові долини розділяють нас, а тому кожна громада через відсутність центральної влади тяжіє до місцевих її зосереджень — різних сфер впливу. Встановлення єдиної тайської країни піде нам виключно на користь: за наявності сильної влади буде набагато простіше привести народ до величі."
  BAN_f: "Бантам"
  BAN_f_desc: "#TOOLTIP:CULTURE,$sundanese_culture_tt$,X #L Сунди#!#! з #TOOLTIP:LOCATION,banten,X #L Бантена#!#! процвітали з давніх часів завдяки торгівлі та морським шляхам. В силу вдалого розташування цей порт є ідеальним центром для поширення впливу сундів."
  IRA_f: "Персія"
  IRA_f_desc: "Ще в глибокій давнині за Кіра Великого #TOOLTIP:REGION,persia_region,X #L Персія#!#! здобула славу обителі могутніх імперій. Багатьма досягненнями науки та мистецтва сучасний світ зобов'язаний античним #TOOLTIP:CULTUREGROUP,iranian_group,X #L іранським#!#! царствам.\n\nЗ часом, однак, ця велич обернулася на пил, і сьогодні багатьом з нас залишається лише мріяти про єдину іранську країну. Але світлий час вже близько: можливість втілити мрію в життя більше не здається нездійсненною. Настав час повернути собі колишню славу, а разом з нею — і титул шаха."
  SKO_f: "Сокото"
  SKO_f_desc: "Становище #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#! в Західній #TOOLTIP:CONTINENT,africa,X #L Африці#!#! завжди було ненадійним. Спираючись на допомогу духовенства нашої країни, ми повинні створити ортодоксальну ісламську країну, яка забезпечить виживання #TOOLTIP:RELIGION,$sunni_tt$,X #L сунізму#!#! в цьому регіоні."
  HAU_f: "Хауса"
  HAU_f_desc: "Через довгі десятиліття міжусобиць і війн, що роздирали ці землі, зі старим суперництвом нарешті покінчено. На зміну йому прийшов мир. Вперше на пам'яті нашого народу сини Баво знову об'єдналися під спільним прапором. Час Хауси настав!"
  KON_f: "Конго"
  KON_f_desc: "#TOOLTIP:LANGUAGE,kongo_language,X #L Конголезький#!#! народ — це гілка #TOOLTIP:LANGUAGE_FAMILY,bantu_language_family,X #L бантуської#!#! родини. Незважаючи на вражаюче внутрішнє різноманіття, ми багато в чому схожі, наприклад у щоденних духовних обрядах та культурних звичаях. Якщо ми зуміємо усвідомити себе єдиною спільнотою, спираючись на ці схожості, то об'єднані конголезькими мовами народи зможуть досягти неймовірних раніше висот."
  NTR_f: "Союз Племен"
  NTR_f_desc: "#TOOLTIP:REGION,new_zealand_region,X #L Новозеландські#!#! #TOOLTIP:CULTURE,$maori_culture_tt$,X #L маорі#!#! завжди були розділені на численні племена. Тільки об'єднавшись вони зможуть досягти істинного процвітання."
  TIM_f: "Імперія Тимуридів"
  TIM_f_desc: "Наш народ виріс на землі, рясно удобреній кров’ю, яку проливали наші войовничі предки. Тяготи та негаразди загартували нас — воїнів, зодчих, творців і вчених. Прийшов час поділитися нашими дарами зі світом, щоб той визнав нас як велику країну. З твоїм іменем на вустах ми здобудемо собі славу, [GetCharacter('chg_timur_lame_borjigin').GetName]!"
  INC_f: "Тауантінсую"
  INC_f_desc: "Альтіплано розділене між багатьма народами, які населяють долини та шанують різних богів. Ми багатомовні та світогляди наші різноманітні, але разом ми — могутня культурна та духовна сила, з нею будуть змушені рахуватися інші народи. Настав час об’єднати розрізнені землі під владою одного сильного вождя. Сонце ще засяє над єдиною країною!"
  BNG_f: "$BNG$"
  BNG_f_desc: "Мешканці #TOOLTIP:AREA,bengal_area,X #L Бенгалії#!#! мають власну ідентичність, народжену в нижній течії могутнього Гангу. #TOOLTIP:CULTURE,$bengali_tt$,X #L Бенгальський#!#! народ пишається своєю історією та спільними традиціями, і об’єднавшись, зможе стати прикладом для решти Індії."
  DLH_f: "$DLH$"
  DLH_f_desc: "Колись Делі був столицею всього Індостану, і наша сучасна країна багато в чому продовжує його традиції.\nНастав час відродження. Час повернути собі спадщину Делійських султанів і правити Індостаном з їхньої стародавньої столиці в Доабі."
  MCH_f: "$MCH$"
  MCH_f_desc: "Народи #TOOLTIP:REGION,manchuria_region,X #L Маньчжурії#!#! ще з давнини ведуть кочовий спосіб життя, але при цьому також часто підтримують зв’язки зі #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединною Країною#!#!. Завдяки цьому наша культура увібрала в себе найрізноманітніші віяння, з яких і зародився сучасний уклад. І хоча зазвичай ми розділені на численні племена, об’єднана Маньчжурія зможе домогтися панування над усім Китаєм. Потрібно відповісти собі на одне питання: чи варто прагнути до єдності?"
  SER_f: "$SER$"
  SER_f_desc: "Земля сербів розділена, і нею, анітрохи не соромлячись, правлять чужоземні країни. Цей порядок — справжня образа для нашої національної гордості. Народ прагне бачити на престолі уродженця рідної країни. Шлях до об’єднання буде тернистим, але ми не зупинимося, доки всі сербські міста та села від Дунаю до південних гір не будуть знову належати нам."
  AIR_f: "$AIR$"
  AIR_f_desc: "Гори #TOOLTIP:AREA,air_area,X #L Аїру#!#! — острів зелені посеред піщаного океану — століттями служили притулком #TOOLTIP:CULTURE,$tuareg_tt$,X #L туарегів#!#!. Об’єднані під спільним прапором, ці гори стануть опорою для подальшої експансії."
  NAV_f: "$NAV$"
  NAV_f_desc: "Полководець Іньїго Аріста створив своє королівство з марки Каролінзької імперії, але воно давно зникло зі сторінок історії. Час возз’єднати ці землі та об’єднати #TOOLTIP:CULTURE,$basque_tt$,X #L баскський#!#! народ під спільним прапором."
  KOJ_f: "$KOJ$"
  KOJ_f_desc: "Єрусалим — земля обітована, священне місто, в якому зародилося безліч сповідуваних сьогодні вірувань. На цій святій землі має встановитися Царство Небесне. Нехай кожен віруючий буде вражений нашою величчю!"
  YMT_f: "$YMT$"
  YMT_f_desc: "Стародавній рід #TOOLTIP:DYNASTY,$yamato_dynasty_tt$,X #L Ямато#!#! заявляє, що веде свій початок від самих богів. Його представники по праву народження можуть претендувати на статус божественних володарів #TOOLTIP:REGION,japan_region,X #L Японії#!#!."
  MUG_f: "$MUG$"
  MUG_f_desc: "Фундамент нової імперії був закладений руками нашого володаря. Наші нечисленні, але добре організовані війська здобули низку вирішальних перемог над індійськими султанами. Втім, битви за Індію — лише початок: попереду нас чекає ще чимало блискучих торжеств і територіальних надбань. З часом імперія Великих Моголів поглине спочатку цей регіон, а потім і весь світ."
  NPL_f: "$NPL$"
  NPL_f_desc: "Гімалайські царства слабкі та роз’єднані, незважаючи на свою славну та давню історію. Якщо ми зуміємо об’єднати весь регіон під владою одного правителя, наша країна стане непереборною силою для зніжених і сластолюбних правителів Індостану. Насолоджуючись достатком, вони протягом багатьох поколінь тринькали свої багатства, і тепер їм не зрівнятися з нашими загартованими в боях військами."
  TIB_f: "$TIB$"
  TIB_f_desc: "Колись Тибетське нагір’я було об’єднане під владою великої імперії, настільки розвиненої та багатої, що вона могла суперничати з іншими великими державами свого часу. З віками ця країна занепала, спричинений релігійними та політичними чварами, і розпалася. Але якщо ми зуміємо знову об’єднати розрізнений #TOOLTIP:CULTUREGROUP,tibetan_group,X #L тибетський#!#! народ, то разом з ним відродиться і спадщина минулих часів — втрачене королівство."
  SHL_f: "$SHL$"
  SHL_f_desc: "Довгі роки під владою шляхетних сімейств добігли кінця: ми стали верховними правителями #TOOLTIP:AREA,holstein_area,X #L Гольштейну#!#! і по праву можемо об’єднати свої земельні володіння в одну країну. Цим правом ми й скористаємося."
  RUM_f: "$RUM$"
  RUM_f_desc: "У зеніті своєї величі Румський султанат був наймогутнішою країною #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. На жаль, безперестанні нальоти жорстоких загарбників і люті суперечки про престолонаслідування розкололи країну, і вона канула в Лету. Але це не назавжди: ми досить уперті та сильні, щоб возз’єднати розрізнені осколки Анатолії під єдиною владою та відновити загиблий султанат!"
  MGE_f: "$MGE_ADJ$а імперія"
  MGE_f_desc: "$genghis_khan_name$ заснував найсильнішу в світі імперію, але його дітище з часом прийшло в жахливий занепад. Наш народ розрізнений, розкиданий по світу, втратив сполучні узи… але ми монголи, і в наших серцях ще жива надія повернути собі втрачене. Ми повторимо подвиги великого хана і тим самим відродимо спадщину минулих часів. Монгольська імперія повстане знову!"
  MGO_f: "$MGO$"
  MGO_f_desc: "Монгольський народ роз’єднаний. Великий $genghis_khan_name$, що колись зібрав монголів воєдино, мертвий, і спадщина його розвіяна за вітром. Але ми здатні повторити його подвиг, знову об’єднати племена і розпочати чергову епоху завоювань."
  ILK_f: "$ILK$"
  ILK_f_desc: "Колись наша імперія простягалася по всьому світу, і її безкраї землі вражали своєю величчю. Сьогодні ж від неї залишилися тільки спогади — не більше ніж нотатки на полях рукописів. [GetCharacter('hulegu_khan_borjigin').GetName] дивиться на нас, своїх спадкоємців, з обуренням — це справжня ганьба! Ми заслуговуємо більшого, а тому вшануємо спадщину предків тим, що відродимо колись славну імперію, об’єднаємо народ і заберемо собі те, що належить нам по праву. А потім — і все інше…"
  GEO_f: "$GEO$"
  GEO_f_desc: "Життя в крутих горах і ущелинах #TOOLTIP:AREA,georgia_area,X #L Грузії#!#! разом з постійними нальотами чужоземних загарбників виховало в нашому народі небувалу стійкість. Ми міцні, немов кряжі та нагір’я, що захищають нас. Наполегливість і завзятість — ось що допоможе Грузії здобути велич і процвітання під нашою владою."
  ARM_f: "$ARM$"
  ARM_f_desc: "#TOOLTIP:CULTURE,$armenian_culture_tt$,X #L Вірменська#!#! цивілізація дуже давня — її історія починається ще до заснування Риму. І сходження, і падіння країн-завойовників ми пережили гідно, не втративши ні рідної мови, ні віри. Сьогодні настав час об’єднати розрізнених спадкоємців Айка під спільним прапором. Ми — єдиний вірменський народ!"
  SWI_f: "$SWI$"
  SWI_f_desc: "Спочатку #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська конфедерація#!#! була лише союзом окремих кантонів. Кожна її частина розвивалася окремо від інших, і сьогодні люди не тільки живуть за різними законами, а й розмовляють різними мовами. Щоб по-справжньому об’єднати #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарців#!#!, на Швейцарському плато має виникнути суверенна країна. Вирішити поставлене перед нами завдання непросто, але в разі успіху ми зможемо досягти дуже багато чого."
  SWI_f_tt: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] існує\n[Concept('international_organization', 'Міжнародне об’єднання')|e] може провести #TOOLTIP:LAW,sc_unification,X #L $SWI_ADJ$е об’єднання#!#!, щоб створити країну"
  AYU_f: "$AYU$"
  AYU_f_desc: "Місто $ayutthaya$ — велике та густонаселене торгове поселення, яке пов’язане міцними узами комерції з іншими країнами. Воно стане джерелом, з якого #TOOLTIP:CULTURE,$thai_culture_tt$,X #L тайський#!#! народ черпатиме силу, щоб прокласти собі шлях до слави. Разом ми з гордістю дамо відсіч будь-кому, хто посміє зазіхнути на наші кордони."
  ALB_f: "$ALB$"
  ALB_f_desc: "Албанська земля, населена розрізненими кланами, у яких часто різняться навіть вірування, нарешті об'єдналася під спільним прапором і попрямувала до єдиної мети. Ми вигнали чужоземців, що засиділися тут, і проголосили нову Албанію — батьківщину героїчного албанського народу."
  BAH_f: "$BAH$"
  BAH_f_desc: "Понад століття тривало беззаперечне панування нашої #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! країни на півдні, особливо над обширними територіями #TOOLTIP:REGION,deccan_region,X #L Декану#!#!. Однак з часом величні стародавні міста занепали, а країна, не витримавши міжусобиць та честолюбних устремлінь провінційних намісників, розкололася на п'ять султанатів-наступників. Час покінчити з цією розрухою! $BAH_ADJ$ий народ знову віднайде забуту славу, а Декан возз'єднається під впевненою владою одного правителя."
  GLD_f: "$GLD$"
  GLD_f_desc: "Ми заволоділи обширними землями в Польщі. Замість того, щоб безпосередньо керувати цим регіоном, який славиться своєю неоднорідністю, ми створимо коронне володіння — Галичину та Лодомерію. Такий підхід дозволить нам керувати землею за допомогою традиційних титулів, зберігаючи при цьому імперську владу."
  DAH_f: "$DAH$"
  DAH_f_desc: "Ми об'єднали свої землі і тепер зможемо створити країну, яка захистить нас від чужоземного впливу."
  IRO_f: "$IRO$"
  IRO_f_desc: "#TOOLTIP:CULTUREGROUP,haudenosaunee_group,X #L Гауденосаунійські#!#! племена вже довго сусідять одне з одним у складі номінальної конфедерації, де кожен народ зберігає свою незалежність. Однак часи змінюються, і ми вирішили, що зв'язуючі нас сьогодні узи необхідно зміцнити. Сьогодні всі п'ять народів згуртувалися навколо одного, найголовнішого племені, і разом готові написати нову сторінку історії — вона почнеться з посилення конфедерації."
  PUE_f: "$PUE$"
  PUE_f_desc: "Нащадки стародавніх пуебло — племена #TOOLTIP:AREA,shiewhibak_area,X #L Алі-Шона#!#! — хоч і частково зберегли уклад своїх предків, але все ж відрізняються одне від одного культурами. Ми готові взятися за об'єднання цих розрізнених народів, однак з відмінностями серед окремих племен неминуче доведеться рахуватися. Втім, подібні особливості лише зміцнять наш незвичайний союз — за умови, що ми зуміємо знайти гармонію."
  RMN_f: "$RMN$"
  RMN_f_desc: "Останні уламки Римської імперії канули в Лету. І хоча багато хто претендує на імператорську корону, її істинні нащадки — це ми. Лише коли землі предків нарешті виявляться возз'єднані під одним прапором, ми отримаємо належне нам по праву народження — благополуччя і процвітання. Ми діти Риму — народ Румунії!"
  SWA_f: "$SWA$"
  SWA_f_desc: "Після занепаду центральної влади в #TOOLTIP:AREA,swabia_area,X #L Швабії#!#! жоден правитель так і не зміг повернути цьому краю колишню славу, і він поступово потрапив під вплив іноземних країн. Сьогодні ж значна територія #TOOLTIP:AREA,swabia_area,X #L Швабії#!#! знову належить нам, а значить, в наших силах — не дати спадщині згаснути і створити нову країну."
  WES_f: "$WES$"
  WES_f_desc: "Колись наш народ зазнавав важкого релігійного гніту, але ми знайшли новий, кращий шлях, який дозволить нам нарешті стати повноцінною країною. Ще трохи — і вплив церковників на наші землі стане пережитком минулого, ми створимо нову країну в #TOOLTIP:AREA,westphalia_area,X #L Вестфалії#!#! і проголосимо настання нової епохи для нашого народу."
  BEL_f: "$BEL$"
  BEL_f_desc: "Південні землі Нідерландів населяє народ, який розділений мовою та вірою. Але якщо ми дамо місцевим жителям, що загрузли в розбратах, спільну мету — домогтися самоврядування — можливо, так ми подолаємо розбіжності. Для цього ми повинні оголосити про створення нової, незалежної країни."
  FKN_f: "$FKN$"
  FKN_f_desc: "#TOOLTIP:AREA,franconia_area,X #L Франконія#!#!, де колись розташовувалося могутнє та впливове племінне герцогство, за минулі століття занепало, а її герцоги перетворилися на номінальних правителів, які майже не мають влади. Однак якщо ми знову завоюємо владу та встановимо міцний контроль над старим герцогством, $FKN$ ще відродиться!"
  HAN_f: "$HAN$"
  HAN_f_desc: "Майже вся #TOOLTIP:AREA,lower_saxony_area,X #L Нижня Саксонія#!#! належить нам, а разом з нею і #TOOLTIP:LOCATION,hanover,X #L Ганновер#!#!. Ми можемо проголосити себе новою країною, маяком влади, а потім повести народ у світле майбутнє! Завдяки своїй рішучості та спритності ми станемо серйозною фігурою на #TOOLTIP:REGION,north_german_region,X #L північнонімецькій#!#! політичній сцені."
  TUS_f: "$TUS$"
  TUS_f_desc: "Стародавня Тосканська марка існувала багато століть, доки не згасла після смерті Матильди Каноської у 1115 році. Її землі виявилися розділені між різними міськими громадами, що прагнули влади, а пам'ять про єдину Тоскану з часом вичерпалася. Однак обставини змінилися, і зараз цілком слушний момент, щоб знову об'єднати ці розколоті землі та їхніх жителів під єдиною владою."
  BUL_f: "$BUL$"
  BUL_f_desc: "Болгарське царство століттями боролося за виживання, постійно відбиваючи набіги сусідів, охочих до чужого. Одного разу воно впало, потім відновилося, але пізніше розвалилося знову. Але тепер під нашим впевненим керівництвом народ Болгарії знову повстане як єдина країна, і цього разу вона завоює статус великої світової імперії!"
  DAL_f: "$DAL$"
  DAL_f_desc: "Далмація завжди приваблювала чужоземних загарбників, адже її узбережжя, острови та бухти — це ключ до панування на вигідних торгових шляхах #TOOLTIP:PROVINCE_DEFINITION,adriatic_sea_province,X #L Адріатичного моря#!#!. Але невже чужоземці вічно будуть привласнювати багатства Далмації, які по праву повинні належати її рідним синам? Настав час скинути ярмо, надіте на нас прийшлими ворогами, і побудувати незалежну Далмацію!"
  HUN_f: "$HUN$"
  HUN_f_desc: "Старе королівство Угорщина колись було головною силою #TOOLTIP:REGION,carpathia_region,X #L Карпатії#!#! і багато років тримало цей регіон у вузді. Але навіть найміцніші стіни не стоять вічно, і стара країна одного разу розпалася від чужоземних навал і захоплень земель. Однак тепер ми знову стоїмо на порозі величі, і час відродити Угорщину нарешті настав. Нехай же вона знову підніметься до вершин імперської величі, адже ми заслуговуємо на це!"
  KRS_f: "$KRS$"
  KRS_f_desc: "Ці краї ще з давніх часів населені #TOOLTIP:CULTURE,$kurdish_culture_tt$,X #L курдським#!#! народом — першим серед інших великих представників династії #ONCLICK:COUNTRY,[GetCountry('HSN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HSN').Custom('CL_tt')],X [GetCountry('HSN').Custom('CL_GEN')|L]#!#!. Якщо об'єднати цих людей під єдиним прапором, вони зможуть нав'язати свою волю всьому регіону."
  SOI_f: "$SOI$"
  SOI_f_desc: "#TOOLTIP:CULTURE,$somali_culture_tt$,X #L Сомалійський#!#! народ ніколи не був прив'язаний до якогось одного місця: його можна знайти всюди — від просторів #TOOLTIP:CONTINENT,africa,X #L Африки#!#! до пісків #TOOLTIP:REGION,arabia_region,X #L Аравії#!#! та берегів Індії. Єдина #TOOLTIP:REGION,somalia_region,X #L сомалійська#!#! країна, поза всяких сумнівів, стане воістину могутньою, оскільки її народи пізнали світ."
  CRO_f: "$CRO$"
  CRO_f_desc: "#TOOLTIP:AREA,croatia_area,X #L Хорватія#!#! — стародавня земля, де стикаються схід і захід, води Середземного моря та численні материкові країни. Найрізноманітніші народи та культури залишили тут свій відбиток, але по-справжньому розцвісти ці краї зможуть тільки під владою #TOOLTIP:CULTURE,$croatian_tt$,X #L хорватів#!#!."
  TRA_f: "$TRA$"
  TRA_f_desc: "«Землі за лісом» багаті на корисні копалини та родючі ниви, а населяють їх різноманітні народи — валахи, мадяри та німці, і всі вони з гордістю називають цей край своїм домом. Вони стануть новим трансильванським народом, і ми будемо правити ним з нашої столиці, забезпечуючи всім їм процвітання."
  MAL_f: "$MAL$"
  MAL_f_desc: "#L [ShowCultureName('mandinka')|l]кі#! землі славляться своєю багатою історією та примітними постатями — особливо такою, як [GetCharacter('mal_musa_keita').GetName]. Якщо ці краї знову об'єднати під одним прапором, місцеві народи напевно зможуть досягти нових висот."
  NUB_f: "$NUB$"
  NUB_f_desc: "У нас стародавня країна, але їй не вдалося вистояти. Ми виявилися розділені між суперницькими правителями і поступово ставали здобиччю сильніших ворогів. Якщо ми хочемо знову стати значущою силою в цьому світі, нам потрібно об'єднати землі перед порогами під владою єдиного правителя, здатного дати відсіч ворогам і здолати їх у бою."
  FIN_f: "$FIN$"
  FIN_f_desc: "Багато століть #TOOLTIP:CULTURE,$finnish_tt$,X #L фінами#!#! правили іноземці, а їхні землі перебували в чужих руках. Але ми не відмовилися від нашого фінського укладу і не пробачили тих, хто утискає нас за те, як ми живемо. Настав момент скинути ярмо загарбників, створити вільну країну $FIN$ і зайняти місце в ряду самостійних країн!"
  ICE_f: "$ICE$"
  ICE_f_desc: "Сталося так, що з часом наші володіння в #TOOLTIP:AREA,iceland_area,X #L Ісландії#!#! стали центром нашої країни. Час визнати, що тепер ми ісландці, і побудувати на острові нову країну. Ми створимо тут міцні інститути, зміцнимо владу і нарешті об'єднаємо наших співвітчизників."
  KAZ_f: "$KAZ$"
  KAZ_f_desc: "#TOOLTIP:CULTURE,$kazakh_tt$,X #L Казахські#!#! кочівники, які живуть на просторах степів, розрізнені, у нас немає єдиної влади, а тому в разі вторгнення чужоземців ми можемо не встояти. Але якщо ми нарешті об'єднаємося під началом єдиного вождя і створимо свою країну, то дамо відсіч будь-якому ворогу. Тому нам потрібно стати під один прапор, щоб разом правити безкрайніми рівнинами."
  MIR_f: "$MIR$"
  MIR_f_desc: "Ми живемо на острові, де перетинається безліч культур, в результаті чого тут виник унікальний сплав віровчень і життєвих укладів. Можна сказати, що в цьому поєднанні непоєднуваного полягає наша сила, але нам слід знайти щось спільне на тлі відмінностей, щоб стати одним народом. Єдина малагасійська країна під нашим началом приведе наш острів до процвітання і зміцнить стабільність — а з нею і могутність — нашого народу."
  MOR_f: "$MOR$"
  MOR_f_desc: "Історія нашого народу — це історія злетів і падінь, загибелі та відродження великих династій. Але в цьому бурхливому круговороті династичного хаосу незмінною залишається наша культура, прекрасна, як діамант. Ми — народ художників, мислителів, вчених і будівельників, дороговказне світло для всіх жителів регіону. Наша країна повинна домогтися стабільності та могутності в єдності. Тільки тоді ми забезпечимо процвітання своїм землям і поселимо страх у серцях ворогів."
  NUS_f: "$NUS$"
  NUS_f_desc: "#TOOLTIP:REGION,indonesia_region,X #L Індонезія#!#! — край достатку, багатий на природні ресурси. Його населяють найрізноманітніші народи, але культурно вони схожі, в основному завдяки морській торгівлі. Якщо ми об'єднаємо їх під одним прапором, то станемо серйозними гравцями в боротьбі за панування над усім регіоном."
  SLO_f: "$SLO$"
  SLO_f_desc: "З часів падіння Великої Моравії #TOOLTIP:CULTURE,$slovak_tt$,X #L словаками#!#! правили іноземні країни, не рахуючись з нашими інтересами. Однак у ці похмурі часи наш народ повільно, але вірно все більше зміцнювався у своїй єдності. І ось настав час відновити наш суверенітет і створити країну без чужоземних намісників."
  BNO_f: "$BNO$"
  BNO_f_desc: "Острів Борнео багатий на природні ресурси та населений численними народами найрізноманітніших культур. Якщо об'єднати ці народи в одну спільноту, то ми збережемо багатство острова, щоб користуватися ними могли лише його мешканці."
  CIR_f: "$CIR$"
  CIR_f_desc: "Розкол черкесів на суперницькі племена необхідно подолати. Якщо ми хочемо набрати силу і не стати жертвами зовнішніх сил, нам потрібно об'єднатися під владою сильного правителя, який приведе наш народ до процвітання і вселить страх ворогам."
  AZT_f: "Ацтеки"
  AZT_f_desc: "Ацтекська імперія — великий союз священних країн. Завдяки славним вождям з міста #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтітлан#!#! наше золоте сонце тепер сяє над більшою частиною #TOOLTIP:REGION,mesoamerica_region,X #L Мезоамерики#!#!. Ми будемо й далі розширювати свої землі, в цьому нам допоможуть віра, зброя та жертвоприношення."
  TUR_f: "$TUR$"
  TUR_f_desc: ""
  ASK_f: "$ASK$"
  ASK_f_desc: ""
  JAP_f: "$JAP$"
  JAP_f_desc: ""
  PGR_f: "$PGR$"
  PGR_f_desc: ""
  MTM_f: "$MTM$"
  MTM_f_desc: ""
  YUA_f: "$YUA$"
  YUA_f_desc: "$YUA$"
  CSH_f: "$CSH$"
  CSH_f_desc: ""