l_russian:
  TAB_TOOLTIP_HINTS_TITLE: "Поради"
  TAB_TOOLTIP_HINTS: "#T Поради#!\nТут можна отримати поради, що стосуються вашого стану справ у грі."
  OPEN_HINTS: "Відкрити поради"
  OPEN_HINT: "Відкрити пораду"
  EXPAND_HINT: "Клацніть, щоб розгорнути пораду"
  COLLAPSE_HINT: "Клацніть, щоб згорнути пораду"
  EMPTY_HINT_SCREEN_TEXT: "У країні все спокійно, поки нічого порадити!"
  OPEN_HINT_TEXT: "Переглянути пораду @hint!"
  ALERT_HINT: "Відкрити з порадою"
  ALERT_ADVANCES_HINT: "Відкрити панель поступу з порадою"
  HINT_TITLE: "Порада @hint!"
  RECOMMENDED_ACTIONS_TITLE: "@hint! Рекомендації"
  SCRIPTABLE_HINT_DEFINITION_TEXT: "$MAIN_HINT$ $CONTEXT_HINT$"
  HINT_DIVIDER: "\n\n---\n\n"
  HINT_SORT_BY_PRIORITY: "Сортувати за пріоритетом"
  hint_advisor_salute_diplomatic: "\n«Вітаю, Ваша Високосте, я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').GetName], [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').IsFemale, 'ваша політична радниця і смиренна', 'ваш політичний радник і смиренний' )] слуга»."
  hint_advisor_salute_administrative: "\n«[Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').GetName], до ваших послуг, [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').IsFemale, 'вірна радниця', 'вірний радник' )] вашої світлості в питаннях економіки»."
  hint_advisor_salute_military: "\n«Мене звуть [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').GetName], і я [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').IsFemale, 'ваша', 'ваш' )] експерт у військових справах. Чекаю розпоряджень»."
  HINTS_AND_SUGGESTIONS: "Поради та пропозиції"
  MANPOWER_HINT: "Мало рекрутів!"
  manpower_topbar_hint: "В основному ми отримуємо більше [Concept('manpower', 'рекрутів')|e] при зведенні [Concept('building', 'споруд')|e] певного типу."
  MANPOWER_HINT_EXTRA: "Щоб збільшити [Concept('manpower', 'число рекрутів')|e], можна побудувати будь-яку з наступних споруд:"
  MANPOWER_HINT_NONE: "На жаль, жодна доступна нам споруда не збільшить число рекрутів."
  MANPOWER_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  SAILORS_HINT: "Мало моряків!"
  sailors_topbar_hint: "В основному ми отримуємо більше [Concept('sailors', 'моряків')|e] при зведенні [Concept('buildings', 'споруд')|e] певного типу в прибережних [Concept('locations', 'місцевостях')|e]."
  SAILOR_HINT_EXTRA: "Щоб збільшити число моряків, можна побудувати будь-яку з наступних споруд:"
  SAILOR_HINT_NONE: "На жаль, жодна доступна нам споруда не збільшить число моряків."
  SAILOR_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  INVALID_MODIFIER_TYPE: "Обрано неприпустимий тип модифікатора!"
  EMPTY_RESEARCH_HINT: "Можна обрати дослідження!"
  empty_research_topbar_hint: "@trigger_no! [Concept('research', 'Дослідження')|e] завжди приносять користь. Зараз ми втрачаємо дорогоцінний поступ."
  NO_BUILDINGS_WITH_MODIFIER: "Ні"
  GOLD_HINT: "У нас дефіцит!"
  gold_topbar_hint: "У разі дефіциту ми можемо скоротити [Concept('expenses', 'витрати')|e], підвищити [Concept('taxes', 'податки')|e] або [Concept('mint', 'викарбувати')|e] більше монет. Якщо у нас закінчаться [Concept('gold', 'дукати')|e], нам доведеться взяти [Concept('loans', 'позики')|e] — і зіткнутися з ризиком [Concept('bankrupt', 'банкрутства')|e]."
  STABILITY_HINT: "Наша країна нестабільна!"
  stability_topbar_hint: "Є кілька способів підвищити стабільність.\n$BULLET_WITH_TAB$Збільште кількість #TOOLTIP:POPTYPE,clergy,X #L духовенства#!#!, яке сповідує #L [GetPlayer.GetReligion.GetAdjective|l]у#! віру.\n$BULLET_WITH_TAB$Спрямуйте більше коштів [Concept('budget', 'бюджету')|e] на зміцнення стабільності.\n$BULLET_WITH_TAB$Доручіть [Concept('cabinet', 'раді')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L підвищити стабільність у країні#!#!."
  LEGITIMACY_HINT: "[Localize( GetPlayer.GetGovernment.GetGovernmentType.GetPowerKey )] на низькому рівні!"
  legitimacy_topbar_hint: "Є кілька способів виправити цю проблему.\n$BULLET_WITH_TAB$Спрямуйте більше коштів [Concept('budget', 'бюджету')|e] на [Concept('court_maintenance', 'утримання двору')|e].\n$BULLET_WITH_TAB$Доручіть [Concept('cabinet', 'раді')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L зміцнити уряд#!#!."
  devotion_topbar_hint: "$legitimacy_topbar_hint$"
  republican_tradition_topbar_hint: "$legitimacy_topbar_hint$"
  horde_unity_topbar_hint: "$legitimacy_topbar_hint$"
  tribal_cohesion_topbar_hint: "$legitimacy_topbar_hint$"
  GOLD_VIEW_HINT: "Переглянути пораду щодо дефіциту"
  hint_in_deficit: "Від'ємний баланс"
  hint_in_deficit_hint_text: "$hint_in_deficit_hint_text_1$\n\n$hint_in_deficit_hint_text_2$\n\n$hint_in_deficit_hint_text_3$"
  hint_in_deficit_hint_text_1: "Наш баланс від'ємний, а тому діяти потрібно обережно, інакше країні загрожують борги і навіть банкрутство."
  hint_in_deficit_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Відкрийте @economy_panel![Link('economy', '', 'панель економіки')], щоб переглянути [Concept('income', 'дохід')|e] та [Concept('expenses', 'витрати')]. Переміщенням повзунків тут можна підвищувати [Concept('taxes', 'податки')|e] або зменшувати витрати.\n@arrow_bonus_tier_2! Досягніть того, щоб усі [Concept('buildings', 'споруди')|e] приносили дохід, або побудуйте нові споруди (якщо це вам по кишені). Для цього відкрийте @production_panel![Link('production', '', 'панель виробництва')].\n@arrow_bonus_tier_2! Взаємодійте з [Concept('estates', 'станами')|e] — це обіцяє як короткострокову, так і довгострокову вигоду. Однак варто пам'ятати, що стани також можуть набути значного політичного впливу, тому надмірна залежність від них — це завжди великий ризик. Стани перераховані на @government_panel![Link('government', 'tabcontent = estates', 'панелі уряду')].\n@arrow_bonus_tier_1! Вивчіть наявні або можливі торгові шляхи на @economy_panel![Link('trade', '', 'панелі торгівлі')] та укладіть вигідну [Concept('trades', 'торгову угоду')|e]."
  hint_in_deficit_hint_text_3: "#T Додаткові поради#!\n@hint! Вирішити проблему від'ємного балансу також допоможуть [Concept('laws', 'закони')|e], [Concept('reforms', 'реформи')|e], [Concept('diplomacy', 'дипломатія')|e] та багато іншого."
  hint_in_deficit_military: "«Витрати на війну одразу вдарять по казні, але якщо ми здобудемо перемогу, платити за цей тягар буде вже переможений. Забравши собі чужу землю, ми отримаємо довгострокову вигоду, тоді як розграбування ворога збагатить нас ненадовго, але одразу»."
  hint_in_deficit_explorer: "«Там, у незвіданих краях, земля напевно багата — її можна буде і грабувати, і розвивати»."
  hint_in_deficit_administrative: "«Хороший спосіб стати багатшим — зайняти панівне становище на внутрішньому ринку. Якщо ж і цього буде мало, можна буде спробувати закріпитися на іноземних ринках, і тоді золото потече ще швидше»."
  hint_in_deficit_diplomatic: "«Як кажуть, щоб заробляти гроші, потрібно їх витрачати! Щоб перетягнути шальки терезів, потрібно зробити так, щоб робота наших споруд і праця населення приносили дохід»."
  hint_cultural_capacity: "Перевищено культурний потенціал"
  hint_cultural_capacity_hint_text: "$hint_cultural_capacity_hint_text_1$\n\n$hint_cultural_capacity_hint_text_2$\n\n$hint_cultural_capacity_hint_text_3$"
  hint_cultural_capacity_hint_text_1: "Культурне різноманіття обіцяє багато переваг, однак країни, які не готові до такого адміністративного тягаря і не мають достатнього [Concept('cultural_capacity', 'культурного потенціалу')|e], отримуватимуть штрафи. [Concept('pops', 'Групи населення')|e], чия [Concept('cultures', 'культура')|e] не є [Concept('primary_culture', 'основною')|e] в нашій країні, спочатку вважатимуться носіями [Concept('non_accepted_culture_short', 'пригнобленої')|e] культури, але за певних вкладень її можна перетворити на [Concept('tolerated_culture_short', 'прийнятну')|e] або [Concept('accepted_culture_short', 'визнану')|e]."
  hint_cultural_capacity_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Щоб скоротити витрати, понизьте статус культури, менш важливої в стратегічному відношенні.\n@arrow_bonus_tier_2! На #TOOLTIP:MODIFIER_TYPE,cultures_capacity,X #P #V межу культур#!#!#! найчастіше впливають [Concept('government_reforms', 'державні реформи')|e] та [Concept('advances', 'поступ')|e]."
  hint_cultural_capacity_hint_text_3: "#T Додаткові поради#!\n@hint! Зменшити кількість культур у країні також можна за допомогою [Concept('assimilation', 'асиміляції')|e]."
  hint_cultural_capacity_military: "«Від культур потрібно отримувати якомога більше віддачі: вони допомагають нам створювати культурні традиції та вплив — це незамінний інструмент, який дасть нам перевагу в разі культурного конфлікту. А якщо ми дамо чужим культурам більше прав, країна отримає додаткових ополченців і вояків»."
  hint_cultural_capacity_administrative: "«Культурним вираженням займаються зокрема митці нашої країни, що створюють чудові шедеври. Адже чим ще виміряти велич країни, якщо не її впливом на світ?»"
  hint_cultural_capacity_diplomatic: "«З часом чужі культури можуть асимілюватися та наблизитися до основної культури [GetPlayer.Custom('CL_GEN')]. Хіба є щось краще за [GetPlayer.GetCulture.GetNameWithNoTooltip|l]у культуру?»"
  hint_unhappy_estates: "Невдоволені стани"
  hint_unhappy_estates_hint_text: "$hint_unhappy_estates_hint_text_1$\n\n$hint_unhappy_estates_hint_text_2$\n\n$hint_unhappy_estates_hint_text_3$"
  hint_unhappy_estates_hint_text_1: "Одне з найважливіших завдань будь-якого правителя — стежити за тим, щоб [Concept('estates_with_icon', 'стани')|e] не ремствували, оскільки їхні представники — одна з опор економічної та військової могутності країни.\n\nКожен нелояльний [Concept('estate', 'стан')|e] накладає штрафи на [Concept('country', 'країну')], а його [Concept('pops_with_icon', 'групи населення')|e] з великою ймовірністю примкнуть до [Concept('rebellions_with_icon', 'заколоту')|e]."
  hint_unhappy_estates_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! На @government_panel![Link('government', 'tabcontent = estates', 'панелі уряду')] можна наділяти стани привілеями або позбавляти привілеїв. Від цього залежить продуктивність і [Concept('estate_satisfaction_short', 'задоволення')|e] станів.\n@arrow_bonus_tier_2! На @economy_panel![Link('economy', '', 'панелі економіки')] можна підвищувати або знижувати податки, що також впливає на задоволення."
  hint_unhappy_estates_hint_text_3: "#T Додаткові поради#!\n@hint! Вплинути на [Concept('estate_satisfaction', 'задоволення станів')|e] також можна за допомогою [Concept('parliament', 'зборів')|e].\n@hint! Дізнатися більше про [Concept('rebel_movements_with_icon', 'заколотні рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_unhappy_estates_administrative: "«Жодна торгова країна не може повноцінно існувати без станів. Так, з часом владою частково доведеться поступитися, але зате яка буде економіка!»"
  hint_unhappy_estates_diplomatic: "«У станів можуть бути думки, зокрема, і з дипломатичних питань. Перед тим як укласти союз або договір з іноземною країною, іноді варто врахувати, що про неї думають стани»."
  hint_unhappy_estates_military: "«Розширення неможливе без ополченців, а їх нам надають стани. Якщо ці люди відвернуться від нас, у найнепідходящий момент у нас може виявитися недостатньо вояків»."
  ESTATE_CONTEXT_TEXT: "Мешканці вашої країни $LIST$ невдоволені.\n\n$TEXT$"
  HINT_UNHAPPY_ESTATE: "[ESTATE.GetName|l]"
  hint_manpower: "Число рекрутів"
  hint_manpower_hint_text: "$hint_manpower_hint_text_1$\n\n$hint_manpower_hint_text_2$\n\n$hint_manpower_hint_text_3$"
  hint_manpower_hint_text_1: "[Concept('manpower', 'Число рекрутів')|e] показує, скільки людей можна набрати до [Concept('regulars', 'регулярних військ')|e] для потреб наших [Concept('armies', 'військ')|e]. У [Concept('battle', 'бою')|e] регулярні війська значно перевершують [Concept('levies', 'ополчення')|e], однак витрати на їх утримання вищі. Дозволити собі регулярні війська на початку гри може далеко не кожна [Concept('country', 'країна')|e]."
  hint_manpower_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Якщо ви віддаєте перевагу воювати силами [Concept('regulars', 'регулярних військ')], врахуйте, що нестача [Concept('manpower', 'рекрутів')] серйозно обмежує можливість поповнювати втрати в [Concept('armies', 'військах')|e]. Відповідно, краще не оголошувати [Concept('war', 'війну')|e], доки рекрутів мало.\n@arrow_bonus_tier_2! Якщо в ході війни число рекрутів сильно зменшилося, їх можна замістити [Concept('levies', 'ополченням')|e] або [Concept('mercenaries', 'найманцями')|e], або навіть попросити ворога про [Concept('peace', 'мир')|e]."
  hint_manpower_hint_text_3: "#T Додаткові поради#!\n@hint! Збільшити граничне число рекрутів і наростити можливість утримувати регулярне військо можна за допомогою різних [Concept('buildings', 'споруд')|e].\n@hint! [Concept('estate_privileges', 'Станові привілеї')|e] та [Concept('laws', 'закони')|e] також впливають на можливість набирати рекрутів."
  hint_manpower_diplomatic: "«Відбірне регулярне військо, в якому служать найкращі сини [GetPlayer.GetAdjectiveWithNoTooltip|l]ої країни, — сила, якій не буде рівних»."
  hint_manpower_military: "«У завоюваннях усі способи добрі. Найманці, ополченці, регулярне військо — у великому війську все це однаково необхідно»."
  hint_manpower_administrative: "«Кожен вояк, убитий на полі бою, — це один селянин, який не повернувся на ріллю. Війна — витратна справа»."
  hint_low_stability: "Низька стабільність"
  hint_low_stability_hint_text: "$hint_low_stability_hint_text_1$\n\n$hint_low_stability_hint_text_2$\n\n$hint_low_stability_hint_text_3$"
  hint_low_stability_hint_text_1: "Низька [Concept('stability', 'стабільність')|e] в країні підвищує ризик того, що [Concept('pops', 'групи населення')|e] піднімуть [Concept('rebellion', 'заколот')|e], а невдоволені [Concept('estate', 'стани')|e] розпалять [Concept('civil_war', 'громадянську війну')|e], і загалом настануть неспокійні часи."
  stability_raise_actions: "@arrow_bonus_tier_3! Спрямуйте більше коштів [Concept('budget', 'бюджету')|e] на підвищення стабільності.\n@arrow_bonus_tier_2! Доручіть [Concept('cabinet', 'раді')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L підвищити стабільність у країні#!#!.\n@arrow_bonus_tier_1! Збільште число #TOOLTIP:POPTYPE,clergy,X #L священників#!#!, які сповідують #L [GetPlayer.GetReligion.GetAdjective|l]у#! віру."
  hint_low_stability_hint_text_2: "#T Рекомендації#!\n$stability_raise_actions$"
  hint_low_stability_hint_text_3: "#T Додаткові поради#!\n@hint! Є й інші способи підвищити стабільність — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e].\n@hint! Пам'ятайте, що стабільність також витрачається на важливі дії, наприклад оголошення [Concept('wars', 'війни')|e] без вагомого [Concept('casus_belli', 'приводу')|e] або зміну [Concept('law', 'закону')|e]."
  hint_low_stability_administrative: "«Стабільна країна — це процвітаюча країна! А рясний урожай — це й рясний приплив багатства до скарбниці»."
  hint_low_stability_military: "«Будь-якій країні з претензіями на панування спочатку доведеться вгамувати своє населення. Простий люд завжди готовий схопитися за вила…»"
  hint_low_stability_diplomatic: "«Якщо в нашій країні настане розруха, сусіди почнуть дивитися на нас зверхньо. Мабуть, краще цього не допускати»."
  hint_very_low_stability: "Дуже низька стабільність"
  hint_very_low_stability_hint_text: "$hint_very_low_stability_hint_text_1$\n\n$hint_very_low_stability_hint_text_2$\n\n$hint_very_low_stability_hint_text_3$"
  hint_very_low_stability_hint_text_1: "Наша [Concept('stability', 'стабільність')|e] вкрай низька — і дуже високий ризик того, що [Concept('pops', 'населення')|e] підніме [Concept('rebellion', 'заколот')|e], незадоволені [Concept('estate', 'стани')|e] розпалять [Concept('civil_war', 'громадянську війну')|e], а вороги завдадуть нам удару, скориставшись нашою слабкістю."
  hint_very_low_stability_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Якомога швидше підвищте стабільність. Зараз не слід оголошувати нові [Concept('wars', 'війни')|e] або здійснювати інші дії, що знижують стабільність.\n$stability_raise_actions$"
  hint_very_low_stability_hint_text_3: "$hint_low_stability_hint_text_3$"
  hint_very_low_stability_administrative: "«За такої економіки абсолютно неможливо вести справи! Допоможіть нам розписати бюджет — у нас худоба голодує»."
  hint_very_low_stability_military: "«Усі вороги [GetPlayer.Custom('CL_GEN')] зараз потирають руки від радості, бачачи нашу слабкість. Напевно суперники та противники вже замишляють щось недобре»."
  hint_very_low_stability_diplomatic: "«У стабільних країнах суспільне становище людей різко змінюється. У нас воно теж змінюється, тільки в негативний бік»."
  hint_low_legitimacy: "Брак легітимності"
  hint_low_legitimacy_hint_text: "$hint_low_legitimacy_hint_text_1$\n\n$hint_low_legitimacy_hint_text_2$\n\n$hint_low_legitimacy_hint_text_3$"
  hint_low_legitimacy_hint_text_1: "[Concept('legitimacy', 'Легітимність')|e] — це визнання іншими країнами тієї влади, якою володіє [GetPlayer.GetGovernment.GetRulerTitle|l] нашої країни. Якщо легітимність занадто сильно впаде, ми не тільки втратимо переваги [Concept('crown_power', 'влади правителя')|e], але й підвищимо ризик виникнення [Concept('rebellion', 'заколоту')|e], а ще почнемо отримувати штрафи до задоволення [Concept('estate', 'станів')|e] та до [Concept('righteousness', 'праведності')|e]."
  hint_low_legitimacy_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підтримуйте якомога вищий рівень [Concept('legitimacy', 'легітимності')|e], щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримки цього показника можна збільшити витрати на [Concept('court_maintenance', 'утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('legitimacy', 'легітимність')|e] — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e].\n@arrow_bonus_tier_1! Оберіть [Concept('cabinet_action_with_icon', 'доручення')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Зміцнення уряду»#!#!."
  hint_low_legitimacy_hint_text_3: "#T Додаткові поради#!\n@hint! Як і інші важливі показники, легітимність зростає повільно. Щоб вашу [Concept('dynasty', 'династію')|e] почали сприймати прихильно, потрібен час, тому намагайтеся мислити наперед."
  hint_low_legitimacy_administrative: "«Книги записів про наш рід та пишність двору — ось найпереконливіші докази законності нашої влади»."
  hint_low_legitimacy_military: "«Хіба ворог боятиметься нашого війська, якщо наші власні вояки сумніваються у своєму правителеві?»"
  hint_low_legitimacy_diplomatic: "«Часом внутрішня сила походить від того, як оточуючі уявляють нас самих. А в скрутну хвилину можуть допомогти союзники»."
  hint_low_republican_tradition: "Низький показник республіканських традицій"
  hint_low_republican_tradition_hint_text: "$hint_low_republican_tradition_hint_text_1$\n\n$hint_low_republican_tradition_hint_text_2$\n\n$hint_low_republican_tradition_hint_text_3$"
  hint_low_republican_tradition_hint_text_1: "[Concept('republican_tradition', 'Республіканські традиції')|e] — показник того, наскільки [GetPlayer.GetGovernment.GetGovernmentType.GetName|l] дотримується принципів республіканізму. Якщо значення цього показника занадто сильно зменшиться, ми не тільки втратимо переваги [Concept('legislative_efficiency', 'законодавчої ефективності')|e], але й підвищимо ризик виникнення [Concept('rebellion', 'заколоту')|e], а ще почнемо отримувати значні штрафи до витрат на підвищення [Concept('stability', 'стабільності')|e]."
  hint_low_republican_tradition_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підтримуйте якомога вищий рівень [Concept('republican_tradition', 'республіканських традицій')|e], щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримки цього показника можна збільшити витрати на [Concept('court_maintenance', 'утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('republican_tradition', 'республіканські традиції')|e] — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e].\n@arrow_bonus_tier_1! Ще один спосіб підтримати [Concept('republican_tradition', 'республіканські традиції')|e] на високому рівні — змінити [Concept('ruler', 'правителя')|e] під час [Concept('election', 'виборів')|e]."
  hint_low_republican_tradition_hint_text_3: "#T Додаткові поради#!\n@hint! Як і інші важливі показники, республіканські традиції вкорінюються нешвидко. Щоб народ засвоїв їх, потрібен час, тому намагайтеся мислити наперед."
  hint_low_republican_tradition_administrative: "«У будь-якій порядній республіці вибори — це природний процес»."
  hint_low_republican_tradition_military: "«Якщо народ стане вважати нас тиранами, битися за нас не будуть навіть найманці»."
  hint_low_republican_tradition_diplomatic: "«Жодна країна, яка пишається своєю силою, не стане добровільно підтримувати країну, що відкрито нехтує власними основоположними принципами»."
  hint_low_devotion: "Брак благочестя"
  hint_low_devotion_hint_text: "$hint_low_devotion_hint_text_1$\n\n$hint_low_devotion_hint_text_2$\n\n$hint_low_devotion_hint_text_3$"
  hint_low_devotion_hint_text_1: "$game_concept_devotion_desc$ Якщо значення цього показника занадто сильно зменшиться, ми не тільки втратимо переваги до [Concept('religious_influence', 'релігійного впливу')|e], але й збільшимо ризик виникнення в країні [Concept('rebellion', 'заколоту')|e], а ще почнемо отримувати штрафи до задоволення [Concept('estate', 'станів')|e]."
  hint_low_devotion_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підтримуйте якомога вищий рівень [Concept('devotion', 'благочестя')|e], щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримки цього показника можна збільшити витрати на [Concept('court_maintenance', 'утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('devotion', 'благочестя')|e] — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e]."
  hint_low_devotion_hint_text_3: "#T Додаткові поради#!\n@hint! Як і інші важливі показники, благочестя зростає нешвидко. Щоб народ відчув релігійний запал, потрібен час, тому намагайтеся мислити наперед."
  hint_low_devotion_administrative: "«Недостатньо просто виступати уособленням і захисником віри: потрібно ще й підтримувати цей образ»."
  hint_low_devotion_military: "«Якщо наше військо — меч зі щитом, що надійно оберігає віруючих, то наше завдання — стати світлом для цих людей»."
  hint_low_devotion_diplomatic: "«Нам слід взяти на себе завдання поширення віри в найдальших куточках світу. Звісно, для цього знадобиться побожність, інакше ми нікого не переконаємо»."
  hint_low_horde_unity: "Низька згуртованість орди"
  hint_low_horde_unity_hint_text: "$hint_low_horde_unity_hint_text_1$\n\n$hint_low_horde_unity_hint_text_2$\n\n$hint_low_horde_unity_hint_text_3$"
  hint_low_horde_unity_hint_text_1: "$game_concept_horde_unity_desc$"
  hint_low_horde_unity_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Найкращий спосіб згуртувати орду — кинути її на ворога і прогнати його геть.\n@arrow_bonus_tier_2! Для підтримання [Concept('horde_unity', 'згуртованості орди')|e] можна збільшити витрати на [Concept('court_maintenance', 'утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('horde_unity', 'згуртованість орди')|e] — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e]."
  hint_low_horde_unity_hint_text_3: "#T Додаткові поради#!\n@hint! При сильній нестачі згуртованості наслідки будуть катастрофічними. Краще зберігати її на високому рівні."
  hint_low_horde_unity_administrative: "«„Розділяй і володарюй“ — не порожні слова. Якщо нас розділять, значить, володарюватимуть вже над нами»."
  hint_low_horde_unity_military: "«Як то кажуть, кожен сам вільний відбирати у слабких своє щастя. Сила об'єднує нас; сила породжує згуртованість!»"
  hint_low_horde_unity_diplomatic: "«Чим згуртованішим є наше плем'я, тим сильніші наші воїни — тут є прямий взаємозв'язок. Успіхи на війні та в завоюванні — це самоздійснюване пророцтво»."
  hint_low_tribal_cohesion: "Слабка племінна єдність"
  hint_low_tribal_cohesion_hint_text: "$hint_low_tribal_cohesion_hint_text_1$\n\n$hint_low_tribal_cohesion_hint_text_2$\n\n$hint_low_tribal_cohesion_hint_text_3$"
  hint_low_tribal_cohesion_hint_text_1: "$game_concept_tribal_cohesion_desc$ Племінна [Concept('government_types', 'форма правління')|e] відрізняється від інших тим, що в міру підвищення згуртованості значно зростає розмір ополчення. Щоб на війні нам супроводжував успіх, племена повинні жити в злагоді."
  hint_low_tribal_cohesion_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_2! Для підтримання [Concept('tribal_cohesion', 'племінної єдності')|e] можна збільшити витрати на [Concept('court_maintenance', 'утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('tribal_cohesion', 'племінну єдність')|e] — наприклад, певні [Concept('advances', 'поступи')|e] або [Concept('policies', 'політики')|e]."
  hint_low_tribal_cohesion_hint_text_3: "#T Додаткові поради#!\n@hint! При сильній нестачі єдності наслідки будуть катастрофічними. Краще зберігати його на високому рівні."
  hint_low_tribal_cohesion_administrative: "«Не можна заплющувати очі на єдність: від правителя вимагається увага до кожної дрібниці»."
  hint_low_tribal_cohesion_military: "«Коли немає племінної єдності, ми слабкі. Слабкість посилює роздробленість. З цього шляху треба звернути, інакше ворог сам підкорить і поневолить нас»."
  hint_low_tribal_cohesion_diplomatic: "«Існування країни настільки сильно залежить від станів, що майже кожен наш вчинок неодмінно відгукнеться в подальшому. Будь-який стратег, що поважає себе, буде мислити наперед»."
  hint_war_exhaustion: "Висока втома від війни"
  hint_war_exhaustion_hint_text: "$hint_war_exhaustion_hint_text_1$\n\n$hint_war_exhaustion_hint_text_2$\n\n$hint_war_exhaustion_hint_text_3$"
  hint_war_exhaustion_hint_text_1: "[Concept('war_exhaustion', 'Втома від війни')|e] — це загальна стомленість населення участю країни у війні. Висока втома вкрай небезпечна для будь-якої країни. У міру її зростання боєздатність [Concept('army', 'війська')|e] та [Concept('levies', 'ополчення')|e] буде знижуватися, зростання [Concept('pops', 'населення')|e] — сповільнюватися, а економіка — руйнуватися."
  hint_war_exhaustion_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Найкращий і найнадійніший спосіб уникнути втоми від війни — підтримувати мир.\n@arrow_bonus_tier_2! Певні [Concept('laws', 'закони')|e] та [Concept('estate_privileges', 'станові привілеї')|e] допоможуть поступово знизити цю втому."
  hint_war_exhaustion_hint_text_3: "#T Додаткові поради#!\n@hint! Слід ретельно підходити до завоювань і не оголошувати нові [Concept('wars', 'війни')|e], якщо втома вже надто висока."
  hint_war_exhaustion_administrative: "«Рішучі бойові дії можуть принести користь, але у втомі народу від війни немає нічого доброго: страждає виробництво, страждає споживання… страждає взагалі все!»"
  hint_war_exhaustion_military: "«Втома від війни небезпечна. Найчастіше її породжують слабкі командири: величезні втрати та гучні поразки швидко налаштують народ проти нас»."
  hint_war_exhaustion_diplomatic: "«Доля того, хто програв, завжди гірка, проте ганебна поразка може викликати в народі жагу помсти. Одержимість реваншем одурманює»."
  hint_low_sailors: "Моряки"
  hint_low_sailors_hint_text: "$hint_low_sailors_hint_text_1$\n\n$hint_low_sailors_hint_text_2$\n\n$hint_low_sailors_hint_text_3$"
  hint_low_sailors_hint_text_1: "$game_concept_sailors_desc$"
  hint_low_sailors_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Якщо ви віддаєте перевагу воювати за допомогою [Concept('ships', 'кораблів')|e], врахуйте, що нестача моряків серйозно обмежує можливість поповнювати втрати на [Concept('navies', 'флотах')|e]. Відповідно, краще не оголошувати [Concept('war', 'війну')|e], поки моряків мало.\n@arrow_bonus_tier_2! Без моряків також не вийде проводити [Concept('explorations', 'експедиції')|e] — це теж важливо враховувати при плануванні."
  hint_low_sailors_hint_text_3: "#T Додаткові поради#!\n@hint! Збільшити граничне число моряків можна за допомогою різних [Concept('buildings', 'споруд')|e].\n@hint! [Concept('estate_privileges', 'Станові привілеї')|e] та [Concept('laws', 'закони')|e] також впливають на можливість набирати моряків."
  hint_low_sailors_administrative: "«Кому належить море, тому належать і світові багатства. Сильний військовий і мирний флот означає торговельну перевагу»."
  hint_low_sailors_military: "«Міцний військово-морський флот із вправними моряками — наш ключ до підкорення далеких і близьких земель. Надійний захист шляхів постачання йде на користь усім, навіть заморським частинам»."
  hint_low_sailors_diplomatic: "«Морські військові споруди нерідко сприяють мирній торгівлі. На цю взаємну доповнюваність не слід заплющувати очі»."
  hint_low_diplomats: "Мало послів"
  hint_low_diplomats_hint_text: "$hint_low_diplomats_hint_text_1$\n\n$hint_low_diplomats_hint_text_2$\n\n$hint_low_diplomats_hint_text_3$"
  hint_low_diplomats_hint_text_1: "[Concept('diplomats', 'Посли')|e] дозволяють підтримувати дипломатичну взаємодію з іншими країнами. Для багатьох дій, таких як поліпшення відносин, постійно потрібні посли, а на одноразові дії, як правило, потрібна фіксована кількість послів."
  hint_low_diplomats_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Якщо послів не вистачає, можна перестати покращувати відносини з тією чи іншою країною, тим самим звільнивши зайнятих там послів.\n@arrow_bonus_tier_2! Є й інші способи поповнити дипломатичний корпус — наприклад, певні [Concept('advances', 'поступи')|e]."
  hint_low_diplomats_hint_text_3: "#T Додаткові поради#!\n@hint! Є сенс постійно тримати в країні кількох незайнятих послів на випадок, якщо раптом знадобиться їхня участь у будь-якій дії, проте не менш важливо призначати послам довгострокові завдання."
  hint_low_diplomats_administrative: "«Добрі відносини — запорука великого прибутку! Дружба з сусідами забезпечить нам доступ до нових, більших ринків»."
  hint_low_diplomats_military: "«Посли також допоможуть нашій країні утвердити перевагу над слабшими країнами. Чим ми сильніші, тим імовірніше, що інші нам підкорятимуться — по-дружньому або під загрозами»."
  hint_low_diplomats_diplomatic: "«Урядові реформи та вдосконалення — вірний спосіб розширити наше дипломатичне відомство. І, звісно, носії певних культур краще за інших володіють даром переконання»."
  LOW_DIPLOMATS_HINT: "Мало послів!"
  hint_low_food_in_market: "Брак їжі на ринку"
  hint_low_food_in_market_hint_text: "$hint_low_food_in_market_hint_text_1$\n\n$hint_low_food_in_market_hint_text_2$\n\n$hint_low_food_in_market_hint_text_3$"
  hint_low_food_in_market_hint_text_1: "Без достатнього запасу [Concept('food', 'їжі')|e] ринки не зможуть задовольняти попит у [Concept('provinces', 'провінціях')|e], де розташовані ці ринки. При цьому місцевості цих провінцій може вразити [Concept('starving', 'голод')|e]."
  hint_low_food_in_market_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Щоб збільшити пропозицію, покращіть [Concept('rgo', 'видобуток')|e] харчових ресурсів.\n@arrow_bonus_tier_2! Можна налагодити [Concept('import', 'імпорт')|e] їжі, уклавши [Concept('trades', 'торгові угоди')|e] щодо постачання [Concept('goods', 'товарів')|e] для її виробництва."
  hint_low_food_in_market_hint_text_3: "#T Додаткові поради#!\n@hint! Якщо скоротити кількість [Concept('buildings', 'споруд')|e] у будь-якій [Concept('location', 'місцевості')|e], її [Concept('pops', 'населенню')|e] доведеться повернутися до [Concept('subsistence_agriculture', 'натурального господарства')|e]."
  HINT_MARKET_ENTRY: "[MARKET.GetName]"
  HINT_BUILDING_ENTRY: "[BUILDING_TYPE.GetName]"
  LOW_FOOD_CAP_TEXT: "[SelectLocalization( StringIsEmpty( GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building') ), Localize('LOW_FOOD_NO'), Localize( 'LOW_FOOD_YES' ) )]"
  LOW_FOOD_YES: "\n@arrow_bonus_tier_1! Якщо є вільний [Concept('merchant_capacity', 'торговий потенціал')|e], можна імпортувати їжу з того ринку, де її в надлишку.\n\nЯкщо вільного потенціалу немає, його можна збільшити, побудувавши певні споруди, наприклад, такі як «[GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building')]»."
  LOW_FOOD_NO: "\n\nЯкщо є вільний [Concept('merchant_capacity', 'торговий потенціал')|e], можна імпортувати їжу з того ринку, де її в надлишку."
  LOW_MARKET_FOOD_TEXT: "$LIST$ — запас [Concept('food', 'їжі')|e] тут досяг критичного рівня.$LOW_FOOD_CAP_TEXT$"
  LOW_MARKET_FOOD_TEXT_BUILDINGS: "$LIST$ — запас [Concept('food', 'їжі')|e] тут досяг критичного рівня.\n\nЄ кілька способів подолати дефіцит їжі на ринку. Чим більше їжі виробляє місцевість, тим менше ресурсів вона витягує з провінції та свого ринку, а при надлишках виробництва — навіть допомагає іншим місцевостям.\n\n\n@arrow_bonus_tier_3! Основне джерело [Concept('food', 'їжі')] — [Concept('rgo', 'видобуток ресурсів')|e], особливо в місцевостях з високою [Concept('food_productivity', 'ефективністю виробництва їжі')|e]. Якщо на [Concept('market', 'ринку')] є дефіцит [Concept('food', 'їжі')], слід розширити видобуток.\n@arrow_bonus_tier_2! Наростити виробництво їжі також допоможуть певні [Concept('buildings', 'споруди')|e], наприклад «$BUILDING_LIST$», — за відповідності вироблених [Concept('goods', 'товарів')|e].$LOW_FOOD_CAP_TEXT$"
  hint_low_food_in_market_administrative: "«Ринки в місцевостях, виділених під виробництво їжі, — це не тільки безпека, а й найширші можливості заробити. Якщо від нас залежатиме життя інших, наш вплив стане майже безмежним»."
  hint_low_food_in_market_military: "«Інфраструктура — важливий чинник, що обмежує наші торгові можливості. Однак для імпортоорієнтованої економіки ще важливіший сильний військовий флот. Без нього ми станемо легкою здобиччю для кожного, кому сподобаються наші торгові шляхи»."
  hint_low_food_in_market_diplomatic: "«Побудова самодостатньої економіки, орієнтованої на виробництво їжі, — гідна мета, проте якщо годувати [GetPlayer.GetAdjectiveWithNoTooltip|l]ий народ буде імпортоорієнтована економіка, ми зможемо зосередити зусилля на виробництві інших, більш прибуткових товарів»."
  hint_over_diplo_capacity: "Перевищено дипломатичний потенціал"
  hint_over_diplo_capacity_hint_text: "$hint_over_diplo_capacity_hint_text_1$\n\n$hint_over_diplo_capacity_hint_text_2$\n\n$hint_over_diplo_capacity_hint_text_3$"
  hint_over_diplo_capacity_hint_text_1: "$game_concept_diplomatic_capacity_desc$"
  hint_over_diplo_capacity_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Якщо [Concept('diplomats', 'посли')|e] перестануть покращувати відносини з іншими країнами, це допоможе вивільнити частину потенціалу.\n@arrow_bonus_tier_2! Перегляньте наявні [Concept('alliances', 'союзи')|e] або [Concept('treaties', 'договори')|e]: можливо, частину з них слід розірвати.\n@arrow_bonus_tier_1! Залиште [Concept('international_organizations', 'міжнародні об’єднання')|e], які більше не приносять користі."
  hint_over_diplo_capacity_hint_text_3: "#T Додаткові поради#!\n@hint! У деяких випадках дипломатичний потенціал можна збільшити за допомогою [Concept('estate_privileges', 'станових привілеїв')|e], [Concept('laws', 'законів')|e] та [Concept('advances', 'поступу')|e]."
  hint_over_diplo_capacity_military: "«Нам варто було б розглядати союзи як засоби, що ведуть до мети, аніж як дружбу на віки. Наші союзники неодмінно вишкірять зуби, щойно ми проявимо слабкість…»"
  hint_over_diplo_capacity_administrative: "«Виснажені роботою посли, на жаль, гірше починають справлятися зі своїми завданнями. І хоча спокуса надмірно обтяжувати їх працею буває велика, в довгостроковій перспективі це не принесе нам користі»."
  hint_over_diplo_capacity_diplomatic: "«Якщо найважливішим напрямком для нас є внутрішній розвиток, то міцні союзи з лихвою заповнять нестачу військової могутності — нехай навіть уявної. Можливо, для початку доведеться розірвати частину інших відносин…»"
  hint_rebels_growing: "$game_concept_rebel_movements$"
  hint_rebels_growing_hint_text: "$hint_rebels_growing_hint_text_1$\n\n$hint_rebels_growing_hint_text_2$\n\n$hint_rebels_growing_hint_text_3$"
  hint_rebels_growing_hint_text_1: "Ваші [Concept('pops_with_icon', 'групи населення')|e] приєднуватимуться до [Concept('rebel_movements_with_icon', 'повстанських рухів')|e], якщо [Concept('pop_satisfaction_with_icon', 'задоволення')|e] цих груп опускається нижче #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V порога їх приєднання до повстанців#!#!.\n\nЗалежно від підтримки [Concept('rebel_movements', 'повстанські рухи')] щомісяця накопичуватимуть підтримку, наближаючись до відкритого повстання. При досягненні #W 100%#! підтримки рух розпочне [Concept('revolt_with_icon', 'повстання')|e] або [Concept('civil_war_with_icon', 'громадянську війну')|e].\n\nНайчастішими причинами підтримки повстання є низька [Concept('stability_with_icon', 'стабільність')|e], дискримінація [Concept('cultures_with_icon', 'культури')|e] та [Concept('religions_with_icon', 'релігії')|e], а також незадоволені [Concept('estates_with_icon', 'стани')|e]."
  hint_rebels_growing_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підтримуйте [Concept('stability_with_icon', 'стабільність')|e] та [Concept('legitimacy_with_icon', 'легітимність')|e] на максимальному рівні.\n@arrow_bonus_tier_2! Застосуйте [Concept('cabinet_action_with_icon', 'доручення')|e] #TOOLTIP:CABINET_ACTION,rebel_crackdown,X #L «Придушення бунту»#!#!, щоб зупинити зростання підтримки [Concept('rebellion', 'повстання')].\n@arrow_bonus_tier_1! Якщо в [Concept('province_with_icon', 'провінції')|e] з незадоволеними [Concept('pops', 'групами населення')] буде розміщене [Concept('army_with_icon', 'військо')|e], то його присутність допоможе жителям… краще #italic зрозуміти#! вашу точку зору.\n\nОднак зрештою найважливіше підвищити [pop_satisfaction_icon] задоволення повстанських [Concept('pops', 'груп населення')].\n@arrow_bonus_tier_2! Переконайтеся, що [Concept('cultures', 'культури')] з найбільшою кількістю представників у вашій [Concept('country', 'країні')] є [Concept('accepted_culture_short_with_icon', 'визнаними')|e] або [Concept('tolerated_culture_short', 'прийнятними')|e].\n@arrow_bonus_tier_1! Переконайтеся, що повстанські [Concept('pops', 'групи населення')] можуть задовольнити якомога більше [Concept('pop_needs_with_icon', 'потреб')|e] за рахунок свого [Concept('market_with_icon', 'ринку')|e].\n@arrow_bonus_tier_3! Підтримуйте високе [estate_icon] [Concept('estate_satisfaction', 'задоволення станів')|e], оскільки воно сильно впливає на [Concept('pops', 'групи населення')] з цього стану:\n$TAB$@arrow_bonus_tier_2! Роздавайте [Concept('privilege_with_icon', 'привілеї')|e]\n$TAB$@arrow_bonus_tier_2! Підкуповуйте [Concept('estate', 'стани')]\n$TAB$@arrow_bonus_tier_2! Знижуйте [Concept('taxes_with_icon', 'податки')|e]"
  hint_rebels_growing_hint_text_3: "#T Додаткові поради:#!\n@hint! [societal_values|e], такі як #TOOLTIP:SOCIETAL_VALUE,individualism_vs_communalism,X #L спільність#!#! та #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L самоврядність#!#! також можуть вплинути на ймовірність розвитку повстання.\n@hint! Повстанські [Concept('pops', 'групи населення')] приєднуються до різних [Concept('rebel_movements', 'повстанських рухів')] залежно від низки чинників. Наприклад, [Concept('nationalist_rebels_with_icon', 'націоналістичні повстанці')|e] приваблюють [Concept('pops', 'групи населення')] пригнобленої [Concept('culture', 'культури')]."
  hint_rebels_growing_military: "«На вигляд простий люд буває грізний, але на ділі рідко доходить до кровопролиття. Однак свою незібраність він з лихвою заповнює числом»."
  hint_rebels_growing_administrative: "«Від повстанців, безумовно, походить лише шкода, проте майже будь-яке повстання — це реакція. Якщо усунути причину їхнього невдоволення, ви не тільки втихомирите буйний люд, а й полегшите йому життя в країні»."
  hint_rebels_growing_diplomatic: "«Населення нашої країни різнорідне — кожен вірний власним переконанням. Завойовані народи набагато ймовірніше за інших спробують відокремитися і заснувати власний уряд або навіть приєднатися до іншої країни»."
  hint_call_for_peace: "Прагнення до миру"
  hint_call_for_peace_hint_text: "$hint_call_for_peace_hint_text_1$\n\n$hint_call_for_peace_hint_text_2$\n\n$hint_call_for_peace_hint_text_3$"
  hint_call_for_peace_hint_text_1: "Прагнення до миру може виникнути, якщо [Concept('war', 'війна')|e] занадто затягнулася або якщо ми відмовляємося підписати [Concept('peace_treaty', 'мирний договір')|e] навіть в умовах повної перемоги — або поразки."
  hint_call_for_peace_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Постарайтеся обмежити втрати та підписати договір, доки [Concept('war_exhaustion', 'втома від війни')|e] не досягла критичних значень.\n@arrow_bonus_tier_2! Іноді доведеться погодитися на менше, ніж ми розраховували, або навіть на програш у [Concept('war', 'війні')|e]."
  hint_call_for_peace_hint_text_3: "#T Додаткові поради#!\n@hint! Усе, що ми втратимо після передчасного підписання [Concept('peace_treaty', 'мирного договору')|e], можна буде повернути в наступних [Concept('war', 'війнах')|e]."
  hint_call_for_peace_diplomatic: "«Якщо ми не будемо дотримуватися звичаїв війни, наслідки для стабільності країни — і для нашого доброго імені за кордоном — виявляться справді катастрофічними. Адже якщо ми виставимо себе нерозсудливими, ніхто не стане нас слухати»."
  hint_call_for_peace_military: "«Війна є продовженням політики, тільки іншими засобами. Треба б записати цю думку, доки нас не випередили…»"
  hint_call_for_peace_administrative: "«З часом заклики до миру ставатимуть лише голоснішими й голоснішими. Народ можна втихомирити, але не можна постійно ним нехтувати»."
  hint_unprofitable_buildings: "Невигідні споруди"
  hint_unprofitable_buildings_hint_text: "$hint_unprofitable_buildings_hint_text_1$\n\n$hint_unprofitable_buildings_hint_text_2$\n\n$hint_unprofitable_buildings_hint_text_3$"
  hint_unprofitable_buildings_hint_text_1: "Споруди стануть невигідними, якщо сумарна вартість споживаних ними [Concept('goods', 'товарів')|e] перевищить цінність [Concept('produced_goods', 'вироблених там товарів')|e]."
  hint_unprofitable_buildings_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Постарайтеся здешевити споживані товари — наприклад, виробляти або [Concept('importing', 'імпортувати')|e] більше товарів, щоб підтримувати рясну пропозицію.\n@arrow_bonus_tier_3! Підніміть ціни на вироблені товари, створивши або забезпечивши додатковий попит.\n@arrow_bonus_tier_3! Якщо [Concept('buildings', 'споруди')|e] більше не відповідають нашим цілям, їх можна закрити @building_open! або навіть знищити.\n@arrow_bonus_tier_3! [Concept('market_owner', 'Власник ринку')|e] може накласти ембарго на країни, які експортують вироблені власником товари. Це дозволить підвищити ціни на власний експорт."
  hint_unprofitable_buildings_hint_text_3: "#T Додаткові поради#!\n@hint! Деякі споруди можна [Concept('subsidized', 'субсидувати')|e] @subsidy!. Субсидії стануть у пригоді, наприклад, у тому випадку, якщо [Concept('import', 'імпортна')|e] ціна товарів для задоволення [Concept('pop_needs', 'потреб населення')|e] або утримання війська занадто висока."
  hint_unprofitable_buildings_diplomatic: "«Стежити за тим, щоб промисловість цілої країни приносила прибуток, — нелегке завдання. Якщо вам не хочеться вникати в деталі, на допомогу завжди прийде бюрократичний апарат країни!»"
  hint_unprofitable_buildings_military: "«Чим ми сильніші, тим краще нам даватимуться здорові протекціоністські заходи. Питання ембарго та торговельних суперечок найкраще вирішуються, коли в розмову готові вступити гармати»."
  hint_unprofitable_buildings_administrative: "«Маніпуляція цінами вимагає хитромудрого та складного підходу. Досить хитрий діяч може не тільки створити на ринку попит, а й задовольнити його»."
  NO_HINTS_AVAILABLE: "Немає доступних підказок!"
  hint_trade: "Торгівля"
  hint_trade_hint_text: "$hint_trade_hint_text_1$\n\n$hint_trade_hint_text_2$\n\n$hint_trade_hint_text_3$"
  hint_trade_hint_text_1: "[Concept('trade', 'Торгівля')|e] — це переміщення [Concept('goods', 'товарів')|e] з одного [Concept('markets', 'ринку')|e] на інший, а також продаж і купівля їх на цих [Concept('markets', 'ринках')|e]."
  hint_trade_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Прокладіть нові [Concept('trade', 'торгові')|e] шляхи для придбання [Concept('goods', 'товарів')|e].\n@arrow_bonus_tier_2! Наростіть виробництво [Concept('goods', 'товарів')|e], щоб збільшити пропозицію."
  hint_trade_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('trade', 'Торговий')|e] шлях може бути як прибутковим, так і збитковим — це залежить від різниці в цінах між [Concept('export', 'експортним')|e] [Concept('markets', 'ринком')|e] (джерелом товару) та [Concept('import', 'імпортним')|e] (пунктом призначення).\n@hint! У кожної представленої на [Concept('market', 'ринку')|e] [Concept('country', 'країни')|e] є два показники: граничний [Concept('merchant_capacity', 'торговий потенціал')|e] — він необхідний для створення [Concept('trade', 'торгових')|e] шляхів — та [Concept('merchant_power', 'торгова перевага')|e], тобто місце в черзі на експорт [Concept('goods', 'товарів')|e] по [Concept('trade', 'торговим')|e] шляхам, якщо десь виникла нестача.\n@hint! За замовчуванням торгівлю на кожному окремому [Concept('market', 'ринку')|e] можна автоматизувати — для цього необхідно клацнути по відповідній шестерінці."
  hint_trade_military: "«Торгівля — для слабаків. Але коли ми підкоримо і землю, і моря, керувати потоками товарів буде саме наша країна»."
  hint_trade_administrative: "«Основа нашої стратегії — передбачення коливань цін за допомогою кидків кісток та розташування зірок на небосхилі»."
  hint_trade_diplomatic: "«Торгівля — один зі стовпів, на яких стоїть кожна повноцінна країна. Мабуть, у всьому світі не знайдеться швидших способів поповнити запаси»."
  hint_unused_trade_capacity: "Незадіяний торговий потенціал"
  hint_unused_trade_capacity_hint_text: "$hint_unused_trade_capacity_hint_text_1$\n\n$hint_unused_trade_capacity_hint_text_2$\n\n$hint_unused_trade_capacity_hint_text_3$"
  hint_unused_trade_capacity_hint_text_1: "[Concept('merchant_capacity_with_icon', 'Торговий потенціал')|e] необхідний для переміщення [Concept('goods_with_icon', 'товарів')|e] з одного [Concept('markets_with_icon', 'ринку')|e] на інший з метою отримання прибутку. Залучати [Concept('merchant_capacity', 'торговий потенціал')] завжди потрібно цілком."
  hint_unused_trade_capacity_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_1! Клацніть по сповіщенню, щоб переглянути задіяний ринок на @economy_panel![Link('trade', 'subtab = markets', 'панелі ринків')]. Тут можна розподілити торговий потенціал, обравши пропоновані угоди.\n@arrow_bonus_tier_1! Також можна клацнути по заголовку «Ринок», щоб перейти на панель ринку та ознайомитися зі списком актуальних для нього [Concept('goods', 'товарів')|e]. Натисніть кнопку «Експорт» або «Імпорт» поруч із [Concept('good', 'товаром')], щоб розпочати торгівлю.\n@automation! Спробуйте автоматизувати торгівлю на кожному ринку. Для цього натисніть кнопку із зображенням шестерні на картці ринку. Угоди завжди можна створювати та фіксувати вручну, навіть якщо торгівля вже автоматизована."
  hint_unused_trade_capacity_hint_text_3: "#T Додаткові поради#!\n@hint! Прибуток від [Concept('trade', 'торгівлі')] розподіляється між [Concept('estates_with_icon', 'станами')|e] (до їх числа входять і #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#!) згідно з їх [Concept('estate_power_with_icon', 'становою владою')|e]."
  hint_unused_trade_capacity_military: "«Про ймовірність безглуздого розпорядження ресурсами можу сказати тільки одне: я категорично проти цього»."
  hint_unused_trade_capacity_administrative: "«Необхідно якомога швидше повернутися до межі ефективності»."
  hint_unused_trade_capacity_diplomatic: "«Незадіяний торговий потенціал подібний до землі, в яку занадто давно не кидали насіння»."
  hint_unprofitable_trade_route: "Невигідний торговий шлях"
  hint_unprofitable_trade_route_hint_text: "$hint_unprofitable_trade_route_hint_text_1$\n\n$hint_unprofitable_trade_route_hint_text_2$\n\n$hint_unprofitable_trade_route_hint_text_3$"
  hint_unprofitable_trade_route_hint_text_1: "Якщо [Concept('trade', 'торговий')|e] шлях невигідний, це зазвичай вирішується двома способами: можна або скасувати шлях і замінити його на вигідний, або увімкнути автоматизацію для конкретного [Concept('market', 'ринку')|e]."
  hint_unprofitable_trade_route_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_1! Іноді зі збитками на [Concept('trade', 'торговому')|e] шляху доводиться миритися — наприклад, якщо по ньому перевозяться [Concept('goods', 'товари')|e] стратегічної важливості.\n@arrow_bonus_tier_1! До таких товарів належать, наприклад, деревина для зведення [Concept('building', 'споруд')|e] або їжа для [Concept('pops', 'населення')|e]."
  hint_unprofitable_trade_route_hint_text_3: "#T Додаткові поради#!\n@hint! На вигідність вже встановленого [Concept('trade', 'торгового')|e] шляху можна вплинути опосередковано — вплинути на ціни (а отже, на різницю цін щодо торгованого [Concept('good', 'товару')|e]) для ринків, що беруть участь в угоді. Для цього доведеться змінити [Concept('supply', 'пропозицію')|e] та [Concept('demand', 'попит')|e] на [Concept('good', 'товар')|e]."
  hint_unprofitable_trade_route_military: "«Може, краще буде відібрати у них товари, ніж платити за поставки?»"
  hint_unprofitable_trade_route_administrative: "«Втрати потрібно якомога швидше скорочувати. Торгівля — це не благодійність»."
  hint_unprofitable_trade_route_diplomatic: "«Не можна уникнути недосконалості — такий порядок речей, — але можна не давати їй розростатися»."
  hint_market_out_of_supply: "Нестача пропозиції на ринку"
  hint_market_out_of_supply_hint_text: "$hint_market_out_of_supply_hint_text_1$\n\n$hint_market_out_of_supply_hint_text_2$\n\n$hint_market_out_of_supply_hint_text_3$"
  hint_market_out_of_supply_hint_text_1: "Якщо загальний [Concept('demand', 'попит')|e] на будь-якому [Concept('market', 'ринку')|e] занадто великий порівняно з обмеженою [Concept('supply', 'пропозицією')|e], ми можемо не отримати [Concept('goods', 'товари')|e], які намагаємося [Concept('export', 'експортувати')|e] або [Concept('import', 'імпортувати')|e]. Це призводить до нестачі товарів."
  hint_market_out_of_supply_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Неприбуткові [Concept('trade', 'торгові')|e] шляхи можна негайно скасувати, а вивільнений [Concept('merchant_capacity', 'торговий потенціал')|e] — направити на інші види [Concept('goods', 'товарів')|e].\n@arrow_bonus_tier_1! Збільшення [Concept('merchant_power', 'торгової переваги')|e] на відповідному [Concept('market', 'ринку')|e] може розширити наш доступ до місцевих товарів."
  hint_market_out_of_supply_hint_text_3: "#T Додаткові поради#!\n@hint! Є цілий ряд джерел [Concept('merchant_power', 'торгової переваги')|e]: [Concept('advances', 'поступ')|e], [Concept('privileges', 'привілеї')|e], [Concept('policies', 'політики')|e] і не тільки.\n@hint! Можна також спробувати збільшити [Concept('supply', 'пропозицію')|e], але навряд чи вийде зробити це швидко: тут потрібен довготривалий стратегічний підхід."
  hint_market_out_of_supply_military: "«Іноді нам бракуватиме товарів для експорту, і тоді військова машина буде спотикатися. Розібратися з цим потрібно якомога швидше»."
  hint_market_out_of_supply_administrative: "«Варто замислитися, як збільшити нашу справедливу — а як інакше? — торгову перевагу будь-якими способами»."
  hint_market_out_of_supply_diplomatic: "«Можливо, варто урізноманітнити наші торгові угоди та відійти від беззмінної одноманітності»."
  hint_increasing_trade_capacity: "Збільшення торговельного потенціалу"
  hint_increasing_trade_capacity_hint_text: "$hint_increasing_trade_capacity_hint_text_1$\n\n$hint_increasing_trade_capacity_hint_text_2$\n\n$hint_increasing_trade_capacity_hint_text_3$"
  hint_increasing_trade_capacity_hint_text_1: "Від [Concept('merchant_capacity', 'торговельного потенціалу')|e] залежить обсяг [Concept('trade', 'торгівлі')|e], доступної [Concept('country', 'країні')|e]."
  hint_increasing_trade_capacity_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Будуйте більше [Concept('buildings', 'споруд')|e], які збільшують потенціал, наприклад #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! або #TOOLTIP:BUILDING_TYPE,market_village,X #L торгові села#!#!.\n@arrow_bonus_tier_2! Певні [Concept('advances', 'поступи')|e] або [Concept('laws', 'закони')|e] також можуть збільшити [Concept('merchant_capacity', 'торговельний потенціал')|e]."
  hint_increasing_trade_capacity_hint_text_3: "#T Додаткові поради#!\n@hint! Чим більший [Concept('merchant_capacity', 'торговельний потенціал')|e], тим більше товарів беруть участь в угодах, а отже — вищий [Concept('income', 'дохід')|e]."
  hint_increasing_trade_capacity_military: "«Чим більші розміри нашої країни, тим більше можливостей для торгівлі. Це майже синоніми»."
  hint_increasing_trade_capacity_administrative: "«Проблему нестачі торговельного потенціалу — як і будь-яку іншу проблему, що стоїть перед людством, — можна вирішити дуже просто: потрібно більше ринків»."
  hint_increasing_trade_capacity_diplomatic: "«Обробка ґрунту для товарного обміну скрізь, де тільки можна, забезпечить нам бурхливий потік товарів»."
  hint_increasing_trade_advantage: "$game_concept_merchant_power$"
  hint_increasing_trade_advantage_hint_text: "$hint_increasing_trade_advantage_hint_text_1$\n\n$hint_increasing_trade_advantage_hint_text_2$\n\n$hint_increasing_trade_advantage_hint_text_3$"
  hint_increasing_trade_advantage_hint_text_1: "[Concept('merchant_power_with_icon', 'Торговельна перевага')|e] визначає, яка [Concept('country_with_icon', 'країна')|e] першою отримує доступ до [Concept('trade_with_icon', 'торгівлі')|e] [Concept('goods_with_icon', 'товарами')|e] на [Concept('market_with_icon', 'ринку')|e].\n\nЯкщо дві [Concept('countries', 'країни')] намагаються купити [Concept('good', 'товар')], але його занадто мало для них обох, першою товар купить країна, у якої більше [Concept('merchant_power', 'торговельної переваги')] на цьому [Concept('market', 'ринку')].\n\nВрахуйте, що [Concept('merchant_power', 'торговельна перевага')] застосовується лише до [Concept('trade', 'торгівлі')]. [Concept('locations', 'Місцевості')|e] при купівлі [Concept('goods', 'товарів')] для [Concept('constructions', 'будівництва')|e] та [Concept('pop_needs', 'населення')|e] спираються на [Concept('market_access', 'доступ до ринку')|e]."
  hint_increasing_trade_advantage_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Встановіть контроль над більшою кількістю [Concept('locations_with_icon', 'місцевостей')|e], що належать до цього [Concept('market', 'ринку')].\n@arrow_bonus_tier_2! Збільште [Concept('maritime_presence_with_icon', 'морську присутність')|e] у прибережних водах [Concept('market', 'ринку')].\n@arrow_bonus_tier_1! Деякі [Concept('buildings_with_icon', 'споруди')|e], наприклад #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!, також збільшують [Concept('merchant_power', 'торговельну перевагу')]."
  hint_increasing_trade_advantage_hint_text_3: "#T Додаткові поради#!\n@hint!#italic Щоб дізнатися більше, ознайомтеся з [Link('hints', 'selected_hint = hint_trade', 'порадами щодо торгівлі')] та [Link('hints', 'selected_hint = hint_maritime', 'морської присутності')]."
  hint_increasing_trade_advantage_military: "«Торгівля — заняття змагальне, а не спільне. Цілком природно, що в когось має бути перевага»."
  hint_increasing_trade_advantage_administrative: "«Основа нашої стратегії — передбачення коливань цін за допомогою кидків кісток та розташування зірок на небосхилі»."
  hint_increasing_trade_advantage_diplomatic: "«Торгівля — один зі стовпів, на яких стоїть кожна повноцінна країна. Мабуть, у всьому світі не знайдеться швидших способів поповнити запаси»."
  hint_pops_with_needs_yellow: "Населення потребує товарів"
  hint_pops_with_needs_yellow_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_yellow_hint_text_2$\n\n$hint_pops_with_needs_yellow_hint_text_3$"
  hint_pops_with_needs_yellow_hint_text_1: "[Concept('pops_with_icon', 'Групи населення')|e] намагатимуться купувати необхідні їм повсякденні [Concept('goods_with_icon', 'товари')|e] на [Concept('market_with_icon', 'ринку')|e] тієї [Concept('location_with_icon', 'місцевості')|e], де живуть. Якщо вони не можуть купити необхідні [Concept('goods', 'товари')], [Concept('pop_satisfaction', 'задоволення')|e] цих [Concept('pops', 'груп населення')|e] відповідно знижуватиметься. Якщо значення модифікатора #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V «Поріг приєднання населення до повстанців»#!#! з будь-якої причини (наприклад, через нестачу [Concept('goods', 'товарів')]) буде більшим, ніж значення [Concept('pop_satisfaction', 'задоволення')], такі [Concept('pops', 'групи населення')] можуть підтримати [Concept('rebellion_with_icon', 'повстання')|e] проти [Concept('government', 'уряду')]."
  hint_pops_with_needs_yellow_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Намагайтеся підтримувати [Concept('stability_with_icon', 'стабільність')|e], [Concept('legitimacy_with_icon', 'легітимність')|e] та [Concept('estate_satisfaction', 'задоволення станів')|e] на високому рівні, щоб не допустити [Concept('rebellions', 'повстань')].\n@arrow_bonus_tier_1! Нарощуйте виробництво [Concept('goods', 'товарів')|e], що користуються попитом: розширюйте [Concept('rgo_with_icon', 'видобуток ресурсів')|e] та будуйте [Concept('buildings_with_icon', 'споруди')|e] на @production_panel![Link('goods_production', '', 'панелі виробництва товарів')].\n@arrow_bonus_tier_1! Спрямуйте [Concept('merchant_capacity_with_icon', 'торговельний потенціал')|e] на імпорт [Concept('goods', 'товарів')] з інших [Concept('markets', 'ринків')]."
  hint_pops_with_needs_yellow_hint_text_3: "#T Додаткові поради#!\n@hint! Поки [Concept('pops', 'населення')] не бунтує, незадоволені потреби підданих не повинні сильно вас турбувати. Але пам'ятайте, що такі настрої загалом відображають стан [Concept('market', 'ринку')].\n@hint! Потреби груп населення — лише один із чинників, що впливають на їх [Concept('pop_satisfaction', 'задоволення')]. Народ може підняти повстання, навіть якщо всі його потреби задоволені.\n@hint! Дізнатися більше про [Concept('rebel_movements_with_icon', 'повстанські рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_pops_with_needs_yellow_military: "«Сильного правителя не хвилюють примхи черні»."
  hint_pops_with_needs_yellow_administrative: "«Там, де недосвідчений погляд бачить знедолене населення, я бачу чудову можливість нажитися»."
  hint_pops_with_needs_yellow_diplomatic: "«Люди завжди вимагають більшого, ніж заслуговують. Але будьте обережні: надмірна нестача необхідного може підштовхнути ваших підданих до повстання»."
  hint_pops_with_needs_red: "Повстанське населення потребує товарів"
  hint_pops_with_needs_red_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_2$\n\n$hint_pops_with_needs_red_hint_text_3$"
  hint_pops_with_needs_red_hint_text_1: "Частина наших [Concept('pops', 'груп населення')] переходить на бік [Concept('rebel_movements', 'повстанців')]. Якщо збільшити пропозицію необхідних [Concept('goods', 'товарів')], можливо, частина бунтівників припинить [Concept('rebellions', 'повстання')]."
  hint_pops_with_needs_red_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Постарайтеся підвищити [Concept('stability', 'стабільність')|e], [Concept('legitimacy', 'легітимність')|e] та [Concept('estate_satisfaction', 'задоволення станів')|e].\n@arrow_bonus_tier_1! Нарощуйте виробництво [Concept('goods', 'товарів')|e], що користуються попитом: розширюйте [Concept('rgo', 'видобуток ресурсів')|e] та будуйте [Concept('buildings', 'споруди')|e] на @production_panel![Link('goods_production', '', 'панелі виробництва товарів')].\n@arrow_bonus_tier_1! Спрямуйте [Concept('merchant_capacity', 'торговельний потенціал')|e] на імпорт [Concept('goods', 'товарів')] з інших [Concept('markets', 'ринків')].\n@arrow_bonus_tier_1! У крайньому разі тримайте напоготові [Concept('armies', 'війська')|e], щоб приборкати повстанців."
  hint_pops_with_needs_red_hint_text_3: "#T Додаткові поради#!\n@hint! Потреби груп населення — лише один із чинників, що впливають на їх [Concept('pop_satisfaction', 'задоволення')]. Народ може підняти повстання, навіть якщо всі його потреби задоволені.\n@hint! Дізнатися більше про [Concept('rebel_movements_with_icon', 'повстанські рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_pops_with_needs_red_diplomatic: "«Надійні поставки найважливіших товарів — цілком дієвий спосіб змусити бунтівні голоси замовкнути»."
  hint_pops_with_needs_red_administrative: "«Будь-який заколот розорить наших купців. Необхідно якнайшвидше наростити виробництво, доки народ не взявся за зброю!»"
  hint_pops_with_needs_red_military: "«Голодний натовп — це не страшно. Наше військо з ним розбереться»."
  hint_has_possible_reform: "Можливі реформи"
  hint_has_possible_reform_hint_text: "$hint_has_possible_reform_hint_text_1$\n\n$hint_has_possible_reform_hint_text_2$\n\n$hint_has_possible_reform_hint_text_3$"
  hint_has_possible_reform_hint_text_1: "[Concept('government_reforms_with_icon', 'Державні реформи')|e] — одна з найважливіших особливостей нашої [Concept('country_with_icon', 'країни')|e]. [Concept('reforms', 'Реформи')] слід приймати одразу, щойно це стає можливим."
  hint_has_possible_reform_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Натисніть на зображення плюса під карткою #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#! на @government_panel![Link('government', 'tabcontent = estates', 'панелі уряду')], щоб провести нову [Concept('reform', 'реформу')]."
  hint_has_possible_reform_hint_text_3: "#T Додаткові поради#!\n@hint! У ході гри вам відкриватимуться нові [Concept('government_reforms', 'державні реформи')] завдяки [Concept('advances_with_icon', 'поступу')|e] та [Concept('events', 'подіям')|e].\n@hint! На скасування [Concept('government_reforms', 'державних реформ')] витрачається [Concept('stability_with_icon', 'стабільність')|e], а їх прийняття вимагає багато часу. Намагайтеся обирати реформи обачно.\n@hint! Певні [Concept('government_reforms', 'реформи')] вимагають руху [Concept('country', 'країни')] у бік якоїсь [Concept('societal_value_with_icon', 'суспільної цінності')|e]."
  hint_has_possible_reform_diplomatic: "«Чітко вибудуваний уряд — ознака здорової влади»."
  hint_has_possible_reform_administrative: "«Не можна, щоб іноземні країни хибно тлумачили суть нашого уряду, — адже їм треба знати, як до нас звертатися»."
  hint_has_possible_reform_military: "«Як ми збираємося захищатися від ворогів, якщо ми навіть не можемо сказати, хто ми є?»"
  hint_has_conquered_provinces: "Неінтегровані провінції"
  hint_has_conquered_provinces_hint_text: "$hint_has_conquered_provinces_hint_text_1$\n\n$hint_has_conquered_provinces_hint_text_2$\n\n$hint_has_conquered_provinces_hint_text_3$"
  hint_has_conquered_provinces_hint_text_1: "[Concept('conquered_with_icon', 'Завойовані')|e] [Concept('locations_with_icon', 'місцевості')|e] потрібно [Concept('integrated', 'інтегрувати')|e] до складу нашої країни, щоб вони примножували її багатство. Усі [Concept('locations', 'місцевості')] слід [Concept('integrate', 'інтегрувати')] якомога швидше."
  hint_has_conquered_provinces_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Доручіть [Concept('cabinet_with_icon', 'раді')|e] #TOOLTIP:CABINET_ACTION,integrate_province,X #L інтегрувати провінцію#!#!, обравши цю дію на @government_panel![Link('government', 'tabcontent = cabinet', 'панелі уряду')].\n@arrow_bonus_tier_1! Якщо [Concept('cabinet', 'рада')] не встигає за нашими темпами завоювань, можна створити [Concept('subject_with_icon', 'васала')|e], який правитиме там замість нас. Щоб це зробити, відкрийте @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'панель дипломатії')]."
  hint_has_conquered_provinces_hint_text_3: "#T Додаткові поради#!\n@hint! В експансіоністських [Concept('countries', 'країнах')|e] інтеграція нових територій — одне з найважливіших завдань [Concept('cabinet', 'ради')|e].\n@hint! [Concept('pop_satisfaction', 'Задоволення')|e] населення в [Concept('conquered', 'завойованих')] [Concept('locations', 'місцевостях')] буде значно нижчим, що може призвести до [Concept('rebellions_with_icon', 'заколоту')|e].\n@hint! Щоб прискорити інтеграцію, призначте більш талановитих [Concept('characters', 'персонажів')|e] на посади [Concept('cabinet_members', 'радників')|e]. Крім того, швидкість інтеграції безпосередньо залежить від загальної [Concept('cabinet_efficiency', 'ефективності ради')|e] нашої [Concept('country', 'країни')].\n@hint! Інтеграція місцевості пройде швидше, якщо наша [Concept('primary_culture', 'основна культура')|e] одночасно є там [Concept('dominant_culture', 'домінуючою')|e] або якщо наш [Concept('cultural_influence', 'культурний вплив')|e] сильніший за [Concept('cultural_tradition', 'спадщину')|e] [Concept('dominant_culture', 'домінуючої культури')]."
  hint_has_conquered_provinces_diplomatic: "«Піддані, яких ми щойно… #italic придбали#!, не відразу приймуть нашу владу. Інтеграція — довгий і трудомісткий процес, але він вкрай важливий для підтримки стабільності»."
  hint_has_conquered_provinces_administrative: "«Жодна справа не буде ладитися, якщо в країні панує хаос. Для процвітання необхідна влада закону»."
  hint_has_conquered_provinces_military: "«Від бюрократів іноді буває користь: без умілих управлінців ми нізащо не змогли б зігнати людей в ополчення»."
  hint_has_possible_cabinet_action: "Можливі доручення"
  hint_has_possible_cabinet_action_hint_text: "$hint_has_possible_cabinet_action_hint_text_1$\n\n$hint_has_possible_cabinet_action_hint_text_2$\n\n$hint_has_possible_cabinet_action_hint_text_3$"
  hint_has_possible_cabinet_action_hint_text_1: "[Concept('cabinet_actions_with_icon', 'Доручення')|e] — один із найдієвіших інструментів з управління країною. Слід постійно стежити за тим, щоб [Concept('cabinet_seats_with_icon', 'місця в раді')|e] не пустували."
  hint_has_possible_cabinet_action_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Відкрийте @government_panel![Link('government', 'tabcontent = cabinet', 'панель уряду')], щоб ознайомитися з доступними діями ради.\n@arrow_bonus_tier_3! #TOOLTIP:CABINET_ACTION,integrate_province,X #L Інтеграція провінції#!#! корисна, якщо нещодавно ми [Concept('conquered', 'завоювали')|e] якусь територію.\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,stabilize_country,X #L Підвищення стабільності в країні#!#! корисне, якщо в країні низька [Concept('stability', 'стабільність')|e].\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,strengthen_government,X #L Зміцнення уряду#!#! корисне, якщо у нас низька [Concept('legitimacy_with_icon', 'легітимність')|e].\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,diplomatic_endeavors,X #L Дипломатичні зусилля#!#! полегшують [Concept('diplomacy', 'дипломатію')|e].\n@arrow_bonus_tier_1! #TOOLTIP:CABINET_ACTION,change_societal_values,X #L Зміна суспільних цінностей#!#! корисна, якщо ми хочемо рухатися за певною шкалою [Concept('societal_value', 'цінностей')|e].\n@arrow_bonus_tier_1! #TOOLTIP:CABINET_ACTION,develop_province,X #L Розвиток провінції#!#! допоможе нам зміцнити [Concept('development_with_icon', 'розвиток')|e] у найцінніших [Concept('provinces_with_icon', 'провінціях')|e].\n@arrow_bonus_tier_1! За допомогою [Concept('cabinet_actions', 'доручень')] також можна [Concept('convert_with_icon', 'навертати')|e] прихильників інших [Concept('religions_with_icon', 'релігій')|e] у свою або [Concept('assimilate_with_icon', 'асимілювати')|e] інші [Concept('cultures_with_icon', 'культури')|e].\n@automation! Також діяльність ради можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]."
  hint_has_possible_cabinet_action_hint_text_3: "#T Додаткові поради#!\n@hint! Призначені до [Concept('cabinet', 'ради')|e] [Concept('characters', 'персонажі')|e] збільшують [Concept('estate_power', 'владу')|e] свого [Concept('estate', 'стану')|e].\n@hint! У наступні [Concept('ages', 'доби')|e] стануть доступні нові [Concept('cabinet_actions', 'доручення')]."
  hint_has_possible_cabinet_action_diplomatic: "«Бюрократія — плоть і кров будь-якої країни… за умови, що нею не керують дурні»."
  hint_has_possible_cabinet_action_administrative: "«Рада — головна сила країни, що перетворює безплідні пустелі на процвітаючі міста»."
  hint_has_possible_cabinet_action_military: "«Сильна рада здатна вгамувати будь-яких незгодних, хоч би якими гучними вони не були.\nЛише віддайте наказ — і його буде виконано»."
  hint_has_possible_law: "Закони не укладені"
  hint_has_possible_law_hint_text: "$hint_has_possible_law_hint_text_1$\n\n$hint_has_possible_law_hint_text_2$\n\n$hint_has_possible_law_hint_text_3$"
  hint_has_possible_law_hint_text_1: "Слід потурбуватися про те, щоб стосовно кожного [Concept('laws', 'закону')|e] нашої [Concept('country', 'країни')|e] постійно діяла якась [Concept('policy', 'політика')|e], інакше ми втратимо корисні переваги."
  hint_has_possible_law_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Клацніть по сповіщенню, щоб переглянути [Concept('laws', 'закони')], стосовно яких не діє якась [Concept('policy', 'політика')]. Обирайте обачно.\n@arrow_bonus_tier_3! Побачити чинні [Concept('laws', 'закони')] можна на @government_panel![Link('government', 'tabcontent = politics', 'панелі уряду')].\n@automation! Законодавство також можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]."
  hint_has_possible_law_hint_text_3: "#T Додаткові поради#!\n@hint! На ухвалення [Concept('policies', 'політик')] потрібен час, який залежить від нашої [Concept('legislative_efficiency', 'законодавчої ефективності')|e]. Ефект від ухвалення політики не відразу проявиться повною мірою.\n@hint! Ухвалену [Concept('policy', 'політика')] згодом можна буде змінити, витративши на це [Concept('gold', 'дукати')|e] та [Concept('stability', 'стабільність')|e]. Обсяг витрат залежить від нашої [Concept('crown_power', 'влади правителя')|e].\n@hint! У наступні [Concept('ages', 'доби')|e] стануть доступні нові [Concept('laws', 'закони')] та [Concept('policies', 'політики')]."
  hint_has_possible_law_diplomatic: "«Країна без законів — як будівля без опор або тіло без кінцівок: краще надлишок, ніж нестача»."
  hint_has_possible_law_administrative: "«Звід законів країни має переслідувати три цілі: розвиток міст, захист купців та своєчасний збір податків»."
  hint_has_possible_law_military: "«Ухвалювати нові закони — важливо, забезпечувати їх дотримання — життєво важливо»."
  hint_has_army_without_leader: "Немає командира"
  hint_has_army_without_leader_hint_text: "$hint_has_army_without_leader_hint_text_1$\n\n$hint_has_army_without_leader_hint_text_2$\n\n$hint_has_army_without_leader_hint_text_3$"
  hint_has_army_without_leader_hint_text_1: "Щоб наші [Concept('units', 'загони')|e] успішно билися в [Concept('battle', 'бою')|e], їм потрібен [Concept('commander', 'командир')|e]. [Concept('armies', 'Військами')] командують [Concept('generals', 'полководці')|e], а [Concept('navies', 'флотами')] — [Concept('admirals', 'флотоводці')]."
  hint_has_army_without_leader_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Клацніть по #W сповіщенню#!, щоб обрати [Concept('character', 'персонажа')|e], придатного для керування [Concept('unit', 'загоном')]. Командирами краще призначати персонажів з високим рівнем [Concept('abilities', 'навичок')|e].\n@arrow_bonus_tier_2! Також [Concept('unit', 'загін')] можна обрати на мапі або в #W планувальнику#!.\n@arrow_bonus_tier_2! Якщо у вас немає достатньо вмілих [Concept('character', 'персонажів')], потенційного командира можна спробувати навчити на @military_panel![Link('unit_overview', '', 'панелі загонів')].\n@automation! Призначення [Concept('generals', 'полководців')] та [Concept('admirals', 'флотоводців')] можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]."
  hint_has_army_without_leader_hint_text_3: "#T Додаткові поради#!\n@hint! Не починайте [Concept('battle', 'битву')], якщо у вас немає вмілого [Concept('commander', 'командира')|e]!\n@hint! Деякі [Concept('characters', 'персонажі')|e] мають [Concept('traits', 'риси')|e], які дозволяють їм краще справлятися з певними завданнями.\n@hint! Деякі [Concept('laws', 'закони')|e] обмежують право певних [Concept('characters', 'персонажів')|e] обіймати командну посаду."
  hint_has_army_without_leader_diplomatic: "«Будь-якому війську завжди потрібен полководець. Нам, однак, слід бути обережними: за рахунок впливу командирів збільшуватиметься влада їхнього стану»."
  hint_has_army_without_leader_administrative: "«Прошу, не звертайтеся з цим до мене. Таку грубу справу, як війна, я волію довіряти менш… #italic витонченим#! радникам»."
  hint_has_army_without_leader_military: "«Атакувати ворога, коли в загоні немає гідного командира, — це самогубство.\nУ жодному разі не варто так чинити»."
  hint_is_heir_underage: "Неповнолітній спадкоємець"
  hint_is_heir_underage_hint_text: "$hint_is_heir_underage_hint_text_1$\n\n$hint_is_heir_underage_hint_text_2$"
  hint_is_heir_underage_hint_text_1: "Якщо наш [Concept('ruler', 'правитель')|e] помре, перш ніж [Concept('heir', 'спадкоємець')|e] досягне повноліття, в країні встановиться [Concept('regency', 'регентство')|e]. Кермо влади візьме — залежно від обставин — представник найвпливовішого [Concept('estate', 'стану')|e]. На час міжцарів'я [Concept('estate_power', 'влада')|e] цього стану значно зросте."
  hint_is_heir_underage_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_1! У цьому випадку вам залишається лише одне: чекати… і, можливо, не ризикувати життям [Concept('ruler', 'правителя')] даремно. Якщо тільки [Concept('ruler', 'правитель')], звичайно, не виявиться зовсім невмілим…"
  hint_is_heir_underage_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('regency', 'Регентство')|e] — не найгірший результат, якщо взяти на себе цю відповідальність може досить вмілий [Concept('character', 'персонаж')|e]."
  hint_is_heir_underage_diplomatic: "«Забезпечити собі спадкоємність означає забезпечити країні майбутнє»."
  hint_is_heir_underage_administrative: "«Немає надійніших способів зблизити дві країни, ніж шлюб та династичні узи»."
  hint_is_heir_underage_military: "«Виховувати зі спадкоємців гідних правителів найкраще, коли ті ще молоді»."
  hint_has_unmarried_adult_ruler: "Правитель не в шлюбі"
  hint_has_unmarried_adult_ruler_hint_text: "$hint_has_unmarried_adult_ruler_hint_text_1$\n\n$hint_has_unmarried_adult_ruler_hint_text_2$\n\n$hint_has_unmarried_adult_ruler_hint_text_3$"
  hint_has_unmarried_adult_ruler_hint_text_1: "Ми повинні влаштувати [Concept('ruler', 'правителю')|e] шлюб по можливості з гідним кандидатом, щоб [Concept('dynasty', 'династія')|e] стала більшою та сильнішою. Плідний королівський нащадок не тільки забезпечить нам мирну та стабільну спадкоємність — [Concept('characters', 'персонажі')|e]-принци непогано проявляють себе на урядових посадах."
  hint_has_unmarried_adult_ruler_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Клацніть по сповіщенню, щоб підшукати кандидатів для [Concept('royal_marriage', 'династичного шлюбу')|e]. Монархічні країни можуть укладати між собою династичні шлюби, щоб закріпити [Concept('opinion', 'думку')] один про одного та закласти основи для майбутнього [Concept('alliance', 'союзу')|e]. Крім того, [Concept('royal_marriages', 'династичні шлюби')|e] — це крок на шляху до [Concept('personal_union', 'особистої унії')|e].\n@arrow_bonus_tier_2! Укласти шлюб між вашим [Concept('ruler', 'правителем')] або [Concept('heir', 'спадкоємцем')] та відповідним [Concept('character', 'персонажем')|e] можна при дворі. Для цього оберіть взаємодію #TOOLTIP:CHARACTER_INTERACTION,marry_noble,X #L «Шлюб зі знатною людиною»#!#!, клацнувши правою кнопкою миші по портрету персонажа.\n@arrow_bonus_tier_1! Якщо немає більш прийнятних варіантів, завжди доступна крайня та непопулярна міра — #TOOLTIP:CHARACTER_INTERACTION,marry_lowborn,X #L шлюб з простолюдом#!#!."
  hint_has_unmarried_adult_ruler_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('characters', 'Персонажі')] з правлячої [Concept('dynasty', 'династії')] завжди належать до стану #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!, тому їх призначення на відповідальні [Concept('roles', 'ролі')|e] не зміцнює владу інших [Concept('estates', 'станів')|e] нашої країни."
  hint_has_unmarried_adult_ruler_diplomatic: "$hint_is_heir_underage_diplomatic$"
  hint_has_unmarried_adult_ruler_administrative: "$hint_is_heir_underage_administrative$"
  hint_has_unmarried_adult_ruler_military: "«Кожному мечу потрібні піхви»."
  hint_can_do_more_research: "Дослідження"
  hint_can_do_more_research_hint_text: "$hint_can_do_more_research_hint_text_1$\n\n$hint_can_do_more_research_hint_text_2$\n\n$hint_can_do_more_research_hint_text_3$"
  hint_can_do_more_research_hint_text_1: "У нашій [Concept('country', 'країні')|e] постійно мають досліджуватися нові [Concept('advances', 'поступи')|e]."
  hint_can_do_more_research_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Відкрийте @advances_panel![Link('advances', 'subtab = research', 'панель поступу')] та виберіть необхідне.\n@arrow_bonus_tier_2! Також можна клацнути по зображенню порожньої склянки у правому верхньому куті, щоб відкрити @advances_panel![Link('technology_view', '', 'панель технологій')] цілком.\n@automation! Якщо ви поки не готові вивчати тонкощі механіки [Concept('advances', 'поступу')], її можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]. Щойно країна досягне нового [Concept('advance', 'поступу')|e], ви одразу ж отримаєте про це сповіщення."
  hint_can_do_more_research_hint_text_3: "#T Додаткові поради#!\n@hint! Невикористані одиниці дослідження якийсь час будуть накопичуватися, а при досягненні певної межі — почнуть пропадати.\n@hint! [Concept('research_progress', 'Дослідницькі напрацювання')|e] можна прискорити, підвищивши середній рівень [Concept('literacy', 'грамотності')|e] в країні, а також [Concept('estate_satisfaction', 'задоволення')|e] #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#!."
  hint_can_do_more_research_diplomatic: "«Технології здатні значно полегшити нам управління володіннями»."
  hint_can_do_more_research_administrative: "«При гідних вкладеннях ми можемо зробити економіку набагато ефективнішою»."
  hint_can_do_more_research_military: "«Наші професійні війська повинні постійно вдосконалюватися, інакше ми безнадійно відстанемо від ворогів»."
  hint_lack_cabinet_for_cabinet_action: "У раді не вистачає учасника"
  hint_lack_cabinet_for_cabinet_action_hint_text: "$hint_lack_cabinet_for_cabinet_action_hint_text_1$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_2$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_3$"
  hint_lack_cabinet_for_cabinet_action_hint_text_1: "Ефективність [Concept('cabinet_action', 'доручення')|e] буде невисокою, якщо її виконуватиме не дуже вмілий [Concept('character', 'персонаж')|e]. Завжди намагайтеся заповнювати всі [Concept('cabinet_seats', 'місця в раді')|e], призначаючи на них [Concept('characters', 'персонажів')]."
  hint_lack_cabinet_for_cabinet_action_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Клацніть по #W сповіщенню#!, щоб відкрити @government_panel![Link('government', 'tabcontent = cabinet', 'панель уряду')] та призначити на порожнє [Concept('cabinet_seat', 'місце в раді')] [Concept('character', 'персонажа')|e] з максимально високим рівнем відповідного [Concept('ability', 'навичка')|e].\n@arrow_bonus_tier_1! За відсутності вмілих [Concept('characters', 'персонажів')] можна найняти нового [Concept('courtier', 'придворного')|e].\n@automation! Раду можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]."
  hint_lack_cabinet_for_cabinet_action_hint_text_3: "#T Додаткові поради#!\n@hint! Кожне [Concept('cabinet_action', 'доручення')|e] вимагає володіння однією із трьох [Concept('abilities', 'навичок')|e] персонажа, тому намагайтеся вибирати радників відповідно до призначуваних завдань.\n@hint! [Concept('cabinet_members', 'Радники')|e] збільшують [Concept('estate_power', 'владу')|e] свого [Concept('estate', 'стану')|e]."
  hint_lack_cabinet_for_cabinet_action_diplomatic: "«Найкраще керують там, де засідають лише найкращі»."
  hint_lack_cabinet_for_cabinet_action_administrative: "«Чим краще наша країна справляється зі своїми обов'язками, тим краще ми виглядаємо в очах інших»."
  hint_lack_cabinet_for_cabinet_action_military: "«Явно демонструвати оточуючим свою силу ми зможемо лише тоді, коли нами правитимуть здібні люди»."
  hint_inflation: "Інфляція"
  hint_inflation_hint_text: "$hint_inflation_hint_text_1$\n\n$hint_inflation_hint_text_2$"
  hint_inflation_hint_text_1: "Інфляція збільшує всі витрати нашої [Concept('country', 'країни')|e], тому її зростання рекомендується уникати. Вона досить швидко підвищується при [Concept('minting', 'карбуванні')|e] монет, а ось її зниження може виявитися складним завданням."
  hint_inflation_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Зростання [Concept('inflation', 'інфляції')] можна зупинити, зменшивши обсяг [Concept('minting', 'карбування')] за допомогою відповідного повзунка на @economy_panel![Link('economy', '', 'панелі економіки')].\n@arrow_bonus_tier_2! Якщо інфляція вже досягла значного рівня, встановлення повзунка на мінімальне значення дозволить її знизити."
  hint_inflation_hint_text_3: "#T Додаткові поради#!\n@hint! Є й інші способи боротьби з інфляцією — наприклад, певні [Concept('advances', 'поступи')|e]."
  hint_inflation_diplomatic: "«Збережи нас рок від цієї невидимої хвороби економіки»."
  hint_inflation_administrative: "«Карбування монет може здатися спокусливим рішенням при нестачі коштів, але в перспективі воно несе одні проблеми»."
  hint_inflation_military: "«Інфляція — повільний і невблаганний вбивця»."
  hint_has_disloyal_subjects: "Нелояльні васали"
  hint_has_disloyal_subjects_hint_text: "$hint_has_disloyal_subjects_hint_text_1$\n\n$hint_has_disloyal_subjects_hint_text_2$\n\n$hint_has_disloyal_subjects_hint_text_3$"
  hint_has_disloyal_subjects_hint_text_1: "[Concept('subjects', 'Васали')|e] — це [Concept('countries', 'країни')|e], так чи інакше підпорядковані нашій владі. Зазвичай вони платять нам [Concept('subject_taxation', 'податки')|e] та підтримують нас у [Concept('wars', 'війнах')|e].\n\nЯкщо [Concept('subject_loyalty', 'лояльність васала')|e] опуститься нижче #W 50#! од., він стане нелояльним і відмовиться надавати нам [Concept('wars', 'військову')] допомогу. Нелояльні васали можуть об'єднатися, створивши [GetInternationalOrganizationType('independence_movement').GetName|l], і навіть оголосити нам [Concept('war', 'війну')], якщо наберуть достатньо сили."
  hint_has_disloyal_subjects_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Слідкуйте, щоб [Concept('opinion', 'думка')|e] васала про нас була достатньо хорошою. Цю думку можна покращувати за допомогою [Concept('diplomatic_action', 'дипломатичної дії')|e] «$IMPROVE_RELATIONTITLE$».\n@arrow_bonus_tier_1! Також варто розглянути [Concept('annexing', 'поглинання')|e] інших лояльних васалів: зростання нашої відносної могутності позитивно позначиться на лояльності.\n@arrow_bonus_tier_1! Збільшення чисельності [Concept('armies', 'військ')|e] також підвищує лояльність васалів, залякуючи їх."
  hint_has_disloyal_subjects_hint_text_3: "#T Додаткові поради#!\n@hint! Інформацію про всіх васалів можна знайти на панелі управління васалами, яка розташована на @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'панелі дипломатії')].\n@hint! Чим більше у нас [Concept('subjects', 'васалів')|e] і чим вища їхня відносна могутність, тим важче забезпечувати їхню [Concept('subject_loyalty', 'лояльність')].\n@hint! Різні типи [Concept('subjects', 'васалів')] мають різні властивості та обмеження."
  hint_has_disloyal_subjects_diplomatic: "«Нам слід підтримувати добрі стосунки з васалами, інакше вони почнуть вважати себе господарями своєї долі»."
  hint_has_disloyal_subjects_administrative: "«Васали приносять чималу вигоду нашій скарбниці.\nГоловне, щоб вони про це не здогадувалися»."
  hint_has_disloyal_subjects_military: "«Ці вівці втечуть зі стада за першої ж нагоди. Ми повинні бути готові спустити на них псів війни!»"
  hint_has_buildings_missing_input: "Спорудам бракує ресурсів"
  hint_has_buildings_missing_input_hint_text: "$hint_has_buildings_missing_input_hint_text_1$\n\n$hint_has_buildings_missing_input_hint_text_2$\n\n$hint_has_buildings_missing_input_hint_text_3$"
  hint_has_buildings_missing_input_hint_text_1: "Щоб [Concept('buildings', 'споруди')|e] могли працювати як слід, їм потрібен доступ до [Concept('goods', 'товарів')|e] на [Concept('markets', 'ринках')]. Якщо вони не можуть отримати всі потрібні [Concept('goods', 'товари')], їхня ефективність знижується."
  hint_has_buildings_missing_input_hint_text_2: "#T Рекомендації#!\n$hint_address_shortage_text$"
  hint_has_buildings_missing_input_hint_text_3: "#T Додаткові поради#!\n@hint! Не всі споруди є критично важливими для нашої країни, але деякі стратегічні ланцюжки повинні функціонувати безперебійно.\n@hint! Наприклад, якщо наша #TOOLTIP:BUILDING_TYPE,'weapon_guild,X #L гільдія рушничників#!#!#! не зможе закупити на [Concept('market', 'ринку')] достатньо #TOOLTIP:GOODS,lumber,X #L лісоматеріалів#!#!, ми не зможемо наймати #TOOLTIP:UNITTYPE,a_footmen,X #L піхоту#!#!."
  hint_has_buildings_missing_input_diplomatic: "«Деякі споруди особливо важливі для життя нашої країни»."
  hint_has_buildings_missing_input_administrative: "«Зазвичай купці самі усувають будь-який дефіцит товарів, але іноді невидиму руку ринку потрібно… трохи направити»."
  hint_has_buildings_missing_input_military: "«Перш ніж починати будь-яку воєнну кампанію, ми повинні забезпечити безперебійні поставки зброї та інших припасів для війська»."
  hint_address_shortage_text: "Клацнувши по #W сповіщенню#!, ви перейдете на @production_panel![Link('goods_production', '', 'панель виробництва товарів')] зі списком [Concept('goods', 'товарів')], яких бракує на відповідному [Concept('market', 'ринку')].\nЄ три основні способи збільшити [Concept('supply', 'пропозицію')|e] певного [Concept('good', 'товару')|e] на [Concept('markets', 'ринках')|e].\n\n@arrow_bonus_tier_3! Натисніть кнопку @rgo! «[Concept('rgo', 'Видобуток ресурсів')|e]», щоб побачити список [Concept('locations', 'місцевостей')] цього [Concept('market', 'ринку')], де видобувається відповідний [Concept('rgo', 'ресурс')]. Пам'ятайте, що в місцях [Concept('rgo', 'видобутку ресурсів')] виробляється лише [Concept('raw_materials', 'неперероблена сировина')|e].\n@arrow_bonus_tier_2! Натисніть кнопку @building! «[Concept('building', 'Споруди')|e]», щоб побачити список усіх доступних [Concept('buildings', 'споруд')|e], здатних виробляти потрібний [Concept('good', 'товар')].\n@arrow_bonus_tier_2! Натисніть кнопку @import! «[Concept('import', 'Імпорт')|e]», щоб імпортувати [Concept('good', 'товар')] з іншого ринку, користуючись [Concept('merchant_capacity', 'торговельним потенціалом')|e].\n@automation! Автоматизувати будівництво [Concept('building', 'споруд')] та місць [Concept('rgo', 'видобутку ресурсів')], а також [Concept('trade', 'торгівлю')|e] можна на @automation![Link('automation', '', 'панелі автоматизації')]."
  hint_has_constructions_missing_input: "Будівництву бракує ресурсів"
  hint_has_constructions_missing_input_hint_text: "$hint_has_constructions_missing_input_hint_text_1$\n\n$hint_has_constructions_missing_input_hint_text_2$\n\n$hint_has_constructions_missing_input_hint_text_3$"
  hint_has_constructions_missing_input_hint_text_1: "Усім [Concept('constructions', 'будівництвам')|e] потрібен доступ до певних [Concept('goods', 'товарів')|e] на [Concept('market', 'ринку')|e] своєї [Concept('location', 'місцевості')|e]. Якщо [Concept('goods', 'товарів')] буде недостатньо, [Concept('construction', 'будівництво')|e] зупиниться."
  hint_has_constructions_missing_input_hint_text_2: "#T Рекомендації#!\n$hint_address_shortage_text$"
  hint_has_constructions_missing_input_hint_text_3: "#T Додаткові поради#!\n@hint! Різні [Concept('location', 'місцевості')] отримують [Concept('goods', 'товари')] на [Concept('market', 'ринку')] в порядку свого [Concept('market_access', 'доступу до ринку')|e] незалежно від того, де вироблені ці товари.\n@hint! Це означає, що [Concept('location', 'місцевостям')], розташованим ближче до [Concept('market_centers', 'ринкового центру')|e], простіше отримати будь-які необхідні товари."
  hint_has_constructions_missing_input_diplomatic: "«Уважний контроль за ресурсами та потребами життєво важливий для будь-якого підприємства»."
  hint_has_constructions_missing_input_administrative: "«Дипломатія та торгівля забезпечать нам усе, що ми не можемо виробляти самі»."
  hint_has_constructions_missing_input_military: "«Ми повинні бути здатні самі задовольняти свої потреби, щоб інші не могли скористатися нашими слабкостями»."
  hint_lack_pop_promotion_to_fill_buildings: "Спорудам або місцям [Concept('rgo', 'видобутку ресурсів')] бракує працівників"
  hint_lack_pop_promotion_to_fill_buildings_hint_text: "$hint_lack_pop_promotion_to_fill_buildings_hint_text_1$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_2$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_3$"
  hint_lack_pop_promotion_to_fill_buildings_hint_text_1: "Різним [Concept('buildings', 'спорудам')|e] потрібні працівники з різних [Concept('pop_types', 'суспільних класів')|e]. Якщо після зведення [Concept('building', 'споруди')] поруч не виявиться достатньо [Concept('pops', 'груп населення')|e] потрібного [Concept('pop_types', 'класу')], споруда почне [Concept('promote', 'підвищувати')|e] клас #TOOLTIP:POPTYPE,peasants,X #L селян#!#! зі швидкістю, що залежить від модифікатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення місцевих груп населення»#!#!#! для даної [Concept('location', 'місцевості')|e].\n\nСпоруди також можуть втрачати працівників, коли [Concept('pops', 'групи населення')] гинуть через [Concept('diseases', 'епідемії')|e], [Concept('sieges', 'облоги')|e] та [Concept('starvation', 'голод')|e]."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Не будуйте споруди в тих [Concept('locations', 'місцевостях')], де вже є суттєвий дефіцит працівників.\n@arrow_bonus_tier_2! Розвивайте показники [Concept('location', 'місцевості')], які прискорюють підвищення класу її груп населення: [Concept('stability', 'стабільність')|e], [Concept('literacy', 'грамотність')|e] та [Concept('control', 'контроль')|e].\n@arrow_bonus_tier_1! Будуйте #TOOLTIP:BUILDING_TYPE,library,X #L бібліотеки#!#! та #TOOLTIP:BUILDING_TYPE,university,X #L університети#!#! у найважливіших [Concept('locations', 'місцевостях')].\n@arrow_bonus_tier_1! Спробуйте знести не найпотрібніші [Concept('buildings', 'споруди')], щоб вивільнити робочу силу."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_3: "#T Додаткові поради#!\n@hint! У [Concept('urban_locations', 'міських місцевостях')|e] більша базова частка [Concept('pops', 'груп населення')] з [Concept('upper_class', 'вищого суспільства')|e].\n@hint! Пам'ятайте, що для [Concept('promote', 'підвищення')|e] в [Concept('location', 'місцевості')] має бути [Concept('available', 'доступна')|e] достатня кількість #TOOLTIP:POPTYPE,peasants,X #L селян#!#!.\n@hint! Дізнатися значення модифікатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення місцевих груп населення»#!#!#! в [Concept('location', 'місцевості')] можна на #W вкладці «Демографія»#! #W панелі місцевості#!."
  hint_lack_pop_promotion_to_fill_buildings_diplomatic: "«Що це за промисловість, якщо їй нікому займатися?»"
  hint_lack_pop_promotion_to_fill_buildings_administrative: "«Якщо наші піддані не працюватимуть, інші країни можуть вважати нас ледарями»."
  hint_lack_pop_promotion_to_fill_buildings_military: "«Обов'язок населення — виробляти все, чого потребує країна»."
  hint_casus_belli: "Привід для війни"
  hint_casus_belli_hint_text: "$hint_casus_belli_hint_text_1$\n\n$hint_casus_belli_hint_text_2$\n\n$hint_casus_belli_hint_text_3$"
  hint_casus_belli_hint_text_1: "[Concept('casus_belli', 'Привід для війни')|e] — це законна причина для початку [Concept('war', 'конфлікту')|e] проти іншої країни. Розпочати війну можна і без приводу, але в такому випадку нам буде важче нав’язати свої вимоги під час укладання [Concept('peace_treaty', 'мирного договору')|e], а сусіди реагуватимуть на наші дії більш вороже."
  hint_casus_belli_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Привід для війни найпростіше отримати, запросивши його у [Concept('parliament', 'зборів')|e]. Скликати засідання зборів можна на @government_panel![Link('government', 'tabcontent = parliament', 'панелі уряду')].\n@arrow_bonus_tier_2! Створивши [Concept('spy_network', 'шпигунську мережу')|e] в інших [Concept('countries', 'країнах')|e], ми зможемо фабрикувати приводи для війни з ними, якщо у нас є [Concept('cores', 'корінні місцевості')|e] на їхній території або якщо вони є нашими [Concept('rivals', 'суперниками')|e]."
  hint_casus_belli_hint_text_3: "#T Додаткові поради#!\n@hint! Пам’ятайте, що [Concept('wars', 'війни')] далеко не завжди справедливі й часом починаються без жодного приводу. Звісно, гідний привід для війни не буває зайвим, але й без нього все вирішує право сильного, а переможців не судять.\n@hint! Кожен привід для війни ставить перед вами певну [Concept('war_goal', 'мету')|e]. Досягнувши цієї [Concept('war_goal', 'мети')] під час [Concept('war', 'війни')], ми отримаємо [Concept('war_score', 'воєнний рахунок')|e], який має вирішальне значення для перемоги.\n@hint! Деякі [Concept('events', 'події')|e] та [Concept('situations', 'ситуації')|e] можуть давати нам особливі приводи для воєн."
  hint_casus_belli_diplomatic: "«Навіть на війні є звичаї, яких потрібно дотримуватися»."
  hint_casus_belli_administrative: "«З хорошим приводом ми можемо оголосити війну, не накликаючи на себе гнів сусідів»."
  hint_casus_belli_military: "«Найкращий привід для війни, мілорде, це відсутність будь-якого приводу»."
  hint_has_unraised_levies_in_war: "Ополчення"
  hint_has_unraised_levies_in_war_hint_text: "$hint_has_unraised_levies_in_war_hint_text_1$\n\n$hint_has_unraised_levies_in_war_hint_text_2$\n\n$hint_has_unraised_levies_in_war_hint_text_3$"
  hint_has_unraised_levies_in_war_hint_text_1: "У перші століття гри, коли [Concept('regulars_with_icon', 'регулярні війська')|e] ще не з’явилися, основою збройних сил усіх [Concept('country_with_icon', 'країн')|e] є [Concept('levies_with_icon', 'ополчення')|e]. Його наполегливо рекомендується збирати в разі будь-якої [Concept('war_with_icon', 'війни')|e]."
  hint_has_unraised_levies_in_war_hint_text_2: "#T Рекомендовані дії#!\n@arrow_bonus_tier_3! З початком війни клацніть по #W сповіщенню#!, щоб відкрити #W збір ополчення#! на @military_panel![Link('unit_overview', '', 'панелі загонів')]. Тут можна зібрати все доступне [Concept('levies', 'ополчення')] одразу або вказати окремі [Concept('provinces_with_icon', 'провінції')|e], де будуть набиратися війська.\n@arrow_bonus_tier_2! Було б непогано знизити залежність від [Concept('levies', 'ополчення')], замінивши його більш ефективними, але дорогими [Concept('regular_regiments', 'регулярними полками')]. Для цього вам потрібно буде побудувати #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерію#!#!.\n@arrow_bonus_tier_1! Якщо у нас достатньо грошей, то доповнити або навіть замінити [Concept('levies', 'ополчення')] у важку годину можуть [Concept('mercenaries_with_icon', 'найманці')|e]. Їх можна вербувати на @military_panel![Link('unit_overview', '', 'панелі загонів')]."
  hint_has_unraised_levies_in_war_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('levies', 'Ополчення')] набирається переважно з [Concept('pops_with_icon', 'груп населення')|e] ваших [Concept('primary_culture_with_icon', 'основної')|e] та [Concept('accepted_cultures_with_icon', 'визнаних культур')|e], але кількість, що призивається з конкретної [Concept('location', 'місцевості')], залежить від [Concept('control_with_icon', 'контролю')|e] над нею.\n@hint! Виробництво [Concept('food_with_icon', 'їжі')|e] та [Concept('rgo_with_icon', 'видобуток ресурсів')|e] у [Concept('locations', 'місцевостях')], де було зібрано ополчення, знижується доти, доки воїни не повернуться додому.\n@hint! Дійте обачно: загиблі на війні селяни вже не зможуть працювати в полі."
  hint_has_unraised_levies_in_war_diplomatic: "«Люди повинні працювати, але вони повинні і захищати свої домівки»."
  hint_has_unraised_levies_in_war_administrative: "«Якщо народ вірить нам, він завжди прийде нам на допомогу»."
  hint_has_unraised_levies_in_war_military: "«Незораний лан — не привід ухилятися від війни»."
  hint_no_allies: "Немає союзників"
  hint_no_allies_hint_text: "$hint_no_allies_hint_text_1$\n\n$hint_no_allies_hint_text_2$\n\n$hint_no_allies_hint_text_3$"
  hint_no_allies_hint_text_1: "[Concept('alliance', 'Союзом')|e] називається [Concept('treaty', 'договір')|e] між двома [Concept('countries', 'країнами')|e], що зобов’язує їх надавати одна одній [Concept('wars', 'військову')|e] підтримку. Якщо на нас нападуть, [Concept('allies', 'союзники')] отримають [Concept('call_to_arms', 'заклик до зброї')|e] і зможуть вступити у війну на нашому боці. Якщо ж ми самі оголосимо комусь [Concept('war', 'війну')|e], союзники нашого ворога з великою ймовірністю виступлять проти нас."
  hint_no_allies_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Відкрийте @diplomacy_panel![Link('diplomacy_macrobuilder', '', 'панель конструктора дипломатії')] і натисніть кнопку «$offer_alliance$» у розділі #W «$CATEGORY_FRIENDLY_ACTIONS$»#!. Ви побачите список усіх [Concept('countries', 'країн')], готових укласти з нами [Concept('alliance', 'союз')|e].\n@arrow_bonus_tier_2! Деякі [Concept('countries', 'країни')] можуть погодитися на союз не відразу. Переконати їх можна за допомогою [Concept('diplomatic_action', 'дипломатичної дії')|e] #W «$IMPROVE_RELATIONTITLE$»#!."
  hint_no_allies_hint_text_3: "#T Додаткові поради#!\n@hint! Будьте пильні: у союзників також є можливість втягувати нас у власні війни. Не укладайте союзів із надто вразливими країнами, інакше ми ризикуємо опинитися в чужій війні на боці тих, хто програв.\n@hint! [Concept('call_to_arms', 'Заклик до зброї')|e] завжди можна відхилити, але це зруйнує дружбу між країнами та залишиться плямою на нашій дипломатичній репутації."
  hint_no_allies_diplomatic: "«У цьому світі неможливо вижити на самоті»."
  hint_no_allies_administrative: "«Навіть якщо ми не плануємо нападати самі, союз із сусідом переконає наших ворогів не нападати на нас»."
  hint_no_allies_military: "«Сильний союзник може прикрити нам тил, коли ми підемо в наступ»."
  hint_black_death: "Чорна смерть"
  hint_black_death_hint_text: "$hint_black_death_hint_text_1$\n\n$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_black_death_hint_text_1: "Чорною смертю називається [Concept('situation', 'ситуація')|e], здатна обернутися жахливою бідою для Старого Світу. Її причиною є поширення торгівлі та цивілізації. Вона спустошує густонаселені [Concept('locations', 'місцевості')|e] і сходить нанівець, тільки коли ті, хто вижив, набудуть [Concept('disease_resistance', 'стійкість до епідемій')|e].\n\nЕпідемія губить людей з усіх [Concept('pop_type', 'суспільних класів')|e], залишаючи наші [Concept('buildings', 'споруди')|e] без робочої сили, доки не відбудеться [Concept('promote', 'підвищення')|e] нових #TOOLTIP:POPTYPE,peasants,X #L селян#!#!. У результаті наша [Concept('tax_base', 'податкова база')|e] та обсяги випуску товарів у [Concept('buildings', 'спорудах')] різко зменшаться, а вирішальним чинником для відновлення [Concept('employment', 'зайнятості')|e] стане модифікатор #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!."
  hint_black_death_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Побудуйте #TOOLTIP:BUILDING_TYPE,hospital,X #L лікарні#!#! у найбільших [Concept('urban_locations', 'міських місцевостях')|e] перш, ніж епідемія прийде в [Concept('country', 'країну')|e].\n@arrow_bonus_tier_2! Клацніть по банеру [Concept('situation', 'ситуації')], щоб дізнатися про доступні особливі дії. Можливо, вони допоможуть запобігти катастрофі?\n@arrow_bonus_tier_2! Підтримуйте високий рівень [Concept('stability', 'стабільності')|e]. Це важливо не тільки для запобігання [Concept('rebellions', 'заколотам')|e], а й для модифікатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!.\n@arrow_bonus_tier_1! Не будуйте нові споруди в знелюднілих [Concept('locations', 'місцевостях')]: там не буде кому працювати.\n@arrow_bonus_tier_1! Слідкуйте за модифікатором #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!: більшості наших [Concept('buildings', 'споруд')] та місць [Concept('rgo', 'видобутку ресурсів')|e] потрібне [Concept('promote', 'підвищення')|e] #TOOLTIP:POPTYPE,peasants,X #L селян#!#! до більш розвинених [Concept('pop_types', 'суспільних класів')]."
  hint_black_death_hint_text_3: "#T Додаткові поради#!\n@hint! Цей процес може зайняти роки, але за достатньої кількості селян втрати робочої сили в [Concept('locations', 'місцевостях')] з часом відшкодуються за рахунок [Concept('promote', 'підвищення')|e] класу населення.\n@hint! Досвід подолання цієї катастрофи стане вам у пригоді й під час інших лих: [Concept('starvation', 'голод')|e], [Concept('diseases', 'епідемії')|e] та [Concept('loot', 'грабіж')|e] схожим чином впливають на наші землі."
  hint_black_death_diplomatic: "«Смерть скаче попереду. Біди та руйнування слідують за нею»."
  hint_black_death_administrative: "«Бліда смерть стукає і в замки королів, і в хатини бідняків»."
  hint_black_death_military: "«З'явився четвертий Вершник. Тепер нас ніщо не врятує»."
  hint_fall_of_delhi: "[GetSituationByKey('fall_of_delhi').GetNameWithNoTooltip]"
  hint_fall_of_delhi_hint_text: "$hint_fall_of_delhi_hint_text_1$\n\n$hint_fall_of_delhi_hint_text_2$\n\n$hint_fall_of_delhi_hint_text_3$\n\n$hint_fall_of_delhi_hint_text_4$"
  hint_fall_of_delhi_hint_text_1: "#TOOLTIP:SITUATION,fall_of_delhi,X #L Падіння Делі#!#! — це [Concept('situation', 'ситуація')|e], яка може призвести до краху [GetCountry('DLH').Custom('rank_ru_GEN')|l]. Стерв'ятники та потенційні завойовники вже збираються вздовж ослаблених кордонів, поки [GetCountry('DLH').GetGovernment.GetRulerOrRegent.GetName|l] втрачає владу…"
  hint_fall_of_delhi_hint_text_2: "#T Рекомендовані дії для Делі:#!\n@arrow_bonus_tier_3! При грі за #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_ACC')|L]#!#! варто використовувати безліч нових [Concept('actions', 'дій')|e], таких як [ShowGenericActionName('strengthen_neighbor_relations')|l] або [ShowGenericActionName('fall_of_delhi_appoint_governors')|l]. \n@arrow_bonus_tier_2! Під час [Concept('events', 'подій')|e], пов'язаних із цією [Concept('situation', 'ситуацією')|e], потрібно спробувати збільшити [Concept('share_of_power_gc', 'частку влади')|e] за рахунок наших супротивників, інакше наш народ чекає незавидна доля."
  hint_fall_of_delhi_hint_text_3: "#T Додаткові поради для Делі#!\n@hint! Нашою явною перевагою перед ворогами є потужне регулярне [Concept('army', 'військо')|e]. На відміну від [Concept('levies', 'ополчення')|e] наші вояки, які отримують платню, поповнюють свої лави і куди ефективніше діють у бою. Це основа нашої могутності, яка дозволяє зберігати контроль над країною."
  hint_fall_of_delhi_hint_text_4: "#T Рекомендації для супротивника#!\n@arrow_bonus_tier_3! Найсильніша [Concept('country', 'країна')|e] Індії стане головним супротивником на початку [Concept('situation', 'ситуації')|e], але це положення можемо зайняти ми, якщо оголосимо війну і захопимо першість. Щоб досягти цієї мети, ми повинні або бути найсильнішою [Concept('country', 'країною')|e] Індії на момент початку [Concept('situation', 'ситуації')|e], або перемогти поточного лідера і захопити першість за допомогою [Concept('peace_treaty', 'мирного договору')|e] «[ShowPeaceTreatyTypeNameWithNoTooltip('peace_seize_opposition_leadership')]»."
  hint_fall_of_delhi_diplomatic: "«Вирішите ви захистити трон #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! чи станете суперником, важливо дотримуватися обережності у відносинах із сусідами. Дружба дозволить виграти час, а ворожнеча допоможе виправдати нові завоювання»."
  hint_fall_of_delhi_administrative: "«Землі, захоплені в розпал хаосу — ненадійний приз. За можливості варто виділяти [Concept('subjects', 'васалів')|e] або зміцнювати [Concept('control', 'контроль')|e], щоб нові території не вислизнули з наших рук так само швидко, як були отримані»."
  hint_fall_of_delhi_military: "«Меч відіграє велику роль у цій боротьбі. Сильне [Concept('army', 'військо')|e] може врятувати Делі від краху або дозволити супротивникам здолати гіганта. Але навіть перемога несе в собі ризики! Не забувайте про заколоти та перенапруження»."
  hint_rise_of_the_ottomans: "Поради щодо ситуації «Сходження турків»"
  hint_rise_of_the_ottomans_hint_text: "$hint_rise_of_the_ottomans_hint_text_1$\n\n$hint_rise_of_the_ottomans_hint_text_2$"
  hint_rise_of_the_ottomans_hint_text_1: "Ця [Concept('situation', 'ситуація')|e] відзначає сходження #italic найсильнішого бейлика#!, якому судилося створити одну з найвеличніших імперій в історії. За допомогою унікальних [Concept('events', 'подій')|e] та [Concept('actions', 'дій')|e] ми повинні встановити свою владу над іншими бейликами, перетнути #TOOLTIP:PROVINCE_DEFINITION,marmara_sea_province,X #L Мармурове море#!#! та заволодіти багатствами #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!. Вічна слава чекає!"
  hint_rise_of_the_ottomans_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_2! Нам час піднестися. Завдяки потужним [Concept('actions', 'діям')|e], таким як #TOOLTIP:GENERIC_ACTION,press_claims,X #L нав'язування претензій#!#!, та вигідним [Concept('events', 'подіям')|e], що прискорюють [Concept('integration', 'інтеграцію')|e], наш розквіт увійде в історію.\n@arrow_bonus_tier_1! Якщо ми візьмемо під контроль #Y 120#! [Concept('locations', 'місцевостей')|e] та захопимо плацдарм на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, то зможемо використовувати [Concept('action', 'дію')|e] «Нав'язування претензій» і в цьому [Concept('region', 'регіоні')|e]."
  hint_rise_of_the_ottomans_diplomatic: "«На початку [Concept('situation', 'ситуації')|e] буде розумно виконувати доступні [Concept('actions', 'дії')|e], наприклад, #TOOLTIP:GENERIC_ACTION,seek_relations_with_the_byzantines,X #L пошук зв'язків [GetCountry('BYZ').Custom('predlog_sso')] [GetCountry('BYZ').Custom('CL_INST')]#!#!. Скориставшись залишками їхнього престижу як останнього оплоту Риму, ми зміцнимо свою спадщину»."
  hint_rise_of_the_ottomans_administrative: "«Ми, безсумнівно, майстри завоювань, але не можна забувати про свої внутрішні землі та серце нашої країни. Не нехтуйте внутрішньою політикою в гонитві за славою на чужині!»"
  hint_rise_of_the_ottomans_military: "«Ми повинні прагнути до завоювання [Concept('towns_and_cities', 'міст')|e] наших ворогів. Завдяки цим кампаніям ми здобудемо силу на багато поколінь вперед»."
  hint_council_of_trent: "Тридентський собор"
  hint_council_of_trent_hint_text: "$hint_council_of_trent_hint_text_1$\n\n$hint_council_of_trent_hint_text_2$"
  hint_council_of_trent_hint_text_1: "Поки триває [ShowSituationName('council_of_trent')], #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католицька церква#!#! може змінити [Concept('laws', 'звід законів')|e] та внести нові [Concept('policies', 'політики')|e] в [Concept('international_organization', 'міжнародне об’єднання')|e]."
  hint_council_of_trent_hint_text_2: "#T Можливі взаємодії:#!\n@arrow_bonus_tier_3! Як [Concept('member', 'послідовник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#!, ви можете запропонувати #TOOLTIP:RESOLUTION,policy_vote,X #L обговорення правил#!#! зі зведеного нижче [Concept('laws', 'зводу законів')] або з панелі доктрин #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#!\n@arrow_bonus_tier_2! Як [Concept('member', 'послідовник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#!, ви можете голосувати за запропоноване #TOOLTIP:RESOLUTION,policy_vote,X #L обговорення правил#!#!"
  hint_golden_age_of_piracy: "Золотий вік піратства"
  hint_golden_age_of_piracy_hint_text: "$hint_golden_age_of_piracy_hint_text_1$\n\n$hint_golden_age_of_piracy_hint_text_2$\n\n$hint_golden_age_of_piracy_hint_text_3$\n\n$hint_golden_age_of_piracy_hint_text_4$"
  hint_golden_age_of_piracy_hint_text_1: "#TOOLTIP:SITUATION,golden_age_of_piracy,X #L Золотий вік піратства#!#! — це [Concept('situation', 'ситуація')|e], яка може посприяти появі нових піратів. Вільні люди, незадоволені моряки та супротивники централізованої влади піднімають чорні вітрила та чинять беззаконня."
  hint_golden_age_of_piracy_hint_text_2: "#T Рекомендації для боротьби з піратами#!\n@arrow_bonus_tier_3! Подумайте про знищення будь-яких піратів біля наших берегів. Ми не можемо допустити, щоб вони борознили наші моря. \n@arrow_bonus_tier_2! Кожна [Concept('event', 'подія')|e], пов'язана з цією [Concept('situation', 'ситуацією')|e], може започаткувати нову піратську республіку."
  hint_golden_age_of_piracy_hint_text_3: "#T Додаткові поради#!\n@hint! Нам будуть доступні нові [Concept('actions', 'дії')|e] в цій [Concept('situation', 'ситуації')|e] незалежно від того, піднятий у нас чорний прапор чи ні."
  hint_golden_age_of_piracy_hint_text_4: "#T Рекомендації для піратів#!\n@arrow_bonus_tier_3! Найрозумніше буде захистити узбережжя та побудувати могутній [Concept('navy', 'флот')|e]. За допомогою таких [Concept('actions', 'дій')|e], як #TOOLTIP:GENERIC_ACTION,attract_sailors,X #L залучення моряків#!#! або #TOOLTIP:GENERIC_ACTION,migrate_to_new_waters,X #L перехід у нові води#!#!, ми зможемо створити універсальний флот та підтримувати присутність."
  hint_golden_age_of_piracy_diplomatic: "«Усмішки та ром працюють краще, ніж погрози, принаймні, поки не заговорять гармати. Можливо, буде розумно підтримувати міцні стосунки з негідниками. Не всі скарби — це срібло та золото, скажу я вам»."
  hint_golden_age_of_piracy_administrative: "«Управління нашими морськими володіннями — непроста справа в добу піратства. Боремося ми з піратами чи змагаємося з ними, головне зберігати контроль!»"
  hint_golden_age_of_piracy_military: "«Пірати не визнають країн, адже вони продали свою власну. А раз при затриманні їх все одно повісять, вони без докорів сумління будуть палити та вбивати, якщо не виконати їхні вимоги»."
  hint_hundred_years_war: "Столітня війна"
  hint_hundred_years_war_hint_text: "$hint_hundred_years_war_hint_text_1$\n\n$hint_hundred_years_war_hint_text_2$\n\n$hint_hundred_years_war_hint_text_3$\n\n$hint_hundred_years_war_hint_text_4$"
  hint_hundred_years_war_hint_text_1: "#TOOLTIP:SITUATION,hundred_years_war,X #L Столітня війна#!#! — неспокійний час для всієї #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західної Європи#!#!! Цей період перевірить на міцність союзи, і на руїнах цієї війни напевно народяться нові країни."
  hint_hundred_years_war_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! І #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_DAT')|L]#!#!, і #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_DAT')|L]#!#! доступні такі дії, як #TOOLTIP:GENERIC_ACTION,request_war_entry,X #L прохання про вступ у війну#!#!, #TOOLTIP:GENERIC_ACTION,hyw_sign_truce,X #L підписання перемир'я#!#! та #TOOLTIP:GENERIC_ACTION,request_papal_delegates,X #L запит [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатів#!#!. Це унікальні способи змінити статус-кво конфлікту або навіть схилити шальки терезів на бік однієї з країн."
  hint_hundred_years_war_hint_text_3: "#T Додаткові поради#!\n@hint! Ми залучені в конфлікт, і нам може випасти нагода здобути землі або могутніх союзників."
  hint_hundred_years_war_hint_text_4: "#T Рекомендовані дії для [Concept('subject', 'васала')|e] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!:#!\n@arrow_bonus_tier_3! Гарним рішенням буде #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L вимога автономії#!#!. Кожен #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанаж#!#! може вимагати певну автономію та отримати значну вигоду, скориставшись своєю роллю захисника [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої корони."
  hint_hundred_years_war_diplomatic: "«Дайте війні нагоду!»"
  hint_hundred_years_war_administrative: "«Ми напевно втратимо [Concept('control', 'контроль')|e] над заморськими територіями. Враховуйте [Concept('proximity', 'досяжність')|e] нашої [Concept('capital', 'столиці')|e] для нещодавно завойованих місцевостей»."
  hint_hundred_years_war_military: "«Ведете війну з нашими ворогами на півдні за #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#! або #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_ACC')|L]#!#!? Можливо, варто виконати [Concept('action', 'дію')|e] #TOOLTIP:GENERIC_ACTION,hyw_sign_truce,X #L „Підписання перемир'я“#!#! щодо іншого могутнього сусіда»."
  hint_hussite_wars: "Гуситські війни"
  hint_hussite_wars_hint_text: "$hint_hussite_wars_hint_text_1$\n\n$hint_hussite_wars_hint_text_2$\n\n$hint_hussite_wars_hint_text_3$\n\n$hint_hussite_wars_hint_text_4$"
  hint_hussite_wars_hint_text_1: "Під час #TOOLTIP:SITUATION,hussite_wars,X #L гуситських війн#!#! [GetReligionByKey('catholic').GetName|l] переживає глибокий внутрішній розкол. Своєю чергою, [GetReligionByKey('catholic').GetAdjectiveWithNoTooltip|l]і монархи побоюються, що якщо швидко не покінчити з цією єрессю, вона може охопити значні частини #TOOLTIP:CONTINENT,europe,X #L Європи#!#! та підірвати духовну владу, якою володіє [GetCountry('PAP').GetGovernment.GetRulerTitle|l]."
  hint_hussite_wars_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! [GetCountry('PAP').GetGovernment.GetRulerTitle] намагатиметься розпочати [Concept('war', 'війну')|e] проти #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!. Сусідні #TOOLTIP:RELIGIONGROUP,christian,X #L християнські#!#! країни можуть підтримати будь-яку зі сторін, що дозволяє їм вершити долю всього [Concept('continent', 'континенту')|e]."
  hint_hussite_wars_hint_text_3: "#T Додаткові поради:#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_DAT')|L]#!#! доступно безліч унікальних [Concept('actions', 'дій')|e], зокрема «[ShowGenericActionName('convert_heretics_hw_action')]» та «[ShowGenericActionName('prepare_defenses_hw_action')]»."
  hint_hussite_wars_hint_text_4: "#T Рекомендації для #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#!\n@arrow_bonus_tier_3! Гарні стосунки з іншими #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькими#!#! країнами можуть дати нам нагоду закликати їх на допомогу в боротьбі. Під час цієї [Concept('situation', 'ситуації')|e] доступний унікальний [Concept('peace_treaty', 'мирний договір')|e] «[ShowPeaceTreatyTypeName('supress_hussite_faith')]», який знижує вартість [Concept('peace_treaty', 'мирного договору')|e] #Y «Примусове навернення»#!.\n@arrow_bonus_tier_2! #TOOLTIP:RELIGION,$catholic_tt$,X #L Католицькі#!#! [Concept('countries', 'країни')|e], [Concept('war', 'воюючі')|e] [GetCountry('BOH').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_INST')|L]#!#!, отримують доступ до унікальної [Concept('action', 'дії')|e] [Concept('unit', 'загону')|e] «[ShowUnitAbilityName('hussite_tribunal')]». Вона дозволяє насильно [Concept('convert', 'навертати')|e] #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситські#!#! [Concept('pops', 'групи населення')|e] та вбивати незгодних у [Concept('province_capitals', 'столицях провінцій')|e] під контролем цих країн під час війни."
  hint_hussite_wars_diplomatic: "«Віра повинна спонукати нас до пошуку союзників-однодумців, щоб пережити цей непростий період»."
  hint_hussite_wars_administrative: "«Ми повинні постаратися зберегти [Concept('religious_unity', 'релігійну єдність')|e]»."
  hint_hussite_wars_military: "«Ймовірно, нам доведеться силою захищати свою віру»."
  hint_italian_wars: "[GetSituationByKey('italian_wars').GetNameWithNoTooltip]"
  hint_italian_wars_hint_text: "$hint_italian_wars_hint_text_1$\n\n$hint_italian_wars_hint_text_2$\n\n$hint_italian_wars_hint_text_3$\n\n$hint_italian_wars_hint_text_4$"
  hint_italian_wars_hint_text_1: "#TOOLTIP:SITUATION,italian_wars,X #L Війни#!#! охоплюють #TOOLTIP:REGION,italy_region,X #L Італію#!#!. Сторонні [Concept('countries', 'країни')|e] прагнуть вторгнутися в регіон, а створення італійських ліг знаменує початок доби роз'єднаності та опору для захисту регіону."
  hint_italian_wars_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Лідери кожної ліги можуть запрошувати інші [Concept('countries', 'країни')|e], щоб зміцнити свою владу над #TOOLTIP:REGION,italy_region,X #L Італією#!#!."
  hint_italian_wars_hint_text_3: "#T Додаткові поради#!\n@hint! Суперники або вороги лідерів кожної ліги можуть #TOOLTIP:GENERIC_ACTION,iw_send_aid,X #L надіслати допомогу#!#! та змістити баланс під час важливої війни."
  hint_italian_wars_hint_text_4: "#T Рекомендації для лідера #TOOLTIP:CULTUREGROUP,italian_group,X #L італійської#!#! ліги#!\n@arrow_bonus_tier_3! Гарні стосунки з іншими сусідами зміцнять наше [Concept('international_organization', 'міжнародне об’єднання')|e]."
  hint_italian_wars_diplomatic: "«#TOOLTIP:REGION,italy_region,X #L Італія#!#! повинна належати нам і нашим союзникам-однодумцям»."
  hint_italian_wars_administrative: "«Створення [Concept('subjects', 'васалів')|e] в #TOOLTIP:REGION,italy_region,X #L Італії#!#! зміцнить наш вплив у [Concept('region', 'регіоні')|e]»."
  hint_italian_wars_military: "«Ми повинні придушити опір — на кону багатство та влада»."
  hint_little_ice_age: "[GetSituationByKey('little_ice_age').GetNameWithNoTooltip]"
  hint_little_ice_age_hint_text: "$hint_little_ice_age_hint_text_1$\n\n$hint_little_ice_age_hint_text_2$\n\n$hint_little_ice_age_hint_text_3$"
  hint_little_ice_age_hint_text_1: "Починається [GetSituationByKey('little_ice_age').GetName]! Землі скувало холодом. Ми повинні зробити все можливе, щоб захистити врожай та тварин і забезпечити виживання нашого народу!"
  hint_little_ice_age_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Подумайте про розширення [Concept('buildings', 'споруд')|e], які виробляють [Concept('food', 'їжу')|e] або сприяють її виробництву."
  hint_little_ice_age_hint_text_3: "#T Додаткові поради#!\n@hint! Нам доступно безліч унікальних [Concept('actions', 'дій')|e], що дозволяють наростити виробництво [Concept('food', 'їжі')|e] або розподілити її серед наших [Concept('provinces', 'провінцій')|e]."
  hint_little_ice_age_diplomatic: "«Наближається зима»."
  hint_little_ice_age_administrative: "«Виробництво та розподіл [Concept('food', 'їжі')|e] врятує наші [Concept('pops', 'групи населення')|e] від передчасної зустрічі зі жнецем»."
  hint_little_ice_age_military: "«Замерзлі водойми стануть прохідними на якийсь час, але [Concept('armies', 'війська')|e], замкнені в зимових горах, можуть застрягти там надовго»."
  hint_the_revolution: "[GetSituationByKey('the_revolution').GetNameWithNoTooltip]"
  hint_the_revolution_hint_text: "$hint_the_revolution_hint_text_1$\n\n$hint_the_revolution_hint_text_2$\n\n$hint_the_revolution_hint_text_3$"
  hint_the_revolution_hint_text_1: "Спалахнуло #TOOLTIP:SITUATION,the_revolution,X #L народне повстання#!#!! Монархії здригнулися, а ідеї свободи, рівності та братерства ширяться зі швидкістю лісової пожежі. Чи приймемо ми полум'я змін, чи станемо на захист старого порядку?"
  hint_the_revolution_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Ми можемо стати [Concept('revolutionary', 'революційною країною')|e], прийнявши сторону [Concept('revolutionary', 'бунтівників')|e] під час [Concept('disaster', 'лиха')|e] #TOOLTIP:DISASTER_TYPE,revolution_disaster,X #L «Революція»#!#!.\n@arrow_bonus_tier_2! Ця [Concept('situation', 'ситуація')|e] відкриває #Y два#! унікальних [Concept('peace_treaties', 'мирних договори')|e]: #TOOLTIP:SCRIPTED_PEACE_TREATY,reinstate_the_monarchy,X #L «Відновлення монархії»#!#! та «[ShowPeaceTreatyTypeNameWithNoTooltip('force_revolution')]».\n@arrow_bonus_tier_1! [Concept('situation', 'Ситуація')|e] також відкриває доступ до нових [Concept('actions', 'дій')|e], таких як #TOOLTIP:GENERIC_ACTION,suppress_foreign_revolutionaries,X #L боротьба із закордонними революціонерами#!#! та #TOOLTIP:GENERIC_ACTION,assist_foreign_revolutionaries,X #L допомога закордонним революціонерам#!#!."
  hint_the_revolution_hint_text_3: "#T Додаткові поради#!\n@hint! Найсильніша революційна країна зможе взяти на себе роль [Concept('revolutionary_target', 'цілі-революціонера')|e], якщо набере найбільший [Concept('great_power_score', 'рахунок великої держави')|e]."
  hint_the_revolution_diplomatic: "«Політична картина вельми цікава: схоже, багато монархів остаточно втратили голову в спробах придушити революцію»."
  hint_the_revolution_administrative: "«Розумно буде вибрати сторону — і якнайшвидше. Від уміння швидко приймати рішення залежить сама доля нашої країни. Ми повинні бути готові зустріти революцію, коли та постукає в наші двері»."
  hint_the_revolution_military: "«Наш вплив повинен простягатися за межі країни, і неважливо, підтримуємо ми революціонерів чи збираємося їх розтрощити»."
  hint_western_schism: "[GetSituationByKey('western_schism').GetNameWithNoTooltip]"
  hint_western_schism_hint_text: "$hint_western_schism_text_1$\n\n$hint_western_schism_text_2$\n\n$hint_western_schism_text_3$\n\n$hint_western_schism_text_4$"
  hint_western_schism_text_1: "У [Concept('situation', 'ситуації')|e] «Великий західний розкол» не можна взаємодіяти з курією, оскільки істинними папами [Concept('international_organization_with_icon', 'міжнародного об’єднання')|e] [GetUniqueInternationalOrganization('catholic_church').GetName] себе оголосили одразу два кандидати.\n\nЩоб вплинути на результат цієї [Concept('situation', 'ситуації')], можна зробити наступне (залежно від вашої ролі в церкві)."
  hint_western_schism_text_2: "#T [Concept('countries', 'Країни')], де є [Concept('cardinal_with_icon', 'кардинал')|e]:#!\n@arrow_bonus_tier_3! Проголосуйте за одного з кандидатів."
  hint_western_schism_text_3: "#T [Concept('countries', 'Країни')], де немає [Concept('cardinal_with_icon', 'кардинала')|e]:#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$schism_show_support_for_one_pope$»#!, щоб допомогти обраному кандидату наблизитися до своєї мети.\n@arrow_bonus_tier_2! Скористайтеся релігійною [Concept('action', 'дією')] «$request_cardinal_seat$», щоб отримати [Concept('cardinal', 'кардинала')].\n@arrow_bonus_tier_1! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$schism_demand_support_from_one_pope$»#!, щоб отримати вигоду з [Concept('situation', 'ситуації')]."
  hint_western_schism_text_4: "У ході цієї [Concept('situation', 'ситуації')] по католицькому світу поширюватиметься єресь.\n\n#T Рекомендації#!\n@arrow_bonus_tier_3! Спробуйте застосувати [Concept('situation', 'ситуативну')|e] [Concept('action', 'дію')] #V «$schism_show_unity_of_faith$»#!, щоб ваша [Concept('religious_unity', 'релігійна єдність')|e] не слабшала."
  hint_reformation: "[GetSituationByKey('reformation').GetNameWithNoTooltip]"
  hint_reformation_hint_text: "$hint_reformation_hint_text_1$\n\n$hint_reformation_hint_text_2$\n\n$hint_reformation_hint_text_3$"
  hint_reformation_hint_text_1: "У [Concept('situation', 'ситуації')|e] «Реформація» #TOOLTIP:BUILDING_TYPE,lutheran_preachers,X #L будівлі лютеранських#!#! та #TOOLTIP:BUILDING_TYPE,calvinist_preachers,X #L кальвіністських проповідників#!#! поширюватимуть нові [Concept('religions', 'релігії')|e] по всьому #TOOLTIP:RELIGIONGROUP,christian,X #L християнському#!#! світу."
  hint_reformation_hint_text_2: "#T Боротьба з реформаторами#!\n@arrow_bonus_tier_3! Приберіть [Concept('buildings', 'споруди')|e] «[ShowBuildingTypeName('lutheran_preachers')]» та «[ShowBuildingTypeName('calvinist_preachers')]» (це знизить [Concept('stability', 'стабільність')|e])\n@arrow_bonus_tier_3! Як тільки це стане можливим, побудуйте #TOOLTIP:BUILDING_TYPE,jesuit_college,X #L єзуїтський коледж#!#! та підтримуйте його діяльність по боротьбі з поширенням #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#! та #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізму#!#!"
  hint_reformation_hint_text_3: "#T Підтримка реформаторів#!\n@arrow_bonus_tier_3! Як тільки у вашій країні набуде поширення одне з нових вчень, прийміть його та наверніться в нову віру за допомогою дії #V «$embrace_the_reformation$»#!.\n@arrow_bonus_tier_2! Відкрийте @religion_panel![Link('country_religion', '', '@society_panel! вкладку релігії')], щоб перейти в нову [Concept('religion', 'віру')]."
  hint_treaty_of_tordesillas: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
  hint_treaty_of_tordesillas_hint_text: "$hint_treaty_of_tordesillas_hint_text_1$\n\n$hint_treaty_of_tordesillas_hint_text_2$"
  hint_treaty_of_tordesillas_hint_text_1: "Звершується [GetSituationByKey('treaty_of_tordesillas').GetName]! [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetName] збираються поділити між собою Новий Світ!"
  hint_treaty_of_tordesillas_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Надати конкретики нашим колоніальним прагненням можна за допомогою унікальних [Concept('actions', 'дій')|e] на панелі [Concept('situation', 'ситуації')|e].\n@arrow_bonus_tier_2! Через деякий час після ратифікації договору почнеться #Y друга#! фаза цієї [Concept('situation', 'ситуації')|e], під час якої взяти участь та заявити свої претензії зможуть інші [Concept('countries', 'країни')|e]."
  hint_treaty_of_tordesillas_diplomatic: "«Нам випала славна нагода під приводом релігійного — і непорушного — авторитету заволодіти частиною нещодавно відкритих земель»."
  hint_treaty_of_tordesillas_administrative: "«Ділові можливості в Новому Світі вражають уяву. Їх ніяк не можна упускати»."
  hint_treaty_of_tordesillas_military: "«Не можна допустити, щоб ворог дістався до цих земель швидше за нас!»"
  hint_great_pestilence: "[GetSituationByKey('great_pestilence').GetNameWithNoTooltip]"
  hint_great_pestilence_hint_text: "$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_great_pestilence_diplomatic: "«Союзники нас покинули, а влада — зрадила. Залишити позиції! Рятуйтесь хто може!»"
  hint_great_pestilence_administrative: "«Не варто впадати у відчай! Зі смертю можна боротися багатьма способами, нехай навіть вони майже марні…»"
  hint_great_pestilence_military: "«Краще, щоб наші [Concept('armies', 'війська')|e] уникали тих [Concept('locations', 'місцевостей')|e], де вирує епідемія. Ми не можемо втрачати вояків»."
  hint_columbian_exchange: "[GetSituationByKey('columbian_exchange').GetNameWithNoTooltip]"
  hint_columbian_exchange_hint_text: "$hint_columbian_exchange_hint_text_1$\n\n$hint_columbian_exchange_hint_text_2$"
  hint_columbian_exchange_hint_text_1: "Звершується [GetSituationByKey('columbian_exchange').GetName]! [Concept('trade', 'Торгівля')|e] пожвавиться: між Старим і Новим Світом хлине бурхливий [Concept('goods', 'товарний')|e] потік!"
  hint_columbian_exchange_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Отримати ще більше вигоди, наповнивши [Concept('market', 'ринок')|e] новими товарами, можна за допомогою унікальних [Concept('actions', 'дій')|e] на панелі [Concept('situation', 'ситуації')|e]."
  hint_columbian_exchange_diplomatic: "Торговий прибуток править світом…"
  hint_columbian_exchange_administrative: "$hint_treaty_of_tordesillas_administrative$"
  hint_columbian_exchange_military: "«Потрібно випередити конкурентів і першими заволодіти джерелами вигоди та новими товарами!»"
  hint_war_of_religions: "[GetSituationByKey('war_of_religions').GetNameWithNoTooltip]"
  hint_war_of_religions_hint_text: "$hint_war_of_religions_hint_text_1$\n\n$hint_war_of_religions_hint_text_2$\n\n$hint_war_of_religions_hint_text_3$\n\n$hint_war_of_religions_hint_text_4$"
  hint_war_of_religions_hint_text_1: "У [Concept('situation', 'ситуації')|e] «Релігійна війна» два [Concept('international_organizations_with_icon', 'міжнародних об’єднання')|e] боротимуться за існування своєї [Concept('religions', 'релігії')|e] в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!. [GetUniqueInternationalOrganization('protestant_union').GetName] та [GetUniqueInternationalOrganization('catholic_league').GetName] пропонуватимуть [Concept('countries', 'країнам')|e], що входять до імперії, свій захист. У міру наростання напруги обидва об’єднання зможуть спробувати зробити свою релігію панівною та змінити [Concept('laws', 'звід законів')|e] імперії згідно зі своїми уподобаннями."
  hint_war_of_religions_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Вступіть до [Concept('international_organization', 'міжнародного об’єднання')], яке хочете підтримати.\n@arrow_bonus_tier_2! Постарайтеся укласти нові [Concept('alliances', 'союзи')|e] зі сторонніми країнами.\n@arrow_bonus_tier_2! Користуючись положенням [Concept('country', 'країни')], яка не вважається учасницею Священної Римської Імперії, укладіть [Concept('alliance', 'союз')] з лідером бажаної для вас релігійної ліги."
  hint_war_of_religions_hint_text_3: "#T Якщо ви очолюєте якусь релігійну лігу#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$prepare_military_escalation$»#!, щоб отримати привід для війни #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Релігійна перевага»#!#!.\n@hint! Після цього ви зможете нав’язати іншим #TOOLTIP:SCRIPTED_PEACE_TREATY,religious_supremacy,X #L релігійну перевагу#!#!, а разом з нею — і вимоги своєї фракції.\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$demand_member_removal$»#!, щоб виключити небезпечні країни з другого [Concept('international_organization', 'об’єднання')], доки не розгорілася [Concept('war', 'війна')]."
  hint_war_of_religions_hint_text_4: "#T Додаткові поради#!\n@hint! Під час [Concept('war', 'війни')] з приводом #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Релігійна перевага»#!#! у [Concept('countries', 'країн')] накопичуватиметься [Concept('war_exhaustion', 'втома від війни')].\n@hint! Якщо #Y 80%#! всіх учасників захочуть [Concept('peace', 'миру')|e], буде підписано #Y Вестфальський мир#!.\n@hint! Після цього [Concept('war', 'війна')] закінчиться, а в Священній Римській Імперії настане релігійний мир."
  hint_guelphs_and_ghibellines: "[GetSituationByKey('guelphs_and_ghibellines').GetNameWithNoTooltip]"
  hint_guelphs_and_ghibellines_hint_text: "$hint_guelphs_and_ghibellines_hint_text_1$\n\n$hint_guelphs_and_ghibellines_hint_text_2$"
  hint_guelphs_and_ghibellines_hint_text_1: "У [Concept('situation', 'ситуації')|e] «Гвельфи та гібеліни» [Concept('international_organizations_with_icon', 'міжнародні об’єднання')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$guelphs_io_tt$,X #L гвельфів#!#! та #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ghibellines_io_tt$,X #L гібелінів#!#! змагаються між собою за вплив на #TOOLTIP:REGION,italy_region,X #L Італійський#!#! [Concept('region', 'регіон')|e]. Підтримкою перших користується [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle|l] [GetUniqueInternationalOrganization('guelphs_io').GetName], підтримкою других — [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
  hint_guelphs_and_ghibellines_hint_text_2: "#T Якщо ви належите до однієї зі сторін#!\n@arrow_bonus_tier_3! Примусьте якусь [Concept('country', 'країну')|e] вступити до складу вашої фракції за допомогою [Concept('casus_belli_with_icon', 'приводу для війни')|e] #TOOLTIP:CASUS_BELLI,cb_gag_force_country_into_faction,X #L «Примусове включення до фракції»#!#!.\n@arrow_bonus_tier_2! Зберігайте [Concept('tax_base', 'податкову базу')|e] учасників вашої фракції за допомогою дипломатії, наприклад [Concept('alliances_with_icon', 'союзів')|e] або [Concept('guarantee_with_icon', 'гарантій')|e].\n@arrow_bonus_tier_2! Збільшуйте [Concept('tax_base_with_icon', 'податкову базу')|e] своєї [Concept('country', 'країни')]."
  hint_colonial_revolution: "[GetSituationByKey('colonial_revolution').GetNameWithNoTooltip]"
  hint_colonial_revolution_hint_text: "$hint_colonial_revolution_hint_text_1$\n\n$hint_colonial_revolution_text_2$\n\n$hint_colonial_revolution_text_3$"
  hint_colonial_revolution_hint_text_1: "У [Concept('situation', 'ситуації')|e] «Колоніальна революція» колоніальні [Concept('subjects', 'васали')|e] борються за незалежність від своїх [Concept('overlords', 'сюзеренів')|e]."
  hint_colonial_revolution_text_2: "#T Якщо ви граєте за колоніальну країну#!\n@arrow_bonus_tier_3! Створіть [Concept('international_organization', 'міжнародне об’єднання')|e] — колоніальну федерацію.\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$seek_alliance_with_overlord_rival$»#!, щоб заручитися допомогою інших [Concept('countries', 'країн')|e].\n@arrow_bonus_tier_1! Якщо колоніальна федерація вже існує, вступіть до неї."
  hint_colonial_revolution_text_3: "#T Якщо ви граєте за [Concept('overlord', 'сюзерена')]#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$establish_goods_act$»#!, щоб отримати додаткові кошти.\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$give_colony_representation$»#!, якщо якась колонія стане нелояльною."
  hint_red_turban_rebellions: "[GetSituationByKey('red_turban_rebellions').GetNameWithNoTooltip]"
  hint_red_turban_rebellions_hint_text: "$hint_red_turban_rebellions_hint_text_1$\n\n$hint_red_turban_rebellions_hint_text_2$\n\n$hint_red_turban_rebellions_hint_text_3$"
  hint_red_turban_rebellions_hint_text_1: "[GetSituationByKey('red_turban_rebellions').GetName] охопило весь Китай! Небеса більше не благоволять #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#!, у [GetCountry('CHI').Custom('rank_ru_PREP')|l] запанував хаос!"
  hint_red_turban_rebellions_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#! необхідно силою #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_rein_in_rebellion,X #L приборкати повстання#!#! та придушити тих, хто прагне вирватися з-під влади країни.\n@arrow_bonus_tier_2! #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоні пов’язки»#!#! можуть вимагати від [GetCountry('CHI').Custom('CL_GEN')] #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_demand_occupied_territories,X #L передати окуповані території#!#!.\n@arrow_bonus_tier_1! [GetCountry('CHI').GetLongName] зіткн[GetCountry('CHI').Custom('endlong_youtut')]ся з безліччю унікальних [Concept('events', 'подій')|e], а землі країни зацікавлять амбітних завойовників."
  hint_red_turban_rebellions_hint_text_3: "#T Додаткові поради#!\n@hint! Нам доступно безліч унікальних [Concept('actions', 'дій')|e] на панелі [Concept('situation', 'ситуації')|e], що дозволяють [Concept('integrate', 'інтегрувати')|e] завойовані землі та зберігати високий [Concept('control', 'контроль')|e]."
  hint_red_turban_rebellions_diplomatic: "«Нескінченна війна майже не залишає часу для бездіяльної балаканини та дипломатичних переговорів…»"
  hint_red_turban_rebellions_administrative: "«У подібній ситуації важливо розуміти, які дії варто робити, а які — ні. Тільки так ми приведемо країну до перемоги»."
  hint_red_turban_rebellions_military: "«Тепер весь Китай знає, що ми тут!»"
  hint_rise_of_timur: "[GetSituationByKey('rise_of_timur').GetNameWithNoTooltip]"
  hint_rise_of_timur_hint_text: "$hint_rise_of_timur_hint_text_1$\n\n$hint_rise_of_timur_hint_text_2$\n\n$hint_rise_of_timur_hint_text_3$"
  hint_rise_of_timur_hint_text_1: "З глибини #TOOLTIP:SUB_CONTINENT,central_asia,X #L Центральної Азії#!#! виходить блідий образ смерті — [GetCharacter('chg_timur_lame_borjigin').GetName] та [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').GetFlavorRank|l]. Горе всякому, хто противитиметься [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] завоюванням!"
  hint_rise_of_timur_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Доки живий [GetCharacter('chg_timur_lame_borjigin').GetName], на [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').Custom('rank_ru_ACC')|l] діятиме [Concept('modifier', 'модифікатор')|e] «#TOOLTIP:STATIC_MODIFIER,timmy_wants_to_play,X #V #L Загибель із Центральної Азії#!#!».\n@arrow_bonus_tier_2! Завдяки цьому [Concept('modifier', 'модифікатору')|e] [GetCharacter('chg_timur_lame_borjigin').GetShortNameWithNoTooltip] зможе автоматично приєднувати обложені [Concept('locations', 'місцевості')|e].\n@arrow_bonus_tier_1! [GetCountry('TIM').GetLongName] отримує доступ до унікального [Concept('casus_belli', 'приводу для війни')|e]."
  hint_rise_of_timur_hint_text_3: "#T Додаткові поради#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! доступно безліч унікальних [Concept('actions', 'дій')|e] на панелі [Concept('situation', 'ситуації')|e]."
  hint_rise_of_timur_diplomatic: "«Можливо, з ордою вийде домовитися?»"
  hint_rise_of_timur_administrative: "«Варто подумати про зведення укріплень для захисту наших кордонів»."
  hint_rise_of_timur_military: "«#ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! доводиться покладатися на могутнє військо пекельних вершників, традиції завойовників і ненаситний голод, що спонукає розверзнути пащу і проковтнути всю #TOOLTIP:CONTINENT,asia,X #L Азію#!#!!»"
  hint_nanbokuchou: "[GetSituationByKey('nanbokuchou').GetNameWithNoTooltip]"
  hint_nanbokuchou_hint_text: "$hint_nanbokuchou_hint_text_1$\n\n$hint_nanbokuchou_hint_text_2$\n\n$hint_nanbokuchou_hint_text_3$"
  hint_nanbokuchou_hint_text_1: "[GetSituationByKey('nanbokuchou').GetName] — це [Concept('situation', 'ситуація')|e], що розділила #TOOLTIP:REGION,japan_region,X #L Японію#!#! між суперницькими північним і південним імператорськими дворами, які прагнуть довести своє право на владу. Оскільки цей конфлікт перетворить усю острівну країну, кожен клан повинен обрати сторону."
  hint_nanbokuchou_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Використовуйте унікальний [Concept('casus_belli', 'привід для війни')|e] «[ShowCasusBelliName('cb_nanbokuchou')]», щоб вести війну на підтримку претендента.\n@arrow_bonus_tier_2! [ShowPeaceTreatyTypeName('peace_expand_clan_influence')] допоможе вам захоплювати ворожі [Concept('locations', 'місцевості')|e].\n@arrow_bonus_tier_1! У разі перемоги [ShowPeaceTreatyTypeNameWithNoTooltip('peace_nanbokuchou_force_imperial_abdication')|l] забезпечить верховенство підтриманого вами імператора."
  hint_nanbokuchou_hint_text_3: "#T Додаткові поради#!\n@hint! Важливо грамотно обирати час. Невеликі клани можуть скористатися конфліктом, щоб отримати перевагу над суперниками.\n@hint! Враховуйте рівновагу сил, перш ніж обирати сторону."
  hint_nanbokuchou_diplomatic: "«Це не просто привід помахати мечами. Вибір претендента визначить нашу спадщину»."
  hint_nanbokuchou_administrative: "«Нелегко підтримувати порядок, обираючи сторону одного з дворів, але це може допомогти нам набути впливу на імперський інститут»."
  hint_nanbokuchou_military: "«Атакуйте рішуче і досягніть легітимності раніше, ніж суперники встигнуть зміцнити свою владу»."
  hint_sengoku: "[GetSituationByKey('sengoku').GetNameWithNoTooltip]"
  hint_sengoku_hint_text: "$hint_sengoku_hint_text_1$\n\n$hint_sengoku_hint_text_2$\n\n$hint_sengoku_hint_text_3$"
  hint_sengoku_hint_text_1: "[GetSituationByKey('sengoku').GetName] — це [Concept('situation', 'ситуація')|e], яка занурює #TOOLTIP:REGION,japan_region,X #L Японію#!#! у стан майже нескінченної війни. Клани б'ються за верховенство, поки сьогун відчайдушно намагається утримати контроль над країною."
  hint_sengoku_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Використовуйте унікальний [Concept('casus_belli', 'привід для війни')|e] «[ShowCasusBelliName('cb_sengoku')]», щоб розширити свій клан.\n@arrow_bonus_tier_2! У ролі сьогуна використовуйте дії «[ShowGenericActionName('sengoku_revoke_clans_land')]», щоб послабити розрослі клани, і «[ShowGenericActionName('sengoku_limit_clans_autonomy')]», щоб перетворити їх на [Concept('building_based', 'екстериторіальні країни')|e].\n@arrow_bonus_tier_1! Якщо у вас [Concept('building_based', 'екстериторіальна країна')|e], то ви можете оголосити про незалежність і стати [Concept('location_based', 'сухопутною країною')|e] за допомогою дії «[ShowGenericActionName('sengoku_proclaim_clan_independence')]»."
  hint_sengoku_hint_text_3: "#T Додаткові поради#!\n@hint! Рівновага сил постійно змінюється. Не втрачайте можливості напасти на ослаблені клани.\n@hint! Якщо ви сьогун, рання консолідація влади значно полегшить об'єднання #TOOLTIP:REGION,japan_region,X #L Японії#!#!.\n@hint! Невеликі клани можуть стравлювати між собою більші клани, щоб улучити момент і здобути свободу."
  hint_sengoku_diplomatic: "«Союзи непостійні. Обирайте друзів з обережністю, адже вже завтра вони можуть стати ворогами»."
  hint_sengoku_administrative: "«Щоб не дозволити країні зануритися в хаос, потрібна міцна рука влади»."
  hint_sengoku_military: "«Настала доба меча. Нападайте швидко і бийте сильно, інакше самі станете здобиччю»."
  swift_end_string: "Будь-яке лихо, зокрема й це, завжди краще закінчити якомога швидше. Невирішені проблеми можуть спричинити неприємності."
  disaster_war_hint: "Слід пам'ятати, що не всі наші сусіди в ці важкі часи прагнуть укласти перемир'я чи союз: деякі намагатимуться розширити свої території за наш рахунок."
  hint_coup_attempt: "Поради щодо ситуації «Спроба перевороту»"
  hint_coup_attempt_hint_text: "$hint_coup_attempt_hint_text_1$\n\n$hint_coup_attempt_hint_text_2$\n\n$hint_coup_attempt_hint_text_3$"
  hint_coup_attempt_hint_text_1: "Наш [Concept('court', 'двір')|e] обплутаний безліччю інтриг. Люди, що прагнуть недосяжної влади, готові заради цього піти на злочин, аби посадити на престол своїх маріонеток, диктувати нам [Concept('laws', 'закони')|e] та забезпечити собі [Concept('privileges', 'привілеї')|e]. Це [Concept('disaster', 'лихо')|e] триватиме, доки змовники не зникнуть, їхній лідер не займе престол або ми не наберемо достатньо [Concept('legitimacy', 'легітимності')|e]. $swift_end_string$"
  hint_coup_attempt_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Ми можемо #TOOLTIP:GENERIC_ACTION,conduct_investigation,X #L провести розслідування#!#!. Це займе деякий час, зате допоможе виявити частину змовників і спростить чистку їхніх лав.\n@arrow_bonus_tier_2! [Concept('stability', 'Стабільність')|e] слід тримати на високому рівні. Що більше її значення, то нижчий поріг [Concept('legitimacy', 'легітимності')|e], необхідної для завершення цього [Concept('disaster', 'лиха')|e].\n@arrow_bonus_tier_1! Якщо обстановка стане зовсім відчайдушною, ми можемо #TOOLTIP:GENERIC_ACTION,call_private_council,X #L скликати таємну раду#!#! або #TOOLTIP:GENERIC_ACTION,execute_court_member,X #L стратити придворного#!#!. Перша дія допоможе нам виявити змовників в обмін на [Concept('privileges', 'привілеї')|e] або [Concept('gold', 'дукати')|e] для [Concept('estates', 'станів')|e]. Друга [Concept('action', 'дія')|e] дозволить нам стратити будь-якого [Concept('court', 'придворного')|e] [Concept('character', 'персонажа')|e], якого ми підозрюємо у змові."
  hint_coup_attempt_hint_text_3: "#T Додаткові поради#!\n@hint! Під час цього [Concept('disaster', 'лиха')|e] можуть відбуватися випадкові [Concept('events', 'події')|e], що вказують на можливих змовників. Кожну таку подію слід уважно вивчити, щоб ухвалити зважене рішення. Буде неприємно, якщо найкращий [Concept('cabinet_member', 'член нашої ради')|e] без вагомої причини позбудеться своєї голови."
  hint_coup_attempt_diplomatic: "«Зараз саме час запевнити сусідні [Concept('countries', 'країни')|e], що ми їм не вороги, а заодно — забезпечити надійний захист кордонів. Нам абсолютно не потрібні загрози ще й ззовні»."
  hint_coup_attempt_administrative: "«Хтось з інших радників — напевно змовник. Так одразу й не вгадати!»"
  hint_coup_attempt_military: "«$disaster_war_hint$ Тому пам'ятайте: випереджувальний удар — це такий #italic несподіваний мирний договір#!, принесений на списах»."
  hint_crisis_of_the_chinese_dynasty: "Поради щодо ситуації «$crisis_of_the_chinese_dynasty$»"
  hint_crisis_of_the_chinese_dynasty_hint_text: "$hint_crisis_of_the_chinese_dynasty_hint_text_1$\n\n$hint_crisis_of_the_chinese_dynasty_hint_text_2$"
  hint_crisis_of_the_chinese_dynasty_hint_text_1: "Небеса, що колись дарували нашій землі процвітання, відвернулися від нас. На Китай обрушилися біди, голод і розруха. Для нашої влади настає похмура пора. Це [Concept('disaster', 'лихо')|e] триватиме, доки ми або не подолаємо його, реформувавши весь адміністративний апарат, або не позбудемося посади володаря #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. $swift_end_string$"
  hint_crisis_of_the_chinese_dynasty_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Можна виконати дію [Concept('cabinet', 'ради')|e] #TOOLTIP:CABINET_ACTION,reform_taxation_system,X #L «Реформа податкової системи»#!#!. Це займе деякий час, зате наблизить нас до того, щоб покласти [Concept('disaster', 'лиху')|e] край.\n@arrow_bonus_tier_2! [Concept('celestial_authority_gc', 'Небесний авторитет')|e] слід тримати на високому рівні. Якщо цей показник досягне значення в #G 90#! або більше одиниць, [Concept('disaster', 'лихо')|e] завершиться мирно.\n@arrow_bonus_tier_1! У ході [Concept('disaster', 'лиха')|e] нам доступно безліч нових [Concept('actions', 'дій')|e], таких як #TOOLTIP:GENERIC_ACTION,cmd_reform_the_cabinet,X #L реформа ради#!#!, #TOOLTIP:GENERIC_ACTION,cmd_restore_stability,X #L відновлення стабільності [GetCountry('CHI').Custom('rank_ru_GEN')l]#!#! та #TOOLTIP:GENERIC_ACTION,cmd_strengthen_crown,X #L зміцнення трону#!#!. Кожна з них — окрема можливість домогтися сприятливого завершення смути в разі неможливості підняти [Concept('celestial_authority_gc', 'небесний авторитет')|e] достатньо високо."
  hint_crisis_of_the_chinese_dynasty_diplomatic: "«Настав час знову утвердити наші добрі стосунки з [Concept('countries', 'країнами')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!, щоб це славне об'єднання проіснувало тисячу років.\n\nАдже що відділяє нас від звірів, як не вміння поважати інших?»"
  hint_crisis_of_the_chinese_dynasty_administrative: "«Якщо ми вирішимо перетворити уряд, щоб покінчити з цим [Concept('disaster', 'лихом')|e], то призначити таке епохальне завдання буде краще здібним [Concept('cabinet_members', 'радникам')|e].\n\nБез економії нас чекає агонія»."
  hint_crisis_of_the_chinese_dynasty_military: "«$disaster_war_hint$\n\nОднак хаос відкриває для нас нові можливості!»"
  hint_turmoil_in_brandenburg: "$turmoil_in_brandenburg$"
  hint_turmoil_in_brandenburg_hint_text: "$hint_turmoil_in_brandenburg_hint_text_1$\n\n$hint_turmoil_in_brandenburg_hint_text_2$\n\n$hint_turmoil_in_brandenburg_hint_text_3$\n\n$hint_turmoil_in_brandenburg_hint_text_4$"
  hint_turmoil_in_brandenburg_hint_text_1: "У ході лиха «$turmoil_in_brandenburg$» нам потрібно зміцнити свою правлячу династію, збільшивши значення показника «Вкладення» до 100 од., а якщо значення модифікатора «Нехтування» досягне 100 од., — то звернутися до імператора з проханням звести на наш престол нову династію. Після 1365 року барони-розбійники стануть частіше з'являтися в наших [Concept('provinces', 'провінціях')|e] і розоряти їх. Як тільки значна частина нашої країни (75% підвладних нам [Concept('provinces', 'провінцій')]) буде звільнена від терору баронів-розбійників за допомогою [Concept('cabinet_action', 'доручення')|e] «$pru_deal_with_robber_barons$», лихо зможе закінчитися."
  hint_turmoil_in_brandenburg_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_1! Збільшіть значення свого показника «Вкладення» або «Нехтування» в ході подій, пов'язаних з лихом.\n@arrow_bonus_tier_1! Розширюйте свою територію обережно, щоб не дати баронам-розбійникам розоряти нові землі."
  hint_turmoil_in_brandenburg_hint_text_3: "#T Додаткові поради#!\nПоверніть собі втрачений [Concept('control', 'контроль')] за допомогою відповідного [Concept('cabinet_action', 'доручення')].\n@hint! Знайдіть [Concept('alliances', 'союзників')|e], здатних допомогти вам у [Concept('civil_war', 'громадянській війні')|e], яка може початися."
  hint_turmoil_in_brandenburg_hint_text_4: "#T Як вплинути на встановлення династій#!\n@hint! Якщо значення показника «$bra_wittelsbacher_investment_var$» досягне 100 од., правляча династія збереже владу.\n@hint! Якщо значення показника «$bra_wittelsbacher_neglect_var$» досягне −100 од., коли в імператора є дорослий спадкоємець, вам стане доступна династія Гогенцоллернів. Як тільки цей спадкоємець стане імператором і почне правити обома країнами, він зможе звести на ваш престол династію Гогенцоллернів."
  hint_war: "Війна"
  hint_war_hint_text: "$hint_war_hint_text_1$\n\n$hint_war_hint_text_2$\n\n$hint_war_hint_text_3$"
  hint_war_hint_text_1: "[Concept('war', 'Війна')|e] починається, коли [Concept('country', 'країна')|e] її оголошує, а завершується підписанням [Concept('peace_treaty', 'мирного договору')|e] між учасниками. У будь-якому [Concept('war', 'конфлікті')] є два [Concept('war_leaders', 'лідери')|e], яких можуть підтримувати [Concept('war_allies', 'військові союзники')|e]. Для закінчення [Concept('war', 'війни')] необхідно, щоб її [Concept('war_leaders', 'лідери')] підписали [Concept('peace_treaty', 'мирний договір')|e], однак другорядні учасники можуть укласти з [Concept('war_leader', 'лідером')] противника сепаратний [Concept('peace_treaty', 'мир')]."
  hint_war_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Перш ніж оголошувати [Concept('war', 'війну')], постарайтеся забезпечити для неї відповідний [Concept('casus_belli_with_icon', 'привід')|e]. Його можна запросити у [Concept('parliament', 'зборів')|e], а якщо майбутній об'єкт нападу є [Concept('rivals', 'суперником')|e] країни, то й сфабрикувати.\n@arrow_bonus_tier_3! Почавши [Concept('war', 'війну')], приділяйте увагу її [Concept('casus_belli', 'приводу')] та [Concept('war_goal', 'цілі')|e], оскільки це важливо для отримання [Concept('war_score_with_icon', 'воєнного рахунку')|e] та підписання вигідного [Concept('peace_treaty_with_icon', 'мирного договору')|e].\n@arrow_bonus_tier_3! Залежно від приводу ми можемо заробляти [Concept('war_score_with_icon', 'воєнний рахунок')|e] різними шляхами. Ось деякі з основних [Concept('war_score', 'його')] джерел:\n@arrow_bonus_tier_1! Окупація ворожої [Concept('capital_with_icon', 'столиці')|e]\n@arrow_bonus_tier_1! Отримання контролю над певними [Concept('locations_with_icon', 'місцевостями')]\n@arrow_bonus_tier_1! Окупація ворожих [Concept('forts_with_icon', 'фортець')|e]\n@arrow_bonus_tier_1! Перемога над ворожими [Concept('armies', 'військами')|e] у [Concept('battle', 'битвах')]\n@arrow_bonus_tier_1! [Concept('blockade', 'Блокада')|e] ворожих [Concept('ports', 'портів')|e]\n@arrow_bonus_tier_3! Слідкуйте за рівнем [Concept('war_exhaustion_with_icon', 'втоми від війни')|e]: він може вкрай негативно позначитися як на економіці, так і на боєздатності."
  hint_war_hint_text_3: "#T Додаткові поради#!\n@hint! Під час [Concept('war', 'війни')] обидві сторони можуть [Concept('occupy', 'окупувати')|e] ворожі [Concept('locations', 'місцевості')|e], але остаточно їх приналежність змінюється тільки після підписання [Concept('peace_treaty', 'мирного договору')|e], що закріплює завоювання.\n@hint! Чим довше триває війна, тим охочіше її учасники приймають пропозицію про мир."
  hint_war_diplomatic: "«Війна може бути дуже вигідним підприємством, але це короткий шлях до катастрофи»."
  hint_war_administrative: "«Коли торгівля не може забезпечити нас усім необхідним, війна стає неминучою»."
  hint_war_military: "«Перевага над сусідами — єдина гарантія нашої безпеки»."
  hint_battle: "Битви"
  hint_battle_hint_text: "$hint_battle_hint_text_1$\n\n$hint_battle_hint_text_2$\n\n$hint_battle_hint_text_3$"
  hint_battle_hint_text_1: "Коли [Concept('army', 'війська')|e] воюючих сторін опиняються в одній [Concept('location', 'місцевості')|e], між ними починається [Concept('battle', 'битва')|e]. [Concept('army', 'Військо')], що прибуло в таку [Concept('location', 'місцевість')] першим, стає в [Concept('defender', 'оборону')|e] і отримує переваги місцевості. Битва завершується, коли одна зі сторін повністю втрачає [Concept('morale', 'бойовий дух')|e] або втрачає всі свої [Concept('regiments', 'полки')|e] — залежно від того, що станеться раніше."
  hint_battle_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Війська, розташовані неподалік, можна покликати як підкріплення. Якщо вони встигнуть прийти вчасно, ваші війська отримають свіжі резерви.\n@arrow_bonus_tier_2! Перш ніж відправляти [Concept('armies', 'військо')|e] в [Concept('battle', 'битву')], переконайтеся, що в нього хороший [Concept('commander', 'командир')|e].\n@arrow_bonus_tier_2! Приділяйте увагу ландшафту [Concept('location', 'місцевості')]. Його рельєф і рослинність можуть ускладнювати дії [Concept('attacker', 'нападника')|e]. Будьте обачні, вибираючи поле майбутнього бою!\n@arrow_bonus_tier_1! Якщо противник має значну перевагу і загрожує розгромити ваше військо, іноді краще подумати про [Concept('retreat', 'відступ')|e]."
  hint_battle_hint_text_3: "#T Додаткові поради#!\n@hint! Програна битва не завжди веде до поразки у [Concept('war', 'війні')|e]. Зазнавши невдачі, можна [Concept('retreat', 'відступити')] в безпечне місце, відновити бойовий дух, за необхідності завербувати найманців і зробити нову спробу в більш вигідних умовах. Усе це доступно і вашому ворогу, тож не втрачайте пильності після перемоги.\n@hint! Якщо в [Concept('location', 'місцевості')] є [Concept('fort', 'фортеця')|e], то сторона, що її контролює, вважається [Concept('defender', 'оборонною')] незалежно від того, хто прийшов першим."
  hint_battle_diplomatic: "«Зачекайте, поки ворог буде ослаблений голодом і виснаженням, і тільки потім нападайте»."
  hint_battle_administrative: "«Швидка перемога на полі бою дозволить нам перейти в наступ, не віддаючи міста і села на поживу ворогам»."
  hint_battle_military: "«Хороший полководець здатен визначити результат битви»."
  hint_siege_and_occupation: "Окупація та облога"
  hint_siege_and_occupation_hint_text: "$hint_siege_and_occupation_hint_text_1$\n\n$hint_siege_and_occupation_hint_text_2$\n\n$hint_siege_and_occupation_hint_text_3$"
  hint_siege_and_occupation_hint_text_1: "Вторгнувшись у [Concept('enemy', 'ворожу')|e] [Concept('location', 'місцевість')|e], наше [Concept('army', 'військо')|e] спробує її [Concept('occupy', 'окупувати')|e]. Якщо в [Concept('location', 'місцевості')] немає [Concept('fort', 'фортеці')|e], це займе всього кілька днів, а от якщо фортеця є, вам доведеться розпочати [Concept('siege', 'облогу')|e].\n\nОблоги можуть тривати місяцями і навіть роками. Це залежить від безлічі чинників, включаючи рівень укріплень, наявність артилерії та [Concept('ability', 'навички')|e] [Concept('general', 'полководця')|e], що облягає.\n\nПри капітуляції гарнізону [Concept('location', 'місцевість')] стає [Concept('occupied', 'окупованою')], а [Concept('fort', 'фортеця')] переходить під контроль переможця.\n\nОкуповані місцевості позначаються на мапі значком решітки і не переходять у володіння окупанта доти, доки їхнє завоювання не буде зафіксовано мирним договором."
  hint_siege_and_occupation_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Перш ніж починати облогу, переконайтеся, що ваше [Concept('army', 'військо')|e] здатне її витримати.\n@arrow_bonus_tier_1! При наближенні небезпечного противника не бійтеся зняти облогу і відступити."
  hint_siege_and_occupation_hint_text_3: "#T Додаткові поради#!\n@hint! Слідкуйте за своїм військом під час облоги, навіть якщо поблизу немає ворожих військ."
  hint_siege_and_occupation_diplomatic: "«Тривала облога може виявитися згубною для місцевого населення»."
  hint_siege_and_occupation_administrative: "«Нам слід розміщувати фортеці так, щоб захистити головні міста від загарбників і мати можливість швидко звільнити їх у разі облоги»."
  hint_siege_and_occupation_military: "«Облога та оборона таких ключових позицій, як вузькі гірські перевали, може визначити результат війни»."
  hint_lacks_of_rivals: "Можливі суперники"
  hint_lacks_of_rivals_hint_text: "$hint_lacks_of_rivals_hint_text_1$\n\n$hint_lacks_of_rivals_hint_text_2$\n\n$hint_lacks_of_rivals_hint_text_3$"
  hint_lacks_of_rivals_hint_text_1: "Нашими [Concept('rivals', 'суперниками')|e] вважаються [Concept('countries', 'країни')|e], що відкрито та вороже виступають проти наших інтересів. Це дає нам низку переваг. По-перше, якщо у нашого суперника є вороги, нам простіше налагодити з ними дипломатичні відносини. По-друге, ми можемо фабрикувати [Concept('casus_belli', 'приводи для війни')|e] проти суперників і втручатися у [Concept('war', 'війни')|e] за їхньої участі."
  hint_lacks_of_rivals_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Слідкуйте за конфліктами та [Concept('alliances', 'союзами')|e] своїх сусідів, обираючи тих самих суперників, що й країна, чиїм союзником ви хочете стати. Однак постарайтеся не набути занадто могутніх ворогів.\n@arrow_bonus_tier_2! Можна дочекатися, коли інші [Concept('countries', 'країни')] оголосять своїх [Concept('rivals', 'суперників')], і вже потім зробити свій хід. Це дозволить вам уникнути небажаних конфліктів.\n@arrow_bonus_tier_2! Щоб фабрикувати [Concept('casus_belli', 'приводи для війни')|e] проти [Concept('rivals', 'суперників')], створюйте на їхній території [Concept('spy_network', 'шпигунську мережу')|e]."
  hint_lacks_of_rivals_hint_text_3: "#T Додаткові поради#!\n@hint! Не обов'язково оголошувати суперниками всіх підряд. Можна просто закрити #W сповіщення#!, клацнувши по ньому правою кнопкою миші.\n@hint! Якщо у вас є суперники, ви отримуватимете пропозиції про участь у війнах на боці їхніх ворогів. Але будьте обережні: [Concept('rival_enemies', 'суперники')|e] так само зможуть втручатися у війни за нашої участі."
  hint_lacks_of_rivals_diplomatic: "«Заводити непотрібних ворогів шкідливо, але наявність спільних суперників може зміцнити наші відносини з сусідами»."
  hint_lacks_of_rivals_administrative: "«Вороги наших ворогів мають бути нашими друзями»."
  hint_lacks_of_rivals_military: "«Наявність відповідного суперника відкриває багато вигідних можливостей для тих, хто не боїться ними користуватися»."
  hint_control: "Досяжність і контроль"
  hint_control_hint_text: "$hint_control_hint_text_1$\n\n$hint_control_hint_text_2$\n\n$hint_control_hint_text_3$"
  hint_control_hint_text_1: "[control_icon] [Concept('control', 'Контроль')|e] є однією з найважливіших характеристик наших [Concept('locations_with_icon', 'місцевостей')|e]. Від нього залежить відсоток [Concept('wealth_with_icon', 'багатства')|e] та [levies_icon] [Concept('levies', 'ополчення')|e] місцевості, яким ми можемо ефективно користуватися. Скільки б [building_icon] [Concept('buildings', 'споруд')|e] та [population_icon] [Concept('population', 'населення')|e] не було в [Concept('location', 'місцевості')], за відсутності [Concept('control', 'контролю')] влада не зможе отримувати з нього [Concept('taxes_with_icon', 'податки')|e] або набирати там [Concept('levies', 'ополчення')].\n\nКонтроль над кожною місцевістю щомісяця змінюється в бік [Concept('max_control', 'максимального контролю')|e]. [Concept('siege', 'Облоги')|e] та інші події можуть тимчасово знизити його, але з часом контроль все одно повернеться до максимального значення для місцевості.\n\n[Concept('max_control', 'Максимальний контроль')|e] залежить насамперед від [proximity_icon] [Concept('proximity', 'досяжності')|e]. [capital_icon] [Concept('capital', 'Столиця')|e] завжди має #W 100%#!-ву досяжність, а для інших місцевостей це значення визначається відстанню до столиці з урахуванням особливостей місцевості: [road_icon] [Concept('roads', 'дороги')|e], поля та [seazones_icon] [Concept('seazones', 'акваторії')|e] зі значною [maritime_presence_icon] [Concept('maritime_presence', 'морською присутністю')|e] впливають на неї позитивно, а гори, ліси та [Concept('seazones', 'акваторії')] з [Concept('pirates', 'піратами')|e] — негативно. На значення максимального контролю, крім іншого, впливають [Concept('pop_satisfaction', 'задоволення груп населення')|e], [Concept('integration_status', 'статус інтеграції')|e] та наявність деяких особливих [Concept('buildings', 'споруд')]."
  hint_control_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Будуйте споруди насамперед у [Concept('capital', 'столиці')] та сусідніх з нею [Concept('locations', 'місцевостях')], оскільки там найбільший рівень [Concept('control', 'контролю')] із самого початку гри.\n@arrow_bonus_tier_2! Будуйте [road_icon] [Concept('roads', 'дороги')|e] на #W панелі місцевості#!, щоб зв'язати [Concept('capital', 'столицю')] з найбагатшими містами країни.\n@arrow_bonus_tier_2! Місцевості з [port_icon] [Concept('port', 'портами')|e] можуть бути пов'язані зі [Concept('capital', 'столицею')] морськими шляхами, особливо за великого [Concept('harbor_capacity', 'розміру гавані')|e]. Збільшити розмір гавані в ключових прибережних [Concept('locations', 'місцевостях')] можна за допомогою таких [Concept('buildings', 'споруд')], як #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#! або #TOOLTIP:BUILDING_TYPE,dock,X #L док#!#!.\n@arrow_bonus_tier_1! У щойно [Concept('conquered', 'завойованій')|e] [Concept('locations', 'місцевості')] [Concept('control', 'контроль')] становить #W 0%#!. Щоб його значення досягло максимуму, потрібен час, але цей процес можна прискорити, розмістивши в [Concept('locations', 'місцевості')] [Concept('army', 'військо')|e] або здійснивши [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,increase_control_province,X #L «Посилення контролю над провінцією»#!#!."
  hint_control_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('location', 'Місцевість')], в якій [Concept('control', 'контроль')] становить #W 0%#!, не приносить [Concept('income_with_icon', 'доходу')|e] від [Concept('taxes', 'податків')], але вироблені нею [Concept('goods', 'товари')|e] все одно надходять на [market_icon] [Concept('market', 'ринок')|e]. Ми можемо скористатися цим, щоб забезпечити [Concept('supply', 'пропозицію')|e] важливих для нас ресурсів.\n@hint! У [Concept('location', 'місцевостях')] з високим рівнем [Concept('control', 'контролю')] #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! швидше [Concept('promote', 'підвищують')|e] свій статус, задовольняючи потреби [Concept('buildings', 'споруд')] у [Concept('employment', 'зайнятості')|e].\n@hint! Ретельно плануйте [Concept('road', 'дорожню')] мережу: всього одна [Concept('road', 'дорога')], грамотно прокладена через гірський хребет, може підвищити [Concept('proximity', 'досяжність')] для безлічі [Concept('location', 'місцевостей')].\n@hint! Дізнатися більше про те, як на [Concept('proximity', 'досяжність')] впливає [Concept('maritime_presence_with_icon', 'морська присутність')|e], можна [Link('hints', 'selected_hint = hint_maritime', 'тут')].#!"
  hint_control_diplomatic: "«Високий рівень контролю дозволяє переконати та асимілювати най… #italic непорядніших#! членів нашого суспільства»."
  hint_control_administrative: "«Місцевість, яку ми не контролюємо, навряд чи платитиме нам податки»."
  hint_control_military: "«Нам потрібно контролювати території, щоб призивати їхнє населення на службу»."
  hint_crown_power: "Влада правителя"
  hint_crown_power_hint_text: "$hint_crown_power_hint_text_1$\n\n$hint_crown_power_hint_text_2$\n\n$hint_crown_power_hint_text_3$"
  hint_crown_power_hint_text_1: "[Concept('crown_power_with_icon', 'Влада правителя')|e] характеризує вплив уряду в межах нашої власної країни. Ми, #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#!, володіємо верховною владою, але ділимося нею з різними [Concept('estates_with_icon', 'станами')|e], а їхні інтереси не завжди збігаються з нашими.\n\nСильна влада правителя полегшує прийняття нових [Concept('laws_with_icon', 'законів')|e], підвищує ефективність нашої [Concept('cabinet_with_icon', 'ради')|e] та збільшує базову підтримку наших рішень на [Concept('parliament_with_icon', 'зборах')|e]. Однак найважливішим є те, що саме влада правителя визначає, якою мірою країна ділить зі [Concept('estates', 'станами')] доходи та витрати, пов'язані з [Concept('trade_with_icon', 'торгівлею')|e] та [Concept('food_with_icon', 'їжею')|e].\n\nВлада правителя залежить насамперед від кількості [Concept('privileges_with_icon', 'привілеїв')|e], дарованих [Concept('estates', 'станам')], та [Concept('control_with_icon', 'контролю')|e] над найбільш густонаселеними [Concept('locations_with_icon', 'місцевостями')|e]."
  hint_crown_power_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підвищуйте контроль над [Concept('locations', 'місцевостями')], прокладаючи туди [Concept('roads_with_icon', 'дороги')|e] зі [Concept('capital_with_icon', 'столиці')|e]. \n@arrow_bonus_tier_2! Відкликайте [Concept('privileges', 'привілеї')] для наймогутніших [Concept('estates', 'станів')], коли наша [Concept('stability_with_icon', 'стабільність')|e] достатньо висока, але стежте за [Concept('estate_satisfaction', 'задоволенням станів')|e]: їхній гнів може обернутися серйозними проблемами.\n@arrow_bonus_tier_1! Збільште значення показника «[Localize(Player.GetGovernment.GetGovernmentType.GetPowerConcept)]» за допомогою [Concept('cabinet_action_with_icon', 'доручення')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Зміцнення уряду»#!#!.\n@arrow_bonus_tier_1! Побудуйте в [Concept('capital', 'столиці')] #TOOLTIP:BUILDING_TYPE,royal_court,X #L монарший двір#!#! або #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерію#!#!."
  hint_crown_power_hint_text_3: "#T Додаткові поради#!\n@hint! Якщо влада правителя становить 50%, то половина доходів та витрат, пов'язаних з [Concept('trade', 'торгівлею')] та [Concept('food', 'їжею')], дістається безпосередньо [Concept('treasury_with_icon', 'скарбниці')|e], а друга половина розподіляється між [Concept('estates', 'станами')] залежно від їхньої [Concept('estate_power_with_icon', 'влади')|e].\n@hint! На початку гри влада правителя зазвичай дуже невелика, особливо у великих [Concept('countries', 'країнах')].\n@hint! Надалі вам будуть доступні [Concept('advances_with_icon', 'поступи')|e] та додаткові [Concept('buildings', 'споруди')], що дозволяють збільшити [Concept('crown_power', 'владу правителя')]."
  hint_crown_power_diplomatic: "«Якщо у правителя недостатньо влади, ми змушені покладатися на милість станів»."
  hint_crown_power_administrative: "«Зміцнення влади правителя може сприяти торгівлі»."
  hint_crown_power_military: "«Централізація робить країну набагато сильнішою»."
  hint_estates: "Стани"
  hint_estates_hint_text: "$hint_estates_hint_text_1$\n\n$hint_estates_hint_text_2$\n\n$hint_estates_hint_text_3$"
  hint_estates_hint_text_1: "Стани представляють інтереси різних класів і груп населення нашої країни. Кожна з них має певну частку [Concept('estate_power_with_icon', 'станової влади')|e], що відображає її вплив у порівнянні з іншими станами, до яких належать і #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#!. Загальна сума влади всіх станів завжди становить 100%.\n\nОсновним джерелом станової влади є [Concept('population_with_icon', 'населення')|e], причому кожен [Concept('pop_type', 'суспільний клас')|e] надає підтримку одному конкретному [Concept('estate', 'стану')]. Потім станова влада змінюється залежно від чинних [Concept('laws_with_icon', 'законів')|e] та [Concept('privileges_with_icon', 'привілеїв')|e].\n\nВід влади кожного стану залежить його вплив у [Concept('parliament_with_icon', 'зборах')|e], [Concept('tax', 'оподаткування')|e], а також частка доходів і витрат, пов'язаних із [Concept('trade_with_icon', 'торгівлею')|e] та [Concept('food_with_icon', 'їжею')|e].\n\nКожен стан також має [Concept('estate_satisfaction_with_icon', 'задоволення')|e], яке характеризує його згоду з політикою нашого уряду. Якщо стан задоволений, то ви отримуєте певні для нього переваги, а якщо значення задоволення опускається нижче #W 50%#!, виникають негативні ефекти. Занадто низьке [Concept('estate_satisfaction', 'задоволення')] одного зі станів може призвести до того, що пов'язані з ним [Concept('pops', 'групи населення')|e] піднімуть [Concept('rebellions_with_icon', 'заколот')|e]. Але найнеприємніше полягає в тому, що при задоволенні нижче #W 25%#! стан перестає надавати [Concept('levies_with_icon', 'ополчення')|e]."
  hint_estates_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! [Concept('taxes', 'Податки')|e], що збираються зі [Concept('estates', 'станів')], є головним джерелом [Concept('income', 'доходу')|e] для більшості [Concept('countries', 'країн')]. Налаштувати або автоматизувати збір податків можна на @economy_panel! #W панелі балансу#!.\n@arrow_bonus_tier_2! Будь-яка влада, якою володіють стани, обмежує нашу власну [Concept('crown_power_with_icon', 'владу правителя')|e]. Щоб зменшити владу певного стану, можна позбавити його [Concept('privileges_with_icon', 'привілеїв')|e] на @government_panel! #W вкладці «Стани»#!.\n@arrow_bonus_tier_1! Щоб умиротворити бунтівний стан, ви можете знизити для нього [Concept('taxes', 'податки')], дарувати йому [Concept('privilege', 'привілей')] або підкупити його за допомогою @government_panel! #W вкладки «Стани»#!."
  hint_estates_hint_text_3: "#T Додаткові поради#!\n@hint! Стани збирають усю [Concept('tax_base_with_icon', 'податкову базу')|e] в [Concept('locations', 'місцевостях')|e] нашої країни, а нам дістаються лише ті кошти, які ми отримуємо від цих станів у вигляді [Concept('taxes', 'податків')|e].\n@hint! На ранніх етапах гри [Concept('wars_with_icon', 'воюючі')|e] [Concept('countries', 'країни')] дуже сильно залежать від [Concept('levies_with_icon', 'ополчення')|e], яке надають [Concept('estates', 'стани')], але з появою більш сучасних [Concept('regular_regiments_with_icon', 'регулярних військ')|e] ця залежність поступово сходить нанівець."
  hint_estates_diplomatic: "«Сильний стан духовенства зміцнює стабільність країни»."
  hint_estates_administrative: "«Сильний стан містян приносить нам багатство та розширює торговельні зв'язки»."
  hint_estates_military: "«Сильна знать збільшує чисельність і міць наших військ»."
  hint_markets: "Ринки"
  hint_markets_hint_text: "$hint_markets_hint_text_1$\n\n$hint_markets_hint_text_2$\n\n$hint_markets_hint_text_3$"
  hint_markets_hint_text_1: "[Concept('markets_with_icon', 'Ринки')|e] — це основа економіки в грі #italic Europa Universalis V#!. Кожна місцевість належить до певного ринку, де відбувається купівля та продаж товарів для [Concept('pop_needs', 'потреб населення')|e], [Concept('buildings', 'споруд')|e] та [Concept('constructions', 'будівництва')|e]. Продаж товарів на ринку збільшує [Concept('tax_base_with_icon', 'податкову базу')|e] місцевості для [Concept('estates', 'станів')|e], з яких, своєю чергою, збирає [Concept('taxes', 'податки')|e] уряд."
  hint_markets_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Щоб побачити доступні нам ринки, перейдіть на @economy_panel![Link('trade', 'subtab = markets', 'панель ринків')]. #G Зеленим#! кольором виділяються ринки, [Concept('owned', 'належні')|e] нам, а синім — ринки, де у нас є [Concept('merchant_capacity', 'торговельний потенціал')|e], але немає [Concept('location', 'місцевостей')] [Concept('own', 'у володінні')].\n@arrow_bonus_tier_3! Краще автоматизувати кожен окремий [Concept('market', 'ринок')], клацнувши по @automation! #W значку шестерні#!. Таким чином ми завжди будемо використовувати весь [Concept('merchant_capacity_with_icon', 'торговельний потенціал')|e] наших найефективніших [Concept('merchants_with_icon', 'купців')|e].\n@arrow_bonus_tier_2! Для збільшення [Concept('merchant_capacity_with_icon', 'торговельного потенціалу')|e] можна будувати такі [Concept('buildings_with_icon', 'споруди')|e], як #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! та #TOOLTIP:BUILDING_TYPE,trade_office,X #L торгові контори#!#!."
  hint_markets_hint_text_3: "#T Додаткові поради#!\n@hint! Межі ринків рухливі. Кожна [Concept('location', 'місцевість')] автоматично переходить у сферу впливу [Concept('market', 'ринку')] з найвищою [Concept('market_attraction_with_icon', 'ринковою привабливістю')|e] на своїй території, навіть якщо цей ринок є іноземним. При цьому [Concept('market_attraction', 'привабливість')] іноземних ринків можна зменшити за допомогою [Concept('protectionism_with_icon', 'протекціонізму')|e]."
  hint_markets_diplomatic: "«Невидима рука сильна, але іноді її потрібно злегка направити»."
  hint_markets_administrative: "«Це економіка, дурні!»"
  hint_markets_military: "«Зростання наших ринків — це добре.\nЗавоювання сусідських ринків — ще краще»."
  hint_food: "Їжа"
  hint_food_hint_text: "$hint_food_hint_text_1$\n\n$hint_food_hint_text_2$\n\n$hint_food_hint_text_3$"
  hint_food_hint_text_1: "[Concept('food_with_icon', 'Їжа')|e] потрібна [Concept('pops', 'групам населення')|e] для виживання, а [Concept('armies', 'військам')|e] — для ведення війни. І ті, й інші отримують її із запасів [Concept('province_with_icon', 'провінції')|e], в якій перебувають (але не із запасів [Concept('location', 'місцевості')]). Якщо цих запасів виявиться недостатньо, [Concept('pops', 'населення')] буде [Concept('starvation', 'голодувати')|e], а [Concept('armies', 'війська')] — страждати від [Concept('attrition', 'виснаження')|e].\n\nЄ три рівні виробництва та розподілу їжі:\n\n@location! [Concept('local_food', 'Місцева їжа')|e]\nЇжа виробляється переважно в [Concept('locations', 'місцевостях')|e] з [Concept('rgo_with_icon', 'джерелами сировини')|e] для [Concept('food_raw_materials', 'виробництва їжі')|e] — наприклад, #TOOLTIP:GOODS,livestock,X худобою#!. Її надлишок або дефіцит додається до запасу їжі в провінції.\n\n@province! [Concept('provincial_food', 'Запас їжі в провінції')|e]\nЦе найважливіший рівень. Якщо [Concept('province', 'провінція')|e] не виробляє достатньо їжі для забезпечення всіх своїх місцевостей, запас їжі в провінції скорочується. Як тільки цей запас повністю вичерпається, всі місцевості провінції почнуть страждати від [Concept('starvation', 'голоду')|e]. Але перш ніж це станеться, провінція спробує [Concept('buy_food', 'купити їжу')|e] на ринку.\n\n@market! [Concept('market_food', 'Їжа на ринку')|e]\nУсі провінції на [Concept('market', 'ринку')|e] прагнуть [Concept('sell_food', 'продати їжу')] при надлишку запасів і [Concept('buy_food', 'купити')] її при нестачі. Поки на ринку вистачає їжі, голод нікому не загрожує."
  hint_food_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Доступні нам ринки можна побачити на @economy_panel![Link('trade', 'subtab = markets', 'панелі ринків')]. #G Зеленим#! кольором там позначені ринки, до яких належать [Concept('owned', 'належні')|e] нам [Concept('locations', 'місцевості')], тому нам потрібно стежити, щоб баланс [Concept('food', 'їжі')] на цих ринках завжди залишався позитивним. Якщо кількість [Concept('food', 'їжі')] на будь-якому з наших ринків почне швидко зменшуватися, ми побачимо жовтий банер, а якщо в окремих [Concept('locations', 'місцевостях')] почався голод — червоний.\n@arrow_bonus_tier_3! Щоб збільшити виробництво їжі на будь-якому з наших ринків, натисніть кнопку «Їжа» і перейдіть на @production_panel![Link('food_production', '', 'панель виробництва їжі')]. Тут можна побачити, яким з наших [Concept('provinces', 'провінцій')] загрожує [Concept('starvation', 'голод')], і розширити там [Concept('rgo', 'видобуток ресурсів')].\n@arrow_bonus_tier_3! Розширювати [Concept('rgo_with_icon', 'видобуток ресурсів')|e] рекомендується в місцевостях з найбільшим запасом [Concept('food_raw_materials', 'ресурсів для виробництва їжі')] (наприклад, #TOOLTIP:GOODS,rice,X #L рису#!#! або #TOOLTIP:GOODS,wheat,X #L пшениці#!#!), а також високою [Concept('food_productivity_with_icon', 'ефективністю її виробництва')|e].\n@arrow_bonus_tier_1! Ми також можемо скористатися [Concept('merchant_capacity_with_icon', 'торговельним потенціалом')|e], щоб імпортувати [Concept('food_raw_materials', 'ресурси для виробництва їжі')|e] з інших [Concept('markets', 'ринків')] і таким чином отримувати потрібну кількість [Concept('food', 'їжі')]. Це можна зробити на @economy_panel![Link('trade', 'subtab = trades', 'панелі торгівлі')]."
  hint_food_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('winter_with_icon', 'Взимку')|e] виробництво їжі зменшується. Не лякайтеся, якщо побачите, що баланс їжі на всіх наших ринках негативний протягом кількох місяців.\n@hint! [Concept('provinces', 'Провінції')] з дефіцитом їжі автоматично закуповують надлишки у більш продуктивних провінцій, що належать до того ж ринку, тому виробництво їжі найкраще розвивати в [Concept('locations', 'місцевостях')] з найвищою [Concept('food_productivity', 'ефективністю цього виробництва')].\n@hint! У [Concept('town_or_city', 'міських')|e] місцевостях ефективність виробництва [Concept('food', 'їжі')] зазвичай нижча, ніж у [Concept('rural_locations', 'сільських')|e]."
  hint_food_diplomatic: "«Тривалий голод може погубити як наше населення, так і саму країну»."
  hint_food_administrative: "«На голод можна дивитися по-різному. Якщо ви продаєте всім їжу, то голод не такий вже й поганий»."
  hint_food_military: "«Голодний вояк багато не навоює»."
  hint_maritime: "Морська присутність"
  hint_maritime_hint_text: "$hint_maritime_hint_text_1$\n\n$hint_maritime_hint_text_2$\n\n$hint_maritime_hint_text_3$"
  hint_maritime_hint_text_1: "[Concept('maritime_presence_with_icon', 'Морська присутність')|e] — вкрай важлива характеристика, властива прибережним [Concept('seazones_with_icon', 'акваторіям')|e]. Вона сприяє підтримці [Concept('proximity_with_icon', 'досяжності')|e] для наших берегів та островів.\n\nКрім того, завдяки морській присутності на [Concept('market_with_icon', 'ринку')|e], до якого належать [Concept('seazones', 'акваторії')], набирається [Concept('merchant_power_with_icon', 'торговельна перевага')|e].\n\n[Concept('maritime_presence', 'Морська присутність')] зростає пасивно — цьому допомагають споруди та присутність [Concept('navy_with_icon', 'флоту')|e]. Вона може зменшуватися або навіть втратитися остаточно під впливом [Concept('privateers_with_icon', 'каперів')|e] та [Concept('blockade_with_icon', 'блокад')|e]."
  hint_maritime_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Будуйте спеціалізовані [Concept('navies', 'флоти')] з кораблів, які набирають [Concept('maritime_presence', 'морську присутність')] у великих кількостях. Їх можна розмістити в якійсь прибережній [Concept('seazones', 'акваторії')], і тоді вони будуть рівномірно поширювати [Concept('maritime_presence', 'морську присутність')] на всі [Concept('seazones', 'акваторії')], які належать до однієї й тієї ж [Concept('province_with_icon', 'провінції')|e].\n@arrow_bonus_tier_3! Інший варіант: задайте їм [Concept('military_objective_with_icon', 'військову ціль')|e] #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!. Ефект буде таким же, але при цьому кораблі, що потребують ремонту, зможуть автоматично причалювати.\n@arrow_bonus_tier_1! #TOOLTIP:BUILDING_TYPE,coastal_fort,X #L Берегова фортеця#!#! — вкрай корисна споруда!"
  hint_maritime_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('maritime_presence', 'Морська присутність')] поширюється лише на ту [Concept('province', 'провінцію')], де є кораблі, навіть якщо поставлена ціль охоплює кілька [Concept('provinces', 'провінцій')]. [Concept('navy', 'Флот')], що виконує ціль #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!, покине свою [Concept('seazone', 'акваторію')] лише тоді, коли [Concept('maritime_presence', 'морська присутність')] у цій місцевості досягне 100 одиниць.\n@hint! Діяльність [Concept('privateers', 'каперів')] порівняно з [Concept('maritime_presence', 'морською присутністю')] охоплює лише [Concept('area_with_icon', 'області')|e]."
  hint_maritime_diplomatic: "«Щоб вигідніше торгувати, нам доведеться скористатися своєю природною перевагою — береговою лінією»."
  hint_maritime_administrative: "«Чим безпечніше мореплавство, тим краща взаємодія з народом»."
  hint_maritime_military: "«Сильний флот надійно захистить наші торгові шляхи від піратів»."
  hint_slaves: "Раби"
  hint_slaves_hint_text: "$hint_slaves_hint_text_1$\n\n$hint_slaves_hint_text_2$\n\n$hint_slaves_hint_text_3$"
  hint_slaves_hint_text_1: "@slaves_goods! #TOOLTIP:GOODS,slaves_goods,X #L Раби#!#! — особливий вид [Concept('good_with_icon', 'товару')|e]. Як і будь-який інший [Concept('good', 'товар')], їх купують і продають на [Concept('markets_with_icon', 'ринках')|e], а ціна залежить від [Concept('supply', 'пропозиції')|e] та [Concept('demand', 'попиту')|e]. Але на відміну від інших [Concept('good', 'товарів')], раби — це реальні [Concept('pops_with_icon', 'групи населення')|e], які переміщуються під час торгівлі [Concept('good', 'товаром')].\n\n@slaves! #TOOLTIP:POPTYPE,slaves,X #L Раби#!#! як [Concept('pop_type_with_icon', 'суспільний клас')|e] можуть працювати в місцях [Concept('rgo_with_icon', 'видобутку ресурсів')|e] та рабовласницьких [Concept('buildings_with_icon', 'спорудах')|e], таких як [ShowBuildingTypeName('sugar_plantation')|l].\n\n[Concept('buildings', 'Споруди')] на кшталт #TOOLTIP:BUILDING_TYPE,slave_market,X #L невільничого ринку#!#! можуть перетворювати наявних @slaves! #TOOLTIP:POPTYPE,slaves,X #L рабів#!#! на [Concept('goods', 'продаваних')] @slaves_goods! #TOOLTIP:GOODS,slaves_goods,X #L рабів#!#!. Надалі цим [Concept('good', 'товаром')] можна торгувати на [Concept('market', 'ринку')], як і будь-яким іншим, а [Concept('buildings', 'споруди')] зможуть задовольняти цим [Concept('good', 'товаром')] свій попит. У такому випадку @slaves! #TOOLTIP:POPTYPE,slaves,X #L раби#!#! перемістяться в [Concept('location', 'місцевість')], щоб працювати в [Concept('building', 'споруді')]."
  hint_slaves_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Створюючи [Concept('colonies_with_icon', 'колонії')|e] на іншому [Concept('continent', 'континенті')|e], ви зможете [Concept('trade_with_icon', 'продавати')|e] рабів на колоніальних [Concept('markets', 'ринках')], щоб вони працювали на плантаціях.\n@arrow_bonus_tier_2! Ви можете зводити #TOOLTIP:BUILDING_TYPE,slave_center,X #L центри работоргівлі#!#! в чужих [Concept('locations', 'місцевостях')] у межах [Concept('trade_range_with_icon', 'торгової відстані')|e], щоб забезпечити собі стабільний приплив рабів."
  hint_slaves_hint_text_3: "#T Додаткові поради#!\n@hint! Зазвичай [Concept('pops', 'групи населення')|e] стають рабами для [Concept('buildings', 'споруд')] на кшталт #TOOLTIP:BUILDING_TYPE,slave_market,X #L невільничого ринку#!#!, хоча деякі [Concept('countries', 'країни')] мають особливі механіки, що дозволяють поневолювати [Concept('pops', 'групи населення')] під час [Concept('war_with_icon', 'війни')|e].\n@hint! #TOOLTIP:RELIGIONGROUP,christian,X #L Християнство#!#! допускає використання рабів лише на плантаціях — ці [Concept('buildings', 'споруди')] з'являються в #V добу Відкриттів#! і доступні лише в заморських землях."
  hint_slaves_diplomatic: "«Всі люди створені рівними, але є винятки»."
  hint_slaves_administrative: "«Великі звершення завжди вимагають чималих жертв»."
  hint_slaves_military: "«Якщо вільна праця завжди в дефіциті, скористаємося язичниками»."
  hint_eco: "Просунута економічна порада"
  hint_eco_hint_text: "$hint_eco_hint_text_1$\n\n$hint_eco_hint_text_2$\n\n$hint_eco_hint_text_3$"
  hint_eco_hint_text_1: "Багато аспектів економіки можна автоматизувати, однак, щоб сприяти розвитку [Concept('country', 'країни')], деякі дії доведеться здійснювати особисто."
  hint_eco_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Завжди намагайтеся скорочувати [Concept('expenses_with_icon', 'витрати')|e].\n\n@arrow_bonus_tier_3! Зосередьтеся на плануванні [Concept('towns_and_cities_with_icon', 'міст')|e] та [Concept('roads_with_icon', 'доріг')|e].\n    Оскільки [Concept('towns_and_cities_with_icon', 'міські місцевості')|e] скорочують доступну кількість місць [Concept('rgo_with_icon', 'видобутку ресурсів')|e], краще розвивати міста з найменш цінних [Concept('rural_locations', 'сільських місцевостей')]. Зазвичай у таких місцевостях видобувається наступне.\n@sand!#TOOLTIP:GOODS,sand,X #L Пісок#!#! @clay!#TOOLTIP:GOODS,clay,X #L Глина#!#! @horses!#TOOLTIP:GOODS,horses,X #L Коні#!#! @medicaments!#TOOLTIP:GOODS,medicaments,X #L Ліки#!#! @wine!#TOOLTIP:GOODS,wine,X #L Вино#!#! @olives!#TOOLTIP:GOODS,olives,X #L Оливки#!#! @millet!#TOOLTIP:GOODS,millet,X #L Невибагливі злаки#!#! @legumes!#TOOLTIP:GOODS,legumes,X #L Бобові#!#! @fruit!#TOOLTIP:GOODS,fruit,X #L Фрукти#!#! @wild_game!#TOOLTIP:GOODS,wild_game,X #L Дичина#!#! @beeswax!#TOOLTIP:GOODS,beeswax,X #L Бджолиний віск#!#! \n\n@arrow_bonus_tier_3! Виділяйте [Concept('subjects_with_icon', 'васалів')|e] на землях зі слабким [Concept('control_with_icon', 'контролем')|e] — там у цих васалів з'явиться свій контроль.\n    [Concept('annex_with_icon', 'Поглинайте')|e] своїх васалів, коли розширите місцеву інфраструктуру.\n    Швидкість [Concept('annexation_with_icon', 'приєднання')|e] залежить від відносного розміру країн та їхнього [Concept('cultural_influence', 'культурного впливу')|e].\n\n@arrow_bonus_tier_2! [Concept('rgo_with_icon', 'Видобуток цінних ресурсів')|e] — хороша інвестиція, особливо якщо паралельно розвивати [Concept('merchant_capacity_with_icon', 'торговий потенціал')|e] для [Concept('export_with_icon', 'експорту')|e].\n@goods_gold!#TOOLTIP:GOODS,goods_gold,X #L Золото#!#! @silver!#TOOLTIP:GOODS,silver,X Срібло#! @gems!#TOOLTIP:GOODS,gems,X #L Дорогоцінне каміння#!#! @pearls!#TOOLTIP:GOODS,pearl,X #L Перли#!#! @amber!#TOOLTIP:GOODS,amber,X #L Бурштин#!#! @ivory!#TOOLTIP:GOODS,ivory,X #L Виробна кістка#!#! @pepper!#TOOLTIP:GOODS,pepper,X #L Перець#!#! @saffron!#TOOLTIP:GOODS,saffron,X #L Шафран#!#! @chili!#TOOLTIP:GOODS,chili,X #L Чилі#!#!\n\n@arrow_bonus_tier_2! На [Concept('trade_income_with_icon', 'доходи від торгівлі')|e] впливає [Link('hints', 'selected_hint = hint_crown_power_with_icon', 'влада правителя')]. Вам варто за можливості їх збільшувати, нарощуючи [Link('hints', 'selected_hint = hint_increasing_trade_capacity_with_icon', 'торговий потенціал')], який, на відміну від [Concept('tax_base', 'податкової бази')], не збільшується зі зростанням [Concept('control', 'контролю')].\n\n@arrow_bonus_tier_1! Підтримуйте низькі ціни на промислові товари! Вони збільшать доходи від міст і знизять витрати на утримання [Concept('buildings_with_icon', 'споруд')|e].\n@lumber!#TOOLTIP:GOODS,lumber,X #L Лісоматеріали#!#! @masonry!#TOOLTIP:GOODS,masonry,X #L Кам'яна кладка#!#! @glass!#TOOLTIP:GOODS,glass,X #L Скло#!#! @iron!#TOOLTIP:GOODS,iron,X #L Залізо#!#! @mercury!#TOOLTIP:GOODS,mercury,X #L Ртуть#!#! @steel!#TOOLTIP:GOODS,steel,X #L Сталь#!#!\n\n@arrow_bonus_tier_1! Споруди без певного [Concept('production_method_with_icon', 'методу виробництва')|e] вимагатимуть витрат на [Concept('maintenance_with_icon', 'утримання')|e]. Ці витрати змінюватимуться залежно від ціни споживаних товарів. Пам'ятайте, що [Concept('demand', 'попит')|e] [Concept('buildings', 'споруд')] також сприяє економічному зростанню!"
  hint_eco_hint_text_3: "#T Додаткові поради#!\n[Link('hints', 'selected_hint = hint_inflation', '@hint! Зниження інфляції')]\n[Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! Збільшення торгового потенціалу')]\n[Link('hints', 'selected_hint = hint_control', '@hint! Посилення контролю')]"
  hint_eco_diplomatic: "«Монети нерідко стають найкращим інструментом впливу»."
  hint_eco_administrative: "«Золото — є кров країни»."
  hint_eco_military: "«Дохід, відібраний в іншого, — найкращий вид доходів»."
  hint_pol: "Просунута політична порада"
  hint_pol_hint_text: "$hint_pol_hint_text_1$\n\n$hint_pol_hint_text_2$\n\n$hint_pol_hint_text_3$"
  hint_pol_hint_text_1: "На початку гри всі [Concept('countries_with_icon', 'країни')|e] мають свої недоліки. Обов'язково ознайомтеся з [Concept('privileges_with_icon', 'привілеями')|e] та [Concept('laws_with_icon', 'зводами законів')|e] на вкладці [Link('government', 'tabcontent = estates_with_icon', '$lateralview_government_entry_name$')]. Масштабні зміни можуть виявитися дуже корисними в довгостроковій перспективі.\n\nНе бійтеся змін!"
  hint_pol_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Переконайтеся, що [Concept('estate_satisfaction_equilibrium_with_icon', 'рівноважне задоволення')|e] дозволяє оподатковувати #TOOLTIP:ESTATE_TYPE,burghers_estate,X містян#!#! та #TOOLTIP:ESTATE_TYPE,peasants_estate,X простолюд#!#! максимальними [Concept('tax', 'податками')|e] і при цьому не опускається нижче #W 50%#!.\n\n@arrow_bonus_tier_3! Відкрийте [Link('societal_values', '', '@government_panel! Панель уряду > Цінності')], щоб дізнатися, до яких [Concept('societal_values_with_icon', 'суспільних цінностей')|e] варто прагнути. Зазвичай найвигіднішими є наступні.\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('capital_economy')]\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('centralization')]\n\n@arrow_bonus_tier_3! Вивчіть [Concept('laws_with_icon', 'звід законів')|e] і подивіться, які закони варто змінити.\n    [Concept('parliament_with_icon', 'Збори')|e] мають стати одним із пріоритетів на ранньому етапі гри, оскільки з їх допомогою змінювати закони буде простіше.\n    Ось закони, на які варто звернути увагу на початку гри.\n    $BULLET_WITH_TAB$[ShowLawName('mining_law')]\n    $BULLET_WITH_TAB$[ShowLawName('precious_metal_distribution_law')]\n    $BULLET_WITH_TAB$[ShowLawName('distribution_of_power_law')]\n    $BULLET_WITH_TAB$[ShowLawName('administrative_system')]\n\n@arrow_bonus_tier_3! Вивчіть вже видані та доступні [Concept('privileges_with_icon', 'привілеї')|e] для кожного [Concept('estate_with_icon', 'стану')|e]. Вони дозволять змінювати рівноважне задоволення та зсуватися за шкалою суспільних цінностей.\n   #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знаті#!#! потрібно давати достатньо привілеїв, щоб заручитися їхньою вірністю, але не більше. Зменшення влади цього стану принесе вам користь у довгостроковій перспективі.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobles_land_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobility_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_serfdom_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_sponsored_navy')]\n\n   #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L Духовенству#!#! варто дарувати всі позитивні привілеї, навіть якщо їх не можна оподатковувати. Кожна одиниця їхнього задоволення понад #W 50%#! збільшує бонус до [Concept('research_progress_with_icon', 'дослідницьких напрацювань')|e].\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('embellish_great_works_of_faith')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_in_administration')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_religious_state')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clerical_advisory_council')]\n\n   #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L Містянам#!#! потрібно дарувати якомога більше позитивних привілеїв. Вони принесуть вам користь, а збільшення [Concept('estate_power_with_icon', 'станової влади')|e] містян зменшить владу інших станів. Крім того, кожна одиниця їхнього задоволення підвищує [Concept('production_efficiency_with_icon', 'виробничу ефективність')|e].\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_roads_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('market_fairs')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_trade_center_sponsorship')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('commercial_advisory_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('control_over_the_coinage')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('guild_investments')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('land_of_commerce')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('urban_development_grants')]\n\n   Привілеї #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! повинні забезпечувати їм достатньо рівноважного задоволення, щоб оподатковувати їх максимальним податком, але не варто забувати про їхню схильність до #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L самоврядності#!#!. Станова влада простолюду невелика, тому відбирання їхніх привілеїв обійдеться вам дешевше, ніж для інших станів.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_allowed_weapons_privilege')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_hunting')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('no_labor_sunday')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_represented_in_parliament')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_fewer_levies')]\n\n@arrow_bonus_tier_2! Звертайте увагу на [Concept('government_reforms_with_icon', 'державні реформи')|e], які відповідають цікавим для вас суспільним цінностям. Пам'ятайте, що завдяки деяким бонусам, наприклад до [Concept('diplomatic_capacity', 'дипломатичного потенціалу')|e], можна знизити [Concept('diplomatic_maintenance', 'витрати на дипломатію')|e].\n\n@arrow_bonus_tier_2! Деякі [Concept('cabinet_actions_with_icon', 'доручення')|e], такі як #TOOLTIP:CABINET_ACTION,stabilize_country,X #L підвищення стабільності в країні#!#! або #TOOLTIP:CABINET_ACTION,strengthen_government,X #L зміцнення уряду#!#!, дозволяють скоротити витрати, залишаючи у вашому розпорядженні більше доходів!"
  hint_pol_hint_text_3: "#T Додаткові поради#!\n[Link('hints', 'selected_hint = hint_crown_power', '@hint! Влада правителя')]\n[Link('hints', 'selected_hint = hint_estates', '@hint! Стани')]"
  hint_pol_diplomatic: "«Практичний правитель отримує вигоду з будь-якої ситуації»."
  hint_pol_administrative: "«Успішна політика — запорука процвітання»."
  hint_pol_military: "«Стани часто гірші за будь-якого ворога»."
  hint_mil: "Просунута порада щодо експансії"
  hint_mil_hint_text: "$hint_mil_hint_text_1$\n\n$hint_mil_hint_text_2$\n\n$hint_mil_hint_text_3$"
  hint_mil_hint_text_1: "Дві загальні поради: професійні [Concept('armies_with_icon', 'війська')|e] (включно з [Concept('mercenaries', 'найманцями')|e]) завжди перемагають [Concept('levies_with_icon', 'ополчення')|e] рівної чисельності, а найкращим способом наростити військо є економічне зростання."
  hint_mil_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Постарайтеся якомога швидше відкрити [Concept('institution', 'інститут')|e] #TOOLTIP:INSTITUTION,professional_armies,X #L професійних військ#!#!: поступ «[ShowAdvanceName('armory_advance')]» дозволить вам перемагати в тих [Concept('wars_with_icon', 'війнах')|e], де раніше це було неможливо.\n\n@arrow_bonus_tier_3! [Concept('war_score_with_icon', 'Воєнний рахунок')|e] за перемоги в [Concept('battles', 'битвах')|e] зменшується з кожною [Concept('ages', 'добою')|e]. На початку він може досягати #W 50%#!, що дозволить вигравати [Concept('wars', 'війни')|e] за рахунок одних лише битв!\n\n@arrow_bonus_tier_3! Переконайтеся, що у вас є доступ до стратегічних [Concept('goods_with_icon', 'товарів')|e]. Вони не потрібні у великих обсягах, але без них вам не збільшити чисельність [Concept('army', 'війська')|e] та [Concept('navy', 'флоту')|e]: @tin!#TOOLTIP:GOODS,tin,X #L олово#!#!, @lead!#TOOLTIP:GOODS,lead,X #L свинець#!#! та @copper!#TOOLTIP:GOODS,copper,X #L мідь#!#!.\n\n@arrow_bonus_tier_3! Війська [Concept('reinforce_with_icon', 'поповнюються')|e] лише на дружній території.\n\n@arrow_bonus_tier_3! #TOOLTIP:UNITCATEGORY,army_infantry,X #L Піхота#!#! утворює основну [Concept('battle', 'бойову')|e] лінію. Вона дешева та ефективно поглинає [Concept('damage_taken', 'втрати')|e], тоді як #TOOLTIP:UNITCATEGORY,army_artillery,X #L артилерія#!#! завдає основні втрати на лінії фронту. Вкрай важливо, щоб лінія фронту пережила [Concept('bombard_phase_with_icon', 'фазу обстрілу')|e].\n\n@arrow_bonus_tier_2! Не менш важливо, щоб у ваших військ на [Concept('enemy_with_icon', 'ворожій')|e] території була пряма лінія постачання. Якщо її перерізати, військо може загинути від [Concept('attrition', 'виснаження')|e]. Використовуйте #TOOLTIP:UNITCATEGORY,army_auxiliary,X #L допоміжні війська#!#!, щоб доставляти [Concept('food', 'їжу')|e] на лінію фронту, або будуйте [Concept('supply_depots', 'продовольчі склади')|e].\n\n@arrow_bonus_tier_1! [Concept('buildings', 'Споруди')|e], що збільшують [Concept('manpower_with_icon', 'число рекрутів')|e], мають найбільшу вартість [Concept('maintenance_with_icon', 'утримання')|e] в грі. Їх краще зводити в [Concept('locations', 'місцевостях')|e] з високим [Concept('control', 'контролем')|e].\n\n@arrow_bonus_tier_1! Зазвичай битви тривають лише кілька днів, тому переконайтеся, що у вас є підкріплення, перш ніж рухатися вглиб ворожої території."
  hint_mil_hint_text_3: "#T Додаткові поради#!\n[Link('hints', 'selected_hint = hint_manpower', '@hint! Число рекрутів')]\n[Link('hints', 'selected_hint = hint_sailors', '@hint! Моряки')]\n[Link('hints', 'selected_hint = hint_war', '@hint! Війна')]\n[Link('hints', 'selected_hint = hint_battle', '@hint! Битви')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Окупація та облога')]"
  hint_mil_diplomatic: "«Нехай інші країни виграють ваші війни»."
  hint_mil_administrative: "«Виснаження погубить будь-яке військо»."
  hint_mil_military: "«Не приходьте на перестрілку з ножем»."
  hint_holland: "Базова порада щодо гри за Голландію"
  hint_holland_hint_text: "Вкрай урбанізовані [Concept('locations', 'місцевості')] Нідерландів роблять [Player.Custom(longname_ru_ACC)] головним кандидатом на роль комерційного центру Північної Європи.\n\n@hint! #T Зводьте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!\n#!\n у всіх #TOOLTIP:LOCATIONRANK,town,X #L містечках#!\n#!\nАвтоматизована торгівля скористається їхнім [Concept('merchant_capacity_with_icon', 'торговим потенціалом')|e], щоб [Concept('import_with_icon', 'імпортувати')|e] [Concept('raw_materials_with_icon', 'сировинні товари')|e], яких немає на ринку #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [market_icon][Player.GetCapital.GetMarket.GetShortName], та [Concept('export_with_icon', 'експортувати')|e] надлишки [Concept('produced_goods_with_icon', 'товарів, що виробляються в наших містечках')|e].\n\n@hint! #T Розширюйте текстильну промисловість#!\nНа експорті #TOOLTIP:GOODS,fine_cloth,X тонкого сукна#! можна добре заробити. Зводьте #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдії прядильників#!#! та #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L кравців#!#!, а також за необхідності імпортуйте #TOOLTIP:GOODS,wool,X вовну#! з #TOOLTIP:LOCATION,london,X #L лондонського#!#! ринку.\n\n@hint! #T Збільште [Concept('crown_power', 'владу правителя')]#![Concept('trade_income_with_icon', 'Доходи від торгівлі')|e] діляться між #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителями#!#! та [Concept('estates_with_icon', 'станами')|e] відповідно до їхньої відносної влади. Велика [Concept('crown_power_with_icon', 'влада правителя')|e] забезпечить стабільний приплив [Concept('trade_income', 'доходів від торгівлі')] до [Concept('treasury', 'скарбниці')|e]. Детальніше про [Concept('crown_power', 'владу правителя')] можна дізнатися [Link('hints', 'selected_hint = hint_crown_power', 'тут')].\n\n@hint! #T Слідкуйте за надходженням [Concept('food', 'їжі')]#![Concept('urban_locations', 'Міські місцевості')|e] виробляють менше [Concept('food_with_icon', 'їжі')|e], ніж [Concept('rural_locations', 'сільські')|e]. Слідкуйте за [Concept('food_stockpile_with_icon', 'запасами їжі')|e] на ринку #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [Player.GetCapital.GetMarket.GetShortName] та за необхідності нарощуйте [Concept('rgo_with_icon', 'видобуток')|e] #TOOLTIP:GOODS,fish,X риби#! та #TOOLTIP:GOODS,livestock,X худоби#!. Якщо [Concept('food', 'їжа')] стане занадто дорогою, це негативно позначиться на [Concept('budget', 'балансі')] скарбниці.\n\n@hint! #T Дружите з сусідами#!Хоч ми й багаті, але через свої скромні розміри вразливі перед ворожою агресією. Використовуйте [Concept('diplomatic_action_with_icon', 'дипломатичну дію')|e] «$IMPROVE_RELATIONTITLE$» щодо найбільш грізних сусідів, таких як [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName]."
  hint_holland_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_holland_administrative: "$hint_advisor_salute_administrative$"
  hint_holland_military: "$hint_advisor_salute_military$"
  hint_hungary: "Базова порада щодо гри за Угорщину"
  hint_hungary_hint_text: "[Player.GetLongName] почина[Player.Custom('endlong_etyut')] гру в привілейованому становищі як одна з головних країн [Concept('region', 'регіону')|e]. У нас є [Concept('alliance_with_icon', 'союз')|e] з #W Польщею#!, #W Боснія#! наш [Concept('subject_with_icon', 'васал')|e], а [Player.GetGovernment.GetRuler.GetName] [Concept('ruler_with_icon', 'править')|e] #W Хорватією#! на правах [Concept('personal_union_with_icon', 'особистої унії')|e]. Це означає, що ми можемо спрямувати свої зусилля на розвиток [Concept('country', 'країни')|e], не турбуючись про зовнішні загрози… принаймні, поки що.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] до копалень#!\nНа північ від [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] розташовані багаті поклади #TOOLTIP:GOODS,goods_gold,X #L золота#!#! та #TOOLTIP:GOODS,silver,X #L срібла#!#!. Однак вони недостатньо розвинені, і наш [Concept('control_with_icon', 'контроль')|e] над цими [Concept('locations', 'місцевостями')] невеликий. Ми повинні прокласти [Concept('roads_with_icon', 'дороги')|e] від [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] до цих цінних копалень, щоб підвищити [Concept('proximity_with_icon', 'досяжність')|e] та [Concept('control', 'контроль')].\n\n@hint!  #T Зведіть гільдії ювелірів в околицях [Concept('capital', 'столиці')]#!\nЧерез високу пропозицію впала ціна золота та срібла на ринку #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [market_icon] [Player.GetCapital.GetMarket.GetShortName]. [ShowBuildingTypeName('jewelry_guild')|U] споживатиме золото та срібло для виробництва дорогих #TOOLTIP:GOODS,jewelry,X ювелірних виробів#!, що зробить наші копальні ще ціннішими.\n\n@hint! #T Зводьте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! для експорту надлишків#!\nАвтоматизована [Concept('trade_with_icon', 'торгівля')|e] буде [Concept('export_with_icon', 'експортувати')|e] надлишки [Concept('goods_with_icon', 'товарів')|e], таких як [ShowGoodsNameWithNoTooltip('jewelry')|l], на інші [Concept('markets_with_icon', 'ринки')|e], створюючи [Concept('trade_income_with_icon', 'доходи від торгівлі')|e] та забезпечуючи прибутковість виробничого ланцюжка.\n\n@hint! #T Скасуйте політику «[ShowPolicyName('gold_export_ban')]»#!\nЄвропа потребує нашого золота, і ми можемо добре заробити на його експорті, але чинний [Concept('law', 'закон')|e] «[ShowLawName('precious_metal_distribution_law')]» забороняє це. Можливо, варто змінити [Concept('policy', 'політику')] під час наступного скликання [Concept('parliament_with_icon', 'зборів')|e]."
  hint_hungary_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_hungary_administrative: "$hint_advisor_salute_administrative$"
  hint_hungary_military: "$hint_advisor_salute_military$"
  hint_norway: "Базова порада щодо гри за Норвегію"
  hint_norway_hint_text: "[Player.GetLongName] — велика [Concept('country', 'країна')|e], але за межами [Concept('capital', 'столиці')|e] ми володіємо в кращому випадку номінальним [Concept('control', 'контролем')|e]. Нам потрібно розширювати морську та суходільну інфраструктуру, щоб підвищити [Concept('proximity', 'досяжність')|e] та отримати доступ до ресурсів півночі.\n\n@hint!#T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\nВарто спробувати прокласти [Concept('roads_with_icon', 'дороги')|e] з [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] до всіх навколишніх #TOOLTIP:LOCATIONRANK,town,X #L містечок#!#! та місць [Concept('rgo_with_icon', 'видобутку цінних ресурсів')|e], щоб підвищити [Concept('proximity_with_icon', 'досяжність')|e] та [Concept('control_with_icon', 'контроль')|e]. З правильними інвестиціями #TOOLTIP:GOODS,silver,X срібні#! рудники на захід від [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] можуть стати прибутковими. Частіше перевіряйте мапу [Concept('proximity', 'досяжності')]!\n\n@hint!#T Збільште [Concept('maritime_presence', 'морську присутність')]#!\nПрокладання [Concept('roads', 'доріг')] через гірські центральні регіони країни може виявитися дорогим і безглуздим заняттям. При достатній [Concept('maritime_presence_with_icon', 'морській присутності')|e] вздовж наших берегів [Concept('proximity', 'досяжність')] буде набагато ефективніше поширюватися морем. Будуйте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристані#!#! та #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в містечках, а також відправляйте флоти #TOOLTIP:UNITCATEGORY,navy_light_ship,X #L легких кораблів#!#! патрулювати узбережжя, коли досліджуєте відповідний [Concept('advance_with_icon', 'поступ')|e].\n\n@hint!#T Будуйте містечка в зручних гаванях поблизу нашої [Concept('capital', 'столиці')]#!\n[Concept('proximity', 'Досяжність')] прибережних [Concept('locations', 'місцевостей')] можна підвищити за допомогою [Concept('natural_harbor_suitability_with_icon', 'природних гаваней')|e]. Перевірте мапу придатності гавані, щоб знайти найкращі порти.\n\n@hint!#T Розвивайте виробництво#!\nСтворюйте в містах #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гільдії кравців#!#!, #TOOLTIP:BUILDING_TYPE,furniture_guild,X #L меблеві гільдії#!#! та #TOOLTIP:BUILDING_TYPE,scriptorium,X #L скрипторій#!#! для переробки природних ресурсів. Будуйте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#!, щоб [Concept('export_with_icon', 'експортувати')|e] ці ресурси на інші [Concept('markets_with_icon', 'ринки')|e].\n\n@hint!#T Зміцніть унію зі Швецією#!\nНаша [Concept('personal_union_with_icon', 'особиста унія')|e] [GetCountry('SWE').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#! гарантує мир на кордонах. Ми могли б домогтися більшої інтеграції, прийнявши спільний [Concept('laws', 'звід законів')] на панелі [Concept('international_organization', 'міжнародного об’єднання')|e]."
  hint_norway_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_norway_administrative: "$hint_advisor_salute_administrative$"
  hint_norway_military: "$hint_advisor_salute_military$"
  hint_naples: "Базова порада щодо гри за Неаполь"
  hint_naples_hint_text: "[Player.GetLongName], найбільша країна [Concept('region', 'регіону')|e], ма[Player.Custom('endlong_etyut')] всі сподівання домогтися панування в італійських торгівлі та політиці, тоді як наші [Concept('subjects', 'васали')|e] в Греції надають зручний плацдарм для зовнішньої експансії.\n\n@hint! #T Прокладайте [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\nМи повинні спробувати прокласти [Concept('roads_with_icon', 'дороги')|e] з [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] до всіх навколишніх #TOOLTIP:LOCATIONRANK,town,X #L містечок#!#! та місць [Concept('rgo_with_icon', 'видобутку цінних ресурсів')|e], щоб підвищити [Concept('proximity_with_icon', 'досяжність')|e] та [Concept('control_with_icon', 'контроль')|e].\n\n@hint! #T Розширте видобуток [Concept('raw_materials', 'сировинних товарів')]#!\nНаша [Concept('country', 'країна')] багата на цінні [Concept('raw_materials_with_icon', 'сировинні товари')|e]. #TOOLTIP:GOODS,wool,X Вовна#!, #TOOLTIP:GOODS,fiber_crops,X #L прядильні культури#!#! та #TOOLTIP:GOODS,silk,X #L шовк#!#! цінні самі собою, але їх також споживає текстильна промисловість у наших [Concept('urban_locations', 'міських місцевостях')|e]. Постарайтеся якомога швидше розширити [Concept('rgo_with_icon', 'видобуток цих ресурсів')|e] та посильте [Concept('control', 'контроль')] у згаданих місцевостях.\n\n@hint! #T Розвивайте текстильну промисловість#!\nСтворіть #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдії прядильників#!#! та #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L кравців#!#! в наших [Concept('urban_location', 'міських місцевостях')]. Вони споживатимуть нашу [Concept('raw_materials', 'сировину')] для виробництва дорогих [Concept('produced_goods_with_icon', 'товарів')|e], збільшуючи попит, завдяки чому [Concept('rgo', 'видобуток ресурсів')] стане більш вигідним.\n\n@hint! #T Будуйте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! для експорту надлишків#!\nАвтоматизована [Concept('trade_with_icon', 'торгівля')|e] буде [Concept('export_with_icon', 'експортувати')|e] надлишки будь-яких [Concept('goods', 'товарів')|e], наприклад, #TOOLTIP:GOODS,fine_cloth,X #L тонкого сукна#!#!, на інші [Concept('markets_with_icon', 'ринки')|e], що принесе [Concept('trade_income_with_icon', 'доходи від торгівлі')|e] та забезпечить прибутковість всього виробничого ланцюжка."
  hint_naples_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_naples_administrative: "$hint_advisor_salute_administrative$"
  hint_naples_military: "$hint_advisor_salute_military$"
  hint_castile: "Базова порада щодо гри за Кастилію"
  hint_castile_hint_text: "Найсильніша країна [Concept('region', 'регіону')|e], [Player.GetLongName] є[Player.Custom('endlong_etyut')] головним кандидатом на об'єднання Іберії під владою одного трону. Однак наша адміністрація вже працює на межі можливостей, а наш [Concept('control', 'контроль')] над півднем настільки слабкий, що ледь вносить вклад у наш [Concept('budget', 'бюджет')|e]. Буде мудро спочатку зміцнити [Concept('control', 'контроль')] над вже належними нам територіями і лише потім продовжувати завоювання.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\n[Concept('control_with_icon', 'Непідконтрольні')|e] [Concept('locations', 'місцевості')] практично марні для нашої адміністрації. Прокладайте [Concept('roads_with_icon', 'дороги')|e] зі [Concept('capital_with_icon', 'столиці')|e] та зводьте #TOOLTIP:BUILDING_TYPE,bridge_infrastructure,X #L мости#!#!, щоб підвищити [Concept('proximity_with_icon', 'досяжність')|e], а через неї і [Concept('control', 'контроль')]. Частіше звертайте увагу на мапу [Concept('proximity', 'досяжності')]!\n\n@hint! #T Підкоріть #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#!\nМи не в змозі ефективно [Concept('own', 'володіти')|e] цими землями, але могли б зробити #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#! своїм [Concept('subject_with_icon', 'васалом')|e]. Васал правитиме землями від нашого імені та щомісяця виплачуватиме данину до нашої [Concept('treasury', 'скарбниці')]. Ми можемо постаратися [Concept('annexing_with_icon', 'поглинути')|e] васала, коли наші інфраструктура та технології розвинуться достатньо, щоб ми могли безпосередньо заволодіти цими землями. Для [Concept('annex', 'поглинання')] [Concept('subject', 'васала')] нам необхідно правити ним більше #Y 10#! років та налагодити з ним добрі стосунки.\n\n@hint! #T Далі межі#!\n[Concept('explorers_with_icon', 'Дослідники')|e] розповідають про немислимі багатства, побачені в Індії. Однак подібні підприємства без сучасних [Concept('advances_with_icon', 'поступів')|e] можуть виявитися непомірно дорогими."
  hint_castile_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_castile_administrative: "$hint_advisor_salute_administrative$"
  hint_castile_military: "$hint_advisor_salute_military$"
  hint_ottomans: "Базова порада щодо гри за османів"
  hint_ottomans_hint_text: "Насувається [Concept('situation', 'ситуація')|e] «Сходження турків» надасть унікальну можливість для стрімкого розширення в Грецію та Анатолію. Здійснюйте ситуативні [Concept('actions', 'дії')|e], щоб отримати [Concept('casus_belli_with_icon', 'привід для війни')|e] з сусідами та обрушити на них нашу міць.\n\n@hint!#T Інтегруйте завоювання#!\nНещодавно [Concept('conquered_with_icon', 'завойовані')|e] [Concept('locations', 'місцевості')] необхідно [Concept('integrated_with_icon', 'інтегрувати')|e] в нашу адміністрацію за допомогою [Concept('cabinet_with_icon', 'ради')|e]. Лише тоді наші завоювання принесуть плоди.\n\n@hint!#T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\n[Concept('control_with_icon', 'Непідконтрольні')|e] [Concept('locations', 'місцевості')] практично марні для нашої адміністрації. Прокладайте [Concept('roads_with_icon', 'дороги')|e] зі [Concept('capital_with_icon', 'столиці')|e] та зводьте #TOOLTIP:BUILDING_TYPE,bridge_infrastructure,X #L мости#!#!, щоб підвищити [Concept('proximity_with_icon', 'досяжність')|e], а через неї і [Concept('control', 'контроль')]. Частіше звертайте увагу на мапу [Concept('proximity', 'досяжності')]!\n\n@hint!#T Створюйте [Concept('subjects', 'васалів')] для управління завойованими землями#!\nУ міру розширення ви підкорите землі, що лежать за межами нашої [Concept('proximity', 'досяжності')]. Створюйте [Concept('subjects_with_icon', 'васалів')|e], які правитимуть ними від вашого імені доти, доки ви не зможете керувати ними самостійно.\n\n@hint!#T Приєднуйте [Concept('subject', 'васалів')] у міру підвищення [Concept('proximity', 'досяжності')]#!\nУ міру розвитку інфраструктури та підвищення [Concept('proximity', 'досяжності')] з'явиться сенс безпосередньо керувати колись марними землями. Щоб [Concept('annex_with_icon', 'поглинути')|e] [Concept('subject', 'васала')] необхідно, щоб ми правили ним більше #Y 10#! років та підтримували з ним добрі стосунки.\n\n@hint!#T Збільште [Concept('maritime_presence', 'морську присутність')]#!\nПересічена місцевість Греції та Анатолії ускладнює підвищення [Concept('proximity', 'досяжності')] суходолом. Достатня [Concept('maritime_presence_with_icon', 'морська присутність')|e] вздовж узбережжя дозволить ефективніше підвищувати [Concept('proximity', 'досяжність')] морем. Будуйте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристані#!#! та #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в містах, а також відправляйте [Concept('navies_with_icon', 'флоти')|e] патрулювати узбережжя. Це відіграє дуже важливу роль, якщо ми перенесемо [Concept('capital', 'столицю')] до #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!"
  hint_ottomans_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_ottomans_administrative: "$hint_advisor_salute_administrative$"
  hint_ottomans_military: "$hint_advisor_salute_military$"