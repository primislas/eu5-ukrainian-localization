l_russian:
  TAB_TOOLTIP_HINTS_TITLE: "Підказки"
  TAB_TOOLTIP_HINTS: "#T Підказки#!\nТут можна побачити підказки, що стосуються поточної ситуації."
  OPEN_HINTS: "Відкрити підказки"
  OPEN_HINT: "Відкрити підказку"
  EXPAND_HINT: "Клацніть, щоб розгорнути підказку"
  COLLAPSE_HINT: "Клацніть, щоб згорнути підказку"
  EMPTY_HINT_SCREEN_TEXT: "У державі все спокійно. Поки ми нічого не можемо порадити!"
  OPEN_HINT_TEXT: "Переглянути підказку @hint!"
  ALERT_HINT: "Відкрити з підказкою"
  ALERT_ADVANCES_HINT: "Відкрити панель покращень з порадою"
  HINT_TITLE: "Підказка @hint!"
  RECOMMENDED_ACTIONS_TITLE: "@hint! Рекомендовані дії"
  SCRIPTABLE_HINT_DEFINITION_TEXT: "$MAIN_HINT$ $CONTEXT_HINT$"
  HINT_DIVIDER: "\n\n---\n\n"
  HINT_SORT_BY_PRIORITY: "Сортувати за пріоритетом"
  hint_advisor_salute_diplomatic: "\n«Вітаю, Ваша Високосте, я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').GetName], [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').IsFemale, 'ваша політична радниця і смиренна', 'ваш політичний радник і смиренний' )] слуга»."
  hint_advisor_salute_administrative: "\n«[Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').GetName], до ваших послуг, [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').IsFemale, 'вірна радниця', 'вірний радник' )] вашої світлості в питаннях економіки»."
  hint_advisor_salute_military: "\n«Мене звуть [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').GetName], і я [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').IsFemale, 'ваша', 'ваш' )] експерт у військових справах. До ваших послуг»."
  HINTS_AND_SUGGESTIONS: "Поради та пропозиції"
  MANPOWER_HINT: "Мало рекрутів!"
  manpower_topbar_hint: "Головним чином ми збільшуємо [Concept('manpower','число рекрутів')|e] при зведенні [Concept('building','споруд')|e] певного типу."
  MANPOWER_HINT_EXTRA: "Щоб збільшити [Concept('manpower','число рекрутів')|e], можна побудувати будь-яку з наступних споруд:"
  MANPOWER_HINT_NONE: "На жаль, жодна доступна нам споруда не збільшить число рекрутів."
  MANPOWER_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  SAILORS_HINT: "Мало моряків!"
  sailors_topbar_hint: "Головним чином ми отримуємо більше [Concept('sailors','моряків')|e] при зведенні [Concept('buildings','споруд')|e] певного типу в прибережних [Concept('locations','районах')|e]."
  SAILOR_HINT_EXTRA: "Щоб збільшити кількість моряків, можна побудувати будь-яку з наступних споруд:"
  SAILOR_HINT_NONE: "На жаль, жодна доступна нам споруда не збільшить кількість моряків."
  SAILOR_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
  INVALID_MODIFIER_TYPE: "Шукається неприпустимий тип модифікатора!"
  EMPTY_RESEARCH_HINT: "Можна обрати дослідження!"
  empty_research_topbar_hint: "@trigger_no! Завжди корисно проводити [Concept('research','дослідження')|e]. Зараз ми втрачаємо дорогоцінний прогрес."
  NO_BUILDINGS_WITH_MODIFIER: "Ні"
  GOLD_HINT: "У нас дефіцит!"
  gold_topbar_hint: "У разі дефіциту бюджету ми можемо скоротити [Concept('expenses','витрати')|e], підвищити [Concept('taxes','податки')|e] або [Concept('mint','відчеканити')|e] більше монет. Якщо у нас закінчиться [Concept('gold','золото')|e], ми будемо змушені брати [Concept('loans','позики')|e] і врешті-решт можемо [Concept('bankrupt','збанкрутувати')|e]."
  STABILITY_HINT: "Наша держава нестабільна!"
  stability_topbar_hint: "Є кілька способів підвищити стабільність:\n$BULLET_WITH_TAB$Збільшити кількість #TOOLTIP:POPTYPE,clergy,X #L священників#!#!, які представляють #L #L [GetPlayer.GetReligion.GetAdjective|l]#!у#! віру.\n$BULLET_WITH_TAB$Спрямувати більше грошей з [Concept('budget','бюджету')|e] на підвищення стабільності.\n$BULLET_WITH_TAB$Доручити [Concept('cabinet','раді')|e] дію «[ShowCabinetActionName('stabilize_country')]»."
  LEGITIMACY_HINT: "[Localize( GetPlayer.GetGovernment.GetGovernmentType.GetPowerKey )] на низькому рівні!"
  legitimacy_topbar_hint: "Є кілька способів виправити цю проблему.\n$BULLET_WITH_TAB$Спрямувати більше грошей з [Concept('budget','бюджету')|e] на [Concept('court_maintenance','утримання двору')|e].\n$BULLET_WITH_TAB$Доручити [Concept('cabinet','раді')|e] дію «[ShowCabinetActionName('strengthen_government')]»."
  devotion_topbar_hint: "$legitimacy_topbar_hint$"
  republican_tradition_topbar_hint: "$legitimacy_topbar_hint$"
  horde_unity_topbar_hint: "$legitimacy_topbar_hint$"
  tribal_cohesion_topbar_hint: "$legitimacy_topbar_hint$"
  GOLD_VIEW_HINT: "Переглянути пораду щодо дефіциту"
  hint_in_deficit: "Від'ємний баланс"
  hint_in_deficit_hint_text: "$hint_in_deficit_hint_text_1$\n\n$hint_in_deficit_hint_text_2$\n\n$hint_in_deficit_hint_text_3$"
  hint_in_deficit_hint_text_1: "Наш баланс від'ємний, а тому діяти потрібно обережно: державі загрожують борги і навіть банкрутство."
  hint_in_deficit_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Відкрийте вкладку @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')], щоб переглянути [Concept('income','доходи')|e] та [Concept('expenses', 'витрати')]. Переміщенням повзунків тут можна підвищувати [Concept('taxes','податки')|e] або зменшувати витрати.\n@arrow_bonus_tier_2! Досягніть того, щоб усі [Concept('buildings','споруди')|e] приносили дохід, або побудуйте нові споруди (якщо можете собі це дозволити). Для цього відкрийте вкладку @production_panel![Link('production', '', 'lateralview_production_entry_name')].\n@arrow_bonus_tier_2! Задійте [Concept('estates','стани')|e] — взаємодія з ними може принести як короткострокову, так і довгострокову вигоду. Однак завжди варто пам'ятати, що стани також мають значний політичний вплив, тому краще уникати надмірної залежності. Знайти їх можна у вкладці @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')]\n@arrow_bonus_tier_1! Ознайомтеся з існуючими або можливими торговими маршрутами у вкладці @economy_panel![Link('trade', '', 'lateralview_trade_entry_name')] і укладіть вигідну [Concept('trades','торгову угоду')|e]."
  hint_in_deficit_hint_text_3: "#T Додаткові підказки:#!\n@hint! Вийти з від'ємного балансу також допоможуть [Concept('laws','зводи правил')|e], [Concept('reforms','принципи')|e], [Concept('diplomacy','дипломатія')|e] та багато іншого."
  hint_in_deficit_military: "«Витрати на війну одразу вдарять по скарбниці, але якщо ми здобудемо перемогу, платити за цей тягар буде вже переможений. Забравши собі чужу землю, ми отримаємо довгострокову вигоду, у той час як розграбування ворога збагатить нас ненадовго, але одразу»."
  hint_in_deficit_explorer: "«Там, у незвіданих краях, земля напевно багата — її можна буде і грабувати, і розвивати»."
  hint_in_deficit_administrative: "«Гарний спосіб стати багатшим — зайняти панівне становище на внутрішньому ринку. Якщо ж і цього буде мало, можна буде спробувати закріпитися на іноземних ринках, і тоді золото потече ще рясніше»."
  hint_in_deficit_diplomatic: "«Як то кажуть, щоб заробляти гроші, потрібно їх витрачати! Щоб перетягнути шальки терезів, потрібно зробити так, щоб робота наших споруд і праця населення приносили дохід»."
  hint_cultural_capacity: "Перевищено культурний потенціал"
  hint_cultural_capacity_hint_text: "$hint_cultural_capacity_hint_text_1$\n\n$hint_cultural_capacity_hint_text_2$\n\n$hint_cultural_capacity_hint_text_3$"
  hint_cultural_capacity_hint_text_1: "Культурне різноманіття обіцяє багато переваг, однак держави, не готові до подібного адміністративного тягаря і не володіють достатнім [Concept('cultural_capacity','культурним потенціалом')|e], нестимуть штрафи. [Concept('pops','Групи населення')|e], чиї [Concept('cultures','культури')|e] не відносяться до [Concept('primary_culture','основної культури')|e] нашої держави, спочатку вважатимуться носіями [Concept('non_accepted_culture_short','невизнаної')|e] культури, але за певну плату її можна перетворити на [Concept('tolerated_culture_short','прийнятну')|e] або [Concept('accepted_culture_short','визнану')|e]."
  hint_cultural_capacity_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Знизьте статус менш важливої в стратегічному відношенні культури, щоб зменшити витрати.\n@arrow_bonus_tier_2! На модифікатор «[ShowModifierTypeName('cultures_capacity')]» нерідко впливають [Concept('government_reforms','державні принципи')|e] та [Concept('advances','покращення')|e]."
  hint_cultural_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Зменшити кількість культур у державі також можна за допомогою [Concept('assimilation','асиміляції')|e]."
  hint_cultural_capacity_military: "«Від культур потрібно отримувати якомога більше віддачі: вони допомагають нам створювати культурні традиції та вплив — незамінний інструмент, який дасть нам перевагу у випадку культурного конфлікту. А якщо ми підвищимо чужі культури в правах, держава отримає додаткових ополченців та солдатів»."
  hint_cultural_capacity_administrative: "«Культурним вираженням займаються в тому числі творці нашої держави, що створюють чудові витвори. Адже чим ще виміряти велич держави, якщо не її впливом на світ?»"
  hint_cultural_capacity_diplomatic: "«З часом чужі культури можуть асимілюватися та наблизитися до основної культури [GetPlayer.Custom('CL_RP')]. Хіба є щось краще за [GetPlayer.GetCulture.GetNameWithNoTooltip|l]у культуру?»"
  hint_unhappy_estates: "Невдоволені стани"
  hint_unhappy_estates_hint_text: "$hint_unhappy_estates_hint_text_1$\n\n$hint_unhappy_estates_hint_text_2$\n\n$hint_unhappy_estates_hint_text_3$"
  hint_unhappy_estates_hint_text_1: "Одне з найважливіших завдань будь-якого правителя — стежити за тим, щоб [Concept('estates', '@estates! стани')|e] не ремствували, оскільки їхні представники — одна з опор економічної та військової могутності держави.\n\nКожен нелояльний [Concept('estate', 'стан')|e] накладає штрафи на [Concept('country', 'державу')], а його [Concept('pops', '@pops! групи населення')|e] з великою ймовірністю приєднаються до [Concept('rebellions', '@rebellions! заколоту')|e]."
  hint_unhappy_estates_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! У вкладці @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')] стани можна наділяти привілеями або позбавляти їх привілеїв. Від цього залежить продуктивність та [Concept('estate_satisfaction_short','задоволення')|e] станів.\n@arrow_bonus_tier_2! У вкладці @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')] можна підвищувати або знижувати податки, що також впливає на задоволення."
  hint_unhappy_estates_hint_text_3: "#T Додаткові поради#!\n@hint! Вплинути на [Concept('estate_satisfaction', 'задоволення станів')|e] також можна за допомогою [Concept('parliament', 'парламенту')|e].\n@hint! Дізнатися більше про [Concept('rebel_movements', '@rebel_movements! заколотні рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_unhappy_estates_administrative: "«Жодна торгова держава не може повноцінно існувати без станів. Так, з часом владою частково доведеться поступитися, але зате яка буде економіка!»"
  hint_unhappy_estates_diplomatic: "«У станів можуть бути думки в тому числі з дипломатичних питань. Перед тим як укласти союз або договір з іноземною державою, іноді варто врахувати, що про неї думають стани»."
  hint_unhappy_estates_military: "«Розширення неможливе без ополченців, а їх нам надають стани. Якщо ці люди відвернуться від нас, у найнепідходящий момент у нас може виявитися недостатньо солдатів»."
  ESTATE_CONTEXT_TEXT: "Проживаючі у вашій державі $LIST$ незадоволені.\n\n$TEXT$"
  HINT_UNHAPPY_ESTATE: "[ESTATE.GetName]"
  hint_manpower: "Число рекрутів"
  hint_manpower_hint_text: "$hint_manpower_hint_text_1$\n\n$hint_manpower_hint_text_2$\n\n$hint_manpower_hint_text_3$"
  hint_manpower_hint_text_1: "[Concept('manpower','Число рекрутів')|e] показує, скільки людей у державі можна зарахувати до [Concept('regulars','регулярних військ')|e] для потреб [Concept('armies','армій')|e]. У [Concept('battle','бою')|e] регулярні війська значно перевершують [Concept('levies','ополчення')|e], однак витрати на їх утримання також вищі. Дозволити собі регулярні війська на початку гри може далеко не кожна [Concept('country','держава')|e]."
  hint_manpower_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Правителю, що віддає перевагу воювати силами [Concept('regulars', 'регулярних військ')], слід пам'ятати, що недостатнє [Concept('manpower', 'число рекрутів')] серйозно обмежує можливість поповнювати втрати в [Concept('armies','арміях')|e]. Відповідно, нерозумно буде оголошувати [Concept('war','війну')|e], якщо число рекрутів невисоке.\n@arrow_bonus_tier_2! Якщо в ході війни рекрути починають закінчуватися, їх можна буде замістити [Concept('levies','ополченням')|e] або [Concept('mercenaries','найманцями')|e]. Також можна буде попросити про [Concept('peace','мир')|e]."
  hint_manpower_hint_text_3: "#T Додаткові підказки:#!\n@hint! Збільшити граничне число рекрутів і наростити можливість утримувати регулярну армію можна за допомогою різних [Concept('buildings','споруд')|e].\n@hint! [Concept('estate_privileges','Станові привілеї')|e] та [Concept('laws','зводи правил')|e] також впливають на можливості з набору рекрутів."
  hint_manpower_diplomatic: "«Відбірне регулярне військо, в якому служать найкращі сини [GetPlayer.GetAdjectiveWithNoTooltip]ої держави, — сила, якій не буде рівних»."
  hint_manpower_military: "«У завоюваннях добрі будь-які способи. Найманці, ополченці, регулярна армія — у великому війську все це однаково необхідно»."
  hint_manpower_administrative: "«Кожен солдат, убитий на полі бою, — це один селянин, що не повернувся на ріллю. Війна — витратна справа»."
  hint_low_stability: "Низька стабільність"
  hint_low_stability_hint_text: "$hint_low_stability_hint_text_1$\n\n$hint_low_stability_hint_text_2$\n\n$hint_low_stability_hint_text_3$"
  hint_low_stability_hint_text_1: "У разі низької [Concept('stability','стабільності')|e] зростає ризик підняття [Concept('pops','населенням')|e] [Concept('rebellion','заколоту')|e] та розпалювання незадоволеними [Concept('estate','станами')|e] [Concept('civil_war','громадянської війни')|e], а також наростання в державі заворушень загалом."
  stability_raise_actions: "@arrow_bonus_tier_3! Спрямувати більше грошей з [Concept('budget','бюджету')|e] на підвищення стабільності.\n@arrow_bonus_tier_2! Доручити [Concept('cabinet','раді')|e] дію «[ShowCabinetActionName('stabilize_country')]».\n@arrow_bonus_tier_1! Збільшити кількість #TOOLTIP:POPTYPE,clergy,X #L священників#!#!, які представляють #L #L [GetPlayer.GetReligion.GetAdjective|l]#!у#! віру."
  hint_low_stability_hint_text_2: "#T Рекомендації:#!\n$stability_raise_actions$"
  hint_low_stability_hint_text_3: "#T Додаткові підказки:#!\n@hint! Підвищити стабільність допоможуть й інші способи, наприклад певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e].\n@hint! Пам'ятайте, що стабільність також витрачається на певні важливі дії, наприклад оголошення [Concept('wars','війни')|e] без вагомого [Concept('casus_belli','приводу')|e] або зміну [Concept('law','правила')|e]."
  hint_low_stability_administrative: "«Стабільна держава — процвітаюча держава! А рясний урожай — це й рясний приплив багатства до скарбниці»."
  hint_low_stability_military: "«Будь-якій державі з претензіями на панування спочатку доведеться втихомирити населення. Простий люд завжди готовий схопитися за вила…»"
  hint_low_stability_diplomatic: "«Якщо в нашій державі настане розруха, сусіди дивитимуться на нас самовдоволено. Мабуть, краще цього не допускати»."
  hint_very_low_stability: "Дуже низька стабільність"
  hint_very_low_stability_hint_text: "$hint_very_low_stability_hint_text_1$\n\n$hint_very_low_stability_hint_text_2$\n\n$hint_very_low_stability_hint_text_3$"
  hint_very_low_stability_hint_text_1: "Наша [Concept('stability','стабільність')|e] вкрай низька, а ризик того, що [Concept('pops','населення')|e] підніме [Concept('rebellion','заколот')|e], незадоволені [Concept('estate','стани')|e] розпалять [Concept('civil_war','громадянську війну')|e], а вороги завдадуть нам удару, скориставшись нашою слабкістю, — великий."
  hint_very_low_stability_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Необхідно якомога швидше підвищити стабільність. Зараз не слід оголошувати нові [Concept('wars','війни')|e] або здійснювати інші дії, що знижують стабільність.\n$stability_raise_actions$"
  hint_very_low_stability_hint_text_3: "$hint_low_stability_hint_text_3$"
  hint_very_low_stability_administrative: "«При такій економіці абсолютно неможливо вести справи! Допоможіть нам розписати бюджет — у нас худоба голодує»."
  hint_very_low_stability_military: "«Усі вороги [GetPlayer.Custom('CL_RP')] зараз потирають руки від радості, дивлячись на нашу слабкість. Напевно суперники та противники вже замишляють щось недобре»."
  hint_very_low_stability_diplomatic: "«У стабільних державах суспільне становище людей різко змінюється. У нас воно теж змінюється, тільки в негативний бік»."
  hint_low_legitimacy: "Брак легітимності"
  hint_low_legitimacy_hint_text: "$hint_low_legitimacy_hint_text_1$\n\n$hint_low_legitimacy_hint_text_2$\n\n$hint_low_legitimacy_hint_text_3$"
  hint_low_legitimacy_hint_text_1: "[Concept('legitimacy','Легітимність')|e] — це визнання іншими державами тієї влади, якою володіє [GetPlayer.GetGovernment.GetRulerTitle|l] нашої країни. Якщо легітимність виявиться занадто низькою, ми не тільки позбудемося переваг [Concept('crown_power','влади правителя')|e], але й збільшимо ризик виникнення в державі [Concept('rebellion','заколоту')|e], а ще почнемо отримувати штрафи до задоволення [Concept('estate','станів')|e] та до [Concept('righteousness','доброчесності')|e]."
  hint_low_legitimacy_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Підтримуйте якомога вищий рівень легітимності, щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримання [Concept('legitimacy','легітимності')|e] можна збільшити витрати на [Concept('court_maintenance','утримання двору')|e].\n@arrow_bonus_tier_2! Є й інші способи зберегти [Concept('legitimacy','легітимність')|e] — наприклад, певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e].\n@arrow_bonus_tier_1! Виберіть [Concept('cabinet_action', '@cabinet_action! дію ради')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Зміцнення уряду»#!#!."
  hint_low_legitimacy_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і інші важливі показники, легітимність зростає нешвидко. Щоб вашу [Concept('dynasty','династію')|e] почали сприймати прихильно, потрібен час. Намагайтеся мислити наперед."
  hint_low_legitimacy_administrative: "\"Anyone that checks the registers of our ancestry and the magnificence of our court will be unable to deny our right to rule.\""
  hint_low_legitimacy_military: "\"How can we expect our armies to be feared if our own soldiers doubt our leadership?\""
  hint_low_legitimacy_diplomatic: "\"Sometimes, inner strength can come from how others perceive us, and our allies can also help us in times of trouble.\""
  hint_low_republican_tradition: "Низький показник республіканських традицій"
  hint_low_republican_tradition_hint_text: "$hint_low_republican_tradition_hint_text_1$\n\n$hint_low_republican_tradition_hint_text_2$\n\n$hint_low_republican_tradition_hint_text_3$"
  hint_low_republican_tradition_hint_text_1: "[Concept('republican_tradition','Республіканські традиції')|e] — показник того, наскільки [GetPlayer.GetGovernment.GetGovernmentType.GetName|l] дотримується принципів республіканізму. Якщо значення цього показника занадто сильно зменшиться, ми не тільки втратимо переваги [Concept('legislative_efficiency','законодавчої ефективності')|e], але й збільшимо ризик виникнення в державі [Concept('rebellion','заколоту')|e], а ще почнемо отримувати значні штрафи до витрат на підвищення [Concept('stability','стабільності')|e]."
  hint_low_republican_tradition_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Республіканські традиції необхідно підтримувати на якомога вищому рівні, щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримання високого рівня [Concept('republican_tradition','республіканських традицій')|e] можна збільшити витрати на [Concept('court_maintenance','утримання двору')|e].\n@arrow_bonus_tier_2! Зберегти [Concept('republican_tradition','республіканські традиції')|e] нам допоможуть й інші способи, наприклад певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e].\n@arrow_bonus_tier_1! Ще один спосіб підтримати [Concept('republican_tradition','республіканські традиції')|e] на високому рівні — змінити [Concept('ruler','правителя')|e] під час [Concept('election','виборів')|e]."
  hint_low_republican_tradition_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і інші важливі показники, республіканські традиції вкорінюються нешвидко. Щоб народ засвоїв їх, потрібен час. Намагайтеся мислити наперед."
  hint_low_republican_tradition_administrative: "\"Elections are a natural process of any healthy republic.\""
  hint_low_republican_tradition_military: "\"Even mercenaries will not be willing to fight for us is we appear to be tyrants.\""
  hint_low_republican_tradition_diplomatic: "\"No nation that prides itself in strength will willingly align itself to a country that blatantly disregards the principles of its foundation.\""
  hint_low_devotion: "Брак благочестя"
  hint_low_devotion_hint_text: "$hint_low_devotion_hint_text_1$\n\n$hint_low_devotion_hint_text_2$\n\n$hint_low_devotion_hint_text_3$"
  hint_low_devotion_hint_text_1: "$game_concept_devotion_desc$ Якщо цей показник опуститься занадто низько, ми не тільки втратимо бонуси до [Concept('religious_influence','релігійного впливу')|e]: ризик виникнення в державі [Concept('rebellion','заколоту')|e] зросте, а ми почнемо отримувати штрафи до задоволення [Concept('estate','станів')|e]."
  hint_low_devotion_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Благочестя необхідно підтримувати на якомога вищому рівні, щоб уникати суттєвих штрафів.\n@arrow_bonus_tier_2! Для підтримання [Concept('devotion','благочестя')|e] можна збільшити витрати на [Concept('court_maintenance','утримання двору')|e].\n@arrow_bonus_tier_2! Зберегти [Concept('devotion','благочестя')|e] нам допоможуть й інші способи, наприклад певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e]."
  hint_low_devotion_hint_text_3: "#T Додаткові підказки:#!\n@hint! Як і інші важливі показники, благочестя зростає нешвидко. Щоб народ відчув релігійний запал, потрібен час. Намагайтеся мислити наперед."
  hint_low_devotion_administrative: "\"It is not enough for us to represent the faith and pose as its defenders, we also need to look the part ourselves.\""
  hint_low_devotion_military: "\"If our armies are to represent the sword and shield of the faithful, we need to be the beacon for which they fight.\""
  hint_low_devotion_diplomatic: "\"It should be our objective to spread our faith as far and wide as possible, but nobody will be willing to believe our words if we do not appear pious.\""
  hint_low_horde_unity: "Низька згуртованість орди"
  hint_low_horde_unity_hint_text: "$hint_low_horde_unity_hint_text_1$\n\n$hint_low_horde_unity_hint_text_2$\n\n$hint_low_horde_unity_hint_text_3$"
  hint_low_horde_unity_hint_text_1: "$game_concept_horde_unity_desc$"
  hint_low_horde_unity_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Найкращий спосіб згуртувати орду — кинути її на ворога, погнавши того геть.\n@arrow_bonus_tier_2! Для підтримання [Concept('horde_unity','згуртованості орди')|e] можна збільшити витрати на [Concept('court_maintenance','утримання двору')|e].\n@arrow_bonus_tier_2! Зберегти [Concept('horde_unity','згуртованість орди')|e] нам допоможуть й інші способи, наприклад певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e]."
  hint_low_horde_unity_hint_text_3: "#T Додаткові підказки:#!\n@hint! У випадку занадто сильного браку згуртованості наслідки будуть катастрофічними. Краще зберігати її на високому рівні."
  hint_low_horde_unity_administrative: "«„Розділяй і володарюй“ — не порожні слова. Якщо нас розділять, значить, володарюватимуть уже над нами»."
  hint_low_horde_unity_military: "«Як то кажуть, кожен сам вільний відбирати у слабких своє щастя. Сила об'єднує нас; сила породжує згуртованість!»"
  hint_low_horde_unity_diplomatic: "«Чим згуртованішим є наше плем'я, тим сильніші наші воїни — одне напряму випливає з іншого. Успіхи на війні та в завоюванні — це самоздійснюване пророцтво»."
  hint_low_tribal_cohesion: "Слабка племінна єдність"
  hint_low_tribal_cohesion_hint_text: "$hint_low_tribal_cohesion_hint_text_1$\n\n$hint_low_tribal_cohesion_hint_text_2$\n\n$hint_low_tribal_cohesion_hint_text_3$"
  hint_low_tribal_cohesion_hint_text_1: "$game_concept_tribal_cohesion_desc$ Племінна [Concept('government_types','форма правління')|e] відрізняється від інших тим, що в міру збільшення згуртованості значно зростає розмір ополчення. Щоб на війні нам супроводжував успіх, племена повинні жити в злагоді."
  hint_low_tribal_cohesion_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_2! Для підтримки [Concept('tribal_cohesion','племінної єдності')|e] можна збільшити витрати на [Concept('court_maintenance','утримання двору')|e].\n@arrow_bonus_tier_2! Зберегти [Concept('tribal_cohesion','племінну єдність')|e] нам допоможуть й інші способи, наприклад певні [Concept('advances','покращення')|e] або [Concept('policies','політики')|e]."
  hint_low_tribal_cohesion_hint_text_3: "#T Додаткові підказки:#!\n@hint! У разі занадто сильної нестачі єдності наслідки будуть катастрофічними. Краще зберігати її на високому рівні."
  hint_low_tribal_cohesion_administrative: "«Не можна заплющувати очі на єдність: від правителя вимагається уважність до кожної дрібниці»."
  hint_low_tribal_cohesion_military: "«Коли немає племінної єдності, ми слабкі. Слабкість посилює роздробленість. З цього шляху треба звернути, інакше ворог сам підкорить і поневолить нас»."
  hint_low_tribal_cohesion_diplomatic: "«Існування держави настільки сильно залежить від станів, що майже кожен наш вчинок неодмінно відгукнеться в подальшому. Будь-який стратег, що поважає себе, мислитиме наперед»."
  hint_war_exhaustion: "Висока втома від війни"
  hint_war_exhaustion_hint_text: "$hint_war_exhaustion_hint_text_1$\n\n$hint_war_exhaustion_hint_text_2$\n\n$hint_war_exhaustion_hint_text_3$"
  hint_war_exhaustion_hint_text_1: "[Concept('war_exhaustion','Втома від війни')|e] — загальна стомленість населення участю держави у війні. Високий рівень втоми вкрай небезпечний для будь-якої держави. У міру його зростання боєздатність [Concept('army','армії')|e] та [Concept('levies','ополчення')|e] буде знижуватися, зростання [Concept('pops','населення')|e] — сповільнюватися, а економіка — розвалюватися."
  hint_war_exhaustion_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Найкращий і найнадійніший спосіб уникнути втоми — не вплутуватися у війни.\n@arrow_bonus_tier_2! Певні [Concept('laws','зводи правил')|e] та [Concept('estate_privileges','станові привілеї')|e] допоможуть поступово знизити рівень втоми від війни."
  hint_war_exhaustion_hint_text_3: "#T Додаткові підказки:#!\n@hint! Слід ретельно підходити до завоювань і не оголошувати нові [Concept('wars','війни')|e], якщо рівень втоми вже занадто високий."
  hint_war_exhaustion_administrative: "«Рішучі бойові дії можуть принести користь, але у втомі народу від війни немає нічого доброго: страждає виробництво, страждає споживання… страждає взагалі все!»"
  hint_war_exhaustion_military: "«Втома від війни небезпечна. Найчастіше її породжують слабкі командири: величезні втрати та гучні поразки швидко налаштують народ проти нас»."
  hint_war_exhaustion_diplomatic: "«Доля того, хто програв, завжди гірка, проте ганебна поразка може викликати в народі жагу помсти. Реваншизм одурманює»."
  hint_low_sailors: "Моряки"
  hint_low_sailors_hint_text: "$hint_low_sailors_hint_text_1$\n\n$hint_low_sailors_hint_text_2$\n\n$hint_low_sailors_hint_text_3$"
  hint_low_sailors_hint_text_1: "$game_concept_sailors_desc$"
  hint_low_sailors_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Правителю, який віддає перевагу воювати за допомогою [Concept('ships','кораблів')|e], слід пам'ятати, що недостатня кількість моряків серйозно обмежує можливість поповнювати втрати на [Concept('navies','флотах')|e]. Відповідно, нерозумно буде оголошувати [Concept('war','війну')|e], якщо кількість моряків невисока.\n@arrow_bonus_tier_2! Без моряків також неможливі [Concept('explorations','експедиції')|e] — це теж необхідно враховувати в планах."
  hint_low_sailors_hint_text_3: "#T Додаткові підказки:#!\n@hint! Збільшити граничну кількість моряків можна за допомогою різних [Concept('buildings','споруд')|e].\n@hint! [Concept('estate_privileges','Станові привілеї')|e] та [Concept('laws','зводи правил')|e] також впливають на можливості з набору моряків."
  hint_low_sailors_administrative: "«Кому належить море, тому належать і світові багатства. Сильний військовий і мирний флот означає торговельну перевагу»."
  hint_low_sailors_military: "«Сильний військово-морський флот з умілими моряками — наш ключ до підкорення земель, і далеких, і близьких. Надійна оборона шляхів постачання йде на користь усім, навіть заморським частинам»."
  hint_low_sailors_diplomatic: "«Морські військові споруди нерідко сприяють мирній торгівлі. На таку взаємодоповнюваність не слід закривати очі»."
  hint_low_diplomats: "Мало дипломатів"
  hint_low_diplomats_hint_text: "$hint_low_diplomats_hint_text_1$\n\n$hint_low_diplomats_hint_text_2$\n\n$hint_low_diplomats_hint_text_3$"
  hint_low_diplomats_hint_text_1: "Без [Concept('diplomats','дипломатів')|e] неможливі дипломатичні відносини з іншими державами. Багато дій, такі як покращення відносин, вимагають постійної присутності дипломатів, тоді як одноразові дії, як правило, відрізняються фіксованими витратами."
  hint_low_diplomats_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! У разі нестачі дипломатів можна припинити покращувати відносини з тією чи іншою державою, тим самим звільнивши зайнятих дипломатів.\n@arrow_bonus_tier_2! Поповнити дипломатичний корпус нам допоможуть і деякі інші способи, наприклад певні [Concept('advances','покращення')|e]."
  hint_low_diplomats_hint_text_3: "#T Додаткові підказки:#!\n@hint! Корисно постійно тримати в державі кількох незайнятих дипломатів на випадок, якщо раптом знадобиться їхня участь у будь-якій дії, проте не менш важливо призначати дипломатам довгострокові завдання."
  hint_low_diplomats_administrative: "«Добрі відносини — запорука великого прибутку! Дружба з сусідами забезпечить нам доступ до нових, більших ринків»."
  hint_low_diplomats_military: "«Дипломати також допоможуть нашій державі утвердити перевагу над слабшими країнами. Чим ми сильніші, тим імовірніше, що інші будуть нам підкорятися — по-дружньому або під загрозами»."
  hint_low_diplomats_diplomatic: "«Урядові реформи та покращення — вірний спосіб розширити наше дипломатичне відомство. І, звісно, носії певних культур краще за інших володіють даром переконання»."
  LOW_DIPLOMATS_HINT: "Мало дипломатів!"
  hint_low_food_in_market: "Нестача їжі на ринку"
  hint_low_food_in_market_hint_text: "$hint_low_food_in_market_hint_text_1$\n\n$hint_low_food_in_market_hint_text_2$\n\n$hint_low_food_in_market_hint_text_3$"
  hint_low_food_in_market_hint_text_1: "Без достатніх запасів [Concept('food','їжі')|e] ринки не зможуть задовольняти попит жителів [Concept('provinces','провінцій')|e], де вони розташовані. У такому разі в районах, що входять до провінцій, може початися [Concept('starving','голод')|e]."
  hint_low_food_in_market_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Щоб збільшити пропозицію, можна покращити процес [Concept('rgo','видобутку')|e] харчових ресурсів.\n@arrow_bonus_tier_2! Можна налагодити [Concept('import','імпорт')|e], уклавши [Concept('trades','торгові угоди')|e] на постачання [Concept('goods','товарів')|e] для виробництва їжі."
  hint_low_food_in_market_hint_text_3: "#T Додаткові підказки:#!\n@hint! Якщо прибрати частину [Concept('buildings','споруд')|e] в будь-якому [Concept('location','районі')|e], його [Concept('pops','населення')|e] змушене буде повернутися до [Concept('subsistence_agriculture','натурального господарства')|e]."
  HINT_MARKET_ENTRY: "[MARKET.GetName]"
  HINT_BUILDING_ENTRY: "[BUILDING_TYPE.GetName]"
  LOW_FOOD_CAP_TEXT: "[SelectLocalization( StringIsEmpty( GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building') ), Localize('LOW_FOOD_NO'), Localize( 'LOW_FOOD_YES' ) )]"
  LOW_FOOD_YES: "\n@arrow_bonus_tier_1! За наявності вільного [Concept('merchant_capacity','торгового потенціалу')|e] можна забезпечити імпорт їжі з іншого ринку, де вона є в надлишку.\n\nЯкщо вільного потенціалу немає, його можна збільшити шляхом будівництва певних споруд, наприклад таких як «[GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building')]»."
  LOW_FOOD_NO: "\n\nЗа наявності вільного [Concept('merchant_capacity','торгового потенціалу')|e] можна забезпечити імпорт їжі з іншого ринку, де вона є в надлишку."
  LOW_MARKET_FOOD_TEXT: "Запас [Concept('food','їжі')|e] в місці $LIST$ досяг критичного рівня.$LOW_FOOD_CAP_TEXT$"
  LOW_MARKET_FOOD_TEXT_BUILDINGS: "Запас [Concept('food','їжі')|e] в місці $LIST$ досяг критичного рівня.\n\nПобороти дефіцит їжі на ринку можна кількома способами. Чим більше їжі виробляє район, тим менше ресурсів він витягує з провінції та супутнього ринку, а при надлишках виробництва — навіть допомагає іншим районам.\n\n\n@arrow_bonus_tier_3! Основне джерело [Concept('food', 'їжі')] — [Concept('rgo','видобуток ресурсів')|e], особливо в районах з високою [Concept('food_productivity','ефективністю виробництва їжі')|e]. Якщо на [Concept('market', 'ринку')] спостерігається дефіцит [Concept('food', 'їжі')], слід розширити видобуток.\n@arrow_bonus_tier_2! Наростити виробництво також допоможуть певні [Concept('buildings','споруди')|e], наприклад $BUILDING_LIST$, — за умови відповідності вироблених [Concept('goods','товарів')|e].$LOW_FOOD_CAP_TEXT$"
  hint_low_food_in_market_administrative: "«Ринки в районах, виділених під виробництво їжі, — це не тільки безпека, а й найширші можливості заробити. Якщо від нас залежатиме життя інших, наш вплив стане майже безмежним»."
  hint_low_food_in_market_military: "«Інфраструктура — важливий фактор, що обмежує наші торгові можливості, але ще важливішим для імпортоорієнтованої економіки є сильний військово-морський флот. Без нього ми станемо легкою здобиччю для кожного, кому приглянуться наші торгові шляхи»."
  hint_low_food_in_market_diplomatic: "«Побудова самодостатньої економіки, орієнтованої на виробництво їжі, — гідна мета, однак якщо годувати [GetPlayer.GetAdjectiveWithNoTooltip|l]ий народ буде імпортоорієнтована економіка, ми зможемо зосередити зусилля на виробництві інших, більш прибуткових товарів»."
  hint_over_diplo_capacity: "Перевищено дипломатичний потенціал"
  hint_over_diplo_capacity_hint_text: "$hint_over_diplo_capacity_hint_text_1$\n\n$hint_over_diplo_capacity_hint_text_2$\n\n$hint_over_diplo_capacity_hint_text_3$"
  hint_over_diplo_capacity_hint_text_1: "$game_concept_diplomatic_capacity_desc$"
  hint_over_diplo_capacity_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Можна частково вивільнити потенціал, наказавши [Concept('diplomats','дипломатам')|e] перестати покращувати відносини з іншими державами.\n@arrow_bonus_tier_2! Можна переглянути наявні [Concept('alliances','союзи')|e] або [Concept('treaties','договори')|e]: ймовірно, частину з них слід розірвати.\n@arrow_bonus_tier_1! Можна покинути [Concept('international_organizations','міжнародні об’єднання')|e], які більше не приносять нам користі."
  hint_over_diplo_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! У деяких випадках дипломатичний потенціал можна збільшити за допомогою [Concept('estate_privileges','станових привілеїв')|e], [Concept('laws','зводів правил')|e] та [Concept('advances','покращень')|e]."
  hint_over_diplo_capacity_military: "«Союзи, можливо, краще розглядати як засоби, що ведуть до мети, ніж як дружбу на віки. Адже наші союзники неодмінно вишкірять зуби, щойно ми проявимо слабкість…»"
  hint_over_diplo_capacity_administrative: "«Виснажені роботою дипломати, на жаль, гірше починають справлятися зі своїми завданнями. І хоча спокуса надмірно обтяжувати їх працею буває велика, у довгостроковій перспективі це не принесе нам користі»."
  hint_over_diplo_capacity_diplomatic: "«Якщо найважливіший напрямок для нас — внутрішній розвиток, то міцні союзи більш ніж компенсують нестачу — хай навіть уявну — військової могутності. Можливо, для початку доведеться розірвати частину інших відносин…»"
  hint_rebels_growing: "$game_concept_rebel_movements$"
  hint_rebels_growing_hint_text: "$hint_rebels_growing_hint_text_1$\n\n$hint_rebels_growing_hint_text_2$\n\n$hint_rebels_growing_hint_text_3$"
  hint_rebels_growing_hint_text_1: "Ваші [Concept('pops', '@pops! групи населення')|e] приєднуватимуться до [Concept('rebel_movements', '@rebel_movements! повстанських рухів')|e], якщо [Concept('pop_satisfaction', '@pop_satisfaction! задоволення')|e] цих груп опускається нижче #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V порогу приєднання до повстанців#!#!#!.\n\nЗалежно від підтримки [Concept('rebel_movements', 'повстанські рухи')] щомісяця накопичуватимуть прогрес, що наближає їх до відкритого повстання. При досягненні #W 100%#!-ї підтримки рух розпочне [Concept('revolt', '@revolt! повстання')|E] або [Concept('civil_war', '@civil_war! громадянську війну')|e].\n\nНайчастішими причинами підтримки повстання є низька [Concept('stability', '@stability! стабільність')|e], дискримінація [Concept('cultures', '@cultures! культури')|e] та [Concept('religions', '@religions! релігії')|e], а також незадоволені [Concept('estates', '@estates! стани')|e]."
  hint_rebels_growing_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Підтримуйте [Concept('stability', '@stability! стабільність')|e] та [Concept('legitimacy', '@legitimacy! легітимність')|e] на максимально високому рівні.\n@arrow_bonus_tier_2! Використовуйте [Concept('cabinet_action', '@cabinet_action! дію ради')|e] «[ShowCabinetActionName('rebel_crackdown')]», щоб зупинити прогрес насувається [Concept('rebellion', 'повстання')].\n@arrow_bonus_tier_1! Якщо в [Concept('province', '@province! провінції')|e] з незадоволеними [Concept('pops', 'групами населення')] буде розміщена [army_with_icon|el], її присутність сприятиме… #italic розумінню#!.\n\nАле зрештою найважливіше збільшити [pop_satisfaction_icon] задоволення повстанських [Concept('pops', 'груп населення')]:\n@arrow_bonus_tier_2! Переконайтеся, що кожна з найбільш численних [Concept('cultures', 'культур')] у вашій [Concept('country', 'державі')] [accepted_culture_short_with_icon|el] або [Concept('tolerated_culture_short','прийнятна')|e].\n@arrow_bonus_tier_1! Переконайтеся, що повстанські [Concept('pops', 'групи населення')] можуть задовольнити якомога більше своїх [Concept('pop_needs', '@pop_needs! потреб')|e] за рахунок свого [Concept('market', '@market! ринку')|e].\n@arrow_bonus_tier_3! Підтримуйте високе [estate_icon] [Concept('estate_satisfaction','задоволення станів')|e], оскільки воно значно впливає на задоволення груп населення, що входять до нього:\n$TAB$@arrow_bonus_tier_2! [Concept('privilege_with_icon', 'CONCEPT_PLACEHOLDER')|e]\n$TAB$@arrow_bonus_tier_2! Підкуп [Concept('estate','стану')]\n$TAB$@arrow_bonus_tier_2! Зниження [Concept('taxes', '@taxes! податків')|e]"
  hint_rebels_growing_hint_text_3: "#T Додаткові поради:#!\n@hint! [Concept('societal_values', 'CONCEPT_PLACEHOLDER')|e], такі як #TOOLTIP:SOCIETAL_VALUE,communalism,X #L общинність#!#! та #TOOLTIP:SOCIETAL_VALUE,decentralization,X #L децентралізація#!#! також можуть вплинути на ймовірність розвитку повстання.\n@hint! Повстанські [Concept('pops', 'групи населення')] приєднуються до різних [Concept('rebel_movements', 'повстанських рухів')] залежно від низки факторів. Наприклад, [nationalist_rebels_with_icon|el] приваблюють [Concept('pops', 'групи населення')] пригнобленої [Concept('culture', 'культури')]."
  hint_rebels_growing_military: "«На вигляд простий народ буває грізним, але насправді рідко доходить до кровопролиття. Однак свою незібраність він з лишком компенсує числом»."
  hint_rebels_growing_administrative: "«Від повстанців, безумовно, лише шкода, однак майже будь-яке повстання — це реакція. Якщо усунути причину їхнього невдоволення, ви не тільки втихомирите буйний народ, а й полегшите йому життя в державі»."
  hint_rebels_growing_diplomatic: "«Населення нашої держави різнорідне — кожен вірний власним переконанням. Завойовані народи набагато ймовірніше за інших спробують відокремитися та заснувати власний уряд або навіть приєднатися до іншої країни»."
  hint_call_for_peace: "Прагнення до миру"
  hint_call_for_peace_hint_text: "$hint_call_for_peace_hint_text_1$\n\n$hint_call_for_peace_hint_text_2$\n\n$hint_call_for_peace_hint_text_3$"
  hint_call_for_peace_hint_text_1: "Прагнення до миру може виникнути, якщо [Concept('war','війна')|e] занадто затягнулася або якщо ми відмовляємося підписати [Concept('peace_treaty','мирний договір')|e] навіть в умовах повної перемоги — або поразки."
  hint_call_for_peace_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Постарайтеся обмежити втрати та підписати договір, доки [Concept('war_exhaustion','втома від війни')|e] не досягла критичних значень.\n@arrow_bonus_tier_2! Іноді доведеться погодитися на менше, ніж ми розраховували, або навіть на програш у [Concept('war','війні')|e]."
  hint_call_for_peace_hint_text_3: "#T Додаткові підказки:#!\n@hint! Усе, що ми втратимо після передчасного підписання [Concept('peace_treaty','мирного договору')|e], можна буде повернути в наступних [Concept('war','війнах')|e]."
  hint_call_for_peace_diplomatic: "«Якщо ми не будемо дотримуватися правил війни, наслідки для стабільності держави — і для нашого доброго імені за кордоном — виявляться воістину катастрофічними. Адже якщо ми виставимо себе нерозсудливими, ніхто не стане нас слухати»."
  hint_call_for_peace_military: "«Війна є продовженням політики, тільки іншими засобами. Треба б записати цю думку, доки нас не випередили…»"
  hint_call_for_peace_administrative: "«З часом заклики до миру ставатимуть лише голоснішими й голоснішими. Народ можна втихомирити, але не можна постійно ним нехтувати»."
  hint_unprofitable_buildings: "Невигідні споруди"
  hint_unprofitable_buildings_hint_text: "$hint_unprofitable_buildings_hint_text_1$\n\n$hint_unprofitable_buildings_hint_text_2$\n\n$hint_unprofitable_buildings_hint_text_3$"
  hint_unprofitable_buildings_hint_text_1: "Якщо сумарна вартість споживаних [Concept('goods','товарів')|e] перевищить цінність [Concept('produced_goods','вироблених товарів')|e], споруди вважатимуться невигідними."
  hint_unprofitable_buildings_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Намагайтеся здешевити споживані товари — наприклад, виробляти або [Concept('importing','імпортувати')|e] більше товарів, щоб підтримувати рясну пропозицію.\n@arrow_bonus_tier_3! Підніміть ціни на вироблені товари, створивши або забезпечивши додатковий попит.\n@arrow_bonus_tier_3! Якщо [Concept('buildings','споруди')|e] більше не відповідають нашим цілям, їх можна закрити @building_open! або навіть знищити.\n@arrow_bonus_tier_3! [Concept('market_owner', 'Власник ринку')|e] може накласти ембарго на держави, що експортують вироблені у себе товари, щоб підвищити ціни на власний експорт."
  hint_unprofitable_buildings_hint_text_3: "#T Додаткові підказки:#!\n@hint! Деякі споруди можна [Concept('subsidized','субсидувати')|e] @subsidy!. Субсидії стануть у пригоді, наприклад, у випадку, якщо [Concept('import','імпортна')|e] ціна товарів для задоволення [Concept('pop_needs','потреб населення')|e] або утримання армії занадто висока."
  hint_unprofitable_buildings_diplomatic: "«Стежити за тим, щоб промисловість цілої держави приносила прибуток, — нелегке завдання. Якщо вам не хочеться вникати в деталі, на допомогу завжди прийде бюрократичний апарат країни!»"
  hint_unprofitable_buildings_military: "«Чим ми сильніші, тим краще нам даватимуться здорові протекціоністські заходи. Питання ембарго та торгових суперечок найкраще вирішуються, коли в розмову готові вступити гармати»."
  hint_unprofitable_buildings_administrative: "«Маніпуляція цінами вимагає хитромудрого та складного підходу. Достатньо хитрий діяч може не тільки створити на ринку попит, а й задовольнити його»."
  NO_HINTS_AVAILABLE: "Немає доступних підказок!"
  hint_trade: "Торгівля"
  hint_trade_hint_text: "$hint_trade_hint_text_1$\n\n$hint_trade_hint_text_2$\n\n$hint_trade_hint_text_3$"
  hint_trade_hint_text_1: "[Concept('trade','Торгівля')|e] — переміщення [Concept('goods','товарів')|e] з одного [Concept('markets','ринку')|e] на інший, а також продаж і купівля їх на цих [Concept('markets','ринках')|e]."
  hint_trade_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Побудуйте нові [Concept('trade','торгові')|e] шляхи для придбання [Concept('goods','товарів')|e].\n@arrow_bonus_tier_2! Наростіть виробництво [Concept('goods','товарів')|e], щоб збільшити пропозицію."
  hint_trade_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('trade','Торговий')|e] маршрут може як приносити прибуток, так і бути збитковим — це залежить від різниці в цінах між [Concept('export','експортним')|e] [Concept('markets','ринком')|e] (джерелом товару) та [Concept('import','імпортним')|e] (пунктом призначення).\n@hint! У кожної присутньої на тому чи іншому [Concept('market','ринку')|e] [Concept('country','держави')|e] є два показники: граничний [Concept('merchant_capacity','торговий потенціал')|e] — він необхідний для створення [Concept('trade','торгових')|e] маршрутів — і [Concept('merchant_power','торгова перевага')|e], тобто місце в черзі на експорт [Concept('goods','товарів')|e] за [Concept('trade','торговими')|e] маршрутами, якщо десь виникла їх нестача.\n@hint! За замовчуванням торгівлю на кожному окремому [Concept('market','ринку')|e] можна автоматизувати — для цього необхідно клацнути по відповідній шестерінці."
  hint_trade_military: "«Торгівля — це для шмаркачів. Але коли ми підкоримо і землю, і моря, керувати потоками товарів буде саме наша держава»."
  hint_trade_administrative: "«Основа нашої стратегії — передбачення коливань цін за допомогою кидків кісток та розташування зірок на небосхилі»."
  hint_trade_diplomatic: "«Торгівля — один зі стовпів, на яких стоїть кожна повноцінна держава. Мабуть, у всьому світі не знайдеться швидших способів заповнити засіки»."
  hint_unused_trade_capacity: "Незадіяний торговий потенціал"
  hint_unused_trade_capacity_hint_text: "$hint_unused_trade_capacity_hint_text_1$\n\n$hint_unused_trade_capacity_hint_text_2$\n\n$hint_unused_trade_capacity_hint_text_3$"
  hint_unused_trade_capacity_hint_text_1: "[Concept('merchant_capacity_with_icon', 'Торговий потенціал')|e] необхідний для переміщення [Concept('goods_with_icon', 'товарів')|e] з одного [Concept('markets_with_icon', 'ринку')|e] на інший з метою заробити прибуток. Задіювати [Concept('merchant_capacity', 'торговий потенціал')] завжди потрібно цілком."
  hint_unused_trade_capacity_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_1! Клацніть по сповіщенню, щоб переглянути задіяний ринок на @economy_panel![Link('trade', 'subtab = markets', 'панелі ринків')]. Тут можна розподілити торговий потенціал, обравши пропоновані торгові угоди.\n@arrow_bonus_tier_1! Також можна клацнути по заголовку «Ринок», щоб перейти на панель ринку та ознайомитися зі списком актуальних для нього [Concept('goods','товарів')|e]. Клацніть по кнопці «Експорт» або «Імпорт» поруч із [Concept('good', 'товаром')], щоб розпочати торгівлю.\n@automation! Рекомендується автоматизувати торгівлю на кожному ринку. Щоб це зробити, клацніть по кнопці із зображенням шестерні на картці ринку. Угоди завжди можна створювати та фіксувати вручну, навіть якщо торгівля вже автоматизована."
  hint_unused_trade_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Прибуток від [Concept('trade', 'торгівлі')] розподіляється між [Concept('estates_with_icon', 'станами')|e] (до їх числа входять і [ShowEstateTypeName('crown_estate')|l]) згідно з їх [Concept('estate_power_with_icon', 'становою владою')|e]."
  hint_unused_trade_capacity_military: "«Про ймовірність безглуздого розпорядження ресурсами можу сказати тільки одне: я різко проти»."
  hint_unused_trade_capacity_administrative: "«Необхідно якомога швидше повернутися до межі ефективності»."
  hint_unused_trade_capacity_diplomatic: "«Незадіяний торговий потенціал подібний до покладу, в який занадто давно не кидали насіння»."
  hint_unprofitable_trade_route: "Невигідний торговий шлях"
  hint_unprofitable_trade_route_hint_text: "$hint_unprofitable_trade_route_hint_text_1$\n\n$hint_unprofitable_trade_route_hint_text_2$\n\n$hint_unprofitable_trade_route_hint_text_3$"
  hint_unprofitable_trade_route_hint_text_1: "Проблема невигідності [Concept('trade','торгового')|e] шляху зазвичай вирішується двома способами: скасуванням його та заміною на вигідний або включенням автоматизації для конкретного [Concept('market','ринку')|e]."
  hint_unprofitable_trade_route_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_1! Іноді зі збитками на [Concept('trade','торговому')|e] шляху доводиться миритися — наприклад, у випадку, якщо ним перевозяться [Concept('goods','товари')|e] стратегічної важливості.\n@arrow_bonus_tier_1! До таких належать, наприклад, деревина для будівництва [Concept('building','споруд')|e] або їжа для [Concept('pops','населення')|e]."
  hint_unprofitable_trade_route_hint_text_3: "#T Додаткові підказки:#!\n@hint! На вигідність вже встановленого [Concept('trade','торгового')|e] шляху можна вплинути опосередковано — вплинути на ціни (а отже, на різницю в цінах щодо торгованого [Concept('good','товару')|e]) на [Concept('markets','ринках')|e], що беруть участь в угоді. Для цього доведеться змінити [Concept('supply','пропозицію')|e] та [Concept('demand','попит')|e] на [Concept('good','товар')|e]."
  hint_unprofitable_trade_route_military: "«Може, краще буде відібрати у них товари, ніж платити за поставки?»"
  hint_unprofitable_trade_route_administrative: "«Втрати потрібно якомога швидше скорочувати. Торгівля — це не благодійність»."
  hint_unprofitable_trade_route_diplomatic: "«Уникнути недосконалості неможливо — такий природний порядок — але можна не давати їй розростатися»."
  hint_market_out_of_supply: "Нестача пропозиції на ринку"
  hint_market_out_of_supply_hint_text: "$hint_market_out_of_supply_hint_text_1$\n\n$hint_market_out_of_supply_hint_text_2$\n\n$hint_market_out_of_supply_hint_text_3$"
  hint_market_out_of_supply_hint_text_1: "Якщо загальний [Concept('demand','попит')|e] на будь-якому [Concept('market','ринку')|e] занадто перевищує обмежену [Concept('supply','пропозицію')|e], ми можемо не отримати [Concept('goods','товари')|e], які намагаємося [Concept('export','експортувати')|e] або [Concept('import','імпортувати')|e]. Це призводить до нестачі товарів."
  hint_market_out_of_supply_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Неприбуткові [Concept('trade','торгові')|e] маршрути можна негайно скасувати, а вивільнений [Concept('merchant_capacity','торговий потенціал')|e] — направити на придбання інших різновидів [Concept('goods','товарів')|e].\n@arrow_bonus_tier_1! Збільшення [Concept('merchant_power','торгової переваги')|e] на відповідному [Concept('market','ринку')|e] може розширити наш доступ до місцевих товарів."
  hint_market_out_of_supply_hint_text_3: "#T Додаткові підказки:#!\n@hint! Джерел [Concept('merchant_power','торгової переваги')|e] кілька: [Concept('advances','покращення')|e], [Concept('privileges','привілеї')|e], [Concept('policies','політики')|e] і не тільки.\n@hint! Можна також спробувати збільшити [Concept('supply','пропозицію')|e], але навряд чи вийде зробити це швидко: тут потрібен довгий стратегічний підхід."
  hint_market_out_of_supply_military: "«Іноді нам бракуватиме товарів для експорту, і тоді наша військова махина буде спотикатися. Розбиратися з цим необхідно якомога швидше»."
  hint_market_out_of_supply_administrative: "«Варто замислитися, як збільшити нашу справедливу — а як інакше? — торгову перевагу будь-якими способами, яких не шкода»."
  hint_market_out_of_supply_diplomatic: "«Можливо, варто урізноманітнити наші торгові угоди та відійти від беззмінної одноманітності»."
  hint_increasing_trade_capacity: "Збільшення торгового потенціалу"
  hint_increasing_trade_capacity_hint_text: "$hint_increasing_trade_capacity_hint_text_1$\n\n$hint_increasing_trade_capacity_hint_text_2$\n\n$hint_increasing_trade_capacity_hint_text_3$"
  hint_increasing_trade_capacity_hint_text_1: "Від [Concept('merchant_capacity','торгового потенціалу')|e] залежить обсяг доступної [Concept('country','державі')|e] [Concept('trade','торгівлі')|e]."
  hint_increasing_trade_capacity_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Будуйте більше [Concept('buildings','споруд')|e], що збільшують потенціал, наприклад #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! або #TOOLTIP:BUILDING_TYPE,market_village,X #L торгові села#!#!.\n@arrow_bonus_tier_2! Певні [Concept('advances','покращення')|e] або [Concept('laws','зводи правил')|e] також можуть збільшити [Concept('merchant_capacity','торговий потенціал')|e]."
  hint_increasing_trade_capacity_hint_text_3: "#T Додаткові підказки:#!\n@hint! Чим обширніший [Concept('merchant_capacity','торговий потенціал')|e], тим більша кількість товарів у торгових угодах, а отже — вищий [Concept('income','дохід')|e]."
  hint_increasing_trade_capacity_military: "«Чим більшою стає наша держава, тим обширніше вона зможе торгувати. Майже тавтологія»."
  hint_increasing_trade_capacity_administrative: "«Проблему нестачі торгового потенціалу — як і будь-яку іншу проблему, що стоїть перед людством, — можна вирішити дуже просто: потрібно більше ринків»."
  hint_increasing_trade_capacity_diplomatic: "«Обробка ґрунту для товарного обміну скрізь, де тільки можливо, забезпечить нам бурхливий потік товарів»."
  hint_increasing_trade_advantage: "$game_concept_merchant_power$"
  hint_increasing_trade_advantage_hint_text: "$hint_increasing_trade_advantage_hint_text_1$\n\n$hint_increasing_trade_advantage_hint_text_2$\n\n$hint_increasing_trade_advantage_hint_text_3$"
  hint_increasing_trade_advantage_hint_text_1: "[Concept('merchant_power', '@merchant_power! Торгова перевага')|e] визначає, яка [Concept('country', '@country! держава')|e] першою отримує доступ до [Concept('trade', '@trade! торгівлі')|e] [Concept('goods', '@goods! товарами')|e] на [Concept('market', '@market! ринку')|e].\n\nЯкщо дві [Concept('countries', 'держави')] намагаються купити [Concept('good', 'товар')], але його замало для них обох, першою товар купить держава, що має найбільшу [Concept('merchant_power', 'торгову перевагу')] на цьому [Concept('market', 'ринку')].\n\nВрахуйте, що [Concept('merchant_power', 'торгова перевага')] застосовується лише до [Concept('trade', 'торгівлі')]. [Concept('locations','Райони')|e] при купівлі [Concept('goods', 'товарів')] для [Concept('constructions', 'будівництва')|e] та [Concept('pop_needs', 'потреб населення')|e] спираються на [Concept('market_access', 'доступ до ринку')|e]."
  hint_increasing_trade_advantage_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Встановіть контроль над більшою кількістю [Concept('locations', '@locations! районів')|e], що належать до цього [Concept('market', 'ринку')].\n@arrow_bonus_tier_2! Збільште [Concept('maritime_presence', '@maritime_presence! морську присутність')|e] у прибережних водах [Concept('market', 'ринку')].\n@arrow_bonus_tier_1! Деякі [Concept('buildings', '@buildings! споруди')|e], наприклад, #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!, також збільшують [Concept('merchant_power', 'торгову перевагу')]."
  hint_increasing_trade_advantage_hint_text_3: "#T Додаткові поради:#!\n@hint! #italic Для додаткової інформації ознайомтеся з [Link('hints', 'selected_hint = hint_trade', 'порадами щодо торгівлі')] та [Link('hints', 'selected_hint = hint_trade', 'морської присутності')]#!"
  hint_increasing_trade_advantage_military: "«Торгівля — заняття змагальне, а не спільне. Цілком природно, що хтось повинен мати перевагу»."
  hint_increasing_trade_advantage_administrative: "«Основа нашої стратегії — передбачення коливань цін за допомогою кидків кісток та розташування зірок на небосхилі»."
  hint_increasing_trade_advantage_diplomatic: "«Торгівля — один зі стовпів, на яких стоїть кожна повноцінна держава. Мабуть, у всьому світі не знайдеться швидших способів заповнити засіки»."
  hint_pops_with_needs_yellow: "Населення потребує товарів"
  hint_pops_with_needs_yellow_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_yellow_hint_text_2$\n\n$hint_pops_with_needs_yellow_hint_text_3$"
  hint_pops_with_needs_yellow_hint_text_1: "[Concept('pops', '@pops! Групи населення')|e] намагатимуться купувати необхідні їм повсякденні [Concept('goods', '@goods! товари')|e] на [Concept('market', '@market! ринку')|e] в тому [Concept('location', '@location! районі')|e], де живуть. Якщо вони не можуть купити необхідні [Concept('goods', 'товари')], [Concept('pop_satisfaction','задоволення')|e] цих [Concept('pops','груп населення')|e] буде відповідним чином знижуватися. Якщо значення показника #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V «Поріг приєднання населення до повстанців»#!#!#! з будь-якої причини (наприклад, через нестачу [Concept('goods', 'товарів')]) буде більшим, ніж [Concept('pop_satisfaction', 'задоволення')], такі [Concept('pops', 'групи населення')] можуть підтримати [Concept('rebellion', '@rebellion! повстання')|e] проти [Concept('government', 'уряду')]."
  hint_pops_with_needs_yellow_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Намагайтеся підтримувати [Concept('stability_with_icon', 'стабільність')|e], [Concept('legitimacy_with_icon', 'легітимність')|e] та [Concept('estate_satisfaction','задоволення станів')|e] на високому рівні, щоб не допустити [Concept('rebellions', 'повстань')].\n@arrow_bonus_tier_1! Нарощуйте виробництво затребуваних [Concept('goods','товарів')|e]: розширюйте [Concept('rgo_with_icon', 'видобуток ресурсів')|e] та будуйте [Concept('buildings_with_icon', 'споруди')|e] з категорії @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')].\n@arrow_bonus_tier_1! Спрямуйте [Concept('merchant_capacity_with_icon', 'торговий потенціал')|e] на імпорт [Concept('goods', 'товарів')] з інших [Concept('markets', 'ринків')]."
  hint_pops_with_needs_yellow_hint_text_3: "#T Додаткові поради#!\n@hint! Поки [Concept('pops', 'населення')] не бунтує, незадоволені потреби підданих не повинні сильно вас турбувати. Але пам'ятайте, що такі настрої загалом відображають стан [Concept('market', 'ринку')].\n@hint! Потреби груп населення — лише один із факторів, що впливають на їх [Concept('pop_satisfaction', 'задоволення')]. Народ може підняти повстання, навіть якщо всі його потреби задоволені.\n@hint! Дізнатися більше про [Concept('rebel_movements', '@rebel_movements! повстанські рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_pops_with_needs_yellow_military: "«Сильного правителя не хвилюють примхи простолюдинів»."
  hint_pops_with_needs_yellow_administrative: "«Там, де недосвідчений погляд бачить знедолене населення, я бачу чудову можливість нажитися»."
  hint_pops_with_needs_yellow_diplomatic: "«Люди завжди вимагають більшого, ніж заслуговують. Але будьте обережні: надмірна скупість може підштовхнути ваших підданих до повстання»."
  hint_pops_with_needs_red: "Повстале населення потребує товарів"
  hint_pops_with_needs_red_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_2$\n\n$hint_pops_with_needs_red_hint_text_3$"
  hint_pops_with_needs_red_hint_text_1: "Частина наших [Concept('pops','груп населення')] переходить на бік [Concept('rebel_movements', 'повстанців')]. Якщо збільшити пропозицію необхідних [Concept('goods', 'товарів')], можливо, частина бунтівників припинить [Concept('rebellions', 'повстання')]."
  hint_pops_with_needs_red_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Постарайтеся підвищити [Concept('stability','стабільність')|e], [Concept('legitimacy','легітимність')|e] та [Concept('estate_satisfaction','задоволення станів')|e].\n@arrow_bonus_tier_1! Нарощуйте виробництво затребуваних [Concept('goods','товарів')|e]: розширюйте [Concept('rgo','видобуток ресурсів')|e] та будуйте [Concept('buildings','споруди')|e] з категорії @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')].\n@arrow_bonus_tier_1! Спрямуйте [Concept('merchant_capacity','торговий потенціал')|e] на імпорт [Concept('goods', 'товарів')] з інших [Concept('markets', 'ринків')].\n@arrow_bonus_tier_1! У крайньому випадку тримайте напоготові [Concept('armies','армії')|e], щоб приборкати повстанців."
  hint_pops_with_needs_red_hint_text_3: "#T Додаткові поради#!\n@hint! Потреби груп населення — лише один із факторів, що впливають на їх [Concept('pop_satisfaction', 'задоволення')]. Народ може підняти повстання, навіть якщо всі його потреби задоволені.\n@hint! Дізнатися більше про [Concept('rebel_movements', '@rebel_movements! повстанські рухи')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  hint_pops_with_needs_red_diplomatic: "«Надійні поставки найважливіших товарів — цілком дієвий спосіб змусити розкольницькі голоси замовкнути»."
  hint_pops_with_needs_red_administrative: "«Будь-яке повстання розорить наших купців. Необхідно якнайшвидше наростити виробництво, доки народ не взявся за зброю!»"
  hint_pops_with_needs_red_military: "«Голодний натовп — це не страшно. Наша армія з ним розбереться»."
  hint_has_possible_reform: "Можливі принципи"
  hint_has_possible_reform_hint_text: "$hint_has_possible_reform_hint_text_1$\n\n$hint_has_possible_reform_hint_text_2$\n\n$hint_has_possible_reform_hint_text_3$"
  hint_has_possible_reform_hint_text_1: "[Concept('government_reforms_with_icon', 'Державні принципи')|e] — одна з найважливіших особливостей нашої [Concept('country_with_icon', 'держави')|e]. [Concept('reforms', 'Принципи')] слід приймати одразу, як тільки це стає можливим."
  hint_has_possible_reform_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Натисніть на зображення плюса під карткою «[ShowEstateTypeName('crown_estate')]» у вкладці @government_panel![Link('government', 'tabcontent = estates', 'lateralview_government_entry_name')], щоб прийняти новий [Concept('reform', 'принцип')]."
  hint_has_possible_reform_hint_text_3: "#T Додаткові підказки:#!\n@hint! У ході гри вам відкриватимуться нові [Concept('government_reforms', 'державні принципи')] — цьому сприяють [Concept('advances_with_icon', 'покращення')|e] та [Concept('events','події')|e].\n@hint! На скасування [Concept('government_reforms', 'державних принципів')] витрачається [Concept('stability_with_icon', 'стабільність')|e], а прийняття вимагає багато часу. Намагайтеся обирати принципи обачно.\n@hint! Певні [Concept('government_reforms', 'принципи')] вимагають ухилу [Concept('country', 'держави')] в бік якоїсь [Concept('societal_value_with_icon', 'суспільної цінності')|e]."
  hint_has_possible_reform_diplomatic: "«Чітко побудований уряд — ознака здорової влади»."
  hint_has_possible_reform_administrative: "«Не можна, щоб іноземні держави хибно тлумачили суть нашого уряду, — адже їм треба знати, як до нас звертатися»."
  hint_has_possible_reform_military: "«Як ми збираємося захищатися від ворогів, якщо ми навіть не можемо сказати, хто ми такі?»"
  hint_has_conquered_provinces: "Неінтегровані провінції"
  hint_has_conquered_provinces_hint_text: "$hint_has_conquered_provinces_hint_text_1$\n\n$hint_has_conquered_provinces_hint_text_2$\n\n$hint_has_conquered_provinces_hint_text_3$"
  hint_has_conquered_provinces_hint_text_1: "[Concept('conquered_with_icon', 'Завойовані')|e] [Concept('locations_with_icon', 'райони')|e] необхідно [Concept('integrated','інтегрувати')|e] до складу нашої держави, щоб ті примножували її багатство. Усі [Concept('locations','райони')|e] слід [Concept('integrate', 'інтегрувати')] якомога швидше."
  hint_has_conquered_provinces_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Доручіть [Concept('cabinet_with_icon', 'раді')|e] дію «[ShowCabinetActionName('integrate_province')]», обравши її у вкладці @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')].\n@arrow_bonus_tier_1! Якщо [Concept('cabinet', 'рада')] не встигає за нашими темпами завоювань, можна створити [Concept('subject_with_icon', 'ленника')|e], який правитиме замість нас. Щоб це зробити, відкрийте вкладку @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'lateralview_diplomacy_entry_name')]."
  hint_has_conquered_provinces_hint_text_3: "#T Додаткові підказки:#!\n@hint! В експансіоністських [Concept('countries','державах')|e] інтеграція нових територій — одне з найважливіших завдань [Concept('cabinet','ради')|e].\n@hint! [Concept('pop_satisfaction', 'Задоволення')|e] населення в [Concept('conquered', 'завойованих')] [Concept('locations', 'районах')] буде значно нижчим, що може призвести до [Concept('rebellions_with_icon', 'заколоту')|e].\n@hint! Щоб прискорити інтеграцію, призначте талановитіших [Concept('characters','персонажів')|e] на посади [Concept('cabinet_members','членів ради')|e]. Крім того, інтеграція буде тим швидшою, чим вища загальна [Concept('cabinet_efficiency','ефективність ради')|e] нашої [Concept('country', 'держави')].\n@hint! Інтеграція відбуватиметься швидше, якщо наша [Concept('primary_culture','основна культура')|e] одночасно є в районі і [Concept('dominant_culture','домінуючою')|e], або якщо наш [Concept('cultural_influence','культурний вплив')|e] сильніший за [Concept('cultural_tradition','традиції')|e] [Concept('dominant_culture', 'домінуючої культури')]."
  hint_has_conquered_provinces_diplomatic: "«Піддані, яких ми щойно… #italic набули#!, не одразу приймуть нашу владу. Інтеграція — довгий і трудомісткий процес, але водночас і вкрай важливий для підтримки стабільності»."
  hint_has_conquered_provinces_administrative: "«Жодна справа не буде процвітати, якщо в країні панує хаос. Для процвітання необхідна влада закону»."
  hint_has_conquered_provinces_military: "«Від бюрократів іноді буває користь: без умілих управлінців ми нізащо не змогли б зігнати людей в ополчення»."
  hint_has_possible_cabinet_action: "Можливі дії ради"
  hint_has_possible_cabinet_action_hint_text: "$hint_has_possible_cabinet_action_hint_text_1$\n\n$hint_has_possible_cabinet_action_hint_text_2$\n\n$hint_has_possible_cabinet_action_hint_text_3$"
  hint_has_possible_cabinet_action_hint_text_1: "[Concept('cabinet_actions_with_icon', 'Дії ради')|e] — один із найдієвіших інструментів з управління державою. Слід постійно стежити за тим, щоб [Concept('cabinet_seats_with_icon', 'місця в раді')|e] не пустували."
  hint_has_possible_cabinet_action_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Відкрийте вкладку @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')], щоб ознайомитися з доступними діями ради.\n@arrow_bonus_tier_3! Дія «[ShowCabinetActionName('integrate_province')]» корисна, якщо нещодавно ми [Concept('conquered','завоювали')|e] якусь територію.\n@arrow_bonus_tier_2! Дія «[ShowCabinetActionName('stabilize_country')]» корисна, якщо в державі низький рівень [Concept('stability','стабільності')|e].\n@arrow_bonus_tier_2! Дія «[ShowCabinetActionName('strengthen_government')]» корисна, якщо у нас низький рівень [Concept('legitimacy_with_icon', 'легітимності')|e].\n@arrow_bonus_tier_2! Дія «[ShowCabinetActionName('diplomatic_endeavors')]» полегшує [Concept('diplomacy','дипломатію')|e].\n@arrow_bonus_tier_1! Дія «[ShowCabinetActionName('change_societal_values')]» корисна, якщо ми хочемо прийняти якусь [Concept('societal_value','суспільну цінність')|e].\n@arrow_bonus_tier_1! Дія «[ShowCabinetActionName('develop_province')]» допоможе нам підвищити рівень [Concept('development_with_icon', 'розвитку')|e] в найцінніших [Concept('provinces_with_icon', 'провінціях')|e].\n@arrow_bonus_tier_1! За допомогою [Concept('cabinet_actions', 'дій ради')] також можна [Concept('convert_with_icon', 'навертати')|e] носіїв інших [Concept('religions_with_icon', 'релігій')|e] у свою або [Concept('assimilate_with_icon', 'асимілювати')|e] інші [Concept('cultures_with_icon', 'культури')|e].\n@automation! Також діяльність ради можна автоматизувати — для цього відкрийте вкладку @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_possible_cabinet_action_hint_text_3: "#T Додаткові підказки:#!\n@hint! Призначені до [Concept('cabinet','ради')|e] [Concept('characters','персонажі')|e] збільшують [Concept('estate_power','владу')|e] свого [Concept('estate','стану')|e].\n@hint! У наступні [Concept('ages','епохи')|e] стануть доступні нові [Concept('cabinet_actions', 'дії ради')]."
  hint_has_possible_cabinet_action_diplomatic: "«Бюрократія — плоть і кров будь-якої держави… за умови, що нею не завідують дурні»."
  hint_has_possible_cabinet_action_administrative: "«Рада — головна сила держави, що перетворює безплідні пустелі на процвітаючі міста»."
  hint_has_possible_cabinet_action_military: "«Сильна рада здатна вгамувати будь-якого незгодного, хоч би яким гучним він не був.\nЛише віддайте наказ — і його буде виконано»."
  hint_has_possible_law: "Правила не систематизовані"
  hint_has_possible_law_hint_text: "$hint_has_possible_law_hint_text_1$\n\n$hint_has_possible_law_hint_text_2$\n\n$hint_has_possible_law_hint_text_3$"
  hint_has_possible_law_hint_text_1: "Слід подбати про те, щоб щодо кожного [Concept('laws','правила')|e] нашої [Concept('country','держави')|e] постійно діяла якась [Concept('policy','політика')|e], інакше ми втратимо деякі корисні переваги."
  hint_has_possible_law_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Клацніть по сповіщенню, щоб переглянути [Concept('laws', 'правила')], щодо яких не діє жодна [Concept('policy', 'політика')]. Обирайте обачно.\n@arrow_bonus_tier_3! Побачити чинні [Concept('laws', 'правила')] можна на @government_panel![Link('government', 'tabcontent = politics', 'панелі уряду')].\n@automation! Правила також можна автоматизувати — для цього відкрийте @automation![Link('automation', '', 'панель автоматизації')]."
  hint_has_possible_law_hint_text_3: "#T Додаткові поради:#!\n@hint! На ухвалення [Concept('policies', 'політик')] потрібен час. Тривалість ухвалення залежить від нашої [Concept('legislative_efficiency','законодавчої ефективності')|e]. Ефект від ухвалення політики не одразу проявиться повною мірою.\n@hint! Ухвалену [Concept('policy', 'політику')] згодом можна буде змінити, витративши на це [Concept('gold','дукати')|e] та [Concept('stability','стабільність')|e]. Обсяг витрат залежить від нашої [Concept('crown_power','влади правителя')|e].\n@hint! У наступні епохи стануть доступні нові [Concept('laws', 'правила')] та [Concept('policies', 'політики')]."
  hint_has_possible_law_diplomatic: "«Держава без правил — усе одно що будівля без опор або тіло без кінцівок: краще надлишок, ніж нестача»."
  hint_has_possible_law_administrative: "«Звід правил держави має переслідувати три цілі: розвиток міст, захист купців та своєчасне стягнення податків»."
  hint_has_possible_law_military: "«Ухвалювати нові правила — важливо, забезпечувати їх дотримання — життєво важливо»."
  hint_has_army_without_leader: "Немає командира"
  hint_has_army_without_leader_hint_text: "$hint_has_army_without_leader_hint_text_1$\n\n$hint_has_army_without_leader_hint_text_2$\n\n$hint_has_army_without_leader_hint_text_3$"
  hint_has_army_without_leader_hint_text_1: "Щоб наші [Concept('units','загони')|e] успішно билися в [Concept('battle','бою')|e], їм необхідний [Concept('commander', 'командир')|e]. [Concept('armies', 'Армії')] очолюють [Concept('generals','генерали')|e], а [Concept('navies', 'флоти')] очолюють [Concept('admirals', 'адмірали')]."
  hint_has_army_without_leader_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Клацніть по #W сповіщенню#!, щоб обрати відповідного для командування [Concept('unit', 'загоном')] [Concept('character','персонажа')|e]. Командирами краще призначати персонажів з високим рівнем [Concept('abilities','навичок')|e].\n@arrow_bonus_tier_2! Також [Concept('unit', 'загін')] можна обрати на карті або в #W планувальнику#!.\n@arrow_bonus_tier_2! Якщо у вас немає достатньо вправних [Concept('character', 'персонажів')], потенційного командира можна спробувати навчити у вкладці @military_panel![Link('unit_overview', '', 'lateralview_unit_overview_entry_name')].\n@automation! Призначення [Concept('generals', 'генералів')] та [Concept('admirals', 'адміралів')] можна автоматизувати — для цього відкрийте вкладку @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_army_without_leader_hint_text_3: "#T Додаткові підказки:#!\n@hint! Не починайте [Concept('battle', 'битву')], якщо у вас немає вправного [Concept('commander', 'командира')|e]!\n@hint! Деякі [Concept('characters','персонажі')|e] мають [Concept('traits','властивості')|e], які дозволяють їм краще справлятися з певними завданнями.\n@hint! Деякі [Concept('laws','правила')|e] обмежують право певних [Concept('characters','персонажів')|e] обіймати командну посаду."
  hint_has_army_without_leader_diplomatic: "«Будь-якій армії завжди потрібен полководець. Нам, однак, слід бути обережними: за рахунок впливу командирів збільшуватиметься влада їхнього стану»."
  hint_has_army_without_leader_administrative: "«Прошу, не звертайтеся до мене. Таку грубу справу, як війна, я волію довіряти менш… #italic витонченим#! радникам»."
  hint_has_army_without_leader_military: "«Атакувати ворога, не маючи в загоні гідного командира, — це самогубство.\nНі в якому разі не варто так чинити»."
  hint_is_heir_underage: "Неповнолітній спадкоємець"
  hint_is_heir_underage_hint_text: "$hint_is_heir_underage_hint_text_1$\n\n$hint_is_heir_underage_hint_text_2$"
  hint_is_heir_underage_hint_text_1: "Якщо наш [Concept('ruler','правитель')|e] помре, перш ніж [Concept('heir','спадкоємець')|e] стане повнолітнім, у державі встановиться [Concept('regency','регентство')|e]. Кермо влади візьме — залежно від обставин — представник найвпливовішого [Concept('estate','стану')|e]. На час міжцарів'я [Concept('estate_power','влада')|e] цього стану значно зросте."
  hint_is_heir_underage_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_1! У цьому випадку вам залишається лише одне: чекати… і, можливо, не ризикувати життям [Concept('ruler', 'правителя')] даремно. Якщо тільки [Concept('ruler', 'правитель')], звісно, не виявиться зовсім невмілим…"
  hint_is_heir_underage_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('regency','Регентство')|e] — не найгірший результат, якщо взяти на себе цю відповідальність може достатньо вправний [Concept('character','персонаж')|e]."
  hint_is_heir_underage_diplomatic: "«Забезпечити собі спадкоємність означає забезпечити державі майбутнє»."
  hint_is_heir_underage_administrative: "«Немає надійніших способів зблизити дві держави, ніж шлюб і династичні узи»."
  hint_is_heir_underage_military: "«Виховувати зі спадкоємців гідних правителів найкраще, коли ті ще молоді»."
  hint_has_unmarried_adult_ruler: "Правитель не одружений"
  hint_has_unmarried_adult_ruler_hint_text: "$hint_has_unmarried_adult_ruler_hint_text_1$\n\n$hint_has_unmarried_adult_ruler_hint_text_2$\n\n$hint_has_unmarried_adult_ruler_hint_text_3$"
  hint_has_unmarried_adult_ruler_hint_text_1: "Нам слід спробувати забезпечити [Concept('ruler','правителю')|e] шлюб з гідним кандидатом, щоб [Concept('dynasty','династія')|e] розрослася і стала сильнішою. Плідний королівський нащадок не тільки забезпечить нам мирну та стабільну спадкоємність — [Concept('characters','персонажі')|e]-принци непогано проявляють себе на урядових посадах»."
  hint_has_unmarried_adult_ruler_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Клацніть по сповіщенню, щоб підшукати кандидатів на [Concept('royal_marriage','династичний шлюб')|e]. Монархічні держави можуть укладати між собою династичні шлюби, щоб закріпити [Concept('opinion', 'думку')] одна про одну та закласти основи для майбутнього [Concept('alliance','союзу')|e]. Крім того, [Concept('royal_marriages','династичні шлюби')|e] — це крок на шляху до [Concept('personal_union','особистої унії')|e].\n@arrow_bonus_tier_2! Укласти шлюб між вашим [Concept('ruler', 'правителем')] або [Concept('heir', 'спадкоємцем')] та відповідним [Concept('character','персонажем')|e] можна при дворі. Для цього оберіть взаємодію «[ShowCharacterInteractionName('marry_noble')]», клацнувши правою кнопкою миші по портрету персонажа.\n@arrow_bonus_tier_1! За відсутності більш прийнятних варіантів завжди доступна крайня, а тому непопулярна міра — [ShowCharacterInteractionName('marry_lowborn')|l]."
  hint_has_unmarried_adult_ruler_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('characters', 'Персонажі')] з правлячої [Concept('dynasty', 'династії')] завжди належать до стану #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!, а тому при призначенні на відповідальні [Concept('roles','ролі')|e] не зміцнюють владу інших [Concept('estates','станів')|e] нашої держави."
  hint_has_unmarried_adult_ruler_diplomatic: "$hint_is_heir_underage_diplomatic$"
  hint_has_unmarried_adult_ruler_administrative: "$hint_is_heir_underage_administrative$"
  hint_has_unmarried_adult_ruler_military: "«Всякому мечу потрібні піхви»."
  hint_can_do_more_research: "Дослідження"
  hint_can_do_more_research_hint_text: "$hint_can_do_more_research_hint_text_1$\n\n$hint_can_do_more_research_hint_text_2$\n\n$hint_can_do_more_research_hint_text_3$"
  hint_can_do_more_research_hint_text_1: "У нашій [Concept('country','державі')|e] постійно повинні вивчатися нові [Concept('advances','покращення')|e]."
  hint_can_do_more_research_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Відкрийте вкладку @advances_panel![Link('advances', 'subtab = research', 'lateralview_advances_entry_name')] та виберіть необхідне покращення.\n@arrow_bonus_tier_2! Також можна клацнути по зображенню порожньої склянки у правому верхньому куті, щоб відкрити вікно @advances_panel![Link('technology_view', '', 'lateralview_technology_view_entry_name')] цілком.\n@automation! Якщо вам поки не хочеться занурюватися в тонкощі механіки [Concept('advances', 'покращень')], її можна автоматизувати — для цього відкрийте вкладку @automation![Link('automation', '', 'lateralview_automation_entry_name')]. Як тільки держава вивчить нове [Concept('advance','покращення')|e], ви одразу ж отримаєте сповіщення."
  hint_can_do_more_research_hint_text_3: "#T Додаткові підказки:#!\n@hint! Невикористані очки досліджень якийсь час будуть накопичуватися, а по досягненні певного ліміту — почнуть зникати.\n@hint! [Concept('research_progress','Прогрес дослідження')|e] можна прискорити, підвищивши середній рівень [Concept('literacy','грамотності')|e] в державі та [Concept('estate_satisfaction','задоволення')|e] стану «[ShowEstateTypeName('clergy_estate')|l]»."
  hint_can_do_more_research_diplomatic: "«Технології здатні значно полегшити нам управління володіннями»."
  hint_can_do_more_research_administrative: "«При гідних вкладеннях ми можемо зробити економіку набагато ефективнішою»."
  hint_can_do_more_research_military: "«Наші професійні армії повинні постійно вдосконалюватися, інакше ми безнадійно відстанемо від ворогів»."
  hint_lack_cabinet_for_cabinet_action: "У раді не вистачає учасника"
  hint_lack_cabinet_for_cabinet_action_hint_text: "$hint_lack_cabinet_for_cabinet_action_hint_text_1$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_2$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_3$"
  hint_lack_cabinet_for_cabinet_action_hint_text_1: "Ефективність [Concept('cabinet_action','дії ради')|e] буде невисокою, якщо її не виконуватиме вмілий [Concept('character','персонаж')|e]. Завжди намагайтеся заповнювати всі [Concept('cabinet_seats','місця в раді')|e], призначаючи на них [Concept('characters', 'персонажів')]."
  hint_lack_cabinet_for_cabinet_action_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Клацніть по #W сповіщенню#!, щоб відкрити вкладку @government_panel![Link('government', 'tabcontent = cabinet', 'lateralview_government_entry_name')] та призначити на порожнє [Concept('cabinet_seat', 'місце в раді')] [Concept('character','персонажа')|e] з максимально високим рівнем відповідного [Concept('ability','навичка')|e].\n@arrow_bonus_tier_1! За відсутності вмілих [Concept('characters', 'персонажів')] можна найняти нового [Concept('courtier','придворного')|e].\n@automation! Раду можна автоматизувати — для цього відкрийте вкладку @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_lack_cabinet_for_cabinet_action_hint_text_3: "#T Додаткові підказки:#!\n@hint! Кожна [Concept('cabinet_action','дія ради')|e] вимагає володіння одним із трьох доступних персонажам [Concept('abilities','навичок')|e], тому намагайтеся вибирати членів ради відповідно до призначених завдань.\n@hint! [Concept('cabinet_members','Члени ради')|e] збільшують [Concept('estate_power','владу')|e] [Concept('estate','стану')|e], до якого належать."
  hint_lack_cabinet_for_cabinet_action_diplomatic: "«Найкраще керівництво — те, де засідають лише найкращі»."
  hint_lack_cabinet_for_cabinet_action_administrative: "«Чим краще наша держава справляється зі своїми обов'язками, тим краще ми виглядаємо в очах інших»."
  hint_lack_cabinet_for_cabinet_action_military: "«Явно демонструвати оточуючим свою силу ми зможемо лише тоді, коли нами правитимуть здібні люди»."
  hint_inflation: "Інфляція"
  hint_inflation_hint_text: "$hint_inflation_hint_text_1$\n\n$hint_inflation_hint_text_2$"
  hint_inflation_hint_text_1: "Інфляція збільшує всі витрати нашої [Concept('country','держави')|e], тому її рекомендується уникати. Вона досить швидко зростає через [Concept('minting','карбування')|e] монет, а ось її зниження може здатися складним."
  hint_inflation_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Якщо [Concept('inflation','інфляція')] зростає, перемістіть повзунок [Concept('minting','карбування')] у вкладці @economy_panel![Link('finances', '', 'lateralview_economy_entry_name')], щоб зупинити її зростання.\n@arrow_bonus_tier_2! Якщо інфляція вже є, встановлення повзунка на мінімальне значення дозволить її знизити."
  hint_inflation_hint_text_3: "#T Додаткові підказки:#!\n@hint! Є й інші способи боротьби з інфляцією — наприклад, певні [Concept('advances','покращення')|e]."
  hint_inflation_diplomatic: "«Хай береже нас рок від цієї невидимої хвороби економіки»."
  hint_inflation_administrative: "«Карбування монет може здатися спокусливим при нестачі коштів, але в перспективі воно несе проблеми»."
  hint_inflation_military: "«Інфляція — повільний і невблаганний убивця»."
  hint_has_disloyal_subjects: "Нелояльні ленники"
  hint_has_disloyal_subjects_hint_text: "$hint_has_disloyal_subjects_hint_text_1$\n\n$hint_has_disloyal_subjects_hint_text_2$\n\n$hint_has_disloyal_subjects_hint_text_3$"
  hint_has_disloyal_subjects_hint_text_1: "[Concept('subjects','Ленниками')|e] називаються [Concept('countries','держави')|e], так чи інакше підпорядковані нашій владі. Зазвичай вони платять нам [Concept('subject_taxation','податки')|e] та підтримують нас у [Concept('wars','війнах')|e].\n\nЯкщо [Concept('subject_loyalty','лояльність ленника')|e] опуститься нижче #W 50#!, він стане нелояльним і відмовиться надавати нам [Concept('wars','військову')] допомогу. Нелояльні ленники можуть об'єднатися, створивши #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,independence_movement,X #L рух за незалежність#!#!, і навіть оголосити нам [Concept('war','війну')], якщо їхні сили будуть достатньо великі."
  hint_has_disloyal_subjects_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Слідкуйте, щоб [Concept('opinion','думка')|e] ленника про нас була достатньо доброю. Для її покращення ви можете використати [Concept('diplomatic_action','дипломатичну дію')|e] «$IMPROVE_RELATIONTITLE$».\n@arrow_bonus_tier_1! Ви також можете подумати про [Concept('annexing','анексію')|e] інших лояльних ленників: зростання нашої відносної могутності позитивно позначиться на лояльності.\n@arrow_bonus_tier_1! Збільшення чисельності [Concept('armies','армій')|e] також підвищує лояльність ленників, залякуючи їх."
  hint_has_disloyal_subjects_hint_text_3: "#T Додаткові підказки:#!\n@hint! Інформацію про всіх ленників можна знайти на панелі управління ленниками, розташованій у вкладці @diplomacy_panel![Link('diplomacy', 'relations_tab = current_relations', 'lateralview_diplomacy_entry_name')].\n@hint! Чим більше у нас [Concept('subjects','ленників')|e] і чим вища їхня відносна могутність, тим важче забезпечувати їхню [Concept('subject_loyalty','лояльність')].\n@hint! Різні типи [Concept('subjects','ленників')] мають різні властивості та обмеження."
  hint_has_disloyal_subjects_diplomatic: "«Нам слід підтримувати добрі стосунки з ленниками, адже інакше вони почнуть вважати себе господарями своєї долі»."
  hint_has_disloyal_subjects_administrative: "«Ленники приносять чималу вигоду нашій казні.\nГоловне, щоб вони самі цього не зрозуміли»."
  hint_has_disloyal_subjects_military: "«Ці вівці втечуть зі стада за першої нагоди. Ми повинні бути готові спустити псів війни!»"
  hint_has_buildings_missing_input: "Спорудам не вистачає ресурсів"
  hint_has_buildings_missing_input_hint_text: "$hint_has_buildings_missing_input_hint_text_1$\n\n$hint_has_buildings_missing_input_hint_text_2$\n\n$hint_has_buildings_missing_input_hint_text_3$"
  hint_has_buildings_missing_input_hint_text_1: "Щоб [Concept('buildings','споруди')|e] могли виконувати свої функції, їм потрібен доступ до [Concept('goods','товарів')|e] на [Concept('markets','ринках')]. Якщо вони не можуть отримати всі [Concept('goods','товари')], їхня ефективність знижується."
  hint_has_buildings_missing_input_hint_text_2: "#T Рекомендації:#!\n$hint_address_shortage_text$"
  hint_has_buildings_missing_input_hint_text_3: "#T Додаткові підказки:#!\n@hint! Не всі споруди є критично важливими для нашої країни, але деякі стратегічні ланцюжки повинні функціонувати безперебійно.\n@hint! Наприклад, якщо наша #TOOLTIP:BUILDING_TYPE,'weapon_guild,X #L гільдія зброярів#!#!#!#! не зможе закупити на [Concept('market','ринку')] достатньо #TOOLTIP:GOODS,lumber,X #L лісоматеріалів#!#!, ми не зможемо наймати #TOOLTIP:UNITTYPE,a_footmen,X #L піхоту#!#!."
  hint_has_buildings_missing_input_diplomatic: "«Деякі споруди особливо важливі для життя нашої держави»."
  hint_has_buildings_missing_input_administrative: "«Зазвичай купці самі усувають будь-який дефіцит товарів, але іноді невидиму руку ринку потрібно... трохи підштовхнути»."
  hint_has_buildings_missing_input_military: "«Перш ніж починати будь-яку військову кампанію, ми повинні забезпечити безперебійні поставки зброї та інших припасів для армії»."
  hint_address_shortage_text: "Клацнувши по #W сповіщенню#!, ви перейдете на вкладку @production_panel![Link('goods_production', '', 'lateralview_goods_production_entry_name')] зі списком [Concept('goods','товарів')], яких не вистачає на відповідному [Concept('market','ринку')].\nЗбільшити [Concept('supply','пропозицію')|e] певного [Concept('good','товару')|e] на [Concept('markets','ринках')|e] можна трьома основними способами:\n\n@arrow_bonus_tier_3! Клацніть по кнопці @rgo! «[Concept('rgo','Видобуток ресурсів')|e]», щоб побачити список [Concept('locations','районів')] цього [Concept('market','ринку')], де видобувається відповідний [Concept('rgo','ресурс')]. Пам'ятайте, що [Concept('rgo','видобуток ресурсів')] може виробляти лише [Concept('raw_materials','неперероблену сировину')|e].\n@arrow_bonus_tier_2! Клацніть по кнопці @building! «[Concept('building','Споруди')|e]», щоб побачити список усіх доступних [Concept('buildings','споруд')|e], здатних виробляти потрібний [Concept('good','товар')].\n@arrow_bonus_tier_2! Клацніть по кнопці @import! «[Concept('import','імпорт')|e]», щоб імпортувати [Concept('good','товар')] з іншого ринку, використовуючи [Concept('merchant_capacity','торговельний потенціал')|e].\n@automation! Ви можете автоматизувати будівництво [Concept('building','споруд')] та місць [Concept('rgo','видобутку ресурсів')], а також [Concept('trade','торгівлю')|e] на вкладці @automation![Link('automation', '', 'lateralview_automation_entry_name')]."
  hint_has_constructions_missing_input: "Будівництву не вистачає ресурсів"
  hint_has_constructions_missing_input_hint_text: "$hint_has_constructions_missing_input_hint_text_1$\n\n$hint_has_constructions_missing_input_hint_text_2$\n\n$hint_has_constructions_missing_input_hint_text_3$"
  hint_has_constructions_missing_input_hint_text_1: "Усім [Concept('constructions','будівництвам')|e] потрібен доступ до певних [Concept('goods','товарів')|e] на [Concept('market','ринку')|e] свого [Concept('location','району')|e]. Якщо [Concept('goods','товарів')] буде недостатньо, [Concept('construction','будівництво')|e] зупиниться."
  hint_has_constructions_missing_input_hint_text_2: "#T Рекомендації:#!\n$hint_address_shortage_text$"
  hint_has_constructions_missing_input_hint_text_3: "#T Додаткові підказки:#!\n@hint! Різні [Concept('location','райони')] [Concept('market','ринку')] отримують [Concept('goods','товари')] в порядку свого [Concept('market_access','доступу до ринку')|e] незалежно від того, де були вироблені ці товари.\n@hint! Це означає, що [Concept('location','районам')], розташованим ближче до [Concept('market_centers','ринкових центрів')|e], простіше отримати будь-які необхідні товари."
  hint_has_constructions_missing_input_diplomatic: "«Уважний контроль ресурсів та потреб життєво важливий для будь-якого підприємства»."
  hint_has_constructions_missing_input_administrative: "«Дипломатія та торгівля забезпечать нам усе, що ми не можемо виробляти самі»."
  hint_has_constructions_missing_input_military: "«Ми повинні бути здатні самі задовольняти свої потреби, щоб інші не могли скористатися нашими слабкостями»."
  hint_lack_pop_promotion_to_fill_buildings: "Спорудам або місцям [Concept('rgo','видобутку ресурсів')] бракує працівників"
  hint_lack_pop_promotion_to_fill_buildings_hint_text: "$hint_lack_pop_promotion_to_fill_buildings_hint_text_1$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_2$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_3$"
  hint_lack_pop_promotion_to_fill_buildings_hint_text_1: "Різним [Concept('buildings','спорудам')|e] потрібні працівники різних [Concept('pop_types','суспільних класів')|e]. Якщо після того, як [Concept('building','споруда')] буде збудована, в її околицях виявиться недостатньо [Concept('pops','населення')|e] потрібного [Concept('pop_types','класу')], вона почне [Concept('promote','підвищувати')|e] клас #TOOLTIP:POPTYPE,peasants,X #L селян#!#! зі швидкістю, що залежить від модифікатора «[ShowModifierTypeName('local_pop_promotion_speed')]» для даного [Concept('location','району')|e].\n\nСпоруди також можуть втрачати працівників при зменшенні [Concept('pops','населення')] через [Concept('diseases','епідемії')|e], [Concept('sieges','облоги')|e] та [Concept('starvation','голод')|e]."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Не будуйте споруди в [Concept('locations','районах')], де вже спостерігається суттєвий дефіцит працівників.\n@arrow_bonus_tier_2! Розвивайте аспекти [Concept('location','району')], що прискорюють підвищення класу населення: [Concept('stability','стабільність')|e], [Concept('literacy','грамотність')|e] та [Concept('control','контроль')|e].\n@arrow_bonus_tier_1! У найважливіших [Concept('locations','районах')] настійно рекомендується побудувати #TOOLTIP:BUILDING_TYPE,library,X #L бібліотеки#!#! та #TOOLTIP:BUILDING_TYPE,university,X #L університети#!#!.\n@arrow_bonus_tier_1! Також ви можете знести менш потрібні [Concept('buildings','споруди')], щоб вивільнити робочу силу."
  hint_lack_pop_promotion_to_fill_buildings_hint_text_3: "#T Додаткові підказки:#!\n@hint! У [Concept('urban_locations','міських районах')|e] більша базова частка [Concept('pops','населення')], що належить до [Concept('upper_class','вищого суспільства')|e].\n@hint! Пам'ятайте, що для [Concept('promote','підвищення')|e] класу населення в [Concept('location','районі')] має бути [Concept('available','доступна')|e] достатня кількість #TOOLTIP:POPTYPE,peasants,X #L селян#!#!.\n@hint! Дізнатися модифікатор «[ShowModifierTypeName('local_pop_promotion_speed')]», що діє в [Concept('location','районі')], можна на #W вкладці «Демографія»#! #W панелі району#!."
  hint_lack_pop_promotion_to_fill_buildings_diplomatic: "«Що це за промисловість, якщо в ній нікому працювати?»"
  hint_lack_pop_promotion_to_fill_buildings_administrative: "«Якщо наші піддані не працюватимуть, інші країни можуть вважати нас ледарями»."
  hint_lack_pop_promotion_to_fill_buildings_military: "«Обов'язок населення — виробляти все, чого потребує країна»."
  hint_casus_belli: "Привід для війни"
  hint_casus_belli_hint_text: "$hint_casus_belli_hint_text_1$\n\n$hint_casus_belli_hint_text_2$\n\n$hint_casus_belli_hint_text_3$"
  hint_casus_belli_hint_text_1: "[Concept('casus_belli','Приводом для війни')|e] називається законна причина для початку [Concept('war','війни')|e] з іншою державою. Розпочати війну можна і без приводу, але в такому разі нам буде важче нав'язати свої вимоги при укладенні [Concept('peace_treaty','мирного договору')|e], а сусіди реагуватимуть на наші дії більш вороже."
  hint_casus_belli_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Привід для війни найпростіше отримати, запросивши його у [Concept('parliament','парламенту')|e]. Ви можете скликати засідання парламенту на вкладці @government_panel![Link('government', 'tabcontent = parliament', 'lateralview_government_entry_name')].\n@arrow_bonus_tier_2! Створивши [Concept('spy_network','шпигунську мережу')|e] в інших [Concept('countries','державах')|e], ми зможемо фабрикувати приводи для війни з ними, якщо у нас є [Concept('cores','національні райони')|e] на їхній території або вони є нашими [Concept('rivals','суперниками')|e]."
  hint_casus_belli_hint_text_3: "#T Додаткові підказки:#!\n@hint! Пам'ятайте, що [Concept('wars','війни')] далеко не завжди справедливі і часом починаються без жодного приводу. Звісно, гідний привід для війни не буває зайвим, але й без нього все вирішує право сильного, а переможців не судять.\n@hint! Кожен привід для війни ставить перед вами певну [Concept('war_goal','мету')|e]. Досягнувши цієї [Concept('war_goal','мети')] в ході [Concept('war','війни')], ми отримаємо [Concept('war_score','військовий рахунок')|e], що має вирішальне значення для перемоги.\n@hint! Деякі [Concept('events','події')|e] та [Concept('situations','ситуації')|e] можуть давати нам особливі приводи для воєн."
  hint_casus_belli_diplomatic: "«Навіть на війні є правила, яких потрібно дотримуватися»."
  hint_casus_belli_administrative: "«З хорошим приводом ми можемо оголосити війну, не накликаючи на себе гнів сусідів»."
  hint_casus_belli_military: "«Найкращий привід для війни, мілорде, це відсутність будь-якого приводу»."
  hint_has_unraised_levies_in_war: "Ополчення"
  hint_has_unraised_levies_in_war_hint_text: "$hint_has_unraised_levies_in_war_hint_text_1$\n\n$hint_has_unraised_levies_in_war_hint_text_2$\n\n$hint_has_unraised_levies_in_war_hint_text_3$"
  hint_has_unraised_levies_in_war_hint_text_1: "У перші століття гри, коли [Concept('regulars', '@regulars! регулярні війська')|e] ще не з'явилися, основою збройних сил усіх [Concept('country', '@country! держав')|e] є [Concept('levies', '@levies! ополчення')|e]. Його настійно рекомендується збирати у разі будь-якої [Concept('war', '@war! війни')|e]."
  hint_has_unraised_levies_in_war_hint_text_2: "#T Рекомендовані дії#!\n@arrow_bonus_tier_3! З початком війни клацніть по #W сповіщенню#!, щоб відкрити #W збір ополчення#! на @military_panel![Link('unit_overview', '', 'панелі загонів')]. Тут можна зібрати все доступне [Concept('levies','ополчення')] одразу або вказати окремі [Concept('provinces', '@provinces! провінції')|e], де будуть набиратися війська.\n@arrow_bonus_tier_2! Було б непогано знизити залежність від [Concept('levies', 'ополчення')], замінивши їх більш ефективними, але дорогими [Concept('regular_regiments', 'регулярними полками')]. Для цього вам потрібно буде побудувати #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерію#!#!.\n@arrow_bonus_tier_1! Якщо у нас достатньо грошей, то доповнити або навіть замінити [Concept('levies','ополчення')] у важку годину можуть [Concept('mercenaries', '@mercenaries! найманці')|e]. Їх можна вербувати на @military_panel![Link('unit_overview', '', 'панелі загонів')]."
  hint_has_unraised_levies_in_war_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('levies', 'Ополчення')] переважно набирається з [Concept('pops', '@pops! груп населення')|e] ваших [Concept('primary_culture', '@primary_culture! основної')|e] та [Concept('accepted_culture', '@accepted_culture! визнаних культур')|e], але кількість, що призивається з конкретного [Concept('location', 'району')], залежить від [Concept('control', '@control! контролю')|e] над ним.\n@hint! Виробництво [Concept('food', '@food! їжі')|e] та [Concept('rgo', '@rgo! видобуток ресурсів')|e] у [Concept('locations', 'районах')], де було зібрано ополчення, знижується доти, доки воїни не повернуться додому.\n@hint! Дійте обачно: загиблі на війні селяни вже не зможуть працювати в полі."
  hint_has_unraised_levies_in_war_diplomatic: "«Люди повинні працювати, але вони повинні й захищати свої домівки»."
  hint_has_unraised_levies_in_war_administrative: "«Якщо народ вірить нам, він завжди прийде нам на допомогу»."
  hint_has_unraised_levies_in_war_military: "«Невзораний лан — не привід, щоб ухилятися від війни»."
  hint_no_allies: "Немає союзників"
  hint_no_allies_hint_text: "$hint_no_allies_hint_text_1$\n\n$hint_no_allies_hint_text_2$\n\n$hint_no_allies_hint_text_3$"
  hint_no_allies_hint_text_1: "[Concept('alliance','Союзом')|e] називається [Concept('treaty','договір')|e] між двома [Concept('countries','державами')|e], що зобов'язує їх надавати одна одній [Concept('wars','військову')|e] підтримку. Якщо на нас нападуть, наші [Concept('allies','союзники')] отримають [Concept('call_to_arms','заклик до зброї')|e] і зможуть вступити у війну на нашому боці. Якщо ж ми самі оголосимо [Concept('war','війну')|e], союзники нашого ворога з великою ймовірністю виступлять проти нас."
  hint_no_allies_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Відкрийте вкладку @diplomacy_panel![Link('diplomacy_macrobuilder', '', 'lateralview_diplomacy_macrobuilder_entry_name')] і клацніть по кнопці «$offer_alliance$» у розділі «#W $CATEGORY_FRIENDLY_ACTIONS$#!». Ви побачите список усіх [Concept('countries','держав')], готових укласти з нами [Concept('alliance','союз')|e].\n@arrow_bonus_tier_2! Деякі [Concept('countries','держави')] можуть погодитися на союз не відразу. Щоб переконати їх, здійснюйте [Concept('diplomatic_action','дипломатичну дію')|e] «#W $IMPROVE_RELATIONTITLE$#!»."
  hint_no_allies_hint_text_3: "#T Додаткові підказки:#!\n@hint! Будьте пильні: союзники можуть втягувати нас у власні війни. Не укладайте союзів із надто вразливими державами, інакше ми ризикуємо опинитися в чужій війні на боці тих, хто програв.\n@hint! [Concept('call_to_arms','Заклик до зброї')|e] завжди можна відхилити, але це зруйнує дружбу і залишиться плямою на нашій дипломатичній репутації."
  hint_no_allies_diplomatic: "«У цьому світі неможливо вижити самотужки»."
  hint_no_allies_administrative: "«Навіть якщо ми не плануємо нападати самі, союз із сусідом переконає наших ворогів не нападати на нас»."
  hint_no_allies_military: "«Сильний союзник може прикрити нам тил, коли ми підемо в наступ»."
  hint_black_death: "Чорна смерть"
  hint_black_death_hint_text: "$hint_black_death_hint_text_1$\n\n$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_black_death_hint_text_1: "Чорною смертю називається [Concept('situation','ситуація')|e], здатна обернутися жахливою бідою для Старого Світу. Її причиною є поширення торгівлі та цивілізації. Вона спустошує густонаселені [Concept('locations','райони')|e] і сходить нанівець, тільки коли ті, хто вижив, набудуть [Concept('disease_resistance','стійкості до епідемій')|e].\n\nЕпідемія губить людей з усіх [Concept('pop_type','суспільних класів')|e], залишаючи наші [Concept('buildings','споруди')|e] без робочої сили, доки не відбудеться [Concept('promote','підвищення')|e] нових #TOOLTIP:POPTYPE,peasants,X #L селян#!#!. В результаті наша [Concept('tax_base','податкова база')|e] та обсяги випуску товарів у [Concept('buildings','спорудах')] різко зменшаться, а вирішальним фактором для відновлення [Concept('employment','зайнятості')|e] стане модифікатор #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!#!."
  hint_black_death_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Побудуйте #TOOLTIP:BUILDING_TYPE,hospital,X #L лікарні#!#! у найбільших [Concept('urban_locations', 'міських районах')|e] перш, ніж епідемія прийде в [Concept('country','державу')|e].\n@arrow_bonus_tier_2! Клацніть по банеру [Concept('situation','ситуації')], щоб дізнатися про доступні особливі дії. Можливо, вони допоможуть запобігти катастрофі?\n@arrow_bonus_tier_2! Підтримуйте високий рівень [Concept('stability','стабільності')|e]. Це важливо не тільки для запобігання [Concept('rebellions','заколотам')|e], а й для модифікатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!#!.\n@arrow_bonus_tier_1! Не будуйте нові споруди в знелюднілих [Concept('locations','районах')]: там не буде кому працювати.\n@arrow_bonus_tier_1! Слідкуйте за модифікатором #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Швидкість підвищення населення»#!#!#!: більшості наших [Concept('buildings','споруд')] та місць [Concept('rgo','видобутку ресурсів')|e] потрібне [Concept('promote','підвищення')|e] #TOOLTIP:POPTYPE,peasants,X #L селян#!#! до більш розвинених [Concept('pop_types','суспільних класів')]."
  hint_black_death_hint_text_3: "#T Додаткові поради#!\n@hint! Цей процес може зайняти роки, але за достатньої кількості селян втрати робочої сили в [Concept('locations','районах')] з часом відшкодуються за рахунок [Concept('promote','підвищення')|e] класу населення.\n@hint! Досвід подолання цієї катастрофи стане вам у пригоді й при інших лихах: [Concept('starvation','голод')|e], [Concept('diseases','епідемії')|e] та [Concept('loot','грабіж')|e] мають схожий вплив на наші землі."
  hint_black_death_diplomatic: "«Смерть скаче попереду. Біди та руйнування йдуть за нею»."
  hint_black_death_administrative: "«Бліда смерть стукає і в замки королів, і в хатини бідняків»."
  hint_black_death_military: "«З'явився четвертий Вершник. Тепер нас ніщо не врятує»."
  hint_fall_of_delhi: "[GetSituationByKey('fall_of_delhi').GetNameWithNoTooltip]"
  hint_fall_of_delhi_hint_text: "$hint_fall_of_delhi_hint_text_1$\n\n$hint_fall_of_delhi_hint_text_2$\n\n$hint_fall_of_delhi_hint_text_3$\n\n$hint_fall_of_delhi_hint_text_4$"
  hint_fall_of_delhi_hint_text_1: "#TOOLTIP:SITUATION,fall_of_delhi,X #L Падіння Делі#!#! — це [Concept('situation','ситуація')|e], яка може призвести до краху [GetCountry('DLH').Custom('CF_RP')|l]. Стерв'ятники та потенційні завойовники вже збираються вздовж ослаблених кордонів, доки [GetCountry('DLH').GetGovernment.GetRulerOrRegent.GetName|l] втрачає владу..."
  hint_fall_of_delhi_hint_text_2: "#T Рекомендовані дії для Делі:#!\n@arrow_bonus_tier_3! Під час гри за #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_VP')|L]#!#! варто використовувати безліч нових [Concept('actions','дій')|e], таких як [ShowGenericActionName('strengthen_neighbor_relations')|l] або [ShowGenericActionName('fall_of_delhi_appoint_governors')|l]. \n@arrow_bonus_tier_2! Під час [Concept('events','подій')|e], пов'язаних із цією [Concept('situation','ситуацією')|e], потрібно спробувати збільшити [Concept('share_of_power_gc', 'частку влади')|e] за рахунок наших супротивників, інакше наш народ чекає незавидна доля."
  hint_fall_of_delhi_hint_text_3: "#T Додаткові поради для Делі:#!\n@hint! Нашою явною перевагою над ворогами є потужна регулярна [Concept('army','армія')|e]. На відміну від [Concept('levies','ополчення')|e] наші солдати на платні поповнюють свої ряди і куди ефективніші в бою. Це основа нашої могутності, що дозволяє зберігати контроль над державою."
  hint_fall_of_delhi_hint_text_4: "#T Рекомендовані дії для противника:#!\n@arrow_bonus_tier_3! Найсильніша [Concept('country','держава')|e] Індії стане головним противником з початком [Concept('situation','ситуації')|e], але ми можемо зайняти це положення, якщо оголосимо війну і захопимо першість. Щоб досягти цієї мети, ми повинні або бути найсильнішою [Concept('country','державою')|e] Індії на момент початку [Concept('situation','ситуації')|e], або перемогти поточного лідера і захопити першість за допомогою [Concept('peace_treaty','мирного договору')|e] «[ShowPeaceTreatyTypeNameWithNoTooltip('peace_seize_opposition_leadership')]»."
  hint_fall_of_delhi_diplomatic: "«Вирішите ви захистити трон #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_RP')|L]#!#! чи станете суперником, важливо дотримуватися обережності у відносинах із сусідами. Дружба дозволить виграти час, а ворожнеча допоможе виправдати нові завоювання»."
  hint_fall_of_delhi_administrative: "«Землі, захоплені в розпал хаосу, — ненадійний приз. За можливості варто виділяти [Concept('subjects','ленників')|e] або підвищувати [Concept('control','контроль')|e], щоб нові території не вислизнули з наших рук так швидко, як були отримані»."
  hint_fall_of_delhi_military: "«Меч відіграє велику роль у цій боротьбі. Сильна [Concept('army','армія')|e] може врятувати Делі від краху або дозволити противникам здолати гіганта. Але навіть перемога несе в собі ризики! Не забувайте про заколоти та перенапруження»."
  hint_rise_of_the_ottomans: "Поради ситуації «[GetSituationByKey('rise_of_the_ottomans').GetNameWithNoTooltip]»"
  hint_rise_of_the_ottomans_hint_text: "$hint_rise_of_the_ottomans_hint_text_1$\n\n$hint_rise_of_the_ottomans_hint_text_2$"
  hint_rise_of_the_ottomans_hint_text_1: "Ця [Concept('situation','ситуація')|e] відзначає сходження #italic найсильнішого бейлика#!, якому судилося створити одну з найвеличніших імперій в історії. За допомогою унікальних [Concept('events','подій')|e] та [Concept('actions','дій')|e] ми повинні встановити свою владу над іншими бейликами, перетнути [ShowProvinceDefinitionName('marmara_sea_province')] та заволодіти багатствами #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!. Вічна слава чекає!"
  hint_rise_of_the_ottomans_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_2! Настав час нашого піднесення. Завдяки потужним [Concept('actions','діям')|e], таким як #TOOLTIP:GENERIC_ACTION,press_claims,X #L нав'язування претензій#!#!, та вигідним [Concept('events','подіям')|e], що прискорюють [Concept('integration','інтеграцію')|e], наше піднесення увійде в історію.\n@arrow_bonus_tier_1! Якщо ми візьмемо під контроль #Y 120#! [Concept('locations','районів')|e] та захопимо плацдарм на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, ми зможемо використовувати [Concept('action','дію')|e] «[ShowGenericActionNameWithNoTooltip('press_claims')]» і в цьому [Concept('region','регіоні')|e]."
  hint_rise_of_the_ottomans_diplomatic: "«На ранньому етапі [Concept('situation','ситуації')|e] буде розумно використовувати доступні [Concept('actions','дії')|e], наприклад, #TOOLTIP:GENERIC_ACTION,seek_relations_with_the_byzantines,X #L пошук зв'язків із [GetCountry('BYZ').Custom('CL_TP')]#!#!. Скориставшись залишками їхнього престижу як останнього оплоту Риму, ми зміцнимо свою спадщину»."
  hint_rise_of_the_ottomans_administrative: "«Ми, безсумнівно, майстри завоювань, але не можна забувати про свої внутрішні землі та серце нашої держави. Не нехтуйте внутрішньою політикою в гонитві за славою на чужині!»"
  hint_rise_of_the_ottomans_military: "«Ми повинні прагнути до завоювання [Concept('towns_and_cities', 'міст')|e] наших ворогів. Ці кампанії стануть основою нашої влади на багато поколінь»."
  hint_council_of_trent: "[GetSituationByKey('council_of_trent').GetNameWithNoTooltip]"
  hint_council_of_trent_hint_text: "$hint_council_of_trent_hint_text_1$\n\n$hint_council_of_trent_hint_text_2$"
  hint_council_of_trent_hint_text_1: "Поки триває [ShowSituationName('council_of_trent')], #TOOLTIP:INTERNATIONAL_ORGANIZATION,catholic_church_tt,X #L католицька церква#!#! може змінити [Concept('laws','звід правил')|e] та внести нові [Concept('policies','політики')|e] до [Concept('international_organization','міжнародного об'єднання')|e]."
  hint_council_of_trent_hint_text_2: "#T Можливі взаємодії:#!\n@arrow_bonus_tier_3! Як [Concept('member','послідовник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,catholic_church_tt,X #L католицької церкви#!#!, ви можете запропонувати #TOOLTIP:RESOLUTION,policy_vote,X #L обговорення правил#!#! з наведеного нижче [Concept('laws','зводу правил')] або з панелі доктрин #TOOLTIP:INTERNATIONAL_ORGANIZATION,catholic_church_tt,X #L католицької церкви#!#!\n@arrow_bonus_tier_2! Як [Concept('member','послідовник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,catholic_church_tt,X #L католицької церкви#!#!, ви можете голосувати за запропоноване #TOOLTIP:RESOLUTION,policy_vote,X #L обговорення правил#!#!"
  hint_golden_age_of_piracy: "[GetSituationByKey('golden_age_of_piracy').GetNameWithNoTooltip]"
  hint_golden_age_of_piracy_hint_text: "$hint_golden_age_of_piracy_hint_text_1$\n\n$hint_golden_age_of_piracy_hint_text_2$\n\n$hint_golden_age_of_piracy_hint_text_3$\n\n$hint_golden_age_of_piracy_hint_text_4$"
  hint_golden_age_of_piracy_hint_text_1: "[GetSituationByKey('golden_age_of_piracy').GetName] — це [Concept('situation','ситуація')|e], яка може посприяти появі нових піратів. Вільні люди, невдоволені моряки та противники централізованої влади піднімають чорні вітрила та чинять беззаконня."
  hint_golden_age_of_piracy_hint_text_2: "#T Рекомендовані дії для боротьби з піратами:#!\n@arrow_bonus_tier_3! Подумайте про знищення будь-яких піратів біля наших берегів. Ми не можемо допустити, щоб вони борознили наші моря. \n@arrow_bonus_tier_2! Кожна [Concept('event','подія')|e], пов'язана з цією [Concept('situation','ситуацією')|e], може започаткувати нову піратську республіку."
  hint_golden_age_of_piracy_hint_text_3: "#T Додаткові поради:#!\n@hint! У нас буде можливість скористатися новими [Concept('actions','діями')|e] цієї [Concept('situation','ситуації')|e] незалежно від того, підняли ми чорний прапор чи ні."
  hint_golden_age_of_piracy_hint_text_4: "#T Рекомендовані дії для піратів:#!\n@arrow_bonus_tier_3! Буде мудро захистити узбережжя та побудувати могутній [Concept('navy','флот')|e]. За допомогою [Concept('actions','дій')|e], наприклад, «[ShowGenericActionName('attract_sailors')]» або «[ShowGenericActionName('migrate_to_new_waters')]», ми зможемо створити універсальний флот та підтримувати присутність."
  hint_golden_age_of_piracy_diplomatic: "«Усмішки та ром працюють краще, ніж погрози, принаймні, доки не заговорять гармати. Можливо, буде розумно підтримувати міцні стосунки з негідниками. Не всі скарби — це срібло та золото»."
  hint_golden_age_of_piracy_administrative: "«Управління нашими морськими володіннями — непроста справа в епоху піратства. Боремося ми з піратами чи змагаємося з ними, головне зберігати контроль!»"
  hint_golden_age_of_piracy_military: "«Пірати не визнають держав, адже вони продали свою. А оскільки при затриманні їх все одно повісять, вони без докорів сумління будуть палити та вбивати, якщо не виконати їхні вимоги»."
  hint_hundred_years_war: "[GetSituationByKey('hundred_years_war').GetNameWithNoTooltip]"
  hint_hundred_years_war_hint_text: "$hint_hundred_years_war_hint_text_1$\n\n$hint_hundred_years_war_hint_text_2$\n\n$hint_hundred_years_war_hint_text_3$\n\n$hint_hundred_years_war_hint_text_4$"
  hint_hundred_years_war_hint_text_1: "[GetSituationByKey('hundred_years_war').GetName] занурює #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західну Європу#!#! в неспокійну епоху! Цей період перевірить на міцність союзи, і на руїнах безперечно народяться нові держави."
  hint_hundred_years_war_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! І [GetCountry('FRA').GetName], і [GetCountry('ENG').GetName] можуть використовувати #TOOLTIP:GENERIC_ACTION,request_war_entry,X #L прохання про вступ у війну#!#!, #TOOLTIP:GENERIC_ACTION,hyw_sign_truce,X #L підписання перемир'я#!#! та #TOOLTIP:GENERIC_ACTION,request_papal_delegates,X #L запит [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатів#!#!. Це унікальні способи змінити статус-кво конфлікту або навіть схилити шальки терезів на бік однієї з держав."
  hint_hundred_years_war_hint_text_3: "#T Додаткові поради:#!\n@hint! Ми залучені в конфлікт, і нам може випасти нагода здобути землі або могутніх союзників."
  hint_hundred_years_war_hint_text_4: "#T Рекомендовані дії для [Concept('subject','ленника')|e] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_RP')|L]#!#!:#!\n@arrow_bonus_tier_3! Гарним рішенням буде #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L вимога автономії#!#!. Кожен #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанаж#!#! може вимагати певну автономію та отримати значну вигоду, скориставшись своєю роллю захисника [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої корони."
  hint_hundred_years_war_diplomatic: "«Дайте війні шанс!»"
  hint_hundred_years_war_administrative: "«Ми напевно втратимо [Concept('control','контроль')|e] над заморськими територіями. Враховуйте [Concept('proximity','близькість')|e] нещодавно завойованих районів до нашої [Concept('capital','столиці')|e]»."
  hint_hundred_years_war_military: "«Ведете війну з нашими ворогами на півдні за #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_VP')|L]#!#! або #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_VP')|L]#!#!? Можливо, варто використати [Concept('action','дію')|e] „[ShowGenericActionName('hyw_sign_truce')]“ щодо іншого могутнього сусіда»."
  hint_hussite_wars: "[GetSituationByKey('hussite_wars').GetNameWithNoTooltip]"
  hint_hussite_wars_hint_text: "$hint_hussite_wars_hint_text_1$\n\n$hint_hussite_wars_hint_text_2$\n\n$hint_hussite_wars_hint_text_3$\n\n$hint_hussite_wars_hint_text_4$"
  hint_hussite_wars_hint_text_1: "[GetSituationByKey('hussite_wars').GetName] ясно дають зрозуміти, що [GetReligionByKey('catholic').GetName|l] переживає глибокий внутрішній розкол. Своєю чергою, [GetReligionByKey('catholic').GetAdjectiveWithNoTooltip|l]і монархи побоюються, що якщо швидко не покінчити з цією єрессю, вона може охопити значні частини #TOOLTIP:CONTINENT,europe,X #L Європи#!#! та підірвати духовну владу, якою володіє [GetCountry('PAP').GetGovernment.GetRulerTitle]."
  hint_hussite_wars_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! [GetCountry('PAP').GetGovernment.GetRulerTitle] намагатиметься розпочати [Concept('war','війну')|e] проти #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_RP')|L]#!#!. Сусідні #TOOLTIP:RELIGIONGROUP,christian,X #L християнські#!#! держави можуть підтримати будь-яку зі сторін, що дозволяє їм вершити долю всього [Concept('continent','континенту')|e]."
  hint_hussite_wars_hint_text_3: "#T Додаткові поради:#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_DP')|L]#!#! доступно безліч унікальних [Concept('actions','дій')|e], зокрема «[ShowGenericActionName('convert_heretics_hw_action')]» та «[ShowGenericActionName('prepare_defenses_hw_action')]»."
  hint_hussite_wars_hint_text_4: "#T Рекомендовані дії для #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_RP')|L]#!#!:#!\n@arrow_bonus_tier_3! Гарні відносини з іншими #TOOLTIP:RELIGION,catholic,X #L католицькими#!#! державами можуть дозволити нам закликати їх у нашу боротьбу. Під час [Concept('situation','ситуації')|e] доступний унікальний [Concept('peace_treaty','мирний договір')|e] «[ShowPeaceTreatyTypeName('supress_hussite_faith')]». Він скорочує вартість [Concept('peace_treaty','мирного договору')|e] «#Y Примусове навернення#!»."
  hint_hussite_wars_diplomatic: "«Віра повинна мотивувати нас шукати союзників-однодумців і пережити цей непростий період»."
  hint_hussite_wars_administrative: "«Ми повинні постаратися зберегти [Concept('religious_unity','релігійну єдність')|e]»."
  hint_hussite_wars_military: "«Ймовірно, нам доведеться силою захищати свою віру»."
  hint_italian_wars: "[GetSituationByKey('italian_wars').GetNameWithNoTooltip]"
  hint_italian_wars_hint_text: "$hint_italian_wars_hint_text_1$\n\n$hint_italian_wars_hint_text_2$\n\n$hint_italian_wars_hint_text_3$\n\n$hint_italian_wars_hint_text_4$"
  hint_italian_wars_hint_text_1: "[GetSituationByKey('italian_wars').GetName] охоплюють #TOOLTIP:REGION,italy_region,X #L Італію#!#!. Сторонні [Concept('countries','держави')|e] прагнуть вторгнутися в регіон, а створення італійських ліг знаменує початок епохи роз'єднаності та опору для захисту регіону."
  hint_italian_wars_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Лідери кожної ліги можуть запрошувати інші [Concept('countries','держави')|e], щоб зміцнити свою владу над #TOOLTIP:REGION,italy_region,X #L Італією#!#!."
  hint_italian_wars_hint_text_3: "#T Додаткові поради:#!\n@hint! Суперники або вороги лідерів ліг можуть #TOOLTIP:GENERIC_ACTION,iw_send_aid,X #L відправити допомогу#!#! та змістити баланс під час важливої війни."
  hint_italian_wars_hint_text_4: "#T Рекомендовані дії для лідера #TOOLTIP:CULTUREGROUP,italian_group,X #L італійської#!#! ліги:#!\n@arrow_bonus_tier_3! Гарні відносини з іншими сусідами зміцнять наше [Concept('international_organization','міжнародне об'єднання')|e]."
  hint_italian_wars_diplomatic: "«#TOOLTIP:REGION,italy_region,X #L Італія#!#! повинна належати нам і нашим союзникам-однодумцям»."
  hint_italian_wars_administrative: "«Створення [Concept('subjects','ленників')|e] в #TOOLTIP:REGION,italy_region,X #L Італії#!#! зміцнить наш вплив у [Concept('region','регіоні')|e]»."
  hint_italian_wars_military: "«Ми повинні придушити опір — на кону багатство і влада»."
  hint_little_ice_age: "[GetSituationByKey('little_ice_age').GetNameWithNoTooltip]"
  hint_little_ice_age_hint_text: "$hint_little_ice_age_hint_text_1$\n\n$hint_little_ice_age_hint_text_2$\n\n$hint_little_ice_age_hint_text_3$"
  hint_little_ice_age_hint_text_1: "Починається [GetSituationByKey('little_ice_age').GetName]! Землі скував холод. Ми повинні зробити все можливе, щоб захистити врожай і тварин та забезпечити виживання нашого народу!"
  hint_little_ice_age_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Подумайте про розширення [Concept('buildings','споруд')|e], які виробляють [Concept('food','їжу')|e] або сприяють її виробництву."
  hint_little_ice_age_hint_text_3: "#T Додаткові поради:#!\n@hint! Ми можемо використовувати безліч унікальних [Concept('actions','дій')|e], щоб наростити виробництво [Concept('food','їжі')|e] або розподілити її серед наших [Concept('provinces','провінцій')|e]»."
  hint_little_ice_age_diplomatic: "«Зима близько»."
  hint_little_ice_age_administrative: "«Виробництво та розподіл [Concept('food','їжі')|e] врятують наші [Concept('pops','групи населення')|e] від передчасної зустрічі зі жнецем»."
  hint_little_ice_age_military: "«Замерзлі водойми стануть прохідними на якийсь час, але [Concept('armies','армії')|e], замкнені в зимових горах, можуть застрягти в них надовго»."
  hint_the_revolution: "[GetSituationByKey('the_revolution').GetNameWithNoTooltip]"
  hint_the_revolution_hint_text: "$hint_the_revolution_hint_text_1$\n\n$hint_the_revolution_hint_text_2$\n\n$hint_the_revolution_hint_text_3$"
  hint_the_revolution_hint_text_1: "Спалахнула [GetSituationByKey('the_revolution').GetName]! Монархії здригнулися, а ідеї свободи, рівності та братерства ширяться, мов лісова пожежа. Чи приймемо ми полум'я змін, чи станемо на захист старого порядку?"
  hint_the_revolution_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ми можемо стати [Concept('revolutionary','революційною державою')|e], прийнявши сторону [Concept('revolutionary','революційних')|e] заколотників під час [Concept('disaster','лиха')|e] «[ShowDisasterName('revolution_disaster')]».\n@arrow_bonus_tier_2! [Concept('situation','Ситуація')|e] відкриває #Y 2#! унікальних [Concept('peace_treaties','мирних договорів')|e]: «[ShowPeaceTreatyTypeName('reinstate_the_monarchy')]» та «[ShowPeaceTreatyTypeName('force_revolution')]».\n@arrow_bonus_tier_1! [Concept('situation','Ситуація')|e] відкриває доступ до нових [Concept('actions','дій')|e], таких як #TOOLTIP:GENERIC_ACTION,suppress_foreign_revolutionaries,X #L боротьба із закордонними революціонерами#!#! та #TOOLTIP:GENERIC_ACTION,assist_foreign_revolutionaries,X #L допомога закордонним революціонерам#!#!."
  hint_the_revolution_hint_text_3: "#T Додаткові поради#!\n@hint! Найсильніша революційна держава зможе взяти на себе роль [Concept('revolutionary_target','цілі-революціонера')|e], якщо набере найбільший [Concept('great_power_score','рахунок великої держави')|e]."
  hint_the_revolution_diplomatic: "«Політична картина вельми цікава: схоже, багато монархів остаточно втратили голову в спробах придушити революції»."
  hint_the_revolution_administrative: "«Розумно буде обрати сторону — і якнайшвидше. Від уміння швидко приймати рішення залежить сама доля нашої держави. Ми повинні бути готові зустріти революцію, коли та постукає нам у двері»."
  hint_the_revolution_military: "«Наш вплив повинен простягатися за межі держави, і неважливо, підтримуємо ми революціонерів чи збираємося їх розтрощити»."
  hint_western_schism: "[GetSituationByKey('western_schism').GetNameWithNoTooltip]"
  hint_western_schism_hint_text: "$hint_western_schism_text_1$\n\n$hint_western_schism_text_2$\n\n$hint_western_schism_text_3$\n\n$hint_western_schism_text_4$"
  hint_western_schism_text_1: "У [Concept('situation','ситуації')|e] «[ShowSituationNameWithNoTooltip('western_schism')]» неможливі взаємодії з курією, оскільки істинними папами #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,catholic_church,X #L католицької церкви#!#! ([Concept('international_organization', '@international_organization! міжнародне об'єднання')|e]) себе оголосили одразу два кандидати.\n\nЩоб вплинути на результат [Concept('situation', 'ситуації')], можна зробити наступне (залежно від вашої ролі в церкві):"
  hint_western_schism_text_2: "#T [Concept('countries', 'Держави')], де є [Concept('cardinal', '@cardinal! кардинал')|E]:#!\n@arrow_bonus_tier_3! Проголосуйте за одного з кандидатів."
  hint_western_schism_text_3: "#T [Concept('countries', 'Держави')], де немає [Concept('cardinal', '@cardinal! кардинала')|E]:#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$schism_show_support_for_one_pope$»#!, щоб допомогти обраному кандидату наблизитися до своєї мети.\n@arrow_bonus_tier_2! Скористайтеся релігійною [Concept('action', 'дією')] «$request_cardinal_seat$», щоб отримати [Concept('cardinal', 'кардинала')].\n@arrow_bonus_tier_1! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$schism_demand_support_from_one_pope$»#!, щоб отримати вигоду з [Concept('situation', 'ситуації')]."
  hint_western_schism_text_4: "У ході [Concept('situation', 'ситуації')] по католицькому світу буде поширюватися єресь.\n\n#T Рекомендації#!\n@arrow_bonus_tier_3! Спробуйте застосувати [Concept('situation','ситуативну')|e] [Concept('action', 'дію')] #V «$schism_show_unity_of_faith$»#!, щоб ваша [Concept('religious_unity','релігійна єдність')|e] не слабшала"
  hint_reformation: "[GetSituationByKey('reformation').GetNameWithNoTooltip]"
  hint_reformation_hint_text: "$hint_reformation_hint_text_1$\n\n$hint_reformation_hint_text_2$\n\n$hint_reformation_hint_text_3$"
  hint_reformation_hint_text_1: "У [Concept('situation','ситуації')|e] «[ShowSituationNameWithNoTooltip('reformation')]» #TOOLTIP:BUILDING_TYPE,lutheran_preachers,X #L будівлі лютеранських проповідників#!#! та #TOOLTIP:BUILDING_TYPE,calvinist_preachers,X #L будівлі кальвіністських проповідників#!#! будуть поширювати нові [Concept('religions','релігії')|e] по всьому #TOOLTIP:RELIGIONGROUP,christian,X #L християнському#!#! світу."
  hint_reformation_hint_text_2: "#T Боротьба з реформаторами#!\n@arrow_bonus_tier_3! Приберіть [Concept('buildings','споруди')|e] «[ShowBuildingTypeName('lutheran_preachers')]» та «[ShowBuildingTypeName('calvinist_preachers')]» (це знизить [Concept('stability','стабільність')|e])\n@arrow_bonus_tier_3! Як тільки це стане можливим, побудуйте #TOOLTIP:BUILDING_TYPE,jesuit_college,X #L єзуїтський коледж#!#! та підтримуйте його діяльність по боротьбі з поширенням #TOOLTIP:RELIGION,lutheran,X #L лютеранства#!#! та #TOOLTIP:RELIGION,calvinist,X #L кальвінізму#!#!"
  hint_reformation_hint_text_3: "#T Підтримка реформаторів#!\n@arrow_bonus_tier_3! Щойно у вашій державі пошириться одне з нових віровчень, прийміть його та зверніться в нову віру за допомогою дії #V «$embrace_the_reformation$»#!\n@arrow_bonus_tier_2! Відкрийте @religion_panel![Link('country_religion', '', '@society_panel! вкладку «Релігія»')], щоб звернутися в нову [Concept('religion', 'релігію')]"
  hint_treaty_of_tordesillas: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
  hint_treaty_of_tordesillas_hint_text: "$hint_treaty_of_tordesillas_hint_text_1$\n\n$hint_treaty_of_tordesillas_hint_text_2$"
  hint_treaty_of_tordesillas_hint_text_1: "Звершується [GetSituationByKey('treaty_of_tordesillas').GetName]! [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetName] збираються поділити між собою Новий Світ!"
  hint_treaty_of_tordesillas_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Надати конкретики нашим колоніальним прагненням можна за допомогою унікальних [Concept('actions','дій')|e] на панелі [Concept('situation','ситуації')|e].\n@arrow_bonus_tier_2! Через деякий час після ратифікації договору розпочнеться #Y друга#! фаза [Concept('situation','ситуації')|e]. Після цього взяти участь та заявити свої претензії зможуть й інші [Concept('countries','держави')|e]."
  hint_treaty_of_tordesillas_diplomatic: "«Нам випала славна нагода під приводом релігійного — і простого — авторитету заволодіти частиною нещодавно відкритих земель»."
  hint_treaty_of_tordesillas_administrative: "«Ділові можливості в Новому Світі вражають уяву. Їх ніяк не можна упускати»."
  hint_treaty_of_tordesillas_military: "«Не можна допустити, щоб ворог дістався до цих земель швидше за нас!»"
  hint_great_pestilence: "[GetSituationByKey('great_pestilence').GetNameWithNoTooltip]"
  hint_great_pestilence_hint_text: "$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
  hint_great_pestilence_diplomatic: "«Союзники нас покинули, а влада — зрадила. Залишити пости! Рятуйтесь хто може!»"
  hint_great_pestilence_administrative: "«Не варто впадати у відчай! Зі смертністю можна боротися багатьма способами, нехай навіть вони майже марні…»"
  hint_great_pestilence_military: "«Краще, щоб наші [Concept('armies','армії')|e] уникали тих [Concept('locations','районів')|e], де вирує епідемія. Кожен солдат зараз на вагу золота»."
  hint_columbian_exchange: "[GetSituationByKey('columbian_exchange').GetNameWithNoTooltip]"
  hint_columbian_exchange_hint_text: "$hint_columbian_exchange_hint_text_1$\n\n$hint_columbian_exchange_hint_text_2$"
  hint_columbian_exchange_hint_text_1: "Звершується [GetSituationByKey('columbian_exchange').GetName]! [Concept('trade','Торгівля')|e] пожвавиться: між Старим та Новим Світом хлине бурхливий [Concept('goods','товарний')|e] потік!"
  hint_columbian_exchange_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Отримати ще більше вигоди, наповнивши [Concept('market','ринок')|e] новими товарами, можна за допомогою унікальних [Concept('actions','дій')|e] на панелі [Concept('situation','ситуації')|e]."
  hint_columbian_exchange_diplomatic: "Торговий прибуток править світом…"
  hint_columbian_exchange_administrative: "$hint_treaty_of_tordesillas_administrative$"
  hint_columbian_exchange_military: "«Потрібно випередити конкурентів і першими заволодіти джерелами вигоди та новими товарами!»"
  hint_war_of_religions: "[GetSituationByKey('war_of_religions').GetNameWithNoTooltip]"
  hint_war_of_religions_hint_text: "$hint_war_of_religions_hint_text_1$\n\n$hint_war_of_religions_hint_text_2$\n\n$hint_war_of_religions_hint_text_3$\n\n$hint_war_of_religions_hint_text_4$"
  hint_war_of_religions_hint_text_1: "У [Concept('situation','ситуації')|e] «[ShowSituationNameWithNoTooltip('war_of_religions')]» два [Concept('international_organizations', '@international_organizations! міжнародні об'єднання')|e] боротимуться за існування своєї [Concept('religions','релігії')|e] на території #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#!. [GetUniqueInternationalOrganization('protestant_union').GetName] та [GetUniqueInternationalOrganization('catholic_league').GetName] пропонуватимуть державам, що входять до імперії, свою [Concept('countries','захист')|e]. У міру наростання напруги обидва об'єднання зможуть спробувати зробити свою релігію панівною та змінити [Concept('laws','звід правил')|e] імперії згідно зі своїми уподобаннями."
  hint_war_of_religions_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Вступіть до [Concept('international_organization', 'міжнародного об'єднання')], яке хочете підтримати\n@arrow_bonus_tier_2! Постарайтеся укласти нові [Concept('alliances','союзи')|e] зі сторонніми державами"
  hint_war_of_religions_hint_text_3: "#T Якщо ви очолюєте будь-яку релігійну лігу#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$prepare_military_escalation$»#!, щоб отримати привід для війни #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Релігійна перевага»#!#!.\n@hint! Після цього ви зможете нав'язати іншим #TOOLTIP:SCRIPTED_PEACE_TREATY,religious_supremacy,X #L релігійну перевагу#!#!, а разом з нею — і вимоги своєї фракції.\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')|e] #V «$demand_member_removal$»#!, щоб виключити небезпечні держави з другого [Concept('international_organization', 'об'єднання')], доки не розпочалася [Concept('war', 'війна')]."
  hint_war_of_religions_hint_text_4: "#T Додаткові поради#!\n@hint!Під час [Concept('war', 'війни')] за встановлення #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L релігійної переваги#!#! у [Concept('countries', 'держав')] буде накопичуватися [Concept('war_exhaustion', 'втома від війни')]\n@hint! Якщо #Y 80%#! всіх учасників захочуть [Concept('peace','миру')|e], буде підписаний #Y Вестфальський мир#!\n@hint! Після цього [Concept('war', 'війна')] закінчиться, а у Священній Римській Імперії настане релігійний мир"
  hint_guelphs_and_ghibellines: "[GetSituationByKey('guelphs_and_ghibellines').GetNameWithNoTooltip]"
  hint_guelphs_and_ghibellines_hint_text: "$hint_guelphs_and_ghibellines_hint_text_1$\n\n$hint_guelphs_and_ghibellines_hint_text_2$"
  hint_guelphs_and_ghibellines_hint_text_1: "У [Concept('situation','ситуації')|e] «[ShowSituationNameWithNoTooltip('guelphs_and_ghibellines')]» [Concept('international_organizations', '@international_organizations! міжнародні об'єднання')|e] «[GetUniqueInternationalOrganization('guelphs_io').GetName]» та «[GetUniqueInternationalOrganization('ghibellines_io').GetName]» змагаються між собою за вплив на #TOOLTIP:REGION,italy_region,X #L Італійський#!#! [Concept('region','регіон')|e]. Підтримкою перших користується [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle|l] [GetUniqueInternationalOrganization('guelph_io').GetName], підтримкою других — [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] [GetUniqueInternationalOrganization('ghibellines_io').GetName]."
  hint_guelphs_and_ghibellines_hint_text_2: "#T Якщо ви належите до однієї зі сторін#!\n@arrow_bonus_tier_3! Примусьте яку-небудь [Concept('country', 'державу')|e] вступити до складу вашої фракції за допомогою [Concept('casus_belli', '@casus_belli! приводу для війни')|E] #TOOLTIP:CASUS_BELLI,cb_gag_force_country_into_faction,X #L «Примусове включення до фракції»#!#!.\n@arrow_bonus_tier_2! Зберігайте [Concept('tax_base', 'податкову базу')|e] учасників вашої фракції за допомогою дипломатії, наприклад [Concept('alliances', '@alliances! союзів')|E] або [Concept('guarantee', '@guarantee! гарантій')|E].\n@arrow_bonus_tier_2! Збільшуйте [Concept('tax_base', '@tax_base! податкову базу')|E] своєї [Concept('country', 'держави')]."
  hint_colonial_revolution: "[GetSituationByKey('colonial_revolution').GetNameWithNoTooltip]"
  hint_colonial_revolution_hint_text: "$hint_colonial_revolution_hint_text_1$\n\n$hint_colonial_revolution_text_2$\n\n$hint_colonial_revolution_text_3$"
  hint_colonial_revolution_hint_text_1: "У [Concept('situation','ситуації')|e] «[ShowSituationNameWithNoTooltip('colonial_revolution')]» колоніальні [Concept('subjects','ленники')|e] борються за незалежність від своїх [Concept('overlords','сюзеренів')|e]."
  hint_colonial_revolution_text_2: "#T Якщо ви граєте за колоніальну державу#!\n@arrow_bonus_tier_3! Створіть [Concept('international_organization','міжнародне об'єднання')|e] — колоніальну федерацію\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action','дією')|e] #V «$seek_alliance_with_overlord_rival$»#!, щоб заручитися допомогою інших [Concept('countries','держав')|e]\n@arrow_bonus_tier_1! Якщо у світі вже існує колоніальна федерація, вступіть до неї"
  hint_colonial_revolution_text_3: "#T Якщо ви граєте за [Concept('overlord', 'сюзерена')]#!\n@arrow_bonus_tier_3! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$establish_goods_act$»#!, щоб отримати додаткові кошти\n@arrow_bonus_tier_2! Скористайтеся [Concept('situation', 'ситуативною')] [Concept('action', 'дією')] #V «$give_colony_representation$»#!, якщо яка-небудь колонія стане нелояльною"
  hint_red_turban_rebellions: "[GetSituationByKey('red_turban_rebellions').GetNameWithNoTooltip]"
  hint_red_turban_rebellions_hint_text: "$hint_red_turban_rebellions_hint_text_1$\n\n$hint_red_turban_rebellions_hint_text_2$\n\n$hint_red_turban_rebellions_hint_text_3$"
  hint_red_turban_rebellions_hint_text_1: "[GetSituationByKey('red_turban_rebellions').GetName] охопило весь Китай! Небеса більше не благоволять #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#!, у [GetCountry('CHI').Custom('rank_ru_PREP')|l] запанувала нестабільність!"
  hint_red_turban_rebellions_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#! необхідно #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_rein_in_rebellion,X #L приборкати повстання#!#! силою та придушити тих, хто прагне вирватися з-під влади держави.\n@arrow_bonus_tier_2! #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоні пов'язки»#!#! можуть вимагати від [GetCountry('CHI').Custom('CL_GEN')] #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_demand_occupied_territories,X #L передати окуповані території#!#!.\n@arrow_bonus_tier_1! [GetCountry('CHI').GetLongName] зіткнеться з безліччю унікальних [Concept('events', 'подій')|e], а на землі держави покладуть око амбітні завойовники."
  hint_red_turban_rebellions_hint_text_3: "#T Додаткові поради:#!\n@hint! Ми можемо використовувати безліч унікальних [Concept('actions','дій')|e] на панелі [Concept('situation', 'ситуації')|e], щоб [Concept('integrate', 'інтегрувати')|e] завойовані землі та зберігати високий [Concept('control', 'контроль')|e]."
  hint_red_turban_rebellions_diplomatic: "«Нескінченна війна майже не залишає часу для балачок та дипломатії...»"
  hint_red_turban_rebellions_administrative: "«У подібній ситуації потрібно мудро використовувати доступні дії. Вони стануть цінними інструментами, що принесуть нам перемогу»."
  hint_red_turban_rebellions_military: "«Тепер весь Китай знає про те, що ми тут!»"
  hint_rise_of_timur: "[GetSituationByKey('rise_of_timur').GetNameWithNoTooltip]"
  hint_rise_of_timur_hint_text: "$hint_rise_of_timur_hint_text_1$\n\n$hint_rise_of_timur_hint_text_2$\n\n$hint_rise_of_timur_hint_text_3$"
  hint_rise_of_timur_hint_text_1: "З глибини #TOOLTIP:SUB_CONTINENT,central_asia,X #L Центральної Азії#!#! виходить блідий образ смерті — [GetCharacter('chg_timur_lame_borjigin').GetName] та [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').GetFlavorRank|l]. Горе всякому, хто стане на шляху [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] завоювань!"
  hint_rise_of_timur_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Поки живий [GetCharacter('chg_timur_lame_borjigin').GetName], на [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').Custom('rank_ru_ACC')|l] буде діяти [Concept('modifier', 'модифікатор')|e] «#TOOLTIP:STATIC_MODIFIER,timmy_wants_to_play,X #V #L Загибель із Центральної Азії#!#!#!».\n@arrow_bonus_tier_2! Завдяки цьому [Concept('modifier', 'модифікатору')|e] [GetCharacter('chg_timur_lame_borjigin').GetShortNameWithNoTooltip] зможе автоматично приєднувати обложені [Concept('locations','райони')|e].\n@arrow_bonus_tier_1! [GetCountry('TIM').GetLongName] отримує доступ до унікального [Concept('casus_belli', 'приводу для війни')|e]."
  hint_rise_of_timur_hint_text_3: "#T Додаткові поради:#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! доступно безліч унікальних [Concept('actions','дій')|e] на панелі [Concept('situation', 'ситуації')|e]."
  hint_rise_of_timur_diplomatic: "«Можливо, з ордою вийде домовитися?»"
  hint_rise_of_timur_administrative: "«Варто подумати про зведення укріплень для захисту наших кордонів»."
  hint_rise_of_timur_military: "«#ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! доводиться покладатися на могутню армію пекельних вершників, традиції завойовників і ненаситний голод, що спонукає розверзнути пащу і проковтнути всю #TOOLTIP:CONTINENT,asia,X #L Азію#!#!!»"
  hint_nanbokuchou: "[GetSituationByKey('nanbokuchou').GetNameWithNoTooltip]"
  hint_nanbokuchou_hint_text: "$hint_nanbokuchou_hint_text_1$\n\n$hint_nanbokuchou_hint_text_2$\n\n$hint_nanbokuchou_hint_text_3$"
  hint_nanbokuchou_hint_text_1: "[GetSituationByKey('nanbokuchou').GetName] — це [Concept('situation', 'ситуація')|e], що розділила #TOOLTIP:REGION,japan_region,X #L Японію#!#! між суперницькими північним і південним імператорськими дворами, які прагнуть довести свою легітимність. Цей конфлікт перетворить усю острівну державу, і кожен клан має обрати сторону."
  hint_nanbokuchou_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Використайте унікальний [Concept('casus_belli', 'привід для війни')|e] «[ShowCasusBelliName('cb_nanbokuchou')]», щоб вести війну на підтримку претендента.\n@arrow_bonus_tier_2! [ShowPeaceTreatyTypeName('peace_expand_clan_influence')] допоможе вам розширювати вплив свого клану та захоплювати ворожі [Concept('locations','райони')|e].\n@arrow_bonus_tier_1! У разі перемоги [ShowPeaceTreatyTypeNameWithNoTooltip('peace_nanbokuchou_force_imperial_abdication')] змусить суперницький двір зректися престолу та забезпечить верховенство підтриманого вами імператора."
  hint_nanbokuchou_hint_text_3: "#T Додаткові поради:#!\n@hint! Важливо ретельно обирати час. Невеликі клани можуть скористатися конфліктом, щоб отримати перевагу над суперниками.\n@hint! Враховуйте рівновагу сил, перш ніж обирати сторону."
  hint_nanbokuchou_diplomatic: "«Це не просто привід подзвеніти мечами. Вибір претендента визначить нашу спадщину»."
  hint_nanbokuchou_administrative: "«Непросто підтримувати порядок, обираючи сторону одного з дворів, але це може дати нам вплив на імперський інститут»."
  hint_nanbokuchou_military: "«Атакуйте рішуче і досягніть легітимності до того, як суперники встигнуть зміцнити свою владу»."
  hint_sengoku: "[GetSituationByKey('sengoku').GetNameWithNoTooltip]"
  hint_sengoku_hint_text: "$hint_sengoku_hint_text_1$\n\n$hint_sengoku_hint_text_2$\n\n$hint_sengoku_hint_text_3$"
  hint_sengoku_hint_text_1: "[GetSituationByKey('sengoku').GetName] — це [Concept('situation', 'ситуація')|e], що занурює #TOOLTIP:REGION,japan_region,X #L Японію#!#! у стан майже нескінченної війни. Клани б’ються за верховенство, поки $JAPANESE_SHOGUNATE_LEADER_MALE$ відчайдушно намагається утримати контроль над державою."
  hint_sengoku_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Ведіть війну, використовуючи унікальний [Concept('casus_belli', 'привід для війни')|e] «[ShowCasusBelliName('cb_sengoku')]», щоб розширити свій клан.\n@arrow_bonus_tier_2! У ролі сьогуна використовуйте #TOOLTIP:GENERIC_ACTION,sengoku_revoke_clans_land,X #L відбирання земель#!#!, щоб послабити розрослі клани, та #TOOLTIP:GENERIC_ACTION,sengoku_limit_clans_autonomy,X #L обмеження автономії кланів#!#!, щоб перетворити їх на [Concept('building_based', 'екстериторіальні держави')|e].\n@arrow_bonus_tier_1! Якщо ви [Concept('building_based', 'екстериторіальна держава')|e], ви можете оголосити про незалежність і стати [Concept('location_based','сухопутною')|e] [Concept('country', 'державою')|e], використавши #TOOLTIP:GENERIC_ACTION,sengoku_proclaim_clan_independence,X #L проголошення незалежності клану#!#!."
  hint_sengoku_hint_text_3: "#T Додаткові поради:#!\n@hint! Рівновага сил постійно змінюється. Не втрачайте нагоди атакувати ослаблені клани.\n@hint! Якщо ви сьогун, рання консолідація влади значно полегшить об’єднання #TOOLTIP:REGION,japan_region,X #L Японії#!#!.\n@hint! Невеликі клани можуть стравлювати між собою більші клани, щоб улучити момент і здобути свободу."
  hint_sengoku_diplomatic: "«Союзи будуть непостійними. Ретельно обирайте друзів, адже вже завтра вони можуть стати ворогами»."
  hint_sengoku_administrative: "«Потрібна міцна влада, щоб не дати державі скотитися в хаос»."
  hint_sengoku_military: "«Настала епоха меча. Атакуйте швидко і бийте сильно, інакше вас зжеруть інші»."
  swift_end_string: "Будь-яке лихо, зокрема й це, завжди краще закінчити якомога швидше. Невирішені проблеми можуть спричинити неприємності."
  disaster_war_hint: "Слід пам’ятати, що не всі наші сусіди в ці скрутні часи прагнуть укласти перемир’я чи союз: деякі намагатимуться розширити свої території за наш рахунок."
  hint_coup_attempt: "Поради: $coup_attempt$"
  hint_coup_attempt_hint_text: "$hint_coup_attempt_hint_text_1$\n\n$hint_coup_attempt_hint_text_2$\n\n$hint_coup_attempt_hint_text_3$"
  hint_coup_attempt_hint_text_1: "Наш [Concept('court','двір')|e] обплутаний безліччю інтриг. Люди, що прагнуть недосяжної влади, готові заради цього піти на злочин, аби лише посадити на престол своїх маріонеток, диктувати нам [Concept('laws','правила')|e] та забезпечити собі [Concept('privileges','привілеї')|e]. Це [Concept('disaster','лихо')|e] триватиме, доки змовники не зникнуть, їхній лідер не займе престол або ми не наберемо достатньо [Concept('legitimacy','легітимності')|e]. $swift_end_string$"
  hint_coup_attempt_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Ми можемо #TOOLTIP:GENERIC_ACTION,conduct_investigation,X #L провести розслідування#!#!. Воно займе деякий час, зате допоможе виявити частину змовників і спростить зачистку їхніх лав.\n@arrow_bonus_tier_2! [Concept('stability','Стабільність')|e] слід тримати на високому рівні. Чим вона вища, тим нижчим буде поріг необхідної для завершення цього [Concept('disaster','лиха')|e] [Concept('legitimacy','легітимності')|e].\n@arrow_bonus_tier_1! Якщо обстановка стане зовсім відчайдушною, ми можемо #TOOLTIP:GENERIC_ACTION,call_private_council,X #L скликати таємну раду#!#! або #TOOLTIP:GENERIC_ACTION,execute_court_member,X #L стратити придворного#!#!. Перша дія допоможе нам виявити змовників в обмін на [Concept('privileges','привілеї')|e] або [Concept('gold', 'дукати')|e] для [Concept('estates','станів')|e]. Друга дія дозволить нам стратити будь-якого [Concept('court', 'придворного')|e] [Concept('character','персонажа')|e], якого ми підозрюємо в участі у змові."
  hint_coup_attempt_hint_text_3: "#T Додаткові поради#!\n@hint! У ході цього [Concept('disaster','лиха')|e] можуть відбуватися випадкові [Concept('events','події')|e], що вказують на можливих змовників. Кожну таку подію слід уважно вивчати, щоб прийняти виважене рішення. Буде неприємно, якщо найкращий [Concept('cabinet_member','член нашої ради')|e] без вагомої причини позбудеться голови."
  hint_coup_attempt_diplomatic: "«Зараз саме час запевнити сусідні [Concept('countries','держави')|e], що ми їм не вороги, а заодно — забезпечити надійний захист кордонів. Нам абсолютно не потрібні загрози ще й ззовні»."
  hint_coup_attempt_administrative: "«Хтось із решти радників — напевно змовник. Так одразу не вгадати!»"
  hint_coup_attempt_military: "«$disaster_war_hint$ Тому пам'ятайте: випереджувальний удар — це такий #italic несподіваний мирний договір#!, принесений на списах»."
  hint_crisis_of_the_chinese_dynasty: "$crisis_of_the_chinese_dynasty$: поради"
  hint_crisis_of_the_chinese_dynasty_hint_text: "$hint_crisis_of_the_chinese_dynasty_hint_text_1$\n\n$hint_crisis_of_the_chinese_dynasty_hint_text_2$"
  hint_crisis_of_the_chinese_dynasty_hint_text_1: "Небеса, що колись дарували нашій землі процвітання, відвернулися від нас. На Китай обрушилися біди, голод і розруха. Для нашої влади починається похмура пора. Це [Concept('disaster','лихо')|e] триватиме, доки ми або не подолаємо його, реформувавши весь адміністративний апарат, або не позбудемося посади володаря #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної держави#!#!. $swift_end_string$"
  hint_crisis_of_the_chinese_dynasty_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Можна здійснити дію [Concept('cabinet','ради')|e] «[ShowCabinetActionName('reform_taxation_system')]». Вона займе деякий час, зате наблизить нас до того, щоб покласти [Concept('disaster','лиху')|e] край.\n@arrow_bonus_tier_2! [Concept('celestial_authority_gc','Небесний авторитет')|e] слід тримати на високому рівні. Якщо цей показник досягне значення в #G 90#! або більше одиниць, [Concept('disaster','лихо')|e] завершиться мирно.\n@arrow_bonus_tier_1! Під час [Concept('disaster','лиха')|e] нам доступно безліч нових [Concept('actions','дій')|e], таких як «[ShowGenericActionName('cmd_reform_the_cabinet')]», «[ShowGenericActionName('cmd_restore_stability')]» та «[ShowGenericActionName('cmd_strengthen_crown')]». Кожна з них — окрема можливість досягти сприятливого завершення смути у випадку неможливості підняти [Concept('celestial_authority_gc','небесний авторитет')|e] достатньо високо."
  hint_crisis_of_the_chinese_dynasty_diplomatic: "«Час знову утвердити наші добрі стосунки з [Concept('countries','державами')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної держави#!#!, щоб це славне об'єднання проіснувало тисячу років.\n\nАдже що відрізняє нас від звірів, як не вміння поважати інших?»"
  hint_crisis_of_the_chinese_dynasty_administrative: "«Якщо ми вирішимо перетворити адміністрацію, щоб покінчити з цим [Concept('disaster','лихом')|e], то призначити таке епохальне завдання краще буде здібним [Concept('cabinet_members','членам ради')|e].\n\nБез економії нас чекає агонія»."
  hint_crisis_of_the_chinese_dynasty_military: "«$disaster_war_hint$\n\nАле хаос відкриває нам нові можливості!»"
  hint_war: "Війна"
  hint_war_hint_text: "$hint_war_hint_text_1$\n\n$hint_war_hint_text_2$\n\n$hint_war_hint_text_3$"
  hint_war_hint_text_1: "[Concept('war','Війна')|e] починається, коли [Concept('country','держава')|e] оголошує її, а завершується [Concept('peace_treaty','мирним договором')|e] між учасниками. У будь-якій [Concept('war','війні')] є два [Concept('war_leaders','лідери')|e], яких можуть підтримувати [Concept('war_allies','військові союзники')|e]. Для закінчення [Concept('war','війни')] необхідно, щоб її [Concept('war_leaders','лідери')] підписали [Concept('peace_treaty','мирний договір')|e], однак другорядні учасники можуть укласти з [Concept('war_leader','лідером')] противника сепаратний [Concept('peace_treaty','мир')]."
  hint_war_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Перш ніж оголошувати [Concept('war','війну')], постарайтеся забезпечити для неї відповідний [Concept('casus_belli','@casus_belli! привід')|e]. Його можна запросити у [Concept('parliament','парламенту')|e], а якщо майбутній об'єкт нападу є [Concept('rivals','суперником')|e] держави, то й сфабрикувати.\n@arrow_bonus_tier_3! Розпочавши [Concept('war','війну')], приділяйте увагу її [Concept('casus_belli','приводу')] та [Concept('war_goal','цілі')|e], оскільки це важливо для отримання [Concept('war_score','@war_score! військового рахунку')|e] та підписання вигідного [Concept('peace_treaty','@peace_treaty! мирного договору')|e].\n@arrow_bonus_tier_3! Залежно від приводу для війни ми можемо заробляти [Concept('war_score','@war_score! військовий рахунок')|e] різними шляхами. Ось деякі з основних [Concept('war_score', 'його')] джерел:\n @arrow_bonus_tier_1! Окупація ворожої [Concept('capital','@capital! столиці')|e]\n @arrow_bonus_tier_1! Отримання контролю над певними [Concept('locations','@locations! районами')]\n @arrow_bonus_tier_1! Окупація ворожих [Concept('forts','@forts! фортець')|e]\n @arrow_bonus_tier_1! Перемога над ворожими [Concept('armies','арміями')|e] в [Concept('battle','битвах')]\n @arrow_bonus_tier_1! [Concept('blockade','Блокада')|e] ворожих [Concept('ports','портів')|e]\n@arrow_bonus_tier_3! Слідкуйте за рівнем [Concept('war_exhaustion','@war_exhaustion! втоми від війни')|e]: він може вкрай негативно позначитися як на економіці, так і на боєздатності."
  hint_war_hint_text_3: "#T Додаткові підказки:#!\n@hint! Під час [Concept('war','війни')] обидві сторони можуть [Concept('occupy','окупувати')|e] ворожі [Concept('locations','райони')|e], але остаточно їх приналежність змінюється тільки після підписання [Concept('peace_treaty','мирного договору')|e], що закріплює завоювання.\n@hint! Чим довше триває війна, тим охочіше її учасники приймають пропозицію про мир."
  hint_war_diplomatic: "«Війна може бути дуже вигідним підприємством, але це короткий шлях до катастрофи»."
  hint_war_administrative: "«Коли торгівля не може забезпечити нас усім необхідним, війна стає неминучою»."
  hint_war_military: "«Перевага над сусідами — єдина гарантія нашої безпеки»."
  hint_battle: "Битви"
  hint_battle_hint_text: "$hint_battle_hint_text_1$\n\n$hint_battle_hint_text_2$\n\n$hint_battle_hint_text_3$"
  hint_battle_hint_text_1: "Коли [Concept('army','армії')|e] протиборчих сторін опиняються в одному [Concept('location','районі')|e], між ними починається [Concept('battle','битва')|e]. [Concept('army','Армія')], що прийшла в [Concept('location','район')] першою, вважається [Concept('defender','оборонною')|e] і отримує переваги, що надаються місцевістю. Битва завершується після того, як одна зі сторін повністю втрачає [Concept('morale','бойовий дух')|e] або втрачає всі свої [Concept('regiments','полки')|e] залежно від того, що станеться раніше."
  hint_battle_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Армії, розташовані неподалік, можна використовувати як підкріплення. Якщо вони встигнуть прийти вчасно, ваші війська отримають свіжі резерви.\n@arrow_bonus_tier_2! Перш ніж посилати [Concept('armies','армію')|e] на [Concept('battle','битву')], переконайтеся, що у неї є хороший [Concept('commander', 'командир')|e].\n@arrow_bonus_tier_2! Приділяйте увагу ландшафту [Concept('location','району')]. Його рельєф і рослинність можуть ускладнювати дії [Concept('attacker','атакуючої сторони')|e]. Будьте обачні, обираючи поле майбутньої битви!\n@arrow_bonus_tier_1! Якщо противник має значну перевагу і загрожує розгромити вашу армію, рекомендуємо подумати про [Concept('retreat','відступ')|e]."
  hint_battle_hint_text_3: "#T Додаткові підказки:#!\n@hint! Програна битва не завжди веде до поразки у [Concept('war','війні')|e]. Зазнавши невдачі, ви можете [Concept('retreat','відступити')] в безпечне місце, відновити бойовий дух, завербувати найманців і зробити нову спробу в більш вигідних умовах. Все це доступно і вашому ворогу, тому не втрачайте пильності після перемоги.\n@hint! Якщо в [Concept('location','районі')] є [Concept('fort','фортеця')|e], контролююча її сторона є [Concept('defender','оборонною')] незалежно від того, хто прийшов першим."
  hint_battle_diplomatic: "«Зачекайте, поки ворог буде ослаблений голодом і виснаженням, а вже потім нападайте»."
  hint_battle_administrative: "«Швидка перемога на полі бою дозволить нам перейти в наступ, не віддаючи міста і села на поталу ворогам»."
  hint_battle_military: "«Хороший полководець здатен визначити результат битви»."
  hint_siege_and_occupation: "Окупація та облога"
  hint_siege_and_occupation_hint_text: "$hint_siege_and_occupation_hint_text_1$\n\n$hint_siege_and_occupation_hint_text_2$\n\n$hint_siege_and_occupation_hint_text_3$"
  hint_siege_and_occupation_hint_text_1: "Вторгнувшись у [Concept('enemy','ворожий')|e] [Concept('location','район')|e], наша [Concept('army','армія')|e] спробує його [Concept('occupy','окупувати')|e]. Якщо в [Concept('location','районі')] немає [Concept('fort','фортеці')|e], це займе лише кілька днів, а от якщо фортеця є, вам доведеться розпочати [Concept('siege','облогу')|e].\n\nОблоги можуть тривати місяцями і навіть роками. Це залежить від безлічі факторів, включно з рівнем укріплень, наявністю артилерії та [Concept('ability','навичками')|e] генерала, що облягає.\n\nУ разі капітуляції гарнізону [Concept('location','район')] стає [Concept('occupied','окупованим')], а [Concept('fort','фортеця')] переходить до переможця.\n\nОкуповані райони позначаються на карті значками решітки і не переходять до окупанта доти, доки їхнє завоювання не буде затверджено мирним договором."
  hint_siege_and_occupation_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Перш ніж розпочинати облогу, переконайтеся, що ваша [Concept('army','армія')|e] здатна її пережити.\n@arrow_bonus_tier_1! При наближенні небезпечного супротивника не бійтеся зняти облогу і відступити."
  hint_siege_and_occupation_hint_text_3: "#T Додаткові підказки:#!\n@hint! Слідкуйте за своєю армією під час облоги, навіть якщо поблизу немає ворожих військ."
  hint_siege_and_occupation_diplomatic: "«Тривала облога може виявитися згубною для місцевого населення»."
  hint_siege_and_occupation_administrative: "«Нам слід розміщувати фортеці так, щоб захистити головні міста від загарбників і мати можливість швидко звільнити їх у разі облоги»."
  hint_siege_and_occupation_military: "«Облога та оборона таких позицій, як вузькі гірські перевали, може вирішити результат війни»."
  hint_lacks_of_rivals: "Можливі суперники"
  hint_lacks_of_rivals_hint_text: "$hint_lacks_of_rivals_hint_text_1$\n\n$hint_lacks_of_rivals_hint_text_2$\n\n$hint_lacks_of_rivals_hint_text_3$"
  hint_lacks_of_rivals_hint_text_1: "Нашими [Concept('rivals','суперниками')|e] вважаються [Concept('countries','держави')|e], що відкрито виступають проти наших інтересів. Це дає нам низку переваг. По-перше, якщо у нашого суперника є вороги, нам простіше налагодити з ними дипломатичні відносини. По-друге, ми можемо фабрикувати [Concept('casus_belli','приводи для війни')|e] проти суперників і втручатися у [Concept('war','війни')|e] за їхньою участю."
  hint_lacks_of_rivals_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Слідкуйте за конфліктами та [Concept('alliances','союзами')|e] своїх сусідів, обираючи тих самих суперників, що й держава, союзником якої ви хочете стати. Але постарайтеся не придбати занадто могутніх ворогів.\n@arrow_bonus_tier_2! Ви можете почекати, поки інші [Concept('countries','держави')] не визначаться з [Concept('rivals','суперниками')], а вже потім зробити свій хід. Це дозволить вам уникнути небажаних конфліктів.\n@arrow_bonus_tier_2! Щоб фабрикувати [Concept('casus_belli','приводи для війни')|e] проти [Concept('rivals','суперників')], створюйте на їхній території [Concept('spy_network','шпигунську мережу')|e]."
  hint_lacks_of_rivals_hint_text_3: "#T Додаткові підказки:#!\n@hint! Не обов'язково оголошувати суперниками всіх підряд. Ви можете просто закрити #W сповіщення#!, клацнувши по ньому правою кнопкою миші.\n@hint! Якщо у вас є суперники, ви отримуватимете пропозиції брати участь у війнах на боці їхніх ворогів. Але будьте обережні: [Concept('rival_enemies','суперники')|e] так само зможуть втручатися у війни за нашою участю."
  hint_lacks_of_rivals_diplomatic: "«Заводити непотрібних ворогів шкідливо, але наявність спільних суперників може зміцнити наші відносини з сусідами»."
  hint_lacks_of_rivals_administrative: "«Вороги наших ворогів мають бути нашими друзями»."
  hint_lacks_of_rivals_military: "«Наявність відповідного суперника відкриває багато вигідних можливостей для тих, хто не боїться ними скористатися»."
  hint_control: "Досяжність та контроль"
  hint_control_hint_text: "$hint_control_hint_text_1$\n\n$hint_control_hint_text_2$\n\n$hint_control_hint_text_3$"
  hint_control_hint_text_1: "[control_icon] [Concept('control','Контроль')|e] є однією з найважливіших характеристик наших [location_icon] [Concept('locations','районів')|e]. Від нього залежить відсоток [taxes_icon] [Concept('tax_base','податкової бази')|e] та [levies_icon] [Concept('levies','ополчень')|e], якими можемо ефективно користуватися ми або наші [estates_icon] [Concept('estates','стани')|e]. Скільки б [building_icon] [Concept('buildings','споруд')|e] і [population_icon] [Concept('population','населення')|e] не було в [Concept('location','районі')], за відсутності [Concept('control','контролю')] вони не приносять нам користі.\n\nКонтроль над кожним районом щомісяця змінюється в бік [Concept('max_control','максимального контролю')|e]. [Concept('siege','Облоги')|e] та інші події можуть тимчасово знизити його, але з часом контроль все одно повернеться до максимального значення для району.\n\nConcept('max_control','Максимальний контроль')|e] залежить насамперед від [proximity_icon] [Concept('proximity','досяжності')|e]. [capital_icon] [Concept('capital','Столиця')|e] завжди має #W 100%#!-у досяжність, а для інших районів це значення визначається відстанню до столиці з урахуванням особливостей місцевості: [road_icon] [Concept('roads','дороги')|e], поля та [seazones_icon] [Concept('seazones','акваторії')|e] зі значною [maritime_presence_icon] [Concept('maritime_presence','морською присутністю')|e] впливають на неї позитивно, а гори, ліси та [Concept('seazones','акваторії')] з [Concept('pirates','піратами')|e] — негативно. На значення максимального контролю, крім іншого, впливають [Concept('pop_satisfaction','задоволеність груп населення')|e], [Concept('integration_status','статус інтеграції')|e] та наявність деяких особливих [Concept('buildings','споруд')]."
  hint_control_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Будуйте споруди насамперед у [Concept('capital','столиці')] та сусідніх з нею [Concept('locations','районах')], оскільки вони мають найвищий показник [Concept('control','контролю')] із самого початку гри.\n@arrow_bonus_tier_2! Будуйте [road_icon] [Concept('roads','дороги')|e] на #W панелі району#!, щоб зв'язати [Concept('capital','столицю')] з найбагатшими містами.\n@arrow_bonus_tier_2! Райони з [port_icon] [Concept('port','портами')|e] можуть бути пов'язані зі [Concept('capital','столицею')] морськими шляхами, особливо за великого [Concept('harbor_capacity','розміру гавані')|e]. Збільшити розмір гавані в ключових прибережних [Concept('locations','районах')] можна за допомогою таких [Concept('buildings','споруд')], як #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#! або #TOOLTIP:BUILDING_TYPE,dock,X #L док#!#!.\n@arrow_bonus_tier_1! У щойно [Concept('conquered','завойованому')|e] [Concept('locations','районі')] показник [Concept('control','контролю')] дорівнює #W 0%#!. Щоб він досяг максимуму, потрібен час, але ви можете прискорити цей процес, розмістивши в [Concept('locations','районі')] [Concept('army','армію')|e] або здійснивши [Concept('cabinet_action','дію ради')|e] «[ShowCabinetActionName('increase_control_province')]»."
  hint_control_hint_text_3: "#T Додаткові підказки:#!\n@hint! [Concept('location','Район')] з показником [Concept('control','контролю')] #W 0%#! не приносить [gold_icon] [Concept('gold','золота')|e], але вироблені ним [Concept('goods','товари')|e] все одно надходять на [market_icon] [Concept('market','ринок')|e]. Ми можемо скористатися цим, щоб забезпечити [Concept('supply','пропозицію')|e] важливих для нас ресурсів.\n@hint! У [Concept('location','районах')] з високим показником [Concept('control','контролю')] #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! швидше [Concept('promote','підвищують')|e] свій статус, задовольняючи потреби [Concept('buildings','споруд')] у [Concept('employment','робочій силі')|e].\n@hint! Ретельно плануйте [Concept('road','дорожню')] мережу: всього одна [Concept('road','дорога')], грамотно прокладена через гірський хребет, може підвищити [Concept('proximity','досяжність')] безлічі [Concept('location','районів')]."
  hint_control_diplomatic: "«Високий рівень контролю дозволяє переконати та асимілювати най... #italic непорядніших#! членів нашого суспільства»."
  hint_control_administrative: "«Район, який ми не контролюємо, не платитиме нам податки»."
  hint_control_military: "«Нам потрібно контролювати території, щоб призивати їхнє населення на службу»."
  hint_crown_power: "Влада правителя"
  hint_crown_power_hint_text: "$hint_crown_power_hint_text_1$\n\n$hint_crown_power_hint_text_2$\n\n$hint_crown_power_hint_text_3$"
  hint_crown_power_hint_text_1: "[Concept('crown_power_with_icon','Влада правителя')|e] характеризує вплив нашого уряду в межах нашої власної держави. Ми, [ShowEstateTypeName('crown_estate')], володіємо верховною владою, але ділимося нею з різними [Concept('estates_with_icon','станами')|e], чиї інтереси не завжди збігаються з нашими.\n\nСильна влада правителя полегшує прийняття нових [Concept('laws_with_icon','законів')|e], підвищує ефективність нашої [Concept('cabinet_with_icon','ради')|e] та збільшує базову підтримку наших рішень у [Concept('parliament_with_icon','парламенті')|e]. Але найважливішим є те, що саме влада правителя визначає, якою мірою держава ділить зі [Concept('estates','станами')] доходи та витрати, пов'язані з [Concept('trade_with_icon','торгівлею')|e] та [Concept('food_with_icon','їжею')|e].\n\nНаша влада правителя залежить насамперед від кількості [Concept('privileges_with_icon','привілеїв')|e], дарованих [Concept('estates','станам')], та [Concept('control_with_icon','контролю')|e] над найбільш густонаселеними [Concept('locations_with_icon','районами')|e]."
  hint_crown_power_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Підвищуйте рівень контролю над [Concept('locations','районами')], прокладаючи туди [Concept('roads_with_icon','дороги')|e] зі [Concept('capital_with_icon','столиці')|e]. \n@arrow_bonus_tier_2! Скасовуйте [Concept('privileges','привілеї')] наймогутніших [Concept('estates','станів')], коли наша [Concept('stability_with_icon','стабільність')|e] достатньо висока, але стежте за [Concept('estate_satisfaction','задоволення станів')|e]: їхній гнів може обернутися серйозними проблемами.\n@arrow_bonus_tier_1! Підвищити характеристику «[Localize(Player.GetGovernment.GetGovernmentType.GetPowerConcept)]» можна за допомогою [Concept('cabinet_action_with_icon','дії ради')|e] «[ShowCabinetActionName('strengthen_government')]».\n@arrow_bonus_tier_1! Побудуйте в [Concept('capital','столиці')] #TOOLTIP:BUILDING_TYPE,royal_court,X #L монарший двір#!#! або #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерію#!#!."
  hint_crown_power_hint_text_3: "#T Додаткові підказки:#!\n@hint! При владі правителя 50% половина доходів та витрат, пов'язаних з [Concept('trade','торгівлею')] та [Concept('food','їжею')], дістається безпосередньо [Concept('treasury_with_icon','скарбниці')|e], а друга половина розподіляється між [Concept('estates','станами')] залежно від їхньої [Concept('estate_power_with_icon','станової влади')|e].\n@hint! На початку гри влада правителя зазвичай дуже низька, особливо у великих [Concept('countries','державах')].\n@hint! Надалі вам будуть доступні [Concept('advances_with_icon','покращення')|e] та додаткові [Concept('buildings','споруди')], що дозволяють підвищити [Concept('crown_power','владу правителя')]."
  hint_crown_power_diplomatic: "«Не маючи достатньої влади правителя, ми змушені покладатися на милість станів»."
  hint_crown_power_administrative: "«Зміцнення влади правителя може сприяти торгівлі»."
  hint_crown_power_military: "«Централізація робить державу набагато сильнішою»."
  hint_estates: "Стани"
  hint_estates_hint_text: "$hint_estates_hint_text_1$\n\n$hint_estates_hint_text_2$\n\n$hint_estates_hint_text_3$"
  hint_estates_hint_text_1: "Стани представляють інтереси різних класів та груп населення нашої держави. Кожен з них має певний відсоток [Concept('estate_power_with_icon','станової влади')|e], що характеризує його вплив у порівнянні з іншими станами, до яких належить і [ShowEstateTypeName('crown_estate')]. Загальна сума влади всіх станів завжди становить 100%.\n\nОсновним джерелом станової влади є [Concept('population_with_icon','населення')|e], причому кожен [Concept('pop_type','суспільний клас')|e] підтримує лише один певний [Concept('estate','стан')]. Далі станова влада модифікується чинними [Concept('laws_with_icon','законами')|e] та [Concept('privileges_with_icon','привілеями')|e].\n\nВід влади кожного стану залежить його вплив у [Concept('parliament_with_icon','парламенті')|e], можливість його [Concept('tax','оподаткування')|e], а також його частка доходів та витрат, пов'язаних з [Concept('trade_with_icon','торгівлею')|e] та [Concept('food_with_icon','їжею')|e].\n\nКожен стан також має рівень [Concept('estate_satisfaction_with_icon','задоволення')|e], що характеризує його згоду з політикою нашого уряду. Якщо цей рівень високий, ви отримуєте певні переваги, що різняться для різних станів, а якщо він нижчий за #W 50%#!, вас чекають негативні ефекти. Занадто низький рівень [Concept('estate_satisfaction','задоволення')] одного зі станів може призвести до того, що пов'язані з ним [Concept('pops','групи населення')|e] піднімуть [Concept('rebellions_with_icon','заколоти')|e]. Але найнеприємніше полягає в тому, що при рівні задоволення нижче #W 25%#! стан перестає надавати [Concept('levies_with_icon','ополчення')|e]."
  hint_estates_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! [Concept('taxes','Податки')|e], що збираються зі [Concept('estates','станів')], є головним джерелом [Concept('income','доходу')|e] для більшості [Concept('countries','держав')]. Налаштувати або автоматизувати збір податків можна на @economy_panel! #W панелі бюджету#!.\n@arrow_bonus_tier_2! Будь-яка влада, якою володіють стани, обмежує нашу власну [Concept('crown_power_with_icon','владу правителя')|e]. Щоб зменшити владу певного стану, ви можете позбавити його [Concept('privileges_with_icon','привілеїв')|e] у @government_panel! #W вкладці «Стани»#!.\n@arrow_bonus_tier_1! Щоб умиротворити бунтівний стан, ви можете знизити для нього [Concept('taxes','податки')], дарувати йому [Concept('privilege','привілей')] або підкупити його за допомогою @government_panel! #W вкладки «Стани»#!."
  hint_estates_hint_text_3: "#T Додаткові підказки:#!\n@hint! Стани збирають усю [Concept('tax_base_with_icon','податкову базу')|e] в [Concept('locations','районах')|e] нашої держави, а нам дістаються лише ті кошти, які ми отримуємо від них самих у вигляді [Concept('taxes','податків')|e].\n@hint! На ранніх етапах гри [Concept('countries','держави')], що ведуть [Concept('wars_with_icon','війни')|e], дуже сильно залежать від [Concept('levies_with_icon','ополчення')|e], що надається [Concept('estates','станами')], але з появою більш сучасних [Concept('regular_regiments_with_icon','регулярних військ')|e] ця залежність поступово зникає."
  hint_estates_diplomatic: "«Сильний духовний стан зміцнює стабільність держави»."
  hint_estates_administrative: "«Сильний стан містян приносить нам багатство та розширює торговельні зв'язки»."
  hint_estates_military: "«Сильна аристократія збільшує чисельність та міць наших армій»."
  hint_markets: "Ринки"
  hint_markets_hint_text: "$hint_markets_hint_text_1$\n\n$hint_markets_hint_text_2$\n\n$hint_markets_hint_text_3$"
  hint_markets_hint_text_1: "[Concept('markets', '@markets! Ринки')|e] — це основа економіки в грі #italic Europa Universalis V#!. Кожен район належить до певного ринку, де відбувається купівля та продаж товарів для [Concept('pop_needs', 'населення')|e], [Concept('buildings', 'споруд')|e] та [Concept('constructions', 'будівництва')|e]. Продаж товарів на ринку збільшує [Concept('tax_base', '@tax_base! податкову базу')|e] району для [Concept('estates', 'станів')|e], з яких, у свою чергу, збирає [Concept('taxes', 'податки')|e] уряд."
  hint_markets_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Щоб побачити доступні нам ринки, перейдіть на @economy_panel![Link('trade', 'subtab = markets', 'панель ринків')]. #G Зеленим#! кольором виділяються ринки, [Concept('owned','належні')|e] нам, а синім — ринки, де у нас є [Concept('merchant_capacity','торговельний потенціал')|e], але немає [Concept('own','підконтрольних')] [Concept('location','районів')].\n@arrow_bonus_tier_3! Рекомендуємо вам автоматизувати кожен окремий [Concept('market','ринок')], клацнувши по @automation! #W значку шестерні#!. Таким чином ми завжди будемо повністю використовувати [Concept('merchant_capacity_with_icon','торговельний потенціал')|e] наших найефективніших [Concept('merchants_with_icon','купців')|e].\n@arrow_bonus_tier_2! Для підвищення [Concept('merchant_capacity_with_icon','торговельного потенціалу')|e] ви можете будувати такі [Concept('buildings_with_icon','споруди')|e], як #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! та #TOOLTIP:BUILDING_TYPE,trade_office,X #L торгові контори#!#!."
  hint_markets_hint_text_3: "#T Додаткові підказки:#!\n@hint! Межі ринків не є постійними. Кожен [Concept('location','район')] автоматично переходить у сферу впливу [Concept('market','ринку')] з найвищою [Concept('market_attraction_with_icon','ринковою привабливістю')|e] на своїй території, навіть якщо цей ринок є іноземним. При цьому [Concept('market_attraction','привабливість')] іноземних ринків можна знизити за допомогою [Concept('protectionism_with_icon','протекціонізму')|e]."
  hint_markets_diplomatic: "«Невидима рука сильна, але іноді її потрібно підштовхнути»."
  hint_markets_administrative: "«Це економіка, дурні!»"
  hint_markets_military: "«Зростання наших ринків — це добре.\nЗавоювання сусідських ринків — ще краще»."
  hint_food: "Їжа"
  hint_food_hint_text: "$hint_food_hint_text_1$\n\n$hint_food_hint_text_2$\n\n$hint_food_hint_text_3$"
  hint_food_hint_text_1: "[Concept('food_with_icon','Їжа')|e] потрібна [Concept('pops', 'групам населення')|e] для виживання, а [Concept('armies','арміям')|e] — для ведення війни. І ті, й інші отримують її із запасів [Concept('province_with_icon','провінції')|e], в якій перебувають (але не із запасів [Concept('location','району')]). Якщо цих запасів виявиться недостатньо, [Concept('pops', 'населення')] буде [Concept('starvation','голодувати')|e], а [Concept('armies','армії')] — страждати від [Concept('attrition','виснаження')|e].\n\nІснують три рівні виробництва та розподілу їжі:\n\n@location![Concept('local_food', 'Місцева їжа')|e]\nЇжа виробляється переважно в [Concept('locations', 'районах')|e] з [Concept('rgo_with_icon','джерелами сировини')|e] для [Concept('food_raw_materials','виробництва їжі')|e] — наприклад, #TOOLTIP:GOODS,livestock,X #L худобою#!#!. Її надлишок або дефіцит додається до запасу їжі в провінції.\n\n@province![Concept('provincial_food', 'Запас їжі в провінції')|e]\nЦе найважливіший рівень. Якщо [Concept('province', 'провінція')|e] не виробляє достатньо їжі для забезпечення всіх своїх районів, запас їжі в провінції скорочується. Як тільки цей запас повністю вичерпається, всі райони провінції почнуть страждати від [Concept('starvation', 'голоду')|e]. Але перш ніж це станеться, провінція спробує [Concept('buy_food','купити їжу')|e] на ринку.\n\n@market![Concept('market_food', 'Їжа на ринку')|e]\nУсі провінції на [Concept('market', 'ринку')|e] прагнуть [Concept('sell_food', 'продати їжу')|e] при надлишку запасів і [Concept('buy_food', 'купити')] її при нестачі. Поки на ринку вистачає їжі, голод нікому не загрожує."
  hint_food_hint_text_2: "#T Рекомендації:#!\n@arrow_bonus_tier_3! Щоб побачити доступні нам ринки, перейдіть на @economy_panel![Link('trade', 'subtab = markets', 'панель ринків')]. #G Зеленим#! кольором позначені ринки, які охоплюють [Concept('owned','належні')|e] нам [Concept('locations','райони')], тому нам слід стежити, щоб баланс [Concept('food','їжі')] на цих ринках завжди залишався позитивним. Якщо кількість [Concept('food','їжі')] на будь-якому з наших ринків почне швидко зменшуватися, ми побачимо жовтий банер, а якщо в окремих [Concept('locations','районах')] почався голод — червоний.\n@arrow_bonus_tier_3! Щоб збільшити виробництво їжі на будь-якому з наших ринків, клацніть по кнопці «Їжа», щоб перейти у вкладку @production_panel![Link('food_production', '', 'lateralview_food_production_entry_name')]. Тут ви можете побачити, яким з наших [Concept('provinces','провінцій')] загрожує [Concept('starvation','голод')], і розширити в них [Concept('rgo','видобуток ресурсів')].\n@arrow_bonus_tier_3! Розширювати [Concept('rgo_with_icon', 'видобуток ресурсів')|e] рекомендується в районах з найбільшими запасами [Concept('food_raw_materials','ресурсів для виробництва їжі')] (наприклад, #TOOLTIP:GOODS,rice,X #L рису#!#! або #TOOLTIP:GOODS,wheat,X #L пшениці#!#!) та високою [Concept('food_productivity_with_icon', 'ефективністю виробництва їжі')|e].\n@arrow_bonus_tier_1! Ми також можемо скористатися [Concept('merchant_capacity_with_icon', 'торговельним потенціалом')|e] для імпорту [Concept('food_raw_materials','ресурсів для виробництва їжі')|e] з інших [Concept('markets','ринків')], що дасть нам еквівалентну кількість [Concept('food','їжі')]. Це можна зробити на вкладці @economy_panel![Link('trade', 'subtab = trades', 'lateralview_trade_entry_name')]."
  hint_food_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('winter', '@winter! Взимку')|e] виробництво їжі зменшується. Не лякайтеся, якщо побачите, що баланс їжі на всіх наших ринках негативний протягом кількох місяців.\n@hint! [Concept('provinces', 'Провінції')] з дефіцитом їжі автоматично закуповують надлишки у більш продуктивних провінцій, що належать до того ж ринку, тому виробництво їжі найкраще розвивати в [Concept('locations', 'районах')] з найвищою [Concept('food_productivity', 'ефективністю цього виробництва')].\n@hint! У [Concept('town_or_city', 'міських')|e] районах ефективність виробництва [Concept('food', 'їжі')] зазвичай нижча, ніж у [Concept('rural_locations', 'сільських')|e]."
  hint_food_diplomatic: "«Тривалий голод може знищити наше населення та занапастити державу»."
  hint_food_administrative: "«На голод можна дивитися по-різному. Якщо ви продаєте їжу, він не такий вже й поганий»."
  hint_food_military: "«Голодний солдат багато не навоює»."
  hint_maritime: "Морська присутність"
  hint_maritime_hint_text: "$hint_maritime_hint_text_1$\n\n$hint_maritime_hint_text_2$\n\n$hint_maritime_hint_text_3$"
  hint_maritime_hint_text_1: "[Concept('maritime_presence', '@maritime_presence! Морська присутність')|e] — вкрай важлива характеристика, властива прибережним [Concept('seazones', '@seazones! акваторіям')|e]. Вона сприяє підтримці [Concept('proximity', '@proximity! близькості')|e] біля наших берегів та островів.\n\nКрім того, завдяки морській присутності на [Concept('market', '@market! ринку')|e], до якого належать [Concept('seazones', 'акваторії')], набирається [Concept('merchant_power', '@merchant_power! торговельна перевага')|e].\n\n[Concept('maritime_presence', 'Морська присутність')] зростає пасивно — цьому допомагають споруди та присутність [Concept('navy', '@navy! флоту')|e]. Вона може падати або навіть втратитися остаточно під впливом [Concept('privateers', '@privateers! каперів')|e] та [Concept('blockade', '@blockade! блокад')|e]."
  hint_maritime_hint_text_2: "#T Рекомендації#!\n@arrow_bonus_tier_3! Будуйте спеціалізовані [Concept('navies', 'флоти')] з кораблів, які набирають [Concept('maritime_presence', 'морську присутність')] у великих кількостях. Їх можна розмістити в якійсь прибережній [Concept('seazones', 'акваторії')], і тоді вони рівномірно поширюватимуть [Concept('maritime_presence', 'морську присутність')] на всі [Concept('seazones', 'акваторії')], які належать до однієї й тієї ж [Concept('province', '@province! провінції')|E].\n@arrow_bonus_tier_3! Інший варіант: задайте їм [Concept('military_objective', military_objective! військову ціль')|E] #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!. Ефект буде таким же, але при цьому кораблі, що потребують ремонту, зможуть автоматично причалювати.\n@arrow_bonus_tier_1! #TOOLTIP:BUILDING_TYPE,coastal_fort,X #L Берегова фортеця#!#! — вкрай корисна споруда!"
  hint_maritime_hint_text_3: "#T Додаткові поради#!\n@hint! [Concept('maritime_presence', 'Морська присутність')] поширюється лише на ту [Concept('province', 'провінцію')], де є кораблі, навіть якщо поставлена ціль охоплює кілька [Concept('provinces', 'провінцій')]. [Concept('navy', 'Флот')], що виконує ціль #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!, покине свою [Concept('seazone', 'акваторію')] лише тоді, коли [Concept('maritime_presence', 'морська присутність')] у цьому районі досягне 100 одиниць.\n@hint! Діяльність [Concept('privateers', 'каперів')] порівняно з [Concept('maritime_presence', 'морською присутністю')] охоплює лише [Concept('area', '@area! області')|E]."
  hint_maritime_diplomatic: "«Щоб вигідніше торгувати, нам доведеться скористатися своєю природною перевагою — береговою лінією»."
  hint_maritime_administrative: "«Чим безпечніше мореплавство, тим краща взаємодія з народом»."
  hint_maritime_military: "«Сильний флот надійно захистить наші торговельні шляхи від піратів»."
  hint_slaves: "Раби"
  hint_slaves_hint_text: "$hint_slaves_hint_text_1$\n\n$hint_slaves_hint_text_2$\n\n$hint_slaves_hint_text_3$"
  hint_slaves_hint_text_1: "@slaves_goods! #TOOLTIP:GOODS,slaves_goods,X Раби#! — найунікальніший з [Concept('good', '@good! товарів')|e]. Їх, як і будь-який інший [Concept('good', 'товар')], купують і продають на [Concept('markets', '@markets! ринках')|e], а їхня ціна залежить від [Concept('supply', 'пропозиції')|e] та [Concept('demand', 'попиту')|e]. На відміну від інших [Concept('good', 'товарів')] раби представляють реальні [Concept('pops', '@pops! групи населення')|e], які переміщуються при торгівлі [Concept('good', 'товаром')].\n\n@slaves! #TOOLTIP:POPTYPE,slaves,X #L Раби#!#! як [Concept('pop_type', '@pop_type! суспільний клас')|e] можуть працювати в [Concept('rgo', '@rgo! видобутку ресурсів')|e] та рабовласницьких [Concept('buildings', '@buildings! спорудах')|e], таких як [ShowBuildingTypeName('sugar_plantation')|l].\n\n[Concept('buildings', 'Споруди')] на кшталт #TOOLTIP:BUILDING_TYPE,slave_market,X #L невільницького ринку#!#! можуть перетворювати існуючих @slaves! #TOOLTIP:POPTYPE,slaves,X #L рабів#!#! на [Concept('goods', 'продаваних')] @slaves_goods! #TOOLTIP:GOODS,slaves_goods,X рабів#!, якими можна торгувати на [Concept('market', 'ринку')]. Надалі цим [Concept('good', 'товаром')] можна торгувати як будь-яким іншим, а [Concept('buildings', 'споруди')] можуть використовувати його як необхідний [Concept('good', 'товар')]. У такому випадку @slaves! #TOOLTIP:POPTYPE,slaves,X #L раби#!#! перемістяться в [Concept('location', 'район')], щоб працювати в [Concept('building', 'споруді')]."
  hint_slaves_hint_text_2: "#T Рекомендовані дії:#! \n@arrow_bonus_tier_3! При створенні [Concept('colonies', '@colony! колоній')|e] на іншому [Concept('continent', 'континенті')|e] ви можете [Concept('trade', '@trade! продавати')|e] рабів на колоніальних [Concept('markets', 'ринках')], щоб вони працювали на плантаціях.\n@arrow_bonus_tier_2! Ви можете зводити #TOOLTIP:BUILDING_TYPE,slave_center,X #L центри работоргівлі#!#! в чужих [Concept('locations', 'районах')] в межах [Concept('trade_range', '@trade_range! торговельної дистанції')|e], щоб забезпечити собі стабільний приплив рабів."
  hint_slaves_hint_text_3: "#T Додаткові поради:#!\n@hint! Зазвичай [Concept('pops', 'групи населення')|e] поневолюють [Concept('buildings', 'споруди')] на кшталт #TOOLTIP:BUILDING_TYPE,slave_market,X #L невільницького ринку#!#!, хоча у деяких [Concept('countries', 'держав')] є особливі механіки, що дозволяють їм поневолювати [Concept('pops', 'групи населення')] під час [Concept('war', '@war! війни')|e].\n@hint! #TOOLTIP:RELIGIONGROUP,christian,X #L Християнство#!#! допускає використання рабів лише на плантаціях, які відкриваються в #V епоху Відкриттів#! і доступні тільки в заморських землях."
  hint_slaves_diplomatic: "«Усі люди створені рівними, але є винятки»."
  hint_slaves_administrative: "«Будь-які великі звершення вимагають багатьох жертв»."
  hint_slaves_military: "«Раз вільна праця завжди в дефіциті, скористаємося язичниками»."
  hint_eco: "Просунута економічна порада"
  hint_eco_hint_text: "$hint_eco_hint_text_1$\n\n$hint_eco_hint_text_2$\n\n$hint_eco_hint_text_3$"
  hint_eco_hint_text_1: "Хоча ви можете автоматизувати багато аспектів економіки, деякі дії доведеться вживати особисто, щоб сприяти розвитку [Concept('country', 'держави')]."
  hint_eco_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Найкраща порада — завжди намагайтеся скорочувати [Concept('expenses', '@expenses! витрати')|e].\n\n@arrow_bonus_tier_3! Вам як гравцеві варто зосередитися на плануванні [Concept('towns_and_cities', '@towns_and_cities! міст')|e] та [Concept('roads', '@roads! доріг')|e]\n    Оскільки [towns_and_cities_with_icon|el] скорочують доступний [Concept('rgo', '@rgo! видобуток ресурсів')|e], вам варто вести урбанізацію лише найменш цінних із ваших [Concept('rural_locations', 'сільських районів')]. Зазвичай у таких районах видобувається:\n@sand![ShowGoodsName('sand')] @clay![ShowGoodsName('clay')] @horses![ShowGoodsName('horses')] @medicaments![ShowGoodsName('medicaments')] @wine![ShowGoodsName('wine')] @olives![ShowGoodsName('olives')] @millet![ShowGoodsName('millet')] @legumes![ShowGoodsName('legumes')] @fruit![ShowGoodsName('fruit')] @wild_game![ShowGoodsName('wild_game')] @beeswax![ShowGoodsName('beeswax')] \n\n@arrow_bonus_tier_3! Виділяйте [Concept('subjects', '@subjects! ленників')|e] на землях із низьким [Concept('control', '@control! контролем')|e], оскільки вони встановлюють над ними власний контроль.\n    [Concept('annex', '@annex! Приєднуйте')|e] своїх ленників, коли розширите місцеву інфраструктуру.\n    Швидкість [Concept('annexation', '@annexation! приєднання')|e] залежить від відносного розміру держав та їх [Concept('cultural_influence', 'культурного впливу')|e].\n\n@arrow_bonus_tier_2! [Concept('rgo', '@rgo! Видобуток цінних ресурсів')|e] — хороша інвестиція, особливо якщо одночасно з цим розвивати [Concept('merchant_capacity', '@merchant_capacity! торговельний потенціал')|e] для [Concept('export', '@export! експорту')|e].\n@goods_gold![ShowGoodsName('goods_gold')] @silver![ShowGoodsName('silver')] @gems![ShowGoodsName('gems')] @pearls![ShowGoodsName('pearls')] @amber![ShowGoodsName('amber')] @ivory![ShowGoodsName('ivory')] @pepper![ShowGoodsName('pepper')] @saffron![ShowGoodsName('saffron')] @chili![ShowGoodsName('chili')]\n\n@arrow_bonus_tier_2! [Concept('trade_income_with_icon', 'CONCEPT_PLACEHOLDER')|e] зростають залежно від [Link('hints', 'selected_hint = hint_crown_power', '@hint! влади правителя')], і їх варто за можливості збільшувати, нарощуючи [Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! торговельний потенціал')], який, на відміну від [Concept('tax_base', 'податкової бази')], не збільшується зі зростанням [Concept('control', 'контролю')]\n\n@arrow_bonus_tier_1! Підтримуйте низькі ціни на промислові товари! Вони збільшать доходи від міст і знизять витрати на утримання [Concept('buildings', '@buildings! споруд')|e].\n@lumber![ShowGoodsName('lumber')] @masonry![ShowGoodsName('masonry')] @glass![ShowGoodsName('glass')] @iron![ShowGoodsName('iron')] @mercury![ShowGoodsName('mercury')] @steel![ShowGoodsName('steel')]\n\n@arrow_bonus_tier_1! Споруди, що не використовують [Concept('production_method', '@production_method! метод виробництва')|e], потребуватимуть витрат на [Concept('maintenance', '@maintenance! утримання')|e]. Вони змінюватимуться залежно від ціни споживаних товарів. Пам'ятайте, що [Concept('demand', 'попит')|e] від [Concept('buildings', 'споруд')] також сприяє економічному зростанню!"
  hint_eco_hint_text_3: "#T Додаткові поради:#!\n[Link('hints', 'selected_hint = hint_inflation', '@hint! Зниження інфляції')]\n[Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! Збільшення торговельного потенціалу')]\n[Link('hints', 'selected_hint = hint_control', '@hint! Посилення контролю')]"
  hint_eco_diplomatic: "«Часом монети є найкращим інструментом впливу»."
  hint_eco_administrative: "«Золото — кров будь-якої держави»."
  hint_eco_military: "«Дохід, відібраний в іншого — найкращий вид доходів»."
  hint_pol: "Просунута політична порада"
  hint_pol_hint_text: "$hint_pol_hint_text_1$\n\n$hint_pol_hint_text_2$\n\n$hint_pol_hint_text_3$"
  hint_pol_hint_text_1: "На старті всі [Concept('countries', '@countries! держави')|e] мають свої недоліки. Обов'язково відкрийте вкладку [Link('government', 'tabcontent = estates', '@government_panel! $lateralview_government_entry_name$')] та вивчіть [Concept('privileges', '@privileges! привілеї')|e] та [Concept('laws', '@laws! звід правил')|e]. Подібні масштабні зміни можуть виявитися дуже корисними в довгостроковій перспективі.\n\nНе бійтеся змін!"
  hint_pol_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Переконайтеся, що [Concept('estate_satisfaction_equilibrium', '@estate_satisfaction_equilibrium! рівноважне задоволення')|e] дозволяє оподатковувати #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#! та #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюдинів#!#! максимальними [Concept('tax', 'податками')|e], не опускаючись нижче #W 50%#!.\n\n@arrow_bonus_tier_3! Перевірте [Link('societal_values', '', '@government_panel! Панель уряду > Цінності')], щоб дізнатися, до яких [Concept('societal_values', '@societal_values! суспільних цінностей')|e] вам варто прагнути. Зазвичай найвигіднішими є:\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('capital_economy')]\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('centralization')]\n\n@arrow_bonus_tier_3! Вивчіть [Concept('laws', '@laws! звід правил')|e], щоб дізнатися, що варто змінити.\n    [Concept('parliament', '@parliament! Парламент')|e] дозволить простіше змінювати правила, що має стати одним із пріоритетів на ранньому етапі гри\n    Правила, на які варто звернути увагу на початку гри:\n    $BULLET_WITH_TAB$[ShowLawName('mining_law')]\n    $BULLET_WITH_TAB$[ShowLawName('precious_metal_distribution_law')]\n    $BULLET_WITH_TAB$[ShowLawName('distribution_of_power_law')]\n    $BULLET_WITH_TAB$[ShowLawName('administrative_system')]\n\n@arrow_bonus_tier_3! Вивчіть даровані та доступні [Concept('privileges', '@privileges! привілеї')|e] для кожного [Concept('estate', '@estate! стану')|e]. Вони дозволять змінити зсув рівноважного задоволення та суспільних цінностей.\n   #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократам#!#! потрібно дарувати достатньо привілеїв, щоб заручитися їхньою вірністю, але не більше. Зниження влади цього стану принесе вам користь у довгостроковій перспективі.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobles_land_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobility_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_serfdom_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_sponsored_navy')]\n\n   #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L Священникам#!#! варто дарувати всі позитивні привілеї, навіть якщо їх не можна оподатковувати — кожна одиниця їхнього задоволення понад #W 50%#! збільшує бонус до [Concept('research_progress', '@research_progress! прогресу досліджень')|e]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('embellish_great_works_of_faith')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_in_administration')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_religious_state')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clerical_advisory_council')]\n\n   #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L Містянам#!#! потрібно дарувати якомога більше позитивних привілеїв. Здебільшого вони принесуть вам користь, а збільшення [Concept('estate_power', '@estate_power! станової влади')|e] містян знизить владу інших станів. До того ж, кожна одиниця задоволення збільшує [Concept('production_efficiency', '@production_efficiency! виробничу ефективність')|e]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_roads_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('market_fairs')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_trade_center_sponsorship')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('commercial_advisory_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('control_over_the_coinage')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('guild_investments')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('land_of_commerce')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('urban_development_grants')]\n\n   Привілеї #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюдинів#!#! повинні надавати достатньо рівноважного задоволення, щоб оподатковувати їх максимальним податком. Також не варто забувати про їхню схильність до #TOOLTIP:SOCIETAL_VALUE,decentralization,X #L децентралізації#!#!. При цьому станова влада простолюдинів невелика, і вартість відібрання привілеїв буде нижчою, ніж в інших станів\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_allowed_weapons_privilege')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_hunting')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('no_labor_sunday')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_represented_in_parliament')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_fewer_levies')]\n\n@arrow_bonus_tier_2! Звертайте увагу на [Concept('government_reforms', '@government_reforms! державні принципи')|e], що відповідають необхідним вам суспільним цінностям. Пам'ятайте, що деякі бонуси, наприклад, до [Concept('diplomatic_capacity', 'дипломатичного потенціалу')|e], можуть знизити [Concept('diplomatic_maintenance', 'витрати на дипломатію')|e].\n\n@arrow_bonus_tier_2! Деякі [Concept('cabinet_actions', '@cabinet_actions! дії ради')|e], такі як #TOOLTIP:CABINET_ACTION,stabilize_country,X #L підвищення стабільності в державі#!#! або #TOOLTIP:CABINET_ACTION,strengthen_government,X #L зміцнення уряду#!#!, можуть скоротити витрати, залишаючи у вашому розпорядженні більшу частину доходів!"
  hint_pol_hint_text_3: "#T Додаткові поради:#!\n[Link('hints', 'selected_hint = hint_crown_power', '@hint! Влада правителя')]\n[Link('hints', 'selected_hint = hint_estates', '@hint! Стани')]"
  hint_pol_diplomatic: "«Практичний правитель зможе отримати вигоду з будь-якої ситуації»."
  hint_pol_administrative: "«Успішна політика сприяє успіху в справах»."
  hint_pol_military: "«Стани часто гірші за будь-якого ворога»."
  hint_mil: "Просунута порада щодо експансії"
  hint_mil_hint_text: "$hint_mil_hint_text_1$\n\n$hint_mil_hint_text_2$\n\n$hint_mil_hint_text_3$"
  hint_mil_hint_text_1: "Дві загальні поради: професійні [Concept('armies', '@armies! армії')|e] (включно з [Concept('mercenaries', 'найманцями')|e]) завжди перемагають [Concept('levies', '@levies! ополчення')|e] рівної чисельності, і найкращим способом наростити армію є економічне зростання."
  hint_mil_hint_text_2: "#T Рекомендовані дії:#!\n@arrow_bonus_tier_3! Постарайтеся якомога швидше отримати [Concept('institution','інститут')|e] #TOOLTIP:INSTITUTION,professional_armies,X #L професійних армій#!#!: покращення «[ShowAdvanceName('armory_advance')]» дозволить вам перемагати в раніше неможливих [Concept('wars', '@wars! війнах')|e].\n\n@arrow_bonus_tier_3! [Concept('war_score', '@war_score! Військовий рахунок')|e] від [Concept('battles','битв')|e] знижується з кожною наступною [Concept('ages', 'епохою')|e]. На початку він може досягати #W 50%#!, що дозволить вигравати [Concept('wars', 'війни')|e] за рахунок одних битв!\n\n@arrow_bonus_tier_3! Переконайтеся, що у вас є доступ до стратегічних [Concept('goods', '@goods! товарів')|e]. Вони не потрібні у великих обсягах, але без них вам не збільшити чисельність [Concept('army', 'армії')|e] та [Concept('navy', 'флоту')|e]: @tin![ShowGoodsName('tin')] @lead![ShowGoodsName('lead')] @copper![ShowGoodsName('copper')]\n\n@arrow_bonus_tier_3! Армії [Concept('reinforce', '@reinforce! поповнюються')|e] лише на дружній території.\n\n@arrow_bonus_tier_3! #TOOLTIP:UNITCATEGORY,army_infantry,X #L Піхота#!#! утворює основну [Concept('battle', 'бойову')|e] лінію. Вона дешева та ефективно поглинає [Concept('damage_taken', 'отримувану шкоду')|e], тоді як #TOOLTIP:UNITCATEGORY,army_artillery,X #L артилерія#!#! завдає основної шкоди на лінії фронту — вкрай важливо, щоб лінія фронту пережила [Concept('bombard_phase', '@bombard_phase! фазу обстрілу')|e]\n\n@arrow_bonus_tier_2! Не менш важливо, щоб у ваших армій на [Concept('enemy', '@enemy! ворожій')|e] території була пряма лінія постачання. Якщо перерізати її, ціла армія може загинути від [Concept('attrition', 'виснаження')|e]. Ви можете використовувати #TOOLTIP:UNITCATEGORY,army_auxiliary,X #L допоміжні війська#!#!, щоб доставляти [Concept('food', 'їжу')|e] на лінію фронту, або зводити [Concept('supply_depots', 'продовольчі склади')|e].\n\n@arrow_bonus_tier_1! [Concept('buildings', 'Споруди')|e], що збільшують [Concept('manpower', '@manpower! кількість рекрутів')|e], мають найбільшу вартість [Concept('maintenance', '@maintenance! утримання')|e] в грі, і їх найкраще зводити в [Concept('locations','районах')|e] з високим [Concept('control', 'контролем')|e].\n\n@arrow_bonus_tier_1! Зазвичай битви тривають лише кілька днів, тому переконайтеся, що у вас є підкріплення, перш ніж просуватися вглиб ворожої території."
  hint_mil_hint_text_3: "#T Додаткові поради:#!\n[Link('hints', 'selected_hint = hint_manpower', '@hint! Кількість рекрутів')]\n[Link('hints', 'selected_hint = hint_sailors', '@hint! Моряки')]\n[Link('hints', 'selected_hint = hint_war', '@hint! Війна')]\n[Link('hints', 'selected_hint = hint_battle', '@hint! Битви')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Окупація та облога')]"
  hint_mil_diplomatic: "«Нехай інші держави виграють ваші війни»."
  hint_mil_administrative: "«Виснаження може згубити будь-яку армію»."
  hint_mil_military: "«Не приходьте на перестрілку з ножем»."
  hint_holland: "Початкова порада для Голландії"
  hint_holland_hint_text: "Вкрай урбанізовані [Concept('locations', 'райони')] Нідерландів роблять державу [Player.GetLongName] головним кандидатом на роль комерційного центру Північної Європи.\n\n@hint! #T Зводьте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! в усіх #TOOLTIP:LOCATIONRANK,town,X #L містечках#!#!\nАвтоматизація торгівлі використовує їх [Concept('merchant_capacity', '@merchant_capacity! торговельний потенціал')|e], щоб [Concept('import', '@import! імпортувати')|e] [Concept('raw_materials', '@raw_materials! сировинні товари')|e], яких не має [market_icon][Player.GetCapital.GetMarket.GetName], та [Concept('export', '@export! експортувати')|e] надлишки [Concept('produced_goods', '@produced_goods! товарів, що виробляються в наших містечках')|e].\n\n@hint! #T Розширюйте текстильну промисловість#!\nНа експорті #TOOLTIP:GOODS,fine_cloth,X тонкого сукна#! можна добре заробити. Зводьте #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдії прядильників#!#! та #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гільдії кравців#!#! і за необхідності імпортуйте #TOOLTIP:GOODS,wool,X вовну#! з #TOOLTIP:LOCATION,london,X #L лондонського#!#! ринку.\n\n@hint! #T Збільште [Concept('crown_power', 'владу правителя')]#!\n[Concept('trade_income_with_icon', 'CONCEPT_PLACEHOLDER')|e] ділиться між #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителями#!#! та [Concept('estates', '@estates! станами')|e] відповідно до їхньої відносної влади. Висока [Concept('crown_power', '@crown_power! влада правителя')|e] забезпечить стабільний приплив [Concept('trade_income', 'доходів від торгівлі')] до [Concept('treasury', 'казни')|e]. Детальніше про [Concept('crown_power', 'владу правителя')] можна дізнатися [Link('hints', 'selected_hint = hint_crown_power', 'тут')].\n\n@hint! #T Слідкуйте за надходженням [Concept('food', 'їжі')]#!\n[Concept('urban_locations', 'Міські райони')|e] виробляють менше [Concept('food', '@food! їжі')|e], ніж [Concept('rural_locations', 'сільські')|e]. Слідкуйте за [Concept('food_stockpile', '@food_stockpile! запасами їжі')|e] на ринку [Player.GetCapital.GetMarket.GetName] і за необхідності нарощуйте [Concept('rgo', '@rgo! видобуток')|e] #TOOLTIP:GOODS,fish,X риби#! та #TOOLTIP:GOODS,livestock,X худоби#!. Якщо [Concept('food', 'їжа')] стане занадто дорогою, це негативно позначиться на [Concept('budget', 'балансі')] казни.\n\n@hint! #T Дружіть із сусідами#!\nХоч ми й багаті, через скромні розміри ми вразливі перед ворожою агресією. Використовуйте [Concept('diplomatic_action', '@diplomatic_action! дипломатичну дію')|e] «$IMPROVE_RELATIONTITLE$» щодо найбільш грізних сусідів, таких як [GetCountry('FRA').GetName] та [GetCountry('ENG').GetName]."
  hint_holland_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_holland_administrative: "$hint_advisor_salute_administrative$"
  hint_holland_military: "$hint_advisor_salute_military$"
  hint_hungary: "Початкова порада для Угорщини"
  hint_hungary_hint_text: "[Player.GetLongName] починає гру в привілейованому становищі як одна з головних держав [Concept('region', 'регіону')|e]. У нас є [Concept('alliance', '@alliance! союз')|e] з #W Польщею#!, #W Боснія#! наш [Concept('subject', '@subject! ленник')|e], а наш [Concept('ruler', '@ruler! правитель')|e] [Player.GetGovernment.GetRuler.GetName] править #W Хорватією#! на правах [Concept('personal_union', '@personal_union! особистої унії')|e]. Це означає, що ми можемо спрямувати свої зусилля на розвиток [Concept('country', 'держави')|e], не турбуючись про зовнішні загрози... принаймні, поки що.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] до шахт#!\nНа північ від [capital_icon] [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetName] розташовані багаті поклади #TOOLTIP:GOODS,goods_gold,X золота#! та #TOOLTIP:GOODS,silver,X срібла#!. Однак вони недостатньо розвинені, і наш [Concept('control', '@control! контроль')|e] над цими [Concept('locations', 'районами')] невеликий. Ми повинні прокласти [Concept('roads', '@roads! дороги')|e] від [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] до цих цінних шахт — це збільшить їхню [Concept('proximity', '@proximity! близькість')|e] та підвищить [Concept('control', 'контроль')].\n\n@hint!  #T Зведіть гільдії ювелірів в околицях [Concept('capital', 'столиці')]#!\nЧерез високу пропозицію ціна золота та срібла на ринку [market_icon] [Player.GetCapital.GetMarket.GetName] впала. [ShowBuildingTypeName('jewelry_guild')|U] споживатиме золото та срібло для виробництва дорогих #TOOLTIP:GOODS,jewelry,X ювелірних виробів#!, що зробить наші шахти ще ціннішими.\n\n@hint! #T Зводьте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! для експорту надлишків#!\nАвтоматизована [Concept('trade', '@trade! торгівля')|e] [Concept('export', '@export! експортуватиме')|e] надлишки [Concept('goods', '@goods! товарів')|e], таких як [ShowGoodsNameWithNoTooltip('jewelry')|l], на інші [Concept('markets', '@markets! ринки')|e], створюючи [Concept('trade_income', '@trade_income! доходи від торгівлі')|e] та забезпечуючи прибутковість виробничого ланцюжка.\n\n@hint! #T Скасуйте політику «[ShowPolicyName('gold_export_ban')]»#!\nЄвропі потрібне наше золото, і ми можемо добре заробити на його експорті, але чинне [Concept('law', 'правило')|e] «[ShowLawName('precious_metal_distribution_law')]» забороняє це. Можливо, варто змінити [Concept('policy', 'політику')] під час наступного засідання [Concept('parliament', '@parliament! парламенту')|e]."
  hint_hungary_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_hungary_administrative: "$hint_advisor_salute_administrative$"
  hint_hungary_military: "$hint_advisor_salute_military$"
  hint_norway: "Початкова порада для Норвегії"
  hint_norway_hint_text: "[Player.GetLongName] — велика [Concept('country', 'держава')|e], але за межами [Concept('capital', 'столиці')|e] ми маємо в кращому разі номінальний [Concept('control', 'контроль')|e]. Нам потрібно розширювати інфраструктуру, морську та наземну, щоб збільшити [Concept('proximity', 'близькість')|e] та отримати доступ до ресурсів півночі.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\nМи повинні спробувати прокласти [Concept('roads', '@roads! дороги')|e] з [capital_icon] [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetName] до всіх навколишніх #TOOLTIP:LOCATIONRANK,town,X #L містечок#!#! та місць [Concept('rgo', '@rgo! видобутку цінних ресурсів')|e], щоб збільшити [Concept('proximity', '@proximity! близькість')|e] та [Concept('control', '@control! контроль')|e]. З правильними інвестиціями #TOOLTIP:GOODS,silver,X срібні#! шахти на захід від [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] можуть стати прибутковими. Частіше перевіряйте карту [Concept('proximity', 'близькості')]!\n\n@hint! #T Збільште [Concept('maritime_presence', 'морську присутність')]#!\nПрокладання [Concept('roads', 'дороги')] через гірські центральні регіони країни може стати дорогим і безглуздим заняттям. За достатньої [Concept('maritime_presence', '@maritime_presence! морської присутності')|e] вздовж наших берегів [Concept('proximity', 'близькість')] буде куди ефективніше поширюватися морем. Зводьте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристані#!#! та #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в містечках і посилайте флоти #TOOLTIP:UNITCATEGORY,navy_light_ship,X #L легких кораблів#!#! патрулювати узбережжя після вивчення відповідного [Concept('advance', '@advance! покращення')|e].\n\n@hint! #T Будуйте містечка в зручних гаванях поблизу нашої [Concept('capital', 'столиці')]#!\n[Concept('proximity', 'Близькість')] прибережних [Concept('locations', 'районів')] можна покращити за допомогою [Concept('natural_harbor_suitability', '@natural_harbor_suitability! придатних природних гаваней')|e]. Перевірте карту придатності гавані, щоб знайти найкращі природні порти.\n\n@hint! #T Розвивайте виробництва#!\nЗводьте в містах #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гільдії кравців#!#!, #TOOLTIP:BUILDING_TYPE,furniture_guild,X #L меблеві гільдії#!#! та #TOOLTIP:BUILDING_TYPE,scriptorium,X #L скрипторії#!#! для переробки природних ресурсів і будуйте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#!, щоб [Concept('export', '@export! експортувати')|e] їх на інші [Concept('markets', '@markets! ринки')|e].\n\n@hint! #T Зміцніть унію зі Швецією#!\nНаша [Concept('personal_union', '@personal_union! особиста унія')|e] з #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#! гарантує мир на кордонах. Ми могли б досягти більшої інтеграції, прийнявши спільний [Concept('laws', 'звід правил')] на панелі [Concept('international_organization', 'міжнародного об’єднання')|e]."
  hint_norway_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_norway_administrative: "$hint_advisor_salute_administrative$"
  hint_norway_military: "$hint_advisor_salute_military$"
  hint_naples: "Початкова порада для Неаполя"
  hint_naples_hint_text: "[Player.GetLongName], найбільша держава [Concept('region', 'регіону')|e], має всі шанси досягти панування в італійських торгівлі та політиці, тоді як наші [Concept('subjects', 'ленники')|e] в Греції надають зручний плацдарм для зовнішньої експансії.\n\n@hint! #T Прокладайте [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\nМи повинні спробувати прокласти [Concept('roads', '@roads! дороги')|e] з [capital_icon] [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetName] до всіх навколишніх #TOOLTIP:LOCATIONRANK,town,X #L містечок#!#! та місць [Concept('rgo', '@rgo! видобутку цінних ресурсів')|e], щоб збільшити [Concept('proximity', '@proximity! близькість')|e], а з нею і [Concept('control', '@control! контроль')|e].\n\n@hint! #T Розширте видобуток [Concept('raw_materials', 'сировинних товарів')]#!\nНаша [Concept('country', 'держава')] багата на цінні [Concept('raw_materials', '@raw_materials! сировинні товари')|e]. #TOOLTIP:GOODS,wool,X Вовна#!, #TOOLTIP:GOODS,fiber_crops,X прядильні культури#! та #TOOLTIP:GOODS,silk,X шовк#! не тільки цінні самі по собі, їх також споживає текстильна промисловість у наших [Concept('urban_locations', 'міських районах')|e]. Постарайтеся якомога швидше розширити [Concept('rgo', '@rgo! видобуток цих ресурсів')|e] та збільшіть [Concept('control', 'контроль')] у цих районах.\n\n@hint! #T Розвивайте текстильну промисловість#!\nЗводьте #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдії прядильників#!#! та #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гільдії кравців#!#! в наших [Concept('urban_location', 'міських районах')]. Вони споживатимуть наші [Concept('raw_materials', 'сировинні товари')] для виробництва дорогих [Concept('produced_goods', '@produced_goods! вироблених товарів')|e], збільшуючи попит, завдяки чому [Concept('rgo', 'видобуток ресурсів')] стане ще вигіднішим.\n\n@hint! #T Зводьте #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринки#!#! для експорту надлишків#!\nАвтоматизована [Concept('trade', '@trade! торгівля')|e] [Concept('export', '@export! експортуватиме')|e] надлишки будь-яких [Concept('goods', 'товарів')|e], таких як [ShowGoodsNameWithNoTooltip('fine_cloth')|l], на інші [Concept('markets', '@markets! ринки')|e], що принесе [Concept('trade_income', '@trade_income! доходи від торгівлі')|e] та забезпечить прибутковість усього виробничого ланцюжка."
  hint_naples_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_naples_administrative: "$hint_advisor_salute_administrative$"
  hint_naples_military: "$hint_advisor_salute_military$"
  hint_castile: "Початкова порада для Кастилії"
  hint_castile_hint_text: "Найсильніша держава [Concept('region', 'регіону')|e], [Player.GetLongName] є головним кандидатом на об'єднання Іберії під владою одного трону. Однак, наша адміністрація вже працює на межі можливостей, а наш [Concept('control', 'контроль')] над півднем настільки незначний, що ледь вносить внесок у наш [Concept('budget', 'бюджет')|e]. Буде мудро спочатку зміцнити [Concept('control', 'контроль')] над вже наявними територіями і лише потім продовжувати завоювання.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\n[Concept('control', '@control! Безконтрольні')|e] [Concept('locations', 'райони')] практично марні для нашої адміністрації. Прокладайте [Concept('roads', '@roads! дороги')|e] зі [Concept('capital', '@capital! столиці')|e] та зводьте #TOOLTIP:BUILDING_TYPE,bridge_infrastructure,X #L мости#!#!, щоб збільшити [Concept('proximity', '@proximity! близькість')|e], а через неї і [Concept('control', 'контроль')]. Частіше звертайте увагу на карту [Concept('proximity', 'близькості')]!\n\n@hint! #T Підкоріть #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#!#!\nХоча ми не в змозі ефективно [Concept('own', 'володіти')|e] цими землями, ми могли б зробити #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#! своїм [Concept('subject', '@subject! ленником')|e]. Ленник правитиме землями від нашого імені та щомісяця виплачуватиме данину в нашу [Concept('treasury', 'казну')]. Ми можемо постаратися [Concept('annexing', '@annexing! приєднати')|e] ленника, коли наші інфраструктура та технології розвинуться достатньо, щоб ми могли безпосередньо володіти цими землями. Щоб [Concept('annex', 'приєднати')] [Concept('subject', 'ленника')], нам необхідно правити ним більше #Y 10#! років і налагодити добрі стосунки.\n\n@hint! #T Далі межі#!\n[Concept('explorers_with_icon', 'CONCEPT_PLACEHOLDER')|e] розповідають про немислимі багатства, побачені ними в Індії. Однак, подібні підприємства без сучасних [Concept('advances', '@advances! покращень')|e] можуть виявитися непомірно дорогими."
  hint_castile_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_castile_administrative: "$hint_advisor_salute_administrative$"
  hint_castile_military: "$hint_advisor_salute_military$"
  hint_ottomans: "Початкова порада для Османів"
  hint_ottomans_hint_text: "Насувається [Concept('situation', 'ситуація')|e] «Сходження турків» представить унікальну можливість для стрімкого розширення в Грецію та Анатолію. Використовуйте ситуативні [Concept('actions', 'дії')|e], щоб отримати [Concept('casus_belli', '@casus_belli! привід для війни')|e] з сусідами та обрушити на них нашу міць.\n\n@hint! #T Інтегруйте завоювання#!\nНещодавно [Concept('conquered', '@conquered! завойовані')|e] [Concept('locations', 'райони')] необхідно [Concept('integrated', '@integrated! інтегрувати')|e] в нашу адміністрацію за допомогою [Concept('cabinet', '@cabinet! ради')|e], і лише після цього наші завоювання принесуть плоди.\n\n@hint! #T Прокладіть [Concept('roads', 'дороги')] зі [Concept('capital', 'столиці')]#!\n[Concept('control', '@control! Безконтрольні')|e] [Concept('locations', 'райони')] практично марні для нашої адміністрації. Прокладайте [Concept('roads', '@roads! дороги')|e] зі [Concept('capital', '@capital! столиці')|e], щоб збільшити [Concept('proximity', '@proximity! близькість')|e], а отже і [Concept('control', 'контроль')]. Частіше перевіряйте карту [Concept('proximity', 'близькості')]!\n\n@hint! #T Створюйте [Concept('subjects', 'ленників')] для управління завойованими землями#!\nУ міру розширення ви підкорите землі, що лежать за межами нашої [Concept('proximity', 'близькості')]. Радимо вам створювати [Concept('subjects', '@subjects! ленників')|e], які правитимуть ними від вашого імені доти, доки ви не зможете керувати ними безпосередньо.\n\n@hint! #T Приєднуйте [Concept('subject', 'ленників')] у міру покращення [Concept('proximity', 'близькості')]#!\nУ міру розвитку інфраструктури та покращення [Concept('proximity', 'близькості')] з'явиться сенс безпосередньо керувати колись марними землями. Щоб [Concept('annex', '@annex! приєднати')|e] [Concept('subject', 'ленника')] необхідно, щоб ми правили ним більше #Y 10#! років і підтримували добрі стосунки.\n\n@hint! #T Збільште [Concept('maritime_presence', 'морську присутність')]#!\nПересічена місцевість Греції та Анатолії ускладнює підвищення [Concept('proximity', 'близькості')] суходолом. Достатня [Concept('maritime_presence', '@maritime_presence! морська присутність')|e] уздовж узбережжя дозволить ефективніше підвищувати [Concept('proximity', 'близькість')] морем. Зводьте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристані#!#! та #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в містах і відправляйте [Concept('navies', '@navies! флоти')|e] патрулювати узбережжя. Це відіграє особливо важливу роль, якщо ми перенесемо свою [Concept('capital', 'столицю')] до #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!..."
  hint_ottomans_diplomatic: "$hint_advisor_salute_diplomatic$"
  hint_ottomans_administrative: "$hint_advisor_salute_administrative$"
  hint_ottomans_military: "$hint_advisor_salute_military$"