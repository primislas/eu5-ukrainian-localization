  tutorial_lesson_button_finish_tutorial: "Розпочати"
  lesson_basics_welcome: "@caesar! Ласкаво просимо до #italic Europa Universalis V#!"
  lesson_welcome_desc: "Ви уособлюєте дух свого народу, і вам вирішувати, як ці люди житимуть близько п'яти наступних століть своєї історії.\n\nВи можете завоювати весь світ, побудувати ідеальне суспільство або стати могутньою економічною державою. Який би шлях ви не обрали, історія у ваших руках."
  lesson_basics_camera: "@caesar! Камера та керування"
  lesson_basics_camera_desc: "Для початку пробіжимося по основах. Насамперед навчимося орієнтуватися на карті, адже вона — головний елемент гри.\n\nПереглядати карту можна за допомогою клавіш @key_w!, @key_a!, @key_s! та @key_d!.\n\n@centerscroll!#high Колесо миші#! наближає та віддаляє карту.\n\nЩоб побачити одразу весь світ, затисніть @key_tab!."
  lesson_basics_nested_tooltips: "@caesar! Підказки"
  lesson_basics_nested_tooltips_complete: "@caesar! Підказки"
  lesson_basics_nested_tooltips_desc: "Ігрові поняття виділяються синім кольором — по них можна клацнути, щоб побачити докладний опис певного елемента ігрової механіки. Для прикладу візьмемо поняття [Concept('country_with_icon', 'держава')|e].\n\nЗа замовчуванням після появи вкладеної підказки потрібно затримати на ній курсор, доки вона не зафіксується, а потім можна наводити курсор на інші посилання в тексті та викликати додаткові підказки. Також зафіксувати підказку можна за допомогою @centerclick!#high середньої кнопки миші#!.\n\nЗмінити ці налаштування можна в меню #high Налаштування (@key_escape!) > Інтерфейс > Налаштування підказок#!."
  lesson_basics_tooltips_in_tooltips_hover_word: "Наведіть курсор на синій текст"
  lesson_basics_nested_tooltips_continue: "Наведіть курсор на вкладену підказку"
  lesson_basics_your_nation: "[country_icon] Ваша держава"
  lesson_basics_your_nation_desc: "У #high Europa Universalis V#! ви — #high дух нації#!, незрима сутність вашої [Concept('country_with_icon', 'держави')|e].\n\n[country_icon] [GetPlayer.GetLongName] — це ваша [Concept('country', 'держава')] наразі. [GetPlayer.GetGovernment.GetRuler.GetShortName] — її [Concept('ruler_with_icon', 'правитель')|e]."
  lesson_basics_top_bar: "@caesar! Верхня панель"
  lesson_basics_top_bar_desc: "На #high верхню панель#! винесено кілька елементів. Вона завжди залишається на цьому місці, щоб ви могли швидко дізнатися, як живе [Concept('country_with_icon', 'держава')|e].\n\nЗверніть увагу на дату у верхньому правому куті — усе відбувається в #high реальному часі#!. Але не хвилюйтеся, зараз гра стоїть на паузі."
  lesson_basics_estates: "@caesar! Верхня панель"
  lesson_basics_estates_desc: "У крайньому лівому розділі верхньої панелі відображаються [Concept('estates_with_icon', 'стани')|e] — впливові групи в [Concept('country_with_icon', 'державі')|e]. Гравець належить до стану «[GetEstateName('crown_estate')]».\n\nПро стани поговоримо пізніше, а поки просто запам'ятайте, що кожен із них претендує на частку статків і влади держави, а також має рівень [Concept('estate_satisfaction_with_icon', 'задоволення')|e], за яким можна стежити на верхній панелі.\n\nРозподіл влади між станами відбувається нерівномірно, а деяким державам доступні унікальні стани."
  lesson_basics_resources: "@caesar! Верхня панель"
  lesson_basics_resources_desc: "Тепер розглянемо розділи верхньої панелі, присвячені ресурсам і статистиці. Вони розташовуються в середині панелі та дозволяють відстежувати найважливіші ресурси для управління [Concept('country_with_icon', 'державою')|e].\n\nНа більшість дій у грі витрачаються [Concept('gold_with_icon', 'дукати')|e] — від виплати солдатських платень до будівництва міст. Але, зрозуміло, найважливіший ресурс — це [Concept('population_with_icon', 'населення')|e], фундамент вашої політики, економіки та армії.\n\nКрім того, вкрай важливий показник [Concept('stability_with_icon', 'стабільності')|e] — це міра внутрішньої стійкості держави, яка впливає на вірність [Concept('estates', 'станів')] і [Concept('population', 'населення')]. Стабільність дозволяє впливати на політику [Concept('country', 'держави')].\n\nСвого часу ми обговоримо інші показники, а поки продовжимо."
  lesson_basics_time_and_research: "@caesar! Час"
  lesson_basics_time_and_research_desc: "#high Europa Universalis V#! охоплює кілька століть світової історії. Поточна дата відображається у правому верхньому куті екрана, там же можна керувати швидкістю гри.\n\nВесь ігровий час розділено на шість [Concept('ages', 'епох')|e]. Зараз триває епоха #TOOLTIP:AGE,age_1_traditions,X #L Традицій#!#!, яка в #high 1342#! році зміниться епохою #TOOLTIP:AGE,age_2_renaissance,X #L Відродження#!#!. У кожну епоху можна досліджувати нові [Concept('advances_with_icon', 'покращення')|e].\n\nЯк ми вже говорили, зараз гра на паузі, тому ви нічого не пропустите."
  lesson_basics_wrap_up_0: "@caesar! Основні панелі"
  lesson_basics_wrap_up_0_desc: "Давайте розглянемо базові елементи інтерфейсу. У верхньому лівому куті розташовані вісім панелей — їм ви приділятимете найпильнішу увагу під час гри.\n\nЦе @government_panel![Link('government', '', 'уряд')], @economy_panel![Link('economy', '', 'економіка')], @production_panel![Link('production', '', 'виробництво')], @society_panel![Link('country_culture', '', 'суспільство')], @diplomacy_panel![Link('diplomacy', '', 'дипломатія')], @military_panel![Link('unit_overview', '', 'армія')], @geopolitics_panel![Link('expansion', '', 'геополітика')] та @advances_panel![Link('advances', '', 'покращення')]."
  lesson_basics_wrap_up_2: "@hint! Поради"
  lesson_basics_wrap_up_2b: "Hints 2b"
  lesson_basics_wrap_up_2_desc: "Крім вікон з ігровими поняттями, які зустрічаються в грі повсюдно, деякі елементи ігрової механіки супроводжуються порадами — це більш докладні описи з прикладами.\n\nОтримати пораду можна в будь-який момент через @hint![Link('hints', '', 'панель порад')].\n\n@hint! Якщо ви бачите цей значок у підказці, клацніть по ньому, щоб відкрити відповідну пораду."
  lesson_basics_open_hints: "Відкрийте панель порад"
  lesson_basics_close_hints: "Закрийте панель порад"
  lesson_core_loop_0: "@caesar! Вступ до ігрового процесу"
  lesson_core_loop_0_desc: "#high Europa Universalis V#! — масштабна гра, що відкриває перед гравцем незліченну безліч стратегій і можливостей.\n\nВи — безжальний завойовник? А може, хитромудрий політик? Або правитель, що володіє секретами царя Мідаса? У будь-якому випадку почати вам доведеться з основ. Давайте ж з ними познайомимося!"
  lesson_core_loop_1: "[gold_icon] Баланс"
  lesson_core_loop_1_desc: "Ми вже згадували, що [Concept('gold_with_icon', 'дукати')|e] — один із найважливіших ігрових ресурсів. Ними оплачується більшість дій, і часто успіх ваших спроб диктувати свою волю всередині та поза межами [Concept('country_with_icon', 'держави')|e] залежатиме від доступного вам багатства. Шлях до влади над світом вимощений золотом і кров'ю.\n\nБільшою частиною фінансів можна керувати на [Link('economy', '', '@economy_panel! панелі балансу')]. Розглянемо її уважніше."
  lesson_core_loop_open_balance: "Відкрийте панель балансу"
  lesson_core_loop_2: "[gold_icon] Баланс"
  lesson_core_loop_2_desc: "Це зведення про ваш [Concept('budget_with_icon', 'баланс')|e]. Різниця між [Concept('income_with_icon', 'доходами')|e] та [Concept('expenses_with_icon', 'витратами')|e] наприкінці кожного місяця надходить до вашої [Concept('treasury_with_icon', 'скарбниці')|e]. Рухайте повзунки на цій панелі, щоб керувати щомісячним [Concept('balance', 'балансом')].\n\nЯк ми щойно побачили, різниця між щомісячними доходами та витратами також відображається на #high верхній панелі#!."
  lesson_core_loop_3: "[taxes_icon] Податки"
  lesson_core_loop_3_desc: "Багатство держави в #high Europa Universalis V#! щомісячно забезпечують належні вам території — [Concept('locations_with_icon', 'райони')|e].\n\nПро райони ми поговоримо пізніше, а поки що наведіть курсор на значення [Concept('tax_base_with_icon', 'податкової бази')|e] у верхньому лівому куті, щоб побачити зведення по найбагатших районах. [country_icon] [Player.GetLongName] отриму[Player.Custom('endlong_etyut')] [Concept('gold_with_icon', 'дукати')|e] саме звідси."
  lesson_core_loop_4: "[taxes_icon] Податки"
  lesson_core_loop_4_desc: "Однак ці [Concept('gold_with_icon', 'дукати')|e] не відправляються до вашої [Concept('treasury_with_icon', 'скарбниці')|e] безпосередньо. Уряд збирає [Concept('taxes_with_icon', 'податки')|e] з ваших [Concept('estates_with_icon', 'станів')|e] і отримує лише частку їхньої [Concept('tax_base_with_icon', 'податкової бази')|e].\n\nЗа допомогою повзунків на панелі балансу можна налаштовувати рівень оподаткування. Зверніть увагу: чим більше стягується податків, тим нижче [Concept('estate_satisfaction_with_icon', 'задоволення стану')|e]. Станам не подобається платити податки.\n\n[Concept('maximum_tax_with_icon', 'Максимальний податок')|e], який можна збирати з кожного стану, залежить від безлічі факторів, наприклад його впливовості. Буває, що стягнути податок зі стану зовсім неможливо.\n\nПоки що найкраще автоматизувати оподаткування — для цього клацніть по значку @automation! #W шестерні#!. В результаті податки будуть достатньо великими, але при цьому [estate_satisfaction_icon] не опуститься нижче #G 50%#!, як тільки ви знімете гру з паузи."
  lesson_core_loop_automate_taxes: "Автоматизуйте податки для всіх станів"
  lesson_core_loop_5: "[income_icon] Щомісячний дохід"
  lesson_core_loop_5_desc: "Ще один вид [Concept('income_with_icon', 'доходу')|e] крім [Concept('taxes_with_icon', 'оподаткування')|e] — це [Concept('minting_with_icon', 'карбування монет')|e]. Їх можна карбувати вільно, але занадто велика кількість викличе [Concept('inflation_with_icon', 'інфляцію')|e].\n\nДізнатися більше про [Concept('inflation', 'інфляцію')] можна [Link('hints', 'selected_hint = hint_inflation_with_icon', 'тут')]."
  lesson_core_loop_minting: "Перемістіть повзунки карбування, щоб відкарбувати кілька дзвінких дукатів"
  lesson_core_loop_inflation: "Намагайтеся не викликати інфляцію"
  lesson_core_loop_6: "[income_icon] Щомісячний дохід"
  lesson_core_loop_6_desc: "Ще два поширені джерела [Concept('income_with_icon', 'доходів')|e] — [Concept('trade_with_icon', 'торгівля')|e] та [Concept('food_with_icon', 'їжа')|e]. Ці поняття досить широкі, тому поки ми не будемо їх детально розглядати. Коли будете готові їх вивчити, відкрийте ці поради:\n\n$TAB$[Link('hints', 'selected_hint = hint_trade_with_icon', 'Порада щодо торгівлі')]\n$TAB$[Link('hints', 'selected_hint = hint_food_with_icon', 'Порада щодо їжі')]"
  lesson_core_loop_7: "@caesar! Відновлення гри"
  lesson_core_loop_7_desc: "Давайте ненадовго відновимо хід ігрового часу, а потім подивимося на [Concept('expenses_with_icon', 'витрати')|e].\n\n#high Швидкість#! ігрового часу можна налаштувати на #high верхній панелі#!. Непоганий темп на початку гри — #high 3#! або #high 4#!, але у кожного гравця тут свої вподобання.\n\nТакож можна натиснути @key_space!, щоб поставити гру на #high паузу#! та #high відновити#! її в будь-який момент."
  lesson_core_loop_unpause_month: "Відновіть гру і дочекайтеся кінця місяця, коли показники оновляться"
  lesson_core_loop_7b: "@caesar! Відновлення гри"
  lesson_core_loop_7b_desc: "Добре! Минув місяць, і ми знову ставимо гру на #high паузу#!.\n\nЗверніть увагу, що показники змінилися, а ваші [Concept('estates_with_icon', 'стани')|e] виплачують [Concept('taxes_with_icon', 'податки')|e] у заданому розмірі. Безліч ігрових розрахунків відбувається наприкінці місяця.\n\nТепер вивчимо [Concept('expenses_with_icon', 'витрати')|e]."
  lesson_core_loop_8: "[expenses_icon] Щомісячні витрати"
  lesson_core_loop_8_desc: "Зазвичай [Concept('gold_with_icon', 'дукати')|e] витрачаються відразу, як здійснюється та чи інша дія. Але навіть якщо ви не витрачаєте [Concept('gold', 'дукати')] активно, на ваш [Concept('budget_with_icon', 'баланс')|e] все одно лягає навантаження у вигляді регулярних щомісячних [Concept('expenses_with_icon', 'витрат')|e].\n\n[Concept('gold', 'Дукати')] можна витрачати на підвищення [Concept('stability_with_icon', 'стабільності')|e] та [Concept('legitimacy_with_icon', 'легітимності')|e] — два ці найважливіші показники ми вже бачили на #high верхній панелі#!. Найкраще досягти положення, при якому вони не будуть хоча б знижуватися.\n\nВитрати на [Concept('maintenance_with_icon', 'утримання')|e] регулярних [Concept('armies_with_icon', 'армій')|e], [Concept('navies_with_icon', 'флотів')|e] та діючих [Concept('fortifications_with_icon', 'укріплень')|e] можуть помітно вдарити по [Concept('budget', 'балансу')]. У мирний час буде розумним кроком зменшити витрати на їхнє [Concept('maintenance', 'утримання')]."
  lesson_core_loop_positive_income: "За допомогою повзунків балансу досягніть його позитивного щомісячного значення"
  lesson_core_loop_9: "[budget_icon] Баланс: підсумки"
  lesson_core_loop_9_desc: "Чудово! Ви розібралися в основах управління [Concept('budget_with_icon', 'балансом')|e]. Підведемо короткий підсумок:\n\n$BULLET$[Concept('income_with_icon', 'Доходи')|e] та [Concept('expenses_with_icon', 'витрати')|e] підраховуються наприкінці місяця.\n\n$BULLET$Отримувані в [Concept('locations_with_icon', 'районах')|e] [Concept('gold_with_icon', 'дукати')|e] збирають [Concept('estates', 'стани')], ви стягуєте [Concept('tax_with_icon', 'податки')|e] зі станів і поповнюєте [Concept('treasury_with_icon', 'скарбницю')|e].\n\n$BULLET$Зазвичай [Concept('estates_with_icon', 'стани')|e] платять податки без особливого ентузіазму.\n\n\nАле ви вже напевно задаєтеся питанням: «Та хто такі ці [Concept('estates', 'стани')], і чому вони не виконують кожен наш каприз?»"
  lesson_estates_1: "[estates_icon] Правителі та стани"
  lesson_estates_1_desc: "[Concept('estates_with_icon', 'Стани')|e] в #high Europa Universalis V#! — це один із ключових елементів гри. Вони не тільки платять [Concept('taxes_with_icon', 'податки')|e], але й у всьому допомагають, якщо вірні вам, або ж підступно шкодять, якщо не лояльні.\n\nРозглянемо їх ближче на @government_panel![Link('government', 'tabcontent = estates', 'панелі уряду')]."
  lesson_estates_2: "[crown_power_icon] Правителі"
  lesson_estates_2_desc: "Перед вами [Concept('estates_with_icon', 'стани')|e] — це соціальні групи, що володіють [Concept('political_power', 'політичною вагою')] у вашій [Concept('country_with_icon', 'державі')|e]. У кожного з них своя частка [Concept('estate_power_with_icon', 'станової влади')|e]. Особисто ви втілюєте собою націю, тому належите до стану «[GetEstateName('crown_estate')]».\n\nЗа допомогою [Concept('crown_power_with_icon', 'влади правителя')|e] можна безпосередньо впливати на певні інтереси [Concept('estate', 'станів')]: вона дозволяє підвищувати [Concept('taxes_with_icon', 'податки')|e], впливає на зростання вашої підтримки в [Concept('parliament_with_icon', 'парламенті')|e] та [Concept('estate_satisfaction_with_icon', 'задоволення станів')|e], спрощує зміну [Concept('laws_with_icon', 'законів')|e] та дозволяє забирати частину доходів від [Concept('trade_with_icon', 'торгівлі')|e].\n\n@hint! Дізнатися більше про владу правителя можна [Link('hints', 'selected_hint = hint_crown_power', 'тут')]."
  lesson_estates_3: "[estates_icon] Стани"
  lesson_estates_3_desc: "При правильному поводженні [Concept('estates_with_icon', 'стани')|e] вам сильно допоможуть, але якщо їх роздратувати, вони швидко перетворяться на прикру занозу.\n\nКрім сплати [Concept('taxes_with_icon', 'податків')|e] до вашої скарбниці, [Concept('estates', 'стани')] відіграють важливу роль під час [Concept('war_with_icon', 'війни')|e], оскільки надають [Concept('levies_with_icon', 'ополчення')|e] — доти, доки ви не заведете [Concept('regular_regiments_with_icon', 'регулярні війська')|e].\n\nАле якщо стани перестануть бути вам вірними, то у них з'явиться можливість підтримати [Concept('rebellions_with_icon', 'заколоти')|e], влаштувати [Concept('civil_war_with_icon', 'громадянську війну')|e] та скинути вас.\n\nІ, нарешті, при задоволенні вище #G 50%#! [estate_satisfaction_icon] стани дають вашій [Concept('country_with_icon', 'державі')|e] різні переваги, а незадоволення станів тягне за собою штрафи."
  lesson_estates_4: "[privileges_icon] Привілеї"
  lesson_estates_4_desc: "[Concept('estates', 'Станам')] можна дарувати [Concept('privileges_with_icon', 'привілеї')|e], які зазвичай підвищують [Concept('estate_satisfaction_with_icon', 'задоволення')|e] та збільшують [Concept('estate_power_with_icon', 'станову владу')|e], а також тим чи іншим чином впливають на державу та ваш народ.\n\nСкасування привілеїв роздратує та послабить стан. Це ризикована дія з високою ймовірністю обвалить [Concept('stability_with_icon', 'стабільність')|e].\n\nТаким чином, привілеї посилюють владу станів (і, відповідно, послаблюють вашу [Concept('crown_power_with_icon', 'владу правителя')|e]), але іноді це може бути для вас вигідно. Своєчасна роздача привілеїв потрібним станам може бути мудрим рішенням, завдяки якому можна, наприклад, придушити [Concept('rebellion_with_icon', 'заколотні настрої')|e] в зародку. Жоден монарх не може правити наодинці."
  lesson_estates_5: "[pop_type_icon|e] Суспільні класи"
  lesson_estates_5_desc: "[Concept('estates_with_icon', 'Станова')|e] [Concept('estate_power_with_icon', 'влада')|e] залежить не тільки від [Concept('privileges', 'привілеїв')], але здебільшого від соціального складу вашого [Concept('population_with_icon', 'населення')|e].\n\n[Concept('population', 'Воно')] складається з кількох [Concept('pop_types_with_icon', 'суспільних класів')|e], кожен з яких надає підтримку певному [Concept('estate', 'стану')]:\n\n$BULLET_WITH_TAB$[GetEstateName('nobles_estate')] отримують підтримку від класу @nobles! #TOOLTIP:POPTYPE,nobles,X #L аристократії#!#!\n$BULLET_WITH_TAB$[GetEstateName('clergy_estate')] отримують підтримку від класу @clergy! #TOOLTIP:POPTYPE,clergy,X #L духовенства#!#!\n$BULLET_WITH_TAB$[GetEstateName('burghers_estate')] отримують підтримку від класу @burghers! #TOOLTIP:POPTYPE,burghers,X #L міських жителів#!#!\n$BULLET_WITH_TAB$[GetEstateName('peasants_estate')] отримують підтримку від наступних класів:\n$TAB$$BULLET_WITH_TAB$@peasants! #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, @laborers! #TOOLTIP:POPTYPE,laborers,X #L робітники#!#! та @soldiers! #TOOLTIP:POPTYPE,soldiers,X #L солдати#!#!.\n\n[Concept('population', 'Населення')] живе і вмирає в різних [Concept('locations_with_icon', 'районах')|e] вашої карти. Розглянемо ці території уважніше."
  lesson_map_1: "[known_world_icon] Карта"
  lesson_map_1_desc: "У світі #high Europa Universalis V#! є безліч [Concept('countries_with_icon', 'держав')|e], кожна з яких володіє різними [Concept('locations_with_icon', 'районами')|e] карти. На цих територіях видобуваються ресурси та набираються рекрути для протистояння з іншими країнами.\n\nВіддаливши камеру, можна побачити на карті назви [Concept('country', 'держав')]. Якщо навести на назву курсор, з'явиться невелика підказка про [Concept('country', 'державу')], а при клацанні по ній відкриється #high панель держави#!, де можна дізнатися більше подробиць і вибрати, як з нею взаємодіяти."
  lesson_trigger_zoom_out: "@centerscroll! Віддаліть камеру, щоб побачити держави"
  lesson_trigger_foreign_country: "Відкрийте панель чужої держави, @leftclick!#high клацнувши по її назві лівою кнопкою#!"
  lesson_map_2: "[known_world_icon] Карта"
  lesson_map_2_desc: "У #high Europa Universalis V#! основу економічного та політичного життя [Concept('countries_with_icon', 'держави')|e] становлять [Concept('locations_with_icon', 'райони')|e]. Саме тут живуть [Concept('population_with_icon', 'люди')|e] різних [Concept('pop_types_with_icon', 'класів')|e], [Concept('religions_with_icon', 'релігій')|e] та [Concept('cultures_with_icon', 'культур')|e], які виробляють [Concept('goods_with_icon', 'товари')|e] та генерують [Concept('tax_base_with_icon', 'податкову базу')|e].\n\n[Concept('locations', 'Райони')] бувають трьох [Concept('location_rank_with_icon', 'рангів')|e]:\n$BULLET_WITH_TAB$@city! #TOOLTIP:LOCATIONRANK,city,X #L місто#!#!\n$BULLET_WITH_TAB$@town! #TOOLTIP:LOCATIONRANK,town,X #L містечко#!#!\n$BULLET_WITH_TAB$@rural_settlement! #TOOLTIP:LOCATIONRANK,rural_settlement,X #L сільська територія#!#!\n\nКожен ранг відрізняється набором [Concept('pop_types', 'суспільних класів')], [Concept('buildings_with_icon', 'споруд')|e] та модифікаторів."
  lesson_map_3: "[known_world_icon] Карта"
  lesson_map_3_desc: "Найважливішим [Concept('location_with_icon', 'районом')|e] будь-якої [Concept('country_with_icon', 'держави')|e] є її [Concept('capital_with_icon', 'столиця')|e]. Ваша [Concept('capital', 'столиця')] — [Player.GetCapital.GetName]. На карті вона позначена золотою зіркою всередині значка [Concept('location_rank', 'рангу')|e] (@city_capital!/@town_capital!/@rural_settlement_capital!).\n\n$BULLET$Якщо @leftclick!#high двічі клацнути#! по прапору своєї держави на #high верхній панелі#!, можна перемістити камеру до столиці.\n\n$BULLET$А щоб знайти будь-який [Concept('location', 'район')], можна натиснути @key_f! і набрати у вікні [Link('find_location', '', '@finder_panel!пошуку')] його назву."
  lesson_trigger_zoom_in: " @centerscroll! Наблизьте камеру, щоб побачити райони"
  lesson_trigger_capital: "@leftclick!#high Клацніть#! по своїй столиці, місту [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_control_groups_1: "@caesar! Контрольні групи"
  lesson_control_groups_1_desc: "Перш ніж ознайомитися зі столицею, давайте спочатку розглянемо #high контрольні групи#!. Вони розташовуються в нижній частині екрана і служать для швидкого доступу до різних елементів гри.\n\nТак, ви можете призначити [Concept('locations_with_icon', 'райони')|e], [Concept('countries_with_icon', 'держави')|e], [Concept('markets_with_icon', 'ринки')|e], [Concept('armies_with_icon', 'армії')|e] та інші елементи на зручні вам цифрові клавіші. Спробуйте призначити в контрольну групу свою [Concept('capital_with_icon', 'столицю')|e], місто [location_icon] [Player.GetCapital.GetNameWithNoTooltip].\n\nДля цього відкрийте панель міста та натисніть клавіші #high Ctrl + 1#!."
  lesson_basics_click_map: "@leftclick!#high Клацніть#! по місту [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_basics_assign_control_group: "Натисніть #high Ctrl+1#!, щоб додати місто до контрольної групи"
  lesson_control_groups_2: "@caesar! Контрольні групи"
  lesson_control_groups_2_desc: "Чудово! Тепер, натиснувши вибрану клавішу, ви переміститеся до міста [location_icon] [Player.GetCapital.GetName] та відкриєте його панель.\n\nЩоб очистити контрольну групу, можна клацнути по ній @rightclick!#high правою кнопкою миші#! або знову натиснути #high Ctrl#! та відповідну клавішу."
  lesson_location_1: "[location_icon] Район"
  lesson_location_1_desc: "Тепер давайте вивчимо #high панель району#!.\n\nУ кожному [Concept('location_with_icon', 'районі')|e] живуть представники різних [Concept('pop_types_with_icon', 'суспільних класів')|e]. Як ви вже бачили, [Concept('pops_with_icon', 'групи населення')|e] збільшують [Concept('estate_power_with_icon', 'владу')|e] своїх [Concept('estate_with_icon', 'станів')|e].\n\nКількість [Concept('pops', 'груп населення')] у кожному [Concept('pop_type', 'класі')] залежить насамперед від [Concept('buildings_with_icon', 'споруд')|e] [Concept('location', 'району')]. Їх можете будувати ви або самі стани, а для роботи там потрібні представники конкретних [Concept('pop_type', 'класів')]. Коли споруда буде зведена, @peasants! #TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! автоматично [Concept('promote_with_icon', 'підвищаться')|e] до потрібного [Concept('pop_type', 'класу')], щоб зайняти там робочі місця.\n\nДеякі [Concept('buildings', 'споруди')] виробляють [Concept('goods_with_icon', 'товари')|e], які потім продаються на [Concept('market_with_icon', 'ринку')|e] і тим самим формують [Concept('wealth_with_icon', 'багатство')|e] [Concept('location', 'району')]."
  lesson_location_2: "[rgo_icon] Видобуток ресурсів"
  lesson_location_2_desc: "Коли гра починається, ще не у всіх [Concept('locations_with_icon', 'районах')|e] є [Concept('buildings_with_icon', 'споруди')|e], але при цьому кожен з них спеціалізується на виробництві конкретного [Concept('good_with_icon', 'товару')|e] в місцях #high [Concept('rgo_with_icon', 'видобутку')|e]#! — це особливий вид споруд, де @laborers! #TOOLTIP:POPTYPE,laborers,X #L робітники#!#! видобувають [Concept('raw_materials_with_icon', 'ресурси')|e].\n\nЯк і у випадку з [Concept('buildings', 'спорудами')], [Concept('goods', 'товари')] з місць [Concept('rgo', 'видобутку ресурсів')] продаються на місцевому [Concept('market_with_icon', 'ринку')|e], формуючи [Concept('tax_base_with_icon', 'податкову базу')|e] [Concept('location', 'району')]. Спочатку більшу частину цієї [Concept('tax_base', 'бази')] формуватиме [Concept('rgo', 'видобуток ресурсів')].\n\n@hint! Дізнатися більше про [Concept('markets', 'ринки')] можна [Link('hints', 'selected_hint = hint_markets', 'тут')]."
  lesson_location_3: "[wealth_icon] Багатство районів"
  lesson_location_3b: "[wealth_icon] Багатство районів"
  lesson_location_3_desc: "Як ми вже побачили, доходи від [Concept('buildings_with_icon', 'споруд')|e] та [Concept('rgo_with_icon', 'видобутку ресурсів')|e] формують [Concept('wealth_with_icon', 'багатство')|e] [Concept('location_with_icon', 'району')|e]. Потім [Concept('wealth', 'багатство')] розподіляється між [Concept('estates_with_icon', 'станами')|e] згідно з їхньою чисельністю в даному [Concept('location', 'районі')].\n\nВрахуйте, що лише частина цих [Concept('gold_with_icon', 'дукатів')|e] доходить до вашої скарбниці у вигляді [Concept('taxes_with_icon', 'податків')|e].\n\n#weak Наприклад, [Concept('wealth', 'багатство')] [Player.GetCapital.Custom('LR_GEN')|l] [location_icon] [Player.GetCapital.GetName] становить [Player.GetCapital.GetTotalPossibleTaxBase|2W] [tax_base_icon], з яких [Concept('estates', 'стани')] виплачують [Player.GetCapital.GetTotalIncome|2g][gold_icon] податків.#!"
  lesson_basics_hover_tax_base: "Наведіть курсор на багатство, щоб подивитися, як саме воно розподіляється між станами"
  lesson_location_3_recap: "@caesar! Підіб'ємо підсумки!"
  lesson_location_3_recap_desc: "[Concept('buildings_with_icon', 'Споруди')|e] та [Concept('rgo_with_icon', 'місця видобутку ресурсів')|e] у ваших [Concept('locations_with_icon', 'районах')|e] використовують найману працю [Concept('pops_with_icon', 'груп населення')|e], щоб створювати [Concept('wealth_with_icon', 'багатство')|e]. [Concept('wealth', 'Багатство')] потім розподіляється між вашими [Concept('estates_with_icon', 'станами')|e], які, своєю чергою, забезпечують вас [Concept('taxes_with_icon', 'податками')|e] та [Concept('levies_with_icon', 'ополченням')|e]."
  lesson_location_4: "[control_icon] Контроль"
  lesson_location_4_desc: "Однак умови в усіх [Concept('locations_with_icon', 'районах')|e] різні. Давайте поговоримо про [Concept('control_with_icon', 'контроль')|e] — одну з найважливіших характеристик району.\n\n[Concept('control', 'Контроль')] відображає ступінь впливу центрального уряду на конкретний район. Крім іншого, цей показник визначає [Concept('tax_base_with_icon', 'податкову базу')|e] району, тобто частку його [Concept('wealth_with_icon', 'багатства')|e], з якої ви можете отримувати [Concept('taxes_with_icon', 'податки')|e]. Багатство, яке не перебуває під вашим контролем, [Concept('taxes', 'податками')] не обкладається і повністю дістається вашим [Concept('estates_with_icon', 'станам')|e].\n\n#weak Ви [Concept('control', 'контролюєте')] свою [Concept('capital', 'столицю')] на #W 100%#!, тому податкова база становить #W 100%#! її багатства і вам надходять податки з усіх доходів столиці.#!"
  lesson_location_5: "[proximity_icon] Досяжність"
  lesson_location_5_desc: "[Concept('control_with_icon', 'Контроль')|e] над [Concept('location_with_icon', 'районом')|e] безпосередньо залежить від його [Concept('proximity_with_icon', 'досяжності')|e] щодо вашої [Concept('capital_with_icon', 'столиці')|e].\n\nОсь чому [Concept(capital', 'столиця')] є одним із найважливіших [Concept('locations', 'районів')]: тут у вас завжди багато [Concept('control', 'контролю')], а отже, місцеві [Concept('buildings_with_icon', 'споруди')|e] та місця [Concept('rgo_with_icon', 'видобутку ресурсів')|e] приносять вам найбільший [Concept('income_with_icon', 'дохід')|e].\n\n@hint! Дізнатися більше про [Concept('proximity', 'досяжність')] та [Concept('proximity', 'контроль')] можна [Link('hints', 'selected_hint = hint_control', 'тут')]."
  lesson_mapmodes_1: "@mapmode! Режими карти"
  lesson_mapmodes_1_desc: "Давайте розглянемо #high режими карти#!. Це фільтри, які дозволяють окремо аналізувати різні світові показники на карті.\n\nСпробуйте навести курсор на підказку про [Concept('control_with_icon', 'контроль')|e], відкривши панель району. У правому верхньому куті вікна підказки ви побачите кнопку для перемикання режиму карти. @leftclick!#high Клацнувши#! по цій кнопці, ви побачите [Concept('control', 'контроль')] у всіх ваших [Concept('locations_with_icon', 'районах')]."
  lesson_basics_control_mapmode: "Наведіть курсор на підказку про контроль"
  lesson_basics_control_mapmode_2: "@leftclick!#high Клацніть#! по кнопці режиму карти в заголовку підказки, щоб побачити контроль"
  lesson_mapmodes_1b: "@mapmode! Режими карти"
  lesson_mapmodes_1c: "@mapmode! Режими карти"
  lesson_mapmodes_1b_desc: "Зараз на карті відображається [Concept('control_with_icon', 'контроль')|e] над вашими володіннями. Зверніть увагу: чим далі [Concept('locations_with_icon', 'райони')|e] від [Concept('capital_with_icon', 'столиці')|e], тим менше у вас над ними [Concept('control', 'контролю')]. У зв'язку з цим найбільш віддалені [Concept('locations', 'райони')] приноситимуть набагато менше користі, ніж інші, доки там не з'явиться більш розвинена інфраструктура.\n\n@leftclick!#high Клацнувши#! по будь-якій іншій [Concept('countries_with_icon', 'державі')|e] в цьому режимі карти, можна побачити її рівень [Concept('control', 'контролю')] над землями."
  lesson_mapmodes_2: "@mapmode! Режими карти"
  lesson_mapmodes_2a: "@mapmode! Режими карти"
  lesson_mapmodes_2_desc: "Тепер давайте переключимося на режим огляду [Concept('proximity_with_icon', 'досяжності')|e]. Його також можна увімкнути через вікно відповідної підказки, як ви вже робили раніше для огляду [Concept('control_with_icon', 'контролю')|e]."
  lesson_basics_proximity_mapmode: "Наведіть курсор на підказку про досяжність"
  lesson_basics_proximity_mapmode_2: "@leftclick!#high Клацніть#! по кнопці режиму карти в заголовку підказки, щоб побачити досяжність"
  lesson_mapmodes_2b: "@mapmode! Режими карти"
  lesson_mapmodes_2b_desc: "У режимі огляду [Concept('proximity_with_icon', 'досяжності')|e] можна побачити, як далеко [Concept('locations_with_icon', 'райони')|e] знаходяться від вашої [Concept('capital_with_icon', 'столиці')|e].\n\nВи вже могли помітити, що вздовж річок і рівнин [Concept('proximity', 'досяжність')] вища, а гори та ліси, навпаки, значно знижують її. [Concept('topography_with_icon', 'Рельєф')] та [Concept('vegetation_with_icon', 'рослинність')] відіграють важливу роль при розрахунку [Concept('proximity', 'досяжності')]. Втім, негативні ефекти від них можна нівелювати, будуючи об'єкти інфраструктури, наприклад [Concept('roads_with_icon', 'дороги')|e] та [Concept('ports_with_icon', 'порти')|e].\n\n@leftclick!#high Клацнувши#! по [Concept('locations_with_icon', 'району')] в цьому режимі карти, можна подивитися, як саме прокладено шлях між районом і столицею."
  lesson_basics_map_modes: "@mapmode! Режими карти"
  lesson_basics_map_modes_complete: "@mapmode! Режими карти"
  lesson_basics_map_modes_desc: "У грі є десятки #high режимів карти#!, що відображають найрізноманітніші показники.\n\nВи можете вивчати розташування [Concept('markets_with_icon', 'ринків')|e] у світі, розподіл [Concept('population_with_icon', 'населення')|e] у вашій [Concept('country_with_icon', 'державі')|e] та багато іншого.\n\nУсі #high режими карти#! можна переглянути, навівши курсор на відповідний значок унизу екрана. З ними можна ознайомитися прямо зараз, але в рамках цього навчання більша їх частина нам не знадобиться.\n\nЩоб повернутися до стандартного режиму карти, можна натиснути #high Ctrl+Q#! або вибрати його на панелі режимів карт."
  lesson_basics_open_map_mode_widget: "Відкрийте панель режимів карти (виділено)"
  lesson_basics_return_map_mode_widget: "Поверніться до стандартного режиму карти (ландшафт) за допомогою клавіш #high Ctrl+Q#!"
  lesson_road: "[road_icon] Дороги"
  lesson_road_desc: "Як ми вже з'ясували, для [Concept('control_with_icon', 'контролю')|e] над територіями потрібна висока [Concept('proximity_with_icon', 'досяжність')|e]. Але як її підвищити?\n\nЄ різні способи, але один з основних — це будівництво [Concept('roads_with_icon', 'доріг')|e]. [Concept('roads', 'Дорога')] покращує зв'язок між двома [Concept('locations_with_icon', 'районами')|e] та підвищує [Concept('proximity', 'досяжність')|e] для всіх [Concept('locations', 'районів')], чий шлях до [Concept('capital_with_icon', 'столиці')|e] лежить через цю дорогу.\n\nДавайте побудуємо [Concept('road', 'дорогу')] від міста [location_icon] [Player.GetCapital.GetName] до одного з районів. Це обійдеться нам у певну кількість [Concept('gold_with_icon', 'дукатів')|e]."
  lesson_basics_road1: "Відкрийте панель міста [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_basics_road2: "@leftclick!#high Клацніть#! по значку конструктора доріг, щоб побудувати [Concept('road', 'дорогу')] від своєї [Concept('capital', 'столиці')]"
  lesson_basics_road3: "@leftclick!#high Клацніть#! по будь-якому сусідньому [Concept('location', 'району')] на карті, щоб розпочати будівництво"
  lesson_road_2: "[road_icon] Дороги"
  lesson_road_2_desc: "Чудово! [Concept('construction_with_icon', 'Будівництво')|e] [Concept('road_with_icon', 'дороги')|e] почалося. На це піде кілька місяців. Прогрес будівництва можна відстежувати за круглим значком над вашою [Concept('capital_with_icon', 'столицею')|e].\n\nКоли дорога буде готова, [Concept('proximity_with_icon', 'досяжність')|e] обраного [Concept('location', 'району')] підвищиться, а з нею і [Concept('control_with_icon', 'контроль')|e] над ним.\n\n[Concept('construction', 'Будівництво')] [Concept('buildings_with_icon', 'споруд')|e] та місць [Concept('rgo_with_icon', 'видобутку ресурсів')|e], а також створення [Concept('regiments_with_icon', 'полків')|e] працює схожим чином. Усе це вимагає часу та ресурсів у вигляді [Concept('gold_with_icon', 'дукатів')|e] та [Concept('goods_with_icon', 'товарів')|e] з [Concept('market_with_icon', 'ринку')|e]."
  lesson_road_3: "[road_icon] Усі дороги ведуть до міста [Player.GetCapital.GetNameWithNoTooltip]"
  lesson_road_3_desc: "[Concept('proximity_with_icon', 'Досяжність')|e] та [Concept('control_with_icon', 'контроль')|e] — одні з найважливіших механік у @caesar!#W Europa Universalis V#!. [Concept('crown_power_with_icon', 'Влада правителя')|e], [Concept('tax_base_with_icon', 'податкова база')|e] та розмір [Concept('levies_with_icon', 'ополчення')|e] безпосередньо визначаються контролем над районами, який своєю чергою залежить від їхньої близькості до [Concept('capital_with_icon', 'столиці')|e]. Це означає, що прокладання [Concept('roads_with_icon', 'доріг')|e] від столиці має першочергове значення для всіх країн, незалежно від їхнього розміру.\n\nКрім доріг, близькість можна покращити за рахунок морських шляхів, хоча для цього знадобиться гавань відповідного [Concept('harbor_capacity_with_icon', 'розміру')] та достатня [Concept('maritime_presence_with_icon', 'морська присутність')|e]."
  tutorial_diagram_belong_to: "Належить:"
  tutorial_diagram_provide: "Забезпечити"
  tutorial_diagram_employ: "Найняти"
  tutorial_diagram_create: "Створити"
  tutorial_diagram_buildings_rgo: "Споруди та видобуток ресурсів"
  tutorial_diagram_harbors: "Гавані"
  tutorial_diagram_increases: "Збільшити"
  tutorial_diagram_decreases: "Зменшити"
  tutorial_diagram_affects: "Вплинути"
  tutorial_diagram_improves: "Покращити"
  lesson_basics_wrap_up_3: "@caesar! Планувальник"
  lesson_basics_wrap_up_3b: "@caesar! Планувальник"
  lesson_basics_wrap_up_3_desc: "Перш ніж закінчити навчання, розгляньмо ще кілька важливих елементів інтерфейсу. Перший із них — це #high планувальник#!.\n\nВін дозволяє відстежувати різні показники вашої [Concept('country', 'держави')]. Наприклад, у розділі [Concept('construction_with_icon', 'будівництва')|e] ви можете побачити процес будівництва тієї самої [Concept('road_with_icon', 'дороги')|e], яку нещодавно наказали прокласти.\n\nПланувальник можна налаштовувати на свій розсуд. Як і у випадку з #high контрольними групами#!, тут можна закріпити безліч різних елементів, включно з [Concept('countries_with_icon', 'державами')|e], [Concept('markets_with_icon', 'ринками')|e], [Concept('armies_with_icon', 'арміями')|e] та іншим.\n\nДля цього стане в пригоді #high контекстне меню#!, яке можна викликати, @rightclick!#high клацнувши правою кнопкою миші#! по [Concept('location_with_icon', 'району')|e] або державі на карті.\n\nСпробуйте клацнути @rightclick!правою кнопкою миші по карті та знайти у вікні, що з’явиться, значок @pin_icon!."
  lesson_basics_add_outliner: "Закріпіть державу або район у #high планувальнику#!"
  lesson_basics_open_contextmenu: "Відкрийте контекстне меню"
  lesson_basics_wrap_up_4: "@automation! Автоматизація"
  lesson_basics_wrap_up_4_desc: "Чудово! Тепер у вас є швидкий доступ до закріплених елементів у правій частині екрана.\n\nМи вже добігаємо кінця цього навчання. Ми автоматизували деякі елементи, щоб допомогти вам зосередитися на вивченні основ. Однак у будь-який момент ви можете це змінити на @automation! [Link('automation', '', 'панелі автоматизації')]."
  lesson_basics_open_automation_view: "Відкрийте панель автоматизації"
  lesson_basics_wrap_up_4b: "@automation! Автоматизація"
  lesson_basics_wrap_up_4b_desc: "Тут можна вибрати, які елементи вашої [Concept('country_with_icon', 'держави')|e] будуть управлятися автоматично. Ми рекомендуємо спочатку ознайомитися з усіма можливостями та повернутися до цієї панелі пізніше, коли у вас сформується чіткіше уявлення про те, що ви хочете контролювати самостійно.\n\nНаприклад, ви можете автоматизувати [Concept('advances_with_icon', 'покращення')|e] та роботу [Concept('cabinet_with_icon', 'ради')|e] або керувати ними самостійно.\n\nЯкщо вирішите контролювати ці елементи вручну, то можете дізнатися більше про них тут:\n\n$TAB$[Link('hints', 'selected_hint = hint_can_do_more_research_with_icon', 'Покращення')]\n$TAB$[Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', 'Рада')]\n"
  lesson_basics_wrap_up_5: "@caesar! Сповіщення"
  lesson_basics_wrap_up_3b_desc: "Ще один важливий елемент, з яким ви зіткнетеся в грі, це #high сповіщення#!. Вони з'являтимуться під #high верхньою панеллю#! та сповіщатимуть вас про різні справи, що потребують уваги. Сповіщення розташовуються в порядку терміновості від невідкладних (#R червоних#!) до найменш термінових (#G зелених#!).\n\nМайте на увазі, що ви не отримуватимете сповіщень про @automation!#high автоматизовані#! елементи гри.\n\n@hint! Для більшості сповіщень є поради, які допомагають розібратися з тією чи іншою ситуацією. Їх можна вивчити, #high затиснувши Shift і клацнувши лівою кнопкою миші#! по сповіщенню."
  lesson_basics_wrap_up_6: "@caesar! Огляд"
  lesson_basics_wrap_up_6_desc: "І останнє. Перед початком кампанії найкраще вивчити @agenda!#high огляд#!, де наведено невелику історичну довідку про вашу [Concept('country_with_icon', 'державу')|e] та набір @hint!#high підказок#!, найбільш актуальних для поточної ситуації."
  lesson_basics_open_agenda: "Відкрийте огляд"
  lesson_basics_final: "[mission_icon] Вперед до завдань!"
  lesson_basics_final_desc: "На цьому ми завершуємо #W демонстрацію базових функцій#!. Тепер можете продовжити проходження на свій вибір.\n\nЗалежно від вашого вибору, вам будуть надані короткі пояснення, які допоможуть вам краще зрозуміти гру. А після цього вам будуть представлені [Concept('missions_with_icon', 'завдання')|e] з різними цілями та нагородами, які допоможуть вам зробити перші кроки в @caesar!#W Europa Universalis V.#!\n\nУспіхів, і нехай вашій країні супроводжує процвітання!"
  lesson_basics_mission_focus: "Виберіть спрямованість завдання"
  lesson_diplomacy_0: "@diplomacy! Демонстрація «Політика»"
  lesson_diplomacy_0b: "@diplomacy! Демонстрація «Політика»"
  lesson_diplomacy_0_desc: "У цьому навчанні ми детальніше розберемо все, що стосується суспільства, уряду та зовнішньої політики вашої держави.\n\nПочнемо з [Concept('population_with_icon', 'населення')|e] — основоположного елемента будь-якої держави.\n\nПід час вступного навчання ми вже побіжно згадували про [Concept('pops', 'групи населення')], що проживають у [Concept('capital_with_icon', 'столиці')|e]. Настав час детально вивчити [Link('country_culture', '', '@society_panel!панель суспільства')]."
  lesson_diplomacy_open_society: "Відкрийте панель суспільства"
  lesson_diplomacy_open_pops: "Відкрийте вкладку населення"
  lesson_diplomacy_1: "@society_panel! Суспільство"
  lesson_diplomacy_1_desc: "Тут наведено елементи вашої [Concept('country_with_icon', 'держави')|e], пов'язані з населенням. У розділі [Concept('population_with_icon', '«Населення»')|e] на #high верхній панелі#! показано, скільки людей зараз живе у вашій [Concept('country', 'державі')], а також відзначено зміни цього числа за різні місяці.\n\nВсі жителі діляться на [Concept('pops_with_icon', 'групи населення')|e], куди входять представники однієї [Concept('culture_with_icon', 'культури')|e], однієї [Concept('religion_with_icon', 'релігії')|e] та одного [Concept('pop_type_with_icon', 'класу')|e], що живуть в одному [Concept('location_with_icon', 'районі')|e].\n\nЯк ми вже бачили, кожен [Concept('pop_type', 'клас')] надає підтримку одному конкретному [Concept('estate_with_icon', 'стану')|e]. Крім того, у [Concept('pops', 'груп населення')] є показники [Concept('literacy_with_icon', 'грамотності')|e] та [Concept('pop_satisfaction_with_icon', 'задоволення')|e], а також [Concept('pop_needs_with_icon', 'потреби')|e], включно з [Concept('food_with_icon', 'їжею')|e], які населення задовольняє за допомогою [Concept('market_with_icon', 'ринку')|e].\n\nЗадоволення ваших груп населення залежить від низки факторів, наприклад ставлення до їхньої [Concept('culture', 'культури')] та [Concept('religion', 'релігії')] у вашій державі, а також від [Concept('estate_satisfaction_with_icon', 'задоволення')|e] їхнього [Concept('estates', 'стану')]. Якщо задоволення [Concept('pop', 'групи населення')] опуститься занадто низько, вона намагатиметься підтримати [Concept('rebellion_with_icon', 'заколот')|e].\n\n@hint! Дізнатися більше про [Concept('rebels', 'заколотників')] можна [Link('hints', 'selected_hint = hint_rebels_growing', 'тут')]."
  lesson_diplomacy_2: "@culture! $game_concept_culture$"
  lesson_diplomacy_2_desc: "Ми вже згадували, що кожна [Concept('pop_with_icon', 'група населення')|e] належить до певної [Concept('culture_with_icon', 'культури')|e]. Давайте відкриємо [Link('country_culture', '', '@society_panel! вкладку культури')]."
  lesson_diplomacy_open_culture: "Відкрийте вкладку культури"
  lesson_diplomacy_3: "@culture! $game_concept_culture$"
  lesson_diplomacy_3_desc: "Зазвичай у вашій [Concept('country_with_icon', 'державі')|e] мешкатимуть представники кількох [Concept('cultures_with_icon', 'культур')|e]. Кожна [Concept('country', 'держава')] має [Concept('primary_culture_with_icon', 'основну культуру')|e], а всі інші культури мають різні [Concept('cultural_status', 'статуси')|e].\n\n[Concept('pops_with_icon', 'Групи населення')|e], що належать до [Concept('culture', 'культури')] з низьким [Concept('cultural_status', 'статусом')], зазвичай мають менше [Concept('pop_satisfaction_with_icon', 'задоволення')|e] та надають меншу кількість [Concept('levies_with_icon', 'ополченців')|e]. [Concept('cultural_status', 'Статус')] [Concept('cultures', 'культур')] у своїй державі можна підвищувати, витрачаючи на це [Concept('cultural_capacity_with_icon', 'культурний потенціал')|e].\n\nІ останнє. [Concept('pops', 'Групи населення')|e], що мешкають у вашій [Concept('country', 'державі')], будуть [Concept('assimilate_with_icon', 'асимілюватися')|e] в [Concept('primary_culture', 'основну культуру')] з урахуванням різних чинників, серед яких найважливішу роль відіграє різниця в [Concept('cultural_influence_with_icon', 'культурному впливі')|e] між вашою [Concept('primary_culture', 'основною культурою')] та їхніми [Concept('cultural_tradition_with_icon', 'культурними традиціями')|e]."
  lesson_diplomacy_open_works_of_art: "Відкрийте розділ творів мистецтва"
  lesson_diplomacy_4: "@art_work! Твори мистецтва"
  lesson_diplomacy_4_desc: "У вас в арсеналі є найважливіший інструмент для підвищення [Concept('cultural_influence_with_icon', 'впливу')|e] вашої [Concept('primary_culture_with_icon', 'основної культури')|e] — [Concept('works_of_art_with_icon', 'твори мистецтва')|e].\n\nДавайте відкриємо #high вкладку творів мистецтва#!. Перейдіть до виділеного розділу."
  lesson_diplomacy_open_culture_breakdown: "Відкрийте розділ подробиць про культуру"
  lesson_diplomacy_5: "@art_work! Твори мистецтва"
  lesson_diplomacy_5_desc: "[Concept('works_of_art_with_icon', 'Твори мистецтва')|e] — це артефакти, створювані різними [Concept('artists_with_icon', 'митцями')|e] вашої [Concept('country_with_icon', 'держави')|e]. Наприклад, #TOOLTIP:ARTIST,painter,X #L художник#!#! може створити #TOOLTIP:WORK_OF_ART_TYPE,painting,X #L картину#!#!, а #TOOLTIP:ARTIST,writer,X #L письменник#!#! — #TOOLTIP:WORK_OF_ART_TYPE,novel,X #L повість#!#!.\n\nКоли твір буде створено, ваша [Concept('primary_culture_with_icon', 'основна культура')|e] отримає певну кількість [Concept('cultural_influence_with_icon', 'культурного впливу')|e].\n\nСтворений твір і надалі даватиме вам бонуси до [Concept('cultural_tradition_with_icon', 'традицій')|e] вашої основної культури, а також щомісячний бонус до [Concept('prestige_with_icon', 'престижу')|e] залежно від [Concept('art_quality', 'якості твору')|e].\n\n[Concept('prestige', 'Престиж')] — це ще один показник, який можна відстежувати на #high верхній панелі#!. Він відображає культурну значущість вашої [Concept('country', 'держави')] на світовій арені. Серед іншого, високий [Concept('prestige', 'престиж')] допомагає в питаннях [Concept('diplomacy', 'дипломатії')|e] та [Concept('integration', 'інтеграції')|e]."
  lesson_diplomacy_open_religion: "Відкрийте вкладку релігії"
  lesson_diplomacy_6: "[religion_icon] Релігія"
  lesson_diplomacy_6_desc: "Окрім [Concept('culture_with_icon', 'культури')|e], іншою важливою властивістю [Concept('pops_with_icon', 'груп населення')|e] є їхня [Concept('religion_with_icon', 'релігія')|e]. Давайте вивчимо [Link('country_religion', '', '@society_panel! вкладку релігії')]!"
  lesson_diplomacy_7: "[religion_icon] Релігія"
  lesson_diplomacy_7_desc: "У цій вкладці можна побачити [Concept('primary_religion_with_icon', 'основну релігію')|e], а також інші [Concept('religions_with_icon', 'релігії')|e], присутні у вашій [Concept('country_with_icon', 'державі')|e].\n\nЗалежно від конкретної віри вашої держави можна витрачати [Concept('religious_influence_with_icon', 'релігійний вплив')|e] на різні взаємодії зі своєю релігією.\n\nЗа аналогією з [Concept('culture_with_icon', 'культурою')|e], у всіх релігій у державі теж є свій [Concept('religious_status', 'статус')|e]."
  lesson_diplomacy_8: "@population! Населення"
  lesson_diplomacy_8_desc: "Тепер давайте вивчимо #high вкладку населення.#!"
  lesson_diplomacy_open_people: "Відкрийте вкладку груп населення"
  lesson_diplomacy_8b: "@population! Населення"
  lesson_diplomacy_8b_desc: "Тут можна знайти відомості про [Concept('pops_with_icon', 'групи населення')|e] у вашій [Concept('country_with_icon', 'державі')|e]. Кожна група мешкає в певному [Concept('location_with_icon', 'районі')|e], а також виділяється своєю [Concept('culture_with_icon', 'культурою')|e], [Concept('religion_with_icon', 'релігією')|e] та [Concept('pop_type', 'суспільним класом')|e].\n\nНа цій же панелі є відомості про [Concept('rebels_with_icon', 'бунтівників')|e]. Зазвичай з бунтівниками можна розібратися, підвищивши [Concept('pop_satisfaction', 'задоволення їхньої групи населення')|e]."
  lesson_diplomacy_8c: "@characters! Персонажі"
  lesson_diplomacy_8c_desc: "Тепер познайомимося з [Concept('characters_with_icon', 'персонажами')|e]. Перейдіть на #high вкладку персонажів.#!"
  lesson_diplomacy_open_character: "Відкрийте розділ персонажів"
  lesson_diplomacy_8d: "@characters! Персонажі"
  lesson_diplomacy_8d_desc: "Протягом гри вам доведеться взаємодіяти з різними [Concept('characters_with_icon', 'персонажами')|e] — це люди, яким ви можете призначати [Concept('roles', 'ролі')|e].\n\nНа цій вкладці перелічені всі [Concept('characters', 'персонажі')] при вашому дворі та їхні поточні [Concept('role', 'ролі')]. У персонажів є [Concept('abilities_with_icon', 'навички')|e], які визначають їхню ефективність на відведених їм [Concept('roles', 'ролях')]:\n\n[Concept('adm_with_icon', 'адміністративна навичка')|e]\n[Concept('dip_with_icon', 'дипломатична навичка')|e]\n[Concept('mil_with_icon', 'військова навичка')|e]\n\nОкрім трьох основних [Concept('abilities', 'навичок')], [Concept('characters', 'персонажі')] можуть розвивати в собі певні [Concept('traits', 'властивості')|e], що допомагають їм у різних завданнях. Крім того, всі [Concept('characters', 'персонажі')] належать до [Concept('estate_with_icon', 'станів')|e], а деякі — ще й до прославлених [Concept('dynasty_with_icon', 'династій')|e].\n\n#weak Також можна клацнути @rightclick!#high правою кнопкою миші#! по імені або портрету [Concept('character', 'персонажа')], щоб відкрити #high контекстне меню#!#!."
  lesson_diplomacy_8e: "[character_icon] Персонажі"
  lesson_diplomacy_8e_desc: "Ми вже бачили [Concept('artists', 'митців')] при вашому [Concept('court', 'дворі')], однак найважливішими серед [Concept('character_with_icon', 'персонажів')|e] є [Concept('ruler_with_icon', 'правителі')|e].\n\nДавайте ще раз відкриємо панель уряду, щоб познайомитися з благородним мистецтвом управління."
  lesson_admin_1: "[ruler_icon] Правитель"
  lesson_admin_1_desc: "Це [Concept('ruler_with_icon', 'правитель')|e], найважливіший для вас [Concept('character_with_icon', 'персонаж')|e]. [Concept('abilities_with_icon', 'Навички')|e] вашого [Concept('ruler', 'правителя')] значно впливають на [Concept('country_with_icon', 'державу')|e]. Щоб дізнатися їхні ефекти, наведіть на них курсор.\n\nУ цьому ж вікні можна побачити [Concept('consort_with_icon', 'консорта')|e], [Concept('heir_with_icon', 'спадкоємця')|e] та [Concept('regent_with_icon', 'регента')|e], якщо у вас є одна з цих [Concept('roles', 'ролей')|e]."
  lesson_admin_open_government: "Відкрийте панель уряду"
  lesson_admin_9: "[cabinet_icon] $game_concept_cabinet$"
  lesson_admin_9_desc: "До речі про важливих [Concept('characters_with_icon', 'персонажів')|e]! Давайте обговоримо один із найважливіших інструментів для управління [Concept('country_with_icon', 'державою')|e]: [Concept('cabinet_with_icon', 'раду')|e].\n\nПерейдіть до розділу ради."
  lesson_admin_open_cabinet: "Відкрийте розділ ради"
  lesson_admin_10: "[cabinet_icon] $game_concept_cabinet$"
  lesson_admin_10_desc: "Це ваша [Concept('cabinet_with_icon', 'рада')|e]. [Concept('cabinet_seats_with_icon', 'Місця в ній')|e] можуть займати [Concept('characters_with_icon', 'персонажі')|e], які стануть [Concept('cabinet_members_with_icon', 'членами ради')|e]. Їм можна доручати різні [Concept('cabinet_actions_with_icon', 'дії')|e], наприклад #TOOLTIP:CABINET_ACTION,increase_control_province,X #L посилення контролю над провінцією#!#! або #TOOLTIP:CABINET_ACTION,develop_province,X #L розвиток провінції#!#!.\n\nДії ради спираються на одну з трьох [Concept('abilities_with_icon', 'навичок')|e]. На результативність дії впливають навички вашого [Concept('ruler_with_icon', 'правителя')|e] та члена ради, якому доручено дію.\n\nНаприклад, #TOOLTIP:CABINET_ACTION,change_societal_values,X #L зміна суспільних цінностей#!#! просуватиметься швидше, якщо її доручено члену ради з розвиненою [Concept('dip_with_icon', 'дипломатичною навичкою')|e]. Загальна [Concept('cabinet_efficiency_with_icon', 'ефективність ради')|e] вашої [Concept('country_with_icon', 'держави')|e] також впливає на швидкість та ефективність виконання дій.\n\n@hint! Дізнатися більше про раду можна [Link('hints', 'selected_hint = hint_has_possible_cabinet_action', 'тут')]."
  lesson_admin_5: "[estates_icon] $game_concept_estates$"
  lesson_admin_5_desc: "Давайте перейдемо до #high розділу станів#!. Вивчати різні стани вашої [Concept('country_with_icon', 'держави')|e] та взаємодіяти з ними в #high розділі станів#! дозволяє вкладка держави на панелі [Concept('government', 'уряду')|e]."
  lesson_admin_6: "[government_type_icon] Уряд"
  lesson_admin_6_desc: "Кожна [Concept('country_with_icon', 'держава')|e] в #high Europa Universalis V#! унікальна. Політика вашої [Concept('country', 'держави')] насамперед визначається [Concept('government_type_with_icon', 'формою правління')|e].\n\nВаша [Concept('country', 'держава')] — це [Player.GetGovernment.GetGovernmentType.GetName|l], і її принципи функціонування вже значно відрізняються від сусідів. Крім того, суть і політичний устрій [Concept('country', 'держави')] багато в чому залежать від її [Concept('government_reforms_with_icon', 'державних принципів')|e], [Concept('privileges_with_icon', 'привілеїв')|e] та [Concept('laws_with_icon', 'законів')|e].\n\nЗміна будь-якого з цих трьох елементів зазвичай супроводжується значним падінням [Concept('stability_with_icon', 'стабільності')|e].\n\nДавайте вивчимо стан справ, почавши з уже знайомого [Link('government', 'tabcontent = estates', '@government_panel!розділу станів')]."
  lesson_admin_6b: "[government_reform_icon] Державні принципи"
  lesson_admin_6b_desc: "[Concept('government_reforms_with_icon', 'Державні принципи')|e] — одна з ключових особливостей вашої [Concept('country_with_icon', 'держави')|e]. Їхні ефекти часто вельми значні, тому вибір принципів має бути одним із ваших першочергових завдань на початку нової гри.\n\n@hint! Дізнатися більше про [Concept('government_reforms', 'державні принципи')] можна [Link('hints', 'selected_hint = hint_has_possible_reform', 'тут')]."
  lesson_admin_open_country: "Відкрийте вкладку держави"
  lesson_admin_open_estates: "Відкрийте розділ станів"
  lesson_admin_6c: "[privileges_icon] Привілеї"
  lesson_admin_6c_desc: "Ми вже обговорювали [Concept('privileges_with_icon', 'привілеї')|e], коли говорили про [Concept('estates_with_icon', 'стани')|e]. Крім впливу на [Concept('estate_satisfaction_with_icon', 'задоволення')|e] та [Concept('estate_power_with_icon', 'владу стану')|e] [Concept('privileges', 'привілеї')] можуть суттєво змінити гру за вашу [Concept('country_with_icon', 'державу')|e]. Часто вони відкривають нові можливості або обмежують вашу свободу дії."
  lesson_admin_open_laws: "Відкрийте розділ законів"
  lesson_admin_11: "[laws_icon] $game_concept_laws$"
  lesson_admin_11_desc: "І нарешті, кожна держава починає гру з власним [Concept('laws_with_icon', 'зводом законів')|e]. Перейдіть до #high розділу правил#! у #high вкладці держави#!."
  lesson_admin_12: "[law_icon] $game_concept_laws$"
  lesson_admin_12_desc: "[Concept('laws_with_icon', 'Звід правил')|e] розділений на кілька категорій і дозволяє вам змінювати свою [Concept('country_with_icon', 'державу')|e]. Кожне [Concept('law', 'правило')] містить кілька можливих [Concept('policies_with_icon', 'політик')|e].\n\nНаприклад, для правила #TOOLTIP:LAW,censorship,X #L «Цензура»#!#! можна вибрати політику #TOOLTIP:POLICY,no_censorship,X #L «Відсутність цензури»#!#!. Вибір політики тягне за собою низку позитивних та негативних наслідків. Швидкість зміни політики залежить від вашої [Concept('legislative_efficiency_with_icon', 'законодавчої ефективності')|e].\n\n#weak Правила можна змінювати в будь-який час, розплачуючись [Concept('gold_with_icon', 'дукатами')|e] та [Concept('stability_with_icon', 'стабільністю')|e], але зазвичай раціональнішим рішенням буде дочекатися засідання [Concept('parliament_with_icon', 'парламенту')|e]#!"
  lesson_admin_open_values: "Відкрийте вкладку цінностей"
  lesson_admin_13: "[societal_value_icon] $game_concept_societal_values$"
  lesson_admin_13_desc: "Отже, ви можете змінювати [Concept('government_reforms_with_icon', 'державні принципи')|e], [Concept('laws_with_icon', 'правила')|e] та [Concept('privileges_with_icon', 'привілеї')|e] у своїй [Concept('country_with_icon', 'державі')|e] як забажаєте, якщо готові до зниження [Concept('stability_with_icon', 'стабільності')|e]. Однак не все в цьому світі так просто змінити, і суспільство дуже повільно підлаштовується під нові порядки.\n\nЩоб краще відобразити структурні особливості вашої держави та народу, є [Concept('societal_values_with_icon', 'суспільні цінності')|e]. Давайте подивимося на них."
  lesson_admin_14: "[societal_value_icon] $game_concept_societal_values$"
  lesson_admin_14_desc: "[societal_values_with_icon|e] [Concept('country_with_icon', 'держави')|e] відображають укорінені звичаї населення, інерцію світських інститутів та їхній вплив на характер її мешканців. Вони змінюються повільно, з плином часу, пристосовуючись до правил.\n\n[reforms_with_icon|e], [privileges_with_icon|el], [laws_with_icon|el] та певні дії під час вашого правління призведуть до поступової зміни [Concept('societal_values', 'суспільних цінностей')].\n\n#weak Наприклад, якщо [GetEstateName('nobles_estate')|l] вашої держави отримають певні [Concept('privileges', 'привілеї')], це підштовхне вашу державу в бік #TOOLTIP:SOCIETAL_VALUE,aristocracy_vs_plutocracy,X #L аристократії#!#!."
  lesson_admin_15: "[crown_power_icon] $game_concept_crown_power$"
  lesson_admin_15_desc: "Те, як [GetEstateName('crown_estate')] використовують свою силу проти інших [Concept('estates_with_icon', 'станів')|e] — один із наріжних каменів управління в @caesar!#high Europa Universalis V#!.\n\nВаша [Concept('crown_power_with_icon', 'влада правителя')|e] в основному залежить від середнього ступеня [Concept('control_with_icon', 'контролю')|e] в усіх ваших [Concept('locations', 'районах')], а її ефективність знижується під впливом [Concept('privileges_with_icon', 'привілеїв')|e] ваших [Concept('estates', 'станів')]. Також на неї впливають багато [Concept('government_reforms_with_icon', 'державних принципів')|e], [Concept('laws_with_icon', 'зводів правил')|e] та [Concept('societal_values_with_icon', 'суспільних цінностей')|e].\n\nПідтримувати владу правителя на високому рівні дуже важливо: вона не тільки підвищує [Concept('cabinet_efficiency_with_icon', 'ефективність ради')|e] та вашу підтримку в [Concept('parliament_with_icon', 'парламенті')|e], але також визначає відсоток [Concept('trade_income_with_icon', 'доходів від торгівлі')|e], який надходить безпосередньо до вашої [Concept('treasury_with_icon', 'казни')|e]."
  lesson_economy_1: "@adm! Демонстрація «Економіка»"
  lesson_economy_1_desc: "Тепер ми @adm!#high познайомимося з економікою#!. Щоб глибше вникнути в економічні принципи #high Europa Universalis V#!, почнемо з основи — [Concept('markets_with_icon', 'ринків')|e]."
  lesson_economy_2: "[market_icon] $game_concept_markets$"
  lesson_economy_2_desc: "Тут представлений перелік [Concept('markets_with_icon', 'ринків')|e], на яких присутня ваша [Concept('country_with_icon', 'держава')|e], тоді як на карті ви можете побачити всі [Concept('markets', 'ринки')] відомого світу. Кожен [Concept('location_with_icon', 'район')|e] є частиною [Concept('market', 'ринку')], на якому він продає вироблені [Concept('goods_with_icon', 'товари')|e] та закуповує потрібні.\n\nБагато що в грі зав'язано на товарах: [Concept('pops_with_icon', 'групи населення')|e] споживають [Concept('goods', 'товари')] для життя, [Concept('goods', 'товари')] потрібні для [Concept('constructions_with_icon', 'будівництва')|e], без [Concept('goods', 'товарів')] не працюватимуть [Concept('buildings_with_icon', 'споруди')|e], [Concept('armies_with_icon', 'арміям')|e] потрібні [Concept('goods', 'товари')], щоб воювати.\n\nНаприклад, на карті можна побачити, що ваша [Concept('capital_with_icon', 'столиця')|e], [Player.GetCapital.GetName], є частиною ринку [market_icon]«[Player.GetCapital.GetMarket.GetName]», тому все, що ви споруджуєте в ній, використовуватиме [Concept('goods', 'товари')] з цього [Concept('market', 'ринку')].\n\n#weak Крім того, можна клацнути @rightclick!#high правою кнопкою миші#! по назві або картці [Concept('market', 'ринку')], щоб відкрити #high контекстне меню#!#!."
  lesson_economy_3: "[market_icon] $game_concept_markets$"
  lesson_economy_3_desc: "Продукція всіх [Concept('locations_with_icon', 'районів')|e] щомісяця продається і надходить до [Concept('stockpile_with_icon', 'запасів')|e] [Concept('market_with_icon', 'ринку')|e], що створює основу для [Concept('wealth_with_icon', 'багатства')|e]. І навпаки, всі [Concept('locations', 'райони')] намагаються закуповувати необхідні їм [Concept('goods', 'товари')] на своєму [Concept('market', 'ринку')] в порядку черги, яка визначається [Concept('market_access_with_icon', 'доступом до ринку')|e]. Різниця між [Concept('supply_with_icon', 'пропозицією')|e] та [Concept('demand_with_icon', 'попитом')|e] щодо [Concept('good', 'товару')] на [Concept('market', 'ринку')] впливає на його [Concept('market_price_with_icon', 'ринкову ціну')|e].\n\nЗверніть увагу, що вплив [Concept('markets', 'ринків')] поширюється і за межі [Concept('country_with_icon', 'держави')|e]. Продукція ваших [Concept('locations', 'районів')] завжди надходить безпосередньо на той [Concept('market', 'ринок')], до якого вони належать, через що чужі [Concept('locations', 'райони')] з кращим [Concept('market_access', 'доступом')] до того ж ринку можуть скупити [Concept('goods', 'товари')] раніше за ваші.\n\n[Concept('market_access_with_icon', 'Доступ')|e] [Concept('location', 'району')] до ринку залежить від відстані до [Concept('market_center_with_icon', 'ринкового центру')|e] і, як і у випадку з [Concept('proximity_with_icon', 'досяжністю')|e], цей доступ можна покращити за допомогою [Concept('roads_with_icon', 'доріг')|e]. Як правило, райони належать до найближчого [Concept('market', 'ринку')], тобто ринку з найкращим [Concept('market_access', 'доступом')].\n\n@hint!Дізнатися більше про [Concept('markets', 'ринки')] можна [Link('hints', 'selected_hint = hint_markets', 'тут')]."
  lesson_economy_4: "[trade_icon] $game_concept_trade$"
  lesson_economy_4_desc: "[markets_with_icon|e] ніколи не бувають повністю ізольованими один від одного. Рух [Concept('goods_with_icon', 'товарів')|e] між двома [Concept('markets', 'ринками')] називається [Concept('trade_with_icon', 'торгівлею')|e].\n\n[countries_with_icon|e] можуть переміщувати [Concept('goods', 'товари')] між [Concept('markets', 'ринками')], витрачаючи на це [Concept('merchant_capacity_with_icon', '#TOOLTIP:POPTYPE,burghers,X #L міщани#!#! будуть самостійно вести [Concept('trade', 'торгівлю')].\n\nЗа замовчуванням торгівля @automation! #high автоматизована#! на всіх [Concept('markets', 'ринках')], тобто, весь ваш [Concept('merchant_capacity', 'торговий потенціал')] на [Concept('market', 'ринку')] буде автоматично задіюватися для найбільш вигідних угод. Ми радимо довірити [Concept('trade', 'торгівлю')] автоматизації, доки ви не освоїтеся в грі.\n\nКоли прийде час, ви зможете докладніше познайомитися з [Concept('trade', 'торгівлею')] тут:\n$TAB$[Link('hints', 'selected_hint = hint_trade_with_icon', 'Порада про торгівлю')]."
  lesson_economy_5: "[food_icon] $game_concept_food$"
  lesson_economy_5_desc: "Нарешті, [Concept('pops_with_icon', 'групи населення')|e] також виробляють і споживають [Concept('food_with_icon', 'їжу')|e].\n\n[Concept('food', 'Їжа')] в основному виробляється @laborers! #TOOLTIP:POPTYPE,laborers,X #L робітниками#!#!, які [Concept('rgo_with_icon', 'видобувають')|e] [Concept('food_raw_materials', 'ресурси для виробництва їжі')|e], наприклад #TOOLTIP:GOODS,wheat,X #L пшеницю#!#!, хоча @peasants! #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, зайняті [Concept('subsistence_agriculture_with_icon', 'натуральним господарством')|e], також роблять невеликий внесок.\n\nНа кожному [Concept('market_with_icon', 'ринку')|e] є [Concept('food_stockpile_with_icon', 'запас їжі')|e], який щомісяця збільшується або зменшується. Якщо на [Concept('market', 'ринку')] закінчиться [Concept('food', 'їжа')], [Concept('population', 'населення')] почне [Concept('starvation_with_icon', 'голодувати')|e]. Ви побачите [Concept('market', 'ринковий')] [Concept('food', 'продуктовий')] баланс на картці [Concept('market', 'ринку')].\n\nДізнатися більше про способи отримання [Concept('food', 'їжі')] можна [Link('hints', 'selected_hint = hint_food_with_icon', 'тут')]."
  lesson_admin_21: "[good_icon] $game_concept_goods$"
  lesson_admin_21_desc: "Давайте продовжимо знайомство з [Concept('goods', 'товарами')|e] на ваших [Concept('markets_with_icon', 'ринках')|e].\n\nДля цього можна натиснути кнопку [good_icon|e] [Concept('goods', 'товарів')] на #high картці ринку#!, і ви відкриєте вкладку товарів на панелі виробництва з фільтром за цим ринком."
  lesson_admin_22: "[good_icon] $game_concept_goods$"
  lesson_admin_22_desc: "Тут перераховані всі [Concept('goods_with_icon', 'товари')|e] на певному [Concept('market_with_icon', 'ринку')|e].\n\n#weak [market_icon] #high Картку ринку#! можна прибрати, щоб подивитися товари у всій вашій [Concept('country', 'державі')], включно з усіма ринками, на яких у вас є [Concept('locations', 'райони')]#!.\n\nЄ три способи збільшити [Concept('supply_with_icon', 'пропозицію')|e] будь-якого товару на [Concept('market', 'ринку')]:\n\n$BULLET$ [rgo_icon] Розширення [Concept('rgo', 'видобутку ресурсів')|e]\n[Concept('rgo', 'Видобуток')] [Concept('raw_materials_with_icon', 'ресурсів')|e] можна наростити, якщо ви [Concept('own', 'володієте')|e] відповідними [Concept('locations_with_icon', 'районами')|e].\n\n$BULLET$ [building_icon] Будівництво [Concept('buildings', 'споруд')|e]\nДеякі [Concept('buildings', 'споруди')] можуть видобувати [Concept('raw_materials', 'ресурси')], але їхнє основне призначення — переробка [Concept('raw_materials', 'ресурсів')] у [Concept('produced_goods_with_icon', 'вироблені товари')|e].\n\n$BULLET$ [import_icon] Імпорт за допомогою [Concept('trade_with_icon', 'торгівлі')|E]\nНеобхідні [Concept('goods', 'товари')] можна імпортувати з інших [Concept('markets', 'ринків')] за наявності доступного [Concept('merchant_capacity_with_icon', 'торгового потенціалу')|e].\n\n#weak Наприклад, ви можете почати видобуток ресурсів для отримання @wool! #TOOLTIP:GOODS,wool,X вовни#!, потім побудувати @cloth_guild!#TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдію прядильників#!#! для переробки вовни в @cloth! #TOOLTIP:GOODS,cloth,X текстиль#!, який потрібен багатьом іншим [Concept('buildings', 'спорудам')], а також [Concept('pops', 'населенню')] та [Concept('armies', 'арміям')].#!"
  lesson_admin_25: "[building_icon] $game_concept_buildings$"
  lesson_admin_25_desc: "Нарешті, давайте поговоримо про [Concept('buildings_with_icon', 'споруди')|e].\n\nДля початку подивимося на повний список [Concept('buildings', 'споруд')], які вже побудовані або доступні вашій [Concept('country_with_icon', 'державі')|e]. Для цього можна відкрити #high вкладку споруд#! на панелі виробництва.\n\nЩе можна натиснути кнопку [building_icon] споруди на [market_icon]#high картці ринку#!, щоб переглянути список споруд у межах конкретного ринку."
  lesson_admin_26: "[building_icon] $game_concept_buildings$"
  lesson_admin_26_desc: "На відміну від місць [Concept('rgo_with_icon', 'видобутку ресурсів')|e] усім [Concept('buildings_with_icon', 'спорудам')|e] потрібні [Concept('goods_with_icon', 'товари')|e] для роботи, однак не всі споруди беруть участь у виробництві [Concept('goods', 'товарів')], а отже, у збільшенні [Concept('tax_base_with_icon', 'податкової бази')|e].\n\nУ деяких [Concept('buildings', 'споруд')] інші цілі: наприклад, вони надають [Concept('manpower_with_icon', 'рекрутів')|e], дозволяють набирати [Concept('regulars_with_icon', 'регулярні війська')|e], зміцнюють вашу [Concept('crown_power_with_icon', 'владу правителя')|e] або покращують [Concept('control_with_icon', 'контроль')|e] над [Concept('location_with_icon', 'районом')|e].\n\nСпоруди, як і місця [Concept('rgo_with_icon', 'видобутку ресурсів')|e], вимагають витрат на [Concept('construction_with_icon', 'будівництво')|e], яке займає певний час у грі. Щоб побудована споруда могла працювати, їй потрібні певні ресурси на тому [Concept('market_with_icon', 'ринку')|e], до якого вона належить.\n\n#weak Пам'ятайте, що у вашої [Concept('country', 'держави')] може бути кілька [Concept('market', 'ринків')]. [market_icon] #high Картка ринку#! у верхній частині #high панелі виробництва#! дозволяє відсортувати її вміст за ринками.#!\n\nДізнатися більше про [Concept('buildings', 'споруди')] можна тут:\n[Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings', '@hint! Споруди без працівників')]\n[Link('hints', 'selected_hint = hint_unprofitable_buildings', '@hint! Невигідні споруди')]\n[Link('hints', 'selected_hint = hint_has_buildings_missing_input', '@hint! Брак ресурсів')]"
  lesson_admin_27: "[mission_icon] $game_concept_missions$"
  lesson_admin_27b: "[mission_icon] $game_concept_missions$"
  lesson_admin_27_desc: "Наостанок розглянемо [Concept('missions_with_icon', 'завдання')|e]."
  lesson_admin_28: "[mission_icon] $game_concept_missions$"
  lesson_admin_28_desc: "[Concept('missions_with_icon', 'Завдання')|e] являють собою набір етапів, які покликані показати вам, що можна робити в #high Europa Universalis V#!. Це велика гра, в ній багато чого потрібно освоїти, і в цьому частина задоволення!\n\nВи щойно завершили вступ до @adm!#high економічного стилю гри#!, і тепер вам доступні завдання, які дозволять краще дізнатися, як користуватися механіками та панелями, які ми обговорювали.\n\nЩоб спростити для вас знайомство з ними, ми підготували кілька завдань."
  lesson_admin_29: "@caesar! Завершення"
  lesson_admin_29_desc: "Чудово! Тепер на #high вкладці [Concept('missions_with_icon', 'завдань')|E]#! вам доступно кілька з них.\n\nРекомендуємо виконувати ці завдання по порядку: так ви закріпите вже пройдені уроки, а заодно дізнаєтеся щось нове. Також пам'ятайте: у #high вкладці завдань#! можна в будь-який момент перейти до іншої демонстрації та супутніх [Concept('mission', 'завдань')].\n\nУспіхів!"
  lesson_admin_open_economy: "Відкрийте панель економіки"
  lesson_admin_open_balance: "Відкрийте вкладку балансу"
  lesson_admin_open_markets: "Відкрийте вкладку ринків"
  lesson_admin_open_trading: "Відкрийте вкладку торгівлі"
  lesson_admin_open_production: "Відкрийте панель виробництва"
  lesson_admin_open_goods: "Відкрийте вкладку товарів"
  lesson_admin_open_food: "Відкрийте вкладку їжі"
  lesson_admin_open_buildings: "Відкрийте вкладку споруд"
  lesson_admin_open_missions: "Відкрийте вкладку завдань"
  lesson_admin_has_mission_active: "Почніть економічне завдання"
  lesson_diplomacy_9: "@diplomacy! Дипломатія"
  lesson_diplomacy_9_desc: "Але політичні процеси відбуваються не лише всередині нашої держави. Давайте познайомимося з [Concept('diplomacy_with_icon', 'дипломатією')|e] та вивчимо @diplomacy_panel![Link('diplomacy', '', ' панель дипломатії')], починаючи з #high вкладки відносин#!."
  lesson_diplomacy_open_diplomacy: "Відкрийте панель дипломатії"
  lesson_diplomacy_open_relations: "Відкрийте вкладку відносин"
  lesson_diplomacy_open_current_relations: "Відкрийте розділ поточних відносин"
  lesson_diplomacy_10: "@diplomacy! Дипломатія"
  lesson_diplomacy_10_desc: "Незалежно від того, наскільки могутньою стане ваша держава, [Concept('diplomacy_with_icon', 'дипломатія')|e] необхідна, щоб виживати протягом епох. Вам доведеться укладати [Concept('alliances_with_icon', 'союзи')|e] для захисту від ворогів або домовлятися про [Concept('peace_with_icon', 'мир')|e] після затяжної [Concept('war_with_icon', 'війни')|e].\n\nТут важливо враховувати два моменти:\n\n$BULLET$Вам доведеться витрачати ресурс [Concept('diplomats_with_icon', 'дипломатів')|e] на [Concept('diplomatic_action_with_icon', 'дипломатичні дії')|e] щодо інших [Concept('countries_with_icon', 'держав')|e], наприклад, на [Concept('improve_relations_with_icon', 'поліпшення відносин')|e], створення [Concept('spy_networks_with_icon', 'шпигунських мереж')|e] або оголошення [Concept('wars_with_icon', 'війн')|e]. Кількість ваших [Concept('diplomats', 'дипломатів')] вказана на #high верхній панелі#!.\n\n$BULLET$Дипломатичні [Concept('treaties_with_icon', 'договори')|e] з іншими [Concept('countries', 'державами')], будь то [Concept('alliance', 'союзники')] або [Concept('subject_with_icon', 'ленники')|e], витрачають [Concept('diplomatic_capacity_with_icon', 'дипломатичний потенціал')|e]. На панелі балансу можна збільшити доступний [Concept('diplomatic_capacity', 'дипломатичний потенціал')] за [Concept('gold_with_icon', 'дукати')|e]."
  lesson_diplomacy_11: "@diplomacy! Поточні відносини"
  lesson_diplomacy_11_desc: "Перейдімо до #high розділу поточних відносин#!, щоб краще дізнатися зв'язки вашої [Concept('country_with_icon', 'держави')|e]."
  lesson_diplomacy_12: "@diplomacy! Поточні відносини"
  lesson_diplomacy_12_desc: "#high Розділ поточних відносин#! містить інформацію про всі ваші [Concept('treaties_with_icon', 'договори')|e], підписані з іншими [Concept('countries_with_icon', 'державами')|e], а також про [Concept('international_organizations_with_icon', 'міжнародні об'єднання')|e], в яких ви берете участь.\n\nЯкщо у вас є [Concept('subjects_with_icon', 'ленники')|e], на цій панелі ними можна керувати."
  lesson_diplomacy_13: "[country_icon] Відомі держави"
  lesson_diplomacy_13_desc: "Далі давайте подивимося, про які [Concept('countries_with_icon', 'держави')|e] вам відомо."
  lesson_diplomacy_open_known_countries: "Відкрийте розділ відомих держав"
  lesson_diplomacy_14: "[country_icon] Відомі держави"
  lesson_diplomacy_14_desc: "У цьому #high розділі#! ви знайдете всі [Concept('countries_with_icon', 'держави')|e], які [Concept('discovered_with_icon', 'відкрили')|e]. За замовчуванням у ньому встановлено фільтр, щоб ви бачили лише держави в межах своєї [Concept('diplomatic_range_with_icon', 'дипломатичної дистанції')|e].\n\nТут також зручно відстежувати ваш [Concept('great_power_score_with_icon', 'рахунок великої держави')|e]. Якщо за цим рахунком ви посідаєте одне з провідних місць у світі, то вважаєтеся [Concept('great_power_with_icon', 'великою державою')|e], що дозволить чинити більше впливу на сусідів."
  lesson_diplomacy_15: "[international_organizations_icon] Об'єднання"
  lesson_diplomacy_15_desc: "Давайте розглянемо [Concept('international_organizations_with_icon', 'міжнародні об'єднання')|e]!"
  lesson_diplomacy_open_known_orgs: "Відкрийте розділ об'єднань"
  lesson_diplomacy_16: "[international_organization_icon] Об'єднання"
  lesson_diplomacy_16_desc: "Тут можна ознайомитися з присутніми у світі [international_organization_icon] [Concept('international_organization', 'міжнародними об'єднаннями')|e]. До їх числа належать #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#!, #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католицька церква#!#! та [Concept('personal_unions_with_icon', 'особисті унії')|e].\n\nДії, доступні вам як учаснику міжнародного об'єднання, залежать від самого об'єднання та від наявності у вас [Concept('special_status', 'особливого статусу')|e]."
  lesson_diplomacy_17: "[country_icon] Інші держави"
  lesson_diplomacy_17_desc: "Давайте трохи поговоримо про інші [Concept('countries_with_icon', 'держави')|e]. @leftclick!#high Клацніть#! по державі на карті, щоб відкрити панель.\n\n#weak Можливо, вам знадобиться віддалити камеру, щоб вибрати [Concept('country', 'державу')|e] цілком, оскільки ви вибираєте [Concept('locations_with_icon', 'райони')|e] при наближенні#!"
  lesson_diplomacy_open_foreign_country: "Відкрийте панель іншої держави, @leftclick!#high клацнувши#! по державі на карті"
  lesson_diplomacy_18: "[countries_icon] Інші держави"
  lesson_diplomacy_18_desc: "Тут можна дізнатися загальні відомості про іншу [Concept('country_with_icon', 'державу')|e], зокрема про [Concept('ruler_with_icon', 'правителя')|e]. Вкладка [Concept('diplomacy_with_icon', 'дипломатії')|e] нагадує вже знайомий нам розділ поточних відносин. Тут перераховані [Concept('allies_with_icon', 'союзники')|e], [Concept('rivals_with_icon', 'суперники')|e] та [Concept('subjects_with_icon', 'ленники')|e].\n\nДавайте розглянемо виділену картку дипломатії з кнопками швидкого доступу до поширених [Concept('diplomatic_actions_with_icon', 'дипломатичних дій')|e], таких як поліпшення [Concept('opinion_with_icon', 'думки')|e] або пошук [Concept('favors_with_icon', 'прихильності')|e].\n\n#weak Також можна клацнути #high правою кнопкою миші#! по назві або прапору держави, щоб відкрити #high контекстне меню#!#!."
  lesson_diplomacy_19: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_19b: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_19_desc: "На додаток до загальних [Concept('diplomatic_actions_with_icon', 'панелі дипломатії')] щодо конкретної, вже обраної вами держави."
  lesson_diplomacy_open_actions: "Відкрийте дипломатичні дії, @leftclick!#high клацнувши#! по назві на картці держави"
  lesson_diplomacy_20: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_20b: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_20_desc: "Через #high вкладку дипломатичних дій#! ми можемо здійснювати різноманітні [Concept('diplomatic_actions_with_icon', 'дипломатичні дії')|e]. Оскільки ми перейшли сюди, обравши [Concept('country_with_icon', 'державу')|e] на карті, ця держава заздалегідь обрана ціллю кожної такої дії.\n\nДо ваших послуг цілий ряд дипломатичних дій, хоча деякі з них доступні лише за певних обставин. Якщо ви хочете підтримувати мирні відносини з іншими державами, вас повинні цікавити три речі: [Concept('opinion_with_icon', 'думка')|e], [Concept('trust_with_icon', 'довіра')|e] та [Concept('favors_with_icon', 'прихильність')|e].\n\nДля початку давайте спробуємо [Concept('improve_relations_with_icon', 'поліпшити відносини')|e]."
  lesson_diplomacy_confirm_diplo_action: "@leftclick!Натисніть кнопку «Поліпшення думки» щодо обраної держави"
  lesson_diplomacy_21: "[diplomatic_action_icon] Дипломатичні дії"
  lesson_diplomacy_21_desc: "Чудово! Щойно ви підтвердите обрану [Concept('diplomatic_action_with_icon', 'дію')|e], ваші [Concept('diplomats_with_icon', 'дипломати')|e] вирушать до вказаної [Concept('country_with_icon', 'держави')|e] і почнуть виконувати доручену вами дію.\n\n[Concept('improve_relation_with_icon', 'Поліпшення відносин')|e] не має миттєвого ефекту. Воно повільно, місяцями та роками підвищує [Concept('opinion_with_icon', 'думку')|e] про вас. Це ж стосується і багатьох інших дипломатичних дій."
  lesson_admin_28b_desc: "[Concept('missions_with_icon', 'Завдання')|e] являють собою набір етапів, які покликані показати вам, що можна робити в #high Europa Universalis V#!. Це велика гра, в ній багато чого потрібно освоїти, і в цьому частина задоволення!\n\nВи щойно завершили вступ до @dip!#high політичного стилю гри#!, і тепер вам доступні завдання, які дозволять краще дізнатися, як користуватися механіками та панелями, які ми щойно обговорювали.\n\nЩоб спростити для вас знайомство з ними, ми підготували кілька завдань."
  lesson_diplomacy_has_mission_active: "Розпочніть політичне завдання"
  lesson_military_open_military: "Відкрийте панель військової справи"
  lesson_military_0: "[war_icon] Демонстрація «$PLAYER_PLAYSTYLE_MILITARY$»"
  lesson_military_0b: "[war_icon] Демонстрація «$PLAYER_PLAYSTYLE_MILITARY$»"
  lesson_military_0_desc: "Тепер розглянемо демонстрацію експансії! Для початку познайомимося з панеллю військової справи."
  lesson_military_1: "@military_panel! Військова справа"
  lesson_military_1_desc: "Тут представлені ваші [Concept('armies_with_icon', 'армії')|e]. У разі [Concept('war_with_icon', 'війни')|e] можна переміщати [Concept('armies', 'армії')] по карті, щоб битися з [Concept('armies', 'арміями')] ворога та [Concept('occupy_with_icon', 'окуповувати')|e] ворожі [Concept('locations_with_icon', 'райони')|e].\n\n[Concept('armies', 'Армії')] складаються з [Concept('regiments_with_icon', 'полків')|e] трьох різних типів.\n\n$BULLET$[levies_with_icon|e] набирається з [Concept('population_with_icon', 'представників')|e] ваших [Concept('estates_with_icon', 'станів')|e] — це слабкі, але дешеві в утриманні воїни.\n\n$BULLET$[regulars_with_icon|e] — це професійні солдати, яким потрібна платня та навчання. Для їх підготовки потрібні [Concept('manpower_with_icon', 'рекрути')|e].\n\n$BULLET$[Concept('mercenaries_with_icon', 'Наймачів')|e] можна завербувати за [Concept('gold_with_icon', 'дукати')|e] та відправити на смерть за вашу [Concept('country', 'державу')]… доки вам є, чим платити.\n\nНа початку гри більшість [Concept('countries_with_icon', 'держав')|e] при веденні [Concept('wars', 'війн')] головним чином покладається на [Concept('levies', 'ополчення')], що постачаються [Concept('estates', 'станами')], але з часом і в міру відкриття [Concept('advances_with_icon', 'покращень')|e] відбуватиметься зсув у бік професійних [Concept('regiments', 'полків')], яким необхідні [Concept('manpower', 'рекрути')].\n\n[navies_with_icon|e] — це морський еквівалент [Concept('armies', 'армій')], і влаштовані вони схожим чином, з [Concept('navy_levies_with_icon', 'флотським ополченням')|e] та професійними [Concept('ships_with_icon', 'кораблями')|e], яким потрібні [Concept('sailors_with_icon', 'моряки')|e]."
  lesson_military_2: "[manpower_icon] Рекрути"
  lesson_military_2_desc: "Тепер потрібно поговорити про [Concept('manpower_with_icon', 'рекрутів')|e]. Як ми вже говорили, [Concept('manpower', 'рекрути')] необхідні для набору [Concept('regular_regiments_with_icon', 'регулярних полків')|e], і для поповнення, якщо полки зазнають втрат.\n\n[Concept('manpower', 'Рекрути')] з'являються у військових [Concept('buildings_with_icon', 'спорудах')|e], де працюють #TOOLTIP:POPTYPE,soldiers,X #L солдати#!#!.\n\n#weak На ранньому етапі можна отримувати рекрутів, зводячи #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерії#!#! через панель виробництва, але в міру вивчення нових [Concept('advances_with_icon', 'покращень')|e] вам стануть доступні нові джерела.#!\n\n@hint! Дізнатися більше про [Concept('manpower', 'рекрутів')] можна [Link('hints', 'selected_hint = hint_manpower', 'тут')]."
  lesson_military_war_0: "[casus_belli_icon] Привід для війни"
  lesson_military_war_0_desc: "Тепер, коли ми обговорили [Concept('armies_with_icon', 'армії')|e] та [Concept('navies_with_icon', 'флот')|e], варто загалом поговорити про [Concept('war_with_icon', 'війну')|e] та [Concept('casus_belli_with_icon', 'приводи для неї')|e].\n\nСпочатку одна [Concept('country_with_icon', 'держава')|e] оголошує [Concept('war', 'війну')] іншій. Її можна оголосити з законної причини, відомої як [Concept('casus_belli_with_icon', 'привід для війни')|e], що спростить майбутні мирні переговори. Оголосити [Concept('war', 'війну')] без [Concept('casus_belli', 'приводу')] теж можна, але це куди сильніше позначиться на вашій [Concept('stability_with_icon', 'стабільності')|e] та [Concept('opinion_with_icon', 'думці')|e] сусідів.\n\nНайкращий спосіб отримати привід для війни — запросити його у свого [Concept('parliament_with_icon', 'парламенту')|e] через панель уряду. Створення [Concept('spy_networks_with_icon', 'шпигунської мережі')|e] в іншій [Concept('country', 'державі')] також дозволить вам сфабрикувати привід для війни з нею, якщо ви вважаєте [Concept('cores_with_icon', 'національними')|e] її землі або є один для одного [Concept('rivals_with_icon', 'суперниками')|e].\n\n#weak При оголошенні [Concept('war', 'війни')] варто пам'ятати, що [Concept('allies_with_icon', 'союзники')|e] та [Concept('subjects_with_icon', 'ленники')|e] ваших ворогів, швидше за все, підтримають їх! #!\n\n@hint! Дізнатися більше про [Concept('casus_belli', 'приводи для війни')] можна [Link('hints', 'selected_hint = hint_casus_belli', 'тут')]."
  lesson_military_war_1: "[war_icon] Війна"
  lesson_military_war_1_desc: "Будь-який [Concept('war_with_icon', 'конфлікт')|e] виграється за рахунок накопичення [Concept('war_score_with_icon', 'військового рахунку')|e], який можна отримати за перемоги в [Concept('battles_with_icon', 'битвах')|e], успішну [Concept('occupy_with_icon', 'окупацію')|e] ворожих [Concept('locations_with_icon', 'районів')|e] і, найголовніше, за досягнення [Concept('war_goal', 'цілі війни')|e]. Кожна [Concept('war_with_icon', 'війна')|e] ведеться з певною [Concept('war_goal', 'ціллю')|e], яка залежить від [Concept('casus_belli_with_icon', 'приводу')|e] сторони, що атакує.\n\nУ конфлікті беруть участь два [Concept('war_leaders_with_icon', 'лідери')|e], у кожного з яких може бути кілька [Concept('war_allies_with_icon', 'військових союзників')|e]. Війна завершується, коли обидві сторони [Concept('peace_treaty_with_icon', 'домовляються про мир')|e].\n\nПід час війни можна [Concept('occupy', 'окупувати')] ворожі території, але вони не стануть повністю вашими, доки війна не завершиться підписанням [Concept('peace_treaty', 'мирного договору')], який узаконить передачу [Concept('ownership', 'володіння')|e].\n\nДізнатися більше про [Concept('war', 'війну')], [Concept('battles', 'битви')] та [Concept('occupy', 'окупацію')] можна тут:\n[Link('hints', 'selected_hint = hint_war_with_icon', 'Порада про війну')]\n[Link('hints', 'selected_hint = hint_battle_with_icon', 'Порада про битви')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation_with_icon', 'Порада про окупацію та облогу')]"
  lesson_military_war_2: "[war_exhaustion_icon] Втома від війни"
  lesson_military_war_2_desc: "Під час [Concept('war_with_icon', 'конфлікту')|e] у вашої держави накопичується [Concept('war_exhaustion_with_icon', 'втома від війни')|e]. Якщо її стане занадто багато, ваші [Concept('armies_with_icon', 'армії')|e] та [Concept('levies_with_icon', 'ополчення')|e] будуть гірше [Concept('battle_with_icon', 'битися')|e], а ваше [Concept('population_with_icon', 'населення')|e] почне зменшуватися.\n\nНайкращий спосіб зменшити втому від війни — це [Concept('peace_with_icon', 'мирне життя')|e]. Втім, деякі [Concept('laws_with_icon', 'правила')|e] та [Concept('estate_privileges_with_icon', 'станові привілеї')|e] поступово зменшують цю втому.\n\n@hint! Дізнатися більше про [Concept('war_exhaustion', 'втому від війни')] можна [Link('hints', 'selected_hint = hint_war_exhaustion', 'тут')]."
  lesson_military_war_3: "[war_icon] Контроль над новими територіями"
  lesson_military_war_3_desc: "Нові завойовані землі не принесуть вам користі одразу. Пам'ятайте, що для цього вам потрібно [Concept('control_with_icon', 'контролювати')|e] [Concept('locations_with_icon', 'райони')|e]. Можливо, щоб покращити їхню [Concept('proximity_with_icon', 'досяжність')|e], доведеться вкласти значні кошти в розвиток інфраструктури.\n\nКрім того, [Concept('conquered_with_icon', 'завойована')|e] земля обкладається серйозними штрафами, доки ви не [Concept('integrate_with_icon', 'інтегруєте')|e] її за допомогою [Concept('cabinet_action_with_icon', 'дій ради')|e]. З цієї причини бажано ставити на чолі нової завойованої землі [Concept('subject_with_icon', 'ленника')|e], який керуватиме нею від вашого імені.\n\n#italic Дізнатися більше про інтеграцію можна тут: [Link('hints', 'selected_hint = hint_has_conquered_provinces_with_icon', '$hint_has_conquered_provinces$')]."
  lesson_military_open_geopolitics: "Відкрийте панель геополітики"
  lesson_military_8: "@geopolitics_panel! Геополітика"
  lesson_military_8_desc: "Наостанок варто звернути увагу на @geopolitics_panel! #high панель геополітики#!, щоб дізнатися про механіки, які можуть стати в пригоді в майбутніх [Concept('ages', 'епохах')|e]: [exploration_with_icon|el] та [colonization_with_icon|el]!"
  lesson_military_9: "@geopolitics_panel! Геополітика"
  lesson_military_9_desc: "З часом, особливо в епоху #TOOLTIP:AGE,age_3_discovery,X #L Відкриттів#!#!, багато [Concept('countries_with_icon', 'держав')|e] почнуть споряджати [Concept('exploration_with_icon', 'експедиції')|e]. На цій панелі представлені можливі експедиції, а також придатні землі для [Concept('colonization_with_icon', 'колонізації')|e], якщо у вас є можливість до них дістатися. Ви будете збільшувати свою [Concept('colonial_range_with_icon', 'колонізаційну дистанцію')|e] в міру вивчення відповідних [Concept('advances_with_icon', 'покращень')|e].\n\nНа інших вкладках цієї панелі також наведена корисна інформація про ваші землі: ви можете вивчити різні [Concept('provinces_with_icon', 'провінції')|e] вашої [Concept('country_with_icon', 'держави')|e], а також [Concept('diseases_with_icon', 'епідемії')|e], що лютують у світі. Якщо ви [Concept('own', 'володієте')|e] [Concept('coastal', 'прибережними')] [Concept('location_with_icon', 'районами')|e], то побачите список значущих для вас [Concept('seazones_with_icon', 'акваторій')|e] та вашу [Concept('maritime_presence_with_icon', 'морську присутність')|e] у них, а також ризик появи [Concept('pirates_with_icon', 'піратів')|e] та [Concept('privateers_with_icon', 'каперів')|e]."
  lesson_admin_28c_desc: "[Concept('missions_with_icon', 'Завдання')|e] являють собою набір етапів, які покликані показати вам, що можна робити в #high Europa Universalis V#!. Це велика гра, в ній багато чого потрібно освоїти, і в цьому частина задоволення!\n\nВи щойно завершили вступ до @mil!#high експансіоністського стилю гри#!, і тепер вам доступні завдання, які дозволять краще дізнатися, як користуватися механіками та панелями, які ми обговорювали.\n\nЩоб спростити для вас знайомство з ними, ми підготували кілька завдань."
  lesson_military_has_mission_active: "Розпочніть військове завдання"