  diplomatic_status_supporting_rebels_tooltip: "#T Підтримка чужих повстанців#!\nКраїна підтримує [Concept('rebels', 'повстанців')|e] у цих [Concept('countries', 'країнах')|e]."
  diplomatic_status_rebels_being_supported_name: "Підтримка своїх повстанців"
