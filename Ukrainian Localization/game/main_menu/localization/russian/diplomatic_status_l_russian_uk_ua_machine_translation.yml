  diplomatic_status_getting_economic_support_name: "Отримана фінансова підтримка"
  diplomatic_status_getting_economic_support_tooltip: "#T Отримана фінансова підтримка#!\nКраїна зараз отримує [Concept('economic_support', 'фінансову підтримку')|e] від цих [Concept('countries', 'країн')|e]."
  diplomatic_status_giving_economic_support_name: "Надання фінансової підтримки"
  diplomatic_status_giving_economic_support_tooltip: "#T Отримувачі фінансової підтримки#!\nКраїна зараз надає [Concept('economic_support', 'фінансову підтримку')|e] цим [Concept('countries', 'країнам')|e]."
  diplomatic_status_getting_war_reparations_name: "Отримані контрибуції"
  diplomatic_status_getting_war_reparations_tooltip: "#T Отримані контрибуції#!\nКраїна зараз отримує [Concept('war_reparations', 'контрибуції')|e] з цих [Concept('countries', 'країн')|e]."
  diplomatic_status_giving_war_reparations_name: "Виплата контрибуції"
  diplomatic_status_giving_war_reparations_tooltip: "#T Отримувачі контрибуцій#!\nКраїна зараз виплачує [Concept('war_reparations', 'контрибуції')|e] цим [Concept('countries', 'країнам')|e]."
  diplomatic_status_building_spy_network_name: "Діючі шпигунські мережі"
  diplomatic_status_building_spy_network_tooltip: "#T Діючі шпигунські мережі#!\nУ країни зараз діють [Concept('spy_networks', 'шпигунські мережі')|e] в цих [Concept('countries', 'країнах')|e]."
  diplomatic_status_curry_favors_name: "Пошук прихильності"
  diplomatic_status_curry_favors_tooltip: "#T Пошук прихильності#!\nКраїна зараз шукає [Concept('favors', 'прихильності')|e] цих [Concept('countries', 'країн')|e]."
  diplomatic_status_union_name: "Унії"
  diplomatic_status_union_tooltip: "#T Унії#!\nКраїна сформувала унії з цими [Concept('countries', 'країнами')|e]."
  diplomatic_status_marriage_union_name: "Шлюбні унії"
  diplomatic_status_marriage_union_tooltip: "#T Шлюбні унії#!\nКраїна сформувала шлюбну унію з цими [Concept('countries', 'країнами')|e]."
  diplomatic_status_royal_marriage_name: "Династичні шлюби"
  diplomatic_status_royal_marriage_tooltip: "#T Династичні шлюби#!\nКраїна уклала [Concept('royal_marriages', 'династичні шлюби')|e] з цими [Concept('countries', 'країнами')|e]."
  diplomatic_status_enemies_name: "Вороги"
  diplomatic_status_enemies_tooltip: "#T Вороги#!\nЦі [Concept('countries', 'країни')|e] вважають країну [Concept('rival', 'суперником')|e]."
  diplomatic_status_rivals_name: "Суперники"
  diplomatic_status_rivals_tooltip: "#T Суперники#!\nКраїна вважає ці [Concept('countries', 'країни')|e] [Concept('rival', 'суперниками')|e]."
  diplomatic_status_historical_enemies_name: "Історичні вороги"
  diplomatic_status_historical_enemies_tooltip: "#T Історичні вороги#!\nЦі [Concept('countries', 'країни')|e] вважають країну історичним [Concept('rival', 'суперником')|e] у довгостроковій перспективі."
  diplomatic_status_historical_rivals_name: "Історичні суперники"
  diplomatic_status_historical_rivals_tooltip: "#T Історичні суперники#!\nКраїна вважає ці [Concept('countries', 'країни')|e] історичними [Concept('rival', 'суперниками')|e] у довгостроковій перспективі."
  diplomatic_status_war_name: "Війна"
  diplomatic_status_war_tooltip: "#T Війна#!\nКраїна [Concept('war', 'воює')|e] з цими [Concept('countries', 'країнами')|e]."
  diplomatic_status_alliance_name: "Союзники"
  diplomatic_status_alliance_tooltip: "#T Союзники\n#!Країни в [Concept('alliance', 'союзі')|e] часто допомагатимуть одна одній, якщо зазнають нападу."
  diplomatic_status_vassalizing_name: "Ленники"
  diplomatic_status_vassalizing_tooltip: "#T Ленники#!\nЦі країни можуть прийти на допомогу [Concept('overlord', 'сюзерену')|e], якщо ми нападемо на нього."
  diplomatic_status_vassalized_name: "Сюзерен"
  diplomatic_status_vassalized_tooltip: "#T Сюзерен#!\n[Concept('overlord', 'Сюзерен')|e] може захистити цю країну, якщо ми нападемо на неї."
  diplomatic_status_casus_belli_name: "Приводи для війни"
  diplomatic_status_casus_belli_tooltip: "#T Приводи для війни#!\nКраїна має [Concept('casus_belli', 'приводи для війни')|e] проти цих [Concept('countries', 'країн')|e]. Вона може оголосити їм [Concept('war', 'війну')|e] без штрафу до [Concept('stability', 'стабільності')|e]."
  diplomatic_status_casus_belli_target_name: "Ціль приводу для війни"
  diplomatic_status_casus_belli_target_tooltip: "#T Ціль приводу для війни#!\nЦі [Concept('countries', 'країни')|e] мають [Concept('casus_belli', 'привід для війни')|e] проти країни. Вони можуть оголосити їй [Concept('war', 'війну')|e] без штрафів."
  diplomatic_status_guaranteeing_name: "Надана гарантія"
  diplomatic_status_guaranteeing_tooltip: "#T Надана гарантія#!\nКраїна автоматично захищатиме країну, якій [Concept('guaranteeing', 'дала гарантію')|e]."
  diplomatic_status_guaranteed_name: "Отримана гарантія"
  diplomatic_status_guaranteed_tooltip: "#T Отримана гарантія#!\nУсі країни, які [Concept('guaranteeing', 'дали гарантію')|e] країні, вступлять в оборонну [Concept('war', 'війну')|e], якщо країна зазнає нападу."
  diplomatic_status_truce_name: "Перемир'я"
  diplomatic_status_truce_tooltip: "#T Перемир'я#!\nКраїна уклала [Concept('truce', 'перемир'я')|e] з цими [Concept('countries', 'країнами')|e]."
  diplomatic_status_annul_treaties_name: "Розірвання договорів"
  diplomatic_status_annul_treaties_tooltip: "#T Розірвання договорів#!\nКраїна була змушена розірвати всі договори з цими [Concept('countries', 'країнами')|e], тому вона не може мати з ними жодних відносин або підкорити їх дипломатичним шляхом."
  diplomatic_status_warning_name: "Попередження"
  diplomatic_status_warning_tooltip: "#T Попередження#!\nЯкщо будь-яка країна отримала попередження, напала на країну і межує як з нею, так і з попереджувальною стороною, то остання отримає [Concept('casus_belli', 'привід для війни')|e] проти такої країни."
  diplomatic_status_warned_name: "Отримані попередження"
  diplomatic_status_warned_tooltip: "#T Отримані попередження#!\nКраїна, отримавши попередження, дасть стороні, що попередила, [Concept('casus_belli', 'привід для війни')|e], якщо нападе на країну, яка межує з обома сторонами."
  diplomatic_status_gives_military_access_name: "Право на прохід військ"
  diplomatic_status_gives_military_access_tooltip: "#T Право на прохід військ#!\nКраїна надає [Concept('military_access', 'право на прохід військ')|e] цим [Concept('countries', 'країнам')|e]."
  diplomatic_status_has_military_access_name: "Отримане право на прохід військ"
  diplomatic_status_has_military_access_tooltip: "#T Отримане право на прохід військ#!\nКраїна отримала [Concept('military_access', 'право на прохід військ')|e] від цих [Concept('countries', 'країн')|e]."
  diplomatic_status_gives_fleet_basing_rights_name: "Право на розміщення флоту"
  diplomatic_status_gives_fleet_basing_rights_tooltip: "#T Надання права на розміщення флоту#!\nКраїна надає [Concept('fleet_basing_rights', 'право на розміщення флоту')|e] цим [Concept('countries', 'країнам')|e]."
  diplomatic_status_has_fleet_basing_rights_name: "Отримане право на розміщення флоту"
  diplomatic_status_has_fleet_basing_rights_tooltip: "#T Отримане право на розміщення флоту#!\nКраїна отримала [Concept('fleet_basing_rights', 'право на розміщення флоту')|e] від цих [Concept('countries', 'країн')|e]."
  diplomatic_status_civil_war_name: "Громадянська війна"
  diplomatic_status_civil_war_tooltip: "#T Громадянська війна#!\nУ країні йде [Concept('civil_war', 'громадянська війна')|e]!"
  diplomatic_status_annex_name: "Приєднання ленників"
  diplomatic_status_annex_tooltip: "#T Приєднання ленників#!\nКраїна в даний момент приєднує цих [Concept('subjects', 'ленників')|e]."
  diplomatic_status_annex_target_name: "Є ціллю приєднання"
  diplomatic_status_annex_target_tooltip: "#T Є ціллю приєднання#!\nУ даний момент цю країну приєднує наступна [Concept('country', 'країна')|e]."
  diplomatic_status_opinion_improvement_passive_name: "Думка, що покращується"
  diplomatic_status_opinion_improvement_passive_tooltip: "#T Думка, що покращується#!\n[Concept('opinion', 'Думка')|e] країни про ці [Concept('countries', 'країни')|e] покращується."
  diplomatic_status_opinion_improvement_active_name: "Покращення думки"
  diplomatic_status_opinion_improvement_active_tooltip: "#T Покращення думки#!\nКраїна покращує [Concept('opinion', 'думку')|e] про себе в цих країнах."
