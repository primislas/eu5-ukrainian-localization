l_russian:
  COLONIAL_CHARTER: "$ADJ$а колонія [PROVINCE_DEFINITION.GetNameWithNoTooltip]"
  START_COLONY_TT: "Для створення колоніального поселення в провінції [PROVINCE_DEFINITION.GetName|Y] доведеться витратити $COST$. Це поступово приваблюватиме [Concept('pops', 'групи населення')|e] до [Concept('locations', 'місцевостей')|e] провінції [PROVINCE_DEFINITION.GetName], і з часом територія стане нашою."
  ABANDON_COLONY_TT: "Для відмови від колоніального поселення в провінції [COLONIAL_CHARTER.GetName|Y] доведеться витратити $COST$. [Concept('pops', 'Групи населення')|e], які переїхали до [Concept('locations', 'місцевостей')|e] на чужій території, залишаться без нашої допомоги."
  START_COLONY_TT_NO_COST: "Створення колоніального поселення в [Concept('locations', 'місцевостях')|e] провінції [PROVINCE_DEFINITION.GetName] приваблюватиме туди [Concept('pops', 'групи населення')|e], і з часом уся територія стане вашою."
  ABANDON_COLONY_TT_NO_COST: "У занедбане колоніальне поселення більше не мігруватимуть люди. [Concept('pops', 'Групи населення')|e], які переїхали до [Concept('locations', 'місцевостей')|e] на чужій території, залишаться без нашої допомоги."
  ABANDON_BUTTON: "Покинути колоніальне поселення"
  NO_COLONIAL_CHARTER_EXCLUSIVE: "Зайнято #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_INST')|L]#!#!, причина: $NAME$."
  NO_COLONIAL_CHARTER_RELIGION: "$NAME|Y$ — причина, через яку лише країна [COUNTRY.GetName] може колонізувати цю територію, тоді як іншим #L [COUNTRY.GetReligion.GetAdjective|l]им#! країнам заборонено це."
  treaty_of_noteborg: "За #Y Оріхівським#! миром Новгород і Швеція владнали територіальні суперечки у Фінляндії та Карелії"
  COLONIAL_PROGRESS_POT_HEADER: "Колоніальний прогрес"
  COLONIAL_MIGRATION_HEADER_TT: "Міграція на місяць до колоніального поселення [ColonialCharter.GetNameWithNoTooltip]"
  COLONIAL_CHARTER_TOTAL_MIGRATION: "Загальна [Concept('migration', 'міграція')|e] [Concept('pops', 'груп населення')|e] — $VAL|y$ на місяць."
  COLONIAL_CHARTER_FROM_CHARTER: "Від [Concept('colonial_charter', 'колоніального поселення')|e]:"
  COLONIAL_CHARTER_FROM_CABINET: "Від наших [Concept('cabinet_actions', 'дій ради')|e]:"
  COLONIAL_CHARTER_FROM_CABINET_SPECIFIC_ENTRY: "Від провінції [PROVINCE.GetName]:"
  COLONIAL_CHARTER_NO_SOURCE: "Міграція неможлива, оскільки у вашій країні немає місцевостей для імміграції, де проживає понад 1000 [Concept('pops', 'населення')|e] вашої [Concept('culture', 'культури')|e] та [Concept('religion', 'релігії')|e]."
  COLONIAL_CHARTER_CURRENT: "Щомісяця $VAL|Y$ [Concept('pops', 'гр. населення')|e] переїжджатиме з [LOCATION.Custom('LR_GEN')|l] [LOCATION.GetName], щоб колонізувати [TARGET_LOCATION.Custom('LR_ACC')|l] [TARGET_LOCATION.GetName]."
  COLONIAL_CHARTER_CURRENT_WITH_CABINET: "Внаслідок дії нашої [Concept('cabinet', 'ради')|e] можуть переїхати додаткові групи населення:"
  COLONIAL_CHARTER_CURRENT_WITH_CABINET_ENTRY: "$BULLET_WITH_TAB$$VAL|Y$ [Concept('pops', 'гр. населення')|e] переїжджатиме з [LOCATION.Custom('LR_GEN')|l] [LOCATION.GetName], щоб колонізувати [TARGET_LOCATION.Custom('LR_ACC')|l] [TARGET_LOCATION.GetName]."
  COLONIAL_CHARTER_CTA: "Щоб перемістити камеру, клацніть лівою кнопкою миші"
  COLONIAL_CHARTER_COUNT: "Зараз $OWN|Y$ шт. [Concept('locations', 'місцевостей')|e] було колонізовано #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_INST')|L]#!#!, і ще $POSSIBLE|Y$ шт. може бути колонізовано."
  COLONIAL_MARITIME_IN: "[Concept('maritime_presence', 'Морська присутність')|e] у регіоні [REGION.GetName]: x$VAL|Y2$"
  COLONIAL_MARITIME_NOT_IN: "[REGION.GetName] не має [Concept('coastal', 'узбережжя')|e]: x$VAL|Y2$"
  COLONIAL_DISTANCE: "Відстань від столиці ([COUNTRY.GetCapital.GetName]): x$VAL|Y2$"
  COLONIZE_DESC: "Ми спробуємо [Concept('colonize', 'колонізувати')|e] провінцію [PROVINCE_DEFINITION.GetName], створивши там [Concept('colonial_charter', 'колоніальне поселення')|e]"
  COLONIAL_TARGET_IS_ABOUT_TO_BE_OURS: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] скоро стане нашим!"
  COLONIAL_TARGET_IS_ABOUT_TO_BE_OTHERS: "[LOCATION.GetName] скоро перейде у володіння [TARGET_COUNTRY.Custom('CL_GEN')|L]!"
  COLONIAL_TARGET_NO_COLONIAL_BUILDINGS_KNOWN: "Немає можливих [Concept('buildings', 'споруд')|e] для колонізації!"
  COLONIAL_TARGET_NO_POSSIBLE_BUILDINGS: "@trigger_no! Немає [Concept('explored', 'вивчених')|e] [Concept('locations', 'місцевостей')|e], які можна [Concept('colonize', 'колонізувати')|e]."
  COLONIAL_TARGET_NO_KNOWN_LOCATIONS: "Не відомо жодної [Concept('locations', 'місцевості')|e]."
  COLONIZE_ACTION_BUTTON: "Розпочати колонізацію"
  COLONIZE_BUTTON: "Колонізувати"
  COLONIZE_ACTION: "Створити [Concept('colonial_charter', 'колоніальне поселення')|e]"
  ABANDON_COLONY_BUTTON: "Покинути"
  ABANDON_ACTION: "Покинути це [Concept('colonial_charter', 'колоніальне поселення')|e]"
  COLONIAL_FLIP_HEADER: "Колоніальний прогрес [LOCATION.Custom('LR_GEN')] [LOCATION.GetNameWithNoTooltip]"
  COLONIAL_TARGET_LOCATION_ALREADY_OWNED: "Ця [Concept('location', 'місцевість')|e] вже належить #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_DAT')|L]#!#!."
  COLONIAL_TARGET_LOCATION_TRUCE_WITH_OWNER: "$BULLET_WITH_TAB$Між країнами [COUNTRY.GetName] та [TARGET_COUNTRY.GetName] діє [Concept('truce', 'перемир’я')|e]."
  COLONIAL_TARGET_LOCATION_NOT_ENOUGH_POWER_PROJECTION: "$BULLET_WITH_TAB$[Concept('country', 'Країні')|e] [TARGET_COUNTRY.GetName] потрібно на $VAL|0Y$ од. більше [Concept('power_projection', 'дипломатичної ваги')|e], ніж у поточного власника ([COUNTRY.GetName]: [COUNTRY.GetPowerProjection|0] од.), щоб отримати шанс перехопити контроль над цією місцевістю."
  COLONIAL_TARGET_LOCATION_NOT_ENOUGH_MIGRANTS: "$BULLET_WITH_TAB$Лише мала частка наших [Concept('pops', 'груп населення')|e] ($MOVED|V$) перемістилася до [LOCATION.Custom('LR_ACC')|l] [LOCATION.GetName]. Щойно частка зросте хоча б до #TOOLTIP:$BREAKDOWN_TAG$ $NEED|%L2$#!, місцевість стане нашою."
  COLONIAL_TARGET_LOCATION_NOBODY_LIVES_THERE: "$BULLET_WITH_TAB$У [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] живе занадто мало людей.\nЗараз: [LOCATION.GetTotalPopulation]\nМінімально необхідне населення: #TOOLTIP:$BREAKDOWN_TAG$ $NEED|V$#!"
  COLONIAL_TARGET_LOCATION_CAN_FLIP: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] може перейти у володіння #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!."
  COLONIAL_TARGET_LOCATION_CANNOT_FLIP: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] поки не може перейти у володіння #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!. Причини:\n$REASONS$"
  COLONIAL_TARGET_ENTRY: "$BULLET_WITH_TAB$[LOCATION.GetName]: переїхало — $MOVED|V$; необхідно — #TOOLTIP:$BREAKDOWN_TAG$ $NEED|%L2$#!"
  COLONY_POP_TARGET_PP_COUNTRY: "[Concept('power_projection', 'Дипломатична вага')|e] #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!: $VAL$"
  COLONY_POP_TARGET_PP_EXISTS: "[Concept('power_projection', 'Дипломатична вага')|e] у [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName]: $VAL$"
  COLONY_POP_TARGET_MIN_POPS: "Необхідний мінімум [Concept('pops', 'груп населення')|e] у [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] (без урахування [Concept('population', 'населення')|e]): $VAL$"
  COLONY_POP_TARGET_MAX_POPS: "Необхідний мінімум [Concept('pops', 'груп населення')|e] у [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] (без урахування [Concept('population', 'населення')|e]): $VAL$"
  COLONY_POP_TARGET_LOCATION_POPULATION: "Якщо додати [Concept('population', 'населення')|e] [Concept('location', 'місцевості')|e] ($POPULATION$), то ми отримаємо цільовий показник $NEED$"
  COLONIAL_CHARTER_LABEL: "[Concept('colonial_charter', 'Колоніальне поселення')|e] у провінції [PROVINCE_DEFINITION.GetName] на $PERC|2V%$ [Concept('fully_settled', 'повністю заселено')|e]"
  COLONIAL_CHARTER_FULLY_OURS: "[LOCATION.GetName]: $PERC|G0%$"
  COLONIAL_CHARTER_ENTRY: "[LOCATION.GetName]: #TOOLTIP:$BREAKDOWN_TAG$ $PERC|2%LV$#!"
  COLONIAL_PROGRESS_HEADER: "Колоніальний прогрес"