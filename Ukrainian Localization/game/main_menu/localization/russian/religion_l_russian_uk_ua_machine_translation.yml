  christian: "Християнство"
  christian_ADJ: "Християнськ"
  christian_desc: "Християнство — найбільша авраамічна релігія, заснована на вченні Ісуса Христа про спасіння через віру та дотримання заповідей. У християнстві є різні напрями, найвідоміші — католицтво, протестантизм і православ'я. Кожне з них претендує на статус істинного вчення, і всі вони так чи інакше відіграють важливу роль у духовному, культурному та політичному житті величезної кількості країн."
  muslim: "Іслам"
  muslim_ADJ: "Ісламськ"
  muslim_desc: "Іслам — монотеїстична релігія, заснована в VII столітті пророком Мухаммедом. Її представники, слідуючи вченню священного Корану, сповідують віру в єдиного Бога — Аллаха. Попри ранній поділ на кілька конкуруючих напрямів, іслам мав величезний вплив на розвиток світової науки та культури."
  buddhist: "Буддизм"
  buddhist_ADJ: "Буддійськ"
  buddhist_desc: "Буддизм сягає корінням у вчення Сіддхартхи Ґаутами, також відомого як Будда #italic Шак'ямуні#! — «пробуджений з роду Шак'я». Виникнувши в стародавній Індії, ця релігія поширилася практично по всій Азії і навіть за її межами. Вона не тільки вплинула на безліч народів і вірувань, а й сама зазнала впливу їхніх культур. Так у буддизмі з'явилися найрізноманітніші течії зі своїми практиками та тлумаченнями священних текстів. Але всі вони так чи інакше сповідують звільнення від циклу перероджень, званого сансарою."
  dharmic: "Дхарма"
  dharmic_ADJ: "Дхармічеськ"
  dharmic_desc: "Дхармічні релігії зародилися в Індії. Усі їхні вчення ґрунтуються на понятті дхарми — правильного способу життя відповідно до космічних законів всесвіту."
