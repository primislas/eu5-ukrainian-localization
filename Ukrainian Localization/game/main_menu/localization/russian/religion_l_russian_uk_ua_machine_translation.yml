  mississippian_ceremonial_desc: "Міссісіпський церемоніалізм $common_folk_religion_desc$"
  moism_desc: "Моїзм $common_folk_religion_desc$"
  norse_desc: "Ця стародавня релігія германських племен Скандинавії відрізняється різноманіттям богів, асів і ванів, найвідомішими з яких є Одін і Тор. Вважається, що всесвіт складається з дев'яти світів і світового дерева Іґґдрасіля. Світ людей називається Мідґард."
  alan_paganism_desc: "Аланське язичництво $common_folk_religion_desc$"
  paiute_shamanism_desc: "Шаманізм пайютів $common_folk_religion_desc$"
  pomo_shamanism_desc: "Шаманізм помо $common_folk_religion_desc$"
  rmaism_desc: "Рмаїзм $common_folk_religion_desc$"
  romuva_desc: "Традиційні литовські вірування з цілим пантеоном богів, а також шануванням природи та предків. Церемонії проводяться на вогняних вівтарях, навколо яких підносяться ритуальні гімни, дайно."
  salishan_totemism_desc: "Салішський тотемізм $common_folk_religion_desc$"
  sanamahism_desc: "Санамахізм $common_folk_religion_desc$"
  sapmi_shamanism_desc: "Традиційні релігійні практики саамів з поклонінням безлічі духів природи та тварин, а також шануванням померлих. Деякі тварини користуються особливою повагою, наприклад північний олень та ведмідь."
  muinaisusko_desc: "Традиційні вірування фінських народів з безліччю божеств, головним серед яких є бог неба та грому Укко. У релігії також присутнє шанування померлих та шаманські ритуали, а деякі її елементи перегукуються з віруваннями сусідніх народів."
  satsana_phi_desc: "Сатсана Пхі $common_folk_religion_desc$"
  shamanism_desc: "Узагальнений набір практик та вірувань, центральну роль у яких відіграє шаман — людина, здатна спілкуватися зі світом духів та використовувати їхню силу для впливу на матеріальний світ. Конкретні духи, боги чи ритуали можуть відрізнятися, але основна ідея світу духів та взаємодії з ним є спільною для всіх шаманістських практик."
  totemism_desc: "Тотемізм $common_folk_religion_desc$"
  tungusic_shamanism_desc: "Тунгуський шаманізм $common_folk_religion_desc$"
  vainakh_paganism_desc: "Вайнахське язичництво $common_folk_religion_desc$"
  yukaghir_shamanism_desc: "Юкагірський шаманізм $common_folk_religion_desc$"
  yupik_shamanism_desc: "Юпікський шаманізм $common_folk_religion_desc$"
  yazidism_desc: "Похідна від іранських традицій з елементами юдаїзму, християнства та ісламу. Згідно з цією релігією, всесвіт був створений Богом, але він призначив правити ним «янгола-павича» Малака Тавуса. Попри вплив інших релігій, особливо їхніх езотеричних практик, по суті своїй це похідна від стародавніх іранських релігій."
  zoroastrian_desc: "Стародавня іранська релігія, що слідує вченням пророка Зороастра, також відомого як Заратустра, та текстам Авести. Зороастризм ґрунтується на дуалістичній космології добра і зла з вічним конфліктом між божеством Ахурамаздою та духом руйнування Ангра-Майнью, а також вірою в прийдешню перемогу добра над злом."
  common_folk_religion_desc: "— релігія місцевого населення, його міфологія, традиції та практики, які зберігаються та передаються з покоління в покоління з початку часів."
  bantu_religion: "Бантуські вірування"
