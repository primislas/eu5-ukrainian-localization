  hanafi_school: "Ханафітський мазхаб"
  hanafi_school_desc: "$hanafi_school$ названий на честь імама Абу Ханіфи ан-Нумана ібн Сабіта. Ця школа виникла в Куфі та здобула велику популярність серед #TOOLTIP:CULTURE,$persian_culture_tt$,X #L перських#!#! та #TOOLTIP:CULTUREGROUP,turkic_group,X #L тюркських#!#! народів, що проживають на землях від Африки до Північної Індії. Хоча у своїй правовій практиці ханафіти віддають перевагу текстовим джерелам на кшталт Корану чи хадисів, вони також активно використовують аналогії (кіяси), судовий розсуд (істіхсан) та місцеві звичаї (урфи). Деякі вважають ханафітську школу найбільш гнучкою та ефективною з усіх."
  hanbali_school: "Ханбалітський мазхаб"
  hanbali_school_desc: "Ханбалітський мазхаб названий на честь імама Ахмада ібн Ханбаля. Представники цієї школи відкидають будь-які спекулятивні міркування на богословські теми. Ханбаліти вважають, що Коран і Сунна є єдиними авторитетними джерелами права, які слід трактувати в буквальному сенсі з урахуванням прийнятих традицій. Попри свій канонічний статус, ханбалітське право використовується лише в невеликій кількості країн, а в період Аббасидського халіфату його прихильники й зовсім зазнавали гонінь."
  maliki_school: "Малікітський мазхаб"
  maliki_school_desc: "Малікітський мазхаб названий на честь імама Маліка ібн Анаса. Ця школа особливо широко представлена в #TOOLTIP:SUB_CONTINENT,north_africa,X #L Північній Африці#!#! та #TOOLTIP:REGION,iberia_region,X #L Іберії#!#!. Її представники ґрунтують свою правову практику на працях Ібн Анаса та його учня Сахнуна, зокрема — на «Муватті» та «аль-Муваддані». Одним із головних освітніх центрів малікітської школи є Велика мечеть Кайруана в #TOOLTIP:LOCATION,tunis,X #L Тунісі#!#!."
  shafii_school: "Шафіїтський мазхаб"
  shafii_school_desc: "Шафіїтський мазхаб названий на честь імама аш-Шафії. Більша частина його представників проживає в країнах #TOOLTIP:REGION,arabia_region,X #L Аравії#!#!, а також у східних частинах #TOOLTIP:SUB_CONTINENT,east_africa,X #L Африки#!#! та #TOOLTIP:CONTINENT,asia,X #L Азії#!#!. На відміну від інших шкіл, шафіїтський мазхаб відкидає використання в правовій практиці методів істіхсан та істіслах, натомість повністю покладаючись на тексти Корану та хадисів."
  zahiri_school: "Загіритський мазхаб"
  zahiri_school_desc: "Представники загіритського мазхабу виступають за буквальне тлумачення Корану та суворе дотримання викладеного в ньому вчення. На їхню думку, Аллах зіслав людям священні тексти в закінченому вигляді, тому під час читання Корану та Сунни не потрібно нічого додумувати та шукати прихований сенс."
  ashari_school: "Ашаризм"
  ashari_school_desc: "Ашаритська богословська школа, заснована Абу аль-Хасаном аль-Ашарі в IX столітті, визнає авторитет священних писань, але виступає за розумний підхід до їх тлумачення. Вчення аль-Ашарі про те, що світ складається з атомів, стало основою для головного положення ашаризму: все суще, навіть час, створив Аллах. Послідовники цієї школи вірять одночасно і в те, що люди наділені свободою волі, і в те, що доля кожного зумовлена."
  maturidi_school: "Матуридизм"
  maturidi_school_desc: "Матуридична богословська школа названа на честь #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітського#!#! мислителя Абу Мансура аль-Матуріді. Вона об'єднує різні духовні положення, прийняті в ханафітській правовій школі. Її представники дотримуються раціонального підходу до тлумачення священних текстів і вважають, що реальна віра людини важливіша за показні ритуали."
  athari_school: "Асарія"
  athari_school_desc: "Асарія — богословська школа, яка визнає Коран і хадиси як єдині авторитетні текстові джерела ісламу, але відступає від раціонального підходу на користь більш суворого тлумачення текстів. Прихильники асарії виступають проти будь-яких духовних нововведень та умовиводів, які не ґрунтуються безпосередньо на тексті Корану."
  mutazili_school: "Мутазилізм"
  mutazili_school_desc: "Мутазилітська богословська школа розвинулася під впливом грецької та індійської філософії. Вона відкидає ідею про нестворену та одвічну природу Корану, стверджуючи, що писання має хронологічно слідувати за творцем. Мутазиліти підтримують раціональний метод пізнання — але лише в тих випадках, коли він допомагає зрозуміти релігійні моральні принципи. При цьому вони вважають, що все зло походить від людей, оскільки дарована Аллахом свобода волі дозволяє їм робити помилки."
  wahhabi_school: "Ваххабітський мазхаб"
  wahhabi_school_desc: "Ваххабітський рух бере за основу вчення, яке просуває [ShowReligiousSchoolName('hanbali_school')|l]. Ваххабіти виступають проти низки суфійських практик, таких як шанування святих та паломництво до їхніх могил. При цьому вони відкидають накопичення багатства та розкоші, натомість закликаючи мусульман повернутися до первісної чистоти #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  ismaili_school: "Ісмаїлітський мазхаб"
  ismaili_school_desc: "Ісмаїлітський мазхаб названий на честь Ісмаїла ібн Джафара, сина імама Джафара ас-Садіка. Це була найпопулярніша правова школа у Фатімідському халіфаті, яка, втім, швидко втратила вплив після його падіння. Ісмаїлізм включає кілька #TOOLTIP:RELIGION,$shia_tt$,X #L шиїтських#!#! течій, прихильники яких приділяють езотеричному тлумаченню Корану набагато більше уваги, ніж представники джафаритського або зейдитського мазхабу."
  jafari_school: "Джафаритський мазхаб"
  jafari_school_desc: "Джафаритський мазхаб названий на честь шостого шиїтського імама Джафара ас-Садіка. В основі цієї школи лежить принцип іджтихаду, згідно з яким вчені повинні самостійно тлумачити правові джерела та приймати рішення незалежно від інших правознавців. Крім того, прихильники школи підтримують тимчасовий шлюб, який укладається лише на певний термін."
  zaidi_school: "Зейдитський мазхаб"
  zaidi_school_desc: "Зейдитський мазхаб названий на честь Зейда ібн Алі, якого #TOOLTIP:RELIGION,$shia_tt$,X #L шиїти#!#! вважають праправнуком пророка Мухаммеда. Його робота «Маджму аль-фікх» стала основою вчення цієї школи. Самі зейдити походять від прихильників Зейда ібн Алі, які підтримали його повстання проти Омеядського халіфату. У своїй практиці вони приділяють особливу увагу справедливості та відповідальності. І хоча формально зейдити є шиїтами, вони категорично відкидають шиїтський принцип приховування своєї віри, що в деякому сенсі ріднить їх із #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітами#!#!."
  imamiya_school: "Існаашаризм"
  imamiya_school_desc: "Прихильники цієї течії, іменовані дванадцятниками, переконані, що від соратника Мухаммеда на ім'я Алі походять дванадцять непогрішних імамів, обраних самим Аллахом. Вважається, що останній з них, аль-Махді, повернеться наприкінці часів, щоб врятувати людство та встановити на всій землі мир і справедливість. У богословсько-правових питаннях дванадцятники в основному покладаються на вчення, яке викладає [ShowReligiousSchoolName('jafari_school')|l]."
  nizari_school: "Нізаритський мазхаб"
  nizari_school_desc: "Нізарити вважають, що Абу Мансур Нізар був істинним спадкоємцем фатімідського халіфа. Вони не підтримали прихід до влади його брата аль-Мусталі, що призвело до розколу серед ісмаїлітів. Відокремившись, нізарити знайшли прихильників серед інших течій шиїзму та утворили власну школу. Ґрунтуючись переважно на джафаритському вченні, вони виступають за етнокультурне різноманіття та соціальну справедливість."
  mustali_school: "Мусталізм"
  mustali_school_desc: "Мусталіти є противниками нізаритів. На відміну від останніх, вони прийняли сходження аль-Мусталі Біллаха на престол Фатімідського халіфату. Хоча спочатку секта мусталітів виникла в Єгипті, завдяки активній місіонерській діяльності у неї з'явилося безліч прихильників у Західній Індії."
  alevism_school: "Алевізм"
  alevism_school_desc: "Алевізм — синкретична релігія, заснована на вченні Хаджі Бекташа, а також увібрала в себе деякі стародавні #L [ShowReligionAdjective('tengri')|l]і#! та #L [ShowCultureGroupName('turkic_group')|l]і#! традиції та вірування. При цьому алевіти мають певну схожість із суфіями, оскільки і ті, й інші йдуть за своїм духовним лідером і вдаються до різних містичних практик."
  alawi_school: "Алавізм"
  alawi_school_desc: "Алавіти, також відомі як нусайрити, вважають Алі ібн Абу Таліба втіленням самого Аллаха. Шанування Алі ріднить їх із #TOOLTIP:RELIGION,$shia_tt$,X #L шиїтами#!#!, однак в усіх інших аспектах їхні вчення разюче відрізняються одне від одного. Так, алавіти вірять у реінкарнацію та допускають вживання алкоголю, що неприпустимо для більшості шиїтів."
  ibadi_school: "Ібадитський мазхаб"
  ibadi_school_desc: "Ібадити відокремилися від течії хариджитів, які спочатку були прихильниками Алі ібн Абу Таліба, але згодом відреклися від нього. Ібадитський мазхаб проводить чітку межу між своїм і хариджитським вченням: його послідовники дотримуються більш помірного підходу в багатьох богословських питаннях, а також більш прихильно ставляться до інших течій, з якими мають деякі схожості."
  bektashi_school: "Бекташі"
  bektashi_school_desc: "Це братство, назване на честь Хаджі Бекташа, ставиться з особливою пошаною до Алі ібн Абу Таліба, але також визнає й інших сподвижників Мухаммеда. Хоча формально братство сягає корінням у [ShowReligionName('sunni')|l], в його вченні міститься безліч вірувань і практик, властивих іншим течіям ісламу."
  chishti_school: "Чиштія"
  chishti_school_desc: "Братство Чиштія, засноване в місті [ShowLocationName('chishti_sarif')], відкидає мирську владу, проповідує милосердя і любов. Крім того, його представники складають музику та вірші, щоб таким чином наблизитися до Аллаха."
  khalwati_school: "Халватія"
  khalwati_school_desc: "Назва братства Халватія походить від ритуалу халват, який полягає в усамітненні з метою духовного розвитку. Поряд з такими практиками, як відлюдництво та аскетизм, цей ритуал відіграє найважливішу роль у житті братства."
  mevlevi_school: "Мевлеві"
  mevlevi_school_desc: "Братство Мевлеві, відоме своїми танцюючими дервішами, засноване на вченні Джалаладдіна Румі, згідно з яким любов є основоположною цінністю #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!. Одним з головних ритуалів братства є сама — особливий різновид кружляючого танцю, що супроводжується читанням молитов і віршів."
  naqshbandi_school: "Накшбандія"
  naqshbandi_school_desc: "Вважається, що походження братства Накшбандія сягає Джафара ас-Садіка. Його представники дотримуються шаріатських приписів набагато суворіше, ніж це прийнято в інших школах. Основні духовні практики братства включають як усамітнені молитви Аллаху, так і групову медитацію."
  qadiri_school: "Кадирія"
  qadiri_school_desc: "Братство Кадирія, засноване Абдул-Кадіром Гілані, виступає за суворе дотримання #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітського#!#! вчення. При цьому воно має децентралізовану структуру, що дозволяє кожній громаді самостійно визначати порядок служіння та проведення обрядів. Така система самоврядування призвела до розділення братства на кілька гілок."
  safavid_school: "Сефевіє"
  safavid_school_desc: "Орден Сефевіє був створений Сефі ад-Діном на основі шафіїтського вчення, проте під впливом дванадцятидесятників він фактично перейшов до шиїзму і набув більш войовничого характеру. Нині послідовники ордену відрізняються особливим завзяттям і відданістю своєму вченню порівняно з представниками інших братств."
  shadhili_school: "Шазилія"
  shadhili_school_desc: "Дотримуючись вчення Абу аль-Хасана аш-Шазілі, представники братства Шазилія практикують відлюдництво та невпинне поминання Аллаха під час повсякденних справ. Вони переконані, що досягти досконалості може лише той, хто втілює в життя всі положення #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  suhrawardi_school: "Сухравардія"
  suhrawardi_school_desc: "Братство Сухравардія, засноване Абу аль-Наджибом Сухраварді, розвивалося під впливом філософії #TOOLTIP:LOCATION,baghdad,X #L багдадського#!#! богослова Джунайда аль-Багдаді. Згідно з нею, люди повинні відмовитися від власних бажань і присвятити життя служінню Аллаху та досягненню істинного знання."
  din_i_ilahi_school: "Дін-і іллахі"
  din_i_ilahi_school_desc: "Релігія дін-і іллахі, заснована на положеннях Яси, об'єднує елементи безлічі духовних вчень, тим самим дозволяючи людям різного віросповідання мирно співіснувати в межах однієї країни."
  isawiyya_school: "Айссауа"
  isawiyya_school_desc: "Вчення братства Айссауа, що виникло в #TOOLTIP:REGION,maghreb_region,X #L Магрибі#!#!, вважається одним з найбільш містичних серед суфійських шкіл. У ньому читання молитов поступово набуло характеру повноцінних ритуалів, що включають також музику, спів і танці."
  imperial_court: "Імператорський двір"
  imperial_court_desc: "Імператорський двір складається з членів правлячої родини та куґе, що їм служать — представників знатних родів. Вони мають величезний вплив і забезпечують виконання рішень та указів імператора."
  shogunate_court: "Сьогунський двір"
  shogunate_court_desc: "Перебуваючи на службі у сьогуна, впливові представники самурайських кланів виконують роль його радників з найрізноманітніших питань, але при цьому враховують і власні феодальні інтереси."
  ikko_ikki: "Ікко-іккі"
  ikko_ikki_desc: "Найбільш ревні адепти буддійської школи Чистої землі організували озброєні загони, що називаються Ікко-іккі. Хоча їхній кістяк складають звичайні селяни, їхній опір владі та постійні повстання стають серйозною загрозою."
  religious_sects: "Релігійні секти"
  religious_sects_desc: "Споконвіку люди по-різному слідували шляху Будди, і навіть історії про камі стали змінюватися під впливом різних релігійних течій. Представники різних сект завжди намагатимуться переконати інших слідувати їхньому вченню, але в кінцевому підсумку всі вони можуть принести користь суспільству."
  kirishitan_monks: "Ченці-кірісітан"
  kirishitan_monks_desc: "Західні мандрівники привезли з собою нове духовне вчення, в якому шанується якийсь Будда на ім'я Ісус. Щоб підтримувати з ними спілкування та торговельні зв'язки, слід терпимо ставитися до їхньої віри. Можливо, в підсумку ми навіть почерпнемо з неї щось корисне."
  TRUE_FAITH_TOLERANCE: "Терпимість до істинної віри"
  HERETIC_TOLERANCE: "Терпимість до єресі"
  HEATHENRY_TOLERANCE: "Терпимість до язичництва"
  doom.1.title: "Рок невідворотний!"
  doom.1.desc: "Попри старання священників, [ROOT.GetCountry.GetReligion.GetGodName] явно гнівається на нас, а отже, на наші землі насуваються великі лиха. Щоб пережити кінець цього циклу і перейти в наступний, треба умилостивити богів, і найкращий спосіб цього досягти — принести їм гідну жертву."
  doom.1.a: "Принесемо в жертву правлячу родину!"
  adopt_ometeotl: "Прийняти віру в Ометеотля"
  adopt_ometeotl_desc: "Попри прийняте в нашій культурі багатобожжя, серед знаті стало популярним поклоніння якомусь всемогутньому богу, відомому як #italic Ометеотль#!. Вважається, що він має силу всіх інших божеств, які насправді лише представляють ті чи інші якості. Якщо це так, то нам варто шанувати #italic Ометеотля#! як свого єдиного бога."
  elevate_patron_god: "Піднести нашого божественного покровителя"
  elevate_patron_god_desc: "Як правило, жителі #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науаських#!#! міст шанують безліч богів, але обирають одного з них як свого покровителя. Ми можемо піти далі, піднісши нашого покровителя до статусу верховного бога."
  establish_cihuacoatl: "Заснувати титул сіуакоатля"
  establish_cihuacoatl_desc: "Ми створимо спеціальну посаду #italic сіуакоатля#!, свого роду візира. Він керуватиме містом замість нашого правителя, а той зможе приділяти більше часу важливішим питанням."
  expand_cuahpipiltin: "Заснувати куаупіпільтін"
  expand_cuahpipiltin_desc: "Ми сформуємо в суспільстві новий стан #italic куаупіпільтін#! — служивих аристократів. На відміну від спадкових аристократів #italic піпільтін#!, вони отримуватимуть посади за особисті заслуги. Їх набиратимуть головним чином з наших воїнів, а також запрошуватимуть з інших племен."
  increase_militarism: "Посилити мілітаризм"
  increase_militarism_desc: "Після битв наші воїни захоплюють полонених, яких потім можна приносити в жертву богам. Щоб потік потенційних жертв не вичерпувався, треба заохочувати в нашому народі войовничість."
  institute_flower_wars: "Організувати квіткові війни"
  institute_flower_wars_desc: "Оскільки життя нашої цивілізації залежить від жертвоприношень, нам потрібно набирати більше бранців. Для цього ми можемо домовитися з сусідами про проведення регулярних битв. Таким чином, обидві сторони зможуть приносити в жертву захоплених воїнів, заслуговуючи прихильність богів."
  legal_reforms: "Правові реформи"
  legal_reforms_desc: "Усі #TOOLTIP:CULTURE,$nahua_culture_tt$,X #L науаські#!#! міста-країни мають свої закони, але в міру розвитку суспільства їх необхідно оновлювати та доповнювати. Варто провести серію реформ, щоб норми та закони відповідали новим потребам країни."
  raise_sacrifice_rate: "Збільшити кількість жертвоприношень"
  raise_sacrifice_rate_desc: "Боги пожертвували своєю кров'ю заради нас, і ми в боргу перед ними. Однак пролитої нами крові явно недостатньо, щоб втамувати їхню спрагу. Нам потрібно влаштовувати більше жертвоприношень, щоб якомога швидше поповнити життєву силу наших богів."
  RELIGIOUS_FOCUS_NOT_IN_QUEUE: "Не в черзі дослідження"
  NOT_RELIGIOUS_FOCUS_QUEUED: "У черзі дослідження немає [Concept('religious_focuses', 'релігійних цілей')|e]"
  HAS_NOT_RELIGIOUS_FOCUS_QUEUED: "@trigger_no!Ці [Concept('religious_focuses', 'релігійні цілі')|e] ще не додані до черги."
  RELIGIOUS_FOCUS_ALREADY_SET: "@trigger_no!Ці [Concept('religious_focuses', 'релігійні цілі')|e] вже додані до черги."
  RELIGIOUS_FOCUS_RELIGION_HAS_NO_FOCUSES: "У релігії «[RELIGION.GetName]» немає [Concept('religious_focuses', 'релігійних цілей')|e]."
  RELIGIOUS_FOCUS_ALREADY_COMPLETED: "Ціль «[RELIGIOUS_FOCUS.GetName]» вже досліджена."
  RELIGIOUS_FOCUS_ALREADY_QUEUED: "Ціль «[RELIGIOUS_FOCUS.GetName]» вже в черзі на дослідження."
  RELIGIOUS_FOCUS_ETA_TT: "Очікується, що дослідження релігійної цілі «[RELIGIOUS_FOCUS.GetName]» завершиться до $DATE|Y$."
  RELIGIOUS_FOCUS_PROGRESS_TT: "Дослідження цілі «[RELIGIOUS_FOCUS.GetName]» завершено на $CURRENT|%W$, отримано $VAL|+=%$ щомісячного прогресу. Причини:\n$WHY$"
  RELIGIOUS_FOCUS_NO_PROGRESS_TT: "Дослідження цілі «[RELIGIOUS_FOCUS.GetName]» завершено на $CURRENT|W%$, але щомісячного прогресу не отримано. Причини:\n$WHY$"
