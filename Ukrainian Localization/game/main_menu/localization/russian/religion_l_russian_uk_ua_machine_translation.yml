  libertas_ecclesiae: "Libertas Ecclesiae"
  libertas_ecclesiae_desc: "Ідея Libertas Ecclesiae полягає в тому, що церква має бути незалежна від світської влади. Вона лягла в основу «григоріанських реформ» — церковного реформаторського руху, що виник у XI столітті.\nАле як бути, якщо на чолі Святого Престолу стоїть маріонетка Священної Римської імперії?"
