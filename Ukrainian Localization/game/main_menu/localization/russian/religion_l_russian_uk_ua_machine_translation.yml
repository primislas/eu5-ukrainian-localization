  muslim_scholar: "Вчений"
  muslim_scholar_desc: "Освічений експерт, який займається богословськими та правовими питаннями #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  guru: "Гуру"
  guru_desc: "Високодуховна людина, що йде до просвітлення через релігійні практики. Маючи великі знання про філософію та священні писання, він завжди готовий ділитися ними з оточуючими."
  shinto_desc: "Цей набір вірувань і практик, заснованих на поклонінні камі, існував у Японії ще до приходу буддизму. З'явившись у країні, буддизм швидко змішався з місцевими релігійними традиціями. З того часу в спільних храмах шанувалися як камі, так і буддійські божества, тому два віровчення фактично стали нероздільними. Так у Японії з'явився особливий різновид буддизму, в якому буддійські ритуали використовуються, зокрема, для служіння камі."
  bon_desc: "Бонське вчення зародилося в Тибеті ще до приходу буддизму, але в подальшому зазнало його впливу та зазнало значних змін. Тепер воно багато в чому схоже зі школою тибетського буддизму Ньїнґма, але при цьому зберігає безліч добуддійських традицій і практик. Бон у своєму нинішньому вигляді ґрунтується на ідеях про карму та реінкарнацію, а також про різні шляхи до просвітлення."
  mahayana_desc: "Назва цього напрямку буддизму означає «Велика колісниця». Воно засноване не тільки на ранніх буддійських текстах, а й на так званих махаянських сутрах. І хоча спочатку це вчення зародилося в Індії, завдяки Шовковому шляху його тексти поступово проникли в Китай, де на їхній основі було створено безліч інших праць. З того часу китайський канон також становить значну частину Махаяни. Сенс вчення полягає в тому, що кожен може досягти просвітлення, якщо буде йти шляхом бодгісаттви та допомагати живим істотам звільнятися від сансари."
  theravada_desc: "Назва цієї школи означає «вчення старійшин». Вона заснована на найдавніших буддистських традиціях і відкидає сутри махаяни, а отже, і багатьох бодгісаттв, а також доступність самого шляху бодгісаттви для всіх. Головним способом досягти просвітлення вона вважає об'єднання в чернечі громади."
  sammitiya_desc: "$sammitiya$ — один із найстаріших напрямків буддизму в Індії. Школа виникла в Сінді та стала великим центром раннього буддизму, здатним конкурувати з Махаяною Наланди. Однак після ісламських завоювань Самматия втратила свій високий статус."
  tibetan_buddhism_desc: "Форма буддизму, що виникла в Гімалаях з Махаяни, але увібрала в себе низку езотеричних практик Ваджраяни завдяки тісним контактам з Індією та місцевими буддійськими течіями, що перебували на пізнішому етапі розвитку."
  sanjiao_desc: "Під терміном «три вчення» мається на увазі єдина духовно-філософська система, утворена конфуціанством, даосизмом і буддизмом. Ці течії співіснували в Китаї протягом багатьох століть, впливаючи на інші $chinese_group$і вірування та запозичуючи в них окремі елементи. Хоча їхнє сусідство не завжди можна було назвати мирним, вони були й залишаються невіддільною частиною $chinese_group$ої культури."
  anglican_desc: "$anglican$ — це форма християнства, в якій правитель країни одночасно вважається главою церкви. З погляду теології та ієрархії, англіканство має багато спільного з католицтвом, але воно не уникло впливу реформістів-пуритан і континентального лютеранства."
  bogomilism_desc: "$bogomilism$ — неогностичний і дуалістичний напрямок християнства. Згідно з ним, усе суще ділиться на світ духовний і світ матеріальний. Послідовники цього вчення вважають свої тіла священними храмами та прагнуть наблизитися до Бога через очисні обряди, такі як пости, танці та відмова від стяжання заради духовного зростання."
  bosnian_church_desc: "Відколовшись від католицької церкви, крстянство (або Боснійська церква), завдяки тривалій ізоляції від основних течій християнства, створило свою унікальну теологію. У ній особлива увага приділяється темам апокаліпсису та містицизму. Крстянство зберегло багато практик раннього християнства. Через ці особливості католицькі та православні ієрархії вважають його єрессю."
  calvinist_desc: "$calvinist$ — важлива течія протестантизму, названа на честь Джона Кальвіна, що проповідує простоту обрядів і верховенство Священної Біблії. Особливий акцент робиться на ідею приреченості, що випливає з віри в те, що Бог заздалегідь визначив долю кожного зі своїх творінь."
  catharism_desc: "$catharism$ — дуалістичний рух, що проповідує існування двох богів: доброго бога небес і його антагоніста. Послідовники цього вчення дотримуються аскетичного способу життя і вважають, що душі замкнені у фізичних тілах для участі у великому протистоянні. Духовне очищення, що досягається через сувору дисципліну, вважається єдиним шляхом до порятунку."
  catholic_desc: "$catholic$ засноване на Нікейському символі віри та є найбільшою гілкою християнства. Главою церкви є Папа, який вважається духовним наступником Святого Петра. Крім керівництва церквою, Папа також виступає посередником у конфліктах між католицькими правителями. Доктрини та традиції католицтва значною мірою вплинули на релігійну та культурну історію Заходу."
  hussite_desc: "Заснована Яном Гусом гуситська церква виникла як протопротестантський рух у Богемії. Вона поєднала в собі елементи візантійського обряду з ученням Джона Вікліфа. Гусити наполягали на проведенні обох видів причастя та підкреслювали верховенство Писання над церковними традиціями."
  lollardy_desc: "Реформістський рух лоллардів був створений Джоном Вікліфом. Він виступав за рівність і відкидав необхідність таїнств хрещення та сповіді для досягнення спасіння. Лоллардизм підкреслював прямий зв'язок з Богом через писання, перекладене розмовними мовами. Завдяки цьому теологія руху стала доступна масам, що дало поштовх до закликів реформувати церкву."
  lutheran_desc: "$lutheran$ засноване на «Дев'яноста п'яти тезах» Мартіна Лютера. Почавшись як заклик до реформи католицької церкви, воно переросло в повноцінну гілку протестантизму. Лютеранство вчить, що Старий і Новий Завіти є єдиним і незаперечним авторитетом у питаннях християнської доктрини."
  miaphysite_desc: "$miaphysite$ вчить, що в Христі одна іпостась і дві неподільні єства — божественне та людське. Ця доктрина, затверджена на Ефеському соборі, поширилася у Вірменії, Єгипті та Ефіопії. Міафізитські громади зберегли свої унікальні літургії та традиції, що підкреслюють єдину суть Христа як Бога і людини."
  nestorianism_desc: "Несторіанство, назване на честь Несторія, вчить, що божественна та людська природа Христа існують окремо одна від одної. Ефеський собор відкинув цю ідею, але вона набула широкого поширення в Персії та землях за нею. Несторіани поширили своє вчення по всій Азії, що зробило його найбільшою християнською гілкою за охопленим регіоном."
  orthodox_desc: "Православна церква спирається на традиції ранніх християнських соборів і підкреслює спадкоємність учень апостолів та священних традицій. Заснована на Візантійському обряді, вона приділяє особливу увагу літургіям, іконам та містицизму. Главами Православної церкви є патріархи, серед яких чільне становище займає Вселенський патріарх Константинополя."
  paulicianism_desc: "$paulicianism$ — дуалістична християнська секта, що відкидає матеріальний світ як творіння сил зла. Її послідовники вважають чистим лише духовне царство. Їхні вірування спираються на текст Нового Завіту, тоді як Старий Завіт відкидається повністю. Переслідуване і католицькими, і православними ієрархами, павлікіанство чинило опір спробам асиміляції та надихнуло наступні реформістські рухи."
  strigolniki_desc: "$strigolniki$ виникло в середньовічній Русі як реформістська секта, що засуджує усталені практики православної церкви. Ставлячи понад усе особисту побожність, стригольники виступають проти стяжання, корумпованості священників, призначення ціни за таїнства. Секта зазнавала гонінь з боку церкви та влади."
  waldensian_desc: "Заснований П'єром Вальдо реформістський рух вальденсизму виступає за простоту, бідність та авторитет писання. Він відкидає стяжання в церкві, шанування святих і необхідність таїнств для спасіння. Оголошений єрессю рух вальденсів витримав століття переслідувань, поширюючи своє слово по Європі."
  hindu_desc: "$hindu$, що є по суті зібранням різних вірувань, часто називають найстарішою релігійною традицією у світі. Його вірування та практики розглядаються як трактування дхармічного космічного порядку, описаного в стародавній ведичній літературі. З неоднорідності релігії випливає різноманіття богів, не всі з яких однаково шануються і навіть визнаються послідовниками індуїзму. Основних гілок індуїзму чотири: вішнуїзм, шактизм, шиваїзм і смартизм."
  jain_desc: "Дхармічна індійська релігія джайнізм — одна з найдавніших релігій світу, присвячена самопізнанню та звільненню від циклу перероджень. В основі її лежить відмова від насильства, аскетизм і слідування вченням #italic тіртханкарів#!, учителів дхарми. Джайнізм ділиться на школи дигамбарів і шветамбарів. Ченці-дигамбари, «одягнені в небо», — в основному чоловіки. Вони проповідують відмову від прив'язаностей і матеріальних благ, через що ченці не носять одягу, а їхня іконографія відрізняється простотою. Шветамбари, «одягнені в біле», отримали свою назву через білі шати ченців, серед яких зустрічаються як чоловіки, так і жінки."
  sikhism_desc: "Релігія, заснована на вченнях гуру. Сикхізм походить з різних індуїстських вірувань, що зазнали впливу ісламу. Сикхи вважають, що існує лише один творець, $sikhism_god_name$, а його послідовники повинні бути чесними та самовідданими заради загального блага. За допомогою медитацій та роздумів вони прагнуть створити зв'язок з божественним, а поезія та музика допомагають їм відчути присутність Бога."
  druzism_desc: "Друзи, хоча їхнє вчення і походить від ісмаїлітського мазхабу, не вважають себе мусульманами. Крім очевидного впливу ісламу, на друзизм також вплинули інші авраамічні та неавраамічні релігії, що породило унікальне віросповідання, засноване на езотериці та вірі в універсальний розум, куди повернуться всі душі після безлічі реінкарнацій."
  judaism_desc: "Перша з авраамічних релігій, юдаїзм слідує Завіту, укладеному між Богом і Мойсеєм. Священним писанням юдаїзму є Танах, перші п'ять книг якого відомі як Тора, що є основою вірувань і практик юдаїзму."
  samaritanism_desc: "Традиційна віра самаритян, що відокремилася від юдаїзму після падіння Ізраїльського царства. Самаритяни вважають, що їхня релігія залишилася незмінною з часів Мойсея, на відміну від юдаїзму, спотвореного писаннями."
  mandeaism_desc: "$mandeaism$ — гностична релігія, що вважає Іоанна Хрестителя останнім пророком і включає елементи грецької та іранської культур. Визнаючи деяких пророків інших авраамічних релігій, мандеїзм, однак, не визнає Авраама, Мойсея та Ісуса. Бог у мандеїзмі носить ім'я $mandeaism_god_name$, «Велика життя», і символізує творчу силу всесвіту."
  manichaeism_desc: "$manichaeism$ — іранська релігія, заснована пророком Мані з імперії Сасанідів. Вона зазнала впливу безлічі інших релігій, зокрема гностицизму, зороастризму, християнства та буддизму, і вважає Мані останнім пророком після Зороастра, Будди та Ісуса. Теологія дуалістична й описує всесвіт як духовну боротьбу між світлом і темрявою."
  ibadi_desc: "$ibadi_school_desc$"
  shia_desc: "Шиїтська віра вважає, що Мухаммед призначив Алі ібн Абу Таліба своїм наступником, а отже — духовним і політичним лідером мусульман. Тому імамат має передаватися нащадкам Алі, а не Абу Бакру, якого було обрано халіфом соратниками Мухаммеда на зборах у Сакіфі."
  sunni_desc: "Суніти вважають, що верховенство в ісламі було передано Абу Бакру, коли сподвижники Мухаммеда обрали його халіфом на зборах у Сакіфі, оскільки сам Пророк не призначив собі наступника. Сунізм розглядає ар-рашидун, перших чотирьох халіфів після Мухаммеда, як зразок правління."
  nahuatl_desc: "Науаська релігія шанує безліч теотлів — богів, підпорядкованих верховному богу Ометеотлю. Інші боги, такі як Уїцилопочтлі, Тлалок або Кецалькоатль, є покровителями станів або народів. Однією з ключових практик є людські жертвоприношення заради прихильності богів."
  bimoism_desc: "Бімоїзм $common_folk_religion_desc$"
  chukchi_shamanism_desc: "Чукотський шаманізм $common_folk_religion_desc$"
  dene_shamanism_desc: "Шаманізм дене $common_folk_religion_desc$"
  dene_totemism_desc: "Тотемізм дене $common_folk_religion_desc$"
  great_plains_shamanism_desc: "Шаманізм Великих рівнин $common_folk_religion_desc$"
  hmongism_desc: "Кев Даб Куас $common_folk_religion_desc$"
  iroquoian_totemism_desc: "Ірокезький тотемізм $common_folk_religion_desc$"
  karachay_balkar_paganism_desc: "Карачаєво-балкарське язичництво $common_folk_religion_desc$"
  khabzeism_desc: "Хабзеїзм $common_folk_religion_desc$"
  lezgin_paganism_desc: "Лезгинське язичництво $common_folk_religion_desc$"
  mari_paganism_desc: "Марійське язичництво $common_folk_religion_desc$"
  udmurt_paganism_desc: "Удмуртське язичництво $common_folk_religion_desc$"
  komi_paganism_desc: "Язичництво комі $common_folk_religion_desc$"
