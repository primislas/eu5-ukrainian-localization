l_russian:
  STATIC_MODIFIER_NAME_freiberg_base: "Срібні рудники Фрайберга"
  STATIC_MODIFIER_DESC_freiberg_base: "Видобуток руди розпочався тут ще в XII столітті. З часом шахта стала одним із головних джерел срібла в Центральній Європі."
  STATIC_MODIFIER_NAME_falun_base: "Стура-Коппарбергет"
  STATIC_MODIFIER_DESC_falun_base: "Протягом багатьох століть ця шахта рясно постачала Європу міддю."
  STATIC_MODIFIER_NAME_golconda_base: "Алмазні рудники Голконди"
  STATIC_MODIFIER_DESC_golconda_base: "Тут видобувають бездоганні та найдорогоцінніші алмази в усьому світі."
  STATIC_MODIFIER_NAME_skane_herring_market: "Ринок оселедця у Сконе"
  STATIC_MODIFIER_DESC_skane_herring_market: "Це найбільший ринок оселедця в усій Скандинавії, заснований близько 1200 року."
  STATIC_MODIFIER_NAME_almaden_base: "Ртутні рудники Альмадена"
  STATIC_MODIFIER_DESC_almaden_base: "У роки існування цих рудників тут видобувалася третина всього споживаного у світі обсягу ртуті."
  STATIC_MODIFIER_NAME_huancavelica_base: "Ртутні рудники Уанкавеліки"
  STATIC_MODIFIER_DESC_huancavelica_base: "Найважливіша ртутна шахта Південної Америки: тут знаходяться величезні поклади ртуті."
  STATIC_MODIFIER_NAME_idrija_base: "Ртутні рудники Ідрії"
  STATIC_MODIFIER_DESC_idrija_base: "В Ідрії розташовані великі поклади ртуті — як рідкої, так і твердої (кіновар)."
  STATIC_MODIFIER_NAME_lanmuchang_base: "Ртутні рудники Ланьмучана"
  STATIC_MODIFIER_DESC_lanmuchang_base: "Найважливіший ртутний рудник у Китаї з часів античності."
  STATIC_MODIFIER_NAME_potosi_base: "Серро-Ріко-дель-Потосі"
  STATIC_MODIFIER_DESC_potosi_base: "У цій шахті біля підніжжя гори Потосі розташовуються найбагатші у світі срібні жили."
  STATIC_MODIFIER_NAME_zacatecas_base: "Срібні рудники Сакатекаса"
  STATIC_MODIFIER_DESC_zacatecas_base: "Найбагатші срібні рудники Мезоамерики."
  STATIC_MODIFIER_NAME_guanajuato_base: "Срібні рудники Гуанахуато"
  STATIC_MODIFIER_DESC_guanajuato_base: "Найбагатші срібні рудники Центральної Мексики."
  STATIC_MODIFIER_NAME_spice_islands_base: "Гвоздика з Островів прянощів"
  STATIC_MODIFIER_DESC_spice_islands_base: "Тут у великих кількостях вирощується гвоздика, яку використовують як прянощі."
  STATIC_MODIFIER_NAME_nile_delta_rice_base: "Родюча дельта Нілу"
  STATIC_MODIFIER_DESC_nile_delta_rice_base: "Заплавні землі Нілу ідеально підходять для вирощування будь-яких культур."
  STATIC_MODIFIER_NAME_nile_delta_wheat_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_wheat_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_nile_delta_sugar_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_sugar_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_nile_delta_cotton_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_cotton_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_nile_delta_legumes_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_legumes_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_nile_delta_fiber_crops_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_fiber_crops_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_nile_delta_fruit_base: "$STATIC_MODIFIER_NAME_nile_delta_rice_base$"
  STATIC_MODIFIER_DESC_nile_delta_fruit_base: "$STATIC_MODIFIER_DESC_nile_delta_rice_base$"
  STATIC_MODIFIER_NAME_coffee_yemen_base: "Аравійська кава"
  STATIC_MODIFIER_DESC_coffee_yemen_base: "У благодатній землі Ємену рясно ростуть кавові зерна."
  STATIC_MODIFIER_NAME_sahara_salt_mines_base: "Соляні шахти Сахари"
  STATIC_MODIFIER_DESC_sahara_salt_mines_base: "Тут видобувається основна частка солі, яку купці перевозять через Сахару."
  STATIC_MODIFIER_NAME_sikar_copper_mines_base: "Мідний рудник Кхетрі"
  STATIC_MODIFIER_DESC_sikar_copper_mines_base: "У багатих мідних рудниках Кхетрі шахтарям завжди є що видобувати."
  STATIC_MODIFIER_NAME_nishapur_gems_mines_base: "Бірюзовий рудник Нішапура"
  STATIC_MODIFIER_DESC_nishapur_gems_mines_base: "Шахти Нішапура вельми багаті запасами бірюзи."
  STATIC_MODIFIER_NAME_panjshir_valley_silver_mines_base: "Срібло з Панджшерської ущелини"
  STATIC_MODIFIER_DESC_panjshir_valley_silver_mines_base: "Багатство срібних рудників у Панджшерській ущелині належатиме будь-кому, хто ними володіє."
  STATIC_MODIFIER_NAME_turda_salt_mines_base: "Соляна шахта Турди"
  STATIC_MODIFIER_DESC_turda_salt_mines_base: "У шахті біля Турди розташовані найбагатші запаси солі в Прикарпатті."
  STATIC_MODIFIER_NAME_kutna_hora_silver_mines_base: "Срібний рудник Кутна-Гори"
  STATIC_MODIFIER_DESC_kutna_hora_silver_mines_base: "Срібний рудник Кутна-Гори — найбагатший у всій Богемії."
  STATIC_MODIFIER_NAME_rammelsberg_silver_mines_base: "Срібний рудник Раммельсберга"
  STATIC_MODIFIER_DESC_rammelsberg_silver_mines_base: "Шахта під Раммельсбергом багата на свої поклади срібла."
  STATIC_MODIFIER_NAME_mali_gold_mines_base: "Золоті рудники Малі"
  STATIC_MODIFIER_DESC_mali_gold_mines_base: "Золоті шахти Буре — головне джерело багатства манси Муси."
  STATIC_MODIFIER_NAME_kremnica_gold_mines: "Золотий рудник Кремниці"
  STATIC_MODIFIER_DESC_kremnica_gold_mines: "У шахті Кремниці розташовуються найбагатші запаси золота в Прикарпатті."
  STATIC_MODIFIER_NAME_srebrenica_silver_mines_base: "Срібний рудник Сребрениці"
  STATIC_MODIFIER_DESC_srebrenica_silver_mines_base: "У шахті Сребрениці розташовуються найбагатші запаси срібла на Балканах."
  STATIC_MODIFIER_NAME_newfoundland_fishing_grounds_base: "Рибні промисли Ньюфаундленду"
  STATIC_MODIFIER_DESC_newfoundland_fishing_grounds_base: "Навколо острова Ньюфаундленд розташовуються найбагатші рибою води в усьому світі."
  STATIC_MODIFIER_NAME_amber_coast_base: "Бурштиновий берег"
  STATIC_MODIFIER_DESC_amber_coast_base: "На місцевому узбережжі можна знайти дуже багато бурштину."
  STATIC_MODIFIER_NAME_sicily_sulfur_mines: "Сірчаний рудник Сицилії"
  STATIC_MODIFIER_DESC_sicily_sulfur_mines: "Сірчані шахти Сицилії вельми багаті на речовину, необхідну для виробництва селітри."