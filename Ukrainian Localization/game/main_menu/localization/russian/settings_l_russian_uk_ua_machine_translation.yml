  SETTING_AUDIO_DEVICE_PROFILE: "Профіль звуку"
  SETTING_AUDIO_DEVICE_PROFILE_TOOLTIP: "#T $SETTING_AUDIO_DEVICE_PROFILE$\n#!Виберіть профіль звуку, що відповідає вашій конфігурації або вподобанням з точки зору динаміки звуку та мікшування. Це налаштування не впливає на маршрутизацію каналів."
  SETTING_AUDIO_OPTION_OFF: "Вимк."
  SETTING_AUDIO_OPTION_OFF_TOOLTIP: "#T $SETTING_AUDIO_OPTION_OFF$\n#!Стандартний мікшер з повним динамічним діапазоном. Рекомендується для більшості користувачів та конфігурацій."
  SETTING_AUDIO_OPTION_HOMECINEMA: "Домашній кінотеатр"
  SETTING_AUDIO_OPTION_HOMECINEMA_TOOLTIP: "#T $SETTING_AUDIO_OPTION_HOMECINEMA$\n#!Профіль звуку: $SETTING_AUDIO_OPTION_HOMECINEMA$. Вирівнює динаміку та ущільнює баси. Підходить для акустичних систем, що використовують сабвуфер."
  SETTING_AUDIO_OPTION_HEADPHONES: "Навушники"
  SETTING_AUDIO_OPTION_HEADPHONES_TOOLTIP: "#T $SETTING_AUDIO_OPTION_HEADPHONES$\n#!Профіль звуку: $SETTING_AUDIO_OPTION_HEADPHONES$. Злегка вирівнює динаміку та може допомогти пом'якшити виражені частоти в багатьох навушниках типових конструкцій."
  SETTING_AUDIO_OPTION_SPEAKERS: "Динаміки"
  SETTING_AUDIO_OPTION_SPEAKERS_TOOLTIP: "#T $SETTING_AUDIO_OPTION_SPEAKERS$\n#!Профіль звуку: $SETTING_AUDIO_OPTION_SPEAKERS$. Підсилює певні частоти та може забезпечити більш насичене звучання на акустичних системах без сабвуфера."
  SETTING_AUDIO_OPTION_TV: "Телевізор"
  SETTING_AUDIO_OPTION_TV_TOOLTIP: "#T $SETTING_AUDIO_OPTION_TV$\n#!Профіль звуку: $SETTING_AUDIO_OPTION_TV$ та маленькі динаміки. Допомагає контролювати низькі частоти, які можуть пригнічуватися вбудованими динаміками, а також підвищує чіткість звучання на високих частотах."
  SETTING_AUDIO_OPTION_NIGHTMODE: "Нічний режим"
  SETTING_AUDIO_OPTION_NIGHTMODE_TOOLTIP: "#T $SETTING_AUDIO_OPTION_NIGHTMODE$\n#!Профіль, що пом'якшує звук для відтворення в нічний час. Звужує динамічний діапазон на всіх частотах для поліпшення чіткості звучання на невеликій гучності та злегка приглушує низькі частоти для мінімізації перешкод."
  SETTING_Music_Density: "Насиченість музики"
  SETTING_Music_Density_TOOLTIP: "#T Регулювання насиченості музики\n#!Задає тривалість пауз між музичними композиціями: від довгих до практично безперервного відтворення. Значення за замовчуванням — 20."
  SETTING_Music_Intensity: "Інтенсивність музики"
  SETTING_Music_Intensity_TOOLTIP: "#T Інтенсивність музики\n#!Задає загальну інтенсивність статичного музичного міксу. Діє тільки в режимі статичних кінематографічних або культурних добірок."
  SETTING_MUSIC_SYSTEM_TYPE: "Добір музики"
  SETTING_MUSIC_SYSTEM_TYPE_TOOLTIP: "#T $SETTING_MUSIC_SYSTEM_TYPE$\n#!Дозволяє вибрати поведінку системи добору музики — повністю динамічні плейлисти, кінематографічні або культурні добірки, статичні плейлисти або взагалі без музики."
  SETTING_MUSIC_SYSTEM_TYPE_DYNAMIC_ALL: "Динамічна — всі"
