l_russian:
  no_event_occurs_tt: "Ніякого [Concept('event','події')|e] не станеться"
  an_event_occurs_tt: "Може статися [Concept('event', 'подія')|e], пов'язана з цим [Concept('disaster','лихом')|e]"
  succession_crisis: "Криза престолонаслідування"
  succession_crisis_desc: "Країна занурюється в хаос! Могутній претендент заявив про своє право на трон всупереч волі народу. Зовнішні та внутрішні вороги загрожують погубити нашу велику державу…"
  pretender_enforced_claim_tt: "Претендент успадкував трон"
  no_heir_or_regent_or_bad_heir_tt: "Вимоги цього [Concept('disaster', 'лиха')|e] знизилися через наявність [Concept('regent', 'регента')|e], слабкого [Concept('heir', 'спадкоємця')|e] або відсутність [Concept('heir', 'спадкоємця')|e]."
  pretender_is_cold_tt: "Претендент помер або покинув двір"
  succession_crisis_pretender: "Претенденти на корону"
  succession_crisis_crown_supporters: "Прихильники монарха"
  succession_crisis_pretender_supporters: "Прихильники претендента"
  no_pretender_rebel_active_tt: "Жоден з чинних [Concept('rebels','заколотників')|e] не є претендентом"
  succession_crisis_price: "Вартість дій у ситуації «$succession_crisis$»"
  sc_seek_foreign_aid: "Шукати допомоги за кордоном"
  sc_seek_foreign_aid_desc: "Ситуація зі зростанням кількості претендентів виходить з-під контролю. Ті, хто бажає прибрати до рук наш трон, не залишать спроб, доки ми не розправимося з ними раз і назавжди. Щоб гарантувати собі територіальний суверенітет, треба дивитися за межі наших земель, шукати друзів і допомогу за кордоном."
  sc_commission_dynastic_history: "Замовити хроніку династії"
  sc_commission_dynastic_history_desc: "Наші предки та їхні предки до них заявили претензії на величезні землі, що складають сьогодні наші володіння. Утвердивши свою історію, піднісши велич своєї династії, ми зможемо підвищити нашу легітимність серед усіх інших претендентів."
  sc_ask_help_from_the_nobility: "Запросити допомогу у знаті"
  sc_ask_help_from_the_nobility_desc: "[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] у нашій державі [actor.GetFlavorRank] — це концентрація великого впливу. Заручившись допомогою такої еліти, ми неодмінно здолаємо будь-яких конкурентів у боротьбі за владу."
  sc_ask_help_from_the_clergy: "Запросити допомогу у церковників"
  sc_ask_help_from_the_clergy_desc: "Міцна віра допоможе вистояти нашим [actor.GetReligion.GetGroup.GetAdjective]им традиціям, [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')] же допоможе нам перемогти в поточній кризі."
  sc_ask_help_from_the_burghers: "Запросити допомогу у містян"
  sc_ask_help_from_the_burghers_desc: "Багатіїв, що володіють величезним впливом, потрібно закликати на підтримку армії на той випадок, якщо претенденти на трон ввергнуть нашу державу [actor.GetFlavorRank] у громадянську війну. Станься таке, [actor.GetGovernment.GetRulerOrRegent.GetName] із задоволенням скористається їхньою мошною."
  choose_writer: "Вибір: [ShowArtistTypeNameWithNoTooltip('writer')]"
  selected_writer_will_compile_and_grant_legitimacy_based_on_woa_quality_tt: "Обраний [ShowArtistTypeName('writer')] напише #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніку#!#! [Concept('dynasty','династії')|e] [actor.GetGovernment.GetRulerOrRegent.GetDynasty.GetName]. Ми отримаємо [Concept('legitimacy','легітимність')|e], обсяг якої сильно залежатиме від якості цього [Concept('work_of_art','творіння')|e]."
  target_character_will_compile_a_history_of_our_dynasty_tt: "[target_character.GetName] буде обраний, щоб написати #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніку#!#! [Concept('dynasty','династії')|e] [actor GetGovernment.GetRulerOrRegent.GetDynasty.GetName]."
  ambrosian_republic_disaster: "Золота Амброзіанська республіка"
  ambrosian_republic_disaster_desc: "За відсутності сильного претендента на трон мислителі-ідеалісти засновують у Мілані молоду республіку."
  has_chosen_ally_union_variable_tt: "Сформована [Concept('union','унія')|e] з [Concept('ally','союзником')|e] у події #Y «Амброзіанська республіка»#!"
  religious_turmoil: "Релігійні заворушення"
  religious_turmoil_desc: "Надто сильні релігійні відмінності між підданими призводять до нетерпимості та розбрату."
  rt_push_for_spiritualist: "Просувати [ShowSocietyDirectionNameWithNoTooltip('spiritualist')]"
  rt_push_for_spiritualist_desc: "Народ потрібно вести до спасіння, подалі від чіпких пазурів марнославства та єресі. Лише [ShowSocietyDirectionName('spiritualist')] дозволить нам перемогти тих, хто хотів би позбавити нас наріжного каменю релігійної ідентичності."
  rt_push_for_humanist: "Просувати [ShowSocietyDirectionNameWithNoTooltip('humanist')]"
  rt_push_for_humanist_desc: "Поява нових гілок #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! проголосила прихід нової ери, ери розуміння релігійних відмінностей та роботи над багатогранним та об'єднаним суспільством. Ми не можемо бездіяти в такі бурхливі часи, ми повинні всіляко пропагувати новонабуті істини."
  rt_support_conversion_efforts: "Підтримати навернення іновірців"
  rt_support_conversion_efforts_desc: "Ми повинні намагатися повернути до світла тих, хто збився зі шляху. Старанніше навертаючи іновірців, ми прискоримо процес зцілення народу і швидше залишимо темні, неспокійні часи позаду."
  war_of_the_roses: "Війна троянд"
  war_of_the_roses_desc: "Англію розколов конфлікт між двома гілками правлячої династії. #TOOLTIP:DYNASTY,york_dynasty_tt,X #L Йорки#!#! та #TOOLTIP:DYNASTY,lancaster_dynasty_tt,X #L Ланкастери#!#! непримиренні."
  wotr_bribe_garrison: "Підкупити гарнізон"
  wotr_bribe_garrison_desc: "Громадянська війна — випробування на вірність. Ми можемо скористатися смутними часами, пропонуючи гарнізонам наших ворогів гроші та гарантії безпеки в обмін на мирну здачу фортець."
  select_ongoing_siege_to_bribe: "Виберіть [Concept('siege','облогу')|e], що триває, учасників якої хочете підкупити"
  no_ongoing_siege_to_bribe: "@trigger_no! Немає [Concept('siege','облоги')|e], що триває, учасників якої можна було б підкупити"
  chosen_siege_tt: "[target_siege.GetName] здасться за ініціативи гарнізону"
  no_chosen_siege_tt: "Гарнізон у вибраному [Concept('location','районі')|e] здасться"
  war_of_the_aragonese_union_disaster: "Війна уній"
  war_of_the_aragonese_union_disaster_desc: "Арагонська та Валенсійська унії, що об'єднали антимонархічно налаштованих дворян і городян, піднімають бунт проти корони."
  savonarola_disaster: "Піднесення Савонароли"
  savonarola_disaster_desc: "Раптово з'явився новий проповідник, що несе звістку про прийдешній апокаліпсис, закликаючи до покаяння та реформ. Його слова викликають хвилювання серед місцевого населення та віщують прийдешні зміни."
  ciompi_revolt: "Повстання чомпі"
  ciompi_revolt_desc: "У ці смутні для Флоренції часи городяни, селяни та члени молодших гільдій, відомі під загальною назвою «чомпі», погрожують підняти відкритий заколот. Серед причин, що призвели до цього, високі податки та вкрай слабке представництво цих груп у владі."
  crisis_of_the_sayfawa_dynasty: "Криза династії Сайфава"
  crisis_of_the_sayfawa_dynasty_desc: "Як ми не намагалися, внутрішні чвари та череда узурпаторів при владі спричинили кризу в нашій державі. Підступні вороги та могутні сусіди неодмінно спробують цим скористатися, щоб розділити наші землі та погубити народ."
  muscovite_succession_war: "Війна за московський престол"
  muscovite_succession_war_desc: "Відсутність сильного претендента на трон спричинила внутрішні чвари між різними гілками правлячої династії."
  peasants_war: "Селянська війна"
  peasants_war_desc: "Сільські простолюдини все сильніше висловлюють невдоволення своїм становищем. Несправедливі податки, гноблення з боку аристократів та загальний відчай довели селян до межі. З іскри народного гніву розгорілася жахлива пожежа, якій судилося увійти в історію під назвою «Селянської війни»."
  pw_push_for_serfdom: "Просувати [ShowSocietyDirectionNameWithNoTooltip('serfdom')]"
  pw_push_for_serfdom_desc: "Селянський набрід, що повстав проти влади, повинні розгромити з максимальною жорстокістю його господарі. Не можна, щоб наше верховенство слабшало, і тим більше не можна ризикувати допустити владу натовпу."
  pw_push_for_free_subjects: "Просувати [ShowSocietyDirectionNameWithNoTooltip('free_subjects')]"
  pw_push_for_free_subjects_desc: "Занадто довго народ страждав під ярмом феодальних правителів, які відверто віддавали перевагу батогу, а не прянику. Наш обов'язок — піднести простих людей. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')] має отримати свободу."
  pw_crush_rebellion: "Зламати заколот"
  pw_crush_rebellion_desc: "Народ повстає проти нас, він вимагає — нехай [actor.GetGovernment.GetRulerOrRegent.GetName] надасть йому привілеї та гарантії безпеки. Все це йде врозріз із усталеними порядками. Допускати такого не можна, ми повинні зламати будь-яку підтримку подібного руху."
  pw_crush_rebellion_tt: "[Concept('pops','Групи населення')|e], що підтримують обраний [Concept('rebellion','заколот')|e], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] од. [Concept('pop_satisfaction','задоволення групи населення')|e]."
  pw_rebel_progress_reduction_tt: "Розвиток обраного [Concept('rebellion','заколоту')|e] буде знижено на #G -25%#!"
  struggle_for_royal_power: "Боротьба за владу короля"
  struggle_for_royal_power_desc: "У країні спалахнув конфлікт між владою монарха та привілеями сейму."
  dissolution_of_delhi: "Розпад Делійського Султанату"
  dissolution_of_delhi_desc: "Незважаючи на всі зусилля, наша країна так і не змогла оговтатися від удару. Колись велика імперія все глибше занурюється в хаос, а вороги оточують її з усіх боків. Наше становище справді відчайдушне. Якщо ми не вистоїмо, держава ризикує впасти під натиском агресорів, які прагнуть заволодіти її землями…"
  hook_and_cod_wars: "Боротьба «тріски» та «гачків»"
  hook_and_cod_wars_desc: "Поки не вирішено питання про те, кому дістанеться наш трон, родичі покійного монарха заявляють про свої права на корону. Користуючись цим, [ShowEstateTypeName('burghers_estate')|l] намагаються розширити права своїх міст, з чим категорично не згодні [ShowEstateTypeName('nobles_estate')|l]…"
  hook_and_cod_wars_hooks_have_won_tt: "Фракція #Y «гачків»#! набула #Y 20#! од. впливу (зараз #Y [THIS.GetVariable('hacw_hook_faction_power').GetValue]#!)"
  hook_and_cod_wars_cods_have_won_tt: "Фракція #Y «тріски»#! набула #Y 20#! од. впливу (зараз #Y [THIS.GetVariable('hacw_cod_faction_power').GetValue]#!)"
  HACW_HOOK_TOOLTIP: "До фракції #Y «гачки»#! входять [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_RP')|L]#!#!. Серед представників цієї групи населення підтримкою користується [Select_CString(DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.IsFemale, 'претендентка', 'претендент' )] на трон [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.GetName]."
  HACW_COD_TOOLTIP: "До фракції #Y «тріски»#! входять [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('burghers_estate')|l] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_RP')|L]#!#!. Серед представників цієї групи населення підтримкою користується [Select_CString(DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.IsFemale, 'претендентка', 'претендент' )] на трон [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.GetName]."
  horde_civil_war: "Громадянська війна в орді"
  horde_civil_war_desc: "Влада нашого правителя знову в небезпеці! Честолюбний воєначальник погрожує розв'язати громадянську війну і силою захопити трон. Тепер воїнам орди доведеться битися з власними бунтівними братами…"
  horde_civil_war_end_trigger_no_rebels: "Ніхто з [Concept('rebel', 'бунтівників')|e] не є #Y претендентом#!"
  horde_civil_war_crown_supporters: "Вірні воїни орди"
  horde_civil_war_pretender_supporters: "Бунтівні воїни орди"
  GUI_REBEL_OWNED_LOCATIONS: "[Concept('locations','Райони')|e], зайняті [Concept('rebels','бунтівниками')|e]: [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('GUI_pretender_rebel_character').GetCharacter.GetCourtCountry.GetOwnedLocationCount]"
  GUI_REBEL_MILITARY_STRENGTH_COMPARED_TO_US: "[Concept('military_strength','Військова чисельність')|e] [Concept('rebels','бунтівників')|e] порівнянна з нашою."
  revolution_disaster: "Революція"
  revolution_disaster_desc: "Десятиліття феодального гніту, економічних труднощів та релігійної нетерпимості не минули для нас безслідно. Населення прагне свободи, і наша влада опинилася під загрозою."
  revolution_disaster_end_trigger_tt: "#Y Революціонери#! не збираються розв'язувати [Concept('civil_war', 'громадянську війну')|e]."
  MONARCHIST_STR_DESC: "Розмір [DisasterView.GetDisaster.GetOwner.GetAdjectiveWithNoTooltip|l]ої [Concept('army', 'армії')|e]: [DisasterView.GetDisaster.GetOwner.GetArmySize]@army_strength!\nПотенційне [Concept('levy', 'ополчення')|e] [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetArmyLevyPower]@levy\n[Concept('manpower', 'Число рекрутів')|e] [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetMaxManpowerValue|2]@manpower!"
  REVOLUTIONARIES_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'військова чисельність')|e] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')|L]#!#!"
  REVOLUTIONARIES_STR_DESC: "Розмір [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetAdjectiveWithNoTooltip|l]ої [Concept('army', 'армії')|e]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmySize]@army_strength!\nПотенційне [Concept('levy', 'ополчення')|e] [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmyLevyPower]@levy\n[Concept('manpower', 'Число рекрутів')|e] [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetMaxManpowerValue|2]@manpower!"
  MONARCHIST_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'військова чисельність')|e] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')|L]#!#!"
  revolutionary_chaos: "Хаос революції"
  revolutionary_chaos_desc: "Старому порядку настав кінець! Однак між фракціями йде запекла боротьба за провідну роль в уряді, і молода республіка перебуває у вкрай хиткому становищі."
  sinicization_disaster: "Китайський вплив"
  sinicization_disaster_desc: "Глибоко прониклий вплив #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_RP')|L]#!#! приніс чималі блага нашому народу. На жаль, також він викликав розкладання нашого традиційного життєвого укладу, а тепер і безпосередньо загрожує незалежності країни."
  has_opted_to_side_with_china_in_events_tt: "Успішне #G просування#! #L #L [GetCountry('CHI').GetAdjective|l]#!ого#! впливу при нашому дворі в ході подій"
  has_opted_to_stay_sovereign_from_china_in_events_tt: "Успішне #G обмеження#! #L #L [GetCountry('CHI').GetAdjective|l]#!ого#! впливу при нашому дворі в ході подій"
  crisis_of_the_chinese_dynasty: "Криза династії [GetCountry('CHI').GetLongNameWithNoTooltip]"
  crisis_of_the_chinese_dynasty_desc: "Небеса потемніли. Ми ось-ось втратимо божественну благодать! Внутрішній та зовнішній тиск посилюються, бюрократія деградує, а невдачі в сільському господарстві лише множаться — все складається проти нас. Народ більше не визнає нас законними правителями [GetCountry('CHI').Custom('CF_RP')|l]."
  ccd_celestial_authority_trigger: "Наш [Concept('celestial_authority_gc', 'небесний авторитет')|e] становить не нижче #Y 90#! (зараз: #Y [GetUniqueInternationalOrganization('middle_kingdom').MakeScope.GetVariable('celestial_authority').GetValue|V1]#!)"
  cmd_has_reformed_cabinet_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_reform_the_cabinet')]»"
  cmd_has_restored_stability_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_restore_stability')]»"
  cmd_has_strenthened_crown_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_strengthen_crown')]»"
  fire_event_4_tt: "Може статися [Concept('event', 'подія')|e], внаслідок якої [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] відмовляться сплачувати податки"
  fire_event_5_tt: "Може статися [Concept('event','подія')|e], пов'язана з падінням [Concept('prosperity','процвітання')|e] в наших [Concept('provinces','провінціях')|e]"
  decline_of_majapahit: "Занепад Маджапахіту"
  decline_of_majapahit_desc: "Епоха процвітання нашої держави залишилася в минулому. Нас роздирає династичний конфлікт, і численні суперники вичікують моменту слабкості та можливості атакувати наші кордони. А в світлі поширення #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#! в #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#! ми ризикуємо втратити залишки впливу."
  demak_progress: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування"
  SUNNI_POPS: "Сунітські групи населення"
  HINDU_POPS: "Індуїстські групи населення"
  SUNNI_DOMINANCE_MAJAPAHIT: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP_TITLE: "Зростання [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого панування"
  DEMAK_PROGRESS_GROWTH_TITLE: "$demak_progress$"
  DEMAK_MONTHLY_CHANGE_HEADER: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування щомісяця змінюється на [Country.MakeScope.GetVariable('demak_progress_growth').GetValue|-=2%]."
  DEMAK_MONTHLY_CHANGE_POP_SHARE: "Частка #TOOLTIP:RELIGION,sunni,X #L сунітів#!#! в порівнянні з #TOOLTIP:RELIGION,hindu,X #L індуїстами#!#!: [Country.MakeScope.GetVariable('maj_sunni_percentage').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT: "[stability]: [Country.MakeScope.GetVariable('maj_stability_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT: "[Concept('legitimacy','Легітимність')]: [Country.MakeScope.GetVariable('maj_legitimacy_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_BREAKDOWN: "$DEMAK_MONTHLY_CHANGE_POP_SHARE$\n$DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT$\n$DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT$"
  DEMAK_PROGRESS_GROWTH_HEADER: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування — це показник поширеності #TOOLTIP:RELIGION,sunni,X #L сунітської#!#! [Concept('religion', 'релігії')|e] в [Country.Custom('rank_ru_PREP')|l]. Зростання [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого панування збільшується залежно від частки #TOOLTIP:RELIGION,sunni,X #L сунітських#!#! [Concept('pops', 'груп населення')|e], і при досягненні #y 100,0%#! всі наші [Concept('locations','райони')|e] з [Concept('dominant_religion', 'домінуючою')|e] #TOOLTIP:RELIGION,sunni,X #L сунітською#!#! релігією відокремляться і створять Демак."
  court_and_country: "Держава і двір"
  court_and_country_desc: "Опір зростаючій централізації в нашій державі призвів до повсюдного кризи та конфлікту між державою та двором. Ми можемо стати сильнішими, але все залежатиме від того, як ми впораємося з цими смутними часами."
  court_and_country_tips_header: "Порада для держави і двору"
  court_and_country_tips_tt: "Ми можемо збільшити [Concept('crown_power', 'владу правителя')|e] наступним чином:\n$BULLET_WITH_TAB$Скасувати [Concept('privileges', 'привілеї')|e]\n$BULLET_WITH_TAB$Посилити [Concept('control', 'контроль')|e] над нашими [Concept('locations', 'районами')|e]\n$BULLET_WITH_TAB$Побудувати #TOOLTIP:BUILDING_TYPE,counting_house,X #L контору#!#!\n$BULLET_WITH_TAB$Зміцнити [Concept('legitimacy', 'легітимність')|e]\n$BULLET_WITH_TAB$Прийняти певні [Concept('policies', 'політики')|e]"
  french_wars_of_religion_breakdown_tt: "Частка відповідних #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! [Concept('religions', 'релігій')|e] в нашій [Concept('country', 'державі')|e]\n#TOOLTIP:RELIGION,catholic,X #L Католицтво#!#!"
  x_catholic: "[GetCountry('FRA').GetReligionPercentage(GetReligionByKey('catholic'))|%2] [Concept('catholic', 'католицьких')|e] [Concept('pops', 'груп населення')|e]"
  court_and_country_7_tt: "Внаслідок [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] можуть відмовитися сплачувати податки"
  court_and_country_8_tt: "Внаслідок [Concept('event', 'події')|e] нестабільність може спровокувати заколоти серед місцевого населення"
  court_and_country_9_tt: "В результаті [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можуть організувати повстання і вимагати повернення своїх колишніх привілеїв"
  court_and_country_10_tt: "В результаті [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] можуть повстати проти нашого правління"
  court_and_country_11_tt: "В результаті [Concept('event', 'події')|e] лояльність наших армійських офіцерів може бути поставлена під сумнів."
  court_and_country_12_tt: "В результаті [Concept('event', 'події')|e] ми можемо знайти прихильників в армії та уряді"
  aspiration_for_liberty: "Жага свободи"
  aspiration_for_liberty_desc: "Прагнення народу до свободи та бажання втілити в життя ідеали Просвітництва призвели до революції, яка тепер здається майже неминучою."
  battles_on_foreign_grounds_tt: "В результаті [Concept('event', 'події')|e] ведення зовнішніх війн може стати дороговартісним задоволенням"
  governmental_incompetence_event_tt: "В результаті [Concept('event', 'події')|e] некомпетентність нашого уряду може спровокувати повстання населення"
  reform_society: "Суспільна реформа"
  reform_society_desc: "Політична система, вибудувана навколо міст-держав, — #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L Альтепетль#!#!, — довгі роки забезпечувала мир і процвітання в країні. На жаль, відсутність ефективних важелів впливу на політику підпорядкованих міст призвела до зростання невдоволення нашим правлінням. Якщо ми хочемо утримати владу і зберегти велич держави, необхідно провести реформи, щоб посилити централізацію країни."
  rise_of_the_szlachta: "Посилення шляхти"
  rise_of_the_szlachta_desc: "Вплив шляхетного стану при дворі збільшується. $nobles_estate_szlachta$ постійно вимагають нових вольностей та привілеїв. Їхні лідери плетуть нескінченні інтриги, щоб поставити центральну владу на коліна. Вони кружляють навколо трону, немов вовки, і їхні голодні пащі клацають все ближче…"
  pw_push_for_aristocracy: "Просувати [ShowSocietyDirectionNameWithNoTooltip('aristocracy')]"
  pw_push_for_aristocracy_desc: "[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] повинні зберігати та примножувати свої привілеї та місця в традиційній ієрархії — на цих принципах все й засновано. Місце людини в суспільстві визначається мечем і родоводом, старовинні родини повинні міцно триматися за владу."
  pw_push_for_plutocracy: "Просувати [ShowSocietyDirectionNameWithNoTooltip('plutocracy')]"
  pw_push_for_plutocracy_desc: "Багатство, а не спадщина, визначає, наскільки впливова людина. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')], фінансисти та еліта підприємництва повинні бути попереду всіх, формувати суспільство, мета якого — торгівля та прибуток. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')], звичайно ж, будуть дуже не раді такому рішенню."
  given_more_estate_power_nobles_estate_power_tt: "Ми надали більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('nobles_estate')]»"
  given_more_estate_power_burghers_estate_power_tt: "Ми надали більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('burghers_estate')]»"
  given_more_estate_power_crown_estate_power_tt: "Ми забезпечили більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('crown_estate')]»"
  death_of_hayan_wuruk: "[GetCharacter('maj_hayam_wuruk').GetNameWithNoTooltip] та його смерть"
  death_of_hayan_wuruk_desc: "Великий лідер [GetCharacter('maj_hayam_wuruk').GetName] [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale,'померла. Її','помер. Його')] смерть призвела до того, що на території [GetCountry('MAJ').Custom('CF_RP')|l] вибухнула велика смута. Цей неспокійний період часу може затягнутися на багато років, і ті, хто колись підкорялися нам, можуть повстати та оскаржити наші права на владу. Серед проблем, які необхідно терміново вирішити, спірні питання спадкування та занепад нашої #L [GetCountry('MAJ').GetAdjective|l]#!ої влади."
  curse_of_stefan_uros_iii: "Проклятий рід"
  curse_of_stefan_uros_iii_desc: "Ніхто не посміє засумніватися в тому, що [GetCharacter('ser_stefan_dusan').GetName] — [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'жінка','людина')] в усіх відношеннях [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'видатна','видатний')]. Вправний полководець з бездоганними манерами, [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'вона здобула','він здобув')] чудову освіту і [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'піднесла','підніс')] нашу державу до недосяжних раніше висот. Проте, як це нерідко буває, в [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'її','його')] історії знайшлося місце і підлості, і стражданням, і вбивствам. Найстрашнішим злочином [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'цариці','царя')] було вбивство власного батька. Вмираючи, [GetCharacter('ser_stefan_decanski').GetName] прокляв весь свій рід, напророчивши нащадкам занепад і безславний кінець. Тепер забобонні придворні шепочуться, що привид старого короля повернувся, знаменуючи швидку загибель нашої держави…"
  english_civil_war: "Англійська громадянська війна"
  english_civil_war_desc: "Зростаюче протистояння між короною та парламентом з питань влади та управління може незабаром охопити всю країну. Віра правителя в божественне право, порушення процедур при введенні податків та релігійна політика викликали невдоволення серед членів парламенту. Ситуація загрожує перерости у відкриту громадянську війну, якщо рішення не буде знайдено без зволікання."
  lost_civil_war_tt: "#Y Прихильники парламенту#! перемогли у [Concept('civil_war', 'громадянській війні')|e]"
  won_civil_war_tt: "#Y Роялісти#! перемогли у [Concept('civil_war', 'громадянській війні')|e]"
  parliamentarist_rebels: "Парламентарі"
  complete_the_ecw_and_lose_tt: "[ShowDisasterName('english_civil_war')] завершиться"
  french_wars_of_religion: "Релігійні війни у Франції"
  french_wars_of_religion_desc: "Виникнення нових відгалужень #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! віри по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#! призвело до того, що тертя в нашому суспільстві досягли критичної позначки. Тепер озброєні фанатики, єретики та захисники істинної віри загрожують занурити всю країну в низку конфліктів."
  had_fwr_before_definitive_ending_tt: "Це [Concept('disaster', 'лихо')|e] не завершилося досягненням [Concept('religious_unity', 'релігійної єдності')|e] або підписанням [Concept('policy', 'політики')|e] у формі #TOOLTIP:POLICY,edict_of_nantes,X #L Нантського едикту#!#!"
  lutheran_huguenots: "Лютеранські гугеноти"
  calvinist_huguenots: "Кальвіністські гугеноти"
  catholic_huguenots: "Католицькі гугеноти"
  reach_compromise_with_huguenots: "Досягнення компромісу з гугенотами"
  reach_compromise_with_huguenots_desc: "Час розбрату на наших землях добіг кінця. Нам потрібен компроміс і єдність — це єдиний шлях до виходу зі складної катастрофи."
  time_of_troubles: "Смутний час"
  time_of_troubles_desc: "Наш народ переживає період соціальних та економічних труднощів — голод, війну та боротьбу з церквою та знаттю."
  decline_of_empire: "Занепад імперії"
  decline_of_empire_desc: "Наша імперія, колись могутня й незламна, опинилася на межі розпаду. У владних структурах процвітає хабарництво, населення провінцій бунтує, кинуте напризволяще, а держави-суперниці кружляють, немов стерв'ятники, в надії урвати шматок побільше. Золотий вік давно минув, і з кожним днем тріщини в нашій основі все ширшають. Якщо нам не вдасться швидко зупинити розкладання й повернути контроль над імперією, вона розсиплеться в прах, залишивши після себе лише руїни, жаль і тіні колишньої величі…"
  has_not_had_decline_of_empire_last_25_years: "Це [Concept('disaster', 'лихо')|e] не відбувалося в останні #Y 25#! років"
  decline_of_mali: "Занепад [GetCountry('MAL').Custom('CL_RP')]"
  decline_of_mali_desc: "[GetCountry('MAL').GetLongName] — слабка влада, громадянські війни, посилення зовнішніх ворогів та внутрішня стагнація й інші випробування постають перед цією державою. Її стабільність і безпека під загрозою. Лише сильна рука здатна повернути країні колишню велич."
  coup_attempt: "Спроба перевороту"
  coup_attempt_desc: "Зловісні тіні кружляють над нашим двором, немов голодні шуліки! Це тіні наближених, які прагнуть позбутися нашого правителя й посадити на трон свою маріонетку!"
  recently_had_coup_attempt_inconclusive_tt: "За останні #Y 5#! років тут не було ні провальних, ні вдалих спроб перевороту."
  conspirators_murdered_ruler_tt: "Змовникам вдалося вбити нашого правителя"
  byzantine_succession_crisis: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]а криза успадкування"
  byzantine_succession_crisis_desc: "Претенденти-змовники та впливові тіньові політики плетуть інтриги, щоб повалити #L #L [GetCountry('BYZ').GetAdjective|l]#!у#! династію. Двір охоплений смутою, впливові генерали та чужоземці прагнуть вплинути на результат цього неспокійного періоду. Ослаблення нашого контролю над #TOOLTIP:REGION,balkan_region,X #L Балканами#!#! ставить під питання майбутнє останнього легітимного оплоту Риму."
  castilian_civil_war: "[GetCountry('CAS').GetAdjectiveWithNoTooltip]а громадянська війна"
  castilian_civil_war_desc: "Вороги постійно шукають способи втрутитися в нашу політику, підігріваючи нестабільність або підтримуючи претендентів на наш трон. Багатства #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! завжди приваблювали жадібні погляди недругів на наших кордонах. Ті, хто бажає покінчити з нашим правлінням і викреслити наше ім'я з історичних книг, напевно не залишаться осторонь у цей період нестабільності."