l_russian:
  DISASTER_BREAKDOWN: "Подробиці про лихо"
  no_event_occurs_tt: "Жодної [Concept('event', 'події')|e] не відбудеться"
  an_event_occurs_tt: "Може статися [Concept('event', 'подія')|e], пов'язана з цим [Concept('disaster', 'лихом')|e]"
  succession_crisis: "Криза престолонаслідування"
  succession_crisis_desc: "Країна поринає в хаос! Могутній претендент заявив про своє право на трон всупереч волі народу. Зовнішні та внутрішні вороги загрожують погубити нашу країну…"
  pretender_enforced_claim_tt: "Претендент успадкував трон"
  no_heir_or_regent_or_bad_heir_tt: "Вимоги цього [Concept('disaster', 'лиха')|e] знизилися через наявність [Concept('regent', 'регента')|e], слабкого [Concept('heir', 'спадкоємця')|e] або відсутність [Concept('heir', 'спадкоємця')|e]."
  pretender_is_cold_tt: "Претендент помер або покинув двір"
  succession_crisis_pretender: "Претенденти на корону"
  succession_crisis_crown_supporters: "Прихильники монарха"
  succession_crisis_pretender_supporters: "Прихильники претендента"
  no_pretender_rebel_active_tt: "Жоден з чинних [Concept('rebels', 'бунтівників')|e] не є претендентом"
  succession_crisis_price: "Вартість дій у ситуації «$succession_crisis$»"
  sc_seek_foreign_aid: "Шукати допомоги за кордоном"
  sc_seek_foreign_aid_desc: "Ситуація зі зростанням кількості претендентів [actor.Custom('endrank_predlog_vvo')] [actor.Custom('rank_ru_PREP')|l] виходить з-під контролю. Ті, хто бажає прибрати до рук наш трон, не залишать спроб, доки ми не розправимося з ними раз і назавжди. Щоб гарантувати собі територіальний суверенітет і зберегти владу, треба дивитися за межі наших земель, шукати друзів і допомогу за кордоном."
  sc_commission_dynastic_history: "Замовити хроніку династії"
  sc_commission_dynastic_history_desc: "Наші предки та їхні предки до них захопили та заселили неосяжні землі, які сьогодні є володіннями [actor.Custom('rank_ru_GEN')|l]. Записавши історію своїх прославлених прабатьків, ми підкреслимо велич династії та зміцнимо легітимність серед інших претендентів."
  sc_ask_help_from_the_nobility: "Запитати допомоги у знаті"
  sc_ask_help_from_the_nobility_desc: "[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] [actor.Custom('endrank_predlog_vvo')] [actor.Custom('rank_ru_PREP')|l] концентрують у своїх руках більше впливу. Заручившись допомогою такої еліти, ми неодмінно здолаємо будь-яких конкурентів у боротьбі за владу."
  sc_ask_help_from_the_clergy: "Запитати допомоги у духовенства"
  sc_ask_help_from_the_clergy_desc: "Міцна віра допоможе вистояти нашим #L [actor.GetReligion.GetGroup.GetAdjective|l] традиціям#!, [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')|l] же допоможе нам вистояти в поточній кризі."
  sc_ask_help_from_the_burghers: "Запитати допомоги у містян"
  sc_ask_help_from_the_burghers_desc: "Багатіїв, що володіють величезним впливом, потрібно закликати на підтримку війська, якщо претенденти на трон втягнуть [actor.Custom('rank_ru_ACC')|l] у громадянську війну. Станься таке, ми із задоволенням скористаємося їхньою туго набитою мошною…"
  choose_writer: "Вибір: [ShowArtistTypeNameWithNoTooltip('writer')]"
  selected_writer_will_compile_and_grant_legitimacy_based_on_woa_quality_tt: "Обраний [ShowArtistTypeName('writer')] напише #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніку#!#! [Concept('dynasty', 'династії')|e] [actor.GetGovernment.GetRulerOrRegent.GetDynasty.GetName]. Ми отримаємо [Concept('legitimacy', 'легітимність')|e], обсяг якої сильно залежатиме від якості цього [Concept('work_of_art', 'творіння')|e]."
  target_character_will_compile_a_history_of_our_dynasty_tt: "[target_character.GetName] буде обрано, щоб написати #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніку#!#! [Concept('dynasty', 'династії')|e] [actor GetGovernment.GetRulerOrRegent.GetDynasty.GetName]."
  DISASTERS_MODIFIERS_TT: "Модифікатори лих"
  ambrosian_republic_disaster: "Золота Амброзіанська республіка"
  ambrosian_republic_disaster_desc: "Вибухнула криза престолонаслідування, причому вельми незвичайна: поки немає сильного претендента на трон, мислителі-ідеалісти заснували в #TOOLTIP:LOCATION,milano,X #L Мілані#!#! молоду республіку. Ці бунтарі-вчені вже заручилися значною підтримкою народу і погрожують ввергнути країну в хаос."
  has_chosen_ally_union_variable_tt: "Сформовано [Concept('union', 'унію')|e] з [Concept('ally', 'союзником')|e] у події #Y «Амброзіанська республіка»#!"
  religious_turmoil: "Релігійні заворушення"
  religious_turmoil_desc: "Істотні релігійні відмінності між підданими нашої країни призводять до нетерпимості та чвар. Ми зобов'язані наставити народ на шлях істинний, а тих, хто збився зі шляху, повернути до світла."
  rt_push_for_spiritualist: "Просувати [ShowSocietyDirectionNameWithNoTooltip('spiritualist')|l]"
  rt_push_for_spiritualist_desc: "Народ потрібно вести до спасіння, подалі від чіпких пазурів марнославства та єресі. Лише #TOOLTIP:SOCIETAL_VALUE,spiritualist_vs_humanist,X #L духовність#!#! дозволить нам перемогти тих, хто хотів би позбавити нас наріжного каменю релігійної ідентичності."
  rt_push_for_humanist: "Просувати [ShowSocietyDirectionNameWithNoTooltip('humanist')|l]"
  rt_push_for_humanist_desc: "Поява нових гілок #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! проголосила прихід нової ери розуміння релігійних відмінностей та роботи над багатогранним і об'єднаним суспільством. Ми не можемо бездіяти в такі бурхливі часи — потрібно щосили пропагувати новонабуті істини."
  rt_support_conversion_efforts: "Підтримати навернення іновірців"
  rt_support_conversion_efforts_desc: "Ми повинні намагатися повернути до світла тих, хто збився зі шляху. Старанніше навертаючи іновірців, ми прискоримо процес зцілення народу і нарешті залишимо темні, неспокійні часи позаду."
  war_of_the_roses: "Війна троянд"
  war_of_the_roses_desc: "Англію розколов конфлікт між двома гілками правлячої династії. #TOOLTIP:DYNASTY,$york_dynasty_tt$,X #L Йорки#!#! та #TOOLTIP:DYNASTY,$lancaster_dynasty_tt$,X #L Ланкастери#!#! непримиренні."
  wotr_bribe_garrison: "Підкупити гарнізон"
  wotr_bribe_garrison_desc: "Громадянська війна — важке випробування на вірність. Ось і [actor.Custom('rank_ru_ACC')|l] охопили заворушення. Ми можемо скористатися смутними часами, пропонуючи гарнізонам наших ворогів гроші та гарантії безпеки в обмін на мирну здачу фортець."
  select_ongoing_siege_to_bribe: "Виберіть триваючу [Concept('siege', 'облогу')|e], учасників якої хочете підкупити"
  no_ongoing_siege_to_bribe: "@trigger_no! Немає триваючої [Concept('siege', 'облоги')|e], учасників якої можна було б підкупити."
  chosen_siege_tt: "[target_siege.GetName] здасться за ініціативою гарнізону"
  no_chosen_siege_tt: "Гарнізон в обраній [Concept('location', 'місцевості')|e] здасться"
  war_of_the_aragonese_union_disaster: "Війна уній"
  war_of_the_aragonese_union_disaster_desc: "Незадоволені надмірними домаганнями [SCOPE.sCountry('CAS').GetGovernment.GetAdjective|l]ої корони [GetCountry('ARA').GetGovernment.GetEstateName('nobles_estate')|l] та [GetCountry('ARA').GetGovernment.GetEstateName('burghers_estate')|l] утворили два могутні союзи: Арагонську та Валенсійську унії. Вони наполягають на обмеженні монаршої влади та зменшенні податків, а також вимагають поважати місцеві закони, привілеї та традиції."
  savonarola_disaster: "Піднесення Савонароли"
  savonarola_disaster_desc: "Раптово з'явився новий проповідник, що несе нашим підданим звістку про прийдешній апокаліпсис. У своїх полум'яних промовах він викриває наше порочне, морально розбещене суспільство, а найбільше — можновладців. Його розповіді викликають хвилювання серед місцевого населення. Очевидно, цей божевільний володіє вражаючим даром переконання…"
  ciompi_revolt: "Повстання чомпі"
  ciompi_revolt_desc: "У ці смутні для Флоренції часи чомпі — робітники, ремісники та майстрові, що не входять до гільдій, — погрожують підняти заколот. Серед приводів до повстання — високі податки та вкрай слабке представництво цих груп у владі, зумовлене тим, що вони не належать до міських цехів. Подібні заворушення можуть стати причиною розладу в суспільстві…"
  crisis_of_the_sayfawa_dynasty: "Криза династії Сайфава"
  crisis_of_the_sayfawa_dynasty_desc: "Попри довгу та успішну історію правління нашої династії в цьому регіоні, внутрішні чвари та низка узурпаторів при владі спричинили в країні глибоку кризу. Поки наша увага зосереджена на стримуванні невдоволення підданих, підступні вороги та могутні сусіди неодмінно спробують цим скористатися, щоб розділити наші землі та винищити народ. Ми повинні знайти спосіб відстояти в чужоземців те, що завжди по праву було нашим, і не дозволити розбіжностям знищити нас зсередини."
  muscovite_succession_war: "Міжусобна війна в Московії"
  muscovite_succession_war_desc: "[GetCountry('MOS').GetCapital.GetRank.GetNameWithNoTooltip] [GetCountry('MOS').GetCapital.GetName] вважається осередком влади в регіоні [GetCountry('MOS').GetCapital.GetRegion.GetName]. Відсутність сильного претендента спричинила внутрішні чвари між представниками правлячої династії: кожен бачить на троні саме себе. Якщо міжусобиця розгориться ще сильніше, вона загрожує не лише зруйнувати сім'ю, а й погубити всіх нас."
  peasants_war: "Селянська війна"
  peasants_war_desc: "Сільський простолюд дедалі сильніше висловлює невдоволення своїм становищем. Несправедливі податки, гноблення з боку аристократів та загальний відчай довели селян до межі. З іскри народного гніву розгорілася жахлива пожежа, якій судилося увійти в історію під назвою «Селянська війна»."
  pw_push_for_serfdom: "Просувати [ShowSocietyDirectionNameWithNoTooltip('serfdom')|l]"
  pw_push_for_serfdom_desc: "Селянський набрід, що повстав проти влади, повинні розтрощити з максимальною жорстокістю його господарі. Не можна, щоб наше верховенство слабшало, і тим паче не можна ризикувати допустити владу натовпу."
  pw_push_for_free_subjects: "Просувати [ShowSocietyDirectionNameWithNoTooltip('free_subjects')|l]"
  pw_push_for_free_subjects_desc: "Занадто довго народ страждав під жорстоким ярмом несправедливих феодальних правителів. Наш обов'язок — піднести простих людей. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')] повинні отримати свободу."
  pw_crush_rebellion: "Придушити заколот"
  pw_crush_rebellion_desc: "Народ повстає проти нас і вимагає: нехай [actor.GetGovernment.GetRulerOrRegent.GetName] надасть йому права та привілеї. Оскільки це йде врозріз із встановленими порядками, допускати такого не можна! Тих, хто підтримує такі ідеї, потрібно негайно покарати."
  pw_crush_rebellion_tt: "[Concept('pops', 'Групи населення')|e], що підтримують обраний [Concept('rebellion', 'заколот')|e], втратять [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] од. [Concept('pop_satisfaction', 'задоволення групи населення')|e]."
  pw_rebel_progress_reduction_tt: "Розвиток обраного [Concept('rebellion', 'заколоту')|e] буде знижено на #G -25%#!"
  struggle_for_royal_power: "Боротьба за владу короля"
  struggle_for_royal_power_desc: "Навколо влади монарха та повноважень сейму розгоряється серйозний конфлікт, і, схоже, нинішня ієрархія доживає свої останні дні. Якщо ми бажаємо зберегти існуючий порядок речей, необхідно усунути ці загрози найрішучішим чином. Владі станів настав час покласти край!"
  dissolution_of_delhi: "Розпад Делійського Султанату"
  dissolution_of_delhi_desc: "Попри всі зусилля, наша країна так і не змогла оговтатися від удару. Колись велика імперія дедалі глибше занурюється в хаос, а вороги оточують її з усіх боків. Наше становище воістину відчайдушне. Якщо ми не вистоїмо, країна ризикує впасти під натиском агресорів, що прагнуть заволодіти нашими землями…"
  hook_and_cod_wars: "Боротьба «тріски» та «гачків»"
  hook_and_cod_wars_desc: "Поки що не ясно, кому дістанеться наш трон, і наші політичні проводирі розділилися на дві фракції. Фракція «гачків» дотримується консервативних поглядів і виявляє прихильність до іменитих правителів, тоді як фракція «тріски» зазвичай виступає за незалежність і підтримує претендентів із більш сумнівними домаганнями. Цей розкол загрожує порушити рівновагу, а тому вимагає делікатного підходу."
  hook_and_cod_wars_hooks_have_won_tt: "Фракція #Y «гачків»#! набула #Y 10#! од. впливу (зараз #Y [THIS.GetVariable('hacw_hook_faction_power').GetValue]#!)"
  hook_and_cod_wars_cods_have_won_tt: "Фракція #Y «тріски»#! набула #Y 10#! од. впливу (зараз #Y [THIS.GetVariable('hacw_cod_faction_power').GetValue]#!)"
  HACW_HOOK_TOOLTIP: "До фракції #Y «гачки»#! входять [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')|L]#!#!. Серед представників цієї групи населення підтримкою користується [Select_CString(DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.IsFemale, 'претендентка', 'претендент' )] на трон [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_hook_contender').GetCharacter.GetName]."
  HACW_COD_TOOLTIP: "До фракції #Y «тріски»#! входять [DisasterView.GetDisaster.GetOwner.GetGovernment.GetEstateName('burghers_estate')|l] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')|L]#!#!. Серед представників цієї групи населення підтримкою користується [Select_CString(DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.IsFemale, 'претендентка', 'претендент' )] на трон [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('hacw_cod_contender').GetCharacter.GetName]."
  horde_civil_war: "Громадянська війна в орді"
  horde_civil_war_desc: "Влада нашого правителя знову в небезпеці! Честолюбний воєначальник погрожує розв'язати громадянську війну та силою захопити трон. Тепер воїнам орди доведеться битися з власними бунтівними братами…"
  horde_civil_war_end_trigger_no_rebels: "Ніхто з [Concept('rebel', 'бунтівників')|e] не є #Y претендентом#!"
  horde_civil_war_crown_supporters: "Вірні воїни орди"
  horde_civil_war_pretender_supporters: "Бунтівні воїни орди"
  GUI_REBEL_OWNED_LOCATIONS: "[Concept('locations', 'Місцевості')|e], зайняті [Concept('rebels', 'бунтівниками')|e]: [DisasterView.GetDisaster.GetOwner.MakeScope.GetVariable('GUI_pretender_rebel_character').GetCharacter.GetCourtCountry.GetOwnedLocationCount]"
  GUI_REBEL_MILITARY_STRENGTH_COMPARED_TO_US: "[Concept('military_strength', 'Військова чисельність')|e] [Concept('rebels', 'бунтівників')|e] порівнянна з нашою."
  revolution_disaster: "Революція!"
  revolution_disaster_desc: "Десятиліття феодального гніту, економічних труднощів та релігійної нетерпимості не минули для нас безслідно. Населення прагне свободи, і наша влада під загрозою. Народне повстання практично неминуче…"
  revolution_disaster_end_trigger_tt: "#Y  Революціонери#! не збираються розв'язувати [Concept('civil_war', 'громадянську війну')|e]."
  revolution_disaster_tt: "У будь-якій [Concept('country', 'країні')|e] регіону [ROOT.GetCountry.GetCapital.GetSubContinent.GetName] відбувається [Concept('revolutionary', 'революція')|E]"
  MONARCHIST_STR_DESC: "Розмір [DisasterView.GetDisaster.GetOwner.GetAdjectiveWithNoTooltip|l]ої [Concept('army', 'війська')|e]: [DisasterView.GetDisaster.GetOwner.GetArmySize]@army_strength!\nПотенційне [Concept('levy', 'ополчення')|e] [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetArmyLevyPotentialStrength]@levy\n[Concept('manpower', 'Число рекрутів')|e] [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetMaxManpowerValue|2]@manpower!"
  REVOLUTIONARIES_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'військова чисельність')|e] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')|L]#!#!"
  REVOLUTIONARIES_STR_DESC: "Розмір [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetAdjectiveWithNoTooltip|l]ої [Concept('army', 'війська')|e]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmySize]@army_strength!\nПотенційне [Concept('levy', 'ополчення')|e] [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetArmyLevyPotentialStrength]@levy!\n[Concept('manpower', 'Число рекрутів')|e] [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.Custom('CL_GEN')]: [DisasterView.GetDisaster.GetOwner.GetCurrentCivilWar.GetMaxManpowerValue|2]@manpower!"
  MONARCHIST_POTENTIAL_STRENGTH_TT: "Потенційна [Concept('military_strength', 'військова чисельність')|e] #ONCLICK:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[DisasterView.GetDisaster.GetOwner.Custom('CL_tt')],X [DisasterView.GetDisaster.GetOwner.Custom('CL_GEN')|L]#!#!"
  revolutionary_chaos: "Хаос революції"
  revolutionary_chaos_desc: "Старому порядку настав кінець! Ми скинули гнобителів і захопили владу. Однак між фракціями йде запекла боротьба за провідну роль в уряді, і наша молода країна перебуває у вкрай вразливому становищі. Перед обличчям зовнішніх загроз необхідно усунути внутрішні конфлікти…"
  sinicization_disaster: "Китайський вплив"
  sinicization_disaster_desc: "Вплив #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! приніс нашому народу чималі блага. На жаль, він також викликав розклад традиційного життєвого укладу, а тепер і зовсім загрожує незалежності країни. Якщо ми хочемо зберегти самобутню культуру, необхідно покласти край руйнівному впливу чужоземних спокус. Водночас, тісніші зв'язки можуть виявитися корисними…"
  has_opted_to_side_with_china_in_events_tt: "Успішне #G просування#! #L [GetCountry('CHI').GetAdjective|l]ого#! впливу при нашому дворі в ході [Concept('events', 'подій')|e]"
  has_opted_to_stay_sovereign_from_china_in_events_tt: "Успішне #G обмеження#! #L [GetCountry('CHI').GetAdjective|l]ого#! впливу при нашому дворі в ході [Concept('events', 'подій')|e]"
  crisis_of_the_chinese_dynasty: "Криза в [GetCountry('CHI').Custom('longname_ru_wntt_PREP')]"
  crisis_of_the_chinese_dynasty_desc: "Небеса потемніли. Ми ось-ось втратимо божественну благодать! Внутрішній та зовнішній тиск посилюються, бюрократія деградує, а невдачі в сільському господарстві тільки множаться — все складається проти нас. Народ більше не визнає нас законними правителями [GetCountry('CHI').Custom('rank_ru_GEN')|l]."
  ccd_celestial_authority_trigger: "Наш [Concept('celestial_authority_gc', 'небесний авторитет')|e] становить не нижче #Y 90#! (зараз: #Y [GetUniqueInternationalOrganization('middle_kingdom').MakeScope.GetVariable('celestial_authority').GetValue|V1]#!)"
  cmd_has_reformed_cabinet_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_reform_the_cabinet')]»"
  cmd_has_restored_stability_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_restore_stability')]»"
  cmd_has_strenthened_crown_tt: "Застосовано [Concept('action', 'дію')|e] «[ShowGenericActionName('cmd_strengthen_crown')]»"
  fire_event_4_tt: "Може статися [Concept('event', 'подія')|e], внаслідок якої [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] відмовляться сплачувати податки"
  fire_event_5_tt: "Може статися [Concept('event', 'подія')|e], пов'язана з падінням [Concept('prosperity', 'процвітання')|e] в наших [Concept('provinces', 'провінціях')|e]"
  decline_of_majapahit: "Занепад Маджапахіту"
  decline_of_majapahit_desc: "Доба процвітання [GetCountry('MAJ').Custom('rank_ru_GEN')|l] залишилася в минулому. Нас розриває династичний конфлікт, і численні суперники чекають нагоди перетнути наші кордони. А в світлі поширення #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#! в #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#! ми ризикуємо втратити залишки впливу та зникнути, подібно до інших колись великих імперій…"
  demak_progress: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування"
  SUNNI_POPS: "Сунітські групи населення"
  HINDU_POPS: "Індуїстські групи населення"
  SUNNI_DOMINANCE_MAJAPAHIT: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP_TITLE: "Зростання [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого панування"
  DEMAK_PROGRESS_GROWTH_TITLE: "$demak_progress$"
  DEMAK_MONTHLY_CHANGE_HEADER: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування щомісяця змінюється на [Country.MakeScope.GetVariable('demak_progress_growth').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_POP_SHARE: "Частка #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітів#!#! у порівнянні з #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстами#!#!: [Country.MakeScope.GetVariable('maj_sunni_percentage').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT: "[Concept('stability', 'Стабільність')]: [Country.MakeScope.GetVariable('maj_stability_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT: "[Concept('legitimacy', 'Легітимність')]: [Country.MakeScope.GetVariable('maj_legitimacy_impact').GetValue|-=2%]"
  DEMAK_MONTHLY_CHANGE_BREAKDOWN: "$DEMAK_MONTHLY_CHANGE_POP_SHARE$\n$DEMAK_MONTHLY_CHANGE_STABILITY_IMPACT$\n$DEMAK_MONTHLY_CHANGE_LEGITIMACY_IMPACT$"
  DEMAK_PROGRESS_GROWTH_HEADER: "$demak_progress$"
  DEMAK_PROGRESS_GROWTH_TOOLTIP: "[ShowReligionAdjectiveWithNoTooltip('sunni')]е панування — це показник поширеності #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітської#!#! [Concept('religion', 'релігії')|e] в [Country.Custom('rank_ru_PREP')|l]. Зростання [ShowReligionAdjectiveWithNoTooltip('sunni')|l]ого панування збільшується залежно від частки #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітських#!#! [Concept('pops', 'груп населення')|e], і при досягненні #y 100,0%#! всі наші [Concept('locations', 'місцевості')|e] з [Concept('dominant_religion', 'домінуючою')|e] #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітською#!#! релігією відокремляться і створять Демак."
  court_and_country: "Країна і двір"
  court_and_country_desc: "Опір зростанню централізації в нашій країні спричинив повсюдну кризу та конфлікт між країною і двором. Якщо ми вистоїмо, то зможемо стати сильнішими, але все залежатиме від того, як ми впораємося з цими смутними часами."
  court_and_country_tips_header: "Порада для країни і двору"
  court_and_country_tips_tt: "Ми можемо збільшити [Concept('crown_power', 'владу правителя')|e] таким чином:\n$BULLET_WITH_TAB$Скасувати [Concept('privileges', 'привілеї')|e]\n$BULLET_WITH_TAB$Посилити [Concept('control', 'контроль')|e] над нашими [Concept('locations', 'місцевостями')|e]\n$BULLET_WITH_TAB$Побудувати #TOOLTIP:BUILDING_TYPE,counting_house,X #L контору#!#!\n$BULLET_WITH_TAB$Зміцнити [Concept('legitimacy', 'легітимність')|e]\n$BULLET_WITH_TAB$Прийняти певні [Concept('policies', 'політики')|e]"
  french_wars_religion_breakdown_tt: "Частка відповідних #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! [Concept('religions', 'релігій')|e] у нашій [Concept('country', 'країні')|e]\n#TOOLTIP:RELIGION,$catholic_tt$,X #L Католицтво#!#!:"
  x_catholic: "[GetCountry('FRA').GetReligionPercentage(GetReligionByKey('catholic'))|%2] [Concept('catholic', 'католицьких')|e] [Concept('pops', 'груп населення')|e]"
  court_and_country_7_tt: "Внаслідок [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] можуть відмовитися сплачувати податки"
  court_and_country_8_tt: "Внаслідок [Concept('event', 'події')|e] нестабільність може спричинити заколоти серед місцевого населення"
  court_and_country_9_tt: "Внаслідок [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можуть організувати повстання і вимагати повернення своїх колишніх привілеїв"
  court_and_country_10_tt: "Внаслідок [Concept('event', 'події')|e] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] можуть повстати проти нашого правління"
  court_and_country_11_tt: "Внаслідок [Concept('event', 'події')|e] лояльність наших військових офіцерів може бути поставлена під сумнів"
  court_and_country_12_tt: "Внаслідок [Concept('event', 'події')|e] ми можемо знайти прихильників в війську та уряді"
  aspiration_for_liberty: "Жага свободи"
  aspiration_for_liberty_desc: "Прагнення до свободи та бажання народу втілити в життя ідеали Просвітництва можуть призвести до повстання, яке тепер здається майже неминучим. Загальне обурення нашим невмілим правлінням загрожує перерости в революцію! Це серйозно ускладнить наші справи в майбутньому…"
  battles_on_foreign_grounds_tt: "Внаслідок [Concept('event', 'події')|e] ведення зовнішніх війн може стати ще дорожчим задоволенням"
  governmental_incompetence_event_tt: "Внаслідок [Concept('event', 'події')|e] некомпетентність нашого уряду може спровокувати повстання населення"
  reform_society: "Суспільна реформа"
  reform_society_desc: "Політична система, вибудувана навколо #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L альтепетлів#!#! — міст-країн, — довгі роки підтримувала в країні мир і вела її до процвітання. На жаль, відсутність ефективних важелів впливу на політику підпорядкованих міст призвела до зростання невдоволення нашим правлінням. Якщо ми хочемо утримати владу та зберегти велич, необхідно провести реформи з централізації."
  rise_of_the_szlachta: "Посилення шляхти"
  rise_of_the_szlachta_desc: "Вплив шляхетного стану при дворі зростає: шляхтичі постійно вимагають нових вольностей та привілеїв. Вони плетуть політичні інтриги та нагадують зграю вовків, що вичікують зручного випадку, аби вчепитися жертві в горло. Без сумніву, шляхтичі кинуть нам виклик за першої ж нагоди!"
  pw_push_for_aristocracy: "Просувати [ShowSocietyDirectionNameWithNoTooltip('aristocracy')|l]"
  pw_push_for_aristocracy_desc: "[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')] повинні зберігати та примножувати свої привілеї та місця в традиційній ієрархії — на цих принципах все й засновано. Місце людини в суспільстві визначається мечем та родоводом, тому старовинним родинам потрібно міцно триматися за владу. Але така консолідація має й свої ризики. Наприклад [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')|l] можуть бути дуже незадоволені."
  pw_push_for_plutocracy: "Просувати [ShowSocietyDirectionNameWithNoTooltip('plutocracy')|l]"
  pw_push_for_plutocracy_desc: "Багатство, а не спадщина, визначає, наскільки впливова людина. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')], фінансисти та еліта підприємництва, повинні бути попереду всіх, щоб формувати суспільство, яке цінує торгівлю та прибуток. [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')], звичайно ж, будуть дуже не раді такому рішенню."
  given_more_estate_power_nobles_estate_power_tt: "Ми надали більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('nobles_estate')]»"
  given_more_estate_power_burghers_estate_power_tt: "Ми надали більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('burghers_estate')]»"
  given_more_estate_power_crown_estate_power_tt: "Ми забезпечили більше [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e] «[GetCountry('POL').GetGovernment.GetEstateName('crown_estate')]»"
  death_of_hayan_wuruk: "[GetCharacter('maj_hayam_wuruk').GetNameWithNoTooltip] і [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale,'її', 'його')] смерть"
  death_of_hayan_wuruk_desc: "[GetCharacter('maj_hayam_wuruk').GetName] [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale,'померла. Її', 'помер. Його')] смерть призвела до того, що [GetCountry('MAJ').Custom('endrank_predlog_vvo')] [GetCountry('MAJ').Custom('rank_ru_PREP')|l] почалася страшна смута. Цей неспокійний період може затягнутися на багато років, і ті, хто колись підкорявся нам, оскаржуватимуть наше право на владу. Якщо ми хочемо вижити, необхідно терміново вирішити питання успадкування та зміцнити #L [GetCountry('MAJ').GetAdjective|l]у#! владу."
  hayan_wuruk_has_passed_tt: "[GetCharacter('maj_hayam_wuruk').GetName] [Select_CString(GetCharacter('maj_hayam_wuruk').IsFemale, 'померла', 'помер' )] протягом останніх #Y 10#! років"
  curse_of_stefan_uros_iii: "[GetCharacter('ser_stefan_decanski').GetNameWithNoTooltip] і [Select_CString(GetCharacter('ser_stefan_decanski').IsFemale,'її', 'його')] прокляття"
  curse_of_stefan_uros_iii_desc: "Ніхто не посміє засумніватися в тому, що [GetCharacter('ser_stefan_dusan').GetName] — [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'жінка', 'чоловік')] у всіх відношеннях [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'видатна', 'видатний')], а також вправний полководець з бездоганними манерами. [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'Вона отримала', 'Він отримав')] чудову освіту і [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'підняла', 'підняв')] нашу країну до недосяжних раніше висот. Проте, як це нерідко буває, в [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'її', 'його')] житті знайшлося місце і підлості, і стражданням, і вбивствам. Найстрашнішим злочином [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'цариці', 'царя')] було вбивство власного батька. Вмираючи, [GetCharacter('ser_stefan_decanski').GetName] прокляв весь свій рід, напророкувавши нащадкам занепад і безславний кінець. Тепер забобонні придворні шепочуться, що привид старого короля повернувся, знаменуючи швидку загибель країни…"
  english_civil_war: "Англійська громадянська війна"
  english_civil_war_desc: "Зростаюче протистояння між короною та парламентом з питань влади та управління може охопити всю країну. Віра [Select_CString(SCOPE.sCountry('actor').GetGovernment.GetRuler.IsFemale, 'нашої правительки', 'нашого правителя')] у своє божественне право, [Select_CString(SCOPE.sCountry('actor').GetGovernment.GetRuler.IsFemale, 'її', 'його')] явне незнання порядку введення податків та релігійна політика викликали невдоволення серед членів парламенту. Якщо рішення не буде знайдено в найкоротші терміни, ситуація переросте в громадянську війну…"
  lost_civil_war_tt: "#Y Парламентарі#! перемогли у [Concept('civil_war', 'громадянській війні')|e]"
  won_civil_war_tt: "#Y Роялісти#! перемогли у [Concept('civil_war', 'громадянській війні')|e]"
  parliamentarist_rebels: "Парламентарі"
  complete_the_ecw_and_lose_tt: "#TOOLTIP:DISASTER_TYPE,english_civil_war,X #L Англійська громадянська війна#!#! завершиться"
  french_wars_religion: "Релігійні війни у Франції"
  french_wars_religion_desc: "Виникнення нових відгалужень #TOOLTIP:RELIGIONGROUP,christian,X #L християнської#!#! віри по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#! призвело до того, що релігійні тертя в нашому суспільстві досягли піку. Тепер озброєні фанатики, єретики та захисники істинної віри загрожують втягнути всю країну в жорстоку громадянську війну."
  had_fwr_before_definitive_ending_tt: "Це [Concept('disaster', 'лихо')|e] не завершилося досягненням [Concept('religious_unity', 'релігійної єдності')|e] або підписанням [Concept('policy', 'політики')|e] у формі #TOOLTIP:POLICY,edict_of_nantes,X #L Нантського едикту#!#!"
  lutheran_huguenots: "Лютеранські гугеноти"
  calvinist_huguenots: "Кальвіністські гугеноти"
  catholic_huguenots: "$catholic_ADJ$і гугеноти"
  reach_compromise_with_huguenots: "Компроміс із гугенотами"
  reach_compromise_with_huguenots_desc: "Час розбрату на наших землях добіг кінця. Нам потрібен компроміс та єдність — це єдиний шлях до виходу з цієї катастрофи."
  time_of_troubles: "Смутний час"
  time_of_troubles_desc: "Наш народ переживає важкий період соціальних та економічних труднощів — голод та війну. На додачу, [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')|l] та [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l] також не користуються особливою любов'ю серед населення. Вороги оточують нас з усіх боків! [Country.GetFlavorRank|l] ось-ось впаде…"
  decline_of_empire: "Спочивання на лаврах"
  decline_of_empire_desc: "Наша влада, колись могутня та тверда, опинилася на межі краху. Наші інститути руйнує хабарництво, населення провінцій бунтує, кинуте напризволяще, а країни-суперниці кружляють над нами, немов стерв'ятники, в надії урвати шматок побільше. Золотий вік давно минув, з кожним днем все ширші тріщини в нашому фундаменті. Якщо нам не вдасться швидко зупинити розкладання та повернути контроль над імперією, вона розсиплеться в прах, залишивши після себе лише руїни, жаль та тіні колишньої величі…"
  has_not_had_decline_of_empire_last_25_years: "Це [Concept('disaster', 'лихо')|e] не відбувалося в останні #Y 25#! років"
  not_recently_become_empire_tt: "Має [Concept('country_rank', 'ранг')|e] #TOOLTIP:COUNTRY_RANK,rank_empire,X #L імперії#!#! хоча б #Y 15#! років"
  complacent_decline_actions_price: "Вартість дій у ситуації «$decline_of_empire$»"
  cd_inspect_area: "Інспекція області"
  cd_inspect_area_desc: "Спочиваючи на лаврах, ми дозволили собі розслабитися, і незабаром наша гординя принесла свої гіркі плоди. Настав час придушити бунтівні настрої підданих [actor.Custom('rank_ru_GEN')|l] і нагадати їм, що ми, як і раніше, твердо контролюємо свої землі."
  selected_area_inspected_tt: "В обраній [Concept('area', 'області')|e] буде проведена інспекція. Це знизить [Concept('pop_satisfaction', 'задоволення')|e] та зменшить [Concept('complacency', 'самовдоволення')|e] населення, але підвищить наш [Concept('control', 'контроль')|e] над ключовими [Concept('provinces', 'провінціями')|e] цієї області.\n#italic Ефективність інспекції головним чином залежить від [Concept('population', 'населення')|e] [Concept('area', 'області')|e] та нашої #TOOLTIP:MODIFIER_TYPE,legislative_efficiency,X #L законодавчої ефективності#!#!#!"
  cd_purge_cabinet_member: "Вигнання радника"
  cd_purge_cabinet_member_desc: "Повнота влади повністю розбещує людей, і члени нашої ради — не виняток. Ми повинні покласти край цьому моральному розкладанню, і для цього нам необхідно провести чистку в уряді."
  selected_character_banned_or_executed_tt: "Обраний [Concept('character', 'персонаж')|e] буде виключений з [Concept('cabinet', 'ради')|e] будь-яким доступним способом"
  decline_of_mali: "Занепад Малі"
  decline_of_mali_desc: "Слабка влада, громадянські війни, посилення зовнішніх ворогів, внутрішня стагнація та інші випробування поставали перед [GetCountry('MAL').Custom('longname_ru_INST')] в останні роки. Стабільність і безпека цієї країни під загрозою. Лише сильна рука здатна відвернути прийдешню загибель і повернути країні колишню велич."
  coup_attempt: "Спроба перевороту"
  coup_attempt_desc: "Зловісні тіні кружляють над нами, як стерв'ятники, що вичікують слушного моменту для нападу! Це тіні наближених, які прагнуть позбутися нашого правителя і посадити на трон свою маріонетку."
  recently_had_coup_attempt_inconclusive_tt: "За останні #Y 5#! років тут не було ні провальних, ні вдалих спроб перевороту."
  conspirators_murdered_ruler_tt: "Змовникам вдалося вбити нашого правителя"
  byzantine_succession_crisis: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]а криза спадкоємності"
  byzantine_succession_crisis_desc: "Претенденти-змовники та впливові тіньові політики плетуть інтриги, щоб повалити правлячу #L [GetCountry('BYZ').GetAdjective|l]у#! династію. Двір охоплений смутою, авторитетні генерали та чужоземці прагнуть вплинути на результат цього неспокійного періоду. Ослаблення нашого контролю над #TOOLTIP:REGION,balkan_region,X #L Балканами#!#! ставить під питання майбутнє останнього легітимного оплоту Риму."
  castilian_civil_war: "[GetCountry('CAS').GetAdjectiveWithNoTooltip]а громадянська війна"
  castilian_civil_war_desc: "Вороги невпинно шукають способи втрутитися в нашу політику, підігріваючи нестабільність або підтримуючи претендентів на наш трон. Ті, хто бажає покінчити з нашим правлінням і викреслити наше ім'я з історичних книг, напевно не залишаться осторонь у цей неспокійний період. Багатства #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! завжди приваблювали жадібних недругів на наших кордонах, але ми не дозволимо їм бенкетувати за наш рахунок!"
  turmoil_in_brandenburg: "[GetCountry('BRA').GetAdjectiveWithNoTooltip]а смута"
  turmoil_in_brandenburg_desc: "[GetCountry('BRA').GetLongName] перебува[GetCountry('BRA').Custom('endlong_ityat')] у важкій ситуації з тих самих пір, як династія #TOOLTIP:DYNASTY,$askanier_dynasty_tt$,X #L Асканіїв#!#! втратила вплив і влада над маркграфством перейшла до #TOOLTIP:DYNASTY,$wittelsbach_dynasty_tt$,X #L Віттельсбахів#!#!. Поки останні приділяють свою увагу іншим територіям, [Select_CString(GetCountry('BRA').GetGovernment.GetRuler.IsFemale, 'юна', 'юний' )] [GetCountry('BRA').GetGovernment.GetRuler.GetName] [Select_CString(GetCountry('BRA').GetGovernment.GetRuler.IsFemale, 'змушена', 'змушений' )] власними силами повертати території марки під контроль центральної влади. Це і без того непросте завдання ускладнюється розгулом баронів-розбійників, непокорою станів і невдоволенням простого народу, який з тугою згадує про часи правління Асканіїв.\n\nКрім того, поки уряд #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_GEN')|L]#!#! зайнятий внутрішніми питаннями, інші династії можуть спробувати прибрати до рук цей проблемний, але вкрай престижний титул #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!…"
  turmoil_in_brandenburg_investment_tt: "Якщо значення показника «$bra_wittelsbacher_investment_var$» досягне 100 од., наша поточна [Concept('dynasty', 'династія')|e] збереже владу."
  turmoil_in_brandenburg_neglect_tt: "Якщо значення показника «$bra_wittelsbacher_neglect_var$» досягне 100 од., влада перейде до іншої [Concept('dynasty', 'династії')|e]."
  turmoil_in_brandenburg_dynastic_struggle_resolved_tt: "Ми врегулювали династичну боротьбу за наш престол"
  robber_barons_resolved_tt: "Ми вирішили проблему з баронами-розбійниками"
  wittelsbacher_event_occurs_tt: "Відбулася подія, пов'язана з урядом Віттельсбахів"
  robber_barons_when_tt: "Після 1365 р. можуть відбутися події, пов'язані з баронами-розбійниками"
  robber_barons_spread_tt: "Барони-розбійники розширюють свій вплив"
  robber_barons_stay_put_tt: "Барони-розбійники бездіють"
  TURMOIL_IN_BRANDENBURG_DISASTERS_MODIFIERS_TT_LIST: "Поки триває [Concept('disaster', 'лихо')|e], країна отримує ці модифікатори:"