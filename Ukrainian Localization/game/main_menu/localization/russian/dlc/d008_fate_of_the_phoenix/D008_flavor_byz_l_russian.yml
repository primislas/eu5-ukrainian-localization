l_russian:
 d008_flavor_byz.1.title: "Обещания алхимика"
 d008_flavor_byz.1.entry: "$d008_flavor_byz.1.title$"
 d008_flavor_byz.1.desc: "Когда-то греческий огонь был известен не только по всему Средиземноморью, но и за его пределами. Эта легендарная смесь, внушавшая ужас вражеским флотоводцам, даже на воде горела жарче любого пламени. Потушить греческий огонь было почти невозможно, подожжённые им суда сгорали дотла в мгновение ока. Секрет изготовления смеси всегда хранился в строжайшей тайне, но со временем эти знания были утрачены, и мы больше не можем производить это оружие.\n\n[target_artist.GetName], [Select_CString(target_artist.IsFemale, 'одна', 'один' )] из наших виднейших алхимиков, утверждает, что может восстановить и воспроизвести утраченную формулу. Если это правда, то мы сможем вновь поставить губительный огонь на службу нашему флоту. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] и [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] нашей страны уже ликуют, однако [target_artist.GetNameWithNoTooltip] [Select_CString(target_artist.IsFemale, 'должна', 'должен' )] провести ещё немало дорогостоящих опытов, прежде чем формула будет получена."
 d008_flavor_byz.1.a: "[target_artist.GetSheHe|U] получит всё, в чём будет нуждаться!"
 d008_flavor_byz.1.b: "Нам ни к чему байки из прошлого, флот и без того достаточно силён."
 d008_flavor_byz.1.a.tt: "[target_artist.GetName] начнёт опыты, чтобы найти формулу греческого огня"
 d008_flavor_byz.2.title: "В поисках огня"
 d008_flavor_byz.2.desc: "Прошло уже немало времени с тех пор, как [target_artist.GetName] [Select_CString(target_artist.IsFemale, 'уединилась', 'уединился' )] в лаборатории, чтобы найти формулу греческого огня, но до сих пор [target_artist.GetHerHis] достижения ограничивались лишь обгоревшими бровями да периодическими взрывами по ночам. Многие уже сомневаются в том, что [Select_CString(target_artist.IsFemale, 'она способна', 'он способен' )] добиться успеха в своём начинании. Впрочем, [target_artist.GetSheHe] уверяет, что уже [Select_CString(target_artist.IsFemale, 'близка', 'близок' )] к прорыву — нужно лишь ещё немного времени и средств."
 d008_flavor_byz.2.a: "Хорошо, мы выделим [Select_CString(target_artist.IsFemale, 'ей', 'ему' )] дополнительные средства."
 d008_flavor_byz.2.b: "Хватит с нас этих фантазий."
 d008_flavor_byz.2.a.tt: "[target_artist.GetName] продолжит искать формулу греческого огня"
 d008_flavor_byz.3.title: "Греческий огонь"
 d008_flavor_byz.3.desc: "Много ночей подряд жители [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetName] вскакивали посреди ночи от громких взрывов, вызванных опытами, которые [Select_CString(target_artist.IsFemale, 'проводила', 'проводил' )] [target_artist.GetName]. За время работы [target_artist.GetHerHis] руки покрылись множеством ожогов, [target_artist.GetSheHe] не раз [Select_CString(target_artist.IsFemale, 'оказывалась', 'оказывался' )] на краю гибели, но в итоге [target_artist.GetHerHis] мучения принесли нужный результат. Путём проб и ошибок [Select_CString(target_artist.IsFemale, 'ей', 'ему' )] удалось воссоздать греческий огонь в точном соответствии с историческими источниками. Теперь мы можем наладить производство этой смеси и поставить её на вооружение своего флота. Разумеется, мы будем и впредь держать формулу и технологию изготовления греческого огня в секрете — но на сей раз предпримем все необходимые меры, чтобы никогда больше не утратить эти знания."
 d008_flavor_byz.3.a: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий флот вновь заставит море пылать!"
 unlocked_greek_fire_tt: "Мы получим доступ к [Concept('unit_types', 'типам войск')|e] «[ShowUnitDefinitionName('n_greek_fire_galley_renaissance')]», «[ShowUnitDefinitionName('n_greek_fire_galley_discovery')]», «[ShowUnitDefinitionName('a_greek_fire_renaissance_infantry')]» и «[ShowUnitDefinitionName('a_greek_fire_discovery_infantry')]»"
 d008_flavor_byz.4.title: "[target.GetNameWithNoTooltip] не добивается успеха"
 d008_flavor_byz.4.desc: "Увы, [target.GetName] безвременно [Select_CString(target_artist.IsFemale, 'скончалась', 'скончался' )], так и не завершив свои поиски греческого огня. [target.GetHerHis|U] ученики и другие видные алхимики изучили [target_artist.GetHerHis] записи, чтобы понять, можно ли продолжить [target_artist.GetHerHis] исследования, но скоро стало ясно, что всё это время [Select_CString(target_artist.IsFemale, 'она топталась', 'он топтался' )] на месте и ни на шаг не [Select_CString(target_artist.IsFemale, 'приблизилась', 'приблизился' )] к искомой цели. Судя по всему, нам никогда не удастся разгадать тайну греческого огня…"
 d008_flavor_byz.4.a: "Ничего не поделать…"
