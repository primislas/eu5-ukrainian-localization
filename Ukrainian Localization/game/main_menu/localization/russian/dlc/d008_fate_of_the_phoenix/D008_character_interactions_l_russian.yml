l_russian:
 #Fate of the Phoenix DLC
 assign_despot: "Назначение деспотом"
 assign_despot_concept: "[Concept('character', 'Персонаж')|e]"
 assign_despot_act: "$assign_despot$"
 assign_despot_desc: "Мы назначим [Concept('character', 'персонажа')|e] на должность деспота с эффектами:\n[ShowModifierEffect('despot_modifier')]"
 assign_despot_desc_specific: "Мы назначим [Concept('character', 'персонажа')|e] на должность деспота. Он получит [Concept('modifier', 'модификатор')|e] «[ShowModifier('despot_modifier')]»."
 assign_despot_past: "[SCOPE.sCharacter('recipient').GetName] [Select_CString(SCOPE.sCharacter('recipient').IsFemale, 'назначена', 'назначен' )] на должность #TOOLTIP:STATIC_MODIFIER,despot_modifier,X #V #L деспота#!#!#!."
 assign_despot_act_past: "[SCOPE.sCharacter('recipient').GetName] [Select_CString(SCOPE.sCharacter('recipient').IsFemale, 'назначена', 'назначен' )] на должность #TOOLTIP:STATIC_MODIFIER,despot_modifier,X #V #L деспота#!#!#!."
 compose_strategikon: "Написание «Стратегикона»"
 compose_strategikon_concept: "[Concept('character', 'Персонаж')|e]"
 compose_strategikon_act: "$compose_strategikon$"
 compose_strategikon_desc: "Наш [Concept('ruler', 'правитель')|e] обратится к глубинам своей военной мудрости и напишет трактат, посвящённый выбранному вопросу. Это наверняка поможет нам убедить других, что мы приобрели свою воинскую славу абсолютно заслуженно."
 compose_strategikon_desc_specific: "Наш [Concept('ruler', 'правитель')|e] получит соответствующий [Concept('character_modifier', 'модификатор персонажа')|e] в зависимости от темы произведения."
 compose_strategikon_past: "Написан «Стратегикон»"
 compose_strategikon_act_past: "[SCOPE.sCharacter('recipient').GetName] [Select_CString(SCOPE.sCharacter('recipient').IsFemale, 'написала', 'написал' )] «Стратегикон» и [Select_CString(SCOPE.sCharacter('recipient').IsFemale, 'получила', 'получил' )] мощный [Concept('modifier', 'модификатор')|e], действующий до конца правления."
 has_not_composed_strategikon_tt: "Наш [Concept('ruler', 'правитель')|e] за свою жизнь не написал «Стратегикон»"
 actor_ruler_total_abilities: "[actor.GetGovernment.GetRulerOrRegent.GetName] — [Concept('total_ability', 'сумма навыков')|e]"
 castrate_character: "Оскопление"
 castrate_character_concept: "[Concept('character', 'Персонаж')|e]"
 castrate_character_act: "$castrate_character$"
 castrate_character_desc: "Приказать оскопить [Concept('character', 'персонажа')|e] при нашем дворе. Это наказание необратимо и навсегда лишает персонажа возможности завести детей."
 castrate_character_desc_specific: "Приказать оскопить [Concept('character', 'персонажа')|e], что даст ему свойство #TOOLTIP:TRAIT,castrated,X #L «Оскоплённость»#!#!."
 castrate_character_past: "[SCOPE.sCharacter('recipient').GetName] был оскоплён согласно императорскому указу"
 castrate_character_act_past: "[SCOPE.sCharacter('recipient').GetName] был оскоплён согласно императорскому указу"
 blind_character: "Ослепление"
 blind_character_concept: "[Concept('character', 'Персонаж')|e]"
 blind_character_act: "$blind_character$"
 blind_character_desc: "Приказать ослепить [Concept('character', 'персонажа')|e] при нашем дворе. Эта древняя форма наказания лишает цель возможности возглавлять армии и лишает политического влияния."
 blind_character_desc_specific: "Приказать ослепить [Concept('character', 'персонажа')|e], что даст ему свойство #TOOLTIP:TRAIT,blind,X #L «Слепота»#!#!."
 blind_character_past: "[SCOPE.sCharacter('recipient').GetName] [Select_CString(SCOPE.sCharacter('recipient').IsFemale,'была ослеплена', 'был ослеплён')] согласно императорскому указу"
 blind_character_act_past: "[SCOPE.sCharacter('recipient').GetName] [Select_CString(SCOPE.sCharacter('recipient').IsFemale,'была ослеплена', 'был ослеплён')] согласно императорскому указу"
