l_russian:
 #Fate of the Phoenix
 fate_of_the_phoenix: "Судьба феникса"
 fate_of_the_phoenix_desc: "Уже несколько веков [GetCountry('BYZ').GetFlavorRank|l] находится в упадке, хотя некогда это было весьма могущественное государство. Бесконечные междоусобицы, внутренняя нестабильность и #TOOLTIP:SITUATION,rise_of_the_ottomans,X #L возвышение османов#!#! — вот зловещие предвестники гибели нашей цивилизации. Не обошлось и без внешних угроз: захватчики из #ONCLICK:COUNTRY,[GetCountry('SER').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SER').Custom('CL_tt')],X [GetCountry('SER').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('BUL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BUL').Custom('CL_tt')],X [GetCountry('BUL').Custom('CL_GEN')|L]#!#! посягают на нашу северную границу. Мы должны собрать волю в кулак, покончить со взяточничеством и восстановить влияние короны, пока ещё не поздно…"
 remember_no_turk_tt: "Из всех [Concept('country', 'держав')|e] со [Concept('capital', 'столицей')|e] в #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! только наша страна владеет более чем #Y 100#! [Concept('locations', 'районами')|e] с учётом собственных [Concept('subjects', 'ленников')|e], заселена #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турками#!#! или #TOOLTIP:CULTURE,$turkoman_culture_tt$,X #L туркоманами#!#! либо соблюдает [Concept('government_reform', 'государственный принцип')|e] #TOOLTIP:GOVERNMENT_REFORM,anatolian_beylik,X #L «Анатолийский бейлик»#!#!."
 #Fate of the Phoenix Events (to be moved)
 fate_of_the_phoenix.1.title: "Судьба феникса"
 fate_of_the_phoenix.1.desc_a: "Когда-то #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! был центром мира, правопреемником Рима, кузницей законов, веры и порядка. Теперь эта роль уже тяготит нас.\n\nГоды интриг, пустых побед и деградации во власти привели к тому, что наш народ пал духом, а само слово «[ROOT.GetCountry.GetFlavorRank|l]» звучит для него как насмешка. Наши институты чахнут без должного внимания, а соседи, словно жадные гиены, всё это время копят силы для удара. Мы наследники великой культуры, поэтому достойны лучшей участи!"
 fate_of_the_phoenix.1.desc_b: "Мы получили вести из #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!. Похоже, в древней столице сейчас неспокойно: её могущество ослабевает вследствие раздора и упадка. На протяжении веков пример #L #TOOLTIP:COUNTRY_RANK,[target_location.GetRank.Custom('CF_tt')],X [target_location.GetRank.Custom('rank_ru_GEN')|l]#!#! держал в узде #TOOLTIP:RELIGIONGROUP,christian,X #L христианские#!#! земли #TOOLTIP:REGION,balkan_region,X #L Балкан#!#!, объединяя нас на почве веры и предотвращая большинство конфликтов.\n\nТеперь, когда хватка Константинополя уже не так сильна, равновесие на наших границах становится всё более неустойчивым. Некоторые влиятельные семьи предупреждают, что падение этого столпа пошатнёт всю конструкцию. Другие высказываются более прямо: прежние договорённости перестают действовать и то, что прежде регулировалось традицией, скоро будет решаться силой. То, какой путь мы выберем в эти трудные времена, повлияет на мир далеко за пределами [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 fate_of_the_phoenix.1.desc_c: "Ни одна империя не станет трубить о собственной немощи. Однако слабые решения, неспособность защитить границы и утрата престижа красноречиво говорят о том, что [GetCountry('BYZ').GetLongName] стремительно движ[GetCountry('BYZ').Custom('endlong_etut')]ся к стремительному и жестокому концу. Теперь ситуация на западе не требует ни почтения, ни осторожности — только холодного расчёта. Именно нам суждено занять место великой империи и пировать на её обломках."
 fate_of_the_phoenix.1.a: "Ещё не всё потеряно."
 fate_of_the_phoenix.1.b: "Перемены — это всегда потрясение…"
 fop_parameters_a_tt: "Исход бедствия определит нашу судьбу. В эти неспокойные времена мы получим доступ к уникальным [Concept('actions', 'действиям')|e] на панели [Concept('disaster', 'бедствий')|e]"
 fop_parameters_b_tt: "Если нам удастся справиться с [Concept('disaster', 'бедствием')|e] и остановить упадок, мы вступим в новый золотой век и заслужим себе место в истории"
 fop_paramenters_bul_tur_ser_tt: "Пока [GetCountry('BYZ').GetLongName] пережива[GetCountry('BYZ').Custom('endlong_etyut')] [Concept('disaster', 'бедствие')|e] #TOOLTIP:DISASTER_TYPE,D008_fate_of_the_phoenix,X #L «Судьба феникса»#!#!, мы сможем наживаться на слабости этой державы"
 fop_parameters_c_tt: "И наконец, если мы выйдем победителями из противостояния с выкормышами #TOOLTIP:INSTITUTION,renaissance,X #L Возрождения#!#!, наша [Concept('capital', 'столица')|e] получит право называться местом его рождения"
 fate_of_the_phoenix.2.title: "[target_location.GetName] в наших руках!"
 fate_of_the_phoenix.2.desc: "Знамёна [ROOT.GetCountry.Custom('rank_ru_GEN')|l] вновь развеваются над [target_location.Custom('LR_INST')|l] [target_location.GetName]. Долгое время за контроль над этим важным эгейским портом сражались #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецкие#!#! военачальники, пираты и державы-соперницы, теперь же он вернулся [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! — свой родной дом. Его гавани и рынки разрушены, но это поправимо. Как мы поступим? Отстроим порт заново или восстановим рынки и склады? От этого решения зависит наша будущая роль в восточных морях."
 fate_of_the_phoenix.2.a: "Отстроим порт заново."
 fate_of_the_phoenix.2.b: "Восстановим рынки и склады."
 building_set_to_max_level_tt: "Уровень [Concept('building', 'сооружения')|e] будет повышен до максимального"
 fate_of_the_phoenix.3.title: "$fate_of_the_phoenix.2.title$"
 fate_of_the_phoenix.3.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] — убежище императоров и гарант преемственности власти после катастрофы 1204 года — возвращается в родное гнездо. Эти стены защищали изгнанных правителей [ROOT.GetCountry.Custom('rank_ru_GEN')|l], служили оплотом закона и давали надежду на будущее. Их восстановление имеет глубоко символическое значение. [ROOT.GetCountry.GetFlavorRank] возрожда[ROOT.GetCountry.Custom('endrank_etyut')]ся из праха и пепла."
 fate_of_the_phoenix.3.a: "[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetNameWithNoTooltip] будет лично курировать этот проект!"
 fate_of_the_phoenix.3.b: "Это метафора возрождения империи!"
 fate_of_the_phoenix.3.c: "Пора восстановить нашу власть над Анатолией!"
 fate_of_the_phoenix.4.title: "$fate_of_the_phoenix.2.title$"
 fate_of_the_phoenix.4.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName], колыбель #L [GetCountry('TUR').GetAdjective|l]ой#! власти, уступает натиску империи. Эта территория не только приносила хорошую дань, но и служила беям источником силы и авторитета. Захват #L #TOOLTIP:COUNTRY_RANK,[target_location.GetRank.Custom('CF_tt')],X [target_location.GetRank.Custom('rank_ru_GEN')|l]#!#! — чёткий сигнал всей #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#!: времена изменились, и [ROOT.GetCountry.GetFlavorRank|l] выход[ROOT.GetCountry.Custom('endrank_ityat')] из оборонительной позиции."
 fate_of_the_phoenix.4.a: "Мы завладели Анатолией!"
 unlocks_demand_beylik_tribute_disaster_action_tt: "Даёт доступ к [Concept('action', 'действию')|e] #TOOLTIP:GENERIC_ACTION,D008_demand_beylik_tribute,X #L «Требование дани от бейликов»#!#!, пока это [Concept('disaster', 'бедствие')|e] не закончится"
 fate_of_the_phoenix.5.title: "[loser.GetNameWithNoTooltip] терп[loser.Custom('end_ityat')] поражение"
 fate_of_the_phoenix.5.desc: "[loser.GetLongName] расправля[loser.Custom('endlong_etyut')] плечи на фоне роста нестабильности, вызванного войной между бейликами. Мастерски чередуя силовые и дипломатические методы, эта держава начинает угрожать независимости [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Однако недавними победами мы напомнили, что всё ещё являемся глашатаями Рима и сражаемся как львы даже в такие неспокойные времена. Пусть эти победы станут поворотной точкой, началом новой эпохи, которая положит конец упадку!"
 fate_of_the_phoenix.5.a: "Ситуация меняется!"
 high_legitimacy_grants_extra_benefits_tt: "В течение #Y 30#! лет [Concept('assimilation', 'ассимиляция')|e] и [Concept('integration', 'интеграция')|e] в наших [Concept('locations', 'районах')|e] будут идти значительно быстрее при [Concept('legitimacy', 'легитимности')|e] выше #Y 50#!"
 fate_of_the_phoenix.6.title: "Провинция [target_province.GetNameWithNoTooltip] противится нашей власти"
 fate_of_the_phoenix.6.desc: "Провинция [target_province.GetName] отказывается сотрудничать с нами в этот трудный период. Если мы не признаем её независимость, может начаться настоящий мятеж. Наши советники предлагают не рисковать, однако, сделав такую уступку, [ROOT.GetCountry.GetFlavorRank|l] ещё больше потеря[ROOT.GetCountry.Custom('endrank_etyut')] авторитет."
 fate_of_the_phoenix.6.a: "Фениксу нет дела до пустяковых жалоб."
 fate_of_the_phoenix.6.b: "Вдруг [target_character.GetShortNameWithNoTooltip] сможет помочь?"
 fate_of_the_phoenix.6.c: "Обратимся к мнению народа!"
 target_character_goes_to_target_province_to_restore_order_tt: "[target_character.GetName] будет следить, как провинция [target_province.GetName] восстанавливает порядок. [Select_CString(target_character.IsFemale, 'Она', 'Он' )] будет отсутствовать #Y 2#! года"
 fate_of_the_phoenix.7.title: "Слабость [target_country.Custom('CL_GEN')]"
 fate_of_the_phoenix.7.desc: "[target_country.GetName] теря[target_country.Custom('end_etyut')] силу и вес, поэтому для нас открывается окно возможностей. Если мы хотим добиться своего, то должны действовать быстро, пока [target_character.GetName] не [Select_CString(target_character.IsFemale, 'восстановила', 'восстановил' )] порядок."
 fate_of_the_phoenix.7.a: "Наше время пришло."
 fate_of_the_phoenix.7.b: "Нельзя нарушать баланс сил!"
 we_may_have_another_chance_soon_tt: "#italic Быть может, нам ещё представится шанс заявить о своих притязаниях…#!"
 fate_of_the_phoenix.8.title: "Войны [actor.Custom('CL_GEN')]"
 fate_of_the_phoenix.8.desc: "Сейчас [actor.GetName] вед[actor.Custom('end_youtut')] войну против врагов истинной веры. Так как мы состоим в одном #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,autocephalous_patriarchate,X #L автокефальном патриархате#!#!, от нас ждут, что мы тоже возьмём в руки оружие и бросимся сражаться с мифическим общим противником. В случае отказа нам грозит исключение из патриархата. Если так случится, наши отношения дадут трещину."
 fate_of_the_phoenix.8.a: "К бою!"
 fate_of_the_phoenix.8.b: "Не стоит тратить на это время."
 fate_of_the_phoenix.9.title: "[target_army.GetNameWithNoTooltip] и дезертирство"
 fate_of_the_phoenix.9.desc: "[target_army.GetName] — отсюда приходят тревожные вести. [target_character.GetName] не справляется с командованием: боевой дух упал, число дезертиров стремительно растёт. Подобные неудачи бросают тень на [ROOT.GetCountry.Custom('rank_ru_ACC')|l] и вдохновляют наших врагов."
 fate_of_the_phoenix.9.a: "Жалкие трусы — вот они кто!"
 target_army_suffers_losses_tt: "[target_army.GetName] — [Concept('strength', 'численность')|e] уменьшается на [ROOT.GetVariable('visual_strength_loss_variable').GetValue|+2]%"
 fate_of_the_phoenix.10.title: "Помощь верного военачальника"
 fate_of_the_phoenix.10.desc: "[target_character.GetName], командир отряда «[target_unit.GetName]», много лет служит нам верой и правдой. Безграничная преданность и многократные победы превратили [Select_CString(target_character.IsFemale, 'её', 'его' )] в образец для подражания, символ собранности и решимости во времена неопределённости."
 fate_of_the_phoenix.10.a: "[target_character.GetShortNameWithNoTooltip] приведёт нас к победе!"
 major_victories_enhance_stats_tt: "Если [target_character.GetName] будет побеждать в крупных [Concept('battles', 'битвах')|e], [Select_CString(target_character.IsFemale, 'её', 'его' )] [Concept('abilities', 'навыки')|e] могут улучшиться"
 fate_of_the_phoenix.11.title: "[target_character.GetNameWithNoTooltip] одерживает громкую победу"
 fate_of_the_phoenix.11.desc: "Отряд «[target_unit.GetName]» одерживает блестящую победу над армией #ONCLICK:COUNTRY,[target_losing_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_losing_country.Custom('CL_tt')],X [target_losing_country.Custom('CL_GEN')|L]#!#! в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Весть об этом триумфе распространяется стремительно, укрепляя веру в то, что феникс возродится из пепла. [target_character.GetShortName] уже превращается в легенду."
 fate_of_the_phoenix.11.a: "Пусть командует нашей армией вечно!"
 fate_of_the_phoenix.12.title: "[target_character.GetNameWithNoTooltip] терпит поражение"
 fate_of_the_phoenix.12.desc: "Мы навсегда запомним этот роковой день! Сегодня в [target_location.Custom('LR_PREP')|l] [target_location.GetName] [target_character.GetName] [Select_CString(target_character.IsFemale, 'потерпела', 'потерпел' )] поражение от армии, которой [Select_CString(target_character_2.IsFemale, 'командовала', 'командовал' )] [target_character_2.GetName]. Нам нанесён серьёзный удар, и соперники уже начали делить шкуру неубитого медведя. Неужели удача покинула нас? Будем надеяться на лучшее и верить в победу."
 fate_of_the_phoenix.12.a: "Какой позор!"
 fate_of_the_phoenix.13.title: "[target_character.GetNameWithNoTooltip] и реформы власти"
 fate_of_the_phoenix.13.desc: "Для [ROOT.GetCountry.Custom('rank_ru_GEN')|l] настал решающий момент. Серьёзный упадок, внутренние распри, вторжение иностранных войск и медленная деградация власти принесли нашему народу много страданий. Новые инициативы совета помогут восстановить порядок, улучшат работу наших институтов и укрепят государственный строй.\n\nЭти реформы потребуют большой воли и жертв, так как сила привычки очень велика. Многие будут противиться изменениям. Но если проявить настойчивость, эти меры могут остановить медленное угасание [ROOT.GetCountry.Custom('rank_ru_GEN')|l] и заложить основы для дальнейшего развития и роста. У нас два пути: обновление или дальнейший раскол, за которым последует забвение."
 fate_of_the_phoenix.13.a: "Если возрождение требует жертв, так тому и быть."
 enable_unlock_spread_philhellenism_and_encourage_latin_militarism_tt: "Мы получим доступ к [Concept('cabinet_actions', 'действиям совета')|e] «[ShowCabinetActionName('spread_philhellenism')]» и «[ShowCabinetActionName('encourage_latin_militarism')]», пока [Concept('disaster', 'бедствие')|e] #TOOLTIP:DISASTER_TYPE,D008_fate_of_the_phoenix,X #L «Судьба феникса»#!#! не закончится.\n\nЕсли мы справимся с бедствием, эти действия #Y навсегда#! останутся в нашем распоряжении"
 fate_of_the_phoenix.14.title: "Возрождение феникса"
 fate_of_the_phoenix.14.desc: "Мы вернули утраченные территории, период упадка подходит к концу. [ROOT.GetCountry.GetName] восстанавлива[ROOT.GetCountry.Custom('end_etyut')] силы, [ROOT.GetCountry.GetFlavorRank|l] снова мо[ROOT.GetCountry.Custom('endrank_gegu')] дать отпор врагам. Дорога в #TOOLTIP:LOCATION,rome,X #L Рим#!#! теперь открыта для нас."
 fate_of_the_phoenix.14.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] из мрамора — это просто немыслимо!"
 maintain_cabinet_actions_tt: "Мы успешно справились с [Concept('disaster', 'бедствием')|e], поэтому сохранили доступ к [Concept('cabinet_actions', 'действиям совета')|e] «[ShowCabinetActionName('spread_philhellenism')]» и «[ShowCabinetActionName('encourage_latin_militarism')]»"
 because_we_made_military_reforms_tt: "Одна или несколько военных реформ посредством [Concept('action', 'действия')|e] #TOOLTIP:GENERIC_ACTION,D008_reform_imperial_armies,X #L «Реформа [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ой армии»#!#! привели к следующему:"
 num_of_reforms_desc: "Количество реформ"
 unlock_allelengyon_bureaucracy_kephalai_bureaucracy_tt: "Открывает [Concept('bureaucracies', 'бюрократические механизмы')|e] «$allelengyon_bureaucracy$» и «$kephalai_bureaucracy$»"
 unlock_kritai_katholikoi_reformed_extra_effect: "Модификатор #TOOLTIP:MODIFIER_TYPE,country_cabinet_efficiency,X #P #V «Эффективность в нашем совете»#!#!#! [Concept('government_reform', 'государственного принципа')|e] #TOOLTIP:GOVERNMENT_REFORM,kritai_katholikoi_reformed,X #L «Обновлённые крити кафолики»#!#! станет постоянным"
 fate_of_the_phoenix.15.title: "Эпоха упадка"
 fate_of_the_phoenix.15.desc: "Несмотря на все старания, мы не сумели вернуть утраченные земли. Усиление соседних бейликов и врагов у наших #TOOLTIP:REGION,balkan_region,X #L балканских#!#! границ не позволяет обратить процесс вспять. Упадок продолжается, и будущее [ROOT.GetCountry.Custom('rank_ru_GEN')|l] окутано туманом."
 fate_of_the_phoenix.15.a: "Наше будущее неясно и туманно."
 no_longer_access_to_the_cabinet_actions_tt: "Мы потеряем доступ к [Concept('cabinet_actions', 'действиям совета')|e] «[ShowCabinetActionName('spread_philhellenism')]» и «[ShowCabinetActionName('encourage_latin_militarism')]»"
 fate_of_the_phoenix.16.title: "[actor.GetNameWithNoTooltip] прос[actor.Custom('end_ityat')] о пожертвовании"
 fate_of_the_phoenix.16.desc: "Нам стало известно, что [actor.GetName] сотряса[actor.Custom('end_etyut')]ся от беспорядков. В отчаянии местные власти отправили к нам гонцов с просьбой о финансовой помощи. Взамен нам позволят распространять [actor.Custom('endrank_predlog_vvo')] [actor.Custom('rank_ru_PREP')|l] свои традиции и обычаи. Этот неожиданный жест говорит о том, что [actor.GetCapital.GetRank.GetNameWithNoTooltip|l] [actor.GetCapital.GetName] находится в самом плачевном положении."
 fate_of_the_phoenix.16.a: "Тут не помешал бы символический жест поддержки."
 fate_of_the_phoenix.16.b: "Мы должны помочь сдержать натиск орд в Анатолии."
 fate_of_the_phoenix.16.c: "Никаких денег еретикам!"
 no_money_for_byz_tt: "[actor.GetName] не получ[actor.Custom('end_itat')] от нас помощи"
 fate_of_the_phoenix.17.title: "[actor.GetNameWithNoTooltip] предлага[actor.Custom('etyut')] торговые привилегии"
 fate_of_the_phoenix.17.desc: "Мы уже ведём дела в #TOOLTIP:LOCATION,constantinople,X #L Константинополе#!#!, но теперь [actor.GetName] предлага[actor.Custom('etyut')] предлагает нам поставить стройматериалы для кораблей в обмен на льготные условия и привилегии на рынках столицы."
 fate_of_the_phoenix.17.a: "[target_country.GetGovernment.GetRulerOrRegent.GetShortNameWithNoTooltip] не упустит выгоды. По рукам!"
 fate_of_the_phoenix.17.b: "Нас это не интересует."
 selected_republic_may_donate_ships_to_our_cause_tt: "Выбранная купеческая республика может предоставить свои [Concept('ships', 'корабли')|e] (галеры) и [Concept('sailors', 'моряков')|e] в обмен на [Concept('merchant_power', 'торговое преимущество')|e] в #TOOLTIP:LOCATION,constantinople,X #L Константинополе#!#!"
 byzantines_left_fend_themselves_tt: "[actor.GetLongName] оста[actor.Custom('endlong_youtyut')]ся наедине с проблемами"
 latin_merchant_privileges_key: "Привилегии итальянских купцов"
 fate_of_the_phoenix.18.title: "[target_character.GetNameWithNoTooltip] прибывает в [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
 fate_of_the_phoenix.18.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'которую', 'которого' )] порекомендовали нам наши верные союзники из #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, наконец-то [Select_CString(target_character.IsFemale, 'прибыла', 'прибыл' )] к нам из #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] и [Select_CString(target_character.IsFemale, 'готова', 'готов' )] поделиться с нами знаниями и навыками, которыми славятся #L [target_culture.GetName|l]ие#! земли. Этот человек c богатым опытом служения при иностранных дворах и завидной дисциплиной, воспитанной жизнью на полуострове, предлагает нам свои услуги в качестве дружеского жеста.\n\n[Select_CString(target_character.IsFemale, 'Её', 'Его' )] приезд — это прекрасная возможность не только получить практическую выгоду, но и укрепить связи с нашими #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянскими#!#! братьями, чья эрудиция и смекалка продолжают влиять на дела принцев и императоров."
 fate_of_the_phoenix.18.a: "Мы будем с большим интересом наблюдать за [Select_CString(target_character.IsFemale, 'её', 'его' )] карьерой!"
 fate_of_the_phoenix.19.title: "[actor.GetNameWithNoTooltip] требу[actor.Custom('end_etyut')] дани"
 fate_of_the_phoenix.19.desc: "Когда [actor.GetName] покоря[actor.Custom('end_etyut')] #TOOLTIP:LOCATION,bursa,X #L Бурсу#!#!, [target_character_1.GetName] значительно укрепляет своё влияние. Из [target_location_1.Custom('LR_GEN')|l] [target_location_1.GetName] приехали посланники, которые вовсе не намерены с нами любезничать. Они с ходу требуют с нас дань за наши, как они выражаются, «языческие традиции» и всем своим видом демонстрируют, что в случае отказа их держава готова применить силу. Теперь мы обязаны ответить золотом, кровью или неповиновением, и последствия нашего выбора затронут далеко не только нас."
 fate_of_the_phoenix.19.a: "Выбора нет, придётся раскошелиться."
 fate_of_the_phoenix.19.b: "Лучше отправим крепких мужчин."
 fate_of_the_phoenix.19.c: "Ничего они не получат!"
 fate_of_the_phoenix.20.title: "Реформа [actor.GetAdjectiveWithNoTooltip|l]ой армии"
 fate_of_the_phoenix.20.desc_a: "Многолетнее безразличие властей и финансовые трудности привели к тому, что армия [ROOT.GetCountry.Custom('rank_ru_GEN')|l] оказалась в запущенном состоянии. Она совершенно не готова к предстоящим испытаниям, но [target_character.GetName], похоже, знает, как всё исправить. [Select_CString(target_character.IsFemale, 'Она', 'Он' )] собирается ввести новые правила, которые восстановят дисциплину, реорганизуют командование и возродят традиции, и тогда армия [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetName] снова будет наводить страх на противников. Эти реформы обойдутся дорого, но без них наша военная мощь продолжит постепенно слабеть."
 fate_of_the_phoenix.20.desc_b: "Долгое время моря были щитом и главной артерией [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Увы, сейчас наш флот переживает не лучшие времена: его опыт, устройство, квалификация моряков оставляют желать лучшего, но, похоже, [target_character.GetName] знает, как спасти ситуацию. [Select_CString(target_character.IsFemale, 'Она', 'Он' )] собирается сформировать новое руководство, улучшить подготовку кадров и модернизировать военно-морские институты. В случае успеха #L [ROOT.GetCountry.GetAdjective|l]ий#! флот снова станет грозной силой, а наши берега и торговые пути окажутся под надёжной охраной."
 fate_of_the_phoenix.20.a: "Мы должны остановить упадок."
 fate_of_the_phoenix.20.b: "Мы займёмся этим чуть позже."
 reformation_of_the_school_of_admirals_better_stats_tt: "Пока активен этот [Concept('modifier', 'модификатор')|e], благодаря [Concept('action', 'действию')|e] #TOOLTIP:GENERIC_ACTION,train_admiral,X #L «Обучение адмирала»#!#! [Concept('characters', 'персонажи')|e] будут получать улучшенные [Concept('abilities', 'навыки')|e]"
 better_stats_because_reformation_of_the_school_of_admirals_modifier_tt: "Этот [Concept('admiral', 'адмирал')|e] получил #G +10#! к [Concept('abilities', 'навыкам')|e] из-за действующего [Concept('modifier', 'модификатора')|e] #TOOLTIP:STATIC_MODIFIER,reformation_of_the_school_of_admirals_modifier,X #V #L «Реформа школы адмиралов»#!#!#!"
 because_we_reformed_our_navy_in_DHE_desc: "Реформа [Concept('navy', 'флота')|e] во время [Concept('event', 'события')|e] «$flavor_byz.15.title$» привела к следующему:"
 target_character_total_abilities: "[target_character.GetName] и [Select_CString(target_character.IsFemale, 'её', 'его' )] [Concept('abilities', 'навыки')|e]"
 # Actions for Fate of the Phoenix Disaster
 selected_country_will_send_us_engineer_character_tt: "Выбранная [Concept('country', 'держава')|e] отправит к нам одного из своих лучших [Concept('characters', 'персонажей')|e]"
 target_country_forced_to_give_tribute_tt: "Выбранную [Concept('country', 'державу')|e] можно убедить дать нам [Concept('gold', 'дукаты')|e] или [Concept('manpower', 'рекрутов')|e]"
 at_war_with_heathens_or_heretics_tt: "Сейчас мы ведём [Concept('war', 'войну')|e] против [Concept('country', 'державы')|e], которая НЕ исповедует #L [actor.GetReligion.GetAdjective|l]ую#! веру"
 selected_country_may_join_every_ongoing_war_against_heathen_and_heretics_tt: "Выбранная [Concept('country', 'держава')|e] может присоединиться к нашим текущим [Concept('wars', 'войнам')|e], чьи [Concept('war_leaders', 'лидеры')|e] — [Concept('heathens', 'язычники')|e] или [Concept('heretics', 'еретики')|e]"
 pops_in_capital_province_convert_catholic_tt: "Некоторые [Concept('pops', 'группы населения')|e] нашей провинции [actor.GetCapital.GetProvince.GetName], исповедующие #L [actor.GetReligion.GetAdjective|l]ую#! веру, примут #TOOLTIP:RELIGION,$catholic_tt$,X #L католичество#!#!"
 fate_of_phoenix_actions_price: "Стоимость действий в ситуации «$D008_fate_of_the_phoenix$»"
 request_papal_donation: "Обращение к Риму с просьбой о помощи"
 request_papal_donation_desc: "[actor.GetFlavorRank] наход[actor.Custom('endrank_ityat')]ся в сложной ситуации: местная казна практически истощена. Мы можем отправить посланников в $PAP$ с просьбой оказать поддержку братьям-#TOOLTIP:RELIGIONGROUP,christian,X #L христианам#!#!. Конечно, подобные шаги не обходятся без последствий, однако вырученное золото поможет нам выиграть время в час нужды."
 grant_latin_merchants_privileges: "Расширение привилегий итальянских купцов"
 grant_latin_merchants_privileges_desc: "Расширение особых прав #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянских#!#! купеческих республик даст нам шанс развить торговые отношения и получить поддержку с моря. Подобные уступки могут превратить #L #TOOLTIP:LOCATIONRANK,[actor.GetCapital.Custom('LR_tt')],X [actor.GetCapital.Custom('LR_ACC')|l]#!#! [actor.GetCapital.GetName] в процветающий центр торговли, но при этом он наверняка подвергнется серьёзному иностранному влиянию."
 accept_catholic_delegation: "Приём католической делегации"
 accept_catholic_delegation_desc: "[actor.GetCapital.GetRank.GetNameWithNoTooltip] [actor.GetCapital.GetName] может открыть ворота делегатам #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католической церкви#!#!, которые стремятся к единству и готовы идти на уступки. Многие наши советники считают, что приём этих посланников может улучшить наши отношения с #TOOLTIP:RELIGION,$catholic_tt$,X #L католическим#!#! миром, однако подобные жесты нередко вызывают напряжённость в обществе."
 attract_italian_engineer: "Привлечение итальянских инженеров"
 attract_italian_engineer_desc: "Мы приглашаем именитых #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянских#!#! инженеров улучшить наши укрепления и военные конструкции. Эти специалисты решат наши старые проблемы современными методами, однако влияние западной науки и культуры на нашу державу, вероятно, возрастёт."
 demand_beylik_tribute: "Требование дани от бейликов"
 demand_beylik_tribute_desc: "После восстановления контроля над #TOOLTIP:REGION,anatolia_region,X #L Анатолией#!#! мы можем заставить ближайшие бейлики склониться перед [actor.GetAdjective|l]ой мощью. Обложив соперников данью, мы ослабим их и восстановим авторитет [actor.Custom('rank_ru_GEN')|l]."
 summon_patriarchate_member: "Призыв участника патриархата"
 summon_patriarchate_member_desc: "Мы лидеры #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,autocephalous_patriarchate,X #L автокефального патриархата#!#!, поэтому можем призвать на помощь в борьбе с нечестивцами другие #TOOLTIP:RELIGION,$orthodox_tt$,X #L православные#!#! народы. Они связаны с нами верой, а не обязательствами, и их поддержка ещё сильнее сплотит нас перед лицом общего врага."
 reform_imperial_armies: "Реформа [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ой армии"
 reform_imperial_armies_desc: "Войска [actor.Custom('rank_ru_GEN')|l] долгие годы страдали от недостатка внимания властей и бессмысленных нововведений. Комплексная реформа восстановит армейскую дисциплину и порядок, но для её проведения потребуются серебро, стабильность и готовность общества к переменам."
 patronize_orthodox_monastery: "Покровительство православному монастырю"
 patronize_orthodox_monastery_desc: "Взяв под своё покровительство местный #TOOLTIP:BUILDING_TYPE,orthodox_monastery,X #L православный монастырь#!#!, мы продемонстрируем своё благочестие и укрепим веру наших жителей. Этот щедрый поступок улучшит качество жизни людей и напомнит им, что [actor.GetLongName] по-прежнему сто[actor.Custom('endlong_ityat')] на страже истинной религии."
 reform_armed_forces_tt: "Мы сможем реформировать [Concept('army', 'армию')|e] или [Concept('navy', 'флот')|e] и обратить вспять последствия многовековой деградации"
 has_not_completed_all_six_reforms_tt: "Мы не провели все #Y 6#! доступных реформ"
 patronize_orth_monastery_tt: "Выбранный [Concept('location', 'район')|e] получит [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,patronize_orthodox_monastery_modifier,X #V #L «Покровительство православному монастырю»#!#!#!, а [Concept('pop_satisfaction', 'довольство')|e] многих наших #TOOLTIP:RELIGION,$orthodox_tt$,X #L православных#!#! [Concept('pops', 'групп населения')|e] повысится на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
