 pronoia: "Пронии"
 pronoia_desc: "Прония — один из важнейших институтов #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#!. Прониар — это получатель пронии, ему временно поручали собирать налоги. Позже эта должность стала наследственной, и сегодня эти люди не только помогают нам собирать подати с народа, но и несут военную службу, донося волю императора в самые далёкие уголки державы."
