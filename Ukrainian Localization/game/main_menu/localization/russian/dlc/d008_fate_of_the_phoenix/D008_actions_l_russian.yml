l_russian:
 loan_icon: "Одалживание иконы"
 loan_icon_desc: "Одолжите одну #TOOLTIP:WORK_OF_ART_TYPE,icon,X #L икону#!#! другой [Concept('country', 'державе')|e] на #Y 10#! лет за плату, которая зависит от их [Concept('income', 'дохода')|e] и [Concept('art_quality', 'качества')|e] [Concept('work_of_art', 'творения')|e]. [Concept('opinion', 'Мнение')|e] и [Concept('trust', 'доверие')|e] двух стран по отношению друг к другу также повысятся."
 loan_icon_tt_no_target: "Мы направим предложение о передаче в аренду одного из наших [Concept('works_of_art', 'творений')|e] целевой [Concept('country', 'державе')|e] в обмен на [Concept('gold', 'дукаты')|e]"
 loan_icon_tt: "Они получат наше предложение предоставить им заём — [SCOPE.sWorkOfArt('target').GetName] — в обмен на [SCOPE.GetValue('icon_price_value')|2][gold_i]"
 loan_icon_bad_economy_tt: "Похоже, они находятся в бедственном экономическом положении, поэтому #R могут не согласиться на наше предложение#!, если их [Concept('opinion', 'мнение')|e] о нас будет недостаточно высоким"
 loan_icon_choose_icon: "Выберите #TOOLTIP:WORK_OF_ART_TYPE,icon,X #L икону#!#! для передачи в аренду"
 not_already_receiving_icon_tt: "У них не должно быть ранее одолженной #TOOLTIP:WORK_OF_ART_TYPE,icon,X #L иконы#!#!"
 mend_schism: "Преодоление раскола"
 mend_schism_desc: "Вот уже много веков #TOOLTIP:RELIGIONGROUP,christian,X #L христианство#!#! пребывает в расколе. Теперь же, когда все кафедры пентархии находятся под нашим контролем, мы должны воспользоваться своим влиянием, чтобы исцелить эти раны и примирить церкви."
 restore_rome_primacy: "Возвращение столицы в Рим"
 restore_rome_primacy_desc: "[ShowLocationName('rome')] был первой столицей империи, и даже после её раздела на восточную и западную части он сохранил своё значение вплоть до падения Западной Римской империи. Теперь, когда Вечный город снова в наших руках, мы можем вернуть ему статус первоначальной столицы."
 patriarch_not_in_rome_tt: "Наш #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,autocephalous_patriarchate,X #L автокефальный патриархат#!#! не должен при этом уже располагаться в #TOOLTIP:LOCATION,rome,X #L Риме#!#!"
 reestablish_hellenism: "Возрождение эллинизма"
 reestablish_hellenism_desc: "Древняя вера нашего народа привлекает правителей своими традициями и мистикой. Мы можем вернуть ей былое величие и вновь сделать её главной религией."
 add_omen: "Добавление знамения"
 add_omen_god: "Выберите божество, покровительствующее в выборе знамения"
 select_omen: "Призыв знамения"
 select_omen_desc: "Наш правитель призовёт знамение."
 select_omen_tt: "Мы получим временное преимущество для нашей [Concept('country', 'державы')|e]. Его величина зависит от соответствующего [Concept('ability', 'навыка')|e] нашего [Concept('ruler', 'правителя')|e]."
 select_omen_god_is_active_tt: "[target.Custom('end_predlog_vvo')|U] #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_PREP')|L]#!#! уже есть другое [Concept('omen', 'знамение')|e]."
 select_omen_god: "Выбор знамения"
 select_omen_god_desc: "Наш правитель выберет божество, покровительствующее нам в выборе [Concept('omen', 'знамения')|e]."
 select_omen_god_tt: "Выберите божество, покровительствующее нам в выборе [Concept('omen', 'знамения')|e]."
 host_olympiad: "Проведение Олимпийских игр"
 host_olympiad_desc: "Наш правитель организует состязания в честь богов на месте #TOOLTIP:RELIGION,$hellenism_religion_tt$,X #L эллинистской#!#! [Concept('holy_site', 'святыни')|e]."
 host_olympiad_location_tt: "До окончания Олимпийских игр выбранный [Concept('location', 'район')|e] получает модификатор #TOOLTIP:STATIC_MODIFIER,host_olympiad_location_modifier,X #V #L «Проведение Олимпийских игр»#!#!#!."
 host_olympiad_effect_tt_location: "Эффекты усиливаются в зависимости от [Concept('holy_site_importance_short', 'значимости')|e] #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#! ([target.GetImportance])."
 host_olympiad_effect_tt_no_location: "Эффекты усиливаются в зависимости от [Concept('holy_site_importance_short', 'значимости')|e] выбранной [Concept('holy_site', 'святыни')|e]."
 sponsor_troop_feast: "Организация пиршества для воинов"
 sponsor_troop_feast_desc: "Устроив пиршество для наших войск, мы укрепим физическую форму и боевой дух воинов, чтобы они с большей охотой служили своей стране."
 roman_festivals: "Организация римского празднества"
 roman_festivals_desc: "Каждый месяц проходит множество праздников в честь разных богов, однако на этот раз мы воспользуемся ресурсами государства, чтобы организовать поистине великолепное торжество."
 explanation_roman_festivals_tt: "#TOOLTIP:RELIGION,$hellenism_religion_tt$,X #L Эллинистические#!#! народы отмечают множество праздников, посвящённых соответствующим богам. В каждом месяце свои празднества, а мы получаем различные эффекты в зависимости от того, каким образом они проводятся."
 compitalia_tt: "Компиталии — праздник в честь #italic компитальных ларов#!, или божеств перекрёстков."
 lupercalia_tt: "Луперкалии — праздник здоровья, плодородия и очищения города."
 quinquatria_tt: "Квинкватрии — праздник в честь богини #TOOLTIP:GOD,athena_god,X #L Минервы#!#!."
 fordicidia_tt: "Фордицидии — праздник плодородия, земледелия и скотоводства. Во время этих празднеств в присутствии весталок в жертву богине земли #italic Теллуре#! приносили стельную корову."
 mercuralia_tt: "Меркуралии — праздник в честь посланника богов #TOOLTIP:GOD,hermes_god,X #L Меркурия#!#!."
 vestalia_tt: "Весталии — праздник в честь богини семейного очага #italic Весты#!."
 neptunalia_tt: "Нептуналии — праздник в честь бога #TOOLTIP:GOD,poseidon_god,X #L Нептуна#!#!."
 vinalia_rustica_tt: "Виналии — праздник сбора винограда, овощеводства и плодородия, проводимый в честь бога #TOOLTIP:GOD,zeus_god,X #L Юпитера#!#! и богини #TOOLTIP:GOD,aphrodite_god,X #L Венеры#!#!."
 ludi_romani_tt: "Римские игры представляют собой ряд игр и развлекательных мероприятий в честь бога #TOOLTIP:GOD,zeus_god,X #L Юпитера#!#!."
 equus_october_tt: "Эквус Октобер — праздник конных состязаний и жертвоприношения в честь бога #TOOLTIP:GOD,ares_god,X #L Марса#!#!, совпадающий с окончанием сезона сельскохозяйственных работ и военных походов."
 ludi_plebeii_tt: "Плебейские игры включают в себя многочисленные театральные представления и спортивные состязания, посвящённые простому народу."
 saturnalia_tt: "Сатурналии — праздник в честь бога времени #italic Сатурна#!."
 greek_festivals: "Организация древнегреческого празднества"
 greek_festivals_desc: "В каждом уголке наших владений отмечают свой праздник, посвящённый одному или нескольким богам. Мы воспользуемся ресурсами государства, чтобы оказать поддержку всем регионам и устроить самое грандиозное торжество в истории."
 greek_festivals_tt: "Мы владеем районом как минимум в одной из следующих провинций: [ShowProvinceDefinitionName('laconia_province')], [ShowProvinceDefinitionName('achaea_province')], [ShowProvinceDefinitionName('arcadia_province')], [ShowProvinceDefinitionName('attica_province')], [ShowProvinceDefinitionName('smyrna_province')], [ShowProvinceDefinitionName('central_macedonia_province')], [ShowProvinceDefinitionName('lower_macedonia_province')], [ShowProvinceDefinitionName('aetolia_province')], [ShowProvinceDefinitionName('rodos_province')], [ShowProvinceDefinitionName('messenia_province')], [ShowProvinceDefinitionName('aydin_province')]."
 gymnopaedia_tt: "Гимнопедии — праздник, который отмечают в #italic Спарте#! и посвящают богу #italic Аполлону#!."
 gymnopaedia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,gymnopaedia_modifier,X #V #L «Гимнопедии»#!#!#!."
 laphria_tt: "Лафрии — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,achaea_province,X #L Ахее#!#!, который посвящён богине #italic Артемиде#!."
 laphria_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,laphria_modifier,X #V #L «Лафрии»#!#!#!."
 lykaia_tt: "Ликеи — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,arcadia_province,X #L Аркадии#!#!, который, с одной стороны, является обрядом посвящения для эфебов, а с другой — способом защиты от оборотней."
 lykaia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,lykaia_modifier,X #V #L «Ликеи»#!#!#!."
 panathenaic_games_tt: "Панафинейские игры проводятся в #TOOLTIP:PROVINCE_DEFINITION,attica_province,X #L Аттике и Беотии#!#!, они посвящены богине #TOOLTIP:GOD,athena_god,X #L Афине#!#!."
 panathenaic_games_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,panathenaic_games_modifier,X #V #L «Панафинеи»#!#!#!."
 apaturia_tt: "Апатурии — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,smyrna_province,X #L Смирне#!#!, который посвящён богу #TOOLTIP:GOD,zeus_god,X #L Зевсу#!#! и богине #TOOLTIP:GOD,athena_god,X #L Афине#!#!."
 apaturia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,apaturia_modifier,X #V #L «Апатурии»#!#!#!."
 hetairideia_tt: "Гетеридии — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,central_macedonia_province,X #L Центральной Македонии#!#!, который посвящён богу #TOOLTIP:GOD,zeus_god,X #L Зевсу#!#!."
 hetairideia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,hetairideia_modifier,X #V #L «Гетеридии»#!#!#!."
 apellai_tt: "Апеллы — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,aetolia_province,X #L Этолии и Акарнании#!#!, который посвящён богу #italic Аполлону#!."
 apellai_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,apellai_modifier,X #V #L «Апеллы»#!#!#!."
 halieia_tt: "Гелии — праздник, который отмечают на #TOOLTIP:PROVINCE_DEFINITION,rodos_province,X #L Родосе#!#! и посвящают богу #italic Гелиосу#!."
 halieia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,halieia_modifier,X #V #L «Гелии»#!#!#!."
 heraclean_games_tt: "Гераклейские игры проводятся в #TOOLTIP:PROVINCE_DEFINITION,lower_macedonia_province,X #L Нижней Македонии#!#!, они посвящены герою и богу #italic Гераклу#!."
 heraclean_games_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,heraclean_games_modifier,X #V #L «Гераклеи»#!#!#!."
 carneia_tt: "Карнеи — праздник, отмечаемый в #TOOLTIP:PROVINCE_DEFINITION,messenia_province,X #L Мессении#!#!, который посвящён богу #italic Аполлону#!."
 carneia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,carneia_modifier,X #V #L «Карнеи»#!#!#!."
 panionia_tt: "Панионии — праздник, который отмечают в #TOOLTIP:PROVINCE_DEFINITION,aydin_province,X #L Айдыне#!#! и посвящают богу #TOOLTIP:GOD,poseidon_god,X #L Посейдону#!#!."
 panionia_tt_mod: "Мы получим модификатор #TOOLTIP:STATIC_MODIFIER,panionia_modifier,X #V #L «Панионии»#!#!#!."
 hire_advisor_eunuch_chance_tt: "С 50%-й вероятностью можно нанять #TOOLTIP:TRAIT,castrated,X #L оскоплённого#!#! [Concept('character', 'персонажа')|e] с [Concept('abilities', 'навыками')|e] в среднем выше, чем у других."
 grant_a_triumph: "Организация триумфального шествия"
 grant_a_triumph_desc: "Успехи следует отмечать. Способный военачальник должен быть представлен народу как победитель в ходе захватывающего триумфального шествия."
 grant_a_triumph_tt: "За последние 5 лет мы одержали победу в войне."
