l_russian:
 # Hellenism
 #Religious Aspects
 civic_religion_aspect: "Религия и народ"
 civic_religion_aspect_desc: "Почитание богов — первейший гражданский долг, ведь от нашего рвения зависит благополучие государства. Чтобы наш полис процветал, мы должны соблюдать религиозные обряды и церемонии."
 hero_cult_aspect: "Культы героев"
 hero_cult_aspect_desc: "Великие герои сыграли важную роль в истории нашего народа. Их поступки сформировали нас как личностей. Они рождались смертными детьми богов, людьми с невероятными способностями, которым нередко была уготована трагическая судьба. Они защищали наших предков и вели их за собой. Только благодаря им мы достигли такого величия. Наш долг — поклоняться им и перенимать их мудрость."
 dionysian_mysteries_aspect: "Дионисийские мистерии"
 dionysian_mysteries_aspect_desc: "Ритуалы, музыка и танцы раскрепощают посвящённых в мистерии Диониса и стирают социальные границы между ними. Рост виноградной лозы из посаженной в землю косточки и последующее превращение её в вино, которое затем выпивают в ходе празднования, символизируют смерть и возрождение Диониса."
 eleusinian_mysteries_aspect: "Элевсинские мистерии"
 eleusinian_mysteries_aspect_desc: "Элевсинские мистерии — обряд инициации по мотивам мифа о Деметре и её дочери Персефоне, которая была похищена богом подземного мира Аидом. Позже по приказу Зевса Аид вернул Персефону в верхний мир, но треть года она должна была проводить с ним. Для посвящённых это история о вечности жизни, цикличности бытия и бессмертии души."
 samothracian_mysteries_aspect: "Самофракийские мистерии"
 samothracian_mysteries_aspect_desc: "В период расцвета эллинизма на острове Самофракия существовал таинственный культ, куда принимали всех желающих, независимо от социального положения. Говорят, его последователями были многие легендарные герои, в том числе Геракл, Ясон и Орфей. Мы можем по кусочкам восстановить эти мистерии и вернуть культу былое величие."
 olympiad_aspect: "Олимпийские игры"
 olympiad_aspect_desc: "Олимпийские игры — это праздник во славу богов, а также демонстрация силы и единства нашей державы. Участники игр выполняют гражданский долг и получают возможность заслужить признание."
 mithraic_mysteries_aspect: "Мистерии Митры"
 mithraic_mysteries_aspect_desc: "Этот культ, последователи которого называют себя синдексиями, был чрезвычайно популярен в Риме и Западной Римской империи во времена расцвета римской государственности. Обряды, собрания и пиры этого культа проходили в тайных подземных храмах, но мы можем заново открыть и возродить эти традиции ради блага нашего народа."
 imperial_cult_aspect: "Культ императора"
 imperial_cult_aspect_desc: "Древние властители Рима почитались народом и сенатом как боги, так почему не перенести это отношение на нашего правителя и его семью? Их величие, могущество и влияние ясно указывают на то, что они не только исполняют высшую волю, но и сами являются божествами."
 dii_familiares_aspect: "Dii Familiares"
 dii_familiares_aspect_desc: "Домашние и семейные божества играют большую роль в жизни наших соотечественников. Эти божества оберегают владения человека, куда обычно входит дом и хозяйство, но могут охватывать дороги, соседства и даже целые города, влияя на всё, что там происходит."
 mos_maiorum_aspect: "Mos Maiorum"
 mos_maiorum_aspect_desc: "«Обычай предков» — это сборник неписаных норм, традиций и установок, регулирующих жизнь римлян начиная с Античности и заканчивая периодом расцвета империи. В Mos Maiorum описывается, как римлянин должен вести себя дома и в обществе."
 monism_aspect: "Монизм"
 monism_aspect_desc: "Философы нашего возрождения утверждают, что все во вселенной восходит к Единому — трансцендентному Началу, из которого происходят все боги и всё сущее. Традиционный пантеон становится аллегорией: все буги суть аспекты Единого Начала. Знамения теряют свою особую силу, но вера в Единое становится руководящим принципом любого управленческого решения."
 #Omens
 #Zeus
 the_thunderer_omen: "Громовержец"
 the_thunderer_omen_desc: "Небеса гневаются. Удары грома сотрясают воздух и землю. Молнии сверкают не переставая. Мы сокрушим каждого, кто выступит против нас."
 supreme_of_gods_omen: "Верховный бог"
 supreme_of_gods_omen_desc: "Яркое солнце в вышине — верный признак того, что нам благоволит могущественнейший из богов. Ничто не угрожает нашему величию!"
 monarch_of_the_sky_omen: "Повелитель небес"
 monarch_of_the_sky_omen_desc: "Птицы, глашатаи #TOOLTIP:GOD,zeus_god,X #L Зевса#!#!, взмывают ввысь по воле своего хозяина."
 omnipotence_of_heaven_omen: "Величие небес"
 omnipotence_of_heaven_omen_desc: "#TOOLTIP:GOD,zeus_god,X #L Зевс#!#! взирает на нас с высоты, и мы ощущаем его могущество. Для него нет ничего невозможного."
 the_liberator_omen: "Освободитель"
 the_liberator_omen_desc: "#TOOLTIP:GOD,zeus_god,X #L Зевс#!#! помог нашим предкам противостоять экспансии персов. Он освободит нас от оков."
 the_bountiful_one_omen: "Щедрый даритель"
 the_bountiful_one_omen_desc: "Всякий, кто обратит свой взор на #TOOLTIP:GOD,zeus_god,X #L Зевса#!#!, разделит его могущество и получит в дар изобилие."
 the_holy_omen: "Величайший из всех"
 the_holy_omen_desc: "Что может быть прекраснее, чем наслаждаться присутствием величайшего божества и пользоваться его благосклонностью?"
 king_of_all_omen: "Властитель мира"
 king_of_all_omen_desc: "#TOOLTIP:GOD,zeus_god,X #L Зевс#!#! повелевает богами, как правитель повелевает народом."
 immortal_omen: "Бессмертие"
 immortal_omen_desc: "Боги бессмертны, а наши войска непобедимы под покровительством #TOOLTIP:GOD,zeus_god,X #L Зевса#!#!."
 splendor_omen: "Лазурное небо"
 splendor_omen_desc: "Ясное небо — символ неоспоримой власти #TOOLTIP:GOD,zeus_god,X #L Зевса#!#!. Его покровительство сулит нам мировую славу."
 #Aphrodite
 mother_of_love_omen: "Мать любви"
 mother_of_love_omen_desc: "#TOOLTIP:GOD,aphrodite_god,X #L Афродита#!#! согревает наш народ живительными лучами любви."
 the_foam_born_omen: "Рождённая из пены"
 the_foam_born_omen_desc: "Морская пена, из которой родилась #TOOLTIP:GOD,aphrodite_god,X #L Афродита#!#!, омывает родные берега. Богиня любви проведёт наши корабли сквозь любые бури."
 the_seductress_omen: "Соблазнительница"
 the_seductress_omen_desc: "Любовь и обольщение — вотчина #TOOLTIP:GOD,aphrodite_god,X #L Афродиты#!#!. Её благословение поможет нам набрать сторонников."
 giver_of_joy_omen: "Вестница радости"
 giver_of_joy_omen_desc: "Что может быть чудеснее, чем наслаждаться присутствием богини красоты и пользоваться её благосклонностью?"
 nurturer_of_children_omen: "Мать всех детей"
 nurturer_of_children_omen_desc: "Что может быть священнее любви к детям? В её материнском сердце нашлось место для каждого из нас."
 the_beautiful_omen: "Образец красоты"
 the_beautiful_omen_desc: "У #TOOLTIP:GOD,aphrodite_god,X #L Афродиты#!#! много почитателей. Они появятся и у нас, если мы заслужим расположение прекраснейшей из богинь."
 the_secretive_omen: "Хранительница тайн"
 the_secretive_omen_desc: "Не всякую любовь стоит показывать. Когда это необходимо, богиня действует осторожно и незаметно."
 the_harmonizer_omen: "Блюстительница гармонии"
 the_harmonizer_omen_desc: "#TOOLTIP:GOD,aphrodite_god,X #L Афродита#!#! любит всех одинаково, и нам стоит так же относиться к своему народу."
 the_lover_of_laughter_omen: "Покровительница веселья"
 the_lover_of_laughter_omen_desc: "Нам стоит почаще улыбаться, ведь на устах #TOOLTIP:GOD,aphrodite_god,X #L Афродиты#!#! всегда играет улыбка."
 the_desired_omen: "Желанная"
 the_desired_omen_desc: "Красота #TOOLTIP:GOD,aphrodite_god,X #L Афродиты#!#! никого не оставляет равнодушным. Завоевав её благосклонность, мы получим в дар её обаяние."
 #Poseidon
 tempest_omen: "Буря"
 tempest_omen_desc: "Море темнеет от гнева, ревёт и бушует. Свирепый ветер поднимает огромные волны. В такую погоду сердца даже самых храбрых моряков трепещут от страха."
 lord_of_the_sea_omen: "Повелитель морей"
 lord_of_the_sea_omen_desc: "Тот, кто владеет морем, владеет миром."
 protector_of_horses_omen: "Защитник лошадей"
 protector_of_horses_omen_desc: "Если мы заслужим благосклонность покровителя всех лошадей, наши скакуны будут сильными и здоровыми."
 wielder_of_the_trident_omen: "Карающий трезубец"
 wielder_of_the_trident_omen_desc: "Что может быть смертоноснее легендарного оружия морского бога, обладающего сразу тремя остриями?"
 earth_shaker_omen: "Повелитель землетрясений"
 earth_shaker_omen_desc: "Пусть наша земля ходит ходуном под ногами врагов, как если бы по ней ударил бог, желая создать родник."
 leader_of_the_nymphs_omen: "Предводитель нимф"
 leader_of_the_nymphs_omen_desc: "Если #TOOLTIP:GOD,poseidon_god,X #L Посейдон#!#! будет к нам благосклонен, его нимфы благословят все наши источники воды."
 the_watcher_omen: "Всевидящий"
 the_watcher_omen_desc: "Взор #TOOLTIP:GOD,poseidon_god,X #L Посейдона#!#! простирается над всеми морями, реками и озёрами. Ничто не ускользнёт от его внимания."
 the_graceful_omen: "Величавый"
 the_graceful_omen_desc: "В волнующемся море скрывается великая красота, и его созерцание наполняет сердце отрадой."
 master_of_the_waves_omen: "Владыка волн"
 master_of_the_waves_omen_desc: "Нельзя отправляться в море без позволения #TOOLTIP:GOD,poseidon_god,X #L Посейдона#!#!."
 dark_blue_haired_omen: "Синевласый бог"
 dark_blue_haired_omen_desc: "Синие волны — это волосы морского бога. Если он благосклонен к нам, наши суда будут легко и стремительно скользить по воде."
 #Hermes
 messenger_omen: "Вестник богов"
 messenger_omen_desc: "Бог в крылатых сандалиях быстро доносит вести и никогда не теряется в пути."
 golden_wand_omen: "Обладатель золотого жезла"
 golden_wand_omen_desc: "Кадуцей разделил двух змей, но то, что разделяет, одновременно служит и для объединения."
 god_of_travelers_omen: "Покровитель путников"
 god_of_travelers_omen_desc: "Все путешественники и странствующие купцы обращаются к #TOOLTIP:GOD,hermes_god,X #L Гермесу#!#! за защитой и поддержкой."
 protector_of_merchants_omen: "Защитник купцов"
 protector_of_merchants_omen_desc: "Под пристальным наблюдением #TOOLTIP:GOD,hermes_god,X #L Гермеса#!#! купцы благополучно проходят по нашим землям и получают хорошую выручку."
 wing_footed_omen: "Быстроногий"
 wing_footed_omen_desc: "Войска, удостоившиеся благосклонности #TOOLTIP:GOD,hermes_god,X #L Гермеса#!#!, передвигаются так же стремительно, как и он сам."
 trickster_omen: "Плут"
 trickster_omen_desc: "Переменчивые ветра напоминают нам, что даже #TOOLTIP:GOD,hermes_god,X #L Гермес#!#! обладает капризной натурой, а непостоянство и обман сопровождают всю нашу жизнь."
 patron_of_thieves_omen: "Повелитель воров"
 patron_of_thieves_omen_desc: "Скорость можно использовать и во благо, и во вред. Так или иначе, она даёт завидное преимущество."
 president_of_games_omen: "Покровитель спорта"
 president_of_games_omen_desc: "Благосклонность #TOOLTIP:GOD,hermes_god,X #L Гермеса#!#! распространяется на спортивные игры, которые дарят нам здоровье и веселье."
 guardian_of_the_gates_omen: "Страж врат"
 guardian_of_the_gates_omen_desc: "Все дороги рано или поздно приводят путникам к вратам, которые либо открыты для них, либо заперты."
 giver_of_wealth_omen: "Дарующий богатство"
 giver_of_wealth_omen_desc: "При содействии #TOOLTIP:GOD,hermes_god,X #L Гермеса#!#! торговля подразумевает не только движение товаров, но и движение богатств."
 #Ares
 throng_of_battle_omen: "Побоище"
 throng_of_battle_omen_desc: "Война — вотчина жестокого #TOOLTIP:GOD,ares_god,X #L Ареса#!#!. Только он решает, каким будет её исход."
 insatiable_at_war_omen: "Ненасытная жажда"
 insatiable_at_war_omen_desc: "#TOOLTIP:GOD,ares_god,X #L Арес#!#! наслаждается битвой. Особенно нравятся ему кровавые и долгие бои."
 slayer_of_men_omen: "Убийца воинов"
 slayer_of_men_omen_desc: "Ярость #TOOLTIP:GOD,ares_god,X #L Ареса#!#! передастся нашим воинам, а с ней — и его могущество."
 plague_of_mankind_omen: "Истребитель рода людского"
 plague_of_mankind_omen_desc: "Встреча с богом войны всегда заканчивается смертью."
 warrior_omen: "Воитель"
 warrior_omen_desc: "Бог войны жаждет славной битвы, а не только лишь кровавой бойни."
 audacious_omen: "Покровитель смелых"
 audacious_omen_desc: "Стремительная атака и уничтожение врагов — верный способ снискать благосклонность #TOOLTIP:GOD,ares_god,X #L Ареса#!#!."
 blood_soaked_omen: "Реки крови"
 blood_soaked_omen_desc: "Бог страдает от жажды, и мы напоим его кровью своих врагов." #Blood for the Blood God!
 malignant_omen: "Злокозненный"
 malignant_omen_desc: "Убийство врагов — наша главная цель, а для её достижения все средства хороши."
 indestructible_omen: "Несокрушимый"
 indestructible_omen_desc: "У #TOOLTIP:GOD,ares_god,X #L Ареса#!#! есть не только копьё, которым он разит врагов, но и щит, прикрывающий его от ударов."
 fickle_lord_of_war_omen: "Изменчивый нрав"
 fickle_lord_of_war_omen_desc: "Ход битвы может измениться в любой момент, поэтому покровительство #TOOLTIP:GOD,ares_god,X #L Ареса#!#! — залог нашей победы."
 #Athena
 unseen_hand_omen: "Невидимая длань"
 unseen_hand_omen_desc: "У каждой неудачи есть причина. Небеса подталкивают командиров к неверным решениям. Они заманивают дозорных в засады, перерезают линии снабжения и водят за нос капитанов."
 unwavering_omen: "Непоколебимая"
 unwavering_omen_desc: "#TOOLTIP:GOD,athena_god,X #L Афина#!#! стоит прямо и непоколебимо, и мы должны следовать её примеру."
 she_who_fights_in_front_omen: "Всегда впереди"
 she_who_fights_in_front_omen_desc: "Стремительная атака — лучший способ разгромить вражескую армию."
 the_industrious_omen: "Упорство"
 the_industrious_omen_desc: "Усердие и преданность своему делу — залог успеха в любых начинаниях."
 the_judge_omen: "Судья"
 the_judge_omen_desc: "Ни один преступник не ускользнёт от карающей длани #TOOLTIP:GOD,athena_god,X #L Афины#!#!, и ни один невинный не пострадает понапрасну."
 the_chieftain_of_war_omen: "Предводительница"
 the_chieftain_of_war_omen_desc: "Воины без командира подобны муравьям, лишившимся муравейника. Они обречены на гибель."
 teacher_of_the_waves_omen: "Укротительница волн"
 teacher_of_the_waves_omen_desc: "#TOOLTIP:GOD,poseidon_god,X #L Посейдон#!#! повелевает волнами, а #TOOLTIP:GOD,athena_god,X #L Афина#!#! покровительствует кораблестроению и мореплаванию."
 protector_of_the_anchorage_omen: "Защитница кораблей"
 protector_of_the_anchorage_omen_desc: "#TOOLTIP:GOD,athena_god,X #L Афина#!#! — искусный корабел. Судам под её защитой ничто не угрожает."
 the_bright_eyed_omen: "Проницательная"
 the_bright_eyed_omen_desc: "Наш символ — мудрая сова. Он связывает нас с #TOOLTIP:GOD,athena_god,X #L Афиной#!#! и дарует её благосклонность."
 the_armed_one_omen: "Рождённая для битвы"
 the_armed_one_omen_desc: "#TOOLTIP:GOD,athena_god,X #L Афина#!#! родилась в полном боевом облачении. Эта история учит нас тому, что мы всегда должны быть готовы к битве."
 hellenism_religion.1.title: "[target_god.GetNameWithNoTooltip] улыбается нам"
 hellenism_religion.1.desc: "В эти спокойные дни боги продолжают присматривать за нами. Доказательством этому служат странные совпадения, внезапные повороты судьбы и изменение порядка, которым живёт [ROOT.GetCountry.GetGovernment.GetCourtTitle|l].\n\nЖрецы заявляют, что наши любимые [ROOT.GetCountry.GetFlavorRank|l] и [target_character.GetNameWithNoTooltip] благословлены, [target_god.GetName] улыбается им. И действительно, нам, похоже, сопутствует удача, и принесённые жертвы наконец дали свои плоды!"
 hellenism_religion.1.a: "Мы принимаем это благословение."
 fertile_ruler_and_family_tt: "[target_character.GetName] и [Concept('consort', 'консорт')|e] станут [Concept('fertility', 'фертильнее')|e]"
 hellenism_religion.2.title: "[target_character.GetNameWithNoTooltip], ястреб войны"
 hellenism_religion.2.desc: "[target_character.GetName] обладает блестящим тактическим мастерством и продолжает славные военные традиции, заложенные основателями [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Немногие могут сравниться с Одиссеем, Ясоном или Аяксом в смелости, упорстве и находчивости.\n\n[target_character.GetShortNameWithNoTooltip] — гордый символ нашей приверженности #TOOLTIP:RELIGION,$hellenism_religion_tt$,X #L эллинистским#!#! корням, настоящий ястреб, кружащий над полем боя!"
 hellenism_religion.2.a: "[Select_CString(target_character.IsFemale, 'Она', 'Он' )] так и останется в тени?"
 hellenism_religion.2.b: "Пусть [Select_CString(target_character.IsFemale, 'она', 'он' )] преподаёт в академии!"
 hellenism_religion.3.title: "[target_location.GetNameWithNoTooltip] и меценат-философ"
 hellenism_religion.3.desc: "Откуда взялась человеческая душа? Что нас ждёт после смерти? Жилось бы нам лучше, если бы мы назвались беспёрыми двуногими? Этими животрепещущими вопросами заняты великие умы интеллектуалов и философов из #TOOLTIP:BUILDING_TYPE,university,X #L университета#!#! [target_location.Custom('LR_GEN')|l] [target_location.GetName].\n\nНедавно у факультета появился богатый местный покровитель, который выступает за увеличение финансирования, полагая, что это поспособствует распространению смелых и современных идей."
 hellenism_religion.3.a: "Главное, чтобы они не взрастили очередного Диогена…"
 hellenism_religion.3.b: "А нельзя ли обеспечить финансирование умозрительно?"
 hellenism_religion.4.title: "[target_character_2.GetNameWithNoTooltip] и [Select_CString(target_character_2.IsFemale, 'её', 'его' )] талисман"
 hellenism_religion.4.desc: "Дни и ночи напролёт наши недруги плетут интриги и мечтают о нашей гибели. Однако пока [target_character_2.GetName] [Select_CString(target_character_2.IsFemale, 'жива', 'жив' )], нашей власти ничто не угрожает. Будущее [ROOT.GetCountry.Custom('rank_ru_GEN')|l] теперь в нежных детских руках.\n\n[target_character_2.GetShortNameWithNoTooltip] — [Select_CString(target_character_2.IsFemale, 'любимица', 'любимец' )] богов Олимпа. Мы уверены, что [Select_CString(target_character_2.IsFemale, 'её', 'его' )] ждут великие дела и свершения. [Select_CString(target_character_3.IsFemale, 'Одна', 'Один' )] из наших придворных, мистик [target_character_3.GetName], [Select_CString(target_character_3.IsFemale, 'предложила', 'предложил' )] отдать свой талисман. Говорят, в этом предмете содержится крупица божественной сущности, отгоняющая зло. С ним [target_character_2.GetShortNameWithNoTooltip] будет в безопасности до своего совершеннолетия."
 hellenism_religion.4.a: "[target_character_3.GetShortNameWithNoTooltip] — [Select_CString(target_character_3.IsFemale, 'наша спасительница', 'наш спаситель' )]. [target_character_2.GetShortNameWithNoTooltip] передаёт [Select_CString(target_character_3.IsFemale, 'ей', 'ему' )] благодарность."
 hellenism_religion.4.b: "Что за глупые суеверия?"
 talisman_tt: "[target_character_2.GetName] получает талисман, который #italic может#! защитить [Select_CString(target_character_2.IsFemale, 'её', 'его' )] во время [Concept('events', 'событий')|e], связанных с болезнями, и предотвратить несчастные случаи на охоте"
 target_character_3_is_declined_tt: "Мы вежливо отклонили предложение, которое [Select_CString(target_character_3.IsFemale, 'сделала', 'сделал' )] [target_character_3.GetName]"
 hellenism_religion.5.title: "[target_god.GetNameWithNoTooltip] благословляет провинцию [target_province.GetNameWithNoTooltip]"
 hellenism_religion.5.desc: "Провинция [target_province.GetName] радует отличными новостями. [target_god.GetName] благословляет местных жителей, те в порыве благочестия выходят на улицу и устраивают масштабные празднества, чтобы отметить такую невероятную удачу.\n\nСегодня даже бремя правления кажется не столь тяжким. Толпа шумит, восхваляя богов, и насыщается преданностью, как боги Олимпа — амброзией."
 hellenism_religion.5.a: "Пусть народ празднует!"
 every_pop_in_target_province_gains_10_satisfaction_tt: "Наши [Concept('pops', 'группы населения')|e] в провинции [target_province.GetName] получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 hellenism_religion.6.title: "Эпоха благоденствия"
 hellenism_religion.6.desc: "Воистину [target_character.GetName] [Select_CString(target_character.IsFemale, 'была ниспослана', 'ниспослан' )] нам богами. Они направляют [Select_CString(target_character.IsFemale, 'её', 'его' )] силы в верное русло. Разумная политика, рост достатка, стабильность и мир — вот лишь некоторые из великих даров олимпийцев. Наше государство переживает золотой век, а [target_character.GetShortNameWithNoTooltip] уже [Select_CString(target_character.IsFemale, 'стала героиней', 'стал героем' )] наравне с Гераклом и Периклом, [Select_CString(target_character.IsFemale, 'которую', 'которого' )] воспоют в легендах и гимнах."
 hellenism_religion.6.a: "Займёмся административными вопросами!"
 hellenism_religion.6.b: "Дипломатия — наша первостепенная задача."
 hellenism_religion.6.c: "Сокрушим врагов!"
 hellenism_religion.7.title: "Воплощение Ареса"
 hellenism_religion.7.desc: "[target_character.GetName] с детства [Select_CString(target_character.IsFemale, 'проявляла', 'проявлял' )] способности к военному делу. Со временем огонь, сера, кровь и предсмертные крики стали [Select_CString(target_character.IsFemale, 'её', 'его' )] неотъемлемыми спутниками. [Select_CString(target_character.IsFemale, 'Её', 'его' )] беспощадность к врагам вызывает благоговейный ужас.\n\nВоины видят в [Select_CString(target_character.IsFemale, 'ней', 'нём' )] воплощение жестокого бога #TOOLTIP:GOD,ares_god,X #L Ареса#!#!. [Select_CString(target_character.IsFemale, 'Её', 'Его' )] судьба и долг — сеять хаос во имя [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 hellenism_religion.7.a: "[Select_CString(target_character.IsFemale, 'Она', 'Он' )] знает, что победа любит отчаянных."
 hellenism_religion.7.b: "Эта сила губительна. Мы не можем так рисковать…"
 hellenism_religion.8.title: "Греческие исторические эпосы"
 hellenism_religion.8.desc: "Эпосы Гомера — сохранившиеся шедевры греческой литературной традиции, которые когда-то заложили фундамент для развития нашей культуры и письменности.\n\n[target_character.GetName] предлагает выделить финансирование на публикацию трудов и исследований, посвящённых «Илиаде» и «Одиссее». [Select_CString(target_character.IsFemale, 'Она', 'Он' )] считает, что это прекрасная возможность воздать должное нашему славному прошлому, а заодно внимательнее изучить легендарные сочинения."
 hellenism_religion.8.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
 hellenism_religion.8.b: "$jurchen_confederation_events.3.b$"
 hellenism_religion.9.title: "Провинция [target_province.GetNameWithNoTooltip] процветает"
 hellenism_religion.9.desc: "Совершенно очевидно, что провинция [target_province.GetName] пользуется благосклонностью богов, иначе как ещё объяснить повсеместный рост благосостояния? Недавно старатели и местные застройщики выступили с предложением вывезти богатства из деревень и сосредоточить их в городских центрах провинции. Этот шаг может ускорить процесс урбанизации, но лишит местных жителей дополнительных благ."
 hellenism_religion.9.a: "Все блага народу!"
 hellenism_religion.9.b: "Сосредоточим богатства в центрах."
 pops_in_aforementioned_provinces_weak_satisfaction_tt: "[Concept('pops', 'Население')|e] вышеупомянутых [Concept('provinces', 'провинций')|e] получит [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 hellenism_religion.10.title: "[ROOT.GetCountry.Custom('GetDemeterMomName')] благоволит нам"
 hellenism_religion.10.desc: "Амбары на рынке #L #TOOLTIP:LOCATIONRANK,[target_market.GetCenterLocation.Custom('LR_tt')],X [target_market.GetCenterLocation.Custom('LR_GEN')|l]#!#! [target_market.GetShortName] уже давно полны зерном. Это верный признак того, что богиня урожая [ROOT.GetCountry.Custom('GetDemeterMomName')] благоволит нам, и наше новообретённое благосостояние — последнее тому подтверждение. Местные жители просят распределить лишнее продовольствие, а жрецы — возложить его на алтарь богов в знак нашей глубочайшей признательности."
 hellenism_religion.10.a: "Отдадим излишки народу."
 hellenism_religion.10.b: "Пожертвуем излишки богам."
 Demeter_latin_name: "Церера"
 Demeter_base_name: "Деметра"
 hellenism_religion.11.title: "[target_god.GetNameWithNoTooltip] в гневе"
 hellenism_religion.11.desc: "Кажется, [target_god.GetName] злится на нас! Ночные знамения и густые нависшие тени — явные предвестники беды. Чувство обречённости охватило наш народ. Мы не знаем, в чём провинились, чем прогневали столь могущественное божество. Нам остаётся лишь склонить головы в почтении и смиренно ждать, когда буря утихнет."
 hellenism_religion.11.a: "Такова жизнь."
 hellenism_religion.11.b: "Немедленно воздадим все должные почести."
 hellenism_religion.12.title: "Рождение чудовища"
 hellenism_religion.12.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] пребывает в унынии. После долгих бессонных ночей и горячих молитв в детских покоях [ROOT.GetCountry.GetGovernment.GetAdjective|l]ой резиденции [Select_CString(target_character_2.IsFemale, 'появилась', 'появился' )] на свет [target_character_2.GetShortName] — [Select_CString(target_character_2.IsFemale, 'вестница', 'вестник' )] несчастий. [target_character_1.GetName] вне себя от горя.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посчитали [Select_CString(target_character_2.IsFemale, 'её', 'его' )] рождение плохим знамением, слуги — проклятием, а враги — признаком слабости. [target_character_2.GetShortName] пока ещё дышит. Кто знает, может, [Select_CString(target_character_2.IsFemale, 'ей', 'ему' )] суждено изменить мир?"
 hellenism_religion.12.a: "Дурачьё! [target_character_2.GetShortNameWithNoTooltip] — всего лишь ребёнок!"
 hellenism_religion.12.b: "Не хватало ещё разгневать богов."
 hellenism_religion.13.title: "Взяточничество среди жрецов"
 hellenism_religion.13.desc: "Боги — вечные создания, но их слуги — всего лишь люди. До нас дошли слухи, что [target_character.GetName] злоупотребляет своим положением и забирает себе храмовые подношения.\n\nЕсли мы вмешаемся в ситуацию, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] сочтут это оскорблением и поднимут шум. Если же мы оставим её без внимания, то дадим отмашку к действию всем интриганам [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Благочестие превратится в ширму, прикрывающую воровство и подлость, а оскорбление богов станет привычным делом."
 hellenism_religion.13.a: "[Select_CString(target_character.IsFemale, 'Её', 'Его' )] жадность нас погубит!"
 hellenism_religion.13.b: "Сделаем вид, что ничего не заметили."
 hellenism_religion.14.title: "[target_province.GetNameWithNoTooltip] и [target_god.GetNameWithNoTooltip] не в ладах"
 hellenism_religion.14.desc: "Из провинции [target_province.GetName] приходят тревожные вести. [target_god.GetNameWithNoTooltip] там больше не в почёте, подношения совершаются через раз, и верующие жалуются, что ворота храмов всё чаще оказываются заперты.\n\nНе так важно, что служит тому причиной: лень, бедность или тихий протест. Когда божество игнорируется, любое несчастье воспринимают как выражение высшего гнева. Жрецы требуют вмешаться, и провинция [target_province.GetNameWithNoTooltip] ожидает нашего вердикта."
 hellenism_religion.14.a: "Заставим людей поклоняться силой."
 hellenism_religion.14.b: "Мы не станем никого принуждать."
 pops_in_target_province_mild_pop_satisfaction_malus_tt: "Наши [Concept('pops', 'группы населения')|e] в провинции [target_province.GetName] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 riots_destroy_temple_desc: "Гнев толпы обрушивается на храм. К рассвету от него остаётся лишь груда обугленных камней."
 riots_cause_minimal_damage_desc: "На улицах шумно и неспокойно, но худшего удалось избежать."
 hellenism_religion.15.title: "Противоречивые предсказания"
 hellenism_religion.15.desc: "О #TOOLTIP:GOD,zeus_god,X #L Зевсова#!#! борода! Кажется, эти предсказатели готовы глотки друг другу перегрызть! Мы услышали два толкования одних и тех же знаков и два совершенно разных совета, произнесённых с одинаковой уверенностью.\n\nТеперь [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] стоит перед выбором. Что подумают люди, наблюдая за тем, как ожесточённо спорят наши [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]? Неужели мы сбились с пути? Что в действительности означают эти знаки, уже не столь важно. Последствия нас всё равно настигнут…"
 hellenism_religion.15.a: "Как же надоело это стариковское брюзжание!"
 hellenism_religion.16.title: "Гнев богов"
 hellenism_religion.16.desc: "В наших залах царит разлад. Жрецы настаивают: это высшие силы наблюдают за нами. Они говорят, что наши земли разобщены, что наша власть над дальними территориями ослабела, и шёпотом добавляют: «Это наказание от богов за гордыню».\n\nЕсли божества захотят напомнить нам о нашей хрупкости, они пошлют нам не вежливое письмо, а ураганы, пожары и катастрофы, да ещё и выберут самые уязвимые места."
 hellenism_religion.16.a: "Надеемся, буря быстро утихнет."
 hellenism_religion.17.title: "Ящик Пандоры"
 hellenism_religion.17.desc: "Провинция [target_province.GetName] оживляется: местные передают друг другу некую диковинку, обмениваясь многозначительными улыбками и заключая дурацкие пари. Кто-то считает эту вещицу безобидной, а кто-то настаивает, что она таит зловещую силу, которая искушает растяп и наказывает гордецов.\n\nНе так важно, действительно ли безделица проклята, или же это просто слух, пущенный с целью посеять панику: если люди верят, что случится несчастье, оно обязательно случится. Некоторые жрецы даже уверяют, будто видели на крышке изображение странного лица, обезображенного муками и залитого кроваво-красной краской."
 hellenism_religion.17.a: "Нам нет дела до суеверий."
 hellenism_religion.17.b: "Мы заплатим, чтобы ящик заколотили намертво."
 locations_and_pops_in_target_province_suffer_minimal_damage_tt: "[target_province.GetName] и местные жители избегут наказания свыше"
 hellenism_religion.18.title: "Темнейшая ночь"
 hellenism_religion.18.desc: "Тьма всё никак не рассеется. В каждом уголке [ROOT.GetCountry.Custom('rank_ru_GEN')|l] люди говорят о разрухе, голоде, поражении, о том, что боги Олимпа отвернулись от нас. Может, оно и так, а может, мы где-то ошиблись. Ясно одно: настали смутные времена.\n\n[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] не может игнорировать эти настроения. Когда основы ходят ходуном, даже самая устойчивая власть начинает шататься."
 hellenism_religion.18.a: "Мы впали в беспросветное отчаяние."
 hellenism_religion.18.b: "Принесём жертву. Может, боги нас услышат."
 hellenism_religion.19.title: "Страх и голод"
 hellenism_religion.19.desc: "Страх распространяется быстрее любой болезни. Стоит случиться неурожаю или другой беде — и каждый начинает изображать из себя пророка, предвещающего несчастья. Наши попытки успокоить местных жителей не увенчались успехом: им всюду мерещатся недобрые знаки. Паника накрыла целые общины.\n\nЖрецы говорят, что со страхом нужно бороться, иначе он перерастёт в неповиновение. Жители провинции [target_province.GetName] нуждаются в ободрении. Они смотрят на нас с надеждой."
 hellenism_religion.19.a: "Как-нибудь справятся сами."
 hellenism_religion.19.b: "Сделаем подношение, чтобы смягчить удар."
 sacrifice_to_the_gods: "Задабривание богов"
 hellenism_religion.20.title: "Боги не одобряют войну"
 hellenism_religion.20.desc: "Не все боги радуются кровопролитию. [target_war.GetName] всё ещё в разгаре, и жрецы предупреждают, что мы лишились поддержки небес. #TOOLTIP:GOD,ares_god,X #L Арес#!#! торжествует, однако другие не разделяют его энтузиазма. Боги могут не поддержать даже самую праведную кампанию.\n\nВоины рвутся в бой, но народ устал и воспринимает все трудности как проявления недовольства богов. В такие времена даже победа не приносит ни радости, ни удовлетворения…"
 hellenism_religion.20.a: "Мы справимся и без поддержки богов."
 hellenism_religion.21.title: "[target_location.GetNameWithNoTooltip] и недостаток рвения"
 hellenism_religion.21.desc: "В период спокойствия и процветания смертные часто забывают о своих обязанностях перед богами. В [target_location.Custom('LR_PREP')|l] [target_location.GetName] обряды превратились в рутину. Процессии уменьшились, подношения оскудели, а старые гимны больше не трогают сердца людей.\n\nЖрецы требуют, чтобы мы устроили наказание, которое послужит всем примером. Если горожане не хотят по-хорошему, тогда мы возьмём в руки кнут. В любом случае наша вера не должна иссякнуть."
 hellenism_religion.21.a: "Пора преподать урок простому народу."
 hellenism_religion.21.b: "Похоже, знать слишком расслабилась."
 hellenism_religion.21.c: "Пустим ситуацию на самотёк."
 pops_go_unpunished_gods_angry_tt: "Боги требуют наказания и разгневаются, если его не будет"
 hellenism_religion.22.title: "Орнитомантия в столице"
 hellenism_religion.22.desc: "[target_character.GetName] — самый обсуждаемый человек в столице. Говорят, [Select_CString(target_character.IsFemale, 'эта женщина', 'этот мужчина' )] в экстравагантном одеянии обладает исключительным даром предвидения. [Select_CString(target_character.IsFemale, 'Сама она', 'Сам он' )] с непоколебимой уверенностью заявляет, что может — к добру или к худу — читать волю богов по птицам и их костям.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle] разделяется: некоторые посмеиваются, а некоторые тайком несут [Select_CString(target_character.IsFemale, 'предсказательнице', 'предсказателю' )] деньги, чтобы поглазеть на дивное зрелище, и пытаются извлечь пользу даже из самых нелепых трактовок."
 hellenism_religion.22.a: "Лети отсюда, [target_character.GetShortNameWithNoTooltip]!"
 hellenism_religion.22.b: "Какой позор!"
 birds_divinations_come_true_desc: "Все знаки сходятся, и пророчество сбывается. [ROOT.GetCountry.GetGovernment.GetCourtTitle] убеждается в действенности метода."
 the_divinations_lie_desc: "Всё это чушь, а птицы — просто птицы. [ROOT.GetCountry.GetGovernment.GetCourtTitle] испытывает раздражение."
 hellenism_religion.23.title: "Расширение религиозных земель"
 hellenism_religion.23.desc: "Жрецы выступают с амбициозным проектом, который навсегда изменит священные земли. Согласно ему, храм в [target_location.Custom('LR_PREP')|l] [target_location.GetName] и другие знаковые святилища достраиваются и расширяются, а [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] обзаводится величественными украшениями, чтобы верующие явственно ощущали величие богов.\n\nК несчастью, камни не движутся сами по себе, а ремесленники не насыщаются одними молитвами. Решим ли мы сами вложить средства в этот план или заставим народ раскошелиться, цена будет высокой, и боги, несомненно, заметят, кто и как её уплатил."
 hellenism_religion.23.a: "Мы сами профинансируем расширение."
 hellenism_religion.23.b: "Переложим эту обязанность на народ."
 hellenism_religion.24.title: "Дезидемония"
 hellenism_religion.24.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] выказывает нарастающее беспокойство, и громче других — [target_character.GetName]. Незначительные знаки внезапно становятся важными, сны превращаются в грозные намёки, и даже самые безобидные совпадения трактуются как послания свыше.\n\nПодобные страхи полезны, когда побуждают вести себя осторожнее, но они могут полностью парализовать волю человека. Если [target_character.GetShortNameWithNoTooltip] не избавится от навязчивых мыслей, скоро нами будет править не разум, а суеверия."
 hellenism_religion.24.a: "Осторожность лучше безрассудства."
 hellenism_religion.24.b: "Мы должны отринуть суеверия."
 hellenism_religion.25.title: "Жертвы войны"
 hellenism_religion.25.desc: "Война отбирает у нас всё. Порой даже самые закалённые воины обращают взоры к небесам, прося у богов защиты. [target_war.GetName] — изматывающее испытание. Жрецы считают, что одной силы оружия для победы недостаточно. Чтобы выдержать все невзгоды, мы должны умилостивить богов.\n\nОни предлагают принести дорогую жертву, которая порадует богов и укрепит дух нашего народа. Если мы откажемся, то сохраним средства, но обидим высшие силы и лишим своих подданных надежды на благополучный исход."
 hellenism_religion.25.a: "На такое никаких денег не жалко!"
 hellenism_religion.25.b: "Мы победим и без этих представлений."
 we_will_win_the_ongoing_conflict_without_gods_tt: "Суеверия не помогут нам одержать победу, обойдёмся без них."
 hellenism_religion.26.title: "[target_god.GetNameWithNoTooltip], услышь нашу мольбу"
 hellenism_religion.26.desc: "Мы возжигаем благовония, поём гимны во славу богов и приносим им щедрые подношения. Жрецы утверждают, что жители Олимпа услышали нас и готовы дать ответ.\n\nОднако боги никогда не помогают просто так, и [target_god.GetName] не исключение. Мы должны будем заплатить за благословение, а вмешательство высших сил может самым неожиданным образом изменить [ROOT.GetCountry.Custom('rank_ru_ACC')|l] и всю нашу будущую жизнь."
 hellenism_religion.26.a: "Пусть [target_god.GetNameWithNoTooltip] ответит."
 hellenism_religion.26.b: "Мы обойдёмся без наставлений."
 gods_reward_our_piety_tt: "[target_god.GetName] награждает нас [Concept('gold', 'дукатами')|e] за верность"
 gods_imbue_stability_tt: "[target_god.GetName] проявляет благосклонность, что укрепляет нашу [Concept('stability', 'стабильность')|e]"
 gods_sent_capable_character_tt: "[target_character_2.GetName] — это сосуд, через который [target_god.GetName] изливает свою волю"
 hellenism_religion.27.title: "Философский парадокс"
 hellenism_religion.27.desc: "[Select_CString(target_character.IsFemale, 'Острая на язык мыслительница', 'Острый на язык мыслитель' )] по имени [target_character.GetName] [Select_CString(target_character.IsFemale, 'стала частой гостьей', 'стал частым гостем' )] при #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе, и каждое [Select_CString(target_character.IsFemale, 'её', 'его' )] слово превращает уверенность в сомнение. Придворные собираются послушать [Select_CString(target_character.IsFemale, 'её', 'его' )], отчасти с интересом, а отчасти с тревогой, поскольку даже простейшие истины [Select_CString(target_character.IsFemale, 'она', 'он' )] расплетает на отдельные нити, словно платье.\n\nМудрость может быть благом, а может обернуться неудобством, когда мудрец отказывается подчиняться. Если мы решим [Select_CString(target_character.IsFemale, 'ей', 'ему' )] потакать, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] может обрести мудрость или потеряет покой, ведь идеи имеют обыкновение распространяться далеко за пределы стен, где впервые зародились."
 hellenism_religion.27.a: "Пусть продолжает делиться мудростью."
 hellenism_religion.27.b: "Довольно загадок. Отошлите [Select_CString(target_character.IsFemale, 'её', 'его' )] прочь."
 hellenism_religion.28.title: "[ShowGodNameWithNoTooltip('athena_god')] и её мудрость"
 hellenism_religion.28.desc: "В мирное время амбиции ослабевают, а верх берёт рассудительность. Неудивительно, что жрецы всё чаще говорят об #TOOLTIP:GOD,athena_god,X #L Афине#!#!. Они настаивают, что мудрость — не просто добродетель, а оружие, которое лучше всего ковать, когда [ROOT.GetCountry.GetFlavorRank|l] не участву[ROOT.GetCountry.Custom('endrank_etyut')] в войне.\n\nНам предлагают затратное, но всё же вполне здравое решение. Оно сулит нам порядок там, где сейчас царит расточительство, и ясность там, где господствует сомнение. Отвергнув его, мы сбережём свои средства, однако [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] навсегда запомнят, что мы решили проигнорировать наставления богини."
 hellenism_religion.28.a: "Мы готовы платить за мудрость."
 hellenism_religion.28.b: "Нам не нужна богиня, мы умеем думать своей головой."
 because_athena_omen_active_desc: "Поскольку сейчас действует [Concept('omen', 'знамение')|e] #TOOLTIP:GOD,athena_god,X #L Афины#!#!, его эффект зависит от уровня нашего [Concept('religious_unity', 'религиозного единства')|e]"
 if_athena_omen_was_active_tt: "Если бы сейчас действовало [Concept('omen', 'знамение')|e] #TOOLTIP:GOD,athena_god,X #L Афины#!#!, мы бы получили больше преимуществ от этого [Concept('event_option', 'варианта события')|e]"
 our_denial_angers_the_clergy_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] несомненно разгневаются из-за нашего отказа"
 hellenism_religion.29.title: "[target_god.GetNameWithNoTooltip] требует жертвоприношения"
 hellenism_religion.29.desc: "Жрецы явились к нам в мрачном настроении. Они настаивают, что [ROOT.GetCountry.Custom('rank_ru_DAT')|l] грозит гнев богов. По их словам, знаки недвусмысленны: [target_god.GetName] может проявить к нам благосклонность, прежде чем неудачи превратятся в бедствие, если мы принесём соответствующие жертвы.\n\nЗолото — самое простое и не требующее особых раздумий подношение, однако Олимп редко довольствуется парой монет. Более дорогое жертвоприношение может принести больше благосклонности, но от него пострадает наша земля, а люди никогда не забудут, по чьей воле его организовали."
 hellenism_religion.29.a: "Возложим золото на алтарь."
 hellenism_religion.29.b: "Переложим бремя на землю."
 hellenism_religion.29.c: "Мы отвергаем это требование."
 hellenism_religion.30.title: "Культ наёмника"
 hellenism_religion.30.desc: "Тревожные вести поступают из провинции [target_province.GetName]. Путешественники рассказывают о тайном культе наёмников, которые превозносят силу и привлекают сторонников благодаря тайным обрядам и обещаниям защиты. Из уст в уста напуганные местные жители передают слухи об одном из главных участников культа по имени [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Она оказалась', 'Он оказался' )] в центре внимания после того, как [Select_CString(target_character.IsFemale, 'вышла', 'вышел' )] на политическую сцену [ROOT.GetCountry.Custom('rank_ru_GEN')|l] и [Select_CString(target_character.IsFemale, 'начала', 'начал' )] говорить от их имени как [Select_CString(target_character.IsFemale, 'одна', 'один' )] из бывших мистиев, уверяя, что их рвение можно обратить нам во благо.\n\nОднако слухи в тёмных переулках раскрыли тайные намерения культа — ненасытное стремление к абсолютной власти. Если мы позволим им остаться, то сможем укрепить своё влияние там, где вера слаба, но в то же время рискуем заразить наш #L [ROOT.GetCountry.GetAdjective|l]ий#! двор разлагающими идеями этого культа."
 hellenism_religion.30.a: "Пусть остаются, но мы за ними будем пристально наблюдать."
 hellenism_religion.30.b: "Загоним их обратно в тень."
 cult_operates_shadows_tt: "Культ продолжит действовать в тени…"
 hellenism_religion.empty: ""
 # Neoplatonism Events
 hellenism_religion.32.title: "Источник всего сущего"
 hellenism_religion.32.desc: "[Select_CString(target_character.IsFemale, 'Наша придворная мыслительница написала', 'Наш придворный мыслитель написал' )] исключительно амбициозный труд. В выдержанных, но непреклонных тонах [Select_CString(target_character.IsFemale, 'она', 'он' )] утверждает, что первооснова — источник, из которого происходят все боги и всё сущее, как лучи неистощимого солнца — это не бог среди богов, но сама основа божественного начала. Традиционный пантеон реален, — утверждает [Select_CString(target_character.IsFemale, 'она', 'он' )], — но каждый из богов это один из аспектов, эманация единого святого источника: порядок порождает Ум, Ум — Душу, Душа — материю.\n\nТрактат уже распространяется среди членов двора. Его идеи захватывают умы, и они будут распространяться, хотим мы того или нет."
 hellenism_religion.32.a: "Сделать копии трактата и распространить их."
 hellenism_religion.32.b: "Пусть идея сама докажет свою состоятельность."
 hellenism_religion.33.title: "Христианский вопрос"
 hellenism_religion.33.desc: "К нашему двору прибывает [Select_CString(target_character.IsFemale, 'учёная дама', 'учёный муж' )] в сане епископа — не с мечом и не с претензиями, но с вопросами. [target_character.GetName] [Select_CString(target_character.IsFemale, 'посвятила', 'посвятил' )] свою жизнь изучению платоновской философии, и [Select_CString(target_character.IsFemale, 'она', 'он' )] с тихой убеждённостью утверждает, что христианский Бог и философское понятие первоосновы  есть одно и то же. Святая Троица, считает [Select_CString(target_character.IsFemale, 'она', 'он' )], это просто союз Единого, Бытия и Души, облачённые в другие названия.\n\nЭта точка зрения имеет под собой силу, и [target_character.GetName] аргументирует её со спокойной уверенностью человека, который уже слышал все возможные контраргументы раньше. Согласимся мы с такой трактовкой или отвергнем её, на этот спор обратят внимание и [ROOT.GetCountry.GetCapitalName], и другие города нашей державы."
 hellenism_religion.33.a: "Мы открыты диалогу. Идеи это не зараза."
 hellenism_religion.33.b: "Мы отвергаем такие сравнения. Первооснова это не Бог."
 hellenism_religion.34.title: "Мировая душа"
 hellenism_religion.34.desc: "Придворные философы обсуждают концепцию Мировой души — эманации первоосновы, которая течёт через всё сущее, давая жизнь полям и рекам, телу и духу. По их мнению, два великих божества следует понимать не как властителей моря и неба, но как два аспекта этой Души: силы, которая течёт через всё живое и всегда возвращается к своему началу.\n\nВ провинции [target_province.GetName], регионе с мягким климатом, местные жители ощущают эту теорию на себе. Плодородность этого края философы называют видимым доказательством Божьего промысла: гармонии Мировой души с Единым."
 hellenism_religion.34.a: "Начать работы по благоустройству. Забота о земле есть забота о Душе."
 hellenism_religion.34.b: "Опубликовать изложение теории. Эту доктрину нужно записать."
 hellenism_religion_34_work_of_art: "«О Мировой душе»"
 hellenism_religion_34_work_of_art_desc: "Богословский трактат о платонизме, где утверждается, что Мировая душа есть основа всего сущего, текущая в природе и возвращающаяся к своему источнику — Единому."
 hellenism_religion.35.title: "Восхождение души"
 hellenism_religion.35.desc: "Во дворе распространяется новость о том, что [target_character.GetName], [Select_CString(target_character.IsFemale, 'учёная дама', 'учёный муж' )], чьи труды определили философскую мысль целого поколения, умирает. В последние недели своей жизни [Select_CString(target_character.IsFemale, 'он', 'она' )] без остановки общается с учениками. Это не лекции из книг, но прямое созерцание: тщательно подбирая формулировки, [target_character.GetName] описывает три стадии вознесения. Сначала душа отделяется от материи, потом она восходит к Уму, и наконец — тут [Select_CString(target_character.IsFemale, 'его', 'её' )] голос становится почти беззвучным — наступает воссоединение с Единым, за пределами мыслей и бытия.\n\nНашего правителя пригласили присутствовать при последних моментах. [target_character.GetName] просит лишь об одном: чтобы [Select_CString(target_character.IsFemale, 'его', 'её' )] учение не было потеряно."
 hellenism_religion.35.a: "Записать и распространить [Select_CString(target_character.IsFemale, 'её', 'его' )] последние слова."
 hellenism_religion.35.b: "Основать школу [Select_CString(target_character.IsFemale, 'её', 'его' )] имени."
 target_character_ascends_to_the_one_tt: "[target_character.GetName] спокойно отходит в мир иной, сказав всё, что можно было сказать."
 hellenism_religion.36.title: "Олимпийские реставрационисты"
 hellenism_religion.36.desc: "Не каждый в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] смирился с новым богословием. Некоторые [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] во главе с публичной фигурой по имени [target_character.GetName], всё громче заявляют о своих возражениях. Они просты в своих доводах и апеллируют скорее к эмоциям, чем к разуму: народу нужен Зевс, Афина, Арей и Посейдон. Не как символы, не как эманации. Не как аспекты некоего безликого абсолютного принципа, которому невозможно поклоняться и к которому нельзя воззвать. Народу нужны боги Олимпа с лицами, храмами и жаждой жертвоприношений.\n\nАбстрактное «Единое», — заявляет [target_character.GetName], — не слышит нас. А старые боги слышали. [target_character.GetSheHe|U] открыто требует отказа от монистской доктрины и возврата к старым обрядам."
 hellenism_religion.36.a: "Защитить доктрину. Подавить фракцию."
 hellenism_religion.36.b: "Разрешить официальные диспуты. Пусть выскажутся обе стороны."
 hellenism_religion.36.c: "Отказаться от монистской доктрины. Вернуться к Олимпийскому пантеону."
