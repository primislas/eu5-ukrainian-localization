l_russian:
 d008_orthodox_events.1.title: "Предложение [actor.Custom('CL_GEN')]"
 d008_orthodox_events.1.desc: "К нашему двору прибыла делегация из [actor.Custom('longname_ru_GEN')]. [target.GetName] — одна из величайших ценностей в культурной сокровищнице этой страны. Они готовы на время одолжить нам этот шедевр — разумеется, за некоторое вознаграждение. Если мы примем их предложение, это поспособствует сближению наших держав."
 d008_orthodox_events.1.a: "Конечно, мы согласимся."
 d008_orthodox_events.1.b: "Скажите им, что у нас уже есть."
 d008_orthodox_events.2.title: "Предложение принято"
 d008_orthodox_events.2.desc: "[target_country.GetLongName] согласил[target_country.Custom('endlong_assya')] на наше щедрое предложение и уже прислал[target_country.Custom('endlong_fem')] денежную компенсацию за то, что мы на время одолжим им икону. Без сомнения, этот шаг укрепит отношения между нашими державами. [target.GetName] — будем надеяться, что к оговорённой дате она вернётся домой…"
 d008_orthodox_events.2.a: "Позаботьтесь об этом произведении как следует."
 d008_orthodox_events.3.title: "Предложение отклонено"
 d008_orthodox_events.3.desc: "Безбожные безумцы из #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! отвергли наше предложение! Мы искренне желали на время одолжить им святую #TOOLTIP:WORK_OF_ART_TYPE,icon,X #L икону#!#!, и их отказ говорит лишь о том, что в них не осталось ни благочестия, ни богобоязненности. [target.GetName] — тот, кто отвергает её, является врагом #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ой#! веры!"
 d008_orthodox_events.3.a: "Гореть им в аду!"
 d008_orthodox_events.4.title: "[target_art.GetNameWithNoTooltip]: пора возвращать"
 d008_orthodox_events.4.desc: "[target_art.GetName] — настало время вернуть одолженное законным владельцам. Несомненно, [origin_country.GetName] жд[origin_country.Custom('end_youtut')], что мы сдержим слово. Конечно, мы могли бы уклониться от выполнения обязательств, объявив, что #TOOLTIP:WORK_OF_ART_TYPE,icon,X #L икона#!#! «потерялась»…"
 d008_orthodox_events.4.desc_no_country: "[target_art.GetName] у нас уже довольно давно. Мы получили её лишь на время, однако с тех пор законный владелец лишился суверенитета, и любые прежние соглашения с ним можно считать недействительными…"
 d008_orthodox_events.4.a: "Мы вернём икону, как и положено."
 d008_orthodox_events.4.b: "Теперь икона наша!"
 d008_orthodox_events.5.title: "$d008_orthodox_events.4.title$"
 d008_orthodox_events.5.desc: "[target_art.GetName] — срок, на который мы передали её [target_country.Custom('longname_ru_DAT')], истёк. Они вернули драгоценный шедевр и провели в честь этого пышную церемонию, полностью выполнив условия нашего соглашения."
 d008_orthodox_events.5.a: "Так и должна поступать истинно [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ая держава."
 d008_orthodox_events.6.title: "$d008_orthodox_events.4.title$"
 d008_orthodox_events.6.desc: "[target_art.GetName] — срок, на который мы её передали [target_country.Custom('longname_ru_DAT')], истёк, однако #L [target_country.GetAdjective|l]ие#! мерзавцы выдумали неправдоподобный предлог, чтобы не возвращать её назад."
 d008_orthodox_events.6.a: "Они заплатят за это оскорбление!"
 d008_orthodox_events.7.title: "[target_pentarchy.GetNameWithNoTooltip] в наших руках"
 d008_orthodox_events.7.desc: "Провинция [target_pentarchy.GetName], один из епископских престолов пентархии и важнейший центр #TOOLTIP:RELIGIONGROUP,christian,X #L христианства#!#!, отныне принадлежит нам. Её кафедру займёт [target_patriarch.GetName] — к вящей славе #TOOLTIP:RELIGION,$orthodox_tt$,X #L православной#!#! веры!"
 d008_orthodox_events.7.a: "Пентархия будет нашей!"
 d008_orthodox_events.8.title: "[target_pentarchy.GetNameWithNoTooltip] переходит к врагу"
 d008_orthodox_events.8.desc: "Потеря важнейшего епископского престола в провинции [target_pentarchy.GetName] — огромный удар для нашей власти и престижа. Утрата одного из столпов пентархии станет тяжёлым испытанием для всех #TOOLTIP:RELIGION,$orthodox_tt$,X #L православных#!#! [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Неужто Господь отвернулся от нас?"
 d008_orthodox_events.8.desc_all_pentarchy: "С потерей провинции [target_pentarchy.GetName] мы лишились власти над пентархией. Чтобы укрепить мощь нашей веры, необходимо вернуть под контроль все пять важнейших епископских престолов."
 d008_orthodox_events.8.a: "Мы обязаны вернуть эту землю!"
 downgrade_pentarchy_modifier_tt: "Мы перестанем получать усиленные эффекты от подконтрольных нам престолов пентархии"
 d008_orthodox_events.9.title: "Восстановление пентархии"
 d008_orthodox_events.9.desc: "[target_pentarchy.GetName] в наших руках — а это значит, что отныне мы контролируем все пять престолов пентархии. Важнейшие епископские кафедры, разобщённые на протяжении многих веков, объединились под нашей властью. Даже те провинции, которые долгое время оставались в руках язычников и еретиков, ныне вернулись в лоно истинной веры. Церковь вновь обретёт единство, и вести её будут наши патриархи."
 d008_orthodox_events.9.a: "Святая Церковь воссоединится!"
 upgrade_pentarchy_modifier_tt: "Эффекты от подконтрольных нам престолов пентархии будут усилены"
 pentarchy_unlocked_abilities_tt: "Открывает доступ к [Concept('actions', 'действиям')|e] #TOOLTIP:GENERIC_ACTION,D008_mend_schism,X #L «Преодоление раскола»#!#! и #TOOLTIP:GENERIC_ACTION,D008_restore_rome_primacy,X #L «Возвращение столицы в Рим»#!#!"
 d008_orthodox_events.10.title: "Преодоление раскола"
 d008_orthodox_events.10.desc: "Губительный церковный раскол подтачивал #TOOLTIP:RELIGIONGROUP,christian,X #L христианство#!#! на протяжении столетий — с тех пор, как между патриархами #TOOLTIP:LOCATION,rome,X #L Рима#!#! и #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#! произошёл формальный разрыв. Отпадение Церкви Запада привело к искажению учения Христа — к вящей радости дьявола.\n\nТеперь, когда все пять престолов пентархии оказались в наших руках, патриархи Востока и Запада вновь сходятся во взглядах и принадлежат к лону одной Церкви. Остаётся ещё немало еретиков, отрицающих Истинную Церковь, но рано или поздно все эти заблудшие овцы вернутся к пастырю — это лишь вопрос времени."
 d008_orthodox_events.10.a: "Есть лишь одна христианская Церковь."
 d008_orthodox_events.11.title: "Возвращение столицы в Рим"
 d008_orthodox_events.11.desc: "Рим — колыбель империи, символ культуры и оплот античной цивилизации — долго прозябал во мраке варварства и ереси. Но теперь Вечный город снова в наших руках, и мы клянёмся, что он обретёт прежнее величие и вновь превратится в мировой центр.\n\nСила, исходящая из новой [ROOT.GetCountry.GetGovernment.GetAdjective|l]ой столицы, распространится по свету, и все народы мира вспомнят [ROOT.GetCountry.Custom('endrank_predlog_obo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l], о том, кто мы есть. Славься, [ShowLocationName('rome')]! Славься, [ROOT.GetCountry.GetLongName]!"
 d008_orthodox_events.11.a: "#italic Urbs aeterna restituta!#!"
 patriarchate_will_relocate_to_rome_tt: "Патриарх #TOOLTIP:LOCATION,rome,X #L Рима#!#! станет главой нашего #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,autocephalous_patriarchate,X #L автокефального патриархата#!#!"
 d008_orthodox_events.12.title: "Раскол якобы преодолён"
 d008_orthodox_events.12.desc: "[scope:actor.GetName] заявля[scope:actor.Custom('end_etyut')], что преодолел[scope:actor.Custom('end_fem')] Великий раскол и объединил[scope:actor.Custom('end_fem')] христианский мир вокруг Константинополя."
 d008_orthodox_events.12.a: "Принять православную веру."
 d008_orthodox_events.12.b: "Рим — наш пастырь."
 d008_orthodox_events.13.title: "Раскол якобы преодолён"
 d008_orthodox_events.13.desc: "[scope:actor.GetName] позволя[scope:actor.Custom('end_etyut')] себе заявлять, что якобы раскол преодолён на их условиях."
 d008_orthodox_events.13.a: "Это возмутительно."
 d008_orthodox_events.14.title: "Патриарх переезжает в Рим"
 d008_orthodox_events.14.desc: "[scope:actor.GetName] заставил[scope:actor.Custom('end_fem')] Вселенского патриарха переехать в Рим, тем самым напрямую посягнув на наш город."
 d008_orthodox_events.14.a: "Мы никогда не сдадим Рим."
