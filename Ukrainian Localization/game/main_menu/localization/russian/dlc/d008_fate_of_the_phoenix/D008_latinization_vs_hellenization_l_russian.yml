l_russian:
 latinization_vs_hellenization.1.title: "Отголоски эллинской мудрости"
 latinization_vs_hellenization.1.desc: "Благочестивые [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] и учёные мужи [target_location.Custom('LR_GEN')|l] [target_location.GetName] с огромным интересом изучают богословские сочинения и труды Отцов Церкви, которые широко распространились в монастырях и аудиториях учебных заведений. Проповедники и комментаторы священных текстов изучают мудрость православных текстов, а копии этих сочинений всё чаще попадают в руки негреческой знати, к растущему беспокойству тех, кто видит будущее в сближении с Латинским Западом."
 latinization_vs_hellenization.1.a: "Их знания обогатят нашу державу."
 latinization_vs_hellenization.1.b: "Это модное увлечение старинными свитками зашло слишком далеко!"
 target_character_disappears_tt: "[target_character.GetName] исчезнет"
 latinization_vs_hellenization.2.title: "Рост интереса к латыни"
 latinization_vs_hellenization.2.desc: "Среди завсегдатаев аристократических салонов #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! растёт интерес к #TOOLTIP:LANGUAGE,latin_language,X #L латинским#!#! традициям, законам и обрядам. Молодые дворяне сыплют иностранными оборотами, ведут переписку с латинскими дворами и требуют реформировать [ROOT.GetCountry.Custom('rank_ru_ACC')|l], привнеся в страну новейшие западные веяния. Старшее поколение с тревогой наблюдает, как рушатся привычные устои."
 latinization_vs_hellenization.2.a: "В этом нет ничего дурного."
 latinization_vs_hellenization.2.b: "Надо немедленно отказаться от этой моды!"
 stability_scales_with_current_latinization_hellenization: "Изменение [Concept('stability', 'стабильности')|e] будет зависеть от текущего уровня #TOOLTIP:SOCIETAL_VALUE,latinization_vs_hellenization,X #L латинства#!#! или #TOOLTIP:SOCIETAL_VALUE,latinization_vs_hellenization,X #L эллинизма#!#!"
 while_this_modifier_active_reduced_latinization_gain_from_events_tt: "Пока действует этот [Concept('country_modifier', 'модификатор державы')|e], последующие [Concept('events', 'события')|e], укрепляющие #TOOLTIP:SOCIETAL_VALUE,latinization_vs_hellenization,X #L латинство#!#!, будут значительно ослаблены, а их преимущества уменьшатся"
 bonus_weakened_because_of_suppressing_latinization_modifier: "Выгоды от этого варианта уменьшаются из-за #TOOLTIP:STATIC_MODIFIER,suppressing_latinization_modifier,X #V #L подавления латинства#!#!#!"
 latinization_vs_hellenization.3.title: "[ShowSocietyDirectionNameWithNoTooltip('latinization')] процветает"
 latinization_vs_hellenization.3.desc: "Купцы, правоведы и учёные отмечают, что недавний поворот страны к #TOOLTIP:LANGUAGE,latin_language,X #L латинству#!#! уже начинает приносить результаты. Тексты договоров становятся более чёткими, иноземные партнёры быстрее ориентируются в наших порядках, а энергия реформ как будто придаёт #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! жизненных сил. Впрочем, некоторые считают, что эти достижения покоятся на зыбких основаниях…"
 latinization_vs_hellenization.3.a: "Пришло время пожинать плоды нашей успешной политики."
 latinization_vs_hellenization.3.b: "Мудрец предпочёл бы исправить ошибки прошлого."
 latinization_vs_hellenization.4.title: "Слава воинам отряда «[target_unit.GetNameWithNoTooltip]»"
 latinization_vs_hellenization.4.desc: "Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] узнал о том, что отряд «[target_unit.GetName]» превосходно проявил себя в недавних кампаниях. Его воины сражаются отважно и чётко, сохраняют строй как в походах, так и на учениях. И [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], и простые воины восхищаются их безупречной службой и видят в них пример для легионов #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
 latinization_vs_hellenization.4.a: "Мы высоко ценим их верную службу."
 target_character_will_receive_a_nickname_tt: "[target_character.GetName] получит подходящее прозвище в знак [Select_CString(target_character.IsFemale, 'её', 'его' )] безупречной службы"
 latinization_vs_hellenization.5.title: "Споры об образовании в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 latinization_vs_hellenization.5.desc: "Между учёными мужами #TOOLTIP:BUILDING_TYPE,university,X #L университета#!#! [target_location.Custom('LR_GEN')|l] [target_location.GetName] разгораются споры о том, на каком языке нужно получать высшее образование. Одни утверждают, что лишь #TOOLTIP:LANGUAGE,latin_language,X #L латынь#!#! позволит [ROOT.GetCountry.Custom('rank_ru_DAT')|l] занять подобающее место среди великих держав, другие же настаивают, что образование должно вестись в каноне Константинополя и Церкви."
 latinization_vs_hellenization.5.a: "В университете должны преподавать на латыни."
 latinization_vs_hellenization.5.b: "Мы не оставим традиций Церкви и Империи."
 pops_in_target_province_mild_bonus_satisfaction: "Наши [Concept('pops', 'группы населения')|e] в провинции [target_province.GetName] получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 pops_in_target_province_mild_penalty_satisfaction: "Наши [Concept('pops', 'группы населения')|e] в провинции [target_province.GetName] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 latinization_vs_hellenization.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] предупреждают об угрозе"
 latinization_vs_hellenization.6.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не на шутку встревожены распространением новомодных #TOOLTIP:LANGUAGE,latin_language,X #L латинских#!#! веяний. [target_character.GetName], [Select_CString(target_character.IsFemale, 'видная представительница', 'видный представитель' )] духовенства, [Select_CString(target_character.IsFemale, 'явилась', 'явился' )] ко двору, чтобы выразить свою озабоченность. [target_character.GetSheHe|U] опасается, что латинское влияние на догматы и обычаи подтачивает сами основы нашей веры и представляет угрозу как для церкви, так и для трона."
 latinization_vs_hellenization.6.a: "Нам следует прислушаться к [target_character.GetHerHis] словам."
 latinization_vs_hellenization.6.b: "Мы не позволим, чтобы нашу политику диктовали робкие духом!"
 latinization_vs_hellenization.7.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] привыкают к чужеземным обычаям"
 latinization_vs_hellenization.7.desc: "Повсюду — от дворцов [target_location.Custom('LR_GEN')|l] [target_location.GetName] до самых отдалённых поместий — наши [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] с готовностью перенимают #L [target_culture.GetName|l]ие#! манеры, моду и язык. Некоторые воспринимают это как проявление утончённости, однако многие ворчат, что знать совсем позабыла свои #L [ROOT.GetCountry.GetAdjective|l]ие#! корни."
 latinization_vs_hellenization.7.a: "Пусть заимствуют из [target_culture.GetNameWithNoTooltip|l]ой культуры всё, что может оказаться полезным."
 latinization_vs_hellenization.7.b: "Увлечение чужеземными порядками зашло слишком далеко."
 destabilize_our_realm: "Наше неприятие новых веяний дестабилизирует [ROOT.GetCountry.Custom('rank_ru_ACC')|l]"
 perceived_as_weakness: "Борьба с проникновением чужеземных обычаев воспринимается как слабость"
 latinization_vs_hellenization.8.title: "Реорганизация провинций"
 latinization_vs_hellenization.8.desc: "Чиновники [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetName] выступили с предложением всеобъемлющей реорганизации таких провинций, как [target_province.GetName]. Их законодательство и административное устройство нужно привести в соответствие с порядками, действующими в культурном и политическом центре страны. Эти реформы помогут укрепить контроль над провинциями, однако мы рискуем нарушить сложившееся политическое равновесие на местах."
 latinization_vs_hellenization.8.a: "Введём новые порядки, чего бы это ни стоило."
 latinization_vs_hellenization.8.b: "Местным нотаблям не о чем беспокоиться — мы будем уважать традиции провинций."
 pops_in_selected_provinces_will_gain_mild_bonus_satisfaction_tt: "Наши [Concept('pops', 'группы населения')|e] в затронутых [Concept('provinces', 'провинциях')|e] получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к довольству"
 latinization_vs_hellenization.9.title: "[target_character.GetShortNameWithNoTooltip] и вопрос образования"
 latinization_vs_hellenization.9.desc: "[target_character.GetName] быстро взрослеет, и среди придворных наставников не утихают споры о том, каким путём пойдёт [target_character.GetHerHis] обучение. Выбор языка, книг, учителей — всё это становится ареной духовной борьбы за будущее #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
 latinization_vs_hellenization.9.a: "[target_character.GetHerHis|U] обучение будет чётко спланировано."
 latinization_vs_hellenization.9.b: "[target_character.GetShortNameWithNoTooltip] не будет расти марионеткой в руках соперничающих партий."
 refusal_to_politicize_tt: "В глазах некоторых придворных наше нежелание открыто вмешиваться в образование персонажа [target_character.GetName] будет воспринято как слабость"
 court_does_not_react: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] никак не реагирует"
 latinization_vs_hellenization.10.title: "Возрождение римского величия"
 latinization_vs_hellenization.10.desc: "Зодчие, знакомые с архитектурными приёмами городов Италии, предлагают перестроить город [target_province.GetName] в духе Возрождения: с широкими улицами, регулярной планировкой и общественными сооружениями, как в великом Риме, перестроенном по проектам мастеров Латинского Запада. Сторонники этих амбициозных планов видят в них возрождение нашего величия. Быть может, такое обновление станет возможно, только если мы откроемся влиянию Запада."
 latinization_vs_hellenization.10.a: "[target_province.GetNameWithNoTooltip] воспрянет вновь!"
 latinization_vs_hellenization.10.b: "Пусть селения развиваются естественным путём."
 target_character_artist_skill: "[target_character.GetName]: [Concept('artistic_skill', 'талант')|e]"
 latinization_vs_hellenization.11.title: "Византийская архитектура в городе [target_province.GetNameWithNoTooltip]"
 latinization_vs_hellenization.11.desc: "Покровители искусств и местные гильдии выступают за реконструкцию города [target_province.GetName] в традиционном стиле древних городов нашей империи: украшенные аркадами улицы, открытые форумы и каменная кладка, которые стали отличительной чертой Константинополя и других древних городов римского Востока. Многие наши советники уверены, что возрождение этих форм станет мощным символом нашего свято чтимого римского наследия."
 latinization_vs_hellenization.11.a: "Античные чудеса отлично подходят [ROOT.GetCountry.Custom('rank_ru_DAT')|l]."
 latinization_vs_hellenization.11.b: "$latinization_vs_hellenization.10.b$"
 latinization_vs_hellenization.12.title: "Споры о новой системе налогообложения"
 latinization_vs_hellenization.12.desc: "Чиновники финансового ведомства представили проект масштабной реформы налоговой системы на основе чужеземных методов строгого учёта и сбора налогов. Эта смелая инициатива сулит наведение порядка и рост поступлений, но в случае её реализации пострадают интересы многих могущественных групп [ROOT.GetCountry.Custom('rank_ru_GEN')|l]…"
 latinization_vs_hellenization.12.a: "Мы перейдём на новую систему."
 latinization_vs_hellenization.12.b: "Не будем с этим спешить."
 proposed_taxation_upsets_estates_tt: "При новой системе налогообложения пострадают устоявшиеся привилегии отдельных [Concept('estates', 'сословий')|e]"
 new_tax_code_will_destabilize_the_realm: "Пересмотр системы налогообложения дестабилизирует [ROOT.GetCountry.Custom('rank_ru_ACC')|l]"
 latinization_vs_hellenization.13.title: "[target_location.GetRank.GetName] [target_location.GetNameWithNoTooltip] хочет иметь собственный совет"
 latinization_vs_hellenization.13.desc: "Знатные жители [target_location.GetName.Custom('LR_GEN')|l] [target_location.GetName.GetName] обратились ко двору с просьбой даровать им право собирать собственный городской совет. Они указывают на опыт самоорганизуемых коммун в итальянских городах как на доказательство того, что самоуправление это ключ к богатству. Если пойти на уступки, это приведёт к ослаблению контроля со стороны центральной власти и подтолкнёт [ROOT.GetCountry.Custom('rank_ru_ACC')|l] к латинским моделям управления, однако отказ может настроить против нас влиятельные слои общества."
 latinization_vs_hellenization.13.a: "Пусть собирают свой совет."
 latinization_vs_hellenization.13.b: "Они останутся под прямым управлением столичного двора."
 upper_class_pops_in_these_cities_angry: "Наши [Concept('pops', 'группы населения')|e] из [Concept('upper_class', 'высшего общества')|e] в затронутых [Concept('locations', 'районах')|e] будут недовольны отказом. Они получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 latinization_vs_hellenization.14.title: "Празднество в провинции [target_province.GetNameWithNoTooltip]"
 latinization_vs_hellenization.14.desc: "Нотабли провинции [target_province.GetName] предлагают устроить пышное торжество — праздник в честь местных обычаев и щедрот земли. Подобные гуляния способны снизить напряжённость и укрепить чувство общности, однако потребуют немалых расходов как со стороны провинции, так и из государственной казны — к вящему неудовольствию наших казначеев."
 latinization_vs_hellenization.14.a: "Ладно, устроим в провинции [target_province.GetNameWithNoTooltip] праздник."
 latinization_vs_hellenization.14.b: "Пусть соседние провинции тоже гуляют!"
 latinization_vs_hellenization.14.c: "Если у них есть время праздновать, значит, есть время и поработать."
 pops_are_happier_tt: "Наши [Concept('pops', 'группы населения')|e] в этой [Concept('province', 'провинции')|e], НЕ относящиеся к [Concept('upper_class', 'высшему обществу')|e], получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e] из-за празднества"
 latinization_vs_hellenization.15.title: "Руководство по латинскому военному делу"
 latinization_vs_hellenization.15.desc: "Среди офицеров распространяется подробное руководство по строевой подготовке и тактике, основанное на опыте наёмников и военных орденов латинского Запада. Если принять его в качестве основной доктрины, то описанные там планы и команды помогут обеспечить порядок и единообразие в наших войсках."
 latinization_vs_hellenization.15.a: "Его должны прочесть все!"
 latinization_vs_hellenization.15.b: "Мы не нуждаемся в античных советах."
 latinization_vs_hellenization.16.title: "[target_character.GetShortNameWithNoTooltip] и [target_estate.GetNameWithNoTooltip|l] ссорятся"
 latinization_vs_hellenization.16.desc: "[target_character.GetName] и наиболее видные [target_estate.GetName|l] разругались в пух и прах, причём обе стороны обвиняют друг друга в превышении полномочий. Их ссора может вбить клин между военными кругами и интересами [ROOT.GetCountry.Custom('rank_ru_GEN')|l] в целом."
 latinization_vs_hellenization.16.a: "[Select_CString(target_character.IsFemale, 'Её', 'Его' )] приструнили по делу."
 latinization_vs_hellenization.16.b: "[target_estate.GetNameWithNoTooltip|U] не имеют права голоса в военных делах!"
 court_faction_increases_influence: "Влияние оппозиционной придворной фракции становится сильнее"
 our_authority_will_suffer_penalty: "Наш авторитет падает"
 latinization_vs_hellenization.17.title: "[target_character.GetShortNameWithNoTooltip] желает служить нам"
 latinization_vs_hellenization.17.desc: "Благодаря нашим дружеским отношениям [target_country.Custom('end_predlog_sso')] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! [Select_CString(target_character.IsFemale, 'одна бывалая', 'один бывалый' )] #L [target_culture.GetName|l][Select_CString(target_character.IsFemale, 'ая', 'ий' )]#! [Select_CString(target_character.IsFemale, 'воительница изъявила', 'воин изъявил' )] желание встать под наши знамёна, [Select_CString(target_character.IsFemale, 'движимая', 'движимый' )] растущими связями между нашими дворами. [target_character.GetSheHe|U] хочет служить нашей державе и может поделиться с нами знаниями военного дела латинского Запада."
 latinization_vs_hellenization.17.a: "Мы рады каждому [target_culture.GetNameWithNoTooltip|l]ому лидеру!"
 latinization_vs_hellenization.18.title: "Разногласия между лидерами"
 latinization_vs_hellenization.18.desc: "Два наших военачальника, [target_character_1.GetName] и [target_character_2.GetName], разошлись во мнениях относительно тактики и подготовки войск. Есть риск, что их соперничество расколет офицерский корпус и посеет замешательство среди воинов действующей армии. Возможно, это очередное проявление глубокого разлада в наших вооружённых силах? Как бы то ни было, в интересах безопасности государства мы обязаны немедленно пресечь эти разногласия."
 latinization_vs_hellenization.18.a: "[target_character_1.GetShortNameWithNoTooltip] говорит здраво."
 latinization_vs_hellenization.18.b: "Безусловно, [target_character_2.GetNameWithNoTooltip] [Select_CString(target_character_2.IsFemale, 'права', 'прав' )]!"
 latinization_vs_hellenization.19.title: "В провинцию [target_province_destination.GetNameWithNoTooltip] стекаются мигранты"
 latinization_vs_hellenization.19.desc: "Великолепие и добрая слава провинции [target_province_destination.GetName] побудили привлекли группу жителей из провинции [target_province_origin.GetName] поселиться в наших землях. Если они пришли с латинского Запада, то их поселение углубит нашу связь с этим регионом. Если же это наши православные соседи, то своим переселением они укрепят древние традиции нашей провинции."
 latinization_vs_hellenization.19.a: "Они принесут пользу нашему обществу!"
 latinization_vs_hellenization.19.b: "Мы им не рады."
 latinization_vs_hellenization.20.title: "[target_character.GetNameWithNoTooltip] и [Select_CString(target_character.IsFemale, 'её', 'его' )] преданность"
 latinization_vs_hellenization.20.desc: "Ходят слухи, что [target_character.GetName] общается с посланниками и шпионами других держав. Это может быть и неправдой, но подобные разговоры подтачивают доверие к нашим военачальникам. Разведка уже доносит о растущем напряжении, поэтому нам стоит тщательно всё взвесить."
 latinization_vs_hellenization.20.a: "[Select_CString(target_character.IsFemale, 'Ей', 'Ему' )] пора отправиться на заслуженный отдых…"
 latinization_vs_hellenization.20.b: "Мы не станем слушать досужие сплетни!"
 target_character_spills_the_beans: "[target_character.GetShortName] выдаёт наши тайны [Concept('rivals', 'соперникам')|e] и [Concept('rival_enemies', 'врагам')|e]"
 target_character_lips_shut: "[target_character.GetSheHe|U] умеет хранить секреты"
 latinization_vs_hellenization.21.title: "Рост инфляции"
 latinization_vs_hellenization.21.desc: "Приток обесцененных и поддельных монет вызвал рост цен по всей #L [ROOT.GetCountry.GetAdjective|l]ой#! земле. Некоторые советники при дворе призывают немедленно принять меры, другие же считают, что наше вмешательство лишь усугубит ситуацию."
 latinization_vs_hellenization.21.a: "Ужесточим контроль над монетами."
 latinization_vs_hellenization.21.b: "Рынок сам придёт в равновесие."
 inflation_creeping_in_tt: "Неконтролируемая [Concept('inflation', 'инфляция')|e] может вызвать серьёзные проблемы в будущем"
 burghers_pleased: "The [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] are pleased with our restraint"
 burghers_upset: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] возмущены нашим бездействием"
 inflation_causes_instability: "Галопирующая [Concept('inflation', 'инфляция')|e] отрицательно сказывается на [Concept('stability', 'стабильности')|e] страны"
 latinization_vs_hellenization.22.title: "[target_character_1.GetShortNameWithNoTooltip] и наставничество"
 latinization_vs_hellenization.22.desc: "В последнее время [target_character_1.GetName] и [Select_CString(target_character_1.IsFemale, 'её', 'его' )] [Select_CString(target_character_2.IsFemale, 'наставница', 'наставник' )] [target_character_2.GetName] стали очень близки, их общение давно вышло за рамки обучения грамоте и счёту. Некоторые верят, что эта дружба помогает расширять кругозор [Select_CString(target_character_1.IsFemale, 'наследницы', 'наследника' )], но другие опасаются, что [Select_CString(target_character_1.IsFemale, 'наша будущая', 'наш будущий' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] слишком подпадёт под чужое влияние."
 latinization_vs_hellenization.22.a: "[Select_CString(target_character_1.IsFemale, 'Маленькая', 'Маленький' )] [target_character_1.GetShortNameWithNoTooltip] [Select_CString(target_character_1.IsFemale, 'достойна', 'достоин' )] самого лучшего!"
 latinization_vs_hellenization.22.b: "[target_character_1.GetSheHe|U] [Select_CString(target_character_1.IsFemale, 'рождена', 'рождён' )] повелевать, а не читать книжки!"
 heir_will_receive_more_tutoring_tt: "[Select_CString(target_character_1.IsFemale, 'Наша любимая', 'Наш любимый' )] [target_character_1.GetShortName] получит дополнительное обучение, способное улучшить [target_character_1.GetHerHis] [Concept('abilities', 'навыки')|e]. Впоследствии, если [target_character_1.GetSheHe] взойдёт на трон, это может повлиять на решения, которые [Select_CString(target_character_1.IsFemale, 'она', 'он' )] будет принимать."
 latinization_vs_hellenization.23.title: "Чужеземный литератор"
 latinization_vs_hellenization.23.desc: "К нашему двору [Select_CString(target_character.IsFemale, 'прибыла странствующая', 'прибыл странствующий' )] [target_culture.GetNameWithNoTooltip|l][Select_CString(target_character.IsFemale, 'ая учёная дама и привезла', 'ий учёный муж и привёз' )] с собой написанные на латыни манускрипты, философские записки и новые идеи мудрецов Запада. Такая фигура могла бы стать для нас ценным источником знаний об интеллектуальных веяниях латинского мира. Но также нам следует быть осторожными: кто знает, каким чужеземным странам [target_character.GetSheHe|l] хранит верность?"
 latinization_vs_hellenization.23.a: "Просим, задержись у нас, [Select_CString(target_character.IsFemale, 'странница', 'путник' )]."
 latinization_vs_hellenization.23.b: "Нам не интересны записки сомнительных бродяг."
 latinization_vs_hellenization.24.title: "[Select_CString(target_character.IsFemale, 'Женщина, повидавшая', 'Человек, повидавший' )] мир"
 latinization_vs_hellenization.24.desc: "[Select_CString(target_character.IsFemale, 'Дама, сведущая', 'Муж, сведущий' )] в трудах Отцов Церкви и комментариях великих православных богословов, [Select_CString(target_character.IsFemale, 'испросила', 'испросил' )] разрешения присоединиться к нашему двору. [target_character.GetSheHe|U] обещает поделиться рукописями из монастырей Востока и глубокими знаниями византийского права и православного учения. Обогатят ли [target_character.GetHerHis|l] знания наши традиции или просто станут очередным голосом в нашем многолюдном дворе, решать нам."
 latinization_vs_hellenization.24.a: "Хорошо, [target_character.GetShortNameWithNoTooltip] может остаться."
 latinization_vs_hellenization.24.b: "Подумаешь! [target_character.GetSheHe|U] лишь ещё один кирпич в стене."
 latinization_vs_hellenization.25.title: "Культурный упадок"
 latinization_vs_hellenization.25.desc: "Летописцы жалуются на упадок культурной жизни [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Меценатство выходит из моды, традиции забываются, а произведения, некогда вдохновлявшие людей, пылятся в библиотеках и архивах. Неужто мы утратили связь с великой культурой своих предков?"
 latinization_vs_hellenization.25.a: "Мы должны смириться с тем, что наше наследие угасает."
 latinization_vs_hellenization.25.b: "Нет! Все остальные неправы!"
 latinization_vs_hellenization.26.title: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] и восточная мода"
 latinization_vs_hellenization.26.desc: "Наши [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] очарованы шелками, благовониями и диковинными обычаями, что привозят с собой из восточных дворов купцы и посланники. Одни не видят в этом ничего странного для империи, с давних времён находящейся на границе между Востоком и Западом, тогда как другие считают, что наше будущее связано с латинскими державами и что интерес двора к востоку лишь оттолкнёт от нас западных союзников."
 latinization_vs_hellenization.26.a: "Восток всегда был частью нашего мира."
 latinization_vs_hellenization.26.b: "Мы должны смотреть не на восток, а на запад."
 latinization_vs_hellenization.27.title: "Политика прививания эллинизма даёт результаты"
 latinization_vs_hellenization.27.desc: "Принятая нами культурная политика наконец-то приносит плоды. Учёные отмечают вновь обретённую ясность ума, адмиралы говорят о возрождённой вере в военно-морское могущество державы, а народ начинает понимать, что наш путь, при всей своей сложности, имеет цель и смысл."
 latinization_vs_hellenization.27.a: "Радуйтесь! Предки будут нами гордиться!"
 strength_of_hellenization_desc: "Сила [Concept('country_modifier', 'модификатора державы')|e] #TOOLTIP:MODIFIER_TYPE,monthly_towards_hellenization,X #P #V «Смещение к эллинизму за месяц»#!#!#!"
 latinization_vs_hellenization.28.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] сопротивляются нововведениям"
 latinization_vs_hellenization.28.desc: "Самые знатные семейства нашей страны недовольны стремительными переменами в культурной жизни #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] считают, что [ROOT.GetCountry.GetFlavorRank|l] вот-вот утратит свою уникальную идентичность, и только их твёрдая рука способна удержать страну от сползания в хаос."
 latinization_vs_hellenization.28.a: "Согласимся на их требования."
 latinization_vs_hellenization.28.b: "Мы не изменим свой курс."
 latinization_vs_hellenization.29.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] сопротивляются нововведениям"
 latinization_vs_hellenization.29.desc: "В последнее время [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] всё чаще с тревогой высказываются о нашей культурной политике. Наиболее радикальные их представители убеждены в порочности и опасности любых нововведений, но даже самые умеренные считают, что мы обязаны оградить веру от пагубных веяний."
 latinization_vs_hellenization.29.a: "Мы прислушаемся к их словам."
 latinization_vs_hellenization.29.b: "Догматы не должны определять политику."
 refusal_leads_instability: "Наш отказ подчиниться приведёт к нестабильности"
 situation_dissipates: "Дальше бурных дебатов дело не заходит"
 latinization_vs_hellenization.30.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] сопротивляются нововведениям"
 latinization_vs_hellenization.30.desc: "Жители #L [ROOT.GetCountry.GetAdjective|l]их#! деревень недовольно ворчат. Простым работникам нет дела до отвлечённых споров о величии и традициях, зато они остро чувствуют новые тяготы, возложенные на их плечи. Если не принять меры, их молчаливый протест может усилиться."
 latinization_vs_hellenization.30.a: "Пусть [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] знают, что мы слышим их мольбы."
 latinization_vs_hellenization.30.b: "Мы заставим их принять новые веяния."
