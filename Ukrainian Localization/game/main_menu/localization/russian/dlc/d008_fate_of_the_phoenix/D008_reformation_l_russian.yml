l_russian:
 contact_patriarch_of_constantinople: "Обратиться к Константинопольскому патриарху"
 contact_patriarch_of_constantinople_desc: "Отправить Меланхтона в Константинополь с нашим Символом веры и начать диалог с #TOOLTIP:RELIGION,$orthodox_tt$,X #L Православным#!#! патриархатом."
 reformation.17.title: "[GetCharacter('reformer_philip_melanchton').GetLastNameWithNoTooltip]'s Letter to Constantinople"
 reformation.17.desc: "Выдающийся богослов нашей страны [melanchthon.GetName] выступил со смелым предложением: отправить посланника к Константинопольскому патриарху с нашим Символом веры. Хотя по многим вопросам #TOOLTIP:RELIGION,$orthodox_tt$,X #L православно-христианская#!#! и #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранская#!#! конфессии расходятся, они обе отвергли верховенство католического Папы. Быть может, Патриарх оценит такой жест от собратьев по противостоянию Риму."
 reformation.17.a: "Отправить Меланхтона с нашим «Исповеданием веры»."
 reformation.17.b: "Сейчас не время для таких заигрываний."
 reformation.17.historical_info: "Филипп Меланхтон (1497–1560 гг.), ближайший соратник Лютера и автор «Аугсбургского исповедания» (1530 г.), проявлял большой интерес к Восточной православной церкви как потенциальному союзнику в борьбе с Римом. Его переписка с греческими богословами заложила основу будущих лютеранских сношений с Константинополем. В 1573 году богословы из Тюбингена отправили греческий перевод «Аугсбургского исповедания» патриарху Иеремии II, чем положили начало одному из самых продолжительных богословских диалогов между лютеранством и православием в эпоху Реформации."
 reformation.18.title: "Письмо от лютеранских реформаторов"
 reformation.18.desc: "В Константинополь прибыла делегация делегация из [lutheran_country.Custom('longname_ru_GEN')] с богословским трактатом — Исповеданием их веры. Судя по всему, #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранские#!#! реформаторы ищут диалога с нашим патриархатом, ссылаясь на нашу общую вражду с Епископом Римским. Насколько их намерения чисты, нам пока неясно."
 reformation.18.a: "Вступить с этими реформаторами в осторожную богословскую дискуссию."
 reformation.18.b: "Это еретики. Отослать их прочь."
 reformation.18.historical_info: "Вселенский патриархат Константинополя сохранил духовную власть над православными христианами даже после завоевания Константинополя османами в 1453 году. Патриарх Иеремия II (пр. 1572–1595 гг.) был известен учёностью и всерьёз переписывался с тюбингенскими богословами, написав в период 1576–1581 гг. три подробных ответа на их письма. Он отвергал лютеранские взгляды на принцип оправдания, роль свободы воли и филиокве, но при этом признавал искренность их критики, а не отнёсся к ней с пренебрежением."
 reformation.19.title: "Патриарх отвечает с интересом"
 reformation.19.desc: "Патриарх отреагировал на визит нашего посланника сдержанным любопытством. Хотя согласия по нашим взглядам достичь не удалось, обмен мнениями открыл дорогу между Константинополем и нашей государственной церковью. Маленький, но значительный шаг к взаимопониманию между #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранским#!#! и #TOOLTIP:RELIGION,$orthodox_tt$,X #L православным#!#! христианством."
 reformation.19.a: "Даже шаткий мостик лучше, чем ничего."
 reformation.19.historical_info: "Переписка тюбингенских лютеран с Иеремией II считается знаковым событием в ранней истории экуменического диалога. В своих трёх ответах (1576, 1579, 1581 гг.) патриарх Иеремия II вступил серьёзную дискуссию лютеранской теологией, отвергнув при этом её основные постулаты. Он привёл подробные нравоучительные комментарии к таким вопросам как доктрина оправдания верой, роль свободной воли и принцип филиокве. Такой уровень вовлечённости демонстрировал интеллектуальную активность Патриархата при власти осман. Обе стороны тщательно сохранили всю переписку."
 reformation.20.title: "Патриарх отсылает делегацию"
 reformation.20.desc: "Наша делегация получила в Константинополе холодный приём. Патриарх счёл наше Исповедание как очередную ересь, и нашего посланника отослали без церемоний. Это напоминание о том что #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#! стоит в стороне и от Рима, и от Константинополя."
 reformation.20.a: "Нашей вере не нужно одобрение никаких патриархатов."
 reformation.20.historical_info: "Переписка тюбингенских лютеран с Иеремией II не привела к сближению конфессий. Патриарх Иеремия II в своих трёх ответах (1576, 1597, 1581 гг.) отверг лютеранские взгляды на доктрину оправдания верой, принцип «сола скриптура» и филиокве, утверждая, что для православной церкви такие отклонения неприемлемы. В конце концов лютеране решили, что дальнейшая переписка будет бессмысленной, и закончили её в 1581 году."
 reformation.21.title: "Прибытие православного богослова"
 reformation.21.desc: "Вести о нашей переписке с Константинополем привели к неожиданным результатам. К нашему двору [Select_CString(orthodox_scholar.IsFemale, 'прибыла православная учёная женщина', 'прибыл православный богослов' )] [orthodox_scholar.GetName] с намерением продолжить теологический диалог, начатый нашим посланником. Этот визит ставит нас в сложное положение: слишком радушный приём может возмутить наше собственное духовенство, но если мы прогоним [Select_CString(orthodox_scholar.IsFemale, 'гостью', 'гостя' )], то рискуем растерять завоёванное расположение Константинополя."
 reformation.21.a: "Организовать обширный богословский диалог."
 reformation.21.b: "Поблагодарить [Select_CString(orthodox_scholar.IsFemale, 'гостью', 'гостя' )], но от диалога отказаться."
 reformation.21.historical_info: "Несмотря на то, что переписка тюбингенских богословов с Константинополем не привела к сближению доктрин, она породила существенный интерес по обе стороны. Греческие православные учёные ближе познакомились с лютеранской теологией, а их лютеранские коллеги углубили понимание Отцов церкви и восточной христианской традиции. Такое межконфессиональное общение привело к расширению европейского гуманизма, который теперь увидел греческое христианство как источник, независимый от Рима."
