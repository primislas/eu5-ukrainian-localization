l_russian:
 spread_philhellenism: "Распространение филэллинизма"
 spread_philhellenism_desc: "#TOOLTIP:CULTUREGROUP,greek_group,X #L Эллинские#!#! наука, искусство и философия должны сформировать наш имидж как внутри страны, так и за рубежом. Учёные, творцы и почитатели #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческой#!#! культуры отовсюду приезжают к нам. Восхищение, а не сила — вот наш способ укрепить влияние."
 spread_philhellenism_action: "$spread_philhellenism$"
 spread_philhellenism_active: "Политика распространения филэллинизма"
 spread_philhellenism_action_progress: "[SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')]"
 spread_philhellenism_action_progress_wordier: "[SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')]"
 spread_philhellenism_action_progress_tooltip: "[Concept('research_progress', 'Прогресс исследования')|e]: [SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')] \n\n[Concept('cultural_influence', 'Культурное влияние')|e]: [SCOPE.sCountry('actor').GetModifierValue('cultural_influence_modifier')]"
 spread_philhellenism_action_progress_long_wordier: "@research_progress! [SCOPE.sCountry('actor').GetModifierValue('research_speed_modifier')] \n\n@cultural_influence! [SCOPE.sCountry('actor').GetModifierValue('cultural_influence_modifier')]"
 encourage_latin_militarism: "Внедрение латинского военного дела"
 encourage_latin_militarism_desc: "В своей стране мы будем следовать #TOOLTIP:LANGUAGE,latin_language,X #L латинской#!#! военной традиции, которая базируется на железной дисциплине, постоянных тренировках и строгом этикете. Такой подход сократит расходы на армию и поспособствует образованию класса профессиональных военных."
 encourage_latin_militarism_action: "Внедрить латинское военное дело"
 encourage_latin_militarism_active: "Внедрение латинского военного дела"
 encourage_latin_militarism_action_progress: "[SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')]"
 encourage_latin_militarism_action_progress_wordier: "[Concept('army_maintenance', 'Содержание армии')|e]: [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')]"
 encourage_latin_militarism_action_progress_long_wordier: "@army_maintenance! [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')] \n\n@army_tradition! [SCOPE.sCountry('actor').GetModifierValue('monthly_army_tradition')]"
 encourage_latin_militarism_action_progress_tooltip: "[Concept('army_maintenance', 'Содержание армии')|e]: [SCOPE.sCountry('actor').GetModifierValue('army_maintenance_efficiency')] \n\n[Concept('army_tradition', 'Армейские традиции')|e]: [SCOPE.sCountry('actor').GetModifierValue('monthly_army_tradition')]"
 AUTO_MODIFIER_NAME_bureaucracy_nomos_empsychos_high_legitimacy: "$nomos_empsychos_bureaucracy$"
 AUTO_MODIFIER_NAME_bureaucracy_nomos_empsychos_low_legitimacy: "$nomos_empsychos_bureaucracy$"
 cb_restore_roman_borders: "Восстановление римских границ"
 cb_restore_roman_borders_desc: "Великая древняя империя призывает нас. Скоро феникс расправит крылья и уничтожит всякого, кто осмелится помешать нам вернуть исконные [ShowScriptedGeographyName('roman_borders_geography')|l]."
 roman_borders_geography: "Римские границы"
 epic_hellenic_history: "Исторические эпосы эллинов"
 epic_hellenic_history_desc: "Этот пересказ славной древнегреческой истории — шедевр каллиграфии на золочёных страницах, символ нашего процветания и гордости за героизм наших предков. Помимо прочего, хроника описывает сожжение Трои, при котором пал великий воин Ахиллес, приключения легендарного Одиссея, а также путешествия Ясона и его аргонавтов."
 nomos_empsychos_bureaucracy: "Nómos Émpsychos"
 nomos_empsychos_bureaucracy_desc: "Наш император — это #italic Nómos Émpsychos#!, или «живой закон». Он олицетворяет собой саму суверенную власть, ему подчиняется весь бюрократический аппарат. Этот принцип, впервые сформулированный при Юстиниане, делает императора центральной фигурой римского государства: единственным источником прав и высшим судьёй."
 honorary_titles_bureaucracy: "Почётные титулы"
 honorary_titles_bureaucracy_desc: "Весь наш двор, включая #italic патрициев#!, #italic антипатов#!, #italic магистров#! и #italic куропалатов#!, ценит не силу, а лояльность и влияние.\n\nРаздавая почётные звания и одаривая подданных шелками и привилегиями, император привязывает к себе генералов, сенаторов и провинциальные элиты, вознаграждает их за преданность, примиряет соперников и тем самым превращает престиж в инструмент власти."
 court_eunuchs_bureaucracy: "Придворные евнухи"
 court_eunuchs_bureaucracy_desc: "Образованные и верные придворные евнухи — единственные люди, которым император может доверять, ведь они не имеют наследников, а значит не стремятся возвеличить своё потомство. Из них получаются отличные распорядители дворца и казны, а также хранители императорской переписки."
 ritualistic_court_bureaucracy: "Придворные ритуалы"
 ritualistic_court_bureaucracy_desc: "Церемонии — это демонстрация власти. Благодаря упорядоченному проведению зрелищных ритуалов императорский двор превращается в священный театр. С одной стороны, это помогает поддерживать иерархию внутри державы, а с другой — до глубины души впечатляет иностранных посланников, прибывших в нашу великую столицу, которая считается центром цивилизованного мира."
 sixty_books_of_the_basilika_bureaucracy: "Василики"
 HAS_SIXTY_BOOKS_OF_THE_BASILIKA_TRIGGER: "Есть Василики"
 THIRD_HAS_SIXTY_BOOKS_OF_THE_BASILIKA_TRIGGER: "Есть Василики"
 FATE_OF_THE_PHOENIX_DISASTER_ACTIVE_TRIGGER: "Происходит [Concept('disaster', 'бедствие')|e] «$fate_of_the_phoenix$»"
 THIRD_FATE_OF_THE_PHOENIX_DISASTER_ACTIVE_TRIGGER: "Происходит [Concept('disaster', 'бедствие')|e] «$fate_of_the_phoenix$»"
 sixty_books_basilika_satisfaction_scale_tt: "Штраф к [Concept('estate_satisfaction', 'довольству сословия')|e] крестьян зависит от содержания Василиков. (#R -5%#! при полном содержании и #R -20%#! при отсутствии содержания)"
 sixty_books_of_the_basilika_bureaucracy_desc: "Василики, в основе которых лежит знаменитый труд #italic Corpus Juris Civilis#!, созданный при Юстиниане, представляют собой исчерпывающее переосмысление положений римского права на #TOOLTIP:LANGUAGE,greek_language,X #L греческом#!#! языке. Этот свод уточнённых, стандартизированных и осовремененных правовых норм закрепляет бесспорность, авторитетность и универсальность императорского закона."
 romanitas_bureaucracy: "Romanitas"
 romanitas_bureaucracy_desc: "Romanitas — собрание концепций и практик, закрепляющих непрерывность римской государственности. Император — это не только завоеватель и лидер доминирующего этноса, но также законный наследник власти, права и традиций с более чем тысячелетней историей. Такая идентичность объединяет государство и религию, представляя римское правление как символ божественной избранности и морального превосходства."
 imperial_senate_bureaucracy: "Имперский сенат"
 imperial_senate_bureaucracy_desc: "Этот орган состоит из высокопоставленных сановников, назначенных самим императором, к которым тот обращается за советом и одобрением. Сенат выступает инструментом легализации правления, престолонаследия и ключевых актов, поддерживает преемственность римской власти и сохраняет верховенство императора."
 kephalai_bureaucracy: "Кефалы"
 kephalai_bureaucracy_desc: "#italic Кефалы#! — свод правил, регулирующих управленческие и судебные практики, а также опора для императорской власти. Они упраздняют старые административно-территориальные единицы (в том числе #italic катепанаты#!), систематизируют законы, а также вводят унифицированную систему налогообложения и обязательную воинскую повинность во всех провинциях."
 won_fate_of_the_phoenix_disaster_tt: "Мы успешно преодолели [Concept('disaster', 'бедствие')|e] #TOOLTIP:DISASTER_TYPE,D008_fate_of_the_phoenix,X #L «Судьба феникса»#!#!"
 magister_militum_bureaucracy: "Стратегархия"
 magister_militum_bureaucracy_desc: "#italic Стратегархия#! воплощает собой институциональный принцип управления имперской армией. Бюрократический аппарат назначает, заменяет и сдерживает генералов, следя за тем, чтобы военная машина служила государству, а не личным амбициям. Таким образом, война превращается в административную задачу, где иерархия ценится больше верности, а высшие чины достаются только лучшим."
 has_unlocked_bureaucracy_via_flavor_byz_31_tt: "Мы разблокировали этот [Concept('bureaucracy', 'бюрократический механизм')|e] в ходе [Concept('event', 'события')|e] «$flavor_byz.31.title$», которое может произойти после #Y 1400#! года при следующих условиях:\n\n[ShowTriggerConditions('flavor_byz.31',PlayerScope.Self)]"
 themata_bureaucracy: "Фемы"
 themata_bureaucracy_desc: "#italic Фемы#! — это военно-административные округа, созданные в империи под давлением внешних угроз. Каждым округом управляет так называемый #italic стратег#! — военачальник, который формально подчиняется имперской иерархии. Он способен быстро организовать оборону, но при этом выполняет и административные задачи."
 allelengyon_bureaucracy: "Аллиленгий"
 allelengyon_bureaucracy_desc: "#italic Аллиленгий#! (от #TOOLTIP:LANGUAGE,greek_language,X #L греческого#!#! слова #italic allilengýi#!, «взаимное ручательство») — налог, который был разработан ещё при императоре Василии II #italic Болгаробойце#! и подразумевает перераспределение фискального бремени. Если мелкие помещики не в состоянии оплатить взносы, эта обязанность юридически переходит к более зажиточным землевладельцам того же округа. Такая система обеспечивает стабильный приток средств в казну, предотвращает разорение и поглощение крестьянских земель, а также служит эффективным рычагом контроля."
 katepanata: "Катепанаты"
 katepanata_desc: "В ответ на агрессию соседей мы поделили новые территории на военно-административные округа. Катепанаты (от греч. #italic katepano#!, «тот, кто наверху», «верховный») — это крупные объединения нескольких фем, созданные в X–XI веках, во главе которых стоят командиры, обладающие всей полнотой гражданской и военной власти. При императоре Василии II и позже такие катепанаты, как #TOOLTIP:REGION,italy_region,X #L Италия#!#! со столицей в #TOOLTIP:LOCATION,bari,X #L Бари#!#! и Армения, позволяли держать под контролем спорные и отдалённые территории. Эти мощные бастионы — символ нашей силы и предупреждение для тех, кто хочет отнять у нас власть!"
 has_completed_fate_of_the_phoenix_disaster: "Мы пережили [Concept('disaster', 'бедствие')|e] #TOOLTIP:DISASTER_TYPE,D008_fate_of_the_phoenix,X #L «Судьба феникса»#!#! и вышли победителями из всех испытаний"
