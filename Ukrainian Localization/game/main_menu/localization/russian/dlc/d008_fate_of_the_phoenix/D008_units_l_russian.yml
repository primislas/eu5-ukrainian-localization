l_russian:
 a_legionaries_1: "Ранние легионеры"
 a_legionaries_1_desc: "$a_legionaries_1$ хранят самые древние традиции дисциплины и воинской подготовки. Длинные копья, широкие щиты и сплочённый строй позволяют им стоять подобно скале в хаосе любой битвы."
 a_legionaries_2: "Легионеры"
 a_legionaries_2_desc: "Эти легионеры, обученные искусству ближнего боя, вооружены метательными копьями и короткими мечами. Их сила заключается в твёрдом строю и постоянных тренировках."
 a_legionaries_3: "Реформированные легионеры"
 a_legionaries_3_desc: "$a_legionaries_3$ — это опытные пехотинцы с первосортным оружием и доспехами. Они составляют основу наших армий."
 a_legionaries_4: "Тяжеловооружённые легионеры"
 a_legionaries_4_desc: "$a_legionaries_4$ — это элитные пехотинцы, экипированные самым лучшим оружием и доспехами. Подобно тяжеловооружённым легионерам Древнего Рима, они служат молотом, сокрушающим наших врагов."
 a_legionaries_5: "Гвардейские легионеры"
 a_legionaries_5_desc: "$a_legionaries_5$ подготовлены по самым высоким стандартам наших легионов. Они отобраны из числа лучших воинов, поэтому выполняют самые ответственные задания и охраняют важнейшие государственные институты."
 a_legionaries_6: "Имперские легионеры"
 a_legionaries_6_desc: "$a_legionaries_6$ олицетворяют собой вершину многовековой эволюции военного дела. Мастерски владея оружием, тактикой и стратегией, они служат личной охраной правителей. Одного их присутствия достаточно, чтобы поколебать вражескую решимость."
 a_byzantine_cataphracts_2: "Позднесредневековые катафрактарии"
 a_byzantine_cataphracts_2_desc: "$a_byzantine_cataphracts_2$ мчатся в атаку с длинными копьями и массивными щитами. И они сами, и их кони с ног до головы закованы в броню. Сокрушительный натиск и железная дисциплина этих воинов вселяют ужас в сердца наших врагов."
 a_byzantine_cataphracts_3: "Реформированные катафрактарии"
 a_byzantine_cataphracts_3_desc: "$a_byzantine_cataphracts_3$ сочетают старые имперские традиции с более современными тактическими приёмами, у них есть как копья и луки, так и огнестрельное оружие. Эта универсальная кавалерия сначала изматывает врага издалека, а потом сокрушает его в ближнем бою."
 a_byzantine_cataphracts_4: "Тяжеловооружённые катафрактарии"
 a_byzantine_cataphracts_4_desc: "$a_byzantine_cataphracts_4$ облачены в многослойную броню, непроницаемую для стрел и клинков. Выстроившись клином, эти элитные всадники могут с лёгкостью прорвать любой вражеский строй."
 a_byzantine_cataphracts_5: "Гвардейские катафрактарии"
 a_byzantine_cataphracts_5_desc: "$a_byzantine_cataphracts_5$, отобранные из числа лучших копейщиков, составляют конную стражу нашего трона и столицы. Одного их присутствия на поле боя достаточно, чтобы воодушевить наших воинов и повергнуть в ужас врагов."
 a_byzantine_cataphracts_6: "Имперские катафрактарии"
 a_byzantine_cataphracts_6_desc: "$a_byzantine_cataphracts_6$ являют собой вершину многовекового развития кавалерии. Эти безупречно обученные ветераны облачены в надёжную броню и сражаются верхом на самых лучших конях. Они служат личной охраной императора и способны переломить ход военной кампании одним решительным ударом."
 n_greek_fire_galley_renaissance: "Сифонофоры"
 n_greek_fire_galley_renaissance_desc: "Эти корабли, оборудованные специальными трубами для метания греческого огня, способны за считаные минуты испепелить целый флот. На ближней дистанции они смертоносны."
 n_greek_fire_galley_discovery: "Улучшенные сифонофоры"
 n_greek_fire_galley_discovery_desc: "Приспособив системы метания греческого огня к новым кораблям, мы сохранили возможность испепелять вражеские суда. Это оружие по-прежнему остаётся символом нашего флота."
 a_greek_fire_renaissance_infantry: "Хейросифоны"
 a_greek_fire_renaissance_infantry_desc: "Греческий огонь можно применять не только на море. Вооружившись небольшими ручными устройствами, пехотинцы могут обрушивать потоки горючей смеси на вражеские ряды, расчищая путь для наступления наших войск."
 a_greek_fire_discovery_infantry: "Улучшенные хейросифоны"
 a_greek_fire_discovery_infantry_desc: "Воины и армии меняются, но испепеляющее пламя по-прежнему остаётся грозным и эффективным оружием. Поэтому наши воины продолжают поливать врагов греческим огнём, вселяя ужас в их сердца."
