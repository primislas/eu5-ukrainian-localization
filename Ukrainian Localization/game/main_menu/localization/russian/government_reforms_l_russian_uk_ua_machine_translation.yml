l_russian:
  autocracy: "Самодержавство"
  autocracy_desc: "У самодержавній монархії вся влада зосереджена в руках правителя, і країна зазвичай розглядається як власність лідера. Монарх нерідко оточує себе радниками та прихильниками, яких за такого ладу називають придворними."
  feudal_nobility: "Феодальна знать"
  feudal_nobility_desc: "За феодального ладу владу монарха забезпечують знатні землевласники, що присягнули йому. Ці #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! часто самі є великими поміщиками з великим впливом і власними васалами."
  margraviate: "Маркграфство"
  margraviate_desc: "#TOOLTIP:GOVERNMENT_REFORM,margraviate,X #L Маркграфство#!#! — це історична область, яка отримала свою назву від титулу #italic маркграф#!. Маркграфи керують прикордонними місцевостями країни та відповідають за їх захист — насамперед, від зовнішніх загроз. До обов'язків маркграфів входить охорона кордонів і вирішення питань місцевого значення. Крім того, вони виступають у ролі посередників між центральною владою та жителями прикордоння."
  landgraviate: "Ландграфство"
  landgraviate_desc: "[ShowGovernmentReformName('landgraviate')], назване так за титулом #italic ландграфа#!, є безпосередньою зоною впливу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! в землях розколотих графств. Ландграф — прямий представник закону, який уособлює [GetInternationalOrganization('hre').GetLeaderTitle], в землях ландграфства, за обсягом влади та відповідальності він порівнянний з герцогом."
  french_feudal_nobility: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]і феодали"
  french_feudal_nobility_desc: "Феодали беруть участь у всіх справах французького двору. Найвпливовіші представники аристократів і децентралізовані васали з високим ступенем автономії мають безпрецедентні свободу та авторитет у вирішенні державних питань."
  fra_removed_when_no_appanages_tt: "Цю [Concept('government_reform', 'державну реформу')|e] можна прибрати лише під час [Concept('dynamic_historical_event', 'динамічної історичної події')|E] «$flavor_fra.1103.title$». Вона відбувається, коли у нас не залишається [Concept('subject', 'васалів')|e]-#TOOLTIP:SUBJECT_TYPE,appanage,X #L апанажів#!#!."
  french_appanage_reform: "Апанаж французького війська"
  french_appanage_reform_desc: "Власники апанажів — це члени правлячої династії, тому серед підданих #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! вони перебувають на особливому становищі та користуються цілою низкою привілеїв. Ба більше, #L [GetCountry('FRA').GetAdjective|l]ий#! монарх повинен звертатися до них з належною повагою в обмін на їх допомогу в дипломатичних питаннях."
  french_ducal_vassal_reform: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]е герцогство"
  french_ducal_vassal_reform_desc: "#L [GetCountry('FRA').GetAdjective]им#! герцогствам бракує автономії апанажів, проте власники таких земель підтримують більш довірчі відносини з короною."
  member_of_league_of_public_weal: "Член Ліги суспільного блага"
  member_of_league_of_public_weal_desc: "Ставши частиною Ліги суспільного блага, ми зобов'язуємося брати участь у всіх майбутніх збройних конфліктах проти #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!. Але якщо члени Ліги програють у такому конфлікті, #L [GetCountry('FRA').GetAdjective|l]а#! корона матиме право позбавити нелояльних васалів їхніх земель…"
  french_centralized_monarchy: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]а монархія"
  french_centralized_monarchy_desc: "Після століть феодальної роздробленості [GetCountry('FRA').GetName] об'єднал[GetCountry('FRA').Custom('end_fem')] значну частину апанажів і герцогств, а потім почал[GetCountry('FRA').Custom('end_fem')] перехід до нового ладу."
  of_noble_bearing: "Блакитна кров"
  of_noble_bearing_desc: "Наша знать в усьому перевершує правителів будь-яких інших країн. Нехай весь світ знає про їхнє найвище походження!"
  national_assemblies: "Національні збори"
  national_assemblies_desc: "У кожному зібранні беруть участь представники суб'єктів усієї нашої країни. Залежно від форми правління воно може мати всю повноту влади або діяти лише як законодавчий орган."
  prussian_monarchy: "[GetCountry('PRU').GetAdjectiveWithNoTooltip]а монархія"
  prussian_monarchy_desc: "Це форма монархії, за якої найбільша увага приділяється адміністративній ефективності, особливо у військових питаннях, коли виникає така необхідність."
  the_court_of_wards_and_liveries: "Палата феодальних зборів"
  the_court_of_wards_and_liveries_desc: "З появою палати феодальних зборів організація збору податків і феодальних повинностей значно покращується завдяки зростанню компетентності збирачів та систематизації прибуткової частини. Однак знать часто вбачає в подібних судах інструмент грабіжницької експлуатації своїх багатств."
  royal_decree: "Королівський указ"
  royal_decree_desc: "Монарх володіє найвищою владою, і вірність йому цінується понад усе. Ми повинні простежити, щоб укази монаршого двору неухильно виконувалися в будь-якій частині нашої країни."
  privy_council: "Таємна рада"
  privy_council_desc: "Правитель повинен бути в курсі того, що діється в його країні. Заснувавши таємну раду, ми зможемо пильніше стежити за нашими підданими."
  warsaw_confederation: "Варшавська конфедерація"
  warsaw_confederation_desc: "Кожному аристократу, незалежно від його віросповідання, буде дозволено голосувати і жити так, як йому хочеться. Крім того, він отримає право навертати васалів у свою віру. Таке рішення дасть людям відчуття безпеки та зміцнить релігійну терпимість."
  mlo_council_of_justice: "Рада правосуддя"
  mlo_council_of_justice_desc: "Спочатку рада правосуддя займалася вирішенням дрібних суперечок між селянами. Пізніше вона перетворилася на найвпливовіший судовий орган країни. Тепер радники розслідують справи та захищають інтереси всіх підданих."
  mlo_secret_council: "Тіньова рада"
  mlo_secret_council_desc: "Тіньова рада складається з людей шляхетного походження. Повноваження ради поширюються на всю країну, а її інтереси нерідко суперечать планам правителя. Більшість ключових рішень, що приймаються правителем або від його імені, розглядаються в цьому органі."
  scottish_shires_reform: "Графства [GetCountry('SCO').Custom('CL_GEN')]"
  scottish_shires_reform_desc: "Система графств, яку [Select_CString(GetCharacter('sco_malcolm_iii').IsFemale,'запровадила', 'запровадив')] [GetCharacter('sco_malcolm_iii').GetName], ділить Шотландію на адміністративні одиниці, причому кожна з них має свій устрій."
  merchant_republic: "Купецька республіка"
  merchant_republic_desc: "Ця республіка заснована на принципах торгівлі. Для сімей, що стоять на чолі такої країни, комерційні угоди становлять головний інтерес."
  noble_elite: "Правляча еліта"
  noble_elite_desc: "У цій республіці влада належить кільком знатним династіям. Глава уряду обирається з членів цих династій на закритій раді та цілком спирається на підтримку правлячої знаті."
  dynastic_signoria_reform: "Династична синьйорія"
  dynastic_signoria_reform_desc: "$dynastic_signoria_reform$ являє собою конфедерацію міст-країн, керованих членами однієї династії, де влада часто зосереджена в руках купки впливових людей, яких називають #italic синьйорами#!. Ці люди — як правило, аристократи — повністю привласнюють собі управління країною і володіють усією повнотою як виконавчої, так і законодавчої влади. Вони всіма силами чіпляються за своє становище, що нерідко призводить до конфліктів і кривавих чвар всередині правлячої родини."
  signoria_reform: "Синьйорія"
  signoria_reform_desc: "Особлива #TOOLTIP:CULTUREGROUP,italian_group,X #L італійська#!#! форма міського республіканського управління. Учасники обираються на певний термін, зазвичай з-поміж найвпливовіших містян. Але нерідко на роль голови синьйорії запрошують і іноземних правителів."
  sortition: "Вибори за жеребом"
  sortition_desc: "На жаль, голоси можна купити, а деякі виборці голосують за старою звичкою. Ми спробуємо створити систему, за якої хороші кандидати без серйозних зв'язків матимуть нагоду обратися на важливу посаду."
  peasant_republic_reform: "Селянська республіка"
  peasant_republic_reform_desc: "Це форма правління, за якої #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителі#!#!, #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! та #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! представлені слабко або не представлені зовсім, а #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! має високий ступінь автономії."
  pirate_brethren_reform: "Піратське братство"
  pirate_brethren_reform_desc: "Це збіговисько піратів можна назвати країною лише з великою натяжкою, проте піратське братство надає надійний притулок злодіям, убивцям і контрабандистам усіх мастей."
  formalized_measures: "Єдина система мір"
  formalized_measures_desc: "У нашій країні діє єдина система мір. Від чотирьох до восьми боватів — один гайд, п'ять гайдів — один феод; з них складається вапентейк, що дорівнює сотні. Звісно, це не метрична система, але, принаймні, вона поширюється на всі наші території, а це вже непогано."
  banking_country: "Династія банкірів"
  banking_country_desc: "Ми не країна, а сім'я! Одна велика сім'я, яка надає банківські послуги всім нужденним."
  hanseatic_merchant_federation: "Ганзейська торгова федерація"
  hanseatic_merchant_federation_desc: "Це децентралізована федерація купців, що утворюють єдиний союз, який охоплює всю #TOOLTIP:CONTINENT,europe,X #L Європу#!#!. Члени союзу славляться своєю майстерністю в торговій справі, а їхні будівлі мають впізнаваний стиль."
  diplomatic_traditions: "Питома дипломатичність"
  diplomatic_traditions_desc: "Наш народ ніколи не відрізнявся войовничістю. Споконвіку ми зміцнювали відносини з союзниками, щоб заробити репутацію чесних і вірних соратників."
  colonial_subject: "Колоніальний васал"
  colonial_subject_desc: "Ми знаходимося в авангарді цивілізації, завдяки чому наші відважні та підприємливі громадяни змогли перетнути океан і оселитися тут, щоб побудувати для себе нове та прекрасне життя."
  legacy_of_genghis: "Спадщина $genghis_khan_name_no_tooltip$а"
  legacy_of_genghis_desc: "Ми горді та могутні нащадки великого завойовника Чингісхана. Кров у наших жилах робить нас непереможними: ми підкоримо будь-які землі, яких торкнуться копита наших коней."
  military_order_reform: "Духовно-лицарський орден"
  military_order_reform_desc: "Духовно-лицарські ордени створювалися в Середні віки та перебували у віданні #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви. Вони складаються одночасно і з лицарів (лат. #italic miles#!, «воїни»), і ченців (лат. #italic fratres#!, «брати»). Вони дають урочисті релігійні обітниці захищати та поширювати #TOOLTIP:RELIGIONGROUP,christian,X #L християнську#!#! віру."
  abbey_reform: "Абатство"
  abbey_reform_desc: "Абатства були символом чернечого життя ще з часів раннього #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#!. Поступово вони перетворилися на справжні центри релігії, науки, освіти, економічного та соціального розвитку."
  prince_bishopric_reform: "Духовне князівство"
  prince_bishopric_reform_desc: "Князь-єпископ — це посвячений служитель Церкви, який одночасно є і світським правителем певної території. При цьому релігійна область його влади не обов'язково збігається зі світськими володіннями."
  guru_leadership_reform: "Керівництво гуру"
  guru_leadership_reform_desc: "Країною керує мудрий гуру, який веде її до просвітлення. У його віданні знаходяться духовні та світські справи."
  primas_germaniae: "Примас Німеччини"
  primas_germaniae_plural: "Примас Німеччини"
  primas_germaniae_desc: "Ми носимо почесне звання примаса Німеччини, яке робить нас найвпливовішим архієпископством у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!."
  the_combination_act: "Заборона профспілок"
  the_combination_act_desc: "Ми вжили всіх заходів для запобігання страйкам. Будь-які незаконні торгові та професійні спілки відтепер під забороною!"
  the_recruiting_act: "Обов'язкова служба у флоті"
  the_recruiting_act_desc: "Цей закон зобов'язує всіх здорових чоловіків і жінок без джерела доходу вступати на військово-морську службу. Напевно, він буде зустрінутий неоднозначно…"
  conquistador_country: "Експедиція конкістадорів"
  conquistador_country_desc: "Ми радше не країна, а невелике військо конкістадорів, яка прийшла сюди, щоб розширити та прославити свою батьківщину! Ну і розбагатіти, звісно."
  admiralty_regime_reform: "Режим адміралтейства"
  admiralty_regime_reform_desc: "Ця державна реформа передбачає, що правитель за сумісництвом командує і флотом. Простіше кажучи, зазвичай у країни є свій флот, а в цьому випадку у флоту є своя країна."
  military_regime_reform: "Військовий режим"
  military_regime_reform_desc: "Форма правління, за якої главою країни стає один із полководців. Такі країни захищають інтереси війська!"
  thalassocracy_reform: "Таласократія"
  thalassocracy_reform_desc: "Таласократія в перекладі означає «влада моря». Ми живемо біля моря, завдяки морю і заради моря. Наша країна простягається далеко за межі рідних земель і включає обширні колонії в так званому Утремері, або Замор'ї. Наші прапори майорять над морськими хвилями від одного узбережжя до іншого. Прохолодні морські простори стали нашим домом. Коли ми у своїй стихії, нас нікому не подолати!"
  agricultural_cultivation: "Розвиток сільського господарства"
  agricultural_cultivation_desc: "Обсяг врожаю значно зріс, коли ми відмовилися від підтримки дрібних селянських господарств і перейшли до створення великих плантацій."
  the_espionage_act: "Чорний кабінет"
  the_espionage_act_desc: "Використовуючи скритність і хитрість, щоб перехоплювати всі письмові повідомлення, ми будемо ефективніше займатися шпигунством і збережемо перевагу перед ворогами."
  public_welfare_act: "Народне благополуччя"
  public_welfare_act_desc: "У важкі часи найгірше біднякам. Скромні пожертви полегшать їхню долю і не дадуть їм зібратися в розгніваний натовп, озброєний вилами та смолоскипами…"
  religious_laws_enforced: "Насадження релігійних догм"
  religious_laws_enforced_desc: "Ми ретельно вивчаємо священні тексти, де описано, як і за які злочини варто карати людину. Адже коли суспільством керують справді духовні люди, правовірним громадянам простіше викорінювати єретиків і зрадників у своїх лавах."
  land_inheritance_act: "Успадкування землі селянами"
  land_inheritance_act_desc: "Надаючи можливість успадковувати право на землю навіть найпростішому селянину, ми сприятимемо розвитку всієї країни."
  the_education_act: "Обов'язкова освіта для чиновників"
  the_education_act_desc: "Тепер до будь-якої роботи в межах правової системи допускаються лише освічені люди."
  manuelan_architecture: "Мануеліно"
  manuelan_architecture_desc: "Цей унікальний стиль поєднує елементи пізньої готики з іспанськими, італійськими та фламандськими мотивами. Будівлі в стилі мануеліно здебільшого зводилися на гроші від торгівлі прянощами з Індією та #TOOLTIP:CONTINENT,africa,X #L Африкою#!#!."
  royal_commission_act: "Королівські комісії"
  royal_commission_act_desc: "Іноді буває корисно стежити за діями чиновників. Створення нових королівських комісій допоможе зменшити корупцію."
  the_loyalty_act: "Відділення контррозвідки"
  the_loyalty_act_desc: "Повідомляючи про небезпеки на нашій території, пильні громадяни отримуватимуть щедру винагороду. Щоб спростити цей процес, ми заснуємо відділення служби контррозвідки."
  vassal_obligation_act: "Закріплення зобов'язань васалів"
  vassal_obligation_act_desc: "Дозволяє закріпити всі військові та економічні зобов'язання васальних територій на законодавчому рівні."
  enlightened_aristocracy: "Просвічена знать"
  enlightened_aristocracy_desc: "Якщо заохочувати освіту та високі літературні норми серед аристократів, люди на чолі країни неухильно дотримуватимуться наших гуманістичних ідеалів."
  the_transportation_act: "Закон про перевезення"
  the_transportation_act_desc: "Єдина система оподаткування за перевезення товарів сприятиме розквіту зовнішньої торгівлі."
  cultural_recognition_act: "Самобутність культур"
  cultural_recognition_act_desc: "Визнаючи цінність та самобутню природу місцевих культур, нам буде простіше включити їх до справ країни."
  licensing_of_the_press_act: "Ліцензування преси"
  licensing_of_the_press_act_desc: "Ми запровадили суворі правила та положення щодо друкованих видань. Будемо сподіватися, що це змусить замовкнути всіх, хто намагається поширювати наклепницькі та образливі статті про наше суспільство."
  patrimonialism: "Патримоніалізм"
  patrimonialism_desc: "Уряд безпосередньо підпорядковується правителю, який виступає в ролі голови родини. Військо, бюрократи та васали присягають на вірність йому, а не країні."
  enforce_religious_adherence: "Насадження релігійності"
  enforce_religious_adherence_desc: "Щоб суспільство було єдиним, люди повинні беззаперечно дотримуватися релігійних догматів. Ми жорстко припинятимемо будь-яке інакомислення, щоб уникнути заворушень."
  harbor_administration: "Управління гаванями"
  harbor_administration_desc: "Порти важливі для морської торгівлі та військово-морських операцій. Жорсткий контроль та ефективне управління допоможуть знизити корупцію та сприятимуть розвитку торгівлі."
  trade_office_network: "Мережа торгових контор"
  trade_office_network_desc: "Мережа торгових контор полегшить збір податків та прискорить зростання торгівлі, а завдяки централізованому управлінню ми примножимо доходи країни та налагодимо взаємодію з купцями."
  local_army_organization: "Формування місцевих військ"
  local_army_organization_desc: "Щоб ефективніше захищати регіони, ми повинні набирати та підготовлювати місцевих військових. Крім того, нам належить налагодити постачання провінційних військ, щоб вони могли стримувати ворожі сили."
  bank_ledgers_system: "Банківські книги"
  bank_ledgers_system_desc: "Усі фінансові угоди та державні витрати потрібно ретельно фіксувати. Банківські книги забезпечать звітність та знизять ймовірність крадіжок із скарбниці."
  plutocratic_ethos: "Принципи плутократії"
  plutocratic_ethos_desc: "Уся повнота влади повинна бути зосереджена в руках багатих людей. #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L Міщани#!#! та банкіри заохочуватимуть розвиток господарства та сприятимуть промислам з підприємництвом."
  garrison_system: "Система гарнізонів"
  garrison_system_desc: "Для захисту регіонів від нападів треба розмістити в ключових місцях постійні військові гарнізони. Організовані війська, оснащені всім необхідним, забезпечать безпеку території."
  statute_of_monopolies: "Статут про монополії"
  statute_of_monopolies_desc: "Щоб обмежити торгове суперництво, потрібно надати особливі привілеї деяким #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщанам#!#!. Так ми забезпечимо контрольований розвиток господарства та послабимо іноземний вплив."
  colonial_expansion: "Колоніальна експансія"
  colonial_expansion_desc: "Ми повинні приростати заморськими територіями та заселяти їх за підтримки уряду. Зробивши ставку на колонізацію, ми надовго забезпечимо собі економічне та політичне панування."
  mercenary_registration_act: "Облік найманців"
  mercenary_registration_act_desc: "Щоб уникнути заворушень, треба контролювати діяльність приватних військ. Суворий облік найманих компаній знизить ризик бунтів та зради."
  state_backed_merchant_fleet: "Торговий флот за підтримки країни"
  state_backed_merchant_fleet_desc: "Морська торгівля повинна фінансуватися з державного бюджету. Сильний флот — потужний чинник зростання торгівлі та одна зі складових успіху воєнних кампаній."
  multilingual_diplomats: "Посли-багатомовці"
  multilingual_diplomats_desc: "У міжнародних переговорах повинні брати участь посли з багатими лінгвістичними знаннями. Люди, які володіють кількома мовами, зміцнять дипломатичні зв'язки та укладуть вигідніші торговельні угоди."
  asymmetrical_warfare_tactics: "Тактика асиметричної війни"
  asymmetrical_warfare_tactics_desc: "При битві з сильнішим противником потрібно застосовувати незвичайну стратегію. Партизанська війна, саботаж та обманні маневри послаблять ворога та стримають його просування."
  naval_infrastructure_act: "Фінансування морської інфраструктури"
  naval_infrastructure_act_desc: "Треба будувати більше верфей, доків та прибережних захисних споруд. Зростання фінансування морської інфраструктури забезпечить нам перевагу на морі та полегшить проведення масштабних кампаній."
  policy_of_calculated_delay: "Тактика затягування"
  policy_of_calculated_delay_desc: "Тактика затягування — це хитрий прийом, що дозволяє отримати перевагу в дипломатичних переговорах. Так ми зможемо показати себе сильнішою стороною та отримувати більше вигоди від будь-яких зовнішніх угод."
  anti_heresy_act: "Покарання за єресь"
  anti_heresy_act_desc: "Щоб підтримувати релігійну чистоту та запобігати внутрішнім суперечностям і заворушенням, необхідно викорінювати будь-яку єресь та інакомислення."
  administration_of_clerical_lands: "Управління церковними землями"
  administration_of_clerical_lands_desc: "Країна повинна розпоряджатися майном та доходами церкви. Ми збираємося поставити всі релігійні установи на службу інтересам влади."
  humanitarian_administration: "Допомога стражденним"
  humanitarian_administration_desc: "Соціальні ініціативи допоможуть покращити суспільний добробут. Боротьба з бідністю та нестабільністю зміцнить державну владу та запобігне заколотам."
  universal_serfdom: "Загальне кріпосне право"
  universal_serfdom_desc: "#TOOLTIP:ESTATE_TYPE,peasants_estate,X #L Селяни#!#! повинні бути прикріплені до своєї землі. Завдяки цьому #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! отримає робочу силу для ведення сільського господарства та особливі повноваження для ефективного управління маєтками."
  weapons_quality_standards: "Стандарти якості зброї"
  weapons_quality_standards_desc: "Усе військове спорядження повинно відповідати стандартам якості. Суворі вимоги та перевірки підвищать міцність та ефективність нашої зброї."
  diplomatic_consolidation_act: "Зміцнення дипломатичних відносин"
  diplomatic_consolidation_act_desc: "Для підвищення ефективності міжнародних переговорів потрібно об'єднати дипломатичні зусилля країн. Тривалі союзи та угоди допоможуть підтримувати стабільність у світі."
  provincial_taxation_system: "Система оподаткування провінцій"
  provincial_taxation_system_desc: "Ми повинні запровадити єдину для всіх провінцій систему оподаткування, щоб налагодити стабільне надходження грошей до скарбниці. Ми посилимо фінансовий нагляд та звільнимо корумпованих чиновників."
  conscript_logistics_act: "Міністерство військових поставок"
  conscript_logistics_act_desc: "Щоб досягти високої мобільності військ, треба вибудувати нові ланцюжки військових поставок. Це дозволить швидше розгортати військові сили та проводити більш тривалі кампанії."
  smooth_integration_act: "Визнання місцевих звичаїв"
  smooth_integration_act_desc: "Насильницька інтеграція загрожує повстаннями, тому жителі нещодавно завойованих територій повинні асимілюватися плавно. У цьому нам допоможе грамотна культурна та адміністративна політика."
  centralization_of_power_act: "Централізація влади"
  centralization_of_power_act_desc: "Сильна влада країни послабить вплив регіонів, підвищить ефективність прийняття рішень та забезпечить стабільність у країні."
  horse_artillery: "Кінно-артилерійський полк"
  horse_artillery_desc: "Кінна артилерія підвищить маневреність наших військ на полі бою. Висока швидкість та значна вогнева міць забезпечать нам тактичну перевагу."
  autonomous_estates: "Незалежні стани"
  autonomous_estates_desc: "Ми повинні надати автономію місцевим #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#!. Вони, як і раніше, виконуватимуть феодальні зобов'язання перед короною, але контроль на місцях запобігатиме народним повстанням."
  military_allotment: "Виділення земель військовим"
  military_allotment_desc: "Щоб офіцери зберігали нам вірність, ми виділимо їм земельні наділи, а вони, у свою чергу, зобов'язуються утримувати війська, готові негайно вступити в бій у разі небезпеки."
  naval_armament_act: "Фінансування військового суднобудування"
  naval_armament_act_desc: "Треба будувати більше бойових кораблів, щоб посилити флот. Збільшення фінансування дозволить домогтися панування на морі та захистити торгові шляхи."
  recordkeeping_act: "Розширення архівів"
  recordkeeping_act_desc: "Щоб забезпечити адміністративну ефективність, потрібно ретельно вести державну документацію. Це запобігне корупції та спростить бюрократичні процедури."
  visionary_thinkers: "Мрійники"
  visionary_thinkers_desc: "Підтримка інтелектуалів та реформаторів дозволить змінювати державну політику на краще. Новаторські ідеї посприяють економічному зростанню, військовим досягненням та розвитку системи управління."
  organized_marines: "Організована морська піхота"
  organized_marines_desc: "Для наступу з моря нам потрібна морська піхота. Спеціальне навчання та стройова підготовка — запорука ефективних бойових дій на суші та на морі."
  mandatory_service: "Обов'язкова служба"
  mandatory_service_desc: "Щоб військо була сильним і могла в будь-який момент відбити напад ворога, необхідно ввести військову повинність. Усі громадяни, придатні до служби, захищатимуть свою країну."
  flexible_diplomatic_stance: "Гнучка дипломатична позиція"
  flexible_diplomatic_stance_desc: "Союзи між країнами не вічні. Ми повинні бути гнучкими в питаннях зовнішньої політики та приймати стратегічні рішення з урахуванням геополітичного ландшафту, що постійно змінюється."
  modern_assault_tactics: "Сучасна тактика нападу"
  modern_assault_tactics_desc: "Щоб підвищити ефективність військ на полі бою, треба переглянути доктрини наступальної війни. Висока швидкість, скоординованість дій та нищівна сила — ось три стовпи, на яких тримається нова тактика."
  nautical_education_act: "Навчання морським спеціальностям"
  nautical_education_act_desc: "Грамотне керівництво на морі — запорука успіху будь-якої кампанії. Треба покращити навчальні програми для моряків, щоб нашим флотом командували більш кваліфіковані офіцери."
  mining_communities: "Гірничі спільноти"
  mining_communities_desc: "Регіони, багаті на природні ресурси, повинні перетворитися на повноцінні гірничі спільноти. Державний нагляд забезпечить стабільні умови роботи та підвищить продуктивність праці."
  production_quota_bureaus: "Відомство з виробничих квот"
  production_quota_bureaus_desc: "Потрібно встановити квоти на випуск продукції. Державний нагляд забезпечить економічну стабільність та запобіжить дефіциту товарів."
  state_sponsored_markets: "Державна підтримка ринків"
  state_sponsored_markets_desc: "Країна повинна підтримувати створення ринків — це стимулює розвиток торгівлі та економічне зростання, а також забезпечує справедливе ціноутворення."
  coastal_city_or_town_gets_tt: "Кожне [Concept('coastal', 'прибережне')|e] [Concept('towns_and_cities', 'місто')|e], що перебуває у володінні, отримає:"
  every_coastal_location_gains_tt: "Кожна [Concept('coastal', 'прибережна')|e] [Concept('location', 'місцевість')|e], що перебуває у володінні, отримає:"
  alsno_stadga: "Статут Альсньо"
  alsno_stadga_desc: "У 1280 році у палаці Альсньо [GetCharacter('swe_magnus_ladulas').GetName] ухвалив звід законів, що регламентує певні привілеї #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#! і водночас захищає #TOOLTIP:POPTYPE,peasants,X #L селян#!#! від експлуатації з боку знаті. За це в народі його прозвали Ladulås — «Амбарний Замок»."
  papacy_reform: "Святий Престол"
  papacy_reform_desc: "Святий Престол перебуває у віданні #TOOLTIP:LOCATION,rome,X #L римського#!#! єпископа, #italic Великого понтифіка#!, верховного первосвященника #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви, також відомого як [GetCountry('PAP').GetGovernment.GetRulerTitle|l]."
  kingdom_of_god_reform: "Царство Боже"
  kingdom_of_god_reform_desc: "Ми встановили на землі Царство Боже. Абсолютна влада Церкви на чолі з Його Святістю Папою Римським поширюється як у духовній, так і в мирській сферах."
  celtic_traditions_reform: "Кельтська спадщина"
  celtic_traditions_reform_desc: "У країні сильні давні звичаї ізольованого суспільства. Наші правителі керують людьми, а не землями, і на деяких офіційних церемоніях #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенство#!#! замінюють спеціально навчені поети."
  family_sagas_reform: "Сімейні перекази"
  family_sagas_reform_desc: "У наших давніх оповідях, які століттями передавалися з вуст в уста, описується захоплива подорож до далеких і диких земель по той бік західного моря. Можливо, одного дня ми повторимо подвиг своїх предків…"
  galley_lords_reform: "Лорди на галерах"
  galley_lords_reform_desc: "Хоч ми й народжені ходити по землі, море — наша справжня стихія."
  wayfinders_reform: "Провідники"
  wayfinders_reform_desc: "Мореплавці тисячоліттями вчилися орієнтуватися в морі. Не маючи технічних нововведень, провідники запам’ятовують положення зірок, помічають найменші зміни в хмарах і воді, а потім за цими спостереженнями визначають положення судна на безкрайніх просторах Тихого океану."
  magna_carta_reform: "Велика хартія вольностей"
  magna_carta_reform_desc: "«Велика хартія вольностей» — це офіційний документ, створений для захисту феодальних прав від несправедливих податків і юридичних хитрощів з боку #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!. Це один із перших документів, що закріплює ідею громадянських свобод, таких як право на справедливий суд і захист від незаконного арешту."
  sbl_restorer_of_the_disinherited: "Відновлення справедливості"
  sbl_restorer_of_the_disinherited_desc: "Барони, яких позбавив земель підступний [GetCharacter('sco_robert_de_brus_1st_lord_of_annandale').GetName], стають під наші знамена, щоб повернути те, що належить їм по праву!"
  irish_earldom_reform: "$TRE_ADJ$е ерлство"
  irish_earldom_reform_desc: "Ми отримали владу з титулом, який нам дарував лорд Ірландії."
  iron_ring_reform: "Залізне кільце"
  iron_ring_reform_desc: "Наша влада будується на підтримці безлічі укріплених замків, що стоять на пагорбах і рівнинах. Мало країн зрівняється з нашою за ступенем захищеності від зовнішнього ворога."
  religious_tolerance: "Терпимість до релігій"
  religious_tolerance_desc: "Жителі нашої країни належать до найрізноманітніших релігій. Підтримка свободи віросповідання допоможе зміцнити їхню довіру до нашого уряду."
  serene_republic_of_naples: "Світлійша #L [GetCountry('NAP').GetAdjective]а#! Республіка"
  serene_republic_of_naples_desc: "Форма правління, натхненна #L [GetCountry('VEN').GetAdjective]ою#! Республікою. Являє собою щось середнє між республікою та монархією."
  turkish_pashas: "Паші"
  turkish_pashas_desc: "Султан [GetCountry('TUR').Custom('longname_ru_GEN')] присвоює титул паші високопоставленим цивільним та військовим. Зазвичай такий титул отримують намісники. Паші стоять вище беїв та аг, але нижче хедивів та візирів."
  compagna_communis: "Компанья"
  compagna_communis_desc: "Це союз усіх торгових об'єднань Генуї, а також шляхетних лордів узбережжя та навколишніх долин. Міський уряд формується з членів цього союзу."
  alberghi_28: "Союз двадцяти восьми родин"
  alberghi_28_desc: "Після політичних змін минулого століття впливовий дім [ShowDynastyName('doria_dynasty')] пропонує реформу конституції, щоб усунути фракції, що раніше отруювали життя нашої республіки. На зміну цим фракціям прийде новий олігархічний уряд, який очолить #italic Союз двадцяти восьми родин#! — найвпливовіших у країні."
  legatus_natus: "Папський легат"
  legatus_natus_plural: "Папський легат"
  legatus_natus_desc: "Ми представляємо владу Папи Римського на північ від Альп!"
  por_casa_de_india: "Каза да Індія"
  por_casa_de_india_desc: "Організація «Каза да Індія» курує всі #L [GetCountry('POR').GetAdjective|l]і#! володіння в Індії та #TOOLTIP:CONTINENT,africa,X #L Африці#!#!, а також контролює місцеві права на торгівлю."
  tsardom: "Царство"
  tsardom_desc: "Наша країна є наступницею Римської імперії та оплотом нашої державної релігії. Як Цар всієї #TOOLTIP:REGION,russian_region,X #L Русі#!#!, наш правитель є істинним государем та повелителем #TOOLTIP:CULTUREGROUP,russian_group,X #L східнослов'янського#!#! народу."
  veche_republic: "Вічова республіка"
  veche_republic_desc: "Цією країною керує віче — народна рада, що володіє всією повнотою законодавчої та судової влади. До такої ради входять [ShowEstateTypeName('nobles_estate')|l], [ShowEstateTypeName('burghers_estate')|l] і навіть [ShowEstateTypeName('peasants_estate')|l]."
  sudebnik: "Судебник"
  sudebnik_desc: "Ми ухвалили рішення кодифікувати наш звід законів, який спочатку розвивався як звичаєве право зі значними регіональними відмінностями. Уніфікувавши цей звід та розширивши перелік правопорушень, що караються штрафами, ми підвищуємо як адміністративну ефективність, так і доходи скарбниці."
  oprichnina: "Опричнина"
  oprichnina_desc: "Потомственна [ShowEstateTypeName('nobles_estate')|l] становить найбільшу загрозу для нашої влади над країною. Ми повинні послабити їхній вплив, відібравши у них частину володінь та передавши ці землі тим, хто вже довів свою вірність."
  east_india_trading_company: "Британська Ост-Індська компанія"
  east_india_trading_company_desc: "Ця глобальна торгова компанія була створена для торгівлі в регіоні #TOOLTIP:REGION,indian_ocean_region,X #L Індійського океану#!#!. Починання виявилося успішним, і згодом компанія розширила свою діяльність у Східній #TOOLTIP:CONTINENT,asia,X #L Азії#!#!.\nНині це найбільша компанія у світі, що управляє великими заморськими володіннями та нашою розгалуженою мережею глобальної торгівлі."
  ven_monte_nuovo: "Монте Нуово"
  ven_monte_nuovo_desc: "Спочатку система позик в #TOOLTIP:REGION,italy_region,X #L Італії#!#! була представлена акціонерним фондом під назвою #italic «Монте Веккьо»#!. До цього фонду громадяни повинні були внести певну суму в обмін на лихву. З нинішньою ж системою наші банкіри встановили фіксовану мінімальну виплату вкладникам, що спонукало людей інвестувати більші суми. Нова компанія «Монте Нуово» виявилася надзвичайно успішною, і з часом її привабливість буде тільки зростати."
  hun_power_to_magnates: "Впливові магнати"
  hun_power_to_magnates_desc: "Впливові магнати #ONCLICK:COUNTRY,[GetCountry('HUN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HUN').Custom('CL_tt')],X [GetCountry('HUN').Custom('CL_GEN')|L]#!#! будь-якими способами намагалися послабити владу #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!."
  casa_de_contratacion: "Каса-де-Контратасьйон"
  casa_de_contratacion_desc: "Каса-де-Контратасьйон — це державна установа, що керує іспанськими колоніальними операціями. Усі дослідницькі та торгові експедиції мають отримувати її схвалення, і вона завідує збором усіх колоніальних податків. На «Касу» також покладено завдання охорони секретної інформації про нові торгові шляхи та цінні відкриття."
  intendancy_system: "Інтенданції"
  intendancy_system_desc: "Інтенданції — це нова система управління, що передбачає централізацію влади #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителя#!#! над бюрократією для боротьби з хабарництвом та контролю за збором податків."
  royal_factories_reform: "Королівські фабрики"
  royal_factories_reform_desc: "Королівські фабрики — це державні мануфактури, створені для підтримки меркантилізму та централізації економіки. Вони контролюються безпосередньо #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителем#!#! і виробляють стратегічні товари, а також предмети розкоші."
  royal_council_of_castile: "Кастильська рада"
  royal_council_of_castile_desc: "Кастильська рада — це централізований орган під контролем #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителів#!#!, який відповідає за оптимізацію управління, збору податків та судочинства."
  nueva_planta: "Нуева-Планта"
  nueva_planta_desc: "Нуева-Планта — це низка указів та реформ, спрямованих на скасування правових привілеїв у регіонах та створення єдиної країни з централізованою формою управління."
  crown_aragon_reform: "Арагонська корона"
  crown_aragon_reform_desc: "Корона Арагона — велика морська країна, що досягла панування в Середземномор'ї завдяки потужному флоту. Ця країна включає в себе одне князівство та кілька королівств зі своїми інститутами та законами. Основні її пріоритети — мореплавство та торгівля."
  crown_castile_reform: "Кастильська корона"
  crown_castile_reform_desc: "Кастильська корона з'явилася в 1230 році, коли відбулося остаточне об'єднання королівств Кастилія та Леон. Ця країна прагнула гегемонії в #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! і стала однією з найсильніших країн на території #TOOLTIP:CONTINENT,europe,X #L Європи#!#!."
  portuguese_monarchy_reform: "[GetCountry('POR').GetAdjectiveWithNoTooltip]а монархія"
  portuguese_monarchy_reform_desc: "Попри те, що спочатку [GetCountry('POR').GetAdjectiveWithNoTooltip|l]а монархія мало відрізнялася від інших, з часом [GetCountry('POR').GetName] розробив[GetCountry('POR').Custom('end_fem')] іншу форму правління: більш сконцентровану навколо монарха, з ефективними важелями впливу на стани, а також націлену на отримання переваг від заморської торгівлі."
  spanish_tolerance: "Терпимість до народів Іберії"
  spanish_tolerance_desc: "У народів #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! безліч найрізноманітніших віросповідань. Було б величезною помилкою змусити всіх цих людей прийняти одну віру або вигнати тих, чиї релігійні переконання не подобаються правлячому класу: це принесло б нам більше шкоди, ніж користі. Якщо ми бажаємо своїй країні процвітання, то повинні терпимо ставитися до будь-яких вірувань."
  pyrenean_fueros_reform: "Піренейські фуерос"
  pyrenean_fueros_reform_desc: "#italic Фуерос#! — це записаний звід законів, які обмежують владу корони та забезпечують дотримання громадянських свобод. Правителі клянуться захищати #italic фуерос#! перед тим, як зійти на престол. #italic Фуерос#! — конституція нашої країни, яка встановлює верховенство права та закріплює баланс сил між монархами та їхніми підданими."
  school_of_first_letters_reform: "Школа грамоти"
  school_of_first_letters_reform_desc: "Школа грамоти, створена за підтримки муніципалітетів та духовних орденів, навчає людей не лише основам катехізису, але також буквам та цифрам. Якщо ми підтримаємо таку ініціативу, наші піддані навчаться читанню та письму і загалом стануть більш освіченими."
  sons_of_the_oak_reform: "Діти Арісти"
  sons_of_the_oak_reform_desc: "Ми продовжуємо велику справу свого засновника Іньїго Іньїгеса на прізвисько Аріста, що перекладається як #italic «дуб»#!. Подібно до цього могутнього дерева, наша країна стійко протистоїть будь-якій агресії, що загрожує її існуванню."
  system_of_councils_reform: "Об'єднані ради"
  system_of_councils_reform_desc: "Наша країна продовжує набирати силу, і настав час зібрати воєдино ради, на які спирається правитель. Нова система забезпечить більш скоординовану роботу органів влади та дозволить ефективніше керувати країною."
  the_jewel_of_alandalus_reform: "Перлина аль-Андалусу"
  the_jewel_of_alandalus_reform_desc: "Це єдине вціліле мусульманське королівство Аль-Андалусу. Великі мусульманські імперії в #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! з'являлися та зникали, розпадаючись на безліч уламків. Ми один із таких уламків, і наше покликання — об'єднати всю #TOOLTIP:REGION,iberia_region,X #L Іберію#!#! під своїм прапором."
  timurid_empire: "Імперія Тимуридів"
  timurid_empire_desc: "[ShowSubContinentName('central_asia')] — наша законна земля, адже саме тут процвітає імперія небачених розмірів, заснована великим Тамерланом. Розширення кордонів було і залишається пріоритетом нашої країни."
  por_ordinances: "[GetCountry('POR').GetAdjectiveWithNoTooltip]і ордонанси"
  por_ordinances_desc: "Цей звід канонічних римських і державних законів допоможе вирішити багато судових конфліктів і підвищить ефективність роботи уряду."
  anatolian_beylik: "Анатолійський бейлик"
  anatolian_beylik_desc: "Наш дім — неспокійна #TOOLTIP:REGION,anatolia_region,X #L Анатолія#!#!. Ми населяли прикордонні території Румського султанату, доки ця країна не розпалася. Більшість місць у нашому уряді займають досвідчені воїни та талановиті чиновники."
  mamluk_government: "Уряд мамлюків"
  mamluk_government_desc: "Влада султанату над безкраїм #TOOLTIP:REGION,egypt_region,X #L Єгиптом#!#! цілком спирається на підтримку сильного постійного війська. Представники вищого суспільства входять до фракцій цих впливових воїнів-рабів, які вирішують, як довго черговий правитель протримається при владі, і нерідко самі займають престол."
  persian_feudal_theocracy: "$IRA_ADJ$а феодальна теократія"
  persian_feudal_theocracy_desc: "Шах — абсолютний правитель #TOOLTIP:REGION,persia_region,X #L Персії#!#!. Він керує складною бюрократичною структурою, яка підтримує в країні порядок і рівновагу. Вся система діє в інтересах народу, оскільки посади в уряді не передаються у спадок, а призначаються за заслугами."
  divided_persian_aristocracy: "Роз'єднана перська знать"
  divided_persian_aristocracy_desc: "Військові аристократи нашої країни перебувають у постійній ворожнечі. Раніше вони відкрито намагалися протистояти шаху, а тепер постійно змагаються за його прихильність."
  ambrosian_republic_reform: "Амброзіанська республіка"
  ambrosian_republic_reform_desc: "Країною правлять вчені мужі та міські інтелектуали, а не усталена знать. Така форма правління заснована на інтелектуальних заслугах та участі громадян, а не на спадковому праві. Республіка утримує владу завдяки підтримці з боку освіченої еліти, хоча й стикається із засудженням тих, хто вбачає в ній загрозу усталеному порядку."
  petition_of_rights: "Петиція про право"
  petition_of_rights_desc: "Наш народ, особливо більш освічена його частина, давно вимагає закріпити за ним невід'ємні права, що сприятливо позначиться на співпраці різних станів і дасть поштовх до проведення цілої низки державних реформ ціною ослаблення центральної влади."
  judicate_reform: "Юдикат"
  judicate_reform_desc: "Юдикат — це унікальна форма правління, яка характеризується наявністю республіканських політичних інститутів, а також тим, що правитель обирається з членів верховного суду."
  diarchy_republic: "Діархія"
  diarchy_republic_desc: "Не можна віддавати всю владу в руки одній людині, інакше ми нічим не кращі за тиранів, які прагнуть підкорити наш народ.\nНехай посаду #italic капітана народу#! розділяють одразу двоє, один — із династії [ShowDynastyName('spinola_dynasty')], другий — із роду [ShowDynastyName('doria_dynasty')]. Завдяки цьому виконавча влада буде збалансована."
  great_and_minor_councils_of_genoa: "Велика та мала ради Генуї"
  great_and_minor_councils_of_genoa_desc: "Велика та мала ради Генуї — це два законодавчі органи, створені адміралом Андреа Доріа після реформації #L [GetCountry('GEN').GetAdjective|l]ого#! уряду. До великої ради входять #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містяни#!#!, а до малої — #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!."
  joint_ruling_monarchy: "Спільне правління"
  joint_ruling_monarchy.tt: "У правителя немає дорослого брата чи сестри"
  joint_ruling_monarchy.tt2: "Наш правитель та його брат чи сестра правитимуть по черзі, змінюючись кожні 5 років"
  joint_ruling_monarchy_desc: "Багато #L [GetCountry('GER').GetAdjective|l]их#! князів і досі дотримуються звичаю розділення влади зі своїми братами — розподіляють обов'язки з управління, спільно правлять своїми володіннями або навіть по черзі займають трон на певний термін."
  russian_absolutism: "Самодержавство"
  russian_absolutism_desc: "Тепер правитель може не зважати на думку радників."
  the_mestnichestvo: "Місництво"
  the_mestnichestvo_desc: "Місництво — це стародавня система, в межах якої державні посади видаються людям на основі давнини їхнього роду та старшинства всередині родини. Найбільш наочним проявом цієї системи був порядок, в якому бояри розсаджувалися за царським столом — він відображав їхній індивідуальний ранг та становище."
  state_controlled_church: "Церква під контролем країни"
  state_controlled_church_desc: "Церква повністю підпорядковується світській владі."
  swe_age_of_freedom: "Доба свободи"
  swe_age_of_freedom_desc: "Ми вступили в добу свободи, коли [ShowEstateTypeName('crown_estate')|l] втратили абсолютну владу! Уряд #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_GEN')|L]#!#! відтепер знаходиться в руках станів, і без нашого дозволу монарх не може робити нічого."
  ned_shipbuilding_industry: "Кораблебудівна промисловість у Данії"
  ned_shipbuilding_industry_desc: "З появою перших #italic флейтів#! у данському кораблебудуванні розпочався справжній бум. Від місцевих та закордонних замовників немає відбою, і верфі отримують гори золота! Ніколи ще данські корабели не були настільки затребуваними, а морями не ходило такої кількості суден, побудованих у нас."
  geheime_kabinettskanzlei: "Австрійська таємна служба"
  geheime_kabinettskanzlei_desc: "Чорний кабінет, заснований країною для таємного перехоплення та вивчення всієї кореспонденції, постачатиме нам відомості про поштову діяльність всередині країни. Наші вправні агенти прославляться на весь світ умінням непомітно розкривати, копіювати та повторно запечатувати офіційні документи."
  libertas_affectandi: "Libertas Affectandi"
  libertas_affectandi_desc: "Спочатку цей привілей був дарований династії фон Бабенбергів, що правила до нас. Він дозволяє правителю самому обирати спадкоємця, якщо у нього немає прямого нащадка по чоловічій лінії. Так наша династія зможе зберегти свої володіння навіть у найважчі часи."
  joyous_entry_reform: "Радісний в'їзд"
  joyous_entry_reform_desc: "«Радісний в'їзд» 1356 року — це декларація прав і свобод мешканців Брабанту, свого роду #italic Велика хартія вольностей#! для історичних Нідерландів. Документ був запропонований герцогом Жаном III, а пізніше закріплений Йоганною та Вацлавом Баварськими. Прийняття декларації довелося відкласти через вторгнення Людовика II, до неї повернулися в жовтні 1356 року, коли патріоти на чолі з Еверардом Серкласом відвоювали Брюссель. «Радісний в'їзд» встановлював свободи для церкви, міст і знаті, а також закріплював згоду на збір податків і положення про неподільність Брабанту."
  frisian_freedom_reform: "Фризька свобода"
  frisian_freedom_reform_desc: "Під Фризькою свободою розуміється незламність мешканців Фрисландії, а також їхнє неприйняття феодалізму та кріпацтва. Ці люди обирають представників серед землевласників і незалежно керують своїми територіями. Якщо серед них з'явиться лідер, він повинен поважати свободи свого народу, інакше він нічим не відрізняється від зовнішніх та внутрішніх ворогів країни і його чекає така ж доля."
  dutch_republic_reform: "Республіка Сполучених провінцій"
  dutch_republic_reform_desc: "Це республіка, правитель якої (#italic штатгальтер#!) служить усе життя. Зазвичай фракції, які підтримують таку форму правління, сперечаються про структуру влади штатгальтера. Патріоти хочуть, щоб штатгальтер правив як #italic Primus inter Pares#! (лат. «перший серед рівних»), тоді як оранжисти бажають бачити в обраному правителі подобу монарха."
  ancient_french_taxation: "Давня [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]а система оподаткування"
  ancient_french_taxation_desc: "Історично податки безсистемно вводилися та збиралися лише в часи потреби, а не на постійній основі."
  fra_ancient_french_taxation_removal_conditions: "Можна видалити вручну, досягнувши рівня #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L підпорядкування#!#! в #G +50.00#!, або за допомогою [Concept('dynamic_historical_event', 'динамічної історичної події')|e] «$flavor_fra.1.title$»."
  basic_timariot_system: "Тимарна система"
  basic_timariot_system_desc: "Система феодальних землеволодінь, спрямована на створення сильної кавалерії. Наші вершники-сипахи отримають земельні наділи та зобов'язуються виставляти кавалерійські сили, співмірні величині їхніх володінь."
  expanded_timariot_system: "Вдосконалена тимарна система"
  expanded_timariot_system_desc: "Система військових ленів для сипахів, які складають основу кавалерії, була розширена. Для розвитку кавалерії виділено великі території завойованих земель."
  legacy_of_osman: "Спадщина Османа"
  legacy_of_osman_desc: "Спадщина Османа — це віра в божественне право на розширення кордонів під верховною духовною та політичною владою нашого правителя. Ми посилаємося на цю спадщину, щоб виправдати наші завоювання, зберегти легітимність династії на різнорідних територіях та створити імперію, яка не просто підкоряє народи, а інтегрує їх. Нездатність дотримуватися спадщини можуть розцінити як зраду звичаїв нашого народу."
  enderun_interior_service: "Ендерун"
  enderun_interior_service_desc: "В Ендеруні — внутрішніх покоях султанського палацу — організована складна система. Вона складається з кількох частин: «Особисті покої», «Скарбнича палата», «Палата економа», «Велика палата» та «Мала палата». У її лавах перебувають євнухи, хлопчики-раби, карлики та німі, які часом мають значний вплив на внутрішні справи країни."
  ottoman_imperial_harem: "Гарем-і Хумаюн"
  ottoman_imperial_harem_desc: "Султанський гарем — це не просто збіговисько гарненьких наложниць, що прислуговують правителю. Це жіночий аналог Ендеруна зі своєю структурою, статутом та освітньою системою. Хоча жінки гарему змушені діяти приховано, часом вони мають великий вплив на повелителя, особливо якщо їхньою посередницею виступає валіде-султан — мати султана, яка вважається хранителькою влади."
  ottoman_eunuch_viziers: "Євнухи-візири"
  ottoman_eunuch_viziers_desc: "Євнухам, що добре проявили себе, можна давати престижні посади, такі як голова чорних євнухів (Кизляр-ага) або голова білих євнухів (Капи-ага). Крім іншого, голови здійснюють взаємодію між носіями влади, до яких належить правитель і [GetCountry('TUR').Custom('GetHeadOfCabinetName')], гарем і пажі, а також нагляд за вакуфним майном та навчанням [GetCountry('TUR').GetGovernment.GetAdjective|l]их принців. Вони куди надійніші за звичайних чоловіків і завжди працюють на благо країни."
  sekban_system: "Секбани"
  sekban_system_desc: "Секбани — це найманці, яких набирають з #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міського#!#! населення. Їх утримання фінансується за рахунок особливого податку під назвою #italic «секбан акчесі»#!. Як правило, це нове бойове ядро війська являє собою піхоту, озброєну мушкетами, і постійно ворогує з яничарами."
  ottoman_malikane_tax_reform: "Малікяне"
  ottoman_malikane_tax_reform_desc: "Після реформування системи муката була впроваджена нова, під назвою «малікяне». Вона дозволяє селянам викуповувати довічне право збору податків з оброблюваних ними земель, надає їм більше захисту та спонукає вкладати кошти в довгостроковий економічний розвиток їхнього регіону. Основна проблема цієї системи полягає в тому, що за таких довічних володінь стає важче забезпечувати верховенство закону."
  ottoman_coffee_house_espionage: "Шпигунство в кав'ярнях"
  ottoman_coffee_house_espionage_desc: "Кав'ярні та інші міські заклади якнайкраще підходять для шпигунства. В інтересах державної безпеки ми наповнимо ці місця вірними нам шпигунами та інформаторами."
  ottoman_new_order_army: "Нізам-і Джедід"
  ottoman_new_order_army_desc: "Підсумок радикальної військової реформи, армія нового зразка багато в чому покладається на іноземних інструкторів, західну тактику та озброєння, а також на реорганізований артилерійський корпус. Нехай вона приведе нас до нових перемог і ще сильніше скоротить неспокійний вплив застарілих яничарів."
  expanded_posadnichestvo_office: "Збільшення числа посадників"
  expanded_posadnichestvo_office_desc: "Посадник займає впливове становище в Новгороді. Щоб не зосереджувати владу в одних руках, потрібно збільшити число людей, які можуть займати цю посаду одночасно. Призначені посадниками #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знатні особи#!#! будуть контролювати один одного."
  sovet_gospod: "Рада панів"
  sovet_gospod_desc: "Рада панів — орган управління в республіці. Цей інститут відрізняється від віча тим, що тут основним впливом володіють посадники, тисяцькі та інші #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знатні особи#!#!, а #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщани#!#! та #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюд#!#! відіграють незначну роль."
  ruling_commission_of_england: "Регентський комітет"
  ruling_commission_of_england_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! фактично привласнила собі королівство та керує країною в ролі регентів. Монарх сильно обмежений у своїх повноваженнях і поступово втрачає право на владу. Становище регентів може змінитися, якщо комітет позбудеться підтримки парламенту або якщо законний правитель збере достатньо прихильників, щоб повалити зазнайкувату знать."
  bank_of_england_reform: "Банк країни $ENG$"
  bank_of_england_reform_desc: "Цей банк — централізований впливовий інститут, що складається з впливових фінансистів, він значно підвищує нашу надійність та здатність розплачуватися з боргами. Його мета — управління фінансами та допомога у стабілізації урядових позик."
  banu_hummay_amendments: "Поправки Бану Хумая"
  banu_hummay_amendments_desc: "Цей заплутаний звід законів про престолонаслідування та порядки державного управління нав'язує правлячій династії низку релігійних обов'язків і вимагає від неї демонструвати правовірність."
  kbo_clan_heads_reform: "Рада голів кланів"
  kbo_clan_heads_reform_desc: "Якщо ми почнемо звертатися за порадою до найвпливовіших кланів, то зможемо забезпечити стабільність правління, а можливо, навіть принести своїм землям процвітання."
  manden_kurufa_reform: "Манден Куруфа"
  manden_kurufa_reform_desc: "$manden_kurufa_reform$, або Манденська Федерація, — форма правління [GetCountry('MAL').Custom('endlong_predlog_vvo')] [GetCountry('MAL').Custom('longname_ru_PREP')]. Усе почалося з так званих #italic «Дванадцяти дверей»#! — особистих володінь манси. Згодом до них приєдналася ціла низка союзних і підкорених країн, кожна з яких мала політичний вплив у масштабі країни."
  benevolence_tax_reform: "Добровільний податок"
  benevolence_tax_reform_desc: "$benevolence_tax_reform$ стягується з #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#!, яка має великі накопичення або живе на широку ногу, оскільки вони можуть без зусиль вносити більший внесок у поповнення скарбниці. Подібна політика дозволяє зняти частину податкового тягаря з бідняків."
  navy_board_reform: "Флотська колегія"
  navy_board_reform_desc: "$navy_board_reform$ — це центральний управлінський орган, що займається справами військово-морського флоту. Він підвищує ефективність бойових дій у морі та оптимізує розподіл ресурсів."
  haudenosaunee_clan_mothers: "Матері кланів хауденосауні"
  haudenosaunee_clan_mothers_desc: "Найбільшим авторитетом у племенах хауденосауні мають так звані #italic іакойанес#!, або матері кланів. Вони відповідають за внутрішні справи племені, а також за обрання ройанерів — це чоловіки, які представляють інтереси свого клану на загальній раді хауденосауні."
  andean_monarchy: "Андська монархія"
  andean_monarchy_desc: "Це державна реформа, поширена серед корінних жителів #TOOLTIP:REGION,andes_region,X #L Анд#!#!. Порядки престолонаслідування тут тісно переплетені з духовними віруваннями, тому правителі, які тільки приходять до влади, не повинні володіти мирським майном."
  tawantinsuyu_monarchy: "Монархія Тауантінсуйу"
  tawantinsuyu_monarchy_desc: "Ця державна реформа прийшла до Імперії інків зі звичної монархії та згодом була доповнена. Релігійні вірування тут міцно переплетені з порядками престолонаслідування: правителі, які тільки приходять до влади, не мають абсолютно ніякого майна."
  reformed_tawantinsuyu_government: "Реформований уряд Тауантінсуйу"
  reformed_tawantinsuyu_government_desc: "Ця державна реформа докорінно змінює саму основу управління Імперією інків: вона скасовує усталену систему #italic панака#!, яка захищала володіння та майно померлого правителя і тому змушувала наступного Сапа Інко захоплювати нові землі. Замість цього тепер уся влада цілком переходить до рук нового володаря."
  court_of_the_star_chamber_reform: "Суд Зоряної палати"
  court_of_the_star_chamber_reform_desc: "$court_of_the_star_chamber_reform$ розглядає складні та делікатні справи — від лжесвідчення до різного роду змов, — які не можна довірити звичайним судам. Попри високу ефективність цього органу, багато хто критикує його за зловживання владою та відсутність правових гарантій. Крім того, є підстави вважати, що високопоставлені чиновники користуються цим судом як політичним інструментом."
  gabelle: "Габель"
  gabelle_desc: "Ця державна реформа дозволяє вводити податок на #TOOLTIP:GOODS,salt,X #L сіль#!#!. Така міра забезпечить значний приплив золота до скарбниці, але населенню доведеться дуже нелегко."
  fra_code_louis: "Звід законів Луї"
  fra_code_louis_desc: "Століттями на півночі та півдні [GetCountry('FRA').Custom('CL_GEN')] діяли розрізнені правові норми, доки не було прийнято звід #italic законів Луї#!, що об'єднав [GetCountry('FRA').Custom('CL_ACC')] в межах універсальної законодавчої системи."
  crusade_sea_reform: "Хрестоносці в морі"
  crusade_sea_reform_desc: "Наш орден суттєво змінився, коли ми переключилися із захисту замків у Святій землі на морські битви з піратами та безбожниками. Тепер галери стали для нас і полями битви, і надійними бастіонами, що стримують ворогів Христа."
  representative_parliament_reform: "Представницькі збори"
  representative_parliament_reform_desc: "$representative_parliament_reform$ кардинально змінює політичні процеси. Зазвичай місця в зборах отримували лише представники еліти та привілейованих станів. Тепер же потрапити туди можуть і люди незнатного походження, зокрема [ShowPopTypeName('peasants')|l]."
  japanese_imperial_family: "$JAP_ADJ$ий імператорський дім"
  japanese_imperial_family_desc: "Вихідці з династії #TOOLTIP:DYNASTY,$yamato_dynasty_tt$,X #L Ямато#!#!, які, як вони самі кажуть, походять від самої богині сонця Аматерасу, століттями займають Хризантемовий трон."
  japanese_clan: "Японські клани"
  japanese_clan_desc: "Імператорський дім виявився не в змозі ефективно керувати сільською місцевістю, і за справу взялися численні самурайські клани. Вони створили свої центри влади та активно змагаються один з одним, чому чимало сприяє воєнізована структура уряду на чолі з сьогуном."
  daimyo: "Даймьо"
  daimyo_desc: "$daimyo$ — могутні японські землевласники — безроздільно панують над територією своїх кланів, мають власні війська та збирають податки з місцевих жителів. $JAPANESE_SHOGUNATE_LEADER_MALE$ теж рахується з цими феодалами, адже найвпливовіші з них навіть здатні кинути виклик центральній владі."
  shogunate: "Сьогунат"
  shogunate_desc: "$JAPANESE_SHOGUNATE_LEADER_MALE$, голова військового уряду #ONCLICK:COUNTRY,[GetCountry('JAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('JAP').Custom('CL_tt')],X [GetCountry('JAP').Custom('CL_GEN')|L]#!#!, панує над кожним кланом. Принаймні над тими з них, кому не вистачає сміливості йому протистояти…"
  jap_rangaku: "Ранґаку"
  jap_rangaku_desc: "Ми заохочуємо вивчення західної культури. Одні побоюються, що це спричинить розкол у нашому суспільстві, інші вважають, що ми просто не можемо чинити інакше, адже досвід жителів Заходу становить для нас величезну цінність."
  shogunate_kanrei_council: "Рада канрея"
  shogunate_kanrei_council_desc: "Рада канрея прагне налагодити міцніші відносини між сьогуном та #TOOLTIP:SPECIAL_STATUS,shugo_daimyo,X #L даймьо-сюґо#!#! #TOOLTIP:REGION,japan_region,X #L Японії#!#!, а тому дозволяє радникам даймьо-сюґо давати рекомендації сьогуну, не нехтуючи при цьому взаємодією один з одним. Старші радники також зобов'язані брати на себе справи інших його учасників — слабших кланів."
  jap_kanrei_reform_when_no_longer_leader_of_shogunate: "Цю [Concept('government_reform', 'державну реформу')|e] буде видалено, якщо #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L Японський Сьогунат#!#! припинить існування або ми перестанемо бути його лідером."
  warring_state: "Воююча країна"
  warring_state_desc: "Це царство Піднебесної імперії повстало проти нинішнього Сина Неба. Влада повністю зосереджена на агресивній політиці військової експансії, і всі адміністративні справи відкладаються в довгий ящик."
  altepetl: "Альтепетль"
  altepetl_desc: "Альтепетлі — це міста-країни, які діляться на адміністративні округи, що називаються #italic кальпуллі#!. Ці країни зі спадковим типом правління є суверенними утвореннями зі своїми сферами впливу та дипломатичними відносинами."
  reformed_nahuatl_society: "Реформоване науаське суспільство"
  reformed_nahuatl_society_desc: "В основу нового політичного устрою лягла низка сучасних законодавчих реформ, а також принципів, спрямованих на зміцнення централізації. В умовах сильної центральної влади та за належної уваги до деталей ця правова основа посприяє розквіту великої держави, яка дотримується #TOOLTIP:RELIGION,$nahuatl_tt$,X #L науаських#!#! вчень."
  grand_remonstrance_reform: "Велика ремонстрація"
  grand_remonstrance_reform_desc: "$grand_remonstrance_reform$ являє собою список положень, спрямованих на розділення влади. Укладачі та підписанти цього акта вимагають ще більше обмежити владу монархії та заборонити духовенству займати місця в парламенті. Крім того, вони пропонують посилити підтримку парламенту та спростити бюрократичні процедури."
  overhauled_admiralty_reform: "Реформоване адміралтейство"
  overhauled_admiralty_reform_desc: "$overhauled_admiralty_reform$ — спроба модернізації вищого органу управління королівським флотом. Ця ініціатива покликана перетворити наш військово-морський флот на грізну силу та закласти основу для подальших успіхів країни на океанському та морському театрах військових дій."
  european_militia_reform: "Ополчення Ширлі"
  european_militia_reform_desc: "$european_militia_reform$ передбачає повну реорганізацію та перепідготовку наших збройних сил з акцентом на модернізацію артилерії та кавалерії за європейським зразком. Ця реформа зміцнить військову міць #ONCLICK:COUNTRY,[GetCountry('IRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('IRA').Custom('CL_tt')],X [GetCountry('IRA').Custom('CL_GEN')|L]#!#! та поставить військо країни на один рівень із ворожим."
  legacy_of_kublai_khan: "[GetCharacter('kublai_khan').GetNameWithNoTooltip] та його спадщина"
  legacy_of_kublai_khan_desc: "[GetCharacter('kublai_khan').GetName] прославився тим, що зміцнив нашу владу в Китаї. Він присвоїв собі #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайський#!#! титул «хуанді» #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. Ми не втратимо Трон Дракона, якщо будемо наслідувати його приклад."
  three_departments_system: "Три департаменти"
  three_departments_system_desc: "$three_departments_system$ та шість міністерств — ключова система управління нашою країною, що збереглася з часів стародавніх китайських імперій. Кожен департамент відповідає за кілька напрямків розробки, впровадження та перегляду різних політичних заходів. Міністерства — це шість головних виконавчих органів країни, у кожного з яких свій напрямок: працевлаштування, оподаткування, церемонії, військова справа, дотримання правопорядку та громадські роботи."
  unlocked_mandarin_language_reforms_tt: "Відкрито за допомогою [Concept('event', 'події')|e]"
  empower_the_eunuchs: "Нові повноваження євнухів"
  empower_the_eunuchs_desc: "Євнухи можуть принести велику користь. Їх вважають найнадійнішими слугами, тому що вони ніколи не втручаються в династичну політику. Потрібно дати їм гарну освіту, щоб вони могли займати важливі посади в уряді."
  single_whip_law: "Закон одного батога"
  single_whip_law_desc: "Єдиний податковий режим допоможе ефективніше збирати податки. З цього моменту сплачувати державні податки можна тільки і виключно #TOOLTIP:GOODS,silver,X #L сріблом#!#!."
  chi_peasant_empire_reform: "Влада для народу"
  chi_peasant_empire_reform_desc: "Багато #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! династій завдячують своїм існуванням підтримці з боку #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#!, але тільки наш рід розуміє, наскільки велику роль у країні відіграють селяни. Ні в яку іншу добу існування #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної Країни#!#! люди не підтримували владу настільки гаряче."
  samsa_system: "Самса"
  samsa_system_desc: "Самса, або #italic Три відомства#!, — збірна назва трьох основних органів управління нашої країни. $samsa_system$, куди обираються найдостойніші та найосвіченіші члени суспільства, утворює систему стримувань і противаг як для правителя, так і для чиновників."
  kor_daedongbeob: "Тедонбоп"
  kor_daedongbeob_desc: "#italic Закон про єдиний податок#!, або $kor_daedongbeob$ — це система оподаткування, заснована на одноманітних виплатах #TOOLTIP:GOODS,wheat,X #L пшеницею#!#!. Ці реформи покращують життя #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюду#!#! та надають #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщанам#!#! нові можливості для торгівлі."
  son_in_law_rule: "Правило «зятя»"
  son_in_law_rule_desc: "Наша країна пов'язана міцними сімейними узами з китайськими землями під владою #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монголів#!#!. Поточний уряд країни виконує волю так званого «зятя» — королівської династії Юань, — і наші монархи зобов'язані брати за дружин монгольських принцес."
  kor_sadae_reform: "Політика саде"
  kor_sadae_reform_desc: "$kor_sadae_reform$ сприяє близьким відносинам #TOOLTIP:REGION,korea_region,X #L Кореї#!#! та Китаю, в яких перша розглядається як молодший партнер другого. У таких відносинах ми підкоряємося #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній Країні#!#! і повинні намагатися всіляко догоджати #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайцям#!#!."
  holy_imperial_monarchy_reform: "Монархія Священної імперії"
  holy_imperial_monarchy_reform_desc: "Наша країна досягла піку величі. Ми єдині законні спадкоємці Римської імперії: влада дарована нам згори, і ніхто не може її оскаржити."
  pru_unified_legal_system: "Єдина правова система"
  pru_unified_legal_system_desc: "Ціною величезних зусиль ми уніфікували свої внутрішні правові системи, викорінили всі зловживання та неправомірну поведінку, а також створили професійну судову систему."
  peuplierung_system: "Пойплірунг"
  peuplierung_system_desc: "$peuplierung_system$ — програма, спрямована на залучення іммігрантів до малонаселених регіонів країни."
  livonian_confederation: "Лівонська конфедерація"
  livonian_confederation_desc: "#TOOLTIP:AREA,baltic_area,X #L Балтійські#!#! землі вже давно позбавлені єдності та роздроблені на численні єпископства та васалітети, підвладні іншим країнам. І замість того, щоб об'єднати Terra Mariana в єдину централізовану країну, ми приймемо її розрізнену природу."
  haixi_jurchen_reform: "Хайсійські чжурчжені"
  haixi_jurchen_reform_desc: "$haixi_jurchen_reform$ — представники #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженського#!#! народу, які, на відміну від цзяньчжоуських чжурчженів, в основному займаються скотарством, а не сільським господарством. У їхніх звичаях простежується сильний #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольський#!#! вплив."
  jianzhou_jurchen_reform: "Цзяньчжоуські чжурчжені"
  jianzhou_jurchen_reform_desc: "$jianzhou_jurchen_reform$ — осілі представники #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженського#!#! народу, значною мірою споріднені з китайцями. Вони живуть за рахунок сільського господарства та ведуть активну торгівлю з найближчими #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайськими#!#! містами."
  yeren_jurchen_reform: "Дикі чжурчжені"
  yeren_jurchen_reform_desc: "$yeren_jurchen_reform$ — представники #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженського#!#! народу, що проживають у малозаселених регіонах і ведуть прадавній спосіб життя. Вони не так діяльно займаються сільським господарством, а прожиток здобувають в основному збиральництвом та полюванням."
  lifan_yuan: "Ліфаньюань"
  lifan_yuan_desc: "$lifan_yuan$ — міністерство, яке управляє територіями та політикою Внутрішньої #TOOLTIP:CONTINENT,asia,X #L Азії#!#!, наприклад провінціями в #TOOLTIP:REGION,mongolia_region,X #L Монголії#!#!, #TOOLTIP:REGION,tibet_region,X #L Тибеті#!#! та #TOOLTIP:REGION,xinjiang_region,X #L Сіньцзяні#!#!, а за необхідності — і землями в глибині континенту."
  prikazi_reform: "Прикази"
  prikazi_reform_desc: "$prikazi_reform$ дозволяють удосконалити систему управління державною бюрократією. Вони являють собою низку відомств, що відповідають за різні сфери, зокрема оподаткування, судочинство, військову справу та торгівлю. Такий поділ дозволить значно прискорити виконання волі царя."
  razriadnyi_reform: "Розрядний приказ"
  razriadnyi_reform_desc: "$razriadnyi_reform$ вводить переписну книгу для обліку населення, майна та податків. Така книга, куди вносяться записи на регулярній основі, дозволяє оцінювати виконання військових обов'язків серед станів, а також вести список власників земель та маєтків із зазначенням усіх податкових виплат."
  byzantine_court_ceremonies_reform: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]і придворні церемонії"
  byzantine_court_ceremonies_reform_desc: "$byzantine_court_ceremonies_reform$ — це збірник протоколів ключових церемоній #L [GetCountry('BYZ').GetAdjective|l]ого#! двору. Він допомагає забезпечити неухильне дотримання законів придворного етикету, що, своєю чергою, піднімає престиж та посилює вплив правлячої еліти."
  voivode_reform: "Воєвода"
  voivode_reform_desc: "$voivode_reform$ — це нова військова та адміністративна посада, яка передбачає кураторство управління та оборони великих територіальних одиниць. Воєводи приносять присягу безпосередньо правителю."
  chosen_rada_reform: "Вибрана рада"
  chosen_rada_reform_desc: "$chosen_rada_reform$ — це рада наближених до правителя осіб, яка виконує управлінську, політичну та розпорядчу функції. Внаслідок діяльності цього органу вищий стан втратить частину свого впливу."
  council_of_forty: "Рада Сорока"
  council_of_forty_desc: "Рада Сорока, або #italic Кварантія#!, — вищий конституційний орган #L [GetCountry('VEN').GetAdjective]ої#! Республіки. Хоча формальним главою країни є дож, справжня влада знаходиться в руках чиновників з цієї ради."
  council_of_ten: "Рада Десяти"
  council_of_ten_desc: "Рада Десяти — ключовий орган управління #L [GetCountry('VEN').GetAdjective]ої#! Республіки, до обов'язків якого входять головним чином обрання дожа та контроль за діяльністю патриціїв. Де-факто цій структурі належить влада над Венецією, і її повноваження охоплюють цілу низку питань безпеки країни."
  full_college: "Загальна колегія"
  full_college_desc: "Цей виконавчий орган стежить за тим, як сенат справляється зі своїми повсякденними обов'язками. Члени колегії задають порядок денний та визначають, які питання будуть винесені на обговорення."
  signoria_of_venice: "Синьйорія [GetCountry('VEN').Custom('CL_GEN')]"
  signoria_of_venice_desc: "Синьйорія — це вищий орган управління [GetCountry('VEN').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_PREP')|L]#!#!. Одне з найважливіших завдань цього інституту — забезпечувати комунікацію між людьми, що займають ключові пости. Боротьба за владу, яку дож та радники вели десятиліттями, нарешті добігає кінця."
  promissione_ducale_reform: "Обіцянки дожів"
  promissione_ducale_reform_desc: "Обіцянка дожів — це офіційна присяга, яку складають #L [GetCountry('VEN').GetAdjective|l]і#! дожі при вступі на посаду, а також договір, який вони зобов'язуються дотримуватися."
  standardized_relazioni_reform: "Стандартизація реляціоні"
  standardized_relazioni_reform_desc: "Реляціоні — це звіти, які наші посли представляють уряду. Там містяться докладні відомості про політичний, фінансовий та соціальний стан країн, у яких вони працюють."
  indian_sultanate_reform: "Індійський султанат"
  indian_sultanate_reform_desc: "#TOOLTIP:RELIGIONGROUP,muslim,X #L Мусульманська#!#! меншість, яка стоїть на чолі індійських султанатів, була змушена підлаштовуватися під складні реалії. Наприклад, їм довелося переглянути систему «зіммі»: у цих ісламських країнах до зіммі відносять не тільки християн та юдеїв, а й послідовників дхармічних релігій."
  vij_astadiggajas: "Аштадіггаджа"
  vij_astadiggajas_desc: "Аштадіггаджа, що в перекладі з хінді означає #italic «слони восьми сторін світу»#!, — збірний титул, який присвоюється придворним #TOOLTIP:CULTURE,$telugu_tt$,X #L телузьким#!#! богословам та поетам. Їхні твори мають величезний вплив на творчість нашої культури та передвіщають початок нового золотого віку художніх та інтелектуальних досягнень."
  nayankara_system: "Система наякара"
  nayankara_system_desc: "Розділення більшості територій між наяками дозволить ефективніше управляти нашими володіннями та проводити більш успішні військові операції. Наяки зобов'язуються управляти цими землями, дбати про міста, храми та поселення там, а також надавати воїнів для захисту та розширення нашої країни."
  mug_mughal_diwan: "Монгольський диван"
  mug_mughal_diwan_desc: "Якщо століття завоювань нас чомусь і навчили, так це тому, що ми повинні вміти переймати уклад корінного населення завойованих територій та вбудовувати його у власну культуру. Якщо ми будемо вчитися у підкорених народів, наша імперія продовжить розширюватися."
  taluqdar_nobility: "Талукдари"
  taluqdar_nobility_desc: "Талукдари — представники благородних родів — мають у розпорядженні обширні території, збирають податки з місцевих жителів, відіграють важливу роль при дворі та мають значний вплив на нашу архітектуру та економіку. По суті ці могутні землевласники є місцевою версією вищої знаті."
  mhr_ashta_pradhan: "Ашта прадхан"
  mhr_ashta_pradhan_desc: "$mhr_ashta_pradhan$ — #italic сучасна рада урядовців#! — представляє інтереси #TOOLTIP:LANGUAGE,marathi_language,X #L маратхів#!#!. Ця рада відає найрізноманітнішими державними справами, зокрема військовими, фінансовими, дипломатичними та релігійними."
  theme_system: "Фемна система"
  theme_system_desc: "Під системою фемів розуміється сукупність штабів та військ, очолювана стратигом. [GetCountry('BYZ').GetFlavorRank] довіряє стратигу захист місцевих жителів, а також виконання власних управлінських рішень. Фемна система прийшла на зміну провінційній системі діоцезів і відтоді активно розвивалася."
  byz_theme_system_not_obselete_tt: "Фемна система не застаріла внаслідок [Concept('event', 'події')|e]"
  kritai_katholikoi: "Критай катхолікой"
  kritai_katholikoi_desc: "«Криті кафоліки», або просто #italic «судді всіх римлян»#!, — вищий орган #L [GetCountry('BYZ').GetAdjective|l]ої#! судової влади, який [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'заснувала', 'заснував' )] [GetCharacter('byz_andronikos_ii_palaiologos').GetName]. Спочатку туди входило дванадцять представників світського та духовного судів, пізніше їх кількість скоротилася до чотирьох. Цей орган має безпрецедентний рівень влади, і його вирок не може бути оскаржений."
  speransky_liberalization_reform: "Ліберальні реформи Спєранського"
  speransky_liberalization_reform_desc: "$speransky_liberalization_reform$ передбачають створення регіональних дум — нових органів законодавчої та виконавчої влади. Як структура-посередник між царем і думами виступає [ShowPolicyName('dop_law_state_council')|l]. Завдання останнього — допомога в розгляді та підготовці запропонованих законопроєктів."
  collegium_reform: "Колегії"
  collegium_reform_desc: "$collegium_reform$ — це низка державних відомств, створених для підвищення ефективності бюрократичної структури. Кожне таке відомство діє у своїй сфері, що дозволяє уникнути плутанини в обов'язках. При розгляді питань колегії повинні керуватися спеціальними протоколами."
  rule_of_the_sejm: "Сейм"
  rule_of_the_sejm_desc: "#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! має необмежену владу. Вони керують [GetCountry('POL').Custom('parliament_ru_INST')|l] — тобто ключовим інструментом політичного впливу — і визначають, яким шляхом піде наша країна. На краще вона рухається чи на гірше, покаже лише час."
  nakaz_reform: "Наказ"
  nakaz_reform_desc: "$nakaz_reform$ — це повний перегляд і спрощення правових норм, а також важливий крок у бік рівності, справедливості та терпимости, тут знайшли своє відображення ідеї Просвітництва. #TOOLTIP:CONTINENT,europe,X #L Європа#!#! вступила в добу реформ, і цей документ — данина новим віянням."
  austrian_archduchy_reform: "Ерцгерцогство [GetCountry('HAB').GetNameWithNoTooltip]"
  austrian_archduchy_reform_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! дарує нам #italic Privilegium Maius#! (лат. «велика привілей»), і ми займаємо особливе становище серед її принців. Тепер ми не просто герцоги, а ерцгерцоги. Новий статус підвищує наш престиж не тільки на території імперії, а й за її межами."
  reichshofrat_reform: "Надвірний рад"
  reichshofrat_reform_desc: "Надвірний рад служить вищим судово-адміністративним органом #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#! та наддержавного союзу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, що посилює наш контроль як над васалами в нашому безпосередньому підпорядкуванні, так і над васалами імперії."
  hab_geheimer_rat: "Таємна рада"
  hab_geheimer_rat_desc: "Таємна рада (Geheimer Rat), куди входять високопоставлені дворяни, урядовці та наближені особи, є вищим дорадчим органом при монарху. Вона відіграє вирішальну роль у визначенні політики імперії."
  bohemian_commonwealth_reform: "[GetCountry('BOH').GetAdjectiveWithNoTooltip]е співдружність"
  bohemian_commonwealth_reform_desc: "В основі співдружності лежить реформована конституція [GetCountry('BOH').Custom('rank_ru_GEN')|l], яка надає більше привілеїв та свобод нашим народам."
  kritai_katholikoi_reformed: "Оновлений Критай катхолікой"
  kritai_katholikoi_reformed_desc: "[GetCharacter('byz_andronikos_ii_palaiologos').GetName] [Select_CString(GetCharacter('byz_andronikos_ii_palaiologos').IsFemale, 'створила', 'створив' )] успішну юридичну систему, однак їй були притаманні вроджені недоліки, завдяки яким судді нерідко керувалися особистим інтересом. Нова реформа спрощує чинні процеси судочинства та дозволяє побороти корупцію серед верховних суддів."
  modern_imperial_army: "Сучасне імперське військо"
  modern_imperial_army_desc: "$theme_system$, яка роками застосовувалася [GetCountry('BYZ').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_PREP')|L]#!#!, показала свою неспроможність: вона посилила владу полководців і намісників, а позиції правителя, навпаки, послабила. Тому ми створили нове імперське військо, де вояк — це професія, а не обов'язок."
  byz_reformed_imperial_army_tt: "Внаслідок [Concept('event', 'події')|e] створено сучасне імперське військо"
  omani_overseas_ambitions_reform: "Заморські території"
  omani_overseas_ambitions_reform_desc: "Ідеї про підкорення заморських земель та заснування колоній існують з давніх часів. Ми вивчили сучасні методи колоніалізму, зокрема прогресивні способи управління заморськими територіями. Це дозволить нам успішно застосувати отримані знання на практиці та створити свою колоніальну імперію."
  seven_provinces: "Сім провінцій"
  seven_provinces_desc: "Замість того, щоб встановити безроздільну владу правителя над своїми землями, ми розділили країну на сім провінцій, кожна з яких переслідує свої цілі, але при цьому підпорядковується нам."
  unified_admiralty_reform: "Єдине адміралтейство"
  unified_admiralty_reform_desc: "Адміралтейство не повинно розділятися і може служити тільки нашій країні. Тому ми об'єднали численні дрібніші адміралтейства нашої країни в єдину структуру."
  powerful_vizierships_reform: "Могутні візири"
  powerful_vizierships_reform_desc: "Ця група сановників за впливом перевершує навіть правителя і міцно утримує владу в своїх руках, а султан — лише їхня маріонетка."
  songhai_professional_army_reform: "Войовниче суспільство [GetCountry('SON').Custom('CL_GEN')]"
  songhai_professional_army_reform_desc: "Вправним вояком не може бути кожен охочий, тому краще чітко розділяти селян і фахових військових. Поділивши країну на військові округи, ми дозволимо намісникам створювати свої професійні війська. Тоді країна і правитель будуть надійно захищені."
  autonomous_swiss_cantons_reform: "Автономні кантони Швейцарії"
  autonomous_swiss_cantons_reform_desc: "Швейцарські кантони зберегли майже всю свою незалежність та вплив навіть у нашій єдиній країні, оскільки вона дотримується тих самих ідеалів, що й незалежний союз, який існував раніше."
  zur_guild_constitution: "Конституція гільдій"
  zur_guild_constitution_desc: "Нашими володіннями керуватимуть 26 членів великої та малої ради — це багаті купці, гільдійські ремісники та знатні люди. Місця будуть розділені порівну, щоб жодна група не становила більшості. Таким чином радники виражатимуть волю народу та своєї спільноти."
  dan_the_kings_law: "Королівський закон"
  dan_the_kings_law_desc: "Королівський закон — це конституція #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#!, що закріплює абсолютну владу короля. Завдяки цьому закону монарх стає верховним правителем, у чиїх руках зосереджені всі гілки влади: законодавча, виконавча та судова."
  dan_college_of_missions: "Місіонерський коледж"
  dan_college_of_missions_desc: "Місіонерський коледж — це #L [GetCountry('DAN').GetAdjective|l]а#! організація, що фінансується країною. Її мета — допомога в місіонерській діяльності та навернення населення в істинну віру."
  kilwan_trade_communities: "$ZAN_ADJ$і торгові спільноти"
  kilwan_trade_communities_desc: "Ці спільноти являють собою низку незалежних конфедерацій і виступають за місцеву автономію та урбанізацію. Найчастіше ними керує намісник, який зміцнює владу купців. Їхня торговельна діяльність — важливе джерело стабільного доходу для нашої скарбниці."
  control_of_the_mahdali_coinage_reform: "Контроль над карбуванням Махдалі"
  control_of_the_mahdali_coinage_reform_desc: "Наша могутня династія випускає свої монети, які обертаються на ринках багатьох країн, від #TOOLTIP:REGION,italy_region,X #L Італії#!#! до Індії. Їх виплавляють з трьох металів: #TOOLTIP:GOODS,copper,X #L міді#!#!, #TOOLTIP:GOODS,silver,X #L срібла#!#! та #TOOLTIP:GOODS,goods_gold,X #L золота#!#!. Широке розповсюдження цих монет робить їх унікальними. Контроль за їхнім обігом принесе нам процвітання!"
  zimbabwe_royal_cattle_control: "Худоба у володінні корони"
  zimbabwe_royal_cattle_control_desc: "Володіння #TOOLTIP:GOODS,livestock,X #L худобою#!#! дає велику владу, а контроль над стадами країни лише її зміцнить."
  zmw_council_of_senior_wives: "Рада старших дружин"
  zmw_council_of_senior_wives_desc: "Члени цієї ради ділитимуться з нами своєю мудрістю. Її створення залучить до управління країною найдосвідченіших жінок з панівного класу."
  ayu_chatusadom: "Чатусадом"
  ayu_chatusadom_desc: "Система чатусадом («чотири стовпи») ділить уряд на військову та цивільну гілки, куди входять чотири міністерства, звідси й її назва. Розділення повноважень та чіткий розподіл завдань між кожним міністерством дозволяють ефективніше керувати країною та розширюють повноваження правителя."
  mandala_system: "Мандала"
  mandala_system_desc: "Мандала — система політичного устрою, за якої незалежні міста-країни присягають на вірність правителю наймогутнішого з них. З #TOOLTIP:RELIGIONGROUP,dharmic,X #L дхармічної#!#! та #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійської#!#! точки зору мандала — це коло, яке символізує світ. Суть ідеї полягає в тому, що влада походить від центру і розподіляється по колах, тобто кожна країна отримує владу, але її джерело знаходиться посередині."
  legacy_of_the_ottomans: "Спадщина османів"
  legacy_of_the_ottomans_desc: "Через століття воєн та славних перемог ми нарешті об'єднали великі землі під своїм прапором. Вся #TOOLTIP:CONTINENT,europe,X #L Європа#!#! тремтітиме від жаху, зачувши звук наших кроків!"
  leader_of_the_turks: "Лідерство турків"
  leader_of_the_turks_desc: "Хаос таїть у собі нові можливості. Наш вплив в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!, а також наша військова та фінансова міць дають нам право першого голосу у вирішенні долі цілого регіону."
  legacy_of_the_turks: "Спадщина турків"
  legacy_of_the_turks_desc: "Перемога над нашими могутніми сусідами в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! ознаменувала собою появу нової великої держави! $legacy_of_the_ottomans_desc$"
  son_trans_saharan_trade: "Торгівля через Сахару"
  son_trans_saharan_trade_desc: "Торгові шляхи, що пролягають через #TOOLTIP:CONTINENT,africa,X #L африканську#!#! Сахару, завжди були джерелом багатства для Західної Африки та її країн. Щоб торгівля не занепала, нам слід пропонувати допомогу караванам, що проходять по нашій землі."
  revolutionary_republic: "Революційна республіка"
  revolutionary_republic_desc: "$revolutionary_republic$ — це форма державного правління, за якої влада належить невеликому виконавчому органу за підтримки виборної палати депутатів. Революційна пропаганда зміцнить бойовий дух військ, а принцип загальної рівності стане запорукою зародження в країні сильних та впевнених вождів."
  revolutionary_autocracy: "Революційна автократія"
  revolutionary_autocracy_desc: "$revolutionary_autocracy$, що маскується під республіку, по суті є військовою диктатурою, яку очолює досвідчений і вкрай популярний у народі полководець або флотоводець."
  revolutionary_empire: "Революційна імперія"
  revolutionary_empire_desc: "$revolutionary_empire$ — це монархія, яка формально підтримує деякі ідеї #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#!, але насправді є деспотизмом, що прикривається революційними ідеалами."
  constitutional_state: "Конституційна країна"
  constitutional_state_desc: "$constitutional_state$ — це смілива спроба відійти від самовладдя шляхом дотримання крихкого балансу між центральною владою та представницькими органами. У країни все ще є правитель, однак за закони та політичні рішення тепер відповідають виборні чиновники."
  malian_tribute_system: "[GetCountry('MAL').GetAdjectiveWithNoTooltip]а система данини"
  malian_tribute_system_desc: "$malian_tribute_system$ — наше основне джерело #TOOLTIP:GOODS,goods_gold,X #L золота#!#!. Ця система передбачає, що все золото оподатковується та контролюється правителем."
  eth_wandering_court: "Аудієнції на місцях"
  eth_wandering_court_desc: "Буде розумним не прив'язувати двір до одного місця, а переміщати його країною на свій розсуд. Політика #TOOLTIP:POLICY,itinerant_court_policy,X #L мандрівного двору#!#! дозволить оперативно переносити місцевість зосередження влади правителя, щоб краще відповідати запитам місцевого населення."
  bng_industralized_provinces: "Стрімка індустріалізація"
  bng_industralized_provinces_desc: "На відміну від інших країн, ми подвоїли свої зусилля з розвитку міст і виробництва. Такі заходи вже принесли користь економіці нашої країни, однак серед селян зростає занепокоєння: на їхніх очах у минуле відходить ціла культурна доба."
  tughlaq_slave_army_reform: "Військо рабів Туглакідів"
  tughlaq_slave_army_reform_desc: "Ми можемо обернути надлишок рабів у країні собі на користь, сформувавши з них імператорську гвардію — дисципліноване військо, яке буде здатне і брати участь у битвах, і захищати наш двір."
  diwan_i_bandagan: "Диван-і бандаган"
  diwan_i_bandagan_desc: "Кількість рабів у нашій країні зросла настільки, що довелося створити спеціальний орган. $diwan_i_bandagan$ управляє рабами та невільницькою працею."
  shahana_i_mandi: "Шахана-і-Манді"
  shahana_i_mandi_desc: "Встановивши ринкові закони для релігійних меншин, ми виправдаємо зниження військової платні, а також змусимо єретиків та іновірців підкоритися короні."
  feudal_theocracy: "Феодальна теократія"
  feudal_theocracy_desc: "$feudal_theocracy$ — це форма правління, за якої вся влада в країні належить релігійному лідеру. На відміну від звичайних теократій, влада в ній передається у спадок, що дозволяє правителю зберігати її у своїй родині."
  the_protectorate: "Протекторат"
  the_protectorate_desc: "$the_protectorate$ — нова форма правління, яка заснована на військовій могутності та сильній централізованій владі під керівництвом лорда-протектора і встановлена після перемоги парламентаріїв в Англійській громадянській війні."
  timurid_diwan_reform: "Тимуридський диван"
  timurid_diwan_reform_desc: "Нам слід відкинути всі інші способи управління та прийняти шаріат як офіційний закон. $timurid_diwan_reform$ дозволить нам встановити над невірними верховенство ісламу, а заодно спростить передачу намісництва родичам."
  soyurghal_governor_reform_desc_common: "Намісникам [GetCountry('TIM').Custom('longname_ru_GEN')] доручили пройти це навчання з найрізноманітніших причин: або комусь потрібно набратися досвіду, щоб стати наступним правителем, або якась область страждає без здібного намісника, або когось просто потрібно усунути від участі в політиці країни."
  soyurghal_governor_reform: "Навчання намісника союргаля"
  soyurghal_governor_reform_desc: "$soyurghal_governor_reform_desc_common$"
  soyurghal_governor_banished_reform: "Вигнаний намісник союргаля"
  soyurghal_governor_banished_reform_desc: "$soyurghal_governor_reform_desc_common$"
  soyurghal_governor_effective_governor_reform: "Намісник союргаля"
  soyurghal_governor_effective_governor_reform_desc: "$soyurghal_governor_reform_desc_common$"
  subah_organization_reform: "Поділ на суби"
  subah_organization_reform_desc: "Ми обрали продуманий підхід: численні намісники, призначені керувати нашими володіннями, допоможуть нам з легкістю контролювати кожен куточок країни, не турбуючись про втрату провінцій. Крім того, тепер ми зможемо швидше розвивати міста в областях."
  uc_bey_reform: "Уряд удж-бея"
  uc_bey_reform_desc: "Цей мілітаристичний уряд відповідає за підтримання війська задля захисту володінь та кордонів сюзерена."
  volok_reform: "Волочна поміра"
  volok_reform_desc: "$volok_reform$ — реформа, яка суворіше регулює, як [ShowEstateTypeName('nobles_estate')|l] поводяться зі своїми підданими. Наші [ShowEstateTypeName('peasants_estate')|l] завдяки цій реформі зітхнуть вільніше і зможуть організуватися в незалежний стан."
  lit_grand_duchy_of_lithuania_reform: "Верховне герцогство"
  lit_grand_duchy_of_lithuania_reform_desc: "Замість того щоб вважати себе рівними іншим герцогам, ми вирішили піднестися до становища, яке краще відображає нашу силу."
  cossacks_reform: "Січова рада"
  cossacks_reform_desc: "Щоб [ShowEstateTypeName('cossacks_estate')|l] додатково організувалися під єдиним правлінням, січова рада ставить на їх чолі гетьмана, під проводом якого козаки служитимуть або власним інтересам, або інтересам сюзерена."
  iro_reforged_law_of_peace: "Великий закон миру"
  iro_reforged_law_of_peace_desc: "З перших днів свого зародження наша конфедерація живе за Великим законом миру, що знайшов відбиток у наших вампумах. Мир, справедливість і здоровий глузд — ось головні положення нашого закону, що об'єднав під собою всі #TOOLTIP:CULTUREGROUP,haudenosaunee_group,X #L гауденосаунійські#!#! народи."
  iro_council_of_the_fifty: "Велика рада"
  iro_council_of_the_fifty_desc: "Велика рада #TOOLTIP:CULTUREGROUP,haudenosaunee_group,X #L гауденосауні#!#!, що складається з п'ятдесяти вождів — представників кожного з п'яти народів — суворо стежить за дотриманням Великого закону миру. Закон самої ради вимагає, щоб усі п'ятдесят вождів досягали згоди з кожного питання, перш ніж переходити до обговорення наступних."
  guru_granth_sahib_reform: "$guru_granth_sahib$"
  guru_granth_sahib_reform_desc: "$guru_granth_sahib_desc$"
  shahbandariyya_reform: "Шахбандарійя"
  shahbandariyya_reform_desc: "$shahbandar_desc$"