l_russian:
  PARLIAMENT_MARKER_DURATION_TXT: "#T [Player.GetGovernment.GetParliament.GetName] на засіданні#!\nПитання «[Player.GetGovernment.GetParliament.GetCurrentDebateName]» обговорюватиметься ще [Player.GetGovernment.GetParliament.GetRemainingParliamentDuration|W] д. Місце проведення: @location![Player.GetGovernment.GetParliament.GetParliamentLocation.GetName]."
  PARLIAMENT_DURATION_TXT: "Залишилося [Player.GetGovernment.GetParliament.GetRemainingParliamentDuration|W] д. у @location![Player.GetGovernment.GetParliamentLocation.Custom('LR_PREP')|l] [Player.GetGovernment.GetParliamentLocation.GetName]"
  PARLIAMENT_DURATION_TXT_NO_LOCATION: "Залишилося [Player.GetGovernment.GetParliament.GetRemainingParliamentDuration|W] дн."
  IO_PARLIAMENT_DURATION_TXT: "#T [InternationalOrganizationsView.GetInternationalOrganization.GetParliament.GetName] на засіданні#!\nПитання «[InternationalOrganizationsView.GetInternationalOrganization.GetParliament.GetCurrentDebateName]» обговорюватиметься ще [InternationalOrganizationsView.GetInternationalOrganization.GetParliament.GetRemainingParliamentDuration|W] д. Місце проведення: @location![InternationalOrganizationsView.GetInternationalOrganization.GetParliament.GetParliamentLocation.GetName]."
  PARLIAMENT_ISSUE_WILL_FAIL: "#T Питання не пройде обговорення#!\n@trigger_no! Питання «[Player.GetGovernment.GetParliament.GetCurrentDebateName]» #R НЕ#! пройде обговорення у представників [Player.Custom('parliament_ru_GEN')|l]."
  PARLIAMENT_ISSUE_WILL_NOT_FAIL: "#T Питання пройде обговорення#!\nПитання «[Player.GetGovernment.GetParliament.GetCurrentDebateName]» пройде обговорення у представників [Player.Custom('parliament_ru_GEN')|l]."
  HOSTILE_PARLIAMENT_MARKER: "#T [ParliamentMarker.GetCountry.GetGovernment.GetParliament.GetName] на засіданні та в опозиції до законної влади#!\nПерервати засідання можна, [Concept('occupying', 'окупувавши')|e] [Concept('location', 'місце')|e] його проведення."
  PARLIAMENT_NEVER_CALLED: "$NAME$ не на засіданні."
  PARLIAMENT_CALLED_DATE: "$NAME$ на засіданні вже $WHEN|Y$."
  PARLIAMENT_MODIFIER_WHEN_DEBATED_TT: "Поки обговорюється питання"
  PARLIAMENT_MODIFIER_WHEN_DEBATED: "Поки обговорюється питання:"
  PARLIAMENT_ESTATE_EXTRA_POWER_WHEN_DEBATED: "Вибір цього питання принесе $VAL|2+=%$ од. базової парламентської підтримки"
  PARLIAMENT_SPECIAL_STATUS_EXTRA_POWER_WHEN_DEBATED: "Вибір цього питання підштовхне більше країн з особливим статусом надати нам $VAL|2+=%$ од. парламентської підтримки"
  EXTRA_SUPPORT_INFO_FOR_ISSUE_NONE: "#T Питання влади#!\nВлада вважає, що це питання відповідає їхнім інтересам, тому воно не потребує подальшої [Concept('parliament', 'парламентської')|e] підтримки."
  EXTRA_SUPPORT_INFO_FOR_ISSUE: "#T [PARLIAMENT_ISSUE.GetEstateType.GetNameWithNoTooltip] та їхнє питання#!\nВибір цього питання принесе $VAL|2+=%$ од. парламентської підтримки, оскільки [PARLIAMENT_ISSUE.GetEstateType.GetName|l] його підтримують."
  BASE_SPECIAL_STATUS_SUPPORT: "Підтримка статусу"
  EXTRA_SUPPORT_INFO_FOR_IO_ISSUE: "#T [PARLIAMENT_ISSUE.GetSpecialStatus.GetNameWithNoTooltip]: питання#!\nВибір цього питання принесе $VAL|2+=%$ парламентської підтримки, оскільки за нього виступає [PARLIAMENT_ISSUE.GetSpecialStatus.GetName|l]."
  PARLIAMENT_START: "З #Y початком#! дебатів:"
  PARLIAMENT_IF_SUCCESS: "Якщо дебати #G пройдуть успішно#!:"
  PARLIAMENT_IF_SUCCESS_TT: "Якщо дебати #G пройдуть успішно#!"
  PARLIAMENT_IF_FAIL: "Якщо дебати #R проваляться#!:"
  PARLIAMENT_IF_FAIL_TT: "Якщо дебати #R проваляться#!"
  PARLIAMENT_CURRENT_SUPPORT: "Поточна парламентська підтримка: $SUPPORT$%"
  NO_POSSIBLE_AGENDAS: "@trigger_no! Більше немає можливих [Concept('parliament_agendas', 'парламентських вимог')|e]."
  ACTIVE_PARLIAMENT_SUPPORT_POWER: "Базове значення ($VAL|2G$) [Concept('estate_power', 'станової влади')|e] змінено:"
  ACTIVE_PARLIAMENT_SUPPORT_IMPORTANCE: "Важливість вимоги: $VAL|2+=%$"
  ACTIVE_PARLIAMENT_SUPPORT_SATISFACTION: "[Concept('estate_satisfaction', 'Задоволення стану')|e]: $VAL|2+=%$"
  PARLIAMENT_AGENDA_SUPPORT_TT: "#T Вплив підтримки#!"
  ACTIVE_PARLIAMENT_REPEAT: "Повторювані вимоги: $VAL|2+=%$"
  ACCEPT_AGENDA: "Прийняття вимоги"
  ACCEPT_AGENDA_TT: "Прийняти вимогу «$NAME$»"
  ACCEPT_AGENDA_EFFECT: "Надає підтримку в [Concept('parliament', 'парламенті')|e] у розмірі $VAL|2+=%$"
  IO_PARLIAMENT_TITLE: "Парламент об'єднання «[InternationalOrganizationsView.GetInternationalOrganization.GetNameWithNoTooltip]»"
  IO_PARLIAMENT_TOOLTIP: "Деякі політичні рішення в об'єднанні «[InternationalOrganizationsView.GetInternationalOrganization.GetName]» мають обговорюватися в [Concept('parliament', 'парламенті')|e]. Провідна країна об'єднання має право ставити такі [Concept('parliament_issues', 'парламентські питання')|e] на обговорення, однак прийняті вони будуть лише після схвалення більшістю учасників [Concept('international_organization', 'міжнародного об'єднання')|e]."
  IO_PARLIAMENT_NON_VOTERS: "Ще не голосували"
  IO_PARLIAMENT_OPPOSERS: "Противники"
  IO_PARLIAMENT_VOTERS: "Прихильники"
  call_parliament: "Скликання парламенту"
  call_parliament_desc: "Буде скликано парламент для отримання підтримки у спробі вирішити [Concept('parliament_issue', 'парламентське питання')|E], змінити [Concept('policies', 'політики')|E] в нашому [Concept('laws', 'зводі законів')|E], сформувати [Concept('casus_belli', 'привід для війни')|E], зібрати більше [Concept('taxes', 'податків')|E], набрати більше [Concept('army_levies', 'армійського')|E] або [Concept('navy_levies', 'флотського ополчення')|E].\n\nПід час цього засідання діятимуть такі ефекти: «[ShowModifier('parliament_in_session')]» та «[ShowModifier('parliament_location')]», а також «[ShowModifier('parliament_in_capital')]» або «[ShowModifier('parliament_outside_capital')]» залежно від обраної [Concept('location', 'місцевості')|E]."
  request_more_taxes: "Запит додаткових податків"
  request_more_taxes_desc: "У разі успіху представники [Player.Custom('parliament_ru_GEN')|l] дозволять нам зібрати більше [Concept('tax', 'податків')|e] з [Concept('estates', 'станів')|e]."
  ask_for_larger_levies: "Запит додаткових ополчень"
  ask_for_larger_levies_desc: "У разі успіху представники [Player.Custom('parliament_ru_GEN')|l] зобов'яжуть один із [Concept('estates', 'станів')|e] під час призову надати більші [Concept('army_levies', 'армійське')|e] та [Concept('navy_levies', 'флотське ополчення')|e]."
  ask_for_law_changes: "Запит зміни законів"
  ask_for_law_changes_desc: "У разі успіху [Concept('estates', 'стан')|e] схвалить зміну конкретної [Concept('policy', 'політики')|e] в нашому [Concept('laws', 'зводі законів')|e]."
  ask_for_law_changes_select_law_title: "Виберіть [Concept('law', 'закон')|e], зміна якого буде схвалена [Player.Custom('parliament_ru_INST')|l]."
  ask_for_law_changes_select_policies_title: "Виберіть [Concept('policy', 'політику')|e], зміна якої буде схвалена [Player.Custom('parliament_ru_INST')|l]."
  prepare_for_war_select_title: "Виберіть [Concept('country', 'країну')|e] з метою отримання [Concept('casus_belli', 'приводу для війни')|e]"
  prepare_for_war_select_province_title: "Виберіть [Concept('province', 'провінцію')|e], щоб визначити її як [Concept('war_goal', 'ціль війни')|e]"
  select_a_country_to_get_casus_belli_on: "Буде обрана [Concept('country', 'країна')|e], щодо якої представники [Player.Custom('parliament_ru_GEN')|l] сформують [Concept('casus_belli', 'привід для війни')|e]."
  prepare_for_war: "Створення приводу для війни"
  prepare_for_war_desc: "У разі успіху представники [Player.Custom('parliament_ru_GEN')|l] схвалять початок [Concept('war', 'війни')|e] та нададуть нам законний [Concept('casus_belli', 'привід')|e].\n• Ми оберемо країну, яка не [Concept('rebel', 'бунтує')|e], не є нашим [Concept('subject', 'ленником')|e], знаходиться в межах нашої [Concept('diplomatic_range', 'дипломатичної дистанції')|e] та з якою у нас зараз немає [Concept('truce', 'перемир’я')|e]. Ми отримаємо:\n[Concept('casus_belli', 'Привід для війни')|e] «[ShowCasusBelliName('cb_parliament_conquer_province')]».\n• [Concept('casus_belli', 'Привід для війни')|e] буде доступний протягом [GetDefine('NDiplomacy', 'CASUS_BELLI_MONTHS')] міс. ([Divide_int32(GetDefine('NDiplomacy', 'CASUS_BELLI_MONTHS'), '(int32)12')] р./років)."
  PARLIAMENT_IN_SESSION: "[Player.GetGovernment.GetParliamentName] на засіданні"
  promote_castle_building: "Підтримка будівництва замків"
  promote_castle_building_desc: "У різних куточках нашої країни є чудові місця для зведення укріплень, здатних зупинити будь-який наступ наших ворогів."
  promote_bastion_building: "Підтримка будівництва бастіонів"
  promote_bastion_building_desc: "$promote_castle_building_desc$"
  promote_star_fort_building: "Підтримка будівництва штерншанців"
  promote_star_fort_building_desc: "$promote_castle_building_desc$"
  promote_fortress_building: "Підтримка будівництва фортець"
  promote_fortress_building_desc: "$promote_castle_building_desc$"
  sponsor_a_university: "Фінансування університету"
  sponsor_a_university_desc: "Поширення знань в ім'я просвіти та розуміння принципів божественного — це гідна мета, на яку ми повинні спрямувати всі наші фінансові та політичні ресурси, заклавши визнані духовні інститути."
  pops_in_province_gain_20_satisfaction: "[Concept('pops', 'Групи населення')|e] у [Concept('province', 'провінції')|e] з цією [Concept('location', 'місцевістю')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]."
  sponsor_a_confucian_academy: "Фінансування конфуціанської академії"
  sponsor_a_confucian_academy_desc: "Щоб допомогти пошукам вищих знань та надати вченим умови для роботи, треба інвестувати в розвиток академій."
  sponsor_a_cathedral: "Фінансування собору"
  sponsor_a_cathedral_desc: "Наше правління завжди згадуватимуть з повагою, якщо ми зведемо собор нашої віри в одному з ключових міст."
  sponsor_a_opera_house: "Фінансування оперного театру"
  sponsor_a_opera_house_desc: "У нашого народу є запит на більшу кількість осередків культури. [ShowBuildingTypeNameWithNoTooltip('opera_house')] втамує цю культурну спрагу та дозволить приділити увагу нашим містам."
  gravel_road_development: "Розширення мережі гравійних доріг"
  gravel_road_development_desc: "Зв'язок провінцій з населеними центрами лежить в основі нашої країни. Тому ми повинні прокладати нові дороги, а також фінансувати їх спорудження та розширення."
  gravel_road_development_burghers: "$gravel_road_development$"
  gravel_road_development_burghers_desc: "$gravel_road_development_desc$"
  paved_road_development: "Розширення мережі брукованих доріг"
  paved_road_development_desc: "$gravel_road_development_desc$"
  paved_road_development_burghers: "$paved_road_development$"
  paved_road_development_burghers_desc: "$gravel_road_development_desc$"
  modern_road_development: "Розширення мережі сучасних доріг"
  modern_road_development_desc: "$gravel_road_development_desc$"
  railroad_development: "Розширення мережі залізниць"
  railroad_development_desc: "$gravel_road_development_desc$"
  expand_mining_operations: "Розширення гірничих робіт"
  expand_mining_operations_desc: "Гірнича справа могла б відіграти ключову роль у нашій економіці, проте поточний стан справ у цій галузі залишає бажати кращого."
  expand_farming_operations: "Фінансування сільськогосподарських маєтків"
  expand_farming_operations_desc: "Наші сільськогосподарські угіддя забезпечують нас життєво важливими ресурсами. Одначе землевласники обіцяють, що врожай можна збільшити за додаткових вкладень часу та коштів."
  expand_hunting_operations: "Створення нових мисливських угідь"
  expand_hunting_operations_desc: "Наші мисливські угіддя не освоєні повною мірою, через що ми можемо втрачати можливі прибутки."
  expand_gathering_operations: "Розширення промислового збору"
  expand_gathering_operations_desc: "Слід розширити промисловий збір, щоб задовольнити попит на ці товари задля зміцнення стійкості нашої економіки."
  expand_forestry_operations: "Розширення заготівель лісу"
  expand_forestry_operations_desc: "Ліси нашої країни можуть приносити великі прибутки. Слід розширити заготівлі лісу, щоб розкрити потенціал цієї галузі."
  promote_integration: "Підтримка процесу інтеграції"
  promote_integration_desc: "Треба підтримати інтеграцію віддалених провінцій та зміцнити їхній зв'язок з нашими національними територіями."
  promote_urbanization: "Розвиток міст"
  promote_urbanization_desc: "Очевидно, що задля подальшого процвітання нам потрібно сприяти розвитку великих міст, які стануть основою нашої сили."
  grant_city_rights: "Надання міських прав"
  grant_city_rights_desc: "Щоб наші землі й надалі процвітали, нам потрібно розширити права міських поселень та надавати більше міських прав."
  expand_food_stockpiles: "Збільшення запасів їжі"
  expand_food_stockpiles_desc: "Наш народ висловлює стурбованість дефіцитом продовольства. Нам слід розширити нашу мережу #TOOLTIP:BUILDING_TYPE,granary,X #L комор#!#!, щоб уникнути подібних ситуацій у майбутньому."
  back_the_war_effort: "Підтримка воєнних дій"
  back_the_war_effort_desc: "У поточній війні нам не завадить законодавча підтримка."
  finance_the_armory: "Розширення арсеналу"
  finance_the_armory_desc: "Щоб повернути резерву нашої армії колишню славу, неодмінно потрібно оновити інфраструктуру для рекрутського набору."
  expand_barracks: "Розширення казарм"
  expand_barracks_desc: "$finance_the_armory_desc$"
  sponsor_training_fields: "Розширення навчальних полігонів"
  sponsor_training_fields_desc: "$finance_the_armory_desc$"
  sponsor_regimental_camp: "Розширення полкових гарнізонів"
  sponsor_regimental_camp_desc: "$finance_the_armory_desc$"
  sponsor_conscription_center: "Розширення призовного пункту"
  sponsor_conscription_center_desc: "$finance_the_armory_desc$"
  host_army_excercises: "Проведення військових навчань"
  host_army_excercises_desc: "Щоб зберегти гнучкість армії, ми повинні проводити військові навчання, покликані підтримувати солдатів в ідеальній формі."
  expand_officer_lists: "Розширення офіцерських списків"
  expand_officer_lists_desc: "Завдяки підвищенню здібних людей до високих військових чинів ми отримаємо більш вміле військове керівництво."
  promote_noble_officers: "Підвищення знатних офіцерів"
  promote_noble_officers_desc: "Дрібна аристократія має стати для нас джерелом нових офіцерів."
  promote_noble_officers_passed.tt: "З'явиться талановитий представник #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!."
  support_noble_sponsored_armies: "Вербування найманців за рахунок дворянства"
  support_noble_sponsored_armies_desc: "Ми повинні надати одному з наших найдоблесніших лордів дозвіл вербувати найманців для захисту нашої віри та народу від нашого імені."
  increase_naval_spending: "Підтримка військово-морської інфраструктури"
  increase_naval_spending_desc: "Розвиваючи інфраструктуру прибережних міст, ми зможемо посилити дипломатичну вагу у своїх водах."
  expand_docks: "Нарощування кораблебудівних потужностей"
  expand_docks_desc: "Нам потрібно наростити кораблебудівні потужності, щоб збудувати могутній флот для своєї країни."
  expand_dry_docks: "Нарощування кораблебудівних потужностей"
  expand_dry_docks_desc: "Нам потрібно наростити кораблебудівні потужності, щоб збудувати могутній флот для своєї країни."
  expand_shipyards: "Нарощування кораблебудівних потужностей"
  expand_shipyards_desc: "Нам потрібно наростити кораблебудівні потужності, щоб збудувати могутній флот для своєї країни."
  expand_grand_shipyards: "Нарощування кораблебудівних потужностей"
  expand_grand_shipyards_desc: "Нам потрібно наростити кораблебудівні потужності, щоб збудувати могутній флот для своєї країни."
  expand_naval_bases: "Нарощування кораблебудівних потужностей"
  expand_naval_bases_desc: "Нам потрібно наростити кораблебудівні потужності, щоб збудувати могутній флот для своєї країни."
  support_cabinet_generic_desc: "Бюрократія наших володінь багато виграє від законодавчої реформи, яка покликана підвищити її ефективність."
  support_noble_cabinet: "Підтримка ради, складеної з аристократів"
  support_noble_cabinet_desc: "$support_cabinet_generic_desc$. Наші шановні представники вищого стану здатні краще за інших провести цю реформу."
  support_clergy_cabinet: "Підтримка ради, складеної зі священників"
  support_clergy_cabinet_desc: "$support_cabinet_generic_desc$. Найрозумнішим рішенням буде звернутися до наших найбільш відданих прихильників — нам допоможуть священники."
  support_burgher_cabinet: "Підтримка ради, складеної з купців"
  support_burgher_cabinet_desc: "$support_cabinet_generic_desc$, якщо її профінансують найбагатші члени суспільства."
  support_peasant_cabinet: "Підтримка ради, складеної з простолюдинів"
  support_peasant_cabinet_desc: "$support_cabinet_generic_desc$, якщо її підтримає народ."
  balance_the_budget: "Балансування бюджету"
  balance_the_budget_desc: "Фінансова криза, що нависла над нашим народом, є невідкладною проблемою, яку необхідно терміново вирішити."
  bolster_the_monarchy: "Посилення уряду"
  bolster_the_monarchy_desc: "Центральний авторитет нашої країни має стояти вище інтересів будь-яких груп та видатних представників вищого стану."
  bolster_the_republic: "$bolster_the_monarchy$"
  bolster_the_republic_desc: "$bolster_the_monarchy_desc$"
  bolster_the_divine_mandate: "$bolster_the_monarchy$"
  bolster_the_divine_mandate_desc: "$bolster_the_monarchy_desc$"
  bolster_the_tribal_leader: "$bolster_the_monarchy$"
  bolster_the_tribal_leader_desc: "$bolster_the_monarchy_desc$"
  bolster_the_khan: "$bolster_the_monarchy$"
  bolster_the_khan_desc: "$bolster_the_monarchy_desc$"
  conduct_a_census: "Проведення перепису населення"
  conduct_a_census_desc: "Перепис населення та подальший аналіз його розвитку й процвітання — це чудовий спосіб зміцнити стабільність нашої країни."
  support_ruler: "Підтримка уряду"
  support_ruler_desc: "Наш уряд не може функціонувати без належного визнання його влади. Ми зможемо зміцнити свою репутацію та покращити становище нашого правителя, якщо парламент виступить з офіційною заявою."
  increase_our_control: "Посилення контролю"
  increase_our_control_desc: "Затвердження контролю над країною необхідне для її функціонування. Ми повинні зміцнити інститути, що відповідають за контроль над містами."
  promote_state_religion: "Поширення державної релігії"
  promote_state_religion_desc: "Прихильність до державної релігії стане важливим кроком для зміцнення стабільності країни. Ми повинні спрямувати більше сил на навернення нашого народу."
  promote_burghers_member: "Підтримка представників міського стану"
  promote_burghers_member_desc: "Міщани необхідні нам і як купці, і як члени гільдій. Ми повинні просувати в уряд обдарованих представників цього стану."
  promote_burghers_member_passed.tt: "З'явиться талановитий представник #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L міщан#!#!."
  expand_diplomatic_corps_generic_desc: "Не всі питання можна вирішити силою меча. Куди вигідніше дозволити перу підтримати меч і тим самим досягти видатних звершень."
  expand_diplomatic_corps_minors: "Зміцнення зв'язків із сусідами"
  expand_diplomatic_corps_minors_desc: "$expand_diplomatic_corps_generic_desc$ Головною нашою турботою мають стати навколишні невеликі держави."
  expand_diplomatic_corps_religion: "Звернення до віри"
  expand_diplomatic_corps_religion_desc: "$expand_diplomatic_corps_generic_desc$ Для нас життєво необхідно покращити відносини з нашими братами по вірі."
  expand_diplomatic_corps_majors: "Відносини з великими державами"
  expand_diplomatic_corps_majors_desc: "$expand_diplomatic_corps_generic_desc$ Нам необхідно зміцнити відносини з великими державами світу."
  improve_subject_relations: "Зміцнення зв'язків із ленником"
  improve_subject_relations_desc: "Зміцнивши дипломатичні та адміністративні зв'язки з ленником, ми зможемо тісніше прив'язати його до нашої країни."
  promote_clergy_member: "Підтримка представників духовенства"
  promote_clergy_member_desc: "Священники могли б підтримати нашу владу та підвищити її ефективність. Запропонувавши їм високі посади в уряді, ми зможемо покращити становище країни."
  promote_clergy_member_passed.tt: "З'явиться талановитий представник #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священників#!#!."
  expand_our_market: "Акти про розширення ринку"
  expand_our_market_desc: "Наш ринок тільки виграє, якщо ми послабимо торговельні обмеження."
  protect_our_market: "Регулювання ринку"
  protect_our_market_desc: "Через вкрай конкурентне середовище наших ринків буде розумно посилити регулювання, щоб дати перевагу нашим купцям."
  sponsor_a_merchant_expedition: "Підтримка торговельної експедиції"
  sponsor_a_merchant_expedition_desc: "Ми повинні вкласти кошти в торговельну експедицію та встановити контакти з іншими ринками."
  sponsor_urban_development: "Розвиток внутрішніх земель"
  sponsor_urban_development_desc: "Не варто забувати про внутрішні землі. Їх необхідно розвивати."
  support_religious_art: "Підтримка релігійного мистецтва"
  support_religious_art_desc: "Наша віра слугує великим джерелом натхнення для творців по всій країні. Оскільки наш двір у змозі утримувати творців, слід найняти одного з тих, хто черпає своє натхнення в божественному."
  support_nobles_art: "Підтримка аристократичного мистецтва"
  support_nobles_art_desc: "Витончені смаки представників вищих станів вимагають нових творів мистецтва. Якщо ми збільшимо число творців, що перебувають на нашій службі, то це напевно їх порадує."
  support_religious_education: "Підтримка релігійної освіти"
  support_religious_education_desc: "Служителі віри є опорою нашої країни і можуть відіграти велику роль у навчанні народу — це прискорить науковий прогрес і зміцнить відданість віруючих."
  support_religious_education_passed.tt: "Усі [ShowPopTypeName('clergy')|l] та [ShowPopTypeName('peasants')|l], що сповідують нашу віру, отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]."
  improve_relations_with_the_faith: "Налагодження релігійних відносин"
  improve_relations_with_the_faith_desc: "Мало того, що дії уряду часто викликають невдоволення у наших віруючих, так ще й сам народ розходиться в поглядах з різних релігійних питань. Щоб запобігти подальшому розколу нашого суспільства, необхідно налагодити діалог між сторонами та допомогти їм знайти компроміси."
  curb_central_authority: "Обмеження центральної влади"
  curb_central_authority_desc: "Представники [Player.Custom('parliament_ru_GEN')|l] повинні мати найвищу владу, і жодні королівські укази не завадять нам слідувати своїм ідеалам!"
  revoke_privilege_of_the_nobles: "Скасування аристократичних привілеїв"
  revoke_privilege_of_the_nobles_desc: "Ті, хто користувався тяжкою працею простих людей, тепер здригаються від думки про те, що їхні жалюгідні привілеї буде відібрано."
  reduce_peasant_taxation: "Зниження податків для селян"
  reduce_peasant_taxation_desc: "Простий люд усе життя платив податки знаті. Щоб народ став вільним, ці податки необхідно скасувати!"
  establish_a_constitution: "Створення конституції"
  establish_a_constitution_desc: "Воля народу має бути викладена в офіційно прийнятому письмовому документі, що дозволить закріпити наші права і водночас обмежить центральну владу."
  random_noble_privilege_revoked_tt: "[ShowEstateTypeName('nobles_estate')] втратять один випадковий [Concept('estate_privilege', 'становий привілей')|e]"
  baronial_burghs_rights: "Розширення баронських бургів"
  baronial_burghs_rights_desc: "Розширивши права баронських бургів, ми посприяємо розвитку нації."
  ecclesiastical_burghs_rights: "Розширення церковних бургів"
  ecclesiastical_burghs_rights_desc: "Розширивши права церковних бургів, ми посприяємо розвитку нації."
  compulsory_education_nobles: "Акт про шляхетну освіту"
  compulsory_education_nobles_desc: "Ми повинні вкластися в освіту аристократів, щоб зміцнити нашу адміністрацію."
  presbyterian_education: "Акт про пресвітеріанську освіту"
  presbyterian_education_desc: "Ми повинні відкрити школи в кожному приході нашої країни, щоб посприяти народній освіті. Завідувати школами будуть священники, а оплачуватися їхня робота буде з податків, що стягуються із землевласників."
  found_college_of_justice: "Заснування судової колегії"
  found_college_of_justice_desc: "Наш звід законів застарів і вже не відповідає нашим стандартам. Ми повинні заснувати новий інститут, судову колегію, яка займеться цим питанням і створить надійну правову систему."
  establish_the_signoria_of_venice: "Заснування венеційської синьйорії"
  establish_the_signoria_of_venice_desc: "Стара венеційська комуна виконує свою роль і є давньою традицією нашої країни. Однак нас перестає влаштовувати її адміністративна ефективність. Можливо, нам варто змінити головний орган нашого уряду, замінивши його новою системою, покликаною вирішувати внутрішні проблеми країни."
  appease_english_population: "Заспокоєння англійського населення"
  appease_english_population_desc: "Попри наші заяви, піддані в Британії незадоволені. Щоб їх заспокоїти, треба показати, що ми не гнобителі."
  increase_control_in_britain: "Посилення контролю в Британії"
  increase_control_in_britain_desc: "Британські острови ізольовані від решти європейського континенту, тому керувати ними непросто. Попри всі складнощі, ми повинні посилити над ними контроль."
  tolerance_of_non_hindus: "Терпимість до язичників"
  tolerance_of_non_hindus_desc: "Оскільки у нас багатоконфесійна країна, а наш правитель заохочує терпимість, треба дозволити існування в країні різних вірувань."
  VIJ_ALL_NON_HINDU_POPS_GAIN_SATISFACTION: "Усі наші [Concept('heretics', 'єретичні')|e] та [Concept('heathen', 'язичницькі')|e] [Concept('pops', 'групи населення')|e] отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]."
  increase_non_hindu_control: "Контроль над язичниками"
  increase_non_hindu_control_desc: "Не можна дозволити, щоб у нашій країні було багато різних вірувань. Щоб уникнути заворушень, треба контролювати язичників."
  VIJ_ALL_NON_HINDU_POPS_LOCATIONS_GAIN_CONTROL: "Усі наші [Concept('locations', 'місцевості')|e], де живе не менше #Y 5%#! [Concept('heretics', 'єретичних')|e] та [Concept('heathen', 'язичницьких')|e] [Concept('pops', 'груп населення')|e], отримають [ShowNamedValue('control_mild_bonus')|+=2%] [Concept('control', 'контролю')|e]."
  dlh_famine_reductions: "Боротьба з голодом"
  dlh_famine_reductions_desc: "Наші піддані не повинні помирати від голоду — ми надамо допомогу всім місцевостям, що страждають від нестачі припасів."
  new_model_army_pi: "Армія нового зразка"
  new_model_army_pi_desc: "Опустошлива громадянська війна з роялістами довела, що наша армія потребує тотального реформування."
  edict_of_nantes_issue: "Нантський едикт"
  edict_of_nantes_issue_desc: "Після багатьох років релігійної боротьби настав час зміцнити єдність через добросусідство та покласти край непотрібному кровопролиттю."
  end_the_french_wars_religion_tt: "[Concept('disaster', 'Лихо')|e] «[ShowDisasterName('french_wars_religion')]» закінчиться"
  mug_promote_rajput_officials: "Заступництво раджастханців"
  mug_promote_rajput_officials_desc: "Якщо частіше призначати раджастханців на важливі посади, в уряді буде більше чиновників-мілітаристів, на яких завжди можна покластися."
  promote_rajput_officials_passed_tt: "З'явиться талановитий персонаж, що говорить #TOOLTIP:LANGUAGE,rajasthani_language,X #L раджастханською#!#! [Concept('language', 'мовою')|e]."
  hussite_army_reform: "Гуситські військові реформи"
  hussite_army_reform_desc: "Наш народ вистояв, попри всі злидні та незгоди. Ми пережили війни, хрестові походи та переслідування. Ми навчимо армію найсучаснішої тактики та виступимо проти будь-кого, хто спробує нас зламати!"
  lit_measures_against_romuva: "Заходи проти ромувського відродження"
  lit_measures_against_romuva_desc: "У світлі відродження #L [ShowReligionAdjective('romuva')|l]ої#! віри виникли побоювання, що її прихильники можуть влаштувати заворушення. Потрібно скликати стани та розібратися з цим."
  lit_5_percent_of_pops_convert_to_our_religion_tt: "#Y 5%#! #TOOLTIP:RELIGION,$romuva_tt$,X #L ромуванського#!#! [Concept('pops', 'населення')|e] навернеться в іншу релігію ([ROOT.GetCountry.GetReligion.GetName|l])"
  hre_law_debate: "Обговорення імперського закону"
  hre_law_debate_desc: "[ShowSpecialStatusName('emperor')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! має намір ввести новий закон. Імперські стани мають можливість підтримати або відхилити цю пропозицію."
  hre_request_additional_military_support: "Допомога імперської армії"
  hre_request_additional_military_support_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській імперії#!#! загрожує напад. [GetUniqueInternationalOrganization('hre').GetLeaderTitle] вирішує закликати на допомогу всі війська, якими володіють імперські стани."
  hre_roman_month: "Римський місяць"
  hre_roman_month_desc: "Останнім часом скарбниця #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! неабияк спорожніла. У зв'язку з цим [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] просить імперські стани про фінансову підтримку."
  hre_roman_month_modifier_effect: "[ShowModifierEffect('pi_hre_increased_imperial_tax_modifier')]"
  hre_demand_internal_peace: "Вимога припинити внутрішні чвари"
  hre_demand_internal_peace_desc: "Країна загрузла у внутрішніх конфліктах, через що [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] поступово втрачає владу та повагу підданих. Щоб зберегти імперію, потрібно якнайшвидше забезпечити в ній мир і стабільність."
  hre_demand_internal_peace_tt: "Усі [Concept('war', 'війни')|e] між [Concept('member', 'учасниками')|e] міжнародного об'єднання «[THIS.GetInternationalOrganization.GetName]» будуть закінчені [Concept('white_peace', 'миром на умовах «статус-кво»')|e]"
  hre_establish_perpetual_diet: "Заснування Постійного рейхстагу"
  hre_establish_perpetual_diet_desc: "$perpetual_diet_law_desc$"
  hre_establish_perpetual_diet_tt: "[Concept('parliament_seat', 'Розташування парламенту')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! стане єдиною можливою [Concept('location', 'місцевістю')|e] для скликання [Concept('parliament', 'парламенту')|e]."
  hre_force_emperor_to_abdicate: "Примушення імператора до відмови від влади"
  hre_force_emperor_to_abdicate_desc: "#TOOLTIP:SPECIAL_STATUS,elector,X #L Князі-виборці#!#! визнали, що [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetLongName] не справля[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('endlong_etyut')]ся з управлінням #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священною Римською Імперією#!#!. Вони скликають рейхстаг, щоб обговорити зміну влади та визначити майбутнє імперії."
  union_enforce_law_implementation: "Забезпечення виконання законів"
  union_enforce_law_implementation_desc: "Деякі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! або вступили до неї нещодавно, або активно чинять опір нашим спробам централізувати владу. Щоб домогтися приєднання країн-учасниць унії, потрібно забезпечити виконання на їхніх територіях прийнятих нами законів."
  union_enforce_law_implementation_at: "[Concept('union_integration_level_member', 'Рівень інтеграції')|e] всіх [Concept('member', 'учасників')|e] міжнародної організації «[THIS.GetInternationalOrganization.GetName]» зміниться на «[THIS.GetInternationalOrganization.GetModifierValueString('union_integration_level')]»"
  pa_add_privilege: "Надання привілею"
  pa_add_privilege_simple: "Підкуп стану"
  pa_add_privilege_desc: "Іноді потрібно надати [Concept('estate', 'стану')|e] постійні привілеї, щоб у короткостроковій перспективі заручитися його підтримкою."
