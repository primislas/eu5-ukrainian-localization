  pa_hre_elevate_prussia_to_kingdom_desc: "Правителі #ONCLICK:COUNTRY,[GetCountry('PRU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').Custom('CL_tt')],X [GetCountry('PRU').Custom('CL_GEN')|L]#!#! завжди були вкрай амбітними. Багато з них навіть просили надати їм формальні титули королів, хоча в них і не було власного королівства. Можливо, піднісши цю країну до рангу #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівства#!#!, ми зможемо заручитися її повною підтримкою…"
  pa_hre_elevate_prussia_to_kingdom_tt: "У зв'язку з нашим рішенням у #ONCLICK:COUNTRY,[GetCountry('PRU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').Custom('CL_tt')],X [GetCountry('PRU').Custom('CL_PREP')|L]#!#! відбудеться відповідна [Concept('event', 'подія')|e]."
