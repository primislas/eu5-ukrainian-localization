  opinion_hre_pa_supports_free_cities: "Підтримка вільних міст"
  pa_hre_affirmation_of_free_city_rights_tt: "Кожне [ShowSpecialStatusName('free_city')|l] отримає [ShowNamedValue('stability_mild_bonus')|+=2] од. [Concept('stability', 'стабільності')|e]. При цьому всі країни, що воюють з ним, знизять свою думку про голову #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! на [ShowBiasValue('opinion_hre_pa_supports_free_cities')|+] од."