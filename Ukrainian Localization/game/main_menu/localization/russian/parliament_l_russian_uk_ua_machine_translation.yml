  pa_hre_lessen_tax_burden_desc: "Ми обіцяємо скоротити повинність щодо #TOOLTIP:PAYMENT,imperial_contribution,X #L внеску імперії#!#! в обмін на їхню підтримку."
  pa_hre_elevate_prussia_to_kingdom: "Піднесення Пруссії до рангу королівства"
