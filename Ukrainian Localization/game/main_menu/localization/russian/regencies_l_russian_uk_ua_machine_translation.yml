  nobles_estate_regency: "Регентство знаті"
  clergy_estate_regency: "Регентство духовенства"
  burghers_estate_regency: "Регентство містян"
  peasants_estate_regency: "Регентство простолюду"
  interregnum: "Міжцарство"
  republican_election_regency: "Виборне правління"
  papal_election_regency: "Папський конклав"
  papal_election_regency_desc: "$papal_election_desc$"
  judicial_election_regency: "Юдикатний конклав"
  judicial_election_regency_desc: "Нового [Concept('ruler', 'правителя')|e] обирає рада. Цей процес є бюрократичним хаосом і може зайняти кілька місяців або навіть років."
  mamluk_succesion_regency: "Успадкування мамлюків"
  mamluk_succesion_regency_desc: "Новий [Concept('ruler', 'правитель')|e] і [Concept('regents', 'регенти')|e] мають бути вихідцями з дисциплінованих і престижних лав елітних мамлюків під нашим командуванням."
  fratricide_succesion_regency: "Братовбивча міжусобиця"
  fratricide_succesion_regency_desc: "Нового [Concept('ruler', 'правителя')|e] обирає особисто Бог: він віддає перевагу одному з синів колишнього [Concept('ruler', 'правителя')|e]."
  fratricide_succesion_regency_tt1: "Жоден із синів колишнього правителя не може успадкувати престол. Замість них з'являється інший член династії."
  fratricide_succesion_regency_tt2: "Жоден із членів династії не може успадкувати престол. Замість них з'являється нова династія."
  fratricide_succesion_regency_tt3: "Престол миттєво успадкує єдиний здібний син колишнього правителя."
  fratricide_succesion_regency_tt4: "Питання престолонаслідування вирішуватиметься, коли сини виростуть."
  republican_election_regency_desc: "Якщо у республіки немає [Concept('ruler', 'правителя')|e], до проведення офіційних [Concept('election', 'виборів')|e] нею тимчасово правитиме [Concept('regent', 'регент')|e]."
  consort_regency_desc: "Якщо під час смерті [Concept('ruler', 'правителя')|e] монархічної [Concept('country', 'країни')|e] його [Concept('heir', 'спадкоємець')|e] ще [Concept('child', 'дитина')|e], країною на посаді [Concept('regent', 'регента')|e] може правити [Concept('consort', 'консорт')|e]."
  nobles_estate_regency_desc: "Якщо в [Concept('country', 'країні')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може представник знаті."
  clergy_estate_regency_desc: "Якщо в [Concept('country', 'країні')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може представник духовенства."
  burghers_estate_regency_desc: "Якщо в [Concept('country', 'країні')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може правити представник містян."
  peasants_estate_regency_desc: "Якщо в [Concept('country', 'країні')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може правити представник простолюду."
  overlord_regency_desc: "Якщо у [Concept('country', 'країни')|e]-[Concept('subject', 'васала')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може керувати [Concept('ruler', 'правитель')] країни-[Concept('overlord', 'сюзерена')|e]."
  lordship_of_ireland_regency_desc: "Якщо у [Concept('country', 'країни')|e]-[Concept('member', 'учасника')|e] [Concept('international_organization', 'міжнародного об’єднання')|e] «[GetUniqueInternationalOrganization('lordship_of_ireland').GetName]» немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може керувати [Concept('ruler', 'правитель')] країни-[Concept('international_organization_leader_short', 'лідера')|e]."
  subject_regency_desc: "Якщо у [Concept('country', 'країни')|e]-[Concept('overlord', 'сюзерена')|e] немає [Concept('ruler', 'правителя')|e], країною на посаді [Concept('regent', 'регента')|e] може керувати [Concept('ruler', 'правитель')] сильної країни-[Concept('subject', 'васала')|e]."
  interregnum_desc: "Якщо у [Concept('country', 'країни')|e] немає [Concept('ruler', 'правителя')|e], до призначення офіційного [Concept('ruler', 'правителя')] керувати нею може тимчасова адміністрація. Призначення може як пройти швидко, так і зайняти тривалий час."