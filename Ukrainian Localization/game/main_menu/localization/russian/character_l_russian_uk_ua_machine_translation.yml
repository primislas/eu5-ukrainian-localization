  balanced_education_desc: "Для тих, кому долею призначено правити, життя влаштовує найрізноманітніші випробування. Якщо ми хочемо гідно виховати королівського спадкоємця, йому потрібно дати збалансовану освіту."
  administrative_education_desc: "Державні махінації та політичні переговори можуть стати непростим завданням для лідера-початківця. Щоб підготувати вмілого правителя, слід зосередитися на його адміністративній освіті."
  diplomatic_education_desc: "Щоб наша нація жила і процвітала, потрібно укладати угоди та приймати виважені дипломатичні рішення. Отже, цьому потрібно навчати і королівських спадкоємців, якщо ми хочемо отримати дипломатичну перевагу над ворогами."
  military_education_desc: "Армійська міць — це основа нашої державності. Дуже важливо зробити в освітній програмі акцент на військову науку, природу війни та управління військами."
  expensive_in_depth_education_desc: "Ми достатньо багаті, щоб забезпечити спадкоємцям дорогу освіту. Доступ до найкращих вчителів та навчальних матеріалів забезпечить їх унікальними знаннями."
