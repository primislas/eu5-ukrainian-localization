  cmd_negotiate_with_rebels: "Переговори з бунтівниками"
  cmd_negotiate_with_rebels_desc: "Настав час прислухатися до благань народу і зробити все можливе для відновлення стабільності країни, інакше ми ризикуємо втратити все, що колись було основою нашої величі."
  cmd_negotiate_with_rebels_tt: "Після витрати #R 3#! од. [Concept('celestial_authority_gc', 'небесного авторитету')|e], залежно від #italic чисельності#! та підтримки [Concept('rebellion', 'заколоту')|e], може статися щось із переліченого:"
  cmd_negotiate_nationalist: "#Y $REBELS_CATEGORY_nationalist$#! вимагатимуть знизити [Concept('control', 'контроль')|e] над їхніми землями та підштовхнуть нас у бік #TOOLTIP:SOCIETAL_VALUE,serfdom_vs_free_subjects,X #L вольностей#!#!»"
  cmd_negotiate_estate: "#Y $REBELS_CATEGORY_estate$#! вимагатимуть зниження [Concept('tax', 'податків')|e] та розширення [Concept('privileges', 'привілеїв')|e]"
  cmd_negotiate_religious: "#Y $REBELS_CATEGORY_religious$#! вимагатимуть #TOOLTIP:STATIC_MODIFIER,religious_concessions_modifier,X #V #L релігійних поступок#!#! та підштовхнуть нас у бік #TOOLTIP:SOCIETAL_VALUE,spiritualist_vs_humanist,X #L терпимости#!#!"
  cmd_reform_the_cabinet: "Реформа ради"
  cmd_reform_the_cabinet_desc: "[ROOT.GetCountry.GetGovernment.GetCabinetTitle] і ті, хто там засідав раніше, понад усе ставили потреби нашого народу. Однак в останні роки занепадництво в цьому середовищі досягло небачених масштабів. Радники, і без того обдаровані привілеями, вимагають собі посади і не виконують обов'язків. Це потрібно змінити, нехай навіть ціною втрати їхньої прихильності."
  cmd_revise_the_tax_code: "Перегляд податкового кодексу"
  cmd_revise_the_tax_code_desc: "Неефективність оподаткування наших численних провінцій призвела до значних втрат і фактичного зниження доходів скарбниці. Ми повинні зайнятися джерелами доходів, щоб не допустити падіння династії!"
  has_revised_tax_code_action_tt: "Ми завершили [Concept('cabinet_action', 'доручення')|e] «[ShowCabinetActionName('reform_taxation_system')]» і [Concept('action', 'дію')|e] [Concept('disaster', 'лиха')|e] «[ShowGenericActionName('cmd_revise_the_tax_code')]»"
  cmd_restore_stability: "Відновлення стабільності [GetCountry('CHI').Custom('rank_ru_GEN')|l]"
  cmd_restore_stability_desc: "Нещодавнє лихо, яке спіткало наш великий народ, сильно підірвало нашу стабільність. Щоб пережити цей смутний час, ми повинні приділити більше уваги внутрішній політиці."
  cmd_strengthen_crown: "Зміцнення трону"
  cmd_strengthen_crown_desc: "Наша легітимність як власників Небесного мандату опинилася під питанням. Ми повинні заткнути роти критикам і повернути собі колишню велич."
  has_completed_revised_tax_code_tt: "Завершено [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,reform_taxation_system,X #L «Реформа податкової системи»#!#!"
  has_not_already_enacted_this_action_during_the_disaster_tt: "Ця [Concept('action', 'дія')|e] ще не застосовувалася під час поточного [Concept('disaster', 'лиха')|e]"
  peranakan_trading_rights: "Торгові права перанакан"
  restrict_peranakan_trading_rights: "Обмеження торгових прав перанакан"
  restrict_peranakan_trading_rights_desc: "#TOOLTIP:RELIGIONGROUP,muslim,X #L Іслам#!#! проник до нас через спілкування з купцями-мусульманами, багато з яких осіли в наших північних портах, і тепер їх називають перанакан. Щоб уповільнити навернення наших провінцій, можна обмежити торгові права цих купців."
  unrestrict_peranakan_trading_rights: "Відновлення торгових прав перанакан"
  unrestrict_peranakan_trading_rights_desc: "Обмеження, накладені на перанакан, занадто великі і зашкодять нам у довгостроковій перспективі. Ми повинні зняти їх."
  ban_conversion_of_adipatis: "Заборона на навернення адіпаті"
  ban_conversion_of_adipatis_desc: "Навернення наших провінційних губернаторів, адіпаті, загрожує цілісності нашої країни. Заборонивши цю практику, ми зможемо довше підтримувати стабільність, але наші підлеглі будуть незадоволені."
  unban_conversion_of_adipatis: "Скасування заборони на навернення адіпаті"
  unban_conversion_of_adipatis_desc: "Заборона на навернення в #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#! створила занадто багато проблем і призвела до заворушень. Скасувавши її, ми покращимо відносини зі своїми підданими."
  control_the_bhres: "Контроль над Бхре"
  control_the_bhres_desc: "Багато князів та їхніх придворних поступово приймають #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!. Зазвичай ми не звертаємо уваги на таке, але зараз їхня вірність у довгостроковій перспективі опиняється під питанням."
  maj_convert_to_islam: "Навернення в іслам"
  maj_convert_to_islam_desc: "#TOOLTIP:RELIGION,$sunni_tt$,X #L Сунітський#!#! #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#! стрімко поширюється в наших землях, і багато губернаторів вже прийняли цю релігію. Можливо, настав час відкинути гордість і навернутися слідом за ними, хоч це сильно вдарить по нашому престижу."
  maj_consequences_of_conversion: "При наверненні в #TOOLTIP:RELIGION,$sunni_tt$,X #L сунізм#!#! всі [Concept('subject', 'васали')|e], [Concept('liberty_desire', 'бажання свободи')|e] яких нижче #y 10,0%#!, стануть незалежними, а також відбудеться наступне:"
  MAJ_reduce_sunni_dominance: "$demak_progress$ знижується на #g 10%#!"
  MAJ_for_as_long_as_this_modifier_is_active: "Поки [ShowModifier('adipati_conversion_ban')|l] чинний, [Concept('location', 'місцевості')|e] не втрачатимуть статус [Concept('cores', 'корінних')|e], коли #TOOLTIP:RELIGION,$sunni_tt$,X #L сунізм#!#! стає панівною релігією в них."
  peranakan_trading_rights_restriction_event_impact: "Поки діє #TOOLTIP:STATIC_MODIFIER,peranakan_trading_rights_restriction,X #V #L обмеження торгових прав перанакан#!#!, [Concept('event', 'подія')|e] «death_of_hayan_wuruk.6.title$» спрацьовуватиме вдвічі рідше."
  hide_from_black_death: "Прихисток для двору"
  hide_from_black_death_desc: "Ця дія знизить ризик смерті придворних від чуми, однак [Concept('pops', 'населення')|e] вважатиме, що ми залишили його напризволяще."
  stop_hide_from_black_death: "Відмова ховатися"
  stop_hide_from_black_death_desc: "Ми повинні з'явитися народу і цим показати, що не боїмося чорної смерті."
  isolate_cities_black_death: "Ізоляція міст"
  isolate_cities_black_death_desc: "Можливо, нам вдасться трохи відновити порядок та обмежити захворюваність, якщо замкнути міські ворота та заборонити людям залишати міста або входити до них."
  stop_isolate_cities_black_death: "Відкриття міст"
  stop_isolate_cities_black_death_desc: "Епідемія відступає, і ми відкриваємо свої міста для купців та чужинців."
  isolate_cities_effect_tt: "Усі [Concept('towns_and_cities', 'міста')|e] отримують модифікатор #TOOLTIP:STATIC_MODIFIER,isolating_cities,X #V #L «Ізоляція міст»#!#!. Його ефективність залежить від ступеня [Concept('control', 'контролю')|e] над [Concept('location', 'місцевістю')|e]."
  control_the_food_market: "Контроль над продовольчим ринком"
  control_the_food_market_desc: "Наше головне завдання в цей важкий час — подбати про наявність зерна та інших продовольчих товарів. Ми заборонимо їх експорт, незважаючи на те, що купці будуть незадоволені."
  stop_control_the_food_market: "Скасування контролю над продовольчим ринком"
  stop_control_the_food_market_desc: "Ці заходи більше не потрібні. Купці можуть повертатися до торгівлі."
  close_the_borders: "Ізоляція країни"
  close_the_borders_desc: "Купці та приїжджі приносять до нас заразу здалеку. Щоб захистити населення, ми змушені повністю перекрити кордони, хоч це й завдасть удару по нашій торгівлі та економіці."
  stop_close_the_borders: "Скасування ізоляції країни"
  stop_close_the_borders_desc: "Настав час знову пустити в країну товари та купців з інших країн."
  no_contact_with_outsiders: "Заборона на контакт із чужинцями"
  no_contact_with_outsiders_desc: "Кожен знає, що чужинці та купці із сусідніх племен принесли чуму на наші землі. Щоб запобігти подальшому поширенню цієї зарази, ми повинні розірвати всі зв'язки із сусідами та закрити кордони для торгівлі, незважаючи на наслідки для економіки."
  stop_no_contact_with_outsiders: "Скасувати «$no_contact_with_outsiders$»"
  stop_no_contact_with_outsiders_desc: "$no_contact_with_outsiders_desc$"
  segregate_the_infected: "Ізоляція заражених"
  segregate_the_infected_desc: "Чума надто вільно почувається в нашій країні. Щоб припинити поширення хвороби, ми заборонимо хворим залишати домівки."
  stop_segregate_the_infected: "Скасування ізоляції заражених"
  stop_segregate_the_infected_desc: "Ми дозволимо хворим на чуму знову вільно переміщатися."
  great_pestilence_segregate_the_infected: "$segregate_the_infected$"
  great_pestilence_segregate_the_infected_desc: "Згубна чума надто вільно почувається в наших колоніях, викошуючи корінне населення. Щоб припинити поширення хвороби, ми заборонимо хворим залишати домівки."
  great_pestilence_stop_segregate_the_infected: "$stop_segregate_the_infected$"
  great_pestilence_stop_segregate_the_infected_desc: "$stop_segregate_the_infected_desc$"
  strict_quarantines: "Вигнання хворих"
  strict_quarantines_desc: "Жертви чуми небезпечні. Їм достатньо пройти поруч зі здоровою людиною, щоб та заразилася. Їх слід виганяти звідусіль, щоб у людей залишалася хоч якась надія."
  stop_strict_quarantines: "Скасування суворого карантину"
  stop_strict_quarantines_desc: "Необхідність виганяти жертв чуми відпала. Усі #TOOLTIP:BUILDING_TYPE,pest_house,X #L чумні бараки#!#!, де селилися хворі, тепер можна спалити."
  procure_remedies: "Купівля ліків"
  procure_remedies_no_liquor: "$procure_remedies$"
  procure_remedies_desc: "Цій хворобі можна протистояти. Наші лікарі та священники стверджують, що їм відомі рецепти зілля, які можуть допомогти хворим. Отже, необхідно подбати про постачання цих зілля."
  procure_remedies_tt: "Усі [Concept('market', 'ринки')|e] в наших межах отримують модифікатор «[ShowTemporaryDemand('procure_remedies')]» до кінця часів"
  procure_remedies_no_liquor_tt: "Усі [Concept('market', 'ринки')|e] в наших межах отримують модифікатор «[ShowTemporaryDemand('procure_remedies_no_liquor')]» до кінця часів"
  stop_procure_remedies: "Припинення купівлі ліків"
  stop_procure_remedies_desc: "Зілля та варива, які цілителі та інші шахраї видають за чарівні безвідмовні засоби, виявилися не просто марними, а й небезпечними."
  great_pestilence_procure_remedies: "$procure_remedies$"
  great_pestilence_procure_remedies_desc: "Хворобі, від якої страждають наші нові громадяни, можна протистояти. Багато лікарів та шаманів стверджують, що їм відомі рецепти зілля, які можуть допомогти хворим. Отже, необхідно подбати про постачання цих зілля."
  great_pestilence_stop_procure_remedies: "$stop_procure_remedies$"
  great_pestilence_stop_procure_remedies_desc: "$stop_procure_remedies_desc$"
  sponsor_sin_forgiveness: "Організація масового покаяння"
  sponsor_sin_forgiveness_desc: "Чума — це кара, яку Бог послав нам за гріхи. Щоб вимолити собі прощення, ми влаштуємо по всій країні церковні служби та закликатимемо народ очиститися від гріха."
  stop_sponsor_sin_forgiveness: "Припинення масового покаяння"
  stop_sponsor_sin_forgiveness_desc: "Церковні служби виявилися безсилі зупинити зараження. Більше того — парафіяни, що збираються на молитву, хворіють навіть частіше за інших."
  sponsor_spiritual_protection: "Підтримка духовного захисту"
  sponsor_spiritual_protection_desc: "Як стверджують [SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')|l], хвороби викликані порушенням духовної рівноваги в тілі хворого або порушенням табу, через що злі духи змогли проникнути в тіло винного. Для боротьби з хворобою ми можемо привабити наймогутніших духів і принести їм жертви, щоб переконати їх дарувати захист нашому народу."
  stop_sponsor_spiritual_protection: "Припинити підтримку духовної оборони"
  stop_sponsor_spiritual_protection_desc: "Численні жертвоприношення та ритуали ніяк не сповільнюють зараження. Духи покинули нас напризволяще."
  blame_the_minorities: "Вказівка на цапів-відбувайлів"
  blame_the_minorities_desc: "Ми помітили, що деяким громадянам вдалося уникнути хвороби. Напевно, саме вони й наслали цю епідемію на інших. Очевидно, що винні в усьому наші релігійні меншини."
  stop_blame_the_minorities: "Припинення пошуку цапів-відбувайлів"
  stop_blame_the_minorities_desc: "Релігійні меншини не винні в розгулі чуми. Час припинити ці безпідставні гоніння."
  great_pestilence_blame_the_minorities: "$blame_the_minorities$"
  great_pestilence_blame_the_minorities_desc: "Не всі однаково постраждали від хвороби. Хворіють лише ті, хто родом із цих земель і прожив усе своє життя далеко від світла Бога. Очевидно, що Бог карає їх за гріхи."
  great_pestilence_stop_blame_the_minorities: "$stop_blame_the_minorities$"
  great_pestilence_stop_blame_the_minorities_desc: "Корінне населення колоній — невинні та безгрішні душі, вони подібні до дітей, що виросли в глушині. Їхні вчинки не могли наслати на нас цю божественну чуму, і вони не заслуговують на те, щоб їх піддавали гонінням."
  legitimize_parliament_abolition: "Розпуск законодавчих зборів"
  legitimize_parliament_abolition_desc: "Недавні спроби взяти [SCOPE.sCountry('actor').Custom('parliament_ru_ACC')|l] під контроль сколихнули [SCOPE.sCountry('actor').Custom('rank_ru_ACC')|l]. Подібний час смути відкриває перед нами нові можливості! Потрібно поспішити й узаконити розпуск зборів.\n"
  reinstate_the_legislative_assembly: "Відновлення законодавчих зборів"
  reinstate_the_legislative_assembly_desc: "Наша схильність до самодержавства зашкодила народу та підірвала відносини зі станами. Щоб заспокоїти їх і відновити колишню владу закону, ми повинні вжити заходів щодо відновлення [SCOPE.sCountry('actor').Custom('parliament_ru_GEN')|l].\n"
  rein_estate_loc_key: "Вплив станів у нашій країні незабаром ослабне, що дозволить нам обмежити повноваження місцевої влади. Завдяки цьому [SCOPE.sCountry('actor').GetGovernment.GetCourtTitle|l] опиниться в наших руках!\n"
  rein_in_nobles: "Упокорення знаті"
  rein_in_nobles_desc: "$rein_estate_loc_key$"
  restrictions_loc_key: "Ми зможемо накласти обмеження на"
  impose_restrictions_on_nobles_through_event_tt: "$restrictions_loc_key$ стан «[SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l]» за допомогою [Concept('event', 'події')|e]"
  rein_in_burghers: "Приборкання багатіїв"
  rein_in_burghers_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_burghers_through_event_tt: "$restrictions_loc_key$ стан «[SCOPE.sCountry('actor').GetGovernment.GetEstateName('burghers_estate')|l]» за допомогою [Concept('event', 'події')|e]"
  rein_in_clergy: "Упокорення вірян"
  rein_in_clergy_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_clergy_through_event_tt: "$restrictions_loc_key$ стан «[SCOPE.sCountry('actor').GetGovernment.GetEstateName('clergy_estate')|l]» за допомогою [Concept('event', 'події')|e]"
  rein_in_peasants: "Упокорення селян"
  rein_in_peasants_desc: "$rein_estate_loc_key$"
  impose_restrictions_on_peasants_through_event_tt: "$restrictions_loc_key$ стану «[SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')|l]» за допомогою [Concept('event', 'події')|e]"
  this_will_end_the_disaster_tt: "Це завершить [Concept('disaster', 'лихо')|e] «[ShowDisasterName('aspiration_for_liberty')]»\n"
  move_nw_good_to_new_location: "Поширення товару з Нового Світу"
  move_nw_good_to_new_location_desc: "Ми можемо поширити один товар, що походить з #TOOLTIP:CONTINENT,america,X #L Америки#!#!, у будь-якій зі своїх [Concept('locations', 'місцевостей')|e] на невдоволення місцевих жителів. Нам також доведеться наново розвивати [Concept('rgo', 'видобуток ресурсів')|e] у місцевості."
  move_nw_good_to_new_location_no_available_good: "@trigger_no! У вас немає жодної [Concept('location', 'місцевості')|e], що тяжіє до ринку, де продається або виробляється цей [Concept('good', 'товар')]"
  move_nw_good_to_new_location_no_available_location: "@trigger_no! У вас немає жодної [Concept('location', 'місцевості')|e], де можна налагодити [Concept('rgo', 'видобуток')|e] [Concept('good', 'ресурсу')] з Нового Світу"
  move_ow_good_to_new_location_no_available_location: "@trigger_no! У вас немає жодної [Concept('location', 'місцевості')|e], де можна налагодити [Concept('rgo', 'видобуток')|e] [Concept('good', 'ресурсів')] зі Старого Світу."
  move_ow_good_to_new_location: "Поширення товару зі Старого Світу"
  move_ow_good_to_new_location_desc: "Ми можемо поширити один із наших звичних товарів у своїх [Concept('locations', 'місцевостях')|e] #TOOLTIP:CONTINENT,america,X #L Америки#!#! на невдоволення місцевого населення. Нам також доведеться наново розвивати [Concept('rgo', 'видобуток ресурсів')|e] у місцевості."
  learn_from_foreigners: "Уроки іноземців"
  learn_from_foreigners_desc: "Ми можемо багато чого навчитися у цих дивних чужоземців. Торгівля та добрі стосунки підуть на користь нашому народу."
  absorb_institutions: "Переймання інститутів"
  absorb_institutions_desc: "Дивний спосіб життя цих чужоземців збиває з пантелику і лякає нас, але ми можемо багато чого в них навчитися та адаптувати ці знання під наше суспільство."
  choose_institution: "Оберіть [Concept('institution', 'інститут')|e]"
  no_valid_institution: "@trigger_no! Немає відповідних [Concept('institution', 'інститутів')|e]."
  lordship_of_ireland_casus_belli: "Отримання приводу для війни"
  lordship_of_ireland_casus_belli_desc: "Отримайте [Concept('casus_belli', 'привід для війни')|e] «[ShowCasusBelliName('cb_subjugation')]» з країнами, що не входять до складу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манору Ірландія#!#!."
  lordship_of_ireland_casus_belli_none_tt: "Оберіть, на яку [Concept('country', 'країну')|e] напасти!"
  lordship_of_ireland_invite_planters: "Прохання про фермерів"
  lordship_of_ireland_invite_planters_desc: "Відправте поселенців з рідної країни для приросту віруючого населення."
  lordship_of_ireland_invite_planters_effect_none_tt: "Протягом наступних 10 років приблизно 2400 [Concept('pops', 'груп населення')|e], що сповідують нашу [Concept('religion', 'релігію')|e], перемістяться з [Concept('area', 'області')|e] в #TOOLTIP:REGION,great_britain_region,X #L Британії#!#! в #TOOLTIP:REGION,ireland_region,X #L ірландську#!#! [Concept('province_definition', 'провінцію')|e]"
  lordship_of_ireland_invite_planters_effect_tt: "Протягом наступних 10 років приблизно 2400 [Concept('pops', 'груп населення')|e] перемістяться з області [origin_area.GetName] у провінцію [target_province.GetName]."
  lordship_of_ireland_form_kingdom: "Заснування королівства"
  lordship_of_ireland_form_kingdom_desc: "Нарешті ми отримали титул короля Ірландії, який зміцнить нашу владу та надасть нам легітимності в очах народу."
  lordship_of_ireland_form_kingdom_region_tt: "Кожною [Concept('location', 'місцевістю')|e] в #TOOLTIP:REGION,ireland_region,X #L ірландському#!#! [Concept('region', 'регіоні')|e] повинен [Concept('owned', 'володіти')|e] [Concept('member', 'учасник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манору Ірландія#!#!."
  IRE_f_lordship_tt: "Тільки [Concept('international_organization_leader_short', 'лідер')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манору Ірландія#!#! може виконати дію «[ShowGenericActionName('lordship_of_ireland_form_kingdom')]». Звичайним [Concept('member', 'учасникам')|e] вона недоступна."
  neither_highkingship_nor_lordship_exist_tt: "[GetUniqueInternationalOrganization('lordship_of_ireland').GetName] та [GetUniqueInternationalOrganization('high_kingship').GetName] не існують."
  violate_treaty_of_tordesillas: "Порушити $treaty_of_tordesillas$"
  violate_treaty_of_tordesillas_desc: "$treaty_of_tordesillas$ — не більше ніж безглуздий папірець для тих, хто ризикує життями у спробах створити для себе краще майбутнє на негостинних і небезпечних нових землях.\n\nМи проігноруємо цю угоду і дозволимо своєму народу взяти те, що по праву йому належить."
  stop_violate_treaty_of_tordesillas: "Припинити порушувати договір [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]"
  stop_violate_treaty_of_tordesillas_desc: "В інтересах дипломатичних відносин нашої країни ми підкоримося і перестанемо порушувати умови Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
  tordesillas_claim_conflicting_area_price: "Претензія на спірну область"
  tordesillas_claim_area_price: "Претензія на область"
  tordesillas_claim_area: "Претензія на область"
  tordesillas_claim_area_desc: "Розширте наші колоніальні домагання на сусідню [Concept('area', 'область')|e]."
  tordesillas_free_claim_area: "Претензія на незайняту область"
  tordesillas_free_claim_area_desc: "Створіть колоніальні претензії на будь-яку [Concept('area', 'область')|e] в межах нашої колонізаційної відстані."
  tordesillas_claim_conflicting_area: "Претензія на спірну область"
  tordesillas_claim_conflicting_area_desc: "Ми скористаємося своїм впливом на [GetCountry('PAP').Custom('longname_ru_GEN')], щоб створити колоніальну претензію на [Concept('area', 'область')|e], в якій і ми, і наш суперник володіємо землями."
  tordesillas_push_to_settle_treaty: "Вимога укласти договір"
  tordesillas_push_to_settle_treaty_desc: "Скористайтеся нашим впливом на [GetCountry('PAP').Custom('longname_ru_ACC')], щоб прискорити прийняття Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip] в його нинішньому вигляді."
  tordesillas_push_to_settle_treaty.tt: "Прогрес прийняття збільшиться на #G 10#!"
  tordesillas_upheld_treaty_relevance: "Збереження значущості договору"
  tordesillas_upheld_treaty_relevance_desc: "Захистіть важливість і справедливість Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
  tordesillas_upheld_treaty_relevance.tt: "Значущість договору збільшиться на #G 10#!"
  tordesillas_demand_transfer_colony: "Вимога передати оспорювану провінцію"
  tordesillas_demand_transfer_colony_desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] дарує нам і тільки нам право колонізувати ці землі та правити ними, бо так хоче [GetCountry('PAP').GetReligion.GetGodName]. Ті, хто порушує цей божественний мандат, повинні смиренно поступитися своїми землями нам або зіткнутися з наслідками."
  tordesillas_demand_transfer_colony.tt: "У разі відмови ми отримаємо [Concept('casus_belli', 'привід для війни')|e], що дозволить нам захопити землі силою"
  tordesillas_revoke_claim: "Відмова від претензії"
  tordesillas_revoke_claim_desc: "Переговори — це завжди обопільний процес, що складається з успіхів і поступок. Ми часом змушені дозволяти своїм суперникам отримувати бажане, а потім завдяки мистецтву дипломатії видряпувати ці поступки назад.\n\nСкориставшись своїм впливом, ми зможемо домогтися того, що [GetCountry('PAP').GetLongName] відклич[GetCountry('PAP').Custom('endlong_etut')] одну з претензій наших візаві, і переговори повернуться до моменту, коли ми займали провідну роль."
  tordesillas_move_the_line: "Перегляд кордону"
  tordesillas_move_the_line_desc: "Кордони, визначені чинним Договором [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip], не такі вигідні, як нам би хотілося. Ми повинні змістити розділяючу світ межу з вигодою для нас і показати світу, що з нами жарти погані."
  tordesillas_move_the_line.tt: "Уявна лінія, що розділяє світ між підписантами договору, переміститься в іншу [Concept('location', 'місцевість')|e]"
  tordesillas_move_the_line.tt2: "Прогрес прийняття скоротиться на #R 5#!"
  tordesillas_swap_sides: "Обмін сторонами"
  tordesillas_swap_sides_desc: "Під час перемовин ми усвідомили, що нашим суперникам дісталася куди краща частина світу, ніж нам. Ми задіємо свою репутацію та престиж у спробі переконати їх, що обмін претензіями їм же й вигідний."
  tordesillas_swap_claim: "Обмін претензіями"
  tordesillas_swap_claim_desc: "З підписанням Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip] світ виявився розділений між двома головними колоніальними країнами, але ми все одно незадоволені результатом. Можна внести туди правки, які дозволять нам покращити своє становище. Ми могли б переконати одну з цих країн обміняти одну з наших претензій в області на їхні претензії на сусідню область."
  POLICY_BIAS_REFORM_DESIRE: "Прагнення до реформації"
  conduct_investigation: "Проведення розслідування"
  conduct_investigation_desc: "Уважне спостереження за чиновниками та придворними допоможе виявити зрадників, що плетуть інтриги проти корони!"
  any_conspirators_are_active_tt: "Хоча б 1 [Concept('character', 'персонаж')|e] бере участь у змові"
  is_a_conspirator: "@trigger_no! У змові по поваленню влади не залишилося учасників."
  execute_court_member: "Страта придворного"
  execute_court_member_desc: "Настав час діяти! Скоро полетять голови можливих змовників! Ми повинні стратити тих, хто бажає нашої смерті, щоб не стати жертвами їхніх амбіцій."
  call_private_council: "Скликання таємної ради"
  call_private_council_desc: "Впливові люди, що знають двір як свої п'ять пальців і завжди готові викрити своїх колег-змовників заради золота або привілеїв."
  schism_show_support_for_one_pope: "Вираження відданості"
  schism_show_support_for_one_pope_desc: "Оголосити, що [GetInternationalOrganization('catholic_church').GetLeaderTitle|l] може розраховувати на нашу підтримку."
  schism_show_unity_of_faith: "Демонстрація єдності віри"
  schism_show_unity_of_faith_desc: "Покажемо, що наші люди сповідують одну релігію."
  schism_demand_support_from_one_pope: "Вимога підтримки від кандидата"
  schism_demand_support_from_one_pope_desc: "Віряни отримають свою нагороду. Потрібно лише попросити про неї."
  choose_the_tatar_country: "Обрати татарського сюзерена"
  choose_the_tatar_country_no_countries: "Немає відповідних країн"
  break_the_yoke: "Визволення від татарського ярма"
  break_the_yoke_desc: "[ShowSpecialStatusName('tatar_overlord')] більше не буде нас гнобити! Настав час скинути кайдани з #TOOLTIP:CULTUREGROUP,russian_group,X #L руського#!#! народу."
  break_tatar_yoke_tt: "Ми оголосимо #ONCLICK:COUNTRY,[GetInternationalOrganization('tatar_yoke').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetInternationalOrganization('tatar_yoke').GetLeaderCountry.Custom('CL_tt')],X [GetInternationalOrganization('tatar_yoke').GetLeaderCountry.Custom('CL_DAT')|L]#!#! [Concept('war', 'війну')|e], приводом для якої буде [ShowCasusBelliName('cb_break_free_tatar_yoke')|l]. Як тільки ми нав'яжемо ворогу свої умови — [ShowPeaceTreatyTypeName('break_from_tatar_yoke')|l], — наша країна стане вільною від #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарського ярма#!#!."
  ask_to_become_tax_collector: "Запит піднесення"
  ask_to_become_tax_collector_desc: "Поточний #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великий князь володимирський#!#! більше не годиться для збору данини з нашого народу. Ми куди краще підходимо на цю роль, що дозволить нам стати лідером #TOOLTIP:CULTUREGROUP,russian_group,X #L руського#!#! народу."
  ask_to_become_tax_collector_tt: "Ми попросимо #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_ACC')|L]#!#! передати нам титул #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великого князя володимирського#!#!."
  reclaim_high_kingship_land: "$cb_high_kingship_reclamation$"
  reclaim_high_kingship_land_desc: "$cb_high_kingship_reclamation_desc$"
  overthrow_high_king: "$cb_high_kingship_overthrow$"
  overthrow_high_king_desc: "$cb_high_kingship_overthrow_desc$"
  subjugate_high_kingship_member: "$cb_high_kingship_subjugate$"
  subjugate_high_kingship_member_desc: "$cb_high_kingship_subjugate_desc$"
  transition_to_monarchy: "Перехід до монархії"
  transition_to_republic: "Перехід до республіки"
  transition_to_theocracy: "Перехід до теократії"
  warn_about_loss_of_content_tt: "Ми можемо #R втратити#! доступ до певних елементів поточної [Concept('government_type', 'форми правління')|e], таких як [Concept('policies', 'політики')|e], [Concept('laws', 'закони')|e], [Concept('buildings', 'споруди')|e] та інше"
  not_in_union_tt: "Ми зараз НЕ перебуваємо в [Concept('union', 'унії')|e]"
  monarchy_to_republic: "$transition_to_republic$"
  monarchy_to_republic_desc: "Настав час встановити у нас ідеали #TOOLTIP:GOVTYPE,republic,X #L республіки#!#!. Колишні очолювані знаттю інститути безнадійно застаріли!"
  monarchy_to_theocracy: "$transition_to_theocracy$"
  monarchy_to_theocracy_desc: "Божественна воля вимагає від нас відмовитися від статус-кво, що склався в уряді, і наділити владою духовенство, встановивши в країні #TOOLTIP:GOVTYPE,theocracy,X #L теократію#!#!."
  theocracy_to_monarchy: "$transition_to_monarchy$"
  theocracy_to_monarchy_desc: "Нашому народу потрібна сильна влада. Керувати країною будуть багаті знатні родини, а не священники в рясах. Майбутнє — тільки за монархією."
  ruler_regent_relatives_crown_estate_tt: "[actor.GetGovernment.GetRulerOrRegent.GetName] та [actor.GetGovernment.GetRulerOrRegent.GetHerHis] близькі родичі приєднаються до [Concept('estate', 'стану')|e] «$crown_estate$»"
  republic_to_monarchy: "$transition_to_monarchy$"
  republic_to_monarchy_desc: "Республіканські цінності в нашій країні поступово відмирають — владу прибирає до рук багата знать. Цілком логічно, що наступним кроком має стати перехід до #TOOLTIP:GOVTYPE,monarchy,X #L монархічної#!#! форми правління."
  tribal_to_monarchy: "$transition_to_monarchy$"
  tribal_to_monarchy_desc: "Звичаї наших предків безнадійно застаріли. Щоб пережити випробування, які приготувала нам історія, потрібно перетворити країну на #TOOLTIP:GOVTYPE,monarchy,X #L монархію#!#!."
  kicks_us_from_jurchen_confederation_tt: "Після встановлення #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#! нас виключать з [Concept('international_organization', 'міжнародного об’єднання')|e] #Y «Конфедерація чжурчженів»#! (якщо ми не #Y лідер#! цього об’єднання)."
  gov_action_republic_to_theocracy: "$transition_to_theocracy$"
  gov_action_republic_to_theocracy_desc: "Духовенство постановило, що ми зобов’язані впровадити в країні теократичні цінності, оскільки вони поступово приходять на зміну нинішнім. Під керівництвом згори наша правовірність злетить на небувалі висоти, неможливі в безбожному республіканському суспільстві."
  theocracy_to_republic: "$transition_to_republic$"
  theocracy_to_republic_desc: "Вплив духовенства в’яне, і це не найкращим чином позначається на стабільності нашої країни. Провівши низку ретельно зважених реформ, ми передамо залишки їхньої влади містянам."