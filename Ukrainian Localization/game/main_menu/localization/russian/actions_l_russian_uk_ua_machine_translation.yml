  embrace_the_reformation: "На боці реформації"
  embrace_the_reformation_desc: "У нашій країні поширилася реформація! Ми могли б прийняти зміни та стати оплотом нової віри."
  embrace_the_reformation_tt: "Наша [Concept('country', 'країна')|e] навернеться до обраної [Concept('religion', 'релігії')|e], зокрема наші [Concept('ruler', 'правитель')|e], [Concept('consort', 'консорт')|e], [Concept('heir', 'спадкоємець')|e] та [Concept('children', 'діти')|e] нашого [Concept('ruler', 'правителя')|e]."
  dissolve_monasteries: "Розпуск монастирів"
  dissolve_monasteries_desc: "Католицизм — це застарілий та єретичний напрямок християнства. Ми повинні розпустити якомога більше нонконформістських монастирів та позбавити боговідступників усіх земель та цінностей."
  militarise_religious_icons: "Божественний захист"
  militarise_religious_icons_desc: "Релігія важлива для всіх: і для мирних громадян, і для вояцтва. Ви можете підвищити бойовий дух війська, якщо дозволите нашим воїнам використовувати церковні ікони під час воєнних кампаній."
  reformation_diplomacy: "Братство реформаторів"
  reformation_diplomacy_desc: "Англіканство — особливий напрямок реформаторської церкви, проте інші реформатори залишаються нашими братами та сестрами у Христі. Ми повинні налагодити зв'язки з народами, що сповідують нашу релігію."
  reformation_diplomacy_tt: "Наші відносини з усіма [Concept('countries', 'країнами')|e], що підтримали Реформацію, покращаться."
  deport_heretics: "Видворення єретиків"
  deport_heretics_desc: "Єретики становлять велику небезпеку для нашої релігії та культури. Ми повинні видворити їх з країни та заслати до Нового Світу."
  deport_heretics_tt: "Ми депортуємо частину нашого єретичного населення до одного з колоніальних поселень."
  encourage_innovativeness: "Заохочення новаторства"
  encourage_innovativeness_desc: "Старі церковні догми — не що інше, як релігійні забобони. Ми повинні заохочувати новаторство серед священників та парафіян."
  progress_of_the_supreme_governor: "Успіхи верховного губернатора"
  progress_of_the_supreme_governor_desc: "Хода верховного губернатора і водночас глави країни по всій країні збільшує його популярність серед населення та зміцнює патріотизм громадян."
  NO_POLICY: "Жодної політики"
  divorce_ruler: "Дозвіл на розлучення"
  divorce_ruler_desc: "Роль нашої канцелярії визначається її повноваженнями. Наприклад, вона могла б розглядати прохання про законне розірвання шлюбу, що створило б сприятливі умови для дипломатичних маневрів та дозволило б нам встановлювати вигідні династичні зв'язки."
  choose_consort_to_divorce_from: "Оберіть, з яким [Concept('consort', 'консортом')|e] розлучитися"
  summon_mystic: "Допомога містика"
  summon_mystic_desc: "Серед наших ченців є люди, які щосили намагаються стати ближче до Бога. Цих чоловіків і жінок називають містиками. Вони володіють великою мудрістю і можуть допомогти нам у державних справах. У разі необхідності не соромтеся звернутися до них за порадою."
  bosnian_church_diplomacy: "Відправлення посольства до Риму"
  bosnian_church_diplomacy_desc: "Через нашу релігійну ізоляцію багато сусідів не вважають нас справжніми католиками і навіть звинувачують у єресі. Посланцям нашої церкви слід вирушити до Риму і принести клятву вірності папі, щоб покласти край цим небезпечним чуткам."
  bosnian_church_diplomacy_tt: "Наші відносини з усіма країнами, що підтримали #TOOLTIP:LOCATION,rome,X #L Рим#!#!, покращаться."
  improve_opinion_with_all_catholics_tt: "Ми покращимо [Concept('opinion', 'думку')|e] всіх #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! [Concept('country', 'країн')|e] про нас на #G 50#!"
