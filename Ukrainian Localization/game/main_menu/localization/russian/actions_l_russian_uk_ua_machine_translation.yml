  sengoku_proclaim_clan_independence: "Проголошення незалежності клану"
  sengoku_proclaim_clan_independence_desc: "[GetUniqueInternationalOrganization('japanese_shogunate').GetName] ослаб і більше не може ефективно контролювати клани. Ми повинні скористатися ситуацією, що склалася, і домогтися незалежності від влади сьогуна."
  clan_has_valid_landable_location.tt: "У нас є присутність у належних сьогуну [Concept('locations', 'місцевостях')|e], де ми володіємо більшістю [Concept('foreign_buildings', 'закордонних споруд')|e]"
  sengoku_increment_recruitment: "Додатковий набір"
  sengoku_increment_recruitment_desc: "Нас чекає період смути та війн. Ми повинні збільшити чисельність своїх військ, набравши нових рекрутів."
  sengoku_offer_hostage: "Пропозиція заручника"
  sengoku_offer_hostage_desc: "Ми зможемо зміцнити узи з іншими кланами, якщо відправимо до них членів родини як заручників."
  sengoku_ask_for_hostage: "Прохання про заручника"
  sengoku_ask_for_hostage_desc: "Ми можемо попросити клан відправити до нас одного з членів родини як заручника, щоб зміцнити узи з ним."
  sengoku_prove_heritage: "Доказ спадщини"
  sengoku_prove_heritage_desc: "Корені нашої родини, як і будь-якої іншої, сягають глибокого минулого. Ми можемо спробувати «відшукати» в наших архівах певні документи, які продемонструють давність нашого роду та його тісний зв'язок із ключовими родинами та кланами."
  grant_shugo_office: "Надання посади сюго"
  grant_shugo_office_desc: "Японськими провінціями часом складно керувати, тому сьогун призначає провінційних губернаторів, щоб поширити свою владу на всі землі."
  grant_shugo_office_effect_tt: "Ми зробимо персонажа губернатором провінції, дарувавши йому #TOOLTIP:BUILDING_TYPE,kokufu,X #L кокуфу#!#! в [Concept('location', 'місцевості')|e] та титул #TOOLTIP:SPECIAL_STATUS,shugo_daimyo,X #L даймьо-сюго#!#!, якщо він ще ним не володіє"
  already_shugo_daimyo_tt: "Персонаж уже #TOOLTIP:SPECIAL_STATUS,shugo_daimyo,X #L даймьо-сюго#!#!"
  shugo_province_default: "[ROOT.GetLocation.GetProvince.GetName]"
  shugo_province_location: "[ROOT.GetLocation.GetName]:"
  shugo_province_mutsu: "#BOLD Муцу#!"
  shugo_province_dewa: "#BOLD Дева#!"
  shugo_province_wakasa: "#BOLD Вакаса#!"
  shugo_province_iki: "#BOLD Ікі#!"
  revoke_shugo_office: "Відкликання посади сюго"
  revoke_shugo_office_desc: "Титул сюго дозволяє родині здобути чималу владу та вплив у межах провінції, але його завжди можна відібрати, якщо сюго занадто загордиться."
  revoke_shugo_office_effect_tt: "Ми відберемо посаду губернатора провінції, закривши #TOOLTIP:BUILDING_TYPE,kokufu,X #L кокуфу#!#!, що дасть [ShowBiasValue('opinion_revoked_shugo_office')|+=0] до [Concept('opinion', 'думки')|e] про нас та [Concept('casus_belli', 'привід для війни')|e] #TOOLTIP:CASUS_BELLI,cb_japanese_clan_rebel_against_shogunate_authority,X #L «Заколот проти влади сьогуна»#!#!, після чого персонаж перестане бути #TOOLTIP:SPECIAL_STATUS,shugo_daimyo,X #L даймьо-сюго#!#!, якщо це його єдина посада сюго"
  still_shugo_daimyo_tt: "Персонаж залишиться #TOOLTIP:SPECIAL_STATUS,shugo_daimyo,X #L даймьо-сюго#!#! інших провінцій"
  claim_shugo_office: "Претензія на посаду сюго"
  claim_shugo_office_desc: "Посада сюго має владу та престиж. Будь-який клан, що володіє достатнім впливом у провінції, може вважати, що він заслуговує цього титулу, навіть якщо це суперечить волі сьогуна."
  claim_shugo_office_effect_tt: "Ми станемо губернаторами провінції, заснувавши #TOOLTIP:BUILDING_TYPE,kokufu,X #L кокуфу#!#!"
  seek_alliance_with_overlord_rival: "Пошук підтримки суперника сюзерена"
  seek_alliance_with_overlord_rival_desc: "Для боротьби з тиранією наших сюзеренів нам буде потрібна вся доступна підтримка. На щастя, є ті, хто постійно розмірковує, як би покінчити з нашим нестерпним сюзереном. Потрібно налагодити з ними добрі стосунки та домовитися про спільні дії."
  overlord_rival_is_available.tt: "Суперники нашого сюзерена ще не підтримують колоніального [Concept('subject', 'васала')|e]"
  declare_independence_war: "Оголошення війни за незалежність"
  declare_independence_war_desc: "Прийшов час скинути кайдани гноблення та оголосити про незалежність від нашого сюзерена!"
  create_colonial_federation: "Створення колоніальної федерації"
  create_colonial_federation_desc: "Створення місцевої адміністрації, яка керуватиме землями в колоніях, допоможе нам досягти більшої автономії."
  cf_create_colonial_federation_tt: "Ми створимо та очолимо нову колоніальну федерацію."
  join_colonial_federation: "Вступ до колоніальної федерації"
  join_colonial_federation_desc: "Якщо ми приєднаємося до наших пригноблених братів, у нас буде більше можливостей звільнитися від влади ненависного сюзерена."
  join_colonial_federation_choose_cf: "Вибрати колоніальну федерацію"
  join_colonial_federation_no_ios: "$no_valid_international_organizations$"
  give_colony_representation: "Представництво для колоніального васала"
  give_colony_representation_desc: "Настав час дарувати нашим колоніальним васалам представництво в їхній власній адміністрації."
  give_colony_rebellion_support: "Підтримка колоніального заколоту"
  give_colony_rebellion_support_desc: "Надайте підтримку одному з колоніальних васалів іншої країни, щоб підштовхнути його до заколоту."
  establish_goods_act: "Запровадження закону про товари"
  establish_goods_act_desc: "Завдяки запровадженню нового закону на товари або торгівлю ми зможемо отримувати більше грошей від наших колоній."
  establish_goods_act_tt: "Ми реквізуємо в однієї з наших колоніальних країн її дохід за 6 місяців, підвищивши її [Concept('liberty_desire', 'бажання свободи')|e]"
  recently_established_goods_act: "Запроваджено закон про товари"
  aid_colonial_war: "Допомога в колоніальній війні"
  aid_colonial_war_desc: "Допомога в колоніальній війні допоможе колоніальній країні об'єднати землі та підкреслить наше добре ставлення до неї."
  aid_colonial_war_tt: "Ми допоможемо колоніальному [Concept('subject', 'васалу')|e], відправивши чверть нашого річного приросту [Concept('manpower', 'числа рекрутів')|e], і знизимо її [Concept('liberty_desire', 'бажання свободи')|e]"
  recently_aid_colonial_war: "Надано допомогу в колоніальній війні"
  claim_ilkhanate: "Претензії на $ilkhanate$"
  claim_ilkhanate_desc: "Оскільки $genghis_khan_name$ був нашим прямим предком, влада в Країні Хулагуїдів повинна належати нам."
  we_were_not_forced_to_renounce_ilkhan_claim_tt: "Нас не змушували відмовлятися від претензій на країну Хулагуїдів"
  prepare_military_escalation: "Підготовка до військової ескалації"
  prepare_military_escalation_desc: "Зберіть війська, щоб [SCOPE.sCountry('actor').Custom('GetReligiousLeagueName')] могла розпочати війну, противником в якій виступає інша [SCOPE.sCountry('actor').Custom('GetEnemyReligiousLeagueName')]."
  prepare_military_escalation_tt: "У #ONCLICK:COUNTRY,[SCOPE.sCountry('actor').Custom('CL_tt')] #TOOLTIP:COUNTRY,[SCOPE.sCountry('actor').Custom('CL_tt')],X [SCOPE.sCountry('actor').Custom('CL_GEN')|L]#!#! з'являється [Concept('casus_belli', 'привід')|e] «[ShowCasusBelliName('cb_religious_superiority')]» для війни проти лідера об'єднання «[SCOPE.sCountry('actor').Custom('GetEnemyReligiousLeagueName')]»"
  demand_member_removal: "Переговори про виключення учасника"
  demand_member_removal_desc: "Ми проведемо переговори щодо виходу проблемного учасника об'єднання «[SCOPE.sCountry('actor').Custom('GetEnemyReligiousLeagueName')]»."
  choose_religious_league: "Обрати #Y Релігійну лігу#!"
  choose_country_to_demand_removal: "Обрати [Concept('member', 'учасника')|e] для виключення"
  blocked_from_joining_protestant_union: "Вступ до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$protestant_union_tt$,X #L Євангелічної унії#!#!"
  blocked_from_joining_catholic_league: "Вступ до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_league_tt$,X #L Католицької ліги#!#!"
  join_religious_league: "Вступ до Релігійної ліги"
  join_religious_league_desc: "Вступіть до #Y Релігійної ліги#! для [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,war_of_religions,X #L «Релігійна війна»#!#!."
  join_religious_league_choose_faction: "Оберіть #Y Релігійну лігу#! для вступу"
  no_valid_religious_faction: "@trigger_no! Ми можемо приєднатися до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$protestant_union_tt$,X #L Євангелічної унії#!#! або #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_league_tt$,X #L Католицької ліги#!#! лише якщо є частиною #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, і нас не обмежує перерва."
  join_religious_league_effect_tt: "Ми приєднаємося до обраної #Y Релігійної ліги#! у #TOOLTIP:SITUATION,war_of_religions,X #L Релігійній війні#!#!"
  leave_religious_league: "Вихід з Релігійної ліги"
  leave_religious_league_desc: "Покиньте об'єднання «[SCOPE.sCountry('actor').Custom('GetReligiousLeagueName')]» та розірвіть усі зв'язки з колишніми товаришами."
  join_the_league_war: "Вступити в релігійну війну"
  join_the_league_war_desc: "#TOOLTIP:SITUATION,war_of_religions,X #L Релігійна війна#!#! у розпалі. Наші інтереси в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! під загрозою! Потрібно негайно приєднатися до бойових дій, щоб вороги не досягли свого."
  join_religious_war_choose_war: "Оберіть [Concept('war', 'війну')|e], в яку хочете вступити"
  no_valid_religious_war: "@trigger_no!Між #Y релігійними лігами#! немає війни"
  join_the_league_war_effect_tt: "Ми вступимо в релігійну війну на обраній стороні"
