  steppe_horde_to_monarchy: "Перехід до монархії"
  steppe_horde_to_monarchy_desc: "Країна не може вирішувати проблеми, що стоять перед нею, коли саме її існування під загрозою. На наших землях раз у раз спалахують громадянські війни: замість того щоб підкорятися єдиному твердому авторитету, воїни б'ються за владу.\n\nКочові часи добігають кінця. Настає ера нової монархії!"
  steppe_horde_to_monarchy_tt: "Ми перейдемо до #TOOLTIP:GOVTYPE,monarchy,X #L монархії#!#! і станемо [Concept('settled', 'осілою')|e] країною\n#Y  Цей процес займе 15 років#!"
