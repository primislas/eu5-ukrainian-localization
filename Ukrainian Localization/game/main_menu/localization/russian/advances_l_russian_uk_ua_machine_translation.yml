  northern_center_of_arts: "Центр північного мистецтва"
  northern_center_of_arts_desc: "Новгородська культура відіграє в Європі далеко не останню роль. Вражаючі перекази (кожен новгородець вміє читати й писати), прекрасні ікони та архітектура, що вражає уяву, — гордість не лише нашого великого міста, а й усього руського народу."
  city_of_churches: "Місто церков"
  city_of_churches_desc: "У Новгороді налічується понад 80 православних церков. Деякі з них, особливо Софійський собор, — найбільші земельні володіння в усьому князівстві. Багатство та вплив новгородської церкви такі, що побожність місцевих жителів лише зростає — що, втім, і добре."
  novgorodian_fur_trade: "Новгородська хутрова торгівля"
  novgorodian_fur_trade_desc: "Хутра — це шовкове руське золото. Інші країни отримують багатство від торгівлі дорогоцінними та рідкісними металами, а наше джерело доходу — добротні хутра, якими багата наша батьківщина."
  grand_dukes_army: "Великокняже військо"
  grand_dukes_army_desc: "Повести військо в бій — це головний обов'язок великого князя, досвідченої та сильної людини, покликаної княжити в Новгороді. Під його проводом наші воїни навчаться битися ще краще."
  ushkuiniks: "Ушкуйники"
  ushkuiniks_desc: "Ушкуйники — річкові та морські розбійники на кшталт варягів — колись допомагали нам боротися з усіма, хто наважувався з нами змагатися. На жаль, необхідність протистояти загарбникам (насамперед Москві) змусила нас відмовитися від їхніх послуг. Але сьогодні, мабуть, настав час знову пообіцяти ушкуйникам грошей і навіть відправити їх в інші, більш далекі моря, щоб нагадати сусідам, хто на півночі господар."
  baltic_shipyard: "Балтійська судноверф"
  baltic_shipyard_desc: "Побудувавши на східному узбережжі Балтійського моря велику судноверф, ми підім'яємо під себе заокеанську торгівлю!"
  veche_advance: "Віче"
  veche_advance_desc: "$veche_advance$ — це народні збори, традиція, яка сягає племінних зборів, що існували задовго до становлення Русі. Це вищий судовий та законодавчий орган країни."
  birch_bark_manuscript: "Берестяна грамота"
  birch_bark_manuscript_desc: "У нашій країні кожен має бути навчений грамоти — хоча б заради того, щоб записувати церковні тексти та складати літописи на пам'ять нащадкам."
  novgorod_first_chronicle: "Новгородський перший літопис"
  novgorod_first_chronicle_desc: "#italic Новгородський перший літопис#! оповідає про історію країни від її заснування варязьким князем Рюриком до нинішніх днів. Це культурне надбання, що переходить від батьків дітям."
  defenses_of_novgorod: "Новгородські укріплення"
  defenses_of_novgorod_desc: "Великий Новгород оточений багатьма ворогами. Єретики-варяги на півночі, озвірілі німці на південному сході і навіть інші руські князівства на півдні — всі вони обламають зуби об неприступні фортеці нашої великої держави."
  reforms_of_the_posadnichestvo: "Посадницька влада"
  reforms_of_the_posadnichestvo_desc: "Посадник — це найвища управлінська посада в руських містах. Посадники не просто голови міст — їхні повноваження набагато ширші. У міру зростання нашого міста зростає і вплив посадників, їхня відповідальність, а заодно і кількість."
  cork_stoppers: "Коркові пляшкові пробки"
  cork_stoppers_desc: "Мистецтво виготовлення пляшок досягло таких висот, що винокури тепер можуть робити пляшки за стандартами, що з'явилися. Завдяки цьому ми змогли повернутися до коркових пробок: вино в пляшці, закупореній такою пробкою, зможе зберігатися набагато довше, ніж якби шийку затикали, як раніше, тканиною. Це означає, що вино можна буде перевозити на значні відстані, що ще недавно здавалися неможливими. Мабуть, на наших очах зараз зароджується всесвітня торгівля вином."
  colonial_policy_advance: "Колоніальна політика"
  colonial_policy_advance_desc: "Заселювані нами території, зокрема прикордонні, потрібно буде організовувати за новими, іншими принципами."
  native_policy_advance: "Тубільна політика"
  native_policy_advance_desc: "Нові краї, які відкривають наші безстрашні дослідники, зазвичай виявляються заселені дивовижними, але примітивними народами. Нам слід розробити єдиний принцип поведінки при зустрічі з тубільцями."
  slave_raid_advance: "Нальоти на узбережжя"
  slave_raid_advance_desc: "Наш народ завжди волів грабувати прибережні поселення і брати силою все, що йому потрібно: рабів, гроші та інші радощі життя."
  crown_power_advance_discovery: "Управління країною"
  crown_power_advance_discovery_desc: "Наші правителі поступово стають одноосібними володарями у своїх володіннях. Очевидно, обходитися без системи управління країною сьогодні не можна. Така система, у свою чергу, вимагає повноцінного бюрократичного апарату."
  crown_power_advance_reformation: "Cuius regio, eius religio"
  crown_power_advance_reformation_desc: "У всьому, що стосується світських питань, хватку наших правителів можна назвати залізною. Однак їм повинна бути підвладна і віра. Церкву і країну слід об'єднати."
  crown_power_advance_absolutism: "Абсолютизм"
  crown_power_advance_absolutism_desc: "Мало що сьогодні не підпорядковане волі наших правителів. У їхньому віданні — і мирські, і духовні справи. Їхня влада абсолютна."
  crown_power_advance_revolutions: "Нація"
  crown_power_advance_revolutions_desc: "Щойно влада наших монархів стала єдиною і безперечною, ленники нарешті відчули причетність до спільної справи. Відтепер кожне володіння — це невід'ємна частина нації. Ми — один народ."
  sergeants_at_arms_advance: "Сержанти-дружинники"
  sergeants_at_arms_advance_desc: "Сержант-дружинник — військове звання трохи нижче лицарського. Воно присуджується невеликому колу вірних слуг монарха, які відповідають за захист королівської особи. Втім, у сержантів бувають й інші обов'язки: збір боргів, охорона порядку, набір до війська або на флот."
  alberghi_28_advance: "$alberghi_28$"
  alberghi_28_advance_desc: "$alberghi_28_desc$"
  genoese_banking_traditions: "Генуезькі банківські традиції"
  genoese_banking_traditions_desc: "Банкіри Генуї — одного з найважливіших торгових вузлів середньовічної Італії — досить рано винайшли нові різновиди кредитування. Саме тут з'явилися одні з перших у світі банківські установи."
  genoese_maritime_diplomacy: "Генуезька морська дипломатія"
  genoese_maritime_diplomacy_desc: "Перетворившись з міста на республіку, яка діє в інтересах купців, Генуя стала користуватися значним впливом за кордоном і навіть уклала кілька угод із союзниками та клієнтами в Середземноморському регіоні."
  bank_of_saint_george: "Банк Святого Георгія"
  bank_of_saint_george_desc: "Банк Святого Георгія — фінансова установа, яка об'єднує заборгованості генуезців з метою стати єдиним кредитором країни, а заодно — спонсором її заморського підприємництва."
  the_age_of_the_genoese: "Епоха генуезців"
  the_age_of_the_genoese_desc: "Завдяки фінансовим успіхам, що супроводжували країну протягом останніх кількох десятиліть, генуезькі банкіри стали неймовірно затребувані. Пишноту рідної країни вони примножують тим, що протегують відомим художникам, виділяючи їм кошти на вілли та палаци."
  hospital_advance: "Лікарні"
  hospital_advance_desc: "У середньовічних лічницях надавали допомогу хворим, незаможним та інвалідам. Зазвичай ними завідували релігійні ордени, а лікарські послуги включали сестринський догляд, лікування засобами рослинного походження та (вже пізніше) хірургічні операції. Лікарні, як правило, розташовувалися біля церков та монастирів. Хворих розміщували окремо — у чоловічих та жіночих відділеннях. Попри загальну малорозвиненість середньовічної медицини, у лікарні кожному нужденному могли запропонувати догляд, притулок та хоч якесь лікування."
  banking_country_traditions: "Банківські традиції"
  banking_country_traditions_desc: "Багато хто шукає багатства в торгівлі та комерційній діяльності. Наша ж країна живе тим, що пропонує доступні позики."
  genoese_crossbowmen: "$a_genoese_crossbowmen$"
  genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"
  genoese_galley: "$n_genoese_galley$"
  genoese_galley_desc: "$n_genoese_galley_desc$"
  italian_galleass: "$n_italian_galleass$"
  italian_galleass_desc: "$n_italian_galleass_desc$"
  genoese_flexibility: "Генуезька пристосовність"
  genoese_flexibility_desc: "На відміну від війська, флот нашої країни може стати в пригоді не тільки на війні. Наші вмілі кораблебудівники здатні швидко переробляти бойові галери на купецькі — і навпаки."
  genoese_school: "Генуезька школа"
  genoese_school_desc: "Образотворче мистецтво епохи Відродження зародилося в Італії. Не дивно, що така багата та шанована країна, як Генуя, стала основоположником власної художньої школи."
  government_size_renaissance: "Постійна рада"
  government_size_renaissance_desc: "Перед тим як ухвалити рішення щодо війни чи миру, правителі зазвичай скликали раду. Однак устрій нашої країни став настільки складним, що тепер недостатньо збирати радників лише час від часу. Настав час зробити цю посаду постійною, а таку роботу — регулярною."
  renaissance_court: "Двір епохи Відродження"
  renaissance_court_desc: "Дух Відродження охоплює все нові країни. Не слід відставати й нам: при дворі зараз бракує відданих своїй справі творців та вчених, які могли б вражати нас своїми успіхами."
  rgo_size_advance_renaissance: "Млини"
  rgo_size_advance_renaissance_desc: "Перші млини були винайдені ще в давнину. За минулі століття ми доопрацювали їхню конструкцію, і тепер добувати основні ресурси нам допомагають сучасні вітряні та водяні млини."
  food_advance_renaissance: "Інтенсивне землеробство"
  food_advance_renaissance_desc: "Майже кожне сучасне суспільство починало з обробітку землі. Ця праця важлива й сьогодні. Завдяки новим методам землеробства наші поля та рілля стали приносити більше врожаю, дозволяючи накопичувати на складах більше їжі."
  crown_power_advance_renaissance: "Суверенітет"
  crown_power_advance_renaissance_desc: "Основою майже будь-якої державної структури традиційно виступала взаємодія правителя зі станами країни. Сьогодні, втім, прийнятий інший погляд: правитель має безроздільну верховну владу над належною йому країною, тому ми відмовляємося плазувати перед іншими мирськими владами."
  global_supply_limit_modifier_advance_2: "Шляхи постачання"
  global_supply_limit_modifier_advance_2_desc: "У бойових діях на суходолі все більш значну роль відіграє постачання військ, що раз у раз розростаються. Фуражири зможуть приносити війську більше користі, якщо організувати їхню діяльність як слід."
  naval_morale_advance_1: "Середньовічне мореплавство"
  naval_morale_advance_1_desc: "Нові досягнення в галузі мореплавства за останні кілька десятиліть допомогли нашим морякам набратися досвіду та впевненості. Тепер вони без труднощів можуть водити судна в прибережних водах."
  slave_trade_act_advance: "Закон про работоргівлю"
  slave_trade_act_advance_desc: "Постачання робочої сили в колонії та в метрополію — дуже делікатна, хоча й прибуткова справа. Корисно буде вкласти кошти в опрацювання цього питання на законодавчому рівні."
  order_headquarters_advance: "$order_headquarters$"
  order_headquarters_advance_desc: "Заснувавши тут резиденцію, ми не лише посприяємо зміцненню місцевої оборони, а й зможемо набирати нових, придатних до служби членів ордену."
  LIV_crusader_forts: "Балтійські фортеці хрестоносців"
  LIV_crusader_forts_desc: "Численні укріплення для захисту наших країв були побудовані коштом місцевих загонів хрестоносців. Ці міцні стіни надійно укриють нас від ворогів!"
  scholasticism: "Класична схоластика"
  scholasticism_desc: "Схоластика — це філософія, побудована на логіці Аристотеля та творах Отців Церкви. Її призначення — поширення знань з акцентом на релігійні догмати та звичаї."
  organized_religion: "Організована релігія"
  organized_religion_desc: "Немає такого суспільства, де релігія не відігравала б важливої ролі. Однак кожна віра влаштована по-різному. Організована релігія передбачає систематизацію обрядів і вірувань, а також — дотримання конкретних догм."
  guilds: "Гільдії"
  guilds_desc: "Гільдія — об'єднання купців або ремісників на принципах взаємодопомоги та захисту інтересів одне одного. Гільдії прагнуть встановити монополію на свої товари та ремесла. Усі товари, що продаються гільдіями, відповідають певним стандартам і відпускаються за гільдійськими цінами."
  colonial_tradition: "Колоніальні традиції"
  colonial_tradition_desc: "Наша країна зародилася з великих прагнень батьків-засновників — перших колоністів, які покинули батьківщину. Ми, жителі Нового Світу, значною мірою перейняли їхні звичаї та традиції."
  colonial_heritage: "Колоніальна спадщина"
  colonial_heritage_desc: "Імперські домагання батьківщини — це історичне надбання нашої колонії."
  colonial_ambition: "Колоніальні прагнення"
  colonial_ambition_desc: "Багато хто з тих, хто прибув до Нового Світу, шукав тут можливість почати життя заново, на власні очі побачити дива далеких країв і приборкати дикий континент, зробивши його домом. До цього ж прагнемо і ми. Вперед, до незвіданого!"
  power_projection_advance_1: "Імперські прагнення"
  power_projection_advance_1_desc: "В епоху Високого Середньовіччя країни стрімко розросталися, а влада зміцнювалася. Відповідно до цих процесів зростали й апетити: багато хто намагався або відродити старі імперії, або заснувати нові."
  trade_advance_age_of_trad: "Торгові ярмарки"
  trade_advance_age_of_trad_desc: "У міру відновлення та розвитку в Середньовіччі торгових маршрутів почали виникати нові звичаї — наприклад, проведення у великих містах щорічних торгових ярмарків, де купці, що з'їжджалися з різних країн, могли проводити зустрічі та укладати угоди."
  colonial_assembly: "Колоніальні збори"
  colonial_assembly_desc: "Законодавчі повноваження, що стосуються оподаткування та державних бюджетів, переважно передані колоніям."
  founding_fathers: "Батьки-засновники"
  founding_fathers_desc: "Це політики, воїни та дипломати, які відіграли важливу роль у заснуванні країни. Вони змогли відвоювати незалежність і встановити нову систему управління."
  colonial_militia: "Колоніальне ополчення"
  colonial_militia_desc: "За відсутності постійних гарнізонів обов'язок брати участь у місцевих конфліктах, а також здійснювати вилазки в стан тубільців та інших колоній ліг на плечі колоніального ополчення — утворення, що складається виключно з дорослих чоловіків, нерідко зобов'язаних володіти власною зброєю та спорядженням."
  new_frontiers: "Нові рубежі"
  new_frontiers_desc: "Цей рух із просування кордону освоєних земель Нового Світу вглиб континенту шляхом заснування факторій і навіть повноцінних поселень, які побудовані на великих сільськогосподарських угіддях."
  continental_trade: "Континентальна торгівля"
  continental_trade_desc: "Потреба колоній Нового Світу в готових виробах воістину величезна, проте високі витрати компенсуються імпортом із колоній сировини, яка надходить на європейські ринки."
  manufacturing_center: "Виробничий центр Європи"
  manufacturing_center_desc: "Наші громадяни — це основа могутності торговельної імперії сюзерена. Іноземні товари, що постачаються нам, ми перетворюємо на готову продукцію."
  free_thinkers: "Вільнодумці"
  free_thinkers_desc: "Майже кожен колоніст твердо переконаний, що має право на свободу думки та слова, без якої немислимі будь-які громадянські свободи."
  liberty_heroes: "Поборники свободи"
  liberty_heroes_desc: "Прославлені полководці війн за незалежність у Новому Світі вміли не лише командувати — вони надихали цілі війська, піднімаючи бойовий дух солдатів і подаючи приклад іншим."
  beat_to_windward_advance: "Привести до вітру!"
  beat_to_windward_advance_desc: "Каравели з латинським вітрилом чудово маневрують, а тому здатні з легкістю лавірувати проти вітру. Такі судна набагато швидше ходять у небезпечну погоду та в бурхливих морях."
  route_to_the_indies_advance: "Шлях до Ост-Індії"
  route_to_the_indies_advance_desc: "Не можна уявити наше життя без торгівлі з далекими східними землями, проте поставки суходолом займають занадто багато часу. Необхідно швидше знайти якийсь морський маршрут — тоді перед нашими купцями відкриється багато нових можливостей."
  educated_bureaucrats: "Освічені чиновники"
  educated_bureaucrats_desc: "Посади в наших органах влади обіймають не безграмотні та ліниві спадкоємці знатних батьків, а талановиті та освічені люди, які заслужили це право власною працею. Поза всяким сумнівом, така адміністрація набагато ефективніша за будь-яку іншу."
  efficient_bureaucracy: "Ефективна бюрократія"
  efficient_bureaucracy_desc: "Бюрократія подібна до мастила в шестернях державної машини. Призначаючи на адміністративні посади талановитих і мотивованих людей, ми забезпечимо плавну та безперебійну роботу всіх структур влади."
  appointed_chain_of_command: "Призначення полководців"
  appointed_chain_of_command_desc: "Ми зможемо збільшити чисельність і підвищити ефективність війська, довіряючи командування не бездарним дворянським нащадкам, а талановитим людям, незалежно від їхнього походження."
  abacus_advance: "Абак"
  abacus_advance_desc: "Рахівниці, також звані абаками, відомі вже багато століть; завдяки їм і бухгалтерським книгам ми можемо точно підраховувати гроші. Без цих інструментів і талановитих людей, які вміють ними користуватися, ми б не знали, наскільки багата наша країна."
  temporary_appointments: "Тимчасові призначення"
  temporary_appointments_desc: "Довічне призначення придворних чиновників небезпечне тим, що з часом вони набувають занадто великого впливу і виявляють все менше старанності в роботі. Щоб уникнути цього, можна заснувати систему тимчасових призначень, за якої кожен чиновник періодично переводитиметься з однієї посади на іншу."
  non_inheritable_offices: "Заборона успадкування посад"
  non_inheritable_offices_desc: "Передача придворних посад від батька до сина — справжній бич нашої адміністрації. Через неї лінь і корупція охоплюють усі гілки влади. Замість цього ми можемо призначати на посади людей із відповідними талантами незалежно від їхнього походження."
  government_sanctioned_celebrations: "Державні свята"
  government_sanctioned_celebrations_desc: "Наш народ любить відзначати радісні події та важливі дати календаря веселими святами. Щоб не пускати це на самоплив, ми можемо доручити організацію таких свят своїй адміністрації. Так ми не тільки продемонструємо населенню турботу, а й зміцнимо народну єдність."
  efficient_logistics: "Ефективна логістика"
  efficient_logistics_desc: "Логістика та зв'язок необхідні для ефективного управління країною. Щоб наші гінці швидко та результативно доставляли послання, потрібна мережа доріг, що з'єднують провінції."
  ledgers_double_checking: "Подвійна бухгалтерія"
  ledgers_double_checking_desc: "Недобросовісність бухгалтерів дозволяє корупції пожирати зсередини цілі країни. Щоб уникнути цього, слід подбати про належний облік кожної зміни в казні."
  province_governors: "Губернатори провінцій"
  province_governors_desc: "Нашими провінціями не правлять незалежні місцеві царьки або жадібні до влади аристократи. Губернатори, призначені центральною владою, проводять єдину політику в усіх куточках країни."
  right_to_rule: "Право на владу"
  right_to_rule_desc: "Основною ідеєю, навколо якої будується наш державний апарат, є призначення талановитих людей на відповідні їм посади. Отже, верховний правитель, відповідальний за всю країну, має бути найгеніальнішим серед громадян. Якщо ж це виявиться не так, нам слід залучати художників, скульпторів і поетів, щоб вони прикрашали реальність."
  talented_traders: "Талановиті торговці"
  talented_traders_desc: "Володіти талантом у нашій країні повинні не тільки чиновники, а й ті, хто відповідає за обіг товарів і грошей. Якщо нашою торгівлею займуться найяскравіші уми, процвітання країни буде забезпечено."
  smooth_administration: "Налагоджена бюрократія"
  smooth_administration_desc: "Призначення на посади людей із відповідними талантами та схильностями забезпечує безперебійну роботу нашого державного апарату за будь-яких зовнішніх обставин."
  ara_a_maritime_realm: "Морська країна"
  ara_a_maritime_realm_desc: "Уся увага в цій країні приділяється розвитку морської справи. Стратегічній меті підкорення безкраїх синіх просторів служать військові та торгові флоти — вони сприяють зміцненню становища країни та поширенню її впливу. Така спрямованість впливає і на політику: серед жителів виховується культура мореплавства, яка забезпечує процвітання країни."
  ara_desperta_ferro: "Desperta Ferro!"
  ara_desperta_ferro_desc: "#italic Desperta Ferro!#! (у перекладі «Прокинься, залізо!») — страхітливий бойовий клич альмогаварів, що закликають до сили залізної зброї. Такий клич неодмінно супроводжувався ударами списів і дротиків об кремінь, що висікали іскри. Інші кличі (#italic Aragó!#! та #italic Sant Jordi!#!) прославилися менше — з ім'ям альмогаварів сьогодні ототожнюються тільки слова #italic Desperta Ferro!#!."
  ara_a_mediterranean_trade_power: "Середземноморська торгова країна"
  ara_a_mediterranean_trade_power_desc: "М'які води Середземного моря, що пестять наші береги, ваблять багатьох податися в купці. Жваві торгові міста та факторії, розкидані по всьому Середземномор'ю, стануть опорою для перетворення нашої країни на провідну торгову країну."
  ara_fleet_ordinances: "Флотські постанови"
  ara_fleet_ordinances_desc: "У Середземному морі ходять сотні кораблів. Потреба в кримінальному законодавстві на морі виникла сама собою. Одним із перших зводів військових законів, що стосуються конкретно флоту, став #italic Ordinacions sobre lo fet de la mar#! (у перекладі — #italic «Постанови про те, що відбувається на морі»#!). Цей звід, написаний відразу після закінчення «чорної смерті», став відповіддю на умови того часу, які вимагали набирати моряків з-поміж громадян, які не є підданими арагонської корони, і навіть злочинців. Постанови — це не просто систематизація усталених морських звичаїв, а зведення воєдино найрізноманітніших традицій."
  ara_valencian_golden_age: "Золотий вік Валенсії"
  ara_valencian_golden_age_desc: "Наша країна досягла неймовірних літературних висот, про які сусіди можуть тільки мріяти. Дякувати за це слід таким видатним авторам, як Жуанот Мартурель, Аузіас Марк та Ізабелла де Вільєна. Ніхто так не посприяв розвитку нашої культури, як вони. Народ по праву пишається своїми літераторами. Сьогодні ні в кого не залишилося сумнівів, що наша країна — світоч культури, що яскраво сяє на зло недругам."
  ara_remenca: "Ременса"
  ara_remenca_desc: "Ременса — унікальна каталонська система, що, втім, має аналоги в інших землях корони. Її призначення — нарощування загального виробництва сировини. Завдяки ременсі скарбниця нашої країни рясно поповнюється, закладаючи тим самим основу для досягнення всіх поставлених цілей. Грамотне застосування ременси — запорука достатку ресурсів, що неодмінно посприяє успіху в усіх починаннях і прокладе нам шлях до розвитку та процвітання."
  ara_chartered_merchant_companies: "Грамоти торговим компаніям"
  ara_chartered_merchant_companies_desc: "Наші купці витрачають надто багато сил і часу на конкуренцію між собою замість того, щоб підминати під себе торгівлю. Час покласти цьому край. Ми почнемо видавати компаніям грамоти — ці документи забезпечать їм тимчасову монополію на торгівлю в певних регіонах. Продовжуватимуться лише ті грамоти, чиї власники готові справно платити короні належну їй частку."
  ara_stronger_united: "В єдності сила"
  ara_stronger_united_desc: "Після об'єднання в 1164 році королівства Арагон і Барселонського графства на території цих країн утворилася конфедерація — об'єднання суверенних країн під єдиною владою. Такий підхід посприяв процвітанню та збереженню своєрідності учасників, проте водночас викликав відчуття роздробленості. Очевидна необхідність провести адміністративні реформи, спрямовані на зміцнення єдності не на шкоду особливостям кожної території."
  ara_constellation_cities: "Плеяда міст"
  ara_constellation_cities_desc: "З перших днів існування країна об'єднує під своєю владою різні області, зберігаючи при цьому неповторні традиції та закони кожної місцевості. Завдяки нашим зусиллям у регіонах виникли численні великі міста — по суті, місцеві столиці."
  ara_protection_of_the_little_folk: "Захист дітей"
  ara_protection_of_the_little_folk_desc: "Нашим солдатам буде спокійніше помирати зі знанням, що про їхніх близьких подбають. В Арагоні ми збудуємо робітничі будинки, де зможуть працювати сироти."
  ara_gunpowder_souls: "Потяг до пороху"
  ara_gunpowder_souls_desc: "Свято #italic Фальяс#! підштовхнуло розвиток артилерійської справи в Короні Арагону — цьому чимало допоміг досвід, накопичений при поводженні з пороховими салютами та петардами. Святкові традиції породили в народі дух прагнення до новизни, завдяки чому в країні з'явилися нові методи застосування артилерії."
  ara_mossos_esquadra: "Моссос де Ескуадра"
  ara_mossos_esquadra_desc: "#italic «Ескуадрас де Пайсанос»#!, вони ж #italic «Ескуадрес де Каталунья»#! або #italic «Моссос де Ескуадра»#!, — це місцеві ополчення, що захищають торгові шляхи та місця проведення ярмарків. Ці ополченці чудово знають місцевість, а тому їхній приклад слід поширити й на інші території — там за зразком ми створимо групи місцевого ополчення, які підтримуватимуть спокій у своїх краях."
  cas_repoblaciones: "Переселення"
  cas_repoblaciones_desc: "Від войовничих предків ми успадкували велику землю, яку просто нікому обробляти. Нам терміново потрібні переселенці з інших регіонів, особливо — готові заселити південну частину Андалусії, яка втратила значну частку населення після вигнання звідти в 1267 році мусульман."
  cas_the_reconquista: "Реконкіста"
  cas_the_reconquista_desc: "Вже давно, ще з часів падіння Вестготського королівства, ми ведемо війну з маврами. Ці важкі роки загартували нас так, що мало хто може похвалитися такою ж дисципліною. Вставай, кастильський народе! Нехай знає весь світ, яка велика твоя рішучість."
  cas_castilian_navy: "Кастильський флот"
  cas_castilian_navy_desc: "Наша країна розташована на півострові. З трьох сторін вона оточена морем, а на Гібралтарську протоку постійно зазіхають інші країни. За таких обставин сильний флот — не розкіш, а необхідність. Приборкувати непокірні хвилі почали ще наші предки по всьому протяжному узбережжю. Завдяки їм наші військово-морські сили не знають страху."
  cas_cronicas_reales: "Crónicas Reales"
  cas_cronicas_reales_desc: "Зібравши разом усі літописи, що залишилися від колишніх королів, ми зможемо скласти вражаючу колекцію, де буде записана історія нашої країни, а також вказано походження правителів. Це знання не тільки стане надійною культурною основою, але ще й допоможе чинним і майбутнім монархам розумно співставляти сьогодення з минулим."
  cas_masters_of_the_orders: "Магістри орденів"
  cas_masters_of_the_orders_desc: "Оскільки крім Реконкісти у нас тепер є інші важливі завдання, духовним орденам доведеться розпрощатися з незалежністю. Перейнявши посаду магістра ордену, правителі не тільки стануть більш владними, але й почерпнуть чимало цінного військового досвіду, отриманого в хрестових походах."
  cas_new_world: "Новий Світ"
  cas_new_world_desc: "Епоха нових відкриттів обіцяє відважним колоністам чималу славу: ці люди заселятимуть незвідані землі та торгуватимуть з метрополією місцевими багатствами. Ми пошлемо за море групу вірних країні колоністів, які закладуть там перші поселення."
  cas_reform_of_millones: "Реформа мільйонів"
  cas_reform_of_millones_desc: "Після того, як наші кортеси схвалять реформу #italic мільйонес#!, оподаткування громадян стане ефективнішим. Стягнення буде непрямим і пошириться лише на продукти харчування."
  cas_marine_infantry: "Кастильська морська піхота"
  cas_marine_infantry_desc: "Сильний флот потребує сильної команди, здатної битися в будь-яких умовах — навіть на суші. Щоб наші матроси стали по-справжньому грізною зброєю, ми впритул займемося підготовкою морської піхоти."
  cas_pasos: "Кастильські пасо"
  cas_pasos_desc: "Самі по собі #italic пасо#! давно знайомі кожному кастильцю, що святкує Страсний тиждень, проте останніми роками краса цих скульптур почала досягати небачених раніше висот. Завдяки таким видатним творцям, як Хуан де Хуні та Грегоріо Фернандес, жителі півострова по праву почали вважати кастильські #italic пасо#! еталоном цього виду мистецтва."
  cas_real_academia_espanola: "Королівська академія іспанської мови"
  cas_real_academia_espanola_desc: "Наша мова постійно розвивається і все ширше поширюється світом, а тому потребує регуляції. Заради цього ми за прикладом інших країн заснуємо особливий орган — #italic Королівську академію іспанської мови#!. Вона встановить офіційну літературну норму, зберігши при цьому мовні особливості."
  cas_canal_de_castilla: "Кастильський канал"
  cas_canal_de_castilla_desc: "По #italic Кастильському каналу#!, зразком для якого послужили європейські системи водопостачання, з гір на півночі #italic Месети#! надходитиме вода, така необхідна як торговцям, так і простим землеробам для зрошення злакових посівів Старої Кастилії. Ця геніальна споруда збільшить наші врожаї, а отже, ми зможемо продавати надлишки, перевозячи їх каналом до портів для експорту."
  cas_royal_factories: "Королівські фабрики"
  cas_royal_factories_desc: "Щоб припинити експорт дешевих ресурсів замість дорогих готових виробів, буде потрібна індустріалізація країни. Для цього ми побудуємо фабрики, забезпечені підтримкою країни. Вироблені там товари неодмінно зміцнять нашу економіку."
  gra_banu_nasr: "Бану Наср"
  gra_banu_nasr_desc: "Ми — вихідці з племені Бану аль-Хазрадж, нащадки Сада ібн Убади — сподвижника пророка Мухаммеда. Засновник нашої династії Мухаммед I володарював над Гранадою, Хаеном, Альмерією та Малагою. З часом частину цих земель захопили християни, проте ми не пустили їх далі. Ми продовжимо чинити опір і надалі, бо з нами сила наших славних предків."
  gra_nasrid_art: "Мистецтво Насридів"
  gra_nasrid_art_desc: "У Гранаді живуть найуміліші ремісники та архітектори у світі. Все, що вони створюють, не тільки приносить користь, а й милує око, поєднуючи таким чином найкращі якості."
  gra_skillful_envoys: "Досвідчені посли"
  gra_skillful_envoys_desc: "Уміння добиватися свого переговорами для нас життєво важливе. Послів необхідно постійно навчати новому, інакше наша країна буде приречена."
  gra_razzias: "Насридські нальоти"
  gra_razzias_desc: "Кордони ворожих володінь так і ваблять наших воїнів. Несподівані блискавичні атаки здатні застати противника зненацька і завдати йому серйозної шкоди."
  gra_muttavia_armies: "Бойові частини муттавія"
  gra_muttavia_armies_desc: "Населення Гранади невелике — як і кількість чоловіків, яких можна було б призвати на захист кордонів країни. Однак нестачу рук, здатних тримати зброю, ми компенсуємо багатством — воно дозволить нам купити іноземних найманців."
  gra_expand_qanahs: "Розширення каналів"
  gra_expand_qanahs_desc: "Землі Гранади родючі, проте запасами води слід розпоряджатися розумно. Розширивши зрошувальні канали, ми зможемо збирати більше посівів і плодів."
  gra_adaptative_trade: "Гнучка торгівля"
  gra_adaptative_trade_desc: "Недалекий той час, коли ми перестанемо бути посередниками між християнським та ісламським світами. Це вірний знак того, що настав час перейти до більш сучасних підходів, аби й надалі виступати сполучною ланкою між Європою та далекими від неї ринками."
  gra_expand_the_frontier: "Розширення рубежів"
  gra_expand_the_frontier_desc: "З перших днів свого існування наша династія повільно, але вірно втрачає підвладні їй землі. Однак сьогодні ми достатньо сильні, щоб мріяти не лише про повернення втрачених територій, а й про розширення державних кордонів."
  gra_a_strong_rule: "Сильна влада"
  gra_a_strong_rule_desc: "Протягом багатьох десятиліть члени правлячої родини будують один одному підступи, підриваючи саме існування нашої країни. Настав час нарешті зосередити владу в руках одного сильного правителя, здатного принести нам мир і процвітання."
  gra_modernized_economy: "Сучасна економіка"
  gra_modernized_economy_desc: "Економіка повинна відповідати вимогам часу — наприклад, бути здатною процвітати в жорсткому конкурентному середовищі. Удосконаливши інфраструктуру, а також налагодивши різні підходи та процеси, ми зможемо виробляти більше за колишніх витрат."
  gra_ghazawat: "Насридський газават"
  gra_ghazawat_desc: "Нашим воїнам — захисникам країни та народу — слід брати приклад з воїтелів пророка Мухаммеда: ті билися відважно майже до божевілля."
  gra_a_new_golden_era: "Новий золотий вік"
  gra_a_new_golden_era_desc: "В Аль-Андалусі колись навчалися такі видатні вчені, як Ібн Рушд, Абуль-Касим та Ібн Туфайль. Ці традиції освіти, закладені ще предками, необхідно підтримувати."
  nav_transatlantic_whaling: "Трансатлантичний китовий промисел"
  nav_transatlantic_whaling_desc: "Традиції баскських китобоїв складалися протягом кількох століть. За цей час наш китовий промисел набув такої відомості, що послугами китобоїв часто користуються в країнах, які нарощують обсяги власного рибальства. Щоб наш досвід приносив більше вигоди, слід заснувати китобійні поселення по всій Атлантиці та пропонувати свої послуги ще й там."
  nav_shipbuiling_experts: "Експерти з кораблебудування"
  nav_shipbuiling_experts_desc: "Море, що омиває наші береги, здатне піднести безліч дарів тому, хто наважиться їх взяти. Вже не перше століття ми забудовуємо узбережжя портами та суднобудівними верфями, які регулярно спускають на воду кораблі для кожного, хто прагне пригод."
  nav_memories_reconquista: "Пам'ять про Реконкісту"
  nav_memories_reconquista_desc: "Наш народ взяв найактивнішу участь у Реконкісті — християнському завоюванні Піренейського півострова, підкореного мусульманами. У цьому хрестовому поході, попри неможливість подальшого розширення, важливу роль відіграла Наварра — завдяки як своїм військам, так і союзам із християнськими королівствами поблизу."
  nav_a_renaissance_realm: "Країна епохи Ренесансу"
  nav_a_renaissance_realm_desc: "Наш народ виріс у долинах Піренеїв, однак навіть високі гірські вершини не змогли захистити його від віянь гуманізму, що прийшли і з півночі, і з півдня. Ці віяння вкоренилися тут надовго, змішалися з наваррськими традиціями та породили в підсумку нову самобутність народу."
  nav_fearless_seamen: "Безстрашні мореплавці"
  nav_fearless_seamen_desc: "Море завжди викликало у нас трепет і страх. Однак наші відважні предки наважилися прийняти дари стихії та свого часу заснували цілі громади, що живуть не просто біля моря, а самим морем. Вода стала для них другою сушею. Тепер наші моряки широко відомі по всьому узбережжю Атлантичного океану."
  nav_always_ready: "Завжди готові"
  nav_always_ready_desc: "Наша країна почала своє існування в оточенні грізних ворогів, здатних без зусиль розчавити це крихітне утворення. Ця обстановка й визначила наш характер, наше ставлення до світу. Ми не втрачаємо пильності й завжди готові відповісти на будь-яку, навіть незначну загрозу."
  nav_chartered_councils: "Уповноважені ради"
  nav_chartered_councils_desc: "У кожній історичній області буде утворено раду, що підпорядковується правителю. Обирати її буде місцеве населення — такий підхід гарантує повагу до місцевих законів, вони ж #italic фуерос#!. Так ми зможемо ефективніше керувати країною, не втручаючись у справи звичайних жителів."
  nav_people_of_the_sea: "Народ моря"
  nav_people_of_the_sea_desc: "Мало хто сумнівається у величезному досвіді наших мореплавців. У майбутніх морських битвах він забезпечить нам необхідну перевагу."
  nav_basque_ferocity: "$basque$а лють"
  nav_basque_ferocity_desc: "Наш народ здавна славиться своєю лютістю в бою — її відчули і французи в Ронсевальській ущелині, і вороги Наваррської компанії. Нехай кожен пам'ятає, на що ми здатні."
  nav_an_industrious_folk: "Працьовитий народ"
  nav_an_industrious_folk_desc: "Нехай наша земля небагата — головне, що баски працьовиті й не бояться зайвий раз докласти зусиль, щоб взяти у природи все необхідне. Розплавити залізо в печі, вирубати ліс на вугілля, побудувати найкращий в окрузі корабель — все це нам під силу. Лише завдяки старанності наших трудівників ми живемо в достатку."
  nav_mercantile_expansion: "Розширення обсягів торгівлі"
  nav_mercantile_expansion_desc: "Вже багато століть поспіль ми торгуємо не тільки з сусідами, а й з далекими країнами, обмінюючись з ними товарами. Наші купці досконало володіють цим мистецтвом, а крім товарів привозять із собою нововведення, запозичені у сусідніх країн."
  nav_navarrese_defense_force: "Наваррські сили самооборони"
  nav_navarrese_defense_force_desc: "Наші сусіди з часом стають тільки сильнішими. Не звертати уваги на зростаючу загрозу неможливо. Ми заснуємо військове відомство, яке займатиметься поповненням чисельності військ не на шкоду якості підготовки новобранців."
  nav_shipyards_ironworks: "Верфі та металургійні заводи"
  nav_shipyards_ironworks_desc: "Наш народ береже традиції кораблебудування, виплавки сталі та виробництва металу, які стали основними заняттями в цих краях. Однак поступ не зупиняється, і впроваджувати нові методи виробництва потрібно безперервно. Старі практики доведеться підлаштувати під сучасні умови, інакше ми просто не зможемо конкурувати з іншими країнами."
  nav_adept_traders: "Вправні торговці"
  nav_adept_traders_desc: "Чудові кораблі, вправні купці та ефективні методи — ось три кити торгівлі, що приносять нашій країні неймовірний прибуток. Ці гроші підуть на благу справу зміцнення країни."
  nav_the_national_military_academy: "Національне військове училище"
  nav_the_national_military_academy_desc: "Перехід до професійного війська пов'язаний з необхідністю створити освітній заклад для підготовки новобранців. Викладати там будуть досвідчені солдати, здатні передати всі тонкощі військової справи бійцям — майбутньому фундаменту нового війська."
  nav_royal_basque_society: "Королівське баскське товариство"
  nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, воно ж Королівське баскське товариство друзів країни, — це організація, яка взяла на себе завдання розвитку економіки, культури та науки баскських земель. У осяжному майбутньому ці зусилля принесуть країні чималу користь."
  nav_efficient_bureaucracy: "Ефективна бюрократія"
  nav_efficient_bureaucracy_desc: "Бюрократія, давня традиція нашого народу, зародилася ще в перші роки існування країни. Однак часи змінюються, і виникає потреба в нових підходах до щоденних питань. Саме завдяки своєчасному впровадженню таких підходів Наварра користується чималою повагою."
  nav_riflemen_march: "Марш стрільців"
  nav_riflemen_march_desc: "Прийняття на озброєння нарізної зброї підштовхнуло військове командування переглянути підхід до підготовки солдатів. Щоб підтримувати дисципліну на належному рівні, наші командири розробили новий різновид стройового кроку, що став вірною ознакою якості нашої підготовки."
  por_battle_ourique: "Битва при Оуріке"
  por_battle_ourique_desc: "У 1139 році наші безстрашні війська одноосібно здолали в бою п'ять мавританських королів. Цей подвиг назавжди залишиться в пам'яті нашого народу і слугуватиме нагадуванням, що ми здатні розбити будь-якого ворога, хоч би яким сильним він не був."
  por_establishment_portuguese_navy: "Заснування португальського флоту"
  por_establishment_portuguese_navy_desc: "Творцем військово-морських сил Португалії вважається король Дініш I. Саме його указом генуезький торговець Мануель Пессанья був підвищений до адміралів та отримав завдання захищати узбережжя Португалії від набігів піратів-мусульман. Одночасно з цим Мануелю було доручено створення торгового флоту."
  por_estimulate_rural_areas: "Допомога розвитку сільської місцевості"
  por_estimulate_rural_areas_desc: "Сільська місцевість нашої країни, особливо віддалені її куточки, страждає від нестачі населення. Там нікому обробляти поля, займатися лісами та видобувати руду. Якщо ми проведемо законодавчу реформу, народ сам буде зацікавлений у тому, щоб заселяти ці території та старанно там працювати."
  por_pursuing_waves: "Ті, що прагнуть у море"
  por_pursuing_waves_desc: "Схоже, нам стало тісно на суші. Дивлячись на море, ми відчуваємо #italic саудаде#!, немов нас розлучили з коханою. У портах та доках не проштовхнутися: кожен прагне потрапити хоч на якийсь корабель, не в силах протистояти пристрасному бажанню побачити світ. Такі люди можуть нам стати в пригоді…"
  por_bombardeiros: "Бомбардейру"
  por_bombardeiros_desc: "Ми навчилися робити значно потужніші гармати, проте палуби наших кораблів недостатньо міцні, щоб витримати їхню вагу. Якщо зробити гарматні палуби міцнішими, наш військово-морський флот зможе наводити страх на будь-яку країну без винятку."
  por_feitorias: "Фейторії"
  por_feitorias_desc: "На сході не залишиться жодного континенту, де не ступала б нога наших #italic фейторів#!. Ці люди побудують уздовж узбережжя Африки та Індії цілу мережу добре укріплених факторій, ставши таким чином провідною силою в місцевій торгівлі за мінімальних витрат. Їхні старання — запорука перетворення нашої країни на найбільшого торговця в Індійському океані."
  por_ordenancas: "Орденансас"
  por_ordenancas_desc: "Наша країна відчайдушно потребує професійних солдатів, готових захищати кордони своєї великої батьківщини. Щоб кожен вважав таке завдання почесним, ми проведемо реформу призовної системи та почнемо прищеплювати новобранцям почуття обов'язку."
  por_the_bandeirantes: "Натхнення для бандейрантів"
  por_the_bandeirantes_desc: "Деякі мисливці за рабами, йдучи вглиб континенту, знаходять не тільки живий товар, а й золото, дорогоцінне каміння та метали. Чутки про багатства країни напевно приваблять до наших колоній нових сміливців."
  por_colonial_governors: "Губернатори колоній"
  por_colonial_governors_desc: "Доручивши управління колоніями та віддаленими поселеннями найдосвідченішим чиновникам, ми забезпечимо спокій та лояльність місцевого населення, а також постійне надходження прибутку до скарбниці."
  por_royal_absolutism: "Абсолютна монархія"
  por_royal_absolutism_desc: "Ми більше не маємо наміру миритися з постійним втручанням аристократів, які переслідують власні інтереси на шкоду державним. Відтепер усі рішення кортесів ігноруватимуться. Ми правитимемо без огляду на когось іще."
  por_royal_military_academy: "Королівська академія фортифікації, артилерії та креслення"
  por_royal_military_academy_desc: "Наша країна — міцний горішок: її територію надійно захищають гармати та фортеці. Не один ворог уже обломав об них зуби. Не зупиняючись на досягнутому, ми заснуємо військове училище — #italic Academia Real de Fortificação, Artilharia e Desenho#!. Його випускники, які досконало опанували викладані науки, подбають про те, щоб наша артилерійська та оборонна справа стала найкращою у світі!"
  por_vinho_porto: "Портвейн"
  por_vinho_porto_desc: "По берегах річки Дуеро на півночі країни росте виноград, з якого роблять кріплене вино — #italic портвейн#!. На експорті цього вина, яке вже користується явним попитом, можна чимало заробити."
  spa_school_salamanca: "Саламанкська школа"
  spa_school_salamanca_desc: "Цей напрямок сформувався в Саламанкському університеті та відрізняється крайнім розмаїттям: до нього входять богослов'я, економіка та політична філософія. Завдяки поширенню Саламанкської школи в католицькому світі Іспанія надовго залишиться в авангарді наукової думки."
  spa_viceroyalties: "Іспанські намісники"
  spa_viceroyalties_desc: "Нові заморські краї вже чекають наших поселенців. Ці території ми розділимо між представниками правителя нашої країни — вони зможуть підтримувати порядок, приваблюючи тим самим колоністів, готових розширювати нашу сферу впливу."
  spa_siglo_de_oro: "Золотий вік Іспанії"
  spa_siglo_de_oro_desc: "Культурне життя країни процвітає. Якщо спрямувати творчий прорив у потрібне русло та надати йому покровительство, в іспанському мистецтві почнеться неймовірний підйом."
  spa_revival_of_ecclesiastical_discipline: "Відродження духовної дисципліни"
  spa_revival_of_ecclesiastical_discipline_desc: "Наш народ відвертається від Бога, віддаючи перевагу світському життю над духовним. Щоб повернути людям побожність, ми укладемо договір із впливовими представниками духовенства, зміцнивши таким чином зв'язок між церквою та країною."
  spa_naval_reforms: "Перетворення в іспанському флоті"
  spa_naval_reforms_desc: "Ми так довго нехтували військово-морськими силами, що тепер флот країн-суперниць перевершує наш. Настав час провести реформи, які дозволять нам повернути колишню могутність."
  spa_spanish_enlightenment: "Іспанське просвітництво"
  spa_spanish_enlightenment_desc: "Увібравши сучасні ідеї, найвидатніші уми Іспанії вже виношують плани щодо піднесення нашої країни над усіма іншими."
  tercio: "Терції"
  tercio_desc: "Терція — це змішаний піхотний стрій, що складається з пікінерів та мушкетерів. Його розробив в епоху Італійських війн геніальний полководець Гонсало Фернандес де Кордова на прізвисько #italic El Gran Capitán#! («Великий капітан»). У складі терції є як надійно захищена важка піхота, так і далекобійні стрільці, що дозволяє однаково успішно застосовувати це шикування і в атаці, і в обороні."
  catalan_galley: "Каталонська галера"
  catalan_galley_desc: "$n_catalan_galley$ — приклад логічного розвитку давньогрецької кораблебудівної думки. Саме каталонські галери, які нагадують збільшені в розмірі античні гребні судна, стали першими кораблями такого типу в Середземному морі."
  early_iberian_caravel: "Рання іберійська каравела"
  early_iberian_caravel_desc: "Перші каравели були побудовані мешканцями Піренейського півострова. Ці маленькі, але верткі кораблі чудово підходили для риболовлі у відкритому морі та прибережної торгівлі. Сьогодні найдосконаліші каравели будують саме іберійські країни."
  iberian_caravel: "Іберійська каравела"
  iberian_caravel_desc: "Потреба в швидших та надійніших суднах призвела до розробки нових, більших іберійських каравел. Цей тип корабля досить поширений у Європі, проте лише каравели з Піренейського півострова можна вважати найсучаснішими та найшвидшими."
  early_iberian_galleon: "Ранній іберійський галеон"
  early_iberian_galleon_desc: "Цьому судну ще тільки належить стати повноцінним кораблем, здатним перетнути океан. $n_early_iberian_galleon$, розроблений кораблебудівниками з Піренейського півострова, відрізняється низьким баком та довгим корпусом, особливо стійким до хвиль та зустрічного вітру."
  square_rigged_caravel: "Каравела з прямими вітрилами"
  square_rigged_caravel_desc: "Взявши все найкраще від іберійської каравели та каракки, ми отримаємо новий корабель, швидкий та надійний — гідне знаряддя підкорювачів морів."
  iberian_galleon: "Іберійський галеон"
  iberian_galleon_desc: "$n_iberian_galleon$ — це вдосконалена модель раннього іберійського галеона. Цей неймовірно потужний корабель не залишить ворогу жодного шансу."
  ara_almogavars: "$a_almogavars$"
  ara_almogavars_desc: "$a_almogavars_desc$"
  ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
  ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"
  ara_late_almogavars: "$a_late_almogavars$"
  ara_late_almogavars_desc: "$a_late_almogavars_desc$"
  cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
  cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"
  por_cacadores: "Касадори"
  por_cacadores_desc: "Касадори, прозвані #italic «бійцівськими півнями»#!, — це добірний піхотний підрозділ португальського війська. Відрізнити касадорів від звичайних солдатів легко: вони носять коричневу форму."
  dan_levy_recruitment: "Залежність від ополчення"
  dan_levy_recruitment_desc: "Наша країна розташована на півострові Ютландія та прилеглих островах, а тому для захисту від іноземних загарбників нам необхідне ополчення, здатне збиратися блискавично."
  dan_old_naval_traditions: "Данські морські шляхи"
  dan_old_naval_traditions_desc: "Нашу країну омивають одразу два моря: Балтійське та Північне. Таке розташування дає нам унікальну перевагу виконувати по воді перевезення та сполучення, скорочуючи тим самим час у дорозі між різними регіонами країни."
  dan_rulers_of_the_north: "Справжні правителі півночі"
  dan_rulers_of_the_north_desc: "Правителі Данії вже не перше століття висувають претензії на території Скандинавії. Прикрасивши заслуги наших королів, таких як Кнуд «Великий», ми здобудемо більше легітимності в очах як своїх громадян, так і інших країн."
  dan_reliance_mercenaries: "Залежність від найманців"
  dan_reliance_mercenaries_desc: "Щоб наша роль на світовій політичній сцені стала по-справжньому вагомою, нам знадобиться потужне військо. Однак усі плани зі створення такого війська впираються в малу населеність Данії. Нам слід заручитися підтримкою найманих загонів, готових служити нашій країні."
  dan_rentekammer_advance: "Казначейство"
  dan_rentekammer_advance_desc: "Заснувавши окремий самостійний орган — казначейство (#italic Rentekammeret#!), — ми зможемо ефективніше розпоряджатися потоками фінансів, а отже, налагодиться й урядова діяльність. Ретельне ведення фінансової документації допоможе точніше розраховувати витрати, що має позитивно позначитися на казні."
  dan_royal_danish_navy: "Флот для данської країни"
  dan_royal_danish_navy_desc: "Наша країна з усіх боків оточена водою, а тому стане легкою здобиччю для будь-якого ворога, чиї військово-морські сили перевершують наші. Щоб цього ніколи не сталося, нам слід побудувати такий флот, який зможе гідно захистити узбережжя Данії, а заодно продемонструвати наш вплив усій Північній Європі."
  dan_danish_orthodoxy: "Релігійна однорідність"
  dan_danish_orthodoxy_desc: "Релігійний простір Європи бурхливий і неоднорідний. Ми не збираємося в ньому зав'язувати: Данія повинна йти власним шляхом і шанувати рідне віровчення."
  dan_expanded_dockyards: "Копенгагенська верф"
  dan_expanded_dockyards_desc: "Наша країна пишається давніми традиціями кораблебудування, однак, щоб слово «данський» у назві нашого флоту звучало гордо, корабельним майстрам потрібна повноцінна сучасна та простора верф. Спорудити таку можна у водах Копенгагена — вони ідеально підходять для цього."
  dan_danish_legislation: "Данське законодавство"
  dan_danish_legislation_desc: "Основою для нашого права багато століть поспіль служили закони Ютландії, Зеландії та Сконе. Заради загального блага ми зведемо ці закони в єдине уложення. Воно називатиметься #italic Danske Lov#! — «Данський кодекс»."
  dan_danish_agriculture: "Наголос на сільське господарство"
  dan_danish_agriculture_desc: "Данська земля бідна на цінні ресурси, проте дає гарний урожай. Сільське господарство допоможе нам виробляти більше їжі та не думати про голод у важкі часи."
  dan_royal_life_guards: "Королівська лейб-гвардія"
  dan_royal_life_guards_desc: "Королівська лейб-гвардія — це елітний підрозділ данського війська, до обов'язків якого входить особиста охорона правителя та виконання церемоніальних функцій."
  dan_scanian_regiment: "Сканійський полк"
  dan_scanian_regiment_desc: "Сканійський полк — це військовий загін, що складається з призваних на службу селян. Він сформований, щоб знизити залежність від найманців і створити більш організоване регулярне військо, яке перебуває в прямому підпорядкуванні у монарха."
  dan_admiralty_college: "Адміралтейське училище"
  dan_admiralty_college_desc: "Зі стін нашого училища для підготовки флотських офіцерів виходитимуть досвідчені мореплавці, чудово знайомі з прибережними водами. Вони захищатимуть цілісність та незалежність нашої країни."
  dan_trading_economy: "Морська країна"
  dan_trading_economy_desc: "Наша економіка нездатна виробляти все самостійно, тому закривати потреби доведеться торгівлею: експортувати власні товари та імпортувати все необхідне."
  ven_printing_industry: "Друкарська промисловість"
  ven_printing_industry_desc: "Венеційський народ виявився справжнім майстром поводження з такою новинкою, як друкарський верстат. Його користь очевидна, тому нам слід сприяти розвитку друкарської промисловості."
  ven_stato_da_mar: "Морські володіння"
  ven_stato_da_mar_desc: "Торгівля — основа основ венеційської країни, а управління заморськими територіями — життєво важливе питання у справі захисту торгових інтересів. Зосередивши повноваження з управління цими територіями в руках єдиного органу, ми лише посприяємо розвитку торгівлі."
  ven_state_inquisition: "Заснування державної інквізиції"
  ven_state_inquisition_desc: "Підтримання безпеки країни ми доручимо державній інквізиції — органу, що складається з трьох суддів. Завдяки своїй нечисленності вони можуть швидко усувати загрози та засновувати цілі мережі інформаторів у країні та за кордоном, щоб вишукувати зрадників."
  venetian_arsenal_advance: "Венеційський арсенал"
  venetian_arsenal_advance_desc: "Арсенал, збудований ще в XII столітті, — це основа сили та впливу Венеції."
  ven_venetian_thalassocracy: "Венеційська таласократія"
  ven_venetian_thalassocracy_desc: "Венеційська країна існує вже не першу сотню років, і вся її історія нерозривно пов'язана з морем. Наші керівники чудово розуміються на торгівлі та комерції, а венеційські купці мають куди більші кошти, ніж будь-який чиновник."
  ven_venetian_palaces: "$venetian_palaces$"
  ven_venetian_palaces_desc: "$venetian_palaces_desc$"
  ven_gothic_architecture: "Готична архітектура"
  ven_gothic_architecture_desc: "$ven_gothic_architecture$ Венеції натхненна візантійським зодчеством і водночас відсилає до ісламського світу. Така еклектика дуже полюбилася вищому суспільству, а тому аристократи та успішні купці вкладають власні кошти в споруди в готичному стилі."
  ven_ship_mounted_gunpowder_weapons: "Корабельна порохова зброя"
  ven_ship_mounted_gunpowder_weapons_desc: "Вже понад тисячу років морський бій відрізняється від наземного лише тим, що під ногами замість твердої суші — хитка палуба, до того ж б'ються команди, а не кораблі. З появою на наших кораблях порохової зброї ми нарешті зможемо зламати цю традицію та почати знищувати ворожі судна ще до того, як вони зможуть взяти наші галери на абордаж."
  ven_magistrato_alla_sanita: "Управління охорони здоров'я"
  ven_magistrato_alla_sanita_desc: "#italic Magistrato alla Sanità#!, воно ж «Управління охорони здоров'я», — це вкрай важливий державний орган, який займається запобіганням у країні хворобам та епідеміям."
  ven_venetian_painting: "Венеційська школа живопису"
  ven_venetian_painting_desc: "Італія славиться своїм внеском у світову культуру. Не останню роль у цьому відіграє венеційська школа живопису. Щоб пройтися нашими галереями та відчути дух італійського Ренесансу, до країни приїжджають художники з усіх країн світу."
  ven_venetian_school_of_music: "Венеційська школа музики"
  ven_venetian_school_of_music_desc: "Твори венеційських митців тішать не лише погляд поціновувачів образотворчого мистецтва, а й слух любителів вишуканих мелодій. Наші великі композитори сьогодні виступають по всій Європі, поширюючи венеційську культуру далеко за межі країни."
  ven_mixed_naval_tactics: "Змішана тактика морського бою"
  ven_mixed_naval_tactics_desc: "З перших днів свого існування венеційський флот покладався на весла, проте ці благородні пристосування навряд чи переживуть сучасні віяння: долю битв у Середземному морі все частіше вирішують вітрильні кораблі. Щоб не відставати, ми можемо об'єднати наші найкращі кораблі з могутніми галеасами."
  ven_naval_conscription: "Призов на флот"
  ven_naval_conscription_desc: "Венеційські веслярі ніколи не були рабами: вони вільні люди, які отримують платню. Однак серйозна нестача рекрутів ускладнює підбір умілих веслярів, тому доведеться вдатися до призову: хтось же мусить працювати на галерах."
  ven_provveditori_ai_beni_inculti: "Provveditori ai beni inculti"
  ven_provveditori_ai_beni_inculti_desc: "Управління з питань неосвоєних природних ресурсів займається осушенням боліт та зрошенням посушливих ділянок, щоб громадяни Венеції не потребували їжі."
  cunning_diplomacy: "Дипломатичні хитрощі"
  cunning_diplomacy_desc: "Вірність правителів Валахії, затиснутих між сильними ворогами, вкрай хитка. Деякі з них прийшли до влади за допомогою османів, після чого уклали союз з Угорщиною або Священною Римською Імперією."
  boyar_regime: "Боярський лад"
  boyar_regime_desc: "Договір, підписаний в Алба-Юлії, надійно закріпив повноваження волоської знаті. Разом з воєводою виконавчу владу в країні представляла рада з 12 великих бояр."
  home_of_hussars: "Батьківщина гусарів"
  home_of_hussars_desc: "Легку кавалерію винайшли ще давні римляни, однак перші балканські гусари (ця назва споріднена зі словом «корсар», тобто пірат) з'явилися за часів Візантійської Імперії — там вони служили як допоміжні підрозділи. Набирали їх переважно в сербських землях, що належали Візантії в X–XI століттях. Гусарські традиції пережили поступовий занепад імперської влади і згодом стали тільки яскравішими."
  serbian_mining: "Сербська гірнича промисловість"
  serbian_mining_desc: "У надрах балканських гір таяться величезні поклади руди, що чекають на вмілих гірників — наприклад, саксонських шахтарів, яких, за прикладом інших країн Східної Європи, запросила до себе Сербія. Завдяки їхнім зусиллям такі непримітні поселення, як Ново-Брдо, перетворилися на грандіозні багаті міста, що існують виключно за рахунок гірничого промислу."
  mimic_the_phoenix: "Наслідування фенікса"
  mimic_the_phoenix_desc: "Ми в усьому наслідуємо візантійський уклад — від законодавства до моди. Щоб достеменно відтворити красу і досконалість Візантії, ми цілеспрямовано перекроюємо державне управління та систему правосуддя за римським зразком, віддаючи належне їхньому впливу."
  rallying_the_troops: "Згуртування військ"
  rallying_the_troops_desc: "Ми досконало опанували мистецтво швидкого збору військ, щоб жоден ворог не застав нас зненацька. Лише завдяки цьому наша країна ще існує. Кожен з нас завжди готовий до битви. Ні кроку назад, ні найменшого сумніву, жодної пощади ворогам батьківщини."
  keepers_of_the_gate: "Хранителі воріт"
  keepers_of_the_gate_desc: "Сербія — гориста країна, і подолати оборону цих країв буде непросто будь-якому загарбнику. Тих же, хто все-таки пройде через наші укріплення, чекає справжнє диво сербської оборонної думки — Смедеревська фортеця. Однак їм не вдасться подолати довгі гірські ланцюги та великі річкові долини, які ми перетворили на мережу укріплень, що відображають стійкість і непокірність сербського духу."
  poklisars: "Поклісари"
  poklisars_desc: "Нам завжди було мало тих кордонів, у яких розташувалася наша країна. Ми прагнемо більшого: вести прибуткову торгівлю, втихомирювати грізних сусідів, укладати союзи, об'єднуватися з іншими проти спільного ворога. Займатися цим будуть наші особливі посли — поклісари."
  the_rebirth_of_the_patriarchate: "Відродження патріархату"
  the_rebirth_of_the_patriarchate_desc: "У XIV столітті Стефан Душан вперше спробував піднести сербське архієпископство до патріархату. З тих пір наші священнослужителі прагнуть незалежності від Константинополя, щоб тим самим стати на крок ближче до Бога."
  reform_the_ecclesiastical_authorities: "Реформа церковних властей"
  reform_the_ecclesiastical_authorities_desc: "Сербія увібрала в себе як західний, так і східний дух: їй добре знайомі і православ'я, і католицтво. Однак наші церкви слабкі, а духовна сила народу невелика. Тому настав час провести церковні реформи, щоб посилити наші релігійні інститути."
  balkan_hajduks: "Балканські гайдуки"
  balkan_hajduks_desc: "Сербські (і взагалі балканські) гайдуки, на відміну від угорських, користуються поганою славою розбійників і кочівників, що вічно тікають від закону. Однак під час війн ці бувалі головорізи нерідко ставали до лав сербської піхоти, де виявляли себе відмінними, хай і не надто дисциплінованими бійцями."
  foreign_relations_bureau: "Відділ закордонних справ"
  foreign_relations_bureau_desc: "Важливість налагодження дружніх відносин і навіть укладання союзів із сусідами очевидна кожному. Щоб це стало можливим, ми заснуємо особливий відділ, присвячений зв'язкам з іншими країнами. Упор на дипломатію убезпечить нас у вирі міжнародних відносин, а заодно забезпечить країні добробут."
  serbian_enlightenment: "Сербське просвітництво"
  serbian_enlightenment_desc: "Епоха Просвітництва не обійшла стороною і нашу країну. Натхненність найяскравішими діячами тих років породила плеяду таких діячів, як Доситей Обрадович, які прагнуть облагородити розмовну мову та літературу. Обрадович, роздратований неможливістю для простого народу ознайомитися зі світською літературою, вирішив усунути розбіжності між писемним та усним різновидами сербської мови. Завдяки Обрадовичу та його соратникам ми тепер видаємо підручники граматики, словники, книги та переклади іноземних праць. Література країни переживає справжнє відродження."
  military_modernization: "Удосконалення війська"
  military_modernization_desc: "В народній пам'яті назавжди залишилися спогади про могутні країни, які грізно нависали над кордонами нашої молодої держави. Одвічна пильність породила вічну готовність дати відсіч ворогу. Завдяки зусиллям наших безстрашних воїнів ми з жертви перетворилися на серйозну силу, з якою змушений рахуватися будь-хто, хто ризикне зазіхнути на нашу незалежність."
  seljuk_heritage: "Сельджуцька спадщина"
  seljuk_heritage_desc: "Побудувати гідне майбутнє неможливо, не спираючись при цьому на уроки персів та Сельджукідів. Нам слід взяти з них приклад, як правильно будувати країну, що об'єднує в собі найрізноманітніші народи та вірування."
  turkic_traditions: "Тюркські традиції"
  turkic_traditions_desc: "Ми — діти вітряних степів. Ми загартовані тяготами та негараздами, в наших жилах тече кров воїнів. Це слід пам'ятати кожному."
  millets: "Канун-наме"
  millets_desc: "Встановивши в кожній із провінцій нашої імперії особливий звід законів — так званий Канун-наме, — ми переконаємо народ у справедливості та неупередженості державної влади. Кожен Канун-наме враховуватиме місцеві особливості та традиції наших таких несхожих одна на одну провінцій."
  ghazi: "Газі"
  ghazi_desc: "Ми шануємо степові традиції. Наші аристократи — це воїни, що б'ються на прикордонні. Ми розширимо кордони ісламського світу — і будемо безстрашні."
  azeb_irregulars: "Нерегулярні війська азапів"
  azeb_irregulars_desc: "Азапи — це молоді неодружені воїни, вихідці з найбідніших верств суспільства. Вони служитимуть нам не тільки як солдати та моряки: з азапів вийдуть будівельники, сапери та зброярі. Кожен азап отримуватиме платню — для цього ми розподілимо їх по фортечних гарнізонах."
  bashi_bazouks: "Башибузуки"
  bashi_bazouks_desc: "Башибузуки — нерегулярні війська, вкрай недисципліновані та набрані з числа знедолених громадян, а іноді навіть зі справжнього наброду. Утримання таких військ недороге, а тому їх нерідко можна побачити в гарнізонах фортець та застав. Крім того, башибузуки схильні розбійничати та вбивати без розбору, через що їх не люблять на прикордонних ворожих територіях."
  ottoman_bureaucracy: "Бірун"
  ottoman_bureaucracy_desc: "Бірун (зовнішня служба) — це керівники, офіцери та богослови, які не входять до ближнього оточення правителя. Разом вони відповідають за роботу османського бюрократичного механізму, успадкованого від іранців та Сельджукідів і доповненого особливостями, запозиченими у Візантії."
  ahdnames: "Ахаднами"
  ahdnames_desc: "$ahdnames$ являють собою письмові договори з іншими країнами, засновані як на світському праві, так і на шаріаті. Найчастіше вони захищають права іноземного купецтва та духовенства в межах нашої країни, сприяючи правосуддю та безперебійній торгівлі."
  dragomans: "Драгомани"
  dragomans_desc: "Драгомани — це досвідчені перекладачі та посередники, що займаються зміцненням наших дипломатичних і торговельних зв'язків з іншими громадами та країнами. Більшість драгоманів мають грецьке коріння, хоча деякі з них походять з єврейських, вірменських або інших багатомовних сімей."
  kafes: "Кафес"
  kafes_desc: "$kafes$ — це спеціальна темниця на території гарему. Поміщаючи туди бунтівних спадкоємців, ми можемо запобігати безглуздим бунтам і братовбивчим чварам, які в минулому завдали нашій країні чимало лиха."
  timariots: "Тимаріоти"
  timariots_desc: "Отримуючи земельні наділи в рамках тимарної системи, вершники-сипахи витрачають дохід з них на утримання та озброєння себе та своєї свити. Завдяки цьому ми отримуємо сильнішу кавалерію."
  autonomous_pashas: "Самостійні паші"
  autonomous_pashas_desc: "Найскладніше в управлінні країною — утримувати рівновагу між місцевими потребами та інтересами нації. Швидкість передачі указів у нашій країні невелика: навіть до найближчих провінцій вони доходять далеко не відразу. Щоб жителі периферії не відчували себе ущемленими, нам слід надати місцевим правителям більше самостійності."
  lawcode_of_suleiman: "Звід законів Сулеймана"
  lawcode_of_suleiman_desc: "Сулейман — це великий правитель, що увійшов в історію як прославлений воїн і законодавець, який перетворив країну. На Заході його прозвали «Сулейман Пишний», на батьківщині ж його іменують «Кануні», або «Законодавець». Османську династичну правову систему — «Канун» — він привів у відповідність із законами шаріату."
  ottoman_tax_farming: "Муката"
  ottoman_tax_farming_desc: "Ця податкова система дозволяє аристократам викуповувати право на збір податків з певних територій у володінні правителя. $ottoman_tax_farming$ сприяє справедливому розподілу благ і відвертає аристократів від корупції, даючи їм вагому причину підтримувати країну."
  ottoman_waystations: "Мензіль"
  ottoman_waystations_desc: "Складна система продовольчих складів та житлових приміщень для солдатів і чиновників дозволить нашим військам виживати без грабежів на прикордонних територіях."
  late_ottoman_bureaucracy: "Маліє"
  late_ottoman_bureaucracy_desc: "Це складна, різноманітна та налагоджена бюрократична система, куди входять наймайстерніші писарі. $late_ottoman_bureaucracy$ претендує на роль основоположного та непідкупного державного інституту."
  tulip_period: "Епоха тюльпанів"
  tulip_period_desc: "Настав час позбутися застарілих звичаїв і традицій. Ми засадимо всі наші сади тюльпанами, які стануть символом змін і ознаменують новий золотий вік у торгівлі та культурі."
  imperial_school_of_naval_engineering: "Імперське морське інженерне училище"
  imperial_school_of_naval_engineering_desc: "#italic Імперське морське інженерне училище#! дозволить нам готувати корабелів, морських офіцерів та моряків як для військового, так і для торгового флоту."
  ayans: "Аяни"
  ayans_desc: "$ayans$ — провінційні феодали, які володіють значною автономією, але при цьому приносять до скарбниці дохід від відкупу та надають країні рекрутів для збройних сил."
  french_language_in_all_courts: "Французька мова при дворі"
  french_language_in_all_courts_desc: "Довгий час у ролі лінгва франка всієї Європи виступала латинська мова, проте час змиритися з очевидним: латина мертва. Нам потрібен новий лінгва франка. Навіть сам термін не залишає жодних сумнівів, що такою мовою має стати французька."
  elan: "Élan!"
  elan_desc: "Наголос на наступальні дії — наріжний камінь нашої військової доктрини. Élan («запал») наших солдатів має бути настільки великим, щоб перевага в бою виявилася на нашому боці."
  estates_general: "Генеральні штати"
  estates_general_desc: "Генеральні штати існують ще з 1303 року, проте з часом з ради, що скликалася королем, вони перетворилися на виборний орган. Легітимність штатів (а заодно й законність стягуваних ними податків) від цього тільки збільшилася."
  fra_gendarmes: "Загони жандармів"
  fra_gendarmes_desc: "Система ополчень є вкрай ненадійною, тому, покладаючись на неї, ми наражаємо нашу країну на велику небезпеку. Щоб вирішити цю проблему, ми можемо створити загони важкоозброєної кавалерії та забезпечити їх постійною платнею, щоб вони служили країні як регулярні війська."
  fra_integration_of_new_territories: "Консолідація країни"
  fra_integration_of_new_territories_desc: "Наш вплив на інші країни вельми великий. То чому б не використати його, щоб приєднати ці території до нашої країни?"
  fra_reliance_on_privateers: "Заохочення каперів"
  fra_reliance_on_privateers_desc: "Пряме військове зіткнення з іншими морськими країнами вимагає великих витрат і може швидко спустошити нашу скарбницю. Замість цього ми можемо дозволити приватним суднам захоплювати ворожі торгові кораблі та отримувати винагороду. Це не тільки принесе нам значний прибуток, а й завадить нашим суперникам вести торгівлю."
  fra_reformation_of_taxation: "Створення генералітетів"
  fra_reformation_of_taxation_desc: "Інтендантів, відповідальних за збір податків, повинні призначати не представники станів, а безпосередньо наш правитель. Лише тоді ці чиновники дотримуватимуться вірності країні та справно збиратимуть кошти, які їй належать."
  fra_school_of_fontainebleau: "Північний маньєризм"
  fra_school_of_fontainebleau_desc: "Наша країна вступила в епоху Відродження, а тому було б розумно вкласти кошти у створення унікального французького творчого стилю. Ми могли б запросити до себе талановитих митців та надати їм своє покровительство, щоб вони сформували нову, цілком французьку художню школу."
  vauban_fortifications: "Продумані фортеці"
  vauban_fortifications_desc: "Конструкція фортець залишилася переважно колишньою — вирішальним фактором стало їхнє розташування. Витягуючи максимальну вигоду з рельєфу укріплюваної місцевості, ми значно ускладнимо ворогу взяття наших фортів."
  the_philosophes: "Філософи"
  the_philosophes_desc: "Епоха Просвітництва породила в нашій країні чимало видатних мислителів, які постійно висувають нові ідеї та концепції. Завдяки їхнім зусиллям кожна галузь життя, від найнепримітніших до найважливіших, виявилася зачепленою поступом."
  fra_expansion_of_france: "Обґрунтовані претензії"
  fra_expansion_of_france_desc: "Витоки нашої країни сягають імперії Карла Великого, тому ми маємо повне право заявляти свої претензії на її колишні території. Доручивши чиновникам відстежити наші історичні зв'язки з цими володіннями, ми отримаємо можливість знову приєднати їх до нашої країни."
  liberty_egalite_fraternity: "Свобода, рівність, братерство"
  liberty_egalite_fraternity_desc: "За законом нашої нової країни всі люди вважаються рівними. Тепер будь-яка людина, незалежно від її віросповідання, може брати участь у державній діяльності, що однозначно сприяє розвитку нашої країни."
  fra_code_civil: "Цивільний кодекс"
  fra_code_civil_desc: "Настав час упорядкувати численні закони нашої країни та скласти #italic Цивільний кодекс#! — всеосяжний і єдиний для всіх громадян правовий документ, який слугуватиме юридичною основою нашої країни та забезпечить рівність усіх перед законом."
  magna_carta_advance: "$magna_carta_reform$"
  magna_carta_advance_desc: "$magna_carta_reform_desc$"
  royal_navy: "Королівський військово-морський флот"
  royal_navy_desc: "Близько 1495 року Тюдори почали фінансувати будівництво не тільки кораблів, а й супутньої інфраструктури. Багато хто вважає саме цю дату роком заснування Королівського флоту."
  eltham_ordinance: "Елтемська постанова"
  eltham_ordinance_desc: "Випущена (але не прийнята) у 1526 році постанова стала першою спробою зробити англійський бюрократичний механізм менш громіздким і витратним."
  secretaries_of_state: "Державні секретарі"
  secretaries_of_state_desc: "До середини XVII століття на королівській службі завжди перебував слуга, який відповідав за королівське листування. Потім кількість таких слуг почала зростати, і з часом вони стали незамінними частинами державного апарату: вони не тільки публікували укази, а й володіли певною управлінською самостійністю."
  navigation_acts: "Навігаційні акти"
  navigation_acts_desc: "Навігаційні акти — це закони виключно торговельної спрямованості. Вести морську торгівлю зможуть лише наші кораблі. Вони ж будуть насамперед заходити в наші порти та сплачувати там податки."
  eng_red_coats: "Червоні мундири"
  eng_red_coats_desc: "Життя англійського солдата виснажливе та розписане не по годинах, а по хвилинах, але такий підхід виховує характер. Істинно англійська витримка та вміння поводитися з вогнепальною зброєю вселяють страх у серця ворогів корони."
  eng_experimental_riflemen: "$a_experimental_riflemen$"
  eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"
  sick_and_hurt_board: "Комітет у справах хворих і поранених"
  sick_and_hurt_board_desc: "Його засновано 1707 року. Працівники комітету надають допомогу звичайним морякам, завербованим до Королівського флоту. Завдяки їхнім зусиллям та реформам здоров'я моряків помітно покращилося."
  british_bill_of_rights: "Білль про права"
  british_bill_of_rights_desc: "Це низка реформ, спрямованих на обмеження королівської влади, особливо судової. Монарху забороняється самостійно скликати війська, призначати жорстокі та незвичайні покарання та втручатися у вільні вибори членів парламенту."
  defense_of_the_faith: "Захист віри"
  defense_of_the_faith_desc: "Нас вигнали з Акри та з Кіпру, однак Орден Святого Іоанна більше не поступиться жодним клаптиком землі. Як у язичницькі часи над Родосом височіла велична статуя, так і зараз над світом височітиме захисник, рівних якому ще не було."
  assistance_to_the_suffering: "Допомога стражденним"
  assistance_to_the_suffering_desc: "Орден госпітальєрів отримав свою назву недарма: спочатку ми дбали про паломників, які прийшли до Єрусалима. Сьогодні це велике місто займають сарацини, однак ми досі надаємо медичну допомогу нужденним, зокрема й нашим відважним лицарям, які повертаються на поле бою швидше за інші війська."
  reconquista_of_the_sea: "Морська реконкіста"
  reconquista_of_the_sea_desc: "Часті сутички з жахливими турецькими та берберськими корсарами навели нас на думку: можливо, немає нічого поганого в тому, щоб грабувати та розоряти берегові поселення… за умови, що ті належатимуть нашим ворогам. У мирний час піратство — страшний гріх, однак на війні пірати стають каперами, а це вже зовсім інше, погодьтеся."
  friends_in_need: "Друзі в біді"
  friends_in_need_desc: "Лицарі нашого ордену — насамперед сини християнського світу, а вже потім — своєї батьківщини. Єдина віра значно спрощує для нас пошук допомоги збоку. У Європі немає такого куточка, де не було б наших представників. Завдяки цьому ми зможемо схилити правителів-католиків на свій бік."
  scourge_of_the_corsairs: "Бич корсарів"
  scourge_of_the_corsairs_desc: "Знаменитий турецький капер Хайреддін Барбаросса не раз бився з нашими лицарями, але, крім Барбаросси, їм протистоять й інші пірати. Настав час покласти край турецьким нальотам на Південну Європу, які здійснюються з потурання країн Варварського берега. Наші лицарі готові будуть віддати життя на захист невинних моряків."
  crusader_tradition: "Традиції хрестоносців"
  crusader_tradition_desc: "Лицарі нашого ордену воювали з Саладіном та обороняли останнє володіння країни хрестоносців — Акру. Щоб надихнутися на подвиг, достатньо лише одного прикладу братів Ордену госпітальєрів. Їхнє ім'я та наша відвага в бою назавжди увійшли в історію."
  ecumenical_defenders_of_christendom: "Всесвітні захисники християнства"
  ecumenical_defenders_of_christendom_desc: "Реформація вбила клин у нашу справу: серед німецьких та скандинавських лицарів піднявся ропот. Дедалі частіше вони починають задаватися питаннями про природу Євхаристії. Однак ці суперечки меркнуть перед обличчям турецької загрози. Можливо, спочатку слід подбати про захист християнського світу, а богословські диспути влаштовувати після перемоги над сарацинами."
  a_neverending_crusade: "Нескінченний хрестовий похід"
  a_neverending_crusade_desc: "Поки останній католик не відчує себе в безпеці (і неважливо, що йому загрожує, — небезпека на шляху до Гробу Господнього чи нещадні пірати), ми не складемо зброї. Постійні тренування — запорука вічної пильності."
  inspired_builders: "Натхненні будівничі"
  inspired_builders_desc: "Основне завдання нашого ордену — це війна. Однак волею Божою наші тяготи мають й іншу природу: людям потрібні не тільки зручності, але й захист від можливих нападів. За останні кілька століть ми навчилися на заздрість іншим швидко зводити споруди та укріплення. Столиця, яку ми перетворимо на воістину неприступну фортецю, стане справжнім втіленням нашої культури."
  the_right_hand_pope: "Права рука папи"
  the_right_hand_pope_desc: "Поступ невблаганно рухається вперед. Епоха хрестових походів поступово стає чимось далеким і не цікавим звичайному народу. Кожному, хто прагне стати великим магістром ордену, очевидно: щоб залишитися в історії, нам треба вплинути на Його Святість. Ми станемо близькими радниками та друзями Верховного понтифіка. Прагнення прислужувати йому напевно можна обернути на свою користь…"
  a_brand_new_world: "О дивний новий світ"
  a_brand_new_world_desc: "Світ не стоїть на місці. Те, що колись здавалося звичним, сьогодні набуває зовсім інших форм. Історія нещадно відкидає всіх, хто не хоче змінюватися. Наш орден існує вже понад п'ятсот років, і ми не готові просто канути в безвість. Наші тлінні тіла колись вирушать до Творця, але орден повинен здобути безсмертя. Ми станемо першими серед найсучасніших країн світу, почерпнувши силу із самого серця нашого народу."
  an_order_with_state: "Орден, у якого є країна"
  an_order_with_state_desc: "Деякі нації можна описати фразою #italic «Військо, у якого є країна»#!. Ми ж — орден, у якого є країна, що веде свою історію з моменту передачі нам Родосу греками. Залишається лише захоплюватися цим славним народом, що побудував таку могутню країну. Надихнувшись їхнім прикладом, ми проведемо у військах реформи, щоб жоден ворог не здавався непереможним."
  local_merchant_preference: "Преференції місцевим купцям"
  local_merchant_preference_desc: "Кожен купець — громадянин світу: він пливе, звідки і куди забажає. Ми ж надамо місцевим торговцям певні привілеї, наприклад право першими завантажувати і вивантажувати товар, щоб у них не було спокуси везти вантаж кудись іще."
  association_with_unbelievers: "Зв'язок з невіруючими"
  association_with_unbelievers_desc: "Деякі вважають, що ми не повинні мати жодних стосунків з невіруючими. Ми ж прагнемо викорінювати подібні погляди, оскільки інакше торгівля з невіруючими була б неможлива."
  port_security_improvement: "Зміцнення охорони портів"
  port_security_improvement_desc: "Щоб торгівля приносила прибуток, слід подбати про надійний захист вантажу в портах. У місцях, де купці ведуть свої справи, не повинно бути жодних злочинів, навіть дрібних."
  end_of_shipbuilding_guilds: "Усунення гільдій кораблебудівників"
  end_of_shipbuilding_guilds_desc: "Будівництво кораблів на Аравійському півострові завжди було у віданні місцевих гільдій. Їхні працівники чимало зробили для збереження славних традицій, однак сьогодні ці люди лише перешкоджають поступу. Можливість займатися кораблебудуванням повинна бути відкрита кожному, у кого є талант."
  skilled_captains: "Умілі капітани"
  skilled_captains_desc: "Кожен капітан, що працює на благо нашої країни, зобов'язаний відповідати найвищим стандартам мореплавства та вміти правильно маневрувати за будь-яких обставин. Час подбати про їхню підготовку."
  expansion_of_trade_contacts: "Розширення торговельних зв'язків"
  expansion_of_trade_contacts_desc: "Нашим купцям повинні бути раді в будь-якому місті, тому ми постараємося всіма можливими способами переконати правителів інших країн вітати торговців, що прибувають до них."
  unlock_gallowglass_advance: "$a_gallowglass$"
  unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"
  unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
  unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"
  unlock_late_gallowglass_advance: "$a_late_gallowglass$"
  unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"
  scottish_salmon: "Охорона шотландського лосося"
  scottish_salmon_desc: "Наші річки та берегові лінії рясніють лососем, але, щоб експорт цієї дорогоцінної риби ліг в основу місцевої економіки, нам слід підійти до видобутку та розведення лосося з усією можливою ретельністю та законодавчою суворістю."
  scottish_morale: "Шотландська хоробрість"
  scottish_morale_desc: "Ще з часів боротьби проти тиранії англійців наша незалежність тримається виключно на відвазі шотландського народу. У пам'яті захисників шотландської свободи назавжди залишилися такі постаті, як Вільям Воллес та його сподвижники."
  scottish_longbowmen: "Англо-шотландські лучники"
  scottish_longbowmen_desc: "Узи, що пов'язують нас з Англією, дещо зміцніли. Ми готові запозичити деякі елементи тактики англійського війська, щоб наше власне військо стало тільки сильнішим."
  peel_towers_advance: "Пілі-башти"
  peel_towers_advance_desc: "Пілі-башти — це захисні споруди, що зводяться в неспокійному прикордонні нашої країни для захисту людей та худоби від нальотчиків. Також у пілі-башті можна розвести сигнальний вогонь, щоб попередити прилеглі поселення про наближення ворожого війська."
  scottish_tenacity: "Земля стійких"
  scottish_tenacity_desc: "Війна — справа довга та стомлююча. Відстояти незалежність у теплі та затишку неможливо — на нас чекають непрості дні. На щастя, наш народ настільки ж твердий, наскільки тверда наша рідна земля, і битися із загарбниками буде до останнього."
  influx_of_english_nobles: "Англійські управителі"
  influx_of_english_nobles_desc: "Після укладення миру з південним сусідом англійські дворяни почали займати керівні посади, що спростило діяльність уряду."
  scottish_trade_connections: "Торговельні зв'язки на Північному морі"
  scottish_trade_connections_desc: "Наша країна розташована на самому краю Західної Європи та вкрай бідна на ресурси. Економічне процвітання неможливе без розвитку торговельних зв'язків з іншими регіонами. Північне море — наш головний шлях до багатих ринків та перспективних підприємств. Залишилося тільки ним скористатися."
  comets: "Комети?"
  comets_desc: "Нещодавно нам до рук потрапила вкрай цікава праця #italic «Про істинне значення комет та проти марнославства звіздарів»#!. Ми повеліли, щоб кожен ознайомився з її змістом."
  modernized_royal_scots_navy: "Шотландський королівський флот"
  modernized_royal_scots_navy_desc: "Бажання обзавестися власним флотом переслідувало нас ще з часів війн за незалежність. Раніше за це відповідали наші феодали; тепер же ми побудуємо сучасний флот, що належить королю. Портом його приписки стане Ньюхейвен."
  royal_revenue: "Посилення надходжень до скарбниці"
  royal_revenue_desc: "Щоб Шотландія могла залишатися вільною, нам потрібні будуть стабільні джерела доходу. Посиливши розпорядження королівськими володіннями та правами феодалів, ми покращимо надходження податків. Таким чином корона зможе й далі чинити на свій розсуд, не покладаючись на інші доходи."
  scottish_education: "Шотландські університети"
  scottish_education_desc: "Якість освіти в європейських університетах переконала нас у необхідності розвивати систему освіти на батьківщині: нашим талантам теж потрібно десь навчатися. Кожен охочий повинен мати можливість навчатися у себе вдома, не витрачаючи останні кошти на дорогу освіту за кордоном."
  act_of_revocation: "Акт про ревокацію"
  act_of_revocation_desc: "У нашій країні є давня традиція жалувати дворянству частину королівських земель, визнаючи таким чином його заслуги. Однак ця система не може існувати вічно: незабаром від наших земель нічого не залишиться. З цього моменту ми будемо пропонувати брати землю в оренду."
  scottish_diplomacy: "Залежність від союзів"
  scottish_diplomacy_desc: "Протягом багатьох століть наша незалежність забезпечувалася дипломатичними методами та зв'язками з іноземними країнами на континенті. Час надати цій практиці офіційного характеру, щоб наші узи зберігалися ще багато століть."
  scottish_highlander_advance: "Заснування полків горян"
  scottish_highlander_advance_desc: "Набравши нові полки з жителів Шотландського високогір'я, ми значно зміцнимо військо."
  scottish_whisky: "Шотландський віскі"
  scottish_whisky_desc: "Винокурні — не новинка для жителів Шотландії, однак раніше вони не піддавалися державному регулюванню. Час це змінити. Ставши першим за обсягами виробником міцного алкоголю в країні, ми розширимо перелік товарів на експорт."
  scottish_enlightenment: "Шотландське просвітництво"
  scottish_enlightenment_desc: "Нові відкриття та досягнення в галузі філософії, політичної економії та медицини надихнули чимало шотландців, готових на все, щоб Шотландія посіла місце в авангарді Просвітництва. Це значно допоможе нам у відносинах з іншими країнами."
  swabian_league_of_cities: "Союз міст"
  swabian_league_of_cities_desc: "Багаті міста Швабії постійно перебувають під загрозою завоювання з боку своїх амбітних сусідів. Нам слід об'єднатися, щоб у разі нападу ми могли разом дати рішучу відсіч загарбникам."
  swabian_frugal_people: "Економічна розважливість"
  swabian_frugal_people_desc: "Вороги часто називають нас жадібними та глузують з нашого ощадливого ставлення до фінансів. Може, вони й мають рацію, зате наша скарбниця повна грошей, які ми можемо вкладати в розвиток своїх земель."
  franconian_proud_knights: "Лицарі імперії"
  franconian_proud_knights_desc: "Наші землі славляться своїми доблесними лицарями. Вони втілюють у собі багато моральних ідеалів, які хоч і дещо втратили своє колишнє значення, але все ж залишаються невід'ємною частиною нашої культури. Саме завдяки лицарям у нас є багаті традиції, які виховують у наших людях гідність, вірність і хоробрість. Крім того, ці засади також спонукають наших аристократів збирати ополчення і навіть самим брати участь у битвах у надії здобути лицарську славу."
  franconian_wine_bottles: "Сільванер і боксбойтель"
  franconian_wine_bottles_desc: "Боксбойтель є важливим символом місцевого виноробства. Багато в чому саме завдяки зручній і впізнаваній формі цієї пляшки наше вино користується великою популярністю. Втім, і сам напій, приготований з таких відомих сортів винограду, як рислінг і сільванер, теж заслуговує всіляких похвал. Можна не сумніватися: спільно наші талановиті склодуви та винороби неодмінно забезпечать економічне процвітання наших земель."
  westphalian_monastic_traditions: "Земля монастирів"
  westphalian_monastic_traditions_desc: "У північній частині Німеччини знаходиться безліч духовних єпископств, таких як Мюнстер або Падерборн. Завдяки розташованим там храмам і монастирям, а також багатим релігійним традиціям у місцевих жителів є широкі можливості для здобуття духовної освіти. Все це вельми позитивно позначається на освіченості та грамотності наших священників, які бажають прийти в лоно церкви."
  north_german_hanseatic_traditions: "Ганзейські купці"
  north_german_hanseatic_traditions_desc: "Жителі наших земель на півночі Німеччини отримують велику вигоду зі свого розташування поблизу Балтійського моря. Так, поки південні сусіди копітко перевозять товари річками, наші моряки активно торгують у балтійському регіоні, тим самим приносячи до скарбниці величезний дохід і забезпечуючи розвиток наших володінь."
  german_baltic_sailors: "Балтійські моряки"
  german_baltic_sailors_desc: "Суворий клімат виховує сильних і стійких людей. Ходіння холодними водами Балтійського моря безперечно наклало свій відбиток на наших моряків, завдяки чому вони стали справжніми майстрами своєї справи, здатними справлятися навіть у найважчих умовах."
  german_populating_the_countryside: "Залучення потрібних людей"
  german_populating_the_countryside_desc: "Значна частина наших володінь вельми слабо заселена. Надавши людям орну землю в сільських районах, ми можемо посприяти їхньому прискореному освоєнню і водночас збільшити свої доходи."
  german_fair_towns: "Міста імперських торгових ярмарків"
  german_fair_towns_desc: "Імператор особисто дарував кільком містам імперії цей рідкісний привілей, який дозволяє місцевим купцям право проводити великі торгові ярмарки. Завдяки великій кількості товарів і виробів на цих ринках людям набагато простіше знаходити потрібну продукцію та укладати угоди. Як наслідок, такі заходи приносять містам-організаторам величезний прибуток і роблять їх найбільшими торговими центрами не тільки в імперії, а й у всій Європі."
  german_imperial_roads: "Імперська дорожня мережа"
  german_imperial_roads_desc: "Європа почала стрімко обростати дорогами ще за часів Римської імперії. Сьогодні ця розвинена дорожня мережа, що проходить, зокрема, через Німеччину, з'єднує між собою безліч міст і значно полегшує подорожі, перевезення вантажів і навіть перекидання військ."
  landsknechte: "Ландскнехти"
  landsknechte_desc: "Нескінченні війни всередині Німеччини та на її кордонах призвели до появи загонів нового ґатунку. Ландскнехти — це сучасні змішані війська, де пікінери складають каре, аркебузири надають підтримку з флангів, а на передовій лінії орудують дворучними мечами сумнозвісні #italic доппельзольднери#!, тобто солдати з подвійним жалуванням. Таке шикування дозволяє поєднувати бій на близькій і середній дистанціях."
  german_biedermeier: "Бідермаєр"
  german_biedermeier_desc: "Як художній стиль бідермаєр є реакцією на консервативні тенденції, що просуваються дворянами, які тужать за минулими часами. Через посилення цензури творці були змушені відійти від гострих соціально-політичних ідей і звернутися до більш приземлених тем, таких як зображення міщанського побуту. З одного боку, це сприяє розвитку культурної ідентичності міського стану, але з іншого, змушує багатьох художників виїжджати в країни з більшою свободою самовираження."
  custom_union_of_the_rhine: "Рейнський монетний союз"
  custom_union_of_the_rhine_desc: "Для свого розвитку та процвітання імперія повинна співпрацювати з сусідніми країнами в питаннях економіки. Ми приєднаємося до митного союзу Рейну та приймемо в обіг #italic гульдени#!, щоб полегшити торгівлю та дипломатичні переговори з іншими країнами."
  lub_hanseatic_coins: "Вендський монетний союз"
  lub_hanseatic_coins_desc: "Вендський монетний союз — нове економічне об'єднання могутніх ганзейських міст, яке забезпечить нам міцний фундамент для розвитку торгівлі на наших територіях."
  hamburg_port_cities: "Портова мережа"
  hamburg_port_cities_desc: "Без морської торгівлі — а отже, без постійного обміну товарами — наша країна перестане існувати. Щоб до наших гаваней і надалі заходили купецькі кораблі, нам потрібно прокласти нові водні шляхи та побудувати більше причалів і складів, які будуть готові приймати купців з інших країн."
  saiger_process: "Цайгерування"
  saiger_process_desc: "Цілком новий процес виплавки, при якому мідь, що містить срібло, збагачується за допомогою свинцю. Завдяки цьому зростає продуктивність нашої гірничої промисловості."
  german_river_toll_castle_advance: "$german_river_toll_castle$"
  german_river_toll_castle_advance_desc: "$german_river_toll_castle_desc$"
  german_mountain_toll_castle_advance: "$german_mountain_toll_castle$"
  german_mountain_toll_castle_advance_desc: "$german_mountain_toll_castle_desc$"
  austrian_tradition: "Славний рід"
  austrian_tradition_desc: "Наше піднесення викликало невдоволення у багатьох родів імперії, які заздрять нашому становищу захисників південно-східних рубежів. Попри це, ми пишаємося своєю незрівнянною дипломатією, що дозволяє уникати відкритих конфліктів."
  austrian_heritage: "Спадщина Рудольфа I"
  austrian_heritage_desc: "Перемога Рудольфа I, про яку складено чимало пісень та легенд, дозволила нам увійти до числа найвеличніших родів імперії. Подвиг, здійснений ним та його лицарями на Моравському полі, надихатиме наших воїнів протягом століть."
  hab_expert_mountaineers: "Країна гір та річок"
  hab_expert_mountaineers_desc: "Наші піддані звикли подорожувати пересіченою місцевістю: їм не страшні ні високі гірські кручі, ні широкі річки долин."
  austrian_marriage_policy: "Tu Felix Austria Nube"
  austrian_marriage_policy_desc: "Поки інші ведуть війни, щаслива Австрія грає весілля! Бо те, що інші отримують від Марса, вам дарує Венера."
  habsburg_dominance: "Австрійське дипломатичне мистецтво"
  habsburg_dominance_desc: "Ми знаходимося практично в самому центрі Європи та володіємо великими можливостями в галузі зовнішньої політики. Союзи та конфлікти можуть виникати та припинятися дуже швидко, але наші дипломати готові до будь-якого повороту подій."
  austrian_military_flexibility: "Тактика ландскнехтів"
  austrian_military_flexibility_desc: "Нас може привести до перемоги лише універсальна тактика, в якій поєднуються артилерійські удари, кавалерійський натиск та нестримний наступ піхоти ландскнехтів."
  edict_of_restitution: "Реституційний едикт"
  edict_of_restitution_desc: "Облік та контроль допоможуть нашій країні подолати будь-які релігійні чвари. Цей невинний едикт абсолютно точно не викличе подальших конфліктів."
  austrian_court: "Австрійський двір"
  austrian_court_desc: "Відносини з іншими країнами забирають багато часу та сил, а надмірне розростання дипломатичного корпусу псує нашу репутацію та знижує ефективність у внутрішніх справах. Спростивши структуру двору, ми забезпечимо собі своєчасне надходження нових відомостей, що допоможе запобігати можливим конфліктам."
  geheimrat: "Таємна рада"
  geheimrat_desc: "Таємна рада — особливий орган, що складається з високопоставлених дворян та чиновників, які допомагають главі Австрії приймати рішення в питаннях політики, управління та війська."
  hofkriegsrat: "Гофкрігсрат"
  hofkriegsrat_desc: "Нашій військовій раді потрібна сувора бюрократична організація. Щоб ефективно захищати країну від ворогів, ми повинні знати всі подробиці про свої війська та їхнє постачання."
  military_border: "Військові на прикордонній смузі"
  military_border_desc: "Оборона рубежів нашої країни — непросте завдання, особливо у фінансовому плані. На питання, як впоратися з непосильними витратами, ми знайшли відповідь: пожалувати обширні ділянки землі на кордоні професійним військовим. Таким чином ми зміцнимо дисципліну серед рекрутів та полегшимо переміщення підданих у малонаселені регіони."
  austrian_ambition: "Освіта для правителів"
  austrian_ambition_desc: "Наші правителі повинні отримувати найкращу освіту, гідну ідеалів освіченої монархії."
  austrian_state_industrialization: "Державна індустріалізація"
  austrian_state_industrialization_desc: "Уряд повинен постійно приділяти увагу модернізації промисловості. Тільки ефективне та сучасне виробництво дозволить нам залишатися конкурентоспроможними на світовій арені."
  wiener_klassik: "Віденська класична школа"
  wiener_klassik_desc: "Класицизм значно вплинув на розвиток музики. Наші найкращі композитори здійснять революцію в європейській музиці завдяки новаторській роботі в симфонічній, оперній та камерній формах."
  multicultural_empire: "Мультикультурна імперія"
  multicultural_empire_desc: "Австрія — мультикультурна країна, тому її правителі повинні враховувати інтереси найрізноманітніших етнічних меншин, щоб зберігати єдність і стабільність на тлі зростання націоналістичних настроїв."
  imperial_artillery: "Імперська артилерія"
  imperial_artillery_desc: "Методи ведення війни постійно змінюються, через що нам доводиться розробляти нові тактики та види озброєння. Щоб залишатися на крок попереду ворогів, ми перетворимо артилерію на основну ударну силу імперського війська."
  alchemy_advance: "Алхімія"
  alchemy_advance_desc: "Алхімія — це мистецтво створення зілля та еліксирів з різних трав, мінералів та інших природних компонентів. Надійність такого методу залишає бажати кращого, проте деякі алхіміки досягають вражаючих успіхів у зціленні недуг."
  anatomy_advance: "Анатомія"
  anatomy_advance_desc: "Глибше розуміння того, як влаштоване людське тіло, спрощує лікарям лікування хвороб і ран. Крім того, розтин людських трупів дозволяє розвивати хірургічну справу, а заодно знижує ризики при операціях."
  surgery_advance: "Хірургія"
  surgery_advance_desc: "Цирульники винаходять нові методи лікування захворювань і ран, а впровадження нових хірургічних інструментів знижує небезпеку для пацієнтів. Травми та хвороби, що ще кілька років тому вважалися смертельними, сьогодні не небезпечніші за багато інших."
  pharmacology_advance: "Фармакологія"
  pharmacology_advance_desc: "Алхіміки та лікарі винаходять нові лікарські склади. Деякі з них вже розробили багатообіцяючі засоби проти лихоманки, застуди та розладу травлення. Однак ще багато чого нам тільки належить дізнатися; крім того, нові ліки можуть бути небезпечними, якщо приготувати їх неправильно."
  sanitation_advance: "Санітарія"
  sanitation_advance_desc: "У поселеннях вживаються суворіші санітарні заходи: краще прибираються відходи, підводиться чиста вода… Так ми знизимо захворюваність та оздоровимо населення. Завдяки сучасним санітарним нормам люди зможуть жити щільніше, не побоюючись при цьому захворіти."
  vaccination_advance: "Вакцинація"
  vaccination_advance_desc: "Завдяки вакцинам у населення з'явиться імунітет до смертельних захворювань. Вакцини обмежують поширення хвороб і запобігають епідеміям. Достатньо вколоти пацієнту препарат, у складі якого є ослаблені або мертві бактерії чи віруси, щоб імунна система розпізнала хворобу і змогла впоратися з нею у разі справжнього захворювання."
  vibrant_court_advance: "Яскравий двір"
  vibrant_court_advance_desc: "До нашого двору стікаються великі уми з усього світу, приносячи з собою культурне та мовне різноманіття. Завдяки їм ми поступово звикаємо до чужоземних манер."
  patio_process_advance: "Амальгамація в купах"
  patio_process_advance_desc: "$patio_process_advance$ — спосіб видобутку низькоякісного срібла та золота з руди за допомогою хімічного розчину на основі ртуті, що прискорює реакцію амальгамації."
  pan_amalgamation_advance: "Амальгамація в бочках"
  pan_amalgamation_advance_desc: "$pan_amalgamation_advance$ — більш сучасний метод видобутку дорогоцінних металів з руд. За швидкістю процесу перевершує амальгамацію в купах."
  milanese_tradition: "Лангобардська спадщина"
  milanese_tradition_desc: "Дух слави та впливу королівства лангобардів відчувається й донині. Міланські знатні родини, як духовні спадкоємці лангобардів, користуються більшою владою та повагою, ніж інші."
  milanese_heritage: "Кондотьєрські традиції"
  milanese_heritage_desc: "Жителі Мілана звикли пропонувати іншим свої послуги найманців — цьому сприяють постійні чвари між сусідами. З часом ці найманці стали відомі як вельми вправні солдати."
  renaissance_prince: "Діяч епохи Ренесансу"
  renaissance_prince_desc: "Нехай інші правителі в Італії розпинаються, як підтримують культурне відродження, що розгортається на наших очах, — у серці цього руху буде Мілан, що перебуває під нашим заступництвом."
  patron_of_music: "Покровитель музики"
  patron_of_music_desc: "На жаль, інші принци не цікавляться музичним мистецтвом. Тоді ми станемо його покровителями — на славу Бога і, звісно, Мілана."
  lowered_power_of_barons: "Зменшений вплив баронів"
  lowered_power_of_barons_desc: "Мистецтво та культура — це чудово, але для підтримки незалежності нам потрібні гроші. Треба обмежити вплив місцевої знаті та зробити так, щоб кошти текли одразу до скарбниці, минаючи їхні руки."
  age_of_condottieri: "Епоха кондотьєрів"
  age_of_condottieri_desc: "Головною опорою військ все частіше стають найманці. Подбати про наявність солдатів, готових битися за гроші, слід і нам. Якщо капітанів найманих загонів зустрічатимуть у Мілані з розпростертими обіймами, вони обов'язково це згадають, коли прийде час."
  encouragement_of_philosophers: "Підтримка філософів"
  encouragement_of_philosophers_desc: "Мілан завжди підтримував мислителів епохи Ренесансу. Цю традицію слід продовжити: ми запропонуємо своє заступництво найкращим мислителям з усієї Європи і навіть побудуємо для них все необхідне."
  merchant_princes: "Великі комерсанти"
  merchant_princes_desc: "Великі прибережні міста Італії багатіють завдяки старим, добре налагодженим торговельним зв'язкам. Мілан не прибережне місто, проте Міланське герцогство теж прагне багатства. Нехай відтепер буде відомо, що кожен багатій, який привозить сюди скарби світу, стане бажаним гостем при міланському дворі."
  rulership_of_enlightened_principals: "Ідеї просвітителів в управлінні"
  rulership_of_enlightened_principals_desc: "За належної підтримки мислителі створюють нові теорії та принципи. Впровадивши ці ідеї в державну структуру, ми заручимося підтримкою серед тих, чия думка дійсно має вагу."
  milanese_ambition: "Нове королівство лангобардів"
  milanese_ambition_desc: "Найяскравіші досягнення лангобардів минулих часів блякнуть у порівнянні з тим, чого досяг міланський народ — і чого він тільки збирається досягти. Перед нами схилиться весь світ."
  pap_head_of_the_church: "Глава церкви"
  pap_head_of_the_church_desc: "Курія та Святий Престол щільно пов'язані з папством. Нехай кардинали з інших країн і намагаються спрямувати розвиток християнства так, як завгодно їм, але в курії немає нікого впливовішого за папу."
  pap_the_word_of_the_lord: "Слово Боже"
  pap_the_word_of_the_lord_desc: "Ми, єпископи, — найвірніші слуги Його. Ми — ті, хто читає та трактує Слово Боже. За нашими дипломатами стоїть божественна сила."
  ecclesiastical_primacy: "Главенство церкви"
  ecclesiastical_primacy_desc: "Папа — єдиний, хто уповноважений встановлювати релігійний канон і закони католицької церкви. До тих, хто підкоряється католицькому духовенству, папство ставиться по-особливому."
  papal_investiture_and_tithes: "Папська інвеститура та десятини"
  papal_investiture_and_tithes_desc: "Багатства християнської Європи стікаються до Риму."
  glory_of_rome: "Римська слава"
  glory_of_rome_desc: "Нам належить велике місто — столиця Стародавнього Риму. Ми свято шануємо його традиції."
  donation_of_constantine: "Константинів дар"
  donation_of_constantine_desc: "Константинів дар — свідчення нашого права наділяти титулом римського імператора кого завгодно. Заодно це і свідчення нашого вміння підробляти документи."
  centralize_the_states: "Централізація Папської області"
  centralize_the_states_desc: "Відібравши владу над провінціями Папської області у місцевих правителів, ми зосередимо її у своїх руках."
  holy_father: "Його Святість"
  holy_father_desc: "В очах парафіян римо-католицької церкви папа — намісник Христа, що дає йому певну свободу політичних дій. Папські документи — так звані булли, скріплені печаткою, — це слово Боже, перенесене на папір. Воно здатне проклинати правителів і сіяти розбрат на цілих континентах."
  pap_legacy_of_the_military_orders: "Спадщина лицарських орденів"
  pap_legacy_of_the_military_orders_desc: "Епоха духовних орденів давно закінчилася, однак хоробрі, що урочисто клянуться захищати Святий Престол від язичників та єретиків, продовжують йти стопами своїх предків — лицарів-християн."
  teu_crusader_discipline: "Дисципліна хрестоносців"
  teu_crusader_discipline_desc: "Наш великий орден зародився в горнилі третього хрестового походу, відразу після облоги міста $acre$ у 1191 році. Спочатку наші лицарі виходжували хворих і слабких, проте згодом взяли в руки зброю і перетворилися на зразок відданості та дисципліни."
  teu_teutonic_heavy_cavalry: "Тевтонська важка кавалерія"
  teu_teutonic_heavy_cavalry_desc: "Ніщо так явно не показує міць війська, як важка кавалерія. У багатьох країнах її лави складаються зі знаті, але в Тевтонському ордені кожен брат — це закований у броню вершник, підготовлений у кращих традиціях хрестоносців."
  teu_reformed_order_army: "Реформоване орденське військо"
  teu_reformed_order_army_desc: "Німецькі лицарі — ветерани хрестових походів і десятків європейських війн — занадто малочисельні, щоб становити основу нашого війська. Його слід перетворити так, щоб включити до складу війська місцеве ополчення, здатне замістити лицарів у бою."
  teu_peasants_recruitment: "Набір селян"
  teu_peasants_recruitment_desc: "Стало очевидно, що одних лише іноземних добровольців недостатньо, щоб сформувати повноцінне військо, навіть якщо вони бачили не одну війну. Потрібно розробити таку систему, яка дозволить призивати підданих — і німців, і не тільки — до лав ополчення."
  teu_infantry_tactics: "Піхотна тактика"
  teu_infantry_tactics_desc: "Останні битви, що розгорнулися на полях Європи, показали, що настає епоха піхоти. Перед нами виникає одразу кілька завдань: розробити нову тактику, забезпечити війська піками та перетворити допоміжні підрозділи на основну силу майбутнього війська."
  teu_teutonic_religious_authority: "Влада тевтонців над релігією"
  teu_teutonic_religious_authority_desc: "Ми покладемо край релігійній свободі місцевих єпископів. Усі релігійні питання, починаючи з податків і закінчуючи наверненням у нашу віру місцевого населення, відтепер вирішуватиме країна."
  teu_expanded_marches: "Розширення марок"
  teu_expanded_marches_desc: "Ми надамо правителям прикордонних територій право на самоврядування та перетворимо підвладні їм землі на особливі регіони — марки. Взамін на зобов'язання бути завжди готовими до бойових дій навіть у мирний час марки обкладатимуться меншим податком. Наші витрати будуть несуттєві, а оперативність військ помітно зросте."
  teu_prussian_bishops: "Прусські єпископи"
  teu_prussian_bishops_desc: "Ми наділимо прусських єпископів ширшими правами та привілеями, щоб заручитися їхньою вічною вірністю."
  teu_one_state_one_religion: "Одна країна, одна релігія"
  teu_one_state_one_religion_desc: "Обіймати державні посади зможуть лише ті, хто сповідує нашу релігію. Єретикам і язичникам тут більше не раді."
  teu_absolute_order: "Абсолютний порядок"
  teu_absolute_order_desc: "Наш орден — це втілення державної влади. Кожен вчинок, кожне рішення спочатку розглядається членами Тевтонського ордену. Звісно, не кожному подобається подібна бюрократія, проте саме завдяки їй влада великого магістра абсолютна."
  legacy_of_breton_independence: "Спадщина бретонської незалежності"
  legacy_of_breton_independence_desc: "Бретань ніколи не була французькою. Ми пережили набіги франків, вікінгів та англійців, але все-таки змогли зберегти своєрідність бретонського народу. Нехай усі сусіди знають: Бретань, де ще живий галльський дух, завжди буде вільною."
  estates_of_brittany: "Стани Бретані"
  estates_of_brittany_desc: "Стани Бретані, скликані ще в XIV столітті, давали можливість кожній вільній людині (навіть якщо вона належала до третього стану) звернутися до герцога зі скаргою або проханням. Скликавши стани, ми дещо скинемо наростаючу серед народу напругу."
  dutch_education: "Голландська освіта"
  dutch_education_desc: "Рівень грамотності нашого населення завжди був досить високим. Сьогодні, коли світ змінюється на очах, ця перевага особливо помітна. Лише дурень вирішив би задовольнятися наявним, а не підкорювати нові висоти."
  dutch_golden_age_art: "Голландське мистецтво"
  dutch_golden_age_art_desc: "У тому, що стосується технологічних та культурних відкриттів, Нідерланди завжди були серед першопрохідців. Нам слід і надалі надавати підтримку винахідникам, творцям та письменникам, щоб інші народи гналися за нами."
  a_trading_hub: "Торговий вузол"
  a_trading_hub_desc: "Нашій країні дуже пощастило: тут вистачає і міст, що займаються виключно торгівлею, і відважних моряків, що везуть на батьківщину багатства з далеких країн. З їхньою допомогою ми зміцнимо торгові зв'язки з іншими країнами, а наша скарбниця почне стрімко наповнюватися."
  platoon_fire: "Повзводна стрільба"
  platoon_fire_desc: "Звичайна залпова стрільба передбачає придушення ворога вогнем: усі ряди стріляють одночасно. Голландці ж розробили нову тактику повзводної стрільби: поки один взвод перезаряджається, інші стріляють, що забезпечує постійний вогонь і не дає ворогу часу на перепочинок."
  concentration_power: "Зосередження влади"
  concentration_power_desc: "Ми більше не маємо наміру миритися з владою статхаудерів, хай навіть деякі з них були впливовішими за інших і вважали себе #italic primus inter pares#!. Державна влада повинна належати одній людині й передаватися у спадок."
  a_fortified_border: "Укріплений кордон"
  a_fortified_border_desc: "Наші кордони не так добре захищені особливостями рельєфу, як деякі сусідські території. Однак ми винахідливі й побудуємо таку оборону, яка стримає будь-яку атаку. Наші родини спатимуть спокійно."
  netherlandish_protoindustry: "Нідерландське кустарне виробництво"
  netherlandish_protoindustry_desc: "Міста й містечка, де постійно кипить життя, а ремеслом, на відміну від сусідів, володіє чи не кожен, — це нерідке видовище в наших землях. Завдяки таким містам наша країна — справжній зразок працьовитості."
  a_dynamic_society: "Діяльне суспільство"
  a_dynamic_society_desc: "Наша країна народжує хоробрих. Тут знайдеться місце кожному, хто не хоче животіти в злиднях. Обернувши подібні прагнення собі на користь, ми як країна станемо лише міцнішими."
  an_early_urbanization: "Ранній розвиток міст"
  an_early_urbanization_desc: "Розвиток міст у Нижніх землях завжди протікав швидше, ніж в інших регіонах. Такий успіх не можна розтрачувати даремно. Навпаки, вже наявний процес слід прискорити, побудувавши цілу низку поселень, які примножать наше багатство."
  polders_advance: "Польдери"
  polders_advance_desc: "Нижні землі завжди були під загрозою затоплення. Низка повеней в XI–XIV століттях призвела до утворення Зейдерзе та відкладення солей у прибережному ґрунті. Однак сьогодні у нас є технології, щоб відвоювати землі, відібрані у нас природою, і зайнятися там сільським господарством."
  netherlandish_ship_building: "Нідерландське кораблебудування"
  netherlandish_ship_building_desc: "Деякі з найбільших портових міст Європи розташовані в Нідерландах. Очевидно, сусідити з ними повинні найбільші європейські судноверфі. Послуги місцевих ремісників допоможуть нам значно скоротити витрати на придбання нових торгових флотів."
  brb_the_four_quartiers: "Чотири чверті"
  brb_the_four_quartiers_desc: "Назву «Чотири чверті» носять чотири провінції, що становлять серце герцогства Брабант. Кожна чверть складається із сукупності маленьких містечок, що оточують одне велике місто; деякі з них обнесені стінами, інші — ні, але всі вони бездоганно доповнюють одне одного. Кожна чверть — важлива частина добре налагодженого механізму, що постачає гроші до нашої скарбниці."
  fla_cloth: "Фламандська тканина"
  fla_cloth_desc: "Фламандська тканинна промисловість — предмет заздрості всього світу. Заморські купці продають у Фландрії вовну, привезену з далеких країв, а ми виробляємо з неї тільки найкращі тканини."
  frisian_trading_traditions: "Торгові традиції"
  frisian_trading_traditions_desc: "Ще до того, як на південь від нас утворилися країни, які сьогодні поступово встановлюють торгові зв'язки з іншими, наші предки ходили від одного європейського узбережжя до іншого, від Балтики до Біскайської затоки. Зараз їхні знання потрібні нам як ніколи."
  gel_warring_spirit: "Непримиренний дух"
  gel_warring_spirit_desc: "Хтось вважає, що ми занадто войовничі. Ми ж вважаємо, що всі просто тремтять перед нашою міццю. Уміле, добре навчене військо — запорука виживання в мінливому світі, і будь-хто, хто посміє виступити проти нас, дізнається, наскільки жорстоким буває наш народ."
  hai_expert_embassadors: "Досвідчені посли"
  hai_expert_embassadors_desc: "Наші правителі завжди вміло добирали слова. Завдяки цьому таланту вплив нашої країни поступово поширився і за її межі. Потреба в подібних діячах сьогодні стала лише очевиднішою: нам потрібно не тільки розширювати свій вплив на інші країни, а й заводити друзів, які допоможуть відбитися від ворогів."
  hol_sailors: "Голландські матроси"
  hol_sailors_desc: "Голландцям не звикати до піску та повеней; море для них — другий дім, де нагородою відважному мореплавцю стануть смачна риба та вічна слава."
  lie_athens_north: "Північні Афіни"
  lie_athens_north_desc: "Протягом багатьох століть Льєж був осередком культури. Тут на заздрість іншим народилися найвидатніші вчені країни. Однак не час спочивати на лаврах: освіту слід розвивати й далі."
  lux_destined_rule: "Народжені правити"
  lux_destined_rule_desc: "Назва великої династії Люксембургів — найвпливовішої європейської родини — походить від найменування нашої країни. Напевно, подібне високе становище — знак згори, і ми не забаримося скористатися такою прихильністю та зміцнити вплив ще більше."
  utr_city_churches: "Місто церков"
  utr_city_churches_desc: "Утрехт нерідко і цілком справедливо називають #italic містом церков#!. Головна його пам'ятка — знаменита Домська вежа. Античний собор, до якого прибудована ця вежа, — найпотаємніше місце для віруючих голландців. Тут же засідає Утрехтське єпископство."
  brb_brabantine_rights: "Брабантське право"
  brb_brabantine_rights_desc: "Настав час взяти приклад з інших країн і законодавчо встановити свободи підданих, щоб служба нашій великій державі не була їм у тягар."
  fla_flemish_renaissance: "Фламандське Відродження"
  fla_flemish_renaissance_desc: "Наша країна настільки розвинена, що багато сусідів по континенту залишилися далеко позаду. Немає нічого протиприродного в тому, що багатство, здобуте потом і кров'ю, йде на створення чогось абсолютно непрактичного — наприклад, витворів мистецтва. Однак без мистецтва не було б радості, подібної до сонячного променя, що пробивається крізь хмари. Фламандські купці покровительствують нашим творцям, а тому щодня створюються нові шедеври."
  frisian_resisting_invader: "Опір загарбнику"
  frisian_resisting_invader_desc: "Наш народ, оточений ворогами з усіх боків, звик давати настільки люту відсіч, що відступивший загарбник вже ніколи не повертається. Але нехай приходять: їхня кров добре удобрить землю!"
  gel_healthy_economy: "Здорова економіка"
  gel_healthy_economy_desc: "Нові землі ми підкоряємо не тільки мечем. Завдяки дбайливому ставленню до грошей нам вдається уникати непотрібного кровопролиття: десь багатство можна перетворити на вплив, десь землю можна просто купити. Такого підходу слід дотримуватися й надалі."
  hai_frontier_march: "Прикордонна марка"
  hai_frontier_march_desc: "Життя на кордоні імперії не могло не позначитися на характері жителів Ено — це кидається в очі майже відразу. Ми, жителі прикордоння, звикли тримати оборону, і з цього навіть можна отримати певну користь."
  hol_maritime_warfare: "Війна на морі"
  hol_maritime_warfare_desc: "Наші матроси майже все життя проводять на морі, а тому звикли битися з флотиліями інших країн або піратами, що зазіхнули на наші багатства. Втім, хто б не загрожував нашій країні, флот має бути завжди готовий дати відповідь."
  lie_devoted_land: "Істинні прихильники"
  lie_devoted_land_desc: "Наша єпархія — одна з найбільших в окрузі. Зрозуміло, побожність місцевих жителів не підлягає жодному сумніву. Світу тільки належить дізнатися, що сильнішою за нашу відданість країні може бути тільки наша віра в Бога."
  lux_fortress_europe: "Європейська фортеця"
  lux_fortress_europe_desc: "Люксембург — це неприступне місто, захищене природною фортецею у вигляді мису Бок. Наша оборона настільки міцна, що пробити її не зможе жоден ворог. Природа сама підказує: фортеці треба будувати так, щоб обертати особливості рельєфу собі на користь."
  utr_blessed_land: "Благословенна земля"
  utr_blessed_land_desc: "Чималу роль у виборі нашого князя-єпископа відіграє сам папа, попираючи таким чином традицію виборів за участю колегії з п'яти осіб. Очевидно, це знак, що нашу землю благословив сам Бог."
  brb_land_culture: "Культурний край"
  brb_land_culture_desc: "Після заснування Левенського університету Брабант стрімко набув найважливішого культурного значення. До Нідерландів з'їжджаються студенти з усієї Європи, щоб навчатися новому та ділитися знаннями."
  fla_prospering_agriculture: "Процвітаюче сільське господарство"
  fla_prospering_agriculture_desc: "Конкуренція в галузі фінансів, виробництва тканин та предметів розкоші поступово наростає. Щоб залишатися попереду, потрібно розвивати сільське господарство. За правильного підходу цей край може стати справжньою житницею для всього регіону, що заразом дозволить урізноманітнити економіку."
  frisian_legend_grutte_pier: "Легенда про П'єра Доніа"
  frisian_legend_grutte_pier_desc: "У наших краях ходять розповіді про двометрового пірата, який сильний як бик. Наслухавшись цих байок, багато хто вирушає в море, де поводяться за заповітами предків, тобто грабують беззахисні береги."
  gel_expand_kwarteers: "Розширення чвертей"
  gel_expand_kwarteers_desc: "Як і Брабант, $GEL$ поділений на чотири чверті. Поділ на провінції, зосереджені навколо сильного міста, виявився досить дієвим — цю систему гідно оцінили правителі. Тепер її слід поширити на інші території."
  hai_bustling_towns: "Жваві міста"
  hai_bustling_towns_desc: "Потенціал наших міст, де вирує життя, невимірний. Достатньо лише одного легкого поштовху, щоб і міста, і прилеглі до них райони розцвіли. Тоді ми зможемо обкласти їх значним податком…"
  hol_trading_spirit: "Дух торгівлі"
  hol_trading_spirit_desc: "Наша країна оточена морем. Щоб скарбниця не порожніла, ми відважно пливемо по хвилях у пошуках нових портів."
  lie_inspiring_mecenas: "Надихаючий меценат"
  lie_inspiring_mecenas_desc: "Краси нашої країни приваблюють багатьох творців, які приїжджають сюди за творчим натхненням. Ми не пошкодуємо жодних коштів на залучення та підтримку творчо налаштованих співвітчизників."
  lux_heirs_john_blind: "Спадкоємці Іоанна Люксембурзького"
  lux_heirs_john_blind_desc: "Іоанн Люксембурзький, також прозваний Сліпим, король Богемії та граф Люксембургу, народився в нашій скромній країні та загинув у битві при Кресі у віці 50 років. Смерть цього хороброго короля, який кинувся в бій, незважаючи на сліпоту, назавжди залишиться прикладом героїзму для наших солдатів."
  utr_skilled_diplomats: "Вправні дипломати"
  utr_skilled_diplomats_desc: "Вплив наших сусідів зростає. Пошук могутніх і відданих союзників, готових підтримати нашу країну у скрутну годину, — це питання життя і смерті."
  golden_fleece: "Орден Золотого руна"
  golden_fleece_desc: "Колись непримітний орден з часом став однією з найпочесніших нагород Європи. Звання кавалера ордена Золотого руна — це ознака великих заслуг, що викликає виключно повагу."
  wagenburg: "Вагенбург"
  wagenburg_desc: "Польові укріплення з возів допомогли нашим військам уникнути розгромної поразки в роки Гуситських війн. Щоб чеські солдати й надалі залишалися невразливими, стрільців слід привчити вести вогонь з оборонних позицій, навіть якщо поблизу немає возів."
  hussite_traditions: "Гуситські традиції"
  hussite_traditions_desc: "Лише завдяки завзяттю та братській солідарності нам вдається відстояти свою віру та уникнути навернення. Кожен, хто прагне захистити свою віру та жити в мирі з іншими християнами, охоче приймає наші погляди та переконання, що сягають корінням у давні релігійні вчення."
  kutnohorian_deal: "Кутногорський договір"
  kutnohorian_deal_desc: "Знать завжди дуже трепетно ставилася до своїх привілеїв. Їй слід надати гарантію, що ці привілеї вічні та невід'ємні."
  bohemian_thaler: "Богемський талер"
  bohemian_thaler_desc: "Жителі нашої країни традиційно розплачувалися грошами — срібними монетами, що мали обіг у всій Священній Римській Імперії. Після виявлення нових джерел срібла ми змогли відчеканити нову, більшу монету — талер (він же «толер» або «далер»). Згодом вона настільки зміцниться, що вся торгівля вестиметься тільки в талерах. За ними майбутнє державної валюти."
  fortified_towns: "Укріплені міста"
  fortified_towns_desc: "Руйнівні Гуситські війни та постійні утиски нашої віри принесли багато горя. Щоб убезпечити людей, нам довелося звести навколо міст безліч укріплень. Це дало нашим інженерам цінний досвід у будівництві оборонних споруд, здатних витримати будь-яку атаку."
  maori_ta_moko_advance: "Та-моко"
  maori_ta_moko_advance_desc: "Вигадливі вигини та завитки #italic та-моко#! — не просто малюнки на шкірі. Вони мають ритуальне значення, а за кожним надрізом стоїть своя історія. Наші тіла — це полотна, що оповідають про подвиги."
  maori_ceremonial_haka_advance: "Церемоніальна хака"
  maori_ceremonial_haka_advance_desc: "#italic Хака#! у виконанні наших воїнів — незабутнє видовище. Земля тремтить від тупоту ніг, тіла рухаються в унісон, луна розносить над полем бою люті вигуки. Цей грізний військовий танець надає нашим воїнам небувалої хоробрості, піднімаючи бойовий дух до небачених висот."
  maori_whakapapa_advance: "Факапапа"
  maori_whakapapa_advance_desc: "Щоб здобути силу та пізнати єдність, спочатку треба зрозуміти свою #italic факапапу#! — складне переплетення родинних зв'язків, що об'єднують #italic іві#!. Тільки чітке уявлення про спільних прабатьків дає силу спільно перенести будь-які негаразди."
  maori_te_reo_advance: "Те-рео"
  maori_te_reo_advance_desc: "Священна мова #italic те-рео#! — місток між нашим народом та його культурою і традиціями. Те-рео слід оберігати всіма силами."
  maori_rua_kumara_advance: "Руа-кумара"
  maori_rua_kumara_advance_desc: "Забути про голод навіть у найсуворіші зимові місяці нам допоможе мистецтво вирощування та зберігання бульб #italic кумари#! у спеціальних #italic руа#! — овочевих ямах."
  maori_he_whakaputanga_advance: "Хе Факапутанга"
  maori_he_whakaputanga_advance_desc: "Декларація про незалежність Нової Зеландії раз і назавжди закріпила існування єдиної та незалежної країни маорі. Питань до декларації немає ні в кого. Наші вожді тепер можуть забути про розбрат та втручання збоку."
  the_ark_of_the_covenant: "Ковчег Завіту"
  the_ark_of_the_covenant_desc: "Нашому народу належить справжній Ковчег Завіту — його з божою допомогою таємно здобув цар Менелік I ще кілька тисяч років тому. Ковчег надійно прихований від цікавих очей; не можна допустити, щоб наш священний скарб викрали. У всіх своїх церквах ми розмістили копії Ковчега — вони нагадують парафіянам, що наших правителів благословив сам Бог."
  roof_of_africa: "Дах Африки"
  roof_of_africa_desc: "Наш народ століттями мешкав на високогір'ї. Це настільки суворе місце, що виживають тут тільки найстійкіші та найсильніші. Таке загартування дає нам серйозну перевагу в зіткненнях з ворогами."
  solomonid_claim: "Претензія на спорідненість із Соломоном"
  solomonid_claim_desc: "Предки наших правителів — нащадки царів Аксуму, що ведуть свій рід від царя Соломона та цариці Савської. Щоб узаконити свою владу та повернути на престол законних правителів, ми скинули монархів з династії Загве."
  nagusa_negast: "Цар Царів"
  nagusa_negast_desc: "Наш правитель — цар царів, спадкоємець благородної династії Аксума, в чиїх жилах тече кров нашого першого володаря — Менеліка I, сина царя Соломона та цариці Савської. Всі, хто править цією країною, — нащадки Соломонідів. Влада необов'язково повинна передаватися від батька до сина."
  a_permanent_capital: "Постійна столиця"
  a_permanent_capital_desc: "Протягом багатьох століть у нас не було постійної столиці — двір просто покірно слідував за правителями. Цей підхід має деякі переваги, однак управління такою великою державою вимагає міцної та нерухомої центральної влади."
  external_friends: "Закордонні друзі"
  external_friends_desc: "Посли, яких ми відправили на пошуки військової допомоги в таких регіонах, як $rome$ та $iberia_region$, досягли деяких успіхів: про нашу країну дізналися. Але не варто зупинятися на досягнутому."
  eternal_crusade: "Вічний хрестовий похід"
  eternal_crusade_desc: "Ми — християнська країна, з усіх боків оточена ворожими мусульманськими народами, які тільки й чекають зручної нагоди напасти. Ми повинні бути завжди готові відбити атаку, інакше нас чекає загибель."
  prester_john: "Престер Іоанн"
  prester_john_desc: "Після багатовікових безрезультатних пошуків пресвітера Іоанна європейці чомусь вселили собі, що ним є наш правитель — з тієї лише причини, що ми також християни. Немає потреби вказувати їм на помилковість такого судження: вони просто діляться з нами своїми уявленнями про світ."
  an_iron_fist: "Залізний кулак"
  an_iron_fist_desc: "У нашому регіоні мирно співіснують найрізноманітніші культури та релігії. Однак запорука такого співіснування — зовсім не миролюбність, а тверда рука нашого правителя, що жорстоко припиняє будь-які спроби підняти бунт."
  a_true_ethiopian_church: "Істинна ефіопська церква"
  a_true_ethiopian_church_desc: "Вплив ззовні буває корисним, однак на природу наших вірувань він може подіяти виключно згубно. Щоб не втратити самобутність, нам треба подбати про заснування власної церкви тевахедо."
  origin_of_coffee: "Батьківщина кави"
  origin_of_coffee_desc: "Кава зародилася саме на нашій землі. Це й недивно: тут найсприятливіші умови для кавових дерев. Вирощувати їх можна й в інших місцях, однак наша кава славиться своєю якістю, тому ми постачаємо її цілими тоннами. На цьому країні обов'язково потрібно заробляти."
  a_modern_nation: "Сучасна країна"
  a_modern_nation_desc: "Збоку може здатися, що наша країна відокремлена, однак ми непогано обізнані про досягнення поступу в інших країнах і вміємо своєчасно впроваджувати їх, залякуючи ворогів."
  cawa_advance: "Полки чева"
  cawa_advance_desc: "Чева — знатні землевласники, що служать за призовом в імператорському війську. Вони — професійні воїни, широко відомі своєю люттю в бою."
  a_renaissance_cawa_advance: "$a_renaissance_cawa$"
  a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"
  a_discovery_cawa_advance: "$a_discovery_cawa$"
  a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"
  a_reformation_cawa_advance: "$a_reformation_cawa$"
  a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"
  a_absolutism_cawa_advance: "$a_absolutism_cawa$"
  a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"
  a_revolutions_cawa_advance: "$a_revolutions_cawa$"
  a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"
  epic_of_sundiata: "Епос про Сундьяту"
  epic_of_sundiata_desc: "$epic_of_sundiata$ — це повість про легендарний похід Сундьяти Кейти, засновника імперії Малі та героя народних сказань. Його подвиги передаються з покоління в покоління, надихаючи кожного на великі звершення."
  kouroukan_fouga_advance: "Курукан-Фуга"
  kouroukan_fouga_advance_desc: "$kouroukan_fouga_advance$ — конституція малійської країни. Тут закріплено все — від розпорядку сімейного життя в селах до повновладдя манси."
  gold_of_bure: "Золото з Буре"
  gold_of_bure_desc: "Золоті копальні в Бамбуку та Буре відомі всьому світу: тут розташовані найбільші у світі поклади золота. І що найважливіше, вони належать нам. Кожен знає, як через золото, видобуте в рудниках Буре, занепала економіка Єгипту: вона просто не впоралася з інфляцією, що виникла після приїзду туди манси Муси. Наша ж економіка звикла до постійного притоку золота, а тому похитнути її буде складніше."
  accounts_of_the_atlantic_voyage: "Нотатки про подорож за Атлантику"
  accounts_of_the_atlantic_voyage_desc: "Легендарний манса Муса стверджував, що його попередник вирушив у подорож через Атлантичний океан, щоб дізнатися, наскільки далеко той простягається. Думки про цю подорож серед представників правлячого класу різняться: хтось вважає, що таким чином правитель ганебно відрікся від обов'язку перед народом, інші ж бачать у цьому надихаючий приклад, адже світ ще не до кінця розвіданий."
  reclamation_of_land: "Відновлення землі"
  reclamation_of_land_desc: "Сахара мінлива. Вона повністю перебуває у владі дощів. Пустеля то розростається, то звужується, а з нею змінюється і Сахель — населений пояс, де живе наш народ. Сильна посуха здатна перетворити майже все царство на безплідну пустелю, де безроздільно панує смерть. Однак у благополучні роки ми можемо відвоювати у Сахари частину малородючих земель і знову виростити там їжу."
  mandinka_warrior_spirit: "Войовничість мандінка"
  mandinka_warrior_spirit_desc: "У Сахелі немає нікого небезпечнішого, ніж воїни народності мандінка, будь вони язичниками чи мусульманами. Відвага та гордість наших бійців заслуговує виключно на захоплення. Військо Муси не тільки найбільше в усьому Сахелі — воно ще й найсильніше."
  markets_for_salt: "Ринки збуту солі"
  markets_for_salt_desc: "У нашому царстві сіль на вагу золота. На південь від нас, у густих лісах, де проживають ашанті та йоруба, вона цінується ще більше, причому значно. На щастя, наші запаси солі досить великі, а нестачу можна заповнити, просто купивши ще, оскільки золота в нас не менше. Можливо, є й інші народи, для яких сіль буде так само дорога?"
  west_african_slave_trade: "Работоргівля в Західній Африці"
  west_african_slave_trade_desc: "Ще до утворення нашої імперії велика Вагаду (вона ж — імперія Гана, наша попередниця) продавала рабів арабам, переганяючи їх через пустелю. Весь цей час ми робили те ж саме — постачали арабські ринки невільниками. Тепер до нас дійшли чутки, що європейцям теж потрібні раби: їм гостро не вистачає дешевої сили, яка працювала б у так званому Новому Світі. Нам мало про що говорить ця назва, однак потреба європейських країн у рабах вражає уяву. Їм настільки не вистачає живого товару, що часом вони здійснюють нальоти на береги нашої країни та викрадають наших підданих. Настав час навести лад у работоргівлі та дати європейцям право заходити тільки в деякі порти, де вони купуватимуть, а не викрадатимуть рабів."
  kele_koun_advance: "Келе-коун"
  kele_koun_advance_desc: "Назва «келе-коун» походить від слів «війна» та «голова». Так називаються командири, що керують загонами келе-боло — піхотинців на службі імперії (ця назва, своєю чергою, походить від слів «війна» та «рука»). На відміну від тон-тігі — малійських феодалів, келе-коун не завжди є аристократами. Келе-коун володіють так званими джоноу — рабами, які до входження до складу батальйонів софа виконували обов'язки зброєносців."
  sofa_levies_advance: "Ополченці софа"
  sofa_levies_advance_desc: "Спочатку всі солдати в ополченні келе-боло були «хорон» — «вільними». Однак після недавніх перетворень до складу війська імперії Малі увійшли джоноу — раби, звільнені від обов'язку носити зброю, але зобов'язані битися. Такі бійці називаються софа. Саме з них складаються гарнізони малійських укріплень."
  mandekalu_levies: "Ополчення мандекалу"
  mandekalu_levies_desc: "$mandekalu_levies$ — це хребет малійської війська. Коли починається війна, вільних чоловіків, імперських підданих, призивають на службу. Можливість взяти участь у бою з власною зброєю вони вважають великою честю."
  farari_corps_advance: "Загони фарарі"
  farari_corps_advance_desc: "$farari_corps_advance$ — це елітні підрозділи малійського війська. Вони — повноцінні командири, що заслужили повагу оточуючих своїм досвідом та відвагою."
  sudano_sahelian_architecture_advance: "Судано-сахельська архітектура"
  sudano_sahelian_architecture_advance_desc: "Степи, савани та пустелі Західної Африки занадто бідні, щоб там можна було влаштовувати масштабні будівництва. Місцеві жителі будують будівлі з саману, обмазаного штукатуркою. Це не тільки економить кошти, а й надає місцевій архітектурі характерного приємного оку вигляду."
  stories_of_the_gao_empire: "Легенди про імперію Гао"
  stories_of_the_gao_empire_desc: "Ще до того як Західна Африка підкорилася імперії Малі, тут панувала інша імперія зі столицею в місті Гао. Про неї майже не збереглося записів, однак традиції імперії Гао живі та передаються з вуст в уста, надихаючи нові покоління на подвиги."
  malian_military_tactics: "Малійська військова тактика"
  malian_military_tactics_desc: "За той час, що ми були підданими імперії Малі, наш народ гідно освоїв її військову справу. Завдяки цьому знанню наша піхота зможе з честю витримати майбутні битви."
  gold_to_salt_trade: "Золото на сіль"
  gold_to_salt_trade_desc: "Кажуть, що сіль — на вагу золота… але вірніше буде сказати, що золото — на вагу солі. Хай там як, ми успішно ведемо торгівлю цими двома товарами, отримуючи чималу вигоду."
  independence_from_mali: "Незалежність від Малі"
  independence_from_mali_desc: "Протягом довгих років ми були підданими малійського султана, однак у міру ослаблення малійської влади ми ставали сильнішими. Сьогодні наш народ нарешті може заявити: ми вільні від чужого панування. Тепер настав час закріпити цю свободу так, щоб ніхто більше не посягнув на неї."
  jihad_against_the_pagans: "Джихад проти язичників"
  jihad_against_the_pagans_desc: "За багато століть сунітські султанати так і не змогли викорінити язичників, що зайняли Західну Африку і поклоняються духам природи. Настав час оголосити їм джихад — тільки так ми позбавимо рідні землі від невірних, а заодно розширимо кордони наших володінь."
  sankore_madrassah: "Медресе Санкоре"
  sankore_madrassah_desc: "Нам не раз казали, що медресе Санкоре — найвеличніший навчальний заклад у всій Африці. З цим складно не погодитися, адже мало кого не вразить вигляд мудреців з далекої Аравії та Магрибу, які обговорюють тонкощі філософії та релігії."
  the_hajj: "Хадж"
  the_hajj_desc: "Наші правителі, наслідуючи приклад малійського манси Муси, також можуть вирушити до Мекки, віддавши таким чином належне п'ятому стовпу ісламу. З собою вони візьмуть золото — символ багатства та влади. Нехай світ дивується розкоші та величі країни Сонгай."
  sharia: "Шаріат"
  sharia_desc: "Священний закон Пророка, встановлений у роки його правління Мединою, повинен лягти в основу всіх правил нашого суспільства. Переписавши кримінальне уложення так, щоб воно відповідало вченням Пророка, ми досягнемо згоди та справедливості."
  trans_sahara_trade: "Торгівля через Сахару"
  trans_sahara_trade_desc: "Наші купці, повертаючись з придворних прийомів у Північній Африці, нерідко привозять звідти дивовижні дрібнички. Можливо, вийде зробити так, щоб вони почали привозити щось ще більш дивовижне?"
  modernization_of_the_military: "Вдосконалення війська"
  modernization_of_the_military_desc: "Могутність наших військ — єдине, на чому стоїть країна. Саме завдяки їм ми не тільки залишилися на мапі світу, а й досягли величі. Відставання у військовій справі тепер неприпустиме для нас."
  university_naples: "Неаполітанський університет"
  university_naples_desc: "Неаполітанський університет, заснований у 1224 році імператором Фрідріхом II, — це один з найстаріших навчальних закладів Італії. Зі стін цього світського університету вийшли цілі покоління добре освічених студентів, які досягли значних успіхів у найрізноманітніших галузях."
  mercantile_spirit: "Комерційний дух"
  mercantile_spirit_desc: "Неаполітанське королівство, що чимало запозичило у приморської республіки Амальфі, могло похвалитися рясно процвітаючою торгівлею. Її центрами служили стратегічно важливі порти, такі як Неаполь. Звідси неаполітанські купці вирушали в далекі краї, де здійснювали вигідні угоди та привозили додому не тільки товари, а й нові уявлення про світ."
  consolidate_the_royal_domain: "Королівські володіння"
  consolidate_the_royal_domain_desc: "Земля, яку ми успадкували, багата, але страждає від застарілих норм і звичаїв. Наші попередники чимало попрацювали, щоб шляхетне походження та багатство в цій країні були співмірні; наше ж завдання — зробити так, щоб закони відповідали духу часу. Посиливши вплив баронських судів та об'єднавши земельні володіння в межах країни, ми спростимо правову вертикаль. У землях, де панують корона та містяни, ми зосередимо вплив у містах та сприятимемо розвитку торгівлі та ремесел."
  academia_pontaniana: "Академія Понтаніана"
  academia_pontaniana_desc: "Неаполь завжди прагнув стати осередком сучасної наукової думки — місцем, куди стікалися б найвидатніші уми епохи і звідки вони несли б світоч Відродження. Під керівництвом Джованні Понтано гуманістичні спільноти нарешті набули впорядкованості — отже, справедливо буде назвати академію на його честь."
  encouraged_city_living: "Заохочення міського життя"
  encouraged_city_living_desc: "Наші попередники залишили своїм нащадкам прекрасне місто. Цю красу слід берегти й плекати, щоб наша середземноморська перлина могла процвітати й надалі. Досить задовольнятися обслуговуванням порту та ремонтом застарілих будівель — настав час довести самим собі, що наше місто може зростати. Відтепер потрібно будувати акведуки, осушувати болота та мостити нові дороги."
  crush_the_barons: "Знищення впливу баронів"
  crush_the_barons_desc: "Місцеві барони все ще мають чималий вплив серед жителів сільської місцевості Неаполя. Централізація королівства вимагає жертв: баронів слід позбавити впливу, інакше вони влаштують проти нас змову."
  expanded_arsenale: "Розширений арсенал"
  expanded_arsenale_desc: "Ще з XIV століття головним кораблебудівним підприємством країни (і заодно — гордістю нашого флоту) виступає Неаполітанський арсенал. Однак він відчайдушно потребує розширення та вдосконалення, оскільки судна ворожих країн все частіше борознять Середземне море. Настав час наростити як мирні, так і військові потужності нашого порту, а роботу арсеналу налагодити так, щоб можна було утримувати більший та потужніший флот."
  city_of_artists: "Місто творців"
  city_of_artists_desc: "Якщо ми почнемо підтримувати найвидатніших творців світу, про велич нашого міста дізнається кожен. Нехай імена наших художників, поетів, співаків та акторів викликають лише захват, а неаполітанське мистецтво стане зразком, з яким порівнюватимуть все інше!"
  institutional_reorganization: "Перебудова країни"
  institutional_reorganization_desc: "Неаполітанському королівству потрібні важливі правові реформи: скасування Допоміжної ради та заснування замість неї Королівської палати Санта-К'яра. Мета змін, що відбуваються зараз, — перегляд законодавчої системи, внесення законів до кодексу Codice Carolino та впровадження реєстру Onciario Cadastre в рамках податкової реформи."
  a_central_power: "Володарювання на Середземному морі"
  a_central_power_desc: "Завдяки вдалому розташуванню в центрі Середземного моря ми без труднощів можемо дістатися до будь-якого берега. Така перевага відкриває широкі можливості: ми зможемо укласти нові союзи, знайти нових друзів, розширити кордони країни… Море стане нам опорою в гонитві за багатством та впевненістю в завтрашньому дні."
  neapolitan_industrialization: "Індустріалізація Неаполя"
  neapolitan_industrialization_desc: "У XVIII столітті в Неаполітанському королівстві поступово почалася індустріалізація. Насамперед розвивалися ключові галузі, такі як текстильна, кораблебудівна та металургійна. Цьому сприяло як вкладення капіталу, так і нові наукові відкриття. Перехід до індустріалізації ще відіграє значущу роль у перетворенні Неаполя на великий економічний центр."
  neapolitan_army_reforms: "Реформи в неаполітанському війську"
  neapolitan_army_reforms_desc: "Збройні сили нашої країни відчайдушно потребують реформ: військо повинне відповідати всім, навіть найжорсткішим вимогам доби, що настала. Наші війська краще розумітимуться на тактиці, система управління стане простішою, а підготовка солдатів — ефективнішою. Так ми станемо дійсно грізною регіональною силою."
  tws_unified_legal_code: "Єдиний звід законів"
  tws_unified_legal_code_desc: "Багато наших земель постраждали від повстань, спричинених несправедливим застосуванням законодавства. Щоб уникнути нових народних заворушень, ми повинні систематизувати наші закони та забезпечити їх справедливе виконання."
  tws_ensure_loyal_families: "Вірність знатних родів"
  tws_ensure_loyal_families_desc: "Знатні родини обох Сицилій мають значний вплив на місцях. Якщо призначити їхніх представників на почесні, але по суті марні придворні посади, ми досягнемо їхньої відданості та зміцнимо свою владу в сільських районах країни."
  tws_revitalize_the_lands: "Залучення нових людей"
  tws_revitalize_the_lands_desc: "Колишні правителі приділяли надто багато уваги окремим регіонам нашої країни. Щоб зберегти владу над Сициліями, ми повинні розвивати обидві частини країни рівномірно та справедливо. Для цього нам слід насамперед залучити людей до тих областей, якими ми раніше нехтували."
  tws_capable_vicars: "Здібні вікарії"
  tws_capable_vicars_desc: "Одна з основних проблем нашої об'єднаної країни полягає в складності управління землями, що лежать по той бік Мессінської протоки. Оскільки правитель не може бути присутнім у двох місцях одночасно, владу над частиною територій доводиться довіряти вікарію, який править від нашого імені. На жаль, такі високі посади часто використовуються в корисливих цілях, а тому слід призначати на цю посаду лише найдостойніших чиновників."
  tws_oversea_ambitions: "Заморські території"
  tws_oversea_ambitions_desc: "Розширення наших італійських володінь пов'язане з безліччю труднощів: союзникам довіряти не можна, і на додаток ми ризикуємо розгнівати папу. У зв'язку з цим розумніше буде звернути наш погляд за море — на багаті землі в Північній Африці та Греції."
  tws_protect_the_coastline: "Посилення морських патрулів"
  tws_protect_the_coastline_desc: "Протяжна берегова лінія робить нас легкою здобиччю для піратів, що промишляють работоргівлею. Нам потрібен власний флот, який патрулюватиме береги та відбиватиме напади, — тільки так ми зможемо захиститися від цієї загрози."
  arte_della_lana: "Арте делла Лана"
  arte_della_lana_desc: "Одне з найвпливовіших виробництв Флоренції. Якість вовни, виробленої тут силами ретельно відібраних робітників, на віки стало запорукою багатства багатьох купців і просто впливових діячів."
  florino_d_oro: "Золотий флорин"
  florino_d_oro_desc: "Це вкрай дорога валюта, підкріплена бездоганною чистотою золота. Її приймає безліч країн та установ у всій Європі. Якщо ми приймемо #Y флорин#! як державну валюту, доходи країни напевно збільшаться, а дефіцит бюджету — скоротиться."
  a_land_of_banks: "Країна банків"
  a_land_of_banks_desc: "Тоскана є банківським центром Європи та батьківщиною багатьох багатих і могутніх родин. Розгалужена мережа банківських відділень працює не тільки на Апеннінському півострові, а й в інших частинах Європи, що дає Тоскані величезний економічний і політичний вплив."
  florentine_citizen_militia: "Флорентійське громадянське ополчення"
  florentine_citizen_militia_desc: "Щоб гідно перенести випробування часом, наш народ має бути готовий стати на захист усього, що дороге Флоренції! Заснувавши громадянське ополчення, яке своїм досвідом і люттю в бою не поступатиметься повноцінним європейським військом, ми забезпечимо своїм кордонам надійний захист."
  birthplace_of_renaissance: "Батьківщина Відродження"
  birthplace_of_renaissance_desc: "Любов до образотворчого мистецтва, ретельне плекання талантів та винахідливість мислення принесли плоди: наша країна перебуває на вістрі культурного та наукового поступу!"
  florentine_school: "Флорентійська школа"
  florentine_school_desc: "Флорентійська школа живопису — одна з найвидатніших у своєму напрямку. Завдяки таланту флорентійських художників та їхній увазі до дрібниць ми опинимося в авангарді культурного та художнього руху. Про пишність наших картин говоритимуть усі без винятку!"
  tuscan_uffizi: "Уффіці"
  tuscan_uffizi_desc: "Спочатку ця будівля будувалася для централізації керівництва різними гільдіями та управліннями. Сьогодні Уффіці — не тільки місце, де здійснюється таке керівництво, а й сховище творів мистецтва. Тут ми демонструємо свою культурну перевагу та фінансове благополуччя."
  medici_porcelain: "Порцеляна Медічі"
  medici_porcelain_desc: "Спроби відтворити властивості справжньої порцеляни — екзотичного східного товару — за останні десятиліття були такі численні, що не піддаються підрахункам. Однак ми впевнені, що зуміємо досягти успіху в цьому починанні. Для цього знадобляться лише послуги досвідчених алхіміків та наукові знання."
  porto_franco: "Порто-франко"
  porto_franco_desc: "Якщо ми відкриємо порти іноземним купцям і дозволимо їм ввозити товари безмитно, наш торговий капітал напевно значно зросте."
  accademia_cimento: "Академія дель Чименто"
  accademia_cimento_desc: "Академія дель Чименто («Академія досвіду») — це наукове товариство, одне з перших у світі, засноване у Флоренції в 1657 році. Заснували його учні Галілея на кошти принца Леопольда та його брата — великого герцога Фердинандо II.\nАкадемія дель Чименто, що діяла під девізом «Перевіряй і перевіряй», ніколи не вважалася офіційною установою, проте чимало посприяла розвитку принципів наукових експериментів. Видана нею публікація, відома як Saggi, протягом усього XVIII століття слугувала повноцінним посібником з роботи в лабораторії."
  tuscan_municipal_reforms: "Муніципальні реформи в Тоскані"
  tuscan_municipal_reforms_desc: "Ми вступаємо в епоху абсолютизму та міцної централізованої влади. Сьогодні слід змінити підхід до місцевого управління та відповідним чином перебудувати системи, щоб наші законодавчі таланти не пропадали марно."
  tuscan_physiocratic_reforms: "Фізіократичні реформи в Тоскані"
  tuscan_physiocratic_reforms_desc: "Розвиток сільськогосподарської галузі та турбота про населення стануть міцним фундаментом, на якому ми побудуємо нову економічну систему."
  tuscan_new_trade_system: "Нова тосканська торгова система"
  tuscan_new_trade_system_desc: "Епоха купецьких гільдій поступово добігає кінця. Їхній вплив блякне перед абсолютною централізованою владою. Щоб збільшити прибуток, потрібно провести реформу серед керівництва гільдій і передати майже все управління ними в руки глав країни."
  pis_anziani_del_popolo: "Старійшини народу"
  pis_anziani_del_popolo_desc: "Рада старійшин була створена, щоб припинити конфлікти між ворогуючими родинами Герардеска та Вісконті. З моменту її заснування саме цей орган став визначати політичний устрій республіки та обирати її правителів."
  pis_maritimes_legacy: "Спадщина морської республіки"
  pis_maritimes_legacy_desc: "Протягом сотень років Піза була однією з наймогутніших країн у Середземномор'ї та контролювала значну частину торгівлі в регіоні. З тих пір її вплив помітно ослаб, проте місцеві жителі, як і раніше, пам'ятають своє велике минуле."
  pis_the_university_of_pisa: "Пізанський університет"
  pis_the_university_of_pisa_desc: "Пізанський університет — один із найстаріших вищих навчальних закладів у Європі. Там не тільки навчають студентів, а й проводять дослідження в найрізноманітніших галузях."
  sie_artists: "Сієнська школа живопису"
  sie_artists_desc: "В епоху Відродження італійський живопис по-справжньому розцвів, але серед безлічі різних шкіл особливо виділяється сієнська. Майстри цієї школи роблять особливий акцент на витонченості та духовності, а тому значна частина їхніх робіт присвячена релігійним сюжетам. Можливо, зараз художники інших шкіл користуються більшою популярністю, проте з часом сієнський живопис напевно отримає те визнання, на яке заслуговує."
  sie_studium_senese: "Studium Senese"
  sie_studium_senese_desc: "Сієнський університет є першим в Італії вищим навчальним закладом, побудованим за рахунок країни. Тут наші громадяни можуть отримати якісну освіту, щоб надалі вірно служити на благо країни."
  sie_council_priori: "Рада пріорів"
  sie_council_priori_desc: "Ні республіканська, ні монархічна форми правління не привели Сієну до процвітання, а лише породили корупцію та зміцнили владу аристократів. Прагнучи викорінити ці проблеми, ми вирішили заснувати народну раду. Поки не вирішено, скільки в ній буде представників і як вони обиратимуться, проте створення подібного органу — це перший серйозний крок до децентралізації нашого уряду."
  republican_assembly_advance: "Республіканське зібрання"
  republican_assembly_advance_desc: "$republican_assembly$ — серце нашої республіки. Члени цього найважливішого для країни органу — єдині, хто може правити з позиції чесноти та досконалості."
  kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
  kbo_iron_helmet_musketeers_desc: "Тактика ведення бойових дій постійно вдосконалюється, це важливо робити і нам. Якщо перейняти іноземні уявлення про побудови, лінії вогню та методи використання пороху, перемога обов'язково буде за нами!"
  kbo_fixed_military_camps: "Постійні військові табори"
  kbo_fixed_military_camps_desc: "Створивши в країні мережу військових таборів, ми зменшимо втрати від виснаження серед солдатів, а також прискоримо прибуття підкріплення."
  kbo_permanent_sieges: "Канемська облогова тактика"
  kbo_permanent_sieges_desc: "Наше військо знайоме з мистецтвом спорудження складних машин, здатних зносити ворожі стіни. Однак рухома артилерія, здатна вести вогонь по обложених цілими днями безперервно, — ще грізніша зброя. Завдяки їй нас чекає перемога!"
  kbo_council_clan_heads: "Рада глав кланів"
  kbo_council_clan_heads_desc: "Доручивши питання управління місцевим главам кланів, ми дещо послабимо центральну владу. Однак радники наполягають, що це принесе нам винятково користь."
  meissen_lion: "Мейсенський лев"
  meissen_lion_desc: "Мейсенський лев (Markmeißnische Löwe) — особливий геральдичний символ влади династії Веттінів. На золотому полі зображений чорний лев, що дивиться вліво, закутий у обладунки та висуває червоний язик. Вигляд лева може змінюватися, але знає його кожен: мейсенський лев зустрічається на надгробках, вимпелах, шоломах, монетах та печатях. Він символізує приналежність міста Мейсена до Мейсенської марки, а тому лева можна часто побачити ще й на гербах різних міст та громад. Деякі вважають, що мейсенський лев — це перефарбоване зображення тюринзького лева."
  a_mining_heritage: "Шахтарське надбання"
  a_mining_heritage_desc: "Протягом багатьох століть головним чинником, що визначав рельєф, економіку та навіть культуру цього регіону, була шахтарська справа. Відкриті тут наприкінці XII століття величезні поклади срібла ваблять до Рудних гір шахтарів та купців із найрізноманітніших країн, завдяки чому наша країна стійко розвивається."
  meissner_groschen: "Майсенський грош"
  meissner_groschen_desc: "Майсенський грош стане регіональною валютою нашої країни. Цю монету ми почали карбувати за зразком празького гроша, який поступово відійде в минуле. Новий, більший грош знаменує початок нової сторінки в історії монетної справи нашої країни. Крім того, керувати надходженнями такої валюти буде помітно простіше."
  a_resilient_soul: "Незламний дух"
  a_resilient_soul_desc: "Наш народ воістину витривалий. Кожен із нас — втілення непохитної стійкості перед обличчям труднощів. Усі негаразди ми приймаємо незмінно твердо, знаючи, що наша сила — в єдності та народних цінностях. Саме завдяки цим якостям ми рухаємося вперед і долаємо будь-які перешкоди, стаючи тільки сильнішими та рішучішими."
  saxon_court: "Саксонський двір"
  saxon_court_desc: "Саксонський двір — один зі стовпів державності курфюрства Саксонія нарівні з його цивільним та військовим станами. Чиновники на місцях у всьому керуються постановами двору, що складається з аристократів та простолюдинів на службі у правлячої родини, — таким чином вони роблять внесок в управління курфюрством. Зараз у кожного дорослого члена правлячої родини є власний двір, проте ми створимо в столиці один великий постійний двір, куди прагнутимуть найкращі уми країни."
  a_tolerant_society: "Терпиме суспільство"
  a_tolerant_society_desc: "Поглянувши на інші землі, роздирані ворожнечею, ми твердо вирішили, що не пустимо цю чуму на поріг. У що б не вірили наші піддані, головним для них (і для всієї країни) має бути почуття терпимості та братерства — тільки так можна досягти мирного співіснування. Прагнення до єдиного ідеалу додасть нам сил, щоб створити таку країну, де головними чеснотами стануть повага та розуміння."
  furstenschule: "Фюрстеншуле"
  furstenschule_desc: "Реформація поступово набирає ходу. Управління церквою переходить у владу країни, яка негайно стикається з проблемою освіти. Раніше цим займалася церква, тепер же, щоб нові університети не простоювали без діла, в Саксонії з'явиться три нових князівських училища. Розташовані вони будуть у будівлях, відібраних у священнослужителів. Завідувати ними будуть освітні ради в Пфорті, Гріммі та Майсені. До їхніх обов'язків увійде нагляд за училищами та підтримання їх у пристойному стані. Таким чином країна має намір виховати майбутніх правителів Саксонії, з дитинства закладаючи в них необхідні знання та забезпечуючи інтелектуальний розвиток."
  bonded_by_loyalty: "Узи відданості"
  bonded_by_loyalty_desc: "Наші доблесні війська ніколи не здригнуться — їм невідоме слово «поразка». Вони готові відважно кидатися в бій в ім'я нашого народу або наших союзників і захищати їх до останньої краплі крові. Ми віддані одній меті, а тому будемо невблаганно рухатися вперед, поки не прозвучить бажане слово «перемога»."
  meissner_porcelain: "Майсенська порцеляна"
  meissner_porcelain_desc: "Саксонія — перший у Європі виробник порцеляни. Завдяки йому Веттінський двір покриє себе багатством і славою."
  saxon_baroque: "Саксонське бароко"
  saxon_baroque_desc: "Сьогодні ніде не знайти вишуканіших світських манер, ніж ті, що притаманні жителям Дрездена та Лейпцига, особливо чиновникам та поміщикам. Величні будівлі, такі як Дрезднер Гоф, підкреслюють архітектурну велич Саксонії, а в залах Лейпцига — міста найвищої культури — звучить музика Йоганна Себастьяна Баха. Культурна своєрідність регіону, починаючи з народного промислу Рудних гір і закінчуючи місцевою випічкою — дрезденськими штоленами, просто неповторна."
  retablissement: "Rétablissement"
  retablissement_desc: "Відгриміли нещадні війни. У Саксонії настає нове століття — епоха #italic Rétablissement#! (відновлення). Ми повстанемо з попелу, немов птах фенікс, відродимо зруйновану економіку та візьмемо курс на процвітання. Мудрий підхід до державних реформ та розумні витрати перетворять нашу країну на центр усієї німецької торгівлі. Приділивши всю увагу наших талановитих діячів економічному зростанню, ми власноруч напишемо нову сторінку історії Німеччини, а заодно — визначимо долю Саксонії на роки вперед."
  saxon_industrialization: "Індустріалізація Саксонії"
  saxon_industrialization_desc: "Індустріалізація в Саксонії почалася відносно рано — порівняно з іншими регіонами тут уже є добре розвинена промислова галузь. Завдяки системі мануфактур, що виробляють товари переважно на експорт, Саксонія сьогодні відіграє провідну роль у процесі індустріалізації Німеччини. Поява умов для дрібніших комерційних відносин та торгівлі стане найважливішим чинником для економічного розвитку регіону та зміцнення зв'язків з іншими європейськими ринками."
  land_of_many_religions: "Земля багатьох релігій"
  land_of_many_religions_desc: "У наших володіннях мирно співіснують представники різних релігій. Це різноманіття відображено в наших законах та звичаях. Разом ми сильніші!"
  ukrainian_farmlands: "Український чорнозем"
  ukrainian_farmlands_desc: "Український регіон, назва якого означає «пограниччя», розкинувся вздовж південних рубежів нашої країни. Він знаменитий своїми родючими ґрунтами. Вирощуючи на них пшеницю, місцеві селяни не тільки заповнюють наші власні комори, а й забезпечують купців з усієї Європи."
  migrant_opportunities: "Можливості міграції"
  migrant_opportunities_desc: "До наших міст і сіл час від часу приходять переселенці з чужих земель, ваблені жагою багатства та кращого життя. Перебираючись до нас заради власної вигоди, вони зрештою приносять користь і нашій країні."
  two_realms: "Два світи"
  two_realms_desc: "На безкрайніх просторах нашої країни мирно співіснують дві різні нації. Жителі півночі є носіями наших національних традицій та звичаїв, а ось на півдні та сході проживають народи, культура яких певною мірою відрізняється. Таке розмаїття лише зміцнює наші геополітичні позиції."
  chacery_slavonic: "Державна мова"
  chacery_slavonic_desc: "Щоб об'єднати свої обширні володіння, нам потрібна єдина мова та багато грамотних священників, які будуть її поширювати. Розробка мовних норм для державного діловодства є не тільки питанням гордості та престижу, а й фундаментом для створення власного уряду, незалежного від східних сусідів у лінгвістичному та культурному плані."
  supremus_dux_lithuaniae: "Великий князь Литовський"
  supremus_dux_lithuaniae_desc: "Для захисту від польської та московської агресії нам потрібна не тільки військова сила, а й дипломатичний вплив! Титул #italic Великого князя Литовського#! додасть легітимності нашому правителю, захистивши його від зовнішніх загроз та можливих посягань власної аристократії."
  ties_with_the_holy_see: "Зв'язки зі Святим престолом"
  ties_with_the_holy_see_desc: "Після багаторічних переговорів з Його Святістю ми — з благословення наших польських сусідів і самого папи — прийняли католицтво. Процес прийняття нової віри був незвичайним і вельми неспокійним, але тепер ми здобули духовну ідентичність, ставши щитом католицького світу проти язичників та єретиків, що оточують наші кордони."
  patriarchate_of_lithuania: "Литовська патріархія"
  patriarchate_of_lithuania_desc: "Відмова від ромуви — віри, переданої нам предками, — стала потрясінням для всього литовського народу. Заради свого майбутнього ми обрали шлях православ'я, але, щоб інші країни не втручалися в наші справи через своїх патріархів, наша церква повинна бути автокефальною."
  columns_of_gediminids: "Стовпи Гедиміна"
  columns_of_gediminids_desc: "Герб, яким прикрашені наші горді знамена, є спадщиною Гедиміновичів — однієї з найславетніших династій нашої країни. У найважчі часи її представники, виявляючи мудрість та обачність, вели наш народ до процвітання. Тепер стовпи Гедиміна символізують міцний фундамент нашої країни та наполегливу працю її жителів."
  warlord_dukes: "Князі-воєначальники"
  warlord_dukes_desc: "За два століття запеклої війни литовські князі-воєначальники змогли перетворити хиткий союз племен на грізну країну, дати серйозну відсіч католицьким лицарським орденам і завоювати обширні території на сході, надихнувши тим самим наших полководців."
  auksine_laisve: "Auksinė Laisvė"
  auksine_laisve_desc: "Auksinė Laisvė (лит. «Золота вольність») — звід законів і привілеїв, що підносить знать над іншими станами. Нерідко її влада навіть перевершувала вплив монарха та парламенту. Ця система, запозичена литовцями з Польщі, покликана забезпечити вірність аристократів короні — за умови, що монарх не спробує змінити своєму слову, скасувавши Золоту вольність."
  magdeburg_laws: "Магдебурзьке право"
  magdeburg_laws_desc: "Одним із наслідків західного ухилу Литви стало впровадження в багатьох областях країни німецьких міських законів — так, урбанізація проходить за принципами Магдебурзького права, перекроєного під місцеві потреби. Йому підпорядковуються різні економічні та політичні аспекти цього процесу, такі як містобудування, торгівля та збір податків."
  magnate_estates: "Володіння магнатів"
  magnate_estates_desc: "Литовським магнатам належать великі маєтки і навіть особисті війська — за це їх прозвали «маленькими королями». Щоб відстояти цілісність своїх володінь і заодно отримати з них максимальний прибуток, магнати звертаються до прикладу стародавніх римлян, по суті відроджуючи латифундії."
  lithuanian_hussars: "Литовські гусари"
  lithuanian_hussars_desc: "Крилаті гусари — не тільки польська, а й литовська важка кавалерія, що з'явилася в обох країнах в результаті реформ Стефана Баторія, короля польського та великого князя литовського. На полях битв Східної Європи їм понад століття супроводжуватимуть перемоги."
  statutes_of_lithuania: "Статути Великого князівства Литовського"
  statutes_of_lithuania_desc: "Статути Великого князівства Литовського — це звід законів, що об’єднує всі правові принципи країни. Закріплені в них суворі покарання та навіть смертна кара відповідають сучасним західним уложенням про покарання. Статути свідчать, що кожен злочин тягне за собою покарання незалежно від стану злочинця, проте насправді закон набагато суворіше ставиться до простих селян. На основі цих статутів пізніше буде складено руське Соборне уложення."
  lithuanian_renaissance: "Литовське Відродження"
  lithuanian_renaissance_desc: "Період з кінця XV до початку XVI ст. вважається литовською епохою Відродження. Основу для неї заклали ідеї Реформації, а також італійський вплив. Розквіт настав у багатьох сферах: в освіті, мистецтві, архітектурі, літературі… У цей же час створюється письмова форма литовської мови та перші твори литовських письменників."
  bavarian_legitimacy: "Титул баварського герцога"
  bavarian_legitimacy_desc: "Сам імператор пожалував нам титул герцога Баварії. Ставши справжніми захисниками цієї країни, ми усунемо всі сумніви в законності володіння герцогськими привілеями."
  bavarian_imperial_knights: "Баварські імперські лицарі"
  bavarian_imperial_knights_desc: "Наше шляхетне лицарство гідно проявило себе на службі Священної Римської Імперії. Щоб нашому князівству і надалі нічого не загрожувало, цей рід військ слід розвивати."
  exploit_the_alpine_trade: "Торгові вузли Баварії"
  exploit_the_alpine_trade_desc: "Наші землі часто відвідують купці, що торгують з багатими південними сусідами сіллю, сріблом та худобою. Не наживатися на них може тільки дурень. Прокладені цими купцями маршрути повинні збагачувати наші міста."
  bavarian_brewing_expertise: "Вправні пивовари"
  bavarian_brewing_expertise_desc: "У наших землях рясно росте все необхідне для виробництва пива, чим і користується місцеве населення. Якщо надати численним маленьким пивоварням гідну підтримку, їхні справи підуть на лад."
  bavarian_culture_buildings: "Баварські культурні установи"
  bavarian_culture_buildings_desc: "Наша батьківщина розташувалася прямо біля підніжжя прекрасних Альпійських гір, які незмінно ваблять до себе творців з усієї Європи. Якщо ми побудуємо тут культурні установи та надамо їм всю необхідну допомогу, наш двір стане справжнім осередком культури, а ми займемо належне нам по праву місце серед найвпливовіших європейських країн."
  bavarian_stem_duchy: "Мрії про об'єднання"
  bavarian_stem_duchy_desc: "Колись над усіма нами майорів прапор королівства Баварія — гордості баварського народу та його багатої культури. Нам слід постаратися знову створити настільки ж сильну країну, щоб баварці знайшли батьківщину."
  bavarian_zelousness: "Єдина віра для баварців"
  bavarian_zelousness_desc: "Віра баварського народу повинна бути єдиною та неподільною. Ми не потерпимо єресі."
  bavarian_hofkriegsrat: "Баварський гофкрігсрат"
  bavarian_hofkriegsrat_desc: "Рада, з якою наш правитель буде радитися виключно під час війни, — важливий орган, який допоможе підвищити боєздатність баварських військ."
  bavarian_flexible_diplomats: "Прагматична дипломатія"
  bavarian_flexible_diplomats_desc: "Неважливо, перед ким ми тримаємо відповідь — перед сюзереном чи країною, яка може стати нам союзницею, — наші дипломати повинні бути готові до всього. Успіх нас чекає лише в тому випадку, якщо ми будемо ставити інтереси Баварії понад усе."
  foundation_of_bavarian_army: "Військо для Баварії"
  foundation_of_bavarian_army_desc: "Втілити всі задуми нам допоможе тільки одне: могутнє регулярне військо. Якщо приділити їй достатньо уваги, ми зможемо наростити чисельність військ, не спустошуючи при цьому скарбницю."
  bavarian_coinage: "Баварська монета"
  bavarian_coinage_desc: "Країні потрібен новий монетний стандарт: час представити баварському народу єдину валюту. Якщо заснувати в столиці державний монетний двір, ця валюта буде підконтрольна нам цілком."
  bavarian_purity_law: "Баварський закон про чистоту пива"
  bavarian_purity_law_desc: "Наше пиво вже кілька століть славиться своєю якістю, проте кілька століть — це мало: його добре ім'я має бути вічним. У минулому деякі правителі вже намагалися запровадити державні стандарти виготовлення цього ароматного напою. Ці стандарти можна покласти в основу знака якості, яким нагороджуватимуться місцеві пивоварні."
  hsa_holpfennige: "Хольпфенніг"
  hsa_holpfennige_desc: "#italic Хольпфенніг#! — це брактеатна монета, яку карбували в містах $LUB$ та $HAM$. Вона була впроваджена з метою боротьби з підробками, що набули широкого поширення в епоху, коли вміст срібла в одній і тій же монеті від різних монетних дворів міг сильно відрізнятися. Хольпфенніг допоможе нам вести торгівлю, а заодно прокладе нашим купцям дорогу на іноземні ринки."
  hsa_the_cog: "$n_hanseatic_cog$"
  hsa_the_cog_desc: "$n_hanseatic_cog_desc$"
  hsa_hanseatic_ties: "Зв'язки з Ганзою"
  hsa_hanseatic_ties_desc: "Містам і купецьким гільдіям, що входять до нашої ліги, немає числа, і кожен веде свою гру. Щоб наше благополуччя процвітало, а кордони розширювалися, слід почати приділяти більше уваги дипломатії."
  hsa_seal_of_the_hansa: "Ганзейська печатка"
  hsa_seal_of_the_hansa_desc: "Про заможність наших купців знає вся $europe$ — і $london$, і $novgorod$. Жоден інший торговий флот, що борознить моря та океани, не зрівняється з нашим; наш союз охоплює десятки міст, де гроші течуть рікою, а товари постійно переходять з рук в руки."
  hsa_hanseatic_shipwrights: "Ганзейські кораблебудівники"
  hsa_hanseatic_shipwrights_desc: "Коли $europe$ знову охоплена вогнем війни, місцеві правителі, яким стало тісно у своїх володіннях, звертаються до нас. На наші плечі лягає тягар будівництва великих армад, які допоможуть замовникам здійснити задумане. Ніхто у світі не вміє будувати кораблі краще за нас: ми володіємо багатовіковими знаннями, а наша деревина — найкраща на континенті!"
  hsa_draft_merchant_privileges: "Надання привілеїв купцям"
  hsa_draft_merchant_privileges_desc: "Купці, що носять із собою нашу печатку, вкрай багаті та користуються неймовірною прихильністю. Якщо ми надамо їм ще більше привілеїв на закордонних та місцевих ринках, казні це піде тільки на користь."
  hsa_mastery_of_the_sea: "Панування над морем"
  hsa_mastery_of_the_sea_desc: "Своїм багатством наша країна завдячує славним традиціям мореплавства. Але заробляти на торгівлі по-справжньому ми почнемо, лише коли зможемо повністю підкорити море і змусити його себе поважати…"
  hsa_exchange_of_ideas: "Обмін ідеями"
  hsa_exchange_of_ideas_desc: "Мандрівні купці, що ведуть від нашого імені справи за кордоном, принесуть нам не тільки багатство, а й знання, почерпнуті в інших народів!"
  hsa_global_reach: "Всесвітнє охоплення"
  hsa_global_reach_desc: "Поява всесвітньої торгівлі похитнула усталені порядки. Ведення справ із закордонними купцями стало буденністю, і наша казна стрімко поповнюється."
  hsa_hanseatic_treasury: "Ганзейська скарбниця"
  hsa_hanseatic_treasury_desc: "Здорова та міцна економіка — лише одне з багатьох досягнень нашої процвітаючої країни. Наші фінанси численні, а скарбниця наповнена; кожен, хто має з нами справу, вважає нас надійними позикодавцями."
  hsa_regularized_contributions: "Постійні внески"
  hsa_regularized_contributions_desc: "Численні утворення, що входять до Ліги, слід змусити підкоритися: щомісячні та щорічні внески до скарбниці мають бути однакові для всіх."
  hsa_reform_the_hanstag: "Реформування ганзетагу"
  hsa_reform_the_hanstag_desc: "У нинішній смутний час, коли все щохвилини змінюється, устрій наших з'їздів потрібно змінити так, щоб вони могли справлятися з труднощами сучасної епохи."
  hsa_concept_of_mercantilism: "Меркантилізм"
  hsa_concept_of_mercantilism_desc: "Протягом останніх кількох століть ми без упину вбудовувалися у світову торгівлю. Сьогодні ж наші купці відчайдушно потребують захисту, інакше наша країна стане жертвою роздробленості та зовнішньої конкуренції."
  the_hansa_bank: "Ганзейський банк"
  the_hansa_bank_desc: "Нова система вкладів дозволить нам заснувати банк для всіх учасників союзу. Акредитив такого банку, що існує завдяки ресурсам Ліги, прийматиметься нарівні з грошима. Завдяки цьому (та іншим фінансовим інструментам) наші купці отримають перевагу над закордонними конкурентами."
  pal_palatine_lion: "Пфальцський лев"
  pal_palatine_lion_desc: "Пфальцський лев, що вперше з'явився на гербі династії Віттельсбахів, — головний символ нашої легітимності. Цей звір із червоною короною на голові втілює наше високе становище: ми — імперський вікарій та великий стольник Священної Римської Імперії. Доки він красується на нашому гербі, ніхто не наважиться піддавати сумніву наше право на владу."
  pal_castles_on_rhine: "Замки на Рейні"
  pal_castles_on_rhine_desc: "Якщо звести вздовж річки Рейн кілька замків, розташувавши їх у стратегічно вигідних позиціях, ми зможемо контролювати як саму річку, так і прохід по ній торгових суден."
  pal_cultivate_vineyards: "Рейнські виноградники та сади"
  pal_cultivate_vineyards_desc: "Територія нашої країни невелика, проте на сонячних берегах Рейну чудово вмістяться виноградники та фруктові сади. Якщо докласти деяких зусиль, тут навіть можна буде займатися виноробством."
  pal_protection_of_exclaves: "Місцеві укріплення"
  pal_protection_of_exclaves_desc: "Наші землі розділені та розпорошені, через що вони постійно перебувають під загрозою нападу сусідніх країн. Нам варто звести на ізольованих територіях низку укріплених аванпостів, щоб виграти трохи часу та зібрати військо, здатне дати відсіч загарбникам у разі вторгнення."
  pal_fractured_territory: "Об'єднання територій"
  pal_fractured_territory_desc: "Наші управителі досить вміло поводяться з розрізненими територіями, щоб ті залишалися у складі країни. З їхньою допомогою ми створимо потужний бюрократичний апарат, здатний справлятися навіть із найскладнішими завданнями."
  pal_a_just_ruler: "Спокійний та стриманий правитель"
  pal_a_just_ruler_desc: "Кровопролиття породжує виключно кровопролиття. Нам потрібно проявити милосердя та примиритися з ворогами, щоб на наших землях нарешті запанував спокій."
  pal_heaven_of_tolerance: "Пфальцська терпимість"
  pal_heaven_of_tolerance_desc: "У містах і селах нашої країни повинні бути раді кожному християнину. Хтось не терпить релігійні меншини, проте ми діятимемо навпаки, і тоді в наші краї потечуть потоки мігрантів."
  pal_mildness_to_the_commoners: "Помилування селян"
  pal_mildness_to_the_commoners_desc: "Будь-який селянський бунт проти наших аристократів шкодить нашій владі. Однак не слід карати бунтівників надмірно: якщо кара за повстання буде не надто суворою, ми здобудемо більше прихильників."
  pal_humanist_court: "Гуманістична освіта"
  pal_humanist_court_desc: "Щоб наші правителі могли грамотно управляти країною, їм необхідно дати гідну освіту, засновану на ідеалах гуманізму. Для цього нам варто залучити до двору вчителів з числа видатних гуманістів, а також організувати роботу двору відповідно до гуманістичних принципів."
  pal_heidelberg_catechism: "Гейдельберзький катехізис"
  pal_heidelberg_catechism_desc: "Реформація змушує народ все частіше задаватися питаннями про природу нашої віри. Настав час скласти докладний катехізис, у якому будь-хто охочий зможе знайти відповіді."
  pal_bilbiotheca_palatina: "Охорона #italic Палатинської бібліотеки#!"
  pal_bilbiotheca_palatina_desc: "#italic Палатинська бібліотека#! — одне з найважливіших надбань нашої країни: тут зберігаються богословські писання, складені представниками різних християнських конфесій. Збереження цих знань, що мають велику культурну цінність, має стати справою першочергової важливості: вони можуть сильно допомогти нам у подальшому."
  palatinate_romanticism: "Підтримка романтизму"
  palatinate_romanticism_desc: "Численні представники романтизму обрали своєю обителлю околиці Гейдельберга. Нам слід підтримати як їх, так і інших творців, що прославляють країну."
  amazigh_slave_raids: "Амазигські набіги за рабами"
  amazigh_slave_raids_desc: "Жителі нашого узбережжя здатні забезпечити постійний приплив невільників і полонених з усієї Європи. Їхня праця відіграє ключову роль у зміцненні величі та добробуту нашої країни."
  zenata_roots: "Зенатські корені"
  zenata_roots_desc: "Наш народ походить від племені зената, яке славилося своїми великими овечими стадами та скромним, але життєво важливим виробництвом вовни."
  mor_marabouts: "Суфійські мурабіти"
  mor_marabouts_desc: "У Марокко оселилося одразу кілька груп мурабітів суфійського штибу. Нам слід виявити гостинність і прислухатися до їхнього вчення, адже ці люди — святі."
  trans_saharan_trade: "Торгівля через Сахару"
  trans_saharan_trade_desc: "Через велику Сахару вже багато століть ходять каравани. З півночі Африки вони везуть сіль та інші товари, а з царств Чорної Африки — рабів і золото. Ці вигідні маршрути допоможуть нам примножити багатство країни."
  first_fleet_of_the_med: "Перший флот Середземномор'я"
  first_fleet_of_the_med_desc: "Колись Альмохадський халіфат пишався своїм флотом, який був одним із найсильніших на всьому Середземному морі. Спираючись на його традиції та досвід, наш народ зможе повернути колишню славу великої морської країни."
  slave_soldiers: "Раби-солдати"
  slave_soldiers_desc: "Дисципліновані раби-солдати з числа жителів наших земель стануть основою сильного та надійного регулярного війська."
  desert_power: "Сила пустелі"
  desert_power_desc: "Численні селяни та кочівники, що населяють наші володіння, складають основу нижчих класів нашого суспільства. Попри зовнішню бідність, вони мають величезний вплив, контролюючи торгові шляхи між нашими містами. Добившись їхньої вірності, ми зможемо утвердити своє панування над пустелею."
  atlantic_trade_routes: "Атлантичні торгові маршрути"
  atlantic_trade_routes_desc: "Нові морські шляхи, відкриті європейцями, дали нам доступ до товарів і золота як Нового Світу, так і Далекого Сходу."
  foreign_politics: "Зовнішня політика"
  foreign_politics_desc: "Щоб винищити ворогів, слід шукати дипломатичні зв'язки та співпрацювати з потенційними союзниками."
  saharan_gold_trade: "Золото Сахари"
  saharan_gold_trade_desc: "Найчистіше золото, що видобувається у нас, дозволить нашій країні поширити вплив уздовж торгових маршрутів, які пов'язують її з іноземними портами."
  jaysh_armies_advance: "Джейш аль-Іслам"
  jaysh_armies_advance_desc: "Останні зміни у військовій справі вимагають створення нового війська, що складається з представників місцевих племен і вірне тільки нашій країні. З його допомогою ми зможемо утримати контроль над своїми великими володіннями."
  black_guard: "$a_black_guard$"
  black_guard_desc: "$a_black_guard_desc$"
  shurfa_status: "Титул шарифа"
  shurfa_status_desc: "Лише деякі в ісламському світі мають законне право називатися нащадками родини Великого Пророка. Ці люди завжди користуються величезною повагою та впливом."
  maghrebi_administration: "Магрибська адміністрація"
  maghrebi_administration_desc: "Багато місцевих племен, звиклі до незалежного життя посеред суворої природи, не бажають підкорятися центральній владі. Щоб наша країна була єдиною, кожне плем'я, що живе на її території, повинно знати своїх істинних господарів."
  barid: "Барид"
  barid_desc: "Це поштова служба, що з'єднує між собою найвіддаленіші куточки нашої імперії. Вона відповідає за зв'язок між столицею та місцевими правителями."
  karimi_merchants: "Купці-карімі"
  karimi_merchants_desc: "Це впливові та багаті купці, що торгують переважно спеціями. Їхні кораблі возять екзотичний товар з Адена, Індії та інших, ще дальших країн!"
  mamluk_soldiers: "$a_mamluk_unit_traditions$"
  mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"
  royal_mamluks: "Королівські мамлюки"
  royal_mamluks_desc: "Королівські мамлюки — особиста охорона султана, що складається з ретельно відібраних та навчених воїнів. Вважається елітою війська мамлюків. Королівські мамлюки безмежно вірні султану, володіють видатними бойовими навичками та віддано служать своїй справі."
  red_sea_trade: "Торгівля на Червоному морі"
  red_sea_trade_desc: "Оскільки торгівля спеціями, що перевозяться Червоним морем, — основне джерело наших доходів, її слід повністю контролювати. Якщо ми пригрозимо спалити непідвладні нам порти, що приймають торговців спеціями, левова частка прибутку дістанеться нам."
  mamluk_halqah: "$a_halqah_unit$"
  mamluk_halqah_desc: "$a_halqah_unit_desc$"
  reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
  reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"
  kashif: "Кашиф"
  kashif_desc: "Простори нашого султанату великі, а тому потребують вмілого керівництва. Надавши жителям, особливо обізнаним у державних та інших справах, посади місцевих правителів, ми вчинимо мудро. Згодом шалька терезів схилиться на нашу сторону."
  port_customs: "Митні збори в портах"
  port_customs_desc: "Якщо ми оголосимо, що наші порти відтепер вважаються торговими районами для прийому товарів, що надходять, комерційна значущість нашої території безперечно зросте на шкоду сусідам та ворогам."
  masters_of_the_nile: "Повелителі Нілу"
  masters_of_the_nile_desc: "Річка Ніл — це головна артерія, що живить наш султанат. Її води зрошують родючу землю, даруючи нам процвітання та багатство."
  indian_networks: "Зв'язки в Індії"
  indian_networks_desc: "Наші купці торгують товарами з Александрії, з далеких берегів Адена і навіть з Індії. Завдяки великим зв'язкам та добре налагодженим справам наша країна розбагатіла і сьогодні знаходиться попереду інших у галузі морської торгівлі."
  study_foreign_gunpowder_techniques: "Чужоземний порох"
  study_foreign_gunpowder_techniques_desc: "Великі імперії Європи та Сходу досягли неймовірних успіхів у галузі застосування пороху, зокрема у військовій справі. Якщо ми вивчимо все, чого навчилися вони, і внесемо власні напрацювання, наші війська стануть лише сильнішими."
  secure_mediterranean_ports: "Захист середземноморських портів"
  secure_mediterranean_ports_desc: "Наші порти в Середземному морі по праву вважаються одними з найбагатших у всьому регіоні. До Александрії та Каїра з усього світу прибувають торговці спеціями, шовком та дорогоцінним камінням. Тим розумніше буде побудувати потужний торговий флот, здатний як принести нам ще більше багатства, так і захистити морські шляхи."
  bohemian_imperial_standing: "Становище Богемії у Священній Римській Імперії"
  bohemian_imperial_standing_desc: "Наша країна відзначається впливовістю, величністю та владністю. Мало хто з членів імперії може похвалитися такою ж «м'якою силою» — нам її забезпечують дипломати та зв'язки із союзниками."
  bohemian_crystal: "Богемський кришталь"
  bohemian_crystal_desc: "Інших склодувів, здатних змагатися з нашими у справі виробництва скла та кришталю найвищої якості та неймовірної прозорості, можна перелічити на пальцях."
  students_of_foreign_courts: "Учні при іноземних дворах"
  students_of_foreign_courts_desc: "Члени наших королівських родів звикли подорожувати за кордон. Далеко від дому вони стають учнями при дворах видатних країн, де ретельно вивчають мистецтво управління країною."
  urbanization_decrees: "Укази про урбанізацію"
  urbanization_decrees_desc: "$prague$ — старе місто, йому необхідно надати сучасного вигляду. Для цього ми виділимо посібники іменитим містянам і накажемо їм вести справи насамперед зі столицею. Їхнім завданням буде залучення іноземців, які прагнуть досягти нових висот у нашому прекрасному місті. Така можливість має бути їм забезпечена."
  seat_of_metropolitan_bishop: "Кафедра митрополита"
  seat_of_metropolitan_bishop_desc: "Руському народу потрібен наставник, який навчить його правильного віросповідання. Наші стосунки з церквою старі та міцні; чим міцнішими вони будуть, тим краще всім. Якщо перенести кафедру митрополита до Москви, зв'язок між руським православ'ям та країною тільки посилиться."
  pomestnoe_voisko: "Помісне військо"
  pomestnoe_voisko_desc: "Роздавши відібрану землю знатним вершникам, ми створимо таким чином новий різновид військ, готовий захищати рідне князівство."
  strength_of_the_boyars: "Боярська влада"
  strength_of_the_boyars_desc: "Бояри — це основа руської державності, проте їхню владу, хоч би якою корисною вона не була, потрібно тримати в шорах. Нам доведеться стежити за тим, щоб бояри могли засідати в думі, і одночасно підтримувати залежність бояр від нас."
  zasechnaya_cherta: "Засічна межа"
  zasechnaya_cherta_desc: "Щоб відбиватися від татарських набігів, наші предки звели цілу низку оборонних укріплень. У міру розростання нашої країни слід прокладати й нові засічні межі, щоб руський народ міг спати спокійно, не побоюючись підступних нальотів."
  russian_artillery_yard: "Руський гарматний двір"
  russian_artillery_yard_desc: "Сьогодні перемагає військо, здатне виставити на полі бою більше гармат. Так буде й надалі, тому треба подбати про оснащення наших військ достатньою кількістю гармат та снарядів. Для цього в серці країни ми спорудимо найсучасніший гарматний двір."
  life_long_conscription: "Довічна служба"
  life_long_conscription_desc: "Щоб наше військо могло й далі розростатися, терміни військової служби слід зробити довічними. Таким чином ті, хто інакше животів би на скромній посаді, зможуть досягти успіхів, а ми отримаємо постійний приплив воїнів, життєво необхідний зростаючій країні."
  the_mestnichestvo_advance: "$the_mestnichestvo$"
  the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"
  table_of_ranks: "Табель про ранги"
  table_of_ranks_desc: "Скасування місцевості стало першим кроком на шляху до укладу, де країна визнає заслуги людини, а не її походження. Наступним кроком стала табель про ранги — тепер військовослужбовці можуть домогтися підвищення, якщо гідно проявлять себе в нижчих чинах."
  voivode_advance: "Воєвода"
  voivode_advance_desc: "Воєвода — це воєначальник, який підтримує порядок, захищає довірений йому край від ворогів, а іноді навіть веде військо в похід. Оскільки доносити послання в наш час важко, посада воєводи як управителя вельми корисна країні."
  haudenosaunee_tradition: "Спадщина Гайавати"
  haudenosaunee_tradition_desc: "Легендарний Гайавата, якого хауденосауні шанують як великого оратора та вождя, показав народу своїм прикладом, що таке справжній дипломат. Наші ж дипломати вшанують пам'ять Гайавати тим, що підуть його стопами."
  haudenosaunee_heritage: "Люті воїни"
  haudenosaunee_heritage_desc: "Будь-який ворог, який прийме нашу дипломатичну шанобливість за слабкість, зробить страшну помилку. Наші воїни горді та люті, і недооцінювати їх — значить полягти від їхньої зброї."
  tree_of_peace: "Дерево миру"
  tree_of_peace_desc: "Дерево миру колись посадив Великий миротворець. Сьогодні воно слугує символом нашого прагнення до єдності племен, а також — образом вождів."
  kainerekowa: "Каянерекова"
  kainerekowa_desc: "Великий закон миру — щедрий дар Гаявати та Великого миротворця — об'єднав наші п'ять племен, поставивши перед ними єдину мету, а також дав нам звід правил, за якими будується наше життя."
  mourning_wars: "Траурні війни"
  mourning_wars_desc: "Наш народ здавна сповідує звичай приймати захоплених воїнів до лав племені. Однак щоб заміщати вбитих і залишатися сильними, нам слід поповнювати лави воїнів не окремими бранцями, а цілими племенами гауденосауні."
  warriors_unity: "Воїнська єдність"
  warriors_unity_desc: "Наше плем'я не може похвалитися чисельністю, однак у нас є дещо інше — єдність! Наші воїни вважають один одного братами, а тому не кидають один одного в бою. Поки цей звичай зберігається, ми непереможні!"
  haudenosaunee_ambition: "Зразкова конфедерація"
  haudenosaunee_ambition_desc: "Конфедерація гауденосауні — зразок племінного устрою. Усі сусіди дивляться на наших правителів із захопленням."
  three_sisters: "Культури «Три сестри»"
  three_sisters_desc: "На нашій землі рясно зростають найрізноманітніші культури. Вирощуючи кукурудзу, квасолю та гарбуз разом, ми будемо збирати більше врожаю, ніж при роздільній посадці."
  maple_syrup: "Кленовий сироп"
  maple_syrup_desc: "Клен у нашій країні дає дуже багато соку. Достатньо зібрати його та відварити, щоб отримати смачний сироп і цукор."
  stickball_game: "Гра з м'ячем і палицею"
  stickball_game_desc: "Наше плем'я споконвіку зберігає звичай гри з м'ячем і палицею: сотні воїнів, що взяли палиці, виходять на поле, де намагаються загнати м'яч у ворота іншої команди. Ця гра використовується і в ритуалах, і при вирішенні суперечок. Завдяки їй ми не тільки зближуємося, а й залишаємося здоровими та сильними."
  wampum: "Вампум"
  wampum_desc: "Вампум — біло-фіолетові намиста, зроблені з мушель. Призначення їх багатогранне: на вампумах записуються сказання та договори, ними розплачуються при обміні… Такі намиста носить із собою кожен член племені."
  shared_brotherhood: "Всезагальне братерство"
  shared_brotherhood_desc: "Великий закон миру об'єднує наш народ. Попри відмінності в традиціях і звичаях між вихідцями з різних племен, навколо панує атмосфера братерської єдності."
  captives_in_war: "Військовополонені"
  captives_in_war_desc: "Війни ми ведемо для того, щоб захоплювати полонених на заміну нашим загиблим воїнам. Однак не всі з них заслуговують місця в племені — хтось замість цього буде займатися працею."
  haudenosaunee_present_giving: "Подарунки серед гауденосауні"
  haudenosaunee_present_giving_desc: "Наша торгівля виглядає як обмін подарунками. Оскільки кожен член нашого племені ставить інтереси громади вище власних, на будь-який подарунок прийнято відповідати взаємністю."
  pochtecayotl: "Почтекайотль"
  pochtecayotl_desc: "Наші купці мандрують повсюдно, заходячи навіть туди, де місцеві правителі не підкоряються нашій владі. Якщо ж ці купці попутно вивідуватимуть секрети далеких країв, то ми можемо дізнатися багато цікавого…"
  warrior_societies: "Воїнські товариства"
  warrior_societies_desc: "Наше суспільство дуже рухливе: будь-який простолюдин (такі називаються #italic масеуальтин#!) може увійти до числа #italic піпільтин#! — аристократів, якщо проявить себе на військовій службі. Тоді він отримає особливу почесну форму — #italic тлауіцтлі#!. Цим ми вигідно відрізняємося від сусідських суспільств."
  chinampas: "Чинампи"
  chinampas_desc: "Наш народ чудово володіє мистецтвом сільського господарства, зокрема методами терасового землеробства. На неглибоких озерах ми влаштовуємо ріллі — #italic чинампи#!, що дозволяє прогодувати всіх і кожного."
  people_of_war: "Войовничий народ"
  people_of_war_desc: "Війна — природний стан для нашого народу. Захоплення полонених заради принесення їх у жертву, зміцнення впливу, залякування ворогів, розграбування чужих міст — все це нам звично, а тому тяготи воєнного часу ми переносимо краще за інших."
  tlahtocayotl: "Тлатокайотль"
  tlahtocayotl_desc: "У тих містах-країнах, що вже увійшли до складу нашої країни, ми заснуємо систему провінцій — це необхідно для зосередження влади."
  calpixcayotl: "Кальпішкайотль"
  calpixcayotl_desc: "У регіони, які платять нам данину, ми призначимо особливих чиновників-збирачів — #italic кальпішке#!. Вони стежитимуть за тим, щоб данина надходила безперервно. На кожен такий регіон припадатиме по одному #italic кальпішкі#! в самому регіоні і по одному — в столиці."
  reformed_telpochcalli: "Перетворення в тельпочкаллі"
  reformed_telpochcalli_desc: "Поява нових ворогів вимагає вироблення — або запозичення — нової тактики для воїнів. Викладати ці знання ми будемо в так званих #italic тельпочкаллі#!."
  nahuatl_domination: "Панування науа"
  nahuatl_domination_desc: "Очевидно, що культура нашого народу більш розвинена, ніж культура сусідів. Її поступово переймає все більше інших народів. Таким впливом на прилеглі країни обов'язково треба користуватися."
  the_return_of_quetzalcoatl: "Повернення Кетцалькоатля"
  the_return_of_quetzalcoatl_desc: "Спілкування з іншими народами наштовхнуло нас на кілька цікавих думок про наших богів. У пророцтві про #italic Кетцалькоатля#! є крупиця істини, прихована за міфами. #italic Кетцалькоатль#! («пернатий змій») незабаром повернеться. Його пришестя ознаменує настання епохи змін, і на зміну невігластву прийде просвітлення. Він з'єднає духовний і матеріальний світи, відновить порушену рівновагу і возвеличить людський рід."
  brave_as_hummingbird: "Хоробрий, як колібрі"
  brave_as_hummingbird_desc: "Пташці колібрі в нашій міфології відведена особлива роль: вважається, що вона має відношення до бога війни — Уїцилопочтлі. Вона символізує переродження загиблих воїнів, а хоробрість цієї пташки — предмет загальної поваги. Ми зобразимо колібрі на військових знаменах, щоб наші воїни не боялися йти в смертельний бій."
  new_trade_opportunities: "Нові можливості для торгівлі"
  new_trade_opportunities_desc: "Потреби нашого народу підлаштовуються під мінливі умови: для наших купців відкрилися нові ринки. Тепер ми вчимо їх премудростям вилучення прибутку."
  aztec_chargers: "Відвага племені теночка"
  aztec_chargers_desc: "Лють наших воїнів стала широко відома далеко за межами нашої країни. У бою вони, охоплені безумством, люто кидаються на тремтячих від страху ворогів, сіючи смерть."
  chasqui: "Часкі"
  chasqui_desc: "Часкі — посильні нашої країни, відібрані з-поміж найздоровіших і найвитриваліших бігунів. Вони доставляють письмена кіпу, послання, подарунки та інші сповіщення. На їхніх плечах тримається обмін знаннями з іншими країнами, а також уся наша дипломатія."
  military_mita: "Військова міта"
  military_mita_desc: "Словом «міта» в суспільстві інків позначається повинність. Вона поширюється і на суспільну працю, і на службу у військах (усі наші воїни відбувають міту). Кожен айлью зобов'язаний поставити на службу здорових чоловіків, звиклих битися в гірській місцевості."
  warachikuy: "Варачікуй"
  warachikuy_desc: "Варачікуй — священна церемонія, під час якої юнаки проходять випробування на спритність, сміливість і кмітливість. Одночасно з розумом випробовуються і здібності до бігу, стрільби, бою та довгого обходження без сну. Кожен, хто пройде варачікуй з відзнакою, отримує керівну посаду в війську."
  mitma: "Обов'язкова мітма"
  mitma_desc: "Раніше, приступаючи до великих будов, наші правителі суворо дотримувалися стародавніх звичаїв: вони запрошували до столиці кожного дрібного вождя, щедро обдаровували запрошених і влаштовували грандіозні бенкети. Однак що обширнішою стає наша країна, то більше ми розуміємо, що такий підхід веде в глухий кут. Кожен без винятку вождь у наших краях повинен бути зобов'язаний постачати робітників і матеріали для будівництва."
  quipu: "Кіпу"
  quipu_desc: "Кіпу — це вузликове письмо. Кожен вузлик відповідає числу від нуля до дев'яти — з їхньою допомогою можна вести підрахунки або навіть облік майна. Крім того, вузлики можуть виступати як логограми: кожен вузол відповідає певному складу. З'єднавши кілька ниток, можна скласти ціле речення."
  drafted_hatun_runas: "Призов хатунрунів"
  drafted_hatun_runas_desc: "Словом «хатунруна» позначається обиватель — найзвичайніший підданий нашої імперії. Кожен п'ятдесятий хатунруна після досягнення 25 років зобов'язаний сім років відслужити в війську. Завдяки такій системі наше військо обширне та забезпечене вмілими воїнами, більш дисциплінованими, ніж супротивники."
  llama_michis: "Мічі для лам"
  llama_michis_desc: "Лами — вкрай корисні істоти: ми нав'ючуємо на них вантажі, приносимо їх у жертву, обробляємо на м'ясо, зістригаємо з них шерсть, а гній використовуємо як добриво. Щоб їхня чисельність не скорочувалася і навіть зростала, спеціально призначені правителями мічі, тобто пастухи, відповідатимуть за розмноження лам та використання їх у господарстві."
  inc_tambo: "Вдосконалені заїжджі двори тамбо"
  inc_tambo_desc: "Дорожня система — запорука існування нашої імперії. Щоб вести війни та керувати країною було простіше, ми зведемо вздовж головних доріг заїжджі двори — тамбо, де, крім даху над головою, завжди будуть припаси. Дійти від одного тамбо до іншого можна буде за один день."
  adapted_incan_army: "Пристосоване військо інків"
  adapted_incan_army_desc: "На наші землі ступила нога загарбника з далеких, невідомих нам земель. Під загрозою опинилося саме існування нашого народу. Однак військо інків вміє пристосовуватися. Воно оберне зброю ворога проти нього самого, а потім рішуче прожене загарбника."
  pukara_advance: "$pukara_building$"
  pukara_advance_desc: "$pukara_building_desc$"
  terraces_advance: "$terraces$"
  terraces_advance_desc: "$terraces_desc$"
  tambo_advance: "$tambo$"
  tambo_advance_desc: "$tambo_desc$"
  incamisana_advance: "$incamisana$"
  incamisana_advance_desc: "$incamisana_desc$"
  kor_fortresses_of_goguryeo: "Фортеці Когурьо"
  kor_fortresses_of_goguryeo_desc: "Жодне з численних царств, що розташовувалися колись на Корейському півострові, не було таким впливовим, як Когурьо — країна-попередник Корьо. Спадщина Когурьо зберігається і сьогодні: ми досі користуємося замками, побудованими нашими предками, і зводимо кам'яні споруди за їхніми методами."
  kor_korean_artisanry: "Корейські художні промисли"
  kor_korean_artisanry_desc: "Образотворчим мистецтвом наш народ займається вже багато століть, однак тільки після #italic державного об'єднання#! це мистецтво стало по-справжньому процвітати. Сьогодні жителі Корейського півострова по праву пишаються своїми художніми промислами."
  kor_korean_barracks_advance: "$korean_barracks$"
  kor_korean_barracks_advance_desc: "$korean_barracks_desc$"
  kor_court_poetry: "Придворна поезія"
  kor_court_poetry_desc: "Наші аристократи приділяють багато уваги культурному розвитку розуму та духу. Література, така як вірші на веньяні та інші твори писемності, користується при дворі неймовірною популярністю як серед самих придворних, так і серед знатних громадян, небайдужих до писемного слова."
  kor_metal_movable_type: "Металевий рухомий шрифт"
  kor_metal_movable_type_desc: "Рухомий шрифт — стародавній метод друкування, відомий у Китаї протягом кількох століть. Династія Корьо розробила металевий рухомий шрифт, спростивши технічний процес. Тепер друкувати книги можна з неймовірною швидкістю."
  kor_gunpowder_engines: "Порохові машини"
  kor_gunpowder_engines_desc: "Про неймовірну користь пороху наші війська знають ще з початку XII століття. Завдяки ретельному вивченню китайського пороху та технічному таланту Чхве Мусона ми тепер зможемо виробляти порох самостійно."
  kor_hwachas_advance: "$a_hwacha$"
  kor_hwachas_advance_desc: "$a_hwacha_desc$"
  kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
  kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"
  kor_korean_gunnery: "$korean_gunnery$"
  kor_korean_gunnery_desc: "У міру розвитку порохових технологій нам відкриваються нові способи давати відсіч ворогу. Укріплення, наприклад, можна забезпечити гарматами — такий підхід простий і невигадливий, проте наша обороноздатність зросте багатократно."
  kor_hangeul_alphabet: "Хангиль"
  kor_hangeul_alphabet_desc: "Корейська мова в основі своїй настільки відрізняється від китайської, що користуватися китайськими ієрогліфами можуть лише чудово освічені, а тому вкрай нечисленні люди. Впровадження нового алфавіту підвищить грамотність населення: читати та писати зможе кожен."
  kor_grand_code: "Великий звід основ управління країною"
  kor_grand_code_desc: "Щоб не допустити розгулу безвладдя в країні, ми законодавчо закріпимо принципи діяльності органів влади. Цей документ стане першою письмовою конституцією Кореї."
  kor_border_defense_council: "Рада оборони кордонів"
  kor_border_defense_council_desc: "Наші землі постійно піддаються піратським нальотам та набігам з боку північних варварів. З цієї причини було вирішено створити спеціальний орган, який відповідатиме за оборону кордонів та підтримання наших військ у бойовій готовності."
  kor_panokseon_advance: "$n_panokseon$"
  kor_panokseon_advance_desc: "$n_panokseon_desc$"
  kor_korean_cannon: "Корейські гармати"
  kor_korean_cannon_desc: "Порох і гармати — зовсім не диковинка для наших солдатів, проте досконалості немає меж. Ми готові здійснити справжній прорив, сказавши нове слово в галузі корейської артилерії: військо та флот отримають нові гармати меншого калібру, але при цьому міцніші та швидше заряджаються."
  hyanyak_system: "Система хян'як"
  hyanyak_system_desc: "Сільське господарство — основа нашої економіки, тому немає нічого важливішого за грамотне управління селами. Щоб виховати в сільських жителях почуття спільності, ми розробимо систему сільського самоврядування."
  kor_geobukseon: "Кобуксон"
  kor_geobukseon_desc: "Допомогу в життєво важливій справі захисту берегів нам нададуть кобуксони — кораблі-черепахи. Ці важкоозброєні гіганти не дадуть ворогу підібратися до узбережжя."
  kor_hopae_system: "Система хопе"
  kor_hopae_system_desc: "Словом «хопе» позначаються розпізнавальні знаки, які зобов'язаний носити кожен кореєць. На такому знаку вказані ім'я, місце народження, становище в суспільстві та місце проживання. Завдяки хопе ми завжди знатимемо, хто і де живе."
  kor_daedongbeop: "Тедонбоп"
  kor_daedongbeop_desc: "Ми почнемо поступово впроваджувати реформи, які запропонував старший державний радник І Вон-ік, що вдосконалює застарілу податкову систему. Податок, що стягується з домогосподарств, буде замінений єдиним податком на орну землю. Податок на товари буде обмежений певною часткою — це дозволить селянам, що ведуть власні справи, та великим купцям виробляти товари та продавати надлишки. Завдяки цим змінам селяни стануть платити менше податків, країна стане отримувати більше прибутку, а торгівля розквітне."
  natural_seamanship: "Природжені моряки"
  natural_seamanship_desc: "Масштаби рибної ловлі зростають, а з ними і кількість моряків. Наш флот якраз потребує матросів, оскільки хороша команда не менш важлива, ніж хороший корабель."
  call_of_our_forefathers: "Поклик предків"
  call_of_our_forefathers_desc: "Багато років тому наші відважні предки вирушили в плавання до далеких північних берегів, де заснували поселення. У сагах навіть згадують, що хтось із них дістався до нового світу і поселився в місці, яке назвав Вінланд. Настав час і нам вирушити в дорогу слідами попередників."
  pioneer_spirit: "Дух першопрохідців"
  pioneer_spirit_desc: "У давні часи наші хоробрі вирушали у відкрите море, щоб дістатися незвіданих берегів і оселитися там. Настав час нагадати народу про ці славні роки — нехай у нас знову заговорить дух дослідників."
  nor_shipbuilding: "Військове кораблебудування"
  nor_shipbuilding_desc: "Зростаючий рибний промисел призвів до розквіту кораблебудування. Досвідчені корабели нашої країни вже готові побудувати нам новий флот."
  write_new_sagas: "Написання нових саг"
  write_new_sagas_desc: "Гострий розум зберігає\nСаги часу предків,\nЩо співають наші скальди,\nКоріння славне пам'ятаючи.\nНехай і надалі їх пишуть,\nПрославляючи країни."
  expansive_policies: "Експансіоністська політика"
  expansive_policies_desc: "На піщаному ґрунті Бранденбурга мало що росте — ці бідні краї Священна Римська Імперія вважає своєю #italic пісочницею#!. Наші правителі ж вважають, що володіння маркграфства необхідно розширювати, зокрема претендуючи на престоли сусідів на користь Померанії. В результаті наша країна об'єднала в собі кілька культур, немов плавильний котел."
  northern_march: "Північна марка"
  northern_march_desc: "У перші роки існування імперії область, де зараз знаходиться Бранденбург, була заселена слов'янськими племенами. Звідти їх вигнав імператор, який постановив створити на новій території Північну марку і звести там укріплення. З часом Північна марка стала відома як Бранденбург — один з найважливіших регіонів імперії."
  divide_estates: "Розділення станів"
  divide_estates_desc: "Разом усі три стани становлять чималу силу, здатну протистояти владі правителя. Щоб цього не допустити, нам слід постійно стравлювати знать з іншими станами."
  soldiers_fortune: "Солдати удачі"
  soldiers_fortune_desc: "Наші землі малолюдні і з усіх боків оточені ворогами. Термінова потреба в надійній обороні підштовхнула нас до найму іноземних солдатів, готових битися під нашими прапорами."
  iron_tooth: "Залізний зуб"
  iron_tooth_desc: "Зміцнюючи владу двору над землями маркграфства, наш правитель отримав прізвисько #italic Залізний Зуб#! — за схожість зі лютою собакою, що намертво вчепилася в жертву. Епоха нашого правління надовго залишиться в народній пам'яті — навіть найскромніший селянин буде щиро пишатися Бранденбургом."
  kammergericht: "Заснування камерального суду"
  kammergericht_desc: "Щоб упорядкувати управління Бранденбурзькою маркою, ми замінимо місцеве законодавство на римське. Крім того, верховний суд тепер буде розміщуватися не при дворі виборця, який багато подорожує, а в спеціально відведеному місці. Таким чином ми посприяємо справедливості правосуддя, а заодно припинимо вплив місцевих магнатів."
  margrave_council: "Таємна рада виборчої марки"
  margrave_council_desc: "Зростаючий вплив станів загрожує підірвати нашу владу в маркграфстві. Заперечувати користь станів для країни неможливо, однак загроза самим основам нашого правління вимагає створення нової ради, здатної обмежити цілком відчутну владу, притаманну сьогодні представникам станів. Замість того щоб визначати політику маркграфства, вони швидше будуть давати рекомендації. Таким чином стани будуть і далі сприяти розвитку країни, а ми станемо менше турбуватися про їхні потреби."
  religious_toleration: "Віротерпимість"
  religious_toleration_desc: "Державна стабільність — запорука успіху. Поглинання нових територій та виховання в громадянах віротерпимості не тільки допоможе підтримати стабільність, але й зробить нашу країну бажаним притулком для всіх пригноблених на батьківщині."
  army_professionalism: "Військова майстерність"
  army_professionalism_desc: "Ще за часів греко-перських війн стало відомо, що невелике, але дисципліноване та добре підготовлене військо здатне здолати більше, але менш організоване. Наше військо повинна відповідати таким же стандартам."
  soldier_king: "Прусський король-солдат"
  soldier_king_desc: "У більшості країн є військо; Пруссія ж — це військо, у якого є країна. Історія цієї країни налічує чимало монархів, які одночасно були солдатами. Правління кожного з них ознаменовувалося не тільки державними, але й військовими реформами."
  auftragstaktik: "Децентралізація командування"
  auftragstaktik_desc: "Auftragstaktik (дослівно #italic «тактика доручень»#!) — система командування, що передбачає постачання молодших командирів відомостями про бойову обстановку та дорученнями від старших офіцерів і дозволяє самостійні дії. Завдяки децентралізації командування наші батальйони більше довіряють своїм командирам, а отже — успішніше ведуть бойові дії."
  goose_step: "Гусячий крок"
  goose_step_desc: "Гусячий крок — дещо дивний зовні, але дієвий спосіб підтримувати рівняння під час наступу. Подібна дисциплінарна міра забезпечує нашому війську вагому перевагу."
  mounted_people: "Кінники"
  mounted_people_desc: "Наш народ почувається в сідлі, як риба у воді. Коні — невід'ємна частина нашої культури, запорука нашої могутності. Ми пишаємося вмінням розводити цих величних тварин, а в мистецтві стрільби з лука на скаку нас не перевершить жоден інший народ. Ці якості зроблять нас непереможними."
  falconry_mastery: "Мистецтво розведення соколів"
  falconry_mastery_desc: "Соколине полювання міцно вкоренилося в нашій культурі. Ці благородні хижі птахи посідають далеко не останнє місце в житті народу, а наші сокольники бездоганно володіють стародавнім мистецтвом упіймання, розведення та навчання соколів, а також — полювання з ними."
  rich_lands: "Багаті землі"
  rich_lands_desc: "Наші землі, від трав'яних степів до густих лісів, щедро діляться своїми багатствами з чесними працьовитими людьми. Усе, що в нас є, ми вживемо на благо країни, а розпоряджатися землею будемо мудро і справедливо."
  jurchen_honor: "Чжурчженська честь"
  jurchen_honor_desc: "Демонстрація сили чи інших чеснот вражає кожного чжурчженя, оскільки наш народ вважає, що таким чином можна домогтися поваги оточення. Завдяки цьому наші воїни відрізняються неймовірною хоробрістю і готові битися з ким завгодно."
  unite_the_tribes: "Об'єднання племен"
  unite_the_tribes_desc: "Чжурчжені — старий, але не єдиний народ: вони розділені на численні племена та союзи, іноді навіть ворогуючі один з одним. Про об'єднання цих племен в одну націю мріяли багато правителів."
  leader_under_sky: "Представник неба"
  leader_under_sky_desc: "Настав час покласти край роз'єднаності нашого народу. Нам потрібна сильна рука, яка зможе його об'єднати, змусивши тим самим увесь світ тремтіти від страху. Диктувати свою волю нашому правителю буде саме небо; його діяння приведуть нас у світле майбутнє."
  foraging_our_way: "Життя на підніжному кормі"
  foraging_our_way_desc: "Ми мисливці. Кожен з нас, навіть міський мешканець, живе в злагоді з природою. Ми завжди чуємо, який шлях — правильний, які дари природи будуть нам корисні. Завдяки цьому чуттю ми здатні виживати в будь-яких умовах."
  deliberative_council: "Дорадче зібрання князів та чиновників"
  deliberative_council_desc: "Спочатку цей орган називався просто #italic дорадчим зібранням#!. Він виник на основі недержавних утворень, що просували серед правителів країни ідею спільного керівництва. З тих пір структура зібрання зазнала змін: займатися спільним керівництвом та розглядом політичного курсу (переважно в галузі зовнішньої політики та військової справи) пропонується вже аристократам. Засідати в зібранні можуть лише воєначальники, які не входять до імператорського дому. Таким чином зміцнюється влада нашого правителя."
  manchu_script: "Маньчжурське письмо"
  manchu_script_desc: "Маньчжурський алфавіт виник на основі класичного монгольського письма, яким записувалася чжурчженська мова. Ця система цікава тим, що слова тут записуються зверху вниз, справа наліво. У букв є кілька варіантів накреслення, що залежать від розташування в слові: на початку, в середині, в кінці або окремо. Таке письмо враховує всі лінгвістичні особливості нашої мови."
  the_eight_banners: "Вісім знамен"
  the_eight_banners_desc: "В основі нашого суспільства та його військової могутності лежить система восьми знамен — бездоганно підготовлених військових підрозділів, приналежність до яких передається у спадок; самі ж бійці знамен отримують у нагороду землю та гроші. Лише від того, наскільки великою буде їхня сила, залежить військове благополуччя нашої країни — від завоювання сусідів до майбутніх походів."
  a_new_dawn: "Нова зоря"
  a_new_dawn_desc: "Ми відродилися знову. Спогади про племінну епоху відійшли, немов лихий сон, — тепер уже навіки. Сперечатися з дійсністю неможливо: наша країна набуває сучасного вигляду. Тепер час продемонструвати його всім іншим."
  manchu_reborn: "Перероджені маньчжури"
  manchu_reborn_desc: "Корінних перетворень зазнає не тільки країна — разом з нею змінюється й військо. Перед нами відкриваються нові простори, а значить, і нові труднощі. Щоб вижити, треба бути готовими до дій."
  inigo_architecture: "Архітектура Ініго"
  inigo_architecture_desc: "Вже зараз багато хто впевнений, що проєкти Ініго Джонса серйозно вплинуть на майбутні покоління архітекторів. Його любов до класичної архітектури, пропорцій та гармонії напевно залишить слід в історії британського будівельного мистецтва. Мабуть, в Англії немає людини, яка зробила б більше для неокласичного стилю, ніж Джонс."
  sailing_and_fighting_instructions: "Настанови про маневри та бойові дії"
  sailing_and_fighting_instructions_desc: "Праці Роберта Блейка, присвячені маневрам та війні на морі, справили запаморочливий вплив на наш флот. У них описані, зокрема, нові положення про ведення блокади та висадки на берег, а також тактика кільватерного строю."
  coke_smelting: "Плавка коксу"
  coke_smelting_desc: "Важливим винаходом епохи промислової революції став метод плавки коксу — це нове слово в галузі виробництва заліза та сталі. Зараз вони виробляються традиційним способом, за допомогою спалювання вугілля, проте перехід на кокс дозволить наростити виробництво та скоротити витрати на утримання обладнання."
  water_frame: "Прядильна машина на водяному колесі"
  water_frame_desc: "Прядильна машина на водяному колесі являє собою обертову рамку, на якій виробляється паперова пряжа. Завдяки цьому винаходу можна буде будувати цілі текстильні фабрики, де працюватимуть десятки машин, що приводяться в дію водяним колесом."
  fortress_church_advance: "$fortress_church$"
  fortress_church_advance_desc: "$fortress_church_desc$"
  saquiyah: "Чигир"
  saquiyah_desc: "$saquiyah$ — це водопідіймальний механізм, необхідний для зрошення тих земель, де відсутні власні джерела води. Також відомий під назвами #italic «перське колесо»#!, #italic «сак'я»#!, #italic «чарх»#! або #italic «чикір»#!."
  sepak_takraw: "Сепактакрау"
  sepak_takraw_desc: "Стародавня китайська гра #italic цуцзюй#!, яку в різних країнах називають #italic сепак рага#!, #italic такро#!, #italic чинлон#! та #italic сіпа#!, відома по всій Південно-Східній Азії. Однак #italic сепактакрау#! — це не просто забава. Перекидаючись м'ячем, гравці зміцнюють свою силу та здоров'я, тому така гра є частиною військової підготовки в багатьох військах."
  three_teachings: "Три вчення"
  three_teachings_desc: "Терміном «$three_teachings$» називають китайську філософію, що об'єднує конфуціанство, даосизм та буддизм в єдиний гармонійний напрямок. $SECT_CONFUCIANISM_NAME$ представляє ідеологію дотримання закону. $SECT_DAOISM_NAME$ відображає світогляд радикальних інтелектуалів. $buddhist$ же поєднує ці дві філософські крайності."
  dlh_origin_of_hindustani: "Витоки гіндустані"
  dlh_origin_of_hindustani_desc: "$hindustani_language$ська мова походить від середньої індоарійської мови апабхранша; нею говорять жителі $DLH$. $hindustani_language$ській властиві деякі особливості перської, арабської та тюркської мов, а також давньої гінді, завдяки чому встановлювати відносини як з ісламським, так і з індуїстським світом стає нескладно."
  dlh_indo_persian_culture: "Індо-перська культура"
  dlh_indo_persian_culture_desc: "$persian_language$ська мова вважається домінуючою придворною мовою ще з часів становлення $DLH_ADJ$ого султанату в 1290 році. Під впливом персів місцеві індійські культури перемішалися з перською."
  dlh_turkic_conqueror_roots: "Коріння тюрків-завойовників"
  dlh_turkic_conqueror_roots_desc: "$india$ — наша батьківщина, проте предки, що заснували її, за походженням були тюрками. Військові та державні успіхи мамлюків і наступні за ними досягнення династії Хільджі й сьогодні надихають наших воїнів та дипломатів, які займаються розширенням кордонів $DLH$."
  dlh_revert_ghiyath_reforms: "Скасування реформ Гійаса"
  dlh_revert_ghiyath_reforms_desc: "$DLH$ страждає від бездумних економічних реформ Гійаса ад-Діна: вони не принесли країні нічого, крім розрухи. Ці божевільні постанови слід негайно скасувати та почати знову карбувати монети зі вмістом золота та срібла."
  dlh_restore_the_delhi_empire: "Відновлення величі $DLH$"
  dlh_restore_the_delhi_empire_desc: "$DLH_ADJ$ий султанат колись охоплював майже всю Індію. Настав час повернути йому колишню славу!"
  dlh_reintegrate_former_provinces: "Повторне включення до складу країни колишніх провінцій"
  dlh_reintegrate_former_provinces_desc: "Колись великий $DLH_ADJ$ий султанат з часом позбувся більшості своїх володінь, однак ми ще не забули мистецтво управління цими територіями. Ми обов'язково повернемо рідній країні колишню славу, а поки буде корисно нагадати місцевим правителям про їхні обов'язки перед султаном."
  dlh_textile_innovation: "Передове виробництво тканин"
  dlh_textile_innovation_desc: "Тканинна промисловість у $DLH$ процвітає. У технології виробництва тканин наша країна випереджає всіх сусідів. Ми перші, хто впровадив бавовноочисну машину та черв'ячну шестерню, тому як ніхто інший розуміємо, наскільки важливо залишатися попереду. Тепер слід перейти до наступного етапу — застосування самопрядки."
  dlh_afghan_nobility: "Афганська знать"
  dlh_afghan_nobility_desc: "$DLH_ADJ$а знать в основному походить з афганської громади — народу-завойовника, що колись довго правив Північною Індією. Іноді вони створюють серйозні перешкоди нашим державним діячам, однак ніхто не буде заперечувати вміння цих людей воювати."
  dlh_grand_trunk: "Захист Великого колісного шляху"
  dlh_grand_trunk_desc: "Великий колісний шлях простягнувся від Кабула до узбережжя Бенгалії. Уздовж нього розташовані численні торгові міста — важливі частини фундаменту імперії. Відповідно, наше завдання — підтримувати шлях у доброму стані та охороняти його від розбійників."
  dlh_cosmopolitan_religions: "Релігійне різноманіття"
  dlh_cosmopolitan_religions_desc: "$india$ — це величезний субконтинент, де уживається одразу безліч релігій. Щоб наша країна залишалася стабільною, нам слід заручитися вірністю представників найрізноманітніших віросповідань. Для цього доведеться розширити їхні права."
  dlh_revive_the_tughlaq_architecture: "Відродження архітектури Туглакідів"
  dlh_revive_the_tughlaq_architecture_desc: "Коли династія Туглакідів була на вершині могутності, а наша країна — міцним і сильним утворенням, великі архітектори та творці зводили мечеті й гробниці в неповторному туглакідському стилі. Йшли десятиліття; нашу країну поступово починали роздирати внутрішні конфлікти. Коштів на підтримку цих будівель стало не вистачати. Сьогодні ж настав час відродити славну традицію — нехай $DLH$ прославиться як імперія великих творців!"
  dlh_throne_of_india: "Індійський престол"
  dlh_throne_of_india_desc: "Протягом багатьох століть $delhi$ незмінно був столицею кожної великої індійської імперії. Ми по праву народження претендуємо на престол завойовників. Нехай увесь світ дізнається, що в $delhi$ тепер знову засідає повноправний правитель усієї Індії!"
  dlh_hindustani_identity: "$HIN_ADJ$а самобутність"
  dlh_hindustani_identity_desc: "До індійського макрорегіону дісталися закордонні уявлення про націоналізм та культурну самобутність. Різноманіття культур в Індії залишиться даністю, однак багатьом тепер зрозуміло, що поєднання особливостей індійської географії та мусульманських цінностей породжує своєрідне почуття спільності — індостанську самосвідомість."
  vij_city_of_victory: "Місто перемоги"
  vij_city_of_victory_desc: "Віджаянагара — «місто перемоги» — розташувалася в серці нашої країни. Колись вона стане центром індуїстської імперії, яка вижене загарбників-мусульман. Поки ж нехай тут процвітають культура та традиції!"
  vij_an_army_for_city_of_victory: "Військо для міста перемоги"
  vij_an_army_for_city_of_victory_desc: "Щоб місто перемоги було гідне свого гучного імені, йому потрібне переможне військо. Настав час подбати про належну підготовку військ, і не тільки фізичну: кожен воїн повинен пишатися своїм становищем."
  vij_arab_horses: "Арабські коні"
  vij_arab_horses_desc: "Коні з Аравійського півострова значно перевершують місцевих. Вже налагоджені торгові зв'язки допоможуть нам забезпечити постійне постачання військ арабськими скакунами."
  vij_first_indian_artillery: "Перша індійська артилерія"
  vij_first_indian_artillery_desc: "Порох ще не набув широкого поширення у військовій справі, проте вже зараз очевидно, що він здатен назавжди змінити вигляд бойових дій. Нам слід ретельно вивчити способи застосування пороху."
  vij_the_bunds: "Бунди"
  vij_the_bunds_desc: "Наше суспільство живе сільським господарством, однак $karnakassala_area$ — досить посушлива область. Завдяки #italic бундам#! (вони ж #italic анекут#!) до наших міст і полів надходить така необхідна вода."
  vij_adroit_diplomacy: "Вправна дипломатія"
  vij_adroit_diplomacy_desc: "Численні загарбники, що прагнуть підкорити індуїстський народ, постійно виявляють одну й ту саму слабкість: вони починають сваритися між собою. Нам же потрібно бути завжди готовими обернути ці сварки на свою користь."
  vij_promotion_of_trade: "Сприяння торгівлі"
  vij_promotion_of_trade_desc: "Наші володіння розташовані на одному з головних маршрутів, що ведуть зі сходу на захід. Потрібно подбати про охорону портів, щоб судна, які заходять туди, могли зупинятися в наших краях, а ми могли обкласти капітанів податком."
  vij_carnatic_music: "Карнатична музика"
  vij_carnatic_music_desc: "Мусульманському вторгненню потрібно чинити опір у всьому. Музичні традиції Північної Індії вже починають піддаватися чужорідному впливу, і цього ніяк не можна допустити: кожен знає, що музика — божественне мистецтво, винайдене девами. Настав час захистити це надбання індуїстського народу."
  vij_cultural_integration: "Культурне злиття"
  vij_cultural_integration_desc: "Культурне розмаїття Індійського субконтиненту очевидне кожному. Якщо ми дозволимо місцевим жителям правити відповідно до власних традицій, то забезпечимо їхню вірність, а заодно й інтеграцію в наше суспільство."
  vij_rule_in_accord_with_dharma: "Управління відповідно до дхарми"
  vij_rule_in_accord_with_dharma_desc: "Дхарма — це один із головних стовпів наших релігійних і суспільних цінностей. Країна може бути справедливою та доброчесною лише в тому випадку, якщо її правителі дотримуються дхарми."
  vij_harsh_penal_code: "Жорстке уложення про покарання"
  vij_harsh_penal_code_desc: "Покарання за порушення закону у правителя одне: смерть. Настав час прийняти нове суворе уложення про покарання і, що найважливіше, подбати про старанне його виконання, щоб кожен міг почуватися спокійно."
  vij_decentralized_rule: "Децентралізоване управління"
  vij_decentralized_rule_desc: "Чим ширша наша країна, тим складніше нею керувати. Зростає й кількість незадоволених, здатних підняти повстання. Щоб цього не допустити, нам доведеться дозволити місцевим жителям самостійно вирішувати малозначні питання; двір розглядатиме лише дійсно серйозні проблеми."
  vij_indian_throne: "Індійський престол"
  vij_indian_throne_desc: "Ми більше не маємо наміру миритися із загрозою з боку мусульман. На півночі країни, у $delhi$, засідають язичники, чиї погляди та методи прямо протилежні всьому, чого прагне індійський народ. Настав час заснувати нове осереддя влади! Таким стане $vijayanagar$."
  tnk_legitimate_rule: "Давні корені"
  tnk_legitimate_rule_desc: "$tamil_land_area$ споконвіку належав нашим предкам. Сьогодні, в епоху панування загарбників-чужинців, нам доведеться звернутися до цієї давньої спадщини, щоб узаконити право на владу."
  tnk_resist_invaders: "Вмілий опір"
  tnk_resist_invaders_desc: "Історія нашого народу налічує безліч перемог і нищівних поразок. Щоб наша династія знову стала панувати над іншими, спочатку доведеться згадати, як затримувати ворожі війська на непрохідній місцевості нашої батьківщини — так ми виграємо час і зможемо організувати справжній опір."
  tnk_pearls_of_india: "Вмілі ловці перлів"
  tnk_pearls_of_india_desc: "Наш народ славиться неймовірною здатністю глибоко пірнати за перлами в прибережних водах. Такі досвідчені плавці не тільки допомагають нам розбагатіти — з них виходять чудові матроси, що мають серйозні переваги перед ворогом."
  tnk_expertise_in_conflicts: "Загартовані війною"
  tnk_expertise_in_conflicts_desc: "Життя ніколи нас не щадило, проте ми жодного разу не схилилися перед обличчям небезпеки та непереборних труднощів. Таку стійкість слід виховувати в народі — нам потрібні люди, готові підставити країні надійне плече."
  tnk_imperial_legacy: "Спадщина імперії Пандьїв"
  tnk_imperial_legacy_desc: "Південна Індія вже давно страждає від набігів іноземних загарбників та примх місцевих вискочок, які оголосили себе полководцями та заснували власні володіння. Ми ж — стародавня династія, а тому маємо повне право пред'явити претензії на ці краї. Ми твердо маємо намір принести туди мир — всерйоз і надовго."
  paik_system_advance: "$paik_system$"
  paik_system_advance_desc: "$paik_system_desc$"
  paik_regiments_advance: "$a_paik_infantry$"
  paik_regiments_advance_desc: "$a_paik_desc$"
  advanced_paik_system_advance: "Розвинена система пайків"
  advanced_paik_system_advance_desc: "$a_late_paik_infantry_desc$"
  baghlah_advance: "$n_baghlah$"
  baghlah_advance_desc: "$n_baghlah_desc$"
  bng_bengali_vassal_system: "$BNG_ADJ$і васальні відносини"
  bng_bengali_vassal_system_desc: "В епоху $DLH$ бенгальці перебували в залежності від своїх сюзеренів, приносячи їм дохід. $DLH_ADJ$а система ляже в основу нашої власної системи васальних відносин самостійної бенгальської країни."
  bng_bengali_paik: "$BNG_ADJ$і пайки"
  bng_bengali_paik_desc: "Пайки — це хребет нашого війська. Інші країни, де діє схожий уклад, складають з пайків ополчення, проте ми віддаємо перевагу заміні кількості якістю та наданню пайкам повноцінної військової підтримки."
  bng_bengali_architecture: "Бенгальська архітектура"
  bng_bengali_architecture_desc: "Бенгальський стиль, в якому будуються релігійні та культурні споруди, неповторний: у ньому об'єдналися принципи стародавньої міської архітектури, віяння мусульманської будівельної думки та правила будови дахів у класичному бенгальському дусі. Нам добре знайомі його основи, тому зведення нових будівель у бенгальському стилі обходитиметься значно дешевше."
  bng_habshi_generals: "Генерали-хабші"
  bng_habshi_generals_desc: "Абіссинські солдати-невільники, куплені на арабських ринках, складають еліту нашої піхоти. Ті з них, хто особливо добре проявить себе на керівній посаді, отримають ще ширші повноваження; ті ж, хто відрізняється винятковою вірністю, служитимуть у палацовій варті."
  bng_war_elephants: "Бойові слони"
  bng_war_elephants_desc: "Слони — повільні тварини, проте ніхто інший не може так перетинати численні річки нашої країни, як вони. Слони можуть не тільки підвозити військам необхідне постачання, а й безпосередньо допомагати їм у бою: такий грізний звір — серйозна сила."
  bng_rupees: "Карбування рупій"
  bng_rupees_desc: "Відсутність єдиної валюти, що має широке ходіння, ускладнює розвиток торгівлі в Індії. Оскільки ми — одна з провідних в економічній галузі країн субконтиненту, то можемо дозволити собі розпочати карбування нової срібної монети еталонної ваги. Вона отримає назву «рупія»."
  bng_bengali_traders: "$BNG_ADJ$і торговці"
  bng_bengali_traders_desc: "$indian_ocean_region$ відкриває індійським торговцям шлях на ринки в таких регіонах, як $south_east_asia$ та $china$. Ми намагатимемося наростити морську торгівлю з цими ринками, щоб отримати якомога більше прибутку."
  bng_bengali_poetry: "Бенгальська поезія"
  bng_bengali_poetry_desc: "Словесна творчість — це один з найвпливовіших різновидів мистецтва. Бенгальські поети прославлять нашу культуру у віках: вони змусять нащадків захоплюватися грандіозними завоюваннями, ридати над несамовитими трагедіями та ставити питання про природу всього сущого."
  bng_religious_pluralism: "Різноманіття релігій"
  bng_religious_pluralism_desc: "В Індії панує справжнє релігійне розмаїття: більшість сповідує індуїзм, правлячі класи сповідують іслам, а окремі представники меншин серед робітників — навіть такі малопоширені релігії, як буддизм та джайнізм. Спроби змусити всіх дотримуватися однієї релігії неминуче призведуть до невдоволення та безладів. Отже, необхідно підтримувати релігійне різноманіття, не потураючи і не перешкоджаючи жодній з релігій."
  bng_artillery_corps: "Артилерійський корпус"
  bng_artillery_corps_desc: "Жоден військовий похід сьогодні не обходиться без гармат. Нам слід не відставати від цих віянь та заснувати повноцінний артилерійський корпус, здатний значно пошарпати ворога ще до того, як його піхота зійдеться в бою з нашою."
  bng_bengali_trade_fleet: "$BNG_ADJ$ий торговий флот"
  bng_bengali_trade_fleet_desc: "Бенгальські купецькі кораблі везуть здалеку дивовижні товари, золото та срібло, якими торгують на ринках у дельті Гангу. Купці користуються відомістю навіть у далеких куточках світу — така слава нашого торгового флоту."
  bng_shipbuilding_industry: "Кораблебудівна промисловість"
  bng_shipbuilding_industry_desc: "Добробут нашої країни ґрунтується на морській торгівлі. Відповідно, чималу роль в економіці відіграють купецькі та військові кораблі, а тому кораблебудівна промисловість країни заслуговує на повну підтримку."
  bng_bengali_industrialization: "Промислове виробництво мусліну"
  bng_bengali_industrialization_desc: "$BNG$ настільки вдало розташована, що достатньо докласти невелике зусилля — і ми здійснимо небачений раніше в Індії переворот. Поштовхом до індустріалізації стане виробництво на продаж мусліну — особливої бавовняної тканини, яку наші прядильники прославили на весь світ. Наші тканини вже скуповують у всіх країнах; тепер настав час сказати нове слово. Хай почнеться промислова революція!"
  raj_militaristic_society: "Мілітаристське суспільство"
  raj_militaristic_society_desc: "Для раджпутів майже немає відмінностей між цивільним і військовим суспільством. Наша країна — покровитель; на першому місці для неї стоять не підвладні правителям землі, а люди. І ці люди — воїни. Чим обширнішими стають володіння покровителя, тим краще воїни повинні задовольняти наші адміністративні потреби."
  raj_combat_training: "Бойова підготовка"
  raj_combat_training_desc: "Кожен воїн повинен бути готовий до битви. Однак наші воїни починають підготовку зовсім юними, тому перевершують інших новобранців."
  raj_clan_loyalties: "Кланова вірність"
  raj_clan_loyalties_desc: "Вплив нашого клану простягається далеко за межі наших володінь. Коли потрібно поповнити лави воїнів, ми можемо призивати раджпутів з нашого клану по всій Північній Індії."
  raj_monumental_architecture: "Монументальна архітектура"
  raj_monumental_architecture_desc: "Який сенс від перемоги, якщо вона не увічнена за допомогою пам'ятника? Такі споруди, як грандіозна Вежа перемоги, нагадуватимуть нащадкам про великі битви предків."
  raj_marwari_horses: "Марварські коні"
  raj_marwari_horses_desc: "Раджпути, вірні своїм традиціям, старанно готують своїх коней до майбутніх битв. Кажуть, марварський кінь ніколи не тікає з поля бою, залишається там аж до перемоги або загибелі і може втекти, лише коли потрібно вивезти пораненого вершника подалі. Якщо ми будемо як слід дбати про цих благородних тварин, жодна сила в усій Індії не зможе протистояти нашій кавалерії."
  raj_reorganized_rajput_regiments: "Перетворені полки раджпутів"
  raj_reorganized_rajput_regiments_desc: "Традиційний клановий уклад — це чудова основа для створення сучасної системи полків. Ієрархія, яка вже склалася на основі спорідненості та беззастережної відданості, легко перетворюється на повноцінну службову вертикаль."
  raj_martial_smiths: "Військові ковалі"
  raj_martial_smiths_desc: "Для перемоги одних лише маневрів і хоробрості недостатньо. Крім цього, знадобиться і зброя. Наші ковалі куватимуть тільки найкращі клинки, якими озброяться раджпути, що захищають нашу країну від іноземних загарбників."
  raj_fortress_architecture: "Фортечна архітектура"
  raj_fortress_architecture_desc: "Піднесення $DLH$ та вторгнення воїнів-мусульман у минулому відкрили народу очі на те, що завжди потрібно бути готовими дати відсіч загарбнику. Для цього потрібно буде найняти найдосвідченіших архітекторів, щоб ті спроєктували неприступні фортеці. Стіни будуть неймовірно протяжними під стать розмірам нашої території, однак ми твердо маємо намір захистити мирний сон наших жителів, а тому готові на такий масштабний проєкт."
  raj_expanded_artillery_arm: "Більш розвинена артилерія"
  raj_expanded_artillery_arm_desc: "Війни виграються за допомогою облог. Нам потрібно винайти нові, ще надійніші та великокаліберніші гармати, щоб жодна фортеця — чи то в Індії, чи деінде — не вистояла під їхніми залпами."
  raj_the_purbias: "Пурбії"
  raj_the_purbias_desc: "Раджпути, прагнучи прославити імена свого клану, поширилися по всій Північній Індії. Серед них найбільше відомі #italic пурбії#! — відібрані солдати, завжди готові влаштуватися найманцями. У бою вони вкрай смертоносні, чим завоювали собі — і нам — грізну славу."
  raj_mandatory_firearm_drilling: "Обов'язкові тренування з вогнепальною зброєю"
  raj_mandatory_firearm_drilling_desc: "Багато раджпутів навчилися вміло поводитися з особистою вогнепальною зброєю. Ці досвідчені бійці добре нам послужать, якщо ми залучимо їх до навчання новобранців замість того, щоб розкидатися життями цих ветеранів у бою. Кожен вояк нашого війська, перш ніж зіткнутися з ворогом, буде зобов'язаний навчитися стріляти."
  raj_painting_school: "Раджпутська художня школа"
  raj_painting_school_desc: "Твори художників-раджпутів користуються широкою популярністю. Нам слід заохочувати творців розвивати свої таланти: школа художньої майстерності, властива тільки нашій династії, прославить нас на віки."
  raj_rajput_resistance: "Раджпутський опір"
  raj_rajput_resistance_desc: "Раджпутські мандрівні поети знають багато історій про протистояння нашого народу чужоземним загарбникам. Наші предки готові були померти, аби не визнавати поразки. Цей дух єдності слід виховувати в новому поколінні, щоб поети й далі складали пісні про відвагу перед лицем смерті."
  raj_martial_ethos: "Військові звичаї"
  raj_martial_ethos_desc: "Завдяки традиційним раджпутським звичаям і способам виховання ми ніколи не відчували нестачі в командирах. Щоб цей стан і далі приносив нам користь, слід зробити військову службу по-справжньому привабливою. Тоді талановиті юнаки підуть у командири як у нас, так і за кордоном."
  npl_the_divya_upadesh: "Дів'я-упадеш"
  npl_the_divya_upadesh_desc: "Дів'я-упадеш — це виклад дев'яти основоположних принципів непальського політичного та народного життя, а заодно — настанова щодо ведення зовнішньої політики. Тут укладені непальські уявлення про управління країною, про війну та мир. Будь-який відступ від них загрожує підривом непальської державності з боку сусідів і хижацьки налаштованих іноземних країн."
  npl_gurkhas: "$a_gurkha$"
  npl_gurkhas_desc: "$a_gurkha_desc$"
  ori_bulwark_of_the_hindu: "Оплот індуїзму"
  ori_bulwark_of_the_hindu_desc: "Мусульмани наводнили Індійський субконтинент. Сотні тисяч індуїстів стогнуть під їхнім гнітом, і лише $ORI$ наважується давати відсіч воїнам ісламу. Ми — це оплот індуїзму. Захистимо ж стародавні звичаї та культуру від чужоземців!"
  ori_anka_year_system: "Система літочислення «анка»"
  ori_anka_year_system_desc: "Анка — це особлива система запису років, у які правили наші володарі. Роки, що закінчуються на 6 і 0, не враховуються (за винятком числа 10). Анка завжди починається в рік #italic сунія#! — новий податковий рік народу орія."
  ori_lord_of_elephants: "Гаджапаті"
  ori_lord_of_elephants_desc: "$ORI$ — зовсім не підходящий регіон для розведення коней; ці тварини чужі нашому народу. Однак у місцевих джунглях завжди водилося безліч слонів, тому ми не потребуємо кінноти: у щільних заростях Східної Індії піхота за підтримки слонів може бути не менш смертоносною. Потрібно й далі нарощувати чисельність бойових слонів, а також відточувати тактику їх застосування в бою, щоб прославитися як #italic Гаджапаті#! — повелителі слонів."
  ori_servitor_of_jagganath: "Служителі Джаганнатхи"
  ori_servitor_of_jagganath_desc: "Жителів цих країв об'єднує поклоніння Джаганнатсі — владиці всесвіту. Колись правителі Орісси навіть вважалися синами Джаганнатхи. Можливо, нинішній правитель і не веде рід від цього божества, однак народу все-таки варто вселити думку, що будь-який владика — слуга Джаганнатхи, тому будь-яка непокора буде прирівнюватися до зради божественної сутності."
  ori_parikshas: "Парікші"
  ori_parikshas_desc: "$ORI$ давно не знає єдності; ця земля завжди була розділена між різними царьками. Прийшов час покласти край свавіллю мандалешвар! Час заволодіти розрізненими територіями та призначити там місцевих правителів — парікш, а не терпіти й далі спроби підірвати царську владу."
  ori_odia_militarization: "Мілітаризація Одії"
  ori_odia_militarization_desc: "$muslim_ADJ$а загроза вічна. Вона ніколи не дрімає, тому наші війська повинні бути готові в будь-яку хвилину виступити проти загарбників."
  ori_refined_cloth_production: "Налагоджене виробництво тканин"
  ori_refined_cloth_production_desc: "$ORI$ з давніх часів славиться найвищою якістю своїх тканин. Місцевих виробників слід підтримати: нехай шукають досконаліші способи виробництва калінгської тканини."
  ori_patronize_temple_construction: "Сприяння будівництву храмів"
  ori_patronize_temple_construction_desc: "Свою велич країни минулих років увічнили у великих храмах, які залишили нащадкам. Нам же потрібно не тільки зберегти цю спадщину, а й найняти архітекторів, які будуватимуть нові храми, розвиваючи тим самим калінгську архітектуру."
  ori_encourage_salt_trade: "Торгівля сіллю"
  ori_encourage_salt_trade_desc: "Високоякісна орісська сіль користується великим попитом у всій Індії. Необхідно й надалі розвивати торгівлю цим продуктом, щоб гроші до нас текли рікою."
  ori_expansion_of_infrastructure: "Розширення інфраструктури"
  ori_expansion_of_infrastructure_desc: "Технічний поступ не стоїть на місці. Зростає й населення нашої країни. Більше того, індустріалізація призвела до такого сплеску народжуваності, що тепер необхідно розширювати створену інфраструктуру."
  bah_arabian_horses: "Арабські коні"
  bah_arabian_horses_desc: "Клімат Індії дуже погано підходить для розведення коней. Місцеві коні за всіма характеристиками разюче поступаються коням з Аравійського півострова. Вже налагоджені торговельні зв'язки допоможуть нам забезпечити постійне постачання своїх військ арабськими скакунами."
  bah_amir_rebellion: "Емірське повстання"
  bah_amir_rebellion_desc: "Наша країна зародилася в результаті повстання емірів проти ослабленого $DLH$. Перемога над $DLH_ADJ$им султанатом і донині жива в пам'яті нашої знаті та військових."
  bah_nobility_hindu_expansion: "Нова індуїстська знать"
  bah_nobility_hindu_expansion_desc: "$nobles_estate$ — це необхідне зло, з яким доводиться миритися будь-якому правителю. Так, ці люди не дають йому владарювати безроздільно, однак без них було б неможливо керувати великими територіями нашої країни. Після того як ми відвоювали у $DLH$ незалежність, до нас у підпорядкування перейшли піддані-індуїсти. Лише нікчемно мала (а тому нездатна повелівати народом) частина наших аристократів сповідує іслам. Чисельність знаті слід наростити за рахунок інших індуїстів, що подають надії."
  bah_gharbians: "Гарбійці"
  bah_gharbians_desc: "Після розриву відносин з $DLH$ та заснування власного королівства ми опинилися в небезпечному становищі: за минуле століття наші відносини з переважно мусульманською північчю Індії помітно охололи. У країні просто немає надійно вкорінених мусульманських аристократів, тому ми, по суті, опинилися в руках місцевих знатних індуїстів.\nНа щастя, наше ім'я відоме багатьом. Легенди про незліченні багатства Декану встигли облетіти весь ісламський світ. У наших портах раз у раз стають на якір кораблі шукачів пригод, впевнених, що тут їм напевно пощастить. Щоб у нашій країні відтепер завжди були вмілі полководці, збирачі податків і правителі, до двору слід закликати талановитих вихідців із заходу — гарбійців; вони не відмовляться від скарбів Індії."
  bah_legacy_of_gisu_daraz: "Спадщина Гісу Дараза"
  bah_legacy_of_gisu_daraz_desc: "Загалом для Індії і зокрема для нас суфізм — вже давно не новинка. Усі зусилля наших правителів із залучення до двору суфійських шейхів, яким прийнято всіляко покровительствувати, — це наочний доказ того, що слово «правовірність» для них не порожній звук.\nЗавдяки тому, що наша країна дотримується суфійських традицій духовного розвитку та відкритості, тут складається середовище, в якому можуть мирно співіснувати два абсолютно різних за вірою народи — гарбійці та деканці."
  bah_meltpot_of_languages: "Суміш мов"
  bah_meltpot_of_languages_desc: "$deccan_region$ — справжній котел, в якому перемішуються найрізноманітніші мови та культури. Сусідство іранців, тюрків, афганців та арабів, що населяють ці землі, — справжнє свідчення того, що тут раді будь-кому. Наші предки задовольнялися однією лише перською мовою, однак зараз все більшого поширення набуває суміш місцевих мов, у тому числі перської та арабської. З цієї суміші черпають культурне натхнення і наші творці."
  bah_karimis: "Карімі"
  bah_karimis_desc: "Протягом століть торгівлю між Індією та Єгиптом вели купці та капітани, що оселилися в Єгипті, відомі під назвою «карімі». Без їхньої участі щоденні вантажоперевезення Індійським океаном були б просто неможливі. Сьогодні карімі — це неймовірно багата та могутня організація. Її вплив простягається від тамільських прибережних поселень до торгових міст суахілі, від нижньоєгипетських портових міст до Аденської затоки. Карімі продають дивовижні товари та дають позики будь-кому — від султанів до аристократів і простолюдинів.\nОстаннім часом вони дуже зацікавилися нашою країною. Нам же слід постаратися підтримувати з ними добрі стосунки: вони обіцяють виключно користь."
  bah_takht_e_firoza: "Бірюзовий трон"
  bah_takht_e_firoza_desc: "Бірюзовий трон нашої династії — перше, що бачить кожен, хто потрапив на прийом до повелителя. Немає в країні яскравішого символу нашого багатства, ніж цей трон — дар від переможеного раджі Капаї. Цей вишуканий предмет меблів, виконаний одразу в кількох стилях, втілює не лише могутність деканської династії, а й різноманітну природу країни, де уживається одразу кілька народів."
  bah_bahmani_primogeniture: "Бахманідське право первородства"
  bah_bahmani_primogeniture_desc: "Наші правила престолонаслідування незвичайні: влада завжди переходить до старшого сина чинного правителя. Такий уклад спочатку призводив до заворушень, оскільки жадібні до влади регенти або недобросовісна знать нерідко використовували неповнолітніх правителів у своїх інтересах або підтримували претензії заздрісного родича на престол. З часом, втім, такий порядок укорінився, і тепер, коли приходить час передавати владу, мало хто наважується кинути виклик справжньому спадкоємцю династії."
  bah_madrasa_of_mahmud_gawan: "Велике деканське медресе"
  bah_madrasa_of_mahmud_gawan_desc: "Багато років поспіль наша країна вабила до себе талановитих мусульман і водночас дбайливо впроваджувала в культуру елементи спадщини, залишеної нам предками. Завдяки такому підходу ми тепер не зовсім перси, араби, маратхи, телугу чи каннада — ми всі ці народи одразу. Звівши в столиці велике медресе, ми лише посприяємо розвитку культурного різноманіття, а заодно продемонструємо світові велич нашої країни."
  guj_hub_of_the_indian_ocean_trade: "Центр індоокеанської торгівлі"
  guj_hub_of_the_indian_ocean_trade_desc: "Торгівля заходу зі сходом в Індійському океані здавна йде через $GUJ$ — цьому сприяють постійні мусони, а також вдале географічне розташування. Тут з'єднуються торгові шляхи з Червоного моря, Єгипту та Малакки. Місцеві купці — важливі посередники в справі перевезення цінних товарів, наприклад спецій з Молуккських островів і шовку з Китаю, а також продажу їх купцям із заходу."
  guj_garba: "Гарба!"
  guj_garba_desc: "Жіночу традицію вознесіння почестей богині Амбіці за допомогою танцю наш народ з часом перетворив на окремий, неймовірно витончений різновид мистецтва — танець гарба. Танцюристи вишиковуються в коло, співають і ритмічно плескають у долоні. Сьогодні цей танець втратив колишнє значення, і його виконують з будь-якого радісного приводу. Одягнувшись у витончений одяг, танцювати гарбу збираються всі: молоді й старі, селяни й князі, мусульмани й індуїсти. Наше коло шириться без кінця."
  guj_jain_routes: "$jain_ADJ$ські зв'язки"
  guj_jain_routes_desc: "$jain$ — це давній уклад життя, що набув сучасного вигляду завдяки Махавірі. Протягом тисячі років духовним центром джайнізму був $GUJ$ — край святинь і храмів. Цій релігії покровительствували навіть королівські династії, поступово зблизившись таким чином з індуїстами. Однак мусульманські загарбники — Махмуд Газневі та Мухаммад Гурі — не стали виявляти до джайністів терпимість. Одні храми вони розорили, інші — перетворили на мечеті. Всі бібліотеки з джайністськими рукописами були віддані вогню. Однак придушити народ остаточно загарбники не змогли. Гуджаратські джайністи пристосувалися до нових умов: завдяки зв'язкам з іншими громадами одновірців вони змогли зберегти славу рідного краю, де й донині процвітають релігія і торгівля."
  guj_gujarati_lipi: "Письмо гуджараті"
  guj_gujarati_lipi_desc: "Необхідність вести торгівлю стала поштовхом до створення нової системи писемності, відомої також як письмо сарафі (банкірів), ваніасаї (купців) або махаджані (торговців) — настільки міцний її зв'язок зі світом комерції. Вона швидко набула поширення в таких краях, як $GUJ$, $KUT$ і $SND$, — там її використовують для запису місцевих мов і вивчення санскриту. Крім того, письмо гуджараті практикується зороастрійцями — носіями авестійської мови. Перейшовши на єдину писемність, ці народи стали набагато ближчими один до одного."
  guj_gujarati_merchant_diaspora: "$GUJ_ADJ$ська купецька діаспора"
  guj_gujarati_merchant_diaspora_desc: "Наш народ торгує всюди, куди тільки занесе вітер! Немає такого берега, до якого не пристали б наші кораблі, а наші купці чудово розбираються в справі будівництва надійних і стійких кораблів, дорогих рівно настільки, наскільки дозволяють кошти."
  mug_zamindar_system: "Система заміндарі"
  mug_zamindar_system_desc: "Заміндари — це феодальні правителі наших земель з повною або частковою автономією. Вони володіють землями, якими керують, і входять до стану аристократів, але по факту є внутрішніми васалами корони."
  mug_mughal_ibadat_khana: "$ibadat_khana$"
  mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"
  mug_an_indian_padshah: "Індійський падишах"
  mug_an_indian_padshah_desc: "Зараз нашу країну населяють представники безлічі вірувань і культур. Ми чужинці в цих землях, але розуміємо традиції та цінності Індії. Попри багату культуру, цим людям бракує спільної мети. Ми повинні зробити все можливе, щоб у всіх наших підданих були рівні можливості послужити нашому великому дому, незалежно від їхньої касти, релігії чи культури."
  mug_mughal_architecture: "Могольська архітектура"
  mug_mughal_architecture_desc: "Великій імперії потрібні монументальні споруди. У нашій космополітичній країні архітектори вже створюють чудові будови, на які з подивом дивитимуться майбутні покоління. Наша династія повинна очолити цей рух і створити великі витвори мистецтва, яких ще не бачив світ."
  mug_fatawa_e_alamgiri: "Фетви Аламгіра"
  mug_fatawa_e_alamgiri_desc: "$mug_fatawa_e_alamgiri$ — звід законів, заснований на законах шаріату, що охоплює різні аспекти життя нашої імперії. Це один з найбільш всеосяжних збірників ісламських законів, моральних принципів, воєнної стратегії, економічної політики, правосуддя та принципів державності."
  samanta_advance: "Саманта"
  samanta_advance_desc: "Саманта (#italic сусід#!) — термін, що застосовується до васалів і данників. Хоча ця давня феодальна система поступово втрачає свою значущість у нинішніх реаліях, вона залишається фундаментом, на якому століттями зводилося наше суспільство."
  kalaripayattu_advance: "Каларіпаятту"
  kalaripayattu_advance_desc: "Каларіпаятту (#italic мистецтво на полі бою#!) — це давнє індійське бойове мистецтво родом з Малабару. Воїни нашої країни повинні вивчати каларіпаятту, щоб підтримувати свої військові навички."
  nair_military_advance: "Військо наїрів"
  nair_military_advance_desc: "Наїри — це група індуїстських каст з Малабару. Всі вони історично пов'язані з військовою діяльністю. Їхній досвід, а також їхня роль у каларі, дуже знадобляться нам у нинішніх конфліктах."
  mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
  mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"
  mhr_tradition_of_military_service: "Традиція військової служби"
  mhr_tradition_of_military_service_desc: "Вершники маратхі здавна служили султанам Декану як «баргіри». Численні війни призвели до мілітаризації Декану та перетворили нашу кавалерію на одну з найсильніших військових сил Індії."
  mhr_forts_of_maharashtra: "Фортеці Магараштри"
  mhr_forts_of_maharashtra_desc: "У цих горбистих і лісистих землях не обійтися без мережі добре підтримуваних фортець для наступу та оборони. Підтримання фортець має бути нашим головним пріоритетом."
  mhr_peasant_soldiers: "Селяни-солдати"
  mhr_peasant_soldiers_desc: "У селах Деша вистачає здібних чоловіків, які охоче поповнять лави наших військ. Ми повинні навчати та набирати до наших військ усіх носіїв мови маратхі."
  mhr_office_of_the_peshwa: "Служба пешви"
  mhr_office_of_the_peshwa_desc: "Необхідно створити службу, яка цілком присвячена управлінню країною та її військом. Під керівництвом умілого чиновника, пешви, наша країна зможе розширюватися швидко та ефективно."
  mhr_encourage_brahmin_ties: "Підтримка зв'язків із брахманами"
  mhr_encourage_brahmin_ties_desc: "У фінансовому секторі нашої країни переважають банкіри-брахмани. Потрібно підтримувати зв'язки з ними, зробити їх збирачами податків і створити правила, які зміцнять їхні права та захистять традиції. Це забезпечить нам прихильність фінансистів і дозволить набирати освічених та здібних адміністраторів."
  pun_breadbasket_of_india: "Житниця Індії"
  pun_breadbasket_of_india_desc: "П'ять великих річок — Інд, Джелам, Чинаб, Раві та Сатледж — пронизують землі Пенджабу, забезпечуючи неймовірну родючість ґрунту. Це дозволяє нам постачати їжу та бавовну сусідам, а також сприяє зростанню міст і спеціалізації виробництва. Ми повинні робити все можливе для розвитку сільського господарства та захисту наших фермерів від розбійників і головорізів із прилеглих областей."
  pun_encourage_indo_persian_trade: "Підтримка індо-перської торгівлі"
  pun_encourage_indo_persian_trade_desc: "Завдяки своєму розташуванню на західному кордоні Пенджаб завжди був центром економічного та культурного обміну між Індією та Персією. Стародавній Великий колісний шлях, що з'єднує Східну Індію з перським світом, проходить нашими землями та прямує в гірські перевали Афганістану. Однак ці перевали кишать нальотчиками з місцевих племен і бандитами. Ми повинні підтримувати торгівлю цим стародавнім шляхом і робити все можливе для добробуту торговців, зводячи караван-сараї та патрулюючи дороги."
  pun_punjabi_textile_industry: "$PUN_ADJ$а текстильна промисловість"
  pun_punjabi_textile_industry_desc: "$PUN$ — це великий центр виробництва текстилю. Наші тканини спеціально виготовляються для ринків по всій Азії та Європі, а наші прядильники вважаються одними з найпродуктивніших в Індії."
  pun_foundation_of_the_khalsa: "Хальса"
  pun_foundation_of_the_khalsa_desc: "$sikhism$ — релігія, що походить із Пенджабу, — стрімко поширюється на наших землях. До її лав стікаються представники найрізноманітніших каст і походження, і вони готові захищати свою країну незалежно від попередніх професій."
  pun_gurmukhi_script: "Писемність гурмукхі"
  pun_gurmukhi_script_desc: "Писемність гурмукхі — це абугіда, створена в Пенджабі. Гуру сикхізму віддають перевагу цій формі письма, і наші священики за її допомогою записують сикхські тексти."
  pun_strength_of_the_misls: "Сила місаля"
  pun_strength_of_the_misls_desc: "Завдяки системі місаля пенджабські країни здатні виставляти значні кінні війська. За необхідності ми можемо скористатися цими військами для боротьби зі спільним ворогом."
  pun_reforming_the_punjabi_army: "Реформа пенджабського війська"
  pun_reforming_the_punjabi_army_desc: "Методи наших попередників добре служили нам протягом багатьох років. Але якщо ми хочемо, щоб наші війська продовжували перемагати на полях битв, потрібно побудувати більш професійне військо. Вивчаючи методи організації армій в далеких землях і за необхідності адаптуючи їх, ми можемо створити ефективне пенджабське військо, зберігши унікальні якості поточної військової системи."
  religious_melting_pot: "Плавильний котел релігій"
  religious_melting_pot_desc: "На розвиток нашого народу впливало безліч різних релігій, включно з традиційними віруваннями, індуїзмом, а також буддизмом Індії та Китаю. З часом наші піддані виробили свого роду синкретизм, що об'єднує елементи різних культів і не відкидає жодного з них."
  akson_thai: "Тайська писемність"
  akson_thai_desc: "Виникнувши на основі старохмерського письма, тайська писемність з часом віддалилася від нього через фонетичні особливості нашої мови. Її наявність допомогла нашому народу сформувати власну унікальну культуру."
  father_governs_children: "Батько править синами"
  father_governs_children_desc: "Наші правителі відомі тісним зв'язком із простим народом. Нехай наші люди живуть вільно та щасливо під керівництвом цих величних, мудрих і освічених наставників."
  thai_war_elephants: "Бойові слони"
  thai_war_elephants_desc: "Бойові слони вже багато століть відомі по всьому Індокитаю і як різновид кавалерії для підтримки піхоти, і як особистий транспорт царів, що охоче влаштовують верхові поєдинки з ворожими ватажками."
  thai_royal_poets: "Придворні поети"
  thai_royal_poets_desc: "Який сенс здобувати перемогу, якщо ніхто не складе про неї пісень? Наш двір має стати мирним притулком поетів, а наша історія — джерелом їхнього натхнення."
  trading_links: "Торговельні зв'язки"
  trading_links_desc: "Наші землі споконвіку є перехрестям торговельних шляхів. Близькість Індії та Китаю забезпечує нам жваву торгівлю, а отже, й тісні зв'язки з багатьма навколишніми країнами."
  foreign_mercenaries: "Чужоземні найманці"
  foreign_mercenaries_desc: "Останнім часом до нас прибуває дедалі більше варварів із далеких земель, серед яких є не лише купці, а й воїни. Їхні вміння стануть у пригоді в наших військах."
  toi_muay: "Той-муай"
  toi_muay_desc: "Ця школа рукопашного бою, яку наші солдати застосовують на війні. Вона включає удари, захоплення та прийоми боротьби в партері. Воїн, що опанував її, смертоносний у бою навіть при втраті зброї."
  trading_embassies: "Торговельні посольства"
  trading_embassies_desc: "Повз наші береги проходить чимало морських шляхів. Завдяки цьому ми знаємо про багато далеких країн і можемо відправляти туди посольства для налагодження постійних відносин."
  photduang: "Пхотдуанг"
  photduang_desc: "Хоча чужоземцю #italic  пхотдуанги#! можуть здатися дивними, вони служать нам як гроші вже багато століть. Ці невеликі срібні кульки з офіційними клеймами становлять основу нашої економіки."
  personal_executions: "Караюча длань правителя"
  personal_executions_desc: "Народ має бачити наше прагнення до правосуддя. Відсьогодні людей, винних в особливо тяжких злочинах, страчуватиме особисто правитель. Цим він наочно покаже, що в нашій країні є закон, який зобов'язані дотримуватися всі."
  close_subjects: "Вірні ленники"
  close_subjects_desc: "Ленники для нас — це не окремі суб'єкти, а невід'ємна частина нашої власної країни, інтегрована в її адміністративно-бюрократичну систему."
  ayu_prestigious_cavalry: "Престиж кавалерії"
  ayu_prestigious_cavalry_desc: "Наші безстрашні вершники б'ються верхи як на конях, так і на слонах. Ці люди, як правило, походять із найшляхетніших родин. Їхня ефективність у підтримці піхоти не викликає сумнівів."
  ayu_white_elephant: "Білий слон"
  ayu_white_elephant_desc: "Білий слон є символом влади правителя. Це дуже добрий знак, який ми можемо використати у своїх цілях. Якщо правитель виїжджає на білому слоні, ніхто не засумнівається в законності його влади."
  ayu_ayutthaya_literature: "$AYU_ADJ$а література"
  ayu_ayutthaya_literature_desc: "До літературного багатства нашої країни належить епічна поезія #italic ліліт#!, що оспівує легендарні війни, дорожня та любовна лірика #italic нірат#!, народні легенди про героїв минулого та захоплені панегірики, що прославляють нинішніх правителів."
  ayu_phrai_luang: "Пхрай луанг"
  ayu_phrai_luang_desc: "Усі вільні люди, що підлягають призову на службу пхрай, зобов'язані служити не лише на війні (#italic пхрай тхаан#!), а й на громадських будівельних роботах за розпорядженням місцевого губернатора."
  ayu_phrai_thaan: "Пхрай тхаан"
  ayu_phrai_thaan_desc: "Кожен чоловік, якому виповнилося 18 років, зобов'язаний зареєструватися та передати владі відомості про себе. Кожен громадянин чоловічої статі підлягає призову на військову службу — і ми подбаємо, щоб він був призваний, якщо в цьому виникне необхідність."
  ayu_floating_rice: "Водяний рис"
  ayu_floating_rice_desc: "Ми вирощуємо рис уже кілька століть, але його врожай нерідко гине через розливи річок. Цей новий різновид рису, здатний рости у воді, стане для нас стабільним джерелом продовольства за будь-яких повеней."
  ayu_sakdina: "Сакдіна"
  ayu_sakdina_desc: "Наше суспільство суворо впорядковане системою під назвою «$ayu_sakdina$», в якій кожній людині відведено своє місце з певною часткою багатства та власності. Це помітно підвищує ефективність збору податків."
  ayu_cosmopolitan_trade: "Вільна торгівля"
  ayu_cosmopolitan_trade_desc: "У нашій країні живе чимало чужоземців, які приїхали до нас у пошуках багатства. Велика кількість людей і товарів, що постійно перетинають наші кордони, надзвичайно вигідна і для нас самих."
  suk_breaker_of_chains: "Визволення від кайданів"
  suk_breaker_of_chains_desc: "Ще не так давно ми перебували під кхмерським гнітом, але зараз нам вдалося здобути свободу і зайняти гідне місце серед незалежних країн. Ми заслужили повагу та захоплення рівних."
  suk_birthplace_of_a_culture: "Осередок культури"
  suk_birthplace_of_a_culture_desc: "Ми стали першою незалежною тайською країною, що звільнилася від кхмерського ярма. Усі представники тайської культури дивляться на нас із захопленням."
  suk_ram_khamhaeng_stele: "Стела «$name_ram_khamhaeng$»"
  suk_ram_khamhaeng_stele_desc: "$suk_ram_khamhaeng_stele$, споруджена за наказом великого правителя давнини, зберегла для нас більшу частину відомостей про витоки $SUK_ADJ$ого царства. Це національна святиня та наочне свідчення нашого місця в історії."
  suk_akson_sukhothai: "$SUK_ADJ$а писемність"
  suk_akson_sukhothai_desc: "$thai_culture$а писемність поширена серед усіх, хто зараховує себе до тайців, проте слід пам'ятати, що вона виникла саме у нас — наші предки створили її на основі писемності кхмерських гнобителів. Цей алфавіт не лише об'єднує всю тайську культуру, а й підкреслює наше особливе місце в ній."
  suk_wat_si_sawai: "Ват Сі Савай"
  suk_wat_si_sawai_desc: "На сукхотайській землі стоїть чимало величних храмів. Одним із найдавніших серед них є $suk_wat_si_sawai$, збудований ще за кхмерів як індуїстське святилище. Після того як ми пристосували його для потреб своєї віри, він став одним із символів нашої ідентичності."
  suk_sukhothai_ceramics: "$SUK_ADJ$а кераміка"
  suk_sukhothai_ceramics_desc: "$thai_culture$а кераміка відома з найдавніших часів: запозичуючи китайські гончарні технології, наші предки доповнювали їх власним характерним стилем. Вироби гончарів нашої країни вважаються особливо цінними та користуються попитом навіть у далеких заморських країнах."
  suk_military_history: "Воєнна історія"
  suk_military_history_desc: "Наша історія пам'ятає чимало воєнних успіхів та великих перемог. Тому військо користується у нас особливою шаною, приваблюючи до своїх лав багатьох підданих."
  suk_unstoppable_army: "Нестримне військо"
  suk_unstoppable_army_desc: "За минулі століття багато хто намагався зупинити нашу експансію, але ніхто не досяг успіху. Наше військо довело, що воно є нестримною силою, здатною змести будь-які перешкоди."
  sia_experienced_ambassadors: "Досвідчені посли"
  sia_experienced_ambassadors_desc: "Основою минулих політичних успіхів нашої країни була не лише військова міць. Дипломатична репутація також помітно посилила наш вплив."
  sia_rise_to_equal_heights: "Рівність усіх земель"
  sia_rise_to_equal_heights_desc: "Багато областей нашої країни майже не заселені. Нам слід створити такі умови, щоб усі наші землі рівною мірою були багатими та процвітаючими."
  sia_advanced_elephant_warfare: "Мистецтво бою на слонах"
  sia_advanced_elephant_warfare_desc: "У наших найвеличніших поемах заведено поіменно перераховувати бойових слонів. Покажемо нашим ворогам, чому слони цього заслуговують."
  sia_consolidation_of_state: "Консолідація країни"
  sia_consolidation_of_state_desc: "Децентралізація влади може послабити наш вплив у віддалених областях. Щоб створити єдину тайську країну, нам треба об'єднати всі провінції."
  sia_education_reform: "Реформи освіти"
  sia_education_reform_desc: "Великий Будда вчив, що ми повинні покладатися не на чужі слова, а на власний досвід. Навчання дає людям знання. Щоб досягти успіху в розвитку технологій, нам слід вкладатися в освіту."
  sia_royal_absolutism: "Абсолютна монархія"
  sia_royal_absolutism_desc: "Другий після Неба — ось яким має бути справжній правитель. Ми шануємо своїх монархів, які правлять Землею подібно до того, як боги правлять Небом."
  sia_thai_unity: "$thai_culture$а єдність"
  sia_thai_unity_desc: "Ми є безперечними лідерами тайського народу. Наші горді воїни безстрашно захищають не лише нашу країну, а й усю тайську культуру загалом."
  rom_spqr: "S.P.Q.R."
  rom_spqr_desc: "Сенат і народ Риму становлять непорушну основу нашої країни. Нехай увесь світ знає, що влада Риму походить не лише від сили, а й від волі його народу та уряду."
  rom_pax_romana: "Pax Romana"
  rom_pax_romana_desc: "Мир під владою Риму — це не стільки відсутність війни, скільки торжество порядку. Спираючись на справедливі закони, розвинену інфраструктуру та сильне військо, ми забезпечуємо стабільність і процвітання в усіх куточках імперії."
  rom_restore_the_legions: "Відродження легіонів"
  rom_restore_the_legions_desc: "Колись римські легіони були грізною силою, яку боялися та поважали в усьому світі. Настав час повернути їм колишню славу, зробивши акцент на порядку, дисципліні та стійкості, які лежать в основі нашого суспільства."
  rom_revival_of_arts_and_culture: "Відродження мистецтва та культури"
  rom_revival_of_arts_and_culture_desc: "Рим був знаменитий не лише своїми військовими досягненнями, а й багатою культурою. Підтримуючи вчених, поетів та художників, ми зможемо знову розпалити той творчий вогонь, який колись освітлював античний світ."
  rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
  rom_new_corpus_juris_civilis_desc: "Ми доручимо нашим правознавцям скласти упорядкований звід законів, заснований на документах часів Юстиніана та старої республіки. Таким чином ми зможемо позбутися застарілих норм та забезпечити рівність усіх громадян перед законом."
  rom_bread_and_circuses: "Хліба та видовищ!"
  rom_bread_and_circuses_desc: "Влада завжди повинна дбати про задоволення свого народу, інакше він може влаштувати бунт. Забезпечивши людей їжею та розвагами, ми зможемо заслужити їхню відданість та забезпечити стабільність нашої країни."
  rom_citizenship: "Римське громадянство"
  rom_citizenship_desc: "Громадянство включає всіх жителів наших володінь у спільний політичний простір. Ми можемо надавати цей привілей як нагороду за службу імперії, тим самим заохочуючи вірність наших підданих та сприяючи їхній інтеграції в наше суспільство."
  rom_all_roads_lead_to_rome: "Всі дороги ведуть до Риму"
  rom_all_roads_lead_to_rome_desc: "Римській дорожній мережі немає рівних у всьому світі. Вона пов'язує різні частини імперії між собою, що значно полегшує сполучення та перекидання військ, а також сприяє розвитку торгівлі."
  rom_provincial_governors: "Провінційні губернатори"
  rom_provincial_governors_desc: "Неможливо керувати такими великими володіннями, покладаючись лише на столичних чиновників. Щоб забезпечити справний збір податків та дотримання законів у найдальших куточках імперії, нам варто делегувати управління цими землями довіреним губернаторам."
  rom_imperium_sine_fine: "Імперія без кордонів"
  rom_imperium_sine_fine_desc: "Вплив Риму не знає кордонів. Нам долею призначено невпинно розширювати свої володіння та нести світло цивілізації скрізь — від Геркулесових стовпів і до самих країв світу."
  rom_triumphs: "Римські тріумфи"
  rom_triumphs_desc: "Тріумф — це не просто формальний вступ до завойованого міста, а скоріше пам'ятне торжество на честь наших хоробрих полководців. Подібні церемонії вселяють нашим підданим трепет і спонукають їх вірно служити країні."
  rom_roman_architecture: "Римська архітектура"
  rom_roman_architecture_desc: "Наші акведуки та амфітеатри є свідченням архітектурної майстерності римських будівельників та інженерів. Ці грандіозні споруди можуть простояти багато сотень років, що лише підкреслює непорушну велич Риму."
  byz_heart_of_orthodoxy_advance: "Серце православ'я"
  byz_heart_of_orthodoxy_advance_desc: "$constantinople$ — серце живої та старовинної віри. Ми пишаємося своїм статусом головної православної імперії, покровителя Вселенського патріархату та захисника християнства від язичників."
  byz_akritai_advance: "Акрити"
  byz_akritai_advance_desc: "Ці легкі війська — горді захисники наших кордонів від зовнішніх загроз. Вони опікуються та захищають довірені їм землі. Акрити — майстри оборонних війн, особливо проти кавалерії, і часто першими реагують на зовнішні загрози."
  byz_cataphracts_advance: "Пізні катафрактарії"
  byz_cataphracts_advance_desc: "Незважаючи на зміни, які принесли з собою порох та розвиток військової справи, ми завжди можемо покладатися на тактику, відточену до досконалості за століття."
  byz_historiography_advance: "Візантійська історіографія"
  byz_historiography_advance_desc: "Наш народ стоїть на плечах гігантів. Запис діянь предків, відстеження родоводів та збереження стародавніх традицій — це робота, що вселяє благоговіння, яка відповідає нашому видатному місцю в історії."
  men_of_letters_advance: "Літератори"
  men_of_letters_advance_desc: "Ні для кого не секрет, що Захід заздрить нашим літературним досягненням та нашому освіченому минулому. Західні країни прагнуть найняти наставників серед представників нашого двору та мріють привласнити знання, що сприяли сходженню могутніх імперій та вплинули на культуру цілого континенту. Завдяки літераторам західні сусіди полюблять нашу історію та переймуть наш спосіб життя."
  byz_shield_of_the_west: "Щит Заходу"
  byz_shield_of_the_west_desc: "Ми стоїмо між Європою та морем язичників, ми — горді захисники, щит від іноземних загроз. Наші мечі завжди будуть перепоною для всякого, хто прагне викорінити нашу віру, і обрушаться на тих, хто прагне покінчити з нашими традиціями."
  byz_court_of_languages: "Двір багатьох мов"
  byz_court_of_languages_desc: "При дворі в Константинополі живе безліч дипломатів і сановників з усіх куточків відомого світу. В результаті тут говорять багатьма мовами, виявляючи повагу до кожної з них. Це явне свідчення нашого процвітання та досягнень нашого народу, чиї історія та мова змінили світ."
  byz_poikilia: "Пойкілія"
  byz_poikilia_desc: "Візантійська культура охопила Європу. Це елегантне поєднання різноманітних відтінків стало новітнім способом відобразити симфонію кольорів і деталей у мистецтві та архітектурі."
  byz_crossroads_of_continents: "На стику континентів"
  byz_crossroads_of_continents_desc: "Візантія стоїть на перетині Європи та Азії. Це завидне положення зробило наше місто важливим гравцем у морській торгівлі."
  byz_the_new_helepolis: "Загарбник міст"
  byz_the_new_helepolis_desc: "Традиція використання та вдосконалення найпотужніших і найвражаючіших облогових знарядь — добре відомий нам аспект ведення війн. Якщо ми адаптуємо та вдосконалимо застосування пороху, наші знаряддя зможуть розтрощити будь-яких ворогів."
  byz_reaffirm_synod_powers: "Реформовані процедури Синоду"
  byz_reaffirm_synod_powers_desc: "У країні таких розмірів, як наша, бюрократія стає справжнім кошмаром. Щоб довести до ладу релігійні процедури й не збирати $orthodox_synod$ з кожного приводу, ми скоротимо кількість бюрократичних перепон і переглянемо закони."
  byz_byzantine_inquisition: "Візантійська інквізиція"
  byz_byzantine_inquisition_desc: "$europe$ охоплена релігійними заворушеннями, і ми повинні бути готові захищатися від бур'янів, які можуть проникнути в наш сад, інакше ризикуємо стати жертвою єресі та нестабільності."
  byz_autokratoria_rhomaion: "Римська автократорія"
  byz_autokratoria_rhomaion_desc: "Наша велика нація є незаперечною наступницею римської величі та престижу. Нашою головною метою має стати повернення цих давно втрачених земель."
  byz_modernized_strategikon: "Удосконалений «Стратегікон»"
  byz_modernized_strategikon_desc: "Цей посібник з ведення війни, складений Маврикієм у незапам'ятні часи, вірою і правдою служив нашому народу у воєнний час. Однак війна змінюється, і нам потрібно змінюватися разом з нею. Наша тактика перебудувалася, наші полки навчилися нових способів бою та освоїли нову зброю, яка куди ефективніше знищує всякого, хто наважиться виступити проти нас."
  byz_ancient_greek_studies: "Вивчення давніх греків"
  byz_ancient_greek_studies_desc: "Знову віднайдена класика та захоплення давньогрецьким мистецтвом відкрили перед Заходом можливість навчити народні маси та зберегти видатні ідеї в різних культурних і наукових галузях."
  byz_the_new_imperial_army: "Нове імперське військо"
  byz_the_new_imperial_army_desc: "Занадто довго наші війська відставали від своїх європейських суперників. Ми повинні провести військові реформи та розширити рекрутський набір, щоб створити військо, гідне могутнього фенікса."
  expand_varangian_guard_advance: "Розширення Варязької гвардії"
  expand_varangian_guard_advance_desc: "Варяги століттями служили нашій країні та славилися своїм кодексом честі й непохитною вірою. Розширивши їхні ряди, ми зміцнимо стабільність і захист Візантії."
  imperatorskiy_moskovskiy_universitet: "Імператорський Московський університет"
  imperatorskiy_moskovskiy_universitet_desc: "Імператорський університет призначений для вивчення філософії, медицини та права. Він відіграє важливу роль у російській освіті та науці. Університет відкрито в рамках реформи російської освіти, задуманої видатним вченим Михайлом Ломоносовим і яка підкреслює важливість об'єднання наукових вишукувань та інновацій."
  hurricane_hardy: "Захист від штормів"
  hurricane_hardy_desc: "Кораблі, створені за проєктами Федора Апраксіна, відрізняються надійністю та міцністю. Вони здатні пережити більшість штормів, які тільки може обрушити на нас матінка-природа. Цей новаторський підхід відіграє важливу роль у наших морських амбіціях, що зароджуються."
  preobrazhensky_semyonovsky_imperial_guard: "Преображенський та Семенівський полки імператорської гвардії"
  preobrazhensky_semyonovsky_imperial_guard_desc: "Потішні війська розділені на елітні підрозділи та утворюють імператорську гвардію, покликану захищати монархію. Вони часто беруть участь у придворних церемоніях, парадах та інших значущих подіях, тим самим підкреслюючи, що їхня роль виходить за рамки військової справи."
  kasztelanowie: "Каштеляни"
  kasztelanowie_desc: "Каштеляни виступають голосом монарха та офіційними представниками у володіннях правителя. Вони відповідають за збір податків та стежать за виконанням законів, часом відіграючи роль суддів від імені корони."
  land_of_promise: "Земля обітована"
  land_of_promise_desc: "Родючі землі в нашому володінні приваблюють безліч переселенців з нижчих станів, які мріють про краще життя та процвітання."
  statute_of_kalisz: "Каліський статут"
  statute_of_kalisz_desc: "Також відомий як «Загальна хартія єврейських свобод», цей закон містить статті, що дарують усім євреям свободу віросповідання, торгівлі та переміщення. Статут також спрямований на скорочення звинувачень євреїв у кривавому наклепі, пропагованому католицькою церквою."
  corona_regni_poloniae: "Корона Королівства Польського"
  corona_regni_poloniae_desc: "Ідея про те, що королівство неподільне і є спільною власністю всієї політичної спільноти в наших володіннях, а не однієї династії чи монарха, міцно засіла в нашій свідомості та в умах підвладних нам князів."
  krakow_grosz: "Краківський грош"
  krakow_grosz_desc: "У спробі реформувати фінансову систему ми представили нову валюту — краківський грош. Ці монети карбуються зі срібла і покликані кинути виклик пануванню богемського празького гроша та зробити нашу країну прикладом централізованого оподаткування."
  stone_and_brick: "Камінь та цегла"
  stone_and_brick_desc: "Століттями ми покладалися на неміцну деревину при будівництві поселень та захисту від ворогів. Тепер же ми склали план розвитку інфраструктури наших володінь, що спирається на скарбницю та політичну вагу. Ми успадкували дерев'яні міста, але після себе залишимо укріплення з каменю та цегли."
  council_of_three_lands_advance: "Ваад трьох земель"
  council_of_three_lands_advance_desc: "Наша країна здавна приймала у себе знедолених та гнаних євреїв. Підтримати стабільність та духовну силу нам допоможе рада, заснована для задоволення їхніх потреб та захисту прав."
  polish_renaissance: "Польське Відродження"
  polish_renaissance_desc: "Завдяки натхненню від італійського Відродження в наших художніх галереях також розквітнуть мистецтво та культура."
  granary_of_europe: "Амбар Європи"
  granary_of_europe_desc: "Завдяки фільварковій системі родючі землі наших володінь дають найбагатші в Європі врожаї зернових. Подібне достаток дозволяє нам постачати ринки за межами своїх кордонів. Наш народ продовжить процвітати, не побоюючись голоду."
  komisja_edukacji_narodowej: "Едукаційна комісія"
  komisja_edukacji_narodowej_desc: "У відповідь на потребу нашого уряду в умілих адміністраторах, а також заради ефективного управління ми створимо перше в Європі міністерство освіти, покликане підвищувати грамотність серед населення."
  szkola_rycerska: "Лицарська школа"
  szkola_rycerska_desc: "Навчаючи нове покоління дворян і закладаючи в них почуття національної гордості, ми на багато поколінь забезпечимо себе вмілими військовими та чиновниками."
  great_sejm_reforms: "Реформи Великого Сейму"
  great_sejm_reforms_desc: "Щоб вижити й процвітати далі, ми повинні забезпечити надійну роботу державного механізму та закласти під нього міцний фундамент. Парламент перейде на більш сучасний режим роботи та передасть свої нові повноваження. Мета цієї еволюції в тому, щоб послабити владу аристократів і скоротити кількість зловживань, що допускаються інститутом кріпосного права."
  late_winged_hussars_advance: "Пізні крилаті гусари"
  late_winged_hussars_advance_desc: "У XVII столітті польські гусари отримали подальший розвиток, прийнявши на озброєння важкі обладунки, пофарбовані в білий і червоний кольори. Вони йшли в бій з піками завдовжки близько шести метрів. Таранний удар гусарів був воістину жахливим, нерідко він підривав бойовий дух ворога і змушував його в паніці тікати."
  winged_hussars_advance: "Крилаті гусари"
  winged_hussars_advance_desc: "Спочатку гусари були легкою розвідувальною кавалерією, але з занепадом старого феодального війська ми стали покладатися на професійні полки. Важкі гусари стануть ядром оновленого війська. Незабаром усі почнуть боятися польських крилатих гусарів."
  wojsko_komputoe: "Компутове військо"
  wojsko_komputoe_desc: "Компутове військо спиралося на розрахований Сеймом річний бюджет. Ідея полягала в тому, щоб дати Речі Посполитій регулярне військо для оборони."
  folwark_system: "Фільваркова система"
  folwark_system_desc: "Фільваркова система — це виробнича система, що заохочує надлишки сільськогосподарської продукції. Селян спонукали працювати у фільварках на правах орендарів або під примусом. Ця система стала основою польської економіки."
  baihua: "Письмова байхуа"
  baihua_desc: "Наші володіння тягнуться далеко за горизонт. Поява спільної писемності для наших підданих усуне прірву між нами, допоможе розвитку культури та зменшить кількість конфліктів, спричинених непорозумінням і мовними відмінностями."
  zaju: "Цзацзюй"
  zaju_desc: "Це поєднання танцю та музики, яке зазвичай ділиться на чотири акти, яскраво відображає культурні висоти нашого суспільства."
  successors_of_genghis_khan: "Наступники $genghis_khan_name_no_tooltip$а"
  successors_of_genghis_khan_desc: "Ми пройшли шлях від тотальних завоювань до епохи безкрайньої імперії $genghis_khan_name_no_tooltip$а. Наш народ походить з багатьох поколінь великих полководців, яким судилося переписати історію."
  confucian_influences: "Конфуціанський вплив"
  confucian_influences_desc: "Щоб належно керувати країною, наші радники повинні шукати мудрості у вченнях Конфуція, звертати увагу на деталі та прагнути меритократії. Тільки так можна створити здоровий і процвітаючий уряд."
  extensive_canal_works: "Розширення каналів"
  extensive_canal_works_desc: "Численні річки, що перетинають наші володіння, обіцяють нам процвітання. Щоб поставити це багатство собі на службу, ми створимо інфраструктурну мережу та зможемо перенаправляти воду, а також перевозити людей і вантажі між річками та поселеннями далеко від водойм."
  zhongshu_sheng: "Чжуншу Шен"
  zhongshu_sheng_desc: "Центральний секретаріат — це одна з найважливіших гілок #italic трьох департаментів і шести міністерств#!. Він відповідає за складання упорядкованого зводу імператорських реформ та указів."
  lijia_system: "Система лі цзя"
  lijia_system_desc: "У рамках системи лі цзя ми можемо контролювати прикордонні землі, розселяючи на них військових. Передаючи землю та права на її обробку розміщеним на кордонах військам, нам вдасться захистити кордони та значно посилити контроль над ними."
  yulin_tuce: "Юйлінь туце"
  yulin_tuce_desc: "Наші предки часто стикалися з несплатою податків. Склавши реєстри для всіх районів і провінцій, ми зможемо краще відстежувати, скільки податків належить уряду з кожної ділянки землі. Ця система оподаткування переважно спирається на врожай зернових з кожної обстеженої ділянки."
  weisuo_system: "Вей со"
  weisuo_system_desc: "Багато іноземних завойовників прагнуть підкорити наші землі. Тому ми повинні створити систему гарнізонів для швидкого реагування на вторгнення. Завдяки набору місцевих військ наша здатність до оборони зміцниться за рахунок припасів та ефективнішої логістики."
  grand_coordinators: "Масштабна координація"
  grand_coordinators_desc: "Щоб зберегти нашу династію, необхідно утримувати контроль над територіями, визначати політичний курс та керувати військами. Завдяки заснуванню комітету з високопоставлених чиновників ми зможемо зміцнити своє становище, привнісши стабільність у зовнішні та внутрішні справи."
  the_censorate: "Цензурне управління"
  the_censorate_desc: "Ця гілка нашого уряду працює паралельно з іншими інститутами та відповідає за протидію корупції. До завдань цензорів входить боротьба з палацовими інтригами та зловживаннями. Їх часто вважають очима та вухами імператора."
  the_tea_trade: "Торгівля чаєм"
  the_tea_trade_desc: "Чай — це знаковий напій нашого суспільства. Він улюблений багатьма та переважає на всіх громадських зустрічах. Торгівля ним безсумнівно призведе не тільки до зростання різноманітності сортів чаю, а й до підвищення продуктивності."
  tu_bing: "Ту бін"
  tu_bing_desc: "У зв'язку з потребою повноцінно захищати наші кордони стало очевидним, що нам потрібна система набору, орієнтована на місцевих солдатів та захисників. Ці люди відмінно доповнять наші бойові можливості незалежно від системи #italic вей со#!."
  tusi_titles: "Титули туси"
  tusi_titles_desc: "Ці титули та адміністративні посади даруються воєначальникам та місцевим вождям. Вони покликані запобігати заворушенням та тримати місцеве населення під контролем центральної влади."
  salt_monopoly: "Відновлення монополії на сіль"
  salt_monopoly_desc: "У минулому монопольна торгівля сіллю була одним з головних джерел доходів скарбниці. Однак попередні імператори вирішили покінчити з нею в інтересах торгівлі. Настав час повернути торгівлю сіллю під контроль країни."
  reform_the_grand_secretariat: "Реформа внутрішньодвірцевого секретаріату"
  reform_the_grand_secretariat_desc: "#italic Внутрішньодвірцевий секретаріат#! вважається по суті верховним інститутом у наших землях і завжди надавав підтримку нашим правителям. Враховуючи його величезний вплив в адміністративних питаннях, потрібно провести реформу секретаріату, щоб підвищити його ефективність."
  grand_military_parades: "Великі військові паради"
  grand_military_parades_desc: "Славна воєнна історія нашого народу буде виставлена на загальний огляд. Під час військових парадів ми продемонструємо свій воєнний досвід та ні з чим незрівнянну силу."
  silver_standard: "Срібний стандарт"
  silver_standard_desc: "Щоб спростити збір податків та збільшити свої доходи, ми звернемо більшу частину зобов'язань на користь уряду — починаючи з подушного податку та закінчуючи трудовими повинностями селян або виплатами місцевим чиновникам — в єдину виплату сріблом, яка залежить від чисельності населення та площі оброблюваних земель у кожній з префектур."
  nine_garrisons_of_the_great_wall: "Дев'ять гарнізонів Великої стіни"
  nine_garrisons_of_the_great_wall_desc: "Для захисту від лютих варварів мало просто лагодити Велику стіну. Дев'ять гарнізонів являють собою військові містечка вздовж стіни, які не тільки допоможуть нам захищати ключові проходи, а й покращать ситуацію з логістикою на північному кордоні."
  the_red_cannon: "Червона гармата"
  the_red_cannon_desc: "Нехай руді варвари з Європи нецивілізовані та погано виховані, зате вони знають, як створювати добротні гармати та вогнепальну зброю. Імпортуючи та копіюючи їхню зброю, ми посилимо своє військо та зможемо ефективно стримувати будь-яких загарбників."
  woodblock_printing: "Ксилографія"
  woodblock_printing_desc: "Виробництво тонких зображень, художніх робіт та книг за допомогою цього методу друку заволоділо увагою нашого народу, і він забажав удосконалити цю технологію. Ксилографія стала частиною нашої культури, а завдяки недавнім поліпшенням публікація текстів лише сильніше підкріпить наш престиж!"
  green_standard_army: "Військо Зеленого прапора"
  green_standard_army_desc: "Військо Зеленого прапора, що складається переважно з етнічних ханьців, співіснує з нашими Восьмипрапорними військами. Спочатку вона створювалася зі солдатів, що здалися в полон, набиралася на основі добровільної довгострокової служби та приваблювала представників пригноблених класів. Після об'єднання вона виступала як поліція і відіграватиме важливу роль у місцевому військовому управлінні, а прапори використовуватимуться у разі надзвичайних ситуацій та затятого опору."
  great_tax_reform: "Велика податкова реформа"
  great_tax_reform_desc: "Наша велика нація не знає нестачі в монетах та родючих полях. І якщо ми хочемо керувати нею як належить, потрібно застосовувати нові форми оподаткування для створення здорового бюджету."
  junji_chu: "Цзюньцзі чу"
  junji_chu_desc: "#italic Цзюньцзі чу#!, також відомий як Велика рада, відповідає за військові питання. Він є головною таємною радою і затьмарив собою внутрішньодвірцевий секретаріат, заснований попередніми династіями. Попри свою ключову роль, рада залишиться неформальним об'єднанням внутрішнього двору, функціонуючи паралельно з іншими обов'язками членів ради."
  jingdezhen_porcelain: "Цзіндечженьська порцеляна"
  jingdezhen_porcelain_desc: "Цей символ процвітання суспільства та вершина мистецтва є одним із знакових товарів нашого народу. Удосконаливши виробництво порцеляни та створивши нову, поліпшену версію, #italic цзіндечженьську порцеляну#!, ми зможемо розширити свій культурний вплив."
  sanxitang: "Саньсітан"
  sanxitang_desc: "Зал трьох раритетів є сховищем найрідкісніших і найцінніших об'єктів та предметів мистецтва. Завдяки заступництву правителя тут стали проводити наукові дискусії, лекції та навіть культурні заходи, сприяючи обміну ідеями та розвитку науки."
  monuments_to_greatness: "Монументи величі"
  monuments_to_greatness_desc: "Наша історія налічує тисячі років, і наш народ завдяки своїй завзятості пережив немислимі катастрофи. Визнання власної сили стало рисою нашого суспільства. Наша стійкість виражається в могутності нашого війська та пишноті нашого мистецтва."
  ten_great_campaigns: "Десять великих кампаній"
  ten_great_campaigns_desc: "Десять великих кампаній покликані розширити наш вплив усередині кордонів та за їх межами. Для цього ми наберемо величезне військо, яке придушить будь-який опір і розчавить у зародку самі думки про заколот. Наша слава буде вічною."
  tributary_system: "Система данників"
  tributary_system_desc: "Це система підпорядкування місцевих вождів та правителів, які надсилають нам дари, визнаючи тим самим нашу владу. Удосконалення та централізація цієї системи лише зміцнять наш контроль над ними."
  timurid_cavalry: "Тимуридська кавалерія"
  timurid_cavalry_desc: "Великий Чингісхан панував у степах завдяки своїй кінноті, і ми теж прийдемо до тріумфу завдяки нашим коням. Наша кавалерія покликана вести нещадну війну. У цих сідлах сидять найкращі воїни, які вселятимуть страх у серця ворогів."
  timurid_architecture: "Тимуридська архітектура"
  timurid_architecture_desc: "Століттями весь відомий світ заздрив перській архітектурі. Ми повинні посприяти розвитку нового типу архітектури, щоб зайняти місце, що належить нам по праву народження."
  the_mantle_of_the_great_khan: "Мантія великого хана"
  the_mantle_of_the_great_khan_desc: "Після смерті $genghis_khan_name_no_tooltip$а виник вакуум влади, і до звільненого місця кинулися ті, кому цього робити не варто було. Однак завдяки шлюбам ми зміцнили своє право вважатися нащадками великого хана, і тепер воїни степів знають, за ким їм слідувати."
  turco_persian_tradition: "Тюрко-перська традиція"
  turco_persian_tradition_desc: "Немає сенсу заперечувати, що $persia_region$ — це споконвічний центр культури та мов, який впливав на різні тюркські народи, що століттями населяли його околиці. Ми підтримаємо таке змішання та створимо власні культурні традиції."
  tamerlane_chess: "Шахи Тамерлана"
  tamerlane_chess_desc: "Цей новий варіант шахів, створений засновником нашої династії, покращує ранні версії. З його допомогою наші полководці зможуть відточувати свою майстерність у стратегії та тактиці."
  chagatai_literature: "Карлуцька література"
  chagatai_literature_desc: "Карлуцька мова східних степів набагато більше гідна бути носієм думок та ідей нашого великого роду, ніж перська чи арабська. Ми повинні сприяти поширенню мови наших предків та створити нову літературну традицію."
  nambardar_levy: "Ополчення намбардарів"
  nambardar_levy_desc: "$nambardar_levy$, #italic čerig-i nambardar#!, — це військо не монгольського і не тюркського походження. Вони набираються з місцевого іранського населення, що дозволяє нам значно збільшити розміри війська."
  timurid_renaissance: "$TIM_ADJ$е Відродження"
  timurid_renaissance_desc: "З часів ранньої тимуридської експансії наші землі приваблювали великих творців та видатних мислителів. Продовжуючи покровительствувати мистецтву, наукам та літературі, ми перетворили $herat$ та $samarkand$ на найяскравіші перлини світу."
  riches_of_the_silk_road: "Контроль над Шовковим шляхом"
  riches_of_the_silk_road_desc: "Поки наші купці контролюють торгівлю, що тече через Трансоксіану та Самарканд, ніщо не заважатиме руху товарів і багатство нашої династії продовжить зростати."
  reform_the_diwan: "Реформа дивану"
  reform_the_diwan_desc: "Нам пощастило, що у нас на службі перебувають вірні та освічені перські чиновники, які протягом поколінь відточували мистецтво управління. На жаль, спадкові посади поступово призводять до стагнації та відсутності інновацій. Знижуючи кількість таких посад з кожним поколінням, ми зможемо винагороджувати не тільки вірних, а й здібних. Умілі чиновники повинні займати високопоставлені посади незалежно від свого походження."
  conquerors_legacy: "Спадщина завойовника"
  conquerors_legacy_desc: "Наша славна імперія — це спадщина великих завойовників. Завдяки лютості своїх військ $genghis_khan_name_no_tooltip$ зміг підкорити землі від Європи до Китаю. Ми його наступники, і наші війська будуть такими ж грізними, як і його."
  glh_kipchak_khanate: "Кипчацьке ханство"
  glh_kipchak_khanate_desc: "Наша велика держава також відома як Кипчацьке ханство, що править Половецьким або Кипчацьким степом. Враховуючи, які обширні простори знаходяться під нашою владою, ми зможемо набирати незліченні полчища бійців."
  glh_legacy_of_jochi: "Спадщина Джучі"
  glh_legacy_of_jochi_desc: "Джучі, син $genghis_khan_name_no_tooltip$а, ненабагато пережив свого батька, проте його присутність та спадщина продовжують відчуватися в нашій країні, настільки, що нас навіть називають Улусом Джучі. Воїни стікатимуться під наші знамена, щоб зберегти цю спадщину."
  glh_legacy_of_the_golden_horde: "Спадщина Золотої Орди"
  glh_legacy_of_the_golden_horde_desc: "Світ здригнеться перед нами! Ми були однією з головних частин імперії $genghis_khan_name_no_tooltip$а, а тепер є головною політичною силою Східної Європи та степів."
  glh_perso_mongol_administration: "Персо-монгольська адміністрація"
  glh_perso_mongol_administration_desc: "Наші предки століттями відточували монгольську адміністративну систему, проте не соромилися об'єднувати ідеї та методи підкорених народів. Наша система управління частково спирається на традиції, що сягають великого $genghis_khan_name_no_tooltip$а, а частково на запозичення у перських та мусульманських чиновників з підкорених земель."
  glh_tatar_traditions: "Татарські традиції"
  glh_tatar_traditions_desc: "Хоч наша імперія більше й не управляється із сідла, до війська це не відноситься. Протягом століть ми не втрачали зв'язків із корінням і завжди намагалися, щоб рівень майстерності наших вершників залишався недосяжним. Переймаючи нові технології та тактики в майбутньому, ми станемо спиратися на сильну організацію та військові традиції Монгольської імперії."
  glh_secure_the_trade_routes: "Захист торгових шляхів"
  glh_secure_the_trade_routes_desc: "Не всі багатства світу походять із наших земель. Торгівля — джерело добробуту, і Золота Орда завжди захищала купців. Гарантувавши безпеку всякому, хто бажає перевезти товари через наші землі, ми забезпечимо приплив хутра, китайських виробів, шовку, прянощів та інших предметів до наших міст. Не так важливо, чи будуть ці товари продаватися в них. Сама їхня присутність посприяє збагаченню нашого народу."
  glh_religious_pragmatism: "Релігійний прагматизм"
  glh_religious_pragmatism_desc: "Обмеження та жорсткі доктрини ніколи не користувалися популярністю серед татарських орд. Коли великий $Oz_Beg$-хан прийняв іслам, це був іслам суфійських шейхів або фанатичних каді, яких він запросив до своїх земель. Наша країна стоїть на багатовікових традиціях та відданості. Релігія відіграє в цьому свою роль, але ми б воліли бачити свою країну процвітаючою, а не розпалася на частини в спробах змусити всіх слідувати спільній вірі."
  glh_modernization_of_steppes: "Модернізація степів"
  glh_modernization_of_steppes_desc: "У далекому минулому війська $genghis_khan_name_no_tooltip$а володарювали у безкраїх степах. Наша країна перевершила мрії нашого предка, і тепер ми самі по собі є значною силою. Ми модернізуємо свої території і станемо зразком для всього світу."
  cri_genghisid_legacy: "Спадщина Чингізидів"
  cri_genghisid_legacy_desc: "Наші предки воювали пліч-о-пліч з Чингісханом під час його завойовницьких походів. Нині нашою країною правлять нащадки великого хана, і ми продовжуємо свято зберігати військові традиції минулих поколінь."
  cri_slavers: "Степові работорговці"
  cri_slavers_desc: "Торгівля рабами — вкрай прибуткова справа. Зокрема, на турецьких, арабських та перських ринках можна виручити велику суму за полонених християн."
  cri_free_cattle_grazing: "Вільний випас худоби"
  cri_free_cattle_grazing_desc: "Ми ніяк не обмежуємо випас коней та іншої худоби в наших володіннях. Наші скотарі та пастухи можуть вільно займатися своєю справою та торгувати в будь-якому районі степів."
  cri_steppe_commanders: "Степові командири"
  cri_steppe_commanders_desc: "Кримські вершники досконало опанували техніку бою в степу. Вони вміло використовують швидкість своїх скакунів, влаштовуючи засідки та атакуючи незграбні європейські війська з флангів."
  cri_devshirme_of_the_steppes: "Девширме степів"
  cri_devshirme_of_the_steppes_desc: "Кримська знать багато чого запозичила в османів у галузі військової справи. Це призвело до створення особливої системи набору та підготовки воїнів, що об'єднує в собі тюркські та ісламські практики."
  chg_legacy_of_chagatai: "Спадщина Чагатая"
  chg_legacy_of_chagatai_desc: "Спадщина $genghis_khan_name_no_tooltip$а живе в нас через його сина Чагатая. Усі здригнуться перед нами, коли ми відродимо його славу."
  chg_chagatai_riders: "Кіннота Чагатая"
  chg_chagatai_riders_desc: "Коні $genghis_khan_name_no_tooltip$а топтали землю від Європи до Китаю. Ми його спадкоємці та наступники, і наша кавалерія буде вселяти ворогам такий же страх."
  chg_the_mountain_khanate: "Гірське ханство"
  chg_the_mountain_khanate_desc: "Ми сховалися між озером Балхаш і горами Тянь-Шань. Ця сувора земля не прощає помилок, але ми можемо використовувати її як зброю проти потенційних загарбників."
  chg_border_wars: "Нескінченні прикордонні війни"
  chg_border_wars_desc: "Ми оточені ворожими народами і стикаємося з постійною необхідністю охороняти свої кордони. У наших пильних солдатів повно можливостей відточувати свої навички в бою, що перетворило нас на народ загартованих воїнів, готових відродити спадщину великого хана."
  chg_sons_of_chagatai: "Сини Чагатай-хана"
  chg_sons_of_chagatai_desc: "Ми походимо від Чагатай-хана, другого сина Чингісхана, який колись правив цими землями і створив могутню країну — наступницю Монгольської імперії. Відтоді минуло багато часу, проте ми можемо зміцнити свою легітимність, звернувшись до спадщини нашого предка."
  chg_tradition_of_conquest: "Традиція завоювання"
  chg_tradition_of_conquest_desc: "Підкорення народів — справа непроста, не всі готові прийняти наше просвітлене правління. Однак ми знайшли простіші способи включати народи до своєї імперії, не зводячи піраміди з черепів. Наші предки цьому так і не навчилися."
  chg_scheming_court: "Придворні інтриги"
  chg_scheming_court_desc: "Постійна боротьба між князями та місцевими аристократами, а також містами та племенами Чагатайського ханства породила націю вправних інтриганів. Якщо нам вдасться забути про внутрішні чвари та спрямувати цю енергію на те, щоб перехитрити ворогів, це принесе нашому народу величезну користь."
  chg_glory_of_conquest: "Слава завоювань"
  chg_glory_of_conquest_desc: "Нехай усі знають, що хлопчик не стане чоловіком, доки не проскаче в лавах нашого непереможного війська; що йому не бачити дружини, доки він не візьме дружину іншого чоловіка; що він не заслуговує свого житла, доки не спалить чуже. Нехай служба в нашому війську буде єдиним способом стати чоловіком."
  chg_unrelenting_horde: "Невблаганна орда"
  chg_unrelenting_horde_desc: "Наші війська пройдуть по землі подібно до великих орд $genghis_khan_name_no_tooltip$а. Копита наших коней розтопчуть ворогів, немов стебла трави в степах. Усі боятимуться сили наших військ!"
  mge_pax_mongolica: "Pax Mongolica"
  mge_pax_mongolica_desc: "Ми об'єднали під своїм знаменом усі монгольські території. Наш народ пізнає стабільність і процвітання, яких не було з часів великого $genghis_khan_name_no_tooltip$а."
  mge_all_under_a_khan: "Усе під владою хана"
  mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ об'єднав під своїми знаменами великі території. Ми знову зібрали їх під владою одного хана, і всі жителі нашої імперії присягнуть на вірність нашому знамену."
  mge_ghostly_horses_of_the_plain: "Примарні коні рівнин"
  mge_ghostly_horses_of_the_plain_desc: "Слава монгольських вершників відома по всьому світу. Наші вороги тремтітимуть від страху при вигляді клубів пилу на горизонті, побоюючись, що це наближається наша кіннота!"
  mge_yeke_mongol_ulus: "Велика Монгольська країна"
  mge_yeke_mongol_ulus_desc: "Ми справжні монголи, ми відродили #italic Їх Монгол улс#!, Велику Монгольську країну, і повернули славу імперії великого $genghis_khan_name_no_tooltip$а. Якщо випаде шанс, наш народ спробує відтворити звершення великого хана і відродити його спадщину, знову об'єднавши колись великі території Монгольського ханства."
  mge_life_of_steppe_warrior: "Життя степового воїна"
  mge_life_of_steppe_warrior_desc: "Для непідготовленої людини степ — це зловісне місце, яке не прощає помилок. Наш народ звик жити в найсуворіших умовах, тому ми відрізняємося стійкістю та вміємо виживати. Усі наші солдати повинні мати досвід і навички виживання."
  mge_multicultural_empire: "Багатокультурна імперія"
  mge_multicultural_empire_desc: "Території великої Монгольської імперії включають безліч земель і народів, об'єднаних славним правлінням великого хана."
  mge_improved_yam_system: "Розвинена ямська система"
  mge_improved_yam_system_desc: "Система ямів, за часів $genghis_khan_name_no_tooltip$а розкинута по всій імперії, значно спрощувала сполучення та логістику. Ми відновили та покращили цю систему, тому наші гінці здатні долати великі простори імперії зі швидкістю, яка раніше вважалася неможливою."
  mge_mongolian_mobility: "Монгольська мобільність"
  mge_mongolian_mobility_desc: "Зазвичай кожен з наших вояків утримує трьох або чотирьох скакунів, аби міняти їх щоразу, коли кінь стомлюється, і цілими днями рухатися з високою швидкістю без зупинок. Ба більше, зайві коні — це запас їжі у вигляді молока та конини, що куди краще захищає наші війська від голоду в порівнянні з військами так званих цивілізованих країн. Завдяки цьому ми з легкістю можемо обходити ворогів і перетинати великі території зі швидкістю, яка здасться їм немислимою."
  mge_kheshig: "Кешики"
  mge_kheshig_desc: "Кешики в минулому були охоронцями великого монгольського хана. Їхні нащадки продовжать оберігати хана, коли той поскаче в битву з ворогами його народу!"
  mge_glory_of_the_khan: "Слава хана"
  mge_glory_of_the_khan_desc: "Великий $genghis_khan_name_no_tooltip$ зібрав величезне військо, якого ще не бачив світ. Ми спадкоємці його слави, і наше військо затьмарить навіть незліченні монгольські армії минулого."
  horse_lords: "Степові повелителі коней"
  horse_lords_desc: "Людина — це найбільший зі звірів. Новонароджених жеребців ми ростимо серед своїх дітей, аби вони вчилися бути такими ж благородними та лютими, як наш народ. Ми визнаємо, що жорстке дресирування — наше головне досягнення, і коні визнають у нас своїх господарів."
  kurultai_advance: "Курултай"
  kurultai_advance_desc: "Зібравши всіх ватажків військових загонів, ми зможемо обрати хана, який приведе наші орди до перемоги. У цьому шатрі вирішуватиметься доля нашого народу, обиратимуться лідери з тих кандидатів, хто вважатиме себе гідними вести нас."
  beyond_the_sun: "За сонцем"
  beyond_the_sun_desc: "Епоха великих орд ще не закінчилася. Ми навчилися на помилках своїх ворогів, стали мудрішими та сильнішими. Усі землі, де живе і вмирає сонце, будуть нашими."
  steppe_slave_raiding: "Степові набіги за рабами"
  steppe_slave_raiding_desc: "Наші нальотчики стрімкі як вітер, вони завдають удару і зникають перш, ніж їх помітять. Розорення поселень, що зазнали нападу, дозволяє не тільки розжитися грошима, а й здобути полонених, яких можна вигідно продати."
  caravanserai_advance: "$caravanserai$"
  caravanserai_advance_desc: "Торгові маршрути, що склалися в Середній Азії за минуле тисячоліття, призвели до появи дорожньої мережі, відомої як Шовковий шлях. Ключем до її розквіту стали караван-сараї, місця вздовж шляху, де купці та каравани можуть зупинитися на відпочинок."
  borjigin_blood: "Кров Борджигінів"
  borjigin_blood_desc: "У нас тече кров Борджигінів, кров самого $genghis_khan_name_no_tooltip$а. Усі країни схиляться перед нашою спадщиною, усі землі в степу визнають нас своїми."
  turco_mongol_tradition: "Тюрко-монгольські традиції"
  turco_mongol_tradition_desc: "Хоча династія Борджигінів родом з Монголії, на землях Середньої Азії, завойованих Чингісханом, проживали переважно тюрки. У результаті ці дві групи змішалися, породивши унікальну культуру."
  yams_of_the_great_khan: "Система ямів великого хана"
  yams_of_the_great_khan_desc: "Щоб гінці встигали за монгольськими військами, Чингісхан заснував систему ямів — поштових станцій, встановлених на відстані 30–60 кілометрів одна від одної. Там монгольських гінців чекала їжа, нічліг і змінні коні. Це дозволяло їм переміщатися зі швидкістю кінського галопу, і втома більше не впливала на гінця. Завдяки цьому наша імперія зуміла впоратися з логістичними проблемами, спричиненими розмірами Pax Mongolica — принаймні, на якийсь час."
  mandate_of_the_khan: "Ханський мандат"
  mandate_of_the_khan_desc: "$rank_kingdom_horde_ruler_suffix_male$ наказує, і боги підкоряються. Єдність нашого народу походить з вірності великому лідеру. Лише той, хто здатен переламати волю тих, хто схилив коліно перед короною, гідний нашої відданості."
  there_shall_be_no_grass: "Трави не буде"
  there_shall_be_no_grass_desc: "Там, де пройшла орда, ніколи не буде рости трава, земля більше не годуватиме наших ворогів, минатимуть дні та ночі, але земля залишиться безмовною, не даючи врожаю. Від цього голоду немає порятунку."
  slavery_before_death: "Рабство замість смерті"
  slavery_before_death_desc: "Війна неможлива без розорення міст. У минулому наші воїни нещадно руйнували та грабували чужі поселення, винищуючи всіх на своєму шляху. Це підвищувало їхній бойовий дух, але було невигідно з економічної точки зору. Новий підхід передбачає, що як мінімум працездатних людей тепер звертатимуть у рабство замість того, щоб одразу різати їм горлянки."
  horde_loyalty: "Вірність орди"
  horde_loyalty_desc: "Вірність нашого народу не підлягає сумніву. Жодна жива душа під владою хана й думати не посміє про те, щоб покинути нас."
  horde_loot_discovery_advance: "Прибуток від набігів"
  horde_loot_discovery_advance_desc: "Набіги завжди відігравали значну роль у нашому житті. Через грабунок і розорення наш народ тренується та накопичує багатства. У нальотах немає нічого поганого. У всякому разі, для нас."
  trampling_horde: "Попираюча орда"
  trampling_horde_desc: "Завоювання $genghis_khan_name_no_tooltip$а потрясли весь світ, і ми наслідуватимемо його приклад. Світ боятиметься галопу наших коней."
  watchers_of_the_silk_road: "Доглядачі Шовкового шляху"
  watchers_of_the_silk_road_desc: "Ми не будуємо, ми не торгуємо. Ми просто беремо все необхідне… а часом і трохи більше. Наші воїни уважно стежили за іноземними купцями та їхніми методами ведення справ, і тепер ми знаємо безпечні шляхи перевезення наших товарів."
  logistics_of_khan: "$rank_kingdom_horde_ruler_suffix_male$ська логістика"
  logistics_of_khan_desc: "Люди забувають, що завоювання великого хана були можливі не тільки завдяки перевазі у військовій силі, а й завдяки чудовій логістиці. Ми повинні відтворити методи великого хана, адаптувавши їх під потреби часу. Це дозволить нам здійснювати масштабніші завоювання."
  populating_the_steppes: "Заселення степів"
  populating_the_steppes_desc: "Ми несемо розруху ворогам, але ми також повинні приносити мир тим, хто населяє наші володіння. Підтримуючи внутрішній мир і спонукаючи талановитих жителів нашої імперії планувати та заселяти нові великі міста, ми зможемо підкорити степи."
  a_magnanimous_empire: "Великодушна імперія"
  a_magnanimous_empire_desc: "Процвітаюче правління великого хана відоме завдяки не тільки його грізному мечу, а й великодушності до тих, хто вчинив мудро і схилив перед ним коліно. До тих, хто прийме нашу терпиму імперію, ми ставитимемося як до її частини."
  horde_ardor: "Рвіння орди"
  horde_ardor_desc: "Вороги бояться наших лютих і грізних коней не менше, ніж їхніх вершників. Вид нашої кінноти, що прямує на війну, народжує в голові образ нестримного війська з пекла."
  ira_sasanian_heritage: "Спадщина Сасанідів"
  ira_sasanian_heritage_desc: "До ісламського завоювання Персія була центром Сасанідської імперії, що розкинулася від Кавказу на заході до Кіртхарських гір на сході. Великі досягнення цієї імперії мали величезний вплив на перське мистецтво та культурну ідентичність."
  ira_islamized_persia: "Перський іслам"
  ira_islamized_persia_desc: "Хоча ісламізація Персії все ще триває, мусульманська віра вже стала одним зі стовпів нашої ідентичності. Стародавні перські традиції, об'єднані з вченням ісламу, лягли в основу наших нинішніх базових цінностей."
  ira_shahnameh: "$shahnameh$"
  ira_shahnameh_desc: "Поема #italic $shahnameh$#!, також відома як «Книга царів», — національний епос перського народу. Вона описує історичне та міфічне минуле імперій, що існували на території Великої Персії. Поема мала величезний вплив на формування нашої культури."
  ira_restoration_of_cities: "Відновлення міст"
  ira_restoration_of_cities_desc: "Монгольська навала 1219–1221 років стала катастрофою для всієї Персії: багато її величних і багатолюдних міст перетворилися на руїни. Час відбудувати їх заново та відродити колишню славу перської метрополії."
  ira_improved_silk_road: "Розвиток Шовкового шляху"
  ira_improved_silk_road_desc: "Систематичний ремонт доріг та мостів, посилення охорони (та запровадження невеликого збору на її утримання), будівництво караван-сараїв, аби подорожнім було де відпочивати — все це не лише полегшить життя купцям, що возять свої товари Шовковим шляхом, але й збільшить доходи нашої країни."
  ira_promotion_of_irrigation: "Поширення іригації"
  ira_promotion_of_irrigation_desc: "Після монгольської навали перський регіон порівняно знелюднів: у ньому стало набагато менше жителів, ніж за минулих імперій. Щоб оговтатися від втрат та відновити населення, нам слід підтримувати сільське господарство, сприяючи іригації придатних для обробітку земель."
  ira_persian_horses: "Перські коні"
  ira_persian_horses_desc: "Коні відіграють фундаментальну роль у житті нашого суспільства. Багато персів з дитинства дбають про цих благородних тварин, що сприяє і мистецтву наших конярів, і стійкості кавалерії."
  ira_spread_of_persian_influence: "Перський вплив"
  ira_spread_of_persian_influence_desc: "Перська мова з її давньою та багатою історією пережила чимало імперій. Навіть поширення ісламу не применшило її значущості для нашої ідентичності, а культурі, що склалася навколо неї, намагаються наслідувати багато країн."
  ira_persian_rug_production: "Перські килими"
  ira_persian_rug_production_desc: "Персія здавна славилася килимами, проте монгольська навала, що розорила наші землі, погубила багатьох вправних майстрів. Для відродження країни потрібна економічна міць, зміцненню якої сприятиме відродження цього давнього ремесла."
  ira_safaviyya_order_hall: "$safaviyya_order_hall$"
  ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"
  ira_the_qizilbash: "$qizilbash$"
  ira_the_qizilbash_desc: "#italic  Кизилбаші#!, що означає «червоноголові», являють собою шиїтський військовий орден, заснований у Сефевіє. Рухомі релігійним завзяттям, ці войовничі суфії готові підтримати нашу країну та стати ядром його війська."
  ira_the_qurchi: "Курчі"
  ira_the_qurchi_desc: "#italic  Курчі#! — це елітний підрозділ особистої охорони шаха. Ці воїни, що набираються з числа кизилбашів, отримують свою плату не з податків, а безпосередньо з казни монарха."
  ira_religious_state: "Релігійна країна"
  ira_religious_state_desc: "Якої б віри не дотримувалася Персія, вона завжди залишалася вкрай релігійною країною. Духовність пронизує всі аспекти нашого життя, і навіть сама країна існує відповідно до принципів віри, являючи собою зразок моралі та справедливості."
  ira_the_ghilman: "$a_ghilman$"
  ira_the_ghilman_desc: "$a_ghilman$ — це загін рабів-солдатів кавказького походження і, як правило, християнської віри. Пройшовши суворе навчання, вони майстерно володіють стрілецькою зброєю та відіграють важливу роль у нашому війську, врівноважуючи інші впливові групи військових."
  ira_encouraged_art: "Підтримка мистецтва"
  ira_encouraged_art_desc: "Перське мистецтво високо цінується в усьому відомому світі: поціновувачі з близьких та далеких країв спеціально приїжджають за творіннями наших художників. Ми повинні розвивати цей напрямок торгівлі та підтримувати початківців майстрів."
  ira_nazir: "Придворні назири"
  ira_nazir_desc: "Назири — очі та вуха шахиншаха — здійснюють адміністративний нагляд за нашою країною. Контролюючи придворне життя, вони відповідають за призначення чиновників, і навіть сам великий візир змушений рахуватися з ними."
  ira_the_tofangchi: "$a_tofangchi$"
  ira_the_tofangchi_desc: "$a_tofangchi$ — мушкетери імперії. Хоча вогнепальна зброя вже раніше використовувалася, робилося це вкрай нерегулярно, оскільки багато перських військових віддають перевагу традиційній зброї — луку та стрілам. $a_tofangchi$ прагнуть змінити такий стан справ, оскільки навчаються володінню сучасною зброєю."
  ira_the_tupchi: "$a_tupchi$"
  ira_the_tupchi_desc: "$a_tupchi_desc$"
  ira_religious_unity_policy: "Політика релігійної єдності"
  ira_religious_unity_policy_desc: "Епоха релігійного розколу добігає кінця: ісламський світ більше не може дозволити собі внутрішні чвари. Ми повинні сприяти внутрішній та зовнішній релігійній єдності, виступаючи за примирення з тими, кого раніше вважали єретиками."
  ira_afsharid_navy: "Берегова оборона Перської затоки"
  ira_afsharid_navy_desc: "Хоча більшу частину наших володінь становлять Загроські гори, Персія має і вихід до моря. Минулі династії приділяли мало уваги захисту морських рубежів, але наш народ не забув про них і завжди готовий дати відсіч ворожим кораблям."
  ira_jazayerchi: "Піхота джазаєрчів"
  ira_jazayerchi_desc: "$a_jazayerchi_desc$"
  uc_bey_advance: "$uc_bey$"
  uc_bey_advance_desc: "$uc_bey_desc$"
  seljuk_roots: "Сельджуцьке коріння"
  seljuk_roots_desc: "Вороги оточують нас з усіх боків, і нашій країні потрібне сильне військо. На щастя, ми не слабкі. Весь світ, від нальотчиків газі та акінджиларів до сипахів Османської імперії, бачив міць тюркських народів. Ми повинні створити військо для імперії, надихнувшись славними традиціями та історією, і вдосконалювати свою силу крізь віки."
  heirs_of_rum: "Нащадки Руму"
  heirs_of_rum_desc: "Після періоду смути та боротьби з сусідніми бейликами нам настав час взяти на себе обов'язки з відновлення кордонів колись великого Румського султанату."
  splendor_of_anatolia: "Багатства Анатолії"
  splendor_of_anatolia_desc: "У наших землях розташовані одні з найвеличніших медресе та мечетей у всьому ісламському світі. Наші ремісники не знають собі рівних завдяки таланту та увазі до дрібниць."
  persian_in_the_court: "Перська мова при дворі"
  persian_in_the_court_desc: "Через наше походження значна частина управління вже досить давно ведеться перською мовою. У поєднанні з культурним різноманіттям регіону це призвело до нових форм співпраці, що стерли будь-які перешкоди."
  akinji_cavalry: "Акінджилари"
  akinji_cavalry_desc: "Наша легка кіннота часто здійснює набіги на землі невірних, а часом навіть селиться там. Історично ці загони в числі перших стикалися з ворогом і атакували торгові шляхи, щоб перерізати постачання. Вони славляться своєю відвагою в бою і живуть життям прикордонних нальотчиків."
  crossroads_of_commerce: "Перехрестя торгівлі"
  crossroads_of_commerce_desc: "Караван-сараї сприяють руху товарів, інформації та людей з Китаю до Європи через наші землі. Гроші та багатства, що течуть через нас, створюють безліч привабливих ділових можливостей."
  fratricide_succesion_advance: "$fratricide_succesion$"
  fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"
  flexible_loyalty: "Дипломатична гнучкість"
  flexible_loyalty_desc: "У нашої країни, розташованої на перехресті європейських релігій, чимало потенційних ворогів. Щоб забезпечити собі виживання, ми повинні вміти домовлятися з різними силами, що діють у регіоні."
  heritage_of_the_rus: "Спадщина Русі"
  heritage_of_the_rus_desc: "Зараз Русь роздроблена, але ми зберігаємо пам'ять про велику країну, столицею якої колись був Київ. Наслідуючи приклад славних правителів минулого та підкреслюючи свій зв'язок з ними, ми створимо міцну традицію для свого народу."
  mother_of_russian_cities: "Мати міст руських"
  mother_of_russian_cities_desc: "Колись Київ був столицею могутньої країни, що розкинулася від новгородських лісів на півночі до узбережжя Чорного моря на півдні. На жаль, після розпаду Русі та вторгнення монголів від цієї країни мало що залишилося. Але що б не пережили наші міста, ми подбаємо про те, щоб вони відродилися і процвітали у віках."
  international_influences: "Чужоземний вплив"
  international_influences_desc: "Нашими дорогами ходить чимало чужоземних купців і мандрівників, що приносять нам багатство і процвітання. Деякі з них можуть погодитися постійно жити в наших містах і селищах, якщо ми забезпечимо захист їхньої віри."
  reuniting_rus: "Об'єднання Русі"
  reuniting_rus_desc: "Будучи істинними спадкоємцями Київської Русі, ми повинні об'єднати землі під своїм знаменом!"
  united_faith: "Єдина віра"
  united_faith_desc: "Що б не відбувалося, наша віра повинна залишатися єдиною. Тільки за відсутності внутрішніх чвар наші священики зможуть виконувати свою головну місію: направляти та опікувати населення країни."
  east_and_west: "Схід і захід"
  east_and_west_desc: "Завдяки географічному положенню ми опинилися якраз посередині шляху між східними та західними країнами. Це унікальний шанс стати посередниками на неймовірно багатих торгових шляхах регіону."
  ruthenian_state_advance: "Руська країна"
  ruthenian_state_advance_desc: "У минулому ми не раз схилялися перед чужоземною владою і заради її прихильності пристосовувалися до чужих звичаїв. Але часи змінюються — настав час зміцнювати власні традиції, щоб знову не потрапити у сферу чужих інтересів."
  ruthenian_rural_buildings: "Руські села"
  ruthenian_rural_buildings_desc: "Русь багата на сільськогосподарські угіддя. І нехай великі міста на кшталт Києва виконують найважливіші завдання, ми не повинні нехтувати околицями та селами — адже саме вони постачають нашій економіці найважливішу сировину та їжу."
  ruthenia_commoner_education: "Всеукраїнська освіта"
  ruthenia_commoner_education_desc: "Будівництво місцевих шкіл — вірний спосіб підвищити освіченість усіх верств населення."
  cossack_raids: "Козацькі набіги"
  cossack_raids_desc: "Наші козаки вже забули, яким буває життя без війни. За довгі роки битв вони виробили тактику набігів і грабунків, близьку до нальотів орди. Звісно, багато хто дивиться на такі безчинства скоса, але для нас це хороший спосіб поповнити скарбницю."
  tamed_steppes: "Приборкані степи"
  tamed_steppes_desc: "Для більшості людей цей край безплідний і ворожий. Козаки ж не просто навчилися виживати в степу — вони чудово облаштувалися і навчилися тут процвітати. З їхньою допомогою ця земля принесе нам благополуччя і багатство."
  cossacks_recruitment: "Набір козаків"
  cossacks_recruitment_desc: "Козаки — люті бійці, а їхнє вміння виживати в суворих степах просто неймовірне. У нашій країні та в нашому війську вони по праву вважалися б елітою, а наша влада в степах стала б незаперечною."
  cossacks_escaped_serfs: "Втікачі-кріпаки"
  cossacks_escaped_serfs_desc: "Багато козаків народжені кріпаками. Вони втекли від феодального гніту, і пошуки свободи привели їх у степи. Наше суспільство повинно прийняти втікачів-кріпаків."
  cossacks_hetmanate: "Козацьке гетьманство"
  cossacks_hetmanate_desc: "У козаків немає ні царів, ні ханів. Їхній верховний головнокомандувач зветься отаманом, але в державній та суспільній ієрархії він лише перший серед рівних. Політична влада там зосереджена в Раді — законодавчому та військовому зібранні, де кожен козак має право голосу."
  cossack_administration: "Козацька адміністрація"
  cossack_administration_desc: "Якщо ватажки наших козаків будуть і генералами, і керівними чиновниками, ми зможемо поставити вербування новобранців до нашого війська на потік і підвищити якість їхнього вишколу."
  steppe_riders: "Степові вершники"
  steppe_riders_desc: "Життя в степу непередбачуване та небезпечне. Для безкінного чоловіка тут багато доріг, та тільки всі вони ведуть у прірву. У безкрайньому морі трави кінь не річ, не тварина, а частина тебе. Людина не може жити без серця чи без печінки — а в степу не виживеш без коня."
  cossacks_exploration_advance: "Експедиції козаків"
  cossacks_exploration_advance_desc: "Наші козаки живуть на околицях країни — і хто, як не вони, зможе найдалі вийти за наші кордони, щоб дослідити далекі землі? Вони відкриватимуть нові, невідомі краї, шукатимуть нові цивілізації та сміливо йтимуть туди, де не ступала нога людини."
  cossacks_military_society: "Військове суспільство"
  cossacks_military_society_desc: "Для козаків майже немає відмінностей між цивільним і військовим суспільством. Вони — ополчення, що визначається не підвладними землями, а своїми людьми. І ці люди — воїни. Чим обширнішими стають володіння, тим краще воїни повинні задовольняти наші адміністративні потреби."
  cossacks_serf_autonomy: "Свобода козаків-кріпаків"
  cossacks_serf_autonomy_desc: "Серед козаків немає тиранії. На завойованих територіях козаки приймають рабів, кріпаків та селян до своїх лав як рівних."
  cossacks_colonization_advance: "Козаки-колонізатори"
  cossacks_colonization_advance_desc: "Наші козаки з давніх-давен не звикли триматися кордонів і вільно виходять за їхні межі. З їхньою допомогою ми можемо забудовувати неосвоєні землі, розширюючи зону свого впливу."
  cossacks_registered: "Реєстр козаків"
  cossacks_registered_desc: "Лави козаків зростають, і настав час замислитися про облік сили, розмірів та постачання їхніх полків. Централізований реєстр дозволить забезпечити всім козакам своєчасну та адекватну підтримку."
  cossack_reputation: "Репутація козаків"
  cossack_reputation_desc: "За нашими козаками вже закріпилася репутація лютих бійців. Одне це вселяє жах у серця наших ворогів на полі бою."
  geo_georgian_highlands: "Грузинське нагір'я"
  geo_georgian_highlands_desc: "$GEO$ лежить серед Кавказьких гір, які оберігають наші землі від зазіхань чужоземних країн. Про нашу завзятість та витривалість складають легенди."
  geo_georgian_script: "$georgian_culture$а писемність"
  geo_georgian_script_desc: "$georgian_culture$ому алфавіту кілька сотень років, і він, по суті, є трьома різними наборами символів. Мхедрулі — алфавіт цивільної адміністрації, тоді як асомтаврулі та нусхурі частіше використовують священники. Так Святе Письмо надійно захищене від мінливої мирської мови і залишається непорушним для народу."
  geo_georgian_isolation: "$GEO_ADJ$а ізоляція"
  geo_georgian_isolation_desc: "Нас оточують різні країни з несхожими культурами та релігіями. Щоб не вплутуватися в конфлікти і якомога довше жити в мирі, ми змушені пристосовуватися і нерідко змінювати союзників."
  geo_legacy_of_saint_nino: "Спадщина святої Ніни"
  geo_legacy_of_saint_nino_desc: "$GEO_ADJ$а церква, одна з найстаріших християнських церков у світі, зародилася понад тисячу років тому, коли свята Ніна принесла в ці краї християнську віру. Протягом багатьох століть церква була головною об'єднуючою силою грузинської країни та наріжним каменем грузинської культури. Саме вона оберігала країну від візантійського, монгольського та мусульманського впливу. Зараз, коли в регіоні залишилося зовсім небагато інших християнських царств, а саму Грузію стрясають протиріччя, церква не дає людям роз'єднуватися під натиском чужинців."
  geo_restoration_of_fortresses_and_churches: "Відновлення церков та фортець"
  geo_restoration_of_fortresses_and_churches_desc: "Не раз численні фортеці та церкви захищали наші землі та наші душі від впливу іноземців. Так і буде надалі, якщо ми, своєю чергою, зуміємо як слід подбати про їхню збереженість."
  geo_sadrosho_districts: "Садрошо"
  geo_sadrosho_districts_desc: "Садрошо (прапорами) називаються особливі військові райони для набору вояків. Якщо ми розділимо нашу територію на кілька садрошо і поставимо на чолі кожного окремого командувача, то вербування та розподіл рекрутів у нашому війську стане набагато ефективнішим."
  geo_dasturlamali: "Дастурламалі"
  geo_dasturlamali_desc: "Кілька століть після монгольської навали стали для Грузії часом потрясінь. Періодичне дроблення, зростаючий вплив місцевої знаті та непостійний, але не слабнучий тиск ззовні настільки змінили країну, що колишня феодальна система глибоко застаріла і була місцями скасована. Фундаментом законодавчої системи та засобом підтримання порядку в країні став звід законів Дастурламалі, який чітко позначив правила та порядок відносин підданих та дворянства з монархом та країною."
  geo_georgian_embassies: "$GEO_ADJ$і посольства"
  geo_georgian_embassies_desc: "У нас є давня та міцна традиція — підтримувати надійні дипломатичні відносини з навколишніми країнами незалежно від різниці в поглядах. І тому наших дипломатів повсюдно зустрічають з пошаною."
  geo_georgian_unification: "$GEO_ADJ$а єдність"
  geo_georgian_unification_desc: "У минулому $GEO$ не раз дробилася — як під ударами ззовні, так і зсередини. Однак гордий грузинський народ готовий боротися до останнього, щоб це ніколи не повторилося."
  geo_legacy_of_saint_george: "Спадщина святого Георгія"
  geo_legacy_of_saint_george_desc: "І в християнському, і в мусульманському світах добре відомий наш зв'язок із легендарним святим Георгієм. І як наш покровитель переміг могутнього та лютої змія, так і ми розтрощимо ворога в бою."
  geo_bagrationi_dynasty: "Династія Багратіонів"
  geo_bagrationi_dynasty_desc: "Багратіони — династія настільки стародавня, що походження її оповите таємницею. Починаючи з IX століття Грузією правили спочатку князі, а пізніше — царі та цариці з цього роду."
  geo_georgian_golden_age: "Золотий вік Грузії"
  geo_georgian_golden_age_desc: "Золотим віком Грузії називають період найбільшого культурного та релігійного розквіту, який раптово обірвався з навалою монголів. Але ми відродимо цю епоху і досягнемо ще більших висот."
  geo_legacy_of_tamar: "Спадщина Тамари"
  geo_legacy_of_tamar_desc: "Тамара була однією з найвеличніших наших правительок. Про її військові та культурні успіхи склали легенди. Ім'я цариці Тамари донині викликає благоговійний трепет у серцях грузинів."
  geo_david_the_builder: "Давид Будівничий"
  geo_david_the_builder_desc: "Царя Давида донині шанують як найвеличнішого правителя в історії нашої країни, який зумів піднести Грузію до небачених раніше висот могутності та культурного впливу. Його правління стало епохою розквіту християнства та грузинського народу."
  geo_georgian_titles: "$GEO_ADJ$і титули"
  geo_georgian_titles_desc: "«Цар царів, могутній і непереможний, великий захисник священного царства Абхазького, Іберійського, Рані, Кахетінського, Вірменського, шахиншах і ширваншах Сходу і Заходу, Півночі і Півдня, обох країн, двох престолів і вінців, богоподібний сюзерен і суверен». У нашого правителя багато титулів, і двір повинен поважати їх."
  geo_georgian_numismatics: "$GEO_ADJ$а нумізматика"
  geo_georgian_numismatics_desc: "У нашій країні з давніх-давен існує шанована традиція карбування монет. Написи на них роблять не тільки грузинською, а й арабською та перською — адже вони слугують торговим лінгва франка для нас і наших сусідів."
  geo_beacon_of_christianity: "Світоч християнства"
  geo_beacon_of_christianity_desc: "Багато століть $GEO$ була символом християнства на Кавказі — навіть коли послідовники ісламу оточили та відрізали її від зовнішнього світу. Палка віра — це джерело натхнення для багатьох наших родичів."
  geo_georgian_principalities: "$GEO_ADJ$і князівства"
  geo_georgian_principalities_desc: "Управління нашими землями поділено між безліччю територіальних князівств. Такий розподіл повноважень дозволяє нам ефективніше правити країною."
  geo_georgian_resilience: "$GEO_ADJ$а завзятість"
  geo_georgian_resilience_desc: "Багато років нашу країну роздирали на частини — як зсередини, так і ззовні. Але вона, подібно до фенікса, завжди повставала з попелу і відвойовувала своє ім'я. Завзятість нашого народу гідна захоплення."
  sme_jaqeli_dynasty: "Династія $Jaqeli$"
  sme_jaqeli_dynasty_desc: "Династія $Jaqeli$ вийшла з низів, але зуміла обзавестися безліччю корисних зв'язків із царями та імператорами навколишніх країн. Завдяки цьому наша репутація в дипломатичному світі досить висока."
  sme_atabegs_of_samtskhe: "Атабеки $SME$"
  sme_atabegs_of_samtskhe_desc: "Відтоді як у давні часи ми отримали титули атабеків, нас не можна називати лише частиною грузинського царства. Раніше такий титул отримували лише вірменські васали, і це знак нашого особливого становища та поваги, яку відчуває до нас грузинський монарх."
  sme_proactive_diplomacy: "Далекоглядна дипломатія"
  sme_proactive_diplomacy_desc: "$SME$ — частина Грузії, однак цей край користується значними свободами та незалежністю в багатьох питаннях управління завдяки постійному спілкуванню з грузинськими політиками та активним дипломатичним відносинам з великими імперіями по сусідству. Наші правителі завжди намагалися безпосередньо спілкуватися з найсильнішими країнами. І так само ми за необхідності брали активну участь у внутрішніх політичних процесах Грузинського царства — і в боротьбі за спадщину, і в завоюванні прихильності правлячої династії. У всьому ми шукали вигоду для себе. Нам слід продовжити цю традицію — адже від неї залежить майбутнє нашої маленької країни. Нехай ніхто не зможе звинуватити нас у тому, що ми зробили занадто мало або не все передбачили."
  sme_fortresses_of_samtskhe: "Фортеці $SME$"
  sme_fortresses_of_samtskhe_desc: "Наша країна — гориста прикордонна смуга, що не раз слугувала рубежем для чужоземних вторгнень до Грузії. Ми навчилися будувати могутні фортеці й завжди бути готовими до оборонних війн. Цю спадщину ми повинні зберегти за будь-яку ціну — фортеці Самцхе потрібно підтримувати в належному стані, гарнізони мають бути повними, а припаси свіжими — адже рано чи пізно чужоземні загарбники обов'язково нагрянуть."
  sme_independent_ambitions: "Прагнення до незалежності"
  sme_independent_ambitions_desc: "Чужоземні царі та султани — мусульманські, християнські, грузинські, тюркські, іранські — не раз змушували народ Самцхе схилити голову. Щоб створити міцну країну та економіку, необхідно будувати власні інститути, які не залежатимуть від смаків чергових загарбників. Настав час викарбувати власні монети та створити закони для заступництва місцевим теологам і письменникам."
  sme_protect_trade_routes: "Захист торгових шляхів"
  sme_protect_trade_routes_desc: "Ми живемо на перехресті між грузинською, анатолійською, вірменською та азербайджанською землями. Серед іншого це означає, що натовпам торговців було б набагато зручніше рухатися до пункту призначення через нашу країну. Однак через постійні нальоти кочівників багато хто сумнівається в безпеці наших доріг. Захистимо шляхи та каравани як належить, і торгівля потоком хлине в нашу країну."
  sme_frontier_warriors: "Воїни прикордоння"
  sme_frontier_warriors_desc: "З давніх-давен кочові імператори змінювали Кавказ під свої потреби, а пасовища $SME$ привабили на наші землі чимало племен. Ми не допустимо, щоб це порушило стабільність нашого царства. Краще домовлятися з племенами полюбовно, і тоді ті стануть нашим підґрунтям у будь-яких війнах."
  sme_sacred_land: "Свята земля"
  sme_sacred_land_desc: "У $SME$ є чимало місць, які грузинський народ шанує як святині. Печерний монастир Вардзія, стародавня церква в Ацкурі з чудотворним образом Діви Марії, монастир Анча з іконою «Анчійський Спас» — одні з найшанованіших. Якщо, крім грузинської церкви, ми приділятимемо особливу увагу церкві $SME$, наш народ зуміє зберегти єдність перед обличчям будь-яких негараздів."
  sme_bridge_between_worlds: "Міст між світами"
  sme_bridge_between_worlds_desc: "Наша країна завжди була своєрідним мостом між двома світами — християнським і мусульманським. Тому на наших землях завжди вільно уживалися представники обох релігій."
  arm_legacy_of_hayk: "Спадщина Айка"
  arm_legacy_of_hayk_desc: "Айк, нащадок Ноя, був прабатьком нашого народу. Він заснував царство біля підніжжя гори Арарат після перемоги над вавилонянами. Усі наші жителі знають цю історію і раді належати до такого давнього роду."
  arm_mount_ararat: "Гора Арарат"
  arm_mount_ararat_desc: "До гори Арарат вперше причалив Ноїв ковчег після Всесвітнього потопу. Ось чому ми даємо таку люту відсіч, коли хтось зазіхає на святість нашої землі."
  arm_apostolic_church: "$ARM_ADJ$а апостольська церква"
  arm_apostolic_church_desc: "У 301 році $ARM$ стала першою країною, яка оголосила християнство державною релігією. Таким чином, наші релігійні традиції та традиції нашого духовенства багато в чому визначають нашу суть."
  arm_land_reclamation: "Повернення земель"
  arm_land_reclamation_desc: "Протягом довгих століть $ARM$ страждала від війн та втручання сусідніх країн. Повернувши свої землі та зробивши їх знову придатними для життя, а також відновивши зруйновані храми та фортеці, ми зможемо закріпитися на своїх територіях та покращити життя громадян."
  arm_border_nation: "Прикордонна нація"
  arm_border_nation_desc: "З давніх часів $ARM$ слугує ареною бойових дій для більших країн. Навіть повернувши незалежність, зберегти нейтралітет буде нелегко, — адже всім не догодиш, — але «нелегко» не означає «неможливо»."
  arm_melikdom_organization: "Поява мелікств"
  arm_melikdom_organization_desc: "$ARM$ — один з небагатьох оплотів нашої незалежної вірменської країни. Тут правлять суверенні меліки, нащадки давньої місцевої аристократії — нахарарів, які після монгольської навали змінилися до невпізнання. Стосунки меліків з підданими більше нагадують субординацію в війську, ніж стосунки феодалів з кріпаками."
  arm_mountain_armies: "Гірські війська"
  arm_mountain_armies_desc: "Вірменські землі оточені горами, і так було споконвіку. За багато років ми пристосувалися до такого життя — і гори стали нашими друзями. Якщо ми кинемо клич, війська з усіх куточків нашої країни прийдуть під наші знамена."
  arm_nakharar_titles: "Титули нахарарів"
  arm_nakharar_titles_desc: "Система нахарарських титулів застосовувалася у Вірменії від самого початку і не змінювалася до самого вторгнення монголів, яке зруйнувало всі державні процеси. І хоча самі титули більше не використовуються, деякі елементи системи залишилися і служать на благо нашої знаті та війська."
  arm_greater_armenia: "Велика $ARM$"
  arm_greater_armenia_desc: "Наша країна має довгу і славну історію. У минулому вірменське царство постійно ширилося, а з ним ріс і його народ. Якщо ми уподібнимося їм, то станемо дороговказом для всього вірменського народу, і він з радістю збереться під нашим знаменом."
  arm_highland_fortresses: "Гірські фортеці"
  arm_highland_fortresses_desc: "Гірська батьківщина навчила нас завзятості та витривалості — і ці чесноти втілилися в наших фортецях. Вони встоять під натиском не тільки стихії, а й будь-яких чужоземних загарбників, які наважаться подолати небезпеки нашої землі."
  swiss_oath_of_rutli: "Клятва Рютлі"
  swiss_oath_of_rutli_desc: "Нехай прозвучить клятва нового союзу. Ми хочемо бути єдиним братнім народом, і ніякі негаразди не розлучать нас. Ніколи тиран-чужоземець не буде панувати над нашою землею!"
  swiss_halberd_infantry: "Спадщина Моргартена"
  swiss_halberd_infantry_desc: "У битві при Моргартені ми відстояли свою свободу і отримали найважливішу перевагу над проклятими Габсбургами. Алебарда — проста, але смертоносна зброя, яка вражає ворога, не підпускаючи його близько. Якщо навчимо солдатів поводитися з алебардами, навіть переважаючі сили противника будуть нам не страшні."
  swiss_eternal_alliance: "«Вічний союз» лісових кантонів"
  swiss_eternal_alliance_desc: "Ми уклали вічний союз з друзями з сусідніх кантонів. Без такого договору Габсбурги неодмінно підкорили б нас, і в наших землях знову запанував би тиран-чужоземець. А завдяки цим союзам нікому не зламати нас ще багато століть."
  swiss_mercenaries: "$SWI_ADJ$і найманці"
  swiss_mercenaries_desc: "Наших солдатів вважають одними з найкращих. На щастя, нам не доводиться постійно воювати, і ми можемо дозволити іноземним країнам наймати швейцарські війська. Це збагачує нас золотом, а солдатів — безцінним досвідом."
  the_swiss_confederation: "Принципи конфедерації"
  the_swiss_confederation_desc: "Усі учасники конфедерації спільно працюють заради її блага і привносять цінні ресурси. Децентралізація управління союзом країн служить великій меті. Попри чвари окремих міст або кантонів, громадянська війна нам не загрожує."
  swiss_reislaufer: "Райслауфери"
  swiss_reislaufer_desc: "$a_reislaufer_desc$ З цих ветеранів ми можемо сформувати полки для наших власних військ."
  swiss_recovery_and_prosperity: "Понівечена країна"
  swiss_recovery_and_prosperity_desc: "Минулі конфлікти показали, що у нас є проблеми й крім оборони від загарбників. Долини кантонів вкриті страшними шрамами колишніх битв, і до відродження наших земель потрібно підійти якомога ретельніше."
  alpine_defensiveness: "Альпійська оборона"
  alpine_defensiveness_desc: "На швейцарській землі переважає пересічена місцевість, гори та долини. Ми повинні врахувати та використати це при розробці військових тактик. Тоді у ворогів, що зазіхають на наші території, не залишиться жодного шансу."
  swiss_religious_refuge: "Прихисток для всіх"
  swiss_religious_refuge_desc: "В інших країнах заведено виганяти релігійні меншини та незручних діячів. Але ми з радістю приймемо таких вигнанців. У Швейцарії вони знайдуть нове життя і будуть вічно вдячні нашій владі."
  swiss_tolerance: "$SWI_ADJ$а терпимість"
  swiss_tolerance_desc: "Навіщо вбивати одне одного через незгоду щодо перетворення та приречення? Чи не краще спільно домогтися єдності нашої гірської батьківщини?\n\nРелігійні питання кожен кантон вирішуватиме самостійно. Нехай це не дозволить покінчити з релігійними суперечками в країні раз і назавжди, зате кожен житель зможе знайти дім, де його не переслідуватимуть."
  swiss_clockwork: "Майстри-годинникарі"
  swiss_clockwork_desc: "Є дурні, які вважають, що годинникар робить лише годинники. Варто лише уважніше поспостерігати за обертанням шестерень і клацанням механізмів, як стає зрозуміло, що годинникові механізми здатні на все, що тільки можна уявити. Можливо, сам Творець усього сущого колись повернув ключ і завів Всесвіт, щоб він вічно цокав сам по собі. Як би там не було, швейцарські годинникарі — найвеличніші майстри свого мистецтва в цьому самому Всесвіті, за винятком, звичайно, самого Бога."
  swiss_ambition: "$SWI_ADJ$е просвітництво"
  swiss_ambition_desc: "Нам не доводиться шукати унікальну державну ідентичність, адже наш народ служить прапорам своїх кантонів та ідеалам конфедерації. Але фінансуючи найкращих вчених нашого століття, ми забезпечимо швейцарському народу гідне майбутнє та зміцнимо унікальність нашого Eidgenossenschaft. Цей гельвецизм стане базовим принципом нашого просвітництва."
  swiss_banking: "$SWI_ADJ$і банки"
  swiss_banking_desc: "Ми надаємо притулок не тільки вигнанцям інших країн, а й їхнім фінансам. У величезних сховищах, захищених товстими стінами та найкращими солдатами, ми пропонуємо неперевершений варіант збереження коштів усім громадянам нещасних і роздертих війною країн."
  zmw_experienced_cattle_herder: "Досвідчені пастухи"
  zmw_experienced_cattle_herder_desc: "Вигін худоби — справа нелегка, і від неї безпосередньо залежить наше виживання. Щоб зміцнити свою владу, ми повинні за будь-якої нагоди розширювати свої пасовища."
  zmw_stone_builders: "Будівельники Зімбабве"
  zmw_stone_builders_desc: "Величезні кам'яні споруди Зімбабве вражають багатьох гостей нашої великої держави. Якщо ми збережемо цю традицію, наші величезні кам'яні міста стоятимуть століттями."
  zmw_encourage_new_settlements: "Нові джерела ресурсів"
  zmw_encourage_new_settlements_desc: "За межами країни розкинулися багаті ресурсами та пасовищами землі, які принесуть чимало користі нашому народу. Люди повинні зрозуміти, скільки багато може дати їм переселення на нові території та їх забудова."
  zmw_rekindling_the_royal_fires: "Царське полум'я"
  zmw_rekindling_the_royal_fires_desc: "Раз на рік вожді наших підданих повторюють клятву вірності нам і богам — для цього вони приходять до столиці, щоб запалити вогні своїх племен від нашого вогнища. Після року наше військо гасить їхні вогнища, і вожді знову вирушають у путь."
  zmw_strict_gold_regulations: "Обмеження торгівлі золотом"
  zmw_strict_gold_regulations_desc: "Наша земля повна товарами, за якими полюють чужоземні купці, але найцікавіше для них величезні запаси золота. Таке багатство — благословення згори, однак влада повинна ретельно регулювати торгівлю та володіння золотом, інакше жадібність і підступність людей згубно позначаться на доходах країни."
  zmw_spokesman_before_the_dead: "Той, хто говорить з мертвими"
  zmw_spokesman_before_the_dead_desc: "Наш правитель не просто тимчасовий лідер, а той, хто спілкується за нас з духами померлих. Перед війною або збором урожаю він висловлює повагу предкам і розповідає їм про наші потреби в танцювальних обрядах. Великий вождь, що доглядає за монаршими могилами і постійно спілкується з мертвими, життєво необхідний, інакше нашій країні не пощастить."
  zmw_elected_administrators: "Влада в провінціях"
  zmw_elected_administrators_desc: "За традицією, всі помісні управителі, аж до найнезначніших, перебувають у прямому спорідненні з правителем. Однак імперія зростає і розвивається, а отже, настав час покластися на власні життєві уклади наших підданих і дозволити їм обирати собі управителів."
  zmw_discipline_and_traning: "Підготовка регулярних військ"
  zmw_discipline_and_traning_desc: "Дисципліна, підготовка та тренування — це запорука перемоги на полі бою. Наші командири раз у раз вигадують нові тактики та покращують організацію військ. Не можна дозволити цьому пропасти марно: ми повинні розділити воїнів на окремі полки та забезпечити їм регулярні тренування з луками, асегаями, кинджалами та сокирами. Заодно така практика навчить їх безстрашно битися строєм і перемагати більше ворогів."
  zmw_merchant_taxes: "Торгові мита"
  zmw_merchant_taxes_desc: "Поява в Замбезі нових торговців зобов'язує нас підкреслити силу та авторитет нашої влади. Кожному, хто має намір тут торгувати, вивозячи наші дорогоцінні золото та виробну кістку до далеких берегів, спочатку треба отримати дозвіл у правителя та заплатити відповідний податок. Без своєчасних виплат країна має право конфіскувати всі чужоземні товари."
  zmw_controlling_the_mutapan_riches: "Контроль над благами"
  zmw_controlling_the_mutapan_riches_desc: "Західні мандрівники прозвали нашу землю Офіром. Протягом багатьох століть золоті рудники на плато та контроль торгівлі в Замбезі не раз приваблювали заздрісні погляди. Настав час використовувати свої ресурси та побудувати постійні факторії, з яких виростуть процвітаючі міста."
  zmw_empowering_the_rozwi: "Зміцнення Розві"
  zmw_empowering_the_rozwi_desc: "У наших землях проживає чимало вправних воїнів. Розві виділяються навіть серед них своєю дисципліною та готовністю захищати наш народ від будь-яких загарбників."
  zmw_cow_horn_tactics: "Стрій «Коров'ячі роги»"
  zmw_cow_horn_tactics_desc: "Пристосовуватися до постійно мінливої військової тактики нелегко. Якщо перевага виявиться на боці ворога, ми повинні насамперед покладатися на спритність та мобільність. Якщо вдасться нав'язати противнику ближній бій і підвести кілька полків з флангів, ворог зазнає нищівних втрат."
  khm_religious_flexibility: "Єдина віра для кхмерів"
  khm_religious_flexibility_desc: "Наша країна пережила непрості часи. Монархи підтримували як індуїзм, так і багато гілок буддизму. Рішення правителів потрібно виконувати, тому ми приймемо і понесемо в народ обрану ними релігію."
  khm_royal_procession: "$KHM_ADJ$і королівські ходи"
  khm_royal_procession_desc: "Ходами наших правителів можна милуватися нескінченно, мало що зрівняється з цим. Для демонстрації величі наших монархів необхідно представити нашого сюзерена належним чином. Парад слонів та королівської гвардії дасть підданим зрозуміти, що ми їх не підведемо."
  khm_ballista_elephants: "Слони з балістами"
  khm_ballista_elephants_desc: "Слони — вражаючі створіння, що перевершують розмірами всіх відомих нам тварин. І ми можемо використовувати це на полі бою, щоб вселяти жах у ворогів. Крім того, слони настільки сильні, що вільно можуть переносити бойові машини. Якщо закріпити на їхніх спинах арбалети з подвійною тятивою, у нас з'явиться знаряддя небаченої потужності, і ворогам доведеться несолодко."
  khm_great_builders: "Міська гідротехніка"
  khm_great_builders_desc: "Ми будуємо безліч бараїв та каналів, які постачають водою наші великі міста. Мистецтво будівництва та утримання цієї мережі водопроводів допоможе населенню без зусиль вижити навіть у непередбачуваний мусонний сезон."
  khm_recruitment_of_peasants: "Набір селян"
  khm_recruitment_of_peasants_desc: "Війську потрібні рекрути, і найпростіше набирати їх із селян. Після певного тренування вони стануть вправними солдатами та поповнять нашу армію."
  khm_foreign_production_skills: "Залучення чужоземних фахівців"
  khm_foreign_production_skills_desc: "Наш народ не звик шити одяг із шовку і віддає перевагу іншим матеріалам, але нам пощастило: чужоземні ткачі відкрили в наших містах свої майстерні. Такий підхід до інших галузей промисловості дозволить розширити будь-яке виробництво."
  khm_utilize_the_rivers: "Жили кхмерських земель"
  khm_utilize_the_rivers_desc: "Річки значно спрощують транспортування товарів, що видобуваються та виробляються на материку, до гаваней на торгових шляхах та до чужоземних покупців. Така транспортна мережа з'єднує міста та прискорює сполучення між ними."
  khm_champa_mercenaries: "$CHA_ADJ$і ватажки найманців"
  khm_champa_mercenaries_desc: "У минулому ми не раз билися з тямськими бійцями як віч-на-віч, так і пліч-о-пліч. Заручившись підтримкою їхніх видатних правителів, ми забезпечимо належну виучку та боєготовність нашого власного війська за будь-яких обставин."
  khm_restore_angkor: "Відновлення Ангкора"
  khm_restore_angkor_desc: "Велике місто $angkor$ колись було дорогоцінною перлиною нашої архітектури. Під тиском обставин нам довелося припинити будівництво, але ми повинні повернутися до коріння і зводити нові монументи."
  khm_modern_navy: "$KHM$ оновлюють флот"
  khm_modern_navy_desc: "Неприпустимо, щоб хтось, крім нас, контролював океан і торгівлю, від якої залежить наша країна. Час створити новий, сучасний флот, здатний розтрощити будь-яких піратів і суперників у Південно-Східній Азії."
  khm_invest_in_irrigation: "Розширення бараїв"
  khm_invest_in_irrigation_desc: "Наші водосховища цілком здатні задовольнити поточний попит, але ми легко зможемо забезпечити водою ще більше людей, якщо викопаємо нові бараї в інших частинах країни для підтримки нових районів."
  khm_protection_from_raids: "Захист кордонів"
  khm_protection_from_raids_desc: "Чужинці зазіхають на наші землі досить часто, і найбільш вразливим для облоги та захоплення виявляється наше дорогоцінне місто $angkor$. Тут необхідна обширна система укріплень і гарнізон, який впорається з будь-яким вторгненням і захистить наш народ від поневолення та чужинців на троні."
  khm_old_grudges: "Дух битв"
  khm_old_grudges_desc: "У минулому чужинці не раз ставили наш народ на коліна. І нехай не кожної поразки можна уникнути, ми повинні надати нашому народу сил на полях прийдешніх битв."
  peasant_connections_advance: "Зв'язок із селянами"
  peasant_connections_advance_desc: "Наші купці налагодили відносини з жителями сільських поселень на нашій території та за її межами. В результаті ціни на продукти харчування у них стали куди вигіднішими, ніж очікувалося."
  settle_the_frontier_advance: "Поклик прикордоння"
  settle_the_frontier_advance_desc: "Прямо за нашими кордонами починаються землі, якими так і хочеться заволодіти. Вони ледь захищені, і кілька підприємливих придворних без зусиль переконають місцевих жителів підкоритися нам."
  tre_pontic_trail_mastery: "$pontic_greek_culture$і майстри-слідопити"
  tre_pontic_trail_mastery_desc: "Наша земля — наш дім. Наші ліси — наш сад. Ми знаємо тут кожен куточок краще, ніж усі інші. Нам відомий кожен слід, кожна стежка, і якщо хтось наважиться вторгнутися в наші краї, ми використаємо це знання."
  tre_komnenos_legacy: "Спадщина династії Комнінів"
  tre_komnenos_legacy_desc: "Нехай не буде забуто, що наші предки — $komnenos_dynasty$, які колись правили $BYZ_ADJ$ою імперією. І хоча тепер тут зовсім інша країна, спадщину та престиж династії у нас не відніме ніхто."
  tre_princes_of_the_lazes: "$laz_culture$і князі"
  tre_princes_of_the_lazes_desc: "$laz_culture$ий народ століттями жив у цих краях. І хоча наша імперія була споконвічно грецькою, не можна заперечувати, що ми багато чого взяли від POSTEDIT_лазької культури. Ось чому багато ворогів глузливо називають нас «$tre_princes_of_the_lazes$» і дивляться зверхньо. Звісно, їхні глузування ніяк не применшують наших амбіцій, а цей титул наповнює нас гордістю."
  tre_strategic_marriages: "Шлюби за розрахунком"
  tre_strategic_marriages_desc: "Царства та імперії підкоряються не лише мечу. Близькі шлюбні узи з навколишніми країнами дають нам право на їхні престоли. Або як мінімум важелі впливу на їхніх правителів."
  tre_grand_komnenoi: "Великі Комніни"
  tre_grand_komnenoi_desc: "Нехай династію Комнінів і скинули з престолу $BYZ_ADJ$ої імперії, але її слава не померкла, і донині наш народ і навіть багато інших країн згадують наших предків із пошаною."
  tre_pontic_mountains: "$pontic_greek_culture$і гори"
  tre_pontic_mountains_desc: "Як Альпи розділяють французькі та італійські землі, так $pontic_greek_culture$і гори укривають останній грецький оплот в Анатолії від тюркських загарбників, що наводнили Анатолійське плоскогір'я. Понт завжди був найгрецькішою областю Анатолії — можливо, стародавня спадщина великого Мітрідата надихне наших воїнів і налякає тюрків, як колись римлян?"
  tre_byzantine_birthright: "$BYZ_ADJ$е право першородства"
  tre_byzantine_birthright_desc: "За часів правління наших предків велика $BYZ_ADJ$а імперія являла собою незабутнє видовище. Зрада та обман стали причиною нашого вигнання, але одного дня ми повстанемо з новими силами. І вже ніхто не оскаржить нашу владу."
  tre_trapezuntine_monasteries: "$TRE_ADJ$і монастирі"
  tre_trapezuntine_monasteries_desc: "Віра зберігає душі нашого народу. Духовенство веде його до спасіння. Отже, наші монастирі — не що інше, як джерело цього спасіння."
  tre_greek_stronghold: "$greek_language$а фортеця"
  tre_greek_stronghold_desc: "З давніх часів грецька була мовою науки та освіти. Коли наші предки прийшли в ці землі, з ними прийшла не тільки їхня слава, а й культура, і мова. Так наша країна зберегла грецьку традицію освіти."
  tre_komnenoi_princesses: "Принцеси Комнінів"
  tre_komnenoi_princesses_desc: "У династії Комнінів було чимало чудових жінок, яких домагалися багато правителів-європейців і навіть невірні. Наш рід користується повагою, і наші принцеси допомагають чужоземним країнам заявляти про свою легітимність, а нам — отримувати вплив при їхніх дворах."
  tre_terminus_of_the_silk_road: "Кінець Шовкового шляху"
  tre_terminus_of_the_silk_road_desc: "Навіть в античні часи, коли це місто звалося Трабзоном, стародавні греки добре розуміли його важливість — адже саме тут наземний шлях через Азію приходить до Середземного моря. Ми увійшли в історію як кінцева зупинка великого Шовкового шляху — $china$ та $india$ відправляли свої багатства до Європи з нашого порту. Чому б не залишати частину цих багатств собі?"
  tre_lessons_of_the_fourth_crusade: "Уроки Четвертого хрестового походу"
  tre_lessons_of_the_fourth_crusade_desc: "Ісаак Ангел, що скинув наш рід у 1185 році, сам був скинутий та осліплений, а венеційське військо під приводом спроби повернути сліпого дурня на престол у 1204 році розграбувало $constantinople$. Усе це вчить нас лише одному: зрада та обман — вічні супутники боротьби за владу, однак вони й справді можуть принести перемогу."
  tre_trapezuntine_endurance: "$TRE_ADJ$а витривалість"
  tre_trapezuntine_endurance_desc: "Нас вигнали з країни, але наш рід уцілів. Нас змусили жити в горах, серед ворогів, але наш народ домігся процвітання. Ми навчилися отримувати вигоду з найгіршого становища, і наш народ знає, що важлива не кількість ресурсів, а вміння ними розпоряджатися."
  palm_tree_masters: "Майстри обробки пальмової деревини"
  palm_tree_masters_desc: "Попри те, що товарів ми виробляємо не так вже й багато, є ресурс, запаси якого навряд чи вичерпаються в осяжному майбутньому — це пальмова деревина. Вона досить міцна, щоб слугувати будівельним і корабельним матеріалом, і досить м'яка, щоб наші майстри могли надати їй будь-якої форми. Якщо розвивати цю галузь деревообробки, ми досягнемо процвітання та успіхів у мореплавстві."
  kilwan_trade_network: "$ZAN_ADJ$і торговельні мережі"
  kilwan_trade_network_desc: "Навіть купці з таких далеких країв, як Персія та Аравія, стікаються до нас у столицю. Вона перетворилася на центр торгівлі для ділових людей від $africa$нського Рогу до берегів Китаю."
  the_dhow: "$n_kilwan_dhow$"
  the_dhow_desc: "$n_kilwan_dhow_desc$"
  the_kilwan_zambuc: "$n_kilwan_zambuc$"
  the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"
  bantu_and_perso_arabian: "$bantu_language_family$а та персько-арабська мови"
  bantu_and_perso_arabian_desc: "Після відходу з Персії та Аравії ми заснували громади по всьому узбережжю Суахілі, в яких для підтримки громадського порядку та розвитку архітектури й культури використовується бантуська мова!"
  zanj_taxation: "Занджське оподаткування"
  zanj_taxation_desc: "Спочатку словом «зандж» позначали мешканців Центральної Африки, переважно бантуського походження. Вони оселилися в наших поселеннях і помітно вплинули на демографію. Вони зберегли чимало прав та обов'язків, але заради цього повинні платити відповідні податки. У нашій юридичній системі вони зберігають відносну автономність, це призводить до появи дивовижних мовних феноменів і зародження нових культурних традицій."
  zan_food_imports: "Імпорт продовольства"
  zan_food_imports_desc: "З початком століття мореплавства відкрилися нові можливості забезпечувати добробут нашого народу. Раніше ми могли закуповувати пшоно, худобу та рис тільки в Центральній Африці, але тепер нас чекають нові порти, де їжа може бути дешевшою та доступнішою."
  zan_kilwan_latitude_staves: "Градштоки"
  zan_kilwan_latitude_staves_desc: "Розвинені технології навігації дозволяють нам плавати набагато краще і далі за конкурентів."
  shirazi_legacy: "Спадщина Ширазі"
  shirazi_legacy_desc: "Наш предок-засновник походив з роду Ширазі — він був сином перського еміра, а отже, наше право на владу незаперечне."
  zan_gold_trade_of_africa: "Торгівля золотом в Африці"
  zan_gold_trade_of_africa_desc: "Золотий запас, який ми накопичуємо з безлічі джерел у Східній Африці, — наріжний камінь нашого добробуту та процвітання. Щоб отримати з нього максимальну вигоду, треба створити тверду валюту."
  zan_diplomacy_through_trade: "Дипломатія через торгівлю"
  zan_diplomacy_through_trade_desc: "Унікальне положення між Китаєм, Індією та Європою надає нам чималої ваги в дипломатичних іграх імперій та чужоземних країн…"
  cha_matrilineal_heritage: "Матрилінійне спадкоємство"
  cha_matrilineal_heritage_desc: "У нашому суспільстві становище жінки куди вище, ніж у сусідніх країнах. Походження дитини враховується за родом матері, а прав та обов'язків у жінок набагато більше."
  cha_religious_tolerance: "Релігійна терпимість"
  cha_religious_tolerance_desc: "Наш народ — плавильний котел для безлічі релігій. Тут буддистські істини Китаю змішуються з індуїстськими практиками Індії, а поширення ісламу в Південно-Східній Азії створює унікальне середовище, де суспільство скріплює виключно релігійна терпимість."
  cha_dharmic_presence: "$dharmic_ADJ$а присутність"
  cha_dharmic_presence_desc: "$dharmic_ADJ$і боги вшанували нас своєю присутністю. Хай врятує нас їхнє благословення у важкі часи."
  cha_kshatriya: "Кшатрії"
  cha_kshatriya_desc: "Термін «$cha_kshatriya$», яким ми називаємо вищу знать, прийшов з індуїзму. Таким чином, наші дворяни займають ту ж роль в війську та при дворі, що й люди їхнього становища в Індії."
  cha_veteran_shipbuilders: "Корабели-ветерани"
  cha_veteran_shipbuilders_desc: "Зберігати сильну позицію в політиці, військовій справі та економіці Індокитаю нашій країні допомагає перевага на морі. Ось чому наше виживання безпосередньо залежить від швидкості суднобудування."
  cha_haluwbilau: "Халувбілау"
  cha_haluwbilau_desc: "$cha_haluwbilau$ — це елітні воїни, що займають ключові позиції в війську та на флоті. Їх обирають за відвагу та навички, під їхнім керівництвом війська та кораблі борються із зовнішніми загрозами, а також вирішують міжусобні конфлікти багатьох внутрішніх спільнот."
  cha_commercial_state: "Торговельна країна"
  cha_commercial_state_desc: "Більшу частину добробуту ми нажили завдяки торговому потенціалу наших територій. Нам слід розкрити цей потенціал ще ефективніше і створити торговельну країну."
  cha_boarding_tactics: "Абордаж"
  cha_boarding_tactics_desc: "Через те, що основну частину наших територій займає пересічена місцевість, чужоземним загарбникам залишається сподіватися лише на перевагу на морі. Десятиліття піратства на індокитайських водах навчили нас безцінних прийомів абордажної тактики, завдяки яким ми можемо використовувати ворожі кораблі проти їхніх власників."
  cha_towers_on_water: "Вежі на воді"
  cha_towers_on_water_desc: "Ми морська країна, і більша частина нашого добробуту залежить від переваги на морі. Щоб не втратити її, наші кораблебудівники створили величезні гібриди важких кораблів і галер, які прозвали #italic вежами на воді#!."
  cha_cham_cultural_influence: "$cham_culture$ий культурний вплив"
  cha_cham_cultural_influence_desc: "Деякі сусідні країни дивляться на нашу культуру зверхньо, але реальність говорить сама за себе: їхні так звані «цивілізовані» двори вже переймають багато її аспектів. $cham_culture$і барабанні ритми, пісні, танці та поезія не залишають байдужими нікого."
  dai_vietnamese_architecture: "$vietnamese_culture$а архітектура"
  dai_vietnamese_architecture_desc: "У нашій архітектурі помітний вплив Китаю, але тим не менш вона унікальна. Нехай ми дотримуємося правил феншуй, проте виключили більшість елементів китайської культури, а все, що залишилося, адаптували під свій стиль."
  dai_tran_hung_dao: "Чан Хионг Дао"
  dai_hung_dao_trans_military_feats: "Тактика $dai_tran_hung_dao$"
  dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ був імперським принцом $DAI$ багато десятків років тому. Під час монгольського вторгнення в $DAI$ у 1258 році він служив офіцером, був одним із старших командирів на другій війні в 1285-му і відбивав третій натиск у 1287-му. У цих кровопролитних битвах $dai_tran_hung_dao$ розробив надійну тактику відбиття кінних атак."
  dai_nha_nhac: "Няняк"
  dai_nha_nhac_desc: "$dai_nha_nhac$ — традиційна музика, яку грають при наших дворах і на щорічних церемоніях. Це значущий аспект нашої культури та одна з найважливіших традицій."
  dai_confucian_administration: "Конфуціанське управління"
  dai_confucian_administration_desc: "Бюрократія в нашій країні відіграє важливу роль, і тому для роботи в органах управління відбирають лише найдосвідченіших чиновників. Вчення китайського мудреця Конфуція допомагають їм забезпечувати гладку та безперебійну роботу державного апарату."
  dai_giao_chi_arquebus: "Аркебуза Зяоті"
  dai_giao_chi_arquebus_desc: "$dai_giao_chi_arquebus$ — основний тип озброєння в нашому війську. Ці аркебузи здобули повагу не тільки в китайців, а й у західних спостерігачів."
  dai_ca_tru: "Качу"
  dai_ca_tru_desc: "$dai_ca_tru$ — в'єтнамський жанр музичного оповідання, до якого вдаються як для розваги, так і в релігійних співах."
  dai_trade_advance: "Торгові угоди"
  dai_trade_advance_desc: "Занадто довго $CHI$ служить нам прикладом для наслідування. Ми повинні залишити власний слід в історії, а для цього потрібно вийти за межі китайської сфери впливу."
  dai_literary_reform: "Літературна реформа"
  dai_literary_reform_desc: "Багато століть ми вели документацію китайською мовою. Але ж зазвичай для письма ми використовуємо місцевий алфавіт Ти-ном на основі китайського Кандзі. Ти-ном використовується занадто рідко в порівнянні з класичною китайською, тому необхідність переходу на рідну мову в діловодстві стає все очевиднішою."
  dai_don_dien: "Дон-дієн"
  dai_don_dien_desc: "$dai_don_dien$ — система організації військових колоній, де солдати та безземельні селяни розчищають місцевість для будівництва нових сіл. За три роки ці села вбудовуються в нашу адміністративну систему, а загони солдатів і селян переходять на нові ділянки."
  dai_thuan_thien: "Тхуантхієн"
  dai_thuan_thien_desc: "$dai_thuan_thien$ — «Воля Небес» — ім'я легендарного меча нашого визволителя Ле Лоя. Згідно з переказом, меч наділив його силою тисячі людей, щоб покінчити з китайським ярмом. Ле Лоя називають ідеальним лідером для нашої країни."
  foreign_architectural_influence: "Чужоземний вплив в архітектурі"
  foreign_architectural_influence_desc: "Під час численних завойовницьких походів в Індонезії ми не раз зустрічали різні архітектурні стилі та брали від них найкраще, щоб увічнити свою культурну спадщину та збагатити культуру й мистецтво."
  maj_home_of_the_sea_nomads: "Батьківщина морських кочівників"
  maj_home_of_the_sea_nomads_desc: "$n_kabang_desc$"
  maj_jong_advance: "$n_jong$"
  maj_jong_advance_desc: "$n_jong_desc$"
  maj_bajang_ratu: "Брама $bajang_ratu$"
  maj_bajang_ratu_desc: "$bajang_ratu_desc$"
  maj_late_karambit_warriors: "$a_late_karambit_warrior$"
  maj_late_karambit_warriors_desc: "$a_late_karambit_warrior_desc$"
  maj_sumpah_palapa: "Присяга Палапи"
  maj_sumpah_palapa_desc: "Верховний головнокомандувач, людина в прямому підпорядкуванні правителя, має величезну владу та вплив на долю всього народу. Приймаючи цей священний обов'язок з належною відповідальністю, він складає особливу присягу, слова якої розбурхують душі, нагадуючи про наші великі цілі."
  maj_bubu_and_jala: "Бубу та Джала"
  maj_bubu_and_jala_desc: "$bubu_building_desc$"
  maj_the_magic_arrow: "Чарівна стріла"
  maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"
  maj_maritime_silk_road: "Морський Шовковий шлях"
  maj_maritime_silk_road_desc: "Географічне положення вкупі зі зростаючим впливом нарешті дозволяють нам очолити велику та прибуткову мережу торгівлі шовком і спеціями між Сходом і Заходом."
  maj_restore_candi_shrines: "Відновлення святилищ Канді"
  maj_restore_candi_shrines_desc: "Мережа храмів, побудованих по всій Нусантарі, називається Канді. Щоб віра нашого народу зміцніла, потрібно відновити якомога більше цих святилищ."
  maj_the_ghali: "$n_madurese_gali$"
  maj_the_ghali_desc: "$n_madurese_gali_desc$"
  maj_island_colonies: "Острівні колонії"
  maj_island_colonies_desc: "Встановивши контакт з безліччю сусідів по архіпелагу, ми зрозуміли, що на відстані витягнутої руки від нас лежать величезні запаси ресурсів і необжиті землі, з яких ми зможемо отримати максимум користі."
  maj_preservation_of_javanese_history: "Збереження яванської історії"
  maj_preservation_of_javanese_history_desc: "Яванська культура, що сягає корінням глибоко в історію, — важлива частина нашого життя. Заради власної самобутності ми повинні зберегти традиції, що стали фундаментом великої держави."
  heian_kyo: "Хейан-кьо"
  heian_kyo_desc: "Місто Хейан-кьо — традиційна резиденція імператора, де вже не перше століття стрімко розвиваються мистецтво та культура. В епоху дому $fujiwara$ хейанський двір був настільки багатий, що кожен японець дивився на нього з благоговінням. Час згадати ці славні часи. Під нашим заступництвом столична культура розквітне знову."
  matsuri: "Мацурі"
  matsuri_desc: "У кожному місцевому храмі та святилищі є власні свята та пам'ятні дати, і місцеве населення завжди із задоволенням їх відзначає. Адже саме так вони можуть висловити пошану та подяку місцевому камі-захиснику."
  onmyodo: "Оммьодо"
  onmyodo_desc: "Концепція інь-ян прийшла з Китаю багато століть тому, і в Японії з неї виросло вчення оммьодо. Його адепти, оммьодзі, займаються очищенням і вигнанням злих і мстивих духів, а також пророцтвами, астрономією та дослідженням природи."
  sumo: "Сумо"
  sumo_desc: "$sumo$ — землеробський танець-молитва про дарування доброго врожаю, який переріс рамки придворного ритуалу та священного обряду, перетворився на популярну розвагу простолюдинів, а заодно став частиною курсу військової підготовки."
  nanto_rokushuu: "Нанто Рокусю"
  nanto_rokushuu_desc: "Відтоді як з Китаю прийшов буддизм, храми в регіоні Нара користуються великим впливом. У них утворилося шість шкіл, що стали сховищами знань, особливо про вчення Будди та пошуки просвітлення, але також у них можна доторкнутися і до більш мирських знань, наприклад, дізнатися, як правильно керувати монастирем."
  shinbutsu_shuugou: "Сімбуцу-сюґо"
  shinbutsu_shuugou_desc: "Відколи буддизм прижився в Японії, його вчення змішуються з шануванням місцевих камі. Виникла нова система вірувань та унікальних ритуалів, що об'єднала Будду та камі."
  honji_suijaku: "Хондзі-суйдзяку"
  honji_suijaku_desc: "$shinbutsu_shuugou$ визначає місцевих камі як втілення різних Будд, а Будд — як втілення різних камі. Разом і ті, й інші — одне, істинна форма (#italic  хондзі#!), а в різних втіленнях — #italic  суйдзяку#!."
  hachiman_worship: "Культ Хатімана"
  hachiman_worship_desc: "Хатіман — одне з найбільш шанованих божеств. Спочатку він являв собою обожненого імператора Одзіна Тенно, а з появою буддизму також вважався бодхісатвою. Він захисник імператорського роду і бог — наставник воїнів."
  gozan_jissetsu: "Ґозан Дзіссецу"
  gozan_jissetsu_desc: "Традиційна «Система П'яти гір» зародилася в китайських буддистських монастирях, які підтримувала країна і які стояли на п'яти священних горах, — звідси її назва. В Японії ця практика застосовувалася в епоху Камакура — країна підтримувала храми дзен, п'ять гір Кіото і п'ять гір Камакура. Завдяки фінансуванню ці інститути виступатимуть за нашу владу."
  bodaiji: "Бодайдзі"
  bodaiji_desc: "Культ предків з'явився в наших землях ще в давні часи. Найвпливовіші наші правителі зводять цілі храми, які після їхньої смерті стають одночасно могилами та об'єктами поклоніння. Таким чином ці найдостойніші люди увічнюють пам'ять про себе та свої діяння."
  kagura: "Каґура"
  kagura_desc: "Колись цей священний ритуальний танець виконували перед двором храмові танцівниці #italic  міко#!. $kagura$ породив безліч ритуальних народних танців по всій Японії. Вони приймали різні форми, але зберігали традиції та дух вихідного ритуалу."
  obon: "Обон"
  obon_desc: "Обон — одне з найважливіших святкувань. Люди вшановують мертвих, приносять предкам підношення у вигляді їжі, виконують ритуальні танці, а також вивішують на вулиці ліхтарі, які допомагають душам померлих знайти дорогу додому, а потім повернутися у світ духів."
  neo_confucianism: "Неоконфуціанство"
  neo_confucianism_desc: "Конфуціанство існує тисячі років, та й неоконфуціанство в Японії розвивається вже багато століть. Однак якщо зараз почати активно підтримувати це філософське вчення, влада уряду зміцниться ще сильніше."
  danka_system: "Система данка"
  danka_system_desc: "Протягом століть важливою частиною життєвого укладу японських сімей були буддистські храми. Перші забезпечували другим фінансування, а ті, у відповідь, забезпечували їм зв'язок з божественними силами. Якщо ця система охопить все населення, про його духовний розвиток можна буде не турбуватися."
  harae: "Харае"
  harae_desc: "Ритуал очищення — #italic  харае#! — ключовий обряд нашої релігії. Він знімає з людини всі гріхи (#italic  цумі#!) та нечистоту (#italic  кеґаре#!). Якщо наш народ буде регулярно і скрупульозно виконувати ритуал харае, духовна чистота країни буде забезпечена."
  jisha_bugyou: "Дзіся-буґьо"
  jisha_bugyou_desc: "$jisha_bugyou$ наглядає за всіма храмами та святилищами і регулює їхню діяльність. Це відомство стежить, щоб їхні інтереси не розходилися з інтересами уряду."
  kokugaku: "Кокуґаку"
  kokugaku_desc: "Практично з тих пір, як Японія стала самостійною країною, вона в цілому і синтоїзм зокрема були пронизані китайськими ідеями та буддистськими концепціями. І ось серед нас зароджується новий рух — його учасники говорять про чистоту та самобутність нашої власної культури, а також вимагають позбавити її від чужоземного впливу."
  home_shrines: "Сімейні вівтарі"
  home_shrines_desc: "Зазвичай відправленням релігійних обрядів займаються святилища та храми. Однак дедалі більше людей починають будувати й домашні вівтарі #italic камідзана#!, де поклоняються камі, та #italic буцудани#!, подібні до буддійських вівтарів предків."
  fukko_shinto: "Фукко Сінто"
  fukko_shinto_desc: "Люди опираються чужоземному впливу на нашу культуру і, як наслідок, виступають проти того, що буддизм і конфуціанство проникають у нашу віру. За цією логікою синтоїзму потрібне оновлення."
  jap_bushido: "Бусідо"
  jap_bushido_desc: "Хоча офіційного зводу правил поведінки воїнів не існує, правила ці, проте, гранично ясні. Обов'язок кожного бійця — битися і перемагати будь-якими доступними способами, розширюючи вплив свого клану."
  jap_land_of_the_rising_sun: "Країна вранішнього сонця"
  jap_land_of_the_rising_sun_desc: "Японія — країна з довгою та славною історією. Самобутні традиції, хоробрі воїни та вдале географічне положення роблять нас однією з найсильніших країн у регіоні. Скоро Країна вранішнього сонця займе своє місце серед найвеличніших країн світу!"
  jap_ancestral_legacy: "Спадщина предків"
  jap_ancestral_legacy_desc: "Історія нашого клану добре відома. Це справжнє надбання, яке варто оберігати будь-що. Родовід визначає наше становище та забезпечує нам право на престол."
  jap_shinobi: "Ніндзя"
  jap_shinobi_desc: "Інформація — ключ до успіху. Ми давно відправляємо шпигунів і лазутчиків, які здобувають для нас безцінні відомості. Зазвичай ніндзя належать до класу самураїв, але ми наймаємо і місцевих жителів. Проникнувши у ворожі землі, наші ніндзя змішуються зі звичайними людьми та створюють цілу шпигунську мережу, яка може стати в пригоді нам у майбутньому."
  jap_head_hunting: "Полювання за головами"
  jap_head_hunting_desc: "Досягнення воїна на полі бою мають вагу лише тоді, коли він може їх довести. Ми накажемо самураям зібрати відрубані голови переможених ворогів і доставити генералу. Нагорода залежатиме не лише від кількості голів, а й від того, наскільки впливовим особистостям вони належали."
  jap_ichiban_yari: "Ітібан Ярі"
  jap_ichiban_yari_desc: "Виявитися першим воїном, що завдав удару противнику, — це велика честь, тому наші бійці за будь-якої нагоди прагнуть стати першим списом, що пронизав стан ворога."
  jap_ashigaru: "Асігару"
  jap_ashigaru_desc: "Війна завжди була долею могутніх самураїв, але нещодавні події показали, що нам потрібно збільшити чисельність військ за рахунок селян. Однак асігару не будуть просто різношерстим натовпом. Постійні тренування та багатий бойовий досвід зроблять їх грізними бійцями, здатними битися нарівні з самураями."
  jap_daiku_construction: "Техніка дайку"
  jap_daiku_construction_desc: "Будівельна техніка #italic дайку#! з давніх часів використовується при зведенні японських споруд. Наші дерев'яні будівлі не тільки тішать око, але також відрізняються високою міцністю та практичністю. Ми використовуємо дерево у всіх наших будівлях, чи то непоказна хатина, чи шикарний палац."
  jap_wandering_ronin: "Мандрівний ронін"
  jap_wandering_ronin_desc: "Самураї часто блукають країною в пошуках кращої пропозиції та присягають тому пану, який готовий заплатити більше. Ці люди, немов морські хвилі, постійно приходять і йдуть, але ми завжди можемо знайти їм застосування."
  jap_reformed_land_holding: "Реформоване землеволодіння"
  jap_reformed_land_holding_desc: "Раніше цінність землі визначалася її площею, а не родючістю. Тепер же цінність землі залежатиме від того, скільки рису можна на ній виростити. Такий підхід дозволить використовувати землі максимально ефективно."
  jap_jokamachi: "Дзьокаматі"
  jap_jokamachi_desc: "У неспокійні часи люди воліють селитися поруч із надійними спорудами. До міст, що ростуть навколо укріплених замків, стікатимуться купці, а розвиток торгівлі сприятиме процвітанню."
  jap_terakoya: "Теракоя"
  jap_terakoya_desc: "У теракоя — приватних школах — здобувають освіту простолюдини. Там вони вчаться читати, писати та рахувати, а також осягають моральні цінності. Завдяки теракоя народ стає більш освіченим і вихованим, що сприяє зміцненню та розвитку країни."
  jap_codified_bushido: "Кодифікація бусідо"
  jap_codified_bushido_desc: "Поведінка самурая дедалі більше ідеалізується, а такі цінності, як честь і вірність, стають важливішими за його бойові якості. Ця романтизована та кодифікована версія бусідо безсумнівно підвищить авторитет наших воїнів, хоча в реальності вони поводяться по-іншому."
  kgk_omi_genji: "Омі Ґендзі"
  kgk_omi_genji_desc: "Наші предки колись належали до гілки Уда Ґендзі роду Мінамото. Крім того, ми довгий час були сюґо провінції Омі. Ми маємо повне право захищати її."
  kgk_emerging_clan: "Клан, що зароджується"
  kgk_emerging_clan_desc: "Будучи вихідцями з давніх династій, ми відкололися від клану Сасакі порівняно недавно. Наші люди прагнуть визнання під новим ім'ям."
  akt_march_of_akita: "Воїни Акіти"
  akt_march_of_akita_desc: "У давнину наш феод Акіта, розташований на півночі провінції Дева, перебував на вістрі боротьби з північними варварами. Відтоді Японія сильно розширилася на північ, але в нашій крові досі живе дух предків."
  akt_ezo_kanrei: "Канрей Едзо"
  akt_ezo_kanrei_desc: "Наш клан виконує обов'язки канрея (правителя) Едзо ще з часів сьоґунату Камакура. Ми завідуємо всіма справами на цьому острові, куди засилають злочинців, тому підтримуємо тісні зв'язки з тими, хто мешкає по той бік протоки."
  akt_ainu_trade: "Торгівля з айнами"
  akt_ainu_trade_desc: "Ми виявилися одними з перших японців, які налагодили торгівлю з айнами. Наші кораблі невпинно перевозять товари між землями двох народів, приносячи значний прибуток обом сторонам."
  asa_legacy_of_emperor_keitai: "Спадщина імператора Кейтая"
  asa_legacy_of_emperor_keitai_desc: "Багато століть тому Кейтай використав людей провінції Етідзен, щоб розпочати війну та зайняти імператорський престол. Як і він, ми не повинні боятися вийти за межі своїх кордонів і нападати на сусідні землі, коли ситуація того вимагає."
  asa_control_of_buddhist_sects: "Контроль над буддійськими школами"
  asa_control_of_buddhist_sects_desc: "У провінції Етідзен розташовуються ключові храми різних напрямків буддизму, зокрема храм Ейхейдзі школи Сото та храм Хейсендзі школи Тендай. Якщо ми зуміємо взяти всі ці школи під контроль і забезпечити мирне співіснування конфесій у провінції, у нас з'явиться чудова основа для реалізації релігійної політики на всіх наших територіях."
  ask_defender_of_the_imperial_court: "Захисники імператорського двору"
  ask_defender_of_the_imperial_court_desc: "Коли сьоґунат Камакура впав, ми забезпечили безпеку імператора та його двору. Так ми завоювали репутацію справжніх захисників імперії та поборників придворних традицій, перетворившись на головний клан Японії."
  ask_bugyoshu_and_hokushu: "Буґьосю та хокосю"
  ask_bugyoshu_and_hokushu_desc: "Ми повинні зміцнити владу чиновників нашої адміністрації, включно з юристами буґьосю та командирами хокосю. Часом сильна бюрократія — єдине, що утримує народ від громадянської війни."
  ask_higashiyama_culture: "Культура Хіґасіяма"
  ask_higashiyama_culture_desc: "Краса в простоті — ось основна ідея культури Хіґасіяма, на яку сильно вплинула філософія дзен-буддизму. Її розквіт супроводжує появу чайної церемонії та ікебани, а також розвиток театру та мистецтв. Ця епоха матиме на нас великий вплив, а її видатні діячі прославляться на весь світ."
  ask_shugo_system: "Система сюґо"
  ask_shugo_system_desc: "Сюго — це найважливіші васали сьогуна, що керують землями від його імені. $JAPANESE_SHOGUNATE_LEADER_MALE$ може істотно поліпшити управління своїми землями завдяки зусиллям з боку сюго."
  cba_lineage_of_taira: "Рід Тайра"
  cba_lineage_of_taira_desc: "Клан Тіба — стародавня гілка роду Тайра, що виникла наприкінці періоду Хейан. Всупереч нашому скромному політичному становищу цей факт дає нам багато влади та впливу."
  cba_katori_jingu: "$katori_shrine$"
  cba_katori_jingu_desc: "У $katori_shrine$ поклоняються Фуцунусі-но-камі, богові-покровителю бойових мистецтв, який особливо шанується японськими воїнами. Ми повинні скористатися цим фактом на благо наших самураїв."
  cba_dream_of_masakado: "Мрія Масакадо"
  cba_dream_of_masakado_desc: "Тайра-но Масакадо — великий воїн давнини, пов'язаний з нашим кланом кровними узами, який одного разу спробував завоювати престол Східної Японії. На жаль, Масакадо не вдалося здійснити задумане, але його мрія про нову країну для самураїв стала дороговказом для нащадків."
  cba_irrigation_of_southern_kanto: "Зрошення Південного Канто"
  cba_irrigation_of_southern_kanto_desc: "Значна частина наших володінь — це болотиста місцевість, де неможливо повноцінно вести землеробство. Однак завдяки останнім винаходам у галузі зрошення земель ми можемо обробляти нові поля і навіть осушувати болота. Настав час розпочати виконання грандіозного плану з освоєння територій, покликаного поліпшити нашу економічну ситуацію."
  csk_clans_of_tosa: "Клани Тоси"
  csk_clans_of_tosa_desc: "Влада над нашою рідною провінцією Тоса здавна поділена між могутніми кланами. Щоб розширити свої кордони, нам слід діяти спільно. Інші клани допоможуть нам піднестися, а ми натомість посилимо їхній вплив."
  csk_god_of_arts: "Бог мистецтв"
  csk_god_of_arts_desc: "Засновника нашого клану на ім'я Хата-но Кавакацу шанували як бога, що покровительствує всім мистецтвам: від традиційних танців до театру. Щоб завоювати повагу серед японського народу, ми повинні брати приклад з нашого прославленого предка."
  csk_unification_of_shikoku: "Об'єднання Сікоку"
  csk_unification_of_shikoku_desc: "Інші жителі Японії вважають Сікоку бідним ізольованим островом, де не відбувається рівним рахунком нічого важливого, і це нам тільки на руку. Так вони проґавлять об'єднання нашої провінції, а коли схаменуться, буде вже пізно."
  csk_expand_the_navy: "Нарощування флоту"
  csk_expand_the_navy_desc: "Японія — острівна країна, і для процвітання нам необхідний сильний флот. Тоса стане ідеальним місцем для створення нашої власної армади."
  dte_fujiwara_hokke: "Північна гілка роду Фудзівара, або Хокке"
  dte_fujiwara_hokke_desc: "Легітимність нашого правління ґрунтується на нашому походженні з північної гілки роду $fujiwara$ і не підлягає сумніву."
  dte_oshu_shugo: "Сюго Осю"
  dte_oshu_shugo_desc: "Наш благородний клан, що виник на початку епохи Камакура, заявив про свої претензії на провінцію Осю. На щастя для нас, у цієї провінції немає чітких кордонів."
  dte_dragon_of_oshu: "Дракон Осю"
  dte_dragon_of_oshu_desc: "Вороги заздритимуть нашій могутності. Наше ім'я назавжди буде пов'язане з Драконом Осю."
  dte_intensive_domain_development: "Інтенсивний розвиток володінь"
  dte_intensive_domain_development_desc: "Багато хто вважає область $ou_area$ з її суворим кліматом і гористою місцевістю бідним краєм. Однак у нас тут є величезний потенціал для розвитку. Ми можемо перетворити свою батьківщину, якщо будемо закладати там нові міста, заохочувати та підтримувати торгівлю, будувати канали та розширювати сільськогосподарські угіддя. Крім того, скасування обтяжливих податків і зборів поліпшить добробут наших підданих і забезпечить процвітання області."
  htk_hatakeyama_heritage: "Спадщина роду Хатакеяма"
  htk_hatakeyama_heritage_desc: "Через наше минуле дехто вважає лідерів нашого клану бунтівниками та смутьянами, але вони помиляються, приймаючи незламність за свавілля. Ми відродилися і не зупинимося, доки не отримаємо своє і не розтрощимо кожного, хто стане на нашому шляху!"
  htk_shogunate_ties: "Зв'язки з сьогунатом"
  htk_shogunate_ties_desc: "Наш клан, що походить від однієї з гілок роду Асікаґа, тісно пов'язаний із сьогунатом. Представники інших сімей завжди поважатимуть нас."
  htk_clan_spread: "Зростання впливу клану"
  htk_clan_spread_desc: "Ми не звикли задовольнятися малим, тому намагаємося поширити свій вплив на всю країну. На територіях, які опиняться під нашим впливом, наш клан користуватиметься незаперечним авторитетом."
  hsk_rising_clan: "Сходження клану"
  hsk_rising_clan_desc: "Нехай наш клан не може похвалитися великою історією і виглядає скромно на тлі тих, що походять від роду Асікаґа, нам вдалося значно розширити свій вплив. Наш клан переживає розквіт, і це лише початок довгого шляху."
  hsk_control_of_izumi_sea: "Контроль над морем Ідзумі"
  hsk_control_of_izumi_sea_desc: "Споконвіку нашому клану належали землі вздовж протоки Кії. Контроль над торговими суднами, які везуть свої товари на великий острів, допоможе нам збагатитися і процвітати як ніколи."
  hsk_branches_and_retainers: "Гілки та їхні васали"
  hsk_branches_and_retainers_desc: "Наш рід дуже впливовий. Його члени та їхні васали володіють кількома багатими територіями, але при цьому залишаються вірними лідеру клану. Завдяки внутрішній гармонії ми станемо одним із наймогутніших кланів Японії."
  img_claim_to_shogunate: "Претензії на сьогунат"
  img_claim_to_shogunate_desc: "$JAPANESE_SHOGUNATE_LEADER_MALE$ поки править Японією, але наш клан — нащадки роду Асікаґа, тож якщо основна лінія перерветься, ми маємо повне право претендувати на його титул. І нехай зараз видимих загроз для бакуфу немає, ми повинні подбати про те, щоб ніхто не забував про наше право в силу походження."
  img_supreme_ruler_of_tokaido: "Контроль над Токайдо"
  img_supreme_ruler_of_tokaido_desc: "Токайдо — це найважливіший торговий шлях, що з'єднує Центральну та Східну Японію. Споконвіку наш клан володіє землями, розташованими в центрі регіону, що дозволяє нам контролювати сам регіон та його економіку."
  img_unlikely_alliances: "Несподівані союзи"
  img_unlikely_alliances_desc: "Часом найкращий спосіб здолати ворога — стати його другом. Завдяки шлюбу ми захистимо свої фланги, придбаємо нових союзників, утихомиримо ворогів і переконаємося, що зможемо також розбити їх і на полі бою."
  img_march_to_kyoto: "Похід на $kyoto$"
  img_march_to_kyoto_desc: "Поки Японія та $kyoto$ загрузли в політичному хаосі, будь-кому може спасти на думку ідея вирушити до столиці та захопити владу. Як близькі родичі Асікаґи, ми маємо право та зобов'язані забезпечити стабільність країни."
  isk_sanindo_gate: "Брама $sanindou_area$"
  isk_sanindo_gate_desc: "Провінція $tango_province$ в області $sanindou_area$ вважається брамою до $kyoto$ та краєм, який має велике економічне значення. Зміцнюючи та розширюючи свою присутність у цій провінції, ми зможемо скористатися її процвітанням."
  isk_minister_of_samurai_dokoro: "Голова Самурай-докоро"
  isk_minister_of_samurai_dokoro_desc: "Наш клан належить до одного з чотирьох могутніх сімейств, членів яких призначають головами збройних сил та поліції у відомстві Самурай-докоро. Наш обов'язок та привілей — підтримувати мир у столиці та інших важливих областях."
  ito_gokenin_family: "Клан ґокенінів"
  ito_gokenin_family_desc: "Наші предки допомогли Мінамото-но Йорітомо заснувати сьогунат Камакура. В нагороду за допомогу ми отримали титул ґокенінів та землі в провінції $hyuuga_province$. Цієї честі удостоюються небагато сімей на Кюсю."
  ito_sympathy_to_foreign_faiths: "Терпимість до нових віровчень"
  ito_sympathy_to_foreign_faiths_desc: "До нас приїжджають іноземці найрізноманітнішого віросповідання. Ми вважаємо, що люди можуть дотримуватися будь-яких вірувань, якщо це не шкодить традиційній релігії."
  kkc_disinguished_family_in_kyushu: "Знатний рід"
  kkc_disinguished_family_in_kyushu_desc: "На відміну від інших впливових кланів острова Кюсю, наша родина оселилася тут ще до створення сьогунату Камакура. Ми користуємося великою повагою, і про наші досягнення знають усі."
  kkc_resistance_against_foreign_intervention: "Захист від навали"
  kkc_resistance_against_foreign_intervention_desc: "Усі знають, яку роль відіграв наш клан у захисті країни від навали монголів. Ім'я Кікуті Такефуси, який героїчно відганяв загарбників від наших кордонів, залишається в усіх на вустах, і наші воїни готові битися так само сміливо, як і він."
  ktb_southern_court: "Прихильники імператора"
  ktb_southern_court_desc: "Хоча імператорська родина втратила політичний вплив, ні для кого не секрет, що після розколу ми незмінно надавали підтримку Південному Двору. Заслуживши репутацію вірних служителів Хризантемового трону, ми покажемо світові, що у своїй рішучості ми значно перевершуємо менші, але впливовіші японські династії."
  ktb_control_of_ise: "Контроль над $ise_province$"
  ktb_control_of_ise_desc: "Ми поширили свою владу на всю провінцію $ise_province$ — від її багатих земель на півдні до великих міст на півночі — і тепер ресурси цієї провінції допоможуть нам ще далі розширити вплив нашого клану."
  ktb_blessing_of_amaterasu: "Благословення Аматерасу"
  ktb_blessing_of_amaterasu_desc: "Ми отримали благословення від самої богині сонця та всесвіту як хранителі найвеличнішої з японських святинь у провінції $ise_province$. А щоб заслужити повагу японського народу, ми повинні бути гідними честі хранителів цього національного скарбу."
  ktb_the_march_of_kitabatake_akiee: "Воїни Кітабатакe Акіе"
  ktb_the_march_of_kitabatake_akiee_desc: "Наш благородний предок Кітабатакe Акіе довів, що за належної рішучості навіть похід з Оу до центральної частини Японії можна здійснити в найкоротші терміни. Треба навчати війська стрімким маневрам, щоб за необхідності швидко переходити з одного фронту на інший."
  kno_shugo_of_iyo: "Сюго Ійо"
  kno_shugo_of_iyo_desc: "Ще з XII століття, коли добігав кінця період Хейан, ми володіли найпотужнішим флотом у Внутрішньому Японському морі. Саме завдяки йому ми посіли місце сюго цієї провінції."
  kno_ruler_of_inland_sea: "Панування у Внутрішньому Японському морі"
  kno_ruler_of_inland_sea_desc: "Через Внутрішнє Японське море проходить безліч торгових шляхів, і для нас влада над ним — питання життя і смерті. Контроль над морською торгівлею можливий лише за наявності сильного флоту."
  kno_murakami_suigun: "Муракамі Суйгун"
  kno_murakami_suigun_desc: "Сумнозвісний клан Муракамі — це банда піратів, що орудують у Внутрішньому Японському морі. Ми можемо зробити їх частиною свого клану і відправити цих грізних каперів назустріч нашим ворогам!"
  mri_descendant_of_oe_hiromoto: "Нащадки Оое-но Хіромото"
  mri_descendant_of_oe_hiromoto_desc: "Родоначальником нашого клану був відомий учений і політик Оое-но Хіромото, який зробив великий внесок у встановлення сьогунату Камакура. Ми пишаємося тим, що успадкували від нього талант до управління. Донині нам немає рівних у цій галузі."
  mri_munakata_three_goddesses: "Три богині роду Мунаката"
  mri_munakata_three_goddesses_desc: "Три дочки бога вітру Сусаноо-но Мікото вважаються покровительками моряків. Їхнє благословення зробить наші флоти воістину непереможними."
  nbu_genji_in_the_north: "Гендзі з Осю"
  nbu_genji_in_the_north_desc: "Ми належимо до молодшої гілки роду Каї Ґендзі. У XII столітті наш засновник нагороду за вірну службу сьоґунату Камакура отримав маєток у провінції Осю. Ми знаємо цей регіон як свої п'ять пальців і можемо використовувати його особливості, наприклад суворі зими, на благо свого війська."
  nbu_fight_against_famines: "Перемога над голодом"
  nbu_fight_against_famines_desc: "Через холодну та вітряну пізню осінь, а також сніжну ранню весну наші люди часто страждають від голоду. Щоб уникнути катастрофи в майбутньому, ми повинні запастися продовольством і постаратися покращити стан наших земель."
  nbu_northern_horses: "Північні коні"
  nbu_northern_horses_desc: "Місто Муцу завжди славилося своїми кіньми, яких продавали в Кіото. У Муцу досі займаються конярством, і якщо ми продовжимо цю традицію, зібрати кавалерію нам буде простіше, ніж багатьом сусідам."
  oda_uninspiring_clan: "Недооцінений клан"
  oda_uninspiring_clan_desc: "Попри давній родовід, наш клан не такий впливовий, як сусідні. Недооцінка нашої сили стане їхньою фатальною помилкою."
  oda_generals: "Генерали з роду Ода"
  oda_generals_desc: "Одержимість родоводом та привілеями значно послабила країну, а поява могутніх кланів, які самостійно досягли високого становища, довела всю абсурдність цих застарілих уявлень. Давайте засвоїмо цей урок, і нехай головними чеснотами наших майбутніх полководців стануть успіх та майстерність. Щоб швидко захопити нові землі, потрібні сильні лідери."
  oda_tenka_fubu: "Тенка фубу"
  oda_tenka_fubu_desc: "Наше призначення — підкорити собі всю країну. Ніхто не встоїть перед нашою військовою міццю і не посміє оскаржити нашу владу."
  oda_triple_firing: "Потрійний постріл"
  oda_triple_firing_desc: "Винахід вогнепальної зброї кардинально змінив — і продовжує змінювати — тактики ведення бойових дій на Японських островах. Навчившись поводитися з цією зброєю, ми зможемо перемогти в будь-якій битві. Щоб підвищити швидкість стрільби, наші аркебузири вишикуються в шеренги, і поки один стріляє, двоє інших встигатимуть перезарядитися."
  oda_influential_strongholds: "Вплив фортець"
  oda_influential_strongholds_desc: "Японію можна назвати країною замків та укріплень. Ті, хто володіє потужними фортецями, отримують певну політичну вагу та контроль над ключовими військовими маршрутами. У цьому і полягає урок, який нам потрібно засвоїти: зводячи твердині, ми не даємо людям забути про нас і про нашу силу. У всі часи наше головне завдання — позбавлятися ворожих замків і будувати власні укріплення в стратегічно важливих точках."
  oda_patronization_of_the_west: "Прихильність до Заходу"
  oda_patronization_of_the_west_desc: "Західні місіонери принесли в нашу країну безліч ідей та технологій. До того ж, на відміну від представників старих буддійських шкіл, вони не заплямували себе зв'язками з продажними землевласниками та бунтівними містами. Ми зустрічатимемо таких людей з розпростертими обіймами, а заодно дізнаємося, яку користь вони можуть принести нашому двору."
  ogs_ogasawara_ryu: "Огасавара-рю"
  ogs_ogasawara_ryu_desc: "Класичні військові мистецтва високо цінуються в нашому суспільстві. Ми надали офіційного статусу бойовому стилю та правилам етикету, розробленим ще засновником нашого клану Огасаварою Нагакійо. Такому повинні навчатися всі самураї."
  ogs_shinano_shugo: "Сюго $shinano_province$"
  ogs_shinano_shugo_desc: "Наш клан походить від давньої гілки Ґендзі та править провінцією $shinano_province$ як сюго. Декому цей гірський край може здатися негостинним, але для нас він здавна відіграє важливу роль у захисті від чужинців. Нам слід застосовувати цей досвід скрізь, куди б не вирушили наші війська, а, крім того, варто завжди збирати цінні відомості про місцевість, щоб користуватися всіма вигодами ландшафту в кожній битві."
  ogs_kiso_uma: "Кісо-ума"
  ogs_kiso_uma_desc: "Коні, виведені в долині Кісо, — наші вірні друзі. Вони не відрізняються ні великими розмірами, ні високою швидкістю, проте мають завидну витривалість і здатні виживати в горах."
  ogs_improvment_of_nakasendo: "Розвиток Накасендо"
  ogs_improvment_of_nakasendo_desc: "Накасендо — одна з ключових доріг, що з'єднують Центральну та Східну Японію. Заволодівши нею, ми отримаємо контроль над усіма торговцями, які використовують цей маршрут."
  suw_suwa_taisha: "Сува-тайся"
  suw_suwa_taisha_desc: "Комплекс Сува-тайся навколо озера Сува — одне з найстаріших святилищ Японії, відоме далеко за межами Сінано. Під час свята Омбасіра-мацурі, що проводиться в околицях комплексу, люди демонструють свою хоробрість, з'їжджаючи на колодах до підніжжя святилища."
  otm_lord_of_bungo: "Владика Бунго"
  otm_lord_of_bungo_desc: "Ми були сюго провінції Бунго з часів сьогунату Камакура. Ці землі славляться своєю родючістю, і багаті врожаї дозволяють нам прогодувати військо, що чисельністю перевершує війська багатьох інших даймьо."
  otm_domination_of_kyushu: "Влада над Кюсю"
  otm_domination_of_kyushu_desc: "Нас призначили сюго одразу трьох провінцій: $bungo_province$, $hizen_province$ та $hyuuga_province$. У нас є підстави претендувати на весь острів Кюсю."
  otm_nanban_trade: "Торгівля з південними варварами"
  otm_nanban_trade_desc: "Деякі вважають іноземців варварами і не хочуть торгувати з ними, але ми дотримуємося іншої думки. Ми прагнемо розширити торгівлю та обійти конкурентів, тому наші порти завжди відкриті для чужоземних кораблів."
  otm_christian_conversion: "Новонавернені християни"
  otm_christian_conversion_desc: "Через зміцнення зв'язків з іноземцями багато членів нашого клану прийняли християнство. У християн достатньо покровителів серед наших могутніх владик і васалів, а новонавернені, як відомо, відрізняються особливим завзяттям. Ми можемо використовувати їхній вплив та ентузіазм на благо спільної справи незалежно від того, який шлях обере наш клан."
  ouc_descendant_of_baekje: "Нащадки Пекче"
  ouc_descendant_of_baekje_desc: "Літопис нашого роду свідчить, що ми є нащадками принца Імсона зі стародавнього королівства Пекче, що розташовувалося на території Корейського півострова. Завдяки цій легенді ми користуємося великою повагою в усій Східній Азії."
  ouc_korea_trade: "Торгівля з Кореєю"
  ouc_korea_trade_desc: "Через наше географічне положення ми ведемо найактивнішу торгівлю з Кореєю, і наші купці фактично отримали монополію на постачання багатьох екзотичних товарів. Ми повинні зробити все, щоб зберегти своє становище, і не дати різним вискочкам обійти нас."
  ouc_fight_against_wokou: "Захист від піратів"
  ouc_fight_against_wokou_desc: "Щоб зберегти добрі стосунки між нашими торговцями та торговцями з континенту, ми повинні регулярно патрулювати море. Якщо пірати та контрабандисти продовжать безчинствувати в цих водах, ми стикатимемося з недовірою і навіть ворожими діями з боку іноземців."
  ouc_welcome_missionaries: "Терпимість до ідей із Заходу"
  ouc_welcome_missionaries_desc: "Наша торгова мережа продовжує розширюватися, і ми налагоджуємо все нові й нові зв'язки з іноземцями, що сповідують найрізноманітніші релігії. Незалежно від того, у що вони вірять, гроші є гроші, і ми повинні виявляти відкритість, якщо хочемо вести справи з цими людьми."
  stk_hitachi_genji: "Ґендзі $hitachi_province$"
  stk_hitachi_genji_desc: "Ми — одні з найдавніших представників Ґендзі в Канто і билися за славу свого клану на сході Японії ще до того, як Мінамото-но Йорітомо заснував сьогунат Камакура. І тому наше право на титул сюго $hitachi_province$ незаперечне."
  stk_kashima_jingu: "$kashima_shrine$"
  stk_kashima_jingu_desc: "Одне з трьох найважливіших святилищ Канто, $kashima_shrine$, присвячене Такемікадзуті-но-О-но-камі, богу грому та мечів, а також покровителю боротьби сумо. Турбота про це святилище зміцнює рішучість наших військ."
  stk_eastern_coalitions: "Східні коаліції"
  stk_eastern_coalitions_desc: "Ми завжди трималися подалі від чвар між кланами і відігравали роль нейтральної сторони, до якої завжди могли приєднатися клани, що потребують захисту від загарбників. Ми зможемо отримувати вигоду з такого становища й надалі, якщо будемо в змозі забезпечити належний рівень захисту кланам, які на нас покладаються."
  sba_multiple_shugo: "Сюго кількох провінцій"
  sba_multiple_shugo_desc: "Ми обіймаємо посаду сюго одразу в кількох провінціях. Своїм багатством ми завдячуємо рисовим плантаціям, а також наймайстернішим японським ремісникам."
  sba_access_to_northern_japan: "Зв'язки в Осю"
  sba_access_to_northern_japan_desc: "Осю — наша батьківщина та другий дім. Завдяки зв'язкам у цій провінції ми зможемо закуповувати місцевих бойових скакунів, що славляться своєю силою."
  sba_shiba_retainers: "Васали роду $SBA$"
  sba_shiba_retainers_desc: "У нашому клані достатньо талановитих, але честолюбних васалів, тож їх варто було б трохи приструнити, адже вони так і норовлять посіяти розбрат усередині нашої династії. Якщо забезпечити суворий нагляд і не забувати про заохочення, ці сім'ї стануть чудовими союзниками нашої влади."
  smz_satsuma_shugo: "Сюго Сацуми"
  smz_satsuma_shugo_desc: "Ми були сюго провінції $satsuma_province$ з незапам'ятних часів, тож тепер її ім'я асоціюється виключно з нашим кланом. Наші воїни пишаються цим фактом і готові битися за нас."
  smz_tsurinobuse: "Цурінобусе"
  smz_tsurinobuse_desc: "Цурінобусе або «заманювання в засідку» — наша найефективніша тактика, яка дозволяє перемагати в нерівному бою. Нам варто зробити її основною та заскочувати зненацька недалекоглядних командирів з інших кланів."
  smz_shimazu_charge: "Натиск $SMZ$"
  smz_shimazu_charge_desc: "Навіть якщо противник, що перевершує нас за чисельністю, оточить наших солдатів, вони продовжать прориватися вперед, доки не доберуться до протилежного флангу. Про наші славні битви складатимуть легенди."
  smz_tanegashima: "Рушниця Танеґасіма"
  smz_tanegashima_desc: "Європейці, що вперше висадилися на острові Танеґасіма, привезли з собою аркебузи — нову цікаву зброю, яка починає швидко поширюватися по всій Японії. Проте тут вона з'явилася раніше за все."
  smz_early_westernization: "Початок вестернізації"
  smz_early_westernization_desc: "Завдяки постійним контактам із західними країнами ми багато дізналися про іноземні технології та ідеї. Спираючись на них, ми зможемо провести реформи в економіці, промисловості та освіті й отримати суттєву перевагу перед іншими японськими кланами."
  shn_vice_minister_of_dazaifu: "Керівник дадзайфу"
  shn_vice_minister_of_dazaifu_desc: "Як видно з імені нашого клану, ми походимо від голови дадзайфу провінції $chikuzen_province$. З давнини ця установа виконувала роль дипломатичного та військового центру всього регіону, а ми споконвіку правили Північним Кюсю як представники імператорів."
  shn_defender_against_mongols: "Захисники Японії"
  shn_defender_against_mongols_desc: "Будучи головною самурайською родиною на Північному Кюсю, ми хоробро билися під час двох навал монголів. Якщо буде потрібно, ми знову захистимо Кюсю та нашу країну від іноземних загарбників."
  shn_diplomacy_through_tsushima: "Цусіма та дипломатія"
  shn_diplomacy_through_tsushima_desc: "Завдяки присутності в провінції $tsushima_province$ ми накопичили багатий досвід ведення переговорів з Кореєю, що дозволяє нам підтримувати зв'язок із зовнішнім світом навіть у періоди заборони на офіційні дипломатичні зносини."
  soo_tradition_of_wakou: "Традиції вако"
  soo_tradition_of_wakou_desc: "Хоча ми воліємо вести торгівлю офіційно, іноді це неможливо через загострення військових конфліктів. На щастя, на нашому острові є пірати вако, які вміють діяти в обхід закону."
  soo_fight_for_tsushima: "Битва за Цусіму"
  soo_fight_for_tsushima_desc: "Розташована між Азією та Японськими островами, наша батьківщина $tsushima_province$ та її акваторія — це місце, де в найжорстокіших битвах сходяться різні країни. І лише наш потужний флот дозволить нам не тільки захистити свою країну, а й примножити її володіння!"
  soo_bahan_ship: "Баханський корабель"
  soo_bahan_ship_desc: "Від одного вигляду наших кораблів у моряків волосся стає дибки. Ніхто не посміє виступити проти флоту, чиї судна прикрашені прапорами із зображенням бога війни Хатімана!"
  tkd_kai_shugo: "Сюго $kai_province$"
  tkd_kai_shugo_desc: "Ми ведемо своє походження від Ґендзі $kai_province$, і за давнім звичаєм служимо як сюго цієї провінції. Ми нерозривно пов'язані з нею, і знамениті коні Каї вже стали синонімом нашої кавалерії."
  tkd_takeda_ryu: "Такеда-рю"
  tkd_takeda_ryu_desc: "Традиційні бойові техніки передаються в нашій родині з покоління в покоління. Мистецтво верхової їзди та стрільби з сідла займають серед них особливе місце, тож наші кінні загони славляться своєю майстерністю."
  tkd_tiger_of_kai: "Тигр із Каї"
  tkd_tiger_of_kai_desc: "Сильні лідери захистять наші території краще за будь-які фортеці. Наші генерали повинні серйозно підготуватися до майбутніх обов'язків і заслужити право називатися тиграми з Каї."
  tkd_fuurinkazan: "Фурінкадзан"
  tkd_fuurinkazan_desc: "«Швидше за вітер, тихіше за ліс, лютіше за вогонь, твердіше за скелю». Ці слова, що описують найвеличнішого воїна Сунь-цзи, повинні стати одночасно і девізом, і характеристикою нашої родини."
  tki_genji_in_mino: "Ґендзі $mino_province$"
  tki_genji_in_mino_desc: "На посаді голови Ґендзі та сюго провінції $mino_province$, ми протягом багатьох поколінь вели за собою місцевих самураїв. Наші володіння займають стратегічне положення, що дозволяє нам контролювати сусідні області."
  tki_banner_of_bellflower: "Прапор із дзвіночком"
  tki_banner_of_bellflower_desc: "Протягом багатьох поколінь ми були сюго $mino_province$, і тепер наш монсьо нерозривно пов'язаний з її землями. Усі чоловіки $mino_province$ будуть битися під нашим прапором."
  tki_flood_control_of_three_rivers: "Боротьба з повенями"
  tki_flood_control_of_three_rivers_desc: "Ібі, Кісо та Наґара — три великі річки нашої рідної провінції, — нерідко затоплюють рисові поля. Ми повинні навчитися запобігати таким лихам, а також підвищити родючість ґрунтів у всіх підконтрольних нам провінціях."
  ues_strong_dynastic_ties: "Міцні династичні зв'язки"
  ues_strong_dynastic_ties_desc: "Наш дім походить від прославленої гілки роду $fujiwara$. Крім того, ми тісно пов'язані з родом Асікаґа, оскільки мати Асікаґи Такаудзі належить до нашого клану. Ці династичні зв'язки відіграють найважливішу роль у процвітанні нашого клану."
  ues_double_shugo: "Сюго двох провінцій"
  ues_double_shugo_desc: "Нас призначили сюго провінцій $kouzuke_province$ та $tango_province$. Їхні багаті землі послужать нам у справі розширення нашого впливу."
  ues_eastern_power: "Сила Сходу"
  ues_eastern_power_desc: "Хоча ми отримали землі і на заході, і на сході Японії, саме наші багаті східні володіння принесуть нам процвітання. Там ми зберемо велике військо, яке буде битися за нас."
  ues_dragon_of_echigo: "Дракон з Етіґо"
  ues_dragon_of_echigo_desc: "Наш клан славиться мужністю та почуттям справедливості — якостями, незамінними на полі бою. Ми повинні показати світу, наскільки сильні лідери нашого клану. Усі тремтітимуть перед Драконом з Етіґо."
  utn_fujiwara_descendant: "Нащадки роду Фудзівара"
  utn_fujiwara_descendant_desc: "У родоводі йдеться, що предки нашого клану спочатку належали до роду $fujiwara$ з $kyoto$. Завдяки родинним зв'язкам з такою давньою та шанованою родиною ми можемо підтримувати дипломатичні зв'язки з імператорським двором та іншими кланами."
  utn_legacy_of_nasu_no_yoichi: "Спадщина Насу-но Йоїті"
  utn_legacy_of_nasu_no_yoichi_desc: "Провінція $shimotsuke_province$ колись була прихистком для Насу-но Йоїті, прославленого лучника часів війни Ґемпей. І донині воїни $shimotsuke_province$ шанують його, а нас називають «найкращими лучниками Канто»."
  utn_mediator_of_kanto: "Посередники з Канто"
  utn_mediator_of_kanto_desc: "Будучи членами найстарішого клану Канто, ми чудово розуміємося на політиці цього регіону і багато разів виступали посередниками між різними силами. Крім того, ми знаємо, як ефективно розширити свою територію, не налякавши інших і не наживши нових ворогів."
  ymn_descendant_of_nitta: "Нащадки клану Нітта"
  ymn_descendant_of_nitta_desc: "Ми нащадки клану Нітта — головного суперника стародавнього роду Асікаґа. Деякі вважають, що цей факт доводить нашу вірність, інші ж бачать у нас опозиційну силу. Походження дає нам безліч привілеїв, і ми повинні використовувати їх з розумом у прийдешніх політичних іграх."
  ymn_mediate_succession_disputes: "Посередники у питаннях спадщини"
  ymn_mediate_succession_disputes_desc: "Багато кланів, що керують провінціями, сваряться між собою, намагаючись з'ясувати, хто є законним спадкоємцем тих чи інших земель, і звертаються до нас за допомогою у вирішенні суперечок. Це дозволяє нам набути нових союзників, обзавестися корисними знайомствами та розхитати становище суперників."
  ymn_leader_of_western_army: "Західне військо"
  ymn_leader_of_western_army_desc: "Настав час створити потужне західне військо, яке об'єднає ворогуючі японські феоди. Наші хоробрі та досвідчені генерали, а також добре навчені воїни без зусиль поставлять жителів Сходу на коліна!"
  ymn_isolated_heartland: "Під захистом гір"
  ymn_isolated_heartland_desc: "Наші землі розташовані в гірській місцевості. Це означає, що їх не так просто завоювати. Нам слід вибудувати оборону, спираючись на природні особливості ландшафту. Тоді будь-хто, хто зверне свій жадібний погляд на наші володіння, пошкодує, що взагалі народився на світ."
  dahomey_amazons: "Дагомейські амазонки"
  dahomey_amazons_desc: "Це військове формування, цілком складене з дружин царя, настільки добре проявило себе в бою, що було названо на честь лютих амазонок зі давньогрецьких міфів. Ці войовниці впевнено захищають народ та інтереси Дагомеї, вселяючи в серця ворогів жах."
  dah_children_of_the_panther: "Діти пантери"
  dah_children_of_the_panther_desc: "Стародавня легенда свідчить, що наші королі ведуть свій рід від принцеси та пантери. Це переказ дозволить нам домогтися пошани та підвищить наш престиж серед сусідів."
  dah_slave_hunts: "Полювання за рабами"
  dah_slave_hunts_desc: "Нападаючи на сусідів, ми отримаємо рабів, яких зможемо використовувати в економічних цілях, обміняти і навіть змусити служити в нашому війську, що дозволить нам значно збільшити число рекрутів."
  dah_migan_mehu: "Міґан і Меху"
  dah_migan_mehu_desc: "Міґан і Меху — головні помічники наших королів. Один стежить за північчю, інший — за півднем; один відповідає за правосуддя, інший — за торгівлю. Разом вони несуть нашій країні мир і процвітання."
  dah_lagredis: "Лаґредіс"
  dah_lagredis_desc: "Якщо ми впровадимо в гарем кількох молодих жінкоподібних аристократів, представивши їх як королівських дружин, вони стануть для короля очима та вухами і повідомлятимуть йому про все, насамперед, про палацові інтриги."
  dah_yovogan: "Йовоґан"
  dah_yovogan_desc: "На наших берегах висаджується все більше й більше іноземців, тому не завадило б заснувати в нашому уряді нове відомство, яке вивчатиме звичаї чужинців, вивідуватиме їхні секрети та шукатиме способи отримати вигоду з цієї ситуації."
  dah_dahomey_palaces: "Абомейські палаци"
  dah_dahomey_palaces_desc: "Великий палацовий комплекс у столиці стане недвозначним символом нашої сили для всіх, хто забажає її оскаржити."
  kbo_ribat_fortifications: "Укріплені рибати"
  kbo_ribat_fortifications_desc: "Ці невеликі фортифікаційні споруди, поширені по всьому ісламському світу, забезпечують захист караванів, торгових вузлів та віддалених населених пунктів."
  people_of_allah: "Люди Аллаха"
  people_of_allah_desc: "Ми — послідовники Аллаха, єдиного істинного Бога, і слідуємо його Слову. Всі, хто вірить у нього — наші брати та сестри в його очах."
  holy_revelation: "Божественне одкровення"
  holy_revelation_desc: "Слово Аллаха було зіслане його Пророку Мухаммеду, хай благословить його Аллах і вітає, і записане у Священному Корані. Аяти, що містяться в ньому, доносять волю Аллаха до віруючих, і кожен правовірний мусульманин зобов'язаний знати писання напам'ять."
  islamic_calligraphy: "Ісламська каліграфія"
  islamic_calligraphy_desc: "$muslim$ — це релігія не тільки миру, а й мистецтва. Каліграфія аятів $common_string_quran$у та імен пророків часто є і священним писанням, і зразком найвищої майстерності."
  islamic_prayer: "Фард ас-салят"
  islamic_prayer_desc: "Ас-Салят — це один із п'яти стовпів ісламу, який є обов'язком правовірного мусульманина здійснювати щоденні молитви. Кількість молитов на день і рухи під час їх здійснення можуть відрізнятися залежно від мазхабу, проте обов'язковість щоденної молитви є незмінною для всіх мусульман."
  zakah: "Закят аль-ваджиб"
  zakah_desc: "Аль-Закят — це один із п'яти стовпів ісламу, що є формою милостині, яка вважається релігійним обов'язком будь-якого правовірного мусульманина. Той, хто в змозі жертвувати, зобов'язаний робити це на допомогу нужденним, а тому закят розглядається як свого роду податок."
  muslim_lineage: "$muslim_ADJ$е походження"
  muslim_lineage_desc: "З часів Мухаммеда, хай благословить його Аллах і вітає, іслам був нерозривно пов'язаний з органами управління. Отже, і наша влада затверджена самою вірою."
  muslim_caravans: "$muslim_ADJ$і каравани"
  muslim_caravans_desc: "Від Шовкового шляху з його численними маршрутами до соляних доріг через Сахару — наші люди здавна подорожували з торговими караванами у віддалені краї, доставляючи найрізноманітніші товари по всьому мусульманському світу."
  islamic_golden_age: "Золотий вік ісламу"
  islamic_golden_age_desc: "Дні культурного розквіту ісламу позаду, проте важко переоцінити той слід, який $islamic_golden_age$ залишив не тільки в мусульманських країнах, а й по всьому світу. Деякі невірні лише зараз починають осягати нашу велич в мистецтві та науках, тоді як самі довгі роки залишалися в темряві невігластва."
  ramadan: "Рамадан"
  ramadan_desc: "Присвячений першому одкровенню Пророку Мухаммеду, хай благословить його Аллах і вітає, $ramadan$ — найсвятіший місяць в ісламі. У цей період всі правовірні мусульмани зобов'язані дотримуватися Сауму — тримати піст і утримання в денний час, а також здійснювати молитви та присвячувати час духовним роздумам."
  sunnah: "Сунна"
  sunnah_desc: "$sunnah$, що є сукупністю традицій та звичаїв, приписуваних Пророку Мухаммеду, хай благословить його Аллах і вітає, визначає спосіб життя правовірного мусульманина. Саме від неї походить назва одного з основних напрямків ісламу — сунізму. Мазхаби можуть розходитися в окремих питаннях, але всі вони ґрунтуються на сунні."
  imamate: "Імамат"
  imamate_desc: "Суть шиїтського віровчення полягає в тому, що Пророк Мухаммед, хай благословить його Аллах і вітає, назвав Алі ібн Абу Таліба своїм наступником. І тому імам вважається духовним лідером з роду Пророка, хай благословить його Аллах і вітає, який покликаний вести за собою всіх правовірних мусульман."
  indian_sea_trade: "Торгівля в Індійському морі"
  indian_sea_trade_desc: "Протягом багатьох поколінь мусульманські купці борознили Індійський океан, вирушаючи все далі в пошуках товарів, що обіцяють пристойний прибуток. Їхні кораблі підкорили води від східних берегів Африки до Індії і навіть до індонезійських Островів прянощів."
  muslim_trade_communities: "$muslim_ADJ$і торгові спільноти"
  muslim_trade_communities_desc: "Контакти мусульманських торговців з різними народами та віруваннями в далеких краях призвели до створення торгових спільнот, а ті, своєю чергою, сприяють певному змішуванню та синкретизму їхніх релігійних поглядів з істинним Словом Аллаха."
  expansionist_faith: "Віра експансіоністів"
  expansionist_faith_desc: "У минулому іслам продемонстрував небачену швидкість поширення. Всього за кілька поколінь іслам вийшов за межі Аравії та впливав на життя людей від Іберійського півострова до Індії. За нашими володіннями лежать нові землі. Цілком можливо, настав час для другої хвилі ісламської експансії."
  blend_of_influences: "Багатосторонній вплив"
  blend_of_influences_desc: "З моменту свого зародження в Аравії іслам зумів утвердитися в безлічі земель. У ході своєї експансії мусульмани зустрічали на своєму шляху різні народи з іншим укладом життя. У ході цього поширення відбулася ціла низка культурних обмінів, внаслідок чого багато рис, спочатку не властивих ісламу, стали його невід'ємною частиною. Культури народів, що прийняли іслам, також зазнали змін під його впливом."
  islamic_schoolars: "Школи ісламу"
  islamic_schoolars_desc: "$muslim$ завжди заохочував роздуми та вивчення своїх писань аж до того, що виникли різні філософські школи, що займалися тлумаченням догматів віри. Не дивно, що наші муфасири, які присвятили життя тлумаченню $common_string_quran$а та інших священних текстів — дуже освічені люди, здатні вести дискусії вражаючої глибини."
  gunpowder_empires: "Порохові імперії"
  gunpowder_empires_desc: "Можливо, порох і був винайдений на Далекому Сході, але саме завдяки ісламу він поширився по всьому світу і отримав широке застосування. Протягом багатьох поколінь вогнепальна зброя стала невід'ємною частиною наших військ, а її виробництво та використання — однією з наших відмінних рис."
  established_holy_sites: "Визнані святині"
  established_holy_sites_desc: "Поки інші релігії допускають почасти вільне, а іноді й непослідовне поводження зі своїми святими місцями, іслам встановлює гранично чіткі правила щодо святинь. Тому коли прийде час, ми, поза всяким сумнівом, з належною старанністю здійснимо хадж."
  islamic_courts: "Ісламські суди"
  islamic_courts_desc: "Двори правителів мусульманських країн завжди викликали особливе захоплення: люди з різних країн славлять нашу витончену культуру та екзотичні товари, а розповіді про пишність наших дворів рознеслися по всьому світу. Наші піддані пишаються приналежністю до такого двору."
  schools_of_thought: "Школи думки"
  schools_of_thought_desc: "$muslim$ завжди був нерозривно пов'язаний зі знаннями та освітою. Різноманітні школи права та теології, а також навчальні заклади, створені за підтримки місцевих правителів, принесли мусульманським вченим славу не тільки в ісламському світі, а й у землях невірних."
  distant_trade_ventures: "Торгівля з далекими землями"
  distant_trade_ventures_desc: "Найцінніші товари надходять до нас з найвіддаленіших країв. Протягом століть мусульманські купці долали величезні відстані по суші та по морю в пошуках вигідних торгових можливостей."
  resilient_merchants: "Невтомні купці"
  resilient_merchants_desc: "$muslim_ADJ$им купцям доводилося зазнавати найсуворіших умов під час своїх подорожей. Від спекотних пустель Сахари та Гобі до бурхливих, що терзаються мусонами, вод Індійського океану, — вони раз за разом виявляли стійкість у подоланні труднощів заради вигідної угоди."
  jewels_of_the_desert: "Скарби пустелі"
  jewels_of_the_desert_desc: "$muslim$ і справді зародився в пісках Аравії та поширив свій вплив на інші безплідні землі. Однак деякі мусульманські міста зуміли процвітати навіть посеред пустель і стали відомі як центри багатого життя. За належних зусиль будь-яке поселення може стати настільки ж успішним."
  comprehensive_land_survey: "Ретельна перевірка земель"
  comprehensive_land_survey_desc: "Щоб дізнатися, хто має сплачувати податки, спершу треба з'ясувати, кому які землі належать. Для цього потрібно провести ретельну перевірку земель і потім стежити за актуальністю даних. Ми обов'язково заберемо те, що нам належить."
  counting_the_people: "Перепис населення"
  counting_the_people_desc: "Тепер, коли ми знаємо, кому належить та чи інша власність, настав час з'ясувати, хто де живе. Надалі це спростить пошук чоловіків для служби в нашому війську."
  cosmopolitan_court: "Багатонаціональний двір"
  cosmopolitan_court_desc: "Наш мусульманський двір незмінно приваблює людей з усього світу. Його неперехідна привабливість дозволяє збирати в наших залах безліч талановитих майстрів."
  caliphate: "Кілафа"
  caliphate_desc: "Кілафа, або халіфат, являє собою об'єднання всіх правовірних мусульман під владою єдиного правителя, якого іменують «халіф» і який вважається політичним і духовним наступником Пророка Мухаммеда, хай благословить його Аллах і вітає. Попри суперечки щодо того, хто може бути таким правителем, ідея об'єднати весь ісламський світ під єдиним прапором існує з моменту його виникнення."
  ibadi_imamate: "$ibadi_ADJ$ий імамат"
  ibadi_imamate_desc: "На відміну як від ідеї халіфату в сунізмі, так і імама, призначеного самим богом згідно з шиїтським вченням, ібадитський імам не зобов'язаний прагнути до об'єднання всього ісламського світу. Навпаки, кожна громада може самостійно обирати свого імама."
  contacts_network: "Мережа контактів"
  contacts_network_desc: "Завдяки широкому поширенню ісламу мусульманські країни змогли налагодити зв'язок з віддаленими землями. Безсумнівно, збереження та зміцнення такої великої мережі зв'язків корисне в дипломатичній сфері."
  infiltration_tactics: "Тактика впровадження"
  infiltration_tactics_desc: "Попри те, що стародавній шиїтський орден асасинів-нізаритів був значною мірою оточений міфами, не можна заперечувати, що їхні методи введення противника в оману заради вбивства виявилися досить ефективними. З подібною тактикою впровадження нас теж чекатиме успіх."
  unified_armies: "Єдині війська"
  unified_armies_desc: "З моменту свого виникнення в Аравії іслам поширився серед представників безлічі культур і народів. Будь-який мусульманин може битися в ім'я Аллаха, незалежно від свого походження."
  harsh_environments: "Суворі умови"
  harsh_environments_desc: "З моменту свого виникнення іслам поширювався навіть у найсуворіших регіонах світу. Невірним не уникнути труднощів, якщо вони вирішать битися на нашій землі або на наших умовах."
  four_noble_truths: "Чотири святі істини"
  four_noble_truths_desc: "В основі вчення Будди лежать чотири святі істини, що пояснюють природу буття. Ніщо в цьому світі не вічне, і прив'язаність до цього минущого існування приносить лише духовне страждання. Муки можна полегшити, звільнившись від прив'язаностей, що досягається через слідування восьмеричному шляху."
  noble_eightfold_path: "Восьмеричний шлях"
  noble_eightfold_path_desc: "$noble_eightfold_path$ — якщо коротко, то це шлях, що веде до нірвани та звільнення від сансари. Він являє собою суть буддійських практик. Визначаючи як розумовий стан, так і фізичні вчинки, він формує поведінку кожного послідовника буддизму."
  middle_way: "Серединний шлях"
  middle_way_desc: "Будда вчить нас уникати крайнощів, тому що ні потурання пристрастям, ні найсуворіша аскеза не приведуть до просвітлення."
  three_jewels: "Три коштовності"
  three_jewels_desc: "$three_jewels$, або Три притулки, — це три опори, на яких заснована віра послідовників буддизму: #italic Будда#!, просвітлена істота; #italic Дхарма#!, вчення Будди; і #italic Сангха#!, чернеча громада, яка зберігає Дхарму."
  buddhist_syncretism: "$buddhist_ADJ$ий синкретизм"
  buddhist_syncretism_desc: "Попри широке поширення буддизму світом, його витоки знаходяться в Індії. З моменту свого виникнення він стикався з багатьма різними віруваннями, завдяки чому увібрав у себе риси як індуїстських традицій, що передували йому, так і елементи поклоніння божествам, з якими стикалися його послідовники."
  sutra: "Сутра"
  sutra_desc: "Ці священні тексти, що зустрічаються як у дхармічних, так і в буддійських релігіях, відрізняються різноманітністю форми та змісту. Однак вони незмінно вважаються джерелом знань, а їхнє ретельне вивчення — необхідним для духовного вдосконалення."
  buddhist_councils: "$buddhist_ADJ$і ради"
  buddhist_councils_desc: "Після смерті Сіддхартхи Ґаутами чернечі громади проводили безліч зібрань, де обговорювалися тексти різних канонів. Хоча записи, що зафіксували хід таких зібрань, варіюються залежно від школи, об'єднувальна роль цих дискусій незаперечна."
  buddhist_canon: "Буддійський канон"
  buddhist_canon_desc: "$buddhist_canon$ — це зібрання священних текстів буддизму, назви та зміст яких варіюються в різних відгалуженнях. Будь-хто, хто присвятив себе цій релігії, повинен знати ці тексти — чи то правила чернечого життя, чи то вчення Будди, інакше іменовані #italic сутрами#!."
  pali_canon: "Палійський канон"
  pali_canon_desc: "Попри різноманітність канонів у буддизмі, що відображає особливості окремих шкіл, $pali_canon$ Тхеравади залишається найдавнішим та найавторитетнішим. На відміну від канонів інших шкіл, які є сумішшю текстів з різних джерел, $pali_canon$ зберігся в незмінному вигляді з часів царя Ашоки Великого та включає слова самого Будди. Крім того, він став основою або прикладом для багатьох інших буддійських шкіл."
  buddhist_universities: "$buddhist_ADJ$і університети"
  buddhist_universities_desc: "З незапам'ятних часів буддійські центри були оплотами вченості та знань, куди прямували люди з усього світу в пошуках освіти. У давнину найбільшим з таких центрів був комплекс Наланда, однак пізніше з'явилися й інші."
  xuanzang_travels: "Мандри Сюаньцзана"
  xuanzang_travels_desc: "Сюаньцзан — китайський буддійський монах, що жив у VII столітті за часів династії Тан. Він здійснив сімнадцятирічну сухопутну подорож до Індії заради нових знань та збору величезної колекції буддійських текстів. Він побував, серед інших місць, у Наланді та навчався там у найвидатніших наставників, а повернувшись до $china$, привіз із собою понад тисячу манускриптів, які зробили істотний внесок у розвиток Махаяни. Його мандри та записи стали основою для роману #italic «Подорож на Захід»#!, в якому монах вирушає до Індії на пошуки священних текстів за дорученням Будди в компанії, серед інших, царя мавп Сунь Укуна."
  silk_road_transmission: "Поширення Шовковим шляхом"
  silk_road_transmission_desc: "Неможливо заперечувати, що Шовковий шлях суттєво вплинув на поширення буддизму. Торгівля сухопутними маршрутами та Морським шовковим шляхом дозволила буддизму вийти далеко за межі Індії, де він виник спочатку."
  bodhisattva: "Бодгісаттва"
  bodhisattva_desc: "$bodhisattva$ — фігура, важлива для всіх шкіл буддизму, попри їхні відмінності в характеристиках та ролях цієї фігури. Однак за будь-якого тлумачення бодгісаттви гідні шанування та поклоніння."
  avalokitesvara: "Авалокітешвара"
  avalokitesvara_desc: "$avalokitesvara$, якого також знають під іменами Ґуаньїнь у Китаї або Каннон у Японії, є одним із найшанованіших бодгісаттв. $avalokitesvara$ — бодгісаттва співчуття і може зображуватися в чоловічому або жіночому образі, залежно від школи, а в деяких випадках шанується як прабатько всіх індуїстських божеств. $avalokitesvara$ асоціюється з мантрою #italic «Ом мані падме хум»#!."
  maitreya: "Майтрея"
  maitreya_desc: "Зараз $maitreya$ вважається майбутнім і останнім бодгісаттвою та буддою наприкінці цієї кальпи. Йому призначено відродити забуте людьми вчення Дгарми у світі та стати наступником Сіддхартхи Ґаутами."
  mount_meru: "Гора Меру"
  mount_meru_desc: "$mount_meru$ — це священна для індуїстів, буддистів та джайністів гора, що знаходиться в центрі всесвіту як у фізичному, так і в духовному сенсі. Подібно до того, як вона є центром, навколо якого обертається все інше, так і наша країна обертається навколо нашого правителя."
  naraka: "Нарака"
  naraka_desc: "$naraka$, або Нірая — це пекельні світи, сповнені мук і страждань, призначені для очищення поганої карми перед подальшою реінкарнацією. Існує безліч пекельних світів, і час, який душа повинна провести в них, а також страждання, які вона зобов'язана перенести, залежать від кількості накопиченої карми, необхідної для переродження в одному з вищих світів."
  four_heavenly_kings: "Чотири Небесні Царі"
  four_heavenly_kings_desc: "Кожен із цих хранителів оберігає одну зі сторін світу. Крім того, вони захищають світ девів від асурів і стежать за тим, щоб смертні чинили по совісті."
  vegetarianism: "Вегетаріанство"
  vegetarianism_desc: "Концепція Дхарми передбачає відмову від м'яса, але в кожній школі є свої правила, що регулюють її суворість. Крім того, в одних школах заборона на поїдання м'яса поширюється тільки на чернечу громаду, а в інших — на все населення."
  edicts_of_ashoka: "Написи Ашоки"
  edicts_of_ashoka_desc: "Звід законів царя Ашоки Великого, складений у III столітті до нашої ери, був покликаний сприяти поширенню буддизму. Навіть через багато століть він викликає величезну повагу та шану серед вірян."
  five_precepts: "П'ять обітниць"
  five_precepts_desc: "$five_precepts$ — це базовий кодекс буддійської етики та моралі, що являє собою основні правила, яких повинен дотримуватися будь-який буддист, незалежно від того, чи є він членом чернечої громади. У них наказується утримуватися від убивства, крадіжки, сексуальних проступків, брехні та вживання речовин, що затуманюють свідомість."
  monastic_communities: "Чернечі громади"
  monastic_communities_desc: "$buddhist_ADJ$е життя зосереджене навколо громад ченців і черниць, іменованих #italic Сангха#!. Вони керуються положеннями #italic Вінаї#!, тобто зведенням чернечих правил і приписів, обов'язкових для всіх буддійських монастирів."
  prestigious_schools: "Престижні школи"
  prestigious_schools_desc: "$buddhist$ розділився на безліч шкіл, кожна з яких зосереджена навколо одного типу чернечої громади та віддає перевагу певним текстам. Однак деякі з цих шкіл здобули більше визнання, а інші канули в лету. Таким чином, приєднавшись до найпрестижніших шкіл, люди можуть претендувати на частину такого визнання."
  offerings: "Подношення"
  offerings_desc: "Згідно з буддійським вченням, підношення дарів Трьом коштовностям необхідне для накопичення чеснот. Ці підношення можуть бути як матеріальними, так і нематеріальними. Так, деякі чернечі громади виживають виключно за рахунок їжі, яку як підношення залишають їхні послідовники."
  incense_burning: "Воскуріння пахощів"
  incense_burning_desc: "Воскуріння пахощів — основа будь-якого буддійського обряду або підношення. Традиційно миряни та ченці запалюють пахощі різних видів і форм перед проведенням обрядів або медитацій. Тому аромат пахощів постійно наповнює будь-який буддійський храм."
  ascetic_practices: "Аскетичні практики"
  ascetic_practices_desc: "Будда застерігав про небезпеки суворої аскези, проте деякі представники чернецтва все ж іноді звертаються до неї. Обмеження у виборі одягу, їжі та ліжка — ось лише частина практик, які, хоч і не є обов'язковими для розвитку чесноти, дають практикуючим певні переваги."
  mindfulness: "Усвідомленість"
  mindfulness_desc: "Однією з найважливіших частин буддійської практики є усвідомленість, яка полягає в усвідомленні явищ тіла та розуму й дотриманні вчень Будди. Вона допомагає запобігти появі небажаних станів і зосередитися на розвитку бажаних."
  dana: "Дана"
  dana_desc: "$dana$ означає щедрість або дарування, що не вимагає нічого взамін, і є найважливішою чеснотою всіх релігій, заснованих на принципі Дхарми. Безкорислива допомога іншим людям або навіть цілим громадам — один з основних способів накопичення карми."
  ahimsa: "Ахімса"
  ahimsa_desc: "$ahimsa$, або ненасильство, вважається однією з найважливіших чеснот усіх релігій, заснованих на принципі Дхарми. Будь-який конфлікт слід прагнути вирішити мирним шляхом через діалог, не вдаючись до сили. На жаль, це не завжди можливо, проте насильство завжди повинно бути крайнім засобом, а його застосування — виправданим."
  resistance_to_persecution: "Опір переслідуванню"
  resistance_to_persecution_desc: "Попри широке поширення, буддійське вчення неодноразово у своїй історії зазнавало переслідувань. Храми та зображення знищували, послідовників вбивали або змушували переховуватися, проте віра переживала всі труднощі й лише міцніла."
  buddhist_meditation: "$buddhist_ADJ$і медитації"
  buddhist_meditation_desc: "Медитація — це загальна практика для всіх буддистів, незалежно від їхньої школи. Її мета полягає в тренуванні розуму та духу для розвитку усвідомленості, умиротворення та прозріння, що допомагає досягти просвітлення."
  sruti: "Шруті"
  sruti_desc: "$sruti$, що дослівно перекладається як «почуте», — це найдавніші та найсвященніші тексти індуїзму. Вони вважаються божественним одкровенням, тому не мають автора. І нехай дехто ставить під сумнів їхнє божественне походження, навіть вони визнають їхню значущість."
  vedah: "Веди"
  vedah_desc: "Основними текстами в каноні $sruti$ є $vedah$, найдавніші твори на санскриті, авторство яких у Махабхараті приписується Брахмі. До них належать «Рігведа», або «Веда гімнів», «Яджурведа», або «Веда жертовних формул», «Самаведа», або «Веда піснеспівів», та «Атхарваведа», або «Веда заклинань»."
  smrti: "Смріті"
  smrti_desc: "$smrti$, що дослівно перекладається як «запам'ятоване», являють собою тексти, засновані на Ведах або створені під їхнім впливом. Ці тексти вважаються менш авторитетними, ніж $sruti$, оскільки є їхніми похідними. Однак, на відміну від $sruti$, тексти $smrti$ приписуються певним авторам і зберігаються у формі манускриптів."
  mahabarata: "Махабхарата"
  mahabarata_desc: "Одним із двох найважливіших текстів $smrti$ поряд із «Рамаяною» є давньоіндійський епос «$mahabarata$». Це найдовша епічна поема в історії, приблизно вдесятеро більша за обсягом за грецькі #italic «Іліаду»#! та #italic «Одіссею»#! разом узяті. У ній оповідається про боротьбу за трон стародавнього індійського царства Куру, кульмінацією якої стала Війна $mahabarata$, або Битва на Курукшетрі. Історія завершується смертю Крішни та падінням його династії."
  ramayana: "Рамаяна"
  ramayana_desc: "Одним із двох найважливіших текстів $smrti$ поряд із «Махабхаратою» є давньоіндійський епос «Рамаяна». У ній оповідається про життя Рами, аватара бога $vishnu_god$ та сина царя країни Кошали. У цьому тексті підкреслюється важливість чесноти в усіх сферах життя людини."
  purana: "Пурани"
  purana_desc: "$purana$, що вважаються частиною $smrti$, являють собою найрізноманітніші тексти. Серед них є майже все, що тільки можна собі уявити — від космології, астрономії та граматики до генеалогії богів та історії кохання. Таким чином, навіть попри те, що $purana$ не входять до складу $sruti$, вони мали величезний вплив на індуїзм та індійське суспільство, оскільки об'єднують безліч місцевих вірувань і традицій із загальним тлумаченням Вед."
  atman: "Атман"
  atman_desc: "$atman$ — істинне, вічне та незмінне «Я», тобто сутність, яка усвідомлює своє існування. Згідно з вченням шкіл астіки, $atman$ відокремлений від розуму та тіла, а також відрізняється від Дживатмана, який існує протягом кількох втілень. Школи настіки, навпаки, трактують цю концепцію дещо інакше або зовсім її заперечують."
  nastika_schools: "Школи настіки"
  nastika_schools_desc: "Деякі індуїстські філософські школи віддалилися від основних течій, відкидаючи авторитет Вед та існування Атмана. Наприклад, джайнізм та буддизм вважаються неортодоксальними, хоча все ж включають багато спільних фундаментальних ідей індуїзму."
  astika_schools: "Школи астіки"
  astika_schools_desc: "Ці ортодоксальні індуїстські школи визнають авторитет Вед та існування Атмана. Попри те, що серед шкіл астіки можна виділити цілу низку різних течій, усі вони сходяться у визнанні Вед та Атмана."
  diversity_of_beliefs: "Різноманіття вірувань"
  diversity_of_beliefs_desc: "В основі вірувань народів, що населяють Індію, лежить принцип Дхарми та текст Вед, проте ця основа втілюється у величезній безлічі різних форм і практик. І нехай навіть пантеон визнаних і шанованих богів може відрізнятися, проте всі ці віровчення мають єдиний концептуальний стрижень."
  ishvara: "Ішвара"
  ishvara_desc: "$ishvara$ позначає Верховну Істоту або Бога. У різних індуїстських школах та відгалуженнях ця концепція трактується по-своєму. Таким чином, $ishvara$ у шиваїзмі — $shiva_god$, у вішнуїзмі — $vishnu_god$, або ж будь-який особистий Бог кожної окремо взятої людини."
  sanskritization: "Санскритизація"
  sanskritization_desc: "$hindu$ поширився далеко за межі самої Індії, в якій виник. Тому багато культур і країн перейняли санскритські концепції та назви для позначення власної ідентичності. Таким чином, концепції індуїзму з легкістю проникають у чужоземні вірування та зливаються з ними."
  bhakti_movement: "Рух Бгакті"
  bhakti_movement_desc: "Цей рух, що зародився в VI столітті, оспівує любов до просвітленої людини або до божества всередині себе. Проповідники Бгакті звертаються до звичайних людей і говорять зрозумілою їм мовою, справляючи величезний вплив на те, як віра та релігія сприймаються в народі."
  yoga: "Йога"
  yoga_desc: "$yoga$ — одна з індуїстських шкіл і філософських течій. Вона являє собою сукупність практик, як фізичних, так і духовних, які спрямовані на набуття контролю над розумом і тілом. $yoga$ з її тисячолітньою історією практично стала синонімом шляху просвітленої душі."
  diwali: "Дівалі"
  diwali_desc: "Під час фестивалю вогнів $diwali$ ми святкуємо перемогу Дгарми, торжество добра над злом і світла над темрявою. На знак цієї перемоги ми запалимо свічки та ліхтарі й віддамо шану нашим предкам."
  holi: "Голі"
  holi_desc: "$holi$ — це свято фарб і любові, що проводиться на ознаменування приходу весни. Ми вшановуємо землеробство та багатий урожай, і водночас насолоджуємося яскравими барвами весни. Це час радості та примирення, очищення від емоційної скверни."
  holy_rivers: "Священні річки"
  holy_rivers_desc: "Річки та їхнє шанування завжди були важливою частиною індуїзму. Крім Інду та Гангу є безліч річок, які віряни вважають священними й на їхніх берегах здійснюють різноманітні ритуали. Води цих річок вважаються освяченими, а омовіння в них — невіддільна частина релігійних обрядів."
  advaita_vedanta: "Адвайта-веданта"
  advaita_vedanta_desc: "Відкидаючи дуалізм свідомості та матерії, $advaita_vedanta$ стверджує, що $atman$, найпотаємніше «Я» або свідомість, становить одне ціле з вищою реальністю або свідомістю всесвіту — Брахманом. Таким чином, фізичний матеріальний світ — лише ілюзія, за якою приховується вища реальність Брахмана."
  hindu_muslim_relations: "$hindu_ADJ$о-мусульманські відносини"
  hindu_muslim_relations_desc: "$hindu$ та іслам досить тісно взаємодіяли в минулому, і ця традиція, безсумнівно, матиме продовження. Наші народи навчилися мирно співіснувати, і між обома релігіями виник певний синкретизм."
  hindu_unification: "$hindu_ADJ$е об'єднання"
  hindu_unification_desc: "Попри відмінності у віруваннях і практиках, в індуїзмі все-таки є більше того, що об'єднує нас. Поява спільного бачення індуїзму допомагає нашому народу набути справжнього почуття єдності."
  hindu_architecture: "$hindu_ADJ$а архітектура"
  hindu_architecture_desc: "Незалежно від архітектурного стилю, чи то шікхара, вімана або пранг, індуїстські храми скрізь відрізняються своїми високими прикрашеними вежами. Бувши втіленням гори Меру з тією чи іншою мірою вираженості залежно від регіону, вони слугують символом і демонстрацією сили та влади."
  varna_system: "Система варн"
  varna_system_desc: "Поняття Дгарми особистості існує ще з часів Вед. Вона передбачає, що людина має бути віднесена до однієї з чотирьох можливих категорій: #italic брагмани#!, куди входять вчені або жерці; #italic кшатрійї#!, куди входять правителі або воїни; #italic вайш'ї#!, куди входять землероби або купці; або #italic шудри#!, куди входять ремісники або слуги. Ці стани не мають суворих рамок, а радше відображають ідеал покликання людини, проте вони значно вплинули на індуїстське суспільство."
  extreme_pacifism: "Радикальний пацифізм"
  extreme_pacifism_desc: "$ahimsa$ є основою пацифізму та ненасилля, які проповідує індуїзм. Проте, наші вороги повинні пам'ятати, що, якщо вони нас спровокують, ми можемо відмовитися від своїх принципів і вступити у війну."
  hindu_empires: "$hindu_ADJ$і імперії"
  hindu_empires_desc: "У минулому було чимало імперій, які сповідували індуїзм. Усі великі правителі — від Маур'їв та Гуптів в Індії до імператорів Шривіджаї в Індонезії та Чола в тамільських землях — спиралися у своєму правлінні на індуїстське вчення."
  sacred_cattle: "Священна корова"
  sacred_cattle_desc: "$ahimsa$ забороняє вбивати велику рогату худобу, тому віряни шанують корів як материнську фігуру, символ безкорисливої турботи та жертовності. Корови шанувалися з часів появи Вед і заслуговують належної поваги та уваги."
  riches_of_asia: "Багатства Азії"
  riches_of_asia_desc: "$asia$ славиться на весь світ своїм багатством. Азійські скарби з процвітаючих міст Персії та Індії, предмети розкоші з Китаю та товари з Островів прянощів в Індонезії, що стали майже легендарними, користуються величезним попитом у всьому світі."
  silk_road: "Великий шовковий шлях"
  silk_road_desc: "Ні безкраї піски пустелі Гобі та перських земель, ні небезпеки, що чатують на мандрівників під час переходів через $indian_ocean_region$ та індонезійські води — ніщо не могло зупинити купців, які століттями перетинали Азію легендарним Шовковим шляхом у пошуках незліченних багатств."
  exchange_of_ideas: "Обмін ідеями"
  exchange_of_ideas_desc: "Шовковим шляхом разом із купцями переміщалися не лише золото та товари, а також ідеї та знання."
  legacy_of_great_empires: "Спадщина великих держав"
  legacy_of_great_empires_desc: "Історія Азії рясніє прикладами великих імперій, що утверджували своє панування в цих землях: чи то Трон Дракона в Китаї, різні царства Персії, могутні індуїстські та буддійські династії Індії та Південно-Східної Азії."
  arduous_terrain: "Важкопрохідний ландшафт"
  arduous_terrain_desc: "$asia$ відома вкрай негостинними землями — високими піками Гімалаїв, безплідними просторами пустелі Гобі, непрохідними джунглями Індії та Південно-Східної Азії. І це не кажучи вже про сезони мусонів і тайфунів, а також практично безперервну низку землетрусів. Азійські народи навчилися жити в таких суворих умовах, а ось загарбникам тут доведеться несолодко."
  fertile_lands: "Родючі землі"
  fertile_lands_desc: "Загалом, $asia$ славиться великою кількістю дощів, і навіть там, де опадів менше, через її землі течуть повноводні річки. Лише в найпосушливіших частинах пустелі земля не може дати людям достатньо їжі, проте навіть у цих землях люди вміють обходитися тим, що в них є."
  crossroads_of_religions: "На перехресті релігій"
  crossroads_of_religions_desc: "$hindu$, буддизм, іслам і навіть тенгріанство поширилися далеко за межі земель, у яких зародилися. $asia$ стала місцем обміну віруваннями, а також часто їхнього змішання та синкретизму."
  religious_syncretism: "Релігійний синкретизм"
  religious_syncretism_desc: "Часом багатоконфесійність призводить не до конфліктів, а до взаємопроникнення різних практик та їхньої інтеграції в релігійне життя. Таким чином, чужа філософія та вірування можуть сприйматися не як небезпечне інакомислення, а як джерело знань."
  source_of_knowledge: "Джерело знань"
  source_of_knowledge_desc: "Поки одні країни пишаються своїми досягненнями в науці та техніці, деякі з їхніх «винаходів» століттями були відомі в Азії. Тут є все, від видатних технологій Китаю до багатої літературної спадщини Індії — у Сходу немає причин заздрити Заходу."
  structured_society: "Організоване суспільство"
  structured_society_desc: "В азійських суспільствах зазвичай панує суворий порядок, а кожна людина розуміє свою роль. Філософські ідеї індуїзму та конфуціанства суттєво вплинули на азійський суспільний устрій та забезпечили його стійкість."
  incense_preeminence: "Панування пахощів"
  incense_preeminence_desc: "Століттями пахощі були невід'ємною частиною життя в Азії, а можливо, навіть більш значущою, ніж у будь-якій іншій частині світу. Попри те, що пахощі використовуються в ритуалах та інших релігій, майже повсюдне застосування в індуїстських і буддійських церемоніях, а також у повсякденному житті мусульман перетворює їх на незмінний атрибут азійського життя."
  incense_trade_route: "Перевезення пахощів"
  incense_trade_route_desc: "Високий попит на пахощі в Азії та за її межами призвів до створення безлічі торгових маршрутів, призначених виключно для перевезення цього дорогоцінного товару. Подібно до більш прославленого Шовкового шляху, торгівля пахощами слугує мостом між Сходом і Заходом."
  wake_of_the_mongol_horde: "Відлуння монгольської навали"
  wake_of_the_mongol_horde_desc: "Мабуть, в Азії не залишилося жодного куточка, по якому не пройшлася б хода монгольських завойовників. Ці землі досі заліковують рани після спустошливих набігів військ $genghis_khan_name_no_tooltip$а, що викував свою велику імперію в численних походах і битвах."
  cultural_melting_pot: "Плавильний котел культур"
  cultural_melting_pot_desc: "$asia$ — це насамперед край, де панує багате культурне розмаїття. Саме воно, а також безперервний обмін ідеями та традиціями забезпечили процвітання азійських країн протягом багатьох століть."
  rise_of_great_individuals: "Звершення великих людей"
  rise_of_great_individuals_desc: "Великі люди можуть значно вплинути на хід історії. Час від часу до влади приходять правителі, які створюють нові імперії або руйнують старі. Такі досягнення заслуговують на захоплення та повагу."
  the_pentarchy: "Пентархія"
  the_pentarchy_desc: "Стародавня структура церкви, встановлена ще за часів царювання імператора Юстиніана I, використовується в православ'ї й донині. Попри те, що папа римський вважає себе вищим за всіх у католицькій вірі, для справжньої Церкви єпархії Константинополя, Александрії, Антіохії та Єрусалима, як і раніше, зберігають своє значення."
  imperial_creed: "Імперський символ віри"
  imperial_creed_desc: "Православ'я було споконвічною вірою Римської імперії з моменту прийняття християнства. Єресі Заходу та їхні самопроголошені «імператори» не сміють оскаржувати легітимність нашої династії."
  filioque_issue: "Проблема Філіокве"
  filioque_issue_desc: "Західні єретики таємно вписали в латинський переклад Символу віри доповнення #italic Філіокве#!. Будь-які правки, які не схвалив собор, вважаються незаконними. Ми продовжимо молитися єдино правильним способом, а цих боговідступників чекають пекельні муки."
  septuagint: "Септуагінта"
  septuagint_desc: "$septuagint$ — це переклад нашого Старого Завіту з івриту на грецьку мову, виконаний сімдесятьма двома перекладачами ще в III столітті до нашої ери. Причому всі вони незалежно один від одного змогли скласти абсолютно однаковий переклад тексту. Отже, немає сумнівів у тому, що він дарований згори та є словом Божим."
  anagignoskomena: "Апокрифи"
  anagignoskomena_desc: "У нашій Біблії містяться всі книги, що заслуговують на шанування та вивчення, хоча деякі з них можуть бути менш значущими, ніж інші. $anagignoskomena$ не включені до єврейської Біблії, а тому вважаються менш важливими, ніж інші тексти, проте теж заслуговують на увагу."
  church_guidance: "Приписи церкви"
  church_guidance_desc: "У Священному Писанні укладена божественна мудрість, проте вірно витлумачити сенс цих текстів і донести його до пастви може лише церква. Будь-яка спроба незалежного прочитання, яка не спирається на погляди церкви, — прямий шлях до оман і єресі."
  unchanging_tradition: "Незмінна традиція"
  unchanging_tradition_desc: "Вчення, яке Ісус Христос передав своїм апостолам, має зберігатися в первозданному вигляді — без виправлень, доповнень і скорочень, — бо сама віра незмінна й сповідується людьми по всій землі."
  church_councils: "Церковні собори"
  church_councils_desc: "Церква повинна діяти як єдине ціле, тому будь-які питання поза компетенцією окремих єпископів повинні розглядатися на соборах, де висловлюється колективна думка церковної влади. Рішення, що виносяться на таких зборах, мають статус офіційних."
  greek_rite: "Візантійський обряд"
  greek_rite_desc: "Протягом століть наші ритуали та канонічні служіння слідували візантійському обряду, встановленому в Константинополі. Попри невеликі розбіжності, православні обряди загалом відрізняються одноманітністю."
  physical_body_of_christ: "Тіло Христове"
  physical_body_of_christ_desc: "Церква — це земне відображення Христа, яке нічим не відрізняється від небесного; фізичне втілення Спасителя, посланого на допомогу людству."
  sight_veneration: "Зоровий вплив"
  sight_veneration_desc: "Вплив на органи чуття вірян — найважливіший аспект релігії. Недарма наші церкви виглядають дуже ошатно, а їхні стіни прикрашені яскравими зображеннями: серед такої пишноти присутність Христа на землі здатен відчути кожен."
  theotokos: "Богоматеринство"
  theotokos_desc: "Пресвята Богородиця — ключова фігура в православ'ї, оскільки вона виконала Старий Завіт, принісши світові у своєму лоні Новий Завіт в образі Христа. Таким чином, якщо Христос вважається втіленням Бога, то вона — Матір Божа, а тому заслуговує на особливе місце в християнському вченні та шанується більше, ніж інші святі."
  heavenly_architecture: "Божественна архітектура"
  heavenly_architecture_desc: "Православні храми завжди споруджуються з метою відтворити образ раю. Православні церкви, що зводяться в більш централізованому стилі порівняно із західними, заснованими на базиліці, мають центральний купол, який символізує небеса. Ці храми прикрашаються розписами та іконами, являючи собою грандіозне видовище."
  iconostasis: "Іконостас"
  iconostasis_desc: "Однією з найважливіших особливостей будь-якого православного храму є іконостас — це стіна, вкрита іконами, яка відокремлює основну частину храму від вівтаря. Ікони, розміщені там, є втіленням зв'язку між вірянами та святая святих, а отже, між Небесами та людьми, вказуючи їм шлях до Небес."
  julian_calendar: "Юліанський календар"
  julian_calendar_desc: "Протягом століть час у нашій країні та нашій церкві відраховувався за юліанським календарем, встановленим Юлієм Цезарем у 46 році до нашої ери. Цей календар не тільки об'єднує всі східнохристиянські народи, але також визначає дати найважливіших свят і урочистостей."
  paschal_cycle: "Пасхальний цикл"
  paschal_cycle_desc: "У православній традиції є низка свят пасхального циклу з перехідними датами, наприклад, сама #italic Пасха#!. Так, період часу перед Великоднем тривалістю десять тижнів називається Тріодь, а період часу після Великодня тривалістю п'ятдесят днів — П'ятидесятниця. Цей цикл включає найважливіші свята літургійного року."
  oktoechos: "Осмогласіє"
  oktoechos_desc: "$oktoechos$, або восьмигласна система запису музики, використовувалася для запису церковних піснеспівів і музики протягом багатьох століть. Це основа православного піснеспіву, хоча в різних культур можуть зустрічатися свої особливості."
  prestigious_monasticism: "Престиж чернецтва"
  prestigious_monasticism_desc: "У православ'ї чернецтво та аскетизм мають велике значення і практично є обов'язковими. Кожен священник повинен спочатку стати ченцем, а якщо він не був пострижений у ченці, то повинен пройти цей шлях до свого рукоположення. Тому монастирі та чернечі обителі значно впливають на наше церковне життя."
  national_rites: "Національні звичаї"
  national_rites_desc: "Наявність різних автокефальних патріархатів у нашій церкві призводить до певних відмінностей у національних обрядах різних країн. При цьому єдність вчення та Церкви зберігається."
  heirs_of_rome: "Спадкоємці Риму"
  heirs_of_rome_desc: "Багато хто називав себе спадкоємцями Риму та Римської імперії, не маючи на те жодних підстав. Тільки ми, ревнителі істинної віри стародавньої імперії, можемо з повним правом вважатися її нащадками."
  legacy_of_saint_andrew: "Спадщина святого Андрія"
  legacy_of_saint_andrew_desc: "Згідно з переказами, святий Андрій відвідав Скіфію та північне Причорномор'я, а під час своєї зупинки на місці, де згодом було збудовано $kyiv$, провістив велику благодать, яка осяє ці землі з прийняттям християнства."
  christianization_of_the_slavs: "Християнізація слов'ян"
  christianization_of_the_slavs_desc: "Жителі Київської Русі стали одними з перших східнослов'янських народів, що прийняли світ Христа та перейшли у православ'я. Звідси віра поширилася й серед інших народів сходу."
  cyril_and_methodius: "Кирило і Мефодій"
  cyril_and_methodius_desc: "$BYZ_ADJ$і теологи Кирило і Мефодій відіграли важливу роль у поширенні християнства серед слов'ян у IX столітті нашої ери. Вони вважаються творцями першої абетки, яка використовувалася для запису церковнослов'янської мови та була названа ними глаголицею. Пізніше їхні учні розробили кирилицю, назвавши її на честь Кирила."
  interaction_between_church_and_state: "Взаємозв'язок церкви та країни"
  interaction_between_church_and_state_desc: "У підпорядкуванні патріарха перебувають його патріархат та всі віряни. Тандем патріарха та правителя дозволить нам задіяти ресурси церкви для зміцнення авторитету країни."
  outwards_expansion: "Зовнішня експансія"
  outwards_expansion_desc: "Священний обов'язок церкви — нести світло Христа язичникам та невіруючим. Заради спасіння їхніх душ ми повинні вирушати в нові землі."
  justified_holy_wars: "Виправдані священні війни"
  justified_holy_wars_desc: "Ми не можемо дозволити язичникам та єретикам диктувати нам свої умови. Наш священний обов'язок — очистити світ від скверни, щоб на землі запанувало Царство Боже."
  resistance_to_the_infidels: "Боротьба з невіруючими"
  resistance_to_the_infidels_desc: "Наші православні брати не раз опинялися під гнітом іновірців. Однак ми навчилися стійко переносити такі утиски та навіть співіснувати з цими безбожниками."
  eastern_ecumenism: "Східний екуменізм"
  eastern_ecumenism_desc: "Необізнані часто плутають наше східне православ'я з іншими давньосхідними православними церквами. Але попри відмінності з багатьох ключових питань, вони залишаються християнами, і завдяки цим спільним поглядам можна повернути їх до істинної віри."
  structured_patriarchates: "Структура патріархатів"
  structured_patriarchates_desc: "Наші патріархати завжди відрізнялися гарною організацією та структурою. У кожного з них були свої повноваження та певні межі. Такий підхід забезпечує ефективніше функціонування церкви та всієї країни."
  second_council_of_ephesus: "Другий Ефеський собор"
  second_council_of_ephesus_desc: "На Другому Ефеському соборі, скликаному в 449 році за наполяганням патріарха Діоскора Олександрійського, було прийнято формулу Кирила Олександрійського, згідно з якою Христос має єдину, а не подвійну природу. Попри те, що формально собор був легітимним, католицька та православна церкви його категорично відкидають."
  rejection_of_chalcedon: "Невизнання Халкідонського собору"
  rejection_of_chalcedon_desc: "Папа римський Лев I не погодився з результатами Другого Ефеського собору та вирішив скликати новий собор у Халкідоні. Однак ми не станемо визнавати його підсумки, оскільки нас цілком влаштовують рішення попереднього собору."
  monophysite_vs_miaphysite: "Монофізитство та міафізитство"
  monophysite_vs_miaphysite_desc: "І міафізити, і монофізити вірять в єдину природу Христа, проте їхні доктрини суттєво різняться. Перші вважають, що Христос поєднує в собі людське та божественне, тоді як останні стверджують, що людська природа Христа була поглинена його божественністю. Дехто помилково зараховує нас до монофізитів, але насправді ми зовсім не поділяємо їхніх поглядів."
  original_christianity: "Нікейське християнство"
  original_christianity_desc: "Християнська церква зазнала безлічі розколів, але наша віра сягає корінням раннього християнського вчення, сформульованого ще за часів Першого Нікейського собору. Усіх, хто з тих чи інших причин оскаржує його рішення, безумовно можна вважати єретиками."
  beyond_the_borders: "Вихід за межі"
  beyond_the_borders_desc: "З моменту зародження християнства багато його послідовників так чи інакше осіли в межах Римської імперії. Міафізитство ж споконвічно розвивалося на її околицях, і після розділення з халкидонськими церквами ми наважилися вийти за межі імперії, щоб нести світло Боже в найдальші куточки світу."
  isolated_reaches: "Відчужені землі"
  isolated_reaches_desc: "З кожним роком прихильників міафізитства у світі стає все більше. Навіть будучи оточеними ворогами та невірними, ми не відступаємо від своєї віри."
  independent_leaders: "Незалежні лідери"
  independent_leaders_desc: "Через ізоляцію міафізитства нам важко підтримувати спілкування з іншими патріархатами. Але навіть у таких умовах наші лідери навчилися діяти незалежно і вигадали свої способи залишатися на зв'язку з іншими християнськими громадами."
  jerusalem_focus: "Звернення до Єрусалиму"
  jerusalem_focus_desc: "Ми завжди зберігаємо в серцях пам'ять про святе місто Єрусалим. Там Христос виконав свою місію і прийняв смерть на хресті, і туди ж він повернеться у своє Друге пришестя. На знак пошани до цього міста ми завжди молимося, звертаючись обличчям до Єрусалиму."
  acceptance_of_old_testament: "Визнання Старого Завіту"
  acceptance_of_old_testament_desc: "Деякі християнські церкви почали применшувати важливість Старого Завіту, стверджуючи, що з приходом Христа викладене в ньому вчення втратило актуальність. Однак ми переконані, що і сьогодні ці тексти мають анітрохи не меншу значущість, ніж за часів їх написання."
  primacy_of_alexandria: "Верховенство Александрії"
  primacy_of_alexandria_desc: "Міафізити діляться на безліч громад, але всі ми так чи інакше визнаємо Александрію духовним центром нашої віри. Втім, це скоріше спосіб вшанувати апостольське наступництво місцевого патріархату, ніж прагнення наділити його особливою владою."
  school_of_alexandria: "Александрійська богословська школа"
  school_of_alexandria_desc: "За переказами, Александрійська катехізична школа була заснована самим апостолом Марком. Протягом багатьох років вона була найстарішим у світі богословським навчальним закладом, де біблійні тексти почали вивчати ще на зорі становлення християнства. Незабаром після визнання верховенства єпископа Риму над патріархом Александрійським школа була знищена, однак її традиції збереглися донині."
  preserving_of_local_languages: "Збереження місцевих мов"
  preserving_of_local_languages_desc: "Грецька мова та латина відіграли важливу роль у розвитку раннього християнства, але в міафізитських церквах літургія зазвичай проводиться мовами місцевого населення — коптською, арамейською, вірменською та іншими. Так кожна громада міафізитів зберігає свою мову та традиції."
  double_patriarchate: "Подвійний патріархат"
  double_patriarchate_desc: "Александрійська та Антіохійська церкви вважають одна одну окремими патріархатами, один з яких дотримується міафізитства, а інший — православ'я. Можна довго сперечатися про те, хто з них має апостольське наступництво, але насправді лише міафізитський патріархат зберігає істинне вчення."
  eastern_christianity: "Східне християнство"
  eastern_christianity_desc: "Ми є частиною так званого Східного християнства, що об'єднує безліч різних напрямків. Вони відрізняються своїми богословськими та літургійними традиціями, але мають схожі культурні особливості."
  life_among_infidels: "Життя серед невірних"
  life_among_infidels_desc: "Невірні часто оскверняють своєю присутністю землі нашої віри. Втім, часом наші проповідники теж вирушають у чужі краї, щоб осяяти Божим світлом заблудлі душі. Нехай нам і не завжди вдається переконати цих язичників у хибності їхніх переконань, ми впливаємо на них набагато більше, ніж може здатися на перший погляд."
  gradual_departure: "Поступове розділення"
  gradual_departure_desc: "Багато християнських церков відреклися від міафізитів, але ми не стали одразу розривати зв'язки з цими людьми. Ми продовжували брати участь у соборах і підтримувати спілкування з іншими патріархатами, однак з часом стало зрозуміло, що міафізитам просто нічого обговорювати з цими єретиками."
  thrive_under_persecution: "Процвітання всупереч переслідуванням"
  thrive_under_persecution_desc: "Хоча ми протягом сотень літ зазнавали переслідувань з боку невірних та єретиків, наша віра й досі міцна. Хоч би як сильно нас гнобили, ми зуміємо вистояти."
  preserver_of_national_identity: "Збереження національної ідентичності"
  preserver_of_national_identity_desc: "Навіть попри утиски та переслідування, ми змогли зберегти свою ідентичність, і в цьому велика заслуга нашої церкви. Саме в ній збереглися наші мови та традиції, і лише завдяки їй наша віра не похитнулася."
  defense_against_heretics: "Захист від єретиків"
  defense_against_heretics_desc: "З моменту нашого розділення з іншими християнськими церквами їхні представники засуджують нас з будь-якого приводу. Вони називають себе християнами, але їхні погляди наскрізь просякнуті єрессю, тоді як ми вірно слідуємо слову Божому."
  remote_patriarchates: "Віддалені патріархати"
  remote_patriarchates_desc: "Через те, що наш народ зазнавав завоювань та гонінь, невірні багато разів знищували наші церкви або брали їх під свій контроль. У зв'язку з цим ми були змушені перенести наш патріархат, хоча ми, як і раніше, шануємо його початкове місце, хоч би як далеко від нього ми не знаходилися."
  further_reaches: "Далекі краї"
  further_reaches_desc: "Попри те, що ми часто змушені жити в оточенні невірних, наше віровчення все ж поширилося серед представників різних народів та культур, що проживають у віддалених землях."
  internal_communion: "Тісне спілкування"
  internal_communion_desc: "Попри незалежність міафізитських патріархів, усі наші громади підтримують одна з одною міцний зв'язок. Це не тільки дозволяє нам зберігати близькі стосунки, а й забезпечує єдність церкви."
  cradle_of_monasticism: "Батьківщина чернецтва"
  cradle_of_monasticism_desc: "Християнське чернецтво зародилося в Єгипті, де через гоніння християнам нерідко доводилося ховатися в пустелі та вести відлюдницький спосіб життя. Бувши хранителями олександрійської традиції, міафізити мають право вважати себе засновниками чернечого руху."
  unique_architecture: "Унікальна архітектура"
  unique_architecture_desc: "Наше вчення розвивалося у відносній ізоляції, що призвело до появи в наших громадах унікального архітектурного стилю. Можливо, інші напрямки християнства можуть похвалитися грандіознішими спорудами, проте наші храми та святилища надихають вірян анітрохи не менше за інші."
  medicinal_infusions: "Лікувальні настої"
  medicinal_infusions_desc: "Протягом століть людство справлялося з різними недугами за допомогою рослин, що мають цілющі властивості. Кажуть, настої з якихось особливих листків здатні продовжувати людям життя."
  canoe_travels: "Каное"
  canoe_travels_desc: "Завдяки легким каное ми зможемо ефективніше освоювати водні шляхи та мілини Північної Америки, що значно розширить наші можливості в управлінні торгівлею та міграцією."
  seasonal_economy: "Сезонна економіка"
  seasonal_economy_desc: "У важкі часи треба вміти виживати, а природа — це і є життя. Наші звички повинні змінюватися разом із сезонами, а тіла та розуми — бути такими ж гнучкими, як погода."
  fishing_habits: "Навички рибальства"
  fishing_habits_desc: "Дивлячись на деяких наших людей, важко повірити, що вони народилися на суші, а не у воді: вони плавають так швидко та вправно, що їх майже неможливо відрізнити від річкової течії."
  whale_hunters: "Китобої"
  whale_hunters_desc: "Кити, білухи, моржі, тюлені… Те, що дає нам море, важливіше за наші голоси, нашу безрозсудну гординю. Ми полюємо на будь-які морські дари."
  moundbuilding_advance: "Будівничі курганів"
  moundbuilding_advance_desc: "Північноамериканські кургани — це великі символи досягнень нашого народу, і нам варто враховувати їхнє розташування при плануванні нашої інфраструктури."
  bison_hunters: "Мисливці на бізонів"
  bison_hunters_desc: "Бізон — символ і запорука виживання нашого народу. На знак пошани до цієї священної тварини ми використовуємо кожну її частину: м'ясо йде в їжу, кістки — на інструменти, шерсть — на захист від зимових холодів, шкура — на одяг і покриття наших тіпі, а душа стає об'єктом поклоніння. Бізони займають центральне місце в нашій культурі. Без них ми не мислимо себе."
  federal_constitution: "Засновники федерації"
  federal_constitution_desc: "Ми повинні об'єднатися з однодумцями та заснувати федерацію, де взаємна довіра та спільний розвиток стануть найвищими цінностями."
  shared_knowledge: "Обмін знаннями"
  shared_knowledge_desc: "Щоб витримати конкуренцію з іншими племенами, ми повинні вивчити всі нововведення, які допоможуть нам утриматися на плаву і навіть перевершити суперників."
  slash_and_burn: "Підсічно-вогневе землеробство"
  slash_and_burn_desc: "Ми дізналися про систему землеробства, засновану на випалюванні рослинності. Шар золи, що залишився після пожежі, служить добрим добривом. Кажуть, цей метод підвищує врожайність не гірше, ніж обробка ґрунту."
  council_of_elders: "Рада старійшин"
  council_of_elders_desc: "Кожен член ради бере участь у прийнятті рішень нарівні з іншими. Щоб ефективніше розпоряджатися землями племені, ми повинні об'єднати зусилля."
  experienced_fur_hunters: "Торгівля хутром"
  experienced_fur_hunters_desc: "Торгівля хутром з іншими племенами та чужинцями — важлива частина нашої економіки. Наші люди славляться своїми мисливськими навичками, а наші хутра — своєю якістю."
  pyramid_architecture: "Зведення пірамід"
  pyramid_architecture_desc: "Наші прекрасні міста, такі як Теотіуакан, Тікаль, Копан і Паленке, славляться своїми кам'яними пірамідами. Ми не забули мистецтво зведення таких споруд і можемо продовжити цю традицію."
  ball_game: "Тлачтлі"
  ball_game_desc: "Гра тлачтлі широко поширена в нашій країні. Її мета — утримати м'яч у грі, вдаряючи по ньому стегнами. Тлачтлі — це одночасно і ритуальна альтернатива війні, і важлива складова релігійного життя."
  war_bonfires: "Сигнальні багаття"
  war_bonfires_desc: "Розташувавши великі багаття в прикордонних поселеннях, ми зможемо швидко попереджати людей про насування небезпеки."
  merchant_officials: "Купці-чиновники"
  merchant_officials_desc: "Торгівля — важливе джерело доходу для країни. Купці не тільки передають багатства правителю, а й повідомляють, як йдуть справи у сусідніх країн."
  copperworking: "Вироби з міді"
  copperworking_desc: "Майстри освоюють кування інструментів з металу, знайденого в наших землях. Якщо вони досягнуть успіху в цій справі, ми отримаємо величезну перевагу перед сусідами."
  system_of_tributaries: "Система данників"
  system_of_tributaries_desc: "Пряме управління територією вимагає великих витрат на втихомирення місцевого населення та утримання чиновників у підкорених землях. Призначивши лояльного правителя та встановивши щорічну данину, ми усунемо загрозу з боку недругів з Альтепетля і без особливих труднощів наповнимо свою скарбницю."
  refined_obsidian_weaponry: "Зброя з обсидіану"
  refined_obsidian_weaponry_desc: "Чорне обсидіанове скло чудово підходить для виготовлення будь-яких інструментів. Це важкий і крихкий матеріал, тож з нього легко виточувати смертоносну колючу та ріжучу зброю: клинки, наконечники списів та стріл."
  precious_stones_art: "Вироби з дорогоцінного каміння"
  precious_stones_art_desc: "Наші землі багаті на дорогоцінне каміння, яке послужить чудовим матеріалом для статуй, ваз та дзеркал. Наші майстри створять найвеличніші пам'ятки культури та навіки впишуть свої імена в історію."
  cultivate_the_land: "Обробка землі"
  cultivate_the_land_desc: "Джунглі — суворе місце, особливо якщо вашим людям набридло збиральництво, і вони вирішили самостійно вирощувати їжу. У такій ситуації розчищення джунглів стає запорукою виживання та процвітання суспільства. Потрібно, щоб у запасі завжди було достатньо міцних чоловіків, придатних для важкої роботи."
  feathered_serpent: "Оперений змій"
  feathered_serpent_desc: "У широко поширеній у нас легенді йдеться про Пернатого змія. Кетцалькоатль в ацтеків, Кукулькан у мая або Кукумац у кіче — ці імена уособлюють одну й ту саму фігуру, що стала джерелом єдності на всій нашій землі."
  ritual_bloodletting: "Ритуальне кровопускання"
  ritual_bloodletting_desc: "У багатьох культурах нашої країни правителі здійснюють жертвоприношення та кровопускання, щоб віддати шану богам. Ми підтримаємо цю традицію і тим самим підтвердимо наше право на владу."
  valley_irrigation: "Загальна система зрошення долин"
  valley_irrigation_desc: "Створивши мережу каналів, що пов'язують воєдино джерела води на полях, ми зробимо стрибок у розвитку технології зрошення та значно підвищимо родючість ґрунту."
  artisan_migration: "Переселення ремісників"
  artisan_migration_desc: "Неправильно, коли найкращі майстри та мислителі імперії мешкають не в столиці, а в завойованих землях. Ми повинні перевезти цих людей до столиці, щоб вони служили особисто нам."
  terrace_farming: "Терасове землеробство"
  terrace_farming_desc: "Щоб максимально задіяти гірський ландшафт, ми винайшли терасове землеробство та вдосконалили методи зрошення."
  mountain_cities: "Фортеці на вершинах гір"
  mountain_cities_desc: "Наші міста та фортеці стоять на гірських вершинах, що височіють над хмарами. Кожного, хто вирішить напасти на наші землі, спіткає невдача."
  river_trade: "Річкова торгівля"
  river_trade_desc: "Великі річки та моря завжди були джерелом їжі для нашого народу. Потрібно підтримати річкову торгівлю та захистити численних купців, що пливуть уздовж берега до гирла річки. Так ми ніколи не відчуватимемо нестачі в їхніх чудових товарах."
  rainforests_and_mountaintops: "Тропічні ліси та гірські вершини"
  rainforests_and_mountaintops_desc: "Наші тропічні ліси та гори населені найрізноманітнішими істотами. Лісові духи, ягуари, анаконди, тарантули та безліч інших створінь не становлять великої небезпеки для тих, хто знайомий з їхніми звичками. Однак для ворога наші землі подібні до фортеці, яку охороняють дикі звірі."
  knot_system: "Вузликове письмо"
  knot_system_desc: "Використання вузлів та ниток для запису інформації допоможе нам ефективніше керувати територіями та зберігати важливі дані."
  llama_farming: "Розведення лам"
  llama_farming_desc: "Ми розводимо величезні поголів'я лам. Лами воістину безцінні: вони для нас не тільки в'ючні тварини, але також джерело м'яса та вовни."
  mountain_roads: "Мережа гірських доріг"
  mountain_roads_desc: "Щоб підвищити доступність товарів, потрібно побудувати мережу гірських доріг, які зв'яжуть між собою віддалені долини та дозволять долати глибокі ущелини."
  tears_of_the_sun: "Сльози сонця"
  tears_of_the_sun_desc: "Авантюристи з далеких земель мріють відшукати поклади золота на гірських стежках високо в Андах. Для нас же цей жовтий метал має радше не економічну, а художню та сакральну цінність."
  hidden_cities: "Приховані міста"
  hidden_cities_desc: "Непрохідні тропічні ліси та неприступні гори надійно захищають наші міста від сторонніх і приховуватимуть їх від світу ще довгі століття."
  potato_production: "Вирощування картоплі"
  potato_production_desc: "На плоскогір'ях, де погано приживається кукурудза, ми навчилися вирощувати місцеву рослину з надзвичайно поживними округлими коренями. Підвищивши врожайність цієї культури, ми отримаємо великий запас невибагливої у зберіганні їжі та зможемо прогодувати народ і воїнів."
  head_hunters: "Мисливці за головами"
  head_hunters_desc: "Споконвіку ми виживаємо, захоплюючи землі у народів, які виявилися слабшими за нас. У таких умовах у нас сформувався незвичайний військовий кодекс, згідно з яким найвищим проявом доблесті та героїзму є не вбивство, а полонення ворога, тому наші люди славляться вмінням брати супротивників живими."
  border_raiders: "Вправні нальотчики"
  border_raiders_desc: "Наші нальотчики славляться швидкістю, здатністю блискавично нападати на нічого не підозрюючих супротивників і легко ухилятися від ударів у відповідь. Вони послужать нам відмінну службу, увійшовши до складу регулярних військ."
  lva_baltic_forestry: "Балтійські ліси"
  lva_baltic_forestry_desc: "Наші ліси — найцінніший ресурс, вони забезпечують нас будівельними матеріалами та паливом для вогнищ. Щоб зберегти це багатство для нащадків, ми повинні розпоряджатися ним з розумом."
  lva_baltic_forts: "Балтійські фортеці"
  lva_baltic_forts_desc: "Наші землі вкриває мережа фортець і замків, яка є першою лінією оборони проти іноземних загарбників, а також дозволяє нам контролювати ключові морські шляхи через Балтику."
  irish_travelling_bards_advance: "Мандрівні барди"
  irish_travelling_bards_advance_desc: "Талановиті поети, навчені придворному етикету, подорожують нашими землями в пошуках пана, який міг би їх найняти."
  irish_booleying_advance: "Відгінне тваринництво"
  irish_booleying_advance_desc: "Для багатьох ірландців розведення корів — це спосіб життя. Бики в Ірландії не тільки джерело їжі, а й символ багатства. Переганяючи наші стада з одного далекого пасовища на інше, ми можемо примножити це багатство."
  irish_monastacism_advance: "Острівне чернецтво"
  irish_monastacism_advance_desc: "Хоча нині ми дотримуємося римо-католицької практики, релігійне життя на цих островах, як і раніше, багато в чому тримається на добровільному духовенстві."
  guards_of_the_shannon_advance: "Вартові річки Шаннон"
  guards_of_the_shannon_advance_desc: "Фортеця Атлон розташована на могутній річці Шаннон у самому серці Ірландії. Члени родини О’Келлі з Уї Майне, які вже давно правлять цими землями, люто захищали цю фортецю, відбиваючи напади норманів."
  hiberno_norman_keeps_advance: "Гіберно-нормандські вежі"
  hiberno_norman_keeps_advance_desc: "Наші нормандські предки збудували чудові вежі, щоб тримати під контролем ворожі території Ірландії."
  irish_frontier_settlement_advance: "Ірландські прикордонні поселення"
  irish_frontier_settlement_advance_desc: "Територія, яку ми відібрали в ірландців, чудово підходить для освоєння. Багато гідних людей вже приїжджають з далеких країв, щоб оселитися на цих родючих землях."
  celtic_raiders_advance: "Кельтська лють"
  celtic_raiders_advance_desc: "Протягом тисячоліть нам вдається проганяти загарбників зі своїх земель за допомогою засідок та диверсій. Ніхто не може встояти перед виснажливою низкою раптових руйнівних атак."
  ple_pale_defenseworks_advance: "Укріплення Пейла"
  ple_pale_defenseworks_advance_desc: "Уздовж наших кордонів стоять дамби та частоколи, які слугують легкими оборонними спорудами та допомагають протистояти постійним набігам наших непокірних сусідів."
  ple_irish_viking_towns_advance: "Старі містечка вікінгів"
  ple_irish_viking_towns_advance_desc: "Стародавні порти, засновані скандинавами, як і раніше, залишаються важливими торговими центрами, де підприємливі люди легко можуть розбагатіти."
  cel_defensive: "Кельтська тактика"
  cel_defensive_desc: "За сотні років опору загарбникам ми навчилися стійкості та терпіння. Замість того, щоб стрімголов кидатися в бій, ми ретельно готуємося і вичікуємо потрібний момент, щоб завдати ворогу нищівного удару."
  cel_western_shore: "Західне узбережжя"
  cel_western_shore_desc: "Наші моряки століттями рибалили, торгували та билися вздовж узбережжя Атлантики. Підкоряючи ці суворі води, вони досконало освоїли мистецтво мореплавства, і нині мало хто може зрівнятися з ними в цій справі."
  cel_the_wests_awake: "Пробудження Заходу"
  cel_the_wests_awake_desc: "Через століття затишшя непокірний дух кельтських народів розгорівся з новою силою, і тепер ми готові зайняти своє законне місце серед великих цивілізацій цього світу."
  cel_celtic_nations: "Кельтські народи"
  cel_celtic_nations_desc: "В основі нашого союзу лежить ідея об'єднання кельтських народів під одним прапором. Діючи спільно, ми зможемо зберегти спільну спадщину та цінності, а також забезпечити процвітання наших народів попри будь-які труднощі та зовнішні загрози."
  cel_celtic_diaspora: "Кельтська діаспора"
  cel_celtic_diaspora_desc: "Багато наших родичів під гнітом труднощів покинули рідні краї та вирушили до далеких берегів у пошуках кращого життя. Втім, вони не відмовилися від своїх традицій та звичаїв, тому неодмінно привозять із собою свою кельтську спадщину, куди б не прибули."
  cel_pan_celtic_nationalism: "Панкельтизм"
  cel_pan_celtic_nationalism_desc: "Говорячи про об'єднання кельтських народів, ми зовсім не маримо, а закликаємо своїх побратимів згуртуватися навколо нашої спільної спадщини. Жодні кордони не можуть розірвати наші братерські узи, а тому наша національна ідентичність настільки ж непорушна, наскільки й наші рідні пагорби та моря."
  ire_grand_jury_system: "Велике журі"
  ire_grand_jury_system_desc: "Присяжні засідателі великого журі стягують податки на утримання доріг, мостів та будівель судів. З появою роз'їзних колегій нагляд за округами посилюється."
  ire_irish_establishment: "Ірландське військо"
  ire_irish_establishment_desc: "Постійне військо, кероване з Ірландії, забезпечує бойову готовність гарнізонів і дозволяє знизити військові витрати. Тепер професійні солдати отримуватимуть регулярну платню, а постачальники зможуть заощадити на поставках завдяки зростанню кількості казарм."
  ire_irish_volunteers: "Ірландські добровольці"
  ire_irish_volunteers_desc: "Цивільні формують загони для захисту місцевого населення та спостереження за береговою лінією. Вони проводять навчання за свій рахунок, позитивно впливають на суспільні настрої та підвищують нашу обороноздатність."
  legacy_of_the_normans: "Спадщина Нормандії"
  legacy_of_the_normans_desc: "Загартована в незліченних боях сицилійсько-нормандське військо поєднує в собі нестримну міць нормандської кінноти, а також стратегічний геній візантійських, арабських та ломбардських полководців. Завдяки цьому смертоносному поєднанню норманам вдалося завоювати значні території та заснувати королівство на стику кількох цивілізацій."
  sic_constitions_of_melfi: "Мельфійські конституції"
  sic_constitions_of_melfi_desc: "У XIII столітті імператор Фрідріх II Гогенштауфен видав «Мельфійські конституції» — звід законів Сицилійського королівства, який використовується й донині. Цей документ слугує основою нашої країни та затверджує норми суспільної, приватної, феодальної, судової та кримінальної галузей права."
  sic_studium_generale: "Studium Generale"
  sic_studium_generale_desc: "Катанійський університет, заснований у 1434 році Альфонсо V Арагонським, є найстарішим вищим навчальним закладом Сицилії та одним з небагатьох південноєвропейських закладів, що мають статус studium generale. Завдяки обширним освітнім програмам, що включають філософію, право та точні науки, університет готує першокласних правознавців, вчених та богословів, які потім вірно служать церкві та країні."
  sic_naval_vigilance: "Морська варта"
  sic_naval_vigilance_desc: "Постійні нальоти османів та берберських піратів змусили владу Сицилії зміцнити оборону своїх прибережних земель. Відтоді розташовані тут фортеці та галери надійно захищають Південну Європу від нападів з моря."
  sic_sicilian_silk: "Сицилійський шовк"
  sic_sicilian_silk_desc: "За часів правління Фрідріха II шовк був одним з основних експортних товарів Сицилії. З роками північні регіони Італії обігнали нас у виробництві шовку та витіснили нас з ринку, проте ми не маємо наміру так легко їм поступатися. Якщо ми вкладемо достатні кошти в нашу шовкову промисловість, то напевно зможемо повернути собі втрачені позиції."
  sic_sicilian_enlightenment: "Сицилійське просвітництво"
  sic_sicilian_enlightenment_desc: "Хоча Сицилія й не славилася світськими салонами, як Відень та Париж, ідеї Просвітництва все ж не оминули її стороною. Місцеві інтелектуали жваво цікавилися наукою, критикували феодальний лад та виступали за проведення обширних правових реформ, часто аргументуючи свою позицію з точки зору релігійного гуманізму. Висловлюючи подібні погляди, вони фактично кидали виклик монархії й тим самим готували ґрунт для переходу в нову епоху."
  sic_sicilian_reforms: "Сицилійські реформи"
  sic_sicilian_reforms_desc: "В останні роки багато наших державних інститутів або втратили колишню ефективність, або безнадійно застаріли. Щоб наша країна могла й надалі розвиватися, нам необхідно провести низку докорінних перетворень. У зв'язку з цим нашим найкращим мислителям доручено підготувати проєкти реформ, які дозволять оптимізувати роботу державних механізмів."
  nomadic_tendencies: "Схильність до кочівництва"
  nomadic_tendencies_desc: "Ми довго кочували, тому багато хто з нас звик до такого способу життя. Зараз усе змінилося, і ми взялися за будівництво міста, хоча дехто з нас воліє мандрувати, як у давні часи."
  skilled_cavalry_raids: "Нальоти вершників"
  skilled_cavalry_raids_desc: "Наші предки були вправними кіннотниками і здобули безліч перемог на луках Сахелю. Наші вороги холоділи від страху, зачувши тупіт копит війська, що наближається."
  land_of_the_ancestors: "Земля наших предків"
  land_of_the_ancestors_desc: "Земля — це не просто клаптик суходолу чи пил під ногами. Тут жили й помирали великі герої минулого. Наші предки спостерігають за нами з кращого світу, і ми повинні зберегти цей зв'язок за будь-яку ціну."
  wandering_scholars: "Мандрівні мудреці"
  wandering_scholars_desc: "На наших землях мешкають цілі громади мудреців, які сповідують різні релігії. Вони проповідують своє вчення всім, хто готовий їх слухати, навертаючи наших людей у свою істинну віру."
  community_of_the_faithful: "Багатомовна країна"
  community_of_the_faithful_desc: "Народ нашої імперії складається із сотень національностей. Люди стікаються до нас з усього світу, і кожен славить нашого правителя своєю мовою. Це нас і об'єднує."
  bound_by_service: "Спільний обов'язок"
  bound_by_service_desc: "Ми — єдиний народ, і військо наше теж єдине. Призиваючи на службу людей з усіх завойованих земель, ми створюємо умови для їхньої повноцінної інтеграції в суспільство та підвищуємо їхню довіру до країни."
  regnal_chronicles: "Хроніки правління"
  regnal_chronicles_desc: "Треба вести записи про наших королів та їхні великі діяння, щоб наша історія передавалася з покоління в покоління на пам'ять нащадкам."
  expanded_slave_trade: "Посилення контролю над работоргівлею"
  expanded_slave_trade_desc: "Попит на рабів з боку іноземців зростає з кожним днем. Наше становище в африканському світі робить нас ідеальними торговими посередниками. Слід заохочувати работоргівлю та залучати купців на наші невільницькі ринки."
  gifts_and_hostages: "Підкуп та заручники"
  gifts_and_hostages_desc: "Хоча наш народ зараз єдиний, люди неохоче схиляють коліна перед спільним сюзереном. Щоб підвищити їхню лояльність, можна закликати до столиці всіх правителів підкорених земель і зробити їх престижними королівськими посланцями. Хтось, напевно, назвав би нашу політику заручницькою, але ми не згодні з таким визначенням."
  people_of_ornaments: "Знавці візерунків"
  people_of_ornaments_desc: "Кажуть, наші прославлені майстри просто не можуть залишити виріб без орнаменту. Продаючи їхні творіння всюди, ми отримаємо чималу вигоду."
  courtly_competition: "Суперництво при дворі"
  courtly_competition_desc: "Займеш аристократів — уникнеш проблем. У нашій країні неймовірна кількість титулів. Подейкують, ніби кожен другий чоловік у нас носить якесь звання. Нехай наші придворні краще витрачають сили на боротьбу за славу та пошану, а не на інтриги проти влади."
  overnight_army: "Завжди напоготові"
  overnight_army_desc: "Наша столиця та інші міста побудовані за зразком військових таборів: тут є свої фланги, авангарди та фронти. Зберігаючи таке мислення в мирному житті, ми не втратимо боєготовності."
  mining_tradition: "Традиції гірничої справи"
  mining_tradition_desc: "Наші землі багаті на рідкісні матеріали, які можна видобувати та продавати іноземним купцям за хороші гроші. Було б нерозумно не скористатися цим."
  intercontinental_trade: "Торгівля з далекими землями"
  intercontinental_trade_desc: "Наші купці нерідко привозять диковинки з далеких країн. Можливо, ми зуміємо налагодити торгівлю і з більш віддаленими територіями."
  expanded_grazing_grounds: "Нові пасовища"
  expanded_grazing_grounds_desc: "У нас багато земель, придатних для випасу тварин, тож збільшити поголів'я худоби нам буде нескладно."
  african_sturdy_grains_advance: "Вирощування невибагливих злаків"
  african_sturdy_grains_advance_desc: "Приділяючи більше уваги сільському господарству, ми забезпечимо своєму народу процвітання. На щастя, у нас є достатньо земель для вирощування найрізноманітніших культур."
  legacy_of_ivan_asen_ii: "Спадщина Івана Асеня II"
  legacy_of_ivan_asen_ii_desc: "За часів правління Івана Асеня II Болгарія досягла піку своєї військової, політичної та економічної могутності. Багато в чому саме його спадщина слугує основою нашої сильної централізованої країни."
  bulgarian_orthodox_patriarchate: "Болгарський православний патріархат"
  bulgarian_orthodox_patriarchate_desc: "Піднесення болгарської церкви до рангу патріархату сприяло зміцненню нашої національної єдності, а також утвердило роль Тирново як духовного конкурента Константинополя."
  expansionist_ambitions: "Прагнення до експансії"
  expansionist_ambitions_desc: "Користуючись ослабленим становищем Візантійської імперії, амбітні правителі сусідніх країн заповзялися об'єднати роздроблені балканські землі — кожен під своєю одноосібною владою."
  fortress_of_the_balkans: "Балканська фортеця"
  fortress_of_the_balkans_desc: "Сподіваючись усунути загрозу, що походила від хрестоносців, візантійців та монголів, Болгарія створила значну мережу укріплених міст і гірських фортець для захисту своїх володінь."
  revival_of_the_literary_schools: "Відродження книжкових шкіл"
  revival_of_the_literary_schools_desc: "За царя Івана Олександра Болгарія переживала значний культурний підйом. У цей час у країні з'явилося безліч скрипторіїв та літературних шкіл, які протягом багатьох років залишалися одними з головних носіїв слов'янської православної культури."
  reformation_of_the_bulgarian_patriarchate: "Відновлення Болгарського патріархату"
  reformation_of_the_bulgarian_patriarchate_desc: "Повернення незалежності Болгарського патріархату не лише зміцнило авторитет державної влади, а й посилило релігійний вплив нашої країни у православному світі."
  promote_estates_general: "Впровадження станових зібрань"
  promote_estates_general_desc: "Бургундія являє собою неоднорідне об'єднання земель, які в силу складних феодальних відносин мають різні норми, закони та привілеї. Щоб спростити управління цими територіями, ми можемо впровадити систему станових зібрань, у рамках яких місцеві жителі зможуть обговорювати нагальні проблеми та узгоджувати їх вирішення з центральною владою. Це не лише згладить юридичні відмінності, а й зміцнить нашу легітимність в очах бургундців."
  reform_the_feudal_army: "Реформа феодального війська"
  reform_the_feudal_army_desc: "В епоху професійних військ стало очевидно, що феодальне ополчення неповоротке та ненадійне. Ми візьмемо за основу французький приклад: замість полків, що збираються за васальним зобов'язанням, нам служитиме добре навчене та злагоджене військо, яка отримує постійну платню та очолюється досвідченими офіцерами, — сучасне військо, що вміє пристосовуватися до будь-яких умов."
  influence_of_the_burgundian_towns: "Вплив бургундських міст"
  influence_of_the_burgundian_towns_desc: "Зазвичай прихильністю Генеральних штатів користуються хіба що священники та аристократи, проте більше не можна заплющувати очі на зростаючий добробут міст; а чим багатшими стають міста, тим більша їхня політична вага. Сам устрій Генеральних штатів потребує перегляду. Якщо вони почнуть відображати й наростаючий вплив містян, ми досягнемо більш урівноваженого підходу до управління, зберігши при цьому привілеї інших станів. Крім того, зростуть і наші адміністративні можливості, а також прискориться урбанізація."
  compagnie_d_ordonnance: "Ордонансові роти"
  compagnie_d_ordonnance_desc: "Сучасна війна довела неспроможність феодального ополчення. Замість нього короні служитимуть вірні, надійні та відмінно підготовлені кавалерійські частини, що отримують постійну платню, — ордонансові роти."
  create_the_regimental_system: "Створення полкової системи"
  create_the_regimental_system_desc: "Щоб забезпечити військам постійний приплив новобранців та припасів, нам доведеться створити полкову систему. Ця реформа полегшить управління особовим складом, допоможе навести лад у системі командування, а заодно дещо зменшить нашу залежність від місцевих дворян та іноземних найманців."
  heirs_of_rollo: "Нащадки Роллона"
  heirs_of_rollo_desc: "У жилах вихідців з нашого правлячого дому й сьогодні тече кров вікінга Роллона — першого правителя Нормандії. Завдяки цьому наша легітимність міцна, а ми користуємося повагою серед рівних."
  trade_ports_in_the_channel: "Торгові порти Ла-Маншу"
  trade_ports_in_the_channel_desc: "Завдяки вигідному розташуванню на Ла-Манші наша країна — справжні ворота для світової торгівлі. Якщо вкласти достатньо коштів у розвиток портових міст та торгової інфраструктури, ми станемо господарями регіональної торгівлі та заодно помітно знизимо витрати на заморську діяльність."
  norman_law: "Нормандське право"
  norman_law_desc: "У нашій країні діє звід законів під назвою «$couteume_de_normaundie$», що закріплює привілеї дворянства та забезпечує децентралізацію влади й права на власність. Завдяки цьому країна стабільно розвивається, а ми помітно відрізняємося від сусідів."
  the_exchequer: "Палата шахівниці"
  the_exchequer_desc: "Наш законодавчий орган слід ретельно оберігати від будь-якого стороннього впливу, щоб він не спотворив нашу самобутню культуру та незалежність. Ми візьмемо за основу англо-нормандські фінансові інститути; у цьому випадку парламентські процедури напевно допоможуть короні збільшити свої доходи, а управлінцям — краще справлятися зі своїми обов'язками."
  frontline_in_the_caroline_war: "Передова в роки Каролінської війни"
  frontline_in_the_caroline_war_desc: "У роки довгих протистоянь між Францією та Англією за нашу землю — важливий стратегічний пункт — точилися запеклі бої. З цього горнила вийшов загартований офіцерський корпус, а славні переможні традиції живі й донині."
  tunisian_corsairs: "Туніські корсари"
  tunisian_corsairs_desc: "Наші корсари, що здійснюють набіги з фортець у Тунісі та Хальк-ель-Уеді, тримають у страху все Середземне море. Їхні швидкі галери під управлінням команд, що отримують державне жалування, не тільки загрожують іноземним купцям, а й дають зрозуміти іншим, що атакувати нас на морі може бути нерозумно."
  tamazight: "Тамазігхт"
  tamazight_desc: "Берберомовні народи, що проживають у глибині країни, — важлива складова нашого суспільства, що відрізняється самобутньою культурою. Зберігаючи цю культуру й заодно навчаючи її носіїв грамоти, ми виховуємо в собі вміння правити регіонами з різноманітним населенням, не жертвуючи згуртованістю та не втрачаючи влади."
  guardians_of_ifriqiya: "Стражі Іфрикії"
  guardians_of_ifriqiya_desc: "Ми — спадкоємці великих міст давнини: Карфагена та Кайруана, і на нас лежить почесний обов'язок охороняти серце Магрибу від посягань ворогів. Наша влада — запорука стабільності. Кожен житель цього колись заповітного регіону буде тільки радий прийняти її."
  saharan_trade: "Торгівля через Сахару"
  saharan_trade_desc: "Від оазисів Гадамеса до караван-сараїв Сахеля простяглися наші торгові шляхи — цими жилами в гаманці купців через Сахару течуть багатства далеких пісків. На північ під нашим невсипущим наглядом та охороною безперестанку рухається потік золота, солі та рабів."
  al_caid: "Аль-каїд"
  al_caid_desc: "Призначивши вірного каїда, який від імені країни наглядатиме за провінціями та керуватиме торгівлею, ми не тільки здобудемо місцевого губернатора, а й підтримаємо міських купців. Забезпечення чесних угод та регулювання ринку — шлях до зміцнення економічної бази."
  connections_with_the_christian_world: "Зв'язки з християнським світом"
  connections_with_the_christian_world_desc: "Навіть релігійні розбіжності не змусять нас відмовитися від сприятливих можливостей. Договори та торгові угоди з християнськими країнами, що укладаються виключно практичними дипломатами, лише послужать нашим інтересам у довгостроковій перспективі."
  attract_foreign_pirates: "Залучення іноземних піратів"
  attract_foreign_pirates_desc: "У наших портах нерідко знаходять притулок розбійники, які вирішили спробувати удачі у відкритих морях. Умілих мореплавців варто приймати з розпростертими обіймами, і неважливо, звідки вони родом або яким богам вони моляться: завдяки цим людям наші піратські флоти стануть сильнішими та обширнішими."
  rais_of_the_navy: "Раїси на флоті"
  rais_of_the_navy_desc: "Капітани кораблів наших корсарів — раїси — не просто пірати: це найдосвідченіші морські вовки, родоначальники безлічі морських традицій, якими по праву пишається наш славний флот."
  export_monopolies: "Монополії на експорт"
  export_monopolies_desc: "Взявши під контроль експортні поставки найважливіших товарів, таких як оливкова олія, тканини та барвники, ми не тільки забезпечимо країні процвітання, а й зможемо впливати на інших. Протекціонізм — лише важіль, за впливом схожий з війною; завдяки йому на ринках нашої країни перевага завжди буде у місцевих купців."
  beacon_of_maghrebi_trade: "Світоч магрибської торгівлі"
  beacon_of_maghrebi_trade_desc: "Тлемсен — місце, де під тінню андалузької величі перетинаються шляхи сахарських караванів і середземноморських торгових маршрутів. На ринках і в портах процвітає торгівля, наше завдання — ще ширше розкинути купецькі мережі, щоб у них потрапив і цей регіон."
  qalat_al_mashwar_advance: "$qalat_al_mashwar$"
  qalat_al_mashwar_advance_desc: "Фортеця $qalat_al_mashwar$ — не просто укріплення для наших військ: це символ династичної влади. Після того як ми вклали кошти в його розширення, оборона Тлемсена помітно зміцніла, а разом з нею посилилася адміністративна влада над сусідніми землями."
  hispano_moresque_style: "Іспано-мавританський стиль"
  hispano_moresque_style_desc: "В обличчі наших міст дивовижним чином поєднуються між собою андалузька витонченість і магрибська архітектурна традиція. Іспано-мавританський стиль, принесений у країну іноземними ремісниками та дворянами, надихає місцевих творців на нові діяння та підносить престиж нашого двору на нові висоти."
  city_of_scholars: "Місто вчених"
  city_of_scholars_desc: "Тлемсен здавна вважається осередком ісламської науки та обміну ідеями. Наші медресе відвідують вчені з Магрибу та Аль-Андалусу, і в стінах цих закладів зароджуються нові наукові та богословські теорії, обговорювати які будуть у тому числі й наші нащадки."
  entrepot_connections: "Сполучення з пакгаузами"
  entrepot_connections_desc: "Щоб наша країна стала справжнім центром торгівлі, її міста повинна з'єднати між собою надійна інфраструктура. Якщо ми спонукаємо аристократів до будівництва та утримання стратегічно важливих доріг, торгові потоки — життєві соки нашої країни — потечуть швидше."
  perpetual_general_captain_of_the_people: "Вічний капітан народу"
  perpetual_general_captain_of_the_people_desc: "У політично неспокійній середньовічній Вероні титул «капітан народу» з часом перестав бути виключно церемоніальним — його носії цілком серйозно претендували на владу. Першими, хто легітимізував свою владу з опорою на звання капітана народу, став рід делла Скала — династія правителів Верони, де завойовувати вірність доводилося ціною величезних зусиль."
  scaligers_military_ambitions: "Військові прагнення делла Скала"
  scaligers_military_ambitions_desc: "Рід делла Скала мріяв не просто правити Вероною, а перетворити це місто на повноцінну ломбардську країну. Зробити це вирішено було силою: перейшовши Паданську низовину, делла Скала вступили у війну з Міланом, Венецією та Падуєю. Там, де пройшли бойові дії, залишилися укріплені міста, загартовані в боях ополченці… і двір, що складався з військових реформаторів."
  court_of_great_refugees: "Двір великих біженців"
  court_of_great_refugees_desc: "Наша велика столиця стала притулком для творців, вигнанців і мислителів, змушених покинути рідні місця через війну, а також релігійні або політичні розбіжності з владою інших міст Італії. Ці люди збагатять наш двір новими знаннями, сміливими ідеями та культурними звичаями, і Верона заслужено вважатиметься тихою гаванню, де навіть у неспокійні часи може зародитися щось нове."
  consolidate_italian_holdings: "Об'єднати італійські володіння"
  consolidate_italian_holdings_desc: "Делла Скала правили не тільки Вероною — їм належала ціла мережа міст на півночі Італії. Утримати подібні володіння нелегко: для цього потрібно майстерно володіти мистецтвом дипломатії, вміло доручати іншим різні завдання та утримувати професійні війська, що вимагають чималих витрат. Лише після об'єднання розрізнених володінь Верона стане гідною суперницею іншим великим державам півострова."
  the_adige: "Адідже"
  the_adige_desc: "Річка Адідже — це артерія, що живить Верону життям. Без неї неможливі були б торгівля, землеробство та процвітання. Як Адідже несе свої життєдайні води з вершин Альп в Адріатичне море, так і багатство, принесене нам річкою, рясно живить ринки та поля, міста та села."
  marmorina: "Марморіна"
  marmorina_desc: "У мирні часи Вероною правили мудрі правителі, для яких краса та добробут міста не були порожнім звуком. Ми продовжимо цю славну традицію, і нам вже є чим підкріпити ці наміри: над річкою Адідже простягнувся шедевр архітектурного мистецтва — міст Понте-Наві, а на вежі Гарделло тихо відраховують час перші в Італії годинники з водяним приводом. Під нашою владою Верона буде відома під прізвиськом Marmorina — «мармурова»; велика кількість римського мармуру, статуй та витонченої архітектури вражатиме уяву. Ми залишимо відбиток не тільки на вигляді міста — самі наші імена увійдуть в історію."
  diocese_of_smolensk: "Смоленська єпархія"
  diocese_of_smolensk_desc: "Смоленська єпархія — не просто оплот православ'я та батьківщина однієї з найстаріших єпископій у цих краях: це — втілення непохитної віри нашого народу."
  smolenskian_resolve: "Стійкі смоляни"
  smolenskian_resolve_desc: "Протягом багатьох століть смоленська земля страждала від рук іноземних загарбників: польських королів, литовських і московських князів… Але ніхто з них не виявився здатним зламати нашу віру та силу духу. Так будемо ж і надалі пам'ятати, що об'єднує нас. Досягти величі можна тільки одним шляхом: залишити міжусобиці та спільно усвідомити, що Смоленськ — понад усе."
  link_the_steppes_trade: "Ланка в степовій торгівлі"
  link_the_steppes_trade_desc: "З одного боку до Смоленська підступає ліс, з іншого — степ. Смоленська земля бачила чимало війн і прийняла у себе чимало купців, а значить, усе її облаштування, що сприяє торгівлі, необхідно покращити, а основні шляхи, якими йдуть обози, — отримати у своє володіння. Лише в цьому випадку ми станемо дійсно важливою ланкою в ланцюжку, що йде від Північної Русі до Балтики та південних степових торгових шляхів."
  hub_of_militarism: "Осередок войовничості"
  hub_of_militarism_desc: "Споконвіку долю нашої землі визначала війна, але сьогодні колишню слабкість ми обертаємо на силу. Військове виробництво стане гордістю понівеченого війнами та облогами Смоленська: з наших зброярських дворів тягнуться вози з гарматами, пищалями та порохом, а разом з ними у світ йдуть й ідеї. Ми більше не будемо бажаною здобиччю в очах інших. Відтепер ми — молот, який готовий бити без пощади по іноземних загарбниках."
  armories_of_smolensk: "Зброярські двори Смоленська"
  armories_of_smolensk_desc: "Через довгі десятиліття прикордонних війн ми навчилися давати відсіч і заходу, і сходу зі зброєю в руках. Московська витримка та західна якість — ось чим відрізняються гармати, вироблені нашими майстрами на зброярських дворах. Немає рівних нам і в маневрах, і жоден ворог не здатен нас здолати: у печах зброярських дворів народжується вогнева міць, а разом з нею — сила та непохитність."
  capetian_house_of_anjou: "Анжуйська династія Капетингів"
  capetian_house_of_anjou_desc: "У нашій крові є гідність Капетингів та цілеспрямованість анжуйців. І хоча корона Єрусалиму нам вже не належить, ми все ж — законні спадкоємці роду, чиї володіння колись простягалися від Анжу до Албанії. У наших силах ще повернути країні колишню славу, щоб не осоромити пам'ять предків, і заодно — все те, що було незаконно вирвано з наших рук. У цьому нам допоможе мистецтво дипломатії та ретельного планування."
  lords_of_the_rhone_corridor: "Владики Ронського коридору"
  lords_of_the_rhone_corridor_desc: "Ронська низовина — найважливіше джерело нашої могутності. Над нею, немов мовчазні кам'яні вартові, пильно несуть дозор наші замки — одні з найміцніших європейських твердинь та символ нашої військової та технічної майстерності."
  angevin_heraldry: "Анжуйська геральдика"
  angevin_heraldry_desc: "Золоті лілії та двоголові орли, що прикрашають наші знамена, — символ давніх королівських домагань, що охоплюють Апеннінський півострів і навіть такі далекі краї, як Албанію та Єрусалим. Хай возвеличиться ж дім Валуа-Анжу!"
  le_livre_des_tournois: "Книга турнірів"
  le_livre_des_tournois_desc: "Le Livre des Tournois, або «Книга турнірів», — це не просто трактат, написаний королівською рукою, а статут, що виховує почуття власної гідності та лицарські чесноти. Знать нашого суспільства вчать не тільки воювати, а й поводитися на публіці; і поведінка ця має бути гідною воїна та аристократа."
  statutes_of_aix: "Статути з Екса"
  statutes_of_aix_desc: "Правовою основою для нашої влади виступає звід майже не централізованих законів та статутів, що поєднують у собі норми римського права, місцеві звичаї та анжуйські традиції. Завдяки цьому нам вдається правити найрізноманітнішими регіонами як одним повноцінним володінням. У нашій країні встановилася справжня складова монархія: частини країни самобутні, але корона єдина."
  rade_of_toulon: "Тулонський рейд"
  rade_of_toulon_desc: "Природна гавань Тулона чудово підходить для втілення всіх наших задумів, неможливих без доступу до моря. Марсель — символ купецької сторони нашої країни, а Тулон стане головним арсеналом Провансу, звідки в море вирушатимуть флоти."
  piqure_de_marseilles: "Piqûre de Marseille"
  piqure_de_marseilles_desc: "У майстернях Марселя рукодільниці займаються витонченою вишивкою в провансальському стилі, що незмінно користується популярністю в усій Європі через свою якість та красу. Ці шедеври подібні до нашої країни: різні клаптики зшиті воєдино, через що кожне полотно єдине у своєму різноманітті."
  orm_a_vast_emporium: "Пристанище велике"
  orm_a_vast_emporium_desc: "Один мандрівник якось сказав: «Ормуз же є пристанище велике, всього світу люди в ньому бувають, і всякий товар в ньому є, що на всьому світі родиться, те в Ормузі є все». Відомо й інше висловлювання: «Якби світ був кільцем, то Ормуз був би перлом у ньому». Торгівля — те, без чого неможливо уявити нашу країну: в її портах кидають якір кораблі з Гуджарату, Аравії та навіть Китаю. З рук у руки переходять прянощі та шовк, а з вуст у вуста — історії."
  hormuz_toll: "Мито в Ормузі"
  hormuz_toll_desc: "У найвужчій частині Перської затоки знаходиться Ормуз — ворота, через які проходить морський торговий шлях, що зв'язує схід і захід. Жоден корабель не може пройти через протоку без нашого відома… і без сплати мита. Вже багато століть поспіль ми стягуємо плату за прохід; завдяки цьому ми не тільки збагатилися, а й змогли домогтися чималого дипломатичного впливу на заморські країни."
  gate_of_the_persian_gulf: "Ворота в Перську затоку"
  gate_of_the_persian_gulf_desc: "Ормуз — ключ до протоки, що з'єднує Індійський океан із внутрішньою частиною Азії. Той, хто володіє цією протокою, володіє і всіма кораблями, що проходять через неї. Наша влада над цими водами має бути абсолютною, інакше вплив нашої країни різко впаде."
  moqarrariya: "Законний статус мокаррарії"
  moqarrariya_desc: "Уже багато поколінь поспіль наша країна зберігає мирні відносини з материком. Цьому допомагає мокаррарія — стародавня система виплати данини. Але замість того, щоб і далі покладатися на силу звичаїв і красномовство, краще буде законодавчо встановити види данини, і тоді доступ до свіжої води, безпеку на суші та стабільність країни нам забезпечуватимуть дипломати."
  develop_qeshm_and_ormuz: "Вкладення в Кешм та Ормуз"
  develop_qeshm_and_ormuz_desc: "На посушливих і кам'янистих островах Кешм та Ормуз процвітають міста — це стало можливим завдяки торгівлі та ретельному розподілу продовольства. Але це не межа: якщо ми вкладемо кошти в порти та майстерні, вони перестануть бути просто перевалочними точками; у них розквітнуть нові ідеї, а майстри почнуть створювати нові шедеври."
  ormuzi_navy: "Ормузький флот"
  ormuzi_navy_desc: "Без нашого флоту — торгового, сторожового чи військового — затока була б зовсім іншою. Але ми не збираємося спочивати на лаврах, адже нас оточують заздрісні країни, які прагнуть самі зайняти наше місце. Флот необхідно постійно розширювати та вдосконалювати; так нехай же Ормуз славиться не тільки торгівлею, а й своїми корабельними майстернями!"
  mint_of_the_gulf: "Карбування в затоці"
  mint_of_the_gulf_desc: "Завдяки своїй якості та вазі ормузькі монети користуються довірою, ними розплачуються від Басри до Бенгалії. Узаконивши їхнє карбування та наростивши його обсяг, ми лише зміцнимо свою фінансову незалежність… і встановимо фінансове панування над усім Індійським океаном."
  sav_savoyard_flexibility: "Савойські дипломати"
  sav_savoyard_flexibility_desc: "Оскільки наша земля межує з великими державами, запорука її подальшого існування — наше вміння домовлятися. Якщо ми зуміємо зберегти дипломатичні відносини навіть із найнебезпечнішими ворогами, укладати нові союзи стане простіше. Подібне вміння перебігати на інший бік допоможе нам врятувати країну."
  sav_house_of_savoy: "Об'єднаний дім"
  sav_house_of_savoy_desc: "З першого дня свого заснування в 1032 році й по сьогоднішній день Савоя перебуває під владою однієї й тієї ж графської династії. Єдність правлячої родини та міцні зв'язки з місцевими представниками — ось що допоможе нам уберегти савойську землю від роздробленості."
  sav_fight_the_vaudois: "Протистояння єресі"
  sav_fight_the_vaudois_desc: "Уже багато років поспіль вальденси поширюють у наших краях свою єресь. Лише сила духу та допомога Господа допомагають нам стримувати вплив єретиків, і ми твердо маємо намір і надалі відстоювати істинну віру від таких небезпечних посягань."
  sav_embrace_the_vaudois: "Світло в темряві"
  sav_embrace_the_vaudois_desc: "Ми прийняли вчення вальденсів і тепер будемо всіма силами відстоювати їхню віру від головного ворога — порочної католицької церкви, яка не терпить інакомислення."
  sav_alpine_pass_control: "Контроль над перевалами"
  sav_alpine_pass_control_desc: "Навіть за сприятливої погоди перехід через Альпи важкий і небезпечний, а подолати перевали з обозами або великою свитою і зовсім неможливо. Взявши на себе утримання стежок, притулків та проміжних зупинок, ми підкоримо собі цю непокірну місцевість і забезпечимо купцям постійний зручний прохід через наші краї."
  sav_the_shroud_of_turin: "Паломництво до священної плащаниці"
  sav_the_shroud_of_turin_desc: "На нашій землі знаходиться найважливіша християнська реліквія: плащаниця з відбитком лику Ісуса з Назарета. Тисячі паломників приходять поклонитися їй, а разом із паломниками в наші краї приходить багатство — залишилося лише навчитися отримувати з цього вигоду."
  sav_repopulate_the_valleys: "Заселення альпійських долин"
  sav_repopulate_the_valleys_desc: "Населення альпійських долин давно і незмінно тягнеться до міст, розташованих по обидва боки хребта. Через це доля багатьох невеликих сіл висить на волосині, а політична обстановка ось-ось вийде з рівноваги. Нам потрібно спонукати жителів долин повертатися до рідних домівок і не допускати занепаду господарств."
  mai_diadema_regni: "Diadema Regni"
  mai_diadema_regni_desc: "Наше прекрасне місто нерідко називають короною імперії, а отже, нам потрібно всіма силами підтримувати це благородне ім'я. Якщо жителі та гості Майнца й надалі захоплюватимуться його пишнотою, наш престиж тільки зросте, а з ним зросте й вплив."
  mai_city_and_archbishop: "Міські права"
  mai_city_and_archbishop_desc: "У 1119 та 1122 роках Адальберт I — людина, якій Майнц завдячує своїм процвітанням — дарував жителям міста обширні права, якими ті користуються й донині. Звід цих прав, вирізаний на бронзових дверях собору, нагадує кожному про можливість мирного та успішного співіснування станів — як священників, так і міщан."
  mai_leader_rheinish_league: "Рейнська ліга"
  mai_leader_rheinish_league_desc: "Коли склалася Рейнська ліга, ми взяли на себе керівництво нею і стали наставниками для решти учасників союзу. І хоча ліги вже не існує, нам слід і далі надавати заступництво з позиції влади кожній невеликій державі, що знаходиться по сусідству."
  mai_zealous_fight_against_heretics: "Захист віри"
  mai_zealous_fight_against_heretics_desc: "Не можна допустити, щоб релігійна єдність нашої країни розвалилася під загрозами ззовні. Якщо в наших військах з'являться священники, які наставлятимуть солдатів на шлях моральності, народ буде набагато охочіше захищати віру."
  mai_vicar_of_mainz: "Влада намісника"
  mai_vicar_of_mainz_desc: "Щоб забезпечити надійне управління країною навіть у ті години, коли в ній відсутній правитель, нам слід заснувати посаду намісника. Той буде, користуючись обширними повноваженнями, правити країною виходячи з найкращих переконань і нагадувати простому люду, що влада ніколи не спить."
  mai_mainz_kingdom: "Mainzer Königreich"
  mai_mainz_kingdom_desc: "Святкування в Попільну середу — звичне видовище, однак у нашій країні коріння цього явища особливо глибоке. Поки народ святкує #italic фастнахт#!, вбираючись у костюми та наїдаючись від душі, двір займатиметься іншою, особливою справою: розподілятиме придворні посади за допомогою жереба. У цьому заході беруть участь усі без винятку — навіть правитель. Цей звичай, іменований #italic Mainzer Königreich#!, з часом переймуть й інші країни, чим допоможуть поширити нашу культурну спадщину."
  mai_center_of_printing: "Друкарські майстерні Майнца"
  mai_center_of_printing_desc: "Усі обставини зараз сприяють тому, щоб ми нарощували обсяги друку в країні та поступово стали одним із найбільших книгодрукарів Європи."
  mai_garrison_of_the_rhine: "Місто-гарнізон на Рейні"
  mai_garrison_of_the_rhine_desc: "Захист кордонів — важке завдання, яке тільки ускладнює річка, що розділяє наші землі навпіл. Щоб дати ворогу відсіч, нам знадобиться обширна мережа гарнізонів та укріплень."
  cro_maritime_connections: "Переміщення морем"
  cro_maritime_connections_desc: "Узбережжя нашої країни занадто неоднорідне, щоб берегові поселення можна було легко з'єднати між собою дорогами. Нам доведеться забезпечити постійне корабельне сполучення — у цьому випадку і товари, і люди добиратимуться до пунктів призначення набагато швидше в обхід прибережних земель."
  cro_reliance_on_adriatic: "Дари Адріатики"
  cro_reliance_on_adriatic_desc: "Море під боком нашої країни рясно дарує нам рибу та сіль — саме те, що потрібно і для підтримки місцевої економіки, і для продажу в інші країни."
  cro_trade_posts: "Хорватські факторії"
  cro_trade_posts_desc: "Наші землі розташовані в вдалому місці — відразу між кількома містами, куди постійно ходять купецькі кораблі. Замість того, щоб просто організовувати відпочинок для іноземних купців, нам слід підтримати грошима власні торгові починання. У такому випадку значна частка торгівлі на Середземномор'ї дістанеться нам."
  cro_influx_of_foreign_knowledge: "Приплив знань з-за кордону"
  cro_influx_of_foreign_knowledge_desc: "Наші краї обійшло чимало закордонних творців та вчених. Потрібно спонукати їх залишатися тут якомога більше, щоб вони впливали на розвиток нашої культури."
  cro_antemurale_christianitatis: "Antemurale Christianitatis"
  cro_antemurale_christianitatis_desc: "Нам час усвідомити, що ми — захисники єдино істинної віри: християнства. Наша країна — бастіон, об який розбиватимуться хвилі єретиків та язичників."
  cro_pandurs_recruitment: "Призов пандурів"
  cro_pandurs_recruitment_desc: "Ми заснуємо в країні полки легкої піхоти, які в мирний час стежитимуть за правопорядком та захищатимуть країну від нальотчиків. Коли настане важка година, ці полки увійдуть до складу нашого війська."
  arabia_felix: "Arabia Felix"
  arabia_felix_desc: "Ще з античних часів Ємен носить прізвисько Arabia Felix — «Аравія родюча». Завдяки помірному високогірному клімату та багатому ґрунту ця земля, оточена з усіх боків пісками, — одна з найпроцвітаючих на всьому півострові. На цьому процвітанні ми й побудуємо успішну країну."
  coffea_arabica: "Coffea Arabica"
  coffea_arabica_desc: "Ми не раз спостерігали спроби вирощувати місцеві кавові зерна в інших краях, однак нікому так і не вдалося затьмарити смак та славу арабської кави. Цей ароматний напій однаково прагнуть скрізь — і в людних портах Мохи, і при дворах заморських країн."
  zaydi_scholarly_traditions: "Вчені традиції зейдитського мазхабу"
  zaydi_scholarly_traditions_desc: "У високогір'ї Ємену розташований старий імамат зейдитського мазхабу — осередок вченості та правовірності. Протягом багатьох століть наші вчені суворо стежать за верховенством традиційного ісламського права з домішкою раціоналізму та за моральною чистотою нашої влади."
  rasulid_bureaucracy: "Бюрократія Расулідів"
  rasulid_bureaucracy_desc: "Династія Расулідів навела в управлінні країною небачений раніше порядок. Завдяки введенню перепису населення та систем оподаткування, а також встановленню в країні повноцінної ради Ємен перетворився на одну з найвидатніших країн півострова з адміністративної точки зору."
  control_of_the_red_sea: "Контроль над Червоним морем"
  control_of_the_red_sea_desc: "Торгові судна з Індії та Африки неминуче змушені йти через протоку, що називається «Ворота скорботи». Ця протока здатна принести нам чималий прибуток, якщо ми встановимо тут своє панування."
  yem_unite_the_tribes: "Об'єднати єменські племена"
  yem_unite_the_tribes_desc: "Від узбережжя Тіхами до Харазських гір нашу країну населяють сотні племен, готових битися за свою незалежність до останньої краплі крові. І хоча вони не бажають визнавати будь-яку центральну владу, все ж ці племена — запорука нашої сили: об'єднавши їх під приводом спільної справи, ми отримаємо значну робочу силу."
  port_of_aden: "Порт Аден"
  port_of_aden_desc: "Порт Аден вже тисячу років приваблює до себе торговців. У цій природній гавані часто зупиняються кораблі з Індії, Єгипту та Східної Африки. Якщо приділити порту належну увагу, він цілком здатний знову стати основою нашої морської економіки та гордістю Червоного моря."
  sons_of_the_salur_tribe: "Сини племені салир"
  sons_of_the_salur_tribe_desc: "Свій рід Караманіди ведуть від племені салир — одного з ранніх огузьких племен, хороброго та славного своїми сильними вождями. Спадщину салир ми зберігаємо і сьогодні — вона проявляється в обліку нашої країни та її претензії на уособлення собою всіх анатолійських туркменів."
  mehmed_beys_firman: "Фірман Мехмет-бея"
  mehmed_beys_firman_desc: "Мехмет I видав указ, що забороняє розмовляти при дворі, в обителях дервішів, на зборах та площах будь-якою мовою, крім турецької. Тим самим він завдав удару по засиллю перської та арабської культур у вищих колах та заклав основу для розвитку туркменської самобутності."
  karamanid_cavalry: "Караманідська кавалерія"
  karamanid_cavalry_desc: "Туркмени ніколи не воюють без кавалерії — це давно відомо всім. Наших вершників з ранніх років навчають триматися в сідлі міцних анатолійських коней, і ці люди, чудово навчені та вкрай небезпечні в бою, гідно дотримуються традицій війни в степу."
  home_of_the_whirling_dervishes: "Дім кружляючих дервішів"
  home_of_the_whirling_dervishes_desc: "У Коньї — духовному центрі нашої країни — збираються послідовники Джалаладдіна Румі, що виробили власний священний обряд під назвою сема. Дервіші стверджують, що сема — це символ мандрівки душі на шляху до божественної істини. Їхнє вчення — не тільки важлива частина містичних традицій країни, а й спосіб зміцнення її суфійських коренів."
  sakya_hegemony: "Гегемонія Сак'я"
  sakya_hegemony_desc: "Ось уже ціле століття величезним мирським впливом у Тибеті користується школа Сак'я. Під покровительством монголів її вчителі виступають духовними та політичними керівниками нашого народу — за них настала епоха централізованого управління та злиття різних шкіл воєдино. І хоча вплив Сак'я поступово згасає, залишена школою спадщина і сьогодні визначає наш підхід до управління та встановлення порядку."
  monastic_dominance: "Верховенство ченців"
  monastic_dominance_desc: "Політичну обстановку в Тибеті можна описати так: злиття духовної та мирської влади. Ченці впливають на всі сфери життя, їхній авторитет охоплює всі куточки країни — від крихітних сіл до палацових залів. Ці люди розбираються в питаннях моральності, а також чудово вміють керувати. Під їхнім наглядом у жителів країни виховуються ідеали вірності, єдності та культурної стійкості."
  the_yak: "Як"
  the_yak_desc: "Як, одомашнений багато століть тому, — звичне видовище на тибетських луках. Цей невибагливий звір дає нам м'ясо, молоко та вовну, перевозить вантажі, а сушеним гноєм яка можна топити багаття, не турбуючись про відсутність дров, адже на наших рівнинах майже не ростуть дерева. У годину потреби або веселощів олією з молока яка можна наповнити лампу — або чашу."
  drokpa: "Дрокпа"
  drokpa_desc: "Кочівники дрокпа відомі не лише як скотарі та торговці: нерідко вони також носять вантажі між віддаленими поселеннями. Дрокпа вірні своїм традиціям і чудово знають цю землю, а тому без труда долають високогірні маршрути між Тибетом, Бутаном, Ладакхом та Непалом. Кілька разів на рік вони привозять в обозах сіль, шерсть та сушене м'ясо, яке потім обмінюють на зерно та готові вироби. Протоптані кочівниками стежки обплели наші гори, немов витончена павутина, без якої неможливі були б торгівля та дипломатія."
  tibetan_monastic_education: "Система чернечої освіти"
  tibetan_monastic_education_desc: "Здавна відомо, що в наших монастирях можна здобути нові знання, взяти участь у дискусіях та виховати в собі духовну дисципліну. За допомогою суворої, але ретельно продуманої програми навчання наші священники підтримують у собі та в інших високі моральні та інтелектуальні стандарти, прокладаючи тим самим шлях до мудрого управління країною та розквіту її просвіченої культури."
  tanye_guanxi: "Духовне покровительство"
  tanye_guanxi_desc: "Дипломатичні відносини нашої країни з Китаєм будуються на багатьох століттях нашого культурного впливу. Покровительство з боку імператора, обміни підношеннями та проведення священних обрядів на кшталт таньюе слугують не лише розвитку взаємоповаги, але й отриманню матеріальної вигоди."
  great_three: "Три великих монастирі"
  great_three_desc: "Величні монастирські університети Сера, Ганден та Дрепунг — інтелектуальне серце Тибету, де навчається покоління за поколінням ченців, дипломатів та правителів. Завдяки цим монастирям наша країна — не просто оплот віри, а й колиска нових ідей, що сприяють, зокрема, розвитку країни."
  dai_lang: "В'єтнамські незалежні села"
  dai_lang_desc: "Кожне в'єтнамське село (#italic ланг#!) існує за старим, але незмінним принципом: повна самостійність та верховенство сільських звичаїв над королівськими законами. Жителі країни крутих гір та звивистих річок самостійно керують своїми громадами, самі збирають ополчення та податки, а королівська влада підтримується знизу, але не зверху."
  nghia_quan: "Нгіа куан"
  nghia_quan_desc: "Нам добре відомі слова #italic «нгіа куан»#!, що означає «праведне ополчення». У години великої небезпеки загони нгіа куан підіймалися на захист рідної країни. За зброю бралися всі — землероби, вчені, просто небайдужі люди… Згуртувавшись воєдино, вони давали відсіч як іноземним загарбникам, так і деспотам на престолі. Відвага ополченців та їхня відданість своїй батьківщині перетворювали вчорашніх мирних жителів на дійсно грізну силу."
  cha_go_tram_huong: "Гочамхионг"
  cha_go_tram_huong_desc: "Смолиста деревина агарового дерева, що росте в наших лісах, виділяє дивний аромат і високо цінується для обрядів та медицини. Вона відома далеко за морями, аристократи та священники по всьому світу використовують це дерево як частину пахощів та ароматів, а також як бажане підношення богам. Якщо ми організуємо захист лісів та вдосконалимо методи збору деревини, ми зможемо перетворити цей рідкісний дар природи на один з найвигідніших для нас експортних товарів."
  my_son_sanctuary: "Святилище Мішон"
  my_son_sanctuary_desc: "Посеред зарослих пишною рослинністю долин центральної Тямпи знаходиться священний храмовий комплекс Мішон, де багато поколінь наших царів та священників віддають хвалу Шиві, захиснику нашого царства. Різьблені колони храмів ретельно прикрашені священними символами, що допомагають нам знайти єдність з предками та богами. Поки в жаровнях храмів тліють пахощі, дух Тямпи подолає всі перешкоди."
  lor_mining_tradition: "Рудники Лотарингії"
  lor_mining_tradition_desc: "Наші землі багаті рудами та вугіллям, і ми можемо використовувати їх собі на благо. Видобуток цих копалин збагатить нашу країну та закладе фундамент для нашої майбутньої могутності."
  lor_cultural_diversity: "Мультикультурна країна"
  lor_cultural_diversity_desc: "На нашій території живуть різні народи, тож ми знаходимося на стику різних культур. Побудувати країну так, щоб керувати цими народами по справедливості, буде непросто, але вирішити це завдання необхідно. Тільки тоді ми зможемо порівнювати себе з Лотаринзьким королівством, спадкоємцями якого є."
  lor_three_bishoprics: "Земля єпископів"
  lor_three_bishoprics_desc: "У Лотарингії багато єпископств, які мають впливових покровителів, як за кордоном, так і в самій церкві. Співпраця з ними стане для нас корисним інструментом просування своїх інтересів у церкві, а підтримка з боку єпископів допоможе нам простіше замиряти населення."
  lor_between_great_powers: "Спадщина старих королів"
  lor_between_great_powers_desc: "Колись наші землі були важливою частиною Лотарингії, одного з королівств франків. Якщо ми не хочемо, щоб про нас забули нащадки, нам потрібно зміцнювати своє дипломатичне становище та укладати довгострокові союзи."
  lor_fortified_cities: "Міста-фортеці Лотарингії"
  lor_fortified_cities_desc: "Ми утримуємо важливі переправи на кількох річках, і заради збереження незалежності зобов'язані захищати їх усіма силами. Для цього нам потрібно модернізувати великі фортеці біля мостів у наших містах та побудувати на їхньому місці потужні цитаделі."
  bos_land_of_many_churches: "Церкви Боснії"
  bos_land_of_many_churches_desc: "На боснійській землі діють кілька церков. Тут знаходяться не тільки парафії православної та католицької церков — Боснія це дім і для крстян. Віддалік від уваги центральних церковних влад нам доведеться розвивати взаєморозуміння та гармонію між різними конфесіями, щоб зберегти стабільність країни."
  bos_cultural_customs: "Боснійські звичаї"
  bos_cultural_customs_desc: "У нашого народу багато самобутніх звичаїв, спільних для нас, попри відмінності у вірі. Багато оздоблені надгробки — #italic стечки#! — продемонструють, що ці землі належать боснійцям."
  bos_katun_communities: "Катуни влахів"
  bos_katun_communities_desc: "Частина нашого населення об'єднана в самоврядні сільські громади. Нам потрібно не намагатися підкорити їх центральній владі, а налагодити з ними співпрацю та спробувати таким чином отримати більше ресурсів з віддалених районів."
  bos_influence_of_the_stanak: "Засідання станку"
  bos_influence_of_the_stanak_desc: "Наші дворяни регулярно проводять зібрання, де обговорюють нагальні питання нашої країни. Тут вони узгоджують політику та демонструють єдність нашого парламенту."
  bos_defiant_terrain: "Неприступна місцевість"
  bos_defiant_terrain_desc: "У землях Боснії зустрічаються пагорби та гори, вкриті лісами та розділені річковими долинами. Такий ландшафт природним чином уповільнює та виснажує війська загарбників, і ми повинні цим користуватися — давати ворогу бій, тільки коли це для нас вигідно, та економити сили, поки ворог втрачає припаси та солдатів у ворожому середовищі."
  bos_kingly_ambitions: "Королівські амбіції"
  bos_kingly_ambitions_desc: "Заслуги та праці нашого народу гідні визнання та захисту. Для цього нам потрібно встановити тісні зв'язки з іншими правителями навколишніх країн та заручитися для себе престижним титулом."
  cir_tribal_elections: "Племінні вибори"
  cir_tribal_elections_desc: "Ми оберемо почесного лідера нашого народу, який виступатиме нашим спільним представником, але не втручатиметься у справи удільних князів."
  cir_mercenary_employment: "Черкеські найманці"
  cir_mercenary_employment_desc: "Наші землі знову і знову піддаються набігам з чужих країн, наших одноплемінників викрадають у рабство. Деякі з цих рабів стають солдатами та досягають успіхів у далеких землях, зосереджуючи у своїх руках владу та багатство. Ми можемо переконати їх повернутися на батьківщину та захистити її від нових набігів."
  cir_horsemen_of_the_steppe: "Вправні вершники"
  cir_horsemen_of_the_steppe_desc: "Ми живемо на краю Великого степу, і тому на нашу батьківщину не раз нападали чужоземні вершники. Щоб захистити свою свободу, нам потрібно зібрати своє велике військо, поширити вплив над степом та убезпечити процвітання наших рідних земель."
  cir_city_and_fortress: "Укріплені міста"
  cir_city_and_fortress_desc: "Наші поселення беззахисні та вразливі перед будь-яким загарбником. У міру їхнього зростання нам слід будувати оборонні лінії з урахуванням навколишніх пагорбів, які зміцнять наш захист. За необхідності ми можемо самі будувати насипи для захисту будинків."
  cir_grand_prince_of_circassia: "Велике князівство"
  cir_grand_prince_of_circassia_desc: "Для об'єднання нашого народу ми оберемо з наших князів найблагороднішого та наречемо його великим князем. Своїм авторитетом він підніматиме бойовий дух наших військ."
  cir_multireligious_society: "Співіснування релігій"
  cir_multireligious_society_desc: "На наших землях живуть народи, які сповідують католицтво, іслам та православ'я, і вони активно торгують з жителями наших поселень. Нам потрібно заохочувати загальну терпимість серед наших ленників — це створить ґрунт для загального процвітання."
  seren_taun: "Серен Таун"
  seren_taun_desc: "Фестиваль Серен Таун проводиться після завершення збору рису. Це щорічна подячна церемонія за багатий урожай. Вона складається з численних обрядів, підношень і пісень та зміцнює узи серед населення наших сіл — кампонгів — і нагадує учасникам про священний зв'язок між людьми, рисом і природою."
  pepper_of_the_parahyangan: "Пріанганський перець"
  pepper_of_the_parahyangan_desc: "Родючі вулканічні ґрунти схилів Сунданських гір ідеально підходять для вирощування цінного чорного перцю. Торговці з усього світу скуповують наш перець, знаменитий своєю гостротою та ароматом. Нам потрібно перетворити цей природний скарб на інструмент впливу за рахунок торгівлі прянощами."
  pan_asian_trade: "Паназійська торгівля"
  pan_asian_trade_desc: "Сунда межує з кількома великими імперіями: Індією, Китаєм та країнами ісламського світу. Утвердивши себе як важливий вузол у цій мережі, ми відкриємо для себе потік товарів та ідей і налагодимо відносини з партнерами по всій Азії. Наші гавані стануть воротами у світ процвітання."
  extend_kampung_kampung: "Розширити кампонги"
  extend_kampung_kampung_desc: "Основа сунданського суспільства — це кампонги — сільські поселення, які розкидані по всій території країни. Розвиток інфраструктури цих сіл забезпечить їхній стійкий ріст, сильну місцеву владу та стійкість перед неврожаями та іноземними вторгненнями."
  sca_unified_scandinavia: "Об'єднана Скандинавія"
  sca_unified_scandinavia_desc: "Об'єднання Данії, Норвегії, Швеції та Фінляндії в унію під владою однієї корони перетворило Північну Європу з поля битви конкуруючих королівств на централізовану країну. Завдяки єдиній адміністрації та зміцненню співпраці між станами ми можемо посилити свій контроль над королівством."
  sca_legacy_kalmar_union: "Спадщина Кальмарської унії"
  sca_legacy_kalmar_union_desc: "Хоча Кальмарська унія і розпалася внаслідок конфлікту, вона стала прикладом спільного суверенітету для північних країн. Спираючись на цей досвід, ми зміцнимо свою владу і нагадаємо ленникам, що єдність — це сила, а не підпорядкування."
  sca_sound_toll: "Зундська мито"
  sca_sound_toll_desc: "Контроль над протокою Зунд дає нам право ввести Зундську мито за прохід усіх іноземних суден через Данські протоки. Цей давній привілей перетворить наше зручне географічне положення на джерело багатства та зміцнить наше панування над балтійськими торговими шляхами."
  norwegian_heritage: "Норвезькі морські традиції"
  norwegian_heritage_desc: "Завдяки порізаній береговій лінії та багатим традиціям мореплавства норвежці стали вправними мореплавцями, рибалками та навігаторами. Завдяки спадщині скандинавських рибалок та корабелів наші моряки охоче вирушають у небезпечні плавання, а прибережні поселення успішно живуть за рахунок моря."
  danish_heritage: "Спадщина данських корабелів"
  danish_heritage_desc: "Данці можуть похвалитися давніми морськими традиціями, а їхній досвід у морській логістиці призвів до будівництва великих верфей — наприклад, у Копенгагені. Скандинавія успадкувала цю потужну інфраструктуру та традиції: вони зміцнять наше дипломатичне становище та морські можливості."
  swedish_roots: "Шведські військові традиції"
  swedish_roots_desc: "Шведські військові традиції — від дисциплінованих каролінерів до озброєного вільного селянства — набули великої важливості для Скандинавії. Інтегруючи шведські військові інститути та системи набору до військ, ми збільшимо кількість рекрутів і зробимо нашу імперію сильнішою."
  finnish_heritage: "Фінська прикордонна кавалерія"
  finnish_heritage_desc: "Фінські гаккапеліти заслужили в ході європейських воєн репутацію смертоносних кавалеристів. Ці вершники набиралися з диких лісів і рівнин Фінляндії та відрізнялися бойовим досвідом, пристосовністю та витривалістю. Надавши їхнім загонам офіційного статусу, ми отримаємо постійну елітну гвардію в лавах наших військ."
  symbol_of_catholicism: "Символ католицизму"
  symbol_of_catholicism_desc: "Єрусалим — найсвятіше з міст для християн, де відбувалися Страсті Христові та його Воскресіння. Встановивши католицьке панування над цими святими землями, ми станемо духовним маяком для всього латинського світу і стовпом істинної віри."
  protectors_of_jerusalem: "Захисники Єрусалима"
  protectors_of_jerusalem_desc: "Ми стоїмо на передньому краї битви за християнську віру, оточені невіруючими. Наш священний обов'язок — захистити Святе місто і вселити страх у серця язичників, які посміли на нього посягнути."
  latin_patriarch: "Латинський патріарх"
  latin_patriarch_desc: "Папство відновило латинського патріарха Єрусалима, колись вигнаного та забутого. Тепер же його титул відновлено, і Патріарх зміцнить наш вплив у Римі та утвердить нашу роль захисників інтересів Церкви на Сході."
  rites_holy_sepulchre: "Служби в храмі Гробу Господнього"
  rites_holy_sepulchre_desc: "У храмі Гробу Господнього знову проводяться розкішні служби за старовинним латинським обрядом. Ці урочисті церемонії, присвячені смерті та воскресінню Христа, зміцнюють наше Богом дане право правити цими землями та поширювати вчення нашої віри."
  latinate_integration: "Латинська інтеграція"
  latinate_integration_desc: "Наша країна — плавильний котел з європейських аристократів, віруючих паломників та корінних жителів Лівану. Завдяки вмілому управлінню ми виплавимо з цих різнорідних груп латинське християнське суспільство, для якого віра та культура будуть нероздільні."
  chinese_siege_engineers: "Плани облог"
  chinese_siege_engineers_desc: "Стіни наших фортець і міст завжди були настільки товсті та міцні, що навіть найкращим нашим облоговим машинам вони не по зубах. Тому нашим інженерам довелося винаходити багато різних тактик і стратегій для успішної облоги укріплених позицій."
  chi_legitimate_claimant: "Право на мандат"
  chi_legitimate_claimant_desc: "Ми маємо досить скромне минуле, проте довели своє вміння керувати та завоювали багато відданих ленників. Тепер у нас бачать гідних претендентів на Небесний мандат і Серединну Країну."
  chi_great_rivers_of_china: "Родючі річки"
  chi_great_rivers_of_china_desc: "Великі річки, що течуть нашими землями, несуть із собою небезпеку, але вони також дарують нам можливість вирощувати дуже багато їжі."
  arabian_horsemanship: "Арабські скакуни"
  arabian_horsemanship_desc: "Коні, яких вирощують у наших землях, завдяки своїй красі та силі користуються великим попитом у далеких країнах. Якщо ми почнемо спеціально вирощувати їх на продаж, ця слава принесе нам добрий дохід."
  arabian_desert_warfare: "Сила пустелі"
  arabian_desert_warfare_desc: "Суворі умови Аравійської пустелі зробили наших воїнів сильнішими та витривалішими, вони легко виснажують противника, перш ніж завдати йому вирішального удару."
  arabia_cradle_of_islam: "Колиска ісламу"
  arabia_cradle_of_islam_desc: "У наших землях розташовані найсвятіші для нашої віри місця. Особливо глибокий зв'язок нашого народу зі святою вірою спонукає його на великі справи."
  arabia_red_sea_trade: "Торгівля на Червоному морі"
  arabia_red_sea_trade_desc: "На нашому узбережжі стоїть багато аванпостів, де торгують цінними товарами як з наших земель, так і заморськими. Час би нам взяти свою частку від руху цих багатств."
  indonesia_outer_islands_archipelago: "Індонезійський архіпелаг"
  indonesia_outer_islands_archipelago_desc: "Морські зв'язки природним чином відіграють величезну роль у нашому суспільстві, адже ми з усіх боків оточені морями. Наша залежність від морської торгівлі та водного транспорту зробила наших підданих вправними моряками."
  indonesia_naval_supremacy: "Флотський досвід"
  indonesia_naval_supremacy_desc: "Наша політична влада на архіпелазі практично повністю залежить від потужності нашого флоту. Поліпшивши вишкіл моряків та конструкцію суден, ми забезпечимо собі панування над малими країнами Індонезії."
  indonesia_trading_hub_of_the_east: "Торговий вузол Сходу"
  indonesia_trading_hub_of_the_east_desc: "Звідки б він не вийшов і куди б не попрямував, кожен торговець в Азії рано чи пізно перетинає наші землі, несучи з собою дорогі товари та розповіді про свої мандри."
  indonesia_archipelago_of_many_faiths: "Земля багатьох народів"
  indonesia_archipelago_of_many_faiths_desc: "Наші острови — дім для незліченних народів, які говорять різними мовами та поклоняються різним богам. Ми не побудуємо процвітаючу країну, якщо не зможемо прищепити підданим взаєморозуміння та терпимість один до одного."
  italian_universities: "Університети Італії"
  italian_universities_desc: "В Італії багато великих університетів та вчених. Якщо ми хочемо зберегти вогонь Відродження, то повинні постійно підтримувати ці знамениті заклади."
  italy_great_families: "Великі родини Італії"
  italy_great_families_desc: "Після заснування єдиної італійської країни ми прийняли до лав підданих багато великих та шляхетних родин. Нам слід скористатися їхньою славою та підняти наш власний престиж і забезпечити цих талановитих людей роботою."
  italian_innovativeness: "Пристосування по-італійськи"
  italian_innovativeness_desc: "Розквіт Відродження в нашій країні показав, яких великих висот можуть досягти талановиті люди. Щоб скористатися цим поступом, ми повинні якомога менше заважати прийняттю нових ідей, але при цьому нам слід адаптувати їх під нашу дійсність."
  italian_condottieri: "Талановиті кондотьєри"
  italian_condottieri_desc: "Наші землі знамениті талановитими воєначальниками, які водять видатні війська в бій заради власної слави та заради слави тих, хто більше заплатить. Нам потрібно зробити так, щоб ці воєначальники завжди були готові служити в першу чергу нам."
  usa_mayflower_compact: "Мейфлауерська угода"
  usa_mayflower_compact_desc: "Пов'язані один з одним спільною небезпекою та метою, перші поселенці уклали договір про самоврядування. Навіть у дикій глушині зерна спільноти та компромісу знайшли плідний ґрунт."
  usa_empowered_assemblies: "Повноважні збори"
  usa_empowered_assemblies_desc: "Тут і там у колоніях почали з'являтися виборні збори, які давали землевласникам право на самоврядування. Приміщення цих установ стали місцем, де зійшли перші паростки громадянських свобод."
  usa_great_awakening: "Велике пробудження"
  usa_great_awakening_desc: "Нашими землями прокочується хвиля релігійного пробудження: старі авторитети піддаються сумніву, і в умах народу, що підіймається, пробуджується моральна свідомість."
  usa_declaration_of_independence: "Декларація незалежності"
  usa_declaration_of_independence_desc: "#italic Ми виходимо з тієї самоочевидної істини, що всі люди створені рівними.#!\n\nЦією сміливою декларацією ми скинемо з себе кайдани гноблення і вирушимо назустріч нашій спільній долі."
  usa_bill_of_rights: "Білль про права"
  usa_bill_of_rights_desc: "#italic …або обмежує свободу слова чи друку, або право народу мирно збиратися та звертатися до уряду з петиціями про задоволення скарг.#!"
  usa_recognized_sovereignty: "Визнаний суверенітет"
  usa_recognized_sovereignty_desc: "Договори та дипломатія закріпили те, що було завойовано в боротьбі. Тепер наше місце на дипломатичній сцені ніким сумніву не піддається."
  usa_era_good_feelings: "Ера доброї згоди"
  usa_era_good_feelings_desc: "Після довгих негараздів насталий мир і згода принесли нам рідкісну мить національної гармонії. Народ радіє добрим перспективам і порядку."
  kon_bakongo_confederation: "Конфедерація баконго"
  kon_bakongo_confederation_desc: "Задовго до виникнення нашої країни жителі цього регіону скликали ради племен і укладали союзи. Те, що ми тепер називаємо Конго, народилося з багатовікової історії тісних зв'язків, де земля і рідня були важливішими за кордони. Об'єднати ці численні союзи в одну країну було непросто, але ми з цим впоралися, і ми її збережемо."
  kon_lineage_lukeni_lua_nimi: "Династія Лукені луа Німі"
  kon_lineage_lukeni_lua_nimi_desc: "У всього має бути початок, і наше королівство почалося з Лукені луа Німі. Він був не просто завойовником. Він був засновником, батьком нашої країни. Його родовід викликав повагу — не тільки через його знаменитих предків, а й тому, що він нагадує нам, хто перший наважився подумати про об'єднання $KON$."
  kon_european_contact: "Контакти з європейцями"
  kon_european_contact_desc: "З-за моря до нас припливли бородаті чужинці з книгами та бочками з вином. Вони привезли з собою дивних богів, незрозумілі мови та ціле море можливостей. Наші посли дізналися їхні звичаї, наміри, і найголовніше — як обернути їхню потребу в союзниках нам на користь."
  kon_cultural_syncreticism: "Культурний синкретизм"
  kon_cultural_syncreticism_desc: "Потік іноземців та спілкування з ними вплинули на наше суспільство. Але ми не відмовилися від свого укладу життя. Ми взиваємо до богів на кіконго, ми носимо релігійні знаки, а наші обряди проходять під звуки барабанів та піснеспівів. Це яскравий приклад того, як ми тверезо підходимо до культурного обміну, і наші боги з нами згодні."
  kon_study_european_firearms: "Вивчення європейської вогнепальної зброї"
  kon_study_european_firearms_desc: "Мушкет не наділяє воїна хоробрістю, але точно вселяє страх у серця його ворогів. Нехай європейці хваляться своєю перевагою, ми будемо купувати їхню зброю, навчимося муштрувати війська, як це роблять вони, і дуже скоро єдина різниця між їхніми солдатами та нашими буде лише в кольорах прапорів."
  kon_transatlantic_slave_trade: "Трансатлантична работоргівля"
  kon_transatlantic_slave_trade_desc: "Європейці хочуть купувати наших полонених і робітників та відвозити їх за океан, щоб там вони працювали на плантаціях і рудниках. Звісно, продавати своїх людей — справа нехороша, але надто вже прибуткова."
  ilk_restore_yam: "Відновити ями"
  ilk_restore_yam_desc: "Стародавня система ямів, поштових станцій та гінців колись з'єднувала далекі куточки монгольського світу з центром. Відновивши цю розгалужену мережу станцій по всій Персії та за її межами, ми забезпечимо швидку передачу наказів, безпеку посланців та впевнений контроль над нашими землями, як це було за часів ханів."
  ilk_ilkhanate_resurgent: "Відродження Ільханату"
  ilk_ilkhanate_resurgent_desc: "Що колись було зруйновано, тепер відроджується. Знову наші прапори високо майорять по всій Персії, наповнюючи підданих захопленням і жахом. Звістка про наше відродження поширюється все ширше, і скоро світ згадає, як це, коли тобою править справжній $ILKHANATE_LEADER_MALE$."
  ilk_persian_arts_and_architecture: "Перське мистецтво та архітектура"
  ilk_persian_arts_and_architecture_desc: "Наші предки правили мечем, але їхня велич вимірювалася палацами, бібліотеками та мінаретами. Ми підемо їхніми стопами і будемо будувати не тільки фортечні стіни та дороги, а й мечеті, сади та школи на славу Країни Хулагуїдів."
  ilk_descendants_of_genghis_khan: "Нащадки Чингісхана"
  ilk_descendants_of_genghis_khan_desc: "У наших жилах тече кров кагана. Нехай кожен пам'ятає, що наша влада спиралася на степи і, метою її було завоювання. Нашим вершникам досі немає рівних, і наші прапори несуть не тільки наше ім'я, а наше право за народженням."
  ilk_new_roots: "Нові корені"
  ilk_new_roots_desc: "Дні степових завоювань давно в минулому. Ми пустили корені в ґрунт поступу та реформації. І з цього ґрунту виросте нова країна, стабільна та досконала. Нехай наші серця досі прагнуть відкритих полів, наше майбутнє це стабільні інститути, а не зухвалі нальоти."
  hin_sepahi: "Сіпаї"
  hin_sepahi_desc: "Багато невдалих підкорювачів цих земель знехтували важливістю піхоти і жорстоко за це поплатилися. Нам потрібно зробити так, щоб наші війська були озброєні найкращими рушницями та навчені тактиці, яку можна підлаштувати під будь-якого ворога."
  hin_united_india: "Об'єднана Індія"
  hin_united_india_desc: "Народи, цивілізації, носії найрізноманітніших культур та мов Індійського півострова об’єднаються під спільним прапором. Лише взаєморозуміння та виплекане почуття згуртованості дозволять нам досягти великих цілей."
  hin_ganga: "Ганга"
  hin_ganga_desc: "Багато індуїстів поклоняються річці Ганг як богині, що несе очищення та спасіння віруючим. Ми просимо паломників прийти до її берегів та омитися в її священних водах. Ганга дарує чистоту нашій країні."
  hin_persianate_court: "Персомовна куртуазна культура"
  hin_persianate_court_desc: "Чужоземні мови, звичаї та правила етикету вже давно в пошані серед індійських придворних. Варто скористатися цими культурними зв’язками та запросити на службу найздібніших радників."
  hin_gunpowder_empire: "Порохова імперія"
  hin_gunpowder_empire_desc: "Завдяки вмінню користуватися в бою пороховою зброєю ми завоювали славу та обширні землі. Таке панування було б неможливим без організації внутрішнього виробництва вогнепальної зброї для наших військ."
  hin_sufism: "Заклик суфійських місіонерів"
  hin_sufism_desc: "Мусульманські правителі по всьому світу б’ються один з одним за найпросвіченіших вчителів суфізму. У міру зростання нашої слави до нас приєднується все більше таких суфіїв. Для них будуються поселення, часто в суворих регіонах, і місцеве населення переходить у нашу віру, натхненне мудрістю суфіїв."
  hin_administration_of_india: "Індійська адміністрація"
  hin_administration_of_india_desc: "Непросто керувати країною, яка розкинулася на цілий субконтинент. Нам потрібно придумати ефективну систему адміністрації у співпраці з місцевими царьками, щоб отримувати більше вигоди з наших земель."
  hin_indian_empire: "Індійська імперія"
  hin_indian_empire_desc: "Жоден правитель, будь він мусульманин, індуїст, буддист чи джайн, ніколи не завойовував Індію цілком. Ми станемо першими одноосібними правителями Індії!"
  hin_rocketry: "Розробка ракетної технології"
  hin_rocketry_desc: "Поки що чавунні ракети у військовій справі широко не застосовуються, але їхня вибухова потужність робить їх перспективною зброєю. Нам потрібно уважно вивчити цю технологію та випробувати її на полі битви."
  hin_industrialization: "Індустріалізація Індії"
  hin_industrialization_desc: "Умови в Індії ідеальні для швидкого зростання промисловості. Нові технології дозволять нам забезпечити хороші умови для внутрішнього виробництва, особливо в текстильній промисловості. Якщо ми приділимо особливу увагу новим методам, наша паніндійська країна зможе забезпечити стійке зростання для наших виробництв."
  cth_merchant_legacy: "Торгове спадщина"
  cth_merchant_legacy_desc: "Фінікійські торгові флотилії багато століть борознили хвилі Середземного моря. Ця спадщина дозволить синам Карфагена бути більш ефективними та цілеспрямованими, коли справа стосується торгівлі. Ми знову будемо правити торговими шляхами."
  cth_breadbasket_of_rome: "Житниця Риму"
  cth_breadbasket_of_rome_desc: "Багато століть тому наші досягнення в іригації та вирощуванні олив заробили для Карфагена звання «житниці Риму». Тепер ми відновимо стародавні знання та знову дамо бій пустелі, щоб вирощувати в ній оливи, як колись наші предки."
  cth_mercenary_army: "Військо найманців"
  cth_mercenary_army_desc: "Пунічна країна Карфаген не може похвалитися великим населенням, тож багато століть у наших війнах за нас билися найманці. З часів відродження Карфагена ми продовжили цю традицію берегти населення від небезпек війни."
  cth_cothons: "Котон"
  cth_cothons_desc: "Стародавній котон Карфагена був дивом техніки, яке дозволило країні ефективно будувати кораблі. Тепер же спадщина стародавнього світу послужить для нас кресленням для всієї нашої країни. Вивчення старих методів кораблебудування знову зробить нас справжніми майстрами в цьому ремеслі. Скоро карфагенський флот буде ходити по всьому Середземному морю."
  cth_phoenician_sailors: "Фінікійські моряки"
  cth_phoenician_sailors_desc: "Після відродження нашого стародавнього царства ми звернулися до старих фінікійських братів у Лівії. Тепер до нас стрімким потоком прагнуть добровольці, які хочуть взяти участь у відродженні стародавнього фінікійського царства Карфаген. Схоже, тепер ми зможемо утримувати куди більший флот."
  cth_legacy_of_hannon: "Спадщина Ганнона"
  cth_legacy_of_hannon_desc: "Мореплавець Ганнон був великим дослідником стародавнього світу, який ходив далеко на південь уздовж берегів Африки. Ми наслідуємо його приклад і знову почнемо дослідницькі плавання, щоб відродити велику торговельну імперію. Цього разу ми вирушимо ще далі, ми шукатимемо нові торговельні можливості по всьому світу."
  cth_beyond_the_pillars: "По той бік Стовпів"
  cth_beyond_the_pillars_desc: "Настав час розширити охоплення наших факторій за межі міфічних Геркулесових стовпів. Поєднання стародавніх знань і нових географічних відкриттів дозволить нам заселяти інші землі ефективніше, ніж інші молоді країни, які не мають подібного досвіду. Скоро карфагенські колонії можна буде зустріти по всьому світу."
  cth_wine_traders: "Пунічна торгівля вином"
  cth_wine_traders_desc: "У стародавні часи ми побудували систему торгівлі вином — виробляли багато поганого вина на продаж, а для себе закуповували якісні вина. Ми можемо масштабувати цю систему та розширити свої виноробні виробництва, щоб взяти торгівлю вином по всьому Середземномор'ю у свої руки."
  cth_punic_global_trade: "Пунічна світова торгівля"
  cth_punic_global_trade_desc: "Багато століть наша країна контролювала торгівлю в Середземномор'ї. Тепер, завдяки новим відкриттям, нам призначено взяти в руки торгівлю по всьому світу. Скоро в кожному порту моря розвантажуватимуться карфагенські судна."
  cth_sufet_rule: "Влада суффета"
  cth_sufet_rule_desc: "Колись нашу стародавню країну очолював виборний правитель під назвою суффет. Ми вивчимо досвід давнини та поєднаємо його з сучасними теоріями, а потім створимо на їх основі найефективнішу республіканську систему з усіх, що існували досі."
  network_of_cities: "Мережа міст"
  network_of_cities_desc: "Дороги, торгівля та спільні цілі пов'язують наші міста в єдине ціле, сприяючи зростанню могутності та впливу країни."
  status_by_merit: "Статус за заслуги"
  status_by_merit_desc: "Воїни та знать підносяться завдяки доблесті та вірній службі. Влада дається лише тим, хто заслуговує її по праву."
  expansion_merchant_guilds: "Експансія торговельних гільдій"
  expansion_merchant_guilds_desc: "Торговці-почтека возять свої товари далеко за межі наших кордонів, забезпечуючи багатство та процвітання всім ринкам, вірним Мексиці."
  centralized_city_governance: "Централізоване управління містами"
  centralized_city_governance_desc: "Для контролю над розрослими міськими територіями необхідна реформа управління. Влада має бути впорядкована під суворим наглядом надійної адміністрації."
  wealth_of_mesoamerica: "Багатства Мезоамерики"
  wealth_of_mesoamerica_desc: "Родючі землі, ліси та рудники Анауака приносять величезні доходи, забезпечуючи розвиток та розширення імперії. Ефективне використання цих багатств підвищить наш добробут."
  study_european_colonizers: "Знайомство з європейськими колонізаторами"
  study_european_colonizers_desc: "Ми зіткнулися з чужинцями, чиї незвичайні судна та зброя викликають у нашого народу благоговійний страх. Щоб вижити, нам необхідно зрозуміти, як вони влаштовані."
  new_fire_ceremonies: "Церемонії нового вогню"
  new_fire_ceremonies_desc: "Кожні п'ятдесят два роки світ оновлюється вогнем, який об'єднує людей у вірі та космічній рівновазі."
  sun_must_rise: "Сонце має зійти"
  sun_must_rise_desc: "Віра та обряди допомагають нам підтримувати сонце в його нескінченному шляху небосхилом, дарують заспокоєння серцям та зміцнюють дух народу. На нас покладено відповідальність за збереження рівноваги — а можливо, й усього світу."
  krs_kurdish_tribes: "Вірність племен"
  krs_kurdish_tribes_desc: "Усі курдські племена підкорилися нашій владі, і тепер ми зможемо закликати на захист країни їхніх досвідчених і загартованих у бою воїнів."
  krs_legacy_of_the_kurdish_dynasties: "Спадщина курдських династій"
  krs_legacy_of_the_kurdish_dynasties_desc: "Великі династії нашого народу правили обширними землями від Єгипту до Ірану. Слава правителів минулих часів, що лягла в основу нашої країни, не тільки змусить курдів дивитися на нас як на об'єднувачів, а й надасть нашій владі легітимності в очах ленників."
  krs_kurdish_quarters: "Процвітаючі курдські квартали"
  krs_kurdish_quarters_desc: "У роки, коли над нами панували чужоземці, наш народ нерідко селився в курдських міських кварталах, що процвітали навіть під владою правителів, далеких від своїх підданих. А сьогодні ці квартали стануть для нашої країни ключем до добробуту — їхнім багатством можна розпоряджатися безпосередньо."
  krs_kurdish_horses: "Гнучка кавалерія"
  krs_kurdish_horses_desc: "Наша земля споконвіку вабить до себе численних завойовників, що прагнуть підкорити народ, який на ній мешкає. І хоча місцевість тут така, що вороже військо не може її перетнути, не сповільнившись, у цієї монети є й зворотний бік: ми не можемо швидко відповідати на загрози. Тому нам потрібна сильна кавалерія, здатна дати стрімку відсіч ворогу."
  krs_kurdish_mercenaries: "Досвідчені найманці"
  krs_kurdish_mercenaries_desc: "Наші воїни часто пропонують свої послуги іноземним володарям, отримуючи не тільки дзвінку монету, а й безцінний бойовий досвід. Сьогодні ж, коли наш народ нарешті здобув власну країну, настав час закликати найманців під свої прапори."
  krs_kurdish_warrior_poets: "Воїни та поети"
  krs_kurdish_warrior_poets_desc: "Нашим правителям недостатньо лише вміло володіти зброєю: вони повинні бути обізнані в питаннях мистецтва та державного управління. Їм також варто самостійно вести записи, докладно описуючи кожен рік своєї влади, щоб ці безцінні знання не розчинилися в глибині віків, а перейшли нащадкам."
  mohe_ancestry: "Спадщина мохе"
  mohe_ancestry_desc: "Ми нащадки племен мохе, мисливців і скотарів, мешканців амурських лісів і суворого прикордоння. Усе наше суспільство ґрунтується на цих традиціях."
  warka_ties: "Зв'язки з варка"
  warka_ties_desc: "Завдяки узам, що пов'язують нас із народом варка, ми стали чудовими мисливцями та збирачами. Тепер навіть довга зима не загрожує нашому народу голодною смертю."
  shadow_of_ambition: "У тіні великих прагнень"
  shadow_of_ambition_desc: "Об'єднання чжурчженських племен — лише перший крок на шляху до впливу та влади. Незабаром наше ім'я вселятиме страх у серця ворогів і кидатиме в трепет народи всього континенту."
  niyamniyan: "Ніямніян"
  niyamniyan_desc: "Наш народ не боїться війни. В основі нашої культури та суспільства лежать п'ять благородних умінь: верхова їзда, стрільба з лука, командування військами, вірність і дисципліна."
  southern_campaigns: "Південні походи"
  southern_campaigns_desc: "$CHI$ — прославлена країна неймовірних багатств і справжнє джерело знань. Однак династія, що сидить на її престолі, занадто слабка, а тому, щоб не допустити остаточної розрухи, ми зобов'язані перехопити кермо влади та повернути цьому краю втрачений добробут."
  foreign_learning: "Чужоземні знання"
  foreign_learning_desc: "З оповідей та рукописів іноземних учених ми почерпнемо нові підходи до управління країною, військової справи та науки, тим самим прискоривши технічний розвиток країни."
  melaka_tree: "Амалака"
  melaka_tree_desc: "Згідно з легендою, наша країна зародилася в тіні дерева під назвою амалака, де боязке оленятко змогло знайти притулок. Саме там було засноване невелике рибальське село, з якого й виросла наша країна. Попри таке скромне походження, наш народ неодмінно досягне величі й визначатиме долю всього регіону."
  orang_laut: "Оранг-лаути"
  orang_laut_desc: "Задовго до виникнення нашої країни оранг-лаути борознили навколишні протоки, вміло підкоряючи собі силу вітру та хвиль. Наймаючи деяких представників цих племен на службу та вивчаючи їхні методи мореплавства, ми навчилися проводити торгові судна через вузькі протоки та захищати свої береги від піратів. Подібний контроль над прибережними водами дозволяє нам забезпечувати безпеку всіх кораблів, що прибувають до Малакки."
  congregation_of_merchants: "З'їзд купців"
  congregation_of_merchants_desc: "Від Аравії до берегів Південної Азії та Китаю — незліченні торговці з найрізноманітніших країн з'їжджаються до Малакки. Їх приваблюють наші безпечні води, справедливі закони та великі ринки. Завдяки такому притоку купців наша країна здобуде величезні багатства та прославиться як один із найважливіших торгових центрів у регіоні."
  connections_with_china: "Зв'язки з Китаєм"
  connections_with_china_desc: "Наші посли домоглися визнання нашої країни з боку найвпливовіших правителів Китаю. Тепер ми постійно обмінюємося з ними дарами та люб'язностями, за рахунок чого не лише піднімаємо свій престиж, але також отримуємо захист та певні привілеї в їхній великій торговій мережі."
  control_the_malacca_strait: "Контроль над Малаккською протокою"
  control_the_malacca_strait_desc: "Внутрішня Малаккська протока — основа всієї нашої морської торгівлі. Завдяки контролю над цією найважливішою вузькою протокою до наших гаваней безперервним потоком надходять іноземні багатства, а ми вважаємося основними власниками всієї торгівлі між Сходом і Заходом."
  shahbandar: "Посада шахбандара"
  shahbandar_desc: "Щоб упоратися з величезним потоком торговців, що прибувають до наших портів, ми призначимо шахбандара — це чиновник, який відповідає за збір мит, врегулювання суперечок та організацію слобід чужоземців. Він допоможе навести лад у жвавій портовій торгівлі та підніме наш статус країни, де перетинаються моря."
  settle_the_islands: "Заселення островів"
  settle_the_islands_desc: "У нашому рідному архіпелазі є багато островів, де ми раніше ніколи не бували. Позначивши там свою присутність, ми зможемо збільшити добробут народу — цьому допоможуть нові торгові факторії, нові родючі землі та нові поселення, пов'язані нерозривними узами морських шляхів."
  people_of_the_sea: "Народ моря"
  people_of_the_sea_desc: "Наш народ загартований вітрами та припливами. З дитячих років ми вивчаємо напрямок мусонів, ритм проток та поклик відкритого океану. Наші мореплавці користуються цими знаннями у своїх плаваннях, і тому їхня відвага та майстерність відомі всьому архіпелагу."
  expert_hagglers: "Вправні торговці"
  expert_hagglers_desc: "Де б не опинилися наші торговці — чи то береги Південної Азії, чи ринки далекого Китаю, — їх усюди поважають за гострий розум та влучне слово. Торгуються вони анітрохи не гірше, ніж керують кораблем, і завдяки їм ми завжди отримуємо перевагу в угодах."
  malay_merchants_in_every_port: "Малайські купці в кожному порту"
  malay_merchants_in_every_port_desc: "Наших торговців знають від ринків Аравії до гаваней Східної Азії. Завдяки їхнім зусиллям ми побудували велику партнерську мережу, що спрощує заснування заморських анклавів та зміцнює наш вплив у кожному великому порту світу."
  agreements_sea_nomads: "Угода з морськими кочівниками"
  agreements_sea_nomads_desc: "Самський народ та інші племена морських кочівників здавна живуть на воді, вміло переміщаючись від острова до острова. Якщо ми обміняємося з ними досвідом та укладемо договори про взаємну повагу та вигоду, то убезпечимо свої морські шляхи та зможемо швидко ремонтувати судна."
  masters_of_spice: "Монополія на прянощі"
  masters_of_spice_desc: "Торгівля гвоздикою приносить нашому народу величезний прибуток, адже жоден купець не може встояти перед цим товаром. Якщо ми заволодіємо землями, звідки надходять дорогоцінні прянощі, та убезпечимо навколишні моря, то займемо центральне місце у світовій торгівлі."
  sko_fulani_expansion: "Експансія Сокото"
  sko_fulani_expansion_desc: "Занадто довго народи Західної Африки терпіли правителів, які хоч і називали себе праведними, але на ділі потурали синкретизму. Досить! Наш стяг завжди майорітиме вище за прапори мирських володарів!"
  sko_recruit_the_faithful: "Набір гідних"
  sko_recruit_the_faithful_desc: "Ми приймемо кожного, хто захоче служити нашим праведним вождям, — незалежно від його походження."
  sko_education_for_all: "Вчені мудреці"
  sko_education_for_all_desc: "Поширення наук та підвищення грамотності наших чоловіків і жінок допомагають суспільству розвиватися та зміцнюють нашу владу над країною. У цій справі правляча родина має особливу роль, адже вона повинна слугувати прикладом для підданих."
  sko_religious_court: "Благочестивий двір"
  sko_religious_court_desc: "Замість того, щоб виставляти напоказ пишні атрибути мирської слави, наш двір повинен зосередитися на справах духовних. Запросивши вчених релігійних діячів викладати в навчальних закладах столиці, ми доведемо свою щиру прихильність вірі."
  sko_recruit_fulani_generals: "Набір фульбських офіцерів"
  sko_recruit_fulani_generals_desc: "Народ фульбе — прославлені воїни, їхні вожді служать офіцерами в багатьох країнах Західної Африки. Нам слід надовго наймати їхніх найздібніших воєначальників."
  sko_one_people_in_faith: "Єдність у вірі"
  sko_one_people_in_faith_desc: "На наших землях живе безліч племен, які говорять різними мовами. Настав час підкреслити об'єднуючу силу нашої віри, здатної зібрати такі різні народи під одним прапором."
  ita_birthplace_of_the_renaissance: "Продовження Ренесансу"
  ita_birthplace_of_the_renaissance_desc: "Італія стала місцем тяжіння для багатьох видатних умів. Багато художників з далеких країн прибувають сюди в надії прославитися, від них не відстають і наші власні громадяни, які поспішають зіграти свою роль у великому відродженні мистецтв. Надавши покровительство обдарованим людям, ми продовжимо приплив цих талановитих особистостей до нашої країни."
  ita_connect_the_interior: "Зв'язок між берегами"
  ita_connect_the_interior_desc: "Через особливості нашого ландшафту ті шляхи, що лежать уздовж італійського узбережжя, значно зручніші за маршрути, що проходять через внутрішні області півострова. Зв'язавши важкодоступні регіони новими дорогами, які з'єднають західне узбережжя зі східним, ми зможемо сильно полегшити перевезення товарів та прискорити переміщення військ."
  ita_increased_recruitment: "Безцінний приз"
  ita_increased_recruitment_desc: "Італія залишається ласою здобиччю для багатьох чужоземних володарів, і якщо ми хочемо захистити нашу країну, то нам необхідно збільшити набір рекрутів до наземних та військово-морських сил. Півострів залишається вразливим для вторгнень як через альпійські перевали, так і в будь-якій точці нашої протяжної берегової лінії, а тому військо та флот повинні бути готові зустріти будь-яких загарбників, що посягають на мир та спокій Італії."
  ita_influence_over_the_clergy: "Впливове священство"
  ita_influence_over_the_clergy_desc: "Завдяки близькості до Святого Престолу Італія ніколи не відчувала нестачі у видатних та здібних священнослужителях. Куди б не привели нас дискусії з питань віри, варто й надалі зберігати добрі стосунки з духовенством."
  ita_enduring_hardship: "Тяготи війни"
  ita_enduring_hardship_desc: "Через інтереси іноземних країн Італія не раз ставала полем битви інших, більш могутніх країн. Уберегти населення від тягот війни — завдання не з легких. Надійні укриття, де люди зможуть врятуватися під час бойових дій, забезпечать їхню відданість навіть у найважчі часи."
  ita_flourishing_urban_centers: "Квітучі міста"
  ita_flourishing_urban_centers_desc: "У нас багато великих та розвинених міст. Висока щільність населення дозволяє нам організувати масове виробництво товарів, а торговельні зв'язки між містами дозволяють налагодити прибутковий збут нашої продукції за кордоном. Усунувши все, що заважає розвитку цих галузей, ми забезпечимо їм зростання та процвітання."
  ita_attractive_migration: "Прекрасна країна"
  ita_attractive_migration_desc: "Завдяки родючим землям та м'якому клімату наш півострів приваблює безліч жителів сусідніх країн, які прагнуть кращого життя. Вже зараз економіка наших міст багато в чому залежить від притоку сезонних робітників, однак нам слід зробити наступний крок і домогтися їхнього переселення на наші землі назавжди."
  kol_peace_in_the_city: "Мирне місто"
  kol_peace_in_the_city_desc: "Ще не так давно наше місто було на межі загибелі: його роздирала на частини боротьба між містянами та священниками. Не можна допустити, щоб це протистояння повторилося; всі без винятку придворні та члени міської ради зобов'язані разом трудитися на благо перлини Рейну — міста Кельна."
  kol_school_of_painting: "Кельнська школа живопису"
  kol_school_of_painting_desc: "У нашому місті живе чимало вправних художників та ремісників — справжніх майстрів, здатних створювати шедеври з дерева та каменю, а особливо зі скла. Під покровительством гільдії творців — і з нашою фінансовою допомогою — вони зможуть досягти нових висот у своїй справі, а заодно ще більше прославити наші краї."
  tri_balance_the_landstande: "Врегулювання станових розбіжностей"
  tri_balance_the_landstande_desc: "Крім великих міст, на нашій землі є безліч замків та маєтків, що належать імперським лицарям. Часто інтереси жителів цих районів сильно різняться, тому догодити всім непросто. Уряд зможе працювати стабільно лише в тому випадку, якщо всі сторони співпрацюватимуть з владою та кафедральним капітулом."
  hes_form_the_militia_army: "Професійне військо"
  hes_form_the_militia_army_desc: "Щоб протистояти зовнішнім загрозам, сусідні князі нерідко розміщують у наших володіннях свої війська — цьому сприяє винятково вигідне розташування наших земель. Однак утримувати чужих солдатів стає тяготою, тому нам потрібно створити власне військо, яке також служитиме на благо імперії."
  noble_society_baden_palatine: "Товариство осла"
  noble_society_baden_palatine_desc: "В околицях Гейдельберга виникло #italic Товариство осла#!, яке об'єднує тих, хто захищає інтереси імперських лицарів. Його учасники мають великий досвід у керівництві, і при цьому вони досить багаті, щоб влаштовувати лицарські турніри. Завдяки їм наш культурний вплив безсумнівно зміцниться."
  noble_society_nassau: "Товариство лева"
  noble_society_nassau_desc: "#italic Товариство лева#!, засноване незабаром після Великого західного розколу, покликане захищати наші землі від повстань єретиків. Надавши цій організації покровительство та запросивши її учасників до свого двору, ми зможемо з більшою впевненістю відстоювати та просувати наші спільні інтереси."
  noble_society_mainz: "Товариство палиці"
  noble_society_mainz_desc: "Кілька лицарів, стурбованих занепадом нашого впливу на землях Священної Римської Імперії, заснували #italic Товариство палиці#! (Klüppelgesellschaft). Ці люди готові боротися за те, щоб ми зберегли своє становище, а тому розумно буде підтримати їх фінансами."
  noble_society_franconia: "Товариство броші"
  noble_society_franconia_desc: "У наших краях діє #italic Товариство броші#! (Gesellschaft mit dem Fürspang) — цей лицарський орден відстоює інтереси своїх учасників і допомагає кожному, хто готовий його утримувати. Якщо ми виділимо значні кошти на підтримку цього товариства, наш політичний вплив у регіоні — і всій Священній Римській Імперії — значно зросте."
  noble_society_tyrol: "Товариство слона"
  noble_society_tyrol_desc: "На наші землі можуть у будь-який момент вторгнутися ворожі сусіди, які прагнуть заволодіти багатствами місцевих долин. Щоб нам було чим відповісти на таке вторгнення, розумно буде створити та підтримати грошима лицарський орден, готовий захищати наші володіння."
  noble_society_cologne: "Орден Святого Губерта"
  noble_society_cologne_desc: "Тих лицарів, хто відзначився в бою, вірою і правдою служачи вітчизні, ми будемо нагороджувати #italic орденом Святого Губерта#! (Hubertusorden). Його кавалери всюди будуть оточені ореолом слави."
