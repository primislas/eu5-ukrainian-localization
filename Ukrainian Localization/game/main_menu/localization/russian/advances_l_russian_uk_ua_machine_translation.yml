  power_projection_advance_6: "Прагнення світового масштабу"
  power_projection_advance_6_desc: "З кількох країн, що злилися воєдино, утворилися великі держави, які користуються величезною владою на своїх континентах. Однак цього їм замало: свій вплив вони хочуть поширити ще далі."
  enlightened_court: "Просвічений двір"
  enlightened_court_desc: "Кожен сучасний двір сьогодні побудований на принципах епохи Відродження, які, як відомо, виховують виключно просвічених та освічених людей. Завдяки цьому ми здатні досягти більшого, докладаючи менше зусиль."
  government_size_revolutions: "Сучасне представництво"
  government_size_revolutions_desc: "Завдяки появі нових різновидів народного представництва сучасна влада може вирішувати ще більше питань."
  global_supply_limit_modifier_advance_6: "Планування постачання у воєнних походах"
  global_supply_limit_modifier_advance_6_desc: "Постачати сучасні війська стає дедалі складніше: їхня чисельність така велика, що в довгих походах сьогодні можуть брати участь одразу кілька військ із сотень тисяч солдатів."
  rgo_size_advance_revolutions: "Паровий двигун"
  rgo_size_advance_revolutions_desc: "Сила пари, що приводить у рух механізми, була відома ще в давнину, проте повністю розкрити її потенціал вдалося лише нещодавно: нові відкриття в галузі фізики та математики призвели до створення парових двигунів, без яких неможлива була б робота складних агрегатів. Продуктивність праці значно зросла в усіх галузях."
  military_tactics_advance_6: "Польова артилерія"
  military_tactics_advance_6_desc: "Відтоді як артилерійські частини набули рухливості, область роботи артилерії перестала бути обмеженою незмінною дальністю стрільби. Тепер на окремі ділянки фронту можна перекидати частково незалежні батареї під командуванням офіцерів-артилеристів."
  road_advance_2: "Прості дороги"
  road_advance_2_desc: "Старих примітивних доріг більше не вистачає. Транспортна система значно застаріла. Побудувавши нові дороги, ми зможемо розширити товарообіг у межах країни."
  written_alphabet: "Абетка"
  written_alphabet_desc: "Народ — це насамперед сукупність культурних надбань. Винахід абетки — лише перший крок на шляху до безсмертя, а заодно — до загальної освіти."
  codified_laws: "Офіційні зводи законів"
  codified_laws_desc: "Уложення та постанови життєво необхідні для побудови повноцінного суспільства. Щоб країна діяла ефективно та була здатна на більше, нам потрібні письмові зводи законів."
  taxation_advance: "Оподаткування"
  taxation_advance_desc: "Життя в цивілізованому суспільстві передбачає витрати на утримання центральної влади. Кошти на ці витрати, без яких неможлива робота уряду, ми стягуватимемо з ленників та громадян у вигляді податків."
  state_administration_advance: "Державний апарат"
  state_administration_advance_desc: "Оподаткування має сенс лише в тому випадку, якщо ми знаємо, хто де живе, яких законів та звичаїв дотримується. Нам необхідна повноцінна система управління країною."
  agriculture_advance: "Сільське господарство"
  agriculture_advance_desc: "Земля — найбільше джерело багатства. Вона може бути рясною та родючою. Нагодувати народ, домогтися достатку та розквіту суспільства зможе лише той, хто вміє правильно поводитися із землею."
  city_building_advance: "Міське будівництво"
  city_building_advance_desc: "Основна мета розвитку міст зосереджена на центральних районах та широкій забудові їх вигадливими будівлями."
  road_building: "Будівництво доріг"
  road_building_desc: "Країна, нездатна переміщати товари, війська та людей, приречена на загибель. Навіть найпримітивніша дорожня мережа допоможе з'єднати між собою поселення — це помітно полегшить життя простому народу."
  ship_building_advance: "Кораблебудування"
  ship_building_advance_desc: "Море обіцяє нам пригоди та незліченні багатства… а також можливість встановити нові торговельні відносини та розширити кордони країни."
  mapmaking: "Складання карт"
  mapmaking_desc: "Нанесення місцевості або цілої країни на папір чи пергамент — це складне мистецтво, пов'язане зі збором стратегічно важливих відомостей. Точне знання, де розташоване те чи інше місце, не тільки допомагає нам планувати напади, а й дає розуміння, як влаштована наша власна країна. Як кажуть, знання — сила."
  standardized_coins: "Стандартизація монет"
  standardized_coins_desc: "Чим багатшою стає країна, тим більше в ній з'являється монетних дворів. Наш народ звик до різноманіття валют, проте з підробкою монет, наприклад використанням меншої кількості благородних металів або спилюванням граней, необхідно боротися. Для цього ми запровадимо нові стандарти."
  humanism_ideas: "Гуманізм"
  humanism_ideas_desc: "Ставлячи людину понад усе, ми визнаємо за собою зобов'язання постійно прагнути невідомого та розгадувати таємниці, що нас оточують, користуючись своїм найбільшим даром — розумом. Тільки освічена людина по-справжньому вільна — вона має свободу волі та самостійно приймає рішення. Користуючись мудрістю древніх як опорою, ми розвиватимемо людський дух і вчитися не тільки на помилках, а й на успіхах."
  legalism_advance: "Легалізм"
  legalism_advance_desc: "Правила та закони самі по собі марні. Їх слід звести воєдино, стандартизувати, а головне — зробити зрозумілими кожному. І якщо такі закони дотримуватимуться беззаперечно, в нашій країні запанують свобода та справедливість."
  meritocracy_advance: "Меритократія"
  meritocracy_advance_desc: "Навіть найскромніший і непримітний трудівник іноді може проявити небувалі здібності — для цього не обов'язково входити до вищих верств суспільства. Виявляти наявність таких здібностей, працьовитості та знань загалом ми будемо за допомогою єдиних іспитів. Вони допоможуть найдостойнішим проявити себе, що піде лише на користь народу."
  cathedral_advance: "Кафедральний собор"
  cathedral_advance_desc: "Кафедральний собор — це найважливіший християнський храм. Тут знаходиться кафедра, на якій сидить єпископ. Навіть найкрасивіша церква навряд чи може змагатися з величчю неймовірно величезних, багато прикрашених кафедральних соборів."
  infiltrate_administration: "[Concept('infiltrate_administration', 'Впровадження у владу')|e]"
  supportrebels: "[Concept('support_rebels', 'Підтримка заколотників')|e]"
  infiltrate_administration_advance: "Впровадження у владу"
  infiltrate_administration_advance_desc: "Результат міжнародних конфліктів вирішується не лише на полі бою, а й за лаштунками. Знання планів супротивника допомагає вигравати війни. Ми повинні впровадити своїх агентів в адміністрацію інших країн, щоб вони передавали нам дорогоцінну інформацію."
  newspapers_advance: "Газети"
  newspapers_advance_desc: "Ідея публікувати оголошення на табличках і сувоях не нова, проте попит на політичну, військову та економічну інформацію постійно зростає. $printing_press$ робить її набагато доступнішою. Регулярно випускаючи друковані аркуші з оглядом поточних подій, ми задовольнимо потребу населення в новинах."
  feudal_de_jure_law_advance: "$feudal_de_jure_law$"
  feudal_de_jure_law_advance_desc: "Терміном #italic «де-юре»#! прийнято називати юридично визнані правила незалежно від їх відповідності реальному стану справ. На цьому принципі було засноване все феодальне суспільство."
  semi_salic_law_advance: "$semi_salic_law$"
  semi_salic_law_advance_desc: "$salic_law$ говорить, що успадковувати трон можуть тільки чоловіки. Якщо у монарха не виявиться синів, така практика може призвести до кризи престолонаслідування. Щоб уникнути її, право успадкування слід поширити і на жінок — зрозуміло, за відсутності відповідних претендентів чоловічої статі."
  republican_foundation_law_advance: "$republican_foundation_law$"
  republican_foundation_law_advance_desc: "$republican_foundation_law_desc$"
  republican_election_law_advance: "$republican_election_law$"
  republican_election_law_advance_desc: "$republican_election_law_desc$"
  republican_electorate_law_advance: "$republican_electorate_law$"
  republican_electorate_law_advance_desc: "$republican_electorate_law_desc$"
  republican_power_law_advance: "$republican_power_law$"
  republican_power_law_advance_desc: "$republican_power_law_desc$"
  principle_of_administration_law_advance: "Закон про принцип управління"
  principle_of_administration_law_advance_desc: "Природний розвиток та ускладнення нашої державної машини вимагає прийняття нових законів, що регулюють роботу адміністрації."
  monarchy_reform_traditions_advance: "Традиції монархічних принципів"
  monarchy_reform_traditions_advance_desc: "Владу не можна довіряти будь-кому. Концентруючи вплив у руках правителя, ми гарантуємо порядок і стабільність на всій території, яка підконтрольна короні."
  republic_reform_traditions_advance: "Традиції республіканських принципів"
  republic_reform_traditions_advance_desc: "Розподіл влади є основою існування здорової республіки. Створення докладного зводу законів, що регулює вибори, дозволить нам підвищити стабільність та приборкати корупцію."
  blockade_tactics: "Тактика блокади"
  blockade_tactics_desc: "Застосовуючи певні бойові порядки та організовуючи морські патрулі в районі ворожих портів, ми ефективніше перекриємо постачання супротивника та скоротимо тривалість облог."
  recovery_efforts: "Повоєнне відновлення"
  recovery_efforts_desc: "Війна — жорстока пані, що завдає незліченних бід і руйнувань. Зосередивши зусилля на допомозі нашому народу, ми прискоримо відновлення країни."
  naval_initiative_ren: "Тактика розгортання"
  naval_initiative_ren_desc: "Відомо, що перехоплення ініціативи та швидка мобілізація є першими кроками до перемоги. Вивчення та впровадження тактики розгортання дозволять нам досягти поступу в цій галузі."
  army_initiative_ren: "Випереджувальний удар"
  army_initiative_ren_desc: "Поєднання елемента несподіванки та ударів на випередження практично завжди приносить перемогу. Впровадження ініціативи у війську — чудовий спосіб зберегти перевагу перед супротивниками."
  law_making_renaissance: "Перегляд законів"
  law_making_renaissance_desc: "Часи змінюються. Закони, за якими жили покоління наших предків, не завжди застосовні в сучасному житті. Щоб не відстати від поступу, слід постійно переглядати та адаптувати законодавство."
  subject_integration: "Консолідація титулів"
  subject_integration_desc: "Нашим інтересам служать багато формально незалежних країн, але, щоб повною мірою користуватися їхніми землями та ресурсами, треба зібрати їх під однією короною. Зрештою, кількість титулів підвищує статус монарха."
  rgo_construction_ren: "Розвиток інфраструктури"
  rgo_construction_ren_desc: "Земля і люди — це плоть і кров нашої країни. Зусилля, вкладені нами в розвиток інфраструктури та поліпшення життя простих людей, окупляться десятикратно."
  naval_repair_ren: "Щільне припасування обшивки"
  naval_repair_ren_desc: "Усім відомо, що дірки в корпусі судна призводять до його затоплення. Нові технології кораблебудування дозволяють щільніше припасовувати дошки обшивки одна до одної, що знижує ймовірність протікання та полегшує лагодження дірок при пошкодженні корпусу."
  linked_armies_advance: "Кур'єрська служба"
  linked_armies_advance_desc: "Координація дій між підрозділами необхідна для належного функціонування війська. Організувавши надійну систему передачі повідомлень між полководцями та командирами довірених їм загонів, ми підвищимо згуртованість військ та прискоримо їхню реакцію на зміну обстановки."
  regular_levy_training: "Інструктори ополчення"
  regular_levy_training_desc: "Ополчення за своєю суттю підготовлене гірше за професійних військових, але це не означає, що нам слід посилати на війну ненавчений набрід. Призначивши інструкторів з найдосвідченіших загонів та виділивши час на обов'язкове навчання, ми перетворимо вчорашніх селян на справжніх воїнів."
  court_accounting: "Придворна бухгалтерія"
  court_accounting_desc: "Двір монарха — це обличчя країни; його багатство символізує процвітання всієї країни. Але це зовсім не означає, що витрати на його утримання можуть перевищувати можливості скарбниці. Нам слід запровадити суворий облік усіх придворних витрат."
  lead_ore_dressing: "Збагачення свинцевих руд"
  lead_ore_dressing_desc: "У процесі збагачення свинцева руда подрібнюється та промивається від глини, каміння та іншої пустої породи."
  bole_smelting: "Плавка на пагорбах"
  bole_smelting_desc: "Технологія виплавки свинцю на відкритому повітрі дозволяє задіяти сильний вітер, що постійно дме на вершинах пагорбів."
  cupola_smelting: "Плавка у вагранці"
  cupola_smelting_desc: "Технологія виплавки заліза в печі циліндричної форми не тільки здешевлює та спрощує процес, а й дозволяє зробити його безперервним."
  faster_levy_recruitment: "Обов'язкові тренування зі зброєю"
  faster_levy_recruitment_desc: "Кожен селянин чоловічої статі зобов'язаний регулярно вправлятися у володінні списом або луком, щоб не бути тягарем після призову до ополчення."
  merchant_power_from_maritime_discovery_advance: "Купецькі гільдії"
  merchant_power_from_maritime_discovery_advance_desc: "Об'єднання в гільдії дозволить нашим купцям організовувати свою діяльність, обмінюватися відомостями про вигідні торгові шляхи та підтримувати один одного при торгівлі на закордонних ринках."
  merchant_power_from_maritime_reformation_advance: "Торгові компанії"
  merchant_power_from_maritime_reformation_advance_desc: "Зростання ризиків та витрат, пов'язаних із торгівлею на заморських територіях, вимагає створення купецьких асоціацій, що дозволяють розділити цей тягар."
  merchant_power_from_maritime_absolutism_advance: "Торгова палата"
  merchant_power_from_maritime_absolutism_advance_desc: "З поширенням нових ідей у комерції та економіці місцеві підприємці почали об'єднуватися в ділові мережі для захисту своїх прав та інтересів від політичних структур та іноземного впливу."
  paper_guild_fiber_pulp_maintenance_advance: "$paper_guild_fiber_pulp_maintenance$"
  paper_guild_fiber_pulp_maintenance_advance_desc: "Використання таких рослинних матеріалів, як конопля та шовковиця, зробило папір доступним у всьому світі, проте разом із ціною знизилася і його якість."
  paper_guild_cloth_maintenance_advance: "$paper_guild_cloth_maintenance$"
  paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, виготовлена з відходів бавовни або старого текстилю, задає нові стандарти якості та міцності."
  paper_guild_wood_pulp_maintenance_advance: "$paper_guild_wood_pulp_maintenance$"
  paper_guild_wood_pulp_maintenance_advance_desc: "Використання широко поширеної хвойної деревини дозволить ще більше спростити та здешевити виробництво паперу."
  cannon_guild_steel_maintenance_advance: "Сталеві гарматні стволи"
  cannon_guild_steel_maintenance_advance_desc: "Гармати зі сталевими стволами дозволять нашій артилерії бити далі й точніше, не обмежуючи її мобільність."
  firearms_guild_steel_maintenance_advance: "Сталеві рушничні стволи"
  firearms_guild_steel_maintenance_advance_desc: "Використання сталі у виробництві вогнепальної зброї дозволить нам випускати більше надійних рушниць."
  grant_privilege_cost_modifier_renaissance_advance: "Станові привілеї та обов'язки"
  grant_privilege_cost_modifier_renaissance_advance_desc: "Кодифікація ролі кожного стану в повсякденному житті країни дозволить надавати нові привілеї, не викликаючи конфліктів між станами."
  war_no_cb_cost_modifier_renaissance_advance: "Постійна війна"
  war_no_cb_cost_modifier_renaissance_advance_desc: "Війна змінюється разом з її учасниками. Зростаючі можливості країн дозволяють їм довше вести бойові дії, через що збройні конфлікти між країнами стають все більшою буденністю."
  global_nobles_max_literacy_advance: "Література для дворян"
  global_nobles_max_literacy_advance_desc: "У міру того як дворяни перетворюються з доблесних воїнів на куртуазних придворних, у їхньому середовищі все більше поширюється грамотність. В результаті виник попит на літературу, привабливу для дворянського стану."
  global_burghers_max_literacy_advance: "Література для містян"
  global_burghers_max_literacy_advance_desc: "Містяни заробляють на життя своїми здібностями та вміннями, тому серед них чимало освічених людей. Зростання добробуту цього стану, викликане розвитком економіки, призвело до збільшення попиту на літературні праці, що розширюють писемну культуру містян."
  global_clergy_max_literacy_advance: "Література для духовенства"
  global_clergy_max_literacy_advance_desc: "Представники духовенства, зайняті вивченням, тлумаченням та поширенням своєї доктрини, за родом діяльності зобов'язані бути грамотними. Література, особливо релігійна, відіграє в житті цього стану величезну роль."
  land_morale_recovery_renaissance_advance: "Організовані марші"
  land_morale_recovery_renaissance_advance_desc: "З переходом від ополчення до професійних підрозділів структура військ суттєво ускладнилася. Приділивши увагу організації маршів, ми підвищимо готовність військових загонів, які здійснюють передислокацію, до раптових ударів противника."
  merchant_power_from_maritime_renaissance_advance: "Торгові партнерства"
  merchant_power_from_maritime_renaissance_advance_desc: "Розвиток міжнародної торгівлі змусив купців шукати нові форми взаємовигідного партнерства. Найчастіше один із партнерів фінансує торговельну експедицію, а інший особисто вирушає в неї, ризикуючи життям у пошуках заморських товарів."
  merchant_power_from_maritime_revolutions_advance: "Компанії з обмеженою відповідальністю"
  merchant_power_from_maritime_revolutions_advance_desc: "Регулярні невдачі торгових компаній призвели до виникнення підприємств нового типу, в яких відповідальність дольщиків обмежується фіксованою сумою. Це знизило ризики всіх учасників і зробило такі компанії привабливішими."
  send_people_to_colonial_charter_advance: "Рясні нові землі"
  send_people_to_colonial_charter_advance_desc: "Нові землі сповнені можливостей та ресурсів. Заохочуючи переселення підданих до наших нових володінь, ми суттєво спростимо освоєння цих територій."
  send_people_to_the_colonies_advance: "Перспективні нові землі"
  send_people_to_the_colonies_advance_desc: "Новий світ, що відкрився перед нами, розбурхує уяву багатьох потенційних колоністів. Нам слід підтримувати та розвивати подібні ідеї, щоб наші піддані охочіше переселялися на нові території."
  study_institutions_advance: "Обмін знаннями"
  study_institutions_advance_desc: "Не соромно, якщо хтось знає більше за нас, — соромно не прагнути нових знань. Активно вивчаючи чужі відкриття, ми зможемо більше дізнатися про навколишній світ."
  reduce_inflations_advance: "Суворе монетарне регулювання"
  reduce_inflations_advance_desc: "Невігласи вважають, що при нестачі грошей треба просто випустити ще, але насправді це тільки посилює проблеми. Суворий контроль над карбуванням монет дозволить зупинити і навіть знизити інфляцію."
  pop_promote_actions_advance: "Соціальна драбина"
  pop_promote_actions_advance_desc: "Кажуть, що хаос — це драбина, по якій людина може піднятися у вищі верстви суспільства. Однак у нашій країні такою драбиною служить зовсім не хаос, а порядок. Ми регламентуємо способи, за допомогою яких люди можуть покращити своє соціальне становище, і навіть сприяємо їм."
  alleviate_concerns_advance: "Запобігання конфліктам"
  alleviate_concerns_advance_desc: "Жодна країна не зможе процвітати, якщо всі сусіди напружено стежать за кожним її кроком. Нашим дипломатам слід цілеспрямовано розвіювати підозри та згладжувати будь-які можливі конфлікти."
  counter_espionage_action_advance: "Контроль доступу до інформації"
  counter_espionage_action_advance_desc: "Дипломатичні та військові успіхи неможливі, якщо наші секрети та відомості, обговорювані у вузькому колі, з легкістю стають відомі в інших країнах. Нам слід контролювати поширення інформації та запобігати витокам."
  pacify_population_advance: "Боротьба з підбурювачами"
  pacify_population_advance_desc: "Серед підданих завжди знайдуться незадоволені, але якщо ми не будемо залишати їх без уваги, вони не зможуть завдати нам суттєвої шкоди. Своєчасно виявляючи тих, хто агітує народ проти влади, ми не дамо їм зібрати достатньо послідовників і припинимо заворушення в зародку."
  nation_state_advance: "Національна країна"
  nation_state_advance_desc: "Об'єднати всіх представників культури під одним прапором — чудова ідея. Якщо ми приділимо достатньо часу розвитку національної самосвідомості, громадяни та ленники будуть цілком нам віддані."
  LIV_a_order_knights: "Лицарі Лівонського ордену"
  LIV_a_order_knights_desc: "Наша країна тримається на могутніх плечах безстрашних християн, що вступили до лицарського ордену. Їх набагато менше, ніж навколишніх язичників, проте їхня військова доблесть з лишком відшкодовує це."
  LIV_a_order_knights_2: "Баннерети Лівонського ордену"
  LIV_a_order_knights_2_desc: "Лицарі нашого ордену знову і знову доводили свою доблесть та майстерність у бою. Зводячи найбільш здібних з них у баннерети, ми гарантуємо, що на чолі наших військ завжди стоятимуть найкращі з найкращих."
  wallachian_tradition: "Країна-фортеця"
  wallachian_tradition_desc: "Наші землі являють собою відкриту родючу рівнину, оточену горами та водами Дунаю. Подолавши ці природні бар'єри, вороже військо зможе безперешкодно продовжити наступ, тому нам слід побудувати всюди фортеці та замки для захисту своїх підданих."
  wallachian_heritage: "Історія спротиву"
  wallachian_heritage_desc: "Побувавши під владою кількох імперій, наш народ звик боротися із загарбниками. Ворог, що посмів вторгнутися в наші володіння, заплатить за це кров'ю."
  khedivates: "Хедивати"
  khedivates_desc: "Кожна велика імперія складається з метрополії та не надто надійної периферії. Щоб наші ленники не вийшли з-під контролю, треба постійно за ними стежити."
  french_tradition: "Французький двір"
  french_tradition_desc: "Наша дипломатія, відома своєю вишуканістю та витонченістю, стала зразком для багатьох інших країн. Нерозумно було б зупинитися на досягнутому та припинити її вдосконалення."
  french_heritage: "Лицарські дворяни"
  french_heritage_desc: "Вихідці зі знаті завжди були опорою нашої війська. Ці чудово навчені воїни готові розтрощити будь-якого ворога на славу нашої країни."
  french_ambition: "Велике військо"
  french_ambition_desc: "Дивлячись на війська наших ворогів, ми все ясніше бачимо необхідність власної військової реформи. Впровадження нових методів підготовки дозволить нашим хоробрим героям залишатися переможцями."
  english_tradition: "Левині серця"
  english_tradition_desc: "Англійські воїни вже не раз виявляли небачену відвагу та дисципліну на полях битв від Нортумбрії до Франції. Об'єднуючи в собі хоробрість королів і стійкість простого народу, наші піхотинці б'ються так само люто, як і їхні англосаксонські предки."
  english_heritage: "Наш острівний дім"
  english_heritage_desc: "Перебуваючи на острові, ми захищені від сухопутного вторгнення, але повинні постійно стежити за морем. Лише добившись повного контролю над навколишніми водами, ми зможемо гарантувати, що ворог не ступить на нашу землю."
  english_ambition: "Повелителі хвиль"
  english_ambition_desc: "Будь-якій країні, що бажає правити морями, насамперед потрібен могутній флот. Важливо, щоб ворожі береги завжди були оточені нашими кораблями."
  omani_tradition: "Оманська затока"
  omani_tradition_desc: "Наша країна відрізана від решти світу безкрайніми та непрохідними аравійськими пустелями, але їх можна обійти морем, яке розкинулося на сході. Саме море, а не суша, стане основою нашої дипломатії, торгівлі та експансії."
  omani_heritage: "Контроль над затокою"
  omani_heritage_desc: "Наші судна ходять по всіх морях, але, щоб ці подорожі залишалися можливими, ми повинні контролювати власну затоку, захищаючи її від будь-яких чужоземних загроз."
  omani_ambition: "Непрохідні піски"
  omani_ambition_desc: "Наша земля не є островом, але відрізана від решти Аравії непрохідними пустелями. Ми розуміємо, наскільки для нас важливо ходити в море самим і позбавити такої можливості своїх ворогів."
  breton_tradition: "$breton$ський півострів"
  breton_tradition_desc: "Значну частину наших володінь становить узбережжя, на якому кипить життя з тих пір, як наші предки припливли сюди з Британії. Наш народ живе морем і заради моря, а наші порти завжди повні торгових і рибальських суден."
  house_of_parliament_advance: "$house_of_parliament$"
  house_of_parliament_advance_desc: "$house_of_parliament_desc$"
  lacquerware_guild_advance: "$lacquerware_guild$"
  lacquerware_guild_advance_desc: "$lacquerware_guild_desc$"
  bur_between_two_realms: "Між двох вогнів"
  bur_between_two_realms_desc: "Наша країна займає землі, що історично перебувають під впливом Франції та Священної Римської імперії. Це дещо ускладнює феодальні відносини, але натомість робить нас вправними дипломатами, здатними вирішувати будь-які розбіжності на свою користь."
  bur_knightly_prowess: "Лицарська доблесть"
  bur_knightly_prowess_desc: "Ми займаємо досить високе становище у феодальній системі Франції, тому наші війська повинні відповідати бургундському духу та звичаям."
  bur_rich_soil_of_burgundy: "Розвиток сільського господарства"
  bur_rich_soil_of_burgundy_desc: "Землі Бургундії чудово підходять для скотарства та землеробства, зокрема — для вирощування винограду. Доклавши трохи зусиль, ми зможемо швидко організувати тут розвинене сільське господарство."
  mos_skilled_tax_collectors: "Збирачі данини"
  mos_skilled_tax_collectors_desc: "Бувши багато років збирачами данини для Золотої Орди, ми придумали, як залишати частину зібраних грошей собі, не викликаючи підозр."
  mos_dynastic_ties: "Правління через династичні зв'язки"
  mos_dynastic_ties_desc: "Руські землі довго перебувають під управлінням однієї династії. Використаймо свої родинні зв'язки та становище, щоб нарешті здобути владу."
  mos_patrol_the_territories: "Організоване ополчення"
  mos_patrol_the_territories_desc: "Керувати величезними просторами Русі непросто. Нам потрібно створити місцеві центри для набору воїнів до ополчення."
  russian_integration: "Руські традиції"
  russian_integration_desc: "На руських землях проживає безліч народів, кожен зі своєю культурою, мовою та звичаями. Щоб об'єднати людей, потрібно просувати ідею нашої спільної історії. Тільки так ми створимо між народами нерозривний зв'язок."
  russian_resiliance: "Руські методи набору"
  russian_resiliance_desc: "Навали монголів виховали в русичів стійке неприйняття іноземного впливу. Спираючись на цю ідею, можна помітно збільшити розмір військ."
  land_of_the_rus: "Руська земля"
  land_of_the_rus_desc: "Усі руські правителі так чи інакше прагнуть до об'єднання Русі. Найбільш амбітні з них цілком можуть використати цей привід, щоб виправдати свої завойовницькі походи."
  russian_legitimization: "Народна легітимність"
  russian_legitimization_desc: "Руський народ століттями проживає на цих землях, тому очевидно, що правити ними також повинні русичі. Чим краще правитель розуміє руську культуру та звичаї, тим охочіше народ його прийме."
  nor_seaborn_country: "Морська країна"
  nor_seaborn_country_desc: "Норвежці воліють подорожувати країною на човнах, тому серед них багато талановитих моряків, яких за потреби можна призвати на службу до флоту."
  nor_bounties_of_the_sea: "Дари моря"
  nor_bounties_of_the_sea_desc: "Землі Норвегії погано підходять для землеробства, тому одного лише сільського господарства недостатньо, щоб запастися продовольством. На щастя, у водах Північного моря предостатньо риби, щоб нагодувати наших людей."
  nor_merchant_tradition: "Норвезькі купці"
  nor_merchant_tradition_desc: "Порти Норвегії давно стали центром тяжіння для торговців з усієї Європи. Настав час не тільки приймати іноземних купців, а й самим отримувати вигоду з торгівлі в Північній Європі."
