  ages_of_eu.1.desc: "Настає [GetCurrentAge.GetName|l]!\n\n[GetCurrentAge.GetDesc]"
  ages_of_eu.adm: "Адміністративна ціль"
  ages_of_eu.dip: "Дипломатична ціль"
  ages_of_eu.mil: "Військова ціль"
  feudalism: "Феодалізм"
  feudalism_desc: "У ході розвитку в людського суспільства виникає необхідність у стійких і постійних системах правління. У Європі після падіння Римської імперії це завдання взяли на себе інститути й традиції, відомі нам у сукупності як феодальна система.\n\nЗі схожих причин постійні системи правління виникали по всьому світу в різний час, і багато з них були куди давніші за феодалізм."
  legalism: "Легалізм"
  legalism_desc: "Теорії, на які спирається легалізм, просочували китайське суспільство протягом багатьох століть. Ідея того, що чистий ідеалізм і внутрішня стабільність призводять до багатої, процвітаючої країни та потужного війська, міцно вкоренилася в умах мислителів і вельмож східноазійських країн.\n\nОднак завдяки торгівлі та міграції ідеї легалізму широко поширилися й ісламським світом. Тут вони набули форми симбіотичного співіснування правовірних і язичників в ісламських країнах.\n\nУ Європі легалізм зберігся як спадщина вмираючої Римської імперії, і багато його догматів лягли в основу юридичних систем країн Старого світу."
  meritocracy: "Меритократія"
  meritocracy_desc: "Особи, що володіють владою та авторитетом, схильні призначати на впливові посади наближених.\n\nІнститут меритократії та пов'язані з нею ідеї стали вкрай популярними в Китайській імперії. Сам Конфуцій підтримував думку про те, що правити країною повинні ті, хто отримав цей привілей за заслугами, а не за правом спорідненості.\n\nТому, на відміну від спадкової аристократії, новій знаті в Китаї довелося заслуговувати своє становище особистими здібностями. Розвиток цього інституту з часом поширився далеко за межі Китаю і дійшов навіть до європейських монархій, де влада і країна були зосереджені в руках аристократів."
  renaissance: "Відродження"
  renaissance_desc: "Починаючи з XIV століття багата аристократія впливових італійських міст починає спонсорувати художників і вчених, які вивчають спадщину давньоримської та давньогрецької культур.\n\nНа той момент Відродження як культурний рух охоплює більшу частину регіону і сильно впливає на літературу, мистецтво, філософію та музику. Вчені-гуманісти також вивчають суспільство, в якому живуть, порівнюючи його з ідеалами класичних філософів. Гуманізм епохи Відродження стає повноцінним рухом, що впливає на всі аспекти життя суспільства.\nПерші друкарі активно видають книги, наповнені новими ідеями, і з цими книгами в суспільстві стрімко поширюються нові поняття про государя та суспільство.\n\nСправжній гуманіст епохи Відродження розбирається у всьому — від політики та філософії до мистецтва, аналізу текстів, музики та архітектури. Відродження готується змінити світ, щоб наблизити його до ідеалів класичної епохи."
  banking: "Банківська справа"
  banking_desc: "Кредитування виникло за часів Античності разом з появою металевих монет, але в ту епоху ним займалися окремі особи та сім'ї. За часів Середньовіччя ця практика отримує розвиток разом з прискореним зростанням торгівлі на Євразійському континенті та в його віддалених частинах.\n\nПрофесійні лихварі з'являються в єврейських громадах, що діють як посередники між християнами та мусульманами. У XII столітті після Хрестових походів виникає ажіотажний попит на позики, і купці італійських міст-країн організують власні лихварські структури, які й стають першими банками. До їх числа можна віднести фірми сімей Барді та Перуцці.\n\nЗ часом з'являються нові фінансові інструменти, такі як векселі та облігації, і деякі банківські династії, наприклад Медічі, Фуггери, Вельзери, набувають впливу, порівнянного з владою країн."
  professional_armies: "Професійні війська"
  professional_armies_desc: "Війська з'явилися разом з першими війнами тисячі років тому, але у різних культур у різні періоди принципи формування та організації війська значно відрізнялися, а з часом удосконалювалися.\n\nУ пізньому Середньовіччі структура війська та феодального суспільства збігаються: основу їх становлять лицарі та піхота, які збираються в певний час року. Проте особливо впливові країни можуть дозволити собі утримувати постійне військо з професійними солдатами, що служать весь рік.\n\nЦя система поступово поширюється в Європі після початку Столітньої війни: саме з неї починається військова революція раннього Нового часу. Збільшення розмірів, підвищення якості професійних військ та пошук нових джерел їх фінансування стає одним з головних завдань правителів по всьому світу."
  new_world: "Новий Світ"
  new_world_desc: "Відкриття Нового Світу не тільки стає початком нової епохи для його колонізаторів і тубільців, а й призводить до поширення нових матеріалів і методів виробництва, а також до усвідомлення, наскільки величезна земна куля. Обмінюючись тваринами, рослинними культурами, сріблом і хворобами, жителі Старого і Нового Світу поступово роблять перші кроки на шляху створення глобальної економіки. На мапах з'являються нові землі та народи, а завдяки географічним відкриттям виникають нові ідеї, спалахують релігійні та філософські суперечки. Великі уми ставлять під сумнів колись непорушні істини, і всюди, від Вальядоліда до Фатехпура-Сікрі, точаться дебати про саму природу світу."
  printing_press: "Друкарський верстат"
  printing_press_desc: "Можливість тиражувати письмові тексти призвела до справжньої революції у сфері поширення знань і багато в чому змінила саме суспільство раннього Нового часу. Завдяки першодрукарям, таким як венеціанець Альд Мануцій, перекладена класична література, одна з рушійних сил Відродження, стала набагато доступнішою людям. Пізніше друкарський верстат сильно допоміг справі Реформації, дозволивши швидко поширювати критичні публікації та переклади Святого Письма.\n\nТепер, коли техніка книгодрукування досягла високого рівня і поширилася по всій Європі, на книжкових полицях по всьому континенту можна знайти сотні тисяч копій найрізноманітніших книг — від політичних і релігійних брошур до наукових трактатів і посібників з етикету. Один за одним відкриваються нові видавництва, і правителям стає все складніше стримувати цю нову силу, адже завдяки порівняній простоті друкарського процесу будь-які спроби ввести цензуру можна легко обійти, вивізши видавництво за кордон або просто змінивши титульний аркуш видання."
  pike_and_shot: "Піка та мушкет"
  pike_and_shot_desc: "Наприкінці XV століття в ході Італійських війн почала формуватися нова військова тактика. В її основі лежав новий вид піхоти, що з'явився в пізньому Середньовіччі, — пікінери, здатні протистояти кавалерійському натиску, а також нещодавно винайдена ручна вогнепальна зброя, насамперед аркебузи та мушкети з ґнотовими замками. Тепер солдати в бою вишиковуються в новому порядку: пікінери формують каре, а аркебузири займають місце попереду та по флангах, відступаючи під захист пік, коли починається рукопашний бій. Ця нова тактика, що отримала назву «піка та мушкет», полюбилася німецьким ландскнехтам та іспанським терціям, а незабаром була перейнята іншими військоми та повсюдно використовувалася на європейських полях битв майже дві сотні років. Лише на початку XVIII століття вона поступилася лінійній тактиці піхоти, озброєної новими кремінними мушкетами зі штиками."
  confessionalism: "Конфесіоналізм"
  confessionalism_desc: "Довгий час католицька церква вважалася єдиною та неподільною, але виникнення численних протестантських конфесій поклало цьому край. Тепер, з появою незліченних тлумачень віри, можна забути про колишню єдність християнства. Але якщо раніше будь-який відступ від канонів Церкви таврувався єрессю, то тепер ці непорушні межі поступово розмиваються.\n\nТому і в релігійних, і в світських влад виникає все гостріше бажання чітко окреслити межі та принципи своїх конфесій, щоб насаджувати власні правила та погляди в усіх аспектах релігійного та світського життя. Це дозволяє їм сильніше контролювати духовне життя своїх підданих, але при цьому посилює релігійну ворожнечу та неприйняття інших релігійних конфесій."
  global_trade: "Світова торгівля"
  global_trade_desc: "Континенти торгували між собою ще за часів Античності. Однак раніше це обмежувалося лише невеликою кількістю торгових шляхів і товарів — наприклад, кустарні товари з Китаю та Індії рухалися на захід через Індійський океан і Великим шовковим шляхом. Тепер же торгівля стає воістину всесвітньою. Завдяки відкриттю Північної та Південної Америки, встановленню морських шляхів навколо Африки та можливості перетинати Тихий океан місцеві торгові шляхи об'єднуються у величезну мережу, що охоплює весь світ.\n\nСрібло з надр Анд вантажиться на судна та відправляється через Європу до Індії та Китаю. Видобуте та викуване в Скандинавії залізо англійські купці продають у Західній Африці, а інші торговці заробляють статки, торгуючи тканинами та прянощами з Південно-Східної Азії. Місцеві індійські купці вкладаються в майбутні європейські торгові підприємства. Можливо, про повноцінну міжнародну економіку говорити ще рано, але вже можна бачити її перші паростки."
  artillery_institution: "Артилерія"
  artillery_institution_desc: "Винахід пороху в Китаї династії Сун призвів до створення нових знарядь, що дозволили поставити його міць на службу війська, і нового роду військ — артилерії. Хоча відомості про неї поширюються по всій Євразії ще в XIII столітті, активно використовувати артилерію почали лише в XV столітті, коли довгі стволи та нові склади пороху зробили знаряддя куди потужнішими та руйнівнішими для кам'яних замків і укріплень по всій Європі. Незабаром артилерія починає використовуватися не тільки при облозі, а й на полі бою, оскільки нові малокаліберні знаряддя легше перевозити та розгортати. Справжньою смертоносною зброєю війни артилерія стає в XVIII столітті, особливо після того, як Наполеон доводить до досконалості тактику її використання у найважливіших точках на полі бою."
  manufactories: "Мануфактури"
  manufactories_desc: "Хоча технічні винаходи XVI–XVII століть дещо збільшують обсяг випуску такої продукції, як залізо та сукно, найважливішим нововведенням у промисловості стає нова форма організації виробництва. Будівництво мануфактур, часто за межами міст, дозволяє торговцям-капіталістам обходити застарілі гільдійські закони, що сковують масове виробництво, та підвищувати продуктивність завдяки розподілу праці й організації всіх процесів під одним дахом. Попередники індустріалізації збільшують випуск продукції за рахунок оптимізації доставки сировини та масової організації праці, а не впровадження дорогого нового обладнання, але навіть це стає величезним кроком уперед порівняно зі старими методами виробництва, які сковують численні обмеження. Разом із наступними технічними досягненнями це призведе до революційних змін у суспільстві."
  scientific_revolution: "Наукова революція"
  scientific_revolution_desc: "Стає зрозуміло, що світ наш не такий великий, як раніше здавалося. Завдяки розвитку міжнародної торгівлі та друкарської промисловості люди починають активніше подорожувати й обмінюватися ідеями, поширювати знання. Це дозволяє нам критично поглянути на реальність, у якій ми живемо. Сьогодні ми піддаємо сумніву те, що колись приймали на віру; спостерігаємо те, про що раніше мали смутне уявлення; відчуваємо те, про існування чого лише здогадувалися.\n\nНе применшуючи останніх досягнень математики, фізики та біології, не можна не визнати, що справжня революція — це зміна нашого сприйняття та розуміння науки як такої. Постійне експериментування — ось істинна суть наукової революції, і скоро воно змінить саме наше уявлення про світ."
  military_revolution: "Військова революція"
  military_revolution_desc: "Постійна низка війн, що стрясали Європу в XVI–XVII століттях, призвела до різкого зростання чисельності військ — цей процес став необхідним для абсолютистських країн у зв'язку зі зростаючим контролем над своїм населенням. Тепер піхота масово озброюється потужними крем'яними мушкетами та діє в лінійному строю, який прийшов на зміну старій тактиці піки та мушкета. Цією ж необхідністю обумовлюється й подальше розширення державного апарату для управління рекрутами та фінансами для потреб зростаючої війська. Крім того, розвивається логістика для забезпечення військ за рахунок організації проміжних складів із припасами для діючих військ. Результатом усіх цих нововведень стане хвиля війн між мілітаризованими країнами у XVIII столітті."
  enlightenment: "Просвітництво"
  enlightenment_desc: "Минуле століття стало свідком невблаганного зростання популярності раціоналізму та емпіризму серед найкращих умів того часу. У листах, у публікаціях та за чашкою кави королі, вчені, філософи та літератори обговорюють переваги терпимості, наукового методу та поширення ідеалів Просвітництва по всьому світу. Університети та двори освічених монархів споряджають експедиції з метою виміряти, упорядкувати, порахувати та нанести на мапу весь світ, щоб ми краще розуміли закони, що керують усім навколо нас. Тим часом мислителі обговорюють закони суспільства та намагаються дійти спільного розуміння прав людини.\n\nВчені та природознавці організовують в ім'я людства колосальні проєкти: складають вичерпні енциклопедії всіх людських знань та повні каталоги всіх рослин, тварин і грибів світу. Вогонь розуму запалено, і люди не зупиняться, доки не донесуть його до найдальших куточків земної кулі."
  industrialization: "Індустріалізація"
  industrialization_desc: "На початку XVIII століття загальне прагнення до економічного зростання призвело до появи нових інститутів. Нововведення у виробництві та промисловості, а також впровадження складних машин обіцяють зміни в житті людей по всьому світу. Промислова революція змінить не лише торгівлю та підприємництво, а й саму структуру суспільства. Такі винаходи, як механічний ткацький верстат і парові двигуни, розширять можливості людства до небачених раніше меж."
  levee_en_masse: "Загальна військова повинність"
  levee_en_masse_desc: "Характер військових дій постійно змінюється. З кожним поколінням нововведення та винаходи роблять війну все витонченішою та смертоноснішою. XVIII століття стало часом піднесення могутніх імперій. Щоб задовольнити потребу в експансії та реалізувати свої амбіції, багато країн приймають закони про загальну військову повинність і набирають війська небачених досі розмірів."
  local_governor_advance: "$local_governor$"
  local_governor_advance_desc: "$local_governor_desc$"
  colonies: "Колонії"
  colonies_desc: "Переселяючи наших підданих у нові землі або приймаючи в підданство тубільців, ми засновуємо колонії — це плацдарм для розширення нашої країни та контролю над далекими територіями."
  feudalism_advance: "Феодалізм"
  feudalism_advance_desc: "Феодалізм — це суспільно-політичний устрій, за якого за службу або працю можна отримати право володіння землею. Це сукупність прав та обов'язків, що покладаються на кожного члена організованого суспільства."
  horse_riding_advance: "Верхова їзда"
  horse_riding_advance_desc: "Приручення коней подарувало людям абсолютно новий спосіб пересування та перевезення вантажів. Використання коней у битвах дозволило вершникам не лише стрімко переміщатися по полю бою, а й атакувати ворога зверху або змітати його вагою свого скакуна."
  rights_of_man: "Права людини"
  rights_of_man_desc: "Наріжним каменем нинішньої революційної думки є радикальна ідея про рівноправність усіх людей. Філософи з усього світу разом склали документ, озаглавлений «Декларація прав людини і громадянина», в якому ці права оголошені загальнолюдськими та обов'язковими з юридичної точки зору. Цілком імовірно, що цей документ сильно вплине на розвиток і поширення понять свободи та демократії, і нам не слід відставати в цьому питанні."
  rotherham_plough: "Ротерхамський плуг"
  rotherham_plough_desc: "Примітивний плуг, яким користуються в Європі, без змін дійшов до нас з часів Римської імперії. Але тепер, завдяки новій конструкції, цей плуг став набагато легшим: тягловим тваринам простіше його тягнути, а отже, вони можуть працювати ефективніше."
  modern_bureaucracy: "Сучасна бюрократія"
  modern_bureaucracy_desc: "Щоб ефективно управляти землями та підданими, нам потрібно розширити та реорганізувати чиновницький апарат і зробити службу в казенних місцях справжньою професією. Добре налагоджена бюрократія допомагає керувати всіма аспектами країни без необхідності приймати точкові рішення. Поставимо університетам завдання знайти найефективніші способи державного управління, а дітей аристократів будемо заохочувати за службу в конторах, а не лише на полі бою."
  separation_of_powers: "Розділення влади"
  separation_of_powers_desc: "В обігу з'явився анонімний трактат про політичну теорію, і, попри всі зусилля цензорів, він поширюється по всьому світу. Автор розмірковує про природу форм правління — монархій, деспотій і демократій — і закликає до суворого розділення влади на виконавчу, законодавчу та судову. Така система має обмежити повноваження монарха та захистити простих людей від свавілля — багатьом нашим підданим ця ідея вельми до вподоби. Хоч би як неприємно це звучало для владного государя, озвучені принципи можуть піти на користь нашій нації."
  measuring_the_world: "Дослідження світу"
  measuring_the_world_desc: "Нові наукові дисципліни подарували нам багато способів опису та вивчення навколишнього світу. Відправмо вчених в експедиції по всьому світу, і насамперед — по нашій вітчизні. Ми не дізнаємося, якими ресурсами володіємо, доки не дослідимо всі свої землі на наявність мінералів, не підрахуємо всіх підданих і не оцінимо кожне підприємство."
  the_constitution: "Конституція"
  the_constitution_desc: "Нещодавно у філософських колах народилася нова концепція конституціоналізму, який законодавчо обмежує владу країни. Цікава ідея, але навряд чи приживеться."
  absolute_rulership: "Абсолютна влада"
  absolute_rulership_desc: "Багато хто вимагає права впливати на роботу країни, але насправді вони хочуть лише отримувати вигоду, не обтяжуючи себе зобов'язаннями. Дедалі популярнішою стає нова ідея абсолютизму — ця система дозволить нам позбутися цих паразитів і правити одноосібно."
  national_sovereignty: "Національний суверенітет"
  national_sovereignty_desc: "Численні та тривалі війни першої половини XVII століття призвели до створення міжнародної дипломатичної системи, наріжним каменем якої є поняття територіальної цілісності. Гравцями на міжнародній арені тепер стають не окремі правителі та не наднаціональні угруповання, а самі країни. І жодна з них не має права втручатися у справи іншої."
  military_administration: "Військова адміністрація"
  military_administration_desc: "Постійно зростаючі війська XVI століття висувають дедалі жорсткіші вимоги до адміністративного апарату країн. Створивши постійну організацію, відповідальну за організацію та підтримання військової логістики, а також збільшуючи розмір війська зимового та мирного часу, ми зможемо економічніше та ефективніше збирати великі війська та утримувати їх під час війни."
  early_modern_administation: "Рання бюрократія Нового часу"
  early_modern_administation_desc: "З часом стало очевидно, що централізована бюрократія з органами управління, що складаються з освічених чиновників, була необхідна для реалізації проєктів правителів початку Нового часу."
  renaissance_thought: "Думка епохи Відродження"
  renaissance_thought_desc: "Ідея олігархії, за якої суспільством керують аристократи, існує, напевно, з часів Стародавнього Риму, і в деяких частинах світу від неї не відмовилися донині. Мало того, в наш час до неї знову починають виявляти інтерес сильні світу цього."
  medieval_administration: "Середньовічна адміністрація"
  medieval_administration_desc: "Нашим суспільством править військова еліта. Наступним кроком стане розвиток класу освічених чиновників. Зазвичай їх набирають з-поміж священників."
  impulse_warfare: "Тактика колон і розсипного строю"
  impulse_warfare_desc: "Поява загонів легкої піхоти призвела до змін у військовій справі. Застрільники розташовувалися в розсипному строю попереду основного війська і мали відволікати та виснажувати ворога перед атакою основних сил піхоти, яка наступала колоною або лінією."
  line_infantry: "Лінійна піхота"
  line_infantry_desc: "Пристосувавши до дула мушкета багнет, мушкетер зміг також виконувати роль пікінера. Це дозволило відмовитися від пік і посилило вогневу міць піхотних підрозділів."
  gustavian_infantry: "Піхота Густава Адольфа"
  gustavian_infantry_desc: "Король Швеції Густав II Адольф продовжив удосконалювати піхотні підрозділи та посилювати їхню вогневу міць. Він звузив шеренги та надав їм прямокутної форми, щоб збільшити кількість мушкетів, які могли стріляти одночасно. При цьому піхота посилювалася польовою артилерією, що ще сильніше підвищувало її ефективність."
  standardisation_of_calibre: "Стандартизація калібру"
  standardisation_of_calibre_desc: "Зі зростанням ролі артилерії на полі бою зростала і кількість гармат. Але оскільки кожна з них виготовлялася незалежно, це призводило до величезних труднощів із забезпеченням боєприпасами. У 1544 році імператор Священної Римської Імперії Карл V наказав звести різноманітність гармат до п'яти калібрів, а король Франції Генріх II залишив для своєї артилерії шість стандартних калібрів."
  maurician_infantry: "Піхота Моріца Оранського"
  maurician_infantry_desc: "Розміри та глибина іспанської терції надавали їй стійкості, але робили її повільною та слабкоманевреною на полі бою. Крім того, більша частина солдатів терції в бою не брала участі. Штатгальтер Нідерландів Моріц Оранський скоротив число солдатів у шикуванні, щоб воно стало мобільнішим, і зменшив глибину строю, щоб зберегти його вогневу та ударну міць."
  spanish_square: "Іспанська терція"
  spanish_square_desc: "Іспанська терція стала розвитком старих шикувань типу «піка та мушкет». Основу її становило традиційне каре пікінерів. У кожному з кутів каре знаходилися групи аркебузирів. Таке шикування зберігало стійкість для каре пікінерів і посилювало його вогневою міццю аркебузирів."
  standardized_pikes: "Стандартизація пік"
  standardized_pikes_desc: "Піка — це дуже проста у виготовленні зброя, але, щоб користуватися нею з максимальною ефективністю, всі солдати в шикуванні повинні бути озброєні зброєю однакової довжини держака та наконечника."
  pike_square: "Каре пікінерів"
  pike_square_desc: "Протягом усього Середньовіччя панування кавалерії на полі бою стримували озброєні піками дисципліновані піхотинці. У таких битвах, як битви при Беннокберні та при Куртре, кіннота була розбита силами пікінерів. Поєднання високої дисципліни, муштри та підтримки озброєних мечами воїнів у ближньому бою дозволило досягти небувалої ефективності пікінерських полків."
  medieval_military: "Середньовічна військова справа"
  medieval_military_desc: "До кінця Середньовіччя наземні війська набули складної організації та професійного характеру. Тепер на полях битв правлять війська, що складаються як з ополчення, так і з професійних солдатів, а бойова міць піхоти повільно, але вірно зрівнюється з міццю кінноти."
  insurance_companies: "Страхові компанії"
  insurance_companies_desc: "Подальше скорочення ризиків стало можливим завдяки розвитку страхування. Можливість заплатити страховому агенту та отримати компенсацію у разі невдач сприяє подальшому розвитку торгівлі."
  the_gold_standard: "Золотий стандарт"
  the_gold_standard_desc: "Зростаючий торговий дефіцит між Європою та Китаєм спричинив нестачу срібла як у Європі, так і по всьому світу. Перехід від срібних монет до золотих дозволить карбувати ще більше грошей та фінансувати ними зовнішню торгівлю."
  joint_stock_companies: "Акціонерні товариства"
  joint_stock_companies_desc: "У міру зростання обсягів торгівлі зростають і пов'язані з нею ризики. Виникла необхідність нових способів залучення капіталу та зниження ризику. В акціонерних товариствах ризик ділиться між їхніми численними учасниками-акціонерами."
  public_punishments: "Публічні покарання"
  public_punishments_desc: "Життя в морі сповнене небезпек, і тому покарання за проступки мають бути суворими. Якщо покарання не буде достатньо залякувати охочих скоїти злочин, на борту скоро почнеться хаос. З часом на суднах розвинулася система публічних покарань, настав час її формалізувати. Це сильно зміцнить дисципліну серед моряків."
  merchants_and_trade: "Купці та торгівля"
  merchants_and_trade_desc: "Усталена структура торгівлі була сильно порушена — можливо, внаслідок хвороб та епідемій. Тепер торгівля починає потроху відновлюватися."
  naval_ambitions: "Морські амбіції"
  naval_ambitions_desc: "Високий моральний дух дозволить нашим морякам долати тяготи плавання та підкорювати моря, а нашим колоністам буде легше освоювати дикі землі та засновувати нові поселення далеко від дому."
  chartered_companies: "Колоніальні торгові компанії"
  chartered_companies_desc: "Наш світ величезний, і для розвитку торгівлі іноді доводиться йти на серйозний ризик. На щастя, наші купці не бояться небезпек і готові навіть ризикувати власним капіталом. Ми можемо дозволити цим купцям заснувати особливу компанію і дати їм право виконувати в колоніях державні функції, а також надати їм права на монополію в певних областях. Так ми зможемо контролювати та заохочувати розвиток не тільки міжнародних торговельних зв'язків, а й наших заморських колоній."
  development_of_maritime_law: "Розвиток морського права"
  development_of_maritime_law_desc: "Дедалі більше країн відправляє своїх підданих за кордон із різними торговельними дорученнями. Багато з них живуть так близько одне до одного, що виникає гостра необхідність сформулювати хоча б найосновніші закони загального морського права. Такі праці, як Mare Liberum і пізніше De Dominio Maris Dissertatio, заклали основи міжнародного морського права."
  basic_financial_instruments: "Прості фінансові інструменти"
  basic_financial_instruments_desc: "Морська торгівля — це ризиковане, але вельми прибуткове підприємство. Розвиток таких фінансових інструментів, як акредитиви, допоможе знизити ризики та збільшити доходи."
  naval_professionalism: "Професіоналізація флоту"
  naval_professionalism_desc: "Ще на початку XVII століття постійні флоти були невеликі, і навіть могутні морські країни зазвичай підтримували флот, достатній лише для їхніх безпосередніх потреб. Але поступово ми рухаємося в напрямку великих професійних флотів. Якщо ми не хочемо, щоб суперники обійшли нас у морі, потрібно створити великий постійний флот, а також відповідну адміністрацію, щоб ним керувати та зробити морську службу постійною професією для наших офіцерів."
  superior_ship_design: "Удосконалення конструкції кораблів"
  superior_ship_design_desc: "Якщо наші [Concept('ships', 'кораблі')|e] будуть трохи швидшими, ніж у ворога, нехай навіть ми не отримаємо жодної військової переваги, це все одно зміцнить впевненість наших моряків у перемозі, а ворога змусить двічі подумати, перш ніж вступати з нами в рівний бій."
  patron_of_art: "Покровителі мистецтв"
  patron_of_art_desc: "Сьогодні ми починаємо будувати нове культурне суспільство. Наші витвори мистецтва увійдуть в історію як шедеври, що визначили обличчя епохи."
  pragmatism: "Прагматизм"
  pragmatism_desc: "Занадто багато країн дозволяють стереотипам диктувати політику. Це досить дурний підхід: якщо для наших цілей достатньо найманців, то краще платити їм, ніж витрачати гроші на дороге постійне військо."
  knowledge_transfer: "Передача досвіду"
  knowledge_transfer_desc: "Найважливіше завдання будь-якої країни — це збереження досвіду. Ветерани битв повинні передавати досвід новобранцям за рахунок організованої виховної роботи."
  organised_recruiting: "Організований набір до війська"
  organised_recruiting_desc: "У минулі часи капітани самі шукали новобранців у свої [Concept('regiment', 'полки')|e] — це був довгий процес, адже мало хто бажав померти в бою. Але якщо підійти до справи з розумом, ми зможемо організувати систему набору так, щоб війська поповнювалися швидше."
  optimism: "Оптимізм"
  optimism_desc: "Перемога завойовується не тільки на полі бою, а й у затишних вітальнях. Розвиток раціональної думки допоможе нашим підданим менше турбуватися про тимчасові невдачі та вірити в неминучу перемогу."
  formalized_officer_corps: "Формалізований офіцерський корпус"
  formalized_officer_corps_desc: "Традиційно офіцери в нашому війську набираються зі знаті, але знаті в нас не так багато, а ось людей із нижчих прошарків вдосталь. Можливо, є рація виробляти в кадрові офіцери когось із них."
  deus_vult: "Deus Vult"
  deus_vult_desc: "Підхопимо бойовий клич хрестоносців: «Так бажає Господь!» — і обрушимося на невірних."
  missionary_schools: "Місіонерські школи"
  missionary_schools_desc: "Звісно, у нас немає нестачі в людях, готових нести істинну віру язичникам, але від багатьох із них шкоди більше, ніж користі. Однак ми можемо побудувати спеціальні школи для місіонерів, щоб наші піддані не тільки хотіли навертати невірних, а й могли це робити."
  church_attendance_duty: "Обов'язкове відвідування церкви"
  church_attendance_duty_desc: "Прийнявши політику обов'язкового відвідування церкви, ми прищепимо підданим релігійні цінності та догмати, а в результаті нам буде простіше підтримувати порядок серед таких людей."
  divine_supremacy: "Верховенство віри"
  divine_supremacy_desc: "Найвищою метою для нас має стати очищення наших і прикордонних земель від невірних."
  devoutness: "Благочестя"
  devoutness_desc: "Релігія — один зі стовпів нашого правління. Якщо правителі публічно демонструватимуть свою набожність, їхньому прикладу наслідуватимуть і піддані. А зміцнення віри зміцнить і нашу владу."
  religious_tradition: "Релігійна традиція"
  religious_tradition_desc: "Сила нашої віри та публічна демонстрація набожності справляють глибоке враження на інші країни. Це позитивно відбивається на престижі та славі нашої країни."
  ecumenism: "Екуменізм"
  ecumenism_desc: "Як чинити з єретиками в нашій країні — питання завжди непросте. Звісно, найвірніший спосіб — хрестити всіх вогнем і мечем, але можна спробувати й дипломатичний підхід. Заохочуючи діалог між конфесіями, ми згладимо протиріччя та зміцнимо мир у країні."
  advanced_bureaucracy: "Розвинена бюрократія"
  advanced_bureaucracy_desc: "Нова бюрократична адміністративна система під управлінням країни дозволить збільшити податкові надходження."
  organised_construction: "Організоване будівництво"
  organised_construction_desc: "Оновлення інфраструктури уряду — справа витратна. Якщо правильно структурувати цей процес, витрати можна знизити."
  smithian_economics: "Економіка за Смітом"
  smithian_economics_desc: "Давши відсіч меркантилізму та обмеживши роль країни в економічних питаннях, ми підтримаємо вільний ринок, який підвищить нашу загальну виробничу ефективність."
  national_bank: "Національний банк"
  national_bank_desc: "Заснувавши центральний орган управління фінансовими питаннями, ми зможемо краще контролювати економіку країни."
  debt_and_loans: "Борг і позики"
  debt_and_loans_desc: "Іноді без позикових коштів просто не обійтися. Однак організований борговий ринок дозволить нам розміщувати позики з низьким відсотком."
  centralized_government: "Централізація уряду"
  centralized_government_desc: "Централізація країни спростить розвиток наших ідей та проведення політики центру на околицях."
  nationalistic_enthusiasm: "Націоналістичний ентузіазм"
  nationalistic_enthusiasm_desc: "Забезпечення військ абсолютно необхідне для національної оборони. Ефективне управління дозволяє купувати припаси з великими знижками."
  additional_colonists: "Зростання числа колоністів"
  additional_colonists_desc: "Новий Світ цікавий з багатьох причин. Але найважливіша з них — він ніким не заселений. Принаймні, ніким гідним уваги. Якщо ми розповімо підданим про цю землю безкрайніх можливостей, то багато хто з них напевно захоче там оселитися."
  additional_merchants: "Зростання числа купців"
  additional_merchants_desc: "Який сенс від колоній, якщо нікому возити звідти товари до метрополії? Нам потрібно зміцнювати там купецький стан."
  faster_colonists: "Швидкі колоністи"
  faster_colonists_desc: "Нераціонально просто відправляти поселенців у нові землі й чекати, що вони збудують там колонію. Потрібно спорядити експедицію та зібрати всі потрібні припаси, щоб поселенці змогли вижити далеко від дому. Скориставшись минулим досвідом, ми можемо прискорити цей процес."
  additional_diplomats: "Зростання числа дипломатів"
  additional_diplomats_desc: "Якщо ми хочемо розширювати свої володіння, треба розширювати й дипломатичний вплив. Дипломатична служба не повинна відчувати дефіциту кадрів."
  improved_shipyards: "Поліпшені судноверфі"
  improved_shipyards_desc: "Для захисту наших заморських інтересів нам потрібен потужний [Concept('navy', 'флот')|e]. Зі стапелів наших верфей повинні якомога частіше сходити нові судна."
  experienced_diplomats: "Досвідчені дипломати"
  experienced_diplomats_desc: "Іноді потрібно просто змусити інших повірити в нашу міць. Ми багато зробили на дипломатичній ниві, щоб наше слово мало відчутну вагу."
  competetive_merchants: "Жваві купці"
  competetive_merchants_desc: "Щоб спрямувати торгові потоки в наші порти, нам потрібно перевершувати конкурентів з інших країн. Наша правова система повинна всіляко цьому сприяти."
  organised_mercenary_payment: "Організовані виплати найманцям"
  organised_mercenary_payment_desc: "Капітани найманців — люди хитрі. Часом вони змушують двох командирів з одного війська торгуватися один з одним за їхні послуги. Ми регламентуємо процес найму, щоб припинити свавілля й завжди вести переговори з вигідних позицій."
  benefits_for_mercenaries: "Вигода для найманців"
  benefits_for_mercenaries_desc: "Найманці завжди шукають кращу пропозицію, тому нам доводиться старатися, щоб вони нас не покинули. Якщо ми будемо дбати про найманські загони, вони будуть довше нам вірні й вимагатимуть менше грошей."
  organised_mercenary_recruitment: "Залучення найманців"
  organised_mercenary_recruitment_desc: "Гроші — не єдина проблема при залученні найманців. Для початку потрібно знайти загони, які в принципі готові нам служити. Тому потрібно організувати таку систему, за якої служба нам буде приваблива для будь-яких найманців."
  bookkeeping: "Бухгалтерський облік"
  bookkeeping_desc: "Іноді грошей не вистачає, і їх доводиться брати в борг, а кредитори завжди бояться, що не отримають кошти назад. Суворе ведення бухгалтерії забезпечить виплату боргів усім кредиторам і дозволить нам домовлятися про кредити під менший відсоток."
  legislative_efficiency_idea: "Ефективна адміністрація"
  legislative_efficiency_idea_desc: "Найважливіше для будь-якого уряду — це тямущі радники. При наборі радників потрібно усувати будь-які бар'єри. При прийнятті рішень краще чути широкий спектр думок."
  resilient_state: "Стійка країна"
  resilient_state_desc: "У житті кожної країни трапляються кризи. У такі часи серед незадоволених своєю долею жителів починається заколот. Створивши адміністрацію, здатну протистояти потрясінням, ми зможемо швидше відновлюватися після занепаду."
  war_cabinet: "Уряд воєнного часу"
  war_cabinet_desc: "Під час війни країна найбільш вразлива: негаразди воєнного часу можуть сильно підірвати здатність влади керувати країною. Залучаючи до уряду ключові фігури, ми зможемо уникнути таких потрясінь."
  aristocracy: "Аристократія"
  aristocracy_desc: "Аристократія відіграє важливу роль у будь-якій монархії, адже саме знатні родини, пов'язані з королівською династією, забезпечують легітимність монарха. Зрештою, без поняття «шляхетної крові» немає й «крові королівської». Тому аристократія підтримує монарха й очікує за таку підтримку певних привілеїв, щоб виділятися на тлі черні."
  noble_knights: "Шляхетні лицарі"
  noble_knights_desc: "Для існування кінноти потрібно утримувати велику кількість коней. Якщо ми гарантуємо привілеї знаті, вони не просто віддячать нам, а й стануть розводити таких потрібних нам коней. Як сказав наш придворний блазень, буде служба — знайдеться й прислуга."
  serfdom: "Кріпаки"
  serfdom_desc: "Хто з власної волі піде служити в військо? З її-то мізерною солдатською [Concept('food', 'пайкою')|e], низьким забезпеченням і майже відсутньою медичною допомогою. Але якщо прив'язати селян до землі, нам завжди буде де взяти рекрутів."
  noble_officers: "Аристократи-офіцери"
  noble_officers_desc: "Кому вести війська в бій — завжди непростий вибір. Наша знать вимагає в цьому питанні преференцій. Аристократи мріють показати свою відвагу, пригостивши ворога сталлю, і ми дамо їм таку можливість."
  local_nobility: "Місцева знать"
  local_nobility_desc: "Наші аристократи впевнені, що вони за правом народження кращі за простолюдинів, і нагороджують своєю вірністю лише гідних. Якщо ми визнаємо їхні привілеї, вони обов'язково запам'ятають нашу великодушність і будуть менш схильні піддаватися на підкупи агентів інших країн."
  international_nobility: "Міжнародна знать"
  international_nobility_desc: "Міжнародні відносини хитрі та заплутані. Хтось каже, що найкраще для них підходить купецький стан, який звик спілкуватися з іноземцями. Але ті, хто так вважає, забувають про родинні зв'язки, які багато поколінь культивувалися в знатних родинах. Ці зв'язки допоможуть нам у дипломатії."
  noble_resilience: "Аристократичні зв'язки"
  noble_resilience_desc: "На чолі численних груп найманців на нашому континенті часто стоять дрібні дворяни. Налагодивши добрі стосунки зі знаттю, ми зможемо скористатися її зв'язками з великими найманськими загонами."
  military_traditions: "Військові традиції"
  military_traditions_desc: "Військова думка постійно рухається вперед, і ми намагаємося від неї не відставати. Якщо ми будемо заохочувати серед дворян традиції військової служби, військова слава стане для них умовою для підтримання статусу в суспільстві. І хоча доблесть — це чудово, куди простіше заробити славу, борючись зі слабким ворогом."
  tradition_of_payment: "Традиція оплати"
  tradition_of_payment_desc: "Завжди існує спокуса затримати забезпечення найманцям на пару днів. Зрештою, ніколи не знаєш, які можуть виникнути несподівані витрати. Але ми так не чинимо, завжди платимо найманцям вчасно — і їхні капітани чудово про це знають."
  abolished_serfdom: "Скасування кріпосної залежності"
  abolished_serfdom_desc: "Ще зі свідчень римських часів ми знаємо, що військо з вільних громадян б'ється куди охочіше, ніж підневільні раби. Ми повинні надати селянам достатньо свободи, щоб вони за неї воювали."
  bill_of_rights: "Білль про права"
  bill_of_rights_desc: "Давши громадянам певні фундаментальні права, ми знизимо ймовірність селянських повстань."
  free_merchants: "Вільні купці"
  free_merchants_desc: "У реакційних і ретроградних суспільствах торговці вважаються людьми нижчого ґатунку, ніж землевласники. Але ми-то знаємо, що багатство — це сила, і неважливо, яким саме чином воно здобуте."
  free_subjects: "Особиста свобода"
  free_subjects_desc: "Звісно, приємно задати слузі прочухана, але старанніше працювати він від цього не стане. Якийсь натурфілософ придумав, що всіма людьми рухає жага наживи. Отже, якщо ми замінимо грошову ренту на оплату натурою, то наші селяни почнуть працювати краще."
  humanist_tolerance: "Гуманістична терпимість"
  humanist_tolerance_desc: "Якщо ми прагнутимемо до більш терпимого суспільства і спробуємо вирішувати релігійні та соціальні проблеми з раціональних позицій, то знизимо небезпеку громадянських заворушень."
  emancipation: "Емансипація"
  emancipation_desc: "Дуже довго ми давали право володіння землею лише тим, кого вважали гідними. Якщо ми знімемо обмеження, це призведе до масштабної скупки земель, що, своєю чергою, створить великий потік сезонних робітників, які охоче вирушать до війська."
  dynamic_court: "Динамічний двір"
  dynamic_court_desc: "При справді сучасному дворі дорога нагору відкрита будь-якій людині. Старі традиції, право народження або майновий ценз не повинні заважати розвитку нашого двору і перешкоджати талановитим людям, які прагнуть побудувати кар'єру на службі країні."
  innovativeness: "Жага знань"
  innovativeness_desc: "Природна цікавість і бажання зрозуміти, як влаштований світ, змушує нас рухатися вперед. Наші люди шукають знань — і іскри їхніх умів запалюють полум'я поступу в нашій країні."
  economic_ideas: "Підпорядкована економіка"
  economic_ideas_desc: "Економіка та багатство повинні служити країні, а не навпаки. Тому країні слід діяти у власних інтересах, накопичуючи в себе максимальні обсяги ресурсів. Тільки тоді на нас чекає справжнє процвітання."
  expansionism: "Насіння серед шипів"
  expansionism_desc: "Світ величезний. Дивлячись на експансію інших країн, ми не можемо задовольнятися своїми скромними володіннями. Нам слід розширювати та зміцнювати територію, щоб могутні сусіди не задушили нас."
  formal_administration: "Формальна адміністрація"
  formal_administration_desc: "Продумані процедури та організований апарат управління ведуть до процвітання країни, а без ефективної адміністрації будь-які державні рішення не принесуть результату. Нам слід формалізувати та стандартизувати адміністративні процеси, щоб воля країни проникала в усі куточки її території."
  plutocracy: "Влада грошей"
  plutocracy_desc: "Багатство і влада — не одне й те саме, але ці поняття точно пов'язані одне з одним. Влада може зробити людину багатою, а багатство — наділити певним впливом. Ми це розуміємо, тому найбагатші піддані нашої країни обіймають відповідальні посади в її уряді."
  rebellion_support: "Таємні зв'язки"
  rebellion_support_desc: "У ці неспокійні часи мало кого все влаштовує. Вступаючи в контакт із незадоволеними підданими інших країн, ми можемо спонукати їх до дій у наших інтересах і навіть піднімати повстання, щоб дестабілізувати обстановку у володіннях наших ворогів."
  privateers: "Капери"
  privateers_desc: "Порушення ворожої торгівлі — одна з важливих складових перемоги. Ми заохотимо досвідчених морських вовків нападати на ворожі торгові судна."
  vetting: "Перевірка на благонадійність"
  vetting_desc: "Багато чиновників мають справу з грішми й іноді спокушаються на хабарі від агентів іноземних країн. Прості перевірки на благонадійність допоможуть нам відсіяти найсхильніших до корупції."
  rumourmongering: "Поширення чуток"
  rumourmongering_desc: "Ворога треба бити по всіх фронтах. Отрута сумніву в серцях громадян небезпечніша за десять тисяч солдатів. Нам потрібно бути готовими вдатися заради перемоги до найбрудніших прийомів."
  efficient_spies: "Ефективні шпигуни"
  efficient_spies_desc: "Майже кожен селянин за гроші ладен продати рідну матір, але знайти серед них тих, від кого буде справжня користь, — завдання складніше. Досвід допоможе нам відокремити зерна від полови."
  shady_recruitment: "Залучення з дна"
  shady_recruitment_desc: "Не всі вірять у наше вміння знаходити та залучати агентів із самого дна суспільства. І це добре."
  destabilising_efforts: "Дестабілізація"
  destabilising_efforts_desc: "Таланти наших шпигунів дозволяють підривати [Concept('stability', 'стабільність')|e] ворога. Ми можемо перетворити їхніх вірних союзників на найзаклятіших ворогів."
  espionage: "Шпигунство"
  espionage_desc: "Дозволяє навчати більше шпигунів, що підвищує наші шанси отримувати політичну та військову інформацію про ворогів."
  foreign_embassies: "Посольства в інших країнах"
  foreign_embassies_desc: "Дипломатія — це тонке мистецтво врівноважувати інтереси багатьох сторін. Якщо у нас будуть посольства в інших країнах, звідки регулярно надходять дипломатичні відомості, це допоможе нам приймати правильні рішення."
  claim_fabrication: "Фабрикація претензій"
  claim_fabrication_desc: "Заявити свої права на щось нескладно. Куди складніше переконати інших у тому, що ця претензія законна. Широка мережа дипломатичних зв'язків допоможе нам зробити так, щоб важливі люди знали, що наші інтереси завжди легітимні."
  cabinet: "Рада"
  cabinet_desc: "Ми можемо заснувати виконавчу раду та зібрати в ній найдосвідченіших дипломатів."
  adaptability: "Пристосовність"
  adaptability_desc: "Є просто території під нашим контролем, а є споконвічні землі наших предків, які ми ніколи нікому не віддамо. Проявивши трохи гнучкості, ми можемо назвати споконвічними навіть ті землі, які стали нашими нещодавно, і, якщо нам їх втратити, весь світ знатиме, що наша боротьба за їх повернення буде справедливою."
  revolution_and_counter: "Революція та контрреволюція"
  revolution_and_counter_desc: "Нинішня політична обстановка дедалі більше радикалізується та загострюється, і, можливо, скоро нам доведеться піти війною на країни, що сповідують чужу нам ідеологію. Якщо ми переконаємося в такій необхідності, подібні війни не коштуватимуть нам політичних витрат."
  diplomatic_influence: "Дипломатичний вплив"
  diplomatic_influence_desc: "Зосередившись на розвитку дипломатії, ми посилимо свої позиції на міжнародній арені. Це допоможе нам завоювати багато союзників."
  flexible_negotiation: "Гнучка дипломатія"
  flexible_negotiation_desc: "Ніколи не знаєш, чого можна досягти за столом переговорів. Тому нам потрібно бути готовими до будь-яких варіантів."
  agent_training: "Навчання агентів"
  agent_training_desc: "У нас заплановано багато таємних операцій, але кадрів для їх виконання не вистачає. Потрібно організувати навчання шпигунів, щоб у нас завжди були агенти для небезпечних завдань."
  additional_loyalist_recruitment: "Додатковий набір серед лоялістів"
  additional_loyalist_recruitment_desc: "Цілком природно, що в землях наших ленників є люди, які визнають наше божественне право на владу. Якщо залучимо цих освічених мужів і допоможемо їм, то посилимо свій вплив на ленників."
  audit_checks: "Ревізії"
  audit_checks_desc: "Ми намагаємося впровадити своїх агентів в установи інших країн, але нам слід стежити й за тим, щоб ніяка зараза не проникла в наш власний державний апарат. Команда ревізорів допоможе виявити серед чиновників зрадників і залишити на службі тільки вірних вітчизні."
  grand_army: "Велике військо"
  grand_army_desc: "Дозволить нам створити одне з найбільших і наймогутніших військ, які бачив світ."
  glorious_arms: "Славна зброя"
  glorious_arms_desc: "Вид нашого грізного та славного війська змусить усіх ворогів тремтіти від жаху."
  bayonet_leaders: "Бойові офіцери"
  bayonet_leaders_desc: "За сміливим командиром солдати підуть у будь-яке пекло, тому наші офіцери поведуть солдатів у перших рядах."
  battlefield_commisions: "Підвищення на полі бою"
  battlefield_commisions_desc: "Дозволить нам зосередити зусилля на вдосконаленні військової справи та розвитку військових традицій."
  improved_foraging: "Ефективне фуражування"
  improved_foraging_desc: "Раніше ми не могли ефективно вести війну в землях, де було мало продовольства. Однак наші війська навчилися ефективніше заготовляти [Concept('food', 'їжу')|e], і тепер ми можемо воювати більшими військами."
  improved_manuever: "Удосконалене маневрування"
  improved_manuever_new: "Удосконалення флангових маневрів"
  improved_manuever_desc: "Управління військами на полі бою — важливе вміння для хорошого командира. Розуміння, куди направити солдатів, дасть нам перевагу перед противником."
  engineer_corps: "Інженерний корпус"
  engineer_corps_desc: "Дозволить нам зібрати найсвітліші уми країни та застосувати їхні таланти у військовому будівництві."
  military_drill: "Військові навчання"
  military_drill_desc: "Дозволить нам проводити навчання військ, удосконалюючи їхнє вміння діяти в бойовому строю та поводитися зі зброєю. Крім того, підвищиться й бойовий дух війська."
  regimental_system: "Полкова система"
  regimental_system_desc: "Організувавши війська в [Concept('regiments', 'полки')|e], сформовані за регіональним принципом, ми зміцнимо зв'язок війська з суспільством. Тоді ми зможемо набирати в [Concept('regiments', 'полки')|e] більше батальйонів і робити це швидше."
  defensive_mentality: "Оборонна концепція"
  defensive_mentality_desc: "Хтось каже, що найкращий захист — це напад, але так думають лише дурні. Нехай ворог прийде до нас, і ми розгромимо його контратакою. Наші війська міцні в обороні, особливо під захистом фортець."
  superior_firepower: "Переважаюча вогнева міць"
  superior_firepower_desc: "Ефективна тактика наших військ — придушити противника масованим вогнем, а потім добити його деморалізовані сили. Потрібно зробити так, щоб наші лідери про це знали."
  supply_trains: "Військові обози"
  supply_trains_desc: "Під час війни варто найбільше остерігатися [Concept('attrition', 'виснаження')|e]. Щоб уникнути втрат, потрібно створити грамотну та ефективну логістичну мережу, яка забезпечить війська всім необхідним."
  national_conscripts: "Загальнонародна військова повинність"
  national_conscripts_desc: "Збільшує кількість новобранців за рахунок зобов'язання всіх чоловіків служити в військах."
  shrewd_commerce_practice: "Розрахункова торгівля"
  shrewd_commerce_practice_desc: "Дозволить застосовувати ефективніші методи торгівлі, що дадуть нашим купцям перевагу перед конкурентами."
  free_trade: "Вільна торгівля"
  free_trade_desc: "Наші купецькі родини хочуть зберегти торгові привілеї виключно за собою, але ми не станемо їм піддаватися. Нехай купецький стан розширюється та процвітає."
  merchant_adventures: "Купці-авантюристи"
  merchant_adventures_desc: "Дозволить нам залучати незліченних торговців, жадібних до наживи та слави, готових досліджувати для нас світ та відкривати нові торгові шляхи."
  national_trade_policy: "Національна торгова політика"
  national_trade_policy_desc: "Прийнявши національну торгову політику, ми зміцнимо позиції своїх купців на світових ринках та підвищимо ефективність нашої торгівлі."
  overseas_merchants: "Заморські купці"
  overseas_merchants_desc: "Для розвитку торгівлі нам потрібно надавати громадянство людям, які живуть у далеких землях, допомагають нам у торгівлі та належать до потрібного стану."
  trade_manipulation: "Торгові маніпуляції"
  trade_manipulation_desc: "У найважливіших вузлах, через які проходить торгівля, особливо важливо мати можливість спрямовувати торгові потоки в потрібний нам бік. Це дозволить нам збільшити доходи від торгівлі."
  fast_negotiations: "Швидкі переговори"
  fast_negotiations_desc: "Іноді для укладення торгової угоди важливо виявитися швидшим за конкурентів. Нам потрібно зробити так, щоб наші купці були досить розторопними."
  colonial_ventures: "Колоніальні підприємства"
  colonial_ventures_desc: "Дозволить нам відправляти колоністів у незвідані землі."
  quest_for_the_new_world: "Підкорення Нового Світу"
  quest_for_the_new_world_desc: "Дозволить відправити дослідників навколо земної кулі заради відкриття Нового Світу або приєднатися до країн, які здійснюють експедиції заради географічних відкриттів."
  overseas_exploration: "Шукачі удачі"
  overseas_exploration_desc: "Поселенці, які вирушають будувати колонії в далеких землях, по суті беруть квиток в один кінець. Навіть якщо їх не здолають невідомі хвороби, шлях додому настільки довгий, що назад вони зазвичай не повертаються. Щоб переконати людей знятися з місця та вирушити в незвідані землі, потрібно розповісти їм, які багатства вони можуть там знайти."
  land_of_opportunity: "Земля можливостей"
  land_of_opportunity_desc: "Треба створити навколо колоній репутацію незайманих земель, де можна нажити цілий статок, і тоді поселенці потечуть до наших нових володінь рікою. А значить, країні не треба буде витрачати на переселення так багато грошей."
  vice_roys: "Віцекоролі"
  vice_roys_desc: "Дозволить нам призначати в колоніях віцекоролів. Вони зможуть ефективно керувати пожалуваними їм землями та збільшувати наші прибутки."
  free_colonies: "Вільні колонії"
  free_colonies_desc: "Не кожен захоче їхати далеко за кордон заради розширення нашої великої колоніальної імперії. Однак перспективи отримати ділянку землі в повну власність спокусять багатьох вирушити в путь у пошуках щастя. І землі в колоніях вистачить на всіх."
  global_empire: "Світова імперія"
  global_empire_desc: "Наші труди зі зміцнення колоніальної імперії змінили ставлення підданих до служби в колоніальній адміністрації. Це більше не контора, де ледарі просиджують штани, — тепер тут служать найкращі з найкращих. Це відбивається і на наших податках."
  formal_diplomacy: "Формальна дипломатія"
  formal_diplomacy_desc: "У нинішню епоху, коли влада дедалі більше централізується, нам слід розвивати та зміцнювати зв'язки з урядами сусідніх країн. Зараз дипломатія відіграє особливо важливу роль."
  explorer_commisions_advance: "Заохочення дослідників"
  explorer_commisions_advance_desc: "Далеко від наших берегів лежать незвідані землі й чекають своїх першовідкривачів! Наймаючи безстрашних воїнів і дослідників, готових вирушити назустріч невідомості, ми отримуємо шанс зміцнити та збагатити свою країну."
  offensive_army: "Наступальне військо"
  offensive_army_desc: "Грядуща доба пороху та військових інновацій пробудила новий спалах інтересу до військової справи. Щоб наша країна здобула ще більше слави, нам слід впровадити високі стандарти наступальних збройних сил."
  defensive_army: "Оборонне військо"
  defensive_army_desc: "Зростання могутності наших сусідів викликає потребу створити сильне оборонне військо для захисту територіальної цілісності країни. Знання місцевості, шляхів і тактики допоможе нам пережити цей непростий період."
  national_trade: "Національна торгівля"
  national_trade_desc: "Тканина, вовна та інші товари затребувані в усьому світі. В епоху, коли торгові судна ходять до найдальших берегів, ми повинні забезпечити своїм купцям максимальну перевагу!"
  exploration: "Експедиційні ідеї"
  exploration_desc: "Здатність здійснювати далекі плавання допомагає нам здобути контроль над незвіданими берегами та їхніми корінними жителями."
  superior_seamanship: "Неперевершені моряки"
  superior_seamanship_desc: "Дозволить перетворити [Concept('navy', 'флот')|e] на непереможну морську силу з висококласними суднами, досвідченими капітанами та вмілими матросами."
  naval_glory: "Морська слава"
  naval_glory_desc: "Вид нашого грізного та славного флоту змусить усіх ворогів тремтіти від жаху."
  grand_navy: "Великий флот"
  grand_navy_desc: "Дозволить нам створити один із найбільших і наймогутніших [Concept('navies', 'флотів')|e] у світі."
  sea_hawks: "Морські яструби"
  sea_hawks_desc: "Дозволить нам зосередитися на вдосконаленні військової справи та розвитку флотських традицій."
  excellent_shipwrights: "Чудові кораблебудівники"
  excellent_shipwrights_desc: "Зібравши найкращих корабелів вітчизни, ми можемо побудувати [Concept('navy', 'флот')|e] із сучасних суден з неперевершеними морехідними якостями."
  naval_fighting_instruction: "Настанови про баталії на морі"
  naval_fighting_instruction_desc: "Дозволить нашим морським ветеранам вдосконалювати ефективність [Concept('navy', 'флоту')|e] в умовах [Concept('blockades', 'блокади')|e]."
  press_gangs: "Банди вербувальників"
  press_gangs_desc: "Життя моряка важке та сповнене поневірянь, мало хто готовий присвятити себе флоту. Якщо ми легалізуємо насильницьке вербування в матроси, набирати команди для кораблів стане простіше, і ми зможемо вводити їх до складу флоту швидше."
  quality_education: "Ефективна підготовка"
  quality_education_desc: "Найважливіший момент для будь-якого війська настає відразу після битви. Будь то перемога чи поразка, виснажені після бою війська вкрай вразливі. Нам потрібно навчитися відновлювати боєздатність своїх солдатів швидше, ніж це робить ворог."
  finest_of_horses: "Найкращі коні"
  finest_of_horses_desc: "Як стрімко цей загін летить полем! Як красиво вишиковується кавалерія! Тільки погляньте на коней! Хто ці славні вершники? Ось це війська що треба!"
  oak_forests_for_ships: "Посадки корабельного дуба"
  oak_forests_for_ships_desc: "Чим більше пошкоджень витримують наші кораблі, тим більше шкоди вони можуть завдати. Нам потрібно запастися найкращим просушеним дубом для наших кораблів."
  private_to_marshal: "Від рядового до маршала"
  private_to_marshal_desc: "Кожен солдат у своєму ранці носить маршальський жезл. Можливо, це перебільшення, але все ж ті, хто відзначився в битвах, у нас отримують підвищення та нагороди. Бійці про це знають, і це їх надихає."
  naval_drill: "Морські навчання"
  naval_drill_desc: "Плутанина на борту під час бою може легко перетворити грізний військовий корабель на безпорадну посудину. Однак добре навчена команда відновить порядок швидше за інших."
  merchant_marine: "Торговий флот"
  merchant_marine_desc: "Нехай кожне торгове судно з гордістю піднімає наш прапор і знає, що в разі потреби наш флот обов'язково прийде на допомогу."
  massed_battery: "Велика батарея"
  massed_battery_desc: "Ми зберемо всю нашу артилерію в одну величезну батарею, і її вогнева міць проб'є пролом у ворожих лавах."
  benefits_for_horseowners: "Привілеї для власників коней"
  benefits_for_horseowners_desc: "Люди обходяться дешево, а коні — дорого. Якщо ми надамо привілеї власникам коней, то їх у нас в військах стане більше."
  the_old_and_infirm: "Ветерани та інваліди"
  the_old_and_infirm_desc: "Важко відшукати когось більш зіпсованого та пропащого, ніж старий сержант-ветеран. Та все одно ці люди цінуються. Ніж залишати їх жебракувати на вулицях, краще знайти їм застосування по закінченні служби. Нехай муштрують солдатів та служать квартирмейстерами — так їхній досвід ще нам послужить."
  the_young_can_serve: "Діти під рушницею"
  the_young_can_serve_desc: "У якому віці хлопчик стає чоловіком? У якому віці він готовий помирати за батьківщину? Інші правителі соромляться залучати дітей під рушницю, але в нашій м'ясорубці немає місця дискримінації."
  enforced_service: "Примусова служба"
  enforced_service_desc: "У нашому війську служать лише добровольці. Але іноді їх не вистачає. І тоді людей на службу доводиться залучати силою."
  ships_penny: "Корабельний збір"
  ships_penny_desc: "Будувати кораблі дорого, тож робити це краще з чужою допомогою. Чудовий спосіб залучити кошти — запровадити корабельний податок."
  standardized_artillery: "Стандартизація артилерії"
  standardized_artillery_desc: "Кожна гарматна ливарня ревно оберігає свої секрети та прикрашає гармати, немов витвори мистецтва. Нехай це тішить їхнє самолюбство, але таке виробництво знарядь нас не влаштовує. Відтепер ми вимагатимемо, щоб кожна гармата лилася за нашими суворими вимогами. Заодно це знизить витрати."
  mass_army: "Масове військо"
  mass_army_desc: "Досі ми вкрай вибірково підходили до набору до нашого війська. Ми брали лише бідних та зневірених — тих, за ким ніхто не сумуватиме. Тепер же ми поширимо набір на всіх, окрім багатих."
  mercenary_contracts: "Контракти з найманцями"
  mercenary_contracts_desc: "Укладаючи постійні контракти з капітанами найманців, ми забезпечуємо собі великий резерв на випадок, якщо нам раптом знадобляться їхні послуги."
  local_traditions: "Місцеві традиції"
  local_traditions_desc: "Правити великою нацією — означає мати в підданстві багато різних народів зі своїми звичаями та традиціями. Включивши такі традиції до нашого офіційного зводу законів, ми зробимо підданих щасливішими та вірнішими."
  indirect_rule: "Непряме управління"
  indirect_rule_desc: "Іноді найкращий спосіб змусити людей виконувати твою волю — створити в них враження, ніби вони самі розпоряджаються своєю долею. Така система непрямого управління допоможе уникнути заворушень у новопридбаних провінціях."
  cultural_ties: "Культурні зв'язки"
  cultural_ties_desc: "У різних народів різні звичаї, і, як правило, вони вперто чинять опір спробам зверху змінити ці звичаї. Ми можемо скористатися цією впертістю та включити місцевих царьків до нашої системи уряду — нехай виконують нашу волю, як їм звичніше."
  benevolence: "Людяність"
  benevolence_desc: "Наша нація — оплот терпимості та просвіти. Зробивши так, щоб усі навколо про це знали, ми зможемо зміцнити відносини з іншими націями."
  establish_cadet_branches: "Заснування кадетських гілок"
  establish_cadet_branches_desc: "Успадкування буває пов'язане зі складнощами. Чітко визначивши ролі та права нашої династії через систему кадетських гілок, ми зробимо черговість успадкування більш однозначною."
  tribute_system: "Система данини"
  tribute_system_desc: "Допоможемо наповнити скарбницю, заснувавши формальну систему щорічної данини від наших ленників."
  integrated_elites: "Інтеграція еліт"
  integrated_elites_desc: "Включивши правлячі еліти залежних країн до складу нашого уряду, ми значно полегшимо процес інтеграції їхніх провінцій до нашої країни."
  state_propaganda: "Державна пропаганда"
  state_propaganda_desc: "Репутація вкрай важлива — як для людини, так і для нації. Заснувавши офіційний орган пропаганди, ми захистимо наше добре ім'я від ворогів."
  postal_service: "Поштова служба"
  postal_service_desc: "Зв'язок у нашій країні перебуває в такому жалюгідному стані, що дипломатичні депеші доходять до адресатів із сильним запізненням. Потрібно побудувати мережу поштових відділень та кур'єрських станцій, щоб наше слово доходило до найдальших земель."
  marcher_lords: "Прикордонні лорди"
  marcher_lords_desc: "Якщо ми надамо серйозні вольності васалам у прикордонних регіонах, вони зможуть збирати великі війська, щоб допомагати нам у війнах."
  boarding_parties: "Абордажні команди"
  boarding_parties_desc: "Навчивши морських офіцерів тактиці абордажу, ми зможемо успішно протистояти в битвах навіть переважаючим ворожим [Concept('navies', 'флотам')|e]."
  improved_rams: "Удосконалені тарани"
  improved_rams_desc: "Вперше ставити тарани на військові судна почали багато тисяч років тому, але відтоді металургія зробила крок далеко вперед, і нам слід поставити на наші кораблі нові міцні тарани."
  naval_cadets: "Морські кадети"
  naval_cadets_desc: "Заохочуючи вибір кар'єри на флоті серед середніх та молодших синів аристократів, ми створимо професійний корпус морських офіцерів, які командуватимуть нашими канонірами."
  copper_bottoms: "Оббивка міддю"
  copper_bottoms_desc: "Дерево — це прекрасний матеріал для корабелів, але з часом воно гниє. Оснастивши кораблі мідною обшивкою нижче ватерлінії, ми сповільнимо цей процес, і вони зможуть витримувати більш далекі плавання."
  escort_ships: "Корвети"
  escort_ships_desc: "Корвети — це клас малих військових кораблів, мета яких — супроводжувати дружні судна та виснажувати ворога. Їхня головна зброя — не потужні гарматні батареї, а швидкість та маневреність."
  national_arsenal: "Національний арсенал"
  national_arsenal_desc: "Побудувавши національний арсенал, де за одним стандартом будуватимуться та обслуговуватимуться військові кораблі, ми зможемо створити більший флот."
  garrison_conscription: "Гарнізони з новобранців"
  garrison_conscription_desc: "Набираючи гарнізони з молодих та міцних рекрутів, ми зможемо ефективніше обороняти наші рубежі."
  expanded_supply_trains: "Удосконалені військові обози"
  expanded_supply_trains_desc: "Обози з великою кількістю припасів дозволять нашим військам довше діяти на ворожій території."
  sheltered_ports: "Захищені порти"
  sheltered_ports_desc: "Як не прикро, кораблі зазнають пошкоджень у бою, і, що ще прикріше, їх важко ремонтувати у відкритому морі. Щоб полегшити це завдання, ми збудуємо систему захищених гаваней уздовж берегів, де команди зможуть ремонтувати свої судна."
  diplomatic_corps: "Дипломатичний корпус"
  diplomatic_corps_desc: "Ми заснуємо професійний дипломатичний корпус, щоб ветерани дипломатичної служби передавали свій досвід молодому поколінню."
  civil_servants: "Цивільна служба"
  civil_servants_desc: "Ми організуємо для молодих бюрократів цивільну службу, щоб вони швидко засвоювали нововведення в державному управлінні."
  free_cities: "Вільні міста"
  free_cities_desc: "Якщо ми наділимо міста правами самоврядування в питаннях торгівлі, вони відкриють для нас нові прибуткові торгові шляхи."
  preaching_missions: "Місіонерство"
  preaching_missions_desc: "Релігійні місії дозволять забезпечити прихильність нашого населення істинній вірі."
  marine_regiments: "Полки морської піхоти"
  marine_regiments_desc: "Загони морської піхоти здатні битися як у морі, так і на суші. Вони здійснюють берегові рейди та беруть кораблі на абордаж, але водночас можуть брати участь і в сухопутних битвах."
  discipline_drills: "Військова виучка"
  discipline_drills_desc: "У битві мають значення лише три аспекти: вогнева міць, число рекрутів і дисципліна, яка об'єднує перший і другий аспект. Регулярні військові навчання та вправи суттєво підвищать боєздатність наших військ."
  open_levy_standards: "Загальне ополчення"
  open_levy_standards_desc: "Що дає людині право битися і вмирати за свою країну? Особисті переконання? Вірність родині? Зрештою, правильна відповідь полягає в тому, що ми не повинні робити жодних винятків. Служба під нашими прапорами є загальним обов'язком."
  influence: "Дипломатичний тиск"
  influence_desc: "Будь-яка війна завершується переговорами між сторонами, що беруть участь, але іноді противник уперто не бажає визнавати поразку. У таких випадках дипломатичний тиск і погрози можуть переконати незговірливу країну прийняти наші щедрі умови."
  divine_passion: "Страсті Господні"
  divine_passion_desc: "Часи змінюються. Колись усе було підпорядковано вірі, а тепер ідеї, які раніше вважалися язичницькими, дедалі більше поширюються серед простого народу. У світі, що змінився, священники знаходять розраду в незламній вірності своїй справі."
  servants_of_god: "Слуги Господні"
  servants_of_god_desc: "Бути частиною божественного задуму — найбільше благо для будь-якої людини. Усвідомлення того, що ми служимо самому Господу, наповнює наші серця благоговійною радістю."
  by_the_grace_of_god: "Милістю Божою"
  by_the_grace_of_god_desc: "Світ народився з вогню палаючого — і у вогонь палаючий він повернеться. Господь наш подарував полум'я життя нам, простим смертним, розпаливши душі наші й показавши нам правду про небезпеку його. Тож не убоїмося ж ми її."
  state_of_clerics: "Країна священників"
  state_of_clerics_desc: "Природа теократії полягає в її близькості до божественного. Тому багато урядових посад у нашій країні обіймають священники, які проводять священні обряди та виконують адміністративні обов'язки."
  friends_in_high_places: "Друзі у високих колах"
  friends_in_high_places_desc: "Лише один шлях приведе нас до вічного, безсмертного щастя. Знати Бога — значить знати його намісників на Землі. Вони допоможуть нам на цьому шляху."
  flesh_is_weak: "Плоть немічна"
  flesh_is_weak_desc: "Плоть немічна, але дух сильний. Наші солдати навчилися битися як один воїн, і їхній бойовий дух не зламати нікому."
  alpha_and_omega: "Альфа і омега"
  alpha_and_omega_desc: "Господь наш є початок і кінець. Хай почують наші вороги Його голос гучніше гуркоту битв. Хай приведуть наші правовірні воїни ворогів до Нього в обійми. І хай побачать тоді наші вороги істину."
  conviction_of_sin: "Визнання гріха"
  conviction_of_sin_desc: "Хай впадуть на коліна ті, хто злочинствував. Хай ляже навіки на плечі їхні тягар вчинків їхніх. Хай не заснуть вони спокійним сном, доки не покаються в кошмарах, що були створені руками їхніми."
  martyrs: "Мученики"
  martyrs_desc: "Мученики — це ті, хто вшановує за найвищу честь прийняти смерть за свого бога. Це ті наші побратими, хто зберігає віру в серці і завжди готовий виступити за нашу справу."
  cultural_acceptance_advance: "Прийняття культур"
  cultural_acceptance_advance_desc: "Коли ми поглинаємо інші народи, їхні чужорідні традиції можуть вступати в конфлікт з нашими власними. Щоб згладити ці протиріччя, ми можемо виявляти до цих чужинців терпимість, як до своїх родичів."
  unlock_traditional_galley_advance: "$n_traditional_galley$"
  unlock_traditional_galley_advance_desc: "$n_traditional_galley_desc$"
  hollander_beater: "Рольний барабан"
  hollander_beater_desc: "Протягом століть у виробництві паперу використовувалися механічні молоти, які перемелювали волокна целюлози, перетворюючи її на паперову масу. Але тепер підприємливі майстри винайшли ефективніше рішення, взявши за основу вітряні млини. Горизонтальний барабан із лезами, що обертається силою вітру, здатен за лічені години виробити стільки паперової маси, скільки раніше виготовлялося за кілька днів."
  faceting: "Огранка зі шліфуванням"
  faceting_desc: "Використання масляної суспензії алмазного пилу дозволило ювелірам здійснити справжній прорив в огранці діамантів. Тепер вони можуть надавати дорогоцінним каменям абсолютно нові форми та досягати набагато яскравішого блиску. Поширення нової технології серед майстрів, а також готової продукції серед аристократів викликало значне збільшення попиту на самоцвіти та ювелірні вироби."
  maritime_decay_advance_disc: "Прокладені маршрути"
  maritime_decay_advance_disc_desc: "Купці безупинно борознять моря в пошуках вигоди. Згодом деякі маршрути перетворюються на постійні, часто відвідувані шляхи. Найзручнішими з них постійно ходять кораблі."
  rgo_logistics_discovery: "Місцеві склади"
  rgo_logistics_discovery_desc: "Доступ до всіх необхідних товарів на місці не тільки полегшить працю купцям і ремісникам, але й допоможе уникнути зайвого підвищення цін. Для цього і потрібні склади: вони виступають у якості розподільних пунктів і покривають потреби місцевого населення."
  port_cost_distance_from_capital_advance: "Досвідчені капітани"
  port_cost_distance_from_capital_advance_desc: "Не всяка сухопутна криса зможе дослужитися до капітана корабля. Керувати нашими суднами будуть тільки найдосвідченіші та найвправніші — справжні морські вовки, здатні знайти шлях до рідної гавані навіть під час страшної бурі."
  land_morale_attrition_cost_advance: "Підготовка до маршів"
  land_morale_attrition_cost_advance_desc: "Кожному відомо, що перш ніж дістатися до ворога, будь-якому війську потрібно буде здійснити виснажливий марш. Такі марші лежать в основі підготовки наших військ: солдати повинні звикнути до багатогодинної ходьби, щоб прибувати на поле бою повними сил."
  land_morale_movement_cost_advance_disc: "Узгоджене пересування"
  land_morale_movement_cost_advance_disc_desc: "У поході військо найбільш вразливе та безладне. Якщо привчити солдатів марширувати впорядковано та злагоджено, вони зможуть утримати стрій, навіть якщо ворог нападе під час маршу."
  trade_through_owned_disc_advance: "Купецькі стежки"
  trade_through_owned_disc_advance_desc: "Купці не люблять сидіти на одному місці — вони весь час шукають, де вигідніше. У наших краях звикли до постійних потоків купців; багато з них прокладають власні стежки, що допомагають скоротити дорогу."
  hire_artist_cost_modifier_advance_disc: "Культурний край"
  hire_artist_cost_modifier_advance_disc_desc: "Головна відмінна риса будь-якої країни — це її культура та мистецтво. Гордість за наших творців та діячів культури — запорука того, що наше ім'я буде відоме в усьому світі."
  rural_rgo_disc_advance: "Поселення, що розвиваються"
  rural_rgo_disc_advance_desc: "Шлях до процвітання відкритий будь-якому, навіть найскромнішому поселенню, — аби лише була родюча земля… і люди, готові її обробляти. З часом навіть крихітне село може прийти до благополуччя та розростися."
  leader_recruit_cost_advance: "Офіцерські училища"
  leader_recruit_cost_advance_desc: "Командування військами — непросте завдання. Умілий полководець повинен володіти мистецтвом стратегії, тактики та розуміння людської природи — а також багато чим іншим. Щоб подібних полководців у нашій країні стало більше, нам знадобляться повноцінні училища, що займаються підготовкою гідних кадрів."
  morale_recovery_rev_dip_choice: "Час для відпочинку"
  morale_recovery_rev_dip_choice_desc: "Жодне військо не може марширувати та воювати вічно: усім колись потрібно відпочивати. Щоб наші солдати вступали в бій свіжими, необхідно виділити їм час на відпочинок — достатній, щоб вони відновилися, але не почали лінуватися."
  merchant_power_from_maritime_rev_dip_choice: "Торгові флоти"
  merchant_power_from_maritime_rev_dip_choice_desc: "Купецькі кораблі в наших водах — вже звичне видовище. Їх так багато, що можна впевнено говорити про появу у нас власного купецького флоту."
  administrative_leadership: "Господарське керівництво"
  administrative_leadership_desc: "Полководцю мало розбиратися в одній лише військовій справі. Щоб повернутися з походу з перемогою, йому знадобляться великі знання в галузі постачання, розпорядження припасами, грошових витрат та багато чого іншого."
  cultures_capacity_mil_choice: "Багатокультурні амбіції"
  cultures_capacity_mil_choice_desc: "Будь-яка країна, що підкорює нові території, приростає і новими культурами. Відповідно, якщо ми збираємося й надалі розширювати кордони, доведеться навчитися виявляти терпимість до інших культур."
  rgo_logistics_mil_choice: "Вдосконалені склади"
  rgo_logistics_mil_choice_desc: "Повноцінні склади, де можна тримати необхідні для місцевих підприємців товари, — не розкіш, а необхідність. Без них неможливе економічне благополуччя."
  land_morale_movement_cost_rev_choice_mil: "Безперервне просування"
  land_morale_movement_cost_rev_choice_mil_desc: "Рух наших військ — зачаровуюче видовище. Чудово підготовлені та навчені воїни, що крокують в ногу, здатні почати атаку після довгого маршу як ні в чому не бувало."
  port_cost_distance_from_capital_choice_mil: "Прибережні дозори"
  port_cost_distance_from_capital_choice_mil_desc: "Розмістивши на узбережжі дозорних, ми нагадаємо місцевим жителям, що у закону довгі руки, здатні дотягнутися навіть до найдальшого берега."
  protected_harbor_advance: "$protected_harbor$"
  protected_harbor_advance_desc: "$protected_harbor_desc$"
  a_bedouin_cavalry_advance: "$a_bedouin_cavalry$"
  a_bedouin_cavalry_advance_desc: "$a_bedouin_cavalry_desc$"
  repair_at_sea_aod: "Професійні матроси"
  repair_at_sea_aod_desc: "Останні досягнення кораблебудування розширили наші горизонти, але щоб повною мірою використати цей потенціал, потрібні спеціально навчені люди. Правильно виконати всі завдання з обслуговування нових суден здатні тільки професійні матроси, які присвятили своїй справі все життя."
  repair_at_sea: "Берегове кренгування"
  repair_at_sea_desc: "Ускладнення конструкції суден суттєво збільшує терміни автономного плавання, але водночас вимагає більш трудомісткого ремонту, а придатні для цього порти не завжди доступні. Матросів необхідно навчити користуватися припливом і відпливом для кренгування суден на необладнаних берегах."
  repair_at_sea_aorev: "Кренгування у відкритому морі"
  repair_at_sea_aorev_desc: "Ця процедура дозволяє ремонтувати судно на глибокій воді без необхідності підходити до берега і чекати відпливу. Для цього важкі вантажі переміщуються до одного з бортів, щоб інший борт піднявся над водою і став доступним для проведення робіт."
  blast_furnace: "Доменна піч"
  blast_furnace_desc: "Доменна піч обходиться дорожче традиційних способів металургії, проте дозволяє точніше керувати виплавкою ливарного чавуну шляхом зміни пропорцій заліза, вугілля та вапняку у вихідній сировині. З чавуну, отриманого таким чином, можна виробляти коване залізо, яке, своєю чергою, придатне для виготовлення гармат та інших складних виробів."
  saiger_process_discovery: "Налагоджене зейгерування"
  saiger_process_discovery_desc: "Обробка новим, удосконаленим методом — ключ до процвітання наших срібних і свинцевих рудників."
  slitting_mills: "Розпилювальний водяний млин"
  slitting_mills_desc: "Ця машина використовує енергію води і призначена для розпилювання залізних злитків на стрижні, зручні для виготовлення готової продукції. Вибираючи стрижні відповідного розміру, ковалі та ливарники можуть зменшити кількість відходів при обробці."
  coke_blast_furnace: "Коксова піч"
  coke_blast_furnace_desc: "Доменна піч нового типу, що працює на коксі замість звичайного вугілля. Таке нововведення не тільки обходиться дешевше, а й дозволяє збільшити розмір печі. З іншого боку, порівняно з вугіллям кокс містить більше шлаків і домішок, проблема з якими поки не вирішена."
  hot_blast_furnace: "Піч з гарячим дуттям"
  hot_blast_furnace_desc: "Вирішуючи проблему домішок при виплавці заліза в коксових печах, металурги винайшли технологію гарячого дуття. Вона не тільки зменшує обсяг спалюваного коксу, тим самим підвищуючи якість готової продукції, а й дозволяє використовувати вугілля-сирець, що для металургійної промисловості є великим кроком уперед."
  new_currency_demands: "Попит на нову валюту"
  new_currency_demands_desc: "Відкриття нових земель також допомагає розвитку торгівлі. Монети із золота та срібла, як і раніше, залишаються головними засобами обміну, проте через підвищення попиту на валюту в обіг поступово входять гроші з менш цінних металів, наприклад з міді та її сплавів."
  powerful_statues: "Величні пам'ятники"
  powerful_statues_desc: "Процвітання країни свідчить про мудрість правителя, проте простий народ часто не помічає його заслуг. Прагнучи продемонструвати людям свою силу та владу, багато лідерів виділяють кошти на зведення кам'яних або бронзових пам'ятників на свою честь. Втім, навіть такі заходи не завжди допомагають донести до народу потрібну думку, і в результаті країна просто марно витрачає цінні матеріали."
  renaissance_sculptures: "Скульптура епохи Відродження"
  renaissance_sculptures_desc: "Настання епохи Відродження пробудило великий інтерес до різного виду творчості. Нині мало не кожен вважає обов'язком прикрасити своє житло якимось витвором мистецтва. При цьому особливою популярністю користується скульптура, для створення якої потрібні особливі матеріали. Саме зростаючі потреби творців призвели до виникнення величезної кількості нових каменоломень."
  green_vitriol: "Залізний купорос"
  green_vitriol_desc: "Формально галуни та залізний купорос — це різні речовини, проте в алхімічних працях вони часто згадуються як рівнозначні поняття, оскільки мають схожі властивості. Завдяки цьому за потреби одну речовину цілком можна замінити іншою."
  shared_products_procedures: "Обмін товарами та технологіями"
  shared_products_procedures_desc: "Останніми роками ми дізналися про безліч нових земель і народів. Водночас ми відкрили для себе невідомі досі матеріали та ресурси, а також методи їхньої обробки. Як виявилося, навіть такий вузькоспеціалізований товар, як галуни, можна застосовувати в найрізноманітніших галузях."
  ostentatious_clothing: "Пишні костюми"
  ostentatious_clothing_desc: "Сильні світу цього повинні виглядати належно. Щоб демонструвати оточуючим своє багатство та вплив, вони носять розкішний та барвистий одяг, створений з використанням новітніх матеріалів та технологій."
  riches_of_foreign_coasts: "Багаті чужоземні береги"
  riches_of_foreign_coasts_desc: "Далекі землі приносять нам величезні багатства, проте вигоду можна шукати не лише на суші, адже узбережжя та моря також рясніють благами. Щоб ефективніше добувати ресурси на цих територіях, наші поселенці активно переймають досвід місцевих ловців перлів."
  foreign_mining_techniques: "Іноземні методи видобутку"
  foreign_mining_techniques_desc: "Самоцвіти споконвіку цінуються в усьому світі за свою красу. Спілкуючись із корінними жителями далеких земель, ми не лише дізнаємося про затребувані в їхньому суспільстві дорогоцінні камені, а й відкриваємо для себе нові методи їхнього видобутку."
  windmills_advance: "$windmill$"
  windmills_advance_desc: "$windmill_desc$"
  local_smelters_advance: "$local_smelters$"
  local_smelters_advance_desc: "$local_smelters_desc$"
  corps_organisation: "Честь мундира"
  corps_organisation_desc: "У традиційних військах дисципліна серед солдатів підтримувалася жорсткою муштрою. Однак якщо ми виховаємо серед бійців почуття гордості за свій загін, їхня дисципліна стане ще вищою."
  open_sea_exploration: "Заморські експедиції"
  open_sea_exploration_desc: "Безкраї моря обіцяють нам незліченні багатства та нові можливості торгівлі з далекими країнами."
  napoleonic_warfare: "Наполеонівська тактика"
  napoleonic_warfare_desc: "Наше військо витрачає надто багато сил та коштів на облоги. Замість того, щоб штурмувати кожну фортецю на своєму шляху, ми повинні зосередити зусилля на одному рішучому ударі, здатному принести нам перемогу."
  march_to_the_sound_of_the_guns_advance: "$march_to_sound_of_guns$"
  march_to_the_sound_of_the_guns_advance_desc: "Зі зростанням чисельності війська нам слід переглянути підходи до логістики. Якщо наші полководці розосереджуватимуть війська та організовуватимуть укріплені позиції безпосередньо на полі бою, це може принести чималу користь."
  country_unification_advance: "Нагляд за ленниками"
  country_unification_advance_desc: "Чим раніше ми змусимо ленників жити за нашими законами, тим простіше буде вирішити решту питань інтеграції. Призначення постійних представників центральної влади, які контролюють цей процес, суттєво підвищить його ефективність."
  renaissance_urbanisation: "Містобудування епохи Відродження"
  renaissance_urbanisation_desc: "Врахування особливостей окремих районів при міському плануванні дозволить нашим містам виробляти більше товарів."
  renaissance_city_rights: "Формалізація міських прав"
  renaissance_city_rights_desc: "Кодифікація принципу, за яким міські права можуть бути надані виключно центральною владою, дасть нашій адміністрації набагато ясніше уявлення про стан справ у країні."
  absolutism_control_decline_advance: "Абсолютистське управління"
  absolutism_control_decline_advance_desc: "Правителі-абсолютисти схильні демонструвати свою владу не лише придворним, а й усій країні — за допомогою обширного апарату державних чиновників."
  construction_speed_renaissance: "Гільдії мулярів"
  construction_speed_renaissance_desc: "Ділитися один з одним знаннями та досвідом вільним мулярам допомагають так звані гільдії — товариства, де досвідчені наставники навчають молодих підмайстрів."
  construction_speed_discovery: "Стандартизація дощок та цегли"
  construction_speed_discovery_desc: "Нові, сучасніші способи стандартизації виробництва дощок та цегли полегшать нам будівництво споруд."
  construction_speed_reformation: "Архітектурні трактати"
  construction_speed_reformation_desc: "Архітектурні трактати, що нерідко містять знання багатовікової давнини, спрощують навчання зодчих, а заодно допомагають поширювати відомості про найдієвіші методи будівництва."
  construction_speed_absolutism: "Архітектурне проєктування"
  construction_speed_absolutism_desc: "З часом будівництво споруд неминуче стає складнішим. У цій науці з'являються методи та техніки з інших дисциплін, які можна назвати словом «проєктування»."
  construction_speed_revolutions: "Чавунні конструкції"
  construction_speed_revolutions_desc: "Розробка нових способів виробництва кованого заліза та чавуну дала нам можливість створювати складніші конструкції, такі як опори та колони, а отже — швидше зводити споруди."
  apothecary_advance: "$apothecary$"
  apothecary_advance_desc: "$apothecary_desc$"
  unlock_handgonners_advance: "$a_handgonners$"
  unlock_handgonners_advance_desc: "$a_handgonners_desc$"
  manufactories_advance: "Мануфактури"
  manufactories_advance_desc: "Останні досягнення механіки та техніки призвели до виникнення об'єднаних виробничих підприємств — мануфактур. Така організація праці дозволяє підвищити швидкість виробництва та якість продукції."
  scientific_revolution_advance: "Наукова революція"
  scientific_revolution_advance_desc: "Досягнення останніх років у галузі математики, фізики, астрономії, біології та хімії не просто поставили під сумнів нашу картину світу, а повністю перевернули її. Суспільство змінюється з головокрутною швидкістю, і кожен день приносить все більше наукових відкриттів."
  military_revolution_advance: "Військова революція"
  military_revolution_advance_desc: "Війна ніколи не змінюється. Змінюються методи її ведення. Розвиток озброєння здійснив переворот у військовій справі та зробив старі методи бою неефективними. Адаптуватися до нових умов війни — єдиний спосіб зберегти статус потужної військової країни."
  power_projection_advance_5: "Абсолютистські прагнення"
  power_projection_advance_5_desc: "У міру посилення централізації влади в головах багатьох государів по всьому світу почала з'являтися думка про одноосібне володіння всіма доступними територіями. Вони уявляють себе сонцем, яке одне світить над усією землею, і бажають собі абсолютної влади."
  absolutist_court: "Абсолютистський двір"
  absolutist_court_desc: "Останнім часом влада в країнах усього світу зосереджується навколо фігури одноосібного правителя. Решта двору — лише слуги, підпорядковані його волі, а не самостійні суб'єкти влади. Такий устрій дозволяє правителям швидше та ефективніше втілювати в життя свої бажання."
  government_size_absolutism: "Вірні піддані"
  government_size_absolutism_desc: "Абсолютна влада дає правителям широкі повноваження, але навіть у цьому випадку їх волю повинен хтось виконувати. Якщо позбавити підлеглих реальної політичної сили та вселити їм вірність правителю, двір зможе керувати ними, не побоюючись невдоволення та внутрішніх чвар."
  naval_doctrines_advance: "Морські доктрини"
  naval_doctrines_advance_desc: "Війна на морі сильно змінилася в останні роки: кораблі та флотилії стають все більшими та набувають все більш вузької спеціалізації. Тому різні країни починають вдаватися до різних тактик та доктрин, що використовують сильні сторони їх флотів."
  global_supply_limit_modifier_advance_5: "Планування військової логістики"
  global_supply_limit_modifier_advance_5_desc: "Будь-яке військо в поході покладається на тилове забезпечення. При грамотному вивченні та плануванні логістики війська можуть діяти довше та просуватися далі."
  rgo_size_advance_absolutism: "Фізіократія"
  rgo_size_advance_absolutism_desc: "Завдяки останнім досягненням економічної думки на зміну ідеям меркантилізму та цінності торгівлі прийшло розуміння цінності самого виробничого процесу. Тепер ми приділяємо увагу постійному вдосконаленню та розширенню виробництва."
  food_advance_absolutism: "Закриті поля"
  food_advance_absolutism_desc: "До недавніх пір землею часто користувалися спільно та безкоштовно. Однак тепер наростає тенденція розмежування земельних ділянок: позначення чітких меж та розмірів полів, призначених для землеробства. Завдяки цьому можна підвищити ефективність їх обробки."
  naval_morale_advance_5: "Постійні флотилії"
  naval_morale_advance_5_desc: "Поточна ситуація у світі, розвиток морської торгівлі та комерції вимагають використання постійних флотилій для охорони державних інтересів. Постійно діючий флот дозволяє кораблям краще взаємодіяти в морі."
  new_world_advance: "Новий Світ"
  new_world_advance_desc: "Як стверджує флорентійський мореплавець Амеріго Веспуччі, відкриті Колумбом землі — це не частина Індії, а абсолютно новий континент, невідомий нашим предкам. Він чекає своїх дослідників та першовідкривачів."
  colonial_charters: "Колоніальні хартії"
  colonial_charter_progress_tt_title: "Прогрес колоніального поселення"
  colonial_charters_desc: "Ці нові документи наділяють правами наших підданих, які селяться в диких землях Нового Світу. Хартії дають колоніям виняткові права на управління новою землею та регулюють їхні відносини з метрополією."
  plantation_buildings_advance: "Плантації"
  plantation_buildings_advance_desc: "М'який і сприятливий клімат, а також великі родючі землі Нового Світу роблять колонії ідеальним місцем для вирощування прибуткових культур на кшталт цукрової тростини та тютюну."
  diplomatic_range_age_1: "Іноземні посланці"
  diplomatic_range_age_1_desc: "Дипломатія завжди була важливим елементом відносин між країнами. Однак тепер вона стає все складнішою та активнішою, і ми відправляємо посланців у все нові країни, щоб розширити свої відносини зі світом."
  diplomatic_range_age_2: "Мережа представництв"
  diplomatic_range_age_2_desc: "Організація великої мережі організованих дипломатичних представництв у країнах поблизу дозволяє нам відправляти посланців у ще більш далекі землі."
  diplomatic_range_age_3: "Посольства"
  diplomatic_range_age_3_desc: "Нинішня дипломатична ситуація вимагає створення в сусідніх країнах постійних посольств. Тільки так ми забезпечимо захист своїх інтересів у регіоні, одночасно розширивши наш вплив за його межами."
  trade_envoys: "Торгові представництва"
  trade_envoys_desc: "Завдяки зростанню торгівлі з далекими країнами ми почали відправляти послів разом із торговими експедиціями. Так ми налагодимо зв'язки з країнами, які раніше були поза межами нашої досяжності."
  diplomatic_range_age_5: "Дипломатичні місії"
  diplomatic_range_age_5_desc: "Сучасна політика настільки ускладнилася, що одного посла в чужій країні стало не вистачати. Для розширення нашого впливу та захисту інтересів у далеких землях ми відправлятимемо в кожну країну цілі місії з досвідчених дипломатів."
  diplomatic_range_age_6: "Посольства по всьому світу"
  diplomatic_range_age_6_desc: "Багато країн прагнуть розширити своє дипломатичне охоплення, і зв'язки у світі стають все тіснішими. Тільки відкриття постійних посольств по всьому світу дозволить підтримувати наші зв'язки на належному рівні."
  new_world_crops: "Культури Нового Світу"
  new_world_crops_desc: "Багаті землі Нового Світу принесли нашій країні багато скарбів, і одним з найцінніших для нас відкриттів стали дивні, екзотичні рослини, які тубільці вирощують у їжу та як прянощі. Почавши вирощувати ці культури на своїх полях, ми урізноманітнимо стіл своїх підданих новими бажаними стравами."
  rgo_size_advance_discovery: "Нові методи видобутку"
  rgo_size_advance_discovery_desc: "Відкриття нових родовищ мінералів та винахід нових інструментів поступилися місцем ефективнішому видобутку ресурсів та прискоренню виробничих процесів."
  printing_press_advance: "Друкарський верстат"
  printing_press_advance_desc: "Поширення друкарства в нашому столітті призвело до стрімкого поширення знань та прискорення обміну інформацією за рахунок масового видання важливих манускриптів."
  gov_reform_discovery_a: "Рання адміністративна реформа"
  gov_reform_discovery_a_desc: "Наш народ стоїть на порозі нової епохи. Щоб реалізувати свої внутрішні можливості, ми повинні реформувати уряд та вдосконалити свій адміністративний апарат."
  government_size_discovery: "Можливості ранньої адміністративної системи"
  government_size_discovery_desc: "Наша країна складається з багатьох управлінських секторів, і в міру зростання уряду ми повинні його відповідно реформувати."
  power_projection_advance_4: "Панівний дипломатичний вплив"
  power_projection_advance_4_desc: "Наша участь у дипломатичних переговорах надає їм аури престижу та високого статусу. До нашого голосу прислухаються всі, з ким ми забажаємо заговорити."
  regulate_court_procedures: "Регулювання придворних процедур"
  regulate_court_procedures_desc: "Організувавши всі придворні процедури відповідно до суворого статуту та розпорядку, ми зробимо роботу двору ефективнішою та знизимо витрати на його утримання."
  pike_and_shot_advance: "Піка та мушкет"
  pike_and_shot_advance_desc: "Нова військова тактика, згідно з якою пікінери формують каре, а попереду та по флангах від них вишиковуються аркебузири, відступаючи під захист пік, коли починається рукопашний бій."
  lazaretto_advance: "$lazaretto$"
  lazaretto_advance_desc: "$lazaretto_desc$"
  pest_house_advance: "$pest_house$"
  pest_house_advance_desc: "$pest_house_desc$"
  naval_morale_advance_2: "Методи навігації"
  naval_morale_advance_2_desc: "Наші моряки вчаться ходити у все більш далекі морські походи, освоюючи нові методи та інструменти — такі, наприклад, як сухий компас, — та вдосконалюючи свою майстерність навігації."
  confessionalism_advance: "Конфесіоналізм"
  confessionalism_advance_desc: "З появою десятків і сотень тлумачень віри як у церковних, так і у світських влад виникає все гостріше бажання чітко позначити межі та принципи своїх конфесій, щоб насаджувати власні правила та погляди в усіх аспектах релігійного та мирського життя."
  global_trade_advance: "Світова торгівля"
  global_trade_advance_desc: "Торгівля між континентами практикувалася ще в античні часи. Тепер же вона стає воістину всесвітньою. Можливо, про повноцінну міжнародну економіку говорити ще рано, але вже можна бачити її перші паростки."
  artillery_institution_advance: "Облогова артилерія"
  artillery_institution_advance_desc: "Винахід пороху в Китаї часів династії Сун призвів до створення нових знарядь та нового роду військ — артилерії, руйнівної для кам'яних замків та укріплень по всій Європі."
  gov_reform_reformation_a: "Государ"
  gov_reform_reformation_a_desc: "Нові часи вимагають, щоб правитель більш системно підходив до управління країною, а також враховував інтереси різних станів та дипломатичних діячів, що належать до цих станів."
  power_projection_advance_3: "Регіональні прагнення"
  power_projection_advance_3_desc: "Здатність показати свою міць вкрай важлива для країни, що претендує на вплив у регіоні. Засвоївши уроки інших країн минулого та сьогодення, ми змусимо інших рахуватися з нами та будемо нав'язувати їм свою волю."
  confessional_court: "Конфесійний двір"
  confessional_court_desc: "Витрати на утримання двору можуть сягати неймовірних сум і розоряти навіть найбагатші країни. Кілька хитрощів допоможуть нам заощадити гроші, не жертвуючи придворною розкішшю."
  rgo_size_advance_reformation: "Прялки"
  rgo_size_advance_reformation_desc: "Нові та досконаліші методи видобутку ресурсів підвищать темпи виробництва й наповнять нашу скарбницю грошима."
  food_advance_reformation: "Ринкове сільське господарство"
  food_advance_reformation_desc: "Продуктивність полів можна підвищити за рахунок нових, більш урожайних культур. Вибір найкращих сортів або заміна їх імпортними допоможуть нам збільшити виробництво їжі."
  scientific_experimentation: "Наукові експерименти"
  scientific_experimentation_desc: "Ніщо у світі не відбувається випадково. Розуміння причин явищ допоможе нам передбачати повторення схожих ситуацій."
  banking_advance: "Банківська справа"
  banking_advance_desc: "Кредитування існує з давніх часів і завжди пов'язане з ризиками. Ми можемо запровадити регулювання цієї галузі та встановити контроль за кредитуванням і захист учасників."
  trade_companies_advance: "Торгові компанії"
  trade_companies_advance_desc: "Завжди було відомо, що гроші правлять світом. Тепер на ринку з'явилося багато нових товарів із далеких країн, і компанії, що торгують ними, отримають більший дохід."
  naval_morale_advance_3: "Заморські експедиції"
  naval_morale_advance_3_desc: "Часті морські експедиції до далеких земель загартували наших моряків. Тепер вони звичні до довгих плавань і стійко переносять пов'язані з ними поневіряння."
  road_advance_1: "Дорожня мережа"
  road_advance_1_desc: "Важливість торгівлі та комерції стає дедалі очевиднішою, а разом із ними зростає роль розвиненої мережі доріг, якими рухається дедалі більше людей і товарів."
  power_projection_advance_2: "Наддержавні прагнення"
  power_projection_advance_2_desc: "Хоча старі ідеї створення імперій все ще панують над умами правителів нашої епохи, деякі вже почали вигадувати нові способи панувати над іншими країнами та народами."
  renaissance_advance: "Відродження"
  renaissance_advance_desc: "Щоб не відставати від технічного поступу, потрібно поставити собі на службу нестримний потік нових ідей та відкриттів, що захлеснув нашу вітчизну."
  professional_armies_advance: "Професійні війська"
  professional_armies_advance_desc: "Модернізація наших військ багато в чому залежить від підтримання центрів набору та організації військ. Нам потрібно зберігати чітку та ясну військову структуру, викорінюючи все зайве та непотрібне."
  gunpowder_advance: "Порох"
  gunpowder_advance_desc: "Використання пороху на полі бою поза всяким сумнівом підвищить нашу ефективність у битвах і дозволить нам здобувати гору в сутичках."
  drill_army_advance: "Військові навчання"
  drill_army_advance_desc: "Більше ми не будемо відправляти в бій ненавчених ополченців. Якщо ми хочемо захистити свої кордони та дати відсіч ворогу, нам потрібно організовувати регулярні військові навчання."
  renaissance_development: "Академічні трактати"
  renaissance_development_desc: "Епоха філософії, мистецтв і наук принесе з собою нову хвилю відкриттів та винаходів, а також дозволить нам простіше приймати чужоземні інститути."
  art_school_advance: "Мистецькі школи"
  art_school_advance_desc: "Нам потрібно розвивати мистецтво та допомагати художникам відточувати майстерність. Для цього варто побудувати мистецькі школи. У їхніх стінах обдаровані творці починатимуть свою кар'єру й одного дня прославлять своїми шедеврами наше ім'я!"
  pound_lock_canals_advance: "Судноплавні шлюзи"
  pound_lock_canals_advance_desc: "Нам не вперше викопувати канали заради примноження достатку, харчування людей та поліпшення товарообігу. Особливі споруди — шлюзи — спростять переміщення товарів, зробивши життя людей кращим."
  a_renaissance_janissaries_advance: "$a_renaissance_janissaries$"
  a_renaissance_janissaries_advance_desc: "$a_renaissance_janissaries_desc$"
  a_discovery_janissaries_advance: "$a_discovery_janissaries$"
  a_discovery_janissaries_advance_desc: "$a_discovery_janissaries_desc$"
  a_reformation_janissaries_advance: "$a_reformation_janissaries$"
  a_reformation_janissaries_advance_desc: "$a_reformation_janissaries_desc$"
  a_absolutism_janissaries_advance: "$a_absolutism_janissaries$"
  a_absolutism_janissaries_advance_desc: "$a_absolutism_janissaries_desc$"
  a_revolutions_janissaries_advance: "$a_revolutions_janissaries$"
  a_revolutions_janissaries_advance_desc: "$a_revolutions_janissaries_desc$"
  nomadic_legacy: "Кочова спадщина"
  nomadic_legacy_desc: "Наші родичі народжуються в сідлі, ми вільно кочуємо світом і не бачимо потреби осідати на одному місці."
  siberian_frontier: "Завоювання Сибіру"
  siberian_frontier_desc: "Нас ваблять далекі дикі землі Сибіру. Ми прокладемо до них шлях і відправимо туди козаків, щоб вони завоювали цей край для руського народу."
  ostrog_advance: "$ostrog$"
  ostrog_advance_desc: "$ostrog_desc$"
  janissaries_advance: "Яничари"
  janissaries_advance_desc: "Яничари — це еліта нашого війська. Вони навчаються з дитинства та загартовують характер залізною муштрою."
  slave_raiding_wars: "Набіги за рабами"
  slave_raiding_wars_desc: "Раби — це основа нашої економіки. Тому так важливо нападати на поселення ворогів та викрадати їхніх жителів у рабство."
  trade_caravans: "Торгові каравани"
  trade_caravans_desc: "З давніх часів нашими землями проходили прибуткові торгові шляхи. Наші люди звикли мати справу з довгими торговими караванами, що везуть товари з далеких земель."
  the_sahel_trade: "Транссахарська торгівля"
  the_sahel_trade_desc: "Багато століть між Сахельськими королівствами та Середземномор'ям ходили торгові каравани. Доходи від такої торгівлі переважували небезпеку переходу через палючі піски Сахари."
  rudimentary_coastal_ship_repair: "Тимчасовий ремонт"
  rudimentary_coastal_ship_repair_desc: "Морське плавання неминуче призводить до зносу корабля. Незалежно від добротності судна постійні удари хвиль та солона вода повільно, але вірно зруйнують і корпус, і такелаж. Щоб уникнути цього, моряки постійно виконують на борту дрібний ремонт та підтримують судно в ідеальному стані. І навіть при серйозному пошкодженні вони зберігають плавучість корабля доти, доки він не дістанеться безпечної гавані."
  religious_icon_power_advance: "Ікони"
  religious_icon_power_advance_desc: "Ікони — це фізичне втілення нашої віри, сакральні зображення святих, покликані вселяти благоговіння в серця тих, хто їх споглядає."
  scientific_mapping_advance: "Картографія"
  scientific_mapping_advance_desc: "Останні досягнення у сфері географії та картографії дозволяють нам створювати більш точні зображення територій та природних об'єктів з урахуванням їхніх відносних розмірів та положення в просторі."
  integrate_area_advance: "Ефективна інтеграція"
  integrate_area_advance_desc: "Наш адміністративний апарат удосконалюється, і в нас достатньо рекрутів для одночасного приєднання дедалі більших територій до нашої країни."
  maritime_advance_age_2: "Торгові флотилії"
  maritime_advance_age_2_desc: "З розвитком комерції зростає необхідність швидко й ефективно перевозити великі обсяги вантажів. Тому ті, хто залежить від морської торгівлі, не скупляться на будівництво величезних торгових флотів."
  maritime_advance_age_3: "Дослідницькі флотилії"
  maritime_advance_age_3_desc: "У міру поширення знань про світ і нові землі зростає й наша потреба відкривати нові території. Від далеких морів на сході до нових берегів на заході морські відстані перевезень усе збільшуються, а з ними зростає й необхідність у великому флоті."
  maritime_advance_age_4: "Світові флоти"
  maritime_advance_age_4_desc: "Останні століття стали часом географічних відкриттів, а світ немов стає лише тіснішим, а не більшим. Країни, які колись ні з ким не мали жодних відносин, здобули безліч торгових і дипломатичних зв'язків. Для підтримки торгівлі та дипломатії із заморськими країнами нам потрібні дедалі більші й досконаліші флотилії."
  maritime_advance_age_5: "Конвої"
  maritime_advance_age_5_desc: "Морська торгівля розширюється, вантажі переміщуються морськими маршрутами все далі й у ще більших кількостях, необхідність у їхньому безперервному потоці тільки зростає. Організація конвоїв торгових кораблів дасть змогу забезпечити безперервність торгового сполучення."
  maritime_advance_age_6: "Озброєні конвої"
  maritime_advance_age_6_desc: "Очевидно, що торгові конвої — ласа ціль для будь-якого пірата. Мало хто не спокуситься судном, завантаженим дорогими товарами та золотом, тому важливо озброїти конвої для захисту від піратських нападів. Супровід торгових кораблів фрегатами або іншими військовими кораблями забезпечить їхню безпеку."
  coastal_trade_routes_advance: "Розвиток узбереж"
  coastal_trade_routes_advance_desc: "Кораблям найбезпечніше курсувати вздовж узбережжя. Це надійніше, ніж виходити без зайвої потреби у відкрите море, і швидше, ніж пересуватися суходолом. Тому ми заохочуватимемо переміщення торгових кораблів уздовж наших берегів, щоб полегшити перевезення товарів і людей."
  exploration_maintenance_advance: "Міцна конструкція"
  exploration_maintenance_advance_desc: "Головний чинник під час будівництва судна — це його здатність витримувати сувору погоду та удари хвиль. Нові методи будівництва міцних корпусів дадуть змогу нашим кораблям довше залишатися в морі."
  global_trade_routes_advance: "Морські торгові шляхи"
  global_trade_routes_advance_desc: "Географічні відкриття розширюють світ, а нові торгові шляхи та частіше сполучення ними — навпаки, звужують. Верениці торгових суден, що без зупинки перевозять товари та людей між нашими берегами й далекими землями, зробили ці землі куди ближчими до нас, ніж раніше."
  safe_exploration_techniques_advance: "Накопичені знання"
  safe_exploration_techniques_advance_desc: "Вирушати в невідомість завжди страшно, але сьогодні справжніх білих плям на картах залишилося зовсім мало. Хоч багато місць на Землі все ще недостатньо вивчені, ми хоча б знаємо про саме їхнє існування і можемо до них дістатися. Відштовхуючись від знань, накопичених попередніми поколіннями, ми наберемося відваги вирушити в незвідані місця."
  imperial_ambitions: "Імперські прагнення"
  imperial_ambitions_desc: "Не секрет, що великі імперії давнини слугують джерелом натхнення для пісень та епосів, люди дивляться на них із захопленням і повагою. Якщо ми хочемо, щоб до нашої країни ставилися так само, нам потрібно домогтися схожої пишноти."
  letters_of_marque: "Каперські свідоцтва"
  letters_of_marque_desc: "Піратство — страшний злочин, а пірати — безславні розбійники, які наживаються на чужому стражданні. Але якщо видати їм дозвіл на грабіж наших ворогів, то це зовсім інша справа."
  sturdy_privateers: "Міцні капери"
  sturdy_privateers_desc: "Капери завжди живуть на вістрі ножа. Якщо ми хочемо повністю використати їхній потенціал, то треба зробити так, щоб вороги не топили їх після першого ж залпу. Забезпечивши їх міцними кораблями, ми зробимо вигідне довгострокове вкладення."
  rgo_build_time_advance: "Будівельні методи епохи Відродження"
  rgo_build_time_advance_desc: "Великі споруди та інженерні споруди минулих століть досі непохитні. Неможливо заперечувати високий рівень стародавньої архітектури та зодчества. Нам усе ще є чому повчитися у майстрів минулого."
  arts_academy_advance: "$arts_academy$"
  arts_academy_advance_desc: "Мистецтво — це живе дихання людства, яке перетворює життя на яскраве полотно, повне чудес та можливостей. Ми повинні вирощувати серед співвітчизників інтерес до творчості."
  metallurgy: "Металургія"
  metallurgy_desc: "Мистецтво металургії та саме вміння обробляти метали — це одна з рушійних сил будь-якої розвиненої цивілізації. Металеві інструменти та зброя куди досконаліші за свої кам'яні аналоги, вони дозволяють людям ефективніше працювати та воювати."
  supply_depot_advance_age_2_renaissance: "Продовольчі склади"
  supply_depot_advance_age_2_renaissance_desc: "Війська не можуть існувати без припасів. Будівництво постійних продовольчих складів дозволить організувати постійні лінії постачання та зберегти боєздатність військ на найвищому рівні."
  supply_depot_advance_age_3_discovery: "Речові склади"
  supply_depot_advance_age_3_discovery_desc: "Розвиток постійних військ підвищив вимоги до зброї, військової форми та іншого спорядження, яке необхідно зберігати недалеко від місць дислокації."
  supply_depot_advance_age_4_reformation: "Артилерійські склади"
  supply_depot_advance_age_4_reformation_desc: "Початок загального застосування артилерії на полі бою та при облогах створив потребу в боєприпасах та пороху. Для постійного постачання ними потрібні спеціальні військові склади."
  supply_depot_advance_age_5_absolutism: "Передові склади"
  supply_depot_advance_age_5_absolutism_desc: "Тепер війська довше діють у глибині ворожої території, і їм потрібні передові склади, пов'язані з тилом шляхами постачання."
  supply_depot_advance_age_6_revolutions: "Похідні склади"
  supply_depot_advance_age_6_revolutions_desc: "Забезпечення безлічі військ під час тривалих походів — велике навантаження на службу постачання. Для цієї мети потрібні великі та швидко зведені військові склади."
  army_country_looting_advance: "Славні нальотчики"
  army_country_looting_advance_desc: "Нальоти та грабіж — чи не основа постачання нашого війська. Де б не опинилися наші вояки, вони не залишають каменя на камені."
  minting_income_factor_building: "Надійна валюта"
  minting_income_factor_building_desc: "У світі багато типів валюти, але та, на якій стоїть наша печатка, завоювала визнання та довіру людей."
  artillery_vs_fort_age_5_absolutism: "Облогові знаряддя"
  artillery_vs_fort_age_5_absolutism_desc: "Порох дозволяє створювати найрізноманітніші знаряддя. Щоб косити ряди піхоти, вогневої потужності потрібно куди менше, ніж для руйнування фортечних стін. Тому для облог використовуються особливі гармати."
  artists_advance_absolutism: "Напрямки мистецтва"
  artists_advance_absolutism_desc: "Мистецтво завжди пропонувало багато способів самовираження, але останні віяння призвели до справжнього розквіту найрізноманітніших стилів та напрямків."
  subject_loyalty_absolutism: "Абсолютна вірність"
  subject_loyalty_absolutism_desc: "Ми не дозволяємо жодного нарікання та заколоту серед наших підданих. То чому ми повинні терпіти все це від наших ленників?"
  improve_relation_impact_absolutism: "Постійне міністерство закордонних справ"
  improve_relation_impact_absolutism_desc: "Дипломатичний корпус нашої країни щоразу розширюється. Завідувати діяльністю численних послів буде простіше, якщо заснувати постійне міністерство закордонних справ."
  hand_cannon_guild_advance: "$hand_cannon_guild$"
  hand_cannon_guild_advance_desc: "Ці нехитрі залізні трубки не йшли в жодне порівняння з пізнішими зразками вогнепальної зброї. Вперше вони були розроблені в Китаї, а в Кореї та Японії з'явилися в 1270 році."
  subjects_advance: "Залежні країни"
  subjects_advance_desc: "Передача права на місцеве самоврядування ленникам, що перебувають під нашою владою, — вірний спосіб запобігти народним бунтам, зберігши при цьому можливість збирати данину."
  slave_center_advance: "$slave_center$"
  slave_center_advance_desc: "Правильна організація підневільної праці — це обов'язкова умова зростання добробуту нашого народу."
  war_score_absolutism_advance: "Агресивні вимоги"
  war_score_absolutism_advance_desc: "Могутність країни безпосередньо визначається чисельністю її війська. Чим більше в країні населення, тим більше в ній солдатів. Нашим дипломатам слід перейти до агресивніших методів і намагатися приєднувати якомога більше територій у рамках мирних договорів — тільки так ми збережемо перевагу перед сусідами."
  spy_construction_absolutism: "Розширення всесвітніх шпигунських мереж"
  spy_construction_absolutism_desc: "Усе у світі стає більшим — від країн до інститутів. Щоб не відставати від конкурентів, нам потрібно підтримувати шпигунську діяльність на належному рівні."
  absolutism_agressive_advance: "Країна понад усе"
  absolutism_agressive_advance_desc: "В епоху централізації регіонів та обмеженості ресурсів країна має право вести агресивну політику — так вона зможе задовольняти матеріальні потреби населення, а заодно розширювати сферу впливу. І навіть війна, яка вважається крайнім заходом, — це все одно частина дипломатичної гри, оскільки країна не пов'язана людськими уявленнями про моральність та законність."
  relations_absolutism_advance: "Своєчасна політика"
  relations_absolutism_advance_desc: "Міжнародні відносини змінюються, набуваючи по-справжньому глобального розмаху. Не повинні відставати й наші дипломати: потреба в захисті від загроз з боку інших країн зростає з кожним днем."
  correct_box_advance_absolutism: "Універсальні бойові шикування"
  correct_box_advance_absolutism_desc: "Полководці розробили нову тактику. Піхотні, кавалерійські та артилерійські частини тепер заведено зводити в полки, завдяки чому підвищуються маневреність та злагодженість."
  anti_piracy_warfare: "Торгові конвої"
  anti_piracy_warfare_desc: "У морях Нового Світу та на торгових шляхах, що ведуть туди, безчинствують головорізи та буканьєри. Наші купці зазнають неймовірних збитків. З цього дня торгові судна об'єднуватимуться в конвої під охороною військового корабля, що захищатиме їх від піратів. На борту розташовуватиметься невеликий підрозділ військових, здатних подбати про збереження вантажу."
  trade_range_advance_age_3: "Вдосконалені торгові судна"
  trade_range_advance_age_3_desc: "Поява нових кораблів більшого розміру, здатних обходитися меншою командою та долати без зупинок значніші відстані, серйозно розширить наші торгові маршрути."
  trade_range_advance_age_2: "Далекі ринки"
  trade_range_advance_age_2_desc: "Зростаюча економіка надає нові можливості. Якщо раніше заробляти можна було на маршрутах малої дальності, то сьогодні наші торгові судна шукають вигоди в нових водах."
  overseas_trade: "Заокеанська торгівля"
  overseas_trade_desc: "Вісті про далекі землі, що доходять до нашої країни, для наших купців солодші за мед: торговці мріють дорватися до ринків, що обіцяють величезні багатства."
  ship_building_techniques_absolutism: "Плавучий док"
  ship_building_techniques_absolutism_desc: "Завдяки цій розробці наші кораблебудівники зможуть спускати нові кораблі на воду значно швидше, ніж раніше."
  ship_building_techniques_discovery: "Вдосконалена техніка кораблебудування"
  ship_building_techniques_discovery_desc: "Нові методи будівництва кораблів помітно прискорюють цей процес."
  spy_construction_discovery: "Вдосконалена організація шпигунства"
  spy_construction_discovery_desc: "Щоб збирати ще більше відомостей про ворогів та їхню діяльність, ми найматимемо надійних громадян як інформаторів та впроваджуватимемо їх на посади, що передбачають обмін відомостями."
  diplomatic_training: "Навчання дипломатії"
  diplomatic_training_desc: "Ми переписали придворний посібник для дипломатів. Тепер кожен дипломат з нашої свити — чудовий фахівець з відносин з іншими країнами."
  formalized_relations: "Офіційні відносини"
  formalized_relations_desc: "Встановлювати офіційні відносини з сусідніми країнами життєво важливо для підтримання рівноваги сил та сприяння державним інтересам."
  artists_advance_discovery: "Художній друк"
  artists_advance_discovery_desc: "Широке розповсюдження друкарського верстата відкриває нові можливості: тепер наші творці зможуть ділитися своїми талантами зі світом набагато швидше, ніж раніше."
  improved_book_binding: "Вдосконалені палітурні процеси"
  improved_book_binding_desc: "Розвиток у народі потягу до роздумів та знань, а відповідно, і культурне процвітання неможливі без постійного випуску нових книг."
  lumber_improvements_discovery: "Землі під лісівництво"
  lumber_improvements_discovery_desc: "Наші лісопилки зможуть виробляти якісніші матеріали у більшій кількості, якщо ми відведемо частину земель під вирощування міцних дерев."
  lumber_improvements_reformation: "Вдосконалені пилки"
  lumber_improvements_reformation_desc: "Завдяки новим досягненням у галузі виготовлення інструментів ми навчилися робити міцніші та надійніші леза для пилок, а отже — забезпечувати постійні поставки деревини."
  lumber_improvements_absolutism: "Вітряні лісопилки"
  lumber_improvements_absolutism_desc: "Лісопилки, що працюють від вітряних млинів, здатні розпилювати деревину на дошки помітно швидше, ніж раніше."
  coal_improvements_absolutism: "Вдосконалене коксування"
  coal_improvements_absolutism_desc: "Удосконаливши процес обробки викопного вугілля, ми зможемо ефективніше використовувати його як паливо та сировину, не побоюючись при цьому забруднення інших продуктів."
  coal_improvements_revolutions: "Вдосконалені вугільні печі"
  coal_improvements_revolutions_desc: "Кокс відіграє найважливішу роль у виготовленні заліза, тому нам важливо виробляти його в достатніх обсягах. Удосконаливши конструкцію вугільних печей, ми зможемо значно підвищити кількість та якість виробленого коксу."
  correct_box_advance_discovery: "Лейтенанти"
  correct_box_advance_discovery_desc: "Лави професійних військ стають ширшими. Офіцери змушені командувати все більшими формуваннями. Допомагати їм будуть лейтенанти — до їхніх обов'язків увійде передача наказів та керівництво загонами меншої чисельності."
  artists_advance_reformations: "Розвиток світського мистецтва"
  artists_advance_reformations_desc: "Завдяки Реформації в мистецтві виникли нові напрямки. Тепер творцям простіше отримати визнання, а заодно влаштуватися при дворі якоїсь країни."
  war_score_reformations_advance: "Божественне право на завоювання"
  war_score_reformations_advance_desc: "Нашу перемогу на полі бою здобувають не тільки вмілі полководці з геніальними планами — нам ще й допомагають згори. Відповідно, право на завоювання та приєднання територій, підкорених нашою кров'ю та потом, — це прояв божественної прихильності."
  reformation_subject_opinions_advance: "Економічне панування"
  reformation_subject_opinions_advance_desc: "Положення договору, що визначає владу сюзерена над іншою країною, вкрай численні. Одне з таких положень — зобов'язання ленника перед сюзереном у галузі внутрішньої торгівлі. У міру того як всесвітня торгівля поступово набуває постійних рис, зростає і необхідність розширювати ці зобов'язання."
  spy_construction_reformation: "Розвинена шифрувальна справа"
  spy_construction_reformation_desc: "Щоб знати, які плани будують наші вороги, необхідно вселити їм хибне почуття захищеності. Тільки тоді ми зможемо зібрати докладні відомості про їхні задуми та завдати несподіваного удару."
  subject_income_reformation_advance: "Зовнішня ієрархія"
  subject_income_reformation_advance_desc: "Вертикаль підпорядкування, що визначає наші відносини з ленниками, не залишає жодних сумнівів щодо їхніх зобов'язань перед нами. Якщо ми посилимо умови цих договорів і доб'ємося своєчасних виплат, наша скарбниця безперечно стане повнішою."
  correct_box_advance_reformation: "Полкові структури"
  correct_box_advance_reformation_desc: "З професійними військами з'явилося нове тактичне формування — полк. Тепер це не окремі загони феодалів, а повноцінна та вкрай корисна структура."
  recruitment_improvements_reformation: "Призовні центри"
  recruitment_improvements_reformation_desc: "Щоб військо нашої країни стала по-справжньому значним, йому знадобиться багато новобранців. Завдяки роботі призовних центрів ми зможемо швидше набирати до військ усіх придатних до служби."
  mercenaries_reformation_advance: "Забезпечення виплат найманцям"
  mercenaries_reformation_advance_desc: "Не секрет, що найманці працюють тільки за хороші гроші. Пообіцявши їм справедливі виплати та частку від здобичі, ми заручимося вірністю та підтримкою великих загонів."
  renaissance_subject_opinions_advance: "Культурне панування"
  renaissance_subject_opinions_advance_desc: "Останніми роками все більше людей звертаються до питань культури, а також замислюються про важливість гуманізму та збереження природи. Стосується це не тільки нашого народу, а й тих, хто присягнув нам на вірність. А отже, у нас в руках з'явився новий дипломатичний інструмент."
  spy_construction_renaissance: "Шпигунські мережі"
  spy_construction_renaissance_desc: "Перші шпигуни з'явилися ще в давнину — вже тоді правителям потрібно було знати все про внутрішні та зовнішні загрози. Монголи ж відточили мистецтво шпигунства та використовували лазутчиків для підготовки та успішного завершення цілих військових походів."
  recruitment_improvements_renaissance: "Організований набір до війська"
  recruitment_improvements_renaissance_desc: "Професійні війська стали помітно здібнішими за колишні. Щоб вони такими й залишалися, необхідно наростити темпи набору солдатів до військ."
  correct_box_advance_renaissance: "Кадрові офіцери"
  correct_box_advance_renaissance_desc: "Поява професійних військ призвела до необхідності призначати до військ офіцерів, які обіймають свою посаду на постійній основі. Офіцерське звання присвоюється військовослужбовцю прямим указом правителя."
  improve_relation_impact_renaissance: "Екзотичні дипломатичні дари"
  improve_relation_impact_renaissance_desc: "Ще в давнину було заведено підносити дари правителям інших країн, щоб підкреслити таким чином їхнє високе становище та домогтися прихильності. Дари могли бути якими завгодно — іноді навіть живими, наприклад жирафами або слонами."
  late_feudal_relations: "Пізньофеодальні відносини"
  late_feudal_relations_desc: "Феодалізм побудований на двох принципах: #italic auxilium#! та #italic consilium#!. Так називаються обов'язки аристократів перед сюзереном, що залежать від їхнього становища. На цих принципах тримається феодальна ієрархія, що зазнала за століття безліч змін."
  artists_advance_revolutions: "Мистецтво епохи Просвітництва"
  artists_advance_revolutions_desc: "Мистецтво процвітає. Постійно з'являються нові напрямки, а байдужих до віянь епохи Просвітництва залишається все менше. Особливо популярними стають музика та література."
  revolutions_subject_opinions_advance: "Доброзичливе панування"
  revolutions_subject_opinions_advance_desc: "Пожежа революції не іграшка: вона боляче обпікає. Щоб ленники й надалі зберігали відданість нашій країні, будь-які помисли про бунт слід придушувати в зародку. Для цього ми призначатимемо вірних нам управителів та усуватимемо будь-які причини заворушень."
  war_score_revolutions_advance: "Розумні аргументи"
  war_score_revolutions_advance_desc: "Війна страшна і породжує лише страждання. Оскільки обговорення переглядів кордонів все одно неминуче, у переговорах слід робити акцент саме на це, а заодно — звертатися до логіки та здорового глузду іншої сторони."
  spy_construction_revolutions: "Зв'язки з незадоволеними"
  spy_construction_revolutions_desc: "Поширення світом нових ідей та політичних систем можна обернути собі на користь: слід виділити ресурси на підтримку незадоволених у країнах-конкурентах, і тоді ми зможемо заволодіти цінними відомостями."
  revolutions_agressive_advance: "Виправдані конфлікти"
  revolutions_agressive_advance_desc: "Здорові міжнародні відносини будуються на рівновазі сил країн-учасниць. Загарбницькі війни засуджуються; проти переможця навіть може скластися коаліція.\nОднак особливо вмілі дипломати можуть, вдавшись до подвійного тлумачення певних умов, виставити агресором наших ворогів. Таким чином, розв'язана нами війна — а з нею і наші територіальні придбання — вважатимуться справедливими."
  subject_income_revolutions_advance: "Плата за суверенітет"
  subject_income_revolutions_advance_desc: "Світ змінюється на очах, і зміни настільки великі, що їх неможливо описати. У відносинах з ленниками у нас з'явився новий важіль: в обмін на виплати ми гарантуємо їм саме існування."
  artillery_vs_fort_age_6_revolutions: "Сучасні гаубиці"
  artillery_vs_fort_age_6_revolutions_desc: "Ми нарешті задовольнили потребу в знарядді, яке здатне зайняти нішу між облоговими гарматами, що стріляють прямою наводкою, і мортирами, що стріляють із закритих позицій по високій траєкторії. Таке знаряддя отримало назву «гаубиця»."
  recruitment_improvements_revolutions: "Широкий набір до війська"
  recruitment_improvements_revolutions_desc: "Конфлікти, що загрожують вибухнути то тут, то там, тепер можуть зачепити одразу кілька країн. Масштаби набору до військ необхідно терміново розширити. Щоб своєчасно відповідати на загрози, ми вдамося одразу до двох методів: забезпечимо виплати добровольцям та примусимо злочинців вступати на службу."
  correct_box_advance_revolutions: "Генеральний штаб"
  correct_box_advance_revolutions_desc: "Зросла чисельність військ та тривалість походів змусили нас призначити офіцерів на постійні посади завідувачів плануванням та логістикою. По суті, тепер вони керують цілими військовими корпусами."
  urbanization: "Урбанізація"
  urbanization_desc: "Нові міста — це безліч нових можливостей, а також впевненість у завтрашньому дні. Все більше жителів сільської місцевості готово залишити працю на ріллі та влаштуватися працювати на сучасній фабриці."
  advanced_anti_piracy_warfare: "Відмова від каперства"
  advanced_anti_piracy_warfare_desc: "Епоха нових відкриттів та торжества гуманізму, що настала, не залишила місця злодіям та вбивцям, які грабують у морі кораблі, що проходять. Країни все частіше об'єднуються заради протистояння цій загрозі. Кожен бажає назавжди покінчити з піратством, яке загрожує особистим та державним фінансам."
  dip_choice_subject_opinions: "Посланці до ленників"
  dip_choice_subject_opinions_desc: "Постійний зв'язок із ленниками напевно продуктивно позначиться на наших відносинах: як наша країна, так і всі, хто вірно їй служить, стануть лише сильнішими."
  early_anti_piracy_warfare: "Ліги проти піратів"
  early_anti_piracy_warfare_desc: "У тих водах, де ведуть торгівлю наші купці, розвелося неймовірно багато піратів, розбійників і грабіжників. Зазнані збитки змусили купців об'єднатися та створити свої ліги, що служать одній меті — захисту суден під час довгого плавання."
  pop_promotion_speed_age_5: "Просунуті бюрократи"
  pop_promotion_speed_age_5_desc: "Бюрократичний апарат розширюється, прагнучи наздогнати самого себе. Потреба в освічених чиновниках, здатних обіймати адміністративні посади, зростає."
  army_movement_speed_absolutism: "Збройові склади"
  army_movement_speed_absolutism_desc: "Збройові склади — далеко не новий винахід, проте широкого поширення він набув лише в нашу епоху неймовірного розвитку сучасних військ. Завдяки постійному постачанню війська можуть пересуватися швидше й далі."
  army_movement_speed_revolutions: "Купівля постачання"
  army_movement_speed_revolutions_desc: "Якщо ми пропонуватимемо справедливу плату за їжу та припаси, необхідні нашому війську в поході, а не грабуватимемо мирних жителів, швидкість переміщення військ навіть зросте: селяни самі приноситимуть товари в спеціальні пункти збору."
  regiment_reinforcement_speed_absolutism: "Маршал-квартирмейстер"
  regiment_reinforcement_speed_absolutism_desc: "Сучасна війна ведеться виключно силами регулярних військ. Такий підхід пов'язаний з певними труднощами, не в останню чергу логістичними. Займатися постачанням наших військ, що постійно набирають чисельність, буде офіцер на новій посаді маршала-квартирмейстера."
  pop_promotion_speed_age_3: "Шляхетне становище за службу"
  pop_promotion_speed_age_3_desc: "Зазвичай шляхетним становищем нагороджували за військову службу при правителі, проте темпи розвитку країни диктують свої умови: підвищувати до високих звань доводиться дрібну знать і менш благородного походження; а безпосередньо шляхетний титул присуджується навіть купцям."
  regiment_reinforcement_speed_discovery: "Рання військова логістика"
  regiment_reinforcement_speed_discovery_desc: "Добре налагоджене постачання — це запорука успіху. Броня поступово зношується, зброя приходить у непридатність. Щоб своєчасно постачати солдатам нове спорядження, ми приділимо належну увагу логістиці — наприклад, організуємо місцеві склади постачання."
  pop_promotion_speed_age_4: "Конфесійне духовенство"
  pop_promotion_speed_age_4_desc: "Настання епохи Реформації та конфесіоналізму викликало у представників організованих конфесій новий інтерес до духовного життя. Священники стали частіше виходити до пастви, вважаючи своїм обов'язком допомогти їй пережити ці смутні часи. Народ же став більше цікавитися богослужіннями."
  assault_ability_reformation: "Реформована тактика вилазок у проломи"
  assault_ability_reformation_desc: "Завдання штурму проломів в обороні ми відтепер покладатимемо лише на відібраних і чудово підготовлених солдатів. Вони зможуть взяти приступом будь-яку, навіть найдобріше захищену ворожу фортецю."
  regiment_reinforcement_speed_reformation: "Порохівниця"
  regiment_reinforcement_speed_reformation_desc: "Наше військо поступово переходить на порохову зброю. Однак поводитися з порохом, як і раніше, вкрай важко: ця суміш не любить примх погоди та зовнішнього впливу. У порохівниці ж вона буде надійно захищена, а отже, постачати підкріплення стане простіше."
  pop_promotion_speed_age_2: "Можливості для соціального зростання"
  pop_promotion_speed_age_2_desc: "Кожен селянин мріє розбагатіти й посісти вище становище. У нашій країні ця мрія здійсненна: старанна праця, сумлінність і відповідність нашим ідеалам — ось усе, що потрібно, щоб увійти до числа успішних і впливових людей."
  regiment_reinforcement_speed_renaissance: "Постійні польові навчання"
  regiment_reinforcement_speed_renaissance_desc: "Професійні війська змінили обличчя війни. Тепер битви ведуться силами постійних, довго службовців частин. Регулярно постачати їх новими та вже підготовленими солдатами непросто, проте без цього така система нежиттєздатна."
  pop_promotion_speed_age_6: "Соціальне зростання за капіталізму"
  pop_promotion_speed_age_6_desc: "Епоха капіталізму відкриває нові можливості для соціального зростання: замість звичних ієрархій як спосіб підвищити своє соціальне становище на перше місце виходить багатство. Це стосується всіх: і капіталістів, і службовців, і робітників на фабриках."
  regiment_reinforcement_speed_revolutions: "Масова підготовка"
  regiment_reinforcement_speed_revolutions_desc: "Сучасні регулярні війська числом значно перевершують будь-які війська минулих років. Бої ведуться силами десятків тисяч солдатів, втрати ж обчислюються неймовірними цифрами. Щоб війна перестала забирати так багато життів, ми почнемо навчати одразу сотні солдатів одночасно."
  siege_ability_revolutions: "Офіцери-артилеристи"
  siege_ability_revolutions_desc: "Артилерія стала настільки важливим родом військ, що навчання офіцерів, які добре розбираються у своїх знаряддях і здатні вміло їх застосовувати, — це не розкіш, а необхідність."
  assault_ability_revolutions: "Виступ під вогонь"
  assault_ability_revolutions_desc: "Наші війська безстрашно йдуть прямо під гарматний вогонь і вибухи снарядів, прокладаючи шлях до ворожих фортець. Попри розвиток артилерійської та оборонної справи, все ще ніхто не вміє брати укріплення краще, ніж ми."
  army_country_movement_speed_advance: "Розвідувальні загони"
  army_country_movement_speed_advance_desc: "Попереду піших військ ми почнемо пускати кінних розвідників. Вони вивчатимуть місцевість, а ми — складатимемо план пересування, щоб наші війська рухалися швидше за чужі."
  army_country_casus_belli_advance: "Приводи"
  army_country_casus_belli_advance_desc: "Наші дипломати та професійні шпигуни настільки досвідчені, що здатні обґрунтувати майже будь-яку нашу дію на міжнародній арені, підібравши завідомо хибний, але переконливий привід."
  army_country_integration_speed_advance: "Повага до місцевого уряду"
  army_country_integration_speed_advance_desc: "У нас войовничий і грізний народ. Ним рухає виключно бажання залишити пам'ять про себе всюди, куди тільки можна дістатися. Але щоб управління країною, що розростається, давалося нам без зайвих труднощів, ми поважатимемо місцеві звичаї на завойованих територіях."
  army_country_diplo_range_advance: "Озброєні посли"
  army_country_diplo_range_advance_desc: "Наше військо бояться в усьому світі. Однак ми живемо не тільки війною — необхідно налагоджувати дипломатичні відносини з країнами, що переслідують ту ж мету, що й ми, тобто знищення спільного ворога. Посли, які вирушають до іноземних дворів, будуть добре озброєні та під надійною охороною, яка зуміє захистити їх від замахів."
  minting_trade_range_trad_building: "Планування поставок товарів"
  minting_trade_range_trad_building_desc: "Торгівля з іншими країнами — це основа існування нашої країни. Шляхи поставок слід ретельно планувати, а запаси — набирати в достатній кількості, щоб дістатися до далеких ринків."
  minting_trade_range_disc_building: "Розширена мережа торгових складів"
  minting_trade_range_disc_building_desc: "Міжнародна торгівля — це вкрай вимоглива діяльність. Враховувати необхідно абсолютно всі фактори — наприклад, наявність торгових складів. Розширивши їхню мережу, ми зможемо добиратися до більш далеких берегів без ризику втратити цінний вантаж."
  trade_center_building_country_advance: "Великі торгові точки"
  trade_center_building_country_advance_desc: "Проявивши трохи хитромудрості, ми залучимо на регульований ринок іноземних купців. Таке рішення принесе нам чималий прибуток."
  export_building_country_advance: "Швидкий експорт"
  export_building_country_advance_desc: "Вартість вивезення цінних товарів з регульованого ринку іноді буває досить високою, через що привабливість товару падає. Однак торгівля йтиме швидше, якщо витрачати на експорт менше часу."
  counter_espionage_building_country_advance: "Шифри"
  counter_espionage_building_country_advance_desc: "Іноді наша діяльність привертає небажану увагу. Щоб відвадити цікавих, ми шифруватимемо всі свої види зв'язку."
  medical_school_advance: "Медичні училища"
  medical_school_advance_desc: "У медичних училищах готують лікарів, які знають усе про людське тіло, захворювання та способи їх запобігання й лікування."
  slave_manned_galleys: "Раби на галерах"
  slave_manned_galleys_desc: "Утримання великих флотилій, що складаються з галер, дороге: вони нездатні пересуватися без веслярів. Однак замінивши вільних людей рабами, ми зменшимо флотські витрати."
  jesuits_bark: "Хінна кора"
  jesuits_bark_desc: "Колоністи виявили, що деякі корінні народи Південної Америки використовують кору певного дерева для боротьби з лихоманкою. Завдяки експериментам одного єзуїта-натураліста стало відомо, що цю кору також можна використовувати для лікування малярії. Якщо забезпечити цими ліками жителів, то можна значно полегшити перебіг цього небезпечного захворювання."
  quinine: "Хінін"
  quinine_desc: "У минулому кора хінного дерева успішно використовувалася для боротьби з малярією, однак її вживання у вигляді сухого порошку — не найдієвіший спосіб лікування. Хоча якщо виділити з кори лише необхідні цілющі компоненти, то можна істотно підвищити ефективність ліків."
  state_efficiency: "Місцева інфраструктура"
  state_efficiency_desc: "Приділяючи увагу справам країни загалом, не слід забувати про потреби місцевих законодавців та приставів."
  efficient_mining: "Ефективна гірнича промисловість"
  efficient_mining_desc: "Щоб на наші ринки надходили якісні метали, ми видамо указ, який постановляє вдосконалити методи їх видобутку."
  efficient_construction_plans: "Ефективні будівельні проєкти"
  efficient_construction_plans_desc: "Завдяки практичному підходу до будівництва ми зможемо виконувати роботи, не економлячи на якості."
  expanded_infrastructure_network: "Розширена інфраструктурна мережа"
  expanded_infrastructure_network_desc: "Дороги, що зв'язують між собою різні куточки нашої країни, — це важливий фактор фінансового та адміністративного благополуччя. Їх необхідно постійно покращувати та підтримувати у відмінному стані."
  fort_logistics: "Логістика укріплень"
  fort_logistics_desc: "Система укріплень має бути в ідеальному порядку — з погляду і конструкції, і постачання. У довгостроковій перспективі це дозволить нам заощадити."
  regulation_bureau: "Відділ з регулювання"
  regulation_bureau_desc: "До юрисдикції цього законодавчого органу входить контроль за дотриманням законів, що стосуються інфляції, а також управління провінціями на місцевому рівні."
  more_merchants_age_of_trad: "Купецькі гільдії"
  more_merchants_age_of_trad_desc: "Гільдії здавна вважаються одним зі стовпів нашої економіки, проте до них входять переважно ремісники, а не купці. Потрібно заохочувати купців засновувати власні гільдії, і тоді втілювати в життя різні комерційні задуми стане простіше."
  construction_speed_traditions: "Майстри-каменярі"
  construction_speed_traditions_desc: "Будівництво має йти безперервно; неприпустимо, щоб у селах та містечках панувала лінь. Найнявши майстра-каменяра, який завідуватиме будівельними роботами, ми значно прискоримо розвиток країни."
  diplomatic_capacity_traditions: "Розширені архіви"
  diplomatic_capacity_traditions_desc: "Постійна дипломатична робота неможлива без діловодства та складання докладних описів усіх, з ким ми маємо справу."
  rural_rgo_traditions: "Розчищення місцевості"
  rural_rgo_traditions_desc: "Щоб економічні можливості нашої країни стали ширшими, доведеться підкорити її далекі рубежі. Так ми не тільки надамо нашим людям більше землі, а й водночас збільшимо їхній внесок у розвиток країни."
  matchlock_gun: "Ранні мисливські рушниці"
  matchlock_gun_desc: "Доопрацювання рушниць, що виробляються нашими зброярами, піде на користь мисливцям: вони зможуть добувати більше хутра та м'яса."
  flintlock_gun: "Кремінні мисливські рушниці"
  flintlock_gun_desc: "Нові кремінні рушниці та особливі мисливські кулі ще більше спростять нелегку працю наших мисливців."
  long_rifle: "Полювання з довгоствольними гвинтівками"
  long_rifle_desc: "Спеціальні мисливські гвинтівки з довгими стволами стануть зручним і надійним інструментом для добувачів хутра та м'яса."
