l_russian:
  bubonic_plague: "Бубонна чума"
  bubonic_plague_desc: "Велика чума, що поширюється жвавими торговими шляхами, не щадить ані аристократів, ані простолюдинів. Її жертв чекають болісні чорні бубони в паху та під пахвами, нестерпна лихоманка та смерть. Деякі вважають, що цю хворобу розносять гризуни, що бігають полями та міськими вулицями."
  malaria: "Малярія"
  malaria_desc: "Малярія загрожує людству з часів глибокої давнини. Це інфекційне захворювання передається через укус комара-переносника і викликає озноб, головний біль, рясне потовиділення та напади найсильнішої лихоманки, які повторюються раз на три або чотири дні."
  typhus: "Тиф"
  typhus_desc: "Ця смертельна хвороба викликає сильну лихоманку, червоний висип по всьому тілу та потьмарення розуму, що часом посилюється до повного божевілля. Потім хворий починає гнити заживо від гангрени та неминуче помирає."
  local_typhus_impact_modifier: "Місцевий модифікатор тифу"
  influenza: "Інфлюенца"
  influenza_desc: "Ця поширена хвороба, відома в простонародді як «грип», у здорових людей зазвичай викликає лише нежить та легкий жар, а ось для дітей, людей похилого віку, поранених та хворих іншими недугами може бути смертельно небезпечною."
  influenza_location_modifier: "Місцевий модифікатор інфлюенци"
  measles: "Кір"
  measles_desc: "Ця вкрай заразна хвороба, також відома під назвами «рубеола» та «краснуха», викликає жар, кашель, чхання та сильний висип, який незабаром покриває все тіло. Вона небезпечна і для дорослих, але для дітей становить смертельну загрозу."
  measles_location_modifier: "Місцевий модифікатор кору"
  smallpox: "Віспа"
  smallpox_desc: "Жертви цієї жахливої хвороби страждають від жару та блювоти, потім їхні тіла покриваються пухирями, заповненими рідиною. Епідемії віспи призводять до масової загибелі людей, а ті, хто вижив, нерідко залишаються сліпими на все життя."
  smallpox_location_modifier: "Місцевий модифікатор віспи"
  great_pestilence_location_modifier: "Місцевий модифікатор Чорної смерті"