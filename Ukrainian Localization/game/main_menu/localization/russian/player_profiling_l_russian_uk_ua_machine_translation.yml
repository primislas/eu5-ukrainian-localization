l_russian:
  PLAYER_PROFILING_WELCOME_HEADER: "Ласкаво просимо до #italic Європи Українерсаліс V#!!"
  PLAYER_PROFILING_WELCOME: "#italic Europa Universalis V#! — це масштабна історична стратегія, що оповідає про долі країн на рубежі Середніх віків та Нового часу. Засобами їхньої боротьби за владу над світом стають війни, дипломатія, колонізація, а також соціальні та економічні реформи.\n\nЯкщо ви раніше не грали в серію #italic Europa Universalis#! і не знайомі з її механіками, найкраще буде обрати одну з #W рекомендованих країн#!.\n\nЯкщо ж ви — досвідчений володар і хочете пропустити навчання, натисніть #W «$PLAYER_PROFILING_START_NEW_GAME_BT$»#!."
  PLAYER_PROFILING_PLAY: "Грати"
  PLAYER_PROFILING_COUNTRY_DESC: "Центр уваги країни"
  PLAYER_PROFILING_BT: "Рекомендовані країни"
  PLAYER_PROFILING_BT_2: "Грати за рекомендовану країну"
  PLAYER_PROFILING_STAGE1_TITLE: "Як би ви оцінили рівень свого знайомства з жанром стратегій?"
  PLAYER_PROFILING_STAGE3_TITLE: "Рекомендовані країни для 1337 року"
  PLAYER_PROFILING_STAGE1_NEXT_STAGE: "Перейдіть до вибору бажаного стилю гри"
  PLAYER_PROFILING_START_NEW_GAME: "Перейдіть на карту світу та оберіть будь-яку країну з бажаним рівнем складності та правилами гри"
  PLAYER_PROFILING_START_NEW_GAME_BT: "Обрати довільну країну"
  PLAYER_RECOMMENDED_PLAYSTYLE: "Рекомендований стиль гри"
  PLAYER_PLAYSTYLE_ADMINISTRATIVE: "Економіка"
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_LONG: "Дерева завдань: економіка"
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_SHORT: "Екон."
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_DESC: "Зосередьтеся на економічному розвитку країни. Здобувайте ресурси на своїх територіях, будуйте споруди та дороги для процвітання нації, налагоджуйте експорт та імпорт товарів на різних ринках."
  PLAYER_PLAYSTYLE_ADMINISTRATIVE_TL: "#T $PLAYER_PLAYSTYLE_ADMINISTRATIVE$ #!\n$PLAYER_PLAYSTYLE_ADMINISTRATIVE_DESC$"
  PLAYER_PLAYSTYLE_DIPLOMATIC: "Політика"
  PLAYER_PLAYSTYLE_DIPLOMATIC_LONG: "Дерева завдань: політика"
  PLAYER_PLAYSTYLE_DIPLOMATIC_SHORT: "Пол."
  PLAYER_PLAYSTYLE_DIPLOMATIC_DESC: "Зосередьтеся на внутрішній політиці. Займіться управлінням країною та станами, укладайте договори та союзи з іншими країнами, щоб зміцнити свої позиції на міжнародній арені."
  PLAYER_PLAYSTYLE_DIPLOMATIC_TL: "#T $PLAYER_PLAYSTYLE_DIPLOMATIC$ #!\n$PLAYER_PLAYSTYLE_DIPLOMATIC_DESC$"
  PLAYER_PLAYSTYLE_MILITARY: "Експансія"
  PLAYER_PLAYSTYLE_MILITARY_LONG: "Дерева завдань: експансія"
  PLAYER_PLAYSTYLE_MILITARY_SHORT: "Експ."
  PLAYER_PLAYSTYLE_MILITARY_DESC: "Зосередьтеся на армії та флоті. Перемагайте ворогів та завойовуйте сусідні землі силою. Розширюйте флот та пануйте на морях, зміцнюючи морську присутність."
  PLAYER_PLAYSTYLE_MILITARY_TL: "#T $PLAYER_PLAYSTYLE_MILITARY$ #!\n$PLAYER_PLAYSTYLE_MILITARY_DESC$"
  PLAYER_PLAYSTYLE_TOOLTIP_TITLE: "Оберіть стиль гри"
  PLAYER_PLAYSTYLE_PICK_TL: "Оберіть стиль гри, щоб керувати переліченими системами вручну."
  PLAYER_PLAYSTYLE_PICK_PLAYSTYLE: "Обрати стиль гри"
  PLAYER_PLAYSTYLE_UNPICK_PLAYSTYLE: "Скасувати вибір стилю"
  HINTS_ADM_TITLE: "Економічні поради"
  HINTS_ADM_TEXT: "Увімкніть, щоб отримувати поради щодо економіки від найкомпетентнішого члена нашого уряду."
  HINTS_DIPLO_TITLE: "Політичні поради"
  HINTS_DIPLO_TEXT: "Увімкніть, щоб отримувати політичні поради від найкомпетентнішого члена нашого уряду."
  HINTS_MIL_TITLE: "Поради щодо експансії"
  HINTS_MIL_TEXT: "Увімкніть, щоб отримувати поради щодо експансії від найкомпетентнішого члена нашого уряду."
  HINTS_ADM_TYPE_ACTIVATE: "Увімкнути економічні поради"
  HINTS_ADM_TYPE_DEACTIVATE: "Вимкнути економічні поради"
  HINTS_DIPLO_TYPE_ACTIVATE: "Увімкнути політичні поради"
  HINTS_DIPLO_TYPE_DEACTIVATE: "Вимкнути політичні поради"
  HINTS_MIL_TYPE_ACTIVATE: "Увімкнути поради щодо експансії"
  HINTS_MIL_TYPE_DEACTIVATE: "Вимкнути поради щодо експансії"
  PLAYER_SKIP_PLAYTHROUGH: "Не запускати навчальну демонстрацію на початку гри."
  PLAYER_RUN_PLAYTHROUGHT: "Запустити навчальну демонстрацію"
  PLAYER_RUN_PLAYTHROUGHT_MP: "Навчальна демонстрація недоступна в мережевій грі."
  PLAYER_RUN_PLAYTHROUGHT_DESC: "Демонстрація займає кілька хвилин і знайомить вас з базовими механіками гри #italic Europa Universalis V#!.\n\nДемонстрацію можна перервати в будь-який час. Щоб почати її заново, поверніться сюди."
  PLAYER_STOP_PLAYTHROUGHT: "Вийти"
  PLAYER_STOP_PLAYTHROUGHT_TITLE: "Перервати демонстрацію"
  PLAYER_STOP_PLAYTHROUGHT_DESC: "Якщо ви перервете демонстрацію, її прогрес буде втрачено.\n\nПримітка: почати демонстрацію заново можна в будь-який час, відкривши @agenda! #high «Огляд»#!."
  PLAYER_STOP_PLAYTHROUGHT_TT: "#T $PLAYER_STOP_PLAYTHROUGHT_TITLE$#!\n$PLAYER_STOP_PLAYTHROUGHT_DESC$"
  HUN_scenario_desc: "Завдяки залізній руці Карла Анжуйського, що приборкав протестну знать, різноманітне населення королівства #W Угорщина#! знову може обробляти землю та розробляти її рясні надра. Істотна податкова база дозволяє швидко розвивати промисловість і ремесла, а Карпатські гори — стіна, зведена самою природою, — і теплі дипломатичні відносини з більшістю сусідів забезпечують країні мир і процвітання."
  HOL_scenario_desc: "Вільгельм Добрий править графством #W Голландія#!, а також графствами Зеландія та Ено. Але при всьому цьому розмаїтті територій положення Голландії на узбережжі Північного моря, на півдорозі між Ла-Маншем і Балтійським морем, робить саме її центром економічного обміну та розвитку потужної промисловості. Якщо скористатися цими можливостями, Голландія в майбутньому може стати великою економічною країною."
  NOR_scenario_desc: "Королівство #W Норвегія#! перебуває в особистій унії зі Швецією, а попереду країну чекають нові й нелегкі випробування. Місцеві фіорди та долини, а також великі національні ресурси (зокрема ліс і риба) можуть несказанно збагатити народ. А якщо країни процвітатимуть і житимуть у достатку, Норвегія зможе активніше вести дипломатичні ігри зі скандинавськими сусідами та в Північному морі. Норвегія може знову стати великою."
  NAP_scenario_desc: "#W Неаполь#! виник як плід амбіцій могутніх династій, які прагнули влади над півднем Італії. Нині тут править король Роберт Анжуйський — мудрий і справедливий монарх з гострим розумом і тонким чуттям. Населення країни велике і продовжує зростати, а отже, внутрішню експансію можна вести швидко й успішно, якщо зробити акцент на сільському господарстві. У Роберта є всі шанси закріпити гегемонію Неаполітанського Королівства в Італії."
  TUR_scenario_desc: "#W Османи#! зміцнюють позиції та перетворюються на один із найсильніших #italic бейликів#!. Турецькі воєначальники щосили намагаються заволодіти ключовими територіями вздовж босфорського узбережжя, а також Анатолійським плоскогір'ям. Не так давно завойовано кілька позицій на кордоні з Візантією, яка залишається головним ворогом Заходу. Щоб забезпечити себе ресурсами для подальших перемог, османам потрібно буде довести свою перевагу над сусідніми #italic бейликами#!."
  CAS_scenario_desc: "Король Альфонсо XI на прізвисько Месник зумів придушити опір знаті в королівстві й тепер править #W Кастилією#!, не побоюючись протидії. Його погляд звернений на південний кордон — туди, де тримає оборону останній оплот ісламу в Іберії — емірат Гранада. Його могутні союзники на півострові — Султанат Марокко — утримують стратегічно важливі позиції від Альхесіраса до Ронди й можуть прийти на допомогу через Гібралтарську протоку."
  ARA_scenario_desc: "Арагонська корона по праву пишається статусом значущої країни, що має чималу силу на заході Середземномор'я. Запорука цієї сили — умілі моряки, серйозна дипломатична вага та міцні торгові зв'язки. Подальша експансія неминуча."
  FLA_scenario_desc: "Завдяки сильному ринковому центру в Брюгге Фландрія стала однією з найбагатших країн у Нідерландах. Її репутація посередника в складносурядних політичних інтригах дозволяє отримувати максимальну вигоду з дипломатичних ігор."
  VEN_scenario_desc: "Світліша Республіка Венеція — найважливіша та найсильніша купецька республіка на всьому Середземномор'ї, де їй належать важливі торгові порти та острови."
  FRA_scenario_desc: "Право короля Філіпа VI на корону Франції оскаржує англійський монарх Едуард III. Тепер саме існування Франції під загрозою, а Філіп змушений битися на два фронти: з одного боку йому загрожують англійці, з іншого — горда французька знать."