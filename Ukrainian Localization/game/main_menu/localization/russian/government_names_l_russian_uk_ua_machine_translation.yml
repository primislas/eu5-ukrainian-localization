  country_rank_effects_list_title: "[CountryRank.GetNameWithNoTooltip] має такі ефекти:"
  rank_empire_desc: "Це найвищий [Concept('country_rank', 'ранг')|e], яким володіють найпрестижніші або наймогутніші [Concept('countries', 'країни')|e] світу."
  rank_kingdom_desc: "Цим [Concept('country_rank', 'рангом')|e] володіють більші [Concept('countries', 'країни')|e]. Вони мають кілька [Concept('provinces', 'провінцій')|e] і можуть продемонструвати силу."
  rank_duchy_desc: "Цим [Concept('country_rank', 'рангом')|e] володіють невеликі та середні [Concept('country', 'країни')|e], зазвичай обмежені однією [Concept('province', 'провінцією')|e]. При цьому вони перевершують графства за розміром і чисельністю населення."
  rank_county_desc: "Цим [Concept('country_rank', 'рангом')|e] володіють найменші [Concept('countries', 'країни')|e]. Зазвичай вони обмежені однією [Concept('location', 'місцевістю')|e]. Невеликі племена зазвичай теж представлені цим рангом."
  government_type_list_title: "[GovernmentType.GetNameWithNoTooltip] відкриває такі можливості:"
  government_type_list: "[Concept('advances', 'Поступ')|e]: #placeholder XX #!\n[Concept('laws', 'Звід законів')|e]: #placeholder XX #!\n[Concept('policies', 'Політики')|e]: #placeholder XX #!\n[Concept('heir_selections', 'Престолонаслідування')|e]: #placeholder XX #!\n[Concept('estate_privileges', 'Станові привілеї')|e]: #placeholder XX #!"
  government_type_list_advances_row: "[Concept('advances', 'Поступ')|e]: $VAL$"
  government_type_list_heir_selection_row: "[Concept('heir_selections', 'Престолонаслідування')|e]: $VAL$"
  government_type_list_laws_row: "[Concept('laws', 'Звід законів')|e]: $VAL$"
  government_type_list_policies_row: "[Concept('policies', 'Політики')|e]: $VAL$"
  government_type_list_estate_privileges_row: "[Concept('estate_privileges', 'Станові привілеї')|e]: $VAL$"
  monarchy_desc: "Монархія — це [Concept('government_type', 'форма правління')|e], заснована на принципі особистої неподільної влади. [Concept('ruler', 'Правитель')|e] є першою особою вищого стану. [Concept('heir', 'Наступником')|e] зазвичай стає представник [Concept('dynasty', 'династії')|e] монарха, і в більшості випадків він править до своєї смерті.\n\n$game_concept_monarchs$ можуть укладати [Concept('alliances', 'союзи')|e] за допомогою [Concept('royal_marriages', 'династичних шлюбів')|e] і навіть успадковувати чужі [Concept('countries', 'країни')|e] за допомогою [Concept('personal_unions', 'особистих уній')|e]. Однак престолонаслідування часто супроводжується труднощами, і монархія легко може опинитися під владою [Concept('regencies', 'регента')|e] або під впливом чужоземних династій."
  republic_desc: "Республіка — це [Concept('government_type', 'форма правління')|e], за якої [Concept('rulers', 'правителі')|e] виступають як представники громадян. Їх обирають на певний термін у результаті [Concept('election', 'виборів')|e]. Залежно від принципів [Concept('heir_selection', 'передачі влади')|e] правитель може належати до різних [Concept('estates', 'станів')|e].\n\nСила політичних інститутів полегшує зміну влади в республіках, але менш особиста роль правителя обмежує кількість доступних інструментів дипломатії. У зв’язку з цим [Concept('dynasties', 'династії')|e] відіграють менш важливу роль, і республіки не можуть користуватися [Concept('royal_marriages', 'династичними шлюбами')|e]."
  theocracy_desc: "Теократія — це [Concept('government_type', 'форма правління')|e], заснована на принципі божественної влади. [Concept('ruler', 'Правитель')|e] обирається з числа служителів віри, а світські питання перебувають у віданні релігійної влади.\n\n$game_concept_rulers$ зазвичай обираються довічно за допомогою тієї чи іншої форми [Concept('election', 'виборів')|e], що робить зміну влади менш болісною."
  steppe_horde_desc: "Кочова орда — це [Concept('government_type', 'форма правління')|e], заснована на військовій силі [Concept('ruler', 'правителя')|e]. Родичі чинного правителя мають більше шансів стати [Concept('heir', 'наступниками')|e], але старшинство та особисті [Concept('abilities', 'навички')|e] також відіграють велику роль.\n\nПравителі належать до вищого стану. Вірність орді забезпечується їхньою здатністю підкоряти, грабувати та спустошувати сусідні [Concept('countries', 'країни')|e]. У зв’язку з цим зміна влади є знаковою подією для кочової орди і може навіть призвести до колапсу, якщо новий правитель не зможе продемонструвати свою силу."
  tribe_desc: "Плем’я — це [Concept('government_type', 'форма правління')|e], за якої політична вага насамперед спирається на спорідненість, чи то по крові, чи через міфологічних предків.\n\n[Concept('dynasties', 'Династії')|e] та сімейні зв’язки відіграють головну роль при виборі [Concept('heir', 'наступника')|e], який завжди належить до вищого стану. Старшинство, особисті [Concept('abilities', 'навички')|e] та військова доблесть також відіграють важливу роль."
  estate_privilege_description_tt: "Не можна відкликати. Причини:\n[UIAction.GetDescription]"
