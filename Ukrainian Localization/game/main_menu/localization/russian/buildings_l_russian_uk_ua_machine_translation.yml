l_russian:
  colonial_category: "Колоніальні споруди"
  colonial_category_desc: "Ці споруди можна будувати в чужих незахоплених землях, щоб поширювати там наш вплив."
  cultural_category: "Культурні споруди"
  cultural_category_desc: "Ці споруди допомагають нам просвіщати неосвічені маси та розвивати свою культуру."
  defense_category: "Оборонні споруди"
  defense_category_desc: "Ці споруди призначені для оборони району, їх вплив може поширюватися і на сусідні райони."
  government_category: "Урядові споруди"
  government_category_desc: "Ці споруди безпосередньо управляються державою і служать для зміцнення її влади."
  infrastructure_category: "Інфраструктурні споруди"
  infrastructure_category_desc: "Ці споруди підвищують цінність району, в якому побудовані."
  military_category: "Військові споруди"
  military_category_desc: "Ці споруди дозволяють навчати військові загони в тому районі, де побудовані."
  naval_category: "Морські військові споруди"
  naval_category_desc: "Ці споруди призначені для будівництва кораблів та підвищення [Concept('natural_harbor_suitability','придатності природної гавані')|e]."
  rgo_building_category: "Виробництво ресурсів"
  rgo_building_category_desc: "За допомогою цих [Concept('buildings','споруд')|e] ми можемо видобувати різні [Concept('raw_materials','ресурси')|e]."
  trade_company_building: "Споруда торговельної компанії"
  satellite_trade_building: "Торговельна споруда залежної країни"
  guild: "Гільдія"
  workshop: "Майстерня"
  midgame_manufactory: "Мануфактура"
  lategame_manufactory: "Фабрика"
  unique_palace: "Особливий палац"
  basic_industry_category: "Основна промисловість"
  basic_industry_category_desc: "Ці [Concept('buildings','споруди')|e] дозволяють виробляти [Concept('goods','товари')|e], які в основному використовуються іншими спорудами."
  weapons_industry_category: "Збройна промисловість"
  weapons_industry_category_desc: "Ці [Concept('buildings','споруди')|e] дозволяють виробляти [Concept('goods','товари')|e] для військових потреб."
  consumer_goods_category: "Споживчі товари"
  consumer_goods_category_desc: "Ці [Concept('buildings','споруди')|e] дозволяють виробляти [Concept('goods','товари')|e] для [Concept('pops','населення')|e]."
  estate_category: "Споруди станів"
  estate_category_desc: "[Concept('estates','Стани')|e] будують ці споруди для власної вигоди."
  religious_category: "Релігійні споруди"
  religious_category_desc: "Ці споруди слугують для проведення релігійних обрядів і збільшують вплив священників у державі."
  trade_category: "Торговельні споруди"
  trade_category_desc: "Ці споруди покращують нашу національну торгівлю, дозволяючи купцям ефективніше торгувати або діяти на нових ринках."
  village_category: "Села"
  village_category_desc: "Ці села можна побудувати у сільській місцевості."
  irrigation_systems: "Іригація"
  bridge_infrastructure: "Міст"
  mason: "Будівля каменярів"
  construction_center: "Будівельний центр"
  construction_center_desc: "Дозволяє зводити в [Concept('town_or_city','міському районі')|e] кілька споруд одночасно."
  trade_office: "Торговельна контора"
  embassy: "Посольство"
  black_market: "Чорний ринок"
  black_market_desc: "На цьому незаконному ринку можна торгувати подалі від пильних очей влади, не турбуючись про податки і жадібних приставів."
  smuggler_cove: "Бухта контрабандистів"
  smuggler_cove_desc: "Перевезення незаконних товарів і процвітання чорних ринків можливе завдяки вузьким прибережним затокам або затишним гаваням. $smuggler_cove$ — яскравий приклад такого таємного місця."
  brothel: "Бордель"
  brothel_desc: "Борделі, де процвітає порок і розпуста, є улюбленими місцями розваг піратів, каперів та інших сумнівних особистостей."
  pirate_tavern: "Таверна в гавані"
  pirate_tavern_desc: "Жваві заклади, де збираються різного роду ділки, моряки та купці. Ці таверни розташовуються в різних портових містах і відіграють найважливішу роль у житті піратів. Тут екіпаж може відпочити, витратити здобич на випивку, їжу та розваги, а також найняти нових людей до команди."
  building_trade_hq_only_one: "За раз можна побудувати лише один штаб торговельної компанії."
  trade_company_headquarters: "Штаб торговельної компанії"
  trade_company_headquarters_desc: "Штаб — це серце будь-якої майбутньої #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#!. Він є центром міжнародної та заморської торгівлі в інтересах батьківщини."
  trade_company_garrison: "Гарнізон компанії"
  trade_company_garrison_desc: "Гарнізон #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! захищає місцеві інтереси купців."
  trade_company_harbor: "Гавань компанії"
  trade_company_harbor_desc: "На місцевих складах #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! зберігається готовий до продажу товар."
  trade_company_local_venture: "Місцеві підприємства компанії"
  trade_company_local_venture_desc: "Ці підприємства створює #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельна компанія#!#! у спробі використати місцеві ресурси з вигодою для себе."
  trade_company_foreign_influence: "Чужоземний вплив компанії"
  trade_company_foreign_influence_desc: "Ця колоніальна споруда #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! відкриває можливості для іноземних груп населення."
  trade_company_governance: "Керівництво компанії"
  trade_company_governance_desc: "Місцева військова споруда #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#!, де йде вербування та навчання військ, які відстоюватимуть інтереси компанії."
  settlement_building: "Поселення"
  bailiff: "Бейліф"
  training_fields: "Навчальний полігон"
  fishing_village: "Рибальське село"
  farming_village: "Землеробське село"
  forest_village: "Лісове село"
  market_village: "Торговельне село"
  market_village_explanation: "Поруч є [Concept('own','належні')|e] нам [Concept('locations','райони')|e], де побудовано [ShowBuildingTypeName('market_village')|l]"
  tar_kiln: "Дьогтьова яма"
  stone_quarry: "Каменоломня"
  lumber_mill: "Лісопилка"
  sand_pit: "Піщаний кар'єр"
  fiber_crops_farm: "Поля прядильних культур"
  sheep_farms: "Вівчарські господарства"
  clay_pit: "Глинокопальня"
  charcoal_maker: "Вуглевипалювальна піч"
  improved_charcoal_maker: "Вуглевипалювач"
  improved_charcoal_maker_desc: "Нові методи спалювання вугілля дозволяють нам виробляти більше вугілля та підвищують швидкість обігу."
  pound_lock_canal_infrastructure: "Судноплавний шлюз"
  elephant_hunting_grounds: "Місця полювання на слонів"
  kilwan_shipwrights: "Кілванські суднобудівники"
  kilwan_shipwrights_desc: "Умілі майстри виготовляють морські судна з пальмової деревини та бавовни. Ця споруда допоможе нам розширити свій флот та втілити в життя морські прагнення."
  bog_iron_smelter: "Велика плавильня заліза"
  bog_iron_smelter_desc: "Залізо — основа всієї металургії. В ідеалі найкраще мати повноцінні, великі поклади, але за їх відсутності можна видобути трохи металу там, де він накопичується біля води."
  protected_harbor: "Захищена гавань"
  protected_harbor_desc: "Деякі місця за своєю природою особливо добре підходять під гавані, але відповідною інфраструктурою можна покращити що завгодно."
  temple: "Храм"
  cathedral: "Кафедральний собор"
  counting_house: "Контора"
  merchants_quarters: "Купецьке подвір'я"
  merchants_quarters_desc: "У цьому жвавому подвір'ї розташовано безліч крамниць та сховищ. Тут постійно щось обмінюють та купують."
  marketplace: "Ринок"
  marketplace_desc: "Цей гамірний ринок стимулює розвиток торгівлі на локальному та регіональному рівнях. Тут можна знайти як місцеві, так і привізні товари."
  grand_marketplace: "Великий ринок"
  grand_marketplace_desc: "Великий процвітаючий центр торгівлі."
  commerce_center: "Торговий центр"
  commerce_center_desc: "Жвавий торговий центр, де можна купити товари з усього світу. Якщо у вас, звісно, є золото. Серце місцевої торгівлі."
  granary: "Амбар"
  qullqa: "Кілька"
  minting_office: "Монетний двір"
  port_authority: "Портове управління"
  orthodox_monastery: "Православний монастир"
  miaphysite_monastery: "Міафізитський монастир"
  seat_of_cardinal: "Кафедра кардинала"
  seat_of_cardinal_why: "Лише #TOOLTIP:RELIGION,catholic,X #L католицька#!#! держава з [Concept('country_rank','рангом')|e] #TOOLTIP:COUNTRY_RANK,rank_duchy,X #L «Герцогство»#!#! і вище може #TOOLTIP:GENERIC_ACTION,request_cardinal_seat,X #L попросити про кафедру кардинала#!#! для [Concept('location', 'району')|e], де є #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедральний собор#!#!."
  has_religious_building: "Можна просити лише для [Concept('location', 'району')|e], де є #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедральний собор#!#!"
  wharf: "Пристань"
  medical_school: "Медичне училище"
  hospital: "Лікарня"
  pest_house: "Чумний барак"
  pest_house_desc: "Це невелика хатина за межами поселення, де в неволі утримуються хворі та заразні, щоб епідемія не перекинулася на решту жителів."
  pest_house_tt: "Можна будувати під час [Concept('situation','ситуації')|e] #TOOLTIP:SITUATION,black_death,X #L «Чорна смерть»#!#!, лише якщо застосовано дію #TOOLTIP:GENERIC_ACTION,strict_quarantines,X #L «Вигнання хворих»#!#!."
  lazaretto: "Карантин"
  lazaretto_desc: "Це невелика віддалена лікарня, зазвичай у сільській місцевості, на острові або на узбережжі. Сюди поміщають морських мандрівників, якщо виникає підозра, що вони можуть переносити заразні хвороби. Карантини допомагають сильно обмежити поширення епідемій у районі."
  lazaretto_why: "Можна будувати лише в #Y прибережних#! районах"
  slave_market: "Невільничий ринок"
  art_school: "Школа мистецтв"
  funduq: "Караван-сарай"
  funduq_desc: "Громадська будівля у важливих торгових містах. Тут купці відпочивають, проводять зустрічі та зберігають свої товари."
  fortress_granary: "Агадір"
  fortress_granary_desc: "Укріплене громадське сховище, традиційне для народів Північної Африки. Такі споруди будували на вершинах пагорбів, що дозволяло захищати запаси та обороняти прилеглі угіддя і степи."
