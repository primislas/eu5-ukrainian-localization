  republican_assembly: "Республіканські збори"
  uffizi: "Уффіці"
  alhambra: "Альгамбра"
  royal_garden: "Королівський сад"
  royal_garden_desc: "Обширний королівський сад — острівець раю на Землі. Тут придворні можуть відпочити й віддатися дозвільним розвагам, милуючись величними рукотворними краєвидами."
  pirate_stronghold: "Піратська фортеця"
  pirate_stronghold_desc: "Лігво покидьків суспільства та найвідчайдушніших каперів, що зневажають закони. Ця споруда — серце піратської республіки."
  entrepot: "Пакгауз"
  trading_hub: "Торговий вузол"
  customs_house: "Митниця"
  stock_exchange: "Біржа"
  clearing_house: "Розрахункова палата"
  market_warehouse: "Ринковий склад"
  cantonments: "Кантонмент"
  grand_palace: "Великий палац"
  great_madrasa: "Велике медресе"
  tibetan_great_monastery: "Великий тибетський монастир"
  tower_of_belem: "Торре-ді-Белен"
  fortezza_di_sant_andrea: "Форт Сант-Андреа"
  fortezza_di_sant_andrea_desc: "Ця фортеця захищала Венецію понад триста років."
  great_temple_of_tenochtitlan: "Великий храм Теночтітлана"
  corporation_of_london: "Міська корпорація"
  grand_apartment: "Величний особняк"
  versailles: "Версаль"
  sanssouci: "Сан-Сусі"
  berlin_palace: "Берлінський палац"
  schonbrunn_palace: "Палац Шенбрунн"
  rock_of_monaco: "Скеля Монако"
  camara_comptos: "Камара-де-комптос"
  camara_comptos_desc: "#italic $camara_comptos$#! — це суверенний суд у фінансових справах. Він створений за подібністю однойменної організації в Парижі."
  llotja_seda: "Лонха-де-ла-Седа"
  llotja_seda_desc: "Цей приголомшливий уяву шедевр складається з трьох частин, у тому числі багато прикрашеного спіральними колонами торгового залу #italic Сала-де-Контратасьйон#!, де укладають угоди купці, та консульського павільйону, де засідає #italic Консолат-де-Мар#!. У центральній же вежі Лонхи знаходиться боргова в'язниця."
  zwinger: "Цвінгер"
  zwinger_desc: "На землях цього палацового комплексу ростуть сади та проводяться фестивалі. Також тут відведено місце для майбутнього замку."
  globe_theatre: "Театр «Глобус»"
  globe_theatre_desc: "Це дерев'яне розважальне місце під відкритим небом розважатиме багато поколінь відвідувачів. Вельми вогненебезпечно."
  globe_theatre_why: "$globe_theatre$ можна побудувати лише під час події."
  adm_vatican_library: "Ватиканська бібліотека: адміністративне крило"
  dip_vatican_library: "Ватиканська бібліотека: дипломатичне крило"
  mil_vatican_library: "Ватиканська бібліотека: військове крило"
  wisselbank: "Амстердамський банк"
  bolshoi_theater: "Великий театр"
  bolshoi_theater_desc: "У цьому розкішному театрі, який побудований у неокласичному стилі, ставляться балетні та оперні постановки світового рівня. Глядачам гарантовані оглушливі вистави."
  bolshoi_theater_why: "$bolshoi_theater$ можна побудувати лише під час події."
  archive_of_the_indies: "Архів Індій"
  archive_of_the_indies_desc: "Цей архів був побудований для зберігання всіх документів, пов'язаних з нашою заморською діяльністю."
  archive_of_the_indies_why: "$archive_of_the_indies$ можна побудувати лише під час події."
  hsa_burgtor: "Бургтор"
  hsa_burgtor_desc: "Зведений як головні ворота нашої столиці, $hsa_burgtor$ є яскравим свідченням нашого досвіду в будівництві укріплень, а також вражаючим пам'ятником готичної архітектури."
  bodrum_castle: "Замок Святого Петра"
  bodrum_castle_desc: "$bodrum_castle$ — головна #L #L [GetCountry('KNI').GetAdjective|l]#!а#! фортеця в материковій частині #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Замок увінчують чотири вежі, зведені різними народами — англійцями, французами, італійцями та німцями. Він служить оплотом християн у регіоні."
  chi_macau_port: "Договірний порт Макао"
  chi_macau_port_desc: "$chi_macau_port$ — територія, віддана в оренду #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_DP')|L]#!#!. [GetCountry('POR').GetAdjectiveWithNoTooltip]ий уряд повинен щорічно виплачувати за неї значну суму золота."
  chi_missionary_building: "Францисканська місія"
  chi_missionary_building_desc: "$missionary_building_desc$"
  forbidden_city: "Заборонене місто"
  forbidden_city_desc: "$forbidden_city$ — воістину грандіозний комплекс, якому немає рівних у державі. Це єдиний палац, гідний правителів #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної держави#!#!."
  college_of_poets: "Колегіум поетів і математиків"
  college_of_poets_desc: "Колегіум поетів уособлює наш внесок у розвиток гуманістичних наук. Тут творці нашої вітчизни отримуватимуть найкращу освіту."
  college_of_poets_why: "$college_of_poets$ можна побудувати лише під час події."
  bibliotheca_corviniana: "Бібліотека Корвіна"
  bibliotheca_corviniana_desc: "$bibliotheca_corviniana$ — це знаменита бібліотека епохи Відродження, де міститься велика колекція манускриптів і книг."
  the_cipher_secretary: "Шифрувальна контора"
  the_cipher_secretary_desc: "Шифрувальна контора — державна установа, що шифрує листи торговців і дипломатів для захисту інтересів Республіки."
  teatro_san_cassiano: "Театр Сан-Кассіано"
  teatro_san_cassiano_desc: "$teatro_san_cassiano$ — перший у світі публічний оперний театр. Його будівництво стало важливою віхою в історії виконавського мистецтва та зміцнило роль Венеції як головного культурного центру."
  doges_palace: "Палац дожів"
  doges_palace_desc: "Палац дожів у Венеції — резиденція дожа, найвищого чиновника та глави Венеційської республіки."
  piazza_san_marco: "Площа Святого Марка"
  piazza_san_marco_desc: "Площа Святого Марка — головна громадська площа у Венеції, відома величними архітектурними спорудами: базилікою Святого Марка, Кампанілою, Палацом дожів і не тільки. Служить громадським, релігійним та політичним центром міста."
  walls_of_ston: "Фортечні мури Стона"
  walls_of_ston_desc: "Фортечні мури Стона — довга фортифікаційна споруда, що захищає торгове місто Рагуза."
  swi_collegium_helveticum: "Швейцарський колегіум"
  swi_collegium_helveticum_desc: "$swi_collegium_helveticum$ навчає найталановитіших священників країни. Колегіум знаходиться не на швейцарській землі, але є головним місцем навчання богословів, що подають надії."
  swi_collegium_helveticum_why: "$swi_collegium_helveticum$ можна побудувати лише в ході події."
  kastellet: "Кастеллет"
  kastellet_desc: "$kastellet$ — фортеця у формі зірки, зведена в Копенгагені для захисту міста від нападів із суші та моря. П'ять бастіонів фортеці з'єднуються товстими стінами, навколо яких вирито рів."
  kronborg: "Кронборг"
  kronborg_desc: "Замок $kronborg$, розташований біля входу в протоку Ересунн, з давніх-давен служив головною фортецею для контролю над протокою. Крім того, тут стягувалися мита із суден, що проходять між Балтійським і Північним морями."
  husuni_kubwa: "Хусуні Кубва"
  husuni_kubwa_desc: "Вишуканий палацовий комплекс, замовником якого був [GetCharacter('zan_abu_al_mawahib_al_hasan_ibn_suleiman').GetName]. У цій резиденції розташовувалися красиві #TOOLTIP:CULTURE,$swahili_culture_tt$,X #L суахільські#!#!! архітектурні споруди. Комплекс використовувався для королівських і торгових потреб, фактично будучи центром торгівлі та зберігання товарів для численних купців із наших володінь."
  magistrato_alla_sanita: "Управління охорони здоров'я"
  magistrato_alla_sanita_desc: "Управління охорони здоров'я — орган влади, що відповідає за здоров'я населення. Вживає заходів щодо профілактики та запобігання епідеміям чуми й інших хвороб, а також контролює виконання цих заходів."
  imperial_city_of_hue: "Імперське місто $hue_location$"
  imperial_city_of_hue_desc: "$imperial_city_of_hue$ — обнесений стіною палац у межах столичної цитаделі, що служить резиденцією імператорського сімейства $DAI$."
  lighthouse_of_alexandria: "Александрійський маяк"
  lighthouse_of_alexandria_desc: "$lighthouse_of_alexandria$ — грандіозна споруда та одне із Семи чудес Стародавнього світу. Після нещодавнього відновлення він знову освітлює шлях кораблям в Александрійській гавані та уособлює сучасну данину своїй давній спадщині."
  al_azhar_madrasa: "Медресе Аль-Азхар"
  al_azhar_madrasa_desc: "$al_azhar_madrasa$ — один із найстаріших та найавторитетніших ісламських навчальних закладів світу. Славиться своєю освітою в галузі богослов'я, права та арабської мови."
  castel_sant_angelo: "Замок Святого Ангела"
  castel_sant_angelo_desc: "$castel_sant_angelo$ був задуманий імператором Адріаном як сімейний мавзолей, а згодом перетворений папами на одну з найнеприступніших фортець #TOOLTIP:LOCATION,rome_tt,X #L Риму#!#!."
  quirinal_palace: "Квіринальський палац"
  quirinal_palace_desc: "$quirinal_palace$ — літня резиденція пап, розташована на однойменному пагорбі з видом на [ShowLocationName('rome')]."
  ambras_castle: "Замок Амбрас"
  ambras_castle_desc: "Ця середньовічна фортеця, перебудована на резиденцію правлячої династії, також має церемоніальне та культурне значення, оскільки в ній зберігається велика колекція предметів мистецтва та різних диковинок, зібраних нашими правителями."
  belvedere_palace: "Бельведерський палац"
  belvedere_palace_desc: "Палац Бельведер, розташований у Відні, відомий своїм розкішним оформленням і є важливим культурним центром, де зберігається безліч зразків європейського мистецтва."
  sco_palace_of_holyroodhouse: "Голірудський палац"
  sco_palace_of_holyroodhouse_desc: "Будучи яскравим прикладом #TOOLTIP:CULTURE,scottish,X #L шотландської#!#! архітектури епохи Відродження, Голірудський палац також є головною резиденцією #L #L [GetCountry('SCO').GetGovernment.GetAdjective|l]#!ої#! родини."
  fra_louvre_museum: "Музей Лувра"
  fra_louvre_museum_desc: "Луврський палац, який $french_group$ вважає символом своєї аристократії, перетворений на публічний музей, де виставляються найкращі витвори мистецтва держави [GetCountry('FRA').GetNameWithNoTooltip]."
  ablaq_palace: "Палац у стилі аблак"
  ablaq_palace_desc: "Ця розкішна резиденція єгипетських правителів прикрашена кладкою під назвою «аблак». У священних залах палацу вишивають шовкове покривало кісву, якою покривається $kaaba$."
  mamluk_barracks: "Казарми мамлюків"
  mamluk_barracks_desc: "У цих казармах живуть елітні підрозділи воїнів-невільників. Ці приміщення обладнані всім необхідним для того, щоб допомогти чужоземним рабам переймати наш спосіб життя, вивчати священні тексти та тренуватися, щоб стати дисциплінованими воїнами."
  bey_fortress: "Фортеця бея"
  bey_fortress_desc: "Такі фортеці являють собою системи укріплень та земляних валів. Часто вони прилягають до великих поселень, де слугують продовженням місцевих веж та стін."
  theodosian_walls: "Феодосієві стіни"
  theodosian_walls_desc: "Вони зведені за наказом Костянтина Великого та захищають одне з найславніших міст Європи. Роки потому, після того, як за часів імператора Феодосія II подвійна лінія стін була добудована, захист міста став свого роду легендою та вважався непереборним."
  hanseatic_town_hall: "Ганзейська ратуша"
  hanseatic_town_hall_desc: "Ця ратуша є серцем нашого торгового союзу та символом його величезного багатства й впливовості."
  hanseatic_shipwright_guild: "Ганзейська гільдія корабелів"
  hanseatic_shipwright_guild_desc: "Ця споруда свідчить про те, що тут працюють досвідчені ганзейські корабели."
  ruined_great_wall_of_china: "Стародавня Велика Китайська стіна"
  repaired_great_wall_of_china: "Велика Китайська стіна"
  hand_cannon_guild: "Гільдія з виробництва пищалей"
  urban_parliament_seat: "Місце в міському парламенті"
  polders: "Польдери"
  galley_barracks: "Казарми для галерних гребців"
  janissary_barracks: "Казарми яничарів"
  ghilman_barracks: "Казарми гулямів"
  safaviyya_order_hall: "Зал Сефевіє"
  pounamou_carver: "Будівля різьбяра по поунаму"
  bardic_school: "Школа бардів"
  bardic_school_desc: "У цьому світському навчальному закладі майбутні барди пізнають традиційне мистецтво поезії, право та історію."
  lutheran_preachers: "Будівля лютеранських проповідників"
  calvinist_preachers: "Будівля кальвіністських проповідників"
  distance_to_rome: "Відстань до #TOOLTIP:LOCATION,rome_tt,X #L Риму#!#!"
  hanseatic_kontor: "Ганзейська контора"
  fondaco: "Фондако"
  venetian_arsenal: "Венеційський арсенал"
  kurultai: "Курултай"
  gallowglass_sept: "Септ галлогласів"
  gallowglass_sept_desc: "Це невелике поселення є водночас домом для невеликого клану та місцем для тренувань його воїнів."
  banking_office: "Банк"
  tribes_of_galway: "Будівля сімей Голуея"
  tribes_of_galway_desc: "Усю політику Голуея міцно тримають у руках суперницькі місцеві купецькі сім'ї."
  copenhagen_dockyard: "Копенгагенська верф"
  caravanserai: "Караван-сарай"
  caravan_stop: "Стоянка караванів"
  cinque_port: "Один із П'яти портів"
  cinque_port_desc: "Цей старий порт входить до союзу П'яти портів і забезпечує важливу підтримку короні в обмін на гарантії традиційних прав автономії."
  eng_royal_forest: "Королівський ліс"
  eng_royal_forest_desc: "Лісова хартія передає величезні мисливські угіддя в пряме розпорядження правителя. Під «лісом» у даному випадку маються на увазі будь-які землі, придатні для полювання."
  can_only_destroy_building_through_parliament_issue_tt: "Можна знищити лише через [Concept('parliament_issue','парламентське питання')|e]!"
  north_sea_shipyards: "Верфі Північного моря"
  enderun_academy: "Школа Ендерун"
  imperial_halic_shipyards: "Імперський арсенал"
  imperial_halic_shipyards_desc: "Величезний комплекс, до якого входять судноверфі, сухі доки, кузні, прядильні цехи і навіть шпиталь та в'язниця. Це місце — гідна база для імператорського флоту."
  stannary_court: "Суд станнарія"
  stannary_court_desc: "Це суд, який заснували олов'яні рудокопи Корнуолла та Девона після того, як їм у 1305 році королівським указом було даровано судову незалежність."
  stannary_court_why: "Доступно лише для #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_RP')|L]#!#!. Можна побудувати лише в провінціях [ShowProvinceDefinitionName('cornwall_province')] та [ShowProvinceDefinitionName('devon_province')] після ухвалення закону про станнарії."
  stannary_court_destroy: "[Concept('event', 'Подія')|e] «$flavor_eng.67.title$» сталася після #Y 1601#! року"
  lieutenancy: "Лейтенантство"
  lieutenancy_desc: "Будівля лейтенантства — це місце, де знаходиться лейтенант, який керує регіоном від імені правителя."
  not_in_capital_region: "Не можна побудувати в [Concept('capital', 'столичному')|e] [Concept('region', 'регіоні')|e]"
  ostrog: "Острог"
  ostrog_desc: "$ostrog$ — це невелике дерев'яне укріплення на віддалених територіях Росії. Завдяки використанню деревини остроги будуються відносно швидко і недорого."
  pomor_outpost: "Поморська факторія"
  pomor_outpost_desc: "$pomor_outpost$ — це основна споруда, куди промисловики приносять хутро та рибу. Багато селян вирушають у сибірську тайгу в надії заробити на життя полюванням на хутрового звіра."
  sofa_stockade: "Посилення софа"
  sofa_stockade_desc: "Посилення софа мало чим відрізняється від звичайних укріплень. Але ось використання піхотинців софа замість ополченців робить посилення софа серйозною перешкодою."
  sofa_barracks: "Казарми софа"
  sofa_barracks_desc: "Казарми софа — це особливий тип казарм, що дозволяють набирати в [Concept('location','районі')|e] #TOOLTIP:UNITTYPE,a_sofa_infantry,X #L піхотинців софа#!#! та #TOOLTIP:UNITTYPE,a_mandekalu_cavalry,X #L вершників мандекалу#!#!."
  viceroyalty: "Віце-королівство"
  viceroyalty_desc: "Офіційна резиденція та адміністративний центр віце-короля, що управляє пожалуваною йому територією від імені правителя."
  barcelona_royal_shipyard: "Королівські верфі в Барселоні"
  barcelona_royal_shipyard_desc: "Королівські верфі в Барселоні, відомі також як «Рейалс Драссанес де Барселона», знаходяться поруч з Барселонською гаванню. Ці верфі були побудовані в XIII столітті і з тих пір були кілька разів розширені. Вони служать центром суднобудування, морським арсеналом та сховищем галер, які відіграють важливу роль у морських справах."
  royal_atarazanas_seville: "Королівські верфі в Севільї"
  royal_atarazanas_seville_desc: "Королівські верфі в Севільї — це найважливіші верфі Кастилії та одні з найважливіших на Піренейському півострові. Тут будуються кораблі для правителів."
  royal_audience_and_chancery: "Королівська аудієнсія та канцелярія"
  royal_audience_and_chancery_desc: "$royal_audience_and_chancery$ — це вищий судовий орган, що володіє владою над усією країною. Символ королівської могутності."
  general_archive_of_simancas: "Головний архів у Сіманкасі"
  general_archive_of_simancas_desc: "$general_archive_of_simancas$ — перший офіційний державний архів у Європі, що служить для централізованого зберігання найважливіших документів держави."
  sevilla_bullfighting_school: "Севільська школа тавромахії"
  sevilla_bullfighting_school_desc: "$sevilla_bullfighting_school$ — перший офіційний навчальний заклад, де готують матадорів для підтримки легендарної культурної традиції."
  el_escorial_palace: "Ескоріал"
  el_escorial_palace_desc: "Цей палац служить одночасно і як монарша резиденція, і як монастир ордену Святого Августина. Це символ могутності та благочестя нашого народу."
  school_of_salamanca: "Саламанкська школа"
  school_of_salamanca_desc: "Головне призначення цієї школи — розвиток сучасної думки в таких дисциплінах, як право, етика, економіка та інших."
  segovia_artillery_academy: "Артилерійська академія в Сеговії"
  segovia_artillery_academy_desc: "Перша у своєму роді академія, присвячена вивченню артилерійської справи. Вона відіграє найважливішу роль у дослідженні та розвитку знарядь, а також методів їх застосування на полі бою."
  brethren_marsh: "Порт «Болотних братів»"
  brethren_marsh_desc: "Цей порт належить «Болотним братам» — морській організації, яка займається міжнародною торгівлею та створює оборонну мережу з належних їй портів. Тут знаходяться центри кораблебудування."
  cawa_barracks: "Казарми чева"
  cawa_barracks_desc: "Тут навчаються полки чева."
  kings_manor: "Королівське помістя"
  kings_manor_desc: "Це адміністративний центр, де вирішуються судові справи. Використовується Радою Півночі."
  kings_manor_why: "Можна побудувати лише в районі [ShowLocationName('york')] після заснування Ради Півночі."
  calmecac: "Кальмекак"
  calmecac_desc: "#italic Кальмекак#! — це школа для дітей аристократів, де глибоко вивчаються історія, релігія, військова справа та інші науки. Ця установа поруч із Великим храмом у місті [ShowLocationName('tenochtitlan')] відіграє головну роль в освіті майбутніх жерців. Молоді простолюдини навчаються в #italic тельпочкаллі#!, а майбутні знатні лідери проходять навчання в #italic кальмекаках#!, часто під опікою військових орденів."
  telpochcalli: "Тельпочкаллі"
  telpochcalli_desc: "#italic Тельпочкаллі#! в перекладі з мови науатль означає «будинок молодих людей». Це школа, де молоді люди, починаючи з п'ятнадцяти років, навчаються громадській діяльності та військовій справі. Юнаків тут чекають фізична активність, холодні купання та мізерне харчування — тобто все для зміцнення тіла та духу наших майбутніх воїнів."
  panaqa_building: "Панака"
  panaqa_building_desc: "Цей район знаходиться у володінні сім'ї попереднього правителя. Нинішній правитель влади над цими землями не має."
  pukara_building: "Пукара"
  pukara_building_desc: "$pukara_building$ — це зведена в горах або на пагорбі споруда для зберігання зброї та оборони. Будівництво з урахуванням рельєфу місцевості робить ці споруди відносно недорогою альтернативою звичайним фортецям."
  terraces: "Тераси"
  terraces_desc: "$terraces$ — це облагороджені схили в регіоні Анд, де ведеться землеробство. Вони будуються на різних висотах і мають родючий ґрунт для спільного вирощування багатьох різних культур."
  tambo: "Тамбо"
  tambo_desc: "$tambo$ — це склад інків. Призначення тамбо сильно відрізняється залежно від розміру споруди. Малі тамбо слугують придорожніми привалами для подорожніх, а в більших можуть навіть засідати місцеві управителі."
  incamisana: "Інкамісана"
  incamisana_desc: "$incamisana$ — це храм, збудований для поклоніння воді та її небесним покровителям. У цій споруді краса архітектури поєднується з винахідливістю: це одночасно і релігійна споруда, і іригаційна система."
  order_commandery: "Командорство ордену"
  order_commandery_desc: "$order_commandery$ — це споруда, яка належить військовому ордену за межами його власної території та виконує дві функції: збір податей з навколишніх земель та набір нових членів ордену."
  order_commandery_tt: "Завдяки власнику у нас є [ShowRelationTypeName('military_sponsorship')|l]"
  royal_society: "Королівське товариство"
  royal_society_desc: "$royal_society$ — це наукова установа, яка займається примноженням наукового знання шляхом досліджень, публікацій та розвитку науки."
  royal_society_why: "Можна побудувати лише в столиці після заснування Королівського товариства."
  royal_academy_of_arts: "Королівська академія мистецтв"
  royal_academy_of_arts_desc: "$royal_academy_of_arts$ — це установа, яка займається заохоченням, підтримкою та розвитком образотворчого мистецтва та архітектури через освіту, організацію виставок та прославлення мистецьких талантів."
  royal_academy_of_arts_why: "Можна побудувати лише в столиці після заснування Королівської академії мистецтв."
  peel_towers: "Піль-вежа"
  peel_towers_desc: "$peel_towers$ — це оборонна споруда, яка зміцнює місцеву оборону та допомагає володінням відновлюватися після військових конфліктів."
  dun_fort: "Резиденція клану"
  dun_fort_desc: "$dun_fort$ будується з каменю та слугує укріпленою оселею для клану. За допомогою таких фортець клани утверджують своє унікальне становище в нашому суспільстві."
  fortress_church: "Укріплена церква"
  fortress_church_desc: "$fortress_church$ виконує дві функції. У мирні часи вона слугує звичайною церквою для парафіян, але у випадку облоги може використовуватися як оборонна споруда."
  kokufu: "Кокуфу"
  kokufu_desc: "Посада намісника, який керує низкою японських провінцій. Сім'ї, що стоять на їх чолі, набувають великої влади та впливу."
  kokufu_why_tt: "#TOOLTIP:BUILDING_TYPE,kokufu,X #L Кокуфу#!#! не можна побудувати, їх дарує [Concept('international_organization_leader_short', 'лідер')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,japanese_shogunate,X #L Японського Сьогунату#!#!"
  gosho: "Ґосьо"
  gosho_desc: "В імператорських палацах Ґосьо живе імператор разом зі своїм двором та чиновниками. Ґосьо слугують центрами імператорського впливу."
  yamashiro: "Ямасіро"
  yamashiro_desc: "Ямасіро будуються спеціально на випадок оборони і являють собою фортеці на вершині пагорба, укріплені замість кам'яних стін земляними насипами та дерев'яним частоколом. Житла панів та їхньої дружини знаходяться біля підніжжя, а під захист укріплення їхні мешканці віддаляються лише у випадку ворожого нападу. Найбільш потужні ямасіро являють собою системи з кількох укріплених пагорбів, з'єднаних насипними переходами та багаторівневими частоколами."
  yakata: "Наката"
  yakata_desc: "Накати — колишні резиденції сімей придворних воїнів та оплоти їхньої влади. Тут знаходяться приміщення для васалів, а також захисні споруди. У накатах збираються найкращі представники кожного клану."
  shoen: "Сьоен"
  shoen_desc: "Землі, передані у володіння сім'ї або храму. Власники цих приватних, фактично незалежних маєтків мають величезну владу та вплив."
  tatara: "Татара"
  tatara_desc: "Традиційна японська піч, де виплавляють залізо та сталь для виробництва високоякісних інструментів та зброї."
  clan_shipyards: "Кланові верфі"
  clan_shipyards_desc: "Японія — острівна держава, оточена морем. Не дивно, що деякі її жителі володіють особистими невеликими флотами."
  clan_family_shrine: "Сімейне святилище"
  clan_family_shrine_desc: "Храм, споруджений на честь нашої сім'ї, не лише стане оплотом віри для нашого клану та його наближених, але й символом нашої влади, що викликатиме трепет та благоговіння у простого народу."
  korean_gunnery: "Корейські гармати"
  korean_gunnery_desc: "$korean_gunnery$ — це оборонна модифікація, яка покращує укріплення та підвищує його ефективність у битвах проти нападників із землі чи моря."
  korean_gunnery_land_defense: "Наземна артилерія"
  korean_gunnery_land_defense_desc: "$korean_gunnery_desc$\n#Y Несумісна зі спорудою «[ShowBuildingTypeName('korean_gunnery_coastal_defense')]».#!"
  korean_gunnery_coastal_defense: "Берегова артилерія"
  korean_gunnery_coastal_defense_desc: "$korean_gunnery_desc$\n#Y Несумісна зі спорудою «[ShowBuildingTypeName('korean_gunnery_land_defense')]».#!"
  korean_barracks: "Корейські казарми"
  korean_barracks_desc: "Щоб наша армія зберігала високу боєздатність, потрібен постійний приплив свіжих сил. Завдяки місцевим центрам із набору та навчання новобранців у нас під рукою завжди будуть підготовлені резерви."
  jurchen_barracks: "Казарми чжурчженів"
  jurchen_barracks_desc: "Ці казарми слугують місцем збору для наших воїнів для підготовки до битв, відточування військової майстерності та збереження наших славних традицій."
  provincial_garrison: "Провінційний гарнізон"
  provincial_garrison_desc: "Провінції — це основа, на якій стоїть міжнародне об'єднання типу «[GetInternationalOrganizationType('middle_kingdom')]». Для захисту від можливих нападів там потрібно розміщувати військові гарнізони."
  kremlin: "Кремль"
  kremlin_desc: "$kremlin$ слугує адміністративним і духовним центром нашого народу, а також символом влади, який відображає наш зростаючий вплив. Навколишнє населення ховається за його товстими стінами та високими вежами під час ворожих нальотів та облог."
  kremlin_why: "Можна побудувати тільки в районі [ShowLocationName('moscow')]."
  papal_archives: "Ватиканський архів"
  papal_archives_desc: "$papal_archives$ — це зібрання християнських книг та історичних документів під суворим захистом Папської області."
  stroganov_school_of_iconic_art: "Строгановська школа іконопису"
  stroganov_school_of_iconic_art_desc: "$stroganov_school_of_iconic_art$ об'єднує авторів релігійних ікон, пов'язаних із #L #L [ShowReligionAdjective('orthodox')|l]#!ою#! вірою. Тут під патронажем впливової родини купців Строганових отримують путівку в життя багато молодих художників."
  stroganov_school_of_iconic_art_why: "Можна побудувати тільки в районі [ShowLocationName('moscow')]."
  ribeira_das_naus: "Рібейра-даш-Науш"
  ribeira_das_naus_desc: "Територія Морського арсеналу, де колись знаходилися середньовічні морські доки #italic терсенаш#!, сильно змінилася після того, як король Мануел I побудував тут Пасу-да-Рібейра. Зведення нових терсенаш під назвою #italic Рібейра-даш-Науш#! на захід від королівського палацу відіграло важливу роль у будівництві кораблів, без яких були б неможливі португальські географічні відкриття. Ці верфі, найбільші в Португальській імперії, слугували моделлю для суднобудівних підприємств у колоніях, насамперед на Гоа та в Кочині."
  venetian_palaces: "Венеційські палаццо"
  venetian_palaces_desc: "$venetian_palaces$ є символами статусу для заможних представників олігархічної знаті та впливових гільдій. Місця у Венеції небагато, тому жителі міста будують свої палаци вгору. В результаті їхня вражаюча архітектура приваблює сюди гостей із далеких земель, які бажають особисто доторкнутися до венеційської культури."
  venetian_quarter: "Венеційський квартал"
  venetian_quarter_desc: "Торговий квартал держави Венеція. Доки існує цей квартал, венеційські купці матимуть значний вплив у Константинополі."
  galata: "Галата"
  galata_desc: "Торговий квартал держави Генуя. Доки існує цей квартал, генуезькі купці матимуть значний вплив у Константинополі."
  novodevichy_convent: "Новодівичий монастир"
  novodevichy_convent_desc: "$novodevichy_convent$ слугує притулком для шляхетних жінок, яким довелося постригтися в черниці. Крім того, своїми міцними стінами та високими сторожовими вежами він сприяє обороні міста [ShowLocationName('moscow')]."
  novodevichy_convent_why: "Можна побудувати лише в районі [ShowLocationName('moscow')]."
  moscow_artillery_yard: "Московський гарматний двір"
  moscow_artillery_yard_desc: "$moscow_artillery_yard$ — це центр розвитку артилерійського виробництва. Інженери та ремісники розробляють тут нові конструкції гармат і вдосконалюють артилерійські технології."
  moscow_artillery_yard_why: "Можна побудувати лише в районі [ShowLocationName('moscow')] під час війни."
  bund: "Гребля"
  bund_desc: "Ця гребля утворює простий, але вельми ефективний резервуар для іригації та забезпечення міст водою."
  kalari: "Каларі"
  kalari_desc: "Це місце тренування для тих, хто осягає бойове мистецтво каларіпаятту. Також слугує казармами під управлінням касти наярів."
  ibadat_khana: "Ібадат-хана"
  ibadat_khana_desc: "Ібадат-хана, або #italic молитовний дім#!, слугує місцем для зустрічей духовних лідерів різних конфесій та обговорення релігійних вчень. Мета таких зустрічей — розвивати взаєморозуміння між вірами, а також усвідомлення того, що всі релігії переслідують спільну мету."
  thema_headquarters: "Столиця феми"
  thema_headquarters_desc: "Ці столиці — адміністративні та військові центри, з яких складається [ShowGovernmentReformName('theme_system')|l]. Вони слугують і як місця збору військ, і як міста, звідки наші генерали керують провінцією."
  academy_of_sciences: "Академія наук"
  academy_of_sciences_desc: "$academy_of_sciences$ — це місце, де працюють знамениті вчені, мислителі та інтелектуали, як вітчизняні, так і запрошені з-за кордону. Разом вони формують живе інтелектуальне середовище. Тут проводяться дослідження в різних галузях і публікуються численні наукові роботи та журнали."
  academy_of_sciences_why: "Можна побудувати лише в районі [ShowLocationName('neva')]."
  bavarian_academy_of_sciences: "Академія наук"
  bavarian_academy_of_sciences_desc: "$academy_of_sciences$ — це місце, де працюють знамениті вчені, мислителі та інтелектуали, як вітчизняні, так і запрошені з-за кордону. Разом вони формують живе інтелектуальне середовище. Тут проводяться дослідження в різних галузях і публікуються численні наукові роботи та журнали."
  bavarian_academy_of_sciences_why: "Можна побудувати лише в #TOOLTIP:LOCATION,munich_tt,X #L Мюнхені#!#!."
  greek_latin_academy: "Греко-латинська академія"
  greek_latin_academy_desc: "$greek_latin_academy$ — це центр освіти та навчання античним мовам, а також граматиці, віршуванню та красномовству. Завдяки різноманітності предметів та низькій вартості навчання сюди йдуть вчитися інтелектуали та різночинці."
  greek_latin_academy_why: "Можна побудувати лише в районі [ShowLocationName('moscow')]."
  sukharev_tower: "Сухарева вежа"
  sukharev_tower_desc: "$sukharev_tower$ — це місце, де навчаються ті, хто готується до життя в морі. Тут знаходиться Школа математичних і навігацьких наук. У ній учні осягають секрети мореплавства та математики, щоб стати одними з найкращих моряків на світі."
  sukharev_tower_why: "Можна побудувати лише в районі [ShowLocationName('moscow')]."
  the_bock_fortifications: "Каземати Бок"
  the_bock_fortifications_desc: "Ми скористалися скелею Бок, яка слугує природним захистом міста, і спорудили в ній складну систему оборонних споруд, завдяки якій наше місто отримало прізвисько #italic «Північний Гібралтар»#!."
  free_economic_society: "Вільне економічне товариство"
  free_economic_society_desc: "$free_economic_society$ — це наукова та економічна організація для сприяння розвитку сільського господарства та комерції шляхом наукових досліджень, закупівлі сільськогосподарської техніки, впровадження нових культур та видання праць із сучасних методів землеробства."
  free_economic_society_why: "Можна побудувати лише в районі [ShowLocationName('neva')] після заснування Вільного економічного товариства."
  imperial_academy_of_arts: "Імператорська академія мистецтв"
  imperial_academy_of_arts_desc: "$imperial_academy_of_arts$ — це установа, яка займається заохоченням, підтримкою та розвитком закордонних віянь в образотворчому мистецтві та архітектурі. Для цього академія відправляє за кордон талановитих художників та архітекторів, запрошує іноземних викладачів та послідовно впроваджує принципи неокласицизму."
  imperial_academy_of_arts_why: "Можна побудувати лише в районі [ShowLocationName('neva')] після заснування Імператорської академії мистецтв."
  moscow_orphanage: "Московський виховний будинок"
  moscow_orphanage_desc: "$moscow_orphanage$ — це соціальна ініціатива та спроба виховати дітей-сиріт зразковими громадянами. Їм надаються їжа та притулок, а також основна освіта. Подальше навчання вони можуть отримувати на фабриках та в казенних установах, ставши підлітками. Виховний будинок сумно відомий досить високою смертністю серед вихованців."
  moscow_orphanage_why: "Можна побудувати лише в районі [ShowLocationName('moscow')]."
  institute_of_noble_maidens: "Інститут шляхетних дівчат"
  institute_of_noble_maidens_desc: "$institute_of_noble_maidens$ — це установа, яка займається вихованням дівчат шляхетного стану. Вихованок приймають до інституту у віці шести років і тримають у його стінах кілька років, щоб вони не потрапили під шкідливий вплив ззовні."
  institute_of_noble_maidens_why: "Можна побудувати лише в районі [ShowLocationName('neva')] або в освіченій столиці."
  jesuit_college_desc: "Єзуїти дають нашим підданим правильну #L #L [ShowReligionAdjective('catholic')|l]#!у#! освіту, своєю присутністю допомагаючи навертати населення."
  tibetan_great_monastery_desc: "Це важливе місце для всіх, хто сповідує [ShowReligionName('tibetan_buddhism')|l], центр #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійського#!#! вчення та монастирського життя."
  schonbrunn_palace_desc: "Цей палац, зведений посеред мисливських угідь нашої династії, слугуватиме літньою резиденцією правлячої родини."
  rural_clothmaker: "Сільський сукнар"
  house_of_parliament: "Будівля парламенту"
  house_of_parliament_desc: "Ця споруда слугує резиденцією [Concept('parliament','парламенту')|e] і сприяє централізації влади."
  royal_court_desc: "$royal_court$ — вершина держави, центр монаршої влади та пишноти."
  order_headquarters_desc: "Резиденція великого магістра слугує політичним центром ордену, де контролюються всі його дії."
  admiralty_desc: "$admiralty$ захищає наші інтереси на морі. Сюди входять представники військової та цивільної адміністрації, що забезпечує справедливе співвідношення інтересів."
  war_college_desc: "$war_college$ — місце, де досвідчені офіцери навчають і тренують наступне покоління воєначальників, щоб підтримувати перевагу нашої армії."
  tax_assessor_desc: "$tax_assessor$ виконує волю правителя, збираючи належні суми податків."
  supreme_court_desc: "$supreme_court$ контролює виконання законів у нашій державі. Ця вища судова установа вершить правосуддя та стежить за його виконанням."
  art_school_desc: "$art_school_advance_desc$"
  chancery_desc: "$chancery_advance_desc$"
  arts_academy_desc: "$arts_academy$ — прихисток знаменитих майстрів пера та творців нашої держави. Розвиток культури — прекрасний спосіб залишити слід в підручниках історії."
  republican_assembly_desc: "$republican_assembly$ — центр і наріжний камінь управління нашою республікою. Саме з цього центру ухвалення рішень ми з витонченістю здійснюємо своє право на владу."
  coastal_fort_desc: "Нам загрожують пірати та ворожі флоти. Щоб захиститися від нападів, потрібні найпростіші прибережні укріплення."
  naval_battery_desc: "Природний розвиток оборонних війн призвів до створення складних прибережних захисних споруд, здатних відбити навіть найпотужніші ворожі атаки."
  irrigation_systems_desc: "Якщо ми будемо правильно обробляти свої землі, народ буде ситий, і ми прийдемо до процвітання. Розгалужена іригаційна система збереже дорогоцінну їжу."
  bridge_infrastructure_desc: "Дуже важливо з'єднувати міста та поселення між собою, щоб підтримувати верховенство закону та центральної влади. $bridge_infrastructure$ полегшить переміщення людей і товарів."
  pound_lock_canal_infrastructure_desc: "Управління припливами та річками, що течуть через нашу державу, вкрай важливе для виживання. $pound_lock_canal_infrastructure$ дозволить нам приборкати життєдайну воду."
  university_desc: "$university$ — центр світлих думок і нових ідей. Він дає нам прекрасних учених і літераторів, сприяє розвитку наук і підвищенню грамотності."
  trade_office_desc: "Торгівля та підприємництво — джерело життєвої сили будь-якого процвітаючого міста. $trade_office$ дасть нашим купцям нові можливості для вигідних ділових відносин із чужоземними торговцями."
  missionary_building_desc: "$missionary_building$ — місцевий центр тяжіння для релігійних представників і місіонерів, які прагнуть навернути жителів до істинної віри."
  slave_center_desc: "$slave_center$ — місце, де предметом угод є раби. Заможні підприємці приходять сюди за робочою силою, а розбійники та пірати продають полонених."
  overseas_trading_post_desc: "$overseas_trading_post$ — аванпост, куди вирушають честолюбні купці. У гонитві за удачею та багатством вони готові вести справи далеко від рідної країни."
  stockade_desc: "$stockade$ — огорожа у вигляді дерев'яних кіл або інших захисних пристосувань. $castle$ — звичайно, більш значна споруда, але і $stockade$ теж може уповільнити наступ ворога."
  castle_desc: "$castle$ зазвичай являє собою укріплену дворянську резиденцію або центр військового ордену. Однак у цьому випадку він насамперед слугує оборонною спорудою, що захищає район від загарбників."
  bastion_desc: "$army_artillery$ розвивається, і замок уже не може захистити від сили пороху. $bastion$ же здатен звести нанівець шкоду від гармат. Покращена архітектура дає надійніший захист, а також дозволяє розмістити всередині далекобійні оборонні загони."
  star_fort_desc: "$star_fort$ зовсім не схожий на свого попередника — середньовічний замок. Ця сплощена захисна споруда оснащена кількома трикутними бастіонами та додатковим ровом навколо. Це дозволяє оборонцям протистояти ворожій артилерії та допомагає відбивати натиск піхоти."
  fortress_desc: "$fortress$ — найпередовіша оборонна споруда, створена військовими інженерами для захисту від найпотужнішої артилерії. Це складна система взаємопов'язаних бастіонів і казематів, що дозволяє максимально ефективно вести вогонь у відповідь по нападниках."
  sergeantry_desc: "$sergeantry$ — споруда, де живуть і тренуються сержанти. Слово «сержанти» походить від латинського #italic serviens#! — «слуги». Ці озброєні солдати, використовувані монархами у феодальних системах, складають ядро професійної армії."
  warrior_temple_desc: "$warrior_temple$ — споруда, де можна взяти на службу елітних #TOOLTIP:RELIGION,$nahuatl_tt$,X #L науаських#!#! #TOOLTIP:UNITTYPE,a_jaguar_warrior,X #L воїнів-ягуарів#!#! або #TOOLTIP:UNITTYPE,a_eagle_warrior,X #L воїнів-орлів#!#!."
  armory_desc: "[ShowInstitutionName('professional_armies')] розвиваються, що змушує нас шукати нові способи збільшення [Concept('manpower', 'числа рекрутів')|e] для наших [Concept('armies', 'армій')|e]. З цією метою в [Concept('towns_and_cities', 'містах')|e] можна будувати арсенали."
  training_fields_desc: "$training_fields$ можна побудувати в [Concept('rural_location', 'сільському районі')|e]. Це ще одне джерело [Concept('manpower', 'рекрутів')|e] для наших [Concept('armies', 'армій')|e]."
  barracks_desc: "$barracks$ — ефективніший спосіб збільшити [Concept('manpower', 'число рекрутів')|e] для наших [Concept('armies', 'армій')|e]. Вони замінюють арсенали в [Concept('towns_and_cities', 'містах')|e]."
  regimental_camp_desc: "$regimental_camp$ — ефективніший спосіб збільшити [Concept('manpower', 'число рекрутів')|e] для наших [Concept('armies', 'армій')|e]. Він замінює навчальний полігон у будь-якому [Concept('rural_location', 'сільському районі')|e]."
  conscription_center_desc: "$conscription_center$ — найефективніший спосіб збільшити [Concept('manpower', 'число рекрутів')|e] для наших [Concept('armies', 'армій')|e]. Воно замінює казарми в [Concept('towns_and_cities', 'містах')|e] та полковий гарнізон у будь-якому [Concept('rural_location', 'сільському районі')|e]."
  salt_collector: "Збирач солі"
  salt_collector_desc: "Сіль цінувалася на вагу золота відтоді, як люди придумали додавати її в їжу. На щастя, сіль легко випарити з морської води: потрібно лише набрати її та залишити на сонці. Крім того, сіль можна добути з дна висохлих озер і річок."
  windmill: "Вітряний млин"
  windmill_desc: "Вітряні млини бувають маленькими й великими, вертикальними й горизонтальними. Конструкція, кількість і механізм роботи їхніх вітрил також можуть значно відрізнятися, але всі вони подрібнюють зерно за рахунок вітру, що вловлюється їхніми крилами. Мелене зерно має високу поживну цінність і використовується для приготування широкого асортименту страв."
  local_smelters: "Сільська плавильня"
  local_smelters_desc: "Надра землі багаті на різні метали, які потрібно не лише добути, а й виплавити. Зазвичай плавильні будують поблизу рудних родовищ, щоб прискорити транспортування та переробку металів."
  sawmill: "Лісопилка"
  sawmill_desc: "У лісах росте багато дерев, але необроблена деревина непридатна для будівництва. Щоб звести будинок, спершу потрібно переробити ліс на лісоматеріали. Для цього й потрібна лісопилка."
  fruit_orchard: "Фруктовий сад"
  fruit_orchard_desc: "Фрукти — це безцінні дари природи та важлива складова їжі людини. Фруктові сади дозволять нам вирощувати більше плодів і задовольняти потреби нашого населення."
  city_guard: "Міська варта"
  city_guard_desc: "$city_guard$ — це група людей, яка відповідатиме за охорону закону та порядку навіть за відсутності ієрархічної організації. Ці воїни стануть кістяком нашої армії."
  library_desc: "У цих світських установах збираються вчені та заможні люди, щоб поспілкуватися та здобути нові знання. Тут можна осягнути премудрості філософії, математики, релігії та інших наук. Такі установи бувають незалежними, але часто перебувають під заступництвом і впливом університету."
  confucian_school_desc: "Ці навчальні заклади займаються підготовкою урядовців, прищеплюючи їм конфуціанські ідеали."
  confucian_academy_desc: "У цих приватних школах представники вищих станів вивчають конфуціанські доктрини, щоб скласти іспит на державну службу."
  opera_house_desc: "Розкішні величні будівлі, де відбуваються оперні вистави. Зазвичай вони зводяться коштом багатих і впливових людей."
  theater_desc: "У цій будівлі артисти виконують п'єси, проводять концерти та інші театральні вистави."
  toll_castle_desc: "Невелике укріплення, яке розташовується в безпосередній близькості від дороги, річкової переправи або гірського перевалу, а іноді й прямо на них. Загін вартових може стягувати тут плату за прохід."
  nobility_fortifications_desc: "Ці укріплення середнього розміру дозволяють місцевим дворянам демонструвати свій вплив у маєтку та контролювати селян."
  rotten_borough_desc: "Представляє парламентський округ з дуже малою кількістю виборців, яких за допомогою підкупу або шантажу можна змусити проголосувати за певного кандидата."
  noble_villa_desc: "Пишаючись своїм високим становищем, дворяни намагаються триматися осторонь від простого люду і віддають перевагу життю подалі від великих міських поселень. Проте їхні резиденції відрізняються розмахом і багатим внутрішнім оздобленням."
  local_noble_delegation_desc: "Дворяни віддають перевагу життю за межами міст, не бажаючи ділити простір із простолюдинами. При цьому вони прагнуть активно брати участь у житті великих міст, особливо в подіях, пов'язаних з управлінням. Тому аристократи нерідко мають резиденції скрізь, де хочуть зберегти вплив."
  nobles_recruitment_center_desc: "Накопичивши значний статок, дворяни хочуть його зберегти. Тому в них часто є особиста охорона і навіть підготовлені солдати, наймані на службу з-поміж місцевих жителів."
  parish_church_desc: "Духовенство прагне поширити свій вплив якомога далі, щоб усі люди могли прийняти істинну віру. Навіть у найдрібнішому поселенні зазвичай є священник, який дбає про духовне благополуччя місцевих жителів."
  local_shrine_desc: "У багатьох релігій є місця, що мають особливе духовне значення. Духовенство прагне якнайшвидше звести в таких районах святилища, щоб місцеве населення виявляло належну пошану."
  clerical_archives_desc: "Священники прагнуть накопичувати всілякі знання — часто не тільки ті, що стосуються богослов'я. Архіви духовенства — це джерело мудрості, де зберігаються найрізноманітніші записи. Щоправда, зазвичай священнослужителі не пускають туди сторонніх."
  spiritual_retreat_desc: "Люди віри прагнуть піднестися над мирськими турботами і наблизитися до божественного. Тому виникають місця, де духовенство може повністю присвятити себе вірі та відректися від земних справ."
  warrior_monks_training_grounds_desc: "Відданість вірі не обов'язково означає відмову від насильства. Багато ченців присвячують себе не тільки зміцненню духу, а й мистецтву бою."
  guild_hall_desc: "Коли конкуренція занадто велика, місцевим ремісникам складно знайти достатньо покупців для своїх виробів. Тому вони нерідко створюють гільдії. Такі об'єднання дозволяють майстрам спільно вирішувати, як виробляти і продавати ті чи інші товари."
  merchants_guild_desc: "Завдяки торгівлі та підприємництву економіка живе і процвітає. Щоб її розвиток був природним та ефективним, торговці об'єднуються в гільдії. Разом вони стежать за тим, щоб різні торгові шляхи не заважали один одному, а функціонували спільно заради загального процвітання."
  local_markets_desc: "Мандрівники зустрічаються навіть у найбільш усамітнених поселеннях. Люди приходять і йдуть, щоб продати та придбати необхідні товари. Щоб розвивати місцеву торгівлю, такі купці створюють ринки."
  burgher_mansion_desc: "Той, хто накопичив достатній статок, неодмінно перейматиме спосіб життя тих, кому він дістався з народження. Це стосується і тих, хто не належить до дворянського роду. Багаті містяни облаштовують собі розкішні садиби, що не поступаються резиденціям аристократів."
  artisan_guilds_desc: "Для виробництва будь-якої продукції потрібні навички та досвід. Люди, які володіють цими якостями, відкривають майстерні та беруть учнів, яким можна передати свої вміння."
  local_assembly_desc: "Простолюдини перебувають під владою уряду, але не завжди повністю відокремлені від нього. Вони збираються, щоб обговорити важливі питання, що їх хвилюють, і висловити уповноваженій владі свої сподівання."
  pirate_haven_desc: "Щоб прогодувати себе, простий люд покладається на власну фізичну силу. Деякі можуть навіть займатися грабунком і піратством, особливо на узбережжях, які залишаються без належної уваги уряду. Обґрунтувавшись у затишних бухтах, вони здійснюють нальоти на кораблі безтурботних моряків."
  peasants_training_grounds_desc: "Оскільки час від часу необхідно скликати ополченців, корисно облаштовувати для населення тренувальні поля. Тут простолюдини можуть навчитися основам бою або хоча б дізнатися, яким боком тримати меч."
  festival_grounds_desc: "Простолюдини, як і всі інші, раді будь-якій можливості повеселитися та розважитися. Для цього в кожному поселенні створюються особливі місця для святкувань."
  peasants_hunting_grounds_desc: "Отримавши законне право на полювання, простолюдини швидко облаштовують особливі угіддя, щоб користуватися благами дикої природи в усіх прилеглих лісах."
  local_schools_desc: "Освічене населення працює продуктивніше. Місцеві школи допомагають простолюдинам здобути освіту та стати на один щабель з більш привілейованими станами. Не дивно, що вони зазвичай вітають такі школи та прагнуть їх відвідувати."
  local_newspaper_desc: "Інформація — це знання, а знання — ключ до прогресу. Місцеві видавці газет допомагають населенню отримувати інформацію про поточний стан справ, що йде на користь усім."
  cantonments_desc: "Кантонмент стане для нашої армії постійним центром набору солдатів і місцем розміщення наших військ."
  grand_palace_desc: "$grand_palace$ — величне свідчення культурних досягнень нашого суспільства, призначене для монарха та його найближчого оточення."
  great_madrasa_desc: "$great_madrasa$ — вищий навчальний заклад, де найвидатніші вчені діляться знаннями в медицині, архітектурі та ісламському праві."
  tower_of_belem_desc: "$tower_of_belem$ захищає гирло річки Тежу. Вона служить не тільки військовою фортецею, що обороняє наш порт, а й символом нашого панування на морі."
  great_temple_of_tenochtitlan_desc: "$great_temple_of_tenochtitlan$ присвячений богу війни Уїцилопочтлі, а також богу дощу і сільського господарства Тлалоку. Ця ступінчаста споруда сприятиме нашому майбутньому розширенню."
  corporation_of_london_desc: "$corporation_of_london$ під управлінням купців і торговців значною мірою контролює зростання і розвиток міста $london$."
  grand_apartment_desc: "$grand_apartment$ на березі річки — символ влади правителя і нашого контролю над містом $london$."
  sanssouci_desc: "Скромний одноповерховий палац $sanssouci$ розташований далеко від міської метушні і оточений великими садами і виноградниками."
  berlin_palace_desc: "$berlin_palace$, збудований у центрі міста $berlin$ між річкою Шпрее і її протокою, дасть нашим правителям більше контролю над містом. Складна історія його будівництва доводить, що наша держава відстоює свої інтереси попри все."
  versailles_desc: "$versailles$ — великий палацовий комплекс, що слугує королівською резиденцією. Він включає кілька салонів, залів, покоїв, а також каплицю і навіть оперний зал. Щоб догодити французькій монархії, цей палац регулярно відвідують дипломати і представники вищого суспільства."
  enderun_academy_desc: "$enderun_academy$ — палац і навчальний пансіон на території палацу Топкапи, де навчаються майбутні яничари і турецькі чиновники. $devshirme_system_policy$ здійснює відбір учнів."
  rock_of_monaco_desc: "$rock_of_monaco$ — високий моноліт у місті Монако. Сама по собі ця значна скеля не має великого значення, але місто навколо неї слугує притулком місцевих піратів у Середземному морі."
  calvinist_preachers_desc: "$calvinist_preachers$ підтримують реформаційний рух і несуть світло кальвіністської віри, поширюючи свої вчення серед місцевого католицького населення."
  schwaz_mine_desc: "$schwaz_mine$ — процвітаюча шахта з багатими покладами срібних і мідних руд. Ресурси, які тут видобуваються, забезпечуватимуть дипломатичні та військові досягнення свого власника ще багато століть."
  urban_parliament_seat_desc: "$urban_parliament_seat$ дає містянам політичну вагу. Наявність таких будівель значно підвищує вплив гільдій і купців."
  adm_vatican_library_desc: "Ватиканська апостольська бібліотека — велика бібліотека Святого Престолу. У ній зберігається безліч відомостей і документів різних епох — від античного періоду до сьогодення."
  dip_vatican_library_desc: "$adm_vatican_library_desc$"
  mil_vatican_library_desc: "$adm_vatican_library_desc$"
  wisselbank_desc: "Банк міста $amsterdam$, або $wisselbank$, здійснює валютні операції. Він відіграє важливу роль у створенні та забезпеченні стандартів монетного виробництва. $wisselbank$ — перший банк такого типу і зразок банківської справи, на який рівняється вся $europe$."
  entrepot_desc: "$entrepot$ у серці жвавого ринку — найкраще місце для зміцнення наших торговельних інтересів."
  trading_hub_desc: "$trading_hub$ — важлива частина нашої торговельної мережі. Це чудове місце для продажу та купівлі місцевих та іноземних товарів."
  customs_house_desc: "У нашій державі кипить жвава торгівля, і численні купці привозять до нас дивовижні товари з далеких земель. $customs_house$ регулює потік цих товарів і контролює імпорт."
  stock_exchange_desc: "$stock_exchange$ — важливе місце зустрічі для брокерів, купців та інвесторів, що стимулює розвиток бізнесу та торгівлю частками в акціонерних товариствах."
  clearing_house_desc: "Обмін платежами та авансові операції — одні з основних фінансових напрямків у нашій державі. $clearing_house$ створює умови, що дозволяють нам ще більше посилити контроль над торгівлею в країні."
  market_warehouse_desc: "Через наші ринки проходить дедалі більше товарів. $market_warehouse$ дасть нам більше місця для їхнього зберігання."
  sugar_plantation_desc: "Обробка землі та вирощування цукрової тростини — прибуткове починання. $sugar_plantation$ допоможе нам зайняти гідне місце на цьому перспективному ринку."
  cotton_plantation_desc: "Поля нашої держави можна використовувати для плантацій та вирощувати у великих кількостях популярну нині бавовну."
  tobacco_plantation_desc: "$tobacco_plantation$ дозволить нам вирощувати тютюн. Це не тільки сприятиме нашому процвітанню, але й принесе частку заробітків від прибуткової торгівлі."
  jewelry_guild_desc: "Створення ювелірних виробів вищої якості із самоцвітів та дорогоцінного каміння — дуже затребуваний вид діяльності. $jewelry_guild$ має принести нам великий прибуток."
  north_sea_shipyards_desc: "Ефективні та місткі нідерландські верфі приваблюють до роботи найкращих майстрів та інженерів Європи."
  dock_desc: "Док — найпростіша берегова інфраструктура для будівництва та ремонту суден."
  dry_dock_desc: "Порт дозволяє будувати та ремонтувати кораблі в ізольованих сухих доках, які за необхідності можна наповнити водою. Легкий доступ до корпусу судна значно підвищує ефективність та обсяг суднобудування."
  shipyard_desc: "Верф значно розширює можливості порту. Вона дозволяє будувати та обслуговувати більше кораблів, а також розміщувати екіпажі суден у більш комфортних умовах."
  grand_shipyard_desc: "Цей значний портовий комплекс, що дозволяє будувати та ремонтувати цілі флоти, постійно приймає та проводжає незліченні судна та екіпажі. Він має найважливіше значення для нашої зростаючої морської держави."
  naval_base_desc: "Велика ділянка узбережжя, що не поступається розмірами невеликому місту, відведена під будівництво та обслуговування нашої великої армади. Тут живуть і працюють моряки, ремісники та інженери. Цей комплекс може без допомоги ззовні створювати цілі флоти та є одним із найважливіших стратегічних центрів нашої держави."
  distillers_guild_desc: "Це братство винокурів контролює виробництво всіх спиртних напоїв у місті, тримаючи рецепти в секреті. Усі, хто хоче осягнути тонкощі цього ринку, змушені вступати до лав братства та розширювати його монополію."
  distiller_manufactory_desc: "Для цього виробничого центру великий попит на зростаючі обсяги спиртних напоїв важливіший за старовинні гільдійські секрети. Це призвело до створення нової сучасної системи виробництва, метою якої є якість та прибуток."
  brewery_desc: "У цій гільдії із зерен або плодів можна зробити смачні та п'янкі напої, популярні серед усіх станів."
  brewery_manufactory_desc: "Необхідність у великій кількості спиртних напоїв призвела до появи виробничих центрів, де рецепти майстрів минулого механізуються та ставляться на потік."
  glass_guild_desc: "$glass$ — крихкий матеріал, робота з ним схожа на мистецтво. Спеціалізовані центри виробляють різні скляні вироби — від побутових ємностей до декоративних вітражних вікон."
  saltpeter_guild_desc: "$saltpeter$ — важливий інгредієнт для виробництва пороху, від якого залежить оборона держави. Отримання цього матеріалу — трудомісткий процес. Селітру видобувають із багатої на нітрати ґрунту, а також із гною та органічних матеріалів, що розкладаються."
  lacquerware_guild_desc: "$lacquerware_guild$ займається виготовленням лакованих меблів. Вироби покривають соком лакового дерева в кілька шарів для особливої глянцевої текстури. Якісні лаковані меблі, церемоніальні скриньки та інші товари дуже популярні через їхню красу та довговічність."
  gun_smith_desc: "$gun_smith$ займається виготовленням та обслуговуванням вогнепальної зброї. Вона виробляє різні види добротної зброї, а також комплектуючі — стволи, затворні та спускові механізми."
  weapon_guild_desc: "Це ремісниче об'єднання виробляє різну зброю. Такі гільдії відіграють найважливішу роль в обороні держави, забезпечуючи простих солдатів необхідним озброєнням для військових потреб."
  cloth_guild_desc: "Виготовлення тканин нерідко стає основою економіки держави. $cloth_guild$ складається з фарбувальників, ткачів та валяльників. Вона забезпечує стабільне виробництво текстильних виробів, а також встановлює та контролює необхідний обсяг продукції та стандарти якості."
  fine_cloth_guild_desc: "$wool$, шовк та оксамит коштують дорого. Виробництво цих видів текстилю — прибуткова справа, в яку нерідко залучені дворяни. Вдосконалюючи технології ткацтва та оздоблення текстилю, ці передові центри часто приносять велику користь місцевій та державній економіці."
  tannery_desc: "У дубильні займаються вичинкою шкіри та виробляють важливі товари: взуття, сідла, книжкові палітурки й не тільки. $leather$ тварин, оброблена особливим методом, гарно виглядає та довго служить."
  paper_guild_desc: "$paper$ — найважливіший виріб для будь-якої держави. Вона використовується у всіх сферах життя — від управління до освіти та торгівлі. $paper_guild$ забезпечує належні обсяги та стандарти виробництва, а також використовує унікальні методи вимочування, подрібнення або пресування льону, бавовни та інших рослинних волокон."
  scriptorium_desc: "У цьому особливому центрі писарі скрупульозно копіюють манускрипти. $scriptorium$ прагне зберігати та поширювати знання, випускаючи різні тексти — релігійні, правові та навіть художні."
  tools_guild_desc: "$tools$, будь то простий молот або перші верстати, завжди були важливі для суспільства. $tools_guild$ спеціалізується на виробництві цих корисних виробів."
  porcelain_guild_desc: "$porcelain$ — міцна та напівпрозора кераміка, яка виготовляється шляхом склування матеріалів під впливом високих температур. $porcelain_guild$ займається виготовленням та оздобленням таких виробів."
  naval_supplies_guild_desc: "$naval_supplies$ — це всілякі товари для будівництва кораблів: від простої деревини до дьогтю, мотузок, полотна та вітрил. $naval_supplies_guild$ виробляє та продає всі види продукції для суднобудування."
  dyes_guild_desc: "$dyes$ купують та продають з тих пір, як люди почали робити тканини. $dyes_guild$ виробляє барвники з доступних рослин."
  putrefaction_works_desc: "$saltpeter$ — цінна хімічна сполука. Вона використовується для удобрення ґрунту та обробки м'яса, а також є основним компонентом пороху. $putrefaction_works$ дозволяє отримувати цей матеріал у випадках, коли його видобуток недоступний."
  naval_supplies_manufactory_desc: "Як і $naval_supplies_guild$, $naval_supplies_manufactory$ виробляє суднобудівні матеріали. Вона більша, ніж майстерня для таких матеріалів, тому випускає значно більше продукції."
  weapon_manufactory_desc: "Будь-якій армії потрібні мечі, списи, луки та інше озброєння. $weapon_manufactory$ створює з різних матеріалів всілякі види холодної та простої стрілецької зброї."
  fine_cloth_manufactory_desc: "$fine_cloth$ здавна є символом статусу для багатіїв та представників вищих станів. $fine_cloth_manufactory$ виробляє дорогі текстильні вироби з сукна або шовку."
  cloth_manufactory_desc: "$cloth$ — різноманітні тканини та текстильні вироби з вовни та льону. $cloth_manufactory$ виробляє сукно з вовни, бавовни, прядильних культур та інших матеріалів."
  paper_workshop_desc: "$paper$ незамінна в освіті, бухгалтерському обліку та управлінських справах. $paper_workshop$ займається виготовленням нового паперу з макулатури, прядильних культур та лісоматеріалів."
  printing_press_shop_desc: "$printing_press_shop$, де використовуються легко створювані та замінювані компоненти, дозволить нам виробляти та розповсюджувати письмові документи з меншими витратами на робочу силу та матеріали."
  glassworks_desc: "Вдосконалення традиційних методів видування скла та використання нових матеріалів спрощує виробництво та збільшує його масштаби."
  perfumery_desc: "$perfumery$ вирощує квіти та видобуває з них есенцію, щоб виробляти цінну продукцію для заможних людей."
  porcelain_manufactory_desc: "В результаті довгих алхімічних дослідів ми навчилися виготовляти фарфор, який слугує аналогом дорогих заморських виробів."
  tannery_manufactory_desc: "Нові досягнення в хімії значно прискорюють дублення шкур тварин та дозволяють отримувати шкіру вищої якості."
  lacquerware_manufactory_desc: "Покращені методи фарбування та нанесення лаку дозволяють виготовляти лакові вироби швидше та з меншими витратами."
  fine_cloth_mill_desc: "$fine_cloth_mill$ використовує водяні колеса, що дозволяє дуже швидко та у великих кількостях виготовляти тонке сукно."
  textile_mill_desc: "$textile_mill$ використовує водяні колеса, що дозволяє дуже швидко та у великих кількостях виготовляти сукно."
  steel_mill_desc: "Більш надійні печі та покращений процес виробництва дозволяють виготовляти сталь в економічно вигідних масштабах."
  iron_foundry_desc: "$iron$ — дуже міцний матеріал. $tools$ з нього міцніші за інші, а процес їх виготовлення займає менше часу."
  weapon_factory_desc: "За останні роки значення військової справи сильно зросло, і нам потрібні нові покращені методи виробництва озброєння. Тому з'являються цілі заводи, призначені для цієї мети."
  monastery_desc: "Монастирі дозволяють віддаватися роздумам далеко від мирської суєти тим, хто присвятив себе єднанню з небесами. Це місце для навчання та роздумів, у стінах якого зазвичай зберігаються цінні знання."
  madrasa_desc: "Медресе — центр знань, де заохочуються дослідження. Тут немає нестачі в учнях, багато з них прибувають сюди здалеку. У цих стінах діляться мудрістю з усіма охочими, обговорюючи як мирські, так і релігійні питання."
  orthodox_monastery_desc: "Православні священники нерідко мають великий вплив і міцно тримаються за владу, оплотом якої слугують їхні монастирі. Перебуваючи під захистом своїх ікон, православне духовенство стоїть на варті традиційних цінностей держави."
  miaphysite_monastery_desc: "$miaphysite$ передбачає безліч обрядів і церемоній, що проводяться з часів зародження християнства. Монастирі є оплотом цих обрядів, адже тільки в їхніх стінах ретельно і невтомно вивчається слово Боже."
  bailiff_desc: "Населення, надане самому собі, загрузне в пороці та ліні. Тому управління державою потрібно здійснювати за допомогою місцевих представників, що охороняють закон і порядок у кожному поселенні."
  fishing_village_desc: "Вода — джерело життя. Не дивно, що в ній мешкає безліч живих істот. Завдяки цьому на берегах часто виникають цілі села, населення яких живе за рахунок ловлі всіляких водних створінь."
  farming_village_desc: "Їжа — основа розвитку будь-якої цивілізації. Поля та сільськогосподарські ділянки не тільки забезпечують населення продовольством, а й дозволяють прогодувати різних тварин. Своєю чергою, такі тварини є джерелом інших продуктів. Поєднання цих промислів — ключ до процвітання будь-якого поселення."
  forest_village_desc: "Ліси та неосвоєні пустища не такі непривітні, як здається. Ці землі багаті тваринами, на яких можна полювати заради м'яса та шкур. Тому люди часто намагаються селитися поблизу багатих дичиною лісів, що дають їжу та інші ресурси."
  tar_kiln_desc: "Дьоготь здавна цінувався за свою водонепроникність та скріплювальні властивості. Тому в лісистих землях викопують дьогтярні ями. Дьоготь добувають з дерева шляхом сухої перегонки."
  horse_breeders_desc: "Коні необхідні в будь-якій справі — від війн до перевезення товарів. Тому деякі родини почали розводити прекрасних скакунів, що користуються незмінним попитом."
  market_village_desc: "Виконує функцію торгового вузла, де зосереджена вся торгівля в тій чи іншій області. У таких селах розвиваються невеликі ділові спільноти."
  stone_quarry_desc: "Камінь — прекрасний матеріал для будівництва будинків, акведуків, храмів, мостів та багато чого іншого. На жаль, якісний будівельний камінь не так просто знайти та добути. Для отримання цього ресурсу в областях із міцними кам'яними породами можна створювати каменоломні."
  lumber_mill_desc: "Саме по собі дерево не дуже цінне, але з нього можна виготовляти корисні дошки. Щоб зробити їх виробництво та перевезення максимально ефективними, створюються лісопилки, де можна легко виробляти дошки з колод."
  fiber_crops_farm_desc: "З різних рослинних волокон виготовляють мотузки, взуття, одяг та інші корисні товари. Вирощування цих культур дозволить нам спиратися на власне виробництво та знизити залежність від імпорту."
  sand_pit_desc: "Пісок багато де використовується, зокрема в будівництві. Деякі види піску чудово підходять для виготовлення скла. Ми можемо створити піщані кар'єри, щоб добувати цей ресурс для найрізноманітніших потреб."
  clay_pit_desc: "Глина — найважливіший матеріал для гончарної справи. З неї також виходить відмінна черепиця для дахів. У багатих на глину областях можна облаштувати глиняні кар'єри, що постачають необхідні ресурси для гончарів."
  charcoal_maker_desc: "Тліюче вугілля опалює наші будинки та підтримує жар у кузнях. Спалюючи деревину, якої у нас в надлишку, ми можемо виробляти вугілля, що виділяє більше тепла, ніж дерев'яні дрова."
  elephant_hunting_grounds_desc: "Розміри слонів не дозволяють розводити їх на звичайних фермах, як коней чи корів. Замість цього ми облаштуємо місця полювання на слонів — напівдикі угіддя, де можна буде відбирати найвідповідніших особин."
  sheep_farms_desc: "Наші пастухи вже розводять овець на пагорбах та луках, але для зростання продуктивності потрібен більш системний підхід. Вівчарські господарства дозволять нам отримувати більше овець, а отже, і більше ресурсів."
  lutheran_preachers_desc: "$lutheran_preachers$ підтримують рух реформації та несуть світ лютеранської віри, поширюючи свої вчення серед місцевого католицького населення."
  preachers_work_for_free: "Слово Боже поширюється безкоштовно!"
  temple_desc: "$temple$ — місце поклоніння вищим силам, де священники виконують свої релігійні обов'язки. Зовнішній вигляд та форма храмів можуть відрізнятися від регіону до регіону, але їх призначення залишається незмінним."
  cathedral_desc: "$cathedral$ — більша храмова будівля, що вміщує набагато більше вірян з числа місцевого населення. Ця значна споруда є релігійним центром міста та приваблює парафіян з усіх станів."
  counting_house_desc: "$counting_house$ стежить за веденням бухгалтерських книг міських підприємців, а також веде облік призначень та ділового листування, пов'язаного з платежами."
  minting_office_desc: "$minting_office$ — центр виробництва державної валюти. До цієї будівлі надходять різні метали, з яких карбують монети для населення."
  granary_desc: "$granary$ — місце зберігання їжі, куди не можуть проникнути миші та інші тварини. У важкі часи він також дозволяє забезпечувати населення продовольством."
  wharf_desc: "$wharf$ — берегова споруда в порту. Сюди причалюють кораблі, щоб видати або отримати вантаж, а також пройти ремонт."
  medical_school_desc: "$scientific_revolution$ призводить до нових медичних відкриттів та вдосконалює методи лікування. $medical_school$ дозволяє новим поколінням лікарів отримувати найпередовіші знання."
  hospital_desc: "$hospital$ — один із найстаріших інститутів. Багато стародавніх цивілізацій мали свої версії установ, куди поміщалися хворі. За часів Середньовіччя $hospital$ розвивається і перетворюється на місце, де спеціально навчені люди надають пацієнтам медичну допомогу."
  slave_market_desc: "На цьому ринку продаються $slaves$. Невільницька праця сприяє процвітанню економіки."
  port_authority_desc: "$port_authority$ контролює пересування суден, стежить за виконанням правил, збирає податки, перевіряє торгові компанії та забезпечує безпечне надходження товарів через гавань."
  pounamou_carver_desc: "Цей ремісник відзначається особливою майстерністю у різьбленні по поунаму і славиться тим, що створює предмети культурного та духовного значення."
  hanseatic_kontor_desc: "Ця торгова контора Ганзейського союзу — головний центр, що забезпечує товарообіг між містами Північної Європи та заморськими ринками."
  fondaco_desc: "Ця будівля служить одночасно складом та житлом для іноземних купців. Тут здійснюються ключові угоди та зберігаються товари, призначені для місцевого ринку."
  venetian_arsenal_desc: "Ця верф перебуває у віданні держави. Тутешні працівники мають у найкоротші терміни створити потужний флот, який відіграє ключову роль у морських завоюваннях."
  kurultai_desc: "$kurultai$ уособлює владу місцевої ради. Цей орган виконує роль арбітра в ухваленні ключових рішень і контролює набір до армії."
  order_stronghold_desc: "Ця укріплена база військових орденів розташована в стратегічно важливому місці. Вона слугує центром оборони та відправною точкою для хрестових походів. Крім того, звідси зручно здійснювати контроль над територіями."
  banking_office_desc: "$banking_office$ використовується для невеликих інвестицій у населення інших держав. Крім того, він послужить свого роду центром, де відбуваються угоди з відповідними купцями."
  copenhagen_dockyard_desc: "$copenhagen_dockyard$ постачає моряків і кораблі для захисту наших інтересів у морі. Цей об'єкт розташовується на території жвавих гаваней Копенгагена, тож робота на ньому йде швидше, ніж у конкурентів."
  caravanserai_desc: "Караван-сараї — важливі віхи на Великому шовковому шляху. Тут знаходять відпочинок як купці, так і тварини, що перевозять цінні товари."
  caravan_stop_desc: "Караван-сараї — важливі віхи на торговельних шляхах, що проходять через пустелю. Тут знаходять відпочинок як купці, так і тварини, які везуть цінні товари."
  seat_of_cardinal_desc: "Священник, що дослужився до кардинала, суттєво посилить наш вплив на Католицьку церкву."
  galley_barracks_desc: "$galley_barracks$ вмістять наших галерних рабів. Таким чином, ми звільнимо місце під будівництво нових кораблів."
  uffizi_desc: "$tuscan_uffizi_desc$"
  polders_desc: "$polders_advance_desc$"
  hand_cannon_guild_desc: "$hand_cannon_guild_advance_desc$"
  ruined_great_wall_of_china_desc: "Ці величезні ланцюги стін та укріплень, що захищають різні ділянки кордону імперії, були побудовані сотні років тому. Відтоді багато династій намагалися ремонтувати та розширювати ці стіни, але значна їхня частина все одно перебуває в жалюгідному стані й більше нагадує руїни, ніж оборонні споруди."
  repaired_great_wall_of_china_desc: "Лінія укріплень, яку регулярно ремонтують і підтримують у гідному стані, захистить наші кордони від варварів-чужинців."
  rural_clothmaker_desc: "У його невеликій гільдії вручну виготовляються текстильні вироби з місцевих матеріалів. Вона відіграє важливу роль в економіці області, постачаючи на ринок тканини та інші товари."
  mason_desc: "У цій будівлі працюють справжні майстри, які перетворюють звичайне каміння на будівельні блоки. Якщо ви хочете зводити міцні та довговічні споруди, без неї не обійтися."
  embassy_desc: "Ця будівля — справжній оплот дипломатії. Тут представники різних країн зустрічаються, щоб провести переговори та укласти вигідні союзи."
  firearms_manufactory_desc: "$firearms_manufactory$ — серце нашої військової промисловості. Тут виробляються пістолети, гвинтівки та інша вогнепальна зброя найрізноманітніших форм і розмірів."
  cannon_foundry_desc: "$cannon_foundry$ постачає артилерію для нашої армії. Тут із розплавленого металу відливаються деталі, з яких потім збирають гармати."
  cannon_maker_desc: "Ця гільдія відливає та збирає гармати. Ці потужні знаряддя незамінні для облоги та оборони."
  firearms_factory_desc: "Потреба в захисті наших кордонів зростає, що посилює навантаження на військову промисловість. $firearms_factory$ допомагає задовольнити цей попит: тут у великих кількостях виробляється вогнепальна зброя."
  cannons_factory_desc: "Цей значний завод виробляв великі партії гармат. Його потужностей цілком вистачить, щоб задовольнити зростаючі потреби наших військових."
  settlement_building_desc: "Це чудове місце для створення поселення. Тут розмістяться крамниці та торговельні пости, а ми підтримаємо будівництво — все це привабить сюди мешканців."
  janissary_barracks_desc: "У цій споруді юні раби проходять військову підготовку і стають яничарами."
  ghilman_barracks_desc: "У цій будівлі юні раби проходять військову підготовку і стають гулямами."
  safaviyya_order_hall_desc: "$safaviyya_order_hall$ — будівля суфійського ордену Сефевіє. Це надзвичайно священне місце, але тут також проходить військова підготовка кизилбашів."
  alhambra_desc: "$alhambra$, що в перекладі з арабської означає #italic «червоний»#!, — це палацовий ансамбль у Гранаді, зведений за часів розквіту династії Насрідів."
  hexamilion_wall: "Стіна Гексаміліон"
  hexamilion_wall_desc: "$hexamilion_wall$, що означає #italic «шестимильна стіна»#!, була побудована ще в античні часи для оборони області [ShowAreaName('morea_area')]."
  oma_falaj: "Фалад"
  oma_falaj_desc: "$oma_falaj$ — це система підземних акведуків. З її допомогою можна забезпечити водою будь-який район."
  oma_nizwa_fort: "Фортеця Нізва"
  oma_nizwa_fort_desc: "$oma_nizwa_fort$ — ключове місце торгівлі #TOOLTIP:GOODS,incense,X #L пахощами#!#! в #TOOLTIP:AREA,oman_area,X #L Омані#!#!."
  coastal_settlements: "Прибережне поселення"
  coastal_settlements_desc: "$coastal_settlements$ приваблять більше нашого [Concept('pops', 'населення')|e]."
  dutch_trade_outpost: "Голландський торговий аванпост"
  dutch_trade_outpost_desc: "Щоб зміцнити вплив у #TOOLTIP:REGION,japan_region,X #L Японії#!#! та мати змогу вільно торгувати на її території, багато #italic голландських купців#! підтримують добрі стосунки з місцевими правителями."
  dutch_admiralty_desc_common: "Численні адміралтейства роз'єднали державу, зате тепер усі наші провінції мають у розпорядженні власні військово-морські сили."
  friesland_admiralty: "Адміралтейство Фрисландії"
  friesland_admiralty_desc: "$dutch_admiralty_desc_common$"
  west_friesland_admiralty: "Адміралтейство Західної Фрисландії"
  west_friesland_admiralty_desc: "$dutch_admiralty_desc_common$"
  rotterdam_admiralty: "Адміралтейство Роттердама"
  rotterdam_admiralty_desc: "$dutch_admiralty_desc_common$"
  zeeland_admiralty: "Адміралтейство Зеландії"
  zeeland_admiralty_desc: "$dutch_admiralty_desc_common$"
  amsterdam_admiralty: "Адміралтейство Амстердама"
  amsterdam_admiralty_desc: "$dutch_admiralty_desc_common$"
  library_of_vijayanagar: "Віджаянагарська бібліотека"
  library_of_vijayanagar_desc: "Ця бібліотека — один із найбільших центрів просвіти імперії [ShowLocationName('vijayanagar')]. Завдяки їй рівень освіченості нашого населення зросте."
  city_of_victory: "Місто перемоги"
  city_of_victory_desc: "Це місто — символ надії для всієї Південної Індії та одне з найвеличніших місць у світі. Щороку сюди стікаються вчені та посли, щоб на власні очі побачити цивілізацію #TOOLTIP:LOCATION,$vijayanagar_tt$,X #L Віджаянагари#!#!."
  ranganathaswamy_temple_building: "$ranganathaswamy_temple$"
  ranganathaswamy_temple_building_desc: "Після повної реконструкції релігійного центру в #TOOLTIP:LOCATION,$srirangam_tt$,X #L Шрірангамі#!#! ця будівля стала одним із найпрекрасніших храмів Південної Індії."
  venkateswara_temple: "Храм Венкатешвари"
  venkateswara_temple_desc: "Після нещодавніх пожертвувань вплив Венкатешвари та Тірупаті на #TOOLTIP:AREA,tamil_land_area,X #L Тамілнад#!#! та його околиці суттєво зріс."
  constantinople_observatory: "Обсерваторія Такіюддіна"
  constantinople_observatory_desc: "Ця велична обсерваторія розташована на пагорбі, звідки чудово видно нічне небо. Якщо ця будівля вистоїть, то вона значно посприяє розвитку науки в #TOOLTIP:RELIGION,$muslim_tt$,X #L мусульманських#!#! землях."
  kurmina_headquarter: "Штаб курміна-фарі"
  kurmina_headquarter_desc: "Цей штаб вміщує головний гарнізон провінції. Тут здійснюється військова підготовка та організовується захист від загарбників."
  great_enclosure: "Високі стіни"
  great_enclosure_desc: "Високі стіни призначені для стримування #TOOLTIP:GOODS,livestock,X #L худоби#!#! та можуть послужити укриттям у час потреби."
  great_hill_complex: "Великий пагорбовий комплекс"
  great_hill_complex_desc: "$great_hill_complex$ — священне місце, де проводяться найважливіші обряди. Крім того, тут знаходиться безліч реліквій із талькового каменю."
  great_valley_complex: "Великий долинний комплекс"
  great_valley_complex_desc: "$great_valley_complex$ надає багато житла та все необхідне для освоєння ресурсів #TOOLTIP:LOCATION,$great_zimbabwe_tt$,X #L Великого Зімбабве#!#!."
  wat_chaiwatthanaram_temple_building: "Ват Чайваттханарам"
  wat_chaiwatthanaram_temple_building_desc: "Цей храм обслуговує потреби нашого правителя. Тут проходять державні релігійні церемонії, а також похорони правителів та членів їхніх сімей."
  khmer_baray: "Барай"
  khmer_baray_desc: "Такі споруди утворюють велику рукотворну водойму, сприяють розвитку сільського господарства та забезпечують наше населення їжею. Бараї швидко приходять у непридатність, тому вимагають пильного нагляду та регулярного обслуговування."
  herrenchiemsee_abbey_potential: "Абатство Херренкімзе можна побудувати лише на острові Кімзе. При цьому він повинен перебувати під контролем Баварії."
  herrenchiemsee_abbey: "Абатство Херренкімзе"
  herrenchiemsee_abbey_desc: "Чудовий монастир у стилі бароко, розташований на острові Кімзе. Він не тільки має величезне культурне значення, а й сприяє підвищенню грамотності та збереженню баварських традицій."
  munich_residenz_founding: "Середньовічна Мюнхенська резиденція"
  munich_residenz_founding_desc: "Розташована в #TOOLTIP:LOCATION,munich_tt,X #L Мюнхені#!#! фортеця для захисту уряду під час бунтів, повстань та внутрішньополітичних конфліктів. Головна резиденція баварських правителів та символ їхньої величезної влади."
  munich_residenz_founding_potential: "Можна побудувати тільки після початку події «Заснування Мюнхенської резиденції»."
  munich_residenz_renaissance_expansion: "Мюнхенська резиденція епохи Відродження"
  munich_residenz_renaissance_expansion_desc: "В епоху Відродження #TOOLTIP:LOCATION,munich_tt,X #L Мюнхенська#!#! резиденція була значно розширена з метою продемонструвати багатство та велич Баварії. До неї прибудували нові розкішні зали з вишуканими прикрасами, що лише зміцнило статус міста як культурного центру Священної Римської імперії."
  munich_residenz_renaissance_expansion_potential: "Можна побудувати тільки після початку події «Розширення резиденції в епоху Відродження» та за наявності Мюнхенської резиденції."
  munich_residenz_baroque_expansion: "Мюнхенська резиденція в стилі бароко"
  munich_residenz_baroque_expansion_desc: "Оновлення #TOOLTIP:LOCATION,munich_tt,X #L Мюнхенської#!#! резиденції в стилі бароко відображає архітектурні віяння епохи Просвітництва. Пишні сади, величні зали та складні елементи оформлення підкреслюють багатство династії Віттельсбахів, зміцнюючи її вплив у Баварії та за її межами."
  munich_residenz_baroque_expansion_potential: "Можна побудувати тільки після початку події «Розширення резиденції в епоху бароко» та за наявності Мюнхенської резиденції епохи Відродження."
  bajang_ratu: "Баджанг Рату"
  bajang_ratu_desc: "$bajang_ratu$ — величні церемоніальні #italic чанді-бентари#!, або розколоті ворота. Ця міцна споруда з червоної цегли напевно стане однією з найвищих у $MAJ_ADJ$ому регіоні. Ворота виконують важливу функцію: вони використовуються для великих релігійних та політичних церемоній."
  bubu_building: "Бубу"
  bubu_building_desc: "$bubu_building$ — це хитромудра місцева пастка для риби. Такі пастки сплітаються з м'якої деревини, наприклад, бамбука. Досвідчені рибалки встановлюють їх в гирлах річок та інших стратегічних точках і використовують складні методи для підвищення улову."
  sufi_mosque: "Суфійська мечеть"
  sufi_mosque_desc: "Ця споруда зводиться місцевими жителями, які нещодавно прийняли #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, і відображає більш синкретичний підхід до віри."
  wali_songo_shrine: "Святилище валі"
  wali_songo_shrine_desc: "Це святилище присвячене #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламському#!#! святому, який відіграв велику роль у поширенні ісламу в цих землях."
  fulani_cattle_rearing_pen: "Загін для великої рогатої худоби"
  fulani_cattle_rearing_pen_desc: "Загони для великої худоби, розміщені в цьому [Concept('location', 'районі')|e], посприяють подальшому розвитку скотарства серед #TOOLTIP:CULTURE,$fulbe_tt$,X #L фульбського#!#! народу."
  trans_saharan_trade_outposts: "Торговий аванпост у Сахарі"
  trans_saharan_trade_outposts_desc: "На торгових аванпостах зупиняються каравани, що перетинають пустелю Сахару. Будуючи такі об'єкти, ми посилюємо свій вплив у регіоні."
  son_unlocked_trans_saharan_outposts_tt: "Відкриває [Concept('building', 'споруду')|e] «[ShowBuildingTypeName('trans_saharan_trade_outposts')]»"
  debere_meshwae: "Дебере Мешвар"
  debere_meshwae_desc: "Великий [ShowBuildingTypeName('miaphysite_monastery')|l] [ShowBuildingTypeNameWithNoTooltip('debere_meshwae')] зміцнив владу #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L духовенства#!#! над цими землями та покращив умови життя місцевого населення."
  walls_of_benin: "Стіни Беніна"
  walls_of_benin_desc: "Ці стіни оберігають [ShowLocationName('benin')] від завойовників та забезпечують його процвітання."
  zazzau_walls: "Стіни $zazzau$"
  zazzau_walls_desc: "Ці стіни слугують демонстрацією сили, як нагадування сусіднім країнам у #TOOLTIP:REGION,Реймсский собор_region,X #L Гвінеї#!#!, що від Заззау краще триматися подалі."
  eghabho_nore_mansion: "Особняк Егабхо Н’оре"
  eghabho_nore_mansion_desc: "Житло голови міста, який відповідає за управління місцевими землями від імені правителя."
  ribat: "Рибат"
  ribat_desc: "Невелике укріплення, призначене головним чином для захисту караванів або невеликих областей від набігів."
  delhi_tomb: "Індійська гробниця"
  delhi_tomb_desc: "Ця гробниця великого діяча Індії слугує важливим символом культури та пам'яткою міста."
  ori_portuguese_quarters: "Португальське подвір'я"
  ori_portuguese_quarters_desc: "Ці покої слугують резиденцією та місцем відпочинку багатих іноземних купців, які прибули до Індії."
  mahmud_gawan_madrasa: "Медресе Махмуда Гавана"
  mahmud_gawan_madrasa_desc: "Зведене з метою надати вченим з усього світу можливість познайомитися з нашою культурою, це медресе вважається одним з найвеличніших релігійних навчальних закладів #TOOLTIP:REGION,deccan_region,X #L Декану#!#!."
  por_feitoria: "Фейторія"
  por_feitoria_desc: "Обладнана гарматами та береговими батареями фейторія зміцнює наш вплив у районі та полегшує торгівлю для наших купців."
  rahdar: "Радар"
  rahdar_desc: "Для захисту торгових шляхів #TOOLTIP:REGION,hindustan_region,X #L Індостану#!#! необхідно створити радар — дорожній патруль, який забезпечуватиме безпечну торгівлю в цьому районі."
  red_fort: "Червоний форт"
  red_fort_desc: "[ShowBuildingTypeName('red_fort')] не тільки відображає престиж свого власника, але й дозволяє посилити контроль над місцевими землями та забезпечити їх захист від нападів."
  guich_garrison: "Амазизький гарнізон"
  guich_garrison_desc: "Гарнізон, де розташовуються та відпочивають #L [ShowCultureGroupName('amazigh_group')|l]і#! воїни. Дозволяє ефективніше захищати територію."
  gurgaddi: "Гуру Гадді"
  gurgaddi_desc: "Гуру Гадді, що означає «місце гуру», — це резиденція духовних лідерів #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхів#!#!."
  usa_academy_of_arts_and_sciences: "Американська академія мистецтв і наук"
  usa_academy_of_arts_and_sciences_desc: "$usa_academy_of_arts_and_sciences$ сприятиме всебічному розвитку держави та дозволить привести її до процвітання, на яке заслуговує наш вільний і благочестивий народ."
  usa_academy_of_arts_and_sciences_why: "Американську академію мистецтв і наук можна побудувати тільки в ході події."
  usa_philosophical_society: "Американське філософське товариство"
  usa_philosophical_society_desc: "Підтримуючи вчених з різних галузей науки, $usa_philosophical_society$ слугуватиме інтелектуальним центром країни та дозволить нам залишатися в авангарді наукового прогресу."
  usa_philosophical_society_why: "Американське філософське товариство можна побудувати лише під час події."
  usa_national_bank: "Перший банк США"
  usa_national_bank_desc: "$usa_national_bank$ стабілізуватиме курс валюти та надаватиме підтримку нашому уряду."
  usa_national_bank_why: "Перший банк США можна побудувати лише під час події."
  usa_national_mint: "Монетний двір США"
  usa_national_mint_desc: "$usa_national_mint$ відповідатиме за карбування монет, регулюючи та розвиваючи цей процес."
  usa_national_mint_why: "Монетний двір США можна побудувати лише під час події."
  zhixian: "Чжисянь"
  zhixian_desc: "Ця установа місцевого магістрату стежить за управлінням навколишніми землями. Чиновники там — імператорські призначенці, що представляють владу Трону Дракона в провінціях."
  seljuk_mint: "Сельджуцький монетний двір"
  seljuk_mint_desc: "$seljuk_mint$ — функціонуюча охоронювана установа для карбування монет. Вона символізує політичну владу та фінансову стабільність."
  tur_kodjabashi_office: "Управління коджабаші"
  tur_kodjabashi_office_desc: "Вдавшись до допомоги населення підкорених #TOOLTIP:REGION,balkan_region,X #L Балкан#!#!, ми зможемо зняти навантаження з нашої бюрократії, але посилимо вплив місцевих жителів."
  tur_kodjabashi_office_is_in_balkans: "[Concept('location', 'Район')|e] у #TOOLTIP:REGION,balkan_region,X #L Балканському#!#! [Concept('region', 'регіоні')|e]"
  tur_kodjabashi_office_is_not_capital: "[Concept('location', 'Район')|e] не є [Concept('capital', 'столицею')|e]"
  phanariot_district: "Район фанаріотів"
  phanariot_district_desc: "Це район #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!, де живуть фанаріоти, багаті #TOOLTIP:CULTURE,greek_culture,X #L грецькі#!#! купці."
  maniot_toll_guards: "Маніотські збирачі мит"
  maniot_toll_guards_desc: "Завдяки правам на місцеві дороги маніоти — група #TOOLTIP:AREA,morea_area,X #L морейських#!#! бандитів — контролюють значну частину працівників адміністрації та торгівлі."
  bulgarian_administration_center: "Адміністративний центр Болгарії"
  bulgarian_administration_center_desc: "Цей район є адміністративним центром #TOOLTIP:AREA,bulgaria_area,X #L Болгарії#!#!."
  jewish_district: "[ShowReligionAdjectiveWithNoTooltip('judaism')]ий район"
  jewish_district_desc: "Це район для проживання місцевих #TOOLTIP:RELIGION,judaism,X #L юдеїв#!#!."
  darussifa: "Дарюшифа"
  darussifa_desc: "Лікарня, побудована ще за Ільханату. Одна з найпередовіших лікарень у світі та центр прикладної медицини."
  woodhenge_of_cahokia: "Кахокійський Вудхендж"
  woodhenge_of_cahokia_desc: "$woodhenge_of_cahokia$ — це стародавній календар, що являє собою встромлені в землю жердини, які вказують точне положення висхідного сонця в дні зимового та літнього сонцестояння, а також весняного та осіннього рівнодення."
  cahokia_woodhenge_why: "$woodhenge_of_cahokia$ можна побудувати лише під час події."
  charite_of_berlin: "Шаріте"
  charite_of_berlin_desc: "$charite_of_berlin$ — це карантинна зона, розташована за стінами Берліна, яка допомагає боротися з епідеміями."
  qalat_al_mashwar: "Калат-аль-Мешоуар"
  qalat_al_mashwar_desc: "У самому серці Тлемсена знаходиться укріплений палацовий комплекс неймовірної краси, який не тільки символізує владу та процвітання, а й є адміністративним центром правлячої династії. Крім того, цей розкішний палац — ще й надійна фортеця, що захищає від ворожих вторгнень."