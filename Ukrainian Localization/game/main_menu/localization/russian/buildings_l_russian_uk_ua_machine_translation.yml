  local_schools: "Місцеві школи"
  local_newspaper: "Місцева газета"
  naval_governor: "Дім морського губернатора"
  naval_governor_desc: "$local_governor_desc$"
  local_governor: "Дім місцевого губернатора"
  local_governor_desc: "Це місце для засідань регіональної влади дозволяє країні розширювати вплив за межі прилеглих до столиці територій та контролювати найвіддаленіші землі. За налагодженого дорожнього сполучення зі столицею такі споруди перетворюються на повноцінні центри управління."
  horse_breeders: "Конеферма"
  porcelain_guild: "Піч для порцеляни"
  naval_supplies_guild: "Гільдія суднобудівних матеріалів"
  sugar_liquor_guild: "Цукрова винокурня"
  wheat_liquor_guild: "Пшенична винокурня"
