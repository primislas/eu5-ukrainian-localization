  sufi_lodge: "Суфійська обитель"
  sufi_lodge_desc: "$sufi_lodge$, також відома під такими назвами, як ханака, завія, рібат, дарга, так'я — місце для духовних суфійських практик та занять з релігійного містицизму. Її спорудження та утримання розцінюються як акт благочестя та доказ прихильності суфійським звичаям та зміцненню #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
