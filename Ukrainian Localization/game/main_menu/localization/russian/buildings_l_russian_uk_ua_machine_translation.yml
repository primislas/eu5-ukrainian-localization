l_russian:
  local_governor_tt: "Якщо кількість #TOOLTIP:BUILDING_TYPE,local_governor,X #L будинків місцевих губернаторів#!#! [SCOPE.sCountry('actor').Custom('predlog_vvo')] [SCOPE.sCountry('actor').Custom('CL_PREP')] менша за [SCOPE.sCountry('actor').GetModifierValue('num_local_governors')] (зараз: [SCOPE.sCountry('actor').GetTotalBuildingLevelsIncudingUnderConstruction('local_governor')|V])."
  naval_governor_tt: "Якщо кількість #TOOLTIP:BUILDING_TYPE,naval_governor,X #L будинків морських губернаторів#!#! [SCOPE.sCountry('actor').Custom('predlog_vvo')] [SCOPE.sCountry('actor').Custom('CL_PREP')] менша за [SCOPE.sCountry('actor').GetModifierValue('num_naval_governors')] (зараз: [SCOPE.sCountry('actor').GetTotalBuildingLevelsIncudingUnderConstruction('naval_governor')|V])."
  local_bailiff_tt: "Якщо кількість #TOOLTIP:BUILDING_TYPE,bailiff,X #L бейліфів#!#! [SCOPE.sCountry('actor').Custom('predlog_vvo')] [SCOPE.sCountry('actor').Custom('CL_PREP')] менша за [SCOPE.sCountry('actor').GetModifierValue('num_bailiffs')] (зараз: [SCOPE.sCountry('actor').GetTotalBuildingLevelsIncudingUnderConstruction('bailiff')|V])."
  colonial_category: "Колоніальні споруди"
  colonial_category_desc: "Ці споруди можна будувати в чужих незахоплених землях, щоб поширювати там наш вплив."
  cultural_category: "Культурні споруди"
  cultural_category_desc: "Ці споруди допомагають нам просвіщати неосвічені маси та розвивати свою культуру."
  defense_category: "Оборонні споруди"
  defense_category_desc: "Ці споруди призначені для оборони місцевості, їх вплив може поширюватися і на сусідні місцевості."
  government_category: "Урядові споруди"
  government_category_desc: "Ці споруди безпосередньо управляються країною та служать для зміцнення її влади."
  infrastructure_category: "Інфраструктурні споруди"
  infrastructure_category_desc: "Ці споруди підвищують цінність місцевості, в якій побудовані."
  military_category: "Військові споруди"
  military_category_desc: "Ці споруди дозволяють навчати військові загони в тій місцевості, де побудовані."
  naval_category: "Морські військові споруди"
  naval_category_desc: "Ці споруди призначені для будівництва кораблів та підвищення [Concept('natural_harbor_suitability', 'придатності гавані')|e]."
  rgo_building_category: "Виробництво ресурсів"
  rgo_building_category_desc: "За допомогою цих [Concept('buildings', 'споруд')|e] ми можемо видобувати різні [Concept('raw_materials', 'ресурси')|e]."
  trade_company_building: "Споруда торговельної компанії"
  satellite_trade_building: "Торговельна споруда залежної країни"
  free_village: "Вільне село"
  free_village_desc: "Поселення вільних селян, які не обтяжені зобов'язаннями перед землевласниками, типовими для сільських громад."
  guild: "Гільдія"
  workshop: "Майстерня"
  midgame_manufactory: "Мануфактура"
  lategame_manufactory: "Фабрика"
  unique_palace: "Особливий палац"
  basic_industry_category: "Основна промисловість"
  basic_industry_category_desc: "Ці [Concept('buildings', 'споруди')|e] дозволяють виробляти [Concept('goods', 'товари')|e], які здебільшого використовуються іншими спорудами."
  weapons_industry_category: "Збройна промисловість"
  weapons_industry_category_desc: "Ці [Concept('buildings', 'споруди')|e] дозволяють виробляти [Concept('goods', 'товари')|e] для військових потреб."
  consumer_goods_category: "Споживчі товари"
  consumer_goods_category_desc: "Ці [Concept('buildings', 'споруди')|e] дозволяють виробляти [Concept('goods', 'товари')|e] для [Concept('pops', 'населення')|e]."
  estate_category: "Споруди станів"
  estate_category_desc: "[Concept('estates', 'Стани')|e] будують ці споруди для власної вигоди."
  religious_category: "Релігійні споруди"
  religious_category_desc: "Ці споруди слугують для проведення релігійних обрядів та збільшують вплив духовенства в країні."
  trade_category: "Торгові споруди"
  trade_category_desc: "Ці споруди покращують нашу національну торгівлю, дозволяючи купцям ефективніше торгувати або діяти на нових ринках."
  village_category: "Села"
  village_category_desc: "Ці села можна побудувати в сільській місцевості."
  irrigation_systems: "Іригація"
  bridge_infrastructure: "Міст"
  mason: "Будівля мулярів"
  construction_center: "Будівельний центр"
  construction_center_desc: "Дозволяє зводити в [Concept('town_or_city', 'міській місцевості')|e] кілька споруд одночасно."
  trade_office: "Торгова контора"
  embassy: "Посольство"
  black_market: "Чорний ринок"
  black_market_desc: "На цьому незаконному ринку можна торгувати подалі від пильних очей влади, не турбуючись про податки та жадібних приставів."
  smuggler_cove: "Бухта контрабандистів"
  smuggler_cove_desc: "Перевезення незаконних товарів та процвітання чорних ринків можливі завдяки вузьким прибережним затокам або затишним гаваням. $smuggler_cove$ — яскравий приклад такого таємного місця."
  brothel: "Бордель"
  brothel_desc: "Борделі, в яких процвітає порок та розпуста, є улюбленими місцями розваг піратів, каперів та інших сумнівних особистостей."
  pirate_tavern: "Таверна в гавані"
  pirate_tavern_desc: "У цих жвавих закладах збираються різного роду ділки, моряки та купці. Ці таверни розташовуються в різних портових містах та відіграють найважливішу роль у житті піратів. Тут екіпаж може відпочити, витратити здобич на випивку, їжу та розваги, а також найняти нових людей у команду."
  building_trade_hq_only_one: "За раз можна побудувати лише один штаб торговельної компанії."
  trade_company_headquarters: "Штаб торговельної компанії"
  trade_company_headquarters_desc: "Штаб — це серце будь-якої майбутньої #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#!. Він є центром міжнародної та заморської торгівлі в інтересах батьківщини."
  trade_company_garrison: "Гарнізон компанії"
  trade_company_garrison_desc: "Гарнізон #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! захищає місцеві інтереси купців."
  trade_company_harbor: "Гавань компанії"
  trade_company_harbor_desc: "На місцевих складах #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! зберігається готовий до продажу товар."
  trade_company_local_venture: "Місцеві підприємства компанії"
  trade_company_local_venture_desc: "Ці підприємства створює #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельна компанія#!#! у спробі використати місцеві ресурси з вигодою для себе."
  trade_company_foreign_influence: "Центр впливу компанії"
  trade_company_foreign_influence_desc: "Ця колоніальна споруда #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#! відкриває можливості для іноземних груп населення."
  trade_company_governance: "Правління компанії"
  trade_company_governance_desc: "Місцева військова споруда #TOOLTIP:SUBJECT_TYPE,trade_company,X #L торговельної компанії#!#!, де йде набір та навчання військ, які відстоюватимуть інтереси компанії."
  settlement_building: "Поселення"
  bailiff: "Бейліф"
