  farming_village: "Землеробське село"
  forest_village: "Лісове село"
  market_village: "Торгове село"
  market_village_explanation: "Поруч є [Concept('own', 'належні')|e] нам [Concept('locations', 'місцевості')|e], де побудовано [ShowBuildingTypeName('market_village')|l]"
  tar_kiln: "Дьогтярна яма"
  stone_quarry: "Каменоломня"
  lumber_mill: "Лісопилка"
  sand_pit: "Піщаний кар'єр"
  fiber_crops_farm: "Поля прядильних культур"
  sheep_farms: "Вівчарські господарства"
  clay_pit: "Глинокопальня"
  charcoal_maker: "Вуглевипалювальна піч"
  improved_charcoal_maker: "Вуглевипалювач"
  improved_charcoal_maker_desc: "Нові методи спалювання вугілля дозволяють нам виробляти більше вугілля та підвищують швидкість обігу."
  pound_lock_canal_infrastructure: "Судноплавний шлюз"
  elephant_hunting_grounds: "Місця полювання на слонів"
  kilwan_shipwrights: "Кілванські суднобудівники"
  kilwan_shipwrights_desc: "Вправні майстри виготовляють морські судна з пальмової деревини та бавовни. Ця споруда допоможе нам розширити свій флот та втілити в життя морські прагнення."
  bog_iron_smelter: "Плавильня болотної руди"
  bog_iron_smelter_desc: "Залізо — основа всієї металургії. В ідеалі найкраще мати повноцінні, великі поклади, але за їх відсутності можна добути трохи металу там, де він накопичується біля води."
  protected_harbor: "Захищена гавань"
  protected_harbor_desc: "Деякі місця за своєю природою особливо добре підходять для гаваней, але відповідною інфраструктурою можна покращити що завгодно."
  temple: "Храм"
  cathedral: "Кафедральний собор"
  counting_house: "Контора"
  merchants_quarters: "Купецьке подвір'я"
  merchants_quarters_desc: "У цьому жвавому підвор'ї розташовано безліч крамниць та сховищ. Тут постійно щось обмінюють та купують."
  marketplace: "Ринок"
  marketplace_desc: "Цей гамірний ринок стимулює розвиток торгівлі на локальному та регіональному рівнях. Тут можна знайти як місцеві, так і привізні товари."
  grand_marketplace: "Великий ринок"
  grand_marketplace_desc: "Великий процвітаючий центр торгівлі."
  commerce_center: "Торговий центр"
  commerce_center_desc: "Жвавий торговий центр, де можна купити товари з усього світу. Якщо у вас, звісно, є золото. Серце місцевої торгівлі."
  granary: "Амбар"
  qullqa: "Колька"
  minting_office: "Монетний двір"
  port_authority: "Портове управління"
  orthodox_monastery: "Православний монастир"
  miaphysite_monastery: "Міафізитський монастир"
  seat_of_cardinal: "Кафедра кардинала"
  seat_of_cardinal_why: "Лише #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! країна з [Concept('country_rank', 'рангом')|e] #TOOLTIP:COUNTRY_RANK,rank_duchy,X #L «Герцогство»#!#! і вище може #TOOLTIP:GENERIC_ACTION,request_cardinal_seat,X #L попросити про кафедру кардинала#!#! для [Concept('location', 'місцевості')|e], де є #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедральний собор#!#!."
  has_religious_building: "Можна просити лише для [Concept('location', 'місцевості')|e], де є #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедральний собор#!#!"
  wharf: "Пристань"
  medical_school: "Медичне училище"
  hospital: "Лікарня"
  pest_house: "Чумний барак"
  pest_house_desc: "Це невелика хатина за межами поселення, де в неволі утримуються хворі та заразні, щоб епідемія не перекинулася на решту мешканців."
  pest_house_tt: "Можна будувати під час [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,black_death,X #L «Чорна смерть»#!#!, тільки якщо застосовано дію #TOOLTIP:GENERIC_ACTION,strict_quarantines,X #L «Вигнання хворих»#!#!."
  lazaretto: "Лазарет"
  lazaretto_desc: "Це невелика віддалена лікарня, зазвичай у сільській місцевості, на острові або на узбережжі. Сюди поміщають морських мандрівників, якщо виникає підозра, що вони можуть переносити заразні хвороби. Лазарети допомагають сильно обмежити поширення епідемій у місцевості."
  lazaretto_why: "Можна будувати лише в #Y прибережних#! місцевостях"
  slave_market: "Невільницький ринок"
  art_school: "Художня школа"
  funduq: "Фондук"
  funduq_desc: "Громадська будівля у важливих торгових містах. Тут купці відпочивають, проводять зустрічі та зберігають свої товари."
  fortress_granary: "Агадир"
  fortress_granary_desc: "Укріплене громадське сховище, звичне для народів Північної Африки. Такі споруди будували на вершинах пагорбів, що дозволяло захищати запаси та обороняти прилеглі угіддя та степи."
