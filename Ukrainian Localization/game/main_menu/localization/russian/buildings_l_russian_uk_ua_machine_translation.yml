  glass_guild: "Гільдія склярів"
  gun_smith: "Будівля зброярів"
  cannon_maker: "Будівля гармашів"
  distillers_guild: "Гільдія винокурів"
  dyes_guild: "Фарбувальня"
  pottery_workshop: "Гончарна майстерня"
  pottery_workshop_desc: "Гончарі потрібні скрізь, вони виготовляють найрізноманітніші посудини, від простих горщиків для зберігання до ваз для прикраси. Налагодивши виробництво посуду в спеціальних майстернях, можна задовольнити потребу народу."
  tools_workshop: "Інструментальна майстерня"
  tools_workshop_desc: "З розвитком економіки ми більше не можемо покладатися на інструменти, створювані ремісниками. Назріла необхідність створення повноцінних майстерень, які вироблятимуть інструменти для населення та підприємств."
  dyes_workshop: "Майстерня барвників"
  dyes_workshop_desc: "Барвники та пігменти можна отримати з різних джерел, але секрети їх обробки відомі лише вузькому колу людей."
  dyesworks: "Фарбувальні"
  dyesworks_desc: "Створення спеціальних майстерень та розширення виробництва барвників дозволять нашому населенню використовувати будь-які пігменти та фарби."
  dyes_mill: "Фарбувальна фабрика"
  dyes_mill_desc: "Лише великі мануфактури з виробництва різноманітних барвників зможуть задовольнити зростаючу потребу населення в пігментах та незвичайних кольорах."
  cloth_manufactory: "Текстильна мануфактура"
  fine_cloth_manufactory: "Мануфактура тонкого сукна"
  naval_supplies_manufactory: "Мануфактура суднобудівних матеріалів"
  weapon_manufactory: "Збройна мануфактура"
  putrefaction_works: "Селітряний завод"
  paper_workshop: "Паперова майстерня"
  printing_press_shop: "Друкарська майстерня"
  glassworks: "Скляна фабрика"
  perfumery: "Парфумерна майстерня"
  porcelain_manufactory: "Порцелянова мануфактура"
  tannery_manufactory: "Дубильна мануфактура"
  distiller_manufactory: "Винокурна мануфактура"
  lacquerware_manufactory: "Мануфактура лакових виробів"
  brewery_manufactory: "Великий пивзавод"
  iron_foundry: "Чавуноливарний цех"
  fine_cotton_cloth_mill: "Фабрика тонкого текстилю"
  textile_mill: "Текстильна фабрика"
  iron_mill: "Металургійний завод"
  iron_mill_desc: "Використовуючи доменні печі, металургійний завод зможе виробляти інструменти в набагато більших кількостях, ніж будь-якими іншими доступними методами."
  steel_mill: "Сталеливарний завод"
  weapon_factory: "Збройний завод"
  fine_cloth_mill: "Фабрика тонкого сукна"
  furniture_workshop: "Меблева майстерня"
  furniture_workshop_desc: "Зі зростанням добробуту наших містян зростає і їхній попит на такі товари, як $furniture$. Перенісши виробництво до більших майстерень, ми збільшимо вихід цієї продукції."
  glass_workshop: "Скляна майстерня"
  glass_workshop_desc: "Скло посідає важливе місце в повсякденному житті всього нашого населення. Зростання виробничих потужностей скляної майстерні дозволить нам не зупинятися на досягнутому."
  glass_mill: "Скляний завод"
  glass_mill_desc: "$glass_mill$ допоможе нам наростити виробництво, $glass$ виходитиме у збільшених обсягах. Розкочуючи розплавлене скло на залізних столах, ми, крім обсягів виробництва, зможемо суттєво наростити і його швидкість."
  cannon_workshop: "Гарматна майстерня"
  cannon_workshop_desc: "Зростаюча потреба нашого війська в артилерії змушує нас нарощувати обсяги виробництва гармат."
  weapon_workshop: "Збройова майстерня"
  weapon_workshop_desc: "Зростаюча потреба нашого війська та наших мисливців у зброї змушує нас нарощувати обсяги виробництва озброєння."
  naval_supplies_workshop: "Майстерня суднобудівних матеріалів"
  naval_supplies_workshop_desc: "Без суднобудівних матеріалів нам не реалізувати свої амбіції на морі. Розширення виробництва дозволить нам зберегти свої позиції та наростити випуск продукції."
  naval_supplies_mill: "Фабрика суднобудівних матеріалів"
  naval_supplies_mill_desc: "Міжнародна торгівля значно зростає, $naval_supplies$ потрібні в куди більших кількостях, ніж раніше. Щоб задовольнити зрослий попит, потрібні спеціальні заводи."
  saltpeter_workshop: "Селітрова майстерня"
  saltpeter_workshop_desc: "Зараз, коли зріс попит на порох у нашому війська, особливо цінним ресурсом стає штучна $saltpeter$."
  putrefaction_mill: "Селітрова фабрика"
  putrefaction_mill_desc: "Збільшивши кількість бойлерів для концентрації селітри та підвищивши їх надійність, ми зможемо наростити обсяги виробництва пороху для наших військ, а не закуповувати його за кордоном втридорога."
  beer_workshop: "Пивоварна майстерня"
  beer_workshop_desc: "Побудувавши більші заводи з більшими чанами для ферментації, ми зможемо виробляти більше спиртних напоїв."
  brewery_mill: "Пивоварний завод"
  brewery_mill_desc: "У великих пивоварнях можна використовувати парові двигуни та автоматизовані агрегати, щоб наростити обсяг виробництва."
  distillers_workshop: "Винокурна майстерня"
  distillers_workshop_desc: "Побудувавши більші винокурні заводи з більшими чанами для настоювання напоїв, ми зможемо виробляти більше міцного спиртного."
  distiller_mill: "Винокурний завод"
  distiller_mill_desc: "У великих винокурних заводах можна використовувати парові двигуни та автоматизовані агрегати, щоб наростити обсяг виробництва."
  cloth_workshop: "Ткацька майстерня"
  cloth_workshop_desc: "Спрощені методи очищення волокон та спеціальні майстерні дозволять нам наростити виробництво. $cloth$ виходитиме у збільшеному обсязі."
  fine_cloth_workshop: "Майстерня тонкого сукна"
  fine_cloth_workshop_desc: "Спрощені методи очищення волокон та спеціальні майстерні дозволять нам наростити виробництво. $fine_cloth$ виходитиме у збільшеному обсязі."
  guns_workshop: "Зброярські майстерні"
  guns_workshop_desc: "Зростаюча потреба нашого війська в озброєнні змушує нас нарощувати обсяги виробництва вогнепальної зброї."
  tanning_workshop: "Шкіряна майстерня"
  tanning_workshop_desc: "$leather$ тепер виробляється за тоншим процесом, що розширює асортимент та кількість одержуваної продукції."
  tannery_mill: "Дубильна фабрика"
  tannery_mill_desc: "З новими хімікатами та ефективнішими методами виробництва наша шкіряна продукція буде поза конкуренцією."
  printing_manufactory: "Друкарська мануфактура"
  printing_manufactory_desc: "Нові технології книгодрукування дозволяють друкарям випускати більше книг."
  printing_mill: "Друкарня"
  printing_mill_desc: "Нова технологія з використанням хімікатів та міцніших друкованих форм дозволяє налагодити масовий випуск книг."
  paper_manufactory: "Паперова мануфактура"
  paper_manufactory_desc: "Підвищений попит на папір, що виник у зв'язку з розвитком друкарської справи, змушує використовувати новаторські методи при виробництві паперу."
  paper_mill: "Паперова фабрика"
  paper_mill_desc: "Завдяки текстилю з бавовняною основою на фабриках можна буде виробляти більше паперу."
  winery: "Виноробня"
  winery_desc: "У цій невеликій гільдії солодкі плоди шляхом бродіння перетворюються на п'янкі напої. Нехай на смак вони менш вишукані, ніж виноградні вина, їх однаково люблять як дворяни, так і простий люд. Способи приготування та смаки різняться від регіону до регіону."
  winery_manufactory: "Виноробна мануфактура"
  winery_manufactory_desc: "Неухильне зростання попиту на очищені зброджені соки призводить до появи великих центрів виробництва, що об'єднують звичаї та нові технології. Стародавні техніки виготовлення вин ставляться на потік, що дозволяє постачати цією продукцією жваві міста та великі торгові мережі: жоден келих не повинен залишитися порожнім."
  firearms_manufactory: "Рушнична мануфактура"
  cannon_foundry: "Гарматний ливарний цех"
  pottery_guild: "Гільдія гончарів"
  pottery_guild_desc: "Гончарство — один із найстаріших видів економічної активності. Утворення гончарних гільдій заохочує обмін знаннями та спеціалізацію при роботі, що підвищує загальний обсяг виробництва."
  pottery_manufactory: "Гончарна мануфактура"
  pottery_manufactory_desc: "Зростаючий попит на керамічні вироби призвів до їх здешевлення за рахунок масовості виробництва. Із запровадженням загального, упорядкованого процесу виготовлення гончарна справа перестала бути ремеслом."
  pottery_mill: "Гончарний завод"
  pottery_mill_desc: "Зростання пропозиції, створене мануфактурним виробництвом керамічних виробів, призвело до закономірного підсумку: розвитку масової промисловості."
  apothecary: "Аптека"
  apothecary_desc: "Аптека — місце, де продаються ліки. Виготовляють їх як з природних матеріалів, на кшталт трав, так і з більш екзотичних складових, таких як роги тварин та ртуть."
  furniture_guild: "Гільдія теслярів"
  furniture_guild_desc: "Теслярство — один з основних видів діяльності для підтримки домогосподарств. Організація гільдій дозволяє теслярам встановити професійні стандарти та ділитися один з одним секретами майстерності."
  furniture_manufactory: "Меблева мануфактура"
  furniture_manufactory_desc: "Окремих меблярів-ремісників може бути недостатньо для задоволення попиту на меблі, особливо в містах, де повно буржуазії з підвищеними запитами. Організувавши виробництво меблів у великих майстернях, можна задовольнити зростаючий попит."
  furniture_mill: "Меблева фабрика"
  furniture_mill_desc: "Зростання суспільного багатства створює зростаючий попит на мануфактурні товари, такі як меблі. Єдиний спосіб підвищити пропозицію — виробляти меблі на фабриках промисловим способом."
  mercury_patio: "Амальгамаційний цех"
  mercury_patio_desc: "$mercury_patio$ — це комплекс будівель, де методом амальгамації з низькоякісних руд видобуваються золото та срібло, що робить видобуток таких руд рентабельним."
