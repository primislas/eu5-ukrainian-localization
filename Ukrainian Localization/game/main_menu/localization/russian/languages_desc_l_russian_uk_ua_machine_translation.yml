l_russian:
  scandinavian_language_desc: "В епоху вікінгів давньоскандинавська мова поширилася не лише в Скандинавії, а й поруч — в Ісландії та на Фарерах, а також частково на Британських островах. Згодом вона розпалася на кілька окремих споріднених мов — вони досить сильно різняться, але при цьому мають спільного предка."
  english_language_desc: "Англійська мова походить від англосаксонських діалектів, занесених до Британії германськими переселенцями. Згодом вона зазнала впливу скандинавських мов, якими розмовляли вікінги, що набігали на острів, і це призвело до значних змін у її лексиці та граматиці. Надалі на англійську мову сильно вплинула французька внаслідок вторгнення норманів, яке завершилося багатовіковим правлінням феодалів з континенту."
  brythonic_language_desc: "Бритськими мовами розмовляло давнє кельтське населення Британії. Згодом ці мови поширилися по обидва боки Ла-Маншу зусиллями біженців, що рятувалися від вторгнення англосаксів."
  gaelic_language_desc: "$gaelic_language$і мови (вони ж гойдельські) — це кельтська мовна сім'я ірландського походження. У Середні віки ними також розмовляло населення сусідніх з Ірландією островів."
  south_italian_language_desc: "Це група мов, поширених у середній та південній частинах Апеннінського півострова."
  north_italian_language_desc: "Мовами цієї групи розмовляє населення північної частини Апеннінського півострова."
  occitan_language_desc: "Окситано-романська група мов зародилася на півдні Франції. Згодом окситанська мова стала загальноприйнятою мовою спілкування в купецьких портах західного Середземномор'я."
  french_language_desc: "$french_language$ька мова, або ж #italic мови ойль#!, являє собою різноманітну групу романських діалектів, що виникли на півночі Франції."
  wendat_language_desc: "Це одна з найбільших гілок ірокезьких мов. Вона поширена у народів, які живуть уздовж річки Святого Лаврентія, а також на північ від Великих озер."
  abenakian_language_desc: "Ця східноалгонкінська гілка мов поширена на півночі Нової Англії та в Приморських провінціях Канади."
  cree_language_desc: "Ця група діалектів центральноалгонкінської мови поширена від Ньюфаундленду до Альберти."
  anishinabe_language_desc: "Ця група діалектів центральноалгонкінської мови поширена серед жителів Великих озер та долини річки Оттава."
  latin_language_desc: "Латина відіграла важливу роль в історії людства. Це мова Цезаря, Вергілія, Цицерона, Лютера, Декарта, Ньютона та безлічі інших великих діячів. Після переселення германських племен і падіння Західної Римської імперії з латини розвинулися #L [ShowLanguageFamilyName('romance_language_family')|l]ські#! мови. Однак сама латина нікуди не зникла, слугуючи мовою культури, дипломатії та релігії протягом наступних століть."