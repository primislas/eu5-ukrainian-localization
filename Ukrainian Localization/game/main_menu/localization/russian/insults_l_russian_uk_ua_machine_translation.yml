l_russian:
  insult_default: "Ваша матінка схожа на хом'яка, а від батечка смердить бузиною!"
  insult_default2: "Воістину, настав Судний день! Поплічники Сатани спустилися на нашу грішну землю… ні, зачекайте. Це всього лиш #L [TARGET_COUNTRY.GetAdjective|l]і#! виродки."
  insult_default3: "Крім того, я думаю, що місто [TARGET_COUNTRY.GetCapital.GetName] має бути зруйноване."
  insult_default4: "Коли нащадки описуватимуть наш час, на вас вони дивитимуться одночасно зі жалістю та огидою. Здається, це поєднання називається співчуттям."
  insult_default5: "Нещодавній візит до вбиральні здався мені приємнішим, ніж обід із #L [TARGET_COUNTRY.GetAdjective|l]им#! послом."
  insult_default6: "Ви тільки подивіться, які покидьки тут зібралися."
  insult_default7: "Ваша кров непогано удобрить землю, яку я у вас відберу."
  insult_default8: "#L [TARGET_COUNTRY.GetAdjective]і#! правителі абсолютно не уявляють, як керувати країною!"
  insult_default9: "[TARGET_COUNTRY.GetName] у глибокій біді. Мені здається, причина цьому — #L [TARGET_COUNTRY.GetCulture.GetName|l]а#! культура."
  insult_default10: "У нашій великій грі ви — всього лиш пішак."
  insult_default11: "#ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_INST')|L]#!#! #L [COUNTRY.GetAdjective|l]ий#! народ називає гній."
  insult_default12: "Ваші злодіяння відомі всьому світу — від Ірландії до Китаю."
  insult_default13: "Вам не здається, що слова «#L [TARGET_COUNTRY.GetAdjective|l]а#! культура» — це якесь протиріччя?"
  insult_default14: "Хай наповниться ваше небо кометами."
  insult_default15: "Щоб мапою світу можна було милуватися, з неї треба стерти ваш народ."
  insult_no_army: "І що ви зробите? Заллєте мене своєю кров'ю?"
  insult_bookkeeping: "Одного дня навіть #L [TARGET_COUNTRY.GetAdjective|l]і#! купці освоять рахівництво."
  insult_rome: "Чи правда, що всі дороги ведуть до Риму? Моїм воїнам не терпиться дізнатися."
  insult_heir_hunter: "Кажуть, ваш спадкоємець любить полювати. Буде неприємно, якщо на полюванні трапиться якась біда…"
  insult_monarchy: "У вашого роду страшна хвороба: ви вважаєте себе гідними."
  insult_european_indian: "Ось, значить, де вони — тридев'ять земель? Відчуваю, ми тут добре поживимося…"
  insult_diamonds: "Кажуть, діаманти вічні, а у вас їх якраз багато. Поділіться трохи і з нами — нам цікаво, чи переживуть вони вашу династію."
  insult_christian_muslim: "Навіть дивно, чому у язичників така багата і процвітаюча країна. Ну нічого, скоро ми виправимо цю несправедливість."
  insult_against_bahmanis: "Ще трохи — і ми відберемо всі ваші скарби. Навіть вашу дорогоцінну бірюзову табуретку."
  insult_against_timurid: "Ви могли б побудувати чудову країну. Шкода, що замість цього ви ріжете один одного, з'ясовуючи, хто з вас ближчий до жахливого вбивці."
  insult_against_deccani: "Поки ми будували цивілізацію, ви безцільно блукали просторами Декану. Схиліть коліно — або загиньте від рук спадкоємців Тимура та Чингісхана."
  insult_portugal_vs_africa_or_india: "Шлях до ваших берегів був довгим і небезпечним, проте ніщо не лякало нас так, як лякають будь-кого жахливі вади вашого язичницького двору."
  insult_against_habsburg: "Ваш мерзенний рід виродженців негідний #L [COUNTRY.GetAdjective|l]ого#! престолу."
  insult_byz_to_ven: "Ви принесли цій землі стільки лиха, що вас мало буде повісити на стінах!"
  insult_guybrush: "Б'єшся як корова!"
  insult_against_guybrush: "Б'єшся як доярка!"
  insult_low_dipadm: "[TARGET_COUNTRY.GetGovernment.GetRuler.GetName] просто вражає: у голові порожньо, як у підштаниках євнуха."
  insult_cossack_to_turk: "Ти, султан, чорт турецький, і проклятого чорта брат і товариш, самого Люцифера секретар."
  insult_muslim_truce: "Нехай назавжди пам'ятають наші сини, що ви зголили нам бороду, але самі при цьому позбулися рук."
  insult_against_denmark: "Якась у країні данській гниль."
  insult_against_england: "Якщо [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] впаде в Темзу — це буде нещастя. Якщо [Select_CString(TARGET_COUNTRY.GetGovernment.GetRuler.IsFemale,'її', 'його')] витягнуть — це буде катастрофа."
  insult_marprelate: "[TARGET_COUNTRY.GetGovernment.GetRuler.GetName] — підлий, паскудний, претензійний, поганий, мерзенний папський прелат і узурпатор."
  insult_marprelate2: "[TARGET_COUNTRY.GetGovernment.GetRulerTitle] вашої країни — нелегітимний, протиприродний, фальшивий, огидний церковний намісник, посланець Сатани, Антихрист, чорт у плоті, підлий боягуз і брехун."
  insult_against_saxony: "Буде прикро, якщо ваша майсенська порцеляна раптом розіб'ється…"
  insult_fort: "Ваші стіни впадуть під нашими ядрами, немов замок із піску — під набіглою хвилею."
  insult_revolutionary: "Шлях до прогресу почнеться з твого трупа, [TARGET_COUNTRY.GetGovernment.GetRuler.GetName]!"
  insult_monarchy_rank: "Ось це непорозуміння на вашій голові — корона? [TARGET_COUNTRY.GetName] — воістину дивна країна."
  insult_low_adm: "У мене в запасі ще безліч образ, проте навряд чи ви зумієте їх прочитати."
  insult_against_gbr: "Сонцю над Британською імперією час хилитися до заходу."
  insult_from_arabs: "Та зашиють тебе живцем у череві мертвого верблюда!"
  insult_against_craven: "Раджу переодягнутися в коричневі штани."
  insult_against_sinner: "Чи знає [TARGET_COUNTRY.GetConsort.GetName], скільки служниць відвідує ваші покої?"
  insult_against_hre: "Ваша країна — не священна, не римська і не імперія."
  insult_against_serbia: "Голів у вашого орла дві, зате корони — жодної."
  insult_against_european_in_india: "Ви затрималися в гостях."
  insult_japanese: "Така ганьба не під силу змити навіть сеппуку."
  insult_loans: "Гнітючий стан вашої економіки — чудовий урок кожному, хто мітить у правителі."
  insult_rebels: "Кажуть, ваш народ противиться. Це недивно — з вашим-то огидним обличчям."
  insult_low_mil_tech: "Ваші солдати вже вивчили, з якого боку тримати мушкет?"
  insult_golden_horde_vs_muscovy: "Вашим збирачам податей уготоване лише одне місце — під копитами наших коней!"
  insult_wallachia_to_ottomans: "[TARGET_COUNTRY.GetGovernment.GetRuler.GetName] сяде на палю — одразу слідом за вашими нікчемними арміями."
  insult_barbary_pirates: "Досить тобі розбійничати в Середземномор'ї, проклятий пірате!"
  insult_turkish_drunkard: "Румський султан? Смішно! Ти просто п'яниця, а не султан!"
  insult_against_england2: "Таке царство справді варте лише коня."
  insult_against_scotland: "Ми заберемо у вас не тільки життя, а й свободу!"
  insult_for_buddhists: "Та застрягнеш ти навічно в колесі Сансари, не знаючи радості просвітлення."
  insult_for_persians: "Наші стріли затьмарять сонце!"
  chinese_insult_1: "Кажуть, [TARGET_COUNTRY.GetGovernment.GetRuler.GetName] сповідує [TARGET_COUNTRY.GetReligion.GetName|l], сподіваючись на кращу долю в наступному житті. Однак у цьому житті долю кожної людини вирішує імператор."
  chinese_insult_2: "Беззаперечно підкоріться імператору — і будете щасливі. Інакше на вас обрушиться гнів армії Піднебесної!"
  chinese_insult_3: "Ваші проступки подібні до прикрої болячки. Її слід вилікувати, доки не довелося різати."
  insult_explorer_vs_africa_or_india: "У вас хоча б є прапор?"
  insult_republic_to_monarchy: "Баба, що сидить у ставку і роздає мечі направо і наліво, не може слугувати основою державного ладу. Вища виконавча влада повинна ґрунтуватися на волевиявленні мас, а не на якомусь безглуздому водному ритуалі."
  insult_from_pirates_1: "А ну, йди сюди, щуре сухопутний! Що, здуру захотілося до мене лізти? Ну, йди сюди, я тебе зараз на абордаж візьму!"
  insult_from_pirates_2: "Я обсиплю тебе картеччю, та так, що ти нею подавишся. Приготуйся піти на дно, негіднику."
  insult_from_pirates_3: "Мерзенний негідник! Слово «ром» і слово «смерть» для тебе означають одне й те ж!"
  insult_from_pirates_4: "Навіть мій пес був розумніший за тебе."
  insult_from_pirates_5: "Вибирай: або я тебе випотрошу, або знесу тобі башку!"
  insult_to_pirates_1: "Ви найжалюгідніший з усіх піратів, про яких мені доводилося чути."
  insult_jungle: "Варто визнати, [TARGET_COUNTRY.GetName] справді більше, ніж [COUNTRY.GetName]. Однак погодьтеся, що [COUNTRY.GetGovernment.GetRuler.GetName] панує над людьми, а [TARGET_COUNTRY.GetName] — над одними лісами та комарами."
  insult_german_humor: "Кажуть, німецький гумор — це вам не жарти."