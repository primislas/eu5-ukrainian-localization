l_russian:
 COLONIAL_CHARTER: "$ADJ$ая колония [PROVINCE_DEFINITION.GetNameWithNoTooltip]"
 START_COLONY_TT: "Для создания колониального поселения в провинции [PROVINCE_DEFINITION.GetName|Y] придётся потратить $COST$. Это будет постепенно привлекать [Concept('pops', 'группы населения')|e] в [Concept('locations', 'районы')|e] провинции [PROVINCE_DEFINITION.GetName], и со временем территория станет нашей."
 ABANDON_COLONY_TT: "Для отказа от колониального поселения в провинции [COLONIAL_CHARTER.GetName|Y] придётся потратить $COST$. [Concept('pops', 'Группы населения')|e], которые переехали в Concept('locations', 'районы')|e] на чужой территории, останутся без нашей помощи."
 START_COLONY_TT_NO_COST: "Создание колониального поселения в Concept('locations', 'районе')|e] провинции [PROVINCE_DEFINITION.GetName] будет привлекать туда [Concept('pops', 'группы населения')|e], и со временем вся территория станет вашей."
 ABANDON_COLONY_TT_NO_COST: "В заброшенное колониальное поселение больше не будут мигрировать люди. [Concept('pops', 'Группы населения')|e], которые переехали в Concept('locations', 'районы')|e] на чужой территории, останутся без нашей помощи."
 ABANDON_BUTTON: "Покинуть колониальное поселение"
 NO_COLONIAL_CHARTER_EXCLUSIVE: "Занято #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_INST')|L]#!#!, причина: $NAME$."
 NO_COLONIAL_CHARTER_RELIGION: "$NAME|Y$ — причина, по которой только держава [COUNTRY.GetName] может колонизировать эту территорию, тогда как прочим #L [COUNTRY.GetReligion.GetAdjective|l]им#! державам запрещено это."
 treaty_of_noteborg: "По #Y Ореховскому#! миру Новгород и Швеция уладили территориальные споры в Финляндии и Карелии"
 COLONIAL_PROGRESS_POT_HEADER: "Колониальный прогресс"
 COLONIAL_MIGRATION_HEADER_TT: "Миграция за месяц в колониальное поселение [ColonialCharter.GetNameWithNoTooltip]"
 COLONIAL_CHARTER_TOTAL_MIGRATION: "Общая [Concept('migration', 'миграция')|e] [Concept('pops', 'групп населения')|e] — $VAL|y$ в месяц."
 COLONIAL_CHARTER_FROM_CHARTER: "От [Concept('colonial_charter', 'колониального поселения')|e]:"
 COLONIAL_CHARTER_FROM_CABINET: "От наших [Concept('cabinet_actions', 'действий совета')|e]:"
 COLONIAL_CHARTER_FROM_CABINET_SPECIFIC_ENTRY: "От провинции [PROVINCE.GetName]:"
 COLONIAL_CHARTER_NO_SOURCE: "Миграция невозможна, поскольку в вашей державе нет районов для иммиграции, где проживает более 1000 [Concept('pops', 'групп населения')|e] вашей [Concept('culture', 'культуры')|e] и [Concept('religion', 'религии')|e]."
 COLONIAL_CHARTER_CURRENT: "Каждый месяц $VAL|Y$ [Concept('pops', 'гр. населения')|e] будет переезжать из [LOCATION.Custom('LR_GEN')|l] [LOCATION.GetName], чтобы колонизировать [TARGET_LOCATION.Custom('LR_ACC')|l] [TARGET_LOCATION.GetName]."
 COLONIAL_CHARTER_CURRENT_WITH_CABINET: "В результате действия нашего [Concept('cabinet', 'совета')|e] могут переехать дополнительные группы населения:"
 COLONIAL_CHARTER_CURRENT_WITH_CABINET_ENTRY: "$BULLET_WITH_TAB$$VAL|Y$ [Concept('pops', 'гр. населения')|e] будет переезжать из [LOCATION.Custom('LR_GEN')|l] [LOCATION.GetName], чтобы колонизировать [TARGET_LOCATION.Custom('LR_ACC')|l] [TARGET_LOCATION.GetName]."
 COLONIAL_CHARTER_CTA: "Чтобы переместить камеру, щёлкните левой кнопкой мыши"
 COLONIAL_CHARTER_COUNT: "Сейчас $OWN|Y$ шт. [Concept('locations', 'районов')|e] было колонизировано #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_INST')|L]#!#!, и ещё $POSSIBLE|Y$ шт. может быть колонизировано."
 COLONIAL_MARITIME_IN: "[Concept('maritime_presence', 'Морское присутствие')|e] в регионе [REGION.GetName]: x$VAL|Y2$"
 COLONIAL_MARITIME_NOT_IN: "[REGION.GetName] не имеет [Concept('coastal', 'побережья')|e]: x$VAL|Y2$"
 COLONIAL_DISTANCE: "Расстояние от столицы ([COUNTRY.GetCapital.GetName]): x$VAL|Y2$"
 COLONIZE_DESC: "Мы попытаемся [Concept('colonize', 'колонизировать')|e] провинцию [PROVINCE_DEFINITION.GetName], создав там [Concept('colonial_charter', 'колониальное поселение')|e]"
 COLONIAL_TARGET_IS_ABOUT_TO_BE_OURS: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] скоро станет нашим!"
 COLONIAL_TARGET_IS_ABOUT_TO_BE_OTHERS: "[LOCATION.GetName] скоро перейдёт во владение [TARGET_COUNTRY.Custom('CL_GEN')|L]!"
 COLONIAL_TARGET_NO_COLONIAL_BUILDINGS_KNOWN: "Нет возможных [Concept('buildings', 'сооружений')|e] для колонизации!"
 COLONIAL_TARGET_NO_POSSIBLE_BUILDINGS: "@trigger_no! Нет [Concept('explored', 'изученных')|e] [Concept('locations', 'районов')|e], которые можно [Concept('colonize', 'колонизировать')|e]."
 COLONIAL_TARGET_NO_KNOWN_LOCATIONS: "Не знает ни одного [Concept('locations', 'района')|e]."
 COLONIZE_ACTION_BUTTON: "Начать колонизацию"
 COLONIZE_BUTTON: "Колонизировать"
 COLONIZE_ACTION: "Создать [Concept('colonial_charter', 'колониальное поселение')|e]"
 ABANDON_COLONY_BUTTON: "Покинуть"
 ABANDON_ACTION: "Покинуть это [Concept('colonial_charter', 'колониальное поселение')|e]"
 COLONIAL_FLIP_HEADER: "Колониальный прогресс [LOCATION.Custom('LR_GEN')] [LOCATION.GetNameWithNoTooltip]"
 COLONIAL_TARGET_LOCATION_ALREADY_OWNED: "Этот [Concept('location', 'район')|e] уже принадлежит #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_DAT')|L]#!#!."
 COLONIAL_TARGET_LOCATION_TRUCE_WITH_OWNER: "$BULLET_WITH_TAB$Между державами [COUNTRY.GetName] и [TARGET_COUNTRY.GetName] действует [Concept('truce', 'перемирие')|e]."
 COLONIAL_TARGET_LOCATION_NOT_ENOUGH_POWER_PROJECTION: "$BULLET_WITH_TAB$[Concept('country', 'Державе')|e] [TARGET_COUNTRY.GetName] нужно на $VAL|0Y$ ед. больше [Concept('power_projection', 'дипломатического веса')|e], чем у текущего владельца ([COUNTRY.GetName]: [COUNTRY.GetPowerProjection|0] ед.), чтобы получить шанс перехватить контроль над этим районом."
 COLONIAL_TARGET_LOCATION_NOT_ENOUGH_MIGRANTS: "$BULLET_WITH_TAB$Лишь малая доля наших [Concept('pops', 'групп населения')|e] ($MOVED|V$) переместилась в [LOCATION.Custom('LR_ACC')|l] [LOCATION.GetName]. Как только доля вырастет хотя бы до #TOOLTIP:$BREAKDOWN_TAG$ $NEED|%L2$#!, район станет нашим."
 COLONIAL_TARGET_LOCATION_NOBODY_LIVES_THERE: "$BULLET_WITH_TAB$В [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] живёт слишком мало людей.\nСейчас: [LOCATION.GetTotalPopulation]\nМинимально необходимое население: #TOOLTIP:$BREAKDOWN_TAG$ $NEED|V$#!"
 COLONIAL_TARGET_LOCATION_CAN_FLIP: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] может перейти во владение #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!."
 COLONIAL_TARGET_LOCATION_CANNOT_FLIP: "[LOCATION.GetRank.GetNameWithNoTooltip] [LOCATION.GetName] пока не может перейти во владение #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!. Причины:\n$REASONS$"
 COLONIAL_TARGET_ENTRY: "$BULLET_WITH_TAB$[LOCATION.GetName]: переехало — $MOVED|V$; необходимо — #TOOLTIP:$BREAKDOWN_TAG$ $NEED|%L2$#!"
 COLONY_POP_TARGET_PP_COUNTRY: "[Concept('power_projection', 'Дипломатический вес')|e] #ONCLICK:COUNTRY,[COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[COUNTRY.Custom('CL_tt')],X [COUNTRY.Custom('CL_GEN')|L]#!#!: $VAL$"
 COLONY_POP_TARGET_PP_EXISTS: "[Concept('power_projection', 'Дипломатический вес')|e] в [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName]: $VAL$"
 COLONY_POP_TARGET_MIN_POPS: "Необходимый минимум [Concept('pops', 'групп населения')|e] в [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] (без учёта [Concept('population', 'населения')|e]): $VAL$"
 COLONY_POP_TARGET_MAX_POPS: "Необходимый максимум [Concept('pops', 'групп населения')|E] в [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName] (без учёта [Concept('population', 'населения')|E]): $VAL$"
 COLONY_POP_TARGET_LOCATION_POPULATION: "Если прибавить [Concept('population', 'население')|e] [Concept('location', 'района')|e] ($POPULATION$), то мы получим целевой показатель $NEED$"
 COLONIAL_CHARTER_LABEL: "[Concept('colonial_charter', 'Колониальное поселение')|e] в провинции [PROVINCE_DEFINITION.GetName] на $PERC|2V%$ [Concept('fully_settled', 'полностью заселено')|e]"
 COLONIAL_CHARTER_FULLY_OURS: "[LOCATION.GetName]: $PERC|G0%$"
 COLONIAL_CHARTER_ENTRY: "[LOCATION.GetName]: #TOOLTIP:$BREAKDOWN_TAG$ $PERC|2%LV$#!"
 COLONIAL_PROGRESS_HEADER: "Колониальный прогресс"
