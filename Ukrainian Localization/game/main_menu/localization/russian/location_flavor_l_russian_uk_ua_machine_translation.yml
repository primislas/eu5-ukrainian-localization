l_russian:
  stockholm_desc: "Стокгольм був заснований у 1252 році Біргером Магнуссоном у тому місці, де озеро Меларен впадає в Балтійське море. Завдяки своєму стратегічному розташуванню місто не тільки контролювало доступ до озера, а й слугувало важливим торговим вузлом, що пов'язував Швецію з купецькими мережами Ганзи в Балтиці."
  paris_desc: "Париж, що стоїть на річці Сені, поступово перетворився зі скромного поселення на справжню перлину Франції. Завдяки своєму знаменитому собору, великим ринкам та навчальним закладам він став одним із найважливіших політичних і культурних центрів Європи."
  london_desc: "Лондон, збудований в гирлі річки Темзи, пройшов довгий шлях від невеликого римського поселення до найбільшого міста Англії. Тепер тут зосереджена вся політична та економічна міць королівства."
  rome_desc: "Колись Рим був центром могутньої імперії, чия територія простягалася на кілька континентів. Втім, навіть після її падіння Вічне місто змогло зберегти своє політичне та релігійне значення, ставши столицею Папської країни."
  jerusalem_desc: "Єрусалим є місцем перетину авраамічних релігій, а тому має особливе значення для юдеїв, християн та мусульман. Історія та вигляд цього священного міста сформувалися під впливом безлічі завоювань та паломників, що прибувають сюди з усіх країв світу."
  alexandria_desc: "Александрія, колись відома своїм грандіозним маяком та бібліотекою, знаходиться на стику різних цивілізацій та культур. Завдяки цьому вона і сьогодні залишається важливим торговим та освітнім центром Середземномор'я."
  constantinople_desc: "Оточений могутніми стінами, Константинополь був серцем Східної Римської імперії та місцем розташування собору Святої Софії — одного з найбільших у світі храмів. Протягом тисячі років велич і багатство цього міста були предметом заздрості для всього світу."
  sitges_desc: "У Середні віки на пагорбі, де сьогодні розташовується будівля муніципалітету, було збудовано замок. Спочатку він належав архієпархії Барселони, проте у XII столітті перейшов до родини, на честь якої і отримав свою назву."
  valladolid_desc: "Вальядолід був заснований наприкінці XI століття графом Педро Ансуресом та його дружиною Ейло Альфонсо в самому центрі Північної Месети, поблизу річки Пісуерга. Завдяки торгівлі Вальядолід швидко став одним із найважливіших міст у регіоні поряд з Бургосом. До XIV століття він набув такого значного впливу, що слугував адміністративним центром країни при регентці Марії де Моліні та її онукові Альфонсо XI."
  penafiel_desc: "Місто Пеньяф'єль, чия назва походить від латинського #italic Pinna Fidelis#! («Вірна скеля»), було засноване в X столітті. Спочатку воно являло собою невеликий аванпост на вершині пагорба, призначений для відбиття набігів з боку Кордовського халіфату. Граф Санчо Гарсія значно зміцнив його і в 1013 році надав йому фуерос — особливі міські права та привілеї. Згодом Пеньяф'єль перейшов у володіння впливового дона Хуана Мануеля і став вельми багатим містом з процвітаючою виноробною промисловістю."
  toro_desc: "Торо був заснований у X столітті в долині річки Дуеро для захисту володінь Королівства Леон від військ Кордовського халіфату. Завдяки своєму вигідному розташуванню місто слугувало важливим оборонним вузлом, а теплий клімат та родючі землі дозволили йому також стати великим центром виноробства."
  thessaloniki_desc: "Довгий час Фессалоніки вважалися другим за значенням містом Візантії після Константинополя. Своїм багатством вони завдячують вигідному розташуванню поблизу Егейського моря, що сприяє розвитку торгівлі. При цьому місцеві порти слугують свого роду мостом між Заходом і Сходом, дозволяючи перевозити товари між імперськими володіннями та Італією."
  malmo_desc: "Мальме контролює прохід суден через протоку Ересунн, що з'єднує Балтійське та Північне море. У зв'язку з цим місто є найважливішим стратегічним пунктом, захист якого забезпечують його міцні стіни та пильний гарнізон."
  bilbao_desc: "Більбао був заснований у 1300 році Дієго Лопесом де Аро, сеньйором Біскайї. Це місто, розташоване в гирлі річки Нервьон, незабаром стало важливим торговим вузлом та центром кораблебудівної промисловості в Північній Іспанії. Крім того, завдяки своїй розвиненій портовій інфраструктурі Більбао слугував місцем, звідки купці перевозили місцеву залізну руду та кастильську мериносову вовну в англійські та фламандські порти."
  radom_desc: "Після свого розширення та оновлення королем Казимиром III місто Радом стало важливим політичним центром Польщі та залишалося ним аж до кінця доби Відродження. Саме тут у 1401 році було укладено Віленсько-Радомську унію, і тут же на сеймі 1505 року було ухвалено закон #italic Nihil novi#!."
  krakow_desc: "Про поселення на Вавельському пагорбі було відомо ще в давнину, проте вперше Краків згадується в документі від 965 року, де описується як велике торгове місто. У 1038 році Краків став резиденцією польських монархів з династії П'ястів, і з того часу слугував одним із головних адміністративних, економічних та культурних центрів Польського Королівства."
  megara_desc: "У давнину Мегарою правив легендарний герой Ніс, а деякі її уродженці заснували в Середземномор'ї такі великі міста, як Візантій, Херсонес та Селінунт. Надалі Мегара стала важливим торговим центром і набула величезного впливу на території Греції — багато в чому завдяки своєму потужному флоту. Однак з того часу вона втратила більшу частину своєї могутності, і нині від її колишньої величі залишилася лише тінь."
  grojec_desc: "До XII століття в Груйці розташовувалася Познанська архієпархія та резиденція місцевого каштеляна, проте у зв'язку зі зростанням впливу сусіднього міста Черська він поступово втратив своє значення."
  gdansk_desc: "Перша письмова згадка про Гданськ належить до 997 року, проте поселення там існувало задовго до цього. В добу пізнього Середньовіччя Гданськ перетворився на великий торговий порт та центр суднобудування, завдяки чому він став одним із найбагатших та найвпливовіших міст Східної Європи."
  athens_desc: "Афіни вважалися культурним центром Стародавньої Греції та були одним із наймогутніших міст-країн свого часу. Змагаючись зі Спартою, Фівами та іншими античними країнами, Афіни поступово домоглися панування в Егейському морі. Пізніше місто було завойоване спочатку Македонською, а потім Римською та Візантійською імперіями, через що занепало. Проте після 1204 року Афіни знову повстали, ставши столицею новоствореної країни хрестоносців."
  wieliczka_desc: "Величка була заснована в 1290 році Пшемислом II в районі соляних рудників. Видобуток цього цінного продукту приносив Польщі величезний прибуток, у зв'язку з чим місто отримало безліч привілеїв і стало великим промисловим центром. Так, шахти у Величці та сусідній Бохні стали частиною соледобувної компанії #italic «Краківські жупи»#!, яка забезпечувала їхню роботу до кінця XX століття. В офіційних документах за містом довгий час зберігалася його стара назва #italic Wielka Sól#!, що означає #italic «велика сіль»#!."
  leksand_desc: "Це містечко на південному березі озера Сільян існує вже понад тисячу років. У XII столітті тут була побудована церква, першим протестантським головою якої був далекий предок Юхана Андерссона — провідного гейм-дизайнера Europa Universalis V."
  leipzig_desc: "Лейпциг, заснований у 1165 році на перетині #italic Імперської#! та #italic Царської#! доріг, досить швидко розбагатів та розширився завдяки торгівлі хутром. Отримавши низку значних привілеїв, він став важливим торговим вузлом Європи та одним із центрів книгодрукування в регіоні."
  augsburg_desc: "Вільне імперське місто Аугсбург, відоме під назвою #italic Августа Вінделіков#! в роки правління імператора Траяна, вважається одним із найстаріших міст Священної Римської Імперії. У 955 році місцевому гарнізону вдалося відбити напад угорських військ, внаслідок чого значення міста помітно зросло. У 1276 році король Рудольф I дарував Аугсбургу статус імперського міста, що ознаменувало новий етап у його розвитку та посприяло його подальшому процвітанню."
  warsaw_desc: "На зорі своєї історії Варшава являла собою невелике мозавецьке рибальське поселення. У 1596 році Сигізмунд III переніс столицю з Кракова до Варшави, після чого вона почала стрімко зростати і вже до XVIII століття стала найбільшим містом Польщі. У цей же час тут перебудували та звели безліч будівель, що значно посприяло розвитку польської архітектури та різних ремесел."
  tunis_desc: "Засноване легендарною царицею Дідоною у 814 році до нашої ери, спочатку це місто носило назву Карфаген і було столицею однойменної пунічної країни. У результаті трьох великих війн воно було зруйноване, а потім наново відбудоване римлянами. Сучасне місто Туніс було закладене арабами у 698 році неподалік від стародавніх карфагенських руїн. Після завоювання Альмохадів у XII столітті місто фактично стало регіональною столицею, і під час правління династії Хафсідів цей статус лише зміцнився."
  heidelberg_desc: "Наприкінці XII століття Гейдельберг став резиденцією пфальцграфа Рейнського, у зв'язку з чим тут було зведено значний замок. Пізніше в цьому місті було засновано перший університет Німеччини, завдяки чому він став важливим науковим та освітнім центром. У ході Реформації Гейдельберг приєднався до протестантського руху, що вплинуло на створення Євангелічної унії на чолі з Пфальцом. В добу романтизму образ Гейдельберзького замку привабив до міста безліч поетів, за рахунок чого він навіть отримав прізвисько #italic «місто романтики»#!."
  aviles_desc: "Авілес був заснований у X столітті на території гирла однойменної річки, завдяки чому він набув важливого стратегічного значення як порт. У розташованому поблизу замку Гаусон король Астурії Альфонсо III наказав виготовити Хрест перемоги — прикрашену золотом і дорогоцінним камінням реліквію, яка згодом стала символом королівства. У XI столітті Авілес отримав статус королівського міста і став одним із центрів морської торгівлі, в якому також зберігалися значні запаси солі, видобутої в інших регіонах країни."
  pingjin_desc: "Тайюань, де розташований священний храм Цзінь, ще з V століття до нашої ери є одним із найважливіших міст Шаньсі та всього Північного Китаю. У 979 році, в ході завоювання Північної Хань, імператор Тай-цзун наказав затопити та знищити місто. На знак тріумфу та приниження своїх ворогів, він перейменував захоплений регіон на Пінцзінь, що означає «умиротворення Шаньсі». В результаті затоплення від міста залишилися лише руїни, і на його відновлення пішло багато десятків років."
  dunstable_desc: "Данстейбл виник на місці стародавнього римського поселення. Вже в Середні віки англійці заснували тут монастир. За свою довгу історію місто пережило низку історичних подій. Зокрема, тут розлучився зі своєю дружиною Генріх VIII, а великий полководець Олівер Кромвель набирав в навколишніх землях добровольців для участі в громадянській війні. Крім того, тут розташовується стара резиденція Генріха I та один з дванадцяти пам'ятних хрестів Елеонори."
  paderborn_desc: "З моменту свого заснування близько 800 року Падерборн служив центром місцевого єпископства. Саме тут вперше зустрілися Карл Великий і папа римський Лев III. За час Тридцятилітньої війни місто зазнало великих збитків: воно пережило 16 облог, останню з яких влаштувало шведське військо у 1646 році."
  porto_desc: "Саме від #italic «непереможеного міста»#! Порту походить назва Португалії та знаменитого на весь світ портвейну, що виготовляється в долині річки Дору."
  jiaxing_desc: "Цзясін розташований на кордоні між регіонами У та Юе. Слово «цзя» в його назві означає «краса», а «сін» — «процвітання»."
  torgau_desc: "У 1452 році курфюрст Фрідріх II наказав створити біля замку в Торгау рів з ведмедем. Рів поступово розширювався аж до 1624 року, і в якийсь момент міг вміщати кілька ведмедів одночасно."
  changsha_desc: "З часів побудови місто Чанша протягом двох тисяч років залишалося головним економічним та адміністративним центром регіону."
  ningxiang_desc: "У Нінсяні було знайдено найбільший бронзовий #italic цзунь#! (ритуальний посуд для вина), виготовлений понад 3000 років тому за часів правління династії Шан."
  wurzburg_desc: "Вюрцбург був утворений на місці франконської фортеці у 741 році, коли поселення, що знаходилося там, отримало статус єпископства. У ранньому Середньовіччі місто процвітало головним чином за рахунок свого вигідного розташування на річці Майн, по якій проходили багато торгових маршрутів."
  hanover_desc: "Зі скромного поселення Ганновер поступово перетворився на одне з ключових міст Священної Римської Імперії. Під управлінням династії Вельфів місто стало розвиненим торговим та культурним центром, який до того ж мав великий політичний вплив."
  osnabruck_desc: "У Середні віки Оснабрюк служив центром місцевого єпископства та важливим торговим вузлом Священної Римської Імперії. Серед іншого місто відоме тим, що в ньому було підписано одну з двох угод, що призвели до укладення Вестфальського миру."
  glasgow_desc: "Глазго виник навколо середньовічного собору, який служив резиденцією місцевого архієпископства. У XV столітті тут був заснований університет, який сприяв становленню Глазго як освітнього центру Шотландії."
  neva_desc: "Санкт-Петербург був закладений у дельті річки Неви, яка колись була частиною варяго-грецького торгового шляху. Засноване у 1703 році, це місто служило столицею Росії понад 200 років."
  dubno_desc: "Місто Дубно, вперше згадане у 1100 році, було великим торговим центром Волині, відомим своїми великими ярмарками. У 1492 році тут було зведено замок, навколо якого розгортаються події повісті Миколи Гоголя #italic «Тарас Бульба»#!."
  baden_desc: "Початкове поселення на цьому місці було засноване римлянами і носило назву #italic Civitas Aurelia Aquensis#!. В добу раннього Середньовіччя місто стало відоме як Баден, і пізніше ця назва також перейшла до Баденського дому династії Церінгенів, який почав правити цими землями."
  erbach_desc: "Наприкінці XVIII століття граф Франциск I, який мав великий інтерес до реліквій давнини, виділив кошти на створення в Ербаху гільдії різьбярів, яка займалася створенням виробів з обробної кістки. Завдяки цьому місто привабило безліч митців і стало одним з головних центрів цього ремесла."
  manhattan_desc: "Колись населений народом ленапе, острів Манна-хата був придбаний голландськими поселенцями в обмін на товари загальною вартістю всього 60 гульденів. Тут вони побудували фортецю, яка стала центром влади Нового Амстердама."
  doncaster_desc: "Через Донкастер, відомий раніше під римською назвою Данум, проходила Велика північна дорога, по якій мандрівники та торговці перевозили товари між Лондоном та північними землями. Завдяки такому вигідному розташуванню Донкастер до 1337 року став одним з найбагатших міст Йоркшира."
  kitchissippi_desc: "Це місто було названо на честь річки Кічісіпі, нині відомої як Оттава. У цих землях народ анішинабе займався полюванням та торгівлею, поки британські поселенці не розширили вирубку лісів і не заснували тут місто, що стало резиденцією їхньої колоніальної адміністрації."
  saint_marceilin_desc: "Заснований в XI столітті, Сен-Марселлен служив резиденцією ради дофіна в період з 1337 по 1340 рік. Це місто також славиться своїм м'яким сиром зі зморшкуватою скоринкою, який подавали при королівському дворі щонайменше з 1461 року."
  caerphilly_desc: "У валлійських долинах видобувалося найякісніше вугілля в Європі, завдяки чому у другій половині XVIII століття цей регіон став важливим центром виробництва заліза."
  grenoble_desc: "Гренобль — невелике, але стратегічно важливе місто в Альпах, яке є столицею провінції Дофіне. Воно оточене річками та горами, тому чудово підходить для оборони місцевих земель, у зв'язку з чим тут була зведена фортеця Бастилія. Навколо місцевого собору простягаються вузькі звивисті вулиці, де живуть і працюють купці, ремісники та селяни, що привозять сюди товари з сусідніх долин."
  kinsale_desc: "Кінсейл — невелике, але вельми жваве портове містечко, розташоване в природній гавані на південному узбережжі Ірландії. Основними заняттями містян є риболовля та торгівля. Так, місцеві купці обмінюють рибу, шкури та вовну на вино, сіль та предмети розкоші з Іберії та Франції. На вузьких вулицях навколо причалів часом зустрічаються іноземні торговці, з якими ірландські моряки обмінюються історіями та укладають угоди. Незважаючи на скромні розміри гавані, саме вона дозволила Кінсейлу стати стратегічно важливим портовим містом, яке з'єднало Ірландію з континентальною Європою."
  stockton_desc: "Стоктон — англосаксонське поселення на північному березі річки Тіс. Воно залишалося вельми малонаселеним доти, доки єпископ не звільнив місцевих кріпаків, що привабило сюди безліч купців та ремісників. За рахунок цього Стоктон став важливим торговим містом, яке займалося продажем місцевої вовни та ввезенням іноземних вин. Однак по-справжньому великим містом Стоктон став лише після промислової революції."
  kunow_desc: "Кунув з раннього Середньовіччя перебував у віданні Краківської архієпархії, проте парафія тут з'явилася лише у 1281 році. Своєю назвою місто, швидше за все, завдячує куницям, які у великій кількості водилися в навколишніх лісах."
  lublin_desc: "Люблін був заснований на рубежі XII–XIII століть, а статус міста отримав від Владислава Локетека у 1317 році. У наступні століття Люблін перетворився на великий торговий центр, чий розквіт припав на XVI століття. Саме в цей час була укладена Люблінська унія, яка й дозволила місту збагатитися за рахунок розвитку торгівлі зі Сходом."
  kendal_desc: "Кендал був заснований на місці римського військового містечка, яке виникло на березі річки Кент ще в I столітті нашої ери. Поселення активно розвивалося за норманів: отримавши в 1189 році від короля Річарда I право на торгівлю в обмін на фінансову підтримку його хрестового походу, Кендал почав процвітати і з часом став важливим центром середньовічної торгівлі вовною. Головний замок міста належав родині Парр, найвідомішою представницею якої була Катерина — дружина короля Генріха VIII."