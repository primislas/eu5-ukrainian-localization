  abandon_colonial_claim_desc: "Ми змусимо наших ворогів відмовитися від необґрунтованих домагань на колоніальні володіння та забути про свої заморські амбіції."
  abandon_colonies_desc: "Наші вороги повинні покинути свої віддалені колонії. Або ці землі населятиме наш народ, або вони будуть пустувати."
  abandon_piracy_desc: "Епосі нальотів та грабежів настав кінець. Наші вороги повинні раз і назавжди відмовитися від піратства та інших злочинів на морі."
  block_foreign_building_treaty_desc: "Ми заборонимо іноземцям будувати що-небудь на нашій землі, і цей договір покладе край їхнім надмірним амбіціям."
  cancel_debt_desc: "Наші борги будуть списані, і ми нарешті звільнимося від фінансової кабали."
  claim_timurid_empire_desc: "Ми заявимо претензії на ті обширні володіння, якими колись [Select_CString(GetCharacter('chg_timur_lame_borjigin').IsFemale, 'правила велика', 'правив великий')] [GetCharacter('chg_timur_lame_borjigin').GetShortName], оскільки маємо повне право вважати себе [Select_CString(GetCharacter('chg_timur_lame_borjigin').IsFemale, 'її', 'його')] спадкоємцями."
  dismantle_fortifications_desc: "Ворожі стіни та укріплення будуть розібрані по камінцях, і тоді ворог стане вразливим."
  peace_dismantle_hre_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська імперія#!#! буде розпущена, і всі підпорядковані їй правителі зможуть незалежно правити своїми землями."
  dissolve_coalition_desc: "Ми розженемо цих боягузливих негідників, що об'єдналися проти нашої країни, і поодинці вони вже не становитимуть для нас жодної загрози."
  dissolve_league_peace_deal_desc: "Їхня ліга буде розпущена, і всім її учасникам доведеться укласти мир та відмовитися від своїх союзних зобов'язань. Це значно змінить баланс сил у ході #TOOLTIP:SITUATION,italian_wars,X #L Італійських війн#!#!."
  execute_ruler_desc: "На науку іншим ми присуджуватимемо найвищу міру покарання за непокору."
  peace_expand_clan_influence_desc: "Наш клан приростатиме новими землями та привілеями, підносячись над тими, хто посмів виступити проти нас."
  peace_force_renounce_ilkhan_claim_desc: "Ми змусимо наших ворогів залишити свої домагання на лідерство в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ilkhanate_tt$,X #L Країні Хулагуїдів#!#! та відректися від спадщини, яку вони безпідставно привласнили."
  force_revolution_desc: "Старий порядок має бути повалений. Цим договором ми зобов'яжемо іншу сторону прийняти ідеї революції."
  peace_gain_clan_autonomy_desc: "Ми оголосимо себе незалежними. Інші клани більше не матимуть влади над нашими володіннями."
  high_kingship_overthrow_desc: "Часи колишнього панування над цим островом відходять у минуле. #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,high_kingship,X #L Верховному королівству#!#! потрібен новий правитель!"
  supress_hussite_faith_desc: "Всяку єресь необхідно нещадно випалювати. Цим договором ми змусимо їх повністю викорінити у своїй країні #L [ShowReligionAdjective('hussite')|l]е#! лжевчення."
  league_of_public_weal_appanage_victory_desc: "Принци доб'ються свого і змусять корону піти на поступки."
  league_of_public_weal_royalist_victory_desc: "Король восторжествує і поставить принців на місце, тим самим повернувши собі контроль над бунтівними землями."
  peace_leave_the_hre_desc: "Ми більше не будемо ленниками #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! і відмовимося від усіх своїх привілеїв та зобов'язань щодо неї."
  peace_nanbokuchou_force_imperial_abdication_desc: "Ця країна перестане існувати, а її піддані отримають притулок при #L [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderCountry.GetAdjective|l]ому#! дворі."
  punish_chinese_expedition_foes_desc: "Ми покараємо їх за протистояння нашому золотому флоту. Принизивши їх перед усім світом, ми помітно примножимо свій престиж."
  chi_recapture_emperor_desc: "Ми звільнимо імператора і повернемо йому престол. Тих же, хто посмів полонити його, чекає покарання і ганьба."
  reinstate_the_monarchy_desc: "Монархія повстане з новою силою, а революціонери, що намагалися повалити королівський рід, будуть принижені."
  peace_revoke_clan_autonomy_desc: "Ми позбавимо їх автономії і знову контролюватимемо кожен їхній крок."
  sound_toll_exemption_desc: "Наші купці вільно пересуватимуться та займатимуться торгівлею без необхідності [Concept('sound_toll', 'платити за прохід')]."
  steal_pops_desc: "Ми змусимо їх переселитися на наші землі. Тим самим ми зміцнимо свою країну і послабимо ворогів."
  subjugate_natives_desc: "Ми підкоримо аборигенів і привласнимо їхні землі."
  peace_take_over_market_center_desc: "Важливий торговий центр ворогів перейде під наш контроль, що принесе нам не тільки великий прибуток, а й славу."
  peace_take_shogunate_desc: "Ми візьмемо кермо правління #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L Японським сьогунатом#!#! у свої руки, і під нашим чуйним керівництвом #TOOLTIP:REGION,japan_region,X #L Японія#!#! вступить у нову добу процвітання."