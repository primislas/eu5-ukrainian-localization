  peace_reintegrate_revolter: "Придушення #L [TARGET_COUNTRY.GetAdjective|l]ого#! заколоту"
  peace_reintegrate_revolter_entry: "$peace_reintegrate_revolter$"
  peace_reintegrate_revolter_entry_short: "$peace_reintegrate_revolter$"
  peace_reintegrate_revolter_desc: "Заколот, що спалахнув, придушено. Настав час примусити бунтівників до порядку!"
  supress_hussite_faith: "Придушення #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#!"
  supress_hussite_faith_entry: "$supress_hussite_faith$"
  supress_hussite_faith_entry_short: "$supress_hussite_faith$"
  enforce_conversion_hussite_wars_tt: "Велика кількість #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситських#!#! послідовників у країні [loser.GetLongName] буде насильно навернена в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!. Це на крок наблизить нас до викорінення їхньої єресі та вирішення [Concept('situation', 'ситуації')|e] з #TOOLTIP:SITUATION,hussite_wars,X #L Гуситськими війнами#!#!."
  hussite_pop_numbers_tt: "Частка [Concept('population', 'населення')|e] #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!, що підтримує #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситський#!#! рух."
  break_from_tatar_yoke: "Звільнення від татарського ярма"
  break_from_tatar_yoke_entry: "Звільнення від #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,tatar_yoke,X #L татарського ярма#!#!."
