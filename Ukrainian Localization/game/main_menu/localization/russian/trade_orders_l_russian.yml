l_russian:
 TRADE_ORDER_IE_CARD_TITLE_IMPORT: "Приказ на импорт товара «[GOODS.GetName]» на рынок [MARKET.GetName]"
 TRADE_ORDER_IE_CARD_TITLE_EXPORT: "Приказ на экспорт товара «[GOODS.GetName]» с рынка [MARKET.GetName]"
 TRADE_ORDER_IE_CAPACITY_TOOLTIP_SUMMARY: "Этот [Concept('trade_order', 'торговый приказ')|e] выделяет [ImportExportLateralView.GetTradeOrderCapacity|2Y]@trade_capacity! на товар «[ImportExportLateralView.GetGoods.GetNameWithNoTooltip]»."
 TRADE_ORDER_IMPORT: "Приказ на импорт"
 TRADE_ORDER_EXPORT: "Приказ на экспорт"
 TRADE_ORDER_IMPORT_ACTIVE: "У вас есть действующий запрос на [Concept('import', 'импорт')|e] этого товара.\nИИ задействует [GetTradeOrderCapacity] ед. [Concept('merchant_capacity', 'торгового потенциала')|e], чтобы найти наиболее выгодный источник товара."
 TRADE_ORDER_EXPORT_ACTIVE: "У вас есть действующий запрос на [Concept('export', 'экспорт')|e] этого товара.\nИИ задействует [GetTradeOrderCapacity] ед. [Concept('merchant_capacity', 'торгового потенциала')|e], чтобы найти наиболее выгодный пункт назначения."
 TRADE_ORDER_CANCEL: "Отменить торговый приказ"
 TRADE_ORDER_CANCEL_TT: "Удалить этот торговый приказ"
 TRADE_ORDER_OPEN_TRADES_TAB_TITLE_IMPORT: "Открыть импорт на этом рынке"
 TRADE_ORDER_OPEN_TRADES_TAB_TITLE_EXPORT: "Открыть экспорт на этом рынке"
 TRADE_ORDER_OPEN_TRADES_TAB_DESC: "Открывает вкладу торговых сделок этого рынка с перечислением только вашей [Concept('trade', 'торговли')|e], торгового потенциала от этого рынка и импорта или экспорта от этого [Concept('trade_order', 'торгового приказа')|e]."
 TRADE_ORDER_CREATE_IMPORT: "Создать приказ на [Concept('import', 'импорт')|e]"
 TRADE_ORDER_CREATE_EXPORT: "Создать приказ на [Concept('export', 'экспорт')|e]"
 TRADE_ORDER_CREATE_IE_TT_IMPORT: "Выделить [Concept('merchant_capacity', 'торговый потенциал')|e] на [Concept('import', 'импорт')|e] этого товара по лучшему пути."
 TRADE_ORDER_CREATE_IE_TT_EXPORT: "Выделить [Concept('merchant_capacity', 'торговый потенциал')|e] на [Concept('export', 'экспорт')|e] этого товара по лучшему пути."
 TRADE_ORDER_CREATE_TT: "Выделить [Concept('merchant_capacity', 'торговый потенциал')|e] на [Concept('import', 'импорт')|e] или [Concept('export', 'экспорт')|e] этого товара по лучшему пути."
 TRADE_ORDER_CAPACITY_LABEL: "Расход [Concept('merchant_capacity', 'торгового потенциала')|e]:"
 TRADE_ORDER_CAPACITY_TOOLTIP_TITLE: "Автоматическое распределение"
 TRADE_ORDER_CAPACITY_TOOLTIP_SUMMARY: "Этот [Concept('trade_order', 'торговый приказ')|e] выделяет [TradeOrderItem.GetAllocatedCapacity|2Y]@trade_capacity! на товар «[TradeOrderItem.GetGoods.GetNameWithNoTooltip]»."
 TRADE_ORDER_CAPACITY_TOTAL: "На торговые приказы уходит [GetTradeOrderTotalCapacity] из [GetAutomatedCapacity] ед. [Concept('merchant_capacity', 'торгового потенциала')|e]"
 TRADE_ORDER_ROUTE_LINE: "[TRADE.GetName]: #TOOLTIP:$BREAKDOWN_TAG$ [TRADE.GetProfit|+=2]@gold!#!"
 TRADE_ORDER_NO_ROUTES: "Пока нет ни одной [Concept('trade', 'сделки')|e]. Держава под управлением компьютера будет пытаться организовать сделку каждый день."
 TRADE_ORDER_NO_PROFITABLE_ROUTE: "@trigger_fail! Не удалось найти выгодные [Concept('trade', 'сделки')|e]. Держава под управлением компьютера продолжит каждый день искать возможные сделки."
 TRADE_ORDER_BELOW_PROFIT_CUTOFF: "@trigger_fail! Не удалось найти прибыльный [Concept('trade', 'торговый')|e] маршрут.\nЛучший путь ведёт на рынок [MARKET.GetNameWithNoTooltip] с доходом $PROFIT_RATIO|+=2$@gold! на единицу [Concept('merchant_capacity', 'потенциала')|e] (требуется на ниже $CUTOFF|=2$@gold!).\nИИ будет ежедневно повторять попытки."
 TRADE_ORDER_QUICK_IMPORT_TT: "Позволяет создать приказ на [Concept('import', 'импорт')|e], задействуя 1 ед. [Concept('merchant_capacity', 'торгового потенциала')|e]. Держава под управлением компьютера будет каждый день искать наиболее выгодный источник товара."
 TRADE_ORDER_QUICK_EXPORT_TT: "Позволяет создать приказ на [Concept('export', 'экспорт')|e], задействуя 1 ед. [Concept('merchant_capacity', 'торгового потенциала')|e]. Держава под управлением компьютера будет каждый день искать наиболее выгодный пункт назначения."
 TRADE_ORDER_PRIORITY_INFO: "Приказы в начале списка первыми получают [Concept('merchant_capacity', 'торговый потенциал')|e], если его не хватает на все приказы."
 TRADE_ORDER_MOVE_UP_TT: "Повысить приоритет этого приказа."
 TRADE_ORDER_MOVE_DOWN_TT: "Позволяет понизить приоритет этого приказа."
 TRADE_ORDERS_SCROLL_LIST_EMPTY: "На этом рынке нет [Concept('trade_order', 'торговых приказов')|e]."
