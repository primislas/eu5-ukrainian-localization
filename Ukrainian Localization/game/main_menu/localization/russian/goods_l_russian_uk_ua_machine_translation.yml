  stone_bricks: "Кам’яні цеглини"
  stone_bricks_desc: "Камінь — дуже міцний матеріал, який часто використовується при будівництві довговічних будівель. Однак звести будівлю з необробленого каменю не так просто, тому для полегшення процесу та розширення можливостей застосування цього матеріалу з нього витісують блоки."
