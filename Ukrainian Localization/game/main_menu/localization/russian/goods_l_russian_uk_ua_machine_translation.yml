  old_world_goods: "Товари Старого Світу"
  new_world_goods: "Товари Нового Світу"
  horses: "Коні"
  horses_desc: "Коней одомашнили на просторах Євразійського степу близько 6000 років тому. Відтоді люди використовували коней для найрізноманітніших цілей, найважливішими з яких були військові. Середньовіччя стало для кавалерії золотим віком: битви вершників відіграли велику роль у розвитку феодальних суспільств."
  clay: "Глина"
  clay_desc: "Глина — це тип ґрунту, який з доісторичних часів використовувався для виробництва гончарних та керамічних виробів. Крім того, глина була незамінна в будівництві: вона входила до складу більшості будівельних сумішей і, звісно, з неї виготовлялися цеглини. Нарешті, глиняні таблички стали однією з перших основ для книг, тож вплив цього матеріалу на розвиток цивілізації важко переоцінити."
  sand: "Пісок"
  sand_desc: "Пісок у достатку зустрічається на поверхні нашої планети та використовується в найрізноманітніших цілях. Наприклад, він входить до складу багатьох будівельних матеріалів і є основним компонентом скла, а його тверді та шорсткі частинки чудово підходять для шліфування каменів і металів."
  tar: "Дьоготь"
  tar_desc: "Поки дьоготь не почав активно застосовуватися в кораблебудуванні, він належав до сільськогосподарської продукції. Чорний колір і в'язка консистенція — результат агресивних методів очищення. Дьоготь широко використовується для смоління суден. Крім того, цим дешевим матеріалом просочують вітрила, щоб надати тканині водовідштовхувальних властивостей."
  coal: "Вугілля"
  coal_desc: "Вугілля з давніх-давен застосовують як паливо, проте різкий стрибок попиту на цей ресурс стався лише після повсюдного поширення парових двигунів. Коли Європу охопила промислова революція, виробництво, використання, продаж і закупівля вугілля стали невід'ємною частиною економіки та перетворилися на вигідний бізнес."
  iron: "Залізо"
  iron_desc: "Під залізом розуміється не тільки однойменна речовина, а й інші чорні метали. З обробки заліза почалася історія металургійної промисловості: зокрема, цей матеріал широко використовували при виготовленні зброї та іншого військового спорядження."
  copper: "Мідь"
  copper_desc: "Мідь залишається одним із ключових матеріалів уже кілька тисяч років, з моменту винаходу та поширення металургії. Сфера її застосування надзвичайно широка, оскільки передбачає роботу не тільки з чистим металом, а й зі сплавами, наприклад бронзою. Таким чином, мідь відіграє важливу роль у виробництві зброї, а у виготовленні перших гармат вона й зовсім була незамінна."
  goods_gold: "Золото"
  goods_gold_desc: "З усіх металів золото споконвіку вважається найдорожчим. Люди накопичують монети та придбавають предмети розкоші, відлиті із золота, щоб примножити своє багатство. І, звісно ж, золото широко застосовується в торгівлі. У країнах, де в ході монети з двох або трьох металів, воно користується шаленим попитом. Недарма відшукати золоту жилу — заповітна мрія будь-якого шукача пригод."
  silver: "Срібло"
  silver_desc: "Срібло — один із перших грошових металів. Як і золото, він становить чималу цінність. У Середні віки Центральна Європа стала лідером із виробництва срібла, проте під впливом процесу, названого Колумбовим обміном, провідна роль у цьому поступово перейшла до Північної та Південної Америк, а в XVI столітті, після формування нових торгових шляхів, Америка перетворилася на головного постачальника срібла до країн Старого Світу."
  gems: "Дорогоцінне каміння"
  gems_desc: "Такі камені, як рубіни, сапфіри, діаманти, смарагди та нефрит використовувалися в ювелірних виробах і церемоніальних шатах з незапам'ятних часів. Багато століть знамениті копальні Голконди залишалися єдиним джерелом алмазів у всьому світі. Звісно, не все дорогоцінне каміння зустрічається настільки ж рідко, але попит на ці товари незмінно високий."
  stone: "Камінь"
  stone_desc: "Протягом усієї історії людства камінь залишався одним із ключових будівельних матеріалів. Він куди міцніший за глину чи дерево, і кам'яні споруди відрізняються завидною довговічністю. Найдавніші споруди, наприклад піраміди, збереглися до наших днів тільки завдяки тому, що були зведені з каменю."
  tin: "Олово"
  tin_desc: "Олово почали активно застосовувати в металургії 5000 років тому як один із компонентів бронзи. Згодом воно широко використовувалося як антикорозійне покриття для металів і сплавів, зокрема, заліза, свинцю та сталі. Крім того, олово входило до складу п'ютера — популярного сплаву, з якого в основному виготовляли столовий посуд."
  lead: "Свинець"
  lead_desc: "Свинець навчилися отримувати ще в давнину: він був побічним продуктом вилучення срібла при тепловій обробці галеніту. Раніше свинець використовували для виготовлення найрізноманітніших товарів побутового та промислового призначення. У римлян свинець здобув особливу популярність. Обсяг виробництва цього металу в Римській імперії був настільки великим, що його знову вдалося досягти тільки за часів промислової революції. У Новий час зі свинцю почали масово відливати кулі."
  wool: "Вовна"
  wool_desc: "Вовна добувалася при стрижці овець, які паслися на ділянках, непридатних для інших форм сільського господарства. До повсюдного поширення бавовни одяг в основному виготовляли з вовни."
  cotton: "Бавовна"
  cotton_desc: "Бавовну почали культивувати в Центральній Азії, але в Європі вона поширилася, тільки коли була завезена в американські колонії. У текстильній промисловості XVIII століття бавовна використовувалася як дешева, але якісна заміна вовни або ж як додатковий компонент вовняної тканини."
  silk: "Шовк"
  silk_desc: "Шовк — це найтонша східна тканина, яку постачали головним чином Індія, Китай та країни Східної Азії. У масовій культурі шовк згадується рідше, ніж спеції, однак прибуток, що отримувався Ост-Індськими компаніями від перепродажу шовку та тонких бавовняних тканин, швидко затьмарив доходи від торгівлі прянощами.\nЧерез зростаючий попит європейці намагалися виробляти шовк своїми силами — результати сильно відрізнялися за якістю."
  dyes: "Барвники"
  dyes_desc: "Попит на барвники існує стільки ж, скільки й ринок тканин. У пізньому Середньовіччі рідкісні барвники, наприклад індиго, коштували цілий статок, оскільки везти їх з Індії було надто довго та затратно.\nЗ відкриттям нових континентів та розвитком судноплавних шляхів ситуація покращилася: барвники стали активно виробляти в Америці, а доступність індійського ринку сильно зросла. Проте в Європі цей товар залишався рідкістю до початку XIX століття. Коли індійські плантації, на яких вирощували барвники, опинилися в руках європейців, попит на цей товар став ажіотажним."
  incense: "Пахощі"
  incense_desc: "З давніх часів люди спалювали різні матеріали для отримання ароматного диму. Особливо часто така практика застосовувалася в релігійних та урочистих церемоніях. Ладан, агар, сандал, мирра та інші товари, придатні для таких цілей, були великою рідкістю. Розвиток торгових маршрутів, зокрема Великого шовкового шляху та Дороги пахощів, був значною мірою зумовлений необхідністю постачати таку продукцію."
  sugar: "Цукор"
  sugar_desc: "Цукор використовувався не тільки для надання їжі солодкості, а й як консервант. Раніше його вміли добувати тільки із соку цукрової тростини, тому основними постачальниками цього товару були острови Середземномор'я. Пізніше великі плантації цукрової тростини з'явилися в Америці, зокрема на Карибських островах, і центр виробництва перемістився туди."
  tobacco: "Тютюн"
  tobacco_desc: "Тютюн не був відомий в Європі, поки його не завезли туди з Америки наприкінці XVI століття. Серед представників вищих станів, які могли дозволити собі купівлю тютюну, куріння швидко перетворилося на модну звичку, що посприяло стрімкому економічному зростанню Бразилії, що перебувала під контролем португальців, а також британських колоній у Північній Америці. Люди й гадки не мали, з чого складаються курильні суміші, але не поспішали від них відмовлятися."
  tea: "Чай"
  tea_desc: "У Китаї, Індії та Південно-Східній Азії чай вважався благородним напоєм: його часто використовували в релігійних та світських церемоніях. У Європі цей напій набув популярності багато в чому завдяки англійцям. Європейська аристократія все ще віддавала перевагу каві, однак через обмежені поставки продаж чаю приносив чималий прибуток."
  cocoa: "Какао"
  cocoa_desc: "Правителі інків та ацтеків, а також індійські царі використовували какао-боби як стимулятор з часів раннього Середньовіччя. Наприкінці XVI століття іспанці завезли цей товар до Європи зі своїх американських колоній. Напій на основі какао-бобів швидко став вишуканими ласощами аристократів."
  coffee: "Кава"
  coffee_desc: "Вперше кавові зерна почали збирати в північно-східній частині Ефіопії, а вирощувати каву навчилися на півдні Аравії. На початку XVII століття цей товар з Близького Сходу потрапив до Італії і звідти поширився по всій Європі. Популярність кави різко зросла після того, як у 1600 році папа Климент VIII благословив цей «мусульманський» напій всупереч порадам визнати його «нечистим»."
  fiber_crops: "Прядильні культури"
  fiber_crops_desc: "Існує безліч волокнистих рослин, з яких у різних країнах виготовляють вітрила, мотузки, рибальські сіті, одяг та інші вироби. Однак деякі з таких культур — наприклад, конопля, льон, джут та сизаль — не тільки складають основу грубих тканин, а й входять до складу більш тонких видів текстилю, які використовуються як у побутових, так і в обрядових цілях."
  ivory: "Слонова кістка"
  ivory_desc: "Слонову кістку (як і рабів) у великих кількостях вивозили з Африки. У Європі цей матеріал користувався особливим попитом у тих, хто виготовляв столові прилади, подарунки, меблі, декоративні вироби та багато іншого."
  fur: "Хутро"
  fur_desc: "Хутро було невід'ємною частиною теплого та якісного одягу. Спочатку шкури тварин постачалися з Росії, але з часом її сильно потіснила Північна Америка. Хутро американського бобра користувалося величезним попитом щонайменше до середини XVIII століття."
  lumber: "Лісоматеріали"
  lumber_desc: "Деревина залишалася одним з основних будівельних матеріалів протягом всієї історії людства. Дерево не таке міцне, як камінь, проте куди більш доступне, тому в основі будівель по всьому світу лежав дерев'яний каркас. З тієї ж причини з дерева нерідко зводилися навіть замки та фортеці, покликані захищати своїх мешканців від натиску ворогів."
  salt: "Сіль"
  salt_desc: "Сіль необхідна людині. Крім того, засолювання — найпростіший і недорогий спосіб зберегти їжу на зиму. Кам'яну сіль добували в копальнях Центральної Європи, а сіль, що утворилася при випаровуванні води, збирали вздовж морських берегів, на солончаках."
  porcelain: "Порцеляна"
  porcelain_desc: "Порцеляна — це міцна і напівпрозора кераміка, яка виготовляється шляхом склування матеріалів під впливом високих температур. «Предтечі» порцеляни з'явилися в Китаї понад три тисячоліття тому, а остаточно стандарти її виробництва сформувалися майже дві тисячі років тому, після чого порцеляна поширилася за межі китайських земель і стала затребуваною по всьому світу."
  naval_supplies: "Суднобудівні матеріали"
  naval_supplies_desc: "До суднобудівних матеріалів відносять усі товари для будівництва кораблів: від простої деревини до дьогтю, мотузок, льону та вітрил. Спочатку такі матеріали в основному надавали країни Прибалтики, але у XVIII столітті конкуренцію їм склала Північна Америка. Забезпечення поставок цих важливих товарів вважається однією з цілей колонізації американських континентів."
  firearms: "Вогнепальна зброя"
  firearms_desc: "З винаходом і поширенням вогнепальної зброї динаміка боїв кардинально змінилася. Тепер результат європейських та азійських війн багато в чому залежав від виробництва, поставок і способів використання пороху. Вогнепальна зброя стала результатом природного розвитку військових технологій і відмінно показала себе як засіб захисту суверенітету."
  cannons: "Гармати"
  cannons_desc: "Облогові знаряддя застосовувалися з часів Античності, проте винахід пороху дозволив проєктувати знаряддя небаченої раніше потужності. Снаряди стали більшими, а швидкість і дальність їх польоту значно зросли, що дозволило швидко знищувати будь-які конструкції, крім найбільш укріплених, і завдавати колосальної шкоди живій силі противника."
  glass: "Скло"
  glass_desc: "Скло століттями використовувалося в мистецтві, архітектурі та побуті. Пізніше, коли технології виготовлення цього матеріалу достатньою мірою вдосконалилися, скло стало відігравати ключову роль в оптиці. Скляні лінзи вставлялися в окуляри, телескопи та безліч інших пристроїв, які застосовувалися в найрізноманітніших областях: від судноплавства до природничих наук."
  steel: "Сталь"
  steel_desc: "Сталь широко застосовується у виготовленні холодної та вогнепальної зброї. Якість сплаву варіюється залежно від типу зброї: наприклад, для мечів і ножів потрібна сталь краща, для сокир — гірша. Крім того, сталь є основним компонентом найрізноманітніших інструментів та пристроїв."
  cloth: "Текстиль"
  cloth_desc: "До текстилю відносять тканини та предмети одягу, виткані з вовни та льону. Пізніше основним матеріалом для виготовлення текстилю стала бавовна, що постачалася з Індії та Америки."
  wine: "Вино"
  wine_desc: "На півдні Європи вино виробляли з незапам'ятних часів, і цей напій досі популярний по всьому світу, крім хіба що мусульманських країн. Раніше вино не вважалося розкішшю, його вживали навіть бідняки: воно вносило приємне різноманіття в їхню мізерну дієту."
  liquor: "Міцні спиртні напої"
  liquor_desc: "Міцні спиртні напої отримують шляхом перегонки найрізноманітніших продуктів рослинного походження. Перегонка підвищує вміст спирту в рідині. Серед найпопулярніших міцних спиртних напоїв — джин, ром, віскі, горілка, текіла та сьотю."
  paper: "Папір"
  paper_desc: "Папір незамінний в освіті, бухгалтерському обліку та управлінських справах. Вперше виробляти папір навчилися в Китаї, і поступово ця технологія проникла в інші країни Старого Світу. Виробництво паперу, який за всіма параметрами перевершує папірус та інші писальні матеріали, вимагає спеціальних навичок та обладнання, тому пропозиція не встигає за попитом."
  books: "Книги"
  books_desc: "Кілька тисяч років тому люди винайшли писемність, і відтоді книги стали головними джерелами знань. Зазвичай книги виготовлялися зі шкіри та матеріалів на основі рослинних волокон, наприклад, паперу та папірусу. У Середні віки з'явилися системи ручного набору, що значно прискорило виробництво книг і зробило їх доступними більшій кількості людей."
  jewelry: "Ювелірні вироби"
  jewelry_desc: "До ювелірних виробів відносять прикраси та регалії з дорогоцінних металів і каміння, виконані майстерними ковалями. Нерідко такі вироби стають символами високого становища або навіть королівської влади."
  leather: "Шкіра"
  leather_desc: "Люди навчилися вичинці шкіри ще в незапам'ятні часи, і цей матеріал досі широко застосовується при виробництві одягу, взуття та прикрас. Така популярність шкіри зумовлена її гнучкістю та довговічністю. Згодом шкіру стали використовувати у виготовленні меблів для їдалень та закладів громадського харчування, оскільки цей матеріал легко очищається від забруднень і не вбирає запах їжі."
  tools: "Інструменти"
  tools_desc: "Виготовлення інструментів — один із ключових чинників процвітання людської цивілізації. Саме вони — від примітивних кам'яних знарядь до найпередовішої продукції металургійної промисловості — допомагають нам створювати зброю та спорядження."
  wild_game: "Дичина"
  wild_game_desc: "Дикі тварини — це важливе джерело їжі для місцевих жителів, особливо в малонаселених сільських місцевостях. Вдале полювання на лосів, оленів, кабанів та інших диких звірів дозволяє запастися цінним м'ясом, шкурами, кістками, кишками та жилами."
  fish: "Риба"
  fish_desc: "Раніше м'ясо могли дозволити собі лише дуже небагато, тому більшість жителів Європи харчувалася рибою. Крім того, торговий та військовий флот багатьох країн в основному поповнювався за рахунок рибалок."
  wheat: "Пшениця"
  wheat_desc: "Пшениця — це рослинний продукт, який довгий час був основним джерелом їжі для людей та тварин. Неврожайні роки ставали причиною поширення голоду, через який відбувалися заворушення та бунти. З роками вибір продовольчих та сільськогосподарських культур помітно розширився. Люди почали вирощувати помідори, кукурудзу і навіть картоплю — дивину, привезену з Америки."
  maize: "Кукурудза"
  maize_desc: "Кукурудза — це злакова рослина, яку одомашнили жителі стародавньої Мексики багато тисячоліть тому. Вперше кукурудзу завезли до країн Старого Світу після відкриття європейцями Америки в XV столітті. Завдяки своїй життєстійкості та високій харчовій цінності кукурудза швидко завоювала світовий ринок."
  rice: "Рис"
  rice_desc: "Рис — це рослина родини злакових, яка була введена в культуру жителями Азії понад десять тисяч років тому і відразу стала основним джерелом їжі в цьому регіоні. Крім того, понад три тисячі років тому рис одомашнили в Африці, де він теж став одним із головних продуктів харчування. Рис був завезений до Європи з Азії ще в добу Античності, але не зміг витіснити з ринку інші види зерна."
  millet: "Невибагливі злаки"
  millet_desc: "Невибагливі злаки — це злакові культури, які були одомашнені в багатьох частинах світу в різний час, починаючи з доби неоліту. Вони ростуть навіть на бідних ґрунтах і стійкі до посухи, тому жителі напівпустельних областей цінують їх вище за інші, більш примхливі злаки."
  potato: "Картопля"
  potato_desc: "Картопля — це бульбоносна рослина, яку одомашнили індіанці, що жили поблизу озера Тітікака. Культивування цього морозостійкого та вкрай поживного овоча посприяло розвитку андських цивілізацій. Після відкриття Америки картопля поширилася по всьому світу і до 1750 року стала основним продуктом харчування в Європі, що спричинило демографічний бум XIX століття."
  legumes: "Бобові культури"
  legumes_desc: "Протягом тисячоліть бобові були основним джерелом їжі для багатьох цивілізацій. Як і у випадку з кукурудзою, європейці вперше познайомилися з бобовими після підкорення Нового Світу. Ці культури не тільки відмінно втамовували голод, а й не вимагали великих витрат на вирощування та морські перевезення."
  livestock: "Худоба"
  livestock_desc: "Люди займаються скотарством з незапам'ятних часів. Воно буває осілим і кочовим. Перше характерне для мешканців багатих сільськогосподарських місцевостей, де розводять свиней та корів, друге — для жителів обширних рівнин та пустель."
  lacquerware: "Лакові вироби"
  lacquerware_desc: "Техніку лакування винайшли в Китаї та Японії понад десять тисяч років тому, ще в добу неоліту. Дерево або метал покривали шаром лаку, зробленого зі смоли та воску. Отриманий виріб перетворювали на предмет розкоші: розписували, прикрашали різьбленням, наносили на лакову поверхню золоте або срібне напилення."
  weaponry: "Зброя"
  weaponry_desc: "Будь-яке військо не може обійтися без мечів, списів, луків та іншої зброї. Техніка її виготовлення — справжнє мистецтво, яке вдосконалювалося століттями. З часом змінилася і сама зброя, і тактики ведення війни, але люди досі борються один з одним, захищаючи свою незалежність."
  amber: "Бурштин"
  amber_desc: "Бурштин — це цінний товар, який являє собою скам'янілу деревну смолу і зазвичай використовується в ювелірній справі. У документі XII століття згадується узбережжя Пруссії, багате на бурштин. Вважається, що більшу його частину видобували саме там."
  pearls: "Перли"
  pearls_desc: "Перли — це мінералоїд, який утворюється в мушлях молюсків. Він являє собою твердий предмет перламутрового кольору. Круглі перли вважаються еталоном, але в природі зустрічаються перлини різної форми. Краса перлів здавна зачаровувала людей. Протягом всієї історії людства їх використовували в ювелірній справі."
  medicaments: "Ліки"
  medicaments_desc: "Протягом всієї своєї історії люди лікували різні захворювання за допомогою рослин або продуктів тваринного походження, які, як вважалося, мали цілющу силу. Деякі з них дійсно допомагали боротися з хворобою, а ефективність інших була скоріше питанням віри."
  alum: "Галун"
  alum_desc: "Галун — це важливий інгредієнт барвників, а також дубильна речовина. Здавна галун відігравав важливу роль у різних промислових процесах. Насамперед його використовували як протраву при фарбуванні тканин і для освітлення мутних рідин. Спочатку кристали галуну видобували в районі озера Чад, а потім продавали на ринках усього ісламського світу. У пізньому Середньовіччі європейці знайшли інші джерела цих цінних солей."
  olives: "Оливки"
  olives_desc: "Оливки — це плоди оливкового дерева, які тисячоліттями вирощуються в країнах Середземномор'я. Оливки широко застосовуються в кулінарії. Особливою популярністю користується оливкова олія, яка застосовується в безлічі страв середземноморської кухні."
  slaves_goods: "Раби"
  slaves_goods_desc: "Рабство з'явилося ще в далекій давнині, але попит на рабів різко зріс наприкінці XVI століття, коли європейці обзавелися плантаціями в Північній і Південній Америці і їм знадобилася дешева робоча сила."
  tropical_wood: "Тропічна деревина"
  saltpeter: "Селітра"
  saltpeter_desc: "Про властивості селітри знали ще в давнину. Використовували її по-різному — наприклад, як добриво або консервант для м'яса. Однак широке поширення селітра отримала в Середньовіччі, коли людство винайшло вогнепальну зброю і порох — вибухову речовину з деревного вугілля, сірки та селітри. Селітру активно видобували по всьому світу, і з часом вона набула поганої слави."
  fine_cloth: "Тонке сукно"
  fine_cloth_desc: "У всі часи люди підкреслювали свій статус за допомогою красивого одягу. І в Середні віки, і в наші дні продаж таких тканин, як дамаст, муслін або парча, — це надзвичайно прибутковий бізнес."
  elephants: "Слони"
  elephants_desc: "Відомо, що в давнину бойових слонів використовували в Індії, Південно-Східній Азії, Північній Африці та на Близькому Сході. Цей звичай проіснував до Середніх віків, але з винаходом пороху елефантерія остаточно втратила статус ефективного роду військ."
  beer: "Пиво"
  beer_desc: "Пиво — це найдавніший напій, відомий ще з доби неоліту, який набув великої популярності в Середні віки. Саме в ту добу був випущений «Райнхайтсгебот» — найстаріший закон про правила виробництва продуктів харчування, відомий також як закон «про чистоту пива»."
  fruit: "Фрукти"
  fruit_desc: "Фрукти — це різноманітні плоди, що дозрівають на деревах. До них належать лимони, гіркі та солодкі апельсини, яблука та інші плоди. З розвитком історії фрукти стали ласощами, які могли собі дозволити лише багатії та знать. Фрукти ростуть майже в кожному регіоні світу, і поява міжнародної торгівлі призведе до того, що населення різних країн зможе спробувати нові фрукти."
  marble: "Мармур"
  marble_desc: "Мармур полюбився скульпторам та архітекторам ще в глибоку давнину. Через свою податливість та красу він вважається благородним матеріалом. Багато знаменитих скульптур доби Відродження та бароко — наприклад, авторства Мікеланджело та Берніні — були висічені з мармуру."
  mercury: "Ртуть"
  mercury_desc: "Ртуть застосовується як лікарський засіб, але також її можна використовувати для вилучення срібла та золота з руди."
  masonry: "Кам’яна кладка"
  masonry_desc: "Будівельні технології відрізняються величезною різноманітністю. Виготовлення невеликих брусків однакового розміру та форми дозволяє будувати будівлі швидше та підвищує їх довговічність."
  beeswax: "Бджолиний віск"
  beeswax_desc: "Бджоли допомагали людям з найдавніших часів, і бджолиний віск вже давно став невід'ємною складовою людського побуту. З нього виготовляли свічки та ливарні форми, його заливали в дощечки для письма, ним полірували меблі… всього й не перелічити."
  saffron: "Шафран"
  saffron_desc: "Шафран відомий людству з давнини. Попри високу вартість, його використовують не лише в кулінарії, а й у народній медицині, а також як барвник для тканин."
  pepper: "Перець"
  pepper_desc: "Перцем називають цілий ряд рослин, яких об'єднує одне: гострота смаку. Саме завдяки цій властивості різні види перцю набули широкого поширення в кулінарії та народній медицині."
  cloves: "Гвоздика"
  cloves_desc: "Гвоздика — ароматичні бутони гвоздичного дерева, що росте на землях Малаккської протоки. Вона стала однією з найцінніших прянощів у європейській торгівлі, що спонукало європейців пізнього Середньовіччя шукати нові джерела цього та інших екзотичних товарів."
  chili: "Чилі"
  chili_desc: "Батьківщина чилі — Центральна та Південна Америка. Це висушені плоди певних сортів рослин, які славляться своєю «пекучістю». Чилі вирощують з давніх часів, і на сьогодні існує безліч варіацій цієї приправи, що відрізняються смаком та ступенем гостроти. Саме це різноманіття і зробило чилі таким популярним."
  pottery: "Кераміка"
  pottery_desc: "Уміння створювати вироби з глини — один із ключових чинників розвитку цивілізації та одна з найдавніших її ознак. Кожна культура пройшла свій шлях від незграбних глиняних ваз до витончених та хитромудрих витворів мистецтва."
  furniture: "Меблі"
  furniture_desc: "Меблі задовольняють потребу людини в більшому комфорті, ніж просто наявність даху над головою. Майстри виготовляють меблі для різних цілей, на будь-який смак та гаманець: прості та складні, з дерева або навіть каменю та з дорожчих матеріалів."
  elephant_auxiliary_construction: "Створення допоміжних слонів"
  elephant_cavalry_construction: "Створення бойових слонів"
  elephant_infantry_construction: "Створення слонів піхоти"
  a_tribesmen_construction: "Створення одноплемінників"
