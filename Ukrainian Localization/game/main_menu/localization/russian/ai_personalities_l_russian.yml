 # Map mode names and descriptions
 ai_personality_mapmode: "Менталитет держав"
 ai_personality_mapmode_desc: "Окрашивает каждую державу в зависимости от её менталитета — основополагающего свойства, определяющего дипломатическое и военное поведение."
 ai_disposition_mapmode: "Настрой державы"
 ai_disposition_mapmode_desc: "Окрашивает каждую державу в зависимости от её отношения к вам, от тревоги и опасения до желания захватить ваши земли или активного планирования войны."
