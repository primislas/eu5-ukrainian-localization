l_russian:
 # AI Personality names (used as PdxDataLocalize(GetKey()) in CAiPersonality::GetName)
 ai_aggressive: "Агрессия"
 ai_expansionist: "Экспансионизм"
 ai_defensive: "Оборона"
 ai_cautious: "Осторожность"
 ai_opportunistic: "Оппортунизм"
 ai_isolationist: "Изоляционизм"
 ai_friendly: "Дружелюбие"
 # AI Personality descriptions (key + "_desc")
 ai_aggressive_desc: "Эта держава стремится к власти силовыми методами. Она охотно начинает войны, выдвигает жёсткие условия мира и считает соседние державы препятствиями на пути к цели, а не партнёрами для выгодного сотрудничества."
 ai_expansionist_desc: "Эта держава стремится к расширению своих границ и влияния. Она предпочитает территориальную экспансию, активно создаёт претензии и по возможности старается подчинять, а не присоединять соседей."
 ai_defensive_desc: "Эта держава в первую очередь озабочена сохранением уже имеющегося. Она предпочитает избегать ненужных конфликтов, укреплять свои земли и скорее отвечать на угрозы, чем создавать новые."
 ai_cautious_desc: "Эта держава терпелива и избегает рисков. Она в первую очередь ищет дипломатические решения, избегает затяжных войн и предпочитает стабильность авантюрам."
 ai_opportunistic_desc: "Эта держава расчётлива и прагматична. Она ищет слабину и умеет воспользоваться случаем, но избегает участия в конфликтах с неопределённым исходом."
 ai_isolationist_desc: "Эта держава замкнулась в себе, предпочитает внутреннее развитие и избегает участия в делах соседей. Она придерживается нейтралитета и с подозрением относится к дипломатическим обязательствам."
 ai_friendly_desc: "Эта держава ценит союзников, доброжелательность и честные сделки. Она тратит много сил на дипломатию, принимает разумные условия мира и обычно со временем обзаводится надёжными партнёрами."
 # Diplomacy filter category header
 CUSTOM_SEARCH_FILTER_AI_PERSONALITY_CATEGORY_NAME: "Менталитет державы"
 # Tooltip section header
 AI_PERSONALITY_MODIFIERS: "Модификаторы поведения"
 # AI disposition labels (how this country sees the player)
 AI_DISPOSITION_ALARMED: "Тревога"
 AI_DISPOSITION_WARY: "Беспокойство"
 AI_DISPOSITION_PLANNING_WAR: "Планирование войны"
 AI_DISPOSITION_COVETS: "Желание ваших земель"
 AI_DISPOSITION_RIVALS: "Соперничество"
 AI_DISPOSITION_INDIFFERENT: "Безразличие"
 # AI disposition descriptions (tooltip body for each disposition)
 AI_DISPOSITION_ALARMED_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что держава видит в вас экзистенциальную угрозу и постарается обзавестись оборонительными союзами или нанести по вам превентивный удар."
 AI_DISPOSITION_WARY_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что держава относится к вам настороженно, неохотно пойдёт на уступки и вряд ли ослабит бдительность."
 AI_DISPOSITION_PLANNING_WAR_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что у державы есть претензии или обиды, и она готовится силой навязать их вам."
 AI_DISPOSITION_COVETS_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что держава считает ваши земли привлекательной целью и может попытаться завоевать или подчинить вас, если подвернётся такая возможность."
 AI_DISPOSITION_RIVALS_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что держава считает вас соперником и будет по возможности противодействовать вашим интересам, в том числе поддерживая ваших врагов."
 AI_DISPOSITION_INDIFFERENT_DESC: "Этот [Concept('country_disposition', 'настрой')|e] означает, что держава в данный момент безразлична к вам."
