 AI_DISPOSITION_REASON_RIVALS_CB: "У державе есть повод для войны с вами."
 AI_DISPOSITION_REASON_RIVALS_ANTAGONISM: "Ваши державы испытывают сильную неприязнь друг к другу."
 # Conquer desire location tooltip strings
