  HRE_EMPROR_TITLE: "Привілеї та обов'язки імператора"
  HRE_EMPROR_DESC: "Об'єднання «[InternationalOrganizationsView.GetInternationalOrganization.GetNameWithNoTooltip]» очолює #TOOLTIP:SPECIAL_STATUS,emperor,X #L імператор#!#!. Його обов'язок — захищати країни, що входять до імперії, від зовнішніх загроз, підтримувати всередині своїх володінь мир і стабільність, а також боротися за релігійну єдність серед підданих.\n\nВ обмін імператор отримує #Y імперську владу#!, яку можна витрачати на пропозиції [Concept('laws', 'законів')|e] та [Concept('parliament_issues', 'парламентських питань')|e], а також інші корисні бонуси."
