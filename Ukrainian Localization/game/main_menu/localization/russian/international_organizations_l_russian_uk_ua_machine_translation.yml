  protestant_union_desc: "$protestant_union$ — це оборонний союз [Concept('reformation', 'протестантських')|e] країн, які хочуть захистити себе від зростаючої ворожості #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! країн у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Попри те, що унію було засновано #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранами#!#! та #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністами#!#!, будь-який учасник імперії, який відчуває загрозу з боку надто завзятих противників Реформації, може приєднатися до цього [Concept('international_organization', 'міжнародного об’єднання')|e]."
  WE_ARE_PROTESTANT: "Ми — прихильники [Concept('reformation', 'протестантських')|e] [Concept('religion', 'церков')|e]"
