  UNION_IO_PARLIAMENT_TOOLTIP: "[Concept('parliament', 'Парламент')|e] об'єднання «[InternationalOrganizationsView.GetInternationalOrganization.GetName]» відіграє дещо іншу роль, ніж парламенти інших [Concept('international_organizations', 'міжнародних об’єднань')|e]: якщо ті здебільшого займаються розглядом [Concept('parliament_issues', 'парламентських питань')|e], то парламент об'єднання «[InternationalOrganizationsView.GetInternationalOrganization.GetType.GetName]» призначений для його #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#! та введення [Concept('laws', 'законів')|e] для нових учасників унії."
  marriage_union: "Шлюбна унія"
  marriage_union_desc: "Ця особлива [Concept('union', 'унія')|e] укладається за допомогою [Concept('royal_marriage', 'династичного шлюбу')|e]. На відміну від звичайної #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, шлюбну не можна централізувати — вона більше схожа на #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,defensive_league,X #L оборонну лігу#!#!."
