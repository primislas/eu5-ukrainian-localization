  union_recent_policy_change_cd: "Нещодавня зміна політики унії"
  union_annexation_rule_tt: "Створено #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#!, який не є [Concept('subject', 'васалом')|e]. Для правила #TOOLTIP:LAW,union_unification_of_crowns_law,X #L «Перспектива об'єднання»#!#! встановлено відповідну [Concept('policy', 'політику')|e]"
