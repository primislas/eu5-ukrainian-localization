  imperial_authority: "Імперська влада"
  imperial_authority_desc: "Це показник влади, якою користується [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! для ухвалення імперських законів.\n\nВисокий показник імперської влади дає такі переваги:\n$BULLET$ Збільшує #TOOLTIP:PAYMENT,imperial_treasury_contribution,X #L внесок до скарбниці#!#! та #TOOLTIP:PAYMENT,imperial_army_contribution,X #L війська#!#! з боку [Concept('members', 'учасників')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!.\n$BULLET$ [Concept('members', 'Учасники')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! з більшою ймовірністю голосують за [Concept('policies', 'політики')|e], які [Concept('hre_emperor', 'імператор')|e] пропонує членам [GetUniqueInternationalOrganization('hre').GetParliament.Custom('parliament_io_ru_GEN')|l]."
