  international_organization_flavor_parliament: "Парламент"
  no_organization_parliament: "В об'єднанні немає парламенту"
  no_organization_parliament_desc: "$no_parliament_desc$"
  union_royal_assembly: "Королівське зібрання"
  union_royal_assembly_desc: "Королівське зібрання — зародкова форма дорадчого органу для всієї #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!. [Concept('estates', 'Стани')|e] учасників унії збираються для переговорів щодо введення централізованого [Concept('laws', 'зводу законів')|e]."
  hre_court_assembly: "Придворне зібрання"
  hre_court_assembly_desc: "$hre_court_assembly$ існує з часів, коли [Select_CString(GetCharacter('ogk_otto_liudolfinger').IsFemale,'правила', 'правив')] [GetCharacter('ogk_otto_liudolfinger').GetName]. Це давнє і доволі примітивне зібрання в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!. Через відсутність одноманітних процедур [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] не може достатньо ефективно встановлювати нові правила.\n\n$BULLET_WITH_TAB$ Сила голосу #TOOLTIP:SPECIAL_STATUS,emperor,X #L імператора#!#!, #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#! та #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископів-виборців#!#! значно збільшується\n$BULLET_WITH_TAB$ Вплив #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільних імперських міст#!#!, #TOOLTIP:SPECIAL_STATUS,imperial_prelate,X #L імперських прелатів#!#!, #TOOLTIP:SPECIAL_STATUS,primas_germaniae,X #L примасів Німеччини#!#! та #TOOLTIP:SPECIAL_STATUS,legatus_natus,X #L папських легатів#!#! значно зменшується\n$BULLET_WITH_TAB$ Влада #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L імперських селянських республік#!#! стандартна"
  hre_early_imperial_diet: "Ранній рейхстаг"
  hre_early_imperial_diet_desc: "Найраніший різновид #TOOLTIP:LAW,imperial_diet_law,X #L Рейхстагу#!#! втілює собою традиційний порядок #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священної Римської Імперії#!#!. Брати участь можуть лише #TOOLTIP:SPECIAL_STATUS,elector,X #L князі-виборці#!#!, #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископи-виборці#!#! та #TOOLTIP:SPECIAL_STATUS,imperial_prince,X #L імперські принци#!#!. #TOOLTIP:SPECIAL_STATUS,free_city,X #L Вільні імперські міста#!#! та нижчі церковні суб'єкти виключаються із законодавчого процесу.\n\n$BULLET_WITH_TAB$ Велика сила голосу в #TOOLTIP:SPECIAL_STATUS,emperor,X #L імператорів#!#!, #TOOLTIP:SPECIAL_STATUS,elector,X #L князів-виборців#!#!, #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископів-виборців#!#! та #TOOLTIP:SPECIAL_STATUS,imperial_prince,X #L імперських принців#!#!\n$BULLET_WITH_TAB$ #TOOLTIP:SPECIAL_STATUS,free_city,X #L Вільні імперські міста#!#! та #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L імперські селянські республіки#!#! не мають права голосу\n$BULLET_WITH_TAB$ Власники менш значних церковних посад, наприклад #TOOLTIP:SPECIAL_STATUS,imperial_prelate,X #L імперські прелати#!#!, #TOOLTIP:SPECIAL_STATUS,primas_germaniae,X #L примаси Німеччини#!#! та #TOOLTIP:SPECIAL_STATUS,legatus_natus,X #L папські легати#!#!, мають обмежену владу"
  hre_bi_camerial_imperial_diet: "Двопалатний рейхстаг"
  hre_bi_camerial_imperial_diet_desc: "За #TOOLTIP:PARLIAMENT_TYPE,hre_bi_camerial_imperial_diet,X #L двопалатного рейхстагу#!#! правом голосу наділені як церковні сановники, так і правлячі князі — вони складають дві палати рейхстагу.\n\n$BULLET_WITH_TAB$ #TOOLTIP:SPECIAL_STATUS,emperor,X #L Імператори#!#!, #TOOLTIP:SPECIAL_STATUS,elector,X #L князі-виборці#!#!, #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископи-виборці#!#! та #TOOLTIP:SPECIAL_STATUS,imperial_prince,X #L імперські принци#!#! мають звичайні повноваження\n$BULLET_WITH_TAB$ #TOOLTIP:SPECIAL_STATUS,imperial_prelate,X #L Імперські прелати#!#! користуються відчутним впливом\n$BULLET_WITH_TAB$ #TOOLTIP:SPECIAL_STATUS,free_city,X #L Вільні імперські міста#!#! та #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L імперські селянські республіки#!#! все так же не представлені"
  hre_tri_camerial_imperial_diet: "Трипалатний рейхстаг"
  hre_tri_camerial_imperial_diet_desc: "За #TOOLTIP:PARLIAMENT_TYPE,hre_tri_camerial_imperial_diet,X #L трипалатного рейхстагу#!#! вирішальний голос нарешті отримують #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільні імперські міста#!#!. Тепер рейхстаг складається з трьох палат, що дозволяє підтримувати рівновагу трьох типів влади: духовної, князівської та громадянської.\n\n$BULLET_WITH_TAB$ Баланс сил між #TOOLTIP:SPECIAL_STATUS,emperor,X #L імператором#!#!, #TOOLTIP:SPECIAL_STATUS,elector,X #L князями-виборцями#!#!, #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископами-виборцями#!#!, #TOOLTIP:SPECIAL_STATUS,imperial_prince,X #L імперськими принцами#!#!, #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільними імперськими містами#!#! та власниками малих теократичних посад\n$BULLET_WITH_TAB$ #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L Імперські селянські республіки#!#! користуються тут найбільшим впливом\n$BULLET_WITH_TAB$ Найбільш демократичний різновид рейхстагу"
  call_organization_parliament: "Скликання парламенту"
  call_organization_parliament_desc: "Буде скликано парламент [Concept('international_organization', 'міжнародного об’єднання')|e] у спробі отримати підтримку таких аспектів, як вирішення [Concept('parliament_issue', 'парламентського питання')|e], зміна [Concept('policies', 'політик')|e] у [Concept('laws', 'зводі правил')|e], створення [Concept('casus_belli', 'приводу для війни')|e], збір додаткових [Concept('taxes', 'податків')|e], набір додаткового [Concept('army_levies', 'військового')|e] або [Concept('navy_levies', 'морського ополчення')|e]."
  union_call_organization_parliament: "Скликання союзного парламенту"
