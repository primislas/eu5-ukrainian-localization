  unification_law: "Правило про об'єднання"
  unification_law_desc: "Визначає, чи зможуть племена, що входять до конфедерації, діяти незалежно або підкорятимуться єдиній владі."
  bid_for_unification: "Боротьба за об'єднання"
  bid_for_unification_desc: "Настав час об'єднати розрізнені племена! Створивши більш сучасну соціальну структуру, ми зможемо утворити племінну конфедерацію."
  will_ask_members_to_submit_tt: "Усі учасники нашої #Y конфедерації#! будуть змушені стати нашими васалами, або ж ми змусимо їх силою."
  delegated_authority: "Делегування повноважень"
  delegated_authority_desc: "Усі місцеві племена, що входять до конфедерації, мають свої органи влади, можуть приймати рішення та діяти незалежно."
  tatar_yoke: "Татарське іго"
  tatar_yoke_desc: "#TOOLTIP:SUB_CONTINENT,eastern_europe,X #L Східна Європа#!#! в XIII столітті постраждала від навали татар, які встановили своє іго над різними князівствами. Найвидатніші правителі іменуються великими князями. $rank_kingdom_horde_ruler_suffix_male$ Золотої Орди доручає їм збір данини з інших князів від свого імені."
  TATAR_YOKE_LEADER_MALE: "Татарський сюзерен"
  TATAR_YOKE_LEADER_FEMALE: "Татарський сюзерен"
  tatar_yoke_contribution: "Татарська данина"
  tatar_yoke_contribution_desc: "Данина золотом і людьми, яку отримує [ShowSpecialStatusName('tatar_tax_collector')]."
  tatar_yoke_leader_payments: "Виплати татарам"
  tatar_yoke_leader_payments_desc: "Виплати золотом і людьми, які отримує [GetInternationalOrganization('tatar_yoke').GetLeaderTitle] (доставляє їх [ShowSpecialStatusName('tatar_tax_collector')])."
  TATAR_YOKE_TAX_COLLECTOR_TITLE: "Привілеї та обов'язки збирача татарських податків"
  TATAR_YOKE_TAX_COLLECTOR_DESC: "Обов'язок #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великого князя володимирського#!#! — збирати податки від імені #TOOLTIP:SPECIAL_STATUS,tatar_overlord,X #L татарського сюзерена#!#!.\n\nНатомість у землі великого князя володимирського починає #Y мігрувати#! значна частина інших народів, що перебувають під ігом, рятуючись від #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольських#!#! набігів."
  TATAR_YOKE_HINT_1: "Татарське іго — середньовічне утворення з князівств Східної Європи, захоплених монголами.\n\nДо нього не можна приєднатися.\n\n#T Рекомендовані ролі та можливості монгольських васалів#!\n@arrow_bonus_tier_3!#TOOLTIP:SPECIAL_STATUS,tatar_overlord,X #L Татарський сюзерен#!#! повинен стежити за тим, щоб інші васали не стали занадто могутніми.\n@arrow_bonus_tier_3!#TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь володимирський#!#! може використовувати своє становище для збагачення та зміцнення влади і зрештою скинути татарського сюзерена.\n@arrow_bonus_tier_3!Звичайний учасник може претендувати на титул великого князя володимирського або самостійно звільнитися від іга."
  red_turban_rebels: "«Червоні пов'язки»"
  red_turban_rebels_desc: "#T «Червоні пов'язки»#!\n$red_turban_rebels$ — це відчайдушні, але розрізнені бунтівники, що прагнуть повалити #L [GetCountry('CHI').GetCulture.GetName|l]ого#! правителя та захопити#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединну країну#!#!. Попри наявність спільного ворога в особі #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#!, «Червоні пов'язки» вірні лише власним амбіціям."
  guelphs_io: "Гвельфи"
  guelphs_io_desc: "$guelphs_io$ — це група #L [ShowCultureGroupName('italian_group')|l]их #! країн, що підтримують в #TOOLTIP:REGION,italy_region,X #L Італії#!#! цілі, які переслідує [GetCountry('PAP').GetLongName]."
  ghibellines_io: "Гібеліни"
  ghibellines_io_desc: "$ghibellines_io$ — це група #L [ShowCultureGroupName('italian_group')|l]их #! країн, що підтримують в #TOOLTIP:REGION,italy_region,X #L Італії#!#! цілі, які переслідує #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священна Римська Імперія#!#!."
  senior_partner: "$game_concept_senior_partner$"
  senior_partner_plural: "Старші партнери"
  senior_partner_desc: "$game_concept_senior_partner$ фактично є лідером #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#! і, як правило, оплотом влади правлячого монарха. Зазвичай весь процес централізації сфокусований на старшому партнері та його відносинах з іншими учасниками унії."
  junior_partner: "$game_concept_junior_partner$"
  junior_partner_plural: "$game_concept_junior_partners$"
  junior_partner_desc: "$game_concept_junior_partner$ — початковий статус будь-якого учасника #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, на престолі якого не сидить правлячий монарх."
