  high_kingship_leader_title: "Привілеї та обов'язки верховного короля"
  high_kingship_leader_desc: "#TOOLTIP:SPECIAL_STATUS,high_king,X #L Верховний король#!#! зобов'язаний утримувати кельтські племена разом, щоб протистояти іноземним загарбникам.\n\nУ верховному королівстві може бути тільки один лідер, і на цю роль завжди знайдуться претенденти. Король має великий престиж, але мусить постійно бути напоготові."
  high_kingship_hint_1: "Верховне королівство — це союз, заснований на клятві вірності, яку дали один одному тіарни та рі. Ірландська земля пам'ятає кожне її слово."
