  CURIA_BREAKDOWN_TOOLTIP: "#T [Localize('game_concept_curia')] в об'єднанні «[InternationalOrganization.GetNameWithNoTooltip]»#!\nДо об'єднання «[InternationalOrganization.GetName]» входять наступні учасники [Concept('curia', 'курії')|e]:\n[Concept('member', 'Учасники')|e]: [Concept('cardinals', 'кардинали')|e]"
