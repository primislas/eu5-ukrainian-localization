  lordship_of_ireland: "Манор Ірландія"
  lordship_of_ireland_desc: "Влада Англії над Ірландією загрожує занепасти. Після завоювань 1170 року пряме панування корони поступово ослабло. Сьогодні їй належить лише невелика територія, зосереджена навколо Дубліна. Цією територією править вірний лейтенант, а її васали поступово віддаляються від свого сюзерена. Нащадки завойовників, щедро наділені свого часу ерлствами та баронствами, тепер радше нагадують гельських вождів, переймаючи їхню мову та культуру. Інші ж і зовсім перестали підкорятися Англії."
  lordship_of_ireland_lord_title: "Привілеї та обов'язки лорда"
  lordship_of_ireland_lord_desc: "#TOOLTIP:SPECIAL_STATUS,lord_of_ireland,X #L Лорд Ірландії#!#! зобов'язаний посилювати вплив корони в #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!.\n\n#TOOLTIP:SPECIAL_STATUS,lord_of_ireland,X #L Лорд Ірландії#!#! може бути лише один, і його влада крихка. З одного боку, він користується королівською прихильністю, а з іншого — змушений постійно доводити своє право займати таку високу посаду."
  lordship_of_ireland_hint_1: "Учасники манору Ірландія принесли клятву вірності #ONCLICK:COUNTRY,[GetCountry('PLE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLE').Custom('CL_tt')],X [GetCountry('PLE').Custom('CL_DAT')|L]#!#!. Порушити її може лише #TOOLTIP:SPECIAL_STATUS,absentee,X #L абсентеїст#!#!."
  lord_of_ireland_join_tt: "@trigger_no!Потрібне запрошення від #TOOLTIP:SPECIAL_STATUS,lord_of_ireland,X #L лорда Ірландії#!#!"
