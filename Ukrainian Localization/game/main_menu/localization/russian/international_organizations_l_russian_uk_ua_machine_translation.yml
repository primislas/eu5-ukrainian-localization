  marriage_union_mechanic_tooltip: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,marriage_union,X #L Шлюбна унія#!#! — децентралізований різновид #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,union,X #L унії#!#!, схожа з #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,defensive_league,X #L оборонною лігою#!#!: кожен її [Concept('member', 'учасник')|e] захищатиме іншого, якщо той зазнає нападу. Щоб укласти унію, як мінімум у двох країн має бути один і той самий [Concept('heir', 'спадкоємець')|e], який скоро зійде на престол."
  union_mechanic_tooltip: "Учасники залишають [Concept('union', 'унію')|e], якщо над ними більше не владарює один і той самий [Concept('ruler', 'правитель')|e] (або [Concept('heir', 'спадкоємець')|e] у випадку [Concept('regency', 'регентства')|e]). Для об'єднання унії у всіх [Concept('member', 'учасників')|e] має бути той самий [Concept('union_integration_level_short', 'рівень інтеграції')|e], що й у #TOOLTIP:SPECIAL_STATUS,senior_partner,X #L старшого партнера#!#!. Учасникам нижчого рівня потрібно нав'язати інтеграцію через [Concept('parliament', 'парламент')|e].\n\nЯкщо у #TOOLTIP:SPECIAL_STATUS,junior_partner,X #L молодших партнерів#!#! [Concept('great_power_score', 'рахунок великої держави')|e] не нижче #Y 125%#! порівняно з поточним старшим партнером, їм доступна [Concept('country_interaction', 'взаємодія')|e] #TOOLTIP:COUNTRY_INTERACTION,take_over_seniority,X #L «Захоплення старшинства»#!#!.\n\nПоточний центр унії — [InternationalOrganizationsView.GetInternationalOrganization.GetLeaderScopeObjectAtIndex('(int32)0').GetCharacter.GetCourtCountry.GetCapital.GetName], [InternationalOrganizationsView.GetInternationalOrganization.GetLeaderScopeObjectAtIndex('(int32)0').GetCharacter.GetCourtCountry.GetName]."
