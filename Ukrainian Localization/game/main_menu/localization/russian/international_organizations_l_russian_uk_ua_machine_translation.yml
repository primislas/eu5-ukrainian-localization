  independence_movement: "Рух за незалежність"
  independence_movement_desc: "Настав час скинути кайдани наших [Concept('overlords', 'сюзеренів')|e] і боротися за свободу! Рух за незалежність може розпочатися в будь-який час, але ймовірність зростає, якщо [Concept('subject', 'васалу')|e] не подобається підкорятися чинному лідеру. Рух за незалежність може легко набрати прихильників, якщо ми непопулярні."
