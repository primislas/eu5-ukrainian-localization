  hre_election: "Імперські вибори"
  hre_election_desc: "[Concept('electors', 'Виборщики')|e] обирають [Concept('hre_emperor', 'імператора')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! шляхом голосування. [GetUniqueInternationalOrganization('hre').Custom('GetHREElectionDescription')]"
