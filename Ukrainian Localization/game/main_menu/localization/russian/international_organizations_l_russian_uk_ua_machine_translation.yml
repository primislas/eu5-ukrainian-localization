  rescind_lieutenant_tt: "@trigger_no! У #TOOLTIP:INTERNATIONAL_ORGANIZATION,$lordship_of_ireland_tt$,X #L манорі Ірландія#!#! немає [Concept('countries', 'країн')|e] з [Concept('special_status', 'особливим статусом')|e] #TOOLTIP:SPECIAL_STATUS,lieutenant,X #L лейтенанта#!#!, який можна відкликати"
  generic_not_allowed_tt: "Ми не відповідаємо вимогам для цієї [Concept('action', 'дії')|e]"
