  vote_in_organization_parliament_no_international_organization: "@trigger_no! Зараз жодне [Concept('international_organization', 'міжнародне об’єднання')|e] не бере участі в дебатах"
  vote_in_organization_parliament_no_policy_vote_tt: "Зараз не обговорюється жоден [Concept('law', 'закон')|e], у [Concept('parliament', 'парламенті')|e] не триває голосування"
  vote_for_organization_issue: "Голосування за рішення"
  vote_for_organization_issue_desc: "Ми віддамо голос у [Concept('parliament', 'парламенті')|e] [Concept('international_organization', 'міжнародного об’єднання')|e] на підтримку розглядуваного [Concept('parliament_issue', 'парламентського питання')|e]. Кількість голосів у дискусії залежить від нашого найбільш значущого [Concept('special_status', 'особливого статусу')|e] та [Concept('special_status_power', 'впливу особливого статусу')|e] в [Concept('international_organization', 'міжнародному об’єднанні')|e]."
  vote_against_organization_issue: "Голосування проти рішення"
