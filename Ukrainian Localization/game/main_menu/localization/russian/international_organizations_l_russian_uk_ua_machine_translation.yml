  change_organization_parliament_type_desc: "Це дозволить вам обрати інший [Concept('parliament_type', 'тип парламенту')|e] [Concept('international_organization', 'міжнародного об’єднання')|e]."
  vote_in_organization_parliament: "Голосування в парламенті об’єднання"
  vote_in_organization_parliament_header: "$vote_in_organization_parliament$"
  vote_in_organization_parliament_desc: "У [Concept('parliament', 'парламенті')|e] [Concept('international_organization', 'міжнародного об’єднання')|e] зараз тривають дебати. Шляхом голосування країни-учасниці можуть визначити результат обговорення [Concept('parliament_issue', 'парламентського питання')|e]."
