  IO_PARLIAMENT_SUPPORT_TT: "На даний момент рівень підтримки цього починання в [InternationalOrganizationsView.GetInternationalOrganization.GetParliament.Custom('parliament_io_ru_PREP')|l] становить [InternationalOrganizationsView.GetInternationalOrganization.GetParliament.GetParliamentIssueSupport|2%G]."
