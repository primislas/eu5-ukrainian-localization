  jurchen_confederation: "Конфедерація чжурчженів"
  jurchen_confederation_desc: "Це союз кочових та напівкочових народів, що об'єдналися під прапором одного клану. Чжурчжені борються із зовнішніми загрозами, попутно намагаючись придушити внутрішні чвари та об'єднати учасників союзу."
