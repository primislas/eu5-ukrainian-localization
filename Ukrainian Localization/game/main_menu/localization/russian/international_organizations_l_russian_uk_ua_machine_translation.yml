  japanese_shogunate: "Японський сьогунат"
  japanese_shogunate_desc: "Японська політична система завжди відзначалася великою складністю. Номінально правителем країни вважається імператор, але фактичним правителем вже не перше століття є сьогун, та навіть його в деякі епохи заміняв регент. У країні вранішнього сонця традиційно сильна боротьба сімейств за владу та верховенство над іншими."
  japanese_land_ownership: "Японські острови"
