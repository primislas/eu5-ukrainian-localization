#### TRACK NAMES AND FLAVOUR TEXT ####

 MusicPlayer_01_Overture_I_Genesis: "01 - Overture I Genesis"
 MusicPlayer_01_Overture_I_Genesis_flavour: "'Мир пробуждается, солнечный свет постепенно открывает его лик, кусочек за кусочком.'"
 MusicPlayer_02_Overture_II_The_Odyssey: "02 - Overture II Odyssey"
 MusicPlayer_02_Overture_II_The_Odyssey_flavour: "'Увертюра нашей истории, в которой мы знакомимся с её персонажами и темами.'"
 MusicPlayer_03_Royal_Court_Invitation: "03 - Royal Court Invitation"
 MusicPlayer_03_Royal_Court_Invitation_flavour: "Клавесин, звучащий в этой пьесе, — клавишный инструмент, распространённый в музыке эпохи Возрождения и барокко. Он издаёт звук за счёт механического защипывания набора струн, закреплённых на деке: при нажатии клавиши приводится в движение плектр‑язычок, который защипывает одну струну."
 MusicPlayer_25_The_Noble_Art_of_Diplomacy: "25 - The Noble Art of Diplomacy"
 MusicPlayer_25_The_Noble_Art_of_Diplomacy_flavour: "Инструменты семейства лютни имеют долгую историю во многих регионах мира и исторических периодах, а европейская лютня — ведущий инструмент светской музыки эпохи Возрождения в Европе."
 MusicPlayer_21_Conquer_or_Fall: "21 - Conquer or Fall"
 MusicPlayer_21_Conquer_or_Fall_flavour: "Эпическая композиция с участием валторн, струнных инструментов и хора. Представляет вдохновляющую вариацию на одну из главных мелодических тем музыки в Europa Universalis V."
 MusicPlayer_07_For_the_Lost_Ones: "07 - For the Lost Ones"
 MusicPlayer_07_For_the_Lost_Ones_flavour: "Скорбная и волнующая композиция, перекликающаяся темами и мотивами с другими произведениями из Europa Universalis V."
 MusicPlayer_12_Jester_Speaks_the_Truth: "12 - Jester Speaks the Truth"
 MusicPlayer_12_Jester_Speaks_the_Truth_flavour: "Композиция, вдохновлённая музыкой раннего Возрождения, строится на вариациях главного мелодического мотива музыки Europa Universalis V."
 MusicPlayer_05_The_Rise_of_an_Empire: "05 - The Rise of an Empire"
 MusicPlayer_05_The_Rise_of_an_Empire_flavour: "Открываясь главным мотивом Europa Universalis V, эта композиция ярко передаёт основную эмоциональную суть игрового опыта."
 MusicPlayer_20_Thirty_Years: "20 - Thirty Years"
 MusicPlayer_20_Thirty_Years_flavour: "Тридцатилетняя война (1618–1648) — один из самых разрушительных конфликтов в европейской истории, унёсший жизни от 4,5 до 8 миллионов человек. Она вспыхнула на фоне Реформации XVI века и разгорелась ещё сильнее из‑за внешних столкновений интересов и старых распрей."
 MusicPlayer_24_The_Black_Death: "24 - The Black Death"
 MusicPlayer_24_The_Black_Death_flavour: "Истребляя половину населения Европы XIV века, Чёрная смерть стала одной из самых смертоносных пандемий в истории человечества."
 MusicPlayer_10_Gloria_Patri: "10 - Gloria Patri"
 MusicPlayer_10_Gloria_Patri_flavour: "Вокальная вариация на тему Сюиты для виолончели № 1 соль мажор И. С. Баха, BWV 1007: I. Прелюдия."
 MusicPlayer_14_Lux_aeterna: "14 - Lux Aeterna"
 MusicPlayer_14_Lux_aeterna_flavour: "Lux aeterna — текст, часто используемый в музыке как часть заупокойной мессы в католической церкви. В нём говорится о благодати Божией и Его вечном свете, сияющем над усопшими."
 MusicPlayer_18_Falalalan: "18 - Falalalan"
 MusicPlayer_18_Falalalan_flavour: "История всегда присутствует в музыке, порой сразу несколькими способами."
 MusicPlayer_22_A_Message_to_The_King: "22 - A Message to the King"
 MusicPlayer_22_A_Message_to_The_King_flavour: "Композиция, полная срочности и пыла, передающая ощущение, что поспешность имеет первостепенное значение."
 MusicPlayer_08_No_Fear_No_Mercy: "08 - No Fear, No Mercy"
 MusicPlayer_08_No_Fear_No_Mercy_flavour: "Торжественная композиция, напоминающая о затишье перед битвой и о сердцах воинов, бьющихся в груди в предвкушении сражения."
 MusicPlayer_06_Pain_is_Salvation: "06 - Pain is Salvation"
 MusicPlayer_06_Pain_is_Salvation_flavour: "Текст сочетает английский, древнегерманский и латинский языки и повествует о страданиях на пути к спасению."
 MusicPlayer_04_In_Your_Honor: "04 - In Your Honor"
 MusicPlayer_04_In_Your_Honor_flavour: "Масштабное произведение, напоминающее о зелёных пастбищах и благоговении перед Богом и Природой."
 MusicPlayer_15_A_Bargain_with_Beelzebub: "15 - A Bargain with Beelzebub"
 MusicPlayer_15_A_Bargain_with_Beelzebub_flavour: "Религия и война, войны из‑за религии. Благочестие и кровожадность, переплетающиеся друг с другом. Изображённые здесь века — это века резких контрастов, разбавленные оттенками серого."
 MusicPlayer_16_The_Path_to_Potsdam: "16 - The Path to Potsdam"
 MusicPlayer_16_The_Path_to_Potsdam_flavour: "Во время Тридцатилетней войны город Потсдам потерял почти половину своего населения."
 MusicPlayer_11_Maiden_Voyage: "11 - Maiden Voyage"
 MusicPlayer_11_Maiden_Voyage_flavour: "Композиция в танцевальном ритме, напоминающая о качке волн, когда корабль выходит в неизведанные моря."
 MusicPlayer_17_The_Coronation_of_a_Naked_Emperor: "17 - The Coronation of a Naked Emperor"
 MusicPlayer_17_The_Coronation_of_a_Naked_Emperor_flavour: "Произведение в светском стиле барокко, с участием струнных инструментов и клавесина."
 MusicPlayer_13_Battle_of_Lutzen: "13 - Battle of Lützen"
 MusicPlayer_13_Battle_of_Lutzen_flavour: "Битва при Лютцене произошла 16 ноября 1632 года: шведская армия при поддержке войск из Саксонии и Гессена‑Касселя сражалась против Имперской армии Священной Римской империи. Это одно из важнейших сражений Тридцатилетней войны. После гибели шведского короля Густава Адольфа в ходе битвы был создан Хайльброннский союз."
 MusicPlayer_26_Peace_of_Westphalia: "26 - Peace of Westphalia"
 MusicPlayer_26_Peace_of_Westphalia_flavour: "Вестфальский мир — собирательное название двух отдельных мирных договоров, подписанных в Оснабрюке и Мюнстере в 1648 году, которые положили конец Тридцатилетней войне и принесли мир в Священную Римскую империю."
 MusicPlayer_23_The_Flagellant: "23 - The Flagellant"
 MusicPlayer_23_The_Flagellant_flavour: "Флагеллантство — практика самобичевания как покаяния за грехи и разделения Страстей Христовых, присутствующая во многих христианских традициях. Это движение XIV века в западном христианстве возникло как реакция на войны, голод и эпидемии."
 MusicPlayer_19_O_quam_gloriosum: "19 - O quam gloriosum"
 MusicPlayer_19_O_quam_gloriosum_flavour: "Эта композиция основана на тексте, написанном Томасом Луисом де Викторией (1548–1611) для его «Missa O quam gloriosum»."
 MusicPlayer_09_Libera_me_Domine: "09 - Libera me Domine"
 MusicPlayer_09_Libera_me_Domine_flavour: "В этой композиции объединены тексты «Pie Jesu» и «Libera me», которые часто используются в музыке как часть заупокойной мессы (Реквиема) в Католической церкви. В них содержится мольба о том, чтобы усопшему была дарована милость Иисуса, дарующая покой, и избавление в день Страшного суда."
 MusicPlayer_sol_ashanti_Aho: "Ashanti - Aho"
 MusicPlayer_sol_ashanti_Aho_flavour: "Нана Осей Твум Барима — мастер игры на всех инструментах, используемых в музыке и церемониях народа ашанти, включая сепереву, традиционные духовые и ударные инструменты. Он также является преемником императора и создателем Королевства Ашанти. Название песни переводится как «Военный клич»."
 MusicPlayer_sol_ashanti_Asanteman_Yenim_Ko: "Ashanti - Asanteman Yenim Ko"
 MusicPlayer_sol_ashanti_Asanteman_Yenim_Ko_flavour: "Начало текста песни примерно переводится как «Ашанти умеют сражаться, но не умеют бежать», а далее провозглашается превосходство воинов ашанти."
 MusicPlayer_sol_ashanti_Seperewa_Akasa: "Ashanti - Seperewa Akasa"
 MusicPlayer_sol_ashanti_Seperewa_Akasa_flavour: "Название песни переводится как «Сеперева заговорила». Сеперева — инструмент семейства арфо‑лютней с коробчатым резонатором и 10–14 струнами, прикреплёнными к грифу путём намотки непосредственно на него. Происходит из Западной Африки. Говорят, что король Осей Туту, основатель империи Асанте (Ашанти), так любил этот инструмент, что для его королевских регалий была изготовлена золотая копия."
 MusicPlayer_sol_aztec_Mictlan: "Aztec - Mictlan"
 MusicPlayer_sol_aztec_Mictlan_flavour: "$Pierre_Harmon_facts$. Название песни переводится как «Подземный мир»."
