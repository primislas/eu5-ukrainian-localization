 Hakan_Glante: "Håkan Glänte"
 Hakan_Glante_and_Bach: "Håkan Glänte, J.S. Bach"
 Norrkoping_Symphony_Orchestra: "Norrköping Symphony Orchestra"
 Yingying_Herrdahl: "Yingying Herrdahl (pipa)"
 Yingying_Herrdahl_facts: "Ин Ин Херрдал — виртуозная исполнительница на пипе, в настоящее время проживает в Швеции."
 Pipa_facts: "Китайская пипа — струнный щипковый инструмент грушевидной формы, на котором играют ногтями или, исторически, также медиатором. Её происхождение насчитывает почти две тысячи лет, и это один из самых популярных китайских инструментов."
 Martin_Ostergren: "Martin Östergren (organ)"
 Feras_Charestan: "Feras Charestan (qanun)"
 Feras_Charestan_facts: "Ферас Чарестан родом из города Эль‑Хасака на северо‑востоке Сирии, обучался игре на кануне в Высшей музыкальной школе в Дамаске."
 Qanun_facts: "Канун (канун) — струнный инструмент семейства цитр, возможно, происходящий из древней Месопотамии, хотя его происхождение точно не установлено."
 Ilona_Danho: "Ilona Danho (vocals)"
 Feras_Charestan_and_Ilona_Danho: "$Feras_Charestan$, $Ilona_Danho$"

 Dan_Cecil_Hill: "Dan Cecil Hill (flutes)"
 Dan_Cecil_Hill_facts: "Дэн Сесил Хилл (народ кайюга, клан Цапли) — художник и музыкант народа хауденосауни (ирокезов), специализирующийся на традиционном изготовлении серебряных изделий и изготовлении флейт. Будучи художником, исполнителем и культурным деятелем на протяжении большей части своей жизни, он работал над сохранением и распространением всех аспектов истории своего народа, восходящей к доколониальным временам в США и более ранним периодам."
 Pierre_Harmon: "Pierre Harmon"
 Pierre_Harmon_facts: "Пьер Армон — широко известный флейтист и признанный эксперт по доколумбовой музыке. Он получил всемирную известность благодаря своим ценным исследованиям в области музыковедения, особенно в области ацтекской музыки, а также владеет одной из крупнейших коллекций древних инструментов, освоению которых он посвятил свою карьеру."
 Laurent_Sauron: "Laurent Sauron"
