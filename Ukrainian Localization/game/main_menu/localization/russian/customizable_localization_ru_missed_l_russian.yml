 Jacob_Regnart: "Jacob Regnart (1540‑е–1599)"
 Jacob_Regnart_facts: "Регнарт — фламандский композитор эпохи Возрождения, родился в Дуэ и писал как духовную, так и светскую музыку. На протяжении жизни он работал в Австрии и Богемии, в том числе в должности капельмейстера при эрцгерцоге Фердинанде в Инсбруке в 1580‑х годах."

 Martin_Rinckart: "Martin Rinckart (1586–1649)"
 Martin_Rinckart_facts: "Мартин Ринкарт — лютеранский священнослужитель и автор гимнов, служил архидиаконом в Айленбурге в Северной Саксонии, где он родился и умер."
 Joachim_Neander: "Joachim Neander (1650–1680)"
 Joachim_Neander_facts: "Йоахим Неандер родился в Бремене, был автором гимнов реформатской (кальвинистской) церкви, теологом и учителем. Считается ведущим автором гимнов реформатской церкви, написал около 60 гимнов."
 Dietrich_Buxtehude: "Dietrich Buxtehude (1637–1707)"
 Dietrich_Buxtehude_facts: "Дидрих Буксенхуде (при рождении Дидрих Хансен Буксенхуде) родился в Хельсингборге, провинция Сконе, в 1637 году. Буксенхуде считается одним из важнейших композиторов XVII века и оказал большое влияние на более поздних композиторов, таких как Бах и Гендель."
