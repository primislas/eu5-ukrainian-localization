  army_artillery_desc: "Зброя дальнього бою, керована розрахунком спеціалістів, яка запускає снаряди, в основному призначені для прориву та руйнування укріплень."
  army_auxiliary_desc: "Допоміжні війська являють собою надзвичайно різноманітний набір загонів, мета яких — підтримка основних сил армії."
  army_cavalry_desc: "Кавалерія — це загони вершників, які відрізняються високою маневреністю та ударною силою."
  army_infantry_desc: "Піхота — це загони солдатів, які б'ються в пішому строю і зазвичай складають основну масу регулярного війська."
  navy_galley_desc: "Галери — це судна з невеликою осадкою, в основному рухомі веслами. Найчастіше використовуються в прибережних місцевостях."
  navy_heavy_ship_desc: "Важкі кораблі — це великі судна, оснащені кількома щоглами та палубами, що використовуються для ведення війни та демонстрації сили по всьому світу."
  navy_light_ship_desc: "Легкі судна — це невеликі та відносно дешеві судна з малою осадкою, орієнтовані на швидкість, маневреність та простоту навігації."
  navy_transport_desc: "Транспорт — це змішані пасажирські та торгові судна, що використовуються для перевезення військ через моря."
