  a_byzantine_cataphracts: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]і катафракти"
  a_byzantine_cataphracts_desc: "Могутні лицарі-катафракти, закуті у важку ламелярну броню, складають еліту нашої кавалерії. Вони озброєні короткими піками, що називаються «контос», і вселяють жах у серця ворогів. Коли нестримні катафракти мчать на своїх конях, немов сталевий вихор, вони змітають усіх, хто намагається загрожувати нашому народу."
  a_byz_helepolis_cannon_unit: "Удосконалені гелеполіди"
  a_byz_helepolis_cannon_unit_desc: "Гелеполіди вірно служили багатьом попереднім поколінням візантійських імператорів. Із поширенням пороху та нових облогових знарядь цей різновид артилерії, призначений для штурму міст, відродився в новій якості."
  a_akritai: "Акрити"
  a_akritai_desc: "Акрити прославилися як захисники регіону [ShowRegionName('anatolia_region')] від східних загарбників. [ShowGovernmentReformName('theme_system')] сприяла їхньому розвитку, винагороджуючи їх за старанність і даючи їм новий стимул захищати нашу батьківщину."
  a_varangians: "Варяги"
  a_varangians_desc: "Ці нечисленні люті воїни, що прийшли з далеких північних земель, складають основу особистої варти базилевса. Вони озброєні сокирами та щитами, їх називають #italic pelekyphoroi barbaroi#!, що означає «варвари з сокирами»."
  a_late_winged_hussars: "Пізні крилаті гусари"
  a_late_winged_hussars_desc: "$winged_hussar_desc$"
  winged_hussar_desc: "Ці вершники в сяючих обладунках зі знаменитими крилами є грізною силою. Їхній потужний таранний удар не тільки завдає величезної шкоди, а й підриває бойовий дух ворога."
  a_red_cannon: "Гармата червоних варварів"
  a_red_cannon_desc: "Ця гармата, розроблена імперськими зброярами та відома під назвою #italic хуніпао#!, об'єднала в собі винахідливість європейських і майстерність азійських ремісників. Її творці взяли за основу західну кулеврину та вдосконалили її, збільшивши вогневу міць і зменшивши вагу."
  a_banner_cavalry: "Прапорна кавалерія"
  a_banner_cavalry_desc: "Ці вершники, народжені в степах і загартовані тяготами війни, несуть загибель усім, хто сміє оскаржувати нашу владу. Нищівний натиск та вправні маневри роблять їх дуже грізними суперниками."
  n_hanseatic_cog: "Ганзейський когг"
  n_hanseatic_cog_desc: "$n_hanseatic_cog$ — це гордість нашого торгового флоту. Найраніші його зображення датуються XII століттям, але за наступні століття він зазнав безліч змін та покращень. Для корабля характерні цибулинна форма, одна щогла, прямий вітрило, жорстке кермо та плоске днище. Ганзейський когг здійснив революцію в перевезенні вантажів, а здатність пересуватися по мілководдю робить його ідеальним торговим судном. Під управлінням нечисленного екіпажу когг може перевозити значний обсяг вантажів, що дає Ганзейській лізі значну торговельну перевагу над суперниками."
  a_akinji: "$akinji_cavalry$"
  a_akinji_desc: "Цей загін легких вершників, які відомі своїми стрімкими маневрами та влучною стрільбою, вартий цілої армії. Він чудово доповнить наші війська."
  a_mamluk_unit_traditions: "Ранні мамлюки"
  a_mamluk_unit_traditions_desc: "Ці добре навчені елітні війська представляють найкращі риси нашого народу. Їх викуповують у чужоземних господарів і виховують як рабів, прищеплюють їм дисципліну та навчають нашим релігійним і військовим доктринам, щоб згодом вони стали ядром нашої регулярної армії. Найчастіше вони носять важкі обладунки та озброєні міцними списами. Їхні унікальні шоломи та сама присутність на полі битви вселяють страх нашим ворогам."
  a_halqah_unit: "Халка"
  a_halqah_unit_desc: "Ці допоміжні війська, що часто супроводжують мамлюків, легко озброєні та діють швидко, тому можуть підтримати нашу основну армію на полі бою."
  a_mamluk_unit_renaissance: "Реформовані мамлюки"
  a_mamluk_unit_renaissance_desc: "Пізні мамлюки відрізняються підвищеною увагою до деталей та дисципліни. Вже заплановано низку військових реформ, покликаних відновити традиційні стандарти та перенавчити наші війська."
  a_muslim_riders_vijay: "Вершники-мусульмани"
  a_muslim_riders_vijay_desc: "$a_muslim_riders_vijay$, порівняно з піхотними арміями Південної Індії, мають значно більшу маневреність у бою."
  a_reislaufer: "Швейцарські найманці"
  a_reislaufer_desc: "Деякі з наших співвітчизників подорожують до чужих земель і заробляють на життя, наймаючись на службу до іноземних правителів. Додому вони повертаються досвідченими воїнами та одними з найкращих бійців Європи."
  n_mtepe: "Мтепе"
  n_mtepe_desc: "$n_mtepe$ — один із найпоширеніших типів кораблів, попередник кілванського дау та вершина мореплавства суахільської культури. $n_mtepe$ відрізняється від кілванського дау квадратною кормою, а ще під час його будівництва не використовуються цвяхи. Замість цього корпус скріплюється конструкцією зі зшитих дощок. Основна роль мтепе — навігація місцевим мілководдям та налагодження торгівлі вздовж африканського узбережжя."
  n_kabang: "Кабанг"
  n_kabang_desc: "$n_kabang$ — універсальне судно середнього розміру, яке часто виготовляють із цільного шматка дерева. Широко використовується по всій Індонезії. Крім своєї ролі як транспорту для перевезення людей і товарів, цей корабель став символом морських кочівників — простолюду та рибалок, які користувалися припливами та мусонами для переміщення з порту в порт, заробляючи на життя морем."
  a_late_karambit_warrior: "Пізні воїни з керамбітами"
  a_late_karambit_warrior_desc: "Ці воїни озброєні примітними клинками та облачені в примітивні обладунки. Вони покладаються на швидкість, лютість та відточеність рухів, а також майстерно б'ються в ближньому бою, де вигнуте лезо керамбіта особливо ефективне для рубки, захоплення та потрошення супротивника. Переосмисливши та покращивши свої бойові шикування та тактики, вони стали легендарною військовою силою, що наводить жах на весь архіпелаг."
  a_cetbang_cannon: "Сетбанг"
  a_cetbang_cannon_desc: "$a_cetbang_cannon$ — одна з найвидатніших дульнозарядних гармат нашої епохи. Вона оснащена коротким циліндричним стволом і завдає нищівних ударів величезної сили. Ця гармата настільки популярна, що використовується нами повсюдно і стоїть на озброєнні військових кораблів та армій, а також застосовується для захисту портів."
  n_madurese_gali: "Мадурський галі"
  n_madurese_gali_desc: "Для служби в нашому флоті прибули жителі Мадурської протоки. Завдяки своїй морській доблесті та чудовим навичкам суднобудування вони змогли створити корабель нового типу. $n_madurese_gali$ — велике судно, яке чудово проявляє себе в наступальних війнах та мореплавстві й незабаром стане основою нашого флоту."
  n_jong: "Джонг"
  n_jong_desc: "$n_jong$ вже довгий час вірою і правдою служить нашому народу. Його численні щогли та корпус зроблені з товстого дерева, завдяки чому він ідеально підходить для перевезення вантажів та військ на великі відстані."
  a_naft_throwers: "Метальники нафти"
  a_naft_throwers_desc: "Метальники нафти використовують секрет грецького вогню та закидають ворога запалювальними гранатами, завдаючи шкоди та сіючи паніку в його лавах. Полководці задіюють їх переважно для залякування, а не для знищення супротивника."
  a_dahomey_amazons: "Дагомейські амазонки"
  a_dahomey_amazons_desc: "Ці войовниці родом із #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#! наводять страх на ворогів і завдають нищівної шкоди."
  a_esho_cavalry_oyo: "Кавалерія ешо"
  a_esho_cavalry_oyo_desc: "Кавалерія ешо — професійні загони молодших вождів, що набираються всередині країни. Вершники потрапляють сюди завдяки своїм заслугам, а не зв'язкам."
  a_saxon_defensioner: "Саксонський захисник"
  a_saxon_defensioner_desc: "#italic Захисники#! — це загартовані ветерани, які несуть службу на кордоні з Богемією. Забезпечуючи безпеку на стежках і перевалах Рудних гір, ці міцні бійці навчилися битися навіть у найсуворіших умовах."
  a_prussian_grenadiers: "Прусські гренадери"
  a_prussian_grenadiers_desc: "Гренадери — справжня еліта прусської армії. Під час штурмів та облог вони завжди виступають у перших ешелонах, тому до таких загонів набирають найсильніших та найбезстрашніших бійців."
  a_bavarian_jager: "Баварські єгері"
  a_bavarian_jager_desc: "Ці полки складаються з досвідчених мисливців та лісників, тому їм немає рівних у бою на лісистій місцевості. Якщо вороги посміють вторгнутися в наші хащі, єгері неодмінно влаштують їм гарячий прийом."
  a_hesse_jager: "Гессенські єгері"
  a_hesse_jager_desc: "До елітних військ набирають вправних мисливців. Завдяки доброму знанню наших земель ці єгері здатні без зусиль битися навіть у густих лісах, однак через своє легке оснащення не можуть вести бій надто довго."
  a_austrian_grenzhussar: "Прикордонні гусари"
  a_austrian_grenzhussar_desc: "Ці легкі гусарські полки розміщуються в прикордонних гарнізонах і можуть впевнено охороняти віддалені куточки нашої країни, при цьому майже не обтяжуючи нашу скарбницю."
  a_pandur: "Пандури"
  a_pandur_desc: "Ці легкі війська складаються з жителів наших словенських і хорватських володінь. Вони ідеально підходять для захисту прикордонних регіонів, оскільки чудово знають свої рідні землі — це дає їм відчутну перевагу перед будь-яким загарбником."
  a_austrian_grenzer: "Граничари"
  a_austrian_grenzer_desc: "$a_pandur_desc$"
  a_gebirgsschutzen_infantry: "Гірські стрільці"
  a_gebirgsschutzen_infantry_desc: "Гірські стрільці як ніхто інший пристосовані до складнощів альпійської місцевості. Завдяки легкому обмундируванню та розосередженому бойовому порядку вони можуть вести бій навіть у важких умовах високогір'я."
  a_grenadiers: "Гренадери"
  a_grenadiers_desc: "Гренадери озброєні вибуховими снарядами і по праву вважаються елітними передовими частинами нашої армії. Їхня роль у битві давно вийшла за межі простого метання гранат: завдяки особливій підготовці вони фактично стали головною ударною силою наших військ."