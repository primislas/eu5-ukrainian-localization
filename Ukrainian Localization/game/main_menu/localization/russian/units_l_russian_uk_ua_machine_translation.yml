  normal_navy_method: "Звичайна"
  normal_training_desc: "Звичайна методика підготовки [Concept('regiment', 'полків')|e]."
  elite_training_desc: "Солдати [Concept('regiments', 'полків')|e] набувають більше [Concept('experience', 'досвіду')|e] ціною більш тривалої підготовки."
  rushed_training_desc: "Ці [Concept('regiments', 'полки')|e] не встигнуть досягти [Concept('maximum_strength', 'максимальної чисельності')|e] до моменту розгортання."
  normal_navy_method_desc: "Звичайна методика будівництва [Concept('ship', 'кораблів')|e]."
