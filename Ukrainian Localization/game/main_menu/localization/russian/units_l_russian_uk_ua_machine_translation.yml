  a_musketeers: "Мушкетери"
  a_hussars: "Гусари"
  a_chambered_cannon: "Каморна гармата"
  a_line_infantry: "Лінійна піхота"
  a_dragoons: "Драгуни"
  a_royal_mortar: "Королівська мортира"
  a_cuirassiers: "Кірасири"
  a_flying_battery: "Летюча батарея"
  a_bedouin_cavalry: "Кавалерія бедуїнів"
  a_bedouin_cavalry_desc: "Кочовий народ бедуїнів живе в пустелях Аравійського півострова, Північної Африки, Леванту та Месопотамії. Бедуїни з дитинства вчаться верховій їзді, а верхи на арабських скакунах є грізною бойовою кавалерією."
  a_feudal_levy: "Феодальне ополчення"
  a_villagers: "Селяни"
  a_villagers_desc: "Цей загін, зібраний з озброєних селян без будь-якої військової підготовки, є останньою відчайдушною спробою зупинити ворога."
  a_kerns: "Керни"
  a_kerns_desc: "$a_kerns$, що виросли серед суворих пагорбів і торф’яних боліт, є легкою піхотою, озброєною кинджалами та дротиками. У бою вони відіграють роль застрільників."
  a_gallowglass: "Галлогласи"
  a_gallowglass_desc: "$a_gallowglass$, одягнені в кольчуги та озброєні дворучними мечами, є грізною силою і нащадками скандинавських вікінгів, що розселилися по узбережжю Атлантики."
  a_scottish_highlander: "Шотландські горяни"
  a_scottish_highlander_desc: "Шляхетні клани гірської Шотландії мають величезну цінність для наших військ. Якщо пристосувати до епохи мушкетів їхні старі військові звичаї, зокрема знаменитий #ITALIC натиск горян#!, воїни цих кланів зможуть легко підривати бойовий дух противника, кидаючись в атаку зі своїми палашами."
  a_reformed_gallowglass: "Реформовані галлогласи"
  a_reformed_gallowglass_desc: "Вплив континентальної військової справи призвів до того, що загони галлогласів стали краще екіпірованими та більш згуртованими."
  a_late_gallowglass: "Пізні галлогласи"
  a_late_gallowglass_desc: "$a_late_gallowglass$ — це воїни у важких обладунках, озброєні не тільки традиційними сокирами та дворучними мечами, а й цілком сучасними аркебузами."
  a_early_longbowmen: "Бойові лучники"
  a_early_longbowmen_desc: "Мистецтво стрільби з довгого лука, що колись погубило чимало англійських лицарів у долинах Уельсу, відтоді міцно увійшло в практику військової справи самих англійців."
  a_longbowmen: "Лучники"
  a_longbowmen_desc: "$a_longbowmen$ сильні не лише завдяки своїй зброї, а й багаторічним тренуванням на стрільбищах."
  a_late_longbowmen: "Реформовані лучники"
  a_late_longbowmen_desc: "Невеликі зміни в спорядженні та організації лучників дозволяють їм стріляти потужними залпами, здатними розтрощити майже будь-який ворожий стрій."
  a_hwacha: "Хвачха"
  a_hwacha_desc: "$a_hwacha$, що стріляє цілими залпами ракет із залізними наконечниками, має нищівну вогневу міць. Через обмежену маневреність у бою вона відіграє переважно оборонну роль."
  a_schiltron: "Шилтрон"
  a_schiltron_desc: "$a_schiltron$ — це піхотний стрій зі зімкнутими щитами та виставленими списами, здатний витримати натиск кінноти, але обмежений у своїй рухливості."
  a_hobelars: "Хобелари"
  a_hobelars_desc: "$a_hobelars$, озброєні списами, на своїх спритних ірландських конях здатні швидко рухатися по пересіченій місцевості."
  a_caterans: "Катерани"
  a_caterans_desc: "$a_caterans$ являють собою легку кавалерію, озброєну короткими списами та сокирами. Ці воїни не носять обладунків, покладаючись лише на відкриті шоломи, невеликі щити та швидкість своїх коней."
  a_noble_cavalry: "Знатька кавалерія"
  a_noble_cavalry_desc: "Можливість мчати в битву на бойовому коні довгі століття була привілеєм аристократів."
  a_mailed_knights: "Лицарі в кольчугах"
  a_mailed_knights_desc: "$a_mailed_knights$ з їхніми різнокольоровими гербами та прапорами, що майорять на вітрі, виділяються на фоні будь-яких військ. Завдяки блискучим кольчугам, гострим клинкам та постійним тренуванням протягом усього життя вони входять до числа найгрізніших воїнів."
  a_teulu: "Теулу"
  a_teulu_desc: "Кінні лицарі $a_teulu$, що об'єднали кельтські та континентальні військові традиції, легко долають навіть найпересічнішу місцевість."
  a_plated_knights: "Лицарі в латах"
  a_plated_knights_desc: "Ці аристократи б’ються верхи на бойових конях, облачившись у вишукані сталеві лати. Їхньою зброєю є булави та молоти для розбивання ворожих шоломів та кірас."
  a_cavaliers: "Шевальє"
  a_cavaliers_desc: "Можливо, золотий вік лицарства і залишився в минулому, але ці аристократи, як і раніше, вселяють повагу, залишаючись доблесною та відмінно озброєною кавалерією."
  a_late_cavaliers: "Пізні кавалери"
  a_late_cavaliers_desc: "$a_late_cavaliers$ — останні рудименти лицарської кінноти, вони одягнені в напівдоспехи та озброєні пістолями й шаблями."
  a_provincial_cavalry: "Провінційна кавалерія"
  a_provincial_cavalry_desc: "$a_provincial_cavalry$ набирається з сільського служивого дворянства. Вони є серйозною силою на полі бою."
  a_gendarmerie: "Жандарми"
  a_gendarmerie_desc: "$a_gendarmerie$ — добірна кавалерія, набрана з представників найзнатніших родин країни. Закуті в кіраси та озброєні найкращими мечами й пістолями, вони нестримні в битві."
  a_men_at_arms: "Важкоозброєні воїни"
  a_men_at_arms_desc: "$a_men_at_arms$ — це піхотинці у важких обладунках, озброєні різноманітною холодною зброєю та здатні проривати ворожий стрій."
  a_men_at_arms_levy: "$a_men_at_arms$"
  a_men_at_arms_levy_desc: "$a_men_at_arms_levy$"
  a_pontifical_swiss_guard: "Швейцарська гвардія"
  a_pontifical_swiss_guard_desc: "$a_pontifical_swiss_guard$ — це підрозділ особистої охорони Папи Римського. До неї беруть лише неодружених швейцарців католицького віросповідання. Виникнувши як загін найманців, згодом вона перетворилася на невід'ємну частину армії Святого престолу."
  a_tercio: "Терції"
  a_tercio_desc: "Терція — елітний підрозділ іспанських військ, славний своїми бойовими шикуваннями. Завдяки цим добірним воїнам іспанське військо вважається однією з перших сучасних професійних армій Західної Європи."
  a_the_black_army: "Угорська Чорна армія"
  a_the_black_army_desc: "$a_the_black_army$, на відміну від багатьох інших найманих армій Європи, була постійною та регулярною. Крім того, частка використання вогнепальної зброї в ній була надзвичайно високою для свого часу."
  a_landsknechte: "Ландскнехти"
  a_landsknechte_desc: "$a_landsknechte$ — це сучасні змішані війська, що складаються з пікінерів, сумнозвісних #italic доппельзельнерів#!, тобто найманців з подвійним жалуванням, що орудують дворучними мечами, а також аркебузирів, які надають підтримку з флангів."
  a_steppe_horse_archers: "Кінні лучники"
  a_steppe_horse_archers_desc: "Степові вершники покладаються на два основні види зброї — лук і спис. Їхні короткі, але потужні композитні луки дозволяють точно і швидко стріляти прямо зі спини коня. Таке поєднання маневреності та влучності допомагало степовикам ефективно застосовувати тактику набігів."
  a_a_urughs: "Ауруги"
  a_a_urughs_desc: "Ауруги — це воєнізовані родові загони, які монгольські армії розміщували у себе в тилу разом зі стадами овець."
  a_steppe_horde: "Кочове ополчення"
  a_steppe_horde_desc: "Монгольські діти з ранніх років вчаться верховій їзді та стрільбі з лука, а в підлітковому віці вступають у загони нальотчиків. Як правило, чоловік в орді в мирний час займається скотарством, але за наказом вождя завжди готовий взятися за зброю."
  a_tribal_cavalry: "Племінна кавалерія"
  a_tribal_cavalry_desc: "Багато племен, що населяють околиці нашої країни, присвячують своє життя розведенню коней та великої рогатої худоби. З цих варварів напевно вийдуть чудові вершники.\n\nЯкщо комусь вдасться зібрати їх разом і змусити підкорятися, він отримає в своє розпорядження неймовірно швидкий та ефективний підрозділ."
  a_handgonners: "Стрільці з рушницями"
  a_handgonners_desc: "Ці воїни оснащені новим видом порохової зброї, що лякає ворогів, яка випускає смертоносні свинцеві снаряди. При цьому стрільців потрібно захищати, оскільки знаряддя вимагають довгої перезарядки."
  a_archers: "Лучники"
  a_archers_desc: "Лучники ведуть вогонь здалеку та прикривають піхотинців, дозволяючи їм рухатися вперед під час атаки та допомагаючи відбивати ворожі натиски під час оборони."
  a_armored_horsemen: "Броньовані вершники"
  a_armored_horsemen_desc: "Ці вершники носять важчі обладунки — зазвичай кольчужні або латні, — і здатні стрімко вриватися у ворожі лави."
  a_crossbowmen: "Арбалетники"
  a_crossbowmen_desc: "Стрільці, озброєні арбалетами. Хоча їхня скорострільність бажає кращого, ці знаряддя набагато потужніші та смертоносніші за звичайні луки."
  a_cavalrymen: "Кавалеристи"
  a_cavalrymen_desc: "Часто ці вершники оснащені зброєю дальнього бою та використовуються для обстрілу ворожих загонів здалеку, але за потреби вони завжди готові вступити в ближній бій."
  a_heavy_cavalrymen: "Важкоозброєні кавалеристи"
  a_heavy_cavalrymen_desc: "Ці кавалеристи повністю вбрані в обладунки та використовують важке озброєння для ударних атак, здатних зруйнувати стрій противника."
  a_early_arquebusiers: "Ранні аркебузири"
  a_early_arquebusiers_desc: "Аркебуза — порохова зброя, що є вдосконаленою версією рушниці. Вона надійніша за свою попередницю, перезаряджається простіше та швидше, а тому ідеально підходить для озброєння великих загонів."
  a_halberdiers: "Алебардисти"
  a_halberdiers_desc: "Піхотинці з алебардами або іншою рублячою древковою зброєю, які однаково успішно б'ються як у нападі, так і в обороні."
  a_light_lancers: "Легкоозброєні списники"
  a_light_lancers_desc: "Вершники в легкій броні, озброєні списами. Завдяки своїй рухливості вони здебільшого застосовуються для раптових ударів у фланги ворога з подальшим відходом. Така тактика дозволяє завдавати піхоті великої шкоди, виснажуючи її постійними атаками."
  a_pikemen: "Пікінери"
  a_pikemen_desc: "Утримуючи зімкнутий стрій, пікінери можуть легко відбивати атаки ворожої кавалерії, зводячи до мінімуму її роль на полі бою."
  a_pistoleers: "Стрільці з пістолетами"
  a_pistoleers_desc: "Легка кавалерія, озброєна пістолетами. Ця вогнепальна зброя зручніша за луки та арбалети, а завдяки важкій посиленій рукояті її можна використовувати в ближньому бою."
  a_heavy_lancers: "Важкоозброєні списники"
  a_heavy_lancers_desc: "Важка ударна кавалерія, облачена в повні обладунки та озброєна списами. Ці вершники добре захищені від далекобійних атак і можуть завдавати ворожій піхоті нищівних ударів, буквально зминаючи солдатів і розкидаючи їх у сторони."
  a_hunters: "Мисливці"
  a_hunters_desc: "Ці воїни обстрілюють ворожі війська з великої відстані, щоб внести сум'яття в їхні лави та придушити їхніх стрільців."
  a_gallop_cavalry: "Стрімка кавалерія"
  a_gallop_cavalry_desc: "Ударні загони вершників у легкій броні, озброєних довгими кавалерійськими шаблями. Таке оснащення забезпечує хороший баланс між рухливістю та бойовою міццю воїнів."
  a_sharpshooters: "Влучні стрільці"
  a_sharpshooters_desc: "Загони стрільців з далекобійними рушницями, що дозволяють ефективніше нав'язувати противнику бій і розладнувати його бойові порядки під час маневрів."
  a_fusiliers: "Фузилери"
  a_fusiliers_desc: "Ці воїни складають основу нашої армії. Вони озброєні сучасними рушницями зі штиками, що дозволяють не тільки обстрілювати ворога здалеку, а й кидатися на нього в ближньому бою."
  a_light_dragoons: "Легкоозброєні драгуни"
  a_light_dragoons_desc: "Вершники, навчені бою верхи та в пішому строю. Оснащені рушницями та шаблями, вони можуть не тільки вести вогонь здалеку, а й швидко зближуватися з ворогом, спішуватися та вступати з ним у ближній бій."
  a_crusader_knights: "Хрестоносці"
  a_crusader_knights_desc: "$a_crusader_knights$ — це ченці-воїни, які присвятили своє життя поширенню християнства. Вони складають елітний авангард духовно-лицарських орденів."
  a_crusader_knights_base: "$a_crusader_knights$"
  a_crusader_knights_base_desc: "$a_crusader_knights_desc$"
  a_crusader_knights_levy: "$a_crusader_knights$"
  a_crusader_knights_levy_desc: "$a_crusader_knights_desc$"
  a_late_crusader_knights: "Реформовані хрестоносці"
  a_late_crusader_knights_desc: "$a_crusader_knights$ змінюють зброю та тактику, пристосовуючись до нових реалій війни. При цьому вони залишаються елітою своїх духовно-лицарських орденів."
  a_late_crusader_knights_base: "$a_late_crusader_knights$"
  a_late_crusader_knights_base_desc: "$a_late_crusader_knights_desc$"
  a_late_crusader_knights_levy: "$a_late_crusader_knights$"
  a_late_crusader_knights_levy_desc: "$a_late_crusader_knights_desc$"
  a_horsemen: "Вершники"
  a_horsemen_desc: "$a_horsemen$ у легкій броні на швидких конях можуть відволікати та виснажувати ворога, здійснювати набіги та переслідувати відступаючих."
  a_champions: "Герої"
  a_champions_desc: "$a_champions$ — це елітні бійці племен, які прославилися своєю хоробрістю та військовим мистецтвом."
  a_tribesmen: "Племінне ополчення"
  a_tribesmen_desc: "$a_tribesmen$ — це прості селяни, які озброїлися сільськогосподарськими знаряддями для захисту своїх сімей та домівок."
  a_chieftains: "Вожді"
  a_chieftains_desc: "$a_chieftains$ з їхніми розкішними обладунками та багато прикрашеною зброєю благородно вирушають на битву в перших рядах, надихаючи воїнів особистим прикладом."
  a_moa_hunters: "Мисливці на моа"
  a_moa_hunters_desc: "Усе життя переслідуючи гігантських птахів моа в суворих джунглях, ці мисливці навчилися бути чудовими застрільниками."
  a_jaguar_warrior: "Воїни-ягуари"
  a_jaguar_warrior_desc: "Воїни-ягуари складають еліту ацтекської піхоти. Вони б’ються макуауітлями — дерев’яними палицями з обсидіановими лезами. Щоб бути прийнятим до лав ягуарів, воїн повинен полонити в бою не менше чотирьох осіб."
  a_eagle_warrior: "Воїни-орли"
  a_eagle_warrior_desc: "Воїни-орли складають еліту ацтекської піхоти. Вони б’ються різною зброєю, зокрема дротиками-атлатлями, списами та кинджалами. До їхніх лав вступають найхоробріші бійці, які захопили найбільше полонених. Походження ролі не відіграє: воїнами-орлами можуть стати як простолюд, так і знать."
  a_warriors_desc: "Словом «$a_warriors$» називають будь-яких бійців племен, що б’ються під командуванням своїх вождів. Їхня проста, але ефективна зброя різниться залежно від племені."
  a_feudal_levy_desc: "$a_feudal_levy$ складають селяни, призвані на службу своїм феодалом і які пройшли певну військову підготовку. З плином часу на зміну таким загонам прийшли регулярні професійні армії."
  a_camp_followers: "Маркітанти"
  a_camp_followers_desc: "$a_camp_followers$, до числа яких входять різномасті купці та родичі солдатів, супроводжують армію на марші та надають їй різні неформальні послуги."
  a_houfnice_desc: "Вважається, що сучасні гаубиці успадкували свою назву від так званої хуфниці — гуситської артилерійської гармати XV століття. Ці короткоствольні гармати встановлюються на вози та підтримують дії піхоти, стріляючи запальними ядрами та картеччю."
  a_serbian_hussars: "Сербські гусари"
  a_serbian_hussars_desc: "Цей вид легкої кавалерії походить від традиційної кінноти сербів. Легка броня та швидкі коні дають гусарам перевагу в маневреності перед будь-якими іншими військами, дозволяючи розробляти та застосовувати абсолютно нові стратегії."
  a_peasant_levy: "Селянське ополчення"
  a_peasant_levy_desc: "$a_peasant_levy$ формується з простолюду, призваного на службу своїм лордом. Оскільки зброю та спорядження вони купують собі самі, якість екіпірування таких загонів може сильно відрізнятися."
  a_supply_carts: "Фуражири"
  a_supply_carts_desc: "$a_supply_carts$ забезпечують виживання армії на чужій території, добуваючи їжу для солдатів та корм для тварин. Вони збільшують відстань, яку може подолати військо, перш ніж йому доведеться зупинятися та добувати собі прожиток грабунком."
  a_arquebusiers_desc: "$a_arquebusiers$ з вогнепальною зброєю, що рухаються строєм і прикриті фалангою пікінерів у доспехах, являють собою вельми грізну силу на полі бою."
  a_caracole_desc: "Наприкінці XVI — на початку XVII століття найпоширенішим бойовим порядком західноєвропейської кавалерії був караколь. Він міг застосовуватися двома способами. У першому з них перша шеренга вершників атакувала противника в лоб, даючи залп з відстані 30–50 кроків. Потім ці вершники розвертали коней і поверталися в тил, а наступна шеренга ставала першою і повторювала маневр. Таким чином передня частина кавалерії завжди атакувала, поки решта вершників заряджали зброю та чекали своєї черги. Другий спосіб полягав у тому, що весь загін ставав в одну колону і починав рухатися паралельно ворожому строю. Вистріливши по противнику, що знаходиться праворуч, кожен вершник звертав ліворуч і продовжував рух по колу, перезаряджаючи зброю, щоб потім знову повернутися на позицію для стрільби. Таким чином досягалася безперервність вогню."
  a_falconet_desc: "$a_falconet$ — це легке артилерійське знаряддя, створене в XV столітті як подальший розвиток важчого та неповороткого фалькона."
  a_matchlock_levy: "Ополчення з аркебузами"
  a_matchlock_levy_desc: "З винаходом ґнотової аркебузи вогнепальна зброя стала по-справжньому масовою. Нею стали озброювати простих солдатів у масштабах, недосяжних для Середньовіччя."
  a_supply_convoy: "Колона постачання"
  a_supply_convoy_desc: "Епоха #TOOLTIP:AGE,age_3_discovery,X #L Відкриттів#!#! була ознаменована переходом від феодального ополчення до регулярних армій. Це дозволило вести більш тривалі військові кампанії, що вимагали спеціально організованих колон постачання."
  a_musketeers_desc: "Мушкетери складають елітну гвардію королівського двору. На цю престижну службу приймають тільки знать, у яких за плечима багаторічний військовий досвід."
  a_hussars_desc: "Спочатку гусари були легкою розвідувальною кавалерією, поширеною в країнах Центральної Європи, але зі занепадом старої феодальної армії вони поступово стали професійними військовими підрозділами."
  a_chambered_cannon_desc: "XVI століття примітне для артилерії не тільки підвищенням її маневреності, а й спробами стандартизувати розміри та калібри знарядь."
  a_flintlock_levy: "Ополчення з мушкетами"
  a_flintlock_levy_desc: "Крем’яні мушкети, що прийшли на зміну ґнотовим аркебузам як основна зброя піхоти, забезпечують більшу щільність і точність вогню, а також простіші у використанні та обслуговуванні."
  a_baggage_train: "Обоз"
  a_baggage_train_desc: "Епоха [ShowAgeName('age_4_reformation')] була ознаменована подальшим поширенням і розвитком регулярних армій. $a_baggage_train$ тепер супроводжував армію на марші для постачання солдатів усім необхідним."
  a_line_infantry_desc: "Пристосувавши до дула мушкета багнет, мушкетери можуть виконувати роль пікінерів. Це дозволяє відмовитися від пік і посилити бойову міць піхотних підрозділів."
  a_dragoons_desc: "Драгуни є різновидом піхоти, яка використовує коней для переміщення, але б’ється в пішому строю. Втім, у пізніші часи їх усе частіше використовували як більш звичну кавалерію."
  a_royal_mortar_desc: "Починаючи з другої половини XVII століття використання артилерії на полях битв стало повсюдним. Армії отримали польові гармати, які можна було легко та швидко переміщати на нові позиції."
  a_wagon_train: "Фурштатський обоз"
  a_wagon_train_desc: "Епоха [ShowAgeName('age_5_absolutism')] була ознаменована зростанням чисельності військ, що призвело до ускладнення логістики та необхідності створення спеціальних тилових підрозділів для підтримання боєздатності кожної армії. $a_wagon_train$ став таким підрозділом."
  a_wagenburg: "Вагенбург"
  a_wagenburg_desc: "$wagenburg_desc$"
  EFFECTIVE_ARMORY_BUILDINGS: "Ефективні споруди типу #TOOLTIP:BUILDING_TYPE,armory,X #L «Арсенал»#!#!"
  a_genoese_crossbowmen: "Генуезькі арбалетники"
  a_genoese_crossbowmen_desc: "$a_genoese_crossbowmen$ — це легендарний підрозділ, відомий ще з часів Першого хрестового походу. Екіпіровані арбалетами та ростовими щитами, ці піхотинці захищають свої рідні міста, а також служать найманцями по всій Європі."
  a_footmen_desc: "Піхота — це основа будь-якої армії. Саме піхотинці, готові стійко тримати фронт і захищати дім від іноземних загарбників, становлять більшість наших військ."
  a_footmen_levy_desc: "$a_footmen_desc$"
  a_lancers_desc: "Ця штурмова кавалерія, озброєна піками, призначена для прориву бойових порядків противника та нанесення нищівних ударів."
  a_hungarian_hussars: "Угорські гусари"
  a_hungarian_hussars_desc: "Так звані полки королівських гусарів, створені за мотивами легендарної кінноти Матяша I Корвіна, суттєво посилили угорську легку кавалерію. Ці підрозділи, відомі своїм стрімким і безстрашним натиском, прославилися по всій Європі та стали символом військової доблесті угорців."
  a_winged_hussars: "Крилаті гусари"
  a_winged_hussars_desc: "$winged_hussar_desc$"
  a_redcoats: "Червоні мундири"
  a_redcoats_desc: "Англійську стройову піхоту прозвали «червоними мундирами» після того, як форму такого кольору стали носити спочатку солдати, що билися в Ірландії, а потім й інші підрозділи оновленої армії."
  a_experimental_riflemen: "Елітні стрільці"
  a_experimental_riflemen_desc: "$a_experimental_riflemen$ — це відібрані воїни, озброєні далекобійними гвинтівками Бейкера. Діючи невеликими групами, вони прикривають вогнем основні війська та втілюють у собі сучасні уявлення про піхотну тактику."
  a_militiamen: "Ополченці"
  a_militiamen_desc: "Поширення мушкетів у XVII столітті дозволило використовувати місцеве міське ополчення як резерви та підтримку для основних армій."
  a_infantry_column: "Піхотна колона"
  a_infantry_column_desc: "Збільшення вогневої потужності лінійної піхоти дозволило розробити нову тактику, засновану на швидкому перешикуванні з шеренги в колону з подальшою багнетною атакою проти ворожих піхотинців."
  a_cuirassiers_desc: "У повній відповідності духу часу важка кавалерія кірасирів відмовилася від пік як основної зброї на користь пістолетів та шабель."
  a_flying_battery_desc: "Артилерія завдає величезної шкоди на полі бою, але абсолютно марна, якщо ворог не перебуває в зоні ураження. Летюча батарея здатна переміщатися туди, де вона найпотрібніша, і швидко відходити, доки ворог не встиг відповісти."
  a_order_knights: "Орденські лицарі"
  a_order_knights_desc: "$a_order_knights$ — це найкращі солдати, яких тільки може запропонувати орден. Вони зобов'язані бути вправними воїнами та служити інтересам свого ордену на полі битви."
  a_order_knights_2: "Баннерети ордену"
  a_order_knights_2_desc: "$a_order_knights_2$ — це найдосвідченіші та найвправніші лицарі, які часто ведуть у бій невеликі загони під власним прапором."
  a_conscripts: "Рекрути"
  a_conscripts_desc: "Це солдати з примусу, вимушено відправлені на війну. Рекрути можуть перемогти навчену армію тільки за рахунок переважаючої чисельності."
  a_logistics_corps: "Тиловий корпус"
  a_logistics_corps_desc: "Епоха [ShowAgeName('age_6_revolutions')] дозволяє підтримувати великі армії завдяки тиловому корпусу — чітко працюючому механізму з обозів та ефективної бюрократії, що є вершиною військової організації."
  a_lour_lances: "Валлійські списники"
  a_lour_lances_desc: "Валлійські списники славляться своїм умінням поводитися з важкими списами. Якщо ж справа доходить до ближнього бою, ці легкі піхотинці беруться за довгі ножі, що дозволяють впоратися навіть із більш захищеним противником."
  a_renaissance_conquistadors: "Ранні конкістадори"
  a_renaissance_conquistadors_desc: "Укладаючи «капітуляції про завоювання», представники нижчої знаті та простолюду кинулися підкорювати далекі землі в ім'я своїх королів."
  a_discovery_conquistadors: "Конкістадори"
  a_discovery_conquistadors_desc: "З плином часу конкістадори стали краще розуміти свої бойові можливості. Тепер ці честолюбні люди здатні розтрощувати цілі імперії."
  a_almogavars: "Альмогавари"
  a_almogavars_desc: "Альмогавари — це легка піхота, що походить із земель Арагонської корони. Ці стрімкі воїни захищають кордон і виступають у ролі рядових солдатів. Крім участі в Реконкісті, вони також відзначилися як найманці в Італії, Франкократії та Леванті."
  a_late_almogavars: "Реформовані альмогавари"
  a_late_almogavars_desc: "Завдяки прийняттю нововведень альмогавари зуміли адаптуватися та підвищити свою ефективність на полі бою. Пристосувавши новітню зброю та стратегічні досягнення під свою традиційну тактику, ці вправні воїни стали ще смертоноснішими. Цим поєднанням давньої майстерності та сучасних засобів ведення бою вони подають приклад бездоганного злиття традицій та інновацій у військовій справі."
  a_cacadores: "Касадори"
  a_cacadores_desc: "$a_cacadores$, що в перекладі з португальської означає «мисливці», є аналогом німецьких #italic єгерів#! та французьких #italic шасерів#!. Ці елітні піхотні підрозділи виконують свій обов'язок, охороняючи землі Португалії."
  a_catalan_crossbowmen: "Каталонські арбалетники"
  a_catalan_crossbowmen_desc: "$a_catalan_crossbowmen$ вважаються одними з найбільш безжальних і смертоносних арбалетників західного Середземномор'я, сперечаючись за першість із генуезькими."
  a_lanzas_de_castilla: "Кастильські списники"
  a_lanzas_de_castilla_desc: "Натхненні хінетами — мавританською кавалерією — кастильські списники є рухливою кіннотою, яка атакує стрій ворога подібно до важкої кінноти, при цьому не носячи відповідних обладунків."
  janissary: "Яничари"
  a_renaissance_janissaries: "Гвардія яничарів"
  a_renaissance_janissaries_desc: "Елітний корпус яничарів відданий особисто султану. Їхні лави поповнюються за системою девширме, згідно з якою воїни відбираються з дитинства та проходять сувору військову підготовку. Завдяки цьому яничари — найбільш дисципліновані війська в імперії."
  a_discovery_janissaries: "Яничари з аркебузами"
  a_discovery_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_reformation_janissaries: "Яничари з мушкетами"
  a_reformation_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_absolutism_janissaries: "Лінійна піхота яничарів"
  a_absolutism_janissaries_desc: "$a_renaissance_janissaries_desc$"
  a_revolutions_janissaries: "Колони яничарів"
  a_revolutions_janissaries_desc: "$a_renaissance_janissaries_desc$"
  EFFECTIVE_JANISSARY_BUILDINGS: "Ефективні споруди яничарів"
  qizilbash: "Кизилбаші"
  qizilbash_estate_name: "[ROOT.GetCountry.GetGovernment.GetEstateName('tribes_estate')]"
  a_discovery_qizilbash: "Застрільник кизилбашів"
  a_discovery_qizilbash_desc: "$qizilbash$ — члени войовничого шиїтського ордену, створеного з коаліції різних племен тюркомовного походження. Віра відіграє важливу роль у їхній службі, тому вони не тільки люті воїни, а й побожні члени ордену Сефевідів."
  a_reformation_qizilbash: "Кавалерія кизилбашів"
  a_reformation_qizilbash_desc: "$a_discovery_qizilbash_desc$"
  EFFECTIVE_QIZILBASH_BUILDINGS: "Ефективні споруди кизилбашів"
  a_ghilman: "Гулями"
  a_ghilman_desc: "$a_ghilman$ — це елітний піхотний корпус, який замість традиційної зброї взяв на озброєння вогнепальну. Це солдати-раби, що присягнули на вічну вірність шаху."
  EFFECTIVE_GHILMAN_BUILDINGS: "Ефективні споруди гулямів"
  a_tofangchi: "Тофангчі"
  a_tofangchi_desc: "$a_tofangchi$ — це мушкетери імперії. Вогнепальна зброя до цього вже застосовувалася, але вкрай нерегулярно, оскільки багато перських військових віддають перевагу традиційній зброї — луку та стрілам. $a_tofangchi$ прагнуть змінити такий стан справ, оскільки навчаються володінню сучасною зброєю."
  a_tupchi: "Топчі"
  a_tupchi_desc: "$a_tupchi$, або #italic артилеристи#!, є особливим військовим підрозділом, який спеціалізується на використанні гармат та облогових знарядь. $a_tupchi$, як і тофангчі, символізують перехід Перської імперії до ведення сучасної війни."
  a_jazayerchi: "Джазаєрчі"
  a_jazayerchi_desc: "$a_jazayerchi$ — це елітні мушкетери імперії. Вони озброєні важкими кремінними мушкетами з чудовою вогневою міццю та точністю, а також піддаються постійній муштрі, завдяки чому часто здатні здобути гору навіть у нерівному бою."
  a_hakkapelitta: "Гаккапеліти"
  a_hakkapelitta_desc: "Фінська кавалерія гаккапелітів славилася своєю ефективністю на полі бою. Її назва походить від бойового кличу hakkaa päälle (фін. «Рубай їх!»), перетвореного солдатами Священної Римської імперії на прізвисько цих воїнів. Вороги боялися гаккапелітів через їхні раптові та безпощадні атаки, що змушували противника кинути зброю."
  caroleans_advance: "$a_caroleans$"
  caroleans_advance_desc: "$a_caroleans_desc$"
  a_caroleans: "Каролінери"
  a_caroleans_desc: "Каролінери — це шведська та фінська піхота Шведської імперії. Набирані з селян каролінери проходять сувору підготовку та славляться тим, що вселяють страх у серця ворогів."
  a_florentine_citizen_militia: "Флорентійське громадянське ополчення"
  a_florentine_citizen_militia_desc: "Мінлива військово-дипломатична обстановка в італійському [Concept('region', 'регіоні')|e] не дозволяє нам довіряти питання суверенітету найманим кондотьєрам. Замість цього Флоренції потрібне боєздатне ополчення з числа власних громадян, яке не поступається військам можливих завойовників і здатне швидко стати на захист рідного міста."
  a_iron_helmet_musketeers: "Мушкетери в залізних шоломах"
  a_iron_helmet_musketeers_desc: "Ці досвідчені солдати в залізних шоломах, озброєні мушкетами, стали новою силою, що панує на полях битв. Вони складають основу піхоти багатьох армій Африки, служачи під знаменами наймогутніших правителів. Заряджаючи свою зброю чорним порохом і свинцевими кулями, мушкетери обстрілюють противників на відстані. Їхні громові залпи здатні зупинити будь-який натиск, а якщо справа доходить до ближнього бою, залізні шоломи допомагають їм вистояти. Мушкетери відіграли ключову роль у розвитку військової справи, підвищивши значущість вогнепальної зброї на полі бою."
  a_jonow_auxiliary: "Джоноу"
  a_jonow_auxiliary_desc: "Джоноу — це особливі раби, що переносять військове спорядження командирів келе-коун та їхніх солдатів."
  a_sofa_infantry: "Піхотинці софа"
  a_sofa_infantry_desc: "Піхоту софа складають раби, навчені військовому мистецтву та ті, що служать країні як солдати. Отримавши зброю з рук хоронів, вільних жителів Малі, вони ризикують своїм життям на полі бою."
  a_mandekalu_infantry: "Піхотинці мандекалу"
  a_mandekalu_infantry_desc: "$a_mandekalu_infantry$ складають основу малійської армії. В її лавах служать хорони — вільні жителі Малі. Вони озброєні дротиками та луками з отруєними стрілами і являють собою грізну силу.\n\n$mandekalu_exp_gain_desc$"
  a_mandekalu_cavalry: "Вершники мандекалу"
  a_mandekalu_cavalry_desc: "$a_mandekalu_cavalry$ виконують у малійській армії функцію підтримки. Це хорони — вільні жителі Малі — що отримали коней та спорядження від манси та феодалів тон-тігі. Озброєні списами та довгими мечами, ці вершники несуть владу манси в найдальші куточки імперії.\n\n$mandekalu_exp_gain_desc$"
  a_farari_infantry: "Піхотинці фарарі"
  a_farari_infantry_desc: "Загони фарарі, в чиїх лавах служать як еліти, так і звичайний народ, складають еліту малійської армії. Ці досвідчені воїни славляться своєю хоробрістю."
  a_farari_cavalry: "Вершники фарарі"
  a_farari_cavalry_desc: "$a_farari_infantry_desc$"
  a_cawa: "Загони чева"
  a_cawa_desc: "До арсеналу ефіопського воїна чева входить кривий меч #italic шотель#!, універсальний спис #italic тор#!, а також різна стрілецька та метальна зброя, відома під збірною назвою #italic арма#!. Для надійного захисту від ворожих мечів та стріл багато з цих воїнів носять кольчуги або інші види обладунків."
  a_renaissance_cawa: "Полки чева"
  a_renaissance_cawa_desc: "Завдяки покращеній організації чева отримали кращу підготовку та стали могутньою силою на службі Ефіопії."
  a_discovery_cawa: "Аркебузири чева"
  a_discovery_cawa_desc: "З появою пороху традиційні луки та списи застаріли, проте чева отримали нову перевагу."
  a_reformation_cawa: "Мушкетери чева"
  a_reformation_cawa_desc: "Дисципліна полків чева зміцнилася ще більше, що призвело до кращої координації та дозволило обрушувати на ворога смертоносні залпи."
  a_absolutism_cawa: "Лінійна піхота чева"
  a_absolutism_cawa_desc: "Чева взяли на озброєння лінійну побудову, марш колоною та стрільбу по черзі. Поки перша лінія перезаряджає зброю, друга виходить на позицію для стрільби, потім її змінює наступна і так далі."
  a_revolutions_cawa: "Колони чева"
  a_revolutions_cawa_desc: "Найсучасніша версія чева. Ці бійці досягли висот у рамках дисципліни та ефективності, ставши справжнім кошмаром для своїх ворогів."
  a_light_jurchen_cavalry: "Легка чжурчженська кавалерія"
  a_light_jurchen_cavalry_desc: "Ця легка кавалерія може переслідувати та добивати ворогів, що тікають, чудово доповнюючи нашу важкоозброєну кінноту."
  a_iron_pagoda_cavalry: "Залізні пагоди"
  a_iron_pagoda_cavalry_desc: "Ця грізна важка кавалерія здатна проривати стрій противника, змітаючи його лави та завдаючи нищівного удару його бойовому духу."
  paik_desc: "Пайки — це індійська піхота, здатна як наступати, так і оборонятися, відома своєю майстерністю стрільби з лука."
  a_early_paik: "Ранні пайки"
  a_early_paik_desc: "$paik_desc$ У системі пайків кожен чоловік підлягав обов'язковому призову на військову службу, це дозволяло швидко зібрати численну, хоч і не цілком професійну армію."
  a_paik: "Пайки"
  a_paik_desc: "$paik_desc$"
  a_late_paik: "Пізні пайки"
  a_late_paik_desc: "$a_late_paik_infantry_desc$"
  a_early_paik_infantry: "Ранні пайки-піхотинці"
  a_early_paik_infantry_desc: "$paik_desc$"
  a_paik_infantry: "Пайки-піхотинці"
  a_paik_infantry_desc: "$paik_desc$"
  a_late_paik_infantry: "Пізні пайки-піхотинці"
  a_late_paik_infantry_desc: "$paik_desc$ З часом ці воїни змінили луки на більш сучасні мушкети, але їхня універсальність залишилася незмінною."
  a_gurkha: "Гуркхи"
  a_gurkha_desc: "Гуркхи — це воїни непальського походження, відомі своєю відвагою та дисципліною в бою."
  a_indian_elephant_auxiliary: "Допоміжні слони"
  a_indian_elephant_auxiliary_desc: "Могутні слони ідеально підходять для перевезення припасів, необхідних нашим арміям. Поступаючись коням та іншим в'ючним тваринам у швидкості, вони значно перевершують їх у силі та здатні доставляти вглиб території ворога значні запаси продовольства та спорядження."
  a_indian_elephant_cavalry: "Бойові слони"
  a_indian_elephant_cavalry_desc: "Слон — це величезна тварина з великими бивнями та товстою шкірою. Значною перевагою індійських слонів є здатність долати будь-які джунглі."
  a_orissan_elephant_cavalry: "Орісські бойові слони"
  a_orissan_elephant_cavalry_desc: "$a_indian_elephant_cavalry_desc$ Оріські слони відомі особливою стійкістю до болю та поранень у порівнянні з іншими породами бойових слонів, що відрізняються слухняністю та міцною бронею."
  a_bengali_elephant_cavalry: "Бенгальські бойові слони"
  a_bengali_elephant_cavalry_desc: "$a_indian_elephant_cavalry_desc$ Бенгальські бойові слони примітні своєю універсальністю — їх також можна використовувати для транспортування значної кількості припасів."
  a_thai_elephant_cavalry: "$thai_culture$і бойові слони"
  a_thai_elephant_cavalry_desc: "$thai_war_elephants_desc$"
  a_siamese_advanced_elephant_cavalry: "$SIA_ADJ$і бойові слони"
  a_siamese_advanced_elephant_cavalry_desc: "Навіть коли інші країни вже відмовилися від слонів на полі бою, ця країна продовжує їх використовувати, адаптуючи до нових умов сучасної війни."
  a_khmer_ballista_elephant_infantry: "$KHM_ADJ$і слони з балістами"
  a_khmer_ballista_elephant_infantry_desc: "$a_khmer_ballista_elephant_infantry$ — грізна сила на полі бою. Своєю ефективністю вони завдячують двострунному арбалету, встановленому зверху."
  a_sowar_cavalry: "Кавалерія соварів"
  a_sowar_cavalry_desc: "$a_sowar_cavalry$ — це важка кіннота Великих Моголів, відома своєю залізною дисципліною та нищівним натиском, що позбавляє ворогів будь-якої надії на перемогу."
  n_baghlah: "Багала"
  n_baghlah_desc: "Багала — це велике вітрильне морське судно, яке можна використовувати для перевезення товарів. Цей корабель створили на Аравійському півострові, але використовують у найрізноманітніших місцях, включно з Островами прянощів."
  a_mauricians: "Полки Моріца Оранського"
  a_mauricians_desc: "$a_mauricians$ — це вкрай маневрена піхота, що застосовує тактику стрільби шеренгами: поки один ряд бійців веде вогонь, інший перезаряджає зброю. Ця тактика дозволяє досягти значної вогневої переваги над противником."
  a_black_guard: "Чорна гвардія"
  a_black_guard_desc: "$a_black_guard$ — елітний підрозділ з колишніх рабів. З дитинства виховані в релігійному середовищі, вони досягають успіху в стрільбі з лука та мушкета, верховій їзді та муруванні. Ці війська становлять кістяк нашої армії в той час, коли наш народ найбільше потребує захисту."
  a_clan_retainers: "Васали клану"
  a_clan_retainers_desc: "Найважливіша частина будь-якого кланового війська — його васали, тобто воїни, пов'язані узами вірності та спорідненості."
  a_clan_retainer_cavalry: "Васальні вершники клану"
  a_clan_retainer_cavalry_desc: "$a_clan_retainers_desc$"
