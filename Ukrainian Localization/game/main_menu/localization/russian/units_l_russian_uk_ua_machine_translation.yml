  n_iberian_galleon: "Іберійський галеон"
  n_barque_desc: "Барк — це невеликий вітрильник, спочатку призначений для торгівлі. Як військовий корабель він є легкою та швидкою альтернативою більшим караккам."
  n_brig_desc: "Бриг — це невеликий корабель, придатний як для торгівлі, так і для війни. Його характерною особливістю є дві щогли з прямим вітрильним оснащенням. У військовому варіанті він несе на борту від 10 до 18 гармат, але його цінують не за вогневу міць, а за швидкість і маневреність. До того ж завдяки прямим вітрилам бриг ідеально підходить для довгих переходів в умовах пасатних вітрів."
  n_caravel_desc: "Каравела — це невелике і дуже маневрене судно, яке здатне з високою точністю тримати курс під час довгих експедицій. Вони можуть відрізнятися за конструкцією, але в їхнє вітрильне оснащення завжди входить фок, прямий грот і латинська бізань. Через невеликі розміри каравела несе обмежену кількість гармат, але ця ж особливість дозволяє їй заходити на прибережне мілководдя та в гирла річок. Наприкінці XV — на початку XVI століття каравели брали участь в експедиціях Васко да Гами, Кабота, Колумба та Магеллана."
  n_carrack_desc: "Каракка — це корабель пізнього Середньовіччя, що об'єднав у собі риси германських драккарів та арабських торгових суден. Поступаючись каравелі в маневреності, каракка перевершує її в розмірах, що дозволяє брати на борт більше провіанту для довгих переходів, товарів для торгівлі та гармат для оборони. Так, англійська каракка «Генрі Грейс е’Дью» з високими надбудовами на носі та кормі була визнана одним з найбільших бойових кораблів свого часу і мала водотоннажність понад 1000 тонн."
  n_fishing_boat_desc: "Невеликі човни, на яких працюють рибалки. Можуть слугувати примітивним транспортом для перевезення військ. Застосовуючи їх для цієї мети, важливо стежити, щоб вони не потрапляли під гарматні постріли."
  n_hulk_desc: "Хольк — це тип європейських кораблів, від якого походять каракки та каравели. Він з'явився на території історичних Нідерландів і використовувався насамперед для перевезення вантажів річками, але іноді й у військових цілях. Хольк, обладнаний однією щоглою з прямим вітрилом, а також надбудовами на носі та кормі, міг змагатися з коггом у вантажопідйомності, а також був основним торговим судном Ганзейського союзу."
  n_cog_desc: "Когг був одним з найбільш масових типів невеликих суден у середньовічній Європі. Він є розвитком торгової лодії вікінгів і обладнаний однією щоглою з прямим вітрилом, а також обшитий дошками внаклад. Завдяки своїй конструкції він підходить для вод Північної Атлантики набагато краще за середземноморські кораблі, а просте оснащення дозволяє обходитися меншим екіпажем. Когги широко використовувалися Ганзейським союзом, доки їм на зміну не прийшли хольки."
  n_early_carrack_desc: "Рання каракка стала першим європейським кораблем, придатним для навігації у відкритих водах Атлантики. Конструкція цього пізньосередньовічного судна об'єднала в собі риси германських драккарів та арабських торгових суден. Поступаючись каравелі в маневреності, каракка перевершує її в розмірах, що дозволяє брати на борт більше провіанту для довгих переходів, товарів для торгівлі та гармат для оборони."
  n_pinnace_desc: "З розвитком морської торгівлі виникла потреба у швидкому кораблі для охорони торгових суден. $n_pinnace$ створений саме для цієї мети: цей невеликий маневрений корабель з однією гарматною палубою здатен дати відсіч піратам у небезпечних водах."
  n_eastindiaman_desc: "«Ост-індійцями» називають усі судна ост-індських торгових компаній будь-яких країн. Вони будуються насамперед з розрахунком на максимальну вантажопідйомність і здатні перевозити як товари, так і пасажирів. «Ост-індійці» обладнані гарматами для захисту від піратів, тому можуть вступити в бій, але їхнім основним призначенням завжди була торгівля."
  n_flute_desc: "Цей тип торгових суден з'явився у XVI столітті в Нідерландах і створений з розрахунком на максимальну місткість вантажного трюму та ефективність команди. У XVI–XVII століттях він став одним з найпоширеніших типів кораблів у Європі. Зазвичай вони не мали озброєння, але за потреби їх оснащували гарматами та використовували як допоміжні судна в бою."
  n_frigate_desc: "Фрегати поступово розвивалися в бік збільшення габаритів та посилення бойової потужності, іноді їх обладнували двома гарматними палубами. Оптимальне поєднання швидкості та вогневої потужності дозволяє їм обігнати будь-який корабель з більш потужним озброєнням та придушити вогнем будь-якого супротивника, що має перевагу у швидкості. Флот, побудований Англією у 50-ті роки XVII століття, складався майже виключно з фрегатів."
  n_galleass_desc: "Галеас — це спроба пристосувати торгову галеру для протидії вітрильним кораблям, що набирають популярність. Він перевершував галеру в розмірах і був обладнаний 32 парами весел, кожне з яких приводилося в рух п'ятьма гребцями. Відповіддю на високі борти та потужне озброєння вітрильників стали високі надбудови та гарматні палуби над сидіннями гребців. Через велику вагу галеаси поступалися галерам у маневреності та все більше покладалися на вітрила. Як і самі галери, галеаси застаріли з появою досконаліших океанських вітрильників, але продовжували ходити в прибережних водах аж до XVIII століття."
  n_galleon_desc: "Ці великі вітрильні кораблі спочатку створені для військових цілей, але пізніше стали використовуватися переважно для торгівлі. Як правило, вони були трищогловими."
  n_heavy_frigate_desc: "Важкий фрегат вперше з'явився в Британії у XVIII столітті і являв собою збільшений варіант звичайного фрегата з потужнішим озброєнням. Більша кількість і калібр гармат суттєво підвищували бойову цінність кожного такого корабля. У період Великої французької революції та Наполеонівських війн звичайні фрегати були повністю замінені важкими."
  n_mediterrannean_galley_desc: "Галера з'явилася ще в античну епоху і залишалася основою військових флотів Середземномор'я аж до XVI століття. Вона була переважно гребним судном і найчастіше керувалася 25 парами весел, кожне з яких приводили в рух по три гребці. Завдяки цьому галери менше залежали від вітру, ніж вітрильники, і мали набагато кращу маневреність. Згодом їх витіснили досконаліші океанські вітрильники, проте в прибережних водах вони продовжували використовуватися аж до XVIII століття."
  n_merchantman_desc: "Торгові судна призначені в першу чергу для перевезення вантажів або пасажирів. Як правило, вони обладнувалися гарматами для захисту від піратів та каперів, а для довгих переходів на них могло встановлюватися досить важке озброєння."
  n_threedecker_desc: "Трипалубники — це бойові кораблі з трьома повноцінними батарейними палубами. На них могли стояти й інші гармати, наприклад на баку та квартердеку, але саме гармати трьох головних палуб використовувалися для бортового залпу. Трипалубники вважалися лінійними кораблями — тобто призначалися для участі в бойовому строю."
  n_twodecker_desc: "Двопалубники — це бойові кораблі з двома повноцінними батарейними палубами. На них могли стояти й інші гармати, наприклад на баку та квартердеку, але саме гармати двох головних палуб використовувалися для бортового залпу."
  n_war_galley_desc: "Як видно з назви, бойові галери призначені для військових дій. Це довгі кораблі з неглибокою осадкою та весловим ходом, хоча зазвичай на них було й вітрильне спорядження. Вони відомі ще з Античності та повсюдно зустрічалися на морях та океанах у Середньовіччі. Їх використовували переважно для абордажу, а не для далеких перестрілок, тому вся метальна та вогнепальна зброя зосереджувалася в носовій частині, а захист вразливих бортів та корми здійснювався за рахунок високої маневреності галер."
  n_xebec_desc: "Ці невеликі кораблі з двома або трьома щоглами набули поширення в Середземномор'ї починаючи з XVI століття."
  n_early_turtle_ship_desc: "$n_early_turtle_ship$ — це корейський бойовий корабель, що перевершує маневреністю інші типи галер за рахунок використання як весел, так і вітрил. Як озброєння на ньому застосовуються легкі #italic чонгтонги#! — корейська вогнепальна зброя."
  n_turtle_ship_desc: "$n_early_turtle_ship$ у міру свого розвитку обладнувався вищими бортами, що підвищило його захищеність без шкоди для маневреності."
  n_panokseon_desc: "$n_panokseon$ являє собою багатопалубний бойовий корабель, що перевершує звичайні кобуксони в розмірах та вогневій потужності. Він, як і раніше, керується веслами, але завдяки вітрилам здатний обігнати будь-яку галеру порівнянних розмірів."
  n_catalan_galley_desc: "$n_catalan_galley$ — це винахід жителів узбережжя Іберії. Цей тип кораблів поширений у західній частині Середземномор'я. $n_genoese_galley$ є основним суперником цього судна."
  n_early_iberian_caravel_desc: "$n_early_iberian_caravel$ — це легкий корабель, який вперше був побудований на північно-західному узбережжі Піренейського півострова, але незабаром поширився по всьому континенту."
  n_iberian_caravel_desc: "$n_iberian_caravel$, що стала подальшим розвитком свого раннього різновиду, перевершує всі аналогічні судна озброєнням та вітрильним оснащенням. Саме завдяки появі цього судна стала можливою епоха Відкриттів."
  n_square_rigged_caravel_desc: "$n_square_rigged_caravel$ — це португальський винахід, що об'єднує риси таких кораблів, як іберійська каравела та карака. Цей корабель, що успадкував від першої швидкість, а від другої — міцність та загальну конструкцію, ідеально підходить як для війн, так і для дослідницьких експедицій."
  n_early_iberian_galleon_desc: "$n_early_iberian_galleon$ — це важкий корабель, який був створений на берегах Піренейського півострова і пізніше увійшов до складу флоту всіх європейських країн."
  n_iberian_galleon_desc: "$n_iberian_galleon$, як і попередній йому ранній варіант, демонструє міць іберійського кораблебудування всьому світу."
  n_kilwan_dhow: "$ZAN_ADJ$ий дау"
  n_kilwan_dhow_desc: "$n_kilwan_dhow$ відомий своїм тонким і подовженим корпусом і становить основу нашої морської торгівлі, з'єднуючи місцеві порти із заморськими землями. Сам корабель — шедевр нашого кораблебудування. Його міцний корпус виготовлений з пальм, а вітрила зшиті з місцевої бавовни."
  n_kilwan_zambuc: "$ZAN_ADJ$ий самбук"
  n_kilwan_zambuc_desc: "$n_kilwan_zambuc$ — менший різновид кілванського дау, який використовується в основному для місцевої торгівлі, перевезення товарів та гончарних виробів між різними містами-країнами по всьому узбережжю Суахілі, а також служить надійним судном для подорожей на короткі відстані."
  n_ship_of_the_line: "Корабель першого рангу"
  n_ship_of_the_line_desc: "Доопрацьований варіант стандартного трипалубника, який неодмінно стане гордістю нашого флоту. Звісно, утримання таких кораблів вимагає значних коштів, але завдяки збільшеній вогневій потужності та укріпленому корпусу вони здатні самотужки переламати хід битви."
  n_war_galleon: "Військовий галеон"
  n_war_galleon_desc: "Ці галеони, перебудовані та переоснащені для військових потреб, допоможуть нам здобути перевагу в боях на морі."
  n_archipelago_frigate: "Гребний фрегат"
  n_archipelago_frigate_desc: "Військовим суднам небезпечно ходити Балтійським морем. Щоб без ризику долати його мілководні ділянки, потрібні кораблі з невеликою осадкою. Вітрильні фрегати, оснащені веслами, можуть більш спритно маневрувати та регулювати швидкість ходу, що дає їм величезну перевагу в боях на мілководді."
  n_cakradonya: "Чакрадонія"
  n_cakradonya_desc: "Цей великий і добре озброєний корабель оснащений веслами та кількома вітрилами, що робить його вельми грізною силою в морях Індонезії."
  n_galiot: "Галіот"
  n_galiot_desc: "Швидший варіант галери, що добре підходить для вод Середземного моря. Він може пересуватися як на мілководді, так і на глибоководних ділянках."
  n_baochuan: "Баочуань"
  n_baochuan_desc: "Велике судно, призначене для перевезення вантажів та захисту морських торгових шляхів. На ньому можна здійснювати довгі плавання, привозячи скарби та данину з віддалених земель."
  n_sekibune: "Секібуне"
  n_sekibune_desc: "Побудована з кедра або ялиці, секібуне поступається іншим кораблям у міцності корпусу, але має високу швидкість і маневреність."
  n_atakebune: "Атакебуне"
  n_atakebune_desc: "Більший варіант секібуне, на якому можна розмістити більше моряків. Іноді корпуси таких кораблів додатково посилюють залізними або мідними пластинами, щоб підвищити їх ефективність у бою."
  n_bomb_ketch: "Бомбардирське судно"
  n_bomb_ketch_desc: "Відносно легкий корабель, призначений для обстрілу берегових укріплень. Замість звичайних гармат він оснащений мортирами, які дозволяють йому вести нищівний вогонь по нерухомих цілях. Такі судна можуть значно полегшити облогу прибережних фортець."
  n_dhow: "Дау"
  n_dhow_desc: "Різновид торгового судна, що широко використовується в Індійському океані. Попри невеликі розміри, подібні кораблі чудово підходять для перевезення вантажів."
  n_long_fada: "Лонг-фада"
  n_long_fada_desc: "Кораблі Ірландії та Шотландського високогір'я в основному служать для захисту наших берегів і морських торгових шляхів, але в разі потреби вони цілком можуть використовуватися як військові судна."
  n_long_fada_2: "Велика лонг-фада"
  n_long_fada_2_desc: "$n_long_fada_2$ — це вдосконалена, більша лонг-фада, яка вміщує більше весел і веслярів. Вона здатна далі плавати та сильніше впливає на ситуацію в морі."
  n_birlinn: "Бірлінн"
  n_birlinn_desc: "Легкі галери місцевих вождів пов'язують наші острови в єдине ціле, але їх можна використовувати й на війні."
