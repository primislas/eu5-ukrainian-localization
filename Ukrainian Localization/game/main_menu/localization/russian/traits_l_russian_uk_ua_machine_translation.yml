  desc_conqueror: "Глава цієї країни має одержимість завоюваннями. За такої влади ми швидше захоплюватимемо землі для своєї країни."
  desc_tolerant: "Глава цієї країни відрізняється терпимістю. За такої влади релігійні меншини не утискатимуться."
  desc_just: "Глава цієї країни відрізняється своїм почуттям справедливості, а також чудово знає закони та звичаї країни, тому піддані повністю довіряють владі в державних питаннях."
  desc_righteous: "Глава цієї країни відрізняється доброчесністю. Такі люди завжди враховують інтереси своїх підданих, що знижує ймовірність невдоволення."
  desc_kind_hearted: "Глава цієї країни відрізняється добрим норовом. Простий народ любить такий щирий інтерес до свого життя. Завдяки цьому піддані простіше переживатимуть важкі часи, зокрема тяготи війни."
  desc_free_thinker: "Глава цієї країни відрізняється вільнодумством. Такі люди уникають суворих законів, відкриті до всього нового і завжди готові вислухати чужу думку про майбутнє країни."
  desc_well_connected: "Глава цієї країни має гарні зв'язки. Безліч великих умів допомагають нашому двору та раді в найрізноманітніших питаннях."
  desc_calm: "Глава цієї країни відрізняється спокоєм. Такі люди ніколи не виходять із себе, служать прикладом для своїх підданих і приймають виважені рішення, завдяки яким країна швидше оговтується від будь-яких ударів долі."
  desc_careful: "Глава цієї країни відрізняється обережністю. Такі люди прискіпливо дотримуються негласних правил міжнародних відносин і здатні згладити наслідки реальних порушень з боку нашої країни."
  desc_secretive: "Глава цієї країни відрізняється скритністю. Правило зашифровувати листи та розмовляти за зачиненими дверима пронизує весь уряд, і ворогам стає складніше впровадитися у владу."
  desc_intricate_web_weaver: "Глава цієї країни відрізняється хитромудрістю. Такі люди постійно плетуть змови та особисто керують більшістю завдань зовнішньої розвідки."
  desc_well_advised: "Глава цієї країни відрізняється розсудливістю. Такі правителі незмінно прислухаються до мудрих порад і залучають більше людей як до служби при дворі, так і до діяльності в раді."
  desc_benevolent: "Глава цієї країни відрізняється милосердям. Піддані вважають, що така людина у владі бажає їм тільки найкращого, тому їх простіше заспокоїти."
  desc_zealot: "Глава цієї країни відрізняється фанатизмом. Такі ревнителі істинної віри надихають більше людей прийняти державну релігію."
  desc_pious: "Глава цієї країни відрізняється правовірністю, релігійністю та духовністю. Такі люди стежать за тим, щоб країна не збилася з наміченого курсу, і зміцнюють віру своїх підданих."
  desc_lawgiver: "Глава цієї країни відрізняється особливою схильністю до законотворчості. Такі люди прагнуть позбутися місцевих звичаїв та створити справедливий звід законів, спільний для всіх своїх підданих."
  desc_midas_touched: "Глава цієї країни має дар Мідаса. Талант витягувати з будь-яких ідей прибуток — величезна перевага для країни. За такої влади скарбниця ніколи не порожніє."
  desc_incorruptible: "Глава цієї країни славиться своєю непідкупністю. Розвиток будь-якої сучасної країни передбачає постійну боротьбу з хабарництвом. Чиновники завжди норовлять заробити легкі гроші, а турбота про друзів і родичів закладена в людській природі. Порядні правителі з презирством відкидають будь-які спроби їх підкупити, активно припиняють хабарництво та подають приклад всій країні."
  desc_architectural_visionary: "Глава цієї країни має архітектурний талант. У наш час країні необхідно вдосконалювати різні споруди, і такі люди якнайкраще підходять для такого завдання. Вони чудово розбираються в цьому питанні, сповнені грандіозних задумів і знають, як скоротити витрати на будівництво."
  desc_scholar: "Глава цієї країни славиться своєю вченістю. Такі люди прагнуть пізнати світ, вивчити закони суспільства та природи. Вони краще розбираються в нових технологіях і набагато ефективніше їх застосовують."
  desc_entrepreneur: "Глава цієї країни має підприємницьку жилку. Такі люди використовують будь-які перешкоди та можливості для створення нових проєктів, що сприяють розвитку економіки."
  desc_industrious: "Глава цієї країни славиться своєю працьовитістю. Такі люди не знають відпочинку. Вони заглиблюються в справи кожної провінції та отримують максимум прибутку з усіх джерел у розпорядженні країни."
  desc_expansionist: "Глава цієї країни веде політику експансії. Такі люди особисто зацікавлені в приєднанні та заселенні нових земель, а також прагнуть до того, щоб колонізація залишалася головним пріоритетом країни."
  desc_charismatic_negotiator: "Глава цієї країни має чарівність у переговорах. Такі люди особисто беруть участь у міжнародних нарадах, і їм частіше вдається переконати іншу сторону прийняти вигідну для нашої країни точку зору."
  desc_silver_tongue: "Глава цієї країни має видатне красномовство. Такі люди здатні представити наші дії в найсприятливішому світлі перед делегатами з інших країн. Коли сусіди розуміють причини наших вчинків, вони схильні заплющити очі на будь-які наші провини."
  desc_tactical_genius: "Главі цієї країни немає рівних у тактиці. Такі люди глибоко захоплені військовою справою та особисто беруть участь у розробці стратегій на полі бою. Все це значно підвищує зацікавленість і компетентність наших полководців."
  desc_bold_fighter: "Глава цієї країни б'ється без страху. Такі люди вважають, що збентежити противника на полі бою — це вже пів справи. Вони не бояться ризикувати та вимагають від воєначальників вести загони прямо в гущу ворогів, якщо це необхідно."
  desc_fierce_negotiator: "Глава цієї країни жорстко веде переговори. Таким людям простіше вмовити лідерів найманих загонів битися на нашому боці за меншу плату."
  desc_strict: "Глава цієї країни відрізняється суворим норовом. Такі люди глибоко цікавляться військовою дисципліною та прищеплюють військовим усіх рангів прихильність до порядку."
  desc_inspiring_leader: "Глава цієї країни — надихаючий лідер. Такі люди мають виняткові лідерські якості та здатні навіть останнього боягуза перетворити на хороброго."
  desc_martial_educator: "Глава цієї країни вміє викладати ратну справу, а зараз освіта та підготовка воєначальників є для нашого війська головним пріоритетом."
  desc_babbling_buffoon: "Глава цієї країни дуже полюбляє базікати без усякої мети. Такі люди щиро намагаються залагодити справи із сусідами, проте геть позбавлені таланту до дипломатії. Їхня некомпетентність ускладнює переговори: іншій стороні важко зрозуміти нашу точку зору."
  desc_embezzler: "Глава цієї країни промишляє казнокрадством. Такі люди — спритні шахраї. Вони завжди прагнуть збагатитися за рахунок країни."
  desc_drunkard: "Глава цієї країни страждає на залежність. Такі люди частенько вдаються до алкоголю як до засобу від туги. Ця їхня пристрасть негативно впливає на всю країну."
  desc_sinner: "Главу цієї країни звинувачують у гріховності. Священники засуджують таких людей за особисті слабкості, тому виступають проти поточної влади."
  desc_greedy: "Глава цієї країни відзначається жадібністю та вдається до жорстких і недалекоглядних заходів, прагнучи збільшити дохід країни. Такий бездумний підхід виснажує або зовсім знищує джерела прибутку, а в довгостроковій перспективі призводить до серйозного скорочення податкових надходжень."
  desc_cruel: "Глава цієї країни відзначається жорстокістю. Численні чутки про самодурство та нелюдські діяння пригнічують наших підданих. Невдоволення навряд чи одразу ж виллється в заколот, проте будь-які кризи сильніше битимуть по суспільному настрою, оскільки причини не любити нинішню владу є абсолютно у всіх."
  desc_naive: "Глава цієї країни відзначається енергійністю і водночас кричущою недалекоглядністю. Такі люди мчать уперед стрімголов, не особливо замислюючись про наслідки. Сусіди ще довго ображаються на нас і не поспішають прощати нам провини."
  desc_craven: "Глава цієї країни відзначається боягузтвом. Такі люди відчайдушно бояться вступати в битви і тримаються подалі від поля бою. Наші війська почуваються покинутими."
  desc_loose_lips: "Глава цієї країни відзначається надмірною довірливістю. Таких людей дуже легко обдурити, і часто вони самі винні у витоку важливих відомостей. Подібні помилки сильно заважають роботі нашої контррозвідки."
  desc_obsessive_perfectionist: "Глава цієї країни відзначається педантизмом. Підвищена увага до деталей і дрібниць не завжди поєднується з умінням у них розбиратися. Такі люди раз у раз викликають перебої та затримки в роботі. Їхня дотошність швидше заважає, ніж сприяє розвитку нашої країни."
  desc_malevolent: "Глава цієї країни відзначається злісним норовом. Від таких людей нічого доброго не чекають. Васали бояться будь-яких наших ініціатив і зустрічають їх з погано приховуваним обуренням."
  glory_seeker: "Марнославство"
  desc_glory_seeker: "Цей полководець відчайдушно прагне прославитися. Загони під командуванням такої людини отримуватимуть більше престижу та військових традицій, оскільки завжди опиняються там, де найбільше потрібні."
  born_to_the_saddle: "Талант до верхової їзди"
  desc_born_to_the_saddle: "Цей полководець — майстер верхової їзди. Під керівництвом такої людини наша кавалерія успішніше проводитиме маневри з флангів."
  defensive_planner: "Талант до оборони"
  desc_defensive_planner: "У цього полководця завжди є в запасі план оборони. Загони під керівництвом такої людини складніше привести в сум'яття."
  battlefield_medic: "Знання військової медицини"
  desc_battlefield_medic: "Цей полководець володіє знаннями в медицині. З такою людиною на чолі чисельність загонів відновлюється швидше, оскільки більше вояків встигає вилікуватися після битви."
  ruthless: "Нещадність"
  desc_ruthless: "Цей полководець відзначається нещадністю. Загони під командуванням такої людини завдають більше шкоди вогнепальною зброєю."
  inspirational_leader_general: "Уміння надихати"
  desc_inspirational_leader_general: "Цей полководець вміє надихнути своїх воїнів. У разі поразки бойовий дух загонів під керівництвом такої людини відновлюватиметься швидше."
  master_of_arms: "Майстерне володіння зброєю"
  desc_master_of_arms: "Цей полководець відмінно володіє зброєю. З такою людиною на чолі наша піхота краще воюватиме і завдаватиме більше шкоди."
  goal_oriented: "Цілеспрямованість"
  desc_goal_oriented: "Цей полководець відзначається цілеспрямованістю. Загони під проводом такої людини швидше дістаються до мети."
  hardy_warrior: "Бойова витримка"
  desc_hardy_warrior: "Цей полководець славиться своєю витримкою. Загони під командуванням такої людини краще переноситимуть суворі умови та менше страждатимуть від [Concept('attrition', 'виснаження')|e]."
  siege_specialist: "Володіння осадним мистецтвом"
  desc_siege_specialist: "Цей полководець чудово розуміється на осадних тактиках. Під керівництвом такої людини облоги ведуться ефективніше та закінчуються швидше."
  cannoneer: "Любов до гармат"
  desc_cannoneer: "Цей полководець — досвідчений гармаш. Такі люди мають особливу любов до пороху та знарядь, тому ефективніше командують артилерією."
  extortioner: "Пристрасть до шантажу"
  desc_extortioner: "Цей флотоводець вміло займається шантажем. Такі люди активно використовують важелі тиску, щоб отримати більше з меншими витратами. Здирники, що командують [Concept('ships', 'кораблями')|e], ведуть торгівлю успішніше за конкурентів."
  ruthless_blockader: "Безстрашність у блокаді"
  desc_ruthless_blockader: "Цей флотоводець веде блокаду без вагань. Такі люди організовують [Concept('blockade', 'блокади')|e] набагато успішніше за інших."
  buccaneer: "Піратський досвід"
  desc_buccaneer: "Цей флотоводець — буканьєр. Під командуванням такої людини капери діють успішніше."
  prize_hunter: "Колекціонування трофеїв"
  desc_prize_hunter: "Цей флотоводець вічно полює за трофеями. Його пристрасть передається капітанам, і вони захоплюють більше [Concept('ships', 'кораблів')|e], ніж інші."
  ironside: "Непробивність"
  desc_ironside: "Цей флотоводець славиться непробивністю свого флоту. [Concept('ships', 'Кораблі')|e] під проводом такої людини отримуватимуть менше пошкоджень."
  naval_engineer: "Знання морської інженерії"
  desc_naval_engineer: "Цей флотоводець розуміється на морській інженерії. [Concept('ships', 'Кораблі')|e] під командуванням такої людини швидше відновлюватимуться від пошкоджень, отриманих у дорозі або в ході битви."
  naval_showman: "Популярність у морі"
  desc_naval_showman: "Цей флотоводець — зірка морів. [Concept('ships', 'Кораблі')|e] під проводом такої людини отримуватимуть більше престижу та флотських традицій за битви."
  ram_raider: "Любов до таранів"
  desc_ram_raider: "Цього флотоводця знають як любителя таранів. Галери під командуванням такої людини діятимуть успішніше та завдаватимуть більше шкоди в морських битвах."
  naval_gunner: "Захопленість морською артилерією"
  desc_naval_gunner: "Цей флотоводець чудово розуміється на артилерійських гарматах. Такі люди приділяють особливу увагу підготовці артилеристів, тому важкі [Concept('ships', 'кораблі')|e] під їхнім командуванням завдають більше шкоди."
  accomplished_sailor: "Великий досвід у мореплавстві"
  desc_accomplished_sailor: "Цей флотоводець — досвідчений мореплавець. Такі люди володіють винятковими знаннями в мореплавстві та навчають цієї науки всіх капітанів у своєму підпорядкуванні. [Concept('ships', 'Кораблі')|e] під керівництвом досвідчених мореплавців швидше досягають пункту призначення."
  level_headed: "Розсудливість"
  desc_level_headed: "Цей флотоводець славиться своєю розсудливістю. Моряки під керівництвом такої людини відрізняються завидною виучкою та холоднокровністю, а удари ворога менше позначаються на їхньому бойовому дусі."
  military_theorist: "Знання військової теорії"
  desc_military_theorist: "Цей полководець — один із найвидатніших військових теоретиків в історії та чудово застосовує свої знання на практиці."
  strategist: "Стратегічний досвід"
  desc_strategist: "Цей полководець — неперевершений стратег і військовий геній. Будь-яке [Select_CString(CHARACTER.IsFemale,'її', 'його')] рішення приносить успіх на полі бою. Перед хитромудрими маневрами цієї людини не встоїть жодна фортеця."
  mamluk: "Мамлюк"
  mamluks: "Мамлюки"
  desc_mamluk: "Цей полководець був мамлюком і пройшов серйозну підготовку. Мамлюки — це поневолений народ, чиї представники володіють блискучими здібностями до військової справи, тож господарі нерідко виховують із них професійних бійців."
  eunuch: "Євнух"
  desc_eunuch: "Цей персонаж був кастрований. Як правило, це робилося для того, щоб чоловік міг виконувати певні соціальні функції при дворі в полігінних суспільствах."
  eunuch_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона вміла', 'Він умів')] будувати хитромудрі змови. Як противники, так і союзники будуть засмучені цією втратою."
  raised_by_eunuchs: "Дитинство серед євнухів"
  desc_raised_by_eunuchs: "Євнухи оточували цього персонажа з раннього дитинства, тому він відчуває до них щиру симпатію."
  raised_by_eunuchs_die_desc: "[CHARACTER.GetSheHe|U] все своє жалюгідне життя [Select_CString(CHARACTER.IsFemale,'була', 'був')] лише маріонеткою в руках впливових євнухів."
  dragon_tiger: "Воєвода Тигр-Дракон"
  desc_dragon_tiger: "Військові заслуги цього командира відомі по всій Східній Азії, за що його прозвали «Тигром-Драконом»."
  dragon_tiger_die_desc: "За життя [Select_CString(CHARACTER.IsFemale,'вона була відома', 'він був відомий')] як Тигр-Дракон. Чи зможе хтось перевершити [Select_CString(CHARACTER.IsFemale,'її', 'його')] в мистецтві ведення війни?"
  hussar_commander: "Командир гусар"
  desc_hussar_commander: "Цей воєвода — справжній командир гусар. Під його командуванням кавалерійські атаки матимуть більшу ефективність."
  hussar_commander_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона була', 'Він був')] грізним командиром гусар і [Select_CString(CHARACTER.IsFemale,'здобула', 'здобув')] безліч перемог у різних битвах. Без [Select_CString(CHARACTER.IsFemale,'неї', 'нього')] наша кавалерія вже ніколи не здобуде такої слави."
  gold_loving: "Любов до золота"
  humble: "Скромність"
  workaholic: "Трудоголізм"
  lazy: "Лінь"
  prominent: "Відомість"
  inconspicious: "Непримітність"
  meticulous: "Старанність"
  careless: "Недбалість"
  adept: "Професіоналізм"
  amateur: "Початок творчого шляху"
  prescient: "Дар передбачення"
  idler: "Пасивність"
  desc_gold_loving: "Митці з цією рисою просто шаленіють від усього цінного та блискучого, їхні роботи коштують дорожче звичайного. Такі майстри вважають, що гроші вирішують усе, і завжди намагаються задерти ціни до небес."
  desc_humble: "Попри те, що митці з цією рисою досягли успіху в багатьох мистецтвах, вони найчастіше призначають невелику оплату за свої послуги. Скромність — їхня головна чеснота та основа їхньої особистості."
  desc_workaholic: "Правду кажуть, що митці часто забувають про сон та їжу. Вони настільки віддані своїй справі, що готові пожертвувати відпочинком та іншими благами, аби лише закінчити новий шедевр."
  desc_lazy: "Робота зачекає до завтра. Навіщо поспішати? Приблизно так мислять митці з цією рисою. Вони витрачають більше часу на створення творів, зате живуть повним життям."
  desc_prominent: "Немає кращого способу прославити себе на віки, ніж замовити роботу у знаменитого майстра. Твори, створені митцями з цією рисою, значно зміцнюють наш культурний вплив та авторитет серед підданих та жителів інших країн."
  desc_inconspicious: "Твори, створені митцями з цією рисою, як правило, мають досить скромний вплив на культуру та мистецтво. Взагалі такі майстри керуються принципом «краще менше, та краще», навіть коли йдеться про славу та престиж."
  desc_meticulous: "Творення та вдосконалення вимагають багато часу та сил. Митці з цією рисою часто мають видатні організаторські здібності та досягли серйозних успіхів у своїй сфері. Якість їхніх творів буде вищою, і вони принесуть хороші дивіденди."
  desc_careless: "Що за червона пляма виступила на обличчі королівської особи? У недбалого художника здригнулася рука? Чи, можливо, він хотів зобразити обурення, викликане вирішенням адміністративних питань? Хай там як, митці з цією рисою, як правило, працюють абияк, що не найкращим чином позначається на якості їхніх творів."
  desc_adept: "Що відрізняє учня від корифея? Звісно ж, рівень майстерності! Митці з цією рисою, як правило, навчаються ремеслу та вдосконалюють свої навички набагато швидше за інших."
  desc_amateur: "Починати завжди важко. Митці з цією рисою, як правило, витрачають більше часу на навчання ремеслу, а також на вдосконалення та відточування навичок."
  desc_prescient: "Багато світових шедеврів, які змінили наше суспільство, були створені в пориві натхнення. Художники з цією рисою, як правило, легко надихаються та частіше приступають до роботи."
  desc_idler: "Творення — процес не для слабкодухих. Щоб досягти успіху, людина повинна бути сміливою, впевненою в собі та всюди шукати натхнення. Митцям з цією рисою бракує таких важливих якостей, і тому вони рідше приступають до роботи."
  just_die_desc: "Нашій країні бракуватиме [Select_CString(CHARACTER.IsFemale,'її', 'його')] справедливих та безсторонніх рішень."
  righteous_die_desc: "Наш народ оплакує кончину [Select_CString(CHARACTER.IsFemale,'найдоброчеснішої правительки', 'найдоброчеснішого правителя')] в його історії."
  kind_hearted_die_desc: "Люди не забудуть доброту і любов [Select_CString(CHARACTER.IsFemale,'своєї правительки', 'свого правителя')]."
  free_thinker_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] ніколи не [Select_CString(CHARACTER.IsFemale,'боялася', 'боявся')] піти проти традицій заради блага свого народу."
  well_connected_die_desc: "Напевно [Select_CString(CHARACTER.IsFemale,'вона', 'він')] вже заводить цінні знайомства в потойбічному світі."
  calm_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона домоглася', 'Він домігся')], щоб у нашій країні був мир і порядок."
  secretive_die_desc: "Без жодного сумніву, [Select_CString(CHARACTER.IsFemale,'вона забрала', 'він забрав')] із собою в могилу безліч таємниць."
  intricate_web_weaver_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] кончина стала великим ударом для інформаторів."
  well_advised_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] радники запевняють нас, що це був найкращий результат."
  benevolent_die_desc: "Наші піддані оплакують кончину [Select_CString(CHARACTER.IsFemale,'своєї милосердної покровительки', 'свого милосердного покровителя')]."
  zealot_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] запал і непохитність переконали багатьох скептиків."
  pious_die_desc: "Можливо, ми ніколи більше не зустрінемо такої [Select_CString(CHARACTER.IsFemale,'доброї та високоморальної правительки', 'доброго та високоморального правителя')]."
  careful_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] виважені рішення зміцнили наші позиції у світі."
  lawgiver_die_desc: "Зрештою ми всі постанемо перед судом."
  midas_touched_die_desc: "Завдяки [Select_CString(CHARACTER.IsFemale 'її', 'його')] здатності робити гроші з повітря наша країна стала багатшою."
  incorruptible_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона боролася', 'Він боровся')] з несправедливістю і [Select_CString(CHARACTER.IsFemale,'зробила','зробив')] все, щоб зменшити нерівність."
  architectural_visionary_die_desc: "У спадок [Select_CString(CHARACTER.IsFemale,'вона залишила', 'він залишив')] нам безліч прекрасних будівель."
  scholar_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] любов до науки прискорила поступ і прославила нашу країну на весь світ."
  entrepreneur_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] правління зміцнило економіку країни."
  industrious_die_desc: "Навряд чи наступний правитель приділятиме стільки уваги розвитку економіки."
  expansionist_die_desc: "Наші колоністи будуть несамовиті від горя, дізнавшись про кончину їх [Select_CString(CHARACTER.IsFemale,'великої благодійниці', 'великого благодійника')]."
  charismatic_negotiator_die_desc: "Без [Select_CString(CHARACTER.IsFemale,'неї', 'нього')] переговори з іншими правителями стануть нудними та похмурими."
  silver_tongue_die_desc: "[Select_CString(CHARACTER.IsFemale,'Їй', 'Йому')] достатньо було кількох слів, щоб втихомирити суперників. Хто тепер захистить нас?"
  tactical_genius_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] хитромудрі військові виверти збивали наших ворогів з пантелику."
  bold_fighter_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] сміливо [Select_CString(CHARACTER.IsFemale,'прорубувалася', 'прорубувався')] крізь ряди ворогів. Наші вояки ніколи цього не забудуть."
  fierce_negotiator_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона поставила', 'Він поставив')] лідерів найманих загонів у такі умови, що вони залишилися без засобів до існування."
  strict_die_desc: "Під [Select_CString(CHARACTER.IsFemale,'її', 'його')] керівництвом ми ніколи не втрачали пильності."
  inspiring_leader_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона надихнула', 'Він надихнув')] ціле покоління на боротьбу з ворогами."
  martial_educator_die_desc: "За тією методикою, яку [Select_CString(CHARACTER.IsFemale,'вона розробила', 'він розробив')], наші воєначальники навчатимуться ще багато поколінь."
  babbling_buffoon_die_desc: "Для наших друзів цей день стане святом."
  embezzler_die_desc: "Наші рахівники точно не нудьгуватимуть за [Select_CString(CHARACTER.IsFemale,'нею', 'ним')], чого не скажеш про племінників."
  drunkard_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] пияцтво та марнотратство розорили скарбницю і занурили країну в кризу — масштабнішу, ніж на початку [Select_CString(CHARACTER.IsFemale,'її', 'його')] правління."
  sinner_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] безчинства не принесли нашій країні нічого, крім ганьби."
  greedy_die_desc: "Ми не забудемо, до чого призвела [Select_CString(CHARACTER.IsFemale,'її', 'його')] невгамовна жага грошей та багатства."
  tolerant_die_desc: "Наші релігійні меншини оплакуватимуть таку [Select_CString(CHARACTER.IsFemale,'терпиму правительку', 'терпимого правителя')]."
  cruel_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] залишиться в історії як [Select_CString(CHARACTER.IsFemale,'кровожерна лиходійка', 'кровожерний лиходій')]."
  naive_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] невміле втручання у зовнішні справи країни не принесло нам нічого, крім розбіжностей та нових ворогів."
  craven_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] боягузтво на полі брані назавжди залишиться в пам'яті поколінь."
  loose_lips_die_desc: "Через [Select_CString(CHARACTER.IsFemale,'її', 'його')] невміння тримати язик за зубами наші таємниці стали надбанням широкої громадськості."
  obsessive_perfectionist_die_desc: "Через [Select_CString(CHARACTER.IsFemale,'її', 'його')] прискіпливе втручання в кожну важливу справу наша країна зазнала колосальних витрат. Тепер ми можемо зітхнути з полегшенням."
  malevolent_die_desc: "Жорстокій тиранії настав кінець, і наші піддані вперше за довгий час можуть зітхнути на повні груди."
  conqueror_die_desc: "Наші вороги зітхнуть з полегшенням, коли дізнаються про [Select_CString(CHARACTER.IsFemale,'її', 'його')] смерть."
  military_theorist_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона покинула', 'Він покинув')] нас, але [Select_CString(CHARACTER.IsFemale,'її', 'його')] теорії житимуть вічно!"
  strategist_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] народ переживає важку втрату."
  mamluk_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] назавжди залишиться в пам'яті своїх братів по зброї."
  no_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона померла', 'Він помер')] занадто рано і [Select_CString(CHARACTER.IsFemale,'не встигла', 'не встиг')] залишити велику спадщину."
  glory_seeker_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] сміливість у бою запам'яталася багатьом воїнам. Вони важко переживають [Select_CString(CHARACTER.IsFemale,'її', 'його')] смерть."
  born_to_the_saddle_die_desc: "Наші кавалеристи оплакують [Select_CString(CHARACTER.IsFemale,'свою дорогу сестру', 'свого дорогого брата')]."
  defensive_planner_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона приділяла', 'Він приділяв')] особливу увагу безпеці наших воїнів. Тепер їм доведеться нелегко."
  battlefield_medic_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона приділяла', 'Він приділяв')] особливу увагу здоров'ю наших воїнів. Тепер їм доведеться нелегко."
  ruthless_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] тактика ведення бою лякала наших ворогів до тремтіння."
  inspirational_leader_general_die_desc: "Вояки ще довго передаватимуть [Select_CString(CHARACTER.IsFemale,'її', 'його')] полум'яні промови з вуст в уста."
  master_of_arms_die_desc: "Наші піхотинці оплакують [Select_CString(CHARACTER.IsFemale,'свою дорогу сестру', 'свого дорогого брата')]."
  goal_oriented_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] безліч разів [Select_CString(CHARACTER.IsFemale,'рятувала', 'рятував')] наші війська від поразки."
  hardy_warrior_die_desc: "Навіть коли справи йшли погано, вже одна [Select_CString(CHARACTER.IsFemale,'її', 'його')] присутність підбадьорювала нас."
  siege_specialist_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона довела', 'Він довів')] мистецтво облоги до досконалості. Всі ці зусилля багаторазово окупилися."
  cannoneer_die_desc: "Наші артилеристи оплакують [Select_CString(CHARACTER.IsFemale,'свою дорогу сестру', 'свого дорогого брата')]."
  extortioner_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] кончина порадує всіх торговців, окрім наших співвітчизників."
  ruthless_blockader_die_desc: "Жителі прибережних портів зможуть зітхнути з полегшенням."
  buccaneer_die_desc: "Після [Select_CString(CHARACTER.IsFemale,'її', 'його')] смерті наші вороги знову відчують себе в безпеці на судноплавних шляхах."
  prize_hunter_die_desc: "Завдяки [Select_CString(CHARACTER.IsFemale,'її', 'його')] пристрасті наш флот поповнився безліччю трофейних [Concept('ships', 'кораблів')|e]."
  ironside_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] прихильність до оборонної тактики справила незабутнє враження на всіх під [Select_CString(CHARACTER.IsFemale,'її', 'його')] командуванням."
  naval_engineer_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] уважне ставлення до [Concept('ships', 'кораблів')|e] значно збільшило термін служби суден нашого [Concept('navy', 'флоту')|e]."
  naval_showman_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] зухвалі та хитрі маневри прославили наших моряків на весь світ і підвищили їхній професіоналізм."
  ram_raider_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] зухвалі та хитрі маневри прославили наших моряків на весь світ і підвищили їхній професіоналізм."
  naval_gunner_die_desc: "Регулярні навчання корабельних артилеристів значно зміцнили нашу морську міць за роки [Select_CString(CHARACTER.IsFemale,'її', 'його')] служби."
  accomplished_sailor_die_desc: "[Select_CString(CHARACTER.IsFemale,'Ця відважна мореплавиця користувалася', 'Цей відважний мореплавець користувався')] великою повагою серед своїх підлеглих."
  level_headed_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона вміла', 'Він умів')] зберігати холоднокровність навіть перед лицем найстрашнішої небезпеки. Нам буде дуже [Select_CString(CHARACTER.IsFemale,'її', 'його')] бракувати."
  gold_loving_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] любов до золота виснажила нашу казну. Нарешті рахівники зітхнуть з полегшенням."
  humble_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] скромність ще сильніше підкреслила [Select_CString(CHARACTER.IsFemale,'її', 'його')] видатні заслуги."
  workaholic_die_desc: "Важка праця звела [Select_CString(CHARACTER.IsFemale,'її', 'його')] в могилу раніше часу, але пам'ять про [Select_CString(CHARACTER.IsFemale,'її', 'його')] досягнення залишиться у віках."
  lazy_die_desc: "Праця була [Select_CString(CHARACTER.IsFemale,'їй', 'йому')] ненависна. Протягом усього життя [Select_CString(CHARACTER.IsFemale,'вона намагалася', 'він намагався')] пальцем об палець не вдарити."
  prominent_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона облагодіяла', 'Він облагодіяв')] нашу націю, і пам'ять про [Select_CString(CHARACTER.IsFemale,'неї', 'нього')] залишиться у віках."
  inconspicious_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] нібито нічого не [Select_CString(CHARACTER.IsFemale,'зробила', 'зробив')] для свого народу. [Select_CString(CHARACTER.IsFemale,'Її', 'Його')] смерть залишилася непоміченою."
  meticulous_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] старанність не допомогла [Select_CString(CHARACTER.IsFemale,'їй', 'йому')] просунутися на жодному іншому поприщі, окрім мистецтва."
  careless_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] дорого [Select_CString(CHARACTER.IsFemale,'поплатилася', 'поплатився')] за свою недбалість."
  adept_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] видатні таланти прославлять [Select_CString(CHARACTER.IsFemale,'її', 'його')] ім'я у віках."
  amateur_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] бездарні твори дуже скоро забудуть."
  prescient_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона була розумна й прониклива', 'Він був розумний і проникливий')], але долю не перехитрити."
  idler_die_desc: "[Select_CString(CHARACTER.IsFemale,'Ця ледарка принесла', 'Цей ледар приніс')] своїм покровителям одні збитки та розлади."
  curious_adventurer: "Допитливість"
  desc_curious_adventurer: "Цей дослідник має допитливий розум. Він не зупиниться, доки досконально не вивчить кожен острів. Йому не терпиться розгадати таємниці земної кулі. На відміну від інших, ним рухає інтерес, а не особиста вигода."
  curious_adventurer_die_desc: "Будемо сподіватися, що [Select_CString(CHARACTER.IsFemale,'вона', 'він')] нарешті [Select_CString(CHARACTER.IsFemale,'задовольнила', 'задовольнив')] свою воістину невгамовну цікавість."
  navigator: "Досвід у навігації"
  desc_navigator: "Цей дослідник присвятив життя мореплавству і здатний провести свій [Concept('ship', 'корабель')|e] крізь небезпечні води."
  navigator_die_desc: "[Select_CString(CHARACTER.IsFemale,'Вона', 'Він')] повертається до своєї рідної гавані."
  treasure_hunter: "Любов до скарбів"
  desc_treasure_hunter: "Цього дослідника цікавлять лише гроші. Він зробить усе, щоб роздобути рідкісні диковинки незвіданих земель. Добробут місцевих жителів його зовсім не турбує."
  treasure_hunter_die_desc: "На жаль, [Select_CString(CHARACTER.IsFemale,'їй', 'йому')] не вдалося забрати на той світ жодного зі своїх скарбів."
  cartographer: "Пристрасть до картографії"
  desc_cartographer: "Цей дослідник обожнює складати мапи та відкривати нові землі. Його експедиції тривають набагато довше, зате користуватися його мапами — одне задоволення. Він щиро любить свою роботу і легко погодиться на скромну плату."
  cartographer_die_desc: "Попереду [Select_CString(CHARACTER.IsFemale,'її', 'його')] чекають нові незвідані землі."
  scientist_on_sea: "Науковий інтерес до моря"
  desc_scientist_on_sea: "Цим дослідником рухає науковий інтерес. Він приділяє мало уваги мапам, але із захопленням вивчає флору та фауну нових земель."
  scientist_on_sea_die_desc: "[Select_CString(CHARACTER.IsFemale,'Її', 'Його')] ім'ям будуть названі багато тварин і рослин."
  child_prodigy: "Обдарованість"
  child_prodigy_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. [Select_CString(CHARACTER.IsFemale,'Її', 'Його')] геній так і не розкрився. Цю втрату неможливо заповнити."
  desc_child_prodigy: "На цю дитину чекає велике майбутнє. Їй судилося залишити своє ім'я в історії."
  child_gifted: "Неабиякі здібності"
  child_gifted_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. [Select_CString(CHARACTER.IsFemale,'Її', 'Його')] чекала блискуча доля. Цю втрату неможливо заповнити."
  desc_child_gifted: "Ця дитина вражає своїх дорослих колег неабиякими здібностями. Вони впевнені, що на неї чекає блискуче майбутнє."
  child_slow: "Скромний розум"
  child_slow_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. [Select_CString(CHARACTER.IsFemale,'Її', 'Його')] коротке життя було сповнене труднощів, і наші серця стискаються від співчуття."
  desc_child_slow: "Ця дитина зірок з неба не хапає. Їй доводиться докладати всіх зусиль, щоб не відставати від своїх однолітків."
  child_idiot: "Тупість"
  child_idiot_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. Ми зустріли цю звістку зі змішаним почуттям скорботи та полегшення. У будь-якому разі на [Select_CString(CHARACTER.IsFemale,'неї', 'нього')] не чекало нічого доброго."
  desc_child_idiot: "Ця дитина тупа як пробка. Навряд чи їй варто розраховувати на гідне майбутнє."
  child_intelligent: "Неабиякий розум"
  child_intelligent_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. [Select_CString(CHARACTER.IsFemale,'Вона подавала', 'Він подавав')] великі надії, і наші серця сповнені скорботи."
  desc_child_intelligent: "Ця дитина має неабиякий розум, який необхідно розвивати."
  child_gregarious: "Комунікабельність"
  child_gregarious_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'пішла', 'пішов')] раніше терміну. За своє коротке життя [Select_CString(CHARACTER.IsFemale,'вона встигла', 'він встиг')] обзавестися безліччю знайомих, і зараз їхні серця сповнені скорботи."
  desc_child_gregarious: "Ця дитина любить перебувати в компанії та отримує задоволення від спілкування з людьми."
  child_rowdy: "Непосидючість"
  child_rowdy_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'спочила', 'спочив')] навічно. Навіть дивно, що [Select_CString(CHARACTER.IsFemale,'вона', 'він')] нарешті [Select_CString(CHARACTER.IsFemale,'замовкла', 'замовк')]."
  desc_child_rowdy: "Цю дитину ніяк не назвеш тихонею. Її присутність ніколи не залишається непоміченою, а від її витівок страждають усі навколишні."
  child_ambitious: "Честолюбство"
  child_ambitious_die_desc: "На жаль, [Select_CString(CHARACTER.IsFemale,'їй', 'йому')] не вдалося втілити в життя свої амбітні мрії."
  desc_child_ambitious: "Ця дитина знає чого хоче і не розмінюється на дрібниці. Здається, її амбіції неможливо задовольнити."
  child_gallant: "Шляхетність"
  child_gallant_die_desc: "[CHARACTER.GetName] більше не з нами. Усі оплакують [Select_CString(CHARACTER.IsFemale,'її', 'його')] передчасну кончину. [Select_CString(CHARACTER.IsFemale,'Вона була одна', 'Він був один')] на мільйон: надто [Select_CString(CHARACTER.IsFemale,'прекрасна', 'прекрасний')] для цього світу."
  desc_child_gallant: "Попри юний вік, у цієї дитини лицарські риси: елегантність, ввічливість, дбайливість. У майбутньому ця людина напевно проявить свій героїчний потенціал і залишиться в легендах та піснях."
  child_shrewd: "Чіпкий розум"
  child_shrewd_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'була хитра', 'був хитрий')], але смерть виявилася хитрішою. Навіть [Select_CString(CHARACTER.IsFemale,'їй', 'йому')] не вдалося обіграти кістляву."
  desc_child_shrewd: "Ця дитина має гострий розум, у будь-якій ситуації мислить блискавично і будь-кого залишить у дурнях."
  unsuited_for_army_command: "Бездарне керівництво військом"
  unsuited_for_army_command_die_desc: "На щастя, [Select_CString(CHARACTER.IsFemale,'її', 'його')] спірні стратегічні рішення більше нікому не принесуть шкоди. Багато людей зраділи, дізнавшись про [Select_CString(CHARACTER.IsFemale,'її', 'його')] кончину. Тепер воїнам нічого не загрожує, і вони нарешті зможуть зітхнути спокійно."
  desc_unsuited_for_army_command: "Якщо подібна людина стає на чолі війська — пиши пропало. Вона нічого не тямить у тактиці та стратегії ведення бою, і її офіцерам залишається лише сподіватися, що розфуфирений полководець просто стоятиме бовваном, а не роздаватиме дурних наказів."
  unsuited_for_naval_command: "Бездарне керівництво флотом"
  unsuited_for_naval_command_die_desc: "Щоразу, коли [CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'виходила', 'виходив')] у море, у [Select_CString(CHARACTER.IsFemale,'неї', 'нього')] починався напад нудоти. Усі моряки зітхнули з полегшенням. Їм більше не доведеться нескінченно драїти палубу."
  desc_unsuited_for_naval_command: "Щоб командувати флотом, потрібно вміти орієнтуватися в морських водах і, звичайно ж, добре переносити хитавицю, інакше ти станеш тим вантажем, який у підсумку потопить корабель."
  unsuited_for_country_ruling: "Бездарне керівництво країною"
  unsuited_for_country_ruling_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'заснула', 'заснув')] вічним сном, і ця ганебна глава нашої історії нарешті закінчилася."
  desc_unsuited_for_country_ruling: "Далеко не кожен здатен керувати країною. Історія знала безліч таких же слабких монархів. Ця людина або не бажає, або просто не здатна стояти на чолі пристойної країни."
  efficient_administrator: "Ефективний управитель"
  desc_efficient_administrator: "Зі священних текстів можна не тільки почерпнути духовні істини, а й навчитися життєвих премудростей. Ця людина настільки досягла успіху в останньому, що може впливати на поведінку інших людей і легко вирішує бюрократичні та управлінські завдання."
  efficient_administrator_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale,'покинула', 'покинув')] цей тлінний світ, і без [Select_CString(CHARACTER.IsFemale,'її', 'його')] грамотного керівництва уряд став працювати менш ефективно."
  proselytizer: "Релігійний агітатор"
  desc_proselytizer: "Вірувань може бути скільки завгодно; істинна віра одна. Ревнісне навернення заблукалих душ у правильну релігію не тільки зміцнює громаду, а й наставляє людей на шлях істинний."
  proselytizer_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'покинула', 'покинув' )] цей світ. Незліченна кількість людей, навернених [Select_CString(CHARACTER.IsFemale, 'нею', 'ним' )] в істинну релігію, оплакують [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] кончину. [Select_CString(CHARACTER.IsFemale, 'Вона була', 'Він був' )] справжнім світочем віри, і багато душ будуть втрачені, позбувшись [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] настанов."
  reverend_teacher: "Шанований учитель"
  desc_reverend_teacher: "Люди, яких можна назвати справжнім джерелом знань, нечисленні, але їхні вчення та настанови завжди високо цінуються — особливо серед вірних учнів, якими оточують себе подібні вчителі."
  reverend_teacher_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'скінчалася', 'скінчався' )], великі знання не змогли вберегти [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] від смерті. Світ, позбувшись цього унікального розуму, втратив дрібку мудрості, а численні учні оплакують [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] кончину."
  ascetic: "Аскет"
  desc_ascetic: "Духовне життя передбачає повну відмову від мирських задоволень. Ця людина серйозно ставиться до заповітів своєї віри і відмовляється від будь-яких насолод, віддаючи перевагу в усьому обходитися малим."
  ascetic_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'покинула', 'покинув' )] цей світ раптово, але [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] смерть не стала несподіванкою. Рішуча відмова від усього матеріального, зокрема від їжі, не могла залишитися без наслідків. Проте, багато [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] послідовників готові йти стопами [Select_CString(CHARACTER.IsFemale, 'наставниці', 'наставника' )], наслідуючи [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] аскетичні практики."
  mystic_seer: "Тайновидець"
  desc_mystic_seer: "Розплутати нитки долі та зазирнути за завісу, що покриває майбутнє, — діяння, посильне далеко не кожному. Багато з тих, хто зумів пронизати поглядом пелену і побачити за нею хоч щось, втратили розум… Але для тих, хто опанував дар ясновидіння, майбутнє видно як на долоні."
  mystic_seer_die_desc: "Незважаючи на свій дар передбачення, [CHARACTER.GetName] не [Select_CString(CHARACTER.IsFemale, 'зуміла', 'зумів' )] уникнути смерті. Важко сказати, чи [Select_CString(CHARACTER.IsFemale, 'передбачала', 'передбачав' )] [Select_CString(CHARACTER.IsFemale, 'вона', 'він' )] свою швидку кончину — але навіть якщо так, [Select_CString(CHARACTER.IsFemale, 'їй', 'йому' )] не вдалося змінити призначене."
  literalist: "Букваліст"
  desc_literalist: "Священні тексти та стародавні писання — наріжний камінь будь-якої релігії. Ця людина ставиться до них настільки ревно, що вважає, ніби у релігії не може бути іншої основи, — і більше того, самі тексти він вважає незмінними та безпомилковими в усьому, навіть у порядку слів у реченнях."
  literalist_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'померла', 'помер' )], і у нас більше немає жодного найбільшого тлумача писання. Учні та послідовники проводили [Select_CString(CHARACTER.IsFemale, 'свою наставницю', 'свого наставника' )] в останню путь, зачитуючи [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] улюблені фрагменти зі священних книг, щоб слова істинної віри супроводжували [Select_CString(CHARACTER.IsFemale, 'покійну', 'покійного' )] і після смерті."
  unorthodox: "Неправовірний"
  desc_unorthodox: "Певні сторони нашої віри можна тлумачити по-різному, але деякі тлумачення зазвичай сприймаються більш прихильно. Ця людина дотримується інших, менш поширених думок, що в кращому випадку викликає неприязнь з боку вірян, а в гіршому — відторгнення. Однак чимало людей поділяє ці погляди… або хоча б готове послухати, в чому вони полягають."
  unorthodox_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'віддала', 'віддав' )] дух, і деякі прихильники традицій у нашій релігійній громаді зустріли цю звістку з полегшенням, знаючи, що їм більше не доведеться стикатися з [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] «ексцентричністю». Проте багато вірян щиро оплакують цю втрату. Їм бракуватиме [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] незвичайного погляду на світ."
  hermit: "Відлюдник"
  desc_hermit: "Постійне спілкування з оточенням часом погано позначається на людях, особливо на тих, хто всерйоз обрав духовний шлях. До таких належить і ця людина: вона воліє жити на самоті, аніж серед народних мас, що заважають спілкуванню зі Всевишнім, і зовсім не цікавиться справами інших."
  hermit_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'померла', 'помер' )], хоча через [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] усамітнений спосіб життя про це стало відомо не відразу. Навіть [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] послідовники вкрай рідко бачили [Select_CString(CHARACTER.IsFemale, 'свою наставницю', 'свого наставника' )], адже серед них не заведено спілкуватися один з одним. Тепер, з [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] відходом, вони залишилися зовсім самі."
  alms_giver: "Той, хто дає милостиню"
  desc_alms_giver: "Блаженні ті, хто ділиться з знедоленими. Ця людина небайдужа до бід бідняків і завжди подає їм милостиню, чи то їжа, чи гроші. Її прикладу наслідують вірні учні, завдяки чому нужденні з числа нижчих верств завжди можуть розраховувати на якусь допомогу."
  alms_giver_die_desc: "[CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'користувалася', 'користувався' )] величезною повагою серед жебраків та знедолених, і [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] смерть стала страшним ударом для всіх, хто залежав від [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] щедрого подаяння. Їм дуже бракуватиме [Select_CString(CHARACTER.IsFemale, 'їхньої благодійниці', 'їхнього благодійника' )]."
  stargazer: "Звіздар"
  desc_stargazer: "Людина почала дивитися на зірки відразу, як тільки навчилася ходити. Багато хто шукає в нічному небі божественну сутність, і ця людина — не виняток: її погляд завжди спрямований вгору в пошуках знань і відповідей. Зірки можуть навчити дуже багато чого — достатньо лише вдивитися в них."
  stargazer_die_desc: "За життя [CHARACTER.GetName] [Select_CString(CHARACTER.IsFemale, 'осявала', 'осявав' )] світлом усе навколо себе подібно до зірки. З [Select_CString(CHARACTER.IsFemale, 'її', 'його' )] смертю світ став трішки темнішим. [Select_CString(CHARACTER.IsFemale, 'Її', 'Його' )] голос більше не віщатиме про таємниці небосхилу, і багато хто з тих, хто слідом за [Select_CString(CHARACTER.IsFemale, 'нею', 'ним' )] піднімав погляд до небес, тепер потупили свій погляд."