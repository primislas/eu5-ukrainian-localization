l_russian:
  prices.1.title: "Трикутна торгівля"
  prices.1.desc: "Коли європейці почали колонізувати Північну та Південну Америку, вони створили там великі бавовняні, тютюнові та цукрові плантації. Спершу вони намагалися навернути в рабство місцеве населення, але люди не витримували важких умов праці та швидко гинули. Потім до Америки завезли рабів з Африки, і так виникла система трикутної торгівлі: Європа продавала тканини, ром та промислові товари африканцям, Африка постачала американцям рабів, а Америка забезпечувала бавовною, цукром та тютюном європейців."
  prices.1.a: "Це збільшить попит на рабів."
  triangle_trade_africa: "Трикутна торгівля"
  triangle_trade_america: "Трикутна торгівля"
  triangle_trade_europe: "Трикутна торгівля"
  prices.2.title: "Європейські торговці в Китаї"
  prices.2.desc: "Зростання кількості європейських торговців у Китаї призвело до різкого збільшення попиту на китайську порцеляну. Вона стала популярною по всій Європі, а з китайцями можна розплачуватися лише сріблом або золотом."
  prices.2.a: "Це збільшить попит на порцеляну."
  porcelain_from_china: "Китайська порцеляна в Європі"
  prices.3.title: "Майсенська порцеляна"
  prices.3.desc: "Наші умільці вивчили зразки порцеляни, привезеної з Китаю, і тепер стверджують, що розкрили таємницю її виробництва. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] високо оцінює якість їхніх виробів. Безумовно, наша порцеляна принесе великий прибуток, якщо налагодити її виробництво. Тепер майстри хочуть створити мануфактуру, яка, за їхніми словами, стане провідним німецьким підприємством з виробництва порцеляни, і просять нас про фінансову допомогу."
  prices.3.a: "Ми розбагатіємо на порцеляні."
  STATIC_MODIFIER_NAME_johan_friedrich_bottger: "Методи Йоганна Фрідріха Бьоттгера"
  prices.4.title: "Зміцнення протестантизму"
  prices.4.desc: "Хвиля протестантизму захльостує католицькі країни, і все менше людей дотримується Великого посту. Раніше в ті 40 днів, коли католикам було заборонено вживати в їжу м'ясо, попит на рибу різко збільшувався. Зараз такого вже не спостерігається."
  prices.4.a: "Це зменшить попит на рибу."
  lutheran_dont_eat_fish: "Лютерани не їдять рибу"
  prices.5.title: "Кавова лихоманка"
  prices.5.desc: "Раніше кава міцно асоціювалася з мусульманством, але з часом популярність цього напою все зростала, і зараз навіть європейські християни не гребують ним. У світі, де країни безперешкодно торгують одна з одною, придбати каву або будь-яку іншу дивину стало набагато простіше. Зараз у Європі відкривається все більше кав'ярень, а попит на екзотичні зерна збільшується."
  prices.5.a: "Це підвищить ціну на каву."
  coffee_boom_happened: "Кавова лихоманка"
  prices.6.title: "Імпорт бавовни"
  prices.6.desc: "В епоху Відродження бавовняні тканини почали користуватися великим попитом у європейців. Зрештою #L [ROOT.GetCountry.GetAdjective|l]е#! вовняне виробництво опинилося в такому жалюгідному стані, що промисловці почали вимагати заборони на імпорт бавовни."
  prices.6.a: "Ми за вільну торгівлю."
  prices.6.b: "Заборонити імпорт бавовни!"
  STATIC_MODIFIER_NAME_cotton_imports_banned: "Імпорт бавовни заборонено"
  prices.7.title: "Чай із цукром"
  prices.7.desc: "Потрапивши на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з Китаю, чай швидко перетворився на улюблений [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l] напій. І багаті, і бідні, і навіть [ROOT.GetCountry.GetGovernment.GetRuler.GetName] навряд чи відмовляться від чашечки чаю з цукром."
  prices.7.a: "Це збільшить попит на чай та цукор."
  tea_and_sugar_for_britain: "Куди ж без чаю?"
  prices.8.title: "Торгівля спеціями"
  prices.8.desc: "Відкриття Східно-індійського торгового шляху ознаменувало собою початок епохи торгівлі спеціями. Тепер, коли у нас з'явилися нові маршрути, особливо важливо встановити належний контроль за поставками перцю, кориці та інших прянощів."
  prices.8.a: "Це підвищить ціну на спеції."
  spice_trade: "Торгівля спеціями"
  prices.10.title: "Виверження вулкана Уайнапутіна"
  prices.10.desc: "У лютому 1600 року відбулося потужне виверження вулкана Уайнапутіна, розташованого на території Перу. Наслідки цієї катастрофи відчувалися по всьому світу: мільйони людей загинули від голоду, а торгівля зерном і вином фактично припинилася."
  prices.10.a: "Трагедія для всього світу"
  STATIC_MODIFIER_NAME_eruption_of_huaynaputina: "Виверження вулкана Уайнапутіна"
  STATIC_MODIFIER_DESC_eruption_of_huaynaputina: "Внаслідок найпотужнішого в історії виверження вулкана на території Південної Америки у всьому світі настала вулканічна зима."
  prices.11.title: "Найхолодніша фаза малого льодовикового періоду"
  prices.11.desc: "З кожним роком зими стають все більш суворими та тривалими. Сніг та лід дісталися до південних земель, що призвело до загибелі врожаю озимих. Фруктові сади вимерзли, виробництво вин припинилося, а риба почала мігрувати в теплі води."
  prices.11.a: "Бр-р-р."
  STATIC_MODIFIER_NAME_the_little_ice_age: "Малий льодовиковий період"
  prices.15.title: "Рибний промисел на Великій Ньюфаундлендській банці"
  prices.15.desc: "Наші дослідники повідомляють, що на Великій Ньюфаундлендській банці виявлені місця, що прямо-таки кишать рибою! Рибальські експедиції відправляються туди одна за одною, а на торгові склади надходить стільки риби, що вони вже тріщать по швах!"
  prices.15.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  grand_bank_fisheries: "Рибний промисел на Великій Ньюфаундлендській банці"
  prices.16.title: "Ситець та інші бавовняні тканини"
  prices.16.desc: "Європа налагодила поставки бавовни з Індії, що вже призвело до серйозних змін попиту. Ціна на муслін, ситець та інші бавовняні тканини на європейських ринках продовжує зростати."
  prices.16.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  calicoes: "Ситець"
  prices.18.title: "Фетрові капелюхи"
  prices.18.desc: "Боброве хутро — чудовий матеріал для капелюхів. Воно дуже тепле, а також довго не втрачає свого зовнішнього вигляду навіть у найбільш негоду. Попит на капелюхи з бобрового фетру, які досить важко виготовляти, неухильно зростає, що сприяє здоровому розвитку відповідного сектора нашої економіки."
  prices.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  felt_hats: "Фетрові капелюхи"
  prices.19.title: "Постійні флоти"
  prices.19.desc: "Постійні флоти перестали бути винятком і перетворилися на правило. Установи, що відповідають за управління цими новими силами, почали активніше брати участь у закупівлі продовольства, а також матеріалів для будівництва та обслуговування своїх кораблів."
  prices.19.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  professional_navies: "Професійні флоти"
  prices.20.title: "Бронзові гармати"
  prices.20.desc: "Бронзові гармати добре показали себе на полі бою. Останні кілька років попит на мідь для виробництва гармат неухильно зростає, що призвело до зростання цін на цей матеріал."
  prices.20.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  bronze_cannons: "Бронзові гармати"
  prices.21.title: "Японська культура чаювання"
  prices.21.desc: "Споживання чаю — не новинка для Японії, проте подальший розвиток японської чайної церемонії в XVI столітті призвів до перетворення чаю на справжній національний напій."
  prices.21.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  japanese_tea_ceremonies: "Чайна церемонія"
  prices.22.title: "Занепад торгівлі спеціями"
  prices.22.desc: "Зростання конкуренції на ринку спецій призвело до того, що східні прянощі, які раніше вважалися дуже рідкісними, набули великого поширення на Заході. Деякі торговці спалювали свій товар, щоб стабілізувати ціни, інші — запроваджували суворі обмеження на експорт, але все це не дало результату: прибуток від продажів продовжив неухильно знижуватися."
  prices.22.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  decline_of_spices: "Зниження прибутку від спецій"
  prices.23.title: "Зміна культури споживання"
  prices.23.desc: "Колись цукор був дивиною, яку купували в країнах Магрибу або Близького Сходу. Тепер, коли світ став більш відкритим, а купівельна спроможність міського населення зросла, цукор перетворився з розкоші на хоч і дороге, але цілком доступне задоволення."
  prices.23.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_sugar: "Зростання популярності цукру"
  prices.24.title: "Зростання популярності шовкових тканин"
  prices.24.desc: "#TOOLTIP:GOODS,silk,X Шовк#! — ознака багатства та вишуканості — вже не перше століття незмінно користується попитом у еліт нашого суспільства. Ні #TOOLTIP:CONTINENT,asia,X #L Азія#!#!, ні #TOOLTIP:SUB_CONTINENT,middle_east,X #L Близький Схід#!#!, ні #TOOLTIP:CONTINENT,europe,X #L Європа#!#! — ніхто не може встояти перед спокусою одягнутися в цю м'яку тканину. Саме заради шовку світові країни прокладали торгові шляхи та споряджали експедиції до незвіданих земель, що досягли особливого розмаху в епоху #TOOLTIP:AGE,age_3_discovery,X #L Відкриттів#!#!. Сьогодні ж завдяки досягненням у виробництві та торгівлі як сам шовк, так і тканини стали набагато доступнішими. Попит на нових ринках різко зріс; ще трохи — і шовк з предмета розкоші остаточно перетвориться на звичайний модний товар, популярний у стрімко зростаючого середнього класу містян."
  prices.24.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_silk: "Зростання популярності шовку"
  prices.27.title: "Скорочення популяції слонів у Південно-Східній Азії"
  prices.27.desc: "Чисельність слонів у Південно-Східній Азії скорочується вже багато років, але зараз їх залишилося зовсім мало. Втім, попит на слонів та товари з виробної кістки в Південно-Східній Азії та Китаї залишається на колишньому рівні, що призвело до серйозного зростання цін."
  prices.27.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  prices.28.title: "Розвиток обробки заліза"
  prices.28.desc: "Розвиток технологій обробки заліза призвів до того, що на зміну бронзовим гарматам прийшли більш ефективні та надійні залізні. Оскільки залізо витісняє мідь і в інших областях — наприклад, у виробництві посуду, — ціни на мідь знижуються, а попит на залізо збільшується."
  prices.28.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  iron_cannons: "Залізні гармати"
  prices.29.title: "Гарячий шоколад"
  prices.29.desc: "Приготування напою на основі какао-бобів — звичай, успадкований від корінних жителів Америки. Хоча гарячий шоколад швидко завоював популярність у вузьких колах, більшості європейців знадобився час і кілька ложок цукру, щоб його розкуштувати. Незважаючи на це, попит на шоколад у Старому Світі неухильно зростає."
  prices.29.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  hot_chocolate: "Гарячий шоколад"
  prices.30.title: "Зростаюча популярність тютюну"
  prices.30.desc: "Тютюн, який спочатку продавався як ліки, швидко набуває популярності як серед християн, так і серед мусульман. Епідемія тютюнокуріння охопила весь світ — від Парижа до Бенгалії, — і виробництво тютюну стає вкрай прибутковою справою."
  prices.30.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  popularization_of_tobacco: "Зростання популярності тютюну"