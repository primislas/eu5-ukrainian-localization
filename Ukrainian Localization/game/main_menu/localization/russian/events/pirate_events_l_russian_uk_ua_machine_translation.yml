l_russian:
  pirate_events.1.title: "[Select_CString(target_character.IsFemale, 'Піратка', 'Пірат')] [target_character.GetNameWithNoTooltip]"
  pirate_events.1.desc: "[ROOT.GetCountry.GetName|U], колись серце великого Шривіджайського царства, вже давно бор[ROOT.GetCountry.Custom('end_etyut')]ся за наш регіон з іноземними суперниками. Статус [GetCountry('MAJ').Custom('longname_ru_GEN')] зробив нас уразливими, і непокірні пірати користувалися цим протягом десятиліть. Однак разом із розширенням нашої морської присутності все змінюється. У нас з'явилася нова команда каперів, а очолює їх [Select_CString(target_character.IsFemale, 'люта й нещадна', 'лютий і нещадний')] [target_character.GetName]. Отримавши посаду в нашому флоті, [target_character.GetSheHe] може стати неперевершеним кандидатом на роль флотоводця."
  pirate_events.1.a: "Випробуємо удачу у відкритому морі!"
  pirate_events.1.b: "Дозволимо [Select_CString(target_character.IsFemale, 'їй', 'йому')] служити у флоті."
  pirate_events.1.c: "Нам такі не потрібні."
  government_implements_several_policies_relevant_to_pirates_tt: "Наш уряд впровадить низку [Concept('policies', 'політик')|e], щоб підтримати діяльність піратів уздовж наших узбереж"
  pirate_events.2.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] банда"
  pirate_events.2.desc: "Корабель [Select_CString(target_character.IsFemale, 'знаменитої піратки, 'знаменитого пірата')] [target_culture.GetName] та [Select_CString(target_character.IsFemale, 'її', 'його')] банди кровожерливих головорізів увійшов у порт [target_location.Custom('LR_GEN')|l] [target_location.GetName], і капітан вимагає, щоб [target_character_2.GetName] [Select_CString(target_character_2.IsFemale, 'надала', 'надав')] [Select_CString(target_character.IsFemale, 'їй', 'йому')] аудієнцію. [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'відома', 'відомий')] своєю жорстокістю — тільки за цей рік [Select_CString(target_character.IsFemale, 'вона потопила', 'він потопив')] десятки ворожих кораблів і [Select_CString(target_character.IsFemale, 'заволоділа', 'заволодів')] чималою кількістю ризикованих трофеїв. Кажуть, на Тайвані [target_character.GetSheHe] вирізала ціле село місцевих, щоб їхньою кров'ю залатати щілини в корпусі корабля.\n\nКапітан заявляє, що [Select_CString(target_character.IsFemale, 'прибула', 'прибув')] до [target_location.Custom('LR_ACC')|l] з метою запропонувати свої послуги, в обмін на які [ROOT.GetCountry.GetFlavorRank|l] надасть [Select_CString(target_character.IsFemale, 'їй', 'йому')] притулок від [target_culture.GetNameWithNoTooltip]их властей. Однак, якщо врахувати [Select_CString(target_character.IsFemale, 'її', 'його')] репутацію та величину [Select_CString(target_character.IsFemale, 'її', 'його')] флотилії, цілком імовірно, що [Select_CString(target_character.IsFemale, 'її', 'його')] справжні амбіції в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] куди більші, ніж [target_character.GetSheHe] заявляє."
  build_galleys_to_navy_size_percentage_tt: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] будуватимуться [Concept('ships', 'кораблі')|e] — галери"
  pirate_events.4.title: "Тиран [target_character.GetNameWithNoTooltip]"
  pirate_events.4.desc: "Коли пірат піднімає чорний прапор, він повинен вселяти жах у серця тих, хто його побачить. Але водночас він повинен мати авторитет в очах команди і, принаймні теоретично, керувати кораблем за її згодою.\n\n[target_character.GetShortName] [Select_CString(target_character.IsFemale, 'заслужила', 'заслужив')] репутацію жорстокого тирана. Покарання, яким [target_character.GetSheHe] піддає членів команди навіть за найдрібніші та бездоказові провини, нелюдські навіть в очах затятих піратів. Невдоволення зростає, і це лише питання часу, коли команда візьме справу в свої руки."
  pirate_events.4.a: "Заколот!"
  pirate_events.4.b: "Слово капітана — закон."
  pirate_events.5.title: "Поділ здобичі"
  pirate_events.5.desc: "[target_privateer.GetName] дарує нам із нещодавно захопленого корабля більше цінностей, ніж ми очікували. Команди про це поки не знають, інакше б вона вже давно вимагала збільшити їхню частку з награбованого.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з кораблів, що брали участь у нальоті, бажають залишити гроші собі, щоб оновити судна та закупити більше гармат, тоді як [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] вважають, що краще буде витратити їх на підкуп чиновників у законослухняних портах."
  pirate_events.5.a: "Розділимо здобич порівну між командою."
  pirate_events.5.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|U] отримають свою частку."
  pirate_events.5.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] заслужили трохи більше грошей."
  pirate_events.6.title: "Підроблені транспортні декларації"
  pirate_events.6.desc: "Піратство — небезпечне заняття, але контрабанда може нести за собою чи не більший ризик, якщо підходити до справи без належної обережності. Наші контрабандисти заробляють, купуючи крадені товари у піратів, а потім продаючи їх на законних ринках.\n\nЩоб збувати здобуті нелегальним шляхом товари, контрабандистам доводиться підкуповувати портових чиновників, щоб ті закривали очі на походження товарів, або надавати відповідні документи, що підтверджують їхню законність. Нещодавно до нас на службу [Select_CString(target_character.IsFemale, 'поступила', 'поступив')] [target_character.GetName] — майстер фальсифікації, і [Select_CString(target_character.IsFemale, 'вона вже підготувала', 'він вже підготував')] для нас низку документів, які приймуть майже в будь-яких портах. Тепер справи йтимуть як по маслу."
  pirate_events.6.a: "Це піде бізнесу на користь."
  pirate_events.7.title: "Капер-дезертир"
  pirate_events.7.desc: "[target_character.GetName], капітан флотилії «[target_navy.GetName]», непогано [Select_CString(target_character.IsFemale, 'прославилася', 'прославився')] на службі в #L [target_country.GetAdjective|l]ому#! флоті. Однак плата, яку [Select_CString(target_character.IsFemale, 'вона отримувала', 'він отримував')] за операції, набагато менша за реальну їхню вартість.\n\nЯк і багато досвідчених капітанів, [Select_CString(target_character.IsFemale, 'вона розсудила', 'він розсудив')], що набагато більше заробить у ролі пірата. [Select_CString(target_character.IsFemale, 'Вона викинула', 'Він викинув')] своє каперське свідоцтво за борт і [Select_CString(target_character.IsFemale, 'взяла', 'взяв')] курс до наших берегів. Як пірат, якому покровительствує [ROOT.GetCountry.GetLongName], [target_character.GetSheHe] зможе розбійничати скільки душі завгодно і залишати собі чесно награбоване добро."
  pirate_events.7.a: "Грабіж і нажива!"
  pirate_events.8.title: "Захоплено корабель з рабами"
  pirate_events.8.desc: "Взявши на абордаж корабель, яким володіє [target_privateer.GetName], ми виявили, що його трюм набитий рабами. Багато членів команди колись зазнали всіх жахів рабства на власній шкурі, і вони, природно, насамперед зажадали звільнити рабів і або дозволити їм приєднатися до команди, або відправити їх до [target_location.Custom('LR_ACC')|l] [target_location.GetName].\n\nМенш совісні ж любителі золота воліли б продати цих людей, як і личить будь-якому вантажу. Вони стверджують, що, якщо ми не отримаємо прибутку з рабів, усі їхні зусилля виявляться марними."
  pirate_events.8.a: "Звільнити їх! Нехай оселяться в [target_location.Custom('LR_PREP')|l] [target_location.GetName]."
  pirate_events.8.b: "Вони звичайний вантаж, який слід продати."
  pirate_events.9.title: "Кренгування"
  pirate_events.9.desc: "Настав час знову відкренгувати наші кораблі. Для цієї трудомісткої процедури команді потрібно привести корабель до безпечного узбережжя під час припливу, щоб потім безпечно покласти його на борт і оголити корпус для ремонту.\n\nПірати терпіти не можуть кренгування, і не тільки через небезпеку пошкодити корабель або самим отримати травми, а й через те, наскільки виснажлива ця робота, якщо все робити належним чином. Деякі наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] вважають, що до кренгування не варто підходити настільки вже ґрунтовно. [target_character.GetShortName] же стверджує, що якщо проводити ремонт абияк, у майбутньому це обернеться великими неприємностями."
  pirate_events.9.a: "Простежимо, щоб команди зробили все як належить."
  pirate_events.9.b: "Не будемо насідати на команди."
  pirate_events.10.title: "Труднощі контрабандистів"
  pirate_events.10.desc: "Навіть у найкращі часи провезти контрабанду в іноземні порти нелегко. А зараз часи далеко не найкращі. Багато наших контрабандистів повертаються до [target_location.Custom('LR_ACC')|l] [target_location.GetName] з порожніми руками, тому що їхні товари конфіскували. Деякі не повертаються зовсім, зустрівши свій кінець на шибениці."
  pirate_events.10.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  pirate_events.11.title: "Новий [ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l]"
  pirate_events.11.desc: "[ROOT.GetCountry.GetLongName]. Оскільки попередній [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], вочевидь, пройшовся по дошці, нам потрібно обрати нового кандидата на цю роль. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] володіє унікальними повноваженнями і служить опорою для [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Цю людину обирає команда, і вона має бути їхнім представником і захисником перед часто деспотичним капітаном.\n\nЗараз у нас є два кандидати. [Select_CString(target_character_1.IsFemale, 'Перша', 'Перший')] — [target_character_1.GetName]. [target_character_1.GetSheHe|U] завжди горою стоїть за команду і володіє як готовністю їх вислухати, так і твердістю, щоб відстоювати їхні інтереси. Другий же кандидат, [target_character_2.GetName], [Select_CString(target_character_2.IsFemale, 'готова', 'готовий')] бути на короткому повідку в будь-якого капітана. [target_character_2.GetSheHe|U] — майстер маніпуляцій і зможе переконати команду, що наші бажання — це і їхні бажання. Хто ж завоює серця та уми зібраних піратів?"
  pirate_events.11.a: "Нехай [target_character_1.GetNameWithNoTooltip] отримає підвищення."
  pirate_events.11.b: "Цей пост займе [target_character_2.GetNameWithNoTooltip]."
  pirate_events.11.c: "У нас не може бути улюбленців!"
  as_long_as_cabinet_tt: "поки цей [Concept('character', 'персонаж')|e] засідає в [Concept('cabinet', 'раді')|e]"
  pirate_events.12.title: "Команда в чорному списку"
  pirate_events.12.desc: "Команда нашої основної флотилії — справжня катастрофа. Вони, звичайно, неперевершені мисливці й здобувають безліч трофеїв, але щойно опиняються в порту [target_location.Custom('LR_GEN')|l] [target_location.GetName], їхнє пияцтво та жорстокість переходять усі межі. Багато хто сумнівається, чи варто взагалі ця команда таких клопотів. Після одного особливо руйнівного випадку місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] вирішили внести до чорного списку всю команду, через що вона тепер не може збувати награбоване в жодному куточку [ROOT.GetCountry.Custom('rank_ru_GEN')|l].\n\nЦе обурило піратів, для яких [target_location.GetNameWithNoTooltip] служить домом: вони вважають, що це зазіхання на їхній спосіб життя, а деякі підбурювачі порівнюють цих контрабандистів із чванливими аристократами."
  pirate_events.12.a: "Ніхто не сміє вказувати, як нам жити!"
  pirate_events.12.b: "Підтримаємо заборону."
  pirate_events.12.c: "Знімемо заборону."