l_russian:
 flavor_byz_ven.1.title: "Бедственное положение"
 flavor_byz_ven.1.entry: "$flavor_byz_ven.1.title$"
 flavor_byz_ven.1.desc: "Пока наша держава переживает #TOOLTIP:DISASTER_TYPE,byzantine_succession_crisis,X #L [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ий кризис наследования#!#!, её казна стремительно пустеет, а положение становится всё более безвыходным на фоне продолжающихся конфликтов. Если внутренние раздоры не прекратятся, само существование [origin_country.Custom('longname_ru_GEN')] окажется под угрозой.\n\nОказавшись в таком бедственном положении, придворные предлагают прежде немыслимое. Творение «[target_woa.GetName]» будет заложено в качестве обеспечения по займу у одной из торговых республик."
 flavor_byz_ven.1.a: "Отчаянные времена требуют столь же отчаянных мер."
 flavor_byz_ven.1.b: "Это возмутительно."
 BYZ_crown_jewels_tt: "Если [THIS.GetCountry.GetName] соглас[THIS.GetCountry.Custom('end_ityat')]ся, то предостав[THIS.GetCountry.Custom('end_ityat')] нам [Concept('loan', 'заём')|e] в размере [SCOPE.GetLocalVariable('loan_size').GetValue|+=] [gold_i|e], а мы получим [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,BYZ_lacking_jewels,X #V #L «Регалии в залоге»#!#!#!. [Concept('work_of_art', 'Творение')|e] «[target_woa.GetName]» должно быть возвращено, чтобы модификатор перестал действовать"
 flavor_byz_ven.2.title: "Залог [origin_country.GetAdjectiveWithNoTooltip|l]их регалий"
 flavor_byz_ven.2.entry: "Pawning the $BYZ_ADJ$ Crown Jewels"
 flavor_byz_ven.2.desc: "[origin_country.GetLongName] наход[origin_country.Custom('endlong_ityat')]ся в крайне бедственном положении. В условиях #TOOLTIP:DISASTER_TYPE,byzantine_succession_crisis,X #L [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ого кризиса наследования#!#! казна державы тает на глазах и остро нуждается в дополнительных средствах. Ситуация настолько плачевная, что они обратились к нам с довольно неожиданным предложением. Они предлагают нам [Concept('work_of_art', 'творение')|e] «[target_woa.GetName]» под залог. Кто-то сочтёт такой поступок знаком доверия… а кто-то — актом отчаяния."
 flavor_byz_ven.2.a: "Неплохое пополнение нашей коллекции."
 flavor_byz_ven.2.b: "Пусть [origin_country.GetFlavorRank|l] пад[origin_country.Custom('endrank_youtut')]."
 flavor_byz_ven.2.b.entry: "Пусть эта поганая страна падёт."
 pawning_of_crown_jewels: "Залог регалий"
 LOAN_SHORT_NAME_pawning_of_crown_jewels_L: "$pawning_of_crown_jewels$"
 LOAN_SHORT_NAME_pawning_of_crown_jewels_B: "$pawning_of_crown_jewels$"
 LOAN_TOOLTIP_pawning_of_crown_jewels: "Стороны заключили соглашение, по которому заимодавец предоставляет заём, а заёмщик за полученные средства предоставляет обеспечение — $byzantine_crown_jewels$. После выплаты займа в полном объёме заложенные драгоценности должны быть возвращены — по крайней мере, в теории."
 LOAN_TITLE_pawning_of_crown_jewels: "$pawning_of_crown_jewels$"
 LOAN_NAME_pawning_of_crown_jewels_L: "$pawning_of_crown_jewels$"
 LOAN_NAME_pawning_of_crown_jewels_B: "$pawning_of_crown_jewels$"
 flavor_byz_ven.3.title: "Заём выплачен"
 flavor_byz_ven.3.entry: "$flavor_byz_ven.3.title$"
 flavor_byz_ven.3.desc: "Заём только что был выплачен. Творение «[target_woa.GetName]» должно быть возвращено, этого требу[origin_country.Custom('endlong_etyut')] [origin_country.GetLongName]. По условиям соглашения мы обязаны это сделать, однако при этом мы лишимся последнего рычага давления на них.\n\nВ конце концов, если мы не вернём драгоценности, вряд ли случится что-то по-настоящему серьёзное…"
 flavor_byz_ven.3.a: "Мы не можем рисковать репутацией."
 flavor_byz_ven.3.b: "А с другой стороны — почему бы и нет? Почему бы и не оставить себе эти драгоценности?"
 flavor_byz_ven.4.title: "Регалии возвращены"
 flavor_byz_ven.4.desc: "Согласно договорённости мы выплатили наш заём [target_country.Custom('longname_ru_DAT')]. [Concept('work_of_art', 'Творение')|e] «[target_woa.GetName]» было возвращено #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_DAT')|L]#!#! в [target_location.Custom('LR_ACC')|l] [target_location.GetName].\n\nБыло приятно иметь дело со светлейшей #TOOLTIP:GOVERNMENT_REFORM,merchant_republic,X #L купеческой республикой#!#!."
 flavor_byz_ven.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 flavor_byz_ven.4.a.entry: "$common_string_brilliant$"
 flavor_byz_ven.5.title: "Соглашение нарушено"
 flavor_byz_ven.5.desc: "Несмотря на то, что мы выплатили заём в рамках договорённости, #L [target_country.GetAdjective|l]ая#! сторона проигнорировала наше требование. Творение «[target_woa.GetName]» не было возвращено. Иначе как грабежом подобное поведение не назвать!\n\nОни познают гнев [origin_country.Custom('longname_ru_GEN')]…"
 flavor_byz_ven.5.a: "Не следовало заключать сделку с дьяволом."
 flavor_byz_ven.6.title: "$flavor_byz_ven.4.title$"
 flavor_byz_ven.6.desc: "[target_army.GetName] — герои. Им удалось вернуть [Concept('work_of_art', 'творение')|e] «[target_woa.GetName]» [target.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_ACC')|L]#!#!, где их тепло приветствовали при #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе. Отныне ни один враг не сможет использовать драгоценности против нас!"
 flavor_byz_ven.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
 flavor_byz_ven.6.a.entry: "$common_string_brilliant$"
 flavor_byz_ven.7.title: "[target_woa.GetNameWithNoTooltip]"
 flavor_byz_ven.7.desc: "Недавний захват [location.Custom('LR_GEN')|l] [location.GetName] стал большим успехом для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [target_army.GetName] — эти наши войска тщательно «осмотрели» территорию. Теперь у них в руках [Concept('work_of_art', 'творение')|e] «[target_woa.GetName]», которое обладает большой ценностью для наших союзников [origin_country.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_PREP')|L]#!#!. Мы могли бы вернуть им эти драгоценности… но разве мы не заслужили свою долю добычи?"
 flavor_byz_ven.7.a: "Мы всё вернём нашим дорогим союзникам."
 flavor_byz_ven.7.b: "Всё это по праву принадлежит нам! Мы это честно украли!"
 flavor_byz_ven.8.title: "Драгоценности украдены!"
 flavor_byz_ven.8.desc: "До нас дошли известия о выдающемся ротозействе наших заимодавцев! [Concept('work_of_art', 'Творение')|e] «[target_woa.GetName]» находилось у них в залоге, и они позволили его украсть прямо у себя из-под носа. Мы искренне надеемся, что они сумеют вернуть наше имущество. В противном случае нам придётся самим забрать его у #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#!…"
 flavor_byz_ven.8.a: "Набивать свои сундуки золотом — это всё, что они умеют?"
 byz_woa_was_moved: "[Concept('work_of_art', 'Творение')|e] «[target_woa.GetName]» перевезли [target.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_ACC')|L]#!#!"
