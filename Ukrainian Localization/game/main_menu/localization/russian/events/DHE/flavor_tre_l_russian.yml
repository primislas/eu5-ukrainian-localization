l_russian:
 flavor_tre.1.title: "Цитадель [target_location.GetNameWithNoTooltip]"
 flavor_tre.1.entry: "Цитадель Трапезунда"
 flavor_tre.1.desc: "Величественный город [target_location.GetName], расположенный в самом сердце #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#!, уже много веков служит символом нашей верховной власти. Благодаря выгодному расположению на берегу моря столичный город активно развивается и процветает, олицетворяя наши богатые культурные традиции.\n\nЭтот усеянный богатыми купеческими подворьями, рынками, акведуками и прочей инфраструктурой город стал настоящей жемчужиной нашей державы. Всё это обеспечивает постоянный прирост населения, поэтому нам стоит задуматься о расширении границ города, чтобы за его крепкими стенами можно было уместить новые дома."
 flavor_tre.1.historical_info: "Основанный в 756 г. до н. э. город Трапезунд долгое время выступал оплотом греческой православной культуры. Ещё во времена Римской империи здесь располагались легионы, обороняющие Полемонов Понт, а в годы правления Юстиниана город служил плацдармом для завоевания Армении.\n\nВ VIII веке Трапезунд стал архиепископской епархией, а ещё через два века — митрополией. В 1204 году Алексей I Комнин вместе с братом Давидом основал здесь Трапезундскую империю, просуществовавшую до 1461 года. От врагов её защищали Понтийские горы, прочные стены и выгодные брачные союзы. Небольшой (в 1438 году здесь проживало 4000 человек), но хорошо укреплённый Трапезунд славился своими памятниками архитектуры, такими как Софийский собор и храм Богородицы Златоглавой (Панагия Хрисокефалос). В 1461 году его взяли османы, покорив тем самым последний город Византийской империи."
 flavor_tre.1.a: "Вложить деньги в развитие!"
 flavor_tre.1.b: "Пусть голодают за стенами…"
 flavor_tre.2.title: "Неповиновение схолариев"
 flavor_tre.2.entry: "$flavor_tre.2.title$"
 flavor_tre.2.desc: "Движимые неуёмной жаждой наживы, некоторые представители местных дворянских ополчений решили воспользоваться ослаблением верховной власти и взяли [target_location.Custom('LR_ACC')|l] [target_location.GetName] под свой полный контроль. Конечно, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] всегда стремились обрести как можно больше влияния и привилегий, но в этот раз они перешли все границы дозволенного. Если мы не примем решительные меры, скоро наша держава может погрязнуть в гражданской войне!"
 flavor_tre.2.a: "Спустить этих бешеных псов с цепей!"
 flavor_tre.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 flavor_tre.2.b.entry: "$common_string_nothing_we_can_do_about_it$"
 flavor_tre.2.historical_info: "Схоларии — влиятельные #italic άρχοντες#! (дворяне), изначально — охранявшее город гвардейское подразделение. Со временем его представители составили одно из самых могущественных семейств Трапезунда. В 1340 году Схоларии, стремившиеся завладеть всей полнотой власти, выступили против воцарения императрицы Ирины. В стране, страдавшей в то время от набегов туркменов на южную границу, разразилась гражданская война. Это сыграло на руку туркменам: в ходе одного из налётов они смогли проникнуть в Трапезунд и поджечь город. К несчастью жителей, к пожару прибавилась и эпидемия: улицы города были завалены гниющими телами людей и лошадей."
 flavor_tre.3.title: "[target_character1.GetNameWithNoTooltip] [Select_CString(target_character1.IsFemale,'отравлена', 'отравлен')]"
 flavor_tre.3.entry: "Отравление Василия Великого Комнина"
 flavor_tre.3.desc: "[target_character2.GetName] уже давно [Select_CString(target_character2.IsFemale,'испытывала', 'испытывал')] к [Select_CString(target_character1.IsFemale,'своей жене', 'своему мужу')] жгучую ненависть и ревность. Их и без того напряжённые отношения усугублялись тем, что [target_character1.GetName] [Select_CString(target_character1.IsFemale,'имела при дворе множество любовников', 'имел при дворе множество любовниц')]. В конце концов [target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale,'не выдержала и пошла', 'не выдержал и пошёл')] на отчаянный шаг, отравив [Select_CString(target_character1.IsFemale,'свою супругу', 'своего супруга')] и положив конец этому несчастному браку."
 flavor_tre.3.a: "В любви и на войне все средства хороши."
 flavor_tre.3.b: "Мы этого не потерпим!"
 flavor_tre.3.historical_info: "Ирина — незаконнорождённая дочь Андроника III Палеолога — стала женой императора Василия отнюдь не по любви: семейство Комнинов посредством этого брака рассчитывало заключить союз с императором Византии. Ирина так и не смогла родить своему мужу наследника, а Василий предпочитал находить утешение в объятиях придворной любовницы. Взаимная нелюбовь в августейшей чете оказалась роковой для Василия: через какое-то время он был убит, а власть над Трапезундом перешла к Ирине. В стране начались неспокойные времена."
 flavor_tre.4.title: "[target_character_2.GetNameWithNoTooltip] и [Select_CString(target_character_2.IsFemale, 'её', 'его' )] наследие"
 flavor_tre.4.entry: "Правление Алексея II"
 flavor_tre.4.desc: "[target_character_1.GetName] восседает на троне, и это знаменует собой продолжение великой эпохи для всех жителей [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. [target_character_2.GetName] [Select_CString(target_character_2.IsFemale, 'передала', 'передал' )] трон по наследству, и [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вслед за [Select_CString(target_character_2.IsFemale, 'ней', 'ним' )] правит в политической обстановке, на которую влияют династические традиции, местная аристократия и интересы стран #TOOLTIP:AREA,black_sea_area,X #L Черноморского#!#! побережья.\n\nКаким потомки запомнят это правление, будет зависеть не только от будущих деяний, но и от того, с какой уверенностью будет поддерживаться или пересматриваться наследие предшественников [Select_CString(target_character_1.IsFemale, 'новой правительницы', 'нового правителя' )]."
 flavor_TRE_4_historical_info: "Алексий II Великий Комнин прославился одним из самых продолжительных правлений в истории Трапезунда и правил в те времена, когда империя гораздо больше полагалась на дипломатию, торговлю и династическую передачу власти, чем на расширение территорий. С его смертью наступил переходный период, в течение которого власть правящего дома сохранялась, но равновесие между придворными фракциями и иностранными купцами оставалось очень хрупким."
 flavor_tre.4.a: "Покойся с миром, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]…"
 flavor_tre.4.a.entry: "Покойся с миром, великий правитель…"
 flavor_tre.5.title: "Родина вишни"
 flavor_tre.5.entry: "$flavor_tre.5.title$"
 flavor_tre.5.desc: "[target_location.GetRank.GetName] #TOOLTIP:LOCATION,giresun,X #L Гиресун#!#! долгое время оставался небольшим, но важным портом на юге #TOOLTIP:AREA,black_sea_area,X #L Чёрного моря#!#!. В его гавань приходят пути с #L [ROOT.GetCountry.GetAdjective|l]их#! гор в глубине страны, и это хорошая возможность для морской торговли, которая при правильной поддержке поможет общему развитию державы.\n\nПрямые вложения средств или внимательное управление [target_location.Custom('LR_INST')|l] [target_location.GetNameWithNoTooltip] способны в будущем не только привести к процветанию местных земель, но и ещё больше укрепить торговую репутацию [ROOT.GetCountry.Custom('CL_GEN')]."
 flavor_TRE_5_historical_info: "Городок Керасус, известный сегодня под названием Гиресун, обладал стратегическим значением как прибрежный порт и был достаточно известен в регионе Понт. Такие поселения обеспечивали Трапезундской империи доступ к черноморской торговле и выступали посредниками между источниками товаров в горах и международными торговыми объединениями. Говорят, название #italic Керасус#! со временем стало использоваться для обозначения вишни — местной сладкой ягоды."
 flavor_tre.5.a: "Это разумное вложение."
 flavor_tre.5.b: "Пусть развивается сам по себе."
 flavor_tre.6.title: "Растущее влияние итальянских купцов"
 flavor_tre.6.entry: "Обложить налогами венецианцев и генуэзцев"
 flavor_tre.6.desc: "#TOOLTIP:CULTUREGROUP,italian_group,X #L Итальянские#!#! купцы из #ONCLICK:COUNTRY,[GetCountry('VEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('VEN').Custom('CL_tt')],X [GetCountry('VEN').Custom('CL_GEN')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('GEN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GEN').Custom('CL_tt')],X [GetCountry('GEN').Custom('CL_GEN')|L]#!#! давно пользуются широкими привилегиями в наших портах, а также освобождены от пошлин благодаря заключённым договорам и взаимовыгодной необходимости. Их корабли обеспечивают нас богатством и товарами, но автономия этих купцов всё чаще вызывает критику у местных #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L горожан#!#! и чиновников.\n\nЕсли ввести новые налоги, мы сможем утвердить наш суверенитет и укрепить казну, но рискуем вызвать дипломатический конфликт с могущественными морскими республиками, чьё влияние простирается далеко за пределы #TOOLTIP:AREA,black_sea_area,X #L Чёрного моря#!#!, а также нарушить многолетние торговые соглашения."
 flavor_tre.6.a: "Введём новые налоги."
 flavor_tre.6.b: "Лучше не будем их злить."
 flavor_tre.7.title: "Аспрон"
 flavor_tre.7.entry: "$flavor_tre.7.title$"
 flavor_tre.7.desc: "#TOOLTIP:GOODS,silver,X #L Серебро#!#!, которое добывают в окрестностях города #TOOLTIP:LOCATION,gumushane,X #L Гюмюшхане#!#!, дарит нам не только осязаемое богатство — оно укрепляет доверие к нашим деньгам, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] благодаря этому поднимает свой авторитет. Если расширить добычу и чеканку монет в этом #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_PREP')|l]#!#!, то [ROOT.GetCountry.GetFlavorRank] смо[ROOT.GetCountry.Custom('endrank_gegu')] укрепить свою денежную систему и поспособствует местному процветанию.\n\nОднако такие усилия требуют уверенного руководства и немедленных вложений, а интенсивная добыча может навредить как местной земле так и её жителям, если не знать меры."
 flavor_tre.7.a: "Сосредоточимся на усиленной добыче!"
 flavor_tre.7.b: "Жадность до добра не доведёт."
