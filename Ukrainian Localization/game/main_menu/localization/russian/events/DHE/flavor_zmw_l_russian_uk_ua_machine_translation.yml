l_russian:
  flavor_zmw.1.title: "$MTP$ іде до величі"
  flavor_zmw.1.desc: "Захоплена нами провінція [ShowProvinceDefinitionName('upper_mazowe_province')], якою сьогодні володіє [target_character.GetName], забезпечує суттєвий внесок в економіку країни. Вона повільно, але вірно приносить прибуток, і тому [target_character.GetName] збирається за допомогою цих коштів отримати ще більше влади в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! та оголосити себе «підкорювачем людей»."
  flavor_zmw.1.a: "[target_character.GetNameWithNoTooltip] очолить нас."
  flavor_zmw.1.b: "[Select_CString(target_character.IsFemale, 'Її', 'Його' )] жалюгідний заколот приречений."
  flavor_zmw.1.historical_info: "Ньятсімба Мутота, перший король Мутапи, був представником зимбабвійської аристократії, який очолив експансію королівства на північні землі в пошуках нових ресурсів. Там він заклав оплот своєї династії та поступово затьмарив старе королівство, ставши правити замість нього."
  mutapa_rebels: "$MTP$ підніме повстання"
  mutapa_rebels_joining: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:POPTYPE,peasants,X #L селянських#!#! [Concept('pops', 'груп населення')|e] у провінції [ShowProvinceDefinitionName('upper_mazowe_province')] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%], і вони приєднаються до фракції «[target_mutapa_rebels.GetName]»."
  flavor_zmw.2.title: "$RZW$ іде до величі"
  flavor_zmw.2.desc: "Незабаром з'явиться нова сила, з якою доведеться рахуватися, — [target_character.GetName]! Під [Select_CString(target_character.IsFemale, 'її', 'його' )] владою провінція [ShowProvinceDefinitionName('shangani_province')] перетворилася на серйозну загрозу стабільності [ROOT.GetCountry.Custom('rank_ua_GEN')|l], де правимо ми. Ця людина не зупиниться ні перед чим у своєму прагненні панувати над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!."
  flavor_zmw.2.a: "[target_character.GetNameWithNoTooltip] стане нашим новим вождем."
  flavor_zmw.2.b: "Ми розгромимо війська вискочки."
  flavor_zmw.2.historical_info: "Витоки імперії Розві в землях навколо Бутуа, однієї з провінцій Мутапського королівства. Під проводом Домбо Чангаміре Розві здобула рішучу перемогу над португальцями, що були присутні в Зімбабве, в 1660 році, а династія імперії стала правителями Зімбабвійського плато."
  rozwi_rebels: "$RZW$ піднімає заколот"
  rozwi_rebels_joining: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:POPTYPE,peasants,X #L селянських#!#! [Concept('pops', 'груп населення')|e] у провінції [ShowProvinceDefinitionName('shangani_province')] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%], і вони приєднаються до фракції «[target_rozwi_rebels.GetName]»."
  flavor_zmw.3.title: "[ShowGovernmentReformNameWithNoTooltip('zmw_council_of_senior_wives')]"
  flavor_zmw.3.desc: "Дружинам наших правителів доступні багато найпотаємніших знань про нашу країну, і вони могли б ділитися з нами своїм баченням того, що відбувається — якщо, зрозуміло, їм буде дозволено засідати в раді та безпосередньо брати участь в управлінні. Не слід нехтувати такою можливістю — [ShowGovernmentReformName('zmw_council_of_senior_wives')] нам вельми знадобиться."
  flavor_zmw.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.3.b: "Не зараз."
  flavor_zmw.1000.title: "Пошук ресурсів"
  flavor_zmw.1000.desc: "Серце #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! — [target_location.GetRank.GetName|l] [target_location.GetName] — поступово чахне. Безцінні багатства, такі як [ShowGoodsName('salt')|l], закінчуються. [target_character.GetName] [Select_CString(target_character.IsFemale, 'наказала', 'наказав' )] усім, хто бажає вирушити на пошуки пригод, негайно прибути до [Select_CString(target_character.IsFemale, 'неї', 'нього' )]: [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] збирається з їхньою допомогою розпочати заселення сусідніх незайманих земель."
  flavor_zmw.1000.a: "Нам знадобиться будь-яка допомога."
  flavor_zmw.1000.a.tt: "Ми відкриємо [Concept('event', 'подію')|e] #Y «$flavor_zmw.1001.title$»#!, яка щорічно приваблює нових [Concept('courtiers', 'придворних')|e], якщо їх буде менше 10"
  flavor_zmw.1001.title: "Авантюристи, відгукніться"
  flavor_zmw.1001.desc: "Після того як [target_character.GetName] [Select_CString(target_character.IsFemale, 'оголосила', 'оголосив' )] про свої наміри, до #L [target_country.GetAdjective|l]ого#! двору почали десятками прибувати сміливці, готові вирушити #TOOLTIP:CABINET_ACTION,settle_the_frontier,X #L заселяти прикордоння#!#! заради інтересів рідної країни."
  flavor_zmw.1001.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.1001.a.tt: "В #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#! з'являється новий [Concept('character', 'персонаж')|e]"
  flavor_zmw.1100.title: "[target_character.GetNameWithNoTooltip] прибуває"
  flavor_zmw.1100.desc: "[Select_CString(target_character.IsFemale, 'Самопроголошена мандрівниця', 'Самопроголошений мандрівник' )] з #TOOLTIP:CULTURE,$portuguese_tt$,X #L Португалії#!#! [target_character.GetName] просить, щоб [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'удостоїла', 'удостоїв' )] [Select_CString(target_character.IsFemale, 'її', 'його' )] прийому: незважаючи на чужорідне походження, [target_character.GetName] хоче служити радником при нашій країні. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] у сумнівах: хоча [Select_CString(target_character.IsFemale, 'вона', 'він' )], безсумнівно, може принести нам користь, зараз складно сказати, кому ця людина віддана насправді."
  flavor_zmw.1100.a: "Він стане цінним радником."
  flavor_zmw.1100.b: "Звучить ризиковано."
  flavor_zmw.1100.historical_info: "Антоніу Фернандеш став першим португальським дослідником, що проник углиб земель Зімбабве. Він прибув до Зімбабве 1511 року через порт Софали. Звідти він попрямував углиб континенту і зміг встановити контакт з правлячим монархом Мутапи, Чикуйо Чисамаренгу."
  flavor_zmw.1101.title: "[target_character.GetNameWithNoTooltip] пропонує нам мапи [ShowRegionNameWithNoTooltip('zimbabwe_region')]"
  flavor_zmw.1101.desc: "Мандрівник та дослідник [target_character.GetName], що вже деякий час вивчає [ShowRegionName('zimbabwe_region')], зумів заручитися прихильністю одного з місцевих правителів. Під час своїх подорожей [target_character.GetName] склав мапу досліджених земель, що за точністю перевершує все, що коли-небудь вдавалося скласти нам. На щастя, він сам запропонував нам купити таку важливу працю."
  flavor_zmw.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_zmw.1101.b: "Нас це не цікавить."
  flavor_zmw.1200.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його' )] місія"
  flavor_zmw.1200.desc: "[target_character.GetName] родом з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! [Select_CString(target_character.IsFemale, 'служила', 'служив' )] своїй країні на посаді посла та намісника, але потім [Select_CString(target_character.IsFemale, 'зрозуміла', 'зрозумів' )], що [Select_CString(target_character.IsFemale, 'її', 'його' )] покликання — бути #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьким#!#! місіонером. Сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вислуховує [Select_CString(target_character.IsFemale, 'її', 'його' )] прохання: [target_character.GetName] хоче заснувати в нашій країні католицьку місію, а заодно цікавиться, чи не хоче [target_ruler.GetName] особисто прийняти католицтво."
  flavor_zmw.1200.a: "[target_ruler.GetNameWithNoTooltip] перейде в іншу віру."
  flavor_zmw.1200.b: "Ми дозволимо заснувати місію, але [target_ruler.GetNameWithNoTooltip] не відречеться від своєї віри."
  flavor_zmw.1200.c: "Відмовимо в проханні."
  flavor_zmw.conversion.tt: "Деякі [Concept('pops', 'групи населення')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! навертаються в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!."
  flavor_zmw.1200.historical_info: "Єзуїт Гонсало да Сільвейра прибув до Зімбабве, покинувши свій пост настоятеля провінції в Португальській Індії 1560 року. Під час зустрічі з королем йому вдалося навернути в християнство його самого та кількох його підданих. Це стало першим випадком успішного поширення католицтва в регіоні."
  flavor_zmw.1201.title: "Протест проти навернення"
  flavor_zmw.1201.desc: "Торговці-#TOOLTIP:RELIGIONGROUP,muslim,X #L мусульмани#!#! в нашій країні обурені тим, що [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'перейшла', 'перейшов' )] в іншу віру, і тепер вимагають, щоб [Select_CString(target_ruler.IsFemale, 'вона відреклася', 'він відрікся' )] від #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтва#!#!. Очевидно, що вони побоюються зростаючого впливу купців з католицьких країн. Розрив корисних для нашої країни відносин з мусульманами завдасть серйозного удару по економіці.\n\nЯке б рішення ми не прийняли щодо майбутнього [ROOT.GetCountry.Custom('rank_ua_GEN')|l], воно буде непростим."
  flavor_zmw.1201.a: "Вони мають рацію. Відречемося від католицтва."
  flavor_zmw.1201.b: "Світло католицтва приведе нас до істини."
  flavor_zmw.1201.historical_info: "Незабаром після навернення мвенемутапи Гонсало да Сільвейрою король зіткнувся з категоричним протестом з боку мусульманських купців з узбережжя, що діяли в Зімбабве. Їм вдалося успішно відмовити правителя від навернення. Гонсало да Сільвейра був задушений людьми короля, і надалі місіонерам був заборонений вхід до країни, що поклало край присутності католицтва в Зімбабве."