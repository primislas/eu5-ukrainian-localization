l_russian:
 flavor_cro.1000.title: "Объединение Хорватии и Славонии"
 flavor_cro.1000.entry: "Объединение Хорватии и Славонии"
 flavor_cro.1000.desc: "Неумолимая экспансия #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#! представляет серьёзную угрозу для [ROOT.GetCountry.Custom('rank_ru_GEN')|l], а разделение земель, которыми владеют #L [GetCountry('HUN').GetCountry.GetGovernment.GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l], создаёт уязвимость, и ей могут воспользоваться наши враги. В ответ на эту ситуацию при #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе появилось предложение обратиться к [GetCountry('HUN').Custom('CL_DAT')] с просьбой передать #TOOLTIP:AREA,croatia_area,X #L Хорватию#!#! и #TOOLTIP:AREA,slavonia_area,X #L Славонию#!#! под единое управление. По мнению сторонников этой идеи, объединение существенным образом укрепит нашу оборону и облегчит управление землями."
 flavor_cro.1000.a: "Приступим к реализации предложения."
 flavor_cro.1001.a.tt: "Все [Concept('location', 'районы')|e] во владении, которые либо являются [Concept('core', 'национальными районами')|e] #TOOLTIP:AREA,slavonia_area,X #L Славонии#!#!, либо расположены на её территории, будут переданы #ONCLICK:COUNTRY,[GetCountry('CRO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRO').Custom('CL_tt')],X [GetCountry('CRO').Custom('CL_DAT')|L]#!#!"
 flavor_cro.1000.b: "Это ляжет тяжёлым бременем на наши плечи."
 flavor_cro.1000.historical_info: "В прошлом Славония представляла собой отдельную от Хорватии административную единицу под управлением собственного бана, который, в свою очередь, подчинялся напрямую венгерской короне. Однако экспансия Османской империи кардинально изменила политическую ситуацию в регионе, а опустошение, вызванное войной, вынудило местных жителей бежать на север. В 1476 году король Матьяш I объединил Хорватско-Далматский и Славонский банаты, чтобы укрепить оборону против османских набегов. Процесс объединения окончательно завершился в 1558 году с политической интеграцией и слиянием парламентов Хорватии и Славонии."
 flavor_cro.1001.title: "$flavor_cro.1000.title$"
 flavor_cro.1001.desc: "Посланники от наших подданных [GetCountry('CRO').Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('CRO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRO').Custom('CL_tt')],X [GetCountry('CRO').Custom('CL_PREP')|L]#!#! прибыли к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору с предложением объединить должности бана #TOOLTIP:AREA,croatia_area,X #L Хорватии#!#! и бана #TOOLTIP:AREA,slavonia_area,X #L Славонии#!#!. По их мнению, единое управление укрепит оборону и облегчит административную нагрузку перед лицом #L [GetCountry('TUR').GetAdjective|l]ой#! угрозы."
 flavor_cro.1001.a: "Единая граница укрепит нашу оборону."
 flavor_cro.1001.b: "[GetCountry('HUN').GetAdjectiveWithNoTooltip]ие [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] владеют областью [ShowAreaNameWithNoTooltip('slavonia_area')]."
 flavor_cro.1001.b.entry: "[ShowAreaNameWithNoTooltip('slavonia_area')] — собственность венгерских правителей."
 flavor_cro.1100.title: "[target_character.GetNameWithNoTooltip] и [Select_CString(target_character.IsFemale, 'её', 'его' )] владения"
 flavor_cro.1100.entry: "Владения Ивана Нелипича"
 flavor_cro.1100.desc: "Могущественный магнат по имени [target_character.GetName] постепенно усиливает своё влияние [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. На своих родных землях он сумел устранить многих своих противников, благодаря чему #L [GetCountry('HUN').GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] ослабили здесь хватку. Одни считают такое положение дел выгодным, а другие опасаются, что [GetCountry('HUN').GetNameWithNoTooltip] мо[GetCountry('HUN').Custom('end_gegu')] в любой момент восстановить свою власть. Появилось предложение: если [target_character.GetNameWithNoTooltip] признает, что #L [GetCountry('HUN').GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] обладают властью над этой территорией, то [GetCountry('HUN').GetNameWithNoTooltip], в свою очередь, призна[GetCountry('HUN').Custom('end_etyut')] его власть над [ROOT.GetCountry.Custom('CL_INST')]."
 flavor_cro.1100.a: "[GetCountry('HUN').GetAdjectiveWithNoTooltip]ие [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] — не те, с кем стоит связываться."
 flavor_cro.1100.a.entry: "Не будем вмешиваться в дела правителей."
 flavor_cro.1100.b: "Отправим предложение."
 flavor_cro.1100.historical_info: "Иван Нелипич был хорватским дворянином, который фактически установил контроль над большей частью Хорватии в 1322 году, предварительно свергнув предыдущего бана Младена II из рода Шубичей. В период его правления титул бана Хорватии оставался незанятым, а сама Хорватия почти полностью вышла из-под власти венгерской короны. Венгерский король и бан Славонии неоднократно пытались сместить Нелипича, но все их попытки оканчивались неудачей. Лишь в 1345 году, после смерти Нелипича, Венгрии удалось восстановить свою власть над Хорватией."
 flavor_cro.1101.title: "[GetCountry('CRO').GetNameWithNoTooltip] ищ[GetCountry('CRO').Custom('end_etut')] компромисс"
 flavor_cro.1101.desc: "[GetCountry('CRO').GetName] наход[GetCountry('CRO').Custom('end_ityat')]ся под властью могущественного магната по имени [target_character.GetName] с тех пор, как далматские [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] одержали победу в Битве у Блиски в 1322 году. В своих новых владениях [Select_CString(target_character.IsFemale, 'она', 'он' )] делает так, чтобы #L [GetCountry('HUN').GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] постепенно теряли здесь власть. Как ни парадоксально, [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'отправила', 'отправил' )] посла к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору с предложением компромисса. [Select_CString(target_character.IsFemale, 'Она готова', 'Он готов' )] официально признать, что #L [GetCountry('HUN').GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] обладают властью над этой территорией, и присягнуть на верность трону, однако взамен [Select_CString(target_character.IsFemale, 'она', 'он' )] требует, чтобы мы признали [Select_CString(target_character.IsFemale, 'её законной правительницей', 'его законным правителем' )] [GetCountry('CRO').Custom('CL_GEN')]."
 flavor_cro.1101.a: "Уния сохранится."
 flavor_cro.1101.b: "Узаконим [Select_CString(target_character.IsFemale, 'её', 'его' )] власть."
 flavor_cro.1101.b.entry: "Узаконим его власть."
 flavor_cro.1102.title: "[GetCountry('HUN').GetNameWithNoTooltip] отверга[GetCountry('HUN').Custom('end_etyut')] наши притязания"
 flavor_cro.1102.desc: "Наш посол вернулся с тревожными известиями. [GetCountry('HUN').GetAdjective]ие [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] отвергли предложение признать [Select_CString(target_character.IsFemale, 'нашу госпожу законной правительницей', 'нашего господина законным правителем' )] #ONCLICK:COUNTRY,[GetCountry('CRO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRO').Custom('CL_tt')],X [GetCountry('CRO').Custom('CL_GEN')|L]#!#!, настаивая на том, что [ROOT.GetCountry.GetFlavorRank|l] явля[ROOT.GetCountry.Custom('endrank_etyut')]ся неотъемлемой частью унии. И хотя при #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе многие согласны, что тут ничего не изменить, кое-кто предлагает крайние меры: [target_character.GetName] [Select_CString(target_character.IsFemale, 'должна', 'должен' )] аннулировать договор Pacta Conventa, связывающий наш трон [GetCountry('HUN').Custom('end_predlog_sso')] [GetCountry('HUN').Custom('CL_INST')], и короновать себя в качестве [Select_CString(target_character.IsFemale, 'первой', 'первого' )] за более чем два столетия [Select_CString(target_character.IsFemale, 'местной королевы', 'местного короля' )] [GetCountry('CRO').Custom('CL_GEN')]."
 flavor_cro.1102.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]."
 flavor_cro.1102.a.entry: "$common_string_nothing_we_can_do_about_it$"
 flavor_cro.1102.b: "Аннулируем Pacta Conventa, а корону пусть заберёт [target_character.GetLastNameWithNoTooltip]!"
 flavor_cro.1102.b.entry: "Аннулируем Pacta Conventa и коронуем его!"
 flavor_cro.1103.title: "[GetCountry('CRO').GetNameWithNoTooltip] аннулиру[GetCountry('CRO').Custom('end_etyut')] Pacta Conventa"
 flavor_cro.1103.desc: "После нашего отказа признавать власть [Select_CString(target_character.IsFemale, 'этой узурпаторши', 'этого узурпатора' )] над #ONCLICK:COUNTRY,[GetCountry('CRO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRO').Custom('CL_tt')],X [GetCountry('CRO').Custom('CL_INST')|L]#!#! [target_character.GetName] [Select_CString(target_character.IsFemale, 'решила', 'решил' )] пойти на куда более радикальные меры, чем кто-либо мог предвидеть. [GetCountry('CRO').GetName] объявил[GetCountry('CRO').Custom('end_fem')] о соглашении Pacta Conventa, благодаря которому аннулированные #L [GetCountry('HUN').GetAdjective|l]ие#! [GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] будут связаны с этой частью нашей державы. Кроме того, теперь [target_character.GetLastNameWithNoTooltip] — их [Select_CString(target_character.IsFemale, 'новая', 'новый' )] [GetCountry('CRO').GetGovernment.GetRulerTitle|l]!"
 flavor_cro.1103.a: "Мы не допустим подобного своеволия!"
 flavor_cro.1103.b: "Мы не будем вмешиваться."
