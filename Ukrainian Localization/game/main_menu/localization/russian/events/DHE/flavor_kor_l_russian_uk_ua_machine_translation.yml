l_russian:
  flavor_kor.1.title: "Влада монголів"
  flavor_kor.1.desc: "У фатальному 1231 році монголи розпочинають війну з #L [ROOT.GetCountry.GetAdjective|l]им#! народом, яка триває довгих 39 років. Зрештою, втративши можливість чинити опір через гостру нестачу людей та ресурсів, [ROOT.GetCountry.Custom('rank_ru_DAT')|l] [ROOT.GetCountry.Custom('CL_DAT')] довелося схилитися перед загарбниками. [GetCountry('CHI').GetLongName] — тепер сюзерен цієї країни.\n\nБільшість ключових посад у нашому уряді обіймають #L [GetCountry('MGE').GetAdjective|l]і#! аристократи: вони визначають політику нашої країни та нав'язують нам #TOOLTIP:GOVERNMENT_REFORM,son_in_law_rule,X #L правило «зятя»#!#!.\n\nОднак розквіт не може тривати вічно, і сам час грає проти монголів. Неминуче падіння їхньої імперії вже не за горами, але, щоб по-справжньому звільнитися від [GetCountry('MGE').GetAdjectiveWithNoTooltip|l]их оков, ми повинні розібратися з тими, хто смикає за ниточки всередині нашої країни."
  flavor_kor.1.a: "Ми звільнимося з-під гніту цих варварів!"
  kor_hostile_attitude: "Взаємна ворожнеча"
  flavor_kor.1.b: "Що з нами станеться без патронажу монголів?"
  kor_friendly_attitude: "Взаємна приязнь"
  flavor_kor.1.a.at: "#R Поки #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольські#!#! [Concept('character', 'персонажі')|e]-[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] залишаються при нашому дворі, періодично відбуватимуться [Concept('events', 'події')|e], що ведуть до обмеження влади нашого уряду та втрати ресурсів.#!"
  flavor_kor.1.a.tt: "Ми обрали ворожнечу з [GetCountry('CHI').Custom('CL_INST')], і думка сторін одна про одну погіршилася на [ShowBiasValue('kor_hostile_attitude')|0]. Коли нашу країну покинуть усі #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольські#!#! [Concept('characters', 'піддані')|e]-[THIS.GetCountry.GetGovernment.GetEstateName('nobles_estate')], ми зможемо скасувати #TOOLTIP:GOVERNMENT_REFORM,son_in_law_rule,X #L правило «зятя»#!#!."
  flavor_kor.1.b.tt: "Ми обрали дружбу з [GetCountry('CHI').Custom('CL_INST')], і думка обох сторін одна про одну покращилася на [ShowBiasValue('kor_friendly_attitude')|0]. Якщо #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольські#!#! [THIS.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дочекаються від нас виконання їхніх вимог, зв'язок між нашими країнами стане міцнішим."
  flavor_kor.1.a.TIP: "Ви можете скористатися [Concept('character_interactions', 'взаємодією')|e] #TOOLTIP:CHARACTER_INTERACTION,banish_character,X #L «Вигнання»#!#!, щоб позбутися тих, хто підтримує [GetCountry('CHI').Custom('CL_ACC')]."
  flavor_kor.2.title: "Вимоги монгольських аристократів"
  flavor_kor.2.desc: "#TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L Монгольські#!#! аристократи обіймають ключові посади в уряді, і ресурси нашої країни перебувають у їхніх руках…"
  flavor_kor.2.desc.demand: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'яка', 'який')] наразі представляє #L [target_country.GetAdjective|l]і#! інтереси в нашій країні, [Select_CString(target_character.IsFemale, 'озвучила', 'озвучив')] нову вимогу своїх володарів."
  flavor_kor.2.desc.gold: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ [target_country.GetGovernment.GetRulerTitle|U] збирається витратити наші золоті резерви на власні потреби."
  flavor_kor.2.desc.prestige: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ [target_country.GetAdjectiveWithNoTooltip|U]і влада цікавиться нашими найціннішими артефактами. Вони хочуть привласнити їх собі заради підвищення престижу."
  flavor_kor.2.desc.diplomatic_actions: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ Наші дипломати потрібні при [target_country.GetAdjectiveWithNoTooltip|l]ому дворі."
  flavor_kor.2.desc.estate_satisfaction: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ [target_country.GetGovernment.GetRulerTitle|U] [target_country.Custom('CL_GEN')] вимагає беззаперечного підпорядкування від усіх наших станів. Наші піддані, звісно, будуть від цього не в захваті."
  flavor_kor.2.desc.government_power: "$flavor_kor.2.desc$\n\n$flavor_kor.2.desc.demand$ [ROOT.GetCountry.GetGovernment.GetRulerTitle|U] вирушить до [target_country.GetCapital.Custom('LR_ACC')|l] [target_country.GetCapital.GetName], де [target_country.GetGovernment.GetRuler.GetName|l] очікує публічного колінопреклоніння. Яка принизлива вимога!"
  flavor_kor.2.a: "Нехай буде так, як хоче [target_country.GetGovernment.GetRulerTitle|l]."
  flavor_kor.2.b: "Ми не схилимо колін перед монголами!"
  flavor_kor.3.title: "Прибуття чергового монгольського аристократа"
  flavor_kor.3.desc: "[mongol_aristocrat.GetName] стане [Select_CString(mongol_aristocrat.IsFemale, 'новою представницею', 'новим представником')] #L [target_country.GetAdjective|l]ого#! двору в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName] і стежитиме за діяльністю нашого уряду."
  flavor_kor.3.a: "Ми приймемо [Select_CString(mongol_aristocrat.IsFemale, 'її', 'його')] в столиці."
  flavor_kor.3.b: "[target_country.GetGovernment.GetRulerTitle] знову засилає своїх шпигунів. З нас досить!"
  flavor_kor.4.title: "Свобода від монгольських оков"
  flavor_kor.4.desc: "Ціле століття #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монголи#!#! правили #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, але тепер наш народ нарешті вільний! Степові завойовники втратили контроль над [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]им урядом, що призвело до розквіту нашої політики та культури!\n\nЗвісно, ситуація в Китаї залишається складною, і нам ще належить дізнатися, куди заведе нас [target_character.GetName], але поки ми можемо вдосталь насолодитися знову здобутою незалежністю!"
  flavor_kor.4.a: "Хай живе [ROOT.GetCountry.GetNameWithNoTooltip]!"
  flavor_kor.5.title: "Зміцнення зв’язків з монголами"
  flavor_kor.5.desc: "Завдяки своїй беззаперечній підтримці #L [target_country.GetAdjective]ого#! трону ми заслужили довіру як #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольських#!#! правителів, так і їхнього народу. Тепер долі [ROOT.GetCountry.Custom('CL_GEN')] та [target_country.Custom('CL_GEN')] тісно переплелися — на добро чи на зло."
  flavor_kor.5.a: "Сподіваємося, нас гідно нагородять за вірність."
  kor_upgrade_son_in_law: "[ShowGovernmentReformName('son_in_law_rule')] буде укріплено: зникнуть деякі штрафи та з’являться нові переваги."
  has_upgraded_son_in_law: "[ShowGovernmentReformName('son_in_law_rule')] закріплено [Concept('event', 'подією')|e] «$flavor_kor.5.title$»."
  not_has_upgraded_son_in_law: "#TOOLTIP:GOVERNMENT_REFORM,son_in_law_rule,X #L Правило «зятя»#!#! НЕ закріплено [Concept('event', 'подією')|e] «$flavor_kor.5.title$»."
  flavor_kor.6.title: "[target_character.GetNameWithNoTooltip] з [target_country.Custom('CL_GEN')"
  flavor_kor.6.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'уродженка', 'уродженець')] #ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'захопила', 'захопив')] владу над #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!. В силу свого [from_country.GetAdjectiveWithNoTooltip|l]ого коріння [Select_CString(target_character.IsFemale, 'вона', 'він')] має непідробний інтерес до долі [from_country.Custom('rank_ru_GEN')|l], тож у нас з’явилася безпрецедентна можливість нагадати [Select_CString(target_character.IsFemale, 'правительці', 'правителю')] [Select_CString(target_character.IsFemale, 'про її', 'про його')] коріння та випросити щедрий подарунок від Піднебесної."
  flavor_kor.6.historical_info: "Імператриця Кі з родини Кі — уродженка Хенджу (нині Коян), одного з міст країни Корьо. Попри зусилля недоброзичливців, вона стала наложницею Тогон-Темура, імператора з династії Юань, полонивши його своєю красою та талантами. Коли Тогон-Темур відсторонився від державних справ, Кі, вправно маневруючи у придворній політиці, зміцнила свій вплив і домоглася того, що її син отримав статус спадкоємця. Її дії — особливо претензія на право спадкування, — викликали напругу між Корьо та Юанями, що призвело до конфлікту та підірвало стабільність Корьо.\n\nВ умовах запеклої боротьби за владу Конмін, король Корьо, розірвав відносини з Юанями, і реакція імператриці Кі не забарилася. Пізніше в результаті внутрішньосімейної боротьби Кі отримала статус головної імператриці, однак після падіння династії в 1368 році вона вдарилася в біги, пов’язавши свою долю з крахом дому Юань. Попри те, що Кі встигла ненадовго побути головною імператрицею, після смерті Тогон-Темура відомості про те, де пройшли її останні роки, перетворилися на таємницю, зникнувши з історичних архівів."
  flavor_kor.6.a: "Ми звернемося до імператриці!"
  flavor_kor.6.b: "[target_country.GetGovernment.GetRulerTitle|U] нас не цікавить."
  flavor_kor.7.title: "Прохання [from_country.Custom('CL_GEN')]"
  flavor_kor.7.desc: "[target_character.GetName] керує #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!, однак походить з #ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_GEN')|L]#!#! — [from_country.Custom('rank_ru_GEN')|l] у підпорядкуванні [target_country.Custom('rank_ru_GEN')|l]. [Select_CString(target_character.IsFemale, 'Її', 'Його')] зв’язок з владою [from_country.Custom('CL_GEN')] досі сильний, попри найвищу посаду в уряді [target_country.Custom('CL_GEN')].\n\nНещодавно [from_country.GetGovernment.GetRuler.GetName|l] [Select_CString(from_country.GetGovernment.GetRuler.IsFemale, 'звернулася', 'звернувся')] до нас з проханням про подарунок, який піде на благо [from_country.Custom('CL_DAT')]."
  flavor_kor.7.a: "Для [from_country.Custom('CL_GEN')] немає подарунка кращого за золото."
  flavor_kor.7.a.tt: "#ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_DAT')|L]#!#! дістанеться [Concept('gold', 'золото')|e]"
  flavor_kor.7.b: "Ми подаруємо їм наші цінні артефакти."
  flavor_kor.7.b.tt: "#ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_DAT')|L]#!#! дістанеться [Concept('prestige', 'престиж')|e]"
  flavor_kor.7.zzz: "Подарунки їм ні до чого."
  flavor_kor.8.title: "[target_country.GetGovernment.GetRulerTitle|U] обдаровує нас"
  flavor_kor.8.desc: "[target_country.GetGovernment.GetRulerTitle|U] [target_country.GetGovernment.GetRulerOrRegent.GetShortName] шле нам свій уклін!"
  flavor_kor.8.desc.gold: "$flavor_kor.8.desc$ Нам пожалували скриню, доверху набиту золотом. Цих грошей [from_country.Custom('CL_DAT')] вистачить на ціле десятиліття!"
  flavor_kor.8.desc.prestige: "$flavor_kor.8.desc$ До нашого двору прибули розкішні артефакти із самого серця Китаю. Такі символи престижу суттєво підвищать наш авторитет в очах інших країн."
  flavor_kor.8.a: "Хай живе [target_country.GetGovernment.GetRuler.GetShortNameWithNoTooltip|l], [Select_CString(target_country.GetGovernment.GetRuler.IsFemale, 'істинна дочка', 'істинний син')] [from_country.Custom('CL_GEN')]!"
  flavor_kor.9.title: "[target_country.GetGovernment.GetRulerTitle|U] відмовляє нам!"
  flavor_kor.9.desc: "Ми нарешті отримали звістки з [target_country.GetCapital.Custom('LR_GEN')|l] [target_country.GetCapital.GetName]. [target_country.GetGovernment.GetRuler.GetName|U] не [Select_CString(target_country.GetGovernment.GetRuler.IsFemale, 'побажала', 'побажав')] відправити подарунок чи допомогу своїй батьківщині, тим самим повністю відрікшись від #L [from_country.GetAdjective|l]их#! коренів."
  flavor_kor.9.a: "Яка ницість, яка зрада…"
  flavor_kor.10.title: "Довгоочікувана нагода"
  flavor_kor.10.desc: "Нам знову посміхнулася удача! Один із генералів повідомляє, що наші військові таємними каналами хитрістю здобули союзника при #L [GetCountry('SSG').GetAdjective|l]ому#! дворі.\n\nЗараз саме час завдати швидкого й рішучого удару по півночі та повернути вкрадені в нас території, доки в справу не встигли втрутитися чиновники з #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#!."
  flavor_kor.10.a: "До зброї!"
  flavor_kor.10.b: "Ні, ми не станемо нападати без приводу."
  flavor_kor.11.title: "Ми відвоювали північ"
  flavor_kor.11.desc: "Після довгих десятиліть приниження ми нарешті повернули #TOOLTIP:PROVINCE_DEFINITION,hwaju_province,X #L Хваджу#!#! під #L [GetCountry('KOR').GetAdjective|l]і#! знамена та розібралися з мерзенними #L [GetCountry('SSG').GetAdjective|l]ими#! загарбниками.\n\nТаку подію варто було відсвяткувати! Ми організували в столиці грандіозний парад нашої переможної армії, подарувавши жителям нашої країни можливість побачити та привітати героїв."
  flavor_kor.11.a: "Приголомшливо!"
  flavor_kor.12.title: "Рецепт чорного пороху"
  flavor_kor.12.desc: "#italic Ба-бах#!! [choe_scope.GetName] не прогадав: вибух такої сили не залишив байдужим жодного придворного! Прагнучи покінчити з нескінченними нападами #L [target_country.GetAdjective|l]их#! піратів та надихнувшись феєрверками на зустрічах з #L [GetCountry('CHI').GetAdjective|l]ими#! дипломатами, ця видатна людина загорілася ідеєю покращити боєздатність нашої армії та роздобути рецепт чорного пороху.\n\nЙого природна хитрість та любов до експериментів незабаром принесли свої плоди, і він зумів відтворити чорний порох з потрібної сировини. Тепер [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] має в своєму розпорядженні великий винахід, який так ретельно оберігає влада [GetCountry('CHI').Custom('CL_GEN')]."
  flavor_kor.12.a: "Чудово! Ми надамо вченому кошти та майстерню."
  flavor_kor.12.b: "Ми не зрадимо [GetCountry('CHI').Custom('CL_ACC')]. Проженіть його геть!"
  flavor_kor.13.title: "Поширення конфуціанства"
  flavor_kor.13.desc: "Довгі століття #TOOLTIP:RELIGION,$mahayana_tt$,X #L східний буддизм#!#! був на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! державною релігією та служив нам моральним орієнтиром. Вплив #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизму#!#! простягався далеко за межі віри: він перетворився на свого роду організацію, члени якої, суцільно [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], володіли на території [ROOT.GetCountry.Custom('rank_ru_GEN')|l] величезною владою, авторитетом і, звичайно, великими володіннями.\n\nПісля завоювання [ROOT.GetCountry.Custom('CL_GEN')] монголами на те місце, яке раніше займали священники, прийшла стара знать. Так з'явився новий стан, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а в моду увійшов інтерес до давньої китайської літератури та до вчення Конфуція. Дивлячись на те, з якою швидкістю ідеї Конфуція поширюються країною, можна припустити, що нас чекає радикальна зміна віри та обрядів…"
  flavor_kor.13.a: "Подивимося, куди це нас заведе…"
  flavor_kor.13.a.tt: "У нас відбуватиметься більше [Concept('events', 'подій')|e], що стосуються #Y конфуціанства#!"
  flavor_kor.14.title: "Зародження неоконфуціанства"
  flavor_kor.14.desc: "[ROOT.GetCountry.GetLongName] — політичній стабільності тут прийшов кінець, коли на арену вийшли так звані неоконфуціанці. Це освічені люди з сіл та селищ, а консервативні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], що досі керували країною, мають до них мало стосунку. Віддаючи належне безсумнівним заслугам цих людей, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] постійно запрошує їх до уряду. Однак неоконфуціанці висловлюють надто радикальні ідеї та постійно борються зі старою аристократією за посади та землі, що лише посилює напругу між [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ими політичними силами."
  flavor_kor.14.a: "Настають неспокійні часи…"
  flavor_kor.14.a.tt: "Вам доступно наступне:\n • [Concept('advances', 'поступ')|e] #TOOLTIP:ADVANCE_DEFINITION,confucian_academy_advance,X #L «Конфуціанська академія»#!#! для епохи #Y Відродження#!\n • [Concept('estate_privileges', 'станові привілеї')|e] #TOOLTIP:ESTATE_PRIVILEGE,petty_bureaucracy,X #L «Мала бюрократія»#!#! та #TOOLTIP:ESTATE_PRIVILEGE,scholar_officials,X #L «Вчені-чиновники»#!#!\n • [Concept('policy', 'політика')|e] #TOOLTIP:LAW,imperial_examination_law,X #L «Система іспитів»#!#! для [Concept('law', 'закону')|e] #TOOLTIP:LAW,bureaucracy_law,X #L «Бюрократія»#!#!"
  has_neo_confucianism_tt: "Відбулася [Concept('event', 'подія')|e] #Y «Зародження неоконфуціанства»#!"
  flavor_kor.15.title: "Переворот на території [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_kor.15.desc: "[old_ruler.GetName] править настільки невміло, що навіть прості жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! втомилися таке терпіти. В особі талановитого генерала на ім'я [target_character.GetName] і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] бачать надію на якнайшвидше вирішення ситуації.\n\nСьогодні [target_character.GetShortNameWithNoTooltip] нарешті [Select_CString(target_character.IsFemale, 'перейшла', 'перейшов')] до дії: [Select_CString(target_character.IsFemale, 'її', 'його')] армія підняла заколот проти нинішньої влади."
  flavor_kor.15.a: "Це стане кінцем для старої династії…"
  flavor_kor.15.b: "Не можна допустити, щоб зрадники перемогли!"
  flavor_kor.15.b.tt: "На всіх #TOOLTIP:POPTYPE,nobles,X #L знатних#!#! у всіх [Concept('location', 'місцевостях')|e], де показник культурної єдності перевищує #Y 75%#!, подіють такі ефекти:"
  joseon_pretender: "Армія претендента Лі"
  joseon_pretender_scope: "Армія претендента Лі"
  flavor_kor.16.title: "Кьонгук теджон"
  flavor_kor.16.desc: "Усі закони [ROOT.GetCountry.Custom('CL_GEN')] містяться у грандіозному збірнику #italic Кьондже Юкчжон#!, або #italic «Шість кодексів управління»#!. Хоча ці правила значною мірою не втратили актуальності, вони потихеньку починають застарівати. Якщо ми переглянемо книгу, оновивши, змінивши та видаливши частину застарілих положень, це послужить на благо [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ому народу та всій нашій країні. Вчені та чиновники вже готові до створення нової версії збірника під назвою #italic Кьонгук Теджон#! — #italic «Державний кодекс»#!. Однак ця ініціатива дорого нам обійдеться."
  flavor_kor.16.a: "Ми вкладемо кошти в перегляд збірника."
  flavor_kor.16.b: "Нам це не по кишені."
  flavor_kor.17.title: "$samsa_system$"
  flavor_kor.17.desc: "$samsa_system_desc$ Самса послужить заміною системі трьох департаментів, на якій ось уже кілька десятиліть будується #L [ROOT.GetCountry.GetAdjective|l]а#! бюрократія. Однак проведення такої реформи вимагатиме від нас серйозних витрат як фінансових, так і людських ресурсів."
  flavor_kor.17.a: "Ми забезпечимо чиновників усім необхідним."
  flavor_kor.17.b: "Ми не можемо собі цього дозволити."
  flavor_kor.18.title: "Армія справедливості"
  flavor_kor.18.desc: "Втомившись від руйнувань, які принесла [target_war.GetName], жителі провінції [target_location.GetProvince.GetName] вирішили протистояти загарбникам і сформували так звану «#italic $flavor_kor.18.title$#!». До цього народного ополчення входять [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], готові віддати свої життя за батьківщину. Вкотре простолюд стає на захист [ROOT.GetCountry.Custom('CL_GEN')]. Їхня сміливість гідна захоплення. Ми зробимо все, щоб їхня жертва не була забута."
  flavor_kor.18.a: "Справжні герої."
  flavor_kor.18.b: "Нам не потрібна їхня допомога."
  flavor_kor.19.title: "Крадіжка насіння бавовни"
  flavor_kor.19.desc: "Наш посол [target_character.GetName] нещодавно [Select_CString(target_character.IsFemale, 'повернулася', 'повернувся' )] з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, де [Select_CString(target_character.IsFemale, 'виконувала', 'виконував' )] дипломатичні доручення. Це саме по собі похвально, але те, що [Select_CString(target_character.IsFemale, 'їй', 'йому' )] вдалося роздобути новий сорт #TOOLTIP:GOODS,cotton,X #L бавовни#!#!, який краще пристосований до клімату #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, воістину гідно захоплення. [target_character.GetNameWithNoTooltip|U] вже [Select_CString(target_character.IsFemale, 'посадила', 'посадив' )] його у своєму рідному місті [target_location.GetName]. Можливо, нам варто вирощувати його по всій країні."
  flavor_kor.19.a: "Посадимо нову бавовну."
  flavor_kor.19.b: "Затримати дипломата!"
  flavor_kor.20.title: "Боротьба між фракціями"
  flavor_kor.20.desc: "[ROOT.GetCountry.GetLongName] на порозі нової епохи. Яку фракцію підтримає [new_ruler.GetName] під час свого правління?"
  flavor_kor.20.common_introduction: "Зараз наш двір розколотий на дві протиборчі фракції."
  flavor_kor.20.desc_sarim_hungu: "$flavor_kor.20.desc$\n\n$flavor_kor.20.common_introduction$: [ShowModifier('kor_support_sarim_modifier')] та [ShowModifier('kor_support_hungu_modifier')]. До першої входять консервативні вчені, що гаряче підтримують оновлене конфуціанство, а до другої — прихильники посилення [ROOT.GetCountry.GetGovernment.GetAdjective]ої влади."
  kor_description_of_early_factions: "$flavor_kor.20.common_introduction$: [ShowModifier('kor_support_gwan_hak_modifier')] та [ShowModifier('kor_support_jeol_eui_modifier')]. До першої входять визнані вчені, що прагнуть реформувати чиновницький апарат. Крім того, вони вважають, що [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] та [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] повинні врівноважувати одне одного. Учасники другої фракції виступають за збереження статусу-кво та #TOOLTIP:SOCIETAL_VALUE,traditionalist_vs_innovative,X #L традицій#!#!."
  flavor_kor.20.desc_gwan_hak_jeol_eui: "$flavor_kor.20.desc$\n\n$kor_description_of_early_factions$"
  flavor_kor.20.a: "У нас є свої фаворити."
  flavor_kor.20.b: "Вибір уже зроблено!"
  kor_until_ruler_death: "Доки не буде обрано іншу корейську фракцію"
  kor_faction_name_sarim: "Сарім"
  kor_faction_name_hungu: "Хунгу"
  kor_faction_name_jeol_eui: "Чоль-И"
  kor_faction_name_gwan_hak: "Кван-Хак"
  flavor_kor.21.title: "Поява $kor_faction_name_jeol_eui$ та $kor_faction_name_gwan_hak$"
  flavor_kor.21.desc: "Зміни при дворі спровокували розкол серед чиновників, що призвів до появи двох ідеологічно протилежних фракцій. $kor_description_of_early_factions$"
  flavor_kor.21.a: "Візьмемо до відома."
  flavor_kor.22.title: "Поява фракцій $kor_faction_name_sarim$ та $kor_faction_name_hungu$"
  flavor_kor.22.desc: "Недавні події призвели до розпаду фракції [ShowModifier('kor_support_gwan_hak_modifier')]. Багато її колишніх учасників створили нову фракцію [ShowModifier('kor_support_hungu_modifier')], яка відрізняється від $kor_faction_name_gwan_hak$ більшим наголосом на владу короля. Решта ж приєдналися до оновленої фракції [ShowModifier('kor_support_jeol_eui_modifier')], яка відтепер називається [ShowModifier('kor_support_sarim_modifier')]."
  flavor_kor.22.a: "$flavor_kor.21.a$"
  flavor_kor.23.title: "Південна столиця"
  flavor_kor.23.desc: "[target_location.GetRank.GetName] [target_location.GetName] переживає небувалий розквіт. Деякі придворні пропонують перенести столицю туди і перейменувати [target_location.Custom('LR_ACC')|l] на $hanseong$. Інші ж вважають, що [current_capital.GetName] більше підходить на роль столиці. Як нам вчинити?"
  flavor_kor.23.a: "Назавжди переїдемо до південної столиці."
  flavor_kor.23.b: "[current_capital.GetNameWithNoTooltip] — наш дім."
  flavor_kor.24.title: "Похід проти [target_country.Custom('CL_GEN')]"
  flavor_kor.24.desc: "Після падіння Пархе багато споконвічно #TOOLTIP:CULTURE,$korean_culture_tt$,X #L корейських#!#! територій на півночі були захоплені #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольськими#!#! та #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженськими#!#! племенами. Тепер ми вільні від кайданів і хочемо розширити свої володіння. Заради цього ми вступили в конфлікт [target_country.Custom('predlog_sso')] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L], чия провінція [target_province.GetName] лежить на шляху до північного хребта."
  flavor_kor.24.a: "Проженемо їх геть!"
  flavor_kor.24.b: "Ця війна лише зруйнує життя селян."
  flavor_kor.25.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kor.25.desc: "[Select_CString(target_character.IsFemale, 'Відома придворна поетеса', 'Відомий придворний поет' )] [target_character.GetName] нещодавно [Select_CString(target_character.IsFemale, 'написала', 'написав' )] чергову поему. За час свого перебування при дворі [Select_CString(target_character.IsFemale, 'вона встигла', 'він встиг' )] скласти безліч чудових творів. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] обдарованість була очевидна з ранніх років, але [target_character.GetWomanMan] навряд чи досягне великих висот у нашому суспільстві. Буде шкода, якщо такий талант пропаде."
  flavor_kor.25.a: "Візьмемо [Select_CString(target_character.IsFemale, 'її', 'його' )] під своє крило."
  flavor_kor.25.b: "Не найрозумніше вкладення коштів, хоча ідея цікава."
  flavor_kor.26.title: "Єдинообразний земельний податок"
  flavor_kor.26.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] — головні жертви нашої застарілої податкової системи. Нова реформа, названа [ShowGovernmentReformName('kor_daedongbeob')], або закон про єдиний податок, покликана виправити цю несправедливість. Вона запровадить єдиний тариф і підвищить державні доходи від збору податків. Нарешті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] зможуть зітхнути спокійно: щоб вийти з податкового реєстру, їм більше не доведеться чекати, коли [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] куплять їхні землі."
  flavor_kor.26.historical_info: "У XVII столітті корейська економіка перебувала в жалюгідному стані. Щоб виправити це, старший державний радник І Вон-ік поступово реформував податкову систему, яка вже давно показала свою неефективність. Податок, що стягувався з домогосподарств, було замінено єдиним податком на орну землю. Податок на товари був обмежений певною часткою — це дозволило селянам, які ведуть власні справи, та великим купцям виробляти товари та продавати надлишки. Завдяки цим змінам селяни стали платити менше податків, прибуток країни зріс, а торгівля помітно пожвавилася."
  flavor_kor.26.a: "Впровадимо цю реформу."
  flavor_kor.26.b: "Повернемося до неї пізніше."
  flavor_kor.27.title: "Фінансове майбутнє [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_kor.27.desc: "На думку учасників ради, суспільство #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! поступово стає аграрним. Срібні вази #italic инбьон#! відходять у минуле. Щоб економіка не розвалилася, потрібно провести фінансову реформу. Зараз наша фінансова стабільність тримається на #TOOLTIP:POLICY,kor_chinese_currency,X #L китайській валюті#!#!. У нас є кілька варіантів: використовувати її частіше, почати карбувати свої #TOOLTIP:POLICY,kor_metal_coinage,X #L металеві монети#!#! або ж ввести в обіг паперові гроші #TOOLTIP:POLICY,kor_jeohwa,X #L чохва#!#!, щоб стимулювати торгівлю. Якщо всі ці заходи не спрацюють, ми завжди можемо перейти до #TOOLTIP:POLICY,kor_barter_economy,X #L бартерної економіки#!#!, що теж не так вже й погано."
  flavor_kor.27.a: "Будемо карбувати металеві монети."
  flavor_kor.27.b: "Ввеземо більше китайської валюти."
  flavor_kor.27.c: "Надрукуємо паперові гроші."
  flavor_kor.27.d: "Немає нічого поганого в бартерній економіці."
  flavor_kor.28.title: "$STATIC_MODIFIER_NAME_kor_hall_of_worthies_modifier$"
  flavor_kor.28.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [target_character.GetName] збирається заснувати придворну академію, яка стане опорою для [Select_CString(target_character.IsFemale, 'неї', 'нього' )] та [Select_CString(target_character.IsFemale, 'її', 'його' )] нащадків. У цьому інституті, що отримав назву «[ShowModifier('kor_hall_of_worthies_modifier')]», працюватимуть найкращі уми [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Якщо вкласти достатньо коштів у дослідження, вони досягнуть значних успіхів у науці та управлінні країною."
  flavor_kor.28.a: "Створимо Зал гідних."
  flavor_kor.28.b: "У нас зараз складнощі з фінансами."
  flavor_kor.29.title: "$veritable_records_of_joseon$"
  flavor_kor.29.desc: "Впливові сановники #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#! складають і зберігають докладні історичні описи попередніх правлячих династій, звані «Достовірними хроніками». Завдяки їм правителі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#! можуть ретельно ознайомитися з успіхами та невдачами своїх попередників. Подібні #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніки#!#! про те, як [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] керує країною, не завадило б вести й нам. Але, на відміну від сусідів, займатися цим ми будемо постійно."
  flavor_kor.29.a: "Виділимо кошти на ведення хроніки."
  flavor_kor.29.b: "Ми не можемо собі дозволити додаткові витрати."
  flavor_kor.30.title: "[target_character.GetNameWithNoTooltip] падає з коня"
  flavor_kor.30.desc: "Цей день не віщував нічого поганого. [target_character.GetName] за своїм звичаєм [Select_CString(target_character.IsFemale, 'виїхала', 'виїхав' )] на полювання, осідлавши вірного скакуна, але незабаром світлий день виявився несподівано затьмареним: [ROOT.GetCountry.GetGovernment.GetAdjective|l]а тварина раптом спіткнулася, і [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'впала', 'впав' )] на землю, вразивши всіх навколишніх придворних неймовірним кульбітом. Серед присутніх, зрозуміло, виявився і старший хроніст, чий почесний обов'язок — заносити все, що відбувається, у свою працю під назвою [target_work_of_art.GetName], хоч би яким ганебним воно не було. [ROOT.GetCountry.GetGovernment.GetRulerTitle], втім, абсолютно не бажає, щоб нащадки дізналися про цю подію."
  flavor_kor.30.a: "«А потім [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'наказала', 'наказав' )] не вносити це в хроніку»."
  flavor_kor.30.b: "Не дати хроністу написати про те, що сталося!"
  flavor_kor.31.title: "Сонгюнгван"
  flavor_kor.31.desc: "[ShowLawName('imperial_examination_law')] перебуває в застої — країні потрібні нові учні. Щоб заповнити всі порожні чиновницькі посади, ми збираємося створити в місцевості [target_location.GetName] — столиці країни — навчальний заклад, де відбиратимуться найбільш умілі та здібні."
  flavor_kor.31.a: "Заснувати заклад."
  flavor_kor.31.b: "У нас немає зайвих коштів."
  flavor_kor.32.title: "Небезпечний заколот"
  flavor_kor.32.desc: "Один із наших полководців на ім'я [target_character.GetName], якому вкрай [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'неприємна', 'неприємний' )] [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l], [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] взяти кермо влади у власні руки і [Select_CString(target_character.IsFemale, 'підняла', 'підняв' )] жорстокий заколот проти [ROOT.GetCountry.Custom('rank_ru_GEN')|l]! Тепер [target_country.GetLongName] у вогні, а [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] охоплений повстанням."
  flavor_kor.32.a: "Прокляті зрадники!"
  kor_mutiny: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'підняла', 'підняв' )] заколот у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#!."
  flavor_kor.33.title: "$tongguk_tonggam$"
  flavor_kor.33.desc: "Історія перших років існування #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! оповита численними таємницями. Якщо пустити все на самоплив, факти остаточно зникнуть з народної пам’яті. Щоб якось із цим боротися, [target_character.GetName] [Select_CString(target_character.IsFemale, 'почала', 'почав' )] складати хроніку ранньої історії #TOOLTIP:REGION,korea_region,X #L Кореї#!#!, однак щоб довести її до кінця, знадобляться кошти. #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L Хроніці#!#! вже придумано назву: $tongguk_tonggam$."
  flavor_kor.33.a: "Ми підтримаємо [Select_CString(target_character.IsFemale, 'її', 'його')] ініціативу."
  flavor_kor.33.b: "Зосередитися на інших справах."
  flavor_kor.34.title: "Заворушення в трьох портах"
  flavor_kor.34.desc: "Ми дозволяємо #TOOLTIP:CULTUREGROUP,japanese_group,X #L японським#!#! купцям вести торгівлю (нехай навіть з деякими обмеженнями) в деяких південних портах #TOOLTIP:REGION,korea_region,X #L Кореї#!#! — навіть у такому місці, як [target_location.GetRank.GetName|l] [target_location.GetName]. Однак ці люди невдячні й не цінують виявлену нами великодушність, а після того, як їх позбавили податкових пільг, навіть взялися за зброю. На щастя, наші війська швидко придушили кривавий бунт, і в [target_location.Custom('LR_PREP')|l] знову запанував спокій. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')], втім, вважають, що цього недостатньо, і закликають вжити суворіших заходів."
  flavor_kor.34.a: "Урізати торгові привілеї, якими користуються японці."
  flavor_kor.34.b: "Постаратися розрядити обстановку."
  kor_japanese_riot: "Бунт японців"
  flavor_kor.35.title: "$kor_cloud_dream_of_nine$"
  flavor_kor.35.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] останнім часом все частіше обговорює та читає [ShowWorkOfArtTypeName('novel')|l] $kor_cloud_dream_of_nine$ — твір, написаний алфавітом «[ShowAdvanceName('kor_hangeul_alphabet')|l]», а тому поширився і серед людей науки. Автор повісті невідомий, але прийнято вважати, що це [target_character.GetName]; втім, [Select_CString(target_character.IsFemale, 'сама вона', 'сам він' )] заперечує свою причетність. Хоча сам твір написаний чудово, мало хто зі схваленням поставиться до самого задуму написати казкову книгу, особливо хангілем."
  flavor_kor.35.a: "Яке диво!"
  flavor_kor.35.b: "Яка ганьба! Деякі межі ні в якому разі не можна порушувати."
  flavor_kor.36.title: "Палата перекладачів"
  flavor_kor.36.desc: "Незважаючи на постійний культурний обмін, #L [ROOT.GetCountry.GetCulture.GetLanguage.GetName|l]а#! мова залишається для наших сусідів абсолютно незбагненною. Неможливість порозумітися серйозно ускладнює нам переговори з іншими країнами, тому в кожній дипломатичній поїздці обов’язково має бути присутній перекладач, здатний налагодити спілкування. Роль ця настільки важлива, що і #L [ROOT.GetCountry.GetAdjective|l]а#! влада, і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] зокрема постановили: нам потрібне особливе відомство для підготовки перекладачів — помічників дипломатів і збирачів данини."
  flavor_kor.36.a: "Заснувати [ShowModifierWithNoTooltip('kor_sayeogwon')]."
  flavor_kor.36.b: "Впораємося і без них."
  flavor_kor.37.title: "Критика буддизму"
  flavor_kor.37.desc: "[target_international_organization.GetName] так надихає одного з наших вчених, що він написав цілий трактат, де виклав полемічні аргументи проти принципів буддизму. Публікація «Зводу критики буддизму» знаменує переломний момент — тепер ясно, що #L [ROOT.GetCountry.GetAdjective|l]е#! суспільство поступово схиляється до вірувань, які практикує [target_international_organization.GetNameWithNoTooltip]."
  flavor_kor.37.a: "Поширити трактат повсюдно."
  flavor_kor.37.b: "Засудити цю роботу."
  KOR_increase_favor_of_confucianism: "[Concept('international_organization_variable', 'Змінна')|e] «$sect_favor$» в об'єднання «[target_international_organization.GetName]» збільшиться на #g 5,0%#!."
  flavor_kor.38.title: "Протистояння принців"
  flavor_kor.38.desc: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Нинішня правителька', 'Нинішній правитель')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не має беззастережного наступника. Хоча формально [ROOT.GetCountry.GetGovernment.GetHeirTitle] — це [target_character2.GetName], [ROOT.GetCountry.GetGovernment.GetCourtTitle] все ще в напрузі. Все тому, що багато міністрів переконані: [target_character.GetName] має куди більші амбіції, ніж [Select_CString(target_character.IsFemale, 'її', 'його')] [Select_CString(target_character2.IsFemale, 'родичка', 'родич')]. Поки що до насильства не дійшло, але конфлікт неминучий — якщо тільки не втрутитися заздалегідь."
  flavor_kor.38.a: "[target_character.GetShortNameWithNoTooltip] більше заслуговує нашої підтримки."
  flavor_kor.38.b: "[ROOT.GetCountry.GetGovernment.GetHeirTitle|U], [target_character2.GetNameWithNoTooltip], отримає підтримку."
  flavor_kor.39.title: "Служіння Срединній країні"
  flavor_kor.39.desc: "Століттями нашим предкам з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! доводилося жити в підпорядкуванні #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!. У цьому є логіка: #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединна Країна#!#! володіє невичерпними ресурсами, а відкрита ворожнеча лише шкодила б інтересам обох сторін. Таке підпорядкування було взаємовигідним, але поставило нас у принизливе становище молодшого партнера, наблизивши #TOOLTIP:CULTURE,$korean_culture_tt$,X #L корейську#!#! культуру до #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#!, а не навпаки."
  flavor_kor.39.a: "Прийняти цю політику з усією серйозністю."
  flavor_kor.39.b: "Ми більше не будемо жити в тіні Китаю!"
  flavor_kor.40.title: "Заборона приватних армій"
  flavor_kor.40.desc: "У нинішньому становищі військові чини #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, переважно [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], мають повне право утримувати приватні армії та командувати ними. Це створює серйозну загрозу для [ROOT.GetCountry.Custom('rank_ru_GEN')|l] і може призвести до переворотів, громадянських війн та інших заворушень у майбутньому. Такий стан справ став об'єктом політики #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L централізації#!#!, яку проводить уряд та особисто [target_character.GetName]. Такі приватні армії необхідно приборкати."
  flavor_kor.40.a: "Ми обмежимо їхні права на утримання військ."
  flavor_kor.40.b: "Настав час це припинити."
  flavor_kor.41.title: "Протест проти хангиля"
  flavor_kor.41.desc: "Створення хангиля принесло величезну користь простому #L [ROOT.GetCountry.GetAdjective|l]у#! народу. На відміну від іноземного #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайського#!#! письма, відомого серед жителів [ROOT.GetCountry.Custom('CL_GEN')] як #italic ханча#!, новий алфавіт простий у вивченні, що підвищило загальну грамотність [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Однак поширення цих знань зустріло опір — [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] люто виступає проти нововведення."
  flavor_kor.41.a: "Кого хвилює, що думають ці [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_kor.41.b: "Поступитися елітам."
  flavor_kor.100.title: "[korRuler.GetNameWithNoTooltip] та експедиція на північ"
  flavor_kor.100.desc: "[korRuler.GetName] збирається організувати експедицію на північ, щоб покарати #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженів#!#!. Це вимагатиме ретельних приготувань та серйозних грошових витрат. До того ж, такі масштабні плани неможливо зберегти в таємниці. [Select_CString(korRuler.IsFemale, 'Вона', 'Він')] вважає, що ми підвищимо обороноздатність #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, якщо зміцнимо свої фортеці та модернізуємо бойову підготовку."
  flavor_kor.100.a: "Ми будемо готуватися до війни."
  flavor_kor.101.title: "Перша хвиля репресій проти вчених"
  flavor_kor.101.desc: "Колишній державний історик та [Select_CString(target_character.IsFemale, 'неоконфуціанка', 'неоконфуціанець')] [target_character.GetName], у [GetCurrentYear] році [Select_CString(target_character.IsFemale, 'яка обіймала', 'який обіймав')] посаду третього цензора, занадто далеко [Select_CString(target_character.IsFemale, 'зайшла', 'зайшов')] у своїй критиці чиновників та еліти. Нещодавно [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], проти яких [Select_CString(target_character.IsFemale, 'виступала', 'виступав')] [target_character.GetName], знайшли у [Select_CString(target_character.IsFemale, 'неї', 'нього')] помітки в #italic «Анналах короля Сонджона»#!, що носять, за їхнім твердженням, зрадницький характер. Тепер ці люди вимагають негайної страти третього цензора, а також страти або, щонайменше, вигнання [Select_CString(target_character.IsFemale, 'її', 'його')] прихильників-неоконфуціанців."
  flavor_kor.101.a: "Стратимо третього цензора!"
  flavor_kor.101.b: "Натомість нехай чистці піддадуться [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_kor.101.c: "Потрібно підтримувати баланс політичних сил."
  flavor_kor.102.title: "Друга хвиля репресій проти вчених"
  flavor_kor.102.desc: "Під час урочистого банкету міністр церемоній [target_character.GetName] [Select_CString(target_character.IsFemale, 'пролила', 'пролив')] вино на вбрання [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'правительки', 'правителя')]. Цій ситуації передував період запеклої міжфракційної боротьби та різкої критики влади, тож вороги міністра швидко розцінили її як зраду та злочин проти суверена. Вони вимагають, щоб [target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] численні союзники були негайно покарані, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] отримує чудову нагоду позбутися незручних чиновників."
  flavor_kor.102.a: "Покараємо всіх наших ворогів."
  flavor_kor.102.b: "Потрібно підтримувати баланс політичних сил."
  flavor_kor.103.title: "Третя хвиля репресій проти вчених"
  flavor_kor.103.desc: "Реформатор-неоконфуціанець [jo_gwang_jo.GetName] намагається привести уряд у відповідність до ідеалів Конфуція. Спочатку все йшло непогано, доки він не захопився критикою старих порядків. Його головною мішенню стала [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]: [jo_gwang_jo.GetName] послабив їхні позиції, забезпечивши переважання неоконфуціанців в уряді, і розлютив стару знать погрозами конфіскації земель.\n\nТепер [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] заявляє, що [jo_gwang_jo.GetNameWithNoTooltip] — мерзенний зрадник, який прагне посісти престол, а його реформи йдуть на шкоду суспільству та підривають основи країни. Сам же [jo_gwang_jo.GetNameWithNoTooltip] наполягає, що єдино вірне рішення — слідувати вже наміченому курсу, не звертаючи уваги на невдоволення. Яку сторону нам зайняти?"
  flavor_kor.103.a: "Покараємо неоконфуціанців!"
  flavor_kor.103.b: "Ми проведемо реформи за будь-яку ціну!"
  flavor_kor.104.title: "[yi_sun_sin.GetNameWithNoTooltip]"
  flavor_kor.104.desc: "Нещодавно [yi_sun_sin.GetName] [Select_CString(yi_sun_sin.IsFemale, 'постала', 'постав')] перед судом, що привернуло увагу всієї армійської верхівки. [yi_sun_sin.GetLastNameWithNoTooltip] вже досить довго перебуває у в'язниці за звинуваченням у дезертирстві та недбалості, однак, попри регулярні тортури, відмовляється визнати свою провину.\n\nБа більше, ця людина, здається, має природне чуття у військових питаннях, і в [Select_CString(yi_sun_sin.IsFemale, 'її', 'його')] послужному списку — безліч успішних нападів на ворогів, що насмілилися зазіхнути на наші кордони. [Select_CString(yi_sun_sin.IsFemale, 'Її', 'Його')] репутація [Select_CString(yi_sun_sin.IsFemale, 'суворої та сміливої воїтельки', 'суворого та сміливого воїна')] абсолютно не відповідає висунутим звинуваченням, і весь судовий процес виглядає як змова.\n\nЙдуть розмови про те, щоб понизити [Select_CString(yi_sun_sin.IsFemale, 'її', 'його')] на посаді до простого піхотинця, однак такий талант, безумовно, не повинен розтрачуватися даремно."
  flavor_kor.104.a: "Потрібно негайно відновити [Select_CString(yi_sun_sin.IsFemale, 'її', 'його')] в чині."
  flavor_kor.104.b: "Краще не заважати правосуддю."
  flavor_kor.200.title: "Воєначальник-поет"
  flavor_kor.200.desc: "При дворі ходять чутки про видатного молодого чоловіка з #TOOLTIP:LOCATION,gongju,X #L Конджу#!#!. Куртизанки розповідають, ніби цей юнак — талановитий воєначальник і вкрай обдарований поет, — животіє на незначній бюрократичній посаді в провінції.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] може запросити його до себе на службу. Чи варто це робити?"
  flavor_kor.200.a: "Запросимо юнака до двору."
  flavor_kor.200.b: "У нас повний двір юних обдарувань."
  flavor_kor.201.title: "Історія #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
  flavor_kor.201.desc: "[jong_seo.GetName] звернувся до нашої влади з пропозицією. [ROOT.GetCountry.GetLongName] — ця велика держава повинна бути вписана в аннали історії, і [jong_seo.GetName] хоче найняти групу вчених, які допоможуть йому скласти літопис нашої країни. Він говорить про це з неймовірним науковим запалом і наполягає, що таке вкладення не тільки принесе благо нащадкам, а й підвищить наш престиж."
  flavor_kor.201.a: "Ми виділимо кошти на цю працю."
  flavor_kor.201.b: "Нема чого витрачатися на марні книги."
  kor_acted_against_yuan: "Діє проти інтересів Юані"
