l_russian:
  flavor_hun_ser.1000.title: "Викуп за [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1000.desc: "За минулі століття [target_location.GetName] та околиці не раз змінювали господарів: цією стратегічно важливою територією, що дозволяє контролювати велику область навколо Дунаю, по черзі володіли кілька країн. #L [ROOT.GetCountry.GetAdjective|l]#!ою ця територія перестала бути у 1319 році, коли [target_location.GetRank.Custom('LR_VP')|l] захопила армія [target_country.Custom('CL_RP')]. Зараз ця держава є нашим союзником, тож ми можемо спробувати запропонувати їй золото в обмін на повернення [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]. Багато хто вважає, що ця ідея може увінчатися успіхом, адже поступка території союзнику не створить загрози для власної безпеки [target_country.Custom('CL_RP')]."
  flavor_hun_ser.1000.a: "Ми нічого не втратимо."
  flavor_hun_ser.1000.b: "Не варто цього робити."
  flavor_hun_ser.1000.a.tt: "Ми запропонуємо [target_country.Custom('CL_DP')] золото в обмін на повернення [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]. Якщо цю пропозицію буде прийнято, наслідки будуть такими:"
  flavor_hun_ser.1001.title: "Викуп за [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_hun_ser.1001.desc: "Наші #L [from_country.GetAdjective|l]#!і союзники звернулися до нас із вельми цікавою пропозицією. Вони хочуть повернути [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip] та околиці до складу [from_country.Custom('CL_RP')], оскільки до 1319 року ця територія належала їм, і вони вважають себе її законними власниками. На їхню думку, її передача не становить загрози для безпеки нашої держави."
  flavor_hun_ser.1001.a: "Справедлива вимога."
  flavor_hun_ser.1001.b: "Ні в якому разі!"
  flavor_hun_ser.1001.a.tt: "Ми передамо [from_country.Custom('CL_DP')] [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip]."
  flavor_hun_ser_response_common: "Наші придворні у столичнім місті [ROOT.GetCountry.GetCapital.GetName] щойно отримали відповідь на пропозицію продати [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip] за золото."
  flavor_hun_ser.1002.title: "Влада [target_country.Custom('CL_RP')] згодна повернути [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip]."
  flavor_hun_ser.1002.desc: "$flavor_hun_ser_response_common$ На щастя, наші #L [target_country.GetAdjective|l]#!і союзники прийняли пропозицію, тож [target_location.GetNameWithNoTooltip] знову під #L [ROOT.GetCountry.GetAdjective|l]#!им контролем."
  flavor_hun_ser.1002.a: "Чудово!"
  flavor_hun_ser.1003.title: "Влада [target_country.Custom('CL_RP')] відмовляється повернути [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip]."
  flavor_hun_ser.1003.desc: "$flavor_hun_ser_response_common$ На жаль, наші #L [target_country.GetAdjective|l]#!і союзники не прийняли пропозицію, тож [target_location.GetNameWithNoTooltip] як і раніше під їхнім контролем."
  flavor_hun_ser.1003.a: "Ну, ми хоча б спробували…"
  flavor_hun_ser.1003.b: "Отже, ми повернемо [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip] силою!"