l_russian:
  flavor_khm.1000.title: "Барай у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_khm.1000.desc: "#TOOLTIP:BUILDING_TYPE,khmer_baray,X #L Барай#!#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName] — найважливіше джерело води для [target_location.Custom('LR_GEN')]. В останні десятиліття ми пережили безліч потрясінь — зокрема, нас [Select_CString(target_old_ruler.IsFemale, 'покинула', 'покинув')] [target_old_ruler.GetName|l], — тож цей барай залишався без належної уваги й поступово занепадав. Якщо ми зараз нічого не зробимо, цей великий резервуар повністю прийде в непридатність."
  flavor_khm.1000.a: "Це надто дорого."
  flavor_khm.1000.b: "Ми займемося ремонтом."
  flavor_khm.1001.title: "Біда в Ангкорі"
  flavor_khm.1001.desc: "Тепер стан #TOOLTIP:BUILDING_TYPE,khmer_baray,X #L барая#!#! настільки жалюгідний, що цей величезний резервуар більше не можна використовувати для постачання."
  flavor_khm.1001.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_khm.1100.title: "Втрата пам'ятки мистецтва"
  flavor_khm.1100.desc: "Під час облоги [target_location.Custom('LR_GEN')|l] [target_location.GetName], яку здійснили [siege_leader.GetName] та [Select_CString(siege_leader.IsFemale, 'її', 'його')] військо, [target_art.GetName] позбавляється одного зі своїх найцінніших скарбів. Нам залишається лише оплакувати втрату прекрасної статуї, що уособлювала силу нашої віри."
  flavor_khm.1100.a: "[ROOT.GetCountry.Custom('common_string_disappointing')]"
  flavor_khm.1101.title: "Крадіжка пам'ятки мистецтва"
  flavor_khm.1101.desc: "Під час облоги [target_location.Custom('LR_GEN')|l] [target_location.GetName] до нас у руки потрапляє [target_art.GetName] — знаменита пам'ятка мистецтва. Прекрасна статуя вже прямує до столиці: [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetName] стане їй новим домом."
  flavor_khm.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"