l_russian:
 flavor_bos.1.title: "Стремление к независимости"
 flavor_bos.1.entry: "$flavor_bos.1.title$"
 flavor_bos.1.desc: "Когда [Select_CString(hun_robert.IsFemale, 'скончалась', 'скончался' )] [hun_robert.GetName], у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! появилась уникальная возможность избавиться от #L [GetCountry('HUN').GetAdjective|l]ого#! господства. Не желая рисковать головой в открытом восстании, [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'намерена', 'намерен' )] исподволь подточить влияние [GetCountry('HUN').Custom('CL_GEN')] и наладить дипломатические отношения с врагами этой страны, чтобы заручиться их поддержкой в борьбе за независимость."
 flavor_bos.1.a: "Мы не вправе упускать такой шанс."
 flavor_bos.1.b: "[GetCountry('HUN').GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|U] [GetCountry('HUN').Custom('CL_GEN')] могут не сомневаться в нашей преданности."
 flavor_bos.1.b.entry: "Мы останемся верны венгерским правителям."
 flavor_bos.1.a.tt: "Постоянное подтачивание [GetCountry('HUN').GetAdjectiveWithNoTooltip|l]ой власти — например, улучшение отношений с их соперниками и снижение нашей верности — может заставить [GetCountry('HUN').Custom('CL_ACC')] пересмотреть наш ленный статус."
 flavor_bos.1.historical_info: "В правление Степана II Босния использовала противоречия между Венгрией и её соперниками, стремясь избавиться от венгерского господства. После смерти основных венгерских союзников Степана, таких как король Карл Роберт и славонский бан Микач, боснийский бан решил воспользоваться очередной войной с Венецией, чтобы подорвать авторитет сюзерена. Он раздавал взятки, уклонялся от выполнения вассальных обязательств и даже передавал противнику военные сведения. Недоброжелатели прозвали его «учеником дьявола», он совершенно утратил доверие нового короля, однако обессиленная Венгрия ничего не могла поделать с непокорным вассалом. К концу правления Степана II венгерская власть над Боснией стала лишь формальностью."
 flavor_bos.2.title: "Упадок [GetCountry('SER').Custom('CL_GEN')]"
 flavor_bos.2.entry: "Упадок Сербии"
 flavor_bos.2.desc: "Когда [Select_CString(ser_dusan.IsFemale, 'умерла', 'умер' )] [ser_dusan.GetName], [GetCountry('SER').GetName] погрузил[GetCountry('SER').Custom('end_assya')] в затяжную смуту. С упадком центральной власти между местными феодалами началась междоусобная борьба, однако ни у кого из них нет ни авторитета, ни династических прав на трон. Наши правители связаны с родом [ser_dusan.GetDynasty.GetName] династическими узами, так что мы вправе выдвинуть законные притязания на [GetCountry('SER').GetAdjectiveWithNoTooltip|l]ую корону."
 flavor_bos.2.a: "Мы воспользуемся их раздробленностью, чтобы расширить своё влияние."
 flavor_bos.2.b: "Лучше сосредоточимся на внутренних проблемах страны."
 flavor_bos.2.historical_info: "Когда пресеклась династия Неманичей, сербский престол опустел, а земли бывшей империи оказались разделены между местными феодалами. Воспользовавшись вакуумом власти, Твртко I, состоявший в родстве с Неманичами через свою бабушку по отцовской линии, выдвинул притязания на сербскую корону, надеясь расширить боснийское влияние дальше на восток."
 flavor_bos.3.title: "[Select_CString(target_ruler.IsFemale, 'Первая королева', 'Первый король' )] [ROOT.GetCountry.Custom('CL_GEN')]"
 flavor_bos.3.entry: "$flavor_bos.3.title$"
 flavor_bos.3.desc: "По итогам успешной кампании в наших руках оказались обширные территории бывшего #L [GetCountry('SER').GetAdjective|l]ого#! государства. [target_ruler.GetName], [Select_CString(target_ruler.IsFemale, 'воодушевлённая', 'воодушевлённый' )] этим успехом, намеревается не только принять титул короля [GetCountry('SER').Custom('CL_GEN')], но и возвести #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! в ранг королевства, став [Select_CString(target_ruler.IsFemale, 'первой королевой', 'первым королём' )] в истории нашей державы."
 flavor_bos.3.a: "Нашей стране нужен король."
 flavor_bos.3.b: "От короны одни только хлопоты."
 flavor_bos.3.historical_info: "К началу 70-х годов XIV века бывшее Сербское царство распалось на множество уделов под властью местных феодалов, среди которых был и Твртко Боснийский. Однако его положение существенно отличалось: он уже правил независимой державой, в состав которой входила немалая часть сербских земель. Более того, в отличие от других сербских правителей он претендовал на родство с династией Неманичей, что обеспечивало дополнительную легитимность его правлению. Исходя из этого, боснийский двор выработал обоснования для признания Твртко монархом двух держав. Осенью 1377 года он был коронован как король сербов и Боснии."
 flavor_bos.4.title: "Совет стройников"
 flavor_bos.4.entry: "$flavor_bos.4.title$"
 flavor_bos.4.desc: "Стройники — старейшины #L [ROOT.GetCountry.GetAdjective|l]ой#! церкви — собрались, чтобы обсудить будущее нашей веры. Совет должен разрешить застарелые споры, доктринальные разногласия и иные насущные вопросы."
 flavor_bos.4.a: "В первую очередь церковь нуждается в стабильности."
 flavor_bos.4.b: "Мы должны уточнить догматы вероучения."
 flavor_bos.4.c: "Сейчас важнее всего разрешить внутренние споры."
 flavor_bos.4.d: "Пора задуматься о церковном имуществе."
 flavor_bos.5.title: "Судьба [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой церкви"
 flavor_bos.5.entry: "$flavor_bos.5.title$"
 flavor_bos.5.desc: "[ROOT.GetCountry.Custom('rank_ru_DAT')] всё труднее выносить растущее давление со стороны #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католической церкви#!#!. [target_pope.GetName] обвиняет нас в укрывательстве опасных ересей. Ходят слухи, что [Select_CString(target_pope.IsFemale, 'она', 'он' )] задумывается об организации нового крестового похода против #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Многие поколения мы боролись за существование нашей собственной церкви, но, возможно, пришло время уступить и присоединиться к числу #TOOLTIP:RELIGION,$catholic_tt$,X #L католических#!#! держав."
 flavor_bos.5.a: "Наша церковь выстоит!"
 flavor_bos.5.b: "Пора стать частью католического мира."
 flavor_bos.5.c: "Лучше обратимся к Константинополю."
 flavor_bos.5_catholic_unhappy: "Все #TOOLTIP:RELIGION,$catholic_tt$,X #L католические#!#! [Concept('pops', 'группы населения')|e] получают [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 flavor_bos.5_krstjani_unhappy: "Все #TOOLTIP:RELIGION,$bosnian_church_tt$,X #L крстянские#!#! [Concept('pops', 'группы населения')|e] получают [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 flavor_bos.5_orthodox_unhappy: "Все #TOOLTIP:RELIGION,$orthodox_tt$,X #L православные#!#! [Concept('pops', 'группы населения')|e] получают [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 flavor_bos.5.historical_info: "На протяжении долгого времени Боснийская церковь подвергалась критике со стороны папства, её нередко обвиняли в еретических взглядах. В 1203 году представители церкви подписали «Билинопольское отречение», где обязались следовать католической доктрине и отказаться от обрядов, объявленных еретическими. Тем не менее многие верующие втайне продолжали чтить привычные традиции. В 1337 году папа Бенедикт XII вновь объявил крестовый поход, но эта попытка не достигла успеха. Боснийская церковь просуществовала вплоть до османского завоевания региона."
