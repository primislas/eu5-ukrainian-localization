l_russian:
 flavor_rag.1000.title: "Враг у ворот"
 flavor_rag.1000.entry: "$flavor_rag.1000.title$"
 flavor_rag.1000.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] получил дурные вести: огромная #L [GetCountry('TUR').GetAdjective|l]ая#! армия всё же подошла к нашим границам. К сожалению, очевидно, что [ROOT.GetCountry.GetFlavorRank|l] не высто[ROOT.GetCountry.Custom('endrank_ityat')] под её натиском, и поэтому некоторые наше дворяне выступили со смелым предложением. По их мнению, [GetCountry('TUR').GetNameWithNoTooltip] и [ROOT.GetCountry.GetName] не обладают никакими существенными противоречиями, и, стало быть, признание их верховенства с выплатой ежегодной дани в обмен на защиту и свободу может стать для нас единственным способом выжить."
 flavor_rag.1000.a: "Отправим посла договориться с турками. Возможно, [GetCountry('TUR').GetGovernment.GetRulerTitle|l] проявит благосклонность."
 flavor_rag.1000.a.entry: "Отправим посла договориться с ним."
 flavor_rag.1000.b: "Мы отстоим свою независимость, чего бы нам это ни стоило!"
 flavor_rag.1000.historical_info: "В 1458 году Республика Рагуза официально признала сюзеренитет Османской империи. Несмотря на то, что по соглашению Рагуза была вынуждена выплачивать ежегодную дань в размере порядка 12 500 золотых дукатов, она сохраняла широкую автономию. Кроме того, ей было позволено содержать свой купеческий флот и проводить самостоятельную внешнюю политику. Данное взаимовыгодное соглашение просуществовало несколько столетий, на протяжении которых Рагуза оставалась турецким данником вплоть до своего упразднения в 1808 году в ходе Наполеоновских войн."
 flavor_rag.1001.title: "Предложение из [GetCountry('RAG').Custom('CL_GEN')]"
 flavor_rag.1001.desc: "Посланник [GetCountry('RAG').Custom('CL_GEN')] прибыл к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору со смиренным предложением. [GetCountry('RAG').GetAdjectiveWithNoTooltip]ий посланник признаёт, что его [GetCountry('RAG').GetFlavorRank|l] не в состоянии сопротивляться нашей мощи и вместо этого предлагает прагматичное решение. Они соглашаются признать наше верховенство, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] будет получать ежегодную дань за нашу защиту и право свободно торговать. Одни придворные видят в этом выгодную возможность расширить наше влияние, а другие считают, что столь слабое государство следует немедленно подчинить силой."
 flavor_rag.1001.a: "Примем их дань."
 flavor_rag.1001.b: "Зачем идти на уступки, если можно покорить державу силой?"
