l_russian:
  flavor_wal.1.title: "Влад Колосадитель"
  flavor_wal.1.desc: "Відчувши слабкість у правителі Валахії, претендент на князівство повернувся на чолі війська після довгих років життя в турецькому полоні. Влад Дракулешті, син дракона, людина кровожерна та жорстока. Його прибуття було відзначене жорстоким саджанням на кіл послів, відправлених на переговори з ним, що ясно дало зрозуміти, яку жорстокість він готовий виявити до будь-кого, хто противитиметься його владі."
  flavor_wal.1.a: "Ми нічого не винні туркам! Нехай корчаться на палях!"
  flavor_wal.1.b: "Вибачитися перед султаном"