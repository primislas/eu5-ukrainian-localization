l_russian:
  flavor_mai.1.title: "Друкарський верстат Гутенберга"
  flavor_mai.1.desc: "У 1450 році успішний купець з Майнца на ім'я Йоганн Гутенберг створив перший у світі друкарський верстат, озброївшись знаннями, здобутими від свого батька-ювеліра. Першою книгою, надрукованою на цьому верстаті, стала німецька поема, проте амбіції Гутенберга були куди масштабнішими: він хотів надрукувати саму Біблію. Ці амбіції призвели купця до банкрутства, внаслідок чого його справа перейшла до його спонсорів, проте у 1457 році перша друкована Біблія все ж побачила світ. Світ вже ніколи не стане колишнім!\nЯк нам вчинити?"
  flavor_mai.1.a: "Ми профінансуємо цей великий винахід!"