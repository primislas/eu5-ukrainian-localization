l_russian:
 flavor_ach.1.title: "[target_country.GetGovernment.GetRulerTitle] бежит из #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!"
 flavor_ach.1.entry: "Бегство эпирского наследника"
 flavor_ach.1.desc: "После #L [target_country2.GetAdjective|l]ого#! вторжения [target_country.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! [GetCharacter('byz_andronikos_iii_palaiologos').GetName] [Select_CString(GetCharacter('byz_andronikos_iii_palaiologos').IsFemale, 'изгнала', 'изгнал' )] [Select_CString(target_character.IsFemale,'законную наследницу', 'законного наследника')], [Select_CString(target_character.IsFemale,'которая должна была', 'который должен был')] взять бразды правления после того, как скончается [target_character.GetShortName], [Select_CString(target_character.IsFemale,'её', 'его')] [target_character.GetFather.GetName]. Вместо [Select_CString(target_character.IsFemale,'неё', 'него')] был назначен [target_country2.GetAdjectiveWithNoTooltip|l]ий губернатор [GetCharacter('epi_theodoros_synadenos').GetName]. К счастью, [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'была тайно вывезена', 'был тайно вывезен')] из страны при содействии противников [target_country2.GetAdjectiveWithNoTooltip|l]ой власти. [target_character2.GetName] [Select_CString(target_character2.IsFemale,'ожидала', 'ожидал')] встречи с [Select_CString(target_character.IsFemale,'ней', 'ним')]."
 flavor_ach.1.a: "[target_character.GetNameWithNoTooltip] — [Select_CString(target_character.IsFemale,'законная владелица', 'законный владелец')] [target_country.Custom('CL_GEN')]!"
 flavor_ach.1.a.entry: "Он — законный хозяин их владений!"
 flavor_ach.1.b: "Мы потеряли [target_country.Custom('CL_ACC')]."
 flavor_ach.1.b.entry: "Это безнадёжный случай."
 flavor_ach.2.title: "Поддержка [target_country.GetAdjectiveWithNoTooltip|l]ого претендента"
 flavor_ach.2.desc: "[Select_CString(target_character.IsFemale, 'Последняя латинская правительница', 'Последний латинский правитель' )] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'юная', 'юный' )] [target_character.GetName], [Select_CString(target_character.IsFemale, 'была тайно вывезена', 'был тайно вывезен' )] из страны и [Select_CString(target_character.IsFemale, 'переправлена', 'переправлен' )] [target_country3.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[target_country3.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country3.Custom('CL_tt')],X [target_country3.Custom('CL_ACC')|L]#!#!, чей [target_country3.GetGovernment.GetRulerTitle|l] оказывает [Select_CString(target_character.IsFemale, 'ей', 'ему' )] поддержку. [target_country3.GetLongName] постара[target_country3.Custom('endlong_etyut')]ся восстановить на троне [Select_CString(target_character.IsFemale, 'изгнанную наследницу', 'изгнанного наследника' )], в этом нет никаких сомнений.\n\nМы должны остерегаться вторжений, поскольку [target_character2.GetName] может нанести удар, пока мы слабы."
 flavor_ach.2.a: "Пусть только посмеют!"
 flavor_ach.3.title: "Угасающее латинское влияние"
 flavor_ach.3.desc: "Хотя страной формально правит латинская династия [target_character.GetDynasty.GetName], её влияние с каждым годом неуклонно слабеет. #L [ROOT.GetCountry.GetCulture.GetName]ие#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] зачастую проявляют безразличие к бедам #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греков#!#!-простолюдинов. Всё больше людей из самых разных слоёв общества отдают предпочтение греческому претенденту на престол. [target_character2.GetName] может освободить #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! от франкского гнёта."
 flavor_ach.3.a: "Династия [target_character.GetDynasty.GetNameWithNoTooltip] падёт!"
 flavor_ach.3.a.entry: "Долой династию!"
 flavor_ach.3.b: "Подавить это движение!"
 flavor_ach.4.title: "Латинская императрица"
 flavor_ach.4.entry: "$flavor_ach.4.title$"
 flavor_ach.4.desc: "Несмотря на то, что #TOOLTIP:FORMABLE_COUNTRY,LAT_f,X #L Латинская империя#!#! пала в 1261 году, её наследие живёт и по сей день в лице непрерывной линии титулярных императоров. Здравствующая императрица [target_character.GetName] из династии [target_character.GetDynasty.GetName], несмотря на номинальный характер своего титула, всё ещё пользуется значительным уважением среди латинских государств, а представители её семьи до сих пор правят [ROOT.GetCountry.Custom('longname_ru_INST')], одним из самых могущественных осколков империи."
 flavor_ach.4.a: "[ShowFormableCountryNameWithNoTooltip('LAT_f')] возродится!"
 flavor_ach.5.title: "[GetCountry('LAT').GetFlavorRank], но титулярно"
 flavor_ach.5.entry: "Титулярная империя"
 flavor_ach.5.desc: "[GetCountry('LAT').GetGovernment.GetRulerTitle] [GetCountry('LAT').Custom('longname_ru_GEN')] [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'владеющая', 'владеющий' )] своим «[GetCountry('LAT').GetAdjectiveWithNoTooltip|l]им» титулом исключительно номинально, всё ещё пользуется значительным влиянием на оставшихся представителей #L [GetCountry('LAT').GetAdjectiveWithNoTooltip|l]ой#! элиты — для многих из них [ShowScriptedGeographyName('greece_geography')] стала домом — и сохраняет связи с #ONCLICK:COUNTRY,[naples_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[naples_country.Custom('CL_tt')],X [naples_country.Custom('CL_INST')|L]#!#!. Все уловки и интриги, к которым прибегал [scope_philip_latin_emperor.GetName] в надежде собрать сильное войско, способное восстановить империю, окончились ничем: он скончался, не доведя свои замыслы до конца, и никто не осмелился продолжить его дело.\n\nПо соглашению, которое подписал [scope_alb_king.GetName], земли оказались распределены так: [scope_alb_king.GetShortNameWithNoTooltip] имеет право властвовать над #ONCLICK:COUNTRY,[albania_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[albania_country.Custom('CL_tt')],X [albania_country.Custom('CL_INST')|L]#!#!, а [ach_heir.GetName] — над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!; при этом [scope_ruler.GetShortNameWithNoTooltip] продолжает официально руководить последней державой.\n\nСоветники, к которым [Select_CString(scope_ruler.IsFemale, 'близка', 'близок' )] [scope_ruler.GetNameWithNoTooltip], считают, что сейчас складывается благоприятная обстановка: в #ONCLICK:COUNTRY,[ath_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ath_country.Custom('CL_tt')],X [ath_country.Custom('CL_PREP')|L]#!#! расположилась #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонская#!#! дружина, а [byz_country.GetGovernment.GetCourtTitle|l] #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#!, по слухам, погружается в хаос. Это означает, что вскоре может представиться возможность восстановить [GetCountry('LAT').Custom('longname_ru_wntt_ACC')], как того и хотел когда-то [scope_philip_latin_emperor.GetShortNameWithNoTooltip]."
 flavor_ach.5.a: "Постараемся заручиться расположением местных элит."
 flavor_ach.5.b: "Будем искать дипломатической поддержки в Греции."
 flavor_ach.5.c: "Пусть [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] начнёт закладывать основу для предстоящего возрождения."
 flavor_ach.5.c.entry: "Пусть двор начнёт закладывать основу для предстоящего возрождения."
 flavor_ach.6.title: "[naples_country.GetGovernment.GetCourtTitle] [naples_country.Custom('CL_GEN')] и наши связи"
 flavor_ach.6.entry: "Связи со двором Неаполя"
 flavor_ach.6.desc: "[scope_ruler.GetName] не только властвует над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, но и пользуется значительным влиянием — это может подтвердить [naples_country.GetGovernment.GetCourtTitle|l] [naples_country.Custom('CL_GEN')], а также [nap_ruler.GetName], с [Select_CString(nap_ruler.IsFemale, 'которой', 'которым' )] [scope_ruler.GetShortNameWithNoTooltip] поддерживает близкие отношения. Некоторые советники, выступающие за то, чтобы [ShowScriptedGeographyName('greece_geography')] больше зависела от власти династии [scope_ruler.GetDynasty.GetName], предлагают с помощью имеющегося авторитета заручиться поддержкой богатых [naples_country.GetAdjectiveWithNoTooltip|l]их элит."
 flavor_ach.6.a: "[naples_country.GetGovernment.GetCourtTitle|U] — ценный союзник. Пусть [scope_ruler.GetShortNameWithNoTooltip] попытается снискать расположение [naples_country.GetAdjectiveWithNoTooltip|l]их придворных."
 flavor_ach.6.a.entry: "Пусть правитель попытается снискать расположение неаполитанского двора."
 flavor_ach.6.b: "Пусть [scope_ruler.GetShortNameWithNoTooltip] воспользуется своим влиянием, чтобы получить финансовую поддержку."
 flavor_ach.6.b.entry: "Воспользуемся его влиянием, чтобы получить финансовую поддержку."
 flavor_ach.6.c: "Имя «[scope_ruler.GetShortNameWithNoTooltip]» пользуется доброй славой — [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой державы получит немало пользы от такой поддержки."
 flavor_ach.6.c.entry: "Наш двор получит немало пользы от поддержки с его стороны: его имя пользуется доброй славой."
 flavor_ach.7.title: "[nikephoros_ii_orsini.GetNameWithNoTooltip] и [epirus_country.GetLongNameWithNoTooltip]"
 flavor_ach.7.entry: "Отделение Эпира"
 flavor_ach.7.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, где скрывается изгнанник [nikephoros_ii_orsini.GetName] — весьма ценный инструмент в политической борьбе, которую [scope_ruler.GetName] ведёт с #L [byz_country.GetAdjective|l]ой#! элитой, внимательно слушает свежие вести: весьма вероятно, что вскоре [nikephoros_ii_orsini.GetLastNameWithNoTooltip] сможет снова взойти на престол, поскольку некоторые #L [epirus_country.GetAdjective|l]ие#! [epirus_country.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] заручились значительной поддержкой и теперь готовы поднять восстание против [byz_country.GetAdjectiveWithNoTooltip|l]ого губернатора.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle|U], мгновенно углядев возможность ещё больше усугубить раздирающий [byz_country.Custom('CL_ACC')] раздор, призывает к тому, чтобы [scope_ruler.GetNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'воспользовалась', 'воспользовался' )] представившейся оказией: пусть [nikephoros_ii_orsini.GetLastNameWithNoTooltip] с [Select_CString(scope_ruler.IsFemale, 'её', 'его' )] разрешения вернётся в [epirus_country.Custom('CL_ACC')]."
 flavor_ach.7.a: "Мы не против: пусть [nikephoros_ii_orsini.GetLastNameWithNoTooltip] возвращается в [epirus_country.Custom('CL_ACC')] при нашей поддержке."
 flavor_ach.7.a.entry: "Мы не против: пусть $Orsini$ возвращается в $EPI$ при нашей поддержке."
 flavor_ach.7.b: "Мы можем выдвинуть претензию на [epirus_country.Custom('CL_ACC')] от [Select_CString(nikephoros_ii_orsini.IsFemale, 'её', 'его' )] имени — возможно, [nikephoros_ii_orsini.GetShortNameWithNoTooltip] согласится."
 flavor_ach.7.b.entry: "Мы можем выдвинуть претензию на $EPI$ от имени этого человека — возможно, $name_nikephoros.greek_language$ согласится."
 flavor_ach.7.c: "Сейчас это слишком опасно."
 nikephoros_ii_orsini_revolt: "Восстание Орсини"
 flavor_ach.8.title: "[nikephoros_ii_orsini.GetNameWithNoTooltip] возвращает себе [epirus_country.Custom('CL_ACC')]!"
 flavor_ach.8.entry: "$name_nikephoros.greek_language$ $Orsini$ Reclaims $EPI$!"
 flavor_ach.8.desc: "По #L [ROOT.GetCountry.GetAdjective|l]ой#! земле разносятся вести, к которым внимательно прислушивается [ROOT.GetCountry.GetGovernment.GetCourtTitle|l]: [nikephoros_ii_orsini.GetLastNameWithNoTooltip] при поддержке своих сторонников вновь занял престол #ONCLICK:COUNTRY,[epirus_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[epirus_country.Custom('CL_tt')],X [epirus_country.Custom('CL_GEN')|L]#!#! и объявил об отделении [epirus_country.Custom('CL_GEN')] от #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#!! Нет никаких сомнений, что [scope_ruler.GetName] объявит случившееся крупной победой, поскольку [byz_country.GetGovernment.GetCourtTitle|l] [byz_country.GetAdjectiveWithNoTooltip|l]ой державы теперь слабее, чем раньше. Некоторые, впрочем, считают, что теперь [scope_ruler.GetShortNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'должна', 'должен' )] захватить [epirus_country.Custom('CL_ACC')], пока [nikephoros_ii_orsini.GetShortNameWithNoTooltip] ещё не сосредоточил в своих руках всю полноту власти."
 flavor_ach.8.a: "Вместо этого заключим официальный союз с [epirus_country.Custom('CL_INST')]."
 flavor_ach.8.a.entry: "Вместо этого заключим официальный союз с Эпиром."
 flavor_ach.8.b: "Наша держава и [nikephoros_ii_orsini.GetLastNameWithNoTooltip] сохранят близкие отношения — и всё."
 flavor_ach.8.b.entry: "Наша держава и $Orsini$ сохранят близкие отношения — и всё."
 flavor_ach.8.c: "Нападём, пока есть возможность!"
 flavor_ach.9.title: "Мятеж в [epirus_country.Custom('CL_PREP')]"
 flavor_ach.9.desc: "Страшные новости! #L [epirus_country.GetAdjective|U]ие#! [epirus_country.GetGovernment.GetEstateName('nobles_estate')|l], которых поддерживает [ach_scope_ruler.GetName], подняли мятеж: они хотят, чтобы #ONCLICK:COUNTRY,[epirus_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[epirus_country.Custom('CL_tt')],X [epirus_country.Custom('CL_INST')|L]#!#! [Select_CString(nikephoros_ii_orsini.IsFemale, 'правила', 'правил' )] [nikephoros_ii_orsini.GetName]. [epi_scope_ruler.GetName] [Select_CString(epi_scope_ruler.IsFemale, 'запросила', 'запросил' )] у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! срочной помощи в подавлении мятежа."
 flavor_ach.9.a: "Помочь [epirus_country.GetAdjectiveWithNoTooltip|l]ому губернатору!"
 flavor_ach.9.a.entry: "Помочь эпирскому губернатору!"
 flavor_ach.9.b: "Это не наша забота."
 flavor_ach_9_tt: "Если [nikephoros_ii_orsini.GetName] победит, [epirus_country.GetName] обрет[epirus_country.Custom('end_youtut')] независимость"
 flavor_ach.10.title: "Отвоевание Пелопоннеса"
 flavor_ach.10.entry: "$flavor_ach.10.title$"
 flavor_ach.10.desc: "После завершения в 1204 году четвёртого крестового похода #TOOLTIP:AREA,morea_area,X #L Морея#!#! оказалась в числе многочисленных регионов, завоёванных крестоносцами после падения #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#!. Впрочем, за последние несколько десятилетий [byz_country.GetAdjectiveWithNoTooltip|l]ие элиты сумели вернуть себе часть региона, хотя значительная его доля остаётся под #L [ROOT.GetCountry.GetAdjective|l]ой#! властью.\n\n[byz_country.GetGovernment.GetCourtTitle|U] [byz_country.GetAdjectiveWithNoTooltip|l]ой державы сегодня на грани сползания в хаос; некоторые наши советники считают, что нам выпала удачная возможность устроить новый поход, отвоевать утраченное и навсегда избавить Морею от [byz_country.GetAdjectiveWithNoTooltip|l]ого влияния."
 flavor_ach.10.a: "Пора потеснить [byz_country.Custom('longname_ru_wntt_ACC')]!"
 flavor_ach.10.a.entry: "Пора потеснить Византию!"
 flavor_ach.10.b: "Лучше подождать: возможно, [byz_country.GetAdjectiveWithNoTooltip|l]ое государство и правда неустойчиво."
 flavor_ach.10.b.entry: "Лучше подождать: возможно, византийское государство и правда неустойчиво."
 flavor_ach.11.title: "Повсеместная нестабильность в [byz_country.Custom('CL_PREP')]"
 flavor_ach.11.entry: "Извлечь выгоду из гражданской войны в Византии"
 flavor_ach.11.desc: "#L [ROOT.GetCountry.GetAdjective|U]ие#! шпионы в очередной раз сообщают: [byz_country.GetGovernment.GetCourtTitle|l] #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#!, по слухам, всё ещё в политически нестабильном состоянии. В этот раз, впрочем, к их донесениям прибавилось ещё одно: весьма вероятно, что [byz_country.GetAdjectiveWithNoTooltip|l]ие [byz_country.GetGovernment.GetEstateName('nobles_estate')|l], будучи больше не в силах терпеть правящую династию [byz_ruler.GetDynasty.GetName], замышляют переворот.\n\nЧасть советников надеется, что [scope_ruler.GetName] сможет извлечь выгоду из складывающейся обстановки: в [byz_country.Custom('CL_PREP')] может разгореться гражданская война."
 flavor_ach.11.a: "Пора обрезать орлу крылья!"
 flavor_ach.11.b: "Не будем вмешиваться в [byz_country.GetAdjectiveWithNoTooltip|l]ие дела."
 flavor_ach.11.b.entry: "Не будем вмешиваться в византийские дела."
 flavor_ach.12.title: "Умиротворение греческой элиты"
 flavor_ach.12.entry: "Греческое население Ахеи"
 flavor_ach.12.desc: "[ShowScriptedGeographyName('greece_geography')] под властью #L [GetCountry('LAT').GetAdjective|l]их#! правителей переживает неспокойные времена: бывшая #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческая#!#! элита начала приходить в упадок; в некоторых уголках #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! же, наоборот, выходцы из старых греческих семейств сумели сохранить влияние, пусть даже #L [ROOT.GetCountry.GetCulture.GetName|l]ие#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вынудили их пойти на определённые уступки. Однако после падения [GetCountry('LAT').Custom('longname_ru_wntt_GEN')] греческое население постепенно начало сопротивляться [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ой власти.\n\nЧтобы не допустить беспорядков, [scope_ruler.GetNameWithNoTooltip] и [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] державы пригласили представителей оставшихся в [ROOT.GetCountry.Custom('CL_PREP')] греческих семейств на переговоры, чтобы прийти к согласию. С этим не согласны некоторые [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ие [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]: они, наоборот, требуют расширения своей власти над греками и заявляют, что сильная [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ая элита сможет приструнить смутьянов."
 flavor_ach.12.a: "Оставим всё как есть."
 flavor_ach.12.b: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|U]ие [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] заслуживают нашей поддержки."
 flavor_ach.12.b.entry: "Аристократы заслуживают нашей поддержки."
 flavor_ach.12.c: "Постараемся договориться с греческими семействами."
 flavor_ach.13.title: "Угроза из [athens_country.Custom('CL_GEN')]"
 flavor_ach.13.entry: "Каталонская власть над Афинами"
 flavor_ach.13.desc: "[scope_ruler.GetName], [Select_CString(scope_ruler.IsFemale, 'заявляющая', 'заявляющий' )] права на [GetCountry('LAT').Custom('longname_ru_wntt_ACC')], пользуется поддержкой многих местных #L [GetCountry('LAT').GetAdjective|l]их#! владык, которым частично повинуется [ShowScriptedGeographyName('greece_geography')]. В то же время власти [athens_country.Custom('longname_ru_GEN')] из года в год проявляют всё больше враждебности, уповая, по всей видимости, на поддержку #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонской#!#! дружины. Впрочем, некоторые недовольные [athens_country.GetAdjectiveWithNoTooltip|l]ие [athens_country.GetGovernment.GetEstateName('nobles_estate')|l] обратились напрямую к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору в надежде, что им помогут изгнать наёмников из [athens_country.Custom('CL_GEN')]; взамен они обещают присягнуть на верность [ROOT.GetCountry.Custom('CL_DAT')]."
 flavor_ach.13.a: "Вместо этого пусть каталонские [athens_country.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] в [athens_country.Custom('CL_PREP')] станут нам друзьями."
 flavor_ach.13.a.entry: "Вместо этого пусть каталонские аристократы в Афинах станут нам друзьями."
 flavor_ach.13.b: "Мы выполним их просьбу и изгоним Каталонскую дружину из [athens_country.Custom('CL_GEN')]."
 flavor_ach.13.b.entry: "Мы выполним их просьбу и изгоним Каталонскую дружину из Афин."
 flavor_ach.13.c: "Воспользуемся этой возможностью и завоюем [athens_country.Custom('rank_ru_ACC')|l]."
 flavor_ach.13.c.entry: "Воспользуемся этой возможностью и завоюем державу."
 ach_vassalize_athens_for_reward: "Если нам удастся покорить #ONCLICK:COUNTRY,[athens_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[athens_country.Custom('CL_tt')],X [athens_country.Custom('CL_ACC')|L]#!#!, мы сможем установить нового правителя, удобного для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
 flavor_ach.14.title: "Каталонская дружина изгнана из [athens_country.Custom('CL_GEN')]"
 flavor_ach.14.entry: "Восстановление франсийской власти над Афинами"
 flavor_ach.14.desc: "После того как [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'разгромила', 'разгромил' )] #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонскую#!#! дружину и [Select_CString(scope_ruler.IsFemale, 'изгнала', 'изгнал' )] её из #ONCLICK:COUNTRY,[athens_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[athens_country.Custom('CL_tt')],X [athens_country.Custom('CL_GEN')|L]#!#!, многие представители [athens_country.GetAdjectiveWithNoTooltip|l]ой элиты присягнули [Select_CString(scope_ruler.IsFemale, 'ей', 'ему' )] на верность. Поскольку прежний владыка [athens_country.Custom('rank_ru_GEN')|l] теперь в изгнании, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] предлагает вернуть на престол [athens_country.Custom('CL_GEN')] франсийскую династию; некоторые, впрочем, считают, что не стоит упускать возможность наладить отношения с греками: местные [athens_country.GetGovernment.GetEstateName('nobles_estate')|l] будут признательны, если к власти придёт один из местных представителей этого сословия."
 flavor_ach.14.a: "Франсийские [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] будут рады, если [athens_country.GetGovernment.GetRulerTitle|l] выйдет из их рядов. Так мы и поступим."
 flavor_ach.14.a.entry: "Франсийские аристократы будут рады, если правитель выйдет из их рядов. Так мы и поступим."
 flavor_ach.14.b: "Франсийские [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] получат желаемое, но вместе с этим мы наделим привилегиями греческое население [athens_country.Custom('CL_GEN')]."
 flavor_ach.14.b.entry: "Франсийские аристократы получат желаемое, но вместе с этим мы наделим привилегиями греческое население Афин."
 flavor_ach.14.c: "Пусть некоторые греческие [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] возьмут бразды правления [athens_country.Custom('CL_INST')]."
 flavor_ach.14.c.entry: "Пусть некоторые греческие аристократы возьмут бразды правления Афинами."
 flavor_ach.15.title: "[scope_ruler.GetNameWithNoTooltip] восходит на престол"
 flavor_ach.15.entry: "Передача императорского титула"
 flavor_ach.15.desc: "После того как скончалась [latin_empress_catherine_valois.GetName], [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'унаследовала', 'унаследовал' )] право на титул [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]. По такому случаю [ROOT.GetCountry.GetCapital.GetName] готовится к грандиозному празднику. Однако, хотя [latin_empress_catherine_valois.GetShortNameWithNoTooltip] и [scope_philip_latin_emperor.GetName] отчаянно боролись за обеспечение этому титулу важности и влияния, многие местные [GetCountry('LAT').GetAdjectiveWithNoTooltip|l]ие владыки, которым частично повинуется [ShowScriptedGeographyName('greece_geography')], отказываются признавать претензии династии [scope_ruler.GetDynasty.GetName] на [GetCountry('LAT').Custom('longname_ru_wntt_ACC')].\n\nК счастью, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] во многом на [Select_CString(scope_ruler.IsFemale, 'её', 'его' )] стороне: многие призывают к тому, чтобы [scope_ruler.GetNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'пошла', 'пошёл' )] по стопам своих родителей и [Select_CString(scope_ruler.IsFemale, 'воспользовалась', 'воспользовался' )] грядущей церемонией как способом привлечь новые силы к восстановлению империи."
 flavor_ach.15.a: "Оставить коронацию исключительно церемониальной."
 flavor_ach.15.b: "Постараться с помощью церемонии подкрепить усилия по возрождению империи."
 flavor_ach.15.c: "Постараться с помощью церемонии добиться у верных лордов политического расположения."
 flavor_ach.16.title: "[the_pope.GetNameWithNoTooltip] предлагает помощь в восстановлении [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]"
 flavor_ach.16.entry: "Папа заинтересован в восстановлении Латинской империи"
 flavor_ach.16.desc: "Слово «[ShowScriptedGeographyName('greece_geography')]» сегодня на устах у многих. Узнав про наши походы, [the_pope.GetName] [Select_CString(the_pope.IsFemale, 'прислала', 'прислал' )] из #ONCLICK:COUNTRY,[scope_papal_states.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scope_papal_states.Custom('CL_tt')],X [scope_papal_states.Custom('CL_GEN')|L]#!#! гонца с предложением помощи.\n\nПоскольку мы — [ShowGovernmentReformName('ach_heirs_of_the_latin_empire')|l] по праву, [the_pope.GetShortNameWithNoTooltip] [Select_CString(the_pope.IsFemale, 'предложила', 'предложил' )] нам денежную и политическую поддержку [scope_papal_states.Custom('CL_GEN')] — при условии, что мы согласимся помочь в ответ: [scope_papal_states.GetGovernment.GetRulerTitle|l] сейчас пытается примирить #TOOLTIP:RELIGION,$catholic_tt$,X #L католическую#!#! и #TOOLTIP:RELIGION,$orthodox_tt$,X #L православную#!#! церкви.\n\n[the_pope.GetNameWithNoTooltip] также призывает нас — на случай, если [constantinople_location.GetName] вернётся на своё прежнее место — помнить, какая трагедия постигла #L #TOOLTIP:LOCATIONRANK,[constantinople_location.Custom('LR_tt')],X [constantinople_location.Custom('LR_ACC')|l]#!#! в ходе четвёртого крестового похода, и не допустить её повторения."
 flavor_ach.16.a: "Согласиться на требования [scope_papal_states.GetAdjectiveWithNoTooltip|l]ого гонца в обмен на поддержку."
 flavor_ach.16.a.entry: "Согласиться на требования римского посла в обмен на поддержку."
 flavor_ach.16.b: "[the_pope.GetShortNameWithNoTooltip] нам ни к чему: мы возьмём [constantinople_location.Custom('LR_ACC')|l] [constantinople_location.GetNameWithNoTooltip] самостоятельно."
 flavor_ach.16.b.entry: "Он нам ни к чему: мы возьмём Константинополь самостоятельно."
 lat_aggressive_conversion_policies_tt: "В обмен на поддержку [the_pope.GetName] может попросить нас принять суровые политики обращения в религию, если мы провозгласим [GetCountry('LAT').Custom('longname_ru_ACC')]"
 flavor_ach.17.title: "[constantinople_location.GetNameWithNoTooltip] снова в наших руках!"
 flavor_ach.17.entry: "Константинополь снова в наших руках!"
 flavor_ach.17.desc: "Мы совершили невозможное: [constantinople_location.GetName] вновь принадлежит нам! Поскольку [constantinople_location.GetRank.GetName|l] пребывает в плачевном состоянии, [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'приказала', 'приказал' )] #L [ROOT.GetCountry.GetAdjective|l]им#! солдатам вести себя бережно, чтобы не вызывать лишний раз гнева жителей.\n\nСегодня значительная часть [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetNameWithNoTooltip] в наших руках, в том числе императорский дворец во Влахернах, в спешке оставленный предыдущим владельцем. [scope_ruler.GetNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'обратилась', 'обратился' )] к [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]им элитам с просьбой поскорее провозгласить возрождение [GetCountry('LAT').Custom('longname_ru_GEN')], хотя [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] предупреждает, что будет разумнее сначала как следует здесь закрепиться."
 flavor_ach.17.a: "Пора вновь взять власть над [constantinople_location.Custom('LR_INST')|l] [constantinople_location.GetNameWithNoTooltip] в свои руки."
 flavor_ach.17.a.entry: "Пора вновь взять власть над Константинополем в свои руки."
 flavor_ach.17.b: "Перед тем как возрождать империю, надо закрепить успех."
 flavor_ach.17.c: "Разграбить [constantinople_location.Custom('LR_ACC')|l] [constantinople_location.GetNameWithNoTooltip]!"
 flavor_ach.17.c.entry: "Разграбить Константинополь!"
