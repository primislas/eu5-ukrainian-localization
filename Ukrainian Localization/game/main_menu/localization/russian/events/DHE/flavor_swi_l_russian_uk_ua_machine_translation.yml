l_russian:
  flavor_swi.1.title: "[target_character.GetNameWithNoTooltip] та його досягнення"
  flavor_swi.1.desc: "[target_character.GetName] відіграв вирішальну роль у створенні #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарської#!#! гвардії для Святого Престолу і тим самим проявив себе як здібний керівник. Втім, у нього чимало й інших навичок, які могли б нам стати в пригоді. Зокрема, завдяки своєму красномовству [target_character.GetNameWithNoTooltip] може стати чудовим дипломатом, тому нам варто розглянути можливість запросити його до нашого двору."
  flavor_swi.1.a: "Воістину видатна людина!"
  flavor_swi.1.b: "Від цього зовсім ніякої користі."
  flavor_swi.1.historical_info: "Маттеус Шиннер, який у 1499 році обійняв посаду єпископа Зіттена, всіма силами сприяв зближенню Швейцарської Конфедерації та Святого Престолу. Саме завдяки його зусиллям швейцарські війська стали постійно охороняти папу римського, а Беллінцона увійшла до складу Швейцарії."
  flavor_swi.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swi.2.desc: "До нашого двору дійшли чутки про мандрівного лікаря з родини дрібних дворян на ім'я [target_character.GetName]. Він народився в #TOOLTIP:LOCATION,schwyz,X #L Швіці#!# і, закінчивши навчання в університеті, вирушив у подорож з метою практики та розширення своїх знань. Ми могли б надати йому покровительство та запросити його до нашого двору: такий досвідчений лікар нам явно не завадить."
  flavor_swi.2.a: "Практика — шлях до досконалості!"
  flavor_swi.2.b: "Людям з такою вдачею тут не раді."
  flavor_swi.2.historical_info: "Теофраст фон Гогенгейм, відомий під псевдонімом Парацельс, — лікар і філософ, який майже все своє життя присвятив пошукам всезагального знання. У 1527—1528 рр. жив у Базелі, де займався медициною та викладав у місцевому університеті. Міська влада вигнала Парацельса всього через рік як через незгоду з його методом викладання — лекції він читав німецькою мовою замість прийнятої тоді латини — так і через те, що Парацельс образив суддів на засіданні. Залишивши Базель, він продовжив наукову діяльність у Нюрнберзі, Мерано, Аугсбурзі та Зальцберзі, де в 1541 році й помер від отруєння ртуттю."
  flavor_swi.3.title: "#italic Манеський кодекс#! завершено"
  flavor_swi.3.desc: "#italic Манеський кодекс#!, над яким [target_artist.GetName] [Select_CString(target_artist.IsFemale, 'працювала', 'працював' )] кілька десятиліть, нарешті завершено і тепер буде передано родині Манессе, яка весь цей час надавала підтримку його [Select_CString(target_artist.IsFemale, 'укладачці', 'укладачеві' )]. #italic Кодекс#! містить безліч #italic міннезангів#! середньонімецьким діалектом, а також відомості про важливі події в історії династії Гогенштауфенів. Хоча формально робота над #italic кодексом#! закінчена, його відкрита структура цілком дозволяє поступово доповнювати його новими піснями та віршами."
  flavor_swi.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swi.100.title: "Централізація Швейцарської конфедерації"
  flavor_swi.100.desc: "Спочатку #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська Конфедерація#!#! являла собою лише союз між кантонами, розташованими на території Альп та Швейцарського плато, але сьогодні це вже повноцінна країна з єдиною внутрішньою політикою та кордонами. У зв'язку з цим [target_character.GetName] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')], що настав час офіційно об'єднати всі землі конфедерації в одну країну, яка стане відома під назвою [GetCountry('SWI').GetLongName]."
  flavor_swi.100.a: "Нехай у майбутньому нас чекає лише процвітання!"
  sc_gain_cores_on_switzerland_proper_tt: "Усі місцевості #TOOLTIP:AREA,central_switzerland_area,X #L Центральної#!#!, #TOOLTIP:AREA,eastern_switzerland_area,X #L Східної#!#! та #TOOLTIP:AREA,western_switzerland_area,X #L Західної Швейцарії#!#! стануть нашими [Concept('core', 'національними місцевостями')|e]"
  sc_seize_subject_locations_tt: "Усі [Concept('location', 'місцевості')|e] в цих [Concept('areas', 'областях')|e], які перебувають під контролем наших [Concept('subjects', 'ленників')|e], що не є учасниками #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської конфедерації#!#!, увійдуть до наших володінь"
  sc_unify_the_cantons_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська конфедерація#!#! стане єдиною країною"
  flavor_swi.101.title: "$flavor_swi.100.title$"
  flavor_swi.101.desc: "Голосування завершилося, і #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарський#!#! народ виявив свою волю. Усі учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,swiss_confederation,X #L Швейцарської конфедерації#!#!, включно з нами, будуть об'єднані в одну країну [GetCountry('SWI').GetName], а її главою стане [target_character.GetName]."
  flavor_swi.101.a: "Хай живе [GetCountry('SWI').GetFlavorRank|l]!"
  flavor_swi.101.b: "Ми ніколи не станемо на коліна!"
  sc_every_core_location_breaks_away_tt: "Усі належні нам місцевості, що є [Concept('core', 'національними')|e] територіями #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, відокремляться від нас"
  flavor_swi.110.title: "Реформація у Швейцарській конфедерації"
  flavor_swi.110.desc: "Ідеї #TOOLTIP:SITUATION,reformation,X #L Реформації#!#! стрімко розповзаються по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Родичі, друзі та сусіди, які ще вчора були братами по вірі, сьогодні вже стоять по різні боки барикад. Релігійні конфлікти вже стали буденністю, і навіть колись дружні кантони #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської конфедерації#!#! почали ворогувати один з одним…"
  flavor_swi.110.historical_info: "Рух Реформації, що охопив Європу, не оминув стороною і Швейцарію: деякі кантони одразу перейняли нові ідеї, інші ж зберегли вірність католицтву. Розкол між кантонами посилювала діяльність таких впливових реформаторів, як Цвінглі та Кальвін. У 1529 році на ґрунті релігійних розбіжностей почалася Перша Каппельська війна; у 1531 році — Друга."
  flavor_swi.110.a: "Настають важкі часи…"
  sc_block_votes_on_non_religious_policies_tt: "Єдине [Concept('law', 'правило')|e], яке можна ухвалити — #TOOLTIP:LAW,sc_religious_affairs,X #L «Релігійні справи»#!#!"
  sc_religious_chaos_tt: "#R Доки для правила «[ShowLawName('sc_religious_affairs')]» не обрано жодної [Concept('policy', 'політики')|e], #TOOLTIP:LAW,sc_internal_politics,X #L внутрішня#!#! та #TOOLTIP:LAW,sc_war_politics,X #L військова політика#!#! поширюватимуться лише на тих учасників, які належать до однієї [Concept('religion', 'релігії')|e]#!"
  flavor_swi.111.title: "Війни [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_swi.111.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'здобула', 'здобув')] величезну кількість прихильників, а сувора політика #TOOLTIP:POLICY,sc_enforcing_religious_unity,X #L встановлення релігійної єдності#!#! лише підвищила градус напруги в суспільстві. Усе це призвело до того, що #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська конфедерація#!#! поринула у вир релігійних та політичних міжусобиць. $flavor_swi.111.desc.fallback$"
  flavor_swi.111.desc.fallback: "Відносини між #TOOLTIP:RELIGION,$catholic_tt$,X #L католиками#!#! та #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранами#!#! загострилися до межі, і зрештою їхній конфлікт у [target_location.Custom('LR_PREP')|l] [target_location.GetName] переріс у повномасштабні війни."
  flavor_swi.111.historical_info: "Каппельські війни — два збройні конфлікти між католицькими та протестантськими кантонами, що відбувалися в околицях містечка Каппель-ам-Альбіс. Приводом для першої війни (1529 р.) стала діяльність реформатора Ульріха Цвінглі; бойові дії закінчилися заснуванням Християнського союзу. Друга війна (1531 р.) почалася з відмови католиків прийти на допомогу протестантським кантонам — учасникам війни за Муссо проти Міланського герцогства. Відновлення відносин між двома конфесіями почалося лише після закінчення Зондербундської війни 1847 року."
  flavor_swi.111.a: "Для конфедерації настали важкі часи…"
  sc_every_member_gains_force_convert_cb_tt: "Усі учасники отримають привід для війни «[ShowCasusBelliName('cb_heretic')]» один проти одного"
  flavor_swi.120.title: "[GetUniqueInternationalOrganization('swiss_confederation').GetName] та [GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
  flavor_swi.120.desc: "Релігійні війни, які довгий час потрясали #TOOLTIP:CONTINENT,europe,X #L Європу#!#!, нарешті вщухли, і тепер кантони #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської конфедерації#!#! вирішили переглянути свої відносини зі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священною Римською імперією#!#!. Так, деякі учасники конфедерації вважають, що #TOOLTIP:LAW,sc_relations_with_hre,X #L наші зв'язки з Імперією#!#! вже давно ослабли, а тому нам варто замислитися про їхній остаточний розрив…"
  flavor_swi.120.historical_info: "Швейцарська Конфедерація де-юре вважалася частиною Священної Римської Імперії з першого дня свого заснування, проте згодом швейцарські кантони змогли домогтися певної самостійності, попутно послабивши вплив імператора в регіоні. До 1499 року вони де-факто стали незалежними. Вестфальський мирний договір 1648 року підтвердив незалежність Швейцарської Конфедерації; швейцарські землі перестали вважатися частиною імперії."
  flavor_swi.120.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_swi.121.title: "[GetUniqueInternationalOrganization('swiss_confederation').GetNameWithNoTooltip] виходить зі складу Імперії!"
  flavor_swi.121.desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарська конфедерація#!#! покинула Імперію! В останні роки її зв'язки з імперськими інститутами помітно ослабли, а релігійна політика імператора викликала у #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарців#!#! лише роздратування та неприязнь. У результаті вони дійшли висновку, що членство у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській імперії#!#! йде врозріз з їхніми інтересами."
  flavor_swi.121.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_swi.999.title: "Швейцарський рух за об'єднання"
  flavor_swi.999.desc: "Недавні події в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! та #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! викликали небачений ріст націоналістичних настроїв на споконвічних землях #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської конфедерації#!#!. Нам вдалося вирвати з-під іноземного впливу більшу частину #TOOLTIP:AREA,central_switzerland_area,X #L Центральної#!#!, #TOOLTIP:AREA,eastern_switzerland_area,X #L Східної#!#! та #TOOLTIP:AREA,western_switzerland_area,X #L Західної Швейцарії#!#!, і тепер наш народ заявив про своє бажання створити єдину національну країну [GetCountry('SWI').GetName]."
  flavor_swi.999.historical_info: "Не можна сказати, щоб у Швейцарській Конфедерації історично спостерігався якийсь рух за об'єднання: до вторгнення в 1798 році французьких революційних військ Швейцарія являла собою слабо пов'язане об'єднання самостійних кантонів. І хоча ці принципи збереглися в Гельветичній республіці, а згодом — у конфедерації, що пройшла Реставрацію, республіка на зовнішньому рівні вже мало чим відрізнялася від інших національних країн. Після прийняття 12 вересня 1848 року федеральної конституції швейцарський союз міст-країн перетворився на країну Швейцарія."
  flavor_swi.999.a: "Народ усе сказав!"
  flavor_swi_999_trigger_at: "У володінні учасника #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарської конфедерації#!#!"
  sc_unification_movement_event_happens_tt: "Дозволяє #TOOLTIP:INTERNATIONAL_ORGANIZATION,$swiss_confederation_tt$,X #L Швейцарській конфедерації#!#! #TOOLTIP:LAW,sc_unification,X #L об'єднатися#!#!"
  flavor_swi.1000.title: "[target_ruler.GetNameWithNoTooltip] та конституція гільдій"
  flavor_swi.1000.desc: "У 1336 році гільдії #TOOLTIP:LOCATION,zurich,X #L Цюриха#!#! скинули місцеву владу, внаслідок чого бургомістром [Select_CString(target_ruler.IsFemale,'була обрана', 'був обраний')] [target_ruler.GetName]. [Select_CString(target_ruler.IsFemale,'Вона негайно прийняла', 'Він негайно прийняв')] нову конституцію, яка надійно закріпила права гільдій та забезпечила їм представництво в міській раді. Ці заходи дозволили остаточно позбавити колишні еліти будь-якого впливу в місті."
  flavor_swi.1000.a: "Країна керуватиметься конституцією гільдій."
  flavor_swi.1000.b: "Гільдії слід виключити з ради."
  flavor_swi.1000.historical_info: "У 1335 році в міській раді Цюриха засідали переважно кілька шляхетних сімей та найбагатші купці, ювеліри, ткачі шовку та завідувачі монетним двором. 7 червня 1336 року аристократи та майстри Цюриха влаштували державний переворот, внаслідок якого бургомістром був обраний Рудольф Брун. Відразу після обрання він прийняв конституцію гільдій, згідно з якою до міської ради тепер входило 26 осіб: 13 представників старої купецької еліти та 13 майстрів раніше не представлених гільдій."
  flavor_swi.1001.title: "Цюрихська ніч убивств"
  flavor_swi.1001.desc: "Колишні правителі #TOOLTIP:LOCATION,zurich,X #L Цюриха#!#! посягнули на життя [Select_CString(target_ruler.IsFemale,'нашої правительки', 'нашого правителя')]!\n\nВтікши до Рапперсвіля — містечка на березі Цюрихського озера, — вони довгий час виношували плани помсти, мріючи повернути собі владу. І сьогодні вони спробували здійснити свій підступний задум. На щастя, [target_ruler.GetShortNameWithNoTooltip] користується величезною підтримкою гільдій за те, що раніше [Select_CString(target_ruler.IsFemale,'вона відстояла', 'він відстояв')] їхні права в міській раді, тому вони заступилися за [Select_CString(target_ruler.IsFemale,'неї', 'нього')] і відбили напад змовників. Особливо відзначилася гільдія м'ясників, яка буквально не залишила нападникам жодних шансів у бою."
  flavor_swi.1001.a: "Добре, що вони не бояться забруднити руки кров'ю."
  flavor_swi.1001.historical_info: "Після гільдійської революції 1336 року двадцять два колишні члени міської ради Цюриха втекли до сусіднього містечка Рапперсвіль, що належало Габсбургам. Там вони взялися за боротьбу з цюрихським урядом Рудольфа Бруна. Кульмінацією цієї боротьби стала так звана Цюрихська ніч убивств на 24 лютого 1350 року: коли змовники увійшли до міста, скориставшись тим, що їхні прихильники в Цюриху відчинили ворота, гільдії разом із Бруном чинили їм запеклий опір, оскільки вже знали про змову. Після короткої, але лютої сутички змовники були розбиті. Тріумфу гільдійської революції більше ніщо не заважало."
  flavor_swi.1002.title: "Розорення Рапперсвіля"
  flavor_swi.1002.desc: "Після нашої гільдійської революції колишні правителі #TOOLTIP:LOCATION,zurich,X #L Цюриха#!#! втекли до Рапперсвіля. Донедавна нас це цілком влаштовувало: [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'встановила', 'встановив')] у місті свою владу і [Select_CString(target_ruler.IsFemale,'забезпечила', 'забезпечив')] у ньому порядок. Однак ці мерзотники влаштували змову і спробували [Select_CString(target_ruler.IsFemale,'її', 'його')] вбити! Багато хто вважає, що ця підлість не повинна залишитися безкарною, і пропонують організувати похід на Рапперсвіль. Щоправда, цим містом править [target_location.GetOwner.GetName], і якщо ми все-таки нападемо, то наші чвари можуть перерости в набагато серйозніший конфлікт."
  flavor_swi.1002.a: "Рапперсвіль заплатить за це."
  swi_sacked_our_town: "Розорили наше місто"
  flavor_swi.1002.b: "Це занадто небезпечно."
  flavor_swi.1002.historical_info: "Відповіддю на спробу перевороту став похід Рудольфа Бруна на містечко Рапперсвіль, де переховувалися біженці з Цюриха. Побоюючись за життя графа Йоганна фон Габсбурга-Лауфенбурга, міський гарнізон здався, і війська Бруна вчинили в місті розбій. Мир запанував лише після втручання маркграфа бранденбурзького Людвіга фон Віттельсбаха."
  flavor_swi.1003.title: "Повернення вигнанців"
  flavor_swi.1003.desc: "Через свої невдалі реформи [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'втратила', 'втратив')] підтримку жителів #TOOLTIP:LOCATION,zurich,X #L Цюриха#!#!. Тоді члени міської ради зв'язалися з вигнанцями в Рапперсвілі й обіцяли підтримати їх у разі повернення. Незабаром після цього вони проникли в місто під покровом ночі й убили бургомістра прямо в [Select_CString(target_ruler.IsFemale,'її', 'його')] ліжку. Позбувшись [Select_CString(target_ruler.IsFemale,'своєї головної конкурентки', 'свого головного конкурента')], вигнанці знову прийшли до влади, а [Select_CString(target_new_ruler.IsFemale,'новою', 'новим')] главою Цюриха [Select_CString(target_new_ruler.IsFemale,'була обрана', 'був обраний')] [target_new_ruler.GetName]."
  flavor_swi.1003.a: "Старий порядок відновлено."
  flavor_swi.1100.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swi.1100.desc: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! священників зазвичай призначає єпископ, але буває й так, що місцеві жителі відкидають його вибір і висувають свого кандидата. Хоча такі випадки не рідкість, нещодавно на роль священника був обраний [target_character.GetName], який разюче відрізняється від своїх попередників. Він родом із селянської родини і швидко здобув популярність за свої прості, але щирі проповіді, які особливо підтримують [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l]."
  flavor_swi.1100.a: "Який умілий богослов!"
  flavor_swi.1100.b: "Неважливо, вміла людина чи ні. Правил слід дотримуватися."
  flavor_swi.1100.historical_info: "У 1506 році Ульріх Цвінглі отримав посаду парафіяльного священника в Гларусі. Цього вимагало місцеве населення, яке не бажало бачити на чолі своєї парафії іншого кандидата — Генріха Гьольді з Цюриха, який, на думку жителів, цікавився не стільки станом їхньої душі, скільки вагою їхніх гаманців. Цвінглі — чуйний і привітний селянський син — швидко здобув народну любов."
  flavor_swi.1101.title: "[target_character.GetNameWithNoTooltip] звинувачується в єресі"
  flavor_swi.1101.desc: "За останні роки [target_character.GetName] значно змінив зміст своїх проповідей. Якщо раніше він суворо дотримувався церковного вчення, то тепер усе далі відступає від нього. Він постійно критикує наші релігійні традиції, такі як дотримання постів, використання ікон і прийняття обітниць безшлюбності. З одного боку, ми повинні втрутитися і зберегти чистоту нашої віри, але з іншого — якщо ми спробуємо обмежити його діяльність, це може викликати гнів серед його послідовників."
  flavor_swi.1101.a: "Потрібно влаштувати чесну суперечку."
  flavor_swi.1101.b: "Позбавити його посади!"
  flavor_swi.conversion.tt: "Деякі [Concept('pops', 'групи населення')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! навертаються в #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!."
  flavor_swi.1101.historical_info: "Через кілька років після призначення на посаду священника Ульріх Цвінглі був звинувачений домініканцями Цюриха в єресі. Велика рада Цюриха, яка взялася за розгляд цього досить серйозного звинувачення, призначила на 29 січня 1523 року релігійний диспут. Поставши перед 600 богословами, зокрема перед знаменитим Йоганном Фабером, Цвінглі зумів відстояти свої погляди і був проголошений переможцем у суперечці."
  flavor_swi.1102.title: "Релігійний диспут у місті [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  flavor_swi.1102.desc: "[target_character.GetName] блискуче відстояв свої погляди в дебатах з іншими представниками духовенства. Його опоненти, які виступали на захист #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! віри, лише без кінця посилалися на авторитет традицій і звичаїв, і ці доводи виявилися абсолютно непереконливими для суддів."
  flavor_swi.1102.a: "[target_character.GetNameWithNoTooltip] гідно себе проявив!"
  flavor_swi.1102.b: "Це неприйнятно!"
  flavor_swi.large_conversion.tt: "Багато [Concept('pops', 'груп населення')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! навертаються в #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!."
  flavor_swi.1103.title: "[target_character.GetNameWithNoTooltip] набуває впливу"
  flavor_swi.1103.desc: "Завдяки своїм проповідям [target_character.GetName] здобув значну кількість прихильників та послідовників, і тепер [ROOT.GetCountry.GetName] є переважно #L [ShowReligionAdjective('lutheran')|l]ою#! країною. Їхні ідеї набули такого широкого поширення, що нам не залишається нічого іншого, окрім як офіційно прийняти лютеранство як державну релігію."
  flavor_swi.1103.a: "Це було неминуче."
  flavor_swi.1104.title: "[target_character.GetNameWithNoTooltip] користується підтримкою лютеран"
  flavor_swi.1104.desc: "Народ вкрай негативно відреагував на те, що [target_character.GetName] зазнав переслідування з нашого боку. Розлючені натовпи почали масово знищувати ікони та статуї в церквах по всій країні. Ці іконоборці вимагають негайно звільнити священника та дозволити йому знову проповідувати своє вчення."
  flavor_swi.1104.a: "Ми розгромимо бунтівників!"
  flavor_swi.1104.b: "Поступимося їхнім вимогам."
  zwingli_support_rebels: "Іконоборче повстання Цвінглі"
  zwingli_support_rebels_joining: "Усі #L [ShowReligionAdjective('lutheran')|l]і#! [Concept('pops', 'групи населення')|e] у [ROOT.GetCountry.Custom('CL_PREP')] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e] та приєднаються до фракції «[target_zwingli_support_rebels.GetName]»."
  flavor_swi.1200.title: "[ShowBuildingTypeNameWithNoTooltip('swi_collegium_helveticum')]"
  flavor_swi.1200.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] досі не мають можливості отримувати належну духовну освіту. На щастя, нещодавно влада #TOOLTIP:LOCATION,milano,X #L Мілана#!#! запропонувала заснувати в місті спеціальний богословський навчальний заклад, де зможуть навчатися священнослужителі #TOOLTIP:CULTURE,$high_alemannic_tt$,X #L верхньоалеманнського#!#! походження."
  flavor_swi.1200.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  swi_collegium_helveticum_explanation_tt: "Поки існує ця споруда, у #TOOLTIP:CULTUREGROUP,swiss_group,X #L швейцарських#!#! країнах з'являтимуться талановиті священники."
  flavor_swi.1200.b: "Потрібно прагнути інших варіантів."
  flavor_swi.1200.historical_info: "Навчання швейцарських священників у Мілані розпочалося в 1568 році з ініціативи архієпископа міланського Карло Борромео та папи римського Пія V. Продовженням цього починання стало заснування папою Григорієм XIII семінарії Collegium Helveticum. Відбором 75 потенційних учнів займалися виключно католицькі кантони."
  flavor_swi.1201.title: "Випускник Швейцарського колегіуму"
  flavor_swi.1201.desc: "Скориставшись нашою домовленістю з Міланом, деякі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] нашої країни вирушили навчатися до #TOOLTIP:BUILDING_TYPE,swi_collegium_helveticum,X #L Швейцарського колегіуму#!#!. Нещодавно один з них закінчив навчання і повернувся назад, щоб використовувати свої нові знання на благо батьківщини."
  flavor_swi.1201.a: "[ROOT.GetCountry.Custom('common_string_positive')]"