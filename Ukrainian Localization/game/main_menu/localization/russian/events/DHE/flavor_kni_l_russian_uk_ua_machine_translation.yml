l_russian:
  flavor_kni.3.title: "Каракка з Александрії"
  flavor_kni.3.desc: "Протягом століть невеликий, але професійний #L [ROOT.GetCountry.GetАdjective]ий#! флот залишався грозою наших численних ворогів — #TOOLTIP:RELIGION,$muslim_tt$,X #L мусульман#!#!. Він безжально розправлявся з ворожими каперами, захоплював #TOOLTIP:RELIGION,$muslim_tt$,X #L мусульманські#!#! торгові кораблі, поповнював #L [ROOT.GetCountry.GetCapital.GetAdjective]у#! скарбницю та наганяв жах на #TOOLTIP:RELIGION,$muslim_tt$,X #L мусульманських#!#! моряків. Одним із найбільших його досягнень стало захоплення великої #TOOLTIP:LOCATION,alexandria,X #L александрійської#!#! каракки в [GetCurrentYear] році: трюм цього судна виявився доверху набитий незліченними багатствами."
  flavor_kni.3.a: "Це божественне благословення!"
  opinion_captured_alexandria_great_carrack: "Захоплена велика каракка з Александрії"
  flavor_kni.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.4.desc: "На континенті [target_location.GetRegion.GetSubContinent.GetContinent.GetName] [target_character.GetName] вважається [Select_CString(target_character.IsFemale, 'однією з найкращих проєктувальниць', 'одним з найкращих проєктувальників')] укріплень, тому [Select_CString(target_character.IsFemale, 'її', 'його')] призначили провести вдосконалення фортець на #TOOLTIP:LOCATION,rodos,X #L Родосі#!#!. У [GetCurrentYear] році, щойно прибувши до нашої столиці та ще не встигнувши приступити до роботи, [Select_CString(target_character.IsFemale, 'вона була настільки зачарована', 'він був настільки зачарований')] нашими людьми та їхніми цінностями, що на колінах [Select_CString(target_character.IsFemale, 'благала', 'благав')] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'правительку', 'правителя')] посвятити [Select_CString(target_character.IsFemale, 'її', 'його')] в лицарі. Тепер [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] перебуває в розгубленості: важко відмовити людині, що володіє такою завидною завзятістю та неперевершеними інженерними навичками."
  flavor_kni.4.a: "З [Select_CString(target_character.IsFemale, 'неї', 'нього')] вийде чудовий лицар…"
  flavor_kni.5.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.5.desc: "Після того, як [ShowLocationName('malta')] перейшла до нас, вона уподібнилася #TOOLTIP:LOCATION,rodos,X #L Родосу#!#!, перетворившись на справжнісіньку фортецю. [target_character.GetName] та [Select_CString(target_character.IsFemale, 'її', 'його')] натренований гарнізон неодноразово доблесно відваджували загарбників. Це нове місто, забудоване величними палацами та потужними укріпленнями, буде багатіти та розвиватися за рахунок морських операцій проти наших численних ворогів."
  flavor_kni.5.a: "Це символ нашої стійкості та віри!"
  flavor_kni.100.title: "[GetCountry('KNI').GetNameWithNoTooltip]"
  flavor_kni.100.desc: "Загін легендарних лицарів, чиї мечі були загартовані в спекотних битвах по всьому Середземномор’ю, прибули до нашого двору з проханням. Після того, як [target_rodos_owner.GetLongName] [Select_CString(target_rodos_owner.IsFemale, 'вигнала', 'вигнав')] їх з #TOOLTIP:LOCATION,rodos,X #L Родосу#!#!, [GetCountry('KNI').GetName] блукали світом у пошуках нового дому, плекаючи надію знову стати благородними захисниками нашої віри. Нарешті в [GetCurrentYear] році [GetUniqueInternationalOrganization('hre').GetLeaderTitle] [GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.GetName] [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'погодилася', 'погодився')] подарувати їм острів [ShowLocationName('malta')], але тільки з нашого схвалення."
  flavor_kni.100.a: "[GetCountry('KNI').GetNameWithNoTooltip|U] отримають Мальту."
  spa_ceded_malta: "Ми подарували Мальту"
  spa_ceded_malta_pap: "Ми подарували Мальту лицарям"
  flavor_kni.100.b: "Не будемо нічого давати."
  spa_refused_ceding_malta: "Ми відмовилися подарувати Мальту лицарям"
  flavor_kni.7.title: "Переклад хроніки"
  flavor_kni.7.desc: "#italic Морейська хроніка#! описує, як [ShowScriptedGeographyName('greece_geography')] пережила встановлення #italic франкократії#!, і охоплює події XIII століття після Четвертого хрестового походу. Колись [GetCountry('LAT').GetLongName] пал[GetCountry('LAT').Custom('endlong_fem')] під натиском сусідів зі сходу, проте [GetCountry('BYZ').GetLongName] не зумів[GetCountry('BYZ').Custom('endlong_fem')] підкорити безліч інших країн, зокрема #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Ми можемо не лише перекласти літопис, а й доповнити його новітньою історією нашої країни."
  flavor_kni.7.a: "Ми перекладемо хроніку."
  flavor_kni.7.b: "Нам це ні до чого."
  flavor_kni.8.title: "Церква Святої Трійці"
  flavor_kni.8.desc: "На територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! прибуває все більше хрестоносців, які прагнуть битися за #L [target_religion.GetAdjective|l]у#! релігію, і наш рідний острів [target_location.GetName] вже тріщить по швах від напливу вірян. [ROOT.GetCountry.GetFlavorRank] пропонує виділити нам частину накопичених багатств на зведення церкви, здатної вмістити всіх новоприбулих."
  flavor_kni.8.a: "Ми назвемо цю церкву на честь Святої Трійці."
  flavor_kni.8.b: "Ми оберемо її покровителем архангела Михаїла."
  flavor_kni.8.c: "Ми славимо Господа по-різному."
  flavor_kni.9.title: "Фортеця Фераклос"
  flavor_kni.9.desc: "Фортеця Фераклос — одна з безлічі твердинь, розташованих на нашому рідному острові [target_location.GetName]. У 1306 році ми захопили цей замок, щоб здобути контроль над островом. Тепер же, століття потому, ця споруда стоїть зруйнована та покинута, а її завдання виконують інші укріплення, збудовані в столиці. Можливо, настав час відновити стару фортецю та повернути їй втрачене значення."
  flavor_kni.9.a: "Ми виділимо кошти на ремонт."
  flavor_kni.9.b: "Нам зараз не потрібна оборона."
  flavor_kni.10.title: "[target_country.GetCulture.GetNameWithNoTooltip]і пірати"
  flavor_kni.10.desc: "За десятиліття, що минули з моменту встановлення #italic франкократії#! на Південних #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, торгові республіки #TOOLTIP:REGION,italy_region,X #L Італії#!#! суттєво розширили свою діяльність, і кількість торгових суден, що борознять води #TOOLTIP:PROVINCE_DEFINITION,aegean_sea_province,X #L Егейського моря#!#!, зросла в рази. На жаль, коли ми розбагатіли, країни-суперниці стали намагатися насолити нам будь-якими засобами. Цього разу #L [target_country.GetAdjective|l]і#! влади, що ворогують з нами на ґрунті релігії, вирішили найняти каперів, які тепер нахабно нападають на #L [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective|l]і#! кораблі."
  flavor_kni.10.a: "Вони понесуть покарання!"
  flavor_kni.11.title: "Fidei Defensor"
  flavor_kni.11.desc: "Наш генерал [target_character.GetName] [Select_CString(target_character.IsFemale, 'була удостоєна', 'був удостоєний')] звання [Select_CString(target_character.IsFemale, 'захисниці', 'захисника')] віри, #italic Fidei Defensor#!. Святий Престол схвалив наше смиренне прохання про нагородження. Ми вважаємо, що [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'внесла', 'вніс')] видатний внесок у підтримку християнства, і війська під [Select_CString(target_character.IsFemale, 'її', 'його')] началом поширять нашу віру по всьому світу."
  flavor_kni.11.a: "Заслужена нагорода!"
  flavor_kni.12.title: "Лицарі Нового Світу"
  flavor_kni.12.desc: "Колоністи — гордість [ROOT.GetCountry.Custom('rank_ru_GEN')|l] — заснували першу нашу колонію на #TOOLTIP:REGION,caribbean_region,X #L Карибах#!#!. Віднині вона буде оплотом віри та притулком для всіх #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! переселенців, що рятуються від охоплених #TOOLTIP:CONTINENT,europe,X #L Європою#!#! заворушень. Це поселення — символ наших прагнень: не тільки стратегічно важливе місце, а й новий рубіж, завойований [ROOT.GetCountry.Custom('rank_ru_INST')|l]. Однак, попри всю цінність колонії, поки ще немає єдиної думки, чи варто взагалі займатися подальшою колонізацією."
  flavor_kni.12.a: "Виділити ресурси на продовження колонізації."
  flavor_kni.12.b: "Це зовсім неважливе завдання."
  flavor_kni.12.historical_info: "$flavor_kni.1000.historical_info$"
  flavor_kni.13.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.13.desc: "[target_character.GetName] так стрімко просувається по службі на благо [ROOT.GetCountry.Custom('rank_ru_GEN')|l], що багато хто всерйоз роздумує над тим, щоб заохотити [Select_CString(target_character.IsFemale, 'її', 'його' )] новою посадою. [target_character.GetLastNameWithNoTooltip] — досвідчений і впевнений керівник, [Select_CString(target_character.IsFemale, 'вона', 'він' )] розмірковує над тим, як би зміцнити нашу владу над #TOOLTIP:REGION,caribbean_region,X #L Карибами#!#!, зміцнити там оборону та забезпечити процвітання колонії."
  flavor_kni.13.a: "Призначити [Select_CString(target_character.IsFemale, 'її', 'його' )] губернатором островів."
  flavor_kni.13.b: "Нам не потрібні [Select_CString(target_character.IsFemale, 'її', 'його' )] послуги."
  flavor_kni.13.historical_info: "Філіп де Лонвільє де Пуансі — французький лицар з Ордену Святого Іоанна, що з 1639 року до своєї смерті в 1660 році служив губернатором Сент-Кітса і користувався майже безроздільною владою над островом. Завдяки його зусиллям вдалося зміцнити оборонні споруди Сент-Кітса та відстояти його у колоніальних країн — суперниць."
  flavor_kni.14.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kni.14.desc: "[target_character.GetName] — видатна особистість, широко відома в [ROOT.GetCountry.Custom('rank_ru_PREP')|l]. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] славиться своїм непохитним характером та мистецтвом вести переговори. [target_character.GetName], [Select_CString(target_character.IsFemale, 'захисниця', 'захисник' )] фортець [ROOT.GetCountry.Custom('rank_ru_GEN')|l], твердо має намір зробити нашу хватку над Середземномор'ям ще міцнішою, щоб інші країни тремтіли перед нашою силою. Цій людині властивий і інший талант: [Select_CString(target_character.IsFemale, 'вона', 'він' )] вміло лавірує в політичних водах #TOOLTIP:CONTINENT,europe,X #L Європи#!#! і завжди може укласти корисний союз та заручитися фінансовою підтримкою."
  flavor_kni.14.a: "Передати [Select_CString(target_character.IsFemale, 'їй', 'йому' )] владу над [ROOT.GetCountry.Custom('rank_ru_INST')|l]."
  flavor_kni.14.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] нашої країни отримає чималу користь з мудрості цієї людини."
  flavor_kni.14.c: "Нас це не цікавить."
  flavor_kni.14.historical_info: "Джованні Паоло Ласкаріс з 1636 по 1657 рр. обіймав посаду великого магістра Ордену госпітальєрів. Займався зміцненням оборони ордену на Середземному морі, щоб місцеві брати були в змозі відбитися від османів. Крім того, Ласкаріс був умілим послом і зміг домогтися фінансової допомоги ордену від кількох європейських монархів. Завдяки йому госпітальєри зміцнили свої позиції на Середземномор'ї, однак не обійшлося і без міжусобиць з приводу управління заморськими володіннями ордену."
  flavor_kni.15.title: "Каліназькі аборигени нападають на місцевість [target_location.GetNameWithNoTooltip]"
  flavor_kni.15.desc: "#TOOLTIP:CULTURE,$carib_culture_tt$,X #L Каліназькі#!#! воїни влаштували низку жорстоких нападів на місцевість [target_location.GetName]. Вони розоряють наші будинки, спалюють посіви та вбивають поселенців. Ці нещадні аборигени вже довго чинять опір спробам європейців заселити острови, і тепер наших підданих охопило справжнє сум'яття. Деякі стверджують, що якщо [ROOT.GetCountry.GetFlavorRank|l] відповість силою, то кровопролиття лише посилиться, а напади у відповідь стануть ще нещаднішими. Інші ж наполягають, що необхідно завдати удару у відповідь по селах аборигенів, щоб усунути загрозу нашим поселенням."
  flavor_kni.15.a: "Тут ми безсилі."
  flavor_kni.15.b: "Провести удар у відповідь!"
  flavor_kni.15.historical_info: "Госпітальєрам було важко утримувати Карибські острови. Відносно впевнено орден контролював тільки острівні столиці; інші поселення нерідко ставали легкою здобиччю для аборигенів. Після кровопролитного нападу племені калінаго на Сен-Бартелемі нечисленні вцілілі втекли з острова, і влада госпітальєрів над колоніями ослабла ще більше."
  flavor_kni.16.title: "Лицарі стають піратами"
  flavor_kni.16.desc: "Грошове становище [ROOT.GetCountry.Custom('rank_ru_GEN')|l] стає дедалі важчим, тому деякі брати пішли на відчайдушний крок: у гонитві за багатством і славою вони почали грабувати кораблі торговців-#TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#!, а здобич пускати на предмети розкоші. Деякі з них остаточно відкинули наші ідеали і стали каперами або записалися моряками на іноземний флот, сподіваючись зробити там статок. Хтось вважає такі вчинки безчесними, інші ж стверджують, що інакше [ROOT.GetCountry.GetFlavorRank|l] просто не виживе."
  flavor_kni.16.a: "Нам їх не зупинити…"
  flavor_kni.16.b: "Засудити їхні вчинки та відновити дисципліну."
  flavor_kni.16.c: "Дивитися на це крізь пальці за умови, що вони ділитимуться здобиччю."
  flavor_kni.16.historical_info: "Під час освоєння Мальти лицарі Ордену госпітальєрів зіткнулися зі значними фінансовими труднощами: колишні джерела доходу вичерпувалися, а витрати на утримання сторожових кораблів у Середземномор'ї тільки зростали. Багато госпітальєрів перейшли до каперства і почали грабувати кораблі торговців-мусульман під приводом захисту християнського світу. З часом обстановка лише погіршилася, і деякі лицарі остаточно перетворилися на піратів, що живуть на награбовану здобич. Деякі з них поповнили ряди моряків французького та іспанського флотів, що обіцяли багате і насичене життя."
  flavor_kni.17.title: "Захоплення Триполі"
  flavor_kni.17.desc: "Над [ShowLocationName('tripoli')] — оплотом християнського світу на узбережжі #TOOLTIP:CONTINENT,africa,X #L Африки#!#!, що дістався нам у нелегкій боротьбі, — тепер майорять прапори [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Однак після цієї важкої перемоги нас чекають нові труднощі: Триполі потрібно буде утримати. З усіх боків нас оточують ворожі країни, укріплення недостатньо сильні, щоб успішно протистояти постійним набігам піратів і корсарів, а чисельність гарнізону занадто мала. Деякі задаються питанням, чи зможемо ми взагалі відстояти цей далекий рубіж."
  flavor_kni.17.a: "Ми нічого не зробимо."
  flavor_kni.17.b: "Покращимо місцеві укріплення."
  flavor_kni.17.c: "Вкладемо кошти в інфраструктуру."
  flavor_kni.17.d: "Місцева гавань процвітатиме під нашим управлінням!"
  flavor_kni.17.historical_info: "У 1530 році імператор Карл V передав лицарям Триполі, а також острови Мальту і Гоцо. Влада ордену над Триполі, однак, виявилася неміцною: їм дісталося самотнє, погано захищене, оточене ворогами місто. Утримувати його в таких умовах, відбиваючись при цьому від постійних нальотів і повстань, було важко. У 1551 році, після довгого опору, місто взяли штурмом османські війська. Гарнізон Триполі разом з лицарями змушений був здатися."
  flavor_kni.18.title: "Історія госпітальєрів"
  flavor_kni.18.desc: "[target_character.GetName] — людина, щиро віддана справі [ROOT.GetCountry.Custom('rank_ru_GEN')|l] — [Select_CString(target_character.IsFemale, 'висловила', 'висловив' )] інтерес до збереження нашого минулого, щоб з ним могли згодом ознайомитися нащадки. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] збирається скласти обширну #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроніку#!#!, в якій докладно буде описана історія [ROOT.GetCountry.Custom('rank_ru_GEN')|l] з усіма злетами і падіннями. Однак таке починання потребуватиме значних коштів: якось потрібно буде покрити дослідницькі роботи, подорожі та безпосередньо видання праці."
  flavor_kni.18.a: "Неодмінно потрібно скласти історію, якою пишатиметься [ROOT.GetCountry.GetFlavorRank|l]!"
  flavor_kni.18.b: "У нас немає зайвих коштів."
  flavor_kni.18.historical_info: "Джакомо Бозіо — італійський історик і госпітальєр, який присвятив майже все своє життя документуванню історії ордену. У 1594 році він опублікував найвідомішу свою працю під назвою #italic Dell’Istoria della Sacra Religione et Illustrissima Militia di San Giovanni Gierosolimitano#! — грандіозну хроніку, що в подробицях описувала історію походження ордену, його роль у хрестових походах, боротьбу з османами та обґрунтування на Мальті."
  flavor_kni.110.title: "На заході доби хрестових походів"
  flavor_kni.110.desc: "У 1291 році влада #ONCLICK:COUNTRY,[GetCountry('MAM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MAM').Custom('CL_tt')],X [GetCountry('MAM').Custom('CL_GEN')|L]#!#! завоювала #TOOLTIP:LOCATION,acre,X #L Акру#!#!, яка залишалася нашим останнім плацдармом на Святій землі. Коли язичники відтіснили нас, і кривава боротьба принесла нам лише ганьбу та безліч смертей, це стало серйозним випробуванням для нашої віри.\n\nЗгодом ми відступили спочатку на #TOOLTIP:PROVINCE_DEFINITION,cyprus_province,X #L Кіпр#!#!, а потім — на #TOOLTIP:LOCATION,rodos,X #L Родос#!#!, щоб зібратися з силами і повернути землі, які по праву належали нам. Однак час ішов, воїни, що брали участь в облозі Акри, один за одним покидали цей світ, а люди при дворі стали все більше і більше сумніватися в нашому призначенні…"
  flavor_kni.110.a: "У душі ми все ще хрестоносці!"
  pap_gets_flavor_kni.111_tt: "У [target_pope_country.Custom('CL_PREP')] трапляється подія #Y «Відновлення хрестових походів»#!"
  flavor_kni.110.b: "Варто звернути погляд усередину і зайнятися розвитком нашої твердині."
  lose_100_opinion_with_pope_tt: "Відносини між нами та [target_pope_country.Custom('CL_INST')] погіршаться на #R 100#! одиниць."
  kni_receive_stronger_events_about_building_capital_tt: "Наступні події, пов'язані з розвитком нашої столиці, стануть ефективнішими"
  flavor_kni.110.c: "Не варто порушувати статус-кво."
  flavor_kni.111.title: "Відновлення хрестових походів"
  flavor_kni.111.desc: "Останні століття в #TOOLTIP:AREA,levant_area,X #L Леванті#!#! пахло потом, кров’ю та пилом: ми без упину билися з нашими ворогами-#TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманами#!#! за контроль над Святою землею. Хоча ми припустилися чимало помилок, наші подвиги увійшли в історію, надихнувши багатьох азартних лицарів та воїнів на продовження нашої справи. Представники #ONCLICK:COUNTRY,[GetCountry('KNI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('KNI').Custom('CL_tt')],X [GetCountry('KNI').Custom('CL_GEN')|L]#!#! пропонують нам профінансувати новий хрестовий похід, у ході якого ми отримаємо ще одну нагоду повернути те, що по праву належить нам."
  flavor_kni.111.a: "Яка приємна несподіванка!"
  flavor_kni.111.b: "Ми не можемо собі цього дозволити."
  opinion_deteriorates_and_gets_event_tt: "На території [GetCountry('KNI').Custom('CL_GEN')] трапляється подія #italic «Відкинуте призначення»#!, думка місцевих жителів про нас погіршується"
  flavor_kni.112.title: "Відкинуте призначення"
  flavor_kni.112.desc: "Ми завжди захищали Святу землю від посягань язичників та ворогів, однак нещодавно Святий отець не побажав благословити нас на черговий хрестовий похід. Ця відмова, яку інакше, як зрадою, не можна назвати, залишила після себе гіркий післясмак…"
  flavor_kni.112.a: "Невже Папа впав у гріх?"
  flavor_kni.120.title: "Розвиток [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_kni.120.desc: "Наша столиця десятиліттями слугувала плацдармом для нападу на невірних. Згодом стало очевидно, що для втілення наших цілей та підвищення авторитету в очах інших #L [ROOT.GetCountry.GetReligion.GetAdjective|l]их#! сил нам знадобиться нова твердиня. Під нашими знаменами [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] стане обителлю безлічі забезпечених громадян, які прагнуть вписати наші імена в аннали історії."
  flavor_kni.120.a: "Ми надаватимемо громадянство чужоземним купцям."
  flavor_kni.120.b: "Краще займемося розвитком інфраструктури."
  flavor_kni.121.title: "[target_location.GetNameWithNoTooltip] та військово-морські операції"
  flavor_kni.121.desc: "Острів [target_location.GetName] має дуже вдале розташування. Завдяки своїй близькості до узбережжя регіону [target_location.GetRegion.GetName] він слугує важливою стратегічною точкою в наших військово-морських операціях уздовж сусідніх берегів. Водночас він пов’язує між собою схід та захід, і багато закордонних купців використовують його як зупинку в подорожах на Близький Схід та назад."
  flavor_kni.121.a: "Ми підтримаємо виробництво суднобудівних матеріалів."
  flavor_kni.121.b: "Ми займемося розміщенням купців."
  flavor_kni.121.c: "Краще подбаємо про місцевих жителів."
  flavor_kni.130.title: "Чудодійний землетрус"
  flavor_kni.130.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] сталося справжнє диво! У самий розпал штурму #L [siege_leader.GetAdjective|l]их#! військ земля почала несамовито трястися, що призвело до розгубленості як атакуючу, так і сторону, що оборонялася. Підземні поштовхи незабаром переросли в цунамі, через що наші противники втратили майже всі запаси провіанту, і облогу було перервано."
  flavor_kni.130.a: "Що це: благословення чи прокляття?"
  flavor_kni.131.title: "Землетрус у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_kni.131.desc: "Коли ми штурмували [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip], сама природа збунтувалася проти нас. Землетрус небаченої сили спровокував страшні руйнування та забрав безліч життів, а цунамі, що послідувало за ним, знищило наші запаси продовольства, і ми більше не мали можливості продовжувати облогу."
  flavor_kni.131.a: "Прокляття!"
  flavor_kni.150.title: "Замок у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_kni.150.desc: "[target_location.GetOwner.GetName] з великим трудом утримує владу над [target_location.Custom('LR_INST')|l] [target_location.GetName]. Ні для кого не секрет, що наші побратими-лицарі могли б без проблем висадитися на півострові та відбудувати там замок. Щоб скоротити ризики та витрати, як основу для нової твердині ми могли б використати стародавній Галікарнаський мавзолей."
  flavor_kni.150.a: "Ми захопимо ці землі та зведемо замок на руїнах мавзолею."
  flavor_kni.150.b: "Ми використовуватимемо в будівництві лише свої матеріали."
  flavor_kni.150.c: "Нам ні до чого замок на великій землі."
  flavor_kni.151.title: "[target_location.GetNameWithNoTooltip] і замок чужинців"
  flavor_kni.151.desc: "Ці негідники з #L [kni_from.GetAdjective|l]ого#! братства висадилися на берегах [target_location.Custom('LR_GEN')|l] [target_location.GetName] і розпочали будівництво замку. Хоча формально [target_location.GetRank.GetName|l] належить нам, від найближчого відділення бейліфів це місце відділяють багато миль, і ми не зуміли вчасно відреагувати на загрозу. Схоже, нам залишилося лише одне: провчити цих мерзотників у бою."
  flavor_kni.151.a: "Ми дамо їм урок."
  flavor_kni.1000.title: "Розширення володінь на Карибах"
  flavor_kni.1000.desc: "[ROOT.GetCountry.GetFlavorRank] — наш вірний середземноморський оплот проти язичництва, однак ми не збираємося обмежуватися одним лише Середземним морем. #TOOLTIP:REGION,caribbean_region,X #L Карибські#!#! острови багаті на різні природні запаси і знаходяться поруч із найважливішими торговими шляхами, а тому дехто в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] пропонує купити один із таких островів — і [target_country.GetLongName] охоче нам його продасть. [ROOT.GetCountry.GetGovernment.GetCabinetTitle] особливо цікавиться такою місцевістю, як [target_location.GetName]."
  flavor_kni.1000.a: "Надіслати прохання про купівлю острова."
  kni_if_target_agrees: "Якщо [target_country.GetName] погодиться:"
  flavor_kni.1000.b: "Нам це не потрібно."
  flavor_kni.1000.historical_info: "У 1651 році Орден госпітальєрів, очолюваний тоді великим магістром Джованні Паоло Ласкарісом, зумів поширити свій вплив за межі Середземномор'я: лицарі придбали у французької #italic Compagnie des Îles de l’Amérique#! кілька островів у Карибському морі — Сент-Крістофер, Сен-Мартен, Сен-Бартелемі та Сен-Круа. Однак закріпитися на них виявилося дуже важко: крім складнощів із постачанням орден зіткнувся з фінансовими труднощами та загрозами з боку європейських країн — суперниць. У 1665 році лицарі були змушені продати свої володіння на Карибах назад."
  flavor_kni.1001.title: "[from_country.GetNameWithNoTooltip] робить нам пропозицію"
  flavor_kni.1001.desc: "Ми отримали несподівану пропозицію від #ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_GEN')|L]#!#! — відомого захисника Середземномор'я, що прагне сьогодні закріпитися в Новому Світі. Пропозиція дуже проста: нас просять продати одне з належних нам #TOOLTIP:REGION,caribbean_region,X #L карибських#!#! володінь, а саме — [target_location.GetName]."
  flavor_kni.1001.a: "Погодитися продати острови."
  flavor_kni.1001.b: "Про це й мови бути не може!"
  flavor_kni.1002.title: "[target_location.GetNameWithNoTooltip] у нових руках"
  flavor_kni.1002.desc: "Переговори завершилися успіхом, і [target_location.GetName] тепер у наших руках! Ця фортеця на #TOOLTIP:REGION,caribbean_region,X #L Карибах#!#! послужить [ROOT.GetCountry.Custom('rank_ru_DAT')|l] новим опорним пунктом. Звідси ми почнемо поступове підкорення Нового Світу."
  flavor_kni.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_kni.1002.a.t: "Ми отримали від #ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_GEN')|L]#!#! місцевість [target_location.GetName]"
  flavor_kni.1003.title: "Угода не здійснилася"
  flavor_kni.1003.desc: "Відповіддю на нашу пропозицію стала відмова: [target_country.GetName] вважає, що [target_location.GetName] — занадто важлива територія, щоб з нею розлучатися. Серед братів почалися розбіжності: хтось вважає, що ще рано відмовлятися від задуму влаштувати хрестовий похід у Новий Світ і варто пошукати іншу можливість, інші ж стверджують, що нам дали знак і далі обороняти Середземномор'я."
  flavor_kni.1003.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_kni.1003.a.t: "[target_country.GetName] відмовив[target_country.Custom('end_assya')] продавати нам місцевість [target_location.GetName]."
  flavor_kni.2000.title: "Продаж колоній"
  flavor_kni.2000.desc: "Сенс подальшого існування нашої #TOOLTIP:REGION,caribbean_region,X #L карибської#!#! колонії все частіше ставиться під сумнів. У Європі виникають все сильніші конкуренти, великі держави нарощують свою міць, а утримання острівних володінь постійно упирається в дві суттєві труднощі — постачання та кошти. У [ROOT.GetCountry.Custom('rank_ru_PREP')|l] багато хто вважає, що нам час продати всі карибські володіння і зосередитися виключно на обороні європейських фортець. Нам навіть підібрали можливого покупця — це [target_country.GetName], країна, що вже володіє володіннями в цьому регіоні і до того ж підтримує непогані стосунки з [ROOT.GetCountry.Custom('rank_ru_INST')|l]. Однак є й ті, хто вважає, що наше призначення в Новому Світі ще далеко від виконання, і залишити колонії означає зробити найсерйознішу помилку."
  flavor_kni.2000.a: "Ці острови лежать на нас тягарем."
  flavor_kni.2000.a.t: "Якщо [target_country.GetName] погодиться:"
  flavor_kni.2000.b: "Ми не залишимо колонії!"
  flavor_kni.2000.historical_info: "У 1665 році орден Госпітальєрів, будучи не в змозі утримувати свої колонії, продав карибські острови Сент-Крістофер, Сен-Мартен, Сен-Бартелемі та Сен-Круа французам. Причиною цьому стали складнощі в обороні від аборигенів, англійців та голландців, а також нестача фінансових та військових ресурсів."
  flavor_kni.2001.title: "Продаж колоній"
  flavor_kni.2001.desc: "Сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] розглядає несподівану пропозицію, що надійшла нам від #ONCLICK:COUNTRY,[from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from_country.Custom('CL_tt')],X [from_country.Custom('CL_GEN')|L]#!#!: ця сторона бажає продати нам свої володіння в #TOOLTIP:REGION,caribbean_region,X #L Карибському#!#! морі, посилаючись на фінансові та стратегічні складнощі. Хоч ці острови й невеликі, але вони можуть стати для нас важливими форпостами, що полегшують нам торгівлю, а також оборону та дослідження Нового Світу."
  flavor_kni.2001.a: "Погодитися купити острови."
  flavor_kni.2001.b: "Відхилимо пропозицію."
  flavor_kni.2002.title: "[target_country.GetNameWithNoTooltip] купує наші колонії"
  flavor_kni.2002.desc: "На нашу пропозицію відповіли згодою. Ми передали #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! владу над #TOOLTIP:REGION,caribbean_region,X #L Карибами#!#!, відобразивши це й у документах. Гроші, виручені за продаж, підуть на зміцнення нашого становища — тепер захищати Середземномор'я та наші головні володіння буде простіше."
  flavor_kni.2002.a: "Так було треба…"
  flavor_kni.2002.a.t: "Ми успішно продали #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! свої колоніальні володіння"
  flavor_kni.2003.title: "Країна [target_country.GetNameWithNoTooltip] відхиляє пропозицію"
  flavor_kni.2003.desc: "Влада #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! не погодилася купити належні нам #TOOLTIP:REGION,caribbean_region,X #L Карибські#!#! острови. Вони або вважають ці далекі володіння недостатньо цінними, або просто не бажають вкладати кошти в їх утримання. Поки що влада над островами залишається у нас — так само як і фінансовий тягар, нерозривно пов'язаний з їх утриманням."
  flavor_kni.2003.a: "Знайдемо інше рішення."
