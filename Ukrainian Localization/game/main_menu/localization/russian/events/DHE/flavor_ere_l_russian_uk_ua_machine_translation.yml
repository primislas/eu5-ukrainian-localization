l_russian:
  flavor_ere.1.title: "Крок до незалежності"
  flavor_ere.1.desc: "Володарі зі Сходу надто довго гнобили наш народ. Відтоді, як впала стара влада Ільханідів, багато воєначальників намагалися приєднати #TOOLTIP:REGION,persia_region,X #L Персію#!#! і навіть #TOOLTIP:REGION,anatolia_region,X #L Анатолію#!#! до своїх земель. Але тепер, коли наші володіння достатньо великі, питання здобуття незалежності стає все більш нагальним…"
  flavor_ere.1.a: "Час скинути [target_country.GetAdjectiveWithNoTooltip|l]і окови!"
  flavor_ere.1.b: "Ще не час."
  declare_indep_war_tt: "Це може призвести до #italic війни за незалежність#! проти них!"
  flavor_ere.2.title: "Проблеми в Анатолії"
  flavor_ere.2.desc: "Попри всі наші спроби приборкати хаос, спричинений падінням Ільханідів, група наших підданих, яку очолює [target_character.GetName], вирішила пред'явити нам ультиматум. Вони готові взятися за зброю, якщо ми не звільнимо їх від своєї влади відтепер і назавжди!"
  flavor_ere.2.a: "Значить, війна!"
  flavor_ere.2.b: "Відкрита ворожнеча нам ні до чого…"
  flavor_ere.2.historical_info: "У середині XIV століття держава Еретнідів набула автономії та почала зміцнювати свою владу в Анатолії. Це призвело до зіткнень з Джалаїрідами, які прагнули підкорити собі всі території, що раніше належали Ільханату. Під проводом Хасана Бурзуга та його спадкоємця Шайха Увайса Джалаїріди намагалися посилити свій вплив в Анатолії та зберегти контроль над місцевими тюрками та монголами."
  flavor_ere.3.title: "Безбородий пророк"
  flavor_ere.3.desc: "Жорстока війна за незалежність з нашими колишніми панами з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! завершилася нашою рішучою перемогою! Радісний народ на міських вулицях прославляє міць і рішучість нашого правителя, який не здригнувся перед обличчям небезпеки. Воістину, [target_character.GetName] увійде в історію нашого народу, якому божественною волею призначено стати могутнім бейліком #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!."
  flavor_ere.3.a: "Хай живе [target_character.GetName]!"
  beardless_prophet: "Безбородий пророк"
  flavor_ere.3.historical_info: "Еретна, який прийшов до влади в центральній Анатолії після смерті Хасана Кучака, проголосив себе султаном і почав карбувати монету зі своїм ім'ям. Він підкорив території від Коньї до Ерзурума, зокрема такі міста, як Анкара, Кайсері та Сівас, що в різний час були його столицями. Бувши досвідченим правителем, Еретна вміло використовував політичний хаос у мамлюкському Єгипті та смерть правителів конкуруючих держав, щоб згуртувати та розширити свої володіння. Попри дружбу з монгольським племенем кереїв та монгольські символи на своїх монетах, він намагався послабити позиції монголів, призначаючи на ключові посади мамлюків та представників місцевих тюркських племен. Бувши освіченим та шанованим правителем, Еретна підтримував у своїй країні порядок та стабільність протягом усього свого правління."
  flavor_ere.4.title: "Перспективний командир"
  flavor_ere.4.desc: "На полі битви швидкість і рішучість можуть відділяти славну перемогу від трагічної поразки. [target_character.GetName] вміє приймати складні рішення та зберігати тактичну перевагу, але це не єдині [Select_CString(target_character.IsFemale, 'її', 'його' )] чесноти. Піднявшись з лав простої піхоти, [Select_CString(target_character.IsFemale, 'ця героїня', 'цей герой' )] численних битв [Select_CString(target_character.IsFemale, 'готова', 'готовий' )] очолити наші війська."
  flavor_ere.4.a: "Призначимо [Select_CString(target_character.IsFemale, 'її', 'його' )] командиром армії."
  flavor_ere.4.b: "У нашій еліті немає місця селянам!"
  target_character_will_make_fine_general_tt: "[target_character.GetShortNameWithNoTooltip] зможе служити генералом"
  flavor_ere.5.title: "[target_character2.GetNameWithNoTooltip] вимагає корону"
  flavor_ere.5.desc: "[target_character2.GetName] багато років вірно служив під нашими прапорами, проте у світлі останніх віянь у зовнішній та внутрішній політиці він перетворився на нашу найбільшу невдачу. [target_character2.GetShortNameWithNoTooltip] уявив себе більш гідним правителем, ніж [target_character.GetName], і збирається взяти владу силою зброї.\n\nЙого нічим не обґрунтовані заяви про відродження нашого народу та відновлення його колишньої могутності знаходять відгук у серцях багатьох підданих, віщуючи великі лиха…"
  flavor_ere.5.a: "Цей дурень погубить наш народ!"
  impacted_locations_var_tt: "Кілька [Concept('locations', 'місцевостей')|e] (близько [ROOT.GetVariable('num_rebelling_locations').GetValue]) перейдуть на бік персонажа [target_character2.GetNameWithNoTooltip]"
  burhan_al_din_pretenders: "[GetCharacter('ere_burhan_al_din').GetShortNameWithNoTooltip] претендує на владу"
  flavor_ere.6.title: "Кьошк медресе"
  flavor_ere.6.desc: "Безчасна кончина [ere_suli_scope.GetName] підірвала дух нашого найдорожчого правителя: [ruler_scope.GetName|l] вважає, що звичайних похоронних ритуалів недостатньо для того, щоб належним чином вшанувати її пам'ять.\n\nВидатний #TOOLTIP:CULTURE,$armenian_culture_tt$,X #L вірменський#!#! архітектор [ere_kaluyan_scope.GetName] пропонує побудувати в #TOOLTIP:LOCATION,kayseri,X #L Кайсері#!#! #TOOLTIP:BUILDING_TYPE,madrasa,X #L медресе#!#! нового типу, яке увічнитиме ім'я [ere_suli_scope.GetShortNameWithNoTooltip] у віках."
  flavor_ere.6.a: "Наймемо його і побудуємо медресе."
  flavor_ere.6.b: "Нам це не по кишені."