l_russian:
  flavor_fra.1.title: "Запровадження постійного податку"
  flavor_fra.1.desc: "Внаслідок копіткої праці [ruler_fra.GetName|l] все ж [Select_CString(ruler_fra.IsFemale,'завершила', 'завершив')] перетворення фінансової системи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Протягом багатьох років королівська влада лише іноді, в найкритичніших випадках, збирала #TOOLTIP:POLICY,exceptional_only,X #L надзвичайний податок#!#!. Тепер же [ruler_fra.GetShortNameWithNoTooltip|l] планує запровадити постійний податок. Щоб уникнути обурення серед впливових верств населення, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] будуть звільнені від сплати податку, проте [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] навряд чи зрадіють таким змінам."
  flavor_fra.1.a: "Видамо закони."
  flavor_fra.1.b: "Стара система була надійнішою…"
  enables_taille_laws: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з'явиться доступ до правила #TOOLTIP:LAW,fra_taille,X #L «Талья»#!#!."
  flavor_fra.1.historical_info: "Під час правління Карла VII фінансова система Франції зазнала деяких змін, серед яких було надання тальї статусу постійного податку. Попри те, що дворяни та священники були звільнені від сплати тальї, надходження до скарбниці значно зросли та забезпечили розвиток країни після закінчення Столітньої війни."
  flavor_fra.2.title: "Анжуйські претензії на [GetCountry('NAP').Custom('longname_ru_wntt_ACC')]"
  flavor_fra.2.desc: "#TOOLTIP:DYNASTY,$capet_dynasty_tt$,X #L Капетинги#!#! вже давно втратили контроль над #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_INST')|L]#!#!. Тепер на чолі [GetCountry('NAP').Custom('rank_ru_GEN')|l] стоїть [ruler_nap.GetName|l], і [Select_CString(ruler_nap.IsFemale,'вона встигла', 'він встиг')] нажити чимало ворогів. Хоча [ruler_fra.GetName|l] походить з династії Капетингів, цього навряд чи достатньо, щоб [Select_CString(ruler_fra.IsFemale,'вона могла', 'він міг')] претендувати на [GetCountry('NAP').GetAdjectiveWithNoTooltip|l]ий престол. Проте [ruler_nap.GetShortNameWithNoTooltip|l] не користується підтримкою народу, і це дає нам чудову нагоду захопити [GetCountry('NAP').Custom('rank_ru_ACC')|l] військовим шляхом."
  flavor_fra.2.historical_info: "У 1442 році Рене Добрий був змушений поступитися Неаполітанським королівством династії Трастамара. Йому вже не судилося повернути собі престол, проте він продовжував іменувати себе королем Неаполя. Бувши далеким родичем Рене, Людовик XII використав своє походження як привід для захоплення Неаполя та створення особистої унії, що послужило початком для Італійських війн."
  flavor_fra.2.a: "Престол належить нам по праву!"
  fra_claimed_naples: "Претензії на Неаполь"
  flavor_fra.2.b: "Нам не потрібні ці землі."
  fra_did_not_claim_naples: "Відмова від претензій на Неаполь"
  flavor_fra.3.title: "Підкорення гільдій"
  flavor_fra.3.desc: "Століттями гільдії об'єднують ремісників з найрізноманітніших галузей та захищають їхні інтереси. При цьому значна частина доходу від торгівлі залишається в самих гільдіях, що перешкоджає поповненню скарбниці #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У зв'язку з цим чиновники просять, щоб [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'схвалила', 'схвалив')] взяття гільдій під державний контроль. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] напевно будуть незадоволені таким рішенням, проте це дозволить нам помітно збільшити дохід."
  flavor_fra.3.a: "Примусимо гільдії до підкорення."
  flavor_fra.3.b: "Збережемо незалежність гільдій."
  flavor_fra.4.title: "Беарнські лютерани незадоволені"
  flavor_fra.4.desc: "Останнім часом кардинал [target_character.GetName] значно зміцнив свій вплив, що викликало гнів #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеран#!#!, які проживають у #TOOLTIP:PROVINCE_DEFINITION,bearn_bigorre_province,X #L Беарні та Бігоррі#!#!. Якщо ми не втрутимося, це може не тільки призвести до погіршення відносин з іншими лютеранськими громадами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, а й спровокувати повстання."
  flavor_fra.4.historical_info: "Під час правління Людовика XIII кардинал Рішельє активно влаштовував гоніння на протестантів. Спроби силою нав'язати жителям Беарна католицизм призвели до повстання в 1621–1622 роках, яке також було придушене за указом Рішельє. Внаслідок цього протестанти втратили майже всі території, надані їм відповідно до Нантського едикту, залишивши за собою лише фортеці Монтобан і Ла-Рошель."
  flavor_fra.4.a: "Це тривожні вісті."
  richelieu_may_cause_more_revolts: "Своїм утиском #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеран#!#! [target_character.GetName] може викликати повстання проти #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.5.title: "Кардинал Рішельє"
  flavor_fra.5.desc: "Отримавши сан кардинала, [target_character.GetName] став вельми впливовою фігурою в [ROOT.GetCountry.GetGovernment.GetAdjective|l]их політичних колах #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, і незабаром [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'призначила', 'призначив' )] його своїм першим міністром і найближчим радником. Його діяльність призвела до того, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobility')|l] втратили колишню політичну вагу, а влада корони, навпаки, зміцніла. Тепер він хоче розширити вплив [ROOT.GetCountry.Custom('CL_GEN')] на європейському континенті, але для цього йому необхідне схвалення двору."
  flavor_fra.5.historical_info: "Арман Жан дю Плессі, більш відомий сьогодні як кардинал Рішельє, отримав посаду першого міністра короля Людовика XIII у 1624 році, коли йому було 39 років. Його головними завданнями у внутрішній політиці стали ослаблення знаті та переслідування протестантів. Він також виступав за розширення зовнішньої торгівлі, колоніальну експансію та створення королівського флоту. Найважливішим досягненням Рішельє були вмілі переговори, які він вів під час Тридцятилітньої війни. Йому вдалося спровокувати шведську інтервенцію в 1630 році та виграти час, щоб Франція встигла підготуватися до війни, що почалася в 1635 році. Він прагнув завдати Габсбургам поразки та вивести Францію з оточення ворожими країнами. Вважається, що його діяльність багато в чому вплинула на виникнення концепції реальної політики."
  flavor_fra.5.a: "У майбутньому [Select_CString(target_character.IsFemale, 'її', 'його' )] вплив може нам стати в пригоді."
  flavor_fra.6.title: "Винайдення столового ножа"
  flavor_fra.6.desc: "У шляхетних колах кардинал [target_character.GetName] відомий своїми бездоганними манерами та витонченим смаком. Прагнучи викорінити погані звички серед придворних, які після їжі колупаються ножами в зубах, він вирішив внести зміни в столові прибори, що використовуються при дворі. Провівши деяке дослідження, [target_character.GetShortNameWithNoTooltip] представив нову модель ножа з вигнутим лезом та заокругленим кінчиком. Він запевняє, що такий ніж ідеально підійде для нарізання м'яса та овочів, а також дозволить відучити дворян від поганих звичок."
  flavor_fra.6.a: "За столом важливо дотримуватися пристойності."
  table_knife_court_flavor: "Обіди при #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі відбуватимуться у більш вихованій манері."
  flavor_fra.7.title: "[fronde_uprising.GetNameWithNoTooltip] загрожує монарху"
  flavor_fra.7.desc: "Незадоволені втратою свого впливу та зміцненням королівської влади, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] наважилися виступити проти абсолютистського режиму, який намагається встановити [fra_ruler.GetName|l]. І хоча найвпливовіші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] поки не готові відкрито заявити про свій протест, надалі цей рух може докорінно змінити майбутнє #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.7.historical_info: "Фронда 1648–1653 років була останньою спробою опору абсолютизму з боку французької знаті. Вона почалася з протесту Паризького парламенту проти проєктів кардинала Мазаріні, який на той момент вже отримав посаду першого міністра при королі Людовику XIV, якому тоді було п'ять років. Потім послідувало повстання дворянства, однак воно було придушене через зраду його учасників та низку невдалих подій. У підсумку роль парламенту була зведена до мінімуму (до 1789 року він більше не скликався), а знать втратила свою політичну вагу. Все це ознаменувало прихід до влади Людовика XIV та встановлення ним абсолютизму в 1661 році."
  flavor_fra.7.a: "Країна — це я!"
  flavor_fra.7.b: "Потрібно домовитися, щоб уникнути конфлікту з дворянами."
  fronde_uprising: "Фронда"
  fronde_joining: "[fronde_uprising.GetName] об'єднає всі [Concept('pops', 'групи населення')|e] зі стану #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! у #TOOLTIP:REGION,france_region,X #L Франції#!#!."
  flavor_fra.8.title: "Французька академія"
  flavor_fra.8.desc: "Будучи відомим поціновувачем літератури, кардинал [target_character.GetName] запропонував заснувати #italic Французьку академію#! — установу, головним завданням якої стане вивчення та регулювання [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої мови. Подібна організація безсумнівно позитивно вплине на розвиток нашої культури, однак її створення коштуватиме значних коштів."
  flavor_fra.8.historical_info: "Кардинал Рішельє багато робив для розвитку мистецтва та літератури. У 1636 році він заснував Французьку академію, яка стала займатися вивченням та регулюванням французької мови. Академія і досі є вкрай авторитетною установою, на публікації якої посилаються при виникненні будь-яких невизначеностей у використанні мови."
  flavor_fra.8.a: "Це гідне вкладення."
  flavor_fra.8.b: "У нас немає таких коштів."
  flavor_fra.9.title: "Кольбертизм"
  flavor_fra.9.desc: "Інтендант фінансів [target_character.GetName] доклав величезних зусиль для розвитку економіки [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. На своїй посаді він не тільки змінив порядок оподаткування, а й зміг збалансувати державний бюджет у вкрай важких умовах. При цьому [target_character.GetLastNameWithNoTooltip] дотримується власної економічної доктрини, яку назвали #italic кольбертизмом#! і визнали вельми ефективною.\n\nНещодавно [target_character.GetLastNameWithNoTooltip] запропонував розширити наш військовий флот за рахунок надлишків коштів, отриманих від торгівлі. Однак радники виступають проти подібних витрат і рекомендують зосередитися на економічних питаннях."
  flavor_fra.9.historical_info: "Жан-Батист Кольбер був призначений інтендантом фінансів Франції в 1661 році. Вважається, що він створив одну з перших національно-орієнтованих економік Нового часу. Серед його заслуг можна відзначити перетворення податкової системи, ефективне управління бюджетом, а також грамотне застосування методів статистики та обліку. У роботі Кольбер дотримувався свого варіанту меркантилізму, який полягав у нарощуванні експорту та максимальному скороченні імпорту шляхом введення високих митних зборів. Він підтримував централізацію та субсидування виробництва, виступав за збільшення кількості шлюбів та заборону еміграції, а також розвивав внутрішню та морську торгівлю. Останнє вимагало створення великого військового флоту, що теж стало одним із досягнень Кольбера. Однак попри всю ефективність вжитих ним заходів, селянам бракувало підтримки, тому землеробство не приносило належного результату."
  flavor_fra.9.a: "Могутній флот стане хорошою опорою для політики, яку веде [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.9.b: "Ми повинні досягти економічної переваги."
  flavor_fra.10.title: "Будівництво Версаля"
  flavor_fra.10.desc: "[fra_ruler.GetName] бажає довести всьому світу велич нашої країни, і у [Select_CString(fra_ruler.IsFemale,'неї', 'нього')] вже є ідея, як цього досягти. [Select_CString(fra_ruler.IsFemale,'Вона', 'Він')] велить звести на місці старого мисливського замку династії [fra_ruler.GetDynasty.GetName] розкішний палац, красі якого не буде рівних. [fra_ruler.GetShortNameWithNoTooltip] щиро сподівається, що [Select_CString(fra_ruler.IsFemale,'її', 'його')] грандіозний план вдасться втілити в життя."
  flavor_fra.10.historical_info: "У 1669 році Людовик XIV (1638–1715) вирішив перебудувати старий мисливський замок у Версалі на чудовий палац. Його будівництво було завершено в 1682 році, і вже в 1683 він став офіційною резиденцією короля. На той момент у Європі не було жодного двору, який міг би похвалитися настільки ж розкішною будівлею із позолоченими інтер'єрами, величезними дзеркалами, багатими люстрами та неймовірно пишними церемоніями. Без сумніву, кожен правитель того часу таємно або відкрито мріяв про такий палац."
  flavor_fra.10.a: "Нехай усі заздрять нашій могутності."
  flavor_fra.10.b: "Ми не можемо дозволити собі таку розкіш."
  flavor_fra.11.title: "Приєднувальні палати"
  flavor_fra.11.desc: "Прагнучи встановити на європейському континенті #L [ROOT.GetCountry.GetAdjective|l]у#! гегемонію та посилити контроль над спірними територіями #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'доручила', 'доручив')] створити на цих землях #italic приєднувальні палати#!. Головним завданням цих палат буде формування юридичних передумов для анексії всіх володінь, які колись перебували в залежності від [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої корони. Така агресивна політика напевно розгніває наших сусідів, однак вона дозволить без особливих втрат розширити наші кордони в найкоротші терміни."
  flavor_fra.11.historical_info: "У гонитві за пануванням над європейським континентом та розширенням французьких кордонів Людовик XIV заснував приєднувальні палати, які шукали юридичні приводи для анексії земель Священної Римської Імперії. Спочатку сусіди Франції були нездатні протистояти її політичній та військовій могутності, а тому закривали очі на цю агресивну експансію. Однак у 1689 році був сформований Великий альянс, готовий дати військову відповідь на територіальні претензії Людовика XIV."
  flavor_fra.11.a: "Заснувати приєднувальні палати."
  claims_through_chambers_of_union: "Політика приєднання"
  flavor_fra.11.b: "Це безглузда витівка."
  did_not_form_chambers_of_union: "Скасування створення приєднувальних палат."
  did_not_form_chambers_of_union_antagonism: "$did_not_form_chambers_of_union$"
  chamber_of_union_claims: "[ROOT.GetCountry.GetName] заяв[ROOT.GetCountry.Custom('end_itat')] про претензії на всі сусідні місцевості, де домінує #L [GetCountry('FRA').GetAdjective|l]а#! мова."
  improve_relations_with_neighbors_with_french_provinces: "Усі сусідні місцевості, де домінує #L [GetCountry('FRA').GetAdjective|l]а#! мова, підвищать свою думку [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!."
  flavor_fra.12.title: "Відчайдушне становище лютеран"
  flavor_fra.12.desc: "Хоча #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютерани#!#! завжди поступалися чисельністю #L [ShowReligionAdjective('calvinist')|l]им#! громадам, їхні права та свободи були враховані в Нантському едикті нарівні з іншими релігійними меншинами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Тепер же [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale,'вирішила', 'вирішив')] скасувати едикт, тому протестантам доведеться покинути країну через загрозу переслідування."
  flavor_fra.12.a: "Вони лише сіють розбрат у нашому суспільстві."
  flavor_fra.12.b: "Проявимо милосердя до лютеран, що залишилися."
  flavor_fra.12.historical_info: "Після скасування Нантського едикту Людовиком XIV багатьох французьких протестантів насильно навертали в католицтво. Щоб уникнути переслідування та нещадної політики #italic драгонад#!, їм доводилося тікати до сусідніх країн. У результаті у Франції практично не залишилося протестантських громад."
  flavor_fra.13.title: "Переслідування гугенотів"
  flavor_fra.13.desc: "Після скасування #TOOLTIP:POLICY,edict_of_nantes,X #L Нантського едикту#!#! багато гугенотів та інших представників релігійних меншин були змушені тікати з країни. До того ж [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий уряд наказав драгунам селитися в будинках протестантів і примушувати їх до переходу в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!. Ці заходи дозволять нам остаточно викорінити інаковір'я та об'єднати народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! під знаменом істинної віри."
  flavor_fra.13.a: "Це назавжди припинить релігійну ворожнечу в нашій країні."
  flavor_fra.13.b: "Проявимо милосердя до гугенотів, що залишилися."
  flavor_fra.13.historical_info: "Незадовго до скасування Нантського едикту Людовик XIV проводив політику драгонад, метою якої було примушення гугенотів та інших релігійних меншин до навернення в католицтво. У результаті величезна кількість протестантів просто втекла з країни, що завдало її економіці значної шкоди на багато років уперед."
  flavor_fra.14.title: "[target_character.GetNameWithNoTooltip] та його агенти"
  flavor_fra.14.desc: "Маркіз [target_character.GetName] довгий час вірно [Select_CString(target_character.IsFemale, 'служила', 'служив' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! на посаді дипломата, тому [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'довірила', 'довірив')] [Select_CString(target_character.IsFemale, 'їй', 'йому' )] створення #italic Королівського секрету#! — таємної розвідувальної служби, підпорядкованої особисто монарху. Згодом наша агентурна мережа стала покривати більшу частину Європи, що дозволило нам просувати свої інтереси та впливати на політику цілої низки країн. Однак організація подібного масштабу має серйозний недолік: вона вимагає значних коштів на своє утримання…"
  flavor_fra.14.historical_info: "Французький маркіз і дипломат Шарль Франсуа де Бройль був одним із засновників таємної служби Людовика XV, відомої як #italic Королівський секрет#!. У якийсь момент шпигунська мережа цієї організації охоплювала більшу частину Європи. Першим завданням Секрету було зведення принца де Конті на польський престол, але ідея провалилася. Проте надалі агенти служби відіграли важливу роль в американській війні за незалежність, надаючи революціонерам військову, фінансову та дипломатичну допомогу."
  flavor_fra.14.a: "#italic Королівський секрет#! вартий своїх грошей."
  flavor_fra.14.b: "Шпигунську мережу потрібно зберегти, але фінансування доведеться обмежити."
  flavor_fra.15.title: "[target_character.GetNameWithNoTooltip] здобуває популярність"
  flavor_fra.15.desc: "[target_character.GetName] народився в родині збирача податків. Він зміг швидко піднятися кар'єрними сходами та відмінно проявити себе на державній службі. Король навіть призначив його наставником свого спадкоємця, завдяки чому [target_character.GetShortNameWithNoTooltip] здобув ще більше впливу в політичних колах. За час своєї роботи він не раз запобігав вступу країни у війну, чим забезпечив її мирний розвиток. Багато членів королівського двору вважають, що [target_character.GetShortNameWithNoTooltip] має бути гідно нагороджений за свої заслуги та наполегливу працю на благо країни."
  flavor_fra.15.historical_info: "Андре-Еркюль де Флері народився 1653 року в родині збирача податків. 1715 року він став наставником, а потім і близьким другом юного Людовика XV. З 1726 року й до самої своєї смерті 1743 року Флері був фактичним правителем Франції, хоча категорично відмовлявся приймати титул першого міністра. Він всіляко намагався уникати війн із сусідніми країнами, тому його правління стало найспокійнішим періодом в історії Франції за попередні триста років."
  flavor_fra.15.a: "Франція завжди буде йому вдячна."
  flavor_fra.16.title: "[target_character.GetLastNameWithNoTooltip] пропонує п'ятивідсотковий податок"
  flavor_fra.16.desc: "[ROOT.GetCountry.GetLongName] — запровадження тут #TOOLTIP:LAW,fra_taille,X #L тальї#!#! замінило застарілу феодальну податкову систему. Однак з часом привілеї, якими в рамках тальї користувалися [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], стали надто негативно впливати на розмір зібраних податків.\n\nДля вирішення цієї проблеми радник на ім'я [target_character.GetName] запропонував стягувати #italic 5% від загального доходу#! з усіх станів без винятку. Попри очевидну вигоду такої системи для державної скарбниці, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] виступили різко проти цієї ініціативи."
  flavor_fra.16.historical_info: "Ставши 1745 року генеральним контролером фінансів Франції, Жан-Батист де Машо з жахом виявив, що країна перебуває на межі банкрутства. Ситуація ускладнювалася тим, що дворяни та священники були повністю звільнені від сплати тальї. 1749 року Машо спробував провести реформу податкової системи, що передбачала заміну 10%-го податку, яким не обкладалися дворяни та духовенство, єдиним для всіх станів податком у розмірі 5% від загального доходу. Втім, ця ініціатива зіткнулася з запеклим опором, тому Машо так і не зміг втілити її в життя повною мірою."
  flavor_fra.16.a: "Проведемо реформу попри протести."
  flavor_fra.16.b: "Краще не будемо їх злити."
  unlocks_machault_tax_reforms: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з'явиться доступ до правила #TOOLTIP:LAW,fra_5_percent_tax,X #L «П'ятивідсотковий податок Машо»#!#!, що розширює дію #TOOLTIP:LAW,fra_taille,X #L тальї#!#!"
  flavor_fra.17.title: "[target_character.GetLastNameWithNoTooltip] та його реформи"
  flavor_fra.17.desc: "Зайнявши посаду генерального контролера фінансів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [target_character.GetName] зіткнувся з неприязню з боку аристократів за свої ліберальні економічні погляди. Попри це, [fra_ruler.GetName|l] наполегливо [Select_CString(fra_ruler.IsFemale,'підтримувала', 'підтримував')] його реформаторську діяльність.\n\nОднак нещодавно [target_character.GetLastNameWithNoTooltip] запропонував #italic шість едиктів#!, які мають радикально змінити економічну систему країни на краще, хай і ціною тимчасової фінансової нестабільності. Це викликало невдоволення найвпливовіших членів двору, які вимагають, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(fra_ruler.IsFemale,'завадила', 'завадив')] проведенню реформ."
  flavor_fra.17.historical_info: "#italic Шість едиктів#! Тюрго передбачали скасування натуральної дорожньої повинності, ліквідацію цехів, зняття низки митних зборів, а також запровадження єдиного земельного податку."
  flavor_fra.17.a: "Нехай [target_character.GetLastNameWithNoTooltip] проводить усі необхідні реформи."
  STATIC_MODIFIER_NAME_turgots_economic_reforms: "Економічні реформи Тюрго"
  STATIC_MODIFIER_DESC_turgots_economic_reforms: "В рамках своїх економічних реформ Анн Робер Жак Тюрго в середині XVIII століття сформулював #italic шість едиктів#!, спрямованих на модернізацію [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої економіки та зниження впливу привілейованих верств населення."
  flavor_fra.17.b: "Він зайшов занадто далеко!"
  flavor_fra.18.title: "[target_character.GetLastNameWithNoTooltip] та державний бюджет"
  flavor_fra.18.desc: "На посаді міністра фінансів [target_character.GetName] [Select_CString(target_character.IsFemale,'змогла', 'зміг')] зарекомендувати себе як грамотний фахівець, а [Select_CString(target_character.IsFemale,'її', 'його')] реформи принесли непогані результати. Однак [fra_ruler.GetName] та інші члени королівського двору виявилися вкрай незадоволені, коли [Select_CString(target_character.IsFemale,'вона', 'він')] вирішив оприлюднити засекречені досі відомості про стан державних фінансів.\n\nУ відповідь на претензії двору [target_character.GetLastNameWithNoTooltip] запевняє, що опублікований звіт містить завідомо прикрашені дані, які мають залучити до Франції кредиторів та інвесторів. У разі успіху це дозволить виправити проблеми з бюджетом, який насправді перебуває в дефіциті. Попри це, багато чиновників закликають негайно звільнити міністра за такий свавільний та ризикований вчинок."
  flavor_fra.18.a: "Відправимо міністра у відставку."
  flavor_fra.18.b: "Похвалимо міністра за відмінну роботу."
  STATIC_MODIFIER_NAME_necker_reforms: "Реформи Неккера"
  STATIC_MODIFIER_DESC_necker_reforms: "Жак Неккер був французьким міністром фінансів та банкіром швейцарського походження, який провів низку економічних та фінансових реформ, згодом названих на його честь."
  necker_resigns: "[target_character.GetName] піде у відставку і більше не повернеться до державної служби."
  flavor_fra.18.historical_info: "Жак Неккер був французьким міністром фінансів і головним міністром Франції за Людовика XVI. Він здобув популярність за публікацію 1781 року #italic «Звіту королю»#!, в якому містилися засекречені дані про державний бюджет. За цей вчинок його було відправлено у відставку, але вже 1789 року король був змушений знову запросити його до уряду."
  flavor_fra.19.title: "Договір Ідена"
  flavor_fra.19.desc: "Хоча відносини між #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! споконвіку були напруженими, [target_character.GetName] запропонував забути про стару ворожнечу. Він відправив до нашого двору дипломатів для підписання нової торговельної угоди, названої #italic договором Ідена#!.\n\nЯкщо двір прийме цю пропозицію, ми зможемо значно зміцнити економічні зв’язки між нашими країнами. Втім, деякі радники вважають, що реальна мета цієї угоди полягає у зміцненні торговельного впливу [GetCountry('ENG').Custom('CL_GEN')] за наш рахунок."
  flavor_fra.19.historical_info: "1786 року Вільям Іден підписав із Францією важливу торговельну угоду, названу договором Ідена. Цей крок багато в чому відповідав думці, висунутій Адамом Смітом 1776 року в #italic «Багатстві народів»#!. Він вважав, що Англії варто більше співпрацювати з країнами континентальної Європи та менше покладатися на торгівлю з американськими колоніями."
  flavor_fra.19.a: "Підпишемо угоду."
  the_eden_agreement: "Договір Ідена"
  flavor_fra.19.b: "Цей договір не враховує наших інтересів."
  refusal_of_the_eden_agreement: "Відмова від договору Ідена"
  flavor_fra.20.title: "[target_artist.GetLastNameWithNoTooltip] публікує трактат #italic «Про суспільний договір»#!"
  flavor_fra.20.desc: "Усі жителі #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, від простолюду до дворян, бурхливо обговорюють трактат #italic «Про суспільний договір»#! — новий твір, який опублікував [target_artist.GetName]. У цій праці йдеться про важливість народного волевиявлення, а також описуються ідеали, до яких має прагнути будь-який #italic уряд#!."
  flavor_fra.20.a: "Це може порушити громадський порядок…"
  flavor_fra.21.title: "[target_artist.GetLastNameWithNoTooltip] публікує #italic «Філософські листи»#!"
  flavor_fra.21.desc: "За свою критику #L [ROOT.GetCountry.GetAdjective|l]ого#! уряду [target_artist.GetName] був тимчасово вигнаний на територію #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!. Повернувшись до #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, він опублікував книгу про свої враження від життя у вигнанні. Члени нашого двору звернули увагу, що текст зображує [ROOT.GetCountry.Custom('CL_ACC')] у поганому світлі, тоді як [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий уклад життя, навпаки, описаний з позитивного боку.\n\nПопри новизну, ця книга встигла завдати певної шкоди нашій репутації, проте ми ще можемо припинити її розповсюдження."
  flavor_fra.21.desc_GBR: "За свою критику #L [ROOT.GetCountry.GetAdjective|l]ого#! уряду [target_artist.GetName] був тимчасово вигнаний на територію #ONCLICK:COUNTRY,[GetCountry('GBR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GBR').Custom('CL_tt')],X [GetCountry('GBR').Custom('CL_GEN')|L]#!#!. Повернувшись до #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, він опублікував книгу про свої враження від життя у вигнанні. Члени нашого двору звернули увагу на те, що текст зображує [ROOT.GetCountry.Custom('CL_ACC')] у поганому світлі, тоді як [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий уклад життя, навпаки, описаний з позитивного боку.\n\nПопри новизну, книга встигла завдати певної шкоди нашій репутації, проте ми ще можемо припинити розповсюдження цієї шкідливої літератури."
  flavor_fra.21.a: "Її потрібно негайно заборонити!"
  flavor_fra.22.title: "[target_artist.GetLastNameWithNoTooltip] публікує трактат #italic «Про дух законів»#!"
  flavor_fra.22.desc: "Нещодавно [target_artist.GetName] опублікував свій трактат #italic «Про дух законів»#! — філософський твір, який уже привернув увагу королівського двору. У тексті порушуються гострі проблеми людської природи та устрою країни, що обурило не лише духовенство, а й знать, яка сприйняла описані ідеї як критику абсолютної влади монарха.\n\n#TOOLTIP:RELIGION,$catholic_tt$,X #L Католицька#!#! церква вжила заходів щодо заборони книги, проте викладені в ній погляди вже стрімко поширюються як у країні, так і за її межами."
  flavor_fra.22.a: "Будемо сподіватися, що вони не знайдуть народної підтримки."
  flavor_fra.23.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.23.desc: "[target_character.GetName] — великий математик, вчений і філософ нашого часу, чиї революційні праці відомі в усій Європі. Отримавши визнання за свою критику схоластичного аристотелізму, [target_character.GetLastNameWithNoTooltip] привернув на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! безліч мислителів і навіть завоював інтерес королівського двору. Деякі радники вважають, що ми повинні надати заступництво та сприяння в його науковій та філософській діяльності."
  flavor_fra.23.historical_info: "Французького вченого та математика Рене Декарта нерідко називають батьком сучасної філософії, оскільки він одним із перших почав критикувати домінуюче на той час вчення схоластичного аристотелізму. Декарт послідовно піддавав сумніву будь-які знання, засновані на сприйнятті, проте дійшов висновку, що сама думка про хибність навколишнього світу вже є доказом того, що його свідомість існує по-справжньому. З цих роздумів він і вивів свій знаменитий умовивід: «Я мислю, отже, я існую». У своїй філософії Декарт чітко розділяв тіло і душу як дві незалежні субстанції, головними властивостями яких є, відповідно, протяжність і мислення."
  flavor_fra.23.a: "Ми підтримаємо його."
  flavor_fra.24.title: "[target_character.GetNameWithNoTooltip] і гурони"
  flavor_fra.24.desc: "[fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale,'доручила', 'доручив')] одному дворянину налагодити в Північній Америці торгівлю хутром, і [target_character.GetName] зголосився взяти участь в експедиції. Під час своєї подорожі [target_character.GetShortNameWithNoTooltip] зустрів плем’я #TOOLTIP:LANGUAGE,wendat_language,X #L гуронів#!#!, з яким йому вдалося зблизитися. Це дозволило йому детально вивчити місцевість і розширити наші можливості для співпраці з місцевим населенням. Однак він зазначає, що поблизу живуть #TOOLTIP:CULTUREGROUP,haudenosaunee_group,X #L ірокези#!#!, які можуть стати набагато кориснішими союзниками."
  flavor_fra.24.a: "Ми укладемо союз із гуронами."
  flavor_fra.24.b: "Краще встановимо відносини з ірокезами."
  samuel_de_champlain: "Договір Самюеля де Шамплена"
  flavor_fra.25.title: "Вражаюче проявлення могутності"
  flavor_fra.25.desc_common: "пропонує дотепний задум. У разі успіху #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдасться не тільки продемонструвати своє багатство та могутність, а й налагодити стосунки з владою [target_root_country.Custom('CL_GEN')|L].\n\nБіля [target_root_country.GetAdjectiveWithNoTooltip|l]ого кордону відбудеться зустріч двох монархів. Для неї вже обрано місце — [summit_location.GetName]. Звісно, облаштовано все буде так, як і належить королівським особам.\n\nПропонується встановити розшиті золотом шатра або навіть звести тимчасовий палац."
  flavor_fra.25.desc: "Вірний радник #L [target_root_country.GetAdjective|l]ого#! двору $flavor_fra.25.desc_common$"
  flavor_fra.25.desc_wolsey: "Хитрий радник [GetCharacter('eng_thomas_wolsey').GetName] $flavor_fra.25.desc_common$"
  flavor_fra.25.a: "Чудовий план."
  flavor_fra.25.tt1: "Найближчим часом на «полі золотої парчі» відбудеться зустріч, організована ціною величезних витрат"
  flavor_fra.25.tt2: "Завдяки такому дорогому заходу значущість [ROOT.GetCountry.Custom('CL_GEN')] на міжнародній арені підвищиться"
  flavor_fra.25.b: "У цьому майже немає жодної вигоди."
  flavor_fra.25.tt3: "Зустріч не відбудеться"
  flavor_fra.26.title: "Кінець Столітньої війни"
  flavor_fra.26.desc: "Ми нарешті витіснили англійські війська та звільнили #TOOLTIP:REGION,france_region,X #L французьку#!#! землю від #L [GetCountry('ENG').GetAdjective|l]ої#! окупації!"
  flavor_fra.26.historical_info: "Людовик XI скористався результатами Столітньої війни. Фактичне знищення феодального дворянства дозволило йому міцніше об'єднати Францію під своєю королівською владою, а також посприяло розвитку та союзництву із середнім класом."
  flavor_fra.26.a: "Тепер ми створимо сильну країну."
  flavor_fra.1001.t: "Присвоєння земель Ордену тамплієрів"
  flavor_fra.1001.desc: "Через величезні витрати на війну та розвиток країни уряд #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! вирішив позбутися боргів шляхом усунення своїх кредиторів. У 1306 році почалося поступове знищення ордену тамплієрів та посилення нашого контролю над Авіньйоном, що принесло свої плоди. Однак, користуючись метушнею, деякі дворяни почали присвоювати собі землі ордену, які ми вже домовилися здати в оренду #ONCLICK:COUNTRY,[GetCountry('KNI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('KNI').Custom('CL_tt')],X [GetCountry('KNI').Custom('CL_DAT')|L]#!#!. Без сумніву, під управлінням дворян ці території приноситимуть набагато більше прибутку, але ситуація напевно викличе гнів духовенства."
  flavor_fra.1001.a: "Передамо землі [GetCountry('KNI').Custom('CL_DAT')]."
  flavor_fra.1001.b: "Дозволимо дворянам залишити землі собі."
  flavor_fra.1001.c: "Ці території належать лише країні."
  flavor_fra.1002.t: "Втікач-фальсифікатор"
  flavor_fra.1002.desc: "[robert_d_artois.GetName] був викритий у підробці документів та оголошений злочинцем. Його спільницю вже спалили на вогнищі, але сам він встиг втекти до наших сусідів за Ла-Манш. Через знатне походження ми хотіли зберегти йому життя, однак він не полишає спроб нашкодити країні і тому має бути покараний. В іншому випадку він буде й надалі розголошувати таємниці та поширювати погані чутки [GetCountry('FRA').Custom('predlog_obo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#!. Жителі #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! навряд чи будуть раді вбивству їхнього гостя, але, ймовірно, це єдиний спосіб змусити його замовкнути назавжди."
  flavor_fra.1002.historical_info: "Роберт III Артуа був французьким дворянином з династії Капетингів. Він мав претензії на графство Артуа, але був звинувачений у підробці документів на право спадкування та вигнаний з Франції. Тоді Роберт втік до Англії та попросив притулку у короля Едуарда III. Отримавши посаду при його дворі, Роберт почав активно підбурювати монарха до військових дій проти Франції, що стало однією з причин Столітньої війни."
  flavor_fra.1002.a: "Його потрібно усунути."
  flavor_fra.1002.b: "Не варто витрачати сили на зрадника."
  flavor_fra.1002.desc.eng.a: "Нещодавно [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий дворянин прибув до нашої країни в надії уникнути гніву свого короля. Одержимий жагою помсти, він готовий поділитися з нами цінними відомостями про стан справ при французькому дворі…"
  flavor_fra.1002.desc.eng.b: "Французи нахабним чином вбили людину на нашій землі, навіть не повідомивши нас про свої плани. Схоже, жертвою став якийсь [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий дворянин, який чимось прогнівив свого короля, однак ці обставини ніяк не виправдовують самоправства!\n\nЯкби цей дворянин вижив, він би напевно міг поділитися з нами цінними відомостями про стан справ при французькому дворі…"
  flavor_fra.1002.eng.a: "Він міг нам знадобитися…"
  flavor_fra.1002.eng.b: "Його знання нам знадобляться."
  flavor_fra.1008.t: "Святий Гінфорт"
  flavor_fra.1008.desc: "Духовенство глибоко стурбоване тим, що селяни почали молитися нібито «святому» псу на кличку Гінфорт. Оскільки в християнстві шанування тварин заборонено, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] погрожують покаранням тим, хто проводитиме релігійні ритуали на честь загиблого собаки. Можливо, країні час втрутитися…"
  flavor_fra.1008.a: "Підтримаємо церкву в придушенні культу."
  flavor_fra.1008.b: "Накажемо знести могилу пса."
  flavor_fra.1008.c: "Канонізуємо Гінфорта."
  flavor_fra.1008.historical_info: "Грейхаунд на кличку Гінфорт належав якомусь лицарю, що жив неподалік Ліона. Господар вирушив на полювання, залишивши пса охороняти колиску з немовлям. Повернувшись додому, лицар побачив, що колиска зламана, дитини ніде немає, а Гінфорт забруднений кров'ю.\n\nЛицар розлютився і вбив собаку, і лише потім виявив під колискою свого сина, цілого й неушкодженого. Поруч з ним лежала мертва гадюка, яку пес загриз, щоб захистити дитину. Зрозумівши, що кров належала саме змії, господар пошкодував про свій вчинок і поховав собаку на дні колодязя, навколо якого пізніше побудував склеп. З того часу жителі Ліона ще кілька сотень років відвідували місце поховання Гінфорта і молилися йому про зцілення своїх хворих дітей."
  flavor_fra.1009.t.n: "Шаріварі проти дворянина"
  flavor_fra.1009.t.c: "Шаріварі проти священника"
  flavor_fra.1009.t.b: "Шаріварі проти містянина"
  flavor_fra.1009.t.p: "Ритуал шаріварі"
  flavor_fra.1009.desc: "Біля будинку одного знатного громадянина зібрався буйний натовп. Вони співають, танцюють і шумлять сковорідками, засуджуючи овдовілого господаря за те, що той повторно одружився раніше, ніж закінчилася жалоба за його колишньою дружиною. При цьому деякі дебошири вже озброїлися камінням і вилами, погрожуючи чоловікові розправою. Хоча ця людина явно заслуговує на осуд за порушення місцевого звичаю, це судилище може зайти занадто далеко і викликати гнів інших представників його стану…"
  flavor_fra.1009.desc.f: "Селяни втомилися від витівок одного знатного громадянина, який напивається і влаштовує вдень безлади. У зв'язку з цим вони вирішили організувати шаріварі, щоб змусити його виправитися. Однак не кожен може витримати суспільний осуд, і часом шаріварі лише змушує людей йти на необдумані вчинки… Близькі цієї людини переживають і просять уряд запобігти ритуалу шаріварі, але чи варто нам втручатися в народні справи?"
  flavor_fra.1009.historical_info: "Шаріварі — народний звичай, поширений у середньовічній Франції. Його суть полягала в осуді тих, хто порушував суспільні норми та традиції. Учасники шаріварі збиралися біля будинку винуватця і влаштовували гучний обряд з піснями, танцями та гуркотом посуду. Іноді вони виводили господаря з дому і вели його вулицею на потіху народу. Відомі й рідкісні випадки, коли люди гинули, намагаючись захиститися від незадоволеного натовпу."
  flavor_fra.1009.a: "Ми не терпітимемо цих диких обрядів!"
  flavor_fra.1009.b: "Нехай це послужить йому уроком."
  flavor_fra.1015.t: "Жакерія"
  flavor_fra.1015.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] вже не в змозі мирно вирішити розбіжності, що виникли між ними, тому по всій країні почали спалахувати народні повстання. Натовпи розгніваних селян, озброївшись вилами та косами, ставлять перед собою єдину мету — зруйнувати порядок, що гнітив їх протягом століть.\n\nЩоб зберегти нашу країну, необхідно придушити заколот і показати простолюду, що буває з тими, хто кидає виклик суспільним засадам."
  flavor_fra.1015.historical_info: "Жакерією називають селянське повстання 1358 року у Франції. Термін походить від презирливого прізвиська «Жак-простак», яке дворяни давали простолюду. Повстання мало особливо жорстокий і масовий характер, що пояснюється крайнім ступенем гноблення селян у той період. У такій важкій ситуації навіть король Наварри, який виступав у Столітній війні проти Франції, вирішив підтримати дворян і допомогти їм у придушенні повстання. Він побоювався, що в разі успіху заколотників вся усталена феодальна система завалиться, послабивши тим самим вплив благородних станів."
  flavor_fra.1015.a: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] нам допоможуть!"
  flavor_fra.1015.b: "Якось самі впораємося."
  jacquerie_revolt: "Жакерія"
  jacquerie_revolt_warning: "Сільські місцевості #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! приєднаються до Жакерії, якщо їхнє задоволення виявиться нижче #R 40%#!."
  based_on_our_crown_power_tt: "Залежно від рівня [Concept('crown_power', 'влади правителя')|e]:"
  flavor_fra.1016.t: "Кутюми Нормандії"
  flavor_fra.1016.desc: "Хоча наші правові звичаї зародилися сотні років тому, ми лише нещодавно впорядкували та оформили їх у письмовому вигляді. Ці документи суттєво вплинуть на нашу юридичну систему та дозволять досягти вищого рівня централізації влади. Аристократи напевно будуть незадоволені відходом від феодального права, але, можливо, у цій справі їхньою думкою варто знехтувати…"
  flavor_fra.1016.historical_info: "#italic Кутюми Нормандії#! являли собою збірки законів, систематизовані та оформлені до кінця XIII століття. Там були описані місцеві звичаї, судова практика, правила про спадкування та багато іншого. Їх створення сприяло розвитку французької правової системи та переходу від феодального права до буржуазного. Однак головна цінність кутюмів полягала в тому, що вони дозволили відійти від судового свавілля та забезпечити рівність усіх жителів перед законом."
  flavor_fra.1016.a: "Настав час нового порядку!"
  flavor_fra.1016.b: "Не варто злити знатних осіб…"
  flavor_fra.1017.t: "Габель"
  flavor_fra.1017.desc: "Наші доходи зменшуються, скарбниця порожніє, міста занепадають, а військам бракує постачання.\n\nМи повинні розглянути введення нових податків, навіть якщо це викличе невдоволення народу. Наприклад, сіль не менш необхідна в побуті, ніж вода. Ми могли б обкласти цей цінний товар податком, щоб поповнити державний бюджет…"
  flavor_fra.1017.historical_info: "Витрати на утримання війська під час Столітньої війни призвели Францію до гострої нестачі коштів. Це змусило уряд ввести податок на сіль, яка в епоху Середньовіччя була найважливішим товаром, необхідним для зберігання продуктів. У зв'язку з цим податок приносив до скарбниці величезні кошти, хоча й був вкрай непопулярним серед населення."
  flavor_fra.1017.a: "Це необхідний захід."
  flavor_fra.1017.b: "Тільки селянського повстання нам не вистачало!"
  flavor_fra.1020.t: "Рецепція римського права"
  flavor_fra.1020.desc: "Після падіння Римської імперії створена нею система права, що використовувалася в багатьох країнах Європи, поступово почала деградувати. Це тривало до того моменту, поки близько трьохсот років тому дослідники не відновили «Кодекс Юстиніана». З того часу в наших навчальних закладах знову стали викладати римське право. Це призвело до створення таких важливих документів, як «Великий ордонанс» та «Установлення Людовика Святого», але це ще не межа. Ми можемо й далі запозичувати положення римського права, щоб послабити вплив феодалів та прискорити централізацію влади."
  flavor_fra.1020.historical_info: "«Великий ордонанс» (1254) та «Установлення Людовика Святого» (1273) — два важливі юридичні документи, складені за римськими зразками в XIII столітті. Вони були покликані зміцнити королівську владу за рахунок централізації уряду та правової системи Франції. Однак зміни йшли повільно, що було пов'язано як зі складністю впровадження нових правил, так і з опором феодалів, які сприйняли ці реформи як загрозу своєму впливу."
  flavor_fra.1020.a: "Цей процес має бути поступовим."
  flavor_fra.1020.b: "Продовжимо запозичення."
  flavor_fra.1023.title: "Карбування франків"
  flavor_fra.1023.desc: "Недавні події на міжнародній арені поставили #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#! у важке фінансове становище. У зв'язку з цим [SCOPE.sCharacter('minister').GetName] пропонує випустити нову монету під назвою франк, щоб стабілізувати економіку країни. Це безумовно допоможе вирішити поточні проблеми, однак надалі може призвести до зростання інфляції."
  flavor_fra.1023.a: "Схвалимо карбування франків."
  flavor_fra.1023.b: "Потрібно витягти з цього максимальну вигоду!"
  flavor_fra.1023.c: "Це занадто ризикований захід."
  flavor_fra.1023.historical_info: "У другій половині XIV століття Франція відчувала фінансові труднощі на тлі Столітньої війни з Королівством Англія. Зазнавши поразки в битві при Пуатьє, король Іоанн II потрапив у полон, звідки зміг звільнитися лише в 1360 році за величезний викуп. Для його виплати він доручив відкарбувати «франк» — нову монету з великим вмістом золота, випуск якої тривав аж до 1380 року. У наступні століття випуск франка відновився, а в 1795 році він став національною валютою Франції."
  flavor_fra.1100.title: "Принци крові"
  flavor_fra.1100.desc: "Члени королівської ради просять, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'задобрила', 'задобрив')] власників апанажів на тлі назріваючого конфлікту проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!. Хоча багато хто підтримав прихід до влади династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], [GetCountry('ENG').GetGovernment.GetRuler.GetName|l] ще може пред'явити претензії на французький престол, оскільки [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale,'її', 'його')] мати [GetCharacter('eng_isabella_of_france').GetName] є сестрою останнього короля #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! з роду Капетингів. Це могло б посіяти в країні розбрат і поставити під сумнів легітимність нашого монарха. Втім, у разі непокори ми можемо просто конфіскувати ці апанажі та повернути їх під контроль корони."
  flavor_fra.1100.a: "Краще залишимо все як є."
  flavor_fra.1100.b: "Потрібно обсипати їх подарунками!"
  flavor_fra.1100.c: "Їх потрібно приборкати."
  flavor_fra.1100.historical_info: "З часів правління династії Капетингів Франція обережно підходила до порядку успадкування престолу. Щоб запобігти розділу королівства між синами померлого монарха, звичай роздільного успадкування було скасовано та замінено принципом первородства, за яким усі титули та землі переходили до старшого сина. Однак надалі королі почали віддавати своїм молодшим братам особливі володіння, які називалися апанажами. Вони також передавалися у спадок дітям принців, але якщо їхній рід згасав, то володіння поверталися країні."
  flavor_fra.1101.title: "[SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] просить володіння"
  flavor_fra.1101.desc: "[SCOPE.sCharacter('target_son_for_appanage').GetName] просить, щоб йому в управління надали апанаж. Наразі ситуація виглядає наступним чином: якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] несподівано загине, найімовірнішим наступником буде [ROOT.GetCountry.GetGovernment.GetHeir.GetName|l], а [SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] стане наступним претендентом на трон. Якщо ж ми передамо йому частину володінь, він зможе стати союзником корони, коли [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip|l] прийде до влади. Попри переваги цього варіанта, подібний поділ земель загрожує послабити вплив королівського двору."
  flavor_fra.1101.a: "Ми даруємо йому графство."
  flavor_fra.1101.b: "[SCOPE.sCharacter('target_son_for_appanage').GetShortNameWithNoTooltip] самостійно правитиме невеликим графством."
  flavor_fra.1101.c: "Відмовимо йому в титулах."
  flavor_fra.1102.title: "Інтеграція #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#!"
  flavor_fra.1102.desc: "Інтеграція #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#! в наше королівство викликала невдоволення інших власників апанажів. Вони вважають, що монарх хоче відібрати їхні права як принців крові. Подальша конфіскація володінь може спровокувати їхній бунт, однак цей захід необхідний для централізації влади на території #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!."
  flavor_fra.1102.a: "Потрібно діяти обережно."
  flavor_fra.1102.b: "Заради централізації країни можна піти на ризик."
  flavor_fra.1103.title: "Консолідація апанажів"
  flavor_fra.1103.desc: "Через сотні років політичної роздробленості корона нарешті інтегрувала різні апанажі назад у свої володіння. Хоча молодші гілки династії Капетингів проявили себе як надійні союзники, вони також перешкоджали централізації країни. Повернувши їхні землі під свій контроль, [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] та його уряд зможуть перетворити #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#! на більш сучасну країну."
  flavor_fra.1103.a: "Це важливий крок до модернізації країни."
  flavor_fra.1110.title: "Генеральні штати припиняють підтримку"
  flavor_fra.1110.desc: "Спочатку Генеральні штати виступали на підтримку війни проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!, однак зі зростанням втрат і витрат думка представників усіх станів різко змінилася. З цього моменту Генеральні штати відмовляються виділяти людей і гроші на війну, незважаючи на прохання короля."
  flavor_fra.1110.a: "Прокляття!"
  flavor_fra.1110.historical_info: "Після поразки [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого війська в битві при Кресі Генеральні штати, збентежені невдачами короля Філіпа VI, відмовилися надавати йому додаткові кошти на війну. Король сподівався, що на виручені гроші йому вдасться побудувати флот і вторгнутися в Англію, щоб завдати удару у відповідь."
  flavor_fra.1120.title: "Подимна подать"
  flavor_fra.1120.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [scope_ruler.GetName] живе в розкоші та витрачає величезні кошти на подорожі по #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_DAT')|L]#!#! та утримання [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого палацу в місті [ROOT.GetCountry.GetCapital.GetName], що призвело до спустошення скарбниці. Щоб хоч якось поповнити бюджет, члени ради запропонували ввести #italic подимну подать#! — новий податок, який стягується з [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их господарств за користування печами. Звісно, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] будуть не в захваті, однак ця подать допоможе поповнити [ROOT.GetCountry.GetGovernment.GetAdjective|l]у скарбницю, не утискаючи [Select_CString(scope_ruler.IsFemale, 'нашу королеву', 'нашого короля' )]. [scope_ruler.GetShortNameWithNoTooltip] продовжить вести звичний спосіб життя."
  flavor_fra.1120.a: "Введемо податок. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] — наше головне надбання."
  flavor_fra.1120.b: "Поки відкладемо введення податку."
  flavor_fra.1120.c: "[scope_ruler.GetShortNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'повинна', 'повинен' )] знати міру. Скарбниця — не [Select_CString(scope_ruler.IsFemale, 'її', 'його' )] гаманець."
  flavor_fra.1120.historical_info: "Спочатку подимна подать була введена лише в деяких регіонах для покриття витрат [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого двору, а також для усунення наслідків Столітньої війни та епідемії чорної смерті. Згодом її стали збирати й в інших областях, а до кінця XIV століття вона була введена майже на всій території Франції. Цей податок став одним з основних способів поповнення державної скарбниці під час правління низки королів."
  flavor_fra.1121.title: "Повстання тюшенів"
  flavor_fra.1121.desc: "До нас дійшли вісті, що уряд в #TOOLTIP:LOCATION,le_puy,X #L Ле-Пюї-ан-Веле#!#! хоче ввести новий податок, однак селяни та ремісники не бажають з цим миритися і починають озброюватися. Ситуація ускладнюється тим, що до бунтівників приєднуються жителі сусідніх міст, які планують повалити не тільки місцевий, а й центральний уряд."
  flavor_fra.1121.a: "Бунтівники будуть жорстоко покарані!"
  flavor_fra.1121.b: "Дамо їм самоврядування."
  le_puy_may_revolt: "Заворушення в #TOOLTIP:LOCATION,le_puy,X #L Ле-Пюї-ан-Веле#!#! можуть перерости в повномасштабне повстання!"
  flavor_fra.1123.title: "[GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] та його останнє бажання"
  flavor_fra.1123.desc: "Перебуваючи на смертному ложі та побоюючись вічних мук за свої вчинки, [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetName|l] доручив скасувати #TOOLTIP:LAW,fra_fouage_tax,X #L подимну подать#!#!. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] були б безмежно вдячні королю за таке рішення, однак усе скасувати буде не так просто. Цей податок став однією з основних статей доходів для країни та невід'ємною частиною [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої фінансової системи, а тому його скасування помітно підірве роботу уряду на найближчі роки. Замість цього радники запропонували тимчасово призупинити дію податку, щоб вшанувати останню волю короля. Коли нам знову знадобляться кошти, ми зможемо відновити збір податі."
  flavor_fra.1123.a: "[GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] висуває недоцільне прохання."
  flavor_fra.1123.b: "Призупинимо збір подимної податі."
  flavor_fra.1123.c: "Потрібно скасувати цей податок за будь-яку ціну!"
  flavor_fra.1123.historical_info: "Перед своєю смертю в 1380 році Карл V наказав скасувати подимну подать та низку інших податків, запроваджених ним під час Столітньої війни. Оскільки подать приносила до скарбниці величезні кошти, уряд відновив її збір вже через кілька місяців після смерті короля, що спровокувало низку заколотів по всій Франції."
  flavor_fra.1122.title: "Гарель та повстання майотенів"
  flavor_fra.1122.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] були вкрай раді указу про скасування #TOOLTIP:LAW,fra_fouage_tax,X #L подимної податі#!#!, яка покладала на них непосильний тягар. Однак незабаром після смерті короля цей указ було порушено, і збір податку відновився. Тепер обманутий народ вже не може стримувати лють. Розлючені жителі #TOOLTIP:LOCATION,rouen,X #L Руана#!#! з числа ремісників почали планувати заколот з метою повалення уряду. Схожим чином справа йде і в #TOOLTIP:LOCATION,paris,X #L Парижі#!#!, де на тлі протестів містяни масово озброюються молотами…"
  flavor_fra.1122.a: "Вони про це пошкодують!"
  flavor_fra.1130.title: "[SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] здобуває вплив"
  flavor_fra.1130.desc: "Будучи родом з багатої буржуазної родини, [SCOPE.sCharacter('etienne_marcel').GetName] став вельми впливовою фігурою в ділових та політичних колах #TOOLTIP:LOCATION,paris,X #L Парижа#!#!. Згодом це дозволило йому отримати посаду купецького прево, до чиїх обов'язків входив захист інтересів міських торговців. Через деякий час про його авторитетну персону дізналися навіть у Генеральних штатах, куди Марселя хочуть запросити як представника третього стану. Швидше за все, таке просування по службі ще сильніше зміцнить його вплив і дасть йому нові важелі впливу на уряд."
  flavor_fra.1130.a: "Він лише довірена особа решти містян, не більше."
  flavor_fra.1130.b: "Схвалимо його призначення до Генеральних штатів."
  flavor_fra.1131.title: "Великий ордонанс"
  flavor_fra.1131.desc: "Військовий конфлікт проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! вимагає значних витрат, у зв'язку з чим [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'звернулася', 'звернувся')] до Генеральних штатів з проханням про виділення коштів та новобранців. Однак представники третього стану з самого початку не схвалювали ні саму ідею війни проти [GetCountry('ENG').Custom('CL_GEN')], ні фінансові заходи, спрямовані на забезпечення війська. Одним з ватажків цього протесту став впливовий прево [SCOPE.sCharacter('etienne_marcel').GetName], який користувався повагою містян. Він згоден надати країні підтримку, але натомість вимагає, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'прийняла', 'прийняв')] Великий ордонанс, який передбачає обмеження королівської влади та розширення повноважень Генеральних штатів."
  flavor_fra.1131.a: "Це неприпустимо!"
  flavor_fra.1131.b: "Спробуємо домовитися з Марселем."
  flavor_fra.1131.c: "Важкі часи вимагають відчайдушних заходів."
  flavor_fra.1131.historical_info: "Після поразки французів у битві при Пуатьє та полонення короля Іоанна II кермо влади тимчасово перейшло до дофіна Карла, який прийняв титул регента. На тлі фінансових труднощів він був змушений скликати Генеральні штати, щоб попросити у них підтримки. Представник третього стану Етьєн Марсель виступив різко проти, а також висунув Карлу низку вимог, серед яких було підписання Великого ордонансу та звільнення Карла Злого, союзника Марселя. Регент неохоче прийняв розроблений Марселем документ, однак у 1357 році Іоанн II, все ще перебуваючи в полоні, заблокував його виконання. Це призвело до повстання, в результаті якого опозиція була розгромлена, Етьєн Марсель убитий, а Великий ордонанс остаточно скасований."
  flavor_fra.1132.title: "Містяни протестують проти податків"
  flavor_fra.1132.desc: "Фінансова політика королівської влади призвела до того, що [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] почали відкрито висловлювати своє невдоволення. [SCOPE.sCharacter('etienne_marcel').GetName], що представляє інтереси народу, вимагає, щоб уряд скасував податки. Незважаючи на можливе покарання, багато впливових купців і ремісників також приєдналися до протесту проти податкових зборів."
  flavor_fra.1132.a: "Чортів вискочень!"
  flavor_fra.1133.title: "Натовп захопив палац"
  flavor_fra.1133.desc: "[SCOPE.sCharacter('etienne_marcel').GetName] на чолі розлюченого натовпу увірвався до королівського палацу. Убивши по дорозі кількох стражників, заколотники дісталися до зали, де проходило засідання уряду. Як виявилося, зроблено це було не для повалення влади, а лише для її залякування. Маршали [SCOPE.sCharacter('murdered_marshal_1').GetName] та [SCOPE.sCharacter('murdered_marshal_2').GetName] були вбиті на місці, і [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'була змушена', 'був змушений')] підписати Великий ордонанс, запропонований Марселем.\n\nПісля цього [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] перестрахувався і вивіз свою сім'ю з #TOOLTIP:LOCATION,paris,X #L Парижа#!#!. Тепер же настав час покарати прево за його зухвалий вчинок. [SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] вже не користується тією підтримкою, яку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] надали йому під час заколоту, тому зараз він найбільш уразливий для атаки…"
  flavor_fra.1133.a: "З часом він відповість за свої злодіяння…"
  flavor_fra.1133.b: "Він та його прихильники повинні бути негайно покарані!"
  tooltip_marcel_1: "[GetCountry('FRA').GetGovernment.GetEstateName('nobles_estate')] та [GetCountry('FRA').GetGovernment.GetEstateName('clergy_estate')|l], що спочатку стали на бік Марселя, засудили його за вбивство двох маршалів. Без їхньої підтримки його дні полічені."
  tooltip_marcel_2: "З Марселем можна розправитися прямо зараз, однак його, як і раніше, підтримують [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')|l]. У разі його смерті вони напевно будуть незадоволені."
  tooltip_marcel_3: "Стражники отримають наказ убити прево."
  flavor_fra_hyw.historical_info: "Непопулярні рішення дофіна Карла призвели до того, що купецький прево Етьєн Марсель очолив озброєний натовп і захопив королівський палац у Парижі. Він не став брати дофіна в полон, але наказав убити прямо перед ним маршалів Жана де Конфлана та Робера де Клермона. Хоча йому й вдалося залякати Карла, цей вчинок помітно послабив його вплив і заплямував його репутацію серед дворян."
  flavor_fra.1134.title: "[SCOPE.sCharacter('etienne_marcel').GetNameWithNoTooltip] загинув"
  flavor_fra.1134.desc_a: "Після нападу на королівський палац та вбивства двох маршалів, [SCOPE.sCharacter('etienne_marcel').GetName] почав стрімко втрачати прихильників. Варто зазначити, що його дії розлютили не лише дворян — [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')|l] та [GetCountry('FRA').GetGovernment.GetEstateName('peasants_estate')|l] також відкрито висловили презирство щодо свого колишнього ватажка. І все ж ніхто не очікував, що покарання наздожене його так скоро: нещодавно [SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] та його почет були запідозрені у спробі відкрити ворота Сент-Антуан для ворожого війська, за що міська варта негайно віддала їх смерті. Тепер [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')|l] з числа заколотників остаточно здаються і просять помилувати їх за скоєні злочини."
  flavor_fra.1134.desc_b: "[SCOPE.sCharacter('etienne_marcel').GetName] був убитий стражниками незадовго після подій, що розгорнулися в королівському палаці. Наказавши стратити двох маршалів, [SCOPE.sCharacter('etienne_marcel').GetShortNameWithNoTooltip] скоїв найтяжчий злочин, тому багато [GetCountry('FRA').GetGovernment.GetEstateName('burghers_estate')|l] та [GetCountry('FRA').GetGovernment.GetEstateName('peasants_estate')|l] відреклися від свого ватажка, залишивши його без підтримки. Можливо, хтось все ж спробує зробити з нього мученика, однак [GetCountry('FRA').GetGovernment.GetEstateName('nobles_estate')|l] вельми задоволені швидкими діями уряду щодо покарання злочинця."
  flavor_fra.1134.a: "Його амбіції більше не загрожують королівській владі."
  flavor_fra.1134.b: "Усі домовленості з ним більше не мають сили."
  flavor_fra.1134.c: "Марсель мертвий, але його ідеї, як і раніше, популярні."
  flavor_fra.1135.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]ий розвиток"
  flavor_fra.1135.desc: "Швидко набравши впливу, [target_character.GetName] [Select_CString(target_character.IsFemale,'заявила', 'заявив')], що [fra_ruler.GetName] не заслуговує трону. Це викликало політичну боротьбу в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. [target_character.GetLastNameWithNoTooltip], використовуючи зв'язки з гільдіями [ROOT.GetCountry.Custom('CL_GEN')], [Select_CString(target_character.IsFemale,'розгорнула', 'розгорнув')] кампанію проти [Select_CString(fra_ruler.IsFemale,'чинної правительки', 'чинного правителя')]. Рада почала турбуватися, що це повстання може увінчатися успіхом.\n\nНамагаючись зберегти владу, [fra_ruler.GetShortNameWithNoTooltip] має намір відвідати провінцію [target_province.GetName] — там знаходиться важливий оплот, де [target_character.GetNameWithNoTooltip] користується підтримкою. Однак [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вважає, що [target_character.GetNameWithNoTooltip] може скористатися цим і налаштувати місцевих жителів проти [Select_CString(fra_ruler.IsFemale,'суперниці', 'суперника')]. На думку радників, замість цього краще вирушити до #TOOLTIP:LOCATION,paris,X #L Парижа#!#!."
  flavor_fra.1135.a: "Влаштуємо [ROOT.GetCountry.GetGovernment.GetAdjective|l]у подорож провінцією [target_province.GetNameWithNoTooltip]!"
  flavor_fra.1135.b: "Привернемо на свій бік жителів Парижа."
  flavor_fra.1135.c: "Подбаємо про те, щоб [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'втратила', 'втратив')] вплив."
  flavor_fra_province_gain_control_satisfaction: "Усі [Concept('locations', 'місцевості')|e] провінції [target_province.GetName] отримують [ShowNamedValue('control_severe_bonus')|+=2%] [Concept('control', 'контролю')|e] та [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]."
  flavor_fra_paris_gain_satisfaction_prosperity: "[ShowLocationName('paris')] отримує [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e] та [ShowNamedValue('prosperity_mild_bonus')|+=2%] [Concept('prosperity', 'процвітання')|e]"
  flavor_fra.1136.title: "Бал охоплених полум'ям"
  flavor_fra.1136.desc: "Після балу-маскараду в [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому палаці вулицями #TOOLTIP:LOCATION,paris,X #L Парижа#!#! пішли чутки, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] занепадає. Звичайний бал, який [Select_CString(fra_ruler.IsFemale,'збиралася', 'збирався')] влаштувати [fra_ruler.GetName], обернувся повним хаосом: факел, який [Select_CString(target_sibling.IsFemale,'взяла', 'взяв')] із собою [target_sibling.GetName], спричинив пожежу, що забрала життя чотирьох лордів. [fra_ruler.GetNameWithNoTooltip] з іншими лордами [Select_CString(fra_ruler.IsFemale,'мала', 'мав')] очолити танець, але з п'яти учасників [Select_CString(fra_ruler.IsFemale,'вижила лише вона одна', 'вижив лише він один')].\n\nБагато придворних вирішили, що [target_sibling.GetNameWithNoTooltip] [Select_CString(target_sibling.IsFemale,'хотіла', 'хотів')] убити [Select_CString(fra_ruler.IsFemale,'сестру', 'брата')], і зажадали кинути [Select_CString(target_sibling.IsFemale,'її', 'його')] до темниці."
  flavor_fra.1136.a: "[target_sibling.GetNameWithNoTooltip] гнитиме за ґратами!"
  flavor_fra.1136.b: "[target_sibling.GetNameWithNoTooltip] заслуговує на пощаду, а ця історія запам'ятається на віки!"
  flavor_fra.1150.title: "Скандал у Римі"
  flavor_fra.1150.desc: "З 1309 року папство перебувало під сильним [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]им впливом, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] багато в чому сам визначав, хто наступний отримає титул «[GetInternationalOrganization('catholic_church').GetLeaderTitle]». Недавня загибель папи римського ознаменувала важливі зміни в політиці папського двору: новим папою вперше за довгий час обрано #TOOLTIP:CULTUREGROUP,italian_group,X #L італійця#!#!, а [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], що обслуговує [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]у владу, тепер знову знаходиться в #TOOLTIP:LOCATION,rome,X #L Римі#!#!. Однак своїми суворими рішеннями [pap_ruler.GetName] викликав гнів [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их кардиналів, і тепер вони стверджують, що [pap_ruler.GetShortNameWithNoTooltip] — нелегітимний кандидат, оскільки вибори проходили під тиском римлян. У зв'язку з цим бунтівні кардинали організували нове зібрання і вирішили обрати в [target_schism_opponent_cardinal.Custom('LR_PREP')|l] [target_schism_opponent_cardinal.GetName] нового папу.\n\nІ [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], і [ruler_fra.GetName] отримали від кардиналів прохання визнати, що папа в [target_schism_opponent_cardinal.Custom('LR_PREP')|l] [target_schism_opponent_cardinal.GetNameWithNoTooltip] — істинний і законний [GetInternationalOrganization('catholic_church').GetLeaderTitle|l], а [pap_ruler.GetShortNameWithNoTooltip] — підлий віровідступник."
  flavor_fra.1150.a: "Підтримати папство в [target_schism_opponent_cardinal.Custom('LR_PREP')|l] [target_schism_opponent_cardinal.GetNameWithNoTooltip]."
  flavor_fra.1150.b: "[pap_ruler.GetShortNameWithNoTooltip] чинить правильно."
  flavor_fra.1150.c: "Не будемо приймати конкретну сторону в папському питанні."
  flavor_fra.1140.title: "$dreams_of_the_orchard$"
  flavor_fra.1140.desc: "Відносини між мирськими та церковними владами завжди були досить напруженими, і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] — старий свідок цих розбіжностей. [target_artist.GetName] збирається написати про це сатиричний твір — він буде одночасно і політичним трактатом, що розглядає взаємодії між правителем і народом, і цікавою критикою поведінки таких станів, як [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] і [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], щодо один одного."
  flavor_fra.1140.historical_info: "«$dreams_of_the_orchard$» — розповідь, написана в роки правління короля Карла V. У ній у повчальній формі описані політичні взаємини між світськими та церковними владами."
  flavor_fra.1140.a: "Це справжній витвір мистецтва!"
  flavor_fra.1140.b: "Ми не можемо собі цього дозволити."
  flavor_fra.1160.title: "Бродячі рутьєри"
  flavor_fra.1160.desc: "Після того як [GetCountry('FRA').GetName] і [GetCountry('ENG').GetName] уклали перемир'я, загони найманців, що билися на обох сторонах, почали влаштовувати набіги на поселення вздовж кордонів. Деякі рутьєри, якими керує [target_character.GetName], навіть стали облаштовувати в цих провінціях табори та збирати гроші з місцевого населення. У такій ситуації корона просто зобов'язана захистити свій народ, однак через війну наше військо значно ослабло, а скарбниця спорожніла. Спробувавши дати відсіч бандитам, ми можемо лише погіршити своє становище."
  flavor_fra.1160.a: "Ми розгромимо їх!"
  flavor_fra.1160.b: "Ми можемо найняти їх для підтримання порядку."
  flavor_fra.1160.c: "Нехай бешкетують, це не наша справа."
  fra_roaming_routiers_faction: "Бродячі найманці"
  routier_revolt_provinces: "Наступні [Concept('locations', 'місцевості')|e] приєднаються до групи «[fra_roaming_routiers_faction.GetName]»: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  routier_affected_provinces: "Наступні [Concept('locations', 'місцевості')|e] отримають [ShowNamedValue('prosperity_weak_penalty')|+=2%] до [Concept('prosperity', 'процвітання')|e]: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  routiers_affected_provinces_by_undisturbed_raids: "Наступні [Concept('locations', 'місцевості')|e] на 10 років отримають модифікатор #TOOLTIP:STATIC_MODIFIER,fra_routiers_looted_province,X #V #L «Барони-грабіжники»#!#!: [SCOPE.sLocation('english_french_flashpoint_1').GetName], [SCOPE.sLocation('english_french_flashpoint_2').GetName], [SCOPE.sLocation('english_french_flashpoint_3').GetName], [SCOPE.sLocation('english_french_flashpoint_4').GetName]"
  hire_rogue_mercenaries: "Під наш контроль перейдуть два загони найманців з #G 7#! піхотними полками в кожному."
  flavor_fra.1161.title: "Набіги рутьєрів на провінцію [routiers_target_province.GetName]"
  flavor_fra.1161.desc: "Не зустрівши опору з боку війська, бродячі рутьєри оселилися в провінції [routiers_target_province.GetName] і почали встановлювати там свої порядки. Місцевий уряд просить негайно відправити військо, щоб прогнати бандитів, поки вони не розграбували наші володіння."
  flavor_fra.1161.a: "З ними потрібно розібратися."
  flavor_fra.1161.b: "Не будемо звертати уваги."
  flavor_fra.1162.title: "Бродячі рутьєри переможені"
  flavor_fra.1162.desc: "Через кілька років боротьби з бродячими рутьєрами, що грабували села по всій країні, нам нарешті вдалося розбити їхні останні загони. Звісно, на усунення шкоди піде чимало часу, але тепер наш народ може спати спокійно."
  flavor_fra.1162.a: "Мир нарешті відновлено."
  flavor_fra.1163.title: "Tard-Venus"
  flavor_fra.1163.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] отримує неспокійну звістку: у #TOOLTIP:AREA,champagne_area,X #L Шампані#!#! набирає силу чергова зграя розбійників. Чимала частина цих головорізів — колишні найманці, що переступили закон після перемир'я з #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!.\n\nРадники вважають, що [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale,'повинна', 'повинен')] відправити до Шампані загін ополчення. Однак деякі заперечують, що зграя, найімовірніше, з часом розпадеться сама, і краще не витрачати і без того збіднілу скарбницю на цей похід."
  flavor_fra.1163.a: "Відправимо ополчення до Шампані, щоб вгамувати негідників."
  flavor_fra.1163.b: "Нехай лорди Шампані самі розбираються з розбійниками."
  flavor_fra.1170.title: "[GetCountry('BRI').GetAdjectiveWithNoTooltip]ий орел"
  flavor_fra.1170.desc: "З #ONCLICK:COUNTRY,[GetCountry('BRI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRI').Custom('CL_tt')],X [GetCountry('BRI').Custom('CL_GEN')|L]#!#! до [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetName] прибула делегація, яку очолив генерал [bertrand_guesclin.GetName]. Він уже встиг прославитися низкою перемог над #L [GetCountry('ENG').GetAdjective|l]ими#! військами, тому [GetCountry('BRI').GetGovernment.GetRuler.GetName|l] [Select_CString(GetCountry('BRI').GetGovernment.GetRuler.IsFemale,'запропонувала', 'запропонував')] йому присягнути на вірність [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ому монарху. [bertrand_guesclin.GetLastNameWithNoTooltip] проявив себе як умілий воєначальник, і його талант безсумнівно знадобиться в нашій спільній боротьбі проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!."
  flavor_fra.1170_bri_annexed.desc: "З наших #TOOLTIP:AREA,brittany_area,X #L бретонських#!#! володінь до [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetName] прибула делегація, яку очолив генерал [bertrand_guesclin.GetName]. Він уже встиг прославитися низкою перемог над #L [GetCountry('ENG').GetAdjective|l]ими#! військами, за що заслужив визнання народу в рідній Бретані. Тепер генерал звертається до двору з тим, щоб [fra_ruler.GetName] прийняв його до себе на службу. [bertrand_guesclin.GetShortNameWithNoTooltip] проявив себе як умілий воєначальник, його талант безсумнівно знадобиться нам у боротьбі проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!."
  flavor_fra.1170.a: "Він повинен очолити наше військо!"
  flavor_fra.1170.b: "Він принесе більше користі у себе на батьківщині."
  flavor_fra.1170.c: "Відправимо його у відставку."
  flavor_fra.1170.historical_info: "Завдяки чималому бойовому досвіду у Війні за бретонську спадщину Бертран заслужив визнання французького короля і був призначений командувати французькими військами під час Столітньої війни. Завдяки його вмілому керівництву Франції вдалося повернути втрачені території, а також відбити набіги Чорного Принца."
  bertrand_can_lead_troops_tt: "[bertrand_guesclin.GetName] зможе очолювати війська, навіть коли діє #TOOLTIP:ESTATE_PRIVILEGE,noble_leaders_only,X #L «Ексклюзивне право командувати»#!#!"
  flavor_fra.1171.title: "Фабієва стратегія дю Геклена"
  flavor_fra.1171.desc: "Ставши генералом #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, [bertrand_guesclin.GetName] проявив себе як грамотний полководець. Він особливо успішно застосовує фабієву тактику, названу на честь римського воєначальника Квінта Фабія, який розробив її під час Другої Пунічної війни. Незважаючи на очевидні успіхи, військові [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] критикують методи дю Геклена і вважають, що всі його перемоги — не більше ніж випадковість. Однак деякі, навпаки, пропонують врахувати досвід дю Геклена і передати його іншим генералам. Як не крути, досі ця тактика бездоганно працювала проти ворожого війська."
  flavor_fra.1171.a: "[bertrand_guesclin.GetShortNameWithNoTooltip] краще за інших знає, як розгромити ворога!"
  flavor_fra.1171.b: "Накажемо іншим воєначальникам використовувати ту ж тактику."
  flavor_fra.1171.c: "Не будемо нічого змінювати."
  flavor_fra.1172.title: "Титул коннетабля"
  flavor_fra.1172.desc: "[bertrand_guesclin.GetName] уже не раз довів свою військову майстерність, тому деякі радники пропонують присвоїти йому титул коннетабля — головнокомандувача #L [GetCountry('FRA').GetAdjective|l]ого#! війська. Проте багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] виступають проти такого рішення, навіть попри свою повагу до дю Геклена. Вони стверджують, що титул коннетабля передбачений для дворянського стану, тоді як Бертран — всього лише простолюд."
  flavor_fra.1172.a: "[bertrand_guesclin.GetShortNameWithNoTooltip] безсумнівно заслужив цей титул."
  flavor_fra.1172.b: "Його навички більше знадобляться на полі бою."
  flavor_fra.1172.c: "Простолюд не може бути коннетаблем."
  flavor_fra.1173.title: "[target_character.GetLastNameWithNoTooltip] пропонує організувати морські набіги"
  flavor_fra.1173.desc: "[target_character.GetName] пропонує влаштувати серію морських набігів на #L [english_nation.GetAdjective|l]і#! порти, щоб розграбувати припаси [english_nation.GetAdjectiveWithNoTooltip|l]их солдатів у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! та забезпечити нам перевагу. Якщо план увінчається успіхом, це значно підвищить шанс прогнати [english_nation.GetAdjectiveWithNoTooltip|l]і війська з [ROOT.GetCountry.Custom('CL_GEN')]. Однак нам знадобиться чимало людей та кораблів, тож ця авантюра вельми затратна."
  flavor_fra.1173.a: "Набіги, які планує [target_character.GetLastNameWithNoTooltip], допоможуть порушити [english_nation.GetAdjectiveWithNoTooltip|l]і ланцюжки постачання."
  flavor_fra.1173.b: "Ці набіги — надто дорога затія."
  guesclin_raid_requirement_tt: "[target_character.GetName] організує морські набіги проти #L [english_nation.GetAdjective|l]их#! військ, якщо нинішня боєготовність [Concept('navy', 'флоту')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! перевищує #G 75,0%#! від граничної. Крім того, [ROOT.GetCountry.GetNameWithNoTooltip] та [english_nation.GetNameWithNoTooltip] повинні вести війну."
  flavor_fra.1174.title: "Морські набіги на [english_nation.GetAdjectiveWithNoTooltip|l]і війська увінчалися успіхом"
  flavor_fra.1174.desc: "Зібравши армаду, [target_character.GetName] [Select_CString(target_character.IsFemale,'змогла', 'зміг')] розграбувати кілька важливих портів на #L [english_nation.GetAdjective|l]ому#! узбережжі, порушивши постачання припасів [english_nation.GetAdjectiveWithNoTooltip|l]им солдатам у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Поки [ruler_eng.GetName] відновлює боєготовність своїх військ, нам потрібно скористатися перевагою, яку [Select_CString(target_character.IsFemale,'забезпечила', 'забезпечив')] [target_character.GetNameWithNoTooltip]!"
  flavor_fra.1174.a: "Час вигнати [english_nation.GetAdjectiveWithNoTooltip|l]их солдатів з [ROOT.GetCountry.Custom('CL_GEN')]!"
  ports_raided_by_guesclin: "Ці [Concept('locations', 'місцевості')|e] отримають модифікатор #TOOLTIP:STATIC_MODIFIER,fra_english_ports_raided,X #V #L «Напад на порти»#!#! на 5 років, а також отримають [ShowNamedValue('prosperity_mild_penalty')|-=2%] до [Concept('prosperity', 'процвітання')|e]: [SCOPE.sLocation('target_location_1').GetName], [SCOPE.sLocation('target_location_2').GetName], [SCOPE.sLocation('target_location_3').GetName], [SCOPE.sLocation('target_location_4').GetName]."
  flavor_fra.1175.title: "Опір у [norman_nation.Custom('CL_PREP')|l]"
  flavor_fra.1175.desc: "Останнім часом [fra_ruler.GetName] намагається зміцнити свою владу, але зустрічає затятий опір #ONCLICK:COUNTRY,[norman_nation.Custom('CL_tt')] #TOOLTIP:COUNTRY,[norman_nation.Custom('CL_tt')],X [norman_nation.Custom('CL_GEN')|L]#!#!. [norman_nation.GetAdjectiveWithNoTooltip|U]і території давно вважаються володіннями династії [fra_ruler.GetDynasty.GetName] та ретельно контролюються, однак цей регіон має досить велику автономію. Бунтівні [norman_nation.GetAdjectiveWithNoTooltip|l]і лорди становлять загрозу, і [fra_ruler.GetName] бажає якнайшвидше придушити опір. Однак [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] турбується, що такі суворі заходи викличуть обурення в інших апанажах.\n\nТим часом у кулуарах ходять чутки, що багато [norman_nation.GetAdjectiveWithNoTooltip|l]их лордів готові присягнути на вірність [english_nation.GetAdjectiveWithNoTooltip|l]ій владі, якщо [fra_ruler.GetName] продовжить втрачати вплив."
  flavor_fra.1175.a: "Придушимо [norman_nation.GetAdjectiveWithNoTooltip|l]ий опір!"
  flavor_fra.1175.b: "Домовимося з [norman_nation.GetAdjectiveWithNoTooltip]ими лордами, щоб не злити інших."
  normandy_event_chain_reward: "Якщо вірність #ONCLICK:COUNTRY,[norman_nation.Custom('CL_tt')] #TOOLTIP:COUNTRY,[norman_nation.Custom('CL_tt')],X #!#! впаде нижче #R 5,00%#!, [norman_nation.GetAdjectiveWithNoTooltip|l]і лорди можуть спробувати обрати нового правителя [norman_nation.Custom('CL_GEN')] та присягнути на вірність #L [english_nation.GetAdjective|l]ій#! владі. Якщо [norman_nation.GetNameWithNoTooltip] займатиме не більше #G 30#! [Concept('locations', 'місцевостей')|e], а вірність цього регіону досягне #G 85,00%#!, у нас буде можливість зробити [norman_nation.Custom('CL_ACC')] невід'ємною частиною #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.1176.title: "Зміцнення влади над [norman_nation.Custom('CL_INST')]"
  flavor_fra.1176.desc: "[fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale,'впоралася', 'впорався')] з опором, і [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] зміцнюють контроль над [norman_nation.GetAdjective|l]им#! апанажем. Утихомиривши більшість бунтівних лордів, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] може завершити розпочате та зробити #TOOLTIP:COUNTRY_RANK,rank_duchy,X #L герцогство#!#! невід'ємною частиною [ROOT.GetCountry.GetGovernment.GetAdjective|l]их володінь. Втім, деякі радники пропонують зберегти [norman_nation.GetAdjectiveWithNoTooltip|l]у автономію, якщо [fra_ruler.GetNameWithNoTooltip] тепер може розраховувати на вірність місцевих лордів."
  flavor_fra.1176.a: "Включимо [norman_nation.GetAdjectiveWithNoTooltip|l]і території до складу [ROOT.GetCountry.GetGovernment.GetAdjective|l]их володінь."
  flavor_fra.1176.b: "Дозволимо [norman_nation.GetAdjectiveWithNoTooltip|l]им лордам зберегти автономію."
  flavor_fra.1177.title: "[norman_nation.GetAdjectiveWithNoTooltip|U]і лорди присягають на вірність [GetCountry('ENG').Custom('CL_DAT')]"
  flavor_fra.1177.desc: "[fra_ruler.GetName] намагається зміцнити владу корони над #L [norman_nation.GetAdjective|l]ими#! територіями. Прагнучи захиститися від цих домагань, [norman_nation.GetAdjectiveWithNoTooltip|l]і лорди вирішили, що їх [Select_CString(nrm_ruler.IsFemale,'новою герцогинею', 'новим герцогом')] стане [nrm_ruler.GetName]. Мало того, [ruler_eng.GetName] [Select_CString(ruler_eng.IsFemale, 'отримала', 'отримав' )] від [Select_CString(nrm_ruler.IsFemale,'неї', 'нього')] присягу на вірність.\n\nОпір [norman_nation.GetAdjectiveWithNoTooltip|l]их лордів переріс у відкритий бунт, і [fra_ruler.GetNameWithNoTooltip] [Select_CString(fra_ruler.IsFemale,'позбавила', 'позбавив')] зрадників земель та титулів. Однак [ruler_eng.GetNameWithNoTooltip] тепер вважає, що [nrm_ruler.GetNameWithNoTooltip] — [Select_CString(ruler_eng.IsFemale,'її', 'його')] [Select_CString(nrm_ruler.IsFemale,'вірна піддана', 'вірний підданий')], і нам доведеться оголосити [GetCountry('ENG').Custom('CL_DAT')] війну, щоб повернути [norman_nation.GetAdjectiveWithNoTooltip|l]і землі."
  flavor_fra.1177.a: "Ми розгромимо опір!"
  cores_on_normandy_fra: "[ROOT.GetCountry.GetName] отримує [Concept('cores', 'національні місцевості')|e] в усіх #L [norman_nation.GetAdjective|l]их#! [Concept('locations', 'місцевостях')|e]."
  flavor_fra_nrm.1.title: "Зростаючий опір"
  flavor_fra_nrm.1.desc: "[fra_ruler.GetName] викликає презирство у багатьох #L [ROOT.GetCountry.GetAdjective|l]их#! лордів, і [Select_CString(fra_ruler.IsFemale,'її', 'його')] [french_nation.GetGovernment.GetCourtTitle|l] прагне об'єднати всю країну під [french_nation.GetGovernment.GetAdjective|l]им пануванням. Багато лордів бояться, що [fra_ruler.GetShortNameWithNoTooltip] веде [ROOT.GetCountry.Custom('rank_ru_ACC')|l] до розпаду. Укрившись у безпечному місці, вони планують повстання, сподіваючись повернути автономію [ROOT.GetCountry.Custom('CL_GEN')]. Однак частина лордів пропонують заручитися підтримкою #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!."
  flavor_fra_nrm.1.a: "[ROOT.GetCountry.GetNameWithNoTooltip] знаходиться на доленосному роздоріжжі."
  flavor_fra_nrm_tt: "Якщо вірність #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! впаде нижче #G 5,00%#!, [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і лорди отримають можливість обрати нового правителя та присягнути на вірність [GetCountry('ENG').Custom('CL_DAT')]. Однак якщо вірність [ROOT.GetCountry.Custom('CL_GEN')] [french_nation.GetAdjectiveWithNoTooltip|l]ій нації досягне #G 85,00%#!, [french_nation.GetAdjectiveWithNoTooltip|l]а влада може примусово приєднати [ROOT.GetCountry.Custom('CL_ACC')]. Якщо [ROOT.GetCountry.GetNameWithNoTooltip] здобуває незалежність іншим шляхом, контролює не менше 30 [Concept('locations', 'місцевостей')|e] або зберігає рівень вірності між #G 5,00%#! та #G 85,00%#! [french_nation.GetAdjectiveWithNoTooltip|l]а влада не зможе примусово приєднати [ROOT.GetCountry.Custom('CL_ACC')]."
  flavor_fra_nrm.2.title: "Кого обирає [nrm_ruler.GetNameWithNoTooltip]"
  flavor_fra_nrm.2.desc: "Невдоволені [ROOT.GetCountry.GetAdjective|l]і лорди побачили нагоду позбутися домагань [french_nation.GetAdjective|l]ої#! влади, і тепер [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [ROOT.GetCountry.Custom('CL_GEN')] — [nrm_ruler.GetName]. Знаючи, що [eng_ruler.GetName] підтримає [Select_CString(nrm_ruler.IsFemale,'її', 'його')], [nrm_ruler.GetShortNameWithNoTooltip] [Select_CString(nrm_ruler.IsFemale,'присягнула', 'присягнув')] на вірність #L [english_nation.GetAdjective|l]ій#! владі, здобувши таким чином її захист.\n\nЗвістка про те, що [nrm_ruler.GetShortNameWithNoTooltip] набирає силу, викликала гнів #L [french_nation.GetAdjectiveWithNoTooltip|l]ої#! влади. [french_nation.GetGovernment.GetCourtTitle] оголошує, що [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і лорди позбавлені всіх земель і титулів."
  flavor_fra_nrm.2.a: "[english_nation.GetNameWithNoTooltip|U]а влада дасть [ROOT.GetCountry.Custom('CL_DAT')] надійніший захист."
  fra_cores_on_normandy_nrm: "[french_nation.GetName] отримує [Concept('cores', 'національні місцевості')|e] в усіх #L [norman_nation.GetAdjective|l]их#! [Concept('locations', 'місцевостях')|e]."
  flavor_fra.1180.title: "[joan_of_arc.GetNameWithNoTooltip]"
  flavor_fra.1180.desc: "[GetCurrentYear] рік. [GetCountry('FRA').GetName] на роздоріжжі. Низка принизливих поразок, завданих країні #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!, призвела до того, що і полководці, і чиновники втратили всяку віру в успіх. Судячи з усього, в уряду просто не залишилося жодних розумних варіантів, оскільки [fra_ruler.GetName] вирішує довірити управління військами [Select_CString(joan_of_arc.IsFemale, 'самозванці', 'самозванцю' )] на ім'я [joan_of_arc.GetNameWithNoTooltip]. [Select_CString(joan_of_arc.IsFemale, 'Вона', 'Він' )] запевняє, що [Select_CString(joan_of_arc.IsFemale, 'чула', 'чув' )] голос архангела Михаїла, який заповідав [Select_CString(joan_of_arc.IsFemale, 'їй', 'йому' )] очолити військо та звільнити країну від загарбників.\n\nТільки найвідчайдушніший божевільний здатен покласти всі свої надії на [Select_CString(joan_of_arc.IsFemale, 'безграмотну селянку', 'безграмотного селянина' )], [Select_CString(joan_of_arc.IsFemale, 'яка', 'який' )] марить про божественну місію."
  flavor_fra.1180.a: "Можливо, це наш єдиний шанс."
  flavor_fra.1180.b: "Ми можемо перемогти і без [Select_CString(joan_of_arc.IsFemale, 'її', 'його' )] допомоги!"
  flavor_fra.2000.title: "Відсіч проти [GetCountry('ENG').Custom('CL_GEN')]"
  flavor_fra.2000.desc: "Через низку поразок ми були змушені поступитися #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_DAT')|L]#!#! частиною своїх володінь, однак з тих пір [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'змогла', 'зміг')] повернути більшість з них під наш контроль. Звістки про успіхи на фронті вселяють в народ [ROOT.GetCountry.Custom('CL_GEN')|l] надію, що війна скоро закінчиться. Якщо нам вдасться зберегти переможний настрій, ми неодмінно виженемо [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]их загарбників зі своєї землі."
  flavor_fra.2000.a: "Ми зробимо все, щоб прогнати ворога раз і назавжди!"
  flavor_fra.2000.b: "Наш дух не зламати!"
  flavor_fra.2002.title: "[joan_of_arc.GetNameWithNoTooltip] потрапила в полон"
  flavor_fra.2002.desc: "Сталося жахливе! Під час недавньої битви [joan_of_arc.GetName] потрапила в [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий полон, і тепер її збираються судити за звинуваченням у єресі."
  flavor_fra.2002.a: "Який кошмар!"
  flavor_fra.2003.title: "[joan_of_arc.GetNameWithNoTooltip] чекає суду"
  flavor_fra.2003.desc: "Під час недавньої битви з #L [GetCountry('FRA').GetAdjective|l]ими#! військами [joan_of_arc.GetName] була захоплена в полон і ув'язнена. За словами солдатів, дівчина свято вірить, що архангел Михаїл особисто доручив їй очолити військо і повернути #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_DAT')|L]#!#! втрачені території. Подібні заяви є вагомим приводом для суду і страти за поширення єресі, однак її загибель може лише сильніше розлютити наших ворогів. Замість цього ми можемо вимагати за неї викуп: [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий уряд напевно не упустить шанс звільнити свою народну героїню."
  flavor_fra.2003.a: "Організувати суд і стратити її за богохульство!"
  flavor_fra.2003.b: "Вимагатимемо у [GetCountry('FRA').Custom('CL_GEN')] величезну суму за її звільнення."
  flavor_fra.2003.c: "Відпустимо її без будь-яких умов."
  flavor_fra.2004.title: "[joan_of_arc.GetNameWithNoTooltip] страчена"
  flavor_fra.2004.desc: "До нас дійшли жахливі звістки! Потрапивши в #L [GetCountry('ENG').GetAdjective|l]ий#! полон, [joan_of_arc.GetName] була засуджена до страти через спалення. Церковний суд визнав її видіння про архангела Михаїла та звільнення #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! єрессю і засудив до смерті. Це трагічний день для нашої країни, але ми не повинні здаватися. Найкращий спосіб вшанувати її пам'ять — це вигнати [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]их загарбників з наших земель!"
  flavor_fra.2004.a: "Ми помстимося за неї!"
  flavor_fra.2005.title_ransom: "Англійці вимагають викуп"
  flavor_fra.2005.title_return: "[joan_of_arc.GetNameWithNoTooltip] повертається"
  flavor_fra.2005.desc_ransom: "До #L [GetCountry('FRA').GetAdjective|l]ого#! двору прибув посланець з #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!. Він повідомляє, що захоплена в полон [joan_of_arc.GetName] підлягає суду і страті, однак [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий уряд готовий звільнити і передати її нам за значну суму. Звісно, для викупу нам доведеться витратити величезні кошти, але якщо [joan_of_arc.GetShortNameWithNoTooltip] повернеться з полону цілою і неушкодженою, це безсумнівно підвищить бойовий дух нашого війська і вселить в серця людей надію на перемогу."
  flavor_fra.2005.desc_return: "Потрапивши в [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий полон, [joan_of_arc.GetName] мала постати перед церковним судом за звинуваченням у єресі, проте сьогодні ми дізналися, що її все ж відпустили на волю. Причини такого рішення незрозумілі, адже влада #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! вважає її своїм заклятим ворогом. Але тепер це не має значення. Важливо, що після повернення [joan_of_arc.GetShortNameWithNoTooltip] лише зміцнилася у своєму прагненні вигнати ворога з #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!."
  flavor_fra.2005.a: "Заплатимо викуп."
  flavor_fra.2005.b: "Ми не можемо розоритися заради однієї людини."
  flavor_fra.2005.c: "Ми раді її поверненню."
  flavor_fra.2005.d: "Не можна допустити, щоб вона знову потрапила в біду."
  flavor_fra.2006.title: "Боротьба за престол"
  flavor_fra.2006.desc: "Сходження на #L [GetCountry('FRA').GetAdjective|l]ий#! престол виявилося складнішим завданням, ніж [Select_CString(ruler_fra.IsFemale,'передбачала', 'передбачав')] [ruler_fra.GetName|l]. [Select_CString(ruler_fra.IsFemale,'Її', 'Його')] коронація припала на непростий час, коли значна частина #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! перебуває під #L [GetCountry('ENG').GetAdjective|l]им#! контролем. Через це деякі з наших підданих, що проживають поруч з окупованими територіями, фактично визнали, що [ruler_eng.GetName|l] — їхній новий законний монарх. Подейкують, що навіть серед придворних з'явилися прихильники [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ої корони. У такій важкій ситуації [ruler_fra.GetShortNameWithNoTooltip|l] [Select_CString(ruler_fra.IsFemale,'мусить', 'мусить')] задіяти всі можливі зв'язки та ресурси, щоб у підсумку міцно посісти трон."
  flavor_fra.2006.a: "Династія [ruler_eng.GetDynasty.GetNameWithNoTooltip] ніколи не отримає [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий престол!"
  flavor_fra.2006.b: "Погодимося з [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ими претензіями на престол."
  flavor_fra.2007.title: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Законна', 'Законний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_fra.2007.desc: "Внаслідок боротьби за престол [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'стала законною та незаперечною правителькою', 'став законним та незаперечним правителем')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!. Ще зовсім недавно #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! мала величезний вплив у нашій країні за рахунок окупованих територій, проте завдяки грамотній політиці [ruler_fra.GetShortNameWithNoTooltip|l] [Select_CString(ruler_fra.IsFemale,'змогла', 'зміг')] об'єднати народ навколо себе. Ті, хто сумнівався в [Select_CString(ruler_fra.IsFemale,'її', 'його')] владі, тепер визнають [Select_CString(ruler_fra.IsFemale,'її', 'його')] як повноправного монарха, а жителі захоплених [GetCountry('ENG').Custom('CL_INST')] земель починають протестувати проти [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого гніту."
  flavor_fra.2007.a: "[joan_of_arc.GetNameWithNoTooltip] — ось кому ми завдячуємо цим тріумфом."
  flavor_fra.2007.b: "Жителі [GetCountry('FRA').Custom('CL_GEN')] звільняються від [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]их кайданів…"
  flavor_fra.2007.c: "[ruler_fra.GetNameWithNoTooltip] [Select_CString(ruler_fra.IsFemale,'мусить', 'мусить')] ще більше зміцнити свою владу."
  flavor_fra.2007.d: "Якби не [joan_of_arc.GetNameWithNoTooltip], [ruler_fra.GetShortNameWithNoTooltip|l] ніколи б не [Select_CString(ruler_fra.IsFemale,'посіла', 'посів')] престол."
  flavor_fra.2010.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] знання про порох"
  flavor_fra.2010.desc: "Відома родина [target_character.GetLastNameWithNoTooltip] з #TOOLTIP:LOCATION,chalons_champagne,X #L Шалон-ан-Шампані#!#! здавна славиться своєю майстерністю в роботі з порохом. [target_character.GetName] зміг створити таку суміш, яка дозволяє запускати снаряди з гармат з набагато більшою швидкістю, ніж раніше вважалося можливим. Крім того, він допоміг розробити міцніші стволи, які рідше розриваються під час стрільби. Нещодавно він запропонував свої послуги [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ому двору в надії випробувати ці та інші свої винаходи на полі бою."
  flavor_fra.2010.a: "Ми наймемо його!"
  flavor_fra.2010.b: "Його досягнення гідні похвали, але йому не місце при дворі."
  flavor_fra.2011.title: "Магістр артилерії [GetCountry('FRA').Custom('CL_GEN')]"
  flavor_fra.2011.desc: "Отримавши посаду при дворі, [target_character.GetName] [Select_CString(target_character.IsFemale,'змогла', 'зміг')] значно посилити наше військо завдяки своїм знанням про порох та артилерійську справу. Радники пропонують присвоїти [Select_CString(target_character.IsFemale,'їй', 'йому')] титул #L [GetCountry('FRA').GetAdjective|l]ого#! магістра артилерії. Крім того, що [Select_CString(target_character.IsFemale,'вона', 'він')] здобуде визнання, цей титул розширить [Select_CString(target_character.IsFemale,'її', 'його')] повноваження та відкриє нові можливості для розробки артилерійських знарядь."
  flavor_fra.2011.a: "Присвоїмо йому титул магістра артилерії."
  flavor_fra.2011.b: "Порох занадто дорогий. Краще вести війну традиційними методами."
  flavor_fra.2012.title: "[target_character.GetNameWithNoTooltip], Бастард Орлеанський"
  flavor_fra.2012.desc: "Попри те, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] доводиться йому [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'родичкою', 'родичем')], [target_character.GetName] особисто бере участь у боях з #L [GetCountry('ENG').GetAdjective|l]ими#! військами. Своїми успіхами на полі бою [target_character.GetShortNameWithNoTooltip] здобув славу та повагу оточення, і наші радники вважають, що він заслуговує на вище становище при [ROOT.GetCountry.GetGovernment.GetCourtTitle]і. Втім, дехто вважає, що таким чином він лише втирається в довіру уряду, а насправді переслідує свої корисливі цілі."
  flavor_fra.2012.a: "Запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] звання придворного!"
  flavor_fra.2012.b: "Він недостойний такої почесті."
  flavor_fra.2013.title: "[ShowBuildingTypeNameWithNoTooltip('university')|U] [ShowLocationNameWithNoTooltip('poitiers')]"
  flavor_fra.2013.desc: "Прагнучи закласти основи для нового #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#! в #TOOLTIP:LOCATION,poitiers,X #L Пуатьє#!#!, [pap_ruler.GetName] [Select_CString(pap_ruler.IsFemale,'звернулася', 'звернувся')] за дозволом, сподіваючись, що [fra_ruler.GetName] схвалить ідею. Новий освітній центр у Пуатьє приніс би користь. Однак це одне з найбільших міст #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, і деякі радники просять [Select_CString(fra_ruler.IsFemale,'правительку', 'правителя')] відповісти відмовою: вони побоюються, що згодом [GetCountry('PAP').GetGovernment.GetRulerTitle|l] може посилити контроль над [ROOT.GetCountry.Custom('CL_INST')]. Інші, втім, вважають, що [fra_ruler.GetNameWithNoTooltip] [Select_CString(fra_ruler.IsFemale,'повинна', 'повинен')] схвалити прохання, оскільки [pap_ruler.GetNameWithNoTooltip] [Select_CString(pap_ruler.IsFemale,'згадала', 'згадав')], що [GetCountry('PAP').GetName] виділить кошти на побудову нового #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!."
  flavor_fra.2013.a: "Випустимо указ."
  flavor_fra.2013.b: "[pap_ruler.GetNameWithNoTooltip] не отримає дозволу."
  flavor_fra.2014.title: "[praguerie_revolt_target.GetNameWithNoTooltip] влаштовує заколот"
  flavor_fra.2014.desc: "[fra_ruler.GetName] втрачає популярність серед знаті, і багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] відкрито висловлюють невдоволення [Select_CString(fra_ruler.IsFemale,'її', 'його')] правлінням. Вони вважають, що своїми недавніми повеліннями [fra_ruler.GetNameWithNoTooltip] ставить аристократію в уразливе становище. Дійшло до того, що обурені дворяни змогли залучити [Select_CString(fra_heir.IsFemale,'спадкоємицю', 'спадкоємця')] на свій бік, сподіваючись, що [fra_heir.GetName] переконає [Select_CString(fra_ruler.IsFemale,'правительку', 'правителя')] зректися престолу. Ті, хто зберігає відданість нинішній владі, вірять, що невдоволення з часом вщухне. Однак деякі вважають, що [fra_ruler.GetNameWithNoTooltip] [Select_CString(fra_ruler.IsFemale,'повинна', 'повинен')] хоча б подумати про зречення, щоб запобігти справжній громадянській війні."
  flavor_fra.2014.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]')|U] свого не доб'ються."
  flavor_fra.2014.b: "Зречемося престолу — нехай його займе [fra_heir.GetNameWithNoTooltip]"
  fra_praguerie_revolt_region: "Усі [Concept('pops', 'групи населення')|e] зі стану #TOOLTIP:POPTYPE,nobles,X #L аристократів#!#! в #TOOLTIP:AREA,ile_de_france_area,X #L Іль-де-Франс#!#! втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction', 'задоволення')|e] та приєднуються до фракції «[praguerie_revolt_target.GetName]»."
  praguerie_revolt: "Прагерія"
  flavor_fra.2020.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2020.desc: "Останніми роками [target_character.GetName] набирає значного впливу серед свого стану. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|U] поважають [Select_CString(target_character.IsFemale,'її', 'його')], і навіть наймудріші купці нашого часу прислухаються до [Select_CString(target_character.IsFemale,'її', 'його')] думки. Заклавши основи масштабної торговельної діяльності в місцевості [ShowLocationName('montpellier')], [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'змогла', 'зміг')] налагодити чудові стосунки з торговельними республіками #TOOLTIP:REGION,italy_region,X #L Італії#!#! завдяки своїм угодам у Леванті.\n\n[fra_ruler.GetName] бажає призначити [Select_CString(target_character.IsFemale,'її', 'його')] на державну посаду за видатні заслуги. Деякі радники вважають, що [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] стати головою монетного двору та керувати фінансами країни."
  flavor_fra.2020.a: "[target_character.GetNameWithNoTooltip] відатиме нашими фінансами!"
  flavor_fra.2020.b: "Нехай [target_character.GetNameWithNoTooltip] продовжує займатися приватною торгівлею."
  flavor_fra.2021.title: "[target_character.GetLastNameWithNoTooltip] та [ROOT.GetCountry.GetGovernment.GetAdjective|l]і витрати"
  flavor_fra.2021.desc: "Ставши головою монетного двору, [target_character.GetLastName] [Select_CString(target_character.IsFemale,'допомогла', 'допоміг')] стабілізувати фінанси #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. На цій посаді [Select_CString(target_character.IsFemale,'вона домоглася', 'він домігся')] багатьох поліпшень, але [Select_CString(target_character.IsFemale,'її', 'його')] повноваження були суворо обмежені державною скарбницею.\n\nНизка радників вважає, що [target_character.GetLastNameWithNoTooltip] чудово [Select_CString(target_character.IsFemale,'зарекомендувала', 'зарекомендував')] себе. На їхню думку, [fra_ruler.GetName] може довірити [Select_CString(target_character.IsFemale,'їй', 'йому')] контроль над [ROOT.GetCountry.GetGovernment.GetAdjective|l]ими витратами та передати, крім іншого, управління [ROOT.GetCountry.GetGovernment.GetAdjective|l]ою скарбницею."
  flavor_fra.2021.a: "[target_character.GetLastNameWithNoTooltip] керуватиме [ROOT.GetCountry.GetGovernment.GetAdjective|l]ими витратами."
  flavor_fra.2021.b: "Нинішньої посади [Select_CString(target_character.IsFemale,'їй', 'йому')] більш ніж достатньо."
  flavor_fra.2022.title: "[target_character.GetLastNameWithNoTooltip] веде переговори з [mamluk_country.Custom('CL_INST')]"
  flavor_fra.2022.desc: "Використовуючи тісні зв'язки з місцевими торговцями, [target_character.GetName] та [Select_CString(target_character.IsFemale,'її', 'його')] найближчі радники багато чого досягли: [mam_ruler.GetName] з [mamluk_country.Custom('CL_GEN')] [Select_CString(mam_ruler.IsFemale,'готова', 'готовий')] укласти з нами угоду. Вона спрощує зв'язок з консулами в Леванті та дає нам низку інших важливих переваг; крім того, [target_character.GetLastNameWithNoTooltip] таким чином налагоджує нові торговельні зв'язки з [mamluk_country.Custom('CL_INST')].\n\nУгода з [mamluk_country.Custom('CL_INST')] зміцнить вплив #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! в середземноморській торгівлі, але деякі вважають, що [target_character.GetLastNameWithNoTooltip] швидше розширює власну торговельну імперію."
  flavor_fra.2022.a: "Укладемо угоду, яку [Select_CString(target_character.IsFemale,'підготувала', 'підготував')] [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.2022.b: "Не будемо схвалювати угоду."
  mam_trade_with_france: "Торговельна угода з Францією"
  fra_trade_with_mamluks: "Торговельна угода з мамлюками"
  flavor_fra.2023.title: "Шато Ене-ле-В'єй та палац [target_character.GetNameWithNoTooltip]"
  flavor_fra.2023.desc: "[target_character.GetName] гідно виконує обов'язки міністра та контролера #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, але дехто склав про [Select_CString(target_character.IsFemale,'неї', 'нього')] не найкращу думку. Річ у тім, що до вступу на службу при дворі [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'встигла', 'встиг')] створити велике торгове підприємство. Попри те, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] отримували користь від діяльності [Select_CString(target_character.IsFemale,'сановниці', 'сановника')], [Select_CString(target_character.IsFemale,'її', 'його')] особисті інтереси почали викликати роздратування інших міністрів.\n\n[target_character.GetNameWithNoTooltip] збирається придбати колись важливий замок #italic Ене-ле-В'єй#! у #TOOLTIP:LOCATION,bourges,X #L Буржі#!#!, а також побудувати вигадливий палац [target_character.GetNameWithNoTooltip] у тій же місцевості.\n\nПодібне марнотратство наводить на думку, що [target_character.GetLastNameWithNoTooltip] користується своєю посадою, аби оточити себе розкішшю."
  flavor_fra.2023.a: "Нас не турбує, що купує та будує [target_character.GetLastNameWithNoTooltip]."
  flavor_fra.2023.b: "Відтепер [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] утриматися від таких надзвичайних витрат."
  flavor_fra.2024.title: "Підприємлива [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  flavor_fra.2024.desc: "Коли [target_character.GetName] [Select_CString(target_character.IsFemale,'стала', 'став')] міністром, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] почали виявляти все більший інтерес до торгових маршрутів, що розвиваються. Раніше подібне вважалося примхою; більше того, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], що займаються торгівлею, ризикують втратити свої привілеї. Але тепер деякі з найближчих монарших радників, зокрема [target_character.GetNameWithNoTooltip], переконують [Select_CString(fra_ruler.IsFemale,'правительку', 'правителя')] переглянути правила та дозволити знаті займатися підприємництвом.\n\nЩоправда, окремі впливові [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] ставляться до цієї ідеї з побоюванням і вважають, що зайва конкуренція може зашкодити економіці #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.2024.a: "Знімемо обмеження — нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] пробують себе в підприємництві."
  flavor_fra.2024.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|U] не менш важливі, ніж [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]. Краще заборонити знаті брати участь у торгівлі."
  flavor_fra.2025.title: "[Select_CString(target_character.IsFemale,'Монополістка', 'Монополіст')] [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.2025.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'добилася', 'добився')] видатних успіхів на посаді міністра, і [fra_ruler.GetName] визнає [Select_CString(target_character.IsFemale,'її', 'його')] заслуги. Однак [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] все більше турбується про надмірний вплив [Select_CString(target_character.IsFemale,'сановниці', 'сановника')]. Багато придворних обурені, що [target_character.GetLastNameWithNoTooltip] володіє мало не монополією на більшій частині ринків #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. За їхніми словами, [target_character.GetLastNameWithNoTooltip] більше дбає про власне багатство, ніж про поповнення державної скарбниці. Мало того, частина незадоволених заявляє, що [target_character.GetLastNameWithNoTooltip] викрадає веслярів для своїх торгових галер, а також наживається на верфях і легковагих монетах.\n\nТепер [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] у гніві вимагає, щоб [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale,'була ув'язнена','був ув'язнений')] у в'язницю, [Select_CString(target_character.IsFemale,'позбавлена', 'позбавлений')] всіх посад і привілеїв, а також [Select_CString(target_character.IsFemale,'постала', 'постав')] перед судом."
  flavor_fra.2025.a: "Кинемо [Select_CString(target_character.IsFemale,'її', 'його')] за ґрати та конфіскуємо всі [Select_CString(target_character.IsFemale,'її', 'його')] володіння!"
  flavor_fra.2025.b: "[target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale,'принесла', 'приніс')] нам велику користь і заслуговує на пощаду. Нехай залишається при дворі."
  flavor_fra.2030.t: "Непокора [GetCountry('BUR').Custom('CL_GEN')]"
  flavor_fra.2030.desc: "У минулому багато ленників #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! намагалися послабити владу короля, але зрештою їх все ж вдавалося вгамувати дипломатичним або військовим шляхом. Однак жителі #ONCLICK:COUNTRY,[GetCountry('BUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BUR').Custom('CL_tt')],X [GetCountry('BUR').Custom('CL_GEN')|L]#!#! виявилися набагато впертішими та небезпечнішими за інших. [ruler_bur.GetName] відмовляється платити податки та виконувати будь-які вимоги нашого двору, фактично оголошуючи себе [Select_CString(ruler_bur.IsFemale,'незалежною правителькою', 'незалежним правителем')] [GetCountry('BUR').Custom('CL_GEN')]. Хоча формально ці землі належать [GetCountry('FRA').Custom('CL_DAT')], подібне самовладдя загрожує підірвати вплив королівської влади в інших регіонах."
  flavor_fra.2030.a: "Ми повинні поставити їх на місце."
  flavor_fra.2030.b: "Краще уникати конфлікту з [GetCountry('BUR').Custom('CL_INST')]."
  flavor_fra.2031.t: "Ліга суспільного блага"
  flavor_fra.2031.desc: "[ruler_fra.GetName] та [Select_CString(ruler_fra.IsFemale,'її', 'його')] попередник досягли великих успіхів у централізації країни та зміцненні королівської влади. Однак ця політика викликала невдоволення ленників #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! і, зокрема, принців крові, які не бажають втрачати свою автономію. Намагаючись уникнути впливу корони, частина з них організувала союз, названий Лігою суспільного блага. Його головна мета — дати відсіч монарху та повернути володінням корони їхні колишні свободи."
  flavor_fra.2031.a: "Ми не ведемо переговорів з бунтівниками."
  flavor_fra.2032.a: "Можливо, нам теж варто приєднатися до Ліги."
  flavor_fra.2032.b: "Корона стала занадто сильна. Ми повинні об'єднатися проти неї!"
  flavor_fra.2033.t: "Ліга вимагає автономії"
  flavor_fra.2033.desc: "Спочатку Ліга суспільного блага об'єднувала лише кількох васалів, стурбованих централізацією #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, але з того часу до союзу також приєдналися вельми впливові правителі апанажів. [Select_CString(league_leader_ruler.IsFemale,'Предводителька', 'Предводитель')] Ліги [league_leader_ruler.GetName] [Select_CString(league_leader_ruler.IsFemale,'висунула', 'висунув')] до уряду низку вимог. Головна з них — повернути феодальним володінням статус, який вони мали, коли країною правив [GetCharacter('fra_philippe_iv_capet').GetName|l].\n\nУ разі відмови учасники Ліги мають намір підняти повстання проти корони."
  flavor_fra.2033.a: "Їхні вимоги обурливі!"
  flavor_fra.2033.b: "У нас немає іншого вибору, окрім як виконати вимоги Ліги."
  flavor_fra.2034.title_royalist: "Перемога королівського двору"
  flavor_fra.2034.title_league: "Перемога Ліги"
  flavor_fra.2034.desc_royalist: "Ліга суспільного блага підняла заколот проти корони, але зрештою була повністю розгромлена! Завдяки цій рішучій перемозі [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'усунула', 'усунув')] останню перешкоду на своєму шляху до централізації країни та здобуття абсолютної влади. Хоча у цієї політики все ще є противники, з розвалом Ліги у них практично не залишилося шансів будь-яким чином вплинути на дії корони."
  flavor_fra.2034.desc_league: "Піднявши заколот проти корони, Ліга суспільного блага змогла досягти своїх цілей, послабивши вплив монарха та сповільнивши централізацію країни. Внаслідок важкої поразки [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'була змушена', 'був змушений')] укласти Конфланський договір та надати заколотникам додаткові привілеї."
  flavor_fra.2034.a: "Це катастрофа…"
  flavor_fra.2034.b: "Королівську владу так просто не здолати!"
  flavor_fra.2040.t: "Ордонансові роти"
  flavor_fra.2040.desc: "Після закінчення своїх договорів найманці, що колись виступали на нашому боці, заради наживи почали влаштовувати набіги на мирні поселення, від чого сильно страждає [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l]. Для боротьби з бандитами Генеральні штати видали новий закон, за яким [ruler_fra.GetName] має ексклюзивне право створювати та готувати війська. На відміну від попередніх військ, які збиралися лише в разі потреби, #italic ордонансові роти#! стануть першими постійними військовими частинами, що підпорядковуються безпосередньо монарху. Надалі цей крок дозволить нам створити повноцінні регулярні збройні сили."
  flavor_fra.2040.a: "Доручимо створення ордонансових рот."
  flavor_fra.2040.b: "Створимо менш велике регулярне військо."
  flavor_fra.2040.c: "Направимо кошти на проведення масштабної вербування."
  flavor_fra.2041.t: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] фінансова грамотність"
  flavor_fra.2041.desc: "В історії #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! було багато великих монархів, але ніхто з них не був так підкований у фінансових справах, як [target_character.GetName]. Завдяки [Select_CString(target_character.IsFemale,'її', 'його')] вмілому керівництву [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] ставляться до корони з великою довірою, що дозволяє нам фінансувати будівельні роботи по всій країні. При цьому [target_character.GetShortNameWithNoTooltip] грамотно планує витрати, забезпечуючи економічну стабільність країни."
  flavor_fra.2041.a: "Настала епоха нашого процвітання."
  flavor_fra.2041.b: "Намагатимемося зробити так, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] і надалі нас підтримували."
  flavor_fra.2041.c: "Це чудова нагода провести податкову реформу."
  flavor_fra.2042.t: "Бурзька Прагматична санкція"
  flavor_fra.2042.desc: "#TOOLTIP:LOCATION,bourges,X #L Бурзька#!#! Прагматична санкція була видана з метою оформити незалежність #L [GetCountry('FRA').GetAdjective|l]ої#! католицької церкви та вивести її з-під впливу #TOOLTIP:GOVERNMENT_REFORM,papacy_reform,X #L Святого Престолу#!#!. З того часу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] дотримуються вірності короні та самостійно вирішують церковні справи, проте [pap_ruler.GetName] незадоволений таким станом справ. Він вимагає скасувати санкцію та відновити верховенство папи у всіх релігійних питаннях. Погодившись, ми зможемо знову налагодити відносини зі Святим Престолом, але водночас [fra_ruler.GetName] втратить можливість впливати на діяльність духовенства."
  flavor_fra.2042.a: "Скасуємо санкцію."
  flavor_fra.2042.b: "Святий Престол нам не указ."
  flavor_fra.2043.t: "Розширення мережі королівських поштових доріг"
  flavor_fra.2043.desc: "Королівський двір підтримує постійний зв'язок зі своїми найближчими ленниками, а ось доставляти повідомлення до більш віддалених володінь не так просто. [target_character.GetName] пропонує розширити мережу королівських доріг, щоб кур'єрам було простіше діставатися до пунктів призначення [GetCountry('FRA').Custom('predlog_vvo')] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#!. При цьому деякі радники вважають, що доцільніше будувати дешевші дороги, які можна буде використовувати для найрізноманітніших цілей."
  flavor_fra.2043.a: "На дорогах не можна економити!"
  flavor_fra.2043.b: "Приймемо проєкт радників."
  flavor_fra.2043.c: "Будівництво доріг — це марна трата коштів."
  flavor_fra.2044.t: "Поштові станції"
  flavor_fra.2044.desc: "Розширення мережі королівських доріг вже принесло свої плоди, але [target_character.GetName] знає, як покращити ці результати. [Select_CString(target_character.IsFemale,'Вона', 'Він')] пропонує побудувати вздовж доріг спеціальні поштові станції, які слугуватимуть стоянками для [Select_CString(target_character.IsFemale,'її', 'його')] особистих гінців та членів королівського двору. Крім того, за необхідності подібні станції можна буде використовувати і для потреб розвідки."
  flavor_fra.2044.a: "Дозволимо будівництво цих установ, як велить [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
  flavor_fra.2044.b: "Використаємо поштові станції для розвитку шпигунських мереж."
  flavor_fra.2044.c: "Це занадто дорого."
  flavor_fra.2100.t: "Політика щодо Італії"
  flavor_fra.2100.desc: "Війна проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! закінчена, і тепер настав час приділити увагу нашим південним кордонам уздовж Альпійських гір. У минулому ми підтримували відносини з кількома #TOOLTIP:REGION,italy_region,X #L італійськими#!#! династіями та країнами, проте через війну наші можливості для співпраці були обмежені. Тепер же радники пропонують розширити наш вплив у цьому регіоні, щоб здобути цінних союзників в особі місцевих правителів. Втім, дехто вважає, що ми повинні поводитися агресивніше і змусити своїх італійських сусідів приєднатися до [GetCountry('FRA').Custom('CL_DAT')], хочуть вони того чи ні."
  flavor_fra.2100.a: "Поки краще зберігатимемо нейтралітет."
  flavor_fra.2100.b: "Намагатимемося налагодити відносини з найвпливовішими сусідами."
  flavor_fra.2100.c: "Під нашою владою їм буде краще."
  flavor_fra.2101.t: "[ruler_mlo.GetNameWithNoTooltip] пропонує союз"
  flavor_fra.2101.desc: "Високопоставлений чиновник з #ONCLICK:COUNTRY,[GetCountry('MLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MLO').Custom('CL_tt')],X [GetCountry('MLO').Custom('CL_GEN')|L]#!#! прибув до нас з пропозицією про зміцнення відносин. [ruler_mlo.GetName] — [Select_CString(ruler_mlo.IsFemale,'одна', 'один')] з найвпливовіших людей у політичних колах #TOOLTIP:REGION,italy_region,X #L Італії#!#!. [Select_CString(ruler_mlo.IsFemale,'Вона', 'Він')] запевняє, що інтереси [GetCountry('MLO').Custom('CL_GEN')] та #L [GetCountry('FRA').GetAdjective|l]ого#! двору багато в чому збігаються, а тому співпраця піде на користь обом країнам. [ruler_mlo.GetShortNameWithNoTooltip] пропонує укласти союз, але наші радники вважають, що не варто квапити події і що краще спочатку домовитися про створення тісніших зв'язків між країнами."
  flavor_fra.2101.a: "Нам вигідне зближення з [GetCountry('MLO').Custom('CL_INST')]."
  flavor_fra.2101.b: "Ми готові співпрацювати, але союз поки зачекає."
  flavor_fra.2101.c: "Леви не домовляються з вівцями."
  flavor_fra.2102.t: "Влада [GetCountry('MLO').Custom('CL_GEN')] просить про допомогу"
  flavor_fra.2102.desc: "[Select_CString(ruler_mlo.IsFemale, 'Правителька', 'Правитель' )] #ONCLICK:COUNTRY,[GetCountry('MLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MLO').Custom('CL_tt')],X [GetCountry('MLO').Custom('CL_GEN')|L]#!#! [ruler_mlo.GetName] просить нашої допомоги у боротьбі проти [GetCountry('NAP').Custom('longname_ru_GEN')]. За [Select_CString(ruler_mlo.IsFemale, 'її', 'його' )] словами, [ruler_nap.GetName] нещодавно [Select_CString(ruler_nap.IsFemale, 'заявила', 'заявив' )] про свої претензії на [GetCountry('MLO').Custom('longname_ru_nott_ACC')] і може будь-якої миті розпочати вторгнення. У разі поразки [GetCountry('MLO').Custom('CL_GEN')] північна частина #TOOLTIP:REGION,italy_region,X #L Італії#!#! на довгі роки опиниться під впливом [GetCountry('NAP').Custom('CL_GEN')].\n\nМи не зобов'язані втручатися, проте радники пропонують скористатися цим і висунути зустрічні претензії на [GetCountry('NAP').Custom('CL_ACC')]. Підставою для цього є те, що [ruler_fra.GetName] має спорідненість з династією #TOOLTIP:DYNASTY,$anjou_dynasty_tt$,X #L Анжу#!#!, яка правила #TOOLTIP:AREA,provence_area,X #L Провансом#!#! в роки унії з владою [GetCountry('NAP').Custom('CL_GEN')]. При цьому варто мати на увазі, що подібна авантюра може викликати опір італійської знаті."
  flavor_fra.2102.a: "Ми відповімо на заклик і заявимо про свої претензії на [GetCountry('NAP').Custom('CL_ACC')]."
  flavor_fra.2102.b: "Якщо [ruler_nap.GetShortNameWithNoTooltip|l] нападе, ми дамо [Select_CString(ruler_nap.IsFemale,'їй', 'йому')] відсіч."
  flavor_fra.2102.c: "Нас це не стосується."
  flavor_fra.2103.t: "Наслідки походу на [GetCountry('NAP').Custom('CL_ACC')]"
  flavor_fra.2103.desc: "Після того як [ruler_mlo.GetName|l] [Select_CString(ruler_mlo.IsFemale,'попросила', 'попросив')] про допомогу, [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'зібрала', 'зібрав')] значне військо і [Select_CString(ruler_fra.IsFemale,'вирушила', 'вирушив')] у похід. Користуючись нагодою, [Select_CString(ruler_fra.IsFemale,'вона заявила', 'він заявив')] свої права на #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_ACC')|L]#!#!, що викликало бурхливу реакцію #TOOLTIP:CULTUREGROUP,italian_group,X #L італійської#!#! знаті, і навіть наші союзники з #ONCLICK:COUNTRY,[GetCountry('MLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MLO').Custom('CL_tt')],X [GetCountry('MLO').Custom('CL_GEN')|L]#!#! вирішили обірвати з нами всі зв'язки. Якщо ми не виведемо війська з [GetCountry('NAP').Custom('CL_GEN')], то італійці можуть створити коаліцію і спробувати витіснити нас силою."
  flavor_fra.2103.a: "Ми не відмовимося від своїх законних прав на [GetCountry('NAP').Custom('CL_ACC')]!"
  flavor_fra.2103.b: "Розграбуємо [GetCountry('NAP').Custom('CL_ACC')] і виведемо війська."
  flavor_fra.2103.c: "Відмовимося від претензій на [GetCountry('NAP').Custom('CL_ACC')] і виведемо війська."
  flavor_fra.2103.historical_info: "Агресивні плани Карла VIII призвели до вельми несподіваних наслідків: правителі, які колись були суперниками, об'єдналися заради спільної мети — вигнання французького війська з Італії. Їхній союз став відомий як Священна ліга. Тоді проти Франції виступила ціла низка дрібних італійських країн, а разом з ними — Іспанія та Священна Римська імперія. Згодом звістки про французькі завоювання дійшли до Генріха VII, і до союзу також приєдналася Англія."
  flavor_fra.2104.t: "Уряд [GetCountry('NAP').Custom('CL_GEN')]"
  flavor_fra.2104.desc: "Після завоювання #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_GEN')|L]#!#! члени двору почали обговорювати, кому довірити управління регіоном. У минулому ці землі перебували у володінні династії #TOOLTIP:DYNASTY,$anjou_dynasty_tt$,X #L Анжу#!#!, але потім були втрачені. Ціною чималих зусиль [ruler_fra.GetName] [Select_CString(ruler_fra.IsFemale, 'повернула', 'повернув' )] їх під наш контроль, і тепер важливо не допустити повторення історії. Думки радників розділилися: деякі пропонують призначити правителем [GetCountry('NAP').Custom('CL_GEN')] одного з [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их дворян, інші ж вважають, що [GetCountry('NAP').GetAdjectiveWithNoTooltip|l]ий уряд повинен підкорятися королівському двору. Втім, є і третій варіант, за якого [GetCountry('NAP').Custom('CL_GEN')] матиме автономію, але ця країна залишиться з нами в унії."
  flavor_fra.2104.a: "Призначимо [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого дворянина правителем [GetCountry('NAP').Custom('CL_GEN')]."
  flavor_fra.2104.b: "Влада [GetCountry('NAP').Custom('CL_GEN')] підкориться королівському двору!"
  flavor_fra.2104.c: "Надамо [GetCountry('NAP').Custom('CL_DAT')] автономію."
  flavor_fra.2105.t: "Похід на [GetCountry('MLO').Custom('CL_ACC')]"
  flavor_fra.2105.desc: "Спершу між нами та #ONCLICK:COUNTRY,[GetCountry('MLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MLO').Custom('CL_tt')],X [GetCountry('MLO').Custom('CL_INST')|L]#!#! зберігалися дружні стосунки, але незабаром після нашого вторгнення на територію #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_GEN')|L]#!#! [ruler_mlo.GetName|l] [Select_CString(ruler_mlo.IsFemale,'завдала', 'завдав')] нам удару в спину. Як виявилося, [Select_CString(ruler_mlo.IsFemale,'вона попросила', 'він попросив')] нас про допомогу лише для того, щоб після нашого вдалого походу прибрати [GetCountry('NAP').Custom('rank_ru_ACC')|l] до своїх рук. У зв'язку з цим радники просять, щоб [ruler_fra.GetShortNameWithNoTooltip|l] [Select_CString(ruler_fra.IsFemale,'використала', 'використав')] свій новий титул і [Select_CString(ruler_fra.IsFemale,'заявила', 'заявив')] права на [GetCountry('MLO').Custom('rank_ru_ACC')|l]. Таким чином ми не тільки покараємо [Select_CString(ruler_mlo.IsFemale,'зрадницю', 'зрадника')], а й запобігнемо створенню ворожої коаліції проти #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!."
  flavor_fra.2105.a: "[ruler_mlo.GetShortNameWithNoTooltip] заплатить за свою зраду!"
  flavor_fra.2105.b: "Ми захопили [GetCountry('NAP').Custom('CL_ACC')], і цього достатньо."
  flavor_fra.2106.t: "Доля [GetCountry('MLO').Custom('CL_GEN')]"
  flavor_fra.2106.desc: "[GetCountry('MLO').GetName] під нашим контролем. Тепер [ruler_fra.GetName|l] одночасно [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! і [GetCountry('MLO').GetGovernment.GetRulerTitle|l] [GetCountry('MLO').Custom('CL_GEN')]. Однак не все так райдужно, оскільки члени двору зіткнулися з дилемою. Захопивши спочатку #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_ACC')|L]#!#!, а потім і [GetCountry('MLO').Custom('CL_ACC')], ми викликали обурення багатьох країн по всьому регіону, і навіть [target_hre_ruler.GetName] [Select_CString(target_hre_ruler.IsFemale,'почала', 'почав')] більш пильно стежити за тим, що відбувається тут. У такій обстановці утримати [GetCountry('MLO').Custom('CL_ACC')] буде непросто, тому радники пропонують залишити [GetCountry('MLO').Custom('rank_ru_ACC')|l] у спокої, але встановити тут лояльний нам уряд. На жаль, для цього [ruler_fra.GetShortNameWithNoTooltip|l] [Select_CString(ruler_fra.IsFemale,'повинна', 'повинен')] буде відмовитися від свого нового титулу."
  flavor_fra.2106.a: "Нехай [ruler_fra.GetShortNameWithNoTooltip|l] і далі править як [GetCountry('MLO').GetGovernment.GetRulerTitle|l] [GetCountry('MLO').Custom('CL_GEN')]."
  flavor_fra.2106.b: "Призначимо правителем нашого [GetCountry('MLO').GetAdjectiveWithNoTooltip|l]ого прихильника."
  flavor_fra.2106.c: "Ми покарали зрадника і тепер можемо вивести війська з [GetCountry('MLO').Custom('CL_GEN')]."
  flavor_fra.2107.t: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2107.desc: "[target_character.GetName] родом з #TOOLTIP:LOCATION,aix_en_provence,X #L Екс-ан-Провансу#!#! вже довгий час вірно служить королівській родині. [GetCountry('FRA').GetGovernment.GetRuler.GetName] навіть [Select_CString(GetCountry('FRA').GetGovernment.GetRuler.IsFemale,'довірила', 'довірив')] [Select_CString(target_character.IsFemale,'їй', 'йому')] виховання та освіту своїх дітей, серед яких є і [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'нинішня спадкоємиця', 'нинішній спадкоємець')] [ROOT.GetCountry.GetGovernment.GetHeir.GetName]. В нагороду за хорошу роботу [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip] пропонує надати [Select_CString(target_character.IsFemale,'їй', 'йому')] вищу посаду при дворі."
  flavor_fra.2107.a: "Схвалимо [Select_CString(target_character.IsFemale,'її', 'його')] підвищення."
  flavor_fra.2107.b: "[target_character.GetShortNameWithNoTooltip] залишиться на своїй поточній посаді."
  flavor_fra.2107.historical_info: "Етьєн де Веск був придворним при Людовику XI та Карлі VIII, і за час своєї роботи встиг набути значного впливу. Етьєн займався вихованням юного Карла і дбав про нього під час його важкої хвороби, за що заслужив повагу Людовика XI. Коли дофін успадкував престол, Етьєн фактично став одним з його радників і цілком підтримав французьке вторгнення в Неаполь у 1494 році."
  flavor_fra.2108.t: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.2108.desc: "Наші спроби налагодити відносини з #TOOLTIP:REGION,italy_region,X #L італійськими#!#! країнами привернули увагу відомого кондотьєра на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона проявила', 'Він проявив')] себе як талановитий командир і вже [Select_CString(target_character.IsFemale,'здобула', 'здобув')] кілька великих перемог у битвах по всій Італії. Якщо ми хочемо розширити свій вплив на півострові, то [Select_CString(target_character.IsFemale,'її', 'його')] вміння нам точно знадобляться. Проте деякі радники вважають, що [target_character.GetShortNameWithNoTooltip] вимагає за свої послуги надмірно високу плату."
  flavor_fra.2108.a: "Наймемо знаменитого кондотьєра."
  flavor_fra.2108.b: "Нам не потрібна [Select_CString(target_character.IsFemale,'її', 'його')] допомога."
  flavor_fra.2050.t: "Криза престолонаслідування серед влади [GetCountry('BRI').Custom('CL_GEN')]"
  flavor_fra.2050.desc: "При дворі #ONCLICK:COUNTRY,[GetCountry('BRI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRI').Custom('CL_tt')],X [GetCountry('BRI').Custom('CL_GEN')|L]#!#! виникла непроста ситуація. Оскільки [bri_ruler.GetName|l] не обзавівся сином, спадкоємицею була обрана його дочка [breton_heir_for_marriage.GetName]. Проблема в тому, що, за чутками, [breton_heir_for_marriage.GetShortNameWithNoTooltip] збирається укласти заручини з дворянином, чиїм родичем є [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [target_hre_ruler.GetName|l]. Якщо ці відомості вірні, то всі титули та володіння [GetCountry('BRI').Custom('CL_GEN')] можуть перейти до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!.\n\nУ зв'язку з цим радники пропонують чинити на нашого ленника тиск, щоб [breton_heir_for_marriage.GetShortNameWithNoTooltip] вступила в шлюб з членом династії [fra_ruler.GetDynasty.GetName]. Це дозволить нам зберегти контроль над [GetCountry('BRI').Custom('rank_ru_INST')|l], однак може викликати невдоволення місцевих аристократів."
  flavor_fra.2050.a: "Нехай [fra_ruler.GetNameWithNoTooltip|l] вступить у шлюб зі спадкоємицею [GetCountry('BRI').Custom('CL_GEN')]."
  flavor_fra.2050.b: "Чоловіком стане [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip]."
  flavor_fra.2050.c: "[random_male_dynasty_member.GetNameWithNoTooltip] чудово підійде на роль нареченого."
  flavor_fra.2050.d: "Не варто втручатися в справи [GetCountry('BRI').Custom('CL_GEN')]."
  flavor_fra.2060.title: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Мандрівна', 'Мандрівний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_fra.2060.desc: "Порівняно зі своїми попередниками [fra_ruler.GetName] здійснює багато [ROOT.GetCountry.GetGovernment.GetAdjective|l]их поїздок та подорожей. [Select_CString(fra_ruler.IsFemale,'Вона', 'Він')] вважає за краще наносити візити без попередження, дивуючи багатьох місцевих лордів. Подібні раптові відвідини часто вносять переполох у повсякденні справи. Однак, від'їжджаючи, [fra_ruler.GetShortNameWithNoTooltip] залишає провінцію в кращому стані, ніж до свого прибуття.\n\nЗараз [fra_ruler.GetNameWithNoTooltip] збирається вирушити в чергову [ROOT.GetCountry.GetGovernment.GetAdjective|l]у подорож і просить поради у придворних. Нехай [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] вирішить, яка провінція удостоїться візиту цього разу: [target_province_1.GetName] чи [target_province_2.GetName]."
  flavor_fra.2060.a: "[target_province_1.GetNameWithNoTooltip] — місцеві чиновники нададуть вельми теплий прийом."
  flavor_fra.2060.b: "[target_province_2.GetNameWithNoTooltip] — місцеві чиновники не настільки привітні, але туди варто нанести візит."
  flavor_fra.2060.c: "Нехай [fra_ruler.GetNameWithNoTooltip] краще залишається в Парижі."
  flavor_fra.2061.title: "Кров — не вода"
  flavor_fra.2061.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] [fra_ruler.GetName], як і раніше, користується повагою підданих. Згодом [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] помічає, що [Select_CString(fra_ruler.IsFemale,'її сестра', 'його брат')] [target_sibling.GetName] успішно підтримує правління [Select_CString(fra_ruler.IsFemale,'царственої родички', 'царственого родича')], набравши значного впливу. Маючи гострий розум і проникливість, [target_sibling.GetNameWithNoTooltip] використовує могутність династії [target_sibling.GetDynasty.GetName], щоб рада належним чином виконувала повеління [Select_CString(fra_ruler.IsFemale,'сестри', 'брата')].\n\nНайбільш завзяті прихильники чинної влади вважають, що [target_sibling.GetShortNameWithNoTooltip] марно розтрачує свої таланти на придворні чвари, і найбільш підходяще для [Select_CString(target_sibling.IsFemale,'неї', 'нього')] місце — це [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l]."
  flavor_fra.2061.a: "[ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] — гарна ідея, нехай [target_sibling.GetShortNameWithNoTooltip] служить там."
  flavor_fra.2061.b: "Нам потрібна [Select_CString(target_sibling.IsFemale,'її', 'його')] підтримка при дворі."
  flavor_fra.2062.title: "[fra_ruler.GetNameWithNoTooltip] проводить реформи права"
  flavor_fra.2062.desc: "[fra_ruler.GetName] вважає свою країну надто застарілою, а тому робить перші спроби перебудувати законодавство #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Ця праця не марна: [fra_ruler.GetNameWithNoTooltip], крім усього іншого, [Select_CString(fra_ruler.IsFemale, 'добилася', 'добився' )] успіхів у зниженні податкового тягаря та зведенні бюджету. Однак не всі залишилися задоволені необхідними для цього реформами: оскільки для зведення бюджету довелося урізати виплати, які отримують [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], частина найбагатших сімейств країни відкрито обурилася новою політикою.\n\nОднак оцінити всі ці зміни по-справжньому зможе лише спадкоємець, якому [fra_ruler.GetNameWithNoTooltip] передасть країну. До цього часу країна стане помітно стійкішою, а бюрократія в ній — дієвішою."
  flavor_fra.2062.a: "Згодом [ROOT.GetCountry.GetNameWithNoTooltip] пожне плоди цих реформ."
  flavor_fra.2062.b: "Скасувати деякі реформи, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] не обурювалися."
  flavor_fra.2063.title: "[fra_ruler.GetNameWithNoTooltip] та іконографія"
  flavor_fra.2063.desc: "[fra_ruler.GetName] — людина, за якої така форма правління, як [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName|l], стала користуватися небувалою підтримкою народу. На відміну від колишніх правителів, які обґрунтовували законність своєї влади любов'ю підданих до себе, [fra_ruler.GetShortNameWithNoTooltip] прагне не тільки поширювати [ROOT.GetCountry.GetGovernment.GetAdjective]ий вплив, а й підносити себе перед іншими в очах простого населення. Метод цей вкрай простий: вулиці міст наповнили численні [ROOT.GetCountry.GetGovernment.GetAdjective|l]і зображення, на яких перед глядачами постає [fra_ruler.GetShortNameWithNoTooltip], а письменники навперебій вихваляють [Select_CString(fra_ruler.IsFemale, 'її', 'його' )].\n\nДеякі обережні голоси, втім, застерігають нас, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [fra_ruler.GetShortNameWithNoTooltip] — всього лише людина, і якщо ми не зупинимося, #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! церква може оголосити нас єретиками."
  flavor_fra.2063.a: "Підтримати подальше поширення [ROOT.GetCountry.GetGovernment.GetAdjective|l]их зображень."
  flavor_fra.2063.b: "Поміркувати поширення зображень, щоб уникнути звинувачень з боку католицької церкви."
  flavor_fra.2064.title: "[Select_CString(fra_ruler.IsFemale, 'Народна захисниця', 'Народний захисник' )]"
  flavor_fra.2064.desc_frontend: "Генеральні штати пожалували [Select_CString(fra_ruler.IsFemale, 'нашій правительці', 'нашому правителю' )] — людині, обличчя якої відтепер відоме кожному, і затятому поборнику такого ладу, як [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip|l], — титул"
  flavor_fra.2064.desc_backend: "[Select_CString(fra_ruler.IsFemale, 'Її', 'Його' )] слава незмінно лише міцніла після кожної зустрічі з представниками Генеральних штатів, і сьогодні сталося довгоочікуване присудження такого почесного титулу — вперше за всю історію країни."
  flavor_fra.2064.desc_king: "$flavor_fra.2064.desc_frontend$ #italic «Батько народу»#! на знак того, що [fra_ruler.GetName] користується непохитною підтримкою народу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. $flavor_fra.2064.desc_backend$"
  flavor_fra.2064.desc_queen: "$flavor_fra.2064.desc_frontend$ #italic «Мати народу»#! на знак того, що [fra_ruler.GetName] користується непохитною підтримкою народу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. $flavor_fra.2064.desc_backend$"
  flavor_fra.2064.a: "Люб'язно прийняти титул."
  flavor_fra.301.title: "[ruler_fra.GetShortNameWithNoTooltip] та мистецтво Відродження"
  flavor_fra.301.desc: "Поширення ідей #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! надихнуло безліч художників та майстрів по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. [ruler_fra.GetShortName], а також члени [Select_CString(ruler_fra.IsFemale,'її', 'його')] двору також не залишилися байдужими і почали витрачати значні кошти на прикрашання [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого палацу предметами мистецтва. Користуючись зрослим інтересом уряду до культури, ми можемо брати під своє крило видатних творців, щоб підтримувати їх у створенні великих творів живопису, скульптури, музики та літератури."
  flavor_fra.301.a: "Ми пропонуємо покровительство всім талановитим художникам!"
  flavor_fra.301.b: "Місцеві майстри справляються і без нашої допомоги."
  flavor_fra.301.c: "Цю одержимість мистецтвом потрібно припинити!"
  flavor_fra.302.title: "[target_character.GetNameWithNoTooltip] у пошуках покровительства"
  flavor_fra.302.desc: "Дізнавшись про те, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує фінансову підтримку талановитим художникам, [target_character.GetName] [Select_CString(target_character.IsFemale,'прибула', 'прибув')] до [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetName]. Завдяки своїй творчості [Select_CString(target_character.IsFemale,'вона набула', 'він набув')] відомості по всій #TOOLTIP:REGION,italy_region,X #L Італії#!#!. Варто зазначити, що [target_character.GetShortNameWithNoTooltip] також [Select_CString(target_character.IsFemale,'привезла', 'привіз')] із собою свій найвеличніший твір #italic «Мона Ліза»#!. Якщо ми надамо [Select_CString(target_character.IsFemale,'їй', 'йому')] покровительство, то це не лише підвищить престиж #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! в очах інших країн, а й дозволить оголосити цей шедевр нашим культурним надбанням."
  flavor_fra.302.a: "Ми надамо [Select_CString(target_character.IsFemale,'їй', 'йому')] підтримку."
  flavor_fra.302.b: "Напевно, є більш гідні кандидати."
  flavor_fra.303.title: "[target_character.GetNameWithNoTooltip] бажає стати [Select_CString(target_character.IsFemale,'наставницею', 'наставником')]"
  flavor_fra.303.desc: "Завдяки своєму знатному походженню [target_character.GetName] [Select_CString(target_character.IsFemale,'змогла', 'зміг')] отримати посаду при дворі, де [Select_CString(target_character.IsFemale,'вона', 'він')] служить радником та богословом. Нещодавно [target_character.GetShortNameWithNoTooltip] також [Select_CString(target_character.IsFemale,'заявила', 'заявив')], що [Select_CString(scope_heir_fra.IsFemale,'юна', 'юний')] [scope_heir_fra.GetName|l] [Select_CString(scope_heir_fra.IsFemale,'могла', 'міг')] би багато чого у [Select_CString(target_character.IsFemale,'неї', 'нього')] навчитися, і тому [Select_CString(target_character.IsFemale,'вона', 'він')] пропонує стати [Select_CString(scope_heir_fra.IsFemale,'її', 'його')] [Select_CString(target_character.IsFemale,'наставницею', 'наставником')]. У минулому [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'довіряла', 'довіряв')] навчання своїх дітей лише найшанованішим викладачам, однак під впливом ідей #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! наука та культура стали стрімко розвиватися. Можливо, [target_character.GetShortNameWithNoTooltip] і справді зможе краще підготувати [Select_CString(scope_heir_fra.IsFemale,'спадкоємицю', 'спадкоємця')] до правління країною в цю нову епоху."
  flavor_fra.303.a: "[target_character.GetShortNameWithNoTooltip] стане [Select_CString(target_character.IsFemale,'чудовою вчителькою', 'чудовим учителем')]."
  flavor_fra.303.b: "Краще залишимо все як є."
  flavor_fra.303.historical_info: "Особистим наставником юного Франциска, який у 1515 році став королем Франциском I, був Франсуа де Мулен де Рошфор. Він виховував та навчав майбутнього монарха в дусі ідей Відродження. Згодом Франсуа став найближчим радником короля і навіть отримав титул великого роздавача милостині — ці посади він обіймав до самої своєї смерті в 1526 році."
  flavor_fra.304.title: "[target_character.GetNameWithNoTooltip] та гуманістичні ідеали"
  flavor_fra.304.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'здобула', 'здобув')] досить широку відомість у Північній #TOOLTIP:REGION,france_region,X #L Франції#!#! та Нідерландах, тому, прибувши до #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, [Select_CString(target_character.IsFemale,'вона швидко привернула', 'він швидко привернув')] увагу двору. Деякі радники вважають, що [scope_heir_fra.GetName] може багато чого почерпнути з [Select_CString(target_character.IsFemale,'її', 'його')] гуманістичних переконань, однак у цієї ідеї є противники. Вони побоюються, що, ставши [Select_CString(scope_heir_fra.IsFemale,'її', 'його')] [Select_CString(target_character.IsFemale,'наставницею', 'наставником')], [target_character.GetShortNameWithNoTooltip] напевно спробує нав'язати [Select_CString(scope_heir_fra.IsFemale,'їй', 'йому')] свій шкідливий прогресивний світогляд."
  flavor_fra.304.a: "Ми дамо [Select_CString(target_character.IsFemale,'їй', 'йому')] шанс."
  flavor_fra.304.b: "[Select_CString(target_character.IsFemale,'Її', 'Його')] гуманістичним ідеям не місце при нашому дворі."
  flavor_fra.305.title: "Перебудова Лувру"
  flavor_fra.305.desc: "Заснований у XII столітті, Лувр спочатку замислювався як оборонна споруда, але з того часу втратив своє колишнє значення. У зв'язку з цим [ruler_fra.GetName] [Select_CString(ruler_fra.IsFemale,'вирішила', 'вирішив')] перебудувати старий замок і перетворити його на [ROOT.GetCountry.GetGovernment.GetAdjective|l]у резиденцію. [Select_CString(ruler_fra.IsFemale,'Її', 'Його')] найближчі радники вже розробили проєкт розкішного палацу, однак деякі члени двору наполягають, щоб Лувр відновили та використовували як фортецю."
  flavor_fra.305.a: "Нехай на місці Лувру буде чудовий палац!"
  flavor_fra.305.b: "Краще модернізуємо замок для потреб оборони."
  flavor_fra.306.title: "Розширення літньої резиденції Фонтенбло"
  flavor_fra.306.desc: "Ліс Фонтенбло вже багато років служить для #L [GetCountry('FRA').GetAdjective|l]их#! монархів мисливськими угіддями. Досі тут знаходилася лише скромна резиденція, однак [ruler_fra.GetName|l] планує розширити її та перетворити на повноцінний палац. На здійснення такого амбітного проєкту доведеться виділити багато коштів, що може погано позначитися на фінансовому становищі нашої країни."
  flavor_fra.306.a: "Схвалимо розширення резиденції Фонтенбло."
  flavor_fra.306.b: "Ми не можемо дозволити собі таку розкіш."
  flavor_fra.307.title: "[target_character.GetShortNameWithNoTooltip] і трактат «[ShowWorkOfArtNameWithNoTooltip('de_asse_et_partibus_eius')]»"
  flavor_fra.307.desc: "[fra_ruler.GetName] — справжній знавець талантів. За [Select_CString(fra_ruler.IsFemale, 'її', 'його' )] пропозицією [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] сьогодні приймає [Select_CString(target_character.IsFemale, 'відому вчену', 'відомого вченого' )] на ім'я [target_character.GetName] в надії, що [Select_CString(target_character.IsFemale, 'вона', 'він' )] погодиться обійняти посаду радника. Такої уваги — і запрошення, яке [Select_CString(fra_ruler.IsFemale, 'надіслала', 'надіслав' )] особисто [fra_ruler.GetNameWithNoTooltip] — [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'заслужила', 'заслужив' )] тим, що [Select_CString(target_character.IsFemale, 'опублікувала', 'опублікував' )] гідну поваги працю [ShowWorkOfArtNameWithNoTooltip('de_asse_et_partibus_eius')], що стосується античної нумізматики.\n\n[target_character.GetLastNameWithNoTooltip] — не тільки іменита людина науки, але також і гуманіст, а тому, якщо [Select_CString(target_character.IsFemale, 'вона', 'він' )] все-таки стане радником, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] може змінити свою політику."
  flavor_fra.307.a: "Нехай [target_character.GetLastNameWithNoTooltip] служить нам творцем."
  flavor_fra.307.b: "[target_character.GetLastNameWithNoTooltip] заслуговує похвали, проте краще дозволити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] і далі займатися своїми справами."
  flavor_fra.308.title: "[target_character.GetNameWithNoTooltip] і «[ShowWorkOfArtNameWithNoTooltip('heptameron')]»"
  flavor_fra.308.desc: "[Select_CString(target_sibling.IsFemale, 'Покійна', 'Покійний' )] [target_sibling.GetName] [Select_CString(target_sibling.IsFemale, 'прославилася', 'прославився' )] своїм письменницьким талантом — [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] в захваті від [Select_CString(target_sibling.IsFemale, 'її', 'його' )] творів. Багато хто навіть пропонує зберегти [Select_CString(target_sibling.IsFemale, 'її', 'його' )] праці як артефакт; зберігати ж їх буде безпосередньо [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої країни.\n\nРоботою зі збереження написаного займається [target_character.GetName]; [Select_CString(target_character.IsFemale, 'вона вже зібрала', 'він вже зібрав' )] короткі оповідання в збірник під назвою [ShowWorkOfArtNameWithNoTooltip('heptameron')] і тепер просить, щоб [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'дозволила', 'дозволив' )] його опублікувати."
  flavor_fra.308.a: "Опублікувати [ShowWorkOfArtNameWithNoTooltip('heptameron')] на честь [Select_CString(target_sibling.IsFemale, 'покійної', 'покійного' )]."
  flavor_fra.308.b: "Випустимо «Гептамерон» обмеженим тиражем."
  flavor_fra.309.title: "#italic Колеж де Франс#!"
  flavor_fra.309.desc: "Надихнувшись прикладом #italic Колегії трьох мов#!, [target_character.GetName] просить, щоб [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'надала', 'надав' )] [Select_CString(target_character.IsFemale, 'їй', 'йому' )] покровительство в заснуванні нового навчального закладу в #TOOLTIP:LOCATION,paris,X #L Парижі#!#!. Там [target_character.GetLastNameWithNoTooltip] збирається, за прикладом #italic Колегії трьох мов#!, розвивати викладання математики та інших профільних наук, наприклад #TOOLTIP:LANGUAGE,greek_language,X #L давньогрецької#!#! мови."
  flavor_fra.309.a: "Підтримати створення нової колегії!"
  flavor_fra.309.b: "Відмовити в проханні: у країни немає на це коштів."
  flavor_fra.310.title: "Суперництво з латиною"
  flavor_fra.310.desc: "Вже кілька століть поспіль [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — як, втім, і багатьох інших #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн — для складання документів і записів користується #TOOLTIP:LANGUAGE,latin_language,X #L латинською#!#! мовою; нею ж користуються викладачі в навчальних закладах. Але так не може тривати вічно — [fra_ruler.GetName] і [target_character.GetName] підготували ордонанс, згідно з яким рівноправною мовою культури та науки нарівні з латиною стане французька."
  flavor_fra.310.a: "Видамо ордонанс."
  flavor_fra.310.b: "Намагатимемося зберегти латину як основну мову!"
  flavor_fra.311.title: "Новий Світ"
  flavor_fra.311.desc: "Історії про далекі краї вже давно розбурхували уми мандрівників, але досі багато хто вважав ці історії лише вигадкою. Тепер же нам достеменно відомо про існування іншого континенту, і це стало причиною дискусій між членами уряду. Одні пропонують організувати експедицію в ці загадкові землі, інші ж виступають проти, оскільки це потребуватиме надмірних вкладень без будь-якої гарантії успіху. Якщо експедиція провалиться, це легко може призвести #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#! до розорення."
  flavor_fra.311.a: "Схвалимо освоєння нових земель."
  flavor_fra.311.b: "Краще спрямуємо ресурси на вирішення внутрішніх проблем."
  flavor_fra.312.title: "[target_character.GetNameWithNoTooltip] та її/його подорож"
  flavor_fra.312.desc: "Уряд почав виявляти інтерес до освоєння Нового Світу, і одним з кандидатів на роль голови майбутньої експедиції [Select_CString(target_character.IsFemale,'була висунута бретонська мореплавиця', 'був висунутий бретонський мореплавець')] на ім'я [target_character.GetName]. Раніше найняті нами #TOOLTIP:CULTUREGROUP,italian_group,X #L італійські#!#! мореплавці не впоралися з поставленими завданнями, але, можливо, завдяки своєму досвіду та знанням [target_character.GetShortNameWithNoTooltip] зможе скласти більш точні карти тамтешніх морів та берегів."
  flavor_fra.312.a: "Схвалимо [Select_CString(target_character.IsFemale,'її', 'його')] кандидатуру."
  flavor_fra.312.b: "Ми наймемо [Select_CString(target_character.IsFemale,'її', 'його')], але доручимо [Select_CString(target_character.IsFemale,'їй', 'йому')] інше завдання."
  flavor_fra.312.historical_info: "Жак Картьє був серед перших французьких мореплавців, що досягли берегів Нового Світу та частково дослідили Канаду. Для своїх ранніх експедицій Франція залучала італійських мореплавців через їхній великий досвід, але надалі священник Жан Ле Венер представив королівському двору Жака Картьє. Франциск I був вражений його задумом і доручив йому знайти західний шлях до країн Азії. Картьє не вдалося досягти своєї мети, проте по дорозі він відкрив Затоку Святого Лаврентія та узбережжя Канади, де в 1541 році було збудовано Шарльбур-Руаяль — перший французький форт у Новому Світі. Втім, у 1543 році його було покинуто через надто суворі умови, і лише в 1605 році Франція заснувала поселення Пор-Руаяль, яке й стало її першою колонією на американському континенті."
  flavor_fra.313.title: "[target_character.GetShortNameWithNoTooltip] повертається з експедиції"
  flavor_fra.313.desc: "[Select_CString(target_character.IsFemale,'Бретонська мореплавиця', 'Бретонський мореплавець')] [target_character.GetName] [Select_CString(target_character.IsFemale,'повернулася', 'повернувся')] на територію #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! і [Select_CString(target_character.IsFemale,'привезла', 'привіз')] із собою карти різних регіонів Нового Світу! Під час своєї подорожі [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'зустріла', 'зустрів')] мирних тубільців, які показали [Select_CString(target_character.IsFemale,'їй та її', 'йому та його')] команді найближчі околиці.\n\nНатхненні відкриттями, радники запропонували заснувати в цих землях поселення, проте подібна експедиція потребуватиме серйозних вкладень."
  flavor_fra.313.a: "Спорядимо експедицію для заселення нових земель."
  flavor_fra.313.b: "У нас вистачає інших турбот."
  flavor_fra.321.title: "Франко-турецький союз"
  flavor_fra.321.desc: "Землі #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! оточені ворожими країнами, чия могутність та вплив постійно зростають. Щоб знайти союзників у цій непростій ситуації, [ruler_fra.GetName|l] [Select_CString(target_character.IsFemale,'змушена', 'змушений')] розглядати будь-які варіанти, і один із них — це [GetCountry('TUR').GetLongName].\n\nХоча [GetCountry('PAP').GetGovernment.GetRulerTitle|l] [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale,'оголосила', 'оголосив')], що [GetCountry('TUR').GetNameWithNoTooltip] — ворог християнського світу, у нас із ними спільні суперники, а отже, наш союз буде довгим і надійним. Однак варто враховувати, що така співпраця напевно викличе обурення християнських країн."
  flavor_fra.321.a: "Це необхідний захід."
  flavor_fra.321.b: "Ми зміцнимо з ними відносини, але не будемо вступати в союз."
  flavor_fra.321.c: "Вони нам не союзники!"
  flavor_fra.322.title: "Католики засуджують союз"
  flavor_fra.322.desc: "Союз із #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_INST')|L]#!#! викликав гнів цілої низки #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! країн. Звісно, [ruler_fra.GetName|l] ще не [Select_CString(ruler_fra.IsFemale,'відлучена', 'відлучений')] від церкви, але [ruler_PAP.GetName|l] вкрай різко [Select_CString(ruler_PAP.IsFemale,'висловилася', 'висловився')] про наше рішення, і це спонукало сусідні країни почати підтримувати наших суперників."
  flavor_fra.322.a: "Усі ці обурення нічого не значать."
  flavor_fra.323.title: "Відновлення торгівлі в Леванті"
  flavor_fra.323.desc: "Після укладення франко-турецького союзу торгівля між нашими країнами вийшла на абсолютно новий рівень. З часів #L [GetCountry('TUR').GetAdjective|l]ого#! завоювання #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#! європейські країни не можуть торгувати в цьому регіоні через ембарго, проте на нас його дія більше не поширюється. Завдяки цьому на [GetCountry('TUR').GetAdjectiveWithNoTooltip|l]их та [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их ринках помітно зріс попит на найрізноманітніші товари!"
  flavor_fra.323.a: "[ROOT.GetCountry.Custom('common_string_positive')]."
  flavor_fra.330.title: "Едикт Фонтенбло"
  flavor_fra.330.desc: "Поширення ідей Реформації буквально потрясло всю #TOOLTIP:CONTINENT,europe,X #L Європу#!#!, через що багато хто відвернувся від вчення #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви і став сповідувати #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!. Хоча більша частина населення #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, як і раніше, дотримується католицької віри, кількість лютеран невблаганно зростає.\n\nСтурбовані таким розвитком подій, члени уряду просять, щоб [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'видала', 'видав')] #TOOLTIP:POLICY,edict_of_fontainebleau,X #L едикт Фонтенбло#!#!, який буде спрямований на обмеження прав лютеран та інших протестантів. Це дозволить припинити пропаганду хибних вчень та уникнути дестабілізації суспільства."
  flavor_fra.330.a: "Ми зобов'язані вжити заходів для боротьби з єрессю."
  flavor_fra.330.b: "До них варто ставитися більш терпимо."
  flavor_fra.331.title: "Різанина в Мерендолі"
  flavor_fra.331.desc: "Поголовне навернення людей у #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранську#!#! віру змусило #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! церкву звернути увагу й на старіші види єресі, внаслідок чого #TOOLTIP:RELIGION,$waldensian_tt$,X #L вальденси#!#! Мерендоля стали піддаватися ще більшим гонінням.\n\nЗагострення відносин між жителями призвело до того, що місцевий уряд вирішив влаштувати масове вбивство вальденсів. Це викликало хвилю заворушень по всій території #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, оскільки багато лютеран побоюються, що скоро черга дійде й до них."
  flavor_fra.331.a: "Ця різанина лише посилить напруженість."
  flavor_fra.332.title: "Гугеноти знаходять послідовників"
  flavor_fra.332.desc: "З початком Реформації уряд із жахом спостерігав за тими заворушеннями, які охопили Європу через поширення #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#!. Проте у #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#! це вчення не набуло такої широкої популярності, чого не можна сказати про інший напрямок протестантизму — #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#!. В останні роки кількість його послідовників, яких #TOOLTIP:RELIGION,$catholic_tt$,X #L католики#!#! єхидно називають #italic гугенотами#!, неухильно зростає. Якщо нічого не вжити, це може призвести до тих самих заворушень, яких ми так побоювалися."
  flavor_fra.332.a: "Потрібно викорінити це небезпечне вчення."
  flavor_fra.332.b: "Краще підтримувати з ними добрі стосунки."
  flavor_fra.333.title: "Едикт Шатобріана"
  flavor_fra.333.desc: "Неприязнь до гугенотів дедалі частіше призводить до сутичок, тому уряд просить, щоб [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'прийняла', 'прийняв')] більш жорсткі заходи. Видання #TOOLTIP:POLICY,edict_of_chateaubriant,X #L едикту Шатобріана#!#! відкриє перед нами ще більше можливостей для переслідування єретиків, які заполонили #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#!. Зокрема, ми зможемо конфіскувати майно іновірців та ввести нові обмеження для відкриття та роботи їхніх підприємств.\n\nТаке рішення безсумнівно викличе гнів гугенотів, але якщо ми не почнемо активно боротися з єрессю, то ризикуємо втратити підтримку духовенства."
  flavor_fra.333.a: "Ми повинні терміново вжити заходів!"
  flavor_fra.333.b: "Гоніння на гугенотів не призведуть ні до чого доброго."
  flavor_fra.340.title: "[consort_fra.GetNameWithNoTooltip] та [Select_CString(consort_fra.IsFemale,'її', 'його')] влада"
  flavor_fra.340.desc: "У цей період неспокою, що охопив #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#!, [consort_fra.GetNameWithNoTooltip] [Select_CString(consort_fra.IsFemale,'зуміла', 'зумів')] здобути значний вплив у раді, і [ruler_fra.GetName|l] по праву вважає [Select_CString(consort_fra.IsFemale,'її своєю вірною прихильницею', 'його своїм вірним прихильником')]. Ми можемо надати [Select_CString(consort_fra.IsFemale,'їй', 'йому')] ще більшу владу, щоб за необхідності [Select_CString(consort_fra.IsFemale,'вона могла', 'він міг')] самостійно вирішувати складні завдання."
  flavor_fra.340.a: "Розширимо [Select_CString(consort_fra.IsFemale,'її', 'його')] особисті повноваження."
  flavor_fra.340.b: "Дозволимо [Select_CString(consort_fra.IsFemale,'їй', 'йому')] брати участь у діяльності уряду."
  flavor_fra.340.c: "[consort_fra.GetShortNameWithNoTooltip] заслуговує на повну довіру [Select_CString(ruler_fra.IsFemale,'правительки', 'правителя')]."
  flavor_fra.341.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] втрачають вплив"
  flavor_fra.341.desc: "Кількість гугенотів серед жителів #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! продовжує зростати, через що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] вже почали втрачати свій авторитет в очах народу. Попри вкрай сувору політику щодо єретиків-реформаторів, їхнє вчення розповзається країною, немов зараза. Схоже, вони просто ігнорують багато вимог і не бояться покарання. Якщо так триватиме й далі, єретики легко зможуть підняти повстання проти нашої влади."
  flavor_fra.341.a: "Гугенотів потрібно позбавити будь-якого впливу!"
  flavor_fra.341.b: "Нам доведеться піти на поступки, щоб уникнути заворушень."
  flavor_fra.342.title: "Амбуазька змова"
  flavor_fra.342.desc: "Прагнучи домогтися пом'якшення релігійної політики, гугеноти мали намір захопити [Select_CString(ruler_fra.IsFemale,'нашу правительку', 'нашого правителя')] в полон і змусити [Select_CString(ruler_fra.IsFemale,'її', 'його')] скасувати низку указів уряду. На щастя, їхню змову було вчасно розкрито, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не [Select_CString(ruler_fra.IsFemale,'постраждала', 'постраждав')]. Однак сам факт такого замаху свідчить про те, що гугеноти стали занадто сильні.\n\nЧлени ради обговорюють, що робити у відповідь на цей злочин. Яким би не було їхнє рішення, ясно одне: цю проблему потрібно вирішити остаточно, інакше в країні може початися повстання."
  flavor_fra.342.a: "Ми повинні розправитися з гугенотами раз і назавжди."
  flavor_fra.342.b: "Можливо, їхні вимоги цілком виправдані…"
  amboise_revolt: "Повстання гугенотів"
  flavor_fra.351.title: "[ruler_fra.GetShortNameWithNoTooltip] навертається в кальвінізм"
  flavor_fra.351.desc: "Значна частина простолюду #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! прийняла єретичні ідеї Реформації, однак багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] як і раніше сповідують #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!. Однак сьогодні [ruler_fra.GetName|l] [Select_CString(ruler_fra.IsFemale,'заявила', 'заявив')] про своє навернення в #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#!, і ця звістка вразила членів уряду.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] та Генеральні штати незадоволені: вони побоюються, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] почне проводити більш терпиму політику щодо релігійних меншин. При цьому подібні зміни напевно допоможуть знизити напруженість і припинити ворожнечу між представниками різних конфесій."
  flavor_fra.351.a: "Можливо, [Select_CString(ruler_fra.IsFemale,'її', 'його')] навернення принесе нам стабільність."
  flavor_fra.351.b: "Уряд повинен засудити цей вчинок!"
  flavor_fra.351.c: "[ruler_fra.GetShortNameWithNoTooltip] [Select_CString(ruler_fra.IsFemale,'повинна', 'повинен')] негайно повернутися до попередньої віри!"
  flavor_fra.352.title: "[ruler_fra.GetShortNameWithNoTooltip] налагоджує стосунки з кальвіністськими країнами"
  flavor_fra.352.desc: "Після навернення в #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#! [ruler_fra.GetShortName] [Select_CString(ruler_fra.IsFemale,'почала', 'почав')] терпиміше ставитися до представників різних релігій, що призвело до поліпшення відносин із сусідами. Навіть якщо [Select_CString(ruler_fra.IsFemale,'вона', 'він')] раптом загине і престол знову займе [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]-[Select_CString(ruler_fra.IsFemale,'католичка', 'католик')], у нас залишиться можливість співпрацювати з цими країнами. Хоча б у цьому заслуга [Select_CString(ruler_fra.IsFemale,'нашої правительки', 'нашого правителя')] незаперечна."
  flavor_fra.352.a: "У майбутньому ці зв'язки можуть нам стати в пригоді."
  flavor_fra.353.title: "Рада вимагає повернення до колишньої віри"
  flavor_fra.353.desc: "Своїм рішенням перейти в #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#! [ruler_fra.GetShortName|l] [Select_CString(ruler_fra.IsFemale,'розгнівала', 'розгнівав')] багатьох членів уряду, які, втім, побоялися відкрито виступити проти [Select_CString(ruler_fra.IsFemale,'її', 'його')] влади. Однак відтоді [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ruler_fra.IsFemale,'ухвалила', 'ухвалив')] цілу низку непопулярних рішень і [Select_CString(ruler_fra.IsFemale,'почала', 'почав')] втрачати народну підтримку. Тепер [Select_CString(ruler_fra.IsFemale,'її', 'його')] оточення вимагає, щоб [Select_CString(ruler_fra.IsFemale,'вона повернулася', 'він повернувся')] в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! віру.\n\nТак чи інакше, [ruler_fra.GetShortNameWithNoTooltip|l] вже [Select_CString(ruler_fra.IsFemale,'встигла', 'встиг')] знайти прихильників в уряді, і навіть якщо [Select_CString(ruler_fra.IsFemale,'вона', 'він')] поступиться вимогам, деякі аспекти [Select_CString(ruler_fra.IsFemale,'її', 'його')] політики не будуть скасовані."
  flavor_fra.353.a: "[ruler_fra.GetShortNameWithNoTooltip] [Select_CString(ruler_fra.IsFemale,'повинна', 'повинен')] знову прийняти католицтво."
  flavor_fra.353.b: "[Select_CString(ruler_fra.IsFemale,'Її', 'Його')] кальвіністська віра приносить більше користі, ніж проблем."
  flavor_fra.354.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.354.desc: "Попри те, що [target_character.GetName] [Select_CString(target_character.IsFemale,'виросла', 'виріс')] серед #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністів#!#!, [Select_CString(target_character.IsFemale,'їй', 'йому')] вдалося стати впливовою людиною в політиці #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, і навіть [fra_ruler.GetShortName|l] вважає [Select_CString(target_character.IsFemale,'її', 'його')] своїм близьким другом. Однак [target_character.GetShortNameWithNoTooltip] перебуває в непростому становищі: уряд, що складається переважно з #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#!, зневажає [Select_CString(target_character.IsFemale,'її', 'його')] за віру, а гугеноти засуджують [Select_CString(target_character.IsFemale,'її', 'його')] за роботу у владі.\n\nВсупереч цій непопулярності деякі члени ради все ж вдячні [Select_CString(target_character.IsFemale,'їй', 'йому')] за вірну службу і пропонують призначити [Select_CString(target_character.IsFemale,'її', 'його')] першим міністром Франції."
  flavor_fra.354.a: "[target_character.GetShortNameWithNoTooltip] заслуговує на цю посаду."
  flavor_fra.354.b: "[Select_CString(target_character.IsFemale,'Її', 'Його')] підвищення може викликати невдоволення багатьох людей."
  flavor_fra.355.title: "Проєкт Нового мосту"
  flavor_fra.355.desc: "#TOOLTIP:LOCATION,paris,X #L Париж#!#! — одне з найгустонаселеніших міст Європи, і в останні десятиліття його зростання породило низку проблем. Зокрема, жвавий вуличний рух значно прискорив руйнування старих мостів через Сену, і якщо нічого не вжити, то незабаром вони можуть просто обвалитися.\n\nЩоб знизити навантаження на інфраструктуру, члени уряду розробили проєкт нового сучасного мосту. Його будівництво принесе очевидну користь місту, але вимагатиме значних коштів із державної скарбниці, тому [fra_ruler.GetShortName|l] [Select_CString(fra_ruler.IsFemale,'повинна', 'повинен')] особисто схвалити цей проєкт."
  flavor_fra.355.a: "Жителі Парижа будуть раді зведенню Нового мосту."
  flavor_fra.355.b: "Замість цього проєкту здійснимо скромніший."
  flavor_fra.355.c: "Інфраструктура міста в повному порядку."
  flavor_fra.370.title: "Повернення колоніальних ідей"
  flavor_fra.370.desc: "Після десятків років внутрішньої нестабільності [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує знову спробувати удачу в Новому Світі. У минулому експедиції допомогли нам багато дізнатися про ті вабливі землі, однак із початком Реформації та релігійних конфліктів влада #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! була змушена забути про свої колоніальні амбіції. Варто також враховувати, що якщо ми знову спробуємо закріпитися на американському континенті, це може викликати невдоволення інших #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн, які вже давним-давно заснували там свої поселення.\n\nДеякі члени уряду взагалі пропонують відкинути ідеї про Новий Світ, а замість цього заснувати торговельну компанію в #TOOLTIP:CONTINENT,asia,X #L Азії#!#!, що дозволить взяти під контроль індійські торговельні шляхи."
  flavor_fra.370.a: "Настав час спрямувати зусилля на освоєння Нового Світу."
  flavor_fra.370.b: "Ми повинні встановити свою монополію на торгівлю в Індії."
  flavor_fra.371.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.371.desc: "Для здійснення наших колоніальних амбіцій потрібні досвідчені мандрівники, здатні очолити експедицію в північні регіони Нового Світу. Радники вважають, що на цю роль чудово підходить [Select_CString(target_character.IsFemale,'потомствена мореплавиця', 'потомствений мореплавець')] на ім'я [target_character.GetName]. Ми можемо доручити [Select_CString(target_character.IsFemale,'їй', 'йому')] заснування [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их поселень на американському континенті, або ж застосувати [Select_CString(target_character.IsFemale,'її', 'його')] навички в інших експедиціях."
  flavor_fra.371.a: "Нехай [target_character.GetShortNameWithNoTooltip] досліджує північ Нового Світу."
  flavor_fra.371.b: "Ми знайдемо для [Select_CString(target_character.IsFemale,'неї', 'нього')] інші завдання."
  flavor_fra.372.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] подорож"
  flavor_fra.372.desc: "Сьогодні [Select_CString(target_character.IsFemale,'видатна мандрівниця та мореплавиця', 'видатний мандрівник та мореплавець')] [target_character.GetName] [Select_CString(target_character.IsFemale,'повернулася', 'повернувся')] до #TOOLTIP:LOCATION,paris,X #L Парижа#!#!. [Select_CString(target_character.IsFemale,'Вона була', 'Він був')] серед членів екіпажу #italic «Круассана»#! — одного з перших #L [GetCountry('FRA').GetAdjective|l]их#! кораблів, що досягли берегів #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#!. Там [Select_CString(target_character.IsFemale,'вона мала', 'він мав')] налагодити торгівлю з місцевими поселеннями, але під час виконання завдання #italic «Круассан»#! потрапив у засідку і був захоплений каперами. У підсумку [target_character.GetShortNameWithNoTooltip] все ж [Select_CString(target_character.IsFemale,'змогла', 'зміг')] повернутися на територію #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, і тепер народ з великим інтересом обговорює [Select_CString(target_character.IsFemale,'її', 'його')] експедицію на схід.\n\n[fra_ruler.GetShortName] [Select_CString(fra_ruler.IsFemale,'вирішила', 'вирішив')] запросити [Select_CString(target_character.IsFemale,'її', 'його')] до свого палацу як [Select_CString(target_character.IsFemale,'почесну гостю', 'почесного гостя')]. Під враженням від почутого, придворні навіть запропонували [Select_CString(target_character.IsFemale,'їй', 'йому')] написати про свою подорож."
  flavor_fra.372.a: "Нехай [target_character.GetShortNameWithNoTooltip] напише про свою експедицію!"
  flavor_fra.372.b: "Яка цікава історія!"
  flavor_fra.373.title: "[fra_ruler.GetShortNameWithNoTooltip] та [Select_CString(fra_ruler.IsFemale, 'її', 'його' )] плани на Індію"
  flavor_fra.373.desc: "[target_character.GetName] та [Select_CString(target_character.IsFemale,'її', 'його')] розповіді про подорожі нікого не залишили байдужим, і тепер [fra_ruler.GetName|l] всерйоз замислюється про те, щоб заснувати в #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#! торговий аванпост. Однак [Select_CString(fra_ruler.IsFemale,'її', 'його')] наближені зустріли цю ідею неоднозначно: з одного боку, такий амбітний проєкт може завадити нашому освоєнню Нового Світу, але з іншого, створення індійської торгової компанії може обернутися для #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! вкрай прибутковою справою. Звісно, на початковому етапі в нього доведеться вкласти чималі кошти, але з часом інвестиції багатократно окупляться."
  flavor_fra.373.a: "Спрямуємо зусилля на розвиток торгівлі в Індії."
  flavor_fra.373.b: "[Select_CString(fra_ruler.IsFemale,'Її', 'Його')] амбіції занадто дорого нам коштують."
  flavor_fra.380.title: "Новий підхід до авторства винаходів"
  flavor_fra.380.desc: "Щоб складати записи про нові винаходи було простіше, [fra_ruler.GetName] збирається видати ордонанс про опис усіх нових творінь, створених на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Згідно з цим ордонансом винахідники будуть зобов'язані докладно описувати всі деталі своїх винаходів — лише тоді їм будуть видані виняткові права на виробництво."
  flavor_fra.380.a: "Видати ордонанс!"
  flavor_fra.380.b: "Усі ці процедури зайві."
  flavor_fra.380.historical_info: "У роки правління Генріха II почали закладатися основи сучасного патентного права. У 1551 році математик Абель Фулон — винахідник висотоміра — за наказом короля опублікував докладний опис свого винаходу, отримавши натомість виняткове та схвалене короною право протягом 10 років виробляти цей прилад."
  flavor_fra.400.title: "[ShowWorkOfArtNameWithNoTooltip('ballet_de_la_merlaison')]"
  flavor_fra.400.desc: "[fra_ruler.GetName] настільки любить балети, які ставить [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], що на ґрунті цього захоплення зародилася нова розвага — [ShowWorkOfArtName('ballet_de_la_merlaison')], до якої однаково захоплено ставляться і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], і приїжджаючі з візитами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Глядачі з незмінним захопленням відзначають, що [fra_ruler.GetName] цілком віддається цій постановці: самостійно грає деякі ролі і навіть розробляє костюми для виконавців. Деякі навіть стверджують, що у всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#! складно буде знайти щось прекрасніше."
  flavor_fra.400.a: "Чудовий балет!"
  flavor_fra.400.b: "Надалі балети проводитимуться лише для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої родини."
  flavor_fra.401.title: "[target_character.GetNameWithNoTooltip] просуває централізацію"
  flavor_fra.401.desc: "На посаді міністра [target_character.GetName] [Select_CString(target_character.IsFemale,'прийняла', 'прийняв')] безліч заходів, спрямованих на централізацію влади та бюрократичної системи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Багато [Select_CString(target_character.IsFemale,'її', 'його')] попередників намагалися досягти цієї ж мети, але зіткнулися з опором знатних родин, які не хотіли втрачати свій вплив.\n\nХоча [target_character.GetLastNameWithNoTooltip] не здається і продовжує розробляти нові закони, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] побоюється, що чергова хвиля централізації знову викличе невдоволення старих еліт."
  flavor_fra.401.a: "Нехай [target_character.GetNameWithNoTooltip] продовжує свою роботу."
  flavor_fra.401.b: "Згорнемо деякі [Select_CString(target_character.IsFemale,'її', 'його')] проєкти, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] не розгнівалися."
  flavor_fra.402.title: "[target_character.GetNameWithNoTooltip] проти феодалів"
  flavor_fra.402.desc: "Вже протягом багатьох століть феодальне дворянство залишається однією з наймогутніших сил #L [ROOT.GetCountry.GetAdjective|l]ого#! суспільства. Попри перехід від ополчення до професійних військ, багато знатних родин #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, як і раніше, мають величезний авторитет і навіть утримують особисті війська.\n\nПрагнучи підірвати їхній вплив і встановити верховенство [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої влади, [target_character.GetName] розробляє різні закони, спрямовані на ослаблення цих родин та скасування таких застарілих посад, як, наприклад, конетабль або адмірал [ROOT.GetCountry.Custom('CL_GEN')]. Своєю чергою, незадоволені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] вимагають скасувати нові укази та погрожують у разі відмови вжити заходів у відповідь."
  flavor_fra.402.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')] повинні зосередити у своїх руках усю владу."
  flavor_fra.402.b: "Попросимо, щоб [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'діяла', 'діяв')] обережніше."
  flavor_fra.402.c: "[target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'зайшла', 'зайшов')] занадто далеко. Вигнати [Select_CString(target_character.IsFemale,'її', 'його')]!"
  flavor_fra.403.title: "День обдурених"
  flavor_fra.403.desc: "[target_character.GetName] та [fra_queen_mother.GetName] ніколи не могли досягти згоди з питань управління країною, але при цьому вони не намагалися підірвати владу одне одного. Однак сьогодні [fra_queen_mother.GetShortNameWithNoTooltip] та [Select_CString(fra_queen_mother.IsFemale,'її', 'його')] найближчі прихильники зажадали, щоб [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'відправила', 'відправив')] свого міністра у відставку.\n\nОстаннім часом [target_character.GetShortNameWithNoTooltip] починає відігравати все важливішу роль у внутрішніх справах країни, тоді як [fra_queen_mother.GetShortNameWithNoTooltip] поступово втрачає свій вплив при дворі. Протистояння дійшло до того, що їхні однодумці стали фактично саботувати роботу уряду, тому проблема вимагає якнайшвидшого вирішення. Якщо [fra_ruler.GetShortNameWithNoTooltip|l] прийме ці вимоги, [target_character.GetShortNameWithNoTooltip] втратить свої повноваження, а всі [Select_CString(target_character.IsFemale,'її', 'його')] проєкти будуть заморожені; якщо ж відмовиться, то [fra_queen_mother.GetShortNameWithNoTooltip] буде [Select_CString(fra_queen_mother.IsFemale,'змушена сама', 'змушений сам')] покинути двір разом зі своїм оточенням."
  flavor_fra.403.a: "Її вимоги необґрунтовані. [target_character.GetShortNameWithNoTooltip] — чудовий міністр."
  flavor_fra.403.b: "Понизимо міністра на посаді, щоб [fra_queen_mother.GetShortNameWithNoTooltip] зберегла свою владу."
  flavor_fra.403.c: "[target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] відправитися у відставку."
  richelieu_retires_from_court: "[target_character.GetShortName] піде у відставку і більше не повернеться до політики."
  flavor_fra.404.title: "Алеський мир"
  flavor_fra.404.desc: "Видання #TOOLTIP:POLICY,edict_of_nantes,X #L Нантського едикту#!#! поклало край релігійній ворожнечі, а також надало гугенотам #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! деякі політичні та військові привілеї. Відтоді [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] помітно зміцнили свої позиції, тому [target_character.GetName] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')] запропонувати гугенотам новий, вигідніший для країни договір. Він багато в чому повторює положення Нантського едикту, але позбавляє гугенотів будь-яких політичних прав.\n\nХоча ця угода дозволить релігійним меншинам на деякий час зберегти за собою певну владу, вона також створить передумови для повного скасування Нантського едикту в майбутньому."
  flavor_fra.404.a: "Підпишемо новий договір."
  flavor_fra.404.b: "Збережемо Нантський едикт у поточному вигляді, щоб уникнути напруженості."
  if_monarch_revokes_nantes_modifier_lost: "Якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] скасує #TOOLTIP:POLICY,edict_of_nantes,X #L Нантський едикт#!#!, припиниться дія наступного модифікатора."
  flavor_fra.405.title: "[target_character.GetNameWithNoTooltip] і військові витрати"
  flavor_fra.405.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'сповнена', 'сповнений')] рішучості забезпечити фінансову та військову безпеку #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У зв'язку з цим [Select_CString(target_character.IsFemale,'вона', 'він')] просить, щоб [fra_ruler.GetName|l] і члени уряду схвалили введення двох податків — #TOOLTIP:GOVERNMENT_REFORM,gabelle,X #L габелі#!#! та #TOOLTIP:LAW,fra_taille,X #L тальї#!#!. Останніми роками наші військові витрати досягли небувалого рівня, але якщо ми не будемо інвестувати в технології, країна може опинитися в скрутному становищі.\n\nУ минулому габель і талья вже стягувалися, але [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'розробила', 'розробив')] ефективніший проєкт, який значно збільшить приплив коштів до скарбниці та дозволить нам провести низку військових реформ. Але варто враховувати, що народ навряд чи зрадіє такому підвищенню податків…"
  flavor_fra.405.a: "Потрібно підвищити податки, щоб наше військо не відставало від інших."
  flavor_fra.405.b: "Введемо помірні податки, щоб не надто обтяжувати населення."
  flavor_fra.405.c: "Відхилимо проєкт. Не можна так знущатися над народом."
  flavor_fra.406.title: "[target_character.GetNameWithNoTooltip] співпрацює з єретиками"
  flavor_fra.406.desc: "Невдовзі після підписання Алеського миру деякі впливові радники виступили з протестом, заявляючи, що своїми діями [target_character.GetName] лише потурає гугенотській єресі, яка ледь не погубила #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Інші члени уряду також висловлюють своє невдоволення [Select_CString(target_character.IsFemale,'її', 'його')] зовнішньополітичною діяльністю, зокрема — веденням переговорів з іновірцями."
  flavor_fra.406.a: "[Select_CString(target_character.IsFemale,'Її', 'Його')] вміла дипломатія приносить свої плоди."
  flavor_fra.406.b: "Переговори з єретиками неприпустимі!"
  flavor_fra.407.title: "Ордонанс [GetCurrentYear] року"
  flavor_fra.407.desc: "Губернатори низки колоній повідомляють, що останнім часом аборигени стали все частіше переїжджати в наші поселення та переймати наш спосіб життя. Загалом їхня асиміляція проходить без проблем і навіть приносить хороші результати, проте формально #L [ROOT.GetCountry.GetAdjective|l]і#! закони поширюються лише на уроджених громадян нашої країни.\n\nЩоб виправити це недопрацювання та допомогти місцевим жителям освоїтися в колоніях, [target_character.GetName] [Select_CString(target_character.IsFemale,'розробила', 'розробив')] новий ордонанс, згідно з яким усі аборигени, які прийняли #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, вважатимуться повноправними громадянами [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_fra.407.a: "Видамо ордонанс."
  flavor_fra.407.b: "Приймемо ордонанс, але надамо місцевим жителям більше автономії."
  flavor_fra.408.title: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'померла', 'помер')]"
  flavor_fra.408.desc: "За час своєї служби на посаді міністра [target_character.GetName] [Select_CString(target_character.IsFemale,'зробила', 'зробив')] для країни дуже багато, тому [fra_ruler.GetName|l] і більшість членів уряду глибоко засмучені звісткою про [Select_CString(target_character.IsFemale,'її', 'його')] кончину.\n\n[Select_CString(target_character.IsFemale,'Вона прагнула', 'Він прагнув')] зміцнити та централізувати державну владу, чим [Select_CString(target_character.IsFemale,'нажила', 'нажив')] собі чимало ворогів як усередині країни, так і за її межами. І все ж, попри всю одіозність [Select_CString(target_character.IsFemale,'її', 'його')] діяльності, #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! бракуватиме такого досвідченого міністра, як [target_character.GetShortNameWithNoTooltip]."
  flavor_fra.408.a: "[target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'справила', 'справив')] великий вплив на розвиток країни."
  flavor_fra.408.b: "[Select_CString(target_character.IsFemale,'Її', 'Його')] дії лише сіяли розбрат."
  flavor_fra.410.title: "Божественне право на правління"
  flavor_fra.410.desc: "У минулому правителі завжди формували свої ради з-поміж найближчих прихильників, один з яких зазвичай ставав першим міністром і головним радником монарха, однак [target_character.GetName] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')] покінчити з цією традицією. [Select_CString(target_character.IsFemale,'Вона заявила', 'Він заявив')] членам ради, що влада дана [Select_CString(target_character.IsFemale,'їй', 'йому')] самим Богом, а тому [Select_CString(target_character.IsFemale,'вона', 'він')] скасує посаду першого міністра й особисто очолить уряд. Схоже, [target_character.GetShortNameWithNoTooltip] серйозно [Select_CString(target_character.IsFemale,'має намір', 'має намір')] зміцнити свій вплив і залишитися у віках як [Select_CString(target_character.IsFemale,'одна', 'один')] з найвеличніших [Select_CString(target_character.IsFemale,'правительок', 'правителів')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.410.a: "[Select_CString(target_character.IsFemale,'Її', 'Його')] правління назавжди увійде в історію."
  flavor_fra.410.b: "Будемо сподіватися, що [Select_CString(target_character.IsFemale,'вона', 'він')] забезпечить країні мир і стабільність."
  fra_sun_king_adm_prestige: "При виборі цього варіанта в майбутніх подіях правитель більше розвиватиме свою навичку #G управління#!, ніж #T дипломатії#!."
  fra_sun_king_dip_stability: "При виборі цього варіанта в майбутніх подіях правитель більше розвиватиме свою навичку #G дипломатії#!, ніж #T управління#!."
  if_fra_ruler_designate_dies: "Якщо [target_character.GetName] загине, приріст навичок від #L [ROOT.GetCountry.GetAdjective|l]их#! [Concept('dynamic_historical_events', 'динамічних історичних подій')|e] скоротиться #R вдвічі#!."
  flavor_fra.411.title: "[scope_former_consort.GetNameWithNoTooltip] бореться за регентство"
  flavor_fra.411.desc: "Перед смертю [scope_ruler_dead.GetName|l] [Select_CString(scope_ruler_dead.IsFemale,'заповіла', 'заповідав')] своїм найближчим радникам сформувати регентську раду і зробити все необхідне, щоб [Select_CString(scope_heir_fra.IsFemale,'юна', 'юний')] [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] [Select_CString(scope_heir_fra.IsFemale,'була готова', 'був готовий')] до сходження на престол. Однак [scope_former_consort.GetName] [Select_CString(scope_former_consort.IsFemale,'вирішила', 'вирішив')] діяти всупереч цьому побажанню і, заручившись підтримкою такої впливової людини, як [target_character.GetName], [Select_CString(scope_former_consort.IsFemale,'потребувала', 'потребував')] відмовитися від створення ради та призначити [Select_CString(scope_former_consort.IsFemale,'її', 'його')] регентом.\n\nЗ одного боку, ми повинні вшанувати волю [Select_CString(scope_ruler_dead.IsFemale,'покійної правительки', 'покійного правителя')], але з іншого, якщо [scope_former_consort.GetShortNameWithNoTooltip] не отримає посаду регента, [Select_CString(scope_former_consort.IsFemale,'вона', 'він')] може завдати нам багато неприємностей."
  flavor_fra.411.a: "Дозволимо [Select_CString(scope_former_consort.IsFemale,'їй', 'йому')] правити як регенту."
  flavor_fra.411.b: "[scope_ruler_dead.GetShortNameWithNoTooltip] ясно [Select_CString(scope_ruler_dead.IsFemale,'висловила', 'висловив')] своє бажання, і ми його виконаємо."
  fra_designated_regency_council: "[ROOT.GetCountry.Custom('CL_INST')] правитиме регент."
  flavor_fra.412.title: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'запідозрена', 'запідозрений')] у корупції"
  flavor_fra.412.desc: "[target_character.GetName] вже давно служить міністром фінансів і успішно вирішує економічні питання країни, однак останніми місяцями з'явилися чутки про те, що [Select_CString(target_character.IsFemale,'вона призвичаїлася', 'він призвичаївся')] до розкоші та помітно [Select_CString(target_character.IsFemale,'розширила', 'розширив')] свій маєток. Деякі вважають, що [target_character.GetShortNameWithNoTooltip] користується своїм становищем, щоб збагачуватися за рахунок [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої скарбниці. Члени ради закликають розслідувати [Select_CString(target_character.IsFemale,'її', 'його')] діяльність, але рішення про долю міністра [Select_CString(fra_ruler.IsFemale,'повинна', 'повинен')] ухвалити [fra_ruler.GetName|l]."
  flavor_fra.412.a: "[target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] піти у відставку!"
  flavor_fra.412.b: "Зробимо [Select_CString(target_character.IsFemale,'їй', 'йому')] догану, але не будемо звільняти."
  flavor_fra.412.c: "Ці звинувачення абсолютно безпідставні."
  fouquet_will_resign_and_retire_from_life: "[target_character.GetName] піде у відставку і більше не повернеться до політики."
  flavor_fra.413.title: "Оподаткування аристократії"
  flavor_fra.413.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] протягом століть користувалися певними привілеями, що дозволяли їм накопичувати величезні статки, але нещодавно [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'вирішила', 'вирішив')] запровадити перший прямий податок для знаті. У минулому аристократи звільнялися від сплати #TOOLTIP:LAW,fra_taille,X #L тальї#!#! та різних мит, але якщо [fra_ruler.GetShortNameWithNoTooltip|l] доведе справу до кінця, вони втратять це право.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] напевно будуть незадоволені цими змінами, але за належної наполегливості [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зможе просунути цей закон. Втім, [Select_CString(fra_ruler.IsFemale,'вона', 'він')] завжди може наслідувати приклад своїх попередників і знайти компроміс."
  flavor_fra.413.a: "Усі повинні платити податки, і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] не виняток."
  flavor_fra.413.b: "Підемо на поступки, щоб уникнути обурення аристократів."
  flavor_fra.413.c: "Краще не будемо їх злити."
  flavor_fra.414.title: "[target_character.GetLastNameWithNoTooltip] пропонує реформу війська"
  flavor_fra.414.desc: "[target_character.GetName] відмінно [Select_CString(target_character.IsFemale,'проявила', 'проявив')] себе на посаді радника та канцлера країни, тому [fra_ruler.GetName|l] довіряє [Select_CString(target_character.IsFemale,'їй', 'йому')] у справі зміцнення своєї влади.\n\nДля досягнення цієї мети [target_character.GetLastNameWithNoTooltip] пропонує провести низку реформ, які дозволять створити більш професійне військо та одночасно зосередити військову владу в руках монарха. У рамках цих змін [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] зможуть призначати командувачів на підставі особистих заслуг, не озираючись при цьому на їхнє багатство, зв'язки чи походження."
  flavor_fra.414.a: "Схвалимо [Select_CString(target_character.IsFemale,'її', 'його')] реформи."
  flavor_fra.414.b: "Приймемо реформи, але збережемо привілеї військових знатного походження."
  flavor_fra.415.title: "Кодекс Людовика"
  flavor_fra.415.desc: "Уже багато століть у нашій країні паралельно існують дві системи: у північних провінціях діє правовий звичай, тоді як на півдні застосовується римське право. Прагнучи створити єдину для всієї країни правову систему, [fra_ruler.GetName|l] і [Select_CString(fra_ruler.IsFemale,'її', 'його')] найближчі радники склали #italic «Кодекс Людовика»#! — перший збірник законів, який діятиме на всій території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!.\n\nНезважаючи на очевидні переваги єдиного зводу законів, радники просять не поспішати з його впровадженням. Вони попереджають, що деяким південним провінціям може знадобитися час, щоб звикнути до нової системи."
  flavor_fra.415.a: "Вся країна повинна підкорятися одним законам, без винятку."
  flavor_fra.415.b: "Поки краще обмежимо дію кодексу північними провінціями."
  flavor_fra.415.c: "Залишимо дві паралельні системи."
  flavor_fra.416.title: "[fra_ruler.GetShortNameWithNoTooltip] виступає за права рабів"
  flavor_fra.416.desc: "Незабаром після заснування перших #L [ROOT.GetCountry.GetAdjective|l]их#! колоній переселенці почали експлуатувати місцеве населення, фактично обертаючи його в рабство. Оскільки розвиток колоній відбувається багато в чому завдяки праці аборигенів, [fra_ruler.GetName] не може просто заборонити цю практику. Замість цього [Select_CString(fra_ruler.IsFemale,'вона розробила', 'він розробив')] новий указ, спрямований на полегшення тягаря рабів. Згідно з цим указом, їх не можна буде розлучати з сім'ями, а кожного нового раба потрібно буде обов'язково хрестити в #L [ShowReligionName('catholic')|l]#!."
  flavor_fra.416.a: "Навіть до рабів потрібно ставитися по-людськи."
  flavor_fra.416.b: "Видамо указ, але залишимо його виконання на розсуд губернаторів."
  flavor_fra.417.title: "Приєднання Нідерландів"
  flavor_fra.417.desc: "Нідерланди вже довгий час перебувають у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! і є предметом територіальних суперечок між нею, #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!. Однак в останні роки імперія помітно ослабла і втратила колишній вплив у цих землях, тому [fra_ruler.GetName] вважає, що зараз саме час приєднати їх до нашої країни."
  flavor_fra.417.a: "Ми повинні захопити ці регіони, поки є шанс."
  flavor_fra.417.b: "Імперія слабшає, але ще може дати відсіч. Краще уникати конфлікту."
  claims_on_lowland_culture_countries: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з'явиться [Concept('casus_belli', 'привід для війни')|e] проти сусідніх країн у Нідерландах."
  flavor_fra.418.title: "Зближення з [GetCountry('TUR').Custom('CL_INST')]"
  flavor_fra.418.desc: "Хоча [GetCountry('TUR').GetName] і [ROOT.GetCountry.GetName] вже давно припинили співпрацю, деякі радники пропонують відновити відносини з нашими старими партнерами. Звісно, ми вже не в такому важкому становищі, як раніше, однак освоєння Нового Світу спонукало багато #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн до створення альянсів і перегляду колишніх домовленостей із сусідами. У такій невизначеній обстановці відродження [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]о-[GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ого союзу безсумнівно зіграє на руку обом країнам."
  flavor_fra.418.a: "Ми відправимо до них послів."
  flavor_fra.418.b: "У цьому немає стратегічної вигоди."
  flavor_fra.419.title: "[target_character.GetNameWithNoTooltip] і [Select_CString(target_character.IsFemale,'її', 'його')] войовнича політика"
  flavor_fra.419.desc: "[target_character.GetName] буквально [Select_CString(target_character.IsFemale,'одержима', 'одержимий')] ідеєю зміцнення впливу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! на міжнародній арені, і для досягнення цієї мети ми повинні розширити свої володіння. [ROOT.GetCountry.GetAdjectiveWithNoTooltip]і правителі і раніше не упускали можливість завоювати нові землі, однак [target_character.GetShortNameWithNoTooltip] і [Select_CString(target_character.IsFemale,'її', 'його')] агресивна політика створюють ідеальні умови для того, щоб продемонструвати нашу міць перед іншими європейськими країнами. Хоч би яка жахлива була війна, це найнадійніший спосіб домогтися поваги суперників."
  flavor_fra.419.a: "Ми покажемо світу всю силу [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_fra.419.b: "Якщо ми не зменшимо свій запал, сусіди можуть створити проти нас коаліцію."
  flavor_fra.421.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] і Версаль"
  flavor_fra.421.desc: "Версальський палац служить не тільки резиденцією [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої родини, а й місцем для прийому найважливіших і найшанованіших гостей. Спочатку палац був побудований як символ могутності та божественного права [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их королів, але з тих пір він також став свого роду політичним інструментом, оскільки в цьому палаці дозволено перебувати лише тим, хто користується прихильністю монарха.\n\nУ зв'язку з цим радники просять, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'запросила', 'запросив')] до палацу членів найвпливовіших знатних сімей. Це дозволить нам заручитися їхньою підтримкою та зосередити владу навколо корони."
  flavor_fra.421.a: "Запросимо знатні родини до Версальського палацу."
  flavor_fra.421.b: "Палац належить [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій родині, стороннім у ньому не місце."
  this_may_lead_to_permanent_weakening_of_the_nobility: "Якщо дозволити їм жити у Версалі, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] можуть назавжди втратити частину свого впливу."
  flavor_fra.422.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] віддають владу"
  flavor_fra.422.desc: "Отримавши наше запрошення, багато впливових [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] охоче переїхали зі своїх маєтків до Версаля. Беручи участь у пишних [ROOT.GetCountry.GetGovernment.GetAdjective|l]их балах та церемоніях, вони перебувають немов в екстазі від краси та багатого оздоблення палацу, і тому готові виконати будь-яке доручення, аби [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'була до них прихильна', 'був до них прихильний')]. Можна вважати, що наш план повністю вдався!\n\nЗ колись марних чертогів Версаль перетворився на вкрай ефективний важіль впливу, який буквально змушує аристократів розлучатися зі своєю владою. Тепер ні в кого не може бути сумнівів: [fra_ruler.GetShortNameWithNoTooltip|l] — [Select_CString(fra_ruler.IsFemale,'незаперечна та повновладна', 'незаперечний та повновладний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] нашої країни."
  flavor_fra.422.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] проковтнули нашу розкішну наживку!"
  flavor_fra.422.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] як і раніше заслуговують на повагу."
  flavor_fra.423.title: "Скасування Нантського едикту"
  flavor_fra.423.desc: "Отримавши фактично абсолютну владу, [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'вирішила', 'вирішив')] скликати раду, щоб нарешті скасувати #TOOLTIP:POLICY,edict_of_nantes,X #L Нантський едикт#!#!, що надає безліч привілеїв гугенотам та іншим релігійним меншинам #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Це рішення напевно призведе до зростання напруженості в суспільстві, проте гугеноти вже не мають колишнього впливу, тому навряд чи зможуть влаштувати заворушення колишніх масштабів. З іншого боку, скасування едикту може змусити їх назавжди покинути [ROOT.GetCountry.Custom('CL_ACC')]."
  flavor_fra.423.a: "Цей злощасний едикт вже давно час скасувати."
  flavor_fra.423.b: "Нантський едикт забезпечує стабільність, його потрібно зберегти!"
  edict_of_nantes_disabled: "Правило #TOOLTIP:LAW,fra_reformation_tolerance_edicts,X #L «Укази про реформаторів»#!#! стане #R недоступне#!."
  flavor_fra.424.title: "Наслідки скасування Нантського едикту"
  flavor_fra.424.desc: "Хоча скасування Нантського едикту дозволило остаточно позбавити гугенотів впливу, воно також завдало нашій країні відчутної шкоди. Побоюючись відновлення гонінь та насильницького навернення до католицтва, багато гугенотів просто втекли з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Крім того, низка впливових ремісників та вчених виступила різко проти скасування едикту, а [fra_ruler.GetNameWithNoTooltip|l] [Select_CString(fra_ruler.IsFemale,'стала', 'став')] для них ненависною фігурою. Навіть в уряді знайшлися ті, хто шкодує про це рішення: попри всі недоліки, едикт допомагав підтримувати порядок та мир між представниками різних релігій."
  flavor_fra.424.a: "Ці дрібниці ні на що не вплинуть."
  flavor_fra.425.title: "Розміщення драгунів"
  flavor_fra.425.desc: "Попри скасування #TOOLTIP:POLICY,edict_of_nantes,X #L Нантського едикту#!#!, [fra_ruler.GetName|l] та [Select_CString(fra_ruler.IsFemale,'її', 'його')] прихильники змушені знову вживати заходів проти єретиків, що нагнітають напруженість у суспільстві. Радники пропонують дорогий, але вельми ефективний метод боротьби з ними: ми можемо видати указ, згідно з яким наші драгуни зможуть вільно заселятися в будинки гугенотів. Напевно багато хто з них просто не витримає такого тиску і буде змушений або покинути країну, або відмовитися від своїх єретичних оман. У будь-якому випадку, це дозволить нам знизити ризик заворушень та повстань на релігійному ґрунті."
  flavor_fra.425.a: "Чудова ідея!"
  flavor_fra.425.b: "Ми не можемо дозволити собі такі витрати."
  flavor_fra.426.title: "Надмірне заступництво"
  flavor_fra.426.desc: "У минулому наші монархи нерідко надавали підтримку видатним діячам культури, науки та політики як усередині країни, так і за її межами. Однак [fra_ruler.GetName|l] переходить усі межі, надаючи заступництво всім кому не лінь. Звісно, це дозволило [Select_CString(fra_ruler.IsFemale,'їй', 'йому')] набути в очах інших #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн репутацію вкрай [Select_CString(fra_ruler.IsFemale,'щедрої та заможної правительки', 'щедрого та заможного правителя')], проте наші фінансові радники побоюються, що таке безрозсудне витрачання казенних коштів може розорити країну."
  flavor_fra.426.a: "Дозволимо [Select_CString(fra_ruler.IsFemale,'їй', 'йому')] і далі займатися заступництвом."
  flavor_fra.426.b: "Попросимо [Select_CString(fra_ruler.IsFemale,'її', 'його')] знизити витрати на заступництво."
  flavor_fra.427.title: "Відновлення Французької академії"
  flavor_fra.427.desc: "Відтоді як [target_character.GetName] [Select_CString(target_character.IsFemale,'заснувала', 'заснував')] Французьку академію, вона стала одним із головних центрів вивчення літератури в усій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Однак останніми роками установа занепала через невміле керівництво, і [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale,'має намір', 'має намір')] це виправити. [Select_CString(fra_ruler.IsFemale,'Вона', 'Він')] пропонує виділити з [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої скарбниці кошти на оновлення та подальше утримання Академії, щоб вона могла й далі служити збереженню та просуванню #L [ROOT.GetCountry.GetAdjective|l]ої#! культури."
  flavor_fra.427.a: "Французька академія повинна продовжувати свою важливу роботу."
  flavor_fra.427.b: "Надамо Французькій академії обмежену підтримку."
  flavor_fra.428.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]а Академія танцю"
  flavor_fra.428.desc: "Ще на ранньому етапі свого правління [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'видала', 'видав')] едикт, що передбачав створення #italic [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої Академії танцю#! — першої в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! школи балету. [fra_ruler.GetShortNameWithNoTooltip] змалку [Select_CString(fra_ruler.IsFemale,'захоплюється', 'захоплюється')] цим мистецтвом і володіє ним досконало, чим, безумовно, пишається.\n\nНещодавно в #TOOLTIP:LOCATION,paris,X #L Парижі#!#! пройшов придворний балет, який справив велике враження на аристократію: [fra_ruler.GetShortNameWithNoTooltip|l] і кілька учнів Академії майстерно виконали танець, у якому [Select_CString(fra_ruler.IsFemale,'сама', 'сам')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(fra_ruler.IsFemale,'виступила', 'виступив')] в образі бога сонця Аполлона."
  flavor_fra.428.a: "[fra_ruler.GetShortNameWithNoTooltip] знає толк у мистецтвах!"
  flavor_fra.428.b: "Незабаром усі ці танці вийдуть з моди."
  flavor_fra.429.title: "[Select_CString([ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Неповторна', 'Неповторний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_fra.429.desc: "Зійшовши на престол, [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'відмовилася', 'відмовився')] призначати першого міністра, проте це не завадило [Select_CString(fra_ruler.IsFemale,'їй', 'йому')] досягти високих результатів і стати [Select_CString(fra_ruler.IsFemale,'однією з найвеличніших правительок', 'одним з найвеличніших правителів')] в історії країни. Своїми діями [fra_ruler.GetShortNameWithNoTooltip|l] [Select_CString(fra_ruler.IsFemale,'заслужила', 'заслужив')] повагу не лише серед підлеглих, а й серед інших #TOOLTIP:CONTINENT,europe,X #L європейських#!#! лідерів. Одного дня [Select_CString(fra_ruler.IsFemale,'її', 'його')] правління добіжить кінця, але [fra_ruler.GetShortNameWithNoTooltip|l] назавжди запам'ятається народу як [Select_CString(fra_ruler.IsFemale,'найуспішніша та наймогутніша', 'найуспішніший та наймогутніший')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_fra.429.a: "[fra_ruler.GetShortNameWithNoTooltip] — воістину велика людина."
  flavor_fra.430.title: "Вплив в Індокитаї"
  flavor_fra.430.desc: "Зі зростанням #L [ROOT.GetCountry.GetAdjective|l]ої#! присутності на сході [fra_ruler.GetName|l] та члени уряду почали виявляти інтерес до низки східних країн. Радники вважають, що [indochina_french_sphere.GetName] може стати цінним союзником, тому пропонують заснувати там посольство. Втім, дехто виступає проти цієї ідеї, запевняючи, що [indochina_french_sphere.GetFlavorRank|l] не заслуговує нашої уваги як рівноправний партнер. Замість цього вони закликають зробити з цієї країни [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий протекторат, щоб ще більше зміцнити наш вплив у регіоні."
  flavor_fra.430.a: "Заснуємо на території [indochina_french_sphere.Custom('CL_GEN')] посольство, щоб налагодити відносини."
  flavor_fra.430.b: "Встановимо контроль над [indochina_french_sphere.Custom('CL_INST')]."
  flavor_fra.431.title: "Єзуїтські місії на територію [GetCountry('CHI').Custom('CL_GEN')]"
  flavor_fra.431.desc: "[ROOT.GetCountry.GetName] та [GetCountry('CHI').GetName] вже давно налагодили дипломатичні відносини, проте [Select_CString(GetCountry('CHI').GetGovernment.GetRuler.IsFemale,'нинішня', 'нинішній')] [GetCountry('CHI').GetAdjectiveWithNoTooltip|l][Select_CString(GetCountry('CHI').GetGovernment.GetRuler.IsFemale,'а', 'ий')] [GetCountry('CHI').GetGovernment.GetRulerTitle|l] категорично забороняє іноземцям будь-яким чином втручатися в життя свого народу.\n\nПрагнучи поширити #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьке#!#! вчення, [target_character.GetName] просить, щоб [fra_ruler.GetName|l] [Select_CString(fra_ruler.IsFemale,'дозволила', 'дозволив')] [Select_CString(target_character.IsFemale,'їй', 'йому')] і невеликій групі єзуїтів проникнути на територію [GetCountry('CHI').Custom('CL_GEN')] під виглядом послів. У разі успіху ми зможемо долучити місцеве населення до істинної віри, але ця авантюра також може обернутися дипломатичним скандалом."
  flavor_fra.431.a: "Нехай [target_character.GetShortNameWithNoTooltip] шукає нових послідовників за кордоном!"
  flavor_fra.431.b: "Відкинемо цю ідею, щоб уникнути проблем."
  nothing_happens_with_jesuits: "Єзуїти проповідуватимуть мирно."
  flavor_fra.432.title: "[GetCountry('POR').GetAdjectiveWithNoTooltip][Select_CString(GetCountry('POR').GetGovernment.GetRuler.IsFemale,'а', 'ий')] [GetCountry('POR').GetGovernment.GetRulerTitle|l] підносить незвичайний подарунок"
  flavor_fra.432.desc: "У Версальському палаці приймали безліч впливових дипломатів з усіх куточків Європи, але цього разу [Select_CString(por_ruler.IsFemale,'сама', 'сам')] [GetCountry('POR').GetGovernment.GetRulerTitle|l] [GetCountry('POR').Custom('CL_GEN')] [Select_CString(por_ruler.IsFemale,'вшанувала', 'вшанував')] нас своїм візитом. Як жест доброї волі [por_ruler.GetName|l] та [Select_CString(por_ruler.IsFemale,'її', 'його')] делегація привезли з собою справжнісінького #TOOLTIP:CONTINENT,africa,X #L африканського#!#! #italic слона#!. У минулому ці неймовірні тварини вже бували в нашій країні, проте сьогодні [fra_ruler.GetName|l] та [Select_CString(fra_ruler.IsFemale,'її', 'його')] придворні вперше побачили дивовижного звіра на власні очі. [por_ruler.GetShortNameWithNoTooltip|l] висловлює надію, що цей подарунок для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого звіринця стане запорукою довгих і довірливих відносин між [ROOT.GetCountry.Custom('CL_INST')] та [GetCountry('POR').Custom('CL_INST')]."
  flavor_fra.432.a: "Виявимо належну гостинність і приймемо подарунок."
  flavor_fra.432.b: "Виявимо належну гостинність, але відмовимося від подарунка."
  flavor_fra.433.title: "Правління чотирьох рад"
  flavor_fra.433.desc: "[fra_ruler.GetName] збирається розподілити державні справи між чотирма радами, щоб #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! було зручніше справлятися з труднощами, що виникають перед країною. Найважливішу роль відіграватиме верховна рада, що займатиметься безпосередньо справами державної ваги. Рада з послань займатиметься питаннями економічного процвітання та іншими суміжними справами в провінціях. Релігійними справами завідуватиме рада совісті, а казною — королівська рада з фінансів."
  flavor_fra.433.a: "Заснувати систему чотирьох рад!"
  flavor_fra.433.b: "Нам не потрібно делегувати державні повноваження."
  flavor_fra.440.title: "[target_character.GetNameWithNoTooltip]"
  flavor_fra.440.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'проявила', 'проявив')] себе як справжній експерт у будівництві укріплень, тому [fra_ruler.GetName|l] вважає [Select_CString(target_character.IsFemale,'її своєю найближчою радницею', 'його своїм найближчим радником')] і просто добрим другом. [target_character.GetShortNameWithNoTooltip] вже має низку почесних звань, але багато радників переконані, що за військові таланти та заслуги [Select_CString(target_character.IsFemale,'її', 'його')] давно час удостоїти титулу маршала #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_fra.440.a: "Призначимо [Select_CString(target_character.IsFemale,'її', 'його')] маршалом!"
  flavor_fra.440.b: "[target_character.GetShortNameWithNoTooltip] і так володіє достатньою кількістю титулів та нагород."
  flavor_fra.441.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] військовий геній"
  flavor_fra.441.desc: "Отримавши посаду маршала, [target_character.GetName] [Select_CString(target_character.IsFemale,'почала', 'почав')] модернізувати укріплення в стратегічно важливих місцевостях #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [target_character.GetShortNameWithNoTooltip] знає все про сучасні методи захисту, а це означає, що [Select_CString(target_character.IsFemale,'вона', 'він')] також добре [Select_CString(target_character.IsFemale,'знайома', 'знайомий')] з устроєм фортець в інших країнах Європи. Ми можемо скористатися цим і доручити [Select_CString(target_character.IsFemale,'їй', 'йому')] вивчення методів обходу та прориву ворожої оборони."
  flavor_fra.441.a: "Потрібно взяти [Select_CString(target_character.IsFemale,'її', 'його')] ідеї на озброєння."
  flavor_fra.441.b: "Нові наступальні тактики важливіші за будівництво укріплень."
  flavor_fra.460.title: "Поширення перук"
  flavor_fra.460.desc: "Побоюючись, що народ вважатиме [Select_CString(fra_ruler.IsFemale, 'її', 'його' )] слабкою, [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'почала', 'носити' )] так звану #italic перуку#! — головний убір, що приховує раннє облисіння. Незабаром на це звернула увагу і публіка: сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вважає подібну витівку незвичайною, а завтра перші придворні вже приміряють власні перуки. Спроба приховати слабкість призвела до встановлення нової моди, і якщо вірити чуткам, які поширює [adopted_peruke_court.GetName], цвіт #L [adopted_peruke_court.GetAdjective]ого#! суспільства теж почав носити перуки."
  flavor_fra.460.a: "Змиритися з тим, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вже не повернеться до колишніх часів."
  flavor_fra.460.b: "Носити перуку має право лише [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] і лише за необхідності."
  flavor_fra.500.title: "Повернення до минулого"
  flavor_fra.500.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] дивиться в майбутнє не без тривоги: на престол #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(fra_ruler.IsFemale, 'зійшла', 'зійшов' )] [fra_ruler.GetName], чий попередник — [Select_CString(previous_ruler.IsFemale, 'велика правителька', 'великий правитель' )] [previous_ruler.GetName]. За життя [previous_ruler.GetShortNameWithNoTooltip] [Select_CString(previous_ruler.IsFemale, 'прагнула', 'прагнув' )] стати втіленням абсолютизму — одноосібним власником державної влади, і багато в чому [Select_CString(previous_ruler.IsFemale, 'їй', 'йому' )] це вдалося. Тепер же, коли [previous_ruler.GetShortNameWithNoTooltip] [Select_CString(previous_ruler.IsFemale, 'померла', 'помер' )], [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] хоче скористатися можливістю повернути собі втрачений вплив та обмежити владу, якою користується новий монарх — [fra_ruler.GetShortNameWithNoTooltip]. Великі стани, зрозуміло, також з нетерпінням чекають, коли в країні знову встановиться порушена в минулому рівновага."
  flavor_fra.500.a: "[ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip|U] у нашій країні будуватиметься на спільних зусиллях."
  flavor_fra.500.b: "Буде розумно, якщо [fra_ruler.GetShortNameWithNoTooltip] піде стопами попередника."
  flavor_fra.501.title: "[previous_ruler.GetNameWithNoTooltip] та абсолютистська спадщина"
  flavor_fra.501.desc: "[fra_ruler.GetName] вже досить довго займає престол, проте правління [Select_CString(fra_ruler.IsFemale, 'її', 'його' )] досі проходить у тіні [Select_CString(previous_ruler.IsFemale, 'великої попередниці', 'великого попередника' )] на ім'я [previous_ruler.GetName]. У спробі зосередити всю владу у своїх руках [previous_ruler.GetShortNameWithNoTooltip] [Select_CString(previous_ruler.IsFemale, 'кинула', 'кинув' )] виклик старому, давно вкоріненому в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! порядку, тому після [Select_CString(previous_ruler.IsFemale, 'її', 'його' )] смерті країна залишилася без надійного керівництва. [fra_ruler.GetShortNameWithNoTooltip] навряд чи незабаром втратить трон, тому радники, до яких [Select_CString(previous_ruler.IsFemale, 'прислухалася', 'прислухався' )] ще [previous_ruler.GetShortNameWithNoTooltip], пропонують йти стопами [Select_CString(previous_ruler.IsFemale, 'попередниці', 'попередника' )] і ще більше зміцнювати владу, якою зараз користуються [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]. Однак нові міністри, багато з яких прийшли до влади якраз після того, як на престол [Select_CString(fra_ruler.IsFemale, 'зійшла', 'зійшов' )] [fra_ruler.GetShortNameWithNoTooltip], навпаки, радять виявляти обережність, адже збереження існуючого стану речей — гарантія того, що ніхто не посягне на нову владу."
  flavor_fra.501.a: "Збережемо існуючий стан справ."
  flavor_fra.501.b: "Повернемо станам частину влади."
  flavor_fra.501.c: "Зміцнимо абсолютистські ідеали, яких [Select_CString(previous_ruler.IsFemale, 'дотримувалася', 'дотримувався' )] [previous_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.502.title: "[GetCountry('RUS').GetGovernment.GetRulerTitle|U] з [GetCountry('RUS').GetAdjectiveWithNoTooltip|l]их земель наносить візит"
  flavor_fra.502.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! готує [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий прийом: з #L [GetCountry('RUS').GetAdjective|l]ої#! країни до нас прибуває [rus_ruler.GetName], [Select_CString(rus_ruler.IsFemale, 'об'єжджаюча', 'об'їжджаючий' )] зараз #TOOLTIP:CONTINENT,europe,X #L Європу#!#!. [fra_ruler.GetName], бажаючи показати всю красу [ROOT.GetCountry.Custom('CL_GEN')], [Select_CString(fra_ruler.IsFemale, 'підготувала', 'підготував' )] з цієї нагоди збірник карт, складених найретельнішим чином: [GetCountry('RUS').GetGovernment.GetRulerTitle|l] землі [GetCountry('RUS').GetAdjectiveWithNoTooltip|l]ої має слабкість до картознавства, а тому неодмінно виявить інтерес. Крім того, [fra_ruler.GetShortNameWithNoTooltip] разом з радниками сподівається таким чином заслужити довіру гостя та зміцнити відносини [GetCountry('RUS').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('RUS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('RUS').Custom('CL_tt')],X [GetCountry('RUS').Custom('CL_INST')|L]#!#!."
  flavor_fra.502.a: "Влаштуємо славний бенкет, якого [GetCountry('RUS').GetGovernment.GetRulerTitle|l] не забуде ніколи!"
  flavor_fra.502.b: "Постараємося покращити відносини з [GetCountry('RUS').Custom('CL_INST')], але будемо виявляти обережність."
  flavor_fra.502.c: "Підготуємо прощальну записку — нехай [GetCountry('RUS').GetAdjectiveWithNoTooltip|l][Select_CString(GetCountry('RUS').GetGovernment.GetRuler.IsFemale, 'а', 'ий' )] [GetCountry('RUS').GetGovernment.GetRulerTitle|l] захопиться її стилем."
  flavor_fra.503.title: "[target_character.GetNameWithNoTooltip] та [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_fra.503.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] вельми цінує свого близького радника: [target_character.GetName] служить володарю вірою і правдою з перших днів правління, а [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] постійно захоплюється його здібностями та талантами. Думка про цю людину настільки висока, що [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'вирішила', 'вирішив' )] пожалувати йому посаду старшого міністра. [target_character.GetNameWithNoTooltip] не проявляє будь-яких особистих прагнень — замість цього він ділиться з нами своїми задумами щодо управління #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! в уже насталу епоху ідеалів."
  flavor_fra.503.a: "Ми дослухаємося до його порад."
  fleury_additional_dhe: "Оскільки [target_character.GetNameWithNoTooltip] тепер старший міністр, у країні можуть відбуватися додаткові [Concept('dynamic_historical_events', 'динамічні історичні події')|e]."
  fleury_ministry_bonus: "Поки [target_character.GetNameWithNoTooltip] не помре, діятиме наступний модифікатор."
  flavor_fra.504.title: "Карта Кассіні"
  flavor_fra.504.desc: "[target_artist.GetName] — виходець із родини землемірів — хоче, щоб [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] та [fra_ruler.GetName] доручили йому завдання скласти велику рельєфну карту #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [target_artist.GetShortNameWithNoTooltip] може похвалитися не лише особистими успіхами на ниві картографії: своїм відповідальним підходом до цього заняття відома і його родина. Якщо доручити йому нанести на папір рельєф [ROOT.GetCountry.Custom('CL_GEN')], ми можемо досягти багато чого: по-перше, наша країна почне користуватися глибшою повагою на світовій арені, по-друге, у нашому розпорядженні з'явиться докладна карта стратегічно важливих для країни місцевостей."
  flavor_fra.504.a: "Нехай [target_artist.GetShortNameWithNoTooltip] складе нам велику карту!"
  flavor_fra.504.b: "Таке замовлення напевно виявиться занадто дорогим."
  flavor_fra.505.title: "Розширення Коледжу [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_fra.505.desc: "[fra_ruler.GetName] — людина, з ранніх літ небайдужа до наук і тому висуває сміливу ідею: нехай [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вкладе кошти у створення нових кафедр у #italic Коледжі [ROOT.GetCountry.Custom('CL_GEN')]#!. Цей навчальний заклад, що користується чималою славою не лише серед жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, а й по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!, останнім часом відчуває труднощі з фінансами.\n\nЯкщо [fra_ruler.GetNameWithNoTooltip] доб'ється виділення грошей, зв'язки між Коледжем і країною стануть міцнішими, а сам заклад зможе здобути нове життя."
  flavor_fra.505.a: "Виділити кошти на Коледж [ROOT.GetCountry.Custom('CL_GEN')]!"
  flavor_fra.505.b: "Спрямувати виділені гроші до скарбниці [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого уряду."
  college_may_request_more_funds: "Буде заснована кафедра фізики, що дає бонус до досліджень. У майбутньому Коледж [ROOT.GetCountry.Custom('CL_GEN')] може знову запросити кошти. "
  flavor_fra.506.title: "Коледж [ROOT.GetCountry.Custom('CL_GEN')] запитує додаткові кошти"
  flavor_fra.506.desc: "Після того як [fra_ruler.GetName] [Select_CString(fra_ruler.IsFemale, 'виділила', 'виділив' )] гроші на підтримку Коледжу [ROOT.GetCountry.Custom('CL_GEN')], той значно розширився — зокрема, керівництво заснувало кілька нових кафедр. Однак тепер ректори просять, щоб [fra_ruler.GetShortNameWithNoTooltip] знову [Select_CString(fra_ruler.IsFemale, 'призначила', 'призначив' )] їм кошти. На ці гроші пропонується заснувати, зокрема, кафедру класичної механіки — сфери науки, яку вельми поважає [fra_ruler.GetShortNameWithNoTooltip]."
  flavor_fra.506.a: "Надати Коледжу [ROOT.GetCountry.Custom('CL_GEN')] чергове фінансування."
  flavor_fra.506.b: "Ми вже виділили все, що могли."
  flavor_fra.507.title: "[target_artist.GetNameWithNoTooltip] стимулює економіку"
  flavor_fra.507.desc: "[ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] вважає, що державні фінанси перебувають у плачевному стані, а тому в надії запобігти майбутній фінансовій катастрофі надсилає запити кільком видатним #TOOLTIP:CONTINENT,europe,X #L європейським#!#! економістам. Найбільш багатообіцяючим серед них вважається [target_artist.GetName].\n\n[target_artist.GetLastNameWithNoTooltip] хоче перекроїти всі уявлення про державну валюту, а тому проводить політику, спрямовану на поліпшення фінансового становища #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, хоча у віддаленому майбутньому такий різкий підхід може виявитися навіть шкідливим."
  flavor_fra.507.a: "Нехай [target_artist.GetLastNameWithNoTooltip] візьме управління на себе!"
  flavor_fra.507.b: "Його ідеї принесуть нам тільки крах!"
  john_law_dhe_events: "Відкриває [Concept('dynamic_historical_events', 'динамічні історичні події')|e], що стосуються персонажа [target_artist.GetNameWithNoTooltip]."
  john_law_joins_france_and_bank: "[target_artist.GetNameWithNoTooltip] почне переглядати фінансову політику [ROOT.GetCountry.Custom('CL_GEN')] на посаді генерального контролера фінансів."
  flavor_fra.508.title: "Banque Générale"
  flavor_fra.508.desc: "[target_artist.GetName] у своєму абсолютно новому підході до фінансової політики засновує #italic Banque Générale#! — приватний банк, кошти на який виділяє і [target_artist.GetLastNameWithNoTooltip], і [fra_ruler.GetName]. На відміну від інших банків, він випускатиме #italic паперову валюту#! замість звичних металевих монет.\n\nІ хоча [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] висловлює деякі сумніви, Banque Générale цілком успішно приваблює вкладників. Під мудрим управлінням, яке демонструє [target_artist.GetLastNameWithNoTooltip], вони обмінюють золото на нову валюту. І хоча на якийсь час це полегшило фінансові тяготи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, деякі радники вважають, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вчинить правильно, ставлячись до банку з обережністю."
  flavor_fra.508.a: "Пожнемо плоди створення Banque Générale."
  flavor_fra.508.b: "Прислухаємося до радників: [target_artist.GetLastNameWithNoTooltip] доведе нас до того, що ми будемо надмірно покладатися на банк."
  john_law_bank_risk: "Надмірні вклади в банк підвищують ризик його краху. У цьому випадку постраждають і фінанси [ROOT.GetCountry.Custom('CL_GEN')], що відновлюються."
  john_law_bank_more_direct: "Зниження надмірної залежності від банку зменшить втрати, які ми понесемо в разі його краху."
  flavor_fra.509.title: "Banque Générale вкладається в колонії"
  flavor_fra.509.desc: "Banque Générale незмінно вабить до себе і вкладників, і позичальників, які прагнуть обміняти металеві монети та золото на зручну паперову валюту. Сьогодні цей банк не тільки користується чималим впливом — він, як і просив [target_artist.GetName], націоналізований. Після цього кроку до Banque Générale потягнулися нові вкладники, охочі придбати акції торгових компаній наших колоній. [target_artist.GetNameWithNoTooltip] стверджує, що це черговий доказ дієвості його політики, проте не всі радники поділяють цю думку: деякі вважають, що, якщо банк впаде, разом з ним крах спіткає і процвітаючі сьогодні торгові компанії в колоніях."
  flavor_fra.509.a: "Дозволити продовжувати торгівлю акціями компаній."
  flavor_fra.509.b: "Обмежити можливості банку впливати на торгові компанії в колоніях."
  john_law_colonial_risk: "Стрімко розвивається економіка торгових компаній, що примножить загальне багатство колоній, проте крах банку може призвести до руйнівних наслідків."
  law_monopoly_restricted: "Якщо банк збанкрутує, колонії зазнають менше шкоди."
  flavor_fra.510.title: "Banque Générale приносить вигоду"
  flavor_fra.510.desc: "З моменту свого заснування Banque Générale показує безперервне зростання, а разом з цим стрімко наповнюється скарбниця #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Завдяки мудрій фінансовій політиці, яку веде [target_artist.GetName], банк став широко відомий у всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#! і навіть почав привертати увагу багатої знаті. Багато хто з цих людей захотів вкласти свої кошти в процвітаючі торгові компанії Нового Світу і почали купувати акції на паперову валюту Banque Générale. Очевидно, побоювання радників, що [target_artist.GetNameWithNoTooltip] вдається до небезпечних методів, виявилися безпідставними."
  flavor_fra.510.a: "Нехай [ROOT.GetCountry.GetNameWithNoTooltip] і далі процвітає завдяки цій політиці!"
  bank_yields_benefits_for_now: "Завдяки політиці, яку веде [target_artist.GetNameWithNoTooltip], [ROOT.GetCountry.GetNameWithNoTooltip] відновлюється після майже повного економічного колапсу. Надмірна залежність від Banque Générale, втім, у майбутньому може призвести до катастрофи."
  flavor_fra.511.title: "Крах Banque Générale"
  flavor_fra.511.desc: "[target_artist.GetName] — людина, завдяки якій у нашій країні почала помітно зміцнюватися економіка. Однак в останні кілька тижнів все змінилося: Banque Générale зазнав несподіваного краху, і тепер [ROOT.GetCountry.GetName] перебуває в цілковитому економічному занепаді. Процвітання банку на фоні інвестицій у колонії та впровадження паперової валюти тривало лише кілька років. Несподіваний підйом попиту на папір призвів до того, що урядові закупівлі цього товару стали занадто витратними. Оскільки обмінювати стару валюту на нову паперову стало складніше, цінність акцій пішла вниз, що й призвело до краху. Наслідки цього відчули на собі й колонії — багато з розташованих там торгових компаній сильно залежали від вкладників банку.\n\nТепер міністри [ROOT.GetCountry.Custom('CL_GEN')] поспішно намагаються хоч якось виправити ситуацію, а людина, відповідальна за все це, — [target_artist.GetNameWithNoTooltip], — безслідно зникла."
  flavor_fra.511.a: "[target_artist.GetLastNameWithNoTooltip] призводить країну до занепаду!"
  flavor_fra.511.b: "[target_artist.GetLastNameWithNoTooltip] заслуговує на критику. Наше обережне ставлення до його політики допоможе налагодити ситуацію."
  flavor_fra.512.title: "[target_character.GetNameWithNoTooltip] і наслідки [Select_CString(target_character.IsFemale, 'її', 'його' )] діяльності"
  flavor_fra.512.desc: "[target_character.GetName] став вигнанцем: вся його економічна політика зазнала цілковитого провалу, свідченням чого — крах Banque Générale. Деякі радники вже закликають негайно відправити цю людину у відставку, проте справа ускладнюється тим, що [target_character.GetLastNameWithNoTooltip] кудись зник — його не бачили ні члени двору, ні [fra_ruler.GetName]. Навіть ретельний обшук особистої резиденції не виявив жодних слідів. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] одноголосно вважає, що [target_character.GetLastNameWithNoTooltip] втік з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, побоюючись відплати за свою невдалу політику.\n\nТепер [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] видає указ: вилучити все майно та маєтки втікача [ROOT.GetCountry.Custom('predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')], оскільки [target_character.GetNameWithNoTooltip] відтепер вважається злочинцем."
  flavor_fra.512.a: "Можливо, [target_character.GetLastNameWithNoTooltip] зможе хоч якось з нами розплатитися своїм майном."
  flavor_fra.520.title: "Булла Unigenitus та янсенізм"
  flavor_fra.520.desc: "[GetCountry('FRA').GetGovernment.GetPreviousRuler.GetName] просить допомогти в боротьбі з янсенізмом, що поширюється, — і [pap_ruler.GetName] відповідає прийняттям булли Unigenitus в надії притиснути до нігтя прихильників вчення Святого Августина. Але хоча після цієї події минуло вже багато років, до янсенізму приєднуються все нові прихильники. Цьому сприяє і те, що [GetCountry('FRA').GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] давно вже спочиває в землі, і те, що булла не була офіційно прийнята як закон #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Сьогодні, коли на престолі сидить [fra_ruler.GetName], рух янсеністів і не думає зупинятися. Однак зрослий тиск з боку міністрів, незадоволених цією єрессю, призвів до відновлення дискусій про затвердження булли як закону — хоча зараз це буде непросто, враховуючи чисельність янсеністів."
  flavor_fra.520.a: "Настав час визначити, яким статусом Unigenitus користуватиметься всередині [ROOT.GetCountry.Custom('CL_GEN')]."
  janseism_unigenitus_conflict_events_wilL_occur: "Відкриває [Concept('dynamic_historical_events', 'динамічні історичні події')|e], що стосуються папської булли Unigenitus та релігійного конфлікту з янсеністами."
  flavor_fra.521.title: "Зречення від янсенізму"
  flavor_fra.521.desc: "Після того як у країні знову дозволили вести дискусії про прийняття булли Unigenitus як закону #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], в особі радників, що не переносять янсенізм, починає відкрито засуджувати цей рух. Відповіддю на це став сплеск невдоволення янсеністів, багато з яких користуються великим впливом серед членів [ROOT.GetCountry.GetParliament.Custom('parliament_ru_GEN')|l]. За обстановкою [ROOT.GetCountry.Custom('end_predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')] уважно стежить [pap_ruler.GetName], тому жорстка боротьба проти прихильників булли Unigenitus напевно викличе у папського престолу гнів. З іншого боку, якщо дозволити радникам-підбурювачам і далі висловлюватися в тому ж дусі, невдоволення проявиться вже в стінах [ROOT.GetCountry.GetParliament.Custom('parliament_ru_GEN')|l], серед прихильників янсенізму."
  flavor_fra.521.a: "Стати на бік поборників Unigenitus."
  flavor_fra.521.b: "З презирством поставитися до поборників Unigenitus, щоб умиротворити янсеністів."
  flavor_fra.522.title: "Податок cinquantième"
  flavor_fra.522.desc: "Поборники Unigenitus, твердо налаштовані продовжувати боротьбу з янсенізмом, розробили новий податок на той випадок, якщо булла все-таки буде прийнята в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! як закон. Податок, що отримав назву #italic «cinquantième»#! («п'ятдесята частина»), поширюватиметься на всіх, кого застануть за читанням священних янсеністських текстів — #italic Nouvelles Ecclésiastiques#!: вони будуть зобов'язані виплатити країні солідну мито. Крім того, платити #italic cinquantième#! доведеться всім релігійним діячам, звільненим від податків, але які мають відношення до янсенізму.\n\nЯкщо булла Unigenitus стане законом, такий податок принесе країні виключно шкоду, оскільки янсеністи почнуть зневажати [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
  flavor_fra.522.a: "Погодитися ввести податок разом з Unigenitus."
  flavor_fra.522.b: "Відкрито виступити проти податку."
  cheapter_to_enact_unigenitus: "Якщо Unigenitus виявиться прийнята як закон, податок cinquantième буде відображений у буллі."
  period_of_stability_when_declining_unigenitus: "Відмова приймати указ Unigenitus призведе до значного підвищення стабільності."
  flavor_fra.523.title: "Заперечення серед прихильників галліканства"
  flavor_fra.523.desc: "Багато прихильників галліканства в уряді, які виступають за певну незалежність #L [ROOT.GetCountry.GetAdjective|l]ої#! #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви від #TOOLTIP:GOVERNMENT_REFORM,papacy_reform,X #L Святого Престолу#!#!, засуджують підтримку Unigenitus і відкрито висловлюють симпатію до янсеністів: вони вважають, що прийняття Unigenitus лише зміцнить вплив папи римського на [ROOT.GetCountry.Custom('rank_ru_ACC')|l]. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U]-галлікани дали зрозуміти, що в майбутньому, якщо [ROOT.GetCountry.GetNameWithNoTooltip] все-таки прийме Unigenitus як закон, вони і [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] опиняться по різні боки барикад."
  flavor_fra.523.a: "Нам слід остерігатися галліканців."
  flavor_fra.523.b: "Поки що підемо їм назустріч. Доля булли Unigenitus залишиться під питанням."
  gallicans_in_clergy_will_oppose_crown: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U]-галлікани виступатимуть проти стану «[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l]», але їхній вплив ослабне."
  avoids_gallican_ire_unless_unigenitus_implemented: "Галлікани не стануть виступати проти стану «[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l]», однак прийняття Unigenitus як закону викличе гнів прихильників галліканства."
  flavor_fra.524.title: "Указ Unigenitus"
  flavor_fra.524.desc: "Прихильники булли Unigenitus, яким постійно чинять перешкоди янсеністи, що засідають у Генеральних штатах, підготували новий указ у надії, що [fra_ruler.GetName] його прийме. Цей указ, що повністю повторює принципи, яким [Select_CString(pap_ruler.IsFemale, 'слідувала', 'слідував' )] [pap_ruler.GetName], передбачає не тільки заборону янсенізму в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!, а й певні заходи щодо відомих янсеністів, наприклад податок на майно, що має відношення до їхнього вчення.\n\nЯкщо [fra_ruler.GetShortNameWithNoTooltip] підпише указ, янсеністи, що залишилися в [ROOT.GetCountry.Custom('CL_PREP')], поза всяких сумнівів, піднімуть ропот, однак таким кроком [fra_ruler.GetShortNameWithNoTooltip] лише ще більше зміцнить свій вплив."
  flavor_fra.524.a: "Прийняти указ Unigenitus!"
  flavor_fra.524.b: "Не приймати указ. Не слід розхитувати [ROOT.GetCountry.Custom('CL_ACC')]!"
  flavor_fra.530.title: "Скорочення витрат на [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий флот"
  flavor_fra.530.desc: "Флот #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, колись досить великий, щоб на рівних змагатися з флотами інших країн, за останні десятиліття занепав. [target_character.GetName], усвідомлюючи, що у військовій машині [ROOT.GetCountry.Custom('CL_GEN')] з'явилася слабка ланка, а простір для вдосконалення майже вичерпаний, пропонує скоротити майбутні витрати на флот і перерозподілити зекономлені кошти на користь якогось комерційного починання. Можна навіть вчинити сміливіше і скасувати всі поточні військово-морські роботи, зосередившись замість цього на морській торгівлі.\n\nІ хоча у цієї затії очікувано знайшлися противники, в чомусь [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'права', 'прав' )]: зекономлені на флоті гроші можна направити на вдосконалення сухопутних військ [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_fra.530.a: "[target_character.GetLastNameWithNoTooltip] говорить правильно: скоротимо флот!"
  flavor_fra.530.b: "[target_character.GetLastNameWithNoTooltip] помиляється. Потрібно розширювати флот!"
  flavor_fra.531.title: "[philip_orry.GetNameWithNoTooltip] зводить бюджет"
  flavor_fra.531.desc: "[philip_orry.GetName] зараз займається нелегкою справою відновлення економіки країни, що значно постраждала від нерозумної політики, яку вів [john_law.GetName], та корупції його наступника на посаді генерального контролера фінансів. Втім, новий генеральний контролер, якого [Select_CString(target_character.IsFemale, 'призначила', 'призначив' )] особисто [target_character.GetName], — знаючий економіст і гідно справляється з труднощами; стараннями цієї людини вперше за довгий час навіть вдалося звести бюджет #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Але задоволені далеко не всі: [philip_orry.GetLastNameWithNoTooltip] [Select_CString(philip_orry.IsFemale, 'зробила', 'зробив' )] податковий кодекс [ROOT.GetCountry.Custom('CL_GEN')] справедливішим, але одночасно з цим знову [Select_CString(philip_orry.IsFemale, 'встановила', 'встановив' )] #italic податок «dixieme»#! («десятина»). На вулицях #TOOLTIP:LOCATION,paris,X #L Парижа#!#! піднялися бунти.\n\nЩоб заспокоїти незадоволених, радники пропонують знизити чинний податок, хоча в такому разі постраждають економічні перспективи на найближчі кілька років — особливо з огляду на те, що у своїх реформах [philip_orry.GetLastNameWithNoTooltip] спирається переважно на «десятину»."
  flavor_fra.531.a: "Нехай [philip_orry.GetLastNameWithNoTooltip] і далі стягує свій податок. Народ заспокоїться сам."
  flavor_fra.531.b: "Ми переглянемо податок. Не можна, щоб бунти посилилися."
  flavor_fra.532.title: "[target_character.GetLastNameWithNoTooltip] будує національну дорожню мережу"
  flavor_fra.532.desc: "Справи в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! йдуть вгору, і [target_character.GetName] вирішує вкласти кошти в амбітний проєкт, що передбачає модернізацію та перевлаштування доріг, а також створення національної дорожньої мережі. Для цього потрібно багато робочих рук, і [Select_CString(target_character.IsFemale,'вона', 'він')] просить дозволу примусово використовувати селянську працю. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')], звісно, будуть не в захваті: за останні десятиліття вони пережили багато тягот, і їхнє ставлення до країни різко зіпсується. Однак деяким членам ради цей проєкт припав до душі, і вони вважають, що ми повинні задовольнити це прохання."
  flavor_fra.532.a: "[target_character.GetLastNameWithNoTooltip] пропонує вартий проєкт. Ми згодні."
  flavor_fra.532.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] будуть незадоволені. Для них це буде занадто важкий тягар."
  if_fleury_dies_road_network_change: "Якщо [target_character.GetLastNameWithNoTooltip] помре, модифікатор «[ShowModifier('fra_fleury_national_road_project')]» зміниться на «[ShowModifier('fra_fleury_national_road_project_legacy')]»."
  flavor_fra.533.title: "[target_character.GetLastNameWithNoTooltip] розвиває комерційну торгівлю"
  flavor_fra.533.desc: "Протягом свого правління [target_character.GetName] [Select_CString(target_character.IsFemale,'вкладала', 'вкладав')] багато сил у розвиток комерційної торгівлі та [Select_CString(target_character.IsFemale,'добилася', 'добився')] значних успіхів. По-перше, [Select_CString(target_character.IsFemale,'вона скоротила', 'він скоротив')] фінансування військово-морського флоту, а звільнені кошти [Select_CString(target_character.IsFemale,'вклала', 'вклав')] у морську торгівлю. В результаті обсяг торгівлі між [ROOT.GetCountry.Custom('CL_INST')] та іншими країнами значно зріс. Крім того, проєкт зі створення національної дорожньої мережі зі зручними та сучасними торговими шляхами підштовхнув міжконтинентальну торгівлю."
  flavor_fra.533.a: "[target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'привела', 'привів')] [ROOT.GetCountry.Custom('CL_ACC')] до успіху!"
  flavor_fra.533.b: "[ROOT.GetCountry.Custom('CL_ACC')] чекає процвітання."
  flavor_fra.534.title: "Смерть [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.534.desc: "[fra_ruler.GetName] отримав сумну звістку: [Select_CString(target_character.IsFemale, 'померла його особиста радниця', 'помер його особистий радник' )] та головний міністр [target_character.GetLastName], прослуживши йому вірою і правдою багато десятиліть. Поки [fra_ruler.GetShortNameWithNoTooltip|l] та його найближчі радники віддаються скорботі, інші зайнялися пошуками кандидатів на посаду головного міністра.\n\n[target_character.GetLastNameWithNoTooltip] більше не з нами, але багато [Select_CString(target_character.IsFemale, 'її', 'його' )] протеже встигли добре зарекомендувати себе при дворі і без сумніву стануть гідними наступниками. [fra_ruler.GetShortNameWithNoTooltip] може вибрати одного з них або ж зовсім не призначати головного міністра."
  flavor_fra.534.a: "Поки [ROOT.GetCountry.GetNameWithNoTooltip] залишиться без головного міністра."
  flavor_fra.534.b: "Зростання довіри до ради після смерті [target_character.GetLastNameWithNoTooltip]"
  flavor_fra.540.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]а інженерна школа в Мезьєрі"
  flavor_fra.540.desc: "При #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі з'явилася нова впливова фігура — [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона', 'Він')] пропонує створити [ROOT.GetCountry.GetGovernment.GetAdjective|l]у школу інженерії в Мезьєрі — місті в [ShowLocationName('chateau_porcien')]. За задумом, у цій школі повинні готувати військових та цивільних інженерів, і її відкриття стане справжнім проривом. Однак на реалізацію проєкту піде багато коштів."
  flavor_fra.540.a: "Ця школа випустить нове покоління талановитих інженерів!"
  flavor_fra.540.b: "Ми побудуємо школу, а [target_character.GetLastNameWithNoTooltip] отримає підвищення!"
  flavor_fra.540.c: "Ми не можемо дозволити собі такі витрати."
  flavor_fra.541.title: "Військова школа"
  flavor_fra.541.desc: "[fra_ruler.GetName] ратує за подальшу модернізацію війська та пропонує заснувати нову військову академію в шкільному окрузі #TOOLTIP:LOCATION,paris,X #L Парижа#!#!. Тут виховуватиметься нове покоління #L [ROOT.GetCountry.GetAdjective|l]их#! офіцерів, навчених #TOOLTIP:CULTURE,$prussian_tt$,X #L прусській#!#! військовій тактиці. [fra_ruler.GetShortNameWithNoTooltip] сподівається, що ця школа підвищить військову репутацію [ROOT.GetCountry.Custom('CL_GEN')] в #TOOLTIP:CONTINENT,europe,X #L Європі#!#!."
  flavor_fra.541.a: "Заснувати академію!"
  flavor_fra.541.b: "Наша військова модель найкраща. Подвоїмо витрати на утримання військ!"
  flavor_fra.542.title: "[ShowLawNameWithNoTooltip('fra_5_percent_tax')] обурює місцеві парламенти"
  flavor_fra.542.desc: "Багато місцевих парламентів виступають проти #TOOLTIP:LAW,fra_5_percent_tax,X #L п'ятивідсоткового податку Машо#!#! та відмовляються вводити його у своїх провінціях. Хоча [ROOT.GetCountry.GetGovernment.GetParliament.GetName] теж спочатку був проти закону, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вмовила', 'вмовив')] багатьох його членів проголосувати за податок, який пропонує [target_character.GetLastNameWithNoTooltip].\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] може розпустити місцеві парламенти та підпорядкувати чиновників безпосередньо країні, але [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], які не підтримали новий податок, будуть не в захваті від цієї ініціативи. Ба більше — вона підірве їхню довіру до країни."
  flavor_fra.542.a: "Розпустити парламенти!"
  flavor_fra.542.b: "Скасуємо закон."
  flavor_fra.543.title: "Утиски єзуїтів"
  flavor_fra.543.desc: "Протягом століть єзуїти чудово почувалися у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!, але останніми роками [ROOT.GetCountry.GetGovernment.GetParliament.GetName|l] точить на орден зуб, а [fra_ruler.GetName] не може приховати свого розчарування. Проте єзуїти керують деякими відомими та успішними коледжами [ROOT.GetCountry.Custom('CL_GEN')], і [fra_ruler.GetShortNameWithNoTooltip] [Select_CString(fra_ruler.IsFemale,'стурбована', 'стурбований')] зростанням їхнього впливу. Крім того, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] ніяк не можуть впливати на орден.\n\nНаші союзники з Генеральних штатів пропонують вигнати єзуїтів з [ROOT.GetCountry.Custom('CL_GEN')], і немає сумнівів, що цей захід підтримають. Однак це викличе невдоволення в [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій родині, оскільки багато її членів, зокрема [scope_heir_fra.GetName], є затятими прихильниками ордену."
  flavor_fra.543.a: "Потрібно приструнити єзуїтів, що зарвалися!"
  flavor_fra.543.b: "Єзуїти, як і раніше, багато роблять для [ROOT.GetCountry.Custom('CL_GEN')]. Вигнати їх немислимо!"
  some_in_royal_household_will_oppose: "Деякі члени [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої родини не підтримають утисків єзуїтів."
  flavor_fra.544.title: "Розлад у [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій родині через заборону ордену єзуїтів"
  flavor_fra.544.desc: "[Select_CString(scope_heir_fra.IsFemale,'Віддана прихильниця', 'Відданий прихильник')] єзуїтів [scope_heir_fra.GetName] глибоко [Select_CString(scope_heir_fra.IsFemale,'вражена', 'вражений')] тим, що [fra_ruler.GetName] [Select_CString(scope_heir_fra.IsFemale,'вигнала', 'вигнав')] їх з країни, а [consort_fra.GetName] намагається заручитися підтримкою ради в надії скасувати закон. У [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій родині стався серйозний розкол, але вплив єзуїтів у [ROOT.GetCountry.Custom('CL_PREP')] вже знизився, а багато з них у паніці покинули країну."
  flavor_fra.544.a: "Рано чи пізно буря вщухне."
  flavor_fra.544.b: "Краще піти на компроміс і наділити владою єзуїтів, що залишилися."
  flavor_fra.550.title: "Відкриття Лувру"
  flavor_fra.550.desc: "Лувр — один з численних палаців, де проживали #TOOLTIP:GOVTYPE,monarchy,X #L монархи#!#! минулих часів — колись слугував місцем зберігання #L [ROOT.GetCountry.GetAdjective|l]ої#! королівської колекції. І оскільки #italic Ancien régime#! сьогодні вже пережиток минулого, дехто вважає, що Лувр гідний знову стати культурною перлиною #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Минули ті часи, коли культура нашої великої держави була доступна лише купці старих аристократів — нехай [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip|l] вільно милується нашим багатовіковим спадком!"
  flavor_fra.550.a: "Відкрити Луврський палац для публіки, що бажає перейнятися культурою!"
  flavor_fra.550.b: "Краще залишити Лувр зачиненим."
  joan_of_arc_may_lead_tt: "[joan_of_arc.GetName] зможе очолювати війська!"
  joan_of_arc_disappears_tt: "[joan_of_arc.GetName] кане в безвість"
  marcel_will_now_oppose_the_crown: "Етьєн Марсель стане активніше виступати проти корони"
  marcel_loses_support_for_murder: "Через вбивство знаті Марсель втратив не тільки підтримку духовенства та знаті, а й більшу частину свого політичного впливу."
  routiers_can_raid_nearby_locations: "Рутьєри можуть почати влаштовувати набіги на сусідні провінції!"
  fra_annexing_appanages_moves_towards_centralize: "За кожен приєднаний [Concept('subject', 'апанаж')|e] наші [Concept('societal_values', 'суспільні цінності')|e] зрушать на 5 од. у бік централізації, але апанажі, що залишилися, знизять свою [Concept('opinion', 'думку')|e] про нас на 25 од."
  fra_how_to_remove_feudal_nobility_info: "Якщо у нас не залишиться [Concept('subjects', 'апанажів')|e], [Concept('government_reform', 'державний принцип')|e] «Французькі феодали» буде видалено."
  fra_aggression_towards_burgundy: "Влада [GetCountry('BUR').Custom('CL_GEN')] набула достатньо територій та впливу, щоб їхня країна вважалася незалежною, однак в очах наших ленників це, як і раніше, французький васал. Якщо ми будемо проявляти агресію проти [GetCountry('BUR').Custom('CL_GEN')], відносини всіх ленників з нами погіршаться на 33 од."
  fra_neutrality_towards_burgundy: "Влада [GetCountry('BUR').Custom('CL_GEN')] набула достатніх територій та впливу, щоб їхня країна вважалася незалежною від [GetCountry('FRA').Custom('CL_GEN')]."
  appanages_can_now_take_public_weal_reform: "Тепер апанажі можуть прийняти принцип «Член Ліги суспільного блага». Непокірні апанажі більш схильні приєднатися до Ліги."
  more_than_six_will_trigger_war: "Якщо до Ліги приєднаються більше 5 апанажів, то [ROOT.GetCountry.GetGovernment.GetAdjective]ий [ROOT.GetCountry.GetGovernment.GetCourtTitle] і Ліга можуть розпочати боротьбу за владу."
  league_demands_accepted_fra: "Мирне рішення дозволить уникнути кровопролиття, але значно знизить наш рівень централізації."
  league_demands_rejected_fra: "Між короною та Лігою розпочнеться війна. Якщо ми здобудемо перемогу, це значно підвищить наш рівень централізації."
  public_weal_will_disband: "Ліга суспільного блага розпущена і більше не становить загрози для #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!."
  weal_members_bonus_and_appanage_autonomy: "Рівень централізації #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! буде значно знижений, а всі члени Ліги на 15 років отримають переваги від державного принципу «Член Ліги суспільного блага»."
  weal_members_weakened_royalist_integration_boost: "Швидкість інтеграції та вірність наших ленників будуть значно підвищені."
  jeanne_d_arc_will_face_trial: "[joan_of_arc.GetName] постане перед #L [GetCountry('ENG').GetAdjective|l]им#! судом за звинуваченням у єресі."
  jeanne_d_arc_will_trouble_us_no_further: "[joan_of_arc.GetName] буде страчена за звинуваченням у єресі!"
  random_joan_of_arc_or_executed: "[GetCountry('FRA').GetName] отрим[GetCountry('FRA').Custom('end_itat')] пропозицію про викуп полонянки. У разі відмови [joan_of_arc.GetName] буде страчена."
  legitimacy_penalty_with_english_advancements: "Поки значна частина #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! перебуває під контролем #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!, легітимність [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их правителів буде знижена."
  reduced_legitimacy_penalty_but_prestige_hit: "Знижує штраф до легітимності за території #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! під контролем #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!, але додає штраф до престижу."
  french_succession_no_longer_contested: "Боротьба за #L [GetCountry('FRA').GetAdjective|l]ий#! престол припиниться."
  english_appeasement_reduced_reward_tt: "Зменшує переваги при згоді з #L [GetCountry('ENG').GetAdjective|l]ими#! домаганнями на [GetCountry('FRA').Custom('CL_ACC')]."
  fra_may_enact_bourges_sanctions: "Прагматична санкція буде скасована, але в разі погіршення відносин з папством її можна буде видати знову."
  unlocks_formalize_relations_action: "Відкриває [Concept('diplomatic_action', 'дипломатичну дію')|e] «[Concept('country_interaction', 'Формалізація відносин')|e]» стосовно #TOOLTIP:CULTUREGROUP,italian_group,X #L італійських#!#! країн."
  has_unlocks_formalize_relations_action: "Відкрито [Concept('diplomatic_action', 'дипломатичну дію')|e] #TOOLTIP:COUNTRY_INTERACTION,formalize_relations,X #L «Формалізація відносин»#!#! в ході [Concept('dynamic_historical_event', 'динамічної історичної події')|e] країни $flavor_fra.2100.t$."
  every_independent_italian_state_loses_opinion: "Наші відносини з усіма #TOOLTIP:CULTUREGROUP,italian_group,X #L італійськими#!#! країнами значно погіршаться. Стосовно союзних країн штраф буде меншим."
  formalize_disabled_tt: "[Concept('diplomatic_action', 'Дипломатична дія')|e] #TOOLTIP:COUNTRY_INTERACTION,formalize_relations,X #L «Формалізація відносин»#!#! більше #R не буде доступна#!."
  withdraw_opinion_penalty_increase: "Наші відносини з усіма #TOOLTIP:CULTUREGROUP,italian_group,X #L італійськими#!#! країнами погіршаться, але завдяки мирному виведенню військ штраф буде знижений."
  bonuses_will_be_lost_if_broken: "Якщо влада #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! вийде з унії з #ONCLICK:COUNTRY,[GetCountry('NAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NAP').Custom('CL_tt')],X [GetCountry('NAP').Custom('CL_INST')|L]#!#!, ці переваги будуть втрачені."
  league_of_weal_joiners: "[league_member_ruler.GetCountry.GetName] приєдна[league_member_ruler.GetCountry.Custom('end_itat')]ся до війни на боці #ONCLICK:COUNTRY,[league_leader_ruler.Custom('CL_tt')] #TOOLTIP:COUNTRY,[league_leader_ruler.Custom('CL_tt')],X [league_leader_ruler.Custom('CL_GEN')|L]#!#!."
  lower_cooldown_campaign_in_italy_tt: "Час між діями #TOOLTIP:GENERIC_ACTION,plan_campaign_in_italy,X #L «Кампанії в Італії»#!#! у [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,italian_wars,X #L «Італійські війни»#!#! буде скорочено на #G 1#! рік"
  fra_may_attract_prominent_painters_tt: "До [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого двору може приєднатися #G видатний#! італійський митець"
  da_vinci_brings_mona_lisa: "[target_character.GetName] приєднається до нашого двору та привезе із собою полотно #italic «Мона Ліза»#!."
  fra_colonial_power_risk: "Заснування колонії пов'язане з ризиками та може стати причиною конфлікту [ROOT.GetCountry.Custom('CL_GEN')] з іншими європейськими колоніальними країнами."
  canada_cartier_bonus: "Якщо [target_character.GetName] вирушить до #TOOLTIP:AREA,canadian_atlantic_coast_area,X #L Атлантичного узбережжя Канади#!#!, можуть статися події, пов'язані з колоніями"
  devoting_crown_resources_is_costly: "Заснування поселення необхідне для подальшої колонізації, але це вимагатиме величезних коштів та зусиль через велику віддаленість нових земель від [ROOT.GetCountry.Custom('CL_GEN')]."
  may_suffer_widespread_condemnation: "Сусідні #TOOLTIP:RELIGIONGROUP,christian,X #L християнські#!#! країни #R засудять#! [ROOT.GetCountry.Custom('CL_ACC')] за союз із [GetCountry('TUR').Custom('CL_INST')]."
  fra_may_recieve_benefit_from_alliance: "Такий союзник, як [GetCountry('TUR').GetLongNameWithNoTooltip], може відкрити перед нами #G вигідні#! можливості для торгівлі."
