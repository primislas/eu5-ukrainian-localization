l_russian:
  flavor_tur.1.title: "[persia.GetAdjectiveWithNoTooltip]е питання"
  flavor_tur.1.desc: "[persia.GetName] вже багато років загрожує нашим кордонам, проте нещодавно шпигуни повідомили, що [persia.GetAdjectiveWithNoTooltip|l]ий уряд розглядає можливість підписання з нами довгострокового миру. Подібна угода дозволить нарешті убезпечити понівечені війною прикордонні провінції, що піде на користь обом державам. Не бажаючи втрачати такої вдалої нагоди, [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] вже розробляє проєкт мирного договору."
  flavor_tur.1.historical_info: "Іранська династія Сефевідів, що набирала могутності, стала грізним суперником для османів. Ті, подібно до римлян, що обпеклися на цьому ж, виявилися втягнутими в затяжні та згубні війни з Іраном. Цього разу боротьба велася не тільки за володіння багатостраждальним Близьким Сходом — у ній зійшлися дві різні конфесії: Сефевіди сповідували шиїзм, а османи вважали себе спадкоємцями сунітського халіфату."
  flavor_tur.1.a: "Запропонувати повне примирення."
  flavor_tur.1.b: "Запропонувати укласти помірну угоду."
  flavor_tur.1.c: "Жодних угод із заклятими ворогами."
  full_reconciliation_persia: "[persia.GetLongName] скоро відповість на нашу пропозицію."
  moderate_treaty_persia: "$full_reconciliation_persia$"
  flavor_tur.2.title: "[ottomans.GetAdjectiveWithNoTooltip]а пропозиція"
  flavor_tur.2.desc: "#L [ottomans.GetAdjective]і#! посли прибули до нашого двору з пропозицією укласти міцний мир між нашими державами. Вони привезли із собою проєкт договору, який закріплює поточні кордони, а також гарантує безпеку наших паломників на шляху до святинь. Натомість вони вимагають, щоб наші #L #L [ROOT.GetCountry.GetReligion.GetAdjective|l]#!і#! проповідники припинили ображати Аїшу, сподвижників пророка Мухаммеда та перших трьох праведних халіфів, яких шанують #TOOLTIP:RELIGION,sunni_tt,X #L суніти#!#!. Звісно, подібний мир був би нам вельми вигідний, але чи можемо ми довіряти своїм найлютішим ворогам?"
  flavor_tur.2.historical_info: "$flavor_tur.3.historical_info$"
  flavor_tur.2.a: "Пошукати шляхи до повного примирення."
  full_reconciliation: "Повне примирення"
  flavor_tur.2.b: "Укласти помірну угоду."
  moderate_treaty: "Помірна угода"
  flavor_tur.2.c: "Ця пропозиція неприйнятна."
  flavor_tur.3.title: "Зухабський мир"
  flavor_tur.3.desc: "#L [persia.GetAdjective]і#! посли повернулися до нас із відповіддю: їхній уряд висловив готовність підписати договір, який закріпить поточні кордони і, якщо [ROOT.GetCountry.GetReligion.GetGodName] того забажає, на довгі роки забезпечить мир між нашими державами. При цьому ми повинні будемо гарантувати безпеку їхніх паломників на нашій території, а вони, своєю чергою, зобов'язуються заборонити своїм #L #L [ShowReligionAdjective('shia')|l]#!им#! проповідникам паплюжити ім'я Аїші, сподвижників Мухаммеда та перших трьох праведних халіфів, яких шанують #TOOLTIP:RELIGION,sunni_tt,X #L суніти#!#"
  flavor_tur.3.historical_info: "Зухабський, він же Касрі-Ширинський мир — мирний договір, підписаний у 1639 році Османською імперією та Персією. Встановлені ним кордони залишаються майже незмінними й сьогодні. Відразу після укладення миру відносини між колишніми ворогами почали стрімко налагоджуватися, хоча суперечки про кордони тривали, навіть попри припинення ворожнечі. У 1722 році це призвело до чергової війни, яка завершилася поновленням договору в 1747 році."
  flavor_tur.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.3.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.4.title: "[persia.GetAdjectiveWithNoTooltip]а відповідь"
  flavor_tur.4.desc: "Наші посли повернулися з #ONCLICK:COUNTRY,[persia.Custom('CL_tt')] #TOOLTIP:COUNTRY,[persia.Custom('CL_tt')],X [persia.Custom('CL_RP')|L]#!#! з тривожними вістями: [persia.GetAdjectiveWithNoTooltip|l]ий уряд розглянув нашу пропозицію, але з якоїсь причини визнав її невигідною. Можливо, вони не хочуть домовлятися, тому що вже готують напад на нас…"
  flavor_tur.4.historical_info: "$flavor_tur.3.historical_info$"
  flavor_tur.4.a: "Вони заплатять за цю образу!"
  flavor_tur.5.title: "Провінції руйнують централізацію"
  flavor_tur.5.desc: "Беї — вкрай впливові люди, які служать намісниками в наших провінціях. Через своє шляхетне походження вони користуються великою пошаною серед народу, і їхня роль в управлінні [ROOT.GetCountry.Custom('CF_TP')|l] неоціненна. Однак часто вони вельми честолюбні, а тому готові порушити свою вірність державі заради власної вигоди. Так, нещодавно група беїв за підтримки аристократів звернулася до нас із вимогою надати їм більшу автономію. Вони стверджують, що це дасть їм більше можливостей для підтримання порядку у своїх володіннях, але дехто побоюється, що давати їм таку свободу — надто ризикована затія."
  flavor_tur.5.historical_info: "Бей (#italic «вождь»#!) — тюркське шанобливе звернення до людини, що має стосунок до правлячої династії або уряду. В Османській імперії титулом «бей» іменувалися правителі округів; намісники найбільших областей називалися «бейлербей». У XVII столітті повноваження бейлербеїв стали ще ширшими, оскільки в імперії розросталася бюрократія, а особиста влада султана стала далеко не абсолютною."
  flavor_tur.5.a: "Поступимося їхнім вимогам."
  flavor_tur.5.b: "Обмежимо поступки."
  flavor_tur.5.c: "$common_string_rein_them_in$"
  flavor_tur.6.title: "Константинопольська торгівля"
  flavor_tur.6.desc: "[ShowLocationName('constantinople')] нарешті в наших руках, і тепер настав час вирішити, як ми регулюватимемо торгові потоки, що проходять через це велике місто. Наші радники пропонують посилити державний контроль над діяльністю торговців. Подібні заходи напевно викличуть невдоволення купецьких республік, які споконвіку користувалися особливими привілеями в Константинополі, але в довгостроковій перспективі це неодмінно забезпечить процвітання нашої економіки."
  flavor_tur.6.historical_info: "Перед тим як піти війною на Константинополь, Мехмед II уклав угоди про нейтралітет із купецькими республіками Венецією та Генуєю. Втім, щойно велике місто впало перед натиском османів, султан негайно розпочав боротьбу з пануванням західних купців на Чорному морі. Меркантилістськи налаштований Мехмед всіляко домагався державного контролю над купцями, і якийсь час такий підхід навіть приносив свої плоди: османська економіка почала процвітати."
  flavor_tur.6.a: "Давно час було провести цю реформу."
  broken_trade_agreement: "Порушено торговельну угоду"
  flavor_tur.6.b: "Краще залишимо все як є."
  honored_trade_agreement: "Дотримано торговельної угоди"
  flavor_tur.7.title: "Військове питання"
  flavor_tur.7.desc: "Після недавньої війни [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'задумалася','задумався')] про проведення військової реформи. Досі кістяк нашої армії становили [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], але через політичні причини на них не завжди можна було покластися. Тому нам варто розробити ефективніші методи набору солдатів, і найперспективніший варіант — набирати невільників із нижчих станів і давати їм відповідну військову підготовку. Так ми зможемо створити професійне та лояльне військо, яке беззаперечно виконуватиме накази [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'нашої правительки','нашого правителя')]."
  flavor_tur.7.historical_info: "Султани Мехмед I та Мурад II відновили та возз'єднали Османську імперію, роздроблену після нищівної поразки від військ Тимура. У роки їхнього правління в країні досягла свого зеніту система #italic девшірме#! — примусового набору до особистої охорони султана. Після падіння Константинополя армія надовго перейшла під повний контроль держави, оскільки стара турецька військова знать здебільшого або втекла, або була страчена."
  flavor_tur.7.a: "За цим майбутнє."
  flavor_tur.7.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] завжди були і будуть основою нашої армії."
  flavor_tur.7.c: "Краще приділимо увагу флоту."
  flavor_tur.8.title: "Школа Ендерун"
  flavor_tur.8.desc: "Наша держава постійно зростає та розвивається, тому їй необхідні вмілі керівники та генерали. Щоб забезпечити їхню підготовку, ми можемо заснувати спеціальну школу, яка діятиме при нашому дворі. Це не тільки дозволить нам повністю контролювати освітній процес, а й забезпечить зв'язок майбутніх фахівців із правлячою династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], а отже — зміцнить її вплив у всіх сферах державного управління.\n\nПри цьому можливість навчатися в цій школі має бути не тільки у знаті, а й у всіх обдарованих молодих людей незалежно від походження."
  flavor_tur.8.historical_info: "На подвір'ї палацу Топкапи султан Мехмед II заснував школу, де проходили підготовку найздібніші юнаки з-поміж християнських невільників, відібраних за системою девшірме. Тут вони вивчали ісламську віру, науки, військову справу та іноземні мови. У XV—XVI ст. система спадкового правління в Османській імперії трималася переважно на чиновниках із числа тих, хто пройшов навчання в Ендеруні, а тому вірно відданих султану."
  flavor_tur.8.a: "За цим майбутнє!"
  flavor_tur.8.b: "Краще розвиватимемо тимарну систему."
  flavor_tur.9.title: "Перенаправлення доходів"
  flavor_tur.9.desc: "Для розширення тимарної системи нам необхідні кошти, у зв'язку з чим радники пропонують використати для цих цілей доходи від вакфів — благодійних установ, які допомагають хворим і незаможним. Це дозволить нам значно зміцнити нашу армію і водночас зменшити вплив, яким володіють [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Однак варто враховувати, що найбільш побожні жителі нашої держави можуть виявитися незадоволені такою політикою."
  flavor_tur.9.historical_info: "Мехмед II прагнув будь-якими можливими способами зміцнити свою особисту владу над Османською імперією. Ближче до останніх років свого правління він спробував позбавити улемів впливу, перенаправивши дохід від #italic вакфів#!, що підтримували їх, на користь тимарної системи, зміцнивши тим самим османську армію. Таке рішення не всі прийняли однаково захоплено…"
  flavor_tur.9.a: "Державі знадобляться ці гроші."
  flavor_tur.9.b: "Вакф недоторканний!"
  flavor_tur.10.title: "Гнів [GetCountry('VEN').Custom('CL_RP')]"
  flavor_tur.10.desc: "Держава [GetCountry('VEN').GetName] довгий час була ключовим гравцем у торгівлі прянощами за рахунок своїх володінь в Егейському морі та зв'язків з #TOOLTIP:LOCATION,alexandria_tt,X #L Александрією#!#!. Однак віднедавна це місто знаходиться під нашим контролем, а наша морська присутність постійно посилюється, через що правителі [GetCountry('VEN').Custom('CL_RP')] побоюються, що ми повністю позбавимо їх можливості торгувати прянощами. На підставі цього [GetCountry('VEN').GetGovernment.GetRulerTitle|l] нещодавно [Select_CString(GetCountry('VEN').GetGovernment.GetRuler.IsFemale,'відправила','відправив')] нам послання, в якому в досить грубій формі [Select_CString(GetCountry('VEN').GetGovernment.GetRuler.IsFemale,'потребувала','потребував')], щоб ми компенсували збитки [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]их купців."
  flavor_tur.10.historical_info: "Попри те, що торговельні відносини між Венецією та османами йшли на користь обом державам, територіальні суперечки за володіння Егейським морем і постійний тиск на Венецію з боку інших християнських держав зрештою призвели до війни. У 1499 році вибухнула Друга турецько-венеціанська війна, в ході якої видатний османський адмірал Кемаль-реїс здобув кілька блискучих перемог. Венеція була змушена звернутися по допомогу до Угорщини та Папської області. Воюючі сторони уклали між собою перемир'я; за його умовами республіка поступалася туркам важливими грецькими фортецями Модон і Корон."
  flavor_tur.10.a: "Відмовитися навіть обговорювати компенсацію."
  flavor_tur.10.b: "Віддати Александрію як компенсацію."
  ceded_alexandria: "Віддали Александрію"
  VEN_will_get_a_cb: "[GetCountry('VEN').GetLongName] отримає [Concept('casus_belli','привід для війни')|e] з нами"
  flavor_tur.14.title: "Королівська бюрократія"
  flavor_tur.14.desc: "Настав час для масштабних перетворень. Щоб наша держава могла вважатися повноцінною імперією, ми повинні значно розширити її бюрократичний апарат і зміцнити його зв'язок з правлячою династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Це дозволить нам суттєво обмежити вплив провінційних намісників і зосередити всю владу в своїх руках. Однак ми повинні бути готові до того, що консервативна знать буде незадоволена такими заходами."
  flavor_tur.14.historical_info: "Сулейман I, прозваний своїми підданими «Кануні» («Законотворець»), — найвеличніший з усіх османських султанів і неперевершений правитель, що чітко усвідомив необхідність обмежити вплив місцевих беїв за допомогою сильного централізованого уряду. Для цього він прагнув встановити в державі потужний бюрократичний апарат, що підтримували далеко не всі…"
  flavor_tur.14.a: "Будь-якою ціною розширити бюрократичну систему."
  flavor_tur.14.b: "Достатньо буде й обмежених реформ."
  flavor_tur.14.c: "Краще задобримо аристократів."
  flavor_tur.15.title: "Імперський арсенал"
  flavor_tur.15.desc: "Перш ніж ми зможемо повністю підкорити собі Східне Середземномор'я, нам необхідно розширити та зміцнити свій флот. Стара #L #L [GetCountry('GEN').GetAdjective|l]#!а#! гавань у #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополі#!#! могла б стати ідеальним місцем для будівництва великої верфі, однак такий проєкт вимагатиме великих вкладень."
  flavor_tur.15.historical_info: "Незабаром після падіння Константинополя султан Мехмед II побудував у затоці Золотий Ріг суднобудівну верф — імовірно на тому ж місці, де колись знаходилася стара генуезька верф («ветус терсана»). У роки правління Селіма I — людини аскетичної та з гострим розумом — її значно розширили. До 1515 року на верфі було понад 160 доків — набагато більше, ніж на старій базі османського флоту в Галліполі."
  flavor_tur.15.a: "Ця морська база перевершить навіть венеціанський арсенал!"
  flavor_tur.15.b: "Будемо просто будувати більше кораблів за старими методами."
  flavor_tur.15.c: "Ні, майбутнє нашої держави — за її армією."
  galley_construction: "Будівництво галер"
  flavor_tur.16.title: "Перше повстання Джалалі"
  flavor_tur.16.desc: "#TOOLTIP:REGION,anatolia_region,X #L Анатолія#!#! загрузла в безладі. Невдоволені економічними проблемами, багато студентів #TOOLTIP:BUILDING_TYPE,madrasa,X #L медресе#!#!, секбани та дрібні чиновники почали влаштовувати протести, які очолив #L #L [ShowReligionAdjective('shia')|l]#!ий#! проповідник на ім'я [sheikh_celal.GetName]. Вони вимагають знизити податки, обмежити втручання держави у справи провінцій та надати певні привілеї послідовникам [ShowReligionAdjectiveWithNoTooltip('shia')|l]ої віри."
  flavor_tur.16.historical_info: "Повстання Джалалі — низка бунтів в Анатолії 1519—1659 рр., викликаних нестерпними умовами життя підданих Османської імперії: доходи держави від грабунків та розорень впали, а торговельні маршрути на Близькому Сході стали втрачати свою привабливість на фоні здійснення європейцями нових географічних відкриттів. Деякі султани частково йшли назустріч бунтівникам, а їхніх ватажків іноді навіть призначали на державні посади. Менш грізні бунти, такі як перше повстання під проводом Джеляля, вони придушували силою."
  flavor_tur.16.a: "Здолаємо зрадників."
  flavor_tur.16.b: "Приймемо їхні вимоги."
  celali_uprising: "Повстання Джалалі"
  celali_uprising_joining: "Усі #L [ShowReligionName('shia')|l]і#! [Concept('pops','групи населення')|e] в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! приєднаються до фракції «[celali_uprising.GetName]»"
  celal_available.tt: "[sheikh_celal.GetNameWithNoTooltip] може бути покликаний до [Concept('cabinet','ради')|e]."
  flavor_tur.17.title: "Захисник паломників"
  flavor_tur.17.desc: "Захопивши #TOOLTIP:LOCATION,jerusalem_tt,X #L Єрусалим#!#! та #TOOLTIP:LOCATION,cairo_tt,X #L Каїр#!#!, ми взяли під контроль основні паломницькі маршрути до #TOOLTIP:LOCATION,mecca_tt,X #L Мекки#!#! та #TOOLTIP:LOCATION,medina_tt,X #L Медіни#!#!. Тепер [ROOT.GetCountry.GetGovernment.GetRuler.GetName] може по праву називати себе «Хадім аль-Харамейн», що означає #italic «Служитель двох святинь»#!. Однак прийняття цього титулу — не просто формальність, а по суті визнання своїм священним обов'язком захищати тих, хто здійснює хадж."
  flavor_tur.17.historical_info: "Після свого успішного походу проти мамлюків султан Селім I прийняв присягу вірності від шаріфа Мекки і взяв собі титул Хаджім аль-Харамайн, або «Служитель двох святинь». З того часу захист паломницьких маршрутів слугував для династії Османів одним з головних джерел легітимності та престижу."
  flavor_tur.17.a: "З цим ми впораємося!"
  flavor_tur.18.title: "Щасливий архітектор"
  flavor_tur.18.desc: "[mimar_sinan.GetName] — людина багатьох талантів. [Select_CString(mimar_sinan.IsFemale,'Вона вже здобула','Він вже здобув')] славу як військовий інженер, сапер та корабел, проте [Select_CString(mimar_sinan.IsFemale,'її','його')] справжня пристрасть — це архітектура, в якій [Select_CString(mimar_sinan.IsFemale,'вона також досягла успіху','він також досяг успіху')]. Ми могли б скористатися [Select_CString(mimar_sinan.IsFemale,'її','його')] послугами та призначити [Select_CString(mimar_sinan.IsFemale,'її','його')] на посаду головного архітектора Обителі щастя. У цій якості [Select_CString(mimar_sinan.IsFemale,'вона','він')] відповідатиме за будівництво доріг, водогонів, мостів та інших інфраструктурних споруд."
  flavor_tur.18.historical_info: "Мімар Сінан — старший архітектор, інженер та математик, який служив трьом османським султанам. Свою кар'єру він розпочав скромним проєктувальником доріг та мостів, але з часом став керувати найважливішими для держави проєктами, зробивши тим самим величезний внесок в османську архітектуру."
  flavor_tur.18.a: "Призначимо [Select_CString(mimar_sinan.IsFemale,'її','його')] головним архітектором."
  flavor_tur.18.b: "[Select_CString(mimar_sinan.IsFemale,'Її','Його')] послуги коштують занадто дорого."
  flavor_tur.19.title: "Велика законодавча реформа"
  flavor_tur.19.desc: "У зв'язку з постійним зростанням нашої держави [target_character.GetName] вже давно планує провести правову реформу. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] могли б допомогти нам зібрати та впорядкувати всі законодавчі акти колишніх правителів, а заодно перевірити їх відповідність чинним нормам #TOOLTIP:POLICY,sharia_law_policy,X #L шаріату#!#!, які ми, будучи правовірними #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманами#!#!, зобов'язані дотримуватися."
  flavor_tur.19.historical_info: "Завдяки своїм масштабним правовим реформам султан Сулейман I отримав прізвисько «Кануні», що означає «законодавець». Працюючи над систематизацією османських династичних законів, відомих як «канун», він також намагався привести їх у відповідність з нормами шаріату, для чого тісно співпрацював з видатним шейх-уль-ісламом Ебуссуудом-ефенді. Результатом цієї спільної роботи стала більш струнка та впорядкована правова система."
  flavor_tur.19.a: "Схвалимо османські закони."
  flavor_tur.19.b: "Залишимо як є."
  flavor_tur.20.title: "Піднесення династії [muhammad_koprulu.GetDynasty.GetNameWithNoTooltip]"
  flavor_tur.20.desc.opening: "[muhammad_koprulu.GetName] вже багато років служить [ROOT.GetCountry.Custom('CF_DP')|l] як [Select_CString(muhammad_koprulu.IsFemale,'провінційна намісниця','провінційний намісник')], і за цей час [Select_CString(muhammad_koprulu.IsFemale,'вона не раз довела','він не раз довів')] свою компетентність, проникливість та вірність."
  flavor_tur.20.valide_sultan.desc: "$flavor_tur.20.desc.opening$ [valide_sultan.GetName] вважає, що [Select_CString(muhammad_koprulu.IsFemale,'вона могла','він міг')] би принести ще більшу користь державі як [ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l]. Однак на даний момент цю посаду вже займає [doomed_vizier.GetName], і якщо ми спробуємо усунути [Select_CString(doomed_vizier.IsFemale,'її','його')], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] будуть вкрай незадоволені."
  flavor_tur.20.no_valide_sultan.desc: "$flavor_tur.20.desc.opening$ Члени двору впевнені, що [Select_CString(muhammad_koprulu.IsFemale,'вона могла','він міг')] би принести ще більшу користь Блискучій Порті як [ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l]. Однак на даний момент цю посаду вже займає [doomed_vizier.GetName], тому спочатку нам доведеться [Select_CString(doomed_vizier.IsFemale,'її','його')] усунути."
  flavor_tur.20.historical_info: "Мехмед Кьопрюлю народився близько 1575 року в албанському селі Радник. Його батьки були християнами, тому його вилучили з родини в рамках системи девшірме та виховали в мусульманській вірі, як і більшість яничарів. Спершу він працював кухарем, а потім перейшов до скарбниці. Пізніше він став пашею центральної Анатолії та завоював репутацію ефективного й чесного управителя, що було рідкістю для Османської імперії. 15 вересня 1656 року Турхан, мати юного султана Мехмеда IV, призначила його великим візиром. Це поклало початок династії впливових візирів Кьопрюлю."
  flavor_tur.20.a: "Країна давно потребує цих змін."
  flavor_tur.20.b: "У цьому підвищенні немає потреби."
  becomes_head_of_cabinet_tt: "[muhammad_koprulu.GetName] стане [Concept('head_of_the_cabinet','головою ради')|e]"
  koprulu_forgotten.tt: "[muhammad_koprulu.GetName] кане в безвість"
  flavor_tur.21.title: "Великий стрілець"
  flavor_tur.21.desc: "[kemankes.GetName] чудово проявив себе спочатку як яничар, а потім і на посаді флотського командира. За свої чудові навички стрільби з лука він заслужив прізвисько #italic «Кеманкеш»#!, або «Стрілець». Однак його таланти не обмежуються лише військовою справою: під час служби він показав себе як грамотний керівник і зміг значною мірою викорінити корупцію в армії та на флоті. Ми могли б надати йому посаду при дворі, щоб він міг застосувати свій управлінський досвід уже в масштабах усієї держави."
  flavor_tur.21.historical_info: "Кеманкеш Кара Мустафа-паша народився в Албанії. В юності він вступив до яничарів, а пізніше отримав посаду головнокомандувача флотом. Зрештою султан Мурад IV призначив його великим візиром. Під час правління Ібрагіма I, недолугого брата Мурада, Кара Мустафа-паша значно зміцнив свій вплив. На жаль, цей прозорливий політик і грамотний законотворець став заклятим ворогом матері султана Кьосем та її ближнього кола — наложниць і шарлатанів — і в підсумку був відправлений у відставку та страчений у 1644 році."
  flavor_tur.21.a: "Ми й справді потребуємо його послуг."
  flavor_tur.21.b: "Наші радники й так чудово справляються."
  kemankes_forgotten.tt: "[kemankes.GetName] кане в безвість"
  flavor_tur.22.title: "Туніське повстання"
  flavor_tur.22.desc: "У #TOOLTIP:AREA,tunis_area,X #L Тунісі#!#! зростає невдоволення нашою владою. Формально місцеві голови поселень зберігають вірність ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#!, однак на ділі бунтівні яничари активно переманюють їх на свій бік. Втім, у нас ще є можливість запобігти протестам, якщо ми відправимо лояльним беям додаткові кошти та надамо #TOOLTIP:CULTURE,tunisian_tt,X #L туніському#!#! населенню більше автономії."
  flavor_tur.22.historical_info: "У перші десятиліття XVIII століття серед беїв і деїв Північної Африки зростали бунтівні настрої. Лідери яничарів були незадоволені Карловицьким миром між Османською імперією та Священною лігою. У 1705 році критянин Хусейн ібн Алі-ага здійснив державний переворот і заснував династію Хусейнів, яка правила Тунісом до 1957 року. Туніс не одразу став незалежним, але отримав більше автономії."
  flavor_tur.22.a: "Зітремо зрадників!"
  flavor_tur.22.b: "Улестимо їх грошима та обіцянками."
  tunisian_uprising: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,tunisian_tt,X #L туніських#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:AREA,tunis_area,X #L Тунісі#!#! стане дуже низьким."
  flavor_tur.23.title: "Триполітанське повстання"
  flavor_tur.23.desc: "У #TOOLTIP:SUB_CONTINENT,north_africa,X #L Північній Африці#!#! назріває заколот. Місцевий кавалерійський офіцер на ім'я [karamanli.GetName] убив намісника #TOOLTIP:AREA,tripolitania_area,X #L Триполітанії#!#!, заявивши, що той був корумпований і вже давно втратив довіру місцевого населення. Тепер [karamanli.GetShortNameWithNoTooltip] вимагає, щоб ми призначили його новим беєм цього регіону. Очевидно, він планує привести свою родину до влади та керувати цими територіями на умовах автономії. Якою б зухвалою не була його вимога, нам варто поставитися до неї серйозно, оскільки наша відмова може призвести до повномасштабного повстання."
  flavor_tur.23.historical_info: "У 1711 році Ахмед Караманлі, турецький кавалерійський офіцер і яничарський дей, убив османського намісника Триполітанії та переконав султана призначити його беєм. Посада намісника переходила до його нащадків до 1835 року. Хоча формально Караманлі підпорядковувалися Стамбулу, по факту Триполітанія була незалежною державою."
  flavor_tur.23.a: "Призначимо його беєм."
  flavor_tur.23.b: "Якщо він хоче війни, він її отримає."
  tripolitan_uprising: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,libyan_arabic_culture_tt,X #L лівійських#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:AREA,tripolitania_area,X #L Триполітанії#!#! стане дуже низьким."
  ahmed_karamanli_becomes_bey.tt: "[karamanli.GetName] стане намісником #TOOLTIP:AREA,tripolitania_area,X #L Триполітанії#!#!"
  flavor_tur.24.title: "Ловець хмар"
  flavor_tur.24.desc: "#TOOLTIP:REGION,egypt_region,X #L Єгипетський#!#! бей [ali_al_kabir.GetName], відомий під прізвиськом «Ловець хмар», набув значного впливу і, за чутками, навіть почав карбувати на наших монетах власне ім'я, чим фактично проголосив незалежність своїх володінь від Блискучої Порти. На щастя, у нас є можливість придушити це повстання в зародку, умовивши його командира на ім'я [abu_al_dhahab.GetName] зрадити його. Однак ми повинні бути готові до того, що жителі Єгипту будуть обурені такими підступними методами розправи над чиновниками."
  flavor_tur.24.historical_info: "Попри завоювання Мамлюцького султанату в 1518 році, мамлюки продовжили керувати Єгиптом. У середині XVIII століття дві групи мамлюків вступили в запекле протистояння. Тоді-то на сцені й з'явився Алі-бей аль-Кабір. Після того, як Алі-бей зміцнив свою владу, він підняв повстання проти османів і здобув кілька перемог у Сирії та Хіджазі, але османам вдалося зупинити його просування, пересваривши Алі-бея з усіма його сподвижниками. Його вбивство в Каїрі поклало край єгипетському заколоту."
  flavor_tur.24.a: "Умовимо командира."
  flavor_tur.24.b: "Проігноруємо проблему."
  flavor_tur.24.c: "Зіпсуємо його репутацію."
  egyptian_uprising: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,lower_egyptian_culture_tt,X #L нижньоєгипетських#!#! [Concept('pops','груп населення')|e] в #TOOLTIP:REGION,egypt_region,X #L Єгипті#!#! стане дуже низьким."
  egyptian_discontent: "Усі #TOOLTIP:CULTURE,lower_egyptian_culture_tt,X #L нижньоєгипетські#!#! [Concept('pops','групи населення')|e] в #TOOLTIP:REGION,egypt_region,X #L Єгипті#!#! втратять деяку частину [Concept('pop_satisfaction','задоволення')|e]."
  flavor_tur.25.title: "Алжирські корсари"
  flavor_tur.25.desc: "До нас дійшли чутки про заворушення в #TOOLTIP:AREA,algiers_area,X #L Алжирі#!#!, де між яничарами та берберськими корсарами розгорнулася запекла боротьба за владу. Останні набули надто великої могутності, і тепер вони планують остаточно вирватися з-під впливу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Втім, ми можемо легко придушити ці бунтівні настрої, підкупивши ватажків корсарів і переманивши їх на наш бік."
  flavor_tur.25.historical_info: "Алжир був оплотом берберських піратів і доволі космополітичною країною. Але після того, як самодержець Алі-ага був убитий під час англійського нападу в 1671 році, в Алжирі встановився новий порядок: військова влада перейшла до місцевих яничарів, а контроль над торгівлею — до флібустьєрів. Фактично Алжир став незалежним від Османської імперії."
  flavor_tur.25.a: "Ці пірати нам більше не потрібні."
  flavor_tur.25.b: "Запропонуємо їм хабарі."
  algiers_uprising: "Усі #TOOLTIP:CULTURE,algerian_tt,X #L алжирські#!#! [Concept('pops','групи населення')|e] в #TOOLTIP:AREA,algiers_area,X #L Алжирі#!#! втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction','задоволення')|e]."
  flavor_tur.27.title: "Цариця міст"
  flavor_tur.27.desc: "#TOOLTIP:BUILDING_TYPE,theodosian_walls,X #L Феодосієві стіни#!#! #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополя#!#! протягом сотень років стримували #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманські#!#! армії, однак тепер це велике римське місто нарешті впало до наших ніг. Ми могли б зробити його новою столицею нашої держави, однак спочатку його необхідно буде відновити та призначити на найважливіші посади #TOOLTIP:CULTURE,turkish_culture_tt,X #L турецьких#!#! лоялістів. З іншого боку, ми можемо відзначити цю довгоочікувану перемогу, розграбувавши місто та привласнивши його багатства."
  flavor_tur.27.historical_info: "Завоювання Константинополя стало трагедією для західних християн і справжнім тріумфом для османів, що перетворило їх на нових лідерів мусульманського світу. Після трьох днів грабежів Мехмед II наказав надалі захищати жителів міста. Багато видатних радників османських султанів були греками з Константинополя."
  flavor_tur.27.a: "Він і буде нашою столицею."
  flavor_tur.27.b: "Розграбуємо місто та оголосимо про свою перемогу!"
  flavor_tur.27.c: "Черговий діамант у нашій короні. Не більше того."
  tur_byzantion_becomes_core_tt: "Усі належні нам [Concept('locations','райони')|e] у Візантії стануть нашими [Concept('core','національними')|e] територіями"
  flavor_tur.28.title: "Похорон Кьосе Міхала"
  flavor_tur.28.desc: "Колишній [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ий губернатор Кьосе Міхал був відомий тим, що одного разу йому уві сні з'явився пророк, який переконав його прийняти #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#! і присягнути на вірність бею на ім'я [GetCharacter('tur_osman').GetName]. З тих самих пір Кьосе був його найвірнішим прихильником, і за час своєї служби він досяг великих успіхів. Серед іншого, він брав участь у взятті #TOOLTIP:LOCATION,bursa_tt,X #L Бурси#!#!, де і провів решту своїх днів. Під час похорону його сини повинні будуть виголосити надгробні промови, однак ми ще не вирішили, яким буде їхній зміст.\nМи можемо зробити акцент на його #TOOLTIP:CULTURE,greek_culture_tt,X #L грецькому#!#! походженні, щоб показати, що в нашій державі у кожного є можливість досягти успіху. Своєю чергою, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] наполягають, щоб ми підкреслили його відданість #TOOLTIP:RELIGION,sunni_tt,X #L сунітській#!#! вірі."
  flavor_tur.28.a: "Греки — наші брати!"
  flavor_tur.28.b: "Віра — єдине, що нас об'єднує."
  burial_of_mihal: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! та на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.29.title: "Довіра дервішів"
  flavor_tur.29.desc: "[GetCharacter('tur_osman').GetShortName] здобув легітимність після того, як його дружиною стала [GetCharacter('tur_rabia_bala_hatun').GetShortName], дочка старійшини дервішів зі східних околиць держави. Ці релігійні містики, як і раніше, мають значну вагу в нашій молодій державі, проте тепер вони просять нас підтвердити своє заступництво. Натомість школа [target_school_scope.GetName] надасть нам політичних і військових радників. Більш консервативно налаштовані [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] висловлюють невдоволення тим, що дервіші радше тяжіють до езотеричних ритуалів, а не до справжнього богослов'я, і воліли б, щоб ми обмежили їхній зростаючий вплив…"
  flavor_tur.29.historical_info: "Дервіші — послідовники вчення суфіїв, які відігравали ключову роль в османському суспільстві. Вони поширювали іслам, підтримували завоювання і навіть займалися державними справами. Обителі дервішів були центрами навчання та соціального захисту, а обряди та духовні практики їхніх тарикатів (наприклад, Бекташі та Мевлеві) мали величезний вплив на релігійну та військову культуру османів."
  flavor_tur.29.a: "У дервішів є чому повчитися!"
  flavor_tur.29.b: "Їхня допомога нам більше не потрібна."
  flavor_tur.30.title: "Наші власні монети"
  flavor_tur.30.desc: "Наприкінці свого правління [GetCharacter('tur_osman').GetShortName] почав карбувати монету зі своїм ім'ям, більше не визнаючи за собою навіть формального васалітету перед згасаючою Державою Ільханідів у Персії. Це рішення стало важливим кроком на шляху здобуття самостійності. А після того, як Ільханіди були розгромлені, у нас тим більше немає жодних причин відмовлятися від карбування своєї монети. Однак монетний двір у Бурсі скаржиться на брак срібла та золота і просить виділити йому додаткові кошти для нарощування обсягу випуску монети з величним ликом [Select_CString(target_character.IsFemale, 'нашої володарки', 'нашого володаря' )] [target_character.GetName]."
  flavor_tur.30.a: "Дамо їм усе необхідне."
  flavor_tur.30.b: "Обмежимо виробництво монет."
  flavor_tur.30.historical_info: "Перший монетний двір Османської держави знаходився в Бурсі. Після завоювання міста в 1326 році Осман I почав карбувати монети свого бейліка, а не Монгольського ільханату, що було звичною справою серед тюркських правителів Анатолії."
  flavor_tur.31.title: "Процвітання [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_tur.31.desc: "Відтоді як ми завоювали Бурсу, місто справді розквітло, приваблюючи купців і мандрівників #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецького#!#!, #TOOLTIP:CULTURE,turkish_culture_tt$,X #L турецького#!#!, #TOOLTIP:CULTUREGROUP,italian_group,X #L італійського#!#! та #TOOLTIP:CULTUREGROUP,jewish_group,X #L єврейського#!#! походження.\n\nВкладення наших попередників у нову та модернізацію старої інфраструктури, схоже, починають приносити свої плоди, а Бурса поступово перетворюється на перлину нашої зростаючої держави. Очевидно, багато ремісників і торговців, які раніше працювали під [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]им гнітом, відчули, що цей корабель іде на дно, а тому звернулися до нас."
  flavor_tur.31.a: "Не будемо втручатися."
  flavor_tur.31.b: "Розвиток міста вимагає коштів!"
  flavor_tur.31.historical_info: "Бурса — перше велике місто, захоплене османами в 1326 році, яке продовжувало залишатися культурним і торговим центром навіть після перенесення столиці в Адріанополь (Едірне). Протягом XIV століття його населення неухильно зростало."
  flavor_tur.32.title: "[GetCharacter('tur_osman').GetShortNameWithNoTooltip] та його віщий сон"
  flavor_tur.32.desc: "Розповідають, що давним-давно однієї зоряної ночі, коли [GetCharacter('tur_osman').GetShortName] гостював у мудрого шейха Едебалі, йому було послано сновидіння, сповнене знамень. Уві сні [GetCharacter('tur_osman').GetShortName] побачив, як його нащадки завоюють більшу частину світу, а [ShowLocationNameWithNoTooltip('constantinople')] стане їхньою найбільшою здобиччю. І нехай джерело цієї історії нам невідоме, вона стала поширюватися як при нашому дворі, так і за його межами."
  flavor_tur.32.a: "Нехай усі наші піддані дізнаються про це."
  flavor_tur.32.b: "Ми сповнені наснаги!"
  flavor_tur.32.historical_info: "Історія про віщий сон Османа з'явилася в XV столітті, через століття після його смерті. Вважається, що це був пропагандистський міф, покликаний надихнути жителів молодої імперії."
  flavor_tur.33.title: "Перська бюрократія"
  flavor_tur.33.desc: "Завдяки Великим Сельджукам у стародавні часи наша держава долучилася до культури #TOOLTIP:REGION,persia_region,X #L Персії#!#!, тож наші чиновники тепер пишуть #TOOLTIP:LANGUAGE,persian_language,X #L перською#!#! мовою та зі збереженням #TOOLTIP:LANGUAGE,persian_language,X #L перського#!#! стилю. Однак наші #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецькі#!#! піддані бажають змін — вони хочуть, щоб наш державний апарат став більш схожим на #L [GetCountry('BYZ').GetAdjective|l]#!ий#!, а діловодство велося #TOOLTIP:LANGUAGE,greek_language,X #L грецькою#!#!. Подібні радикальні зміни безсумнівно викличуть гнів серед #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! племен нашої держави, оскільки вони дорожать перською спадщиною і вважають її престижною."
  flavor_tur.33.a: "Ми не відмовимося від нашої іранської спадщини."
  flavor_tur.33.b: "Наші чиновники повинні використовувати грецьку мову."
  flavor_tur.33.c: "Чому б не складати документи двома мовами?"
  flavor_tur.33.historical_info: "Молода Османська держава нагадувала Персію часів правління сельджуків. Османи перейняли у своїх попередників ключові адміністративні та бюрократичні практики, відточені до досконалості за століття перського панування. В офіційних документах, судових протоколах і навіть державній кореспонденції використовувалася перська мова, яка в мусульманському світі вважалася мовою влади та високої культури. Це пряма спадщина сельджуків: довгий час перські бюрократи та писарі відігравали важливу роль у вирішенні державних справ. У перші десятиліття існування бейліка турецька мова вважалася мовою військової еліти, арабська — юриспруденції та релігії, а перська — влади, дипломатії та культури."
  persianate_protocols_persianate_option: "Усі #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецькі#!#! [Concept('pops', 'групи населення')|e] отримають [Multiply_CFixedPoint(ShowNamedValue('pop_satisfaction_weak_penalty'), '(CFixedPoint)-1')|R2%] до [Concept('pop_satisfaction', 'задоволення')|e]."
  persianate_protocols_greek_option: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] підвищиться на [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%]."
  persianate_protocols_balanced_option: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.34.title: "Приплив анатолійських вчених"
  flavor_tur.34.desc: "У міру зростання престижу нашої династії до нас починають стікатися вчені з #TOOLTIP:AREA,central_anatolia_area,X #L Центральної Анатолії#!#!. Вони навчені в традиціях бюрократичного мистецтва Великих Сельджуків давнини, володіють премудростями державного управління, які так необхідні нашій державі.\n\nОднак широке залучення до управління державою вчених викличе невдоволення серед знаті прикордонних войовничих племен, що перебувають під нашим впливом. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважатимуть подібне рішення посяганням на їхню владу та спробою зміцнити могутність центрального уряду."
  flavor_tur.34.a: "Ми все одно наймемо їх."
  flavor_tur.34.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] нам потрібні, було б нерозумно їх гнівити…"
  flavor_tur.34.historical_info: "Вчені з центральної Анатолії, де тюрко-перська бюрократія користувалася великим впливом, ніж на Заході, відіграли важливу роль у централізації молодої Османської держави."
  flavor_tur.35.title: "Перші серед рівних"
  flavor_tur.35.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та їхні вожді, чиїми стараннями ми змогли розширити наші володіння, вважають нас лише першими серед рівних, як було раніше заведено у #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турків#!#!. Однак тепер їх починає тривожити зростаюча могутність династії [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetName], і вони хочуть, щоб ми знову підтвердили, що дотримуємося старих звичаїв. Якщо ми їм поступимося, це коштуватиме нам частини престижу та авторитету, на зміцнення яких ми витратили роки."
  flavor_tur.35.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] мають бути задоволені…"
  flavor_tur.35.b: "Цього разу ми відмовимося."
  flavor_tur.35.historical_info: "За часів своїх перших завоювань османи тісно співпрацювали з племенами прикордонних воїнів, званих газі. Їхні лідери вважали себе рівними османським правителям — історики називають такі відносини #italic «primus inter pares» («перші серед рівних»)#! — і приймали в штики будь-які спроби османів зміцнити свою владу."
  flavor_tur.36.title: "Місто Адріана"
  flavor_tur.36.desc: "Захопивши стародавнє місто [ShowLocationName('edirne')], нам варто подумати про те, щоб зробити його столицею нашої держави та нашим постійним плацдармом у #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Звідси наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] зможуть здійснювати вилазки на територію #TOOLTIP:AREA,thrace_area,X #L Фракії#!#!. А коли прийде час, ми звернемо наш погляд на найбільшу здобич — [ShowLocationName('constantinople')]. Втім, жителі нашої нинішньої столиці, міста [ShowLocationName('bursa')], ймовірно, засмутяться."
  flavor_tur.36.a: "Наше найбільше завоювання!"
  flavor_tur.36.b: "Нас цілком влаштує і [ShowLocationNameWithNoTooltip('bursa')]."
  flavor_tur.36.historical_info: "Османи відвоювали Адріанополь у Східної Римської імперії в 1362 році. Мурад I переніс туди столицю, щоб показати всьому світу, що підкорення Європи ще не закінчено."
  all_pops_lose_10_satisfaction_tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] в цьому [Concept('location','районі')|e] знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]."
  core_and_prosperity_tt: "Кожен [Concept('location','район')|e] у цій [Concept('province','провінції')|e] стане [Concept('core','національним')|e] і отримає [ShowNamedValue('prosperity_weak_bonus')|+=2%] до [Concept('prosperity','процвітання')|e]."
  flavor_tur.37.title: "Легенда про Огузького кагана"
  flavor_tur.37.desc: "[target_artist.GetName], [Select_CString(target_artist.IsFemale, 'представниця', 'представник' )] групи амбітних вчених та літераторів, [Select_CString(target_artist.IsFemale, 'звернулася', 'звернувся' )] до нас з пропозицією профінансувати складання генеалогії нашої династії, нехай і дещо прикрашеної. Зокрема, [Select_CString(target_artist.IsFemale, 'вона', 'він' )] хоче представити все так, ніби ми походимо від Огузького кагана, легендарного великого героя давнини. Подібна родословна дозволила б нашій династії вважатися найзнатнішою серед усіх #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! родів."
  flavor_tur.37.a: "На таке жодних грошей не шкода!"
  flavor_tur.37.b: "У цю казку навіть дитина не повірить…"
  flavor_tur.37.historical_info: "У давніх переказах Огузький каган шанувався як легендарний прабатько всіх тюркських народів і нерідко згадувався в середньовічних династичних хроніках. Приписуючи собі спорідненість з ним, османи прагнули підкреслити свою перевагу над іншими тюркськими правителями. Однак не всі приймали подібні заяви на віру. Так, Тамерлан у листуванні з Баязидом I в досить образливій формі ставив під сумнів походження османів."
  flavor_tur.38.title: "[Select_CString(advisor_character.IsFemale, 'Перша', 'Перший' )] з династії [ShowDynastyNameWithNoTooltip('candarli_dynasty')]"
  flavor_tur.38.desc: "Степові народи, до числа яких належимо і ми, здавна звикли судити людей не по крові, а по справах. Суддя з Бурси на ім'я [advisor_character.GetName], що подає великі надії, [Select_CString(advisor_character.IsFemale, 'проявила', 'проявив' )] неабиякий талант як у державному управлінні, так і в стратегії. [Select_CString(advisor_character.IsFemale, 'Вона могла', 'Він міг' )] би виявитися нам [Select_CString(advisor_character.IsFemale, 'корисною', 'корисним' )], якщо ми призначимо [Select_CString(advisor_character.IsFemale, 'її радницею', 'його радником' )] при нашому дворі. Однак [Select_CString(advisor_character.IsFemale, 'її', 'його' )] походження з родини, представники якої перебували на військовій службі, може стати проблемою, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] давно наполягають на тому, що радників такого високого становища слід призначати з числа вчених."
  flavor_tur.38.a: "Нашому двору потрібна свіжа кров і нові ідеї!"
  flavor_tur.38.b: "Не будемо порушувати традицію."
  flavor_tur.38.historical_info: "Багато суддів і візирів молодої Османської держави походили з роду Чандарли, який брав початок від кочових тюрків. Це прізвище носили п'ять великих османських візирів. На жаль, четвертий візир із родини Чандарли, Халіл-паша Молодший, впав у немилість Мурада II і був засуджений до страти. Ця подія назавжди заплямувала репутацію родини."
  flavor_tur.39.title: "Велика мечеть [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_tur.39.desc: "Відтоді як ми завоювали Бурсу, [target_location.GetRank.GetName|l] переживає період справжнього розквіту — повсюди будуються нові будівлі та споруди. Однак місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] бажають, щоб ми посягнули на більш зухвале підприємство і звели величезну мечеть. Вона стане свідченням могутності династії [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetName] і пам'ятником духовній величі #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  flavor_tur.39.a: "Так ми увічнимо свою культурну спадщину!"
  flavor_tur.39.b: "Нам потрібні гроші на війну."
  flavor_tur.39.historical_info: "Довгий час Бурса вважалася церемоніальним центром Османської держави і зберегла цей статус навіть після перенесення столиці до Адріанополя (Едірне). Баязид I курирував будівництво двох великих мечетей — Баязид Куллієсі та Улу-Джамі, — поки Тимур не перервав його правління."
  flavor_tur.40.title: "Відновлення [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_tur.40.desc: "На тому місці, де зараз стоїть [target_location.GetRank.GetName|l] [target_location.GetName], колись височіли стіни стародавнього римського міста Нікеї. Відтоді, як ми ним оволоділи, він перебуває в занепаді — втім, цей процес розпочався задовго до нашої появи. Місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] просять нас взяти на себе відновлення зруйнованого та занедбаного міста, щоб привабити нових мешканців, і нагадують нам, що він, як і раніше, зберігає в собі величезну цінність та можливості для майбутнього розширення…"
  flavor_tur.40.a: "У нас немає таких коштів. Нехай розвалюється далі."
  flavor_tur.40.b: "Відновимо його колишню велич!"
  flavor_tur.40.historical_info: "За османів місто Ізнік, колись велика Нікея, прийшло в повне запустіння. Марокканський мандрівник Ібн Баттута, який опинився там у 1331 році, стверджував, що від Ізніка залишилися одні руїни, а англійський письменник XVIII століття, який багато їздив світом, описав його як «жалюгідне сільце з довгими провулками та глинобитними стінами»…"
  flavor_tur.43.title: "Падіння Республіки [GetCountry('AHI').GetNameWithNoTooltip]"
  flavor_tur.43.desc: "Республіка [GetCountry('AHI').GetName], на чолі якої стояло релігійне Братство Ахі, здавна пов'язана з нашою династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Свого часу Республікою правив шейх Едебалі, зятем якого був сам [GetCharacter('tur_osman').GetName]. Впливові [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] у нашій державі, як і раніше, з повагою ставляться до містиків Ахі та вважають, що вони будуть корисніші нам як союзники, а не піддані. Однак дехто думає, що давно час включити землі Братства до складу нашої держави. Втім, навряд чи вони смиренно погодяться розлучитися зі свободою…"
  flavor_tur.43.a: "Нападемо на них."
  flavor_tur.43.b: "Запропонуємо їм унію."
  flavor_tur.43.c: "Будемо якось співіснувати."
  flavor_tur.43.historical_info: "Республіка Ахі здобула незалежність від монголів приблизно в 1290 році. На чолі цього незвичайного бейліка стояв не воєначальник, а братство суфіїв, і за своєю організацією він дуже нагадував європейські купецькі республіки. Ахі розвалилася після падіння Анкари в 1354 році, але спадщина суфійських братств (зокрема й Ахі) справила величезний вплив на османську культуру."
  ahi_vassalage_tooltip: "[target_country.GetNameWithNoTooltip] з більшою ймовірністю погодиться підкоритися через особливу [Concept('event','подію')|e] під час [Concept('situation','ситуації')|e] #TOOLTIP:SITUATION,rise_of_the_ottomans,X #L Сходження турків#!#!, поки ми зберігаємо статус найсильнішого претендента.\n\nУ разі такого підкорення також буде ініційовано [Concept('event','подію')|e] #italic $flavor_tur.44.title$#!"
  explain_flavor_tur.43_tt: "Наш вибір у [Concept('event','події')|e] #italic $flavor_tur.43.title$#! підвищив шанси на їхню згоду.\n\nЯкщо вони стануть нашими [Concept('subject','ленниками')|e], ми також отримаємо [Concept('event','подію')|e] #italic $flavor_tur.44.title$#!"
  flavor_tur.44.title: "Братство Ахі"
  flavor_tur.44.desc: "Після приєднання володінь Республіки [GetCountry('AHI').GetName] до нашої держави багато вправних ремісників і торговців із Братства вирішили вступити на службу при #L #L [ROOT.GetCountry.GetAdjective|l]#!ому#! дворі. Вони славляться своїми глибокими знаннями традицій і, схоже, готові пробачити нам будь-які завдані їм образи, справжні чи уявні, в ім'я служіння #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  flavor_tur.44.a: "У нас є вільні посади…"
  flavor_tur.44.b: "Нехай краще зміцнюють наші кордони."
  flavor_tur.44.historical_info: "Братство Ахі входило до Ахії — системи суфійських гільдій, що мала великий вплив в Анатолії після правління Сельджукідів. Після того, як османи завоювали республіку Ахі з центром в Ангорі (Анкарі), деякі члени Ахії стали османськими чиновниками."
  flavor_tur.46.title: "Базиліка"
  flavor_tur.46.desc: "Велика бомбарда, яку відлив майстер [cannon_maker.GetNameWithNoTooltip], послужила нам добру службу під час взяття [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]. З її допомогою ми змогли проломити неприступні Феодосієві стіни. Однак через перегрів знаряддя було знищено внаслідок потужного вибуху,"
  flavor_tur.46.ending_orban.desc: "який убив його творця."
  flavor_tur.46.orbanless.desc: "який убив багатьох артилеристів."
  flavor_tur.46.ending: "Тепер ми повинні вирішити, чи потрібна нам ще одна величезна гармата, чи достатньо того, що Базиліка зруйнувала стіни Вавилона?"
  flavor_tur.46.a: "Великих гармат замало не буває."
  flavor_tur.46.b: "Краще переплавимо її на метал…"
  flavor_tur.46.historical_info: "Базиліка була неймовірно потужною гарматою, яка сильно перегрівалася під час стрільби. Вона зруйнувалася від власної віддачі через шість тижнів після виплавки. Проте за цей час вона послужила османам добру службу: з її допомогою турецькі артилеристи пробили міцні стіни Константинополя. Взяття міста поклало край Римській Імперії, що проіснувала 1500 років. Незабаром османи побудували ще одну бомбарду — Дарданелльську гармату. Їх не хвилювала ні ціна, ні потенційна вибухонебезпечність. З цієї гармати османи обстрілювали британський флот у 1807 році, тобто вона простояла на озброєнні понад 340 років."
  melted_great_bombard: "Останки великої бомбарди"
  flavor_tur.47.title: "Повелитель прикордоння"
  flavor_tur.47.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'відзначилася', 'відзначився' )] хоробрістю в прикордонних землях і [Select_CString(target_character.IsFemale, 'проявила', 'проявив' )] видатні полководницькі здібності. Ми можемо призначити [Select_CString(target_character.IsFemale, 'її Повелителькою', 'його Повелителем' )] прикордоння і таким чином наблизити до себе. \n\nВодночас подібне рішення безсумнівно викличе невдоволення значної частини знаті. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] можуть вважати це за чергову спробу нашої династії підірвати їхню владу."
  flavor_tur.47.a: "Зробимо що належить!"
  flavor_tur.47.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] теж що-небудь отримають на втіху."
  flavor_tur.47.c: "Поживемо — побачимо…"
  flavor_tur.47.historical_info: "Наділивши себе правом призначати повелителів прикордоння (удж беглері), Мурад I ще раз продемонстрував прикордонним газі, що його не влаштовує роль першого серед рівних."
  flavor_tur.48.title: "Барабани війни"
  flavor_tur.48.desc: "Оркестри Мехтер, що походять від шатрових майстрів і музикантів, давно посідають важливе місце в нашій культурі. Перший такий оркестр [GetCharacter('tur_osman').GetName] отримав від великого румського султана Кейкубада III у подарунок. Під час війни вони виконують музику біля шатра правителя, і всі встають на знак поваги до Кейкубада.\n\nОднак чи варто й далі вставати заради давно покійного султана? Ми й самі здобули велич. Можливо, настав час поберегти ноги? Хоча [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], що дотримуються старих традицій, можуть обуритися."
  flavor_tur.48.a: "Їм доведеться змиритися."
  flavor_tur.48.b: "Ні, ми продовжимо стояти."
  flavor_tur.48.historical_info: "Відмова османських правителів вставати під час виступу військового оркестру Мехтер наочно показала, що вони вважають себе кращими за інших, і ще сильніше відокремила їх від братів-кочівників."
  flavor_tur.49.title: "П'ята частина здобичі"
  flavor_tur.49.desc: "Згідно зі Священним Кораном, п'ята частина військової здобичі належить Аллаху, пророку, подорожнім та нужденним. #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L Турецький#!#! звичай також говорить, що п'яту частину здобичі отримує вождь, завдяки чому ми чимало збагатилися в недавніх походах. Раби традиційно не входять до п'ятої частини здобичі, однак з напливом #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! невільників після наших останніх завоювань варто включити їх до відповідної частини здобичі. І хоча таке рішення безумовно викличе обурення серед повелителів прикордоння, серед рабів повно молодих чоловіків, з яких можна сколотити власну гвардію і тим самим зменшити нашу залежність від цих князьків…"
  flavor_tur.49.a: "Вони наші по праву."
  flavor_tur.49.b: "Нехай раби залишаються при них."
  flavor_tur.49.historical_info: "За традицією п'яту частину військової здобичі завжди отримував лідер. Мурад I поширив цю норму і на рабів. Так з'явився податок пенчик. Деякі раби, що дісталися султану як трофеї, увійшли до полків капікулу (найвідоміші з них — яничарські), які виконували функцію гвардійських дивізій."
  flavor_tur.50.title: "[ROOT.GetCountry.GetGovernment.GetHeirTitle] та хуруфіти"
  flavor_tur.50.desc: "Хуруфіти, що оселилися в нашій державі, раніше не завдавали особливого занепокоєння, однак наші консервативно налаштовані [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] їх ненавидять, і що ще гірше, схоже, [ROOT.GetCountry.GetGovernment.GetHeirTitle] [heretic_heir.GetShortName] [Select_CString(heretic_heir.IsFemale, 'звернулася', 'звернувся' )] до деяких хуруфітів за настановами. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')], вражені самою думкою про те, що [Select_CString(heretic_heir.IsFemale, 'вона', 'він' )] навернеться в #TOOLTIP:RELIGION,shia_tt,X #L шиїзм#!#!, вимагають вирішити питання з хуруфітами, відправивши основних прихильників на вогнище."
  flavor_tur.50.a: "Спалимо всіх, а бог розбереться!"
  flavor_tur.50.b: "Нехай [heretic_heir.GetNameWithNoTooltip] самостійно знайде свій шлях до Аллаха."
  flavor_tur.50.historical_info: "Хуруфіти, яких пізніші літописці називали «нічого не вартими проклятими», увійшли в довіру до молодого султана Мехмета II, що дуже не сподобалося його візирові Махмуду-паші Ангеловичу. Він зупинив їхню діяльність в Едірне, наказавши спалити кількох невірних."
  flavor_tur.51.title: "Митне питання"
  flavor_tur.51.desc: "У міру завоювання нових портів ми змушені звернути увагу на те, що чуже нашому кочовому народу — море. У такому місці, як [port_location.GetName], нам знадобилися б умілі збирачі податків і суворіший контроль за стягненням митних зборів, а [GetCountry('GEN').GetName] — єдина країна, де ми зможемо найняти відповідних людей. Залучення цих чужинців зміцнило б уявлення про те, що наша держава відкрита для всіх, але викликало б невдоволення знаті, оскільки саме [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] раніше становили основний кістяк митарів."
  flavor_tur.51.a: "Нам потрібні всі фахівці!"
  flavor_tur.51.b: "Довіряти [GetCountry('GEN').GetAdjectiveWithNoTooltip|l]им купцям собі дорожче."
  flavor_tur.51.historical_info: "Судячи з усього, правителі молодої Османської держави залучали своїх друзів-генуезців для вирішення економічних та адміністративних питань. За часів правління Мурада I латинські (ймовірно, генуезькі) відкупники збирали митні збори в османських портах."
  flavor_tur.52.title: "Заборона анатолійської пшениці"
  flavor_tur.52.desc: "Багато західних купців неабияк розбагатіли на вивезенні нашої #TOOLTIP:GOODS,wheat,X #L пшениці#!#!, що вирощується на просторах #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Можливо, настав час покласти цьому край і подбати про забезпечення нашого народу та армії! Введення заборони на вивезення пшениці може зміцнити наше економічне становище та дозволить отримати додаткові важелі впливу в майбутніх угодах з іноземними торговцями."
  flavor_tur.52.a: "Жоден бушель не покине наші порти."
  flavor_tur.52.b: "Не будемо втручатися в справи купців."
  flavor_tur.52.historical_info: "Заборона Баязида I на вивезення зерна була досить незвичайним рішенням: у ті часи правителі рідко втручалися в справи купців. Не зовсім зрозуміло, які цілі він переслідував. Може, він хотів підірвати економіку своїх європейських ворогів або ж чекав поступок від могутніх купецьких республік — Генуї та Венеції."
  flavor_tur.53.title: "Вовки Егейського моря"
  flavor_tur.53.desc: "Відтоді як наша держава вперше опанувала узбережжям, підприємливі #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецькі#!#! акінджі залишили своїх коней і вирушили в море. Де б вони не з'явилися, чи то #TOOLTIP:PROVINCE_DEFINITION,aegean_sea_province,X #L Егейське море#!#!, чи #TOOLTIP:AREA,black_sea_area,X #L Чорне море#!#!, скрізь вони розоряли поселення та грабували кораблі, а назад привозили невільників та здобич. Але ми могли б перетворити простих піратів на щось більше — на нашу вигоду та на погибель нашим морським суперникам. Ми могли б надавати їм покровительство. Звісно, негласно."
  flavor_tur.53.a: "Нехай усі нас бояться!"
  flavor_tur.53.b: "Наш пріоритет — будівництво потужного флоту."
  flavor_tur.53.c: "Не будемо шкодити нашим торговим відносинам."
  flavor_tur.53.historical_info: "У XIV та XV століттях османи активно спонсорували піратів. Генуя та Венеція регулярно відправляли галери в Егейське море, щоб відстежити пересування турецьких суден. Туркам потрібен був сильний флот для захисту своїх володінь, розділених протокою Босфор, а поки його не було, вони використовували піратів, щоб підірвати позиції своїх суперників."
  flavor_tur.54.title: "Допомога піратів"
  flavor_tur.54.desc: "Ми суттєво поступаємося Візантії та Венеції, нашим давнім морським суперникам в Егейському морі. Принаймні, поки що.\n\nОднак, оскільки багато #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турків#!#! пов'язали своє життя з морем і зайнялися піратством під нашим прапором, ми могли б посилити наш флот, прийнявши частину цих морських розбійників на службу."
  flavor_tur.54.a: "Вони потрібні нам!"
  flavor_tur.54.b: "Їхні набіги приносять нам велику користь."
  flavor_tur.54.c: "Не можна довіряти цим свавільникам."
  flavor_tur.54.historical_info: "У ранній Османський період багато турків здійснювали набіги на острівні грецькі поселення, розташовані поблизу материкової частини Анатолії. Ймовірно, з часом піратство почало приносити непоганий прибуток. За свідченням одного очевидця, перед битвою з Тимуром виявилося, що багато людей вже зайняті підготовкою до морських експедицій."
  flavor_tur.55.title: "Фортеця [target_location.GetNameWithNoTooltip]"
  flavor_tur.55.desc: "Відтоді як ми опанували [target_location.Custom('LR_VP')|l] [target_location.GetName], стає все очевидніше, що це наш важливий плацдарм у Європі, оскільки протока тут вужча і через неї простіше переправитися. І хоча на півострові збереглося кілька старих невеликих фортів, нам слід було б звести більшу та потужнішу фортецю, щоб припинити будь-які напади з моря."
  flavor_tur.55.a: "Ми повинні її побудувати!"
  flavor_tur.55.b: "Це занадто дорого."
  flavor_tur.55.historical_info: "Іоанн Кантакузин передав османам фортецю Цимпа на півострові Галліполі в надії, що вони допоможуть йому у війні з іншими претендентами на візантійський трон. Незабаром султан зайняв більшу фортецю Галліполі. Так османи забезпечили собі надійний плацдарм у Європі. Для захисту гавані Баязид I наказав звести потужну берегову фортецю."
  tur_treathens_the_bosphorus: "Босфор під загрозою"
  flavor_tur.56.title: "Прибуття хуруфітів"
  flavor_tur.56.desc: "Хуруфійя — це зростаючий рух #TOOLTIP:RELIGION,shia_tt,X #L шиїтських#!#! містиків родом з Ірану. Останнім часом вони зіткнулися там з опором, тому строката група хуруфітських богословів шукає притулку в наших володіннях. Вони цікавляться каліграфією та нумерологією, і, можливо, не становлять небезпеки. Їхній ватажок на ім'я [hurufiyya_character.GetName] заявляє, що вони готові працювати на благо нашої держави. Однак деякі жителі нашої столиці [capital_location.GetName] вже навернулися в їхню віру…"
  flavor_tur.56.a: "Ми приймемо їх — поки що."
  flavor_tur.56.b: "Ми будемо їм тільки раді!"
  flavor_tur.56.c: "Нехай ці єретики повертаються туди, звідки прийшли."
  flavor_tur.56.historical_info: "Хуруфізм — містичний суфійський рух, який зародився в Ірані в 1370 році і швидко набув прихильників. Після того, як лідер хуруфітів Фазлуллах Астерабаді не зміг навернути в свою віру Тимура і був страчений, багато його послідовників втекли з Самарканда до Анатолії, Сирії та Єгипту."
  flavor_tur.56.b.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:RELIGION,shia_tt,X #L шиїтських#!#! [Concept('pops','груп населення')|e] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.56.c.tt: "Усі #TOOLTIP:RELIGION,shia_tt,X #L шиїтські#!#! [Concept('pops','групи населення')|e] втрачають [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction','задоволення')|e]"
  flavor_tur.57.title: "Повелитель дервішів"
  flavor_tur.57.desc: "[sufi_character.GetName], лідер зростаючого суфійського ордену під назвою #italic байраміє#!, чиє місце розташування — [target_location.GetName], приведений на суд до нашого двору. Певні впливові представники духовенства стверджують, що його вчення про мир і майбутнє є богохульством — але нам його слова здаються вірними..."
  flavor_tur.57.a: "Нам є чому в нього повчитися."
  flavor_tur.57.b: "Треба умилостивити духовенство."
  flavor_tur.57.c: "Давайте просто відішлемо його додому."
  flavor_tur.57.historical_info: "Хаджи Байрам Валі був впливовим суфійським містиком, чиє вчення проіснувало кілька століть. Місцева влада вважала доктрину тарикату, який вже привабив велику кількість послідовників, шкідливою та непатріотичною і відправила Хаджи Байрама до Мурада II. Султан був зачарований його промовами і дозволив йому читати лекції та проповіді при дворі."
  flavor_tur.58.title: "Кривавий острів"
  flavor_tur.58.desc: "Вражені рибалки розповідають нам про те, як держава [nemesis.GetName] стратила сотні [ROOT.GetCountry.GetAdjective]их військовополонених на острові в Егейському морі. Пощадили лише кількох бранців-#TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#!, які служили у нас з примусу. Один свідок описав моторошне видовище: трупи страчених звисають з шибениць, немов грона винограду з лози."
  flavor_tur.58.a: "Ще більше людей приєднаються до нас!"
  flavor_tur.58.b: "Ми клянемося помститися!"
  flavor_tur.58.historical_info: "Після великої перемоги над османським флотом у 1416 році венеційці привезли полонених на острів Тенедос, де по-звірячому розправилися з ними. Вижили тільки християни, які служили з примусу. Однак незабаром венеційці дізналися, що потужний флот — не гарантія вічного панування в Егейському морі."
  flavor_tur.59.title: "Озброєні безумці"
  flavor_tur.59.desc: "Лідери селянського стану скаржаться на поведінку іррегулярних частин башибузуків, якими ми укомплектували прикордонні гарнізони. Вони кажуть, що башибузуки грабують і розоряють не тільки землі ворогів, а й наших селян, що живуть біля кордону. Нещодавно стався вельми ганебний інцидент у регіоні [atrocity_location.GetName], де башибузуки, як стверджується, вчинили жахливі акти насильства проти трактирника та його родини. Розлючені ватажки селянства вимагають, щоб ми закликали до порядку всі башибузуцькі полки."
  flavor_tur.59.a: "На жаль, тут нічого не вдієш."
  flavor_tur.59.b: "Потрібно спробувати їх приборкати."
  flavor_tur.59.historical_info: "Башибузуки — військові загони, що складалися з національних меншин, переважно албанців та черкесів. Платні їм не платили, тому єдиною їхньою мотивацією були грабежі. Османські правителі часто вдавалися до їхніх послуг, але через те, що ці воїни нападали на мирних жителів, вони швидко здобули погану славу. У багатьох мовах слово «башибузук» стало синонімом «бандита»."
  flavor_tur.60.title: "Внутрішня служба"
  flavor_tur.60.desc: "Досвідчені раби-євнухи вже давно відіграють певну роль при нашому уряді, і в цих кастратах, які не мають амбіцій до продовження роду та офіційної влади, є чималий потенціал. При дворі зараз є кілька обдарованих хлопчиків-невільників. Ми могли б зміцнити їхні зв'язки з династією [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], давши їм, а не лизоблюдам-аристократам, формальні посади в нашому домі."
  flavor_tur.60.a: "Двір давно час реформувати."
  flavor_tur.60.b: "Ні, треба й далі покладатися на аристократів."
  flavor_tur.60.historical_info: "#italic Ендерун#! (від перського #italic «всередині»#!) — це група придворних, що входили до ближнього кола султана. Також в Османській імперії існувала «зовнішня служба» або #italic Бірун#!, яка відповідала за роботу державного механізму. В основному до Ендеруну входили євнухи та юні раби-християни. Переважно вони займалися обслуговуванням та навчанням імператорської родини, але з часом деякі з них набули значної політичної ваги."
  flavor_tur.61.title: "Хранителі таємниць"
  flavor_tur.61.desc: "На невільничий ринок регіону [capital_location.GetName] нещодавно надійшло кілька глухонімих чоловіків та жінок. Їх піднесли в дар двору султана. Ближнє коло тепер пропонує навчити їх і поставити на службу посланцями та шпигунами — а, можливо, ще й убивцями, якщо виникне така необхідність. Зрештою, хто не може говорити, не зможе видати наші таємниці..."
  flavor_tur.61.a: "По суті, чому б і ні?"
  flavor_tur.61.b: "Наш двір і так повний диваків…"
  flavor_tur.61.historical_info: "До ближнього кола султана входило безліч дивних особистостей. Гарний приклад — глухонімі дильсіз. Їм довіряли секрети та особливо важливі доручення. Вони часто були вартовими, супроводжуючими, посильними, а часом і катами. Незважаючи на свою німоту, багато дильсізів були грамотними і використовували свою власну мову жестів."
  flavor_tur.62.title: "Таємна мова"
  flavor_tur.62.desc: "Глухонімі при дворі спільно пустили свої спритні уми в діло і розробили нову мову жестів, яка дозволяє їм ефективно та безшумно спілкуватися один з одним. Тепер вони пропонують, щоб цій мові навчався і [target_ruler.GetName] — адже тоді вони зможуть так само ефективно та таємно спілкуватися і з самим володарем."
  flavor_tur.62.a: "Нехай володар починає практикуватися."
  flavor_tur.62.b: "Військові справи куди важливіші."
  flavor_tur.62.tt: "Заняття принесуть плоди вже за кілька місяців."
  flavor_tur.62.historical_info: "Ми мало що знаємо про османську жестову мову, яку також називали жестовою мовою гарему. Найімовірніше, вона була дуже складною і широко використовувалася при дворі, де мовчазність вважалася головною чеснотою. Осман II вивчив мову жестів і закликав придворних, що чують, наслідувати його приклад."
  flavor_tur.63.title: "Цезар Риму"
  flavor_tur.63.desc: "[ShowLocationName('constantinople')], овіяний славою стародавнього світу, тепер наш, а [GetCountry('BYZ').GetName] відтепер не існує. Ми можемо по праву взяти собі титул #italic кайсері Рум#!, «цезар Риму», хоч би як противилися тому лжепретенденти. Римляни й подумати колись не могли, що їхню імперію успадкує народ, що прийшов із землі їхніх давніх ворогів — з Ірану."
  flavor_tur.63.a: "Тепер цей титул наш!"
  flavor_tur.63.b: "Святкування перемоги буде достатньо."
  flavor_tur.63.historical_info: "Після завоювання Константинополя султан Мехмед II присвоїв собі титул цезаря, чим дуже розлютив західних християн. Однак православна церква визнала його право на це звання. Для османів цей титул мав радше символічне значення — принаймні, до завоювання Єгипту: після цього османи хотіли, щоб мусульманський світ сприймав їх як халіфів."
  not_the_real_rome: "Несправжній Рим"
  flavor_tur.64.title: "Обрізка сімейного дерева"
  flavor_tur.64.desc: "При дворі ходять чутки, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не має права претендувати на владу, у ближньому ж колі чути обережні розмови про те, що під удар зараз поставлено безпеку всієї держави. Євнухи точать свої кинджали й пропонують дозволити їм зробити так, щоб [ambitious_brother.GetName], потенційно один з основних претендентів на трон, перестав становити загрозу."
  flavor_tur.64.a: "Це все заради блага нашої країни!"
  flavor_tur.64.b: "Ми не можемо так вчинити…"
  flavor_tur.64.historical_info: "Багато мусульманських правителів стикалися з проблемою престолонаслідування через полігамію та розпливчасті закони, і османи — не виняток. У ті часи громадянські війни між братами були звичайним явищем. Згодом потенційних наступників ув'язнювали в #italic кафесе#!, щоб вони не могли кинути виклик государю, але в ранній період братовбивство було поширеною практикою. Наприклад, султан Мехмет III позбавив життя 19 своїх братів."
  flavor_tur.65.title: "Рід [nasrid_ruler.GetDynasty.GetNameWithNoTooltip] просить про допомогу"
  flavor_tur.65.desc: "[nasrid_ruler.GetName], [Select_CString(nasrid_ruler.IsFemale, 'правителька', 'правитель' )] #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_RP')|L]#!#!, не може впоратися з військовою міццю #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_RP')|L]#!#! і просить нашої допомоги. [nasrid_ruler.GetName] править залишками славетної #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! цивілізації Аль-Андалус, де колись жили й творили великі мислителі найрізноманітніших шкіл. Наші брати по вірі запитують — невже все це було марно?"
  flavor_tur.65.a: "На жаль, ми нічим не можемо допомогти."
  flavor_tur.65.tt: "Держава [GetCountry('GRA').GetNameWithNoTooltip] отримає наші найкращі побажання."
  flavor_tur.65.b: "Держава [GetCountry('CAS').GetNameWithNoTooltip] пошкодує про своє рішення!"
  flavor_tur.65.historical_info: "Насріди, правителі Гранадського емірату, відправили своїх послів до османів і мамлюків, просячи про допомогу у війні з Кастилією. Османи й мамлюки, однак, загрузли у війні між собою, тому не могли надати жодної суттєвої підтримки на полі бою. Проте турки задіяли свій флот, який під командуванням Кемаль-реїса почав влаштовувати набіги на кастильські володіння в західному Середземномор'ї, а надалі допомагав перевозити мусульманських біженців з Іспанії."
  flavor_tur.66.title: "Порушення недоторканності вакфів"
  flavor_tur.66.desc: "Реформа, яку ми здійснили, щоб перенаправити прибуток від вакфів і фінансувати з неї систему тимаріотів, виявилася вельми непопулярною. Лідери духовенства стверджують, що ми збезчестили як державу, так і династію, ганебні чутки розійшлися так широко, що тепер ображені навіть селяни. Нам час повернути реформу назад, інакше, нерівна година, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не всидить на троні."
  flavor_tur.66.historical_info: "Спроба Мехмеда II зміцнити тимарну систему та знизити вплив улемів за допомогою вакфів була визнана незаконною з точки зору ісламського права. Ця реформа викликала хвилю невдоволення і була скасована після смерті Мехмеда II у 1481 році його сином Баязидом."
  flavor_tur.66.a: "Терміново скасуємо його!"
  flavor_tur.66.b: "Хабарі потрібним людям вирішать проблему…"
  flavor_tur.66.c: "Будемо дотримуватися обраного курсу."
  flavor_tur.67.title: "Перший серед духовенства"
  flavor_tur.67.desc: "[target_character.GetName] — вельми шанований релігійний вчений, вже призначений каді з питань армії. Ми можемо піднести його ще вище, давши йому титул з давніх часів — шейх-уль-іслам. Такий титул отримували видатні тлумачі Корану. Якщо його здобуде [target_character.GetShortNameWithNoTooltip], ми проголосимо новий час ісламу, де високопоставлений духівник працює спільно з урядом, наглядаючи за справами віри. Інша річ, що багато інших представників духовенства можуть вважати це викликом їхній автономії..."
  flavor_tur.67.historical_info: "Перевизначення почесного титулу шейха-уль-іслам відбувалося поступово. Видатні теологи та тлумачі шаріату, такі як Шемсюддін-і Фенарі, спершу призначалися каді у військових справах, потім титул став асоціюватися з високим постом муфтія. В османів, зрозуміло, був особистий інтерес гарантувати собі лояльність релігійних діячів."
  flavor_tur.67.a: "[target_character.GetShortNameWithNoTooltip] ідеально підходить на цей пост!"
  flavor_tur.67.b: "Це не наша відповідальність. Ми не боги."
  flavor_tur.68.title: "Спірне призначення"
  flavor_tur.68.desc: "[target_character.GetName] — суфійський містик, шанований багатьма селянами, і просто прекрасна людина. Давши йому пост шейха-уль-іслам, ми зробимо крок до формалізації ієрархії духовенства, а [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] стануть ближчими до вирішення питань фетв — але консервативні теологи в жаху від однієї думки про те, щоб дарувати такий титул суфію."
  flavor_tur.68.historical_info: "Призначення на пост шейха-уль-іслам могли бути непопулярними в масах, особливо якщо титул отримували члени суфійських орденів. Мурад IV призначив свого часу Зекерию-заде Ях'ю-ефенді, який був дуже здібною людиною, але в підсумку загруз у незліченних палацових інтригах і тисячі людей вирушили маршем до палацу, вимагаючи його страти. Втім, у підсумку мудрець прожив довге життя."
  flavor_tur.68.a: "І все ж саме він — найкращий кандидат."
  flavor_tur.68.b: "Гаразд, знайдемо когось іще…"
  flavor_tur.69.title: "$common_string_shaikh_al_islam$"
  flavor_tur.69.desc: "Настав час оголосити звання шейха-уль-іслам офіційною державною посадою з найвищою владою над виданням фетв, призначенням муфтіїв та іншими справами віри. Так ми з одного боку зміцнимо [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')], з іншого — гарантуємо, що його інтереси не розходяться з інтересами держави."
  flavor_tur.69.historical_info: "Османи прагнули до формалізації ієрархії улемів, для чого відродили титул «шейх-уль-іслам», що з'явився у Східному Ірані, і зробили його найвищим релігійним званням імперії, потенційно другим за значимістю, після султана. Відносини шейхів-уль-іслам з владою були взаємовигідні: шейх призначався султаном і затверджував наступного султана на правління після смерті поточного."
  flavor_tur.69.a: "Закріпимо це в законі!"
  flavor_tur.69.b: "Потрібно більше покладатися на духовенство."
  flavor_tur.69.c: "Потрібно повністю дистанціюватися від справ духовенства."
  flavor_tur.70.title: "[kemal_reis.GetNameWithNoTooltip]"
  flavor_tur.70.desc: "[kemal_reis.GetName], до сьогодні — невеликий флотський командир на базі [naval_base.GetName], провів чимало успішних битв, хоча частина з них і були каперськими операціями, які нам не слід обговорювати відкрито. Наші радники тепер рекомендують підвищити його до адмірала і побудувати йому відповідний званню флагман."
  flavor_tur.70.historical_info: "Ахмет Кемаледдін, відомий як Кемаль-реїс, — османський капер, який пізніше став адміралом і брав участь у безлічі битв. У свою першу морську експедицію він вирушив під час падіння Гранади. Пізніше він брав участь у турецько-венеційських війнах. Крім того, він був дядьком легендарного картографа Пірі-реїса, який супроводжував його в багатьох подорожах."
  flavor_tur.70.a: "Підвищити його!"
  flavor_tur.70.b: "У нас і так достатньо адміралів."
  heavy_ship_construction: "Створення важкого корабля"
  flavor_tur.71.title: "[kemal_reis.GetNameWithNoTooltip] гине"
  flavor_tur.71.desc: "Жахливі новини! Під час переходу через Егейське море корабель, на якому знаходився [kemal_reis.GetName], потрапив у жахливий шторм і перекинувся. Пізніше корабель бачили біля берегів регіону [ShowLocationNameWithNoTooltip('naxos')] — і, на жаль, ніхто на ньому не вижив."
  flavor_tur.71.historical_info: "Після яскравої кар'єри, де були битви з іспанцями, венеційцями та лицарями Мальтійського ордену, Кемаль-реїс зустрів свою смерть у штормі у Східному Середземномор'ї. Він вів флот, що перевозив припаси для мамлюків, які воювали з португальцями, але більше половини цього флоту погубив шторм, зокрема і його власний корабель."
  flavor_tur.71.a: "Ми збудуємо корабель на його честь."
  flavor_tur.71.b: "Організуємо пишні похорони."
  flavor_tur.71.c: "Та кому яке діло?"
  flavor_tur.72.title: "[piri_reis.GetNameWithNoTooltip]"
  flavor_tur.72.desc: "[piri_reis.GetName], чий родич — наш давній флотський командир [GetCharacter('tur_kemal_reis').GetName] — колишній капер і досвідчений навігатор, цілком гідний підвищення. Він також захоплюється картографією і жваво цікавиться недавніми відкриттями нових земель за Західним океаном, але каже, що займається цим лише на дозвіллі і волів би служити нам адміралом, а не дослідником."
  flavor_tur.72.historical_info: "Ахмет Мухіддін Пірі, більш відомий як Пірі-реїс, — знаменитий османський картограф і адмірал, який бився з португальцями в Перській затоці. Він також склав #italic «Кітаб-і-бахріє»#! або «Книгу морів» — найважливіший атлас того періоду."
  flavor_tur.72.a: "Значить бути йому адміралом."
  flavor_tur.72.b: "Нам згодиться будь-який дослідник."
  flavor_tur.73.title: "Складання карти світу"
  flavor_tur.73.desc: "[piri_reis.GetName] останнім часом зайнятий написанням праці #italic «Кітаб-і-бахріє»#!, великого збірника карт, в якому описані як нові відкриття, зроблені європейцями за Західним морем, так і описи східних океанів персами, індійцями та китайцями. У цій великій книзі також зібрані нотатки з навігації, астрономії, різних штормів та звичаїв місцевих народів."
  flavor_tur.73.historical_info: "Незважаючи на те, що Пірі-реїс ніколи не перетинав Атлантику, він був плідним картографом, який склав безліч карт. У своїй роботі він покладався на нові відкриття португальців та іспанців, а також черпав знання з давніх арабських джерел. У 1929 році у палаці Топкапи було знайдено фрагмент карти його авторства. На даний момент це найстаріша ісламська карта із зображенням Нового Світу."
  flavor_tur.73.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_tur.74.title: "Егейське питання"
  flavor_tur.74.desc: "Наша держава, розділена між Румелією та Анатолією, більше не може терпіти ворога на острові [contested_island.GetName]. [evil_nemesis.GetName] повинні зникнути! Цей острів слугує не лише військовою базою, з якої вони можуть атакувати наші кораблі, а й притулком для втікачів-рабів, на що постійно скаржаться, закликаючи нас до дії, работорговці. Вибору у нас не залишилося — ми #italic зобов'язані#! захопити Егейське море."
  flavor_tur.74.historical_info: "На початку свого правління Мурад II виявив, що острівні володіння його ворогів венеційців, генуезців та ордену госпітальєрів загрожують його міжконтинентальній державі. На цих островах оселилися корсари та каталонські пірати, які постійно нападали на османських купців та мандрівників. Тому він вирішив розпочати завойовницьку кампанію в Егейському морі."
  flavor_tur.74.a: "Час готуватися до війни!"
  flavor_tur.74.b: "Посилимо підтримку піратів."
  flavor_tur.74.c: "Морські справи нас втомили."
  flavor_tur.75.title: "Дзеркало божої волі"
  flavor_tur.75.desc: "[target_character.GetName] постійно бачив один і той самий зловісний сон і попросив кількох суфійських містиків витлумачити його. Тепер [target_character.GetShortNameWithNoTooltip] вважає, що знаки зрозумілі — він повинен зректися престолу. Відтепер правитиме [target_heir.GetName] — на те воля Аллаха, як стверджує [target_character.GetName]."
  flavor_tur.75.historical_info: "Як і перси, османи надавали великого значення сновидінням. У біографіях теологів XV та XVI століть часто згадуються сни, які надихнули змінити професію. Їх розглядали як дзеркала таємного світу, вдивляючись у які можна пізнати божу волю. Звісно, зречення Мурада II мало й інші, прагматичні причини, але зловісний сон зміцнив його в думці про правильність цього рішення."
  flavor_tur.75.a: "Не будемо противитися волі божій."
  flavor_tur.75.b: "Ні, він повинен залишитися на троні."
  tur_abdicate_throne_tt: "$ser_abdicate_throne_tt$"
  flavor_tur.76.title: "Краси міста [beautiful_city.GetNameWithNoTooltip]"
  flavor_tur.76.desc: "Письменник, що народився у місті [beautiful_city.GetName], присвятив велику поему його природній, архітектурній та історичній красі — але також описав у поемі красу міських юнаків у манері, яку можна вважати непристойною. Подібні вірші зараз широко розповсюджені, і серед духовенства все гучніше лунають голоси за їх заборону. Суфійські містики, з іншого боку, стверджують, що автор просто захоплюється красою божого творіння."
  flavor_tur.76.historical_info: "Шехренгіз або «Збуджуюче місто» — жанр османської поезії, що вихваляє пишність міст. Один із таких віршів був присвячений візиту Баязида II до Едірне. Цей жанр також відомий пристрасними описами краси місцевих юнаків, тому деякі дослідники вважають його частиною тюрко-перської гомоеротичної традиції."
  flavor_tur.76.a: "Будь-яка краса гідна захоплення."
  flavor_tur.76.b: "Потрібно стратити автора."
  flavor_tur.76.c: "Наші закони про цензуру недостатньо суворі."
  flavor_tur.77.title: "Слова жінки"
  flavor_tur.77.desc: "[mihri_hatun.GetName], поетеса з Амасьї, стала відомою у певних літературних колах, до одного з яких опосередковано причетний і [target_heir.GetName]. Жінки при дворі вважають, що [target_heir.GetShortNameWithNoTooltip] міг би багато чого навчитися у чудової поетеси, духовенство ж вважає такий зв'язок недоречним і закликає негайно його припинити."
  flavor_tur.77.historical_info: "Міхрі-хатун — вигадане ім'я Міхрініси, дочки кадія Белайї (поетичний псевдонім), що теж захоплювався віршуванням. Міхрі входила до літературного гуртка принца Ахмета, сина Баязида II, в Амасьї. Вона писала #italic касиди#! (оди) та #italic газелі#! (романтичні вірші) і заслужила велику повагу за життя."
  flavor_tur.77.a: "Не бачимо нічого осудливого."
  flavor_tur.77.b: "Такий талант потрібен нам при дворі."
  flavor_tur.77.c: "Краще заборонимо листування."
  flavor_tur.78.title: "Розлив Нілу"
  flavor_tur.78.desc: "Тепер ми контролюємо регіон [ShowRegionName('egypt_region')] і можемо отримати чималу вигоду від цієї житниці імперій — але необхідно враховувати розливи Нілу. Ця стародавня земля споконвіку покладається на складну зрошувальну систему, що перебуває у крихкій рівновазі з навколишньою пустелею. Треба забезпечити державний контроль над цією системою, а також налагодити масштабні поставки деревини — її Єгипту сильно бракує."
  flavor_tur.78.historical_info: "Протягом усієї історії люди намагалися запобігти повеням, викликаним розливом Нілу. Після завоювання Єгипту османи практично не втручалися в місцеву систему управління, але якби стародавні іригаційні системи вийшли з ладу, вони б не змогли забезпечити свою імперію зерном, тому за їх збереженням стежили османські наглядачі."
  flavor_tur.78.a: "Тут потрібен державний контроль."
  egyptians_displeased_tooltip: "[Concept('pop_satisfaction','Задоволення ')|e] всіх нижньоєгипетських [Concept('pops','груп населення')|e] у регіоні [ShowRegionName('egypt_region')] знизиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.78.b: "Місцеві самі розберуться."
  egyptians_pleased_tooltip: "[Concept('pop_satisfaction','Задоволення ')|e] всіх нижньоєгипетських [Concept('pops','груп населення')|e] у регіоні [ShowRegionName('egypt_region')] підвищиться на [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%]."
  wood_for_egypt: "Дерево для Єгипту"
  flavor_tur.79.title: "Арабські салони"
  flavor_tur.79.desc: "Тепер, коли в нашій імперії зросла кількість тих, хто говорить #TOOLTIP:LANGUAGE,arabic_language,X #L арабською#!#! мовою, нашим вченим стає все важче брати участь у зібраннях, що проводяться в арабомовних містах. Такі зібрання дуже важливі для інтелектуальних дискусій, але, як виявилося, вченим, вихованим у #TOOLTIP:CULTURE,turkish_culture_tt,X #L турецькій#!#! культурі, важко спілкуватися високою #TOOLTIP:LANGUAGE,arabic_language,X #L арабською#!#! мовою, необхідною для прийому в таке середовище. Вчені скаржаться, що таке нерозуміння призводить до незручних ситуацій."
  flavor_tur.79.historical_info: "Інтелектуальні салони, де збиралися та дискутували вчені, були невід'ємною частиною мусульманського світу та користувалися великим престижем. Після завоювання Єгипту та Леванту турецькі вчені зіткнулися з серйозною проблемою: їм було складно стежити за ходом обговорень через погане знання арабської мови."
  flavor_tur.79.a: "Рано чи пізно вони її вивчать."
  flavor_tur.79.b: "Треба як слід навчити їх говорити арабською."
  flavor_tur.79.c: "Потрібно почати говорити арабською при дворі."
  flavor_tur.80.title: "Плацдарм у регіоні [ShowRegionNameWithNoTooltip('italy_region')]."
  flavor_tur.80.desc: "Провінція [target_province.GetName] — стратегічно важливий район, який дозволить нам як закріпитися в #TOOLTIP:REGION,italy_region,X #L Італії#!#!, так і почати оскаржувати протоку Отранто. Якщо ми хочемо колись підкорити #TOOLTIP:LOCATION,$rome_tt$,X #L Рим#!#! та здобути всю славу давніх імператорів, треба почати з того, щоб вирвати провінцію [target_province.GetNameWithNoTooltip] з негідних рук держави [target_country.GetName].\n\nСпершу, втім, слід переконатися, що у нас для цього достатньо кораблів..."
  flavor_tur.80.historical_info: "Після завоювання Константинополя османські султани завзято відстоювали своє право називатися римськими імператорами та використовували цей титул як привід для нападу на Західну Європу. У 1479 році відносини між османами та венеціанцями покращилися, і Мехмет II вирішив заручитися їхньою підтримкою, щоб вторгнутися в Неаполітанське королівство та закріпитися на півдні Італії."
  flavor_tur.80.a: "Запропонувати нечестивий союз із державою [GetCountry('VEN').GetNameWithNoTooltip]."
  flavor_tur.80.b: "Негайно почнемо підготовку."
  flavor_tur.80.c: "Зараз не час."
  flavor_tur.81.title: "[GetCountry('VEN').GetAdjectiveWithNoTooltip]а підтримка"
  flavor_tur.81.desc: "Держава [GetCountry('VEN').GetName] вирішила підтримати нас, але лише м'якими, якщо не сказати беззубими дипломатичними методами, оголосивши, що ми маємо повне право на захоплення провінції [target_province.GetName]. Проте, це може стати кроком до здобуття в майбутньому нового, зручного союзника..."
  flavor_tur.81.historical_info: "Хоча зрештою синьйорія відхилила пропозицію османів про союз, венеціанці спробували запевнити Мехмеда II, що не будуть проти завоювання Отранто, Бриндізі та Таранто. Важко сказати, наскільки це вплинуло на його рішення висадитися в Італії: він уже давно виношував цю ідею."
  flavor_tur.81.a: "Дотримуємося початкового плану!"
  flavor_tur.81.b: "Може, варто змінити своє рішення?"
  flavor_tur.82.title: "Лев і півмісяць"
  flavor_tur.82.desc: "Держава [GetCountry('VEN').GetName] вирішила підтримати нас повністю і підписати договір про укладення союзу, допомагаючи нам перемогти християн. Зрозуміло, венеціанці планують скористатися цим для своєї вигоди, але така природа всіх союзів. Так чи інакше, альянс дуже допоможе нам реалізувати свої амбіції в #TOOLTIP:REGION,italy_region,X #L Італії#!#!."
  flavor_tur.82.a: "Чудово."
  flavor_tur.83.title: "Рішуча відмова"
  flavor_tur.83.desc: "Держава [GetCountry('VEN').GetName] відмовилася від нашої пропозиції і ясно дала зрозуміти, що ніколи не підтримає домагання #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульман#!#! на #TOOLTIP:REGION,italy_region,X #L Італію#!#!. Очевидно, що якщо ми хочемо реалізувати наші італійські амбіції, робити це потрібно без їхньої допомоги."
  flavor_tur.83.a: "Так і вчинимо."
  flavor_tur.83.b: "$flavor_tur.81.b$"
  flavor_tur.84.title: "Мистецтво Італії"
  flavor_tur.84.desc: "В #TOOLTIP:REGION,italy_region,X #L Італії#!#! стрімко розвивається мистецтво, багато придворних зацікавилися прекрасними портретами та скульптурами італійських майстрів. Держава [target_country.GetName] бажає покращити відносини з династією «[target_character.GetDynasty.GetName]» і пропонує, щоб [artist_character.GetName], [Select_CString(artist_character.IsFemale,'велика художниця, вирушила ', 'великий художник, вирушив')] до нас і [Select_CString(artist_character.IsFemale,'служила, вирушила ', 'служив')] у нас свого роду послом їхньої культури. А ще, зрозуміло, [Select_CString(artist_character.IsFemale,'малювала, малював', 'служив')] портрети, на яких буде [target_character.GetName]."
  flavor_tur.84.a: "Ми з радістю приймемо [Select_CString(artist_character.IsFemale,'її', 'його')] у себе."
  flavor_tur.84.b: "Замість цього треба просувати турецьку культуру."
  flavor_tur.84.historical_info: "Мехмет II виявляв жвавий інтерес до культури та традицій Італії та хотів, щоб його намалював італійський художник. Після підписання мирного договору в 1479 році венеціанці відправили до османського двору відомого художника Джентіле Белліні. У підсумку він не тільки написав портрет султана, який зберігся до наших днів, а й привніс у західний живопис елементи східної традиції."
  flavor_tur.85.title: "Історичне питання"
  flavor_tur.85.desc: "[ahmed_azikpazade.GetName], ветеран та учасник багатьох військових походів, закінчив роботу над великою працею з історії імперії. Серед таких, як він, зараз спостерігається зростаючий інтерес до історій, написаних давніми грецькими мудрецями, та до їхньої методики складання хронік, яку можна застосувати для літописання династії «[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]».\n\nАле чи можемо ми довірити цій людині таке відповідальне завдання?"
  flavor_tur.85.a: "Навряд чи ці книги нам зашкодять."
  flavor_tur.85.b: "Ця людина повинна працювати на нашій держслужбі."
  flavor_tur.85.c: "$flavor_tur.76.c$"
  flavor_tur.85.d: "Спалимо ці книги."
  flavor_tur.85.historical_info: "Перші османські історики з'явилися у XV столітті. Деякі (наприклад, Ашикпашазаде) були колишніми солдатами, які вирішили на схилі своїх днів взятися за мемуари та хроніки Османської держави, де вони докладно описували події, в яких самі брали участь. Нешрі вивчав турецькі та європейські джерела і в підсумку створив «Космораму» — перший турецький історико-географічний опис світу, який ліг в основу багатьох пізніших праць."
  flavor_tur.86.title: "Практика — шлях до досконалості"
  flavor_tur.86.desc: "Під чуйним наставництвом кількох глухонімих придворних [target_ruler.GetName] вивчив основи гаремної мови жестів. Таке вміння дуже допоможе в різних дипломатичних і таємних справах, а також, можливо, посприяє тиші у зазвичай гамірних палацових залах."
  flavor_tur.86.a: "Чудово."
  flavor_tur.86.historical_info: "Часом при османському дворі служило кілька десятків глухонімих. Багато придворних заходів проходили в повній тиші, оскільки на них використовувалася особлива мова жестів. Знання цієї мови також допомагало зрозуміти тонкі нюанси палацової культури: наприклад, глухонімі придворні могли відпускати в розмові з султаном жарти, які було непристойно вимовляти вголос."
  flavor_tur.87.title: "Дослідник небес"
  flavor_tur.87.desc: "[herat_ruler.GetName], правитель регіону [ShowLocationName('herat')], відправив делегата ([ali_qushji.GetName]) до двору династії «[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]». [ali_qushji.GetNameWithNoTooltip] — прославлений астроном, який довго працював у великій обсерваторії в далекому Самарканді та написав книгу про небесний шлях Місяця. Тепер, коли його дипломатична місія закінчена, він сподівається залишитися в місті [capital_location.GetName] зі своїми синами та послідовниками і служити там науці під нашим заступництвом."
  flavor_tur.87.a: "Звісно, нехай залишаються."
  flavor_tur.87.b: "Нам не потрібен придворний астроном…"
  flavor_tur.87.c: "Нехай повертаються до Ірану."
  ali_qushji_settles.tooltip: "[ali_qushji.GetNameWithNoTooltip] поселяється в місті [capital_location.GetNameWithNoTooltip]."
  flavor_tur.87.historical_info: "Після вбивства короля-астронома Улугбека вчені, які працювали в його обсерваторії, розбрелися по всьому світу. Алі аль-Кушчі дізнався про те, що Мехмед II прихильний до вчених, і погодився стати делегатом володаря Герата при османському дворі. Кушчі був прихильником емпіричної астрономії, заснованої на математиці, і відкидав аристотелівські ідеї, що лежали в основі давньої ісламської астрономії. Деякі його нащадки стали видатними астрономами Константинополя."
  flavor_tur.88.title: "Створення гарему"
  flavor_tur.88.desc: "З давніх часів двір династії «[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]» розподілений по різних палацах і посадах. Якщо ми дійсно прагнемо величі, треба зосередити свою владу і присутність у місті [capital_location.GetName]. Для цього потрібно перевезти туди всіх наложниць султана і поселити їх там у розкішному житлі.\n\nЗвісно, знаті такий крок здасться відвертою агресією — адже ми позбавимо аристократів їхнього давнього особистого привілею, прямого доступу до султана."
  flavor_tur.88.a: "Створимо султанський гарем."
  flavor_tur.88.b: "Ми цілком задоволені нашим двором."
  flavor_tur.88.historical_info: "У XVI столітті правляча османська родина оселилася в константинопольському палаці Топкапи, і багато її членів, особливо жінки, проводили там усе своє життя. Це призвело до перетворення гарему на ефективний ієрархічний інститут. Оскільки османські монархи тепер жили в усамітненні, доступ до них став великим привілеєм, що тільки зміцнювало їхню владу."
  flavor_tur.89.title: "Втручання у справи регіону [ShowAreaNameWithNoTooltip('crimea_area')]"
  flavor_tur.89.desc: "Занадто довго ми не звертали уваги на Кримський півострів, який з незапам'ятних часів є стратегічно важливим районом і центром работоргівлі. Ходять чутки, що влада #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#! завербувала #L #L [rival_country.GetAdjective|l]#!их#! найманців, щоб обороняти свої кримські володіння в районі [crimea_location.GetName] від тамтешніх кочівників. Поки неясно, правдиві чутки чи ні, але в будь-якому разі це може означати, що влада [rival_country.Custom('CL_RP')] планує забезпечити собі в майбутньому плацдарм на цьому півострові, чого ми допустити не можемо. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] пропонує використати те, що сталося, як привід для нападу."
  flavor_tur.89.a: "Розпочати приготування до захоплення регіону [crimea_location.GetNameWithNoTooltip]."
  flavor_tur.89.b: "Наша дружба з державою [target_country.GetNameWithNoTooltip] занадто важлива."
  flavor_tur.89.c: "Дочекаємося більш слушного моменту."
  flavor_tur.89.historical_info: "У середині XV століття Крим був розділений між Генуєю та Кримським ханством, а на півночі межував із Польським королівством. Коли в 1462 році влада генуезьких колоній звернулася по допомогу до польських найманців, Мехмед II занепокоївся, що поляки можуть захопити півострів. У 1475 році османи завоювали Крим: частина земель перейшла до них у пряме підпорядкування, а частина потрапила у васальну залежність. Так тривало кілька століть."
  flavor_tur.90.title: "Захист степів"
  flavor_tur.90.desc: "Кочівники держави [crimean_country.GetName], що живуть поруч із нашими #TOOLTIP:AREA,crimea_area,X #L кримськими#!#! володіннями — досвідчені вершники та воїни, а їхні регулярні набіги на сусідів-#TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#! роблять кочівників важливими учасниками ринку невільників, що простягнувся до самої Бухари в Хорасанському регіоні. Тепер наші посланці говорять нам, що держава [crimean_country.GetNameWithNoTooltip] готова стати нашим протекторатом, якщо ми за це відправимо їй вантаж срібла та своїх солдатів для допомоги у війнах."
  flavor_tur.90.a: "Відправимо їм пропозицію."
  flavor_tur.90.b: "Почнемо підготовку до захоплення."
  flavor_tur.90.c: "У нас і вдома турбот вистачає."
  flavor_tur.90.historical_info: "Незабаром після османського вторгнення до генуезьких міст Криму Кримське ханство, ослаблене кризою престолонаслідування, здалося ворогу. З того часу кримські татари постачали османам досвідчених наїзників і, що головне, рабів, захоплених у набігах. Османи, своєю чергою, забезпечили татарам найсприятливіші умови, визнали їх нащадками Чингіз-хана і поводилися з ними швидше як із союзниками, а не підданими — але з часом усе змінилося..."
  crimean_vassalage_guaranteed_chance_tooltip: "Завдяки нашим добрим відносинам держава [crimean_country.GetNameWithNoTooltip] прийме цю угоду."
  crimean_vassalage_decent_chance_tooltip: "Є добрі шанси, що держава [crimean_country.GetNameWithNoTooltip] прийме цю угоду."
  crimean_vassalage_low_chance_tooltip: "У зв'язку з нашими поганими відносинами держава [crimean_country.GetNameWithNoTooltip] з високою ймовірністю відхилить цю угоду."
  crimean_vassalage_very_low_chance_tooltip: "У зв'язку з нашими поганими відносинами держава [crimean_country.GetNameWithNoTooltip] з дуже високою ймовірністю відхилить цю угоду."
  crimean_slave_trade_encouraged: "Підтримка работоргівлі в Криму"
  flavor_tur.91.title: "Жахлива подія"
  flavor_tur.91.desc: "Нашу державу спіткала важка втрата. [tur_suleyman_scope.GetName] загинув на соколиному полюванні в землях регіону [location_scope.GetName]. Щось злякало коня, той поніс і султан, упавши з нього, розбився на смерть.\n\nНаш народ вражений і пригнічений раптовою смертю володаря, країна зазнала великої втрати."
  flavor_tur.91.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_tur.91.b: "Вшануймо його пам'ять. Людям це сподобається."
  flavor_tur.92.title: "[mimar_sinan.GetNameWithNoTooltip] та його великі роботи"
  flavor_tur.92.desc: "З того часу, як ми взяли його на службу, [mimar_sinan.GetName] працює, не перестаючи: будує незліченні дороги, мости, громадські будівлі; він виховав ціле нове покоління архітекторів. Зараз, однак, зодчий просить у нас ресурсів під більші проєкти. Якщо ми зробимо його імперським архітектором, він зможе зводити мечеті та палаци, подібних до яких світ не бачив з часів Ктесифона, Вавилона та Риму."
  flavor_tur.92.historical_info: "За свою півстолітню кар'єру блискучий архітектор Мімар Синан побудував понад 300 будівель, серед яких мечеті, акведуки, лазні, мости, палаци, караван-сараї та школи. Його мечеті Селіміє в Адріанополі та Сулейманіє в Константинополі — видатні пам'ятки османського зодчества, які досі вражають своєю красою."
  flavor_tur.92.a: "Він отримає все, що йому потрібно."
  flavor_tur.92.b: "Нам є на що витратити гроші."
  flavor_tur.93.title: "Тюльпанове божевілля"
  flavor_tur.93.desc: "В одному з [ROOT.GetCountry.GetGovernment.GetAdjective]их садів, яким володіє [target_ruler.GetName], розцвіла прекрасна біла квітка. Це тюльпан, колись рідкісний у наших краях, але давно оспіваний поетами Персії. Багато аристократів були зачаровані тюльпанами і стали вирощувати їх у власних садах. Є ймовірність, що іноземні сановники при дворі нашого правителя будуть раді отримати тюльпани в подарунок."
  flavor_tur.93.historical_info: "Вперше тюльпани почали вирощувати в Ірані приблизно в 1000 році. Ці квіти стали популярні серед османських дворян за часів правління Сулеймана Пишного — великого шанувальника садів. Тюльпани використовували для прикраси тюрбанів, а їх зображення красувалися на килимах і кераміці. Є версія, що західні дипломати побачили тюльпани в османських садах і привезли їх до Європи."
  flavor_tur.93.a: "Потрібно більше цих прекрасних квітів!"
  flavor_tur.93.b: "Зосередимося на військових цілях."
  flavor_tur.94.title: "[moses_hamon.GetNameWithNoTooltip] і його блискучий розум"
  flavor_tur.94.desc: "[moses_hamon.GetName] — досвідчений #TOOLTIP:RELIGION,judaism_tt,X #L юдейський#!#! вчений і лікар родом з #TOOLTIP:LOCATION,granada_tt,X #L Гранади#!#!. [target_ruler.GetName] багато б чого здобув, найнявши його на службу, але серед верхівки духовенства чути нарікання — мовляв, [ROOT.GetCountry.GetGovernment.GetCourtTitle] — надто важлива посада, щоб віддавати її невірному, хоч би яким доброчесним той не був."
  flavor_tur.94.historical_info: "Сефардський єврей Мойсей Гамон — обдарований лікар і лінгвіст, який став придворним лікарем і дантистом Сулеймана Пишного. З часом султан проникся до Гамона довірою і доручив йому вирішувати суперечки, пов'язані з єврейською громадою Османської імперії."
  flavor_tur.94.a: "Ми раді всім талантам. Найняти його!"
  flavor_tur.94.b: "Не варто засмучувати духовенство."
  jewish_support.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,sephardi_tt,X #L сефардських#!#! та #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейських#!#! [Concept('pops','груп населення')|e] в нашій державі підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.95.title: "Істинний імператор"
  flavor_tur.95.desc: "Ближнє коло повідомляє нам, що в народі все частіше чути шепіт невдоволення — мовляв, [target_ruler.GetName] править не так, як слід. Нам радять замовити написання великої та пишної хроніки, що прославляє чесноти його правління. Адже він сидить на троні Константинополя і тому цілком може бути зображений в образі єдиного істинного імператора, особливо в очах своїх #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! підданих."
  flavor_tur.95.historical_info: "Селім I, батько Сулеймана I Пишного, славився своєю жорстокістю, тому протягом усього правління Сулейман намагався підтримувати образ милостивого і справедливого султана. Хроніка «Сулейман-наме», в якій він описувався як ідеальний правитель на заході існування світу, була створена саме з такою метою. Крім того, Сулейман вміло використовував європейську легенду про останнього імператора Риму, підносячи себе як месію, здатного об'єднати іслам і християнство."
  flavor_tur.95.a: "Для піару всі засоби хороші."
  flavor_tur.95.b: "Можна замовити хроніку і дешевше."
  flavor_tur.95.c: "Ми завжди можемо покладатися на підтримку духовенства."
  christian_support.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! [Concept('pops','груп населення')|e] в нашій державі підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.96.title: "[traitorous_son.GetNameWithNoTooltip]-зрадник"
  flavor_tur.96.desc: "У розпалі війни з державою [super_sinister_rival.GetName] починають ходити похмурі чутки, в центрі яких — [traitorous_son.GetName], чий батько [target_ruler.GetName]. Правдивість чуток встановити важко, суть же їх у тому, що [traitorous_son.GetName] і [rival_ruler.GetName] перебувають у змові, щоб погубити нашу державу."
  flavor_tur.96.no_silent_service.desc: "$flavor_tur.96.desc$ Доказів стає все більше, і довірені придворні вже натякають, що зрадник має бути негайно вбитий."
  flavor_tur.96.silent_service.desc: "$flavor_tur.96.desc$ Тому агенти нашої внутрішньої розвідки пропонують усунути [Select_CString(traitorous_son.IsFemale, 'її', 'його' )] раз і назавжди."
  flavor_tur.96.historical_info: "Шехзаде Мустафа, один із спадкоємців Сулеймана Пишного, відзначався видатними здібностями і був головним кандидатом на престол. Саме тому його не раз намагалися усунути. У 1553 році, коли повним ходом йшла війна з Персією, зловмисники підробили печатку Мустафи на листі до перського правителя Тахмаспа I. В результаті Сулейман звинуватив спадкоємця у зраді і наказав стратити його: позбавлятися від синів і союзників йому було вже не вперше."
  flavor_tur.96.a: "На жаль, він мусить померти."
  flavor_tur.96.b: "Ми не віримо цій наклепі."
  brush_with_death.tt: "[traitorous_son.GetNameWithNoTooltip] залишиться в живих і багато зрозуміє про життя."
  flavor_tur.97.title: "[traitorous_son.GetNameWithNoTooltip] і його спадщина"
  flavor_tur.97.desc: "[traitorous_son.GetName] страчений, але його страта, на жаль, розлютила маси, а також кілька угруповань аристократів. У популярному вірші оспівуються чесноти страченого і оплакується його вбивство. Головним підбурювачем до змови названий [minister.GetName], і, хоча докази його участі та злого умислу вельми хиткі, [target_ruler.GetName] тепер раз у раз отримує прохання звільнити змовника від займаної посади."
  flavor_tur.97.historical_info: "Страта шехзаде Мустафи викликала сплеск невдоволення. У віршах його описували як мученика, і навіть перси вважали, що спадкоємець не заслуговував на смерть. Великий візир Рустем-паша, чоловік Міхрімах-султан, яка доводилася Мустафі єдинокровною сестрою, опинився в самому епіцентрі цього конфлікту. Рустем був одним із лідерів змовників, які прагнули посадити на трон єдинокровного брата Мустафи Селіма, і його швидко змістили із займаної посади. Попри це, наступним султаном став саме Селім."
  flavor_tur.97.a: "Його буде відправлено у вигнання."
  flavor_tur.97.b: "Ми наймемо поетів, які спростують ці безглузді домисли."
  flavor_tur.97.c: "$flavor_tur.76.c$"
  flavor_tur.97.d: "Ми будемо жорстко боротися з хибними звинуваченнями."
  minister_exiled.tt: "[minister.GetNameWithNoTooltip] відісланий від двору."
  flavor_tur.98.title: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]а п'єса"
  flavor_tur.98.desc: "[traitorous_son.GetName] помер, і його смерть переслідує нас досі. Дійшло до того, що у Франції поставили п'єсу, де описується доля страченого і [target_ruler.GetName] там показаний #italic зовсім#! не в найкращому світлі. Великий візир радить вжити що-небудь, інакше наша репутація серед королів #TOOLTIP:CONTINENT,europe,X #L Європи#!#! стане ще гіршою."
  flavor_tur.98.historical_info: "У 1561 році французький драматург Габріель Бунен видав трагедію La Soltane, де назвав Роксолану (Хюррем-султан), улюблену дружину Сулеймана Пишного, призвідницею змови проти шехзаде Мустафи. Цей твір мав незначний вплив на франко-османські відносини, проте продемонстрував зміцнення зв'язків між цими двома країнами, ставши першою п'єсою про турків на французькій сцені."
  flavor_tur.98.a: "Терпіння! Ми й не таке переживали."
  flavor_tur.98.b: "[GetCountry('FRA').GetAdjectiveWithNoTooltip]ий [GetCountry('FRA').GetGovernment.GetRulerTitle] отримає наші вимоги."
  flavor_tur.98.c: "Виженемо побільше людей, підозрюваних у змові."
  france_will_refuse.tt: "[GetCountry('FRA').GetNameWithNoTooltip] не стане забороняти п'єсу."
  france_will_aquiesce.tt: "[GetCountry('FRA').GetNameWithNoTooltip] заборонить п'єсу."
  tur_courting_the_sublime_porte: "Спокуси Блискучої Порти"
  flavor_tur.99.title: "Ціна честолюбства"
  flavor_tur.99.desc: "[minister.GetName] стає занадто амбітним. Ночами [ambitious_wife.GetName] нашіптує похмурі застереження, які слухає [target_ruler.GetName]. [minister.GetNameWithNoTooltip] повинен померти, інакше його гонитва за владою поставить під удар усю державу. Хай він і вельми здібний сановник, але є, запевняє нас [ambitious_wife.GetShortNameWithNoTooltip] та інші, що послужать повелителю не менш уміло, але більш віддано."
  flavor_tur.99.historical_info: "Найталановитіших людей при османському дворі нерідко очікував кривавий кінець. Одному рабу на ім'я Паргали Ібрагім-паша вдалося дослужитися аж до першого візира Сулеймана Пишного. Однак Ібрагім був настільки успішний на своїй посаді, що його порахували загрозою владі султана і зрештою стратили. Поширена думка, хай і спірна, що за смертю першого візира стояла Хюррем, улюблена дружина Сулеймана. Нібито вона усунула конкурента, щоб зміцнити власну владу."
  flavor_tur.99.a: "Так, він повинен померти."
  flavor_tur.99.b: "Що за безглузда пропозиція!"
  ottoman_execution_refusal.tt: "Ні, [minister.GetName] не буде страчений."
  flavor_tur.100.title: "[capital_location.GetNameWithNoTooltip] вночі"
  flavor_tur.100.desc: "[capital_location.GetName] повниться голосами високопоставленого духовенства — вночі в місті творяться найрізноманітніші неподобства, воно перетворюється на розсадники пияцтва, розпусти, азартних ігор і тому подібних богопротивних речей. Священнослужителі пропонують заборонити все це або хоча б приструнити нічних гуляк. Деякі радники, однак, зазначають, що [GetCountry('TUR').GetAdjectiveWithNoTooltip]а держава вже давно має велику вигоду від терпимості — і особливо від податків, сплачуваних різними сумнівними закладами..."
  flavor_tur.100.historical_info: "Вночі османський Константинополь перетворювався на місто шинків і борделів. Якщо на вулиці ловили людину, яка не мала при собі ліхтаря, її тут же підозрювали в недобрих помислах і могли замкнути в хаммамі до самого світанку. Особливо благочестиві султани часом намагалися боротися з такими розсадниками пороку, проте загалом на проблему дивилися крізь пальці, адже господарі подібних закладів платили щедрі податки до державної скарбниці."
  flavor_tur.100.a: "Краще залишити все як є."
  flavor_tur.100.b: "Відбутися загальними обіцянками духовенству."
  flavor_tur.100.c: "Таке більше не можна терпіти."
  crackdown.tt: "Ми починаємо запеклу боротьбу з пияцтвом і розпустою."
  flavor_tur.100.clergy_angry.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з-поміж духовенства в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]."
  flavor_tur.100.burghers_happy.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з-поміж містян в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.100.clergy_moderately_angry.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з-поміж духовенства в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]."
  flavor_tur.100.clergy_happy.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з-поміж духовенства в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.100.burghers_unhappy.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з-поміж містян в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]."
  flavor_tur.101.title: "Сила ночі"
  flavor_tur.101.desc: "Почали ширитися чутки про секти, що діють у місті [capital_location.GetName]. Мешканці міста вражені, вони стверджують, що під покровом ночі культисти-безбожники віддаються справжньому розпусному гріху. Чи варто нам щось вжити, щоб сектантські рухи не переросли у щось більш небезпечне, як це було з давніми [GetCountry('BYZ').GetAdjectiveWithNoTooltip]ими бунтами?"
  flavor_tur.101.historical_info: "В османську добу нічні ритуали були характерні для багатьох релігійних течій. Зокрема, алевіти, представники саббатіанства та члени суфійського ордену Бекташі вважали, що такі нічні практики, по-перше, мають особливу містичну силу, а, по-друге, виділяють їх на тлі ісламської та православної спільнот. Про подібні нічні зібрання ширилося безліч жахливих чуток."
  flavor_tur.101.a: "Ці чутки скоро вщухнуть."
  flavor_tur.101.b: "[ROOT.GetCountry.GetReligion.GetGodName] кожному з нас являється по-своєму."
  flavor_tur.101.c: "Ми знайдемо цапів-відбувайлів і обдеремо їх до нитки."
  defend_heathens.tt: "Ми намагаємося умиротворити обидві сторони."
  flavor_tur.101.a_majority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] #TOOLTIP:RELIGION,orthodox_tt,X #L православних#!#! і #TOOLTIP:RELIGION,sunni_tt,X #L сунітських#!#! [Concept('pops','груп населення')|e] в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]."
  flavor_tur.101.a_minority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] іншої віри в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.101.b_minority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] іншої віри в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.101.b_majority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] #TOOLTIP:RELIGION,orthodox_tt,X #L православних#!#! і #TOOLTIP:RELIGION,sunni_tt,X #L сунітських#!#! [Concept('pops','груп населення')|e] в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%]."
  flavor_tur.101.c_majority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] #TOOLTIP:RELIGION,orthodox_tt,X #L православних#!#! і #TOOLTIP:RELIGION,sunni_tt,X #L сунітських#!#! [Concept('pops','груп населення')|e] в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  flavor_tur.101.c_minority.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] іншої віри в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]."
  flavor_tur.102.title: "Чудеса обертання"
  flavor_tur.102.desc: "Чоловік на ім'я [taqi_ad_din.GetName] винайшов хитру парову машину, здатну обертати рожен з кебабом. Ця машина тепер розважає голодних роззяв у корчмі в районі [capital_location.GetName]. Крім того, [taqi_ad_din.GetNameWithNoTooltip] ще й видатний вчений в інших галузях, особливо в астрономії. Найнявши його собі на службу, ми можемо здобути чималу славу."
  flavor_tur.102.historical_info: "Такиюддін Мухаммад ібн Маруф був справжнім ерудитом. За своє життя він випустив понад 90 праць у різних галузях, включно з астрономією, оптикою, інженерною та годинниковою справою. У 1551 році Такиюддін описав кілька варіантів парових двигунів, здатних обертати рожен. Хоча подібні конструкції вигадували ще стародавні греки, до того моменту лише деякі з них виявилися придатними до практичного застосування. Через двадцять років Такиюддін дослужився до придворного астронома султана Мурада III."
  flavor_tur.102.a: "Така людина нам потрібна."
  flavor_tur.102.b: "Краще просто насолодімося кебабом."
  taqi_ad_din_leaves.tt: "[taqi_ad_din.GetNameWithNoTooltip] кане в безвість"
  flavor_tur.103.title: "[taqi_ad_din.GetNameWithNoTooltip] та його обсерваторія"
  flavor_tur.103.desc: "Із самого початку своєї служби в нас [taqi_ad_din.GetName] мріяв про велику обсерваторію, де він міг би вивчати рух небесних тіл. Зараз він уже виготовляє армілярну сферу та механічний годинник для майбутньої обсерваторії, також учений уже знайшов відповідне місце на пагорбі, що височіє над районом [capital_location.GetName]. Залишається лише забезпечити його грошима."
  flavor_tur.103.historical_info: "Обсерваторія Такиюддіна була побудована в 1577 році. Вона складалася з двох будівель, розташованих на пагорбі, звідки відкривався вид на європейський район Константинополя. Консерваторія проіснувала зовсім недовго, але за цей час Такиюддін встиг зробити низку відкриттів, які дозволили йому виправити та доповнити каталог зірок, створений Улугбеком у Самарканді більше ніж за сотню років до цього."
  flavor_tur.103.a: "Ми добудуємо обсерваторію."
  flavor_tur.103.b: "Наш пріоритет — релігійна архітектура."
  flavor_tur.104.title: "Велика комета [GetCurrentYear] року"
  flavor_tur.104.desc: "У нічному небі виявлено велику комету, її дивне світло відкидає незвичайні тіні на землю. Таке видовище може здатися зловісним, але астрономи, чиє місце роботи [ShowBuildingTypeNameWithNoTooltip('constantinople_observatory')], стверджують, що це добре передвістя, що обіцяє благополуччя та розкіш, а також довгоочікувану перемогу над давнім суперником ([super_sinister_rival.GetLongName])."
  flavor_tur.104.historical_info: "За великою кометою 1577 року спостерігали багато вчених, зокрема османський ерудит Такиюддін і данський астроном Тихо Браге. На прохання Мурада III Такиюддін спробував витлумачити, що поява цього небесного тіла обіцяє державі, проте його оптимістичні прогнози не справдилися: незабаром після цього імперію охопила епідемія чуми. Ця помилка коштувала Такиюддіну обсерваторії: через кілька років її було зруйновано."
  flavor_tur.104.a: "Чудові новини!"
  flavor_tur.104.b: "У житті все не так райдужно."
  repercussions_later.tt: "Нехай цей прогноз послужить нам натхненням."
  flavor_tur.105.title: "Закриття обсерваторії"
  flavor_tur.105.opening: "Незабаром після того, як астрономи, чиє місце роботи — [ShowBuildingTypeNameWithNoTooltip('constantinople_observatory')], оголосили про добрі передвістя, які обіцяє комета, в нашій державі вибухнула чума. Тепер у районі [capital_location.GetName] все голосніше чути голоси про те, що ця обсерваторія — сама по собі погане і богопротивне передвістя."
  flavor_tur.105_believed_in_portents.desc: "$flavor_tur.105.opening$ Кажуть, що навіть вірити в подібне вже було нерозумно з боку Блискучої Порти. $flavor_tur.105_ending$"
  flavor_tur.105_disbelieved_in_portents.desc: "$flavor_tur.105.opening$ Блискуча Порта сумнівалася не дарма. $flavor_tur.105_ending$"
  flavor_tur.105_ending: "Народ по всій державі тепер виступає за знесення обсерваторії."
  flavor_tur.105.historical_info: "Хоча закриття Константинопольської обсерваторії в 1580 році часом пояснюють обуренням громадськості з релігійних причин, це рішення мало скоріше політичний характер. Такиюддін нажив ворогів серед улемів і дрібних чиновників, і ті навперебій намагалися звинуватити його в єресі. Саме тому обсерваторія була знищена, проіснувавши всього кілька років, що стало великою втратою для астрономії ісламського світу."
  flavor_tur.105.a: "Усе хороше колись закінчується."
  flavor_tur.105.b: "Ні, ми відстоїмо обсерваторію."
  flavor_tur.105.happy_pops.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з числа містян і селян у районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.106.title: "Відновлення Єрусалима"
  flavor_tur.106.desc: "Священне місто [target_location.GetName] — скарб нашої держави, але воно відчайдушно потребує відновлення. Стародавні стіни обсипаються, і навіть Купол Скелі втратив колишній блиск. Оплативши відновлювальні роботи, ми зможемо заслужити любов місцевих жителів і показати свою відданість справі #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  flavor_tur.106.historical_info: "Сулейман Пишний та його дружина Роксолана прагнули до того, щоб Османська імперія сприймалася як центр ісламської цивілізації, і не шкодували коштів на різноманітні будівельні проєкти, зокрема, на масштабну реставрацію священного міста Єрусалима. Мусульмани не тільки повністю відновили зовнішні стіни стародавнього міста, а й відремонтували Купол Скелі, облицювавши його блакитними мармуровими плитами, які прикрашають мечеть і донині."
  flavor_tur.106.a: "На таке ніяких грошей не шкода."
  flavor_tur.106.b: "Ми відновимо лише Купол Скелі."
  flavor_tur.106.c: "Краще звести сучасні укріплення."
  jerusalem_happy_burghers.tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з числа містян в Єрусалимі підвищиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.107.title: "[ShowGoodsNameWithNoTooltip('coffee')] з Каїра"
  flavor_tur.107.desc: "#TOOLTIP:GOODS,coffee,X Кава#! з Ємену останнім часом стала дуже популярна: у великих і малих містах держави повсюдно відкриваються кав'ярні. Каїр, зокрема, особливо процвітає від торгівлі ароматним темним напоєм, але серед духовенства знайшлися ті, хто хоче обмежити його продаж. Вони запевняють, що кава небезпечна для благочестя людини майже так само, як алкоголь, і вважають, що без неї жителям Каїра буде тільки краще."
  flavor_tur.107.historical_info: "Вперше напій з кавових зерен з'явився в Ємені в XV столітті, а вже до кінця XVI століття він набув повсюдної популярності в османських землях. З єменського порту Моха каву доставляли до Каїра, звідки вона потрапляла в усі куточки імперії. Торгівля кавою почасти посприяла тому, що Єгипет зрештою став однією з найбагатших османських провінцій."
  flavor_tur.107.a: "Ми підтримаємо купців."
  flavor_tur.107.b: "Заборона вже давно напрошується."
  flavor_tur.108.title: "Девальвація акче"
  flavor_tur.108.desc: "Недавні проблеми в державі призвели до просідань в економіці. Торговці скаржаться на велику різницю в цінах на наших внутрішніх ринках, де використовується безліч різних місцевих валют. Солдати засмучені несвоєчасною виплатою платні. Якщо ми збираємося девальвувати срібні монети-акче, можливо, цей захід можна буде врівноважити уніфікацією економіки держави та підвищенням вартості золотих монет, які ще є в державній скарбниці."
  flavor_tur.108.historical_info: "Не зовсім зрозуміло, чому в 1585 році османи вирішили знецінити акче. Можливо, до цього їх підштовхнули затяжні та витратні війни з Персією або приплив срібла з Нового Світу. Місцеві економіки всередині імперії були сильно роз'єднані, і девальвація могла стати спробою створення єдиного економічного поля та зміцнення золотої валюти по відношенню до срібної з метою збагачення державної скарбниці. Хай там як, реформа вийшла неоднозначною, і османську валюту не вдавалося стабілізувати ще кілька десятиліть."
  flavor_tur.108.a: "Варто ризикнути."
  flavor_tur.108.b: "Побоювання необґрунтовані."
  flavor_tur.109.title: "Клітка"
  flavor_tur.109.desc: "Людям все важче змиритися з жорстоким, хоч і необхідним братовбивством (часом і вбивством немовлят), що здійснюється, коли на трон сходить новий правитель. Якщо замість вбивства ув'язнювати братів султана в так званому #italic кафесі#!, частині [ROOT.GetCountry.GetGovernment.GetAdjective]ого гарему, вони можуть проживати свої дні в розкоші. Це гарантує нам, що у династії «[ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]» ніколи не буде нестачі в спадкоємцях."
  flavor_tur.109.historical_info: "Наприкінці XVI століття, після низки жахливих розправ над десятками хлопчиків та немовлят, що передували коронації Мурада III та Мехмеда III, османи вирішили відійти від традиції братовбивства. Замість цього родичів султана чоловічої статі почали замикати в гаремі, компенсуючи неволю розкішшю та наложницями. Це забезпечувало процвітання династії та стабільність держави, але послаблювало особисту владу правителя: тепер знайти йому заміну стало куди простіше."
  flavor_tur.109.a: "Час покінчити з цією дикістю."
  flavor_tur.109.b: "Брати завжди становлять небезпеку."
  flavor_tur.110.title: "Капітуляції"
  flavor_tur.110.desc: "Нам час покращити відносини з #TOOLTIP:RELIGIONGROUP,christian,X #L християнськими#!#! державами. [capitulation_country.GetName] — хороший кандидат на випробування нового виду хартії, яку підготував [ROOT.GetCountry.Custom('GetHeadOfCabinetName')]. Вона дасть [capitulation_country.GetAdjectiveWithNoTooltip]им торговцям і мандрівникам захист і привілеї в нашій державі, це стане жестом доброї волі. Наші власні містяни, однак, незадоволені цим і кажуть, що в іноземців з'явиться несправедлива перевага."
  flavor_tur.110.historical_info: "Капітуляціями, або #italic ахаднамами#!, називають хартії, які Османська імперія підписувала з іншими державами. Як правило, такі акти звільняли торговців з підкорених країн від податків та судового переслідування на османських територіях. Одними з перших підписантів капітуляцій стали Венеція та Генуя, однак домовленість з Францією, досягнуту в 1535 році, ймовірно, можна назвати однією з найуспішніших, оскільки вона заклала основи для багаторічної франко-османської співпраці."
  flavor_tur.110.a: "Ми підпишемо хартію."
  flavor_tur.110.b: "Ні, наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] праві."
  opinion_ottoman_capitulation: "Отримана капітуляція"
  flavor_tur.111.title: "Гра тіней"
  flavor_tur.111.desc: "У багатьох містах нашої держави нині стали популярними лялькові театри, де глядачі дивляться на тіні на мусліновій завісі. У виставах беруть участь два комічні персонажі — Карагьоз і Хадживат, їхні пригоди збирають повні зали глядачів як у чайних, так і в шляхетних будинках. Деякі духівники заявляють, що ці грубі й не цілком пристойні п'єси ображають #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, але заборонити вистави повністю означало б засмутити дуже багатьох містян."
  flavor_tur.111.historical_info: "Історія походження театру тіней Карагьоз оповита таємницею. Хтось вважає, що його привезли до Османської імперії торговці з Яви, де театр тіней був відомий починаючи з Середніх віків. До 16 століття ці часто сатиричні та зухвалі п'єси виконувалися в кожному місті Османської імперії. $common_string_shaikh_al_islam$ Ебуссууд-ефенді видав знамениву постанову, в якій оголосив, що ці п'єси не заборонені ісламом. Згодом, однак, правителі забороняли такі вистави через їхній політичний зміст."
  flavor_tur.111.a: "Нехай народ розважається."
  flavor_tur.111.b: "Ми станемо на бік обурених."
  plays_banned.tt: "П'єси Карагьоз заборонені."
  flavor_tur.112.title: "Кінець тимаріотів"
  flavor_tur.112.desc: "Система тимаріотів, що справно служила нам, зіткнулася з критичними проблемами. Земельні наділи, що роздаються нами вершникам, стають дедалі більш розділеними та бідними, а самим вершникам дедалі важче битися з ворогами, що озброїлися мушкетами. Переставши роздавати наділи-тімари, ми могли б, у міру того, як старіють і вмирають їхні власники, здавати їх в оренду, що допоможе поповнити скарбницю держави. Також не завадило б модернізувати армію, зробивши акцент на піхоту з вогнепальною зброєю."
  flavor_tur.112.historical_info: "Система надання сіпахам — воїнам важкої кавалерії, — земельних наділів, або тімарів, з часом втратила актуальність. Великі османські завоювання залишилися в минулому, і ділянок стало просто не вистачати. Крім того, представники інших родів військ — особливо яничари — теж почали претендувати на цей привілей. Усвідомивши, що далі так тривати не може, османська влада скасувала застарілу систему і стала більше спиратися на набір секбанів — солдатів селянського походження."
  flavor_tur.112.a: "Усе тече, усе змінюється."
  flavor_tur.112.b: "Кавалерія — наша головна опора."
  timars_unavailable.tt: "[Concept('reforms','Принципи')|e] «Тімар» назавжди стануть недоступними."
  flavor_tur.113.title: "Поради государям"
  flavor_tur.113.desc: "Останнім часом став дуже популярним жанр літератури під назвою #italic насихат-наме#!, «поради государям». Такі книги часто пишуться так, ніби [target_ruler.GetName] черпатиме з них поради щодо справ віри, моралі та політичного управління. Автори, втім, почали натякати, що загалом справи нашої держави дуже погані й лише провидіння може її врятувати. Чи варто дозволяти видавати такі роботи?"
  flavor_tur.113.historical_info: "Жанр насихат-наме багато в чому близький до європейських князівських дзеркал, проте характеризується песимізмом, акцентом на різноманітних недугах Османської імперії та численними порівняннями із «золотим віком», під яким малася на увазі епоха правління Селіма I. Такий похмурий настрій ввів в оману багатьох істориків, не цілком справедливо називали XVII століття періодом занепаду османської держави."
  flavor_tur.113.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] може багато чого почерпнути з таких праць."
  flavor_tur.113.b: "Ми переконаємо авторів вихваляти режим."
  flavor_tur.113.c: "Стратити зрадників!"
  executed_authors.tt: "Жанр насихат-наме швидко канув у небуття."
  flavor_tur.114.title: "Матері видніше"
  flavor_tur.114.desc: "Валіде-хатун [valide_sultan.GetName] — жінка виняткового таланту та цілеспрямованості, яка вже досягла високої посади при дворі. Усвідомлюючи, як багато всього загрожує династії «[target_ruler.GetDynasty.GetName]», вона хоче більше впливати на справи держави, щоб працювати на благо держави, як робили великі сельджуцькі правительки минулого. Ми могли б дати їй новий титул валіде-султан, що піднесе її над іншими жінками та дасть їй право стежити за зборами ради."
  flavor_tur.114.historical_info: "Хоча матері османських султанів майже завжди були рабинями з гарему, вони могли домогтися чималої влади, діючи за лаштунками, особливо після правління Сулеймана Пишного та його могутньої дружини Роксолани. Титул валіде-султан, вперше дарований матері Сулеймана Хафсі, передбачав безліч особливих повноважень та привілеїв. Володарка такого титулу відігравала важливу роль у дипломатії імперії, організовуючи шлюби принцес."
  flavor_tur.114.a: "Нам потрібна її мудрість."
  flavor_tur.114.b: "Жінкам місце в гаремі, нехай там і залишаються."
  flavor_tur.115.title: "М'яка сила"
  flavor_tur.115.desc: "Зараз, коли в нашій державі повно проблем, [harem_power.GetName] та інші жінки двору готові взяти на себе більше відповідальності — хто допоміжної, з-за стін гарему, а хто безпосередньої. Вплив [ROOT.GetCountry.GetGovernment.GetAdjective]их жінок зростає, хай багато з них і невільниці, їхніх талантів це не применшує. Втім, якщо ми дозволимо жінкам взяти кермо правління при дворі, багато традиціоналістів цьому опиратимуться."
  flavor_tur.115.historical_info: "Період, названий жіночим султанатом, тривав майже 150 років. Ці роки видалися особливо неспокійними: султани часто правили недовго і часом приходили до влади, будучи ще дітьми. Їхні матері, сестри, бабусі або дружини володіли чималою могутністю, що регулярно призводило до конфліктів з великими візирами. Так чи інакше, Міхрімах, Нурбану, Кьосем, Турхан та деякі інші султанші того часу вважаються одними з найвпливовіших жінок в османській історії."
  flavor_tur.115.a: "Державі потрібна жіноча мудрість."
  flavor_tur.115.b: "Ми поставимо цих відьом на місце."
  flavor_tur.116.title: "[favored_country.GetAdjectiveWithNoTooltip]а група"
  flavor_tur.116.desc: "Угруповання наложниць, одалісок, карликів та євнухів [favored_country.GetAdjective]ого походження набирає силу при дворі, на чолі якого [target_ruler.GetName]. Діючи приховано, вони вже домоглися значного впливу в гаремі та серед чиновників. Ці люди просувають рішення, сприятливі для держави [favored_country.GetNameWithNoTooltip], і розраховують, що ми підпишемо акт капітуляції."
  flavor_tur.116.historical_info: "Раби нерідко досягали високого становища при османському дворі. Євнухи та наложниці не забували про своє коріння і час від часу об'єднувалися в коаліції, просуваючи політичні рішення, вигідні для їхньої батьківщини. Наприкінці XVI століття при дворі навіть існував союз венеційських ренегатів на чолі з могутнім євнухом Газанфером, який сам походив з Венеції."
  flavor_tur.116.a: "Ми прислухаємося до їхніх слів."
  flavor_tur.116.b: "Нехай внутрішня розвідка усуне їх усіх."
  flavor_tur.116.c: "Не будемо звертати на них уваги."
  flavor_tur.117.title: "[ambitious_ruler.GetNameWithNoTooltip] проводить реформи"
  flavor_tur.117.desc: "[ambitious_ruler.GetName] стурбований, розуміючи, що апарат правителя починає втрачати колишній престиж. Він нарікає на зростаючий вплив чиновників, губернаторів провінцій і навіть жінок з гарему — всі вони, зауважує правитель, діють за його рахунок. Повелитель має намір провести низку політичних маневрів, щоб повернути владу собі — але такий хід обов'язково налаштує проти нього низку угруповань."
  flavor_tur.117.historical_info: "У XVI столітті Османська імперія почала поступово перетворюватися на бюрократичну державу, де султани володіли куди меншою владою, ніж у минулому. У 1618 році на трон зійшов Осман II. Юний султан намагався боротися з такою тенденцією, але, оскільки у нього не було впливової союзниці в гаремі, він лише налаштував проти себе яничарів та радників, і його спроба з тріском провалилася."
  flavor_tur.117.a: "Правителю потрібно більше влади."
  flavor_tur.117.b: "Нехай він краще вивчає управління державою."
  flavor_tur.117.c: "Ми скинемо цього дурня."
  very_successful_coup.tt: "Спроба перевороту виявилася успішною."
  somewhat_successful_coup.tt: "Спроба перевороту виявилася частково успішною."
  flavor_tur.118.title: "Гнів яничарів"
  flavor_tur.118.desc: "[ambitious_ruler.GetName], проводячи свої радикальні реформи, примудрився образити яничарів, назвавши їх боягузами. Розлючені яничари, які не бажали, до того ж, щоб він скасував їхній корпус, знайшли численних союзників при дворі та в гаремі, і тепер вони прагнуть крові. Схоже, правителю час попрощатися з життям — інакше ми ризикуємо зіткнутися з громадянською війною."
  flavor_tur.118.historical_info: "На велике невдоволення яничарів, Осман II продовжив обмежувати їхній вплив. Він закрив кав'ярні, де вони збиралися, і приступив до створення нової армії анатолійських секбанів, які були йому вірні. У відповідь яничари змовилися з Халіме-султан, матір'ю попереднього правителя Мустафи Божевільного. Осман був ув'язнений і вбитий, а до влади знову прийшов неврівноважений Мустафа."
  flavor_tur.118.a: "Значить, він повинен померти."
  flavor_tur.118.b: "Ми розправимося із загрозою Блискучій Порті."
  janissary_revolt: "Бунтівні яничари"
  flavor_tur.119.title: "На варті насолоди"
  flavor_tur.119.desc: "[mehmed_agha.GetName] — талановитий [ROOT.GetCountry.GetGovernment.GetCourtTitle]ий євнух, один зі стражів [ROOT.GetCountry.GetGovernment.GetAdjective]ого гарему. Кілька угруповань при дворі хочуть, щоб для нього створили нову посаду #italic кизляра-аги#!, стража дівчат. На цій посаді він наглядатиме за особистими покоями правителя і служитиме посередником між гаремом та верховною радою. Також він піднесеться над старим білим євнухом, #italic капи-агою#!, відповідальним за хлопчиків-прислужників при дворі — той ніколи не відрізнявся особливою надійністю."
  flavor_tur.119.historical_info: "Кількість євнухів при османському дворі постійно зростала. У 1574 році для Мехмеда-аги було створено пост кизляра-аги, що давав євнухам безпрецедентну владу. Африканські євнухи вважалися більш надійними, оскільки їхня батьківщина була далеко, і з часом вони стали впливовішими за білих євнухів. Частково завдяки міцним зв'язкам кизляра-аги з могутніми валіде-султан (матерями правлячих султанів) цей пост став рівнозначний візирові першого рангу, вище нього були лише великий візир і $common_string_shaikh_al_islam$."
  flavor_tur.119.a: "Ми підвищимо Кизляра-агаси."
  flavor_tur.119.b: "Капи-агаси більше гідний підвищення."
  flavor_tur.119.c: "У цих євнухів і так достатньо влади."
  valide_sultan_objects.tt: "Валіде-султан це не сподобається."
  mehmed_agha_fired.tt: "[mehmed_agha.GetNameWithNoTooltip] покидає двір."
  flavor_tur.120.title: "Держава [super_sinister_rival.GetNameWithNoTooltip] та її гармати"
  flavor_tur.120.desc: "З часів нашої останньої війни з державою [super_sinister_rival.GetName] у нас залишилося кілька захоплених знарядь і гармат, і зараз, у дні миру, армії не завадило б видовище для підняття бойового духу. [target_ruler.GetName] хоче використати ці гармати для військового святкування в регіоні [reenactment_location.GetName], яке буде присвячене його дитині. [target_child.GetName] — [target_child.GetDaughterSon] [target_child.GetAgeInYears] років від роду, буде, зрозуміло, присутній на святі."
  flavor_tur.120.historical_info: "Османа II всюди переслідували невдачі. Він спробував зміцнити свою легітимність, вплутавшись у війну з Польщею, але його чекала нищівна поразка. На шляху додому султан отримав з Константинополя звістку про народження шехзаде Омера, його першого сина, і ця новина трохи його підбадьорила. Він попросив свою дружину Мейлішах Хатун приїхати до нього в Едірне разом з немовлям, де намічалося велике святкування з реконструкцією минулих битв…"
  flavor_tur.120.a: "Ми проведемо свято."
  flavor_tur.120.b: "Обійдемося без цієї показухи."
  unpredictable_outcome.tt: "Подія може обернутися успіхом… або трагедією."
  flavor_tur.121.title: "Нещастя в регіоні [reenactment_location.GetNameWithNoTooltip]"
  flavor_tur.121.desc: "Святкування в регіоні [reenactment_location.GetName] обернулося трагедією. Під час реконструкції великої битви з державою [super_sinister_rival.GetName] куля вершника відскочила рикошетом і влучила в дитину правителя. [target_child.GetName], на жаль, помер на місці. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають те, що сталося, вкрай поганим передвістям і кажуть, що тепер [target_ruler.GetName] приречений на невдачі."
  flavor_tur.121.historical_info: "У ході реконструкції в Едірне був убитий Омер, перший син Османа II. Скоріше за все, це був нещасний випадок, хоча ще довгий час ходили чутки, що за цим стоїть та чи інша коаліція. Осман II важко переніс втрату. Мати Омера Мейлішах, наложницю російського походження, звинуватили в тому, що сталося, і відправили у вигнання. Після цієї трагедії серце султана загартувалося, що в підсумку призвело його до загибелі."
  flavor_tur.121.a: "Нехай скорбота зміниться гнівом."
  flavor_tur.121.b: "Нехай за все відповідають [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')]."
  flavor_tur.121.c: "Гарем дарує розраду."
  flavor_tur.122.title: "Тріумф у регіоні [reenactment_location.GetNameWithNoTooltip]"
  flavor_tur.122.desc: "Святкування в регіоні [reenactment_location.GetName] увінчалося успіхом. Ми продемонстрували там захоплені знаряддя, а також майстерність наших вершників та яничарів. Постріли гармат лунали так голосно, що їх могли чути в самій державі [super_sinister_rival.GetName]. [target_ruler.GetName] та [target_child.GetName] чудово провели час того дня."
  flavor_tur.122.historical_info: "Хоча більшість невдач Османа II стали наслідком неправильних рішень, не можна заперечувати, що йому на рідкість не щастило. Якби його перший син Омер не загинув від нещасного випадку під час реконструкції в Едірне, можливо, в подальшому султан повівся б інакше, і його правління було б більш успішним."
  flavor_tur.122.a: "Нехай усі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] запам'ятають цей день."
  flavor_tur.122.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle] винесе свої уроки з цього дня."
  flavor_tur.122.c: "Нехай вороги злякаються нашої могутності!"
  flavor_tur.123.title: "[target_character.GetShortNameWithNoTooltip] Божевільний"
  flavor_tur.123.desc_opening: "[target_character.GetName] завжди був трохи ексцентричним, але зараз, як кажуть, він став відверто божевільним. Розповідають, що він ходить ночами, вигукуючи ім'я свого попередника, і просить звільнити його від тягаря влади. Могутнє угруповання з-поміж духовенства та [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] об'єдналися і спільно вимагають його відставки."
  flavor_tur.123.valide_sultan.desc: "$flavor_tur.123.desc_opening$ [valide_sultan.GetName], мати султана, можна переконати погодитися на це, але з більшою ймовірністю вона почне планувати усунення передбачуваного наступника, яким вважається [ruler_replacement.GetName]."
  flavor_tur.123.no_valide_sultan.desc: "$flavor_tur.123.desc_opening$ Змовники зроблять так, щоб замість нього трон зайняв [ruler_replacement.GetName]."
  flavor_tur.123.historical_info: "У період з 1617 по 1623 роки Мустафа I двічі посідав престол. Мати Мустафи Халіме та інші впливові наложниці, які прагнули контролювати кожен крок правителя, щоб захистити від смерті власних синів, використовували юного султана як маріонетку. Мустафа завжди відрізнявся дивакуватістю, але вбивство Османа II, який керував країною в перерві між двома його правліннями, вплинуло на нього до такої міри, що він зовсім втратив розум. Зрештою народ підняв повстання, і Халіме погодилася, хай і неохоче, що Мустафа має покинути трон."
  flavor_tur.123.a: "Він повинен мирно зректися трону."
  flavor_tur.123.b: "Нехай цю справу вирішать яничари."
  flavor_tur.123.c: "[ruler_replacement.GetNameWithNoTooltip] повинен пасти від руки вбивць."
  flavor_tur.123.d: "Ми проігноруємо ці нерозумні вимоги."
  tur_put_in_kafes_tt: "[target_character.GetName] ув'язнений у [ROOT.GetCountry.GetGovernment.GetAdjective]ому гаремі."
  flavor_tur.124.title: "Розбійники в Анатолії"
  flavor_tur.124.desc_opening: "Банди розбійників дошкуляють селянам Анатолії. Багато з них — самі колишні селяни, які зубожіли через брак перспектив і опустилися до грабунку."
  flavor_tur.124.no_sekban.desc: "$flavor_tur.124.desc_opening$ Скасувавши систему тимаріотів і перейшовши до системи секбанів для набору мушкетерів, ми могли б задіяти більше селян на військовій службі, тим самим пом'якшивши кризу в Анатолії."
  flavor_tur.124.has_sekban.desc: "$flavor_tur.124.desc_opening$ [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] пропонує пом'якшити наслідки проблеми, найнявши охочих спокути бандитів до армії, у секбани."
  flavor_tur.124.historical_info: "У XVI столітті через бурхливе зростання населення в Анатолії стало бракувати земель, що призвело до повсюдної бідності. Деякі зневірені селяни брали участь у повстаннях Джалалі, інші промишляли бандитизмом, і в результаті ситуація погіршувалася. Одним із методів боротьби з проблемою став найм колишніх злочинців до мушкетерських полків секбанів."
  flavor_tur.124.a: "Вони поповнять лави мушкетерів."
  flavor_tur.124.b: "Створити систему секбанів."
  flavor_tur.124.c: "Напустити на селян башибузуків."
  flavor_tur.124.d: "Масштаби проблеми перебільшені."
  anatolian_brigands_maybe_more_problems.tt: "Це може знизити рівень злочинності."
  anatolian_brigands_no_more_problems.tt: "Це напевно знизить рівень злочинності."
  anatolian_brigands_certainly_more_problems.tt: "Це навряд чи знизить рівень злочинності."
  flavor_tur.125.title: "Роззброєння Анатолії"
  flavor_tur.125.desc: "Попри наші зусилля, серед селян Анатолії тривають заворушення. Нальоти бунтівників і бандитів тримають ці землі в напрузі, багато жителів тепер озброєні до зубів. Самі селяни, звісно, кажуть, що вся ця зброя — для самозахисту, але з тією ж легкістю мушкети й шаблі можуть бути використані для майбутніх бунтів. Можливо, селян краще роззброїти, поки у нас є така можливість."
  flavor_tur.125.historical_info: "Протягом усієї історії в Османській імперії по-різному ставилися до носіння зброї. Однак у XVII столітті вогнепальна зброя широко поширилася серед селян Анатолії, чому частково сприяли заворушення, спричинені повстаннями Джалалі. Прагнучи роззброїти потенційних заколотників, влада почала конфісковувати зброю та боєприпаси: тільки в 1659 році було вилучено понад 80 000 одиниць нелегального озброєння. Однак ті, у кого вистачало грошей на вогнепальну зброю, завжди могли звернутися до послуг контрабандистів."
  flavor_tur.125.a: "Ми роззброїмо їх силоміць."
  flavor_tur.125.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] отримають компенсацію."
  flavor_tur.125.c: "Хто тоді служитиме в нашій армії?"
  peasant_revolt: "$bra_peasants_revolt$"
  rebellion_dies_down_tt: "Заколот майже або повністю зійде нанівець"
  flavor_tur.126.title: "Моряки-варвари"
  flavor_tur.126.desc: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')] стурбований нашим зростаючим відставанням на морі, особливо в порівнянні з державою [naval_adversary.GetName]. Щоб ефективно конкурувати з нею, нам потрібно як найняти більше моряків, так і покращити їхню підготовку. [target_country.GetName], одна з держав так званого Варварського берега, славиться своїми традиціями піратства та мореплавства. За правильного стимулювання ми могли б заручитися її допомогою у посиленні флоту."
  flavor_tur.126.historical_info: "За чисельністю професійних моряків османи нерідко поступалися своїм суперникам, насамперед Венеції, яка могла легко поповнювати військовий флот за рахунок торгового. Таке відставання стало особливо очевидним після того, як у 1656 році османи програли венеціанцям у битві при Дарданеллах. У минулому османи значною мірою покладалися на моряків і командирів з Варварського берега — середземноморського узбережжя Північної Африки. Наприкінці XVII століття вони провели низку флотських реформ і повернулися до цієї практики."
  flavor_tur.126.a: "Покластися на державу [target_country.GetNameWithNoTooltip]."
  flavor_tur.126.b: "Краще провести масштабну реформу флоту."
  flavor_tur.126.c: "Нам ні до чого ці пірати-дикуни."
  flavor_tur.127.title: "Рух кадизаделі"
  flavor_tur.127.desc: "Група представників духовенства, яку очолює [kadizade.GetName], проповідує в мечетях району [capital_location.GetName]. У них вже утворилася чимала і #italic дуже#! віддана їм група послідовників. Кадизаделі, як їх називають, хочуть повернутися до віри в її початковому вигляді, обмежити бездумні державні витрати та заборонити таке занепадництво, як кава, алкоголь, пісні та танці. Багато хто серед аристократичних і духовних еліт хотів би позбутися цих небезпечних демагогів раз і назавжди."
  flavor_tur.127.historical_info: "Радикальні консерватори кадизаделі були багато в чому близькі ваххабітам, що з'явилися кількома століттями пізніше. Вони протестували проти #italic нововведень#! в ісламі та швидко стали противниками суфійських течій. Пік популярності ідей кадизаделі припав на часи правління Мурада IV та Мехмеда IV: тоді їм дозволяли навіть проповідувати в соборі Святої Софії. Втім, після призначення Мехмеда Кьопрюлю на посаду великого візира кадизаделі впали в немилість. Мехмед бачив у них загрозу державі та подбав про те, щоб лідерів руху заслали на Кіпр."
  flavor_tur.127.a: "Вигнати цих дурнів!"
  flavor_tur.127.b: "А вони слушне кажуть…"
  flavor_tur.128.title: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')] та його епоха"
  flavor_tur.128.desc.opening: "[target_character.GetName], чия посада тепер — [ROOT.GetCountry.Custom('GetHeadOfCabinetName')], хоче заткнути рот усім опонентам. Він просить дати його кабінету ще більше повноважень, щоб мати можливість невпинно працювати на благо династії «[target_ruler.GetDynasty.GetName]»."
  flavor_tur.128.valide_sultan.desc: "$flavor_tur.128.desc.opening$ [valide_sultan.GetName] всіляко підтримує цю пропозицію, оскільки з багатьох питань [target_character.GetNameWithNoTooltip] звітує саме перед нею."
  flavor_tur.128.no_valide_sultan.desc: "$flavor_tur.128.desc.opening$ [ROOT.GetCountry.GetGovernment.GetRulerTitle] втратить чималу частку влади. Він проводитиме свої дні в полюванні та прогулянках, а важливими справами в цей час займуться більш досвідчені люди."
  flavor_tur.128.historical_info: "Зайнявши посаду великого візира, Мехмед Кьопрюлю швидко став найвпливовішою людиною в державі. Він умовив юного Мехмеда IV переїхати до старої столиці Едірне, тим самим фактично відсторонивши султана від управління країною. Хоча Кьопрюлю спирався на підтримку головної наложниці Турхан, він також намагався обмежити її владу. У 1661 році, відчуваючи наближення смерті, Мехмед переконав султана призначити на посаду великого візира свого сина Фазила Ахмеда, тим самим поклавши початок епохи Кьопрюлю. Представники цієї династії кілька десятиліть обіймали пост великого візира та відігравали найважливішу роль в османській політиці."
  flavor_tur.128.a: "В його руках держава буде в безпеці."
  flavor_tur.128.b: "У нього вже й так достатньо влади."
  nobles_revolt: "Розлючені аристократи"
  flavor_tur.129.title: "Велика пожежа [GetCurrentYear] року"
  flavor_tur.129.desc: "Район [target_location.GetName] уражений страшною пожежею, вогонь пройшовся по окрузі з люттю ворожої армії. Знищено десятки або навіть сотні тисяч старих дерев'яних будинків, особливо постраждав #TOOLTIP:RELIGION,$judaism_tt$,X #L єврейський#!#! квартал. [grand_vizier.GetName] готовий зайнятися відновленням, але дістати гроші на нього він хоче вельми несподіваним способом. Візир пропонує заборонити відновлення численних церков і синагог, що згоріли у вогні, а замість цього має намір продати землю під ними з аукціону правовірним #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманам#!#!."
  flavor_tur.129.historical_info: "Страшна пожежа 1660 року знищила цілі райони Константинополя: багато церков і синагог згоріли дотла. Після цього Вані Мехмед Ефенді, проповідник з радикального ісламського руху кадизаделі, заявив, що, оскільки єврейська власність найбільше постраждала від вогню, це варто розглядати як покарання від Аллаха. Зрештою християнам дозволили викупити ділянки, на яких розташовувалися спалені церкви, а ось євреям пощастило менше. Великий візир Кьопрюлю Фазил Ахмед, ймовірно, був солідарний з кадизаделі. Так чи інакше, він конфіскував землі, де раніше стояли синагоги."
  flavor_tur.129.a: "Чудова ідея!"
  flavor_tur.129.b: "Ні, ми поважаємо чужу віру."
  constantinople_fire_event.a.tt: "$constantinople_fire_event.b.tt$ Якщо вкласти кошти в цей [Concept('location','район')|e], його буде простіше відбудовувати."
  constantinople_fire_event.b.tt: "[target_location.GetName] втратить частку [Concept('prosperity','процвітання')|e] і позбудеться частини [Concept('pops', 'груп населення')|e], внаслідок катастрофи будуть зруйновані деякі [Concept('buildings', 'споруди')|e]"
  flavor_tur.129.a.tt: "[Concept('pop_satisfaction','Задоволення ')|e] #TOOLTIP:RELIGION,judaism_tt,X #L юдейських#!#! та #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! [Concept('pops','груп населення')|e] в районі [capital_location.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%]."
  flavor_tur.129.b.tt: "[Concept('pop_satisfaction','Задоволення ')|e] #TOOLTIP:RELIGION,judaism_tt,X #L юдейських#!#! та #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! [Concept('pops','груп населення')|e] в районі [capital_location.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_tur.130.title: "Торжество розуму"
  flavor_tur.130.desc: "Багато вчених останнім часом покинули район [scholars_location.GetName] — ймовірно, рятуючись від переслідувань і бідності. Після довгих подорожей помітна їх частина прибула до воріт міста [capital_location.GetName], просячи прихистити їх. Взамін вони обіцяли невпинно працювати на благо держави [ROOT.GetCountry.GetName]. Варто, однак, враховувати, що ці люди — прихильники #italic тахкіка#!, емпіричного погляду на світ, який деякі з лідерів нашого духовенства вважають безбожним."
  flavor_tur.130.historical_info: "Хоча деякі стверджують, що вплив консервативної течії кадизаделі сповільнив розвиток османської науки, це було не зовсім так. На початку XVII століття в країну хлинули вчені з Ірану та Курдистану. Вони прагнули відродити раціональний підхід до наукового знання і понад усе ставили старий принцип перевірки, або тахкік, який часто протиставлявся принципу імітації (такліду) і здобув чималу популярність в ісламській науці пізнього Середньовіччя."
  flavor_tur.130.a: "Ми приймемо вчених."
  flavor_tur.130.b: "Ворота міста [capital_location.GetRank.GetNameWithNoTooltip] повинні залишитися зачиненими."
  flavor_tur.131.title: "Вівці серед вовків"
  flavor_tur.131.desc: "Містяни все більше дратуються привілеями, які отримують державні службовці. В районі [janissary_location.GetName] ходять чутки, що вже і в ряди яничарів проникли підприємливі купці, скориставшись зв'язками, щоб записатися в корпус і отримувати всі належні елітним солдатам права. З одного боку так можна поповнити казну Блискучої Порти, з іншого — може впасти престиж і боєготовність яничарського корпусу, що століттями вселяв страх ворогам."
  flavor_tur.131.historical_info: "У XVI та XVII століттях як в економіці, так і в політиці османської держави йшов процес плюралізації. На привілейовані посади, раніше займані виключно вихідцями з системи девшірме, тепер могли претендувати й забезпечені представники середнього класу. Наприклад, купці та ремісники стали купувати собі місця в корпусі яничарів, щоб отримати певні переваги."
  flavor_tur.131.a: "Гроші вирішують усе."
  flavor_tur.131.b: "Яничари священні."
  flavor_tur.132.title: "Відкупна реформа [GetCurrentYear] року"
  flavor_tur.132.desc: "Бажаючи поправити грошові справи держави, [grand_vizier.GetName] підготував нову систему податкового відкупу під назвою #italic малікяне#!. Село або район будуть віддані тому, хто заплатить більше, після чого переможець аукціону отримає довічне право стягувати податок з цих земель. Великий візир стверджує, що нова система покращить стан речей — довічний відкупник буде зацікавлений розвивати добробут своїх земель, а не вичавлювати їх досуха до закінчення контракту. Також скоротяться витрати на бюрократичне оформлення однорічних контрактів, звичайних для колишніх часів. З іншого боку, ці короткострокові контракти були досить прибуткові."
  flavor_tur.132.historical_info: "У 1695 році невдалий великий візир Ельмас Мехмед-паша запровадив систему малікяне. Ймовірно, він щиро прагнув збільшити доходи держави в довгостроковій перспективі, але результат вийшов неоднозначним. Система малікяне зустріла лютий опір з боку власників старого покоління, а влада виявилася не в змозі встежити за довічними наділами нового типу. Незабаром країна зазнала великих військових втрат, і реформа ніяк не допомогла у виплаті платні солдатам. Сам Ельмас був убитий власними підлеглими в 1697 році, а в 1703 році яничари, незадоволені затримками у виплатах, скинули Мустафу II."
  flavor_tur.132.a: "Ми проведемо реформу."
  flavor_tur.132.b: "Ми залишимо стару систему оподаткування."
  malikane_available.tt: "Відкриває доступ до [Concept('government_reform','державного принципу')|e] «[ShowGovernmentReformName('ottoman_malikane_tax_reform')]»."
  flavor_tur.133.title: "Ціна науки"
  flavor_tur.133.desc: "Багатьом вченим з числа духовенства все важче і важче знайти роботу. На каді завжди є попит, але таких посад мало і на них дуже багато конкурентів. Отці тепер радять синам не ставати вченими, і, можливо, навіть зовсім не вступати до #TOOLTIP:BUILDING_TYPE,madrasa,X #L медресе#!#!. Вчені з тугою згадують дні Алі аль-Кавшаджі та Таки ад-Діна, коли держава вітала будь-яку науку."
  flavor_tur.133.historical_info: "XVII століття видалося непростим для османських вчених. У Константинополі не бракувало медресе, тож здобути гарну освіту могли всі охочі, проте через низку економічних потрясінь зарплати вчених зменшилися, і це збіглося з повальним захопленням абстрактними науками. Кар'єра вченого перетворилася на важке і не надто прибуткове заняття, і багато талановитих людей віддавали перевагу торгівлі, ремеслу або бюрократії."
  flavor_tur.133.a: "Це було неминуче."
  flavor_tur.133.b: "Потрібно вкласти кошти в науку."
  flavor_tur.134.title: "Війна за провінцію [target_province.GetNameWithNoTooltip]"
  flavor_tur.134.desc: "Кораблі, що перевозили високопоставлених паломників до #TOOLTIP:LOCATION,$mecca_tt$,X #L Мекки#!#!, зазнали зухвалого нападу піратів. Серед убитих розбійниками були колишній головний євнух, каді Каїра та годувальниця самого повелителя. Згодом пірати стали на якір у порту поблизу району [ShowLocationName('candia')], у провінції [target_province.GetName]. Цей острів давно вже дошкуляє нам, і різні придворні угруповання закликають оголосити війну державі [target_country.GetName] — але [objecting_vizier.GetName] рішуче заперечує, стверджуючи, що війна сильно вдарить по нашій скарбниці."
  flavor_tur.134.historical_info: "У середині XVII століття вплив Венеції почав слабшати, а османи давно хотіли привласнити собі острів Крит, що на той час перебував під контролем республіки. Коли мальтійські лицарі захопили корабель з паломниками, а потім відправили частину полонених на Крит як рабів, османи нарешті отримали чудовий привід оголосити венеціанцям війну. Великий візир Семіз Мехмед-паша виступав проти кампанії, але зустрів лютий опір з боку придворних «яструбів». Історія показала, що візир мав рацію: війна виявилася довгою і затратною."
  flavor_tur.134.a: "Що б не говорив візир, війна — значить війна!"
  flavor_tur.134.b: "Нам важливіше добробут країни."
  flavor_tur.135.title: "[target_ruler.GetShortNameWithNoTooltip] піддається поганому впливу"
  flavor_tur.135.desc: "[target_ruler.GetShortName] останнім часом неважливо почувається і водить компанію з людьми, яких явно більше цікавить особиста вигода, ніж благополуччя нашого правителя. Перший з них — чоловік на ім'я [cinci_hoca.GetName], самопроголошений духовний цілитель, якого багато хто в нашому духовенстві вважає просто шарлатаном. [ROOT.GetCountry.GetGovernment.GetRulerTitle] же, тим часом, хоче дарувати цілителю високий пост і подібним же чином піднести інших лизоблюдів."
  flavor_tur.135.historical_info: "Султан Ібрагім відзначався фізичною слабкістю та неврівноваженістю характеру, що не дивно, враховуючи, в яких умовах він зростав: майже всі його брати стали жертвами придворних змов. Він швидко потрапив під вплив своєї могутньої матері Кьосем-султан та маніпуляторів різного штибу, серед яких — фрейліна Шекерпаре Хатун, адмірал Сілахдар Юсуф-паша та Джинджі Ходжа — знахар-шарлатан, який стверджував, ніби здатен вилікувати хвороби правителя. У той час саме ці люди фактично керували країною."
  flavor_tur.135.a: "Що хоче [ROOT.GetCountry.GetGovernment.GetRulerTitle], те він і отримає!"
  flavor_tur.135.b: "Вигнати цих дурнів з двору!"
  flavor_tur.135.c: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] буде зміщений яничарами."
  flavor_tur.136.title: "[target_character.GetShortNameWithNoTooltip] Екстравагантний"
  flavor_tur.136.desc: "[target_character.GetShortName] досі не залишив спадкоємця, що може мати погані наслідки для держави. Втім, його мати [valide_sultan.GetName] знає, як виправити ситуацію, що склалася. Відомо, що [ROOT.GetCountry.GetGovernment.GetRulerTitle] любить шовки, хутро, коштовності та пишних жінок. Надаючи йому все це, ми надійно утримаємо його в гаремі, подалі від державних справ — а заодно забезпечимо майбутнє династії «[target_character.GetDynasty.GetName]»."
  flavor_tur.136.historical_info: "На час, коли Ібрагім зійшов на престол, усі його брати були вже мертві, і в правлячій родині він залишився єдиним чоловіком. Його могутня мати Кьосем придумала, як вирішити цю проблему, а заодно тримати сина під контролем: вона оточила Ібрагіма розкішшю та регулярно постачала йому рабинь для плотських утіх. У результаті султан став батьком щонайменше два десятки разів і врятував династію Османів від вимирання, проте його марнотратство, а також звичка балувати улюблених наложниць та численних лизоблюдів посприяли його передчасній кончині."
  flavor_tur.136.a: "Матері завжди видніше."
  flavor_tur.136.b: "Ні, нам допоможе [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.137.title: "Судді для правовірних"
  flavor_tur.137.desc: "#italic Каді#!, #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламські#!#! судді з усіх питань — один із давніх стовпів, на якому тримається держава, і така посада — мрія багатьох вчених. Розвиток системи управління та податкового відкупу призвів до того, що каді бажають домогтися більшої автономії у своїх земельних наділах — #italic кадилуках#!. Вони стверджують, що така автономія зміцнить наше право володарювати над усіма мусульманами та підвищить взаємну довіру їх та Блискучої Порти один до одного."
  flavor_tur.137.historical_info: "У XVII столітті влада султана в Османській імперії стала поступово слабшати, а такі інститути, як яничари та каді, почали, навпаки, нарощувати міць. Каді отримували у своє розпорядження так звані кадилуки, на території яких вони самостійно контролювали військову повинність та оподаткування. Такі привілеї дозволяли каді домагатися чималого впливу, особливо у віддалених провінціях, де влада центру була не так сильна. Авторитет каді зріс ще більше після Едірнського інциденту 1703 року, під час якого був повалений султан Мустафа II."
  flavor_tur.137.a: "Вони заслужили нашу довіру."
  flavor_tur.137.b: "У них і так достатньо влади."
  has_enabled_kadiluks_privilege: "Ця [Concept('estate_privilege','станова привілегія')|e] стала доступна через [Concept('event','подію')|e] «$flavor_tur.137.title$»."
  flavor_tur.138.title: "Брак писарів"
  flavor_tur.138.desc: "Наш бюрократичний апарат, $late_ottoman_bureaucracy$, перетворився на величезний механізм із писарів, рахівників та чиновників, що працюють на благо держави. Такому апарату потрібні досвідчені писарі, а знайти їх стає дедалі важче. Вищі чиновники благають збільшити фінансування та звертають нашу увагу на те, що зараз багато посад у їхніх кабінетах так і залишаються незайнятими, а полиці канцелярій збирають пил."
  flavor_tur.138.historical_info: "У XVII столітті Османська імперія з патримоніальної держави, одноосібно керованої султаном, почала перетворюватися на бюрократичну державу, де ключову роль відігравали інститути. Головною ознакою таких змін стало стрімке розростання бюрократичного апарату. У підсумку бюрократи з'їхали з палацу Топкапи і стали менше залежати від правлячої родини. Попит на хороших писарів був надзвичайним, оскільки більшість документів все ще залишалися рукописними."
  flavor_tur.138.a: "Допоможемо чим зможемо."
  flavor_tur.138.b: "Краще вкластися в корпус яничарів."
  flavor_tur.138.c: "Який зиск від цих бюрократів?"
  flavor_tur.139.title: "[kemankes.GetNameWithNoTooltip] і його реформи"
  flavor_tur.139.desc: "[kemankes.GetName] старанно розробляє численні реформи щодо розширення флоту, скорочення армії з посиленням її підготовки, а також будівництва укріплень у прикордонних провінціях. Більш масштабним завданням стане реорганізація фінансів держави, мета якої — боротьба з корупцією та затвердження державних цін на товари на місцевих ринках, що дасть Блискучій Порті більше контролю над економікою. Він, втім, нажив собі чимало ворогів у [ROOT.GetCountry.GetGovernment.GetAdjective]ому гаремі — щоб реалізувати свої плани, йому, можливо, спершу доведеться розібратися з цими ворогами."
  flavor_tur.139.historical_info: "Як і деякі його вороги при дворі, Кеманкеш Кара Мустафа-паша був одночасно надзвичайно розумний і безжальний. Зайнявши посаду великого візира, він скоротив чисельність яничарів і сипахів і зробив серйозну спробу направити османську економіку в більш меркантилістське русло. Він повністю реорганізував країну, борючись зі зловживаннями з боку збирачів податків щодо простих людей, і при цьому ввів суворі покарання за порушення своєї нової політики. Зрештою Кеманкеш спробував умовити яничарів повстати проти валіде-султан Кьосем та інших наближених Ібрагіма. Однак його зухвалий план не спрацював, і його було страчено за зраду в 1644 році."
  flavor_tur.139.a: "Без цих змін не обійтися."
  flavor_tur.139.b: "Можливо, він занадто амбітний..."
  flavor_tur.140.title: "$tulip_period$"
  flavor_tur.140.desc: "У нашій країні настає нова епоха. Художники, поети та архітектори, надихаючись як #TOOLTIP:CULTURE,turkish_culture_tt,X #L турецькою#!#! культурою, так і новими рухами #TOOLTIP:CONTINENT,europe,X #L європейського#!#! мистецтва, створюють роботи, вишукані, немов квіти. Схоже, настав час скористатися зміною загального настрою та реалізувати реформи, які зададуть усій державі новий курс у дипломатії та торгівлі. Це принесе нам велику користь у майбутньому."
  flavor_tur.140.historical_info: "Епохою тюльпанів, або #italic Ляле Деврі#!, називають короткий мирний період з 1718 по 1730 роки, що характеризувався розквітом османського мистецтва та архітектури. Великий візир Невшехірлі Ібрагім-паша проводив нову політику, спрямовану на налагодження відносин та торгівлі з іншими країнами. Надихнувшись європейським стилем бароко, творці та зодчі того часу тяжіли до пишних форм та квіткових орнаментів. Тюльпани і до цього нерідко зустрічалися в османському мистецтві, проте новий рух вивів їх на центральне місце, і вони стали справжнім символом епохи."
  flavor_tur.140.a: "Так, ми повинні дивитися в майбутнє."
  flavor_tur.140.b: "Ми не піддамося впливу невірних."
  flavor_tur.141.title: "Сила друкованого слова"
  flavor_tur.141.desc: "[muteferrika.GetName] багато років вірно служив нам на дипломатичній ниві, але справжньою його пристрастю завжди були науки, і він довго вивчав історію #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Тепер він хоче заснувати в місті [capital_location.GetName] друкарню, де буде використано новий, що тільки нещодавно почав поширюватися в державі винахід — рухомі #TOOLTIP:LANGUAGE,arabic_language,X #L арабські#!#! шрифти. Дехто з духовенства різко проти такого нововведення — його противники стверджують, що друк знищить мистецтво каліграфії, яке так цінують богобоязні люди."
  flavor_tur.141.historical_info: "Хоча друкарські верстати з єврейським алфавітом існували в Османській імперії протягом століть, верстати з рухомим арабським шрифтом почали з'являтися тільки у XVIII столітті. У 1726 році угорський вчений і дипломат Ібрагім Мутеферріка звернувся до суду за дозволом друкувати в Константинополі книги нерелігійного змісту. За наступні два з лишком десятиліття він випустив 23 друковані книги, серед яких — атлас, словник, історичні та наукові праці."
  flavor_tur.141.a: "Ми підтримаємо це починання."
  flavor_tur.141.b: "Заявимо, що праві [ROOT.GetCountry.GetGovernment.GetEstateNameWithnoTooltip('clergy_estate')|l]."
  muteferrika_forgotten.tt: "[muteferrika.GetNameWithNoTooltip] кане в безвість"
  flavor_tur.142.title: "Протест писарів"
  flavor_tur.142.desc: "Друкарня з рухомим шрифтом, яку заснував [muteferrika.GetName], підштовхнула вивчення наук, але разом з тим і нажила собі чимало ворогів серед писарів бюрократичного апарату. Писарі, побоюючись, що їх повністю замінить друкарський прес, вимагають, щоб ми закрили друкарню — більше того, вони знайшли прихильників серед яничарів. Не поступившись їм, ми ризикуємо спровокувати бунт — але, знову ж таки, що таке друкарня порівняно зі стабільністю держави?"
  flavor_tur.142.historical_info: "Друкарський верстат Ібрагіма Мутеферріки пропрацював лише кілька десятиліть. За цей час першодрукар нажив собі ворогів не лише серед улемів, а й впливових писарів, які боялися, що їхнє ремесло стане незатребуваним. У підсумку султан Ахмед III був змушений закрити підприємство Мутеферріки. Пізніше британський дипломат Джеймс Маріо Матра спробував заснувати в Стамбулі ще одну друкарню, проте зазнав невдачі, зіткнувшись зі таким же лютим опором, як і його попередник."
  flavor_tur.142.a: "$flavor_tur.16.b$"
  flavor_tur.142.b: "Ми збережемо друкарський верстат."
  flavor_tur.143.title: "Залізний замок"
  flavor_tur.143.desc: "Гори та пагорби, де мешкають курди — бастіон нашої держави, залізний замок, зведений самою природою. Місцева курдська знать, однак, шукає більшої автономії, обіцяючи докласти ще більше зусиль для зміцнення та розвитку району [kurdish_stronghold_location.GetName], якщо ми надамо їй підвищену незалежність у її місцевих справах. Погодившись, ми ризикуємо викликати заздрість своєї аристократії."
  flavor_tur.143.historical_info: "Курдистан мав для османів важливе економічне та стратегічне значення. Цей гірський регіон забезпечував відмінний захист кордону від ворожого Ірану, а його шахти Кебан-Ергані слугували країні одним із головних джерел срібла. На зорі імперії османські султани надали курдській знаті виняткову автономію, яка зберігалася аж до початку процесу централізації в XIX столітті."
  flavor_tur.143.a: "Курди важливі для нас."
  flavor_tur.143.b: "Ми вчинимо з точністю до навпаки."
  kurds_pleased_tooltip: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pops','груп населення')|e] з числа аристократії підвищиться на [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%]."
  kurds_displeased_tooltip: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] з числа аристократії знизиться на [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%], але райони з курдською культурою, де є пагорби або гори, отримають [Concept('control','контроль')|e]."
  flavor_tur.144.title: "Загроза моральності"
  flavor_tur.144.desc: "Настала Епоха тюльпанів з її любов'ю до всього #TOOLTIP:CONTINENT,europe,X #L європейського#!#!, і особливо одягу, який із задоволенням почали носити придворні дами. Багато #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманок#!#! та #TOOLTIP:RELIGIONGROUP,christian,X #L християнок#!#! тепер вільно спілкуються одна з одною і високородні західні жінки часто відвідують [ROOT.GetCountry.GetGovernment.GetAdjective]ий гарем. Нові свободи та можливості припали до смаку нашим містянкам — у чому, ймовірно, і немає ніякої шкоди, але духовенство турбується про скромність мусульманок і закликає повернутися до колишніх норм."
  flavor_tur.144.historical_info: "В османській культурі був період занепокоєння частими близькими контактами мусульманок і християнок, особливо в лазнях-#italic хамамах#! — вважалося, що там християнські жінки могли чинити підривний вплив на скромність і мораль. $tulip_period$, однак, ознаменувала собою частіші зустрічі високородних османських і західних жінок — однією з таких, наприклад, була леді Мері Вортлі-Монтегю, дружина англійського посла. У цей період жінки стали частіше брати участь у громадській діяльності — і тоді ж почали протестувати проти нововведень консервативні верстви суспільства, що призвело, зокрема, до заборони жінкам відвідувати #italic каймачні#! крамниці."
  flavor_tur.144.a: "Ми повинні йти в ногу з часом."
  flavor_tur.144.b: "Ми захистимо наші цінності за будь-яку ціну."
  flavor_tur.145.title: "Викуп з Ісландії"
  flavor_tur.145.desc: "Не так давно берберські пірати напали на район [raid_location.GetName] в Ісландії, самотньому острові на задвірках Атлантики. Вони повернулися на невільницькі ринки регіону [barbary_location.GetName] з великим вантажем світлошкірих бранців. Деяким із викрадених, однак, вдалося зібрати великі суми грошей на викуп, втрутився в справу і [target_country.GetGovernment.GetRulerTitle] держави [target_country.GetName], внісши кошти зі своєї особистої скарбниці та ввічливо, але твердо попросивши, щоб ми скористалися своїм впливом у регіоні [barbary_location.GetNameWithNoTooltip] для звільнення його підданих."
  flavor_tur.145.historical_info: "Після проголошення дванадцятирічного перемир'я в 1609 році багато іспанських, голландських та англійських моряків зв'язалися з берберськими піратами і навчили їх плавати у відкритому океані. Згодом пірати тероризували Атлантику і кілька разів нападали на Мадейру, Ірландію, Ісландію та Фарерські острови. Але багато ісландських бранців, яких привезли до Алжиру після великих набігів за рабами в 1627 році, в підсумку були викуплені. Пірати звільнили священика Оулавюра Егільссона, щоб той зібрав кошти для викупу інших в'язнів. У підсумку в ситуацію втрутився данський король."
  flavor_tur.145.a: "Ми люб'язно погодимося."
  flavor_tur.145.b: "Ні за що. Влаштуємо більше набігів!"
  slaves_released: "Незаконно захоплені раби звільнені."
  slaves_sent_home.tt: "Більшість [Concept('pop','груп населення')|e] в районі [barbary_location.GetNameWithNoTooltip] повернуться в регіон [raid_location.GetNameWithNoTooltip]."
  flavor_tur.146.title: "Дерево мерців"
  flavor_tur.146.desc: "Група яничарів стукає в двері [ROOT.GetCountry.GetGovernment.GetAdjective]ого палацу, вимагаючи компенсації за свої образи. У них із собою довгий список скарг і такий же довгий список чиновників, яких вони вважають винними в їхніх проблемах. Яничари вже почали хапати людей зі списку і вішати їх на найближчій #italic чинарі#!. [minister_1.GetName] та [minister_2.GetName], заявляють вони, не виплатили їм платню і загалом сильно нашкодили державі, а тому мають бути видані на розправу."
  flavor_tur.146.historical_info: "Інцидент біля чинари стався в 1656 році. Бунтівні солдати, які нещодавно повернулися з Критської війни і були незадоволені розмірами отриманих виплат, пред'явили Мехмеду IV та його впливовій матері Турхан список із тридцяти чиновників, які, на їхню думку, були винні в поточних економічних проблемах, і зажадали видати їм цих людей. Султан дійсно передав бунтівникам кількох осіб, і ті тут же їх повісили. Після цієї події Турхан зрозуміла, що державі потрібніше ефективніше управління, і призначила Кьопрюлю Мехмеда-пашу на посаду великого візира."
  flavor_tur.146.a: "Ми видамо винних."
  flavor_tur.146.b: "Ми заплатимо солдатам."
  flavor_tur.146.c: "Ми повісимо бунтівників на тому ж дереві."
  flavor_tur.147.title: "Доми мудрості"
  flavor_tur.147.desc: "[library_enthusiast.GetName] пристрасно любить вчитися і хоче докласти своїх зусиль до чогось, окрім мечетей. Він пропонує нам вкласти кошти в #TOOLTIP:BUILDING_TYPE,library,X #L бібліотеки#!#! нового типу, великі та розкішні, але доступні широкій публіці, щоб усі в нашій державі могли доторкнутися до мудрості. Містяни будуть дуже раді такій можливості, серед духовенства ж багато противників нового починання — вони не бачать сенсу пропагувати знання серед низького стану."
  flavor_tur.147.historical_info: "До кінця XVII століття османські публічні бібліотеки розташовувалися в невеликих приміщеннях при мечетях та благодійних установах. Доступ до обширних архівів мав далеко не кожен, а цінні пам'ятки літератури припадали пилом у Каїрській генізі та інших забутих сховищах. Бібліотека Кьопрюлю, зведена в 1678 році в Константинополі, стала першою публічною бібліотекою на Близькому Сході. Бум будівництва бібліотечних будівель з книжковими сховищами та читальними залами припав на епоху тюльпанів. Усі ці споруди були тією чи іншою мірою натхненні європейською класичною архітектурою."
  flavor_tur.147.a: "Це вартий проєкт."
  flavor_tur.147.b: "Будемо будувати мечеті, як і раніше."
  flavor_tur.148.title: "Кров на шовкових простирадлах"
  flavor_tur.148.desc: "Валіде-султан [valide_sultan.GetName] та хасекі-султан [haseki_sultan.GetName], яку шанує улюбленою наложницею [target_ruler.GetShortName], ворогують між собою і зараз їхнє суперництво досягло піку. [valide_sultan.GetNameWithNoTooltip] давно займала значущу позицію при дворі, але тепер розклад сил змінився — головний чорний євнух та [haseki_sultan.GetShortNameWithNoTooltip] об'єдналися. Вони готові увійти в гарем і раз і назавжди покінчити з владою валіде-султан, проливши чимало крові. [valide_sultan.GetShortNameWithNoTooltip], однак, здаватися не має наміру і намагається підмовити сина вбити свою фаворитку."
  flavor_tur.148.historical_info: "Кульмінацією бурхливого історичного періоду Жіночого султанату стало суперництво Кьосем, яка понад двадцять років володіла чималою владою, як валіде-султан, і Турхан, хасекі-султан Ібрагіма I, сина Кьосем. Кьосем добре розумілася на політиці, але союз валіде-султан з яничарами підштовхнув її ворогів заохотити амбіції Турхан, і молода жінка почала будувати змову проти Кьосем за сприяння Сулеймана-аги, головного чорного євнуха султанського двору. У підсумку в гаремі схрестилися сотні євнухів та яничар, але прихильники Кьосем поступалися ворогам чисельно і тому втекли. Сама поважна валіде-султан була знайдена і задушена — за чутками, її ж власними косами."
  flavor_tur.148.a: "Підтримати наложницю."
  flavor_tur.148.b: "Хай живе мати султана."
  flavor_tur.149.title: "Євнухи Каїра"
  flavor_tur.149.desc: "У Каїрі назрівають неприємності — у далекому регіоні [rebellion_location.GetName] почалися заворушення. Оскільки саме в Каїрі оселилися, вийшовши у відставку, багато наших колишніх чорних євнухів, на вулиці міста тепер вийшли розгнівані натовпи, які кричать, що саме ці євнухи, досвідчені в політиці, повинні вирушати в регіон [rebellion_location.GetNameWithNoTooltip], а не сини єгиптян. Старі євнухи, однак, вважають це недоцільним і обіцяють виділити більше коштів на облаштування Каїра, якщо ми не будемо відправляти їх до бунтівників."
  flavor_tur.149.historical_info: "Посада гаремного євнуха не була довічною. За традицією в старості чорні євнухи йшли у відставку до Каїра, де володіли багатством і чималим впливом. Єгипет відігравав велику роль у житті цих людей, оскільки часто саме там їх оскопляли та навчали, взявши в рабство в Ефіопії. У 1654 р. в Хабеші, на території османської Еритреї, спалахнув бунт і губернатора в Каїрі попросили мобілізувати війська. Це викликало протести — каїрці вирішили, що впливові відставні євнухи, пов'язані з Хабешем особистими зв'язками, повинні вирушити туди і вирішити ситуацію самостійно."
  flavor_tur.149.a: "Євнухи заслужили відставку."
  flavor_tur.149.b: "Відправимо їх у [rebellion_location.Custom('LR_VP')|l] [rebellion_location.GetNameWithNoTooltip]."
  cairenes_displeased_tooltip: "Усі [Concept('pops','групи населення')|e] #TOOLTIP:LOCATION,cairo_tt,X #L Каїра#!#!, що не належать до вищого суспільства, крім #TOOLTIP:POPTYPE,slaves,X #L рабів#!#!, втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction','задоволення')]."
  cairenes_pleased_tooltip: "Усі [Concept('pops','групи населення')|e] #TOOLTIP:LOCATION,cairo_tt,X #L Каїра#!#!, що не належать до вищого суспільства, крім #TOOLTIP:POPTYPE,slaves,X #L рабів#!#!, отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] до [Concept('pop_satisfaction','задоволення')]."
  flavor_tur.150.title: "Ображений слуга"
  flavor_tur.150.desc: "Літній євнух [yusuf_agha.GetName] служив ще минулому правителю, але потім впав у немилість — за його словами, через інтриги, які плели [target_ruler.GetName] та [Select_CString(target_ruler.IsFemale, 'її', 'його' )] [ROOT.GetCountry.GetGovernment.GetCourtTitle]. Зараз він животіє в злиднях. Якщо в Блискучій Порті є хоч якась справедливість, ми повинні повернути йому хоча б частину багатств і слуг, щоб він зміг спокійно прожити решту днів у #TOOLTIP:LOCATION,cairo_tt,X #L Каїрі#!#!, працюючи на благо #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_RP')|l]#!#! та [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_tur.150.historical_info: "Юсуф-ага був кизляр-агою, головним чорним євнухом Мехмеда IV, і, судячи з усього, дуже здібною людиною. Коли султана змістили за програш у Великій Турецькій війні, в немилість потрапив і Юсуф-ага. Повстанці конфіскували та продали все його майно, він був змушений піти у відставку до Єгипту в злиднях, оплакуючи свою долю — той, хто колись був головним євнухом у гаремі, став «грошовим африканським рабом»."
  flavor_tur.150.a: "Його проблеми нас не стосуються."
  flavor_tur.150.b: "Необхідно виплатити компенсацію."
  flavor_tur.150.c: "Він може спокутувати провину, повернувшись на службу."
  yusuf_agha_retires_in_poverty.tt: "[yusuf_agha.GetNameWithNoTooltip] іде на спочинок жебраком."
  yusuf_agha_retires_in_splendor.tt: "[yusuf_agha.GetNameWithNoTooltip] іде на спочинок багатим."
  flavor_tur.151.title: "Краса літер"
  flavor_tur.151.desc: "Калліграф і друкар [hafiz_osman.GetName], готовий наставляти і бідних, і багатих, досяг вершин свого мистецтва. Поважні родичі-[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] виховали його талановитим і благочестивим. Зараз він запропонував навчити синів правителя вишуканому накресленню літер — зрозуміло, не безкоштовно. Що скаже [target_ruler.GetShortName]?"
  flavor_tur.151.historical_info: "Хафіз Осман був одним із найвидатніших каліграфів в османській історії. Він навчав султанів Ахмеда II, Мустафу II та Ахмеда III, але також і давав уроки біднякам. В ісламському світі каліграфія вважалася вельми шанованим і цінним видом мистецтва, Хафіз зберігав у ній баланс між нововведеннями та повагою до традицій. Його зразки робіт у жанрі хілья, словесних описів пророка Мухаммада, стали в Османській імперії зразком."
  flavor_tur.151.a: "Це справжній геній."
  flavor_tur.151.b: "Каліграфія вже була бездоганною."
  hafiz_osman_retires.tt: "[hafiz_osman.GetNameWithNoTooltip] залишається в безвісті."
  flavor_tur.152.title: "Червоні монети"
  flavor_tur.152.desc: "Економіка [ROOT.GetCountry.Custom('CF_RP')|l] перебуває не в найкращому стані, а наші солдати знову скаржаться, що їм платять знеціненою #italic червоною монетою#!. Радники пропонують провести радикальну грошову реформу. Заборонивши обіг будь-яких іноземних монет, ми зможемо переплавити їх і викарбувати нову валюту. Це дозволить нам впоратися з інфляцією та домогтися більшого контролю над фінансовою системою, але в короткостроковій перспективі зашкодить торгівлі."
  flavor_tur.152.historical_info: "Османська срібна монета акче з часом знецінилася настільки, що стала занадто дешевою для повсюдного використання, і навіть золоті монети пара девальвувалися, через що іноді зневажливо називалися #italic червоними монетами#!. Велика Турецька війна змусила османів розпочати грошові реформи, що вилилося в 1697 році в заборону всіх іноземних монет. Це був сміливий хід, оскільки раніше османська торгівля залежала від голландського левового талера, але йому на зміну прийшла срібна монета куруш, яка і стала основою економіки в прийдешньому столітті."
  flavor_tur.152.a: "Ввести заборону."
  flavor_tur.152.b: "Ні, ми повинні підтримати міжнародну торгівлю."
  flavor_tur.153.title: "Барон [francis_de_tott.GetDynasty.GetNameWithNoTooltip]"
  flavor_tur.153.desc: "У #TOOLTIP:CONTINENT,europe,X #L Європі#!#! відбуваються стрімкі зміни — особливо в такій галузі, як артилерія. Деякі радники вже турбуються про наше відставання в цій сфері. Але, на щастя, #L [GetCountry('FRA').GetAdjective|l]#!ий аристократ [francis_de_tott.GetName] готовий нам допомогти. Цей експерт із мортир і гаубиць має багато ідей щодо того, як покращити наші укріплення, корабельні гармати та артилерійські полки, проте його послуги обійдуться недешево."
  flavor_tur.153.historical_info: "У середині 18 століття після кількох десятиліть миру османська армія відставала від збройних сил країн Європи. Назріла необхідність реформ і можливість їх реалізації постала в особі Франца Тотта, французького посланця, який служив раніше консулом у Кримському ханстві. Він вступив на службу до османів офіцером під час Російсько-турецької війни (1768-1774) і пізніше брав участь у серії військових реформ. Серед цих реформ були будівництво нових фортифікацій на Босфорі та створення мобільних артилерійських військ."
  flavor_tur.153.a: "Наймемо його."
  flavor_tur.153.b: "Нам це не по кишені."
  de_tott_retires.tt: "[francis_de_tott.GetNameWithNoTooltip] шукатиме роботу в інших місцях."
  flavor_tur.154.title: "Пожежа в [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_tur.154.desc: "Беззаконний набрід, таємно найнятий #ONCLICK:COUNTRY,[russia.Custom('CL_tt')] #TOOLTIP:COUNTRY,[russia.Custom('CL_tt')],X [russia.Custom('CL_TP')|L]#!#!, увірвався до [target_location.Custom('LR_VP')|l] [target_location.GetName] біля нашого кордону, влаштував масову різанину та підпалив будинки. Загинули тисячі мирних жителів. Це зухвале приниження нашого суверенітету та престижу: багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] вимагають, щоб ми негайно оголосили війну. Втім, інші придворні обережно натякають, що [russia.GetNameWithNoTooltip] — занадто могутній ворог, а наші сили та засоби краще витратити на відновлення [target_location.Custom('LR_RP')|l]."
  flavor_tur.154.historical_info: "Російсько-турецька війна, що тривала з 1768 по 1774 роки, почалася з внутрішніх протиріч у Речі Посполитій, де поступово набирала все більше контролю Росія, що загрожувало безпеці османів та союзного їм Кримського ханства. У 1768 році українські козаки за підтримки Росії увійшли до османського прикордонного міста Балта, нібито переслідуючи там ворожих їм польських солдатів. У підсумку козаки спалили місто дотла і вирізали його жителів. Налаштовані проти росіян поляки, яких тепер підтримувала Франція, підштовхнули султана Мустафу III оголосити війну Росії — війну, що стала для османів справжнім лихом."
  flavor_tur.154.a: "Якщо вони хочуть війни, вони її отримають."
  flavor_tur.154.b: "Ми підставимо іншу щоку."
  burnt_town_event.a.tt: "$constantinople_fire_event.b.tt$"
  burnt_town_event.b.tt: "$constantinople_fire_event.a.tt$"
  flavor_tur.155.title: "[mehmed_tahir.GetNameWithNoTooltip] та його праці"
  flavor_tur.155.desc: "[Select_CString(target_character.IsFemale, 'Горда й благочестива', 'Гордий і благочестивий' )] [target_character.GetName] бажає залишити свій слід в історії [ROOT.GetCountry.Custom('CF_RP')|l]. Хоч би як заперечували [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], які воліють витрачати казенні кошти на фортеці та кораблі, [Select_CString(target_character.IsFemale, 'вона', 'він' )] хоче звести мечеті, мости та гробниці, що довговічністю та пишнотою не поступатимуться собору Святої Софії. Але щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(target_character.IsFemale, 'змогла', 'зміг' )] здійснити свою мрію, [Select_CString(target_character.IsFemale, 'їй', 'йому' )] потрібен геніальний архітектор. Зараз у нас є лише один такий майстер — [mehmed_tahir.GetName]."
  flavor_tur.155.historical_info: "За правління Мустафи III, попри довгу виснажливу війну з Росією, було розпочато багато будівельних проєктів. Його головний архітектор Мехмед Тахір-ага очолив відновлення колосальної мечеті Фатіх, що виділялася на міському обрії Стамбула, він же спроєктував гробницю султана та багато інших мечетей у місті. Хоча султан Мустафа після своєї ранньої смерті залишив імперію в тяжкій економічній та військовій ситуації, він же залишив і велику архітектурну спадщину."
  flavor_tur.155.a: "Негайно призначити його головним архітектором!"
  flavor_tur.155.b: "Послухаймо, що скажуть [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_tur.156.title: "Кінець Епохи тюльпанів"
  flavor_tur.156.desc: "[petrona_halil.GetName], командувач яничарів, остаточно розчарувався в миролюбній політиці Епохи тюльпанів, вважаючи її ознакою занепаду держави. Зараз він веде війська до столичного міста [target_capital.GetName], вимагаючи, щоб [target_character.GetName] [Select_CString(target_character.IsFemale, 'капітулювала', 'капітулював' )] та [Select_CString(target_character.IsFemale, 'скасувала', 'скасував' )] нещодавні реформи. [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] знає, як вирішити цю проблему, але для цього потрібен час. Якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] офіційно зречеться влади, ми зможемо умиротворити менш радикальних учасників повстання, а потім зробити так, що [petrona_halil.GetNameWithNoTooltip] з рештою просто зникнуть без зайвого шуму. Так ми хоча б врятуємо престиж [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_tur.156.historical_info: "Реформи та розкіш при дворі Епохи тюльпанів розлютили частину населення, особливо албанських яничарів, які й стали основними учасниками бунту, очоленого яничаром Петроною Халілем. Кілька тижнів повсталі контролювали імперію та змусили Ахмеда III піти у відставку, але великий візир, заручившись допомогою кримського хана та вірних яничарів, зміг придушити бунт. Петрона Халіль був страчений, як і тисячі його послідовників. З цим сплеском насильства Епоха тюльпанів добігла кінця, в країні встановився жорсткіший політичний клімат."
  flavor_tur.156.a: "Це необхідна жертва."
  flavor_tur.156.b: "Поступимося їхнім вимогам."
  flavor_tur.156.c: "Знищити зрадників на полі бою."
  janissaries_will_not_revolt_tt: "[target_rebel.GetName] буде тимчасово [Select_CString(target_rebel.IsFemale, 'умиротворена', 'умиротворений' )]"
  revolt_will_not_spread_too_far_tt: "[target_rebel.GetName] приверне до свого заколоту менше [Concept('pops','груп населення')|e]"
  revolt_will_spread_further_tt: "[target_rebel.GetName] приверне до свого заколоту значно більше [Concept('pops','груп населення')|e]"
  flavor_tur.157.title: "Підозрілі таємні товариства"
  flavor_tur.157.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] дедалі більше цікавляться таємними товариствами франкмасонського штибу. Вони збираються в ложах і приносять клятви на священній книзі, але в іншому зберігають свої справи в найсуворішому секреті, так що агентам Блискучої Порти не вдається дізнатися в них майже нічого. Самі франкмасони стверджують, що займаються лише невинним дружнім спілкуванням та благодійністю, але [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] закликають їх заборонити, стверджуючи, що ці ложі поширюють атеїзм та інші шкідливі західні ідеї."
  flavor_tur.157.historical_info: "У непрості для Османської імперії часи масонство допомагало людям знайти почуття спільності й у підсумку стало досить популярним серед міської еліти. Перші ложі були засновані в Епоху тюльпанів у 1720-х роках, але незабаром їх заборонили, звинувативши в поширенні ідей атеїзму. Багато десятків років потому заборону зняли, але масонські ідеї вже встигли вплинути на таємні націоналістичні товариства, такі як Філікі Етерія, що відіграло велику роль у становленні грецької незалежності."
  flavor_tur.157.a: "Немає потреби в такій таємності."
  flavor_tur.157.b: "Навряд чи це чимось нам зашкодить."
  freemasons_banned.tt: "Масонство забороняють."
  flavor_tur.158.title: "Королева поезії"
  flavor_tur.158.desc: "[fitnat_hanim.GetNameWithNoTooltip] — дочка Шейх-уль-іслама та надзвичайно обдарована поетеса. Численні шанувальники її творчості засмучені її шлюбом з Мехмедом Ефенді, верховним суддею Румелії, який зовсім не цінує її талант. Вони вимагають, щоб ми розірвали цей шлюб, дозволивши цій розумній жінці й далі творити на славу Блискучої Порти. Однак варто врахувати, що [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] не схвалять подібного втручання в сімейні справи."
  flavor_tur.158.historical_info: "Зубейде, яка писала під псевдонімом Фітнат-ханим, походила з родини видатних богословів. Вона писала вірші у квітчастому жанрі диван, славилася також своєю дотепністю та гумором, що видно з її полеміки з такими поетами-чоловіками, як Хашмет і Коджа Рагип-паша. Пізніші літератори нарекли Зубейде Королевою поезії, але за життя поетесу обмежував шлюб з людиною, яка не схвалювала її освіченість та письменницьку працю. Про її пізні роки відомо мало."
  flavor_tur.158.a: "Розлучення — не справа держави."
  flavor_tur.158.b: "Ми повинні звільнити її."
  flavor_tur.159.title: "Небезпечні слова"
  flavor_tur.159.desc: "[enderunlu_fazil.GetNameWithNoTooltip] має сумнівну репутацію. Колись його притулком була [ShowBuildingTypeNameWithNoTooltip('enderun_academy')], але потім його вигнали звідти за гріховну поведінку. З того часу він прославився як автор еротичних та сатиричних віршів. Хоча його новітня книга «Про жінок» користується популярністю в певних колах, слід пам'ятати, що цей поет походить з роду зрадників: його батько та брат були страчені за участь у заколоті в провінції [ShowProvinceDefinitionName('filastin_province')]. Можливо, нам варто проявити обачність і вигнати його з [target_location.Custom('LR_RP')|l] [target_location.GetName]."
  flavor_tur.159.historical_info: "Ендерунлу Фазил був одним із пізніх творців у жанрі шехренгіз, поезії, що оспівувала чуттєву красу молодих чоловіків, і, рідше, жінок різних країв. Серед його головних робіт — #italic Хубаннаме#!, #italic Книга про красивих юнаків#! та #italic Зенаннаме#!, #italic Книга про жінок#!. Сам він, очевидно, віддавав перевагу першим, не маючи, за його ж словами, схильності до жінок. Втім, саме «Зенаннаме» після смерті письменника була перекладена та видана в Західній Європі — можливо, через зачарування орієнталістів східними гаремами."
  flavor_tur.159.a: "Відправимо його у вигнання."
  flavor_tur.159.b: "Ми повинні покровительствувати його таланту."
  flavor_tur.160.title: "Володар провінції [target_province.GetNameWithNoTooltip]"
  flavor_tur.160.desc: "Будучи нашим намісником у провінції [target_province.GetName], [zahir_al_umar.GetName] значно зміцнив [target_location.Custom('LR_VP')|l] [target_location.GetName]. Володіючи значною владою, він часто утискав інтереси інших намісників, багато з яких тепер вимагають його відставки. Але [zahir_al_umar.GetShortNameWithNoTooltip] повідомив, що готовий передати нам чималу суму золотом, якщо ми відкинемо всі звинувачення і залишимо його при владі."
  flavor_tur.160.historical_info: "Захір аль-Умар розпочав свою кар'єру збирачем податків, але поступово здобув величезну владу і став майже незалежним правителем Османської Палестини. Його політика віротерпимості допомогла йому заручитися підтримкою місцевих сунітських кланів, а торгівля бавовною та оливковою олією — розбагатіти. Він постійно перебував у суперечностях з губернатором Дамаска та власними синами, а в результаті складної серії інтриг зрештою став ворогом уряду в Константинополі. Це й призвело до його падіння та руйнування його династії, але правління аль-Умара, тим не менш, залишило помітний слід у Палестині."
  flavor_tur.160.a: "Його треба позбавити влади."
  flavor_tur.160.b: "Ми з радістю погодимося на цю угоду."
  zahir_dies_in_battle.tt: "[zahir_al_umar.GetNameWithNoTooltip] гине в битві."
  zahir_is_captured.tt: "[zahir_al_umar.GetNameWithNoTooltip] захоплений у полон і страчений."
  zahir_escapes.tt: "[zahir_al_umar.GetNameWithNoTooltip] вислизає від правосуддя."
  flavor_tur.161.title: "Ночі халви"
  flavor_tur.161.desc: "Останнім часом [target_heir.GetName] все частіше відвідує так звані «ночі халви», на яких [ShowAdvanceNameWithNoTooltip('late_ottoman_bureaucracy')] та інші державні службовці збираються в найкращих районах столичного міста [target_capital.GetName] разом з поетами та музикантами. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] схвалюють подібні зібрання, що дають простій людині шанс познайомитися з сановниками Блискучої Порти, однак ночі халви нерідко переходять у гріховні оргії з вином, непристойними піснями, а то й розпусними жінками. Чи гідно, що [target_heir.GetShortNameWithNoTooltip] та представники вищої влади віддаються таким заняттям?"
  flavor_tur.161.historical_info: "Ночі халви, названі так на честь популярного десерту — зібрання в Константинополі, часто поруч з новозбудованим палацом Саадабад, де державні чиновники та представники знаті спілкувалися з поетами та художниками. Поет Недім, який часто відвідував подібні зустрічі, описував їх, як «зібрання, про які Олександр і мріяти не міг». Ночі халви стали відмінною рисою відкритого публіці султанського двору часів Епохи тюльпанів."
  flavor_tur.161.a: "Нехай собі веселяться."
  flavor_tur.161.b: "Потрібно покінчити з цим занепадництвом."
  flavor_tur.162.title: "Чорний, як гріх, солодкий, як пристрасть"
  flavor_tur.162.desc: "У кав'ярнях, де збираються [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] нерідко лунають крамольні промови, а то й обговорюються заколоти, особливо за участю яничарів. Звісно, жваві бесіди за чашкою кави з солодощами корисні для торгівлі та суспільного життя, але нам не завадить розширити шпигунську мережу, щоб жодна таємна розмова не сховалася від наших вух."
  flavor_tur.162.historical_info: "Кав'ярні в Османській імперії були місцем зустрічей людей найрізноманітніших професій, народностей та віросповідань, турецькі ремісники могли сидіти там за одним столом з російськими волоцюгами та венеціанськими купцями. У них велися бесіди, обговорювалося мистецтво, нові ідеї — і повстання. Яничарські кав'ярні підтримували роботу таємних мереж вбивць та збирачів інформації. Уряд активно впроваджував у кав'ярні та аналогічні громадські заклади своїх шпигунів, щоб бути в курсі народних настроїв і знати, якщо десь затівається злочин або бунт."
  flavor_tur.162.a: "Інформація — це влада."
  flavor_tur.162.b: "Треба притиснути кав'ярні до нігтя."
  flavor_tur.162.c: "Кава повинна литися вільно."
  coffee_house_espionage_available.tt: "Відкриває доступ до [Concept('government_reform','державного принципу')|e] «[ShowGovernmentReformName('ottoman_coffee_house_espionage')]»."
  flavor_tur.163.title: "Образлива вистава?"
  flavor_tur.163.desc: "Знаменитий композитор і драматург з #ONCLICK:COUNTRY,[target_rival.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_rival.Custom('CL_tt')],X [target_rival.Custom('CL_RP')|L]#!#! написав п'єсу, в якій двоє героїв рятують своїх коханих з гарему вигаданого паші. Її нещодавня прем'єра в [rival_capital.Custom('LR_PP')|l] [rival_capital.GetName] була із захопленням зустрінута критиками — і стала днем однієї з наших найбільших поразок. При дворі вже щосили читають переклад лібрето цієї п'єси, а дехто з радників стверджує, що ця п'єса написана спеціально для того, щоб образити #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_VP')|L]#!#!."
  flavor_tur.163.historical_info: "#italic Die Entführung aus dem Serail#!, #italic Викрадення із сералю#! — опера Вольфганга Амадея Моцарта, чия прем'єра пройшла з великим успіхом у Відні в 1782 році. Сюжет опери частково натхненний розповідями про корсарів-берберів, які нерідко викрадали пасажирів захоплених ними кораблів заради викупу або продажу в рабство, причому частина рабинь потім опинялися в османських гаремах. Європейці в той час часто називали гареми сералями від перського слова «сарай» — хоча для османів «сарай» зазвичай означав «палац або урядова будівля в цілому»."
  flavor_tur.163.a: "Якщо більше допомагати нашим артистам, вони зможуть створити роботу, рівну цій."
  flavor_tur.163.b: "Адже ця п'єса досить хороша..."
  flavor_tur.164.title: "Радість пахлави"
  flavor_tur.164.desc: "Наближається священний місяць рамадан, а з ним і свято пахлави. Яничари чекають пишних урочистостей і щедрого частування, яке влаштує їм [target_ruler.GetName]. Усі працівники палацової кухні не покладаючи рук готують солодку пахлаву, але дехто з них скаржиться на нестачу цукру, сподіваючись вирішити цю проблему за рахунок державної скарбниці."
  flavor_tur.164.historical_info: "Пахлава була дорогим десертом — готувати її складно і вона вимагає недешевих інгредієнтів на кшталт меду та горіхів. Такі вишукані ласощі подавали в основному на свята, вони стали майже що священною складовою Рамадану, мусульманського місяця посту. Султан видавав величезну кількість пахлави своїм яничарам під час спеціальних процесій, публічних видовищ, що символізували зв'язок між правителем та його солдатами. Яничари несли пахлаву до себе в казарми, співаючи геройські пісні, а наступного дня повертали порожні підноси, показуючи цим, наскільки смачним був подарунок."
  flavor_tur.164.a: "Пахлава повинна бути доставлена."
  flavor_tur.164.b: "Цього року процесії не буде."
  sugar_for_baklava: "Попит на цукор для пахлави"
  flavor_tur.165.title: "Розлив Євфрату"
  flavor_tur.165.desc: "[ShowAreaName('iraq_arabi_area')] у біді. Дамби Євфрату обвалилися, і могутня річка поглинає землю подібно до стародавнього потопу. Тисячі людей вже загинули, а намісник [target_location.Custom('LR_RP')|l] [target_location.GetName] відчайдушно благає про допомогу. Євфрат завжди був непередбачуваним, але тисячолітня праця місцевих жителів дозволила приборкати його води і звернути їх на користь землеробству. Якщо ми не вживемо заходів, усе це буде втрачено назавжди."
  flavor_tur.165.historical_info: "Починаючи з 1680-х років могутня річка Євфрат змінювала русло, що призводило до затоплення величезних областей і повсюдного руйнування. Османи в той час були зайняті війною зі Священною лігою на заході і не могли виділити ресурси для вирішення ситуації в Іраку. Катастрофа призвела до зламу старої стратегії управління в регіоні, і лише з призначенням досвідченого державного діяча Хасана-паші губернатором Багдада в 1704 році імперія змогла повернути собі більшу частину контролю."
  flavor_tur.165.a: "Так вирішив [ROOT.GetCountry.GetReligion.GetGodName]."
  flavor_tur.165.b: "Ми не пошкодуємо на це жодних коштів."
  euphrates_flooding.a.tt: "Усі підконтрольні вам райони в області [ShowAreaName('iraq_arabi_area')] втратять [Concept('prosperity','процвітання')|e] та [Concept('pops','групи населення')|e]."
  euphrates_flooding.b.tt: "Усі підконтрольні вам райони в області [ShowAreaName('iraq_arabi_area')] втратять [Concept('prosperity','процвітання')|e] та [Concept('pops','групи населення')|e], але збиток буде набагато меншим."
  flavor_tur.166.title: "Намісник Багдада"
  flavor_tur.166.desc: "Область [ShowAreaName('iraq_arabi_area')] досі не оговталася від повені, спричиненої розливом Євфрату багато років тому, але [hasan_pasha.GetName] — вельми талановитий лідер та адміністратор. Отримавши посаду валі [target_location.Custom('LR_RP')|l] [target_location.GetName], він зможе повернути цій області процвітання. Однак для цього нам доведеться наділити його значною владою на шкоду авторитету Блискучої Порти."
  flavor_tur.166.historical_info: "Хасан-паша був грузинського походження і брав участь у війнах з Іраном. Ставши губернатором Багдада, він став незамінним для османського уряду, приборкавши непокірні племена і регулярно посилаючи данину до стамбульської скарбниці. Грузинські та черкеські солдати, яких він привів приборкувати місцевих яничарів, дали йому значну владу на місцях, і його династія, іракські мамлюки, правила тими землями більше ста років."
  flavor_tur.166.a: "Відправити його до Багдада."
  flavor_tur.166.b: "Він потрібен нам у місті [target_capital.GetNameWithNoTooltip]."
  hasan_pasha_becomes_governor.tt: "[hasan_pasha.GetName] стає намісником області [ShowAreaName('iraq_arabi_area')]."
  competent_governance.a.tt: "Усі райони області [ShowAreaName('iraq_arabi_area')] у володінні набудуть [Concept('prosperity','процвітання')|e] та [Concept('control','контроль')|e]."
  flavor_tur.167.title: "[target_ruler.GetShortNameWithNoTooltip] відкриває медичне училище"
  flavor_tur.167.desc: "Хоча #L [ShowReligionGroupAdjective('muslim')|l]#!і вчені споконвіку славляться глибокими знаннями в медицині, [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] вважає, що нам є чому повчитися і в прогресивних лікарів #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Ідеальним місцем зустрічі для лікарів Заходу та Сходу могло б стати [ShowBuildingTypeName('medical_school')|l], збудоване в місті [capital_location.GetName], але консервативні [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] заперечують проти цієї ідеї, вважаючи, що вона здатна принести в [ROOT.GetCountry.Custom('CF_VP')|l] порочні віяння."
  flavor_tur.167.historical_info: "Першим великим медичним училищем в Османській імперії стала мечеть Сулейманіє, зведена в середині 16 століття. Там готували хірургів як для армії, так і для султанського двору. Нові типи училищ, на які сильно впливали західні традиції та медицина, почали з'являтися на початку 19 століття, серед них Терсане Тіббієсі (#italic Флотська медична школа#!) та Тібхане-і Аміре (#italic Імперська медична школа#!, заснована в 1824 році). Оскільки підручники видавалися в основному французькою, дуже скоро основу студентів стали складати немусульмани, які краще знали цю мову."
  flavor_tur.167.a: "Ми повинні приймати знання в усіх його формах."
  flavor_tur.167.b: "Нам не потрібні західні інновації."
  flavor_tur.168.title: "Невдоволення греків"
  flavor_tur.168.desc: "Наші #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецькі#!#! піддані, особливо на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, стають дедалі сприйнятливішими до ідей просвітництва та націоналізму, а дехто з них уже відкрито сумнівається в легітимності влади #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Зрадники з грецької церкви та таємних товариств набрали достатньо сили, щоб підняти повстання. Кілька #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! поселень у [uprising_location.Custom('LR_PP')|l] [uprising_location.GetName] уже розгромлені натовпом розлючених греків."
  flavor_tur.168.historical_info: "Греки довгий час становили значну частину Османської імперії та сильно вплинули на її історію, але вони завжди зберігали почуття власної ідентичності, чому сприяла давня присутність в імперії православної церкви. У 18 столітті серед греків зростали революційні націоналістичні настрої, підстьобувані впливом ідей просвітництва, а також підривною діяльністю європейських суперників імперії. Це вилилося в кілька повстань і конфліктів, кульмінацією яких стала Грецька революція 1821 року."
  flavor_tur.168.a: "Запланувати сувору акцію відплати."
  flavor_tur.168.b: "Заспокоїти їх реформами."
  flavor_tur.168.c: "Помилуємося палаючим Римом."
  greek_uprising_aggravated: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! стане дуже низьким."
  greek_uprising_milder: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! стане низьким."
  greeks_appeased: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! трохи знизиться."
  flavor_tur.169.title: "Різанина [GetCurrentYear] року в [massacre_location.GetRank.Custom('LR_PP')|l] [massacre_location.GetNameWithNoTooltip]"
  flavor_tur.169.desc: "Ми обіцяли покарати #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! заколотників на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! — і ось, час настав. Оскільки #TOOLTIP:RELIGION,orthodox_tt,X #L православний#!#! патріарх нічого не зробив для того, щоб запобігти цій кризі, він разом із великим драгоманом і всіма іншими лідерами греків із [massacre_location.Custom('LR_RP')|l] [massacre_location.GetName] стане прикладом для всіх підданих. Ми стратимо зрадників і всіх їхніх прихильників, конфіскуємо їхнє майно, зруйнуємо їхні святині та змусимо весь світ боятися нас — інакше ми виглядатимемо нікчемами, нездатними виконати свої погрози."
  flavor_tur.169.historical_info: "У відповідь на Грецьку революцію навесні 1821 року османський уряд влаштував різанину та страти греків у Константинополі. Православний патріарх Григорій V відлучив революціонерів від церкви, але, незважаючи на це, був заарештований і страчений, як і багато інших лідерів грецьких громад, більшість з яких не була ніяк пов'язана з повстанням. Криваве переслідування греків тривало багато днів. Схожі чистки, хоч і менші за масштабом, відбулися по всій Імперії."
  flavor_tur.169.a: "Це заплямує репутацію [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_tur.169.b: "Ми не можемо цього допустити."
  everyone_hates_you.tt: "[Concept('pop_satisfaction','Задоволення')] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! та #TOOLTIP:RELIGION,orthodox_tt,X #L православно-християнських#!#! [Concept('pops','груп населення')|e] у [ROOT.GetCountry.Custom('CF_PP')|l] значно знизиться."
  flavor_tur.170.title: "Суддя степів"
  flavor_tur.170.desc: "Тепер, коли [target_location.GetName] у наших руках, нам варто задуматися про те, як правити областю [ShowAreaName('iraq_arabi_area')]. Могутні річки Євфрат і Тигр схильні виходити з берегів, і, хоча селяни тисячоліттями стримували їх за допомогою гребель і дамб, вони можуть раптово знищити врожай. У тому числі й тому тут досі поширений кочовий спосіб життя. Щоб домогтися повного контролю над цими землями, нам слід призначити Суддю степів, який стежитиме за тим, щоб кочівники та селяни прикордоння платили податки та жили за заповітами #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  flavor_tur.170.historical_info: "Великі річки Месопотамії куди непостійніші за єгипетський Ніл. Їхні непередбачувані розливи змушують багатьох фермерів шукати інші джерела доходу, крім сільського господарства, часто вести обмін із кочовими племенами пустель і степів. Така обставина зробила Ірак непростим для управління з центру. Підкоривши Багдад, османи побачили цю проблему і пристосувалися до ситуації, зокрема призначенням так званого Судді степів, високопоставленого каді, чиє завдання — завідувати кочівниками та їхніми справами."
  flavor_tur.170.a: "Ми знайдемо відповідного кандидата."
  flavor_tur.170.b: "Вкладемо в ці землі більше коштів."
  grasslands_judge.tt: "Ми призначимо каді на цю посаду."
  flavor_tur.171.title: "Черкеська красуня"
  flavor_tur.171.desc: "Досі [circassian_cariye.GetName] не надто виділялася серед інших наложниць #L [ROOT.GetCountry.GetGovernment.GetAdjective|l]#!ого гарему, проте честолюбства їй не позичати. Вона мріє, щоб талановитий художник [italian_painter.GetName], з яким її познайомила подруга Кіра, намалював її портрет. [circassian_cariye.GetNameWithNoTooltip] обіцяє, що цей портрет буде скромним і не порушить #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! традицій, але водночас прославить її рідкісну #TOOLTIP:CULTURE,$circassian_culture_tt$,X #L черкеську#!#! красу на заздрість усій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!."
  flavor_tur.171.historical_info: "Хоча термін «черкеси» стосується здебільшого адигейських народів, в історичному контексті під ними могли розуміти мешканців Кавказу, таких як грузинів та абхазів. Черкесів, і особливо черкешенок вважали особливо красивими, палкими та елегантними. Наложниці-черкешенки високо цінувалися в ісламському світі, зокрема й буквально, з часом саме вони стали складати основу багатьох гаремів. Черкеська краса відзначалася і в Європі, вона стала популярною темою орієнталістського мистецтва 18-19 століть."
  flavor_tur.171.a: "Чудово, давайте це вирішимо."
  flavor_tur.171.b: "Яка дурна ідея!"
  flavor_tur.172.title: "Обхід заборон"
  flavor_tur.172.desc: "#TOOLTIP:RELIGIONGROUP,muslim,X #L Ісламські#!#! богослови, нечисленні противники рабства та інші стурбовані жителі [ROOT.GetCountry.Custom('CF_RP')|l] усе частіше звертають увагу на те, що серед #TOOLTIP:GOODS,slaves_goods,X #L рабів#!#! на ринках #TOOLTIP:AREA,black_sea_area,X #L Причорномор'я#!#! зустрічаються не лише язичники, а й мусульмани, що заборонено священним законом. Щоб [ROOT.GetCountry.GetReligion.GetGodName] не покарав нас за це порушення, вони вимагають запровадити суворіший контроль над работоргівлею, але [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] виступають проти, не бажаючи позбутися #TOOLTIP:CULTURE,$circassian_culture_tt$,X #L черкеських#!#! красунь у своїх гаремах."
  flavor_tur.172.historical_info: "Ісламський закон суворо забороняв брати інших мусульман у рабство, але іноді заборону ігнорували — особливо щодо черкешенок, найцінніших наложниць османських та арабських гаремів. Продаж рабинь османам приносив великий прибуток Кримському ханству, а частою відмовкою в такому випадку було твердження, що в даному випадку йдеться не про ринок рабів, а про ринок дружин."
  flavor_tur.172.a: "Поставки рабів найважливіші."
  flavor_tur.172.b: "Треба змусити людей дотримуватися закону Пророка."
  flavor_tur.173.title: "Кінець системи девшірме"
  flavor_tur.173.desc: "У багатьох куточках [ROOT.GetCountry.Custom('CF_RP')|l] [ShowPolicyName('devshirme_system_policy')|l] вважається пережитком минулого. #TOOLTIP:RELIGION,orthodox_tt,X #L Православні християни#!#! не хочуть віддавати своїх синів у яничари та чиновники, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] бурчать, що ця система позбавляє їх перспективи, віддаючи перевагу простолюдинам. Скасувавши девшірме раз і назавжди, ми отримаємо рідкісний шанс догодити обом цим групам населення."
  flavor_tur.173.historical_info: "Девшірме — османська практика примусового набору солдатів та чиновників з числа жителів Балкан, які сповідують християнство. Вважалося, що ці люди, не пов'язані з місцевою османською знаттю, будуть лояльні безпосередньо режиму. Система стала стовпом формування османської адміністрації за часів розквіту імперії. Османські солдати, однак, воліли, щоб в армії служили їхні сини, і скоро на службу стали допускати мусульман, що призвело до поступового зникнення практики девшірме."
  flavor_tur.173.a: "Це потрібно заборонити."
  flavor_tur.173.b: "Ні, [ShowPolicyNameWithNoTooltip('devshirme_system_policy')|l] — опора держави."
  christians_pleased.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:RELIGION,orthodox_tt,X #L православно-християнських#!#! [Concept('pops','груп населення')|e] в [ROOT.GetCountry.Custom('CF_PP')|l] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  devshirme_removed_forever.tt: "Політика «[ShowPolicyName('devshirme_system_policy')]» буде скасована назавжди."
  flavor_tur.174.title: "Головний поет"
  flavor_tur.174.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] у сум'ятті: придворні люто сперечаються про те, хто з двох поетів кращий. Відомий своїм красномовством [osmanzade.GetName] пише сатири та оди, які обожнюють [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]. Загадковий [nedim.GetName] є автором одухотворених, але водночас песимістичних і радикальних віршів; більшість його шанувальників складають [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l], яким особливо подобаються його адаптації народної творчості."
  flavor_tur.174.historical_info: "Епоха тюльпанів в Османській імперії була відома своїми поетами. Найзнаменитішим серед них вважався Осман-заде Таїб, який отримав титул реїс-і шайран (#italic головний поет#!) від самого султана Ахмеда III. Роботи Осман-заде виділялися дотепністю, за свої жарти поет у підсумку був убитий губернатором Єгипту. Його сучасник Недім вважався, ймовірно, занадто інноваційним для свого часу і виділявся трохи декадентським стилем, який критикував іноді перську поетичну традицію і відзначав при цьому красу Константинополя."
  flavor_tur.174.a: "[osmanzade.GetNameWithNoTooltip] — найдостойніший з достойних."
  flavor_tur.174.b: "[nedim.GetNameWithNoTooltip] — майбутнє поезії."
  nedim_retires.tt: "[nedim.GetNameWithNoTooltip] іде в безвість."
  osmanzade_retires.tt: "[osmanzade.GetNameWithNoTooltip] іде в безвість."
  flavor_tur.175.title: "Місцева влада"
  flavor_tur.175.desc: "Як найкраще правити безкраїми та різноманітними землями, навіки об'єднаними Блискучою Портою? Навіть у найвіддаленіших її куточках високі посади можуть обіймати лише ті, кому [ROOT.GetCountry.GetGovernment.GetRulerTitle] надає пряме заступництво. З іншого боку, якщо ми запровадимо нову посаду аянів і призначатимемо на неї місцевих жителів, які мають достатні амбіції або зв'язки, це підвищить ефективність збору податків і стабільність [ROOT.GetCountry.Custom('CF_RP')|l] загалом, хоча й обмежить наш вплив на внутрішні справи провінцій."
  flavor_tur.175.historical_info: "18 століття було ознаменоване поступовим зниженням централізації в Османській імперії, влада все більше і більше відходила елітам на місцях. Ці еліти, аяни, могли бути з найрізноманітнішого середовища, від аристократів і яничарів до священнослужителів і впливових купців, але всі вони були пов'язані т.я. «малікане», системою податкового відкупу. Велика влада на місцях, якою вони користувалися, могла здатися ознакою ослаблення османського впливу та престижу, але це була, скоріше, адаптація до мінливого світу, де націоналістичні настрої слід було придушувати, щоб зберегти силу імперії."
  flavor_tur.175.a: "Треба приділити всю увагу цій реформі."
  flavor_tur.175.b: "Краще будемо користуватися системою кадиликів."
  flavor_tur.175.c: "[target_capital.GetNameWithNoTooltip] — вічний оплот нашої влади."
  flavor_tur.176.title: "Смертельні перегони"
  flavor_tur.176.desc: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')|U] [grand_vizier.GetName] звинувачується у безлічі злочинів. Якщо [Select_CString(grand_vizier.IsFemale, 'її', 'його' )] провину буде доведено, придворний начальник варти [bostancibasi.GetName] особисто задушить [Select_CString(grand_vizier.IsFemale, 'її', 'його' )]. Згідно з традицією, виносячи вирок, суддя дасть [Select_CString(grand_vizier.IsFemale, 'сановниці', 'сановнику' )] чашу шербету. Якщо він виявиться червоним, це означатиме винність, а якщо білим — виправдання. Але навіть у випадку червоного шербету [ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l] отримає шанс на порятунок: [Select_CString(grand_vizier.IsFemale, 'вона', 'він' )] зможе зберегти життя, перемігши начальника варти у змаганні з бігу. І зараз [Select_CString(grand_vizier.IsFemale, 'вона', 'він' )] старанно тренується…"
  flavor_tur.176.historical_info: "Палац Топкапи бачив чимало крові. Там відбувалися страти, якими часто розпоряджався бостанджи-паша, начальник варти султана. Він же відповідав за Фонтан страт у Першому дворі, де кати омивали руки, виконавши свою похмуру роботу. У XVIII столітті з'явилася цікава традиція: засудженому до смерті високопоставленому чиновнику давалося право бігти наввипередки з бостанджи-пашою по палацовому саду. Якщо засуджений перемагав, страта замінювалася на вигнання."
  flavor_tur.176.a: "Дати [Select_CString(grand_vizier.IsFemale, 'їй', 'йому' )] червоний шербет."
  flavor_tur.176.b: "Дати [Select_CString(grand_vizier.IsFemale, 'їй', 'йому' )] білий шербет."
  flavor_tur.176.c: "Вбити [Select_CString(grand_vizier.IsFemale, 'її', 'його' )] на місці."
  race_held.tt: "Біг наввипередки відбудеться в саду, результат змагання поки неясний."
  grand_vizier_freed.tt: "[grand_vizier.GetNameWithNoTooltip] [Select_CString(grand_vizier.IsFemale, 'звільнена', 'звільнений' )] і може бути [Select_CString(grand_vizier.IsFemale, 'покликана', 'покликаний' )] до [Concept('cabinet','ради')|e]."
  flavor_tur.177.title: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l] [Select_CString(grand_vizier.IsFemale, 'перемогла', 'переміг' )]"
  flavor_tur.177.desc: "Зусилля, які [grand_vizier.GetName] [Select_CString(grand_vizier.IsFemale, 'витратила', 'витратив' )] на тренування перед забігом, не пройшли дарма: незадовго до фінішу [Select_CString(grand_vizier.IsFemale, 'вона обігнала', 'він обігнав' )] садівника і [Select_CString(grand_vizier.IsFemale, 'утримувала', 'утримував' )] лідерство до самих воріт Рибного ринку, де б [Select_CString(grand_vizier.IsFemale, 'їй', 'йому' )] відрубали голову у випадку програшу. Загалом, [Select_CString(grand_vizier.IsFemale, 'вона здобула', 'він здобув' )] чесну перемогу і [Select_CString(grand_vizier.IsFemale, 'набула', 'набув' )] безцінного досвіду, побувавши на волосок від смерті. Традиція зобов'язує нас скасувати смертний вирок."
  flavor_tur.177.historical_info: "Життя високопоставленого чиновника в Османській імперії могло бути дуже небезпечним, але й перемоги у смертельних перегонах наввипередки з бостанджибаші траплялися нерідко. Таким переможцем став, зокрема, великий візир Хаджі Саліх-паша у 1822 році. Він так прославився, здобувши гору, що його вигнання перетворилося, по суті, на комфортне життя на посаді губернатора Дамаска."
  flavor_tur.177.a: "І все одно [Select_CString(grand_vizier.IsFemale, 'її', 'його' )] потрібно вигнати."
  grand_vizier_exiled.tt: "[grand_vizier.GetName] вирушає у вигнання."
  flavor_tur.177.b: "Треба повністю скасувати вирок."
  flavor_tur.178.title: "[ROOT.GetCountry.Custom('GetHeadOfCabinetName')] [Select_CString(grand_vizier.IsFemale, 'страчена', 'страчений' )]"
  flavor_tur.178.desc: "[grand_vizier.GetName] [Select_CString(grand_vizier.IsFemale, 'почала', 'почав' )] забіг досить бадьоро, але в підсумку [bostancibasi.GetName] все ж випередив [Select_CString(grand_vizier.IsFemale, 'її', 'його' )] і добіг до воріт Рибного ринку першим. Там [ROOT.GetCountry.Custom('GetHeadOfCabinetName')] [Select_CString(grand_vizier.IsFemale, 'була страчена', 'був страчений' )], після чого [Select_CString(grand_vizier.IsFemale, 'її', 'його' )] тіло безцеремонно кинули в море, а голову зберегли на випадок, якщо ми захочемо виставити її на Каменях повчання."
  flavor_tur.178.historical_info: "Хоча султани 18 століття були куди менш кровожерливими, ніж Селім Грізний з 16 століття, вони без вагань показували, що буває з тими, хто їх образив. Чиновник, який програв змагання, вбивався бостанджибаші на місці, його голова поміщалася на Камені повчання, дві мармурові колони зовні воріт палацу Топкапи."
  flavor_tur.178.a: "[Select_CString(grand_vizier.IsFemale, 'Її', 'Його' )] смерті достатньо."
  flavor_tur.178.b: "Покласти голову на загальний огляд"
  flavor_tur.179.title: "Армія нового порядку"
  flavor_tur.179.desc: "Розмірковуючи про силу наших ворогів, небезпеки мінливого світу та загрозу заколоту з боку непокірних і зухвалих яничарів, [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'придумала', 'придумав' )] новий план. [Select_CString(target_ruler.IsFemale, 'Вона вирішила', 'Він вирішив' )] залучити інструкторів з #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, щоб реформувати армію, перетворивши її на грізну та сучасну силу з новою формою, підготовкою та традиціями. Але цей крок може викликати гнів яничарів, башибузуків, секбанів та всіх інших, кому вигідне поточне становище справ."
  flavor_tur.179.historical_info: "Нізам-і Джедід, #italic Армія нового порядку#!, була заснована в 1797 році. Вона становила центральну частину програми реформ Селіма III. Султан сподівався повернути назад децентралізацію імперії та обійти зміцнений вплив яничарів, поступово замінюючи їх сучасною піхотою за європейською моделлю."
  flavor_tur.179.a: "Нам потрібні ці зміни."
  flavor_tur.179.b: "Старі звичаї цілком ефективні."
  new_order_army_available.tt: "Відкриває доступ до [Concept('government_reform','державного принципу')|e] «[ShowGovernmentReformName('ottoman_new_order_army')]»."
  tur_new_order_army: "Доступний державний принцип «[ShowGovernmentReformNameWithNoTooltip('ottoman_new_order_army')]»"
  flavor_tur.180.title: "Інцидент у [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_tur.180.desc: "Обстановка у [target_location.Custom('LR_PP')|l] [target_location.GetName], де [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'наказала', 'наказав' )] побудувати казарми, в яких розміститься [ShowGovernmentReformName('ottoman_new_order_army')|l], напружена до межі. Місцеві сановники та яничари відкрито заявляють, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] хоче позбавити їх законних привілеїв, і вже заручилися підтримкою серед #L [ROOT.GetCountry.GetGovernment.GetAdjective|l]#!ої адміністрації. Можливо, вам варто скасувати деякі реформи, поки справа не дійшла до громадянської війни."
  flavor_tur.180.historical_info: "Перспективи Нізам-і Джедід швидко згасли в Едірнському інциденті 1806 року. Селім III намагався побудувати нові армійські казарми в Едірне та інших місцях Румелії, що призвело до збройного конфлікту з частинами корпусу яничарів та місцевими аянами. Протистояння швидко зростало і султану довелося відступити, відправивши свої війська назад до Константинополя, що завдало смертельного удару як його престижу, так і його спробам централізувати управління імперією."
  flavor_tur.180.a: "Погодитися обмежити реформи."
  flavor_tur.180.b: "Боротися зі зрадниками!"
  flavor_tur.180.c: "Розпустити армію нового зразка."
  new_order_army_permanently_disbanded.tt: "[Concept('government_reform','Державний принцип')|e] «[ShowGovernmentReformName('ottoman_new_order_army')]» назавжди стане недоступним."
  tur_new_order_army_disbanded: "[ShowGovernmentReformNameWithNoTooltip('ottoman_new_order_army')|U] розпущена"
  flavor_tur.181.title: "Пара каліграфів"
  flavor_tur.181.desc: "[celaleddin.GetName] та [esma.GetName], що перебувають у законному шлюбі, вважаються найкращими каліграфами нинішнього покоління. [celaleddin.GetShortName] вже відбувся на цьому поприщі, а скромна [esma.GetShortName] поки тільки вчиться, але вже подає чималі надії. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] в такому захваті від робіт цієї пари, що окремі придворні вже пропонують найняти її на постійну службу для прикраси наших палаців та мечетей. Але навіть якщо ми дозволимо подружжю повернутися до тихого сімейного побуту, вони заслуговують на щедрий довічний пансіон."
  flavor_tur.181.historical_info: "Махмуд Джелаледдін-ефенді був родом з Дагестану і став одним з видатних каліграфів свого часу. Він багато в чому надихався роботами Хафіза Османа, великого каліграфа 17 століття. Есма Ібрет-ханим була його обдарованою ученицею, а згодом і дружиною. Спочатку Джелаледдін не хотів брати на навчання дівчину, але передумав, побачивши її роботу. Султан Селім III та його мати також залишилися дуже вражені майстерністю Есми і видали їй у нагороду 500 курушів."
  flavor_tur.181.a: "Вони потрібні нам обоє."
  flavor_tur.181.b: "Нагороди буде достатньо."
  celaleddin_and_esma_retires.tt: "[celaleddin.GetNameWithNoTooltip] та [esma.GetNameWithNoTooltip] повертаються до тихого життя."
  flavor_tur.182.title: "Гігант"
  flavor_tur.182.desc: "[koca.GetName] володіє численними та різнобічними талантами: він і скарбник, і поет, і намісник #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Його прозвали Коджа #italic Гігант#! — чи то за значний зріст, чи то за настільки ж значні досягнення. Втомившись від Анатолії, він написав вишуканий лист до Блискучої Порти, в якому попросив перевести його до столичного міста [target_capital.GetName] — на його власну думку, з нього міг би вийти чудовий [ROOT.GetCountry.Custom('GetHeadOfCabinetName')|l]. Але варто врахувати, що його миролюбність не схвалюють багато войовничих [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_tur.182.historical_info: "Коджа Рагип-паша був, імовірно, найталановитішим великим візиром XVIII століття. Відтік фінансів з казни при ньому припинився, оскільки він провів успішні економічні та адміністративні реформи і зміг утримати османів від вступу в Семирічну війну, що бушувала в Європі. Також він був ученим і поетом, вів часте листування з прославленою поетесою Фітнат-ханим та іншими своїми видатними сучасниками."
  flavor_tur.182.a: "Такі, як він, дуже потрібні державі."
  flavor_tur.182.b: "Ми знайдемо інших відповідних людей."
  koca_retires.tt: "[koca.GetNameWithNoTooltip] залишається в провінції."
  flavor_tur.183.title: "Черепаха і свічка"
  flavor_tur.183.desc: "[unfortunate_courtier.GetName] [Select_CString(unfortunate_courtier.IsFemale, 'відвідувала', 'відвідував' )] поетичні читання у палаці [ROOT.GetCountry.Custom('CF_RP')|l], коли трапилася біда. Вийшовши подихати вечірнім повітрям, [Select_CString(unfortunate_courtier.IsFemale, 'вона наступила', 'він наступив' )] на черепаху: ці рептилії зі свічками на панцирах нерідко використовуються для прикраси та освітлення садів. На жаль, у цієї конкретної черепахи свічка згасла, тож її було зовсім не видно в сутінках. Нещасна тварина загинула на місці, а [unfortunate_courtier.GetName] [Select_CString(unfortunate_courtier.IsFemale, 'розтягнула', 'розтягнув' )] щиколотку. Тепер [Select_CString(unfortunate_courtier.IsFemale, 'вона', 'він' )] просить нас повністю очистити палацовий сад від черепах та інших подібних загроз."
  flavor_tur.183.historical_info: "Імператорське село Саадабад у Константинополі побудували для розваги Ахмеда III, його почту та чиновників, прямо на очах у звичайного народу, якому вхід туди був заборонений. У селі були палац, відділ гарему з лазнями-хамамами, павільйон і безліч садів навколо річки Кягитхане. Одним із знаменитих видовищ Саадабаду стали черепахи зі свічками на панцирах, що освітлювали теплі вечори."
  flavor_tur.183.a: "Ми могли б використовувати замість них звичайні свічники."
  flavor_tur.183.b: "Нам потрібно більше черепах для свічок, а не менше."
  flavor_tur.183.c: "Давайте просто помолимося за померлу черепаху."
  flavor_tur.184.title: "Коти Константинополя"
  flavor_tur.184.desc: "Всім відомо, що чуму, яка періодично спалахує в [target_location.Custom('LR_PP')|l] [target_location.GetName], розносять миші та щури. На щастя, у багатьох місцевих будинках тримають котів, а тисячі їхніх здичавілих побратимів живуть прямо на міських вулицях. [ROOT.GetCountry.GetReligion.GetName|U] наказує дбати про них, а [target_character.GetName] ревно дотримується цього наказу: кожного, хто підніме руку на кота, очікує великий штраф."
  flavor_tur.184.historical_info: "В османську епоху на вулицях Стамбула зросла чисельність бродячих котів. Будинки тоді кишіли щурами та мишами, та й самі коти користувалися великою повагою в ісламі, і тому вбивати або красти кота було незаконно — вони вважалися суспільною власністю."
  flavor_tur.184.a: "Ми приймаємо владу наших хижих володарів."
  tur_all_pops_in_constantinople_gain_satisfaction: "[Concept('pop_satisfaction','Задоволення ')|e] всіх [Concept('pops','груп населення')|e] в [target_location.Custom('LR_PP')|l] [target_location.GetName] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  flavor_tur.185.title: "Янінський лев"
  flavor_tur.185.desc: "Проявивши видатний талант у державному управлінні та військовій справі, [target_character.GetName] [Select_CString(target_character.IsFemale, 'привернула', 'привернув' )] увагу двору #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Хоча [Select_CString(target_character.IsFemale, 'вона народилася', 'він народився' )] у родині розбійників із провінції [ShowProvinceDefinitionName('albania_province')], це не завадило [Select_CString(target_character.IsFemale, 'їй', 'йому' )] здобути репутацію [Select_CString(target_character.IsFemale, 'поборниці', 'поборника' )] миру та справедливості, хоча у [Select_CString(target_character.IsFemale, 'неї', 'нього' )] є й чимало заздрісних ворогів. Варто зазначити, що [target_character2.GetName], [Select_CString(target_character2.IsFemale, 'яка', 'який' )], як і [target_character.GetName], віддає перевагу діям словам, вважає, що [target_character.GetNameWithNoTooltip] цілком [Select_CString(target_character.IsFemale, 'гідна', 'гідний' )] високої посади."
  flavor_tur.185.historical_info: "Алі-паша Янінський, одна з найвпливовіших постатей XVIII століття, народився в Албанії, де завдавав чимало проблем місцевому володарю Ахмету Курт-паші. Спочатку Османська імперія протистояла йому, але незабаром усвідомила його військову та дипломатичну майстерність, побачивши, як він стабілізував обстановку між османами та венеціанцями, і вирішила дати йому пост правителя Яніни. Пізніше його було зміщено, оскільки на службі керувався власними інтересами, а не наказами султана, але пізніше призначений знову і діяв як незалежний правитель, втручаючись у справи західних держав. У підсумку, втім, його активність насторожила султана Махмуда II, він оголосив йому війну і поклав край його правлінню."
  flavor_tur.185.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|l] — місце, куди [target_character.GetNameWithNoTooltip] впишеться ідеально."
  flavor_tur.185.b: "Давайте дамо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] землі в Північній Греції."
  flavor_tur.185.c: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] — не місце для розбійників."
  flavor_tur.186.title: "Балканські коджабаші"
  flavor_tur.186.desc: "Нашого адміністративного ресурсу недостатньо для управління численними містами та селищами, які ми захопили на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!. Враховуючи різноманітність місцевих законів і звичаїв, ми ніколи не зможемо повністю інтегрувати їх у #L [ROOT.GetCountry.GetAdjective|l]#!у правову систему. Тому [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] пропонує перекласти обов'язки зі збору податків, охорони порядку та вирішення інших адміністративних питань на місцевих жителів. Звісно, в такому випадку ми не зможемо повністю контролювати ці землі, але вони хоча б приноситимуть нам вигоду."
  flavor_tur.186.a: "Найм місцевих жителів безсумнівно дасть свою вигоду."
  flavor_tur.186.b: "Не можна довіряти їм закони та податки."
  flavor_tur.187.title: "Рахат-лукум"
  flavor_tur.187.desc: "Наш народ славиться кулінарним талантом. Його незліченні кондитери змагаються у приготуванні унікальних солодощів, що не залишають байдужим нікого. На цьому поприщі особливо [Select_CString(target_character.IsFemale, 'відзначилася', 'відзначився' )] [target_character.GetName]: ретельно вивчивши всі нещодавні досягнення в галузі смаку, кольору та текстури, [Select_CString(target_character.IsFemale, 'вона створила', 'він створив' )] рецепт нової солодкої страви, яка тепер відома кожному жителю #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!. Звісно ж, це знаменитий #TOOLTIP:CULTURE,turkish_culture,X #L турецький#!#! рахат-лукум! Можливо, ці ласощі були відомі й раніше, але справжньої популярності вони набули лише зараз — і тому багато хто думає, що їх винайшли саме на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!."
  flavor_tur.187.a: "Такі вишукані ласощі могли винайти лише в [ROOT.GetCountry.Custom('CL_PP')]."
  flavor_tur.187.b: "Важливо не хто зробив, а хто продав."
  tur_greek_people_will_not_like_this_tt: "#TOOLTIP:CULTURE,$greek_culture_tt$,X #L Грецьке#!#! [Concept('pops','населення')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! не схвалить наших сміливих заяв про #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецький#!#! рахат-лукум."
  flavor_tur.188.title: "Греки вважають рахат-лукум своїм"
  flavor_tur.188.desc: "#TOOLTIP:CULTURE,$greek_culture_tt$,X #L Грецькі#!#! піддані #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! вважають образливим нашу заяву про те, що рахат-лукум — споконвічно #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецькі#!#! ласощі. Одні з них стверджують, що це давно відома візантійська страва, а інші кажуть, що її винайшли жителі #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Це, здавалося б, дріб'язкове питання вельми зачіпає почуття греків."
  flavor_tur.188.a: "Яка дріб'язковість..."
  tur_all_greek_pops_lose_satisfaction_due_to_turkish_delight_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops', 'груп населення')|e] знизиться на [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%]"
  flavor_tur.189.title: "Фанаріоти"
  flavor_tur.189.desc: "Хоча Візантійська імперія впала, у [target_location.Custom('LR_PP')|l] [target_location.GetName] досі відчувається вплив її колишніх господарів. Особливо це стосується #TOOLTIP:CULTURE,greek_culture,X #L греків#!#!, які хоч і схилилися перед нами, але продовжують дотримуватися своїх звичаїв тією мірою, якою ми їм дозволяємо. Більшість цих греків, що називають себе фанаріотами, — заможні торговці, хоча серед них є й кілька #TOOLTIP:RELIGION,orthodox,X #L православних#!#! єпископів. Вони добре освічені та мають чималу вагу серед жителів [ROOT.GetCountry.Custom('CF_RP')|l]. Можливо, якщо ми виділимо їм окрему частину [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip], вони зможуть посприяти його розвитку."
  flavor_tur.189.a: "Вони отримають свій район."
  flavor_tur.189.b: "Це ні до чого: вони й так живуть у [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]."
  tur_lose_greek_satisfaction_in_constantinople_tt: "[Concept('pop_satisfaction','Задоволення'] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополі#!#! знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|-=2%]"
  flavor_tur.190.title: "Право носити зброю"
  flavor_tur.190.desc: "За законом #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! [GetEstateName('peasants_estate')|l] не мають права володіти зброєю, але жителі завойованих нами земель часто порушують цей закон, воліючи зберігати боєготовність на випадок війни, заколотів чи заворушень. Хоча це дозволяє за необхідності призивати їх до армії, наявність зброї у черні підриває стабільність суспільства, для захисту якої ми й запровадили заборону. Коли [target_character.GetName] [Select_CString(target_character.IsFemale, 'підняла', 'підняв' )] це питання, [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] порекомендував йому запровадити суворіший контроль за дотриманням цього закону, щоб уникнути можливих бунтів. Однак ми можемо залишити все як є: можливо, простолюдини будуть задоволені вже тим, що ми їх не роззброюємо."
  flavor_tur.190.a: "Ми не можемо допустити, щоб [GetEstateNameWithNoTooltip('peasants_estate')|l] володіли зброєю. Це треба заборонити!"
  flavor_tur.190.b: "Дозволити їм носити зброю, щоб продемонструвати повагу до їхньої автономії."
  tur_all_heathen_peasants_lose_satisfaction_tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх представників стану «[GetEstateName('peasants_estate')]», які не сповідують #L [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective|l]#!у віру, знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|-=2%]"
  flavor_tur.191.title: "Маніоти"
  flavor_tur.191.desc: "Хоча #TOOLTIP:AREA,morea_area,X #L Морея#!#! захоплена #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_TP')|L]#!#!, у ній залишилися ті, хто чинить опір нашій владі. Їх особливо багато в провінції [ShowProvinceDefinitionName('messenia_province')]. Ці люди, що називають себе маніотами, перекривають дороги, влаштовують напади на намісників і не пускають представників влади до своїх гірських сіл. Хоча суттєвої загрози вони не становлять, місцеве населення все частіше підтримує їх у надії на отримання більшої автономії. Надавши її, ми могли б вирішити проблему мирним шляхом і позбавити себе необхідності посилати війська для придушення повстання."
  flavor_tur.191.a: "Жителі Мессенії отримають свої права."
  flavor_tur.191.b: "Нехай повстають, якщо хочуть, ми їх просто переможемо."
  tur_all_messenian_locations_lose_control_and_gain_estate_building: "Кожен [Concept('location','район')|e] провінції [ShowProvinceDefinitionName('messenia_province')] втратить [ShowNamedValue('control_ultimate_penalty')|-=2%] [Concept('control','контролю')|e] та отримає [Concept('building','споруду')|e] «[ShowBuildingTypeName('maniot_toll_guards')]»"
  tur_all_messenian_location_pops_lose_satisfaction: "[Concept('pop_satisfaction','Задоволення ')|e] всіх [Concept('pops','груп населення')|e] у провінції [ShowProvinceDefinitionName('messenia_province')] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]"
  flavor_tur.192.title: "Грецькі криптохристияни"
  flavor_tur.192.desc: "Наші спроби навернути #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьке#!#! населення у свою віру здебільшого увінчалися успіхом: [ROOT.GetCountry.GetReligion.GetName|l] став релігією багатьох греків. Попри це, ми отримуємо доповіді про те, що деякі з них прикидаються правовірними лише заради привілеїв, а насправді здійснюють #TOOLTIP:RELIGIONGROUP,christian,X #L християнські#!#! обряди. Ми вже викрили кількох подібних брехунів, але [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] вважає, що їх набагато більше, зокрема й при нашому дворі. Тому [target_character.GetName] пропонує розпочати розслідування та ввести штрафи для таємних християн."
  flavor_tur.192.a: "Ми розкриємо подібні справи."
  flavor_tur.192.b: "Можливо, краще просто залишити їх у спокої. Не варто розхитувати човен, добром це не скінчиться."
  tur_convert_greek_christians_tt: "#Y 10%#! #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецького#!#! [Concept('pops','населення')|e] навернеться в іншу релігію ([ROOT.GetCountry.GetReligion.GetName|l])"
  flavor_tur.193.title: "[target_character.GetNameWithNoTooltip]"
  flavor_tur.193.desc: "[Select_CString(target_character.IsFemale, 'Критська торговка', 'Критський купець' )] з #TOOLTIP:LOCATION,rethymno,X #L Ретимнона#!#! на ім'я [target_character.GetName] самостійно [Select_CString(target_character.IsFemale, 'прийшла', 'прийшов' )] до успіху, налагодивши торговельні зв'язки з усією #TOOLTIP:CONTINENT,europe,X #L Європою#!#!. Зараз [Select_CString(target_character.IsFemale, 'вона', 'він' )] має чималі багатства, яким заздрять інші [GetEstateName('burghers_estate')|l], і власний торговельний флот чималих розмірів. [ROOT.GetCountry.GetGovernment.GetCourtTitle] справедливо вважає, що такій [Select_CString(target_character.IsFemale, 'достойній жінці', 'достойній людині' )] саме місце при дворі. Питання лише в тому, що для нас важливіше: [Select_CString(target_character.IsFemale, 'її', 'його' )] капітали чи досвід командування кораблями."
  flavor_tur.193.a: "[target_character.GetNameWithNoTooltip] стане адміралом."
  flavor_tur.193.b: "[Select_CString(target_character.IsFemale, 'Їй', 'Йому' )] буде дозволено використовувати своє багатство в інтересах містян."
  flavor_tur.193.c: "Ми не допустимо, щоб греки верховодили в нашій політиці."
  flavor_tur.194.title: "Драгоман"
  flavor_tur.194.desc: "Зростаючий вплив національних меншин обернувся для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! перевагою в галузі дипломатії. Представники малих народів часто знають по кілька мов одразу, що дуже важливо під час переговорів. Вони приносять користь і як прості [GetEstateName('burghers_estate')|l], але ми могли б заснувати для них посаду драгоманів — тобто, перекладачів при посольствах, консульствах і торговельних представництвах. З іншого боку, це дозволить їм обіймати й інші посади в адміністрації [ROOT.GetCountry.Custom('CF_RP')|l], чим вони можуть скористатися у своїх інтересах."
  flavor_tur.194.a: "Почнемо наймати цих багатомовних торговців."
  flavor_tur.194.b: "Нехай краще дипломатією займаються [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і чиновники."
  tur_unlock_appoint_dragoman_interaction_for_non_primary_culture_characters: "Ми зможемо використовувати [Concept('character_interaction','взаємодію')|e] «[ShowCharacterInteractionName('tur_appoint_dragoman')]» щодо [Concept('characters','персонажів')|e], які не належать до [ROOT.GetCountry.GetCulture.GetName|l]ої [Concept('culture','культури')|e]"
  flavor_tur.195.title: "Бунти у Фессалії"
  flavor_tur.195.desc: "#TOOLTIP:RELIGION,orthodox_tt,X #L Православні#!#! жителі #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалії#!#! незадоволені нашою владою: вони стверджують, що ми ігноруємо їхні релігійні традиції, насаджуючи замість них власні звичаї. Звісно, вони б не стали піднімати бунт лише через це, але наш намісник перейшов межу, позбавивши сану популярного єпископа. Тепер місцеві [GetEstateName('peasants_estate')|l] вимагають, щоб ми розібралися з цією несправедливістю."
  flavor_tur.195.a: "Нехай бунтують, якщо хочуть — ми їх просто розчавимо."
  flavor_tur.195.b: "Вони отримають свою справедливість."
  tur_all_of_thessaly_will_join_revolt: "Усі [Concept('pops','групи населення')|e] у #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалії#!#! приєднаються до [Concept('rebellion','заколоту')|e] ([thessaly_revolt.GetName]) і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction','задоволення')|e]"
  thessaly_revolt: "Фессалійське повстання"
  flavor_tur.196.title: "Заснування Сараєва"
  flavor_tur.196.desc: "Нам дуже бракує адміністративного центру в #TOOLTIP:PROVINCE_DEFINITION,bosnia_province,X #L Боснії#!#!, де наші чиновники могли б жити та зміцнювати свою владу над місцевим населенням. Для вирішення цієї проблеми [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] пропонує заснувати [target_location.Custom('LR_VP')|l] [target_location.GetName] і перетворити його на резиденцію наших намісників. Це дозволить нам краще контролювати регіон — якщо, звісно, ми готові витратити на це кошти."
  flavor_tur.196.a: "Давайте заснуємо Сараєво."
  flavor_tur.196.b: "Нехай [target_location.Custom('LR_RP')|l] розвивається природним чином."
  sarajevo: "Сараєво"
  flavor_tur.197.title: "Розвиток грецької народної музики"
  flavor_tur.197.desc: "Не маючи власної національної держави, багато #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греків#!#! стали вважати #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_VP')|L]#!#! своєю єдиною батьківщиною. Але замість того, щоб вливатися в наше суспільство, вони поступово формують власну культуру, яка відрізняється як від візантійської, так і від нашої [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої. Прикладом тому є нові стилі народних пісень, що виникають у численних #TOOLTIP:REGION,balkan_region,X #L балканських#!#! містах і селах. Вони вельми різноманітні, але мають одну спільну рису: у них йдеться про минулі дні та боротьбу з чужоземними загрозами. Якщо ми дозволимо ці пісні, місцеві жителі будуть задоволені, але їх буде важче інтегрувати в суспільство [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_tur.197.a: "Нехай слухають будь-яку музику, яка їм подобається."
  flavor_tur.197.b: "Якщо вони співають проти нас, таку музику ми дозволити не можемо."
  tur_all_greek_peasants_gain_satisfaction: "[Concept('pop_satisfaction','Задоволення')|e] всіх [Concept('pop','груп населення')|e], що належать до стану «[GetEstateName('peasants_estate')]» та #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецької#!#! [Concept('culture','культури')|e], підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  flavor_tur.198.title: "Клефти"
  flavor_tur.198.desc: "Багато сіл #TOOLTIP:REGION,balkan_region,X #L Балкан#!#! фактично відрізані від столичного міста [ROOT.GetCountry.GetCapital.GetName] через розбійницькі банди, що лютують на дорогах. Ці розбійники, які називають себе «клефтами», налаштовані проти нашої влади і мають таємні лігва в горах. Вони нездатні на організований опір, але доставляють чимало проблем місцевій владі. Цю проблему треба вирішувати негайно."
  flavor_tur.198.a: "Ми розправимося з ними по-старому."
  flavor_tur.198.b: "Давайте заплатимо цим бандитам, наймемо їх у нашу армію."
  tur_all_balkan_location_greek_pops_lose_satisfaction: "Усі [Concept('pops','групи населення')|e] #TOOLTIP:CULTURE,greek_culture,X #L грецької#!#! культури в регіоні #TOOLTIP:REGION,balkan_region,X #L Балкани#!#! втратять [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  klephts: "Клефти"
  flavor_tur.199.title: "Заснування Средеця"
  flavor_tur.199.desc: "Місцеві закони, що діють на окупованих землях #TOOLTIP:AREA,bulgaria_area,X #L Болгарії#!#!, відрізняються від законів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Це дозволяє жителям регіону ухилятися від податків, військової повинності та інших обов'язків. Для вирішення цієї проблеми [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] пропонує заснувати адміністративний центр у самому серці цих земель, а саме в [target_location.Custom('LR_PP')|l] [target_location.GetName]. Населений #L [ROOT.GetCountry.GetAdjective|l]#!ою елітою, він дасть нам чимало переваг — якщо, звичайно, ми вкладемо в його розвиток достатньо золота."
  flavor_tur.199.a: "Давайте перетворимо [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip] на столицю Болгарії."
  flavor_tur.199.b: "Їхні місцеві закони не особливо нас турбують."
  flavor_tur.200.title: "Згасання болгарської культури"
  flavor_tur.200.desc: "За довгі роки #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! окупації #TOOLTIP:CULTURE,$bulgarian_tt$,X #L болгарський#!#! народ поступово втратив власну культурну ідентичність. Тепер, коли він перейняв багато #L [ROOT.GetCountry.GetCulture.GetName|l]их#! звичаїв, його стане простіше інтегрувати в наше суспільство — за умови, що [target_character.GetName] буде належним чином керувати цим регіоном."
  flavor_tur.200.a: "Сумний підсумок, але нам він вигідний."
  flavor_tur.201.title: "Грецький вплив у Болгарії"
  flavor_tur.201.desc: "Користуючись занепадом #TOOLTIP:CULTURE,$bulgarian_tt$,X #L болгарської#!#! культури, багато народів стали поширювати в #TOOLTIP:AREA,bulgaria_area,X #L Болгарії#!#! свій власний вплив. Особливо в цьому досягли успіху #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецькі#!#! піддані [ROOT.GetCountry.Custom('CF_RP')|l], які вже скуповують місцеві будинки цілими вулицями. Це призведе до сумних наслідків для болгар, але, принаймні, дозволить нам зберегти ці землі населеними."
  flavor_tur.201.a: "Цікавий підсумок."
  flavor_tur.202.title: "Православне повстання у Видині"
  flavor_tur.202.desc: "#TOOLTIP:RELIGION,orthodox_tt,X #L Православні християни#!#! провінції [ShowProvinceDefinitionName('vidin_province')] незадоволені #L [ROOT.GetCountry.GetAdjective|l]#!ою владою. Частково це викликано релігійними відмінностями, частково зловживаннями намісників, що порушують законні права підданих [ROOT.GetCountry.Custom('CF_RP')|l]. Віруючі об'єдналися і сіють невдоволення в інших областях #TOOLTIP:AREA,bulgaria_area,X #L Болгарії#!#!. Як ми відреагуємо на цю проблему?"
  flavor_tur.202.a: "Якщо вони бажають збунтуватися, треба послати туди армію."
  flavor_tur.202.b: "Такі дрібні прохання нас не утруднять. Дайте їм те, що вони хочуть."
  tur_all_of_vidin_will_join_revolt: "Усі [Concept('pops','групи населення')|e] у #TOOLTIP:PROVINCE_DEFINITION,vidin_province,X #L Видині#!#! приєднаються до [Concept('rebellion','заколоту')|e] ([chiprovtsi_uprising.GetName]) і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%] [Concept('pop_satisfaction','вдоволення')|e]"
  chiprovtsi_uprising: "Повстання в Чипровцях"
  flavor_tur.203.title: "Іслам у Болгарії"
  flavor_tur.203.desc: "Той факт, що ми повністю контролюємо регіон [ShowAreaName('bulgaria_area')], уможливлює поширення нашої віри в цих землях. Цей процес обіцяє бути повільним, але безперервним, проте деякі [GetEstateName('clergy_estate')] хотіли б, щоб ми обклали його мешканців важчими податками та позбавили частини прав, аби їхнє навернення до істинної віри відбулося швидше. Зробивши це, ми обов'язково зіткнемося з невдоволенням у цих землях, і воно навіть може перерости у відкрите повстання."
  flavor_tur.203.a: "Що більше наших підданих прийме [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip]у віру, то краще."
  flavor_tur.203.b: "Не будемо засмучувати [GetEstateNameWithNoTooltip('dhimmi_estate')|l]."
  tur_convert_bulgarian_pops_to_islam_tt: "#Y 10%#! #TOOLTIP:CULTURE,$bulgarian_tt$,X #L болгарського#!#! або #TOOLTIP:RELIGION,orthodox_tt,X #L православного#!#! [Concept('pops','населення')|e] #TOOLTIP:AREA,bulgaria_area,X #L Болгарії#!#! навернеться в іншу релігію ([ROOT.GetCountry.GetReligion.GetName|l])"
  tur_unrest_in_bulgarian_pops_tt: "[Concept('pop_satisfaction', 'Вдоволення')|e] всіх #TOOLTIP:CULTURE,$bulgarian_tt$,X #L болгарських#!#! [Concept('pops', 'груп населення')|e] знизиться на [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%]"
  flavor_tur.204.title: "Доля халіфа"
  flavor_tur.204.desc: "Взявши #TOOLTIP:LOCATION,cairo_tt,X #L Каїр#!#!, ми захопили в полон його халіфа і доставили його до #L [ROOT.GetCountry.GetAdjective|l]#!ого двору. Після того, як [target_character.GetName] [Select_CString(target_character.IsFemale, 'зустрілася', 'зустрівся' )] з ним віч-на-віч, усім стало зрозуміло, що цей релігійний діяч — всього лише звичайна людина, яку [ROOT.GetCountry.GetGovernment.GetRulerTitle] перевершує в усіх відношеннях. Аббасидський халіф — це пережиток минулого, якого [Select_CString(target_character.IsFemale, 'повинна', 'повинен' )] змінити [target_character.GetNameWithNoTooltip] — істинний меч #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!."
  flavor_tur.204.a: "Треба позбутися старого халіфа."
  flavor_tur.204.b: "Залишимо халіфа як номінальну фігуру."
  tur_all_muslim_pops_gain_satisfaction: "Усі наші #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманські#!#! [Concept('pops', 'групи населення')|e] отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] до [Concept('pop_satisfaction', 'вдоволення')|e]"
  flavor_tur.205.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle]-газі"
  flavor_tur.205.desc: "Військова слава #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! гримить по всьому світу, але дехто звинувачує нашу переможну армію в надмірній жорстокості. Розуміючи це, [target_character.GetName] хоче змінити образ [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их полків в очах світової громадськості. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] бажає прославитися як [ShowAdvanceName('ghazi')] — не грабіжник і гнобитель невірних, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]-воїн, що захищає їхні права і стоїть осторонь від політичних ігор."
  flavor_tur.205.a: "Нехай усі знають, що [target_character.GetNameWithNoTooltip] — [Select_CString(target_character.IsFemale, 'істинна', 'істинний' )] [ShowAdvanceNameWithNoTooltip('ghazi')|l]."
  flavor_tur.205.b: "[target_character.GetNameWithNoTooltip] не потребує такої слави."
  flavor_tur.206.title: "Юдеї Фессалонік"
  flavor_tur.206.desc: "Підйом #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейської#!#! громади в [target_location.Custom('LR_PP')|l] [target_location.GetName] сприймається місцевими жителями загалом прихильно. Прихильники цієї релігії, що мають власну розвинену культуру, компактно проживають в одному з районів [target_location.Custom('LR_RP')|l]. [target_character.GetName] хоче назавжди передати їм цей район, щоб вони упорядкували його вулиці та залучили до нього якомога більше багатств."
  flavor_tur.206.a: "Дамо їм район."
  flavor_tur.206.b: "Вони не отримають особливих привілеїв."
  flavor_tur.207.title: "Невдоволення алевітів"
  flavor_tur.207.desc: "Війна з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_TP')|L]#!#! викликала невдоволення деякої частини наших підданих. Особливо це стосується #TOOLTIP:RELIGIOUS_SCHOOL,alevism_school_tt,X #L алевітів#!#!, які вже почали озброюватися, щоб покласти край цьому конфлікту. Тривожачись про ситуацію в країні, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вже готується розтрощити будь-кого, хто посміє повстати проти нашої влади."
  flavor_tur.207.a: "Вони скуштують нашої сталі."
  tur_alevi_unrest_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх наших [Concept('pops','груп населення')|e], що належать до #TOOLTIP:CULTURE,$kurdish_culture_tt$,X #L курдської#!#! [Concept('culture','культури')|e] або сповідують #TOOLTIP:RELIGION,shia_tt,X #L шиїтську#!#! чи #TOOLTIP:RELIGION,ibadi_tt,X #L ібадитську#!#! [Concept('religion','релігію')|e], знизиться на [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%]"
  flavor_tur.208.title: "[ShowPolicyNameWithNoTooltip('tur_kanum_i_osmani')]"
  flavor_tur.208.desc: "Зі зростанням [ROOT.GetCountry.Custom('CF_RP')|l] у наших володіннях опинилося безліч найрізноманітніших народів. Багато з них вже прийняли старі #L [ROOT.GetCountry.GetAdjective|l]#!і закони і стали частиною нашої нації, але [target_character.GetName] вважає, що цього недостатньо. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] хоче повністю переписати законодавство [ROOT.GetCountry.Custom('CL_RP')], віддаючи перевагу не зовнішній експансії, а зміцненню внутрішньої стабільності."
  flavor_tur.208.a: "Ці закони приведуть нас у нову епоху."
  flavor_tur.208.b: "Ми візьмемо ці реформи до відома."
  tur_change_tur_kanum_policy_to_give_values_weighted_by_crown_power: "[Concept('modifiers','Модифікатори')|e] [Concept('policy','політики')|e] [ShowPolicyName('tur_kanum_i_osmani')] стануть ефективнішими на #Y 50%#!, але будуть масштабуватися залежно від [Concept('estate_power','станової влади')|e] стану «[GetEstateName('crown_estate')]»"
  flavor_tur.209.title: "$sulaymaniyya_takiyya$"
  flavor_tur.209.desc: "Досягнувши вершини влади, [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'побажала', 'побажав' )] спорудити грандіозний монумент на честь усіх своїх близьких. На [Select_CString(target_character2.IsFemale, 'її', 'його' )] думку, ідеальним місцем для такого монумента буде [ShowLocationName('damascus')], а з його проєктуванням найкраще впорається [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Сама', 'Сам' )] [target_character.GetNameWithNoTooltip] ставиться до цього завдання з ентузіазмом, але вважає його непростим: на [Select_CString(target_character.IsFemale, 'її', 'його' )] думку, проєкт повинен містити елементи #TOOLTIP:CULTURE,$syriac_culture_tt$,X #L сирійського#!#! стилю, з яким [Select_CString(target_character.IsFemale, 'вона', 'він' )] не надто добре [Select_CString(target_character.IsFemale, 'знайома', 'знайомий' )]."
  flavor_tur.209.a: "Це корисний досвід і шанс здобути незвичайні архітектурні шедеври."
  flavor_tur.209.b: "Краще залишимо ці спроби."
  flavor_tur.210.title: "Рудобородий корсар"
  flavor_tur.210.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'яка народилася', 'який народився' )] в #TOOLTIP:LOCATION,molyvos,X #L Молівосі#!#!, усе своє життя [Select_CString(target_character.IsFemale, 'провела', 'провів' )] у морі. Здійснивши чимало торгових походів Середземномор'ям, [Select_CString(target_character.IsFemale, 'вона дійшла', 'він дійшов' )] висновку, що таке життя не для [Select_CString(target_character.IsFemale, 'неї', 'нього' )], і [Select_CString(target_character.IsFemale, 'стала', 'став' )] служити #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#! як корсар. Не досягнувши на цій службі високих посад, [Select_CString(target_character.IsFemale, 'вона', 'він' )], тим не менш, вельми [Select_CString(target_character.IsFemale, 'збагатила', 'збагатив' )] свою родину. Звернувши на це увагу, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує найняти [Select_CString(target_character.IsFemale, 'її', 'його' )] до [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого флоту."
  flavor_tur.210.a: "Нехай цей рудобородий бунтівник принесе нам славу."
  flavor_tur.210.b: "Ми наймемо [Select_CString(target_character.IsFemale, 'її', 'його' )] та будь-яких інших корсарів."
  flavor_tur.210.c: "Нам ні до чого бути посібниками пірата."
  flavor_tur.211.title: "Падіння Белграда"
  flavor_tur.211.desc: "Після багатомісячної облоги наші війська взяли #L [target_location.Custom('LR_VP')|l] [target_location.GetName] — одну з найважливіших фортець #TOOLTIP:REGION,balkan_region,X #L Балкан#!#!. [target_character.GetName] бачить у цьому шанс для нових завоювань — особливо в #TOOLTIP:REGION,carpathia_region,X #L Карпатах#!#!, де наша армія матиме перевагу у відкритому бою. Нехай ця облога стане прикладом для всіх, хто надумає нам чинити опір!"
  flavor_tur.211.a: "Рушимо ж уперед."
  flavor_tur.212.title: "Окупація Буди"
  flavor_tur.212.desc: "Споконвіку [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] залишається головним оплотом #TOOLTIP:REGION,carpathia_region,X #L Карпат#!#! проти іноземних загарбників. Цей [target_location.GetRank.GetNameWithNoTooltip|l] був запорукою існування #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#!. Тепер він у наших руках, а незабаром за ним підуть й інші землі цієї держави. Можливо, нам варто скористатися розбратом у Карпатах і захопити залишки цього регіону."
  flavor_tur.212.a: "Падіння [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip] навіки увійде в історію."
  flavor_tur.213.title: "Притулок халіфа"
  flavor_tur.213.desc: "[target_country.GetLongName] — здається, наші конфлікти з цією державою скоро закінчаться. Коли ми захопимо [target_location.Custom('LR_VP')|l] [target_location.GetName], аббасидський халіф, що там мешкає, неминуче опиниться в наших руках. Очевидно, що [target_country.GetNameWithNoTooltip] не в змозі захистити ні свою віру, ні свої землі. Можливо, колись ми ще скористаємося цією слабкістю, а поки будемо тріумфувати: ворота #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#! відкриті!"
  flavor_tur.213.a: "Насолодимося ж своїм успіхом."
  flavor_tur.214.title: "Ворота до Європи"
  flavor_tur.214.desc: "Багато країн #TOOLTIP:CONTINENT,europe,X #L Європи#!#! вважали [target_location.Custom('LR_VP')|l] [target_location.GetName] фортецею, що захищала від нас увесь інший континент. Однак армія #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! не змогла зупинити наш наступ, тож тепер ця фортеця впала. Одні держави прийняли це як неминучий рок і незабаром схиляться перед нами, а інші збирають війська, щоб дати відсіч. Хай там як, ворота до Європи тепер розчинені навстіж."
  flavor_tur.214.a: "Ми увійдемо маршем прямо в ці ворота."
  flavor_tur.215.title: "Падіння [target_country.Custom('CL_RP')]"
  flavor_tur.215.desc: "Острів [target_location.GetName] давно не давав нам спокою: нечестивці з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! влаштовували звідти набіги на наші землі. Але під час недавньої кампанії ми захопили [target_location.Custom('LR_VP')|l] [target_location.GetNameWithNoTooltip] і повністю розгромили [target_country.GetAdjectiveWithNoTooltip|l]ий опір."
  flavor_tur.215.a: "Нехай знають, що буває, коли чиниш нам опір."
  flavor_tur.216.title: "Майбутня база в Західному Середземномор'ї"
  flavor_tur.216.desc: "Влада #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! знала про наш намір захопити [target_location.Custom('LR_VP')|l] [target_location.GetName]. Вони розуміли, що місцева фортеця потрібна нам як плацдарм для завоювання решти #TOOLTIP:AREA,western_mediterranean_sea_area,X #L Західного Середземномор'я#!#! та його портів. Саме тому її облога була довгою та кривавою. Але, попри всі зусилля ворога, [target_location.GetRank.GetNameWithNoTooltip] тепер належить нам."
  flavor_tur.216.a: "Треба негайно розмістити там свій флот."
  flavor_tur.217.title: "Хвилювання в Сербії"
  flavor_tur.217.desc: "#TOOLTIP:RELIGION,orthodox_tt,X #L Православні#!#! громади #TOOLTIP:AREA,serbia_area,X #L Сербії#!#! не люблять наших #L [ROOT.GetCountry.GetReligion.GetAdjective|l]#!их звичаїв, особливо коли намісники намагаються нав'язувати їх силою. Вони беруться за зброю при будь-якій нашій спробі експансії на їхні землі. [ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] рекомендує припиняти будь-які спроби заколотів, справедливо побоюючись, що вони можуть перекинутися й на інші регіони [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_tur.217.a: "Ми готові зустрітися з ними на полі бою."
  flavor_tur.217.b: "Нехай у них буде автономія."
  tur_all_of_specified_locations_join_rebellion_tt: "Усі [Concept('pops','групи населення')|e] у провінціях [ShowProvinceDefinitionName('toplica_province')], [ShowProvinceDefinitionName('sumadija_province')] та [ShowProvinceDefinitionName('branicevo_province')] приєднаються до заколоту ([serb_uprising.GetName]) і втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  tur_all_specified_locations_lose_control: "Усі [Concept('locations','райони')|e] у провінціях [ShowProvinceDefinitionName('toplica_province')], [ShowProvinceDefinitionName('sumadija_province')] та [ShowProvinceDefinitionName('branicevo_province')] втратять [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control','контролю')|e]"
  serb_uprising: "Сербське повстання"
  flavor_tur.218.title: "[target_location.GetRank.GetNameWithNoTooltip] біля річки"
  flavor_tur.218.desc: "Через недостатню адміністрацію дороги #TOOLTIP:AREA,bosnia_area,X #L Боснії#!#! поступово приходять у непридатність. Ця проблема особливо помітна в [target_location.Custom('LR_PP')|l] [target_location.GetName] на березі річки. [target_character.GetName] пропонує виділити цьому поселенню додаткові кошти та перетворити його на адміністративний центр Боснії."
  flavor_tur.218.a: "Давайте вкладемо кошти в це поселення."
  flavor_tur.218.b: "Так, вельми дороге вкладення."
  flavor_tur.219.title: "Арматоли"
  flavor_tur.219.desc: "#TOOLTIP:CULTURE,$greek_culture_tt$,X #L Греки#!#! та інші жителі гірських #TOOLTIP:REGION,balkan_region,X #L Балкан#!#! продовжують чинити опір нашій владі, знову і знову нападаючи на торгові каравани, дороги та органи влади. Вони чекають слушного моменту, щоб завдати рішучого удару та відвоювати собі більше автономії. Ми не надавали цьому значення, але зараз [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] тривожиться через те, що горяни накопичують сили та збурюють спокій усіх Балкан."
  flavor_tur.219.a: "Прокляття!"
  flavor_tur.219.b: "Замість того, щоб воювати з ними, ми можемо відкупитися від них."
  flavor_tur.220.title: "[ShowBuildingTypeNameWithNoTooltip('university')|U] Пуатьє"
  flavor_tur.220.desc: "Захопивши [target_location.Custom('LR_VP')|l], [target_character.GetName] [Select_CString(target_character.IsFemale, 'зацікавилася', 'зацікавився' )] місцевою спорудою, іменованою [ShowBuildingTypeName('darussifa')]. Вона була зведена ще за Ільханату, але досі залишається однією з найпередовіших лікарень в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!, а то й у всьому світі. [target_character.GetNameWithNoTooltip] хоче оплатити її розширення, щоб перетворити її на світовий центр навчання медицині."
  flavor_tur.220.a: "Ми профінансуємо розширення."
  flavor_tur.220.b: "Нехай усе залишається, як є."
  flavor_tur.221.title: "Блакитна мечеть Константинополя"
  flavor_tur.221.desc: "Хоча [target_location.GetName] давно є оплотом #L [ROOT.GetCountry.GetReligion.GetAdjective|l]#!ої віри, [target_character2.GetName] з гіркотою відзначає, що останніми роками [target_location.Custom('LR_DP')|l] бракує слави та благочестя. Тому [Select_CString(target_character2.IsFemale, 'вона', 'він' )] бажає збудувати нову мечеть поруч з іподромом візантійської епохи. За [Select_CString(target_character2.IsFemale, 'її', 'його' )] дорученням [target_character.GetName] проєктує найекстравагантніший архітектурний пам'ятник за всю #L [ROOT.GetCountry.GetAdjective|l]#!у історію, що виділяється з-поміж усіх інших мечетей."
  flavor_tur.221.a: "Давайте збудуємо Блакитну мечеть."
  flavor_tur.221.b: "Мабуть, це занадто дорого."
  flavor_tur.1000.title: "Албанські заручники"
  flavor_tur.1000.desc: "Хоча [ShowProvinceDefinitionName('albania_province')] перебуває під нашим контролем, у ній залишилося кілька бунтівних правителів. Не висловлюючи вголос свого ставлення до #L [ROOT.GetCountry.GetAdjective|l]#!ого панування, вони чекають слушного моменту, щоб завдати нам удару в спину. Замість того, щоб миритися з цим, ми могли б узяти заручників з-поміж їхньої рідні — насамперед, із родини [ShowDynastyName('kastrioti_dynasty')]. Таким чином [target_character.GetName] отримає важіль впливу, яким зможе скористатися в разі заколоту."
  flavor_tur.1000.a: "Треба вимагати заручників."
  flavor_tur.1000.b: "Це буде неповагою до [ROOT.GetCountry.Custom('CL_DP')]."
  tur_demand_hostage_from_albanian_country_tt: "Ми вимагатимемо у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#! передати нам [Concept('character', 'персонажа')|e] з династії #TOOLTIP:DYNASTY,kastrioti_dynasty,X #L Кастріоті#!#!"
  flavor_tur.1001.title: "$flavor_tur.1000.title$"
  flavor_tur.1001.desc: "Влада #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_RP')|L]#!#! вимагає від нас заручника. Вони могутніші за нас, але їм потрібен важіль впливу на випадок, якщо колись ми вирішимо проти них повстати. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] вважає, що на роль такого заручника найкраще підходить [target_character2.GetName] з дрібного шляхетського роду. З іншого боку, якщо ми підемо на цей крок, наша свобода дій буде обмежена."
  flavor_tur.1001.a: "Нехай [target_character2.GetNameWithNoTooltip] вирушить до них"
  flavor_tur.1001.b: "Вони не отримають наших людей!"
  flavor_tur.1002.title: "[target_character.GetNameWithNoTooltip] потребує навчання"
  flavor_tur.1002.desc: "За роки служби в #L [ROOT.GetCountry.GetAdjective|l]#!ій армії [target_character.GetName] [Select_CString(target_character.IsFemale, 'продемонструвала', 'продемонстрував' )] природний командирський хист. [Select_CString(target_character.IsFemale, 'Їй', 'Йому' )] поки не доводилося командувати армією, але [Select_CString(target_character.IsFemale, 'вона', 'він' )] цілком [Select_CString(target_character.IsFemale, 'здатна', 'здатний' )] повести в бій сотні солдатів і змусити їх битися з переважаючим ворогом до перемоги. [target_character2.GetName] бажає, щоб [Select_CString(target_character.IsFemale, 'ця обдарована жінка отримала', 'цей обдарований чоловік отримав' )] належну військову освіту."
  flavor_tur.1002.a: "Заплатимо за це навчання."
  flavor_tur.1002.b: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] впорається і без учителів."
  flavor_tur.1003.title: "Удж-бей Албанії"
  flavor_tur.1003.desc: "Здобувши чимало перемог, [target_character.GetName] [Select_CString(target_character.IsFemale, 'виділилася', 'виділився' )] з-поміж багатьох славних воїнів і [Select_CString(target_character.IsFemale, 'довела', 'довів' )], що [Select_CString(target_character.IsFemale, 'її', 'його' )] єдина мета — служіння #ONCLICK:COUNTRY,ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Тепер [Select_CString(target_character.IsFemale, 'її', 'його' )] приваблює нова посада — [ShowSubjectTypeName('uc_bey')] в #ONCLICK:PROVINCE_DEFINITION,albania_province #TOOLTIP:PROVINCE_DEFINITION,albania_province,X #L Албанії#!#!#!. [target_character2.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] високо цінують талант і заслуги [Select_CString(target_character.IsFemale, 'цієї жінки', 'цієї людини' )], але побоюються, що справа може закінчитися заколотом — адже [Select_CString(target_character.IsFemale, 'вона', 'він' )] усе-таки [Select_CString(target_character.IsFemale, 'заручниця', 'заручник' )]."
  flavor_tur.1003.a: "Давайте дамо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] цю посаду."
  flavor_tur.1003.b: "Ми [Select_CString(target_character.IsFemale, 'їй', 'йому' )] не довіряємо."
  tur_grant_all_of_albania_to_skanderbeg_as_uc_bey: "Ми створимо посаду «[ShowSubjectTypeName('uc_bey')]» у провінції [ShowProvinceDefinitionName('albania_province')], на яку буде [Select_CString(target_character.IsFemale, 'призначена', 'призначений' )] [target_character.GetName]"
  tur_no_lands_for_skanderbeg_tt: "[target_character.GetName] не отримає жодних земель"
  flavor_tur.1004.title: "[target_character2.GetNameWithNoTooltip] рветься до влади"
  flavor_tur.1004.desc: "[target_character2.GetName], багато років [Select_CString(target_character2.IsFemale, 'прослуживши', 'прослуживши' )] #ONCLICK:COUNTRY,ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#!, [Select_CString(target_character2.IsFemale, 'отримала', 'отримав' )] титул у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PP')|L]#!#! і з цієї причини [Select_CString(target_character2.IsFemale, 'впала', 'впав' )] у немилість #L [ROOT.GetCountry.GetAdjective|l]#!ого двору. [Select_CString(target_character2.IsFemale, 'Вона', 'Він' )] хоче створити для #TOOLTIP:CULTURE,albanian_tt,X #L албанців#!#! незалежну державу і сподівається здійснити свою мрію всупереч нашій волі."
  flavor_tur.1004.a: "Яка зрада!"
  flavor_tur.1004.b: "Ми зараз не в тому становищі, щоб воювати."
  flavor_tur.1004.c: "За Албанію!"
  flavor_tur.1005.title: "[target_character.GetNameWithNoTooltip] тікає з країни"
  flavor_tur.1005.desc: "Багато років прослуживши #ONCLICK:COUNTRY,ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#!, [target_character.GetName] [Select_CString(target_character.IsFemale, 'усвідомила', 'усвідомив' )], що жодні заслуги не дозволять [Select_CString(target_character.IsFemale, 'їй', 'йому' )] домогтися незалежності для #TOOLTIP:CULTURE,albanian_tt,X #L албанців#!#!. Тому зараз [Select_CString(target_character.IsFemale, 'вона втекла', 'він втік' )] до #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_VP')|L]#!#!, сподіваючись отримати від цієї держави допомогу у здійсненні своєї мрії."
  flavor_tur.1005.a: "Скатертиною дорога."
  flavor_tur.1006.title: "$flavor_tur.1005.title$"
  flavor_tur.1006.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'втекла', 'втік' )] з #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_RP')|L]#!#! після багаторічної служби при дворі цієї країни. Тепер [Select_CString(target_character.IsFemale, 'вона', 'він' )] хоче служити нам у надії, що ми допоможемо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] створити незалежну #TOOLTIP:CULTURE,albanian_tt,X #L албанську#!#! державу."
  flavor_tur.1006.a: "Ми приймемо [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  flavor_tur.1100.title: "[GetEstateNameWithNoTooltip('cossacks_estate')]"
  flavor_tur.1100.desc: "Якщо ми коли-небудь вирішимо підкорити #TOOLTIP:REGION,ruthenia_region,X #L Рутенію#!#!, нашою головною проблемою стануть [GetEstateName('cossacks_estate')|l] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#!. Входячи до числа найкращих вершників #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, вони вже зупинили чимало завойовників. Однак у нинішніх умовах у нас є шанс підкорити їх пером або мечем."
  flavor_tur.1100.a: "Вони схиляться перед нами."
  flavor_tur.1100.b: "Ні до чого з ними ворогувати."
  tur_demand_subjugation_of_zaz_tt: "Ми вимагатимемо у держави [target_country.GetName], щоб вона стала нашим #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#!"
  flavor_tur.1101.title: "$flavor_tur.1100.title$"
  flavor_tur.1101.desc: "Влада #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_RP')|L]#!#! бажає, щоб ми стали їхніми ленниками. У своєму листі [target_character2.GetName] нагадує про міць своєї держави та обіцяє захист від чужоземних ворогів в обмін на покірність."
  flavor_tur.1101.a: "У нас немає вибору."
  flavor_tur.1101.b: "Нам не потрібен їхній захист."
  flavor_tur.1101.c: "Ти, [target_country.GetGovernment.GetRulerTitle|l], чорт [target_country.GetAdjectiveWithNoTooltip|l]ий...."
  flavor_tur.1102.title: "$flavor_tur.1100.title$"
  flavor_tur.1102.desc: "Як ми не намагалися переконати #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_VP')|L]#!#! визнати нашу владу, ці невірні продовжують чинити опір. Більше того, їхня [Select_CString(target_character.IsFemale, 'нечестива', 'нечестивий' )] [target_character.GetName] [Select_CString(target_character.IsFemale, 'надіслала', 'надіслав' )] нам образливий лист, повний глузувань над славними титулами, які носить [target_character2.GetName]! [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не може залишити подібну зухвалість без відповіді."
  flavor_tur.1102.a: "Вони пошкодують, що так образили нас!"
  flavor_tur.1200.title: "Договір з [target_country.Custom('CL_TP')]"
  flavor_tur.1200.desc: "Попри відмінності у вірі, у нас з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_TP')|L]#!#! є спільні дипломатичні інтереси. Ми, як і вони, бажаємо назавжди позбутися #ONCLICK:COUNTRY,[target_rival.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_rival.Custom('CL_tt')],X [target_rival.Custom('CL_RP')|L]#!#! — свого давнього ворога, який завзято відмовляється визнавати нашу могутність. У зв'язку з цим [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує відправити посольство до міста [target_country.GetCapital.GetName], щоб укласти союз проти нашого спільного недруга."
  flavor_tur.1200.a: "Відправимо їм повідомлення."
  flavor_tur.1200.b: "Ми не станемо об'єднуватися з невірними."
  flavor_tur.1201.title: "$flavor_tur.1200.title$"
  flavor_tur.1201.desc: "Бачачи, як ми боремося з #ONCLICK:COUNTRY,[target_rival.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_rival.Custom('CL_tt')],X [target_rival.Custom('CL_TP')|L]#!#!, влада #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_RP')|L]#!#! запропонувала нам укласти союз проти цього ворога. Ця ідея виглядає вельми спокусливо, однак інші країни можуть вважати такий союз загрозою для своєї безпеки та об'єднатися проти нас, чого [target_character.GetName] точно не схвалить."
  flavor_tur.1201.a: "Поки не будемо нічого говорити напевно."
  flavor_tur.1201.b: "Ворог мого ворога..."
  flavor_tur.1201.c: "Союз із невірними? Ніколи!"
  flavor_tur.1300.title: "Зв'язки з [target_country.Custom('CL_TP')]"
  flavor_tur.1300.desc: "Корсари #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#! здатні відіграти ключову роль у нашому майбутньому вторгненні до #TOOLTIP:REGION,iberia_region,X #L Іберії#!#!. Ці чудові моряки могли б стати нашими ідеальними ленниками в #TOOLTIP:REGION,maghreb_region,X #L Магрибі#!#!. Вони розуміють, що наша військова міць захистить їх від будь-якого ворога, тож, можливо, ми зможемо домовитися..."
  flavor_tur.1300.a: "Настав час поширити наш вплив на [ROOT.GetCountry.Custom('CL_VP')]."
  flavor_tur.1300.b: "Свого часу, але точно не зараз."
  flavor_tur.1301.title: "$flavor_tur.1300.title$"
  flavor_tur.1301.desc: "[target_character.GetName] отримує повідомлення від #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#!. Ця держава хоче укласти з нами договір: якщо ми станемо її ленниками, [target_character2.GetName] надасть нам свій захист."
  flavor_tur.1301.a: "Ми не приймемо захисту від чужинців."
  flavor_tur.1301.b: "Якщо це гарантує нам безпеку..."