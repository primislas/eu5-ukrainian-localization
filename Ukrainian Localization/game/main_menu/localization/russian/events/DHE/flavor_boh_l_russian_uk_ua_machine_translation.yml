l_russian:
  flavor_boh.1.title: "Гусити повертаються!"
  flavor_boh.1.desc: "Попри всі наші зусилля, спроби встановити мир між #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситами#!#! та #TOOLTIP:RELIGION,$catholic_tt$,X #L католиками#!#! зазнали краху. Керівник гуситів на ім'я [jiri_z_podebrad.GetName] зібрав військо і тепер веде його на #TOOLTIP:LOCATION,prague,X #L Прагу#!#!. У власних очах він — майбутній [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Після оволодіння престолом він має намір покласти край гонінням на послідовників вчення, яке проповідував [GetCharacter('boh_jan_hus').GetLastName]."
  flavor_boh.1.historical_info: "Їржі з Кунштата і Подебрад був богемським дворянином і одним з лідерів гуситів. Під час правління короля Ладислава між прихильниками католицизму і гуситами посилилася напруженість, тоді Їржі зібрав армію, захопив столицю і здобув перемогу над знаттю, яка все ще залишалася вірною папі римському. У 1451 році імператор Священної Римської імперії Фрідріх III доручив йому управління Богемією, а в 1458 році богемські стани, — включно навіть з прихильниками папи, — одностайно обрали його королем. Їржі намагався проводити політику миру і терпимості, але після кількох років правління католицька опозиція підняла повстання, підтримавши угорського короля Матяша Корвіна, який вторгся в Богемію, щоб повернути її в лоно католицької церкви."
  flavor_boh.1.a: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] знав істину."
  flavor_boh.1.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] слідує за Гусом, а народ піде за Римом."
  STATIC_MODIFIER_NAME_boh_hussite_king: "Влада гуситів"
  STATIC_MODIFIER_NAME_DESC_boh_hussite_king: "Владика нашої країни підтримує #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситство#!#! — релігійний рух, який заснував [GetCharacter('boh_jan_hus').GetName] на противагу #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькій#!#! церкві. І хоча чимало наших підданих підтримують гуситські ідеї, правителі-#TOOLTIP:RELIGIONGROUP,christian,X #L християни#!#! з інших країн Європи ставляться до нас у кращому разі вороже."
  flavor_boh.1.c: "Ми збережемо вірність Риму!"
  boh_papal_reconciled: "Покора гуситів"
  flavor_boh.2.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle]-єретик"
  flavor_boh.2.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'затята послідовниця', 'затятий послідовник' )] #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситських#!#! ідей, на ґрунті цих поглядів [Select_CString(target_character.IsFemale, 'настроївши', 'настроївши' )] проти себе #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! церкву. [GetCountry('PAP').GetGovernment.GetRulerTitle|U] вважає себе милостивим владикою, а тому пропонує примиритися з церквою і навіть готовий піти на поступки, якщо ми відречемося від вчення єретика на ім'я [GetCharacter('boh_jan_hus').GetLastName] і повернемося до римських догм."
  flavor_boh.2.a: "Схилимо коліно перед Римом."
  flavor_boh.2.b: "Залишимося вірними Христу."
  flavor_boh.3.title: "Зеленогірський союз"
  flavor_boh.3.desc: "Прихильники папства в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! вкрай незадоволені тим, що [target_character.GetName] [Select_CString(target_character.IsFemale, 'відмовилася', 'відмовився' )] придушити #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситську#!#! віру — вони вважають, що вчинити так міг тільки єретик і ворог церкви. Відповідь послідувала швидко: на зборах у Зелена-Горі [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'була оголошена негідною', 'був оголошений негідним' )] свого престолу. Тепер [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] нашої країни перебуває в скрутному становищі: прихильники папи разом зі своїми союзниками з числа #TOOLTIP:AREA,silesia_area,X #L сілезьких#!#! дворян відкрито підняли заколот."
  flavor_boh.3.a: "Ми їх розгромимо!"
  flavor_boh.4.title: "Владиславський зал"
  flavor_boh.4.desc: "Наш чудовий архітектор [target_character.GetName] воістину перевершив самого себе. Останнє його творіння — [ShowWorkOfArtName('vladislav_hall')], найбільше в #TOOLTIP:LOCATION,prague,X #L Празі#!#! світське приміщення — можна без перебільшення назвати шедевром архітектури. Тут можна проводити що завгодно: бенкети, коронації, інші важливі для двору заходи… Зал цей настільки великий, що тут без труда вийде влаштувати навіть лицарський турнір з верховими кіньми."
  flavor_boh.4.a: "Чудово!"
  flavor_boh.4.historical_info: "Владиславський зал — видатний пам'ятник пізньої готики, побудований у 1493–1502 роках Бенедиктом Рейтом у рамках масштабної перебудови Празького граду, затіяної королем Владиславом II. Це величезне приміщення з високими витіюватими склепіннями вважається одним із чудес пізньосередньовічної архітектури. Спочатку Владиславський зал використовувався для королівських церемоній, бенкетів і лицарських турнірів, пізніше, в епоху Габсбургів, там проводилися засідання парламенту та вибори монарха. Сходи, що ведуть до зали, настільки широкі, що ними могли користуватися кінні лицарі в повному обладунку."
  flavor_boh.6.title: "Браге і Кеплер"
  flavor_boh.6.desc: "[ROOT.GetCountry.GetCapital.GetName] — справжній оплот наукового прогресу, сюди стікаються найвидатніші уми нашого часу. Серед них і знаменитий данський астроном [target_character.GetName], [Select_CString(target_character.IsFemale, 'яка прославилася', 'який прославився' )] своїми спостереженнями за небесними тілами. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] прагне перевірити свої теорії, і в цьому [Select_CString(target_character.IsFemale, 'їй', 'йому' )] допоможе знаменитий математик, [Select_CString(target_character2.IsFemale, 'володарка', 'володар' )] видатного аналітичного розуму [target_character2.GetName]. Їхні спільні дослідження можуть кардинально змінити наші уявлення про небеса і підвищити престиж нашої країни, однак останні знахідки вчених йдуть врозріз зі сталими поглядами…"
  flavor_boh.6.historical_info: "Відомий вчений Тихо Браге на заході свого життя переїхав до Праги, де отримав посаду придворного астронома і побудував нову обсерваторію. У роботі йому допомагав Йоганн Кеплер, який після смерті Браге продовжив використовувати нотатки вченого і на основі цих знань відкрив закони руху планет."
  flavor_boh.6.a: "Блискуче!"
  flavor_boh.6.b: "Досить марно дивитися в небо!"
  flavor_boh.7.title: "Гуситські традиції"
  flavor_boh.7.desc: "Серед народу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! ще сильні #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситські#!#! традиції, однак після того, як Мартін Лютер написав свої 95 тез, багато високих чинів все частіше починають відвертатися від гуситства і звертатися в #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!. Нам час визначитися, як чинити далі: чи залишатися гуситами, чи приєднатися до лютеранського руху Реформації."
  flavor_boh.7.a: "Ми збережемо гуситську віру."
  flavor_boh.7.b: "Ми приєднаємося до Реформації. Хай живуть Лютер і [GetCharacter('boh_jan_hus').GetLastNameWithNoTooltip]!"
  flavor_boh.8.title: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]: зимовий король"
  flavor_boh.8.desc: "#TOOLTIP:RELIGION,$catholic_tt$,X #L Католикам#!#! і #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранам#!#! не звикати до взаємної релігійної неприязні, однак останнім часом конфлікт їх небезпечно загострився. Деякі дворяни, що сповідують лютеранство, зуміли заручитися підтримкою єретиків-однодумців із сусідніх країн і навіть обрали собі нового кандидата на посаду правителя, хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! сьогодні — [target_character.GetName]. Зухвалість їх не знає меж; зіткнення на релігійному ґрунті неминуче. Або ми приймемо лютеранство мирно, або зустрінемо єретиків зі зброєю в руках."
  flavor_boh.8.historical_info: "У 1608 році загострилася напруга між католицькими та протестантськими землями імперії. Протестанти уклали між собою союз, який очолив курфюрст Пфальцький Фрідріх за підтримки Бранденбурга та Гессен-Касселя. У відповідь на це католики утворили власний союз — Католицьку лігу. У 1618 році богемські протестанти підняли повстання та обрали Фрідріха Пфальцького королем Богемії, чим обурили імператора — чинного короля Богемії. Імператорський полководець Тіллі, посланий розбити заколотників, вирушив зі своїм військом до Богемії, де розгромив армію Фрідріха при Білій горі, поклавши тим самим край правлінню «короля», а заодно — протестантському опору в Австрії та Південній Німеччині. Фрідріх, що втік з Богемії, отримав у народі прізвисько «зимовий король» — за своє недовге правління."
  flavor_boh.8.a: "Постараємося уникнути кровопролиття."
  flavor_boh.8.b: "З нами Бог!"
  boh_lutheran_king: "Лютеранський король на престолі"
  flavor_boh.9.title: "[GetCountry('BOH').GetGovernment.GetRulerTitle]-гусит на троні [GetCountry('BOH').Custom('CL_GEN')]"
  flavor_boh.9.desc: "На престол #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#! сходить [GetCountry('BOH').GetGovernment.GetRulerTitle|l], чию душу, очевидно, спокушає сам диявол, бо [target_character.GetName] сповідує єретичну #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситську#!#! віру, відкрито відмовляючись від віри істинної. Колегія кардиналів вважає, що цим ображається не тільки католицька віра, а й безпосередньо [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l]."
  flavor_boh.9.a: "Будь [Select_CString(target_character.IsFemale, 'проклята', 'проклятий' )] [target_character.GetNameWithNoTooltip] і [Select_CString(target_character.IsFemale, 'її', 'його' )] дім!"
  boh_heretic_hussite: "Гусит-єретик"
  flavor_boh.9.b: "Варто примиритися з [GetCountry('BOH').Custom('CL_INST')]."
  flavor_boh.10.title: "Влада [GetCountry('PAP').Custom('longname_ru_wntt_GEN')] заявляє: «[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'винна', 'винен' )]»"
  flavor_boh.10.desc: "[GetCountry('PAP').GetLongName] стверджує, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] нашої країни [Select_CString(target_character.IsFemale, 'винна', 'винен' )] у розповсюдженні #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситської#!#! єресі."
  flavor_boh.10.a: "Я не відречуся від свого народу!"
  flavor_boh.11.title: "[GetCountry('PAP').GetLongNameWithNoTooltip] поступа[GetCountry('PAP').Custom('endlong_etyut')]"
  flavor_boh.11.desc: "Нам повідомили, що [GetCountry('PAP').GetLongName] відмовляється від своїх звинувачень, хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] відкрито виступає на підтримку #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситського#!#! руху."
  flavor_boh.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_boh.13.title: "Розбрат у церкві"
  flavor_boh.13.desc: "У #TOOLTIP:LOCATION,konstanz,X #L Констанці#!#! скоро збереться рада, де обговорюватиметься #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! віра. Запрошення відвідати раду та поділитися своїми поглядами щодо церковних чвар отримав і [target_character.GetName] — йому пообіцяли недоторканність."
  flavor_boh.13.a: "Нічого поганого не станеться!"
  flavor_boh.14.title: "Рада в Констанці"
  flavor_boh.14.desc: "Великий собор у #TOOLTIP:LOCATION,konstanz,X #L Констанці#!#! — вісник доленосних змін, що несуть із собою релігійна смута — і, можливо, вчинки однієї людини. Перед радою постав [target_character.GetName] — #L [GetCountry('BOH').GetAdjective|l]ий#! реформатор і прихильник релігійних свобод. Життя його може обірватися будь-якої миті. Під священними склепіннями розносяться слова вчення, яке проповідує [target_character.GetLastNameWithNoTooltip], — вчення, що виступає проти влади #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви та закликає до реформ. Його послідовники — гусити — затамували подих в очікуванні, яке рішення ухвалить рада."
  flavor_boh.14.a: "Нехай [target_character.GetNameWithNoTooltip] згорить на вогнищі."
  flavor_boh.14.b: "Єретика слід помилувати."
  flavor_boh.15.title: "[target_character.GetNameWithNoTooltip] спалений на вогнищі"
  flavor_boh.15.desc: "В аннали релігійної боротьби вписано нову страшну главу. Життя, яке вів #L [ROOT.GetCountry.GetAdjective|l]ий#! реформатор [target_character.GetName], обривається на жахливій і трагічній ноті. У серцях праведників спалахує вогонь розкольництва, а #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! церква тим часом збирає сили, щоб завдати потужного удару по єретичному вченню, яке проповідував [target_character.GetLastNameWithNoTooltip]."
  flavor_boh.15.a: "Невже він був таким же, як і ми?"
  flavor_boh.16.title: "[target_character.GetNameWithNoTooltip] відпущений"
  flavor_boh.16.desc: "Постанова ради вразила всіх. Одним розчерком пера судді зумовили хід світової історії. [target_character.GetName], #L [ROOT.GetCountry.GetAdjective|l]ий#! реформатор, якого колись звинувачували в єресі, отримав примарну можливість спокутувати свої гріхи: він більше не вважається ворогом #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви, а тому може й далі поширювати своє вчення."
  flavor_boh.16.a: "Це вчення неодмінно пошириться…"
  flavor_boh.17.title: "Перший Вишеградський з'їзд"
  flavor_boh.17.desc: "Відтоді як #L [ROOT.GetCountry.GetAdjective|l]ий#!, #L [GetCountry('HUN').GetAdjective|l]ий#! та #L [GetCountry('POL').GetAdjective|l]ий#! доми востаннє збиралися обговорювати питання розширення #L [GetCountry('HAB').GetAdjective|l]их#! кордонів, минуло кілька років. Щоб відносини між трьома країнами стали ще міцнішими, ми відкликали свою претензію на престол #TOOLTIP:DYNASTY,$piast_dynasty_tt$,X #L П'ястів#!#!.\n\nУ відповідь нам надали жест доброї волі, пожалувавши виняткові права на торгові маршрути, а також визнавши нашу владу над #TOOLTIP:AREA,silesia_area,X #L Сілезією#!#!, після чого наші зв'язки лише зміцніли. Можливо, ця угода ще відіграє важливу роль у прагненні пересилити вплив родини #TOOLTIP:DYNASTY,$habsburg_dynasty_tt$,X #L Габсбургів#!#!."
  flavor_boh.17.a: "Ми будемо й далі шанувати угоду!"
  flavor_boh.17.b: "У нас зовсім інші плани…"
  flavor_boh.18.title: "Староміська ратуша"
  flavor_boh.18.desc: "Управління нашими володіннями — складна справа, що вимагає неймовірної ретельності від кожного канцлера та члена ради.\n\nЩоб спростити судочинство, а заодно й процеси керівництва [ROOT.GetCountry.Custom('rank_ru_INST')|l], [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] пропонує нам придбати у якоїсь багатої родини великий будинок і перетворити його на місце, де радники та представники станів зустрічатимуться та обговорюватимуть питання політики та державних справ."
  flavor_boh.18.a: "Це піде на користь [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій репутації!"
  flavor_boh.18.b: "Не слід порушувати усталений порядок."
  flavor_boh.19.title: "Районні права на побори"
  flavor_boh.19.desc: "#TOOLTIP:LOCATION,prague,X #L Прага#!#! постійно розростається, і багато видатних діячів, які очолюють сьогодні ті чи інші місцевості міста, такі як Мала-Страна, починають вимагати у нас право стягувати податки з громадян, які проживають на їх територіях.\n\nЯкщо піти їм назустріч, наше казначейство втратить чималу частку впливу, а #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#!, навпаки, його здобуде, тому вивчити це питання слід вкрай уважно."
  flavor_boh.19.a: "Добре, ми виконаємо їх прохання."
  flavor_boh.19.b: "Про це не може бути й мови!"
  flavor_boh.20.title: "Празький університет"
  flavor_boh.20.desc: "Щоб по праву вважати себе одним із найбільш освічених народів світу, необхідно всерйоз зайнятися поширенням знань. Цьому, на щастя, сприяють вищі верстви нашого суспільства: останнім часом вони відчувають непідробний інтерес до навчання в просторих університетських залах та передачі засвоєної там мудрості іншим. Вони навіть вимагають від нас побудувати новий #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!, щоб виростити нове покоління мислителів!"
  flavor_boh.20.a: "Чудова ідея!"
  flavor_boh.20.b: "Сумнівна ідея…"
  flavor_boh.21.title: "Нове-Место"
  flavor_boh.21.desc: "Щоб ніхто не сумнівався, що [target_character.GetName] — чудовий правитель, а народ багатий і живе в достатку, рада [target_location.Custom('LR_GEN')] [target_location.GetName] запропонувала спорудити в межах кордонів нашої великої столиці нове місто. На підтримку цієї ідеї виступають багато радників, які бажають, щоб при слові «[target_location.GetNameWithNoTooltip]» кожному уявлялися нові будинки, що вражають уяву, втілюючи в собі всю велич і працьовитість нашого народу."
  flavor_boh.21.a: "Збудуємо нове місто!"
  flavor_boh.21.b: "Це не найкраще використання наших коштів."
  flavor_boh.22.title: "Спільне генеральне зібрання"
  flavor_boh.22.desc: "Відтоді як ми очолили #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#!, різниця між імперськими та нашими власними традиціями діловодства стала чіткою як ніколи. Положення посилюється відмінностями в наших культурах та укладах — вони заважають нам відстоювати законність влади над імперією.\n\nЩоб [target_character.GetName] [Select_CString(target_character.IsFemale, 'змогла', 'зміг' )] зміцнити своє становище на престолі, а народ став ближчим до імперських порядків, радники запропонували заснувати спільне генеральне зібрання. До нього увійдуть деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та символічні представники всіх інших курфюрстів; крім того, зайвий раз будуть підтверджені імперські закони, що забезпечують їхні привілеї."
  flavor_boh.22.a: "Тільки так ми забезпечимо собі легітимність."
  flavor_boh.22.b: "Не будемо змішувати зовнішню та внутрішню політику."
  every_elector_25_opinion_tt: "Кожен виборщик отримає [ShowBiasValue('granted_joint_assembly_decrees_modifier')|+=0] до думки про нас"
  flavor_boh.23.title: "[target_area.GetNameWithNoTooltip]: земельний суд"
  flavor_boh.23.desc: "Завдання управління нашими володіннями не можна назвати легким. Сотні земських начальників та управителів без втоми працюють день і ніч, щоб до скарбниці справно надходили податки, а на прикордонні не чинилося свавілля.\n\nНещодавно градоначальники з області [target_area.GetName] попросили нас заснувати обласний суд, який керуватиме справами від імені [target_capital.Custom('LR_GEN')|l] [target_capital.GetName]. До його складу увійде обраний на місцевому рівні управитель, а наглядатиме за роботою обласний суддя. Крім них засідатимуть 14 найвидатніших місцевих дворян."
  flavor_boh.23.a: "Добре. Ми схвалюємо цей план."
  flavor_boh.23.b: "Не варто відвертатися від центральної влади…"
  boh_control_prosp_dev_moravia_tt: "Кожна [Concept('location', 'місцевість')|e] в області [target_area.GetName] отримає:\n#G 10%#! контролю\n#G 1#! од. розвитку\n#G 10%#! процвітання"
  boh_prosperity_capital_prov: "Кожна [Concept('location', 'місцевість')|e] в провінції [target_capital.GetName] отримає:\n#G 10%#! процвітання"
  flavor_boh.24.title: "Кодекс Maiestas Carolina"
  flavor_boh.24.desc: "Вже далеко не перше століття [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] користуються майже безмежною владою над своїми володіннями, через що багато хто нерідко наважувався навіть оскаржувати владу корони.\n\nТаке вільнодумство породило вкрай небезпечний прецедент. Багато радників пропонують нам обмежити владу найвидатніших дворян, видавши відповідні статті. Однак у такому випадку ми ризикуємо підірвати рівновагу…"
  flavor_boh.24.a: "Приступимо до складання статей. Ми тут влада!"
  flavor_boh.24.b: "Не будемо турбувати можновладців."
  flavor_boh.25.title: "Майстер з Вишші-Брода"
  flavor_boh.25.desc: "За останні кілька років чималу славу в нашій країні [Select_CString(target_artist.IsFemale, 'здобула художниця', 'здобув художник' )] [target_artist.GetName]. Його численні картини настільки вражають, що ми всерйоз замислюємося над тим, щоб запросити такий талант до свого двору. Такий жест не тільки піднесе нашу культуру в очах інших, а й потішить наш художній смак."
  flavor_boh.25.a: "Одне з найвидатніших імен у нашому живописі!"
  flavor_boh.25.b: "Ці картини явно переоцінені…"
  flavor_boh.26.title: "Корона Святого Вацлава"
  flavor_boh.26.desc: "Нелегкі часи для нашого королівського дому ми перенесли з гідністю, вийшовши з цього горнила лише сильнішими; вороги, розгромлені нами на шляху до влади, тому підтвердження.\n\nЩоб у кожного остаточно відпали сумніви в нашій величі, радники виступили з пропозицією викувати найчудовішу корону і присвятити її Святому Вацлаву. Ця корона, прикрашена золотом і майже сотнею різних дорогоцінних каменів, стане головним символом нашої влади та достатку!"
  flavor_boh.26.a: "Не пошкодуємо своїх коштів на створення такого шедевра!"
  flavor_boh.26.b: "Посвята Святому Вацлаву потребує пожертв…"
  flavor_boh.26.c: "Подібні дрібнички неприпустимо дорогі."
  wear_st_wenceslas_crown_tt: "[target_character.GetName] одягне нову корону"
  flavor_boh.27.title: "Кафедральний собор Святого Віта"
  flavor_boh.27.desc: "#TOOLTIP:BUILDING_TYPE,cathedral,X #L Кафедральний собор#!#! Святого Віта, збудований ще в X столітті, — давнє й прекрасне уособлення нашої могутності та віри. Однак з часом [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] стає лише величнішим, а отже, і посвяти наші божественним покровителям мають бути достатньо грандіозними. Вже складено плани щодо розширення собору — залишається лише найняти робітників, якщо ми все-таки наважимося взятися за це серйозне починання."
  flavor_boh.27.a: "Вкладемо кошти в розширення!"
  flavor_boh.27.b: "Це занадто дорого…"
  flavor_boh.27.historical_info: "Заснований у 930 році богемським князем Вацлавом собор спочатку являв собою ротонду в ранньому романському стилі. Вже пізніше, у 1060 році, князь Спитігнєв II під впливом християнської громади, яка забажала церкву більшого розміру, прибудував до південної апсиди романську базиліку. План собору був складений під враженням від романської архітектури Священної Римської Імперії, зокрема — від церкви абатства в Гільдесгаймі та Шпаєрського собору. У 1344 році, коли в Празі виникла архієпархія, почалося будівництво собору в готичному стилі, що перервалося через Гуситські війни, які вибухнули в наступному столітті. З тих пір протягом наступних століть кілька разів робилися спроби закінчити роботи, проте добудувати собор вдалося тільки в 1844–1929 роках."
  flavor_boh.28.title: "Рідка радість"
  flavor_boh.28.desc: "Жителі [target_location.Custom('LR_GEN')|l] [target_location.GetName] після довгого трудового дня полюбляють випити кухоль-другий освіжаючого #TOOLTIP:GOODS,beer,X #L пива#!#!. Любов до цього напою тут настільки міцна, що багато хто навіть почав варити пиво у себе вдома, і тепер пивоварні працюють повсюдно і в містах, і в селах.\n\nСхоже, що кожна родина варить свій неповторний сорт пива, а де спрага, там і прибуток… Багато видатних [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] просять нас забезпечити постійне виробництво пива, щоб місцеві сорти прославилися повсюди."
  flavor_boh.28.a: "Так тому і бути."
  flavor_boh.28.b: "Ніякого алкоголю! До роботи!"
  flavor_boh.29.title: "Велике починається з малого"
  flavor_boh.29.desc: "Багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] мріють про яскраве життя та високе становище. Ми не проти, щоб народ прагнув успіху, проте немає нічого ганебного в тому, щоб обробляти землю: це чесна та шанована праця.\n\nДеяким, втім, все-таки вдається втілити свою мрію. У [target_capital_location.Custom('LR_PREP')|l] [target_capital_location.GetName] зараз обговорюють нову чутку: нібито в окрузі [Select_CString(target_character.IsFemale, 'з’явилася вправна та доблесна войовниця', 'з’явився вправний та доблесний воїн')] , але обставини [Select_CString(target_character.IsFemale, 'її', 'його')] появи такі, що складно сказати, де правда, а де вигадка.\n\n[target_character.GetName] — [Select_CString(target_character.IsFemale, 'дочка', 'син')] коваля. [Select_CString(target_character.IsFemale, 'Її', 'Його')] рідне село Стршибрна-Скаліце поруч із [target_location.Custom('LR_INST')|l] [target_location.GetName] спалили під час війни. [Select_CString(target_character.IsFemale, 'Вона була змушена', 'Він був змушений')] з юних літ взятися за меч. Навчившись військового мистецтва та промінявши мирне життя на битви й подвиги, [Select_CString(target_character.IsFemale, 'вона вирушила', 'він вирушив')] мандрувати. І ось, тепер [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'прийшла', 'прийшов')] до нас."
  flavor_boh.29.a: "З [Select_CString(target_character.IsFemale, 'неї', 'нього')] вийде чудовий командир!"
  flavor_boh.29.b: "[Select_CString(target_character.IsFemale, 'Їй', 'Йому')] не варто було забувати своє місце."
  flavor_boh.30.title: "У [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] знайдено срібло"
  flavor_boh.30.desc: "Нам повідомили, що селяни з [target_location.Custom('LR_GEN')|l] [target_location.GetName] виявили найчистіші поклади #TOOLTIP:GOODS,silver,X #L срібла#!#!. Місцевість виявилася вкрай вдалою: поклади готові до розробки і, за нашими оцінками, запаси дорогоцінного металу тут вельми великі.\n\nВідкривши тут рудник, ми не тільки збільшимо добробут місцевих жителів, а й залучимо нових поселенців, які бажають заробити на видобутку срібла."
  flavor_boh.30.a: "Добре. Вкладемо кошти у видобуток."
  flavor_boh.30.b: "Ні. Розподілимо все, що можна добути без зусиль, і не будемо порушувати усталений порядок."
  flavor_boh.31.title: "Корона [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_boh.31.desc: "[target_art.GetName] на голові, а #TOOLTIP:AREA,bohemia_area,X #L Богемія#!#!, #TOOLTIP:AREA,moravia_area,X #L Моравія#!#! та #TOOLTIP:AREA,silesia_area,X #L Сілезія#!#! в руках: [ROOT.GetCountry.GetLongName] — [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName|l] з числа найсильніших у Європі, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — далеко не найслабший гравець. Радники піднесли нам ідею: у нас є [target_art.GetNameWithNoTooltip|l], а отже, розумно було б додати це слово до назви [ROOT.GetCountry.Custom('longname_ru_wntt_GEN')]."
  flavor_boh.31.a: "Відтепер ми — Корона [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_boh.31.b: "Нас і так все влаштовує."
  crown_of_bohemia_tt: "Наша країна називатиметься #Y Корона [GetCountry('BOH').Custom('CL_GEN')]#!"
  flavor_boh.32.title: "Доля [GetCountry('LUX').Custom('CL_GEN')]"
  flavor_boh.32.desc: "Герцогства, якими править [target_character.GetName] — не тільки як [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, а й як [GetCountry('LUX').GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[GetCountry('LUX').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LUX').Custom('CL_tt')],X [GetCountry('LUX').Custom('CL_GEN')|L]#!#! — нещодавно стали значно більшими після того, як [Select_CString(target_character.IsFemale, 'її', 'його' )] обрали [Select_CString(target_character.IsFemale, 'імператрицею', 'імператором' )] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Це значно ускладнює бюрократію, зокрема щодо титулів. Однак вихід є. [GetCountry('LUX').GetLongNameWithNoTooltip] — ця країна може відійти іншому правителю, і тоді керувати нею буде [target_heir.GetName|l].\n\nІ хоча [target_character.GetNameWithNoTooltip] у цьому випадку матиме менше турбот при управлінні своїми володіннями, належні [Select_CString(target_character.IsFemale, 'їй', 'йому' )] території стануть меншими (хай навіть керувати ними продовжить династія [target_character.GetDynasty.GetName]). Якщо ж залишити все як є, інші правителі можуть сприйняти нас як загрозу, побачивши, скількома титулами одночасно володіє [target_character.GetShortNameWithNoTooltip]."
  flavor_boh.32.a: "Негайно передати володіння [Select_CString(target_heir.IsFemale, 'новій правительці', 'новому правителю' )]!"
  flavor_boh.32.b: "Ні, це все наше!"
  flavor_boh.33.title: "Продаж [GetCountry('BRA').Custom('longname_ru_wntt_GEN')]"
  flavor_boh.33.desc: "[GetCountry('BRA').GetLongName] — ця країна давно користується в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! чималим впливом, як, втім, і династія [target_bra_ruler.GetDynasty.GetName]. Крім того, [target_ruler.GetName] — [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], тому нам слід домогтися, щоб нас призначили виборцями: такий чин виявиться винятково корисним. [ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.Custom('CL_GEN')] — хороший титул, однак володіння [GetCountry('BRA').Custom('CL_INST')] не тільки дозволить нам стати виборцями, а й обмежить вплив династії [target_bra_ruler.GetDynasty.GetNameWithNoTooltip].\n\nЦей рід безнадійно сп'янілий жадібністю та прагненням до влади, тому ми могли б запропонувати їм перекупити володіння [GetCountry('BRA').Custom('CL_INST')] (власником, відповідно, стане [target_character.GetName]) і подивитися, скільки вони за нього запросять."
  flavor_boh.33.a: "Зробимо їм таку пропозицію."
  flavor_boh.33.b: "Знайдуться й корисніші витрати."
  flavor_boh.33.tt: "[GetCountry('BRA').GetLongName] — ця країна отримає від нас пропозицію про купівлю"
  flavor_boh.33.historical_info: "У 1373 році король Богемії та імператор Священної Римської Імперії Карл IV придбав для свого сина та спадкоємця Вацлава IV Бранденбурзьку марку. Правив нею, однак, сам Карл, оскільки Вацлав був ще занадто юний. Завдяки цій покупці імператор заразом заручився ще одним голосом курфюрста. Згодом, однак, вплив династії Люксембургів ослаб, тому, коли ще одному синові Карла — Сигізмунду — прийшла черга обиратися на посаду імператора, голоси виборців він придбав, передавши спадкові права на Бранденбург династії Гогенцоллернів."
  flavor_boh.34.title: "[GetCountry('BOH').GetLongNameWithNoTooltip] — потенційний покупець [ROOT.GetCountry.Custom('rank_ru_GEN')|l]"
  flavor_boh.34.desc: "[GetCountry('BOH').GetLongName] — ця країна поводиться надзвичайно сміливо, адже її володар після недавніх виборів ще й імператор #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Тепер вони намагаються взяти вибори у свої руки і навіть висунули сміливу пропозицію продати їм нашу країну, правити якою в такому разі стане [target_character.GetName].\n\nІ хоча династія [target_bra_ruler.GetDynasty.GetName] після цього втратить значну частку свого впливу, гроші за продаж можуть піти на розвиток решти земель. Крім того, влада роду [target_bra_ruler.GetDynasty.GetName] та захист з боку [GetCountry('BOH').Custom('CL_GEN')] можуть виявитися кращими за існуючий порядок."
  flavor_boh.34.a: "Виставимо їм ціну."
  flavor_boh.34.b: "Ми не продаємося!"
  flavor_boh.34.tt: "[GetCountry('BOH').GetLongName] — ця країна отримає від нас пропозицію ціни"
  flavor_boh.35.title: "Відповідь [GetCountry('BRA').Custom('longname_ru_wntt_GEN')]"
  flavor_boh.35.desc_no_heir: "$flavor_boh.35.desc$\n\nОднак прийняти цю пропозицію у нас нікому, оскільки [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] відсутній."
  flavor_boh.35.desc: "[GetCountry('BRA').GetLongName] — влада цієї країни надсилає відповідь, вказавши в ній суму, яку вважає допустимим відшкодуванням за продаж частини своєї території та воцаріння іншого правителя, адже тоді [GetCountry('BRA').GetGovernment.GetRulerTitle|l] позбудеться свого престолу, а сидіти на ньому буде [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] нашої країни."
  flavor_boh.35.a: "Це прийнятно."
  flavor_boh.35.b: "На жаль, це неприйнятно."
  flavor_boh.36.title: "Чотири статті [ROOT.GetCountry.GetCapital.Custom('CL_GEN')]"
  flavor_boh.36.desc: "Останні кілька років минули в безупинній боротьбі за нашу віру. Рахунок нашим загиблим праведникам іде на тисячі, а народ, колись лагідний і покірний, обернувся на несамовитість і тепер готовий воювати проти всіх підряд. Але ось нарешті настав хиткий мир. Ми збираємо поранених, готуємося святкувати перемогу та вшановувати вбитих, однак головне — ми сіли за стіл переговорів з тими, хто відкрито прагнув знищити нашу релігію.\n\nМожливо, сам Господь дав нам сили кинути виклик #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькій#!#! церкві, що загрузла у своїй гордині та інших гріхах. Тепер же необхідно вирішити, чи висунути цим негідникам наші вимоги, чи відхилити їхні благання про перемир'я та продовжити похід проти розкладу католицьких звичаїв."
  flavor_boh.36.a: "Може, настав час для миру?"
  enable_4_articles_prague_reform: "Відкриває [Concept('government_reform', 'державний принцип')|e] «[ShowGovernmentReformName('four_articles')]»"
  flavor_boh.36.b: "Досить розмов!"
  STATIC_MODIFIER_NAME_bohemian_aggression_modifier: "Богемська агресія"
  STATIC_MODIFIER_DESC_bohemian_aggression_modifier: "Ворог, не зумівши викорінити нашу віру, запросив миру. Однак тепер за зброю візьмемося вже ми і знищимо їх раз і назавжди!"
  opinion_hussite_aggression_modifier: "Відхилили чотири статті"
  boh_widespread_condemnation_tt: "Кожна #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! країна отримає [ShowBiasValue('opinion_hussite_aggression_modifier')|+=0] до думки про нас"
  four_articles: "Чотири статті"
  four_articles_desc: "Це вимоги, які наші державні та релігійні діячі висунули ворогам — учасникам хрестових походів, оголошених папою в жалюгідній спробі придушити наші вірування."
  flavor_boh.36.historical_info: "Чотири празькі статті (вони ж просто чотири статті) — список вимог, висунутих у XV столітті на Ферраро-Флорентійському соборі послідовниками богемського реформатора на ім'я [GetCharacter('boh_jan_hus').GetName]. Зіграли важливу роль в історії руху гуситів — провісників протестантської Реформації. Серед заявлених вимог були свобода проповідування слова Божого і причастя, реформа церкви як інституту та вигнання з її рядів грішників."
  flavor_boh.37.title: "Братське єднання"
  flavor_boh.37.desc: "За останні роки #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситських#!#! богослужінь наша віра розрослася, немов молоді пагони, і тепер плоди її рясно проростають у кожному куточку нашої країни. Парафіяни приходять помолитися, взяти участь у церковних обрядах та очистити душу, заплямовану вченням заблудлих єретиків.\n\nОднак подібна побожність обернулася тривожним чином: все частіше наші #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священники#!#! починають тлумачити гуситське вчення наймаксималістськішим чином: вони проповідують про неприпустимість становлення знаті та купців священнослужителями, а також стверджують, що обряди богослужіння повинні бути простими та скромними, відкидаючи при цьому апостольське наступництво."
  flavor_boh.37.a: "Нехай проповідують — у їхніх словах є істина."
  flavor_boh.37.b: "Не можна, щоб наш народ прислухався до них."
  unity_brethren_privilege: "Братське єднання"
  unity_brethren_privilege_desc: "Радикальний #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситський#!#! рух. Його послідовники закликають до скромності та простоти під час церковних обрядів, наприклад причастя, підтримують використання рідної мови як літургійної та вважають, що [ShowEstateTypeName('burghers_estate')|l] і [ShowEstateTypeName('nobles_estate')|l] не повинні брати участь у релігійній діяльності."
  jan_hus_executed_boh: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] страчений"
  jan_hus_executed_pap: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] страчений"
  jan_hus_free_boh: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] звільнений"
  jan_hus_free_pap: "[GetCharacter('boh_jan_hus').GetNameWithNoTooltip] звільнений"
  flavor_boh.38.title: "Возз'єднання Праги"
  flavor_boh.38.desc: "#TOOLTIP:LOCATION,prague,X #L Прага#!#! вже не перше століття носить звання #L [ROOT.GetCountry.GetAdjective|l]ої#! столиці — і робить це із заслуженою гордістю. Однак у світлі останніх досягнень науки та початку індустріалізації стало очевидно, що інфраструктура цієї [target_location.Custom('LR_GEN')|l] занадто застаріла. Щоб столиця могла розвиватися і далі на радість своїм жителям, всі місцевості [target_location.Custom('LR_GEN')|l] слід об'єднати та скласти єдиний інфраструктурний план, без якого розширення Праги буде неможливим."
  flavor_boh.38.a: "Потрібно виділити гроші на оновлення Праги."
  flavor_boh.38.b: "Це занадто дорого."
  flavor_boh.38.historical_info: "У 1784 році чотири історичні місцевості Праги — Старе-Місто, Нове-Місто, Мала-Страна та Градчани — були об'єднані в один, після чого перестали вважатися самостійними містами."
  flavor_boh.39.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]е співдружність"
  flavor_boh.39.desc: "На очах нашого роду #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдалося пройти шлях від малозначущої країни до великої держави імперського розряду, яка посідає далеко не останнє місце у світовій політиці, а також править великими землями та численними народами. Однак завдання це непросте — для його виконання потрібна тверда рука. Влада [ROOT.GetCountry.Custom('rank_ru_GEN')|l] побоюється зростання сепаратизму та напруги серед жителів, а тому деякі пропонують прийняти нову конституцію, закликаючи залишити [ROOT.GetCountry.Custom('CL_ACC')] у минулому і замість цього встановити повноцінне співдружність. Наша країна, що розташувалася на просторах #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, неодмінно займе належне їй місце серед сильних світу цього."
  flavor_boh.39.a: "Приймемо нову конституцію."
  flavor_boh.39.b: "Залишимо ту, яка є."
  flavor_boh.40.title: "Розширення Кутної Гори"
  flavor_boh.40.desc: "#TOOLTIP:LOCATION,kutna_hora,X #L Кутна Гора#!#! — основа основ #L [ROOT.GetCountry.GetAdjective|l]ого#! багатства: її глибокі #TOOLTIP:GOODS,silver,X #L срібні#!#! рудники живлять нашу економіку. Історичну та економічну важливість Кутної Гори не описати словами, оскільки без неї наша скарбниця б спорожніла, а різні починання — були б просто неможливі. Ми можемо вкласти в розвиток місцевої шахтарської справи додаткові кошти, щоб місто розвивалося й далі, а багатства його стали надбанням і наступних поколінь."
  flavor_boh.40.a: "Вкладемося в розширення."
  flavor_boh.40.b: "У цьому немає сенсу."
  flavor_boh.40.a.tt: "Вкладення в інфраструктуру Кутної Гори знизить ризики обвалів і повеней."
  flavor_boh.41.title: "Затоплення Кутної Гори"
  flavor_boh.41.desc: "#TOOLTIP:GOODS,silver,X #L Срібні#!#! рудники #TOOLTIP:LOCATION,kutna_hora,X #L Кутної Гори#!#! останнім часом усе частіше заливає водою. Затоплення головних рудників, у яких знаходяться найбільші жили, загрожує знищити місцеві шахтарські традиції, що складалися протягом століть. Уряд Кутної Гори попросив нас допомогти їм врятувати з рудників усе, що ще можна врятувати, однак пошуки в обваленій шахті — це і дорого, і небезпечно."
  flavor_boh.41.a: "Ми зробимо все, що зможемо."
  flavor_boh.41.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_boh.41.historical_info: "У XVI–XVII століттях на Кутну Гору обрушилася низка руйнівних повеней. Гірнича промисловість міста постраждала настільки, що так і не змогла відновитися до кінця."
  flavor_boh.42.title: "Загальнослов'янський з'їзд [GetCurrentYear] року"
  flavor_boh.42.desc: "По всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!, немов пожежа, поширюються ідеї націоналізму. Не обійшли вони стороною й представників #TOOLTIP:CULTUREGROUP,slavic_group,X #L слов'янських#!#! народів, які зібралися в #TOOLTIP:LOCATION,prague,X #L Празі#!#!, щоб обговорити взаємодопомогу. Уже зараз стає очевидним зростаючий вплив всеслов'янського руху за взаємодію між слов'янськими народами, а також спільний розвиток народної словесності та звичаїв. Деякі навіть закликають до об'єднання всіх слов'ян під одним прапором. Вельми ймовірно, що в майбутньому цей рух стане серйозною силою."
  flavor_boh.42.a: "Слава роду!"
  flavor_boh.42.historical_info: "Перший загальнослов'янський з'їзд, що відбувся в Празі, став серйозним кроком до просування ідеї єдності між слов'янськими народами. На ньому ж вперше були прийняті синьо-біло-червоний панслов'янський прапор і гімн «Гей, слов'яни!»."
  flavor_boh.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.43.desc: "[Select_CString(target_character.IsFemale, 'Черниця-калікстинка', 'Чернець-калікстинець' )] [target_character.GetName] — [Select_CString(target_character.IsFemale, 'поборниця', 'поборник' )] загальної освіти, [Select_CString(target_character.IsFemale, 'відома', 'відомий' )] під прізвиськом [Select_CString(target_character.IsFemale, '«Народна вчителька»', '«Народний учитель»' )]. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] винахідливі підходи до навчання та спроби перебудувати систему освіти в цілому вже мали чималий вплив на наше суспільство і поступово отримують усе більше визнання. Не варто упускати можливість застосувати такий безцінний досвід на службі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X ROOT.GetCountry.Custom('CL_DAT')|L]#!#!."
  flavor_boh.43.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] напевно знайде користь такому таланту."
  flavor_boh.43.historical_info: "Ян Амос Коменський, він же Коменій, — основоположник сучасної педагогічної системи та прихильник загальної освіти. Розробив передові методи навчання, зробивши акцент на розумінні предмета та критичному мисленні замість механічного заучування."
  flavor_boh.44.title: "Золоте місто Прага"
  flavor_boh.44.desc: "Наша чудова столиця #TOOLTIP:LOCATION,prague,X #L Прага#!#! — найбільше місто #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! — в народі відома під прізвиськом «Золоте місто» і незмінно манить до себе жителів навіть найдальших країв. Сюди з'їжджаються і вчені, і купці, і ремісники, і кожен з них вносить свій неповторний внесок у процвітання столиці. На їхніх талантах і грошах ґрунтуються наші культура та могутність."
  flavor_boh.44.a: "Чудово!"
  STATIC_MODIFIER_NAME_the_golden_city_of_prague: "Золоте місто"
  flavor_boh.44.historical_info: "У роки правління Карла IV процвітаюча столиця Богемії перетворилася на великий політичний, культурний та економічний центр. Оскільки тут засідав сам імператор, Прага де-факто стала столицею і Священної Римської Імперії, що посприяло стрімкому розвитку міста. За Карла були побудовані такі відомі пам'ятки, як Карлів міст, Нове-Место та собор Святого Віта."
  flavor_boh.45.title: "Відкриття рукопису Войнича"
  flavor_boh.45.desc: "Ректор Карлового університету в #TOOLTIP:LOCATION,prague,X #L Празі#!#! під час вивчення архівів виявив вкрай незвичайний рукопис, написаний невідомою мовою та доповнений загадковими малюнками. Сам кодекс присвячений цілій безлічі предметів — від астрології до рецептів, однак розгадати написане не в силах жоден вчений. Навколо рукопису точаться запеклі суперечки: хтось пропонує зберегти її для подальшого вивчення, а інші побоюються, що в архіви якимось чином потрапив гримуар, написаний мовою диявола."
  flavor_boh.45.a: "Збережемо цей незвичайний твір."
  flavor_boh.45.b: "Спалити його — воно богопротивне!"
  voynich_manuscript: "Рукопис Войнича"
  flavor_boh.45.historical_info: "Рукопис Войнича — загадковий ілюстрований середньовічний кодекс, написаний невідомою мовою з нерозшифрованою писемністю. Його призначення та походження не розкриті й досі."
  flavor_boh.46.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.46.desc: "[target_character.GetName] — важливий представник #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситського#!#! руху — служить архієпископом #TOOLTIP:LOCATION,prague,X #L Праги#!#!. І хоча навколо розгортаються палкі релігійні конфлікти, [Select_CString(target_character.IsFemale, 'її', 'його' )] прихильність до справи гуситів та спроби примирити між собою помірковану та радикальну течії не залишилися непоміченими на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [target_character.GetLastNameWithNoTooltip] чудово розуміється на богослов'ї та вміє вести релігійні диспути, а тому ніхто інший не впорається з поширенням нашої віри краще [Select_CString(target_character.IsFemale, 'неї', 'нього' )]."
  flavor_boh.46.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_boh.46.historical_info: "Ян Рокицана — один із найважливіших діячів гуситського руху, досвідчений керівник і богослов, який мав чималий вплив на релігійні та політичні реформи в землях Богемської корони. Поширював ідеї гуситів і прагнув об'єднати конкуруючі течії, значно вплинувши тим самим на релігійну обстановку в королівстві."
  flavor_boh.47.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.47.desc: "[target_character.GetName] — гучне ім'я в #TOOLTIP:DIALECT,czech_dialect,X #L чеській#!#! літературі: видавець, [Select_CString(target_character.IsFemale, 'друкарка', 'друкар' )] та [Select_CString(target_character.IsFemale, 'перекладачка', 'перекладач' )]. Завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] внеску в розвиток чеської мови та прагненню зробити книги доступними для народу в нашій країні зростає рівень грамотності. Разом із цим зростає й вплив, яким користується [target_character.GetName], тому [Select_CString(target_character.IsFemale, 'її', 'його' )] знання слід поставити на службу [ROOT.GetCountry.Custom('rank_ru_DAT')|l] — така можливість у нас є."
  flavor_boh.47.a: "Не можна, щоб таке вміння пропадало даремно."
  flavor_boh.47.historical_info: "Їржі Мелантріх з Авентина — чеський друкар і видавець, який зробив значний внесок у культурний та інтелектуальний розвиток Богемії. Завдяки випуску та розповсюдженню літературних і наукових праць допоміг не тільки зберегти, а й розвинути чеську мову та літературу, посприявши піднесенню чеської культури загалом."
  STATIC_MODIFIER_NAME_melantrichs_efforts: "Старання Мелантріха"
  flavor_boh.48.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.48.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'одна', 'один' )] з найвидатніших архітекторів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, які працюють у стилі бароко. Кожному відомі такі знамениті [Select_CString(target_character.IsFemale, 'її', 'його' )] шедеври, як церква Святого Миколая в #TOOLTIP:LOCATION,prague,X #L Празі#!#! або Бржевновський монастир. При роботі [target_character.GetLastNameWithNoTooltip] постійно винаходить щось нове та проявляє ретельну увагу до деталей, за що користується великою повагою. Кількість споруд, до яких [Select_CString(target_character.IsFemale, 'вона доклала', 'він доклав' )] руку, вже перевалила за сорок. Напевно [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] зрадіє, якщо ця людина отримає придворну посаду."
  flavor_boh.48.a: "Ми вельми цінуємо [Select_CString(target_character.IsFemale, 'її', 'його' )] праці."
  flavor_boh.48.historical_info: "Архітектурні роботи Дінценгофера в стилі бароко, такі як церква Святого Іоанна Непомука або Празька Лорета, полюбилися не тільки його сучасникам, а й нащадкам. Властиві архітектору новаторство та увага до деталей стали ключовим фактором в історії архітектури та культури королівства."
  flavor_boh.49.title: "[target_character.GetNameWithNoTooltip]"
  flavor_boh.49.desc: "[Select_CString(target_character.IsFemale, 'Знаменита', 'Знаменитий' )] мовознавець та історик [target_character.GetName] — [Select_CString(target_character.IsFemale, 'одна', 'один' )] з найважливіших діячів чеського національного відродження, [Select_CString(target_character.IsFemale, 'яка надихалася', 'який надихався' )] ідеями #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#! та уявленнями про національні країни, що тільки почали складатися. [target_character.GetLastNameWithNoTooltip] гаряче закликає інших зберігати та відроджувати чеську мову, культуру та самосвідомість.\n\n[Select_CString(target_character.IsFemale, 'Її', 'Його' )] наукові праці та відданість справі підтримки культурного надбання викликають непідробну гордість та почуття єдності в чеського народу. У чехів починає прокидатися масове усвідомлення, яке напевно визначить майбутнє всієї країни."
  flavor_boh.49.a: "Ми підтримаємо [Select_CString(target_character.IsFemale, 'її', 'його' )] старання!"
  flavor_boh.49.b: "Підтримавши [Select_CString(target_character.IsFemale, 'її', 'його' )], ми розізлимо меншини."
  flavor_boh.49.historical_info: "Йосеф Добровський — одна з найважливіших фігур чеського національного відродження. Виступав за збереження та розвиток чеської мови та культури, чим допоміг пробудити в народі почуття гордості та національної самосвідомості. Під впливом його наукових праць та старань підтримати культурну спадщину народу складалася чеська національна самосвідомість тієї епохи."
  flavor_boh.50.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий кристал"
  flavor_boh.50.desc: "Вже не перше століття майже всі склодуви користуються виключно #L [GetCountry('VEN').GetAdjective|l]им#!#TOOLTIP:GOODS,glass,X #L склом#!#!, а цехи поменше намагаються повторити успіхи майстрів з острова Мурано. На території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! скло виробляють ще з XII століття, проте лише сьогодні, коли стало можливо поєднувати видобуту в нас крейду з поташем, [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і склодуви нарешті виявилися здатні кинути виклик своїм [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]им суперникам.\n\nНовий різновид [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого кришталю міцніший та яскравіший, ніж [GetCountry('VEN').GetAdjectiveWithNoTooltip|l]ий кришталь, а головне — він помітно відрізняється зовні. [ROOT.GetCountry.GetAdjectiveWithNoTooltip]і кришталеві люстри, скляні прикраси та гравіювання по склу все частіше починають зустрічатися при дворах #TOOLTIP:CONTINENT,europe,X #L Європи#!#!."
  flavor_boh.50.a: "Все кришталево ясно."
  flavor_boh.50.a.tt: "[Concept('prosperity', 'Процвітання')|e] кожної належної нам [Concept('location', 'місцевості')|e] з #TOOLTIP:BUILDING_TYPE,market_village,X #L торговим селом#!#! або #TOOLTIP:BUILDING_TYPE,glassworks,X #L скляною фабрикою#!#! збільшується на #G 20%#!."
  flavor_boh.51.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]і традиції пивоваріння"
  flavor_boh.51.desc: "#TOOLTIP:GOODS,beer,X #L Пиво#!#! — давня та невід'ємна частина нашої культури. Поласувати цим рідким золотом, яке по праву вважається народним #TOOLTIP:CULTURE,$czech_tt$,X #L чеським#!#! напоєм, люблять усі: королі в розкішних замках, знать у величних садибах, простий простолюд у скромних хатах… До становлення цього звичаю доклали руку й монастирі: протягом довгих століть вони вдосконалювали свої методи пивоваріння, тому монастирське пиво — одне з найсмачніших на території [ROOT.GetCountry.Custom('rank_ru_GEN')|l].\n\nІсторія чеського пива налічує не одну сотню років. Кожне покоління доопрацьовує рецепти, що дісталися їм від предків, і потім передає їх нащадкам. Ця традиція не тільки об'єднує наш народ, а й допомагає наповнювати казну."
  flavor_boh.51.a: "Na zdraví!"
  flavor_boh.51.a.tt: "Кожна належна нам [Concept('location', 'місцевість')|e] з #TOOLTIP:BUILDING_TYPE,brewery,X #L пивоварнею#!#!, #TOOLTIP:BUILDING_TYPE,beer_workshop,X #L пивоварною майстернею#!#!, #TOOLTIP:BUILDING_TYPE,brewery_manufactory,X #L великим пивзаводом#!#! або #TOOLTIP:BUILDING_TYPE,brewery_mill,X #L пивоварним заводом#!#! отримує [ShowNamedValue('prosperity_severe_bonus')|+=2%] до [Concept('prosperity', 'процвітання')|e]"
  flavor_boh.52.title: "Болотне чудовисько з Візовіце"
  flavor_boh.52.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] отримує тривожні донесення з області поблизу #TOOLTIP:LOCATION,vizovice,X #L Візовіце#!#!. Серед місцевих жителів стрімко, як пожежа, розноситься моторошна чутка: на болотах оселилося жахливе чудовисько, яке викрадає та пожирає безпорадних селян. Народ настільки заляканий, що про порядок у селі довелося забути. Деякі радники пропонують відправити туди військо з наказом спіймати чудовисько та покласти край зловмисним чуткам, проте інші впевнені, що це просто народні байки і [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] не повинні витрачати гроші та час на подібні дрібниці."
  flavor_boh.52.a: "Відправимо загін і з'ясуємо, що відбувається."
  flavor_boh.52.b: "Не можна бути такими забобонними…"