l_russian:
  flavor_pol.1.title: "Флот Речі Посполитої"
  flavor_pol.1.desc: "Постійні зіткнення із суперниками та ворогами з усієї #TOOLTIP:CONTINENT,europe,X #L Європи#!#! не залишають сумнівів: щоб зберегти незалежність країни та дати гідну відсіч будь-кому, хто збирається підкорити наш народ, потрібен повноцінний флот під #L [ROOT.GetCountry.GetAdjective|l]им#! командуванням. Втім, зайнятися цим питанням як слід поки неможливо, оскільки впливова [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] нашої країни не горить бажанням вкладати свої кошти в подібне починання — воно вимагає воістину величезних витрат. На щастя, деякі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] на нашому боці: представник цього стану на ім'я [target_character.GetName] [Select_CString(target_character.IsFemale,'погодилася', 'погодився')] фінансово підтримати будівництво нових кораблів."
  flavor_pol.1.a: "У цій пропозиції є сенс."
  flavor_pol.1.b: "У нас є важливіші справи!"
  flavor_pol.2.title: "[ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] і колона"
  flavor_pol.2.desc: "У #TOOLTIP:LOCATION,warsaw,X #L Варшаві#!#! буде збудовано монументальну колону — таким чином [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] хоче вшанувати пам'ять [Select_CString(ROOT.GetCountry.GetGovernment.GetPreviousRuler.IsFemale,'своєї великої попередниці', 'свого великого попередника')] на ім'я [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName].\n\nЗайнятися будівництвом готові два знамениті #TOOLTIP:CULTUREGROUP,italian_group,X #L італійські#!#! творці: архітектор [constant_tencalla_scope.GetName] та скульптор [clement_molli_scope.GetName]. Ми вважаємо, що впоратися з цим завданням здатні лише вони."
  flavor_pol.2.historical_info: "У 1643–1644 роках за наказом польського короля Владислава IV Вази у Варшаві було збудовано колону Сигізмунда, присвячену батькові та попереднику Владислава — королю Сигізмунду III. Колону коринфського ордера заввишки 8,5 метрів, цілком витесану з червоного мармуру, спроєктували та спорудили два італійці — архітектор Костантіно Тенкалла та скульптор Клементе Моллі. Нагорі колони, прикрашеної чотирма орлами, розміщено статую самого короля Сигізмунда III Вази заввишки 2,75 метра, одягненого в лати. В одній руці він тримає хрест, в іншій — меч."
  flavor_pol.2.a: "Наймемо робітників і розпочнемо будівництво."
  flavor_pol.2.b: "Якщо подумати, [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetShortNameWithNoTooltip] обійдеться без монумента."
  flavor_pol.3.title: "Merkuriusz Polski Ordynaryjny"
  flavor_pol.3.desc: "Європою стрімко поширюються друковані видання, що називаються газетами. Чим гірша [ROOT.GetCountry.GetLongName]? Нам час випускати власні газети.\n\nЩоб видання нашої країни користувалися успіхом і добрим ім'ям, а також були вірні короні, очолити це починання має королівський секретар і дипломат [hieronymus_pinocci_scope.GetNameWithNoTooltip]. Якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName] дасть на це своє благословення, влада [ROOT.GetCountry.Custom('CL_GEN')] зможе своєчасно повідомляти новини кожному своєму підданому."
  flavor_pol.3.historical_info: "Перша щотижнева польська газета #italic Merkuriusz Polski Ordynaryjny#! («Меркурій польський»), що висвітлювала сучасну політику, взаємини європейських династій та війни монархів, видавалася коштом королеви Марії Луїзи Гонзаги та короля Яна II Казимира. Вона виступала за проведення політичних реформ та зміцнення королівської влади. Завідував газетою головний редактор Ієронім Піноччі; випускалася ж вона друкарським домом Яна Горчина."
  flavor_pol.3.a: "Підтримаємо випуск газети."
  flavor_pol.3.b: "Дамо дозвіл."
  flavor_pol.3.c: "[hieronymus_pinocci_scope.GetNameWithNoTooltip] принесе більше користі при дворі."
  flavor_pol.3.d: "Заборонимо газету."
  flavor_pol.4.title: "Університет у Вільно"
  flavor_pol.4.desc: "#TOOLTIP:CULTUREGROUP,lithuanian_group,X #L Литовська#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] більше не може миритися з тим, наскільки зневажливо [ROOT.GetCountry.GetFlavorRank|l], де вони живуть, ставиться до вищої освіти: якість її залишає бажати кращого навіть у провідних містах країни. Вони попросили єзуїтів звести новий #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!#! в одному з міст — це буде або #TOOLTIP:LOCATION,vilnius,X #L Вільно#!#!, або #TOOLTIP:LOCATION,kaunas,X #L Ковно#!#!.\n\nНам випала чудова нагода вплинути на цей регіон. Можна надіслати листа єпископу міста #TOOLTIP:LOCATION,vilnius,X #L Вільно#!#! та переконати його прийняти нашу точку зору."
  flavor_pol.4.historical_info: "У 1569 році єпископ віленський Валеріан Протасевич придбав кілька будівель у центрі міста та заснував вищу школу, де викладалися вільні мистецтва, філософія та богослов'я. Через рік у школі відкрилася бібліотека, яка прийняла в дар 2500 книг від короля Сигізмунда II Августа. Того ж року було зараховано перших учнів. 1 квітня 1579 року король польський та великий князь литовський Стефан Баторій перетворив навчальний заклад на академію, наділивши її рівними правами з Краківською академією."
  flavor_pol.4.a: "Дозволимо єзуїтам самим зробити вибір."
  flavor_pol.4.b: "Перешкодимо єзуїтам і надамо кошти на відкриття університету у Вільно."
  flavor_pol.4.c: "Перешкодимо єзуїтам і надамо кошти на відкриття університету в Каунасі."
  flavor_pol.4.d: "Покладемо край впливу єзуїтів і не дамо відкрити університет."
  flavor_pol.5.title: "Ян Брожек"
  flavor_pol.5.desc: "[john_brozek_scope.GetName], ректор Краківської академії, — людина неймовірних знань і настільки видатний вчений, що ним цікавиться безпосередньо [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName]. У світі науки він прославився не лише своїми вражаючими дослідженнями, а й захистом Миколая Коперника.\n\n[ROOT.GetCountry.GetFlavorRank] безперечно потребує таких діячів — у складі ради він зможе принести чимало користі."
  flavor_pol.5.historical_info: "Ян Брожек — польський математик, астроном, фізик, поет, письменник, музикант і ректор Краківської академії. Займався теорією чисел та геометрією — зокрема, довів, що шестикутна форма бджолиних стільників найвигідніша з точки зору витрат воску та зручності зберігання меду. Брожек був відданим прихильником Миколая Коперника, розвивав його теорії і навіть склав біографію астронома. Корпус Ягеллонського університету Collegium Broscianum названий саме на честь Брожека."
  flavor_pol.5.a: "Наймемо його як радника."
  flavor_pol.5.b: "Не будемо звертати на нього уваги."
  flavor_pol.6.title: "[ROOT.GetCountry.GetNameWithNoTooltip] і потреба в нареченому"
  flavor_pol.6.desc: "[ROOT.GetCountry.GetLongName] — ця країна переживає важкі часи. Численні біди, що спіткали її в останні десятиліття, призвели до того, що на троні сидить [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] жіночої статі — [new_ruler.GetName]. Гостро стоїть питання про майбутнього чоловіка правительки. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] дозволять їй вийти заміж лише за того, хто заслужить їхнє схвалення.\n\nОднак це ще не все: [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] наполягають, щоб їхнє право обирати собі наступного правителя було офіційно закріплене в законодавстві."
  flavor_pol.6.a: "Укладемо шлюб з нареченим з [lithuania_groom_country.Custom('CL_GEN')]."
  flavor_pol.6.b: "Укладемо шлюб з нареченим з [first_groom_country.Custom('CL_GEN')]."
  flavor_pol.6.c: "Укладемо шлюб з нареченим з [second_groom_country.Custom('CL_GEN')]."
  flavor_pol.6.d: "Укладемо шлюб з нареченим з [third_groom_country.Custom('CL_GEN')]."
  flavor_pol.6.e: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не мають права втручатися."
  flavor_pol.7.title: "[GetCountry('POL').GetGovernment.GetRulerTitle] [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ого народу в шлюбі"
  flavor_pol.7.desc: "[GetCountry('POL').GetLongName] пережива[GetCountry('POL').Custom('endlong_etyut')] важкі часи. Численні біди, що спіткали цю країну в останні десятиліття, призвели до того, що [GetCountry('POL').GetGovernment.GetRulerTitle|l] зараз — жінка. [pol_queen_scope.GetName] поки не заміжня, що відкриває нам чималі можливості: якщо [new_ruler.GetName] за допомогою наших дипломатів укладе з нею шлюб, [ROOT.GetCountry.GetName] та [GetCountry('POL').GetAdjectiveWithNoTooltip|l]ий престол утворять міцний союз."
  flavor_pol.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_pol.8.title: "Пйотрковський статут"
  flavor_pol.8.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] просять нас законодавчо закріпити їхні привілеї, стверджуючи, що це необхідно для підтримання громадського порядку та підвищення обороноздатності [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Пропонований ними #TOOLTIP:ESTATE_PRIVILEGE,statutes_of_piotrkow,X #L Пйотрковський статут#!#! обмежить владу містян, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] виявляться прив'язаними до землі без можливості її покинути, якщо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] не розпорядяться інакше. Ці статути безумовно посилять вплив знаті та з великою ймовірністю знищать залишки авторитету центральної влади."
  flavor_pol.8.a: "Скріпивши серце, ми погодимося."
  flavor_pol.8.b: "Хто такі ці [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], щоб їм потурати?!"
  flavor_pol.8.historical_info: "Зійшовши на престол, король Ян I Ольбрахт, син Казимира IV, продовжив розпочату батьком політику поступок шляхті. У 1496 році було прийнято Пйотрковський статут, що законодавчо посилював закріпачення селян. Так, з кожного села за рік міг виїхати лише один селянин. Згодом статут було доповнено положенням, що встановлювало щотижневу шестиденну трудову повинність. Польські селяни позбулися не лише будь-якого впливу, а й свободи. Вся влада опинилася в руках шляхти."
  flavor_pol.9.title: "Нешавські статути"
  flavor_pol.9.desc: "Попри те, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже отримали чимало привілеїв, [target_character.GetName] знову [Select_CString(target_character.IsFemale, 'змушена', 'змушений' )] торгуватися з ними. Цього разу [Select_CString(target_character.IsFemale, 'їй', 'йому' )] потрібні кошти для збору військ, зокрема найманців. Натомість [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'повинна', 'повинен' )] прийняти так звані Нешавські статути, згідно з якими [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] отримують право засновувати #italic сеймики#! — місцеві збори, без яких неможливо набирати війська та встановлювати податки. Таким чином у розпорядженні знаті опинився дієвий інструмент, заснований на взаємних інтересах, а також військові та податкові законодавчі повноваження."
  flavor_pol.9.a: "Приймемо привілеї."
  flavor_pol.9.b: "Ми не будемо це підписувати: [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] хочуть занадто багато!"
  flavor_pol.10.title: "Король єзуїтів"
  flavor_pol.10.desc: "[ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName] запам'ятається своїм підданим як монарх, за якого країну охопила чума #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#!. [Select_CString(ROOT.GetCountry.GetGovernment.GetPreviousRuler.IsFemale,'Її', 'Його')] політика віротерпимості та нерозбірливість у питаннях богослов'я призвела до того, що #TOOLTIP:CULTURE,$polish_tt$,X #L польський#!#! народ почав впадати в єресь. Лише непохитний орден єзуїтів здатен знову наставити заблудлу паству на шлях істинний.\n\nНам слід виділити єзуїтам необхідні кошти та ресурси, щоб ті припинили єресь, що безчинствує."
  flavor_pol.10.historical_info: "Батьком Сигізмунда III був шведський король Юхан III — людина, що володарювала над протестантською країною, але при цьому відчувала симпатію до католицизму. Сигізмунд же виріс серед єзуїтів і віддавав перевагу саме їхньому товариству. Релігія мала для нього не менше значення, ніж політика, і встановлення католицизму як державної релігії Польщі стало для Сигізмунда однією з найважливіших справ життя. Не буде перебільшенням назвати це завдання непосильним навіть для короля, оскільки свобода віросповідання та терпимість до інших релігій тоді були основами польського укладу. Сигізмунд, втім, був упертою та наполегливою людиною, тому не став відступатися від задуманого. Однак задум його провалився: король налаштував проти себе всю країну і нажив безліч ворогів, що в першому десятилітті XVII століття завадило йому провести реформи в уряді та зміцнити владу."
  flavor_pol.10.a: "Хай живе король єзуїтів!"
  flavor_pol.10.b: "Католицька віра — перша серед рівних."
  flavor_pol.10.c: "Ні. Польський народ вільний і терпимий."
  opinion_pol_true_faith: "Істинна польська віра"
  opinion_pol_religious_freedom: "Релігійна свобода в Польщі"
  flavor_pol.11.title: "Pacta conventa та Генрикові артикули"
  flavor_pol.11.desc: "Щойно [new_ruler_scope.GetName] [Select_CString(new_ruler_scope.IsFemale,'встигла', 'встиг')] зійти на престол, як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже накинулися на [Select_CString(new_ruler_scope.IsFemale,'неї', 'нього')] з вимогами дарувати їм широкі привілеї, що гарантують недоторканність перед центральною владою. Вплив цього стану настільки великий, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] навряд чи зможе вирішити справу миром — доведеться піти на найрішучіші дії."
  flavor_pol.11.historical_info: "У 1572 році обірвалася династія Ягеллонів. Королем Польщі був обраний французький король Генріх Валуа, змушений відразу після обрання підписати так звані Генрикові артикули — документи, що встановили в Польщі виборну монархію. Крім того, Генріх також підписав pacta conventa — офіційний договір між обраним монархом і сеймом. На практиці це означало, що монарх позбавлявся всієї влади над країною — у нього навіть не було повноважень наказувати державним службовцям. Королівське військо ж налічувало всього лише 3000 вояків. Щоб прийняти будь-яке рішення, король змушений був щоразу звертатися за дозволом до сейму. Таким чином Польща перетворилася з монархії на шляхетську республіку, а король став правити лише номінально."
  flavor_pol.11.a: "Ми присягаємося."
  flavor_pol.11.b: "Досить цього! До зброї!"
  flavor_pol.12.title: "[new_ruler_scope.GetShortNameWithNoTooltip]: військові реформи"
  flavor_pol.12.desc: "[new_ruler_scope.GetName], [Select_CString(new_ruler_scope.IsFemale,'нова правителька', 'новий правитель')] нашої країни, — людина, підкована у військовій справі: заволодівши престолом, [Select_CString(new_ruler_scope.IsFemale,'вона взялася', 'він взявся')] за реформи наших збройних сил, що давно перебувають у застої.\n\nМи можемо або зайнятися вдосконаленням спільних військ, якими володіють також і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], або послабити вплив цього стану і створити нове, сучасне єдине військо."
  flavor_pol.12.historical_info: "На час сходження в 1674 році на польський престол Ян Собеський встиг прославитися своїми талантами полководця: спочатку він був воєводою і лише потім став королем. Зайнявши престол, він продовжив розпочату ним же реформу польського війська. Перші спроби надати їй сучасного вигляду почалися ще давно, проте лише під керівництвом Його Величності військо польське стало серйозною силою, що увійшла в історію. Так, саме кавалерія Собеського врятувала Відень від турецької облоги, зірвавши наступ османів. На жаль для Речі Посполитої, згодом виявилося, що ця перемога допомогла швидше Австрії, ніж Польщі."
  flavor_pol.12.a: "Проведемо реформу війська."
  flavor_pol.12.b: "Ми проведемо реформу війська, і [ROOT.GetCountry.GetGovernment.GetParliament.GetName] позбудеться частини свого впливу."
  flavor_pol.14.title: "Єзуїтська колегія"
  flavor_pol.14.desc: "Деякі з найпобожніших кардиналів та єпископів #TOOLTIP:LOCATION,olsztyn,X #L Ольштина#!#! турбуються про духовне благополуччя [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Щоб припинити поширення єретичних ідей серед #TOOLTIP:CULTUREGROUP,polish_group,X #L польських#!#!#TOOLTIP:POPTYPE,burghers,X #L містян#!#! та #TOOLTIP:POPTYPE,nobles,X #L аристократів#!#!, вони звернулися за допомогою до єзуїтів. Разом вони розробили задум щодо заснування в Ольштинській єпархії особливого навчального закладу. Його випускники зможуть на рівних протистояти реформаторам у диспутах, а тому їхнім завданням стане повернення відступників у лоно католицтва."
  flavor_pol.14.historical_info: "Єзуїтська колегія, заснована в 1565 році під покровительством кардинала Станіслава Гозія, була одним з найвпливовіших інститутів цього ордену в Речі Посполитій. Розташована в місті Браунсберг, вона служила центром католицької вченості та оплотом контрреформації в Північній Європі. Пропонуючи гуманітарну, філософську та теологічну освіту, вона приваблювала студентів з усієї країни та за її межами. Продумана навчальна програма та жорстка дисципліна в найкращих педагогічних традиціях Товариства Ісуса дозволили їй сформувати покоління священників та інтелектуалів, здатних захистити католицтво в часи бурхливих релігійних заворушень."
  flavor_pol.14.a: "Це принесе нам тільки користь."
  flavor_pol.14.b: "Ми не можемо допустити, щоб єзуїти отримали вплив у нашій країні."
  flavor_pol.15.title: "[ROOT.GetCountry.GetCulture.GetLanguage.GetNameWithNoTooltip|U]а Біблія"
  flavor_pol.15.desc: "Група вчених #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністського#!#! віросповідання щойно завершила переклад Біблії на [ROOT.GetCountry.GetCulture.GetLanguage.GetName|l]у мову. Їхнє творіння називається «[target_art.GetName]». Вони працювали з найстарішими з відомих нам джерел, а тому в якості перекладу немає жодних сумнівів. Однак нас турбує загроза поширення протестантизму серед #TOOLTIP:CULTUREGROUP,polish_group,X #L поляків#!#!: той факт, що деякі наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже перейшли в кальвінізм, загрожує миру та благочестю в наших землях."
  flavor_pol.15.historical_info: "Поява Радзивіллівської Біблії, виданої в 1563 році в Бересті-Литовському за кошти канцлера Миколи Чорного Радзивілла, стала важливою віхою в поширенні ідей реформації в Речі Посполитій. Ця книга, також відома під назвою Берестейська Біблія, являла собою перший повний переклад біблійних текстів з івриту та грецької на польську. Вона втілювала в собі лінгвістичні амбіції та релігійне завзяття кальвіністів. Це була не тільки теологічна праця, а й культурна пам'ятка, що зробила свій внесок у становлення польської літературної мови. Незважаючи на подальші гоніння з боку контрреформації, Берестейська Біблія посіла важливе місце в історії Речі Посполитої як символ релігійного плюралізму та благородного меценатства."
  10_percent_of_pops_in_target_area_become_calvinist_tt: "Приблизно #Y 7%#! наших [Concept('pops', 'груп населення')|e] в місцевості [target_area.GetName] приймуть #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#!"
  flavor_pol.15.b: "Цю книгу слід спалити!"
  flavor_pol.15.a: "Цікаво…"
  flavor_pol.16.title: "Виборна монархія в Польщі"
  flavor_pol.16.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], володарі найширших привілеїв, поступово починають згадувати про старі домагання. Все частіше вони прагнуть відстоювати своє невідчужуване право вибирати, кому саме належатиме [ROOT.GetCountry.GetFlavorRank|l], стверджуючи, що в історії країни вже є такий прецедент. І хоча ці заяви абсурдні, ми не можемо заперечити всерйоз, оскільки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] набувають все більшого впливу, в той час як [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] його втрачають. На жаль, обрання престолонаслідників доведеться передати в руки цих людей — подобається нам це чи ні."
  flavor_pol.16.historical_info: "Крім безлічі інших привілеїв у XIV–XV століттях польське дворянство отримало право обирати правителя країни. Спочатку престол без будь-яких заперечень переходив від одного Ягеллона до іншого, а тому вибори вважалися чистою формальністю. Однак після смерті останнього представника династії Ягеллонів відбулися перші вибори, в яких шляхтичам довелося вибирати між кількома іноземними претендентами благородного походження. За підсумками виборів 1573 року королем Польщі став Генріх Валуа. З того моменту і до розділу Речі Посполитої у XVIII столітті всі монархи обиралися з числа іноземців."
  flavor_pol.16.a: "Ми довіримося сейму!"
  flavor_pol.17.title: "Велика Північна війна"
  flavor_pol.17.desc: "Наші вороги з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! продовжують розширювати володіння і вже впритул підбираються до наших кордонів. Їхній зростаючий вплив на #TOOLTIP:AREA,baltic_area,X #L Балтиці#!#! загрожує не тільки стратегічним інтересам, а й самому існуванню [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Якщо ми нічого не зробимо, вороги можуть вторгнутися в наші споконвічні землі. Ми повинні взяти ініціативу в свої руки! Зберіть війська і нагадайте північанам, що наш народ не схиляється перед ними!"
  flavor_pol.17.a: "На війну!"
  opinion_polish_aggressions: "Польська агресія"
  flavor_pol.17.b: "Поки ще не час…"
  flavor_pol.17.historical_info: "У 1697 році на шведський престол зійшов п'ятнадцятирічний Карл XII. Побачивши в цьому сприятливу можливість, російський цар Петро I у 1699 році уклав проти Швеції союз з Данією та Польщею, що перебувала в унії з Саксонією. Однак Карл XII виявився серйозним противником: за допомогою Англії та Голландії він висадився в Зеландії, де швидко здолав данські війська. Після цього він рушив на Естляндію, де, вп'ятеро поступаючись противнику в чисельності, завдав нищівної поразки російському війську. Але замість того, щоб добити розгромлене військо, король виступив проти курфюрста Саксонії Августа II, у 1704 році вигнавши того з Польщі. Звільнений польський престол зайняв Станіслав Лещинський, прихильно налаштований до Швеції. У 1706 році війська Карла XII підкорили Саксонію. Петро I теж не гаяв часу: крім закладення у 1703 році Санкт-Петербурга та відновлення війська, він у 1704–1706 роках приєднав до Росії частину Естляндії. Це спонукало Карла XII організувати похід на Москву через Україну, де у 1708 році підняли повстання козаки гетьмана Івана Мазепи, але сувора зима та удари російських військ знекровили шведську армію. У 1709 році під Полтавою король зазнав остаточної поразки, був поранений, проте зумів втекти до османів. Здійснений Петром Прутський похід призвів до оточення російської армії османськими військами. Щоб врятувати вояків, цар змушений був піти на переговори і віддати туркам Азов. Поки Карл XII переховувався в Туреччині, російські, данські, ганноверські та навіть прусські війська захопили майже всю балтійську територію, що належала Швеції. У 1718 році під час облоги норвезької фортеці Фредрікстен шведський король був убитий. За підсумками війни Швеція втратила майже всі свої володіння на Балтиці."
  flavor_pol.18.title: "[GetCountry('TUR').GetAdjectiveWithNoTooltip]е питання"
  flavor_pol.18.desc: "Зростаючий експансіонізм #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#! викликав приплив до наших військ численних добровольців, які бажають захищати #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#! від язичницької загрози."
  flavor_pol.18.a: "Ми — захисники християнства."
  flavor_pol.18.historical_info: "У 70–80-х роках XVII століття між Польщею та Османською імперією спалахнув конфлікт: козаки з польської частини України перейшли на бік османів і закликали на боротьбу з поляками татар. Перемоги, які здобув над бунтівниками гетьман Ян Собеський, лише відстрочили неминуче: у 1672 році Османська імперія влаштувала вторгнення на територію Речі Посполитої. Взяття прикордонної фортеці Кам'янець-Подільський змусило поляків підписати принизливий Бучацький мир. У 1683 році Собеський, тоді вже командувач коаліційними військами, прибув до обложеної османами Відня і здобув над турками рішучу перемогу, що стала першим кроком на шляху до вигнання османських військ з Європи."
  pol_stag_maybe_more: "Будуть й інші можливості."
  flavor_pol.19.title: "Закінчення застою"
  flavor_pol.19.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! традиційно мають значний вплив. Деякі наші радники пропонують обмежити їхні повноваження, щоб домогтися більшої централізації влади, тоді як інші рекомендують зберігати статус-кво."
  flavor_pol.19.a: "Ні, обстановка надто важка. Її не змінити."
  flavor_pol.19.b: "Все дуже кепсько. Нам потрібні зміни."
  flavor_pol.19.historical_info: "Зігравши вирішальну роль у порятунку Відня від османської облоги в 1683 році, польський король Ян Собеський здобув несподівану підтримку сейму. Втім, це ніяк не вплинуло на розподіл влади між монархом та аристократією."
  flavor_pol.20.title: "Закінчення застою"
  flavor_pol.20.desc: "$flavor_pol.19.desc$"
  flavor_pol.20.a: "Ні, обстановка надто важка. Її не змінити."
  flavor_pol.20.b: "Все дуже кепсько. Нам потрібні зміни."
  flavor_pol.20.historical_info: "Зійшовши на польський престол у 1697 році, король Август II мав намір централізувати владу та об'єднати Польщу зі своєю саксонською батьківщиною. Через конфлікт з аристократією та опір сейму ці цілі так і не були досягнуті."
  flavor_pol.21.title: "Закінчення застою"
  flavor_pol.21.desc: "$flavor_pol.19.desc$"
  flavor_pol.21.a: "Ні, обстановка надто важка. Її не змінити."
  flavor_pol.21.b: "Все дуже кепсько. Нам потрібні зміни."
  flavor_pol.21.historical_info: "Станіслав Август Понятовський, який став королем Польщі у 1764 році, ініціював конституційні реформи, що включали скасування старих привілеїв знаті. Однак його плани були зірвані через втручання Пруссії та Росії, які погрожували війною його країні."
  flavor_pol.22.title: "Закінчення застою"
  flavor_pol.22.desc: "$flavor_pol.19.desc$"
  flavor_pol.22.a: "Ні, обстановка надто важка. Її не змінити."
  flavor_pol.22.b: "Все дуже кепсько. Нам потрібні зміни."
  flavor_pol.22.historical_info: "У 1787 році Станіслав Понятовський зробив другу спробу реформування польської країни, запропонувавши Росії союз в обмін на допомогу у створенні польського війська. Його пропозиція була відхилена Катериною Великою і згодом призвела до поділу Польщі."
  flavor_pol.23.title: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] погоджуються з нашою політикою"
  flavor_pol.23.desc: "На щастя, члени нинішнього [ROOT.GetCountry.GetParliament.Custom('parliament_ru_GEN')|l] прислухалися до наших аргументів і вирішили підтримати нашу політику."
  flavor_pol.23.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_pol.23.historical_info: "Вето — лише один із симптомів політичної хвороби, що глибоко вразила Річ Посполиту. Після першого в її історії застосування права вето минуло 17 років; після другого — ще 10. Потім воно стало невід'ємним елементом парламентського життя, перетворившись на ідефікс, особливо серед дрібної шляхти — та вважала право вето не лише символом особистої участі в управлінні країною, а й головною гарантією станових свобод. Король, зрозуміло, вважав інакше. Тут слід зробити застереження, що вето саме по собі не перешкоджало прийняттю політичних рішень: королю доводилося йти на поступки, щоб результати влаштовували всіх учасників процесу. Однак у міру того, як розбрат все більше охоплював польське суспільство, знаходити компромісні рішення ставало складніше. Бувало й так, що після місяців скрупульозного планування, коли весь сейм вже готовий був прийняти пропозицію, все виявлялося перекреслено одним-єдиним голосом проти…"
  flavor_pol.24.title: "Сейм накладає вето на нашу політику"
  flavor_pol.24.desc: "На жаль, члени нинішнього [ROOT.GetCountry.GetParliament.Custom('parliament_ru_GEN')|l] не дослухалися до наших аргументів і виступили проти нашої політики."
  flavor_pol.24.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_pol.24.b: "Почнемо діяти в них за спиною."
  flavor_pol.25.title: "[target_location.GetNameWithNoTooltip]: новий університет"
  flavor_pol.25.desc: "Рідкісна країна може похвалитися наявністю таких же чудових освітніх закладів, як у нас. [target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] тепер буде славитися як місце, де знаходиться знаменитий #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!, який не тільки підкреслює велич нашої країни, а й сприяє поширенню ідей доби Відродження. [target_character.GetName] вже отримує від покровителів, що вкладають кошти в наш університет, прохання забезпечити їм офіційне піклування з боку [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої королівської родини та підтримку #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! церкви."
  flavor_pol.25.a: "Ми подбаємо про цей чудовий заклад як слід!"
  flavor_pol.25.b: "Обійдемося без привілеїв."
  flavor_pol.25.historical_info: "Краківський університет, заснований у 1364 році королем Казимиром III (тоді ця установа називалася Краківською академією), швидко став одним із провідних освітніх закладів Центральної Європи. Подібно до Паризького університету, він пропонував учням обширну програму, до якої входили сім вільних мистецтв, медицина, юриспруденція та богослов'я. Під покровительством монарха та за підтримки католицької церкви університет стрімко розвивався. До його аудиторій з'їжджалися наукові світила з усієї Європи.\n\nАпогею свого впливу університет досяг в добу Відродження: тут розвивалися гуманістичні ідеї, проводилися наукові дослідження, перемішувалися різні культури. З його стін вийшли такі видатні уми, як укладач геліоцентричної системи світу Миколай Коперник та поет Ян Кохановський. Краківському університету був дорогий дух пізнання та прагнення до нового, настільки властивий епосі Відродження та надовго прославив цей заклад."
  flavor_pol.26.title: "Місто [target_location.GetNameWithNoTooltip]"
  flavor_pol.26.desc: "На узбережжі #TOOLTIP:AREA,baltic_area,X #L Балтики#!#! виникло чимало процвітаючих торгових громад, що вважаються одними з найуспішніших у #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. До однієї з таких громад колись належали місцевий уряд та жителі міста [target_location.GetName]. Він чимало постраждав під #L [GetCountry('TEU').GetAdjective|l]ою#! владою: колишні господарі без розбору вбивали та викрадали чиновників, сподіваючись таким чином зламати вільний дух народу, а заодно домогтися скасування місцевого самоврядування.\n\nСьогодні ж [target_location.GetNameWithNoTooltip] знаходиться в надійних — наших — руках, а народ радісно зустрічає визволителів. Скориставшись моментом, до нас звернулися видатні діячі міста. Від імені #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L містян#!#! вони просять дати їм відновити місцеве самоврядування, а заодно визнати право на карбування власних монет."
  flavor_pol.26.a: "Добре, ми згодні."
  flavor_pol.26.b: "Визволення? Ні. Скоріше у вас просто змінився режим."
  flavor_pol.27.title: "Розширення Кварцяного війська"
  flavor_pol.27.desc: "Після відходу від традиційної військової системи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдалося закласти основи регулярного війська нового зразка — сучасного та здатного швидко реагувати на загрози, включаючи нальоти на прикордонні території.\n\nУ [GetCurrentYear] році була проведена чергова реформа: [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetParliament.GetName|l] уклали угоду, згідно з якою на утримання війська виділялася четверта частина всіх доходів від королівських маєтків. Звідси й пішла назва війська: кварцяне, тобто четвертне.\n\nОднак, щоб народ міг спати спокійно, інтереси країни були захищені, а сама країна розвивалася, треба йти в ногу з часом, а значить — переймати досягнення наукового поступу, в тому числі в галузі ведення бойових дій. Історія неодмінно запам'ятає наш вибір."
  flavor_pol.27.a: "Нашому війську не завадить загальна реформа!"
  flavor_pol.27.b: "Нам це не по кишені."
  scales_with_army_tradition_tt: "Ця зміна відповідає нашим [Concept('army_tradition', 'військовим традиціям')|e]"
  flavor_pol.28.title: "Оновлення університету в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_pol.28.desc: "Багатство, зокрема спадкове, — дієвий інструмент, якщо користуватися ним в інтересах народу. Приклад тому — найзнаменитіший і найстаріший університет #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [XXX.Custom('CL_GEN')|L]#!#!. У його прекрасних стінах, що несуть у собі дух Ренесансу, виховуватимуться великі уми, які прокладуть нам шлях до зірок, породять і навчать діячів, здатних самостійно вершити історію. Але для цього будівлю потрібно оновити та розширити."
  flavor_pol.28.a: "У цьому славному закладі виросте нове покоління!"
  flavor_pol.28.b: "Зараз немає потреби в розширенні."
  flavor_pol.29.title: "[target_character.GetShortNameWithNoTooltip] і реформи заради процвітання"
  flavor_pol.29.desc: "Завдяки своєму географічному розташуванню, а також родючій землі наша країна приваблює чимало хижих поглядів. Щоб відстояти свою незалежність і захистити народ, [target_character.GetName] [Select_CString(target_character.IsFemale,'доручила', 'доручив')] радникам скласти план будівництва укріплень, здатних забезпечити надійну оборону та процвітання країни."
  flavor_pol.29.a: "Проведемо відповідні реформи."
  flavor_pol.29.b: "Нам це не потрібно."
  every_location_with_fortifications_gains_5_prosperity_tt: "Кожна належна нам [Concept('location', 'місцевість')|e], де є [ShowBuildingTypeName('stockade')|l] або [ShowBuildingTypeName('castle')|l], отримає [ShowNamedValue('prosperity_very_weak_bonus')|+=2%] до [Concept('prosperity', 'процвітання')|e]"
  flavor_pol.30.title: "[target_character.GetNameWithNoTooltip] і статути"
  flavor_pol.30.desc: "Хоча роздробленість закінчилася лише кілька десятиліть тому, чималі території країни досі залишаються під владою самостійних князів та управителів. Такий стан справ вкрай небезпечний, тому радникам доручено скласти перший в історії країни звід статутів — таким чином ми збираємося провести законодавчу реформу та приступити до централізації.\n\nПоложення статутів так чи інакше зачіпають суспільство цілком — вони стосуються таких областей, як, наприклад, судочинство або кримінальне право. Однак такий рішучий крок, спрямований проти місцевого самоврядування, неодмінно наштовхнеться на протидію з боку станів, чиї інтереси будуть зачеплені."
  flavor_pol.30.a: "Без радикальних реформ не обійтися!"
  flavor_pol.30.b: "Не варто порушувати статус-кво…"
  pol_start_deliberation_for_statutes_tt: "Розпочнеться процес обговорення #Y статутів#!, що готуються, які залежатимуть від нашого вибору"
  reforms_option1: "Нам потрібні радикальні зміни!"
  reforms_option2: "Масштабні реформи допоможуть нам у довгостроковій перспективі."
  reforms_option3: "Проведемо лише найнеобхідніші реформи."
  flavor_pol.31.title: "[target_character.GetNameWithNoTooltip] проводить соціальні реформи"
  flavor_pol.31.desc: "[ROOT.GetCountry.GetLongName] та інші країни існують в умовах постійно зростаючого впливу, яким користуються могутні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Їхня фінансова та військова підтримка — це та опора, без якої неможливі завоювання та збереження миру в самій країні.\n\nОднак попереду на них чекають важкі часи: статути, складанням яких [Select_CString(target_character.IsFemale,'керувала', 'керував')] [target_character.GetName], спрямовані на захист менш благополучних верств населення. Зокрема, планується, що нові привілеї отримають [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] — зрозуміло, на шкоду своїм господарям."
  flavor_pol.31.a: "$reforms_option1$"
  flavor_pol.31.b: "$reforms_option2$"
  flavor_pol.31.c: "$reforms_option3$"
  flavor_pol.32.title: "Реформи в галузі цивільного права"
  flavor_pol.32.desc: "Наші радники, що займаються цивільним правом, склали звід статей, які стосуються єдиних стандартів виробництва комерційних товарів усередині країни. На наше розчарування, цій реформі перешкоджають різні прихильники самоврядування, а також [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l]."
  flavor_pol.32.a: "$reforms_option1$"
  flavor_pol.32.b: "$reforms_option2$"
  flavor_pol.32.c: "$reforms_option3$"
  flavor_pol.33.title: "Реформи в галузі судочинства"
  flavor_pol.33.desc: "Представництво — дуже делікатне, а нерідко навіть небезпечне питання для нашого суспільства. Оскільки ми значною мірою залежимо від волі різних впливових станів, їм нерідко доводиться дарувати різні права та привілеї, від чого страждають [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] — це обмежує їхні свободи. Звісно, немає нічого дивного в тому, що дарування права на представництво найзнедоленішим жителям країни потрясе саму основу, на якій тримається вплив знаті, а отже — і все наше суспільство загалом."
  flavor_pol.33.a: "$reforms_option1$"
  flavor_pol.33.b: "$reforms_option2$"
  flavor_pol.33.c: "$reforms_option3$"
  greatly_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G значно#! збільшить вигоду від реформ"
  mild_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G помірно#! збільшить вигоду від реформ"
  minor_increase_the_positive_gain_from_reforms_tt: "Цей варіант #G незначно#! збільшить вигоду від реформ"
  flavor_pol.34.title: "Завершення обговорення реформ"
  flavor_pol.34.desc: "Після довгих місяців обговорень, дипломатичних зусиль та укладання таємних договорів ми нарешті склали остаточний проєкт законодавчих реформ — легітимних та забезпечених законною силою, хай і не в повній мірі. Лише час покаже, що чекає на нас далі: велич чи міжусобиця…"
  flavor_pol.34.a: "Тільки вперед! Ми здобудемо нові сили!"
  based_on_reform_choices_tt: "Вплив попередніх пов’язаних подій"
  flavor_pol.35.title: "[target_character2.GetNameWithNoTooltip] [Select_CString(target_character2.IsFemale,'померла', 'помер')|l]"
  flavor_pol.35.desc: "Правителі країн нерідко змушені укладати один з одним шлюби — така ціна політичних надбань та поширення власного впливу. Саме з таких міркувань поєдналися шлюбом [target_character.GetShortName] та [target_character2.GetShortName], однак згодом з цього дипломатичного союзу, на радість наших підданих, виросла справжня любов.\n\n[target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale,'виявилася', 'виявився')] справжнім супутником життя, завжди готовим дати пораду у внутрішніх справах та прийти на допомогу — [target_character.GetShortNameWithNoTooltip] це дуже [Select_CString(target_character.IsFemale,'цінувала', 'цінував')]. Крім цього, [target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale,'прославилася', 'прославився')] своєю любов’ю до музики; [Select_CString(target_character2.IsFemale,'її', 'його')] неможливо було побачити без супроводу знаменитих музикантів та митців.\n\nЗмиритися з цією сумною втратою нелегко. Нехай ця велика жінка назавжди залишиться в пам’яті народу."
  flavor_pol.35.a: "Спочивай з миром."
  casimir_less_interested_in_love_tooltip: "[target_character.GetShortNameWithNoTooltip] якийсь час не шукатиме нового кохання."
  flavor_pol.36.title: "Дружина-юдейка"
  flavor_pol.36.desc: "[target_character.GetShortName] — людина, яка змінила чимало жінок. Наша країна починає страждати від цієї непостійності, оскільки правитель повинен подавати громадянам особистий приклад.\n\nАле, схоже, в країні все-таки намічаються зміни: [target_character.GetShortNameWithNoTooltip] не може відвести очей від витонченої, прекрасної та розумної не по роках красуні на ім’я [target_character2.GetShortName], яка полонила навіть [Select_CString(target_character.IsFemale,'її', 'його')] серце, що пережило чимало романтичних походеньок. Тепер [target_character2.GetShortName] користується прихильністю нашого монарха і навіть має певний вплив.\n\nОднак якщо [target_character.GetShortNameWithNoTooltip] наважиться укласти шлюбний союз, втамувавши тим самим свою пристрасть, нашому двору загрожує неминучий конфлікт з #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькими#!#! властями — як в країні, так і за кордоном…"
  flavor_pol.36.a: "Кохання сильніше за релігійні перепони!"
  flavor_pol.36.b: "Такий союз не можна визнати легітимним…"
  flavor_pol.36.c: "Треба змусити [Select_CString(target_character2.IsFemale,'її', 'його')] зникнути."
  target_character_2_vanishes_tt: "[target_character2.GetNameWithNoTooltip] пропаде безслідно…"
  ruler_gains_fertility_tt: "[target_character.GetShortNameWithNoTooltip] з вищою ймовірністю зможе народити спадкоємця"
  flavor_pol.37.title: "Стрілецькі товариства"
  flavor_pol.37.desc: "Життя небезпечне та непередбачуване — передбачити, коли на нашу процвітаючу країну нападуть знову, просто неможливо. Щоб мати можливість захистити свій дім, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] заснували в #TOOLTIP:LOCATION,krakow,X #L Кракові#!#! стрілецьке товариство, де майбутніх ополченців навчають поводитися з вогнепальною зброєю.\n\nУ міру розширення кордонів та зростання населення нашої країни в інших містах поступово виникають власні стрілецькі товариства. Вони стали настільки численними, що представники цих товариств звернулися до нас з проханням офіційно посприяти заснуванню подібних шкіл у кожному місті країни."
  flavor_pol.37.historical_info: "Назва Краківського стрілецького товариства — «Півняче» — походить від перших змагань стрільців, де як мішені використовувалися живі півні та курки. Згодом на зміну їм прийшли дерев’яні фігурки у вигляді півнів (#italic  kur#!). Так виникла назва #italic  «Куркове братство»#!, оскільки в розмовній польській мові слово «кур» (#italic  kur#!) означає #italic  «півень»#!.\n\nВ добу масового поширення вогнепальної зброї помітною стала схожість рушничного замка з півнячою головою. Звідси пішло слово «курок», що так вдало збігається з назвою «Куркове братство»."
  flavor_pol.37.a: "Стріляти по півнях — це не яйця висиджувати: тут потрібні точність та вміння!"
  flavor_pol.37.b: "Досить і того, що вже є в Кракові."
  flavor_pol.37.c: "Краще націлимося на важливіші витрати…"
  flavor_pol.38.title: "Надійне місце на престолі [target_country1.Custom('CL_GEN')]"
  flavor_pol.38.desc: "[target_character.GetName] прагне утримати #L [target_country1.GetAdjective|l]ий#! трон. Очевидно, що в такій справі не обійтися без допомоги впливових [target_country1.GetAdjectiveWithNoTooltip|l]их аристократів. Вони займають вкрай вигідне для нас суспільне становище, а їхня підтримка — запорука нашого довгого перебування при владі. Все, що їм потрібно, — деякі привілеї у своїх володіннях, що знаходяться далеко від наших…"
  flavor_pol.38.a: "Вони отримають усе, що просять."
  flavor_pol.38.b: "Ми не збираємося догоджати примхам дрібних дворян."
  flavor_pol.39.title: "Боротьба за владу"
  flavor_pol.39.desc: "Нам стало відомо, що [target_character.GetName] у жалюгідній спробі стати нашим сувереном [Select_CString(target_character.IsFemale,'вдалася', 'вдався')] до абсолютно недипломатичних і незаконних методів, таємно пообіцявши, що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отримають певні привілеї. Такий вчинок не просто зухвалість — це пряме посягання на наш суверенітет!"
  flavor_pol.39.a: "Неймовірна нахабність!"
  flavor_pol.40.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_pol.40.desc: "Управління великою державою та підтримання в ній порядку — непросте завдання. Попри наші старання, народ починає сумніватися у владі та її легітимності — причому часто відкрито.\n\nУ відповідь на ситуацію, що склалася (і в спробі запобігти її погіршенню), деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] виступили з цікавою пропозицією: в обмін на певні привілеї вони доноситимуть до народу наші слова та вершитимуть порядок від нашого імені."
  flavor_pol.40.a: "Без їхнього впливу не обійтися…"
  flavor_pol.40.b: "З пацюками переговорів не ведемо!"
  flavor_pol.41.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName|L] [GetCurrentYear] року"
  flavor_pol.41.desc: "Довгі дискусії представників [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] спричинили неприємні наслідки: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] безперервно вимагають усе більше привілеїв у міру того, як зростає їхній вплив. Нещодавно вони висунули чергову вимогу: зміцнити владу аристократії в наших установах."
  flavor_pol.41.a: "Доведеться погодитися на їхні вимоги."
  flavor_pol.41.b: "Ми відмовляємося йти назустріч!"
  flavor_pol.42.title: "Завіша Чорний"
  flavor_pol.42.desc: "[ROOT.GetCountry.GetFlavorRank] повниться чутками про деякого благородного лицаря, що здійснює подвиги в різних куточках країни. Про нього [Select_CString(ruler_scope.IsFemale,'чула', 'чув')], звісно, і [ruler_scope.GetName]. [target_character.GetName] — так звуть цього лицаря — вже встиг взяти участь у кількох турнірах і навіть військових походах і тепер являє собою ідеал для своїх побратимів. Він умілий воїн і дипломат; [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] напевно оцінить його таланти по достоїнству, якщо, звісно, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] його запросить."
  flavor_pol.42.a: "Такі діячі нам потрібні."
  flavor_pol.42.b: "Цікава особистість."
  STATIC_MODIFIER_NAME_pol_paragon_of_chivalric_values_modifier: "Втілення лицарства"
  flavor_pol.43.title: "Варшавська конфедерація"
  flavor_pol.43.desc: "Глибокий розкол у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькій#!#! церкві, викликаний #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранським#!#! рухом, ще дуже далекий від завершення. Страждає в тому числі й [ROOT.GetCountry.GetFlavorRank|l], де живе наш народ. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже навернулися в іншу віру й тепер закликають законодавчо закріпити їхню свободу віросповідання та право навертати у свою конфесію власних підданих. Документ, що закріплює це право, отримав назву «$warsaw_confederation$». [ruler_scope.GetName] [Select_CString(ruler_scope.IsFemale,'отримала', 'отримав')] перші прохання підписати його. Свій підпис уже поставили багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], однак [ROOT.GetCountry.GetFlavorRank|l] стоїть на межі нового конфлікту: багато громадян, які сповідують католицтво, відмовляються приєднуватися до конфедерації."
  flavor_pol.43.historical_info: "Варшавська конфедерація — один із найважливіших документів Речі Посполитої, що гарантував дворянам свободу віросповідання в добу, коли Європу роздирали релігійні конфлікти. Згодом положення конфедерації були включені до Генрикових артикулів, підписати які був зобов'язаний кожен обраний король."
  flavor_pol.43.a: "Схвалюємо."
  flavor_pol.43.b: "Ми підтримаємо духовенство."
  flavor_pol.44.title: "Кошицький привілей"
  flavor_pol.44.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] отримали несподіване прохання: [ruler_scope.GetName] хоче, щоб престол країни, якщо після смерті монарха не залишиться спадкоємців чоловічої статі, могла зайняти [Select_CString(ruler_scope.IsFemale,'її', 'його')] дочка. Самі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] бачать у цьому чудову нагоду виторгувати собі нові привілеї — навряд чи [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зможе їм відмовити. Умови їхні такі: податок, який зараз платять [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], буде знижено, а встановлювати нові податки без їхньої згоди буде заборонено. Крім того, надалі всі витрати за візити братиме на себе безпосередньо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l], звісно, вважатимуть принизливим."
  flavor_pol.44.historical_info: "Кошицький привілей — це грамота, надана шляхті королем Угорщини та Польщі Людовиком Великим. Ціною численних поступок дворянству Людовик забезпечив своїй дочці місце на престолі, однак розширення привілеїв шляхтичів стало першим кроком до встановлення в Польщі шляхетської демократії. Згодом дочка короля, заради якої і був складений привілей, — Ядвіга — вийшла заміж за великого князя литовського Ягайла, що призвело до об'єднання Польщі та Литви в особисту унію — Річ Посполиту."
  flavor_pol.44.a: "Ми доведемо цю справу до кінця."
  flavor_pol.44.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] до добра не доведуть."
  POL_may_form_union_with_lit_at_later_date: "Завдяки прийняттю #TOOLTIP:ESTATE_PRIVILEGE,privilege_of_koszyce,X #L Кошицького привілею#!#! влада #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! зможе утворити унію з #ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_INST')|L]#!#!, якщо відбудеться подія «$flavor_pol.55.title$»."
  flavor_pol.45.title: "Нова династія"
  flavor_pol.45.desc: "Після того як [pol_country.GetLongName] та [lit_country.GetLongName] об'єдналися під владою одного монарха, в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! виникла нова грізна сила. [pol_dynasty_founder.GetName] — правитель, з яким мимоволі доведеться рахуватися; також немає жодних сумнівів, що свої імена в історію впишуть і [Select_CString(pol_dynasty_founder.IsFemale,'її', 'його')] спадкоємці. [pol_dynasty_founder.GetShortNameWithNoTooltip] не лише користується загальною повагою — [Select_CString(pol_dynasty_founder.IsFemale,'вона стала родоначальницею', 'він став родоначальником')] цілої династії."
  flavor_pol.45.historical_info: "Уклавши в 1386 році шлюб з польською королевою Ядвігою, литовський князь Ягайло (він же — Владислав II Ягелло) заснував династію Ягеллонів, одночасно з цим об'єднавши Польщу та Литву в єдину країну під особистою унією. Династія обірвалася в 1572 році зі смертю останнього Ягеллона. Після цього посада короля Речі Посполитої стала виборною."
  flavor_pol.45.a: "Починається нова доба."
  flavor_pol.46.title: "Невдалі заручини"
  flavor_pol.46.desc.a: "Нам стало відомо, що [dead_character.GetName] раптово [Select_CString(dead_character.IsFemale,'померла', 'помер')]. Ми сумуємо за [Select_CString(ruler_scope.IsFemale,'покійною', 'покійним')], однак втрата можливості об'єднати дві династії засмучує нас ще більше. Не варто й говорити, що заручини, які уклали між собою [polish_candidate.GetNameWithNoToolip] та [lithuanian_candidate.GetName], відтепер вважаються недійсними."
  flavor_pol.46.desc.b: "Об'єднання династій [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName] для нас другорядне. На першому місці — питання внутрішньої політики. [polish_candidate.GetName] укладе шлюб з кимось іншим, а ми неодмінно отримаємо з цього користь."
  flavor_pol.46.desc.c: "Новини про те, що [lithuanian_candidate.GetName] передчасно [Select_CString(lithuanian_candidate.IsFemale,'вступила', 'вступив')] у шлюб, зірвали плани об'єднати дві династії — [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName]. Хай би чорт побрав усіх, хто не вміє тримати слово! Тепер заручини, які уклали між собою [polish_candidate.GetNameWithNoToolip] та [lithuanian_candidate.GetNameWithNoTooltip], вважаються недійсними. Треба винайти інший спосіб заманити #ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_ACC')|L]#!#! у свою сферу впливу."
  flavor_pol.46.desc.d: "Нам стало відомо, що заручини, які уклали між собою [polish_candidate.GetName] та [lithuanian_candidate.GetName], розірвані. Посли навідріз відмовляються повідомляти подробиці, тому справжні причини того, що сталося, нам невідомі."
  flavor_pol.46.a: "Це дуже сумно."
  POL_betrothal_is_broken: "[lithuanian_candidate.GetName] та [polish_candidate.GetDynasty.GetName] більше не заручені й можуть укласти інший шлюб."
  flavor_pol.47.title: "Кревська унія"
  flavor_pol.47.desc: "Над столицею лунає мелодійний дзвін дзвонів. [ROOT.GetCountry.GetCapital.GetName], затамувавши подих, дивиться, як [ROOT.GetCountry.GetGovernment.GetAdjective|l]а пара рухається до [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого замку. Залишилася лише одна формальна церемонія — і династії [polish_candidate.GetDynasty.GetName] та [lithuanian_candidate.GetDynasty.GetName] об'єднаються. Всього кількома годинами раніше [lithuanian_candidate.GetName] [Select_CString(lithuanian_candidate.IsFemale,'прийняла', 'прийняв')] хрещення, навернувшись в іншу віру — [ROOT.GetCountry.GetReligion.GetName|l]. Тепер на світовій політичній сцені з'явилася нова [ROOT.GetCountry.GetGovernment.GetAdjective|l]а родина, а в Східній Європі утворився черговий союз."
  flavor_pol.47.historical_info: "Кревська унія — документ, підписаний великим князем литовським Ягайлом. Князь брав на себе низку зобов'язань перед Польщею та Литвою: разом з придворними прийняти католицизм та відпустити на волю різних в'язнів польського походження. Крім того, Ягайло зобов'язався включити до складу польської країни литовські та руські землі."
  flavor_pol.47.a: "Ратифікувати унію та відсвяткувати шлюб!"
  flavor_pol.47.b: "Ми не можемо собі це дозволити."
  flavor_pol.48.title: "Краківські жупи"
  flavor_pol.48.desc: "Від управителя господарством нам надійшла пропозиція передати дві важливі соляні шахти в регіоні [ShowLocationName('wieliczka')] під управління спеціально створеної для цього [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої компанії. Крім цього, пропонується закріпити у відповідному статуті всі правила, що стосуються видобутку солі, використання її у виробництві товарів, продажу солі за кордон та збору податків з усіх цих видів діяльності. Прийняття такого документа забезпечить приплив до казни грошей, які потім можна буде вкласти у більші проєкти."
  flavor_pol.48.historical_info: "Величка та Бохня — дві найбільші соляні шахти Малопольського воєводства. 21 квітня 1368 року король Казимир підписав статут, що передавав ці шахти під управління Королівської компанії. За деякими відомостями, третину доходів королівської казни становив прибуток від роботи одних лише Велички та Бохні."
  STATIC_MODIFIER_NAME_pol_cracovian_salt_mines: "Важливі соляні шахти"
  flavor_pol.48.a: "Ми доведемо цю справу до кінця."
  flavor_pol.48.b: "Які ж це дрібниці!"
  flavor_pol.49.title: "Багатообіцяюча особистість"
  flavor_pol.49.desc: "Під час однієї з нещодавніх сутичок ворог несподівано напав на нашого монарха. [ruler_scope.GetName] [Select_CString(ruler_scope.IsFemale,'була', 'був')] на волосині від смерті: здавалося, ще трохи — і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] безславно загине, проте на допомогу наспів відважний вояк на ім'я [target_character.GetName]. Лише завдяки йому [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] не спочиває в могилі. Після такого вчинку шлях у лицарі виявився закритим для вояка назавжди, проте [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ruler_scope.IsFemale,'взяла', 'взяв')] хоробреця під своє заступництво. Сьогодні [target_character.GetNameWithNoTooltip] гідно служить нашій країні єпископом і мітить у кардинали."
  flavor_pol.49.historical_info: "Збігнєв Олесницький — впливовий польський державний діяч початку XV століття. Служив радником при двох королях, брав участь у різних дипломатичних місіях. З часом здобув настільки великий вплив, що самотужки визначав зовнішню політику всього королівства."
  flavor_pol.49.a: "Нехай стане придворним."
  flavor_pol.49.b: "От би кожен міг похвалитися таким славним походженням…"
  flavor_pol.50.title: "Ворожа конфедерація"
  flavor_pol.50.desc: "Нам стало відомо, що деякі впливові [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а точніше — цілі родини об'єдналися і створили конфедерацію в #TOOLTIP:LOCATION,poznan,X #L Познані#!#!. Керує ними дехто [pol_macko_borkowic_scope.GetName]. Причини такого вчинку прості: їм не подобається призначений на управління цими територіями староста. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] #TOOLTIP:AREA,greater_poland_area,X #L Великої Польщі#!#!, ображені та принижені подібним вибором, відкрито виступили проти наших управителів."
  flavor_pol.50.historical_info: "У 1352 році великопольська шляхта одноголосно виступила проти призначення Вежбєнти з Паневіц головним старостою. Керував бунтівниками Мачко Боркович — один із попередніх старост. Причина невдоволення, втім, крилася глибше: шляхтичам не подобалося перенесення столиці до Малої Польщі, оскільки через це втрачався весь їхній вплив у Великій Польщі."
  flavor_pol.50.a: "Влада [ROOT.GetCountry.Custom('rank_ru_GEN')|l] не терпітиме неповаги до своєї цілісності."
  flavor_pol.50.b: "Ми погодимося на їхні вимоги."
  greater_polish_uprising: "Повстання у Великій Польщі"
  POL_every_location_in_pomerania_wielkopolska_brandenburg: "Кожна [Concept('owned', 'належна')|e] нам [Concept('pop', 'група населення')|e] у #TOOLTIP:AREA,greater_poland_area,X #L Великій Польщі#!#!, #TOOLTIP:AREA,pomerania_area,X #L Померанії#!#! та #TOOLTIP:AREA,brandenburg_area,X #L Бранденбурзі#!#! втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e]."
  flavor_pol.51.title: "Nihil novi"
  flavor_pol.51.desc: "На недавньому засіданні [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] висунули абсолютно неймовірну пропозицію. Піддавшись оманам [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого характеру, вони почали вважати, що влада не повинна мати права ухвалювати закони, що стосуються шляхтичів, без їхньої на те згоди. Це обурливо! Однак без підтримки цього стану ми позбудемося коштів на будь-які подальші дії, тому висунуту пропозицію доведеться розглянути, якою б безглуздою вона не здавалася. Крім того, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] збираються обмежити права міських жителів і прикріпити своїх селян до землі. Нам не залишають вибору — найімовірніше, доведеться погодитися."
  flavor_pol.51.historical_info: "#italic Nihil novi nisi commune consensu#! («нічого нового без загальної згоди») — це конституція, тобто закон, прийнятий у 1505 році польським сеймом. Nihil novi забороняв ухвалювати нові закони без згоди шляхти. Вважається, що саме з нього в країні почалося встановлення шляхетської демократії, а пізніше — #italic Золотої вольності#!."
  flavor_pol.51.a: "Дамо їм ці нещасні права."
  flavor_pol.51.b: "Обійдуться без нових прав."
  flavor_pol.52.title: "[MOL_tag.GetNameWithNoTooltip]: сумнівна відданість"
  flavor_pol.52.desc: "Наші шпигуни знову повідомили, що [MOL_tag.GetGovernment.GetRulerTitle|l] #L [MOL_tag.GetAdjective|l]ої#! країни поводиться підозріло. У спробах убезпечити себе від ворогів [Select_CString(POL_disloyal_vassal.IsFemale,'вона', 'він')] змінює союзи як рукавички і пропонує стати ленником будь-якої досить могутньої країни, з якою у [Select_CString(POL_disloyal_vassal.IsFemale,'її', 'його')] [MOL_tag.Custom('rank_ru_GEN')|l] є кордони. Час показати [Select_CString(POL_disloyal_vassal.IsFemale,'зрадниці', 'зраднику')] на ділі, що нашій країні під силу [Select_CString(POL_disloyal_vassal.IsFemale,'її', 'його')] захистити."
  flavor_pol.52.a: "Ми не здивуємося, якщо [Select_CString(POL_disloyal_vassal.IsFemale,'вона', 'він')] присягне на вірність самому чорту."
  flavor_pol.54.title: "Конфлікт через провінцію [target_location.GetNameWithNoTooltip]"
  flavor_pol.54.desc: "Землі в околицях [target_location.Custom('LR_GEN')|l] [target_location.GetName] традиційно вважалися частиною #TOOLTIP:AREA,greater_poland_area,X #L Великої Польщі#!#! — області, над якою владарюємо ми. Однак після того як #L [ROOT.GetCountry.GetAdjective|l]е#! королівство розпалося на безліч дрібних князівств, цією територією заволоділа #TOOLTIP:CULTURE,$silesian_tt$,X #L сілезька#!#! династія #TOOLTIP:DYNASTY,$piast_dynasty_tt$,X #L П'ястів#!#!. Але #L [POL_boh_scope.GetAdjective|l]а#! #TOOLTIP:AREA,silesia_area,X #L Сілезія#!#! зараз охоплена конфліктами, а тому слабка. Цим слід скористатися, щоб повернути провінцію собі."
  flavor_pol.54.historical_info: "У 1343 році князь Жаганський Генріх V Залізний відмовився приносити присягу богемському королю Йоганну Люксембурзькому і постарався підкорити собі Глогув. Цим конфліктом скористався польський король Казимир III Великий, який приєднав до Польського королівства місто Всхова, що належало Генріху."
  flavor_pol.54.a: "Не будемо зволікати!"
  flavor_pol.54.b: "Наші претензії вже давно недійсні."
  flavor_pol.55.title: "Пропозиція про шлюб"
  flavor_pol.55.desc: "Завдяки спільному ворогу, що діє на території #ONCLICK:COUNTRY,[POL_common_enemy.Custom('CL_tt')] #TOOLTIP:COUNTRY,[POL_common_enemy.Custom('CL_tt')],X [POL_common_enemy.Custom('CL_GEN')|L]#!#!, нарешті зійшлися інтереси двох країн. До цього [ROOT.GetCountry.GetLongName] та [POL_partner_country.GetLongName] переживали конфлікт, так властивий країнам-суперницям, кожна з яких прагне витіснити суперника. Однак тепер на горизонті виник ворог, що будь-якої миті здатен здолати кожного з них, і противники перетворилися на союзників. Щоб закріпити ці відносини, #L [POL_partner_country.GetAdjective|l]і#! [POL_partner_country.GetGovernment.GetEstateName('nobles_estate')|l] запропонували укласти шлюб. Обрано й тих, хто одружується: [POL_proposed_polish_candidate.GetName] та [POL_proposed_lithuanian_candidate.GetName]."
  flavor_pol.55.a: "Неодмінно!"
  flavor_pol.55.b: "Це тимчасовий захід."
  STATIC_MODIFIER_NAME_pol_blocked_from_marriage_betrothal: "У заручинах"
  POL_accept_marriage: "Ми погодимося укласти шлюб. Обидві країни вступлять в особисту унію."
  POL_accept_betrothal: "Ми погодимося на заручини. Коли обидва персонажі зможуть укласти шлюб, країни вступлять в особисту унію."
  flavor_pol.56.title: "Загроза з півдня"
  flavor_pol.56.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! чудово усвідомлює, що [POL_TUR_tag.GetName] — це серйозна загроза. [POL_TUR_tag.GetLongNameWithNoTooltip] — повільне, але вірне зростання цієї країни ціною втрат #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#!, давно викликає у нас занепокоєння, однак тільки зараз ми почали усвідомлювати, яке чудовисько випустили на світ. Влада [POL_TUR_tag.Custom('rank_ru_GEN')|l] на нашому кордоні вже дихає нам у спину та стежить за кожним нашим кроком, щоб, улучивши момент, почати черговий похід проти #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! земель. Якщо це не припинити, військо #ONCLICK:COUNTRY,[POL_TUR_tag.Custom('CL_tt')] #TOOLTIP:COUNTRY,[POL_TUR_tag.Custom('CL_tt')],X [POL_TUR_tag.Custom('CL_GEN')|L]#!#! стане по-справжньому непереможною силою."
  flavor_pol.56.a: "Якщо до цього все-таки дійде, ми готові стати оплотом християнства."
  flavor_pol.57.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.57.desc: "Маріацький костел міста [pol_basilica_location.Custom('LR_GEN')|l] [pol_basilica_location.GetName] терміново потребує ремонту та оновлення. Ми вже почали шукати творців, здатних взятися за таке завдання, — зрозуміло, за гідну плату. Пошуки виявилися небезрезультатними: придворні повідомили, що на нашу пропозицію готовий відгукнутися такий собі [target_character.GetName] — досвідчений творець, який осягав глибини науки на південному заході рідної Німеччини. [target_character.GetNameWithNoTooltip] кілька років прожив у [pol_basilica_location.Custom('LR_PREP')|l] [pol_basilica_location.GetNameWithNoTooltip], тому нас запевняють, що йому цілком можна довірити це відповідальне завдання."
  flavor_pol.57.historical_info: "Віт Ствош (він же Фейт Штосс) — німецький скульптор родом з Хорба-на-Неккарі. Прославився своїм шедевром — різьбленим вівтарем Маріацького костелу в Кракові. Крім цього, також виготовив кілька надгробків для видатних діячів польського двору. Стиль, у якому творив Ствош, іноді називають пізньоготичним бароко."
  flavor_pol.57.a: "Обсипати його золотом!"
  flavor_pol.57.b: "Знайдемо когось іще."
  flavor_pol.58.title: "Мода на Італію"
  flavor_pol.58.desc: "Дух #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#!, що зародився в #TOOLTIP:REGION,italy_region,X #L Італії#!#!, поступово почав поширюватися по всьому континенту. Нові віяння в мистецтві та філософії породили цілу плеяду наукових відкриттів, завдяки чому #TOOLTIP:REGION,italy_region,X #L Італія#!#! — серце Ренесансу — тепер вважається уособленням високої культури та суспільного процвітання. Не дивно, що після шлюбу, який уклали [pol_ruler.GetShortName] та [pol_queen.GetShortName], одержимість #TOOLTIP:CULTUREGROUP,italian_group,X #L італійською#!#! культурою тепер виявляє не тільки [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], а й придворні — а [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої країни запозичує нові італійські традиції."
  flavor_pol.58.historical_info: "Під впливом Бони Сфорци — дружини короля Сигізмунда I — у столиці Польщі Кракові виникла мода на італійську культуру. До країни запрошувалися знамениті італійські творці, завдяки яким доба Відродження нарешті прийшла і до Польщі."
  flavor_pol.58.a: "Ми заохочуємо це захоплення!"
  flavor_pol.58.b: "Це нудно і нікому не потрібно."
  flavor_pol.1000.title: "Міхал Сендзивой"
  flavor_pol.1000.desc: "[capital_scope.GetName] зустрічає прославленого алхіміка на ім'я [michael_sedziwoj_scope.GetName], який нещодавно повернувся з поїздки до #TOOLTIP:LOCATION,prague,X #L празького#!#! двору, де заправляє [praha_owner.GetGovernment.GetRuler.GetName].\n\n#ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! знадобиться такий гострий розум: якщо виділити йому достатньо коштів, він напевно здійснить безліч відкриттів. З іншого боку, [michael_sedziwoj_scope.GetName] може служити дипломатом, оскільки його зв'язки в Європі досить широкі."
  flavor_pol.1000.historical_info: "Польський алхімік, філософ і лікар Міхал Сендзивой вважається одним з першопрохідців в області алхімії: він розробив кілька способів очищення та створення кислот, металів та інших хімічних сполук. Король Сигізмунд III Ваза виявляв чималий інтерес до алхімії та особисто проводив досліди разом із Сендзивоєм. Сам алхімік займався як практикою — він розробляв проєкти шахт і ливарних виробництв — так і теорією: йому належить праця #italic «Нове світло алхімії»#!, написана таємною мовою, зрозумілою тільки алхімікам. Крім того, Сендзивой відкрив кисень за 170 років до Шеєле та Прістлі; своє відкриття він назвав «їжа життя»."
  flavor_pol.1000.a: "Виділимо гроші на його експерименти."
  flavor_pol.1000.b: "Наймемо його як радника."
  flavor_pol.1000.c: "Не звертатимемо на нього уваги."
  flavor_pol.1001.title: "Нове світло хімії"
  flavor_pol.1001.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] вкрай цікавиться алхімічними експериментами, які безперестанку проводить [michael_sedziwoj_scope.GetName]. Однак #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! вважає це заняття безглуздою тратою золота для [ROOT.GetCountry.Custom('rank_ru_GEN')|l], адже скарбниця не безкінечна.\n\nЧи варто продовжувати виділяти кошти на дослідження Сендзивоя?"
  flavor_pol.1001.a: "Залишимо все як є."
  flavor_pol.1001.b: "Прислухаємося до дворянства."
  flavor_pol.1100.title: "Ян Замойський"
  flavor_pol.1100.desc: "[john_zamoyski_scope.GetName], родом із династії #TOOLTIP:DYNASTY,$zamoyski_dynasty_tt$,X #L Замойських#!#!, нещодавно повернувся на територію [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Юність він провів за кордоном, у #TOOLTIP:LOCATION,paris,X #L Парижі#!#! та #TOOLTIP:LOCATION,strasbourg,X #L Страсбурзі#!#!. Вивчав юриспруденцію в університеті #TOOLTIP:LOCATION,padova,X #L Падуї#!#!, де здобув ступінь доктора права, а пізніше — посаду ректора юридичного факультету. Замойський володіє настільки широкими знаннями та зв'язками, що напевно чудово проявить себе на державній службі.\n\n[ROOT.GetCountry.GetLongName] та піддані цієї країни потребують таких людей. Чи варто запросити його до двору?"
  flavor_pol.1100.a: "Наймемо його як радника."
  flavor_pol.1100.b: "Не будемо звертати на нього уваги."
  flavor_pol.1101.title: "Замойська академія"
  flavor_pol.1101.desc: "[john_zamoyski_scope.GetName] звернувся до нас по допомогу: він хоче заснувати в #TOOLTIP:LOCATION,krasnystaw,X #L Красниставі#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!, де юні #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! будуть осягати основи #TOOLTIP:SOCIETAL_VALUE,spiritualist_vs_humanist,X #L гуманізму#!#! та готуватися до відповідальної державної служби. Як і в #TOOLTIP:LOCATION,strasbourg,X #L Страсбурзі#!#!, тут викладатимуть вільні мистецтва, юриспруденцію та медицину."
  flavor_pol.1101.historical_info: "У 1594 році польський коронний канцлер Ян Замойський заснував академію, що отримала ім'я свого засновника, — четвертий за рахунком вищий навчальний заклад у Речі Посполитій. Одним із перших лекторів в академії став поет Шимон Шимонович, який допомагав Замойському в його починанні. Відкриття схвалили як папа Климент VIII, так і єпископ Хелмський Станіслав Гомолінський. Офіційно воно відбулося 15 березня 1595 року, а в 1601 році король Сигізмунд III Ваза видав підтверджувальний указ. В академії існувало три факультети: вільних мистецтв, юриспруденції та медицини, розраховані на сім викладачів. З 1637 року керівництво академії отримало право нагороджувати випускників дипломами доктора філософії."
  flavor_pol.1101.a: "Підтримаємо університет фінансово."
  flavor_pol.1101.b: "Не будемо нічого робити."
  flavor_pol.1102.title: "Ідеальне місто $zamosc$"
  flavor_pol.1102.desc: "[john_zamoyski_scope.GetName], натхненний уявленнями #TOOLTIP:CULTUREGROUP,italian_group,X #L італійських#!#! діячів #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! про ідеальне місто, почав складати свій проєкт нового міста. Замойський збирається звернутися по допомогу до [pol_bernardo_morando_scope.GetName], який вже встиг попрацювати у #TOOLTIP:LOCATION,warsaw,X #L Варшаві#!#!. Ми можемо виділити йому додаткові кошти, щоб все пішло згідно із задумом Замойського, а ми заручилися прихильністю Морандо."
  flavor_pol.1102.historical_info: "У 1579 році польський коронний канцлер Ян Замойський заснував поселення Замосць, через рік наділене міськими правами. Допомагав Замойському венеційський архітектор Бернардо Морандо, який прагнув, як і засновник, закласти ідеальне місто, що відповідало уявленням доби Відродження. Праця його була винагороджена: місто й донині відоме як «Північна Падуя»."
  flavor_pol.1102.a: "Виділимо кошти."
  flavor_pol.1102.b: "Не будемо нічого робити."
  flavor_pol.1200.title: "[nicholas_copernicus_scope.GetNameWithNoTooltip]"
  flavor_pol.1200.desc: "Після кількох років навчання в #TOOLTIP:REGION,italy_region,X #L Італії#!#! юний племінник єпископа #TOOLTIP:LOCATION,lidzbark,X #L Лідзбаркського#!#! [nicholas_copernicus_scope.GetName] перейшов на службу до свого дядька, обійнявши посаду його секретаря та лікаря. Після кількох засідань [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] стало очевидно, що цей юнак — вельми вміла та розумна людина з талантом до управління справами."
  flavor_pol.1200.a: "Не будемо звертати на нього уваги."
  flavor_pol.1200.b: "[capital_scope.GetNameWithNoTooltip] вважає його присутність за честь"
  flavor_pol.1201.title: "$revolution_spheres$"
  flavor_pol.1201.desc: "[nicholas_copernicus_scope.GetName] з деякою неохотою опублікував несподівано спірний астрономічний трактат. [nicholas_copernicus_scope.GetShortNameWithNoTooltip] стверджує, що Земля зовсім не перебуває в центрі світобудови — навпаки, вона разом з іншими планетами обертається навколо Сонця. Попри те що науковий зміст трактату адресований насамперед іншим астрономам та вченим, Коперника вже почали звинувачувати в єресі, оскільки його теорії суперечать уявленням Птолемея, з якими погоджується Священне Писання."
  flavor_pol.1201.historical_info: "У 1543 році — в останній рік свого життя — Миколай Коперник опублікував працю «Про обертання небесних сфер». Викладена в ній модель світу суперечила прийнятим тоді ідеям Птолемея, оскільки Коперник вважав, що Земля обертається навколо Сонця, а не навпаки. Це йшло врозріз як із біблійним каноном, так із звичною геоцентричною моделлю світу. Підтвердити свої уявлення будь-якими математичними викладками Коперник не міг, однак пізніше його правоту довели інші астрономи та математики."
  flavor_pol.1201.a: "Вилучимо книгу з обігу."
  flavor_pol.1201.b: "Спалимо цей єретичний твір."
  flavor_pol.1201.c: "Нехай друкують далі."
  flavor_pol.1300.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.1300.desc: "Схоже, на наших очах сходить нова зірка. [target_character.GetName] вже користується серед жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! певною славою, яку йому принесли його труди. Безперечно, [target_character.GetShortNameWithNoTooltip], що об'їздив усю #TOOLTIP:REGION,poland_region,X #L Польщу#!#!, — освічена людина; як [ruler_scope.GetName], так і [Select_CString(ruler_scope.IsFemale,'її', 'його')] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] з радістю приймуть його у себе."
  flavor_pol.1300.historical_info: "Ян Кохановський вважається одним із найвидатніших поетів доби Відродження в Польщі. Він не тільки зробив помітний внесок у мистецтво, а й служив секретарем у самого короля, а також працював перекладачем."
  flavor_pol.1300.a: "Його вміння нам знадобляться."
  flavor_pol.1300.b: "У нас достатньо придворних."
  flavor_pol.1301.title: "[target_character.GetNameWithNoTooltip] та «Плачі»"
  flavor_pol.1301.desc: "[target_character.GetName] написав 19 віршів-плачів — прекрасних, але нестерпно сумних творів, у яких скорботний поет оплакує втрату близьких. Нам залишається лише сподіватися, що, здобувши розуміння публіки, він знайде душевний спокій, оскільки трагедія його вже увічнена."
  flavor_pol.1301.historical_info: "У 1580 році Кохановський випустив #italic «Плачі»#! — одну з найяскравіших своїх робіт і один із найпримітніших творів доби польського Відродження загалом. Мова поета виявилася настільки яскравою, що ще кілька десятиліть поспіль йому наслідували інші."
  flavor_pol.1301.a: "Сумно… і красиво."
  flavor_pol.1400.title: "[target_character.GetNameWithNoTooltip]"
  flavor_pol.1400.desc: "[ruler_scope.GetName] [Select_CString(ruler_scope.IsFemale,'отримала', 'отримав')] цікаву пропозицію: [target_character.GetName], який вступив у 1428 році до Краківської академії, виявився під великим враженням від праці хроніста XII століття на ім'я [GetCharacter('pol_wincenty_kadlubek').GetName] і хоче піти його стопами, адже [ROOT.GetCountry.GetLongName] — країна з багатою історією. Втім, [target_character.GetShortNameWithNoTooltip] не тільки хроніст: є у нього й інші таланти — з нього вийде хороший дипломат або управитель."
  flavor_pol.1400.historical_info: "Ян Длугош (1415–1480) — знаменитий польський історик, син героя Грюнвальдської битви, якого також звали Ян Длугош. У нього було тринадцять братів, двох з яких також звали Ян. Служив секретарем, дипломатом і хроністом при кількох королях."
  flavor_pol.1400.a: "Звісно, ми йому допоможемо."
  flavor_pol.1400.b: "У нас достатньо придворних."
  flavor_pol.1401.title: "«Аннали, або Хроніки великих королів Польщі»"
  flavor_pol.1401.desc: "Найбільше [target_character.GetName] прославився монументальною працею всього свого життя — хронікою, в якій докладно описана історія #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! від самого заснування князівства до сьогоднішнього дня. У хроніці також описується сьогоднішній стан [ROOT.GetCountry.Custom('rank_ru_GEN')|l]: там наводяться землеопис і водоопис, а також інші подробиці, які інакше б неодмінно загубилися в глибині віків."
  flavor_pol.1401.a: "[ROOT.GetCountry.GetNameWithNoTooltip] назавжди увійде в історію."
  flavor_pol.1500.title: "[mikolaj_rej_scope.GetNameWithNoTooltip]"
  flavor_pol.1500.desc: "[ROOT.GetCountry.GetLongName] — [mikolaj_rej_scope.GetName] користується тут певною славою. Будучи дворянським сином, він віддавав перевагу розвагам і гулянкам, а не навчанню. Вже закінчивши Краківську академію, [mikolaj_rej_scope.GetLastNameWithNoTooltip] не тільки опанував навички віршування, а й почав брати активну участь у політичному житті [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. На службі у дворянина-#TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвініста#!#! він потрапив під вплив #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#! та кальвінізму і, сповнившись протестантських настроїв, почав писати #TOOLTIP:DIALECT,polish_dialect,X #L польською#!#!."
  flavor_pol.1500.historical_info: "Миколай Рей відомий в основному популяризацією використання польської мови як літературної, а заодно — як автор знаменитих рядків із вірша 1562 року (написаного, зрозуміло, польською): «поляки не гуси і свою мову мають»."
  flavor_pol.1500.a: "Ми раді кожному поету!"
  flavor_pol.1500.b: "У нас достатньо придворних."
  flavor_pol.1501.title: "[target_character.GetNameWithNoTooltip] та його праці"
  flavor_pol.1501.desc: "#TOOLTIP:RELIGION,$catholic_tt$,X #L Католицьке#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] вкрай незадоволене тим, що [target_character.GetName] був найнятий на службу. Його письменницький талант майже незаперечний, однак неприйняття релігійної влади та незгода з католицьким#!#! віросповіданням вважається серед літераторів нетактовністю. Яскравим прикладом таких поглядів можна назвати твір #italic «Коротка розмова між трьома особами: Паном, Війтом і Плебаном#!»."
  flavor_pol.1501.historical_info: "$flavor_pol.1500.historical_info$"
  flavor_pol.1501.a: "У нас вільна країна; ми не будемо піддавати цю працю цензурі."
  flavor_pol.1501.b: "Це неприпустимо!"
  POL_every_lutheran_calvinist_hussite_pop_displeased_tt: "Кожна #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністська#!#! та #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранська#!#! [Concept('pop', 'група населення')|e] втрачає [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]."
  flavor_pol.1600.title: "Передача Сепеша"
  flavor_pol.1600.desc: "Наші походи призвели до повного спустошення скарбниці. Нестача така, що про кошти на війну залишається лише мріяти; ще трохи — і ми опинимося абсолютно безпорадні перед багатшими ворогами. Втім, вихід є — це [pol_the_loan_provider.GetLongName]. Ми можемо звернутися до цієї країни і заручитися грошовою підтримкою. Так ми уникнемо необхідності йти до станів, вічно жадібних до влади і прагнучих заволодіти новими правами в обмін на великодушний дозвіл встановити додаткові податки. Краще буде взяти позику у дружньо налаштованого правителя."
  flavor_pol.1600.a: "Ми запропонуємо [pol_the_loan_provider.GetAdjectiveWithNoTooltip|l]ій стороні села в провінції Сепеш."
  flavor_pol.1600.b: "Ми впораємося своїми силами."
  flavor_pol.1601.title: "$flavor_pol.1600.title$"
  flavor_pol.1601.desc: "[pol_requesting_nation.GetLongName] — з цієї країни до нас прибули посли з проханням надати їм фінансову допомогу у вигляді позики. На жаль, чужу вірність легко купити — навіть між союзниками. Тому [Select_CString(pol_requesting_nation_ruler.IsFemale,'правителька', 'правитель')] [pol_requesting_nation.Custom('CL_GEN')] [pol_requesting_nation_ruler.GetName] пропонує як заставу кілька сіл у провінції #TOOLTIP:PROVINCE_DEFINITION,szepes_province,X #L Сепеш#!#!. Ми багато чим ризикуємо, проте така застава — дійсно надійна гарантія повернення боргу."
  flavor_pol.1601.a: "Гарна пропозиція!"
  flavor_pol.1601.b: "Ми не готові давати в борг такій безвідповідальній країні."
  LOAN_TITLE_pledge_of_spisz: "Застава Сепеша"
  LOAN_SHORT_NAME_pledge_of_spisz_L: "Застава Сепеша"
  LOAN_SHORT_NAME_pledge_of_spisz_B: "Застава Сепеша"
  LOAN_NAME_pledge_of_spisz_L: "Застава Сепеша"
  LOAN_NAME_pledge_of_spisz_B: "Застава Сепеша"
  LOAN_TOOLTIP_pledge_of_spisz: "Угода між двома сторонами, згідно з якою [Concept('lender', 'позикодавець')|e] [LOAN.GetLender.GetName] отримує у своє розпорядження [Concept('location', 'місцевість')|e] #TOOLTIP:LOCATION,lubica,X #L Любиця#!#!, доки [Concept('borrower', 'позичальник')|e] [LOAN.GetBorrower.GetName] не виплатить належне."
  flavor_pol.1602.title: "Позику виплачено"
  flavor_pol.1602.desc: "[loan_repayer.GetLongName] — колись ця країна отримала від нас солідну позику в обмін на села #TOOLTIP:PROVINCE_DEFINITION,szepes_province,X #L Сепеша#!#! — відповідно, нам відійшла територія в регіоні [loan_pledge.GetName]. Сьогодні до нас прибули озброєні посли: [loan_repayer.GetNameWithNoTooltip] тепер має достатні кошти, щоб виплатити борг, а влада [loan_repayer.Custom('rank_ru_GEN')|l] позбавляється свого тягаря. Згідно з буквою договору, [loan_pledge.GetNameWithNoTooltip] відходить назад попередньому власнику. Однак якщо ми погодимося з цим, образяться [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], які вважають, що цей регіон по праву належить їм. Можна спробувати пред'явити позичальнику документ — зрозуміло, абсолютно законний — який виправдовує наше рішення залишити ці села собі."
  flavor_pol.1602.a: "[loan_pledge.GetNameWithNoTooltip] повернеться."
  flavor_pol.1602.b: "Ці землі належать нам — ось законний договір."
  STATIC_MODIFIER_NAME_pol_honored_agreement: "Виконано умови угоди щодо #TOOLTIP:PROVINCE_DEFINITION,szepes_province,X #L Сепеша#!#!"
  flavor_pol.1603.title: "Доля позики"
  flavor_pol.1603.desc.a: "Ми виплатили #L [loan_giver.GetAdjective|l]ій#! стороні борг, проте нам відмовляються повертати #TOOLTIP:PROVINCE_DEFINITION,szepes_province,X #L сепеські#!#! села. Посилаючись на якийсь (напевно вигаданий) договір, нас спробували переконати, що [loan_pledge.GetName] — більше не наше володіння. Це обурливо! Обман ще нікого не доводив до добра."
  flavor_pol.1603.desc.b: "[loan_giver.GetLongName] — посли, яких ми відправили до цієї країни виплачувати належний з нас борг, виконали доручення і повернулися. [loan_giver.GetNameWithNoTooltip] знову відходить до нас, як і прописано в договорі; місцева влада вже поступилася місцем нашому управителю. [loan_pledge.GetName|U] повністю в наших руках."
  flavor_pol.1603.b: "[ROOT.GetCountry.GetReligion.GetGodName] їм суддя."
  flavor_pol.1603.a: "Приємно мати з вами справу!"