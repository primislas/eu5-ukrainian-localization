l_russian:
 flavor_sie.1.title: "Банк Монте дей Паски"
 flavor_sie.1.desc: "#italic Монти ди пьета#!, или «банки милосердия», становятся всё более частым явлением в нашей державе. Это благотворительные финансовые организации, которые получают деньги с пожертвований и выдают малоимущим ссуды под низкий процент. Возможно, правительству стоит выделить средства на создание подобного учреждения в [monte_paschi_bank_hq.Custom('LR_PREP')|l] [monte_paschi_bank_hq.GetName]. Фактически оно будет служить национальным банком нашей державы и способствовать повышению благосостояния нашего народа."
 flavor_sie.1.a: "Это поможет нам наполнить казну."
 flavor_sie.1.b: "Воистину, это богоугодное дело!"
 flavor_sie.1.historical_info: "#italic Банк Монте дей Паски ди Сиена#!, основанный в Сиенской республике в 1472 году, считается старейшим из банков, действующих до сих пор. Изначально он был создан как некоммерческий ломбард, а свой статус современного банка приобрёл лишь после присоединения к Великому герцогству Тосканскому в 1624 году. После объединения Италии его деятельность распространилась на весь Апеннинский полуостров."
 flavor_sie.2.title: "$flavor_sie.1.title$"
 flavor_sie.2.desc: "Банки милосердия являются своего рода благотворительными организациями, которые стараются помогать бедным слоям населения. Впрочем, гуманитарный характер этих банков вовсе не запрещает нам извлекать прибыль из этой деятельности…"
 flavor_sie.2.a: "Они будут нашими!"
