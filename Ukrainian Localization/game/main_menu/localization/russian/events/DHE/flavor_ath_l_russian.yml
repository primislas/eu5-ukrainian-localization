l_russian:
 flavor_ath.1.title: "Недавние [target_country.GetAdjectiveWithNoTooltip|l]ие набеги"
 flavor_ath.1.entry: "Недавние набеги Айдынидов"
 flavor_ath.1.desc: "В последние годы наши земли на побережье #TOOLTIP:AREA,aegean_sea_area,X #L Эгейского моря#!#! страдают от опустошительных набегов #L [target_country.GetAdjective|l]их#! турок. Пока их совершал [target_character.GetName], мы думали, что его смерть даст нам передышку. Однако недавний набег, предпринятый его [Select_CString(target_character2.IsFemale, 'наследницей', 'наследником' )] на наши владения во #TOOLTIP:AREA,thrace_area,X #L Фракии#!#!, не оставляет сомнений относительно [Select_CString(target_character2.IsFemale, 'её', 'его' )] намерений — [target_character.GetName] вернётся с новыми силами, а [ShowScriptedGeographyName('greece_geography')] опять станет [Select_CString(target_character2.IsFemale, 'её', 'его' )] добычей. Мы должны устранить эту угрозу, прежде чем она принесёт ещё больше горя нашим городам, — нам надо предпринять ответный набег или даже организовать #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,crusade,X #L крестовый поход#!#!."
 flavor_ath.1.a: "Отплатим им той же монетой!"
 flavor_ath.2.title: "[scope_ruler.GetShortNameWithNoTooltip] внезапно погибает"
 flavor_ath.2.entry: "Внезапная смерть герцога Гильема II"
 flavor_ath.2.desc: "О горе! [regent_of_athens.GetName] [Select_CString(regent_of_athens.IsFemale, 'сообщила', 'сообщил' )], что [Select_CString(scope_ruler.IsFemale, 'наша дорогая', 'наш дорогой' )] [scope_ruler.GetName] неожиданно [Select_CString(scope_ruler.IsFemale, 'скончалась', 'скончался' )] от некой тяжёлой болезни. В связи с этим [regent_of_athens.GetShortNameWithNoTooltip] [Select_CString(regent_of_athens.IsFemale, 'приняла', 'принял' )] на себя обязанности регента, которые [Select_CString(regent_of_athens.IsFemale, 'она', 'он' )] будет исполнять до тех пор, пока не будет решён вопрос наследования. [Select_CString(scope_ruler.IsFemale, 'Сама', 'Сам' )] [scope_ruler.GetShortNameWithNoTooltip] [Select_CString(scope_ruler.IsFemale, 'завещала', 'завещал' )], что [Select_CString(scope_ruler.IsFemale, 'её', 'его' )] [Select_CString(scope_heir.IsFemale, 'наследницей должна', 'наследником должен' )] стать [scope_heir.GetName], однако в данный момент [Select_CString(scope_heir.IsFemale, 'она', 'он' )] находится [sic_country.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[sic_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sic_country.Custom('CL_tt')],X [sic_country.Custom('CL_PREP')|L]#!#! и потому не может принять бразды правления.\n\nПользуясь тем, что [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! временно образовался вакуум власти, недовольные #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонской#!#! дружиной члены двора обратились к регенту с предложением: пусть вместо [Select_CString(scope_heir.IsFemale, 'назначенной наследницы', 'назначенного наследника' )] на престол взойдёт [arg_ruler.GetName]. По их мнению, сейчас наиболее подходящий момент для того, чтобы вернуть власть династии [arg_ruler.GetDynasty.GetName]. Однако стоит учитывать, что [sic_country.GetAdjectiveWithNoTooltip|l]ое правительство непременно воспримет это решение как мятеж и, возможно, в ответ попытается лишить нашу державу всякой автономии. Кроме того, если [arg_ruler.GetShortNameWithNoTooltip] всё-таки примет наше приглашение, то нам также придётся убедить Каталонскую дружину признать [Select_CString(arg_ruler.IsFemale, 'новую наследницу', 'нового наследника' )]."
 flavor_ath.2.a: "Пусть престол займёт [scope_heir.GetNameWithNoTooltip]."
 flavor_ath.2.a.entry: "Разрешим наследнику занять трон после правителя."
 flavor_ath.2.b: "[arg_ruler.GetShortNameWithNoTooltip] отлично подойдёт на эту роль. Лучше предложим престол [Select_CString(arg_ruler.IsFemale, 'ей', 'ему' )]."
 flavor_ath.2.b.entry: "Предложим ему державу."
 ath_sicily_may_declare_war: "Если [arg_ruler.GetName] станет [Select_CString(arg_ruler.IsFemale, 'новой правительницей', 'новым правителем' )], то у #ONCLICK:COUNTRY,[sic_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sic_country.Custom('CL_tt')],X [sic_country.Custom('CL_GEN')|L]#!#! появится [Concept('casus_belli', 'повод для войны')|e] «[ShowCasusBelliName('cb_subject_broke_free')]» против #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
 flavor_ath.3.title: "[scope_athens.GetAdjectiveWithNoTooltip]ие [scope_athens.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] предлагают нам занять престол"
 flavor_ath.3.desc: "#L [scope_athens.GetAdjective]ий#! дипломат прибыл к нашему двору с заманчивым, но весьма опасным предложением. Он сообщил, что [scope_ath_william.GetName] неожиданно скончался от болезни, и теперь престол его [ROOT.GetCountry.Custom('rank_ru_GEN')|l] пустует. Хотя многие [scope_athens.GetAdjectiveWithNoTooltip|l]ие [scope_athens.GetGovernment.GetEstateName('nobles_estate')|l] с нетерпением ждут того момента, когда к власти придёт его наследник, регент [regent_of_athens.GetShortName] [Select_CString(regent_of_athens.IsFemale, 'решила', 'решил' )] пойти иным путём. Так, [Select_CString(regent_of_athens.IsFemale, 'она вступила', 'он вступил' )] в сговор с теми членами двора, которые по-прежнему хранят верность династии [arg_ruler.GetDynasty.GetName] и надеются, что следующим правителем [scope_athens.Custom('CL_GEN')] станет [arg_ruler.GetName].\n\n[regent_of_athens.GetShortNameWithNoTooltip] признаёт, что с тех пор, как [scope_slained_brienne.GetName] [Select_CString(scope_slained_brienne.IsFemale, 'была свержена', 'был свержен' )], [arg_ruler.GetShortNameWithNoTooltip] и #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонская#!#! дружина фактически находятся в состоянии вражды. Тем не менее каталонцы неоднократно выражали своё недовольство правлением династии [scope_ath_william.GetDynasty.GetName], а потому есть основания полагать, что при грамотном подходе их всё-таки можно будет склонить на сторону рода [arg_ruler.GetDynasty.GetNameWithNoTooltip]. Заручившись их поддержкой, [scope_athens.GetNameWithNoTooltip] смо[scope_athens.Custom('end_gegu')]т значительно укрепить своё положение и, возможно, даже обрести долгожданную независимость от #L [scope_sic_country.GetAdjective|l]ого#! двора."
 flavor_ath.3.a: "Примем предложение."
 flavor_ath.3.a.entry: "Согласиться на предложение Афин."
 flavor_ath.3.b: "Ни в коем случае. Риск слишком велик."
 flavor_ath.3_become_athens: "[ROOT.GetCountry.GetName] объедин[ROOT.GetCountry.Custom('end_ityat')]ся [scope_athens.Custom('endlong_predlog_sso')] [scope_athens.Custom('longname_ru_INST')] и получит [Concept('cores', 'национальные')|e] [Concept('locations', 'районы')|e] на всех [scope_athens.GetAdjectiveWithNoTooltip|l]их [Concept('core', 'национальных')|e] территориях"
 ath_arg_sicily_may_declare_war: "[scope_athens.GetAdjectiveWithNoTooltip]ая держава обретёт независимость, но [scope_sic_country.GetName] получ[scope_sic_country.Custom('end_itat')] [Concept('casus_belli', 'повод для войны')|e] «[ShowCasusBelliName('cb_subject_broke_free')]» против #ONCLICK:COUNTRY,[scope_athens.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scope_athens.Custom('CL_tt')],X [scope_athens.Custom('CL_GEN')|L]#!#!"
 flavor_ath.4.title: "[arg_ruler.GetNameWithNoTooltip] [Select_CString(arg_ruler.IsFemale, 'приняла', 'принял' )] наше предложение!"
 flavor_ath.4.desc: "Тайная дипломатическая миссия [arg_country_scope.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[arg_country_scope.Custom('CL_tt')] #TOOLTIP:COUNTRY,[arg_country_scope.Custom('CL_tt')],X [arg_country_scope.Custom('CL_ACC')|L]#!#!, которую [Select_CString(regent_of_athens.IsFemale, 'организовала', 'организовал' )] [regent_of_athens.GetShortName], прошла успешно: [arg_ruler.GetNameWithNoTooltip] [Select_CString(arg_ruler.IsFemale, 'рассмотрела наше предложение и согласилась', 'рассмотрел наше предложение и согласился' )] занять #L [ROOT.GetCountry.GetAdjective|l]ий#! престол. Тем временем вести о том, что [scope_ath_william.GetName] скончался, уже достигли #L [sic_country_scope.GetAdjective|l]их#! властей, и скоро им станет ясно, что [regent_of_athens.GetNameWithNoTooltip] [Select_CString(regent_of_athens.IsFemale, 'решила', 'решил' )] устроить переворот.\n\nНесмотря на то, что в 1311 году [scope_slained_brienne.GetName] [Select_CString(scope_slained_brienne.IsFemale, 'была свергнута', 'был свергнут' )] и [ROOT.GetCountry.GetFlavorRank|l] оказал[ROOT.GetCountry.Custom('endrank_assya')] под контролем #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонской#!#! дружины, [sic_country_scope.GetAdjectiveWithNoTooltip|l]ий двор не выказал наёмникам должного признания. В результате каталонцы заметно разочаровались в своих сюзеренах, и теперь они гораздо более охотно примут [arg_country_scope.GetAdjectiveWithNoTooltip|l]ую власть, если нам удастся с ними договориться."
 flavor_ath.4.a: "Пора провести переговоры с каталонцами."
 flavor_ath.5.title: "Переговоры с Каталонской дружиной"
 flavor_ath.5.desc: "Хотя с 1312 года [ROOT.GetCountry.GetName] формально принадлеж[ROOT.GetCountry.Custom('end_itat')] династии [scope_ath_william.GetDynasty.GetName], по факту власть [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] осуществляет #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонская#!#! дружина — разумеется, в интересах [sic_country_scope.GetAdjectiveWithNoTooltip|l]ого двора. Однако благодаря своим закулисным играм [regent_of_athens.GetName] [Select_CString(regent_of_athens.IsFemale, 'сумела', 'сумел' )] несколько изменить баланс сил, и теперь многие [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ие [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] всецело поддерживают претензии династии [scope_ruler.GetDynasty.GetName] на [ROOT.GetCountry.Custom('rank_ru_ACC')|l].\n\nПо счастливому стечению обстоятельств в последнее время многие члены дружины стали выражать недовольство [sic_country_scope.GetAdjectiveWithNoTooltip|l]ой властью. Они даже согласны уйти от своих прежних сюзеренов и встать на нашу сторону, но взамен они требуют достойное вознаграждение."
 flavor_ath.5.a: "Выделим дружине часть доходов [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 flavor_ath.5.a.entry: "Выплачивать дружине часть дохода державы."
 flavor_ath.5.b: "Предоставим дружине дополнительные привилегии и права на землю."
 flavor_ath.5.c: "Прогоним наёмников из [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 flavor_ath.5.c.entry: "Изгнать дружину из державы."
 flavor_ath.6.title: "[scope_athens.GetNameWithNoTooltip] Overthrows [ShowDynastyNameWithNoTooltip('barcelona_dynasty')] Rule"
 flavor_ath.6.desc: "Наш двор получил крайне неприятные вести: [scope_ath_william.GetName] неожиданно скончался от болезни. Что ещё хуже, #L [scope_athens.GetAdjective|l]ие#! аристократы, пользуясь временным безвластием, решили устроить переворот и передать престол династии [arg_ruler.GetDynasty.GetName]. В результате [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'осталась', 'остался' )] не у дел: [arg_ruler.GetName] [Select_CString(arg_ruler.IsFemale, 'отказалась', 'отказался' )] от своей вассальной присяги и [Select_CString(arg_ruler.IsFemale, 'согласилась стать новой правительницей', 'согласился стать новым правителем' )] [scope_athens.Custom('rank_ru_GEN')|l]."
 flavor_ath.6.a: "Мы должны вернуть [scope_athens.Custom('CL_ACC')] под свой контроль!"
 flavor_ath.6.a.entry: "$ATH$ необходимо вернуть!"
 flavor_ath.7.title: "[arg_ruler.GetNameWithNoTooltip] [Select_CString(arg_ruler.IsFemale, 'отвергла', 'отверг' )] наше предложение!"
 flavor_ath.7.entry: "Отказ герцога Аргоса"
 flavor_ath.7.desc: "Наша тайная дипломатическая миссия [arg_country_scope.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[arg_country_scope.Custom('CL_tt')] #TOOLTIP:COUNTRY,[arg_country_scope.Custom('CL_tt')],X [arg_country_scope.Custom('CL_ACC')|L]#!#! обернулась провалом: [arg_ruler.GetName] [Select_CString(arg_ruler.IsFemale, 'отвергла наше предложение и отказалась', 'отверг наше предложение и отказался' )] от #L [ROOT.GetCountry.GetAdjective|l]ого#! престола. Пытаясь сохранить лицо, [regent_of_athens.GetName] спешно [Select_CString(regent_of_athens.IsFemale, 'приговорила', 'приговорил' )] своих подельников к заключению, однако некоторых членов двора этот спектакль совсем не убедил. Теперь они требуют бросить [Select_CString(regent_of_athens.IsFemale, 'её', 'его' )] в темницу вместе с остальными заговорщиками, пока [scope_heir.GetName] не [Select_CString(scope_heir.IsFemale, 'вернулась', 'вернулся' )] [ROOT.GetCountry.Custom('end_predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')]."
 flavor_ath.7.a: "Пусть пока остаётся на свободе."
 flavor_ath.7.a.entry: "Пока что пощадим его."
 flavor_ath.7.b: "Отправим [Select_CString(regent_of_athens.IsFemale, 'её', 'его' )] за решётку!"
 flavor_ath.7.b.entry: "Заключить его в тюрьму!"
 flavor_ath.8.title: "Правление Каталонской дружины"
 flavor_ath.8.entry: "Правление Каталонской дружины"
 flavor_ath.8.desc: "Династия [scope_ruler.GetDynasty.GetName] правит [ROOT.GetCountry.Custom('longname_ru_INST')] с тех самых пор, как [ROOT.GetCountry.GetFlavorRank|l] сдал[ROOT.GetCountry.Custom('endrank_assya')] #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонской#!#! дружине и присягнул[ROOT.GetCountry.Custom('endrank_fem')] на верность [sic_country.Custom('longname_ru_DAT')] в 1311 году. И хотя формально [Select_CString(scope_ruler.IsFemale, 'правительницей', 'правителем' )] считается [scope_ruler.GetName], фактически вся власть [ROOT.GetCountry.Custom('end_predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')] осуществляется самой дружиной. Кроме того, наёмники защищают [ROOT.GetCountry.Custom('rank_ru_ACC')|l] от посягательств со стороны других претендентов, главным из которых несомненно является [arg_ruler.GetName].\n\nДо сих пор каталонцы верно служили [sic_country.GetAdjectiveWithNoTooltip|l]ому двору, однако некоторые [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ие [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] сообщают, что в последнее время многие дружинники начали выражать своё недовольство правлением династии [scope_ruler.GetDynasty.GetNameWithNoTooltip]."
 flavor_ath.8.a: "Каталонцы защищают [ROOT.GetCountry.Custom('CL_ACC')]. Мы должны им доверять."
 flavor_ath.8.a.entry: "Продолжить полагаться на Каталонскую дружину."
 flavor_ath.8.b: "Мы проверим, насколько правдивы слухи о нелояльности каталонцев."
 flavor_ath.9.title: "[byz_country.GetAdjectiveWithNoTooltip]ая междоусобица"
 flavor_ath.9.entry: "Византийская междоусобица"
 flavor_ath.9.desc: "До нас дошли вести о том, что власти #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#! в значительной степени утратили контроль над своими приграничными районами вблизи [ROOT.GetCountry.Custom('CL_GEN')] и начали размещать там лишь небольшие гарнизоны. При этом [byz_country.GetAdjectiveWithNoTooltip|l]ое правительство пребывает в смятении от того, что ему приходится одновременно разрешать династические распри и держать в узде множество #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецких#!#! бейликов, чьё влияние в #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! неуклонно растёт. В связи с этим некоторые члены #L [ROOT.GetCountry.GetAdjective|l]ого#! двора полагают, что сейчас самое время нанести удар по [byz_country.Custom('longname_ru_wntt_DAT')] и расширить наши владения в #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалии#!#!.\n\nВ то же время каталонские дружинники предлагают устроить ряд набегов на [byz_country.GetAdjectiveWithNoTooltip|l]ие районы в #TOOLTIP:AREA,northern_greece_area,X #L Северной Греции#!#!, чтобы наполнить нашу казну."
 flavor_ath.9.a: "Пришло время пробиться вглубь Фессалии."
 flavor_ath.9.b: "Поручим Каталонской дружине разграбить Северную Грецию."
 flavor_ath.9.c: "Ещё не время действовать."
 flavor_ath.10.title: "Греческое население [ROOT.GetCountry.Custom('CL_GEN')]"
 flavor_ath.10.entry: "Правление в Греции"
 flavor_ath.10.desc: "С тех пор как [ShowScriptedGeographyName('greece_geography')] оказалась под властью #L [GetCountry('LAT').GetAdjective|l]их#! государств, большая часть #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческой#!#! знати лишилась своих титулов и уступила их крестоносцам. И хотя с падением Латинской империи в 1261 году контроль крестоносцев над регионом значительно ослаб, их наследие по-прежнему пронизывает общество [ROOT.GetCountry.Custom('longname_ru_GEN')].\n\nВ надежде получить больше земельных прав, многие #L [ROOT.GetCountry.GetCulture.GetName|l]ие#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] решили обратиться ко двору с просьбой предоставить им часть греческих территорий, находящихся во владении [ROOT.GetCountry.Custom('CL_GEN')]. В то же время некоторые члены правительства предлагают поступить иначе и попытаться завоевать благосклонность греческого населения державы."
 flavor_ath.10.a: "Удовлетворим их ходатайство и предоставим им права на землю."
 flavor_ath.10.a.entry: "Поддержать расширение земельных прав знати."
 flavor_ath.10.b: "Задобрим греческое население страны."
 flavor_ath.10.c: "Передадим часть земель Каталонской дружине."
 flavor_ath.10.d: "Оставим всё как есть."
 ath_greek_pops_lose_mild_satisfaction: "Все наши #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческие#!#! [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 ath_greek_pops_gain_severe_satisfaction: "Все наши #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческие#!#! [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('estate_satisfaction_severe_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 ath_greek_pops_lose_severe_satisfaction: "Все наши #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческие#!#! [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('estate_satisfaction_severe_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 flavor_ath.11.title: "Каталонская дружина против греческого населения [target_conflict_location.Custom('LR_GEN')|l] [target_conflict_location.GetNameWithNoTooltip]"
 flavor_ath.11.entry: "Конфликт между Каталонской дружиной и греками"
 flavor_ath.11.desc: "Получив от #L [ROOT.GetCountry.GetAdjective|l]ого#! двора ряд привилегий, #TOOLTIP:CULTURE,$catalan_tt$,X #L Каталонская#!#! дружина навлекла на себя гнев #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греческого#!#! населения [target_conflict_location.Custom('LR_GEN')|l] [target_conflict_location.GetName], которое обвиняет наёмников в незаконном присвоении земель. Некоторые члены правительства поддерживают каталонцев и их интересы в этом районе, другие же опасаются, что это может спровоцировать восстания греков в соседних провинциях. Встревоженные чиновники требуют, чтобы [scope_ruler.GetName] как можно скорее [Select_CString(scope_ruler.IsFemale, 'вмешалась и разрешила', 'вмешался и разрешил' )] этот конфликт."
 flavor_ath.11.a: "Поддержим присвоение земель каталонцами."
 flavor_ath.11.b: "Упрекнём Каталонскую дружину за её безрассудные действия."
 flavor_ath.11.c: "Воспользуемся случаем и изгоним Каталонскую дружину из [ROOT.GetCountry.Custom('CL_GEN')]."
 flavor_ath.11.c.entry: "Воспользуемся этой возможностью и выгоним Каталонскую дружину!"
 flavor_ath.12.title: "[thebes_location.GetNameWithNoTooltip] и [athens_location.GetNameWithNoTooltip]: борьба столиц"
 flavor_ath.12.entry: "Борьба столиц"
 flavor_ath.12.desc: "[athens_location.GetName] с давних времён являются одним из важнейших поселений [ROOT.GetCountry.Custom('rank_ru_GEN')|l], однако прежние власти — будь то #L [GetCountry('LAT').GetAdjective|l]ие#! крестоносцы или Каталонская дружина — обычно обосновывались в #L #TOOLTIP:LOCATIONRANK,[thebes_location.Custom('LR_tt')],X [thebes_location.Custom('LR_PREP')|l]#!#! [thebes_location.GetName] в силу его стратегически выгодного расположения. Несмотря на это, [athens_location.GetNameWithNoTooltip] не утратили своего влияния, и значительная часть [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой бюрократии по-прежнему располагается именно здесь.\n\nОчевидно, оба города имеют свои достоинства, но [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] настаивает, чтобы [scope_ruler.GetName] окончательно [Select_CString(scope_ruler.IsFemale, 'определилась и решила', 'определился и решил' )], какой из них станет столицей #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
 flavor_ath.12.a: "Оставим текущий порядок, при котором оба поселения сохраняют своё влияние."
 flavor_ath.12.b: "[athens_location.GetRank.GetNameWithNoTooltip] [athens_location.GetNameWithNoTooltip] должен вновь стать столицей."
 flavor_ath.12.b.entry: "Нам следует вернуться в Афины и снова сделать их столицей."
 flavor_ath.12.c: "Официально объявим [thebes_location.Custom('LR_ACC')|l] [thebes_location.GetNameWithNoTooltip] столицей [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 flavor_ath.12.c.entry: "Объявить Фивы официальной столицей державы."
 flavor_ath.13.title: "[scope_epi_ruler.GetNameWithNoTooltip] приходит к власти [epi_country.Custom('predlog_vvo')] [epi_country.Custom('CL_PREP')]"
 flavor_ath.13.entry: "Отделение Эпира"
 flavor_ath.13.desc: "В 1337 году [scope_epi_governor.GetName] [Select_CString(scope_epi_governor.IsFemale, 'захватила', 'захватил' )] #ONCLICK:COUNTRY,[epi_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[epi_country.Custom('CL_tt')],X [epi_country.Custom('CL_ACC')|L]#!#! и вновь [Select_CString(scope_epi_governor.IsFemale, 'включила', 'включил' )] эту территорию в состав #ONCLICK:COUNTRY,[byz_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[byz_country.Custom('CL_tt')],X [byz_country.Custom('CL_GEN')|L]#!#!. Однако недавно [scope_epi_ruler.GetName] и [Select_CString(scope_epi_ruler.IsFemale, 'её', 'его' )] сторонники организовали мятеж против [byz_country.GetAdjectiveWithNoTooltip|l]ого наместника в надежде свергнуть текущее правительство и вернуть эти земли под свой контроль. Поскольку [byz_country.GetNameWithNoTooltip] ещё не успел[byz_country.Custom('end_fem')] отреагировать на действия мятежников, некоторые члены нашего двора предлагают воспользоваться случаем и присоединить [epi_country.Custom('CL_ACC')] к [ROOT.GetCountry.Custom('longname_ru_DAT')]."
 flavor_ath.13.a: "Мы заберём [epi_country.Custom('longname_ru_wntt_ACC')] себе."
 flavor_ath.13.a.entry: "$EPI$ будет принадлежать нам."
 flavor_ath.13.b: "[scope_epi_ruler.GetNameWithNoTooltip] нуждается в нашей поддержке."
 flavor_ath.13.b.entry: "Вместо этого лучше постараться поддержать его."
 flavor_ath.13.c: "[epi_country.GetAdjectiveWithNoTooltip]ие дела нас не касаются."
 flavor_ath.13.c.entry: "Заботы Эпира нас не касаются."
 flavor_ath.14.title: "Номинальные [GetCountry('LAT').GetAdjectiveWithNoTooltip|l]ие правители [scope_ach_country.Custom('CL_GEN')]"
 flavor_ath.14.entry: "Номинальный император в Ахее"
 flavor_ath.14.desc: "Находясь под покровительством #ONCLICK:COUNTRY,[scope_nap_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scope_nap_country.Custom('CL_tt')],X [scope_nap_country.Custom('CL_GEN')|L]#!#!, [scope_ach_country.Custom('longname_ru_wntt_DAT')] удалось обрести значительное влияние на фоне множества других #L [GetCountry('LAT').GetAdjective|l]их#! государств Греции. Во многом это стало возможным благодаря тому, что [scope_ach_ruler.GetName] умело [Select_CString(scope_ach_ruler.IsFemale, 'использовала', 'использовал' )] свой номинальный титул [Select_CString(scope_ach_ruler.IsFemale, 'императрицы', 'императора' )]  [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]. И хотя с падением [GetCountry('LAT').Custom('rank_ru_GEN')|l] в 1261 году этот титул во многом утратил своё былое значение, именно за счёт него [scope_ach_ruler.GetShortNameWithNoTooltip] по-прежнему пользуется поддержкой ряда [GetCountry('LAT').GetAdjectiveWithNoTooltip|l]их правителей в регионе.\n\nТем временем [ROOT.GetCountry.GetName] также постепенно набира[ROOT.GetCountry.Custom('end_etyut')] влияние, в связи с чем некоторые члены нашего двора считают, что пришло время бросить вызов [scope_ach_country.Custom('CL_DAT')] и окончательно лишить тамошних правителей всяких притязаний на наследие [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]."
 flavor_ath.14.a: "Война — лучший способ ослабить позиции [scope_ach_country.Custom('CL_GEN')]. "
 flavor_ath.14.a.entry: "Нужно вторгнуться в Ахею, чтобы их претензии стали ещё менее весомыми."
 flavor_ath.14.b: "[scope_ach_ruler.GetShortNameWithNoTooltip] может стать для нас ценным союзником."
 flavor_ath.14.b.entry: "Вместо этого лучше постараться заслужить их расположение."
 flavor_ath.14.c: "[scope_ach_ruler.GetShortNameWithNoTooltip] и [Select_CString(scope_ach_ruler.IsFemale, 'её', 'его' )] дела нас не касаются."
 flavor_ath.14.c.entry: "Заботы правителя нас не касаются."
 flavor_ath.15.title: "[the_pope.GetNameWithNoTooltip] ищет [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой поддержки в восстановлении [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]"
 flavor_ath.15.entry: "Папа предлагает возродить Латинскую империю"
 flavor_ath.15.desc: "#L [scope_papal_states.GetAdjective]ий#! дипломат прибыл [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! с весьма смелым предложением. Наблюдая за тем, как быстро наша держава набирает влияние и как слабе[scope_byz.Custom('end_etyut')] [scope_byz.GetName], [the_pope.GetNameWithNoTooltip] [Select_CString(the_pope.IsFemale, 'посчитала', 'посчитал' )], что у нас есть все шансы захватить [constantinople_location.Custom('LR_ACC')|l] [constantinople_location.GetName] и восстановить [GetCountry('LAT').Custom('longname_ru_ACC')].\n\nЕсли мы примем [Select_CString(the_pope.IsFemale, 'её', 'его' )] условия и сумеем возродить [GetCountry('LAT').Custom('longname_ru_wntt_ACC')], [the_pope.GetShortNameWithNoTooltip] гарантирует нам полную поддержку со стороны [scope_papal_states.Custom('longname_ru_wntt_GEN')], а также обещает признать нас законными правителями Константинополя."
 flavor_ath.15.a: "Примем [Select_CString(the_pope.IsFemale, 'её', 'его' )] предложение и попытаемся восстановить [GetCountry('LAT').Custom('longname_ru_wntt_ACC')]."
 flavor_ath.15.a.entry: "Согласиться на просьбу восстановить Латинскую империю."
 flavor_ath.15.b: "Пусть [the_pope.GetShortNameWithNoTooltip] оставит свои амбиции при себе."
 flavor_ath.15.b.entry: "Мы не станем идти на поводу у папских устремлений."
 flavor_ath.16.title: "Притязания на [GetCountry('THE').Custom('longname_ru_wntt_ACC')]"
 flavor_ath.16.entry: "Возвращение фессалоникийских земель"
 flavor_ath.16.desc: "Несмотря на свою короткую историю, [GetCountry('THE').GetName] имел[GetCountry('THE').Custom('end_fem')] огромное политическое влияние в пределах [GetCountry('LAT').Custom('longname_ru_GEN')], чьим вассалом он[GetCountry('THE').Custom('end_fem')] и являл[GetCountry('THE').Custom('end_assya')]. Так было до тех пор, пока [scope_theodoros_doukas.GetName] не захватил [GetCountry('THE').Custom('rank_ru_ACC')|l] в 1224 году.\n\nС тех пор номинальный титул [GetCountry('THE').Custom('CL_GEN')] принадлежит [achaea_country.Custom('longname_ru_DAT')], однако наше недавнее завоевание прежних территорий [GetCountry('THE').Custom('rank_ru_GEN')|l] даёт нам основание самим заявить права на эти земли. По мнению некоторых членов #L [ROOT.GetCountry.GetAdjective|l]ого#! двора, присвоив себе этот титул, мы сможем заметно укрепить свой статус как наследников [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]."
 flavor_ath.16.a: "Заявим свои претензии на [GetCountry('THE').Custom('longname_ru_wntt_ACC')]."
 flavor_ath.16.a.entry: "Заявить права на Фессалоники!"
 flavor_ath.16.b: "Создадим на захваченных землях новую державу."
 flavor_ath.16.b.entry: "Провозгласить на этом месте новую державу."
 flavor_ath.16.c: "Нет смысла приписывать себе давно исчезнувшие титулы."
 may_form_thessalonica: "Количество [Concept('locations', 'районов')|e], которые должны находиться в регионе [ShowScriptedGeographyName('claims_of_thessalonica_geography')] для образования [GetCountry('THE').Custom('longname_ru_wntt_GEN')], уменьшается на #L 30%#!"
 flavor_ath.17.title: "Возвращение [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetNameWithNoTooltip]"
 flavor_ath.17.entry: "Константинополь захвачен!"
 flavor_ath.17.desc: "#L [ROOT.GetCountry.GetAdjective]ие#! воины совершили невозможное и освободили #L #TOOLTIP:LOCATIONRANK,[constantinople_location.Custom('LR_tt')],X [constantinople_location.Custom('LR_ACC')|l]#!#! [constantinople_location.GetName]! На сей раз [scope_ruler.GetName] предусмотрительно [Select_CString(scope_ruler.IsFemale, 'запретила', 'запретил' )] войскам заниматься грабежом в надежде избежать повторения тех тяжёлых последствий, которые повлёк за собой Четвёртый крестовый поход. Теперь, когда прежняя греческая знать разгромлена, [scope_ruler.GetShortNameWithNoTooltip] предлагает [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ому двору восстановить [GetCountry('LAT').Custom('longname_ru_ACC')]. Хотя ощущение триумфа окрыляет многих наших чиновников, некоторые из них всё же боятся повторить судьбу падшего государства крестоносцев. По их мнению, возрождение [GetCountry('LAT').Custom('rank_ru_GEN')|l] станет возможным лишь тогда, когда [ShowScriptedGeographyName('greece_geography')] целиком окажется под нашим надёжным контролем."
 flavor_ath.17.a: "Провозгласим возрождение [GetCountry('LAT').Custom('longname_ru_wntt_GEN')]."
 flavor_ath.17.a.entry: "Провозгласить возрождение Латинской империи!"
 flavor_ath.17.b: "Сначала сосредоточимся на укреплении нашего положения в державе [ShowScriptedGeographyNameWithNoTooltip('greece_geography')]."
 flavor_ath.17.c: "Продолжим править как [ROOT.GetCountry.GetLongNameWithNoTooltip]."
 flavor_ath.17.c.entry: "Вместо этого продолжим править как и прежде."
 latin_empire_reformation_conditions_unchanged_tt: "Количество [Concept('locations', 'районов')|e], которые должны находиться в регионе [ShowScriptedGeographyName('frankokratia_geography')] для образования [GetCountry('LAT').Custom('longname_ru_wntt_GEN')], уменьшается на #L 33%#!"
