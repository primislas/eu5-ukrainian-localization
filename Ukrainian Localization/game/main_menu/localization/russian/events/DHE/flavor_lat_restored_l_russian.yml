l_russian:
 flavor_lat.1.title: "Создание новой [latin_country.GetAdjectiveWithNoTooltip|l]ой бюрократии"
 flavor_lat.1.entry: "Новая латинская бюрократия"
 flavor_lat.1.desc: "[constantinople_location.GetName] вновь под нашей властью, и теперь значительная часть #L [latin_country.GetAdjective|l]их#! элит трудится над тем, чтобы обеспечить нам прочный фундамент для новых бюрократических механизмов — они должны прийти на смену устаревшим [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]им порядкам. Мы не собираемся повторять ошибки своих предшественников: те оказались не в силах справляться с региональным давлением на [ROOT.GetCountry.Custom('longname_ru_wntt_ACC')], из-за чего в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] так и не сложилась надёжная и сильная власть.\n\n[scope_ruler.GetName] будет делать всё иначе: в [Select_CString(scope_ruler.IsFemale, 'её', 'его' )] руках в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] сложится совсем иная бюрократия — надёжная, по #L [ROOT.GetCountry.GetCulture.GetName|l]ому#! образцу."
 flavor_lat.1.a: "Создать новый, исключительно [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ий бюрократический механизм."
 flavor_lat.1.a.entry: "Создать новый, исключительный бюрократический механизм."
 flavor_lat.1.b: "Создать новый бюрократический механизм на основе старых государств крестоносцев."
 flavor_lat.1.c: "Частично перенять [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ий бюрократический механизм."
 flavor_lat.1.c.entry: "Частично перенять византийский бюрократический механизм."
 flavor_lat.1.d: "Создать бюрократический механизм по образцу каталонского."
 flavor_lat.1.e: "Создать бюрократический механизм по образцу неаполитанского."
 flavor_lat.2.title: "Нарастающая турецкая угроза в Анатолии"
 flavor_lat.2.entry: "Нарастающая турецкая угроза в Анатолии"
 flavor_lat.2.desc: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]ие владения в #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! с давних пор, ещё до возвращения нами [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName], находятся в опасном положении: им угрожают расположившиеся по соседству #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турки#!#!. Одна из самых грозных фигур среди них — [rising_turkish_country_ruler.GetName]: этот человек твёрдо намерен собрать под своей властью анатолийские земли, и #L [ROOT.GetCountry.GetAdjective|l]ие#! придворные опасаются, что отвоевание нами [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetNameWithNoTooltip] может подтолкнуть [Select_CString(rising_turkish_country_ruler.IsFemale, 'её', 'его' )] к следующему шагу; в таком случае следующей целью завоеваний станет уже [ShowScriptedGeographyName('greece_geography')]. Впрочем, страх испытывают не все: некоторые считают, что [scope_ruler.GetName] [Select_CString(scope_ruler.IsFemale, 'должна', 'должен' )] воспользоваться имеющимся преимуществом и вторгнуться в Анатолию, чтобы ослабить турок и их [rising_turkish_country.Custom('rank_ru_ACC')|l]."
 flavor_lat.2.a: "Мы оттесним их [rising_turkish_country.Custom('rank_ru_ACC')|l]!"
 flavor_lat.2.a.entry: "Мы оттесним их державу!"
 flavor_lat.2.b: "Нужно соблюдать осторожность и скорее обороняться, чем наступать."
 flavor_lat.3.title: "Великие притязания [ROOT.GetCountry.Custom('longname_ru_wntt_GEN')]"
 flavor_lat.3.entry: "$flavor_lat.3.title$"
 flavor_lat.3.desc: "После падения в 1204 году [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName] представители старой #L [ROOT.GetCountry.GetAdjective|l]ой#! элиты не стали терять времени зря: помимо попыток укрепить свою власть над #L [GetCountry('BYZ').GetAdjective|l]ими#! владениями — [ShowScriptedGeographyName('greece_geography')] оказалась для них лакомым куском — они также постарались утвердить господство над Балканами, однако [serbia_country.GetName] и [bul_country.GetName] сумели дать отпор [ROOT.GetCountry.Custom('CL_DAT')]. Желание покуситься на эти державы в конце концов привело к краху [ROOT.GetCountry.Custom('rank_ru_GEN')|l] ввиду неспособности противостоять постоянным набегам [bul_country.Custom('CL_GEN')] на [ROOT.GetCountry.Custom('CL_ACC')].\n\nСегодня же, когда [scope_ruler.GetName] властвует [ROOT.GetCountry.Custom('longname_ru_wntt_INST')], у нас есть возможность наконец завоевать эти непокорные земли, отомстив за распад [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 flavor_lat.3.a: "Мы постараемся расширить границы [ROOT.GetCountry.Custom('rank_ru_GEN')|l] за счёт старых соперников."
 flavor_lat.3.a.entry: "Мы постараемся расширить границы державы за счёт старых соперников."
 flavor_lat.3.b: "Лучше не повторять ошибок прошлого."
 flavor_lat.4.title: "Восстановление священного патриархата [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName]"
 flavor_lat.4.entry: "Восстановление священного патриархата Константинополя"
 flavor_lat.4.desc: "Хотя разорение [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName] в 1204 году вызвало резкое осуждение многих (в их числе и [pap_country.GetGovernment.GetRulerTitle|l]), невозможно отрицать, что без участия крестоносцев-#TOOLTIP:RELIGION,$catholic_tt$,X #L католиков#!#! восстановление патриархата, а следовательно, и укрепление #L [pap_country.GetAdjective|l]ой#! власти было бы невообразимо. Этот титул, впрочем, вновь утратил своё значение после того, как в 1261 году [scope_michael_palaiologos.GetName] вновь [Select_CString(scope_michael_palaiologos.IsFemale, 'завоевала', 'завоевал' )] [constantinople_location.Custom('LR_ACC')|l] [constantinople_location.GetNameWithNoTooltip].\n\nСегодня же, когда здесь вновь утвердилась #L [ROOT.GetCountry.GetAdjective|l]ая#! власть, многие [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] призывают нас восстановить патриархат."
 flavor_lat.4.a: "Разрешить восстановление патриархата."
 flavor_lat.4.b: "Поклясться всеми силами защищать восстановленный патриархат."
 flavor_lat.4.c: "Постараться усилить влияние с помощью восстановленного патриархата."
 flavor_lat.4.d: "Отказаться восстанавливать патриархат."
 latin_patriarchate_of_constantinople: "Константинопольский патриархат"
 flavor_lat.5.title: "Восстановлен контроль над Анатолией"
 flavor_lat.5.entry: "Восстановлен контроль над Анатолией"
 flavor_lat.5.desc: "Задача, стоявшая перед [ROOT.GetCountry.Custom('longname_ru_INST')], казалась невероятно сложной, однако наши отважные воины добились немалых успехов в подчинении #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#!. Немногочисленные #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецкие#!#! образования, до которых ещё не дотянулся наш меч, уже не представляют для [ROOT.GetCountry.Custom('CL_GEN')] серьёзной угрозы."
 flavor_lat.5.a: "Слава [ROOT.GetCountry.Custom('longname_ru_wntt_DAT')]!"
 flavor_lat.5.a.entry: "Слава нашей державе!"
 flavor_lat_anatolia_secured: "Каждый [Concept('location', 'район')|e] #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#!, принадлежащий #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! или нашим [Concept('subjects', 'ленникам')|e], получит [Concept('modifier', 'модификатор')|e] «[ShowModifier('lat_improved_location_integration')]» на #Y 15#! лет"
 flavor_lat.6.title: "Успешные походы в [target_country.Custom('CL_ACC')]"
 flavor_lat.6.entry: "Болгария сокрушена"
 flavor_lat.6.desc: "[target_country.GetLongName] — держава, когда-то представлявшая немалую опасность для [ROOT.GetCountry.Custom('longname_ru_GEN')] — сегодня значительно слабее, чем прежде; немалая доля бывших земель этой страны находится под #L [ROOT.GetCountry.GetAdjective|l]ой#! властью. Маловероятно, что [target_country.GetAdjectiveWithNoTooltip|l]ие элиты когда-либо смогут вернуть своей родине былое величие и вновь стать угрозой для [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 flavor_lat.6.a: "Нужно интегрировать бывшие [target_country.GetAdjectiveWithNoTooltip|l]ие провинции."
 flavor_lat.6.a.entry: "Нужно интегрировать их бывшие провинции."
 flavor_lat_balkan_rival_lands_secured: "Каждый [Concept('location', 'район')|e] #TOOLTIP:REGION,balkan_region,X #L Балкан#!#!, считающийся [Concept('core', 'национальным районом')|e] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! и принадлежащий #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! или нашим [Concept('subjects', 'ленникам')|e], получает [Concept('modifier', 'модификатор')|e] «[ShowModifier('lat_improved_location_integration')]» на #Y 15#! лет"
 flavor_lat.7.title: "[target_country.GetAdjectiveWithNoTooltip]ие устремления сокрушены"
 flavor_lat.7.entry: "Сербские устремления сокрушены"
 flavor_lat.7.desc: "Все амбиции #L [target_country.GetAdjective|l]ого#! государства, стремящегося к могуществу и величию, оказались раздавлены сапогом #L [ROOT.GetCountry.GetAdjective|l]ого#! солдата. После наших походов [target_country.GetNameWithNoTooltip] превратил[target_country.Custom('end_assya')] в мелкого игрока, почти не имеющего никакого влияния на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!. Одной заботой меньше."
 flavor_lat.7.a: "Немедленно навести порядок в провинциях, отвоёванных у [target_country.Custom('CL_GEN')]."
 flavor_lat.7.a.entry: "Немедленно навести порядок в отвоёванных провинциях."
 flavor_lat.8.title: "Старая [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ая элита"
 flavor_lat.8.entry: "Старая византийская элита"
 flavor_lat.8.desc: "После отвоевания [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName] мы не только смогли возродить [ROOT.GetCountry.Custom('longname_ru_ACC')], но и положили конец всем надеждам на восстановление [GetCountry('BYZ').Custom('longname_ru_GEN')]. Почти все представители старой [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ой элиты с неохотой присягнули на верность [ROOT.GetCountry.Custom('CL_DAT')].\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] единого мнения: история [GetCountry('BYZ').Custom('longname_ru_wntt_GEN')] подошла к концу. [ROOT.GetCountry.Custom('longname_ru_wntt_DAT')] суждено занять освободившееся место среди мировых держав и пойти своим путём."
 flavor_lat.8.a: "Пора проводить старую [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ую культуру в последний путь."
 flavor_lat.8.a.entry: "Пора проводить старую византийскую культуру в последний путь."
 flavor_lat.8.b: "Нужно сохранить в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]ий дух."
 flavor_lat.8.b.entry: "Нужно сохранить в державе византийский дух."
 flavor_lat.9.title: "[pap_country.GetAdjectiveWithNoTooltip]ая просьба об обращении православных земель"
 flavor_lat.9.entry: "Папская просьба об обращении византийских земель"
 flavor_lat.9.desc: "В обмен на помощь #L [pap_country.GetAdjective|l]ой#! стороны с восстановлением [ROOT.GetCountry.Custom('longname_ru_GEN')] мы обязались сразу после отвоевания [constantinople_location.Custom('LR_GEN')|l] [constantinople_location.GetName] поспособствовать принятию новой [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой элитой политик, направленных на ослабление влияния #TOOLTIP:RELIGION,$orthodox_tt$,X #L православной#!#! веры и укрепления #TOOLTIP:RELIGION,$catholic_tt$,X #L католичества#!#! — об этом нас просит лично [pap_country.GetGovernment.GetRulerTitle|l]. Поскольку [constantinople_location.GetNameWithNoTooltip] снова в наших руках, а [ROOT.GetCountry.GetLongNameWithNoTooltip] — в числе мировых держав, [scope_pope_ruler.GetName] [Select_CString(scope_pope_ruler.IsFemale, 'попросила', 'попросил' )] нас сдержать слово и принять обещанные политики."
 flavor_lat.9.a: "[scope_pope_ruler.GetShortNameWithNoTooltip] [Select_CString(scope_pope_ruler.IsFemale, 'заключила', 'заключил' )] с нами соглашение. Мы должны быть верны своему слову."
 flavor_lat.9.a.entry: "Он заключил с нами соглашение. Мы должны быть верны своему слову."
 flavor_lat.9.b: "Разрешить политикам вступить в силу, но не навязывать их слишком сильно."
 flavor_lat.9.c: "Нарушить соглашение и проявить терпимость к православному населению."
 lat_accepted_pope_latin_empire_proposal_tt: "Has accepted the Pope offer to restore the Latin empire"
