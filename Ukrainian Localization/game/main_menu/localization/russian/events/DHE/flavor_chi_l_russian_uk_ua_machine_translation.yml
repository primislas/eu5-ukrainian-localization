  third_past_chi_improve_pre_rtr_modifiers: "[COUNTRY.GetName] посилит[COUNTRY.Custom('end_fem')] ефекти [Concept('country_modifiers', 'модифікаторів країни')|e] до та під час #TOOLTIP:SITUATION,red_turban_rebellions,X #L повстання «Червоних пов'язок»#!#! на $VALUE|G2%$ (поточне значення модифікатора: #Y [COUNTRY.MakeScope.GetVariable('chi_rtr_modifier_intensity').GetValue|2%]#!)"
  chi_adjust_pre_rtr_modifiers_base_text: "#Y Зачіпає модифікатори «[ShowModifier('chi_factional_strife')]» та «[ShowModifier('rtr_red_turban_rebellions')]»#!"
  flavor_chi.1.title: "[target_explorer.GetNameWithNoTooltip] та наслідки [Select_CString(target_explorer.IsFemale,'її', 'його')] подорожей"
  flavor_chi.1.desc: "Без сумнівів, [ROOT.GetCountry.GetLongName] — центр світу, а землі за межами наших кордонів не варті особливої уваги. Проте, в деяких випадках знання про далекі країни можуть виявитися корисними, і тому [target_explorer.GetName] на наше прохання [Select_CString(target_explorer.IsFemale,'відправилася', 'відправився')] збирати відомості про чужі землі.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] ставиться до цієї затії без особливого схвалення — багато вельмож вважають, що #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! не личить виявляти інтерес до варварських країн. Втім, інші придворні дотримуються протилежної точки зору. Вони вірять, що країна отримає чималу користь, якщо повернеться обличчям до зовнішнього світу."
  flavor_chi.1.historical_info: "У XIV столітті у відносинах Китаю із зовнішнім світом відбулися зміни. Імператори з династії Юань налагодили контакти із Заходом і знову відкрили стародавній Шовковий шлях, за них у Китаї з'явилося безліч мусульманських, християнських та юдейських купців. Все змінилося після вигнання монголів у 1367 році — династія Мін, що прийшла до влади, поклала край політиці відкритості, що зв'язала Китай із зовнішнім світом. З 1405 по 1433 рік флотоводець Чжен Хе організував і очолив сім експедицій імператорського флоту в Індійський океан і до берегів Африки, але після його смерті Китай згорнув дослідження і остаточно перейшов до політики ізоляції."
  flavor_chi.1.a: "Внутрішня досконалість."
  flavor_chi.1.b: "Ідеальна рівновага."
  flavor_chi.1.c: "Зовнішня експансія."
  flavor_chi.2.title: "Ремонт стародавньої Великої Китайської стіни"
  flavor_chi.2.desc: "З давніх-давен безпека наших північних кордонів мала першорядне значення. На жаль, #TOOLTIP:BUILDING_TYPE,ruined_great_wall_of_china,X #L стародавня Велика Китайська стіна#!#!, збудована нашими далекими предками, нині перебуває в жалюгідному стані. Слід було б її відремонтувати, проте це вимагатиме великих витрат і мобілізації всіх трудових ресурсів країни, що, без сумніву, викличе заворушення серед наших підданих. З іншого боку, під захистом нових оборонних споруд продуктивність праці в регіоні має зрости, інакше ж північні провінції чекає вихід населення в інші краї, менш уразливі для нападів. Що ж ми вирішимо?"
  flavor_chi.2.a: "Будемо підтримувати стародавню стіну в ідеальному стані."
  flavor_chi.2.b: "Потрібен капітальний ремонт ділянки, що охороняє провінцію [target_province1.GetNameWithNoTooltip]."
  flavor_chi.2.c: "Насамперед треба полагодити ділянку в провінції [target_province2.GetNameWithNoTooltip]."
  flavor_chi.2.d: "Ми відновимо секцію, яка проходить через провінцію [target_province3.GetNameWithNoTooltip]."
  flavor_chi.2.e: "Нехай руйнується далі."
  flavor_chi.4.title: "[target_character.GetNameWithNoTooltip] пропонує реформу війська"
  flavor_chi.4.desc: "[target_character.GetName] пропонує провести низку реформ, які мають посилити наше військо та підвищити боєздатність вояків. На жаль, військо — інститут вкрай консервативний, будь-які зміни в її організації будуть складною та дорогою справою. Навіть якщо ми знайдемо кошти, військові навряд чи оцінять зміни у звичному порядку речей — реформи можуть призвести до нестабільності та масового дезертирства."
  flavor_chi.4.a: "Реформи буде проведено!"
  flavor_chi.4.b: "Ні, це надто дорого."
  flavor_chi.5.title: "Прибуття єзуїтів"
  flavor_chi.5.desc: "У наших володіннях вже не перший рік бачать чужинців із #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Їхня дивна релігія під назвою «[target_country.GetReligion.GetName|l]» з часом здатна перетворитися на загрозу для нашого усталеного укладу та #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! віри. Водночас чужинці володіють багатьма знаннями, які можуть принести нам чималу користь.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не відчуває одностайності щодо цих чужинців. Одні придворні вважають, що ми повинні користуватися всіма перевагами від їхньої присутності, навіть якщо хтось із наших підданих піддасться спокусам незнайомої релігії. Інші вельможі побоюються, що варварські ідеї, проникнувши в суспільство, похитнуть підвалини нашої країни."
  flavor_chi.5.historical_info: "У 1581 році до Китаю прибули перші єзуїтські місіонери. Вони піднесли імператору багаті дари та показали дивовижні механічні пристосування, винайдені в Європі. Єзуїти показали себе вельми освіченими людьми — вони створили для імператора величезну мапу всього світу та запропонували кілька розумних міркувань щодо реформи календаря. Разом із цим вони принесли з собою чужі релігійні та філософські ідеї, що загрожували усталеному китайському укладу."
  flavor_chi.5.a: "Їхні науки досить корисні."
  flavor_chi.5.a.tt: "Істотна частина [Concept('pops', 'населення')|e] [Concept('convert', 'звернеться')|e] у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!"
  flavor_chi.5.b: "У нашому суспільстві немає місця чужим ідеям."
  flavor_chi.6.title: "Фінансова криза"
  flavor_chi.6.desc: "Десятиліття повстань і народних заворушень укупі з корупцією, що пронизала все суспільство, поставили нашу фінансову систему на межу краху. Потрібні нові джерела коштів, але єдиний спосіб отримати їх — ввести додаткові податки. Така непопулярна міра дозволить на деякий час вирішити частину наших фінансових проблем, проте ситуація, і без того нестабільна, може стати ще гіршою. З іншого боку, через заворушення та нестачу коштів ми скоро зовсім втратимо можливість збирати податки з деяких провінцій."
  flavor_chi.6.a: "Податки доведеться підняти."
  flavor_chi.6.b: "Наші піддані й без того обурені!"
  flavor_chi.7.title: "Вигнання єзуїтів"
  flavor_chi.7.desc: "У світлі недавніх подій стає зрозуміло, що єзуїти пережили свою корисність. Хоч їхні пізнання великі, вони чужі #L [ROOT.GetCountry.GetAdjective|l]ій#! культурі та викликають велике збентеження серед мудреців і простолюду. Єзуїти роками втручалися у внутрішні справи нашої країни та підривали її стабільність, навіть намагалися впливати на успадкування [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого престолу. Час їм покинути #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!."
  flavor_chi.7.a: "Вигнати їх!"
  flavor_chi.7.b: "Вони все ще нам корисні!"
  flavor_chi.8.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.8.desc: "Нам донесли, що до країни прибула дипломатична місія з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! — далекої варварської країни на Заході. Посольство очолює [Select_CString(target_character.IsFemale,'жінка', 'чоловік')] на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона', 'Він')] має намір представити нам вигідні торгові пропозиції та запевнення дружби від [Select_CString(target_country.GetGovernment.GetRuler.IsFemale,'правительки', 'правителя')] своєї країни, а також показати безліч дивовижних механічних диковин."
  flavor_chi.8.a: "Нам нічого обговорювати з примітивними західними демонами!"
  flavor_chi.8.b: "Їхні ідеї досить цікаві."
  opinion_ideas: "Інтерес до наших ідей"
  flavor_chi.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.9.desc: "До [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого двору [Select_CString(target_character.IsFemale,'прибула незвичайна єзуїтська черниця', 'прибув незвичайний монах-єзуїт')] на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона', 'Він')] одягається на #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайський#!#! манер, дотримується багатьох китайських звичаїв і навіть говорить, як китаєць. Схоже, що [Select_CString(target_character.IsFemale,'ця вчена', 'цей вчений')] і місіонер всерйоз цікавиться науками, звичаями та географією нашої країни — і з готовністю повідає нам про свою далеку батьківщину. На відміну від багатьох своїх колег, [target_character.GetLastNameWithNoTooltip] явно [Select_CString(target_character.IsFemale,'досягла успіху', 'досяг успіху')] у справі навернення наших підданих у свою віру, і це змушує нас тривожитися — проте [Select_CString(target_character.IsFemale,'її', 'його')] пізнання в астрономії та картографії будуть нам дуже корисні."
  flavor_chi.9.a: "[target_character.GetNameWithNoTooltip] — [Select_CString(target_character.IsFemale,'бажана гостя', 'бажаний гість')] при нашому дворі."
  flavor_chi.9.b: "Нехай забирається назад до Європи!"
  flavor_chi.10.title: "«Куньюй ваньго цюаньту»"
  flavor_chi.10.desc: "Після довгої та кропіткої роботи зі зведення воєдино безлічі мап — як #TOOLTIP:CONTINENT,europe,X #L європейських#!#!, так і #TOOLTIP:SUB_CONTINENT,china,X #L китайських#!#!, — [target_character.GetName] і [Select_CString(target_character.IsFemale,'її', 'його')] #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайські#!#! помічники представили нам #italic «Куньюй ваньго цюаньту»#!, «Мапу безлічі країн світу». Це безцінне джерело інформації дає нам важливі відомості про країни та народи, що лежать далеко від наших кордонів."
  flavor_chi.10.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.10.a.tt: "Ми отримаємо велику мапу #TOOLTIP:CONTINENT,europe,X #L Європи#!#!"
  flavor_chi.11.title: "Коледж Святого Павла"
  flavor_chi.11.desc: "Єзуїтські місіонери заснували коледж у належному їм анклаві [target_location.GetName]. Серед іншого, вони хочуть навчати своїх побратимів #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайській#!#! мові та звичаям нашої країни. Єзуїти вірять, що їм буде простіше достукатися до умів і сердець китайців, якщо вони будуть у всьому схожі на нас.\n\nУ тому, що чужоземці прагнуть наслідувати нашу велику культуру, немає нічого дивного, проте слід пам'ятати, що наміри єзуїтів аж ніяк не безкорисливі. Вони хочуть уподібнитися нам з однією метою — донести свою проповідь до широких верств населення."
  flavor_chi.11.a: "Нам подобається їхній підхід."
  flavor_chi.11.b: "Ми вимагатимемо закрити цей коледж."
  flavor_chi.12.title: "Поширення християнства"
  flavor_chi.12.desc: "Багаторічна активність #TOOLTIP:RELIGIONGROUP,christian,X #L християнських#!#! місіонерів не пройшла для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! безслідно. Мало-помалу чужоземні проповідники навернули у свою віру безліч жителів однієї з наших провінцій, і тепер християнство перетворилося на домінуючу релігію цього регіону."
  flavor_chi.12.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.13.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U]-[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'християнка', 'християнин')]?"
  flavor_chi.13.desc: "Популярність #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! серед наших підданих неухильно зростає. Прихильники чужоземної релігії засідають у нашій раді, а [target_ruler.GetName] бачить у християнських місіонерах найближчих сподвижників і привітно приймає їх у столиці. Дехто каже, що скоро й [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'сама', 'сам')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] навернеться в цю римсько-#TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! віру. Якщо відкинути питання богослов'я, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] хрещення, безсумнівно, забезпечить нам дружбу та підтримку західних країн."
  flavor_chi.13.a: "Приймемо християнство."
  flavor_chi.13.b: "Це немислимо."
  flavor_chi.14.title: "[ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|U]-[Select_CString(target_character.IsFemale,'християнка', 'християнин')]"
  flavor_chi.14.desc: "Здається, [target_character.GetName], [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|l] нашого двору, всерйоз цікавиться культурою та цікавими науками західних місіонерів. Безсумнівно, що отримані [Select_CString(target_character.IsFemale,'нею', 'ним')] знання підуть на користь нашій країні, проте [Select_CString(target_character.IsFemale,'її', 'його')] недавнє навернення в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#! — це, мабуть, вже занадто."
  flavor_chi.14.a: "Звільнимо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_chi.14.b: "Аби [Select_CString(target_character.IsFemale,'вона виконувала', 'він виконував')] свою роботу."
  flavor_chi.15.title: "[Select_CString(target_character2.IsFemale,'Некомпетентна радниця', 'Некомпетентний радник')]"
  flavor_chi.15.desc: "[target_character.GetName] невпинно вимагає, щоб лише найздібніші та найкомпетентніші вельможі могли обіймати найвищі державні посади при дворі. [ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] — це зібрання найвидатніших умів, інакше й бути не може.\n\nНа жаль, іноді навіть найпрестижніші посади опиняються в руках негідних. [target_character2.GetName] демонструє рідкісну некомпетентність на своїй посаді, [Select_CString(target_character2.IsFemale, 'її', 'його' )] вказівки відверто шкодять роботі державного апарату."
  flavor_chi.15.a: "Негайно знімемо [Select_CString(target_character2.IsFemale, 'її', 'його' )] з посади."
  flavor_chi.15.b: "[target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale, 'повинна', 'повинен' )] повернутися додому… і більше не повертатися до двору."
  flavor_chi.15.c: "Дамо [Select_CString(target_character2.IsFemale, 'їй', 'йому' )] ще одну нагоду."
  flavor_chi.16.title: "Скандал у раді"
  flavor_chi.16.desc: "Палацові коридори завжди повні чуток та інтриг, проте останні новини привели служниць та євнухів у справжнє шаленство. Виявилося, що [target_character2.GetName] відкрито зневажає піднесену та витончену #L [ROOT.GetCountry.GetCulture.GetName|l]у#! культуру! [Select_CString(target_character2.IsFemale,'Вона мала', 'Він мав')] сміливість заявити, що #L [target_culture.GetName|l]а#! культура в усіх відношеннях перевершує нашу! Цей обурливий демарш загрожує самим основам нашої країни, адже якщо навіть при дворі завелися подібні [Select_CString(target_character2.IsFemale,'їй', 'йому')] бур'яни, що чекає на решту країни?"
  flavor_chi.16.a: "Проженемо [Select_CString(target_character2.IsFemale,'її', 'його')] геть зі двору."
  flavor_chi.16.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] вище подібних звинувачень."
  based_on_spiritualist_vs_humanist_tt: "З урахуванням поточної спрямованости нашого суспільства між #TOOLTIP:SOCIETAL_VALUE,spiritualist_vs_humanist,X #L духовністю#!#! та #TOOLTIP:SOCIETAL_VALUE,spiritualist_vs_humanist,X #L терпимістю#!#!:"
  flavor_chi.17.title: "Рідке срібло"
  flavor_chi.17.desc: "Мистецтво алхімії, вивчення властивостей мінералів — інтригуюче заняття, що яскраво ілюструє притаманну нам винахідливість. На щастя, до двору щойно [Select_CString(target_character2.IsFemale,'прибула обізнана', 'прибув обізнаний')] у таємницях алхімії [Select_CString(target_character2.IsFemale,'жінка', 'чоловік')] на ім'я [target_character2.GetShortName]. [Select_CString(target_character2.IsFemale,'Вона', 'Він')] обіцяє розкрити секрети дивовижних нових еліксирів…"
  flavor_chi.17.a: "Цікаво…"
  flavor_chi.17.b: "Нам це не потрібно."
  this_may_shorten_ruler_lifespan_tt: "Цей вибір може сильно позначитися на здоров'ї персонажа [target_character.GetShortNameWithNoTooltip]"
  flavor_chi.18.title: "Далеко від дому"
  flavor_chi.18.desc: "[ROOT.GetCountry.GetCapital.GetName] — це [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l], де життя б'є ключем, і [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий двір — не виняток. Придворні постійно зайняті підготовкою до чергового бенкету, радники складають нові укази — загалом, мешканці палацу завжди перебувають при ділі. Попри цю вічну зайнятість, багато хто мріє заслужити місце в нашій раді. Тим дивніше, що останнім часом [target_character2.GetShortName] перебуває в найпохмурішому настрої.\n\nУ відповідь на розпитування [Select_CString(target_character2.IsFemale,'вона', 'він')] починає розповідати про [target_location.Custom('LR_PREP')|l] [target_location.GetName], де [Select_CString(target_character2.IsFemale,'народилася', 'народився')]. З тих часів минуло вже близько [ROOT.GetVariable('character_age_display_variable').GetValue] років, і тепер усе, про що [Select_CString(target_character2.IsFemale,'вона', 'він')] мріє — повернутися додому до родини та насолодитися спокійним життям далеко від гамірної столиці. Можливо, в адміністрації [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] знайдеться містечко для [Select_CString(target_character2.IsFemale,'жінки її', 'людини його')] здібностей…"
  flavor_chi.18.a: "Родина найважливіша. Нехай вирушає додому."
  flavor_chi.18.b: "А хто займатиметься справами країни?"
  target_province_gets_pop_sat_and_prosperity_tt: "Наші [Concept('locations', 'місцевості')|e] у провінції [target_province.GetName] отримають #G +[ROOT.GetVariable('character_prosperity_gain_variable_display').GetValue]%#! до [Concept('prosperity', 'процвітання')|e], а групи [Concept('pops', 'населення')|e], що там мешкають, отримають #G +[ROOT.GetVariable('character_pop_satisfaction_gain_variable_display').GetValue]%#! до [Concept('pop_satisfaction', 'задоволення')|e] завдяки навичкам персонажа [target_character2.GetShortNameWithNoTooltip]"
  based_on_the_abilities_of_cabinet_tt: "Залежно від об'єднаних навичок персонажів [target_character.GetShortNameWithNoTooltip] та [target_character2.GetShortNameWithNoTooltip]:"
  flavor_chi.19.title: "Друзі у верхах"
  flavor_chi.19.desc: "Узи, що пов'язують справжніх друзів, священні. Яскравий тому приклад — [target_character.GetName] та [target_character2.GetName]. Удвох вони склали зворушливий панегірик, присвячений єднанню споріднених душ та спільній роботі в [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій раді.\n\nОсь що вони пишуть: «Ти не продаси, не купиш безцінний дар друзів, і все ж він дорожчий і золота, і каміння. Мертве на дотик золото, і холодно блищить, але у важку хвилину воно не підбадьорить. До благань багатство глухе і серця позбавлене, не буде втіхи — йому ж усе одно. Коли до неба звернешся з молитвою своєю — ти не проси багатства, а люблячих друзів!»"
  flavor_chi.19.a: "Вони — приклад для всіх нас."
  flavor_chi.19.b: "Ми завжди чудово розбиралися в людях."
  every_location_in_province_food_prosperity_satisfaction_tt: "[Concept('locations', 'Місцевості')|e] у провінції [target_province.GetName] отримають #G +[ROOT.GetVariable('target_province_control_prosperity_variable_display').GetValue]%#! до [Concept('prosperity', 'процвітання')|e], а групи [Concept('pops', 'населення')|e], що там мешкають, отримають #G +[ROOT.GetVariable('target_province_control_pop_satisfaction_variable_display').GetValue]%#! до [Concept('pop_satisfaction', 'задоволення')|e] завдяки нашому [Concept('control', 'контролю')|e] над регіоном"
  target_province_loses_prosperity_and_pop_satisfaction_tt: "[Concept('locations', 'Місцевості')|e] провінції [target_province.GetName] втратять [ShowNamedValue('prosperity_very_weak_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а [Concept('pop_satisfaction', 'задоволення')|e] [Concept('pops', 'груп населення')|e] у цих місцевостях знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]"
  flavor_chi.20.title: "Голод у провінції [target_province.GetNameWithNoTooltip]"
  flavor_chi.20.desc: "Жителі провінції [target_province.GetName] кілька років поспіль страждають від неврожаю. Негаразди та лихі передвістя наповнюють їхні серця невпевненістю, довіра до уряду неухильно падає. Днями місцева влада прислала до двору гінця — вони благають нас допомогти провінції з продовольством. Радники нагадують, що ефективність нашої допомоги безпосередньо залежатиме від рівня розвитку місцевої інфраструктури…"
  flavor_chi.20.a: "Допомагати підданим — наш обов'язок."
  flavor_chi.20.b: "Це нам не по кишені…"
  flavor_chi.21.title: "Відновлення павільйону Тенван"
  flavor_chi.21.desc: "Жителям [target_location.Custom('LR_GEN')|l] [target_location.GetName] пощастило народитися в багатому та процвітаючому краї, повному родючих полів та садів. Враховуючи стратегічне розташування в самому серці #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!, не дивно, що ця місцевість бурхливо розвивається та приваблює безліч купців з усіх кінців країни. Щоб підкреслити високий статус [target_location.Custom('LR_GEN')|l], а заодно продемонструвати багатство та розкіш нашої країни, [target_character.GetName] пропонує відновити павільйон принца Тена — чудовий пам'ятник старовинної китайської архітектури."
  flavor_chi.21.a: "Нехай відроджений павільйон стане перлиною провінції [target_province.GetNameWithNoTooltip]."
  flavor_chi.21.b: "Нам це не по кишені."
  target_province_gets_20_prosperity: "Усі належні нам [Concept('location', 'місцевості')|e] в [Concept('province', 'провінції')|e] [target_province.GetNameWithNoTooltip] отримають [ShowNamedValue('prosperity_severe_bonus')|+=2%] до [Concept('prosperity', 'процвітання')|e]"
  every_pop_target_province_loses_25_satisfaction_tt: "Усі селянські [Concept('pop', 'групи населення')|e] в [Concept('province', 'провінції')|e] [target_province.GetNameWithNoTooltip] втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  every_pop_25_satisfaction_gain_tt: "Усі селянські [Concept('pop', 'групи населення')|e] в [Concept('province', 'провінції')|e] [target_province.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_chi.22.title: "Великий флотоводець"
  flavor_chi.22.desc: "Простолюду та військовополоненим рідко випадає нагода піднятися соціальними сходами, і якщо це все ж відбувається, значить, йдеться про людину справді виняткову. Саме такий євнух на ім'я [target_character.GetName]. Ще дитиною він потрапив у полон, був оскопленим і взятий на службу до князя #TOOLTIP:AREA,yunnan_area,X #L Юньнаня#!#!. [target_character.GetShortNameWithNoTooltip] швидко завоював довіру свого пана, і його відправили продовжувати освіту в #TOOLTIP:LOCATION,dadu,X #L Ханбалик#!#!. Незабаром [target_character2.GetName] [Select_CString(target_character2.IsFemale,'помітила', 'помітив')] молодого євнуха і [Select_CString(target_character2.IsFemale,'оцінила', 'оцінив')] його старання. [target_character.GetShortNameWithNoTooltip] має всі підстави стати великим флотоводцем та видатним провідником нашого великого народу."
  flavor_chi.22.a: "Відмінна кандидатура для військового командування країни."
  flavor_chi.22.b: "Євнухам не можна довіряти!"
  flavor_chi.23.title: "[target_character.GetNameWithNoTooltip] піднімає повстання"
  flavor_chi.23.desc: "Наші війська щойно придушили повстання. Заколотників [Select_CString(target_character.IsFemale, 'очолювала дрібна чиновниця', 'очолював дрібний чиновник' )] на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Незадоволена', 'Незадоволений' )] нашою політикою, [Select_CString(target_character.IsFemale, 'вона спровокувала', 'він спровокував' )] бунт, [Select_CString(target_character.IsFemale, 'захопила', 'захопив' )] [target_location.Custom('LR_ACC')|l] [target_location.GetName] і [Select_CString(target_character.IsFemale, 'стратила', 'стратив' )] багатьох державних службовців.\n\nБільшість #L [ROOT.GetCountry.GetCulture.GetName|l]их#! придворних сходяться на думці, що всьому виною недостатня лояльність #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! чиновників. Ми повинні обмежити їхні привілеї, щоб подібні події ніколи не повторилися."
  flavor_chi.23.a: "Ми не дозволимо їм спровокувати ще один бунт."
  flavor_chi.23.b: "Нічого не вдієш, без таких умілих чиновників країна як без рук."
  flavor_chi.24.title: "[recipient.GetNameWithNoTooltip] планує переворот"
  flavor_chi.24.desc: "Через деспотичну політику, яку останні кілька років проводить [couped_character.GetName], політичний клімат на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! абсолютно змінився. [Select_CString(couped_character.IsFemale, 'Вона', 'Він' )] має практично необмежену владу, [Select_CString(couped_character.IsFemale, 'її', 'його' )] боїться [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] — і навіть [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сама', 'сам' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]!\n\nБажаючи покласти край [Select_CString(couped_character.IsFemale, 'її', 'його' )] тиранії, [recipient.GetName] [Select_CString(recipient.IsFemale, 'задумала', 'задумав' )] палацовий переворот. [Select_CString(recipient.IsFemale, 'Вона', 'Він' )] планує скинути свого дядька — а якщо вийде, то й [Select_CString(recipient.IsFemale, 'самій', 'самому' )] зайняти посаду верховного канцлера. У змові [Select_CString(ruler_scope.IsFemale, 'замішана', 'замішаний' )] навіть [ruler_scope.GetName] — і не дивно, адже [Select_CString(ruler_scope.IsFemale, 'їй', 'йому' )] не терпиться звільнитися від впливу могутнього вельможі."
  flavor_chi.24.a: "Ми виділимо кошти на цей проєкт."
  flavor_chi.24.b: "[recipient.GetNameWithNoTooltip] і [Select_CString(recipient.IsFemale, 'її', 'його' )] змова будуть викриті!"
  flavor_chi.24.c: "Як тільки [couped_character.GetNameWithNoTooltip] позбудеться влади, ми завдамо удару!"
  flavor_chi.25.title: "[recipient.GetNameWithNoTooltip] претендує на посаду"
  flavor_chi.25.desc: "[dead_character.GetName] [Select_CString(dead_character.IsFemale, 'мертва', 'мертвий' )], і посада провідного радника у справах #L [ROOT.GetCountry.GetAdjective|l]ого#! двору залишається вільною. Втім, у [Select_CString(dead_character.IsFemale, 'покійної', 'покійного' )] залишається наступник — [Select_CString(dead_character.IsFemale, 'її', 'його' )] [Select_CString(recipient.IsFemale, 'племінниця', 'племінник' )] [recipient.GetName]. [Select_CString(recipient.IsFemale, 'Ця жінка', 'Ця людина' )] має всі навички, необхідні для царедворця, і чудово підходить на цю посаду. Проте багато хто при дворі проти цього призначення — [dead_character.GetShortNameWithNoTooltip] [Select_CString(dead_character.IsFemale, 'запам'яталася', 'запам'ятався' )] своїми жорстокими та деспотичними методами, і придворні побоюються, що [recipient.GetNameWithNoTooltip] чинитиме так само."
  flavor_chi.25.a: "[recipient.GetNameWithNoTooltip] отримає свою посаду."
  flavor_chi.25.b: "Нам не потрібен ще один тиран."
  YUA_benefits_of_toqto: "Добившись призначення, [recipient.GetName] буде переслідувати політику #TOOLTIP:SOCIETAL_VALUE,sinicized_vs_unsinicized,X #L китаїзації#!#! та скасує рішення свого дядька. Крім того, [Select_CString(recipient.IsFemale, 'вона', 'він' )] відмовиться від [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,direct_appointment,X #L прямого призначення#!#! на державні посади та #TOOLTIP:POLICY,limit_the_han_powers,X #L заборони на чиновницькі посади#!#!."
  flavor_chi.26.title: "Доля іспитів кецзюй"
  flavor_chi.26_27.common_desc: "Прийшовши до влади, [target_character.GetName] збирається скасувати багато указів свого дядька."
  flavor_chi.26.desc: "$flavor_chi.26_27.common_desc$\n\nОдним з найбільш згубних його рішень є скасування системи іспитів та запровадження натомість #TOOLTIP:POLICY,direct_appointment,X #L прямого призначення#!#! чиновників. Ліквідація цього старовинного інституту, який протягом століть справно постачав здібних кандидатів на державні посади, завдала непоправної шкоди #L [ROOT.GetCountry.GetAdjective|l]ій#! бюрократії.\n\nНа щастя, [target_character.GetShortNameWithNoTooltip] твердо [Select_CString(target_character.IsFemale, 'має намір', 'має намір' )] #TOOLTIP:POLICY,continue_the_imperial_examination,X #L відновити практику державних іспитів#!#!. Будемо сподіватися, що цього буде достатньо, аби повернути народу віру в систему та забезпечити приплив нових претендентів."
  flavor_chi.26.a: "Так ми й зробимо."
  flavor_chi.26.b: "Можливо, [dead_character.GetNameWithNoTooltip] у чомусь мав рацію."
  flavor_chi.27.title: "[ShowLawNameWithNoTooltip('status_of_the_han_law')]"
  flavor_chi.27.desc: "$flavor_chi.26_27.common_desc$\n\n[Select_CString(target_character.IsFemale, 'Вона вирішила', 'Він вирішив' )] згорнути політику #TOOLTIP:POLICY,limit_the_han_powers,X #L заборони на чиновницькі посади#!#!, яка викликала стільки обурення серед наших #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! підданих і стала причиною повстань у всіх куточках [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Поки був живий [dead_character.GetName], ніхто не наважувався відкрито виступати проти цієї заборони, але навіть тоді більшість вельмож вважали її надмірно суворою."
  flavor_chi.27.a: "Ми скасовуємо заборону!"
  flavor_chi.27.b: "Збереження цієї політики в наших інтересах."
  yua_every_chinese_pop_will_get_20_satisfaction: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pop', 'груп населення')|e], що належать до #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#! [Concept('culture_group', 'культурної групи')|e], зросте на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_chi.28.title: "$three_histories_china$"
  flavor_chi.28.desc: "Бажаючи залишити по собі гідну спадщину, [target_character.GetName] [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] доповнити [ROOT.GetCountry.GetGovernment.GetAdjective|l]у хроніку #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! літописами попередніх династій Ляо, Сун і Цзінь.\n\nПодолавши чималі труднощі, [target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його' )] помічники зуміли завершити цю титанічну працю всього за кілька років, однак подібна швидкість неминуче призводить до безлічі неточностей та помилок. Ці недоліки скомпрометували авторитет хроніки, і в майбутньому вона, безсумнівно, потребуватиме доопрацювання."
  flavor_chi.28.a: "І все одно це чудове доповнення до нашої історії!"
  flavor_chi.29.title: "[target_character.GetNameWithNoTooltip] підноситься"
  flavor_chi.29.desc: "Всім давно відомо, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] та [Select_CString(ruler_scope.IsFemale, 'її', 'його' )] [Select_CString(target_character.IsFemale, 'наложниця', 'наложник' )] [target_character.GetName] душі не чують одне в одному. Проте [target_character.GetShortNameWithNoTooltip] не може претендувати на високе становище при дворі, адже зведення [Select_CString(target_character.IsFemale, 'простої наложниці', 'простого наложника' )] до рангу [Select_CString(target_character.IsFemale, 'імператорської дружини', 'імператорського чоловіка' )] викличе грандіозний скандал. Але тепер, коли [deceased_wife.GetName] [Select_CString(target_character.IsFemale, 'покинула', 'покинув' )] цей світ, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ruler_scope.IsFemale, 'отримала', 'отримав' )] нагоду призначити [Select_CString(target_character.IsFemale, 'свою кохану імператрицею-консортом', 'свого коханого імператором-консортом' )]."
  flavor_chi.29.a: "Так! І до біса незгодних!"
  flavor_chi.29.b: "Ми не можемо дозволити собі скандал при дворі."
  flavor_chi.30.title: "Найсильніші дощі в провінції [target_province.GetNameWithNoTooltip]"
  flavor_chi.30.desc: "На провінцію [target_province.GetName] обрушилася ціла серія природних катаклізмів. Негода завдала тут величезної шкоди, цілі села буквально стерті з лиця землі. Гірше того, [ShowScriptedGeographyName('chinese_canal_geography')] через зливи вийшов з берегів. Судноплавство зупинилося, південь і північ країни виявилися фактично відрізаними один від одного.\n\nТеоретично канал можна відновити, але це вимагатиме величезних коштів, яких у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L] зараз просто немає. Але як [ROOT.GetCountry.Custom('rank_ru_DAT')|l] жити без Великого каналу?"
  flavor_chi.30.a: "Це справжня трагедія для нашої країни."
  destroy_grand_canal_china_tt: "[ShowScriptedGeographyName('chinese_canal_geography')] стане практично марним. Ефект #TOOLTIP:STATIC_MODIFIER,chi_grand_canal,X #V #L «Великий китайський канал»#!#!#! буде замінений ефектом #TOOLTIP:STATIC_MODIFIER,chi_grand_canal_destruction,X #V #L «Пошкодження Великого китайського каналу»#!#!#!"
  repair_grand_canal_china_tt: "[ShowScriptedGeographyName('chinese_canal_geography')] буде відновлено. Ефект #TOOLTIP:STATIC_MODIFIER,chi_grand_canal_destruction,X #V #L «Пошкодження Великого китайського каналу»#!#!#! зміниться на #TOOLTIP:STATIC_MODIFIER,chi_grand_canal,X #V #L «Великий китайський канал»#!#!#!"
  flavor_chi.32.title: "Захоплення [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_chi.32.desc: "[target_location.GetRank.GetName] [target_location.GetName] нарешті в наших руках. Падіння цього символу #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольського#!#! панування стало справжнім тріумфом #L [ROOT.GetCountry.GetAdjective|l]ої#! зброї. Можливо, саме цей останній поштовх нарешті примусить ворога сісти за стіл переговорів."
  flavor_chi.32.a: "Відтепер ця земля називатиметься Умиротвореним Північчю."
  flavor_chi.32.b: "Це велика перемога!"
  flavor_chi.33.title: "Північна Юань"
  flavor_chi.33.desc: "Останні десятиліття видалися для нас вкрай складними. #TOOLTIP:SITUATION,red_turban_rebellions,X #L Повстання «Червоних пов'язок»#!#!, що охопило всю країну, та найважча економічна криза поставили [ROOT.GetCountry.Custom('rank_ru_ACC')|l] на межу краху. Ніхто більше не вважає нашу країну втіленням #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#! — те, що від неї залишилося, тепер називають Північна Юань. [ROOT.GetCountry.GetLongName|U] поки ще тримається, але це, на жаль, ненадовго. І все ж одного дня ми повстанемо, змиємо ганьбу приниження і знову заслужимо прихильність небес."
  flavor_chi.33.a: "Ми повернемося, коли прийде час."
  NORTHERN_YUA: "Північна Юань"
  flavor_chi.34.title: "Посилення ойратської конфедерації"
  flavor_chi.34.desc: "У західній частині нашої країни утворилася могутня конфедерація племен, очолювана #TOOLTIP:CULTURE,$oirat_culture_tt$,X #L ойратами#!#!. Вплив цих кочівників посилюється з кожним днем, особливо в околицях їхньої столиці — [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Ми фактично втратили контроль над регіоном, і в підсумку кочові племена проголосили незалежність. Їхні дії ставлять під загрозу цілісність [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_chi.34.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.34.b: "Цей заколот вимагатиме нашого втручання."
  flavor_chi.36.title: "Втеча до [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]"
  flavor_chi.36.desc: "Падіння [lost_capital.Custom('LR_GEN')|l] [lost_capital.GetName] стало справжньою катастрофою для #L [ROOT.GetCountry.GetAdjective|l]ої#! країни. Усе, що нам тепер залишається — боягузливо сховатися за стінами [current_capital.Custom('LR_GEN')|l] [current_capital.GetName] або відступити до [target_location.Custom('LR_ACC')|l] [target_location.GetName], зберігши залишки гордості. У будь-якому разі противник кине проти нас усі сили."
  flavor_chi.36.a: "Відчинити ворота! Ми йдемо до [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]!"
  flavor_chi.36.b: "Яка сумна доля…"
  flavor_chi.37.title: "Загибель [target.Custom('LR_GEN')|l] [target.GetNameWithNoTooltip]"
  flavor_chi.37.desc: "Ми захопили [target.Custom('LR_ACC')|l] [target.GetName] — літню столицю #ONCLICK:COUNTRY,[target_owner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_owner.Custom('CL_tt')],X [target_owner.Custom('CL_GEN')|L]#!#!. Звичай вимагає спалити [target.Custom('LR_ACC')|l], щоб налякати ворога та примусити його до якнайшвидшої капітуляції. Навіть якщо противник оговтається від удару, йому нікуди буде повертатися."
  flavor_chi.37.a: "Спалити все дотла!"
  flavor_chi.37.b: "Ми не чіпатимемо поселення."
  flavor_chi.38.title: "Відступ до [target_location.Custom('LR_DAT')|l] [target_location.GetNameWithNoTooltip]"
  flavor_chi.38.desc: "Справи у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! йдуть усе гірше. Схоже, що навіть у [current_capital.Custom('LR_PREP')|l] [current_capital.GetName] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не може почуватися в безпеці. Ворог наступає з усіх боків, і було б розумним скомандувати стратегічний відхід до нашої стародавньої столиці — [target_location.Custom('LR_DAT')|l] [target_location.GetName]."
  flavor_chi.38.a: "Прощавай, [current_capital.GetNameWithNoTooltip]. Одного дня ми повернемося."
  flavor_chi.38.b: "Ми не можемо віддати столицю ворогу."
  flavor_chi.39.title: "Майбутнє [subject_country.Custom('CL_GEN')]"
  flavor_chi.39.desc: "Бачачи колапс нашої країни, данники та васали відпадають один за одним. Наступним може стати [subject_country.GetLongName] — спільне володіння #ONCLICK:COUNTRY,[chain_initiator.Custom('CL_tt')] #TOOLTIP:COUNTRY,[chain_initiator.Custom('CL_tt')],X [chain_initiator.Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Втративши основні порти, наша знесилена країна вже не в змозі керувати островом — не кажучи вже про те, щоб придушити повстання, що там назріває. Розумніше, якщо цим володінням керуватиме [target_country.GetLongName], — це хоча б зміцнить відносини між нашими країнами."
  flavor_chi.39.a: "Ми передамо острів під [target_country.GetAdjectiveWithNoTooltip|l]ий контроль."
  flavor_chi.39.b: "Попри всі труднощі, ми не покинемо острів."
  flavor_chi.40.title: "[chain_initiator.GetNameWithNoTooltip] передає нам [subject_country.Custom('CL_ACC')]"
  flavor_chi.40.desc: "[chain_initiator.GetLongName|U] зараз у глибокому занепаді, і це ставить під загрозу майбутнє нашого спільного володіння #ONCLICK:COUNTRY,[subject_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[subject_country.Custom('CL_tt')],X [subject_country.Custom('CL_INST')|L]#!#!.\n\nНа щастя, нещодавні заворушення на острові переконали [chain_initiator.GetAdjectiveWithNoTooltip|l]у владу відмовитися від своїх претензій на острів. Відтепер він буде у винятковому володінні нашої країни."
  flavor_chi.40.a: "Як і слід було очікувати."
  flavor_chi.40.b: "Але це не в наших інтересах…"
  flavor_chi.41.title: "$peony_pavilion$"
  flavor_chi.41.desc: "Наше правління стало добою розквіту #L [ROOT.GetCountry.GetAdjective|l]ого#! мистецтва. Одним із найвищих досягнень нашої культури є [ShowWorkOfArtTypeName('play')|l] #italic «Півонієва альтанка»#! — історія двох закоханих на ім'я Ду Лінян та Лю Менмей, яким доводиться пройти безліч випробувань, щоб бути разом. [target_character.GetArtistType.GetName|U] [target_character.GetName], [Select_CString(target_character.IsFemale, 'яка створила', 'який створив' )] цей твір, по праву вважається одним із найвидатніших драматургів в історії [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_chi.41.a: "Чудово! Прекрасно! Браво!"
  flavor_chi.42.title: "Відновлення мечеті Нюцзе"
  flavor_chi.42.desc: "Колись у [target_location.Custom('LR_PREP')|l] [target_location.GetName] стояла величезна мечеть Нюцзе. Її побудували 996 року, за часів династії Ляо. Коли 1215 року в країну вторгся $genghis_khan_name$, мечеть була зруйнована. Руїни цього величного #TOOLTIP:WORK_OF_ART_TYPE,monument,X #L пам'ятника#!#! досі стоять серед чудових палаців [target_location.Custom('LR_GEN')|l]. Можливо, настав час відновити мечеть — наші #L [target_religion.GetAdjective|l]і#! піддані напевно оцінять цей жест."
  flavor_chi.42.a: "Мечеть буде відновлено."
  flavor_chi.42.b: "Нам це не по кишені."
  flavor_chi.43.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] місія до Китаю"
  flavor_chi.43.desc: "Нам донесли, що до країни прибула дипломатична місія з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! — далекої варварської країни на Заході. Посольство очолює знатна особа на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона має намір', 'Він має намір')] представити нам вигідні торгові пропозиції та запевнення дружби від [Select_CString(target_country.GetGovernment.GetRuler.IsFemale,'правительки', 'правителя')] своєї країни, а також показати безліч дивовижних механічних диковин."
  flavor_chi.43.a: "Нам нічого обговорювати з примітивними західними демонами!"
  flavor_chi.43.b: "Ми раді цьому посольству."
  flavor_chi.44.title: "Євнухи [ROOT.GetCountry.Custom('longname_ru_nott_GEN')]"
  flavor_chi.44.desc: "Мало хто в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] може зрівнятися за впливом із палацовими євнухами. Ці сановники мають величезну владу і часто переслідують власні цілі — часом навіть [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сама', 'сам' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] їм не указ. Багато придворних радників незадоволені цим звичаєм, вони закликають обмежити вплив євнухів на державні справи."
  flavor_chi.44.a: "Ми не можемо прогнівити євнухів."
  flavor_chi.44.b: "Їхню владу потрібно обмежити!"
  chi_how_to_strengthen_the_reform: "Ефект від [Concept('government_reform', 'державної реформи')|e] «[ShowGovernmentReformName('empower_the_eunuchs')]» може бути збільшений наступними [Concept('events', 'подіями')|e], які дають [Concept('modifier', 'модифікатор')|e] «[ShowModifierTypeName('eunuch_power')]»."
  flavor_chi.45.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.45.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'достойна дочка', 'достойний син' )] провінції [target_province.GetName], — [Select_CString(target_character.IsFemale, 'одна', 'один' )] з найвидатніших [Select_CString(target_character.IsFemale, 'поетес та письменниць', 'поетів та письменників' )] нашого часу. Творячи під кількома псевдонімами, такими як Шен'ань, Бонань-шань-жень та Дяньнань-шу-ши, [Select_CString(target_character.IsFemale, 'вона опублікувала', 'він опублікував' )] безліч творів, в основному зосереджених на природі та культурі. Деякі з цих творів вже прославилися на всю країну, тож [Select_CString(target_character.IsFemale, 'її', 'його' )] ім'я назавжди буде вписано в національну історію."
  flavor_chi.45.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.46.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.46.desc: "Нас знову [Select_CString(target_character.IsFemale, 'вшанувала', 'вшанував' )] своєю присутністю [Select_CString(target_character.IsFemale, 'відома воєначальниця', 'відомий воєначальник' )] [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] батько подбав про те, щоб [Select_CString(target_character.IsFemale, 'вона отримала', 'він отримав' )] чудову освіту, таку ж, як і [Select_CString(target_character.IsFemale, 'її', 'його' )] брати: [target_character.GetNameWithNoTooltip] чудово знає історію, розбирається в класичній літературі, володіє бойовими мистецтвами, вміє стріляти з лука та скакати верхи. До всього іншого, [Select_CString(target_character.IsFemale, 'вона', 'він' )] пише чудові вірші. Враховуючи [Select_CString(target_character.IsFemale, 'її', 'його' )] військовий досвід, [Select_CString(target_character.IsFemale, 'ця жінка', 'цей чоловік' )] стане чудовим доповненням до нашого двору."
  flavor_chi.46.a: "Ми запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] військову посаду."
  flavor_chi.46.b: "Нехай пише для нас вірші."
  flavor_chi.46.c: "[ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] потребує таких людей!"
  flavor_chi.47.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.47.desc: "До нас дійшли чутки про [Select_CString(target_character.IsFemale, 'одну вельми видатну жінку', 'одну вельми видатну людину' )]. [target_character.GetName] — не просто талановитий #TOOLTIP:ARTIST,scientist,X #L вчений#!#!, [Select_CString(target_character.IsFemale, 'вона', 'він' )] з молодих років [Select_CString(target_character.IsFemale, 'проявляла', 'проявляв' )] здатність до навчання і з роками [Select_CString(target_character.IsFemale, 'освоїла', 'освоїв' )] безліч найрізноманітніших навичок та вмінь. Завдяки своїй родині [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'отримала', 'отримав' )] чудову освіту і [Select_CString(target_character.IsFemale, 'зуміла', 'зумів' )] проявити себе, незважаючи на панівні в нашому суспільстві забобони.\n\n[Select_CString(target_character.IsFemale, 'Така жінка', 'Така людина' )], як [Select_CString(target_character.IsFemale, 'вона', 'він' )], [Select_CString(target_character.IsFemale, 'могла', 'міг' )] б стати в пригоді при нашому дворі."
  flavor_chi.47.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] потребує таких людей, як [target_character.GetNameWithNoTooltip]!"
  flavor_chi.47.b: "Нам це не цікаво."
  flavor_chi.48.title: "[Select_CString(target_character.IsFemale, 'Стійка захисниця', 'Стійкий захисник' )]"
  flavor_chi.48.desc: "В одному з наших провінційних гарнізонів сталося справжнє диво! Зіткнувшись із неминучим заколотом, [Select_CString(target_character.IsFemale, 'жінка', 'людина' )] на ім'я [target_character.GetName] [Select_CString(target_character.IsFemale, 'взяла', 'взяв' )] на себе командування і [Select_CString(target_character.IsFemale, 'відбила', 'відбив' )] напад зрадників, заслуживши чималу славу. Подібна демонстрація військового мистецтва назавжди залишиться в пам'яті нащадків."
  flavor_chi.48.a: "[Select_CString(target_character.IsFemale, 'Вона заслужила', 'Він заслужив' )] підвищення."
  flavor_chi.48.b: "Таке трапляється часто-густо."
  flavor_chi.49.title: "Вище наглядове відомство [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_chi.49.desc: "Цензурне управління — одна з найефективніших та найвпливовіших урядових організацій. На чолі цього відомства стоїть [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сама', 'сам' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], до його завдань входить суворий [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий контроль за всіма гілками влади. Будучи взірцями моралі та етики, цензори стежать за поведінкою придворних чиновників та викорінюють корупцію.\n\nВ останні роки ефективність роботи нашого адміністративного апарату безперервно зростала, і зараз з'явилася можливість зміцнити один із напрямків діяльності цензорів."
  flavor_chi.49.a: "Ми посилимо [ShowModifierWithNoTooltip('chi_palace_branch')|l] та підвищимо ефективність стеження за поведінкою чиновників."
  flavor_chi.49.b: "Посиливши [ShowModifierWithNoTooltip('chi_admonishment_branch')|l], ми забезпечимо належне виконання всіх процедур відповідно до небесного закону."
  flavor_chi.49.c: "[ShowModifierWithNoTooltip('chi_touring_censors')] допоможуть підтримувати мир та порядок у країні."
  flavor_chi.49.d: "Жоден відділ не отримає преференцій."
  flavor_chi.50.title: "Східне та Західне бюро"
  flavor_chi.50.desc: "Могутні [ROOT.GetCountry.GetGovernment.GetAdjective|l]і органи влади здавна мали великий вплив у палацових справах. Зіткнувшись із посиленням внутрішніх загроз, наші радники пропонують створити ще одне [ROOT.GetCountry.GetGovernment.GetAdjective|l]е відомство, повністю зайняте боротьбою з корупцією та придворними інтригами."
  flavor_chi.50.a: "Треба заснувати Західне бюро."
  flavor_chi.50.b: "Ми сформуємо Східне бюро."
  flavor_chi.50.c: "У євнухів і без того забагато влади!"
  flavor_chi.51.title: "$porcelain_tower$"
  flavor_chi.51.desc: "Кожному ясно, що в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! починається новий вік миру та процвітання. На ознаменування початку нової прекрасної доби варто звести гідний #TOOLTIP:WORK_OF_ART_TYPE,monument,X #L пам'ятник#!#!, що відображає велич правлячої династії. Влада розглядає різні варіанти, але найбільшою підтримкою користується проєкт будівництва грандіозної пагоди в самому серці [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Цій величній споруді судилося стати новим символом [target_location.Custom('LR_GEN')|l] [target_location.GetName]."
  flavor_chi.51.a: "Ми не пошкодуємо коштів!"
  flavor_chi.51.b: "На жаль, нам це не по кишені."
  flavor_chi.52.title: "Будівництво Порцелянової пагоди завершено!"
  flavor_chi.52.desc: "Будівництво чудової пагоди в серці [target_location.Custom('LR_GEN')|l] [target_location.GetName] нарешті закінчено. Будівля, зведена з найкращого #L [ROOT.GetCountry.GetAdjective|l]ого#!#TOOLTIP:GOODS,porcelain,X #L порцеляни#!#!, гордо височіє над гамірними вулицями. Вона вже стала головною міською пам'яткою. Але справжня краса пагоди розкривається лише тоді, коли вежі торкаються сонячні промені, — це вражаюче видовище може зворушити навіть найбезчутливіші серця."
  flavor_chi.52.a: "Приголомшливе видовище!"
  flavor_chi.53.title: "[ShowBuildingTypeNameWithNoTooltip('forbidden_city')]"
  flavor_chi.53.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] та [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] давно потребують нової резиденції, звідки можна ефективніше займатися справами країни. Після довгих роздумів вибір припав на [target_location.Custom('LR_ACC')|l] [target_location.GetName] — найвідповідніше місце для північної столиці.\n\n[target_character.GetName] негайно [Select_CString(target_character.IsFemale, 'доручила', 'доручив' )] придворним сановникам та зодчим розробити проєкт нового палацу. Кілька місяців потому вони представили план #TOOLTIP:BUILDING_TYPE,forbidden_city,X #L Забороненого міста#!#! — величезного комплексу з кількох сотень будівель, здатних вмістити тисячі придворних та слуг."
  flavor_chi.53.a: "Ми негайно починаємо будівництво!"
  flavor_chi.53.b: "Шкода, що у нас немає зайвого золота…"
  CHI_event_will_fire_within_10_to_20_years: "Закінчення будівництва викличе [Concept('event', 'подію')|e], яка відбудеться через 10–20 років."
  flavor_chi.54.title: "Заборонений палац побудовано"
  flavor_chi.54.desc: "Будівництво розкішного #TOOLTIP:BUILDING_TYPE,forbidden_city,X #L Забороненого міста#!#! нарешті завершено, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вже готується переїхати до нової резиденції. Безсумнівно, що палац використовуватиметься як мінімум як зимова резиденція монарха, при цьому значення [target_location.Custom('LR_GEN')|l] [target_location.GetName] для країни помітно зросте."
  flavor_chi.54.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] дуже [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'задоволена', 'задоволений' )] новим палацом."
  flavor_chi.54.b: "Найважливіші питання все одно вирішуватимуться в [current_capital.Custom('LR_PREP')|l] [current_capital.GetNameWithNoTooltip]."
  flavor_chi.55.title: "«Юань ши»"
  flavor_chi.55.desc: "Згідно зі звичаєм, кожна нова #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайська#!#! династія повинна скласти літопис попередньої династії та включити її до збірки офіційних хронік. Настав час написати історію і #ONCLICK:COUNTRY,[GetCountry('YUA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('YUA').Custom('CL_tt')],X [GetCountry('YUA').Custom('CL_GEN')|L]#!#!. [target_character.GetName] вже [Select_CString(target_character.IsFemale, 'визвалася', 'визвався' )] скласти цю працю, але для виконання цього задуму [Select_CString(target_character.IsFemale, 'їй', 'йому' )] знадобляться кошти…"
  flavor_chi.55.a: "Ми виділимо трохи грошей."
  flavor_chi.55.b: "Доведеться відмовитися від цього проєкту."
  flavor_chi.56.title: "«Цзу сюнь лу»"
  flavor_chi.56.desc: "[target_character.GetName|U] — [Select_CString(target_character.IsFemale, 'мудра государиня', 'мудрий государ' )] з амбітними планами. На жаль, немає жодних гарантій, що після неминучої кончини [Select_CString(target_character.IsFemale, 'великої правительки', 'великого правителя' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(target_character.IsFemale, 'її', 'його' )] наступники будуть настільки ж обізнані в державних справах.\n\nОсь чому [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] скласти книгу настанов для нащадків, щоб [ROOT.GetCountry.Custom('CL_ACC')] не спіткала доля попередніх династій."
  flavor_chi.56.a: "Присвятити більше розділів принципам легалізму."
  flavor_chi.56.b: "Скласти список країн, на які краще не нападати."
  flavor_chi.56.c: "Застерегти нащадків про зрадників та внутрішніх ворогів."
  flavor_chi.56.d: "Роз'яснити майбутнім правителям важливість розвитку інфраструктури."
  flavor_chi.56.e: "Навчити їх мистецтву написання законів."
  flavor_chi.56.f: "Нам це ні до чого."
  chi_subsequent_rulers: "Наступні правителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! будуть дотримуватися цих настанов — або відмовляться від них."
  flavor_chi.57.title: "Реформа іспитів Кюцзей"
  flavor_chi.57.desc: "Ні для кого не секрет, що [target_character.GetName] відчуває величезний інтерес до військової справи. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] хоче перетворити [ROOT.GetCountry.Custom('rank_ru_ACC')|l] на могутню військову силу, тим самим не тільки зміцнивши свою владу, а й назавжди позбавивши країну страху перед чужоземними вторгненнями.\n\nБажаючи навчити майбутні покоління державних чиновників військовій справі, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] збирається включити до [ShowLawName('keju_examination')|l] багато військових дисциплін. Тепер, крім звичної математики, каліграфії та права, претендентам доведеться складати іспити з верхової їзди та стрільби з лука."
  flavor_chi.57.a: "Ми додамо ці предмети до програми."
  flavor_chi.57.b: "У змінах немає потреби."
  flavor_chi.58.title: "«Стобуквений панегірик»"
  flavor_chi.58.desc: "За роки свого правління [target_character.GetName] часто [Select_CString(target_character.IsFemale, 'приймала', 'приймав' )] підданих #L [target_religion.GetAdjective|l]ої#! віри — і безперечно [Select_CString(target_character.IsFemale, 'пройнялася', 'пройнявся' )] симпатією до їхніх звичаїв. Щоб зміцнити цю незвичайну дружбу, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] бажає скласти офіційний панегірик, що прославляє пророка Мухаммада та його релігію."
  flavor_chi.58.a: "Панегірик буде написаний."
  flavor_chi.58.b: "Навіщо це взагалі?"
  flavor_chi.58.c: "Це й справді дивовижна релігія!"
  chi_every_sunni_pop_gains_10_satisfaction: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pop', 'груп населення')|e], що сповідують #L [target_religion.GetAdjective|l]у#! [Concept('religion', 'віру')|e], зросте на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]."
  chi_every_sunni_country_gets_bias: "Кожна [Concept('country', 'країна')|e], що сповідує #L [target_religion.GetAdjective|l]у#! [Concept('religion', 'віру')|e], отримує [ShowBiasValue('chi_praised_islam')] до свого [Concept('opinion', 'ставлення')|e] [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!."
  flavor_chi.59.title: "Доля іспитів кецзюй"
  flavor_chi.59.desc: "Багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже давно скаржаться на [ShowLawName('keju_examination')|l], звинувачуючи їх у неефективності. Вони закликають до їх повного скасування та пропонують узаконити призначення чиновників на основі особистих рекомендацій — що, безсумнівно, вельми на руку представникам знаті, які мають широкі зв'язки."
  flavor_chi.59.a: "Ми дослухаємося їхньої поради."
  flavor_chi.59.b: "На таке ми не підемо."
  flavor_chi.60.title: "Дотримання рекомендацій"
  flavor_chi.60.desc: "[ROOT.GetVariable('chi_ancestor').GetCharacter.GetName], предок [Select_CString(new_ruler.IsFemale, 'нинішньої правительки', 'нинішнього правителя' )], [Select_CString(ROOT.GetVariable('chi_ancestor').GetCharacter.IsFemale, 'залишила', 'залишив' )] докладні настанови для майбутніх володарів. [Select_CString(ROOT.GetVariable('chi_ancestor').GetCharacter.IsFemale, 'Її', 'Його' )] вказівки, що складаються з 13 розділів, присвячених управлінню країною, а також списку країн, на які не слід нападати, були зведені в книгу під назвою $flavor_chi.56.title$. Але [Select_CString(new_ruler.IsFemale, 'готова', 'готовий' )] чи [new_ruler.GetName] дотримуватися застережень та порад [Select_CString(ROOT.GetVariable('chi_ancestor').GetCharacter.IsFemale, 'великої попередниці', 'великого попередника' )]?"
  flavor_chi.60.a: "Книгу слід уважно вивчити."
  flavor_chi.60.b: "Пф, [new_ruler.GetNameWithNoTooltip] краще знає, як чинити!"
  flavor_chi.61.title: "Хранителі двору"
  flavor_chi.61.desc: "З моменту свого посилення євнухи значно зміцнили своє становище при дворі. Тепер кожен, хто бажає зустрітися з [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'божественною імператрицею', 'божественним імператором' )], спочатку повинен звернутися до них — і євнухи, зрозуміло, не підпускають до [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'неї', 'нього' )] нікого, хто їм хоч чимось неугодний. При цьому [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сама', 'сам' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] перебуває в блаженному невіданні."
  flavor_chi.61.a: "Сподіваємося, що це не призведе до зловживань."
  flavor_chi.62.title: "[Select_CString(target_character.IsFemale, 'Вихована', 'Вихований' )] євнухами"
  flavor_chi.62.desc: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Юна', 'Юний' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [target_character.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'зійшла', 'зійшов' )] на #L [ROOT.GetCountry.GetAdjective|l]ий#! трон куди раніше, ніж ми очікували. [target_regent.GetName] не [Select_CString(target_regent.IsFemale, 'зуміла', 'зумів' )] приборкати придворних євнухів, і [target_character.GetNameWithNoTooltip] швидко [Select_CString(target_character.IsFemale, 'потрапила', 'потрапив' )] під вплив цього могутнього угруповання, фактично ставши її маріонеткою."
  flavor_chi.62.a: "Ось так і руйнуються імперії…"
  flavor_chi.63.title: "Ворожий радник"
  flavor_chi.63.desc: "За словами палацових євнухів, радник [target_character.GetName] [Select_CString(target_character.IsFemale, 'вчинила', 'вчинив' )] зраду і [Select_CString(target_character.IsFemale, 'має бути ув'язнена', 'має бути ув'язнений' )] під варту. Подібне звинувачення не стало несподіванкою — останніми днями [Select_CString(target_character.IsFemale, 'вона відкрито виступала', 'він відкрито виступав' )] проти угруповання наймогутніших євнухів і, очевидно, [Select_CString(target_character.IsFemale, 'спровокувала', 'спровокував' )] їх на відповідні заходи. Проте під цим звинуваченням можуть бути й серйозніші підстави, тому його треба розглянути з усією ретельністю."
  flavor_chi.63.a: "Євнухи ніколи не помиляються."
  flavor_chi.63.b: "Скільки можна терпіти їхні зловживання?"
  flavor_chi.63.c: "Євнухи, які за цим стоять, отримають батогів."
  flavor_chi.64.title: "Вірні слуги двору"
  flavor_chi.64.desc: "Поза всяким сумнівом, на світі немає надійніших слуг, ніж євнухи. Тим із них, хто не спокушений у політиці, можна доручати простіші завдання — на кшталт роботи в садах або на кухні, а найобдарованіші здатні виконувати найрізноманітніші державні обов'язки. А головне — вони не прагнутимуть захоплення влади заради заснування власної династії!"
  flavor_chi.64.a: "Нам потрібно більше євнухів."
  flavor_chi.64.b: "У палаці їх і без того забагато!"
  flavor_chi.65.title: "Добровільне оскоплення"
  flavor_chi.65.desc: "Простолюд [target_location.Custom('LR_GEN')|l] [target_location.GetName] із заздрістю спостерігає за розкішним життям палацових євнухів. Прекрасні побутові умови, близькість до [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'правительки', 'правителя' )], безмежні можливості для кар'єрного зростання — лише деякі з переваг, якими володіють євнухи порівняно зі звичайними людьми. Життя євнуха виглядає настільки привабливо, що багато бідняків у [target_location.Custom('LR_PREP')|l] добровільно йдуть на оскоплення, щоб потрапити на службу до палацу."
  flavor_chi.65.a: "Чим більше у нас євнухів, тим краще."
  flavor_chi.65.b: "Жоден чоловік не повинен йти на подібне."
  flavor_chi.66.title: "Владні повноваження"
  flavor_chi.66.desc: "Один із високопоставлених євнухів був помічений за розмовою з сановником, що представляє #TOOLTIP:GOVERNMENT_REFORM,three_departments_system,X #L три департаменти#!#!. Зазвичай [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] приймає радників самостійно, але цього разу євнух-секретар сам зустрів його і прийняв за [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'правительку', 'правителя' )] важливе державне рішення. Тепер [target_character.GetName] задається питанням — а чи не занадто багато прав і привілеїв отримали палацові євнухи?"
  flavor_chi.66.a: "Час скасувати деякі рішення."
  flavor_chi.66.b: "Чим менше роботи [Select_CString(target_character.IsFemale, 'змушена', 'змушений' )] виконувати [target_character.GetNameWithNoTooltip], тим краще."
  flavor_chi.67.title: "Чистки в уряді [ROOT.GetCountry.Custom('longname_ru_nott_GEN')]"
  flavor_chi.67.desc: "Кругообіг життя і смерті зачіпає все на світі, і бюрократія країни не виняток. [ROOT.GetCountry.GetGovernment.GetRulerTitle|U] занадто довго [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'роздаровувала', 'роздаровував' )] свою милість неблагонадійним елементам у владі, поки ті наживалися і поширювали корупцію. Настав час розібратися із чиновниками, що зарвалися, поки їхній вплив не став надто великим!"
  flavor_chi.67.a: "Час нагадати євнухам їхнє місце!"
  flavor_chi.67.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.68.title: "Прохання про відставку"
  flavor_chi.68.desc: "Сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] зібрався на звичайне засідання, і кілька високопоставлених чиновників зажадали, щоб [target_character.GetName] [Select_CString(target_character.IsFemale, 'усунула', 'усунув' )] з посади впливового євнуха на ім'я [eunuch.GetName]. [Select_CString(eunuch.IsFemale, 'Її', 'Його' )] суперники, серед яких є навіть інші євнухи, звинувачують сановника в корупції та зловживанні владою. Біда в тому, що [eunuch.GetNameWithNoTooltip] виконує найважливіші функції в управлінні країною, і [Select_CString(eunuch.IsFemale, 'її', 'його' )] усунення може призвести до серйозних політичних ризиків."
  flavor_chi.68.a: "Їхня думка для нас — порожній звук!"
  flavor_chi.68.b: "Можливо, вони мають рацію."
  flavor_chi.69.title: "Безмежна влада євнухів"
  flavor_chi.69.desc: "Всі вже розуміють, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] фактично [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'відсторонилася', 'відсторонився' )] від управління країною. Втім, інакше й бути не могло, адже нині вся повнота влади зосереджена в руках ради євнухів, очолюваної могутніми сановниками. Подібна концентрація влади може призвести країну до катастрофи."
  flavor_chi.69.a: "Нам зовсім нема про що турбуватися…"
  flavor_chi.70.title: "Вбивці-змовники"
  flavor_chi.70.desc: "Нам вдалося з'ясувати, що [eunuch.GetName] та інші високопоставлені євнухи задумали політичне вбивство. Ціллю вбивць стане [murder_target.GetName] — один із найрізкіших критиків правлячої кліки. Слід було б негайно ув'язнити змовників, проте це може викликати бурю обурення серед впливових євнухів. Що ж нам робити, щоб врятувати жертві життя?"
  flavor_chi.70.a: "Закриємо на це очі."
  flavor_chi.70.b: "Заарештувати євнуха!"
  flavor_chi.71.title: "Заборона морської торгівлі"
  flavor_chi.71.desc: "Наше узбережжя давно страждає від постійних набігів піратів, через них у прибережних провінціях запанував справжній хаос. Щоб покінчити з піратством, ми маємо намір ввести #TOOLTIP:POLICY,haijin_policy,X #L Хайцзінь#!#! — повну заборону на морську торгівлю, за винятком торгівлі з данниками. Це дозволить викорінити будь-яку протизаконну діяльність у прибережних водах."
  flavor_chi.71.a: "Ввести Хайцзінь."
  flavor_chi.71.b: "Заборона призведе до економічної катастрофи."
  flavor_chi.72.title: "Реформа збройних сил"
  flavor_chi.72.desc: "Наше нинішне військо нічим не відрізняється від того, яке ми стільки разів громили під час #TOOLTIP:SITUATION,red_turban_rebellions,X #L повстання «Червоних пов'язок»#!#!. Воно досі дотримується архаїчних порядків, успадкованих від кочових орд династії [GetCountry('YUA').GetName]. Настав час трансформувати збройні сили та привести їх у відповідність до поточних потреб країни. Відтепер наше військо буде організоване у варти та тисячі, чисельністю по 5600 та 1120 осіб відповідно. Крім того, у мирний час вояки будуть зобов'язані обробляти власні земельні ділянки, щоб не витрачати ресурси країни."
  flavor_chi.72.a: "Ми проведемо ці реформи."
  flavor_chi.72.b: "Такі реформи нам не по кишені."
  flavor_chi.73.title: "Великі рескрипти"
  flavor_chi.73.desc: "[target_character.GetName|U] стверджує, що падіння попередньої династії було спричинене повальною корупцією та самоправством державних сановників. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] наполягає на запровадженні суворішого законодавства, яке дозволить уберегти #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! від тієї ж долі."
  flavor_chi.73.a: "Ми викорінимо корупцію!"
  flavor_chi.73.b: "Корупція в нашому уряді? Та бути того не може!"
  chi_ming_dynasty_code_will_be_changed: "До #TOOLTIP:POLICY,chi_ming_dynasty_code_policy,X #L Повного зводу законів#!#! будуть додані ефекти від модифікатора «[ShowModifier('chi_grand_pronouncements')]»."
  integrated_grand_prounouncements: "«[ShowModifier('chi_grand_pronouncements')]» стали частиною #TOOLTIP:POLICY,chi_ming_dynasty_code_policy,X #L Повного зводу законів#!#!."
  flavor_chi.74.title: "Складання нового зводу законів"
  flavor_chi.74.desc: "Усі останні роки наші чиновники невпинно працювали над складанням нового зводу законів та указів. Проєкт законодавства неодноразово переглядався, одне лише останнє оновлення включає величезну кількість поправок та змін. Мабуть, час уже закінчити редагування #TOOLTIP:POLICY,chi_ming_dynasty_code_policy,X #L Повного зводу#!#! та прийняти його як офіційний #TOOLTIP:LAW,legal_code_law,X #L звід законів#!#! [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_chi.74.a: "Негайно затвердити новий звід!"
  flavor_chi.74.b: "Нехай пройде ще кілька редакцій."
  flavor_chi.75.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]а змова?"
  flavor_chi.75.desc: "[ruler_scope.GetName] [Select_CString(ruler_scope.IsFemale, 'прознала', 'прознав' )] про можливу змову, на чолі якої стоїть [target_character.GetName] — голова Верховної канцелярії, що наглядає за діяльністю #TOOLTIP:GOVERNMENT_REFORM,three_departments_system,X #L трьох департаментів#!#!. За словами донощика, [target_character.GetShortNameWithNoTooltip] замишляє скинути [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'правительку', 'правителя' )]. У цій історії є низка сумнівних моментів, але загалом вона виглядає досить переконливо — а головне, підрив могутності канцелярії може послужити нашим інтересам."
  flavor_chi.75.a: "Негайно стратити [Select_CString(target_character.IsFemale, 'її', 'його' )] та розпустити Верховну канцелярію!"
  flavor_chi.75.b: "Нехай у секретаріаті служать чиновники з академії Ханьлінь."
  flavor_chi.75.c: "Це просто чутки."
  flavor_chi.76.title: "Велика лейшу"
  flavor_chi.76.desc: "[target_character.GetName|U] — не просто [Select_CString(target_character.IsFemale, 'достойна', 'достойний' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] та [Select_CString(target_character.IsFemale, 'Дочка', 'Син' )] Неба, а й допитливий учений. Не останнє місце серед [Select_CString(target_character.IsFemale, 'її', 'його' )] честолюбних устремлінь завжди займало складання великої енциклопедії-#italic лейшу#!. Тепер, ставши [Select_CString(target_character.IsFemale, 'володаркою', 'володарем' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'отримала', 'отримав' )] можливість нарешті здійснити свою мрію."
  flavor_chi.76.a: "Приступити до складання енциклопедії!"
  flavor_chi.76.b: "Нам це не по кишені."
  flavor_chi.77.title: "Робота над енциклопедією закінчена"
  flavor_chi.77.desc: "Довгі роки старанної праці тисяч учених нарешті принесли свої плоди, і [target_character.GetName] [Select_CString(target_character.IsFemale, 'побачила', 'побачив' )] здійснення свого грандіозного задуму. [ShowModifier('chi_grand_encyclopedia')|U] налічує понад десять тисяч томів, вона містить відомості про безліч праць, класичних та сучасних. Це велике досягнення стане частиною [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої спадщини та гарантує, що [target_character.GetShortNameWithNoTooltip] назавжди залишиться в історії країни."
  flavor_chi.77.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.78.title: "Закон одного батога"
  flavor_chi.78.desc: "Фіскальна система [ROOT.GetCountry.Custom('longname_ru_GEN')] є хаотичним нагромадженням різноманітних податкових режимів, що сяк-так співіснують один з одним. Неефективність цієї конструкції не дозволяє уряду повною мірою використовувати податкову базу країни. Для вирішення цієї проблеми пропонується запровадити #TOOLTIP:GOVERNMENT_REFORM,single_whip_law,X #L «Закон одного батога»#!#!, який зобов’яже всіх [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] сплачувати державні податки #TOOLTIP:GOODS,silver,X #L сріблом#!#!. На жаль, у країні бракує грошової маси, необхідної для виконання цієї вимоги."
  flavor_chi.78.a: "Ми все одно проведемо цю реформу!"
  flavor_chi.78.b: "У нас просто немає такої кількості срібла."
  flavor_chi.79.title: "Внутрішня школа"
  flavor_chi.79.desc: "Після #TOOLTIP:GOVERNMENT_REFORM,empower_the_eunuchs,X #L розширення повноважень євнухів#!#! кількість палацових євнухів, що служать при #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі, стрімко збільшилася. На жаль, багато з них не вміють читати й писати — від них не буде користі навіть у провінційних відомствах, не кажучи вже про високі міністерські посади. Нам би не завадив спеціальний заклад, де молоді євнухи навчатимуться грамоти, не покидаючи палацових стін."
  flavor_chi.79.a: "Так ми й зробимо."
  flavor_chi.79.b: "Нехай краще залишаються неграмотними."
  flavor_chi.80.title: "Експедиція до Маньчжурії"
  flavor_chi.80.desc: "Безкраї степи Маньчжурії все ще слабо заселені, а багато варварських племен цього краю навіть не чули про велику #L [ROOT.GetCountry.GetAdjective|l]у#! країну. Час організувати експедицію до пониззя Амуру та переконати місцевих вождів стати нашими #TOOLTIP:SUBJECT_TYPE,tributary,X #L данниками#!#!. [Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з наших [Select_CString(target_character.IsFemale, 'воєначальниць', 'воєначальників' )], [target_character.GetName], вже [Select_CString(target_character.IsFemale, 'визвалася', 'визвався' )] очолити це підприємство."
  flavor_chi.80.a: "Ми підтримаємо [Select_CString(target_character.IsFemale, 'її', 'його' )] ініціативу."
  flavor_chi.80.b: "Краще витратимо ресурси на щось інше."
  flavor_chi.81.title: "Прибуття [expedition_country.GetAdjectiveWithNoTooltip|l]ої експедиції"
  flavor_chi.81.desc: "До наших земель прибула експедиція з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Загін чужинців очолює [Select_CString(target_character.IsFemale, 'якась', 'якийсь' )] [target_character.GetName]; [Select_CString(target_character.IsFemale, 'вона', 'він' )] вимагає, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] негайно [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'прийняла', 'прийняв' )] [Select_CString(target_character.IsFemale, 'її', 'його' )]. Ми вважаємо, що непрохані гості сподіваються зробити нас своїми #TOOLTIP:SUBJECT_TYPE,tributary,X #L данниками#!#!. Чи варто вислухати їхню пропозицію?"
  flavor_chi.81.a: "Послухаємо, що запропон[expedition_country.Custom('endlong_itat')] [expedition_country.GetLongNameWithNoTooltip]."
  flavor_chi.81.b: "Ми нікому не підкоримося!"
  flavor_chi.82.title: "Нурганська військова комісія"
  flavor_chi.82.desc: "Наша експедиція досягла гирла річки Амур і зупинилася в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Посланцям #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вдалося досягти взаєморозуміння з місцевим вождем, але вони потребують фінансової підтримки та військової допомоги, щоб утримати в покорі підкорені племена."
  flavor_chi.82.a: "Комісія отримає все необхідне."
  flavor_chi.82.b: "Вони вже зробили все, що нам потрібно."
  flavor_chi.83.title: "«Білий Лотос» у провінції [target_province.GetNameWithNoTooltip]!"
  flavor_chi.83.desc: "Хтось [target_character.GetName], [Select_CString(target_character.IsFemale, 'учасниця', 'учасник' )] «Товариства Білого Лотоса» з [target_location.Custom('LR_GEN')|l] [target_location.GetName], сіє смуту в рідних краях. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] провінції [target_province.GetName] прислухаються до крамольних промов. Вони вірять в обіцянки благоденства для тих, хто приєднається до [Select_CString(target_character.IsFemale, 'баламутки', 'баламута' )].\n\nЧас визнати, що в країні назріває нове повстання."
  flavor_chi.83.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  white_lotus_rebellion: "Повстання Білого Лотоса"
  flavor_chi.83.tooltip: "Група заколотників «[target_rebel.GetName]» отримає в союзники всі #TOOLTIP:POPTYPE,peasants,X #L селянські#!#! [Concept('pop', 'групи населення')|e] у [Concept('province', 'провінції')|e] [target_province.GetName], і вони отримають ROOT.ScriptValue('pop_satisfaction_mild_penalty')|%=+] до [Concept('pop_satisfaction', 'задоволення')|e].\nУсі [Concept('location', 'місцевості')|e] [Concept('province', 'провінції')|e] [target_province.GetName] на [SCOPE.GetLocalVariable('length_of_agitation').GetValue|2-] р. отримають [Concept('location_modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,chi_white_lotus_agitation,X #V #L «Пропаганда „Білого Лотоса“»#!#!."
  flavor_chi.84.title: "Вісім тигрів"
  flavor_chi.84.desc: "В історії й раніше були періоди, коли євнухи мали величезний вплив на зовнішню та внутрішню політику [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Але останнім часом у палаці все частіше говорять про кліку з восьми могутніх євнухів, з якими не може впоратися навіть [Select_CString(ruler_scope.IsFemale, 'сама', 'сам' )] [ruler_scope.GetName]! Ця група, відома як «Вісім тигрів», повністю контролює двір і жорстоко розправляється з будь-якими суперниками.\n\nЛідером угруповання вважається всесильний євнух на ім'я [target_character.GetName]. Вплив [Select_CString(target_character.IsFemale, 'цієї жінки', 'цієї людини' )] настільки великий, що за [Select_CString(target_character.IsFemale, 'нею', 'ним' )] закріпилося прізвисько, що недвозначно натякає на те, що [Select_CString(target_character.IsFemale, 'вона', 'він' )] і є [Select_CString(target_character.IsFemale, 'істинна господиня', 'істинний господар' )] країни."
  flavor_chi.84.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] вимагає, щоб узурпація влади негайно припинилася!"
  flavor_chi.84.b: "Якщо вони хочуть самостійності, то й нехай."
  flavor_chi.84.historical_info: "За часів правління імператора Чженде з династії Мін великим впливом при дворі користувалася кліка євнухів «Вісім тигрів», очолювана Лю Цзінем. Ця група вирішувала, кого допустити до імператора, контролювала чиновників і збагачувалася за рахунок хабарництва та погроз. Дії цих людей породили глибоке невдоволення серед освіченої бюрократії та призвели до нестабільності в уряді. Кліка розпалася в 1510 році, коли Лю Цзіня стратили за звинуваченням у зраді. У пізню добу Мін вона перетворилася на символ загрози, яку можуть становити євнухи, що отримали необмежену владу."
  flavor_chi.85.title: "Контрабанда солі"
  flavor_chi.85.desc: "У провінції [target_province.GetName] з'явилася чергова група контрабандистів, що незаконно промишляють #TOOLTIP:GOODS,salt,X #L сіллю#!#!. Це може здатися дрібницею, однак соляна промисловість дуже важлива для економіки [ROOT.GetCountry.Custom('rank_ru_GEN')|l] — недарма в прислів'ї сіль називається однією з семи необхідних у житті речей. Злочинці, що торгують сіллю в обхід [ROOT.GetCountry.GetGovernment.GetAdjective|l]их законів, не просто ображають владу — вони шкодять інтересам уряду та зазіхають на доходи скарбниці."
  flavor_chi.85.a: "З ними потрібно негайно розібратися!"
  flavor_chi.85.b: "Нехай цим займаються місцеві органи влади."
  flavor_chi.85.c: "Це не наша проблема."
  flavor_chi.86.title: "Корупція в цензурному управлінні"
  flavor_chi.86.desc: "Нещодавнє розслідування виявило масштабну корупцію в цензурному управлінні [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Важко повірити, що відомство, створене спеціально для боротьби з хабарництвом, повністю загрузло в цій ваді. При дворі панує рідкісна одностайність — усі, крім самих продажних цензорів, чудово розуміють, що це може призвести країну до загибелі."
  flavor_chi.86.a: "Ми посилимо боротьбу з хабарництвом!"
  flavor_chi.86.b: "Яка ще корупція? Цензори кажуть, що ніякої корупції у нас немає!"
  flavor_chi.87.title: "Ремонт каналу"
  flavor_chi.87.desc: "[ShowModifier('chi_grand_canal')] відігравав найважливішу роль в економіці #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної країни#!#!, доки його не розмили найсильніші зливи. З того часу канал прийшов у непридатність, поки радники, один за одним змінюючи один одного на посаді, ніяк не могли знайти гроші на його відновлення. На щастя, тепер у скарбниці достатньо золота, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] бажає, щоб канал був терміново відремонтований."
  flavor_chi.87.a: "Ми відновимо Великий канал."
  flavor_chi.87.b: "Нам це не по кишені."
  flavor_chi.88.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.88.desc: "Завдяки єзуїтській місії нас відвідало чимало заморських гостей, і не останнє місце серед них посідає [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Ця дивовижна жінка', 'Ця дивовижна людина' )] щиро захоплюється нашою прекрасною країною та багатою культурою. Оселившись серед наших підданих, [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'склала', 'склав' )] безліч записів про флору та фауну наших земель, [Select_CString(target_character.IsFemale, 'її', 'його' )] також цікавлять секрети нашої медицини."
  flavor_chi.88.a: "Вражаюче!"
  flavor_chi.89.title: "Великий флот"
  flavor_chi.89.desc: "[ROOT.GetCountry.GetLongName] — славна #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединна Країна#!#! — готується явити свою велич усьому відомому світу. Для цього потрібно створити новий флот з величезними кораблями, трюми яких здатні вмістити не тільки наші щедрі дари, а й скарби, якими нас обсипатимуть під час цих урочистих подорожей."
  flavor_chi.89.historical_info: "На рубежі XV століття імператор країни $MNG$ вирішує створити так званий золотий флот. Перший наказ був відданий у 1403 році, і в результаті безліч кораблів було переобладнано та побудовано з нуля."
  flavor_chi.89.a: "Приступимо до будівництва."
  flavor_chi.89.b: "Це марна трата грошей."
  flavor_chi.90.title: "Втеча з [ROOT.GetCountry.Custom('CL_GEN')|l]"
  flavor_chi.90.desc: "#TOOLTIP:POLICY,haijin_policy,X #L Хайцзінь#!#! сильно змінює обстановку. Раніше на нашому узбережжі розташовувалося безліч торгових підприємств, якими керували купецькі родини. Їхня не цілком законна діяльність безпосередньо загрожувала ефективності та легітимності нашої системи данників, підриваючи усталені принципи номінального обміну. Після введення заборони на морську торгівлю всі ці купці, серед яких — і [target_character.GetName], тікають з нашої країни."
  flavor_chi.90.a: "Ось і добре!"
  flavor_chi.91.title: "Глава купців?"
  flavor_chi.91.desc: "#TOOLTIP:POLICY,haijin_policy,X #L Хайцзінь#!#! на території #ONCLICK:COUNTRY,[from.GetName.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.GetName.Custom('CL_tt')],X [from.GetName.Custom('CL_GEN')|L]#!#! призводить до відтоку #TOOLTIP:SUB_CONTINENT,china,X #L китайських#!#! купців. Щоб вижити, багато хто звертається до піратства та інших незаконних способів заробітку. Тепер [target_character.GetName] — людина з чималою відомістю в цих краях і значною політичною вагою серед влади #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, — має намір стати главою новоявлених піратів."
  flavor_chi.91.a: "Такий лідер може нам стати в пригоді."
  flavor_chi.91.b: "Ми розгромимо [Select_CString(target_character.IsFemale,'цю', 'цього')] вискочку!"
  flavor_chi.92.title: "[ShowWorkOfArtNameWithNoTooltip('hong_lu_meng')]"
  flavor_chi.92.desc: "[target_character2.GetName] відчуває особливу пристрасть до колекціонування книг, і тому в #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі зростає інтерес до вишуканої літератури та найталановитіших авторів [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. На щастя, нам на очі [Select_CString(target_character.IsFemale, 'потрапила талановита письменниця', 'потрапив талановитий письменник' )] на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] походить з колись славної, але нині занепалої [ROOT.GetCountry.GetAdjectiveWithNoTooltip|]ої династії. [target_character.GetName] [Select_CString(target_character.IsFemale, 'пізнала', 'пізнав' )] чимало горя, але [Select_CString(target_character.IsFemale, 'вона', 'він' )] хоче закарбувати свої спогади в новій праці під назвою «[ShowWorkOfArtName('hong_lu_meng')]». У ній [Select_CString(target_character.IsFemale, 'вона', 'він' )] розповість історію багатої та впливової родини, яка втратила все в політичному хаосі. Цей роман напевно нас прославить, але щоб він побачив світ, нам доведеться надати автору підтримку."
  flavor_chi.92.historical_info: "Один із чотирьох китайських класичних романів, «Сон у червоному теремі», відомий також під назвою «Записки на камені», оповідає про долю Цзя Баоюя, шматочка божественної яшми, що намагається зрозуміти, що означає бути людиною. У сюжеті описується доля двох гілок столичного сімейства Цзя. Внаслідок політичних пристрастей багато членів сім'ї опиняються у вигнанні, віддані в інші сім'ї або вмирають без спадкоємців."
  flavor_chi.92.a: "Давайте ми проспонсоруємо автора."
  flavor_chi.92.b: "[target_character.GetNameWithNoTooltip] зможе писати роман на свій розсуд."
  flavor_chi_four_masters_of_yuan_historical_info: "Чотирьох великих майстрів доби Юань багато хто вважає видатними представниками руху «живопису вчених». Вони надихалися роботами стародавніх китайських майстрів і набули в імперії Юань великої популярності, завдяки якій багато інших живописців почали експериментувати з новими техніками роботи пензлем."
  flavor_chi.93.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.93.desc: "Хоча золота доба #L [ROOT.GetCountry.GetAdjective|l]ої#! культури вже минула, художники продовжують розвивати стиль «живопису вчених». [Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з найяскравіших представників #TOOLTIP:POLICY,daoism_policy,X #L даосизму#!#! — [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона народилася', 'Він народився' )] за часів імперії Сун і є [Select_CString(target_character.IsFemale, 'суворою послідовницею', 'суворим послідовником' )] #TOOLTIP:POLICY,daoism_policy,X #L даосизму#!#!, ворожого нашим правилам, але [Select_CString(target_character.IsFemale, 'її', 'його' )] майстерність живопису тушшю гідна стародавніх майстрів. Упускати такий талант було б нерозумно, хоча якщо ми дамо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] свободу творчості, це обмежить вплив нашої #L [ROOT.GetCountry.GetCulture.GetName|l]ої#! культури в #TOOLTIP:SUB_CONTINENT,china,X #L Китаї#!#!."
  flavor_chi.93.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] виграє від [Select_CString(target_character.IsFemale,'її', 'його')] присутності."
  flavor_chi.93.b: "Давайте краще подбаємо про розширення Китаю."
  flavor_chi.93.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.94.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.94.desc: "У прагненні розширити популярність живопису вчених наші придворні знайшли [Select_CString(target_character.IsFemale, 'талановиту художницю', 'талановитого художника' )] на ім'я [target_character.GetName], майстра пейзажу. Пройшовши навчання філософії та військовій справі, [Select_CString(target_character.IsFemale, 'вона віддала перевагу', 'він віддав перевагу' )] займатися спокійним ремеслом живопису, [Select_CString(target_character.IsFemale, 'перейняла', 'перейняв' )] майстерність друзів і врешті-решт [Select_CString(target_character.IsFemale, 'перевершила', 'перевершив' )] їх. Тепер [target_character.GetName] [Select_CString(target_character.IsFemale, 'представлена', 'представлений' )] двору і може писати для найважливіших панів усього #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!."
  flavor_chi.94.a: "Ми введемо [Select_CString(target_character.IsFemale, 'її', 'його' )] до двору."
  flavor_chi.94.b: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] залишиться жити далеко від столиці."
  flavor_chi.94.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.95.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.95.desc: "Старі династії #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#! впали, і ми здобули владу в регіоні, однак їхня культурна спадщина зберігається в мові, мистецтві та цінностях жителів кожного села та кожного міста. Після того, як ми підкорили імперію Сун, багато питомих місцевих художників продовжили творити, як і раніше. [Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з таких митців, [target_character.GetName], тепер мандрує півднем Китаю в пошуках натхнення. Нам потрібно вирішити, чи є таким живописцям місце в нашій країні, чи ми повинні культивувати свої #L [ROOT.GetCountry.GetCulture.GetName|l]і#! цінності."
  flavor_chi.95.a: "Нехай [target_character.GetNameWithNoTooltip] пише і поширює свої картини."
  flavor_chi.95.b: "Ми не дозволимо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] творити, як і раніше."
  flavor_chi.95.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi.96.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.96.desc: "Незважаючи на недавнє падіння імперії Сун, її культурна спадщина в #TOOLTIP:SUB_CONTINENT,china,X #L Китаї#!#! зберігається. Одним із носіїв старої культури є [target_character.GetName], [Select_CString(target_character.IsFemale, 'відома художниця', 'відомий художник' )] у стилі живопису вчених. Автор цілої низки шедеврів, [Select_CString(target_character.IsFemale, 'вона', 'він' )] продовжує зберігати місцеві звичаї, відмінні від нашої #L [ROOT.GetCountry.GetCulture.GetName|l]ої#! культури. Ми можемо почати поступово переймати місцеві звичаї — [target_character.GetNameWithNoTooltip] буде цьому [Select_CString(target_character.IsFemale, 'рада', 'радий' )] і напевно запропонує нам свої послуги. Або ж ми можемо зберегти вірність своїм звичаям."
  flavor_chi.96.a: "Давайте поступимося [Select_CString(target_character.IsFemale, 'її', 'його' )] вимогам."
  flavor_chi.96.b: "Якщо [Select_CString(target_character.IsFemale, 'вона', 'він' )] хоче зруйнувати нашу спадщину, ми [Select_CString(target_character.IsFemale, 'їй', 'йому' )] допомагати не станемо."
  flavor_chi.96.historical_info: "$flavor_chi_four_masters_of_yuan_historical_info$"
  flavor_chi_masters_of_the_ming_historical_info: "З перенесенням столиці Міна з Нанкіна до Пекіна туди переїхала більшість придворних живописців. Серед небагатьох, що залишилися, виявилися майстри школи У зі старої столиці. Ця школа протиставляється школі Чже: до неї входили здебільшого непрофесійні художники — вчені, для яких живопис слугував засобом самовираження, на відміну від їхніх консервативних колег зі школи Чже, чий стиль був більш академічним."
  flavor_chi.97.title: "Народження школи У"
  flavor_chi.97.desc: "З визволенням #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#! з-під влади Юань багато митців попрямували до нашого двору. Однак одна група вирішила піти своїм шляхом. Замість служити в столиці, вони планують сформувати творчий колектив: школу У. Це об'єднання під керівництвом живописця на ім'я [target_character.GetName] ставить на чільне місце творче самовираження, а не складну художню техніку."
  flavor_chi.97.a: "Цим художникам буде краще у нас при дворі."
  flavor_chi.97.b: "Нехай займаються у своєму гуртку."
  flavor_chi.97.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.98.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.98.desc: "Зі зростанням популярності школи У в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! з'явилася нова хвиля художників. Серед них є [Select_CString(target_character.IsFemale, 'деяка', 'деякий' )] [target_character.GetName], [Select_CString(target_character.IsFemale, 'дальня родичка', 'дальній родич' )] чиновника Вень Тяньсяна, що обороняв країну від монгольських завойовників, якими керував [GetCharacter('kublai_khan').GetName]. Попри славну історію свого сімейства на службі в [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ому війську, [Select_CString(target_character.IsFemale, 'сама', 'сам' )] [target_character.GetNameWithNoTooltip] воліє творити пліч-о-пліч з іншими учнями-живописцями своєї школи."
  flavor_chi.98.a: "[target_character.GetLastNameWithNoTooltip] — [Select_CString(target_character.IsFemale,'бажана гостя', 'бажаний гість')] при нашому дворі."
  flavor_chi.98.b: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] нашої підтримки не отримає."
  flavor_chi.98.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.99.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.99.desc: "Зі зростанням впливу школи У до неї почали активно вливатися [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')].[Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з її нових учасників, [target_character.GetName], колись [Select_CString(target_character.IsFemale, 'була бідною художницею', 'був бідним художником' )], але тепер завдяки своєму таланту [Select_CString(target_character.IsFemale, 'вона', 'він' )] користується заступництвом впливових еліт. Отримавши за свої роботи пристойний статок, [target_character.GetNameWithNoTooltip] впевнено розвиває свій власний впізнаваний стиль. [ROOT.GetCountry.GetGovernment.GetCourtTitle] бажає прийняти [Select_CString(target_character.IsFemale, 'її', 'його' )] на службу та відкрити [Select_CString(target_character.IsFemale, 'її', 'його' )] унікальний талант світу."
  flavor_chi.99.a: "Ми дозволимо впливу школи У досягти земель [ROOT.GetCountry.Custom('CL_GEN')|L]."
  flavor_chi.99.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] не піддасться впливу Усяня."
  flavor_chi.99.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi.100.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.100.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'здобула', 'здобув' )] славу [Select_CString(target_character.IsFemale, 'однієї', 'одного' )] з найвидатніших живописців #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Хоча [Select_CString(target_character.IsFemale, 'її', 'його' )] батьками були [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], а покровителі були нечисленні, [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'заробила', 'заробив' )] повагу своєю здатністю відтворювати різні художні стилі та навіть [Select_CString(target_character.IsFemale, 'стала послідовницею', 'став послідовником' )] #TOOLTIP:CULTURE,$wu_culture_tt$,X #L школи У#!#!, щоб далі розвивати свій талант. Можливо, [Select_CString(target_character.IsFemale, 'їй', 'йому' )] знайдеться місце при нашому дворі, навіть якщо [Select_CString(target_character.IsFemale, 'вона', 'він' )] посилить тут культурний вплив #TOOLTIP:LOCATION,wuxian,X #L Усяня#!#!."
  flavor_chi.100.a: "Нехай [target_character.GetNameWithNoTooltip] служить нам."
  flavor_chi.100.b: "У місті [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'їй', 'йому' )] не раді."
  flavor_chi.100.historical_info: "$flavor_chi_masters_of_the_ming_historical_info$"
  flavor_chi_six_masters_of_the_qing: "У ранній період династії Цін у спільноті художників набули популярності шість майстрів, яких стали вважати одними з найкращих живописців усього Китаю. Це був віртуоз жанру квітів Юнь Шоупін, єзуїтський монах і пейзажист У Лі, а також чотири Вани. Порівняно з попередниками їхній підхід був досить консервативним, і у своїй творчості вони спиралися на вчення Дун Цичана."
  flavor_chi.101.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.101.desc: "Хоча в середовищі художників продовжує поширюватися вплив школи У, деяких чиновників сміливі ідеї її представників лякають. Одна зі скандальних фігур руху — [target_character.GetName], [Select_CString(target_character.IsFemale, 'яка', 'який' )] вважає, що картина повинна відображати моральний вигляд свого автора. Більшість художників відмахнулася від [Select_CString(target_character.IsFemale, 'неї', 'нього' )] як [Select_CString(target_character.IsFemale, 'радикальної дивачки', 'радикального дивака' )], але [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'зуміла', 'зумів' )] завоювати повагу молоді. За належної підтримки [Select_CString(target_character.IsFemale, 'її', 'його' )] рух зміцніє, але якою ціною?"
  flavor_chi.101.a: "[ROOT.GetCountry.Custom('CL_DAT')] [Select_CString(target_character.IsFemale, 'вона', 'він' )] потрібен."
  flavor_chi.101.b: "Краще ми звернемо увагу на інші школи."
  flavor_chi.101.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.102.title: "Західні вчення"
  flavor_chi.102.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'постаралася', 'постарався' )], щоб школа У стала однією з найпрестижніших течій у мистецтві #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!. Колись [Select_CString(target_character.IsFemale, 'чужоземка', 'чужоземець' )], тепер [Select_CString(target_character.IsFemale, 'вона', 'він' )] вважається найважливішим [ROOT.GetCountry.GetAdjectiveWithNoTooltip]им живописцем. За підтримки численних послідовників [Select_CString(target_character.IsFemale, 'вона', 'він' )] прагне надати живопису вчених більш особистої, емоційної форми, яка віддасть шану звичаям і одночасно прокладе новий шлях у майбутнє."
  flavor_chi.102.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] виграє від [Select_CString(target_character.IsFemale,'її', 'його')] присутності."
  flavor_chi.102.b: "Вигнати [Select_CString(target_character.IsFemale, 'її', 'його' )] з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_chi.102.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.103.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.103.desc: "Після занепаду школи У популярність [Select_CString(target_character.IsFemale, 'здобула учениця', 'здобув учень ' )] Дун Цичана [target_character.GetName]. Хоча [Select_CString(target_character.IsFemale, 'її', 'його' )] стиль не можна назвати революційним, знавці високо оцінюють [Select_CString(target_character.IsFemale, 'її', 'його' )] техніку та спокійні композиції. Такі художники як [target_character.GetNameWithNoTooltip] служать мостом між добами, зберігаючи нашу #L [ROOT.GetCountry.GetCulture.GetName]у#! ідентичність і при цьому відсилаючи до усталених цінностей."
  flavor_chi.103.a: "[target_character.GetNameWithNoTooltip] буде служити нам."
  flavor_chi.103.b: "Нехай краще набирається натхнення в мандрах."
  flavor_chi.103.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.104.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.104.desc: "Окремі вчені в #TOOLTIP:SUB_CONTINENT,china,X #L Китаї#!#! зберігають звичаї та вплив попередньої династії. Хоча багато хто й залишається вірним ідеалам старого двору, інші вирішили зберегти художні смаки предків у мистецтві. [Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з таких людей — [target_character.GetName], [Select_CString(target_character.IsFemale, 'яка', 'який' )] колись [Select_CString(target_character.IsFemale, 'служила', 'служив' )] при дворі, а тепер живе далеко від світу. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] проводить дні за малюванням лісів і річок #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, прагнучи через свою творчість повернутися в часи минулого. Хтось вважає, що [Select_CString(target_character.IsFemale, 'вона', 'він' )] допоможе нам зблизити культури народів у ці непрості часи."
  flavor_chi.104.a: "Нехай [target_character.GetNameWithNoTooltip] працює на нас."
  flavor_chi.104.b: "У нас вже є багато чудових митців."
  flavor_chi.104.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.105.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.105.desc: "[target_character2.GetName] вже не перший день шукає таланти, яких можна запросити служити при #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі. На щастя, [target_character.GetName], один із чотирьох Ванів, звернувся до нас із бажанням вступити до нас на службу. Причиною він називає бажання поширювати ідеї своєї консервативної школи, створювати твори, натхненні династією Юань, та наповнювати пейзажі абстрактними фігурами. Це цікава пропозиція, але якщо ми запропонуємо йому роботу, ми покажемо всім свою перевагу однієї школи над іншими."
  flavor_chi.105.a: "[target_character.GetNameWithNoTooltip] стане в пригоді при дворі."
  flavor_chi.105.b: "Не будемо віддавати переваги конкретним школам."
  flavor_chi.105.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.106.title: "[target_character.GetNameWithNoTooltip]"
  flavor_chi.106.desc: "Останній великий майстер вченої традиції живопису, [target_character.GetName] [Select_CString(target_character.IsFemale, 'заробила', 'заробив' )] повагу і мислителів, і сановників. Хоча [Select_CString(target_character.IsFemale, 'вона народилася', 'він народився' )] через багато років після золотого віку цієї течії, [Select_CString(target_character.IsFemale, 'її', 'його' )] роботи втілюють найвищі його ідеали: тонкість, спокій та філософську глибину. За підтримки двору [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'побудувала', 'побудував' )] нову студію, де нове покоління живописців зможе почерпнути уроки минулого та поглянути в майбутнє."
  flavor_chi.106.a: "Прийняти [Select_CString(target_character.IsFemale,'її', 'його')] пропозицію."
  flavor_chi.106.b: "Нам ні до чого ті, хто копіює старі стилі."
  flavor_chi.106.historical_info: "$flavor_chi_six_masters_of_the_qing$"
  flavor_chi.107.title: "$yuanmingyuan$"
  flavor_chi.107.desc: "Будь-яка правляча династія #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної Країни#!#! прагне явити свою велич світові, і [ROOT.GetCountry.GetLongName] — не виняток. Щоб підвищити легітимність своїх спадкоємців та всього роду [target_character.GetDynasty.GetName], [target_character.GetName] вирішує створити новий комплекс палаців, садів та павільйонів."
  flavor_chi.107.a: "До роботи!"
  flavor_chi.107.b: "Не будемо впадати в марнославство."
  flavor_chi.108.title: "Данина для [target_country.Custom('CL_GEN')]"
  flavor_chi.108.desc: "Наша країна є #TOOLTIP:SUBJECT_TYPE,tributary,X #L данником#!#!#ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Наші взаємини із сюзереном вельми складні та вимагають дотримання безлічі ритуалів та формальностей, проте очевидно одне: тамтешнім властям це до вподоби, а [target_country.GetAdjectiveWithNoTooltip|l]і [target_country.GetGovernment.GetEstateName('burghers_estate')|l] зовсім не проти поторгувати з нашими посланцями. Якщо ми розширимо делегацію, що доставляє данину [target_country.Custom('CL_DAT')], то зможемо отримати з цього союзу ще більше вигоди."
  flavor_chi.108.a: "Ми розширимо делегацію посланців."
  flavor_chi.108.b: "Це може зіпсувати наші відносини!"
  flavor_chi.109.title: "Невигідний приріст"
  flavor_chi.109.desc: "Наші радники повідомляють, що делегації, які везуть #TOOLTIP:SUBJECT_TYPE,tributary,X #L данину#!#! з #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_GEN')|L]#!#!, стають все більшими та численнішими, тому витрати на розміщення та утримання посланців продовжують зростати. Мотиви нашого васала здаються добрими та безневинними, але ми-то знаємо, що насправді ним рухає користь. Якщо ми не встановимо відповідні обмеження, через величезні витрати ця співпраця просто перестане бути для нас вигідною."
  flavor_chi.109.a: "Ми обмежимо розмір делегацій."
  flavor_chi.109.b: "Ми знайдемо більш дипломатичне рішення."
  flavor_chi.109.c: "Нам такий данник ні до чого."
  flavor_chi.110.title: "Судовий прецедент"
  flavor_chi.110.desc: "Нещодавно юрист та суддя [target_character.GetName] [Select_CString(target_character.IsFemale,'винесла', 'виніс')] спірне рішення в одній важливій справі. Згідно з #L [ROOT.GetCountry.GetAdjective|l]ими#! законами, інші судді повинні керуватися подібними прецедентами, доки вони не вкоріняться в практиці. [target_estate.GetName] зовсім не в захваті від такого вердикту, оскільки він суперечить їхнім інтересам, але якщо ми його оскаржимо, то підірвемо довіру до [ROOT.GetCountry.Custom('rank_ru_DAT')]."
  flavor_chi.110.a: "Ми поважаємо рішення судді."
  flavor_chi.110.b: "Ми оскаржимо вердикт!"
  flavor_chi.111.title: "Критика судової системи"
  flavor_chi.111.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] отримує пропозицію від спеціаліста з #L [ROOT.GetCountry.GetAdjective|l]ого#! законодавства на ім'я [target_character.GetName]. Ця людина каже, що багато суддів хибно тлумачать закон, тому право виносити рішення повинні зберегти лише ті, хто успішно складе новий іспит. [Select_CString(target_character.IsFemale, 'Її', 'Його')] противники, своєю чергою, стверджують, що це політично мотивована критика, тому її не варто сприймати всерйоз."
  flavor_chi.111.a: "Це політизована пропозиція. Ми проігноруємо її."
  flavor_chi.111.b: "Ми посилимо відбір суддів."
  flavor_chi.111.c: "[target_character.GetNameWithNoTooltip] понесе покарання!"
  flavor_chi.112.title: "Монгольські бунтівники спіймані"
  flavor_chi.112.desc: "Нещодавно наш гарнізон із провінції [target_province.GetName] схопив зграю #TOOLTIP:CULTURE,$mongolian_culture_tt$,X #L монгольських#!#! бродяг, які сіяли невдоволення серед місцевих жителів та погрожували нашій владі над цією територією. Ми можемо використати ситуацію для залякування інших бунтівників. Нехай подумають двічі, перш ніж порушувати порядок на наших кордонах!"
  flavor_chi.112.a: "Проведемо їм урок."
  flavor_chi.112.b: "Проявимо поблажливість до бунтівників."
  flavor_chi.113.title: "[target_character.GetNameWithNoTooltip] тікає до Тайваню"
  flavor_chi.113.desc: "[ROOT.GetCountry.GetName] пережива[ROOT.GetCountry.Custom('end_etyut')] небачений досі кризис, і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] сильно турбується з цього приводу. Вирішивши, що династії прийшов кінець, полководець [target_character.GetName] тікає з країни, оселяється на одному з #TOOLTIP:AREA,taiwan_area,X #L тайванських островів#!#! і оголошує себе [Select_CString(target_character.IsFemale,'нашою духовною спадкоємицею', 'нашим духовним спадкоємцем')]."
  flavor_chi.113.a: "Хіба все настільки погано?"
  flavor_chi.113.b: "[ ROOT.GetCountry.Custom('CL_ACC')] навряд чи можна врятувати."
  flavor_chi.114.title: "Особиста рекомендація"
  flavor_chi.114.desc: "#TOOLTIP:LAW,imperial_examination_law,X #L Система іспитів#!#! більше не діє. [ROOT.GetCountry.GetLongName] — тепер при призначенні чиновників до ради та уряду тут спираються на особисті рекомендації. Одну таку рекомендацію щойно [Select_CString(recommending_character.IsFemale,'озвучила', 'озвучив')] [recommending_character.GetName]. За [Select_CString(recommending_character.IsFemale,'її', 'його')] запевненням, [target_character.GetName] відрізняється високою компетенцією та може надати неоціненну допомогу в [ROOT.GetCountry.GetGovernment.GetAdjective|l]их справах."
  flavor_chi.114.a: "Наймемо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_chi.114.b: "[recommending_character.GetNameWithNoTooltip] поняття не має про те, хто нам потрібен."
  flavor_chi.115.title: "Довгоочікуване приєднання"
  flavor_chi.115.desc: "[ROOT.GetCountry.GetLongName] — ця країна, після десятиліть кривавої боротьби за контроль над #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединною Країною#!#!, нарешті здобуває гору над усіма самозванцями. Тепер, коли з необхідними формальностями покінчено, настав час відправити гінців до всіх васальних земель Піднебесної. Нехай люди знають: істинні сини Неба повернулися!"
  flavor_chi.115.a: "У Китаї починається нова доба."
  flavor_chi.116.title: "$flavor_chi.115.title$"
  flavor_chi.116.desc: "[target_country.GetLongName] — звідси до нас прибуває гонець. Після кількох десятиліть метушні ця країна нарешті зуміла захопити владу над #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединною Країною#!#!. Місцеві еліти вже провели всі належні церемонії та проголосили себе синами Неба. Тепер вони вимагають у нас підтримки. Проблема в тому, що ми не надто хочемо її надавати."
  flavor_chi.116.a: "Ми визнаємо [target_country.Custom('CL_ACC')] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединною Країною#!#!."
  flavor_chi.116.b: "Самозванці, ось вони хто!"
  flavor_chi.117.title: "[Select_CString(target_character.IsFemale,'Бунтарка', 'Бунтар')] з селян"
  flavor_chi.117.desc: "Через останні події в області [target_area.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] почали все частіше демонструвати непокору. Крадіжки, запеклі конфлікти та напади озброєних банд — лише деякі симптоми зарази, що охопила цей регіон. За всіма безчинствами стоїть [target_character.GetName] — людина, що заслужила репутацію ворога багатіїв та [Select_CString(target_character.IsFemale,'захисниці', 'захисника')] бідняків. Регіон [target_area.GetRegion.GetName] поступово переходить під контроль великої озброєної групи селян, яку [target_character.GetShortNameWithNoTooltip] і очолює."
  flavor_chi.117.a: "Ми знищимо [Select_CString(target_character.IsFemale,'цю негідницю', 'цього негідника')]!"
  flavor_chi.117.b: "Схоже, чарівності [Select_CString(target_character.IsFemale,'їй', 'йому')] не бракує."
  chi_we_will_continue_playing_as_target_country: "Ми продовжимо гру від імені групи заколотників «[target_rebels.GetName]»."
  flavor_chi.118.title: "$CSH_ADJ$е повстання"
  flavor_chi.118.desc: "Група обірванців, яку очолює [target_character.GetName], поширила вогонь повстання набагато далі, ніж ми припускали. Селяни всіляко підтримують цей рух і масово приєднуються до нього, оскільки [target_character.GetShortNameWithNoTooltip] серед них вважається [Select_CString(target_character.IsFemale,'справжньою героїнею', 'справжнім героєм')]. На бік заколотників вже перейшло безліч бідних поселень, і тепер ця напасть загрожує навіть великим #TOOLTIP:SUB_CONTINENT,china,X #L китайським#!#! містам."
  flavor_chi.118.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.119.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip]"
  flavor_chi.119.desc: "[ROOT.GetCountry.GetLongName] — ця країна успішно захоплює [target_location.Custom('LR_ACC')|l] [target_location.GetName]. Така важлива перемога дозволяє [ROOT.GetCountry.Custom('rank_ru_DAT')|l] претендувати на Небесний мандат і #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Срединну Країну#!#!. Якщо влада #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! не зуміє придушити заколот, усі #TOOLTIP:SUBJECT_TYPE,tributary,X #L данники#!#! цієї країни стануть нашими."
  flavor_chi.119.a: "Ми заявимо права на Небесний мандат."
  flavor_chi.119.b: "Ми не підемо проти [target_country.GetAdjectiveWithNoTooltip|l]ої влади."
  flavor_chi.120.title: "Селянська спадщина"
  flavor_chi.120.desc: "[ROOT.GetCountry.GetLongName] — це країна, де [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate|l] нерідко вступали в протистояння. Довгі десятиліття простолюд насилу виживав під гнітом правлячої еліти, доки [Select_CString(target_character.IsFemale,'засновниця', 'засновник')] нової династії [target_character.GetName] не [Select_CString(target_character.IsFemale,'поклала', 'поклав')] цьому край. [Select_CString(target_character.IsFemale,'Вона згуртувала', 'Він згуртував')] народ проти тиранії, що призвело до повалення старого порядку та піднесення #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Однак новий напрямок розвитку суперечить нашим споконвічним цінностям і не дозволяє створити ефективні бюрократичні структури, якими міг похвалитися попередній володар титулу #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Срединної Країни#!#!. З іншого боку, перейнявши ключові установки старих династій, ми поставимо під удар усе, за що боролися."
  flavor_chi.120.a: "Ми повинні бути ближчими до народу."
  flavor_chi.120.b: "Якщо не зуміємо підлаштуватися, нам кінець."
  flavor_chi.121.title: "[target_work_of_art.GetNameWithNoTooltip]"
  flavor_chi.121.desc: "Досвідчений і талановитий полководець [target_character.GetName] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')] написати #TOOLTIP:WORK_OF_ART_TYPE,treatise,X #L трактат#!#! про порохову зброю під назвою [target_work_of_art.GetName]. У цій праці розглядаються новітні практики застосування пороху у військових цілях.\n\nАвтор згадує порохові суміші з додаванням отруйних речовин, а також докладно описує використання артилерії, вогняних стріл і копій."
  flavor_chi.121.a: "Ці знання залишаться у віках!"
  flavor_chi.122.title: "Боротьба з повінью"
  flavor_chi.122.desc: "Через сильні та тривалі зливи річка Хуанхе змінила свою течію і вийшла з берегів, несучи страждання, нещастя та смерть. Найгірше те, що судноплавство на Великому каналі практично зупинилося, і #TOOLTIP:REGION,east_china_region,X #L Східний Китай#!#! відчуває нестачу критично важливих продовольчих товарів зі #TOOLTIP:REGION,east_china_region,X #L Східного Китаю#!#!. Наші радники пропонують набрати понад 170 тисяч робітників на проєкт з повернення річки в русло, щоб пом'якшити наслідки катастрофи."
  flavor_chi.122.a: "Потрібно терміново розпочати роботи."
  flavor_chi.122.b: "Це обійдеться нам занадто дорого."
  until_yellow_river_works_are_complete: "до закінчення робіт на річці Хуанхе"
  flavor_chi.123.title: "Спроба саботажу робіт на річці Хуанхе"
  flavor_chi.123.desc: "Хтось поширює мерзенну пропаганду серед робітників, які повертають річку Хуанхе в русло. Згідно з отриманими відомостями, цю людину звуть [target_character.GetName]. [Select_CString(target_character.IsFemale,'Вона', 'Він')] очолює місцеве «Товариство Білого Лотоса» і вірить у скоре пришестя будди Матреї. Схоже, [Select_CString(target_character.IsFemale,'вона підмовила', 'він підмовив')] своїх послідовників закопати на березі однооку кам'яну статую, на якій викарбувано передбачення неминучого краху династії #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, щоб робітники нібито випадково її знайшли.\n\nХоча наші війська всіма силами намагалися захистити робітників від згубного впливу, деякі все ж піддалися йому і втекли. Наразі ми точно не знаємо, де перебуває голова сектантів."
  flavor_chi.123.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.124.title: "Завершення робіт на річці Хуанхе"
  flavor_chi.124.desc: "Попри підступи шарлатанів, після кількох місяців невпинної праці 170 тисяч найнятих нами робітників нарешті закінчили проєкт з повернення річки Хуанхе в її початкове русло. Ця новина трохи заспокоїть і підбадьорить мешканців #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Срединної Країни#!#!."
  flavor_chi.124.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.125.title: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'виявлена', 'виявлений')]"
  flavor_chi.125.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale,'зрадниця і шахрайка, яка промишляє', 'зрадник і шахрай, який промишляє')] у #TOOLTIP:AREA,shandong_area,X #L Шаньдуні#!#!. [Select_CString(target_character.IsFemale,'Ця жінка', 'Цей чоловік')] нібито походить з династії Сун і майстерно заманює людей у «Товариство Білого Лотоса». Під час виконання проєкту на річці Хуанхе [Select_CString(target_character.IsFemale,'їй', 'йому')] вдалося завербувати багатьох робітників, що мало не обернулося катастрофою.\n\nНещодавно ми отримали точну інформацію про місцезнаходження [Select_CString(target_character.IsFemale,'цієї мерзотниці', 'цього мерзотника')], і в нас з'явилася можливість [Select_CString(target_character.IsFemale,'її', 'його')] заарештувати. Однак це може спровокувати різку відповідну реакцію з боку [Select_CString(target_character.IsFemale,'її', 'його')] відданих послідовників у червоних тюрбанах."
  flavor_chi.125.a: "Час заарештувати [Select_CString(target_character.IsFemale,'негідницю', 'негідника')]!"
  flavor_chi.125.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  rtr_sped_up_red_turban_rebellions: "Главу «Червоних пов'язок» заарештували під час [Concept('event', 'події')|e]"
  chi_red_turban_rebellion: "Після цього уникнути [Concept('situation', 'ситуації')|e] «[ShowSituationName('red_turban_rebellions')]» буде складніше"
  until_the_end_of_red_turban_rebellion: "поки #TOOLTIP:SITUATION,red_turban_rebellions,X #L повстання «Червоних пов'язок»#!#! не закінчиться"
  flavor_chi.126.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]і повстанці"
  flavor_chi.126.desc: "Нещодавно одне з наших військ зіткнулося з місцевим повстанським загоном. Заколотники змусили наших бійців вступити в невигідну сутичку і вщент їх розгромили. Вороги наводять цей випадок як доказ деградації наших військ. Цим дурням дорого обійдеться таке зарозумілість!"
  flavor_chi.126.a: "Покажемо, чиї війська деградували насправді!"
  flavor_chi.127.title: "Майбутнє [target_location.Custom('LR_GEN')|l] [ target_location.GetNameWithNoTooltip]"
  flavor_chi.127.desc: "[target_location.GetName] — [target_location.GetRank.GetName|l] з дуже довгою історією. Ще в давнину ці краї були оплотом династії Чжоу, а в періоди династій Хань і Тан тут виросла велика імперська столиця. У наші дні це місто втратило столичну роль, але, як і раніше, залишається найважливішим центром культури та традицій.\n\nНам належить вирішити подальшу долю цього великого і стародавнього міста. Ми можемо повернути йому славу світоча культури та процвітання, якою він володів за часів стародавніх імперій."
  flavor_chi.127.a: "Нова назва сповістить про нове майбутнє."
  flavor_chi.127.b: "Він поверне собі давню славу."
  flavor_chi.127.c: "На жаль, його час минув."
  flavor_chi.128.title: "[target_location.GetNameWithNoTooltip]"
  flavor_chi.128.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] був столицею кількох імператорських династій у найсмутніші та найскладніші періоди китайської історії. Тепер, коли влада в імперії належить нам, все частіше лунають голоси, що ми повинні перетворити його на нову освічену столицю, чия велич перевершить усі досягнення минулого. Його вигідне розташування та культурне значення не викликають сумнівів: за належного управління він здатен стати справжнім центром процвітання."
  flavor_chi.128.a: "Ми визнаємо історичну важливість цього міста."
  flavor_chi.128.b: "Він стане нашою новою столицею."
  flavor_chi.128.c: "Йому достатньо давньої слави."
  flavor_chi.1000.title: "Ізоляція [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_chi.1000.desc: "Купці з #TOOLTIP:CONTINENT,europe,X #L Європи#!#! та інших чужоземних країн буквально наповнили #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Через їхню ділову активність наші власні торговці втрачають прибуток і розоряються, позбавляючи нашу країну доходів від податків і мит. Настав час вигнати цих хижаків з країни — або, принаймні, зібрати їх в одному місці, де буде простіше контролювати їхню діяльність і обкладати чужоземців податками.\n\nНаші фахівці стверджують, що найкращим виходом буде передати [target_location.Custom('LR_ACC')|l] [target_location.GetName] #ONCLICK:COUNTRY,[target_foreign_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_foreign_country.Custom('CL_tt')],X [target_foreign_country.Custom('CL_DAT')|L]#!#! і дозволити іноземним купцям вести справи тільки там. Серед іншого, це сприятиме розвитку торгівлі в південних областях #TOOLTIP:AREA,guangdong_area,X #L Гуандуну#!#!. Втім, можна і зовсім відмовитися від торгових контактів із зовнішнім світом — або, навпаки, відкрити наші порти для купців усіх країн і не чинити їм жодних перешкод."
  flavor_chi.1000.a: "Ми закриємо [ROOT.GetCountry.Custom('CL_ACC')] для зовнішнього світу."
  flavor_chi.1000.b: "Торгівля повинна залишатися відкритою."
  flavor_chi.1000.c: "Запропонуємо їм [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]."
  flavor_chi.1000.c.tt: "Ми запропонуємо [target_location.Custom('LR_ACC')|l] [target_location.GetName] #ONCLICK:COUNTRY,[target_foreign_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_foreign_country.Custom('CL_tt')],X [target_foreign_country.Custom('CL_DAT')|L]#!#!. У разі згоди ця країна отримає [target_location.Custom('LR_ACC')|l] у своє повне розпорядження"
  flavor_chi.1001.title: "[target_location.GetNameWithNoTooltip] як пропозиція"
  flavor_chi.1001.desc: "[target_origin_country.GetLongName] — ця країна пропонує нам зайняти [target_location.Custom('LR_ACC')|l] [target_location.GetName]. [target_origin_country.GetAdjectiveWithNoTooltip]і посланці запевняють, що так ми отримаємо перевагу доступу до їхніх ринків і досі небачені можливості для торгівлі, однак вони напевно розраховують отримати щось взамін. Вже очевидно, що якщо прийняти їхні умови, вони зможуть тримати наших купців під найсуворішим контролем."
  flavor_chi.1001.a: "Ми приймаємо їхню пропозицію."
  flavor_chi.1001.b: "Нам немає потреби домовлятися з ними."
  flavor_chi.1002.title: "[target_country.GetAdjectiveWithNoTooltip]а відповідь"
  flavor_chi.1002.desc: "[target_country.GetLongName] — ця велика держава прийняла нашу пропозицію, відтепер вона володітиме [target_location.Custom('LR_INST')|l] [target_location.GetName]. У [target_location.Custom('LR_PREP')|l] житимуть [target_country.GetAdjectiveWithNoTooltip|l]і купці, а ми отримаємо значну компенсацію та зможемо з легкістю відстежувати будь-які їхні угоди."
  flavor_chi.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.1003.title: "$flavor_chi.1002.title$"
  flavor_chi.1003.desc: "Недалекі #L [target_country.GetAdjective|l]і#! варвари відкинули нашу щедру пропозицію оселитися в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Вони не бажають підкорятися нашим законам і вимагають необмеженого доступу до #L [ROOT.GetCountry.GetAdjective|l]их#! ринків. Подібна образа не повинна залишитися без відповіді…"
  flavor_chi.1003.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_chi.1100.title: "Суперечки через китайські церемонії"
  flavor_chi.1100.desc: "Поки що всі контакти між нашою церквою та жителями #ONCLICK:COUNTRY,[target_chinese_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_chinese_country.Custom('CL_tt')],X [target_chinese_country.Custom('CL_GEN')|L]#!#! залишалися в руках єзуїтів. Щоб знайти підхід до #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайців#!#!, ченці ордену розмовляли їхньою мовою, вивчали їхні звичаї та всіма силами намагалися влитися в [target_chinese_country.GetAdjectiveWithNoTooltip|l]е суспільство.\n\nКоли до #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#! прибули перші домініканці та францисканці, їхньому обуренню не було меж. Як виявилося, багато обрядів, повсюдно поширених серед нібито #L [ROOT.GetReligion.GetAdjective|l]ого#! населення [target_chinese_country.Custom('CL_GEN')], вельми далекі від догматів нашої віри — і єзуїти цьому потурають! Новоприбулі ченці в жаху від дій єзуїтів та їхньої «[ROOT.GetReligion.GetAdjectiveWithNoTooltip|l]ої» пастви, вони вимагають від нас рішучої заборони на [target_chinese_country.GetAdjectiveWithNoTooltip|l]і обряди шанування предків. Жителі [target_chinese_country.Custom('CL_GEN')], які бажають стати частиною нашої церкви, повинні відмовитися від місцевих забобонів."
  flavor_chi.1100.a: "Ми згодні з єзуїтами."
  flavor_chi.1100.b: "Ми згодні з домініканцями."
  mng_chinese_rites_denounced: "$flavor_chi.1100.title$"
  flavor_chi.1101_1102_common: "Серед #L [target_papal_country.GetReligion.GetAdjective|l]ого#! населення нашої країни не припиняються суперечки про те, чи можуть #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайські#!#! обряди поєднуватися з їхньою вірою. Деякі #TOOLTIP:CONTINENT,europe,X #L європейці#!#! — особливо ті, хто лише нещодавно прибув на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, — вважають ці ритуали образливими."
  flavor_chi.1101.title: "Заборона китайських обрядів"
  flavor_chi.1101.desc: "$flavor_chi.1101_1102_common$ Сьогодні стало відомо, що [target_character.GetName] — глава [target_papal_country.GetReligion.GetAdjectiveWithNoTooltip|l]ої церкви, [Select_CString(target_character.IsFemale,'яка править', 'який править')] у [target_country.GetCapital.Custom('LR_PREP')|l] [target_country.GetCapital.GetName], — [Select_CString(target_character.IsFemale,'наклала', 'наклав')] заборону на дотримання китайських обрядів для всього [target_papal_country.GetReligion.GetAdjectiveWithNoTooltip|l]ого населення нашої країни."
  flavor_chi.1101.a: "Ми виженемо з країни місіонерів, які не шанують наші звичаї!"
  flavor_chi.1101.b: "Нам потрібні ці місіонери."
  flavor_chi.1102.title: "Суперечка західних варварів через китайські звичаї"
  flavor_chi.1102.desc: "$flavor_chi.1101_1102_common$ Зараз вони домовилися виявити «поблажливість» до стародавніх китайських звичаїв. Чи не забагато на себе беруть ці варвари?"
  flavor_chi.1102.a: "$flavor_chi.1101.a$"
  flavor_chi.1102.a.tt: "Навернення в християнство в Китаї припиняється"
  flavor_chi.1102.b: "$flavor_chi.1101.b$"
  flavor_chi_pap.1.title: "Делегація з [target_country.Custom('CL_GEN')]"
  flavor_chi_pap.1.desc: "До міста [ROOT.GetCountry.GetCapital.GetName] прибув посланець з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Він повідомляє, що [target_pop_cath.GetName|l] Китаю залишилися без духовного наставника і благають надіслати їм священників до [target_location.Custom('LR_ACC')|l] [target_location.GetName].\n\nЦе саме те, чого потребує [target_building.GetName|l]."
  flavor_chi_pap.1.a: "Добре, ми відправимо до них священнослужителів."
  flavor_chi_pap.1.b: "Священники потрібні нам тут."
  flavor_chi_pap.2.title: "Повернення експедиції з Європи"
  flavor_chi_pap.2.desc: "Кілька років тому #L [target_country.GetAdjective|l]а#! влада направила [papal_state.Custom('endlong_predlog_vvo')] [papal_state.Custom('longname_ru_ACC')] посланця з проханням виділити священників, яких так потребували [target_pop_cath.GetName|l]. І ось сьогодні він повернувся з радісними звістками.\n\n[papal_state.GetGovernment.GetRulerTitle] тепло [Select_CString(papal_state.GetGovernment.GetRuler.IsFemale, 'зустріла', 'зустрів' )] посла і [Select_CString(papal_state.GetGovernment.GetRuler.IsFemale, 'вирішила', 'вирішив' )] задовольнити наше прохання. До країни [Select_CString(target_character.IsFemale, 'прибула', 'прибув' )] [target_character.GetName] та десятки інших священнослужителів, і скоро [target_building.GetName|l] у [target_location.Custom('LR_PREP')|l] [target_location.GetName] знову наповниться парафіянами."
  flavor_chi_pap.2.a: "Ми гідно зустрінемо дорогих гостей!"
  flavor_chi_pap.2.b: "Багато що змінилося за такий короткий час…"
  flavor_chi_por.1.title: "Оренда порту в Китаї"
  flavor_chi_por.1.desc: "Вся Європа знає, наскільки багатий Китай. Здобути хоча б малу частину китайських скарбів стало б грандіозним успіхом для нашої країни. Цього можна досягти різними способами, але найпростіше орендувати ділянку землі, щоб вести там торгівлю з місцевими жителями. Чому б не звернутися до [target_country.GetAdjective|l]ої влади з проханням виділити нам землю в [target_location.Custom('LR_PREP')|l] [target_location.GetName]?"
  flavor_chi_por.1.a: "Ми попросимо виділити нам ділянку."
  flavor_chi_por.1.b: "Нам це ні до чого."
  flavor_chi_por.2.title: "[target_location.GetNameWithNoTooltip] в оренду"
  flavor_chi_por.2.desc: "До нас прибув посланець з #ONCLICK:COUNTRY,[offering_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[offering_country.Custom('CL_tt')],X [offering_country.Custom('CL_GEN')|L]#!#! з проханням передати його країні в оренду [target_location.Custom('LR_ACC')|l] [target_location.GetName]. За цією угодою [offering_country.GetNameWithNoTooltip] отримає ділянку землі, на якій з'явиться [target_building_type.GetName|l] для зручності торгівлі з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!. Таке зміцнення економічних контактів з далекою #TOOLTIP:CONTINENT,europe,X #L Європою#!#! зробить нашу країну більш #TOOLTIP:SOCIETAL_VALUE,outward_vs_inward,X #L відкритою#!#! і дозволить ввозити безліч товарів, про які в #TOOLTIP:SUB_CONTINENT,china,X #L Китаї#!#! ще навіть не чули."
  flavor_chi_por.2.a: "Приймемо цю пропозицію."
  flavor_chi_por.2.b: "У проханні відмовлено."
  flavor_chi_por.3.title: "Відповідь від [target_country.Custom('CL_GEN')]"
  flavor_chi_por.3.desc_common: "Наш посланець у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! нарешті повернувся!"
  flavor_chi_por.3.desc_success: "$flavor_chi_por.3.desc_common$ Як і очікувалося, [target_country.GetAdjectiveWithNoTooltip|l]а влада з готовністю прийняла нашу пропозицію. Радники вже працюють над втіленням цього плану."
  flavor_chi_por.3.desc_failure: "$flavor_chi_por.3.desc_common$ На жаль, зарозумілі [target_country.GetAdjectiveWithNoTooltip|l]і сановники відкинули нашу скромну пропозицію. Що ж, проживемо і без #TOOLTIP:SUB_CONTINENT,china,X #L китайських#!#! багатств."
  flavor_chi_por.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  expedition_name_treasure_voyage: "Експедиція золотого флоту"
  expedition_name_chinese_expedition: "#TOOLTIP:CULTUREGROUP,chinese_group,X #L Китайська#!#! експедиція"
  expedition_leader_name: "[character_expedition_leader_target.GetName]"
  expedition_leader_name_tooltipless: "[character_expedition_leader_target.GetNameWithNoTooltip]"
  expedition_leader_name_shehe: "[Select_CString(character_expedition_leader_target.IsFemale,'Вона', 'Він')]"
  expedition_leader_name_herhim: "[Select_CString(character_expedition_leader_target.IsFemale,'Її', 'Його')]"
  expedition_leader_name_herhis: "[Select_CString(character_expedition_leader_target.IsFemale,'Її', 'Його')]"
  expedition_leader_name_herselfhimself: "[Select_CString(character_expedition_leader_target.IsFemale,'Сама', 'Сам')]"
  expedition_location_name: "[expedition_initiator.MakeScope.GetVariable('chinese_treasure_fleet_location').GetLocation.GetName]"
  expedition_location_name_tooltipless: "[expedition_initiator.MakeScope.GetVariable('chinese_treasure_fleet_location').GetLocation.GetNameWithNoTooltip]"
  flavor_chi.2000.title: "Доба морських експедицій"
  flavor_chi.2000.desc: "Останні десятиліття були напрочуд рясними, і в скарбниці накопичилася велика кількість золота та інших ресурсів. Ці кошти можна направити на подальше зміцнення і без того сильних позицій #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#! в очах решти світу. Ми побудуємо величезний флот і відправимо в усі кінці світу ескадри, повні найдорогоцінніших скарбів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, щоб переконати заморські країни вступити до лав наших #TOOLTIP:SUBJECT_TYPE,tributary,X #L данників#!#!."
  flavor_chi.2000.a: "Так ми і зробимо!"
  chi_able_to_send_treasure_voyages: "[ROOT.GetCountry.GetName] отримає доступ до [Concept('action', 'дії')|e] «[ShowGenericActionName('start_a_treasure_voyage')]», яка дозволяє в обмін на [Concept('gold', 'золото')|e] залучати нові країни до системи #TOOLTIP:SUBJECT_TYPE,tributary,X #L данників#!#!. Це можливо лише доти, доки [ROOT.GetCountry.GetName] залишається [Concept('international_organization_leader_short', 'лідером')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної країни#!#!."
  flavor_chi.2001.title: "Кінець доби"
  flavor_chi.2001.desc: "Озираючись на добу морських експедицій, жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! бачать лише марну витрату коштів. Заради швидкоплинного підвищення престижу країни були витрачені колосальні суми. Майбутнім літописцям краще не згадувати про цей ганебний епізод нашої історії…"
  flavor_chi.2001.a: "Що ж, нічого не вдієш."
  chi_unable_to_send_treasure_voyages: "[ROOT.GetCountry.GetName] більше не зможе використовувати дію «[ShowGenericActionName('start_a_treasure_voyage')]»."
  flavor_chi.2002.title: "Відправлення експедиції"
  flavor_chi.2002.desc: "Після довгих зборів наш великий флот нарешті готовий до відплиття. $expedition_leader_name$ з командою вирушають у невідомість, по дорозі в область [target_area.GetName] вони зіткнуться з дивовижними пригодами та страшними лихами, але ми впевнені, що наші моряки не підведуть — адже для цієї місії їх [Select_CString(ROOT.GetCountry.GetGovernment.GetRulerOrRegent.IsFemale, 'відібрала сама', 'відібрав сам' )] [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName].\n\nНа світанку флот відпливе з порту [start_location.Custom('LR_GEN')|l] [start_location.GetName]. Мине не один рік, перш ніж ескадра повернеться до наших берегів. Побажаємо їм щасливої дороги!"
  flavor_chi.2002.a: "Щасти!"
  chinese_treasure_expeditions_send_tooltip: "$expedition_name_treasure_voyage$ вирушить до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.Custom('LR_ACC')|l] [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName]. Командувати ескадрою буде [target_character.GetName].\nУ корабельних трюмах знаходяться дари на #g [ROOT.GetVariable('chinese_treasure_voyage_cargo').GetValue|2]#! [Concept('gold', 'дукатів')|e]. Вони призначені для правителів [Concept('countries', 'країн')|e], які ескадра відвідає під час своєї подорожі."
  flavor_chi.2003.title: "Прихована подія"
  flavor_chi.2003.desc: "Прихована подія"
  flavor_chi.2003.a: "Прихована подія"
  flavor_chi.2004.title: "$expedition_name_treasure_voyage$ прибуває з [expedition_initiator.Custom('CL_GEN')]"
  flavor_chi.2004.desc: "На світанку перед жителями [target_stop.Custom('LR_GEN')|l] [target_stop.GetName] постає неймовірне, навіть лячне видовище. Обрій перетворюється на справжній ліс щогл — до гавані наближається величезний #L [expedition_initiator.GetAdjective|l]ий#! флот #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. $expedition_leader_name$ на чолі ескадри сходить на берег за дозволом поповнити припаси в [target_stop.Custom('LR_PREP')|l] [target_stop.GetNameWithNoTooltip]. А потім відбувається щось дивне: [expedition_initiator.GetAdjectiveWithNoTooltip|l]і моряки буквально обсипають місцевих чиновників цінними дарами. Вони хочуть, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'прийняла', 'прийняв' )] їхню делегацію."
  flavor_chi.2004.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] з радістю зустріне чужоземних гостей."
  flavor_chi.2005.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] приймає гостей"
  flavor_chi.2005.desc: "$expedition_leader_name$ зі супутниками нарешті прибули до палацу. Спочатку [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша вельмишановна', 'наш вельмишановний' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'була глибоко вражена', 'був глибоко вражений' )] розмірами їхньої ескадри та щедрими подарунками. Тим сильнішим було розчарування, коли чужоземці, по суті, запропонували нам стати [expedition_initiator.GetAdjectiveWithNoTooltip|l]ими #TOOLTIP:SUBJECT_TYPE,tributary,X #L данниками#!#!. З іншого боку, підкорятися такій могутній країні не так погано, як може здатися…"
  flavor_chi.2005.a: "Будь-яка дружба має свою ціну."
  flavor_chi.2005.b: "Ми не підкоримося!"
  chinese_expedition_resolution_tt: "$expedition_name_treasure_voyage$ з Китаю наступні кілька місяців простоїть у порту [target_stop.GetName]. У цей час відбуватимуться [Concept('events', 'події')|e], під час яких ми зможемо поспілкуватися з китайцями та змінити їхню думку про нас. Коли флот відпливе додому, ми дізнаємося, яке враження наша васальна країна справила на посланців: \n\nСлухняне (від #y 67#! до #y 100#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_very_positive', ROOT.GetCountry.MakeScope.Self)]\nДружнє (від #y 33#! до #y 66#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_positive', ROOT.GetCountry.MakeScope.Self)]\nБайдуже (від #y −32#! до #y 32#!):\n$NOTHING_HAPPENS_EFFECT$\nНешанобливе (від #y −66#! до #y −33#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_negative', ROOT.GetCountry.MakeScope.Self)]\nЗарозуміле (від #y −100#! до #y −67#!):\n[ShowScriptedEffectForScope('chi_expedition_resolution_very_negative', ROOT.GetCountry.MakeScope.Self)]"
  flavor_chi.2006.title: "Гідні дари"
  flavor_chi.2006.desc: "Завершивши місію на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, золотий флот #ONCLICK:COUNTRY,[expedition_initiator.Custom('CL_tt')] #TOOLTIP:COUNTRY,[expedition_initiator.Custom('CL_tt')],X [expedition_initiator.Custom('CL_GEN')|L]#!#! готується до швидкого виходу в море. За звичаєм, на знак поваги та як підтвердження нашого статусу #TOOLTIP:SUBJECT_TYPE,tributary,X #L данників#!#! ми повинні піднести їм усе найкраще, чим славиться наша країна."
  flavor_chi.2006.a: "Ми продемонструємо їм свою щедрість."
  flavor_chi.2006.gift: "Ми піднесемо їм свої диковинки."
  flavor_chi.2006.b: "Ми не можемо собі цього дозволити…"
  flavor_chi.2007.title: "Експедиція відпливає"
  flavor_chi.2007.desc: "#L [expedition_initiator.GetAdjective]ий#! золотий флот нарешті покидає гавань [target_stop.Custom('LR_GEN')|l] [target_stop.GetName]. Чужоземні гості надовго запам'ятають гостинність нашої країни, ми ж побажаємо їм удачі та щасливої дороги."
  flavor_chi.2007.a: "До побачення!"
  chi_fleet_will_depart: "#L [expedition_initiator.GetAdjective]а#! експедиція покине #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!."
  chinese_expedition_opinion: "Думка членів золотого флоту"
  based_on_expedition_opinion: "$chinese_expedition_opinion$ зараз становить [ROOT.GetVariable('chinese_expedition_opinion').GetValue], тому відбудеться наступне:"
  flavor_chi.2008.title: "$expedition_name_treasure_voyage$ повернеться додому"
  flavor_chi.2008.desc: "Ескадра, яку ми кілька років тому відправили до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.Custom('LR_ACC')|l] [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName], нарешті повернулася додому. Відважні мореплавці привезли з собою чужоземних посланців та безліч дарів, отриманих під час довгих мандрів. $expedition_leader_name$ вже їде до столиці, щоб представити до двору закордонних послів та подарунки з далеких країн."
  flavor_chi.2008.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2009.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] зустрічає експедицію"
  flavor_chi.2009.desc: "$expedition_leader_name$ з тріумфом повертається до міста [ROOT.GetCountry.GetCapital.GetName], і там експедицію зустрічає радісний натовп. Мандрівники доставили до двору посланців з багатьох країн, готових присягнути на вірність [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нашій государині', 'нашому государю' )]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] вельми [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'втішена', 'втішений' )] їхньою згодою відвідати столицю."
  flavor_chi.2009.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2010.title: "Завершення експедиції"
  flavor_chi.2010.desc: "$expedition_name_treasure_voyage$ повернувся додому. Залишилося підбити підсумки та зрозуміти, чи виправдала ця експедиція витрачені кошти і чи варто організовувати такі дорогі підприємства в майбутньому."
  flavor_chi.2010.a: "Потрібно готувати нові експедиції."
  flavor_chi.2011.title: "Нові маршрути"
  flavor_chi.2011.desc: "Експедиція до [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.Custom('LR_ACC')|l] [ROOT.GetVariable('chinese_treasure_target_location').GetLocation.GetName] не мала дослідницького характеру, проте по дорозі наші мореплавці відкрили нові маршрути, листуючись з місцевими правителями. Повернувшись, вони допоможуть нам скласти більш детальну мапу земель, що лежать за межами #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!."
  flavor_chi.2011.a: "Невже #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединна Країна#!#! — це ще не весь світ?"
  chi_we_will_gift_cloves: "[expedition_initiator.GetName] отримає від нас #TOOLTIP:GOODS,cloves,X #L гвоздику#!#!."
  chi_we_will_gift_giraffe: "[expedition_initiator.GetName] отримає від нас жирафа."
  chi_we_will_gift_persian_blue: "[expedition_initiator.GetName] отримає від нас місцевий #TOOLTIP:GOODS,dyes,X #L барвник#!#!."
  flavor_chi.2012.title: "Екзотичний звір"
  flavor_chi.2012.desc: "$expedition_name_treasure_voyage$ привозить додому дивного звіра, від вигляду якого [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] та [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] приходять у неописаний захват! Цю велику плямисту тварину з неймовірно довгою шиєю за кордоном іменують жирафом, проте наші придворні знаходять у ній разючу схожість з #italic цилінем#! — істотою з #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! міфів, що віщує золотий вік для поточної династії. Ми можемо використати цю легенду, щоб підняти свій престиж, але в такому випадку ми завищимо очікування людей."
  flavor_chi.2012.a: "Це легендарний #italic цилінь#!!"
  flavor_chi.2012.b: "Звір і справді дивовижний."
  flavor_chi.2013.title: "Неперевершений колір"
  flavor_chi.2013.desc: "Наша славна експедиція привезла з #TOOLTIP:SUB_CONTINENT,middle_east,X #L Близького Сходу#!#! дивовижний #TOOLTIP:GOODS,dyes,X #L барвник#!#! насиченого синього кольору, який буде приголомшливо виглядати на нашій знаменитій #TOOLTIP:GOODS,pottery,X #L кераміці#!#!. Такого обсягу якраз вистачить на глазурування перших партій."
  flavor_chi.2013.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2014.title: "Вишуканий смак"
  flavor_chi.2014.desc: "#TOOLTIP:REGION,indonesia_region,X #L Індонезія#!#! славиться своїми спеціями, але такої ароматної #TOOLTIP:GOODS,cloves,X #L гвоздики#!#!, як на #TOOLTIP:AREA,moluccas_area,X #L Молуккських островах#!#!, немає більше ніде. Місцеві жителі прийняли нашу делегацію винятково привітно і подарували нам велику партію цієї вишуканої приправи. $expedition_name_treasure_voyage$ привозить додому стільки гвоздики, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] та [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] зможуть насолоджуватися її смаком кілька місяців поспіль."
  flavor_chi.2014.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_chi.2015.title: "Затримання [Select_CString(extradited_character.IsFemale,'втікачки', 'втікача')]"
  flavor_chi.2015.desc: "$expedition_name_treasure_voyage$ приносить несподівані плоди: $expedition_leader_name$ та $expedition_leader_name_herhis$ вірна команда моряків зуміли вистежити [Select_CString(extradited_character.IsFemale,'відому баламутку', 'відомого баламута')] на ім'я [extradited_character.GetName]. [extradited_character.GetShortNameWithNoTooltip] давним-давно [Select_CString(extradited_character.IsFemale,'покинула', 'покинув')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!, уникнувши правосуддя. Однак наша експедиція не тільки знайшла [Select_CString(extradited_character.IsFemale,'негідницю', 'негідника')], а й відбила [Select_CString(extradited_character.IsFemale,'її', 'його')] у охорони притулку на території #ONCLICK:COUNTRY,[asylum_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[asylum_country.Custom('CL_tt')],X [asylum_country.Custom('CL_GEN')|L]#!#!. Тепер [Select_CString(extradited_character.IsFemale,'вона', 'він')] перебуває в #TOOLTIP:SUB_CONTINENT,china,X #L Китаї#!#! і очікує покарання."
  flavor_chi.2015.a: "Ми повісимо [Select_CString(extradited_character.IsFemale,'цю жалюгідну злочинницю', 'цього жалюгідного злочинця')]!"
  flavor_chi.2015.b: "Ми [Select_CString(extradited_character.IsFemale,'її', 'його')] обезголовимо!"
  flavor_chi.2015.c: "Ми проведемо #italic лінчі#!: поріжемо [Select_CString(extradited_character.IsFemale,'її', 'його')] на шматочки."
  flavor_chi.2015.d: "Ми помилуємо [Select_CString(extradited_character.IsFemale,'втікачку: вона', 'втікача: він')] нам ще знадобиться."
  flavor_chi.2016.title: "Страта пірата на ім'я [executed_character.GetNameWithNoTooltip]"
  flavor_chi.2016.desc: "[executed_character.GetName] походить з області [executed_character.GetBirthLocation.GetArea.GetName]. Після введення #TOOLTIP:POLICY,haijin_policy,X #L Хайцзіня#!#! [Select_CString(executed_character.IsFemale,'її', 'його')] родина подається в пірати. Втікши з країни, [executed_character.GetShortNameWithNoTooltip] очолює піратську спільноту на території #ONCLICK:COUNTRY,[loser_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[loser_country.Custom('CL_tt')],X [loser_country.Custom('CL_GEN')|L]#!#!. $expedition_leader_name$ згодом бере участь у кількох битвах біля берегів [loser_country.Custom('rank_ru_GEN')], де [executed_character.GetNameWithNoTooltip] виступає на боці супротивника. Час розібратися з [Select_CString(executed_character.IsFemale,'цією мерзотницею', 'цим мерзотником')], щоб іншим не кортіло!"
  flavor_chi.2016.a: "Правосуддя звершилося."
  flavor_chi.2017.title: "[Select_CString(loser_character.IsFemale,'Норовлива правителька', 'Норовливий правитель')]"
  flavor_chi.2017.desc: "$expedition_name_treasure_voyage$ підносить приємний сюрприз: під час подорожі $expedition_leader_name$ та команда схопили дуже важливу особу. Це [loser_character.GetName], у минулому [loser_country.GetGovernment.GetRulerTitle|l] [loser_country.Custom('longname_ru_GEN')]. Кричуща неповага до сюзерена призвела [Select_CString(loser_character.IsFemale,'норовливу правительку', 'норовливого правителя')] до стрімкої поразки. Тепер [Select_CString(loser_character.IsFemale,'вона', 'він')] нудиться в нашому полоні."
  flavor_chi.2017.a: "Ми з [Select_CString(loser_character.IsFemale,'нею', 'ним')] поквитаємося."
  flavor_chi.2017.b: "Ми проявимо милосердя."
  flavor_chi.2018.title: "Майбутнє [loser_country.Custom('CL_GEN')]"
  flavor_chi.2018.desc: "Глава #ONCLICK:COUNTRY,[loser_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[loser_country.Custom('CL_tt')],X [loser_country.Custom('CL_GEN')|L]#!#! через свою дурість вирішує піти проти #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!, яку представляє $expedition_leader_name$ зі своєю експедицією. [loser_country.GetLongNameWithNoTooltip] — ця країна програє в запеклому зіткненні, і, поки йде розгляд, на порожнє місце тимчасово призначається [loser_country.GetGovernment.GetRulerTitle|l]."
  flavor_chi.2018.a: "Відправимо намісника. Нехай ним стане [target_character_for_viceroyalty.GetNameWithNoTooltip]."
  flavor_chi.2018.b: "Нехай місцевий номінальний глава залишається."
  flavor_chi.2019.title: "Намісник з країни [expedition_initiator.GetNameWithNoTooltip]"
  flavor_chi.2019.desc: "Ми отримали новини з #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. Тепер наша країна — китайський #TOOLTIP:SUBJECT_TYPE,tributary,X #L данник#!#!, і в осяжному майбутньому нею керуватиме китайський намісник, [target_character_for_viceroyalty.GetName]. Така наша доля: жити під ворожою п'ятою."
  flavor_chi.2019.a: "Одного дня ми скинемо китайське ярмо."
  flavor_chi.2020.title: "Дари з далеких земель"
  flavor_chi.2020.desc: "Під час експедиції наші моряки отримали безліч різних подарунків від місцевих жителів і привезли ці брязкальця до #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!. Вони не становлять особливої цінності, але підвищують привабливість #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#! та зміцнюють наш престиж."
  flavor_chi.2020.a: "Іншого ми й не очікували."
  flavor_chi.2021.title: "Помирає [target.GetNameWithNoTooltip]"
  flavor_chi.2021.desc: "Ми дізналися, що $expedition_leader_name$, голова нашої експедиції золотого флоту, більше не з нами. На жаль, часом подорожі бувають смертельно небезпечними. Тепер експедицію очолить [new_leader.GetName]. Відтепер її доля залежить від нового лідера."
  flavor_chi.2021.a: "Сподіваємося, це не погана прикмета."
  chi_new_expedition_leader: "[new_leader.GetName] тепер керує нашою експедицією «$expedition_name_treasure_voyage$»."
  flavor_chi.2022.title: "Брак коштів"
  flavor_chi.2022.desc: "Ми дізналися, що члени нашої експедиції «$expedition_name_treasure_voyage$» повертаються на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У них закінчилися гроші на подарунки, і вони більше не можуть вести дипломатію. Можливо, наступного разу нам варто виділити більше коштів."
  flavor_chi.2022.a: "Це ганебно."
  chi_expedition_is_returning_to_china: "Члени експедиції «$expedition_name_treasure_voyage$» повертаються на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  show_current_chinese_expedition_amount: "[COUNTRY.MakeScope.GetVariable('chinese_expedition_opinion').GetValue]"
  change_amount_of_treasure_voyage_tt: "Кількість вантажу, що перевозиться членами експедиції «$expedition_name_treasure_voyage$», збільшилася на $VALUE|+$."
  change_amount_of_treasure_voyage_tt_neg: "Кількість вантажу, що перевозиться членами експедиції «$expedition_name_treasure_voyage$», скоротилася на $VALUE|-$."
  change_opinion_of_expedition: "$chinese_expedition_opinion$ щодо нас покращується на $VALUE|0Y$ (зараз: $show_current_chinese_expedition_amount$)"
  change_opinion_of_expedition_neg: "$chinese_expedition_opinion$ щодо нас погіршується на $VALUE|0Y$ (зараз: $show_current_chinese_expedition_amount$)"
  give_gold_to_expedition: "Члени експедиції «$expedition_name_treasure_voyage$» отримають $VALUE|2Y$."
  chi_gift_received_count: "Ми отримали [ROOT.GetVariable('gifts_received').GetValue|2+=] [Concept('gold', 'дукатів')|e]. Ця сума конвертується в:"
  flavor_chi.2100.title: "Золотий флот потрапив у шторм"
  flavor_chi.2100.desc: "Під час плавання наш найбільший золотий флот зіткнувся з найпідступнішим із ворогів — лютою бурею, яка заскочила зненацька навіть найдосвідченіших моряків. Багато кораблів затонуло, а разом із ними пішли на дно наші подарунки та товари."
  flavor_chi.2100.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_chi.2101.title: "Битва з піратським флотом"
  flavor_chi.2101.desc: "[target_location.GetTopography.GetName] у [TARGET_LOCATION.Custom('LR_PREP')|l] [TARGET_LOCATION.GetName] назавжди залишиться в пам'яті наших моряків. Тут наш славний золотий флот зіткнувся з мерзенними піратами. Звісно ж, наші хоробрі воїни не розгубилися. Вони негайно вступили з ворогом у вирішальний бій, знищили піратські судна та взяли в полон їхніх ватажків. На жаль, у цій битві наш флот втратив багато людей і кораблів, а також позбувся важливих ресурсів."
  flavor_chi.2101.a: "Ця битва підніме наш престиж."
  flavor_chi.2200.title: "Пошук перекладача"
  flavor_chi.2200.desc: "Чим далі кораблі #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#! експедиції з пошуку скарбів віддаляються від дому, тим складніше морякам підтримувати з нами зв'язок. Однак вони сповнені рішучості плисти далі та зустрітися з представниками різних культур. На жаль, без перекладача спілкування з ними навряд чи буде продуктивним. Члени експедиції просять нас знайти місцевого перекладача, який допоможе їм подолати мовний бар'єр."
  flavor_chi.2200.a: "Негайно знайдемо перекладача!"
  flavor_chi.2200.b: "Це не наша проблема."
  flavor_chi.2201.title: "Передача мап"
  flavor_chi.2201.desc: "Команда експедиції «$expedition_name_treasure_voyage$» просить нас надати їм мапи місцевих водних шляхів. Ми не зобов'язані це робити, але $expedition_leader_name$ та #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайські#!#! еліти, які зараз перебувають у місцевості «$expedition_location_name$», вважатимуть нашу допомогу жестом доброї волі та будуть дуже нам вдячні."
  flavor_chi.2201.a: "Передамо їм усе, що в нас є."
  flavor_chi.2201.b: "Нам нічим з ними поділитися."
  flavor_chi.2202.title: "Витрати на експлуатацію"
  flavor_chi.2202.desc: "Місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] вирішили обдурити моряків з експедиції «$expedition_name_treasure_voyage$» та відкрили нові ринки поруч із гаванню місцевості $expedition_location_name$. На цих ринках вони продають товари втридорога, а найбільш жадібні купці взагалі підняли ціни до небес. А що? Морякам діватися нікуди — все одно куплять! Через це на вулицях почалися збройні сутички, які призвели до заворушень. [fleet_loc.GetRank.GetName] занурюється в хаос."
  flavor_chi.2202.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] мають понести покарання!"
  flavor_chi.2202.b: "Притягнемо до відповідальності моряків."
  flavor_chi.2203.title: "Протверезний ляпас"
  flavor_chi.2203.desc: "Наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вкрай незадоволені тією увагою, яку ми приділяємо членам експедиції «$expedition_name_treasure_voyage$». Вони вважають #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайців#!#! зарозумілими загарбниками, які не заслуговують на той прийом, який їм надають. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають, щоб ми позбавили китайських моряків частини привілеїв. Нехай знають, що їм тут не раді."
  flavor_chi.2203.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] мають рацію. Дотримаймося їхніх порад."
  flavor_chi.2203.b: "Останнє, що нам потрібно, — це розгнівані китайці."
  flavor_chi.2204.title: "Неповага до релігії"
  flavor_chi.2204.desc: "#TOOLTIP:CULTUREGROUP,chinese_group,X #L Китайські#!#! моряки з експедиції в пошуках скарбів через незнання порушили #L [ROOT.GetCountry.GetReligion.GetAdjective|l]і#! звичаї та скоїли страшне святотатство. Наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] розлютилися. Вони вимагають вибачень від лідера експедиції на ім'я $expedition_leader_name$."
  flavor_chi.2204.a: "Нехай $expedition_leader_name_tooltipless$ принесе свої вибачення."
  flavor_chi.2204.b: "Не будемо втручатися."
  flavor_chi.2205.title: "Запит на екстрадицію"
  flavor_chi.2205.desc: "Члени експедиції «$expedition_name_treasure_voyage$» кажуть, що [Select_CString(target_escapee.IsFemale, 'одна', 'один' )] з наших придворних, [target_escapee.GetName], — [Select_CString(target_escapee.IsFemale, 'бунтівниця', 'бунтівник' )], [Select_CString(target_escapee.IsFemale, 'яка втекла', 'який втік' )] з #ONCLICK:COUNTRY,[expedition_initiator.Custom('CL_tt')] #TOOLTIP:COUNTRY,[expedition_initiator.Custom('CL_tt')],X [expedition_initiator.Custom('CL_GEN')|L]#!#!. $expedition_leader_name$ та #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайські#!#! еліти вимагають передати [Select_CString(target_escapee.IsFemale, 'її', 'його' )] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединній Країні#!#!, де [Select_CString(target_escapee.IsFemale, 'її', 'його' )] судитимуть за всією суворістю закону."
  flavor_chi.2205.a: "Виконаємо їхнє прохання."
  flavor_chi.2205.b: "Це повний абсурд!"
  flavor_chi.2206.title: "Спільні військові навчання"
  flavor_chi.2206.desc: "Лідер експедиції «$expedition_name_chinese_expedition$» пропонує нам взяти участь у спільних навчаннях. Ці навчання будуть корисні обом сторонам і зміцнять довіру між нами та китайцями, але нам слід бути насторожі: ніколи не знаєш, чого очікувати від іноземних вояків. Найближче до місцевості $expedition_location_name$ знаходиться загін «[target_unit.GetName]». Він і братиме участь у спільних навчаннях з китайцями."
  flavor_chi.2206.a: "Приймемо пропозицію."
  flavor_chi.2206.b: "Ми завжди можемо відмовитися."
  flavor_chi.2207.title: "Допомога від китайців"
  flavor_chi.2207.desc: "Коли члени китайської експедиції «$expedition_name_treasure_voyage$» прибули до місцевості $expedition_location_name$, то дізналися: [ROOT.GetCountry.GetLongName] — ця країна веде кровопролитну війну. Виявилося, що [expedition_initiator.GetLongName] не надто високої думки про наших ворогів. Тепер китайці пропонують нам допомогу в цьому конфлікті."
  flavor_chi.2207.a: "Нам знадобиться будь-яка допомога."
  flavor_chi.2207.b: "Це наша війна, а не їхня."
  flavor_chi.2208.title: "Китайські мандрівники допомагають ворогам"
  flavor_chi.2208.desc: "Наші шпигуни повідомили нас: [expedition_initiator.GetLongName] — ця країна проводить масштабну експедицію «$expedition_name_treasure_voyage$», на чолі якої стоїть $expedition_leader_name$. Нещодавно її члени прибули до ворожого порту, розташованого в місцевості $expedition_location_name$. Схоже, вони погодилися допомогти #ONCLICK:COUNTRY,[from.GetName.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.GetName.Custom('CL_tt')],X [from.GetName.Custom('CL_DAT')|L]#!#! у війні проти нас!"
  flavor_chi.2208.a: "Ми ніколи не пробачимо китайців!"
  flavor_chi.2209.title: "Запит на будівництво мечеті"
  flavor_chi.2209.desc: "Як виявилося, голова експедиції «$expedition_name_chinese_expedition$» $expedition_leader_name$, як і багато інших її учасників, сповідує релігію «[target_religion.GetName]». Вони просять дозволити їм побудувати мечеть, щоб підтримати місцеву [target_religion.GetAdjectiveWithNoTooltip|l]у громаду."
  flavor_chi.2209.a: "Задовольнимо запит."
  flavor_chi.2209.b: "Пояснимо їм, що це гріх."
  flavor_chi.2210.title: "$expedition_location_name_tooltipless$ і китайська діаспора"
  flavor_chi.2210.desc: "У місцевості $expedition_location_name$ живе велика #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайська#!#! діаспора, яка формувалася багато десятиліть. Китайські купці брали за дружин місцевих жінок, селилися тут і ставали повноправними членами нашого суспільства. Нещодавно сюди прибула експедиція «$expedition_name_treasure_voyage$» з #ONCLICK:COUNTRY,[expedition_initiator.Custom('CL_tt')] #TOOLTIP:COUNTRY,[expedition_initiator.Custom('CL_tt')],X [expedition_initiator.Custom('CL_GEN')|L]#!#!. Її лідер хоче підтримати діаспору своїх колишніх співгромадян."
  flavor_chi.2210.a: "Чудова ідея."
  flavor_chi.2210.b: "Зупинити їх!"
  flavor_chi.2211.title: "Вояки залишаються"
  flavor_chi.2211.desc: "Кілька демобілізованих вояків з експедиції «$expedition_name_chinese_expedition$» одружилися з місцевими дівчатами і вирішили осісти в місцевості $expedition_location_name$. Згодом вони обзаведуться корисними зв'язками, що буде нам дуже на руку."
  flavor_chi.2211.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_chi.2212.title: "$expedition_name_treasure_voyage$ допомагає нам"
  flavor_chi.2212.desc: "Коли члени експедиції «$expedition_name_chinese_expedition$» прибули в місцевість $expedition_location_name$, то виявили, що [ROOT.GetCountry.GetFlavorRank|l] перебуває у стані громадянської війни. Лідер експедиції «$expedition_name_treasure_voyage$» $expedition_leader_name$ та інші її учасники виявилися не з боязкого десятка. Вони перейнялися співчуттям до #L [ROOT.GetCountry.GetAdjective|l]ого#! народу і пропонують нам військову допомогу від імені #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!."
  flavor_chi.2212.a: "Ми приймемо будь-яку допомогу."
  flavor_chi.2212.b: "Ні, нам не потрібна їхня допомога."
  flavor_chi.2213.title: "$flavor_chi.2212.title$"
  flavor_chi.2213.desc: "Учасники експедиції «$expedition_name_chinese_expedition$» прийняли сторону в конфлікті, що отримав назву «[target_war.GetName]». Може, $expedition_leader_name$ — і розумний лідер, але рішення підтримати #ONCLICK:COUNTRY,[country_at_war_with.Custom('CL_tt')] #TOOLTIP:COUNTRY,[country_at_war_with.Custom('CL_tt')],X [country_at_war_with.Custom('CL_ACC')|L]#!#! замість #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! мудрим не назвеш. Ми розгромимо їх на полі бою."
  flavor_chi.2213.a: "Ми цього не забудемо!"
  flavor_chi.2214.title: "Китайці в люті"
  flavor_chi.2214.desc: "Відносини між #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! та нашими гостями з експедиції «$expedition_name_treasure_voyage$» загострилися до межі. В останні дні сутички між нашим гарнізоном та іноземними моряками значно почастішали. Проте гості продовжували підтримувати з нами контакти, хай і без колишньої теплоти. Однак зараз їхнє терпіння, схоже, урвалося. $expedition_leader_name$ більше не хоче мати з нами жодних справ. Учасники експедиції збираються покинути територію [ROOT.GetCountry.Custom('longname_ru_wntt_GEN')], доки ситуація остаточно не вийшла з-під контролю."
  flavor_chi.2214.a: "Потрібно налагодити відносини з китайцями."
  flavor_chi.2214.b: "Скатертиною дорога!"
  chinese_interregnum: "#ONCLICK:COUNTRY,[THIS.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[THIS.GetCountry.Custom('CL_tt')],X [THIS.GetCountry.Custom('CL_ACC')|L]#!#! чекає період #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайського#!#! міжцарства."
  flavor_chi.2215.title: "Заклик до війни"
  flavor_chi.2215.desc: "Глава експедиції «$expedition_name_treasure_voyage$» $expedition_leader_name$ просить нас вступити у війну проти #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Ми не знаємо, чому #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайці#!#! так ополчилися на цю країну. Так чи інакше, [target_country.Custom('rank_ru_ACC')] чекають важкі часи, а [target_country.GetGovernment.GetRulerTitle|l], можливо, скоро і зовсім попрощається з життям. Лідери експедиції закликають нас покарати непокірних в ім'я Небес."
  flavor_chi.2215.a: "Ми зробимо все, що вони попросять."
  flavor_chi.2215.b: "Ми не станемо їм підкорятися."
  flavor_chi.2216.title: "Невдалі дари"
  flavor_chi.2216.desc: "Ми дізналися, що учасників експедиції «$expedition_name_treasure_voyage$» з числа еліти не влаштовують наші дари, хоча вони і не говорять про це відкрито. Ми помітили невдоволення на їхніх обличчях, ще коли [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'приймала', 'приймав')] їх у себе. Шпигуни підслухали їхні розмови і підтвердили наші побоювання."
  flavor_chi.2216.a: "Виплатимо їм компенсацію."
  flavor_chi.2216.b: "Нехай спершу до нас звернуться, а потім подивимося."
  flavor_chi.2217.title: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] у центрі скандалу"
  flavor_chi.2217.desc: "Коли [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'проводила', 'проводив')] офіційний прийом, один з наших придворних глибоко образив #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! гостей. Якщо терміново нічого не вжити, члени експедиції «$expedition_name_treasure_voyage$» відправлять гінця до Китаю. [expedition_initiator.GetGovernment.GetRulerTitle] буде не в собі від люті."
  flavor_chi.2217.a: "Принесемо їм офіційні вибачення."
  flavor_chi.2217.b: "Осиплемо їх подарунками."
  flavor_chi.2217.c: "Ми не каратимемо своїх."
  flavor_chi.2218.title: "Радісний прийом"
  flavor_chi.2218.desc: "Лідери експедиції «$expedition_name_treasure_voyage$» дуже задоволені наданим прийомом та отриманими привілеями. Ми не тільки обмінялися з ними подарунками, але й допомогли їм відремонтувати кораблі. Ми знаємо, що вони вдячні нам за гостинність, хоча й не говорять про це відкрито."
  flavor_chi.2218.a: "Гостинність — це ключ до успіху!"
  flavor_chi.2218.b: "Нехай не спокушаються."
  chi_neighboring_nations_might_get_cb_on_us: "Сусідні [Concept('nations', 'країни')|e], відвідані членами експедиції «$expedition_name_treasure_voyage$», зможуть оголосити [Concept('war', 'війну')|e] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! та отримати їхню підтримку."
  not_is_treasure_voyage_active: "Зараз не проводиться жодна експедиція «$expedition_name_treasure_voyage$»"
  chinese_treasure_expeditions_when_expedition_returns: "Коли експедиція повернеться до #ONCLICK:COUNTRY,[expedition_initiator.Custom('CL_tt')] #TOOLTIP:COUNTRY,[expedition_initiator.Custom('CL_tt')],X [expedition_initiator.Custom('CL_ACC')|L]#!#!:"