l_russian:
  flavor_ven.1.title: "Розвиток #L [ROOT.GetCountry.GetAdjective]ої#! комуни"
  flavor_ven.1.desc: "#L [ROOT.GetCountry.GetAdjective]а#! комуна разом із Радою сорока багато століть виступала верховним органом влади [ROOT.GetCountry.Custom('CF_RP')|l]. Титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l]» же з часом втратив своє значення і почав вважатися лише пустою формальністю. Зрозуміло, подібне положення речей не подобалося обраним правителям, які бажали відігравати далеко не останню роль у внутрішній політиці держави.\n\nСьогодні, однак, [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а бюрократія проходить через низку перетворень, і стара комуна, а разом з нею і Рада сорока нарешті віджила своє. Багато обов'язків ради тепер виконує [ROOT.GetCountry.GetGovernment.GetParliament.GetName|l], а державна бюрократія розрослася занадто сильно, щоб комуна була здатна з нею впоратися. Настав час скасувати обидва інститути і заснувати замість них новий орган, а заодно зробити так, щоб титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l]» давав володарю право на найдіяльнішу участь у політиці держави."
  flavor_ven.1.a: "Створимо [ROOT.GetCountry.GetAdjectiveWithNoTooltip|U]у синьйорію!"
  flavor_ven.1.b: "Це питання потрібно ретельно обговорити з [ROOT.GetCountry.GetParliament.Custom('CFP_TP')|l]."
  flavor_ven.2.title: "Страдіоти"
  flavor_ven.2.desc: "Після падіння #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополя#!#! багато #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! та #TOOLTIP:CULTURE,albanian_tt,X #L албанських#!#! солдатів перейшли на службу до держави [ROOT.GetCountry.GetLongName] і під її началом билися з #L #L [GetCountry('TUR').GetAdjective|l]#!ими#! військами. Ці так звані страдіоти (від грецького слова, що означає «солдат») особливо добре проявили себе в ролі легкої кавалерії. Історії відомий командир страдіотів Граїдзас Палеолог — командир #L #L [GetCountry('BYZ').GetAdjective|l]#!ого#! гарнізону, який утримував його до 1461 року."
  flavor_ven.2.a: "Наші вороги боятимуться їх!"
  flavor_ven.3.title: "Домініканська інквізиція"
  flavor_ven.3.desc: "У відповідь на поширення альбігойської та патаренської єресей [GetCountry('PAP').GetGovernment.GetRulerTitle|l] [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'спробувала', 'спробував' )] заснувати в #TOOLTIP:REGION,italy_region,X #L Італії#!#! Домініканську інквізицію, однак у [ROOT.GetCountry.Custom('CF_PP')|l] виступили проти присутності інквізиторів у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PP')|L]#!#!. Виявлення єретиків держава взяла на себе: підозрюваних допитував патріарх, єпископ Кастелло або якийсь інший [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий ординарій. Лише після цього скликався суд, який і визначав, чи винен допитуваний у єресі. Покарання встановлювала світська влада. Таке положення речей не влаштовувало #TOOLTIP:LOCATION,rome_tt,X #L римський#!#! суд, через що [GetCountry('PAP').GetGovernment.GetRulerTitle|l] все ж [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale, 'призначила', 'призначив' )] інквізитора. Втім, його повноваження були обмежені: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'повинна була', 'повинен був' )] дати йому екзекватуру, а діяльність інквізиції оцінювала рада, що складалася з трьох [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их дворян. До їхніх обов'язків входив захист прав [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их громадян від посягань з боку церкви, зокрема — забезпечення невтручання в релігійне життя колоній. Дії інквізиції в [ROOT.GetCountry.Custom('CL_PP')] вважалися законними лише в тому випадку, якщо здійснювалися з санкції (і в присутності) ради. Значною мірою завдяки саме незалежному положенню держави, яка наполягала на присутності народних засідателів на кожному обвинувальному процесі, інквізиція в [ROOT.GetCountry.Custom('CL_PP')] не чинила безчинств."
  flavor_ven.3.a: "Насамперед наш народ — [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий, по-друге — християнський."
  ven_venetian_first: "Насамперед венеціанець, по-друге — християнин"
  flavor_ven.3.b: "Ми справжні католики!"
  ven_christian_first: "Насамперед усі — християни!"
  flavor_ven.4.title: "Arte dell’Abbaco"
  flavor_ven.4.desc: "«Деякі юнаки, вельми мені цікаві та прагнучі до купецького життя, неодноразово просили мене викласти письмово основні положення арифметики, що нерідко називається „абак“». Arte dell'Abbaco — перший друкований підручник математики, виданий у Європі. Написаний #L #L [ROOT.GetCountry.GetAdjective|l]#!ою#! мовою та віддрукований у 1478 році в [ShowLocationName('treviso')]."
  flavor_ven.4.a: "Це нам знадобиться!"
  flavor_ven.5.title: "Міністри водних шляхів"
  flavor_ven.5.desc: "Захищеність і добробут #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! стали можливими завдяки зручному розташуванню нашої держави в лагуні. Однак водоймі всерйоз загрожувало замулення, і в 1501 році Велика рада заснувала комітет під назвою Savi alle Acque, перед яким постало завдання перенаправити течію річок, що впадають у лагуну. Своєю самовідданою працею ці люди врятували Сереніссіму від катастрофи та забезпечили нашому місту подальше процвітання.\n\nЯк нам варто вчинити сьогодні?"
  flavor_ven.5.a: "Воно того варте!"
  flavor_ven.5.b: "[ROOT.GetCountry.GetNameWithNoTooltip] впорається і без них!"
  flavor_ven.6.title: "Гетто"
  flavor_ven.6.desc: "У 1516 році влада [ROOT.GetCountry.Custom('CF_RP')|l] зобов'язала всіх #TOOLTIP:RELIGION,judaism_tt,X #L юдеїв#!#! селитися в районі міста, де раніше були розташовані ливарні — «геті» (geti) #L #L [ROOT.GetCountry.GetAdjective|l]#!ою#! мовою. Усім жителям цього району наказувалося носити з собою знаки відмінності та займатися лихварством виключно за тими ставками, які встановлювала Сереніссіма. В обмін на захист під час війни та можливість сповідувати свою віру юдеї виявилися змушені дотримуватися й безлічі інших обтяжливих обмежень.\n\nЯк нам слід вчинити сьогодні?"
  flavor_ven.6.a: "Дайте їм власне місце для життя!"
  flavor_ven.6.b: "Тільки не в [ROOT.GetCountry.Custom('CL_PP')]!"
  flavor_ven.7.title: "[Select_CString(target_character.IsFemale, 'Дослідниця', 'Дослідник' )] на ім'я [target_character.GetNameWithNoTooltip]"
  flavor_ven.7.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'дослідниця', 'дослідник' )] родом з #TOOLTIP:CULTUREGROUP,italian_group,X #L італійського#!#! міста [ShowLocationName('vicenza')]. [Select_CString(target_character.IsFemale, 'Вона супроводжувала', 'Він супроводжував' )] Фернана Магеллана у навколосвітній подорожі, [Select_CString(target_character.IsFemale, 'допомагала', 'допомагав' )] йому в справах і [Select_CString(target_character.IsFemale, 'склала', 'склав' )] докладний опис експедиції. З 240 людей, що вирушили в трирічну подорож, додому в Іспанію повернулося лише 18, і серед них — [target_character.GetLastNameWithNoTooltip]. Саме завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] нотаткам ми знаємо, як відбувалося перше у світі навколосвітнє плавання."
  flavor_ven.7.a: "Земля і справді кругла!"
  flavor_ven.8.title: "Призов на флот"
  flavor_ven.8.desc: "Панування над морем завжди було пов'язане з певними труднощами. До 1545 року веслярі на галерах були винятково вільними людьми, що працювали за платню. Спочатку на веслах працювали моряки #L #L [ROOT.GetCountry.GetAdjective|l]#!ого#! походження, а невдовзі на службу стали надходити численні #TOOLTIP:CULTURE,dalmatian_tt,X #L далмати#!#!, критяни та #TOOLTIP:CULTURE,$greek_culture_tt$,X #L греки#!#!. Оскільки підтримувати достатню чисельність вільних команд виявилося складно, #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#! довелося перейти до примусового набору і почати приковувати веслярів до лавок, як це було прийнято у флотах багатьох інших країн. Першим командиром такої [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої галери став Крістофоро да Каналь.\n\nЯк нам слід вчинити сьогодні?"
  flavor_ven.8.a: "Затвердити призов"
  flavor_ven.8.b: "[ROOT.GetCountry.GetGovernment.GetGovernmentType.GetNameWithNoTooltip|U] на таке не погодиться!"
  flavor_ven.9.title: "Форт Сант-Андреа"
  flavor_ven.9.desc: "Форт Сант-Андреа — фортеця, побудована в 1545 році для оборони головного водного шляху, що веде до #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_VP')|L]#!#! з #TOOLTIP:PROVINCE_DEFINITION,adriatic_sea_province,X #L Адріатичного моря#!#!. За будівництво форту відповідав знаменитий архітектор Мікеле Санмікелі — можливо, єдиний #TOOLTIP:CULTUREGROUP,italian_group,X #L італійський#!#! архітектор свого століття, який особисто вивчив #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьку#!#! архітектуру у своїх поїздках грецькими володіннями [ROOT.GetCountry.Custom('CF_RP')|l] [ROOT.GetCountry.GetNameWithNoTooltip]. Ця фортеця понад три століття надійно захищала спокій [ROOT.GetCountry.Custom('CL_RP')].\n\nЯк нам слід вчинити сьогодні?"
  flavor_ven.9.a: "Приступимо до будівництва!"
  flavor_ven.9.b: "Це занадто дорого"
  flavor_ven.10.title: "Міст Ріальто"
  flavor_ven.10.desc: "Міст Ріальто — один із чотирьох мостів, що перетинають Великий канал #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Спочатку був побудований з дерева, проте під час повстання 1310 року він згорів, а потім ще двічі — у 1444 та 1524 роках — обвалювався. У 1503 році було запропоновано побудувати міст Ріальто заново, цього разу вже з каменю. Розгляд проєктів нового мосту затягнувся на кілька десятиліть, і лише в 1551 році уряд заявив, що готовий вивчити нові пропозиції. Плани з перебудови мосту представили такі знамениті архітектори, як Якопо Сансовіно, Палладіо та Віньола, проте всі вони отримали відмову: міст у класичному стилі з кількома арками був визнаний невідповідним. Спочатку будівництво нового мосту збиралися доручити відомому майстру Мікеланджело, проте в підсумку перемога відійшла Антоніо да Понте, який запропонував сміливий задум: міст на одному склепінні.\n\nЯк нам слід вчинити сьогодні?"
  flavor_ven.10.a: "Давайте побудуємо!"
  flavor_ven.10.b: "Вистачить і дерев'яного мосту"
  flavor_ven.11.title: "«Орфей» — перша опера"
  flavor_ven.11.desc: "При написанні опери «Орфей» епохи раннього бароко [target_character.GetName] [Select_CString(target_character.IsFemale, 'надихалася', 'надихався' )] #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьким#!#! міфом про Орфея — музиканта, поета і пророка, що спустився в царство мертвих за своєю покійною дружиною Еврідікою. Опера була написана в 1607 році і призначалася для виконання при дворі на щорічному карнавалі в місті [ShowLocationName('mantova')]. У 1609—1615 роках [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'видала', 'видав' )] партитуру до неї. Всього в партитурі вказано 41 різний інструмент; всі вони, об'єднані в різні групи, використовуються для зображення різних сцен і персонажів."
  flavor_ven.11.a: "Так через надмірну любов мене втрачаєш?"
  flavor_ven.12.title: "Народження сучасної науки"
  flavor_ven.12.desc: "[galileo_galilei_scope.GetName] — людина, яку багато хто абсолютно щиро називає «[galileo_galilei_scope.GetMotherFather|l] сучасної науки». У 1592 році [Select_CString(galileo_galilei_scope.IsFemale, 'вона отримала', 'він отримав' )] посаду професора математики в університеті #TOOLTIP:PROVINCE_DEFINITION,padua_province,X #L Падуї#!#!. Дізнавшись про існування підзорних труб, [galileo_galilei_scope.GetName] [Select_CString(galileo_galilei_scope.IsFemale, 'сконструювала', 'сконструював' )] кілька власних телескопів для вивчення неба, що значно перевершували всі попередні оптичні прилади. За допомогою цих телескопів [Select_CString(galileo_galilei_scope.IsFemale, 'вона виявила', 'він виявив' )] гори на Місяці та чотири супутники Юпітера. Ці досягнення, а також трактати з руху та механіки лягли в основу того, що в майбутньому стануть називати сучасною наукою."
  flavor_ven.12.a: "Це велике благо!"
  flavor_ven.13.title: "[target_character.GetNameWithNoTooltip] та Дім Альда"
  flavor_ven.13.desc: "[ROOT.GetCountry.GetName] — одна з перших держав, що освоїли книгодрукування. Це мистецтво поки ще тільки доводиться до досконалості, проте [target_character.GetName] і особливо [Select_CString(target_character.IsFemale, 'її', 'його' )] видавництво — Дім Альдіна — вже користуються доброю славою: їхні книги завжди витончено та красиво зверстані, а переклади з латини незмінно якісні. [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'внесла', 'вніс' )] значний внесок як у типографію — завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] зусиллям у книгах з'явилися курсив і крапки з комою — так і в палітурну справу: [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'винайшла', 'винайшов' )] формат «октаво», щоб не наслідувати середньовічні рукописи, а завжди мати можливість взяти книгу з собою."
  flavor_ven.13.a: "Поспішай повільно!"
  aldus_disappears_tt: "Майстерня персонажа [target_character.GetNameWithNoTooltip] закриється, а [Select_CString(target_character.IsFemale, 'сама вона', 'сам він' )] зникне"
  flavor_ven.14.title: "Розвиток скляної справи в Мурано"
  flavor_ven.14.desc: "К кінцю XIII століття #L #L [ROOT.GetCountry.GetAdjective|l]#!а#! склодувна промисловість перемістилася на острів Мурано, де не такий великий був ризик пожежі. З тих пір муранське #TOOLTIP:GOODS,glass,X #L скло#!#! стало користуватися ще більшою любов'ю у народу, а склодуви здобули багатство та вплив. Секрети виробництва витонченого муранського скла знають лише деякі, особливо за межами нашої держави, і щоб це знання не стало надбанням громадськості, склодуви не покидають місто.\n\nАле світ змінюється, а разом з ним змінюються і обставини виробництва [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого скла. Після падіння #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополя#!#! до нас звернулося чимало ремісників, чиї пізнання в галузі скляної справи вкрай рідкісні та корисні. Ці люди просять дозволити їм оселитися на Мурано."
  flavor_ven.14.a: "Прийняти у себе [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]их склодувів."
  STATIC_MODIFIER_NAME_ven_murano_glass_industry: "Муранська склодувна промисловість"
  STATIC_MODIFIER_DESC_ven_murano_glass_industry: "Склодувна промисловість венеціанського острова Мурано, що веде свою історію з 13 століття, унікальна. Це один з багатьох видів розкоші, якими славиться Венеція."
  flavor_ven.15.title: "Чьокка"
  flavor_ven.15.desc: "Особливо вправний муранський склодув на ім'я [target_character.GetName] створює справжні витвори мистецтва, раніше не бачені в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PP')|L]#!#!. Особливого поширення серед багатіїв набули люстри під назвою чьокка, що нагадують букети квітів (їх назва так і перекладається — «букет»), і тепер [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а склодувна промисловість знову на підйомі."
  flavor_ven.15.a: "Промисловість [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip] буде процвітати!"
  flavor_ven.15.b: "Нехай мистецтво прикрасить наше ім'я!"
  flavor_ven.16.title: "Суд над Веронікою Франко"
  flavor_ven.16.desc: "Перед міським судом сьогодні за звинуваченням у чаклунстві постала одна з найвідоміших «достойних куртизанок» #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! — Вероніка Франко, що славиться своїм розумом і красою. Франко користується впливом у своїх клієнтів і відкрито бере участь у творчому та літературному житті [ROOT.GetCountry.Custom('CL_RP')], чим нажила собі численних ворогів.\n\nЇї захисна промова перед інквізицією виявилася вельми виразною, і тепер лише час покаже, чи достатньо гострий розум Вероніки, щоб виправдати себе перед поборниками моральності."
  flavor_ven.16.a: "Винна!"
  flavor_ven.16.b: "Невинна!"
  flavor_ven.17.title: "Пишні гондоли"
  flavor_ven.17.desc: "#L [ROOT.GetCountry.GetAdjective]ий#! уряд постійно стоїть на сторожі суспільної моральності, а тому час від часу приймає закони, що забезпечують прихильність громадян #TOOLTIP:RELIGIONGROUP,christian,X #L християнським#!#! ідеалам нашого міста. Зараз під пильний погляд влади потрапили гондоли — прості човни для перевезення людей, що щодня тисячами снують каналами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!. Але далеко не всі з них прості: багато багатих і впливових сімейств [ROOT.GetCountry.Custom('CF_RP')|l] не змогли встояти перед спокусою виставити свій статок напоказ, а тому деякі з гондл, що їх перевозять, настільки строкаті та надмірно прикрашені, що один тільки їх вигляд викликає огиду у кожного доброго християнина.\n\nЗараз стоїть питання про прийняття закону, що забороняє прикрашати гондоли: для багатьох ці човни — втілення всіх пороків нашого великого міста."
  flavor_ven.17.a: "Пофарбувати їх у чорне!"
  flavor_ven.17.b: "Не звертайте уваги на моралістів. Гондоли прекрасні."
  flavor_ven.18.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]а школа"
  flavor_ven.18.desc: "[ROOT.GetCountry.GetName|U] — місто, що протягом століть славиться своєю друкарською та склодувною справою, рівних якій немає в усій #TOOLTIP:REGION,italy_region,X #L Італії#!#!, — вже починає перевершувати [ShowLocationName('rome')|U] у всьому, що стосується живопису та музики, або принаймні досягати не менших висот. У нас живуть і працюють знамениті художники Тінторетто, Тіціан і Веронезе, музиканти Монтеверді, Габріелі та Донаті — і це лише мала частина наших творців. Не тільки в #TOOLTIP:REGION,italy_region,X #L Італії#!#!, а й за кордоном [ROOT.GetCountry.GetNameWithNoTooltip] сьогодні — чи не перше, що спадає на думку при слові «мистецтво»."
  flavor_ven.18.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ven.1000.title: "Торгівля перцем під загрозою"
  flavor_ven.1000.desc: "Влада над торговими шляхами в #TOOLTIP:REGION,indian_ocean_region,X #L Індійському океані#!#! сьогодні знаходиться в #L #L [GetCountry('POR').GetAdjective|l]#!их#! руках. Тепер торгівля йде навколо #TOOLTIP:CONTINENT,africa,X #L Африки#!#!, а не через #TOOLTIP:LOCATION,alexandria_tt,X #L Александрію#!#!, як раніше, і це серйозно ускладнює нашу можливість впливати на торгівлю #TOOLTIP:GOODS,pepper,X #L перцем#!#!. Втім, ми можемо звернутися за допомогою до #ONCLICK:COUNTRY,[GetCountry('MAM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MAM').Custom('CL_tt')],X [GetCountry('MAM').Custom('CL_DP')|L]#!#!…"
  flavor_ven.1000.a: "Відправити допомогу в Александрію!"
  ven_helping_mamelukes: "Допомога мамлюкам"
  flavor_ven.1000.b: "Це не наша проблема"
  flavor_ven.1001.title: "[ven_scope.GetNameWithNoTooltip] посилає допомогу"
  flavor_ven.1001.desc: "Влада над торговими шляхами в #TOOLTIP:REGION,indian_ocean_region,X #L Індійському океані#!#! перейшла в #L #L [GetCountry('POR').GetAdjective|l]#!і#! руки, і тепер [ven_scope.GetGovernment.GetGovernmentType.GetName] [ven_scope.GetName], що існує переважно за рахунок торгівлі, відчуває серйозне занепокоєння. Але, оскільки нас пов'язують добрі стосунки, ми отримали допомогу у вигляді #TOOLTIP:GOODS,lumber,X #L лісоматеріалів#!#! на будівництво нових кораблів, а також різних ресурсів для купців."
  flavor_ven.1001.a: "Гарні новини!"
  venetian_help: "Венеційська допомога"
  flavor_ven.19.title: "Нечестивий союз"
  flavor_ven.19.desc: "[GetCountry('TUR').GetName|U] твердо має намір заволодіти провінцією [target_province.GetName], а тому планує напасти на #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_VP')|L]#!#!. Ми отримали несподівану пропозицію від #L #L [GetCountry('TUR').GetAdjective|l]#!их#! дипломатів: якщо ми вступимо з ними в союз і надамо їм у допомогу свій флот, а також підтвердимо їхні претензії на Південну #TOOLTIP:REGION,italy_region,X #L Італію#!#!, вони обіцяють прийти нам на допомогу в майбутньому.\n\nМожливо, від такої угоди дійсно буде користь, але чи варто водити знайомство з ворогами християнського світу?"
  flavor_ven.19.historical_info: "Хоча венеційці та османи часто були заклятими ворогами, у 1479 році османи запропонували укласти союз проти Неаполітанського королівства. Синьйорія у Венеції зрештою відхилила пропозицію, але її посол у Константинополі спонукав турків захопити Отранто та деякі інші міста півдня Італії."
  flavor_ven.19.a: "Забезпечити лише дипломатичну підтримку."
  flavor_ven.19.b: "Погодитися на пропозицію."
  flavor_ven.19.c: "Дати відсіч язичникам."
  flavor_ven.19.a.tt: "[GetCountry('TUR').GetNameWithNoTooltip|U] отримає [Concept('government_power','владу уряду')|e]."
  flavor_ven.19.b.tt: "Ми укладемо [Concept('alliance', 'союз')] з владою [GetCountry('TUR').Custom('CL_RP')]."
  flavor_ven.20.title: "Материкові володіння"
  flavor_ven.20.desc: "Мало який ворог зможе щось протиставити нашому флоту, однак через відсутність проміжної захисної області на суші [ShowLocationName('venice')] вкрай вразлива до нападу з материка. Місто необхідно захистити від ймовірного нападу з берегів Італії, а тому, можливо, розумно буде тимчасово перейти до завоювання наземних територій: розширивши свої володіння, ми зможемо створити повноцінну лінію оборони і тим самим серйозно зміцнити безпеку Венеції."
  flavor_ven.20.a: "Треба заявити про свої права!"
  flavor_ven.20.b: "Ми не можемо собі дозволити вести війни на материку."
  flavor_ven.20.historical_info: "Щоб забезпечити собі торгові маршрути та підвищити безпеку Венеції, Республіка почала розширюватися на материк, захопивши території у Верони. Це зрештою призвело до заснування так званих Domini di Terraferma, материкових володінь. Володіння слугували буфером між Венецією та її сусідами на материку."
  flavor_ven.21.title: "[ShowBuildingTypeNameWithNoTooltip('teatro_san_cassiano')]"
  flavor_ven.21.desc: "[ShowLocationName('venice')] — справжня краса і гордість #TOOLTIP:REGION,italy_region,X #L італійської#!#! культури: тут здавна проживає безліч митців та акторів. Прихильники переваги венеційського мистецтва та свободи самовираження для її обдарованих синів і дочок почали закликати нас звести гідні нашого міста театр та оперу. [ShowBuildingTypeName('teatro_san_cassiano')] стане справжнім втіленням розкоші, багатства та геніальності Венеції, і відвідувати його будуть навіть іноземці з далеких країв."
  flavor_ven.21.a: "Почнемо будівництво!"
  flavor_ven.21.b: "Нам це не по кишені."
  flavor_ven.21.historical_info: "Театр Сан-Кассіано, побудований у Венеції в 1637 році — перший у світі публічний оперний театр. Його будівництво стало важливою віхою в історії виконавського мистецтва та зміцнило роль Венеції як головного культурного центру."
  flavor_ven.23.title: "Заражена Венеція"
  flavor_ven.23.desc: "Наші спроби лише обмежено відновити місто після руйнівного природного лиха обернулися катастрофою. Багато кварталів #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#! зруйновані, будівлі її розвалюються, а вулиці завалені сміттям. Усе це разом із поганими санітарними умовами призвело до епідемії та нашестя шкідників. Під загрозою життя та здоров'я наших громадян.\n\nСпалах чуми, спричинений життям серед бруду та руїн, стрімко поширюється серед жителів. Добре ім'я #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_RP')|l]#!#! серйозно постраждало, як і дух місцевих жителів. Необхідно терміново щось зробити, щоб обстановка не стала ще гіршою. Нам слід пошукати інший підхід — наприклад, вкласти сили та кошти в розчищення та відновлення міста, щоб відновити порядок і процвітання."
  flavor_ven.23.a: "Треба діяти негайно!"
  flavor_ven.23.b: "Занадто пізно щось робити."
  flavor_ven.24.title: "Затоплення Венеції"
  flavor_ven.24.desc: "На #TOOLTIP:LOCATION,venice_tt,X #L Венецію#!#! спіткала неждана катастрофа: через найсильніші зливи Адріатичне море вийшло з берегів і затопило #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_VP')|l]#!#!. Вода залила вулиці, будинки та дороги. Тисячі жителів залишилися без даху над головою. Рутина порушена, торгівля зупинилася; ще трохи — і в [target_location.Custom('LR_PP')|l] почнуться заворушення. Потоп настільки сильний, що діяти необхідно якомога швидше, інакше постраждає ще більше людей."
  flavor_ven.24.a: "Реалізувати заходи зі пом'якшення збитків."
  flavor_ven.24.b: "Місцеві впораються самі."
  flavor_ven.25.title: "Падіння Константинополя"
  flavor_ven.25.desc: "Подібного тріумфу наш народ не відчував з часів Четвертого хрестового походу: величні стіни #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополя#!#! впали під натиском наших військ, ознаменувавши тим самим доленосну перемогу. Цією переломною подією ми відкрили нову главу в історії #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_RP')|l]#!#!, що тепер належить нашим завойовникам. Жадібні до здобичі солдати вже рвуться грабувати численні скарбниці, однак якщо ми дозволимо їм безчинствувати, вони лише посіють у місті руйнування і викличуть гнів місцевих жителів.\n\nДеякі пропонують сміливий підхід: нехай відродиться [GetCountry('LAT').GetLongName], а [ShowLocationNameWithNoTooltip('constantinople')] стане васальною державою під нашою владою."
  flavor_ven.25.a: "Розорити [target_location.Custom('LR_VP')|l]."
  flavor_ven.25.b: "Проголосити нову державу в Константинополі."
  flavor_ven.25.b.tt: "У #TOOLTIP:LOCATION,constantinople_tt,X #L Константинополі#!#! виникне наш [ShowSubjectTypeName('vassal')|l] — [GetCountry('LAT').GetLongName]. Ми передамо цій державі владу над Константинополем і наш національний район у ньому."
  flavor_ven.25.c: "Треба закріпити це повсюдно."
  flavor_ven.25.c.tt: "У всій #TOOLTIP:AREA,thrace_area,X #L Фракії#!#! з'явиться наш [ShowSubjectTypeName('vassal')|l] — [GetCountry('LAT').GetLongName]. Ми передамо цій державі владу над усіма нашими районами у Фракії, зокрема національними."
  flavor_ven.25.d: "Взяття Константинополя — вже тріумф."
  flavor_ven.26.title: "Визволення Єрусалима"
  flavor_ven.26.desc: "Ми прогнали іноземних загарбників, і тепер, через багато століть, над священним містом знову майорять християнські прапори. Слова «[GetCountry('VEN').GetLongName]» відтепер викликають у серцях нашого народу благоговійний трепет і гордість за цей тріумф. Однак тепер перед нами стоїть нова складність: необхідно вирішити, як саме буде управлятися [ShowLocationName('jerusalem')].\n\nДеякі стверджують, що якщо ним буде безпосередньо володіти [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], то наш вплив зміцниться, а [target_location.GetRank.GetName|l] залишиться святим місцем під надійним захистом. Інші ж пропонують заснувати тут васальну державу, відтворивши державу, в минулому відому як [GetCountry('KOJ').GetName]. Новий васал відстоюватиме наші інтереси, а заодно нагадуватиме про спадщину хрестових походів."
  flavor_ven.26.a: "[target_location.GetRank.GetNameWithNoTooltip|U] залишиться під нашою владою."
  flavor_ven.26.b.tt: "У #TOOLTIP:LOCATION,jerusalem_tt,X #L Єрусалимі#!#! виникне наш [ShowSubjectTypeName('vassal')|l] — [GetCountry('KOJ').GetLongName]. Ми передамо цій державі владу над Єрусалимом і наш національний район у ньому."
  flavor_ven.26.b: "Проголосити нову державу в Єрусалимі."
  flavor_ven.26.c.tt: "У всьому #TOOLTIP:AREA,levant_area,X #L Леванті#!#! з'явиться наш [ShowSubjectTypeName('vassal')|l] — [GetCountry('KOJ').GetLongName]. Ми передамо цій державі владу над усіма нашими районами в Леванті, зокрема національними."
  flavor_ven.26.c: "Ми відродимо [GetCountry('KOJ').Custom('CL_VP')] у всьому Леванті."
  flavor_ven.27.title: "Розширення палацу дожів"
  flavor_ven.27.desc: "Будівництво венеціанського #TOOLTIP:BUILDING_TYPE,doges_palace,X #L палацу дожів#!#! почалося в IX столітті і тривало ще кілька століть. Спочатку ця споруда нагадувала фортецю, однак з часом стала втілювати всю красу готичної архітектури. Призначення палацу — подвійне: крім того, що тут проживає [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — людина, якій підпорядковується [GetCountry('VEN').GetLongNameWithNoTooltip], у будівлі також розташовані урядові контори та суди.\n\nЗ роками, втім, стає тільки очевидно, що палац занепав і потребує ґрунтовного ремонту. Можливо, настав час перетворити його на витвір мистецтва, здатний затьмарити навіть величні резиденції західних королів."
  flavor_ven.27.a: "Гарна ідея!"
  flavor_ven.27.b: "Палац і так гарний."
  flavor_ven.27.historical_info: "До 16 століття палац Дожів зазнав значних змін і розширень, що значно підвищило його велич. Одним з найвидатніших досягнень у процесі перебудови стало завершення його знаменитого фасаду, що виходив на Гранд-канал. Архітектурна велич фасаду була помітна всім, хто наближався до палацу по воді. Цей період оновлення та розширення закріпив статус палацу як надійного символу могутності та влади Венеції. Його пишно прикрашені кімнати та зали не тільки стали свідками століть політичної активності, але також і слугували міцним показником багатої історії міста, його значущості на світовій арені."
  flavor_ven.28.title: "[ShowBuildingTypeNameWithNoTooltip('venetian_arsenal')]"
  flavor_ven.28.desc: "Ми широко прославилися як досвідчені мореплавці та чудові кораблебудівники, але цей успіх був би неможливий без #TOOLTIP:BUILDING_TYPE,venetian_arsenal,X #L Арсеналу#!#! — гордості #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#!. Саме цьому підприємству, розташованому в стратегічно вигідному місці, ми завдячуємо своєю силою на морі. Кораблебудування, впровадження новацій, розробка нових знарядь — усе, що допомагає нам зміцнювати морське панування, відбувається в Арсеналі."
  flavor_ven.28.a: "Це важлива частина нашої морської спадщини!"
  flavor_ven.28.historical_info: "Венеційський арсенал слугував головною верф'ю та флотською базою Венеції, забезпечував перевагу міста на морі та його військову міць. Обширний комплекс відповідав за будівництво та утримання венеційського флоту, символізуючи собою кораблебудівну майстерність та промисловий розвиток Республіки."
  flavor_ven.29.title: "Базиліка Санті-Джованні-е-Паоло"
  flavor_ven.29.desc: "Вражаюча архітектура — не рідкість на вулицях #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#!. Кожен митець-початківець прагне прославитися і вилізти на плечі тих титанів, що передували йому, а тому вважає за потрібне прикрасити місто своїми фресками або статуями. Одне з таких нещодавніх творінь, що тішать погляд жителів столиці, — базиліка $san_zanipolo$, велика цегляна споруда в готичному стилі, а заодно — головна домініканська церква нашої великої держави. Базиліка присвячена святим Івану та Павлу — двом легендарним мученикам, відомим ще з IV століття."
  flavor_ven.29.a: "Чудово!"
  flavor_ven.30.title: "Середземноморська морська наддержава"
  flavor_ven.30.desc: "Мало які країни можуть похвалитися настільки ж великим досвідом у морських справах, який накопичили ми — держава торговців і мореплавців, одна з провідних сил у Середземномор'ї. Споконвіку ми любимо і поважаємо море, і з цієї любові виросла наша гордість — грандіозна столиця [ROOT.GetCountry.GetCapital.GetName], захищена тими самими водами, які дарували нам багатство і славу. Сьогодні жоден інший флот не здатен кинути нам виклик на Середземному морі, а тому час проголосити його Mare Nostrum — нашим морем!"
  flavor_ven.30.a: "Ми на тобі одружуємося, о море, на знак істинної та вічної влади, яку над тобою маємо."
  STATIC_MODIFIER_NAME_ven_mare_nostrum: "Наше море"
  flavor_ven.31.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.31.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'знаменита художниця', 'знаменитий художник' )], [Select_CString(target_character.IsFemale, 'що прославилася', 'що прославився' )] своїм умілим поводженням з кольором та революційною технікою письма, і діяч #TOOLTIP:CULTUREGROUP,italian_group,X #L італійського#!#! #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! родом з міста [ShowLocationName('pieve')], що поруч з #TOOLTIP:LOCATION,venice_tt,X #L Венецією#!#!. За минулі сім десятиліть [Select_CString(target_character.IsFemale, 'вона написала', 'він написав' )] безліч портретів, а також міфічних та релігійних сюжетів.\n\nУсі [Select_CString(target_character.IsFemale, 'її', 'його' )] портрети, наприклад #italic «Венера Урбінська»#!, особливо примітні яскравим зображенням душевних станів та насиченими палітрами. Вплив, який [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'справила', 'справив' )] на #L [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]е#! та європейське мистецтво, вкрай великий, а тому [Select_CString(target_character.IsFemale, 'вона', 'він' )] неодмінно увійде до числа найвидатніших живописців епохи Відродження."
  flavor_ven.31.a: "Воістину видатна людина!"
  flavor_ven.32.title: "[ROOT.GetCountry.GetNameWithNoTooltip] в епоху Відродження"
  flavor_ven.32.desc: "В епоху #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! мистецтво та архітектура #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! досягли нових висот пишноти. [ROOT.GetCountry.GetAdjectiveWithNoTooltip|U]і художники, скульптори та архітектори — майстри яскравих кольорів та чуттєвого вираження — навіки залишаться в серцях нащадків.\n\nСвоїми насиченими палітрами та вражаючою технікою к'яроскуро живописці немов переносять навколишній світ на дерево та полотна — настільки правдоподібні їхні роботи. Найчастіше в нашій державі пишуть портрети, але поширені також і алегоричні та міфологічні сюжети. Воістину різноманітне та зворушливе [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]е мистецтво!"
  flavor_ven.32.a: "Вражаюче!"
  flavor_ven.32.a.tt: "[Concept('prosperity','Процвітання')|e] кожного належного нам району, де є [ShowBuildingTypeName('library')|l], збільшується на [ShowNamedValue('prosperity_weak_bonus')|+=2%]."
  flavor_ven.32.historical_info: "Під час Відродження Венеція стала центром культури та мистецтв, що приваблював одних із найпрославленіших художників епохи. Тиціано Вечелліо, відомий просто як Тиціан, створив такі шедеври, як #italic Успіння Богородиці#! та #italic Вакх і Аріадна#!, що демонстрували вміле використання кольору та інноваційну композицію. Тінторетто, інший венеційський майстер, знаменитий своїми драматичними та динамічними роботами, серед яких #italic Таємна вечеря#! та #italic Рай#!, причому остання — одна з найбільших картин олією на полотні. Паоло Веронезе, відомий своїм пишним та грандіозним стилем, створив такі шедеври, як #italic Шлюб у Кані Галілейській#! та #italic Бенкет у домі Левія#!, відзначені яскравістю кольорів та найвищою проробкою деталей. Ці художники та їхні роботи зробили великий внесок у репутацію Венеції як центру мистецтва та культури Відродження."
  flavor_ven.33.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий карнавал"
  flavor_ven.33.desc: "Свій початок карнавал бере ще в XI столітті. Свято, що спочатку являло собою урочистості на честь #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! перемоги над ворогами, з часом переросло в пишне, неповторне видовище. Оскільки ми розташовуємося на перетині важливих #TOOLTIP:CONTINENT,europe,X #L європейських#!#! торгових шляхів, до нашої держави рікою течуть гроші, а значить, ми можемо собі дозволити влаштовувати воістину вражаючі карнавали. Сьогодні це свято — уособлення розкоші, а заодно і морального занепаду нашої держави. З усієї Європи сюди з'їжджаються охочі взяти участь у святкуваннях, і не в останню чергу їх вабить можливість приховати своє обличчя під маскою: під нею неможливо відрізнити дворянина від простолюдина, а тому всі відвідувачі карнавалу можуть вільно спілкуватися один з одним, незважаючи на відмінності в походженні."
  flavor_ven.33.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.33.a.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#! зросте на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]"
  flavor_ven.33.historical_info: "У 18 столітті Венеційський карнавал досяг піку свого розвитку зі складними костюмами, театральними виставами та вишуканими масками. У 1797 році, однак, карнавал був заборонений окупаційними французькими властями і традиція затихла майже на два століття. Лише наприкінці 20 століття карнавал був відроджений і став тим всесвітньо відомим святом, яким ми знаємо його сьогодні. У наші дні Венеційський карнавал зберігає традиції минулого з його приголомшливими масками та костюмами, вуличними виставами та святковою атмосферою, залишаючись захоплюючою та ностальгічною подорожжю в багату історію та культуру міста."
  flavor_ven.34.title: "Перегляд обіцянки дожів"
  flavor_ven.34.desc: "[ShowGovernmentReformName('promissione_ducale_reform')] — клятва, яку зобов'язаний принести кожен майбутній носій титулу «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!». У ній описуються обов'язки, які [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] несе перед державою, а заодно і межі владних повноважень.\n\nЩоправда, з часом частина цих стримувань дещо… ослабла. Якщо ми складемо нову обіцянку, більш явно підкресливши, яких цінностей дотримуємося і яку роль виконує [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], то, по-перше, держава зміцніє, а по-друге, обійняти посаду правителя можуть спробувати більш доброчесні кандидати."
  flavor_ven.34.a: "Перегляньмо його та зробімо офіційним!"
  flavor_ven.34.b: "Обіцянка не потребує перегляду."
  flavor_ven.34.historical_info: "Обіцянка дожів — це офіційна присяга, яку складають венеційські дожі при вступі на посаду, а також договір, якого вони зобов'язуються дотримуватися. У договорі підкреслювалися обов'язки та обмеження дожа, а також закони, яких той мав дотримуватися, що гарантувало баланс влади та захист інтересів Республіки."
  flavor_ven.35.title: "Питання реляціоні"
  flavor_ven.35.desc: "Реляціоні — це звіти, які наші посли подають уряду. Там містяться докладні відомості про політичний, фінансовий та соціальний стан держав, у яких вони працюють. Такі звіти важливі як для нашої дипломатичної служби, так і для підтримання конкурентоспроможності наших торговців за кордоном, але зараз їхні копії все частіше видаються та продаються тим, хто готовий щедро за них заплатити. Це загроза нашій дипломатії та безпеці. Ми повинні почати боротьбу з такими публікаціями, а також створити загальну та надійну систему написання та розповсюдження реляціоні."
  flavor_ven.35.a: "Настав час покінчити з цією практикою!"
  flavor_ven.35.b: "У нас є важливіші справи."
  flavor_ven.36.title: "Золота республіка"
  flavor_ven.36.desc: "Наш успіх у галузі політики, торгівлі та науки призвів до того, що нашу поточну епоху оголосили ерою Золотої республіки. Така назва, звісно ж, говорить про зеніт нашого багатства, про кульмінацію всіх наших зусиль, як народу, про відомість нашої культури та мистецтва. Усе це увічнило наше надбання в історії."
  flavor_ven.36.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.36.b: "Це справді Золота республіка!"
  flavor_ven.36.b.tt: "Колір країни зміниться на помаранчевий."
  flavor_ven.36.c: "Ми щонайменше імператори!"
  flavor_ven.36.c.tt: "Колір країни зміниться на темно-пурпуровий."
  flavor_ven.38.title: "Лореданська академія"
  flavor_ven.38.desc: "Останнім часом впливові літератори з #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#! і навіть з інших держав усе частіше вступають до академії Інконьїті — вільнодумного товариства, що виступає за політичну та культурну незалежність міста. Вони діють нишком, вдаючись до таких хитрощів, як парадокси та алегорії, щоб їх неможливо було в чомусь звинуватити. Члени академії спілкуються один з одним таємною мовою та видають свої роботи анонімно, а філософія їхня значною мірою ґрунтується на натуралізмі Аристотеля, що викладається в університеті #TOOLTIP:LOCATION,padova_tt,X #L Падуї#!#!.\n\nУ своїх творах письменники, незважаючи на зусилля цензорів та внесення публікацій до списку забороненої літератури, сміливо кидають виклик суспільним нормам за допомогою сатири та змішування жанрів. В історичних працях вони невпинно критикують тиранію, переносячи на папір міркування видатних мислителів. Як не дивно, саме завдяки Accademia degli Incogniti розвивається венеційський оперний театр — зокрема, було засновано театр Новіссімо."
  flavor_ven.38.a: "Підтримаймо їхні починання!"
  flavor_ven.38.b: "Їм не потрібне фінансування."
  flavor_ven.38.historical_info: "Лореданська академія була видатним інтелектуальним товариством, заснованим у Венеції 1630 року Джованні Франческо Лореданом та Гвідо Касоні. Академія відзначалася передовим мисленням та внеском її членів у літературу, драматургію та політичне мислення періоду бароко. Інкогніті кидали виклик традиційним нормам і часто влаштовували сміливі та провокаційні дискусії, критикуючи як політику, так і релігію. Академія значно вплинула на культурний та інтелектуальний ландшафт Венеції 17 століття, залишивши спадщину літературних інновацій та критичного мислення."
  flavor_ven.39.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')]"
  flavor_ven.39.desc: "[ShowLocationName('venice')] здавна заслужено вважається колискою найгеніальніших творців у галузі культури та мистецтва, і незабаром до них додасться ще один напрямок: нашої допомоги шукає зароджувана [ShowAdvanceName('ven_venetian_school_of_music')|l] — компанія талановитих композиторів та музикантів, які прагнуть здійснити справжній переворот у музиці й тим самим піднести славу нашого міста на недосяжні раніше висоти. Однак щоб підтримати це починання, знадобиться чимало сил та коштів, нехай навіть культурна спадщина Венеції від цього примножиться, а вплив — зросте."
  flavor_ven.39.a: "Інвестувати в це буде корисно в довгостроковій перспективі."
  flavor_ven.39.b: "Вони обов'язково виростуть і без нашої підтримки."
  flavor_ven.39.a.tt: "Відкриває нам доступ до кількох подій про історичних особистостей, пов'язаних із Венеційською школою музики."
  flavor_ven.40.title: "Падіння Генуї"
  flavor_ven.40.desc: "Впродовж багатьох років [GetCountry('GEN').GetLongName] незмінно дошкуляє нам: ці люди зазіхають на наше багатство та змагаються з нашими купцями, прагнучи збагатитися. Але після падіння #TOOLTIP:LOCATION,genoa_tt,X #L Генуї#!#! підкоситься і могутність усієї країни, і колись могутня держава, здатна нарівні протистояти нашому флоту, відійде в минуле й залишиться лише в пам'яті істориків."
  flavor_ven.40.a: "Ми стали справжніми володарями Середземномор'я!"
  flavor_ven.41.title: "Верона переходить до [ROOT.GetCountry.Custom('CL_DP')]"
  flavor_ven.41.desc: "Жителі #TOOLTIP:LOCATION,$verona_tt$,X #L Верони#!#! втомилися від колишніх правителів і вирішили присягнути на вірність #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#!. Веронські посли запевнили нас у беззаперечній відданості нашій справі та заявили, що настає нова епоха єдності та співдружності. Оскільки ніхто не виступав проти нашого союзу, ми дозволили місцевим жителям зберегти за собою різні свободи, щоб заручитися їхньою підтримкою та довірою.\n\nНарод добровільно перейшов на наш бік, а передача влади пройшла безперешкодно; отже, настільки ж безперешкодним виявиться і входження Верони до складу [ROOT.GetCountry.Custom('CF_RP')|l]. Підтримка з боку населення не просто робить нас сильнішими — вона показує іншим, наскільки краще живеться за [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої влади. Тепер необхідно приділити увагу зміцненню нашого панування та подбати про добробут нових земель у складі республіки."
  flavor_ven.41.a: "Восхвалимо вірність жителів Верони та офіційно визнаємо входження до нашої держави!"
  flavor_ven.41.historical_info: "Відданість Верони Венеції почалася в 1405 році, коли народ Верони, розчарувавшись у правлячій ним родині Каррара, добровільно присягнув на вірність Венеційській республіці. Такий мирний перехід дозволив Венеції безконфліктно розширити свою територію та заручитися вірністю веронського народу, дарувавши йому певні свободи та привілеї."
  flavor_ven.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.43.desc: "Прославлений і досвідчений адмірал [target_character.GetName] — важлива особистість в історії #L #L [ROOT.GetCountry.GetAdjective|l]#!ого#! флоту: саме завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] гострому розуму стратега та вмілому керівництву наші кораблі здобули не одну славну перемогу, тим самим надовго забезпечивши всій державі панування над морем і особливо над торговими шляхами. Однак час не стоїть на місці, а [target_character.GetName] не молодшає. Час визначитися, чи буде [Select_CString(target_character.IsFemale, 'вона', 'він' )] і далі служити [ROOT.GetCountry.Custom('CF_DP')|l]."
  flavor_ven.43.a: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] ще зможе повести наш флот у бій."
  flavor_ven.43.b: "Нехай вирушає на заслужений відпочинок."
  flavor_ven.43.historical_info: "Лоренцо Марчелло був венеційським адміралом, який відіграв значну роль у морських конфліктах. Він боровся проти папського флоту та брав участь у турецько-венеційській війні. У червні 1656 року він привів об'єднаний венеційсько-мальтійський флот до перемоги в Третій битві при Дарданеллах, хоч і сам позбувся в тому бою життя."
  flavor_ven.44.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] — [target_character.GetNameWithNoTooltip]"
  flavor_ven.44.desc: "[target_character.GetName] — не просто видатний композитор: [Select_CString(target_character.IsFemale, 'вона — засновниця', 'він — засновник' )] #TOOLTIP:ADVANCE_DEFINITION,ven_venetian_school_of_music,X #L венеційської школи музики#!#!, яка надовго [Select_CString(target_character.IsFemale, 'визначила', 'визначив' )] вигляд цього напряму. Новинкою стали не тільки [Select_CString(target_character.IsFemale, 'її', 'його' )] композиції, а й підхід до викладання; завдяки таким сміливим нововведенням музика #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! здобула найширшу, неймовірну раніше популярність, і тепер обдаровані музиканти з усієї #TOOLTIP:CONTINENT,europe,X #L Європи#!#! приїжджають до нас пізнавати тонкощі своєї справи та виступати перед публікою. [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'зробила', 'зробив' )] величезний внесок — так, [Select_CString(target_character.IsFemale, 'вона познайомила', 'він познайомив' )] [ROOT.GetCountry.Custom('CF_VP')|l] з особливостями франко-фламандського стилю, додатково примноживши нашу багату культурну спадщину. Жодна інша держава сьогодні не може похвалитися такою складною та новаторською музикою, яка є в [ROOT.GetCountry.Custom('CL_PP')]."
  flavor_ven.44.a: "На [Select_CString(target_character.IsFemale, 'її', 'його' )] успіхи неможливо заплющити очі!"
  flavor_ven.45.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] — [target_character.GetNameWithNoTooltip]"
  flavor_ven.45.desc: "Своєю новаторською творчістю загалом і манерою викладання зокрема прославлений теоретик музики та композитор [target_character.GetName] [Select_CString(target_character.IsFemale, 'справила', 'справив' )] значний вплив на #TOOLTIP:ADVANCE_DEFINITION,ven_venetian_school_of_music,X #L венеційську школу музики#!#!. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] нове слово в теорії музики виявилося досить вагомим, щоб одноосібно задати нові стандарти гармонії та контрапунктів і закріпити славу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! як держави, де музика буває тільки досконалою. [target_character.GetLastNameWithNoTooltip] не тільки [Select_CString(target_character.IsFemale, 'збагатила', 'збагатив' )] нашу культурну спадщину: [Select_CString(target_character.IsFemale, 'вона', 'він' )] служить капельмейстером у соборі Святого Марка, де наставляє численних музикантів."
  flavor_ven.45.a: "Добре, що в [ROOT.GetCountry.Custom('CF_PP')|l] є така людина!"
  flavor_ven.46.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] — [target_character.GetNameWithNoTooltip]"
  flavor_ven.46.desc: "Глибокошанований композитор і впливовий діяч #TOOLTIP:ADVANCE_DEFINITION,ven_venetian_school_of_music,X #L венеційської школи музики#!#! [target_character.GetName] [Select_CString(target_character.IsFemale, 'залишила', 'залишив' )] незгладимий слід у музичній історії #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!. [target_character.GetLastNameWithNoTooltip] — капельмейстер у соборі Святого Марка, а тому значною мірою [Select_CString(target_character.IsFemale, 'визначила', 'визначив' )] розвиток церковної музики. Крім того, саме завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] зусиллям популярність здобула віланела — завзята сільська пісня. Внесок цієї людини в культуру #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! незаперечний: тепер кожному відомо, що наша музика вельми різноманітна та яскрава."
  flavor_ven.46.a: "Ми вважаємо за честь проживати в одній країні з [Select_CString(target_character.IsFemale, 'нею', 'ним' )]!"
  flavor_ven.47.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] — [target_character.GetNameWithNoTooltip]"
  flavor_ven.47.desc: "Знаменитий композитор і вмілий органіст [target_character.GetName] [Select_CString(target_character.IsFemale, 'справила', 'справив' )] істотний вплив на #TOOLTIP:ADVANCE_DEFINITION,ven_venetian_school_of_music,X #L венеційську школу музики#!#!: талант [Select_CString(target_character.IsFemale, 'її', 'його' )] незаперечний, а підхід до створення — винахідливий. [target_character.GetLastNameWithNoTooltip] — головний органіст базиліки Святого Марка, завдяки чому [Select_CString(target_character.IsFemale, 'піднесла', 'підніс' )] на нові висоти не тільки церковну, а й світську музику. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] небачена раніше техніка гри на клавішах і музична виразність не просто служать справі розвитку музики в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! — вони надихають музикантів з усієї #TOOLTIP:CONTINENT,europe,X #L Європи#!#!."
  flavor_ven.47.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.48.title: "[ShowAdvanceNameWithNoTooltip('ven_venetian_school_of_music')] — [target_character.GetNameWithNoTooltip]"
  flavor_ven.48.desc: "Чудовий композитор і органіст [target_character.GetName] — [Select_CString(target_character.IsFemale, 'яскрава представниця', 'яскравий представник' )] #TOOLTIP:ADVANCE_DEFINITION,ven_venetian_school_of_music,X #L венеційської школи музики#!#!, [Select_CString(target_character.IsFemale, 'яка прославилася', 'який прославився' )] своїми віртуозними композиціями та новими підходами. [target_character.GetLastNameWithNoTooltip] працює органістом і композитором у базиліці Святого Марка, де створює поліхоральні композиції, що вражають уяву, розкриваючись у всій красі тільки під склепіннями собору — такі їхні неповторні звукові властивості. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] внесок у розвиток і церковної, і світської музики не просто служить справі самовираження, а ще й надихає безліч інших музикантів."
  flavor_ven.48.a: "Справжній майстер!"
  flavor_ven.49.title: "Критське повстання"
  flavor_ven.49.desc: "Наш ленник [GetCountry('CRT').GetName] переживає вкрай непрості часи: місцеве населення взялося за зброю і підняло бунт, прозваний повстанням Святого Тита. Обстановка ускладнюється тим, що вперше за весь час до заколотників приєдналася і влада острова. Така несподівана згуртованість загрожує тим, що [GetCountry('CRT').GetNameWithNoTooltip] дійсно скине #L #L [ROOT.GetCountry.GetAdjective|l]#!у#! владу."
  flavor_ven.49.a: "Ми нічого не можемо вдіяти."
  flavor_ven.49.b: "Треба негайно відправити допомогу!"
  flavor_ven.49.historical_info: "Критське повстання, воно ж повстання Святого Тита, що відбулося в 1363-1364 роках, було великомасштабним бунтом проти венеціанського панування на острові Крит. Тоді в повстанні вперше брали участь не тільки місцеві греки, а й латинські губернатори, об'єднані спільним невдоволенням владою Венеції. Незважаючи на потужний альянс локальних сил, повстання було успішно придушене Венецією, яка повернула собі контроль над стратегічно важливим островом."
  flavor_ven.50.title: "Повстання Каллергі"
  flavor_ven.50.desc: "$flavor_ven.49.title$ спонукало #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьке#!#! населення #ONCLICK:COUNTRY,[GetCountry('CRT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRT').Custom('CL_tt')],X [GetCountry('CRT').Custom('CL_RP')|L]#!#! підняти черговий бунт. Повстанці стікаються під прапори сімейства Каллергіс — йому належить західна частина острова, і воно ще зберігає вірність #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_DP')|L]#!#!. Зволікати не можна: втрата цього важливого володіння завдасть сильного удару по нашій морській державі, і тоді [ROOT.GetCountry.GetFlavorRank|l] відчутно ослабне."
  flavor_ven.50.a: "Подивимося, чи достатньо вони хоробрі, щоб битися з нами."
  flavor_ven.50.b: "Поступитися їхнім вимогам."
  callergis_rebellion_joining: "Усі #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецькі#!#! [Concept('pops','групи населення')|e] на #TOOLTIP:AREA,aegean_archipelago_area,X #L Егейському архіпелазі#!#!, що належать #ONCLICK:COUNTRY,[GetCountry('CRT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CRT').Custom('CL_tt')],X [GetCountry('CRT').Custom('CL_DP')|L]#!#!, приєднаються до повстанців ([callergis_rebellion.GetName])"
  callergis_rebellion: "Повстання Каллергі"
  flavor_ven.50.historical_info: "Повстання Каллергі — повстання проти венеціанського правління на острові Крит, очолюване відомою критською аристократичною родиною Каллергі. Воно було рушієм бажання відновити місцеву автономію та вирішити претензії до венеціанського уряду, його повсюдно підтримало населення Криту. Незважаючи на успіх на самому початку, в підсумку повстання було придушене військами Венеції, що призвело до суворих заходів та подальшої консолідації венеціанського контролю над островом."
  flavor_ven.51.title: "[ShowBuildingTypeNameWithNoTooltip('piazza_san_marco')]"
  flavor_ven.51.desc: "[ROOT.GetCountry.GetFlavorRank|U] під нашою владою день у день стає лише впливовішою та багатшою, а тому сьогодні виникла необхідність вкласти кошти в розвиток столиці: [ShowLocationName('venice')] має стати дзеркалом нашої величі. Почати можна з перебудови головної площі міста — #TOOLTIP:BUILDING_TYPE,piazza_san_marco',X #L площі Святого Марка#!#!. Наші архітектори готові прикрасити її величними арками та мармуром, підкресливши тим самим пишність морської держави. Місто стане тільки красивішим, а народ знову переконається, що навколо немає рівних нашому впливу та культурі."
  flavor_ven.51.a: "Ми профінансуємо ремонт."
  flavor_ven.51.b: "Ремонт обійдеться надто дорого."
  flavor_ven.51.historical_info: "#italic П'яцца Сан-Марко#!, відома також як площа Святого Марка — головна громадська площа Венеції, одна з головних її пам'яток. Площа, заснована приблизно в 9 столітті та розширена до поточного розміру в 12 столітті, постійно покращувалася, ремонтувалася, обзаводилася новими пам'ятками. Вона оточена такими знаменитими будівлями, як базиліка Святого Марка, Палац дожів та годинникова вежа Святого Марка. Площа століттями слугувала центральним місцем зібрання у Венеції, там проводилися політичні, релігійні та громадські заходи."
  flavor_ven.52.title: "Годинникова вежа Святого Марка"
  flavor_ven.52.desc: "Ми вже вклали чималі кошти в перебудову #TOOLTIP:BUILDING_TYPE,piazza_san_marco',X #L площі Святого Марка#!#!, проте досконалості немає меж, і нам вже подали нову думку, як можна підкреслити пишність міста: спорудити на площі грандіозну годинникову вежу, видиму і з міста, і з моря. Вона не просто повідомлятиме городянам час — вона втілить собою багатство та велич [ROOT.GetCountry.Custom('CF_RP')|l], і переконатися в цьому зможе кожен, хто прибуває до #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! — головної гордості нашої держави — з моря або з суші. Чим красивішою буде [ShowBuildingTypeNameWithNoTooltip('piazza_san_marco')], тим сильнішими будуть враження."
  flavor_ven.52.a: "Інвестувати в будівництво."
  flavor_ven.52.b: "У нас зараз інші пріоритети."
  flavor_ven.52.historical_info: "Годинникова вежа Святого Марка, або #italic Торре-делл’Оролоджо#!, — історична пам'ятка Венеції, розташована на #italic площі Сан-Марко#!. Ця вежа епохи Ренесансу, зведена між 1496 та 1499 роками, оснащена великим астрономічним годинником, що показує не тільки час, а й фази Місяця та знаки зодіаку. Нагорі вежі дві бронзові фігури, відомі як «Маври», б'ють у дзвін, відзначаючи години. Вежа символізувала багатство Венеції, її владу на морі та зв'язок з вищими сферами."
  flavor_ven.53.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip|U]а торгівля сіллю"
  flavor_ven.53.desc: "В основі добробуту та процвітання [ROOT.GetCountry.Custom('CF_RP')|l] здавна лежить майже монопольна торгівля #TOOLTIP:GOODS,salt,X #L сіллю#!#!. Виробництвом та розподілом цього найважливішого товару, а також встановленням цін на нього займається Соляне управління — контора, що відповідає за підтримання становища #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! як основного постачальника солі в регіоні. Торгівля сіллю становить значну частину доходів нашої скарбниці, підтримує стабільність економіки та забезпечує нам добробут."
  flavor_ven.53.a: "Сіль — нове золото."
  flavor_ven.53.a.tt: "[Concept('prosperity','Процвітання')|e] кожного належного нам району, що виробляє [ShowGoodsName('salt')|l], збільшиться на [ShowNamedValue('prosperity_severe_bonus')|+=2%]."
  flavor_ven.54.title: "Геній [ven_tintoretto.GetNameWithNoTooltip]"
  flavor_ven.54.desc: "[ven_tintoretto.GetName], або ж просто Тінторетто, — знакова особистість у венеціанській школі живопису. [Select_CString(ven_tintoretto.IsFemale, 'Її', 'Його' )] картини відрізняються неймовірною перспективою, виразною світлотінню та сміливими, живими композиціями. Завдяки своєму бадьорому та стрімкому підходу до написання картин [ven_tintoretto.GetLastNameWithNoTooltip] [Select_CString(ven_tintoretto.IsFemale, 'отримала', 'отримав' )] прізвисько il Furioso — [Select_CString(ven_tintoretto.IsFemale, '«шалена»', '«шалений»' )]. Новаторські та сповнені почуттів твори [ven_tintoretto.GetLastNameWithNoTooltip] мали чималий вплив на художників не лише #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!, а й інших країн."
  flavor_ven.54.a: "[ROOT.GetCountry.GetFlavorRank|U] [Select_CString(ven_tintoretto.IsFemale, 'нею', 'ним' )] пишається!"
  flavor_ven.55.title: "«Розп'яття» Тінторетто"
  flavor_ven.55.desc: "Нам випала виняткова нагода замовити у [Select_CString(ven_tintoretto.IsFemale, 'художниці', 'художника' )] на ім'я [tintoretto.GetName], або ж просто Тінторетто, грандіозне полотно із зображенням розп'яття Христа. Твір цей буде передано до Скуоли-Гранде. Тінторетто [Select_CString(ven_tintoretto.IsFemale, 'відома', 'відомий' )] своїм бадьорим та живим стилем, а тому ми не сумніваємося, що [Select_CString(ven_tintoretto.IsFemale, 'вона', 'він' )] напише справжній витвір мистецтва, чудовий навіть за мірилами #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!, і відобразить у ньому всю велич нашого міста та відданість нашої держави збереженню та розвитку свого культурного та релігійного надбання. Якщо ми замовимо [Select_CString(ven_tintoretto.IsFemale, 'їй', 'йому' )] написання цієї картини, відомість Венеції у світі художників злетить вище хмар. Відповідно, якщо ми відмовимося, народ сприйме такий вчинок як незацікавленість у підтримці культурної величі [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_ven.55.a: "Замовити картину у Тінторетто!"
  flavor_ven.55.b: "У нас є важливіші справи."
  flavor_ven.55.historical_info: "«Розп'яття» Тінторетто — монументальна картина, написана в 1565 році в рамках оформлення #italic скуоли братства Сан-Рокко#! у Венеції. На ній з характерними для стилю Тінторетто драматизмом і динамічністю композиції зображено розп'яття Христа. Полотно повне фігур, що передають емоційний хаос сцени. «Розп'яття» — один із шедеврів Тінторетто, в ньому видно здатність живописця об'єднувати реалізм з рухливістю та світлом. Ця робота — частина серії картин, що ілюструють життя Христа і замовлені для прикраси #italic скуоли#!, благодійної венеціанської організації."
  flavor_ven.56.title: "[ven_sansovino.GetNameWithNoTooltip]"
  flavor_ven.56.desc: "[ven_sansovino.GetName] — знаменитий скульптор та архітектор. [Select_CString(ven_sansovino.IsFemale, 'Вона прославилася', 'Він прославився' )] створенням чудових фасадів та чудових мармурових статуй, чим [Select_CString(ven_sansovino.IsFemale, 'залишила', 'залишив' )] незгладимий слід в історії мистецтва #ONCLICK:COUNTRY,[GetCountry('FLO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FLO').Custom('CL_tt')],X [GetCountry('FLO').Custom('CL_RP')|L]#!#!. Прокуратори Сан-Марко — одні з найвпливовіших знатних сімейств #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! — пропонують запросити [ven_sansovino.GetLastNameWithNoTooltip] до нашої держави та призначити [Select_CString(ven_sansovino.IsFemale, 'її', 'його' )] старшим архітектором та протомаестро, оскільки [Select_CString(ven_sansovino.IsFemale, 'вона', 'він' )] — неймовірно вміла людина зі сміливими ідеями. Якщо [ven_sansovino.GetLastNameWithNoTooltip] зробить свій внесок у розвиток чудової архітектури нашого міста, [ShowLocationNameWithNoTooltip('venice')] неодмінно перетвориться на світоч мистецтва."
  flavor_ven.56.a: "Зробити [Select_CString(ven_sansovino.IsFemale, 'їй', 'йому' )] вигідну пропозицію."
  flavor_ven.56.b: "Це занадто дорого."
  flavor_ven.57.title: "Планування венеціанської Дзекки"
  flavor_ven.57.desc: "[sansovino.GetName] тепер працює на благо нашої держави на посаді старшого архітектора та протомаестро, а тому нам випала виняткова нагода залучити цю досвідчену людину до будівництва Дзекки в #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#!. Зважаючи на важливість для держави, будівля монетного двору має бути міцною та вогнетривкою, щоб у разі пожежі не постраждали монети, а разом з ними і багатство [ROOT.GetCountry.Custom('CF_RP')|l]. [sansovino.GetLastNameWithNoTooltip] — винахідник різних архітектурних нововведень, і ми не сумніваємося, що [Select_CString(sansovino.IsFemale, 'вона', 'він' )] зможе побудувати нам сучасну споруду, яка не тільки вбереже статки держави, а й відобразить всю велич та непорушність міста."
  flavor_ven.57.a: "Нехай керує будівництвом."
  flavor_ven.57.b: "Нам не вистачає на це коштів."
  flavor_ven.57.historical_info: "Венеціанська Дзекка — офіційний монетний двір Венеціанської республіки, розташований у серці Венеції. У ньому карбувалася монета Республіки, зокрема знамениті золоті дукати та срібні монети гроссо. Дзекка відігравала важливу роль в економіці Венеції, гарантуючи стабільність та надійність її грошової системи."
  flavor_ven.58.title: "Патріархат [ROOT.GetCountry.Custom('CL_RP')]"
  flavor_ven.58.desc: "У церковному світі відбуваються вельми значущі події: після видання #L #L [GetCountry('PAP').GetAdjective|l]#!ої#! булли #italic Regis Aeterni#! патріархат Градо об'єднався з єпископством Кастелло, злившись в єдиний патріархат #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#!. Цей знаковий крок не тільки примножив нашу релігійну та політичну велич, а й зміцнив наш вплив над #TOOLTIP:INTERNATIONAL_ORGANIZATION,catholic_church_tt,X #L католицькою церквою#!#!. Перехід двох настільки важливих кафедр під юрисдикцію Венеції ознаменував початок нової епохи видатного становища [ROOT.GetCountry.Custom('CF_RP')|l] у духовному житті. Одночасно з цим зміцніла і влада держави."
  flavor_ven.58.a: "Прийняти новий патріархат."
  flavor_ven.59.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] та [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] захоплення влади"
  flavor_ven.59.desc: "У всіх державних питаннях [ROOT.GetCountry.GetLongName] вже багато століть незмінно покладається на республіканські традиції — вони забезпечують рівновагу сил, і завдяки їм [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] керують державою спільно. Сьогодні над основою основ нашої держави нависла загроза: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], дивлячись на поступове відмирання республіканських принципів, намагається централізувати державу та встановити в [ROOT.GetCountry.Custom('CF_PP')|l] диктатуру, що гарантує [Select_CString(target_ruler.IsFemale, 'їй', 'йому' )] всю повноту влади. [ROOT.GetCountry.GetNameWithNoTooltip] стоїть на межі смути: дворяни, які не бажають розлучатися зі своїми привілеями, навряд чи прихильно приймуть такі зміни."
  flavor_ven.59.a: "Підтримати цю боротьбу за владу!"
  flavor_ven.59.b: "Затримати [Select_CString(target_ruler.IsFemale, 'її', 'його' )] та зняти з посади."
  flavor_ven.59.c: "Покарання за зраду — смерть!"
  flavor_ven.59.historical_info: "У 1355 році дож Маріно Фальєро спробував захопити контроль над Венеційською республікою. Він, незадоволений межами власної влади та рухомий особистими образами, планував повалити встановлений уряд і стати диктатором. Його змова, однак, була розкрита ще до реалізації. Фальєро заарештували, судили та стратили за зраду, що слугує наочним прикладом стійкості венеційського республіканізму та суворості наслідків для тих, хто бажає його підірвати."
  flavor_ven.60.title: "Укріплення Дубровника"
  flavor_ven.60.desc: "[ShowLocationName('dubrovnik')] — великий торговий [target_location.GetRank.GetName|l], а заодно — одне з найважливіших володінь нашої морської держави. Саме тому нас пригнічує його слабка оборона: [ShowLocationNameWithNoTooltip('dubrovnik')] вкрай уразливий перед нападом як з моря, так і з суші. Розумно буде виділити золото на зведення належних укріплень."
  flavor_ven.60.a: "[ShowLocationNameWithNoTooltip('dubrovnik')] слід надійно захистити."
  flavor_ven.60.b: "Поточні укріплення і так достатньо міцні."
  flavor_ven.60.historical_info: "Фортечні мури Стона, зведені в 14 столітті — серія оборонних кам'яних стін на півострові Пелешац у Хорватії. Ці стіни слугували для захисту важливих соляних промислів та міста Стон. Вони тягнулися приблизно на 7 кілометрів і були серед найдовших фортифікацій у Європі, виділяючись як своєю вражаючою довжиною, так і стратегічною значущістю."
  flavor_ven.61.title: "[ven_platina.GetNameWithNoTooltip]"
  flavor_ven.61.desc: "Серед жителів #TOOLTIP:LOCATION,venice_tt,X #L Венеції#!#! поширення отримала чудова кулінарна книга #italic De honesta voluptate et valetudine#!, в якій ази кулінарного мистецтва переплітаються з положеннями філософії гуманізму. Її автор [ven_platina.GetName] — [Select_CString(ven_platina.IsFemale, 'відома письменниця', 'відомий письменник' )]-гуманіст і гурман, а заодно жертва антигуманістичної політики, яку веде [GetCountry('PAP').GetGovernment.GetCourtTitle|l] #L #L [GetCountry('PAP').GetAdjective|l]#!ої#! держави — колишнє місце [Select_CString(ven_platina.IsFemale, 'її', 'його' )] служби. [ven_platina.GetName] [Select_CString(ven_platina.IsFemale, 'потрапила', 'потрапив' )] в ув'язнення, а після [Select_CString(ven_platina.IsFemale, 'зазнала', 'зазнав' )] гонінь, але ми можемо покласти край цим бідам, просто запросивши [Select_CString(ven_platina.IsFemale, 'її', 'його' )] до Венеції. Від цього виграє і [ROOT.GetCountry.GetFlavorRank|l]: ця людина — справжній скарб корисних знань."
  flavor_ven.61.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] потребує таких людей. Запропонуємо [Select_CString(ven_platina.IsFemale, 'їй', 'йому' )] хороші гроші та посаду."
  flavor_ven.61.b: "Нас це не цікавить."
  flavor_ven.62.title: "Одруження з морем"
  flavor_ven.62.desc: "Одна з найстаріших і найважливіших традицій #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! — заручини з морем. Ця церемонія відбувається щорічно і символізує морське панування та процвітання [ROOT.GetCountry.Custom('CF_RP')|l]. Щороку на свято Воскресіння [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] у супроводі пишної процесії, куди входять [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], вирушає в Адріатичне море на борту свого корабля — «[target_art.GetName]». Після складних обрядів та довгих молитов [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] кидає у воду освячений перстень на знак нашого нерозривного зв'язку з морем — джерелом нашого багатства та впливу, а заодно і захисником держави."
  flavor_ven.62.a: "Ми повинні підтримувати свої традиції!"
  flavor_ven.62.b: "Церемонію потрібно скасувати, щоб зберегти ресурси."
  flavor_ven.63.title: "[target.GetNameWithNoTooltip]: оновлення"
  flavor_ven.63.desc: "Чудова галера государя #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! «[target_art.GetName]» — втілення нашого багатства, влади та спорідненості з морем. Побачити її зазвичай можна на щорічній церемонії заручин з морем, коли [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] знову утверджує наше панування над Адріатикою. «[target_art.GetNameWithNoTooltip]» — невід'ємна частина нашого культурного та політичного життя. Це величне судно, прикрашене золотом та майстерним різьбленням, — справжній плавучий палац, в якому втілилися велич та сила Сереніссіми.\n\nОднак сьогодні «[target_art.GetNameWithNoTooltip]» вже не викликає колишнього захоплення: судно в жалюгідному стані, і колишня розкіш помітно потьмяніла. Щоб славний вигляд держави зберігався і надалі, а найважливіша її церемонія і далі вражала глядачів, галеру необхідно відремонтувати."
  flavor_ven.63.a: "Вкластися в ремонт."
  flavor_ven.63.b: "Підтримувати в поточному стані."
  flavor_ven.64.title: "Подорож братів Дзено"
  flavor_ven.64.desc: "Нещодавно до нас в руки потрапила дивовижна карта, складена нібито за нотатками подорожі братів Ніколо та Антоніо Дзено, що відбулася кілька десятиліть тому. На карті позначені місця, які, як стверджується, брати відкрили під час вивчення північних морів біля #TOOLTIP:AREA,iceland_area,X #L Ісландії#!#! і навіть за її межами. Сьогодні вся республіка бурхливо обговорює цю карту: уяву людей розбурхують думки про те, що за берегами нашого рідного Середземномор'я є й інші, незвідані шляхи та землі.\n\nДеякі стверджують, що експедиція з метою підтвердити справжність карти збагатить наші пізнання, а [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]им купцям та дослідникам відкриються нові можливості. Інші ж заявляють, що не варто відвертатися від Середземномор'я, адже тут зосереджені всі наші сили та інтереси."
  flavor_ven.64.a: "Перевірити справжність."
  flavor_ven.64.a.tt: "Відкрити регіони: [ShowAreaName('greenland_area')], [ShowAreaName('eastern_greenland_sea_area')] та [ShowAreaName('western_greenland_sea_zones_area')]."
  flavor_ven.64.b: "Ця карта для нас марна."
  flavor_ven.64.historical_info: "Ніколо Дзено, венеційський сенатор, опублікував карту та супровідні описи передбачуваних мандрів його предків Ніколо та Антоніо Дзено. Згідно з нотатками, брати Дзено здійснили довгу подорож північними морями, імовірно досягнувши околиць Ісландії та Гренландії, і навіть дійшовши до Північної Америки. На карті нібито позначалися ці північні землі та моря, але її точність та справжність були предметом дискусій серед істориків. Попри всю свою суперечливість, карта користувалася великою увагою у Венеції та за її межами, оскільки дражнила уми дослідників та вчених, натякаючи на можливості знайти недосліджені землі та навігаційні шляхи в Північній Атлантиці."
  flavor_ven.65.title: "Кастелло-а-Маре"
  flavor_ven.65.desc: "[ShowLocationName('candia')] — головна гордість #TOOLTIP:PROVINCE_DEFINITION,crete_province,X #L Криту#!#! і заодно яскравий символ #L #L [ROOT.GetCountry.GetAdjective|l]#!ого#! панування над #TOOLTIP:PROVINCE_DEFINITION,aegean_sea_province,X #L Егейським морем#!#!. Цей процвітаючий [target_location.GetRank.GetName|l] — не просто місце, де стикаються торгові шляхи та переплітаються культури, а й важлива фортеця, без якої неможлива була б влада над Східним Середземномор’ям. Однак оскільки з кожним роком [ShowLocationNameWithNoTooltip('candia')] стає для нас усе важливішою, сьогодні назріла необхідність звести тут [ShowBuildingTypeName('castle')|l] для захисту від можливих набігів."
  flavor_ven.65.a: "Приступимо до будівництва!"
  flavor_ven.65.b: "Краще витратити ресурси на щось інше."
  flavor_ven.65.historical_info: "Кастелло-а-Маре, відома також як фортеця Кулес — венеційська фортеця, зведена біля входу до старої гавані Іракліона (історично відомого як Кандія) на острові Крит. Була побудована в 16 столітті та служила головним оборонним рубежем для захисту міста від загроз з моря та утвердження венеційського домінування в Егейському морі. Ця фортеця — важливий символ архітектурних та військових досягнень Венеції в тому регіоні."
  flavor_ven.66.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.66.desc: "Останнім часом неабиякою славою в нашій державі користується вправний полководець на ім’я [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона готова', 'Він готовий' )] вступити на службу [ROOT.GetCountry.Custom('CF_DP')|l], якщо #L #L [ROOT.GetCountry.GetAdjective|l]#!і#! влада на це погодиться. [target_character.GetLastNameWithNoTooltip] — досвідчений стратег і ватажок, а тому [Select_CString(target_character.IsFemale, 'її', 'його' )] послуги будуть незамінні в справі розширення наявних територій та закріплення на нових. Під [Select_CString(target_character.IsFemale, 'її', 'його' )] командуванням наші війська стануть битися краще, а встановлення повного панування над морем та спокою в регіоні стане ближчим."
  flavor_ven.66.a: "З [Select_CString(target_character.IsFemale, 'нею', 'ним' )] наш флот буде непереможний!"
  flavor_ven.66.b: "Нехай краще служить у раді."
  flavor_ven.66.historical_info: "Історично, П'єтро Лоредан був одним з найвидатніших адміралів та воєначальників Венеції, зігравши значну роль у XV столітті. Він відомий своїми перемогами над Османами та роллю у створенні венеційської морської імперії. Лоредан зіграв ключову роль у битві при Галліполі в 1416 році, успішно відбивши османські війська та відстоявши венеційські інтереси в Егейському морі."
  flavor_ven.67.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.67.desc: "Відомий скульптор та архітектор [target_character.GetName] [Select_CString(target_character.IsFemale, 'запропонувала', 'запропонував' )] свої послуги [ROOT.GetCountry.Custom('CF_DP')|l] [ROOT.GetCountry.GetName]. [target_character.GetLastNameWithNoTooltip] — справжній майстер готичного стилю та стилю епохи Відродження і може без труда переходити від одного до іншого, а в [Select_CString(target_character.IsFemale, 'її', 'його' )] роботах дивовижним чином поєднуються елегантність та новаторства кожного з двох напрямків. Якщо доручити цій людині розвивати естетичне та культурне надбання #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!, [target_location.GetRank.GetName|l] і надалі залишатиметься зразком архітектурного мистецтва."
  flavor_ven.67.a: "Негайно найняти [Select_CString(target_character.IsFemale, 'її', 'його' )]!"
  flavor_ven.67.b: "Нам [Select_CString(target_character.IsFemale, 'її', 'його')] послуги не по кишені."
  flavor_ven.67.historical_info: "Бартоломео Боно залишив слід в історії завдяки своєму внеску у венеційську архітектуру XV століття. Серед його робіт відзначають Порта делла Карта у Палаці дожів та чудовий Ка-д’Оро. Обидві ці роботи демонструють його вміння змішувати готичні елементи з ідеалами Відродження, що зароджувалися."
  flavor_ven.68.title: "Геній [target_character.GetNameWithNoTooltip]"
  flavor_ven.68.desc: "[target_character.GetName] — чудовий композитор та [Select_CString(target_character.IsFemale, 'віртуозна скрипалька', 'віртуозний скрипаль' )], [Select_CString(target_character.IsFemale, 'що прославилася', 'що прославився' )] незвичайними музичними творами та виступами, які запам’ятовуються. Музика, яку грає [target_character.GetLastNameWithNoTooltip], незмінно зачаровує слухачів; завдяки одній лише цій людині культура #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! досягла нових висот. Якщо [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] [ROOT.GetCountry.Custom('CF_RP')|l] запропонує [Select_CString(target_character.IsFemale, 'їй', 'йому' )] високу посаду, творче надбання [ROOT.GetCountry.Custom('CF_RP')|l] стане тільки ширшим, а музика — складнішою та досконалішою."
  flavor_ven.68.a: "Не терпиться побачити, чого [Select_CString(target_character.IsFemale, 'вона', 'він' )] доб’ється!"
  flavor_ven.68.historical_info: "Антоніо Вівальді вважається одним з найвидатніших барокових композиторів. Серед його численних робіт налічується понад 500 концертів, безліч опер та церковна музика. Найзнаменитіша робота Вівальді, «Пори року», здійснила революцію в концертних формах та продемонструвала новаторське використання мелодій, гармонії та оркестровки. Ставши майстром скрипки в Оспедале-делла-П'єта, він перетворив цю установу на прославлене музичне училище, що приваблювало шанувальників з усієї Європи."
  flavor_ven.69.title: "Війна з [GetCountry('PAD').Custom('CL_TP')]"
  flavor_ven.69.desc: "Наше прагнення до панування та захисту власних інтересів у регіоні призвело до втягування [ROOT.GetCountry.Custom('CF_RP')|l] у чергову криваву війну. Однак конфлікт з #ONCLICK:COUNTRY,[GetCountry('PAD').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAD').Custom('CL_tt')],X [GetCountry('PAD').Custom('CL_TP')|L]#!#!, попри всі супутні труднощі, відкриває #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#! можливість розширити сферу впливу — за умови, що ми зуміємо відстояти кордони. Щоб пережити ці непрості часи та вийти переможцями, необхідно буде зібрати війська та ретельно продумати стратегію."
  flavor_ven.69.a: "Зібрати війська та в атаку!"
  flavor_ven.69.b: "Зосередитися на обороні наших земель."
  flavor_ven.69.historical_info: "Падуанська війна стала ключовим конфліктом між Венеційською республікою та правителями Падуї з родини Каррара. Війна почалася зі спроби Франческо II да Каррара, синьйора Падуї, розширити свої землі за рахунок Венеції, загрожуючи інтересам республіки. Венеція, не бажаючи втрачати торгові шляхи та землі, розпочала військову кампанію проти Падуї. Конфлікт завершився рішучою перемогою венеційців, подальшою анексією Падуї та консолідацією влади Венеції в регіоні."
  flavor_ven.70.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.70.desc: "Знаменитий композитор [target_character.GetName] [Select_CString(target_character.IsFemale, 'запропонувала', 'запропонував' )] [ROOT.GetCountry.Custom('CF_DP')|l] свої послуги. [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] не тільки складною музикою, а й глибокими літературними працями, і ми не сумніваємося, що [Select_CString(target_character.IsFemale, 'її', 'його' )] внесок у культуру #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! буде незабутнім. За цієї людини наша держава більш ніж здатна наблизитися до музичної та інтелектуальної досконалості."
  flavor_ven.70.a: "[target_character.GetLastNameWithNoTooltip] — гідний творець. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] влаштує [Select_CString(target_character.IsFemale, 'його', 'її' )] до себе на службу."
  flavor_ven.70.b: "Нехай спокійно займається музикою."
  flavor_ven.70.historical_info: "Бенедетто Марчелло був видатним композитором епохи бароко. Його найславетнішою роботою є «Поетично-гармонійне натхнення», збірка з 50 псалмів, що поєднала релігійні тексти та складну музичну композицію. Твори Марчелло відрізняються витонченістю, чистотою звучання та емоційною глибиною. Крім того, його сатиричні роботи, наприклад, «Модний театр», проливають світло на музичні традиції та оперу тих років."
  flavor_ven.71.title: "Питання народних зборів"
  flavor_ven.71.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! традиційно обирається кончо — зборами вільних громадян, що виступають від імені жителів міста. Однак останнім часом [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] все частіше намагаються взяти проведення виборів у свої руки, чому обурилися [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l]: таку поведінку вони сприймають як пряме посягання на свої права. Обстановка напружена, і нам необхідно вирішити, яка сторона більше заслуговує нашої підтримки — [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] або, щоб конфлікт не розростався ще сильніше, — [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]."
  flavor_ven.71.a: "Заявимо, що праві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]."
  flavor_ven.71.b: "Заявимо, що праві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_ven.71.historical_info: "Історично, народні збори відігравали важливу роль в управлінні Венецією, символізуючи наміри республіки залучати вільних громадян до виборів дожа. Але зі зростанням багатства та могутності Венеції знать та впливові торгові родини спробували зміцнити свою владу, підтримавши зміни, які були покликані сильно обмежити кількість виборців. Поступово втративши владу, народні збори втратили сенс і були розпущені в 1423 році."
  flavor_ven.72.title: "Управління охорони здоров'я"
  flavor_ven.72.desc: "#TOOLTIP:LOCATION,$venice_tt$,X #L Венецію#!#! — це гамірне, багатолюдне зосередження торгівлі та культури — вже не перше століття терзають спалахи різних хвороб, від яких страждають прості громадяни. У світлі останньої епідемії все більше зростає розуміння, що хвороби населення треба запобігати, а не лікувати. Для цього можна заснувати Magistrato alla Sanità — управління охорони здоров'я, яке займатиметься санітарією, ізоляцією та завчасним боротьбою із захворюваннями. Тільки так громадяни зможуть залишатися здоровими, а [ROOT.GetCountry.GetFlavorRank|l] — процвітати."
  flavor_ven.72.a: "Виділити кошти заради здоров'я суспільства."
  flavor_ven.72.b: "Ми не можемо дозволити собі такі витрати."
  flavor_ven.72.historical_info: "Управління охорони здоров'я Венеційської республіки було засноване в XV столітті для захисту Венеції від епідемій і насамперед від чуми. На нього було покладено відповідальність за встановлення карантину, контроль за пересуванням людей і товарів та нагляд за громадським здоров'ям за допомогою оглядів і профілактики."
  flavor_ven.73.title: "Банко-дель-Джиро"
  flavor_ven.73.desc: "Потреби [ROOT.GetCountry.Custom('CF_DP')|l] у фінансах стають все обширнішими. Щоб задовольнити їх, необхідно буде заснувати повноцінний державний банк. Таким може стати Банко-дель-Джиро — установа, що підпорядковується безпосередньо сенату. Цей банк керуватиме фінансами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#! та забезпечуватиме стабільність і дієвість нашої економіки. Крім цього він також сприятиме торгівлі та комерції, зміцнюючи тим самим фінансову основу держави."
  flavor_ven.73.a: "Банк забезпечить наше фінансове благополуччя."
  flavor_ven.73.b: "У цьому немає потреби."
  flavor_ven.74.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]а свята інквізиція"
  flavor_ven.74.desc: "Єресь, що розповзається, загрожує підірвати духовну та політичну рівновагу [ROOT.GetCountry.Custom('CF_RP')|l]. Щоб не дати їй здійснити свою чорну справу, нам запропонували розширити діяльність інквізиції в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PP')|L]#!#, у чому допоможе [GetCountry('PAP').GetName]. Тепер належить вирішити, як саме вчинити: заохочувати радикальних інквізиторів, прийняти поміркований підхід або ж взагалі обійтися без інквізиції. На шальках терезів — можливі переваги та наслідки як для суспільства, так і для уряду."
  flavor_ven.74.a: "Підтримати радикальних інквізиторів у знищенні єресі."
  flavor_ven.74.b: "Потрібен більш обережний підхід."
  flavor_ven.74.c: "Не варто втручатися."
  flavor_ven.75.title: "Підтримка конвоїв муда"
  flavor_ven.75.desc: "Купецькі конвої — хребет #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! торгівлі. Через Середземне море, Левант і ще більш далекі краї вони привозять до столиці товари, людей, знання та багатства. Без них неможлива була б торгівля — насущний хліб нашої економіки. Забезпечивши конвоям додаткову підтримку, ми зможемо привозити ще більше багатств і ресурсів, а значить, важливість нашої держави як великого торгового вузла лише зросте."
  flavor_ven.75.a: "Профінансувати їхні подорожі."
  flavor_ven.75.b: "Вони впораються і без нашої допомоги."
  flavor_ven.76.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.76.desc: "[target_character.GetName] — віртуозний скульптор і майстер бронзового лиття, [Select_CString(target_character.IsFemale, 'яка прославилася', 'який прославився' )] своїми красивими та майстерними роботами. Сьогодні [target_character.GetLastNameWithNoTooltip] пропонує свої послуги [ROOT.GetCountry.Custom('CF_DP')|l], і цю пропозицію варто розглянути: якщо ми погодимося, столиця стане ще величнішою, а наша держава лише надійніше закріпить за собою звання осередку мистецтва та культури епохи #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#!. Але підтримка [Select_CString(target_character.IsFemale, 'її', 'його' )] творчості обійдеться недешево, хоча, зрозуміло, вигода для культури незмірна жодними грошима."
  flavor_ven.76.a: "Ми [Select_CString(target_character.IsFemale, 'її', 'його')] підтримаємо!"
  flavor_ven.76.b: "Нам це не по кишені."
  flavor_ven.76.historical_info: "Алессандро Леопарді — знаменитий скульптор і ливарник із бронзи епохи італійського Відродження. Найбільш прославився як автор чудової кінної статуї Бартоломео Коллеоні у Венеції. Сучасники поважали Леопарді, який значно просунув уперед мистецтво бронзового лиття, за майстерність і творчі задуми."
  flavor_ven.77.title: "Розширення Терраферми"
  flavor_ven.77.desc: "Завдяки нашим славним солдатам ми відвоювали у ворогів значну частину #TOOLTIP:REGION,italy_region,X #L Італії#!#! та розширили Domini di Terraferma — материкові володіння. Ці перемоги довели нам і всьому світу, що наша держава вміє воювати не тільки на морі, а й на суші. Тепер [ShowLocationName('venice')] надійно захищена проміжною областю."
  flavor_ven.77.a: "Відсвяткуємо успіх!"
  flavor_ven.77.b: "Краще приділити увагу інтеграції цих провінцій."
  flavor_ven.78.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ven.78.desc: "[target_character.GetName] — людина непересічного розуму та великого досвіду — [Select_CString(target_character.IsFemale, 'запропонувала', 'запропонував' )] [ROOT.GetCountry.Custom('CF_DP')|l] свої послуги. [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] глибокими знаннями в галузі права, науки та богослов'я, і [Select_CString(target_character.IsFemale, 'її', 'його' )] поради стали б нашому уряду та дипломатам вельми доречними. Під [Select_CString(target_character.IsFemale, 'її', 'його' )] керівництвом [ROOT.GetCountry.GetName] напевно досягне нових політичних та інтелектуальних висот, знову зарекомендувавши себе як провідну силу розуму та просвітництва, однак розумно буде проявити обережність: [target_character.GetLastNameWithNoTooltip] без угаву критикує #TOOLTIP:RELIGION,catholic_tt,X #L католицьку#!#! церкву, і [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] можуть образитися, якщо [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] запросить [Select_CString(target_character.IsFemale, 'її', 'його' )] до себе."
  flavor_ven.78.a: "Призначити [Select_CString(target_character.IsFemale, 'її', 'його' )] радником."
  flavor_ven.78.b: "Не варто ризикувати накликати на себе гнів Церкви."
  flavor_ven.78.historical_info: "Паоло Сарпі був венеціанським істориком, вченим і політичним діячем, який відіграв ключову роль під час венеціанського інтердикту 1606-1607 років — конфлікту між Венецією та Папством. Сарпі непохитно відстоював автономію республіки, а його роботи, що виступали за відділення держави від церкви, відіграли важливу роль у формуванні політичного ландшафту епохи."
  flavor_ven.79.title: "[ShowProvinceDefinitionNameWithNoTooltip('cyprus_province')] — тільки перший крок"
  flavor_ven.79.desc: "Острів #TOOLTIP:PROVINCE_DEFINITION,cyprus_province,X #L Кіпр#!#! цілком підкоряється нашій владі. Ми зробили перший, найважливіший крок до розширення впливу в Середземномор'ї. Завдяки своєму вигідному розташуванню Кіпр вкрай зручний для нас: звідси можна панувати над ключовими торговими шляхами та постійно тиснути на суперників. Крім того, з Кіпру можна буде влаштовувати походи в #TOOLTIP:AREA,levant_area,X #L Левант#!#! та #TOOLTIP:REGION,egypt_region,X #L Єгипет#!#!, а значить — відстоювати #L #L [ROOT.GetCountry.GetAdjective|l]#!і#! інтереси далеко за межами сьогоднішніх кордонів."
  flavor_ven.79.a: "Наш погляд упав на Александрію."
  flavor_ven.79.b: "Будемо звільняти Єрусалим."
  flavor_ven.79.c: "Висунемо претензію на Антіохію."
  flavor_ven.79.d: "Замість цього потрібно зміцнювати владу над Кіпром."
  flavor_ven.80.title: "Божественне втручання"
  flavor_ven.80.desc: "На #TOOLTIP:LOCATION,$venice_tt$,X #L Венецію#!#! обрушилася люта буря. І лагуна, і [target_location.GetRank.GetName|l] були безсилі перед стихією, але якимось дивом катастрофи вдалося уникнути. У народі ходить чутка, що буйство природи заспокоїло втручання трьох святих — Марка, Георгія та Миколая, яких привіз до [target_location.GetRank.GetNameWithNoTooltip|l] якийсь простий рибалка. Після того як негода вщухла, святі нібито подарували йому священне кільце — так зване #italic кільце рибалки#!, символ їхнього покровительства [ROOT.GetCountry.Custom('CL_RP')]."
  flavor_ven.80.a: "Наш святий покровитель врятував нас!"
  flavor_ven.80.b: "Не можна бути такими забобонними."
  flavor_ven.80.historical_info: "Буря 1340 року завдала суттєвої шкоди Венеції. Легендарна історія про божественне втручання підкреслює глибоку релігійну значущість події, що стала частиною венеціанської ідентичності та історії міста. #italic Перстень рибалки#! став символом чудесного порятунку міста та його зв'язку зі святим покровителем."
  flavor_ven.81.title: "[target_character.GetNameWithNoTooltip] і палац біля Великого каналу"
  flavor_ven.81.desc: "Впливовий патрицій [ROOT.GetCountry.Custom('CF_RP')|l] [target_character.GetName] будує на набережній біля Великого каналу розкішний палац $ca_foscari$ — символ багатства та влади сімейства [target_character.GetLastNameWithNoTooltip], що миттєво прикував до себе всю увагу публіки. Деякі радники вважають, що якщо держава підтримає будівництво фінансово, ми зможемо заручитися прихильністю династії [target_character.GetLastNameWithNoTooltip], а політичні узи, якими пов'язані з нами [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], стануть міцнішими."
  flavor_ven.81.a: "Це починання слід підтримати."
  flavor_ven.81.a.tt: "Сімейство [target_character.GetLastName] запам'ятає це. Якщо виходець із нього коли-небудь стане правителем, нам нададуть відповідну послугу."
  flavor_ven.81.b: "[target_character.GetNameWithNoTooltip] — багата людина і впорається без нашої допомоги."
  flavor_ven.81.historical_info: "Франческо Фоскарі був венеціанським дожем з 1423 по 1457 роки. Його правління було найдовшим та найамбітнішим у венеціанській історії. Покровитель мистецтв та прихильник експансії на материкову Італію, він розпорядився звести #italic Ка-Фоскарі#!, чудовий готичний палац, уособлення престижу його родини."
  flavor_ven.82.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]і статути"
  flavor_ven.82.desc: "Щоб зберегти сформовані методи управління в цілісності та пристосуватися до мінливої #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! дійсності, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує нам скласти проєкт великої законодавчої реформи. Нові статути об'єднають наявні норми та нададуть їм сучасного вигляду. Дія статутів поширюватиметься на все — від комерції до морського права, моральних норм та цивільної відповідальності."
  flavor_ven.82.a: "Прийняти ці статути та простежити за їх дотриманням."
  flavor_ven.82.b: "Зараз не час для подібних реформ."
  flavor_ven.82.historical_info: "Венеціанські статути 1368 року — великий звід законів, що об'єднав та реорганізував законодавство республіки. Статути уніфікували закони, що змінювалися протягом століть. Вони поширювалися на торгівлю, кримінальне законодавство, цивільне право та моральну поведінку, відобразивши потребу Венеції навести лад у дедалі складніших суспільних відносинах та імперії, що розширювалася."
  flavor_ven.83.title: "[target_character.GetNameWithNoTooltip] і карта світу"
  flavor_ven.83.desc: "[Select_CString(target_character.IsFemale, 'Гідна дочка', 'Гідний син' )] #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! держави — [Select_CString(target_character.IsFemale, 'прославлена черниця', 'прославлений чернець' )] та картограф [target_character.GetName] — вже багато років поспіль без втоми корпить над складанням карти світу. Якщо вірити [Select_CString(target_character.IsFemale, 'її', 'його' )] словам, ця карта — справжній географічний шедевр, що відображає відомий світ (включно з незвіданими краями) так, як його ще ніхто не бачив до цього. Однак [target_character.GetName] відчуває, що не впорається зі своїм завданням без фінансової допомоги, а тому [Select_CString(target_character.IsFemale, 'звернулася', 'звернувся' )] за підтримкою до нас."
  flavor_ven.83.a: "Виділити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] кошти."
  flavor_ven.83.b: "Відповісти [Select_CString(target_character.IsFemale, 'їй', 'йому' )] відмовою."
  flavor_ven.83.historical_info: "Фра Мауро — венеціанський чернець, що прославився своєю картою світу, створеною близько 1450 року. Для свого часу його карта була вельми досконалою та найточнішою з усіх, що існували до неї. У ній змішалися географічні знання європейців, арабів та інших народів. Ця карта стала однією з перших, де наріжним каменем була точність, а не релігійні вірування, оскільки старі карти поміщали Єрусалим у центр або вказували біблійний рай як реальне місце. Нічого з цього не було на карті Фра Мауро."
  flavor_ven.84.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] з династії [ruler_dynasty.GetNameWithNoTooltip]"
  flavor_ven.84.desc: "Титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_RP')|L]#!#!» відсьогодні носить [target_ruler.GetName] — виходець із високошанованої династії [ruler_dynasty.GetName]. Це сімейство з давніх-давен користується в [ROOT.GetCountry.Custom('CF_PP')|l] значними владою та впливом, свідченням чого є сходження його представника на престол. У минулому ми неодноразово підтримували їх, зокрема допомогли побудувати споруду, відому як «[target_art.GetName]», і тепер вони збираються повернути [ROOT.GetCountry.Custom('CF_DP')|l] борг: нам пропонують не лише вірність, а й ресурси, такі необхідні для зміцнення [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої влади та авторитету."
  flavor_ven.84.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ven.84.historical_info: "Кілька видатних діячів венеціанської політики походили з родини Фоскарі, з них найвидатнішим був Франческо Фоскарі, дож Венеції з 1423 року і до його вимушеної відставки та раптової кончини в 1457 році. Його правління було відзначене експансіоністською політикою та значним розвитком політичного устрою Венеції. За Франческо Фоскарі відбулася консолідація контролю Венеції над східним Середземномор'ям та війни проти Мілана й Османської імперії. Сімейство Фоскарі також значною мірою посилило роль Венеції в торгівлі та її панування на Середземному морі."
  flavor_ven.85.title: "$diarii$"
  flavor_ven.85.desc: "[target_character.GetName] не покладаючи рук працює над складанням великої хроніки #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! історії, політики та суспільного життя. Ця монументальна праця вже отримала назву — «Щоденники». Однак [target_character.GetLastNameWithNoTooltip] не в змозі видати шедевр усього свого життя самостійно і тому [Select_CString(target_character.IsFemale, 'звернулася', 'звернувся' )] до уряду зі скромним проханням виділити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] кошти на публікацію написаного: [Select_CString(target_character.IsFemale, 'вона', 'він' )] щиро вважає, що передача нащадкам знань про історію [ROOT.GetCountry.Custom('CF_RP')|l] — починання, гідне державної підтримки."
  flavor_ven.85.a: "Підтримаємо видання."
  flavor_ven.85.b: "У нас немає на це зайвих коштів."
  flavor_ven.85.historical_info: "Маріно Сануто був венеціанським істориком, автором щоденників і членом Великої ради. У своєму 58-томному зібранні історичних праць, озаглавленому «#italic Щоденники#!», він докладно задокументував політичне, дипломатичне та суспільне становище республіки в 1496-1533 роках."
  flavor_ven.86.title: "Голос еллінів"
  flavor_ven.86.desc: "[ShowInstitutionName('printing_press')|U] все ширше розповсюджується по [ROOT.GetCountry.Custom('CF_DP')|l]. Плодами цього винаходу користуються в тому числі й деякі #TOOLTIP:RELIGION,orthodox_tt,X #L православні#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], що взяли на себе відповідальність за збереження #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецької#!#! культури та літератури, зокрема релігійної. Вони звернулися до держави з проханням допомогти їм у друкуванні рятованих творів, розмірковуючи так: [ROOT.GetCountry.GetName] — покровитель учених і вільних людей, а отже, кому, як не #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DP')|L]#!#!, бути світочем грецької культури в нашій державі?"
  flavor_ven.86.a: "Підтримати їх та їхнє благородне починання."
  flavor_ven.86.a.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  flavor_ven.86.b: "[ROOT.GetCountry.GetFlavorRank] не допустить друку іноземних книг!"
  flavor_ven.86.b.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецьких#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]"
  flavor_ven.86.historical_info: "Наприкінці XVI століття Венеція стала центром грецького православного богослов'я, головним чином завдяки свободі друку та значній кількості греків, які втекли туди від османського панування. У місті розташовувалася перша у світі грецька друкарня, де друкувалися літургійні книги, класичні тексти та філософські праці."
  flavor_ven.87.title: "Учена попри все"
  flavor_ven.87.desc: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_VP')|L]#!#! повернулася, здобувши загальні оплески, [target_character.GetName] — дворянка і перша в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! жінка, яка отримала ступінь доктора філософії в університеті #TOOLTIP:LOCATION,padova_tt,X #L Падуї#!#!. Учені та деякі радники, що вітають зміни, вважають, що нам варто її підтримати, дозволивши поширювати свої твори мистецтва. Більш старомодні голоси проти: вони стверджують, що таким рішенням ми лише накличемо ганьбу на старі традиції, адже жінкам не годиться займатися мистецтвом."
  flavor_ven.87.a: "Це не місце для жінки."
  flavor_ven.87.b: "Нехай собі працює."
  flavor_ven.87.historical_info: "Елена Корнаро Піскопія стала першою жінкою в Європі, яка отримала докторський ступінь. Неймовірно обдарована у філософії, музиці та теології, вона отримала ступінь доктора філософії в Падуанському університеті в 1678 році."
  flavor_ven.88.title: "Музичний міст"
  flavor_ven.88.desc: "[target_character.GetName] — талановитий композитор, [Select_CString(target_character.IsFemale, 'яка навчалася', 'який навчався' )] у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!. Провівши кілька років у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PP')|L]#!#!, де [Select_CString(target_character.IsFemale, 'вона служила', 'він служив' )] при дворі та [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] новаторством у галузі світської вокальної музики, [target_character.GetName] [Select_CString(target_character.IsFemale, 'повернулася', 'повернувся' )] до [ROOT.GetCountry.Custom('CF_DP')|l]. Тут [Select_CString(target_character.IsFemale, 'вона', 'він' )] пропонує нам заснувати консерваторію, в якій змішаються музичні традиції [target_country.Custom('CL_RP')] та #TOOLTIP:REGION,italy_region,X #L Італії#!#!."
  flavor_ven.88.a: "Схвалити пропозицію."
  flavor_ven.88.b: "Ми не будемо підтримувати іноземну музику."
  flavor_ven.88.historical_info: "Анджело Нотарі був представником інтелектуального товариства Венеції, відомого як #italic Accademia degli Sprovisti#!, але потім він переселився до Англії, де й провів більшу частину свого життя. Там він вступив на службу до короля Карла I і став придворним музикантом, співаком і лютністом. Він відіграв важливу роль у поширенні італійської барокової музики в Англії."
  flavor_ven.89.title: "[target_character.GetLastNameWithNoTooltip] проводить експерименти"
  flavor_ven.89.desc: "До #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! нещодавно [Select_CString(target_character.IsFemale, 'прибула', 'прибув' )] математик і [Select_CString(target_character.IsFemale, 'учениця', 'учень' )] такого великого діяча, як [galileo_galilei_scope.GetName]. [Select_CString(target_character.IsFemale, 'Вона звернулася', 'Він звернувся' )] до нас із проханням дозволити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] провести в наших каналах низку дослідів, щоб перевірити деякі припущення про течію води та гідравліку. Користь від цього може бути вельми велика: ми краще розумітимемо динаміку рідин (і, можливо, навіть почнемо краще справлятися з потопами), удосконалимо систему каналів і навіть зробимо торгові шляхи надійнішими. Деякі, втім, побоюються, що ці досліди можуть завдати каналам шкоди."
  flavor_ven.89.a: "Прогрес вартий ризику."
  flavor_ven.89.b: "Не можна ризикувати пошкодити канали."
  flavor_ven.89.historical_info: "Бенедетто Кастеллі — математик і вчений, який став професором Падуанського університету. Він був учнем Галілео і особливо цікавився геометрією та вимірюванням течії води. Його дослідження зробили внесок у розвиток сучасної гідродинаміки."
  flavor_ven.90.title: "[target_character.GetLastNameWithNoTooltip]"
  flavor_ven.90.desc: "Знаменитий драматург [target_character.GetName] збирається поставити в #L #L [ROOT.GetCountry.GetAdjective|l]#!ому#! #TOOLTIP:BUILDING_TYPE,opera_house,X #L оперному театрі#!#! кілька нових опер, що піде на користь і прагнучій вистав публіці, і престижу [ROOT.GetCountry.Custom('CF_RP')|l] загалом. Якщо [Select_CString(target_character.IsFemale, 'її', 'його' )] затія увінчається успіхом, ми вкотре підтвердимо, що заслужено вважаємося покровителями мистецтва та культури, однак деякі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] застерігають нас: вони вважають, що опера розкладає душу і доводить людей до гріха."
  flavor_ven.90.a: "Профінансувати серію оперних вистав."
  flavor_ven.90.b: "Опера — надто розбещене мистецтво."
  flavor_ven.90.historical_info: "Ніколо Мінато був одним із провідних лібретистів Венеції та відіграв ключову роль у розвитку ранньої опери. Його роботи та роботи інших лібретистів сприяли популяризації у Венеції опери як виду мистецтва. Спочатку він служив у республіці, але потім переїхав до Відня і став придворним поетом Леопольда I."
  flavor_ven.91.title: "Розширення венеційського гетто"
  flavor_ven.91.desc: "Протягом останніх кількох десятиліть #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейське#!#! населення #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! лише збільшується. У маленьку закриту громаду під назвою #italic Ghetto Nuovo#! стікається все більше людей із найрізноманітніших місць. Людям стає тісно, умови згодом лише погіршуються, а напруга зростає. Представники громади нещодавно звернулися до влади [ROOT.GetCountry.Custom('CF_RP')|l] із проханням виділити кошти на розширення гетто."
  flavor_ven.91.a: "Розширення гетто."
  flavor_ven.91.a.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейських#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  flavor_ven.91.b: "Закриємо на це очі."
  flavor_ven.91.b.tt: "[Concept('pop_satisfaction','Задоволення')|e] всіх #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейських#!#! [Concept('pops','груп населення')|e] у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  flavor_ven.91.historical_info: "Венеційське гетто було офіційно створено 1516 року як територія обмеженого проживання для венеційських євреїв. Попри обмеження на пересування та професії, євреї відігравали важливу роль у торговельному та інтелектуальному житті міста. Гетто кілька разів розширювалося, щоб вмістити зростаюче населення, зокрема після прибуття сефардів та левантійських євреїв, які рятувалися від переслідувань або мріяли влитися в процвітаючу венеційську економіку. Назва гетто може збивати з пантелику, оскільки на момент його створення вже існували терміни #italic Ghetto Nuovo#! (нове гетто) та #italic Ghetto Vecchio#! (старе гетто), що свідчили про промислове минуле місця, адже спочатку словом «гетто» позначалася ливарня. Через це насправді першим домом для євреїв стало #italic Ghetto Nuovo#!."
  flavor_ven.92.title: "Ботанічний сад у Падуї"
  flavor_ven.92.desc: "Вчені з #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#! #TOOLTIP:LOCATION,padova_tt,X #L Падуї#!#! запропонували розбити окремий сад, де вони вивчатимуть рослини — як місцеві, так і іноземні. Вони стверджують, що це піде на користь усім: лікарі зможуть винаходити нові ліки, ботаніки — вдосконалювати свою класифікацію, а наша держава — зміцнювати добре ім'я покровителя вчених."
  flavor_ven.92.a: "Підтримати ботанічний сад."
  flavor_ven.92.b: "Відмовимося підтримувати його."
  flavor_ven.92.historical_info: "Ботанічний сад Падуї був розбитий 1545 року, що робить його найстарішим ботанічним садом у світі. Він був створений на замовлення венеційського сенату і перебуває у віданні Падуанського університету. Сад мав сприяти вирощуванню та вивченню лікувальних рослин. Зібрання безлічі рослин з усіх куточків світу зробило його важливим центром наукового прогресу та вивчення біологічного різноманіття."
  flavor_ven.93.title: "Реформи Лазаретто"
  flavor_ven.93.desc: "Чиновники та лікарі, стурбовані постійними спалахами чуми у #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#!, закликали нас повністю реформувати острівний карантин #italic Лазаретто#!: запровадити суворіші обмежувальні заходи, покращити умови утримання хворих, а заодно ретельніше вести записи та піклуватися про пацієнтів."
  flavor_ven.93.a: "Вкласти кошти в реформу карантину та медичних практик."
  flavor_ven.93.b: "Нехай усе залишається як є."
  flavor_ven.93.historical_info: "Лазаретто Веккьо — один із перших у світі карантинів, що відіграв найважливішу роль у захисті від спалахів чуми. У XVI та XVII століттях було проведено реформи, що покращили медичне обслуговування та управління островом. Це вивело Венецію в лідери у сфері громадської охорони здоров'я та запобігання хворобам, особливо тим, що переносяться морем."
  flavor_ven.94.title: "Суперечка про кав'ярні"
  flavor_ven.94.desc: "Останніми роками іноземні купці стали в достатку завозити до #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! [ShowGoodsName('cocoa')|l], через що в державі почали одна за одною відкриватися кав'ярні — заклади, де мужі з найрізноманітніших поприщ можуть зібратися та обговорити політику, літературу, комерцію, а часом навіть крамольні ідеї. Зрозуміло, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] стривожені: у подібних відвертих розмовах народжується зрада… або навіть єресь."
  flavor_ven.94.a: "Заборонити їх, щоб повернути контроль."
  flavor_ven.94.b: "Не варто боятися нових ідей."
  ven_coffeehouses_banned: "Кав'ярні під забороною"
  flavor_ven.94.historical_info: "Венеція стала одним із перших європейських міст, де в моду увійшла кава, з якою Османи познайомили світ на початку XVII століття. Хоча багато хто вітав нові кав'ярні як місця для торгівлі та інтелектуальних бесід, влада побоювалася можливої підривної діяльності. У світлі Французької революції в 1796 році венеційський уряд розпорядився закрити кав'ярні, побоюючись поширення революційних ідей серед їхніх завсідників з числа інтелігенції."
  flavor_ven.95.title: "Експедиція до Північної Далмації"
  flavor_ven.95.desc: "Натураліст та [Select_CString(target_character.IsFemale, 'письменниця', 'письменник' )] [target_character.GetName] [Select_CString(target_character.IsFemale, 'звернулася', 'звернувся' )] до уряду з проханням підтримати [Select_CString(target_character.IsFemale, 'її', 'його' )] експедицію в гори та маловивчені глибинні краї #TOOLTIP:PROVINCE_DEFINITION,north_dalmatia_province,X #L Північної Далмації#!#!. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] мета — ретельно описати звичаї, мову та культуру горян, що живуть під нашою владою. І хоча [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] не цілком підтримує це починання (дехто навіть вважає подібну затію марною тратою державних коштів), деякі все ж вважають, що не варто нехтувати можливістю вивчити та зрозуміти забутих [ROOT.GetCountry.Custom('CF_TP')|l] підданих."
  flavor_ven.95.a: "Розумна пропозиція!"
  flavor_ven.95.b: "Дурна трата ресурсів!"
  flavor_ven.95.historical_info: "Альберто Фортіс — італійський письменник, мандрівник та етнограф, що прославився своєю працею #italic «Подорож до Далмації»#!, яка вийшла в 1774 році та описувала життя морлахів, слов'янського сільського населення на землях під контролем Венеції. Завдяки перекладу цієї праці багатьма мовами Фортіс відіграв помітну роль у формуванні образу балканських народів у свідомості жителів Західної Європи."
  flavor_ven.96.title: "[target_character.GetNameWithNoTooltip] влаштовує виставку"
  flavor_ven.96.desc: "[target_character.GetName] — художник-самоучка скромного походження, що нещодавно [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! своїми вишуканими та заворожуючими портретами. Сьогодні [target_character.GetName] — шанований член кількох закордонних академій мистецтв. Після повернення до #TOOLTIP:LOCATION,$venice_tt$,X #L Венеції#!#! [Select_CString(target_character.IsFemale, 'вона звернулася', 'він звернувся' )] до влади з проханням дозволити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] влаштувати виставку власних робіт. І хоча [Select_CString(target_character.IsFemale, 'її', 'його' )] пастельні портрети незмінно викликають захват у дворах інших держав, деякі впливові діячі нашої країни не готові змиритися з думкою, що слави та визнання в галузі витончених мистецтв досягла жінка."
  flavor_ven.96.a: "Восславимо [Select_CString(target_character.IsFemale, 'її', 'його' )] геній!"
  flavor_ven.96.b: "Мистецтвом повинні займатися навчені чоловіки!"
  flavor_ven.96.historical_info: "Розальба Карр'єра була впливовою венеційською художницею епохи рококо, відомою своїми пастельними портретами та мініатюрами. Вона стала помітною фігурою в європейському мистецтві, особливо у Франції, де її портрети користувалися популярністю при дворі Людовика XV. Її успіх як художниці у світі, де панували чоловіки, став досягненням, що час від часу породжувало суперечки. Вона також була членом Академії Святого Луки в Римі та французької Королівської Академії живопису та скульптури."
  flavor_ven.97.title: "Упередження проти Рідотто"
  flavor_ven.97.desc: "#italic Рідотто#! — колись гральний дім, що відкривався на час карнавалу та підпорядковувався державі — з часом став осередком скандалів та морального занепаду. Під золотими склепіннями Палаццо Дандоло [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] та іноземні гості із задоволенням віддаються азартним іграм та ризикують своїм статком і навіть честю. І хоча [ROOT.GetCountry.GetFlavorRank|l] отримує свою частку прибутку з податків на ці ігри, поборники моральності та віри вимагають: нехай [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] закриє цей заклад."
  flavor_ven.97.a: "Закрити це місце та конфіскувати його майно."
  flavor_ven.97.b: "Встановити регулюючі закони."
  flavor_ven.97.c: "Залишити все як є."
  flavor_ven.97.historical_info: "#italic Рідотто#! відкрився в 1638 році як перше в Європі державне казино на час Карнавалу. Хоча початковою метою було взяти гріхи під контроль, з часом Рідотто став символом розбещеності еліт і почав асоціюватися з корупцією та падінням моралі. У 1774 році під тиском реформістів та духовенства венеційський уряд закрив його."
  flavor_ven.98.title: "Астраріум"
  flavor_ven.98.desc: "Лікар та годинникар [target_character.GetName] з #TOOLTIP:LOCATION,padova_tt,X #L Падуї#!#! нещодавно [Select_CString(target_character.IsFemale, 'сконструювала', 'сконструював' )] годинник, названий [Select_CString(target_character.IsFemale, 'нею', 'ним' )] #italic «Астраріум»#!. [target_character.GetLastNameWithNoTooltip] стверджує, що цей механічний інструмент — справжнє диво, здатне з вражаючою точністю відображати рух небесних тіл. [Select_CString(target_character.IsFemale, 'Винахідниця', 'Винахідник' )] хоче представити Астраріум #TOOLTIP:LOCATION,$venice_tt$,X #L венеційській#!#! публіці, щоб та на власні очі переконалася в геніальності наших вчених, але не зможе зробити це без підтримки з боку [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_ven.98.a: "Спонсорувати демонстрацію Астраріума."
  flavor_ven.98.b: "Дозволити демонстрацію, але коштів не виділяти."
  flavor_ven.98.c: "У нас є важливіші справи."
  flavor_ven.98.historical_info: "Джованні Донді, син прославленого Якопо Донді, був лікарем, астрономом та інженером. Насамперед він відомий створенням #italic Астраріума#!, механічної моделі сонячної системи, що показувала рух планет та небесних тіл."
  flavor_ven.99.title: "[ShowBuildingTypeNameWithNoTooltip('the_cipher_secretary')]"
  flavor_ven.99.desc: "Останнім часом купці, посли та дипломати все частіше листуються за допомогою різних кодів і шифрів. Це не дивно, адже наші інтереси охоплюють усе Середземномор’я. У світлі цього [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує нам заснувати державну шифрувальну контору. [ShowBuildingTypeName('the_cipher_secretary')|U] візьме на себе захист наших інтересів і, особливо, донесень розвідки. Працювати над цією корисною, але поки ще тільки зароджуваною справою будуть найздібніші уми [ROOT.GetCountry.Custom('CF_RP')|l]."
  flavor_ven.99.a: "Заснувати її."
  flavor_ven.99.b: "Нехай купці займаються шифрами."
  flavor_ven.99.historical_info: "Ще у XV столітті венеційські купці шифрували листи своїм представникам за допомогою особистих шифрів, пересилаючи торгові відомості та дані військової розвідки. Усвідомивши зростаючу потребу в системному шифруванні, республіка офіційно заснувала Шифрувальну контору, що призвело до розробки просунутої системи шифрування, дешифрування та криптоаналізу."
  flavor_ven.100.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його' )] винаходи"
  flavor_ven.100.desc: "Нам стало відомо, що до вчених кіл нашої держави входить така примітна особистість, як [target_character.GetName] — інженер, винахідник та мовознавець, чиї винаходи можна сміливо назвати революційними: серед них — удосконалена система вимірювань, складні оптичні прилади та навіть літальний апарат. Деякі вважають [Select_CString(target_character.IsFemale, 'її', 'його' )] задуми надмірно сміливими, але багато хто впевнений, що якщо [ROOT.GetCountry.GetFlavorRank|l] підтримає ці починання, то ми неодмінно опинимося на вістрі наукового прогресу. Є, втім, і ті, хто вважає марною підтримку ідей, що здаються нездійсненними."
  flavor_ven.100.a: "Підтримати [Select_CString(target_character.IsFemale, 'її', 'його' )] розробки."
  flavor_ven.100.b: "Відмовитися від підтримки таких умоглядних винаходів."
  flavor_ven.100.historical_info: "Лівіо Бураттіні був видатним венеційським вченим, подорожував Європою та Африкою, а потім провів значну частину свого життя, працюючи в Польщі та Литві. Бураттіні розробив ранній прототип літального апарату, «дракона». Незважаючи на те, що пілотований політ так і не відбувся, це один з найраніших задокументованих проектів літального апарату. Бураттіні також зробив внесок у наукові зміни, ставши автором терміна «метр» як універсальної одиниці вимірювання довжини, заснованої на довжині маятника."