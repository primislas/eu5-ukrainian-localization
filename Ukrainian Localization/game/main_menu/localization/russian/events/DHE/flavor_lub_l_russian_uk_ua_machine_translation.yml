l_russian:
  flavor_lub.1.title: "Ворота до [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_lub.1.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] повниться найкращими інженерами з усіх куточків нашої країни. Вони вважають, що цей [target_location.GetRank.GetNameWithNoTooltip|l] стане ще кращим, якщо ми збудуємо там #TOOLTIP:BUILDING_TYPE,hsa_burgtor,X #L Бургтор#!#!: нові ворота, які стануть головним в'їздом до нашої столиці.\n\nЦя велична та багато прикрашена конструкція розташовуватиметься в стратегічно вигідному місці та буде оточена вже існуючими укріпленнями, тож варта зможе без зусиль стежити за потоками людей, що відвідують і покидають місто."
  flavor_lub.1.a: "Ми виділимо кошти на будівництво!"
  flavor_lub.1.b: "Може, у [target_country.Custom('CL_GEN')] вийде взяти витрати на себе?"
  flavor_lub.1.c: "Нас не цікавлять подібні проєкти."
  flavor_lub.2.title: "Фінансова допомога [target_country2.Custom('CL_DAT')]"
  flavor_lub.2.desc: "Нещодавно до наших купців звернулися посланці столичних чиновників [target_country2.Custom('CL_GEN')] із пропозицією профінансувати один будівельний проєкт заради зміцнення дипломатичних зв'язків. Ці чиновники хочуть звести #TOOLTIP:BUILDING_TYPE,hsa_burgtor,X #L Бургтор#!#! — конструкцію, яка стане головними воротами [target_location.Custom('LR_GEN')]. Від нас вимагається лише зробити одне невелике вкладення…"
  flavor_lub.2.a: "Що ж…"
  flavor_lub.2.b: "Вони нас за дурнів тримають?"
  opinion_financed_burgtor_modifier: "Згода на фінансування Бургтора"
  opinion_refused_to_finance_burgtor_modifier: "Відмова у фінансуванні Бургтора"
  flavor_lub.3.title: "Відповідь [target_country.Custom('CL_GEN')]"
  flavor_lub.3.desc: "Гонець із #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! прибув до нас із запечатаним конвертом, всередині якого знаходиться відповідь купців на наше питання про фінансування. Текст рясніє витіюватими зворотами, сенс яких полягає в тому, що нам потрібно допомагати одне одному у сфері спільних інтересів. Наприкінці листа ліга оголошує про своє рішення щодо нашого питання…"
  flavor_lub.3.a: "Вони профінансують будівництво!"
  flavor_lub.3.b: "Вони не виділять нам кошти!"