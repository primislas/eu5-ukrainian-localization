l_russian:
  flavor_zaz.1.title: "Сходження $ZAZ_ADJ$ої Січі"
  flavor_zaz.1.desc: "Вплив, яким у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! користуються [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')|l], призвів до того, що численні воїни, смерди та холопи почали поступово переселятися в #TOOLTIP:AREA,zaporizhzhia_area,X #L Запоріжжя#!#!. Вони твердо вирішили залишатися на Дніпрі, де вже звели укріплення, сподіваючись, що колись доб'ються самоврядування у складі [ROOT.GetCountry.Custom('CL_GEN')].\n\nЦе помітили й інші країни, негайно замисливши обернути відчай втікачів собі на користь і захопити цю місцевість."
  flavor_zaz.1.historical_info: "Запорозька Січ є найвідомішим об'єднанням козаків. Її заснування наприкінці XV-XVI століття зазвичай пов'язують з будівництвом замку Хортиця біля Дніпра. Козаки захищали Річ Посполиту від османської загрози, а повстали і перейшли на бік Російської імперії. Але навіть там їм було складно зберегти свою козацьку ідентичність. Зрештою Січ скасували і в 1775 році замість неї виникла Задунайська Січ."
  flavor_zaz.1.a: "Ці [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')|l] тепер ще й правити захотіли?"
  flavor_zaz.1.b: "Вони будуть нам дуже корисні."
  zaz_gains_cores_in_all_of_zaporizhzhia_area_tt: "$ZAZ$ отримає [Concept('cores', 'корінні місцевості')|e] у всій [Concept('area', 'області')|e] «[ShowAreaName('zaporizhzhia_area')]»."
  flavor_zaz.2.title: "[target_international_organization.GetNameWithNoTooltip] та наше майбутнє"
  flavor_zaz.2.desc: "[target_international_organization.GetName] завжди може розраховувати на допомогу вірного #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ого#! товариша, яким є [ROOT.GetCountry.Custom('rank_ru_GEN')|l], де правимо ми. Однак останнім часом багато хто, зокрема [target_character.GetName], стали помічати, наскільки віддалилися один від одного [ROOT.GetCountry.GetName] та [target_country.GetName]. Замість того щоб сидіти склавши руки й відсторонено дивитися на те, що відбувається, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] та [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вирішили покласти край розладу. Однак є й такі, хто вважає, що доля піднесла [ROOT.GetCountry.Custom('CL_DAT')] можливість нарешті розвивати власну культуру, в яку не буде втручатися [target_country.GetCapital.GetName]."
  flavor_zaz.2.a: "Зробимо їм подарунок на знак дружби."
  flavor_zaz.2.b: "[target_country.GetNameWithNoTooltip] не заслуговує жодних дарів!"
  flavor_zaz.1000.title: "Випробування вірності"
  flavor_zaz.1000.desc: "Жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! багато в чому задоволені #L [target_country.GetAdjective|l]ою#! владою, однак не можна сказати, щоб один одним були задоволені [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName]: між ними пролягла тріщина. Тепер [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] збирається шукати заміну. Нею може стати [target_country2.GetLongName]: ця країна хоче, щоб у її військах служили наші [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')|l], а натомість її влада допоможе нам скинути з себе ярмо."
  flavor_zaz.1000.a: "Ми попросимо їх про допомогу."
  flavor_zaz.1000.b: "Бунтувати проти [target_country.Custom('CL_GEN')] може бути небезпечно, навіть якщо нас підтримає [target_character2.GetNameWithNoTooltip]."
  zaz_russia_will_declare_war_if_they_accept_tt: "Якщо [target_country2.GetName] погодиться на нашу пропозицію, ми станемо #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#! цієї країни та оголосимо війну #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#!."
  zaz_no_rebellion_tt: "Ми не станемо піднімати бунт проти #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!."
  flavor_zaz.1001.title: "$flavor_zaz.1000.title$"
  flavor_zaz.1001.desc: "Навіть наші постійні сутички з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! не змогли змінити того, що цій країні покірно підкоряються [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')|l], які живуть у #ONCLICK:COUNTRY,[target_country3.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country3.Custom('CL_tt')],X [target_country3.Custom('CL_PREP')|L]#!#!. Втім, останні події призвели до того, що [target_character3.GetName] [Select_CString(target_character3.IsFemale, 'висловила', 'висловив' )] бажання перейти на наш бік. А ми за це допоможемо їм позбутися нестерпної [target_country.GetAdjectiveWithFlagWithNoTooltip|l]ої влади."
  flavor_zaz.1001.a: "Вирушаємо на світанку."
  flavor_zaz.1001.b: "Як ми можемо бути впевнені, що кочівники теж нас не зрадять?"
  flavor_zaz.1100.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')|U] та їхні регалії"
  flavor_zaz.1100.desc: "Ми вірою і правдою служимо в #L [target_country.GetAdjective|l]ому#! війську, однак [target_country.GetGovernment.GetRulerTitle|l] жодного разу не [Select_CString(target_country.GetGovernment.GetRuler.IsFemale, 'надавала', 'надавав' )] нам жодних почестей. Усе, що ми отримуємо, — це те, що належить простому солдату: здобич і землю. Сьогодні [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] хочуть попросити, щоб цвіт #L [ROOT.GetCountry.GetAdjective|l]ого#! суспільства, який пережив не один похід і здобув [target_country.Custom('CL_DAT')] не одну славну перемогу, нагородили гідними регаліями. Можливо, якщо до цього прохання прислухаються, засмучені [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] забудуть про своє невдоволення."
  flavor_zaz.1100.a: "Ми попросимо найкращі з регалій."
  flavor_zaz.1100.b: "Наші досягнення та історії цінніші за пару артефактів."
  zaz_request_work_of_art_from_overlord_tt: "Ми попросимо #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! створити для нас [Concept('work_of_art', 'витвір')|e]"
  zaz_no_request_from_overlord_tt: "Ми не будемо ні про що просити #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#!"
  flavor_zaz.1101.title: "$flavor_zaz.1100.title$"
  flavor_zaz.1101.desc: "[target_country2.GetName] — перебуває в підпорядкуванні у нашої країни, і [ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetName] високо цінує військове мистецтво, яким славляться [target_country2.GetGovernment.GetEstateName('cossacks_estate')|l], що служать у нашому війську. Однак самі вони вважають, що ми недостатньо заохочуємо їхні зусилля, і попросили нагородити цвіт їхнього суспільства регаліями на знак влади над іншими. Ми можемо піти назустріч і надати їм ці регалії, але не всі згодні на поступки: багато хто заявляє, що гроші з нашої скарбниці #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не слід витрачати на подібну дурницю. Замість цього їх краще вкласти в розвиток [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_zaz.1101.a: "Давайте умиротворимо нашого ленника."
  flavor_zaz.1101.b: "Ми не можемо собі дозволити виконати це прохання."