l_russian:
 flavor_liv.1.title: "[target_government_reform.GetNameWithNoTooltip]"
 flavor_liv.1.entry: "$livonian_confederation$"
 flavor_liv.1.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] постепенно теряет власть, тогда как [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] и [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], напротив, лишь усиливают своё влияние. Чтобы избежать политического кризиса, есть способ, который раньше казался многим недопустимым, а именно — [target_government_reform.GetName|l]. Подобная мера позволит нам объединиться со своими ленниками в конфедерацию. При этом владеющие землёй епископы и вассалы получат определённые полномочия в [ROOT.GetCountry.Custom('parliament_ru_PREP')|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, что также поможет предотвратить борьбу за власть."
 flavor_liv.1.historical_info: "Понеся тяжёлые потери в Битве под Вилькомиром 1435 года, Ливонский орден утратил значительную часть своего влияния. 4 декабря того же года он подписал договор, учредивший Ливонскую конфедерацию и предоставивший многочисленные привилегии различным епископам и другим вассалам."
 flavor_liv.1.a: "Придётся поддаться."
 flavor_liv.1.b: "Если они так хотят править, пусть найдут для этого другую страну."
 flavor_liv.1.b.entry: "Если они так хотят править, пусть найдут для этого другую страну."
 flavor_liv.2.title: "[target_character.GetNameWithNoTooltip]"
 flavor_liv.2.entry: "Бальтазар Руссов, ливонский хронист"
 flavor_liv.2.desc: "Ходят слухи, что некий #L [target_character.GetCulture.GetName|l]ий#! священник по имени [target_character.GetName] обладает множеством талантов. Будучи родом из [target_character.GetBirthLocation.Custom('LR_GEN')|l] [target_character.GetBirthLocation.GetName], он также успел проявить себя как [target_character.GetArtistType.GetName|l]. В связи с этим придворные считают, что, помимо своей проповеднической деятельности, он мог бы поработать над #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроникой#!#! #TOOLTIP:AREA,baltic_area,X #L балтийского#!#! региона."
 flavor_liv.2.a: "Выделить средства на создание хроники."
 flavor_liv.2.b: "Мы не нуждаемся в его услугах."
 flavor_liv.3.title: "Хроника Ливонии завершена"
 flavor_liv.3.desc: "[target_character.GetName] наконец-то [Select_CString(target_character.IsFemale,'закончила', 'закончил')] работу над своей #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хроникой#!#!, получившей название [target_work_of_art.GetName]. В этом обширном труде описана история #TOOLTIP:AREA,baltic_area,X #L Балтики#!#! от создания [GetCountry('LIV').Custom('longname_ru_GEN')] до перехода региона под влияние #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Однако [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ая власть представлена там в весьма дурном свете, что подрывает нашу легитимность и оскорбляет аристократов, владеющих этими землями."
 flavor_liv.3.a: "Такая критика вполне допустима."
 flavor_liv.3.b: "Изгоним [Select_CString(target_character.IsFemale,'её', 'его')] и запретим публиковать [Select_CString(target_character.IsFemale,'её', 'его')] работы!"
