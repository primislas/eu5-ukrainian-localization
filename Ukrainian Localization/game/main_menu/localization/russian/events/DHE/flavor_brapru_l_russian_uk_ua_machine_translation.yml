l_russian:
  flavor_brapru.1.title: "Злиття міст-близнюків Берліна та Келльна"
  flavor_brapru.1.desc: "Між Берліном та Келльном — #italic містами-близнюками#!, розташованими по протилежні сторони річки Шпрее — пролягає сполучна нитка у вигляді греблі #italic Мюлендамм#!, що розрізає річку надвоє та об'єднує два міста, перетворюючи їх на щось на зразок зрощених близнюків. І Берлін, і Келльн, як справжні брати, завжди дбають один про одного та одностайно виступають проти свавілля правителів [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Багато хто намагався нав'язати їм свою волю, проте кожна така спроба незмінно наштовхувалася на запеклий опір. Сьогодні, втім, [target_character.GetName] має можливість таки нав'язати їм унію та покласти край вільному життю двох міст, перетворивши їх на одне та зробивши столицею нашої країни."
  flavor_brapru.1.a: "Відтепер тут буде неповторне місто."
  flavor_brapru.1.b: "Нехай і далі існують окремо."
  flavor_brapru.1.historical_info: "У 1307 році Берлін і Келльн утворили союз з іншими містами маркграфства, такими як Бранденбург-на-Гафелі, Франкфурт-на-Одері та Зальцведель. Причиною такого вчинку стало прагнення відстояти свої права перед посяганнями на них з боку Генріха I. Кінець самоврядуванню Келльна та Берліна поклав у 1451 році курфюрст Фрідріх II Бранденбурзький на прізвисько «Залізний зуб», який оголосив міста-близнюки своєю офіційною резиденцією.\n\nУ 1710 році два міста — Келльн і старий Берлін — були об'єднані за указом короля Фрідріха I та оголошені столицею Пруссії. Нове утворення отримало назву «Берлін», оскільки Келльн значно поступався своєму близнюку в розмірах."
  flavor_brapru.2.title: "Будівництво Бранденбурзьких воріт"
  flavor_brapru.2.desc: "Щоб прославити наші доблесні перемоги та закріпити своє становище серед #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн, ми можемо замовити у досвідченого майстра неокласичного стилю будівництво пам'ятника, гідного прикрашати собою велику європейську столицю. [target_artist.GetName] вже складає проєкт величних воріт — їх можна буде розташувати біля західного в'їзду до [ShowLocationName('berlin')], з'єднавши тим самим сьогоднішній оплот влади з давньою столицею — #TOOLTIP:LOCATION,brandenburg,X #L Бранденбургом#!#!."
  flavor_brapru.2.a: "Побудуємо ворота на честь перемоги."
  flavor_brapru.2.b: "Грошам краще не покидати скарбницю."
  flavor_brapru.2.historical_info: "Над Бранденбурзькими воротами, збудованими у 1789–1793 роках, працювало одразу кілька творців: проєкт розробив архітектор Карл Готтгард Лангганс, а прикрасами (зокрема рельєфами та фризами, зверненими до міста) займалися інші люди — так, квадригу з римською богинею Вікторією створив скульптор Йоганн Готфрід Шадов. Самі ворота, спроєктовані в неокласичному стилі, розташовані в кварталі Доротеєнштадт, де тоді пролягав кордон Берліна. Приводом для їх будівництва стала перемога прусських військ над бунтівними голландцями та утворення союзу з Нідерландами та Великою Британією."
  flavor_brapru.3.title: "Колоніальне поселення [ROOT.GetCountry.Custom('longname_ru_wntt_GEN')]"
  flavor_brapru.3.desc: "Піддавшись віянню нових ідей, які приносять із собою численні купці з #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західної Європи#!#!, наші радники все частіше замислюються над тим, щоб заснувати торговельну компанію та взяти участь у торгівлі, що йде через Атлантичний океан: вони стверджують, що таким чином ми станемо менше залежати від іноземних купців. І хоча [target_character.GetName] не поспішає заперечувати, все ж подібне починання несе досить багато ризиків, тому краще буде спочатку постаратися охопити близькі до нас території."
  flavor_brapru.3.a: "Це піде нам на користь!"
  flavor_brapru.3.b: "Марна затія."
  flavor_brapru.3.historical_info: "Ближче до старості #italic великий курфюрст#! Фрідріх Вільгельм, натхненний прикладом голландських колонізаторів, прагнув розширити заморські володіння Бранденбурга. Однак прагнення ці не увінчалися особливим успіхом, оскільки морський потенціал Бранденбурга-Пруссії виявився занадто скромним. Проте, #italic Бранденбурзько-Африканська компанія#! зуміла отримати чималий, хоч і короткостроковий, прибуток з трансатлантичної работоргівлі та збагатити берлінське вище суспільство."
  flavor_brapru.4.title: "[target_artist.GetNameWithNoTooltip] видає #italic «Конкурсне есе»#!"
  flavor_brapru.4.desc: "[target_artist.GetName] — один із найвидатніших мислителів доби Просвітництва; нащадкам він назавжди запам'ятається як великий філософ нашого часу. Нещодавно він опублікував працю #italic «Дослідження виразності принципів природної теології та моралі»#!, яку нерідко називають просто #italic «Конкурсне есе»#!. Втім, [target_artist.GetNameWithNoTooltip] не збирається спочивати на лаврах і вже працює над новими працями, одноосібно розширюючи межі звичних нам уявлень про філософію."
  flavor_brapru.4.a: "Що таке Просвітництво?"
  flavor_brapru.5.title: "Доба короля-вояка"
  flavor_brapru.5.desc: "Для жителів нашої країни настала нова ера. [Select_CString(target_character.IsFemale,'Зайнявши', 'Зайнявши')] престол [target_character.GetName] [Select_CString(target_character.IsFemale,'провела', 'провів')] масштабні реформи та [Select_CString(target_character.IsFemale,'посилила', 'посилив')] державний бюджет, забезпечивши тим самим кошти для створення належної нам війська. Міжнародне визнання [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(target_character.IsFemale,'заслужила', 'заслужив')] у тому числі завдяки своїй ощадливості та небажанню витрачатися на надмірності та задоволення, віддаючи перевагу спрямуванню вивільнених коштів на розширення військ."
  flavor_brapru.5.a: "Сам Бог посадив тебе на престол!"
  flavor_brapru.5.historical_info: "Після сходження Фрідріха Вільгельма на престол Пруссії в країні почалася нова доба. Вона ознаменувалася радикальними реформами в галузі державного бюджету — король урізав витрати на утримання двору майже повністю, а вивільнені кошти направив на розширення війська та управління країною, в результаті чого прусське військо розрослося до 80 000 солдатів. Кількість придворних посад король урізав втричі, щоб заощадити на утриманні двору та заодно скоротити борг, накопичений Пруссією за часів царювання батька Фрідріха. Під його владою Пруссія стала абсолютистською та мілітаристською країною та однією з провідних європейських країн XVIII століття."
  flavor_brapru.6.title: "Система кантонів [ROOT.GetCountry.Custom('longname_ru_wntt_GEN')]"
  flavor_brapru.6.desc: "Наші методи набору до війська абсолютно застаріли, а військо тим часом відчайдушно потребує нових солдатів. З кожним місяцем до двору надходить все більше скарг про нелюдські умови набору, і хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вимагає, щоб кожен #L [ROOT.GetCountry.GetAdjective|l]ий#! підданий обов'язково ніс службу, скарги ці небезпідставні. У всякому разі вони ускладнюють набір нових солдатів, а тому [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] разом із радниками розробили нову реформу — вони збираються заснувати #TOOLTIP:POLICY,canton_system_policy,X #L систему кантонів#!#!. Завдяки їй ми зможемо впорядкувати набір солдатів та забезпечити законні підстави для призову."
  flavor_brapru.6.a: "Провести реформу!"
  flavor_brapru.6.b: "Старі методи надійніші."
  flavor_brapru.7.title: "Народ вимагає систему кантонів!"
  flavor_brapru.7.desc: "Ми занадто пізно звернули увагу на труднощі з набором до війська, і тепер нам, схоже, залишається тільки одне: провести реформи. Плани заснувати в країні #TOOLTIP:POLICY,canton_system_policy,X #L систему кантонів#!#! ще в силі, а радники, що виступають на їхню підтримку, все так само вважають, що впорядкувати набір без цієї системи неможливо."
  flavor_brapru.7.a: "Поступимося вимогам."
  flavor_brapru.7.b: "Не будемо звертати уваги на скарги."
  flavor_brapru.8.title: "Реформи великого курфюрста"
  flavor_brapru.8.desc: "[Select_CString(target_character.IsFemale, 'Наша велика правителька', 'Наш великий правитель' )] [target_character.GetName] [Select_CString(target_character.IsFemale, 'склала', 'склав' )] кілька грандіозних проєктів: [Select_CString(target_character.IsFemale, 'вона', 'він' )] вважає, що завдяки цим задумкам [ROOT.GetCountry.GetLongName] перетвориться на сучасну країну. У плани входять докорінні реформи та розширення війська, реконструкція #TOOLTIP:LOCATION,berlin,X #L Берліна#!#! і — вже скоріше в мріях — створення сильного флоту для [ROOT.GetCountry.Custom('CL_GEN')]. І хоча в разі успіху ми піднесемося над іншими країнами #TOOLTIP:REGION,north_german_region,X #L Північної Німеччини#!#!, спочатку доведеться вирішити, як краще розподілити ресурси."
  flavor_brapru.8.a: "Розширимо військо."
  flavor_brapru.8.b: "Приділимо увагу Берліну."
  flavor_brapru.8.c: "Розширимо флот."
  flavor_brapru.8.d: "Обійдемося без реформ."
  flavor_brapru.8.historical_info: "У 1640 році престол маркграфства Бранденбург посів Фрідріх Вільгельм з династії Гогенцоллернів. Перші роки його правління припали на неспокійні часи, що настали після закінчення руйнівної Тридцятилітньої війни, але курфюрст проявив себе гідно: так, за умовами Вестфальського миру йому вдалося приєднати до Бранденбурга частину Рейнської області та Померанії. Закладені Фрідріхом основи для розвитку військового та управлінського потенціалу Бранденбурга-Пруссії згодом призвели до перетворення Пруссії на одну з провідних європейських країн. За успіхи на престолі та перемоги у війнах зі Швецією народ прозвав Фрідріха #italic «великим курфюрстом»#!."
  flavor_brapru.9.title: "Нова столиця [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_brapru.9.desc: "[ROOT.GetCountry.GetLongName] — країна, яку [Select_CString(GetCharacter('bra_albrecht_i_askanier').IsFemale, 'залишила', 'залишив' )] нам [GetCharacter('bra_albrecht_i_askanier').GetName] — традиційно панує над #TOOLTIP:LOCATION,berlin,X #L Берліном#!#! та його околицями. Деякі наші радники порадили перенести столицю безпосередньо до Берліна, оскільки ця місцевість чудово відповідає нашим прагненням. Крім того, ми заодно зможемо заволодіти #TOOLTIP:BUILDING_TYPE,hanseatic_kontor,X #L Ганзейською конторою#!#!, послабивши тим самим іноземний вплив."
  flavor_brapru.9.a: "Перенесемо двір до Берліна."
  flavor_brapru.9.b: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] стане осередком нашої влади."
  flavor_brapru.10.title: "[ShowReligiousAspectNameWithNoTooltip('pietism')] у [ROOT.GetCountry.Custom('CL_PREP')]"
  flavor_brapru.10.desc: "#TOOLTIP:RELIGIOUS_ASPECT,pietism,X #L Пієтизм#!#! та його послідовники поступово набирають все більше впливу над чиновниками #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Якщо стати на бік цих людей і підтримати їхню боротьбу, то поширювану ними моральність, швидше за все, вдасться впровадити в суспільство, і тоді наша країна заживе за #TOOLTIP:RELIGIONGROUP,christian,X #L християнськими#!#! заповідями."
  flavor_brapru.10.a: "Назвемо їх прусськими чеснотами!"
  flavor_brapru.10.b: "Обірвати всі зв'язки з проповідниками!"
  flavor_brapru.11.title: "Кенігсберзький університет"
  flavor_brapru.11.desc: "Реформація міцно вкоренилася в наших землях. Щоб відповідати духу часу, необхідно буде зайнятися найважливішим для країни питанням — освітою, оскільки старі #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! інститути більше не бажають мати з нами жодних справ. Для цього потрібно буде закласти в #TOOLTIP:LOCATION,konigsberg,X #L Кенігсберзі#!#! новий [ShowBuildingTypeName('university')|l], куди прагнутимуть важливі діячі Реформації, і викладати там відповідно до положень нової віри."
  flavor_brapru.11.a: "Підтримаємо університет коштами!"
  flavor_brapru.11.b: "Це того не варте."
  flavor_brapru.historical_info: "Альбрехт фон Гогенцоллерн, який скасував Тевтонський орден і перетворив Пруссію на світське герцогство, не збирався зупинятися на досягнутому. Вірно дотримуючись ідей таких реформаторів-протестантів, як Мартін Лютер, він заклав основи для створення в країні закладу вищої освіти, заснувавши в 1544 році Кенігсберзький університет. Університет розташовувався за межами кордонів Священної Римської Імперії, тому для його заснування Альбрехт не шукав ані папського, ані імператорського благословення."
  flavor_brapru.12.title: "«Прусські таблиці»"
  flavor_brapru.12.desc: "До нашого двору прибув математик та астроном [target_artist.GetName]. Він цікавиться, чи не може [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] виділити йому кошти на праці. У роки роботи в #TOOLTIP:BUILDING_TYPE,university,X #L університеті#!#! #TOOLTIP:LOCATION,wittenberg,X #L Віттенберга#!#! [target_artist.GetName] склав нові астрономічні таблиці, які, за його твердженням, значно точніші за попередні."
  flavor_brapru.12.a: "Виділимо кошти на їх друк."
  flavor_brapru.12.b: "Вигнати його геть!"
  flavor_brapru.12.historical_info: "Астроном Еразм Рейнгольд користувався покровительством та фінансовою підтримкою самого прусського герцога Альбрехта фон Гогенцоллерна, який посприяв заодно виданню «Прусських таблиць». $prutenic_tables_desc$ «Прусські таблиці» лягли в основу календарної реформи папи римського Григорія XIII, а згодом були замінені «Альфонсовими таблицями»."
  flavor_brapru.13.title: "Потсдамський едикт"
  flavor_brapru.13.desc: "[ShowContinentName('europe')] страждає від давнього розбрату між #TOOLTIP:RELIGION,$catholic_tt$,X #L католиками#!#! та тими, хто обрав шлях Реформації. Якщо ми запросимо гнаних #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеран#!#! та #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністів#!#! з усієї Європи оселитися в наших землях, то, безсумнівно, прибуття до нас сотень і тисяч нових підданих піде країні тільки на користь. Однак цим ми ризикуємо накликати на себе гнів тих країн, чиї піддані прагнутимуть до нас."
  flavor_brapru.13.a: "Нехай кожен знає, що він може стати підданим [ROOT.GetCountry.Custom('CL_GEN')]!"
  flavor_brapru.13.a.tt: "Відносини з європейськими правителями-католиками погіршуються на [ShowBiasValue('pru_edict_of_potsdam_opinion')|0R]"
  pru_edict_of_potsdam_opinion: "Потсдамський едикт"
  flavor_brapru.13.b: "Не будемо ризикувати."
  flavor_brapru.14.title: "Кенігсберзькі міщани"
  flavor_brapru.14.desc: "Не всім сподобалося наше бажання правити без втручання станів. Ми отримали незаперечні докази, що [ShowPopTypeName('burghers')|l] готуються влаштувати переворот і скинути нашу владу в #TOOLTIP:LOCATION,konigsberg,X #L Кенігсберзі#!#!. Підтримку їм надає [some_neighbor_country.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[some_neighbor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[some_neighbor_country.Custom('CL_tt')],X [some_neighbor_country.Custom('CL_GEN')|L]#!#! [some_neighbor_country.GetGovernment.GetRuler.GetName]. Щоб задум їхній зірвався, відповісти на такий виклик нашій владі доведеться швидко й рішуче."
  flavor_brapru.14.a: "Відправимо війська і нагадаємо, хто тут влада."
  flavor_brapru.14.b: "Спробуємо домовитися з містом."
  flavor_brapru.14.historical_info: "Юрист і член кенігсберзької міської ради Ієронім Рот очолював опозицію #italic великому курфюрсту#! Фрідріху Вільгельму з роду Гогенцоллернів. Після того як у 1660 році курфюрст оголосив про незалежність Пруссії від Королівства Польського, Рот та його прихильники з числа кенігсберзьких радників подали польському королю Яну II Казимиру Вазі прохання знову прийняти землі Східної Пруссії під свою владу. Кінець повстанню, що зароджувалося, поклали як мовчання Яна Казимира, так і вступ Фрідріха Вільгельма до Кенігсберга в жовтні 1662 року. Рот був заарештований і засуджений до довічного ув'язнення."
  flavor_brapru.15.title: "«Практика благочестя в піснях»"
  flavor_brapru.15.desc: "Кантор і викладач у #TOOLTIP:LOCATION,berlin,X #L берлінській#!#! гімназії «Цум грауен клостер» [target_artist.GetName] здобув певну славу як композитор і письменник на тему музичної освіти. У роки своєї служби кантором [target_artist.GetNameWithNoTooltip] також випустив збірку з 240 гімнів, виданих під назвою Praxis Pietatis Melica, тобто «Практика благочестя в піснях». Його прагнення не тільки виконувати старі гімни, а й писати нові на благо правовірних по всій Німеччині заслуговує на повагу, а тому видання збірки слід підтримати."
  flavor_brapru.15.a: "Nun danket alle Gott."
  flavor_brapru.16.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_brapru.16.desc: "Єврейський вчений-поліглот і мислитель [target_artist.GetName] — людина скромного походження. Спочатку він мав намір стати рабином, однак дорога релігійної освіти привела його до провінції [berlin_province.GetName], де [target_artist.GetName] став відомим автором, однаково шанованим як серед #TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#!, так і серед #TOOLTIP:RELIGIONGROUP,israelite_group,X #L юдеїв#!#!. Він видає праці #TOOLTIP:LANGUAGE,german_language,X #L німецькою#!#! та #TOOLTIP:LANGUAGE,hebrew_language,X #L івритом#!#!, а також проводить у себе вдома відкриті обговорення на різні теми. Ніхто з колишніх жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! ніколи так не сприяв зміцненню терпимості між народами, як він."
  flavor_brapru.16.a: "Яка гідна особистість!"
  flavor_brapru.17.title: "[target_artist.GetNameWithNoTooltip] у русі за Реформацію"
  flavor_brapru.17.desc: "[target_artist.GetName] — один із найвидатніших діячів перших років Реформації, однак його діяльність затьмарила суперечка з іншими прихильниками руху щодо Мойсеєвого закону і того, наскільки він застосовний до всіх #TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#!. [target_artist.GetName] вважає, що Євангеліє — єдина книга, яка потрібна праведному християнину. Ці погляди не поділяють багато його сподвижників, які продовжують викладати народу П'ятикнижжя — звід Мойсеєвого закону. Не бажаючи зносити звинувачення в #italic антиноміанізмі#! — нехтуванні Старим Завітом, [target_artist.GetNameWithNoTooltip] звернувся до нашого двору з проханням про виділення йому коштів і притулку, щоб він міг спокійно зайнятися роботою над власним вченням."
  flavor_brapru.17.a: "Видати йому гроші!"
  agricolas_reputation: "Репутація Агріколи"
  flavor_brapru.17.b: "Його примирливі погляди неприпустимі."
  flavor_brapru.18.title: "Франкфуртський університет"
  flavor_brapru.18.desc: "Нам милостиво виділили кошти на будівництво #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#! поблизу #TOOLTIP:LOCATION,lebus,X #L Лебуса#!#!. Цей заклад, де громадяни навчатимуться наукам, передбачається побудувати в сусідньому Франкфурті-на-Одері з розрахунком, що вплив міста з часом стане досить значним."
  flavor_brapru.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_brapru.19.title: "Відвага жителів Шпандау"
  flavor_brapru.19.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] рве і метає: розвага, влаштована нами заради забави жителів прекрасного міста #TOOLTIP:LOCATION,berlin,X #L Берліна#!#!, закінчилася зовсім інакше, ніж ми очікували. Показова битва, спланована до найменших подробиць, мала закінчитися перемогою жителів Кьольна-Берліна над сусіднім Шпандау, проте військо Шпандау збунтувалося і побило берлінців! Очевидно, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] для цих людей — ніхто, а ми не готові миритися з такою зневагою."
  flavor_brapru.19.a: "Їх слід покарати!"
  flavor_brapru.19.b: "Нехай веселяться."
  flavor_brapru.19.historical_info: "У серпні 1567 року курфюрст Йоахім II Гектор влаштував військові навчання. Противниками в них були війська, складені з жителів Берліна-Кьольна з одного боку та незалежного міста Шпандау — з іншого. За задумом курфюрста виграти «битву» мали берлінці, проте жителі Шпандау збунтувалися проти такого рішення і, увійшовши в бойовий раж, розгромили умовного ворога. Розсерджений курфюрст спочатку спробував зупинити тих, хто бився, гарматами (які, втім, були не заряджені), а після закінчення навчань ув'язнив градоначальника Шпандау на кілька місяців. В історію ці маневри увійшли під назвою #italic Knüppelkrieg#!, тобто «війна дубинок»."
  flavor_brapru.20.title: "[target_artist.GetNameWithNoTooltip] просить притулку"
  flavor_brapru.20.desc: "Викладач у #TOOLTIP:BUILDING_TYPE,university,X #L університеті#!#! #TOOLTIP:LOCATION,apolda,X #L Апольди#!#! [target_artist.GetName] прогнівив лютеран тим, що веде лекції майже безбожницького штибу. Сьогодні нам стало відомо, що він збирається переселитися — за умови, що йому дозволять викладати й надалі. Ми впевнені, що присутність цієї людини в нашій країні піде тільки на користь нашим власним університетам."
  flavor_brapru.20.a: "Яке освічене рішення!"
  flavor_brapru.20.b: "Краще відішлемо його подалі."
  flavor_brapru.21.title: "[target_artist.GetNameWithNoTooltip] висміює синдром Вертера!"
  flavor_brapru.21.desc: "[target_artist.GetName] [Select_CString(target_artist.IsFemale, 'опублікувала', 'опублікував' )] абсолютно обурливий твір, у якому [Select_CString(target_artist.IsFemale, 'висміяла', 'висміяв' )] роботи авторів — представників #TOOLTIP:CULTUREGROUP,german_group,X #L німецького#!#! літературного руху #italic «Буря і натиск»#!. Особливо жорстко [target_artist.GetNameWithNoTooltip] критикує впадання публіки в крайнощі після прочитання роману #italic «Страждання юного Вертера»#!, так само як і вплив цього роману на читачів, а також припускає, що для бідного Вертера все мало закінчитися добре."
  flavor_brapru.21.a: "Ах, романи — це так радісно!"
  flavor_brapru.21.b: "Ця трагедія така романтична!"
  flavor_brapru.22.title: "[target_artist.GetNameWithNoTooltip] хоче провести реформу освіти"
  flavor_brapru.22.desc: "Визнаний мовознавець і мислитель [target_artist.GetName] настільки пригнічений якістю освіти в нашій столиці, що запропонував нам свою допомогу в проведенні реформ: він хоче перетворити не тільки столицю, а й усю країну на місце, де можливо все. [target_artist.GetName] вивчав #TOOLTIP:LANGUAGE,basque_language,X #L баскську#!#! мову і служив дипломатом при [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их посольствах в інших країнах, тому знання його про різні предмети широкі, а вміння керувати викликає захоплення."
  flavor_brapru.22.a: "Видати йому гроші!"
  flavor_brapru.22.b: "Нічого цінного він не може запропонувати."
  flavor_brapru.23.title: "[target_artist.GetNameWithNoTooltip] видає п'єсу #italic «Натан Мудрий»#!"
  flavor_brapru.23.desc: "Автор #italic «Натана Мудрого»#! майстерно вплів у розповідь притчу про персні, щоб краще підкреслити свій задум: авраамічним релігіям слід бути терпимими одна до одної. Головного героя твору [target_artist.GetName] списав зі свого старого друга і наперсника, який повністю поділяє його погляди. П'єсу збираються поставити в #TOOLTIP:LOCATION,berlin,X #L Берліні#!#! — звичайно, з нашого дозволу."
  flavor_brapru.23.a: "Виявляти терпимість повинен кожен!"
  flavor_brapru.23.b: "Це безглуздий заклик до терпимості."
  flavor_brapru.24.title: "[ShowPolicyNameWithNoTooltip('order_of_the_swan_policy')]"
  flavor_brapru.24.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здебільшого вважають, що [country_ruler.GetName|l] з недостатнім старанням виховує у своїх підданих побожність, а тому заявляють про необхідність заснувати новий лицарський орден — він поширюватиме віру в Діву Марію, з чим не справляється [ROOT.GetCountry.GetGovernment.GetAdjective|l]а влада. Зусиллями такого ордену [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] нашої країни та їхні кріпаки розвиватимуть у собі духовний початок.\n\nІ хоча подібне починання помітно спустошить скарбницю, [ROOT.GetCountry.GetFlavorRank|l] почне користуватися доброю славою. Прислухавшись до цих доводів, [country_ruler.GetNameWithNoTooltip|l] [Select_CString(country_ruler.IsFemale, 'погодилася', 'погодився' )] принаймні задуматися про заснування ордену. З усіх пропозицій, втім, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вважає гідним лише одне: #TOOLTIP:POLICY,order_of_the_swan_policy,X #L орден Лебедя#!#!."
  flavor_brapru.24.historical_info: "Бранденбурзький #italic орден Лебедя#! заснував у 1440 році курфюрст Фрідріх II. #italic Modus operandi#! цього ордену передбачав виховання в підданих побожності та поширення культу Богородиці. Орден, що налічував під час заснування всього 37 осіб, швидко розрісся до кількох сотень послідовників."
  flavor_brapru.24.a: "Підтримати це починання."
  flavor_brapru.24.b: "Навіщо нам ці турботи?"
  flavor_brapru.25.title: "$flavor_brapru.24.title$"
  flavor_brapru.25.desc: "Нещодавно [country_ruler.GetName|l] [Select_CString(country_ruler.IsFemale, 'заснувала', 'заснував' )] лицарський #TOOLTIP:POLICY,order_of_the_swan_policy,X #L орден Лебедя#!#! — вихователів у підданих побожності та віри в Діву Марію. Завдяки династичним зв'язкам багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отримали запрошення вступити до ордену, що відкриває нам чудову нагоду представити там власні інтереси."
  flavor_brapru.25.historical_info: "$flavor_brapru.24.historical_info$"
  flavor_brapru.25.a: "Нехай [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] вступить до ордену."
  flavor_brapru.25.b: "Добре, що він у нас є."
  flavor_brapru.26.title: "Орден Чорного орла"
  flavor_brapru.26.desc: "У міру зростання нашої військової могутності та руху в бік до #TOOLTIP:SOCIETAL_VALUE,quality_vs_quantity,X #L якості#!#! замість кількості все більше впадає в око відсутність у нас нагород, яких були б гідні видатні генерали. Видача земельних наділів і просто прямі виплати — чудове заохочення, однак, заснувавши новий (і суворо світський) військовий орден, ми зробимо так, щоб кожен житель нашої країни знав своїх героїв. Починання це обійдеться нам недешево, однак #TOOLTIP:POLICY,order_of_the_black_eagle_policy,X #L орден Чорного орла#!#! допоможе розвивати дисципліну та чесноти."
  flavor_brapru.26.historical_info: "Десятого січня 1701 року, напередодні сходження на престол короля Пруссії, курфюрст Фрідріх III заснував військовий орден Чорного орла, до якого увійшли багато правлячих представників династії Гогенцоллернів та їхні родичі, а також члени іноземних королівських сімей, що перебували в Пруссії з візитом. Сама нагорода вручалася також і вправним військовослужбовцям, підкреслюючи їхні заслуги перед вітчизною."
  flavor_brapru.26.a: "Виділимо кошти на заснування."
  flavor_brapru.26.b: "Ні нам, ні нашим генералам ні до чого ці надмірності!"
  flavor_brapru.27.title: "Колонізація Сілезії"
  flavor_brapru.27.desc: "Війна важко позначилася на захопленій та спустошеній #TOOLTIP:AREA,silesia_area,X #L Сілезії#!#!. Деякі, не бажаючи витрачати кошти з казни на відновлення області й при цьому гаряче бажаючи приєднувати до себе провінції, де поширюється єресь, пропонують запросити сюди #L [ROOT.GetCountry.GetReligion.GetAdjective|l]их#! поселенців: вони допоможуть розвинути місцеву економіку та заодно асимілювати нову землю."
  flavor_brapru.27.historical_info: "Після придбання Сілезії в 1742 році прусська влада почала проводити політику заселення на той час переважно католицької та польськомовної Східної Сілезії німецькими протестантами. У 1773 році було видано указ, що стимулював подальше переселення німців до регіону."
  flavor_brapru.27.a: "Заохотимо [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]их поселенців осідати в Сілезії."
  flavor_brapru.27.b: "Вони відновляться й без нашої допомоги."
  STATIC_MODIFIER_NAME_PRU_settlers_in_silesia: "Нові поселенці-протестанти"
  BRA_move_away_from_prosperity_silesia_tt: "Кожен [Concept('owned', 'належний')|e] нам [Concept('location', 'місцевість')|e] у #TOOLTIP:AREA,silesia_area,X #L Сілезії#!#! на #r 25%#! віддаляється від [Concept('prosperity', 'процвітання')|e]."
  flavor_brapru.28.title: "Претензії на Королівську Пруссію"
  flavor_brapru.28.desc: "Коридор між #L [ROOT.GetCountry.GetAdjective|l]ою#! #TOOLTIP:AREA,pomerania_area,X #L Померанією#!#! та [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ою #TOOLTIP:AREA,prussia_area,X #L Пруссією#!#! став би важливою частиною нашої країни — будь він у наших руках. Сполучення між нашими територіями зараз ведеться або через кордони з іншими країнами, або за допомогою кораблів, а це значно послаблює нашу владу над Пруссією."
  flavor_brapru.28.a: "З'єднання територій — серйозне завдання."
  flavor_brapru.28.b: "Порушувати усталений порядок надто небезпечно."
  STATIC_MODIFIER_NAME_PRU_justifying_conquest_of_royal_prussia: "Виправдання завоювання Королівської Пруссії"
  flavor_brapru.29.title: "Розширення замку Тангермюнде"
  flavor_brapru.29.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] #L [ROOT.GetCountry.GetAdjective|l]их#! земель полюбляє Тангермюнде — там уже не перший рік розташовується [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] країни. Сьогодні, однак, будівля занепала і перетворилася на бліду подобу самої себе — так на ній позначилося зміщення наших інтересів на схід. Можливо, замок час відреставрувати."
  flavor_brapru.29.historical_info: "Замок Тангермюнде був побудований у X столітті в гирлі річки Ельби. Незабаром навколо нього утворилося місто Тангермюнде. У роки правління династії Асканіїв тут знаходилася одна з улюблених резиденцій бранденбурзьких маркграфів. У 1373 році до замку в'їхав новий маркграф та імператор Священної Римської Імперії Карл IV. За нього резиденція була значно розширена, перетворившись на #italic королівський пфальц#!."
  flavor_brapru.29.a: "Це варте вкладених коштів."
  flavor_brapru.29.b: "Не зараз — і тим більше не потім."
  STATIC_MODIFIER_NAME_PRU_secondary_capital_tangermunde: "Вторинна резиденція в Тангермюнде"
  flavor_brapru.30.title: "Прикордонна суперечка з [pomeranian_target.Custom('CL_INST')]"
  flavor_brapru.30.desc: "Протягом уже кількох десятиліть ми незмінно намагаємося встановити беззастережну владу над #TOOLTIP:AREA,pomerania_area,X #L Померанією#!#!, що лежить на півночі. Постійна боротьба за області та міста #TOOLTIP:PROVINCE_DEFINITION,uckermark_province,X #L Уккермарка#!#! та сутички в інших прикордонних місцевостях не приносять результатів — жодна сторона не може взяти гору. Однак наступного разу перемога неодмінно буде за нами. Можливість уже надалася: ми вступили в прикордонний конфлікт проти #ONCLICK:COUNTRY,[pomeranian_target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pomeranian_target.Custom('CL_tt')],X [pomeranian_target.Custom('CL_GEN')|L]#!#!."
  flavor_brapru.30.historical_info: "Прикордонні суперечки між померанськими Грейфами та бранденбурзькими маркграфами відбувалися часто й регулярно. Причиною багатовікового розбрату виступали як постійні спроби бранденбуржців зробити Померанію своїм васалом, так і спроби обох сторін встановити владу над прикордонними містами Пренцлау та Нейбранденбург у регіоні Уккермарк."
  flavor_brapru.30.a: "Натиснемо на них."
  flavor_brapru.30.b: "Війна нам не до лиця."
  STATIC_MODIFIER_NAME_PRU_fabrication: "Сфабрикована суперечка"
  flavor_brapru.31.title: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]: вселенські дискусії"
  flavor_brapru.31.desc: "Незгода з несправедливими діями #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви призвела до виникнення безлічі незалежних церков. Багато з них дотримуються або #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранських#!#!, або #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністських#!#! звичаїв. Оскільки в нашій країні широко представлена і та, і інша конфесія, [opposing_religion.GetAdjectiveWithNoTooltip|l]е [ShowEstateTypeName('clergy_estate')|l] почало закликати до примирення і навіть проведення Вселенських бесід з державною церквою, щоб не допустити ворожнечі між лютеранами та кальвіністами."
  flavor_brapru.31.historical_info: "У вересні 1662 року — травні 1663 року в Берліні відбулися релігійні зустрічі, присвячені зближенню лютеранської та кальвіністської церков та просуванню ідей екуменізму. Поштовхом до проведення цих зустрічей послужили дії курфюрста бранденбурзького Фрідріха Вільгельма — кальвініста, що правив переважно лютеранською країною."
  flavor_brapru.31.a: "Нехай радяться."
  flavor_brapru.31.b: "[ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] — єдина істинна віра."
  PRU_may_push_toleranzedikt_in_the_future_with_following_effects: "Завдяки цій [Concept('event', 'події')|e] ми в майбутньому зможемо прийняти указ про терпимість:"
  PRU_every_pop_of_other_protestant_denomination: "Кожна [Concept('pop', 'група населення')|e], що сповідує #L [opposing_religion.GetAdjective|l]у#! віру, отримує [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]."
  flavor_brapru.32.title: "Указ про терпимість"
  flavor_brapru.32.desc: "Вселенські бесіди між #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранами#!#! та #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністами#!#! можна навіть назвати успішними. Але, хоча протестантський світ став трохи ближчим до єднання, багато наших [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ого штибу все ще не готові терпіти тих, хто сповідує іншу віру. Прихильники [opposing_religion.GetAdjectiveWithNoTooltip|l]ої конфесії закликають нас прийняти указ про терпимість у надії, що гноблення їхньої віри буде заборонено законами [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_brapru.32.historical_info: "Шістнадцятого вересня 1664 року курфюрст бранденбурзький Фрідріх Вільгельм видав указ про терпимість, що забороняє взаємні нападки лютеранської та кальвіністської церков — на велике незадоволення традиційного лютеранського духовенства, обуреного втручанням курфюрста-кальвініста у справи державної церкви."
  flavor_brapru.32.a: "Видамо указ."
  flavor_brapru.32.b: "Не будемо звертати уваги на благання."
  STATIC_MODIFIER_NAME_PRU_toleranzedikt: "Указ про терпимість"
  flavor_brapru.33.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] з картоплею"
  flavor_brapru.33.desc: "#TOOLTIP:GOODS,potato,X #L Картопля#!#!, завезена до #TOOLTIP:CONTINENT,europe,X #L Європи#!#! з Нового Світу, поки ще мало кому здається корисною. Особливо дивуються [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], погано усвідомлюючи, що за допомогою картоплі можна ситно нагодувати голодний натовп. [target_ruler.GetName] пропонує сміливе рішення, здатне назавжди переконати впертий народ у користі нової рослини і, можливо, навіть покінчити з постійним голодом: засіяти картоплею поля, розташовані поруч із [ROOT.GetCountry.GetGovernment.GetAdjective|l]ими володіннями, і виставити охорону. Тим самим [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] сподівається розбудити в народі інтерес, адже заборонений плід завжди солодкий."
  flavor_brapru.33.a: "Нехай прагнуть картоплі."
  flavor_brapru.33.b: "Просто безумство!"
  flavor_brapru.33.historical_info: "Прусський король XVIII століття Фрідріх II Великий на батьківщині запам'ятався ще й як #italic der Kartoffelkönig#! — «картопляний король». Саме завдяки Фрідріху картопля набула в Німеччині широкого поширення: за легендами, король наказав засіяти королівські поля насінням картоплі та виставити поруч солдатів, які мали не стільки охороняти посіви, скільки створювати враження, що на полі вирощується щось цінне. Селяни, припустивши, що вирощувані під королівською охороною плоди неймовірно рідкісні та цінні, почали ночами красти з полів бульби та садити їх у себе, тим самим сприяючи поширенню коренеплоду по всій Пруссії."
  flavor_brapru.34.title: "Планові поселення"
  flavor_brapru.34.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] сьогодні розглядає сміливий задум із заселення малонаселених земель #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Керувати цим планом, що отримав назву #TOOLTIP:GOVERNMENT_REFORM,peuplierung_system,X #L «Пойплірунг»#!#!, буде [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]. За їхніми уявленнями, майбутніх переселенців мають привабити щедрі умови: релігійна свобода, звільнення від сплати податків і навіть державна підтримка тих, хто вирішить переселитися самостійно, насамперед — досвідчених робітників-іноземців та гнаних релігійних громад."
  flavor_brapru.34.a: "Нехай приходять!"
  flavor_brapru.34.b: "Тоді ослабне наша влада."
  flavor_brapru.34.historical_info: "#italic Peuplierung#! («заселення переселенцями» або «колонізація») — політика заселення Пруссії XVII–XVIII століть, що проводилася з ініціативи корони та була спрямована на повторне заселення постраждалих від війни та епідемій земель іммігрантами, яким пропонувалися певні пільги. Відомий вислів Фрідріха Великого: «всі релігії рівні та хороші, якщо їхні прихильники є чесними людьми»."
  flavor_brapru.35.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] диктує останню волю"
  flavor_brapru.35.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не може підібрати слів: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], будучи вже в похилих роках, [Select_CString(target_ruler.IsFemale, 'склала', 'склав' )] заповіт, своїм змістом вразивши всіх до єдиного. [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'заявила', 'заявив' )], що престол має успадкувати [Select_CString(target_ruler.IsFemale, 'її', 'його' )] молодший син [favorite_child.GetName]. Таке рішення йде врозріз із усталеною традицією первородства, проте в заповіті [target_ruler.GetName] стверджує, що [target_heir.GetName] не має чеснот правителя, тоді як [favorite_child.GetNameWithNoTooltip] відрізняється мудрістю та помірним норовом. Багато хто побоюється, що якщо все піде згідно із заповітом, #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знать#!#! нашої країни сильно обуриться."
  flavor_brapru.35.a: "Поставимося з повагою до [Select_CString(target_ruler.IsFemale, 'її', 'його' )] рішення."
  flavor_brapru.35.b: "Це порушує закони престолонаслідування!"
  flavor_brapru.35.historical_info: "Фрідріх I — перший представник династії Гогенцоллернів серед бранденбурзьких курфюрстів — викликав фурор своїм скандальним заповітом, у якому замість первістка призначив спадкоємцем престолу другого сина — Фрідріха II. Це рішення порушувало давно встановлений принцип первородства, згідно з яким усі титули та землі відходили старшому спадкоємцю чоловічої статі."
  flavor_brapru.36.title: "Боротьба з чумою"
  flavor_brapru.36.desc: "Схоже, ми нарешті знайшли засіб від старої напасті — спалахів чуми, що постійно розоряють #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!: нам надійшла пропозиція заснувати карантинний пункт за стінами #TOOLTIP:LOCATION,berlin,X #L Берліна#!#!. Шляхетну справу протистояння чумі та іншим хворобам за допомогою науки візьме на себе #TOOLTIP:BUILDING_TYPE,charite_of_berlin,X #L Шаріте#!#!."
  flavor_brapru.36.a: "Схвалимо пропозицію."
  flavor_brapru.36.b: "Нам це не по кишені."
  flavor_brapru.36.historical_info: "Клініка «Шаріте», заснована 1709 року за указом прусського короля Фрідріха I, спочатку замислювалася як лазарет для жертв регулярних на той час спалахів чуми та розташовувалася за стінами Берліна. Незабаром «Шаріте» була перетворена на звичайну лікарню і з часом стала однією з провідних університетських клінік Європи. Тут навчалися найвідоміші лікарі, патологи та вчені Німеччини."
  flavor_brapru.37.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.37.desc: "У мові жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! все частіше звучить нове гучне ім'я: [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Ця вчена', 'Цей вчений' )] — людина, що відрізняється неабияким інтелектом і невичерпною допитливістю — колись [Select_CString(target_character.IsFemale, 'вивчилася', 'вивчився' )] на гірничого інженера, але [Select_CString(target_character.IsFemale, 'їй', 'йому' )] набагато цікавіше досліджувати світ і вивчати географію та природу. Нещодавно [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'запропонувала', 'запропонував' )] спорядити експедицію в далекі країни, щоб найретельнішим чином описати різновиди світових екосистем і кліматів — їх [Select_CString(target_character.IsFemale, 'вона', 'він' )] вважає єдиною взаємопов'язаною системою. Єдине, що [Select_CString(target_character.IsFemale, 'її', 'його' )] зупиняє, — це нестача коштів."
  flavor_brapru.37.a: "Виділимо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] гроші на експедицію!"
  flavor_brapru.37.b: "Нехай [Select_CString(target_character.IsFemale, 'її', 'його' )] потяг до мандрів оплачують приватні особи."
  flavor_brapru.37.historical_info: "Александр фон Гумбольдт — ерудит, географ, ботанік, геолог і один із першопрохідців у галузі екології. Експедиція фон Гумбольдта до Латинської Америки, що тривала п'ять років, перевернула загальносвітові уявлення про кліматичні зони, взаємини екосистем та геологію. Великі праці вченого заклали сучасні основи екологічної науки."
  flavor_brapru.38.title: "[target_character.GetNameWithNoTooltip] і $humboldts_cosmos$"
  flavor_brapru.38.desc: "Після довгих десятиліть, проведених за науковими роботами, дослідженнями та листуваннями з найвидатнішими умами свого часу, [target_character.GetName] [Select_CString(target_character.IsFemale, 'взялася', 'взявся' )] за написання багатотомної збірки своїх розвідок. Перед [Select_CString(target_character.IsFemale, 'нею', 'ним' )] стоїть надскладне завдання: звести воєдино всі відомі види природничих наук. [target_character.GetName] побоюється, що подібна праця займе ще кілька десятиліть, і прочитати її зможуть вже тільки [Select_CString(target_character.IsFemale, 'її', 'його' )] нащадки."
  flavor_brapru.38.a: "Ми вже й так достатньо [Select_CString(target_character.IsFemale, 'її', 'його' )] підтримуємо."
  flavor_brapru.38.b: "Зробимо все, що можемо, щоб допомогти [Select_CString(target_character.IsFemale, 'їй', 'йому' )]."
  flavor_brapru.38.historical_info: "У 1828 році Гумбольдт вирішив викласти свої спостереження та погляди у трактаті, що згодом отримав назву #italic «Космос»#!. Вчений був уже немолодий, а тому боявся, що помре раніше, ніж доведе працю до кінця. Так і сталося: на написання «Космосу» пішло 25 років, і Гумбольдт уже не дожив до його видання. Проте, трактат здійснив справжню революцію в науковому світі та надихнув цілі покоління вчених (серед яких був і Дарвін), а також посприяв становленню географії та природознавства як сучасних наукових дисциплін."
  flavor_brapru.39.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.39.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'видатна мислителька, яка прославилася', 'видатний мислитель, який прославився' )] своїм неприйняттям глибоко вкоріненого дуалізму сучасної філософської думки. Натомість [target_character.GetLastNameWithNoTooltip] пропонує власну філософію іманентності, засновану на досвіді та розумі, де протистояння — не ознака невдач, але головна рушійна сила, що забезпечує розвиток. Філософ стверджує, що свобода і розум не дані людині, але відвойовуються нею в ході історичного процесу."
  flavor_brapru.39.a: "Будемо дотримуватися [Select_CString(target_character.IsFemale, 'її', 'його' )] думки!"
  flavor_brapru.39.b: "Подібні абстракції марні у справі управління країною."
  flavor_brapru.39.historical_info: "Георг Вільгельм Фрідріх Гегель — видатний представник німецького ідеалізму, що боровся з хибними дихотоміями сучасної йому філософії, до яких він відносив протиріччя між розумом та емоціями, свободою та зобов'язаннями або розумом та тілом. Гегель вважав, що істина народжується в результаті іманентної критики самих ідей, а не з передумов, нав'язаних ззовні. Філософія Гегеля сильно вплинула на наступне покоління мислителів, що надихалися теоріями свого попередника."
  flavor_brapru.40.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.40.desc: "У світі мистецтва з'явилося нове яскраве ім'я — [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] роботи, що поєднують у собі пишність бароко та дух #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#!, підкорили серця сотень тисяч жителів #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Попри труднощі та упередження, [target_character.GetName] [Select_CString(target_character.IsFemale, 'зуміла', 'зумів' )] домогтися того, щоб [Select_CString(target_character.IsFemale, 'її', 'його' )] прийняли до найпрестижніших закладів. Сьогодні [Select_CString(target_character.IsFemale, 'вона', 'він' )] хоче повернутися до #TOOLTIP:LOCATION,berlin,X #L Берліна#!#! і творити при нашому дворі."
  flavor_brapru.40.a: "Наймемо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_brapru.40.b: "Жінкам не місце в мистецтві."
  flavor_brapru.40.historical_info: "Анна Доротея Тербуш — художниця, яка зуміла подолати жорсткі професійні та гендерні бар'єри свого часу і стати однією з найвідоміших портретисток покоління. Тербуш, яка виросла в добу недоступності для жінок професійного навчання, була членом паризької Королівської академії живопису та скульптури, а згодом писала портрети діячів Просвітництва та знатних осіб. Після повернення до Пруссії стала особистою портретисткою короля Фрідріха Великого, а також брала участь у прикрашанні його палацу Сан-Сусі."
  flavor_brapru.41.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.41.desc: "[target_character.GetName] — мислитель, [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] своїм логічним, майже математичним підходом до систематизації знань найрізноманітнішого ґатунку — богословського, етичного, політичного і навіть метафізичного. І хоча нині ця людина вигнана з країни, оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] не погоджувалися з [Select_CString(target_character.IsFemale, 'її', 'його' )] ідеями, можливо, слід подумати про те, щоб відновити [Select_CString(target_character.IsFemale, 'її', 'його' )] репутацію: від наявності в країні подібного світлого розуму виграють і бюрократи, і законознавці, і навіть особисто [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
  flavor_brapru.41.a: "Реабілітуємо [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  flavor_brapru.41.b: "[Select_CString(target_character.IsFemale, 'Її', 'Його' )] погляди надто скандальні."
  flavor_brapru.41.historical_info: "Християн Вольф — один з найважливіших діячів німецької філософії доби Просвітництва, відомий своєю енциклопедичною освіченістю та прихильністю до раціоналістичного методу. Вольф прагнув підходити до пізнання з точки зору розуму, що неодноразово викликало сильне незадоволення у релігійних властей. Проте, за Фрідріха Великого добре ім'я філософа було відновлено, і Вольф став однією з опор прусського інтелектуального життя. Його ідеї значно вплинули на прусських королів — людей, що цінували раціональний підхід до управління країною."
  flavor_brapru.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.42.desc: "Серед наших офіцерів [target_character.GetName] [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] як талановитий і видатний полководець, без якого неможливі були б нещодавні славні перемоги. Одна лише [Select_CString(target_character.IsFemale, 'її', 'його' )] присутність на полі бою наповнює серця наших солдатів хоробрістю, а заразом слугує нагадуванням, що сила #L [ROOT.GetCountry.GetAdjective|l]ої#! зброї — досягнення не тільки одних лише правителів. Нам навіть надійшла пропозиція підвищити цю людину до генерала, щоб військо могло воювати ще краще."
  flavor_brapru.42.a: "Підвищимо [Select_CString(target_character.IsFemale, 'її', 'його' )] до генерала."
  flavor_brapru.42.b: "Нам це не потрібно."
  flavor_brapru.42.historical_info: "Курт фон Шверін — прусський полководець, який служив до призначення фельдмаршалом в військах кількох європейських країн. У битві при Мольвіці своїми вмілими діями врятував військо юного короля Фрідріха Великого від розгрому. Служба його закінчилася під Прагою, де вірний і непохитний перед лицем небезпеки Шверін отримав смертельне поранення, намагаючись особисто надихнути солдатів. Загальновизнано вважається одним з найздібніших воєначальників Фрідріха Великого."
  flavor_brapru.43.title: "[target_character.GetNameWithNoTooltip]"
  flavor_brapru.43.desc: "За останні кілька років вигляд #TOOLTIP:LOCATION,berlin,X #L Берліна#!#! помітно перетворив архітектор на ім'я [target_character.GetName] — людина зі сміливим поглядом на майбутнє та великим талантом у галузі не тільки архітектури, а й скульптури. У [Select_CString(target_character.IsFemale, 'її', 'його' )] роботах велич бароко переплітається з військовим символізмом, стаючи дзеркалом величі країни. Немає такої споруди, яку [target_character.GetName] не [Select_CString(target_character.IsFemale, 'змогла', 'зміг' )] би перетворити на монумент нашій могутності. Багато хто навіть пропонує призначити [Select_CString(target_character.IsFemale, 'її', 'його' )] придворним архітектором, який визначатиме вигляд вже не тільки окремо взятого міста, а #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! цілком."
  flavor_brapru.43.a: "Наймемо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_brapru.43.b: "Художні примхи нам не по кишені."
  flavor_brapru.43.historical_info: "Андреас Шлютер — придворний скульптор і королівський архітектор, який перетворив Берлін на символ прусської могутності. Берлінський Цейхгауз він прикрасив скульптурами героїв війни, а Королівський палац під керівництвом Шлютера став розкішною резиденцією, гідною найвеличніших монархів Європи."
  flavor_brapru.1000.title: "[GetCountry('TEU').GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] з [GetCountry('TEU').Custom('longname_ru_wntt_GEN')]"
  flavor_brapru.1000.desc: "[GetCountry('TEU').GetLongName] — ця країна здавна має для нас особливу важливість, ще з тих пір, як більшість населення #TOOLTIP:AREA,prussia_area,X #L Пруссії#!#! стало #TOOLTIP:CULTUREGROUP,german_group,X #L германським#!#!. Завдяки тому, що [ROOT.GetCountry.GetLongName] перебуває під нашою владою, династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] змогла зайняти престоли й інших #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн. Серед них і [GetCountry('TEU').GetLongNameWithNoTooltip], де владу тримає [target_character.GetName]. У нас є можливість завдяки деякому тиску вбудувати їх глибше в структуру управління головним володінням нашої династії — це [ROOT.GetCountry.GetLongNameWithNoTooltip]. Однак такий крок може викликати нездоровий інтерес інших країн, що задивляються на #TOOLTIP:REGION,poland_region,X #L польські#!#! землі, і тоді ми станемо для них здобиччю."
  flavor_brapru.1000.a: "Схилити їх ближче до себе!"
  flavor_brapru.1000.b: "Зосередимося на інших справах."
  flavor_brapru.1000.historical_info: "У 1618 році герцогство Пруссія успадкував курфюрст бранденбурзький Йоганн Сигізмунд. Цьому передували часткова секуляризація земель Тевтонського ордену з боку молодшої гілки Гогенцоллернів у 1525 році та надання бранденбурзькій гілці прав на спадкування у 1563 році. Усі ці події призвели до створення у 1701 році королівства Пруссія."
  flavor_brapru.1001.title: "[GetCountry('BRA').GetNameWithNoTooltip] приборкує нас"
  flavor_brapru.1001.desc: "Оскільки нами править та ж династія, що й #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_INST')|L]#!#!, її представники вирішили скористатися своєю владою над нами та схилити нас ближче до оплоту своєї династії — [GetCountry('BRA').GetCapital.Custom('LR_DAT')|l] [GetCountry('BRA').GetCapital.GetName]. Через це змінилася розстановка сил, і наші піддані оголосили про свою незалежність. Доки [GetCountry('BRA').GetCapital.GetRank.GetNameWithNoTooltip|l] [GetCountry('BRA').GetCapital.GetNameWithNoTooltip] не дасть схвалення, ми безсилі щось зробити."
  flavor_brapru.1001.a: "Сумно."
  flavor_brapru.1100.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] та нова резиденція"
  flavor_brapru.1100.desc: "Наша столиця #TOOLTIP:LOCATION,berlin,X #L Берлін#!#! заслуговує на те, щоб тут розмістилася резиденція, користуватися якою не погребує особисто [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]! Крім того, з палацу в центрі міста буде набагато зручніше керувати [ROOT.GetCountry.Custom('rank_ru_INST')|l] та поступово позбавляти впливу представників місцевих станів. Однак таке будівництво не сподобається багатьом берлінцям, тому ми ризикуємо накликати на себе народний гнів."
  flavor_brapru.1100.a: "Збудуємо палац."
  flavor_brapru.1100.b: "Не будемо злити народ."
  flavor_brapru.1101.title: "Берлінське невдоволення"
  flavor_brapru.1101.desc: "Як ми й побоювалися, жителі #TOOLTIP:LOCATION,berlin,X #L Берліна#!#! виступили проти нас і вимагають збереження своїх привілеїв, незважаючи на дароване нам Богом право панувати над містом. Нам доведеться або піти їм наперекір, або поступитися та зберегти чинні привілеї."
  flavor_brapru.1101.a: "Не будемо звертати уваги на натовп."
  flavor_brapru.1101.b: "Спробуємо домовитися з народом."
  flavor_brapru.1200.title: "Правова реформа"
  flavor_brapru.1200.desc: "Запорука виживання нашої країни — у вмінні пристосовуватися до змін. Зараз на її благо працює, не покладаючи рук, [target_character.GetName] — голова #italic камерального суду#!, людина, здатна очолити проведення таких необхідних реформ у правовій системі. Плани його зачіпають #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! цілком, і якщо підтримати його в цьому починанні, реформи будуть швидкими та суттєвими."
  flavor_brapru.1200.a: "Підтримати реформи!"
  flavor_brapru.1200.b: "Приструнимо його."
  flavor_brapru.1201.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]а правова система"
  flavor_brapru.1201.desc: "Відтоді, як [target_character.GetName] всерйоз взявся за правову систему, вона зазнала значних змін. Тепер їх необхідно закріпити на законодавчому рівні, склавши звід законів — ним керуватимуться всі наші нащадки, які правлять #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!. Усіх наших підданих судитимуть однаково чесно — більше не буде зловживань та порушень на місцях, таких звичних сьогодні."
  flavor_brapru.1201.a: "Негайно встановити звід законів!"
  flavor_brapru.1201.b: "Потрібно буде як слід над цим подумати."
  flavor_brapru.1300.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] кар'єрне зростання"
  flavor_brapru.1300.desc: "Нам стало відомо, що в наших військах служить вельми вправна людина на ім'я [target_character.GetName], яка зуміла вразити командирів глибокими знаннями в теорії військової справи. Якщо взяти її на службу, вона принесе чимало користі і раді, і війську загалом."
  flavor_brapru.1300.a: "Наймемо його."
  flavor_brapru.1300.historical_info: "Карл фон Клаузевіц народився в родині, яка зараховувала себе до представників баронства прусської провінції Магдебург. Був четвертим сином у сім'ї та у 12 років вступив юнкером на службу до пруського війська. У 1801 році, після участі в Рейнському поході та вторгненні до Франції під час Французьких революційних війн, Клаузевіц вступив до Пруської військової академії в Берліні, де вивчав праці таких філософів, як Іммануїл Кант та Йоганн Готліб Фіхте, а також познайомився з генералом Герхардом фон Шарнхорстом — майбутнім реформатором пруського війська (не без допомоги Клаузевіца). Після початку Наполеонівських війн Клаузевіц залишив пруську службу та вступив до Російсько-німецького легіону, що боровся проти Бонапарта, але через деякий час повернувся на батьківщину. Після поразки французьких військ при Ватерлоо Клаузевіц очолив військову академію, а під час Польського повстання 1830 року отримав призначення на посаду начальника штабу."
  flavor_brapru.1301.title: "[target_character.GetNameWithNoTooltip] та його праці"
  flavor_brapru.1301.desc: "На службі у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [target_character.GetName] написав цінний трактат, з яким ми тепер можемо ознайомитися, — «Про війну». У ньому він виклав свої знання, отримані в боях, та спостереження за бойовими діями, а також описав основні принципи будь-якої війни."
  flavor_brapru.1301.a: "Вивчити його!"
  flavor_brapru.1400.title: "Без жодних турбот"
  flavor_brapru.1400.desc: "[ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] поступово починає віддаватися піднесеним задоволенням: філософії, мистецтву та музиці. Навіть [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] власною персоною нерідко розважає гостей музикою свого твору.\nОднак [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetName], де розташований вічно зайнятий двір, погано підходить для подібних розваг — цьому заважає необхідність щодня приймати державні рішення. Нам потрібна окрема літня резиденція sans souci — «без турбот» — де можна буде на час забути про божевільне придворне життя, яким так сумно славиться [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]. [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Наша правителька', 'Наш правитель' )] вже особисто [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'доручила', 'доручив' )] архітектору на ім'я [target_artist.GetName] скласти начерки нової резиденції — скромної одноповерхової споруди, оточеної розкішним садом."
  flavor_brapru.1400.a: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] хоче Сан-Сусі — буде [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'їй', 'йому' )] Сан-Сусі."
  flavor_brapru.1400.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не потребує іншої резиденції; у [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'неї', 'нього' )] є [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_brapru.1401.title: "Палац Сан-Сусі"
  flavor_brapru.1401.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] не може натішитися: літній палац збудований в точності так, як і [Select_CString(target_character.IsFemale, 'задумувала', 'задумував' )] [target_character.GetName]. Усі літні дні [target_character.GetNameWithNoTooltip] тепер збирається проводити у своїй новій резиденції, приймаючи у себе найвидатніших мислителів нашої доби та ведучи з ними політичні й філософські дискусії — якщо, зрозуміло, важливі державні справи не вимагатимуть [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] особистої присутності. Вищі верстви #L [ROOT.GetCountry.GetAdjective|l]ого#! суспільства вельми вражені новим палацом і з радістю провели б час в околицях провінції [potsdam_province.GetName]."
  flavor_brapru.1401.a: "Тут віднині розвиватиметься культура [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_brapru.1401.historical_info: "Сан-Сусі — палац прусського короля Фрідріха Великого в стилі фридериціанського рококо, збудований у 1745–1747 роках. З палацу на вершині пагорба, вкритого виноградниками, відкривається чудовий краєвид на Потсдам та його околиці. Порівняно з Версалем або Петергофом Сан-Сусі відносно скромний: у цьому одноповерховому будинку розмістилося всього 10 кімнат, включно з приміщеннями для прислуги. Втім, Фрідріху була потрібна не пишність, а затишний будинок, де можна було б проводити час з квітня по жовтень, віддаючись усамітненню. #italic «Маленький виноградний будиночок»#!, як називав його король, був дуже дорогий Фрідріху. Після його смерті у віці 74 років, що настала в кабінеті в Сан-Сусі, настала доба неокласицизму, і старий палац виявився майже забутий."
  flavor_brapru.1500.title: "Канали до провінції [berlin_province.GetNameWithNoTooltip]"
  flavor_brapru.1500.desc: "Річка Шпрее пов'язує нас із заходом за допомогою торгових маршрутів, що йдуть до Гафеля та Ельби. На схід же знаходиться не менш важливий транспортний шлях — річка Одер. Однак, оскільки гирло Одера в Штеттіні належить не нам, а господарям цієї місцевості, вся торгівля зі сходом залежить виключно від їхньої волі — і мита, які змушені платити наші #TOOLTIP:POPTYPE,burghers,X #L міщани#!#!. Якщо з'єднати Одер і Шпрее, проривши між ними канал, ми зможемо діяти вільніше за будь-яких обставин, — як, втім, і наші міщани."
  flavor_brapru.1500.a: "Побудувати канал!"
  flavor_brapru.1500.b: "Достатньо лише розвивати місцеву інфраструктуру."
  flavor_brapru.1500.c: "Обійдемося без витрат."
  flavor_brapru.1501.title: "Канал Одер — Шпрее приносить процвітання"
  flavor_brapru.1501.desc: "Ми побудували канал, що з'єднує річки Одер і Шпрее! [ROOT.GetCountry.GetGovernment.GetRulerTitle] не кидає слів на вітер: після урочистого відкриття каналу економіка #TOOLTIP:LOCATION,berlin,X #L Берліна#!#! та #TOOLTIP:LOCATION,lebus,X #L Лебуса#!#! дійсно пішла на підйом. Успіх, який це починання принесло #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!, не можна назвати інакше, як вражаючим."
  flavor_brapru.1501.a: "Хай живе [target_character.GetNameWithNoTooltip] та відкритий [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нею', 'ним' )] канал!"
  flavor_brapru.1600.title: "Фінансові привілеї Кредитверка"
  flavor_brapru.1600.desc: "[ROOT.GetCountry.GetLongName] у скрутному фінансовому становищі. Наша скарбниця майже виснажилася, і незрозуміло, як діяти далі. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] висунули нам пропозицію: якщо ми наділимо їх ширшими правами щодо королівських фінансів, вони нададуть нам допомогу в годину нужди. Однак якщо ми підемо їм назустріч, [target_character.GetName] лише сильніше залежатиме від примх, які висловлюють [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] [ROOT.GetCountry.Custom('CL_GEN')]. Зараз вибору в нас немає — залишається лише поступитися, однак у майбутньому слід подумати про те, як обмежити повноваження Кредитверка."
  flavor_brapru.1600.a: "Наділимо Кредитверк новими привілеями."
  flavor_brapru.1601.title: "Банкрутство Кредитверка"
  flavor_brapru.1601.desc: "Незважаючи на новонабуті повноваження, Кредитверк не зумів гідно розпорядитися нашими фінансами, і його заборгованість вже вражає уяву. Оскільки банкрутство Кредитверка неминуче, нам необхідно вирішити, яке майбутнє його чекає. Думки радників розділилися: деякі радять перетворити Кредитверк і віддати його під безпосереднє управління корони, інші ж радять і зовсім скасувати цю установу."
  flavor_brapru.1601.a: "Реформуємо Кредитверк і віддамо його короні."
  flavor_brapru.1601.b: "Кредитверк — зло. Позбудемося його."
  flavor_brapru.1601.c: "Викупимо його та дозволимо продовжувати діяльність."
  flavor_brapru_teu.1.title: "Продаж провінції Ноймарк"
  flavor_brapru_teu.1.desc: "Наші східні володіння в #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарку#!#! надто далеко, щоб ними можна було повноцінно керувати зі столиці. Зараз там безчинствують барони-розбійники, тому, можливо, провінцію слід закласти, віддавши її комусь іншому — заслуговуючим на довіру людям, яких не цікавлять наші території."
  flavor_brapru_teu.1.historical_info: "У 1402 році провінцію Ноймарк, що постійно страждала від свавілля баронів-розбійників, заклали Тевтонському ордену в надії, що лицарі зможуть покласти край розгулу злочинності. Однак тевтонці не впоралися з цим завданням, і провінція продовжувала бідувати до продажу її назад курфюрстам бранденбурзьким у середині XV століття."
  flavor_brapru_teu.1.a: "Нехай її отримають власті [GetCountry('TEU').Custom('CL_GEN')]."
  flavor_brapru_teu.1.b: "Розберемося з ними своїми силами."
  TEU_pawn_neumark_to_teutons: "Ми запропонуємо #ONCLICK:COUNTRY,[GetCountry('TEU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TEU').Custom('CL_tt')],X [GetCountry('TEU').Custom('CL_DAT')|L]#!#! наступні місцевості. Якщо вони погодяться:"
  STATIC_MODIFIER_NAME_PRU_crime_ridden: "Наводнена злочинцями місцевість"
  TEU_rejected_sale: "Відхилили пропозицію про купівлю"
  flavor_brapru_teu.2.title: "$flavor_brapru_teu.1.title$"
  flavor_brapru_teu.2.desc: "[teu_from.GetLongName] безперечно не в силах розібратися зі свавіллям баронів-розбійників у східній провінції #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарк#!#!, а тому в спробі уникнути відповідальності пропону[teu_from.Custom('endlong_etyut')] нам перекупити цю провінцію за солідну суму в золоті."
  flavor_brapru_teu.2.historical_info: "$flavor_brapru_teu.1.historical_info$"
  flavor_brapru_teu.2.a: "Ми згодні."
  flavor_brapru_teu.2.b: "Ми не будемо брати на себе їхні турботи."
  flavor_brapru_teu.3.title: "Доля Ноймарка"
  flavor_brapru_teu.3.desc: "Після того, як ми купили #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарк#!#!, минуло вже чимало років, однак викорінити біди в цій провінції так і не вдалося. Втім, деяку користь Ноймарк все-таки приносить: тут збираються найманці, що прибувають із заходу."
  flavor_brapru_teu.3.historical_info: "У 1402 році провінцію Ноймарк, що постійно страждала від свавілля баронів-розбійників, бранденбурзькі курфюрсти заклали Тевтонському ордену. Однак усунути пануючу в Ноймарку бідність не вдалося навіть лицарям, тому великий магістр ордену спочатку спробував продати провінцію Польщі, а потім, вже в 1455 році, все-таки зумів продати її назад Бранденбургу в рамках договорів у Кьольні та Меве."
  flavor_brapru_teu.3.a: "Можливо, варто продати ці землі назад [GetCountry('BRA').Custom('CL_DAT')]."
  flavor_brapru_teu.3.b: "Або, можливо, краще [GetCountry('POL').Custom('CL_DAT')]."
  flavor_brapru_teu.3.c: "Що наше, те наше."
  TEU_sell_neumark_back_to_brandenburg: "Ми запропонуємо #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_DAT')|L]#!#! наступні місцевості. Якщо вони погодяться:"
  TEU_sell_neumark_back_to_poland: "Ми запропонуємо #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_DAT')|L]#!#! наступні місцевості. Якщо вони погодяться:"
  flavor_brapru_teu.4.title: "Договір у Кьольні"
  flavor_brapru_teu.4.desc: "Кілька десятиліть тому ми продали #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарк#!#! #ONCLICK:COUNTRY,[teu_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[teu_from.Custom('CL_tt')],X [teu_from.Custom('CL_DAT')|L]#!#! в надії покінчити зі свавіллям місцевих баронів-розбійників, які підривали наше добре ім'я та створювали суцільні труднощі. Однак [teu_from.GetAdjectiveWithNoTooltip|l]а влада не тільки не впоралася з цією бідою — вона зробила провінцію ще біднішою, а тепер, остаточно розлучившись з надіями будь-як зміцнити свій оголений фланг, вона пропонує нам викупити цю землю."
  flavor_brapru_teu.4.desc_other: "[teu_from.GetLongName] — ці власті роблять нам несподівану пропозицію викупити у них #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарк#!#!. Над цим слід подумати."
  flavor_brapru_teu.4.historical_info: "$flavor_brapru_teu.3.historical_info$"
  flavor_brapru_teu.4.a: "Вражаюча безпорадність… Ми згодні."
  flavor_brapru_teu.4.b: "Дешевше буде її завоювати."
  flavor_brapru_teu.4.c: "Там усе ще бешкетують барони-розбійники!"
  flavor_brapru_teu.5.title: "Нашу пропозицію відхилено"
  flavor_brapru_teu.5.desc: "Нашу найщедрішу пропозицію купити в нас провінцію #TOOLTIP:PROVINCE_DEFINITION,neumark_province,X #L Ноймарк#!#! відхилили. Тепер, на жаль, доведеться нам і далі миритися з чималими витратами на її утримання."
  flavor_brapru_teu.5.a: "Дуже погано."
  flavor_brapru.1800.title: "Біда на престолі"
  flavor_brapru.1800.desc: "У тронному залі #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#! останнім часом панує повний безлад. І [pru_from.GetGovernment.GetRulerTitle|l], і [Select_CString(our_ruler.IsFemale, 'її', 'його' )] придворні своїми непродуманими рішеннями призвели країну до катастрофи та загрози розпаду. Стани [pru_from.Custom('CL_GEN')] вже почали придивлятися собі іноземних кандидатів, серед яких і [target_character.GetNameWithNoTooltip]."
  flavor_brapru.1800.a: "Дійсно, нехай нами править [target_character.GetNameWithNoTooltip]."
  flavor_brapru.1800.b: "Невдоволення згодом вщухне."
  BRA_dynastic_connections: "Династичні узи"
  flavor_brapru.1801.title: "[target_character.GetDynasty.GetNameWithNoTooltip] на [pru_from.GetAdjectiveWithNoTooltip|l]ому престолі"
  flavor_brapru.1801.desc: "На троні #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#! сьогодні сидить виходець із династії [target_character.GetDynasty.GetName]. Можливо, в майбутньому це принесе нам певну вигоду — все-таки наші доми добре ставляться один до одного."
  flavor_brapru.1801.a: "Це вельми цікаво."
  PRU_information_about_event_chain: "У майбутньому ми зможемо утворити [Concept('union', 'унію')|e] з владою #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#!."
  flavor_brapru.1802.title: "[insane_individual.GetNameWithNoTooltip] остаточно втрачає розум"
  flavor_brapru.1802.desc: "Управління країною неминуче пов'язане з величезними труднощами, і далеко не кожен правитель здатен гідно з ними впоратися, яким би відважним він не був. [insane_individual.GetName] не [Select_CString(insane_individual.IsFemale, 'впоралася', 'впорався' )]: розум починає підводити [Select_CString(insane_individual.IsFemale, 'її', 'його' )]. І [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] майже цілком, і стани оголосили [Select_CString(insane_individual.IsFemale, 'її нездатною', 'його нездатним' )] правити."
  flavor_brapru.1802.a: "Нам допоможе тільки [proposed_regent.GetNameWithNoTooltip]."
  flavor_brapru.1803.title: "$flavor_brapru.1802.title$"
  flavor_brapru.1803.desc: "Наш підданий із #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#! повідомив, що в його країні розгортається справжня біда: [insane_individual.GetName] [Select_CString(insane_individual.IsFemale, 'втратила', 'втратив' )] розум, і тепер країною ніхто не керує. На допомогу їм прийти може тільки їх [Select_CString(proposed_regent.IsFemale, 'родичка', 'родич' )] [proposed_regent.GetName]. Якщо [proposed_regent.GetNameWithNoTooltip] стане регентом, то утвориться особиста унія, і тоді труднощі почнуться вже в нас. Ми можемо нав'язати їм власноруч обраного регента, однак народ [pru_from.Custom('CL_GEN')] напевно обуриться такому підходу."
  flavor_brapru.1803.a: "Не будемо звертати уваги."
  flavor_brapru.1803.b: "[proposed_regent_of_poland.GetNameWithNoTooltip] впорається набагато краще."
  flavor_brapru.1804.title: "Влада в [pru_from.Custom('CL_PREP')]"
  flavor_brapru.1804.desc: "[proposed_regent.GetName] [Select_CString(proposed_regent.IsFemale, 'прибула', 'прибув' )] до столиці #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#! — [pru_from.GetCapital.Custom('LR_ACC')|l] [pru_from.GetCapital.GetName]. Після урочистої церемонії [Select_CString(proposed_regent.IsFemale, 'новоприбулу', 'новоприбулого' )] оголосили регентом. Це, по суті, означає, що [ROOT.GetCountry.GetName] і [pru_from.GetNameWithNoTooltip] уклали між собою особисту унію. [pru_from.GetDiplomacy.GetOverlord.GetLongName] — щоб ці землі підкорилися новій владі, [proposed_regent.GetNameWithNoTooltip] [Select_CString(proposed_regent.IsFemale, 'повинна', 'повинен' )] присягнути їм на вірність."
  flavor_brapru.1804.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  PRU_we_have_formed_personal_union_with_PRU_subject: "Ми уклали [Concept('union', 'унію')|e] з владою #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#!."
  flavor_brapru.1805.title: "[intervening_tag.GetAdjectiveWithNoTooltip]е втручання"
  flavor_brapru.1805.desc: "Наші сюзерени з #ONCLICK:COUNTRY,[intervening_tag.Custom('CL_tt')] #TOOLTIP:COUNTRY,[intervening_tag.Custom('CL_tt')],X [intervening_tag.Custom('CL_GEN')|L]#!#! звернули увагу, що у світлі наших бід сюди [Select_CString(proposed_regent.IsFemale, 'була запрошена', 'був запрошений' )] [proposed_regent.GetName]. Підкресливши, що призначення регентів — це їх невід'ємне право, вони відправили нам зовсім іншу людину. [ROOT.GetCountry.GetLongName] і [proposed_regent_of_poland.GetShortName] — не найкраще поєднання на думку жителів цієї країни…"
  flavor_brapru.1805.a: "Це просто катастрофа!"
  PRU_poland_enforced_regent: "З волі #ONCLICK:COUNTRY,[intervening_tag.Custom('CL_tt')] #TOOLTIP:COUNTRY,[intervening_tag.Custom('CL_tt')],X [intervening_tag.Custom('CL_GEN')|L]#!#!#ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_INST')|L]#!#! править їхній регент. [Concept('union', 'Унія')|e] з владою #ONCLICK:COUNTRY,[pru_from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[pru_from.Custom('CL_tt')],X [pru_from.Custom('CL_GEN')|L]#!#! неможлива."
  flavor_brapru.1806.title: "$flavor_brapru.1805.title$"
  flavor_brapru.1806.desc: "#L [pru_from.GetAdjective]і#! сюзерени з #ONCLICK:COUNTRY,[intervening_tag.Custom('CL_tt')] #TOOLTIP:COUNTRY,[intervening_tag.Custom('CL_tt')],X [intervening_tag.Custom('CL_GEN')|L]#!#! звернули увагу на лихо, що розгортається у них — зокрема, на те, що туди [Select_CString(proposed_regent.IsFemale, 'була запрошена', 'був запрошений' )] [proposed_regent.GetName]. Підкресливши, що призначення регентів — це їхнє невід'ємне право, вони відправили зовсім іншу людину, тому [proposed_regent_of_poland.GetShortName] тепер [pru_from.GetGovernment.GetRulerTitle|l]. Нам доведеться розлучитися з надією заволодіти [pru_from.Custom('rank_ru_INST')|l] на сході. Незабаром вони пізнають наш гнів!"
  flavor_brapru.1806.a: "Ми покараємо їх за таке втручання!"
  flavor_brapru.1807.title: "Велауський договір"
  flavor_brapru.1807.desc: "Відтоді, як ми посіли престол #ONCLICK:COUNTRY,[GetCountry('PRU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').Custom('CL_tt')],X [GetCountry('PRU').Custom('CL_GEN')|L]#!#!, наш вплив, нехай навіть спочатку обмежений владою часткового сюзерена — #ONCLICK:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')],X [GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_GEN')|L]#!#! — повільно, але невблаганно зростає. [GetCountry('PRU').GetDiplomacy.GetOverlord.GetLongNameWithNoTooltip] не мо[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('endlong_gegu')]же з ним не рахуватися, виходячи зі співвідношення наших сил, тому слід запропонувати [GetCountry('PRU').GetDiplomacy.GetOverlord.GetAdjectiveWithNoTooltip|l]ій стороні укласти між нашими країнами унію: ми пообіцяємо їм мир, а вони нам — звільнення [GetCountry('PRU').Custom('CL_GEN')] від васальної залежності."
  flavor_brapru.1807.historical_info: "Велауський договір — принизлива угода між Королівством Польським та герцогством Пруссія. Польща змушена була звільнити Пруссію від васальної залежності в обмін на надання правлячою династією Гогенцоллернів військової допомоги в боротьбі проти Швеції. Приводом до цього стало вторгнення до Речі Посполитої шведських військ, відоме як #italic Шведський потоп#!."
  flavor_brapru.1807.a: "Запропонуємо унію."
  flavor_brapru.1807.b: "Ми ще встигнемо позбутися сюзерена."
  STATIC_MODIFIER_NAME_PRU_increase_power_projection_rating: "Вплив Пруссії"
  PRU_if_poland_accepts: "Якщо влада #ONCLICK:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')],X [GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_GEN')|L]#!#! погодиться:"
  PRU_if_poland_refuses: "Якщо влада #ONCLICK:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_tt')],X [GetCountry('PRU').GetDiplomacy.GetOverlord.Custom('CL_GEN')|L]#!#! відмовиться:"
  flavor_brapru.1808.title: "$flavor_brapru.1807.title$"
  flavor_brapru.1808.desc: "Ми неприємно здивовані: наш сусід [bra_from.GetName] останнім часом набирає силу і незабаром наздожене нас самих. Крім того, [bra_from.GetName] та [GetCountry('PRU').GetName] уклали особисту унію, а отже, на заході від нас з'явилася нова загроза. Ніхто не сумнівається, що, якщо сьогодні почнеться війна, ми неодмінно її програємо. Зараз ці країни вимагають від нас звільнити герцогство [GetCountry('PRU').GetNameWithNoTooltip] від васальної залежності, погрожуючи в разі відмови обрушити на нас всю міць своєї зброї."
  flavor_brapru.1808.historical_info: "$flavor_brapru.1807.historical_info$"
  flavor_brapru.1808.a: "Нам не залишили вибору."
  flavor_brapru.1808.b: "Обурлива вимога! Ми відмовляємося так принижуватися!"
  flavor_brapru.1809.title: "$flavor_brapru.1807.title$"
  flavor_brapru.1809.desc_success: "[overlord_of_prussia.GetName], усвідомивши всю тяжкість свого становища, [Select_CString(overlord_of_prussia.IsFemale, 'була змушена', 'був змушений' )] прийняти угоду. Наші представники зустрілися в [wehlau_loc.Custom('LR_PREP')|l] [wehlau_loc.GetName], де й підписали договір. [GetCountry('PRU').GetLongName] — ця країна більше не належить [overlord_of_prussia.Custom('CL_DAT')]."
  flavor_brapru.1809.desc_failure: "[overlord_of_prussia.GetName] з обуренням [Select_CString(overlord_of_prussia.IsFemale, 'відмовилася', 'відмовився' )] підписувати угоду і незабаром пізнає всю необачність подібного вчинку. Ми показали, що готові були піти на мирне рішення — тепер нам ніщо не заважає розпочати війну."
  flavor_brapru.1809.historical_info: "$flavor_brapru.1807.historical_info$"
  flavor_brapru.1809.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_brapru.1809.b: "Не пощастило, [GetCountry('PRU').GetDiplomacy.GetOverlord.GetNameWithNoTooltip]."
  flavor_brapru.1810.title: "Пропозиція регентства"
  flavor_brapru.1810.desc: "Після того як [insane_individual.GetName] [Select_CString(insane_individual.IsFemale, 'зійшла', 'зійшов' )] з розуму, [pru_from.GetGovernment.GetCourtTitle|l] #L [pru_from.GetAdjective|l]ої#! країни спішно намагається підшукати регента, який зміг би взяти владу в свої руки. Якщо ж такого не знайдеться, там почнуться заворушення та беззаконня. Саме тому вибір припав на єдиного розумного кандидата на ім'я [proposed_regent.GetName]; крім того, ця людина перебуває в родинних зв'язках з [Select_CString(insane_individual.IsFemale, 'божевільною', 'божевільним' )]. Ми схильні погодитися з таким вибором, хоча при цьому висока небезпека, що на нас нападе їхній сюзерен — [pru_from.GetDiplomacy.GetOverlord.GetName]."
  flavor_brapru.1810.a: "Так, можна вчинити і так."
  flavor_brapru.1810.b: "Може початися непотрібний конфлікт."
  PRU_our_chance_to_get_union: "Між двома країнами буде укладена [Concept('union', 'унія')|e]."
  flavor_brapru.1811.title: "Секуляризація [ROOT.GetCountry.Custom('rank_ru_GEN')|l]"
  flavor_brapru.1811.desc: "Потрапивши під хвилю Реформації, що накрила нашу країну, ми хоч і не без труднощів, але все-таки відмовилися від #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтва#!#!. Тепер у нашого народу нова віра: [ROOT.GetCountry.GetReligion.GetName|l]. Втім, навіть це не допомогло нам відповісти на питання, що давно терзають нас. Жодна душа не знає, хто наш справжній володар, яке наше призначення і до чого взагалі зводиться наша віра. [ROOT.GetCountry.GetLongName] — навіщо взагалі існує ця країна?"
  flavor_brapru.1811.historical_info: "У 1525 році великий магістр Тевтонського ордену Альбрехт з роду Гогенцоллернів оголосив про секуляризацію земель, що належали ордену, та встановлення лютеранства замість католицтва. Зроблено це було з дозволу польського короля, який дозволив Альбрехту правити новоствореним герцогством Пруссія — воно стало першою країною, що відкрито прийняла лютеранство як державну релігію."
  flavor_brapru.1811.a: "Що ж, часи змінилися."
  flavor_brapru.1811.b: "Ми впораємося з цією напастю."
  STATIC_MODIFIER_NAME_PRU_crisis_of_the_theocracy: "Богословська криза"
  flavor_brapru.2000.title: "Період відновлення"
  flavor_brapru.2000.desc: "Смутні роки, спричинені питанням успадкування престолу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, добігли кінця. Ми наочно переконалися, до чого призводить нехтування обов'язками, і тепер готові зробити все можливе, щоб династія [root_dynasty.GetName] зберегла за собою престол, а катастрофа, що сталася, ніколи більше не повторилася. [ROOT.GetCountry.Custom('rank_ru_ACC')] роздирають міжусобиці, а зрадники таяться на кожному кроці. Настав час відновлювати постраждалу країну."
  flavor_brapru.2000.a: "Спочатку примиримося зі станами."
  flavor_brapru.2000.b: "Постараємося повторно утвердити свою владу."
  flavor_brapru.2000.c: "Найважливіше повернути порядок на територію [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_brapru.2000.d: "Займемося оновленням та вдосконаленням."
  flavor_brapru.2001.title: "З ворогів у союзники"
  flavor_brapru.2001.desc: "Після встановлення влади над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! природним чином виникло питання про дипломатичні відносини. Ми припускаємо, що після того, що сталося, деякі старі союзники, наприклад [target_country.GetName], тепер ставитимуться до нас з осторогою, а старі вороги, навпаки, можуть перетворитися на корисних товаришів."
  flavor_brapru.2001.a: "Постараємося укласти союз з [emperor_country.Custom('CL_INST')]."
  flavor_brapru.2001.b: "Не станемо відвертатися від старих союзників."
  flavor_brapru.2001.historical_info: "Сходження на престол династії Гогенцоллернів стало початком нової доби дипломатичних відносин для Бранденбурга. Фрідріх I зблизився з імператором Сигізмундом і став підтримувати інтереси імперії, тоді як традиційно Бранденбург спирався на місцеві союзи."
  flavor_brapru.2002.title: "Пропозиція союзу"
  flavor_brapru.2002.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] приймає посла, який прибув до нас із #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! з таким посланням: династія [root_dynasty.GetName] бажає зміцнити свою владу над [root_country.Custom('CL_INST')], а разом з цим — і дипломатичне становище, для чого збирається відмовитися від укладання місцевих союзів і замість цього почати підтримувати інтереси #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  flavor_brapru.2002.a: "Вони будуть нам цінним союзником."
  flavor_brapru.2002.b: "А потім вони зрадять вже нас?"