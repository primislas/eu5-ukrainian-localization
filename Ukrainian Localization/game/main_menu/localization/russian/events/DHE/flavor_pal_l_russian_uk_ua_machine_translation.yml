l_russian:
  flavor_pal.1.title: "Гарний вибір"
  flavor_pal.1.desc: "У період #TOOLTIP:SITUATION,western_schism,X #L Великого західного розколу#!#! нашу підтримку отримав істинний [GetCountry('PAP').GetGovernment.GetRulerTitle], що забезпечило нам гарні стосунки з #TOOLTIP:LOCATION,rome,X #L Римом#!#!. Нещодавно святійший [pope_ruler.GetName] видав буллу, офіційно дозволивши нам побудувати новий [ShowBuildingTypeName('university')] у #TOOLTIP:LOCATION,heidelberg,X #L Гайдельберзі#!#! за зразком #TOOLTIP:LOCATION,paris,X #L Паризького#!#! університету."
  flavor_pal.1.a: "Приступимо до будівництва."
  flavor_pal.1.b: "Для нас це занадто дорого."
  flavor_pal.2.title: "[target_character.GetNameWithNoTooltip] в опалі"
  flavor_pal.2.desc: "Шанований учений і гуманіст [target_character.GetName] має ще один беззаперечний талант: сваритися з іншими #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькими#!#! теологами. Нещодавно його вкотре усунули від обов'язків через особистий конфлікт з іншими радниками.\n\nНа щастя, він дуже зацікавлений у служінні нам, і [ROOT.GetCountry.GetCapital.GetName] вже готується до його прибуття. Наш [ROOT.GetCountry.GetGovernment.GetCourtTitle] суттєво покращить свою репутацію, якщо там працюватиме людина з гуманістичними цінностями."
  flavor_pal.2.a: "Наша країна стане для нього новим домом."
  flavor_pal.2.b: "Нехай розвертається і забирається куди подалі."
  flavor_pal.3.title: "Перенесення столиці"
  flavor_pal.3.desc: "У зв'язку з безперервними релігійними суперечностями в #TOOLTIP:LOCATION,heidelberg,X #L Гайдельберзі#!#! [target_ruler.GetName] розмірковує про те, щоб перенести столицю в прилеглий $mannheim$. Це допоможе почати з чистого аркуша та знизити напруженість, але ризикує викликати невдоволення населення та потребуватиме значних ресурсів."
  flavor_pal.3.a: "$mannheim$ буде новою столицею!"
  flavor_pal.3.b: "Залишити столицю в Гайдельберзі."
  flavor_pal.3.historical_info: "У 1720 році курфюрст Пфальца Карл III Філіп зіткнувся з серйозними релігійними конфліктами в Гайдельберзі, спричиненими напруженістю між його католицькою адміністрацією та протестантською більшістю міста. Прагнучи пом'якшити ці протиріччя та створити більш гармонійну резиденцію влади, він прийняв рішення перенести столицю до Мангайма. Того ж року на місці колишньої фортеці Фрідріхсбург почалося будівництво Мангаймського палацу, що символізувало початок нової ери для курфюрства. Цей стратегічний крок був покликаний не лише знизити релігійну ворожнечу, а й перетворити Мангайм на зростаючий центр політичного та культурного впливу в регіоні."