l_russian:
  flavor_son.1.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] Тімбукту"
  flavor_son.1.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] стурбовані тим, що [target_character.GetName] демонструє брак віри та веде розпусний спосіб життя. Ба більше, вони вже почали пліткувати про те, що насправді [Select_CString(target_character.IsFemale,'вона язичниця', 'він язичник')] і [Select_CString(target_character.IsFemale,'її', 'його')] невір'я погубить нашу країну. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] відкрито погрожують: якщо [target_character.GetShortNameWithNoTooltip] не почне дотримуватися заповідей #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#!, вони посадять на престол іншого, більш благочестивого правителя."
  flavor_son.1.a: "Відмовитися від вина та бенкетів? Ще чого!"
  flavor_son.1.b: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] поводитися, як личить віруючій людині."
  flavor_son.2.title: "Золотий вік Тімбукту"
  flavor_son.2.desc: "Наше правління забезпечило [ShowLocationName('timbuktu')] стабільність та процвітання. Багато великих вчених та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] стікаються до міста, бажаючи навчатися в місцевих навчальних закладах."
  flavor_son.2.historical_info: "Період правління Аскії Великого був справжнім золотим віком Тімбукту. За його наказом відкривалися релігійні школи та астрономічні обсерваторії, а те, як він організував торгівлю та роботу чиновників, переконало багатьох містян, що цей талановитий адміністратор здатен забезпечити добробут та процвітання всього Сонгаю на багато років вперед."
  flavor_son.2.a: "Це триватиме вічно…"
  flavor_son.3.title: "$tarikh_al_sudan$"
  flavor_son.3.desc: "Прагнучи увічнити історію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [target_character.GetName] [Select_CString(target_character.IsFemale,'почала', 'почав')] працювати над створенням літопису, який вже отримав назву $tarikh_al_sudan$. Ми можемо надати [Select_CString(target_character.IsFemale,'їй', 'йому')] підтримку в цій справі, однак [Select_CString(target_character.IsFemale,'вона сповнена', 'він сповнений')] рішучості завершити цю працю навіть без сторонньої допомоги."
  flavor_son.3.historical_info: "«Тарих ас-Судан» — головна хроніка Сонгайської імперії, складена Абд аль-Рахманом ас-Сааді приблизно в 1655 році. У ній коротко викладено ранню історію Малі, Сонгаю та туарезьких племен, але найбільше уваги приділено подіям, що відбулися в Сонгаї в XV–XVI ст. Крім того, цей літопис містить життєписи низки вчених та святих з міст Дженне та Тімбукту."
  flavor_son.3.a: "Оплатимо цю працю."
  flavor_son.3.b: "Він буде написаний і без нашої допомоги."
  flavor_son.4.title: "Професійне військо"
  flavor_son.4.desc: "Народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вже не раз доводив, що здатен захистити свої землі від зовнішніх загроз. Однак останнім часом [ROOT.GetCountry.Custom('rank_ru_ACC')|l] захлеснула хвиля мілітаризму, яка принесла з собою нові ідеї. Найактуальніші з них — створення професійноармією війська та реорганізація провінцій, яка дозволить більш ефективно розподіляти війська по території країни. [target_character.GetName] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')] проявити ініціативу і вже [Select_CString(target_character.IsFemale,'сформувала', 'сформував')] невеликий загін воїнів. Якщо ми підтримаємо цю ідею, то у нас нарешті з'явиться потужне регулярне військо, яке дозволить нам підкорити собі всю #TOOLTIP:REGION,guinea_region,X #L Гвінею#!#!."
  flavor_son.4.historical_info: "За правління Аскії Мухаммеда, прозваного Великим, сонгайське військо було реорганізоване: солдати вперше були виділені із загальної маси населення. Воно стало першим регулярним військом в Західній Африці. Кожен намісник отримав право створювати власні військові формування за умови, що вони служать правителю Сонгаю. Це сприяло централізації влади."
  flavor_son.4.a: "Регулярне військо відкриє нашій країні шлях до величі."
  flavor_son.4.b: "Професійні солдати? Краще вже озброїти всіх підданих."
  flavor_son.5.title: "[target_character2.GetNameWithNoTooltip] рветься до влади"
  flavor_son.5.desc: "Поки [ROOT.GetCountry.GetName] переживає кризу, деякі вирішили скористатися хитким становищем влади та заявити про свої претензії на престол. [Select_CString(target_character.IsFemale,'Однією з таких претенденток стала', 'Одним з таких претендентів став')] [target_character2.GetName] — [Select_CString(target_character2.IsFemale,'талановита та честолюбна аристократка', 'талановитий та честолюбний аристократ')], [Select_CString(target_character2.IsFemale,'якій', 'якому')] вже вдалося зібрати навколо себе чимало прихильників. Відчуваючи за собою народну підтримку, [Select_CString(target_character2.IsFemale,'вона зажадала', 'він зажадав')], щоб [target_character.GetName] [Select_CString(target_character.IsFemale,'поступилася', 'поступився')] [Select_CString(target_character2.IsFemale,'їй', 'йому')] владою."
  flavor_son.5.historical_info: "Аскія Великий вважається першим правителем Сонгайської імперії. Спочатку він служив полководцем у Сонні Алі, але часто конфліктував з ним — в основному через релігійні відмінності та поводження з улемами в Тімбукту. Коли Сонні Алі помер, Аскія скинув його сина, спираючись на пригноблені верстви сонгайського населення."
  flavor_son.5.a: "Нехай [target_character.GetNameWithNoTooltip] зречеться престолу."
  flavor_son.5.b: "[target_character.GetNameWithNoTooltip] — [Select_CString(target_character.IsFemale,'законна правителька', 'законний правитель')] нашої країни!"
  askia_rebels: "Повстання Аскії Мухаммеда"
  flavor_son.6.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip]"
  flavor_son.6.desc: "Наш вплив у #TOOLTIP:REGION,sahel_region,X #L Сахелі#!#! зростає, у зв'язку з чим [target_location.GetRank.GetName|l] [target_location.GetName] переживає небувалий розквіт. Зокрема, місцеве [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] набуло значного статку та почало вкладати кошти в освітні заклади. Ми могли б надати їм підтримку, щоб сприяти становленню міста як наукового та культурного центру."
  flavor_son.6.historical_info: "Після шестимісячної облоги Сонгайська імперія підкорила місто Дженне. Завдяки своєму вигідному розташуванню він став ключовим торговим перехрестям країни. За свідченням Лева Африканського, в цьому місті продавалося безліч різних товарів, зокрема привезених з Європи."
  flavor_son.6.a: "[target_location.GetNameWithNoTooltip] процвітатиме!"
  flavor_son.6.b: "Ми нізащо не допомагатимемо місцевим мусульманам."
  son_all_clergy_pops_in_location_gain_satisfaction_tt: "Усі [Concept('pops', 'групи населення')|e] зі стану «[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]» отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_son.7.title: "[ShowPolicyNameWithNoTooltip('sharia_law_policy')]"
  flavor_son.7.desc: "Постійні розбіжності між #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманами#!#! та невірними в #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#! призвели до того, що [target_character.GetName] [Select_CString(target_character.IsFemale,'запропонувала', 'запропонував')] зобов'язати всіх язичників виконувати #TOOLTIP:POLICY,sharia_law_policy,X #L закони шаріату#!#!. Цей суворий, але необхідний захід дозволить нам забезпечити суворий порядок на території країни."
  flavor_son.7.a: "Усі жителі [ROOT.GetCountry.Custom('CL_GEN')] повинні дотримуватися мусульманських законів."
  flavor_son.7.b: "Будемо поважати закони невірних."
  son_all_non_muslim_pops_gain_satisfaction_tt: "Усі [Concept('pop', 'групи населення')|e], які не сповідують #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, отримають [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_son.8.title: "Навернення африканських країн"
  flavor_son.8.desc: "Хоча ми і є найсильнішою країною #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!, в регіоні ще залишилися народи, які досі не прийняли #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!. Звісно, ми могли б навернути їх силою, але [target_character.GetName] вважає, що краще використовувати дипломатію, щоб не викликати гнів місцевого населення."
  flavor_son.8.a: "Це звучить розумно."
  flavor_son.8.b: "Краще застосувати силу."
  son_unlock_diplo_action_to_demand_conversion_tt: "Ми отримаємо доступ до [Concept('country_interaction', 'взаємодії з країною')|e] «[ShowCountryInteractionName('demand_conversion_to_islam')]» проти язичницьких країн #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!"
  flavor_son.9.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip]"
  flavor_son.9.desc: "Відколи ми взяли під контроль місто [target_location.GetName], воно стало одним із головних освітніх центрів нашої країни. Завдяки великій кількості мечетей та навчальних закладів [target_location.GetNameWithNoTooltip] по праву вважається культурною перлиною #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!, а дехто й зовсім називає це місто другою столицею #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_son.9.a: "Нам варто активніше розвивати це місто."
  flavor_son.9.b: "Наша нинішня столиця, [target_location2.GetNameWithNoTooltip], більше заслуговує на увагу."
  flavor_son.9.c: "Нехай [target_location.GetNameWithNoTooltip] стане нашою новою столицею."
  flavor_son.10.title: "Розквіт торгівлі через Сахару"
  flavor_son.10.desc: "Завдяки тому, що ми встановили контроль над ключовими маршрутами, торгівля через Сахару почала процвітати. Але не можна зупинятися на досягнутому — нам слід розвивати наші торгові аванпости в таких містах, як [ShowLocationName('alexandria')], [ShowLocationName('tunis')] та [ShowLocationName('fez')], оскільки вони слугують основними стоянками для наших караванів."
  flavor_son.10.a: "Нехай ці міста процвітають."
  flavor_son.10.b: "Замість окремих місць краще розвивати торгівлю загалом."
  flavor_son.10.c: "Немає сенсу витрачати на це гроші."
  son_unlock_unique_buildings_in_alexandria_tunis_and_fez_tt: "Дозволяє будувати #TOOLTIP:BUILDING_TYPE,trans_saharan_trade_outposts,X #L торгові аванпости#!#! у #TOOLTIP:LOCATION,fez,X #L Фесі#!#!, #TOOLTIP:LOCATION,tunis,X #L Тунісі#!#! та #TOOLTIP:LOCATION,alexandria,X #L Александрії#!#!"
  flavor_son.11.title: "Запрошення ісламських богословів"
  flavor_son.11.desc: "[ROOT.GetCountry.GetName] набуває все більшого впливу в #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!, завдяки чому багато #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! богословів почали виявляти великий інтерес до нашої країни. [target_character.GetName] та члени [Select_CString(target_character.IsFemale,'її', 'його')] двору планують запросити їх до нас, щоб утвердити роль [ROOT.GetCountry.Custom('CL_GEN')] як одного з головних оплотів ісламу."
  flavor_son.11.a: "Запросимо їх до нашого двору."
  flavor_son.11.b: "Нам не потрібні такі вчені."
  flavor_son.1000.title: "[target_character.GetNameWithNoTooltip] здійснює хадж"
  flavor_son.1000.desc: "Кожен правовірний #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманин#!#! зобов'язаний хоча б раз у житті здійснити хадж і відвідати #TOOLTIP:LOCATION,mecca,X #L Мекку#!#!. Хоча це передусім релігійний обряд, багато великих правителів — як, наприклад, [target_character2.GetName] — вирушали в паломництво з метою прославити свою країну перед іншими народами. Тепер і нам час вирішити, чи варто вирушати до Мекки."
  flavor_son.1000.historical_info: "Під час свого правління Аскія Великий, наслідуючи Мансу Мусу, вирішив здійснити хадж і взяв із собою значні багатства. Його подорож була не такою грандіозною, але, тим не менш, він зробив чимало щедрих пожертвувань, зокрема побудував у Мецці притулок для паломників із Західної Африки."
  flavor_son.1000.a: "Ми підемо до Мекки і візьмемо з собою всі наші багатства!"
  flavor_son.1000.b: "Візьмемо з собою скромний запас золота."
  flavor_son.1000.c: "Ми вирушаємо здійснювати хадж, а не хвалитися багатством."
  flavor_son.1000.d: "Нам нема чого йти до Мекки."
  son_begin_hajj_tt: "Ми почнемо свій хадж до #TOOLTIP:LOCATION,mecca,X #L Мекки#!#!. Виділене на паломництво [Concept('gold', 'золото')|e] буде перенесено до #Y каравану#!"
  son_no_hajj_tt: "Ми не підемо до #TOOLTIP:LOCATION,mecca,X #L Мекки#!#!"
  flavor_son.1001.title: "Магрибські богослови"
  flavor_son.1001.desc: "Коли [target_character.GetName] [Select_CString(target_character.IsFemale,'досягла', 'досяг')] [target_location.Custom('LR_GEN')|l] [target_location.GetName], по всьому #TOOLTIP:REGION,maghreb_region,X #L Магрибу#!#! рознеслася звістка про прибуття [Select_CString(target_character.IsFemale,'її', 'його')] каравану. Серед багатьох людей, які прийшли подивитися на цю подію, [Select_CString(target_character.IsFemale,'опинилася богословиця', 'опинився богослов')] на ім'я [target_character2.GetName]. [Select_CString(target_character.IsFemale,'Вона виявила бажання', 'Він виявив бажання')] приєднатися до нашого двору. Можливо, ми могли б залучити й інших вчених обіцянкою золота…"
  flavor_son.1001.a: "При дворі дуже знадобилися б такі люди."
  flavor_son.1001.b: "Ми здійснюємо паломництво до святинь, а не наймаємо вчених."
  flavor_son.1002.title: "Пожертвування в Магрибі"
  flavor_son.1002.desc: "Пробувши якийсь час у [target_location.Custom('LR_PREP')|l] [target_location.GetName], [target_character.GetName] та [Select_CString(target_character.IsFemale,'її', 'його')] караван приготувалися вирушати до #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#!. Однак перед від'їздом [Select_CString(target_character.IsFemale,'вона вирішила', 'він вирішив')] віддячити місцевим жителям за гостинний прийом, пожертвувавши частину коштів з каравану на розвиток #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_ACC')|l]#!#!."
  flavor_son.1002.a: "Заплатимо за гостинність. [target_location.GetNameWithNoTooltip] цього заслуговує."
  flavor_son.1002.b: "Караван повинен йти, а не роздавати золото."
  flavor_son.1003.title: "Богослови [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_son.1003.desc: "[target_location.GetName] — справжнісінька перлина #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#!. Коли [target_character3.GetName] [Select_CString(target_character3.IsFemale,'здійснювала', 'здійснював')] свій хадж, [Select_CString(target_character3.IsFemale,'її', 'його')] прийняли тут з розпростертими обіймами, і тепер нас зустрічають анітрохи не гірше. Навколо каравану зібралося безліч місцевих богословів, які бажають на деякий час приєднатися до нашої подорожі. Втім, за гідну плату вони напевно будуть готові залишитися і служити при нашому дворі."
  flavor_son.1003.a: "У нас знайдеться золото для них."
  flavor_son.1003.b: "Ми тут не для того, щоб наймати помічників."
  flavor_son.1004.title: "[target_character3.GetNameWithNoTooltip] може нами пишатися"
  flavor_son.1004.desc: "Поки наш караван перебуває в #TOOLTIP:REGION,egypt_region,X #L Єгипті#!#!, [target_character.GetName] бажає повторити подвиги, які здійснив [target_character3.GetName] під час свого хаджу. Одним з найбільш відомих його вчинків стало пожертвування нечуваної кількості золота жителям [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Ми теж можемо обдарувати цей регіон — головне, щоб це не призвело до знецінення місцевих грошей і різкого підвищення цін…"
  flavor_son.1004.a: "[target_location.GetNameWithNoTooltip] довго пам'ятатиме наш візит!"
  flavor_son.1004.b: "Не забуваймо, заради чого ми вирушили в путь."
  flavor_son.1005.title: "Найсвятіша з усіх святинь"
  flavor_son.1005.desc: "Після кількох місяців подорожей [target_character.GetName] та [Select_CString(target_character3.IsFemale,'її', 'його')] караван нарешті прибули до #TOOLTIP:LOCATION,mecca,X #L Мекки#!#!. Хоча за задумом хадж має служити духовним цілям, у нас є різні ідеї щодо того, як вчинити далі. З одного боку, ми можемо провести в місті кілька днів, щоб взяти участь у релігійних заходах і спокійно завершити паломництво, але з іншого — ми можемо обсипати місцевих жителів золотом, щоб показати їм могутність і багатство нашої країни."
  flavor_son.1005.a: "Цей хадж буде найвеличнішим!"
  flavor_son.1005.b: "Встановимо зв'язки з місцевими жителями."
  flavor_son.1005.c: "Покажемо їм, що ми виконуємо священний обов'язок."
  flavor_son.1005.d: "Скромність — чеснота слуги."
  flavor_son.1006.title: "Закінчення хаджу"
  flavor_son.1006.desc: "Наше паломництво до #TOOLTIP:LOCATION,mecca,X #L Мекки#!#! завдовжки в кілька місяців добігло кінця. Ми виконали свій #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманський#!#! обов'язок, і тепер можемо повернутися до управління країною."
  flavor_son.1006.a: "Подивимося, що залишилося від каравану…"
  son_show_hajj_money_tt: "Кількість [Concept('gold', 'золота')|e] у #Y каравані#!: @gold!#G [THIS.GetVariable('hajj_money').GetValue]#!"
  son_continue_hajj_tt: "Ми продовжимо #Y хадж#!"
  son_all_remaining_gold_will_return_to_treasury_tt: "Усе [Concept('gold', 'золото')|e], що залишилося після #Y хаджу#!, буде повернено до нашої [Concept('treasury', 'казни')|e]"