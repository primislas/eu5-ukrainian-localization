l_russian:
  flavor_hun.100.title: "Рада [GetCurrentYear] року"
  flavor_hun.100.desc: "Після катастрофічної поразки під Варною та загибелі короля Владислава над країною нависла загроза розпаду та занурення в хаос. У надії знову об'єднати її воєвода Янош Хуньяді скликав раду."
  flavor_hun.100.a: "Оберемо Яноша Хуньяді регентом."
  flavor_hun.100.b: "Збережемо поточний уряд."
  flavor_hun.100.c: "Янош Хуньяді стане нашим новим королем."
  flavor_hun.110.title: "Реформи Матяша Корвіна"
  flavor_hun.110.desc: "Матяш Корвін значно реформував угорську країну та суспільство. Зокрема, він радикально збільшив надходження до скарбниці. Цієї мети він досяг кількома способами. По-перше, король дозволив бідним радникам, нездатним регулярно бути присутніми на зустрічах, сплачувати податки авансом. По-друге, всупереч волі аристократів він зумів створити впорядковану та працюючу систему збору податків. По-третє, він запровадив поділ обов'язків для різних фахівців казначейства."
  flavor_hun.110.a: "Зосередимося на адміністративних реформах."
  flavor_hun.110.b: "Зосередимося на соціальних реформах."
  flavor_hun.120.title: "Істрополітанська академія"
  flavor_hun.120.desc: "Істрополітанська академія в Прессбурзі стала першим університетом Угорщини. Її заснував папа Павло II за пропозицією короля Матяша Корвіна. Там читали лекції такі відомі італійські та австрійські вчені, як Галеотто Марціо та Янош Вітез. На жаль, після смерті короля академія припинила роботу."
  flavor_hun.120.a: "Це буде нам корисно…"
  flavor_hun.130.title: "Друкарня в Буді"
  flavor_hun.130.desc: "У 1473 році була надрукована перша угорська книга — трактат Chronica Hungarorum, що оповідає про історію Угорщини з найдавніших часів до коронації Матяша Корвіна. Її видав Андраш Гесс у своїй новій друкарні."
  flavor_hun.130.a: "Це чудово!"
  flavor_hun.140.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий вампір"
  flavor_hun.140.desc: "Байки про вампірів у нашій країні незмінно передаються з покоління в покоління ось уже багато років — і ось на наших очах, схоже, зароджуються нові: [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] розпускає тривожні чутки про те, як себе поводить [target_character.GetName]. По всій видимості, [Select_CString(target_character.IsFemale, 'вона настільки одержима', 'він настільки одержимий' )] переказами про цих чудовиськ, що навіть [Select_CString(target_character.IsFemale, 'саму', 'самого' )] себе вважає вампіром. Якщо вірити розповідям, [target_character.GetName] нібито [Select_CString(target_character.IsFemale, 'замучила і вбила', 'замучив і вбив' )] десятки й сотні невинних, а деякі навіть стверджують, ніби [Select_CString(target_character.IsFemale, 'вона', 'він' )] приймає ванни з крові незайманих, щоб не старіти."
  flavor_hun.140.historical_info: "Графиня Єлизавета Баторі, що доводилася племінницею знаменитому угорському магнату Стефану, увійшла в історію як жорстока і безжальна вбивця. Намагаючись повернути собі молодість, вона зарізала понад 600 юних незайманих, щоб приймати ванни з їхньої крові. Злочинницю засудили і ув'язнили, де вона і померла в 1614 році. Питання, наскільки правдивими були чутки та звинувачення, а також наскільки вони були політично мотивованими, досі залишається відкритим."
  flavor_hun.140.a: "Негайно покласти край цьому свавіллю!"
  flavor_hun.140.b: "Знову селяни базікають даремно."
  flavor_hun.150.title: "Наступ [target_country.Custom('longname_ru_nott_GEN')]"
  flavor_hun.150.desc: "Поразка, якої ми нещодавно зазнали у війні з [target_country.Custom('longname_ru_INST')], спричинила цілу низку наслідків. На заході [ROOT.GetCountry.Custom('rank_ru_GEN')|l] посилює свій вплив влада #ONCLICK:COUNTRY,[GetCountry('HAB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HAB').Custom('CL_tt')],X [GetCountry('HAB').Custom('CL_GEN')|L]#!#!, а [ROOT.GetCountry.GetAdjective|l]і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] охоче звертаються до Габсбургів за допомогою в боротьбі з нашими ворогами. На сході у [GetCountry('HAB').Custom('CL_GEN')] друзів набагато менше, тому там воліють покладатися на воєвод #TOOLTIP:AREA,transylvania_area,X #L Трансильванії#!#!. На жаль, [ROOT.GetCountry.GetLongNameWithNoTooltip] пережива[ROOT.GetCountry.Custom('endlong_etyut')] розкол саме тоді, коли вороги особливо сильні."
  flavor_hun.150.a: "Ми повинні об'єднатися проти ворогів християнства!"
  flavor_hun.160.title: "Повстання угорських селян"
  flavor_hun.160.desc: "Наш план зібрати військо для майбутнього хрестового походу проти Османської Імперії обернувся вельми неприємними наслідками. Вербування та навчання солдатів були доручені Дьордю Дожі — вельми досвідченому, але не надто надійному найманцю, що чимало повоював з турками. Дожа підготував і спорядив величезне військо, набравши до нього людей з найбідніших і безправних верств угорського суспільства.\nОтримавши зброю і трохи навчившись нею володіти, всі ці селяни, студенти та сільські попи замість того, щоб йти на війну з турками, повстали проти своїх панів. Це повстання стало найбільшим в історії нашого королівства. Озброєна чернь спалює і грабує садиби, садить на палі священиків і забиває до смерті державних чиновників."
  flavor_hun.160.a: "Невдячний набрід!"
  flavor_hun.170.title: "Тамаш Бакоц"
  flavor_hun.170.desc: "Єпископ, кардинал і королівський радник Тамаш Бакоц чимало послужив нашій країні. Здобувши гарну освіту та зробивши блискучу кар'єру, він залишив свій слід як у зовнішній, так і у внутрішній політиці Угорщини.\nБакоц переконаний, що ми повинні зміцнювати свої зв'язки з австрійськими монархами у Відні — адже тільки вони можуть допомогти нам у боротьбі з турками."
  flavor_hun.170.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  hun_bakocz_foreign_policy: "Прогабсбурзька політика Тамаша Бакоца"
  flavor_hun.180.title: "Католики [GetCountry('BOH').Custom('CL_GEN')] просять нас про допомогу"
  flavor_hun.180.desc: "Ображені тим, що [GetCountry('BOH').GetGovernment.GetRuler.GetName|l] відкрито благоволить #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситській#!#! єресі, #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! аристократи [GetCountry('BOH').Custom('CL_GEN')] підняли повстання. До числа його ватажків входять такі знатні родини, як фон Розенберги, Шванберги, Штернберги та Газенбурги. Але, хоча їхня справа й угодна Богу, [GetCountry('BOH').GetGovernment.GetRulerTitle|l] все ж має сильніше та численніше військо.\n\nОпинившись у відчайдушному становищі, заколотники звернулися до нас по допомогу та захист. Якщо ми підемо їм назустріч, [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] зможе додати #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! частину [GetCountry('BOH').Custom('rank_ru_GEN')|l] [GetCountry('BOH').GetNameWithNoTooltip] до свого титулу."
  flavor_hun.180.a: "Так хоче Бог!"
  hun_crowned_by_rebels: "Отримання корони від заколотників"
  flavor_hun.180.b: "Ми ніколи не виступимо проти [GetCountry('BOH').Custom('CL_GEN')]…"
  hun_refused_to_help_rebels: "Відмова допомогти богемським католикам"
  flavor_hun.181.title: "Вибори в Оломоуці"
  flavor_hun.181.desc: "Загнані в кут #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! заколотники звернулися по захист до монарха [GetCountry('BOH').Custom('CL_GEN')]. Вони проголосили, що відтепер ними править [GetCountry('HUN').GetGovernment.GetRuler.GetName|l], і тепер з нетерпінням чекають приходу [GetCountry('HUN').GetAdjectiveWithNoTooltip|l]их військ.\n\nВодночас більшість наших підданих, для яких законним правителем, як і раніше, залишається [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l], глибоко засуджує зрадників-католиків."
  flavor_hun.181.a: "Державна зрада!"
  flavor_hun.190.title: "Розбійники у Верхній Угорщині"
  flavor_hun.190.desc: "Після хрестового походу на Варну, гуситських війн та внутрішніх конфліктів 30-х і 40-х років XV століття в Угорщині скупчилася величезна кількість досвідчених, але безробітних найманців. Вони не здатні заробляти на життя мирним шляхом, тому воліють добувати собі прожиток за допомогою розбою та грабунку. Іноді до них приєднуються місцеві аристократи, розраховуючи використати їхню силу для зміцнення власної влади.\nБезсумнівно, колись наші гарнізони здобудуть над ними гору, але це може дорого обійтися нашій економіці."
  flavor_hun.190.a: "Ми розтрощимо цих негідників!"
  flavor_hun.190.b: "Нехай із цим розбирається місцева знать."
  flavor_hun_show_rebels_tt: "Близько [ROOT.GetVariable('display_num_rebelling_pops_variable').GetValue|V0] #Y тис.#! [Concept('pops', 'груп населення')|e] з кількох [Concept('locations', 'місцевостей')|e] #TOOLTIP:AREA,slovakia_area,X #L Словаччини#!#! ([ROOT.GetVariable('display_num_locations_variable').GetValue|V0]) отримають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  every_location_slovakia_loses_prosperity_tt: "Усі належні нам [Concept('location', 'місцевості')|e] #TOOLTIP:AREA,slovakia_area,X #L Словаччини#!#! отримають [ShowNamedValue('prosperity_extreme_penalty')|+=2%] до [Concept('prosperity', 'процвітання')|e]"
  flavor_hun.200.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] збирає військо"
  flavor_hun.200.desc: "[ROOT.GetCountry.GetLongName] — цю країну оточують могутні сусіди, тому вона потребує сильного війська. У минулих війнах основу наших збройних сил становило ополчення, зібране аристократами та доповнене загонами найманців.\n\nБудучи професійними солдатами, найманці швидко освоюють нову зброю та тактику. Як правило, вони навчені набагато краще за будь-яке ополчення. Деякі з них служать нам уже багато років, у мирний час промишляючи розбоєм. Надихнувшись працями Юлія Цезаря, [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] думає про створення постійної найманого війська. Маючи стабільне джерело доходу, її солдати не грабуватимуть мирних селян і стануть силою, здатною дати відсіч будь-якому ворогу. Якщо тільки наші фінанси це дозволять…"
  flavor_hun.200.a: "Наше військо буде найкращим."
  flavor_hun.210.title: "Ключ від Угорщини"
  flavor_hun.210.desc: "Фортеця [belgrade_localized.GetName], що стоїть на місці злиття Дунаю та Сави, займає ідеальну позицію для відбиття будь-яких нападів з півдня. Саме заради неї наші минулі королі й відняли Белградську бановину у сербського деспота Георгія Бранковича. Однак зараз ця велична твердиня відчайдушно потребує ремонту та розбудови.\nНа жаль, нинішні угорські аристократи не бажають витрачатися ні на [belgrade_localized.GetName], ні на інші прикордонні фортеці. Вони вперто не помічають #L [GetCountry('TUR').GetAdjective|l]ої#! загрози та вважають подібні прохання корони утиском своїх особистих інтересів. Якщо ми хочемо належним чином зміцнити кордони, нам доведеться фінансувати це з державної скарбниці."
  flavor_hun.210.a: "Нам треба виділити більше коштів."
  flavor_hun.210.b: "Нинішніх укріплень цілком достатньо."
  flavor_hun.220.title: "Падіння Сербії"
  flavor_hun.220.desc: "Після падіння Сербії до наших південних кордонів ринули незліченні сербські біженці. Багато з них селяться в околицях міста [belgrade_localized.GetName], розраховуючи почати нове життя серед співвітчизників, які вже отримали наш захист."
  flavor_hun.220.a: "У нас вистачить місця для всіх…"
  flavor_hun.230.title: "Синод провінції [debrecen_province.GetName]"
  flavor_hun.230.desc: "Щойно виникнувши, вчення кальвіністів знайшло чимало послідовників у нашому королівстві. Такі його доктрини, як приречення, знайшли відгук у серцях наших аристократів і простолюду, тому в багатьох провінціях стали виникати реформатські школи та громади. З деякими сумнівами прийнявши друге Гельветське сповідання, #L [ROOT.GetCountry.GetAdjective|l]і#! кальвіністи стали об'єднуватися з реформатськими церквами інших країн.\nОднак католицьке духовенство, що традиційно служить опорою королівської влади, дивиться на це з недовірою. Попри всю свою силу, наша реформатська церква поки молода і вразлива. Чи дозволимо ми їй зміцніти, чи нам краще виполоти ці паростки, доки не пізно?"
  flavor_hun.230.a: "Час запрошувати єзуїтів."
  hun_invited_jesuits: "Запрошені єзуїти"
  flavor_hun.230.b: "Настав час реформ!"
  flavor_hun.240.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.240.desc: "Рід Надашді не відрізняється ні давністю, ні впливом, проте його нащадки вельми честолюбні. Так, молодий [target_character.GetName], який нещодавно закінчив своє навчання і повернувся з подорожі сусідніми країнами, виглядає перспективним чиновником, дипломатом і воєначальником. Уміло знаходячи баланс між інтересами різних станів, він досить швидко зробив кар'єру: йому вдалося зміцнити економіку країни, подбати про її захист і знайти союзників для боротьби з численними ворогами."
  flavor_hun.240.a: "Нам потрібен здібний управлінець."
  flavor_hun.250.title: "Волоський статут"
  flavor_hun.250.desc: "Наступ Османської імперії повністю змінив політичну географію Південно-Східної Європи. Безліч слов'ян і румунів було змушено покинути свої домівки та переселитися на наші землі. З цих людей, які мріють повернути втрачену батьківщину, вийдуть чудові солдати та диверсанти. Якщо ми гарантуємо їм релігійну та культурну свободу, ці норовливі жителі прикордоння, згуртовані спільною ненавистю до османів, послужать нам добру службу."
  flavor_hun.250.a: "Ми гарантуємо їхні права!"
  flavor_hun.250.b: "Ні, закон і порядок понад усе."
  flavor_hun.260.title: "Румунське повстання"
  flavor_hun.260.desc: "Румуни, яких також називають влахами, живуть у Трансильванії вже багато століть, проте майже не представлені серед місцевої влади. Народи цього регіону сильно перемішані: секеї, трансильванські сакси та влахи здавна сусідять тут, налагодивши хитку рівновагу.\nВтім, нещодавно влахи стали вимагати прав і представництва. Деякі з них навіть взялися за зброю і повстали проти #L [ROOT.GetCountry.GetAdjective|l]ої#! влади."
  flavor_hun.260.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_hun.270.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hun.270.desc: "Королівство Хорватія об'єдналося з Угорщиною в 1102 році. Відтоді монарх особисто наділяє повноваженнями хорватських банів — місцевих правителів, які очолюють військо та парламент. Нещодавно призначений бан [target_artist.GetName] проявив себе як надзвичайно обдарований слуга корони і вельми здібний генерал. У нагороду за службу його роду було пожалувано спадковий титул графів Вараждинських, а сам Тамаш після чергової перемоги удостоївся папського привітання."
  flavor_hun.270.a: "Його талант безцінний для країни."
  flavor_hun.280.title: "Матяш Деваї"
  flavor_hun.280.desc: "Минуло вже кілька десятиліть відтоді, як Лютер прибив свої 95 тез до дверей віттенберзької церкви, але ідеї реформації продовжують поширюватися на континенті.\nМатяш Деваї, який колись навчався у самого Лютера, переконаний, що його призначення — проповідувати слово вчителя в землях #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!.\nНе дивно, що деякі з наших релігійних діячів налаштовані проти нього. Так, єпископ Тамаш Салахазі з Ерлау наказав ув'язнити цього «угорського Лютера», щоб обмежити протестантський вплив у країні."
  flavor_hun.280.a: "Негайно звільнити його!"
  flavor_hun.280.a.tt: "Багато з [ShowCultureName('hungarian')|l]их [ShowReligionAdjective('catholic')|l]их [Concept('pops', 'груп населення')|e] в нашій країні перейдуть у #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранську#!#! віру"
  flavor_hun.280.b: "Так йому й треба."
  flavor_hun.290.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_hun.290.desc: "[target_artist.GetName], з дитячих років [Select_CString(target_artist.IsFemale,'отримувала', 'отримував')] всебічну освіту в найкращих традиціях Відродження, має широкі зв'язки та значну бібліотеку. В [Select_CString(target_artist.IsFemale,'її', 'його')] особі [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] Угорщини отримає провідника ідей гуманізму та інших цінностей нової доби.\n\nЧи варто нам найняти [Select_CString(target_artist.IsFemale,'її', 'його')]?"
  flavor_hun.290.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.290.b: "Досить з нас шарлатанів."
  flavor_hun.300.title: "Міські союзи Верхньої Угорщини"
  flavor_hun.300.desc: "Багаті та численні шахти Верхньої Угорщини відіграють ключову роль у нашій економіці, тому ми надаємо шахтарським містам набагато більше свобод, ніж будь-яким іншим поселенням. Німецька приказка про «звільняюче міське повітря» в цьому випадку стосується не тільки самих міст, а й кріпаків, що зуміли пробитися туди. Понад те, нинішній дефіцит срібла в Європі дозволив міським лігам стати ще багатшими, ніж раніше.\nВтім, дехто з аристократів вважає, що ми даємо цим містам занадто багато привілеїв і повинні зобов'язати їх як мінімум брати участь в обороні країни."
  flavor_hun.300.a: "Вони повинні брати участь так само, як і всі!"
  STATIC_MODIFIER_NAME_hun_city_league_obligation: "Укріплення міських ліг"
  STATIC_MODIFIER_DESC_hun_city_league_obligation: "Отримуючи величезні прибутки від процвітаючої гірничої промисловості, місцеві міські ліги роблять свій внесок в оборону країни."
  flavor_hun.300.b: "Ми захистимо їхні привілеї."
  STATIC_MODIFIER_NAME_hun_city_leagues_protected: "Розквіт гірничої промисловості"
  STATIC_MODIFIER_DESC_hun_city_leagues_protected: "Отримавши численні свободи, шахтарські містечка цієї провінції стрімко зростають, сприяючи процвітанню місцевої економіки."
  flavor_hun.310.title: "Куруци та гайдуки"
  flavor_hun.310.desc: "Через численні війни та міжусобиці в нашій країні стає все більше розбійницьких банд. Злиденні та відчайдушні головорізи без роздумів нападають як на співвітчизників, так і на будь-яких іноземців, що опинилися на території королівства. З іншого боку, у разі вторгнення ворога вони здатні завдати серйозних проблем його війську. Ці нерегулярні формування можуть суттєво зміцнити нашу обороноздатність — якщо, звичайно, ми закриємо очі на їхні безчинства."
  flavor_hun.310.a: "Нам знадобляться будь-які воїни."
  flavor_hun.310.b: "Не варто заохочувати цих втікачів-кріпаків."
  flavor_hun.320.title: "[karoly_ruler.GetNameWithNoTooltip] — абсолютний монарх?"
  flavor_hun.320.desc: "[karoly_ruler.GetName] твердо дотримується принципів абсолютної монархії, відмовляючись скликати ради, централізуючи державне управління та утверджуючи свою особисту владу на всій території країни. [Select_CString(karoly_ruler.IsFemale,'Вона', 'Він')] править твердою рукою, зміцнюючи авторитет корони та міць країни, хоча [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] не надто задоволені таким станом речей."
  flavor_hun.320.a: "Країна — це [Select_CString(karoly_ruler.IsFemale,'вона', 'він')]."
  flavor_hun.320.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(karoly_ruler.IsFemale,'повинна', 'повинен')] ділитися владою."
  flavor_hun.330.title: "Вишеградський з'їзд [GetCurrentYear] року"
  flavor_hun.330.desc: "У XIV столітті [GetCountry('HUN').GetName] та [GetCountry('POL').GetName] були пов'язані складними та часом неспокійними відносинами. Метою Вишеградського з'їзду 1335 року було зміцнення дипломатичних зв'язків між цими країнами. На ньому було підписано важливий договір, згідно з яким у разі, якщо [casimir_scope.GetName|l] або [karoly_ruler.GetName|l] помре, не залишивши спадкоємця чоловічої статі, відповідні землі перейдуть до складу другої країни. Настав час приділити увагу цьому історичному договору."
  flavor_hun.330.a: "Договір має бути укладений."
  flavor_hun.330.a.at: "#Y Ми висунемо свою пропозицію. Якщо влада #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_GEN')|L]#!#! її прийме, наслідки будуть такими:#!"
  flavor_hun.330.a.bt: "[GetCountry('HUN').GetName] та [GetCountry('POL').GetName] укладають договір, що змінює порядок [Concept('heir_selection', 'престолонаслідування')|e] в обох країнах на #TOOLTIP:HEIRSELECTION,union_of_crowns_succession,X #L престолонаслідування в союзі корон#!#!. Якщо [casimir_scope.GetName|l] або [karoly_ruler.GetName|l] помре, не залишивши законного спадкоємця, другий [Concept('character', 'персонаж')|e] успадкує спорожнілий трон і створить [Concept('union', 'унію ')|e]."
  flavor_hun.330.b: "Не будемо порушувати це питання."
  flavor_hun.331.title: "Другий Вишеградський з'їзд"
  flavor_hun.331.desc: "Другий Вишеградський з'їзд, що відбувся в [GetCurrentYear] році, був дуже важливим з точки зору дипломатії. На ньому [GetCountry('HUN').GetName] та [GetCountry('POL').GetName] підтвердили свої наміри шанувати договір 1335 року. Той факт, що цей договір визнається [GetCountry('POL').Custom('CL_INST')], покращив відносини між країнами, зміцнив їхню дружбу та визначив їхню можливу спільну долю."
  flavor_hun.331.a: "Ми повинні бути вірними своєму слову."
  flavor_hun.331.a.tt: "Визнання нами цього договору призведе до таких наслідків:"
  flavor_hun.331.b: "Наше майбутнє не повинно бути пов'язане з [GetCountry('HUN').GetAdjectiveWithNoTooltip|l]ою долею."
  flavor_hun.331.b.tt: "Наша відмова від цього договору призведе до таких наслідків:"
  flavor_hun.332.title: "Вишеградський з'їзд [GetCurrentYear] року"
  flavor_hun.332.desc: "На нашу велику радість представники #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_GEN')|L]#!#! визнали другий Вишеградський з'їзд, ще більше зміцнивши історичні зв'язки між нашими країнами. Цей дипломатичний жест підтверджує прихильність [GetCountry('POL').Custom('CL_GEN')] умовам договору 1335 року, що є багатообіцяючим знаком подальшої співпраці та спільної відповідальності за майбутнє."
  flavor_hun.332.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.18.title: "Вишеградський з'їзд [GetCurrentYear] року"
  flavor_hun.18.desc: "Ми отримали сумні новини з #ONCLICK:COUNTRY,[GetCountry('POL').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POL').Custom('CL_tt')],X [GetCountry('POL').Custom('CL_GEN')|L]#!#!: ця країна відмовилася визнавати другий Вишеградський з'їзд. Дане рішення кидає тінь на історичні зв'язки між нашими країнами та змушує сумніватися в майбутньому договору про спадкування 1335 року. Оптимізм щодо спільної долі та взаємної підтримки пішов на спад. #ONCLICK:COUNTRY,[GetCountry('HUN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HUN').Custom('CL_tt')],X [GetCountry('HUN').Custom('CL_DAT')|L]#!#! залишається тільки гадати про причини такого рішення [GetCountry('POL').Custom('CL_GEN')]."
  flavor_hun.18.a: "Яка прикрість…"
  agreed_second_congress_of_visegrad: "Другий Вишеградський з'їзд визнано"
  failed_second_congress_of_visegrad: "Другий Вишеградський з'їзд не визнано"
  flavor_hun.340.title: "Золото [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_hun.340.desc: "[ruler_scope.GetName], нещодавно [Select_CString(ruler_scope.IsFemale,'зайняла', 'зайняв')] престол нашої країни, стоїть перед важливим вибором. [Select_CString(ruler_scope.IsFemale,'Її', 'Його')] [Select_CString(karoly_scope.IsFemale,'попередниця', 'попередник')] [karoly_scope.GetName|l] [Select_CString(karoly_scope.IsFemale,'ввела', 'ввів')] заборону на експорт золота та срібла, зробивши ці метали доступними лише небагатьом обраним.\n\nПісля [Select_CString(karoly_scope.IsFemale,'її', 'його')] смерті [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] стали намагатися переконати [Select_CString(karoly_scope.IsFemale,'її', 'його')] [Select_CString(ruler_scope.IsFemale,'наступницю', 'наступника')] скасувати заборону та дозволити вільну торгівлю дорогоцінними металами. Це може бути невигідно з точки зору наших комерційних інтересів, однак перспектива примиритися з впливовими станами та відкрити нові можливості для торгівлі безперечно виглядає привабливо…"
  flavor_hun.340.a: "Заборону знято."
  flavor_hun.340.b: "Заборону буде продовжено."
  flavor_hun.350.title: "Золота булла 1222 року"
  flavor_hun.350.desc.a: "Коли [ruler_scope.GetName|l] [Select_CString(ruler_scope.IsFemale,'зійшла', 'зійшов')] на трон нашої країни, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] відчули шанс посилити свій вплив. Якщо [karoly_ruler.GetName|l] [Select_CString(karoly_scope.IsFemale,'правила', 'правив')] твердою рукою, тримаючи в підпорядкуванні всі стани, то [ruler_scope.GetNameWithNoTooltip|l] поки не має належного авторитету. Неблагонадійні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] користуються цим, щоб послабити владу [Select_CString(ruler_scope.IsFemale,'законної правительки', 'законного правителя')].\n\nВідродження таких привілеїв, як легендарна #TOOLTIP:ESTATE_PRIVILEGE,golden_bull_of_1222,X #L Золота булла 1222 року#!#!, дозволить примиритися з ними, але може дати їм ще більше важелів впливу…"
  flavor_hun.350.desc.b: "Коли [ruler_scope.GetShortName|l] [Select_CString(ruler_scope.IsFemale,'зійшла', 'зійшов')] на трон нашої країни, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] відчули шанс посилити свій вплив. Як і [Select_CString(karoly_scope.IsFemale,'попередниця', 'попередник')] [karoly_ruler.GetName|l], [Select_CString(ruler_scope.IsFemale,'вона', 'він')] вважає досить складним диктувати свою волю таким станам, як [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], а ті, своєю чергою, прагнуть послабити владу [Select_CString(ruler_scope.IsFemale,'своєї законної правительки', 'свого законного правителя')].\n\nВідродження таких привілеїв, як легендарна #TOOLTIP:ESTATE_PRIVILEGE,golden_bull_of_1222,X #L Золота булла 1222 року#!#!, дозволить примиритися з ними, але може дати їм ще більше важелів впливу…"
  flavor_hun.350.a: "Відновимо дію Золотої булли."
  flavor_hun.350.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] — не ті люди, з якими варто сваритися."
  flavor_hun.350.historical_info: "На раді 1351 року Людовик I Великий залишив чинними більшість положень Золотої булли 1222 року, що встановлювала права угорських дворян. Однак окремі положення король все ж таки змінив: зокрема, він запровадив систему майорату, що обмежила право дворян, які не мають спадкоємців чоловічої статі, вільно заповідати своє майно. Також Людовик зобов'язав землевласників збирати «дев'ятину» з селян, проте дозволив останнім вільно змінювати місце проживання. Зробивши істотний вплив на життя угорських аристократів та простолюду, ці зміни сприяли соціальному та економічному розвитку країни."
  flavor_hun.360.title: "Волоське право"
  flavor_hun.360.desc: "#TOOLTIP:CULTURE,$transylvanian_tt$,X #L Трансильванія#!#! відіграє важливу роль у житті нашої країни. #TOOLTIP:POLICY,vlach_law_policy,X #L Волоське право#!#!, якому традиційно слідують #TOOLTIP:CULTURE,$transylvanian_tt$,X #L трансильванські#!#! селяни, останнім часом користується популярністю навіть при дворі, успішно конкуруючи з іншими правовими системами. Прийнявши його як офіційний звід законів, ми можемо завоювати симпатії підданих, які розмовляють румунською, однак [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] з правлячого класу цього не оцінять."
  flavor_hun.360.a: "Волоське право увійде до нашого офіційного зводу законів."
  flavor_hun.360.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] — не ті люди, з якими варто сваритися."
  transylvanian_independence_fighter: "Трансильванські повстанці"
  flavor_hun.360.b.tt: "Кожен #TOOLTIP:CULTURE,$transylvanian_tt$,X #L трансильванський#!#! #TOOLTIP:RELIGION,$orthodox_tt$,X #L православний#!#! селянин в Угорщині:\n• Втрачає 90% задоволення групи населення\n• Вступає до лав трансильванських повстанців"
  flavor_hun.370.title: "Орден Святого Георгія"
  flavor_hun.370.desc: "Орден Святого Георгія, який [karoly_scope.GetName|l] [Select_CString(karoly_scope.IsFemale,'заснувала', 'заснував')] у 1326 році, є одним із перших світських орденів Європи та втілює в собі ідеали середньовічного лицарства. Приналежність до цього поважного братства свідчить про бездоганну честь і шляхетність.\n\nТепер, коли [karoly_scope.GetNameWithNoTooltip|l] [Select_CString(karoly_scope.IsFemale,'покинула', 'покинув')] цей тлінний світ, долею ордену Святого Георгія розпоряджається [ruler_scope.GetName|l]. Підтримка та розвиток цього ордену сприяє престижу монарха та всієї країни, однак обходиться досить дорого. З іншого боку, розпустивши орден, ми отримаємо шанс повернути до скарбниці раніше вкладені кошти."
  flavor_hun.370.a: "Орден слід розвивати!"
  flavor_hun.370.b: "Розпустимо орден."
  flavor_hun.380.title: "Placitum Regium"
  flavor_hun.380.desc: "[ruler_scope.GetName] вже давно в непростих стосунках із #L [GetCountry('PAP').GetAdjective|l]ою#! владою. Останнім часом ці стосунки загострилися через [Select_CString(ruler_scope.IsFemale,'її', 'його')] едикт #TOOLTIP:GENERIC_ACTION,placitum_regium,X #L Placitum Regium#!#!, що допускає незалежну оцінку вимог Його Святості королем. Конфлікт між #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! та Святим Престолом викликав тривогу серед місцевого духовенства. Зараз [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] намагаються домогтися, щоб [ruler_scope.GetNameWithNoTooltip|l] [Select_CString(ruler_scope.IsFemale,'скасувала', 'скасував')] суперечливий едикт і [Select_CString(ruler_scope.IsFemale,'почала', 'почав')] шукати шляхи примирення з папою."
  flavor_hun.380.a: "Обмежимо [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]у владу."
  flavor_hun.380.b: "Скасуємо Placitum Regium."
  flavor_hun.380.historical_info: "У 1404 році, коли Угорщиною правив імператор Сигізмунд Люксембурзький, було видано едикт #italic Placitum Regium#!, також відомий у чеській та угорській історіографії як Placetum Regium. Він обмежив папську владу на території Угорщини, надавши її королю виняткове право призначати та утримувати вище духовенство. Ввівши його, Сигізмунд підвищив значущість королівської волі, суттєво змінивши баланс сил між угорською короною та Святим Престолом."
  flavor_hun.390.title: "[toldi_scope.GetNameWithNoTooltip]"
  flavor_hun.390.desc: "[toldi_scope.GetName] має видатну схильність до військової справи, яку, втім, [Select_CString(toldi_scope.IsFemale,'їй', 'йому')] ще належить проявити. Присягнувши #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! та особисто монарху, [Select_CString(toldi_scope.IsFemale,'вона', 'він')] відтепер буде битися в наших лавах."
  flavor_hun.390.a: "Подивимося, як [Select_CString(toldi_scope.IsFemale,'ця жінка', 'цей чоловік')] покаже себе в бою."
  flavor_hun.390.b: "[Select_CString(toldi_scope.IsFemale,'Їй', 'Йому')] місце в нашій раді."
  flavor_hun.390.historical_info: "Міклош Толді довгий час вважався вигаданим фольклорним персонажем, проте нещодавні історичні знахідки підтвердили існування цієї людини, яка служила #italic алішпаном#! (віконтом), #italic варнадем#! (кастеляном) і навіть #italic фьоїшпаном#! (лорд-лейтенантом) при королях Карлі Роберті та Людовику Великому. Згодом він також командував найманцями в італійських походах Людовика, а в 1359 році доставив монарху двох левенят із Флоренції. Сказання про його подвиги особливо поширені в Нограді та Біхарі."
  flavor_hun.400.title: "Університет [location_scope.Custom('LR_GEN')|l] [location_scope.GetNameWithNoTooltip]"
  flavor_hun.400.desc: "Університети є центрами наукового та інтелектуального розвитку нації. Заснувавши такий заклад у своїй країні, ми зможемо прискорити її технічний поступ. Найбільш підходящим місцем для будівництва університету буде [location_scope.GetRank.GetName|l] [location_scope.GetName]."
  flavor_hun.400.a: "Профінансуємо будівництво університету."
  flavor_hun.400.b: "Нам це не по кишені."
  flavor_hun.400.historical_info: "Цей університет, заснований у 1367 році з благословення папи Урбана V за покровительства єпископа Вільгельма з Коппенбаха, став одним із перших закладів такого роду в Центральній Європі. Призначений насамперед для навчання латині та церковному праву, він позбавив угорських студентів необхідності здобувати освіту за кордоном. У ньому викладали такі впливові постаті, як Гальвано ді Болонья та єпископ Балінт Альшані, проте до кінця XIV століття він занепав. Сучасний університет міста Печ продовжує його інтелектуальні традиції, а в музеї його історії є експозиція, присвячена середньовічному періоду."
  flavor_hun.410.title: "Орден Дракона"
  flavor_hun.410.desc: "#L [turkish_scope.GetAdjective]а#! експансія становить загрозу не тільки для Балкан, а й для християнства загалом. Хоча в #TOOLTIP:POLICY,order_of_saint_george_policy,X #L ордені Святого Георгія#!#! складається чимало доблесних воїнів, його пріоритетом залишається служіння шляхетним ідеалам загалом, а не безпосереднє протистояння #italic Бичу Божому#!.\n\nСкликавши його лицарів та правителів сусідніх країн, [ruler_scope.GetName|l] [Select_CString(ruler_scope.IsFemale,'запропонувала', 'запропонував')] їм заснувати #TOOLTIP:POLICY,order_of_the_dragon_policy,X #L орден Дракона#!#! — новий #Y лицарський орден#!, спеціально призначений для боротьби з [turkish_scope.GetNameWithNoTooltip|l]им впливом та захисту християнства в ці важкі часи."
  flavor_hun.410.a: "Настав час ордену Дракона."
  flavor_hun.410.a.tt: "Усі [Concept('country', 'країни')|e], в яких прийнята #Y румунська#!, #Y угорська#!, #Y південнослов'янська#! або #Y албанська#! мова, зможуть вступити до #TOOLTIP:POLICY,order_of_the_dragon_policy,X #L ордену Дракона#!#!"
  flavor_hun.410.b: "Ми впораємося з [turkish_scope.GetAdjectiveWithNoTooltip|l]ою загрозою без сторонньої допомоги!"
  flavor_hun.410.historical_info: "12 грудня 1408 року, в період політичних заворушень та численних загроз з боку внутрішніх і зовнішніх ворогів, угорський король Сигізмунд Люксембурзький зі своєю дружиною Барбарою фон Цилли заснував орден Дракона. Ця організація, спочатку задумана як світське товариство, була натхненна орденом Святого Георгія, заснованим Карлом I Угорським, і оголосила своїм покровителем цього ж святого. Вона об'єднала дворян заради спільної справи захисту угорської корони, католицької церкви та християнства загалом від «віроломних ворогів» — насамперед, турків-османів. Символами ордену стали червоний хрест і дракон, що кусає себе за хвіст, а його лицарі приносили клятву вірності королю, королеві та їхнім спадкоємцям, отримуючи покровительство, почесті та привілеї в нагороду за доблесну службу."
  flavor_hun.411.title: "$flavor_hun.410.title$"
  flavor_hun.411.desc: "[our_ruler.GetName] щойно [Select_CString(our_ruler.IsFemale,'отримала', 'отримав')] послання. [founder_of_order_of_the_dragon.GetLongName] та [ruler_scope.GetName|l] з цієї країни пропонують [Select_CString(our_ruler.IsFemale,'їй', 'йому')] обговорити заснування #TOOLTIP:POLICY,order_of_the_dragon_policy,X #L ордену Дракона#!#!. Передбачається, що його члени спільно протистоятимуть зростаючій загрозі з боку #L [turkish_scope.GetAdjective|l]их#! турків."
  flavor_hun.411.a: "Цей орден захистить нас у майбутньому."
  flavor_hun.411.b: "Ми самі впораємося з [turkish_scope.GetNameWithNoTooltip|l]ою загрозою."
  flavor_hun.420.title: "[tournament_victor.GetNameWithNoTooltip] перемагає на турнірі!"
  flavor_hun.420.title.fallback: "Лицарський турнір закінчено!"
  flavor_hun.420.desc: "[first_tournament_participant.GetName] та [second_tournament_participant.GetName], найсильніші учасники турніру, зійшлися у вирішальному поєдинку заради слави та честі!\n\nПісля кількох дуелей та показових боїв герольди нарешті оголосили ім'я остаточного переможця — це [tournament_victor.GetNameWithNoTooltip], новий #italic лицар [ROOT.GetCountry.GetGovernment.GetAdjective]ого [ROOT.GetCountry.GetGovernment.GetCourtTitle]у#!!"
  flavor_hun.420.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_hun.420.a_tt: "Наш фаворит перемагає"
  flavor_hun.420.b: "Сумна новина…"
  flavor_hun.420.b_tt: "Наш фаворит програє"
  flavor_hun.420.c: "Забавно!"
  flavor_hun.420.c.tt: "У цьому бою немає переможця"
  flavor_hun.421.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий лицарський турнір"
  flavor_hun.421.desc: "Хоча в решті Європи лицарські турніри поступово виходять з моди, [ruler_scope.GetName|l] продовжує підтримувати цю благородну традицію. Ба більше, вважаючи участь у таких змаганнях ознакою справжньої лицарської честі, [Select_CString(ruler_scope.IsFemale,'вона', 'він')] навіть [Select_CString(ruler_scope.IsFemale,'заснувала', 'заснував')] нові нагороди для їхніх переможців.\n\nЦього року [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] проводить черговий традиційний турнір, на якому найкращі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] країни змагаються за прихильність [Select_CString(ruler_scope.IsFemale,'Її', 'Його')] Величності. Двоє з них, [first_tournament_participant.GetName] та [second_tournament_participant.GetName], вже проявили себе як найсильніші учасники — скоро вони зійдуться у фінальному поєдинку. Однак переможець може бути лише один…"
  flavor_hun.421.a: "[first_tournament_participant.GetNameWithNoTooltip] — ось наш фаворит."
  flavor_hun.421.a.tt: "Нашим фаворитом буде [first_tournament_participant.GetName]. У разі [Select_CString(first_tournament_participant.IsFemale,'її', 'його')] перемоги ми підвищимо свій [Concept('prestige', 'престиж')|e]."
  flavor_hun.421.b: "Нашим фаворитом буде [second_tournament_participant.GetNameWithNoTooltip]."
  flavor_hun.421.b.tt: "Нашим фаворитом буде [second_tournament_participant.GetName]. У разі [Select_CString(second_tournament_participant.IsFemale,'її', 'його')] перемоги ми підвищимо свій [Concept('prestige', 'престиж')|e]."
  flavor_hun.422.title: "Наслідки турніру"
  flavor_hun.422.desc: "Турнір завершився. [tournament_victor.GetName] та [tournament_loser.GetName] вже відчули на собі його наслідки.\n\n[tournament_victor.Custom('GetHungarianTournamentFate')]\n\n[tournament_loser.Custom('GetHungarianTournamentFate')]"
  flavor_hun.422.tournament_winning_character_big_gain: "Борючись на турнірі, [ROOT.GetCharacter.GetNameWithNoTooltip] не тільки не [Select_CString(ROOT.GetCharacter.IsFemale,'постраждала', 'постраждав')], а й багато чого [Select_CString(ROOT.GetCharacter.IsFemale,'навчилася', 'навчився')]. [Select_CString(ROOT.GetCharacter.IsFemale,'Її', 'Його')] знання в тактиці стали глибшими, рефлекси прискорилися, а рішучість і воля до перемоги суттєво зміцнилися."
  flavor_hun.422.tournament_winning_character_small_gain: "[ROOT.GetCharacter.GetNameWithNoTooltip] може пишатися: борючись на турнірі, [Select_CString(ROOT.GetCharacter.IsFemale,'вона', 'він')] помітно [Select_CString(ROOT.GetCharacter.IsFemale,'покращила', 'покращив')] свої військові навички. Нехай [Select_CString(ROOT.GetCharacter.IsFemale,'її', 'його')] майстерність приносить перемоги нашим військам!"
  flavor_hun.422.tournament_winning_character_small_loss: "Хоч [ROOT.GetCharacter.GetNameWithNoTooltip] і [Select_CString(ROOT.GetCharacter.IsFemale,'здобула', 'здобув')] перемогу, турнірні бої не пройшли для [Select_CString(ROOT.GetCharacter.IsFemale,'неї', 'нього')] дарма. Легка рана, отримана [Select_CString(ROOT.GetCharacter.IsFemale,'нею', 'ним')] в одному з поєдинків, серйозно запалилася і назавжди обмежила [Select_CString(ROOT.GetCharacter.IsFemale,'її', 'його')] боєздатність."
  flavor_hun.422.tournament_winning_character_big_loss: "Ціна перемоги виявилася дуже високою. Хоч [ROOT.GetCharacter.GetNameWithNoTooltip] і [Select_CString(ROOT.GetCharacter.IsFemale,'здобула', 'здобув')] гору над усіма суперниками, в одній з останніх сутичок [Select_CString(ROOT.GetCharacter.IsFemale,'вона', 'він')] невдало [Select_CString(ROOT.GetCharacter.IsFemale,'впала', 'впав')] з коня і незворотно [Select_CString(ROOT.GetCharacter.IsFemale,'пошкодила', 'пошкодив')] ноги. [Select_CString(ROOT.GetCharacter.IsFemale,'Вона', 'Він')] більше ніколи не зможе брати участь у битвах."
  flavor_hun.422.tournament_losing_character_big_gain: "Хоч [ROOT.GetCharacter.GetNameWithNoTooltip] і [Select_CString(ROOT.GetCharacter.IsFemale,'програла', 'програв')] на турнірі, можна сказати, що [Select_CString(ROOT.GetCharacter.IsFemale,'їй', 'йому')] дуже пощастило. У той час як багато інших учасників загинули або отримали важкі каліцтва, [Select_CString(ROOT.GetCharacter.IsFemale,'вона відбулася', 'він відбувся')] лише легкими подряпинами та ураженою гордістю."
  flavor_hun.422.tournament_losing_character_small_gain: "Поразки на турнірах нерідко супроводжуються травмами. Попри всі старання, [ROOT.GetCharacter.GetNameWithNoTooltip] все-таки [Select_CString(ROOT.GetCharacter.IsFemale,'пропустила', 'пропустив')] удар суперника і [Select_CString(ROOT.GetCharacter.IsFemale,'отримала', 'отримав')] легку рану, через яку в кров потрапила інфекція. На щастя, [Select_CString(ROOT.GetCharacter.IsFemale,'воїн залишився', 'воїтелька залишилася')] в живих, але в подальших битвах [Select_CString(ROOT.GetCharacter.IsFemale,'вона', 'він')] буде втомлюватися набагато швидше."
  flavor_hun.422.tournament_losing_character_small_loss: "[ROOT.GetCharacter.GetNameWithNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale,'виступила', 'виступив')] більш ніж гідно і [Select_CString(ROOT.GetCharacter.IsFemale,'могла', 'міг')] би здобути перемогу, але доля розпорядилася інакше. В одній з останніх сутичок [Select_CString(ROOT.GetCharacter.IsFemale,'вона', 'він')] невдало [Select_CString(ROOT.GetCharacter.IsFemale,'впала', 'впав')] з коня і незворотно [Select_CString(ROOT.GetCharacter.IsFemale,'пошкодила', 'пошкодив')] ноги. [Select_CString(ROOT.GetCharacter.IsFemale,'Вона', 'Він')] більше ніколи не зможе брати участь у битвах."
  flavor_hun.422.tournament_losing_character_big_loss: "Турніри нерідко закінчуються загибеллю лицарів. Ось і [ROOT.GetCharacter.GetNameWithNoTooltip], програвши поєдинок, [Select_CString(ROOT.GetCharacter.IsFemale,'позбулася', 'позбувся')] не тільки лицарської честі, а й життя. [Select_CString(ROOT.GetCharacter.IsFemale,'Вибита', 'Вибитий')] із сідла могутнім ударом списа, [Select_CString(ROOT.GetCharacter.IsFemale,'вона звалилася', 'він звалився')] прямо під копита коня, що скакав."
  flavor_hun.422.fallback: "[ROOT.GetCharacter.GetNameWithNoTooltip] [Select_CString(ROOT.GetCharacter.IsFemale,'отримала', 'отримав')] чимале задоволення, беручи участь у цій забаві."
  flavor_hun.422.a: "Така воля долі."
  flavor_hun.430.title: "Погнутий хрест на Святій короні"
  flavor_hun.430.desc: "[ROOT.GetCountry.GetLongName] — у цієї країни є найважливіша регалія [scope_holy_crown_of_hungary.GetName]: нею коронували всіх місцевих монархів з часів стародавнього Бели III.\n\nАле сьогодні, коли корону витягли зі скрині для коронації нового правителя, виявилося, що вона пошкоджена: хрест, що вінчає її, погнувся і тепер стоїть навскіс. Судячи з усього, якийсь презирний слуга, прибираючи безцінну реліквію на зберігання, обійшовся з нею без належної поваги."
  flavor_hun.430.a: "Відкладемо коронацію до відновлення корони."
  flavor_hun.430.b: "Відкладемо урочистості та покращимо зовнішній вигляд корони."
  flavor_hun.430.c: "Залишимо все як є. Це знак згори."
  flavor_hun.430.d: "Знайти винного! Випороти його, а заодно і всіх, хто нарікає через стан корони!"
  flavor_hun.440.title: "Порушення традиції"
  flavor_hun.440.desc: "[scope_holy_crown_of_hungary.GetName] використовувалася для коронації всіх угорських монархів з часів стародавнього Бели III.\n\nАле сьогодні ця традиція перервалася: [ruler_scope.GetName|l], стаючи [Select_CString(ruler_scope.IsFemale, 'новою королевою', 'новим королем' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [Select_CString(ruler_scope.IsFemale, 'поклала', 'поклав' )] на своє чоло зовсім іншу корону.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вкрай незадоволені відсутністю стародавньої реліквії — багато хто з них навіть вважає коронацію нелегітимною."
  flavor_hun.440.a: "Ми повинні повернути її за будь-яку ціну!"
  flavor_hun.450.title: "Розширення замку Буди"
  flavor_hun.450.desc: "Тепер, коли [GetCountry('HUN').GetName] стала по-справжньому впливовою та могутньою, у нас виникла потреба в новій королівській резиденції, гідній величі, багатства та престижу нашої країни. Старий замок, що дивиться на столичну #TOOLTIP:LOCATION,buda,X #L Буду#!#! з вершини високого пагорба, вже багато років залишається символом нашої славної спадщини, проте на тлі резиденцій сучасних західних монархів він виглядає дещо блякло. Все частіше лунають заклики оновити цей замок, щоб він не поступався найрозкішнішим європейським палацам."
  flavor_hun.450.a: "Чудова ідея!"
  flavor_hun.450.b: "На жаль, це занадто дорого."
  flavor_hun.460.title: "Ілюстрована хроніка"
  flavor_hun.460.desc: "Визнаючи необхідність збереження багатої #L [ROOT.GetCountry.GetAdjective|l]ої#! історії для майбутніх поколінь, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] запропонував замовити написання нової хроніки, яка охоплюватиме кілька століть існування нашої країни. Цей грандіозний манускрипт, створений найкращими вченими та художниками країни, стане справжнім витвором мистецтва, що ілюструє найважливіші події, які впливали на перебіг [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої історії. Він стане свідченням нашого великого минулого та символом нашої національної гордості. Однак для створення такого шедевра доведеться витратити чималу суму грошей."
  flavor_hun.460.a: "Нам слід віддати належне своїй багатій історії."
  flavor_hun.460.b: "Ми вкладемо ці кошти у щось важливіше."
  flavor_hun.460.historical_info: "Багато прикрашений манускрипт #italic «Ілюстрована хроніка»#!, присвячений ключовим подіям угорської історії, був створений у XIV столітті на замовлення короля Людовика I Угорського."
  flavor_hun.470.title: "Privilegium Pro Slavis"
  flavor_hun.470.desc: "Нещодавно в нашій країні спалахнув конфлікт між #TOOLTIP:CULTURE,$slovak_tt$,X #L словацькими#!#! та #TOOLTIP:CULTURE,$german_carpathian_tt$,X #L карпатсько-німецькими#!#! громадами через давню традицію почергово висувати мерів та виділяти рівну кількість місць у міських радах. Представники карпатських німців, усвідомлюючи свій зростаючий вплив та економічну перевагу, відкрито нехтують цією традицією, що викликає невдоволення словаків. Можливо, нам слід висловити власну позицію щодо цього делікатного питання."
  flavor_hun.470.a: "Підтримаємо словацькі громади."
  flavor_hun.470.b: "Підтримаємо карпатсько-німецькі громади."
  flavor_hun.470.c: "Не будемо втручатися в їхні чвари."
  support_slovak_side: "Усі #TOOLTIP:CULTURE,$slovak_tt$,X #L словацькі#!#! [Concept('pops', 'групи населення')|e] в #TOOLTIP:AREA,slovakia_area,X #L Словаччині#!#! отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  support_german_carpathian_side: "Усі #TOOLTIP:CULTURE,$german_carpathian_tt$,X #L карпатсько-німецькі#!#! [Concept('pops', 'групи населення')|e] в #TOOLTIP:AREA,slovakia_area,X #L Словаччині#!#! отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_hun.470.historical_info: "Указ #italic Privilegium Pro Slavis#!, виданий королем Людовиком I у 1381 році, надав привілеї словацькому населенню, обуреному тим, що німці не поважають такі їхні старі звичаї, як чергування мерів та рівне представництво в міських радах. Нехтування цими звичаями нерідко призводило до конфліктів."
  flavor_hun.480.title: "Заколот [GetCountry('HAB').GetAdjectiveWithNoTooltip|l]ого дворянства"
  flavor_hun.480.desc: "Контролювати #L [GetCountry('HAB').GetAdjective|l]і#! землі стає все важче: не бажаючи вважати себе підкореною нацією, місцеві жителі вимагають прав і представництва у владі. Дехто вважає, що для вирішення цієї проблеми слід знову надати їм автономію. Звісно, для нас подібна поступка заколотникам буде не лише кроком назад, а й великою ганьбою, однак з внутрішньою кризою, що назріває, треба щось робити."
  flavor_hun.480.a: "Це не обговорюється!"
  flavor_hun.480.b: "Нам слід поступитися їхнім вимогам."
  austrian_nobles: "Повстання австрійської знаті"
  austrian_nobles_joining: "Усі #TOOLTIP:CULTURE,$danube_bavarian_tt$,X #L дунайсько-баварські#!#! [Concept('pops', 'групи населення')|e] приєднаються до групи «[austrian_nobles.GetName]»"
  flavor_hun.490.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.490.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'одна', 'один' )] з ключових командирів Чорного війська #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'служила', 'служив' )] баном #TOOLTIP:AREA,croatia_area,X #L Хорватії#!#!, #TOOLTIP:AREA,slavonia_area,X #L Славонії#!#! та #TOOLTIP:AREA,bosnia_area,X #L Боснії#!#!, воєводою #TOOLTIP:AREA,transylvania_area,X #L Трансильванії#!#! та капітаном гірських областей. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] хоробрість і вірність короні принесли чималу користь [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ому війську. [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'зіграла', 'зіграв' )] ключову роль у багатьох битвах у таких регіонах, як [ROOT.GetCountry.GetNameWithNoTooltip], [GetCountry('BOH').GetName] та #TOOLTIP:REGION,balkan_region,X #L Балкани#!#!. Настав час винагородити [Select_CString(target_character.IsFemale, 'цю славну дочку', 'цього славного сина' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, давши [Select_CString(target_character.IsFemale, 'їй', 'йому' )] почесну посаду, гідну [Select_CString(target_character.IsFemale, 'її', 'його' )] багаторічної бездоганної служби."
  flavor_hun.490.a: "[Select_CString(target_character.IsFemale, 'Вона повинна', 'Він повинен' )] знову очолити наші війська!"
  flavor_hun.490.b: "Ми застосуємо [Select_CString(target_character.IsFemale, 'її', 'його' )] досвід в іншій галузі."
  flavor_hun.490.historical_info: "Заслужений полководець Балаж Мадяр відіграв ключову роль у військових походах Матяша Корвіна. Регулярне наймане військо угорців, назване Чорним військом, завоювало великі території в Австрії та більше половини земель Богемії, а також здобуло низку великих перемог над османами. Ці досягнення стали можливими завдяки лідерським якостям та стратегічному таланту Мадяра, який став однією з найважливіших фігур у військовій історії Угорщини."
  flavor_hun.500.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.500.desc: "[target_character.GetName] — це [Select_CString(target_character.IsFemale, 'наша велика воєначальниця', 'наш великий воєначальник' )], яка деякий час [Select_CString(target_character.IsFemale, 'служила', 'служив' )] при #L [ROOT.GetCountry.GetAdjective|l]ому#! дворі. Завдяки своєму видатному таланту [Select_CString(target_character.IsFemale, 'вона здобула', 'він здобув' )] чимало перемог над #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турками#!#! та іншими ворогами, не програвши жодної битви. Вже довгий час [Select_CString(target_character.IsFemale, 'вона', 'він' )] одноосібно відповідає за оборону величезних територій від #TOOLTIP:AREA,slavonia_area,X #L Славонії#!#! до #TOOLTIP:AREA,transylvania_area,X #L Трансильванії#!#!, одночасно виконуючи низку інших адміністративних завдань. Зараз [Select_CString(target_character.IsFemale, 'її', 'його' )] військова кар'єра добігає кінця, але [ROOT.GetCountry.GetFlavorRank|l] може використати його досвід в інших галузях. Що ми доручимо [Select_CString(target_character.IsFemale, 'цій славній жінці', 'цьому славному чоловікові' )]?"
  flavor_hun.500.a: "Нехай наглядає за військом."
  flavor_hun.500.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] потребує таких людей. Запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] посаду."
  flavor_hun.500.historical_info: "Пал Кініжі був одним із найвідоміших полководців Чорного війська Матяша Корвіна. Його блискучі перемоги над османами наприкінці XV століття суттєво вплинули на подальшу історію регіону. Так, після битви на Хлібовому полі 1479 року, в якій військо Кініжі розбило війська Алі-бея, що втричі переважали його, турки надовго залишили Угорщину в спокої."
  flavor_hun.510.title: "[ShowBuildingTypeNameWithNoTooltip('bibliotheca_corviniana')]"
  flavor_hun.510.desc: "Поки ідеї #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! поширюються континентом подібно до лісової пожежі, запалюючи полум'я наукового та культурного відродження, наші придворні щосили обговорюють нові перспективи, а вчені, творці та мислителі, натхненні свіжими ідеями, вже збираються в наших містах. Є пропозиція побудувати для них грандіозну бібліотеку в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName], завдяки якій #ONCLICK:COUNTRY,[GetCountry('HUN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HUN').Custom('CL_tt')],X [GetCountry('HUN').Custom('CL_ACC')|L]#!#! стануть вважати справжнім оплотом Відродження. Втім, фінансування такого проєкту обійдеться досить дорого. Чи слід нам вкладати кошти в будівництво #TOOLTIP:BUILDING_TYPE,bibliotheca_corviniana,X #L Бібліотеки Корвіна#!#!?"
  flavor_hun.510.a: "Приголомшлива ідея!"
  flavor_hun.510.b: "Нам це не по кишені."
  flavor_hun.510.historical_info: "Матяш Корвін, прозваний Королем Відродження, покровительствував мистецтву та науці: за його правління саме Угорщина стала першою країною за межами Італії, яка прийняла ідеї Ренесансу. Ключову роль у культурному відродженні Угорщини відіграла Бібліотека Корвіна — найважливіший центр обміну знаннями та їх поширення по всій країні. Вона приваблювала вчених з усієї Європи, які вносили свій внесок в інтелектуальну палітру країни. Ставши справжнім символом угорської пристрасті до пізнання світу, ця бібліотека наочно показала важливість покровительства влади у розвитку науки та інновацій."
  flavor_hun.520.title: "Замок Бран"
  flavor_hun.520.desc: "Хоча Карпатські гори — наш природний рубіж оборони, їх слабким місцем залишаються перевали, через які ворог може легко проникнути в країну. Наші #TOOLTIP:CULTURE,$german_transylvanian_tt$,X #L трансильвансько-німецькі#!#! піддані пропонують спільними зусиллями побудувати замок у #TOOLTIP:LOCATION,brasov,X #L Брашові#!#! для охорони одного з таких перевалів."
  flavor_hun.520.a: "Чудова ідея!"
  flavor_hun.520.b: "Краще зміцнимо оборону в цілому."
  flavor_hun.520.c: "Ми не можемо дозволити собі подібних вкладень."
  flavor_hun.520.historical_info: "Замок Бран був побудований у XIV столітті трансильванськими німцями з міста Кронштадт (нині Брашов) для захисту стратегічно важливого гірського перевалу та контролю регіону в цілому."
  flavor_hun.530.title: "Пробудження словацької нації"
  flavor_hun.530.desc: "До значного числа народів, домом для яких стала Верхня [GetCountry('HUN').GetName] з її багатими покладами корисних копалин, належать і #TOOLTIP:CULTURE,$slovak_tt$,X #L словаки#!#!. Натхненні розквітом панславізму та ідеалами #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#!, словацькі інтелектуали та мислителі мріють про створення єдиного народу з особливим статусом та автономією в межах країни. Вони без упину кодифікують та впорядковують мову свого народу, закладаючи основи його майбутньої літературної традиції. Підтримавши цей дух національного відродження, ми дозволимо словакам відчути єдність та гордість. З іншого боку, надання їм автономії врешті-решт може призвести до розпаду країни."
  flavor_hun.530.a: "Настав час надати словакам більше привілеїв."
  flavor_hun.530.b: "Це може стати небезпечним прецедентом."
  flavor_hun.530.historical_info: "Хоча пробудження словацької нації призвело до кодифікації її мови та створення важливих культурних інститутів, мрії словаків про автономію так і не здійснилися. Уряд Угорщини ухвалив низку репресивних законів, що підвищували статус угорської мови та ідентичності на шкоду національним меншинам."
  hungary_accepted_slovak_autonomy: "Усі #TOOLTIP:CULTURE,$slovak_tt$,X #L словацькі#!#! [Concept('pops', 'групи населення')|e] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  hungary_rejected_slovak_autonomy: "Усі #TOOLTIP:CULTURE,$slovak_tt$,X #L словацькі#!#! [Concept('pops', 'групи населення')|e] втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_hun.540.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.540.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'яка входить', 'який входить' )] до числа провідних мислителів та релігійних діячів #TOOLTIP:AREA,transylvania_area,X #L Трансильванії#!#!, відіграє важливу роль у поширенні #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#! серед #TOOLTIP:CULTURE,$german_transylvanian_tt$,X #L трансильвансько-німецького#!#! населення. [Select_CString(target_character.IsFemale, 'Ця вчена та гуманістка', 'Цей вчений та гуманіст' )] з #TOOLTIP:LOCATION,fagaras,X #L Фегераша#!#! [Select_CString(target_character.IsFemale, 'здобула', 'здобув' )] освіту в Німеччині, де й [Select_CString(target_character.IsFemale, 'перейнялася', 'перейнявся' )] ідеями реформації, а після повернення до Трансильванії [Select_CString(target_character.IsFemale, 'стала', 'став' )] проповідувати протестантизм серед місцевих саксонців. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] красномовні проповіді, мудрі трактати та постійні вимоги реформ знаходять відгук у серцях місцевих жителів, поступово відвертаючи їх від традиційного #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтва#!#!."
  flavor_hun.540.a: "Нехай буде так."
  hungary_transylvanian_germans_convert: "#Y 30%#! усіх #TOOLTIP:CULTURE,$german_transylvanian_tt$,X #L трансильвансько-німецьких#!#! [Concept('pops', 'груп населення')|e] приймає #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!."
  flavor_hun.540.historical_info: "Навернення саксонців у протестантизм під керівництвом Хонтеруса помітно змінило релігійну та культурну ідентичність Трансильванії. Вплив цього проповідника був настільки великий, що майже всі трансильванські регіони, де проживали саксонці, стали протестантськими. Вірність католицтву зберегли лише кілька невеликих областей."
  flavor_hun.550.title: "Відень — нова столиця"
  flavor_hun.550.desc: "Продовживши свій тріумфальний марш територією #TOOLTIP:AREA,austria_area,X #L Нижньої Австрії#!#!, наші війська здобули рішучу перемогу та захопили імперську столицю #TOOLTIP:LOCATION,vienna,X #L Відень#!#!. Дехто вже пропонує перенести туди нашу столицю, щоб забезпечити повний контроль над регіоном та всією #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священною Римською Імперією#!#!. Але, хоча захоплення Відня — справді вражаючий успіх, у цієї ідеї є й противники, які закликають до обережності. [ROOT.GetCountry.GetCapital.GetName] вже багато років залишається серцем нашої країни, і відмовлятися від спадщини цього міста було б нерозумно."
  flavor_hun.550.a: "Чудова ідея!"
  flavor_hun.550.b: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] нас цілком влаштовує."
  flavor_hun.550.historical_info: "У 1485 році Матяш Корвін переніс угорську столицю до Відня, щоб посилити контроль над територією Австрії та консолідувати свою владу над Священною Римською імперією."
  STATIC_MODIFIER_NAME_new_hungarian_capital: "Нова столиця Угорщини"
  flavor_hun.560.title: "Трипартитум"
  flavor_hun.560.desc: "Кодекс «Трипартитум», також іменований #italic Opus Tripartitum#!, об'єднав та впорядкував норми [GetCountry('HUN').GetAdjectiveWithNoTooltip|l]ого звичаєвого права. Завдяки йому у #ONCLICK:COUNTRY,[GetCountry('HUN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('HUN').Custom('CL_tt')],X [GetCountry('HUN').Custom('CL_GEN')|L]#!#! з'явився всеосяжний звід законів, що регулюють життя всіх класів та станів суспільства. Провівши титанічну роботу зі складання цього кодексу, придворні юристи підкреслили прагнення нашої країни до розвитку законодавства та зміцнення його авторитету. Але, незважаючи на це, «Трипартитум» все ще не отримав офіційного визнання в усіх регіонах нашої країни."
  flavor_hun.560.a: "Негайно це здійснити!"
  flavor_hun.560.b: "Такі кодекси нам ні до чого."
  flavor_hun.570.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hun.570.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'прославилася', 'прославився' )] як юрист, придворний радник та головний імператорський бібліотекар. Також [Select_CString(target_character.IsFemale, 'вона', 'він' )] серйозно займається історією та є [Select_CString(target_character.IsFemale, 'затятою прихильницею', 'затятим прихильником' )] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!.\n\nПроведені [Select_CString(target_character.IsFemale, 'нею', 'ним' )] дослідження народів заклали основи етнології як наукової дисципліни та принесли [Select_CString(target_character.IsFemale, 'їй', 'йому' )] репутацію [Select_CString(target_character.IsFemale, 'засновниці', 'засновника' )] панславізму — руху, що об'єднує #L [ShowCultureGroupName('slavic_group')|l]і#! народи.\n\nДуже шкода, що така видатна персона, яка народилася на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, служить іноземному монарху. Можливо, ми могли б запропонувати [Select_CString(target_character.IsFemale, 'цій вченій', 'цьому вченому' )] посаду при нашому дворі, щоб [Select_CString(target_character.IsFemale, 'вона могла', 'він міг' )] служити інтересам своєї батьківщини."
  flavor_hun.570.a: "Ми знайдемо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] відповідну придворну посаду!"
  flavor_hun.570.b: "Нехай служить там, де служить."
  flavor_hun.580.title: "Евакуація столиці"
  flavor_hun.580.desc: "У світлі недавньої #L [GetCountry('TUR').GetAdjective|l]ої#! експансії наш столичний [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetName] опинився в дуже вразливому становищі. Він непогано укріплений, але якщо противник візьме його в облогу, навколишній ландшафт не дасть захисникам абсолютно ніяких переваг. Через це багато хто пропонує перенести столицю в інше місто, розташоване подалі від [GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ого кордону. Найкращим кандидатом для цього виглядає верхньо-[ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]є місто #TOOLTIP:LOCATION,bratislava,X #L Прешпорок#!#!."
  flavor_hun.580.a: "Нехай [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] переїде до міста Прешпорок."
  flavor_hun.580.b: "Ми не можемо покинути [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]!"
  flavor_hun.580.historical_info: "Після нищівної поразки в битві при Могачі 1526 року угорська столиця була перенесена до міста Пресбург, нині відомого як Братислава. Це місто залишалося столицею країни понад 250 років."
  flavor_hun.590.title: "Походження гусарів"
  flavor_hun.590.desc: "[ROOT.GetCountry.GetLongName] — у смутні роки, що настали після #L [GetCountry('TUR').GetAdjective|l]ого#! вторгнення на #TOOLTIP:REGION,balkan_region,X #L Балкани#!#!, численні #TOOLTIP:CULTURE,$serbian_tt$,X #L сербські#!#! біженці ринули сюди заради безпеки та нових можливостей. Серед них були досвідчені воїни, які покинули рідні землі, але не втратили бойовий дух. Оселившись на території [GetCountry('HUN').Custom('CL_GEN')], вони об'єдналися в своєрідні загони, від яких і походять знамениті гусари. Ця слабозахищена, але винятково маневрена кіннота ідеально підходила для того, щоб завдавати стрімких ударів, виснажувати ворогів і вселяти жах у серця ворогів. Незабаром гусари довели свою ефективність у бою та набули репутації елітної кавалерії."
  flavor_hun.590.a: "Вони ще послужать нам."
  flavor_hun.590.b: "Перетворимо їх на регулярний підрозділ."
  flavor_hun.590.historical_info: "Незважаючи на своє скромне походження, гусари стали одним із найзнаменитіших військових підрозділів Центральної Європи. Вони служили в Чорному війську Угорщини та брали участь у Тридцятилітній війні. Пізніше аналогічні підрозділи з'явилися і в Польщі, де дали початок одному з найгрізніших і найлегендарніших видів кавалерії — крилатим гусарам."