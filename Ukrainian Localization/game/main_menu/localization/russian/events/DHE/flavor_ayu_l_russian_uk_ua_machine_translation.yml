l_russian:
  flavor_ayu.1.title: "Заснування Аюттхаї"
  flavor_ayu.1.desc: "Об'єднавши під своєю владою колишні володіння #ONCLICK:COUNTRY,[GetCountry('LAV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LAV').Custom('CL_tt')],X [GetCountry('LAV').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ADH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ADH').Custom('CL_tt')],X [GetCountry('ADH').Custom('CL_GEN')|L]#!#!, [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'задумалася', 'задумався' )] про більше. Скориставшись своїми тісними зв'язками з жителями #ONCLICK:COUNTRY,[GetCountry('SPN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SPN').Custom('CL_tt')],X [GetCountry('SPN').Custom('CL_GEN')|L]#!#!, [Select_CString(target_ruler.IsFemale, 'вона запропонувала', 'він запропонував' )] побудувати нову столицю в [target_location.Custom('LR_PREP')|l] [target_location.GetName], щоб звідти правити всіма цими землями як єдиною країною. Місту, як і всій країні, дали #TOOLTIP:CULTURE,$thai_culture_tt$,X #L тайську#!#! назву «Аюттхая», нетипову для раніше #TOOLTIP:LANGUAGE,sanskrit_language,X #L санскритської#!#! культури [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
  flavor_ayu.1.a: "Це місто і країна піднесуться над усіма!"
  flavor_ayu.1.b: "Одне-єдине місто не може представляти всю країну."
  flavor_ayu.1.c: "Краще витратити кошти на щось інше."
  flavor_ayu.2.title: "[target_ruler.GetNameWithNoTooltip] та [Select_CString(target_ruler.IsFemale, 'її', 'його' )] реформи"
  flavor_ayu.2.desc: "Наша адміністрація досить ефективно справляється з управлінням країною, однак [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'виявила', 'виявив' )] окремі проблеми в роботі державного апарату та [Select_CString(target_ruler.IsFemale, 'запропонувала', 'запропонував' )] низку реформ для їх усунення. Багато ідей вельми розумні, однак їх реалізація може надовго зупинити налагоджений механізм нашої бюрократії. Крім того, багато чиновників скептично ставляться до нововведень."
  flavor_ayu.2.historical_info: "За час свого правління в Аюттхаї король Боромотрайлоканат здійснив безліч реформ. Він заснував питомо тайські органи управління #italic «калахом»#! та #italic «махаттаї»#!, які згодом трансформувалися в міністерство оборони та внутрішніх справ відповідно, упорядкував феодальну структуру та соціальну ієрархію в межах системи #italic «сакдіна»#! та забезпечив стабільність престолонаслідування. Деякі з цих інститутів існували й раніше, але саме реформи Боромотрайлоканата в 1454 році перетворили їх на фундамент державного апарату, який прослужить Аюттхаї та наступним тайським країнам аж до 1892 року."
  flavor_ayu.2.a: "Покращувати, покращувати і ще раз покращувати!"
  flavor_ayu.2.b: "Навіщо змінювати те, що й так працює?"
  flavor_ayu.3.title: "[target_ruler.GetNameWithNoTooltip] та [Select_CString(target_ruler.IsFemale, 'її', 'його' )] військові реформи"
  flavor_ayu.3.desc: "Наші збройні сили — гордість усієї країни, але навіть у такому могутньому війську завжди є що вдосконалити. [target_ruler.GetName] пропонує низку військових реформ, включно з підготовкою повноцінного підрозділу бойових слонів. Звісно, військо має постійно розвиватися, але багато хто сумнівається, що ці амбітні плани пройдуть перевірку реальним боєм."
  flavor_ayu.3.a: "Військам потрібні навчання та постійні вдосконалення."
  flavor_ayu.3.b: "Краще зосередитися на перевірених методах."
  flavor_ayu.4.title: "[target_ruler.GetNameWithNoTooltip] та [Select_CString(target_ruler.IsFemale, 'її', 'його' )] економічні реформи"
  flavor_ayu.4.desc: "[target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'запропонувала', 'запропонував' )] низку реформ для розвитку торгівлі та підвищення добробуту [ROOT.GetCountry.Custom('rank_ua_GEN')|l]. Строго кажучи, з нашою економікою і так все гаразд, однак вигода від подальшого розвитку торгових шляхів безсумнівна."
  flavor_ayu.4.a: "Ніщо не повинно заважати торгівлі."
  flavor_ayu.4.a.tt: "Багато [Concept('locations', 'місцевостей')|e] нашої країни отримають [ShowNamedValue('development_weak_bonus')|+=] до [Concept('development', 'розвитку')|e]"
  flavor_ayu.4.b: "Державне втручання торгівлі лише зашкодить."
  flavor_ayu.5.title: "Створення сучасної [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ої країни"
  flavor_ayu.5.desc: "[target_ruler.GetName] — воістину [Select_CString(target_ruler.IsFemale, 'видатна та освічена правителька', 'видатний та освічений правитель' )]. [Select_CString(target_ruler.IsFemale, 'Вона', 'Він' )] мріє поставити #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! в один ряд з найвеличнішими імперіями в історії та твердо [Select_CString(target_ruler.IsFemale, 'має намір', 'має намір' )] направити країну на новий шлях. Переслідуючи цю мету, [target_ruler.GetNameWithNoTooltip] пропонує перенести столицю трохи південніше [target_location.Custom('LR_GEN')|l] [target_location.GetName], а потім провести всеосяжну адміністративну реформу."
  flavor_ayu.5.historical_info: "Падіння королівства Аюттхая супроводжувалося потрясіннями, війнами та численними внутрішніми конфліктами. На чолі боротьби за звільнення Сіаму від бірманських загарбників став король Таксин, у минулому воєвода війська Аюттхаї. Вигнавши окупантів, він знову об'єднав країну, що розпалася на володіння кількох воєначальників, і переніс столицю до Тхонбурі, частиною якого було село Бангкок. Десять років потому Таксин був повалений і страчений, а Бангкок став столицею нової тайської країни — королівства Раттанакосін."
  flavor_ayu.5.a: "Це початок нової ери!"
  flavor_ayu.5.b: "Важливіше розуміти, хто ми є, а не мріяти про те, ким ми могли б стати."
  flavor_ayu.6.title: "[ShowBuildingTypeNameWithNoTooltip('wat_chaiwatthanaram_temple_building')]"
  flavor_ayu.6.desc: "[target_ruler.GetName] бажає нагадати всьому світу, що [ROOT.GetCountry.GetName] — щиро віруюча #L [ROOT.GetCountry.GetReligion.GetAdjective|l]а#! країна. [Select_CString(target_ruler.IsFemale, 'Вона має намір', 'Він має намір' )] побудувати в [target_location.Custom('LR_PREP')|l] [target_location.GetName] великий храм — зримий символ могутності [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої влади. [ROOT.GetCountry.GetGovernment.GetRulerTitle|U] особисто збирається проводити там релігійні церемонії, щоб підкреслити [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ий характер правлячої династії."
  flavor_ayu.6.historical_info: "У 1630 році король Прасат Тхонг на згадку про свою матір звів свій перший храм — Ват Чайваттханарам («Храм довгого правління та славної доби»). Храм був побудований у питомо кхмерському стилі, там проводилися релігійні церемонії царської родини та кремація померлих принців і принцес. Зовнішню стіну прикрашало 120 статуй сидячого Будди, покритих чорною фарбою та позолотою, а навколо центральної платформи височіло вісім каплиць-чеді, всередині яких також знаходилися статуї Будди. Зовнішні стіни каплиць були покриті 12 барельєфами, що зображували сцени з життя Будди, внутрішні ж були розписані фресками. Конструкція храму відображала буддійську космологію: центральна вежа символізувала світову вісь, а чотири менші вежі, що оточували її, уособлювали чотири континенти, розташовані по чотирьох сторонах світу."
  flavor_ayu.6.a: "[ShowBuildingTypeNameWithNoTooltip('wat_chaiwatthanaram_temple_building')] освітить нам шлях."
  flavor_ayu.6.b: "У нас і без того достатньо храмів."
  flavor_ayu.7.title: "Нові горизонти"
  flavor_ayu.7.desc: "В останні роки кордони нашого світу ніби розсунулися, біля наших берегів все частіше зупиняються купці з далеких країн. Важко заперечувати вигоду, що приноситься культурним і товарним обміном з чужоземними торговцями, проте багато хто при дворі побоюється, що [target_ruler.GetName] може потрапити під вплив іноземців. Можна ввести деякі обмеження на пересування іноземних купців, але це неминуче налаштує їх проти нас. Водночас повна свобода торгівлі може призвести до внутрішніх конфліктів…"
  flavor_ayu.7.a: "Треба посилити контроль над торгівлею."
  flavor_ayu.7.b: "Нехай торгують вільно."
  flavor_ayu.8.title: "Слід Будди"
  flavor_ayu.8.desc: "Один мисливець знайшов у [target_location.Custom('LR_PREP')|l] [target_location.GetName] калюжку з водою, що формою нагадує відбиток стопи. Деякі стверджують, що це слід самого Будди. Відомо, що за життя Будда залишив відбитки своїх ніг у всіх країнах, де буде визнано його вчення, тому ніхто не здивований, що його слід знайшовся і на нашій території. Жителі [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip], та й усієї країни, просять, щоб [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'облаштувала', 'облаштував' )] належне місце для збереження та вшанування священного відбитка."
  flavor_ayu.8.historical_info: "У 1624 році один мисливець виявив у Сарабурі заглиблення в камені, яке визнали відбитком стопи Будди. Король Аюттхаї Сонгтам наказав звести над святинею храм, названий Ват Пхра Пхуттхабат."
  flavor_ayu.8.a: "Це й справді знак згори."
  flavor_ayu.8.b: "Звичайне природне явище."
  flavor_ayu.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ayu.9.desc: "До нашої країни [Select_CString(target_character.IsFemale, 'прибула', 'прибув' )] вельми [Select_CString(target_character.IsFemale, 'примітна іноземка', 'примітний чужоземець' )] на ім'я [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона побувала', 'Він побував' )] у багатьох країнах, володіє кількома мовами та має безліч талантів. [target_ruler.GetName] одразу [Select_CString(target_ruler.IsFemale, 'помітила', 'помітив' )] [Select_CString(target_character.IsFemale, 'незвичайну гостю', 'незвичайного гостя' )], побачивши в [Select_CString(target_character.IsFemale, 'ній', 'ньому' )] цінне надбання для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого двору — не в останню чергу завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] вмінням рахівника. Проте призначення [Select_CString(target_character.IsFemale, 'іноземки', 'чужоземця' )] на важливу придворну посаду може викликати невдоволення найвпливовіших осіб [ROOT.GetCountry.Custom('rank_ua_GEN')|l]. Вони напевно побачать у [Select_CString(target_character.IsFemale, 'її', 'його' )] піднесенні загрозу власним позиціям…"
  flavor_ayu.9.historical_info: "Грецький купець та авантюрист Константинос Геракіс, службовець англійської Ост-Індської компанії, прибув до Сіаму в 1675 році. В Англії Геракіс змінив своє прізвище (грецькою означало «сокіл») на англійський аналог — Фалкон. Він вільно володів тайською, англійською, французькою, португальською та малайською мовами, що дозволило йому обійняти посаду перекладача при дворі короля Нарая. Незабаром Нарай наблизив чужоземця, Фалкон став довіреною особою короля та здобув величезний вплив при сіамському дворі.\n\nБагато придворних були розгнівані тим, що король обдаровує своєю милістю іноземця. Зрештою це погубило їх обох. Коли Нарай тяжко захворів, у країні пішли чутки про те, ніби Фалкон задумав узурпувати владу, використовуючи спадкового принца Пхра Пі як маріонетку. У відповідь родич Нарая Пра Петрача влаштував державний переворот, що увійшов в історію як Сіамська революція 1688 року. Фалкон і спадкоємець закінчили життя на пласі, через кілька днів помер і сам король Нарай, і тоді Петрача оголосив себе новим королем Сіаму."
  flavor_ayu.9.a: "[Select_CString(target_character.IsFemale, 'Ця жінка дуже важлива', 'Цей чоловік дуже важливий' )] для [ROOT.GetCountry.Custom('rank_ua_GEN')|l]!"
  flavor_ayu.9.b: "Чужоземець завжди залишається чужоземцем."
  flavor_ayu.1000.title: "[target_country.GetAdjectiveWithNoTooltip|l]е питання"
  flavor_ayu.1000.desc: "[target_country.GetLongName] — давно вже не та могутня країна, що наводила страх на сусідів. Зараз це всього лише скромний васал #ONCLICK:COUNTRY,[target_origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_origin_country.Custom('CL_tt')],X [target_origin_country.Custom('CL_GEN')|L]#!#!. [target_country.GetGovernment.GetRulerTitle] [target_country.Custom('CL_GEN')] нещодавно [Select_CString(target_country.GetGovernment.GetRuler.IsFemale, 'померла', 'помер' )], і [target_ruler.GetName], відчувши можливість зміцнити свою владу, бажає, щоб країною [Select_CString(target_origin_country.GetGovernment.GetHeir.IsFemale, 'правила', 'правив' )] [Select_CString(target_ruler.IsFemale, 'її', 'його' )] [target_origin_country.GetGovernment.GetHeirTitle|l]. Безсумнівно, це сприятиме тіснішій інтеграції [target_country.Custom('rank_ua_GEN')|l] з [target_origin_country.Custom('CL_INST')] і піде на користь обом країнам."
  flavor_ayu.1000.historical_info: "Після смерті короля Сукхотаї Махі Таммарачи IV у 1438 році володар Аюттхаї Бороморача II призначив правителем Сукхотаї свого семирічного сина Боромотрайлоканата, також відомого як Трайлок. Коли Трайлоку виповнилося 15 років, батько відправив його до столиці Сукхотаї керувати васальним королівством від його імені. Після смерті Бороморачи II принц Боромотрайлоканат також успадкував і трон Аюттхаї, об'єднавши обидві країни під своєю владою."
  flavor_ayu.1000.a: "[target_heir.GetNameWithNoTooltip] — [target_country.GetGovernment.GetRulerTitle|l] [target_country.Custom('CL_GEN')], і крапка."
  flavor_ayu.1000.b: "Відправимо їм нашу пропозицію."
  flavor_ayu.1000.c: "Поточний стан справ нас цілком влаштовує."
  flavor_ayu.1001.title: "$flavor_ayu.1000.title$"
  flavor_ayu.1001.desc: "$flavor_ayu.1000.desc$"
  flavor_ayu.1001.a: "Нехай [target_heir.GetNameWithNoTooltip] успадкує владу."
  flavor_ayu.1001.b: "Ми відкидаємо цю пропозицію."
  flavor_ayu.1002.title: "Відповідь [target_country.Custom('CL_GEN')]"
  flavor_ayu.1002.desc_heir_accepted: "[target_country.GetLongName] розсудливо погоджується з тим, що [Select_CString(target_heir.IsFemale, 'наша', 'наш' )] [ROOT.GetGovernment.GetHeirTitle|l] чудово підходить на роль [Select_CString(target_heir.IsFemale, 'правительки', 'правителя' )]. [target_heir.GetName] гідно керуватиме країною, а ми отримаємо чимало користі з міцних зв'язків, що об'єднують наші країни."
  flavor_ayu.1002.desc_heir_refused: "Дурні з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! відкинули нашу мудру та великодушну пропозицію! Вони не бажають, щоб ними [Select_CString(target_heir.IsFemale, 'правила', 'правив' )] [target_heir.GetName]. Що ж, тим гірше для них — так чи інакше, ми все одно зробимо їх частиною своєї країни."
  flavor_ayu.1002.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ayu.1002.b: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_ayu.1003.title: "[ROOT.GetCountry.GetNameWithNoTooltip] та [target_country.GetLongNameWithNoTooltip]"
  flavor_ayu.1003.desc: "Відтоді, як [target_ruler.GetName] править і [target_country.Custom('longname_ua_wntt_INST')] також, наші країни виявилися тісно пов'язані. Багато сановників пропонують зробити останній крок: [target_country.GetNameWithNoTooltip] та [ROOT.GetCountry.GetLongName] повинні стати єдиною країною. Залишилося вирішити, який прапор майорітиме над новою країною."
  flavor_ayu.1003.a: "[GetCountry('AYU').GetNameWithNoTooltip] — молода та стрімко розвивається країна."
  flavor_ayu.1003.b: "За [GetCountry('SUK').Custom('CL_INST')] стоїть сила спадщини."
  flavor_ayu.1003.c: "Нас цілком влаштовує нинішній стан речей."