l_russian:
  flavor_hol.1.title: "Університет [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_hol.1.desc: "Освіта #L [ROOT.GetCountry.GetCulture.GetName|l]ого#! народу — важливе завдання країни. Урядовий апарат потребує постійного притоку грамотних людей. Для підвищення компетентності майбутніх адміністраторів та радників [target_character.GetName] пропонує побудувати в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] університет."
  flavor_hol.1.historical_info: "Вільгельм I Оранський, який очолив Нідерландську буржуазну революцію в роки Вісімдесятилітньої війни, 1575 року заснував Лейденський університет — на той момент єдиний на території Об'єднаних провінцій. До цього в Нідерландах університет був лише в Левені на півдні країни, але він опинився під контролем Іспанії. Метою створення нового університету було релігійне навчання та підготовка освічених кадрів для державної служби. З настанням наукового ренесансу стали важливими й академічні студії. Місто Лейден було обрано на знак подяки за героїчне відбиття атак іспанців попереднього року. На офіційній церемонії відкриття був присутній король Іспанії Філіп II, проте він заборонив своїм підданим навчатися в Лейдені."
  flavor_hol.1.a: "Підтримаємо університет фінансово."
  flavor_hol.1.b: "Справа того не варта."
  flavor_hol.2.title: "Дордрехтський синод"
  flavor_hol.2.desc: "#TOOLTIP:RELIGIOUS_ASPECT,arminianism,X #L Армініанство#!#!, один із напрямків #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізму#!#!, заснував [loc_jacobus_arminius.GetName], спираючись на свої плюралістичні та гуманістичні погляди. На території [ROOT.GetCountry.Custom('CL_GEN')] воно набуло набагато більшої популярності, ніж кальвінізм у його початковому вигляді. Для захисту ідеалів останнього [loc_franciscus_gomarus.GetName] заснував протилежну течію, названу #TOOLTIP:RELIGIOUS_ASPECT,gomarism,X #L гомаризмом#!#!. Щоб примирити ці два вчення, доки конфлікт між ними не переріс у повноцінну релігійну війну, у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] було скликано синод реформатських церков."
  flavor_hol.2.historical_info: "Зростання популярності армініанства змусило Нідерландську реформатську церкву скликати синод у місті Дордрехт. 13 листопада 1618 року представники Нідерландської церкви та восьми іноземних реформатських церков провели перше зібрання, а останнє, 154-те, відбулося 9 травня 1619 року. Синод засудив армініанство, відкинув армініанські погляди та сформулював богословські канони кальвінізму, а саме повну людську гріховність, безумовне обрання, обмежене спокутування, непереборну благодать і стійкість святих. Армініанцям, також іменованим ремонстрантами, було заборонено займатися пастирською діяльністю, зокрема проповідувати, наставляти, звершувати таїнства та відвідувати хворих. Їм також наказувалося підписати Акт про зречення, а ті, хто відмовився це зробити, звинувачувалися в «порушенні громадського спокою» та виганялися з території Об'єднаних провінцій. Релігійна доктрина армініанства як така була оголошена єрессю."
  flavor_hol.2.a: "Засудимо армініанство."
  flavor_hol.2.a.tt: "#TOOLTIP:RELIGIOUS_ASPECT,gomarism,X #L Гомаризм#!#! буде замінений #TOOLTIP:RELIGIOUS_ASPECT,instituionalized_gomarism,X #L офіційним гомаризмом#!#!.\n#TOOLTIP:RELIGIOUS_ASPECT,arminianism,X #L Армініанство#!#! стане недоступним."
  flavor_hol.2.b: "Відкинемо гомаризм."
  flavor_hol.2.b.tt: "#TOOLTIP:RELIGIOUS_ASPECT,arminianism,X #L Армініанство#!#! буде замінено #TOOLTIP:RELIGIOUS_ASPECT,instituionalized_arminianism,X #L офіційним армініанством#!#!.\n#TOOLTIP:RELIGIOUS_ASPECT,gomarism,X #L Гомаризм#!#! стане недоступним."
  flavor_hol.2.c: "Нас це не стосується."
  flavor_hol.3.title: "Переклад Священного Писання"
  flavor_hol.3.desc: "[ROOT.GetCountry.GetReligion.GetName] є головною релігією, що об'єднує #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Однак, хоча Священне Писання і доступне #L [ROOT.GetCountry.GetCulture.GetLanguage.GetName]ою!#! мовою, його переклад не можна назвати точним: він є адаптацією перекладу з #TOOLTIP:LANGUAGE,latin_language,X #L латини#!#! на #TOOLTIP:LANGUAGE,german_language,X #L німецьку#!#!. Проєкт #italic Державної Біблії#! (Statenbijbel) дозволить нашим книжникам створити новий переклад, що повністю передає задум Господа."
  flavor_hol.3.historical_info: "Дордрехтський синод 1618–1619 років визнав за необхідне перекласти Біблію нідерландською мовою, оскільки наявні тексти Священного Писання були неточними перекладами з інших європейських мов. Новий переклад, названий «Державною Біблією», був, наслідуючи Біблію короля Якова 1611 року, виконаний з мов оригіналу. Він був опублікований лише 1637 року, проте його вплив на культурну ідентичність та єдність країни призвів до формування основ сучасної норми нідерландської мови."
  flavor_hol.3.a: "Профінансуємо переклад Біблії."
  flavor_hol.3.b: "Нам це не по кишені."
  flavor_hol.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.4.desc: "[target_character.GetName], природознавець і математик з #TOOLTIP:LOCATION,bruges,X #L Брюгге#!#!, у пошуках знань об'їздив чимало місць, а тепер вирішив оселитися в #TOOLTIP:LOCATION,the_hague,X #L Гаазі#!#!. Він пропонує нам свої послуги як радник або вчений."
  flavor_hol.4.historical_info: "Фламандський математик та інженер Симон Стевін проявив себе в багатьох галузях науки — як теоретичних, так і практичних. Саме він придумав для позначення математики слово wiskunde («мистецтво певного»): завдяки йому нідерландська стала однією з небагатьох європейських мов, де це слово не запозичене з латини чи грецької. Також він винайшов вітрильний сухопутний візок, який міг рухатися швидше за кінний, використовуючи лише силу вітру."
  flavor_hol.4.a: "Його знання зроблять величезний внесок у розвиток науки."
  flavor_hol.4.b: "Його розум послужить на благо країни."
  flavor_hol.4.b.tt: "[target_character.GetName] може увійти до [Concept('cabinet', 'ради ')|e]"
  flavor_hol.5.title: "Гет Вілгелмус"
  flavor_hol.5.desc: "Державний гімн втілює дух країни та її народу. У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, на відміну від багатьох інших країн, поки ще немає свого гімну. Його створення могло б не тільки підвищити наш міжнародний престиж, а й наповнити серця #L [ROOT.GetCountry.GetCulture.GetName|l]ого#! народу почуттям гордості та єдності."
  flavor_hol.5.historical_info: "Пісня #italic «Гет Вілгелмюс»#! (вона ж #italic «Вільгельм Ван Нассау»#!) була настільки популярна в Нідерландах, що 1932 року її офіційно визнали державним гімном країни. Її текст, присвячений Вільгельму Оранському, розповідає історію його життя та боротьби з королем Іспанії від першої особи. Слова та мелодія цієї пісні звучать напрочуд мирно за мірками державних гімнів."
  flavor_hol.5.a: "Профінансуємо написання гімну."
  flavor_hol.5.b: "Нам це не по кишені."
  flavor_hol.6.title: "Тюльпаноманія"
  flavor_hol.6.desc: "З розширенням [target_country.Custom('CL_GEN')] та зміцненням торговельних зв'язків між #TOOLTIP:CONTINENT,europe,X #L Європою#!#! та #TOOLTIP:SUB_CONTINENT,middle_east,X #L Близьким Сходом#!#! [ROOT.GetCountry.GetAdjective]і купці стали привозити з #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#! тюльпани. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] полюбили ці квіти не лише за красу, а й за дорожнечу. Користуючись ажіотажем, численні торговці стали перепродувати цибулини рослини, піднімаючи ціни до захмарних висот. Однак зрештою ринок розставив усе по місцях: ціни на тюльпани впали, а багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] виявилися розореними."
  flavor_hol.6.historical_info: "Вперше тюльпани привезли до Європи з Османської імперії в 50-х роках XIV століття. Незабаром цибулини цієї рослини стали популярним предметом розкоші серед багатих нідерландських купців. Їхній ринок продовжував зростати, а коли 1634 року підвищився попит на тюльпани у Франції, на нього прийшли спекулянти. 1636 року було відкрито договірну торгівлю цими квітами. Восени та взимку ціни на тюльпани стрімко зростали, але в лютому 1637 року вони впали, розоривши багатьох учасників ринку. Ось так торгівля тюльпанами призвела до справжньої економічної катастрофи."
  flavor_hol.6.a: "Вам нікого звинувачувати, крім самих себе!"
  flavor_hol.6.b: "Країна може взяти на себе частину збитків."
  flavor_hol.7.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.7.desc: "[target_character.GetName], вельми [Select_CString(target_character.IsFemale,'відома й талановита книжниця', 'відомий і талановитий книжник')], [Select_CString(target_character.IsFemale,'прибула', 'прибув')] до #TOOLTIP:LOCATION,amsterdam,X #L Амстердама#!#!, щоб відкрити власну #TOOLTIP:BUILDING_TYPE,printing_press_shop,X #L друкарню#!#!."
  flavor_hol.7.historical_info: "Колишній купець і палітурник Лодевійк Ельзевір прославився як видавець і книгодрукар. 1583 року в Лейдені він видав свою першу книгу і заклав основи сімейного бізнесу, який проіснував до 1791 року. Книги Ельзевіра славилися не лише витонченістю та акуратністю, а й зручними компактними форматами аж до 1/12 звичайного розміру."
  flavor_hol.7.a: "Дозволимо [Select_CString(target_character.IsFemale,'їй', 'йому')] відкрити майстерню."
  flavor_hol.7.b: "Видавати книги мають право лише [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]."
  flavor_hol.8.title: "Грандіозні плани з колонізації"
  flavor_hol.8.desc: "Відносно пізно вступивши в колоніальну гонку, ми виявили, що більшість територій, які нас цікавлять, вже зайняті іншими країнами. Однак завдяки сильному флоту та вмотивованому фінансовому сектору у нас ще є вельми значні ресурси. Враховуючи всі ці обставини, Голландська Вест-Індська компанія підготувала #italic «Грут Дессейн»#! — план, який дозволив би #L [ROOT.GetCountry.GetCulture.GetName|l]им#! колонізаторам досягти переваги над конкурентами.\n\nСуть цього плану полягає в тому, що захоплювати чужі колонії набагато простіше та вигідніше, ніж засновувати свої. Як відповідна ціль пропонується #L [GetCountry('POR').GetAdjective|l]а#! колоніальна імперія: вона є нашим природним конкурентом, а [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]і інвестори вже вклали кошти в деякі з її колоній."
  flavor_hol.8.a: "Чудовий план!"
  ned_grand_design: "Грут Дессейн"
  flavor_hol.8.b: "Ні, міжнародна спільнота цього не зрозуміє."
  flavor_hol.9.title: "Флейт"
  flavor_hol.9.desc: "Експансивна #L [ROOT.GetCountry.GetCulture.GetName|l]а#! економіка висуває серйозні вимоги до торговельного флоту. До того ж через невелику глибину прибережних вод каравели та інші великі торговельні судна не можуть заходити в багато [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их портів. Досі ця проблема вирішувалася за допомогою невеликих буєрів, але нещодавно [target_character.GetName] з #TOOLTIP:LOCATION,hoorn,X #L Горна#!#! [Select_CString(target_character.IsFemale,'профінансувала', 'профінансував')] будівництво судна нового типу.\nВоно називається «флейт» і відрізняється подовженим корпусом з характерною грушоподібною кормою, а для його обслуговування достатньо невеликої команди. Здатний як перевозити вантажі голландським мілководдям, так і виходити у відкритий океан, флейт стане безцінним подарунком для наших купців."
  flavor_hol.9.a: "І справді чудове судно!"
  flavor_hol.9.b: "Цікава ідея, але зараз невідповідний час. Давайте, пізніше?"
  flavor_hol.9.c: "Сумніваюся, що наші верфі до такого готові."
  flavor_hol.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.10.desc: "[target_character.GetName], більш відомий як Еразм, є видатним вченим і гуманістом. Його погляди та філософські ідеї, що відрізняються терпимістю та схильністю до компромісів, відомі по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!, а його внесок у богословську науку став маяком для тих, хто цінує свободу вище догматизму."
  flavor_hol.10.historical_info: "Нідерландський гуманіст Дезидерій Еразм Роттердамський, видатний діяч Північного Відродження, залишив велику літературну спадщину латинською та грецькою мовами. Його праці латиною відрізняються природністю стилю. Вирісши в реформатській країні, Еразм тим не менш закликав до терпимості, злагоди та вільнодумства в межах католицької церкви. Такі його роботи, як #italic «Похвала глупості»#! та #italic «Роздуми про свободу волі»#!, присвячені актуальним богословським та суспільним питанням, часто пропонували компромісну точку зору, яка не влаштовувала ні католиків, ні протестантів. Подолавши злидні та духовне сум'яття юності, Еразм висвітлив у своїх працях такі теми, як освіта, шлюб, суспільні реформи та автономія особистості в межах релігійних інститутів."
  flavor_hol.10.a: "Нехай його ідеї стануть внеском у краще майбутнє."
  flavor_hol.10.b: "Його філософії немає місця на території [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_hol.11.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.11.desc: "Вчений та юрист [target_character.GetName] знаменитий насамперед своїм трактатом «Про право війни та миру», який вважається справжнім шедевром юридичної літератури. Вважається, що його праці заклали основи майбутньої юриспруденції. Також він прославився втечею у скрині з книгами з в'язниці, куди був ув'язнений з політичних та релігійних мотивів."
  flavor_hol.11.historical_info: "Вчений-енциклопедист Гуго Гроцій, який народився в Делфті 1583 року, залишив значний слід у філософії, політичній теорії та юриспруденції — особливо у сферах міжнародного та природного права. Через свою участь у релігійних конфліктах, що охопили Нідерланди, він був ув'язнений, а потім вигнаний до Франції, але це не завадило йому продовжити роботу над видатними трактатами. Такі його шедеври, як «#italic Про право війни та миру#!» та «#italic Вільне море#!», заклали фундамент майбутнього міжнародного права та принесли йому славу #italic батька-засновника#! цієї дисципліни. Ідеї Гроція про суверенітет, природне право та інші права вплинули на таких мислителів, як Джон Локк, та визначили хід розвитку таких великих політичних подій, як Славна революція в Англії та Американська революція. Ще однією фундаментальною частиною його спадщини є теологічне обґрунтування природного права, що спирається на біблійні одкровення та людський розум."
  flavor_hol.11.a: "Воістину велика людина!"
  flavor_hol.12.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.12.desc: "Син одного з наших послів прославився своїм хистом. Деякі радники вже називають його геніальним математиком. Якщо ми наблизимо його до двору та вкладемо достатні кошти, його досягнення зможуть здивувати не лише нас, а й увесь світ."
  flavor_hol.12.historical_info: "Нідерландський математик, астроном і фізик Гюйгенс заклав основи хвильової теорії світла, відкрив справжню форму кілець Сатурна та зробив істотний внесок у динаміку — науку про дії сил на тіла. Незаслужено забуті до кінця XIX століття, його теорії й досі цінуються як блискучий та оригінальний внесок у сучасну науку, а принцип, названий на його честь, збереже його ім'я на віки."
  flavor_hol.12.a: "Наблизимо [Select_CString(target_character.IsFemale,'її', 'його')] до двору."
  flavor_hol.12.b: "Це всього лише звичайна людина."
  NED_BUFFED_POLDERS: "#Y Максимальний рівень#! [Concept('development', 'розвитку')|e] #TOOLTIP:BUILDING_TYPE,polders,X #L польдерів#!#! буде підвищено #G вдвічі#!."
  flavor_hol.13.title: "Банк Амстердама та міжнародний ринок капіталу"
  flavor_hol.13.desc: "Заснування #TOOLTIP:BUILDING_TYPE,wisselbank,X #L Амстердамського банку#!#! стало епохальною подією для нашого суспільства — особливо для його купецької частини. Однак з роками цей банк перестав бути інструментом суворого контролю цінності грошей: до його правил додавалося все більше винятків, а часом вони відверто порушувалися. Не дивно, що колись шанований інститут втратив престиж і набув слави розсадника корупції.\n\nАле зараз економічні труднощі країни змушують нас знову звернутися до нього, щоб востаннє спробувати відновити його репутацію, а заодно й нашу економіку."
  flavor_hol.13.historical_info: "Суворі правила повного резервування, запроваджені при заснуванні Амстердамського банку, з часом пом'якшувалися, що дозволяло фінансувати зовнішню торгівлю та економіку Нідерландів, підтримуючи ліквідність за рахунок заставного забезпечення. Четверта англо-голландська війна та дефолт Голландської Ост-Індської компанії підірвали довіру до банку, а 1790 року після кількох спроб рекапіталізації його було оголошено банкрутом. Потім він перейшов до міської влади Амстердама і був замінений Нідерландським банком, а 1819 року закрився остаточно."
  flavor_hol.13.a: "Спробуємо врятувати Амстердамський банк."
  flavor_hol.13.b: "Закриємо Амстердамський банк і розберемося з наслідками."
  STATIC_MODIFIER_NAME_ned_bank_crisis: "Криза нідерландського фінансового сектора"
  STATIC_MODIFIER_DESC_ned_bank_crisis: "Амстердам, який колись був фінансовим центром усієї Європи, поступився своїми позиціями столицям інших країн. Невдала економічна політика Амстердамського банку змусила світ серйозно засумніватися в надійності банківського сектора країни загалом."
  flavor_hol.14.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.14.desc: "[target_character.GetName], родом зі скромної родини, має дивовижний талант зображати світ на папері. Ці здібності могли б дуже стати в пригоді нашому війську, але якщо [Select_CString(target_character.IsFemale,'вона', 'він')] буде малювати лише військові мапи, є ризик, що [Select_CString(target_character.IsFemale,'його', 'її')] потенціал не розкриється повністю."
  flavor_hol.14.historical_info: "Цей фламандський географ, математик і картограф навчався в Левені, де 1534 року став штатним географом. З 1537 по 1540 рік досліджував і картографував Фландрію. 1538 року представив свою першу мапу світу (на основі мапи Птолемея)."
  flavor_hol.14.a: "Так, його мапи були б безцінні для наших військових."
  flavor_hol.14.b: "Нехай продовжує вдосконалювати своє мистецтво."
  flavor_hol.15.title: "[ROOT.GetCountry.GetNameWithNoTooltip] та кальвінізм"
  flavor_hol.15.desc: "Вже багато років у нашій країні тривають суперечки між консервативними #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністами#!#! та більш ліберальною течією, яка прагне віротерпимості.\n\nУ #TOOLTIP:LOCATION,dordrecht,X #L Дордрехті#!#! був скликаний синод, щоб головні представники обох вчень змогли обговорити доктрини одне одного. Для нас це чудова нагода публічно підтримати одну зі сторін і покласти край цій суперечці."
  flavor_hol.15.historical_info: "На Дордрехтському синоді (1618–1619) консервативний кальвінізм був оголошений державною релігією Нідерландів. Так було покладено край довгій суперечці між віротерпимими армініанцями та догматичними «істинними кальвіністами» — так званими гомаристами. Моріц Оранський підтримував гомаристів, у лавах яких були переважно селяни та бідні міщани, а Олденбарневелт виступав на боці армініанців — переважно інтелектуалів та багатих буржуа."
  flavor_hol.15.a: "Ми підтримаємо [Select_CString(target_character2.IsFemale, 'її', 'його' )] ініціативу."
  flavor_hol.15.b: "[target_character1.GetNameWithNoTooltip] говорить істину."
  flavor_hol.16.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.16.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale,'яка народилася', 'який народився')] в одній з найвпливовіших родин нашої країни, володіє цілою низкою видатних талантів, які, на жаль, не розкриваються повною мірою на займаній [Select_CString(target_character.IsFemale,'нею', 'ним')] посаді пенсіонарія Дордрехта. Нам слід взяти [Select_CString(target_character.IsFemale,'її', 'його')] на придворну службу."
  flavor_hol.16.historical_info: "Ян де Вітт обійняв посаду Великого пенсіонарія Голландії в 1653 році. Період його правління став для республіки справжнім золотим віком. При цьому він усе своє життя боровся з впливом Оранської династії, представники якої зазвичай обіймали посаду штатгальтерів і, як наслідок, командували збройними силами країни. У 1667 році він офіційно скасував цю посаду, але в 1672 році після поразок у війнах з Францією та Англією партія оранжистів знову прийшла до влади й ув'язнила його. 20 серпня 1672 року його та його брата Корнеліса розтерзав натовп, підбурюваний оранжистами. За легендою, печінки та ймовірно інші частини тіл братів бул з'їдені розлюченою юрбою, а рештки продавалися як сувеніри, тому де Вітта часто називають єдиним з'їденим прем'єром в історії."
  flavor_hol.16.a: "З [Select_CString(target_character.IsFemale, 'неї', 'нього' )] вийде чудовий міністр!"
  flavor_hol.16.b: "У нас і так достатньо радників."
  flavor_hol.17.title: "Заснування Амстердамської біржі"
  flavor_hol.17.desc: "Оскільки наші численні підприємства зростають і процвітають, усе більше людей бажає вкладати в них кошти. Зрозуміло, інвестори розраховують на повернення своїх вкладень з лихвою, тому нам час створити спеціальний інститут, який гарантуватиме їм частку в майбутньому прибутку. Рішенням цієї проблеми може стати Амстердамська біржа, але радники продовжують дискутувати про те, що має бути для неї пріоритетнішим: контроль над економікою чи полегшення доступу до позикових коштів."
  flavor_hol.17.historical_info: "Відкриття Амстердамського банку в 1609 році пожвавило торги на міській біржі. Незабаром Амстердам відібрав у Антверпена статус фінансової столиці й став найбільшим європейським центром залучення капіталів з доступними позиками за найвигіднішими ставками. Цьому сприяли прибутки Голландської Ост-Індської компанії (1602) і навіть менш успішної Вест-Індської компанії (1621)."
  flavor_hol.17.a: "Розширимо ринок позик."
  flavor_hol.17.b: "Введемо суворий контроль."
  flavor_hol.18.title: "[target_country.GetAdjectiveWithNoTooltip]о-[root_country.GetCulture.GetNameWithNoTooltip|l]ий конфлікт"
  flavor_hol.18.desc: "Уже багато років влада #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! підтримує [root_country.Custom('rank_ru_ACC')|l], де ми живемо, адже у нас є спільний ворог — [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]. Однак останнім часом [target_country.GetAdjectiveWithNoTooltip|l]а внутрішня політика щодо гугенотів, а також зовнішня політика щодо наших найближчих сусідів викликає обґрунтовані побоювання. Можливо, нам час збирати друзів і готуватися до неминучого конфлікту з південним сусідом."
  flavor_hol.18.a: "Наша політика має бути спрямована на стримування [target_country.Custom('CL_GEN')]."
  ned_anti_french_policy: "Спільний ворог"
  fra_dutch_friction: "Франко-голландський конфлікт"
  flavor_hol.18.b: "Нам слід виявляти дружелюбність щодо [target_country.Custom('CL_GEN')]."
  ned_friendly_towards_france: "Дружба з Францією"
  flavor_hol.19.title: "Le Prisonnier de Hollande"
  flavor_hol.19.desc: "Після багатьох років якщо не дружби, то, як мінімум, добросусідського співробітництва уряд #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! поводиться все більш вороже щодо нас. Надходять доповіді, що ця країна шукає союзників серед наших ворогів і має намір обмежити наш вплив у Нижніх землях. Це, звичайно, кричуща невдячність, однак усе відбувається якнайвчасно — якщо ми перестанемо виявляти добру волю, ці території можуть стати непоганим придбанням для [target_country.Custom('rank_ru_GEN')|l]."
  flavor_hol.19.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_hol.19.a.tt: "[root_country.GetLongName] — ця країна спробує покращити відносини з нашими [Concept('rivals', 'суперниками')|e]"
  flavor_hol.20.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip]і військові реформи"
  flavor_hol.20.desc: "Тактика та оснащення #TOOLTIP:CONTINENT,europe,X #L європейських#!#! військ стрімко розвиваються. Очевидно, що нам потрібно якомога швидше провести військову реформу, щоб зберегти політичну вагу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! на світовій арені. На щастя для нас, [target_character.GetName] уже [Select_CString(target_character.IsFemale,'підготувала', 'підготував')] деякі плани щодо цього…"
  flavor_hol.20.historical_info: "На чолі нідерландської військової реформи стояли граф Йоганн Нассау-Зігенський, його кузен принц Моріц і брат Віллем. Відновивши втрачені знання про класичні війська за перекладами римських військових трактатів, вони реорганізували бойові порядки, щоб підвищити їхню гнучкість та вогневу міць. Граф Йоганн взяв участь у написанні знаменитого посібника з поводження зі зброєю «Вапенханделинге» Якоба де Гейна та заснував одну з перших військових академій у німецькому Зігені."
  flavor_hol.20.a: "Віддамо перевагу наступу."
  flavor_hol.20.b: "Віддамо перевагу обороні."
  flavor_hol.21.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.21.desc: "Істинна могутність правителя залежить від компетентності його міністрів. На щастя для всіх #L [ROOT.GetCountry.GetCulture.GetName|l]их#! підданих, при нашому дворі служать такі видатні люди, як [target_character.GetName]."
  flavor_hol.21.historical_info: "Антоній Гейнзіус (1640–1720) усе своє життя мав довіру Вільгельма III Оранського. Після укладення Німвегенських мирних договорів він побував у Версалі у складі посольства, яке контролювало їхнє дотримання, а в 1688 році, коли король Вільгельм переїхав до Англії, став великим пенсіонарієм Голландії. Розрахунковий дипломат і переконаний противник Франції, він стояв за всіма антифранцузькими коаліціями в усіх війнах кінця XVII століття."
  flavor_hol.21.a: "Чудовий міністр!"
  STATIC_MODIFIER_NAME_hol_brilliant_minister: "Геніальний радник"
  STATIC_MODIFIER_DESC_hol_brilliant_minister: "Талант цього придворного затьмарює зірки. Його ідеї та рішення відкривають нашій країні шлях до великого майбутнього."
  flavor_hol.22.title: "Чорне військо Арума"
  flavor_hol.22.desc: "#TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! #TOOLTIP:AREA,friesland_area,X #L Фрисландії#!#!, невдоволені поведінкою наших військ на своїй землі, взялися за зброю. Об'єднавшись із найманцями, вони не досягли суттєвих успіхів на суші, але вже здійснили низку несподіваних маневрів на морі. Оскільки піратів серед цих заколотників чи не більше, ніж вояків, вони можуть серйозно завадити нашій морській торгівлі."
  flavor_hol.22.a: "Здолаємо зрадників."
  frisian_independence_fighter: "$frisian$ські борці за незалежність"
  flavor_hol.22.a.tt: "Усі #TOOLTIP:CULTURE,$frisian_tt$,X #L фризькі#!#! [Concept('pops', 'групи населення')|e] приєднаються до [Concept('rebel', 'заколотників')|e] ([target_rebel.GetName])"
  flavor_hol.23.title: "[target_character.GetNameWithNoTooltip] — принц серед філософів"
  flavor_hol.23.desc: "#L [ROOT.GetCountry.GetCulture.GetName]а#! країна підтримує свіжі ідеї, завдяки чому з'являються нові допитливі мислителі, які знаходять підтримку однодумців. До числа таких інтелектуалів входить [target_character.GetName], [Select_CString(target_character.IsFemale,'яка присвятила', 'який присвятив)] своє життя одразу кільком галузям філософії."
  flavor_hol.23.historical_info: "Барух Спіноза, що народився в родині єврейських переселенців із Португалії, вів досить просте життя, займаючись шліфуванням оптичного скла. Кажуть, що в цьому ремеслі він досяг чималих успіхів, проте в історію він увійшов завдяки своїм працям у галузі філософії, етики та теології. За життя Спіноза опублікував лише кілька своїх робіт, але його ідеї широко поширювалися. Зрештою Гейдельберзький університет запропонував йому кафедру. Він відмовився, побоюючись, що це обмежить свободу його думки."
  flavor_hol.23.a: "Велика людина."
  flavor_hol.24.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.24.desc: "#TOOLTIP:RELIGION,$calvinist_tt$,X #L Кальвінізм#!#! поширюється по #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! подібно до лісової пожежі. Відкидаючи #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранські#!#! погляди, кальвіністи набагато радикальніше виступають проти #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви.\n\nОднак ці ідеї поділяють не всі. Богослов [target_character.GetName] засуджує фанатизм і закликає до більш гуманного поводження з єретиками. Його ідеї лягли в основу #TOOLTIP:RELIGIOUS_ASPECT,arminianism,X #L армініанського#!#! течії в кальвінізмі."
  flavor_hol.24.historical_info: "Нідерландський теолог-реформат Якоб Арміній у своїй суперечці з кальвіністами розробив богословські ідеї армініанства, які лягли в основу руху ремонстрантів. Спочатку він був прихильником кальвіністської концепції приречення, але пізніше засумнівався в деяких її аспектах і запропонував доповнити її ідеєю благодаті, що дає кожному можливість увірувати і врятуватися. Після його смерті вчення було систематизовано у формі П'яти пунктів Ремонстрації. Згодом армініанство було заборонено кальвіністським Дордрехтським синодом, але його ідеї збереглися і надихнули таких релігійних діячів, як засновник методизму Джон Веслі."
  flavor_hol.24.a: "Приймемо [Select_CString(target_character.IsFemale, 'її', 'його')] погляди."
  flavor_hol.24.b: "Відкинемо і [Select_CString(target_character.IsFemale, 'її саму', 'його самого')], і [Select_CString(target_character.IsFemale, 'її', 'його')] ідеї."
  flavor_hol.24.c: "Прогнати [Select_CString(target_character.IsFemale, 'цю єретичку', 'цього єретика')]!"
  flavor_hol.25.title: "[target_character.GetNameWithNoTooltip]"
  flavor_hol.25.desc: "У #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізмі#!#! набирає популярності течія #TOOLTIP:RELIGIOUS_ASPECT,arminianism,X #L армініанства#!#!. Однак [trigger_character.GetName] та його ідеали подобаються далеко не всім: такі видатні богослови, як [target_character.GetName], виступають проти армініанської поступливості та гуманізму. Їхні послідовники створили рух під назвою #TOOLTIP:RELIGIOUS_ASPECT,gomarism,X #L гомаризм#!#!."
  flavor_hol.25.historical_info: "Нідерландський богослов Франциск Гомар, який очолював рух гомаристів, оскаржував ідеї Якоба Армінія, виступаючи за абсолютне приречення. Спершу він просував свої ідеї ненав'язливо, але коли Арміній прибув до Лейденського університету, Гомар почав вести з ним особисті суперечки та теологічні дебати. Гомар став однією з ключових фігур Дордрехтського синоду, що захистив доктрину кальвінізму, і продовжував богословські дослідження до самої смерті, залишивши вельми значну та суперечливу спадщину."
  flavor_hol.25.a: "$flavor_hol.24.a$"
  flavor_hol.25.b: "$flavor_hol.24.b$"
  flavor_hol.25.c: "$flavor_hol.24.c$"
  flavor_hol.26.title: "[ROOT.GetCountry.GetCulture.GetNameWithNoTooltip]о-[target_country.GetAdjectiveWithNoTooltip|l]а війна"
  flavor_hol.26.desc: "#L [target_country.GetAdjective]ий#! народ забув про Бога. Серед жителів [target_country.Custom('CL_GEN')], що відкинули феодальну владу та священні заповіді, панує не біблійний світопорядок, а хаос та анархія. Будучи захисниками #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#!, ми зобов'язані виступити проти цих безбожників і покінчити з їхньою «свободою» раз і назавжди."
  flavor_hol.26.a: "Хай допоможе нам Господь викорінити цю єресь."
  flavor_hol.27.title: "Золотий вік [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ого живопису"
  flavor_hol.27.desc: "На всій території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! настала доба процвітання та стабільності. Натхненні #L [ROOT.GetCountry.GetCulture.GetName|l]им#! золотим віком, художники нашої країни творять шедеври, рівних яким ще не було в історії людства."
  flavor_hol.27.historical_info: "Золотий вік голландського живопису припав на XVII століття — період розквіту самої Голландії, ознаменований процвітанням і розвитком торгівлі, науки та мистецтва. Відійшовши від звичних релігійних сюжетів, голландські художники звернулися до світських тем, започаткувавши такі жанри, як портрет, жанрова сцена, пейзаж, мариністика та натюрморт. Розділення на жанри, що відбувалося з 20-х по 70-ті роки XVII століття, визначило художню ідентичність цієї доби та вплинуло на подальший розвиток західного образотворчого мистецтва."
  flavor_hol.27.a: "Нехай наше мистецтво підкорює серця поціновувачів прекрасного."
  flavor_hol.28.title: "Амстердамський банк"
  flavor_hol.28.desc: "Коливання цін на #TOOLTIP:GOODS,silver,X #L срібло#!#! та інші метали, що використовуються для карбування монет, змусили багатьох замислитися про необхідність стабільної банківської валюти. Група #TOOLTIP:POPTYPE,burghers,X #L містян#!#!, які раніше засідали в міській раді, запропонувала заснувати валютний банк, що виступав би гарантом такого фінансового засобу.\n\nЦю ідею схвалили не всі: так, багато #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! бачать у ній чергову спробу #TOOLTIP:POPTYPE,burghers,X #L містян#!#! посилити свій вплив. У чомусь це правда, але наявність такого банку дійсно дозволить нам краще контролювати цінність грошових коштів, що використовуються в торгівлі."
  flavor_hol.28.a: "Ми відкриємо валютний банк."
  flavor_hol.28.b: "Нам це ні до чого."
  flavor_hol.28.historical_info: "Амстердамський банк був заснований у 1609 році за підтримки міської влади нідерландської столиці та став одним із перших валютних банків в історії. Ця установа, яку іноді називають першим справжнім центральним банком, відігравала ключову роль у захисті грошових стандартів та емітувала першу у світі міжнародну резервну валюту — банківський гульден. Амстердамський банк вплинув на державні банки багатьох європейських країн, проте зміна його політики та крахи великих компаній під час Четвертої англо-голландської війни призвели до того, що в 1790 році його було оголошено некредитоспроможним. У 1791 році банк перейшов під зовнішнє управління міської влади Амстердама, у 1814 році його функції грошової емісії були передані Нідерландському банку, а в 1819 році він закрився остаточно."
  flavor_hol.29.title: "Північне Відродження"
  flavor_hol.29.desc: "У всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#! повним ходом іде #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#!, і [target_character.GetName] планує підтримувати творчих людей, щоб посилити вплив свого двору та поширити ідеали Відродження в Нижніх землях."
  flavor_hol.29.a: "Давайте профінансуємо це підприємство."
  flavor_hol.29.b: "Це занадто дорого."
  flavor_hol.29.c: "Вони допоможуть нам не тільки в розвитку мистецтва."
  flavor_hol.30.title: "Західний Єрусалим"
  flavor_hol.30.desc: "Останнім часом [ShowLocationName('amsterdam')] став домом для безлічі людей [ShowReligionAdjective('judaism')]ого віросповідання: його навіть називають #italic Західним #TOOLTIP:LOCATION,jerusalem,X #L Єрусалимом#!#!. Звісно, це не світова столиця юдаїзму, але послідовників цієї віри тут проживає чимало."
  flavor_hol.30.a: "Нехай живуть тут спокійно."
  flavor_hol.31.title: "Порт [target_location.Custom('LR_GEN')] [target_location.GetNameWithNoTooltip]"
  flavor_hol.31.desc: "Багато жителів [target_location.Custom('LR_GEN') [target_location.GetName] мріють про новий порт. Якщо вкладемо кошти в його будівництво, [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] будуть вдячні, а ми покращимо своє становище в морі."
  flavor_hol.31.a: "Якщо їм потрібні гроші, вони їх отримають."
  flavor_hol.31.b: "Для нас важливіші сухопутні справи."
  flavor_hol.32.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий гульден"
  flavor_hol.32.desc: "Коли флорин став відомий [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!, багато купців запропонували випускати подібну монету нашого власного карбування, назвавши її #italic гульденом#!. Вони сподіваються, що грошова цінність нової монети буде вищою, ніж у попередньої."
  flavor_hol.32.a: "Давайте карбувати нову монету."
  flavor_hol.32.b: "Грошові реформи нам ні до чого."
  flavor_hol.32.historical_info: "Герцог Філіп «Добрий» Бургундський надихався італійським флорином, французьким лівром та англійським фунтом. Його творіння, що отримало назву «гульден», швидко поширилося по всіх Нижніх землях і залишалося головною місцевою валютою протягом кількох століть."
  flavor_hol.33.title: "У пошуках балтійського зерна"
  flavor_hol.33.desc: "Оскільки власне сільське господарство не може забезпечити нас достатньою кількістю зерна, нам слід шукати зовнішніх постачальників, найближчі з яких знаходяться в #TOOLTIP:AREA,baltic_area,X #L балтійському#!#! регіоні. Однак є дві проблеми. По-перше, тут висока плата за прохід, яку стягує #TOOLTIP:LOCATION,kobenhavn,X #L Копенгаген#!#!: через неї #L [ROOT.GetCountry.GetAdjective|l]і#! [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] не можуть вести активну торгівлю. По-друге, це #TOOLTIP:CULTUREGROUP,german_group,X #L германські#!#! країни, які домінують у регіоні та не терплять конкурентів. Можливо, майстерна дипломатія або силові методи допоможуть нам вирішити обидві проблеми та забезпечити собі надійні поставки зерна."
  flavor_hol.33.a: "Пливемо на Балтику!"
  NED_GAIN_GRAIN_SUPPLY_TO_DEAL_WITH_GRAIN_ISSUES: "Проблема не вирішиться, поки [ROOT.GetCountry.GetCapital.GetMarket.GetName|l] не перестане відчувати дефіцит #TOOLTIP:GOODS,wheat,X #L пшениці#!#!, а наше [Concept('merchant_power', 'торгова перевага')|e] на таких ринках, як [target_location2.GetMarket.GetName|l] та [target_location.GetMarket.GetName|l], буде нижче #Y 25#!."
  flavor_hol.34.title: "Торгівля на Балтиці відкрита"
  flavor_hol.34.desc: "Відкривши торгівлю на #TOOLTIP:AREA,baltic_area,X #L Балтиці#!#!, ми нарешті можемо забезпечити безперебійні поставки продовольства в Нідерланди."
  flavor_hol.34.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  NED_ALL_DUTCH_POPS_BECOME_HAPPIER: "Кожна [Concept('pop', 'група населення')|e], що належить до #TOOLTIP:CULTUREGROUP,netherlandish_group,X #L нідерландської#!#! [Concept('culture_group', 'культурної групи')|e], отримує [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]."