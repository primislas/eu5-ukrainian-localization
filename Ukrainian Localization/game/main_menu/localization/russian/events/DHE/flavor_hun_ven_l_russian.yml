l_russian:
 flavor_hun_ven.1.title: "Присоединение Далмации"
 flavor_hun_ven.1.entry: "Задарский мир — венгерское событие"
 flavor_hun_ven.1.desc: "Выход к морю даёт стране огромные преимущества, поэтому [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] многие годы стремились завладеть частью #TOOLTIP:AREA,adriatic_sea_area,X #L Адриатического#!#! побережья. Судя по донесениям наших шпионов, [GetCountry('VEN').GetName] наход[GetCountry('VEN').Custom('end_ityat')]ся в глубоком упадке, и при дворе говорят, что сейчас самый подходящий момент сделать наш ход. Впрочем, можно и не спешить с объявлением войны — в текущей ситуации [GetCountry('VEN').Custom('CL_ACC')] можно принудить к уступкам дипломатическим путём."
 flavor_hun_ven.1.a: "Любые переговоры — пустая трата времени."
 flavor_hun_ven.1.b: "Попробуем надавить на них посредством дипломатии."
 flavor_hun_ven.1.historical_info: "В правление Людовика I Венгрия стремилась расширить своё присутствие на Адриатике и ослабить венецианское господство на побережье Далмации. В 1356 году Людовик начал военную кампанию против Венеции и стремительным ударом захватил несколько ключевых далматских городов. После ряда чувствительных поражений и внутренних неурядиц в 1358 году венецианцы были вынуждены пойти на переговоры. По условиям Задарского мира Венеция отказалась от своих владений в Далмации и признала республику Рагуза вассалом Венгрии."
 flavor_hun_ven.2.title: "Присоединение Далмации"
 flavor_hun_ven.2.desc: "Охватившие [ROOT.GetCountry.Custom('rank_ru_ACC')|l] внутренние конфликты не ускользнули от внимания соседей. #L [GetCountry('HUN').GetAdjective]ие#! власти желают организовать переговоры, чтобы обсудить передачу наших #TOOLTIP:CULTURE,$dalmatian_tt$,X #L далматских#!#! владений в пользу [GetCountry('HUN').Custom('CL_GEN')]. Мнения двора разделились: одни находят [GetCountry('HUN').GetAdjectiveWithNoTooltip|l]ое предложение возмутительным оскорблением нашей чести, другие же призывают проявить осторожность и благоразумие. Отказ может привести к войне, поражение в которой будет стоить нам не только Далмации…"
 flavor_hun_ven.2.a: "Это такая же безумная идея, как и их [GetCountry('HUN').GetGovernment.GetRulerTitle|l]!"
 flavor_hun_ven.2.a.entry: "Эта идея столь же безумна, сколь и их правитель!"
 flavor_hun_ven.2.b: "Особого выбора у нас нет, придётся согласиться."
