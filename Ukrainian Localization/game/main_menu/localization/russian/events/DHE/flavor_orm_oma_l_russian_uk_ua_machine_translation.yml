l_russian:
  flavor_orm_oma.1.title: "Контроль Набханідів над Оманом"
  flavor_orm_oma.1.desc: "Узбережжя Оману, що колись підкорилося нашим предкам, — дикий, непокірний і бідний край. Наш [Concept('control', 'контроль')|e] над ним залишає бажати кращого — тут постійно спалахують заколоти та виникають інші труднощі.\n\nНеспокійно й на кордоні: до узбережжя виявляє найщиріший інтерес династія [ShowDynastyName('nabhani_dynasty')], що лише додає напруженості. На щастя, дипломати запевнили нас, що здатні укласти з Набханідами вигідний договір і тим самим уникнути прикордонного конфлікту, а заодно й заощадити нам кошти в осяжному майбутньому."
  flavor_orm_oma.1.a: "Передати управління Набханідам"
  flavor_orm_oma.1.b: "Це наша земля!"
  flavor_orm_oma.2.title: "$flavor_orm_oma.1.title$"
  flavor_orm_oma.2.desc: "Дипломати з [GetCountry('ORM').Custom('longname_ru_GEN')] звернулися до нашого двору з пропозицією: щоб не допустити прикордонного конфлікту між нашими країнами, вони готові передати під нашу владу всі #TOOLTIP:CULTURE,$omani_culture_tt$,X #L оманські#!#! землі, що зараз їм належать. Взамін нас просять лише про одне: щоб наші народи й далі залишалися друзями та жили в мирі й злагоді один з одним."
  flavor_orm_oma.2.a: "Ми люб'язно погодимося."