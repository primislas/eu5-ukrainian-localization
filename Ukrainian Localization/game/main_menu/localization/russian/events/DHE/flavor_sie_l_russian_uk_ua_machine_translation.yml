l_russian:
  flavor_sie.1.title: "Банк Монте дей Паскі"
  flavor_sie.1.desc: "#italic Монті ді п'єта#!, або «банки милосердя», стають усе частішим явищем у нашій державі. Це благодійні фінансові організації, які отримують гроші з пожертв і видають малозабезпеченим позики під низький відсоток. Можливо, уряду варто виділити кошти на створення подібної установи в [monte_paschi_bank_hq.Custom('LR_PREP')|l] [monte_paschi_bank_hq.GetName]. Фактично вона слугуватиме національним банком нашої держави та сприятиме підвищенню добробуту нашого народу."
  flavor_sie.1.a: "Це допоможе нам наповнити скарбницю."
  flavor_sie.1.b: "Воістину, це богоугодна справа!"
  flavor_sie.1.historical_info: "#italic Банк Монте дей Паскі ді Сієна#!, заснований у Сієнській республіці в 1472 році, вважається найстарішим із банків, що діють досі. Спочатку він був створений як некомерційний ломбард, а свій статус сучасного банку набув лише після приєднання до Великого герцогства Тосканського в 1624 році. Після об'єднання Італії його діяльність поширилася на весь Апеннінський півострів."
  flavor_sie.2.title: "$flavor_sie.1.title$"
  flavor_sie.2.desc: "Банки милосердя є свого роду благодійними організаціями, які намагаються допомагати бідним верствам населення. Втім, гуманітарний характер цих банків зовсім не забороняє нам отримувати прибуток від цієї діяльності…"
  flavor_sie.2.a: "Вони будуть нашими!"