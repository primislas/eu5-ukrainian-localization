l_russian:
  flavor_eng_diplomacy_success: "Схоже, наші дипломатичні зусилля увінчалися успіхом."
  flavor_eng_diplomacy_failure: "Схоже, всі наші дипломатичні зусилля були марними."
  flavor_eng_diplomacy.1.title: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] погоджується з пропозицією"
  flavor_eng_diplomacy.1.desc_matter_of_matrimony_dowry_paid: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] погоджується підготувати гідне придане. Тепер обидві сторони виконали умови Договору Медіна-дель-Кампо.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_fields_of_the_cloth_of_gold_accepted: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] погоджується взяти участь у зустрічі. Підготовка йде повним ходом і, за попередніми підрахунками, займе кілька років, якщо тільки наші дві країни не вступлять у військовий конфлікт.\n\n$flavor_eng_diplomacy_success$"
  field_of_the_cloth_of_gold: "Поле золотої парчі"
  flavor_eng_diplomacy.1.desc_treaty_of_windsor: "Наші дипломатичні зусилля не пропали марно — влада #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! погодилася підписати довгостроковий Віндзорський договір, який забезпечить існування [ROOT.GetCountry.Custom('rank_ru_GEN')|l] і стане основою для побудови добрих відносин між нашими країнами.\n\nНаші дипломати явно не дарма їдять свій хліб."
  flavor_eng_diplomacy.1.desc_treaty_of_perpetual_peace_marriage: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] погоджується на пропозицію про шлюб. Тепер обидві сторони виконали умови договору про Вічний мир.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_union_of_the_crowns: "[sender.GetGovernment.GetRuler.GetName] погоджується на династичну унію між #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!. Тепер якщо [dying_monarch.GetName|l] помре, не залишивши спадкоємця, ці країни стануть однією країною.\n\n$flavor_eng_diplomacy_success$"
  flavor_eng_diplomacy.1.desc_treaty_of_windsor_renegotiated: "Наші дипломатичні зусилля не пропали марно — обидві сторони, включно з владою [sender.Custom('CL_GEN')], поклялися дотримуватися Віндзорського договору. [suitable_daughter.GetName] вже вирушила в дорогу. Скоро [sender.GetGovernment.GetRuler.GetName|l] візьме її заміж. Цей крок ще сильніше зблизить наші країни та забезпечить існування #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!.\n\nНаші дипломати явно не дарма їдять свій хліб."
  flavor_eng_diplomacy.1.desc_treaty_of_stjames: "Наші дипломатичні зусилля не пропали марно — влада #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! погодилася підписати договір про взаємодію. Тепер збройні сили #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! допомагатимуть нам з навчанням військ в обмін на торгові преференції.\n\nНаші дипломати явно не дарма їдять свій хліб."
  flavor_eng_diplomacy.1.desc_generic_treaty: "Наші дипломатичні зусилля не пропали марно — [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.IsFemale,'погодилася', 'погодився')] підписати договір.\n\nНаші дипломати явно не дарма їдять свій хліб."
  flavor_eng_diplomacy.1.a: "Безсумнівно, це вигідне партнерство."
  flavor_eng_diplomacy.1.b: "Почнемо підготовку."
  flavor_eng_diplomacy.1.c: "Несіть портвейн."
  flavor_eng_diplomacy.1.d: "Це добре передвістя."
  flavor_eng_diplomacy.1.tt1: "Унію корон можна запропонувати, якщо правителі #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_GEN')|L]#!#! мають спільних предків і не мають очевидного спадкоємця"
  flavor_eng_diplomacy.1.e: "Нарешті ми єдині."
  flavor_eng_diplomacy.1.tt2: "Унія корон набуде чинності, якщо [dying_monarch.GetName|l] помре, не залишивши спадкоємця"
  flavor_eng_diplomacy.1.f: "Негайно висилайте солдатів."
  flavor_eng_diplomacy.1.g: "Послуга за послугу."
  flavor_eng_diplomacy.1.tt3: "[ceded_location.GetRank.GetNameWithNoTooltip] [ceded_location.GetName] переходить до влади #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#!"
  flavor_eng_diplomacy.1.tt4: "[suitable_daughter.GetName] та [sender.GetGovernment.GetRuler.GetName|l] одружуються"
  flavor_eng_diplomacy.1.h: "Так народжується грізна сила."
  eng_accepted_alliance_with_us: "У союзі з нами"
  flavor_eng_diplomacy.1.i: "Все добре."
  flavor_eng_diplomacy.2.title: "[target_character.GetNameWithNoTooltip] з [sender.Custom('CL_GEN')] відкидає нашу пропозицію"
  flavor_eng_diplomacy.2.desc_fields_of_the_cloth_of_gold_declined: "Всі наші спроби організувати розкішний прийом виявилися марними: [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.IsFemale,'відмовилася', 'відмовився')] його відвідати. [Select_CString(sender.IsFemale,'Вона', 'Він')] не бажає підписувати договір.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_union_of_the_crowns_declined: "Спроба укласти унію між #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#! зазнала невдачі: [sender.GetGovernment.GetRulerTitle|l] [sender.Custom('CL_GEN')] відмовляється приймати нашу пропозицію.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_treaty_of_newcastle_declined: "[target_character.GetName] відхиляє запропонований нами Ньюкаслський договір між #ONCLICK:COUNTRY,[GetCountry('SCO').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SCO').Custom('CL_tt')],X [GetCountry('SCO').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.desc_generic_treaty: "На жаль, [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.IsFemale,'відкинула', 'відкинув')] нашу щедру пропозицію. [Select_CString(sender.IsFemale,'Вона', 'Він')] не бажає підписувати договір.\n\n$flavor_eng_diplomacy_failure$"
  flavor_eng_diplomacy.2.a: "Шанс втрачено."
  flavor_eng_diplomacy.2.b: "Наші старання були марними."
  flavor_eng_diplomacy.2.c: "У них немає честі."
  flavor_eng_diplomacy.2.d: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_eng_diplomacy.2.tt: "Ми більше не довіряємо #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#!"
  flavor_eng_diplomacy.1000.title: "[suitable_daughter.GetNameWithNoTooltip] з [GetCountry('ARA').Custom('CL_GEN')]"
  flavor_eng_diplomacy.1000.desc: "[ROOT.GetCountry.GetGovernment.GetHeir.GetName] дорослішає. Настав час підібрати йому гідну дружину, вигідну з династичної та дипломатичної точки зору. Укладаючи Договір Медіна-дель-Кампо, [GetCountry('ARA').GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[GetCountry('ARA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ARA').Custom('CL_tt')],X [GetCountry('ARA').Custom('CL_GEN')|L]#!#! обіцяв йому руку своєї дочки. Внаслідок цього передбачається, що [suitable_daughter.GetName] та [ROOT.GetCountry.GetGovernment.GetHeir.GetShortNameWithNoTooltip|l] скоро вступлять у законний шлюб.\n\nОднак залишається ще питання приданого, яке ми досі не отримали…"
  flavor_eng_diplomacy.1000.a: "Відправимо посла до [GetCountry('ARA').GetAdjectiveWithNoTooltip|l]ого двору."
  flavor_eng_diplomacy.1000.tt1: "Зроблено спробу отримати придане"
  flavor_eng_diplomacy.1000.b: "Забудемо про придане."
  flavor_eng_diplomacy.1000.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] виявляє великодушність"
  flavor_eng_diplomacy.1000.c: "Вона йому не пара."
  flavor_eng_diplomacy.1000.tt3: "[target_root_country.GetName] порушу[target_root_country.Custom('end_etyut')] Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1000.historical_info: "У 1509 році було укладено шлюб між спадкоємцем англійського престолу Генріхом VIII та принцесою Катериною Арагонською, дочкою іспанських монархів Фердинанда II Арагонського та Ізабелли I Кастильської. Початковою метою цього шлюбу було зміцнення союзу між Англією та Іспанією, однак майбутня королева так і не змогла народити чоловікові спадкоємця, внаслідок чого Генріх був змушений шукати розлучення."
  flavor_eng_diplomacy.1001.title: "Матримоніальне питання"
  flavor_eng_diplomacy.1001.desc_common: "Настав час виконати обіцяне. Згідно з Договором Медіна-дель-Кампо, [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] має видати свою майбутню дочку за спадкоємця престолу #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!."
  flavor_eng_diplomacy.1001.desc: "$flavor_eng_diplomacy.1001.desc_common$ Таким чином передбачається, що [suitable_daughter.GetName] та [target_root_country.GetGovernment.GetHeir.GetName|l] вступлять у законний шлюб.\n\nОднак питання приданого, яке також згадано в договорі і яке ми ще не виплатили, залишається відкритим."
  flavor_eng_diplomacy.1001.desc_dowry_foregone: "$flavor_eng_diplomacy.1001.desc_common$ Таким чином передбачається, що [suitable_daughter.GetName] та [target_root_country.GetGovernment.GetHeir.GetName|l] вступлять у законний шлюб.\n\nНа щастя для нас, монарх #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! великодушно відмовився від приданого."
  flavor_eng_diplomacy.1001.desc_marriage_refused: "$flavor_eng_diplomacy.1001.desc_common$ Однак інша сторона відмовилася від цього шлюбу, порушивши договір в односторонньому порядку."
  flavor_eng_diplomacy.1001.desc_dowry_refused: "[GetCountry('ARA').GetAdjectiveWithNoTooltip]ий посол швидким кроком увійшов до Білого залу. Він приніс погані вісті: [GetCountry('ARA').GetGovernment.GetRuler.GetName|l] навідріз відмовився платити придане, хоча його дочка [suitable_daughter.GetName] та [heir.GetName|l] уклали шлюб згідно з договором.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] мовчки вислухав його і відпустив. Посол покинув палац, безсумнівно, розуміючи, які наслідки викликали передані ним слова."
  flavor_eng_diplomacy.1001.a: "Відмовимося платити."
  flavor_eng_diplomacy.1001.b: "Передамо найкращі побажання."
  flavor_eng_diplomacy.1001.c: "У них немає честі."
  flavor_eng_diplomacy.1001.d: "Договір є договір."
  flavor_eng_diplomacy.1001.e: "Дівчинка залишиться у нас."
  flavor_eng_diplomacy.1001.tt: "Договір Медіна-дель-Кампо оголошено недійсним"
  flavor_eng_diplomacy.1100.title: "Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1100.desc: "Ми отримали дипломатичну нагоду забезпечити тривалий мир та отримати потенційного союзника в майбутньому. [overlord.GetName], стомлен[overlord.Custom('end_gegu')] від ворожості з боку #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, мо[overlord.Custom('end_gegu')] погодитися підписати договір, що об'єднує наші династії."
  flavor_eng_diplomacy.1100.a: "Запропонуємо договір."
  flavor_eng_diplomacy.1100.b: "Нам це ні до чого."
  flavor_eng_diplomacy.1100.tt1: "Влада [overlord.Custom('CL_GEN')] розгляне запропонований нами Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1100.tt2: "Завдяки цьому влада [overlord.Custom('CL_GEN')] з більшою ймовірністю підтримуватиме з нами тривалий мир"
  flavor_eng_diplomacy.1100.tt3: "Це знижує шанси на успіх дипломатичних переговорів з владою [GetCountry('FRA').Custom('CL_GEN')]"
  flavor_eng_diplomacy.1100.tt4: "Це гарантує, що [lesser_partner.GetGovernment.GetRulerTitle|l] [lesser_partner.Custom('CL_GEN')] видасть свою дочку за нашого спадкоємця"
  flavor_eng_diplomacy.1100.tt5: "Влада [GetCountry('FRA').Custom('CL_GEN')] вважає це жестом доброї волі"
  signed_medina_del_campo_treaty: "Підписано Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1100.historical_info: "Договір Медіна-дель-Кампо являв собою угоду між англійським королем Генріхом VII та іспанськими католицькими монархами Ізабеллою та Фердинандом про те, що дочка останніх, інфанта Катерина, вийде за спадкоємця англійського престолу Артура. Також цей договір передбачав взаємне зниження торгових мит та вироблення єдиної політики протистояння Франції."
  flavor_eng_diplomacy.1101.title: "Договір Медіна-дель-Кампо"
  flavor_eng_diplomacy.1101.desc: "У нас з'явилася нагода укласти довгостроковий дипломатичний договір між #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!. [target_root_country.GetAdjectiveWithNoTooltip]ий [target_root_country.GetGovernment.GetRulerTitle|l] пропонує нам виробити спільну політику у відносинах з владою #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, а також пов'язати наші країни династичним шлюбом."
  flavor_eng_diplomacy.1101.a: "Ми підпишемо цей договір."
  flavor_eng_diplomacy.1101.b: "Ми не бачимо в цьому вигоди."
  flavor_eng_diplomacy.1101.tt1: "[target_root_country.Custom('CL_ACC')] не зрадіє такій відмові"
  flavor_eng_diplomacy.1101.tt2: "Влада [GetCountry('FRA').Custom('CL_GEN')] вважатиме це жестом доброї волі"
  flavor_eng_diplomacy.1200.title: "Віндзорський договір"
  flavor_eng_diplomacy.1200.desc_common: "Щоб забезпечити собі виживання як незалежного королівства, нам слід звернути погляд на північ. Дипломатичні зв'язки з владою #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! допоможуть нашій династії отримати всіма визнані права на трон [GetCountry('POR').Custom('CL_GEN')]."
  flavor_eng_diplomacy.1200.desc_no_male_heir: "Для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! залишається актуальною проблема престолонаслідування. Відсутність спадкоємця може спонукати сусідів з #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_GEN')|L]#!#! до захоплення [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого престолу.\n\n$flavor_eng_diplomacy.1200.desc_common$"
  flavor_eng_diplomacy.1200.desc: "Легітимність династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetName] залишається важливою проблемою з точки зору стабільності #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_GEN')|L]#!#!. Сумніви в її праві на владу можуть спонукати сусідів з #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_GEN')|L]#!#! захопити [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий престол.\n\n$flavor_eng_diplomacy.1200.desc_common$"
  flavor_eng_diplomacy.1200.a: "Якомога швидше доставимо послання."
  flavor_eng_diplomacy.1200.tt: "Буде запропоновано договір"
  flavor_eng_diplomacy.1200.b: "Ми не потребуємо визнання."
  flavor_eng_diplomacy.1201.title: "Віндзорський договір"
  flavor_eng_diplomacy.1201.desc_common: "[GetCountry('POR').GetAdjectiveWithNoTooltip]ий посол доставив нам послання з пропозицією укласти договір про взаємну підтримку.\n\nЦей договір також передбачає, що влада #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! визнає незаперечні права династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] на трон [GetCountry('POR').Custom('CL_GEN')]."
  flavor_eng_diplomacy.1201.desc_no_male_heir: "У [ROOT.GetCountry.Custom('CL_PREP')] виникла проблема престолонаслідування. Відсутність спадкоємця чоловічої статі може спонукати сусідню [GetCountry('CAS').Custom('CL_ACC')] захопити місцевий престол. $flavor_eng_diplomacy.1201.desc_common$"
  flavor_eng_diplomacy.1201.desc_low_legitimacy: "У [ROOT.GetCountry.Custom('CL_PREP')] виникли сумніви в легітимності династії [GetCountry('POR').GetGovernment.GetRuler.GetDynasty.GetName]. Втрата нею авторитету може спонукати сусідню [GetCountry('CAS').Custom('CL_ACC')] захопити місцевий престол. $flavor_eng_diplomacy.1201.desc_common$"
  flavor_eng_diplomacy.1201.a: "Ми думаємо однаково."
  flavor_eng_diplomacy.1201.b: "Це не в наших інтересах."
  flavor_eng_diplomacy.1201.historical_info: "Віндзорський договір між Англією та Португалією було укладено 9 травня 1386 року. Ця історична угода була винятково важливою для обох сторін: Англія в той час страждала від дипломатичної ізоляції, а Португалія намагалася відстояти свою незалежність. Крім зміцнення політичної та військової співпраці, договір сприяв розвитку торгівлі, надаючи купцям більше свободи у веденні справ на території обох країн."
  flavor_eng_diplomacy.1300.title: "Міцна дружба"
  flavor_eng_diplomacy.1300.desc: "[target_root_country.GetName] і [ROOT.GetCountry.GetName] більше не союзники, але завдяки Віндзорському договору у відносинах між нашими країнами намітилися перспективи. Оскільки [target_root_country.GetGovernment.GetRuler.GetName|l] досі [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'незаміжня', 'неодружений')], нам слід розглянути можливість династичного шлюбу з умовою підписання нового союзного договору. Якщо як придане ми заявимо цінні території, перед такою пропозицією ніхто не встоїть.\n\nМісцевість #TOOLTIP:LOCATION,tangier,X #L Танжер#!#! створює нам чимало проблем і дорого обходиться з точки зору оборони, однак для [target_root_country.Custom('CL_GEN')] він міг би стати стратегічно важливим портом."
  flavor_eng_diplomacy.1300.a: "Підготуємо необхідні документи."
  flavor_eng_diplomacy.1300.a.custom: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|U] і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] не дуже раді пропозиції здати Танжер."
  flavor_eng_diplomacy.1300.b: "Запропонуємо замість цього [overseas_location.Custom('LR_ACC')|l] [overseas_location.GetNameWithNoTooltip]."
  flavor_eng_diplomacy.1300.c: "У цьому немає потреби."
  flavor_eng_diplomacy.1301.title: "Відродження міцної дружби"
  flavor_eng_diplomacy.1301.desc: "#L [GetCountry('POR').GetAdjective]ий#! посол доставив нам пропозицію укласти союз і розглянути можливість того, що їх [suitable_daughter.GetName] і [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'наша незаміжня', 'наш неодружений')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] укладуть династичний шлюб.\n\nЯк придане вони пропонують стратегічну [overseas_location.Custom('LR_ACC')|l] [overseas_location.GetName]. Можливо, її придбання відповідає нашим інтересам, а можливо, і ні."
  flavor_eng_diplomacy.1301.a: "Це прийнятні умови."
  flavor_eng_diplomacy.1301.b: "Це просто сміховинна пропозиція."
  flavor_eng_diplomacy.1301.historical_info: "Відстоявши свою незалежність від Іспанської імперії, Португалія зробила спробу відродити союз з Англією: вона не справлялася з обороною своїх обширних заморських володінь, тому потребувала політичної та військової підтримки англійців. За підсумками дипломатичних переговорів англійський король Карл II одружився з португальською принцесою Катериною Браганською, отримавши острови Бомбея, провінцію Танжер, а також торгові привілеї в Бразилії та Португальській Ост-Індії."
  flavor_eng_diplomacy.1400.title: "Нонсачський договір"
  flavor_eng_diplomacy.1400.desc: "[GetCountry('NED').GetName] усвідом[GetCountry('NED').Custom('end_etyut')] свою вразливість перед загрозою вторгнення могутнього противника. Рано чи пізно їм доведеться звернутися до найманців або шукати достатньо сильного союзника.\n\nМи можемо простягнути їм руку допомоги, надавши рекрутів для оборони кордонів. Як плату ми попросимо преференції для своїх купців на певних територіях, щоб зміцнити наші позиції на континенті."
  flavor_eng_diplomacy.1400.a: "Чудова пропозиція."
  flavor_eng_diplomacy.1400.tt1: "Запропоновано договір"
  flavor_eng_diplomacy.1400.b: "Наші війська потрібні нам самим."
  STATIC_MODIFIER_NAME_favoring_own_interests: "Перевага власних інтересів"
  flavor_eng_diplomacy.1400.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у захваті від нових можливостей вигідної торгівлі"
  flavor_eng_diplomacy.1400.tt3: "Якщо договір буде укладено, 5000 [Concept('manpower', 'рекрутів')|e] вирушать зміцнювати оборону [GetCountry('NED').Custom('CL_GEN')]"
  flavor_eng_diplomacy.1400.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] розчаровані втраченими можливостями вигідної торгівлі"
  signed_nonsuch_treaty: "Підписано Нонсачський договір"
  flavor_eng_diplomacy.1401.title: "Нонсачський договір"
  flavor_eng_diplomacy.1401.desc: "Ми отримали дипломатичну нагоду захистити свої кордони від небезпечних сусідів та закласти фундамент партнерства задля майбутньої безпеки. Бажаючи розвивати торгівлю на континенті, влада #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! пропонує нам своїх солдатів в обмін на торгові привілеї в окремих областях нашої країни."
  flavor_eng_diplomacy.1401.a: "Вельми вигідні умови."
  flavor_eng_diplomacy.1401.tt1: "#L [target_root_country.GetAdjective]і#! купці відкриють кілька торгових контор у #TOOLTIP:AREA,holland_area,X #L Голландії#!#!"
  flavor_eng_diplomacy.1401.b: "Це не в наших інтересах."
  flavor_eng_diplomacy.1500.title: "Тагільдський договір"
  flavor_eng_diplomacy.1500.desc: "Ми отримали дипломатичну нагоду укласти довгостроковий мир, здатний у майбутньому перетворитися на союз. [GetCountry('POR').GetName], втомившись від прикордонних сутичок з #L [GetCountry('CAS').GetAdjective|l]ими#! сусідами, охоче підпиш[GetCountry('POR').Custom('end_etut')] з нами договір, якщо ми визнаємо незалежність цієї країни від [GetCountry('CAS').Custom('CL_GEN')]."
  flavor_eng_diplomacy.1500.a: "Підпишемо та відправимо."
  flavor_eng_diplomacy.1500.tt: "Запропоновано договір"
  signed_tagilde_treaty: "Підписано Тагільдський договір"
  flavor_eng_diplomacy.1500.b: "Краще уникати конфлікту з владою [GetCountry('CAS').Custom('CL_GEN')]."
  declined_advantageous_treaty: "Відхилено вигідний договір"
  flavor_eng_diplomacy.1500.historical_info: "Підписання Тагільдського договору між Португалією та Англією вважається першим кроком до Англо-португальського союзу, який зберігся до наших днів. Цей договір був критично важливим для Португалії, яка намагалася отримати незалежність від сусідньої Кастилії, але й Англія, у якої в той час майже не залишилося друзів серед європейських монархів, отримала від союзу чималу вигоду."
  flavor_eng_diplomacy.1501.title: "Тагільдський договір"
  flavor_eng_diplomacy.1501.desc: "Ми отримали дипломатичну нагоду укласти довгостроковий мир, здатний у майбутньому перетворитися на союз. [target_root_country.GetName], втомившись від міжнародної ізоляції, пропону[target_root_country.Custom('end_etyut')] нам договір, який допоможе захистити нашу незалежність від #ONCLICK:COUNTRY,[GetCountry('CAS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CAS').Custom('CL_tt')],X [GetCountry('CAS').Custom('CL_GEN')|L]#!#!."
  flavor_eng_diplomacy.1501.a: "Ми підпишемо цей договір."
  flavor_eng_diplomacy.1501.b: "Не варто посилювати конфлікт з владою [GetCountry('CAS').Custom('CL_GEN')]."
  flavor_eng_diplomacy.1600.title: "[robert_shirley.GetNameWithNoTooltip] та його пригоди"
  flavor_eng_diplomacy.1600.desc: "[Select_CString(robert_shirley.IsFemale,'Харизматична мандрівниця', 'Харизматичний мандрівник')] [robert_shirley.GetName] бажає очолити посольство до країн Сходу. Основною метою цього підприємства має стати реформа та модернізація #L [GetCountry('IRA').GetAdjective|l]ого#! війська. Головний ворог молодої країни — [GetCountry('TUR').GetName]. Ця імперія становить значну загрозу і для європейських країн.\n\nНатомість ми можемо отримати торгові привілеї та посилити позиції своїх купців у цьому регіоні."
  flavor_eng_diplomacy.1600.a: "Нехай [Select_CString(robert_shirley.IsFemale,'вона', 'він')] вирушить у путь."
  flavor_eng_diplomacy.1600.tt1: "З'явиться [Concept('character', 'персонаж')|e] [robert_shirley.GetNameWithNoTooltip]"
  flavor_eng_diplomacy.1600.tt2: "[Select_CString(robert_shirley.IsFemale,'Вона', 'Він')] спробує домогтися того, щоб [GetCountry('IRA').GetGovernment.GetRulerOrRegent.GetName] [Select_CString(GetCountry('IRA').GetGovernment.GetRulerOrRegent.IsFemale,'надала', 'надав')] торгові поступки"
  flavor_eng_diplomacy.1600.b: "Про це не може бути й мови."
  flavor_eng_diplomacy.1600.tt3: "З'явиться [Concept('character', 'персонаж')|e] [robert_shirley.GetNameWithNoTooltip], який залишиться в [target_root_country.Custom('CL_PREP')]"
  flavor_eng_diplomacy.1600.historical_info: "Англійський дипломат та авантюрист Роберт Ширлі прославився своїми подорожами Близьким Сходом, зігравши ключову роль у встановленні відносин між Англією та сефевідською Персією. Він став довіреним радником та посланцем шаха, а також допоміг модернізувати перське військо, що дозволило Сефевідам зрівнятися в силі з їхнім головним ворогом — Османською імперією."
  flavor_eng_diplomacy.1601.title: "Реформи Рузбеха Ширазі"
  flavor_eng_diplomacy.1601.desc: "Нас [Select_CString(robert_shirley.IsFemale,'відвідала воєначальниця', 'відвідав воєначальник')] та дипломат [robert_shirley.GetName] із воістину інтригуючою пропозицією. Бажаючи поділитися військовим досвідом своїх співвітчизників, [Select_CString(robert_shirley.IsFemale,'вона готова', 'він готовий')] взятися за важливу справу — перенавчити наше велике військо, щоб воно могло краще протистояти агресорам із #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#!.\n\nНатомість ми повинні пустити до себе купців із цієї країни невірних, які безсумнівно спробують втрутитися в нашу торгівлю зі Сходом."
  flavor_eng_diplomacy.1601.a: "Це необхідне зло."
  flavor_eng_diplomacy.1601.tt1: "З'явиться [Concept('character', 'персонаж')|e] [robert_shirley.GetNameWithNoTooltip]"
  STATIC_MODIFIER_NAME_modernizer: "Модернізатор"
  flavor_eng_diplomacy.1601.tt2: "Давши [Select_CString(robert_shirley.IsFemale,'їй', 'йому')] посаду в [Concept('cabinet', 'раді')|e], ви отримаєте додаткові переваги"
  flavor_eng_diplomacy.1601.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не зрадіють єретикам при дворі"
  flavor_eng_diplomacy.1601.b: "Ми не потребуємо непроханих порад."
  enable_european_militia_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,european_militia_reform,X #L «Ополчення Ширлі»#!#!"