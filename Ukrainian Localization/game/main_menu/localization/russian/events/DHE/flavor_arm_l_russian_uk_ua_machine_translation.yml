l_russian:
  flavor_arm.1.title: "Втрата знань"
  flavor_arm.1.desc: "Уже кілька століть #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName] слугує оплотом нашої науки та культури. Йому протегують багато знатних родин, однак останнім часом справи у його меценатів ідуть дедалі гірше. Через брак грошей деякі напрямки досліджень було згорнуто, а багато викладачів втратили посади. Якщо ми не допоможемо університету, є побоювання, що він закриється зовсім…"
  flavor_arm.1.a: "Нехай закривається."
  flavor_arm.1.b: "Виділити кошти!"
  flavor_arm.2.title: "Татевський університет"
  flavor_arm.2.desc: "Монастир, розташований у [target_location.Custom('LR_PREP')|l] [target_location.GetName], зібрав значний архів договорів, офіційних документів та різноманітних манускриптів. Він перетворився на справжній храм знань, і тепер його викладачі надіслали нам петицію з проханням про його розширення. Зокрема, вони пропонують заснувати факультети каліграфії та музики."
  flavor_arm.2.a: "Профінансуємо розширення."
  flavor_arm.2.b: "Краще не треба."