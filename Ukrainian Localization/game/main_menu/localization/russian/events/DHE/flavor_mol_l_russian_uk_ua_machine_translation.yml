l_russian:
  flavor_mol.1000.title: "[target_character.GetShortNameWithNoTooltip] [target_character.GetNicknameWithNoTooltip]"
  flavor_mol.1000.desc: "Відтоді, як існує [target_country.GetLongName], [root_country.GetName] постійно бореться зі свирепими #L [target_country.GetCulture.GetName|l]ими#! нальотчиками. [target_character.GetShortName] з [target_location.Custom('LR_GEN')|l] [target_location.GetName] має намір об'єднати область [target_area.GetName] під своїми та нашими знаменами. [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'поклялася', 'поклявся')], що [root_character.GetName] завжди зможе розраховувати на [Select_CString(target_character.IsFemale,'її', 'його')] відданість. [Select_CString(target_character.IsFemale,'Вона', 'Він')] обіцяє нам, що наведе лад на кордонах і вірно служитиме [root_country.Custom('rank_ru_DAT')|l] на посаді голови #TOOLTIP:SUBJECT_TYPE,march,X #L марки#!#!."
  flavor_mol.1000.historical_info: "Драгош Воде, також відомий як Драгош Засновник, був першим воєводою Молдавії та васалом угорської корони. Після славної перемоги над Золотою Ордою в 1345 році Драгош та інші жителі Марамуреша прийшли до річки Молдава та заснували там поселення. Втім, правдивість легенди про притулок на берегах річки ставиться під сумнів, і історія заснування Молдавії досі оповита таємницею."
  flavor_mol.1000.a: "Нехай керує маркою."
  flavor_mol.1000.a.at: "[target_character.GetName] вирушить в область [target_area.GetName], щоб заснувати там #L [GetCountry('MOL').GetAdjective|l]у#! #TOOLTIP:SUBJECT_TYPE,march,X #L марку#!#!."
  flavor_mol.1000.a.bt: "#R Це може призвести до конфлікту з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!"
  flavor_mol.1000.b: "Ми не хочемо накликати на себе гнів [target_country.Custom('CL_GEN')]."
  flavor_mol.1001.title: "[GetCountry('MOL').GetAdjectiveWithNoTooltip]а #TOOLTIP:SUBJECT_TYPE,march,X #L марка#!#!"
  flavor_mol.1001.desc: "[target_character.GetName] з #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! [Select_CString(target_character.IsFemale,'увійшла', 'увійшов')] в область [target_area.GetName] з парадним військом [root_country.GetAdjectiveWithNoTooltip|l]их вояків. Зовсім не зважаючи на нашу владу, ці люди оселилися в [target_location.Custom('LR_PREP')|l] [target_location.GetName] і створили прямо у нас під носом країну [release_country.GetName]!"
  flavor_mol.1001.historical_info: "Зазнавши розгромної поразки від угорських військ у 1345 році, Драгош Воде, також відомий як Драгош Засновник, відступив до Молдавії та заснував марку для угорського короля. Історія заснування Молдавії оповита таємницею, і правдивість легенди про притулок на берегах річки ставиться під сумнів, проте ця подія часто вважається початком Молдавського воєводства."
  flavor_mol.1001.a: "Ми не можемо дозволити собі ворогувати з [root_country.Custom('CL_INST')] з такого приводу."
  flavor_mol.1001.b: "Оголошуємо війну!"
  flavor_mol.1002.title: "#L [target_country.GetAdjective]ий#! напад"
  flavor_mol.1002.desc: "Після заснування #ONCLICK:COUNTRY,[release_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[release_country.Custom('CL_tt')],X [release_country.Custom('CL_GEN')|L]#!#! наша влада простягається до самих #TOOLTIP:REGION,steppes_region,X #L степів#!#!. Однак [target_country.GetLongName], і особисто [target_country.GetGovernment.GetRulerTitle|l] [target_character.GetName], бачить у розширенні нашої території загрозу своєму варварському правлінню. #L [target_country.GetCulture.GetName]і#! нальотчики вже проникли на наші землі. Так [target_country.GetNameWithNoTooltip] і [root_country.GetNameWithNoTooltip] вступили у війну."
  flavor_mol.1002.a: "До зброї!"
  flavor_mol.1003.title: "$flavor_mol.1000.title$"
  flavor_mol.1003.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'вторглася', 'вторгся')] в наші землі, сподіваючись оселитися в області [target_area.GetName] та зміцнити кордон з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!. Багато #TOOLTIP:CULTURE,$moldovan_tt$,X #L молдаван#!#! втомилися від гніту #L [target_country.GetCulture.GetName|l]ого#! правління і вважають, що [target_character.GetShortNameWithNoTooltip] заслуговує на підтримку."
  flavor_mol.1003.a: "Попросимо захисту у [root_country.Custom('CL_GEN')]"
  flavor_mol.1003.a.tt: "Всі інші країни в області [target_area.GetName] можуть приєднатися до нас"
  flavor_mol.1003.b: "Який сенс міняти одного пана на іншого."
  flavor_mol.1004.title: "Заснування [release_country.Custom('CL_GEN')]"
  flavor_mol.1004.title_default: "Заснування Молдавії"
  flavor_mol.1004.desc: "$flavor_mol.1003.desc$\n\nТепер [Select_CString(target_character.IsFemale,'її', 'його')] люди з'явилися сюди, сподіваючись переконати нас також приєднатися до #ONCLICK:COUNTRY,[release_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[release_country.Custom('CL_tt')],X [release_country.Custom('CL_DAT')|L]#!#!."
  flavor_mol.1004.a: "Наші землі мають бути єдині!"
  flavor_mol.1004.b: "Ми не можемо відвернутися від [target_country.Custom('CL_GEN')]."
  opinion_hun_moldavian_push: "Молдавський натиск"
  become_moldavia_tt: "Заснування #Y Молдавії#! та створення #TOOLTIP:SUBJECT_TYPE,march,X #L марки#!#! на становищі [Concept('subject', 'васала')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#!"