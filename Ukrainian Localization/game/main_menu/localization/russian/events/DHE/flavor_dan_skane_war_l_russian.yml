l_russian:
 flavor_dan_skane_war.1.title: "[target_character.GetNameWithNoTooltip] поднимает мятеж"
 flavor_dan_skane_war.1.entry: "Восстание Юхана Оффессона"
 flavor_dan_skane_war.1.desc: "[target_character.GetName] — досточтимый муж, которого уважают все [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] — оказался замешан в заговоре против нашего #L [GetCountry('SWE').GetAdjective|l]ого#! сюзерена. Причины его недовольства ясны: [target_ruler.GetName|l] частенько пренебрегает интересами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [GetCountry('SWE').GetCulture.GetNameWithNoTooltip]ие [GetCountry('SWE').GetGovernment.GetEstateName('nobles_estate')|l] для [Select_CString(target_ruler.IsFemale,'неё', 'него')] важнее всех. Последние вести из #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#! играют нам на руку. Быть может, пришло время заявить о нашей верности #L [GetCountry('DAN').GetAdjective|l]ому#! государству?"
 flavor_dan_skane_war.1.a: "Изгоним его на территорию [GetCountry('DAN').Custom('CL_GEN')]."
 flavor_dan_skane_war.1.a.entry: "Прогоним его в Данию."
 flavor_dan_skane_war.1.b: "Поддержим его мятеж."
 flavor_dan_skane_war.1.b.tt: "За этим может последовать присоединение нашей державы к #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_DAT')|L]#!#!."
 flavor_dan_skane_war.2.title: "[target_character.GetNameWithNoTooltip] предлагает свои услуги"
 flavor_dan_skane_war.2.desc: "[target_character.GetName] вернулся из #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#!, где он боролся за #L [ROOT.GetCountry.GetAdjective|l]ую#! власть над #TOOLTIP:AREA,skaneland_area,X #L Сканией#!#!. Если мы пригласим его ко двору, то он сможет наладить отношения с #TOOLTIP:CULTURE,$danish_tt$,X #L датскими#!#! дворянами, проживающими в #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_PREP')|L]#!#!."
 flavor_dan_skane_war.2.a: "Мы с удовольствием пригласим его!"
 flavor_dan_skane_war.2.a.tt: "Когда придёт время, мы сможем рассчитывать на [GetCountry('SKE').GetAdjectiveWithNoTooltip]ую поддержку"
 flavor_dan_skane_war.2.b: "Нам не нужна помощь."
 flavor_dan_skane_war.3.title: "Возвращение [GetCountry('SKE').Custom('CL_GEN')] в лоно семьи"
 flavor_dan_skane_war.3.desc: "[GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')] #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! снова вняли голосу разума и решили, что их [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'законной правительницей должна', 'законным правителем должен')] стать [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. [GetCountry('SWE').GetLongName] — власти этой страны, конечно, будут в ярости, но мы не видим особых причин откладывать коронацию."
 flavor_dan_skane_war.3.a: "Знаменательный день!"
 flavor_dan_skane_war.3.b: "Нам не нужна эта корона."
 flavor_dan_skane_war.4.title: "[GetCountry('SKE').GetNameWithNoTooltip] и [GetCountry('DAN').GetNameWithNoTooltip] снова вместе"
 flavor_dan_skane_war.4.desc: "Коварные [GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! вместе с властями #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#! решили положить конец нашему правлению в #TOOLTIP:AREA,skaneland_area,X #L Скании#!#!. Если мы срочно что-то не предпримем, то потеряем эту территорию. Возможно, навсегда."
 flavor_dan_skane_war.4.a: "Это возмутительно!"
 flavor_dan_skane_war.5.title: "Предложение о покупке [GetCountry('SKE').Custom('CL_GEN')]"
 flavor_dan_skane_war.5.desc: "Восстание, которое [Select_CString(target_character.IsFemale,'подняла', 'поднял')] [target_character.GetName], не принесло желаемых результатов: открытых мятежей больше не было, однако напряжение между #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#! и #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#! никуда не делось.\n\nЧтобы избежать кровопролития и обеспечить мир в #TOOLTIP:REGION,scandinavian_region,X #L Скандинавии#!#!, мы должны выкупить Сканию у #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_GEN')|L]#!#!."
 flavor_dan_skane_war.5.a: "Выдвинем это предложение."
 flavor_dan_skane_war.5.a.tt: "В качестве платы за [GetCountry('SKE').Custom('CL_ACC')] мы предложим наш шестимесячный доход. Если власти #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_GEN')|L]#!#! согласятся, Скания станет нашим вассалом"
 flavor_dan_skane_war.5.b: "Нас это больше не интересует."
 flavor_dan_skane_war.6.title: "Власти [GetCountry('DAN').Custom('CL_GEN')] предлагают купить [GetCountry('SKE').Custom('CL_ACC')]"
 flavor_dan_skane_war.6.desc: "[GetCountry('DAN').GetName] хот[GetCountry('DAN').Custom('ityat')] купить у нас права на владение #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#!. Если мы примем это предложение, то получим много золота, которое сможем потратить на свои нужды, но потеряем непосредственный выход к #TOOLTIP:LOCATION,oresund,X #L Эресунну#!#!."
 flavor_dan_skane_war.6.a: "Мы принимаем предложение!"
 flavor_dan_skane_war.6.b: "Отклоним предложение!"
 flavor_dan_skane_war.7.title: "Власти [GetCountry('SWE').Custom('CL_GEN')] принимают наше предложение"
 flavor_dan_skane_war.7.desc: "[GetCountry('SWE').GetName] согласил[GetCountry('SWE').Custom('assya')] продать нам права на владение #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#!. Хотя ряд формальностей пока не выполнен, договор уже ратифицирован и вступил в силу."
 flavor_dan_skane_war.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
