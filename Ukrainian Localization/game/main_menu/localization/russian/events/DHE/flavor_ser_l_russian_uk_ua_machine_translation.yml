l_russian:
  flavor_ser.10.title: "Слабкість корони"
  flavor_ser.10.desc: "[GetCharacter('ser_stefan_dusan').GetName] [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'залишила', 'залишив')] велику спадщину — могутнє царство, що заволоділо значною частиною Балкан. На жаль, [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'сильна і шанована всіма цариця померла', 'сильний і шанований всіма цар помер')], і тепер на троні нашої країни сидить [target_character.GetName] — [Select_CString(target_character.IsFemale,'правителька', 'правитель')], на загальну думку, [Select_CString(target_character.IsFemale,'слабка і нерішуча', 'слабкий і нерішучий')]. Придворні шепочуться про некомпетентність нинішнього монарха, авторитет царської влади стрімко падає, всі завоювання [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'покійної цариці', 'покійного царя')] ось-ось будуть втрачені. [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'поставила', 'поставив')] країну на межу краху, царство стрімко занурюється в хаос."
  flavor_ser.10.a: "Нехай [target_parent.GetNameWithNoTooltip] стане регентом."
  flavor_ser.10.b: "[target_dynasty_member_scope.GetNameWithNoTooltip] більш [Select_CString(target_dynasty_member_scope.IsFemale,'достойна', 'достойний')] правити країною."
  flavor_ser.10.c: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] поступитися троном!"
  flavor_ser.10.d: "Ми не боїмося, і ми готові битися!"
  flavor_ser.10.e: "Ми поставимо їх на коліна."
  ser_every_conquered_location_gets_tt: "Кожна [Concept('conquered', 'завойована')|e] [Concept('location', 'місцевість')|e] постраждає від таких ефектів:"
  ser_abdicate_throne_tt: "[target_character.GetNameWithNoTooltip] зречеться престолу"
  flavor_ser.11.title: "Боротьба за владу"
  flavor_ser.11.desc: "Поки країною [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'правила', 'правив')] [GetCharacter('ser_stefan_dusan').GetName], впливова [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] бездіяла, не сміючи виступати проти [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'могутньої цариці', 'могутнього царя')]. Але тепер, коли на троні сидить [target_character.GetName], вони одразу ж осміліли. До двору з'явилася делегація дворян з вимогою більшої автономії та скорочення зобов'язань. Посли благородного стану наполягають, щоб їх прийняли, інакше вся країна пізнає гнів їхніх господарів…"
  flavor_ser.11.a: "Доведеться піти їм назустріч…"
  flavor_ser.11.b: "Їхню вірність можна забезпечити невеликими поступками."
  flavor_ser.11.c: "Спустимо нахаб з драбини."
  flavor_ser.11.d: "Нам байдуже до їхніх погроз!"
  flavor_ser.11.e: "Вони підкоряються мені!"
  STATIC_MODIFIER_NAME_ser_reduced_taxation_obligation_modifier: "Скорочення зобов'язань"
  flavor_ser.12.title: "Контроль корони слабшає"
  flavor_ser.12.desc: "Інтриги та махінації впливових вельмож вже давно визначають практично всю політику нашої країни. Для виду вони демонструють відданість центральній владі, але насправді служать лише власним інтересам, залишаючись у тіні трону та смикаючи за ниточки. Тепер, коли країною править [Select_CString(target_character.IsFemale,'слабка і некомпетентна', 'слабкий і некомпетентний')] [target_character.GetName], могутні лідери впливових груп вимагають передати їм владу над прикордонними областями нашої країни — інакше, стверджують вони, ми не зможемо утримати околиці…"
  flavor_ser.12.a: "Доведеться піти їм назустріч… до пори до часу."
  flavor_ser.12.b: "Добре, вони отримають контроль над прикордонними володіннями."
  flavor_ser.12.c: "Ну, якщо вони хочуть боротьби…"
  ser_every_location_20_control_tt: "Усі належні нам [Concept('location', 'місцевості')|e] втратять [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'контролю')|e]"
  STATIC_MODIFIER_NAME_ser_noble_borderlands_modifier: "Прикордоння під контролем феодалів"
  STATIC_MODIFIER_NAME_ser_clergy_borderlands_modifier: "Прикордоння під контролем духовенства"
  STATIC_MODIFIER_NAME_ser_burgher_borderlands_modifier: "Прикордоння під контролем купців"
  flavor_ser.30.title: "[GetCharacter('ser_stefan_dusan').GetNameWithNoTooltip] і [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'її', 'його')] мрія"
  flavor_ser.30.desc: "Чимало правителів величали себе наступниками Риму. Майже кожна християнська країна мріяла про велику імперію, про царський пурпур, про завоювання, подібних до яких не бачив світ. [GetCharacter('ser_stefan_dusan').GetName], на відміну від інших претендентів, має всі необхідні задатки, щоб здійснити цю мрію. Під [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'її', 'його')] мудрим і рішучим керівництвом ми підемо в бій і візьмемо те, що належить нам по праву!"
  flavor_ser.30.a: "Стережись, Константинополю! Ми здобудемо славу нового Риму!"
  ser_conquest_into_empire: "Якщо ми зуміємо завоювати ці [Concept('provinces', 'провінції')|e], поки [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'жива', 'живий')] [GetCharacter('ser_stefan_dusan').GetShortNameWithNoTooltip], то станемо #TOOLTIP:COUNTRY_RANK,rank_empire,X #L царством#!#! і зможемо призначити власного #italic автокефального#! [Concept('patriarch', 'патріарха')|e]"
  stefan_uros_conqueror_tt: "[target_character.GetName] матиме [Concept('modifier', 'модифікатор')|e] [Concept('character', 'персонажа')|e] #TOOLTIP:STATIC_MODIFIER,insatiable_ambition,X #V #L «Непомірні амбіції»#!#! протягом свого правління"
  granted_claims_stefan_uros_tt: "Ми отримаємо [Concept('casus_belli', 'привід')|e] #TOOLTIP:CASUS_BELLI,cb_conquer_province,X #L «Претензії на провінцію»#!#! для війни проти #TOOLTIP:PROVINCE_DEFINITION,upper_macedonia_province,X #L Верхньої Македонії#!#!, #TOOLTIP:PROVINCE_DEFINITION,lower_macedonia_province,X #L Нижньої Македонії#!#!, #TOOLTIP:PROVINCE_DEFINITION,chalkidiki_province,X #L Халкідіків#!#! та #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалії#!#!"
  flavor_ser.30.historical_info: "Коронація Стефана Уроша IV Душана в 1346 році поклала початок розквіту середньовічної сербської країни. Військові перемоги та юридичні реформи цього правителя перетворили Сербію на найсильнішу країну Балкан. Користуючись занепадом Візантії, Душан приєднав до своїх володінь великі області Македонії, Фессалії та навіть Епіру. На церковному соборі в Скоп'є його проголосили царем сербів і греків, що дало його країні не лише політичну вагу, а й церковну автономію: статус Сербської церкви піднявся до патріархату. Імператорський титул монарха символізував прагнення Сербії змінити Візантію як провідну православну країну регіону."
  flavor_ser.31.title: "Розквіт нового царства"
  flavor_ser.31.desc: "Подібно до фенікса, що повстав з попелу, [GetCharacter('ser_stefan_dusan').GetName] [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'вивела', 'вивів')] наш народ з темряви і [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'принесла', 'приніс')] #L [ROOT.GetCountry.GetAdjective|l]ій#! країні небувалу велич і славу. З занепадом #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! багато колишніх володінь ромеїв опинилися в наших руках. Попри опір місцевого населення, ці завоювання стануть лише першим кроком на нашому великому шляху. На Балканах зародилася нова сила, і перемога її близька. Ми наповнимо землю кров'ю своїх ворогів — так було передбачено, і так буде. Вперед! #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! чекає на нас! Нікого не щадити! В бій!"
  flavor_ser.31.a: "Настав час нашої слави!"
  flavor_ser.31.b: "У цій справі поспішати не можна…"
  flavor_ser.31.historical_info: "У 1346 році Стефан Урош IV Душан, також відомий як Душан Сильний, був коронований царем сербів і греків. Ця подія стала поворотним моментом в історії балканського регіону. Стефан IV народився в 1308 році в родині короля Сербії Стефана Уроша III Дечанського. У 1331 році він підняв повстання і силою захопив батьківський престол. Амбіції Стефана IV виходили далеко за межі сербських кордонів — він провів низку успішних кампаній проти Візантійської імперії, де в той час правив Іоанн VI Кантакузин. Коронація на царство в Скоп'є закріпила владу Стефана IV над величезними територіями, що простягалися від сучасної Хорватії до південної Греції. Щоб зміцнити незалежність нової країни, цар заснував автокефальну Сербську православну церкву на чолі з патріархом Печа. Потім він видав «Законник Стефана Душана» — всеосяжний звід законів, в основу якого лягло візантійське та римське право. Під владою Стефана IV Сербія досягла зеніту могутності, культурного впливу та територіальної експансії, однак після смерті царя в 1355 році царство почало розпадатися і швидко втратило колишні завоювання. Недовгий період розквіту Сербського царства залишив значний слід в історії країни."
  flavor_ser.40.title: "[target_character.GetNameWithNoTooltip] переходить на наш бік"
  flavor_ser.40.desc: "Не секрет, що при дворі нашого ворога вистачає жадібних стерв'ятників, готових розірвати власну країну на частини при першій же ознаці слабкості. З початком війни хитке становище #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! стало очевидним для всіх придворних з честолюбними прагненнями. [Select_CString(target_character.IsFemale,'Однією', 'Одним')] з них [Select_CString(target_character.IsFemale,'стала', 'став')] [target_character.GetName]. Позбувшись прихильників і втративши надію захопити трон, [Select_CString(target_character.IsFemale,'вона вирішила', 'він вирішив')] переметнутися на наш бік."
  flavor_ser.40.a: "[Select_CString(target_character.IsFemale,'Вона', 'Він')] стане непоганим доповненням до наших воїнів."
  flavor_ser.40.b: "Перебіжчикам у нас не раді!"
  flavor_ser.40_for_byz_tt: "[GetCountry('BYZ').GetLongNameWithNoTooltip] дізнається про те, що [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'перейшла', 'перейшов')] на бік ворога"
  flavor_ser.41.title: "Ніж у спину"
  flavor_ser.41.desc: "До нас дійшли звістки, що [target_character.GetName] [Select_CString(target_character.IsFemale,'залишила', 'залишив')] свій пост і по суті [Select_CString(target_character.IsFemale,'переметнулася', 'переметнувся')] на бік ворога в розпал військових дій. [Select_CString(target_character.IsFemale,'Її', 'Його')] зрада не буде прощена або забута. Подібну образу нашої влади можна змити тільки кров'ю!"
  flavor_ser.41.a: "[Select_CString(target_character.IsFemale,'Мерзенна зрадниця', 'Мерзенний зрадник')]!"
  flavor_ser.50.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]ий «Законник»"
  flavor_ser.50.desc: "Нові завоювання та великі перемоги, які [Select_CString(target_character.IsFemale,'здобула', 'здобув')] [target_character.GetName], сприяли настанню доби небаченого процвітання. Але за всяким руйнуванням повинно слідувати відродження, і тому ми склали новий звід законів для більш ефективного управління нашою розрослою країною. Ухвалення цього законодавства призведе до радикальних змін в органах влади та до реорганізації наших провінцій по всьому Балканському регіону."
  flavor_ser.50.a: "Наша велика держава потребує цих законів!"
  flavor_ser.50.b: "Краще не чіпати існуючі порядки."
  flavor_ser.50.historical_info: "Звід законів, відомий як #italic Закон вірного царя Стефана#!, — найважливіше джерело середньовічного права Сербії та всього балканського регіону. Він був прийнятий за Стефана IV Душана, царя греків і сербів середини XIV століття. «Законник Душана», названий так на честь автора, відіграв ключову роль у формуванні правової та адміністративної структури молодого Сербського царства. Країна Стефана IV перебувала під сильним культурним впливом Візантії, і в основу її законів лягли візантійські та римські правові звичаї. «Законник» охоплював найрізноманітніші аспекти юриспруденції, управління та організації суспільства, його норми регулювали право власності, шлюб, оподаткування та кримінальний суд. Закони Стефана IV сприяли створенню єдиного законодавства Сербського царства та залишили незгладимий слід в юридичній історії Балкан."
  flavor_ser.60.title: "Влахи та меропхи"
  flavor_ser.60.desc: "На землях нашої славної країни мешкає велика кількість найрізноманітніших селян і простолюду. Найбільш численними групами серед підлого стану вважаються #italic влахи#! та #italic меропхи#!. Перші розводять для феодалів корів та овець, другі ж вирощують пшеницю на землях, що належать баронам, короні або церкві. Ці люди — основа нашої економіки, саме їм ми завдячуємо тучністю наших #TOOLTIP:GOODS,livestock,X #L стад#!#! та #TOOLTIP:GOODS,wheat,X #L ланів#!#!. На жаль, останні роки зими були важкими, і тепер пастухи та хлібороби потребують нашої підтримки."
  flavor_ser.60.a: "Допомогти і #italic влахам#!, і #italic меропхам#!."
  flavor_ser.60.b: "Ми можемо допомогти лише #italic влахам#!."
  flavor_ser.60.c: "Виділити кошти #italic меропхам#!."
  flavor_ser.60.d: "Ми нічим не можемо їм допомогти…"
  ser_every_livestock_or_wheat_location_tt: "До всіх місцевостей у нашому володінні, де виробляються #TOOLTIP:GOODS,wheat,X #L пшениця#!#! або #TOOLTIP:GOODS,livestock,X #L худоба#!#!, будуть застосовані такі ефекти:"
  ser_every_livestock_location_tt: "До всіх місцевостей у нашому володінні, де виробляється #TOOLTIP:GOODS,livestock,X #L худоба#!#!, будуть застосовані такі ефекти:"
  ser_every_wheat_location_tt: "До всіх місцевостей у нашому володінні, де виробляється #TOOLTIP:GOODS,wheat,X #L пшениця#!#!, будуть застосовані такі ефекти:"
  flavor_ser.70.title: "Столиця великого царства"
  flavor_ser.70.desc: "Країна досягла величезних успіхів, але наші амбіції вимагають більшого. Ми повинні вписати свої імена в книгу історії, причому золотими літерами! Час замислитися про те, якому місту випаде честь стати столицею нової великої держави, зримим втіленням нашої сили та величі…"
  flavor_ser.70.a: "Столицею стане Скоп'є!"
  flavor_ser.70.b: "Це буде Константинополь — перлина Римської імперії!"
  flavor_ser.70.c: "Нинішня столиця нас цілком влаштовує…"
  flavor_ser.80.title: "Зламаний щит Балкан"
  flavor_ser.80.desc: "[GetCountry('TUR').GetLongName] — серйозний противник, а до нас фортуна останнім часом явно повернулася спиною. Вояки, втративши волю до битви, тікають з полів битв, на вулицях панують заворушення, перелякане населення всюди бачить знамення прийдешніх бід. Країна опинилася на порозі катастрофи, сама тканина нашого суспільства тріщить по швах. У столиці зібралася велика рада, яка має визначити стратегію воєнної кампанії та вирішити, як врятувати #L [ROOT.GetCountry.GetAdjective|l]ий#! народ від загибелі."
  flavor_ser.80.a: "Офіційно запросимо допомогу."
  flavor_ser.80.b: "Брати по вірі не залишать нас у біді…"
  flavor_ser.80.c: "Це ще не кінець!"
  ser_target_country_gets_flavor_ser.82_tt: "На території [target_country.Custom('CL_GEN')] відбудеться подія #Y «Братська допомога?»#!"
  flavor_ser_desc_key: "До нашого двору прибув #L [GetCountry('SER').GetAdjective|l]ий#! посланець. Його країна опинилася в найтяжчому становищі — [GetCountry('TUR').GetLongName] продовжує тиснути, захисники [GetCountry('SER').Custom('CL_GEN')] тримаються з останніх сил. Якщо Балкани впадуть, загарбникам зі Сходу відкриється шлях у серце Європи. Посол смиренно просить нас про допомогу…"
  flavor_ser.81.title: "[GetCountry('SER').GetNameWithNoTooltip] просить допомоги"
  flavor_ser.81.desc: "$flavor_ser_desc_key$"
  flavor_ser.81.a: "Ми підтримаємо їх золотом і укладемо союз. Нехай військо готується до походу!"
  flavor_ser.81.b: "Потрібно поділитися з ними військовим досвідом."
  flavor_ser.81.c: "Досить і невеликої пожертви на військові потреби."
  flavor_ser.81.d: "Нічого вони не отримають!"
  flavor_ser.82.title: "Братня допомога?"
  flavor_ser.82.desc: "$flavor_ser_desc_key$"
  flavor_ser.82.a: "Ми єдиновірці, а значить — брати по зброї!"
  flavor_ser.82.b: "Наш військовий досвід добре послужить їм у боротьбі."
  flavor_ser.82.c: "Допоможемо їм золотом на військові потреби."
  flavor_ser.82.d: "Ми не в тому становищі, щоб допомагати іншим…"
  flavor_ser_reply_desc: "Посланець, відправлений по допомогу проти #L [GetCountry('TUR').GetAdjective|l]ої#! загрози, нарешті повернувся назад. Його не зупинили ні дощі, ні бурі, ні зграї розбійників, яких останніми роками розвелося без ліку. Діставшись до палацу, він дістає з дорожньої сумки витончений лист, що несе печатку іноземної країни…"
  flavor_ser.83.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] [Select_CString(GetCountry('PAP').GetGovernment.GetRuler.IsFemale,'надіслала', 'надіслав')] відповідь"
  flavor_ser.83.desc: "$flavor_ser_reply_desc$"
  flavor_ser.83.a: "$flavor_ser_response$"
  flavor_ser.83.b: "$flavor_ser_response$"
  flavor_ser.83.c: "$flavor_ser_response$"
  flavor_ser.83.d: "Вони не бажають допомогти? Та як вони сміють!"
  flavor_ser_response: "Ця допомога вельми доречна! Ми дуже вдячні."
  flavor_ser.84.title: "Посол повернувся з [target_country.Custom('CL_GEN')]"
  flavor_ser.84.desc: "$flavor_ser_reply_desc$"
  flavor_ser.84.a: "$flavor_ser_response$"
  flavor_ser.84.b: "$flavor_ser_response$"
  flavor_ser.84.c: "$flavor_ser_response$"
  flavor_ser.84.d: "Вони не бажають допомогти? Цього не може бути!"
  flavor_ser.90.title: "Монастир Манасія"
  flavor_ser.90.desc: "У самому центрі нашої країни є урочище дивної краси. Відвідавши ці краї, [Select_CString(target_character.IsFemale,'наша', 'наш')] [GetCountry('SER').GetGovernment.GetRulerTitle|l] буквально [Select_CString(target_character.IsFemale,'закохалася', 'закохався')] в це дивовижне місце. Прогулюючись околицями, [Select_CString(target_character.IsFemale,'вона мріяла', 'він мріяв')] побудувати тут монастир із гробницею, де [Select_CString(target_character.IsFemale,'вона', 'він')] знайде останній притулок.\n\nЗ часом [Select_CString(target_character.IsFemale,'її', 'його')] плани ставали все амбітнішими. [GetCountry('SER').GetGovernment.GetRulerTitle] [Select_CString(target_character.IsFemale,'уявляла', 'уявляв')] собі не просто монастир з жменькою ченців, а повноцінну фортецю, оточену неприступними стінами.\n\nЯкщо ми здійснимо ці плани, монастирська церква буде присвячена заступникам нашого народу — Святій Трійці."
  flavor_ser.90.a: "Це святе місце увійде в історію."
  flavor_ser.90.b: "Навіщо нам ще один монастир?"
  flavor_ser.91.title: "Ресавська школа"
  flavor_ser.91.desc: "Монастир Манасія, також відомий як Ресава, досить швидко став видатним культурним центром провінції #TOOLTIP:PROVINCE_DEFINITION,toplica_province,X #L Топлиці#!#!. Завдяки так званій #italic  Ресавській школі#!, де працювали найкращі писарі та перекладачі країни, монастир прославився навіть за межами нашої країни.\n\nПереписувачі старанно копіюють старовинні манускрипти, щоб зберегти знання минулого для прийдешніх поколінь. Звісно, деякі з цих сувоїв можуть бути досить небезпечні, часто їхній зміст суперечить вченню Святої Церкви. Ми повинні уважно стежити за тим, щоб скрипторії передавали лише благі знання, що походять від самого Господа Бога."
  flavor_ser.91.a: "Наша культура прославиться на весь світ."
  flavor_ser.100.title: "Завоювання Царгорода"
  flavor_ser.100.desc: "Протягом століть наш народ мріяв заволодіти Царицею міст, і тепер ця мрія здійснилася. Місто впало під натиском наших військ, над його стінами та палацами гордо майорять наші знамена.\n\nВідтепер [Select_CString(target_character.IsFemale,'наша правителька', 'наш правитель')], [target_character.GetName], по праву може називати себе [Select_CString(target_character.IsFemale,'царицею та імператрицею', 'царем та імператором')], адже [Select_CString(target_character.IsFemale,'їй', 'йому')] підкорилася найвеличніша зі столиць світу!\n\nЧи не час дати місту більш відповідну назву — #Italic  Царський град#!?"
  flavor_ser.100.a: "Місто наше, і ми дамо йому нове ім'я."
  flavor_ser.100.b: "Ми збережемо стару назву."
  flavor_ser.110.title: "[target_location.GetNameWithNoTooltip] процвітає"
  flavor_ser.110.desc: "Шахтарське поселення #TOOLTIP:LOCATION,novo_brdo,X #L Ново-Брдо#!#! стрімко зростає. Секрет його процвітання — у розташованих поблизу багатих покладах так званого «гламського #TOOLTIP:GOODS,silver,X #L срібла#!#!» (срібна руда зі значною — до третини — домішкою #TOOLTIP:GOODS,goods_gold,X #L золота#!#!). Багато з працьовитих гірників — нащадки #TOOLTIP:CULTURE,$german_transylvanian_tt$,X #L трансильванських німців#!#!, що переселилися в ці краї кілька поколінь тому.\n\nЗавдяки видобутку срібла [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] багатіє, люди з усієї округи стікаються сюди в пошуках кращої долі, і населення швидко збільшується.\n\nМуніципальна рада відправила до столиці делегацію. Вони хочуть, щоб ми визнали [target_location.GetNameWithNoTooltip] повноправним містом."
  flavor_ser.110.a: "Господь благословив це місце!"
  flavor_ser.120.title: "Золото Леце"
  flavor_ser.120.desc: "Старателі з числа #TOOLTIP:CULTURE,$german_transylvanian_tt$,X #L трансильванських німців#!#! досліджують гори в районі #TOOLTIP:LOCATION,glubocica,X #L Глубочиці#!#!, неподалік від поселення Леце. Вони переконані, що там є поклади #TOOLTIP:GOODS,goods_gold,X #L золота#!#!.\n\nЩоб дістатися до дорогоцінної руди, необхідно викопати глибокі шахти. Роботи обійдуться казні недешево, але результат може перевершити найсміливіші наші очікування — старателі вважають, що родовище в Леце, можливо, є найбільшим у нашій країні."
  flavor_ser.120.a: "Завдяки саксонським шахтарям ми розбагатіємо."
  flavor_ser.120.b: "Золото в наших скринях коштує дорожче, ніж гіпотетичні підземні жили."
  flavor_ser.130.title: "Фортеця Смедерево"
  flavor_ser.130.desc: "Місце впадіння Єзави в Дунай має велике стратегічне значення для нашої країни, адже саме тут у країну можуть вторгнутися загарбники. Побудувавши в цій місцевості укріплення, ми зможемо вберегти наші кордони від можливої загрози з півночі.\n\nНаші піддані, що проживають в околицях #TOOLTIP:LOCATION,smederevo,X #L Смедерева#!#!, більше не почуваються в безпеці. Стривожені жителі наполегливо вимагають, щоб ми посилили фортечні споруди в регіоні.\n\nПобудувавши нові укріплення, ми забезпечимо надійний захист кордону з цього флангу. Але не варто забувати, що фортифікаційні роботи вимагають величезної кількості ресурсів. Перш ніж приймати остаточне рішення, необхідно зважити всі за і проти."
  flavor_ser.130.a: "Нам потрібно забезпечити контроль над цією областю."
  flavor_ser.130.b: "Нехай розбираються самі."
  STATIC_MODIFIER_NAME_ser_defenses_neglected: "Занедбані укріплення"
  STATIC_MODIFIER_DESC_ser_defenses_neglected: "Уряд ігнорує прохання місцевих жителів відновити оборонні споруди на півночі країни. Укріплення поступово занепадають, а жителі регіону почуваються покинутими напризволяще."
  flavor_ser.140.title: "Батько сучасної сербської літератури"
  flavor_ser.140.desc: "[target_character.GetName] [target_character.GetBirthDate] року народження — [Select_CString(target_character.IsFemale,'видатна', 'видатний')] #TOOLTIP:CULTURE,$serbian_tt$,X #L [Select_CString(target_character.IsFemale,'сербська', 'сербський')]#!#! [Select_CString(target_character.IsFemale,'вчена', 'вчений')], [Select_CString(target_character.IsFemale,'письменниця', 'письменник')] та [Select_CString(target_character.IsFemale,'просвітителька', 'просвітитель')]. [Select_CString(target_character.IsFemale,'Її', 'Його')] праці мали великий вплив не тільки на сербську культуру, а й на загальноєвропейські ідеї Просвітництва.\n\nПід впливом західних мислителів [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale,'зайнялася', 'зайнявся')] оновленням мови та приведенням сербської літератури у відповідність до розмовної мови. Твори, написані #L [ROOT.GetCountry.GetReligion.GetLanguage.GetName|l]ою#!, — переважно мовою богослужіння, — раніше були малозрозумілі для простолюду.\n\nДеякі члени уряду виступають за те, щоб запропонувати [Select_CString(target_character.IsFemale,'їй', 'йому')] посаду радника. Їхні опоненти стверджують, що [target_character.GetLastNameWithNoTooltip] не являє собою нічого особливого."
  flavor_ser.140.a: "[Select_CString(target_character.IsFemale,'Її', 'Його')] місце в уряді."
  flavor_ser.140.b: "[Select_CString(target_character.IsFemale,'Ця жінка', 'Цей чоловік')] — справжнє джерело натхнення для нашого народу."
  flavor_ser.150.title: "[target_location.GetNameWithNoTooltip] знову в наших руках"
  flavor_ser.150.desc: "Після довгої та наполегливої боротьби [target_location.GetRank.GetName|l] [target_location.GetName] знову в #L [ROOT.GetCountry.GetAdjective|l]их#! руках! Місто, розташоване в місці впадіння Сави в Дунай, не просто має величезну військову цінність — воно здавна було центром торгівлі та осередком [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої культури. Враховуючи його стратегічне розташування, що дозволяє контролювати весь регіон, [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] ідеально підходить на роль нашої столиці.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle] активно обговорює пропозицію про перенесення столиці. Багато придворних вважають, що це рішення надихне народ і зміцнить контроль над країною."
  flavor_ser.150.a: "[target_location.GetNameWithNoTooltip] буде новою столицею!"
  flavor_ser.150.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] залишиться в місті [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_ser.160.title: "Битва на Косовому полі"
  flavor_ser.160.desc: "Здійснивши неможливе, відважні #L [ROOT.GetCountry.GetAdjective|l]і#! воїни завдали нищівної поразки #L [GetCountry('TUR').GetAdjective|l]им#! загарбникам у битві на #TOOLTIP:PROVINCE_DEFINITION,kosovo_province,X #L Косовому полі#!#!. Ця перемога стала символом нової надії для всіх християн. Агресивна #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L тюркська#!#! експансія на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#! становила страшну небезпеку для всього #TOOLTIP:RELIGIONGROUP,christian,X #L християнського#!#! світу, а наша країна довгі роки жила під загрозою завоювання.\n\nМужність і доблесть, виявлені нашими воїнами, зупинили [GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ий натиск. Тепер нам випала нагода відвоювати весь півострів. Ця перемога повинна стати першим кроком до звільнення нашої батьківщини від [GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ого панування!"
  flavor_ser.160.a: "Вперед, до перемоги!"
  flavor_ser.160.historical_info: "У Косово 28 червня 1389 року відбулася велика битва між християнськими (переважно сербськими) військами та армією Османської імперії. Битва, що відбулася на Косовому полі неподалік від Приштини, стала однією з найважливіших битв за всю історію Балкан. Її ключовим епізодом стала загибель османського султана Мурада I. Згідно з історичними хроніками, він був убитий у власному наметі сербським лицарем Мілошем Обиличем, який проник в османський табір, прикинувшись перебіжчиком. Це був єдиний випадок в історії, коли османський султан загинув на полі битви."
  flavor_ser.170.title: "[target_location.GetNameWithNoTooltip], білий фенікс"
  flavor_ser.170.desc: "Місто [target_location.GetName], серце нашої країни, стало найбагатшим і найгустонаселенішим серед усіх #TOOLTIP:REGION,balkan_region,X #L балканських#!#! міст. «Білий фенікс» — так прозвали його жителі. Займаючи важливе стратегічне положення на місці впадіння Сави в Дунай, [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] слугує зримим символом впливу та могутності нашої країни. Навіть #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! не може посперечатися з пишнотою цього прекрасного міста!"
  flavor_ser.170.a: "Чудово!"
  STATIC_MODIFIER_NAME_ser_the_white_phoenix: "Білий фенікс"
  flavor_ser.180.title: "Перегляд «Законоправила»"
  flavor_ser.180.desc: "#italic  «Законоправило»#!, монументальний звід законів, складений святим Савою в 1219 році, довгий час лежав в основі світського та церковного права нашої країни. Його мудрі вказівки вели #L [ROOT.GetCountry.GetAdjective|l]е#! суспільство протягом століть.\n\nВтім, за цей час світ неабияк змінився, і дехто вважає, що закони святого Сави застаріли. «Законоправило», кажуть вони, не відповідає викликам сьогодення і потребує серйозного перегляду. Ця ідея викликала палкі суперечки — більшість наших підданих згодні з тим, що закони необхідно оновити, однак [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] категорично проти будь-яких змін у тексті, який став для них майже священним."
  flavor_ser.180.a: "Закони й справді час переглянути."
  flavor_ser.180.b: "Ми повинні зберігати закони Сави в первозданному вигляді."
  flavor_ser.190.title: "Хіландарський монастир"
  flavor_ser.190.desc: "#TOOLTIP:LOCATION,mount_athos,X #L Гора Афон#!#! знову перебуває під владою #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Серед безлічі афонських монастирів для нас особливо важливий Хіландар — обитель, зведена Стефаном Неманею та його сином, святим Савою. На жаль, за роки недбальства наша національна святиня занепала. Стіни, в яких молилися наші предки, потребують серйозної реставрації."
  flavor_ser.190.a: "Ми відновимо монастирський комплекс."
  flavor_ser.190.b: "Нам це не по кишені."
  flavor_ser.200.title: "Видовдан"
  flavor_ser.200.desc: "Доблесть предків, які віддали своє життя в боротьбі з #L [GetCountry('TUR').GetAdjective|l]ими#! гнобителями, золотими літерами вписана в історію нашої країни. Особливе місце серед пам'ятних дат займає Видовдан — річниця битви на Косовому полі, яка відзначається 28 червня. Цього дня ми вшановуємо героїв і мучеників, які билися і загинули за #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Їхня жертва, принесена на вівтар нашої незалежності, ніколи не буде забута.\n\nДедалі більше жителів нашої країни вимагають оголосити Видовдан офіційним святом, щоб пам'ять про полеглих героїв навічно збереглася в національній свідомості. Цей святий день стане символом єдності країни."
  flavor_ser.200.a: "Зробимо свято офіційним!"
  flavor_ser.200.b: "Краще обійдемося без офіційного визнання."
  flavor_ser.210.title: "Ново-Брдоський законник"
  flavor_ser.210.desc: "У шахтарському містечку #TOOLTIP:LOCATION,novo_brdo,X #L Ново-Брдо#!#! склався унікальний звід правил і законів, що регламентують роботу гірничодобувної галузі та її правові аспекти. Гірники інших областей вимагають, щоб цей кодекс ліг в основу загальнонаціонального законодавства в галузі рудної справи. Пропонований ними #TOOLTIP:POLICY,novo_brdo_mining_law,X #L Ново-Брдоський законник#!#! має регламентувати облаштування шахтарських містечок, визначити права та обов'язки гірників і забезпечити заходи безпеки та справедливе ведення справ на всій території [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_ser.210.a: "Ухвалимо загальнонаціональний законник."
  flavor_ser.210.b: "Нас влаштовують і поточні закони."
  flavor_ser.210.historical_info: "Ново-Брдоський законник, прийнятий Стефаном Лазаревичем у 1412 році, являв собою всеосяжний звід законів, що регламентують усі аспекти гірничорудної справи — від організації гірничого видобутку до облаштування шахтарських міст. Законник регулював права власності, заходи безпеки та економічну діяльність, сприяючи розвитку та процвітанню шахтарських спільнот."
  STATIC_MODIFIER_NAME_ser_novo_brdo_code: "Ново-Брдоський законник"
  flavor_ser.210.tt: "Відкриває закон #TOOLTIP:POLICY,novo_brdo_mining_law,X #L «Ново-Брдоський законник»#!#! у сфері гірничого права."
  has_unlocked_novo_brdo_tt: "Закон відкрито в межах [Concept('event', 'події')|e] #Y  «Ново-Брдоський законник»#!"
  flavor_ser.220.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ser.220.desc: "[target_character.GetName] і [Select_CString(target_character.IsFemale,'її', 'його')] Алеманнська гвардія — добірний загін німецьких вояків, — відіграють найважливішу роль у захисті [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. [GetCharacter('ser_stefan_dusan').GetName] довіряє [Select_CString(target_character.IsFemale,'їй', 'йому')] як [Select_CString(GetCharacter('ser_stefan_dusan').IsFemale,'самій', 'самому')] собі. Алеманнська гвардія прославилася своєю дисципліною, вірністю та відвагою, у ці неспокійні часи вона залишається прикладом надійності та сили."
  flavor_ser.220.a: "Ми перед [Select_CString(target_character.IsFemale,'нею', 'ним')] у боргу!"
  flavor_ser.230.title: "Голубацька фортеця"
  flavor_ser.230.desc: "Стратегічно важлива Голубацька фортеця на березі Дунаю в #TOOLTIP:LOCATION,kucevo,X #L Кучево#!#! — не тільки ключова оборонна споруда, а й важливий центр торгівлі. Ця твердиня розташована поблизу дунайської тіснини Залізні Ворота, звідси можна контролювати річкові шляхи та забезпечувати безпеку торгівлі, не кажучи вже про захист країни від вторгнень. Враховуючи стратегічне положення фортеці, її варто перетворити на неприступну цитадель, яка закріпить наше панування над регіоном."
  flavor_ser.230.a: "Вкладемо кошти в будівництво укріплень."
  flavor_ser.230.b: "Краще витратимо ресурси на щось інше."
  flavor_ser.240.title: "Ілліризм"
  flavor_ser.240.desc: "Черпаючи натхнення з ідей #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#! та #TOOLTIP:CULTUREGROUP,slavic_group,X #L південнослов'янської#!#! єдності, прихильники ілліризму виступають за об'єднання слов'янських народів в одну країну та їхнє визволення від іноземного ярма. Образ єдиної та незалежної південнослов'янської нації, який пропагують активісти та ідеологи руху, захопив уяву #L [ROOT.GetCountry.GetAdjective|l]ого#! народу. Ідеї ілліризму поширюються по всій країні.\n\nЦей заклик до об'єднання багато в чому близький до нашої власної національної ідеї, проте ілліризм має свої недоліки. Реалізація його ідей навряд чи припаде до смаку неслов'янському населенню нашої країни."
  flavor_ser.240.a: "Південнослов'янська єдність — наша головна мета!"
  flavor_ser.240.b: "Це призведе до заворушень."
  flavor_ser.240.historical_info: "Ілліризм — культурно-політичний суспільний рух XIX століття, спрямований на зміцнення південнослов'янської єдності та пробудження національної самосвідомості хорватів, словенців і сербів. Прихильники ілліризму черпали натхнення в романтичному націоналізмі та ідеях Просвітництва. Пропагуючи відродження слов'янських мов і культури, вони заклали основу майбутнього визволення південних слов'ян з-під влади іноземних країн та їхнього політичного об'єднання."
  flavor_ser.250.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ser.250.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale,'шановна', 'шановний')] голова #L [ROOT.GetCountry.GetAdjective]ого#! патріархату — справжня духовна опора для нашого народу. Під [Select_CString(target_character.IsFemale,'її', 'його')] керівництвом #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдається залишатися бастіоном християнства, а церква зберігає єдність нації та підтримує її дух. [Select_CString(target_character.IsFemale,'Її', 'Його')] непохитна прихильність заповідям Христа сприяє зміцненню авторитету [ROOT.GetCountry.Custom('CL_GEN')] у всьому #TOOLTIP:RELIGION,$orthodox_tt$,X #L православному#!#! світі."
  flavor_ser.250.a: "Ось [Select_CString(target_character.IsFemale,'істинна служителька', 'істинний служитель')] Христа!"
  flavor_ser.250.historical_info: "Макарій Соколович став патріархом Сербії в критичний для країни момент. Багато в чому саме завдяки йому серби зуміли зберегти національну самобутність і православні звичаї в умовах османського панування. У цей непростий час патріарх Макарій став духовним вождем і справжнім лідером нації, він зміцнив вплив православ'я та сприяв збереженню сербського народу під владою турків."