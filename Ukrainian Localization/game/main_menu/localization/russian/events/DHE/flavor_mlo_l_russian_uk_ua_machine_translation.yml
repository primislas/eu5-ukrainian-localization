l_russian:
  flavor_mlo.1.title: "Амброзіанська республіка"
  flavor_mlo.1.desc.no_ally: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetName] у жаху від нової раптової кончини — цього разу це [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — причому дорослого спадкоємця немає. Впливові містяни вважають, що настав час відновити стару республіку. Вчені мужі, наприклад, з юридичного коледжу в #TOOLTIP:LOCATION,pavia,X #L Павії#!#!, описують епоху старої республіки як золотий вік. Саму цю ідею вигадали купці, які знали, як добре живуть люди в інших італійських республіках.\n\nУ підсумку народ висунув пропозицію проголосити республіку, а всіх претендентів на трон вигнати з міста. Нова країна отримала назву Золота Амброзіанська республіка на честь четвертого міланського єпископа."
  flavor_mlo.1.desc: "$flavor_mlo.1.desc.no_ally$\n\nЗ іншого боку, ми могли б попроситися під крило дружньої країни та увійти до її складу."
  flavor_mlo.1.a: "Слава святому Амвросію!"
  flavor_mlo.1.b: "Наша країна не стане республікою."
  mlo_against_ambrosian: "Проти республіки святого Амвросія"
  establish_union_with_target_country_tt: "Ця відповідь покладе край [Concept('disaster', 'лиху')|e] #TOOLTIP:DISASTER_TYPE,ambrosian_republic_disaster,X #L «Золота Амброзіанська республіка»#!#!, а ми і [target_country.GetLongName] створимо [Concept('union', 'унію')|e]"
  flavor_mlo.2.title: "Ворожнеча гвельфів і гібелінів у Мілані"
  flavor_mlo.2.desc: "Внутрішні розбіжності роздирають міланців. Суспільство розділене на безліч фракцій. Обрання аристократів-гвельфів замість гібелінів послаблює республіку та загрожує демократії, але вони можуть забезпечити стабільність."
  flavor_mlo.2.a: "Станемо на бік гвельфів."
  flavor_mlo.2.b: "Займемо бік гібелінів."
  flavor_mlo.3.title: "Оспедале Маджоре"
  flavor_mlo.3.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] просить знаменитого архітектора Антоніо Філарете скласти план нової лікарні Ка-Гранде, яка має стати однією з перших громадських лікарень Італії. Оспедале Маджоре, названа на честь людей Аннунціати, які довго не наважувалися визнати владу нашої країни, буде побудована в новомодному стилі флорентійського Відродження."
  flavor_mlo.3.a: "Схвалити будівництво!"
  flavor_mlo.4.title: "Лодійський мир"
  flavor_mlo.4.desc: "Наші дипломати уклали мирну угоду з Неаполем, Флоренцією та Венецією! Вона покладе край тривалій ворожнечі між чотирма могутніми містами-країнами, розмежує міланські та венеціанські території та встановить принцип балансу сил у Північній Італії. Якщо нам пощастить, ми зможемо значно зміцнити наш вплив."
  flavor_mlo.4.a: "Хай буде мир!"
  mlo_peace_of_lodi: "Лодійський мир"
  flavor_mlo.4.b: "Це завадить нам досягти своїх цілей…"
  flavor_mlo.5.title: "Лодійський мир"
  flavor_mlo.5.desc: "Міланці погодилися підписати мирний договір з Неаполем, Флоренцією та Венецією! Він покладе край тривалій ворожнечі між чотирма могутніми містами-країнами, розмежує міланські та венеціанські території та встановить принцип балансу сил у Північній Італії. Якщо нам пощастить, ми зможемо значно зміцнити наш вплив."
  flavor_mlo.5.a: "Хай буде мир!"
  flavor_mlo.6.title: "[target_artist.GetNameWithNoTooltip] і #italic «Таємна вечеря»#!"
  flavor_mlo.6.desc: "Є думка, що найвеличніші твори мистецтва символізують силу та завзятість людини. З цим важко не погодитися. Саме здатність до творчості та самовираження відрізняє нас від тварин, і найкращий спосіб довести нашу культурну перевагу — створити неповторний шедевр. На щастя, нещодавно легендарний художник [target_artist.GetName] звернувся до нас із проханням підтримати його в роботі над масштабним полотном #italic «Таємна вечеря»#!."
  flavor_mlo.6.a: "Ми надамо [Select_CString(target_artist.IsFemale,'їй', 'йому')] підтримку!"
  flavor_mlo.6.b: "Це нам не по кишені…"
  flavor_mlo.9.title: "[target_artist.GetNameWithNoTooltip] відвідує [target_location.Custom('LR_ACC')] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.9.desc: "Легендарний художник і гідний представник епохи Відродження ощасливив наш двір своєю присутністю. [target_artist.GetName] користується великою шаною в усьому світі. Він здобув широку популярність як неймовірний художник, інженер, архітектор і не тільки!"
  flavor_mlo.9.a: "Залишайся в нас, Леонардо!"
  flavor_mlo.9.b: "Ми не зможемо оплатити його послуги."
  flo_target_artist_joins_our_court_tt: "[target_artist.GetName] приєднується до двору."
  flavor_mlo.10.title: "Центр моди"
  flavor_mlo.10.desc: "В епоху пізнього Середньовіччя [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] перетворився на справжній центр моди. Виробництво предметів розкоші було настільки важливою статтею його доходу, що іншими мовами назва міста стала синонімом вишуканості. На початку XVI століття в шовковій промисловості було зайнято понад двадцять тисяч робітників, які старанно працювали над тим, щоб зробити свій двір найпишнішим в Італії."
  flavor_mlo.10.a: "Приголомшливо…"
  flavor_mlo.11.title: "Зростання могутності Північної Італії"
  flavor_mlo.11.desc: "Останні сто років відбувається небувалий розквіт #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, зараз це місто-країну по праву можна називати найрозвиненішим на півночі Італії. До цього міста, вдало розташованого на основних торгових шляхах, стікаються купці та ремісники з усієї Європи.\n\nЙого населення зростає рекордними темпами, а міський пейзаж прикрашають чудові будівлі, збудовані в стилі готики та Відродження, які вже стали архітектурними пам'ятками. Родина [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], яка стоїть на чолі міста, покровительствує культурі та мистецтву і поступово перетворює [ROOT.GetCountry.Custom('CL_ACC')] на жвавий центр творчості.\n\nЗростаюче багатство та вплив нашого міста також сприяє розвитку науки, технологій та освіти, що робить [ROOT.GetCountry.Custom('CL_ACC')] справжнім символом поступу в цю динамічну епоху."
  flavor_mlo.11.a: "Наш головний пріоритет — посилення центральної влади."
  flavor_mlo.11.b: "Нам варто звернутися до голів своїх міст."
  flavor_mlo.12.title: "Династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] з [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_mlo.12.desc: "[ROOT.GetCountry.GetLongName] — на чолі цієї країни стає [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l], після чого політична ситуація зазнає серйозних змін. Будучи амбітною та проникливою людиною, [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] ставить перед собою нелегке завдання — об'єднати наші міста, якими керують часто нелояльні родини.\n\nЩоб полегшити його виконання, наші радники пропонують вичекати час і розробити план, який включатиме розширення територій за рахунок завоювань та створення стратегічних союзів. Таким чином ми посилимо контроль над регіоном та консолідуємо розрізнені міста [ROOT.GetCountry.Custom('rank_ru_GEN')|l].\n\nЦе дозволить нам провести ефективні реформи управління та підштовхне розвиток культури та мистецтва, що в підсумку зробить [ROOT.GetCountry.Custom('CL_ACC')] одним із головних центрів епохи Відродження, але спершу нам потрібно поставити на місце членів королівської родини, які претендують на трон."
  flavor_mlo.12.a: "Наберемося терпіння. Наш час ще не настав…"
  flavor_mlo.12.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] миттю розбереться зі своєю підступною сімейкою!"
  flavor_mlo.13.title: "Єдина країна"
  flavor_mlo.13.desc: "Однією з ключових подій, що демонструють перехід #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! від хиткого союзу міст-країн, яким править родина [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName], до централізованої країни, став прихід до влади [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'визнаної правительки', 'визнаного правителя' )] [ROOT.GetCountry.Custom('CL_GEN')] у [GetCurrentYear] році.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] отримує титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l]», що знаменує собою перехід до централізованої системи управління. Родина [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] посилює контроль над [ROOT.GetCountry.Custom('CL_INST')] і стає правлячою династією в нашій країні."
  flavor_mlo.13.a: "Саме час проголосити монархію!"
  flavor_mlo.13.c: "Настав час посилити централізовану владу."
  flavor_mlo.13.b: "Якийсь час вони ще чіплятимуться за свої зникаючі привілеї…"
  flavor_mlo.14.title: "[target_character.GetNameWithNoTooltip] завершує #italic «Всесвітню хроніку»#!"
  flavor_mlo.14.desc: "[target_character.GetName] — італійський історик, хроніст та автор важливої історичної праці, що отримала назву #italic «Всесвітня хроніка»#!. У цій роботі, закінченій у [GetCurrentYear] році, [target_character.GetNameWithNoTooltip] докладно розповідає про події минулих днів, що відбувалися в різних регіонах, що дозволяє нам отримати найповніше уявлення про історію середньовічної Європи.\n\nДовгі роки вивчення документів та скрупульозної праці не пройшли дарма.$cronica_universalis_desc$\n\nАвтор зробив значний внесок у вивчення середньовічної історії. Його книга не тільки залишить помітний слід у науці, а й посилить наш політичний та культурний вплив."
  flavor_mlo.14.a: "[target_location.GetNameWithNoTooltip] — центр сучасної науки!"
  flavor_mlo.14.b: "Ця книга викличе лише осуд…"
  flavor_mlo.15.title: "[target_character.GetNameWithNoTooltip] у біді"
  flavor_mlo.15.desc: "[Select_CString(target_character.IsFemale,'Жадаюча справедливості', 'Жадаючий справедливості')] [target_character.GetName] [Select_CString(target_character.IsFemale,'увірвалася', 'увірвався')] до залів [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetName]. [Select_CString(target_character.IsFemale,'Вона', 'Він')] вимагає, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'видала', 'видав' )] [Select_CString(target_character.IsFemale,'їй', 'йому')] вбивць [Select_CString(target_character.IsFemale,'її', 'його')] батька.\n\nЗмови з метою братовбивства — не рідкість для нашого міста, і не дивно, що [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'уявила', 'уявив')] те, чого немає. Однак [Select_CString(target_character.IsFemale,'вона', 'він')], схоже, [Select_CString(target_character.IsFemale,'переконана', 'переконаний')], що до вбивства [Select_CString(target_character.IsFemale,'її', 'його')] батька [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'доклала', 'доклав' )] руку [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'наша найдорожча правителька', 'наш найдорожчий правитель')], і це, звичайно ж, повна нісенітниця…"
  flavor_mlo.15.a: "[target_character.GetShortNameWithNoTooltip] просто жадає влади!"
  flavor_mlo.15.b: "Проведемо розслідування та звинуватимо у вбивстві інших членів родини."
  flavor_mlo.15.c: "Ми змусимо тебе замовкнути…"
  flavor_mlo.16.title: "[target_character.GetNameWithNoTooltip] звертається до двору"
  flavor_mlo.16.desc: "[target_character.GetName] звертається до нашого двору в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName]. Цей доблесний воїн пропонує свою допомогу в завоюванні земель, якими править його ворог — [target_rival.GetName].\n\nВін відчайдушно бажає стати нашим союзником, щоб поквитатися з убивцею свого батька. Тепер справа за нами. Ми повинні вирішити, прийняти чи відхилити його пропозицію. Хто знає, до чого призведе цей несподіваний союз? Можливо, він змінить майбутнє #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!?"
  flavor_mlo.16.a: "Обсиплемо його грошима. Тепер його турботи — наші турботи!"
  flavor_mlo.16.b: "Пропозиція приваблива, хоч і ризикована…"
  flavor_mlo.16.c: "Жодних переговорів із перебіжчиками!"
  flavor_mlo.17.title: "[target_character.GetNameWithNoTooltip] збирає армію"
  flavor_mlo.17.desc: "[target_character.GetName] у жвавій столиці #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'рухома', 'рухомий' )] амбіціями та жагою пригод, збирає свій загін найманих солдатів, що отримав назву «компанія святого Георгія». Наймані вояки, озброєні мечами та одягнені в міцні обладунки, чекають наказу [Select_CString(target_character.IsFemale, 'своєї пані', 'свого пана' )].\n\nНаймані вояки швидко заслужили репутацію досвідчених воїнів, що підкоряються суворій дисципліні, і тепер до їхнього загону прагнуть приєднатися чоловіки з усієї країни. [target_character.GetNameWithNoTooltip], їхній кондотьєр, шукає слави та багатства і скоро поведе своїх солдатів назустріч пригодам. Серця жителів [target_location.Custom('LR_GEN')|l] [target_location.GetName] б'ються в передчутті: зухвалі наймані вояки ось-ось вирушать у путь."
  flavor_mlo.17.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mlo.17.b: "Досить потурати його примхам. Геть звідси, жебраку!"
  flavor_mlo.18.title: "[target_character.GetNameWithNoTooltip] представляє «Книгу діянь у Ломбардії»"
  flavor_mlo.18.desc: "У [GetCurrentYear] досвідчений хроніст [target_character.GetName] завершує та представляє на наш суд #italic «Книгу діянь у Ломбардії»#! — монументальну працю про Північну Італію. Кажуть, йому [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'покровительствувала сама', 'покровительствував сам')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'правителька', 'правитель')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Завдяки [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] допомозі автору вдалося провести ретельне дослідження та отримати чітке уявлення про найважливіші історичні факти.\n\nЯскраві, сповнені деталей описи оживляють минуле, захоплюючи читача у вир подій минулих днів. Його робота наочно демонструє, яким має бути історична оповідь, і вихваляє діяння родини [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Зал у [target_location.Custom('LR_PREP')|l] [target_location.GetName] завмер у захваті. Очі людей світяться гордістю за рідну область."
  flavor_mlo.18.a: "Це новий діамант у нашій короні…"
  flavor_mlo.18.b: "Продамо тому, хто запропонує найкращу ціну!"
  flavor_mlo.19.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] та [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] міст"
  flavor_mlo.19.desc: "[ROOT.GetCountry.GetLongName] — [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] цієї процвітаючої країни просять якнайшвидше добудувати #TOOLTIP:BUILDING_TYPE,bridge_infrastructure,X #L міст#!#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Вони переконані, що цей міст привабить потоки людей і товарів, а також пожвавить торгівлю в усьому регіоні.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] теж виграє від будівництва мосту: [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] зв'язок із купцями стане міцним як ніколи. Містяни з нетерпінням чекають нашого рішення."
  flavor_mlo.19.a: "Добре, ми вкладемо кошти в його будівництво."
  flavor_mlo.19.b: "Нам це не по кишені."
  flavor_mlo.20.title: "[target_character.GetNameWithNoTooltip] та його арка Святого Петра Мученика"
  flavor_mlo.20.desc: "[target_character.GetName], талановитий скульптор, звертається зі скромним проханням до [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нашої правительки', 'нашого правителя' )] у ті часи, коли наш народ досягає нових висот у мистецтві Відродження. Художник хоче, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'дозволила', 'дозволив' )] йому втілити в життя свій проєкт — арку Святого Петра Мученика.\n\n[target_character.GetNameWithNoTooltip] описує свій майбутній шедевр із палаючими очима, стверджуючи, що той стане символом релігійної ревності та культурної величі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Його пристрасть і талант зачарували наших радників, і тепер вони наполегливо рекомендують нам вкласти кошти в проєкт, який, за їхніми словами, має великий потенціал."
  flavor_mlo.20.a: "Гроші в нас є…"
  flavor_mlo.20.b: "Але вони не безкінечні."
  flavor_mlo.21.title: "Статути про воду [GetCurrentYear] року"
  flavor_mlo.21.desc: "[target_location.GetName] — це місто, збудоване на воді. Протягом століть вода не лише напувала містян і задовольняла їхню потребу в чистоті, а й сприяла зростанню та розвитку нашої промисловості: паперових фабрик, суконних майстерень і лісопилок.\n\nЯкщо ми не вживемо заходів щодо очищення води та обслуговування наших каналів, то рано чи пізно позбудемося цього рідкого золота."
  flavor_mlo.21.a: "На благу справу жодних грошей не шкода."
  flavor_mlo.21.b: "Нехай стани дбають про чистоту каналів."
  flavor_mlo.21.c: "Це занадто дорого…"
  flavor_mlo.22.title: "Новий університет у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.22.desc: "До [GetCurrentYear] року університет у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] прославився на всю країну завдяки професійним викладачам та захопливим лекціям з природничих наук.\n\nНаші радники та впливові багатії, занепокоєні просуванням наукового знання, вклали багато коштів у будівництво та оснащення університету. Вчені та студенти стікаються до [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip], приваблені блискучими перспективами та можливістю поспілкуватися з найсвітлішими умами сучасності.\n\nУніверситет потихеньку зростає, в його залах читають лекції імениті вчені, які формують сучасне академічне середовище. Скоро він стане найважливішим центром освіти, і в його стінах навчатимуться багато поколінь інтелектуальної еліти."
  flavor_mlo.22.a: "Оце так!"
  flavor_mlo.22.b: "Ми не пошкодуємо коштів на його розвиток!"
  flavor_mlo.22.c: "Тепер це наше головне завдання!"
  flavor_mlo.23.title: "Тканинна промисловість [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_mlo.23.desc: "У [GetCurrentYear] році тканинна промисловість #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! переживає справжній розквіт! Майстерні майстри виробляють вишукані тканини, такі як шовк і тонке сукно, відомі своєю неперевершеною якістю. Міста Північної Італії, зокрема, [target_location.GetName], перетворилися на центри текстильної промисловості, куди стікаються купці та покупці з усіх куточків країни.\n\nЦя галузь почала приносити хороший дохід регіону, і зараз у ній зайнята велика кількість людей. Вишукані тканини з Північної Італії користуються величезним попитом, а сам регіон завоював репутацію флагмана тканинної промисловості."
  flavor_mlo.23.a: "Ми продовжимо вкладати кошти в цю прибуткову галузь!"
  flavor_mlo.23.b: "Нам це не по кишені."
  flavor_mlo.24.title: "Собор у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.24.desc: "Будівництво #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедрального собору#!#! добігло кінця! Досвідчені архітектори та робітники старанно працювали, щоб явити світові величну будівлю.\n\n$milan_cathedral_desc$"
  flavor_mlo.24.a: "Це символ наших видатних культурних досягнень!"
  flavor_mlo.24.b: "Такі надмірності нам не по кишені."
  flavor_mlo.25.title: "Неперевершений живописець"
  flavor_mlo.25.desc: "У [GetCurrentYear] році світ мистецтва потрясла кончина прославленого художника та архітектора Джотто, але його блискучі роботи, такі як фрески #italic капели Скровеньї#! та #italic «Життя Христа і Діви Марії»#!, продовжують надихати нові покоління.\n\nНаші радники вирішують, як вчинити зі спадщиною Джотто: продати чи зберегти для нащадків. Колекціонери та меценати розуміють цінність творів Джотто і готові заплатити за них кругленьку суму. [target_character.GetName] стоїть перед складним вибором. Роботи Джотто — це надбання нашого народу, і ми повинні поставитися до їхнього збереження з усією серйозністю."
  flavor_mlo.25.a: "Він був би радий допомогти нам востаннє…"
  flavor_mlo.25.b: "Його спадщину потрібно зберегти!"
  flavor_mlo.26.title: "Мрії про велич"
  flavor_mlo.26.desc: "Нещодавно ми успішно зміцнили свою владу в країні та за її межами. Тепер же ми стоїмо на історичному роздоріжжі. Вперше за сотні років у нас з'явилася можливість об'єднати під своєю владою всю Північну Італію та заснувати королівство Ломбардія.\n\nОднак багато придворних радників виступають проти такої агресивної політики та пропонують зосередитися на процвітанні нашого народу. Ми повинні ретельно зважити всі варіанти та діяти, виходячи з потреб і сподівань наших ленників.\n\nДотримання балансу між внутрішніми та зовнішніми цілями — нелегке завдання, тому не варто приймати рішення самотужки: краще проконсультуватися з радниками та іншими видатними діячами. Тільки так ми принесемо користь нашому народу та збережемо свою велику спадщину."
  flavor_mlo.26.a: "Ломбардія наша!"
  flavor_mlo.26.b: "Краще подбаймо про народ."
  flavor_mlo.27.title: "Легітимізація влади"
  flavor_mlo.27.desc: "Відомі дворяни #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! звернулися до нас із делікатною пропозицією — визнати їхню династію законними спадкоємцями корони [target_country.Custom('CL_GEN')].\n\nЯкщо ми погодимося, то натомість здобудемо престиж і утвердимо свої права на імператорську корону. Однак їхній зростаючий вплив на півострові може становити для нас загрозу…"
  flavor_mlo.27.a: "[target_character.GetNameWithNoTooltip] отримає свою корону."
  flavor_mlo.27.b: "Їхні амбіції — не наша справа!"
  flavor_mlo.28.title: "Імператор відмовляється дарувати нам титул"
  flavor_mlo.28.desc: "Жахливі новини. [target_character.GetName] не [Select_CString(target_character.IsFemale,'визнала', 'визнав')] право нашої династії на престол #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Крім того, [Select_CString(target_character.IsFemale,'вона', 'він')] спішно [Select_CString(target_character.IsFemale,'випровадила', 'випровадив')] наших дипломатів, які втомилися після довгої дороги і потребували відпочинку. Цього приниження ми [Select_CString(target_character.IsFemale,'їй', 'йому')] ніколи не пробачимо!"
  flavor_mlo.28.a: "До біса [Select_CString(target_character.IsFemale,'імператрицю', 'імператора')]! Ми все одно доб'ємося свого!"
  flavor_mlo.28.b: "Якщо [Select_CString(target_character.IsFemale,'імператриця', 'імператор')] розгнівається, нам непереливки…"
  flavor_mlo.29.title: "[target_character.GetNameWithNoTooltip] відвідує [target_location.Custom('LR_ACC')] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.29.desc: "[target_character.GetName], також відомий як #Y Петрарка#! — знаменитий поет і вчений, який зробив неоціненний внесок у розвиток італійської літератури. Його новаторські сонети, що оспівують кохання та красу природи, назавжди змінили поезію.\nВін не раз висловлював бажання влаштуватися при дворі в [target_location.Custom('LR_PREP')|l] [target_location.GetName], де, як він вважає, його таланти проявляться повною мірою, а твори будуть оцінені по заслугах.\n\n[target_character.GetNameWithNoTooltip] пристрасно бажає зануритися у творче середовище [target_location.Custom('LR_GEN')|l] [target_location.GetName], щоб спілкуватися з такими ж інтелектуалами та розширити свій кругозір. Цей геній сучасності — живе втілення художнього пошуку та прагнення до досконалості."
  flavor_mlo.29.a: "Нехай залишається у нас!"
  flavor_mlo.29.b: "Прибережемо наші кошти для інших цілей…"
  flavor_mlo.30.title: "[target_location.GetNameWithNoTooltip] — центр металургії"
  flavor_mlo.30.desc: "У [GetCurrentYear] році металургійна промисловість Мілана переживає неймовірний підйом. Досвідчені майстри використовують передові технології для видобутку та очищення металу і виплавляють залізо високої якості. Місто несподівано перетворилося на центр сучасної металургії. Сюди стікаються робітники та підприємці, приваблені величезними можливостями для зростання. \n\nПопит на металопродукцію неухильно зростає, і ми повинні вирішити, чи варто нам проголосити [target_location.Custom('LR_ACC')|l] [target_location.GetName] головним центром металообробки, змістивши фокус із вирощування зерна на виробництво заліза. Найбагатші місцеві купці стверджують, що розвиток промисловості в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] сприятиме його процвітанню та зміцнить його репутацію провідного центру зброярства."
  flavor_mlo.30.a: "Залізо для наших робітників і воїнів!"
  flavor_mlo.30.b: "Зерно — це наше все…"
  flavor_mlo.31.title: "У провінції [target_province.GetNameWithNoTooltip] вимагають автономії"
  flavor_mlo.31.title.fallback: "Провінція вимагає автономії"
  flavor_mlo.31.desc: "Мало того, що [GetCurrentYear] рік видався складним, так ще й наша провінція [target_province.GetName] зажадала більшої автономії, скориставшись ослабленням країни та внутрішніми конфліктами. Її жителі не хочуть платити податки та виконувати зобов'язання перед короною. Вони прагнуть взяти управління у свої руки та створити свою правову базу. Схоже, труднощі їх не лякають: вони відстоюватимуть свою незалежність за будь-яку ціну.\n\nЩо ж… їхні лідери обрали слушний час для повстання. Вони чекали моменту, коли ми станемо вразливими! Ми ніколи не забудемо їхньої підступності. Тепер наше завдання — втихомирити незгодних і згуртувати людей навколо корони!"
  flavor_mlo.31.a: "Потрібно розправитися з бунтівниками."
  flavor_mlo.31.b: "Краще задобримо їх…"
  flavor_mlo.31.c: "Свобода? Нехай краще скуштують батога!"
  flavor_mlo.32.title: "Сила та рішучість"
  flavor_mlo.32.desc: "[target_character.GetName], досвідчений командир найманців, прославився на всю країну. Його ім'я стало синонімом тактичної майстерності та безмежної відданості. На полі бою він показав себе безстрашним і вмілим воєначальником. З кожною переможною кампанією його популярність зростає, і слава про нього вже дійшла до двору #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Впливові придворні вражені його харизмою та військовим досвідом, а також глибоким розумінням політичних процесів."
  flavor_mlo.32.a: "При дворі знадобився б такий талановитий воєначальник."
  flavor_mlo.32.b: "Навіщо нам черговий амбітний військовий?.."
  flavor_mlo.33.title: "Оновлення палацу дожів"
  flavor_mlo.33.desc: "На [GetCurrentYear] рік заплановано масштабну реконструкцію палацу дожів — символу багатства та культурного впливу [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Спочатку ця будівля виконувала роль фортеці та слугувала резиденцією родини [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Настав час перетворити її на справжній палац. Досвідчені майстри розробляють план реставрації хитромудрих фресок і скульптур, бажаючи вдихнути нове життя в інтер'єр будівлі. Архітекторам же було доручено вдосконалити її конструкцію, щоб вона ще довго тішила містян своєю пишністю. Ремісники прикрасять просторі зали розкішними гобеленами та вишуканими меблями під стать королівській родині. За задумом палац дожів має викликати у відвідувачів захоплення та трепет, стати справжньою культурною та архітектурною перлиною [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
  flavor_mlo.33.a: "До роботи!"
  flavor_mlo.33.b: "Нам це не по кишені."
  flavor_mlo.34.title: "[target_character.GetNameWithNoTooltip] та його кінна статуя"
  flavor_mlo.34.desc: "[target_character.GetName] робить нашим радникам цікаву пропозицію. Він вважає, що престиж та вплив династії цілком залежить від культурного та соціального сліду, який вона залишить по собі. Він збирається створити #italic кінну статую#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName], щоб увічнити ім'я голови нашої родини. [target_character.GetNameWithNoTooltip] так пристрасно описує свій проєкт та його майбутній вплив на престиж нашого міста, що абсолютно зачаровує придворних.\n\nНаші довірені помічники вмовляють нас дозволити цьому генію реалізувати свій амбітний проєкт. Якщо ми дамо добро, то да Вінчі скрупульозно працюватиме над кожною деталлю і створить скульптуру надзвичайної художньої виразності, яка стане надбанням нашого міста та символом могутності нашого славного роду. Жителям [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] вже не терпиться побачити нове творіння майстра."
  flavor_mlo.34.a: "Виділимо кошти на цей проєкт."
  flavor_mlo.34.b: "Нам це не по кишені."
  flavor_mlo.35.title: "Відповідь імператора"
  flavor_mlo.35.desc: "[target_character.GetName] відправив до нас гінця! Імператор Священної Римської Імперії вирішив визнати наше право на міланський престол. Наш новий статус зміцнить авторитет нашої країни та нашу позицію в імперії.\n\nКрім того, він підвищить престиж нашого правителя та надасть його владі легітимності, а також змусить народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! пишатися своєю країною та забезпечить його лояльність. Під нашим мудрим керівництвом [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] скоро перетвориться на одне з найпроцвітаючих міст Священної Римської Імперії."
  flavor_mlo.35.a: "Ми впишемо себе в історію!"
  flavor_mlo.36.title: "Королівський палац у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.36.desc: "Палац у [target_location.Custom('LR_PREP')|l] [target_location.GetName] — чудовий пам'ятник середньовічної архітектури, який протягом століть слугував столичною резиденцією нашого уряду. Ми можемо перетворити його на символ могутності та багатства правлячої еліти, якщо не пошкодуємо коштів на його реставрацію. Високі кам'яні стіни, прикрашені хитромудрими барельєфами, та величні вежі вселятимуть жителям міста трепет і благоговіння. Легко уявити, як його просторими залами зі склепінчастими стелями та чудовими гобеленами снують придворні, одягнені в розкішне вбрання, а в пишних садах — справжньому раю на землі — віддаються спогляданню та відпочивають від міської метушні впливові вельможі. Таким і має бути королівський палац."
  flavor_mlo.36.a: "Символ величі нашої родини!"
  flavor_mlo.36.b: "Нам це не по кишені."
  flavor_mlo.37.title: "[target_character.GetLastNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] шлюб"
  flavor_mlo.37.desc: "[target_character.GetName] — людина цілеспрямована, і ми визнаємо [Select_CString(target_character.IsFemale,'її', 'його')] військові заслуги. Однак з такими людьми завжди потрібно бути напоготові: влада легко може запаморочити їм голову. Хто знає, як [Select_CString(target_character.IsFemale,'вона', 'він')] поведе себе в майбутньому?\n\nМожливо, найкраща тактика — задобрити [Select_CString(target_character.IsFemale,'її', 'його')]. Ми можемо запропонувати [Select_CString(target_character.IsFemale,'їй', 'йому')] одружитися з [Select_CString(target_spouse.IsFemale,'дочкою', 'сином')] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нашої правительки', 'нашого правителя' )] на ім'я [target_spouse.GetName]. Тоді [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] триматиме [Select_CString(target_character.IsFemale,'її', 'його')] під контролем."
  flavor_mlo.37.a: "[target_character.GetNameWithNoTooltip] та [target_spouse.GetNameWithNoTooltip] мають одружитися."
  flavor_mlo.37.b: "Ми не хочемо наближати [Select_CString(target_character.IsFemale,'її', 'його')] до себе."
  flavor_mlo.37.tt: "У майбутньому [target_character.GetNameWithNoTooltip] захоче прибрати до рук #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!"
  flavor_mlo.40.title: "[target_location.GetNameWithNoTooltip] та [target_location2.GetNameWithNoTooltip]: інтеграція"
  flavor_mlo.40.desc: "Вплив династії [target_character.GetDynasty.GetName] зростає по всій Північній #TOOLTIP:REGION,italy_region,X #L Італії#!#! і особливо відчувається в #TOOLTIP:AREA,lombardy_area,X #L Ломбардії#!#!. Така сила викликає трепет, і поступово її визнають навіть найнестерпніші впертюхи. Ми можемо скористатися ситуацією та захопити дві скромні громади в [target_location.Custom('LR_PREP')|l] [target_location.GetName] та [target_location2.Custom('LR_PREP')|l] [target_location2.GetName]."
  flavor_mlo.40.historical_info: "У 1347–1348 роках Міланське герцогство захопило та приєднало до себе два сусідні міста: Алессандрію та Тортону. Цими кампаніями керував кондотьєр Лукіно Вісконті — один із правителів Мілана."
  flavor_mlo.40.a: "Вперед."
  flavor_mlo.40.b: "Залишимо їх у спокої."
  flavor_mlo.41.title: "#italic Навільяччо#!"
  flavor_mlo.41.desc: "Нам надійшла пропозиція побудувати канал між двома найважливішими містами #TOOLTIP:AREA,lombardy_area,X #L Ломбардії#!#!, а вздовж нього прокласти дорогу. [target_location.GetName] та [target_location2.GetName] нарешті будуть з'єднані один з одним, що посилить згуртованість усієї провінції."
  flavor_mlo.41.historical_info: "#italic Навільяччо#! — канал, побудований між Міланом та Павією для зміцнення співпраці між містами, а також зрошення #italic парку Вісконті#! на північ від Павії."
  flavor_mlo.41.a: "Ми виділимо кошти на цей проєкт."
  flavor_mlo.41.b: "У нас немає на нього грошей."
  STATIC_MODIFIER_NAME_mlo_naviglaccio: "Зв'язуючий канал"
  flavor_mlo.42.title: "Купівля землі для парку Вісконті"
  flavor_mlo.42.desc: "Наше помістя в [target_location.Custom('LR_PREP')|l] [target_location.GetName] неухильно розростається. Архітектори постаралися на славу: схоже, у цьому палаці проживе не одне покоління. Однак [target_ruler.GetName] не мислить [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої резиденції без мисливських угідь. [Select_CString(target_ruler.IsFemale, 'Вона', 'Він' )] збирається придбати землю та розбити на ній парк, але є одна проблема: ця земля належить містянам."
  flavor_mlo.42.historical_info: "Парк Вісконті — це ділянка землі, відведена правителем Мілана з роду Вісконті під мисливські угіддя. Бажаючи розширити своє розкішне помістя в Павії, Галеаццо II Вісконті по суті відібрав цю територію у місцевих жителів, чим викликав серйозне невдоволення. Багато містян втратили джерело доходу. Серед них був і Бертоліно де Сісті, який від відчаю вирішив убити Галеаццо."
  flavor_mlo.42.a: "Відберемо землю силою."
  flavor_mlo.42.b: "Купимо землю за будь-яку ціну."
  flavor_mlo.42.c: "Обійдемося без парку!"
  STATIC_MODIFIER_NAME_mlo_royal_park: "Королівський парк"
  flavor_mlo.43.title: "Спроба вбивства"
  flavor_mlo.43.desc: "Наше рішення відібрати землю силою засмутило населення [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Під час параду незадоволений громадянин спробував убити нашого правителя. [target_ruler.GetName] дивом [Select_CString(target_ruler.IsFemale, 'уникнула', 'уникнув' )] смерті. Потрібно діяти швидко."
  flavor_mlo.43.historical_info: "$flavor_mlo.42.historical_info$"
  flavor_mlo.43.a: "Накажемо охороні втрутитися."
  flavor_mlo.43.b: "Проявимо обережність."
  flavor_mlo.44.title: "[mlo_dal_verme_scope.GetNameWithNoTooltip]"
  flavor_mlo.44.desc: "До нас дійшли чутки про талановитого кондотьєра. [mlo_dal_verme_scope.GetName] служить нашим ворогам — така людина потрібна нашій армії. Крім того, якщо ми переманимо [Select_CString(mlo_dal_verme_scope.IsFemale,'її', 'його')] до себе, то значно послабимо війська суперника."
  flavor_mlo.44.historical_info: "Якопо даль Верме був італійським кондотьєром з веронської знатної родини Даль Верме. Як і багато кондотьєрів, він керував різними військами, але прославився як командувач міланської армії в кампаніях Галеаццо II Вісконті та Джана Вісконті. Останній навіть зробив його генерал-капітаном."
  flavor_mlo.44.a: "Ми повинні запросити [Select_CString(mlo_dal_verme_scope.IsFemale,'її', 'його')] до двору!"
  flavor_mlo.44.b: "Незамінних людей не існує."
  flavor_mlo.45.title: "[mlo_bernardino_corio_scope.GetNameWithNoTooltip]"
  flavor_mlo.45.desc: "[Select_CString(mlo_bernardino_corio_scope.IsFemale,'Приголомшлива письменниця', 'Приголомшливий письменник')] [mlo_bernardino_corio_scope.GetName] хоче стати головним хроністом [ROOT.GetCountry.GetCourt.Custom('parliament_ru_GEN')|l]. [Select_CString(mlo_bernardino_corio_scope.IsFemale,'Вона', 'Він')] збирається описати історію нашого міста з моменту його заснування до сьогоднішніх днів."
  flavor_mlo.45.a: "Будемо раді [Select_CString(mlo_bernardino_corio_scope.IsFemale,'її', 'його')] бачити."
  flavor_mlo.45.b: "Нам нічим [Select_CString(mlo_bernardino_corio_scope.IsFemale,'їй', 'йому')] платити."
  flavor_mlo.46.title: "#italic $mlo_historia_patria$#!"
  flavor_mlo.46.desc: "Нарешті наші вкладення окупилися: [target_character.GetName] [Select_CString(mlo_bernardino_corio_scope.IsFemale,'закінчила', 'закінчив')] свою роботу, хоча спочатку мало хто вірив, що [Select_CString(mlo_bernardino_corio_scope.IsFemale,'їй', 'йому')] вдасться втілити в життя настільки амбітний план, але ми ризикнули і не прогадали. [Select_CString(mlo_bernardino_corio_scope.IsFemale,'Її', 'Його')] і без того вагома праця постійно поповнюється новими даними."
  flavor_mlo.46.a: "Продовжимо фінансувати хроніку!"
  flavor_mlo.46.b: "Краще збудуємо новий палац."
  flavor_mlo.47.title: "[target_location.GetNameWithNoTooltip] у біді"
  flavor_mlo.47.desc: "[target_location.GetRank.GetName] [target_location.GetName] у великій небезпеці. Ці землі оточені могутніми ворогами, а сюзерени покинули їх і тепер шукають вигідного покупця. [target_location.GetRank.GetName] чекає нового володаря. Чому б нам не спробувати удачу?"
  flavor_mlo.47.a: "Скористаємося цією можливістю."
  flavor_mlo.47.b: "Зосередимося на внутрішніх проблемах."
  STATIC_MODIFIER_NAME_MLO_recent_diplomatic_play: "Дипломатичні ігри"
  flavor_mlo.48.title: "Ліга проти династії [target_dynasty.GetNameWithNoTooltip]"
  flavor_mlo.48.desc: "Династія [target_dynasty.GetName] опинилася в центрі інтриг: її останні ходи на шахівниці #TOOLTIP:REGION,italy_region,X #L Італії#!#! страшенно розлютили інших гравців. Подальші дії лише погіршили ситуацію і призвели до формування коаліції, куди увійшли багато відомих родин і країн, розташованих на півночі регіону. [ROOT.GetCountry.GetLongName] — лише одна з країн, що прагнуть перемогти нового гегемона. Разом із парочкою інших великих гравців ми намагалися стримати експансію династії, але, на жаль, безуспішно. Так, ми програли, але повинні продовжувати боротьбу."
  flavor_mlo.48.historical_info: "Непомірні апетити Скалігерів на початку XIV століття призвели до формування коаліції проти них. Конфлікт був спровокований нападом веронців на Венеційську республіку в 1336 році. Незабаром після утворення коаліції до неї приєдналися багато могутніх родин Північної Італії, і через три роки володіння Скалігерів скоротилися до двох міст: Верони та Віченци."
  flavor_mlo.48.a: "Ми повинні стримати їх."
  should_at_least_2_accept_we_will_declare_war_within_a_year_tt: "Якщо хоча б #Y 2#! з цих [Concept('countries', 'країн')|e] погодяться приєднатися до боротьби проти династії [target_dynasty.GetName], #R протягом року#! почнеться війна"
  flavor_mlo.49.title: "$flavor_mlo.48.title$"
  flavor_mlo.49.desc: "$flavor_mlo.48.desc$"
  flavor_mlo.49.a: "Ми стримаємо їх!"
  flavor_mlo.49.b: "Сильні вороги нам не по плечу."
  flavor_mlo.49.historical_info: "$flavor_mlo.48.historical_info$"
  should_we_accept_we_will_automatically_join_the_upcoming_war_within_next_year_tt: "Якщо погодимося, протягом #R наступного року#! ми вступимо в майбутню війну"
  flavor_mlo.50.title: "$flavor_mlo.48.title$"
  flavor_mlo.50.desc: "Наші обширні володіння на півночі #TOOLTIP:REGION,italy_region,X #L Італії#!#! не дають спокою нашим сусідам. Вони навіть створили коаліцію проти нас. Дурні! Поки їхні дії не принесли жодних результатів. Будемо сподіватися, що вони засвоїли урок і більше не повернуться, а якщо ні — ми покажемо їм усю міць династії [target_dynasty.GetName]."
  flavor_mlo.50.historical_info: "$flavor_mlo.48.historical_info$"
  flavor_mlo.50.a: "Нехай приходять!"
  flavor_mlo.51.title: "Палац династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip]"
  flavor_mlo.51.desc: "Наше бажання створити єдину країну зі столицею в центрі #TOOLTIP:AREA,lombardy_area,X #L Ломбардії#!#! змусило нас залишити наш рідний [milan_location.GetRank.GetNameWithNoTooltip|l] [milan_location.GetName]. Очевидно, що нам потрібна велика резиденція в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Члени [ROOT.GetCountry.GetCourt.Custom('parliament_ru_GEN')|l] запропонували звести пишний палац, який стане символом нової епохи."
  flavor_mlo.51.historical_info: "Після підкорення Павії в 1359 році Вісконті вирішили побудувати палац у новій столиці. Місто було обрано невипадково: воно знаходилося в самому центрі Лангобардського королівства. Резиденція повинна була стати символом міланської гегемонії та духовної спадкоємності."
  flavor_mlo.51.a: "Вкладемося в цей проєкт."
  flavor_mlo.51.b: "Не будемо впадати в марнославство."
  flavor_mlo.52.title: "Бібліотека династії [target_character.GetDynasty.GetNameWithNoTooltip]"
  flavor_mlo.52.desc: "До нас надійшла цікава пропозиція: зібрати найкращі книги [ROOT.GetCountry.Custom('CL_GEN')] у бібліотеці #italic палацу#!, щоб зміцнити престиж [target_location.Custom('LR_GEN')|l] [target_location.GetName] та нашої правлячої династії [target_character.GetDynasty.GetName]. План вже затверджено, але треба визначитися, яка сфера нас цікавить."
  flavor_mlo.52.a: "Наука та знання."
  flavor_mlo.52.b: "Наша велика культура."
  STATIC_MODIFIER_NAME_MLO_library_arts: "Бібліотека мистецтв"
  STATIC_MODIFIER_NAME_MLO_library_research: "Наукова бібліотека"
  MLO_can_be_seized_and_must_be_protected: "Бібліотеку може захопити будь-яка країна, яка окупує [target_location.Custom('LR_ACC')|l] [target_location.GetName], що призведе до видалення всіх модифікаторів."
  flavor_mlo.53.title: "Бібліотека в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_mlo.53.desc: "Після того, як ми захопили [target_location.Custom('LR_ACC')|l] [target_location.GetName] та встановили контроль над усією провінцією, в наших руках опинився палац із легендарною бібліотекою. Ми можемо розорити її або залишити недоторканою, щоб не псувати відносини з її власниками."
  flavor_mlo.53.a: "Пограбуємо бібліотеку!"
  flavor_mlo.53.b: "Краще розграбуємо місто."
  flavor_mlo.54.title: "Наша бібліотека зруйнована!"
  flavor_mlo.54.desc: "[library_ruiner.GetName] поплатиться за скоєне. [Select_CString(library_ruiner.IsFemale,'Її', 'Його')] солдати розграбували нашу скарбницю. Звісно, від ворога іншого й не чекаєш, але це варварство не залишиться безкарним."
  flavor_mlo.54.a: "Вони заплатять за це!"
  flavor_mlo.55.title: "Кінець династії [target_dynasty.GetNameWithNoTooltip]"
  flavor_mlo.55.desc: "Фігури розставлені по місцях. Наші брати по зброї — і [target_country_1.GetName], і [target_country_2.GetLongName], і всі інші — готові негайно завдати удару. Ми втопимо [target_location.Custom('LR_ACC')|l] [target_location.GetName] у крові, яку проллє [target_character2.GetName]!"
  flavor_mlo.55.a: "$delhi_situation.12.a$"
  those_who_pledged_will_join_tt: "Ті, хто пообіцяв приєднатися до війни, стануть на наш бік у боротьбі з #ONCLICK:COUNTRY,[target_enemy_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_enemy_country.Custom('CL_tt')],X [target_enemy_country.Custom('CL_INST')|L]#!#!"
  mlo_lodrisio_visconti_appeased_tt: "[target_character.GetName] задовольнить свої інтереси на шкоду іншим членам правлячої династії"
  mlo_lodrisio_visconti_scorned_tt: "[target_character.GetNameWithNoTooltip] покине наш двір"
