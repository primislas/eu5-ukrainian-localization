l_russian:
 flavor_bul.1.title: "[GetCountry('KVN').GetLongNameWithNoTooltip]"
 flavor_bul.1.entry: "Княжество Добруджа"
 flavor_bul.1.desc: "За последние годы [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] в значительной мере утратили контроль над страной, в то время как могущественные [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], напротив, сильны как никогда. Особенно явно это проявляется в #TOOLTIP:PROVINCE_DEFINITION,north_dobruja_province,X #L Северной#!#! и #TOOLTIP:PROVINCE_DEFINITION,south_dobruja_province,X #L Южной Добрудже#!#!: [target_character.GetName] правит этими провинциями практически независимо, полностью контролируя местную торговлю, крепости и флот. Некоторые считают, что пора предоставить [Select_CString(target_character.IsFemale, 'ей', 'ему' )] автономию и официально признать нашим вассалом, иначе мы окончательно потеряем Добруджу. Впрочем, есть и те, кто требует восстановления нашей власти в регионе."
 flavor_bul.1.a: "Мы признаем их автономию."
 dobrujan_revolt: "Восстание в Добрудже"
 flavor_bul.1.b: "Это неотъемлемая часть нашей державы!"
 flavor_bul.1.b.tt: "Все [Concept('pops', 'группы населения')|e] национальных районов Карвуны во владении получат [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e] и присоединятся к мятежу"
 flavor_bul.1.c: "Примем власть над [GetCountry('KVN').Custom('CL_INST')]."
 flavor_bul.1.c.entry: "Примем власть над Карвуной."
 flavor_bul.1.historical_info: "Деспотат Карвуна образовался в XIV столетии на фоне постепенного упадка центральной власти в Болгарии. Первое время Карвуна, вероятно, оставалась полузависимым вассалом, но впоследствии стала фактически независимой державой. Деспоты чеканили собственную монету, проводили самостоятельную внешнюю политику и вели войны без оглядки на Тырново."
 flavor_bul.2.title: "Проблемы с престолонаследием"
 flavor_bul.2.entry: "$flavor_bul.2.title$"
 flavor_bul.2.desc: "[target_ruler.GetName] стареет, [Select_CString(target_ruler.IsFemale, 'её', 'его' )] всё чаще посещают тревожные думы о том, какая судьба ждёт #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! после [Select_CString(target_ruler.IsFemale, 'её', 'его' )] кончины. [ROOT.GetCountry.GetGovernment.GetRulerTitle|U] опасается, что соперничество между [Select_CString(target_ruler.IsFemale, 'её', 'его' )] сыновьями перерастёт в гражданскую войну. Чтобы избежать кризиса престолонаследия, советники предлагают разделить [ROOT.GetCountry.Custom('rank_ru_ACC')|l]: [targer_brother.GetName] получит земли на северо-западе с центром в #TOOLTIP:LOCATION,vidin,X #L Видине#!#!, в то время как [target_heir.GetName] будет [Select_CString(target_heir.IsFemale, 'признана', 'признан' )] как [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName] и остальной державе."
 flavor_bul.2.a: "Пусть каждый из сыновей правит в мире."
 flavor_bul.2.b: "В стране может быть лишь один [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
 flavor_bul.2.c: "Мы будем править в Видине."
 flavor_bul.2.historical_info: "Раздел Болгарии в правление Ивана Александра был обусловлен прежде всего неожиданной гибелью его сына, соправителя и наследника Михаила Асеня IV, который пал в бою с османами. Опасаясь будущей междоусобицы, Иван Александр наделил своего сына Ивана Срацимира царским титулом и передал ему Видин, тогда как другой сын, Иван Шишман, унаследовал престол в Тырново."
 flavor_bul.3.title: "Второй золотой век [ROOT.GetCountry.Custom('CL_GEN')]"
 flavor_bul.3.entry: "$flavor_bul.3.title$"
 flavor_bul.3.desc: "[target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'выразила', 'выразил' )] стремление вернуть славные времена Симеона Великого, когда [ROOT.GetCountry.GetName] был[ROOT.GetCountry.Custom('end_fem')] центром учёности и культуры. Желая возродить духовное и художественное наследие страны, [target_ruler.GetSheHe] [Select_CString(target_ruler.IsFemale, 'готова', 'готов' )] профинансировать возрождение монастырей и выделить значительные средства монашеским общинам. Некоторые опасаются, что это приведёт к непомерным расходам, однако [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(target_ruler.IsFemale, 'убеждена', 'убеждён' )], что в долгосрочной перспективе [Select_CString(target_ruler.IsFemale, 'её', 'его' )] планы принесут [ROOT.GetCountry.Custom('rank_ru_DAT')|l] немалую пользу."
 flavor_bul.3.a: "Мы одобряем этот замысел."
 flavor_bul.3.b: "Это разорит нашу казну."
 flavor_bul.3.historical_info: "Последние годы царствования Ивана Александра были отмечены упадком и раздробленностью страны, однако начало его правления было временем блестящего культурного возрождения. Этот период нередко называют «вторым золотым веком Болгарии». Иван Александр поддерживал восстановление старых монастырей и возведение новых, уделял внимание религиозным вопросам и стремился укрепить Болгарскую православную церковь. В это же время в стране наблюдался рост литературной деятельности, результатом которого стало появление множества летописей и трудов."
 flavor_bul.4.title: "Четвероевангелие царя Ивана Александра"
 flavor_bul.4.entry: "$flavor_bul.4.title$"
 flavor_bul.4.desc: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Наша', 'Наш' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] мечтает о культурном возрождении #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, и [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'её', 'его' )] усилия уже приносят плоды. По заказу [ROOT.GetCountry.GetGovernment.GetAdjective|l]их властей [Select_CString(target_artist.IsFemale, 'монахиня', 'монах' )] по имени [target_artist.GetShortName] [Select_CString(target_artist.IsFemale, 'создала', 'создал' )] в #TOOLTIP:LOCATION,tarnovo,X #L Тырново#!#! богато украшенное Евангелие, и [bul_ivan.GetName], несомненно, будет [Select_CString(bul_ivan.IsFemale, 'рада', 'рад' )] взять в руки этот бесценный фолиант. Несмотря ни на что, мы всё ещё способны создавать произведения искусства, подобных которым нет даже в #TOOLTIP:LOCATION,constantinople,X #L Константинополе#!#!."
 flavor_bul.4.a: "Великолепно!"
 flavor_bul.4.historical_info: "«Четвероевангелие царя Ивана Александра» является, пожалуй, самым значительным из дошедших до нас памятников Второго Болгарского царства и одним из наиболее ярких произведений так называемого «второго золотого века». Рукопись содержит полный текст Евангелий, иллюстрированный 366 великолепными миниатюрами."
 flavor_bul.5.title: "[ROOT.GetCountry.GetAdjectiveWithNoTooltip]о-[GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ие войны"
 flavor_bul.5.entry: "Болгаро-османские войны"
 flavor_bul.5.desc_common: "У [target_location.Custom('LR_GEN')|l] [target_location.GetName] наши войска впервые в истории сошлись в бою [GetCountry('TUR').Custom('end_predlog_sso')] #L [GetCountry('TUR').GetAdjective|l]ой#! армией."
 flavor_bul.5.desc_victory: "$flavor_bul.5.desc_common$ Нам удалось одержать верх, однако мало кто из командиров всерьёз верит, что на этом всё закончится. [GetCountry('TUR').GetNameWithNoTooltip] — грозный противник, который одержал немало побед и рвётся к новым завоеваниям. Скорее всего, сегодняшняя битва станет лишь первой в череде сражений…"
 flavor_bul.5.desc_defeat: "$flavor_bul.5.desc_common$ Печальный исход этой битвы показал, что нам противостоит упорный и дисциплинированный неприятель. Если мы хотим сохранить [ROOT.GetCountry.Custom('rank_ru_ACC')|l], нужно готовиться к долгой и отчаянной борьбе с могущественным и амбициозным противником."
 flavor_bul.5.a: "Грядёт буря, и мы должны быть готовы."
 flavor_bul.5.b: "Необходимо перехватить инициативу!"
 flavor_bul.5.historical_info: "Войны с османами стали переломным этапом в истории Болгарии. В XIV веке турки начали продвигаться вглубь Балкан, и Болгария, раздробленная и раздираемая внутренними противоречиями, оказалась на пути набирающей мощь османской державы. Какое-то время болгары сдерживали натиск неприятеля, им удалось выстоять несколько битв, которые не принесли победы ни одной стороне, но в конечном счёте более сильная османская армия одержала верх. С падением Видинa в 1396 году болгарской государственности пришёл конец. Начался почти пятивековой период турецкого господства над Болгарией."
 flavor_bul.6.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]ий развод"
 flavor_bul.6.entry: "$flavor_bul.6.title$"
 flavor_bul.6.desc: "#L [ROOT.GetCountry.GetAdjective]ий#! [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] в смятении: [target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'объявила', 'объявил' )] о своём намерении развестись с законной супругой и взять в жёны простолюдинку по имени [target_newwife.GetShortName] — ещё и обращённую #TOOLTIP:CULTUREGROUP,jewish_group,X #L иудейку#!#!! [target_oldwife.GetName], первая жена монарха, отправится в монастырь. Многие опасаются, что подобное решение подорвёт и без того шаткую стабильность [ROOT.GetCountry.Custom('rank_ru_GEN')|l] и посеет раздор между царевичами, что в дальнейшем может вылиться в кризис престолонаследия. Но когда [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] чего-то желает, кто осмелится оспаривать [Select_CString(target_ruler.IsFemale, 'её', 'его' )] волю?"
 flavor_bul.6.a: "Этот брак будет устроен."
 flavor_bul.6.b: "Интересы [ROOT.GetCountry.Custom('rank_ru_GEN')|l] важнее личного счастья монарха."
 flavor_bul.6.b.entry: "Интересы державы превыше всего."
 flavor_bul.6.historical_info: "В браке Ивана Александра со второй женой Сарой-Феодорой родилось шестеро детей, в том числе Иван Шишман, унаследовавший отцовский престол в Тырново. Считается, что Сара-Феодора активно отстаивала интересы своего сына, добиваясь признания его единственным наследником в обход Ивана Срацимира — последнего из сыновей Ивана Александра от первой жены, Феодоры Валашской. В конечном счёте это привело к разделу Болгарии между Тырново и Видином."
 flavor_bul.1000.title: "Расцвет нового царства"
 flavor_bul.1000.entry: "$flavor_bul.1000.title$"
 flavor_bul.1000.desc: "Стены #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#! наконец-то пали под натиском доблестных #L [ROOT.GetCountry.GetAdjective|l]их#! армий. Для некогда могущественного города начинается новая эра, а времена упадка и унижения #TOOLTIP:RELIGION,$orthodox_tt$,X #L православной#!#! веры навсегда останутся в прошлом. Скоро весь мир узнает, что Феникс сгорел дотла. Да здравствует [target_ruler.GetName], $STATIC_MODIFIER_NAME_bul_conqueror_of_constantinople$!"
 flavor_bul.1000.a: "Сегодня рождается новая империя!"
 flavor_bul.1000.a.tt: "Все соседние [Concept('countries', 'державы')|e], которые не состоят в [Concept('alliance', 'союзе')|e] с нами и не являются нашими [Concept('subject', 'ленниками')|e], а также все наши [Concept('rivals', 'соперники')|e] получат [ShowBiasValue('opinion_bul_proclaimed_an_empire')|+=] к [Concept('opinion', 'мнению')|e] о нас."
 flavor_bul.1000.b: "Нам не нужны громкие титулы — хватит и того, что мы победили."
 flavor_bul.1001.title: "Царьград"
 flavor_bul.1001.desc: "С превращением #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! в империю престиж и мировое значение страны резко выросли. Теперь многие при дворе сомневаются, может ли [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetName] оставаться центром столь славной и могущественной державы, как [ROOT.GetCountry.GetLongNameWithNoTooltip]. Они предлагают перенести столицу в #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#!, который веками считался политическим и духовным центром всего #TOOLTIP:RELIGION,$orthodox_tt$,X #L православного#!#! мира."
 flavor_bul.1001.a: "У нас будет столица, достойная великой империи!"
 flavor_bul.1001.b: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] нас вполне устраивает."
 flavor_bul.1001.b.entry: "Нас вполне устраивает и столица."
 flavor_bul.1001.historical_info: "На протяжении веков многие державы мечтали владеть Константинополем, и Болгария не исключение. Болгарские правители не раз пытались захватить великий город, однако ни один из них не преуспел. Ближе всех к успеху подошёл Симеон Великий: хотя Константинополь и выстоял, война с Болгарией закончилась унизительным поражением Византии. Империи пришлось признать за Симеоном царское достоинство, что превратило Болгарию в одну из ведущих балканских держав."
