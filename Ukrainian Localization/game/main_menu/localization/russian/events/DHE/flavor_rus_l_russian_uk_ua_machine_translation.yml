l_russian:
  flavor_rus.1.title: "Помісна реформа"
  flavor_rus.1.desc: "Після завоювання #ONCLICK:COUNTRY,[GetCountry('NOV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOV').Custom('CL_tt')],X [GetCountry('NOV').Custom('CL_GEN')|L]#!#! слід остерігатися бунту місцевих жителів: окрім насильного виселення людей, що тут проживають, відбувається заміна священників [GetCountry('NOV').GetAdjectiveWithNoTooltip|l]ої церкви на #L [ROOT.GetCountry.GetAdjective|l]их#! #L [target_religion.GetAdjective|l]их#! діячів. Щоб придушити бунти, що готуються, ми можемо впровадити такі зміни, щоб місцева [ShowPopTypeName('nobles')|l] позбулася своїх вотчин, а отримали їх служиві люди. Так ми не тільки зміцнимо свою владу, позбувшись роздробленості, а й заручимося вірністю війська."
  flavor_rus.1.a: "Введемо помісну систему."
  flavor_rus.1.b: "Переймемо звичаї [GetCountry('NOV').Custom('CL_GEN')|l]."
  flavor_rus.1.c: "Схопимо і стратимо всіх, хто противиться."
  flavor_rus.1.historical_info: "У 1471 році Велике князівство Московське підкорило Новгород, що прагнув зблизитися з Литвою. Новгород змушений був підписати Коростинський мир, що обмежував незалежність республіки. Однак цим біди новгородців не скінчилися: цар Іван III, що побоювався розділити долю свого батька, почав примусово виселяти жителів республіки, щоб ті не могли підняти повстання, а також заміщати голів новгородської церкви на православних священників. Місцеві вотчини він передав у володіння кінноті, нагороджуючи її за службу. Встановлена в Новгородській землі помісна система незабаром була введена і в Москві. Передавши своєму війську боярські вотчини, Іван не тільки зміг централізувати владу, а й забезпечив собі вірність тих, хто бився за нього. До 1489 року Новгород перетворився на бліду подобу себе колишнього — тепер він повністю входив до складу зростаючої російської країни."
  flavor_rus.2.title: "[malyuta_skuratov.GetNameWithNoTooltip]"
  flavor_rus.2.desc: "На придворну службу прагне влаштуватися [malyuta_skuratov.GetName] — людина, що чудово розбирається в політичних підступах, непохитно вірна і нещадна до ворогів країни. Цей «вірний государев пес» наводитиме страх на будь-кого, хто наважиться виступити проти нас, і кожне доручення виконуватиме відповідально та справно."
  flavor_rus.2.a: "Чудовий опричник!"
  flavor_rus.2.tt1: "[target_root_country.GetGovernment.GetRuler.GetName] гідно оцінить жорстокість, яку виявляє [malyuta_skuratov.GetNameWithNoTooltip]"
  flavor_rus.2.b: "Він звір і мучитель."
  flavor_rus.2.historical_info: "Малюта Скуратов — один з керівників опричнини часів Івана Ґрозного, відповідальний за страти та позбавлення майна тисяч людей. Опричнину очолив у 1569 році, тоді ж брав участь у слідстві у справі єдиного двоюрідного брата царя — Володимира Старицького, ймовірного спадкоємця престолу. Того ж року задушив митрополита Московського Філіпа, що потрапив в опалу, а через рік взяв участь у каральному поході на Новгород, де за його наказом було вбито кілька тисяч людей. Загинув у 1573 році на Лівонській війні під час облоги Вейсенштейна."
  flavor_rus.3.title: "Погляд Росії звернений на схід"
  flavor_rus.3.desc: "#TOOLTIP:AREA,tambov_area,X #L Тамбов#!#!, #TOOLTIP:AREA,samara_area,X #L Самара#!#! та #TOOLTIP:AREA,astrakhan_area,X #L Астрахань#!#! в наших руках. Час рухатися далі, на #TOOLTIP:REGION,ural_region,X #L Урал#!#!, щоб віддати належне тим, хто колись хотів нас підкорити."
  flavor_rus.3.a: "Все це належатиме Росії."
  flavor_rus.3.b: "Спочатку налагодимо внутрішні справи."
  flavor_rus.3.c: "Ми підкоряємо словом, а не мечем."
  flavor_rus.3.historical_info: "У 1552 році цар Іван Ґрозний влаштував похід проти Казанського ханства, розташованого на схід від Нижнього Новгорода на річці Волзі. Російське військо обстріляло стіни Казані з важких знарядь, після чого увірвалося в місто, яке більше не могло чинити опір. Через чотири роки цар, натхненний успіхом попереднього походу, вирушив підкорювати Астрахань, що розташовується в нижній частині Волги. Захопивши це місто, Росія не тільки вийшла до Каспійського моря, а й отримала в своє розпорядження все Поволжя, де незабаром були засновані такі поселення, як Самара, Саратов і Царицин, що захищали місцеві краї від набігів."
  flavor_rus.4.title: "Влада [GetCountry('PLC').Custom('CL_GEN')] чинить нам перешкоди"
  flavor_rus.4.desc: "Походи на захід йдуть успішно: нам вже повністю належить #TOOLTIP:AREA,smolensk_area,X #L Смоленська#!#! область. Однак у #TOOLTIP:AREA,white_ruthenia_area,X #L Білій Русі#!#! наші воїни ще подекуди натрапляють на опір, а тому наше поступове оволодіння #ONCLICK:COUNTRY,[GetCountry('PLC').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PLC').Custom('CL_tt')],X [GetCountry('PLC').Custom('CL_INST')|L]#!#! просувається надто повільно. Треба постаратися якнайшвидше заволодіти краями, що поки не підкорилися нам — тільки так [ROOT.GetCountry.Custom('rank_ru_DAT')|l] вдасться об'єднати під собою всіх слов'ян."
  flavor_rus.4.a: "Наступаємо."
  rus_claimed_land: "Претендують на наші землі"
  rus_claimed_land_antagonism: "Претендують на наші землі"
  flavor_rus.4.b: "Це зашкодить нашим відносинам."
  flavor_rus.4.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] роздратовані опором"
  flavor_rus.4.c: "Колись ці краї були нашими."
  flavor_rus.4.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] пише настільки переконливо, що мимоволі замислюєшся, кому #TOOLTIP:AREA,white_ruthenia_area,X #L Біла Русь#!#! належить насправді."
  flavor_rus.4.historical_info: "В добу правління Івана Ґрозного кордони Московської країни значно розсунулися на південь і схід, однак на заході, особливо в Лівонії, цар натрапив на запеклий опір. Тривалі війни з Річчю Посполитою та Швецією закінчилися поразками; государ був змушений підписати мирний договір, згідно з яким Росія відмовлялася від усіх своїх придбань на заході. Відносини між двома країнами — Росією та Польщею — були вкрай ворожими. Свого апогею ця ворожнеча досягла в Смутний час, коли польське військо захопило Москву."
  flavor_rus.5.title: "Підкорення степу"
  flavor_rus.5.desc: "Блискуча перемога над кочовими племенами степовиків посунула східний кордон нашої країни одразу на кілька верст, і тепер наше військо стоїть перед #TOOLTIP:AREA,lower_yik_area,X #L Нижнім Йиком#!#!. Немає зараз справи важливішої, ніж підкорення степу; лише поклавши край набігам, ми зможемо спокійно споряджати походи на схід."
  flavor_rus.5.a: "Останній нескорений рубіж."
  flavor_rus.5.b: "Славне пасовище для нашої худоби."
  flavor_rus.5.historical_info: "Одразу після завоювання Астрахані цар Іван Ґрозний направив своє військо в південний степ, де розташовувалася Ногайська Орда. Цей похід став першим кроком на шляху до освоєння козаками Сибіру на кошти купців Строганових. Після завоювання останнього — Сибірського — ханства стало можливим підкорення обширних зауральських земель. На місці козацьких острогів (укріплених поселень) виникали міста; їхній ланцюжок простягнувся до Тихого океану, де в 1645 році був заснований Охотськ."
  flavor_rus.6.title: "Вибрана рада"
  flavor_rus.6.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] занадто владні; їхній вплив перешкоджає зосередженню влади в руках одного государя, а значить — швидкому прийняттю рішень. Втім, вихід є: можна заснувати особливу вибрану раду, яка буде непідвладна впливу бояр. Ми зможемо швидше вирішувати державні питання і навіть проводити різні перетворення. Ймовірно, до ради [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], серед усіх інших, посадить своїх близьких друзів — це [alexi_adashev.GetName] та [sylvestr_the_priest.GetName]."
  flavor_rus.6.a: "Грізна і дієва сила."
  flavor_rus.6.b: "Така рада буде безсила."
  flavor_rus.6.tt3: "[alexi_adashev.GetNameWithNoTooltip] та [sylvestr_the_priest.GetNameWithNoTooltip] будуть заарештовані та страчені; цьому раді [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  enable_chosen_rada_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,chosen_rada_reform,X #L «Вибрана рада»#!#!"
  flavor_rus.6.historical_info: "Вибрана рада — група наближених Івана Ґрозного, яка відіграла значну роль в історії Московської держави в перші роки правління царя. До неї входили, крім інших, такі діячі, як Алєксєй Адашев та духівник Сильвестр — довірені радники великого князя, без яких неможлива була б централізація царської влади, проведення правових реформ та вирішення частини питань, що стояли перед країною."
  flavor_rus.7.title: "Розорення Москви"
  flavor_rus.7.desc: "Наші давні суперники з #ONCLICK:COUNTRY,[moscow_sacker.Custom('CL_tt')] #TOOLTIP:COUNTRY,[moscow_sacker.Custom('CL_tt')],X [moscow_sacker.Custom('CL_GEN')|L]#!#! завдали страшного удару. Вороже військо прорвалося через #TOOLTIP:LOCATION,moscow,X #L московські#!#! ворота, а потім почало палити й грабувати. Палають будинки, гинуть мирні люди, гірко ридають ті, хто вижив. Жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не пам'ятають таких жахливих лих!"
  flavor_rus.7.a: "Надамо допомогу."
  rus_sacked_moscow: "Розорена Москва"
  flavor_rus.7.b: "Скористаємося можливістю і знищимо особистих противників."
  flavor_rus.7.historical_info: "У 1558 році цар Іван Ґрозний, прагнучи вийти до Балтійського моря — важливого маршруту для європейської торгівлі, відправив своє військо на захід. Так почалася війна за панування Росії над Лівонією. Спочатку Росії супроводжував успіх — вона без зусиль розгромила лівонських лицарів, однак об'єднання лівонського союзника — Литви — в унію з Польщею, що послідувало незабаром, призвело до того, що війна затягнулася. Підтримку Польщі надавала Швеція, яка захищала власні інтереси в Естляндії. Скориставшись моментом, кримські татари напали на Астрахань, а в 1571 році здійснили похід на Русь і в результаті спалили Москву. Місто згоріло повністю — з усіх будівель вцілів лише Кремль."
  flavor_rus.8.title: "Годування"
  flavor_rus.8.desc: "Прагнення зміцнити владу над #L [ROOT.GetCountry.GetAdjective|l]ою#! країною зайшло в глухий кут: місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] мають занадто великий вплив. Щоб подолати його, можна встановити такий порядок, за якого цар розпоряджатиметься видачею коштів і провіанту #TOOLTIP:POPTYPE,nobles,X #L боярам#!#!, зберігаючи над ними (так само як і над чиновниками) певну владу та користуючись необхідною підтримкою."
  flavor_rus.8.a: "Повідець не буває занадто коротким."
  flavor_rus.8.b: "Це застарілий і непотрібний порядок."
  flavor_rus.8.historical_info: "Годування — система утримання посадових осіб, що діяла в тому числі в добу правління Івана Ґрозного. Відіграла чималу роль у зосередженні державної влади в руках царя, оскільки бояри, що перебували на годуванні, фінансово залежали від государя, а тому змушені були зберігати йому вірність."
  flavor_rus.9.title: "Незалежність [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ої православної церкви"
  flavor_rus.9.desc: "Падіння #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#! — осередку #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! віри — відкриває нам вкрай сприятливу нагоду. Перед нами два шляхи: виступити за передачу #TOOLTIP:LOCATION,moscow,X #L Москві#!#! влади над православно-християнською церквою, обґрунтувавши це тим, що ми — прямі спадкоємці Царгорода, або відбити колишню столицю великої імперії у #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! іновірців."
  flavor_rus.9.a: "Славне прагнення."
  rus_aspires_to_lead_orthodoxy: "Прагне стати опорою православ'я"
  flavor_rus.9.b: "Нам призначено звільнити Константинополь."
  flavor_rus.9.historical_info: "Незадовго до падіння Візантійської імперії Руська церква здобула незалежність від Константинопольського патріархату. Після того як собор єпископів призначив Іону митрополитом Київським і всієї Русі, Руська церква стала все більше віддалятися від впливу Константинополя і зближуватися з країною."
  flavor_rus.10.title: "Кріпацтво"
  flavor_rus.10.desc: "#ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! терзає #TOOLTIP:DISEASE,bubonic_plague,X #L бубонна чума#!#!. Вимирають цілі села; селяни кидають рідні домівки в надії врятуватися від кари Божої. На полях гниє неприбраний урожай. Якщо залишити все як є, нашій країні загрожує страшний голод."
  flavor_rus.10.a: "Прикріпимо селян до землі."
  flavor_rus.10.tt: "Об'єднавшись, деякі незадоволені змінами громади піднімуть бунт проти господарів-#TOOLTIP:POPTYPE,nobles,X #L аристократів#!#!"
  STATIC_MODIFIER_NAME_unattended_crops: "Залишений урожай"
  flavor_rus.10.b: "Не будемо закріпачувати їх."
  flavor_rus.10.historical_info: "До кінця XVI століття в Московській країні від посухи, голоду та чуми загинуло півмільйона людей. Селяни покидали села, кидаючи господарства. Відповіддю на це стала заборона селянам йти з рідних земель, що належали поміщикам, — тобто закріпачення."
  flavor_rus.11.title: "Стоглавий собор"
  flavor_rus.11.desc: "У 1551 році митрополит Макарій, прагнучи встановити на Русі єдині церковні обряди та правила, скликав духовенство на так званий Стоглавий собор, де, крім усього іншого, зажадав від влади невтручання в церковні справи."
  flavor_rus.11.a: "Підтримаємо ці зміни."
  flavor_rus.11.b: "Заборонимо ці пропозиції."
  flavor_rus.12.title: "[boris_morozov.GetNameWithNoTooltip]"
  flavor_rus.12.desc: "Боярин [boris_morozov.GetName], людина вкрай заможна, але при цьому ощадлива, честолюбна та вміла, а тому може послужити добру службу #L [ROOT.GetCountry.GetAdjective|l]ій#! країні. Питання поповнення скарбниці він напевно вирішуватиме урізанням платні службовців та спрощенням ведення державних справ. При дворі Морозов займатиметься не тільки своїми справами — через нього свої інтереси відстоюватимуть [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]."
  flavor_rus.12.a: "Запросимо його до двору."
  STATIC_MODIFIER_NAME_steamroll_administrator: "Нещадний управлінець"
  flavor_rus.12.tt2: "Вплив Морозова на посаді регента при царі відповідає інтересам бояр"
  flavor_rus.12.tt3: "На посаді [Concept('regent', 'регента')|e] або у складі [Concept('cabinet', 'ради')|e] він може провести додаткові реформи"
  flavor_rus.12.b: "Збідніла чернь не повинна правити [ROOT.GetCountry.Custom('rank_ru_INST')|l]."
  flavor_rus.12.historical_info: "Боріс Морозов — «дядько» та наставник царя Алєксєя Міхайловіча. Поки цар був ще юний, Морозов керував Московським царством, зокрема очолював приказ Великої скарбниці. Щоб до скарбниці надходило більше коштів, Морозов знизив платню служивим людям та встановив нові податки. Високий податок на сіль призвів до так званого Соляного бунту 1648 року, через що боярин був змушений віддалитися до монастиря. Після повернення він залишився при владі та став знову брати участь у справах уряду, вже не привертаючи до себе колишньої уваги."
  flavor_rus.13.title: "Соборне уложення"
  flavor_rus.13.desc: "Існуючі нині уложення, за якими зараз на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! проводиться суд і визначається уклад, давно застаріли; не береться до уваги і влада, якою володіє [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Потрібно скласти нове, більш докладне уложення, засноване на старих [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l] законах і частково — на законах #L [GetCountry('BYZ').GetAdjective|l]#!. Так ми зможемо зміцнити владу государя, налагодити добрі відносини між країною і церквою, а заодно ввести суворі покарання за крадіжку, зраду і заколот."
  flavor_rus.13.a: "Приймемо уложення."
  flavor_rus.13.b: "Нас і так все влаштовує."
  flavor_rus.13.historical_info: "Соборне уложення — звід законів Московського царства, прийнятий Земським собором, зборами представників дворянства. Регламентував судове, кримінальне та цивільне право; деякі укази стосувалися також економічного та суспільного життя. Прийняття Соборного уложення остаточно оформило закріпачення селян."
  flavor_rus.14.title: "Реформи Никона"
  flavor_rus.14.desc: "Богослужіння #TOOLTIP:CULTURE,$greek_culture_tt$,X #L грецької#!#! та #TOOLTIP:CULTUREGROUP,russian_group,X #L руської#!#! церков з часом розійшлися настільки, що єдності зараз немає ні в чому: ні в церковних книгах, ні в обрядах, ні в написанні ікон. Потрібно відновити згоду між двома автокефаліями."
  flavor_rus.14.a: "Настав час оновити церковне життя."
  flavor_rus.14.b: "Підемо за розкольниками."
  flavor_rus.14.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він зможе прискорити проведення релігійних реформ"
  flavor_rus.14.historical_info: "Щоб привести обряди богослужіння в Росії у повну відповідність з грецькими, московський патріарх Никон провів низку реформ, зокрема, наказав переписати богослужбові книги. Однак рішення Никона натрапили на сильний опір, через що патріарх був скинутий і засланий до монастиря. Втім, зупинити реформи було вже неможливо."
  flavor_rus.15.title: "Розкол Руської церкви"
  flavor_rus.15.desc: "Введені патріархом нововведення розкололи #L [ROOT.GetCountry.GetAdjective|l]у#! #TOOLTIP:RELIGION,$orthodox_tt$,X #L православну#!#! церкву: хтось вважає, що подібне рішення назріло вже давно, інші ж стверджують, що Никон зайшов занадто далеко. Тепер нам потрібно вирішити, чи повернути все як було, чи проявити твердість і відданість новому церковному устрою."
  flavor_rus.15.a: "Без цих змін не обійтися."
  flavor_rus.15.tt1: "Енергійний та красномовний [nikita_minin.GetName] проведе сміливі перетворення, чим будуть вкрай незадоволені [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]"
  flavor_rus.15.b: "Підтримаємо старі обряди."
  flavor_rus.15.c: "[nikita_minin.GetNameWithNoTooltip] повинен позбутися влади."
  flavor_rus.15.tt2: "[nikita_minin.GetName] постане перед соборним судом, який позбавить його священного сану"
  flavor_rus.15.historical_info: "Розкол Руської церкви був викликаний реформами патріарха Нікона, які багато сучасників визнали занадто різкими та протилежними православним звичаям. Сформувалися цілі громади так званих старообрядців (вони ж розкольники). Згодом вони розділилися на безліч об'єднань меншого розміру — згод."
  flavor_rus.16.title: "Великі перетворення"
  flavor_rus.16.desc: "У галузі науки сусідні країни давно випередили нас. Все, що нам залишається, — це дивитися, як вони йдуть вперед. Або ми скинемо з себе ярмо старого способу життя і докорінно переломимо суспільство, або програємо тим, хто вміє пристосовуватися."
  flavor_rus.16.a: "Це необхідне зло."
  flavor_rus.16.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть вкрай обурені спробами обмежити вплив духовенства"
  flavor_rus.16.tt2: "Реформи можуть викликати бунт"
  flavor_rus.16.b: "Будемо уникати зовнішнього впливу."
  flavor_rus.16.tt3: "Уроки, отримані під час подорожі Європою, будуть забуті"
  flavor_rus.16.historical_info: "Наприкінці XVII — на початку XVIII ст. цар Пьотр I провів низку реформ з метою перетворити Росію на сучасну європейську країну. Реформи управління та війська (Пьотр прагнув зробити свою країну морською країною, а отже — контролювати Балтійське та Чорне моря) проводилися під наглядом радників із Західної Європи. Однак петровські перетворення наштовхнулися на опір з боку народу, звиклого до звичаєвого способу життя, що вилилося в низку повстань."
  flavor_rus.17.title: "Булавінське повстання"
  flavor_rus.17.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], незадоволені недавніми реформами, підняли повстання — вони хочуть повалити владу і повернути #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! на колишній шлях. Діяти потрібно якомога швидше, інакше всі наші зусилля з перетворення країни на сучасну країну підуть прахом."
  flavor_rus.17.a: "Придушимо повстання."
  flavor_rus.17.b: "Закличемо до розуму."
  flavor_rus.17.tt1: "Своїм умінням воювати [target_root_country.GetGovernment.GetRuler.GetName] залякає кількох ватажків заколотників та обмежить бунтівників"
  flavor_rus.17.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] переконає ватажків заколотників скласти зброю та підтримати перетворення"
  flavor_rus.17.c: "Скасуємо більшість перетворень."
  bulavin_rebellion: "Булавінське повстання"
  flavor_rus.17.historical_info: "У жовтні 1707 року отаман донського козацтва Кіндрат Булавін підняв бунт проти пєтровських реформ. Цей заколот супроводжувався засідками на пєтровських сищиків, посланих повернути селян, що втекли на Дон, та вбивством вояків. Основною причиною повстання стало обмеження Пєтром козацького самоврядування та претензії царя на землі, що належали їм. Відповідно, і бунтували козаки проти Пєтра та його радників, які, як вони вважали, своїми вчинками знищували Росію."
  flavor_rus.18.title: "Посольський прорахунок"
  flavor_rus.18.desc: "Посол у східних країнах [fyodor_baikov.GetName] нещодавно наніс візит на територію #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! з метою встановити добрі та взаємоповажні відносини. На жаль, не звичний до східних порядків посол невірно виконав місцеві обряди, через що виникло помилкове враження, ніби [ROOT.GetCountry.GetGovernment.GetRuler.GetName] визнає верховенство [GetCountry('CHI').Custom('CL_GEN')]. До #L [ROOT.GetCountry.GetAdjective|l]ого#! двору було негайно надіслано вимогу данини. Цю помилку необхідно якнайшвидше виправити, інакше проти нас може ополчитися народ, який згадав дні #TOOLTIP:CULTUREGROUP,tatar_group,X #L татарського#!#! іга."
  flavor_rus.18.a: "Відкинемо їхні вимоги."
  flavor_rus.18.tt1: "Прохолодні відносини між [target_root_country.Custom('CL_INST')] та [GetCountry('CHI').Custom('CL_INST')] тимчасово унеможливлюють дипломатичні зв'язки та спільні дії."
  rus_ignored_vassal_demands: "Відмова від статусу васала"
  flavor_rus.18.b: "Погодимося зі статусом васала, але відмовимося платити."
  rus_paid_vassal_respect: "Висловлено васальську повагу"
  flavor_rus.18.c: "Виплатимо данину."
  rus_paid_vassal_tribute: "Виплачена васальська данина"
  flavor_rus.18.historical_info: "У 1656 році російський посол Федір Байков прибув до Пекіна, щоб встановити дипломатичні відносини з Китаєм. Перед поїздкою цар дав Байкову чітке веління не брати участь у принизливих обрядах, що за китайськими поняттями означало б визнання Московським царством верховенства Китаю. Байков виконав вказівку царя: прибувши до воріт Забороненого міста, він відмовився виконувати «коутоу» — обряд колінопреклоніння перед імператором Цін. Це призвело до ув'язнення посла на кілька місяців, а згодом і до вислання його з Пекіна."
  flavor_rus.19.title: "Повстання Степана Разіна"
  stenka_razin_tt: "Степове [Concept('pops', 'населення')|e] області [rebel_origin.GetName] приймає сторону отамана на ім'я [stenka_razin.GetName]"
  flavor_rus.19.desc: "Через постійний гніт і страшну бідність #TOOLTIP:REGION,steppes_region,X #L степові#!#! козаки з області [rebel_origin.GetName] підняли повстання, прагнучи відстояти козацьку вольницю. Можна або придушити цей бунт силою нашої зброї, або піти на переговори, запропонувавши їм самоврядування."
  flavor_rus.19.a: "Придушимо всіх заколотників."
  flavor_rus.19.b: "Запропонуємо обмежену самостійність."
  flavor_rus.19.c: "Спробуймо звернутися до моралі."
  flavor_rus.19.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] звернуться до ватажків заколотників, які вважають себе захисниками #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! віри, і на цій основі спробують домовитися"
  stenka_razin: "Повстання Степана Разіна"
  stenka_razin_gives_up_tt1: "Кожна належна нам [Concept('location', 'місцевість')|e] у #TOOLTIP:REGION,steppes_region,X #L степовому#!#! [Concept('region', 'регіоні')|e] втрачає [ShowNamedValue('control_ultimate_penalty')|+=2%] [Concept('control', 'контролю')|e]"
  stenka_razin_gives_up_tt2: "Кожна належна нам [Concept('location', 'місцевість')|e] у #TOOLTIP:REGION,steppes_region,X #L степовому#!#! [Concept('region', 'регіоні')|e] втрачає [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'контролю')|e]"
  flavor_rus.19.historical_info: "Степан (Стьонка) Разін — донський отаман, що розбагатів за рахунок неодноразових набігів на перські та російські поселення. У 1670 році він зібрав військо з 7000 козаків і вирушив у похід на Волгу, де захопив Царицин та Астрахань. Захоплення міст супроводжувалися поваленням місцевої влади, встановленням замість неї козацького самоврядування, а також численними злочинами та розгулом козаків. Незабаром Разін захопив Саратов, після чого рушив на Симбірськ. Кінець повстанню в 1671 році поклали царські війська. Отаман потрапив у полон, зазнав тортур і був страчений на Червоній площі."
  flavor_rus.20.title: "Нерчинський договір"
  flavor_rus.20.desc: "Суперечки, хто повинен володіти тими чи іншими землями — #L [ROOT.GetCountry.GetAdjective|l]ий#! народ і його [ROOT.GetCountry.GetFlavorRank|l] або [GetCountry('CHI').GetName], — розгорятимуться тим сильніше, чим далі на схід будуть зсуватися наші кордони. Щоб цього не сталося, слід укласти договір, де будуть стверджуватися наші претензії на #TOOLTIP:REGION,west_siberia_region,X #L Західний#!#! та #TOOLTIP:REGION,east_siberia_region,X #L Східний Сибір#!#!. В обмін ми можемо зробити жест доброї волі та віддати іншій стороні #TOOLTIP:REGION,manchuria_region,X #L Маньчжурію#!#!."
  flavor_rus.20.a: "Це прийнятні умови."
  flavor_rus.20.tt1: "[target_root_country.GetName] так завзято відстоюватиме володіння #TOOLTIP:REGION,west_siberia_region,X #L Західним#!#! та #TOOLTIP:REGION,east_siberia_region,X #L Східним Сибіром#!#!, що інші країни з претензіями на ці регіони сприймуть це як провокацію"
  rus_treaty_of_nerchinsk: "Нерчинський договір"
  rus_claimed_siberia: "Претензії на Сибір"
  flavor_rus.20.b: "Відкинемо цей безглуздий договір."
  rus_refused_treaty_of_nerchinsk: "Нерчинський договір відкинуто"
  flavor_rus.20.historical_info: "Започатковане за Івана Ґрозного підкорення Сибіру завершилося до кінця XVII століття. До цього часу Сибір був освоєний майже повністю: у 1650 році землепроходець Хабаров вивчив басейн річки Амур, у 1679 році козаки дійшли до Камчатки. У 1689 році за підсумками зіткнення Московського царства та імперії Цін був укладений Нерчинський договір, що встановив кордони між двома країнами по Амуру. У 1727 році був підписаний Кяхтинський договір, що дав Росії можливість торгувати з Пекіном — цинською столицею."
  flavor_rus.21.title: "Велика Північна війна"
  flavor_rus.21.desc: "[GetCountry('SWE').GetFlavorRank] [GetCountry('SWE').GetName], що межує з нашою країною, становить для нас можливу загрозу, але зараз важко оцінити, наскільки вона велика. Розумно буде розпочати переговори з країнами, чиї відносини з цією країною залишають бажати кращого, — можливо, разом ми зможемо дати відсіч північному леву."
  flavor_rus.21.a: "Разом ми сильніші."
  rus_political_aggressions: "Політична агресія"
  rus_enemy_of_sweden: "Ворог Швеції"
  flavor_rus.21.b: "Кожен сам за себе."
  flavor_rus.21.historical_info: "Наприкінці XVII століття до числа великих держав долучилася Швеція, яка неодноразово демонструвала свою силу в битвах з прибалтійськими країнами. У 1697 році на престол королівства зійшов 15-річний Карл XII. Вважаючи нового короля слабким противником, цар Пьотр I уклав проти Швеції союз з Данією та Саксонією, проте за допомогою британського та голландського флотів Карл висадився на Зеландії, де розгромив данські сили, після чого рушив на Естляндію і, незважаючи на значну чисельну перевагу противника, завдав рішучої поразки російській армії. Однак переможний похід на Москву так і не відбувся: сувора зима та удари руських військ знекровили шведське військо. Остаточної поразки воно зазнало в 1709 році під Полтавою."
  flavor_rus.22.title: "Повний перегляд управління країною"
  flavor_rus.22.desc: "Стало абсолютно очевидно, що управління #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! вимагає іншого, сучасного підходу. Час позбутися застарілих звичаїв та марних методів. Якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] матиме потужну законодавчу владу, а [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')] укази негайно виконуватимуться єдиною установою, то жодне хабарництво та жодні скарги не зможуть перешкодити перетворенням у країні."
  flavor_rus.22.a: "Це стане новою віхою в історії країни."
  enable_russian_absolutism_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,russian_absolutism,X #L «Абсолютизм»#!#!"
  flavor_rus.22.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у люті від зневаги їхніми правилами та привілеями"
  flavor_rus.22.b: "Старі порядки були кращі!"
  flavor_rus.22.historical_info: "Застарілі середньовічні методи державного управління Пьотр I замінив дієвою автократією: так, у 1711 році він скасував Боярську думу та заснував замість неї Сенат — вищий орган державної влади, що відповідав за управління країною, надходження коштів до казни та складання законів. У Сенаті було встановлено сувору військову дисципліну: за засіданнями наглядали штаб-офіцери гвардії."
  flavor_rus.23.title: "Урядовий нагляд"
  flavor_rus.23.desc: "Вплив патріаршества на нашу країну вкрай великий — воно заважає вводити необхідні нововведення, оскільки чіпко тримається за старі звичаї та свою владу, а тому його слід розпустити та провести такі перетворення, які зміцнять владу країни над церквою і навіть підкорять її."
  flavor_rus.23.a: "Розпустимо патріаршество."
  flavor_rus.23.tt1: "Святійший синод запровадить сувору цензуру на всі видання"
  flavor_rus.23.b: "$common_string_leave_them_be$"
  flavor_rus.23.c: "Цю справу можна вирішити грошима."
  flavor_rus.23.historical_info: "У 1721 році Пьотр I, який прагнув підкорити православну церкву країні, скасував московське патріаршество. Замість нього було засновано Святійший синод — орган церковного управління, схвалений верховною владою. Члени його займалися, крім іншого, переслідуванням інакодумців та цензурою різних творів. Самого царя в Синоді представляв обер-прокурор."
  flavor_rus.24.title: "Академія наук"
  flavor_rus.24.desc: "Жителям #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! необхідно прищеплювати знання та виховувати в них любов до наук, щоб наша країна гідно виглядала серед рівних. Для цього пропонується заснувати в столиці академію наук, де учні будуть штудіювати математику, астрономію, фізику, хімію та багато іншого, а заодно здійснювати нові відкриття."
  flavor_rus.24.a: "Сила наших умів має бути співставна з силою нашого війська."
  flavor_rus.24.tt1: "[vasily_tatishchev.GetName] сприяє заснуванню академії та розвитку #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурга#!#!"
  flavor_rus.24.tt2: "У колекції академії з'являться роботи, автор яких — [james_bruce.GetName]; завдяки цьому вчені отримають нові джерела"
  flavor_rus.24.b: "Переговори — запорука успіху."
  flavor_rus.24.tt3: "Кращі уми #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! будуть вести ґрунтовне листування з іншими європейськими освітніми установами, обмінюватися ідеями та віддадуть перевагу розмовам ворожнечі"
  flavor_rus.24.historical_info: "Повернувшись із Великого посольства (дипломатичної місії в Європу), Пьотр I заснував у Санкт-Петербурзі академію наук. За зразок він взяв Паризьку академію наук, а також Королівське товариство в Лондоні — заклади, також присвячені науковим дослідженням. Імператорська академія наук відіграла важливу роль у розвитку російської наукової та культурної думки."
  flavor_rus.25.title: "Масштабна комісія"
  flavor_rus.25.desc: "Волею народу нерідко доводиться нехтувати, а уложення наше настільки застаріло, що гарантувати простій людині дотримання її прав неможливо, оскільки достатньо лише одного указу, щоб позбавити її цих прав. Необхідно скликати комісію, яка складе нове уложення. Займатися цим будуть і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] — кожен представить нам свій погляд і внесе свій внесок, повідомивши нам про потреби кожного шару суспільства."
  flavor_rus.25.a: "Закриємо очі на суспільну несправедливість."
  flavor_rus.25.b: "Будемо шукати компроміс, навіть якщо не досягнемо успіху."
  flavor_rus.25.tt1: "Завдяки своїй чарівності та широті поглядів [target_root_country.GetGovernment.GetRuler.GetName] викличе у підданих почуття спільності та рівності, хоча не доб'ється значущих змін"
  flavor_rus.25.historical_info: "У 1767 році імператриця Єкатєріна II скликала Уложену комісію, куди входили представники всіх станів (за винятком кріпаків). Перед комісією стояло завдання скласти новий звід законів з урахуванням побажань усіх представників. Багатомісячні обговорення закінчилися нічим — не допоміг навіть складений Єкатєріною для комісії наказ, у якому імператриця представила свої погляди на законодавство Росії. Цей документ, занадто сміливий навіть для Франції, так і залишився незатребуваним."
  flavor_rus.26.title: "Державний контроль над торгівлею"
  flavor_rus.26.desc: "Перед нами стоїть одразу кілька важливих завдань: перебудувати економіку на сучасний лад, зміцнити державну владу, а водночас — зміцнити фінансове становище, підтримати промисловість країни та наростити експорт. Для цього потрібно провести низку реформ — тільки так ми виведемо #ONCLICK:COUNTRY,[XXX.Custom('CL_tt')] #TOOLTIP:COUNTRY,[XXX.Custom('CL_tt')],X [XXX.Custom('CL_ACC')|L]#!#! на шлях економічного процвітання та самодостатності."
  flavor_rus.26.a: "Так, без перетворень не обійтися."
  state_promoted_mercantilism_key: "Меркантилізм за підтримки країни"
  flavor_rus.26.b: "Проголосимо вільну торгівлю."
  flavor_rus.26.historical_info: "Поступове зосередження влади в руках дворянства до кінця XVIII століття призвело до встановлення в Росії політики меркантилізму. Такий порядок суперечив усталеним засадам та інтересам, а тому викликав відторгнення з боку різних груп, які сприймали його як загрозу своєму становищу та впливу."
  flavor_rus.27.title: "Повстання Пугачова"
  flavor_rus.27.desc: "Загальне невдоволення тяготами, які змушені терпіти [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], та незгода з проведенням реформ, необхідних для розвитку економіки, призвело до повстання на #TOOLTIP:REGION,ural_region,X #L Уралі#!#!. Очолює бунтівників вольовий козак [yemelyan_pugatchev.GetName]. Він обіцяє скасувати кріпосне право, зменшити податки та покласти край перетворенням в управлінні країною."
  flavor_rus.27.a: "Народ ремствує."
  pugatchev_uprising: "Повстання Пугачова"
  pugatchev_uprising_tt: "[pugatchev_uprising.GetName] приваблює багатьох [Concept('pops', 'жителів')|e] #TOOLTIP:REGION,ural_region,X #L Уралу#!#!"
  flavor_rus.27.tt1: "Через невдоволення #TOOLTIP:POPTYPE,peasants,X #L селян#!#! повстання почне поширюватися по #TOOLTIP:REGION,russian_region,X #L Росії#!#!"
  flavor_rus.27.b: "Підемо на серйозні поступки."
  flavor_rus.27.historical_info: "У 1773 році козак Омелян Пугачов, який оголосив себе імператором Пєтром III — убитим чоловіком Єкатєріни II, підняв на Уралі повстання. До Пугачова приєдналися інші втікачі-козаки, і взимку 1773/74 року козацьке військо захопило значну частину Поволжя. Під загрозою опинилася навіть Москва, а з нею — і вся російська державність. Однак цим планам не судилося збутися: регулярні війська під командуванням Суворова полонили Пугачова під Царициним. Незабаром бунтівника привезли до Москви та стратили."
  flavor_rus.28.title: "Реакційна політика"
  flavor_rus.28.desc: "Після нещодавнього повстання стало зрозуміло, що до державних справ слід підходити обережніше. Можливо, варто вчинити так: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отримають частину привілеїв, що їм колись належали, а натомість підтримуватимуть порядок. Ми ж намагатимемося акуратніше проводити економічні перетворення, щоб зміни були не такими різкими."
  flavor_rus.28.a: "Пожалуємо дворянству грамоту."
  flavor_rus.28.b: "Дозволимо деякі свободи."
  flavor_rus.28.historical_info: "Повстання Пугачова змусило Єкатєріну II переглянути свої погляди на кріпацтво. Спочатку імператриця збиралася звільнити селян, проте згодом усвідомила, що такий вчинок налаштує проти неї впливових поміщиків — головну опору її влади. У підсумку за Єкатєріни кріпацтво лише посилилося — так, імператриця закріпачила вільних раніше жителів України, а також почала роздавати своїм прихильникам державні землі. До кінця її царювання в Росії, всупереч початковим намірам Єкатєріни, майже не залишилося вільних селян."
  flavor_rus.29.title: "Відносно вільні закони"
  flavor_rus.29.desc: "Суспільний порядок #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! значною мірою побудований на прикріпленні #TOOLTIP:POPTYPE,peasants,X #L селян#!#! до землі та обмеженні їх свободи пересування. Однак останнім часом лунають заклики до менш жорстокого підходу, поступового зниження залежності економіки від кріпацтва та скасування найжорсткіших його складових — зрозуміло, без загрози для звичного нам самодержавства."
  flavor_rus.29.a: "Обмежимо кріпацтво."
  flavor_rus.29.tt1: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] поводитиметься обережно, а тому розворот у бік звільнення #TOOLTIP:POPTYPE,peasants,X #L селян#!#! відбудеться поступово"
  flavor_rus.29.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] у люті від того, що нижчим верствам суспільства дозволена певна свобода"
  flavor_rus.29.b: "Нас і так усе влаштовує."
  flavor_rus.29.historical_info: "Імператор Павєл I виявив більше турботи про селян, ніж його попередниця Єкатєріна: він знову заснував централізовані органи управління, обмежив свавілля місцевих чиновників та владу дворянства. На відміну від Єкатєріни, за якої кріпосне право лише зміцнилося, Павєл першим із правителів Росії всерйоз задумався про долі простого народу."
  flavor_rus.30.title: "Наближаються зміни"
  flavor_rus.30.desc: "[mikhail_speransky.GetName] — людина сучасних поглядів. [Select_CString(mikhail_speransky.IsFemale, 'Вона', 'Він' )] усіма силами прагне впровадити в країні новий конституційний лад, заради чого днями й ночами засідає в раді. Тож нехай вітер змін наповнить наші вітрила, а компас лібералізму вкаже нам шлях!"
  flavor_rus.30.a: "Тримати за вітром!"
  enable_speransky_liberalization_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,speransky_liberalization_reform,X #L «Ліберальні реформи Сперанського»#!#!"
  flavor_rus.30.tt1: "На території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! впроваджуються сучасні методи управління, чому протистоять [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]"
  flavor_rus.30.b: "Це провокаційно й небезпечно."
  flavor_rus.30.historical_info: "В добу реформатора Алєксандра I відбулися значні зміни: так, у 1802 році було засновано вісім міністерств, що прийшли на зміну застарілим і неповоротким колегіям. Чималий вплив на діяльність імператора мав Михайло Сперанський — головний радник Алєксандра та прихильник модернізації."
  flavor_rus.31.title: "Аньяльський союз"
  flavor_rus.31.desc: "Група фінських вояків, якими керує виходець із #L [GetCountry('SWE').GetAdjective|l]ої#! знаті [johan_jagerhorn.GetNameWithNoTooltip], надіслала нам депешу, в якій оголосила нинішню війну незаконною та попросила нас допомогти їм заснувати незалежну країну — #ONCLICK:COUNTRY,[GetCountry('FIN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FIN').Custom('CL_tt')],X [GetCountry('FIN').Custom('CL_ACC')|L]#!#!. Можливо, вона стане бар'єром, що відділяє нас від ворогів, а заодно — плацдармом для наступних вторгнень на [GetCountry('SWE').GetAdjectiveWithNoTooltip|l]у територію."
  flavor_rus.31.a: "Надамо їм підтримку."
  flavor_rus.31.a.custom: "Усі [ShowPopTypeName('peasants')|l] у #TOOLTIP:AREA,finland_area,X #L Фінляндії#!#! втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e] та вступають до групи «[anjala_conspirators.GetName]»"
  anjala_conspirators: "Аньяльські змовники"
  flavor_rus.31.b: "Відхилимо їхні прохання."
  rus_rejected_anjala_league: "Аньяльський союз отримав відмову"
  flavor_rus.31.tt1: "Послідовники Єгергорна навряд чи зможуть зібрати достатньо прихильників, щоб влаштувати переворот"
  flavor_rus.31.historical_info: "Аньяльський союз — група шведських офіцерів і політиків, незадоволених війною проти Росії. Змовники хотіли підписати з Росією сепаратний мир, оскільки вважали, що ця війна закінчиться для Швеції великими втратами. Аньяльський союз сильно вплинув на шведську політику: переговорники не брали участі в мирних процесах, проте своїми діями зуміли привернути увагу до невдоволення шведів діями короля."
  flavor_rus.32.title: "[michailo_shcherbatov.GetNameWithNoTooltip]"
  flavor_rus.32.desc: "Інтелектуальний діяч консервативних поглядів [michailo_shcherbatov.GetName] у своїх статтях і замітках неодноразово торкається культурних, суспільних і політичних питань, а також критикує вплив ідей Просвітництва на #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!. Щербатов щиро стурбований занепадом моралі та громадського порядку під впливом західноєвропейських віянь, а тому, якщо ми захочемо повернутися до колишніх цінностей, він може принести нам користь."
  flavor_rus.32.a: "Запросимо його до двору."
  flavor_rus.32.tt2: "Його праці серйозно вплинуть на #L [target_root_country.GetAdjective|l]е#! суспільство та схилять його до консерватизму"
  flavor_rus.32.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть дуже раді, що [michailo_shcherbatov.GetNameWithNoTooltip] користується великим впливом, оскільки його погляди близькі до [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!."
  STATIC_MODIFIER_NAME_literary_moralist: "Моральний літератор"
  flavor_rus.32.b: "Наші погляди розходяться."
  flavor_rus.32.historical_info: "Михайло Щербатов — видатний російський державний діяч, історик і мислитель XVIII століття. У 1768 році увійшов до складу Комісії про комерцію, у 1778 році призначений президентом Камер-колегії, через рік — сенатором у Правительствуючий сенат. Бувши консерватором, активно критикував російське Просвітництво та запам'ятався, зокрема, як автор кількох творів, де засуджував занепад моралі."
  flavor_rus.33.title: "[vasily_tatishchev.GetNameWithNoTooltip]"
  flavor_rus.33.desc: "Просвічений перетворювач та історик [vasily_tatishchev.GetName] швидко зробив кар'єру в війську, а потім обійняв керівну посаду в державній установі, після чого попросив дати йому дозвіл звільнитися зі служби, щоб зайнятися письменницькою справою. Над цим проханням слід подумати, адже на своїй поточній посаді він ще може нам гідно послужити."
  flavor_rus.33.a: "Підтримаємо його прагнення."
  flavor_rus.33.b: "Нехай і далі служить нам радником."
  flavor_rus.33.c: "Геть з наших очей!"
  STATIC_MODIFIER_NAME_exiled: "У вигнанні"
  flavor_rus.33.tt2: "[vasily_tatishchev.GetName] позбудеться посади та відправиться у довічне заслання на територію #TOOLTIP:REGION,east_siberia_region,X #L Східного Сибіру#!#!; ймовірність, що [Select_CString(vasily_tatishchev.IsFemale, 'вона', 'він' )] напише якусь літературну працю, знизиться"
  flavor_rus.33.historical_info: "Василь Татищев — російський державний діяч та етнолог, випускник Московської артилерійської та інженерної школи. Учасник Великої Північної війни зі Швецією. Служив у петровській Колегії закордонних справ, посприяв сходженню на престол Анни Іоаннівни, пішовши проти волі Верховної таємної ради. Написав кілька історичних праць, зокрема першу в Росії періодизацію історії країни."
  flavor_rus.34.title: "[mikhail_lomonosov.GetNameWithNoTooltip]"
  flavor_rus.34.desc: "Видатний учений та прихильник самодержавства [mikhail_lomonosov.GetName] надзвичайно талановитий у всьому, що стосується науки, філософії, різних гуманітарних та природничих наук, однак через своє скромне походження не може здобути вищу освіту. Ми можемо посприяти зарахуванню його до #TOOLTIP:LOCATION,moscow,X #L московської#!#! Слов'яно-греко-латинської академії в розрахунку, що через кілька років витрати на це виправдаються. Заодно ми, можливо, доб'ємося нових відкриттів у якійсь цікавій для нас галузі."
  flavor_rus.34.a: "Справжній діяч науки та просвіти."
  flavor_rus.34.b: "Прихильник реформ у галузі освіти."
  flavor_rus.34.tt2: "[mikhail_lomonosov.GetNameWithNoTooltip] приділятиме весь час розвитку #L [target_root_country.GetAdjective|l]ої#! культури та освіти."
  enable_imperatorskiy_moskovskiy_universitet_advance: "Відкриває [Concept('advance', 'поступ')|e] #TOOLTIP:ADVANCE_DEFINITION,imperatorskiy_moskovskiy_universitet,X #L «Імператорський Московський університет»#!#!"
  flavor_rus.34.tt3: "[mikhail_lomonosov.GetNameWithNoTooltip] допоможе заснувати Імператорський Московський університет"
  flavor_rus.34.c: "Авторитаризму в нас не місце."
  flavor_rus.34.historical_info: "Михайло Ломоносов — російський учений та інтелектуал, у 19 років вступив до московської Слов'яно-греко-латинської академії, прикинувшись сином священника. Також навчався в університеті при Петербурзькій академії наук та в Марбурзькому університеті під керівництвом німецького філософа Христіана фон Вольфа. Зробив значний внесок у розвиток багатьох наукових галузей; крім усього іншого, відкрив наявність атмосфери у Венери."
  flavor_rus.35.title: "Неприборканий безумець"
  flavor_rus.35.desc: "Після раптової смерті дружини [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'впала', 'впав')] у страшну скорботу, не в силах змиритися з думкою, що [first_spouse.GetName] пішла назавжди. Поведінка [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')] на очах у бояр стала божевільною та жорстокою; дійшло навіть до видання указу про те, що #TOOLTIP:GOVERNMENT_REFORM,chosen_rada_reform,X #L Вибрану раду#!#! належить негайно розпустити. Невже немає кінця цьому безумству?.."
  flavor_rus.35.a: "Ну, якщо вже так велено…"
  flavor_rus.35.tt1: "Радники пропадатимуть без вісти"
  flavor_rus.35.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'має бути замкнена', 'має бути замкнений')] у вежі."
  flavor_rus.35.historical_info: "Після смерті дружини Івана Ґрозного Анастасії цар звинуватив членів Вибраної ради в отруєнні цариці. Звинувачені бояри опинилися у засланні, після чого стримувати жорстокість Івана стало нікому."
  flavor_rus.36.title: "Грошова палата"
  flavor_rus.36.desc: "Влада над країною та її службовцями вже в наших руках. Тепер час провести в економіці перетворення, які забезпечать приплив до скарбниці таких необхідних коштів. Допомогти цьому може грошова палата, з якою тісно буде пов'язана #TOOLTIP:GOVERNMENT_REFORM,oprichnina,X #L опричнина#!#! — її службовці стежитимуть за цінами та торгівлею, а також дбатимуть про стійкість нашої економіки."
  flavor_rus.36.a: "Зайвих грошей не буває."
  flavor_rus.36.b: "Залізний кулак не гірший за палату."
  flavor_rus.36.historical_info: "За Івана Ґрозного в Росії були проведені значні реформи — наприклад, була заснована окрема палата, що завідувала грошима та перебувала в безпосередньому розпорядженні царя, завдяки чому дещо зменшилися витрати та зросли доходи. З її допомогою також здійснювалася опричнина та вівся нагляд за скарбницею."
  flavor_rus.37.title: "Земля-годувальниця"
  flavor_rus.37.desc: "Чим ширше поширюється наша влада, тим складніше стає керувати новими землями. Зараз цим займається місцева #TOOLTIP:POPTYPE,nobles,X #L знать#!#!, однак її утримання обтяжує державну казну. Якщо дозволити їм жити за рахунок землі та належних їм #TOOLTIP:POPTYPE,peasants,X #L селян#!#!, то витрати зменшаться, а ми зможемо приділити увагу важливішим питанням."
  flavor_rus.37.a: "Ситість — запорука задоволення."
  flavor_rus.37.b: "Подбаємо про їхні потреби."
  flavor_rus.37.historical_info: "Колись посадових осіб на Русі було прийнято утримувати за допомогою так званого годування, за яке відповідали місцеві жителі. Селянам не завжди вдавалося надавати все необхідне вчасно, що змушувало їх платити натурою. Згодом Іван Ґрозний скасував цю систему в ході адміністративних перетворень."
  flavor_rus.38.title: "[boris_morozov.GetNameWithNoTooltip] та його аскеза"
  flavor_rus.38.desc: "[boris_morozov.GetName], відповідальний за поповнення нашої казни, готується звільнити частину службовців та скоротити їхню платню, щоб зменшити витрати та непомірно розрослий уряд. Можливо, після цього керувати #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! стане складніше, а також постраждає наше військо, оскільки всі служиві люди стануть отримувати менше."
  flavor_rus.38.a: "Іноді потрібні жертви."
  STATIC_MODIFIER_NAME_reduced_government_expenses: "Зменшені урядові витрати"
  flavor_rus.38.b: "Нехай відповідальність візьмуть на себе аристократи."
  flavor_rus.38.tt1: "Свобода дій Морозова буде обмежена, оскільки державна влада слабшає"
  flavor_rus.38.historical_info: "Боріс Морозов був твердо налаштований виправити те плачевне становище, в якому опинилася казна Московського царства. Для цього він підвищив деякі податки, що в підсумку призвело до сумнозвісного Соляного бунту 1648 року, а також скоротив кількість державних службовців."
  flavor_rus.39.title: "Хибно зрозумілий посол"
  flavor_rus.39.desc: "[fyodor_baikov.GetName] — досвідчений посол, який неодноразово потрапляв на прийом до сановників з далеких країн. Він повернувся з довгої подорожі і незабаром знову приступить до своїх обов'язків. Пізнання Байкова підуть на користь нашій країні: він допоможе нам укладати вигідні договори, налагоджувати відносини з іншими країнами, а також відстоювати свої інтереси."
  flavor_rus.39.a: "Запросимо його до двору."
  flavor_rus.39.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він зможе виконувати важливі дипломатичні доручення"
  flavor_rus.39.b: "Його чекає канцелярська робота."
  flavor_rus.39.tt3: "Йому буде доручено дописувати звіти послів про попередні поїздки, завдяки чому розширяться пізнання про двори інших країн"
  flavor_rus.39.c: "У нього трапляються обмовки."
  flavor_rus.39.historical_info: "Фьодор Байков — перший російський посол у Китаї. Намагався укласти торговельну угоду між двома країнами та владнати можливі територіальні суперечки, спричинені освоєнням Росією територій на сході."
  flavor_rus.40.title: "«Історія Російська»"
  flavor_rus.40.desc: "Письменник, що відійшов від справ, справжній син своєї вітчизни, [vasily_tatishchev.GetName] склав докладну історію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, де не тільки описав наші блискучі перемоги та діяння великих государів, а й докладно роз'яснив, чим корисне #TOOLTIP:GOVERNMENT_REFORM,autocracy,X #L самодержавство#!#!. Цей труд необхідно негайно видати, щоб кожен зміг з ним ознайомитися, заглибитися в історію рідної країни та усвідомити переваги нашої державності."
  flavor_rus.40.a: "Опублікуємо його."
  flavor_rus.40.b: "Опублікуємо лише ті глави, де описується самодержавство."
  flavor_rus.40.c: "Марна трата чорнила."
  flavor_rus.40.historical_info: "Пішовши у відставку, Татищев присвятив весь свій час науковим дослідженням. Крім докладного опису російської історії, він залишив після себе так звані татищевські звістки — промови князів і бояр. Своїм читачам Татищев намагався вселити думку, що самодержавство — найкращий устрій для російської країни."
  flavor_rus.41.title: "Російсько-американська компанія"
  flavor_rus.41.desc: "Перші розвідувальні походи на #TOOLTIP:REGION,alaska_region,X #L Аляску#!#! показали, що в цих краях рясно водяться калани. Їх #TOOLTIP:GOODS,fur,X #L хутро#!#! — вкрай цінний товар, а тому було висунуто пропозицію заснувати з дозволу государя торговельну компанію, щоб уберегти наш промисел від чужоземного впливу. Ми торгуватимемо з місцевими племенами, для чого потрібно буде побудувати кілька #TOOLTIP:BUILDING_TYPE,overseas_trading_post,X #L заморських факторій#!#! — так наші претензії на ці землі стануть вагомішими, а промисел — обширнішим."
  flavor_rus.41.a: "Видамо указ."
  flavor_rus.41.b: "Витрати надто обурливі."
  flavor_rus.41.historical_info: "Російсько-американська компанія, вона ж РАК, — це торговельна компанія, що діяла в Північній Америці. На Алясці рясно водилися калани — джерело цінного хутра, що користувалося постійним попитом, — а тому деякі підприємливі дослідники визнали вигідним заснувати тут поселення, де можна було б вести торгівлю хутром і займатися хутровим промислом. У середині XVIII століття компанія була змушена припинити свою діяльність через надмірний видобуток звіра та зміну ринкових умов."
  flavor_rus.42.title: "Вільне економічне товариство"
  flavor_rus.42.desc_common1: "Наше суспільство все так же ґрунтується на землеробстві, проте #TOOLTIP:POPTYPE,peasants,X #L селянські#!#! способи обробітку землі та ведення сільського господарства безнадійно застаріли — інші країни обходять нас за обсягами врожаю."
  flavor_rus.42.desc_orlov: "$flavor_rus.42.desc_common1$ За скромну суму граф [grigory_orlov.GetName] готовий заснувати економічне товариство, яке займатиметься розвитком землеробства та торгівлі; головувати в ньому буде він сам. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_ruler: "$flavor_rus.42.desc_common1$ [Select_CString(target_character.IsFemale,'Наша освічена государиня', 'Наш освічений государ')] [target_character.GetName] [Select_CString(target_character.IsFemale,'запропонувала', 'запропонував')] виділити кошти на заснування економічного товариства, яке займатиметься розвитком землеробства та торгівлі. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_both: "$flavor_rus.42.desc_common1$ Граф [grigory_orlov.GetName] запропонував заснувати економічне товариство, яке займатиметься розвитком землеробства та торгівлі; головувати в ньому буде він сам. [Select_CString(target_character.IsFemale,'Наша освічена государиня', 'Наш освічений государ')] [target_character.GetName] [Select_CString(target_character.IsFemale,'готова', 'готовий')] виділити кошти на це починання. $flavor_rus.42.desc_common2$"
  flavor_rus.42.desc_common2: "\n\nУ разі успіху товариству також слід доручити освіту землеробів та працівників — за допомогою практичного навчання та ознайомлення з різними часописами та статтями."
  flavor_rus.42.a: "Без харчів життя неможливе."
  STATIC_MODIFIER_NAME_potato_varieties_introduced: "Впроваджено нові види картоплі"
  flavor_rus.42.tt1: "Товариство впровадить нові види #TOOLTIP:GOODS,potato,X #L картоплі#!#! та проривні способи землеробства, чим допоможе збільшити врожаї"
  flavor_rus.42.b: "Наш шлях буде іншим."
  flavor_rus.42.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будуть раді всьому, що допоможе їм зберегти владу над #TOOLTIP:POPTYPE,peasants,X #L селянами#!#!"
  flavor_rus.42.historical_info: "Вільне економічне товариство — наукове товариство, засноване Ґріґорієм Орловим за підтримки імператриці Єкатєріни II, яка добре розуміла, що методи землеробства в Росії значно застаріли, а країна відстала від інших великих держав, особливо Великої Британії. Товариство випускало посібники з нових методів ведення сільського господарства, допомагало вирощувати в Росії нові культури та займалося освітою землеробів, щоб ті виробляли більше врожаю."
  flavor_rus.43.title: "[grigory_orlov.GetNameWithNoTooltip]"
  flavor_rus.43.desc_empress: "Цього відважного офіцера та багатого землевласника [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'помітила сама', 'помітив сам')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] і [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'запросила', 'запросив')] його до себе на службу. $flavor_rus.43.desc_common$"
  flavor_rus.43.desc_artillery_yard: "Досвідчений офіцер і багатий землевласник, що служить при #TOOLTIP:BUILDING_TYPE,moscow_artillery_yard,X #L Московському гарматному дворі#!#!, зацікавив вищі чини, і йому було запропоновано взяти на себе нові завдання. $flavor_rus.43.desc_common$"
  flavor_rus.43.desc_common: "[grigory_orlov.GetName] раніше вже зарекомендував себе як людина, що однаково добре розбирається і в методах ведення війни на морі, і в державних справах, а тому йому знайдеться застосування як на флоті, так і в раді."
  flavor_rus.43.a: "Він природжений бюрократ."
  flavor_rus.43.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він зможе сам висунути деякі програми"
  flavor_rus.43.b: "Його чекає море."
  flavor_rus.43.c: "Не такий вже він і відважний."
  flavor_rus.43.historical_info: "Ґріґорій Орлов — фаворит і коханець Єкатєріни II. Організував змову, в результаті якої чоловік Єкатєріни був скинутий з престолу на користь нової імператриці. Покровительствував мистецтву та освіті, збирав картини всесвітньо відомих художників, намагався покращити життя кріпаків, зокрема перейнявся питанням освіти селян."
  flavor_rus.44.title: "Гатчинська пишнота"
  flavor_rus.44.desc: "[grigory_orlov.GetName] знову виявив властиву йому щедрість і доручив архітектору-початківцю спроєктувати величний палац у місцевості #TOOLTIP:LOCATION,neva,X #L Неви#!#!. Граф хоче, щоб у цій споруді поєднувалося відразу кілька архітектурних стилів — від середньовічного до неокласичного, що нині входить у моду, з великими куполами та вежами. Завдяки цьому не тільки буде підкреслено пишноту #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')]#!#! [target_location.GetName], а й граф потішить своє честолюбство, милуючись чудовим палацом. Тут же він зможе приймати #TOOLTIP:POPTYPE,nobles,X #L дворян#!#! — місця вистачить усім."
  flavor_rus.44.a: "Скромний будиночок у селі."
  rus_gatchina_palace_construction: "Будівництво Великого Гатчинського палацу"
  flavor_rus.44.b: "Нам поки вистачає пишних палаців."
  flavor_rus.44.c: "Краще витратимо ці гроші на благодійність."
  flavor_rus.44.historical_info: "Великий Гатчинський палац — основна резиденція Ґріґорія Орлова, свого часу — найвпливовішої людини в Росії та фаворита імператриці Єкатєріни II. Після смерті графа, який не встиг довго пожити у своїй резиденції, палац швидко облюбували аристократи. Він цікавий своїм архітектурним стилем, що поєднує елементи класичної та готичної архітектури, а також риси доби Відродження."
  flavor_rus.45.title: "«Про пошкодження моралі в Росії»"
  flavor_rus.45.desc: "Противник просвітництва [michailo_shcherbatov.GetName] випустив викривальний памфлет, у якому засуджує вплив на країну західних ідей, що шкодять російському суспільству. Щербатов стверджує, що відбувається підрив звичних моральних засад, і виступає за повернення до колишніх цінностей, тобто до такого укладу, де сильна центральна влада тримає суворий порядок і пригнічує будь-який індивідуалізм. Незабаром ця праця буде випущена в друк — якщо, звісно, проти неї не виступлять обурені."
  flavor_rus.45.a: "Засуджувати його небезпечно: може здійнятися переполох."
  flavor_rus.45.tt1: "У #TOOLTIP:WORK_OF_ART_TYPE,treatise,X #L трактаті#!#! буде підтримано посилення впливу церкви на суспільство, чому раді [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]"
  flavor_rus.45.b: "Завадимо виданню."
  flavor_rus.45.historical_info: "#italic  «Про пошкодження моралі в Росії»#! — памфлет Міхаіла Щєрбатова, одного з головних російських консервативних мислителів XVIII століття. У своєму творі Щєрбатов закликає відродити прадавні російські цінності, наголошує на важливості для країни православ'я, самодержавства та соціальної ієрархії. Справив досить сильний вплив на суспільні настрої та на нові покоління мислителів-консерваторів."
  flavor_rus.46.title: "Ідеологічні правки в «Московських відомостях»"
  flavor_rus.46.desc: "Газета #italic «Московські відомості»#!, що належить #TOOLTIP:LOCATION,moscow,X #L Московському#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!, випускається скромними накладами, проте користується певною популярністю, оскільки це єдине видання, що справно постачає своїм читачам новини про те, що відбувається і на місцях, і у світі. Незабаром у газеті має змінитися редактор. Кожен із двох кандидатів на цю посаду сприймає світ по-своєму, а тому й повідомлення в газеті матимуть певну спрямованість."
  flavor_rus.46.a: "Надамо перевагу консерватору."
  flavor_rus.46.b: "Надамо перевагу лібералу."
  flavor_rus.46.tt1: "Газета почне випускати сатиричні замітки, що висміюють суспільні звичаї; це може призвести до певних наслідків"
  flavor_rus.46.historical_info: "#italic  «Московські відомості»#! — найбільша в Росії XVIII–XIX століть газета, щотижня друкувала новини, зведення та коментарі про події в Москві та у світі, завдяки чому відіграла важливу роль у просвіті населення. Видавалася Московським університетом і після Жовтневої революції була закрита більшовиками."
  flavor_rus.47.title: "[mikhail_speransky.GetNameWithNoTooltip]"
  flavor_rus.47.desc: "Інтелектуал і реформатор [mikhail_speransky.GetName] під час свого перебування #TOOLTIP:BUILDING_TYPE,university,X #L університетським#!#! викладачем у місті [university_location.GetName] став прихильником лібералізму і тепер хоче впровадити ці ідеї в управління #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!. Треба підібрати йому відповідну посаду, щоб він своїми перетвореннями посприяв настанню в країні нової доби."
  flavor_rus.47.a: "Він уміє впливати на уми."
  flavor_rus.47.tt2: "Він отримає посаду почесного члена #TOOLTIP:BUILDING_TYPE,academy_of_sciences,X #L Академії наук#!#!, обзаведеться новими знаннями та зміцнить свій вплив"
  flavor_rus.47.tt3: "Він вступить до #TOOLTIP:BUILDING_TYPE,free_economic_society,X #L Вільного економічного товариства#!#!, розширюючи свої професійні пізнання"
  flavor_rus.47.b: "Він спричинить розруху."
  flavor_rus.47.tt4: "[mikhail_speransky.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_rus.47.historical_info: "Міхаіл Спєранскій — державний діяч і реформатор доби правління Алєксандра I. Допомагав імператору проводити реформи, націлені на створення сучасної та централізованої системи управління, яка б обмежувала вплив дворянства та дозволяла ефективніше керувати країною. Втілювалася вона переважно у вигляді указів, що забезпечувало одноманітність правових норм. Реформи Спєранського викликали серйозне невдоволення, і реформатор потрапив в опалу, проте ідеї його не залишилися без уваги з боку наступних правителів."
  flavor_rus.48.title: "Просвічений узурпатор"
  flavor_rus.48.desc: "Заможна #L [target_culture.GetName|lа]#! родина вважає, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'повинна', 'повинен')] одружитися, щоб наші країни були пов'язані близькими стосунками, а високошановане ім'я [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] не розчинилося у віках. [sophie_of_anhalt_zerbst.GetName] добре освічена та доброчесна, вона цінує просвічені бесіди, але при цьому цікавиться чоловічими забавами і навіть навчилася битися на мечах. Втім, напористий норов не завадить їй стати добропорядною дружиною, дотримуватися своїх зобов'язань та віддавати належне звичаям."
  flavor_rus.48.a: "Схвалимо шлюбну пропозицію."
  flavor_rus.48.b: "Дамі не личить так поводитися."
  flavor_rus.48.historical_info: "Софія Ангальт-Цербстська, вона ж Єкатєріна II або Єкатєріна Вєлікая, — німецька принцеса, дружина російського імператора Пєтра III. Свого чоловіка, який відвернув від себе значну частину дворянства, вважала слабоумним і непридатним до правління, а тому за допомогою імператорських радників влаштувала палацовий переворот і сама зайняла престол. Доба правління Єкатєріни ознаменувалася утвердженням у країні просвітництва та розвитком науки й культури, завдяки чому Росія міцно увійшла до числа великих європейських країн."
  flavor_rus.49.title: "Палацовий переворот"
  flavor_rus.49.desc: "Нездатність [Select_CString(target_ruler.IsFemale, 'правительки', 'правителя')] об'єднати країну та гідно очолити її змушує серйозно замислитися: а чи [Select_CString(target_ruler.IsFemale, 'придатна', 'придатний')] [target_ruler.GetName] до правління? [Select_CString(target_ruler.IsFemale, 'Її', 'Його')] дружина [sophie_of_anhalt_zerbst.GetName] та член ради [coup_leader.GetName] задумали здійснити переворот і зайняти престол самостійно. Швидше за все, вони досягнуть задуманого, якщо не завадити їм силою — заплативши за це чималу ціну."
  flavor_rus.49.a: "Не будемо заважати мирному розвитку подій."
  flavor_rus.49.tt1: "[target_ruler.GetNameWithNoTooltip] оголошується [Select_CString(target_ruler.IsFemale, 'непридатною', 'непридатним')] до правління та поміщається під варту"
  flavor_rus.49.b: "Позбавимо [Select_CString(target_ruler.IsFemale, 'її', 'його')] життя."
  flavor_rus.49.c: "Стратимо змовників."
  flavor_rus.49.tt2: "[target_root_country.GetGovernment.GetRulerTitle] тепер буде під охороною найманців"
  flavor_rus.49.tt3: "[sophie_of_anhalt_zerbst.GetNameWithNoTooltip] буде змушена діяти в обмежених обставинах"
  flavor_rus.49.historical_info: "Ґрунтом для палацового перевороту, в результаті якого був скинутий імператор Пьотр III — чоловік Єкатєріни, послужили зростаюче невдоволення самим імператором, його ексцентрична поведінка, непопулярні серед офіцерів рішення та політика, що викликала обурення народу. Побоюючись за своє благополуччя, Єкатєріна була змушена піти на рішучий крок."
  flavor_rus.50.title: "Імператорська академія мистецтв"
  flavor_rus.50.desc: "Сміливий діяч [ivan_shuvalov.GetName] твердо має намір довести розпочату ним реформу освіти до кінця. Чималу важливість для нього має підтримка культури — Шувалов збирається заснувати академію, де найкращі викладачі допоможуть студентам осягати мистецтво та архітектуру. Найбільш обдарованим учням він виділятиме кошти на поїздки до провідних міст Європи. Це починання слід всіляко вітати: #L [ROOT.GetCountry.GetAdjective|l]ий#! народ повинен увібрати найкращі культурні віяння, а #TOOLTIP:LOCATION,neva,X #L Санкт-Петербург#!#! — стати світочем класицизму."
  flavor_rus.50.a: "Великодушна пропозиція."
  flavor_rus.50.tt1: "Шляхетний [grigory_orlov.GetName] пожертвує академії значну частку своєї художньої колекції"
  flavor_rus.50.b: "Обов'язки перед радою важливіші."
  flavor_rus.50.tt2: "[ivan_shuvalov.GetNameWithNoTooltip] приділяє весь час службі в [Concept('cabinet', 'раді')|e] та досягає значних висот"
  flavor_rus.50.c: "Краще — ворог хорошого."
  flavor_rus.50.tt3: "Архітектура переживе чергове відродження"
  flavor_rus.50.historical_info: "Імператорська академія мистецтв — санкт-петербурзька академія, заснована в 1757 році чиновником і подвижником мистецтва Іваном Шуваловим за подібністю до європейських академій. Тут вивчали неокласицизм, нерідко — за допомогою запрошених з Європи викладачів."
  flavor_rus.51.title: "Шляхетний меценат"
  flavor_rus.51.desc: "Дворянин і мандрівник на ім'я [ivan_shuvalov.GetName], що виявляє чималий інтерес до мистецтва, звернувся до нас із проханням посприяти йому в культурному розвитку #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [XXX.Custom('CL_GEN')|L]#!#! за допомогою наслідування європейських установ. Шувалов галантний і впевнений у собі, а тому напевно зрадіє можливості підтримати культуру та освіту в нашій країні."
  flavor_rus.51.a: "Йому підійде державна служба."
  flavor_rus.51.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він зможе проявити ініціативу в галузі творчості"
  flavor_rus.51.b: "Він збереже нашу культурну спадщину."
  flavor_rus.51.tt3: "Він без упину допомагатиме поширенню в країні творів мистецтва"
  flavor_rus.51.tt4: "Він стає куратором #TOOLTIP:LOCATION,moscow,X #L Московського#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!, чим може зацікавити найвидатніших вчених"
  flavor_rus.51.c: "Наслідувати інших марно."
  flavor_rus.51.tt5: "[ivan_shuvalov.GetNameWithNoTooltip] отримає відмову"
  flavor_rus.51.historical_info: "Іван Шувалов — російський дворянин і державний діяч XVIII століття. Займався розвитком у країні культури та освіти. Бувши прекрасно освіченою людиною, намагався насадити в Росії дух Просвітництва, властивий на той час Італії та Франції, а заодно налагодити культурний обмін з Європою."
  flavor_rus.52.title: "Член Королівського товариства"
  flavor_rus.52.desc: "Внесок, який [ivan_shuvalov.GetName] зробив у розвиток рідної країни, не залишився непоміченим: #TOOLTIP:BUILDING_TYPE,royal_society,X #L Королівське товариство#!#!#L [target_location.Custom('LR_GEN')|l] [target_location.GetName] на знак визнання його заслуг пропонує йому посаду почесного члена."
  flavor_rus.52.a: "Люб'язно погодимося."
  STATIC_MODIFIER_NAME_artist_enrollment_surge: "Наплив митців"
  STATIC_MODIFIER_NAME_magnet_for_scholars: "Місце тяжіння для вчених"
  STATIC_MODIFIER_NAME_gazette_subscription_surge: "Сплеск підписок на газети"
  flavor_rus.52.tt1: "До #TOOLTIP:BUILDING_TYPE,imperial_academy_of_arts,X #L Імператорської академії мистецтв#!#! прагнутиме потрапити ще більше митців"
  flavor_rus.52.tt2: "#TOOLTIP:LOCATION,moscow,X #L Московський#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#! привабить безліч студентів, охочих потрапити під наставництво Шувалова"
  flavor_rus.52.tt3: "На «#TOOLTIP:LOCATION,moscow,X #L Московські#!#! відомості» підпишеться ще більше людей, оскільки читачам подобаються колонки Шувалова"
  flavor_rus.52.b: "Погодимося, але задумаємо дещо інше."
  flavor_rus.52.tt4: "На церемонії посвячення [ivan_shuvalov.GetNameWithNoTooltip] виставить #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_ACC')|L]#!#! оплотом просвіти"
  flavor_rus.52.historical_info: "«Член Лондонського королівського товариства» — почесне звання, що присуджується видатним вченим та дослідникам. У 1758 році цього звання удостоївся Іван Шувалов — засновник першого в Росії університету та академії мистецтв."
  flavor_rus.53.title: "Виховний дім"
  flavor_rus.53.desc_ivan_betskoy_sole_contributor: "Радник [ivan_betskoy.GetName] подав нам цікаву ідею про те, що $flavor_rus.53.desc$"
  flavor_rus.53.desc_common_initiative: "[target_character.GetName] та радник [ivan_betskoy.GetName] подали нам привабливу своєю великодушністю ідею про те, що $flavor_rus.53.desc$"
  flavor_rus.53.desc_ruler_sole_contributor: "[target_character.GetName] подає нам цікаву ідею про те, що $flavor_rus.53.desc$"
  flavor_rus.53.desc: "як розумно підійти до такої делікатної справи, як залишення матерями своїх новонароджених дітей. Пропонується заснувати виховні будинки, де прийматимуть знедолених, годуватимуть їх та навчатимуть, щоб ті згодом почали приносити користь суспільству. Питання утримання таких будинків зовсім не пусте, але у нас є певний вибір."
  flavor_rus.53.a: "Вигідне вкладення."
  flavor_rus.53.tt1: "Виховний будинок відкриє кілька філій банку, що завідують позиками та заощадженнями для підтримки роботи"
  flavor_rus.53.b: "Гідна справа."
  flavor_rus.53.tt2: "Казна забезпечить щедре фінансування"
  flavor_rus.53.c: "Кожному своє."
  flavor_rus.53.historical_info: "У 1763 році з ініціативи міністра та прихильника освітніх реформ Івана Бєцкого та за указом імператриці Єкатєріни II було відкрито Московський імператорський виховний будинок. Поштовхом до відкриття цієї установи послужили ідеї Просвітництва, що тоді поширювалися в Європі та в Росії. Смертність у виховному будинку була високою, а допомога покинутим дітям — недостатньою, проте деякі з них згодом все ж таки змогли завдяки наданій там освіті вступити на службу."
  flavor_rus.54.title: "Починання Івана Бєцкого"
  flavor_rus.54.desc: "Незаконнонароджений дворянський син зміг звільнитися з #L [GetCountry('SWE').GetAdjective|l]ого#! полону і повернутися на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, де хоче вступити на державну службу. Перед цим [ivan_betskoy.GetName] вже встиг здобути деяку популярність в війську, проте пізніше був змушений піти у відставку і податися в дипломатію. Сьогодні він виявляє неабияку ревність у питаннях освіти та суспільних потреб у надії побудувати в країні справедливе суспільство."
  flavor_rus.54.a: "Він наполегливий і мислить на роки вперед."
  flavor_rus.54.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він намагатиметься провести освітні та суспільні реформи"
  flavor_rus.54.b: "Обмежимо [Select_CString(ivan_betskoy.IsFemale, 'її', 'його' )] діяльність."
  STATIC_MODIFIER_NAME_barred_from_educational_ministry: "Заборона на роботу в міністерстві освіти"
  flavor_rus.54.tt3: "[Select_CString(ivan_betskoy.IsFemale, 'Її', 'Його' )] повноваження будуть обмежені лише питаннями державного піклування, і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] знайдуть це кумедним"
  flavor_rus.54.c: "Герой, від якого було мало користі."
  flavor_rus.54.tt4: "[ivan_betskoy.GetNameWithNoTooltip] отримає відмову"
  flavor_rus.54.historical_info: "Іван Бєцкой — радник Єкатєріни II. Цю посаду він отримав у нагороду за підтримку майбутньої імператриці під час палацового перевороту. Провів кілька реформ, спрямованих на створення єдиної системи освіти, зокрема заснував навчальні заклади для жінок та сиріт. Активно боровся зі сформованою соціальною ієрархією та сприяв появі в країні середнього класу."
  flavor_rus.55.title: "Інститут шляхетних дівчат"
  flavor_rus.55.desc: "Жіноча освіта для багатьох все ще залишається предметом гарячих суперечок. Серед її прихильників [ivan_betskoy.GetName], який скликав засідання ради з наміром заснувати заклад, що дасть країні освічених жінок, однаково корисних і сім'ї, і суспільству. Нам залишається лише визначитися, де саме розташовуватиметься це передове училище, після чого можна буде приступити до виховання нового покоління, чий розум не буде затьмарений поганим впливом неосвічених батьків."
  flavor_rus.55.a: "Для цього чудово підходить Санкт-Петербург."
  flavor_rus.55.tt1: "Всі дівчата, чиї батьки — [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], отримають копії статуту"
  rus_printed_charters: "Копії статуту"
  flavor_rus.55.b: "[target_location.GetNameWithNoTooltip] — гарний вибір."
  flavor_rus.55.c: "Зробимо з нього Новодівичий монастир."
  flavor_rus.55.d: "Це загроза усталеному порядку."
  flavor_rus.55.historical_info: "Інститут шляхетних дівчат, заснований Іваном Бєцкім за сприяння Єкатєріни II, — перший у Росії навчальний заклад для жінок. Його вихованки отримували шляхетну освіту, зокрема вивчали Вольтера та Локка. Вступити до закладу можна було лише в дуже юному віці. Дівчаток на шість років відлучали від батьків. Фінансувався він щорічними надходженнями з казни, а навчатися в інституті спочатку могли лише дворянські дочки."
  flavor_rus.56.title: "Вистави «по кишені»"
  flavor_rus.56.desc: "#TOOLTIP:BUILDING_TYPE,moscow_orphanage,X #L Московський виховний дім#!#! почав влаштовувати аматорські постановки, обравши для цього досить непримітне місце. Таким чином вихователі намагаються не тільки розважити дітей, а й підготувати їх до майбутнього культурного життя. Місцеві #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! гаряче вітають подібний підхід, проте керівники відомих театрів незадоволені, оскільки публіка охочіше розкуповує дешевші квитки. Нам надійшла вимога припинити театральну діяльність #TOOLTIP:BUILDING_TYPE,moscow_orphanage,X #L виховного дому#!#! і повернути сцену тим, хто цього гідний."
  flavor_rus.56.a: "Прислухаємося до цих побажань."
  flavor_rus.56.tt1: "На прохання керівників театрів виховному дому буде заборонено влаштовувати постановки"
  flavor_rus.56.b: "Закриємо очі на цю вимогу."
  flavor_rus.56.tt2: "У будівлі #TOOLTIP:BUILDING_TYPE,theater,X #L театру#!#! Московського виховного дому спалахне пожежа, що спалить усе дотла"
  flavor_rus.56.c: "Вільний ринок — здоровий ринок."
  flavor_rus.56.tt3: "Суперницький з ним #TOOLTIP:BUILDING_TYPE,bolshoi_theater,X #L Великий театр#!#! закриється"
  flavor_rus.56.tt4: "Суперницький з ним #TOOLTIP:BUILDING_TYPE,bolshoi_theater,X #L Великий театр#!#! вимагатиме компенсації, посилаючись на видану раніше грамоту, яка гарантує монополію"
  flavor_rus.56.tt5: "Суперницький з ним #TOOLTIP:BUILDING_TYPE,theater,X #L театр#!#! закриється"
  flavor_rus.56.historical_info: "У роки культурного відродження в Росії Московський виховний дім почав проводити аматорські постановки. Цьому противився Майкл Меддокс — засновник Пєтровського театру та володар монополії на театральні вистави в Москві, пожалуваної йому в обмін на обов'язок утримувати театр. За підсумками протистояння керівництво виховного дому змушене було відмовитися від постановок, а дітям запропонували брати участь у виставах Меддокса."
  flavor_rus.57.title: "[michael_maddox.GetNameWithNoTooltip]"
  flavor_rus.57.desc: "До #TOOLTIP:LOCATION,moscow,X #L Москви#!#! приїхав знаменитий театральний антрепренер [michael_maddox.GetName], який до цього вже не раз тішив публіку #TOOLTIP:LOCATION,london,X #L Лондона#!#! та #TOOLTIP:LOCATION,paris,X #L Парижа#!#! своїми гастролями. Оскільки місцеві постановки його зовсім не вразили, Меддокс запропонував нам заснувати заклад, який регулярно ставив би для москвичів різні вистави — за умови, що самому йому пожалують виняткове право на театральну діяльність."
  flavor_rus.57.a: "Треба брати якістю, а не кількістю."
  STATIC_MODIFIER_NAME_theatrical_monopoly_granted: "Видано театральну монополію"
  flavor_rus.57.b: "Вражаюча нахабність."
  flavor_rus.57.tt2: "[michael_maddox.GetNameWithNoTooltip] не отримає виняткове право"
  flavor_rus.57.historical_info: "Майкл Меддокс — англійський театральний діяч і підприємець, який мав успіх спочатку на батьківщині (зокрема, в лондонському театрі «Хеймаркет»), а потім — і в Росії, де заснував Пєтровський театр — предтечу Великого театру. До Росії приїхав наприкінці XVIII століття, попередньо об'їздивши з власними постановками Європу. Різноманітність місцевих оперних і театральних вистав Меддокс знайшов недостатньою, а тому заснував театральну групу, яка стала предтечею першого в Москві постійного театру. За це Майкл отримав щедру підтримку."
  flavor_rus.58.title: "Великий театр"
  flavor_rus.58.desc: "Театральна група Меддокса потребує будівлі, яка відповідала б масштабам її грандіозних оперних і балетних вистав. Архітектор-початківець [joseph_bove.GetName] запропонував спорудити будівлю в дусі неокласицизму: таким чином вдасться уникнути зайвих витрат і при цьому вразити публіку з тонким художнім смаком. Новий театр не тільки відповідатиме всім вимогам Меддокса, а й стане важливою культурною пам'яткою #TOOLTIP:LOCATION,moscow,X #L Москви#!#!, що надихатиме нові покоління архітекторів."
  flavor_rus.58.a: "Витончений пірует."
  flavor_rus.58.tt1: "З'явиться [Concept('character', 'персонаж')|e] [joseph_bove.GetNameWithNoTooltip]"
  flavor_rus.58.b: "[target_location.GetRank.GetNameWithNoTooltip] більше заслуговує на благоустрій."
  flavor_rus.58.tt2: "Він стане завідувачем «фасадницької» частини і займеться відновленням застарілих і постраждалих від пожежі будинків"
  flavor_rus.58.c: "Подібний грандіозний заклад нам ні до чого."
  flavor_rus.58.historical_info: "Большой театр, знаменитий своїми балетними та оперними постановками, був заснований у 1776 році князем Пєтром Урусовим та підприємцем Майклом Меддоксом. Спочатку на його місці знаходився Пєтровський театр, що згорів на початку XIX століття. Постановки в жанрі опери та балету проводяться й донині; Большой театр — один із найвідоміших у світі театрів із подібним репертуаром."
  flavor_rus.59.title: "Наказ"
  flavor_rus.59.desc: "Необхідність якнайшвидшого вступу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! в добу розвитку та просвітництва стає все більш очевидною. Важливим аспектом цього процесу стане радикальний перегляд зводу законів відповідно до європейських принципів розуму, справедливості та гуманізму. Прийнявши ці цінності, ми нарешті позбудемося застарілих правових практик, які лише гальмують суспільний розвиток. Країні час стати на шлях реформ та гарантувати рівність усіх її жителів перед законом."
  flavor_rus.59.a: "Поступ буває болючим."
  enable_nakaz_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,nakaz_reform,X #L «Наказ»#!#!"
  flavor_rus.59.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будуть обурені замахом на свої привілеї"
  flavor_rus.59.b: "Краще обмежимося реформою кримінальних покарань."
  flavor_rus.59.tt2: "За відсутності повноцінних соціальних реформ більш гуманне ставлення до злочинців призведе до зростання злочинності у великих містах"
  flavor_rus.59.c: "Це занадто ризиковано."
  flavor_rus.59.tt3: "Поступки консерваторам призведуть до посилення їхніх позицій"
  flavor_rus.59.historical_info: "#italic Наказ «Комісії про складання проєкту нового Уложення»#! — звід законів, складений Єкатєріною II з метою реформування та модернізації правової системи. Написаний під впливом ідей Просвітництва, «Наказ» вимагав привести законодавство у відповідність до прогресивної філософії, що панувала на той час, а також спростити та уточнити чинні закони. Він запроваджував більш гуманні покарання, обмежував застосування тортур та підкреслював рівність усіх підданих перед законом. «Наказ» не був реалізований повною мірою через опір потужних консервативних сил, і врешті-решт увагою Єкатєріни заволоділи інші ідеї."
  flavor_rus.60.title: "Повстання декабристів"
  flavor_rus.60.desc: "Над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! віють вітри лібералізму. У суспільстві сперечаються про права людини та рівність перед законом. #TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! особливо незадоволені порядками, що склалися: вони мріють жити по-новому, вимагають більшого представництва своїх інтересів у владі. Їх підтримують і деякі #TOOLTIP:POPTYPE,nobles,X #L дворяни#!#!, яких очолює [sergei_trubetskoy.GetName]. Прихильники Трубєцкого вимагають серйозних соціальних та політичних реформ, бажаючи закріпити в суспільстві право кожної людини на свободу та рівність перед законом. Їхній рух день у день стає сильнішим, і ми повинні вирішити, що робити: боротися з ним чи підтримати ці вимоги."
  flavor_rus.60.a: "Це просто купка негідників."
  STATIC_MODIFIER_NAME_rus_decembrist_movement: "Рух декабристів"
  decembrist_revolt: "Повстання декабристів"
  flavor_rus.60.tt1: "Публікація повісті #italic «Подорож із Петербурга до Москви»#! та #TOOLTIP:WORK_OF_ART_TYPE,poem,X #L оди#!#! #TOOLTIP:WORK_OF_ART,$ode_to_liberty_tt$,X #L «Вільність»#!#! викличе значне зростання бунтівних настроїв у суспільстві"
  flavor_rus.60.tt2: "Публікація повісті #italic «Подорож із Петербурга до Москви»#! викличе зростання бунтівних настроїв у суспільстві"
  flavor_rus.60.tt3: "#TOOLTIP:WORK_OF_ART_TYPE,poem,X #L Ода#!#! #TOOLTIP:WORK_OF_ART,$ode_to_liberty_tt$,X #L «Вільність»#!#! надихне наш народ, схиляючи його на бік бунтівників"
  flavor_rus.60.b: "Ми підемо на серйозні поступки."
  flavor_rus.60.tt4: "На бік дворян-вільнодумців перейдуть деякі селяни, бунтівний рух стане сильнішим"
  flavor_rus.60.tt5: "Завдяки #TOOLTIP:GOVERNMENT_REFORM,speransky_liberalization_reform,X #L ліберальним реформам Сперанського#!#! права громадян будуть гарантовані законодавством, скасувати їх буде непросто"
  flavor_rus.60.c: "Перо і правда сильніше за меч."
  flavor_rus.60.tt6: "У конфлікт втрутиться [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'їй', 'йому' )] вдасться досягти угоди з вільнодумцями"
  flavor_rus.60.historical_info: "Повстання декабристів — заколот, спрямований проти самодержавної влади імператора Миколи I. На чолі повстання стояли «декабристи» — група офіцерів та дворян, натхненних ліберальними та конституційними ідеями. Декабристи влаштували в Санкт-Петербурзі виступ військових, щоб змусити Миколу I прийняти вимоги їхнього гуртка, проте цар жорстоко придушив заколот. Найбільш видатні представники руху були страчені або заслані до Сибіру. Повстання декабристів багато в чому надихнуло всі наступні реформаторські рухи в країні."
  flavor_rus.61.title: "[alexander_radishchev.GetNameWithNoTooltip] та [Select_CString(alexander_radishchev.IsFemale,'її', 'його')] критика"
  flavor_rus.61.desc: "[Select_CString(alexander_radishchev.IsFemale,'Впливова письменниця', 'Впливовий письменник')] радикального штибу, [Select_CString(alexander_radishchev.IsFemale,'яка повернулася', 'який повернувся')] до країни після навчання за кордоном, [Select_CString(alexander_radishchev.IsFemale,'обрушилася', 'обрушився')] на владу з їдкою соціальною критикою. [Select_CString(alexander_radishchev.IsFemale,'Обурена', 'Обурений')] уявною несправедливістю нашого державного устрою, [Select_CString(alexander_radishchev.IsFemale,'ця', 'цей')] [alexander_radishchev.GetName] прагне посіяти насіння анархії. [Select_CString(alexander_radishchev.IsFemale,'Бунтівницю', 'Бунтівника')] слід було б змусити замовкнути, однак [Select_CString(alexander_radishchev.IsFemale,'вона', 'він')] користується чималою популярністю в масах…"
  flavor_rus.61.a: "Зашлемо [Select_CString(alexander_radishchev.IsFemale,'її', 'його')] подалі від столиці."
  flavor_rus.61.tt2: "[alexander_radishchev.GetNameWithNoTooltip] вирушить у заслання до віддаленої місцевості, де від [Select_CString(alexander_radishchev.IsFemale,'неї', 'нього')] не буде особливої шкоди"
  flavor_rus.61.b: "[Select_CString(alexander_radishchev.IsFemale,'Її', 'Його')] слова не становлять загрози."
  flavor_rus.61.historical_info: "Алєксандр Ніколаєвіч Радіщев — письменник часів правління Єкатєріни II, відомий своєю критикою існуючих порядків. Навчаючись у Німеччині, він увібрав нові ідеї про управління країною і став непримиренним противником кріпосного права. Ідеї Радіщева не припали до вподоби російському самодержавству, і за свою повість #italic «Подорож із Петербурга до Москви»#! він був засуджений до заслання в Сибір, де писав філософські трактати."
  flavor_rus.62.title: "Незвичайна подорож"
  flavor_rus.62.desc: "[alexander_radishchev.GetName], [Select_CString(alexander_radishchev.IsFemale,'впливова', 'впливовий')] в певних колах [Select_CString(alexander_radishchev.IsFemale,'письменниця', 'автор')], готується випустити свій новий твір, в якому описує вигадану подорож між #TOOLTIP:LOCATION,neva,X #L Санкт-Пєтєрбурґом#!#! та #TOOLTIP:LOCATION,moscow,X #L Москвою#!#!. Книга розповідає про щоденні тяготи, з якими нібито стикаються #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!. Автор виступає за громадянські свободи, об'єктом [Select_CString(alexander_radishchev.IsFemale,'її', 'його')] критики стають не тільки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а й уся існуюча форма правління. Необхідно вжити термінових заходів, щоб запобігти публікації цієї шкідливої книги та засудити її зміст, інакше отрута, укладена в її сторінках, вразить усе наше суспільство."
  flavor_rus.62.a: "Негайно накладемо заборону на публікацію."
  STATIC_MODIFIER_NAME_exodus_of_artists: "Втеча авторів"
  flavor_rus.62.tt1: "Деспотичне втручання влади в питання мистецтва потрясе літературний світ і помітно позначиться на кількості публікованих творів"
  flavor_rus.62.b: "Дуже цікава історія."
  flavor_rus.62.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] обурюються у відповідь на наклепницьке зображення їхнього способу життя"
  flavor_rus.62.historical_info: "Опублікована в 1790 році сатирична повість #italic «Подорож із Петербурга до Москви»#! була сміливим викликом самодержавній владі Єкатєріни II. Імператриця була в курсі порушених у творі проблем, проте вважала за краще заборонити книгу, щоб запобігти поширенню небезпечних ідей. Автор повісті був засуджений до смертної кари, згодом вирок був замінений на заслання до Сибіру. Книга, яка сильно вплинула на декабристів, залишалася під забороною до 1905 року."
  flavor_rus.63.title: "Маніфест про вільність"
  flavor_rus.63.desc: "Стабільність і сильний правитель — необхідні умови процвітання країни. Зараз [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не користується популярністю серед підданих, у країні назріває невдоволення. Поки становище не виправиться, ми зобов'язані робити все, щоб [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] згуртувалися навколо монарха. Уряд міг би піти на поступки #TOOLTIP:POPTYPE,nobles,X #L знаті#!#!, дати їм звільнення від державної служби та інші свободи. Це дасть нам час зміцнити поки ще крихкі основи абсолютної монархії."
  flavor_rus.63.a: "Це необхідне зло."
  flavor_rus.63.tt1: "Поки країною править [target_root_country.GetGovernment.GetRuler.GetName], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] збережуть усі свої великі привілеї"
  revoke_manifesto_of_freedom: "Великі привілеї, якими користуються [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], залишаться чинними, доки не помре монарх, що їх дарував."
  flavor_rus.63.b: "Потрібно спробувати знайти компроміс."
  flavor_rus.63.c: "Обурлива пропозиція!"
  flavor_rus.63.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] зіткнеться з опором знаті — [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] заважатимуть [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'її', 'його')] владі на кожному кроці"
  flavor_rus.63.historical_info: "Публікація #italic Маніфесту про вольність дворянства#! — одна з ключових подій нетривалого царювання Пєтра III. Різка зміна геополітичної орієнтації, що позбавила Росію великої військової перемоги над Пруссією, відштовхнула від молодого імператора більшу частину дворянства. Щоб заручитися їхньою підтримкою та зміцнити своє становище, Пьотр скоротив дворянські повинності, а для оплати зрослих витрат вилучив церковні землі — що, своєю чергою, викликало невдоволення духовенства. Його завзяте прагнення ввести в війську муштру за прусським зразком ледь не спровокувало військовий заколот. Усе це підштовхнуло Єкатєріну, дружину Пєтра, організувати переворот з метою повалення чоловіка."
  flavor_rus.64.title: "Біронівщина"
  flavor_rus.64.desc: "[ernst_von_biron.GetName] — видатний чоловік, що має чималий вплив. Познайомившись із ним, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'забажала', 'забажав')] будь-що залучити герцога до себе на службу. І без того могутній, [ernst_von_biron.GetNameWithNoTooltip] виявляє неабиякі здібності до управління країною — він може стати цінною знахідкою для нашого кабінету міністрів. Потрібно усунути будь-які перешкоди, що заважають призначенню іноземця на високу посаду, адже його досвід принесе чималу користь #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!."
  flavor_rus.64.a: "Сказано — зроблено."
  flavor_rus.64.b: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Ублаженна', 'Ублаженний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'добра', 'добрий')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_rus.64.tt2: "Виконати дію зможе лише член [Concept('cabinet', 'ради')|e] не[target_culture.GetNameWithNoTooltip|l]ого походження"
  flavor_rus.64.c: "Він — тимчасовець, що прагне влади!"
  flavor_rus.64.tt3: "[ernst_von_biron.GetNameWithNoTooltip] не отримає впливових посад"
  flavor_rus.64.historical_info: "Ернст Йоганн Бірон — радник і, ймовірно, коханець імператриці Анни Іванівни. Маючи значну владу при російському дворі, цей німець знатного походження став головною опорою імператриці, яка прагнула утвердити самодержавну владу. Бірон був здібним управлінцем, проте в Росії його не любили — як за іноземне походження, так і за величезну владу та багатства, нажиті ним завдяки високому становищу. Добу його правління прозвали «біронівщиною», проводячи паралелі між «засиллям німців» та часами татаро-монгольського іга."
  flavor_rus.65.title: "Балет Великого театру"
  flavor_rus.65.desc: "Не так давно керівництво #TOOLTIP:BUILDING_TYPE,bolshoi_theater,X #L Великого театру#!#! сформувало балетну трупу, репертуар якої включає безліч класичних і сучасних творів. З перших же виступів новий балет заслужив шалену популярність серед глядачів. Тепер трупа планує вирушити на гастролі, розраховуючи підтвердити свій унікальний культурний статус і залучити нові таланти. Ми могли б переконати директора вибрати такий маршрут, який найкращим чином посприяє нашим інтересам. Зрештою, #L [ROOT.GetCountry.GetAdjective|l]і#! культурні інституції зобов'язані служити своїй країні…"
  flavor_rus.65.a: "Нехай вирушають на гастролі по країні."
  flavor_rus.65.b: "Театр повинен пропагувати нашу культуру по всьому світу."
  flavor_rus.65.tt1: "Балет вирушить на гастролі по континенту і зміцнюватиме міжнародну репутацію #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_rus.65.tt2: "[michael_maddox.GetName] використовує свої обширні зв'язки у світі мистецтва, щоб зарезервувати якомога більше майданчиків"
  flavor_rus.65.historical_info: "Балет Большоґо театру був заснований у 1776 році за указом імператриці Єкатєріни II на базі Большоґо театру — одного з найстаріших театрів Росії. Він домігся міжнародного визнання, демонструючи російські балетні традиції по всьому світу."
  flavor_rus.66.title: "Канцелярія таємних розшукових справ"
  flavor_rus.66.desc: "Бунтівні еліти #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! виявляють відкриту непокору владі, і є побоювання, що [current_policy.GetName] вже не в силах утримувати їх у вузді. Міністри-іноземці в #TOOLTIP:CABINET_ACTION,bironovshchina,X #L уряді Бірона#!#! пропонують створити особливе відомство для боротьби з бунтівниками та вільнодумцями. Реорганізована таємна поліція отримає широкий мандат і зможе придушувати будь-які антиурядові настрої грубою силою."
  flavor_rus.66.a: "Послух вимагає жертв."
  enable_secretnoye_byuro_policy: "Відкриває [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,secretnoye_byuro_policy,X #L «Таємна канцелярія»#!#!"
  flavor_rus.66.tt1: "Доступно за умови, що член [Concept('cabinet', 'ради')|e] виконує [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,bironovshchina,X #L «Біронівщина»#!#!"
  flavor_rus.66.b: "Ми не опустимося до таких заходів."
  flavor_rus.66.historical_info: "Канцелярія таємних розшукових справ відігравала важливу роль в добу правління Анни Іванівни. Силами цього відомства імператриця придушила своїх політичних противників, значно зміцнивши самодержавну владу. Підслідні часто піддавалися найжорстокішим тортурам, їм відрізали носи або забивали на смерть батогами з сиром'ятної шкіри. Загалом жертвами політичних чисток стали близько двадцяти тисяч дворян."
  flavor_rus.67.title: "Хрещення батогом"
  flavor_rus.67.desc: "В околицях #TOOLTIP:AREA,kazan_area,X #L Казані#!#! проживає численна релігійна меншина, здатна створити безліч проблем для центральної влади. Єдність #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вимагає якнайшвидшого навернення цих язичників у нашу віру, і в цій справі будь-які засоби хороші. У #TOOLTIP:AREA,kazan_area,X #L Казані#!#! буде відкрито нове відомство, що діє за принципом «батога і пряника». Ті, хто з доброї волі прийме Христа у своє серце, отримають привілеї. Для тих же, хто буде противитися істинній вірі, передбачені більш… суворі методи переконання."
  flavor_rus.67.a: "Добре слово, підкріплене міцним кулаком, переконливе вдвічі."
  STATIC_MODIFIER_NAME_office_of_new_converts: "Новохрещенська контора"
  enable_office_of_new_converts_cabinet_action: "Відкриває [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,office_of_new_converts,X #L «Дикастерія з євангелізації»#!#!"
  flavor_rus.67.tt1: "Виконати дію можна, якщо в #TOOLTIP:LOCATION,kazan,X #L Казані#!#! є #TOOLTIP:BUILDING_TYPE,orthodox_monastery,X #L православний монастир#!#!"
  flavor_rus.67.b: "Віра — особиста справа кожного."
  flavor_rus.67.historical_info: "Комісія новохрещенських справ була заснована імператрицею Анною Іоаннівною для контролю над дедалі більшою кількістю іновірців, які опинилися під владою Росії в міру стрімкого розширення імперії. Хрещення часто проводилося за допомогою залякування та насильства, навернення в християнство супроводжувалося руйнуванням безлічі храмів і мечетей. Штаб-квартирою відомства служив Богородицький монастир у Казані."
  flavor_rus.68.title: "[alexander_pushkin.GetNameWithNoTooltip]"
  flavor_rus.68.desc: "[Select_CString(alexander_pushkin.IsFemale,'Одна знатна молода дворянка', 'Один знатний молодий дворянин')] на ім'я [alexander_pushkin.GetName] пише вельми непогані повісті та вірші. Одним із [Select_CString(alexander_pushkin.IsFemale,'її', 'його')] предків був [abram_petrovich.GetName] — «арап», вихований при дворі попередніх монархів. [Select_CString(alexander_pushkin.IsFemale,'Юна поетеса', 'Юний поет')] надихається найвидатнішими геніями словесності, у [Select_CString(alexander_pushkin.IsFemale,'її', 'його')] творчості вже відчувається рука майстра. Поза всяким сумнівом, [Select_CString(alexander_pushkin.IsFemale,'їй', 'йому')] судилося зробити значний внесок у розвиток #L [ROOT.GetCountry.GetAdjective|l]ої#! літератури. Водночас [Select_CString(alexander_pushkin.IsFemale,'вона схильна', 'він схильний')] до провокаційних висловлювань, симпатизує націоналістичним рухам і може стати серйозною проблемою, якщо залишити [Select_CString(alexander_pushkin.IsFemale,'її', 'його')] без нагляду."
  flavor_rus.68.a: "Великий талант має бути вільним, як птах."
  flavor_rus.68.b: "За цим бунтівником потрібне око та око."
  flavor_rus.68.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] різко протестуватимуть проти замаху на свободу представника аристократії, але якщо #TOOLTIP:POLICY,secretnoye_byuro_policy,X #L Таємна канцелярія#!#! надасть переконливі докази його бунтівної діяльності, заперечення з їхнього боку припиняться"
  flavor_rus.68.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] різко протестують проти замаху на їхні свободи"
  flavor_rus.68.historical_info: "Алєксандр Сєрґєєвіч Пушкін заслужено вважається найвидатнішим поетом Росії. Свій перший вірш він написав у 15 років. Значний вплив на Пушкіна справили ідеї Просвітництва, а також європейські ідеї націоналізму — зокрема, боротьба греків за незалежність від османського панування. За написання скандальної поеми, що критикує кріпосне право та брак свобод у країні, Пушкіна відправили в чотирирічне заслання. Поета не врятувало навіть знатне походження."
  flavor_rus.69.title: "Ода «Вольність»"
  flavor_rus.69.desc: "[Select_CString(alexander_pushkin.IsFemale,'Талановита поетеса', 'Талановитий поет')] [alexander_pushkin.GetName] [Select_CString(alexander_pushkin.IsFemale,'написала', 'написав')] скандальну поему, в якій критикує самодержавну владу та прославляє ідеали свободи та справедливості. Страждання простого народу, деспотизм влади, вимоги лібералізації законодавства — вірш від першого до останнього рядка звучить як заклик до повстання! Ми повинні вжити термінових заходів, щоб не допустити поширення крамольних віршів та приборкати їхнього автора, доки його ідеї не почули в радикальних колах."
  flavor_rus.69.a: "Настав час покласти край цьому фарсу."
  flavor_rus.69.tt1: "Завдяки [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L суворої цензури#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] заарештовують більшу частину примірників скандальної книги"
  flavor_rus.69.b: "Це ж просто слова."
  flavor_rus.69.tt2: "Поема користуватиметься шаленою популярністю та матиме серйозний вплив на настрої в суспільстві"
  flavor_rus.69.c: "Організуйте [Select_CString(alexander_pushkin.IsFemale,'їй', 'йому')] «нещасний випадок»."
  flavor_rus.69.tt3: "#TOOLTIP:POLICY,secretnoye_byuro_policy,X #L Таємна канцелярія#!#! влаштує так, що в друкарні, послугами якої користується [alexander_pushkin.GetNameWithNoTooltip], спалахне «випадкова» пожежа. Автор загине у вогні разом зі скандальним манускриптом"
  flavor_rus.69.historical_info: "Ода #italic «Вольність»#! — знаменитий вірш Алєксандра Пушкіна, написаний ним невдовзі після завершення навчання в ліцеї. За цей твір поет був відправлений у заслання. Поема мала великий вплив на бунтівні настрої по всій Росії, і завдяки їй декабристи отримали безліч нових прихильників."
  flavor_rus.70.title: "Винаходи геніального зодчого"
  flavor_rus.70.desc: "[yury_felten.GetName], [Select_CString(yury_felten.IsFemale,'честолюбна', 'честолюбний')] архітекторка та інженерка німецького походження, нещодавно [Select_CString(yury_felten.IsFemale,'закінчила', 'закінчив')] навчання в Академії наук. Працюючи підмайстром у більш досвідчених архітекторів, [Select_CString(yury_felten.IsFemale,'вона продемонструвала', 'він продемонстрував')] видатні здібності до вдосконалення наявних проєктів. Якщо доручити [Select_CString(yury_felten.IsFemale,'їй', 'йому')] перебудову розкішних столичних палаців, аристократія напевно оцінить наш жест. Крім власне архітектури, [yury_felten.GetNameWithNoTooltip] [Select_CString(yury_felten.IsFemale,'відзначилася', 'відзначився')] на ниві створення різноманітних пристроїв та пристосувань, деякі з них здатні здійснити справжню революцію в будівництві."
  flavor_rus.70.a: "Запропонуємо йому стандартний 14-годинний робочий день."
  flavor_rus.70.tt2: "[Select_CString(yury_felten.IsFemale, 'Вона', 'Він' )] отримає цінні навички, працюючи під керівництвом такого відомого архітектора, як [francesco_rastrelli.GetName]"
  flavor_rus.70.tt3: "[Select_CString(yury_felten.IsFemale,'Вона', 'Він')] прикрашає палаци #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурга#!#! новими картинами, фресками та настінним розписом"
  flavor_rus.70.b: "Такі навички слід передати нащадкам."
  flavor_rus.70.tt4: "[Select_CString(yury_felten.IsFemale,'Вона', 'Він')] отримує посаду викладача в Імператорській академії мистецтв у #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурзі#!#!"
  flavor_rus.70.c: "Краса — справа суб'єктивна."
  flavor_rus.70.tt5: "[yury_felten.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_rus.70.historical_info: "Юрій Матвійович Фельтен — великий архітектор, що користувався покровительством імператриці Єкатєріни II. Він створив безліч знаменитих палаців і храмів, брав участь у будівництві Зімнєґо та Вєлікоґо Єкатєрінінскоґо палаців. Юрій Матвійович прославився не тільки як зодчий, а й як винахідник — саме він придумав механізм для переміщення Грім-каменя, який став постаментом для Мідного вершника в Санкт-Петербурзі. Отримавши посаду директора Імпєраторской академії мистецтв, Фельтен залишався на цій посаді до кінця свого життя."
  flavor_rus.71.title: "Військові поселення"
  flavor_rus.71.desc: "Утримання постійного війська, витрати на його постачання та розміщення — це суцільні витрати для скарбниці. У підсумку, попри всі заходи, наша військова міць, як і раніше, далека від очікувань. Якщо впровадити систему, за якої вояки паралельно з військовою службою займатимуться сільськогосподарською діяльністю, ми могли б зробити військо більш самодостатнім. У разі різкого падіння сільськогосподарського виробництва ми зможемо компенсувати нестачу робочих рук за допомогою ротації вояків, а діти рекрутів отримуватимуть військову освіту і з самого народження виявляться пов'язані з військовою службою."
  flavor_rus.71.a: "З усіх боків одні плюси."
  enable_military_settlements_policy: "Відкриває [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,military_settlements_policy,X #L «Військові поселення»#!#!"
  flavor_rus.71.b: "У цієї схеми занадто багато недоліків."
  flavor_rus.71.historical_info: "Військові поселення були запроваджені імператором Алєксандром I у спробі знизити витрати на утримання величезного війська. Крім цього, дозволивши рекрутам жити разом із сім'ями, влада розраховувала забезпечити постійний приплив новобранців. Через погану організацію система виявилася малоефективною, у ній не враховувався сезонний характер сільськогосподарської діяльності, і вояки нерідко виявлялися недоступними під час жнив. Продуктивність праці падала, а влада намагалася вирішувати проблеми за допомогою тілесних покарань, що не раз призводило до масових заворушень."
  flavor_rus.72.title: "Пробудження націоналізму"
  flavor_rus.72.desc: "Останнім часом вчені активно сперечаються про роль #TOOLTIP:CULTUREGROUP,slavic_group,X #L слов'янської#!#! культури та намагаються дати їй визначення. Суперечники розділилися на два табори — одні вважають, що ми повинні орієнтуватися на Захід, інакше #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! не вдасться звільнитися від тягаря минулого, інші ж звеличують важливість спадщини, що лежить в основі [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої самобутності. З цього протистояння народилися два чітко виражених інтелектуальних рухи, кожен з яких має власне бачення майбутнього країни. Час вирішити, хто з них більшою мірою виражає наші власні інтереси."
  flavor_rus.72.a: "Ми підтримаємо слов'янофілів."
  flavor_rus.72.custom1: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,intellectual_movements,X #L «Рухи інтелектуалів»#!#!"
  flavor_rus.72.custom2: "[Concept('policy', 'Політику')|e] в межах [Concept('law', 'закону')|e] #TOOLTIP:LAW,intellectual_movements,X #L «Рухи інтелектуалів»#!#! можна змінювати не частіше ніж раз на десять років"
  flavor_rus.72.b: "Ми підтримаємо західників."
  flavor_rus.72.historical_info: "Західники та слов'янофіли — протиборчі інтелектуальні та ідеологічні течії в Росії XIX століття. Майбутній розвиток Росії, її відносини із Західною Європою, збереження російської культурної самобутності — все це було предметом палких суперечок між прихильниками двох таборів. Західники були прихильниками модернізації, вони прагнули перейняти європейські ідеї, інститути та технології, тоді як слов'янофіли виступали за збереження прадавніх російських цінностей, духовності та общинного побуту."
  flavor_rus.73.title: "Листування з вільнодумцем"
  flavor_rus.73.desc: "Нещодавно [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'приймала', 'приймав')] у себе скандально [Select_CString(francois_marie_voltaire.IsFemale,'відому', 'відомого')] #L [GetCountry('FRA').GetAdjective|l][Select_CString(francois_marie_voltaire.IsFemale,'у', 'ого')]#! [Select_CString(francois_marie_voltaire.IsFemale,'письменницю', 'письменника')]. [Select_CString(francois_marie_voltaire.IsFemale,'Ця', 'Цей')] [francois_marie_voltaire.GetName], [Select_CString(francois_marie_voltaire.IsFemale,'переконана прихильниця', 'переконаний прихильник')] ідей Просвітництва, явно [Select_CString(francois_marie_voltaire.IsFemale,'справила', 'справив')] при дворі враження — [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] та [Select_CString(francois_marie_voltaire.IsFemale,'іноземна гостя', 'іноземний гість')] знайшли спільну мову з багатьох питань — від свободи слова до критики релігії. Перш ніж попрощатися, вони обіцяли регулярно листуватися один з одним, щоб і далі продовжувати філософську дискусію. Через їхнє листування наше вище суспільство ризикує заразитися ідеями найрадикальнішого ґатунку. З іншого боку, воно може прискорити проникнення на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! нових корисних ідей…"
  flavor_rus.73.a: "Таке листування можна тільки підтримати."
  STATIC_MODIFIER_NAME_extensive_correspondence: "Активне листування"
  flavor_rus.73.b: "[francois_marie_voltaire.GetLastNameWithNoTooltip] — просто тупиця."
  flavor_rus.73.historical_info: "За час свого царювання імператриця Єкатєріна II обмінялася з Вольтером безліччю листів. Вони ділилися ідеями, дискутували та обговорювали безліч питань — від літератури та філософії до політики та суспільних проблем. Дотепний Вольтер, відомий прихильник ідей Просвітництва, високо цінував Єкатєріну та її спроби реформувати та модернізувати Росію. Імператриця, своєю чергою, нерідко зверталася до нього за порадою в питаннях управління та культурного розвитку країни."
  flavor_rus.74.title: "Небезпечна правда"
  flavor_rus.74.desc: "[nikolay_novikov.GetName], [Select_CString(nikolay_novikov.IsFemale,'впливова письменниця', 'впливовий письменник')] та меценат, широко [Select_CString(nikolay_novikov.IsFemale,'відома', 'відомий')] у культурних та літературних колах країни. [Select_CString(nikolay_novikov.IsFemale,'Вона опублікувала', 'Він опублікував')] безліч праць, спровокувавши суспільну дискусію з цілої низки тем. Очоливши редакцію газети «Московські відомості», [nikolay_novikov.GetLastNameWithNoTooltip] [Select_CString(nikolay_novikov.IsFemale,'взялася', 'взявся')] видавати сатиричні часописи, що користуються шаленою популярністю. Час вжити заходів і зупинити поширення [Select_CString(nikolay_novikov.IsFemale,'її', 'його')] крамольних ідей, доки вони не привели нас на плаху."
  flavor_rus.74.a: "Конфіскуємо [Select_CString(nikolay_novikov.IsFemale,'її', 'його')] праці."
  flavor_rus.74.tt2: "#TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! та #TOOLTIP:POPTYPE,burghers,X #L міщани#!#! будуть обурені вилученням популярних видань"
  flavor_rus.74.b: "Нехай собі працює."
  flavor_rus.74.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть обурені тим, що [nikolay_novikov.GetNameWithNoTooltip] вільно поширює свої крамольні ідеї попри [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,strict_censorship,X #L суворої цензури#!#!"
  flavor_rus.74.c: "Змусимо [Select_CString(nikolay_novikov.IsFemale,'її', 'його')] опублікувати спростування."
  flavor_rus.74.tt4: "Цензура посилиться, щоб не допустити поширення революційних ідей"
  flavor_rus.74.historical_info: "Ніколай Івановіч Новіков — письменник, меценат і книговидавець часів правління імператриці Єкатєріни II. Він заснував літературно-філософський часопис, у якому просував ідеали Просвітництва, був великим діячем російського масонства, займався філантропією. Новіков постійно зазнавав переслідувань з боку уряду і кілька років провів у в'язниці. Попри це, праці Ніколая Івановіча продовжували ходити по руках, сприяючи поширенню антиурядових ідей та надихаючи майбутніх революціонерів."