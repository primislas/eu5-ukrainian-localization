l_russian:
  flavor_tre.1.title: "Цитадель [target_location.GetNameWithNoTooltip]"
  flavor_tre.1.desc: "Величне місто [target_location.GetName], розташоване в самому серці #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!, вже багато століть служить символом нашої верховної влади. Завдяки вигідному розташуванню на березі моря столичне місто активно розвивається і процвітає, уособлюючи наші багаті культурні традиції.\n\nЦе місто, усіяне багатими купецькими подвір'ями, ринками, акведуками та іншою інфраструктурою, стало справжньою перлиною нашої держави. Усе це забезпечує постійний приріст населення, тому нам варто задуматися про розширення меж міста, щоб за його міцними стінами можна було вмістити нові будинки."
  flavor_tre.1.historical_info: "Засноване у 756 р. до н. е. місто Трапезунд довгий час виступало оплотом грецької православної культури. Ще за часів Римської імперії тут розташовувалися легіони, що обороняли Полемонів Понт, а в роки правління Юстиніана місто служило плацдармом для завоювання Вірменії.\n\nУ VIII столітті Трапезунд став архієпископською єпархією, а ще через два століття — митрополією. У 1204 році Олексій I Комнін разом із братом Давидом заснував тут Трапезундську імперію, що проіснувала до 1461 року. Від ворогів її захищали Понтійські гори, міцні стіни та вигідні шлюбні союзи. Невеликий (у 1438 році тут проживало 4000 осіб), але добре укріплений Трапезунд славився своїми пам'ятками архітектури, такими як Софійський собор та храм Богородиці Золотоглавої (Панагія Хрисокефалос). У 1461 році його взяли османи, підкоривши тим самим останнє місто Візантійської імперії."
  flavor_tre.1.a: "Вкласти гроші в розвиток!"
  flavor_tre.1.b: "Нехай голодують за стінами…"
  flavor_tre.2.title: "Непокора схоларіїв"
  flavor_tre.2.desc: "Рухомі невгамовною жагою наживи, деякі представники місцевих дворянських ополчень вирішили скористатися ослабленням верховної влади і взяли [target_location.Custom('LR_ACC')|l] [target_location.GetName] під свій повний контроль. Звісно, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] завжди прагнули здобути якомога більше впливу та привілеїв, але цього разу вони перейшли всі межі дозволеного. Якщо ми не вживемо рішучих заходів, скоро наша держава може загрузнути в громадянській війні!"
  flavor_tre.2.a: "Спустити цих скажених псів з ланцюгів!"
  flavor_tre.2.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_tre.2.historical_info: "Схоларії — впливові #italic άρχοντες#! (дворяни), спочатку — гвардійський підрозділ, що охороняв місто. З часом його представники склали одне з наймогутніших сімейств Трапезунда. У 1340 році Схоларії, які прагнули заволодіти всією повнотою влади, виступили проти воцаріння імператриці Ірини. У країні, що страждала в той час від набігів туркменів на південний кордон, вибухнула громадянська війна. Це зіграло на руку туркменам: під час одного з нальотів вони змогли проникнути в Трапезунд і підпалити місто. На нещастя жителів, до пожежі додалася й епідемія: вулиці міста були завалені гниючими тілами людей і коней."
  flavor_tre.3.title: "[target_character1.GetNameWithNoTooltip] [Select_CString(target_character1.IsFemale,'отруєна', 'отруєний')]"
  flavor_tre.3.desc: "[target_character2.GetName] вже давно [Select_CString(target_character2.IsFemale,'відчувала', 'відчував')] до [Select_CString(target_character1.IsFemale,'своєї дружини', 'свого чоловіка')] пекучу ненависть і ревнощі. Їхні й без того напружені стосунки погіршувалися тим, що [target_character1.GetName] [Select_CString(target_character1.IsFemale,'мала при дворі безліч коханців', 'мав при дворі безліч коханок')]. Зрештою [target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale,'не витримала і пішла', 'не витримав і пішов')] на відчайдушний крок, отруївши [Select_CString(target_character1.IsFemale,'свою дружину', 'свого чоловіка')] і поклавши край цьому нещасливому шлюбу."
  flavor_tre.3.a: "У коханні та на війні всі засоби добрі."
  flavor_tre.3.b: "Ми цього не потерпимо!"
  flavor_tre.3.historical_info: "Ірина — позашлюбна дочка Андроніка III Палеолога — стала дружиною імператора Василя аж ніяк не з любові: сімейство Комнінів за допомогою цього шлюбу розраховувало укласти союз з імператором Візантії. Ірина так і не змогла народити своєму чоловікові спадкоємця, а Василь волів знаходити розраду в обіймах придворної коханки. Взаємна нелюбов в августійшій парі виявилася фатальною для Василя: через деякий час він був убитий, а влада над Трапезундом перейшла до Ірини. У країні почалися неспокійні часи."