l_russian:
  flavor_eng.1.title: "Лолардська єресь"
  flavor_eng.1.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] стає місцем зародження нового релігійного руху, що виступає проти усталеного порядку. [Select_CString(john_wycliffe.IsFemale, 'Видатна мислителька', 'Видатний мислитель' )] [john_wycliffe.GetName] пропонує народу новий погляд на #TOOLTIP:RELIGIONGROUP,christian,X #L християнство#!#!: понад усе мають стояти [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] та трударі, а не порочне [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], що загрузло у своєму чиноначаллі.\n\nКрім того, [Select_CString(john_wycliffe.IsFemale, 'вона', 'він' )] закликає перекласти Біблію на #L [ROOT.GetCountry.GetCulture.GetLanguage.GetName|l]у#! мову, щоб її міг читати простий народ, — раніше ніхто не задумувався про подібне.\n\nПеред нами стоїть вибір: або змусити єретиків замовкнути, або просто заплющити очі на їхні безневинні мрії."
  flavor_eng.1.a: "Зупинимо єретиків."
  lots_of_lollards: "Багато [ROOT.GetCountry.GetCulture.GetAdjective|l]их#! [Concept('pops', 'груп населення')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, що сповідують #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, перейдуть у #TOOLTIP:RELIGION,$lollardy_tt$,X #L лолардизм#!#!"
  eng_opposes_lollards: "Протистояння лолардам"
  flavor_eng.1.b: "Нехай проповідують."
  flavor_eng.1.tt2: "Спроби протидії можуть уповільнити поширення #TOOLTIP:RELIGION,$lollardy_tt$,X #L лолардизму#!#!"
  flavor_eng.1.tt3: "Терпимість до його присутності на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! може посприяти поширенню #TOOLTIP:RELIGION,$lollardy_tt$,X #L лолардизму#!#!"
  eng_tolerates_lollards: "Терпимість до лолардів"
  flavor_eng.1.historical_info: "Лолардизм — релігійний рух, що поширився в Англії в XIV–XV століттях ще до Реформації. Лоларди, що сповідували вчення Джона Вікліфа, прагнули покласти край церковному розтлінню католицьких звичаїв. За це їх переслідували, а деяких лолардів було страчено."
  flavor_eng.2.title: "Кінець Столітньої війни"
  flavor_eng.2.desc: "#TOOLTIP:REGION,france_region,X #L Франція#!#! зуміла повернути собі територіальні володіння, які не так давно ще належали #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!, завдавши цим нищівного удару по наших прагненнях створити велику імперію по обидва боки Ла-Маншу. Вибір невеликий: або ми зціплюємо зуби і намагаємося відвоювати втрачене, або змиряємося з тим, що [GetCountry('FRA').GetName] не хоче підкорятися, а ми не здатні підтримати власні претензії."
  flavor_eng.2.a: "Приймемо неминуче."
  eng_no_english_in_france: "Франція не для англійців"
  flavor_eng.2.b: "Ми не збираємося відступати!"
  eng_refuse_to_give_up_france: "Відмовитися поступатися французам"
  flavor_eng.2.c: "Обернемо це на свою користь."
  flavor_eng.2.tt1: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] має дар красномовства, а тому вміло переконає всіх у незначності недавніх територіальних втрат"
  flavor_eng.2.historical_info: "Столітня війна стала останнім великим військовим конфліктом середньовічної Європи. Воювали не тільки королі — свої цілі одночасно переслідувала й аристократія, що брала участь у бойових діях. У наступних війнах рівень роздробленості помітно знизився (принаймні, за середньовічними мірками). Столітня війна в реальності тривала понад століття — з 1337 по 1453 рік. Череда нескінченних менших війн, сутичок та облог зрештою призвела до того, що обидві сторони конфлікту просто видихнулися, не домігшись хоч скільки-небудь значущої перемоги. Однак варто зазначити, що війну починали два королівства, а закінчили вже дві повноцінні країни."
  flavor_eng.3.title: "Мирові судді"
  flavor_eng.3.desc: "Наші способи підтримувати мир і порядок серед населення помітно застаріли. Усі розбіжності зараз розглядає #TOOLTIP:POPTYPE,nobles,X #L знать#!#!, проте через відсутність у країні належної правової системи проти такого підходу різко виступає [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l]. Щоб вирішити конфлікт, що склався, ми пропонуємо заснувати нову посаду. Нехай мирові судді розглядають малозначні скарги, розбирають випадки порушення порядку та забезпечують мир на ввірених їм територіях."
  flavor_eng.3.a: "Так, без них не обійтися."
  flavor_eng.3.b: "Ні, нехай цим займаються аристократи."
  flavor_eng.3.historical_info: "Інститут мирових суддів (спочатку — #italic Custodes Pacis#!) у 1195 році заснували англійський король Річард I та архієпископ Кентерберійський. Латинську назву цього інституту незабаром було змінено на англійську. У 1489 році було видано постанову, що примушувала суддів зізнаватися у своїх слабкостях на щоквартальних засіданнях. Ця ж постанова дала населенню право скаржитися на суддів безпосередньо монарху або раді. Мирових суддів призначав лорд-канцлер, який, крім цього, мав право позбавляти окремих незговірливих суддів займаної посади під час щорічного вручення суддівських повноважень."
  flavor_eng.4.title: "Поширення бюрократів із середнього класу"
  flavor_eng.4.desc: "З кожним роком шукати талановитих людей, здатних обіймати державні посади, стає все складніше. Вже лунають заклики шукати гідних чиновників серед представників зростаючого середнього класу — в першу чергу це адвокати та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Обидві сторони з нетерпінням чекають нашого рішення: чи наважимося ми піти на такі зміни?"
  flavor_eng.4.a: "Надамо їм підтримку."
  enable_yorkist_tradition_policy: "Відкриває [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,yorkist_tradition_policy,X #L «Йоркістська традиція»#!#!"
  flavor_eng.4.b: "Їм не місце в уряді."
  flavor_eng.4.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] будуть незадоволені, що їх не допускають до управління країною"
  flavor_eng.4.historical_info: "Призначення представників середнього класу (переважно адвокатів та духовенства) на урядові посади — давня традиція англійського дому Йорків. Однак не всім подобався такий звичай: знать і навіть деякі священнослужителі вважали, що такої привілеї гідні лише люди високого походження або що вона повинна походити від Господа."
  flavor_eng.5.title: "Суд Зоряної палати"
  flavor_eng.5.desc: "Зараз правосуддя вершиться відповідно до положень, які закріплені #TOOLTIP:POLICY,common_law_policy,X #L загальним правом#!#!. Однак судочинство рухається неймовірно повільно, оскільки в основі його лежать прецеденти та рішення суддів. Винесення вироків у окремих справах може займати тижні, а іноді й місяці. Деякі вважають, що настав час заснувати окрему інстанцію з ширшими можливостями, яка могла б розглядати справи, занадто складні для звичайних судів. Однак у такому випадку є ймовірність, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] зміцнять свою владу та зможуть придушувати незгодних і карати інакодумців."
  flavor_eng.5.a: "Без такого інструменту не обійтися."
  enable_court_of_the_star_chamber_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,court_of_the_star_chamber_reform,X #L «Суд Зоряної палати»#!#!"
  flavor_eng.5.b: "У нас є загальне право — цього поки достатньо."
  flavor_eng.5.historical_info: "Зоряна палата, що набрала впливу в добу правління Генріха VII, виникла як відділення королівської таємної ради. Свою назву вона отримала від прикрашеної зірками стелі в залі Вестмінстерського палацу, де проходили засідання. У 1487 році палата отримала статус окремого судового органу, який був незалежний від ради та займався розглядом клопотань про відшкодування збитків."
  flavor_eng.6.title: "Обгороджування"
  flavor_eng.6.desc: "Населення в селах зазвичай живе за рахунок просторих сільськогосподарських угідь: тут селяни обробляють землю та пасуть худобу. Однак обставини склалися так, що землевласники почали обгороджувати свої землі в прагненні вирощувати ще більше, не зважаючи на збитки, які такий економічний підхід несе для всього населення. Виник цілий рух землевласників, які вимагають законодавчого дозволу продовжувати обгороджування."
  flavor_eng.6.a: "Підтримаємо рух."
  flavor_eng.6.b: "Виступимо проти руху."
  flavor_eng.6.historical_info: "Населення Англії часів маноріальної системи, що складалося переважно з селян, які обробляли здавану їм внайми землю, рідко покидало рідні місця. Вимушене переселення до міст почалося лише після того, як виник рух обгороджування, організований жадібними до наживи землевласниками-аристократами. Нова дешева робоча сила стала працювати на фабриках та в шахтах, однак сплеск бідності призвів багатьох до потрапляння в боргове рабство та переселення до північноамериканських колоній."
  flavor_eng.7.title: "Акт про супрематію"
  flavor_eng.7.desc: "Оскільки [current_wife.GetName] нездатна народити спадкоємця чоловічої статі, [ROOT.GetCountry.GetGovernment.GetRuler.GetName], розчарувавшись і втомившись від безплідних спроб продовжити династію, захоплюється зовсім іншою людиною — це [anne_boleyn.GetName]. Щоб домогтися її руки, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] відправляє посла з вимогою розірвати чинний шлюб. [GetCountry('PAP').GetGovernment.GetRulerTitle] негайно відповідає відмовою: така вимога суперечить церковному праву. Однак [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не впадає у відчай і шукає інші, більш рішучі заходи укласти шлюб з новою любов'ю… навіть якщо заради цього знадобиться повністю порвати з #L [GetCountry('PAP').GetAdjective|l]ою#! владою."
  flavor_eng.7.a: "Очолимо церкву."
  flavor_eng.7.a.tooltip: "Значна частина #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! [Concept('pops', 'груп населення')|e]звертається в #TOOLTIP:RELIGION,$anglican_tt$,X #L англіканство#!#!"
  flavor_eng.7.tt1: "З'явиться [Concept('character', 'персонаж')|e] [anne_boleyn.GetName]"
  flavor_eng.7.tt2: "[anne_boleyn.GetName] — напориста та честолюбна натура, до того ж не остання людина в придворній політиці. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] ставляться до неї з неприязню"
  flavor_eng.7.b: "Визнаємо верховенство [GetCountry('PAP').Custom('CL_GEN')]."
  flavor_eng.7.tt3: "Виключення її з придворних схвалить [thomas_wolsey.GetName], чий вплив зростає"
  flavor_eng.7.tt4: "[target_root_country.GetGovernment.GetRulerTitle], впавши у невтішне горе, позбудеться злощасної пасії, розуміючи, що мрії про шлюбний союз не збудуться"
  accepted_supremacy_of_rome: "Згода з верховенством папи"
  flavor_eng.7.historical_info: "У 1521 році англійський король Генріх VIII випустив памфлет, що викривав лютеранство, за що удостоївся від папи титулу «Захисник віри». Однак у 1529 році, коли папська курія відмовила королю в розірванні шлюбу з Катериною Арагонською, він залишив свої релігійні пошуки та вирішив ґрунтовно зайнятися питанням престолонаслідування. Так, у відповідь на відмову король позбавив папського легата, кардинала Волсі, всіх його титулів, а потім примусив англійське духовенство визнати себе главою церкви. Після розлучення в 1533 році Генріх одружився з Анною Болейн (за цим шлюбом потім послідувало ще чотири), а 3 листопада 1534 року парламент Англії ухвалив Акт про супрематію, який остаточно закріпив владу короля над церквою."
  flavor_eng.8.title: "Рада адміралтейства"
  flavor_eng.8.desc: "Адміністративними питаннями, що стосуються військово-морських сил, займається #TOOLTIP:GOVERNMENT_REFORM,navy_board_reform,X #L флотська колегія#!#!, однак турбота про повсякденну діяльність нерідко лягає на плечі окремих адміралів. Час заснувати нову раду, яка відповідатиме за єдине командування нашим славним флотом. Постачання та організацію ми залишимо в руках бюрократів."
  flavor_eng.8.a: "Сказано — зроблено."
  flavor_eng.8.b: "Натомість заснуємо військовий комітет."
  flavor_eng.8.historical_info: "Рада адміралтейства (вона ж — просто адміралтейство) виникла як відповідь на потребу морської країни, що набирає сили, мати здібне та впевнене стратегічне керівництво на морі. Адміралтейство відповідало за військові кораблі, а флотська колегія — за їх виробництво та ремонт. Крім того, через адміралтейство пройшло чимало лондонських воєначальників та політичних діячів."
  flavor_eng.9.title: "[kett_rebellion.GetNameWithNoTooltip]"
  flavor_eng.9.desc: "Невелика група незадоволених фермерів з #TOOLTIP:PROVINCE_DEFINITION,norfolk_province,X #L Норфолка#!#! приєдналася до бунтівного руху, який очолює місцевий ерл на ім'я [robert_kett.GetName]. Землероби протестують проти економічної нерівності, до якої призвела політика #TOOLTIP:POLICY,enclosure_allowed,X #L «Обгороджування дозволено»#!#!: спільні землі перегороджуються, фермери, що проживали тут поколіннями, змушені зніматися з місця, у сільській місцевості зростає безробіття. Бунтівники зараз намагаються заручитися підтримкою інших графств, але ми можемо припинити цей рух, відновивши колишній порядок."
  flavor_eng.9.a: "Це все заради їхнього ж блага."
  flavor_eng.9.tt2: "#TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! з #TOOLTIP:PROVINCE_DEFINITION,norfolk_province,X #L Норфолка#!#! об'єднається з незадоволеними землеробами по всій країні, і почнеться збройне повстання"
  kett_rebellion: "Повстання Кета"
  flavor_eng.9.b: "Вимагатимемо прибрати всі огорожі."
  flavor_eng.9.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U]-землевласники протестуватимуть проти порушення прав на свої території"
  flavor_eng.9.historical_info: "Повстання Кета відбулося в англійському графстві Норфолк. Народне невдоволення було викликане політикою обгороджування сільськогосподарських земель — фермери не могли обробляти свої угіддя, що завдало серйозної шкоди як англійському суспільству, так і економіці країни. Заколотники захопили Норідж, однак незабаром зазнали поразки від королівського війська."
  every_location_norfolk_kett_rebellion_tt: "Кожна належна нам [Concept('location', 'місцевість')|e] #TOOLTIP:PROVINCE_DEFINITION,norfolk_province,X #L Норфолка#!#! отримує модифікатор «[ShowModifier('kett_rebellion')]» на #W 5 років#!"
  flavor_eng.10.title: "Погляд згори"
  flavor_eng.10.desc: "[target_location.GetRank.GetName|U] [target_location.GetName] — благополучний центр, де кипить життя та процвітає торгівля. Але #L [ROOT.GetCountry.GetAdjective|l]і#! [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] не мають над ним жодної влади: споконвіку жадібні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] володіють винятковими правами на Вестмінстер. Немає такої вулиці чи ринку, де не панували б торговці чи купці. Саме вони вирішують, як саме [target_location.GetRank.GetNameWithNoTooltip|l] буде рости та розвиватися.\n\nЩоб зміцнити своє становище та відновити порядок, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] повинні вигадати хитромудрий план. Серед таких задумів — будівництво на березі річки поруч із грізним Тауером значних покоїв, де проживатиме [target_ruler.GetName]. Звідти [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зможе оглядати місто, і тоді [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] неодмінно зрозуміють, кому тут насправді належить влада."
  flavor_eng.10.a: "Чудовий вид на зрадників."
  flavor_eng.10.b: "Поступимося владою заради співпраці."
  flavor_eng.10.c: "Відстоїмо свої права силою."
  flavor_eng.10.historical_info: "Башта Святого Фоми, також відома як Ворота зрадників, — одна з башт лондонського Тауера. Вона звернена до Темзи і колись слугувала входом, через який до Тауера річкою привозили обвинувачених у державній зраді. Король Едуард I, який побудував її в XIII столітті, хотів не лише зміцнити оборону міста та забезпечити прямий доступ до Темзи, а й спорудити тут покої, якими могли б користуватися англійські монархи."
  flavor_eng.11.title: "[target_location.GetNameWithNoTooltip]-апон-Твід: [target_location.GetRank.GetNameWithNoTooltip|l] непостійності"
  flavor_eng.11.desc: "Нещодавно завойована [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] на кордоні таких країн, як [ROOT.GetCountry.GetName] та [GetCountry('SCO').GetLongName], вже давно є предметом чвар. Але, як не дивно, життя там процвітає, а постійні потоки товарів та людей, що переміщуються через кордон, незмінно приносять прибуток місцевим торговцям та купцям.\n\nОднак відносини між країнами залишаються напруженими, тому [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] опинилися в скрутному становищі: чи варто вкладати в це поселення додаткові кошти, щоб воно продовжувало розвиватися, чи краще буде проявити обережність та приготуватися до неминучого конфлікту?"
  flavor_eng.11.a: "Побудуємо фортецю для захисту кордону."
  flavor_eng.11.b: "Відродимо місцеву економіку."
  flavor_eng.11.c: "Нехай розвалюється."
  flavor_eng.11.historical_info: "Берік-апон-Твід — найпівнічніше місто Англії. Його вигляд склався під впливом обставин: місто розташоване в стратегічно важливому місці, на кордоні між Англією та Шотландією. У Середньовіччі влада над ним неодноразово переходила з рук в руки. У роки правління королеви Єлизавети особлива увага почала приділятися оборонним спорудам: завдяки досягненням технічного поступу там з'явилося кілька нових фортечних валів. Ворожнеча за право володіти Беріком закінчилася лише в 1707 році після підписання Акта про унію."
  flavor_eng.12.title: "Виступ лорда-наглядача"
  flavor_eng.12.desc: "Виступ лорда-наглядача — грандіозна морська вистава, яку можна провести скрізь, де є #TOOLTIP:BUILDING_TYPE,cinque_port,X #L один із П'яти портів#!#!. Такою виставою лорд-наглядач демонструє майстерність, а заодно віддає належне своєму флотському корінню. Виступи проходять раз на кілька років і незмінно приваблюють безліч глядачів з усього світу, зокрема іноземних сановників і торговців. Цього року він відбудеться в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Проявивши деяку старанність, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] можуть зробити його по-справжньому незабутнім і прославити ім'я П'яти портів — грізних захисників англійського узбережжя."
  flavor_eng.12.a: "Восхвалимо жителів П'яти портів, влаштувавши пишну церемонію."
  flavor_eng.12.b: "Організуємо захопливу морську виставу."
  flavor_eng.12.c: "Відремонтуємо порти."
  flavor_eng.12.d: "Усе це — пережитки минулого."
  flavor_eng.12.tt1: "Будуть занедбані всі порти, оскільки погляди на їхній внесок змінилися, а звичні святкування скасовані"
  flavor_eng.12.tt2: "Один порт буде занедбаний, оскільки вважається пережитком минулого"
  flavor_eng.12.tt3: "Традиція відімре"
  decline_of_cinque_ports_tt: "Споруди #TOOLTIP:BUILDING_TYPE,cinque_port,X #L одного з П'яти портів#!#! занепадають"
  flavor_eng.12.historical_info: "Виступ лорда-наглядача — хода, за звичаєм пов'язана з ім'ям лорда-наглядача П'яти портів і яка слугувала церемоніальною демонстрацією його влади. Сьогодні вона влаштовується щорічно на пам'ять про історичну спадщину П'яти портів."
  flavor_eng.13.title: "Великий розкол"
  flavor_eng.13.desc: "Останнім часом жителі на півночі нашої країни почали все частіше виявляти неприязнь до південців: вони вважають, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] забули про потреби північан. Такий розкол загрожує підірвати народну єдність. Ми можемо або умиротворити жителів північних регіонів, вклавши кошти в розвиток інфраструктури та пояснивши народу, що своєрідність північної культури — предмет гордості нашої країни, або приділити увагу півдню: [ROOT.GetCountry.GetLongNameWithNoTooltip] стан[ROOT.GetCountry.Custom('endlong_etut')] значно сильнішою, якщо правильно розпорядиться південними багатствами."
  flavor_eng.13.a: "Вкладемо кошти в північ."
  flavor_eng.13.b: "Зміцнимо південь."
  flavor_eng.13.c: "Виберемо компромісний варіант."
  flavor_eng.13.a.custom: "Кожна [Concept('location', 'місцевість')|e] у #TOOLTIP:AREA,northumbria_area,X #L Нортумбрії#!#! починає [Concept('prosperity', 'процвітати')|e]"
  flavor_eng.13.b.custom: "Кожна [Concept('location', 'місцевість')|e] у #TOOLTIP:AREA,home_counties_area,X #L центральних графствах#!#! починає [Concept('prosperity', 'процвітати')|e]"
  flavor_eng.13.c.custom: "Кожна [Concept('location', 'місцевість')|e] у #TOOLTIP:AREA,midlands_area,X #L Мідлендсі#!#! починає [Concept('prosperity', 'процвітати')|e]"
  flavor_eng.13.historical_info: "Протягом багатьох століть могутнє північне королівство Нортумбрія існувало окремо від Англії, розвивало свою культуру та вело самостійну політику. Хоча згодом воно виявилося завойованим, культурний бар'єр між північчю та півднем існує й сьогодні."
  flavor_eng.14.title: "Закриття дочірніх монастирів"
  flavor_eng.14.desc: "[GetCountry('FRA').GetLongName] — постійне джерело ворожості для нас, тому [ROOT.GetCountry.GetGovernment.GetRuler.GetName] приймає рішення закрити всі дочірні монастирі на [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ій території. Кожен такий #TOOLTIP:BUILDING_TYPE,monastery,X #L монастир#!#!#! перебуває під управлінням [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их «материнських» монастирів, а тому існування подібних закладів безпосередньо загрожує безпеці країни. Настоятелів і ченців пропонується вигнати, а самі монастирі — розпустити.\n\nДоходи від їхньої діяльності, які перестануть надходити [GetCountry('FRA').Custom('CL_GEN')], можна спрямувати на підтримку [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их релігійних установ, або ж [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] можуть пустити ці кошти на підтримання бойових дій."
  flavor_eng.14.a: "Наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] потребують підтримки."
  flavor_eng.14.b: "Нашим лікарням терміново потрібні фінанси."
  flavor_eng.14.c: "Наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] цього заслуговують."
  flavor_eng.14.historical_info: "Закриття дочірніх монастирів нерідко відбувалося в періоди конфліктів або охолодження відносин із Францією задля обмеження (або повного усунення) впливу закордонних релігійних установ на життя в Англії. Зазвичай закриття супроводжувалися вигнаннями ченців або черниць та конфіскацією власності."
  flavor_eng.15.title: "[jane_grey.GetNameWithNoTooltip] та її підступи"
  flavor_eng.15.desc: "Заручившись допомогою членів родини, по-#TOOLTIP:RELIGION,$anglican_tt$,X #L англіканськи#!#! хитромудра [jane_grey.GetName], якій [target_ruler.GetName] доводиться [Select_CString(target_ruler.IsFemale,'дальньою родичкою', 'дальнім родичем')], висуває претензії на #L [ROOT.GetCountry.GetAdjective|l]ий#! престол. Попри деякі сумніви самої претендентки, а також відсутність народної підтримки, у #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленді#!#! все ж таки збирається значна кількість послідовників, готових коронувати свою леді проти волі чинної влади."
  flavor_eng.15.a: "Її претензії безпідставні!"
  flavor_eng.15.tt1: "З'явиться [Concept('character', 'персонаж')|e] [jane_grey.GetNameWithNoTooltip]"
  jane_grey_support: "Прихильники Джейн Грей"
  STATIC_MODIFIER_NAME_grey_support: "Підтримка Джейн Грей"
  jane_grey_support_nobles_joining: "Усі #TOOLTIP:POPTYPE,nobles,X #L аристократи#!#! з #TOOLTIP:AREA,northumbria_area,X #L Нортумбрії#!#!, які сповідують #TOOLTIP:RELIGION,$anglican_tt$,X #L англіканство#!#!, підтримають [jane_grey_support.GetName]"
  flavor_eng.15.b: "Запропонуємо стати в чергу на спадщину."
  flavor_eng.15.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] будуть проти призначення єретички спадкоємицею"
  flavor_eng.15.c: "До Тауера її, та якомога швидше."
  flavor_eng.15.tt3: "Таємна поліція, якій надають посильну допомогу могутні [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l], ув'язнить леді та там стратить без суду й слідства"
  flavor_eng.15.historical_info: "Леді Джейн Грей, онука Марії — молодшої сестри короля Генріха VIII, претендувала на англійський престол. У 1553 році її насильно видали заміж за лорда Гілфорда Дадлі, сина герцога Нортумберленда. Сам герцог, тоді регент Едуарда VI, переконав смертельно хворого короля підписати документ, що виключає дочок Генріха VIII — Марію I та Єлизавету I з черги на престол на користь Джейн, таким чином продовживши свої повноваження. 10 липня 1553 року Джейн Грей оголосили королевою, проте правління її тривало лише дев'ять днів. Війська герцога Нортумберленда перейшли на бік Марії — католички, яка зуміла завдяки своєму віросповіданню заручитися підтримкою населення."
  flavor_eng.16.title: "Кривавий союз"
  flavor_eng.16.desc_common: "Союз, укладений між [ROOT.GetCountry.Custom('CL_INST'] та #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!, створив лише видимість благополуччя. Неможливо заплющувати очі на релігійні розбіжності: [target_country.GetAdjectiveWithNoTooltip|l]ий народ споконвіку сповідує #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, тоді як на наших берегах переважає [religion.GetName|l]."
  flavor_eng.16.desc_castilian_power: "$flavor_eng.16.desc_common$ [target_country.GetLongNameWithNoTooltip] — неймовірно потужна країна, тому нам, можливо, доведеться повернутися в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#! і проти власної волі підтримати тих, кого очолює [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle]. Інакше інша сторона може розірвати всі чинні зараз договори."
  flavor_eng.16.desc_catholic_ruler: "$flavor_eng.16.desc_common$ [target_ruler.GetName] — [Select_CString(target_ruler.IsFemale,'затята прихильниця', 'затятий прихильник')] католицтва, а тому вперто намагається змусити нас повернутися в лоно #L [GetCountry('PAP').GetAdjective]ої#! церкви. Таким чином [Select_CString(target_ruler.IsFemale,'вона', 'він')] переслідує одразу дві цілі: викорінити єресь та зберегти дію договорів."
  flavor_eng.16.a: "Відновимо папську владу."
  flavor_eng.16.b: "Наполягатимемо на принципі свободи віросповідання."
  eng_tolerates_religious_freedom: "Терпимість до свободи віросповідання"
  flavor_eng.16.historical_info: "У 1554 році королева-католичка Марія I вийшла заміж за іспанського короля Філіпа II. Завдяки цьому шлюбу обом сторонам — і Англії, і Іспанії — відкрилися нові широкі можливості; так, парламент навіть подарував Філіпу титул короля Англії, хоча реальної влади над країною той не мав. При цьому термінового рішення вимагало релігійне питання: Акт про супрематію затвердив владу монарха над церквою, але англійське суспільство виявилося розколотим. Католики вимагали визнати папський авторитет, протестанти ж виступали за більш вільний підхід. Марія вирішила прийняти сторону католиків, після чого країну захлеснула хвиля терору. Королева назавжди увійшла в історію під прізвиськом «Кривава»."
  flavor_eng.17.title: "Московська компанія"
  flavor_eng.17.desc: "Кораблі морської експедиції, що прямувала на північний захід до #TOOLTIP:CONTINENT,asia,X #L Азії#!#!, зазнали аварії біля узбережжя #TOOLTIP:LOCATION,arkhangelsk,X #L Архангельська#!#!. Тут вижилі під керівництвом відомого дослідника на ім'я [richard_chancellor.GetName], за деякими донесеннями, почали вести торгівлю з місцевими слов'янами. Нам слід заснувати торговельну компанію та встановити зв'язки з #L [target_country.GetAdjective|l]ою#! країною, оскільки #TOOLTIP:GOODS,fur,X #L хутро#!#! — прибутковий товар, а нам не хотілося б упускати свою частку прибутку."
  flavor_eng.17.a: "Дуже вдала нагода."
  flavor_eng.17.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [richard_chancellor.GetNameWithNoTooltip]"
  flavor_eng.17.b: "Нехай дають собі раду самі."
  flavor_eng.17.tt2: "[richard_chancellor.GetNameWithNoTooltip] пропаде безвісти"
  flavor_eng.17.historical_info: "У 1553 році англійська торговельна компанія купців-мандрівників відправила до Китаю три кораблі. Прокласти торговельний шлях передбачалося через Північно-східний морський шлях. Два кораблі було втрачено; третій же, «Едуард Бонавентура», дістався Білого моря, після чого став на якір біля Архангельська, звідки команду відправили на санях до Москви. Ці події поклали початок заснуванню Московської компанії — підприємства, що відіграло чималу роль у російському хутровому промислі."
  flavor_eng.18.title: "[francis_walsingham.GetNameWithNoTooltip] веде таємну гру"
  flavor_eng.18.desc: "[francis_walsingham.GetName] — справжній павук, що обплутав своєю мережею всю #TOOLTIP:CONTINENT,europe,X #L Європу#!#!. #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! оточують вороги — як всередині, так і ззовні, а тому талант до вишукування інформаторів у європейських країнах потрібно поставити на службу країні. Крім того, [francis_walsingham.GetName] досить жорстокий — можливо, ця якість змусить супротивників поводитися обережніше."
  flavor_eng.18.a: "Він майстер таємних зв'язків."
  flavor_eng.18.b: "Йому не можна довіряти."
  flavor_eng.18.tt2: "Якщо [francis_walsingham.GetNameWithNoTooltip] буде звільнений, інші країни вважатимуть це примирливим жестом"
  flavor_eng.18.historical_info: "Сер Френсіс Волсінгем служив особистим секретарем королеви Єлизавети I. Головним його досягненням можна вважати бездоганну організацію роботи розвідки та контррозвідки, яка успішно запобігала всім замахам на життя королеви, а також іншим політичним і дипломатичним змовам. Волсінгем ненавидів Іспанію та протегував Френсісу Дрейку: перші напади на іспанців цей знаменитий капер здійснював переважно на кошти сера Френсіса."
  flavor_eng.19.title: "Валютні реформи Томаса Грешема"
  flavor_eng.19.desc: "Фінансист [thomas_gresham.GetName] — досвідчений торговець, що чимало разів бував за кордоном. Він попередив нас про те, як небезпечна зміна складу грошей, наприклад зниження вмісту дорогоцінних металів або додавання дешевших. Замість цього Грешем радить встановити стандарти для складу, ваги та якості монет, щоб ми могли стабільно випускати надійну валюту. Залишилося лише знайти таку посаду, де Томас зможе повною мірою розкрити свій талант: валютна стабільність піде нам тільки на користь."
  flavor_eng.19.a: "Запросимо його до двору."
  flavor_eng.19.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_gresham.GetNameWithNoTooltip]"
  flavor_eng.19.b: "Призначимо його стежити за дотриманням законодавства."
  flavor_eng.19.tt2: "[thomas_gresham.GetNameWithNoTooltip] стежитиме за дотриманням законів, що забороняють підробку валюти та інші шахрайські дії, щоб зміцнювати фінансову стабільність"
  flavor_eng.19.c: "Призначимо його нашим фінансовим агентом за кордоном."
  flavor_eng.19.tt3: "[thomas_gresham.GetNameWithNoTooltip] вирушить за кордон на чолі делегації, завдання якої — відвідати великі фінансові центри та закласти основи для сучасних валютних систем"
  flavor_eng.19.d: "Він занадто нерішучий."
  flavor_eng.19.tt4: "[thomas_gresham.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_eng.19.historical_info: "Томас Грешем — англійський фінансист, що жив в добу Тюдорів. Він здобув освіту в Кембриджському університеті та завдяки своїм непересічним підприємницьким якостям зумів не тільки розбагатіти, а й отримати в 1551 році посаду агента при дворі Едуарда VI. Цю посаду він зберіг і в роки правління Єлизавети I. Діяльності Грешема перешкоджало знецінення англійської валюти по відношенню до валют інших країн, проте він гідно подолав ці труднощі та стабілізував фінансову систему країни."
  flavor_eng.20.title: "[northern_rebellion.GetNameWithNoTooltip]"
  flavor_eng.20.desc: "Після того, як впливові #TOOLTIP:PROVINCE_DEFINITION,norfolk_province,X #L норфолкські#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] були заарештовані та ув'язнені в #TOOLTIP:LOCATION,london,X #L лондонський#!#! Тауер, на політичній арені почалися заворушення. Ця облава була нічим іншим, як спробою придушити зростаючий #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! рух у #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленді#!#! та #TOOLTIP:PROVINCE_DEFINITION,westmorland_province,X #L Вестморленді#!#! — провінціях, густо населених єретиками. У відповідь місцеві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] [thomas_percy.GetName] та [charles_neville.GetName] оголосили про намір знову навернути [ROOT.GetCountry.Custom('rank_ru_ACC')] до істинної віри та підняли заколот. Збройне повстання не закінчиться, доки ми не відпустимо дворян або не підемо на переговори з головними бунтівниками."
  flavor_eng.20.a: "Залишимо схоплених дворян у Тауері."
  northern_rebellion: "Північне повстання"
  flavor_eng.20.b: "Підемо на переговори."
  flavor_eng.20.c: "Звільнимо ув'язнених."
  flavor_eng.20.tt3: "Випустивши ув'язнених дворян на волю, ми заспокоїмо бунтарів, однак католицький рух на півночі тільки зміцниться"
  flavor_eng.20.historical_info: "Спробам королеви Єлизавети І насадити в Англії релігію протестантського штибу — англіканство — завадила поява в її королівстві втікачки Марії Стюарт, яка звернулася до Єлизавети по допомогу. Марія була католичкою і претендувала на престол, тому Єлизавета ув'язнила втікачку. Після цього Марія стала центральною фігурою змов проти чинної королеви; висувалися навіть пропозиції видати її за Норфолка, єдиного герцога Англії. Герцог Норфолк виявився недостатньо розторопним, а тому теж потрапив під арешт. Єлизавета запідозрила, що в змові брали участь інші дворяни — графи Нортумберленд, Вестморленд і Камберленд. На раптовий виклик до Лондона графи відповіли відмовою, а 9 листопада 1569 року підняли заколот. На повстання проти влади Тюдорів королева Єлизавета відповіла різко — аж до застосування страт. Однак, попри це, католицизм надійно зміцнився на півночі. Католиків чекало ціле десятиліття утисків."
  every_pop_in_province_pop_satisfaction_ultimate_penalty_and_northern_rebellion_tt: "Усі [Concept('pop', 'групи населення')|e] в цій [Concept('province', 'провінції')|e], що сповідують [ShowReligionAdjectiveWithNoTooltip('catholic')|l]у віру та не підтримують інших [Concept('rebel', 'заколотників')|e], втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e] та приєднаються до фракції «[northern_rebellion.GetName]»."
  flavor_eng.21.title: "Сварливі ділки"
  flavor_eng.21.desc: "Торгівля в громадських місцях, що супроводжується гучним шумом, а іноді навіть бійками серед торговців, — звичне видовище. Однак цей ринок розрісся настільки, що вже неможливо обходитися без установи, яка гарантує, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] отримуватимуть належну їм частку від торгівлі. Відповідно, необхідно заснувати інститут, який організовуватиме діяльність маклерів, сприятиме процвітанню #L [ROOT.GetCountry.GetAdjective|l]ої#! торгівлі та боротиметься з несанкціонованою діяльністю."
  flavor_eng.21.a: "Будемо грати на збільшення показників."
  flavor_eng.21.b: "Нехай собі б'ються та кричать."
  bawdy_trading: "Вульгарна торгівля"
  flavor_eng.21.historical_info: "У 1571 році було засновано лондонську фондову біржу. У XVI–XVII століттях її вплив був малопомітним, а діяльність скромною, однак з часом вона перевершила навіть свою амстердамську конкурентку, а до XVIII століття стала найдіяльнішою біржею в усій Європі. Лондонська біржа чимало посприяла розвитку англійської торгівлі, економіки та виробництва, а також завжди була готова надати охочим позику."
  flavor_eng.22.title: "Скасування [ROOT.GetCountry.GetGovernment.GetAdjective|l]их монополій"
  flavor_eng.22.desc: "У воєнний час на перший план виходить необхідність, а не справедливість. [target_character.GetName] знає про це не з чуток: [Select_CString(target_character.IsFemale,'її', 'його')] друзі вже давно отримують вигоду зі зв'язків з [ROOT.GetCountry.GetGovernment.GetAdjective|l]ою владою. [ShowEstatePrivilegeName('trade_monopolies')|U], якими щосили користуються [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], посилюють корупцію та кумівство, що дуже не подобається місцевому населенню, а ситуацію у війні з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! у кращому випадку можна назвати тупиковою, у гіршому — катастрофічною. Невдоволення зростає в геометричній прогресії, і пропозиції скасувати монополії звучать дедалі гучніше."
  flavor_eng.22.historical_info: "До кінця правління Єлизавети І її колишня популярність почала зменшуватися. Англо-іспанська війна тягнулася з самого 1585 року без виразних перспектив, виснажуючи фінанси Англії та бойовий дух вояцтва. Усередині країни справи були не кращими: парламент дедалі більше противився королівській владі через повсюдну корупцію навколо монополій, які Єлизавета дарувала своїм фаворитам. У 1601 році, коли конфлікт з монополіями досяг піку, королева виголосила знамениту «Золоту промову», переконуючи слухачів у своїй любові до підданих. Однак це останнє звернення прозвучало в розпал запеклої суперечки, і Єлизавета була змушена визнати поразку та замовкнути."
  flavor_eng.22.a: "Скасувати їх!"
  flavor_eng.22.b: "Нам байдуже до цих скигліїв."
  flavor_eng.23.title: "[target_character.GetNameWithNoTooltip] піднімає заколот"
  flavor_eng.23.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'виросла', 'виріс')] у [ROOT.GetCountry.Custom('CL_PREP')] і до недавніх пір вірно [Select_CString(target_character.IsFemale,'служила', 'служив')] [ROOT.GetCountry.Custom('rank_ru_DAT')], обіймаючи посаду в [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ому уряді #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!. Однак останнім часом [target_character.GetName] бунтує проти багатьох наших наріжних принципів. Об'єднавшись з іншими ірландськими лідерами та заручившись підтримкою іноземців, [Select_CString(target_character.IsFemale,'вона підняла', 'він підняв')] повстання проти своїх панів. Такий віроломний вчинок призвів до дестабілізації внутрішньої політики та поставив під загрозу нашу владу!"
  flavor_eng.23.historical_info: "Ірландець Г'ю О'Ніл переселився до Англії в 60-х роках XVI століття. Там він обіймав урядову посаду, а в 1594 році втомився від англійської політики постійного стравлювання ірландських вождів між собою і, не зумівши домогтися повернення земель свого діда, підняв повстання. Зрештою О'Ніл об'єднав ірландських вождів і звернувся до католицької Іспанії по допомогу в боротьбі з протестантською Англією. Вже приблизно через рік він уклав крихкий, але дієвий союз і розбив найкращих полководців контингенту Єлизавети в Ірландії. Однак у 1601 році сам зазнав поразки при спробі дістатися до іспанських сил у Кінсейл. Союзники О'Ніла розбіглися, і він був змушений відступити до Ольстера. У 1603 році він уклав з Англією мир і відмовився від повноважень вождя. Король Яків І незабаром помилував заколотника."
  flavor_eng.23.a: "Нам не смішно!"
  irish_pops_rise_up_tt: "[Concept('pop_satisfaction', 'Вдоволення')|e] ірландських [Concept('pops', 'груп населення')|e] в усіх належних нам [Concept('location', 'місцевостях')|e] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]. Населення підтримає [tyrone_rebels.GetName]."
  tyrone_rebellion: "Тиронське повстання"
  flavor_eng.24.title: "[ShowGovernmentReformNameWithNoTooltip('petition_of_rights')]"
  flavor_eng.24.desc: "[target_character.GetShortName] та [ROOT.GetCountry.GetGovernment.GetParliament.GetName] вступили в конфронтацію. Наслідком цих розбіжностей став сміливий документ [ShowGovernmentReformName('petition_of_rights')], складений представниками наших станів. Автори законопроєкту вимагають обмежити [ROOT.GetCountry.GetGovernment.GetAdjective|l]у владу. Якщо закон буде прийнято, [target_character.GetNameWithNoTooltip] позбудеться цілої низки повноважень, зокрема права розміщувати вояків у приватних будинках, оголошувати воєнний стан у мирний час і безпричинно позбавляти людей свободи. Прийняття цього закону знизить напругу пристрастей, але послабить нашу владу, а відмова його підписати зміцнить [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий авторитет, але погано позначиться на наших відносинах з парламентом."
  flavor_eng.24.historical_info: "У 1628 році у відповідь на свавілля короля Карла І, арешти без суду і слідства та грошові розтрати англійський парламент ухвалив Петицію про право. Вона обмежувала право короля на введення податків без згоди парламенту. Крім цього, документ забороняв розквартировувати війська в приватних будинках, вводити воєнний стан у мирний час, а також без суду ув'язнювати англійських підданих."
  flavor_eng.24.a: "Підпишемо."
  flavor_eng.24.b: "Не підписуватимемо."
  flavor_eng.25.title: "Конфлікт у парламенті"
  flavor_eng.25.desc: "З того моменту, як ми стали на шлях абсолютизму, напруга в [ROOT.GetCountry.Custom('rank_ru_PREP')] неухильно зростає. [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий двір без сорому зловживає владою, не зважаючи на давні традиції. [ROOT.GetCountry.GetGovernment.GetParliament.GetName] ситі по горло цією поведінкою.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] творить що заманеться, і єдиний спосіб вгамувати [Select_CString(target_character.IsFemale, 'її', 'його' )] — пред'явити [Select_CString(target_character.IsFemale, 'їй', 'йому' )] ультиматум з вимогою припинити беззаконня. Люди побоюються, що скоро нас чекає анархія та громадянська війна. Багато наших громадян вже приєдналися до групи заколотників [target_rebel.GetName]."
  flavor_eng.25.historical_info: "У XVI столітті Палата громад ставала більшою та впливовішою, а Палата лордів залишалася нечисленною. Єлизавета I підтримувала баланс у Парламенті, вміло поєднуючи рішучість та переговори. Але наступникам королеви, Якову I та Карлу I, не вдалося повторити її успіх. Парламент заперечував проти королівського контролю над релігією, правосуддям та податками. Напруга посилилася, коли Яків вирішив укласти союз із католиками через шлюб свого сина. У 1628 році парламент випустив Петицію про право, щоб обмежити королівську владу. Карл I розпустив парламент у 1629 році і з того часу 11 років правив одноосібно. У 1642 році його деспотичне правління призвело до громадянської війни, що розділила країну на прихильників короля та парламенту."
  flavor_eng.25.a: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] нам не указ. Жодних переговорів!"
  flavor_eng.25.b: "Члени [GovernmentView.GetPlayer.GetParliament.Custom('parliament_ru_GEN')|l] висувають ультиматум? Краще піти на поступки…"
  parliamentary_rebellion: "Парламент повстає"
  flavor_eng25_rebellion_tt: "Приблизно #Y [ROOT.GetVariable('total_rebel_pops_variable').GetValue|V0]K#! [Concept('pops', 'населення')|e] з [ROOT.GetVariable('total_affected_provinces_variable').GetValue] [Concept('provinces', 'провінцій')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, зокрема з провінції [target_province.GetName], приєднуються до фракції «[target_rebel.GetName]»"
  flavor_eng.26.title: "[ShowPolicyNameWithNoTooltip('act_of_navigation')]"
  flavor_eng.26.desc: "Море — головна артерія [ROOT.GetCountry.Custom('rank_ru_GEN')]. На жаль, купці з #ONCLICK:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')] #TOOLTIP:COUNTRY,[TARGET_COUNTRY.Custom('CL_tt')],X [TARGET_COUNTRY.Custom('CL_GEN')|L]#!#! тримають усю торгівлю у своїх руках, а ми не можемо їм нічого протиставити. Наприклад, у #TOOLTIP:LOCATION,london,X #L Лондоні#!#! жадібні [target_country.GetAdjectiveWithNoTooltip|l]і купці практично захопили ринок. Якби не вони, ми б уже давно досягли успіху. [target_character1.GetName] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вирішили діяти.\n\nВони розробили #TOOLTIP:POLICY,act_of_navigation,X #L «Навігаційний акт»#!#! — новий сміливий закон, пройнятий духом меркантилізму, який заборонить голландським купцям ввозити товари до нашої країни. Звісно, [target_character2.GetName] буде в люті. Однак деякі вважають цей крок занадто радикальним. Він неминуче призведе до зміни балансу сил і може спровокувати конфлікт."
  flavor_eng.26.historical_info: "У 1651 році Кромвель, лорд-протектор Англійської республіки, видав Навігаційний акт для обмеження голландської посередницької морської торгівлі. За цим документом усі товари мали ввозитися або вивозитися з Англії лише на англійських кораблях, що зміцнювало винятковість Англії як колоніальної країни. Це стало причиною англо-голландських війн у 1652–1654 роках та в 1665–1667 роках. За Бредською угодою 1667 року Англія в обмін на Голландську Гвіану отримала Новий Амстердам, згодом перейменований на Нью-Йорк. Навігаційний акт був дещо змінений, проте продовжував забезпечувати панування Англії на морі та швидке розширення її колоніальної торгівлі."
  flavor_eng.26.a: "Ухвалимо такий закон."
  flavor_eng.26.b: "Поки чинна політика нас влаштовує…"
  flavor_eng.27.title: "Декрет про індульгенцію та Акт про присягу"
  flavor_eng.27.desc: "Релігійні перестановки в #TOOLTIP:CONTINENT,europe,X #L Європі#!#! не оминули й [ROOT.GetCountry.Custom('rank_ru_ACC')]. Після переходу в [ROOT.GetCountry.GetReligion.GetName] люди, втомлені від панування #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви, щосили намагаються знизити її вплив та приструнити духовенство. Все частіше чути голоси, що вимагають конфіскувати їхнє майно та обмежити свободу віросповідання. [ROOT.GetCountry.GetGovernment.GetCourtTitle] метається між двох вогнів. Влада ніяк не може вирішити, що їм більше до вподоби: політика терпимості чи придушення тих, хто не виявив би до нас ані краплі милосердя, якби мав таку можливість."
  flavor_eng.27.historical_info: "Карл II сповідував католицтво потай, а його брат Яків II — відкрито. У 1672 році Карл видав Декларацію про індульгенцію, щоб послабити обмеження для розкольників та католиків. Він керувався не лише особистими мотивами, а й бажав таким чином отримати підтримку Франції, як і будь-який монарх, що схиляється до католицтва. Натомість він таємно отримав від Франції велику суму за угодою, прийнятою без відома парламенту. Приблизно в цей же час парламент прийняв Акт про присягу. Цей документ забороняв обіймати державні посади всім, крім англікан, зокрема католикам, і дозволяв переслідувати їх. Після цього Якова II вимагали виключити з лінії престолонаслідування, але ця спроба в підсумку провалилася."
  flavor_eng.27.a: "Свобода віросповідання має бути у всіх."
  flavor_eng.27.b: "[ROOT.GetCountry.GetReligion.GetNameWithNoTooltip] пануватиме над усіма!"
  flavor_eng.27.c: "Нам варто прийняти католицтво."
  flavor_eng.28.title: "Створення нового банку"
  flavor_eng.28.desc: "Останнім часом у [ROOT.GetCountry.Custom('rank_ru_PREP')] назріває протиріччя між станом державної скарбниці та необхідністю спонсорувати нові війни. Щоб вирішити його, купці та фінансисти запропонували заснувати національний банк, який зміцнить валюту та структурує державний борг. Крім того, [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName] отримає можливість брати позики. Однак деякі громадяни [ROOT.GetCountry.Custom('rank_ru_GEN')] не підтримують цю ініціативу. Вони побоюються, що приватні фінансисти отримають занадто багато влади, а звичні джерела кредитування значно скоротяться."
  flavor_eng.28.historical_info: "Банк Англії був заснований у 1694 році у відповідь на зростаючі фінансові потреби у зв'язку з дорогими війнами. Досить швидко він завоював репутацію серйозної та надійної установи. Він чимало посприяв зміцненню британського фунта стерлінгів в добу, коли розорення урядів та псування монет в інших країнах були цілком звичними явищами. Завдяки діям Банку Англії британська економіка у XVIII–XIX століттях повільно, але вірно зростала — а відповідно, зростала і її частка у світовій економіці; заодно у британського уряду з'явилися нові можливості залучати кошти на ведення бойових дій."
  flavor_eng.28.a: "Заснуємо цей банк."
  flavor_eng.28.b: "Не будемо поспішати."
  flavor_eng.29.title: "[jacobite_uprising.GetNameWithNoTooltip]"
  flavor_eng.29.desc: "[target_character.GetName] та інші #TOOLTIP:CULTURE,$highland_tt$,X #L горяни#!#! підняли чергове повстання. Тисячі людей приєднуються до групи заколотників, що отримала назву «[jacobite_uprising.GetName]». Вони вимагають, щоб [target_sitting_ruler.GetName] [Select_CString(target_sitting_ruler.IsFemale, 'склала', 'склав')] свої повноваження, а трон [Select_CString(target_character.IsFemale, 'зайняла', 'зайняв')] [target_character.GetShortNameWithNoTooltip]. Ми без труднощів усунемо загрозу нашій владі, придушивши заколот у зародку!"
  flavor_eng.29.historical_info: "У 1715 році граф Мар підняв повстання якобітів. До кінця вересня він майже цілком підкорив Шотландське високогір'я. Графське військо налічувало 5000 чоловік і щодня поповнювалося новими добровольцями. Однак слід зазначити, що заколотники спочатку не вважали за потрібне повідомити про це підтримуваного ними короля. Яків III, відомий під прізвиськом Старий претендент, навіть не знав про конфлікт, що розгорнувся. Коли до монарха нарешті відправили гінця, граф Мар, продовжуючи збирати прихильників, вже рушив до Перта, захопив місто і заснував там свій штаб. Тим часом на півдні збиралося нове військо якобітів. Дізнавшись про це, Яків III почав готуватися до поїздки до Шотландії на церемонію коронації. До початку листопада північне військо якобітів налічувало вже близько 12 000 чоловік (в основному шотландських горян). Граф вирішив рушити на південь, де його зустріло військо герцога Аргайла — останній контингент урядових військ у Шотландії. Якобітське військо, яка не могло похвалитися наявністю вмілих полководців, розділилося: південне вирушило розоряти Ланкашир замість того, щоб вдарити у фланг воякам герцога. В результаті 13 листопада значно менші сили під командуванням Аргайла розгромили північне військо якобітів при Шеріфмурі. Південне ж військо зазнало поразки біля Престона від інших англійських урядових сил. Якобіти були змушені відступити до Перта і чекати прибуття головнокомандувача. Нарешті, 22 грудня з Дюнкерка прибув сам Старий претендент, проте до цього часу герцог Аргайл вже отримав підкріплення в особі свіжих досвідчених бійців і готувався до маршу на північ. Король Яків III, провівши в Шотландії півтора місяця, змушений був відступити."
  flavor_eng.29.a: "Ми їх розгромимо!"
  jacobite_uprising: "Повстання якобітів"
  jacobite_uprising_joining: "Усі #TOOLTIP:CULTURE,$highland_tt$,X #L гайлендські#!#! [Concept('pops', 'групи населення')|e] в #TOOLTIP:AREA,scottish_highlands_area,X #L Гайленді#!#! підтримають групу заколотників «[jacobite_uprising.GetName]»"
  flavor_eng.30.title: "[robert_walpole.GetNameWithNoTooltip]"
  flavor_eng.30.desc: "Управління країною — це вічний пошук рівноваги між дипломатією та м'якою силою. Того, хто досконало опанує це мистецтво, не піддавшись дурману влади, чекає велике політичне майбутнє в місті [ROOT.GetCountry.GetCapital.GetName]. Останнім часом при дворі все частіше обговорюють людину на ім'я [robert_walpole.GetName]. Кажуть, що під час переговорів [Select_CString(robert_walpole.IsFemale, 'вона зайняла', 'він зайняв')] тверду та виважену позицію, продемонструвавши видатну розсудливість та політичну кмітливість."
  flavor_eng.30.historical_info: "У 1708 році Роберт Волпол, граф Орфорд (1676–1745), став міністром у військових справах, але втратив посаду після корупційного скандалу з військовими контрактами. Однак у 1714 році, коли владу отримала Ганноверська династія, граф повернув колишнє становище і швидко став важливою політичною фігурою. Виступаючи за збереження миру та рівноваги в Європі, у 1721–1742 роках він блискуче проявив себе в англійській політиці на посаді першого лорда-скарбника та канцлера скарбниці. Фактично лорд Волпол був першим прем'єр-міністром в історії Великої Британії, хоча ця посада тоді ще не існувала."
  flavor_eng.30.a: "[robert_walpole.GetSheHe|U] стане чудовим політиком."
  flavor_eng.31.title: "Вухо капітана Дженкінса"
  flavor_eng.31.desc: "До нас дійшли чутки про напад #L [target_country.GetAdjective|l]ого#! судна на наш корабель та затримання нашого капітана. Гонець стверджує, що з нашою командою обійшлися вкрай жорстоко, а капітану й зовсім відрізали вухо. [Select_CString(target_character2.IsFemale, 'Підла', 'Підлий')] [target_character2.GetName] знову провокує нас! Настав час показати свою силу!"
  flavor_eng.31.historical_info: "Війна за вухо Дженкінса, що плавно перетекла у Війну за австрійську спадщину, розгорілася з невеликого та неоднозначного конфлікту в 1731 році між іспанською береговою охороною та капітаном брига «Ребекка», що йшов з Глазго. Капітан Дженкінс стверджував, що в Карибському морі його бриг був захоплений іспанцями, які знущалися над командою та відрізали вухо самому капітану, а також катували його та погрожували вбивством. У ході цієї війни не велося масштабних бойових дій, хоча ескадра адмірала Ансона вирушила в бік ворога і в підсумку здійснила навколосвітню подорож, а флот адмірала Едварда Вернона атакував іспанські території в Карибському морі."
  flavor_eng.31.a: "Вухо за вухо…"
  eng_captain_jenkins_incident: "Подія з капітаном Дженкінсом"
  flavor_eng.31.b: "Ми побоюємося відкритої війни…"
  flavor_eng.32.title: "[jacobite_uprising.GetNameWithNoTooltip]"
  flavor_eng.32.desc: "Повстання та зради — часті супутники важких часів. Відтоді, як #TOOLTIP:CULTURE,$highland_tt$,X #L Гайлендські#!#! землі увійшли до складу [ROOT.GetCountry.Custom('rank_ru_GEN')], жителі #TOOLTIP:AREA,scottish_highlands_area,X #L Гайленду#!#! постійно відмовляються нам підкорятися. Схоже, [target_character.GetName] так [Select_CString(target_character.IsFemale, 'розпалила', 'розпалив')] їхній запал, що вони вирішили взятися за зброю!"
  flavor_eng.32.historical_info: "У 1745 році Карл Едуард Стюарт зі своїми прихильниками-якобітами висадився в Шотландії та здобув перемогу при Престонпансі. Він увійшов до Единбурга та оголосив свого батька Якова королем Шотландії, а потім вторгся до Англії та дійшов до Дербі. Однак обіцяне французами підкріплення так і не прибуло, і він був змушений відступити. Військо Карла Едуарда Стюарта переслідували британські війська, і в квітні 1746 року вона зазнала нищівної поразки в битві при Каллодені під Камберлендом. Це була остання серйозна спроба Стюартів отримати трон, і повстання якобітів стало добігати кінця. Яків не дотримувався порад своїх генералів, і це вирішило долю династії."
  flavor_eng.32.a: "Ми їх розгромимо!"
  flavor_eng.33.title: "[pitt_the_older.GetNameWithNoTooltip]"
  flavor_eng.33.desc: "Нещодавно видатний державний діяч [pitt_the_older.GetName] почав відігравати ключову роль у #L [ROOT.GetCountry.GetAdjective|l]ій#! політиці. Під час війни ця людина проявила себе як жорсткий лідер. Крім того, він ратує за розширення [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого впливу за кордоном. Багато хто вважає Пітта Старшого талановитим політиком і стратегом, здатним надихати народи. Його підхід до вирішення військових та дипломатичних питань може змінити баланс сил у #TOOLTIP:CONTINENT,europe,X #L Європі#!#!."
  flavor_eng.33.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.33.historical_info: "Вільям Пітт (1708–1778), старший з роду Піттів, був онуком мадраського губернатора. Спочатку йому пророкували кар'єру військового, проте Пітт віддав перевагу службі в Палаті громад (він перебував у партії вігів), де, втім, проявив себе справжнім патріотом своєї країни. У 1757 році Вільям, який мріяв зробити Англію справжньою володаркою морів, очолив коаліційний уряд, навіть попри глибоку неприязнь до Георга II і домігся значних успіхів у Канаді та Індії. Єдине, що врятувало Францію від нав'язування їй нестерпних умов Паризького мирного договору, що поклав край Семирічній війні, — відставка Пітта в 1763 році. У 1766–1778 роках він, попри слабке здоров'я, повернувся в політику. В останній рік життя агітував проти війни з Францією."
  flavor_eng.34.title: "Ост-Індська компанія"
  flavor_eng.34.desc: "Останнім часом [target_character1.GetName] та #L [ROOT.GetCountry.GetAdjective|l]ий#! народ все частіше мріють про заморські багатства. Завдяки тому, що тепер є [target_country.GetLongName] та експедиції до #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#!, ми створили плацдарм для розширення територій та розвитку торгівлі."
  flavor_eng.34.historical_info: "Англійська Ост-Індська компанія, заснована за два роки до голландської, спочатку зіткнулася з труднощами. Її перші факторії в Індонезії та на Молуккських островах, включно з Амбоном, незабаром захопили та закрили голландці. Тоді компанія переключилася на Індію та влаштувалася в Мадрасі, Бомбеї та Калькутті, де й досягла найбільших успіхів. З 1757 року невеликі порти та факторії стараннями Воррена Гастінга та Роберта Клайва виросли у величезну Британську Індію, що контролювала майже весь субконтинент. Компанія пережила всіх своїх конкурентів і припинила існувати в 1867 році, передавши контроль британському уряду після Сипайського повстання 1857 року."
  flavor_eng.34.a: "Це піде нам на користь!"
  flavor_eng.35.title: "[target_child.GetNameWithNoTooltip]"
  flavor_eng.35.desc: "[target_child.GetName] йде стопами свого батька і подає великі надії. Все йде до того, що одного дня [Select_CString(target_child.IsFemale, 'вона', 'він')] займе головну посаду в #L [ROOT.GetCountry.GetAdjective|l]ій#! політиці. [Select_CString(target_child.IsFemale, 'Її', 'Його')] обдарованість помітна з ранніх років. Ми можемо бути впевнені, що наступне покоління політиків та радників очолить людина видатних здібностей!"
  flavor_eng.35.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.35.historical_info: "Вільям Пітт — другий син Вільяма Пітта, 1-го графа Чатам. У грудні 1783 року король Георг III розпустив коаліцію та доручив 24-річному Пітту організувати новий уряд. В результаті 39 членів парламенту, що зібрався в січні 1784 року, висловили уряду вотум недовіри, проте Пітт відмовився йти у відставку, і коаліційна більшість у парламенті поступово почала розпадатися. До 8 березня проти Пітта виступала лише одна людина, а до 25 березня парламент виявився розпущеним. У 1788 році Пітт підписав документ, що формально засновує Потрійний союз між Великою Британією, Пруссією та Голландією, щоб не залишитися без союзників у разі чергової війни, як це вже було в роки Війни за незалежність США. У 1784 році він прийняв Акт про Індію, заснувавши таким чином комісію з управління Індією та Ост-Індською компанією. У 1790 році Пітт домігся мирних переговорів між Австрією та Туреччиною, продемонструвавши світу збільшений вплив Великої Британії та підвищивши її престиж. І нарешті, у 1791 році Вільям прийняв Канадський конституційний акт. Управління Верхньою та Нижньою Канадою відтепер здійснювалося з Лондона, проте обидві провінції отримали представницькі збори."
  flavor_eng.36.title: "[target_character.GetLastNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] угода"
  flavor_eng.36.desc: "Як правило, вільна торгівля та дружні відносини вигідні обом сторонам. Яскраве підтвердження тому — останній раунд морських переговорів між #L [target_country.GetAdjective|l]ими#! послами та делегацією, яку очолює [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона', 'Він')] вважає, що нова, ретельно складена торговельна угода допоможе [Select_CString(target_character.IsFemale, 'їй', 'йому')] знайти спільну мову з [target_country.GetAdjectiveWithNoTooltip|l]ою стороною."
  flavor_eng.36.historical_info: "Досвідчений посол Джон Метуен, що народився 1650 року, найбільш відомий укладенням мирної угоди 1703 року між Англією та Португалією. Цей документ дозволяв постачати до Португалії англійську пряжу та сукно в обмін на вільне ввезення португальського портвейну до Англії."
  flavor_eng.36.a: "Прийняти договір."
  flavor_eng.36.b: "Ми повинні відмовитися."
  flavor_eng.37.title: "Порохова змова"
  flavor_eng.37.desc: "«Запам'ятай, запам'ятай,\nЛистопад віроломний\nІ цифру криваву — п'ять.\nЗрада, порох,\nПідступність і морок.\nТаке не можна забувати!»\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] дивом залишився живий. Змовники планували підірвати [ROOT.GetCountry.GetGovernment.GetParliament.GetName]. Вони заклали бочки з порохом під будівлею і збиралися підпалити їх під час засідання, на якому був присутній [ROOT.GetCountry.GetGovernment.GetRulerTitle]. Вони планували захопити владу і насильно навернути народ [ROOT.GetCountry.Custom('CL_GEN')] у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!. Звісно, на призвідників чекає страта, але як нам вчинити з іншими католиками?"
  flavor_eng.37.a: "Покараємо всіх католиків без розбору!"
  eng_harsh_punishment_of_catholics: "Суворі покарання для католиків"
  flavor_eng.37.b: "Покараємо лише учасників змови."
  flavor_eng.37.a.all_cath_pops: "[Concept('pop_satisfaction', 'Задоволення')|e] усіх [Concept('pops', 'груп населення')|e], що сповідують #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!, знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]"
  flavor_eng.37.historical_info: "Порохова змова — це невдалий замах на життя англійського короля Якова I, запланований на день виголошення ним тронної промови перед парламентом. План підірвати Палату лордів був своєчасно розкритий і відвернений; змовників заарештували та стратили. На згадку про цю подію в країні за звичаєм влаштовується свято — Ніч Гая Фокса, що супроводжується запалюванням феєрверків та багать."
  every_other_catholic_kingdom_or_pap_or_empire_lose_opinion_tt: "[Concept('opinion', 'Думка')|e] #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#!, а також усіх #L [ShowReligionAdjective('catholic')|l]их#! імперій та королівств про нас погіршиться на [ShowBiasValue('eng_harsh_punishment_of_catholics')|-=0]"
  flavor_eng.38.title: "[target_artist.GetLastName] публікує «Левіафан»"
  flavor_eng.38.desc: "Жахливі наслідки війни, які [target_artist.GetName] спостерігав у себе на батьківщині та в інших країнах, надихнули його створити свій опус магнум — твір, який він назвав «[ShowWorkOfArtName('the_leviathan')]». У цій роботі автор стверджує, що сильна країна ефективніше протистоїть насильству та справляється з нестабільністю, спричиненою внутрішньоелітними конфліктами. Ця книга зміцнить нашу владу і дасть нам карт-бланш на централізацію [ROOT.GetCountry.Custom('rank_ru_GEN')]!"
  flavor_eng.38.historical_info: "Англійський філософ Томас Гоббс вважав, що постійна боротьба — це природний стан, і покласти край нескінченним конфліктам можна лише в тому випадку, якщо народ укладе з країною так званий суспільний договір, тобто частково відмовиться від своїх прав і свобод на користь країни, а вона, своєю чергою, візьме на себе обов'язок захищати підданих. Якщо ж країна не зможе виконати умови договору, народ матиме право знайти собі іншого правителя. Своїми ідеями Гоббс образив обидві сторони Англійської революції, а тому був змушений на 11 років втекти з країни до Парижа і наважився повернутися лише 1651 року."
  flavor_eng.38.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.39.title: "[target_character.GetNameWithNoTooltip] публікує «Багатство народів»"
  flavor_eng.39.desc: "Знаменитий філософ та економіст-новатор [target_character.GetName] випускає революційний трактат «[ShowWorkOfArtName('wealth_of_nations')]», в якому описується низка передових фінансових концепцій, а також робляться сміливі припущення про мотивацію людей в умовах вільного ринку. Ця зразкова робота гідна всілякого захоплення. Ми не сумніваємося, що вона матиме значний вплив на майбутні покоління економістів."
  flavor_eng.39.historical_info: "#italic «Дослідження про природу…»#! — перший великий твір у галузі політичної економії. Він ліг в основу так званого принципу невтручання (сам автор називав його системою природної свободи). Адам Сміт також розробив концепцію «невидимої руки», тобто споконвічно притаманної такій системі здатності контролювати саму себе, а заодно — формувати суспільний порядок за допомогою конкуренції."
  flavor_eng.39.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.41.title: "[target_character.GetNameWithNoTooltip]"
  flavor_eng.41.desc: "Останнім часом у суспільстві сформувався запит на нові ідеї, а також на підтримку мистецтва та науки. Зараз особливою популярністю користуються тези, які просуває [target_character.GetName]: причому не тільки на батьківщині, а й в інших країнах. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] теорії про природні права людей, суспільний договір та роль країни у захисті свободи та власності надихають як інтелектуалів усіх мастей, так і реформаторів."
  flavor_eng.41.historical_info: "Саме з Джона Локка почалася доба Просвітництва в Англії та Франції. Крім того, цей мислитель, який, крім іншого, написав твір #italic «Дослід про людське розуміння»#!, надихнув авторів Конституції США. Локк вважав, що знання можна отримати лише за допомогою досвіду та роздумів над пережитим. Такої ж думки дотримувалися інші знамениті філософи — Бойль, Сіденхем, Гюйгенс та Ньютон."
  flavor_eng.41.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.42.title: "[isaac_newton.GetNameWithNoTooltip]"
  flavor_eng.42.desc: "[Select_CString(isaac_newton.IsFemale, 'Прославлена', 'Прославлений' )] #L [ROOT.GetCountry.GetAdjective|l][Select_CString(isaac_newton.IsFemale, 'а', 'ий' )]#! [Select_CString(isaac_newton.IsFemale, 'вчена', 'вчений' )] на ім'я [isaac_newton.GetName] [Select_CString(isaac_newton.IsFemale, 'опублікувала', 'опублікував' )] принципово нові теорії, які докорінно змінять розуміння природи світу. Праця з сили тяжіння, руху та математики напевно надихне мислителів з усієї #TOOLTIP:CONTINENT,europe,X #L Європи#!#! та ознаменує початок нової доби наукового поступу та раціоналізму."
  flavor_eng.42.historical_info: "Англійський фізик і математик Ісаак Ньютон — це найважливіший діяч наукової революції XVII століття. Його спостереження про розкладання білого світла на кольори видимого спектра заклало основи сучасної фізичної оптики, а закони Ньютона, що описують взаємодії тіл у механіці, стали фундаментом класичної теорії тяжіння. Також Ньютон вперше розробив методи обчислення нескінченно малих величин."
  flavor_eng.42.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.43.title: "[william_shakespeare.GetNameWithNoTooltip]"
  flavor_eng.43.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! привабив найвидатніших творців світу: драматургів, поетів і навіть акторів. Усі ці діячі культури невтомно працювали над тим, щоб внести нас в аннали історії. Але одна людина не тільки зібрала в собі всі перелічені таланти, а й прагне піднести їх до небачених вершин. [william_shakespeare.GetName] — просто еталон таланту, чия творчість представила глибший погляд на людину та суспільство."
  flavor_eng.43.historical_info: "Англійського поета, драматурга та актора Вільяма Шекспіра часто називають найвидатнішим англомовним письменником та найкращим драматургом усіх часів. П'єси, написані Шекспіром наприкінці XVI — на початку XVII століття для невеликого репертуарного театру, сьогодні виконуються регулярно в десятках країн. Великий сучасник Шекспіра поет і драматург Бен Джонсон одного разу заявив, що Шекспір «не належав епосі — він на всі часи». Ці слова виявилися пророчими."
  flavor_eng.43.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_eng.43.tt: "З'явиться [Concept('character', 'персонаж')|e] [william_shakespeare.GetNameWithNoTooltip]"
  flavor_eng.43.b: "Дурні драми нам ні до чого."
  flavor_eng.44.title: "Знать співчуває лоллардам"
  flavor_eng.44.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] з провінції [target_province.GetName] все частіше починає підтримувати лоллардів. [target_character.GetName] та інші окремі особистості навіть відкрито виступають на підтримку лоллардистських радикальних поглядів на соціальну справедливість та релігійні реформи.\n\nТим самим створюється відчутна загроза усталеному порядку: аристократія досить впливова, щоб поширювати ідеї лоллардизму на шкоду владі корони та церкви."
  flavor_eng.44.a: "Вживемо суворих заходів проти дворян."
  flavor_eng.44.b: "Нехай займаються чим хочуть."
  flavor_eng.44.b.tt: "Істотна частина #TOOLTIP:RELIGION,$catholic_tt$,X #L католицького#!#! [Concept('pops', 'населення')|e] у провінції [target_province.GetName] навернеться в #TOOLTIP:RELIGION,$lollardy_tt$,X #L лоллардизм#!#!"
  STATIC_MODIFIER_NAME_suppressing_heresy: "Придушення єресі"
  flavor_eng.45.title: "Заснування дому [target_dynasty.GetNameWithNoTooltip]"
  flavor_eng.45.desc: "Численні шляхетні доми [ROOT.GetCountry.Custom('rank_ru_GEN')|l] здавна володіли колосальними владою та впливом. Нещодавно [target_character.GetName] [Select_CString(target_character.IsFemale, 'заклала', 'заклав' )] нову династію [target_dynasty.GetName], молодшу гілку династії [ShowDynastyNameWithNoTooltip('plantagenet_dynasty')]. Амбіції молодої династії неясні, але все йде до того, що вона відіграватиме важливу роль у #L [ROOT.GetCountry.GetAdjective|l]ій#! політиці."
  flavor_eng.45.historical_info: "Дім Йорків з молодшої гілки Плантагенетів у XV столітті дав Англії трьох королів: Едуарда IV, Едуарда V та Річарда III. Це сімейство, що походило від сина Едварда III Едмунда Ленглі, мало обґрунтовані претензії на трон, що спричинило конфлікт з Ланкастерами у Війні Троянд. Едуард IV зміг посісти престол, але правління Річарда III закінчилося в Босворті в 1485 році, сповістивши початок доби Тюдорів. Панування Йорків було недовгим, але їхня спадщина продовжує впливати на англійську монархію. Зокрема, шлюб Єлизавети Йоркської та Генріха VII об'єднав ворогуючі фракції."
  flavor_eng.45.a: "Це дуже добре!"
  flavor_eng.46.title: "Дім Ланкастерів"
  flavor_eng.46.desc: "[ShowDynastyName('lancaster_dynasty')] — відгалуження нашої династії [target.GetDynasty.GetName]. Якщо [target.GetName] та [target_female.GetName] — представники обох гілок — укладуть між собою шлюб, стосунки між ними стануть набагато ближчими, а отже, вони діятимуть виключно на благо #L [ROOT.GetCountry.GetAdjective|l]ого#! [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого дому."
  flavor_eng.46.historical_info: "Другий дім Ланкастерів — молодша гілка династії Плантагенетів, заснована Джоном Гонтом — третім сином короля Едуарда III, що вижив. Дружиною Гонта стала його двоюрідна сестра Бланка Ланкастерська, дочка одного з найвпливовіших англійських дворян — Генрі Гросмонта, герцога першого дому Ланкастерів, що походив від короля Генріха III. Три вихідці з другого дому Ланкастерів стали королями Англії, а їхній конфлікт з домом Йорків за право посідати англійський престол увійшов в історію як Війна троянд."
  flavor_eng.46.a: "Це дуже добре!"
  flavor_eng.48.title: "[isabella.GetNameWithNoTooltip] з [target_country.Custom('CL_GEN')]"
  flavor_eng.48.desc: "Наші амбіції в #TOOLTIP:REGION,iberia_region,X #L Іберії#!#! зростають, і династія [target_dynasty.GetName] уклала ще один цінний союз. [target_head.GetName] та [isabella.GetName] поєдналися шлюбом, зміцнивши зв'язок роду зі спадщиною [target_country.Custom('longname_ru_GEN')]. Цей шлюб ще міцніше узаконить наш вплив та претензії на одну з наймогутніших країн Європи. Можливо, настав час закріпити нашу перевагу в Іберії."
  flavor_eng.48.a: "Біла троянда!"
  flavor_eng.48.historical_info: "У 1372 році Едмунд Ленглі, перший граф Йоркський, одружився з Ізабеллою Кастильською, дочкою короля Педро I Кастильського та його фаворитки Марії де Падільї. Цей політичний союз влаштував старший брат Едмунда, Джон Гонт. У той час Джон претендував на кастильський трон через власний шлюб: його дружина, сестра Ізабелли Констанція, була старшою з дітей Педро і мала династичні права на престол Кастилії. Одруження Едмунда та Ізабелли допомогло Джону зміцнити свої позиції в Кастилії та зв'язки з легітимістами."
  flavor_eng.49.title: "Доля дому Плантагенетів"
  flavor_eng.49.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] поки не має спадкоємців, однак турбуватися про це не варто, оскільки дві молодші гілки династії — #TOOLTIP:DYNASTY,$york_dynasty_tt$,X #L Йорки#!#! та #TOOLTIP:DYNASTY,$lancaster_dynasty_tt$,X #L Ланкастери#!#! — досить сильні.\n\nІ ці троянди напевно не стануть воювати між собою…"
  flavor_eng.49.a: "За майбутнє можна не перейматися!"
  flavor_eng.49.a.tooltip: "Звісно, ніякої війни не буде."
  flavor_eng.50.title: "Способи приготування їжі"
  flavor_eng.50.desc: "Неперевершені кухарі, яких тримає при собі [target_character.GetName], обдарували нас обширним збірником рецептів. З його допомогою можна приготувати що завгодно, від скромного жаркого до складних страв з тушкованого м'яса із заморськими спеціями.\n\nКожна з цих найароматніших страв здатна задовольнити смак найвибагливішого завсідника [ROOT.GetCountry.GetGovernment.GetAdjective|l]их бенкетів, однак, якщо викинути з рецептів усе «зайве», їх можна буде представити і #L [ROOT.GetCountry.GetAdjective|l]ому#! простолюду у вигляді народної кухні.\n\nЯк би там не було, тепер усім очевидно, що [ROOT.GetCountry.GetCapital.GetProvince.GetContinent.GetName] не знає вишуканішої кухні, ніж [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а."
  flavor_eng.50.historical_info: "Книга «Способи приготування їжі» є значним збірником гастрономічних рецептів, укладеним особистими кухарями Річарда II.\n\nБагато згаданих там страв вимагають надзвичайно рідкісних спецій та барвників, та й загалом рецепти в ній виглядають складнішими та дорожчими, ніж у кулінарних книгах французького двору того ж періоду. Через це існує думка, що цей збірник був укладений виключно з пропагандистською метою, щоб підвищити престиж англійської корони за кордоном."
  flavor_eng.50.a: "Не ділитимемося цим із народом."
  flavor_eng.50.b: "Поділимося рецептами з усіма."
  eng_the_forme_of_cury_demand: "Способи приготування їжі"
  flavor_eng.51.title: "Орден Підв'язки"
  flavor_eng.51.desc: "Натхненний легендами про короля Артура та лицарів Круглого столу, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] створює власний лицарський орден — добірну свиту, яка має всюди супроводжувати монарха.\n\nЗвісно, лицарськими почестями можна нагородити будь-якого дворянина, кому симпатизує [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], однак у [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ому суспільстві чимало інших груп, яким знадобиться подібна підтримка."
  flavor_eng.51.a: "Призначимо всіх, до кого [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] найближчий."
  flavor_eng.51.b: "Піднесемо іноземних аристократів."
  flavor_eng.51.c: "Призначимо наших представників духовенства."
  flavor_eng.51.d: "Підтримаємо мистецтво."
  flavor_eng.51.e: "Віддамо належне незаможним ветеранам."
  flavor_eng.52.title: "[target_character.GetLastNameWithNoTooltip] пише листа"
  flavor_eng.52.desc: "#L [target_country.GetAdjective]ий#! нотарій [target_character.GetName] стверджує, що [Select_CString(deadward.IsFemale,'наша покійна королева', 'наш покійний король')] [deadward.GetName], по-звірячому [Select_CString(deadward.IsFemale,'замучена', 'замучений')] лиходійською династією [ShowDynastyName('mortimer_dynasty')], насправді [Select_CString(deadward.IsFemale,'жива', 'живий')] і, якщо вірити автору листа, [Select_CString(deadward.IsFemale,'втекла', 'втік')] з ув'язнення, після чого [Select_CString(deadward.IsFemale,'сховалася', 'сховався')] в пустельницькій обителі поруч із [target_location.Custom('LR_INST')|l] [target_location.GetName] і тепер доживає свій вік серед ченців.\n\nЛист виглядає справжнім, однак правдивість заяв автора викликає сумніви. [deadward.GetShortNameWithNoTooltip] не [Select_CString(deadward.IsFemale,'була', 'був')] гідним правителем в очах більшості, однак [Select_CString(deadward.IsFemale,'її', 'його')] прихильники були дуже впливові. Якщо ця заява правдива, сформований порядок зазнає серйозного потрясіння."
  flavor_eng.52.historical_info: "У 1337 році король Едуард III отримав таємничого листа від італійського священника, який стверджував, ніби його покійний батько Едуард II насправді уникнув жорстокої страти і живе відлюдником на континенті. Наступного року, подорожуючи Європою, король особисто зустрівся з таким собі «Вільямом з Уельсу», який, можливо, і був його вигнаним батьком.\n\nВтім, справжня доля скинутого монарха досі залишається загадкою…"
  flavor_eng.52.a: "Постараємося покласти край цим зрадницьким домислам."
  flavor_eng.52.b: "Не заважатимемо чуткам поширюватися."
  flavor_eng.53.title: "Закони про робітників"
  flavor_eng.53.desc: "Закони про робітників стали відповіддю на спалах Чорної смерті, яка вразила в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!.\n\nЗагибель населення призвела до нестачі робочої сили, а отже — до жорсткої конкуренції між землевласниками і, як результат, до інфляції, викликаної зростанням заробітної плати. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], що пережили хворобу, вимагають підняти їм платню і надати більше свобод, що призводить до збільшення витрат на виробництво.\n\nЗакони про робітників спрямовані на боротьбу з інфляцією та запровадження стримування цін, а також на заборону переманювання до себе чужих робітників."
  flavor_eng.53.a: "Видамо закони."
  flavor_eng.53.b: "Обійдемося без втручання."
  flavor_eng.53.historical_info: "Нестача робочої сили, викликана Чорною смертю, призвела до необхідності ухвалення в 1349 році законів про робітників. Таким чином передбачалося запровадити регулювання платні, а заодно заборонити робітникам залишати рідні місця в пошуках краще оплачуваної роботи, що обіцяла економічне та суспільне благополуччя. Заодно закони зміцнили сформовану феодальну систему, однак головної мети — врегулювання платні — досягти так і не вдалося, тому згодом їх довелося скасувати."
  flavor_eng.54.title: "Селянське повстання"
  flavor_eng.54.desc: "Селяни, якими керує [wat_tyler.GetName], підняли масштабний бунт: [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] незадоволені податковою політикою, яку веде [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. На це невдоволення наклалися й суспільно-економічні наслідки епідемії Чорної смерті.\n\nЯкщо бунт не придушити, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] напевно захоплять Тауер і стратять частину [ROOT.GetCountry.GetGovernment.GetAdjective|l]их чиновників. Скасувавши ненависну для народу подушну подать і стративши призвідників бунту, ми зможемо навести лад, однак окремі прояви непокори триватимуть ще кілька років."
  flavor_eng.54.a: "Нас це не турбує."
  flavor_eng.54.b: "Нас це не турбує."
  flavor_eng.54.c: "Підемо на поступки."
  flavor_eng.54.tt: "З'явиться [Concept('character', 'персонаж')|e] [wat_tyler.GetNameWithNoTooltip]"
  wat_tyler_rebellion: "Повстання Вота Тайлера"
  flavor_eng.54.historical_info: "Селянське повстання 1381 року — одне з найважливіших і найбільших повстань в історії Англії. Повсюдна бідність, важкий податковий тягар і наслідки Чорної смерті призвели до того, що життя стало для селян, і без того страждалих під гнітом феодальної системи, абсолютно нестерпним. Повстання в підсумку виявилося придушене, а багато його керівників — полонені та страчені."
  flavor_eng.55.title: "[simon_sudbury.GetNameWithNoTooltip]"
  flavor_eng.55.desc: "Богослов [simon_sudbury.GetName] майже все життя провів під началом церкви. Спочатку він служив єпископом #L #TOOLTIP:LOCATIONRANK,[london.Custom('LR_tt')],X [london.Custom('LR_GEN')]#!#! [london.GetName], а згодом — архієпископом #L #TOOLTIP:LOCATIONRANK,[canterbury.Custom('LR_tt')],X [canterbury.Custom('LR_GEN')]#!#! [canterbury.GetName]. Коли новину про призначення Садбері лордом-канцлером почули в народі, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l] обурилися: вони вважали, що саме архієпископ винен у всіх їхніх бідах, оскільки саме Саймон встановив подушну подать — оскільки Англія воювала проти #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, країні були потрібні гроші на війну."
  flavor_eng.55.a: "Кращої кандидатури годі й шукати."
  flavor_eng.55.b: "Нехай зосередиться на духовних питаннях."
  flavor_eng.55.historical_info: "Саймон Садбері — релігійний діяч, який обіймав посаду архієпископа, а пізніше, в добу селянського повстання 1381 року, — канцлера. Збунтовані селяни увійшли до Лондона і увірвалися в Тауер, де схопили і стратили архієпископа. До такої розв'язки призвело як введення ним подушної податі, так і інші рішення на посаді канцлера, що не знайшли розуміння в народі."
  flavor_eng.56.title: "Розорення Тауера"
  flavor_eng.56.desc: "Митців, що підійшли до замкових воріт, ніхто не намагався зупинити — схоже, їх боялася навіть варта. Зберігані в замку обладунки та [ROOT.GetCountry.GetGovernment.GetAdjective|l]е королівське майно виявилися розграбовані.\n\nЗбунтовані селяни спіймали та обезголовили провідних радників, скориставшись тим, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] відсутній у Тауері — днем раніше монарху довелося поїхати на переговори в надії покласти край повстанню. Членам королівської родини, що потрапили до рук бунтівників, пощастило більше: їх відпустили, попередньо познущавшись."
  flavor_eng.56.a: "Це не настільки важливо."
  flavor_eng.56.b: "Підкупимо бунтівників, щоб ті пощадили радників."
  flavor_eng.57.title: "[geoffrey_chaucer.GetNameWithNoTooltip]"
  flavor_eng.57.desc: "До двору прибув багатообіцяючий автор, відомий під скромним прізвиськом «батько англійської літератури». Це прізвисько він заслужив такими творами, як #italic «Книга герцогині»#! та #italic «Дім слави»#!. [geoffrey_chaucer.GetName] народився в купецькій родині. Майже всю молодість він провів у мандрах Західною Європою, хоча був родом з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Повернувшись додому, він вступив до Іннер-Темпл — юридичної школи, а також об'єднання адвокатів і суддів.\n\nПосада #italic камердинера#! при [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому дворі відкриє йому нові можливості для подорожей за кордон і знайомства з іншими освіченими людьми."
  flavor_eng.57.a: "Запросимо його до двору."
  flavor_eng.57.b: "Оксфорд потребує такого викладача."
  flavor_eng.57.c: "Кембридж потребує такого викладача."
  flavor_eng.57.tt2: "[geoffrey_chaucer.GetNameWithNoTooltip] присвятить весь час викладанню і навряд чи створюватиме шедеври літератури"
  flavor_eng.57.historical_info: "Джеффрі Чосер здобув світову славу завдяки «Кентерберійським оповіданням» — одному з найважливіших творів англійської літератури. Саме з Чосера почалася стандартизація англійської мови та перехід від давньоанглійської до середньоанглійської. Чосер також обіймав кілька державних посад, у тому числі дипломатичну. Подорожі іншими країнами мали великий вплив на його твори."
  flavor_eng.58.title: "Кентерберійські оповідання"
  flavor_eng.58.desc: "[geoffrey_chaucer.GetName] випустив збірку з 24 історій, написаних середньоанглійською мовою, і озаглавив її #italic «Кентерберійські оповідання»#!. У збірці наводяться історії паломників, що почали шлях [target_location.Custom('LR_PREP')|l] [target_location.GetName] і прямують до мощей Томаса Бекета в [canterbury.GetName]. Кожен оповідач належить до того чи іншого прошарку англійського суспільства XIV століття.\n\n[english.GetNameWithNoTooltip]а розмовна мова могла б поширитися в масовій літературі завдяки такій обширній і змістовній праці, однак автор, схоже, не встиг довести її до кінця."
  flavor_eng.58.a: "Потрібно роздобути собі копію."
  flavor_eng.58.b: "Опублікуємо його попередні праці."
  flavor_eng.58.historical_info: "#italic «Кентерберійські оповідання»#! — твір англійського поета і мислителя XIV століття Джеффрі Чосера, написаний середньоанглійською — «народною» мовою того часу. Чосер збирався написати 120 новел — по дві на кожного паломника, однак до твору увійшло лише 24. Проте персонажі Чосера та його наративні прийоми вийшли настільки яскравими та надихаючими, що їх вивчають і сьогодні."
  flavor_eng.62.title: "Одкровення Божественної Любові"
  flavor_eng.62.desc: "Відлюдниця, що усамітнено живе біля церкви Святого Юліана [target_location.Custom('LR_PREP')|l] [target_location.GetName], нібито пережила кілька видінь Страстей Христових. Леді Юліана, як її називають місцеві жителі, вважається побожною та впливовою людиною.\n\nНещодавно вона захворіла і, ймовірно, вже перебуває на смертному ложі — передбачається, що саме в такий момент її й осяяли видіння."
  flavor_eng.62.a: "Подбаємо про всі її потреби."
  flavor_eng.62.tt1: "Леді Юліана ще зможе оговтатися від хвороби та записати свої спогади"
  flavor_eng.62.b: "Вона мало нас хвилює."
  flavor_eng.62.tt2: "Леді Юліана навряд чи одужає"
  flavor_eng.62.historical_info: "#italic  «Одкровення Божественної Любові»#! — один із найважливіших збережених до наших днів творів християнського містицизму. Він заснований на видіннях, що осяяли Юліану Норідзьку. Сама Юліана стверджувала, що ці видіння зіслав їй Бог під час її тяжкої хвороби. Спогади, записані поетичною мовою, справили глибокий вплив на християнський містицизм і богослов'я."
  flavor_eng.63.title: "День святого Георгія"
  flavor_eng.63.desc: "Святий Георгій Переможець, шанований за відмову зректися християнської віри навіть під загрозою смертної кари, далеко не такий відомий, як Едуард Сповідник або Едмунд Мученик. Нам слід оголосити Георгія святим покровителем і заснувати на його честь свято, щоб віддати йому належну хвалу за благословення на полі бою."
  flavor_eng.63.a: "Дзвоніть у дзвони! Нехай про це дізнається весь світ."
  flavor_eng.63.b: "Побудуємо на його честь каплицю у [windsor.GetNameWithNoTooltip]ському замку."
  flavor_eng.63.c: "Це дорого."
  flavor_eng.63.historical_info: "Георгій Переможець ще із Середніх віків вважається святим покровителем Англії. У XVIII столітті день пам'яті цього великомученика — невід'ємний елемент культурно-історичної спадщини Англії — був оголошений святковим."
  flavor_eng.64.title: "[henry_yevele.GetNameWithNoTooltip]"
  flavor_eng.64.desc: "Нещодавно нам стало відомо, що [henry_yevele.GetName] — не просто досвідчений каменяр, а справжній майстер своєї справи. Такий умілий ремісник стане в пригоді нашій країні: його зусиллями наші палаци стануть ще розкішнішими та величнішими."
  flavor_eng.64.a: "Представимо його вищим верствам суспільства."
  flavor_eng.64.tt1: "З'явиться [Concept('character', 'персонаж')|e] [henry_yevele.GetNameWithNoTooltip], знаменитий своїми мистецькими витворами"
  flavor_eng.64.b: "Не будемо втручатися в його життя."
  flavor_eng.64.tt2: "[henry_yevele.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_eng.64.historical_info: "Генрі Йевель — англійський архітектор, який у роки Пізнього Середньовіччя побудував і перебудував кілька будівель, що стали згодом знаменитими. Обіймав посаду королівського каменяра, завдяки чому міг братися за найважливіші доручення. Найвідоміші його творіння — Кентерберійський собор, а також куртина та вежі лондонського Тауера."
  flavor_eng.65.title: "Закон про станнарії"
  flavor_eng.65.desc: "У 1201 році [john_lackland.GetName] дарував рудокопам, що видобували #TOOLTIP:GOODS,tin,X #L олово#!#!#! у провінціях [cornwall.GetName] та [devon.GetName], Хартію вольностей. Вона звільняла працівників олов'яних рудників від кріпосної залежності та переводила їх під правову юрисдикцію головного наглядача. До цього документа періодично вносяться зміни; так, нещодавно були засновані суди, а рудокопи на олов'яних рудниках — піддані #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — отримали недоторканність від юрисдикції інших судів країни."
  flavor_eng.65.a: "Ухвалимо цей закон."
  flavor_eng.65.b: "Дозволимо обмежену самостійність."
  flavor_eng.65.c: "Яка нісенітниця."
  flavor_eng.65.historical_info: "За середньовічним законом про станнарії засновувалися так звані станнарні суди. Закон охоплював одразу кілька областей: розташування олов'яних рудників, способи видобутку руди, заходи захисту рудокопів, збір податків і мит з олов'яного виробництва. Крім того, разом із ним був заснований звід законів, де описувалися права та обов'язки робітників на олов'яних рудниках, а також уточнювалися розміри та якість злитків олова."
  flavor_eng.66.title: "Станнарні суди"
  flavor_eng.66.desc: "Як і передбачалося, робітники олов'яних рудників у провінціях [cornwall.GetName] та [devon.GetName] встановили незалежний #TOOLTIP:BUILDING_TYPE,stannary_court,X #L суд#!#!#! у повній відповідності до закону про станнарії. Ймовірно, такі суди проіснують до того моменту, як потреба в них зникне."
  flavor_eng.66.a: "Хай так і буде."
  flavor_eng.66.a.custom: "#TOOLTIP:BUILDING_TYPE,stannary_court,X #L Суд станнарію#!#!#! також з'явиться в інших [Concept('location', 'місцевостях')|e] #TOOLTIP:PROVINCE_DEFINITION,cornwall_province,X #L Корнуолла#!#! та #TOOLTIP:PROVINCE_DEFINITION,devon_province,X #L Девона#!#!"
  flavor_eng.66.historical_info: "Станнарні суди — це правові суди, що діяли в багатих на олово Корнуоллі та Девоні, де існувала розвинена видобувна промисловість. Ці суди мали особливі привілеї: в їхньому віданні перебували різні аспекти видобутку олова, зокрема регулювання цієї діяльності, оподаткування та правові питання."
  flavor_eng.67.title: "Експлуатація видобутку олова"
  flavor_eng.67.desc: "Видобуток #TOOLTIP:GOODS,tin,X #L олова#!#!#! перейшов на промислові масштаби, а #TOOLTIP:BUILDING_TYPE,stannary_court,X #L суд станнарію#!#!#! сьогодні значною мірою належить представникам зростаючого класу землевласників. Корисність такого суду як засобу управління наразі сумнівна. Цей інститут відмер природним чином."
  flavor_eng.67.a: "Значить, так треба."
  flavor_eng.67.historical_info: "Далеко не останню роль у поповненні королівської скарбниці відігравав експорт олова. У XVII столітті виробництво та постачання цього ресурсу стрімко зросли завдяки новим досягненням науки, але вже в наступному столітті почався занепад. Причиною цьому стали виснаження рудників та загальна диверсифікація економіки. Потреба в станнарних судах як регулюючому органі відпала."
  flavor_eng.68.title: "#italic  Дім слави#!"
  flavor_eng.68.desc: "На посаді #italic камердинера#! при [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому дворі [geoffrey_chaucer.GetName] нерідко буває за кордоном, де знайомиться з іншими освіченими людьми. Нові знайомі нещодавно відкрили йому світ італійської поезії, яка стала для Чосера джерелом натхнення.\n\nТвори Чосера зараз як ніщо інше сприяють закріпленню середньоанглійської мови в літературі, оскільки на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! пишуть переважно такими мовами, як #L [french.GetName|l]а#! (англо-нормандська) та #L [latin.GetName|l]ська#!."
  flavor_eng.68.a: "Цьому твору місце в [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій бібліотеці."
  flavor_eng.68.b: "Поширимо його по всій країні."
  flavor_eng.68.historical_info: "#italic  «Дім слави»#! — поема Джеффрі Чосера, що входить до збірки історій #italic  «Кентерберійські оповідання»#!. У поемі описується сон самого Чосера, в якому він потрапляє до грандіозного, вражаючого уяву палацу — так званого Дому слави. Автор не дописав поему до кінця, проте цінність її для літературознавців залишається незаперечною."
  flavor_eng.69.title: "Бритва Оккама"
  flavor_eng.69.desc: "Мислитель і богослов [william_ockham.GetName], чиє ім'я нерідко викликає суперечки, зараз вивчає мовознавство під покровительством такого діяча, як [william_patron.GetName]. Оккам вивів новий принцип вирішення проблем: не потрібно множити сутності без необхідності.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] ставляться до Оккама з великою неприязню, оскільки його погляди суперечать прийнятому церковному вченню; крім того, Оккам виступає за відокремлення церкви від країни. Однак навіть попри таку неприязнь, його міркування стануть чудовою поживою для розуму наших мислителів."
  flavor_eng.69.a: "Підтримаємо погляди Оккама."
  flavor_eng.69.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] обуряться поширенню єретичних думок на фоні [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.69.b: "Оголосимо його вчення єрессю."
  flavor_eng.69.historical_info: "Бритва Оккама — філософський принцип міркування та вирішення проблем. Він стверджує, що просте рішення, як правило, — найнадійніше. Створення цього принципу приписують англійському монаху-францисканцю XIV століття Вільяму Оккаму."
  flavor_eng.70.title: "Занепад #TOOLTIP:BUILDING_TYPE,cinque_port,X #L одного з П'яти портів#!#!"
  flavor_eng.70.desc: "#TOOLTIP:BUILDING_TYPE,cinque_port,X #L Усі п'ять портів#!#! у #TOOLTIP:PROVINCE_DEFINITION,kent_province,X #L Кенті#!#! не можуть працювати через замулення гавані внаслідок бур, а також постійного зниження рівня моря. Щоб #L [ROOT.GetCountry.GetAdjective|l]ий#! берег і далі був надійно захищений, а портові традиції не пішли в минуле, потрібно заснувати порт в іншому місці. На вибір пропонуються такі варіанти: #TOOLTIP:LOCATION,southampton,X #L Саутгемптон#!#!, #TOOLTIP:LOCATION,portsmouth,X #L Портсмут#!#! або #TOOLTIP:LOCATION,rochester,X #L Рочестер#!#!."
  flavor_eng.70.a: "Саутгемптон."
  flavor_eng.70.b: "Портсмут."
  flavor_eng.70.c: "Рочестер."
  flavor_eng.70.d: "У цьому немає потреби."
  flavor_eng.70.tt1: "#TOOLTIP:BUILDING_TYPE,cinque_port,X #L Один з П'яти портів#!#!#! ([target_location.GetName]) буде #R  знесений#! без заміни"
  flavor_eng.70.tt2: "Зниження ролі портів може призвести до їх знищення"
  flavor_eng.70.historical_info: "З часом важливість П’яти портів значно впала. Цьому посприяло одразу кілька чинників: нові доктрини ведення війни на морі, заснування Королівського військово-морського флоту та зміна берегових ліній. До XVII століття П’ять портів вже не відігравали жодної значущої військової та економічної ролі."
  flavor_eng.71.title: "Ворбелтон проти Горджеса"
  flavor_eng.71.desc: "Між двома шляхетними родинами з #TOOLTIP:PROVINCE_DEFINITION,hampshire_province,X #L Гемпшира#!#! та #TOOLTIP:PROVINCE_DEFINITION,somerset_province,X #L Сомерсета#!#! розгорілася суперечка: по всій видимості, члени цих сімейств зустрілися в бою під час облоги провінції [calais.GetName], де побачили, що їхні герби абсолютно однакові.\n\nНе зумівши владнати розбіжності між собою, вони звернулися до суду, щоб той виніс власне рішення."
  flavor_eng.71.a: "Винесемо рішення на користь Ворбелтонів ([hampshire.GetNameWithNoTooltip])."
  flavor_eng.71.b: "Винесемо рішення на користь Горджесів ([somerset.GetNameWithNoTooltip])."
  flavor_eng.71.c: "Обговоримо грошову компенсацію."
  flavor_eng.71.historical_info: "Позов Ворбелтона проти Горджеса 1347 року — це судовий спір через родовий герб. У той час ставлення до геральдичних фігур було вкрай серйозним, оскільки ті уособлювали особистість свого власника та його родини, а також дозволяли відрізняти носіїв різних гербів у бою та в суді. Позов виграв Ворбелтон, який представив більш вагомі докази."
  flavor_eng.72.title: "Лорди-апелянти"
  flavor_eng.72.desc: "До нашого двору звернулися [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Група, що їх представляє, стверджує, що монарх поводиться з ворогами надто мирно, а всередині країни — примхливо та по-диктаторськи, а тому вони подають апеляцію на притягнення деяких фаворитів [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Її', 'Його' )] Величності до відповідальності за покровительство та державну зраду.\n\nЗа законом у такому випадку в країні буде засновано #TOOLTIP:GOVERNMENT_REFORM,ruling_commission_of_england,X #L Регентський комітет#!#!, і тоді повнота [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої влади опиниться під загрозою."
  flavor_eng.72.a: "Погодимося на їхні вимоги."
  flavor_eng.72.b: "Відмовимося."
  lords_appellant: "Прихильники бунтівних лордів"
  flavor_eng.72.historical_info: "Лорди-апелянти — п’ять впливових дворян, незадоволених впливом фаворитів короля на політику країни та невмілим управлінням країною. Надалі монарха все ж вдалося скинути, а політичну обстановку в Англії — змінити."
  flavor_eng.73.title: "Безжальний парламент"
  flavor_eng.73.desc: "Під впливом могутнього союзу лордів-апелянтів [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] скликає засідання парламенту. На порядку денному — зрадницькі дії радників та фаворитизм, який [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] надає своїм наближеним. Крім того, викликає питання і мирне ставлення до ворога всупереч тому, що між #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! триває війна. Лорди-апелянти навіть припускають, що монарх веде таємні переговори, в результаті яких [ROOT.GetCountry.Custom('CL_DAT')] доведеться здати свої позиції на континенті.\n\nПарламент сприйняв ці звинувачення серйозно і засудив майже всіх обвинувачених до страти."
  flavor_eng.73.a: "Приймемо цю постанову."
  flavor_eng.73.tt1: "Радники будуть страчені за вірність монарху"
  flavor_eng.73.b: "Підкупимо перів, щоб забезпечити собі більшість."
  flavor_eng.73.c: "Домовимося про компроміс."
  flavor_eng.73.tt: "Заснована лордами-апелянтами комісія буде розпущена. Один радник, вірний монарху, буде страчений"
  flavor_eng.73.historical_info: "Назву «Безжальний парламент» отримало засідання англійського парламенту, що відбулося в роки правління короля Річарда II. Безжальним воно стало тому, що заходи проти всіх, кого члени парламенту вважали загрозою країні, в тому числі радників і фаворитів короля, виявилися вкрай жорстокими: всіх обвинувачених засудили і стратили, тим самим значно обмеживши виконавчу владу монарха. Крім цього, було схвалено кілька законів, спрямованих на збільшення впливу парламенту на шкоду впливу короля."
  flavor_eng.74.title: "Чорний понеділок"
  flavor_eng.74.desc: "Завойовницький похід на півночі #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! перервала несподівана буря. Тепло різко змінилося холодом, з неба обрушилися розряди блискавок, величезні градини замолотили по шоломах вояків, вбиваючи людей без розбору. Коні розбіглися, а ті, хто вижив, охоплені панікою, намагаються сховатися хоч десь. Хтось каже, що Бог наслав на нас кару за скоєні злодіяння; інші ж впевнені, що це підступи диявола."
  flavor_eng.74.a: "Сьогодні поганий день."
  flavor_eng.74.b: "Сховаємося в найближчому лісі."
  flavor_eng.74.historical_info: "XIV століття ознаменувалося кліматичними змінами, які спричинило настання малого льодовикового періоду. Зими стали надзвичайно суворими, а бурі — руйнівними. Від них, зокрема, чимало постраждали англійські війська, що билися у Франції. Король сприйняв бурю, що розпочалася, як знак згори і поспішив укласти з Францією мир. Всього за кілька днів обидві сторони підписали мирний договір біля села Бретиньї."
  flavor_eng.75.title: "Погром у День святої Схоластики"
  flavor_eng.75.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] переживає непростий день: у місцевому питному закладі стався скандал за участю господаря та кількох університетських студентів, що швидко переріс у зіткнення озброєних банд, які прибули із сільської місцевості на допомогу містянам.\n\n#TOOLTIP:BUILDING_TYPE,university,X #L Університет#!#!#! і особливо його студенти не користуються любов’ю у місцевих жителів, оскільки ті вважають студентів занадто пихатими та зарозумілими щодо простого народу. Втручання з нашого боку їм теж не сподобається."
  flavor_eng.75.a: "Покладемо цьому край."
  flavor_eng.75.b: "Університетські бійки нас не турбують."
  flavor_eng.75.historical_info: "Погром у День святої Схоластики — зіткнення між студентами та жителями Оксфорда, що призвело до встановлення довгої неприязні між університетом та містянами, оскільки скандал закінчився кількома жертвами з обох сторін. Університет звернувся до папського суду, який виніс рішення на користь позивача."
  flavor_eng.76.title: "Закулісні шепоти"
  flavor_eng.76.desc: "Наш двір прийняв посланця, який прибув з важливими звістками. Очевидно, деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], що зберігають вірність колишній владі, збираються потай влаштувати державний переворот. Жертвою його стане, зрозуміло, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l].\n\nПодробиці змови нам поки невідомі, проте, якщо в правильні руки потрапить значна сума грошей, можливо, щось стане зрозуміліше."
  flavor_eng.76.a: "Запропонуємо гроші за подробиці."
  flavor_eng.76.b: "Пусті чутки. Женіть його геть!"
  flavor_eng.76.tt: "Посланцю буде #R відмовлено#!"
  flavor_eng.76.historical_info: "Водохресна змова — невдала спроба вбити короля Генріха VI. Правління Генріха почалося зі скинення та ув’язнення попереднього монарха — Річарда II, а тому він не користувався особливою любов’ю у підданих, які влаштували низку заколотів. Після Водохресної змови Генріх переконався, що залишати Річарда живим було просто небезпечно, а тому заморив скинутого короля голодом, так і не випустивши його з ув’язнення."
  flavor_eng.77.title: "Таємний заколот"
  flavor_eng.77.desc: "[target_character.GetName] виявився юним таємничим посланцем. Він пояснив нам, що деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], якими керує [john_montagu.GetName], замишляють злодіяння: під час турніру в день Богоявлення в місті [windsor.GetName], де буде присутній [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], вони збираються захопити та вбити монарха."
  flavor_eng.77.a: "Візьмемо до відома."
  flavor_eng.78.title: "Богоявлення"
  flavor_eng.78.desc: "Сьогодні відзначається щорічне свято поклоніння волхвів Ісусу Христу. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] з усієї країни з’їжджаються відсвяткувати цей радісний день. Буде присутній і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]; з цієї нагоди заплановані співи, благословення будинків, а головне — грандіозний турнір."
  flavor_eng.78.a: "Потай скасуємо нашу присутність."
  flavor_eng.78.b: "Ми будемо там присутні."
  flavor_eng.78.historical_info: "День Богоявлення — християнське свято на честь поклоніння трьох волхвів Ісусу Христу у Вифлеємі. Присвячене також хрещенню Христа та визнанню його сином Божим."
  flavor_eng.79.title: "Водохресна змова"
  flavor_eng.79.desc: "Заколотники, які прибули до замку [target_location.Custom('LR_GEN')|l] [target_location.GetName], виявили, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не присутній на святкуваннях. Дізнавшись, що їхні плани виявилися розкриті, вони втекли і підняли заколот вже далеко від замку."
  flavor_eng.79.a: "Нехай з цим розбираються місцеві власті."
  flavor_eng.79.b: "Голови з пліч!"
  epiphany_rebellion_support: "Водохресна змова"
  flavor_eng.80.title: "Державний переворот"
  flavor_eng.80.desc: "Бунтівники, що прибули до замку [target_location.Custom('LR_GEN')|l] [target_location.GetName], виявили, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] віддається святкуванням. Близько чотирьох сотень воїнів, які супроводжували повстанців, миттєво затримали монарха."
  flavor_eng.80.a: "Запропонуємо піти на поступки в обмін на свободу."
  flavor_eng.80.b: "Проявимо твердість."
  flavor_eng.82.title: "Промова короля"
  flavor_eng.82.desc: "#L [french.GetName]а#! мова, принесена на територію нашої країни в 1066 році норманськими завойовниками, швидко замінила староанглійську як придворну. Вже не перше століття вся офіційна документація ведеться тільки французькою, проте останнім часом [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] все частіше чує заклики перейти на мову, якою користується населення країни.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] вважає, що це питання розумно буде обговорити під час наступного парламентського засідання."
  flavor_eng.82.a: "Чудова думка."
  flavor_eng.82.b: "Non, non, non! Жахлива думка."
  flavor_eng.82.historical_info: "Перше офіційне звернення до англійського парламенту англійською мовою відбулося в роки правління короля Едуарда III. Зазвичай під час парламентських засідань використовувалися латина та французька. Відхід від цієї традиції, ймовірно, був зумовлений спробою зменшити вплив французької мови на тлі конфлікту з Францією та підкреслити англійське походження самого короля."
  flavor_eng.83.title: "Винахід тенісу"
  flavor_eng.83.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] сьогодні славиться як місце зародження нового виду спорту з ракеткою, яким захоплюються [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Назва його — теніс — походить від англо-нормандського слова #italic tenez#!, яке можна перекласти як «тримай» або «лови». Теніс схожий з «грою королів» — різниця лише в тому, що в нього грають на відкритому повітрі."
  flavor_eng.83.a: "Накажемо послам поширити цю новину."
  flavor_eng.83.b: "Заохотимо будівництво тенісних майданчиків."
  flavor_eng.83.historical_info: "Вперше в теніс почали грати англійці та французи ще в Середні віки. Тоді ігри проходили в приміщеннях, а правила та методи були досить складними."
  flavor_eng.84.title: "Золотий флорин"
  flavor_eng.84.desc: "Континентальний флорин — єдина валюта, за допомогою якої європейські купці ведуть континентальну торгівлю. Деякі країни карбують власний різновид цієї монети; так, наші купці користуються в основному #L [GetCountry('FRA').GetAdjective|l]им#! флорином.\n\nНам слід почати випускати окрему #L [ROOT.GetCountry.GetAdjective|l]у#! валюту на основі флорина, яку прийматимуть як всередині країни, так і за кордоном."
  flavor_eng.84.a: "Почнемо випуск."
  flavor_eng.84.b: "Продовжимо користуватися [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ими монетами."
  flavor_eng.84.historical_info: "Золотий флорин — англійська монета, що з'явилася в добу правління короля Едуарда III. З'явилася вона не тільки через необхідність вести міжнародну торгівлю, а й як відповідь на золоті монети інших європейських країн. Флорин не користувався популярністю на батьківщині і поступово вийшов там з ужитку, проте якийсь час залишався в обігу у купців, що займалися торгівлею з іншими країнами."
  flavor_eng.85.title: "Богадільня Святого Фоми"
  flavor_eng.85.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] користується попитом у численних паломників з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!: вони сподіваються, що [target_ruler.GetName] дарує їм повне відпущення гріхів. Однак цих паломників просто ніде розміщувати, і вони змушені тулитися в сирих, вогких і неймовірно дорогих заїжджих дворах.\n\nНевелика громада #L [ROOT.GetCountry.GetAdjective|l]их#! торговців чотками, що вкоренилася у священному місті, збирається купити будинок, щоб влаштувати там притулок для бідних, хворих, знедолених і нещасних жителів [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_eng.85.a: "Запропонуємо їм королівське покровительство."
  flavor_eng.85.b: "Зробимо пожертву."
  flavor_eng.85.c: "Подамо бідним милостиню."
  flavor_eng.85.historical_info: "Англійську богадільню імені Святої Трійці та Святого Фоми заснувала 1362 року англійська громада, що оселилася в Римі. Спочатку цей заклад призначався для паломників, які прибували до міста і не могли дозволити собі проживання в заїжджих дворах — дорогих, незручних і переповнених, де нерідко виникали спалахи насильства."
  flavor_eng.86.title: "Всесвітня хроніка"
  flavor_eng.86.desc: "#L [ROOT.GetCountry.GetAdjective]ий#! монах-бенедиктинець і хроніст, що проживає в монастирі Святої Вербурги, склав докладну хроніку, яка описує історичні події аж до наших днів. У хроніці містяться такі суперечливі твердження, як «Земля кругла, оскільки під час затемнення вона відкидає на Місяць круглу тінь».\n\nНеобхідно якнайшвидше приступити до перепису цього шедевра, всі жителі [ROOT.GetCountry.Custom('CL_GEN')] тільки виграють від такої змістовної праці."
  flavor_eng.86.a: "Приготуємо пера."
  flavor_eng.86.b: "Тут безліч суперечностей."
  flavor_eng.86.historical_info: "#italic «Всесвітня хроніка»#! — середньовічна праця, що описує різні історичні події аж до XIV століття. Хроніка розділена на сім книг, кожна з яких нерідко пропонує своєрідний погляд на те, що відбувалося, суперечить загальновідомим в ту добу фактам. Католицька церква вважала цей твір єрессю."
  flavor_eng.89.title: "[owain_glyndwr.GetNameWithNoTooltip] та один незвичайний випадок"
  flavor_eng.89.desc: "#L [ROOT.GetCountry.GetAdjective]ий#! барон оголосив видатного #L [GetCountry('WLS').GetAdjective|l]ого#! дворянина, адвоката та полководця зрадником за те, що той не зумів зібрати війська для майбутньої кампанії.\n\nДворянин, відомий під іменем [owain_glyndwr.GetName], стверджує, що особисто написав монарху листа, в якому заявляє про свою невинність. Також він звернувся до суду, який, втім, відмовився його вислуховувати."
  flavor_eng.89.a: "Не будемо читати листа."
  flavor_eng.89.tt: "[owain_glyndwr.GetNameWithNoTooltip], ймовірно, звернеться до [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]ого зібрання"
  flavor_eng.89.b: "Скасуємо рішення судів."
  flavor_eng.90.title: "Повстання Гліндура"
  flavor_eng.90.desc: "#L [GetCountry('WLS').GetAdjective]ий#! народ обрав собі нового вождя, здатного підняти бунт. #L #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Знать#!#! вже об'єдналася під владою новообраного керівника на ім'я Оуайн Гліндур. Тепер він збирається відновити прадавні [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]і закони, забезпечити незалежність церкви та скликати національний парламент."
  flavor_eng.90.a: "Придушимо заколот."
  flavor_eng.90.historical_info: "Повстання Гліндура, також відоме як бунт валлійців, влаштував валлійський дворянин Оуайн Гліндур, нащадок правителів королівства Повіс. Ґрунтом для повстання стало невдоволення корінних жителів Уельсу, які вважали, що їх утискають і принижують. Набравши достатньо прихильників, Гліндур оголосив себе принцом Уельським і підняв бунт проти англійської влади. Однак ці прагнення закінчилися невдачею: Англія придушила повстання."
  flavor_eng.91.title: "[owain_glyndwr.GetNameWithNoTooltip] полонив аристократа"
  flavor_eng.91.desc: "У ході недавньої прикордонної сутички з #L [GetCountry('WLS').GetAdjective|l]ими#! заколотниками один з наших високородних дворян — [edmund_mortimer.GetName] — потрапив у полон. Вже ходять чутки, що він з невідомих нам причин добровільно перейшов на [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]у сторону.\n\nЧлени благородного роду [percy_dynasty.GetName] з провінції [northumberland.GetName] та близькі друзі династії [mortimer_dynasty.GetName] просять нас дати їм можливість викупити свого родича."
  flavor_eng.91.a: "Жодних викупів. Конфіскуємо всі володіння сімейства [mortimer_dynasty.GetNameWithNoTooltip]."
  flavor_eng.91.tt1: "Сім'ї [percy_dynasty.GetNameWithNoTooltip] та [mortimer_dynasty.GetNameWithNoTooltip] сильно ображаються"
  flavor_eng.91.b: "Заплатимо необхідний викуп."
  flavor_eng.91.tt2: "[edmund_mortimer.GetNameWithNoTooltip] буде випущений з полону"
  flavor_eng.91.historical_info: "Полонення Едмунда Мортімера значно змінило і без того нестабільну політичну обстановку в Англії того часу. Мортімер претендував на англійський престол, а його сім'я вважалася майже що суперниками самого короля. Після того як Едмунд потрапив у полон, загроза для королівської влади значно знизилася, оскільки зв'язки воєначальника з валлійськими заколотниками поставили хрест на легітимності його домагань."
  flavor_eng.92.title: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]ий імператор відвідує [ROOT.GetCountry.Custom('CL_ACC')]"
  flavor_eng.92.desc: "Правитель #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! вирушає на захід у пошуках підтримки інших монархів-християн у боротьбі проти #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#!.\n\nЯкщо правителю не вдасться зібрати достатньо золота на зміцнення оборони, провінція [target_province.GetName] напевно впаде під натиском сарацинів."
  flavor_eng.92.a: "Запропонуємо гроші та притулок."
  flavor_eng.92.b: "Ми нічого не можемо запропонувати."
  flavor_eng.92.historical_info: "У грудні 1400 року візантійський імператор, прагнучи заручитися підтримкою європейських монархів проти Османської імперії, що набирала сили, вирушив до англійського короля Генріха IV. Турецьке військо на той час уже загрожувало безпосередньо Константинополю — столиці Візантії. Втім, імператорські успіхи виявилися досить скромними: йому так і не вдалося набрати достатньо коштів на зміцнення своєї країни."
  flavor_eng.93.title: "De heretico comburendo"
  flavor_eng.93.desc: "У нашій країні міцно вкорінилася єресь. Особливо вперто поширює її рух лоллардів, що користується підтримкою населення. Нам слід ухвалити закон, який дозволить спалювати іновірців на вогнищі, а заодно посилити боротьбу з тими, хто ще не усвідомив, що його погляди суперечать церковним догмам."
  flavor_eng.93.a: "Ухвалимо такий закон."
  flavor_eng.93.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] посилять боротьбу з релігійними меншинами та відправлять їх на вогнище"
  flavor_eng.93.b: "Це занадто жорстоко."
  flavor_eng.93.historical_info: "#italic De heretico comburendo#! — англійський закон, ухвалений наприкінці XIV століття. Згідно з цим законом дозволялося переслідування та покарання єретиків, а незабаром ним почали виправдовувати спалення тих, чиї релігійні погляди розходилися з прийнятим вченням католицької церкви."
  flavor_eng.94.title: "[john_capgrave.GetNameWithNoTooltip]"
  flavor_eng.94.desc: "[john_capgrave.GetName] — видатний викладач і богослов, який докладно описав житія #L [ROOT.GetCountry.GetAdjective|l]их#! святих. Свої праці Капгрейв зазвичай присвячував різним питанням релігійного життя, проте нещодавно він, взявши за основу положення августиніанства, почав складати працю зі світової історії. У своїх творах він не тільки описує історичні події, а й повчає читача морально та духовно.\n\nКапгрейв — відомий діяч, який прославився в багатьох галузях просвітництва. Його таланти напевно зможуть надихнути й інших наших мислителів."
  flavor_eng.94.a: "Він чудово доповнить наш двір."
  flavor_eng.94.tt1: "З'явиться [Concept('character', 'персонаж')|e] [john_capgrave.GetNameWithNoTooltip]"
  flavor_eng.94.b: "Нехай вільно викладає свої тлумачення."
  flavor_eng.94.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.94.c: "Спалимо його за єресь."
  flavor_eng.94.tt3: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.94.historical_info: "Джон Капгрейв — англійський історик, богослов і письменник, який прославився своїми історичними нотатками та богословськими трактатами. Особливо відома його праця «Хроніка Англії», присвячена історії цієї країни, починаючи з давніх, легендарних часів і закінчуючи роком видання книги. Внесок Капгрейва в середньовічну літературу та історію особливо цінується сучасними вченими, оскільки дозволяє близько поглянути на повсякденне життя англійців XV століття."
  flavor_eng.95.title: "Тристороння угода"
  flavor_eng.95.desc: "Сім'ї [percy_dynasty.GetName] та [mortimer_dynasty.GetName] уклали угоду з #L [GetCountry('WLS').GetAdjective|l]им#! вождем. [GetCountry('WLS').GetGovernment.GetRuler.GetName] погоджується на розділення #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!; країна порівну відійде всім учасникам. Така сила серйозно загрожує територіальній цілісності нашої країни.\n\nСімейство [mortimer_dynasty.GetNameWithNoTooltip] намагатиметься зайняти північ країни, сімейство [percy_dynasty.GetNameWithNoTooltip] ж зайде із заходу."
  flavor_eng.95.a: "Цей нечестивий союз не заслуговує жодної пощади."
  flavor_eng.95.b: "Звернемося до сімейства [percy_dynasty.GetNameWithNoTooltip]."
  percy_uprising: "Бунтарі з династії Персі"
  flavor_eng.95.tt2: "Члени сім'ї [percy_dynasty.GetNameWithNoTooltip], можливо, погодяться скласти зброю в обмін на значну суму золота"
  flavor_eng.95.c: "Звернемося до сімейства [mortimer_dynasty.GetNameWithNoTooltip]."
  mortimer_uprising: "Заколотники з династії Мортімер"
  flavor_eng.95.tt3: "Члени сім'ї [mortimer_dynasty.GetNameWithNoTooltip], можливо, погодяться скласти зброю в обмін на щедру пожертву"
  flavor_eng.95.tt4: "Сім'ї [percy_dynasty.GetNameWithNoTooltip] та [mortimer_dynasty.GetNameWithNoTooltip] зберуть війська в #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленді#!#! та #TOOLTIP:PROVINCE_DEFINITION,staffordshire_province,X #L Стаффордширі#!#!"
  flavor_eng.95.historical_info: "Тристороння угода — це договір, згідно з яким Англію та Уельс планувалося поділити порівну між усіма учасниками, утворивши окремі королівства. Якби цей задум відбувся, король Генріх IV втратив би владу."
  flavor_eng.96.title: "[john_thornton.GetNameWithNoTooltip]"
  flavor_eng.96.desc: "Духовенство [target_location.Custom('LR_GEN')|l] [target_location.GetName] нещодавно замовило скління місцевого #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедрального собору#!#!. Оскільки [target_location.GetNameWithNoTooltip] — важливий [target_location.GetRank.GetNameWithNoTooltip|l], виконувати цю роботу має не хто інший, як знаменитий скляр та художник-вітражист [john_thornton.GetName]. Його скло вже широко відоме своєю якістю, а сам Торнтон чимало посприяв розвитку готичної архітектури."
  flavor_eng.96.a: "Сповістити всіх про його талант."
  flavor_eng.96.tt1: "З'явиться [Concept('character', 'персонаж')|e] [john_thornton.GetNameWithNoTooltip]"
  flavor_eng.96.b: "Наш [windsor.GetNameWithNoTooltip]ський замок не завадило б привести до ладу."
  flavor_eng.96.c: "Краще залишимо його в спокої."
  flavor_eng.96.tt2: "[john_thornton.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_eng.96.historical_info: "Джон Торнтон — художник-вітражист, особливо прославився роботою над східним вікном Йоркського собору — одним із найбільших та найвидатніших середньовічних вітражів і справжнім шедевром середньовічного мистецтва."
  flavor_eng.97.title: "Біблія Вікліфа"
  flavor_eng.97.desc: "Основа основ #TOOLTIP:RELIGION,$lollardy_tt$,X #L лолардизму#!#! — уміння читати та розуміти біблійні вчення. Оскільки народ говорить #L [english.GetName|l]ською мовою#!, нею ж слід перекладати Слово Боже, щоб кожен добрий християнин міг ознайомитися з Євангелієм."
  flavor_eng.97.a: "Спробуємо видати її."
  flavor_eng.97.a.custom: "На честь Джона Вікліфа видається перекладена копія"
  flavor_eng.97.a.custom2: "Видання перекладеної копії Біблії заборонено"
  flavor_eng.97.tt1: "Політика #italic De Heretico Comburendo#! забороняє видання такої літератури, спроба обійти заборону викличе протест"
  flavor_eng.97.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені порушенням [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.97.b: "Вистежимо підбурювачів."
  flavor_eng.97.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] можуть спалити тих, хто висунув цю пропозицію, завдяки політиці #italic De Heretico Comburendo#!"
  flavor_eng.97.c: "Виступимо проти."
  flavor_eng.97.tt4: "Лоларди вважатимуть такий крок зрадою"
  flavor_eng.97.historical_info: "Біблія Вікліфа — перший повний переклад Біблії англійською мовою, що відіграло значну роль у розвитку та стандартизації цієї мови. Переклад був заснований на латинській версії — офіційній Біблії в Римській католицькій церкві. Оскільки прості англійці здебільшого не володіли латиною, Вікліф поставив перед собою мету зробити Біблію зрозумілою кожному."
  flavor_eng.98.title: "Питання про останки Вікліфа"
  flavor_eng.98.desc: "[GetCountry('PAP').GetGovernment.GetRuler.GetName] наказує: [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] зобов'язані виконати волю Констанцького собору, що стосується долі останків єретика на ім'я [john_wycliffe.GetName]. Таке рішення викликало невдоволення послідовників засудженого: вони вважають цей жест утиском своїх релігійних поглядів."
  flavor_eng.98.a: "Викопаємо його."
  flavor_eng.98.tt1: "Останки Джона Вікліфа будуть викопані та викинуті в річку Ейвон"
  flavor_eng.98.b: "Нехай спочиває з миром."
  flavor_eng.98.historical_info: "Через 40 років після смерті Джона Вікліфа католицька церква оголосила покійника єретиком. Могилу на церковному цвинтарі, де той був похований, розкопали, а кістки спалили. Однак авторитет самого Вікліфа це анітрохи не похитнуло; навпаки, до його ідей постійно долучалися все нові послідовники, які відіграли значну роль у становленні перших реформістських рухів в Англії."
  flavor_eng.99.title: "Сходження лоллардів"
  flavor_eng.99.desc: "Постійні гоніння на єретиків, спалення їх на вогнищі, а також осквернення останків Джона Вікліфа налаштували реформістів проти нас. Десятки й сотні людей беруться за вила та інші знаряддя з твердим наміром відстояти свої вірування, оскільки вважають, що ми грубим чином ображаємо #TOOLTIP:RELIGION,$lollardy_tt$,X #L лоллардизм#!#!."
  flavor_eng.99.desc_generic: "Постійні гоніння та вороже ставлення налаштували реформістів, які сповідують [ShowReligionName('lollardy')], проти нас. Десятки й сотні людей беруться за вила та інші знаряддя з твердим наміром боротися з несправедливістю, оскільки вважають, що ми грубим чином ображаємо їхні вірування."
  flavor_eng.99.a: "Прикро, але не страшно."
  flavor_eng.99.tt: "Лолларди піднімуть відкрите повстання"
  lollard_uprising: "Бунтівні лолларди"
  flavor_eng.99.historical_info: "Повстання лоллардів — це бунт, піднятий у південно-східних графствах Англії на соціально-релігійному ґрунті. Причиною послужило невдоволення лоллардів прийнятими релігійними обрядами та державною політикою. Заколотники вимагали відставки тих єпископів, яких вони вважали єретиками, а також скасування десятин і проведення інших релігійних реформ. Повстання було згодом придушене військами, а керівники — взяті в полон і страчені."
  flavor_eng.100.title: "Замерзла Темза"
  flavor_eng.100.desc: "Настали заморозки, і Темза від земель #TOOLTIP:PROVINCE_DEFINITION,kent_province,X #L Кента#!#! до #L #TOOLTIP:LOCATIONRANK,[london.Custom('LR_tt')],X [london.Custom('LR_GEN')]#!#! [london.GetName] вкрилася кригою. Морська торгівля з континентом паралізована. Починається нестача життєво важливих товарів. Ймовірно, [london.GetRank.GetNameWithNoTooltip|l] [london.GetNameWithNoTooltip] ще якийсь час буде змушений обходитися без поставок водою, поки наші купці вирішують питання про прокладання нових маршрутів."
  flavor_eng.100.a: "Прикро, але не страшно."
  STATIC_MODIFIER_NAME_wine_imports_banned: "Обмежено імпорт вина"
  STATIC_MODIFIER_NAME_wool_imports_banned: "Обмежено імпорт вовни"
  STATIC_MODIFIER_NAME_fur_imports_banned: "Обмежено імпорт хутра"
  STATIC_MODIFIER_NAME_cloth_exports_banned: "Обмежено імпорт сукна"
  STATIC_MODIFIER_NAME_fine_cloth_exports_banned: "Обмежено імпорт тонкого сукна"
  trade_impaired: "Підірвана торгівля"
  flavor_eng.100.tt1: "Купці, для яких [london.GetRank.GetNameWithNoTooltip|l] [london.GetName] слугує центром ведення континентальної торгівлі, будуть змушені фрахтувати судна в інших торгових портах"
  flavor_eng.100.b: "Надамо кошти для перенесення торгівлі до міста [southampton.GetNameWithNoTooltip]."
  flavor_eng.100.tt2: "Портове управління [southampton.Custom('LR_GEN')|l] [southampton.GetName] побудує торговий вузол і розширить портову акваторію, щоб вмістити більше суден"
  flavor_eng.100.tt3: "Портове управління [southampton.Custom('LR_GEN')|l] [southampton.GetName] розширить портову акваторію, щоб вмістити більше суден"
  flavor_eng.100.c: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] проспонсорують перенесення торгівлі до [southampton.Custom('LR_ACC')|l] [southampton.GetNameWithNoTooltip]."
  flavor_eng.100.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] побудують торговий вузол і розширять портову акваторію, щоб вмістити більше суден"
  flavor_eng.100.tt5: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] розширять портову акваторію, щоб вмістити більше суден"
  flavor_eng.100.historical_info: "24 листопада 1434 року річка Темза замерзла. Поки в XIX столітті не почалося будівництво набережних і поглиблення річки, такі явища були звичними, однак та зима виявилася настільки суворою, що привозити товари та продовольство до міста доводилося суходолом."
  flavor_eng.101.title: "Гоніння на релігійні меншини"
  flavor_eng.101.desc_common: "Тих, хто наважується мислити інакше, чекає геєна вогняна. Але потраплять вони туди через звичайне вогнище, яке очищає від гріха, а заодно приваблює величезні натовпи роззяв."
  flavor_eng.101.desc_artist: "Після ухвалення політики $de_heretico_comburendo$ [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] з подвоєною ревністю почали полювати на єретиків, інакодумців та всіх, хто був не згоден з віровченням церкви. Їхня старанність не пройшла дарма: серед інших [Select_CString(target_artist.IsFemale,'була схоплена', 'був схоплений')] та [Select_CString(target_artist.IsFemale,'засуджена', 'засуджений')] [target_artist.GetName].\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.desc_character: "Після ухвалення політики $de_heretico_comburendo$ [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], яких твердо підтримує [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l], з подвоєною ревністю почали полювати на єретиків та всіх, хто боровся з #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтвом#!#!. Вони не щадять нікого — кари уникають хіба що [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l].\n\nСтаранність церкви не пройшла дарма. [target_character.GetName], крім інших, [Select_CString(target_character.IsFemale,'була схоплена', 'був схоплений')] та [Select_CString(target_character.IsFemale,'засуджена', 'засуджений')].\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.desc: "Після ухвалення політики $de_heretico_comburendo$ [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] з подвоєною ревністю почали полювати на єретиків, інакодумців та всіх, хто був не згоден з віровченням церкви. Їхня старанність не пройшла дарма: виявилося, що в [target_location.Custom('LR_PREP')|l] [target_location.GetName] переховувалося одразу кілька злочинців. Усі, кого не вбили на місці за збройний опір, були схоплені та засуджені.\n\n$flavor_eng.101.desc_common$"
  flavor_eng.101.a: "Потрібно більше хмизу."
  flavor_eng.101.b: "Потрібно цьому противитися."
  flavor_eng.101.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не вітатимуть сумнівів у положеннях #italic De Heretico Comburendo#!"
  flavor_eng.101.historical_info: "Одним із найжорстокіших покарань за віровідступництво вважалося спалення на вогнищі — так зазвичай страчували єретиків. Були, втім, й інші покарання: відлучення від церкви, ув'язнення та обезголовлення."
  flavor_eng.102.title: "[john_oldcastle.GetNameWithNoTooltip]"
  flavor_eng.102.desc: "[john_oldcastle.GetName] брав участь у кількох військових походах, а також служив мировим суддею та старшим шерифом рідного #TOOLTIP:PROVINCE_DEFINITION,herefordshire_province,X #L Герефордшира#!#!. Такий великий досвід може нам стати в нагоді.\n\nЙого слід поставити на чолі збройних сил, хоч він і єретик."
  flavor_eng.102.a: "Знайдемо, де застосувати його таланти."
  flavor_eng.102.tt1: "З'явиться [Concept('character', 'персонаж')|e] [john_oldcastle.GetNameWithNoTooltip]"
  flavor_eng.102.b: "Він живе оманами. Нам такі не потрібні."
  flavor_eng.102.tt2: "[john_oldcastle.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_eng.102.c: "Нехай служить нам на іншій посаді."
  flavor_eng.102.historical_info: "Сер Джон Олдкасл — лицар, який прийняв сторону лолардів, що стали предтечею протестантської реформації. Він брав участь у так званому повстанні лолардів проти короля Генріха IV. Заколот був придушений, а сам сер Джон був полонений і згодом засуджений за єресь та зраду. Покаранням за такі гріхи була смерть."
  flavor_eng.103.title: "Ніколас Герефордський"
  flavor_eng.103.desc: "[nicholas_of_hereford.GetShortName] родом із #TOOLTIP:LOCATION,hereford,X #L Герефорда#!#!, близький друг Джона Вікліфа, який успішно закінчив #TOOLTIP:LOCATION,oxford,X #L Оксфорд#!#!, виступає проти нібито розкішного життя священнослужителів та підтримує «право кожного християнина самостійно прийти до віри» за допомогою читання Біблії.\n\nНам стало відомо, що останнім часом він спільно з іншими працює над перекладом Священного Писання, щоб прочитати його змогли навіть селяни."
  flavor_eng.103.a: "Запросимо його до двору."
  flavor_eng.103.tt1: "З'явиться [Concept('character', 'персонаж')|e] [nicholas_of_hereford.GetShortNameWithNoTooltip]"
  flavor_eng.103.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] розлютяться від єретика при дворі — це суперечить [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.103.b: "Спалити його за єресь!"
  flavor_eng.103.tt3: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.103.c: "Нехай перекладає деінде."
  flavor_eng.103.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.103.historical_info: "Ніколас Герефордський — богослов та вчений, вірний послідовник впливового англійського мислителя та богослова Джона Вікліфа. Після смерті останнього обіймав провідну роль у русі прихильників Вікліфа, які виступали за релігійні та теологічні реформи в католицькій церкві."
  flavor_eng.104.title: "[margaret_beaufort.GetNameWithNoTooltip]"
  flavor_eng.104.desc: "Настав час обрати наречену, яку візьме за дружину [brother.GetName] — брат нашого монарха. [margaret_beaufort.GetName] — хитромудра та кмітлива жінка, нащадок такого знаменитого короля, як [henry_iii.GetName]. Завдяки їй династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] зможе висунути вагоміші претензії на престол, якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] помре, не залишивши законних спадкоємців (хоч це й малоймовірно).\n\nОднак її не люблять [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], оскільки Маргарет стверджує, що її веде Божа воля. Поза всяким сумнівом, подібний шлюб зазнає осуду."
  flavor_eng.104.a: "Нехай [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] почує дзвін весільних дзвонів."
  flavor_eng.104.tt1: "З'явиться [Concept('character', 'персонаж')|e] [margaret_beaufort.GetNameWithNoTooltip], народжується [henry_tudor.GetName]"
  flavor_eng.104.b: "Вона нас тільки наврочить."
  flavor_eng.104.tt2: "З'явиться [Concept('character', 'персонаж')|e] [margaret_beaufort.GetNameWithNoTooltip]"
  flavor_eng.104.historical_info: "Маргарет Бофорт — мати Генріха VII, яка народила його у віці всього 13 років. Вона відігравала важливу роль у численних змовах, що призвели до сходження Генріха на англійський престол. Крім того, Маргарет запам'яталася своїми непохитними релігійними поглядами та набожністю — так, вона заснувала кембриджські Коледж Христа та Коледж Святого Іоанна."
  flavor_eng.105.title: "[henry_tudor.GetNameWithNoTooltip] та його прагнення"
  flavor_eng.105.desc: "Прагнучи надати своєму синові тільки найкраще, [margaret_beaufort.GetName] почала плести змову, жертвою якої стане [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Допомагає їй [henry_stafford.GetName], герцог провінції [buckingham.GetName]. З його допомогою Маргарет об'єднала незадоволених аристократів та всіх, хто ще зберігає вірність #TOOLTIP:DYNASTY,$lancaster_dynasty_tt$,X #L Ланкастерам#!#!. Наступний крок — повстання.\n\nКоли воно почнеться, [henry_tudor.GetName], за задумом матері, повинен буде повести військо, що стоїть зараз у #TOOLTIP:AREA,brittany_area,X #L Бретані#!#!, і спробувати силою захопити владу."
  flavor_eng.105.desc_henry: "[henry_tudor.GetName], ведений честолюбними прагненнями, почав плести змову, жертвою якої стане [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Підтримують його не тільки жителі #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, а й деяка кількість тих, хто ще зберігає вірність #TOOLTIP:DYNASTY,$lancaster_dynasty_tt$,X #L Ланкастерам#!#!. Завдяки своєму [GetCountry('WLS').GetAdjectiveWithNoTooltip|l]ому походженню [henry_tudor.GetName] також зумів залучити на свій бік якщо не #ONCLICK:COUNTRY,[GetCountry('WLS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('WLS').Custom('CL_tt')],X [GetCountry('WLS').Custom('CL_ACC')|L]#!#! цілком, то багатьох вихідців звідти."
  flavor_eng.105.a: "Зустрінемося в бою."
  flavor_eng.105.a.tooltip1: "Герцог провінції [buckingham.GetNameWithNoTooltip] збирає військо та приєднується до війська, яке веде [henry_tudor.GetNameWithNoTooltip]"
  flavor_eng.105.a.tooltip2: "[henry_tudor.GetNameWithNoTooltip] відпливає з #TOOLTIP:AREA,brittany_area,X #L Бретані#!#! в бік [GetCountry('WLS').Custom('CL_GEN')], де об'єднується зі своїми прихильниками серед місцевої знаті"
  flavor_eng.105.b: "Зустрінемося в бою."
  flavor_eng.105.b.custom: "[henry_tudor.GetNameWithNoTooltip] відпливає з #TOOLTIP:AREA,brittany_area,X #L Бретані#!#! в бік [GetCountry('WLS').Custom('CL_GEN')], де об'єднується зі своїми прихильниками"
  flavor_eng.105.c: "Зречемося престолу — нехай його займе [henry_tudor.GetNameWithNoTooltip]."
  henry_tudor_support: "Прихильники Генріха Тюдора"
  flavor_eng.105.historical_info: "7 серпня 1485 року Генріх Тюдор висадився в Уельсі з невеликим військом. Висадка ця мала мати стратегічний ефект: майбутній король сподівався заручитися підтримкою валлійців, оскільки сам був з валлійського роду. Після цього він рушив маршем до володінь англійського короля Річарда III, залучаючи по дорозі все нових прихильників, у тому числі валлійських вояків та позбавлених спадщини дворян-йоркістів."
  flavor_eng.106.title: "[william_caxton.GetNameWithNoTooltip]"
  flavor_eng.106.desc: "Купець та письменник [william_caxton.GetName] звернувся до влади [target_location.Custom('LR_GEN')|l] [target_location.GetName] з пропозицією, яку ніхто раніше не висував: він хоче поставити там друкарський верстат та випускати з його допомогою книги. Подібний механізм вже відомий жителям Нідерландів, а тепер він стане в пригоді й #L [ROOT.GetCountry.GetAdjective|l]ій#! друкарській промисловості."
  flavor_eng.106.a: "[ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] чудово [Select_CString(william_caxton.IsFemale, 'їй', 'йому' )] підійде."
  flavor_eng.106.tt1: "З'явиться [Concept('character', 'персонаж')|e] [william_caxton.GetNameWithNoTooltip]"
  flavor_eng.106.tt2: "Він побудує друкарську майстерню та почне перекладати праці письменників з континенту"
  flavor_eng.106.tt3: "Він не надто вправний перекладач. #L [english.GetName]ська#! мова поповниться новими іноземними словами"
  flavor_eng.106.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені порушенням [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.106.b: "Відмовимо йому."
  flavor_eng.106.tt5: "[william_caxton.GetNameWithNoTooltip] вирушить в інші місця"
  flavor_eng.106.historical_info: "Вільям Кекстон — англійський першодрукар, який видав у країні першу друковану книгу англійською мовою. Він посприяв стандартизації англійської мови та зробив чималий внесок у поширення знань. Діяльність Кекстона спонсорували здебільшого дворяни, зокрема мати короля Маргарет Бофорт."
  flavor_eng.107.title: "Труднощі нової доби"
  flavor_eng.107.desc_common: "#L [ROOT.GetCountry.GetAdjective|l]а#! монархія, що похитнулася в роки Війни троянд, переживає світанок. Замість витрат на розкіш — лише розумні витрати та увага до кожної дрібниці. Скарбниця ж поповнюється за допомогою нового, досить суворого принципу оподаткування."
  flavor_eng.107.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] править настільки вміло, що $flavor_eng.107.desc_common$"
  flavor_eng.107.desc_henry: "[henry_tudor.GetName] — настільки вмілий правитель, що $flavor_eng.107.desc_common$\n\nКрім того, [henry_tudor.GetShortNameWithNoTooltip] — досвідчений дипломат, здатний одночасно умиротворювати стани та вводити нові податки."
  flavor_eng.107.a: "Хай живуть мир і процвітання."
  flavor_eng.107.a.custom: "Відкриває [Concept('government_reform', 'державну реформу')|e] «#TOOLTIP:GOVERNMENT_REFORM,benevolence_tax_reform,X #L «Добровільний податок»#!#!»"
  flavor_eng.107.b: "Процвітання нам забезпечене."
  flavor_eng.107.c: "Погріємося в променях стабільності."
  flavor_eng.107.historical_info: "Генріх VII зміцнив не лише власну владу, а й державний бюджет. За рекомендацією свого радника Джона Мортона він встановив так звані «добровільні» податки, вважаючи, що якщо хтось живе скромно, значить, він заощаджує гроші, а тому може дозволити собі передавати накопичення до казни; якщо ж хтось живе багато, значить, він не обмежений у коштах, а отже, податок його не обтяжить."
  flavor_eng.109.title: "Рада Півночі"
  flavor_eng.109.desc: "Нам повідомляють, що королівське правосуддя в північних графствах перебуває в гнітючому стані. Цьому сприяє, крім іншого, той факт, що [ROOT.GetCountry.GetCapital.GetName] занадто далеко. Якщо заснувати на півночі незалежну раду (для цього чудово підійде [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName]), що користується певною владою, вершити там правосуддя буде простіше."
  flavor_eng.109.a: "Ми згодні."
  flavor_eng.109.b: "Бюрократія — поганий вибір."
  STATIC_MODIFIER_NAME_lack_of_conciliar_justice: "Слабкість правосуддя"
  flavor_eng.109.historical_info: "Рада Півночі — адміністративний орган, заснований заради встановлення прямої влади над північними графствами. Радники не лише підтримували порядок, а й стежили за тим, щоб піддані зберігали вірність короні. У 1641 році, коли в Англії почалася громадянська війна, раду було розпущено."
  flavor_eng.110.title: "[elizabeth_woodville.GetNameWithNoTooltip]"
  flavor_eng.110.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] несподівано захоплюється юною дамою на ім'я [elizabeth_woodville.GetName] — скромною аристократкою та вірною підданою корони. Їхній зв'язок, ймовірно, обернеться #italic  cause célèbre#!; [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] сприймуть її вороже, а [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] почнуть розпускати чутки.\n\nЯк би там не було, Єлизавета вже народила двох дітей у попередньому шлюбі; [ROOT.GetCountry.GetGovernment.GetRuler.GetName] напевно може розраховувати на появу спадкоємців."
  flavor_eng.110.a: "Укладемо шлюб таємно."
  flavor_eng.110.tt1: "З'явиться [Concept('character', 'персонаж')|e] [elizabeth_woodville.GetNameWithNoTooltip]"
  flavor_eng.110.tt2: "[target_root_country.GetGovernment.GetRulerTitle] досягне в дипломатії більшого завдяки впливу Єлизавети"
  flavor_eng.110.b: "Заборонимо їхній шлюб."
  flavor_eng.110.tt3: "[target_root_country.GetGovernment.GetRulerTitle] страждатиме від горя та не зможе ефективно правити країною"
  flavor_eng.110.historical_info: "Єлизавета Вудвилл — англійська дворянка, яка в роки Війни троянд побувала заміжньою як за Йорком, так і за Ланкастером. Її шлюб з Едуардом IV — претендентом на англійський престол з боку Йорків — виявився настільки неоднозначним, що лише підштовхнув конфлікт між двома династіями. Втім, цей шлюб згодом поклав край війні, оскільки діти, що народилися в результаті нього, посприяли воцарінню династії Тюдорів."
  flavor_eng.111.title: "[cornwall.GetNameWithNoTooltip] відчуває труднощі"
  flavor_eng.111.desc_common: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|l] згадує про рудокопів, що видобувають #TOOLTIP:GOODS,tin,X #L олово#!#!#! у провінціях [cornwall.GetName] та [devon.GetName]. Оскільки вони не сплачують деякі види королівських та місцевих податків, скарбниця недоотримує кошти, такі необхідні в ці важкі години."
  flavor_eng.111.desc_indebted: "Зіткнувшись із фінансовими труднощами, $flavor_eng.111.desc_common$"
  flavor_eng.111.desc: "Зіткнувшись із фінансовими труднощами на тлі триваючої війни, $flavor_eng.111.desc_common$"
  flavor_eng.111.a: "Введемо особливий податок на субсидії та примусові позики."
  flavor_eng.111.a.custom1: "#TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! та #TOOLTIP:POPTYPE,burghers,X #L міщани#!#! в #TOOLTIP:PROVINCE_DEFINITION,cornwall_province,X #L Корнуоллі#!#! та #TOOLTIP:PROVINCE_DEFINITION,devon_province,X #L Девоні#!#! втрачають #R 90%#! [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_eng.111.a.custom2: "[Concept('prosperity', 'Процвітання')|e] в кожній належній нам [Concept('location', 'місцевості')|e] в #TOOLTIP:PROVINCE_DEFINITION,cornwall_province,X #L Корнуоллі#!#! та #TOOLTIP:PROVINCE_DEFINITION,devon_province,X #L Девоні#!#! зменшується на #R 50%#!"
  flavor_eng.111.tt1: "Видобувачі олова можуть піти на відчайдушний крок"
  flavor_eng.111.b: "Тимчасово відкличемо особливі привілеї."
  flavor_eng.111.b.custom: "Кожна належна нам [Concept('location', 'місцевість')|e] в #TOOLTIP:PROVINCE_DEFINITION,cornwall_province,X #L Корнуоллі#!#! та #TOOLTIP:PROVINCE_DEFINITION,devon_province,X #L Девоні#!#! отримує модифікатори #TOOLTIP:STATIC_MODIFIER,tin_mining_reduced,X #V #L «Знижено видобуток олова»#!#! та #TOOLTIP:STATIC_MODIFIER,privileges_revoked,X #V #L «Відкликано привілеї для рудокопів»#!#! на #W 4 роки#!"
  flavor_eng.111.tt2: "Видобувачі олова будуть незадоволені та вироблять менше руди"
  flavor_eng.111.c: "$common_string_leave_them_be$"
  STATIC_MODIFIER_NAME_tin_mining_reduced: "Знижено видобуток олова"
  STATIC_MODIFIER_NAME_privileges_revoked: "Відкликано привілеї для рудокопів"
  flavor_eng.111.historical_info: "На тлі розбіжностей, спричинених новими постановами в галузі видобутку олова, король Генріх VII призупинив роботу олов'яних рудників та тимчасово скасував привілеї корнуолльських рудокопів, які на той час робили значний внесок в економіку країни. Частково це рішення також було викликане війною з Шотландією, що вимагала відсутніх у королівській скарбниці коштів."
  flavor_eng.112.title: "Корнуолльське повстання"
  flavor_eng.112.desc: "Введення нових податків та порушення договору, який ще в 1305 році підписав [GetCharacter('eng_edward_i').GetName], змусило рудокопів, що видобувають #TOOLTIP:GOODS,tin,X #L олово#!#!#! у провінціях [cornwall.GetName] та [devon.GetName], відстоювати свій спосіб заробітку зі зброєю в руках."
  flavor_eng.112.a: "Та як вони сміють виступати проти нас?"
  flavor_eng.112.tt1: "Видобувачі олова об'єднають сили та піднімуть збройний заколот"
  flavor_eng.112.b: "Скасуємо примусові позики."
  flavor_eng.112.tt2: "[target_character.GetNameWithNoTooltip] — досвідчений дипломат, а тому знайде мирне рішення"
  cornish_rebellion: "Корнуолльське повстання"
  STATIC_MODIFIER_NAME_cornish_rebellion: "Корнуолльське повстання"
  flavor_eng.112.historical_info: "Корнуолльське повстання — великий заколот, що стався в Корнуоллі на ґрунті спроби короля відкликати у видобувачів олова привілеї, даровані їм ще кілька століть тому. Повстання згодом було придушене, але рудокопи домоглися свого: привілеї незабаром відновилися і проіснували ще 200 років."
  flavor_eng.114.title: "[thomas_wolsey.GetNameWithNoTooltip]"
  flavor_eng.114.desc: "Незважаючи на скромне походження, капелан [thomas_wolsey.GetName] зміг прославити своє ім'я на всю країну. Поза всяким сумнівом, цьому посприяв його видатний розум, так само як і інші якості — неймовірний талант до дипломатії та управління, а також старанність навіть у найстомливіших справах. #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! потрібні такі сини."
  flavor_eng.114.a: "Він чудово доповнить наш двір."
  flavor_eng.114.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_wolsey.GetNameWithNoTooltip]"
  flavor_eng.114.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будуть в люті від простолюду при дворі"
  flavor_eng.114.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть раді бачити при дворі впливового священнослужителя"
  flavor_eng.114.b: "Нехай служить нам радником."
  flavor_eng.114.tt4: "З'явиться [Concept('character', 'персонаж')|e] [thomas_wolsey.GetNameWithNoTooltip], він не зможе займати придворні посади"
  flavor_eng.114.tt5: "Він продовжить служити церкві, але при цьому [target_root_country.GetGovernment.GetRulerTitle|l] буде й далі отримувати від нього поради"
  flavor_eng.114.c: "Нехай представляє нас у місті [rome.GetNameWithNoTooltip]."
  flavor_eng.114.historical_info: "Томас Волсі — англійський державний діяч і кардинал, який обіймав при дворі короля Генріха VIII посаду лорда-канцлера. У його руках знаходилися, по суті, весь уряд і королівський двір. Волсі активно займався дипломатією та зовнішньою політикою, зокрема питанням розлучення короля з Катериною Арагонською. Втім, папа відмовився розірвати шлюб, тому Волсі швидко впав у немилість короля, був позбавлений посади і незабаром помер."
  flavor_eng.115.title: "Гемптон-корт"
  flavor_eng.115.desc: "Користуючись своїм високим становищем при дворі, [thomas_wolsey.GetName] за роки служби накопичив значний статок. Ці кошти він витрачає, зокрема, на мистецтво, а також жертвує релігійним орденам і вкладає в будівництво.\n\nВолсі попросив надати йому ділянку землі, що колись належала релігійному ордену. На цій ділянці він збирається побудувати палац у стилі Відродження. Ця грандіозна споруда, яку спроєктував [john_di_padova.GetName], затьмарить найвеличніші дива європейської архітектури."
  flavor_eng.115.a: "Розкішно і по-королівськи."
  eng_hampton_court_construction: "Будівництво Гемптон-корту"
  flavor_eng.115.a.custom: "[thomas_wolsey.GetNameWithNoTooltip] будує палац Гемптон-корт #W (доброї якості)#! у #TOOLTIP:LOCATION,london,X #L Лондоні#!#!"
  flavor_eng.115.b: "Краще витратимо ці гроші на жебраків і хворих."
  flavor_eng.115.historical_info: "Палац Гемптон-корт був побудований на початку XVI століття кардиналом Томасом Волсі. Цю споруду, примітну поєднанням архітектурних стилів Тюдорів і бароко, Волсі незабаром передав королю Генріху VIII, і Гемптон-корт швидко став улюбленою резиденцією монарха. Згодом палац протягом кількох століть не раз розширювався і перебудовувався, причому цю традицію заклав сам Генріх VIII."
  flavor_eng.116.title: "[thomas_more.GetNameWithNoTooltip]"
  flavor_eng.116.desc: "Посаду архієпископа міста [canterbury.GetName] зараз обіймає видатний гуманіст Ренесансу [thomas_more.GetName], з яким тісно дружить [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Нещодавно цей архієпископ на наполягання батька закінчив [oxford.GetName], де здобув юридичну освіту і, зокрема, вивчав античність. Ми вважаємо, що він стане гідним радником і зможе добре послужити своїй країні."
  flavor_eng.116.a: "Запросимо його до двору."
  flavor_eng.116.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть раді бачити при дворі впливового священнослужителя"
  flavor_eng.116.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] не будуть раді бачити при дворі єретика"
  flavor_eng.116.tt3: "З'явиться [Concept('character', 'персонаж')|e] [thomas_more.GetNameWithNoTooltip]"
  flavor_eng.116.b: "Дозволимо йому вільно висловлювати свою незгоду."
  flavor_eng.116.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.116.c: "Спалити його за єресь!"
  flavor_eng.116.tt5: "З'явиться [Concept('character', 'персонаж')|e] [thomas_more.GetNameWithNoTooltip], він не зможе займати придворні посади"
  flavor_eng.116.tt6: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.116.historical_info: "Томас Мор — адвокат, державний діяч і філософ доби Тюдорів, а також близький друг короля. Владу, набуту після потрапляння кардинала Волсі в опалу, він згодом втратив разом із життям через релігійні розбіжності. Мор ревно дотримувався вчення Римської католицької церкви і виступав проти протестантської реформації; він навіть відмовився визнати розрив короля з церквою."
  flavor_eng.117.title: "Присяга на верховенство"
  flavor_eng.117.desc: "Присяга на верховенство вимагає від того, хто її складає, визнати, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] є главою церкви. [thomas_more.GetName] відмовляється, при цьому усвідомлюючи, що така відмова карається смертною карою. Оскільки [thomas_more.GetLastNameWithNoTooltip] — противник Реформації та відділення від #L [ShowReligionAdjective('catholic')|l]ої#! церкви, він не може чинити всупереч власній совісті."
  flavor_eng.117.a: "Звинуватимо його у зраді."
  flavor_eng.117.tt1: "[target_root_country.GetGovernment.GetRulerTitle] буде сумувати за найкращим другом"
  flavor_eng.117.b: "Зробимо виняток."
  flavor_eng.117.tt2: "[target_root_country.GetGovernment.GetRulerTitle] буде звинувачуватися у фаворитизмі, від цього постраждає легітимність"
  flavor_eng.117.historical_info: "Присяга на верховенство — обов'язкова присяга, запроваджена в роки Реформації в Англії. Той, хто її складав, присягав на вірність королю Генріху VIII і визнавав монарха главою англіканської церкви, одночасно з цим відмовляючись визнавати папу римського та верховенство католицтва."
  flavor_eng.118.title: "Вражаюче виявлення могутності"
  flavor_eng.118.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale,'славетна', 'славетний')] своїм красномовством та дипломатичною майстерністю, [Select_CString(target_character.IsFemale,'запропонувала', 'запропонував')] дотепний задум. У разі успіху #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдасться не лише продемонструвати своє багатство та могутність, а й налагодити стосунки з владою #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!.\n\nБіля [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого кордону відбудеться зустріч двох монархів. Для неї вже обрано місце — [summit_location.GetName]. Звісно, облаштовано все буде так, як і личить королівським особам.\n\nТак, пропонується встановити розшиті золотом шатра або навіть звести тимчасовий палац."
  flavor_eng.118.a: "Чудова ідея."
  flavor_eng.118.tt1: "[GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCountry('FRA').Custom('CL_GEN')] отримає пропозицію про зустріч на «полі золотої парчі» — з величезними витратами"
  flavor_eng.118.tt2: "Значущість [ROOT.GetCountry.Custom('CL_GEN')] на міжнародній арені підвищиться завдяки такому дорогому заходу"
  flavor_eng.118.b: "Марна трата грошей."
  flavor_eng.119.title: "Поле золотої парчі"
  flavor_eng.119.desc: "До долини у супроводі великої свити підійшли обидва монархи. Кожен прагне лише одного: перевершити іншого своїм багатством. Звісно, не обійшлося і без простої цікавості, проте сьогодні найважливіше продемонструвати власні статки та витонченість.\n\nУсе поле заставлене численними наметами, які розшиті золотими нитками; зведені поруч споруди також прикрашені золотом і вражають погляд своєю пишністю. Вдалині на своїх гостей чекають майже 3000 наметів, збудованих для тих, хто не може похвалитися особливо високим становищем.\n\nДля справді королівських розваг готові турнірні майданчики — усе дійство неодмінно супроводжуватиметься бенкетом.\n\nВидовище справді чудове."
  flavor_eng.119.a: "Ми в захваті."
  flavor_eng.119.historical_info: "Зустріч на полі золотої парчі — мирні переговори між англійським королем Генріхом VIII та французьким королем Франциском I, що відбулися 1520 року біля міста Кале, яке тоді перебувало під владою Англії. Метою цих переговорів було поліпшення відносин між двома країнами та запобігання ворожнечі. Протягом кількох днів обидва монархи намагалися вразити один одного своїм багатством; поле, де вони зустрічалися, було забудоване прикрашеними золотом наметами. Загалом зустріч радше вдалася, проте уникнути ворожнечі надалі королі не змогли."
  flavor_eng.121.title: "Паломництво благодаті"
  flavor_eng.121.desc_dissolution_of_monasteries: "У #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленді#!#! незабаром спалахне повстання: народ незадоволений тим, що розпуск монастирів триває. Якщо народні маси не заспокоїти, вони візьмуться за зброю.\n\nВатажок заколотників [robert_aske.GetName] висунув список вимог, який він сам називає проханням простолюду. Серед вимог — боротьба з єрессю, засудження єретиків, а також припинення знищення монастирів."
  flavor_eng.121.desc: "Невдоволення #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#! #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленда#!#! зростає. Якщо народні маси не заспокоїти, вони візьмуться за зброю.\n\nВатажок заколотників [robert_aske.GetName] висунув список вимог, який він сам називає проханням простолюду. Серед вимог — боротьба з єрессю, засудження єретиків, а також припинення знищення монастирів."
  flavor_eng.121.custom: "Католицькі #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! в #TOOLTIP:PROVINCE_DEFINITION,northumberland_province,X #L Нортумберленді#!#! втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_eng.121.a: "Дамо їм хибну обіцянку."
  flavor_eng.121.tt1: "Заколотники розійдуться, і їх покарають на прикладі іншим"
  flavor_eng.121.b: "Погодимося на їхні умови."
  flavor_eng.121.tt2: "Розпуск монастирів припиниться"
  flavor_eng.121.tt3: "Нетерпимість до некатолицького населення зросте"
  flavor_eng.121.tt4: "Багато хто навернеться назад у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#! зі страху перед утисками"
  flavor_eng.121.c: "Вирішимо питання мирним шляхом."
  flavor_eng.121.c.custom1: "Цей варіант доступний, оскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetName] підкорює всіх своєю чарівністю в переговорах"
  flavor_eng.121.c.custom2: "Цей варіант доступний, оскільки [ROOT.GetCountry.GetGovernment.GetRuler.GetName] має великий досвід у дипломатії"
  flavor_eng.121.d: "На силу потрібно відповідати силою."
  flavor_eng.121.tt5: "Заколотників доведеться долати із застосуванням сили"
  pilgrimage_of_grace_rebellion: "Повстання «Паломництво благодаті»"
  STATIC_MODIFIER_NAME_pilgrimage_of_grace_rebellion: "Паломництво благодаті"
  flavor_eng.121.historical_info: "Паломництво благодаті — велике повстання, підняте протестуючими жителями Північної Англії в 30-х роках XVI століття. Воно було викликане здебільшого невдоволенням релігійною політикою монарха та розпуском монастирів, проте чималу роль відіграла й діяльність Томаса Кромвеля, який завідував оподаткуванням. Король Генріх VIII спочатку оголосив, що збирається помилувати повсталих, проте потім порушив дане ним слово і жорстоко придушив бунт. Попри підтримку заколотників з боку населення, їм не вдалося домогтися хоч скільки-небудь значущих результатів. Тисячі повсталих були страчені."
  flavor_eng.122.title: "[thomas_cromwell.GetNameWithNoTooltip]"
  flavor_eng.122.desc: "Домігшись успіхів на юридичній ниві та отримавши посаду депутата в парламенті, ця людина намагається здобути прихильність вищої влади. Він відкрито виступає на підтримку руху Реформації та всіма силами намагається законодавчо обмежити вплив, яким зараз користується [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], а також — позбавити #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! від впливу Риму.\n\nНещодавно він висунув пропозицію щодо поповнення порожньої скарбниці: кошти на це слід вилучати у монастирів."
  flavor_eng.122.a: "Він чудово доповнить наш двір."
  flavor_eng.122.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_cromwell.GetNameWithNoTooltip]"
  flavor_eng.122.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будуть розлючені простолюдином при дворі"
  flavor_eng.122.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] будуть раді бачити при дворі впливового купця"
  flavor_eng.122.b: "Нехай залишається депутатом."
  flavor_eng.122.tt4: "[thomas_cromwell.GetNameWithNoTooltip] і далі представлятиме в Палаті громад інтереси стану «[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l]»"
  flavor_eng.122.tt5: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] з неприязню ставитимуться до спроб законодавчо обмежити вплив церкви"
  flavor_eng.122.historical_info: "Томас Кромвель — вправний державний діяч та адвокат. За короля Генріха VIII обіймав посаду першого радника. Попри своє просте походження, при дворі користувався чималим впливом, оскільки зумів вразити кардинала Томаса Волсі. Згодом став одним із наймогутніших людей у країні. Кромвель відіграв важливу роль в англійській Реформації та розпуску монастирів, які позбулися накопичених багатств і земель на користь корони."
  flavor_eng.123.title: "Реформування монастирів"
  flavor_eng.123.desc: "[ROOT.GetCountry.GetName] — країна надто багатих релігійних орденів. Реформісти більше не в силах з цим миритися. Невдоволення церквою все частіше виявляють і прості [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] — вони вважають, що та має занадто велику владу.\n\nМожливо, ще не пізно спробувати зруйнувати сформований порядок і нагадати священнослужителям, що аскеза та затворництво понад усе.\n\nЗагальна кількість підрахованих нами монастирів: #Y  [ROOT.GetVariable('num_of_monasteries').GetValue]#!."
  flavor_eng.123.a: "$common_string_leave_them_be$"
  flavor_eng.123.a.custom: "#TOOLTIP:POPTYPE,clergy,X #L Духовенство#!#! в чернечих орденах отримує [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_eng.123.b: "Проведемо реформу."
  flavor_eng.123.b.custom: "Ченці залишають свої ордени; тепер вони знову [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l]"
  flavor_eng.123.tt: "Розпустити монастирі буде неможливо без скасування цієї [Concept('privilege', 'привілеї')|e]"
  flavor_eng.123.historical_info: "Розпуск монастирів — масштабний процес, що супроводжував рух Реформації в Англії XVI століття. Початок йому поклав перший радник короля Томас Кромвель, який прагнув викорінити сформовану монастирську систему, він сприймав її як продовження Римської католицької церкви. Розпуск призвів до закриття монастирів, абатств і конвентів по всій країні."
  flavor_eng.124.title: "Доля Анни Болейн"
  flavor_eng.124.desc: "[anne_boleyn.GetName] і [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вже уклали шлюб, проте королева поки не народила спадкоємця чоловічої статі. [ROOT.GetCountry.GetGovernment.GetRulerTitle] поступово починає втрачати терпіння. Крім того, ходять чутки, що дружина монарха винна в перелюбі та кровозмішенні… Можливо, настав час піти на більш рішучі заходи."
  flavor_eng.124.a: "Голову їй з пліч!"
  flavor_eng.124.b: "Можливо, вона ще народить."
  flavor_eng.124.historical_info: "Анна Болейн — друга дружина англійського короля Генріха VIII. Оскільки вона так і не зуміла народити йому спадкоємця чоловічої статі, Анну звинуватили в подружній і державній зраді, а також в інцесті. Королеву заарештували й ув'язнили в лондонський Тауер, визнали винною і незабаром стратили."
  flavor_eng.125.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] і гоніння"
  flavor_eng.125.desc: "Оскільки в країні знову зміцнюється [target_religion.GetName|l], саме собою виникає питання, яку ще віру допустимо сповідувати нашим підданим.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] намагається обернути назад хід [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої реформації шляхом висунення законів, що карають лжевчення вогнем."
  flavor_eng.125.desc_daughter_of_aragon: "Сходження на #L [ROOT.GetCountry.GetAdjective|l]ий#! престол королеви, що сповідує #L [target_religion.GetAdjective|l]у#! релігію, в той час як народ дотримується переважно [target_religion.GetAdjectiveWithNoTooltip|l]ої віри, викликає питання, які ще релігії допустимо сповідувати нашим підданим.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName] намагається обернути назад хід [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої реформації шляхом висунення законів, що карають лжевчення вогнем або примусом до публічного зречення від своїх поглядів."
  flavor_eng.125.a: "Грішні думки неприпустимі."
  flavor_eng.125.b: "У цьому немає потреби."
  flavor_eng.125.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть задоволені вжитими нами заходами щодо захисту державної релігії"
  flavor_eng.125.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені тим, як ми нехтуємо державною релігією"
  flavor_eng.125.historical_info: "Роки правління англійської королеви Марії I відзначилися низкою релігійних гонінь. Оскільки королева була католичкою, вона прагнула відновити цю релігію як державну та повернути країну під владу папи римського. Ці спроби супроводжувалися нещадним переслідуванням протестантів. Кілька тисяч людей заарештували; багатьох з них стратили."
  flavor_eng.126.title: "[hans_holbein.GetNameWithNoTooltip] — молодший"
  flavor_eng.126.desc: "Народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! зустрічає видатного художника та гравера на ім'я [hans_holbein.GetName], який прославився реалізмом свого живопису. Запросив його не хто інший, як [thomas_more.GetName]. Зараз Гольбейн шукає нового покровителя, який готовий буде підтримувати його творчість грошима.\n\nВін глибоко відданий справі Реформації і навіть написав кілька релігійних брошур на підтримку реформістів."
  flavor_eng.126.a: "Запросимо його до двору."
  flavor_eng.126.tt1: "З'явиться [Concept('character', 'персонаж')|e] [hans_holbein.GetNameWithNoTooltip]"
  flavor_eng.126.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені художником-єретиком, що служить при дворі — це суперечить [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.126.b: "Спалити його за єресь!"
  flavor_eng.126.tt3: "[thomas_more.GetNameWithNoTooltip] захищатиме свого протеже від переслідувань"
  flavor_eng.126.tt4: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.126.c: "Накажемо йому займатися пропагандою Реформації."
  flavor_eng.126.c.custom: "Своїми творами [hans_holbein.GetNameWithNoTooltip] навертає значну частину грамотного населення до державної релігії"
  flavor_eng.126.tt5: "[hans_holbein.GetNameWithNoTooltip] навряд чи зможе створювати твори мистецтва, оскільки зайнятий іншими справами"
  flavor_eng.126.d: "Йому тут не місце."
  flavor_eng.126.tt6: "[hans_holbein.GetNameWithNoTooltip] шукатиме роботу в інших місцях"
  flavor_eng.126.historical_info: "Ганс Гольбейн — молодший — художник німецько-швейцарського походження. Він вважається одним із найвидатніших портретистів XVI століття. Працював переважно в таких стилях, як ренесансний гуманізм і пізня готика. Твори Гольбейна примітні великою правдоподібністю та різноманітністю — художник малював як фрески, так і ілюстрації до книг. Ближче до кінця своєї діяльності він почав активно підтримувати рух гуманізму, а завдяки серу Томасу Мору зміг влаштуватися при королівському дворі Англії."
  flavor_eng.127.title: "«Посли»"
  flavor_eng.127.desc: "[hans_holbein.GetName] завершив роботу над шедевром у традиціях Відродження, який отримав назву #italic  «Посли»#!. Картина ця цікава тим, що сприймається по-різному залежно від того, під яким кутом на неї дивиться глядач. На полотні зображено двох багато вбраних придворних послів, що стоять біля заставленого різними предметами столу. Значну частину картини займає загадковий предмет зловісного вигляду."
  flavor_eng.127.a: "Виставимо картину на огляд."
  flavor_eng.127.b: "Відправимо художника в поїздку з картиною по континенту."
  flavor_eng.127.historical_info: "«Посли» — знаменита картина доби Відродження, написана, як передбачається, на замовлення королеви Анни Болейн художником Гансом Гольбейном — молодшим і зображує двох французьких послів при англійському дворі. У цьому творі, глибоко символічному та виконаному в типовій для Відродження перспективі, можна розгледіти роздуми художника на тему смертності. Відсилає до цього, зокрема, анаморфоз, тобто спотворений малюнок черепа — розгледіти сам череп можна лише під певним кутом."
  flavor_eng.128.title: "[john_cabot.GetNameWithNoTooltip]"
  flavor_eng.128.desc: "На територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з далекого [target_location.Custom('LR_GEN')|l] [target_location.GetName] прибув мореплавець та дослідник. Він шукає покровителів, готових підтримати грошима його плавання через Атлантику з виходом із порту [bristol.GetName] з метою знайти північний шлях до Азії.\n\nМи можемо найняти його на службу нашій країні — можливо, ця людина зможе знайти загублений острів Хай-Бразил."
  flavor_eng.128.a: "Його вже чекає море."
  flavor_eng.128.tt: "З'явиться [Concept('explorer', 'дослідник')|e] [john_cabot.GetNameWithNoTooltip]"
  flavor_eng.128.b: "Зараз невідповідний час."
  flavor_eng.128.historical_info: "Джон Кабот, уроджений Джованні Кабото, — неаполітанський мореплавець та дослідник, що ходив під англійським прапором наприкінці XV століття. Він частково відкрив Північну Америку і навіть висадився на острові Ньюфаундленд, ставши таким чином одним із перших європейців, що ступили на цей континент, з часів вікінгів. Саме завдяки плаванням Джона Кабота стала можливою колонізація Англією земель у Новому Світі."
  flavor_eng.129.title: "Флотська колегія"
  flavor_eng.129.desc_common1: "необхідно взяти під контроль моря, що омивають наш острів, — тоді будь-яка спроба захопити наші землі буде безрезультатною."
  flavor_eng.129.desc_common2: "розширити логістичні можливості та спростити управління флотом"
  flavor_eng.129.desc: "Не можна не визнавати, що наші кордони вразливі; ворог може будь-якої миті розпочати вторгнення, і тоді країна впаде. Щоб забезпечити належну оборону #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, $flavor_eng.129.desc_common1$\n\nЯкщо $flavor_eng.129.desc_common2$, ми зможемо заодно зміцнити кораблебудівну галузь, а також утримувати більший флот із меншими витратами."
  flavor_eng.129.desc_tudor: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] ([tudor_dynasty.GetName]), побоюючись вторгнення, вважає, що $flavor_eng.129.desc_common1$ Щоб це зробити, знадобиться $flavor_eng.129.desc_common2$ — таким чином ми зможемо зміцнити кораблебудівну галузь, а також утримувати більший флот із меншими витратами.\n\nТакож виявилося, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вельми вміло проєктує кораблі, тим самим роблячи певний внесок у розвиток флоту країни."
  flavor_eng.129.a: "Вчинимо так, як того вимагають обставини."
  enable_navy_board_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,navy_board_reform,X #L «Флотська колегія»#!#!"
  flavor_eng.129.b: "Немає нічого важливішого за військо."
  flavor_eng.129.historical_info: "В добу правління короля Генріха VIII (XVI століття) була заснована Флотська колегія — військово-морське відомство, що займалося зокрема кораблебудуванням та логістикою. Під керівництвом короля колегія збільшувала чисельність і міць англійського флоту, прагнучи зробити його грізною силою, здатною захистити країну від будь-якого вторгнення."
  flavor_eng.131.title: "Палац Вайтголл"
  flavor_eng.131.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] вважає, що королівське житло більше не відповідає висунутим вимогам; його слід розширити.\n\nЗнаменитий рисувальник-топограф [anton_van_den_wyngaerde.GetName] надав нам на розгляд кілька начерків. Приступити до роботи можна одразу — за умови, що вистачить коштів."
  flavor_eng.131.a: "Якраз помістяться лазня, басейн і кімната для поні."
  flavor_eng.131.tt1: "З'явиться [Concept('character', 'персонаж')|e] [anton_van_den_wyngaerde.GetNameWithNoTooltip]"
  flavor_eng.131.b: "Вистачить і кількох начерків."
  flavor_eng.131.tt2: "[anton_van_den_wyngaerde.GetNameWithNoTooltip] своїми пропрацьованими малюнками надихне інших митців"
  flavor_eng.131.tt3: "[anton_van_den_wyngaerde.GetNameWithNoTooltip] переїде після завершення роботи"
  flavor_eng.131.historical_info: "Палац Вайтголл, колись належав архієпископам Йоркським, після розширення став найбільшим палацом Європи. Тут, у головній резиденції англійського монарха, розміщувалися таємна рада, театральні приміщення та банкетні зали. В добу Тюдорів та Стюартів з Вайтголла здійснювалося управління країною. Пожежа, що сталася 1698 року, знищила майже весь палац, і сьогодні від нього залишилася лише одна споруда — Банкетинг-хаус."
  flavor_eng.132.title: "[charles_brandon.GetNameWithNoTooltip]"
  flavor_eng.132.desc: "[charles_brandon.GetName], з яким [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] дружить ще з дитинства, горить бажанням пізнати придворне життя і вірно служити рідній країні. Він вже виявив талант до військових та державних справ, однак призначити його на королівську службу буде непросто: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] напевно опиратимуться такому рішенню."
  flavor_eng.132.a: "Нехай проявляє себе в війську."
  flavor_eng.132.tt1: "З'явиться [Concept('character', 'персонаж')|e] [charles_brandon.GetNameWithNoTooltip]"
  flavor_eng.132.tt2: "Він буде непридатний до придворної служби"
  flavor_eng.132.b: "Яка нісенітниця! Нехай буде [ROOT.GetCountry.GetGovernment.GetAdjective|l]им радником."
  flavor_eng.132.c: "У нас достатньо друзів."
  flavor_eng.132.historical_info: "Чарльз Брендон — видатний англійський діяч доби Тюдорів та близький друг дитинства короля Генріха VIII. За своє життя Брендон обіймав найрізноманітніші посади — і дипломатичні, і військові. Будучи вмілим воєначальником, вірно відданим монарху, Чарльз домігся значного впливу при дворі — на превелике невдоволення таємної ради. Його таємний шлюб із сестрою короля також викликав значні розбіжності і навіть гнів Генріха. Втім, згодом монарх пробачив свого друга."
  flavor_eng.133.title: "Заборонений плід"
  flavor_eng.133.desc_common: "[charles_brandon.GetName] та принцеса [sister.GetName] таємно уклали шлюб, будучи більше не в силах протистояти взаємній прихильності, що давно зародилася. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] наполягають, що [charles_brandon.GetShortNameWithNoTooltip] повинен понести серйозне покарання за порушення королівського етикету"
  flavor_eng.133.desc_wolsey: "$flavor_eng.133.desc_common$, однак [thomas_wolsey.GetName], довірений радник монарха, який взявся виступити посередником, закликає до стриманості.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] у люті: такий несподіваний вчинок — серйозне зазіхання на королівську владу. Відповісти на нього слід належним чином."
  flavor_eng.133.desc: "$flavor_eng.133.desc_common$.\n\n[ROOT.GetCountry.GetGovernment.GetRulerTitle] у люті: такий несподіваний вчинок — серйозне зазіхання на королівську владу. Відповісти на нього слід належним чином."
  flavor_eng.133.a: "Вигнати їх з двору!"
  flavor_eng.133.tt1: "[charles_brandon.GetNameWithNoTooltip] та [sister.GetNameWithNoTooltip] деякий час не зможуть служити [target_root_country.Custom('CL_DAT')]"
  flavor_eng.133.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] заспокояться, послухавши радника. [thomas_wolsey.GetNameWithNoTooltip] врятує корону від нової ганьби"
  flavor_eng.133.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] будуть у люті від того, що [target_root_country.GetGovernment.GetRulerTitle|l] не вживає суворіших заходів"
  flavor_eng.133.b: "Одного на плаху, іншу в монастир."
  flavor_eng.133.c: "Влада [target_root_country.Custom('CL_GEN')] більше не терпітиме їхньої присутності."
  flavor_eng.133.historical_info: "У 1515 році Чарльз Брендон та Марія Тюдор уклали у Франції таємний шлюб, не повідомивши короля Генріха VIII і не отримавши його дозволу. До цього Марія була одружена з французьким королем Людовиком XII, проте після його смерті заручилася з Чарльзом і лише потім повернулася до Англії. Цей шлюб багато хто вважав порушенням королівського етикету та підривом монаршої влади, а розлючений Генріх заразом вважав його викликом королівському праву укладати шлюбні союзи. Втім, згодом монарх заспокоївся, помилував обох порушників і навіть дозволив їм повернутися до двору."
  flavor_eng.134.title: "[daughter_of_boleyn.GetNameWithNoTooltip] та її майбутнє"
  flavor_eng.134.desc: "Королівська гувернантка повідомляє, що її підопічна [daughter_of_boleyn.GetName] — надзвичайно обдарована учениця. Хоча #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! буде правити інший монарх, дівчинка зможе обійняти посаду придворного радника."
  flavor_eng.134.a: "Знайдемо їй найкращих вчителів."
  flavor_eng.134.tt1: "[daughter_of_boleyn.GetNameWithNoTooltip] отримає повноцінну королівську освіту, що підготує її до майбутнього життя"
  flavor_eng.134.b: "Це нас не стосується. Видамо її заміж."
  flavor_eng.134.tt2: "[daughter_of_boleyn.GetNameWithNoTooltip] навряд чи стане правити [ROOT.GetCountry.Custom('CL_INST')]"
  flavor_eng.134.historical_info: "Єлизавета, дочка короля Генріха VIII та Анни Болейн, отримала чудову освіту: її навчали філософії, історії, математики та іноземних мов — латини, грецької, французької. На релігійні погляди дівчинки значно вплинув розрив Англії з католицькою церквою. Як виявилося згодом, володіння кількома мовами та тонке розуміння міжнародних відносин — вельми корисні якості для королеви…"
  flavor_eng.136.title: "[francis_drake.GetNameWithNoTooltip]"
  flavor_eng.136.desc: "Скандально відомий капер та досвідчений мореплавець [francis_drake.GetName] висловив бажання ходити під нашим прапором, оскільки вважає, що #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! призначено володіти морями. Дрейк — майстер на всі руки, а також прославлений пірат, який захопив чимало ворожих кораблів та спустошив їхні трюми. Тепер він хоче досліджувати світ, хоча його талантам у нас знайдеться й інше застосування."
  flavor_eng.136.a: "Завоюй нам увесь світ."
  flavor_eng.136.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [francis_drake.GetNameWithNoTooltip]"
  flavor_eng.136.tt2: "Дрейк має талант до набігів на заморські колонії та може намагатися здійснювати такі набіги під час дослідження Нового Світу"
  flavor_eng.136.b: "Флот вимагає від нього вірної служби."
  flavor_eng.136.tt3: "З'явиться [Concept('admiral', 'адмірал')|e] [francis_drake.GetNameWithNoTooltip]"
  flavor_eng.136.c: "Він же работорговець і пірат."
  flavor_eng.136.historical_info: "Френсіс Дрейк, який обіймав в єлизаветинську добу посаду військово-морського офіцера, прославився своїми морськими подвигами: він здійснив навколосвітнє плавання, кілька разів нападав на колонії біля Іспанського Мейну та захопив не одне судно, що перевозило до Європи золото та срібло, послабивши таким чином панування іспанців у Новому Світі. Дрейк відіграв важливу роль у захисті Англії від іспанської Непереможної армади в 1588 році."
  flavor_eng.137.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip] зазнає набігу Френсіса Дрейка"
  flavor_eng.137.desc: "[francis_drake.GetName] міцно стискає штурвал «Золотої лані» — свого вірного судна, яке пережило десятки буревіїв та перевезло у своєму трюмі незліченні скарби. Очі капера блищать від передчуття. Команда напоготові; серця її б'ються в унісон з високими хвилями, що вдаряють у борт корабля.\n\nПодано короткий жест рукою. На воду спускаються шлюпки з кровожерливими піратами, що прагнуть наживи. Колоніальний гарнізон нездатний чинити опір їхній лютій атаці. Нападники обходять кожен будинок, забирають усе цінне, виносять скарби.\n\nЧерез кілька годин команда повертається на корабель з важкими скринями. За їхньою спиною здіймаються язики вогню — колонія горить. Можливо, хтось із її мешканців ще зможе розповісти іншим про пережите нещастя."
  flavor_eng.137.a: "Так тримати."
  flavor_eng.137.a.custom: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] розграбовано. Він втратив процвітання, а багатьох рабів відпущено на волю"
  flavor_eng.137.tt1: "[francis_drake.GetNameWithNoTooltip] продовжить нападати на виявлені ним уразливі колонії"
  flavor_eng.137.b: "Треба зосередитися на експедиціях."
  flavor_eng.137.tt2: "[francis_drake.GetNameWithNoTooltip] призупинить набіги в поточній експедиції"
  flavor_eng.137.tt3: "Належна короні здобич буде здана, щойно Дрейк повернеться на територію [target_root_country.Custom('CL_GEN')]"
  flavor_eng.137.tt4: "Здобуто в дукатах: #Y  [ROOT.GetVariable('drake_loot').GetValue]#!"
  flavor_eng.137.historical_info: "Наприкінці XVI століття Дрейк успішно здійснював набіги на іспанські поселення, порти та кораблі в Карибському морі, захоплюючи чимало скарбів та підриваючи іспанське панування. Ці набіги допомогли Дрейку значно збагатитися, а Англії — стати грізною морською країною."
  flavor_eng.138.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip] зазнає набігу Френсіса Дрейка"
  flavor_eng.138.desc: "Сумнозвісний #L [francis_drake.GetCulture.GetName|l]ий#! капер [francis_drake.GetName] здійснив зухвалий набіг на наше слабо захищене поселення. Воно серйозно постраждало: пірати спалили будинки, розграбували цінності, а всі #TOOLTIP:POPTYPE,slaves,X #L раби#!#! опинилися на волі."
  flavor_eng.138.a: "Зміцнимо оборону."
  flavor_eng.138.tt1: "Коли завершиться будівництво берегової фортеці, [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] буде захищений від набігів"
  flavor_eng.138.b: "Прикро, але не страшно."
  flavor_eng.138.tt2: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] може знову зазнати нападу"
  flavor_eng.138.historical_info: "$flavor_eng.137.historical_info$"
  flavor_eng.139.title: "[christopher_marlowe.GetNameWithNoTooltip]"
  flavor_eng.139.desc: "Підприємливий драматург з багатою уявою шукає собі нового покровителя, здатного оцінити його внесок у драматургію. [christopher_marlowe.GetName], справжній першопроходець у своїй галузі, вміє не тільки надихати інших своїми п'єсами — йому притаманні й інші таланти."
  flavor_eng.139.a: "Письменник? Отже, нехай пише вільно."
  flavor_eng.139.tt1: "З'явиться [Concept('character', 'персонаж')|e] [christopher_marlowe.GetNameWithNoTooltip]"
  flavor_eng.139.tt2: "Весь час він присвятить творчості, а тому напевно напише кілька п'єс"
  flavor_eng.139.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені порушенням [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.139.b: "Нехай служить нашим шпигуном."
  flavor_eng.139.tt4: "[christopher_marlowe.GetNameWithNoTooltip] працюватиме на шпигунську службу, яку очолює [francis_walsingham.GetName]"
  flavor_eng.139.c: "Ні, нам більше до душі ляльковий театр."
  flavor_eng.139.historical_info: "Крістофер Марло — впливовий англійський драматург, поет і перекладач, який написав такі знамениті твори, як #italic «Геро і Леандр»#! та #italic «Едуард II»#!. Визнаний найвидатнішим лондонським драматургом, який значно вплинув на Вільяма Шекспіра. Марло загинув, не доживши до 30, за загадкових обставин. Висувалося кілька версій його смерті, зокрема таємний любовний зв'язок з іншим чоловіком, зрада з боку колеги-драматурга або втручання таємних служб."
  flavor_eng.140.title: "[walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.140.desc: "[walter_raleigh.GetName], гроза бунтівників і улюбленець двору, щойно повернувся з небезпечної подорожі й тепер розмірковує, що йому робити далі. З собою він привіз якусь їстівну рослину, що має незвичайну форму, а якщо її листя курити, то воно має одурманюючу дію.\n\nМандрівника приймає, зокрема, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — [walter_raleigh.GetShortNameWithNoTooltip] серйозно налаштований обговорити свою подальшу долю. Думки про нові подорожі викликають у нього захват, однак лише [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] має право вирішувати, як саме розпоряджатися своїми підданими."
  flavor_eng.140.a: "Він підтримає наші прагнення досягти нових земель."
  flavor_eng.140.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.140.tt2: "Якщо відправити його в експедицію до Нового Світу, він зможе постачати колонії в #TOOLTIP:AREA,southern_new_england_area,X #L Південній Новій Англії#!#!"
  flavor_eng.140.b: "Ірландії бракує твердої руки."
  flavor_eng.140.custom: "Кожна належна або підвладна нам [Concept('location', 'місцевість')|e] в #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#! отримує модифікатор #TOOLTIP:STATIC_MODIFIER,raleigh_firm_hand,X #V #L «Тверда рука Релі»#!#!"
  flavor_eng.140.tt3: "З'явиться [Concept('general', 'полководець')|e] [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.140.tt4: "Ймовірність нових заколотів в #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#! знизиться через репутацію Релі"
  STATIC_MODIFIER_NAME_raleigh_firm_hand: "Тверда рука Релі"
  flavor_eng.140.c: "Він добре проявить себе в державних справах."
  flavor_eng.140.tt5: "З'явиться [Concept('character', 'персонаж')|e] [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.140.tt6: "[target_root_country.GetGovernment.GetRuler.GetName] вразиться його присутністю при дворі"
  flavor_eng.140.d: "Нам не судилося співпрацювати."
  flavor_eng.140.tt7: "Привізший дивні рослини [walter_raleigh.GetNameWithNoTooltip] отримає відмову в прийомі"
  eng_raleighs_gifts: "З'являються #TOOLTIP:GOODS,potato,X #L картопля#!#!#! та #TOOLTIP:GOODS,tobacco,X #L тютюн#!#!#!"
  flavor_eng.140.historical_info: "Сер Волтер Релі — англійський дослідник, вояк, поет і державний діяч, який прославився своєю пристрастю до подорожей та кількома експедиціями до Нового Світу. Саме завдяки його зусиллям Англія заснувала першу в Північній Америці колонію, що отримала на честь «королеви-діви» Єлизавети I назву Вірджинія. Сама ж королева вельми цінувала дотепного, чарівного та літературно обдарованого Релі."
  flavor_eng.141.title: "[thomas_tallis.GetNameWithNoTooltip]"
  flavor_eng.141.desc_common: "[thomas_tallis.GetName] — відоме ім'я в музичних колах. Впізнаваний голос Томаса, а також його складні гармонії та красиві мелодії надихнули вже не одного композитора."
  flavor_eng.141.desc: "Вкрай талановитий композитор, що прославився своєю духовною музикою, бажає написати кілька нових творів для хору, а тому шукає нового покровителя.\n\n$flavor_eng.141.desc_common$"
  flavor_eng.141.desc_dissolution_of_monasteries: "Після розпуску монастирів багатьом творчим особистостям з релігійних кіл стало складно знайти роботу. [thomas_tallis.GetName] — не виняток. Зараз цей композитор, що володіє воістину вражаючим талантом, шукає щастя при дворі — там він сподівається знайти покровителя, небайдужого до музики.\n\n$flavor_eng.141.desc_common$"
  flavor_eng.141.a: "Його чекає Королівська капела."
  flavor_eng.141.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_tallis.GetNameWithNoTooltip]"
  flavor_eng.141.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені композитором-єретиком — це суперечить [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.141.tt3: "Своїми творами [thomas_tallis.GetNameWithNoTooltip] надихне інших композиторів"
  flavor_eng.141.b: "Спалити його за єресь!"
  flavor_eng.141.tt4: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.141.c: "Нехай музикує деінде."
  flavor_eng.141.tt5: "[thomas_tallis.GetNameWithNoTooltip] навряд чи складе якийсь видатний твір, оскільки йому буде складно знайти роботу після розпуску монастирів"
  flavor_eng.141.historical_info: "Томас Талліс — англійський композитор, відомий своїми творами для хору. Він досконало опанував мистецтво поліфонії, тобто гармонійного поєднання одразу кількох самостійних мелодій. Талліс, що власноруч заклав традиції англійського хору, сьогодні вважається одним з найвидатніших композиторів Англії. Він служив придворним композитором у всіх Тюдорів, крім Генріха VII."
  flavor_eng.142.title: "Spem in alium"
  flavor_eng.142.desc: "[thomas_tallis.GetName] готовий поділитися зі світом своїм новим твором — геніальним мотетом, незвичайним і неймовірно складним. Твір написано для сорока голосів, розділених на вісім хорів по п'ять у кожному — сопрано, альт, тенор, баритон і бас.\n\nВиконувати цей мотет найкраще в просторих приміщеннях або соборах, щоб слухач міг повністю зануритися в спів одразу кількох десятків хористів."
  flavor_eng.142.a: "Справжня насолода для вух."
  flavor_eng.142.b: "Популяризуємо його інші твори."
  flavor_eng.142.historical_info: "#italic  Spem in alium#! — музичний твір для хору, написаний англійським композитором Томасом Таллісом у 1570 році. Вважається шедевром поліфонічної музики доби Відродження. Написано з метою демонстрації композиторського таланту Томаса та можливостей англійського хору."
  flavor_eng.143.title: "[francis_drake.GetNameWithNoTooltip] повертається"
  flavor_eng.143.desc: "Великий авантюрист [francis_drake.GetName] повертається з трюмом, повним скарбів. Його здобич за останній похід до Нового Світу в перерахунку на дукати склала #Y  [ROOT.GetVariable('drake_loot').GetValue]#!. Цю неймовірну суму, дотримуючись умов договору, він повинен доставити до королівської скарбниці."
  flavor_eng.143.a: "Вперед, відважний досліднику!"
  flavor_eng.143.tt1: "[francis_drake.GetNameWithNoTooltip] може продовжити нападати на виявлені ним вразливі колонії під час дослідження Нового Світу"
  flavor_eng.143.b: "Покладемо край нальотам."
  flavor_eng.143.tt2: "У подальших походах [francis_drake.GetNameWithNoTooltip] поводитиметься мирно"
  flavor_eng.143.historical_info: "Поверненню Френсіса Дрейка з походу в Карибське море раділа вся Англія. Ця експедиція стала важливою віхою в історії англійського мореплавства та піратства. Настрій усіх англійців був на висоті: їхня батьківщина продемонструвала, що здатна протистояти сильному супротивнику, що викликало лише гордість та повагу."
  flavor_eng.144.title: "Колонізація Ольстера"
  flavor_eng.144.desc: "Ми розробили сміливий план з переселення жителів північних територій нашої країни в ірландську провінцію #TOOLTIP:AREA,ulster_area,X #L Ольстер#!#! з метою прищепити місцевому населенню англійську культуру, а заодно позбавити його від лжевчення #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви.\n\nНайімовірніше, ірландці сприймуть такий крок вороже, однак без цього не вийде встановити над островом повноцінну владу."
  flavor_eng.144.a: "Це необхідно."
  flavor_eng.144.a.custom1: "Багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] залишають провінції [emigration_province_1.GetProvince.GetName] та [emigration_province_2.GetProvince.GetName], щоб заснувати плантації в #TOOLTIP:AREA,ulster_area,X #L Ольстері#!#!"
  flavor_eng.144.a.custom2: "Приплив мігрантів з [target_root_country.Custom('CL_GEN')] обурює місцеве населення, збільшується вплив [target_root_country.GetAdjectiveWithNoTooltip|l]ої культури та релігії"
  flavor_eng.144.b: "Це може викликати міжусобицю."
  flavor_eng.144.historical_info: "Провінція Ольстер на самому півночі Ірландії стала серйозною перешкодою для англійської влади, оскільки її жителі з гордістю називали себе гельськими католиками та вкрай неохоче піддавалися впливу англійських культури та релігії. Щоб вирішити цю проблему, уряд Англії розробив план колонізації Ольстера, а виконувати його передбачалося за підтримки багатих землевласників. Протестантів з Північної Англії та Південної Шотландії закликали переселятися до Північної Ірландії та займати землі, відібрані у бунтівних ірландських вождів та їхніх прихильників. Згодом ці землі розподілялися на користь поселенців."
  flavor_eng.145.title: "Левантійська компанія"
  flavor_eng.145.desc: "У Леванті надто мало #L [ROOT.GetCountry.GetAdjective|l]их#! купців. Наші можливості вести торгівлю в цьому регіоні залежать виключно від милості інших середземноморських країн.\n\nНеобхідно заснувати торговельну компанію, яка відстоюватиме наші інтереси та зможе забезпечити постачання до країни найкращих товарів Сходу."
  flavor_eng.145.a: "Чудова думка."
  flavor_eng.145.b: "Там немає нічого цінного."
  flavor_eng.145.historical_info: "Левантійська компанія, вона ж «Компанія англійських купців, що торгують з Левантом», була заснована відповідно до королівської хартії Єлизавети I, що дозволяла торгівлю з Османською імперією та її сусідами. Купці компанії возили між Англією та Левантом найрізноманітніші товари, зокрема тканини, прянощі та інші предмети розкоші. Згодом Левантійська компанія заснувала у Східному Середземномор'ї кілька факторій."
  flavor_eng.147.title: "[walter_raleigh.GetNameWithNoTooltip] та його експедиції"
  flavor_eng.147.desc: "Жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! чекають на повернення скандально відомого дослідника, що складає мапу Нового Світу. [walter_raleigh.GetName], вивчаючи нові краї, дорогою додому зробив зупинку, щоб підвезти припаси нашим колоніям у #TOOLTIP:AREA,southern_new_england_area,X #L Південній Новій Англії#!#!.\n\nСер Волтер не має достатньо людей, однак у нього достатньо припасів для нетривалого постачання будь-якої колонії. На жаль, усе здобуте під час вивчення незвіданих місць отримає не [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — свою здобич Релі віддасть колоністам."
  flavor_eng.147.a: "Яка щедрість."
  flavor_eng.147.tt1: "Населення колоній у провінції [target_colony.GetProvinceDefinition.GetName] дещо збільшиться завдяки запасам, які привезе [walter_raleigh.GetNameWithNoTooltip]"
  flavor_eng.147.b: "$common_string_let_them_fend_for_themselves$"
  flavor_eng.147.historical_info: "Наприкінці XVI століття Волтер Релі організував дві експедиції до Північної Америки, маючи намір заснувати в Новому Світі англійську колонію. Цей план увінчався успіхом, однак Англо-іспанська війна, що розгорілася на той час, завадила належному постачанню нової колонії. Втім, попри цю невдачу, колонія Джеймстаун у Вірджинії згодом стала успішним поселенням."
  flavor_eng.148.title: "Мідноносий"
  flavor_eng.148.desc: "Постійні бойові дії та надмірні витрати призвели до нестачі злитків для карбування монет. #TOOLTIP:GOODS,goods_gold,X #L Золото#!#!#! та #TOOLTIP:GOODS,silver,X #L срібло#!#!#! сьогодні надто рідкісні — треба постаратися знизити вміст дорогоцінних металів у монетах з цих матеріалів, інакше їх не вистачатиме, доки ми не приборкаємо витрати. Втім, можна спробувати перейти на #TOOLTIP:GOODS,copper,X #L мідь#!#!#!: цей метал дешевший, і його легко добувати. Але варто пам'ятати, що зниження якості монет напевно помітять купці, а отже, постраждає вартість валюти."
  flavor_eng.148.a: "Додамо дешевший метал."
  flavor_eng.148.b: "Обійдемося без втручання."
  flavor_eng.148.historical_info: "Під час правління Генріха VIII в Англії відбулося «Велике знецінення» — навмисне зниження вмісту золота та срібла в монетах при збереженні їхньої номінальної вартості. Таким чином король сподівався залучити до скарбниці додаткові доходи. У якийсь момент міді в монетах стало настільки багато, що тонкий шар срібла над виступаючим носом у зображення короля просто стирався, за що Генріха прозвали Мідноносим."
  eng_lack_of_bullion: "Нестача злитків для карбування"
  eng_copper_introduced: "Підвищений вміст міді в монетах"
  flavor_eng.149.title: "Змова Бабінгтона"
  flavor_eng.149.desc: "Нам стало відомо про змову, жертвою якої виступає [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Змовники, якими керує [anthony_babington.GetName], збираються скинути монарха. Якщо їм це вдасться, у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не стане без правителя, і звільнений престол займе [pretender.GetName]. Вони вже готуються привести задум у виконання. По всій країні тисячі #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#! готові приєднатися до зловмисників."
  flavor_eng.149.a: "Що не змова, то провал."
  flavor_eng.149.tt1: "Завдяки своїй шпигунській мережі [francis_walsingham.GetNameWithNoTooltip] вчасно зірве змову"
  flavor_eng.149.b: "Тривожний поворот."
  flavor_eng.149.a.custom1: "[pretender.GetNameWithNoTooltip] отримає підтримку значної частки католиків у нашій країні"
  flavor_eng.149.c: "Підемо на серйозні поступки."
  flavor_eng.149.tt2: "[pretender.GetNameWithNoTooltip] та [anthony_babington.GetNameWithNoTooltip] під гарантію своєї безпеки безперешкодно покинуть країну і можуть у майбутньому спробувати підняти чергове повстання"
  babington_support: "Прихильники Бабінгтона"
  flavor_eng.149.historical_info: "Змова Бабінгтона — невдалий план щодо вбивства англійської королеви Єлизавети I та заміни її на королеву-католичку Марію Стюарт. Організація змови, за якою стояв Ентоні Бабінгтон, супроводжувалася таємним листуванням між самим Бабінгтоном та Марією. У листах, перехоплених згодом Френсісом Волсінгемом — начальником королівської таємної служби, — докладно описувалися як сам план перевороту, так і його учасники. Марія була заарештована та засуджена на смертну кару."
  flavor_eng.150.title: "«Тамерлан Великий»"
  flavor_eng.150.desc: "[christopher_marlowe.GetName], надихнувшись діяннями великого завойовника, написав п'єсу з двох дій. #italic  «Тамерлан Великий»#! відходить від прийнятих основ — неприродно звучачих діалогів та зім'ятого сюжету — і заманює глядачів своєю яскравою мовою, напруженими конфліктами та живими, сповненими почуттів дійовими особами. Ймовірно, перша постановка збере чимало поціновувачів театрального мистецтва."
  flavor_eng.150.a: "Ми зачаровані."
  flavor_eng.150.b: "Інші його постановки теж заслуговують на увагу."
  flavor_eng.150.historical_info: "#italic «Тамерлан Великий»#! — п'єса знаменитого письменника єлизаветинської доби Крістофера Марло, $tamburlaine_the_great_common$"
  flavor_eng.151.title: "[william_cecil.GetNameWithNoTooltip]"
  flavor_eng.151.desc: "До двору прибуває [william_cecil.GetName]. Погляд його твердий, а хода впевнена. Цей чоловік з тих, хто не боїться відповідальності — більше того, він готовий служити радником при владі. [william_cecil.GetName] володіє багатими знаннями та гострим розумом стратега, а тому напевно добре зуміє себе проявити у всьому, що стосується управління країною."
  flavor_eng.151.a: "Він принесе нам процвітання."
  flavor_eng.151.tt1: "З'явиться [Concept('character', 'персонаж')|e] [william_cecil.GetNameWithNoTooltip]"
  flavor_eng.151.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть раді бачити у владі непримиренного прихильника #L [target_root_country.GetReligion.GetAdjective|l]ої#! віри"
  flavor_eng.151.b: "Нехай служить депутатом парламенту."
  flavor_eng.151.tt4: "З'явиться [Concept('character', 'персонаж')|e] [william_cecil.GetNameWithNoTooltip], він не може займати придворні посади"
  flavor_eng.151.tt5: "Він засідатиме в парламенті та сприятиме політиці, яку веде [target_root_country.GetGovernment.GetRulerTitle|l]"
  flavor_eng.151.c: "Нам не потрібні зайві поради."
  STATIC_MODIFIER_NAME_working_from_within: "Внутрішня діяльність"
  flavor_eng.151.historical_info: "Вільям Сесіл — радник Єлизавети I, що користувався не лише впливом, а й прихильністю королеви: та вважала Вільяма своєю найдовіренішою особою. Сесіл обіймав такі важливі посади, як державний секретар і лорд-скарбник. Завдяки невпинній праці цього відданого протестанта та прихильника англійської монархії Англія змогла подолати значні труднощі — як внутрішні, так і зовнішні."
  flavor_eng.152.title: "[john_hawkins.GetNameWithNoTooltip] та його пригоди"
  flavor_eng.152.desc: "Мореплавець та офіцер [john_hawkins.GetName] запропонував організувати експедицію до #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!. Він збирається привезти звідти рабів, а заодно забезпечити там умови для роботи наших купців. #TOOLTIP:POPTYPE,slaves,X #L Раби#!#! згодом будуть перевезені до колоній #ONCLICK:COUNTRY,[slave_selling_location.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[slave_selling_location.GetOwner.Custom('CL_tt')],X [slave_selling_location.GetOwner.Custom('CL_GEN')|L]#!#! на території Америки і там продані."
  flavor_eng.152.a: "Ми теж хочемо бути в частці."
  flavor_eng.152.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [john_hawkins.GetNameWithNoTooltip]"
  flavor_eng.152.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] задорого здасть йому корабель"
  flavor_eng.152.tt3: "Він незаконно вивозить рабів до [slave_selling_location.Custom('LR_ACC')|l] [slave_selling_location.GetName], чим розлючує #ONCLICK:COUNTRY,[slave_selling_location.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[slave_selling_location.GetOwner.Custom('CL_tt')],X [slave_selling_location.GetOwner.Custom('CL_ACC')|L]#!#!"
  flavor_eng.152.b: "Ми не хочемо в цьому брати участь."
  flavor_eng.152.historical_info: "Джон Хокінс — перший англійський купець, що почав заробляти на Трикутній торгівлі. У 60-х роках XVI століття він успішно обійшов торгове ембарго, накладене Іспанією на Англію, і заробив значний статок на продажу рабів у колонії Карибського моря. Крім того, Хокінс брав участь у кількох морських битвах, зокрема воював проти іспанської Непереможної армади на посаді віцеадмірала англійського флоту."
  flavor_eng.153.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] та «слуги»"
  flavor_eng.153.desc: "Акторська трупа шукає покровителя: вони сподіваються, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] зможе виділити їм грошей на постановки. Актори мають намір сказати нове слово в галузі драми та літератури, а заодно розважати глядачів так, щоб їх полюбив увесь [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] у країні. Репертуар їх дуже обширний і містить комедії, трагедії та навіть історичні драми."
  flavor_eng.153.a: "Сцена у вашому розпорядженні."
  flavor_eng.153.a.custom: "Усі [Concept('locations', 'місцевості')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, де є #TOOLTIP:BUILDING_TYPE,theater,X #L театр#!#!, отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] до [Concept('pop_satisfaction', 'вдоволення')|e] #TOOLTIP:POPTYPE,peasants,X #L селян#!#!"
  flavor_eng.153.tt1: "Драматична трупа гратиме лише в театрах"
  flavor_eng.153.b: "Поставимо тимчасові сцени."
  flavor_eng.153.b.custom: "Кожне місто та [Concept('locations', 'місцевість')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, де є #TOOLTIP:BUILDING_TYPE,theater,X #L театр#!#!, отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e] #TOOLTIP:POPTYPE,peasants,X #L селян#!#!"
  flavor_eng.153.tt2: "Драматична трупа гратиме у великих містах та театрах"
  flavor_eng.153.tt3: "[target_root_country.GetGovernment.GetRulerTitle] користуватиметься любов'ю народу за організацію розваг для публіки"
  flavor_eng.153.c: "У нас є важливіші справи."
  flavor_eng.153.historical_info: "«Слуги королеви Єлизавети» — одна з численних англійських акторських труп кінця XVI — початку XVII століття. «Слуги» успішно познайомили народ із театром, завдяки чому на постійній основі виникли такі заклади, як, наприклад, театр «Глобус». У репертуарі акторів були найрізноманітніші п'єси, зокрема твори знаменитих драматургів Вільяма Шекспіра та Крістофера Марло."
  flavor_eng.154.title: "«Ромео і Джульєтта»"
  flavor_eng.154.desc: "Постійний предмет останніх розмов у нашій країні — нова трагедія, яку написав [william_shakespeare.GetName]. Дія цього твору під назвою #italic «Ромео і Джульєтта»#! відбувається у #TOOLTIP:LOCATION,verona,X #L Вероні#!#! і розповідає про пристрасне кохання юнака та дівчини з двох ворогуючих родин. Кажуть, ця драма тримає в напрузі до самого свого несподіваного кінця."
  flavor_eng.154.a: "Нарешті щасливий кінець."
  flavor_eng.154.b: "Привернемо увагу до інших його п'єс замість цієї."
  flavor_eng.154.historical_info: "«Ромео і Джульєтта» — одна з найзнаменитіших шекспірівських трагедій, яку ставлять і досі. Визнана шедевром світової літератури. Ймовірно, Шекспір написав її в перші роки своєї кар'єри драматурга, приблизно в 1591–1596 роках. За життя Шекспіра «Ромео і Джульєтту» ставили частіше за інші п'єси."
  flavor_eng.155.title: "[james_lancaster.GetNameWithNoTooltip]"
  flavor_eng.155.desc: "До нас звернувся капер і купець, великий знавець морської справи, — він хоче здійснити подорож до Ост-Індії. [james_lancaster.GetName] стверджує, що якщо #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдасться обґрунтуватися біля Островів прянощів, то з торгівлі в #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#! вийде отримати чималий прибуток.\n\nКрім того, він пред'явив нам результати своїх недавніх спостережень. Виявляється, певні #TOOLTIP:GOODS,fruit,X #L фрукти#!#!#! при вживанні в їжу зміцнюють здоров'я моряків і знижують захворюваність «морським скорбутом». Новина про цю знахідку поширилася майже миттєво і може незабаром призвести до збільшення попиту на подібні товари."
  flavor_eng.155.a: "Без цих спецій нам не обійтися."
  flavor_eng.155.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [james_lancaster.GetNameWithNoTooltip]"
  flavor_eng.155.tt2: "Якщо відправити його в експедицію по Ост-Індії, то в #TOOLTIP:REGION,indonesia_region,X #L Індонезії#!#! може з'явитися #TOOLTIP:BUILDING_TYPE,overseas_trading_post,X #L заморська факторія#!#!#!"
  flavor_eng.155.b: "Відправимо його в експедицію за фруктами."
  flavor_eng.155.tt3: "На #TOOLTIP:REGION,madagascar_region,X #L Мадагаскарі#!#! з'явиться заснована Ланкастером #TOOLTIP:BUILDING_TYPE,overseas_trading_post,X #L заморська факторія#!#!#!, яка постачатиме фрукти в країну"
  flavor_eng.155.c: "Зараз не час прагнути чогось нового."
  flavor_eng.155.tt4: "[james_lancaster.GetNameWithNoTooltip] не буде прийнятий: нікого не цікавлять його цитрусові"
  eng_lancasters_findings: "Цитрусові соки проти цинги"
  flavor_eng.155.historical_info: "Джеймс Ланкастер, один із засновників Британської Ост-Індської компанії, неодноразово здійснював успішні морські походи до Азії. Так, у 1600 році він очолив експедицію до Ост-Індії з метою вбудувати Англію в систему дуже прибуткової тоді торгівлі спеціями. Чимало часу Ланкастер провів на Мадагаскарі, де збирав для екіпажу фрукти — вони виявилися дієвим засобом проти цинги, яка викликалася неминучою нестачею вітамінів у довгих плаваннях. Згодом англійське адміралтейство постановило, що кожному матросу обов'язково належить лимонний сік."
  flavor_eng.156.title: "Ост-Індська факторія"
  flavor_eng.156.desc: "Знаменитий дослідник та експерт із цитрусових [james_lancaster.GetName] зараз займається вивченням Ост-Індії. Він уже встановив дипломатичні відносини з панівною в цьому регіоні країною. Тепер у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! є нагода там закріпитися — для цього нам знадобиться #TOOLTIP:BUILDING_TYPE,overseas_trading_post,X #L заморська факторія#!#!#!, яка забезпечить доступ до заповітних #TOOLTIP:AREA,moluccas_area,X #L Молуккських островів#!#!."
  flavor_eng.156.a: "Заманлива пропозиція."
  flavor_eng.156.b: "У цьому немає майже ніякої вигоди."
  flavor_eng.156.historical_info: "У колоніальну добу європейські країни нерідко засновували в Південно-Східній Азії різні торгові поселення та факторії для торгівлі місцевими товарами, особливо такими спеціями, як гвоздика, мускатний горіх і перець. Перша англійська факторія розташовувалася в місті Бантен і була заснована Ост-Індською компанією."
  flavor_eng.157.title: "«Про магніт»"
  flavor_eng.157.desc: "Видатний філософ і фізик [william_gilbert.GetName] присвячує весь вільний час науковим експериментам у галузі магнетизму. Майданчиком для проведення експериментів йому слугує #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!#! в [target_location.Custom('LR_PREP')|l] [target_location.GetName]. Спостерігаючи за поведінкою мінералів, що мають від природи магнітні властивості, вчений дійшов висновку, що Земля сама собою — величезний магніт; цим пояснюється постійність орбіти Місяця.\n\nСвої відкриття Гільберт виклав у трактаті #italic De Magnete, Magneticisque Corporibus, et de Magno Magnete Tellure#! («Про магніт, магнітні тіла та великий магніт — Землю»), який має намір здати до друку. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] різко засуджують ідеї фізика, однак для нашої науки вони, безсумнівно, виявляться вкрай корисними."
  flavor_eng.157.a: "Опублікуємо трактат."
  flavor_eng.157.tt1: "З'явиться [Concept('character', 'персонаж')|e] [william_gilbert.GetNameWithNoTooltip]"
  flavor_eng.157.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені виданням книги, оскільки це порушує [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.157.b: "Спалити його разом із книгою!"
  flavor_eng.157.tt3: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.157.c: "Перешкодимо виданню трактату."
  flavor_eng.157.historical_info: "Найвідоміша праця Вільяма Гільберта допомогла закласти основи для вивчення магнетизму та електрики. Для свого часу трактат «Про магніт» став по-справжньому революційним: у ньому висловлювалися такі сміливі ідеї, як: Земля сама собою — один величезний магніт. Своїми припущеннями Гільберт серйозно вплинув на вчених-сучасників і надихнув нащадків — таких як, наприклад, сер Ісаак Ньютон."
  flavor_eng.158.title: "Золота промова"
  flavor_eng.158.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] готується виступити з ретельно підготовленою промовою, де торкнеться деяких нагальних питань, що стоять зараз перед країною. Очікується, що промова, яку виголосить [ROOT.GetCountry.GetGovernment.GetRuler.GetName], не тільки надихне народ, а й допоможе йому згуртуватися навколо корони. Крім того, це підвищить стабільність #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_eng.158.a: "Прочитаємо промову цілком."
  flavor_eng.158.tt1: "[target_character.GetNameWithNoTooltip] не залишить байдужим нікого"
  flavor_eng.158.b: "Підкреслимо важливість єдності та злагоди."
  flavor_eng.158.c: "Підкреслимо важливість любові та відданості [ROOT.GetCountry.Custom('CL_DAT')]."
  flavor_eng.158.historical_info: "Промову, яку королева Єлизавета I виголосила перед парламентом 30 листопада 1601 року, прозвали «золотою». Обстановка в той час була вкрай непроста: гостро стояло питання про престолонаслідування, тривала Англо-іспанська війна, а країна була розколота на протиборчі сторони. «Золота промова» настільки сподобалася підданим, що згодом її цитували як приклад непересічних ораторських здібностей Єлизавети."
  flavor_eng.159.title: "«Протест проти тютюну»"
  flavor_eng.159.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] відверто висловлює на письмі своє невдоволення курінням: [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вона', 'він')] вважає, що #TOOLTIP:GOODS,tobacco,X #L тютюн#!#!#! небезпечний для легень, а крім того, дуже погано пахне. [ROOT.GetCountry.GetGovernment.GetRulerTitle] хоче видати повноцінний трактат, щоб дізнатися думку народу, однак розглядаються і більш рішучі заходи щодо протидії цій небезпечній речовині."
  flavor_eng.159.a: "Обкладемо ввезений тютюн митами."
  flavor_eng.159.tt1: "[target_character.GetNameWithNoTooltip] засмутить курців суворими заходами проти тютюну"
  flavor_eng.159.b: "Тимчасово заборонимо ввезення тютюну."
  flavor_eng.159.tt2: "Оскільки дістати тютюн неможливо, курці почнуть частіше пити #TOOLTIP:GOODS,beer,X #L пиво#!#!#!"
  flavor_eng.159.tt3: "Тютюнові плантації в колоніях закриються внаслідок заборони"
  flavor_eng.159.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] будуть незадоволені втручанням у торгівлю"
  STATIC_MODIFIER_NAME_tobacco_imports_banned: "Заборонено імпорт тютюну"
  STATIC_MODIFIER_NAME_tax_tobacco: "Податок на тютюн"
  eng_compensating_addictions: "Відшкодування залежності від тютюну"
  eng_growing_addiction: "Зростання популярності тютюну"
  flavor_eng.159.c: "Обмежимося виданням трактату."
  flavor_eng.159.tt5: "Попит на тютюн тимчасово збільшиться через невтручання уряду"
  flavor_eng.159.historical_info: "#italic  «Протест проти тютюну»#! — трактат, написаний англійським королем Яковом VI, ненависником тютюнокуріння. Ця нелюбов короля призвела до введення акцизу на тютюн і заборони ввезення його в країну, від чого постраждало економічне благополуччя колоній. Крім того, втручання країни так і не допомогло англійцям відмовитися від тютюну."
  flavor_eng.160.title: "[luisa_carvajal.GetNameWithNoTooltip]-і-Мендоса"
  flavor_eng.160.desc: "Набожна поетеса [luisa_carvajal.GetName], вже неодноразово помічена за спробами навернути жителів #TOOLTIP:LOCATION,london,X #L Лондона#!#! та околиць у свою віру, затримана за суперечки з народом у спробах довести, що #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#! — єдино вірна релігія.\n\nЛуїса відома благодійниця, яку дуже поважає [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], однак своїми релігійними суперечками вона ризикує налаштувати представників нижчого суспільства проти нас, оскільки релігійні розбіжності нерідко тягнуть за собою конфлікти."
  flavor_eng.160.a: "Негайно випровадимо її з країни."
  flavor_eng.160.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] будуть засмучені тим, що [luisa_carvajal.GetNameWithNoTooltip] більше не може займатися благодійністю"
  flavor_eng.160.b: "Спалити її за єресь!"
  flavor_eng.160.tt2: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.160.tt3: "[GetCountry('SPA').GetName] глибоко ображається стратою своєї громадянки"
  flavor_eng.160.c: "Благодійність ще нікому не шкодила."
  flavor_eng.160.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.160.tt5: "[luisa_carvajal.GetNameWithNoTooltip] успішно наверне кількох своїх послідовників у #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!"
  flavor_eng.160.historical_info: "Луїса Карвахаль-і-Мендоса — іспанська дворянка, що жила наприкінці XVI — на початку XVII століття. Вона покинула батьківщину і переїхала до Англії, щоб навернути прихильників англіканства в католицизм. Луїса була настільки ревною католичкою, що готова була померти за свою справу. За відкриту підтримку католицизму вона кілька разів опинялася в ув'язненні. Зрештою англійська влада вирішила вислати її до Іспанії, проте Луїса померла від хвороби, не діставшись батьківщини."
  flavor_eng.161.title: "Втеча графів"
  flavor_eng.161.desc: "Ірландські графи, відчуваючи безсилля та усвідомлюючи, що країна їх все більше залежить від #L [ROOT.GetCountry.GetAdjective|l]ої#! влади, зібралися обговорити план втечі з Ірландії в надії уникнути нових конфліктів та відплати.\n\nВони можуть звернутися за допомогою до #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! країн Європи, однак навряд чи таке рішення похитне нашу владу над регіоном. Графів можна спробувати умиротворити, запропонувавши їм часткове самоврядування, але варто врахувати, що тоді наше підкорення острова затягнеться."
  flavor_eng.161.a: "Нехай тікають."
  flavor_eng.161.a.custom: "#TOOLTIP:CULTURE,$irish_tt$,X #L Ірландські#!#! [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] з #TOOLTIP:AREA,ulster_area,X #L Ольстера#!#! мігрують до #TOOLTIP:PROVINCE_DEFINITION,coruna_province,X #L А-Коруньї#!#!"
  flavor_eng.161.b: "Дамо їм більше самостійності."
  flavor_eng.161.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] з #TOOLTIP:PROVINCE_DEFINITION,ulster_province,X #L Ольстера#!#! будуть умиротворені"
  flavor_eng.161.historical_info: "Після того як повстання Г'ю О'Ніла зазнало невдачі, ірландські вожді та аристократи вирішили покинути рідну країну. Їхній відхід залишив глибокий відбиток на ірландському суспільстві, політиці та культурі, а також став початком повільного занепаду усталеної гельської аристократії. Графи прагнули заручитися підтримкою інших країн, щоб організувати інтервенцію. Першою з таких країн стала Іспанія."
  flavor_eng.162.title: "Sea Venture"
  flavor_eng.162.desc: "Перший корабель, побудований спеціально для перевезення мігрантів та постачання колоній до #TOOLTIP:AREA,southern_new_england_area,X #L Південної Нової Англії#!#!, зазнав аварії біля #TOOLTIP:LOCATION,bermuda,X #L Бермудських островів#!#!. Можна залишити моряків та колоністів, що вижили, на призволяще, або можна спробувати відправити за ними другий корабель, який підбере потерпілих і відправиться продовжувати перерваний шлях першого корабля — #italic Sea Venture#!.\n\nЯкщо колонії в #TOOLTIP:AREA,southern_new_england_area,X #L Південній Новій Англії#!#! не отримають своєчасно необхідні їм припаси, поселенців чекають важкі часи."
  flavor_eng.162.a: "Нехай залишаються на острові."
  flavor_eng.162.b: "Треба довезти їх до колоній."
  flavor_eng.162.historical_info: "#italic Sea Venture#! — корабель постачання, що належав Віргінській компанії. У 1609 році у складі флотилії з восьми інших кораблів він відправився до колонії Джеймстаун у Вірджинії. Судно перевозило припаси та поселенців для молодої колонії, що переживала труднощі. У дорозі корабель #italic Sea Venture#! потрапив в ураган, відокремився від інших і опинився викинутим на узбережжя Бермудських островів, тоді ще безлюдних. Однак команда корабля не впадала у відчай: через рік вона побудувала два нових судна і все-таки змогла прибути до Джеймстауна, завдяки чому врятувала колонію."
  flavor_eng.163.title: "Театр «Глобус»"
  flavor_eng.163.desc: "Талановитий письменник [william_shakespeare.GetName] запропонував побудувати на південному березі річки Темзи розважальний заклад, де він зможе ставити свої численні п'єси. Як матеріал для будівництва пропонується деревина.\n\nКошти на будівництво виділить шекспірівська трупа «Слуги лорда-камергера». Однак близькість театру до річки викликає побоювання: у разі розливу будівля може постраждати. Тому, щоб «Глобус» не затопило, передбачається зробити насип і укріпити укіс — сировиною для цього послужать #TOOLTIP:GOODS,lumber,X #L лісоматеріали#!#!#!. Таким чином театр опиниться над рівнем паводку."
  flavor_eng.163.a: "Розумний захід."
  flavor_eng.163.tt1: "Разом з театром буде побудовано насип"
  flavor_eng.163.b: "Ми згодні лише на театр."
  flavor_eng.163.tt2: "Театр «Глобус» може затопити"
  flavor_eng.163.c: "Заборонимо будівництво."
  flavor_eng.163.historical_info: "«Глобус» — знаменитий лондонський театр, що прославився тим, що в ньому регулярно ставили твори Вільяма Шекспіра. Збудована в 1599 році будівля згоріла в 1613 році, проте вже за рік на її місці збудували новий театр. «Глобус» розташовувався в лондонській місцевості Бенксайд, поруч із міськими стінами, оскільки тоді було заборонено будувати театри в межах міст."
  flavor_eng.164.title: "Великий договір"
  flavor_eng.164.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] веде розкішний спосіб життя та утримує велику родину, а тому не вилізає з боргів. Втомлені радники подали до парламенту прохання про надання їм щорічних асигнувань. В обмін [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] поступиться деякими правами та повноваженнями.\n\nЯкщо цю угоду — так званий «Великий договір» — вдасться укласти, [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] стануть отримувати більше доходу та позбудуться боргів. Однак якщо ми не доб'ємося фінансового врегулювання, наша репутація в інвесторів серйозно постраждає, і згодом залучати кошти стане складніше."
  flavor_eng.164.a: "Це нездійсненне завдання."
  flavor_eng.164.tt1: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] відчуватиме фінансові труднощі. Це сильно ускладнить управління країною"
  flavor_eng.164.tt2: "Позикодавці, що побоюються фінансової нестабільності, вимагатимуть вагоміших гарантій за позиками"
  flavor_eng.164.b: "Переглянемо умови."
  flavor_eng.164.tt3: "[target_character.GetName] доб'ється прийнятніших умов завдяки своєму вмінню домовлятися"
  flavor_eng.164.c: "Ми згодні."
  STATIC_MODIFIER_NAME_great_contract: "Великий договір"
  STATIC_MODIFIER_NAME_great_contract_compromise: "Переглянутий Великий договір"
  STATIC_MODIFIER_NAME_lack_of_agreement: "Розбіжності"
  flavor_eng.164.historical_info: "Великий договір — складений Робертом Сесілом план із погашення боргів монархії шляхом залучення коштів парламенту. Натомість англійській короні пропонувалося відмовитися від права опікунства над неповнолітніми спадкоємцями інших васалів та їхнім майном, а також від права закуповувати продукти харчування за цінами, нижчими за ринкові, та вводити нові збори й мита. Однак ні сам Яків I, ні парламент не змогли дійти згоди з цих питань."
  flavor_eng.165.title: "[thomas_harriot.GetNameWithNoTooltip]"
  flavor_eng.165.desc: "З #TOOLTIP:LOCATION,oxford,X #L Оксфордського#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#! скоро випуститься геніальний астроном і математик на ім'я [thomas_harriot.GetName]. За допомогою таких інструментів, як астролябія та секстант, він захоплено вдосконалює своє розуміння навігаційної науки та прагне до Нового Світу.\n\nМи можемо або дозволити йому й далі віддаватися своїм захопленням, або залучити його до діяльності, що відповідає здобутій освіті."
  flavor_eng.165.a: "У наступній експедиції без нього не обійтися."
  flavor_eng.165.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [thomas_harriot.GetNameWithNoTooltip]"
  flavor_eng.165.tt2: "Він досвідчений перекладач, тому ймовірність успіху експедицій значно підвищиться"
  STATIC_MODIFIER_NAME_wonder_translator: "Чудо-перекладач"
  flavor_eng.165.b: "Нехай буде математиком та астрономом."
  flavor_eng.165.tt3: "[thomas_harriot.GetNameWithNoTooltip] зробить значний внесок у науку"
  flavor_eng.165.c: "Обійдемося і без нього."
  flavor_eng.165.tt4: "[thomas_harriot.GetNameWithNoTooltip] рахуватиме зірки в іншому місці"
  flavor_eng.165.historical_info: "На рубежі XVI–XVII століть Томас Гарріот зробив чималий внесок у науку та географічні дослідження. Він одним із перших став використовувати для спостережень за небесними тілами телескоп, завдяки якому склав докладні описи Місяця та інших планет. Крім того, Гарріот виявляв неабиякі здібності до мов, а тому супроводжував сера Волтера Рейлі в поїздках до Північної Америки, де вивчив мови двох місцевих племен."
  flavor_eng.166.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] та повінь"
  flavor_eng.166.desc: "Нам стало відомо, що різкий приплив, спричинений бурею, що налетіла, у поєднанні з весняною повінню призвів до затоплення #TOOLTIP:PROVINCE_DEFINITION,cornwall_province,X #L Корнуолла#!#!. Серйозно постраждали як власність землевласників, так і угіддя. Повінь забрала чимало життів; деякі області цілком пішли під воду.\n\nКрім цього, розлилася і Темза — вода залила південний берег."
  flavor_eng.166.a: "Жахлива новина."
  globe_repairs: "Ремонт «Глобуса»"
  flavor_eng.166.tt1: "Нещодавно зведена насип захистить #TOOLTIP:BUILDING_TYPE,globe_theatre,X #L театр «Глобус»#!#!#! від затоплення"
  flavor_eng.166.tt2: "#TOOLTIP:BUILDING_TYPE,globe_theatre,X #L Театр «Глобус»#!#!#! постраждає від повені, оскільки не стоїть на насипі"
  flavor_eng.166.b: "Нехай розвалюється."
  flavor_eng.166.historical_info: "У 1607 році в Англії сталася руйнівна повінь, прозвана згодом на честь короля Якова I. Потужний штормовий приплив, що пройшов Бристольською затокою, обрушився на Південний Уельс та південний захід Англії. Лише після цієї повені короні стало очевидно, що берегову лінію необхідно захищати від припливів, а отже — виробляти абсолютно нові підходи до управління прибережними місцевостями."
  flavor_eng.167.title: "Заколот на «Діскавері»"
  flavor_eng.167.desc_common: "Знаменитий дослідник [henry_hudson.GetName] деякий час тому вирушив на пошуки легендарного Північно-Західного Проходу під #L [ROOT.GetCountry.GetAdjective|l]им#! прапором. Його корабель #italic «Діскавері»#!, що взяв курс на північні широти, нещодавно повернувся без капітана. Жителі [ROOT.GetCountry.Custom('CL_GEN')] дивуються, куди подівся прославлений син цієї країни. Команда ухиляється від прямих відповідей, але натякає, що він покинув корабель в результаті заколоту."
  flavor_eng.167.desc_trade_company: "$flavor_eng.167.desc_common$\n\nНаша торгова компанія вкрай зацікавлена в тому, щоб Генрі повернувся живим і неушкодженим, а тому просить організувати рятувальну експедицію."
  flavor_eng.167.desc_colonial_nation: "$flavor_eng.167.desc_common$\n\nНаша колонія [target_colony.GetName] вкрай зацікавлена в тому, щоб Генрі повернувся живим і неушкодженим, а тому просить організувати рятувальну експедицію."
  flavor_eng.167.a: "Не пошкодуємо ні пенса."
  flavor_eng.167.tt1: "[henry_hudson.GetNameWithNoTooltip] пропаде безвісти"
  flavor_eng.167.tt2: "[henry_hudson.GetNameWithNoTooltip] буде знайдений і з'явиться в якості [Concept('explorer', 'дослідника')|e]"
  flavor_eng.167.tt3: "Під час пошуків зниклого дослідника заодно буде нанесено на мапу #TOOLTIP:AREA,hudson_bay_sea_zones_area,X #L Море Гудзонової затоки#!#!"
  flavor_eng.167.b: "Побажаємо йому удачі."
  flavor_eng.167.tt4: "[henry_hudson.GetNameWithNoTooltip] буде оголошений зниклим у морі"
  flavor_eng.167.historical_info: "Дізнавшись, що капітан Генрі Гудзон збирається плисти на захід, команда корабля #italic «Діскавері»#! підлаштувала заколот. Після зимівлі в Гудзоновій затоці матроси відчайдушно хотіли повернутися додому. Цьому противився капітан, чим і заслужив немилість команди. Його разом з неповнолітнім сином Джоном і ще сімома членами екіпажу висадили в затоці. Доля їх і донині залишається невідомою."
  flavor_eng.168.title: "Котсуолдська Олімпіада"
  flavor_eng.168.desc: "Нам надійшла пропозиція влаштувати місцеве свято, аби запевнити простолюд, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] йому не ворог. Взяти участь зможе будь-хто охочий. До програми увійдуть такі розваги, як кінні перегони, танці, метання молота та особлива боротьба, учасники якої б'ють один одного по гомілці, щоб повалити суперника на землю. #TOOLTIP:GOODS,wild_game,X #L Дичина#!#!, #TOOLTIP:GOODS,fish,X #L риба#!#! та #TOOLTIP:GOODS,beer,X #L пиво#!#! будуть у достатку, а любителі азартних ігор зможуть спробувати удачі в численних наметах, де проводитимуться ігри з невеликими ставками.\n\nНа вибір запропоновано кілька дат. Найкраще буде влаштувати святкування в четвер або п'ятницю, що випадають на тиждень П'ятидесятниці."
  flavor_eng.168.a: "Накажемо проводити це свято щорічно."
  flavor_eng.168.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] не схвалять подібні розваги, оскільки вважають їх язичницькими"
  STATIC_MODIFIER_NAME_cotswold_olimpick_games: "Котсуолдська Олімпіада"
  cotswold_olimpick_games: "Котсуолдська Олімпіада"
  flavor_eng.168.b: "Достатньо й одного разу."
  flavor_eng.168.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] будуть задоволені й запропонують підтримати перший захід грошима"
  flavor_eng.168.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] будуть задоволені та запропонують підтримати захід грошима"
  flavor_eng.168.c: "Не варто змішувати верстви суспільства."
  flavor_eng.168.historical_info: "Котсуолдська Олімпіада — щорічний захід, що проводиться в місцевості Котсуолд у графстві Глостершир. Уперше ці ігри організував Роберт Довер, юрист при королі Якові I, що надихався давньогрецькими Олімпійськими іграми. Кінець цим святкуванням поклала громадянська війна, проте після неї ігри відновилися і проводяться навіть сьогодні."
  flavor_eng.169.title: "[inigo_jones.GetNameWithNoTooltip]"
  flavor_eng.169.desc: "Архітектор-новатор і театральний постановник [inigo_jones.GetName], близький до королівського двору, нещодавно повернувся з поїздки за кордон, куди вирушав на навчання. #TOOLTIP:REGION,italy_region,X #L Італія#!#! справила на нього незабутнє враження: перейнявшись величчю греко-римської культури, Джонс, який до цього переважно займався створенням химерних театральних масок, заодно почав виробляти новий архітектурний стиль."
  flavor_eng.169.a: "Призначимо його генеральним інспектором."
  flavor_eng.169.tt1: "З'явиться [Concept('character', 'персонаж')|e] [inigo_jones.GetNameWithNoTooltip]"
  enable_inigo_architecture_advance: "Розблоковує [Concept('advance', 'поступ')|e] «#L #TOOLTIP:ADVANCE_DEFINITION,inigo_architecture,X #L Архітектура Ініго#!#!»"
  flavor_eng.169.b: "На сцені без нього не обійтися."
  flavor_eng.169.tt2: "З'явиться [Concept('character', 'персонаж')|e] [inigo_jones.GetNameWithNoTooltip], він займатиметься виключно театром"
  flavor_eng.169.c: "Нехай сам вирішує, як йому слід жити."
  flavor_eng.169.historical_info: "Ініго Джонс — англійський архітектор і театральний декоратор. Значно вплинув на розвиток англійської будівельної думки. Джонс познайомив Англію з класичною архітектурою і побудував такі будівлі, як Банкетинг-хаус і Квінс-хаус, а також спроєктував площу Ковент-Гардена. Він виявляв інтерес і до театру — розробляв декорації та різні технічні пристрої."
  flavor_eng.172.title: "Дохід з мита на вагу та вартість"
  flavor_eng.172.desc: "Податки на ввезені та вивезені товари запровадив ще [edward_ii.GetName], забезпечивши тим самим надійний спосіб поповнення королівської скарбниці. Зазвичай парламент призначав монарху доходи з цих мит на все життя, проте під час останнього засідання було висунуто пропозицію обмежитися лише одним роком — після закінчення цього терміну [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] перестане отримувати свої відрахування."
  flavor_eng.172.a: "Будемо стягувати податки без санкції парламенту."
  flavor_eng.172.tt1: "[target_root_country.GetGovernment.GetParliament.GetName] не забуде це зловживання повноваженнями"
  flavor_eng.172.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] перешкодять цій пропозиції."
  flavor_eng.172.tt2: "Члени [target_root_country.Custom('parliament_ru_GEN')|l] відмовляться виплатити річну суму [Concept('taxes', 'податків')|e]"
  flavor_eng.172.c: "Відмовимося підписувати."
  flavor_eng.172.tt3: "Це питання залишиться невирішеним до кінця поточного терміну правління"
  STATIC_MODIFIER_NAME_tonnage_and_poundage_denied: "Відмовлено в доході з мита"
  STATIC_MODIFIER_NAME_abusing_royal_prerogative: "Зловживання королівськими повноваженнями"
  flavor_eng.172.historical_info: "Мита на вагу та вартість — митні збори, що стягувалися з ввезених та вивезених товарів, наприклад з вина, становили значну частину прибутків англійської монархії. Мита на вагу стягувалися залежно від маси або обсягу товару, мита на вартість становили деякий відсоток від вартості імпортованих товарів. Скасовані прийнятим у 1787 році указом про збір митних платежів."
  flavor_eng.173.title: "Повернення Золотого віку"
  flavor_eng.173.desc: "Нам надійшла пропозиція поставити маску, яку написав відомий своїм талантом [inigo_jones.GetName]. У ній бере участь ціла плеяда персонажів, у тому числі деякі з найвидатніших [ROOT.GetCountry.GetGovernment.GetAdjective|l]их поетів минулого. Сюжет присвячений пробудженню богині справедливості, що жила в Золотому віці, — #italic Астреї#!. Буде одночасно поставлена й антимаска за участю дванадцяти втілень зла. Публіка напевно прийде в захват."
  flavor_eng.173.a: "Візьмемо на себе витрати."
  flavor_eng.173.tt1: "Персонаж [geoffrey_chaucer.GetName] викличе у глядачів радість"
  flavor_eng.173.b: "Марна трата часу."
  flavor_eng.173.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] будуть розчаровані відсутністю розваг"
  flavor_eng.173.historical_info: "#italic «Повернення Золотого віку»#! — маска доби правління англійського короля Якова VI, написана Беном Джонсоном та оформлена Ініго Джонсом. Відомостей про неї збереглося вкрай мало, оскільки жоден з начерків Джонса не дійшов до нашого часу, проте дещо все-таки відомо: сюжет «Повернення…» значною мірою присвячений перетворенню двору, що загруз у корупції. Тоді ця тема була досить актуальною, оскільки в країні вирував скандал, що розгорівся навколо фаворита короля — він чекав суду за звинуваченням у вбивстві. Маска виявилася настільки популярною, що на особисте прохання монарха її поставили вдруге."
  flavor_eng.174.title: "[christopher_wren.GetNameWithNoTooltip]"
  flavor_eng.174.desc: "Майстер на всі руки — архітектор, астроном, математик і фізик [christopher_wren.GetName] — не тільки читає лекції в #TOOLTIP:LOCATION,oxford,X #L Оксфордському#!#! #TOOLTIP:BUILDING_TYPE,university,X #L університеті#!#!, а й відвідує щотижневі зібрання інтелектуалів у #TOOLTIP:LOCATION,london,X #L Лондоні#!#!. Можливо, вченого вдасться схилити до вступу на королівську службу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, де належно оцінять його здібності архітектора. Можна, втім, залишити його займатися наукою, і тоді він закладе родючий ґрунт для розвитку нашої наукової думки."
  flavor_eng.174.a: "Призначимо його інспектором будівельних робіт."
  flavor_eng.174.tt1: "З'явиться [Concept('character', 'персонаж')|e] [christopher_wren.GetNameWithNoTooltip]"
  flavor_eng.174.tt2: "Завдяки своїй посаді при дворі він зможе створювати значущі споруди"
  flavor_eng.174.b: "Нехай розвиває науку."
  flavor_eng.174.tt3: "[christopher_wren.GetNameWithNoTooltip] приділятиме всю увагу науковим дослідженням у різних галузях"
  flavor_eng.174.c: "Його таланти нам навряд чи знадобляться."
  flavor_eng.174.historical_info: "Сер Крістофер Рен — знаменитий англійський архітектор, математик і вчений. Заснував Королівське товариство і кілька років обіймав у ньому посаду голови. Своїми науковими працями зробив значний внесок у розвиток одразу кількох галузей науки. Прославився також і архітектурними роботами — так, саме Рен побудував лондонський собор Святого Павла."
  flavor_eng.175.title: "Собор Святого Павла"
  flavor_eng.175.desc_common: "Відомий архітектор [christopher_wren.GetName] надав нам на розгляд свої креслення. Будувати собор він пропонує з каменю в стилі бароко. Висота споруди вражає 111 метрів. Якщо проєкт вдасться втілити, собор височітиме над усіма іншими столичними будівлями."
  flavor_eng.175.desc: "Пишноту #TOOLTIP:LOCATION,london,X #L Лондона#!#! слід примножувати. Цій меті послужить грандіозний собор. $flavor_eng.175.desc_common$"
  flavor_eng.175.desc_great_fire: "Після Великої пожежі, що зруйнувала столицю, лондонці залишилися без собору. Втрата ця значна, тому що втрачений під час пожежі собор був побудований ще в 606 році, богослужіння відбувалися там багато століть поспіль. #TOOLTIP:LOCATION,london,X #L Лондон#!#! заслуговує на краще. Нам слід якнайшвидше побудувати нове місце для поклоніння. $flavor_eng.175.desc_common$"
  flavor_eng.175.a: "Негайно почнемо будівництво."
  flavor_eng.175.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть раді бачити будівництво великої релігійної [Concept('building', 'споруди')|e]"
  flavor_eng.175.b: "Поки обійдемося місцевими парафіями."
  flavor_eng.175.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені повільністю в питанні будівництва нової церкви"
  st_pauls_construction: "Будівництво собору Святого Павла"
  flavor_eng.175.historical_info: "Собор Святого Павла — одна з найбільших пам'яток у центрі Лондона. Побудований за планом Крістофера Рена — цей архітектор після Великої пожежі спроєктував понад 50 церков в одній лише столиці. Собор виконаний у стилі англійського бароко і відомий своїм приголомшливо витонченим куполом — другим за розміром у світі на момент завершення будівництва."
  flavor_eng.176.title: "Велика пожежа"
  flavor_eng.176.desc_common: "Пожежа, що охопила спочатку невелику пекарню на Пудинг-лейн, швидко охопила весь #TOOLTIP:LOCATION,london,X #L Лондон#!#!. Сотні будинків приречені: #TOOLTIP:GOODS,lumber,X #L дерево#!#! легко горить, і вогонь миттєво переходить з однієї будівлі на іншу. Зупинити його неможливо, оскільки всі вулиці і навіть і без того вузькі провулки забиті натовпами панікуючих містян."
  flavor_eng.176.desc_eastern_winds: "$flavor_eng.176.desc_common$\n\nСхідний вітер несе всепожираючий вогонь у бік лондонського Тауера. Пожежа знищує все на своєму шляху, проте Вестмінстер, схоже, зараз у безпеці."
  flavor_eng.176.desc: "$flavor_eng.176.desc_common$\n\nОдначе західний вітер ніс вогонь убік від щільної забудови. Лондон відбувся меншою шкодою, ніж міг би, але Вестмінстер, що стоїть поруч і слугує резиденцією для уряду, значно постраждав від пожежі."
  flavor_eng.176.a: "Порядок! Терміново навести порядок!"
  flavor_eng.176.tt1: "Пожежа знищить кілька королівських палаців у [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]. [target_root_country.GetGovernment.GetRulerTitle] зганьбиться перед усією країною"
  flavor_eng.176.tt2: "Багато #TOOLTIP:POPTYPE,burghers,X #L містян#!#!, що втратили свої крамниці, покинуть місто в пошуках кращої долі"
  flavor_eng.176.tt3: "Постраждалі #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, що втратили свої домівки, будуть змушені переселятися в інші місця"
  flavor_eng.176.tt4: "[samuel_pepys.GetName] спостерігатиме за пожежею з річки"
  flavor_eng.176.historical_info: "Назву «Велика» отримала пожежа, яка майже цілком знищила всю територію Лондона в межах стародавніх римських стін. Вона вирувала близько трьох днів; поширенню вогню сприяли суха погода та сильний вітер. Знищені виявилися не тільки будинки та магазини, а й численні пам'ятки, включно з собором Святого Павла. Згодом планування міста змінили, а будівельні стандарти зробили суворішими."
  flavor_eng.177.title: "Покахонтас"
  flavor_eng.177.desc: "Завдяки заснуванню колонії в #TOOLTIP:AREA,virginia_area,X #L Вірджинії#!#! ми змогли встановити дипломатичні відносини з сусіднім племенем [target_tribe.GetName|l]. Нещодавно, внаслідок сутички з місцевими мешканцями, дочка вождя [rebecca_rolfe.GetName] потрапила в полон до колоністів і незабаром вийшла заміж за одного з них. Майже відразу молодята вирішили повернутися на рідні для чоловіка землі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!.\n\nНатовпи роззяв уже вишикувалися подивитися на карету, що прибула до #TOOLTIP:LOCATION,london,X #L Лондона#!#! — кожен хоче побачити знамениту принцесу, яку називають не інакше як благородною дикункою. Такий поворот подій слід обернути собі на користь і отримати вигоду з її присутності при дворі."
  flavor_eng.177.a: "Представимо її багатим вкладникам."
  flavor_eng.177.tt1: "[rebecca_rolfe.GetNameWithNoTooltip] буде настільки популярна, що народ кинеться в колонії, куди зараз вкладається ще більше грошей"
  flavor_eng.177.b: "Нехай залишається при дворі."
  flavor_eng.177.tt2: "З'являється [Concept('character', 'персонаж')|e] [rebecca_rolfe.GetNameWithNoTooltip]"
  flavor_eng.177.tt3: "#TOOLTIP:POPTYPE,nobles,X #L Знать#!#! знайде чарівною її присутність"
  flavor_eng.177.c: "Ретельно складемо її біографію."
  flavor_eng.177.tt4: "Життя, яке веде [rebecca_rolfe.GetNameWithNoTooltip], стане культурним надбанням країни"
  flavor_eng.177.historical_info: "Ребекка Рольф, також відома як Покахонтас, — індіанська принцеса з племені поухатанів. Була знайома з англійськими поселенцями у Вірджинії, зокрема з капітаном Джоном Смітом, а пізніше вийшла заміж за Джона Рольфа. У 1616 році разом з чоловіком вирушила до Англії, де отримала прийом в Вайтхоллі. Під час підготовки до зворотного плавання захворіла і померла через рік, так і не покинувши країну."
  flavor_eng.178.title: "Борода Ван Дейка"
  flavor_eng.178.desc: "З #TOOLTIP:LOCATION,antwerp,X #L Антверпена#!#! прибув модний #L [flemish.GetName|l]ий#! художник [anton_van_dyck.GetName], цього бажає особисто [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Ван Дейк відомий не тільки своїм мистецтвом поводження з пензлем — цим він заслужив посаду придворного художника — а й характерною рослинністю на обличчі, що миттєво стала предметом захопленого обговорення."
  flavor_eng.178.a: "Наполяжемо на тому, щоб Ван Дейк залишився, і викликаємо королівського цирульника."
  flavor_eng.178.tt1: "З'явиться [Concept('character', 'персонаж')|e] [anton_van_dyck.GetNameWithNoTooltip]"
  flavor_eng.178.tt2: "[anton_van_dyck.GetNameWithNoTooltip] переїде після завершення роботи"
  flavor_eng.178.tt3: "Наслідуючи приклад Ван Дейка, багато джентльменів почнуть відрощувати таку ж бороду, відступаючи від моди на гладко поголені обличчя"
  flavor_eng.178.b: "Назвемо таку бороду «[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip]»."
  grooming_equipment: "Великий попит на засоби для догляду за собою"
  flavor_eng.178.historical_info: "Борода а-ля Ван Дейк — модний стиль, що характеризується поєднанням акуратно підстриженої гострої козлиної борідки та вусів, що ростуть окремо від неї. В Англії моду на таку бороду запровадив фламандський художник у стилі бароко Антоніс Ван Дейк — придворний портретист, який значно вплинув на розвиток портретного живопису в країні. Бороду в стилі Ван Дейка носив навіть король Карл II, називаючи цей стиль «чарлі»."
  flavor_eng.179.title: "Біблія грішників"
  flavor_eng.179.desc: "Через чийсь недогляд під час вичитування королівські друкарі випустили наклад Біблії з грубою помилкою: в одній заповіді була пропущена частка «не», тому тепер заповідь говорить: «перелюбствуй». Громадськість разом із духовенством миттєво висловила гнівний протест такій непрощенній помилці. Народ вимагає відкликати Біблії з одруківкою та виправити помилковий текст."
  flavor_eng.179.a: "Відкличемо у друкарів дозвіл і виставимо їм штраф."
  flavor_eng.179.b: "Це всього лише випадковість."
  flavor_eng.179.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.179.tt2: "Під час повсталих бунтів винна #TOOLTIP:BUILDING_TYPE,printing_press_shop,X #L друкарська майстерня#!#!#! буде знищена"
  flavor_eng.179.historical_info: "Біблія грішників — рідкісне видання Святого Письма, випущене 1631 року. Належить до так званих bible errata, тобто видань Біблії, що вважалися єретичними, а тому зазвичай підлягали знищенню або вилученню. Зоряна палата наклала на видавців великий штраф, а архієпископ Кентерберійський наказав відкликати всі надруковані примірники та виправити їх."
  flavor_eng.180.title: "[john_milton.GetNameWithNoTooltip]"
  flavor_eng.180.desc: "Видатний поет і політичний діяч [john_milton.GetName] закликає до змін, безстрашно йдучи наперекір чинній владі. Щоб донести свою думку до народу, він написав промову #italic «Ареопагітика»#!, в якій засуджує цензуру та гаряче відстоює свободу слова і друку."
  flavor_eng.180.a: "Наслідуймо його слова."
  flavor_eng.180.tt1: "З'явиться [Concept('character', 'персонаж')|e] [john_milton.GetNameWithNoTooltip]"
  flavor_eng.180.tt2: "[john_milton.GetName] матиме серйозний вплив на свободу слова та друку"
  flavor_eng.180.b: "Нехай говорить, але змін він не дочекається."
  flavor_eng.180.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.180.tt4: "[john_milton.GetNameWithNoTooltip] схилить на свій бік кількох депутатів парламенту"
  flavor_eng.180.c: "Спалити його за єресь!"
  flavor_eng.180.tt5: "Часи змінюються. Своїми словами [john_milton.GetNameWithNoTooltip] згуртує депутатів парламенту, незгодних зі сформованим способом дій"
  flavor_eng.180.tt6: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  STATIC_MODIFIER_NAME_parliament_influenced: "Вплив на парламент"
  STATIC_MODIFIER_NAME_parliament_desires_change: "Парламент прагне змін"
  flavor_eng.180.historical_info: "Джон Мільтон — впливовий англійський поет, а також політичний діяч доби громадянської війни та протекторату Олівера Кромвеля. Написав кілька трактатів на підтримку свободи та відокремлення церкви від країни. Ближче до кінця життя осліп, проте це не завадило йому вести літературну та політичну діяльність."
  flavor_eng.181.title: "Гудсонбайська компанія"
  flavor_eng.181.desc_european_presence: "Два #L [target_country.GetAdjective|l]их#! торговці зробили пропозицію групі #L [ROOT.GetCountry.GetAdjective|l]их#! колоніальних купців: вони разом спорядять експедицію до #TOOLTIP:AREA,james_bay_lowlands_area,X #L Західної затоки Джеймс#!#!, щоб визначити, чи можна організувати торгівлю вздовж берегової лінії та скільки прибутку їм принесе торгівля #TOOLTIP:GOODS,fur,X #L хутром#!#!#!.\n\nТорговці звернулися і до губернатора колонії, проте той відмовив їм: він побоюється, що відкриття шляху через Гудзонову затоку може призвести до переміщення туди торгівлі хутром, яка зараз проходить по річці Святого Лаврентія."
  flavor_eng.181.desc: "#TOOLTIP:AREA,james_bay_lowlands_area,X #L Західна затока Джеймс#!#! — область з протяжною береговою лінією, де водиться безліч диких звірів. Заснувати тут хутровий промисел буде досить нескладно. Головне — встигнути забрати цю область собі, поки туди не прибули інші європейські країни, які теж бажають торгувати #TOOLTIP:GOODS,fur,X #L хутром#!#!#!."
  flavor_eng.181.a: "Дамо на це благословення та виділимо кошти."
  flavor_eng.181.tt1: "Приватні вкладники за допомогою урядових субсидій спробують заснувати в Західній затоці Джеймс торговельну компанію"
  flavor_eng.181.b: "Це приватна справа, а не урядова."
  flavor_eng.181.tt2: "Приватні вкладники власним коштом спробують закріпитися в Західній затоці Джеймс"
  flavor_eng.181.c: "У цьому немає сенсу. Крім того, там незручно оборонятися."
  flavor_eng.181.historical_info: "Гудсонбайська компанія, вона ж компанія Гудзонової затоки, — підприємство, яке майже весь час свого існування займалося торгівлею хутрами. Сьогодні спеціалізується на роздрібній торгівлі. У 1670 році компанія отримала монополію на торгівлю в Гудзоновій затоці. Докази прибутковості такого підприємства представили два французькі купці, які після повернення до Англії заручилися підтримкою та фінансовим покровительством принца Руперта."
  flavor_eng.182.title: "Це хутро не для всіх"
  flavor_eng.182.desc_james_bay_discovered: "Присутність у #TOOLTIP:AREA,james_bay_lowlands_area,X #L Західній затоці Джеймс#!#! #L [target_root_country.GetAdjective|l]их#! купців ставить під загрозу наш хутровий промисел, яким живе #TOOLTIP:AREA,lower_canada_area,X #L Нижня Канада#!#!. Потрібно якнайшвидше заснувати тут власну торговельну компанію та постаратися обійти конкурента, інакше вивчення ними шляхів через Гудзонову затоку призведе до того, що #TOOLTIP:GOODS,fur,X #L хутро#!#!#! перестануть возити через річку Святого Лаврентія."
  flavor_eng.182.desc: "Ходять чутки, що #L [target_root_country.GetAdjective|l]і#! власті — наші давні суперники — заснували торговельну компанію в незвіданих ще областях на північ від #TOOLTIP:AREA,lower_canada_area,X #L Нижньої Канади#!#! та торгують через неї #TOOLTIP:GOODS,fur,X #L хутрами#!#!#!. Потрібно постаратися якнайшвидше нанести ці місця на мапу, інакше наш видобуток #TOOLTIP:GOODS,fur,X #L хутра#!#!#! на річці Святого Лаврентія опиниться під загрозою."
  flavor_eng.182.a: "Не будемо зволікати!"
  flavor_eng.182.tt1: "Приватні вкладники за допомогою урядових субсидій спробують закріпитися в Західній затоці Джеймс"
  flavor_eng.182.b: "Вражаюча нахабність."
  flavor_eng.182.c: "Придбаємо мапи у місцевих племен."
  flavor_eng.183.title: "Велика ремонстрація"
  flavor_eng.183.desc_common1: "Представник парламенту вручив нам список зловживань корони, спрямований, як вважають депутати, на виправлення нашого підходу до корупції та впливу духовенства на державні справи."
  flavor_eng.183.desc_common2: "\n\nУкладачів списку турбує також і те, що серед радників короля числяться [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Їх присутність сприймається як втручання церкви в політику країни. Депутати висунули пропозицію заборонити священникам обіймати посади в раді. У відповідь парламент буде більш прихильно ставитися до всіх наступних пропонованих законів."
  flavor_eng.183.desc_abuse_of_power: "$flavor_eng.183.desc_common1$ Вони вимагають обмежень королівської влади: спогади, як [ROOT.GetCountry.GetGovernment.GetRuler.GetName] стягує податок без санкції парламенту, ще свіжі в їх пам'яті. Депутати вважають, що повторні зловживання неприпустимі. $flavor_eng.183.desc_common2$"
  flavor_eng.183.desc_tyranny: "$flavor_eng.183.desc_abuse_of_power$\n\nНа довершення вони підкреслюють, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вже занадто довго править, не скликаючи парламент, а тому побоюються за збереження своїх прав та привілеїв при необмеженій владі монарха."
  flavor_eng.183.desc: "$flavor_eng.183.desc_common1$ Вони підкреслюють, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] вже занадто довго править, не скликаючи парламент, а тому побоюються за збереження своїх прав та привілеїв при необмеженій владі монарха. $flavor_eng.183.desc_common2$"
  flavor_eng.183.a: "Складемо ретельно сформульовану відмову."
  flavor_eng.183.tt1: "Парламент може відповісти вороже та спробувати будь-якими засобами обмежити королівську владу"
  flavor_eng.183.b: "Погодимося на їхні умови."
  flavor_eng.183.b.custom: "Вводиться [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,grand_remonstrance_reform,X #L «Велика ремонстрація»#!#!"
  flavor_eng.183.c: "Спробуємо домовитися про компроміс."
  flavor_eng.183.c.custom1: "[target_root_country.GetGovernment.GetRuler.GetName] не має великого дипломатичного досвіду, тому ймовірність успіху низька"
  flavor_eng.183.c.custom2: "[target_root_country.GetGovernment.GetRuler.GetName] має відносно великий дипломатичний досвід, тому є нагода переконати достатньо депутатів"
  flavor_eng.183.tt2: "Підсумок компромісу може виявитися несприятливим"
  flavor_eng.183.d: "Найкраща моя зброя — це слово."
  flavor_eng.183.tt3: "[target_root_country.GetGovernment.GetRuler.GetName] володіє [Concept('trait', 'рисою')|e] «Красномовство», а тому переконає опозицію"
  STATIC_MODIFIER_NAME_grand_remonstrance_refused: "Великій ремонстрації відмовлено"
  flavor_eng.183.historical_info: "Велика ремонстрація — політичний документ, пред'явлений у 1641 році депутатами парламенту англійському королю Карлу I. У цьому документі депутати висловили невдоволення владою короля та висунули пропозиції, покликані докорінно обмежити можливість монарха втручатися в парламентське діловодство. Крім цього вони висловили побоювання перед поширенням у країні католицизму та зазначили, що радники короля користуються занадто великим впливом. Вручення королю Великої ремонстрації призвело до різкого сплеску напруги між монархом і парламентом. Закономірним підсумком цього сплеску стала громадянська війна."
  flavor_eng.184.title: "Великий компроміс"
  flavor_eng.184.desc_compromise_reached: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] та представники парламенту провели тривалі переговори, досягнувши в підсумку компромісу. За результатами переговорів [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] частково відмовляється від свого впливу, отримуючи натомість ширшу підтримку в питаннях законодавства. Усі радники, що представляють церкву, підуть у відставку. Їм буде заборонено обіймати урядові посади. При цьому [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] залишить за собою право переводити інших радників до [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]."
  flavor_eng.184.desc: "Незважаючи на тривалі переговори, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] і парламент так і не змогли досягти компромісу."
  flavor_eng.184.a: "Змиримося з цим результатом."
  flavor_eng.184.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважатимуть, що [target_root_country.GetGovernment.GetRulerTitle|l] — слабкий правитель, оскільки схилити депутатів на свій бік не вдалося"
  flavor_eng.184.b: "Відмовимося підписувати."
  STATIC_MODIFIER_NAME_grand_remonstrance_compromise: "Компроміс щодо Великої ремонстрації"
  flavor_eng.185.title: "Гемптон-Кортська конференція"
  flavor_eng.185.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] та представники англіканської церкви, зокрема найбільші [ROOT.GetCountry.GetAdjective|l]і пуритани, збираються провести зустріч у палаці Гемптон-корт та обговорити церковні справи. [ROOT.GetCountry.Custom('CL_DAT')|L] потрібна духовна єдність, оскільки церква зараз розколота на протиборчі угруповання. Крім того, сторони збираються обговорити долю Книги спільних молитов.\n\nНа жаль, архієпископ, що представляв церкву, несподівано помер, а його наступник куди менш терпимо ставиться до пуритан та їхніх звичаїв."
  flavor_eng.185.a: "Натиснемо на пуритан, щоб ті підкорилися."
  flavor_eng.185.tt1: "Ця дія змусить пуритан відвернутися і задуматися над подальшими діями"
  flavor_eng.185.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть задоволені заходами щодо придушення роздробленості"
  flavor_eng.185.b: "Нічого не будемо робити."
  flavor_eng.185.b.custom1: "Усі [Concept('pops', 'групи населення')|e], що сповідують #TOOLTIP:RELIGION,$catholic_tt$,X #L католицизм#!#! та #TOOLTIP:RELIGION,$anglican_tt$,X #L англіканство#!#!, отримують [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_eng.185.b.custom2: "Усі #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністські#!#! [Concept('pops', 'групи населення')|e] отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_eng.185.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені терпимістю до роздробленості"
  flavor_eng.185.historical_info: "Гемптон-Кортська конференція, що відбулася в січні 1604 року в палаці Гемптон-корт, — одна з найважливіших подій в добу правління Якова I та в історії Англії взагалі. Була скликана з ініціативи короля, який побажав обговорити релігійні розбіжності в англіканській церкві. За підсумками конференції було затверджено новий переклад Біблії, що отримав назву «Біблія короля Якова». Англіканська церква зміцнила свій вплив, змусивши пуритан підкоритися «39 статтям» — прийнятому зведенню церковних догматів та порядків. Пуритани, що бажали змін, залишилися незадоволені конференцією."
  flavor_eng.186.title: "Велике переселення"
  flavor_eng.186.desc: "Ми не змогли знайти спільну мову з пуританськими священниками, тому ті, розчарувавшись у небажанні церкви прагнути змін, а заодно — у релігійній та політичній обстановці #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, почали покидати країну. Для цього вони зафрахтували одинадцять кораблів, які вже почали приймати на борт пасажирів."
  flavor_eng.186.a: "Це було неминуче."
  flavor_eng.186.a.custom: "З [target_root_country.Custom('CL_GEN')] виїжджає значна кількість пуритан"
  flavor_eng.186.tt1: "Частина з них почне нове життя в колоніях #TOOLTIP:REGION,east_coast_region,X #L Східного узбережжя#!#!"
  flavor_eng.186.tt2: "Багато хто знайде розраду в #TOOLTIP:REGION,caribbean_region,X #L карибських#!#! колоніях"
  flavor_eng.186.tt3: "Хтось приєднається до своїх #TOOLTIP:AREA,holland_area,X #L голландських#!#! родичів"
  flavor_eng.186.tt4: "Інші осядуть поблизу, в #TOOLTIP:REGION,ireland_region,X #L Ірландії#!#!"
  flavor_eng.186.b: "Вживемо рішучих заходів."
  flavor_eng.186.historical_info: "Велике переселення — вихід з Англії десятків тисяч кальвіністів (вони ж пуритани), що відбувся в 1620–1640 роках. Зрозумівши, що їхні спроби реформувати англіканську церкву безплідні, і втративши останню надію на зміни, кальвіністи вирішили покинути рідну країну. Значна частина пуритан осіла в колоніях Північної Америки, проте багато хто виїхав до інших країн Європи — Ірландії та Нідерландів, а деякі навіть оселилися в нещодавно заснованих колоніях на Карибському морі. Колоністи, що прибули з Англії, заклали основи молодого американського суспільства, сформувавши своїми переконаннями та звичаями його унікальний вигляд."
  flavor_eng.187.title: "[robert_blake.GetNameWithNoTooltip]"
  flavor_eng.187.desc: "[robert_blake.GetName] завдяки своєму досвіду перебування в морі та військового управління нещодавно [Select_CString(robert_blake.IsFemale,'склала', 'склав')] перший у нашій країні звід приписів для військово-морського флоту і тепер береться за важке, але важливе завдання перегляду всієї флотської тактики. [Select_CString(robert_blake.IsFemale,'Її', 'Його')] підхід до боїв на морі досить незвичайний, проте в цьому і криється головна перевага: Блейк влаштує справжню революцію у військовій справі."
  flavor_eng.187.a: "Непогано було б поквапитися."
  flavor_eng.187.tt1: "З'явиться [Concept('character', 'персонаж')|e] [robert_blake.GetNameWithNoTooltip]"
  enable_sailing_and_fighting_instructions_advance: "Відкриває [Concept('advance', 'поліпшення')|e] «#L #TOOLTIP:ADVANCE_DEFINITION,sailing_and_fighting_instructions,X #L Настанови про маневри та бойові дії#!#!»"
  flavor_eng.187.b: "Нехай послужить флоту інакше."
  flavor_eng.187.tt2: "З'явиться [Concept('admiral', 'адмірал')|e] [robert_blake.GetNameWithNoTooltip]"
  flavor_eng.187.c: "Нас влаштовує і поточна тактика."
  flavor_eng.187.tt3: "[robert_blake.GetNameWithNoTooltip] вирушить в інші місця"
  flavor_eng.187.historical_info: "Роберт Блейк — англійський командир, діяч часів громадянської війни та періоду міжцарства. Він був адміралом і значно зміцнив обороноздатність своєї країни тим, що розширив флот і розробив кілька нових підходів до ведення бойових дій на морі. Також заклав основу для тактики, що набула поширення в вітрильну добу. Саме завдяки Блейку стало можливим постійно вводити в стрій та утримувати нові кораблі."
  flavor_eng.188.title: "Загадкова страта Енн Грін"
  flavor_eng.188.desc: "Служницю з #TOOLTIP:LOCATION,oxford,X #L Оксфорда#!#! звинуватили у вбивстві власної дитини. Сама обвинувачена стверджує, що не підозрювала про свою вагітність, доки не стався викидень, хоча свідки застали її за спробами приховати останки плоду. Енн Грін визнали винною та повісили в Оксфордському замку всупереч заявам, що її вагітність за місяць до викидня протікала з ускладненнями.\n\nТрупи нездорових ув'язнених заведено розтинати, проте зараз з цього питання немає згоди. Слід взяти до уваги, що місцеве #TOOLTIP:POPTYPE,clergy,X #L духовенство#!#! виступає проти розтину."
  flavor_eng.188.a: "Чудовий екземпляр для вивчення анатомії."
  flavor_eng.188.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені розтином, оскільки вважатимуть це святотатством"
  flavor_eng.188.b: "Поховаємо її в безіменній могилі."
  flavor_eng.188.historical_info: "Енн Грін — англійська служниця, яка в XVII столітті пережила смертну кару. Після винесення смертного вироку та повішення її поклали в труну і приготували до розтину, проте виявилося, що якимось неймовірним чином Енн була ще жива — вона просто втратила свідомість. Незабаром лікарі, випробувавши на ній кілька способів приведення до тями, включно з кровопусканням, пробудили повішену. Цей випадок викликав у країні бурхливі дискусії про недосконалість судової системи та ризики судових помилок; саму ж служницю згодом помилували."
  flavor_eng.189.title: "Несподіване відновлення"
  flavor_eng.189.desc: "При найближчому розгляді виявилося, що повішена Енн Грін ледь-ледь, але все ж дихає, а серце її ледь чутно б'ється. Лікарі спробували привести дівчину до тями: спочатку залили в горло гарячі ліки, а потім поставили на груди припарки. Через деякий час служниця прийшла до себе; ймовірно, незабаром вона одужає остаточно.\n\nНарод вважає, що тут не обійшлося без божественного втручання — сам Господь вирішив довести невинність засудженої. Нас закликають проявити милосердя."
  flavor_eng.189.a: "Скасуємо смертний вирок."
  flavor_eng.189.b: "Знову на шибеницю її."
  flavor_eng.190.title: "Кав'ярня «Ангел»"
  flavor_eng.190.desc: "Вірменський купець, відомий під прізвиськом «єврей Яків», звернувся до влади #TOOLTIP:LOCATION,oxford,X #L Оксфорда#!#! з проханням: він домагається дозволу відкрити в місті абсолютно новий заклад, де відвідувачі зможуть обмінюватися один з одним різними ідеями, новинами та фактами, а також вести інтелектуальні дискусії. Також їм подаватиметься новий напій — «кава»; кажуть, він дуже міцний."
  flavor_eng.190.a: "Дозволяємо."
  flavor_eng.190.tt: "Схожі заклади, що сприяють обміну ідеями, почнуть з'являтися і в інших містах"
  flavor_eng.190.b: "Він шпигун і хоче нас отруїти!"
  the_angel: "Кав'ярня «Ангел»"
  flavor_eng.190.historical_info: "Англійська кав'ярня «Ангел» — перший у країні заклад такого роду. Чимало посприяла поширенню кави серед англійців. У європейських кав'ярнях, у той час ще нових і незвичних, але вже набираючих популярність, нерідко збиралися вчені, викладачі, студенти та інтелектуали з найближчих університетів, завдяки чому обмін знаннями відбувався набагато швидше."
  flavor_eng.191.title: "Панч і Джуді"
  flavor_eng.191.desc: "#TOOLTIP:LOCATION,london,X #L Лондонці#!#! познайомилися з новою розвагою — це комедійний ляльковий театр у жанрі буфонади. Публіка знатно веселиться, особливо від витівок містера Панча. Веде виставу всього одна людина — ляльковод, що ховається в будці, який не тільки озвучує героїв, але й відповідає за музичний супровід."
  flavor_eng.191.a: "Гарні вистави нам подобаються."
  flavor_eng.191.b: "Виділимо кошти на гастролі театру по континенту."
  flavor_eng.191.tt: "[samuel_pepys.GetName] спостерігатиме за виставою"
  flavor_eng.191.historical_info: "«Панч і Джуді» — питомий англійський ляльковий театр, який здобув популярність у XVII столітті. Став настільки успішним, що вистави проводилися навіть у Дубліні та Парижі. Персонажі театру, Панч і Джуді, зазвичай представлені як сварлива сімейна пара; сама ж вистава, що складається з послідовних коротких сценок, зображує життя подружжя в кумедному і нерідко жорстокому світлі."
  flavor_eng.192.title: "Старанний [samuel_pepys.GetNameWithNoTooltip]"
  flavor_eng.192.desc: "Чиновник морського відомства [samuel_pepys.GetName] — багатообіцяючий працівник, незважаючи на відсутність досвіду життя на морі: він впливовий, старанний і талановитий. Така людина допоможе нам провести реформу Ради адміралтейства і зробити королівських моряків найдостойнішими представниками своєї професії."
  flavor_eng.192.desc_navy_board: "$flavor_eng.192.desc$ \n\nЗараз Піпс обіймає посаду секретаря з указів Флотської колегії і вже проявив себе більш здібною та дієвою людиною, ніж його вищі колеги."
  flavor_eng.192.a: "Нехай [samuel_pepys.GetName] буде секретарем ради."
  flavor_eng.192.tt1: "З'явиться [Concept('character', 'персонаж')|e] [samuel_pepys.GetNameWithNoTooltip]"
  enable_overhauled_admiralty_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,overhauled_admiralty_reform,X #L «Реформоване адміралтейство»#!#!"
  flavor_eng.192.b: "Плоди його праці повинні належати нам."
  flavor_eng.192.tt2: "[samuel_pepys.GetNameWithNoTooltip] залишиться на тій же посаді"
  flavor_eng.192.tt3: "У складі колегії Піпс спростить організацію дій флоту"
  flavor_eng.192.tt4: "На своїй поточній посаді Піпс допоможе спростити керівництво морськими та державними справами"
  STATIC_MODIFIER_NAME_samuel_pepys_diligence: "Старанність Семюела Піпса"
  flavor_eng.192.c: "Йому потрібно в море."
  flavor_eng.192.historical_info: "Завдяки реформам Семюела Піпса королівський військово-морський флот став відповідати вимогам свого непростого та небезпечного часу. Піпс вніс зміни до системи постачання флоту (зокрема провізією), а також запровадив регулярні виплати платні матросам та офіцерам. Втім, запам'ятався він переважно як автор щоденника, в якому протягом десяти років найретельнішим чином описував кожен день свого життя — зокрема, задокументував Велику пожежу та Велику епідемію чуми."
  flavor_eng.193.title: "«Математичні начала натуральної філософії»"
  flavor_eng.193.desc: "[isaac_newton.GetName] нещодавно видав книгу під назвою #italic «Математичні начала натуральної філософії»#!. Цією працею він, поза всяким сумнівом, скаже нове слово в галузі фізики, математики та астрономії. У «Началах…» Ньютон описує закони руху та всесвітнього тяжіння, що пояснюють, що всі предмети, які мають масу, притягуються один до одного.\n\nМи впевнені, що спостереження Ньютона стануть вкрай важливою віхою в історії науки."
  flavor_eng.193.a: "Це справжній шедевр."
  flavor_eng.193.b: "Скличемо найвидатніших умів нашої країни — нехай обговорять цю працю."
  flavor_eng.193.c: "Це всього лише книга."
  flavor_eng.193.tt: "Завдяки появі в Англії кав'ярень викладені в #italic «Началах»#! поняття стануть більш відомі широкій публіці"
  flavor_eng.193.historical_info: "«Математичні начала натуральної філософії» (Philosophiæ Naturalis Principia Mathematica) — найвеличніша праця Ісаака Ньютона латинською мовою. Цей фундаментальний твір вважається однією з найвпливовіших робіт в історії науки."
  flavor_eng.195.title: "Криза через білль про відвід"
  flavor_eng.195.desc: "[catholic_relative.GetName], у спорідненості з [Select_CString(catholic_relative.IsFemale,'якою', 'яким')] перебуває [ROOT.GetCountry.GetGovernment.GetRuler.GetName], [Select_CString(catholic_relative.IsFemale,'відмовилася', 'відмовився')] дотримуватися закону та складати присягу, що зобов'язує всіх, кого приймають на державну службу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, дотримуватися #L [ROOT.GetCountry.GetReligion.GetAdjective|l]их#! звичаїв, зокрема здійснювати причастя у відповідній церкві. З цього випливає, що, якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вирішить обрати собі наступника, який не дотримується прийнятих поглядів, де-факто правителем може стати #TOOLTIP:RELIGION,$catholic_tt$,X #L католик#!#!.\n\nУ відповідь парламент запропонував переглянути закон, щоб виключити подібні випадки та гарантувати благополучну передачу престолу."
  flavor_eng.195.a: "Виступимо проти цього абсурду."
  flavor_eng.195.b: "Схилимо депутатів парламенту на наш бік."
  flavor_eng.195.tt: "Нам вдасться переконати достатньо депутатів не приймати білль про відвід"
  flavor_eng.195.c: "Логічний вчинок."
  STATIC_MODIFIER_NAME_opposed_parliament: "Опозиційний парламент"
  flavor_eng.195.historical_info: "В добу правління англійського короля Карла II в країні розгорілася політична криза, викликана біллем про відвід — законом, який кілька разів намагався прийняти парламент. Депутати намагалися не допустити визнання Джеймса, герцога Йоркського та брата короля, правителем Англії, Шотландії та Ірландії, оскільки він був католиком. Всі ці спроби виявилися безуспішними, однак у 1701 році за підсумками повалення майбутнього короля в ході Славної революції був прийнятий Акт про престолонаслідування (він же Акт про устрій)."
  flavor_eng.196.title: "Комедія Реставрації"
  flavor_eng.196.desc: "Зусиллями наших драматургів у країні набирає популярності новий жанр комедії — комедія Реставрації, в якій вільно використовується відверта та непристойна лексика, а теми азартних ігор, розпиття алкоголю та кохання подаються без критики, аби лише вразити глядача. Публіка у таких комедій досить різноманітна: їх дивляться і знать, і їхні слуги. Всі вони отримують задоволення від правок тексту п'єси, зроблених в останній момент, насичених подіями сюжетів, а також гри знаменитих акторів і навіть перших професійних актрис."
  flavor_eng.196.a: "Схвалюємо та заохочуємо."
  flavor_eng.196.tt1: "З'являться актриси та жінки-драматурги"
  flavor_eng.196.tt2: "[samuel_pepys.GetName] спостерігатиме за виставою"
  flavor_eng.196.b: "Обсценній лексиці тут не місце."
  flavor_eng.196.historical_info: "Комедія Реставрації — різновид англійської комедії, що з'явилася в період Реставрації Стюартів. Характерна дотепними, кумедними та сатиричними сюжетами. Втомлена пуританським режимом Олівера Кромвеля англійська публіка — тоді всі театри в країні були закриті — до часу виникнення комедії Реставрації вже була налаштована зовсім інакше і по-іншому сприймала моральні складнощі."
  flavor_eng.197.title: "[aphra_behn.GetNameWithNoTooltip]"
  flavor_eng.197.desc: "Безробітна драматургиня [aphra_behn.GetName], яка бажає здобути знаменитість у світі комедій Реставрації, звернулася до «Королівської компанії» — групи театральних акторів, що займалися постановками. Афрі складно домогтися популярності та розплатитися з численними боргами, але з неї, швидше за все, вийде хороша комедіантка."
  flavor_eng.197.a: "З неї братимуть приклад нові покоління письменників."
  flavor_eng.197.tt1: "З'явиться [Concept('character', 'персонаж')|e] [aphra_behn.GetNameWithNoTooltip]"
  flavor_eng.197.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] висловлять невдоволення протидією [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  flavor_eng.197.b: "Моральний зміст її п'єс сумнівний."
  flavor_eng.197.tt3: "Афра буде змушена публічно відстоювати своє ім'я, чим доб'ється певного визнання"
  flavor_eng.197.c: "Часи нині жорстокі."
  flavor_eng.197.historical_info: "Афра Бен — англійська письменниця, поетеса та драматург. Вважається однією з перших професійних письменниць в історії англійської літератури. Прославилася своїми п'єсами в жанрі комедії Реставрації. Неодноразово піддавалася критиці, на яку відповідала тим, що її критикують лише за належність до жіночої статі, тоді як драматурги-чоловіки могли спокійно вести розпусний спосіб життя та писати скільки завгодно обурливі п'єси."
  flavor_eng.198.title: "Королівське товариство"
  flavor_eng.198.desc: "Чимало великих винаходів видатні уми нашої країни створили спільно. Нині розумно буде заснувати незалежний орган під управлінням власної ради з центром у місті [ROOT.GetCountry.GetCapital.GetName]. Його члени не лише займатимуться розвитком науки, а й відкриватимуть суспільству очі на користь подібних вишукувань, а заодно підходитимуть до питань політики та освіти з наукової точки зору, сприяючи різноманітним дослідженням."
  flavor_eng.198.a: "Чудова ідея."
  flavor_eng.198.tt1: "[target_root_country.GetGovernment.GetRuler.GetName] стане покровителем нового товариства"
  flavor_eng.198.b: "Краще вкладемо кошти в університети."
  flavor_eng.198.c: "Це дорого й складно."
  flavor_eng.198.historical_info: "Королівське товариство було створено 1660 року, в добу правління англійського короля Карла II. Організаторами стали провідні вчені того часу, які прагнули розширювати межі наукового пізнання та всіма силами розвивати науку. Королівське товариство надало вченим у галузі як точних, так і гуманітарних наук, а також різним інтелектуалам можливість зустрічатися та обмінюватися результатами своїх досліджень, щоб від гіпотез переходити до практики."
  flavor_eng.199.title: "«Філософські праці Королівського товариства»"
  flavor_eng.199.desc: "#TOOLTIP:BUILDING_TYPE,royal_society,X #L Королівське товариство#!#!#! збирається випускати перший у світі часопис, присвячений виключно науці. У ньому публікуватимуться дослідницькі статті, різні відкриття та доповіді. За задумом членів товариства, це видання допоможе широкій публіці розвинути ерудицію в таких галузях, як фізика, хімія та астрономія, і тим самим підкреслити вічне прагнення людського духу до пізнання."
  flavor_eng.199.desc_no_printer: "$flavor_eng.199.desc$\n\nОднак їм не дуже подобається #TOOLTIP:LOCATION,london,X #L Лондон#!#!: там немає #TOOLTIP:BUILDING_TYPE,printing_press_shop,X #L друкарні#!#!, тому випуск чвсопису буде ускладнений, доки її не побудують."
  flavor_eng.199.a: "Дозволяємо друк."
  flavor_eng.199.b: "Візьмемо на себе витрати."
  flavor_eng.199.tt1: "На урядові кошти поспіхом буде збудована #TOOLTIP:BUILDING_TYPE,printing_press_shop,X #L друкарня#!#!#!"
  STATIC_MODIFIER_NAME_philosophical_transactions: "«Філософські праці Королівського товариства»"
  flavor_eng.199.c: "Вистачить і обмеженого накладу."
  flavor_eng.199.tt2: "За допомогою королівського друкаря вийде один випуск"
  flavor_eng.199.historical_info: "«Філософські праці Королівського товариства» — науковий часопис, що безперервно видається з 1665 року. Присвячений одразу кільком галузям науки. «Праці…» і сьогодні сприяють поширенню наукового знання та описують публіці різні важливі відкриття, багато з яких надихають інших вчених."
  flavor_eng.200.title: "Материнське нещастя"
  flavor_eng.200.desc: "У 1330 році був жорстоко вбитий [GetCharacter('eng_edward_ii').GetName]. Посприяли цьому [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName] та дружина короля — зрадниця [isabella.GetName], королева-мати. Обидва змовники згодом потрапили до нас у руки. [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetLastNameWithNoTooltip] страчений, а королева поміщена під домашній арешт.\n\nНарод #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! запам'ятає її як зрадницю. [GetCountry('FRA').GetLongName] однак зовсім іншої думки: заарештована — старша представниця знатної династії [isabella.GetDynasty.GetName], що користується неймовірною повагою серед [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої знаті.\n\nЗ урахуванням напруженого протистояння між нашими країнами можна спробувати скористатися її знатним становищем і змусити королеву домовитися з [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ими послами від імені сина."
  flavor_eng.200.a: "Час усе лікує."
  flavor_eng.200.b: "Нехай чахне в заперті."
  eng_capetian_mother: "Королева-мати з роду Капетингів"
  flavor_eng.201.title: "Королівський дотик"
  flavor_eng.201.desc: "Кожен правитель нашої країни має чудодійну цілющу силу, яка проявляється в так званому королівському дотику. Здійснюється він зазвичай на великих церемоніях, де присутні сотні людей. Заклав цю традицію ще [GetCharacter('eng_edward_the_confessor').GetName], і з тих пір жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не відчувають нестачі в чудотворцях на троні. Крім нашої країни подібні цілителі живуть тільки на території #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!.\n\nТоркнувшись хворого на золотуху — хворобу, що викликає гнійні нарости на шиї, — [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] виганяє недугу.\n\nОскільки Господь нагороджує божественною силою лише тих, хто посідає престол за правом спадщини, виконання королівського дотику — незаперечний доказ, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] дійсно [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
  flavor_eng.201.a: "Будемо дотримуватися цього ритуалу."
  flavor_eng.201.b: "Влада походить не з містицизму."
  flavor_eng.202.title: "[young_roger.GetNameWithNoTooltip]"
  flavor_eng.202.desc: "У 1327 році один із найвпливовіших дворян своєї доби [GetCharacter('eng_roger_mortimer_1st_earl_of_march').GetName] підняв повстання, в результаті якого був убитий [GetCharacter('eng_edward_ii').GetShortName]. Змовник не зумів сховатися від правосуддя, і незабаром його повісили.\n\nУ зрадника залишився онук — [young_roger.GetName], молодий лицар без страху і докору. З нього вийде відмінний полководець, хоча, якщо покарати в науку іншим і його, можливо, у народу зникнуть навіть думки про зраду."
  flavor_eng.202.a: "Ворогів краще тримати близько."
  flavor_eng.202.b: "Це занадто небезпечно."
  flavor_eng.203.title: "Падіння мосту в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_eng.203.desc: "Побудований ще в 1209 році міст — єдина переправа через Темзу, а заодно — найжвавіша вулиця в усьому [target_location.GetName]-Сіті, що цілком належить торговцям. Сюди нерідко заходять #L [ROOT.GetCountry.GetAdjective|l]і#! багачі, які бажають купити який-небудь галантерейний товар, приміряти нові рукавички або одягнутися за останньою модою.\n\nЯкийсь час тому доглядачі мосту помітили, що в кам'яній кладці з'явилися тріщини, а через кілька днів кілька арок з південної сторони обвалилися, завдавши мосту непоправної шкоди.\n\nНа щастя, ніхто не постраждав, проте споруду необхідно терміново відновлювати, інакше вона зруйнується остаточно. Які матеріали краще для цього взяти?"
  flavor_eng.203.a: "Дерево і глину."
  flavor_eng.203.b: "Залізо і камінь."
  flavor_eng.203.c: "Срібло і золото."
  flavor_eng.203.d: "Поставимо доглядача на випадок обвалення мосту."
  eng_london_bridge_wood_clay: "Лондонський міст: дерево і глина"
  eng_london_bridge_iron_stone: "Лондонський міст: залізо і камінь"
  eng_london_bridge_silver_gold: "Лондонський міст: срібло і золото"
  flavor_eng.204.title: "Золоте мощення"
  flavor_eng.204.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] у селах розпускають чутки, ніби [target_location.GetName] — настільки багатий [target_location.GetRank.GetNameWithNoTooltip|l], що вулиці там вимощені золотом.\n\nБагатьом зрозуміло, що це просто красива фігура мови, проте людей надихає думка, що навіть простий селянин здатен піднятися з грязі в князі, просто покинувши рідне село."
  flavor_eng.204.a: "Не будемо заважати чуткам поширюватися."
  flavor_eng.204.b: "Вулиці тут — це вугілля і грязь."
  flavor_eng.204.c: "Може, і справді вимостити їх золотом?"
  STATIC_MODIFIER_NAME_eng_paved_with_gold_rumor: "Чутки про золоте мощення"
  STATIC_MODIFIER_NAME_eng_paved_with_gold_actually: "Вулиці вимощені золотом"
  eng_paved_with_gold: "Вартість золотого мощення"
  flavor_eng.205.title: "[robert_boyle.GetNameWithNoTooltip]"
  flavor_eng.205.desc: "Філософ, хімік та фізик ірландського походження [robert_boyle.GetName] захоплено проводить наукові досліди у власній резиденції на території #TOOLTIP:LOCATION,oxford,X #L Оксфорда#!#!. Бойль висунув сміливу теорію про обернену пропорційність тиску та об'єму газу при постійній температурі. Оскільки він #TOOLTIP:RELIGION,$anglican_tt$,X #L англіканин#!#!, то щиро вважає, що наукові дослідження та пізнання навколишнього світу здатні наблизити людину до усвідомлення божественного задуму. У перервах між дослідами Бойль багато розмірковує на цю тему."
  flavor_eng.205.a: "Така діяльність заслуговує на повагу."
  flavor_eng.205.tt1: "З'явиться [Concept('character', 'персонаж')|e] [robert_boyle.GetNameWithNoTooltip]"
  flavor_eng.205.tt2: "Бойль часто зустрічатиметься з іншими інтелектуалами та зможе посприяти створенню повноцінного наукового товариства"
  flavor_eng.205.b: "Запропонуємо Бойлю поділитися своїми відкриттями."
  flavor_eng.205.c: "Він не тільки божевільний, але й єретик."
  flavor_eng.205.historical_info: "Роберт Бойль — один із найвпливовіших вчених XVII століття, важливий діяч доби наукової революції. Вважається одним із основоположників сучасної хімії. Найвідоміший його внесок у розвиток хімії, закон Бойля — Маріотта, допоміг вивести рівняння стану ідеального газу."
  flavor_eng.206.title: "Дотепна красуня Нелл"
  flavor_eng.206.desc: "На сценах місцевих театрів з'явилася нова акторка — чарівна, приваблива, здатна миттєво зачаровувати публіку. Попри своє скромне походження, вона стала настільки відома, що її ім'я тепер знає навіть [target_root_country.GetGovernment.GetRulerTitle|l]. Сьогодні монарх всерйоз розмірковує, чи не запропонувати їй роль королівської розважальниці."
  flavor_eng.206.a: "Вона буде славною дружиною."
  flavor_eng.206.tt1: "З'явиться [Concept('character', 'персонаж')|e] [eleanor_gwyn.GetNameWithNoTooltip]"
  flavor_eng.206.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] дасть життя її дитині"
  flavor_eng.206.tt3: "[target_root_country.GetGovernment.GetRulerTitle] під впливом акторки почне діяти в інтересах акторів та драматургів"
  flavor_eng.206.tt4: "[target_root_country.GetGovernment.GetRulerTitle] візьме в дружини простолюдинку, а тому народ почне терпиміше ставитися до поведінки інших людей із нижчого суспільства"
  STATIC_MODIFIER_NAME_influential_figurine: "Впливова фігура"
  flavor_eng.206.b: "Вона народжена розважати народ."
  flavor_eng.206.b.custom: "Уся #TOOLTIP:POPTYPE,nobles,X #L знать#!#!, #TOOLTIP:POPTYPE,burghers,X #L міщани#!#! та #TOOLTIP:POPTYPE,peasants,X #L простолюд#!#! у #TOOLTIP:LOCATION,london,X #L Лондоні#!#! отримують [ShowNamedValue('pop_satisfaction_ultimate_bonus')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e]"
  flavor_eng.206.c: "Її акторська гра не вражає."
  STATIC_MODIFIER_NAME_absense_of_influential_figurine: "Відсутність впливової фігури"
  flavor_eng.206.tt5: "Митців будуть утискати в правах, оскільки нікому відстоювати їхні інтереси"
  flavor_eng.206.historical_info: "Елінор Гвін — знаменита акторка кінця XVII століття. Народилася в бідній родині й ще з дитинства почала займатися акторською грою. За своє почуття гумору та кмітливість стала відома під прізвиськом Дотепна красуня Нелл. Відомий її роман із королем Карлом II, що тривав 17 років. За цей час Гвін народила своєму коханцю двох бастардів."
  flavor_eng.207.title: "Підводний монарх"
  flavor_eng.207.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] запрошує на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! відомого механіка та винахідника на ім'я [cornelius_debbel.GetName]. Незабаром Дреббель представить публіці свій новий хитромудрий пристрій.\n\nНа водах Темзи спостерігачі зможуть побачити незвичайне судно, здатне занурюватися під воду на глибину двох або трьох морських сажнів. Дреббель стверджує, що в такому положенні воно зможе пройти намічений для випробувань маршрут. Початковою точкою він зазначив Вестмінстер, кінцевою — Гринвіч. Почесним гостем на борту та безпосереднім свідком цього дива механіки стане особисто [ROOT.GetCountry.GetGovernment.GetRuler.GetName] — запрошення вже відправлено."
  flavor_eng.207.a: "Приймемо запрошення."
  flavor_eng.207.tt1: "З'явиться [Concept('character', 'персонаж')|e] [cornelius_debbel.GetNameWithNoTooltip]"
  flavor_eng.207.a.custom: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] та [cornelius_debbel.GetNameWithNoTooltip] проводять небезпечні випробування на підводному човні"
  flavor_eng.207.tt2: "Глядачі будуть вражені хоробрістю, яку виявляє [target_root_country.GetGovernment.GetRulerTitle|l]"
  flavor_eng.207.b: "Поспостерігаємо за випробуваннями з берега."
  flavor_eng.207.tt3: "Глядачі будуть розчаровані боягузтвом, яке виявляє [target_root_country.GetGovernment.GetRulerTitle|l]"
  flavor_eng.207.historical_info: "Корнеліус Дреббель — голландський винахідник, який працював на британський королівський флот. У 1620 році побудував перший у світі керований підводний човен. У період між 1620 і 1624 роками він також успішно побудував і випробував ще дві субмарини. Третій — і останній — човен Дреббель продемонстрував особисто королю Якову I та кільком тисячам лондонців. Під водою його винахід, потім ще неодноразово випробуваний, провів цілих три години. Однак, незважаючи на успіхи Корнеліуса, адміралтейство не зацікавилося його розробками."
  flavor_eng.208.title: "Перше плавання"
  flavor_eng.208.desc_successfully_submerged: "Підводний корабель спливає біля берегів Гринвіча — на неабияку радість глядачів. [cornelius_debbel.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName] сходять на берег під гуркіт захоплених оплесків та схвальні вигуки. Випробування пройшли більш ніж успішно."
  flavor_eng.208.desc: "Підводний корабель, на велике розчарування глядачів, так і не сплив біля берегів Гринвіча. Схоже, що [cornelius_debbel.GetName] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName] стали бранцями моря. Усвідомивши, наскільки важка доля спіткала цих хоробрих, публіка сумує. Сьогодні воістину сумний день."
  flavor_eng.208.a: "Ура!"
  flavor_eng.208.b: "Неможливо підібрати слова."
  flavor_eng.208.tt1: "[target_root_country.GetGovernment.GetRulerTitle] покине небезпечний винахід і вибирається на поверхню"
  flavor_eng.210.title: "Морозна ярмарка"
  flavor_eng.210.desc: "Незвичайно сильний мороз скував Темзу міцним льодом. Містяни пропонують влаштувати на березі повноцінну ярмарку: поставити на льоду намети та влаштувати розваги. Місце тут знайдеться всім: торговцям їжею, продавцям випивки, любителям ігор… Помістяться навіть невеликі крамниці. У розважальній програмі будуть катання на ковзанах та санях, а також змагання між вершниками та візниками.\n\nДеякі навіть пропонують тимчасово навести міст, щоб люди могли переходити з одного берега на інший, не ступаючи на лід."
  flavor_eng.210.a: "Цікавий підхід."
  frost_fair: "Морозна ярмарка"
  flavor_eng.210.b: "Небезпечна затія."
  flavor_eng.210.historical_info: "Морозна ярмарка 1683 року тривала два місяці та була ретельно описана сучасниками. Збереглися гравюри, листівки та письмові джерела, що задокументували цю незвичайну і тому вельми пам'ятну для лондонців подію. Провести ярмарку такого ж масштабу повторно виявилося неможливо, оскільки течія річки змінилася (не в останню чергу через будівництво набережних)."
  flavor_eng.211.title: "Машина Севері"
  flavor_eng.211.desc: "Винахідник [thomas_savery.GetName] запатентував пристрій, що працює на енергії пари, і тепер збирається продавати його всім охочим. Машина Севері — це абсолютно нове слово техніки і являє собою насос, за допомогою якого ми зможемо швидше осушувати шахти та забезпечити населенню постійний доступ до води."
  flavor_eng.211.a: "Водопостачання в першу чергу."
  flavor_eng.211.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_savery.GetNameWithNoTooltip]"
  flavor_eng.211.b: "Шахти — наше головне джерело доходу."
  flavor_eng.211.c: "Розробимо на основі цієї машини складніші пристрої."
  flavor_eng.211.tt2: "[thomas_savery.GetNameWithNoTooltip] увійде до #TOOLTIP:BUILDING_TYPE,royal_society,X #L Королівського товариства#!#!#!"
  flavor_eng.212.title: "Унія корон"
  flavor_eng.212.desc: "Після того як [Select_CString(dying_monarch.IsFemale,'померла', 'помер')] [dying_monarch.GetName], влада над престолом #ONCLICK:COUNTRY,[inherited_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[inherited_country.Custom('CL_tt')],X [inherited_country.Custom('CL_GEN')|L]#!#! [Select_CString(inheriting_monarch.IsFemale,'повинна', 'повинен')] успадкувати [inheriting_monarch.GetName] — так гласить договір. Поки що [inheriting_country.GetName] та [inherited_country.GetName] збережуть свої парламенти та законодавство. У майбутньому, якщо дозволять обставини, можна буде замислитися про утворення повноцінної унії."
  flavor_eng.212.a: "Нарешті ми єдині."
  flavor_eng.212.historical_info: "Унія корон — проголошення в 1603 році шотландського короля Якова VI англійським королем Яковом I. До укладення унії Англія та Шотландія існували як самостійні незалежні країни, керовані власними монархами. В Англії правили Тюдори, в Шотландії — Стюарти. Смерть англійської королеви Єлизавети I, яка не залишила після себе спадкоємця, підштовхнула обидві країни до об'єднання."
  flavor_eng.213.title: "Поширення акціонерних товариств"
  flavor_eng.213.desc: "Постійне розширення нашої колоніальної імперії супроводжується низкою труднощів. Вони викликані витратами, пропорційними до підприємницького ризику. Щоб забезпечити приплив фінансів до скарбниці, ми можемо заснувати підприємства, що випускають акції, та перекласти частку ризику на приватних вкладників. Втім, це не обов'язково: можна намагатися й далі підтримувати усталену систему, щоб мінімізувати ймовірність виникнення фінансової нестабільності та запобігти надмірно ризикованим рішенням."
  flavor_eng.213.a: "Ризики — це небезпечно."
  flavor_eng.213.b: "Чим небезпечніша дорога, тим більший прибуток."
  flavor_eng.213.historical_info: "Виникнення акціонерних товариств було зумовлене потребою в додатковому фінансуванні, оскільки компенсація ризиків при колонізації нових територій вимагала непомірно великих коштів — поодинокі вкладники просто не могли їх надати. Акціонерні товариства ж стимулювали торгівлю як у межах Англії, так і в її заморських територіях. Після заснування таких товариств економіка країни почала значно зростати та розвиватися, проте на перших порах уряд зіткнувся з певними складнощами."
  flavor_eng.214.title: "Перший справжній роман"
  flavor_eng.214.desc: "Історія нещодавно врятованого моряка, який зазнав корабельної аварії біля західного узбережжя безлюдного острова Мас-а-Тьєрра, лягла в основу свого роду автобіографічного роману. Присвячений він такому собі Робінзону Крузо — людині, викинутій на берег тропічного острова, де йому довелося провести 28 років. Перші відгуки виключно хвалебні; ймовірно, цей роман задасть моду на появу реалістичної прози.\n\nАвтор твору — не хто інший, як [daniel_defoe.GetName], талановитий письменник, купець і політик. Його «Робінзон Крузо», ймовірно, матиме величезний попит не тільки на батьківщині, а й за кордоном."
  flavor_eng.214.a: "Перо — його найвірніший союзник."
  flavor_eng.214.tt1: "З'явиться [Concept('character', 'персонаж')|e] [daniel_defoe.GetNameWithNoTooltip]"
  flavor_eng.214.b: "Нехай краще служить радником."
  flavor_eng.214.tt2: "[daniel_defoe.GetNameWithNoTooltip] випустить кілька творів, присвячених поліпшенню економічних та суспільних умов; зокрема, запропонує запровадити державне страхування"
  flavor_eng.214.historical_info: "«Робінзон Крузо» — роман Даніеля Дефо, присвячений боротьбі за життя на безлюдному острові, спробам пристосуватися до нових умов та перетворенню героя на людину винахідливу та самодостатню. Вважається, що за кількістю перекладів «Робінзон Крузо» поступається лише Біблії."
  flavor_eng.215.title: "Бульбашка Компанії Південних морів"
  flavor_eng.215.desc: "Вартість акцій товариства, що пропонує вкладникам майже стовідсотковий прибуток, різко обвалилася. Виявилося, що прибуток самого товариства абсолютно не відповідає обіцяному, а свої борги воно покриває хибними обіцянками власникам.\n\nЗбанкрутілі вкладники втратили тисячі фунтів. Багато хто, зневірившись, вирішив покінчити з життям. Обурений народ заполонив вулиці та вимагає пояснень."
  flavor_eng.215.a: "Це було неминуче."
  flavor_eng.215.tt1: "Бульбашка спричинить серйозну економічну кризу на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_eng.215.tt2: "Завдяки своїй обачності [robert_walpole.GetNameWithNoTooltip] пом'якшить наслідки для економіки"
  flavor_eng.215.b: "Надамо компанії допомогу та відшкодуємо вкладникам втрати."
  flavor_eng.215.tt3: "Втручання країни стабілізує економіку, але підірве настрої вкладників"
  STATIC_MODIFIER_NAME_south_sea_bubble: "Бульбашка Компанії Південних морів"
  STATIC_MODIFIER_NAME_restructuring: "Перебудова компанії"
  flavor_eng.215.historical_info: "Крах Компанії Південних морів — одна з перших фінансових криз у світі. Компанія Південних морів — це британське акціонерне товариство, яке було засноване з метою консолідації, контролювання та подальшого зниження національного боргу, а заодно налагодження торгівлі з Америкою. Спекуляція акціями спричинила підвищення ціни на них до надмірного рівня, внаслідок чого акції обвалилися, розоривши тисячі вкладників."
  flavor_eng.216.title: "Заворушення в Спіталфілдсі"
  flavor_eng.216.desc: "У місцевості Спіталфілдс почалися запеклі зіткнення між місцевою владою та ткачами, спричинені суперечками щодо заробітної плати та впровадженням механічних верстатів — робітники, які користуються ручними верстатами, можуть залишитися без засобів до існування. У ході сутичок як мінімум одна #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гільдія кравців#!#!#! виявилася зруйнованою. Постраждали й будинки роботодавців. Самі ж ткачі чинять опір арешту."
  flavor_eng.216.a: "Відповімо силою."
  flavor_eng.216.a.custom: "Усі засуджені відправляються в колонію-поселення #TOOLTIP:AREA,eastern_australia_area,X #L Східна Австралія#!#!."
  flavor_eng.216.b: "Ненадовго призупинимо імпорт."
  flavor_eng.216.c: "На час покращимо умови праці."
  flavor_eng.216.tt1: "Частина ткачів буде вбита або затримана в очікуванні суду"
  flavor_eng.216.tt2: "Задля заспокоєння ткачів буде схвалено тимчасовий закон"
  STATIC_MODIFIER_NAME_improved_working_conditions_silk_weavers: "Поліпшені умови праці для ткачів шовку"
  STATIC_MODIFIER_NAME_fine_cloth_imports_banned: "Заборонено імпорт тонкого сукна"
  STATIC_MODIFIER_NAME_liquor_imports_banned: "Заборонено імпорт міцного алкоголю"
  flavor_eng.216.historical_info: "Заворушення в Спіталфілдсі — низка протестів і зіткнень, що відбулися наприкінці XVIII століття в лондонській місцевості Спіталфілдс. Були спричинені економічними та соціальними труднощами, з якими зіткнувся робітничий клас у перші роки індустріалізації країни — зокрема, постраждали усталені ремесла. Підсумком заворушень стало схвалення кількох законів, спрямованих на захист прав робітників та зміни в економіці."
  flavor_eng.217.title: "Джиноманія"
  flavor_eng.217.desc: "У країні стрімко зростає споживання джину. Народ бідніє і спивається, сім'ї розпадаються одна за одною, злочинність на небувалій висоті. Усе це посилюється відкриттям нових крамниць з продажу джину.\n\nУряду слід якнайшвидше втрутитися та вжити суворих заходів, доки суспільство ще можна врятувати."
  flavor_eng.217.a: "Ухвалимо тимчасовий закон."
  flavor_eng.217.b: "Проведемо через парламент закон про джин."
  flavor_eng.217.b.custom: "Деякі [Concept('locations', 'місцевості')|e] #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! отримують [ShowNamedValue('control_severe_bonus')|+=2%] до [Concept('control', 'контролю')|e] завдяки зниженню рівня злочинності."
  flavor_eng.217.tt1: "Будуть встановлені регламенти виробництва джину та введені ліцензійні збори"
  flavor_eng.217.tt2: "Тимчасово буде заборонено імпорт спиртних напоїв"
  flavor_eng.217.c: "Нічого страшного, нехай п'ють."
  flavor_eng.217.c.custom: "Деякі [Concept('locations', 'місцевості')|e] #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! втрачають [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'контролю')|e] через зрослий рівень злочинності."
  flavor_eng.217.tt3: "Обстановка ставатиме гіршою: зросте кількість алкоголіків та хворих, у тому числі душевнохворих"
  reduced_gin_consumption: "Зменшене споживання джину"
  excessive_gin_consumption: "Надмірне споживання джину"
  STATIC_MODIFIER_NAME_regulated_gin_production: "Регламентоване виробництво джину"
  STATIC_MODIFIER_NAME_heavily_restricted_gin_production: "Серйозно обмежене виробництво джину"
  flavor_eng.217.historical_info: "Джиноманія — сплеск надмірного потягу до джину, спричинений зростанням внутрішнього виробництва та зменшенням частки імпортного бренді внаслідок конфліктів між Англією та Францією. Джин вживали абсолютно всі верстви суспільства, що оберталося руйнівними наслідками для сімей алкоголіків. Побороти джиноманію вдалося за допомогою державного регулювання та підвищення цін. Сприяло й змінене ставлення народу до цього напою."
  flavor_eng.218.title: "«Обідній клуб»"
  flavor_eng.218.desc: "Майстер «великого стилю» [joshua_reynolds.GetName] та [Select_CString(joshua_reynolds.IsFemale, 'її', 'його' )] [Select_CString(random_artist.IsFemale,'наставниця', 'наставник')] [random_artist.GetName] заснували обідній клуб, розрахований на однодумців, що займають у суспільстві чільне становище. Ними рухає прагнення об’єднати найвидатніших літературних та інтелектуальних діячів, з якими можна буде обговорювати словесність, політику, мистецтво та багато інших тем. Головна вимога до учасників — наявність неодмінно гострого розуму.\n\nЗустрічі передбачається проводити щотижня в різних тавернах та кав’ярнях #TOOLTIP:LOCATION,london,X #L Лондона#!#!."
  flavor_eng.218.a: "Чудова нагода."
  flavor_eng.218.tt1: "З’явиться персонаж [joshua_reynolds.GetNameWithNoTooltip]"
  flavor_eng.218.tt2: "Будуть запрошені [Concept('artists', 'митці')|e]-письменники"
  flavor_eng.218.b: "Включимо до списку й політиків."
  flavor_eng.218.c: "Це помпезно, але безглуздо."
  STATIC_MODIFIER_NAME_the_dining_club: "«Обідній клуб»"
  flavor_eng.218.historical_info: "«Обідній клуб» — відомий літературний клуб, де збиралися найяскравіші літературні та інтелектуальні діячі свого часу. Справив чималий вплив на розвиток британського культурного життя, оскільки серед членів клубу віталося проведення дискусій та обговорень у дружній атмосфері. В «Обідньому клубі» мислителі та митці могли сміливо ділитися своїми міркуваннями та разом втілювати в життя різні задуми."
  flavor_eng.219.title: "Королівська академія мистецтв"
  flavor_eng.219.desc_joshua_reynolds: "$flavor_eng.219.desc_common$ \n\nВисловлюються пропозиції про те, що першим головою клубу має стати глибокошанований [joshua_reynolds.GetName]."
  flavor_eng.219.desc_random_artist: "$flavor_eng.219.desc_common$ \n\nВисловлюються пропозиції про те, що першою головою клубу [Select_CString(random_artist.IsFemale,'має', 'має')] стати [random_artist.GetName]."
  flavor_eng.219.desc_common: "Нам надійшла пропозиція заснувати товариство, що сприятиме різнобічному розвитку творчості. Передбачається, що кошти надасть [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Тут художники-початківці зможуть осягати тонкощі своєї справи. Щороку товариство проводитиме виставку сучасного мистецтва, і взяти в ній участь зможе будь-хто."
  flavor_eng.219.a: "Як майстерно! Ми цілком схвалюємо."
  flavor_eng.219.b: "Краще витратимо ці гроші на освіту бідняків."
  STATIC_MODIFIER_NAME_increased_educational_spending: "Збільшені витрати на освіту"
  flavor_eng.219.historical_info: "Королівська академія мистецтв — це приватна установа, що сприяє розвитку образотворчого мистецтва та архітектури. Вона заснована в 1768 році групою таких художників, як сер Джошуа Рейнолдс та сер Вільям Чемберс. Першим покровителем цього товариства серед монархів став король Георг III. Членство в академії вважається вкрай престижним і присуджується художникам та архітекторам, що зробили значний внесок у відповідну галузь діяльності."
  flavor_eng.220.title: "Закон про огороджування"
  flavor_eng.220.desc: "Власники фабрик та земель звернулися до парламенту з проханням. Вони просять дозволу взяти в приватну власність ще більше земель загального користування, щоб прискорити переселення робочої сили з сільських місцевостей до міст. Переміщення населення вийде вельми значним, однак такий крок гарантує велику кількість робочої сили та навіть зможе збільшити обсяги сільськогосподарського виробництва."
  flavor_eng.220.a: "Переселений робітник — працьовитий робітник."
  enable_enclosure_act_policy: "Відкриває [Concept('policy', 'політику')|e] #TOOLTIP:POLICY,enclosure_act,X #L «Закон про обгороджування»#!#!"
  flavor_eng.220.b: "Це виллється у суспільну катастрофу."
  flavor_eng.220.a.custom: "Обурений [ShowPopTypeName('peasants')|l] піднімає бунт. [Concept('prosperity', 'Процвітання')|e] 10 сільських [Concept('locations', 'місцевостей')|e] падає на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%]"
  flavor_eng.220.tt: "Закон прискорить урбанізацію та сприятиме індустріалізації, однак #L #TOOLTIP:ESTATE_TYPE,peasants_estate,X простолюд#!#! постраждає"
  STATIC_MODIFIER_NAME_obstructing_industrialization: "Перешкоджання індустріалізації"
  enclosure_riots: "Бунти через обгороджування"
  flavor_eng.220.historical_info: "Закони про обгороджування — низка схвалених в Англії законів, спрямованих на підтримку політики обгороджування, тобто на переведення в приватну власність земель та полів загального користування. Таку політику було визнано необхідною у світлі переходу сільського господарства на комерційну основу та поступової індустріалізації країни. Закони про обгороджування посилили соціальну нерівність та спричинили масовий відтік тисяч сільських трудівників, що втратили роботу, до міст. Таке становище в підсумку призвело до бунтів знедолених фермерів та робітників, які відстоювали свої старовинні права."
  flavor_eng.221.title: "«Бігуни з Боу-стріт»"
  flavor_eng.221.desc: "#TOOLTIP:LOCATION,london,X #L Лондон#!#! захлеснула хвиля злочинності та безладів. Щоб побороти її, магістрати з Боу-стріт у місцевості Ковент-Гарден запропонували створити правоохоронні органи, які займатимуться розслідуванням злочинів та затриманням зловмисників — звісно, не безкоштовно, а за постійну платню. До кандидатів має висуватися суворий відбір, щоб на службу приймалися переважно констеблі та офіцери."
  flavor_eng.221.a: "Розумний план."
  flavor_eng.221.b: "Самосудам у нас не місце."
  STATIC_MODIFIER_NAME_bow_street_runners: "«Бігуни з Боу-стріт»"
  STATIC_MODIFIER_NAME_rampant_crime: "Розгул злочинності"
  flavor_eng.221.historical_info: "«Бігуни з Боу-стріт» — правоохоронна організація, що поклала початок забезпеченню правопорядку в Лондоні: саме з «Бігунів» згодом утворилася Служба столичної поліції. «Бігуни» займалися розслідуванням злочинів та збором доказів, у чому їм чимало допомагали стеження та розвинена мережа інформаторів."
  flavor_eng.222.title: "Заколот прядильників"
  flavor_eng.222.desc: "У кількох містах вибухнули бунти. Зачинщики руйнують майстерні, де розташовується #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдія прядильників#!#!#!, та ламають панчішно-в'язальні й інші машини, оскільки бояться, що через механізацію вони залишаться без роботи або їм знизять платню. Вже впали темпи виробництва #TOOLTIP:GOODS,cloth,X #L текстилю#!#!#!. Якщо не втрутитися, промисловість постраждає ще сильніше."
  flavor_eng.222.a: "На силу треба відповідати силою."
  flavor_eng.222.a.custom: "Усі #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! у [Concept('locations', 'місцевостях')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, де є #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдія прядильників#!#!, втрачають [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e]"
  flavor_eng.222.tt1: "Буде схвалено закон, що забороняє знищення машин"
  flavor_eng.222.tt2: "Будуть введені війська, деяких бунтівників буде страчено в результаті облави"
  flavor_eng.222.tt3: "#TOOLTIP:BUILDING_TYPE,cloth_guild,X #L Гільдія прядильників#!#!#!#ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! постраждає в ході #TOOLTIP:STATIC_MODIFIER,jenny_spinner_riots,X #V #L заколоту прядильників#!#!"
  flavor_eng.222.b: "Покращимо умови праці."
  flavor_eng.222.b.custom: "Усі #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! в [Concept('locations', 'місцевостях')|e] #TOOLTIP:REGION,great_britain_region,X #L Великої Британії#!#!, де є #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гільдія прядильників#!#!, отримують [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e]"
  flavor_eng.222.tt4: "Впровадження машин не супроводжуватиметься звільненням робітників, через що впаде продуктивність"
  flavor_eng.222.c: "Дамо хибні обіцянки."
  flavor_eng.222.tt5: "Текстильники припинять саботаж і повернуться до роботи"
  STATIC_MODIFIER_NAME_jenny_spinner_riots: "Заколот прядильників"
  STATIC_MODIFIER_NAME_improved_working_conditions_cloth_makers: "Поліпшені умови праці для суконників"
  flavor_eng.222.historical_info: "Заколот прядильників, він же заколот луддитів, — низка протестів працівників текстильної промисловості, які побоювалися, що механізація праці призведе до звільнення ремісників та зниження їхньої платні. Луддити вривалися на фабрики, де нещадним чином знищували нові верстати, однак їхні погано організовані бунти не увінчалися успіхом: уряд Великої Британії жорстоко придушив підривну роботу розгніваних текстильників. Подібні бунти відбувалися й надалі в міру впровадження нових машин."
  flavor_eng.223.title: "[horatio_nelson.GetNameWithNoTooltip]"
  flavor_eng.223.desc: "Останнім часом значною увагою та підтримкою Ради адміралтейства користується відважний та досвідчений флотський офіцер, що забезпечив [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому флоту кілька блискучих перемог. [horatio_nelson.GetName] має отримати в розпорядження власну флотилію, щоб його видатний талант не пропадав дарма."
  flavor_eng.223.a: "Йому саме місце на флоті."
  flavor_eng.223.tt1: "З'явиться [Concept('admiral', 'адмірал')|e] [horatio_nelson.GetNameWithNoTooltip]"
  flavor_eng.223.b: "У нас є й інші посади."
  flavor_eng.223.tt2: "З'явиться [Concept('character', 'персонаж')|e] [horatio_nelson.GetNameWithNoTooltip]"
  flavor_eng.223.c: "Його до кораблів не можна підпускати на гарматний постріл."
  flavor_eng.223.historical_info: "Гораціо Нельсон — англійський флотський офіцер. Вступив на флот ще в юному віці та швидко просунувся по службі. Завдяки своєму видатному таланту флотоводця здобув перемогу в Трафальгарській битві, в результаті чого Велика Британія здобула незаперечну морську могутність і згодом перетворилася на світову наддержаву."
  flavor_eng.224.title: "[thomas_paine.GetNameWithNoTooltip] та «Здоровий глузд»"
  flavor_eng.224.desc: "Письменник-революціонер [thomas_paine.GetName], що вміє захопити публіку, випустив брошуру, озаглавлену #italic «Здоровий глузд»#!. У ній він закликає колоністів боротися за відокремлення від #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!. Пейн задається питанням, чому за [target_root_country.Custom('CL_INST')] закріплено право брати з американських колоній податки та встановлювати там свої закони, якщо колоністи навіть не представлені в парламенті.\n\nНебезпека полягає не стільки в змісті брошури, скільки в простій та доступній мові, зрозумілій кожному."
  flavor_eng.224.a: "Видамо дозвіл на арешт Пейна."
  flavor_eng.224.tt1: "У брошурі жорстко критикуватимуться монархія та престолонаслідування — автор вважає їх споконвічно несправедливими"
  flavor_eng.224.tt2: "[thomas_paine.GetNameWithNoTooltip] покине #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_ACC')|L]#!#! та відправиться в колонії за допомогою Королівського товариства"
  flavor_eng.224.tt3: "[thomas_paine.GetNameWithNoTooltip] буде заарештований та засуджений за підбурювання та наклеп, однак продовжить випускати брошури, оскільки #TOOLTIP:LAW,censorship,X #L цензура#!#! пом'якшена"
  flavor_eng.224.tt4: "[thomas_paine.GetNameWithNoTooltip] буде заарештований та засуджений за підбурювання та наклеп і не зможе випускати брошури — це заборонено #TOOLTIP:LAW,censorship,X #L цензурою#!#!"
  flavor_eng.224.b: "Кожен вільний думати як хоче."
  flavor_eng.224.tt5: "Брошури вільно поширюватимуться та користуватимуться значною підтримкою народу"
  flavor_eng.224.historical_info: "Томас Пейн — письменник та політичний діяч, що відіграв важливу роль в Американській революції. Написав кілька брошур, у яких критикував монархію та виступав за повну незалежність Тринадцяти колоній. Зумів схилити на свій бік як народну думку, так і думку впливових політиків, а заодно заклав ідеологічні основи Декларації незалежності США."
  flavor_eng.225.title: "Права людини"
  flavor_eng.225.desc: "Авторитетний письменник-радикал [thomas_paine.GetName] опублікував чергову брошуру з крамольними ідеями. Він виступає за скасування монархії та заснування представницького парламенту. Своїми ідеями ця людина розхитує рівновагу серед жителів #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!. Ба більше, він уже обзавівся прихильниками, які також виступають за політичні та соціальні реформи."
  flavor_eng.225.a: "Виступимо проти змін у порядку, що склався."
  flavor_eng.225.tt1: "[thomas_paine.GetNameWithNoTooltip] покине #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_ACC')|L]#!#! через звинувачення в підбурюванні"
  flavor_eng.225.a.custom: "#TOOLTIP:POPTYPE,peasants,X #L Селяни#!#! у #TOOLTIP:REGION,great_britain_region,X #L Британії#!#! втрачають #R 50%#! [Concept('pop_satisfaction', 'вдоволення')|e]"
  flavor_eng.225.b: "Проведемо реформи в парламенті."
  flavor_eng.225.tt2: "#TOOLTIP:POPTYPE,burghers,X #L Містяни#!#! та #TOOLTIP:POPTYPE,nobles,X #L знать#!#! будуть нажахані спробою позбавити їх соціальних привілеїв"
  enable_representative_parliament_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] «#TOOLTIP:GOVERNMENT_REFORM,representative_parliament_reform,X #L Представницький парламент#!#!»"
  flavor_eng.225.historical_info: "#italic  «Права людини»#! — брошура XVIII століття, випущена письменником Томасом Пейном. Її зміст викликав у суспільстві гострі суперечки та стривожив уряд Великої Британії, який миттєво кинув усі сили на придушення інакомислення та спроб змінити звичний порядок. Вважається, що саме з публікації «Прав людини» почалися міркування про самі права людини та необхідність провести політичні реформи. Суспільство стало більш чутливо ставитися до питань демократії та важливості справедливого представництва."
  flavor_eng.226.title: "[james_cook.GetNameWithNoTooltip]"
  flavor_eng.226.desc: "Цілеспрямований та неймовірно талановитий мореплавець [james_cook.GetName], завдяки нестримному прагненню вивчити світ, пропонує організувати серію експедицій у Тихий океан — і там сподівається відкрити нові землі, які увійшли б до складу нашої країни. Крім того, [Select_CString(james_cook.IsFemale,'вона', 'він')] хоче провести спостереження за зорями та скласти для флоту точніші мапи. Кук поводиться ввічливо та чемно, а тому напевно допоможе нам встановити добрі стосунки з тубільними племенами."
  flavor_eng.226.a: "Чудова ідея."
  flavor_eng.226.tt1: "З'явиться [Concept('explorer', 'дослідник')|e] [james_cook.GetNameWithNoTooltip]"
  flavor_eng.226.tt2: "Кук зможе займатися науковими дослідженнями під час експедиції в Тихий океан"
  flavor_eng.226.b: "Нехай займається командуванням."
  flavor_eng.226.tt3: "З'явиться [Concept('admiral', 'адмірал')|e] [james_cook.GetNameWithNoTooltip]"
  flavor_eng.226.c: "Спостереження за зорями? Яка дурість."
  flavor_eng.226.historical_info: "Експедиції Джеймса Кука стали передумовами до вивчення та колонізації Тихоокеанського регіону та прилеглих територій, посприяли розвитку науки та допомогли прокласти нові торгові маршрути. Саме Кук наніс на мапу території Нової Зеландії та Австралії, які згодом колонізувала Велика Британія."
  flavor_eng.227.title: "[james_cook.GetNameWithNoTooltip] та його експедиції"
  flavor_eng.227.desc: "Безстрашний шукач пригод [james_cook.GetName] зараз вивчає незвідані води Тихого океану. Перед учасниками експедиції стоїть одразу кілька завдань, тому капітан попросив допомогти йому визначитися, яку мету переслідувати."
  flavor_eng.227.a: "Ця експедиція має бути науковою."
  flavor_eng.227.b: "Треба заснувати колонію-поселення для злочинців."
  flavor_eng.227.c: "Існування імперії неможливе без торгівлі."
  flavor_eng.227.d: "Треба продовжити експедицію."
  flavor_eng.227.tt: "Капітан зробить кілька додаткових зупинок, щоб взяти більше припасів"
  STATIC_MODIFIER_NAME_extended_expedition: "Продовжена експедиція"
  flavor_eng.227.historical_info: "У XVIII столітті капітан Джеймс Кук здійснив кілька експедицій у Тихий океан, розширивши тим самим наявні знання про географію, історію та культуру Тихоокеанського регіону. Початковою метою експедиції ставилося спостереження за проходженням Венери по диску Сонця, проте важливим було й вивчення незвіданих південних регіонів Тихого океану."
  flavor_eng.228.title: "Прибутковий податок"
  flavor_eng.228.desc: "Фінансове становище нашої країни залишає бажати кращого. Очевидна необхідність у реформах. Існує думка, що чинна система оподаткування йде на користь лише багатіям, тоді як скарбниця майже не отримує коштів. Радник [william_pitt_the_younger.GetName] пропонує ввести тимчасовий прибутковий податок, щоб забезпечити додатковий приплив коштів та розподілити їх. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], втім, не в захваті від цієї пропозиції."
  flavor_eng.228.a: "Це чесно і цілком у дусі часу."
  STATIC_MODIFIER_NAME_temporary_income_tax: "Тимчасовий прибутковий податок"
  flavor_eng.228.b: "Нам вистачить митних зборів та акцизів."
  flavor_eng.228.c: "Це дуже делікатне питання."
  flavor_eng.228.tt: "Парламент буде незадоволений нехтуванням таким крихким фінансовим становищем #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_eng.228.custom: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,eng_taxation_law,X #L «Оподаткування»#!#!"
  flavor_eng.228.historical_info: "Прибутковий податок в Англії було запроваджено в роки Наполеонівських війн, коли стало зрозуміло, що скарбниця погано справляється з фінансовим навантаженням. Першим ідею про такий збір висунув прем'єр-міністр Вільям Пітт-молодший, який розробив прогресивний прибутковий податок: ті, у кого більші доходи, відраховували до скарбниці більший відсоток. Невдоволення з боку заможних громадян призвело до того, що після закінчення війни податок було скасовано."
  flavor_eng.229.title: "Щоденник Семюела Піпса"
  flavor_eng.229.desc: "Виявилося, що флотський чиновник XVII століття [samuel_pepys.GetName] вів щоденник, де докладно описував своє особисте життя, а також різні важливі події, які він бачив на власні очі. Частина його записів вже розшифрована, однак, якщо нам дозволять, зрозумілою кожному #L [ROOT.GetCountry.GetCulture.GetLanguage.GetName|l]ою#! мовою можна буде перекласти весь щоденник."
  flavor_eng.229.a: "Розшифруємо та видамо."
  flavor_eng.229.tt1: "У цьому короткому, але пізнавальному щоденнику міститимуться яскраві описи життя на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! XVII століття"
  flavor_eng.229.tt2: "З кількох пізнавальних записів можна буде почерпнути докладні описи життя на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! XVII століття"
  flavor_eng.229.tt3: "У численних записах міститимуться яскраві та докладні описи життя на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! XVII століття"
  flavor_eng.229.tt4: "У неймовірно докладному щоденнику міститимуться описи кількох важливих подій та життя на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! XVII століття"
  flavor_eng.229.b: "Вшануємо право його родини на особисте життя."
  flavor_eng.229.historical_info: "У щоденнику Семюела Піпса, написаному в 1660–1669 роках, наводяться докладні описи подій, що відбувалися в той час у Лондоні, які переплітаються з особистими спогадами та спостереженнями самого автора. Він став свідком кількох важливих подій, зокрема Великої пожежі, був членом Королівського товариства, а також служив в адміралтействі, де міг спостерігати за політичним життям країни."
  flavor_eng.230.title: "Закон про фабрики"
  flavor_eng.230.desc: "Заводські робітники піддаються безжальній експлуатації, праця їхня небезпечна для життя, а платня занадто низька. У розробці зараз перебувають реформи, які могли б їх захистити, однак слід врахувати, що будь-яка спроба змінити ситуацію буде зустрінута вороже і, ймовірно, навіть спричинить спад економічного зростання та виробництва. Проте діяти треба, інакше робітники просто втечуть."
  flavor_eng.230.a: "Нещасним треба допомогти."
  flavor_eng.230.custom: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,factory_working_conditions_law,X #L «Умови праці на фабриках»#!#!"
  flavor_eng.230.b: "Робітники — запорука зростання нашої економіки."
  flavor_eng.230.c: "Нехай виявлять трохи вдячності."
  flavor_eng.230.historical_info: "Закон про фабрики — важливий закон в історії британського робітничого руху, що заклав основу для поліпшення умов праці та захисту прав робітників, особливо дітей, змушених працювати майже цілий день за невеликі гроші. Закон запровадив вікові обмеження, вимоги до рівня освіти та зробив інспекцію робочих місць обов'язковою, а також змусив власників фабрик зайнятися охороною праці та почати вести трудові книжки."
  flavor_eng.231.title: "[richard_arkwright.GetNameWithNoTooltip]"
  flavor_eng.231.desc: "Підприємець і не позбавлений ділової кмітливості винахідник [richard_arkwright.GetName] подав патент на нову прядильну машину, яка працює за допомогою водяного колеса. Завдяки цьому зростає продуктивність праці, оскільки бавовняні нитки можна виготовляти безперервно. Однак є деякі труднощі: Аркрайту складно довести оригінальність свого винаходу. Суд навряд чи зможе швидко винести постанову, тому введення нової машини в дію поки відкладається."
  flavor_eng.231.a: "Видамо патент виняткового права."
  flavor_eng.231.tt1: "З'явиться [Concept('character', 'персонаж')|e] [richard_arkwright.GetNameWithNoTooltip]"
  enable_water_frame_advance: "Відкриває [Concept('advance', 'поліпшення')|e] «#L #TOOLTIP:ADVANCE_DEFINITION,water_frame,X #L Прядильна машина на водяному колесі#!#!»"
  flavor_eng.231.b: "Потребує ретельного розгляду."
  flavor_eng.231.tt2: "Суперечка завершиться видачею спільного патенту"
  flavor_eng.231.historical_info: "Річард Аркрайт — англійський винахідник, що творив в добу промислової революції. Впровадив кілька винаходів у галузі текстильної промисловості. З них найважливішою можна назвати прядильну машину на водяному колесі, яка стала воістину революційною та дозволила поступово перейти до фабричної системи виробництва текстилю."
  unlocked_advance_coke_smelting_tt: "Пройдено [Concept('dynamic_historical_events', 'динамічна історична подія')|e] «$flavor_eng.232.title|V$»"
  flavor_eng.232.title: "Внесок Дарбі"
  flavor_eng.232.desc: "Металург [abraham_darby.GetName] розробив нове паливо для доменних печей, що отримало назву «кокс». Від звичайного деревного вугілля він вигідно відрізняється меншим вмістом летких речовин та більшою горючістю. Зараз [abraham_darby.GetNameWithNoTooltip], родині якого належить цілий #TOOLTIP:BUILDING_TYPE,iron_foundry,X #L чавуноливарний цех#!#!#!, випробовує свій винахід, і результати виходять багатообіцяючими."
  flavor_eng.232.a: "Зробимо застосування коксу промисловим стандартом."
  enable_coke_smelting_advance: "Відкриває [Concept('advance', 'поліпшення')|e] «#L #TOOLTIP:ADVANCE_DEFINITION,coke_smelting,X #L Плавка коксу#!#!»"
  flavor_eng.232.b: "Поки що нас усе влаштовує."
  flavor_eng.232.tt1: "З'явиться [Concept('character', 'персонаж')|e] [abraham_darby.GetNameWithNoTooltip]"
  flavor_eng.232.tt2: "Для нового палива потрібно ще більше #TOOLTIP:GOODS,coal,X #L вугілля#!#!#!"
  flavor_eng.232.historical_info: "Винахід плавки коксу Абрахамом Дарбі I значно прискорив хід промислової революції, оскільки перевернув усі усталені підходи до виробництва заліза і тим самим сприяв широкому впровадженню заліза та сталі в різні виробництва. Крім того, кокс став застосовуватися в масовому виробництві чавуну — важливого для промислової революції матеріалу."
  flavor_eng.233.title: "Закон про чай"
  flavor_eng.233.desc: "[east_india_trade_company.GetName] незабаром може втратити платоспроможність, оскільки не може торгувати своїм #TOOLTIP:GOODS,tea,X #L чаєм#!#!. Перевиробництво та суперництво з іншими європейськими чайними компаніями призвели до надлишку запасів продукції. Крім того, компанія виробляє переважно чорний чай, тоді як #L [ROOT.GetCountry.GetAdjective|l]а#! публіка віддає перевагу зеленому.\n\nМи можемо надати їй торгову монополію на території #ONCLICK:COUNTRY,[thirteen_colonies.Custom('CL_tt')] #TOOLTIP:COUNTRY,[thirteen_colonies.Custom('CL_tt')],X [thirteen_colonies.Custom('CL_GEN')|L]#!#!, щоб обійти конкурентів і заодно забезпечити компанії стійкість."
  flavor_eng.233.a: "Іноді протекціонізм буває необхідним."
  flavor_eng.233.b: "Ми не готові піти на такі обмеження."
  STATIC_MODIFIER_NAME_no_market_for_goods: "Немає ринку збуту"
  STATIC_MODIFIER_NAME_tea_imports_banned: "Заборонено імпорт чаю"
  flavor_eng.233.historical_info: "Ухвалення Закону про чай було зумовлене необхідністю підтримати Британську Ост-Індську компанію, яка відчувала фінансові труднощі та зберігала на складах значні запаси чаю. Закон надав їй монополію на продаж чаю в американські колонії. Тим самим компанія змогла знизити ціни та постачати чай безпосередньо, відмовившись від послуг купців з колоній. Втім, навіть попри зниження цін, багато колоністів вважали, що такий закон утискає їхні права."
  flavor_eng.234.title: "«Досвідчена англійська домогосподарка»"
  flavor_eng.234.desc: "Відома письменниця, кухарка та домогосподарка [elizabeth_raffald.GetName] ретельно описала в окремій книзі все, що їй відомо про готування та управління домашнім господарством. Оскільки Елізабет працювала в найрізноманітніших господарствах, зокрема у знатних людей, рецепти вийшли різноманітними, оригінальними та корисними. Якщо випустити книгу в друк, найімовірніше, вона дуже швидко розійдеться."
  flavor_eng.234.a: "Це справжня перлина кулінарної справи."
  the_experienced_english_housekeeper: "«Досвідчена англійська домогосподарка»"
  flavor_eng.234.b: "Умілій домогосподарці настанови не потрібні."
  flavor_eng.234.tt1: "З'явиться [Concept('character', 'персонаж')|e] [elizabeth_raffald.GetNameWithNoTooltip]"
  flavor_eng.234.tt2: "Книга здобуде популярність не тільки у жителів #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!, а й серед американських колоністів"
  flavor_eng.234.historical_info: "#italic «Досвідчена англійська домогосподарка»#! — книга Елізабет Раффолд, яка познайомила публіку з оригінальними та корисними рецептами. Багато з них популярні й сьогодні. У «Домогосподарці» містяться рецепти найрізноманітніших страв, від супів і смаженого до десертів; представлений навіть перший у світі рецепт англійських оладок. Чимало уваги приділялося точності дій — у книзі використовується стандартизована система вимірювань, вкрай рідкісна на той час."
  flavor_eng.235.title: "Бостонська бійня"
  flavor_eng.235.desc: "У колоніальному порту #TOOLTIP:LOCATION,boston,X #L Бостона#!#! сталася сутичка між гарнізоном і жителями міста, яка закінчилася смертю п'яти колоністів. За підсумками слідства майже всі вояки виявилися виправдані або отримали м'які вироки. У місцевих газетах вже друкують історії про те, як #L [ROOT.GetCountry.GetAdjective|l]і#! війська першими напали на невинних колоністів, що лише підігріває гнів публіки.\n\nЩоб знизити напругу, можна спробувати зменшити податковий тягар або розглянути інші варіанти дій."
  flavor_eng.235.a: "Висловимо жаль і скасуємо податки."
  flavor_eng.235.b: "Посилимо пропаганду."
  flavor_eng.235.tt1: "#TOOLTIP:GOODS,tea,X #L Чай#!#!#! на території #ONCLICK:COUNTRY,[thirteen_colonies.Custom('CL_tt')] #TOOLTIP:COUNTRY,[thirteen_colonies.Custom('CL_tt')],X [thirteen_colonies.Custom('CL_GEN')|L]#!# буде продаватися без монополії"
  flavor_eng.235.tt2: "#TOOLTIP:GOODS,tea,X #L Чай#!#!#! все так само належатиме монополістам, а тому населення ще сильніше налаштується проти #L [target_root_country.GetAdjective|l]ої#! влади"
  flavor_eng.235.tt3: "Присутність #L [target_root_country.GetAdjective|l]их#! військ породить неприязнь до колонізаторів"
  flavor_eng.235.historical_info: "Бостонська бійня — зіткнення між жителями Бостона та невеликим загоном британських солдатів, відправлених у колонію для підтримання порядку та дії британських законів. Образами та насмішками містяни спровокували вояків на стрілянину, в результаті якої загинуло кілька поселенців. Цю сутичку пізніше взяли на озброєння пропагандисти обох сторін, що лише підлило масла в вогонь ворожнечі, яка розгоралася між місцевими колоністами та британською короною."
  flavor_eng.236.title: "Перший флот"
  flavor_eng.236.desc: "У наших в'язницях не вистачає місць для ув'язнених, а тому нам надійшла пропозиція частково відправити злочинців у далеку колонію, де вони зможуть перевиховатися і стати повноцінними членами суспільства, як тільки відбудуть належний їм термін.\n\nВже майже готовий флот, який вирушить у це далеке плавання. Пункт призначення — нещодавно заснована нами колонія [target_location.GetName]. Ще трохи — і кораблі покинуть наші води."
  flavor_eng.236.a: "Підняти вітрила! У путь!"
  flavor_eng.236.b: "Від проблем так не позбутися."
  STATIC_MODIFIER_NAME_overcrowded_prisons: "Переповнені в'язниці"
  flavor_eng.236.historical_info: "Перший флот — група з 11 кораблів, які перевезли понад тисячу каторжників, а також вояків, офіцерів та інших службовців на континент, який незабаром став відомий світові як Австралія. Саме з цих кораблів зійшли перші європейські поселенці, які заснували там постійну колонію. Безпосередньо заснування колонії-поселення і було головним завданням експедиції, оскільки британські в'язниці на той час були переповнені. Втім, була й інша причина: для колонізації потрібна була дешева робоча сила, якою і були каторжники."
  flavor_eng.237.title: "Лондонське чудовисько"
  flavor_eng.237.desc: "#TOOLTIP:LOCATION,london,X #L Лондонські#!#! #TOOLTIP:POPTYPE,nobles,X #L аристократи#!#! тремтять від страху: вулицями міста блукає загадковий зловмисник, який несподівано і люто нападає на жінок високого соціального становища. Подібна обурлива поведінка супроводжується непристойними коментарями та спробами схопити жертв за неналежні місця."
  flavor_eng.237.a: "Виведемо на вулиці війська."
  flavor_eng.237.tt1: "Кілька аристократів загине внаслідок жорстоких нападів"
  flavor_eng.237.tt2: "Завдяки солдатам напади відбуватимуться рідше"
  flavor_eng.237.b: "Тут впораються «Бігуни з Боу-стріт»."
  flavor_eng.237.tt3: "Завдяки «Бігунам» напади відбуватимуться значно рідше"
  flavor_eng.237.c: "Аристократи можуть дозволити собі охоронців."
  flavor_eng.237.tt4: "Знать буде засмучена небажанням охороняти порядок"
  flavor_eng.237.historical_info: "Невідомий, прозваний Лондонським чудовиськом, посіяв на вулицях міста справжню паніку. У газетах широко висвітлювалися його напади на беззахисних жінок. Жертв, схоже, зловмисник обирав випадково; так і залишилося невідомим, що спонукало його на такі вчинки. Через якийсь час був затриманий підозрюваний — молодий лондонець, визнаний душевнохворим, і напади припинилися."
  flavor_eng.238.title: "Закон про об'єднання"
  flavor_eng.238.desc: "Жахливі умови, в яких змушені працювати фабричні робітники, до недавнього часу вважалися меншим злом, на яке можна піти заради стрімкого нарощування виробничих можливостей. Нещодавно, втім, робітники почали скаржитися на нелюдське поводження. Вони хочуть об'єднатися і разом вимагати збільшення платні, поліпшення умов праці та скорочення робочого дня.\n\nТаку поведінку, можливо, знадобиться припинити, інакше швидка індустріалізація країни ризикує зупинитися."
  flavor_eng.238.a: "Ми не потерпимо цю нісенітницю."
  flavor_eng.238.custom: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,trade_unions_law,X #L «Профспілки»#!#!"
  flavor_eng.238.a.custom: "Невдоволені #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! можуть зібратися разом і виступити проти порушення прав робітників"
  flavor_eng.238.b: "Все-таки вони теж люди."
  disgruntled_factory_workers: "Незадоволені фабричні робітники"
  STATIC_MODIFIER_NAME_eng_disgruntled_factory_workers_rebellion: "Незадоволені фабричні робітники"
  flavor_eng.238.historical_info: "Закон про об'єднання, схвалений у перші роки промислової революції, став відповіддю на спроби робітників об'єднатися в профспілки та виступити проти жахливих умов праці, низької платні та довгого робочого дня. Закон вводив кримінальне покарання за будь-які організації серед робітників, чим давав перевагу роботодавцям та власникам фабрик, проте згодом був скасований — цьому посприяли як протести з боку робітників і навіть деяких депутатів парламенту, так і зміна поглядів суспільства на права трудящих."
  flavor_eng.239.title: "Розеттський камінь"
  flavor_eng.239.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] виявлено стародавній артефакт, імовірно, доби античної династії Птолемеїв. На стелі близько метра заввишки викарбувані написи трьома різними мовами, зокрема з використанням знаків невідомого походження."
  flavor_eng.239.a: "Відвеземо її назад на територію [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_eng.239.b: "Пожертвуємо її місцевій владі."
  flavor_eng.239.historical_info: "Розеттський камінь — стела, знайдена біля міста Розетта в дельті Нілу. Містить написи трьома мовами, накреслених із застосуванням трьох різних письменностей — ієрогліфів, єгипетського демотичного письма та давньогрецької мови. Завдяки цьому дослідники змогли розшифрувати значення єгипетських ієрогліфів."
  flavor_eng.240.title: "Чавунний міст"
  flavor_eng.240.desc_common: "Знаменитий архітектор [thomas_pritchard.GetName] розробив щось справді неймовірне: проєкт мосту, цілком зробленого з чавуну — сплаву, чиї можливості, без перебільшення, безмежні."
  flavor_eng.240.desc_industrial_region: "$flavor_eng.240.desc_common$\n\nПочати будівництво рекомендується в #TOOLTIP:PROVINCE_DEFINITION,shropshire_province,X #L Шропширі#!#!, відомому своєю промисловістю. Так ми не тільки забезпечимо надійність поставок в інші провінції, а й підкреслимо важливість цього регіону для виробництва в країні, а тому саме тут слід випробувати революційну в галузі інфраструктури конструкцію."
  flavor_eng.240.desc: "$flavor_eng.240.desc_common$\n\nПочати будівництво рекомендується в #TOOLTIP:PROVINCE_DEFINITION,shropshire_province,X #L Шропширі#!#!, оскільки місцевим жителям необхідна переправа через річку. Економіка провінції піде на підйом, а міст уособлюватиме поступ."
  flavor_eng.240.a: "Негайно приступимо до будівництва."
  flavor_eng.240.tt1: "З'явиться [Concept('character', 'персонаж')|e] [thomas_pritchard.GetNameWithNoTooltip]"
  flavor_eng.240.b: "Краще осучаснимо текстильну промисловість."
  STATIC_MODIFIER_NAME_invested_in_textile_production: "Модернізована текстильна промисловість"
  flavor_eng.240.c: "Краще збільшимо виробництво їжі."
  flavor_eng.240.d: "У цьому немає нагальної потреби."
  STATIC_MODIFIER_NAME_invested_in_farming_output: "Модернізована харчова промисловість"
  iron_bridge_construction: "Будівництво Чавунного мосту"
  flavor_eng.240.historical_info: "Чавунний міст, збудований у 1777–1779 роках, — один із найвідоміших символів промислової революції у Великій Британії. Саме з нього почався перехід до новаторських рішень у будівництві мостів, зумовлених необхідністю перевозити важке обладнання та техніку."
  flavor_eng.241.title: "Бунт лорда Гордона"
  flavor_eng.241.desc_common: "Мирна демонстрація жителів #TOOLTIP:LOCATION,london,X #L Лондона#!#! обернулася жорстокими погромами та мародерством. Постраждало не лише майно — демонстранти вбили кількох людей.\n\nПричиною такого виступу стали антикатолицькі настрої — народ вважає, що"
  flavor_eng.241.desc_catholic_army: "$flavor_eng.241.desc_common$ воякам-#TOOLTIP:RELIGION,$catholic_tt$,X #L католикам#!#! не можна служити в війську, оскільки вони неблагонадійні та можуть замишляти зраду."
  flavor_eng.241.desc: "$flavor_eng.241.desc_common$ радникам-#TOOLTIP:RELIGION,$catholic_tt$,X #L католикам#!#! не можна перебувати на державній службі, оскільки вони неблагонадійні та можуть ухвалювати закони на підтримку #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтва#!#!."
  flavor_eng.241.a: "Прикличемо війська."
  flavor_eng.241.tt1: "У сутичках із солдатами загине кілька бунтівників"
  flavor_eng.241.tt2: "Через бунти репутація #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! в очах жителів Європи впаде"
  STATIC_MODIFIER_NAME_eng_gordon_riots: "Бунт лорда Гордона"
  opressing_catholic_population: "Пригнічення католицького населення"
  protestant_association: "Асоціація протестантів"
  flavor_eng.241.b: "Рано чи пізно їм набридне."
  flavor_eng.241.b.custom: "Бунтівники підпалюють і грабують кілька посольств католицьких країн, викликаючи обурення їхньої влади"
  flavor_eng.241.tt4: "Бунт змусить народ сумніватися в уряді, оскільки він нездатний нічого зробити"
  flavor_eng.241.historical_info: "Бунт лорда Гордона — повстання проти католиків та уряду, підняте лондонцями наприкінці XVIII століття. Воно було викликане законопроєктом, що передбачав розширення прав католиків. Владі не вдалося стримати хвилю насильства, яка вилилася в масштабні руйнування та підірвала міжнародну репутацію Великої Британії як стабільної та сильної країни."
  flavor_eng.242.title: "Інцидент із Gaspee"
  flavor_eng.242.desc: "[target_country.GetName] та [target_root_country.GetName] вступили в дипломатичну суперечку. Її викликано знищенням митної шхуни, екіпаж якої боровся з контрабандою, що надходить із колоній. Якщо забезпечити верховенство закону не вдасться, [target_root_country.GetAdjectiveWithNoTooltip|l]ий суверенітет опиниться під загрозою.\n\nЩоб знизити напруженість, колоніальна адміністрація подала прохання, у якому підкреслила свою вірність метрополії та висловила бажання розв'язати конфлікт мирним шляхом."
  flavor_eng.242.a: "Негайно розпочнемо розслідування."
  STATIC_MODIFIER_NAME_committees_of_correspondence: "Комітет із кореспонденції"
  flavor_eng.242.tt1: "Спроби притягнути винних колоністів до суду викличуть ще більше обурення [target_root_country.GetAdjectiveWithNoTooltip|l]ою владою"
  flavor_eng.242.tt2: "#L [target_country.GetAdjective]а#! адміністрація розробить систему зв'язку та спільних дій, щоб згуртувати колонії та організувати опір метрополії"
  flavor_eng.242.b: "Закриємо очі на те, що сталося."
  flavor_eng.242.tt3: "Небажання [target_root_country.Custom('CL_GEN')] підтримувати верховенство права сприятиме контрабандистам"
  flavor_eng.242.c: "Приймемо їхнє прохання."
  flavor_eng.242.tt4: "Завдяки Петиції оливкової гілки, яку склали [target_character.GetName] та адміністрація, напруга знизиться"
  flavor_eng.242.historical_info: "Gaspee — британська митна шхуна, яка стежила за дотриманням правил торгівлі та боролася з контрабандою в американських колоніях. Під час погоні за кораблем контрабандистів вона сіла на мілину, після чого її спалили незадоволені метрополією колоністи, попередньо перестрілявши британський екіпаж."
  flavor_eng.243.title: "[elizabeth_montagu.GetNameWithNoTooltip]"
  flavor_eng.243.desc: "Впливова письменниця та літературний критик [elizabeth_montagu.GetName] вийшла заміж за видатного державного діяча, завдяки чому змогла потрапити до вищих верств суспільства. Свій маєток Елізабет тепер збирається перетворити на місце, де проводитимуться зібрання інтелектуалів та поціновувачів літератури — письменників, художників, науковців та реформаторів."
  flavor_eng.243.a: "Це сильна та незалежна жінка."
  flavor_eng.243.tt1: "З'явиться [Concept('character', 'персонаж')|e] [elizabeth_montagu.GetNameWithNoTooltip]"
  flavor_eng.243.b: "Вона занадто непокірна — нас це турбує."
  flavor_eng.243.historical_info: "Елізабет Монтегю — видатна представниця інтелектуальних та літературних кіл Англії. Заснувала та очолювала товариство «Синя панчоха» — неформальний жіночий громадський та освітній рух. Вона опублікувала кілька творів, зокрема сатиричних. Один із найвідоміших її праць — «Розмови мертвих»: збірка уявних бесід між великими діячами минулого та живими, в якій критикуються суспільні звичаї XVIII століття."
  flavor_eng.244.title: "Товариство «Синя панчоха»"
  flavor_eng.244.desc: "Літературний критик та господиня салону [elizabeth_montagu.GetName] заснувала товариство для привілейованих жінок — любительок обговорити літературу та мистецтво, а також прихильниць рівних можливостей здобуття освіти. Запрошення взяти участь у таких інтелектуальних заняттях, як читання та письмо, розсилаються також і освіченим чоловікам.\n\nЯкщо не втручатися в діяльність товариства Елізабет, з часом воно почне виступати на підтримку жіночої освіти."
  flavor_eng.244.a: "Похвальна ініціатива."
  flavor_eng.244.tt1: "Члени товариства «Синя панчоха» проводитимуть регулярні зустрічі та підтримуватимуть рівність в освіті, літературі та мистецтві"
  STATIC_MODIFIER_NAME_blue_stockings_society: "Товариство «Синя панчоха»"
  flavor_eng.244.b: "Знання здобувається в розмовах з чоловіками."
  flavor_eng.244.historical_info: "Товариство «Синя панчоха» — гурток для інтелектуалів та літераторів, заснований дворянкою Елізабет Монтегю. Вона проводила неформальні зустрічі, де обговорювалися питання рівної для всіх освіти, оскільки здобути повноцінну освіту жінкам в ту добу було складно. Втім, вже в наступному столітті це питання стало менш актуальним — не в останню чергу завдяки діяльності «Синьої панчохи»."
  flavor_eng.245.title: "Лондон: пивна повінь"
  flavor_eng.245.desc: "#TOOLTIP:BUILDING_TYPE,brewery,X #L Пивоварня#!#! «Мо і компанія», розташована на Тоттенхем-Корт-Роуд у #TOOLTIP:LOCATION,london,X #L Лондоні#!#!, стала центром справжньої катастрофи: цистерну, в якій зберігалося #TOOLTIP:GOODS,beer,X #L пиво#!#!, прорвало, і десятки літрів пінного напою, обрушивши стіни пивоварні, хлинули на вулиці. Частина затоплених будинків постраждала, частина виявилася знищена. Повідомляють навіть про кількох загиблих.\n\nЗа результатами розслідування притягнути власників пивоварні до кримінальної відповідальності не вдалося. Витрати на прибирання, відновлення та заміну пошкодженого товару ляжуть на плечі постраждалих підприємців."
  flavor_eng.245.a: "Покриємо всі витрати."
  flavor_eng.245.tt1: "Завдана майну шкода та втрата пива будуть компенсовані"
  flavor_eng.245.b: "Тут винні містяни."
  beer_flood: "Пивна повінь"
  flavor_eng.245.tt2: "У місті не вистачатиме пива, а підприємці насилу покриють збитки"
  flavor_eng.245.historical_info: "Пивна повінь у Лондоні — трагічна подія, спричинена розривом величезної цистерни з пивом. На вулиці витекло близько 600 000 літрів цього напою. Внаслідок повені постраждала не лише нерухомість — загинуло кілька людей, які захлинулися або були розчавлені хвилями. Судді постановили, що відповідальності за це ніхто не несе, оскільки розрив стався через дію непереборної сили."
  flavor_eng.246.title: "Безсмертна Леді"
  flavor_eng.246.desc: "У друк почали виходити твори безіменної письменниці, що ховається під псевдонімом «Леді». Її книги поки не користуються великим попитом, проте стиль Леді досить дотепний та іронічний. Це невластиво більшості жінок, адже повноцінна освіта їм майже недоступна. Втім, варто зазначити, що анонімна письменниця докладно розповідає, яким обмеженням жінки піддаються в нашому суспільстві, а також критикує «шлюбний ринок», труднощі своїх сучасниць та класове розшарування суспільства."
  flavor_eng.246.a: "Життя без гумору вкрай тужливе."
  flavor_eng.246.tt1: "З'явиться [Concept('character', 'персонаж')|e] [jane_austen.GetNameWithNoTooltip]"
  flavor_eng.246.b: "Леді це не личить."
  flavor_eng.246.historical_info: "Джейн Остін — письменниця, що прославилася своїми творами в жанрі романтики. Вважається однією з найвідоміших авторок в історії англійської літератури. Всесвітню славу здобула завдяки своїм шести романам. Остін — самоучка: оскільки в той час жінкам складно було здобувати освіту, юність вона провела за вивченням великої батьківської бібліотеки."
  flavor_eng.247.title: "«Гордість і упередження»"
  flavor_eng.247.desc: "Загадкова Леді знову продемонструвала свій літературний талант, випустивши черговий роман. Літературні критики прийняли його прихильно, проте народ не поспішає змітати книгу з полиць. Втім, можливо, майбутні покоління гідно оцінять дотепні та проникливі зауваження про сучасне суспільство та його звичаї."
  flavor_eng.247.a: "Просто неможливо відірватися."
  flavor_eng.247.b: "Нудно та непримітно."
  flavor_eng.247.historical_info: "«Гордість і упередження» — класичний роман Джейн Остін, що описує життя та любовні пошуки Елізабет Беннет, однієї з п'яти дочок скромного сімейства Беннетів, що живе в сільській місцевості. У романі піднімаються такі теми, як суспільне розшарування, шлюб та наслідки поспішно прийнятих рішень. Твір не відразу здобув популярність — лише згодом він став вважатися чудовою класикою та одним з найкращих романів письменниці."
  flavor_eng.248.title: "Вакцина на основі коров'ячої віспи"
  flavor_eng.248.desc: "#L [ROOT.GetCountry.GetAdjective]ий#! лікар розробив новий спосіб лікування віспи — страшного захворювання, що забрало за останні кілька століть багато тисяч життів. З'ясувалося, що люди, спеціально заражені схожою хворобою (в даному випадку — коров'ячою віспою, яка небезпечна для худоби), набувають деякого імунітету.\n\nНа основі цього відкриття можна розробити нові методи запобігання хворобі. Сам лікар називає свій винахід вакциною — від #L [latin.GetName|l]ого#! слова #italic  vacca#!, тобто «корова»."
  flavor_eng.248.a: "Цим відкриттям потрібно поділитися зі світом."
  flavor_eng.248.tt1: "#TOOLTIP:BUILDING_TYPE,royal_society,X #L Королівське товариство#!#!#! опублікує відкриття в часописі «Філософські праці Королівського товариства». Вони викличуть широкий інтерес"
  flavor_eng.248.tt2: "Про відкриття стане відомо лікарям, воно викличе певний інтерес"
  flavor_eng.248.b: "Яке святотатство."
  flavor_eng.248.historical_info: "Англійський лікар Едвард Дженнер помітив, що доярки, які заразилися коров'ячою віспою, набувають імунітету до звичайної віспи. Щоб підтвердити свої спостереження, він провів експеримент: взявши вміст пустули у зараженої доярки, Дженнер втер його в руку піддослідного хлопчика. Після того як організм хлопчика поборов інфекцію, йому прищепили справжню віспу, проте піддослідний так і не захворів."
  flavor_eng.249.title: "Художник промислових масштабів"
  flavor_eng.249.desc: "Портретист [godfrey_kneller.GetName], що побачив світ, шукає собі покровителів на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — тут він хоче відкрити художню академію. Своїх учнів художник, обіцяючи неодмінно передати їм свої знання, навчатиме працювати за новою шаблонною методикою, яка покликана прискорити написання портретів. Потенційних покровителів же Неллер запевняє, що такий підхід анітрохи не позначиться на якості картин."
  flavor_eng.249.a: "Похвальний задум."
  flavor_eng.249.tt1: "З'явиться [Concept('character', 'персонаж')|e] [godfrey_kneller.GetNameWithNoTooltip]"
  flavor_eng.249.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені тим, що писати портрети видатних людей стане єретик — це суперечить [Concept('policy', 'політиці')|e] #TOOLTIP:POLICY,strict_censorship,X #L «Сувора цензура»#!#!"
  STATIC_MODIFIER_NAME_industrial_painter: "Художник промислових масштабів"
  flavor_eng.249.b: "Спалити його за єресь!"
  flavor_eng.249.tt3: "#TOOLTIP:POLICY,de_heretico_comburendo,X #L #italicDe Heretico Comburendo#!#! вимагатиме спалення єретиків"
  flavor_eng.249.c: "Він занапастить своє ремесло."
  flavor_eng.249.tt4: "[godfrey_kneller.GetNameWithNoTooltip] відмовиться від меркантильного підходу"
  flavor_eng.249.d: "Геть з наших очей."
  flavor_eng.249.historical_info: "Гофрі Неллер — німецький художник, який обіймав при англійському дворі посаду головного портретиста. Навчався в Амстердамі та Римі. У 1676 році переїхав до Англії, де заснував художню академію і тим самим зробив значний внесок у розвиток образотворчого мистецтва. Згодом був посвячений у лицарі."