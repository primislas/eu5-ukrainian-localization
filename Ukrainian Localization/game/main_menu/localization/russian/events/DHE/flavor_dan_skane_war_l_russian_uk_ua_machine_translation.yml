l_russian:
  flavor_dan_skane_war.1.title: "[target_character.GetNameWithNoTooltip] підіймає заколот"
  flavor_dan_skane_war.1.desc: "[target_character.GetName] — досточтимий муж, якого поважає вся [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] — виявився замішаним у змові проти нашого #L [GetCountry('SWE').GetAdjective|l]ого#! сюзерена. Причини його невдоволення зрозумілі: [target_ruler.GetName|l] частенько нехтує інтересами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [GetCountry('SWE').GetCulture.GetNameWithNoTooltip]а знать для [Select_CString(target_ruler.IsFemale,'неї', 'нього')] важливіша за всіх. Останні вісті з #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#! грають нам на руку. Можливо, настав час заявити про нашу вірність #L [GetCountry('DAN').GetAdjective|l]ій#! країні?"
  flavor_dan_skane_war.1.a: "Виженемо його на територію [GetCountry('DAN').Custom('CL_GEN')]."
  flavor_dan_skane_war.1.b: "Підтримаємо його заколот."
  flavor_dan_skane_war.1.b.tt: "За цим може послідувати приєднання нашої країни до #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_DAT')|L]#!#!."
  flavor_dan_skane_war.2.title: "[target_character.GetNameWithNoTooltip] пропонує свої послуги"
  flavor_dan_skane_war.2.desc: "[target_character.GetName] повернувся з #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#!, де він боровся за #L [ROOT.GetCountry.GetAdjective|l]у#! владу над #TOOLTIP:AREA,skaneland_area,X #L Сканією#!#!. Якщо ми запросимо його до двору, то він зможе налагодити відносини з #TOOLTIP:CULTURE,$danish_tt$,X #L данськими#!#! дворянами, що проживають у #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_PREP')|L]#!#!."
  flavor_dan_skane_war.2.a: "Ми із задоволенням запросимо його!"
  flavor_dan_skane_war.2.a.tt: "Коли прийде час, ми зможемо розраховувати на [GetCountry('SKE').GetAdjectiveWithNoTooltip]у підтримку"
  flavor_dan_skane_war.2.b: "Нам не потрібна допомога."
  flavor_dan_skane_war.3.title: "Повернення [GetCountry('SKE').Custom('CL_GEN')] у лоно родини"
  flavor_dan_skane_war.3.desc: "[GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')] #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! знову прислухалися до голосу розуму і вирішили, що їх [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'законною правителькою має', 'законним правителем має')] стати [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. [GetCountry('SWE').GetLongName] — влада цієї країни, звісно, буде в люті, але ми не бачимо особливих причин відкладати коронацію."
  flavor_dan_skane_war.3.a: "Знаменний день!"
  flavor_dan_skane_war.3.b: "Нам не потрібна ця корона."
  flavor_dan_skane_war.4.title: "[GetCountry('SKE').GetNameWithNoTooltip] і [GetCountry('DAN').GetNameWithNoTooltip] знову разом"
  flavor_dan_skane_war.4.desc: "Підступні [GetCountry('SKE').GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_GEN')|L]#!#! разом із владою #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#! вирішили покласти край нашому правлінню в #TOOLTIP:AREA,skaneland_area,X #L Сканії#!#!. Якщо ми терміново щось не зробимо, то втратимо цю територію. Можливо, назавжди."
  flavor_dan_skane_war.4.a: "Це обурливо!"
  flavor_dan_skane_war.5.title: "Пропозиція про купівлю [GetCountry('SKE').Custom('CL_GEN')]"
  flavor_dan_skane_war.5.desc: "Повстання, яке [Select_CString(target_character.IsFemale,'підняла', 'підняв')] [target_character.GetName], не принесло бажаних результатів: відкритих заколотів більше не було, однак напруга між #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#! нікуди не поділася.\n\nЩоб уникнути кровопролиття та забезпечити мир у #TOOLTIP:REGION,scandinavian_region,X #L Скандинавії#!#!, ми повинні викупити Сканію у #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_GEN')|L]#!#!."
  flavor_dan_skane_war.5.a: "Висунемо цю пропозицію."
  flavor_dan_skane_war.5.a.tt: "Як плату за [GetCountry('SKE').Custom('CL_ACC')] ми запропонуємо наш шестимісячний дохід. Якщо влада #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_GEN')|L]#!#! погодиться, Сканія стане нашим васалом"
  flavor_dan_skane_war.5.b: "Нас це більше не цікавить."
  flavor_dan_skane_war.6.title: "Влада [GetCountry('DAN').Custom('CL_GEN')] пропонує купити [GetCountry('SKE').Custom('CL_ACC')]"
  flavor_dan_skane_war.6.desc: "[GetCountry('DAN').GetName] хоч[GetCountry('DAN').Custom('end_eut')] купити у нас права на володіння #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#!. Якщо ми приймемо цю пропозицію, то отримаємо багато золота, яке зможемо витратити на свої потреби, але втратимо безпосередній вихід до #TOOLTIP:LOCATION,oresund,X #L Ересунну#!#!."
  flavor_dan_skane_war.6.a: "Ми приймаємо пропозицію!"
  flavor_dan_skane_war.6.b: "Відхилимо пропозицію!"
  flavor_dan_skane_war.7.title: "Влада [GetCountry('SWE').Custom('CL_GEN')] приймає нашу пропозицію"
  flavor_dan_skane_war.7.desc: "[GetCountry('SWE').GetName] погодил[GetCountry('SWE').Custom('end_assya')] продати нам права на володіння #ONCLICK:COUNTRY,[GetCountry('SKE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SKE').Custom('CL_tt')],X [GetCountry('SKE').Custom('CL_INST')|L]#!#!. Хоча низка формальностей поки не виконана, договір вже ратифікований і набув чинності."
  flavor_dan_skane_war.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"