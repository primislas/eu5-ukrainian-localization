l_russian:
  flavor_glh.1.title: "Татарське ярмо"
  flavor_glh.1.desc: "Після успішного вторгнення на руські землі ми підкорили собі тих, хто добровільно впустив війська #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! у свої поселення. Щоб зберегти контроль над #TOOLTIP:CULTUREGROUP,russian_group,X #L руськими#!#! князівствами, ми створили складну систему, за якої наші піддані повинні будуть щорічно надавати нам данину у вигляді грошей та вояків. Це дозволить зміцнити нашу владу та запобігти можливим повстанням.\n\nКрім того, ми вигадали особливий титул — [GetUniqueInternationalOrganization('tatar_yoke').GetLeaderTitle|l]. Ми даруємо його одному з місцевих правителів, щоб той від нашого імені збирав данину з решти підданих. Так ми зможемо стравлювати їх між собою, що завадить їм об'єднатися проти нас."
  flavor_glh.1.a: "Головне — тримати їх у вузді."
  flavor_glh.1.tt: "[target_root_country.GetName] мо[target_root_country.Custom('end_gegu')]же на прохання обрати нового #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L великого князя володимирського#!#!, головувати над яким буде [tatar_yoke.GetName|l]"
  flavor_glh.1.historical_info: "Татарським ярмом називається система залежності Східної Європи від Золотої Орди, яка вторглася в регіон у XIII столітті та підкорила собі низку східнослов'янських князівств. Татаро-монголи збирали з цих земель данину, яка могла обчислюватися як у сріблі, так і в вояках для орди. Ця залежність зберігалася до XV століття, після чого Золота Орда занепала, а Русь остаточно звільнилася від татарського ярма."
  flavor_glh.2.title: "[target_root_country.GetGovernment.GetRuler.GetShortNameWithNoTooltip] Калита"
  flavor_glh.2.desc_kalita_the_tax_collector: "Перебуваючи під #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарським ярмом#!#! #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#!, [target_root_country.GetGovernment.GetRuler.GetName|l], вірно служить нам, збираючи данину з наших підданих у руських землях. Ба більше, коли ми висунули ідею збільшити розмір виплат, #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#! сам зголосився допомогти нам у цій справі та переконати решту данників зібрати потрібну суму. Подібна ініціатива безумовно заслуговує на нагороду, тому він може розраховувати на збереження свого титулу та всіх відповідних привілеїв."
  flavor_glh.2.desc_discovered_treachery: "Нещодавно стало відомо, що, перебуваючи під #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарським ярмом#!#! #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#!, [target_root_country.GetGovernment.GetRuler.GetName|l], [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'приховувала', 'приховував')] від нас цінну інформацію. Виявляється, наші піддані цілком можуть виплачувати щедрішу данину, однак, попри надану [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] довіру, #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#! не [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'повідомила нам про це і не стала', 'повідомив нам про це і не став')] збирати додаткові кошти. Таку зраду не можна залишати безкарною! Мабуть, нам варто передати [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'її', 'його')] титул та привілеї комусь іншому."
  flavor_glh.2.desc: "Пройшов слух, що, перебуваючи під #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарським ярмом#!#! #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь володимирський#!#!, [target_root_country.GetGovernment.GetRuler.GetName|l], приховує від #TOOLTIP:CULTUREGROUP,tatar_group,X #L татар#!#! цінну інформацію. Схоже, [GetCountry('GLH').GetGovernment.GetRulerTitle|l] [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'планувала', 'планував')] збільшити розмір данини з наших земель, однак #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь володимирський#!#! [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'приховала', 'приховав')] дані про наше матеріальне становище і не [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'стала', 'став')] збирати додаткові кошти. Ми повинні бути вдячні [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] за цей подвиг і молитися, щоб про це ніхто не дізнався."
  flavor_glh.2.a: "Ми врахуємо цю відданість."
  flavor_glh.2.tt1: "[GetCountry('GLH').GetGovernment.GetRulerTitle] та #TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#! зміцнять взаємну довіру"
  STATIC_MODIFIER_NAME_kalita: "Калита"
  flavor_glh.2.b: "Ми нічого не забуваємо і не прощаємо…"
  flavor_glh.2.c: "Воістину, це шляхетний вчинок."
  flavor_glh.3.title: "Боротьба князів"
  flavor_glh.3.desc_direct_appeal_to_khan: "Правителі підлеглих нам князівств можуть займати престол лише в тому випадку, якщо хан дасть на це схвалення. Однак, попри те, що [target_root_country.GetGovernment.GetRuler.GetName|l] [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'отримала', 'отримав')] від нас право на князювання, на території #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! почалася боротьба за владу між [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'нею та її', 'ним та його')] родичем. У зв'язку з цим [target_root_country.GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'відправила', 'відправив')] до нас посла з проханням знову підтвердити [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'її', 'його')] призначення."
  flavor_glh.3.desc_endorses_ruler: "[GetCountry('GLH').GetGovernment.GetRulerTitle] [GetCountry('GLH').GetGovernment.GetRuler.GetName|l] [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'оголосила', 'оголосив')], що [target_root_country.GetGovernment.GetRuler.GetName|l] зберігає [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'її', 'його')] прихильність і залишається [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'законною правителькою', 'законним правителем')] #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!."
  flavor_glh.3.desc_endorses_pretender: "[GetCountry('GLH').GetGovernment.GetRulerTitle] [GetCountry('GLH').GetGovernment.GetRuler.GetName|l] [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'оголосила', 'оголосив')], що [target_root_country.GetGovernment.GetRuler.GetName|l] [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'втратила', 'втратив')] [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'її', 'його')] прихильність. Відтепер [Select_CString(pretender.IsFemale,'законною правителькою', 'законним правителем')] #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! є [pretender.GetName]."
  flavor_glh.3.a: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] отримає нашу підтримку."
  flavor_glh.3.tt1: "Ця дія знизить ймовірність початку війни за престол #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_glh.3.b: "Нехай [pretender.GetNameWithNoTooltip] візьме кермо влади."
  flavor_glh.3.tt2: "Ця дія може призвести до війни за престол #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_glh.3.c: "Ми ухвалимо це рішення."
  flavor_glh.1000.title: "Новий [ShowSpecialStatusNameWithNoTooltip('tatar_tax_collector')|l]?"
  flavor_glh.1000.desc: "[actor.GetName] просить пожалувати йому титул «[ShowSpecialStatusName('tatar_tax_collector')|l]», яким зараз володіє [old_tax_collector.GetName]. І хоча [GetInternationalOrganization('tatar_yoke').GetName|l] не оцінить такого порушення усталеної рівноваги, а [old_tax_collector.GetNameWithNoTooltip] стане ставитися до нас з більшою ворожнечею, все-таки над проханням слід поміркувати: можливо, новий князь охочіше виявлятиме нам відданість."
  flavor_glh.1000.a: "Ми милостиво пожалуємо новий титул."
  flavor_glh.1000.b: "[old_tax_collector.GetNameWithNoTooltip] подобається нам більше."