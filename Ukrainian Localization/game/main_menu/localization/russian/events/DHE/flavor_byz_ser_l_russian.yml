l_russian:
 flavor_byz_ser.1.title: "Могущественный деспот"
 flavor_byz_ser.1.entry: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.1.desc: "#L [ROOT.GetCountry.GetAdjective]ая#! провинция [ShowProvinceDefinitionName('vardar_province')] находится во власти могущественного магната по имени [target_character.GetName], чья слава и влияние позволили [Select_CString(target_character.IsFemale, 'ей', 'ему' )] стать практически [Select_CString(target_character.IsFemale, 'независимой правительницей', 'независимым правителем' )]. Пока что [Select_CString(target_character.IsFemale, 'она', 'он' )] сохраняет формальную преданность [ROOT.GetCountry.Custom('rank_ru_DAT')|l]. Однако столь богатые и влиятельные правители редко хранят верность сюзерену слишком долго.\n\nПо слухам, [target_character.GetNameWithNoTooltip] подумывает разорвать свои вассальные узы ради титулов [target_country2.Custom('endlong_predlog_vvo')] [target_country2.Custom('longname_ru_PREP')] или даже [target_country3.Custom('endlong_predlog_vvo')] [target_country3.Custom('longname_ru_PREP')]."
 flavor_byz_ser.1.a: "Подобное неповиновение лишь доказывает, почему [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'должна', 'должен' )] сосредоточить всю власть в своих руках."
 flavor_byz_ser.1.a.entry: "Подобное неповиновение лишь доказывает, почему власть должна быть сосредоточена в руках правителя."
 flavor_byz_ser.1.b: "Мы должны заручиться [Select_CString(target_character.IsFemale, 'её', 'его' )] преданностью."
 flavor_byz_ser.1.b.entry: "Мы должны заручиться его преданностью."
 flavor_byz_ser.2.title: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.2.entry: "$flavor_byz_ser.2.title$"
 flavor_byz_ser.2.desc: "Провинция [ShowProvinceDefinitionName('vardar_province')], когда-то принадлежавшая могущественной державе под названием [ROOT.GetCountry.GetLongName], уже долгое время пребывает под властью варваров. Теперь же, спустя многие десятилетия, у нас появился шанс вернуть её благодаря помощи неожиданного союзника.\n\n#L [target_country.GetAdjective]ий#! магнат по имени [target_character.GetName] правит #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_INST')|L]#!#! и, похоже, [Select_CString(target_character.IsFemale, 'сама', 'сам' )] себе на уме. Формально [Select_CString(target_character.IsFemale, 'она', 'он' )] сохраняет преданность [target_country.Custom('longname_ru_wntt_DAT')], однако наши шпионы сообщают, что [Select_CString(target_character.IsFemale, 'её', 'его' )] верность изменчива и [Select_CString(target_character.IsFemale, 'её', 'его' )] можно переманить на нашу сторону с помощью некоторой хитрости."
 flavor_byz_ser.2.a: "Осыпем [Select_CString(target_character.IsFemale, 'её', 'его' )] золотом!"
 flavor_byz_ser.2.a.entry: "Осыпать его золотом!"
 flavor_byz_ser.3.title: "$flavor_byz_ser.1.title$"
 flavor_byz_ser.3.entry: "$flavor_byz_ser.3.title$"
 flavor_byz_ser.3.desc: "[target_character.GetName], ранее [Select_CString(target_character.IsFemale, 'отличившаяся', 'отличившийся' )] в кровавой #L [target_country2.GetAdjective|l]ой#! гражданской войне, [Select_CString(target_character.IsFemale, 'приобрела', 'приобрёл' )] значительную власть и влияние [ROOT.GetCountry.Custom('end_predlog_vvo')] #L [ROOT.GetCountry.GetAdjective|l]ой#! провинции [ShowProvinceDefinitionName('vardar_province')]. Несмотря на то, что [Select_CString(target_character.IsFemale, 'она', 'он' )] остаётся #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#! #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'её', 'его' )] правление практически ничем не ограничено благодаря #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L децентрализации#!#! [target_country.Custom('CL_GEN')]. [Select_CString(target_character.IsFemale, 'Она', 'Он' )] [target_character.GetSheHe] может стать самой влиятельной фигурой в регионе."
 flavor_byz_ser.3.a: "Власть развращает, а деспотическая власть развращает деспотически."
 SER_threat_of_secession: "Если в начале #W 1341#! года [Concept('subject_loyalty', 'лояльность ленника')|e] у #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_GEN')|L]#!#! составит менее #Y 50%#!, он сможет уйти от своего предыдущего сюзерена и стать #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#! #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#!"
 SMC_player: "Поскольку #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_INST')|L]#!#! управляет игрок, окончательное решение полностью зависит от его выбора в соответствующем [Concept('event', 'событии')|e]"
 BYZ_threat_of_secession: "Если в начале #W 1341#! года [Concept('subject_loyalty', 'лояльность ленника')|e] у #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_GEN')|L]#!#! составит менее #Y 50%#!, он сможет уйти от своего предыдущего сюзерена и стать #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#! #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
 SMC_threat_of_secession: "В #W 1341#! году мы сможем стать #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#! #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#!. В зависимости от нашего уровня [Concept('subject_loyalty', 'лояльности ленника')|e], выбор в пользу того или иного сюзерена может привести к снижению [Concept('stability', 'стабильности')|e]"
 flavor_byz_ser.4.title: "Момент истины"
 flavor_byz_ser.4.entry: "$flavor_byz_ser.4.title$"
 flavor_byz_ser.4.desc: "За прошедшие годы [ROOT.GetCountry.GetAdjective|l]ий#! [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] неоднократно [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'принимала', 'принимал' )] #L [target_country2.GetAdjective|l]их#! посланников. Они хотят вбить клин между нами и #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!, надеясь толкнуть нас в объятия [target_country2.Custom('rank_ru_GEN')|l] у наших южных границ. Однако мы насквозь видим их интриги и не поддадимся на подобные пустые увещевания. В конечном счёте всё зависит от нас. Вне зависимости от того, какую сторону мы примем, это решение определит судьбу #TOOLTIP:REGION,balkan_region,X #L Балкан#!#! на многие годы вперёд."
 flavor_byz_ser.4.a: "Никому не позволено сомневаться в нашей верности."
 flavor_byz_ser.4.b: "Пришло время что-то менять."
 flavor_byz_ser.5.title: "Судьба [origin_country.Custom('longname_ru_wntt_GEN')]"
 flavor_byz_ser.5.desc: "Несмотря на все слухи о #L [origin_country.GetAdjective|l]ой#! нелояльности, оказалось, что узы #TOOLTIP:CULTURE,$serbian_tt$,X #L сербской#!#! крови, связывающие магнатов и #L [target_country.GetAdjective|l]ую#! державу, сильнее алчности… Даже невзирая на #L [target_country2.GetAdjective|l]ое#! вмешательство, [origin_country.GetGovernment.GetRulerTitle|l] [origin_country.Custom('CL_GEN')] не [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'изменила', 'изменил' )] своего мнения — [origin_country.GetNameWithNoTooltip] остан[origin_country.Custom('end_etut')]ся частью [target_country.Custom('longname_ru_wntt_GEN')]."
 flavor_byz_ser.5.byz: "И всё же однажды мы вернём себе утраченное…"
 flavor_byz_ser.5.ser: "Ожидаемо."
 flavor_byz_ser.6.title: "$flavor_byz_ser.5.title$"
 flavor_byz_ser.6.desc: "Между #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! и [target_country2.Custom('longname_ru_INST')] вспыхнул дипломатический конфликт, в ходе которого произошло нечто поистине необычное! Лорды #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_GEN')|L]#!#! перешли на сторону [target_country2.Custom('longname_ru_wntt_GEN')], присягнув врагам своих прежних повелителей. Редко какой магнат осмеливается предать своего сюзерена!\n\n[origin_country.GetGovernment.GetRulerTitle] [origin_country.Custom('CL_GEN')] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'решила', 'решил' )] судьбу провинции [ShowProvinceDefinitionName('vardar_province')] — [origin_country.GetNameWithNoTooltip] больше не склон[origin_country.Custom('end_ityat')]ся перед [target_country.Custom('CL_INST')], поскольку будущее этой державы отныне связано [target_country2.Custom('end_predlog_sso')] [target_country2.Custom('CL_INST')]."
 flavor_byz_ser.6.byz: "Они сделали мудрый выбор."
 flavor_byz_ser.6.ser: "Кое-кто за такое поплатится!"
 SMC_remains_vassal_of_serbia: "[origin_country.GetName] остан[origin_country.Custom('end_etut')]ся #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#! #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!"
