l_russian:
  flavor_bri.1.title: "Catholicon Armoricum"
  flavor_bri.1.desc: "У 1464 році Жан Лагадек видав перший тримовний латинсько-бретонсько-французький словник. Звершення це вражаюче тим, що раніше ніхто не видавав словники бретонською чи французькою мовами. Розповсюдивши в народі копії Catholicon Armoricum, ми покажемо всім, що бретонська мова за значущістю нічим не поступається французькій."
  flavor_bri.1.a: "Це піде на користь всій Бретані!"