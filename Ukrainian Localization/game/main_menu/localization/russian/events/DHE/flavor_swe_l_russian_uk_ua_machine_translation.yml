l_russian:
  flavor_swe.1.title: "Спроба централізації"
  flavor_swe.1.desc: "Наші жадібні погляди звернені на #TOOLTIP:AREA,skaneland_area,X #L Сконе#!#! та #TOOLTIP:PROVINCE_DEFINITION,gotland_province,X #L Готланд#!#!. Захоплення цих багатих регіонів дозволило б нам контролювати торгівлю на Балтиці та зміцнити вразливий південний кордон, не кажучи вже про міжнародний престиж. Можливо, нам час скинути #TOOLTIP:CULTURE,$danish_tt$,X #L данське#!#! ярмо та повернути землі, що по праву належать #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!…"
  flavor_swe.1.historical_info: "Зійшовши на шведський трон, Густав Ваза зіткнувся з величезним списком проблем, які здавалися нерозв'язними. Країна була у величезному боргу перед Ганзою (яка погрожувала підтримати спроби Данії відновити унію), аристократи не відрізнялися надійністю, а армія та флот — боєздатністю. Але найгірше було нерівномірне розподілення земель. Коронні володіння були занадто малі, щоб податки з них могли забезпечити існування країни. Король впорався з цим викликом: непопулярні заходи та кропітка робота над вирішенням безлічі дрібних проблем допомогли йому поставити країну на ноги. На початку свого правління Густав також намагався забрати Сконе та Готланд у Данії за підтримки Ганзи. Йому це не вдалося, але претензії на ці території були заявлені…"
  flavor_swe.1.a: "Проведемо реформи та повернемо наші землі!"
  swe_claims_skane: "Претензії на Сконе"
  swe_claims_gotland: "Претензії на Готланд"
  flavor_swe.1.b: "Нехай усе залишиться як є."
  flavor_swe.2.title: "Повстання Енгельбректа"
  flavor_swe.2.desc: "Якийсь дрібний дворянин з #TOOLTIP:PROVINCE_DEFINITION,dalarna_province,X #L Даларна#!#!, незадоволений корумпованими #TOOLTIP:CULTURE,$danish_tt$,X #L данськими#!#! властями, підняв заколот, який підтримали всі місцеві #TOOLTIP:CULTURE,$swedish_tt$,X #L шведи#!#!. Ми стоїмо перед вибором: прийнявши сторону данців, ми станемо ворогами для заколотників, а якщо ми підтримаємо їх самих, на нас обрушиться гнів нашого правлячого класу. Ми повинні ретельно обміркувати наступний крок…"
  flavor_swe.2.historical_info: "Легендарна та загадкова постать Енгельбректа Енгельбректссона займає важливе місце в середньовічній історії Швеції. У 1434 році жителі шведської Даларна остаточно втомилися терпіти побори та жорстокість намісників чужоземного короля Еріка. Під проводом Енгельбректа місцеві селяни та рудокопи за підтримки церкви та частини дворянства підняли відкрите повстання. Захоплюючи замок за замком, незабаром вони взяли під контроль більшу частину Швеції, а Ерік Пуке тим часом підтримав повстання у Фінляндії. Протягом двох років Енгельбрект фактично правив Швецією, але інтриги аристократів, а також внутрішні конфлікти з Еріком Пуке та Карлом Кнутссоном врешті-решт призвели до того, що він був убитий Монсом Бенгтссоном з роду Натт ох Даг."
  flavor_swe.2.a: "Енгельбрект убитий…"
  flavor_swe.2.b: "Збережемо унію."
  swe_supports_the_union: "Підтримка унії"
  flavor_swe.2.c: "Піднімемо смолоскип свободи!"
  swe_renounced_the_union: "Унія розірвана"
  flavor_swe.3.title: "Кальмарський рецес"
  flavor_swe.3.desc: "Один з найкрихкіших наших союзів дав тріщину. Заколот розгніваних селян наочно показав усі слабкі місця #TOOLTIP:CULTURE,$danish_tt$,X #L данської#!#! армії. Крім того, оскільки ця агресія виглядає прямим порушенням домовленостей, #TOOLTIP:CULTURE,$swedish_tt$,X #L шведські#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] тепер можуть розірвати раніше укладені угоди з урядом. Принаймні, у них є для цього гарний привід…"
  flavor_swe.3.historical_info: "Перемога шведів над Росією в 1497 році наочно показала данському королю Йоганну, майстру політичних інтриг, необхідність обмежити вплив шведського маршала Стена Стуре — старшого. Розбивши шведську армію при Ротебро, Йоганн увійшов до Стокгольма, де і був визнаний королем Швеції. Для цього, втім, йому довелося помилувати як самого Стуре, так і його повстанців. Ця подія увійшла в історію як «Кальмарський рецес». У 1500 році, після того як армія Йоганна зазнала нищівної поразки від збунтованих селян при Дітмаршені, Стен Стуре та шведське дворянство, що приєдналося до нього, відкинули Кальмарський рецес, заявивши, що король не дотримується умов угоди. Так почався поступовий розпад Кальмарської унії."
  flavor_swe.3.a: "Відкинемо Кальмарський рецес."
  swe_rejected_the_kalmar_recess: "Відкинули Кальмарський рецес"
  flavor_swe.3.b: "Треба дотриматися угоди."
  swe_honored_the_kalmar_recess: "Дотримано Кальмарський рецес"
  flavor_swe.4.title: "Вестероський парламент"
  flavor_swe.4.desc: "Розмірковуючи про шляхи розвитку нашої економіки, один підприємливий радник знайшов цікаве рішення. Як виявилося, правителі багатьох сусідніх країн надихнулися 95 тезами, які написав [GetCharacter('martin_luther').GetName], і прийняли нові догмати віри, що дозволили їм вилучати церковне майно на користь країни. Наслідувавши їхній приклад, ми не тільки наповнимо казну, а й суттєво зміцнимо свою владу."
  flavor_swe.4.historical_info: "У роки Війни за незалежність Швеції корона сильно заборгувала Ганзейському союзу. Густаву Вазі терміново потрібні були гроші, щоб розплатитися з впливовими купцями. На засіданні Вестероського парламенту влітку 1527 року король зробив перші кроки до навернення в протестантизм, насамперед зобов'язавши церкву «позичити» країні кошти у вигляді срібних кубків, дзвонів та інших цінностей. Реформація у Швеції тривала ще три десятиліття і супроводжувалася кількома повстаннями."
  flavor_swe.4.a: "Така істинна віра!"
  flavor_swe.4.b: "Ми прагнемо зовсім іншого…"
  flavor_swe.4.a.custom: "Багато [Concept('pops', 'груп населення')|e] в нашій країні перейдуть у #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!"
  flavor_swe.5.title: "[swe_joran_person.GetNameWithNoTooltip]"
  flavor_swe.5.desc: "Наш радник [swe_joran_person.GetName] [Select_CString(swe_joran_person.IsFemale, 'набула', 'набув' )] репутації особливо вірного та корисного союзника. Багато хто вважає [Select_CString(swe_joran_person.IsFemale, 'її', 'його' )] методи позбавленими смаку, але заради блага #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(swe_joran_person.IsFemale, 'вона готова', 'він готовий' )] без вагань піти на будь-які злодіяння. Така видатна відданість заслуговує нагороди."
  flavor_swe.5.historical_info: "Йоран Перссон був шведським державним діячем. На початку 50-х років XVI століття він вивчав право у Віттенберзькому університеті, після чого повернувся до Швеції з рекомендаційним листом від німецького богослова та реформатора Філіпа Меланхтона. Незабаром він зумів проявити себе при дворі та став найближчим радником короля Еріка XIV, а також головою королівської шпигунської мережі. Крім того, Перссон виконував роль прокурора і був особисто відповідальний за значну частину з трьохсот смертних вироків, винесених Верховним судом. Багато хто вважав його вельми підступною та безпринципною людиною, яка мала надто великий вплив на Еріка. Після повалення короля Перссон був заарештований аристократами та страчений, а потім його тіло четвертували та виставили на загальний огляд на Брункеберзькій площі у Стокгольмі."
  flavor_swe.5.a: "Прийняти його політику!"
  flavor_swe.5.b: "Відкинути його політику!"
  flavor_swe.6.title: "[swe_per_brahe_older.GetNameWithNoTooltip]"
  flavor_swe.6.desc: "За довгі роки служби [Select_CString(swe_per_brahe_older.IsFemale, 'радниця', 'радник' )] [swe_per_brahe_older.GetName] [Select_CString(swe_per_brahe_older.IsFemale, 'принесла', 'приніс' )] нашій країні чималу користь. Нам давно час відзначити [Select_CString(swe_per_brahe_older.IsFemale, 'її', 'його' )] видатні заслуги. Якщо ми дамо [Select_CString(swe_per_brahe_older.IsFemale, 'їй', 'йому' )] титул і посаду в уряді, це буде навіть корисніше для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, ніж для [Select_CString(swe_per_brahe_older.IsFemale, 'її', 'його' )] роду."
  flavor_swe.6.historical_info: "Пер Браге старший був шведським державним діячем і племінником короля Густава Вази. Браге користувався великою повагою у короля і відзначився при придушенні селянського повстання під проводом Нільса Дакке. За свою державну кар'єру Браге обіймав найрізноманітніші посади. Так, він виконував обов'язки наглядача Стокгольмського замку з 1540 року, а в 1544 році був удостоєний членства в Таємній раді. Під час коронації короля Еріка XIV у 1561 році Браге отримав у володіння графство Вісінгсборг, а зі сходженням на престол короля Юхана III він був призначений також риксдротсом Швеції та губернатором Норрланда."
  flavor_swe.6.a: "Чудовий міністр!"
  flavor_swe.7.title: "Валлонці [ROOT.GetCountry.Custom('predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')]"
  flavor_swe.7.desc: "Підприємливі #TOOLTIP:CULTURE,$walloon_tt$,X #L валлонські#!#! рудокопи та ковалі стікаються [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!, рятуючись від безробіття в сусідніх регіонах. Їхні чужоземні звичаї викликають неприязнь у багатьох, але такий приплив вправних майстрів здатен вдихнути нове життя в нашу металургійну галузь. Можливо, нам слід прийняти на поселення більше валлонських ремісників."
  flavor_swe.7.historical_info: "У 1614 році на півночі Швеції оселився валлонський підприємець Луїс де Гер — винахідник нових методів розробки залізної руди та будівник ливарних заводів. Він був не першим у своєму роді: валлонські ремісники з Ено, Брабанту та Люксембургу зазвичай рятувалися від бідності та безробіття саме у Швеції. Завдяки припливу майстрів роботи з металом та рудою наша промисловість відродилася, а якість сталі значно зросла, що пішло тільки на користь зброярам. Всього за кілька десятиліть Швеція стала великим постачальником сталі, гармат, міді та заліза."
  flavor_swe.7.a: "Підтримаємо валлонську імміграцію."
  flavor_swe.7.b: "Нам це не потрібно."
  flavor_swe.8.title: "Час військових реформ"
  flavor_swe.8.desc: "Попри свою ефективність, наша армія потребує реформ. Нещодавно один з наших високопоставлених чиновників запропонував нову систему комплектування військ, за якої рекрути з одного регіону включаються до складу одного підрозділу — так званого «полку». Передбачається, що спільне коріння підвищить згуртованість таких полків і спонукає солдатів берегти один одного. Оснащення та тактика військ теж могли б стати гнучкішими… Так, настав час зробити нашу армію сучаснішою та пристосованішою до унікальних особливостей #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!!"
  flavor_swe.8.historical_info: "На початку XVII століття шведський король Густав Адольф провів суттєві реформи, спрямовані на побудову професійної армії. Так, солдати на службу тепер призивалися з одних і тих же поселень — міст, сіл, селищ тощо, а тому відрізнялися міцним почуттям ліктя та згуртованістю, чим не могли похвалитися, наприклад, багато найманих армій того часу. Щоб посилити вогневу міць стрільців, король запровадив ширші шикування, одночасно зменшивши їх глибину. Було також впроваджено взаємне навчання між різними родами військ та запроваджено легку рухому артилерію. Шведська армія відмовилася від важких гармат та повільних терцій, зробивши акцент на вогневу міць та рухливість."
  flavor_swe.8.a: "Тільки вперед!"
  flavor_swe.8.b: "Мабуть, не варто…"
  flavor_swe.9.title: "Загибель «Вази»"
  flavor_swe.9.desc: "Величезний військовий корабель «Ваза» наповнив гордістю серця всіх жителів нашої країни. Він не знав собі рівних у світі, виблискував вишуканими прикрасами та ніс на борту цілих шістдесят чотири гармати. Коли цей величний гігант вперше розправив вітрила, гавань огласили захоплені крики. \n\nОднак плавання «Вази» тривало лише кілька хвилин. Величезний корабель, перевантажений різьбленими фігурами та бронзовими знаряддями, нахилився від легкого пориву вітру — і вода негайно залила його нижню гарматну палубу. На жах усіх свідків, «Ваза» лягла на дно всього за кілька сотень футів від берега."
  flavor_swe.9.historical_info: "Шведський бойовий корабель «Ваза» — один з найбільших та найбільш важкоозброєних кораблів свого часу — мав стати втіленням військової та політичної могутності Швеції та влади короля-солдата Густава Адольфа. Будівництво «Вази» тривало з 1626 по 1628 роки. Корона не шкодувала жодних коштів на прикрашання та оснащення майбутнього 64-гарматного флагмана, проте перше ж плавання 10 серпня 1628 року закінчилося катастрофою: корабель наповнився водою та затонув біля острова Бехкольмен, не пройшовши й однієї морської милі. Згодом виявилося, що центр ваги був розташований занадто високо, а баласту на багатогарматній «Вазі» було занадто мало."
  flavor_swe.9.a: "Ми втратили обличчя!"
  flavor_swe.10.title: "[swe_per_brahe_younger.GetNameWithNoTooltip]"
  flavor_swe.10.desc: "[swe_per_brahe_younger.GetName] належить до числа видатних державних діячів завдяки широкому кругозору, чудовій освіті та значному військовому досвіду. [Select_CString(swe_per_brahe_younger.IsFemale, 'Вона', 'Він' )] вже обіймає гідну посаду в палаці, але на вищій посаді [Select_CString(swe_per_brahe_younger.IsFemale, 'могла', 'міг' )] б принести ще більше користі нашій країні. В наших інтересах буде посприяти [Select_CString(swe_per_brahe_younger.IsFemale, 'її', 'його' )] кар'єрі."
  flavor_swe.10.historical_info: "Пер Браге молодший був шведським державним і військовим діячем. Після навчання за кордоном він став камергером при Густаві II Адольфі, у 1626–1628 роках брав участь у війні з Польщею, а потім супроводжував короля до Німеччини на першому етапі Тридцятилітньої війни. Пер Браге також був членом Таємної ради та очолював мирні переговори з Польщею у 1635 році. Через два роки після цього його було призначено генерал-губернатором Фінляндії, а в 1641 році — риксдротсом. Його внесок у розвиток Фінляндії включав створення поштової системи та заснування кількох міст, включно з Тавастехусом і Нюслотом. Крім того, він відіграв важливу роль у заснуванні Королівської академії в Або."
  flavor_swe.10.a: "Чудовий міністр!"
  flavor_swe.11.title: "[swe_magnus_de_la_gardie.GetNameWithNoTooltip]"
  flavor_swe.11.desc: "Шляхетний герой війни [swe_magnus_de_la_gardie.GetName] користується особливою любов’ю наших підданих. [Select_CString(swe_magnus_de_la_gardie.IsFemale, 'Її', 'Його' )] висхідна зірка здатна осяяти всі землі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Будемо сподіватися, що вона ще не скоро опуститься за обрій…"
  flavor_swe.11.historical_info: "Магнус Делагарді, син фельдмаршала Якоба Делагарді, народився 15 жовтня 1622 року в Таллінні. Він здобув чудову освіту і якийсь час жив у Франції та Нідерландах. У 1643 році Делагарді повернувся до Швеції, де під командуванням фельдмаршала Густава Горна взяв участь у Торстенссонській війні проти Данії. Якийсь час він був фаворитом королеви Христини, доки не втратив її прихильності. У роки царювання свого шурина — Карла X Густава він дослужився до генерал-лейтенанта і став командувати військами у війнах з Польщею та Росією. Після смерті Карла X у 1660 році Делагарді був призначений до регентської ради при малолітньому Карлі XI. Редукції, які згодом провів новий король, сильно вдарили по Делагарді, і 26 квітня 1686 року той помер."
  flavor_swe.11.a: "Чудовий міністр!"
  flavor_swe.12.title: "Торговельні реформи"
  flavor_swe.12.desc: "У поточній економічній ситуації ми маємо два можливі шляхи реформ. Ми можемо прийняти політику меркантилізму, яка дасть уряду більше коштів і важелів впливу, а можемо дозволити вільну торгівлю та експорт сировини. Другий варіант істотно прибутковіший, але менш привабливий для вищого суспільства. Нам слід ретельно обміркувати свій вибір."
  flavor_swe.12.historical_info: "У першій половині XVII століття Швеція, яка нещодавно увійшла до числа великих держав Європи, прагнула перетворити свою торгівлю так само дієво, як і армію. Зразком для наслідування для шведських купців стали іноземні підприємці (переважно з Нідерландів, наприклад Луйс де Гер), які мали серйозну ділову хватку. На якийсь час корона навіть прислухалася до слів голландців, які переконували її в прибутковості колоніалізму, проте швидко закинула ці починання, віддавши перевагу зосередженню на підкоренні континенту. Не вийшло у неї і стати процвітаючою торговою країною: меркантилістський уряд, який постійно потребував грошей, нерідко втручався у справи купців."
  flavor_swe.12.a: "Приймемо політику меркантилізму."
  flavor_swe.12.b: "Дозволимо вільну торгівлю."
  flavor_swe.13.title: "Абсолютизм"
  flavor_swe.13.desc: "Нещодавні політичні проблеми показали крайню слабкість нашої державної адміністрації. І ось, найвпливовіші представники двору зібралися, щоб обрати подальший шлях: довірити монарху абсолютну владу або змусити його радитися з [ROOT.GetCountry.Custom('parliament_ru_INST')|l] перед прийняттям будь-яких рішень. Обміркуйте все як слід: якщо ми помилимося з вибором, ця криза може остаточно зруйнувати країну."
  flavor_swe.13.historical_info: "Після катастрофічної поразки у війні 1674–1679 років, куди Швецію втягнула Франція, король Карл XI та значна частина шведських чиновників твердо усвідомили необхідність змін. На двох засіданнях парламенту, що пройшли у 1680–1682 роках, король без особливого опору прийняв на себе одноосібну владу над країною. Йому більше не потрібно було прислухатися ні до парламенту, ні до королівської ради. Так у Швеції почалася епоха каролінгського абсолютизму. Король, за свою скромність і невибагливість прозваний «Сірим плащем», відповідав лише перед Богом."
  flavor_swe.13.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] має найвищу владу!"
  flavor_swe.13.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'повинна', 'повинен')] прислухатися до думки придворних…"
  flavor_swe.14.title: "[swe_axel_oxenstierna.GetNameWithNoTooltip]"
  flavor_swe.14.desc: "[swe_axel_oxenstierna.GetNameWithNoTooltip] посідає особливе місце серед наших радників, перевершуючи їх усіх як в управлінських талантах, так і в мистецтві дипломатії. Ми переконані, що [Select_CString(swe_axel_oxenstierna.IsFemale, 'її', 'його' )] чекає довга і славна кар'єра в уряді."
  flavor_swe.14.historical_info: "Аксель Оксеншерна народився 1583 року. Він розпочав свою державну кар'єру 1602 року, а з 1612 по 1654 рік обіймав посаду канцлера. За свою діяльність на цій посаді він увійшов в історію як один із найвидатніших керівників Швеції. Як і Карл IX, Оксеншерна був захоплений ідеями кальвінізму і навіть розглядав можливість хоча б часткового прийняття цієї віри. Будучи правою рукою Густава II Адольфа, спочатку він виступав проти планів короля втрутитися в Тридцятилітню війну, проте після смерті Густава в Лютцені 1632 року фактично взяв управління війною на себе і навіть зумів переконати католицьку Францію вступити в конфлікт на боці протестантів. Оксеншерна завжди уважно стежив за внутрішньою політикою, але втратив більшу частину свого впливу, коли королева Христина, всупереч його запереченням, зреклася престолу. Аксель Оксеншерна помер 1654 року незабаром після коронації короля Карла X Густава."
  flavor_swe.14.a: "Чудовий міністр!"
  flavor_swe.15.title: "Апеляційний суд"
  flavor_swe.15.desc: "З часів вікінгів правосуддя в нашій країні вершать місцеві суди. Ця система непогано справляється зі своїми завданнями на низовому рівні, але в масштабах країни призводить до юридичних протиріч: у кожному регіоні #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! діють власні унікальні закони та звичаї. Наша велика держава заслуговує на єдину судову систему, зрозумілу кожному і визнану всіма."
  flavor_swe.15.historical_info: "У 1614 році Густав Адольф заснував перший шведський апеляційний суд — Svea hovrätt. Цей інститут прийшов на зміну старим місцевим судам (tingsrätt). У сучасній Швеції налічується шість таких судів."
  flavor_swe.15.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_swe.16.title: "[swe_axel_oxenstierna.GetLastNameWithNoTooltip] і регентство"
  flavor_swe.16.desc: "Жодна з минулих регентських рад не служила інтересам країни повною мірою, проте її нинішній склад поставив [ROOT.GetCountry.Custom('rank_ru_ACC')|l] на межу катастрофи. Міністри, для яких [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] все ще щось значить, докладають величезних зусиль, щоб переконати інших відкласти вбік особисті амбіції. Якщо ми не вживемо заходів, непомірно жадібні аристократи розірвуть країну на шматки. Втім, можливо, нам слід у чомусь поступитися їм, щоб уникнути перевороту в майбутньому.\n\n[swe_axel_oxenstierna.GetName] має величезний досвід в управлінні, проте призначення регентом може запаморочити [Select_CString(swe_axel_oxenstierna.IsFemale, 'їй', 'йому' )] голову, тому ми повинні ретельно все обміркувати."
  flavor_swe.16.historical_info: "Новина про те, що 6 листопада 1632 року Густав Адольф загинув у битві при Лютцені, потрясла всю країну — навіть тих, хто очікував такого результату. Взяти на себе тягар управління країною був змушений Аксель Оксеншерна — верховний регент при шестирічній дочці короля Христині. Оксеншерна проявив себе блискучим правителем, проте серйозним тягарем для корони зокрема і для нижчого суспільства загалом стали аристократичні амбіції п'яти інших регентів, немислимі при покійному королі. Втім, один із них — Карл Карлссон Юллен'єльм, позашлюбний брат Густава і верховний адмірал — був значно менше стурбований особистим багатством і привілеями."
  flavor_swe.16.a: "Надамо знаті нові привілеї."
  flavor_swe.16.b: "Будемо чинити опір такій поведінці."
  flavor_swe.17.title: "Питання четвертинної редукції"
  flavor_swe.17.desc: "Приходячи до влади, наш нинішній правитель обіцяв полегшити податковий тягар для нижчих станів. Але щоб виконати ці обіцянки, нам треба знайти альтернативні джерела коштів для наших військових планів. Оскільки [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] майже нічого не платять, але при цьому володіють найкращими землями країни, вони могли б взяти цей тягар на себе, хоча й без особливої радості.\n\nУ цієї проблеми є три рішення, але всі вони однаково недосконалі. По-перше, ми можемо конфіскувати деякі землі та перетворити їх на джерело доходу для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої скарбниці. По-друге, ми можемо підняти податки для вищого суспільства, хоча це йде врозріз з усіма традиціями. По-третє, ми можемо просто виконати колишні обіцянки та дозволити подіям йти своїм чередом… доки не настануть неминучі наслідки."
  flavor_swe.17.historical_info: "На риксдазі 1650 року Карл Густав пообіцяв селянам і містянам зміни у випадку, якщо його визнають престолонаслідником. У 1654 році він змінив на шведському престолі королеву Христину. Перед новим королем тут же постало два зобов'язання: полегшити долю своїх підданих і поповнити державну скарбницю. Зробити це можна було двома способами: або провести редукцію, або зобов'язати дворянство виплачувати збільшені внески. З великою неохотою дворяни погодилися на проведення обмеженої редукції, адже збільшені внески — це все одно що податки, а аристократам не личить їх платити."
  flavor_swe.17.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate)] хочуть більше землі!"
  flavor_swe.17.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] платять більше."
  flavor_swe.17.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] — наші союзники."
  flavor_swe.18.title: "Міркування щодо четвертинної редукції"
  flavor_swe.18.desc: "Наші фінансові проблеми досягли критичної точки. Так далі тривати не може! Якщо ми не ухвалимо рішення, #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! чекає банкрутство. Або ми вилучаємо землі в аристократії та стикаємося з її гнівом, або залишаємо все як є і сподіваємося на краще. Обидва варіанти можуть призвести до тяжких наслідків, але щось зробити необхідно…"
  flavor_swe.18.historical_info: "Правління королеви Христини значно ускладнювалося конфліктами з членами ради, особливо з канцлером Акселем Оксеншерною. Втім, навіть попри опір королева посприяла укладенню в 1648 році Вестфальського миру та закінченню Тридцятилітньої війни. Христина була наполегливою людиною і всіма силами намагалася запобігти переростанню класової боротьби в громадянську війну. Однак вона була не всесильна — королева так і не змогла подолати фінансову кризу, спричинену довгою участю Швеції у війні. Вона була змушена визнати провал своїх реформ і звернутися по допомогу до Оксеншерни."
  flavor_swe.18.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate)] хочуть більше землі!"
  flavor_swe.18.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] — наші союзники."
  flavor_swe.19.title: "Питання регентства"
  flavor_swe.19.desc: "Перед смертю наш правитель склав для майбутнього регента докладний план, спрямований на збереження нинішньої політики сприяння нижчим станам та обмеження влади аристократії. Обраний [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle|l] присягнувся дотримуватися цього плану до останньої коми, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], звісно ж, від цього не в захваті. Якщо ми замінимо його прихильників на тих, хто здатен трактувати заповіт покійного монарха більш гнучко, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] стануть на наш бік, що дасть нам чималу перевагу."
  flavor_swe.19.historical_info: "На смертному одрі Карл X призначив регентів своєму синові, теж Карлу. Король не хотів, щоб після його смерті високопоставлені аристократи знову стали користуватися обширними свободами, як за Оксеншерни. Побоювання його були не марні: незабаром після смерті Карла X регентська рада і дворяни змістили найближчих прихильників короля — принца Адольфа Йоганна і Хермана Флемінга. На їхнє місце прийшли більш поступливі Ларс Кагг і Густав Бонде. Країна повернулася до положень 1634 року — її політика знову стала відповідати інтересам землеробської знаті."
  flavor_swe.19.a: "Раз [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вже не з нами, значить, і свиту час замінити."
  flavor_swe.19.b: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] спочиває з миром: заповіт буде виконано."
  flavor_swe.20.title: "Велика редукція"
  flavor_swe.20.desc: "Здавалося б, вище суспільство має підтримувати правителя, але #L [ROOT.GetCountry.GetAdjective|l]і#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] думають лише про власне благополуччя та вплив. Якщо не вжити заходів, їхні інтриги заради золота та влади здатні розірвати [ROOT.GetCountry.Custom('rank_ru_ACC')|l] на шматки.\n\nЧас нагадати їм, що лише [ROOT.GetCountry.GetReligion.GetGodName] вирішує, хто гідний правити #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, і наділяє монарха вищою та істинною владою. Ми повинні зміцнити свій авторитет настільки, щоб підкилимна боротьба, яку зараз ведуть [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], назавжди залишилася в минулому!"
  flavor_swe.20.historical_info: "Ставлення шведської знаті до королів XVI–XVII століть було неоднозначним і коливалося від прихильного до неприязного. У роки правління Густава Вази відмінності між багатим землеробом і аристократом були несуттєві; до старості короля, втім, обстановка була вже зовсім іншою. Ерік XIV тримав дворянство в їжакових рукавицях, а його брат Юхан вважав, що знаті потрібні ширші привілеї. Третій брат — майбутній король Карл IX — ненавидів аристократів, немов справжній революціонер, а тому пішов на нечуваний крок, оточивши себе людьми низького походження. Густав Адольф і Аксель Оксеншерна допомогли хитнути маятник у зворотний бік, наділивши аристократів землею та владою. Після воцаріння Карла XI вільне життя для знаті закінчилося: зазнавши в 1679 році принизливої військової поразки, король наказав провести масштабну редукцію, тобто вилучення земель, що належали дворянству, обмеження його в правах та скасування особливих привілеїв балтійських землевласників."
  flavor_swe.20.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] за все заплатять…"
  flavor_swe.20.b: "Ми домовимося про умови, які приймуть [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_swe.21.title: "Велике перетворення армії"
  flavor_swe.21.desc: "Колись військові витрати були для нас серйозною проблемою. Минулі правителі вирішували її, вилучаючи землі та вживаючи інших сумнівних заходів, але ми знайшли вихід, завдяки якому наші армії зможуть прогодувати себе самі. Тепер звичайні селяни отримають можливість утримувати солдатів в обмін на податкові послаблення та звільнення від військової служби. Крім усього іншого, ця система усуне існуючі класові бар'єри, згуртує лави та покладе край багатьом старим образам. Залишилося тільки офіційно втілити її в життя…"
  flavor_swe.21.historical_info: "Карл XI не відрізнявся здібностями до військової справи, притаманними його батькові та синові, проте на шведському престолі проявив себе великим перетворювачем та об'єднувачем. Крім проведення масштабної редукції земельних володінь аристократів та спроб централізувати країну король розробив систему індельти (indelningsverk), тобто поселеного утримання армії та флоту. Суть її зводилася до того, що кожному новобранцю надавалася ділянка землі (відібрана під час проведення редукції), де він міг жити та обробляти землю; урожай виступав як платня. Таким чином країна змогла утримувати велику армію не тільки у воєнний, а й у мирний час. Селяни, які брали на себе утримання призваного на службу вершника, його коня та спорядження, не підлягали призову і могли не сплачувати податки. Займатися утриманням одного солдата або матроса могло кілька дворів одночасно — від двох до п'яти. Солдати зводилися в роти по 150 осіб; кожен повіт був зобов'язаний виставити полк чисельністю в 1200 осіб. Одночасно з цим скасовувалися відмінності в походженні офіцерів: люди незнатного походження користувалися тими ж правами, що й дворяни."
  flavor_swe.21.a: "Проведемо реформу армії."
  flavor_swe.21.b: "Залишимо стару систему."
  flavor_swe.22.title: "Пієтизм і закон про молитовні зібрання"
  flavor_swe.22.desc: "Серед наших підданих набирає популярності новий релігійний рух. Спочатку його принесли до нас солдати, які побували у ворожому полоні, де вони були змушені самі проводити обряди. На жаль, більшість релігійних лідерів не схвалює подібної самодіяльності в питаннях богослужіння. Прийнявши закон, що забороняє приватні молитовні зібрання, ми отримаємо підтримку релігійної більшості, але вступимо в конфлікт зі прихильниками нової віри."
  flavor_swe.22.historical_info: "Пієтизм — релігійний рух, що склався в Німеччині до кінця XVII століття. Прийнято вважати, що причиною цього послужила повальна схильність протестантів, особливо лютеран, до інтелектуалізму. У Швеції пієтизм став поширюватися після повернення на батьківщину шведських солдатів, полонених під Полтавою та вивезених до Тобольська, де вони були змушені самостійно проводити лютеранські меси. Однак Шведська лютеранська церква не схвалювала подібні практики, а тому в 1726 році був прийнятий закон про молитовні зібрання, що забороняв проводити релігійні зібрання де-небудь, крім будівель, що належали церкві Швеції."
  flavor_swe.22.a: "Підпишемо закон про молитовні зібрання."
  flavor_swe.22.b: "Дозволимо пієтизм."
  flavor_swe.23.title: "Аньяльський союз"
  flavor_swe.23.desc: "Війна [target_country.Custom('predlog_sso')] #ONCLICK:COUNTRY,[target_country.GetName.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.GetName.Custom('CL_tt')],X [target_country.GetName.Custom('CL_INST')|L]#!#! тривала успішно, доки велика група #TOOLTIP:CULTURE,$finnish_tt$,X #L фінських#!#! офіцерів шляхетного походження, що назвала себе «Аньяльським союзом», не зрадила нас. Ці зрадники не просто вступили в таємну змову з ворогом: вони сподіваються, що [target_country.GetNameWithNoTooltip] підтрима[target_country.Custom('end_itat')] їхнє прагнення до створення незалежної фінської країни.\n\nВ інший час цю проблему можна було б вирішити кількома показовими стратами, але зараз ми просто не зможемо виграти війну без цих талановитих командирів. Якщо ж ми закриємо на це очі, офіцери вважатимуть нас слабкими і стануть висувати монарху ще більш зухвалі вимоги. Ми повинні знайти рішення, яке завдасть найменшої шкоди престижу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! на світовій арені."
  flavor_swe.23.historical_info: "Влітку 1788 року король Густав III на прізвисько «король-театрал» оголосив Росії війну з метою відновити добре ім'я шведської армії, повернути втрачені в попередніх війнах землі та заодно покласти край спробам Росії втручатися в політику Швеції. У той час королівство мало чудовий флот і сильну армію, проте шведські офіцери були не стільки військовими, скільки політиками. Деякі з них почали чинити опір спочатку успішному руху шведів у бік Санкт-Петербурга. Потім 12 серпня був створений так званий Аньяльський союз — об'єднання 112 фінських офіцерів шляхетного походження, які вступили в переговори з Росією в надії, що та допоможе їм заснувати незалежну фінську країну. Аньяльський союз оголосив війну незаконною і тим самим поклав край надіям Густава здобути перемогу: король був не в тому становищі, щоб стратити зрадників і знайти їм заміну."
  flavor_swe.23.a: "Підемо на переговори зі зрадниками."
  flavor_swe.23.b: "Стратимо зрадників."
  flavor_swe.23.b.tt: "Це може викликати або не викликати невдоволення #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!"
  flavor_swe.24.title: "[former_ruler.GetNameWithNoTooltip] і повалення"
  flavor_swe.24.desc: "Переворот! [Select_CString(former_ruler.IsFemale, 'Наша бездарна правителька не принесла', 'Наш бездарний правитель не приніс' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! нічого, крім нещасть, і військові нарешті ополчилися проти [Select_CString(former_ruler.IsFemale, 'неї', 'нього' )]. Це наш шанс привести до влади когось більш здібного. Настав час прийняти доленосне рішення, яке назавжди змінить майбутнє [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_swe.24.historical_info: "Втрата Фінляндії в 1809 році сильно вдарила по шведському суспільству. Вина за це покладалася на короля Густава IV Адольфа. Потім 13 березня 1809 року група ліберально налаштованих чиновників та офіцерів Західної армії влаштувала державний переворот, в результаті якого король та його спадкоємці були позбавлені королівських титулів та вигнані з країни. Густав, що залишився без престолу, осів у Швейцарії, де взяв собі ім'я полковника Густафссона. Поки йшли пошуки нового престолонаслідника, країною керував літній і бездітний дядько колишнього короля — Карл XIII. На зміну йому незабаром прийшов данський принц Карл Август, який несподівано помер у 1810 році. Риксдаг був змушений терміново знайти йому заміну; країну очолив французький маршал Жан-Батист Бернадот."
  flavor_swe.24.a: "Скиньте [Select_CString(former_ruler.IsFemale, 'її', 'його' )]!"
  flavor_swe.24.b: "Нехай продовжує правити."
  flavor_swe.25.title: "Реформи в марнотратній країні"
  flavor_swe.25.desc: "Занадто багато дукатів було спущено на розваги, гостей та частування. Досить! Такі витрати не несуть жодної користі для [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Можливо, комусь втрата таких порожніх задоволень припаде не до вподоби, але позбутися деяких необов'язкових витрат буде розумно."
  flavor_swe.25.historical_info: "У багатьох відношеннях Густав IV Адольф був повною протилежністю свого батька. Відразу після сходження на престол він поклав край пишним, а тому занадто дорогим балам, урядовим обідам та прийомам, які обожнював Густав III. Незважаючи на всі свої недоліки, новий король мав тонке фінансове чуття, а тому в роки його правління грошове становище королівства значно покращилося."
  flavor_swe.25.a: "Проведемо реформу економіки."
  flavor_swe.25.b: "Залишимо все як є."
  flavor_swe.26.title: "Закон про єдність та захист"
  flavor_swe.26.desc: "Пропонована поправка до нашої конституції встановить абсолютистське правління. Якщо ми приймемо їх, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] втратять багато привілеїв — податкові пільги, послаблення в законах та політичний вплив, недоступний іншим.\n\nХоча [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] будуть задоволені цим рішенням, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] прийдуть у лють, і їхній гнів може бути небезпечним. Але ж заворушення всередині одного стану не можуть бути небезпечнішими, ніж невдоволення трьох інших… Чи не так?"
  flavor_swe.26.historical_info: "У відповідь на гучні вимоги надати знаті ще більше влади Густав III звернувся до трьох нижчих станів риксдагу — духовенства, містян і простолюду — і в 1789 році ухвалив нову конституцію, що зміцнювала королівську владу. Закон про єдність і захист, по суті, майже повернув країну в епоху абсолютизму Карла XI та Карла XII. Знать не побажала з цим змиритися, а тому 16 березня 1792 року короля було вбито в будівлі стокгольмської опери."
  flavor_swe.26.a: "Ухвалимо закон."
  flavor_swe.26.b: "Не ухвалимо закон."
  flavor_swe.27.title: "Велика аграрна реформа"
  flavor_swe.27.desc: "Необхідність внутрішніх реформ [ROOT.GetCountry.Custom('endlong_predlog_vvo')] [ROOT.GetCountry.Custom('longname_ru_PREP')] назріла вже давно, й особливо це стосується наших врожаїв. Ми найняли фахівця з-за кордону, щоб він міг давати нам поради щодо цих покращень. Його радикальні плани передбачають перебудову всього нашого сільського господарства зверху донизу, від переселення простолюду до вилучення традиційних общинних земель і прав випасу задля створення більших та ефективніших ферм. Втілення цих реформ дозволить сильно збільшити наші врожаї, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] будуть незадоволені."
  flavor_swe.27.historical_info: "Густав IV Адольф запам'ятався сучасникам як слабкий і впертий монарх, на якого поклали провину за втрату Фінляндії. Історія забула про проведені ним важливі реформи, зокрема про велику аграрну реформу під наглядом Рутгера Макліна — жорстокої людини, яка запросто спалювала будинки тих простолюдів, які відмовлялися переїжджати на виділені їм ділянки. Однак з часом ненависть до нього переросла в подяку: застосування нових способів землеробства на більших полях почало давати рясний урожай."
  flavor_swe.27.a: "Проведемо реформу."
  flavor_swe.27.b: "Залишимо все як є."
  flavor_swe.28.title: "Велика даларнська пляска"
  flavor_swe.28.desc: "Останнім часом [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] #TOOLTIP:LOCATION,dalarna_province,X #L Даларна#!#! зазнали несправедливо важких випробувань. Нещодавнє посилення нашої економічної політики також порушило їхню традиційну фіскальну автономію. Якщо ми продовжимо тиск, врешті-решт це може призвести до вибуху."
  flavor_swe.28.historical_info: "Правління панів в епоху свободи не викликало у простолюду нічого, крім невдоволення. Його підстьобувала поразка у війні з Росією 1741–1743 років, розпочатої партією «капелюхів», а також питання престолонаслідування: король Фредрік I був бездітним. Особливо сильні протестні настрої були в провінції Даларна, де «капелюхи» запровадили обмеження на вільну торгівлю з Норвегією. У 1743 році даларнські простолюди підняли повстання, яке згодом отримало назву «Велика даларнська пляска». На допомогу їм прийшов місцевий полк, який у 1741 році зазнав величезних втрат у кровопролитній битві за Вільманстранд. Заколотники вимагали коронувати данського кронпринца Фредріка і віддати під суворий суд генералів, відповідальних за поразку. Натовп озброївся і 11 червня рушив у бік Стокгольма."
  flavor_swe.28.a: "Продовжимо обмежувати їхню торгівлю."
  flavor_swe.28.b: "Підтвердимо їхні традиційні торгові права."
  flavor_swe.29.title: "Талановитий інженер"
  flavor_swe.29.desc: "Намагаючись покращити укріплення в нашій країні, ми натрапили на геніального інженера та ветерана війни, і найняли його, щоб керувати процесом. Його розробки ефективні не тільки на папері, вони використовують природний ландшафт #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! настільки мудро, що сама земля, здається, захищає народ, що живе на ній. Будемо сподіватися, що нам вистачить ресурсів (і особливо золота), щоб він зміг укріпити всю нашу територію."
  flavor_swe.29.historical_info: "У 1679 році ветеран-інженер Ерік Дальберг був призначений керувати фортифікаціями. У той час Швеція перебувала в розквіті сил і мала вкрай протяжні кордони — такий був підсумок десятиліть завойовницьких війн. Укріплювати ці кордони було доручено Еріку та його підлеглим. Ті чудово впоралися із завданням, звівши в найуразливіших місцях країни неприступні фортеці з умілим використанням рельєфу місцевості. Фортеці у Варберзі та Даларе, а також гьотеборзькі форти Лейонет і Крунан стали справжньою гордістю Дальберга. Однак королівство не могло дозволити собі укріпити східні провінції, що в майбутньому обернулося б для Швеції катастрофою…"
  flavor_swe.29.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.30.title: "[target_artist.GetNameWithNoTooltip] публікує #italic «$atland_eller_manheim$»#!"
  flavor_swe.30.desc: "[target_artist.GetName], [Select_CString(.IsFemale, 'письменниця', 'письменник' )] і полімат, нарешті [Select_CString(.IsFemale, 'завершила', 'завершив' )] працю всього свого життя: #italic «$atland_eller_manheim$»#!, історію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! у чудових деталях, що описує походження цієї країни від царства Атлантиди, яке вважається втраченим. Хоча ідея здається химерною, немає сумнівів, що такий відомий вчений не викладатиме нічого, крім найчистішої правди, і це пояснює, чому наша [ROOT.GetCountry.GetFlavorRank] посідає таке почесне місце серед інших країн. Достовірна ця робота чи ні, вона здобула величезну популярність."
  flavor_swe.30.historical_info: "Ботанік, архітектор, історик, астроном і музикант — Улоф Рудбек був вченим з найширшим колом інтересів. Але найбільшою мірою він був романтиком — і патріотом. Працею всього його життя стала #italic $atland_eller_manheim$#!, колосальна історична праця, в якій він висунув ідею про те, що Швеція насправді є легендарною Атлантидою. Завдяки блискучій репутації Рудбека та його науковій підкованості, ця грандіозна робота була прийнята несподівано добре. Всі культури світу, як заявив професор, походять зі Швеції."
  flavor_swe.30.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.31.title: "Від природничих наук до надприродних"
  flavor_swe.31.desc: "Один з найвидатніших вчених нашої країни зазнав несподіваного перетворення: після того як йому, імовірно, з'явилося кілька божественних видінь, він перетворився на знавця райських чудес і жахів пекла. Теологічні дослідження такої глибини та складності, особливо породжені таким шанованим розумом, приречені здобути величезний вплив. Ми можемо лише подякувати цьому блискучому містику за зміцнення міжнародної репутації #TOOLTIP:CULTURE,$swedish_tt$,X #L шведської#!#! науки."
  flavor_swe.31.historical_info: "Еммануїл Сведенборг — один з перших шведських вчених-природознавців. Серед іншого опублікував працю «Принципи природних речей», в якій методом індуктивного міркування дійшов висновків, багато в чому схожих із сучасними науковими гіпотезами. Одна з поїздок Сведенборга докорінно перевернула його життя: після низки загадкових снів і видінь Еммануїл відрікся від природознавства і присвятив життя містицизму. У 1758 році він видав свою найважливішу працю — «Про небеса, про світ духів і про пекло»."
  flavor_swe.31.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.32.title: "#italic Famam Extendere Factis#!"
  flavor_swe.32.desc: "Дослідження незвіданих земель нарешті принесло свої плоди. Наші кораблі повертаються, переповнені екзотичними рослинами та створіннями всіх видів, і багато з них ми не бачили ніколи раніше. Однак, хоч би якими прекрасними вони були, нам поки складно зрозуміти їхню химерну природу. Щоб краще визначити, як вони співвідносяться з уже знайомою нам флорою та фауною, один з найблискучіших наших вчених почав розробку деякої нової системи класифікації. Будемо сподіватися, що її прийняття зрештою спростить тернистий шлях до відповідей на ці питання біології."
  flavor_swe.32.historical_info: "Шведський ботанік Карл Лінней — основоположник сучасної таксономії. У 1753 році він видав наукову працю «Види рослин», чим започаткував епоху нових відкриттів і методів класифікації в біології. Вчений займався описами в основному шведської (і в цілому північноєвропейської) фауни, однак його учні складали каталоги рослин по всьому світу. Один з них — Даніель Соландер — навіть супроводжував знаменитого капітана Джеймса Кука в його першій навколосвітній подорожі."
  flavor_swe.32.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_swe.33.title: "Перегляд абсолютизму"
  flavor_swe.33.desc: "[ROOT.GetCountry.GetName|U] на межі катастрофи. [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle|U] має стільки ж противників, скільки й прихильників, і нові кліки, що підтримують чергового претендента, виростають з нізвідки щодня. На [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]е правління чиниться такий вплив з-за кордону, що ми перетворюємося з великої держави на маріонеткову країну, а піддані всіх станів відкрито висловлюють невдоволення життям в задушливих лещатах абсолютизму.\n\nЯкщо [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle|l] спробує зберегти повний контроль, це може стати фатальною помилкою. Але яке б рішення ми не прийняли, нам доведеться зіткнутися з жорсткою опозицією."
  flavor_swe.33.historical_info: "Карл XII не залишив після себе спадкоємців, тому королевою стала його молодша сестра Ульріка Елеонора. Цим негайно скористався член риксдагу Арвід Горн — затятий прихильник повалення абсолютизму та зміцнення влади парламенту, який домігся в підсумку і того, і іншого. І хоча подібний демократичний ухил можна назвати похвальним, дії Горна призвели до настання в країні смути. На наступні півстоліття Швеція стала безвольною маріонеткою в руках інших країн. В епоху свободи дворянство також зуміло повернути собі частину втрачених привілеїв. Юна королева, втім, не бачила іншого виходу, а тому вчинила так, щоб не обурювати і без того втомлених від війни підданих."
  flavor_swe.33.a: "Відмовимося від абсолютизму."
  swe_age_of_freedom_always: "Це обов'язкова реформа. Її не можна позбутися цілеспрямовано."
  flavor_swe.33.b: "Утримаємо кермо влади."
  flavor_swe.34.title: "Торгові реформи «капелюхів»"
  flavor_swe.34.desc: "Перехід до меркантилістського підходу знизить нашу залежність від іноземних товарів. Перехід до широкомасштабних промислових виробничих методів, які подібні до тих, що вже існують в інших країнах, дозволить нам скоротити нашу залежність від іноземних продуктів і створить перспективи для вигідної співпраці між країною та промисловцями. Можливо, варто розглянути цей варіант."
  flavor_swe.34.historical_info: "Шведська партія «капелюхів» настільки вразилася нідерландськими та англійськими мануфактурами, що вирішила прискорити індустріалізацію Швеції схожим чином: спільно з Йонасом Альстремером — картоплярем та промисловим магнатом вона заснувала кілька керованих країною підприємств. Успіх цього починання виявився скромним, проте частина мануфактур цілком здатна принести значний прибуток… колись у майбутньому."
  flavor_swe.34.a: "Час провести дослід."
  flavor_swe.34.b: "Меркантилізм — тупиковий шлях."
  flavor_swe.35.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_swe.35.desc: "Кожне засідання [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] перетворюється на запеклу суперечку між двома найбільшими — і найгучнішими — партіями: «капелюхами» та «ковпаками». Замість того, щоб ділитися за поглядами на політичні питання, ці сварливі люди люто сперечаються про те, з якими країнами слід підтримувати союз. Це дратує ще сильніше, коли заради своїх сутичок вони заважають ухвалювати рішення, дійсно важливі для майбутнього #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Хоча б заради того, щоб нарешті заткнути їм рота, нам доведеться обрати сторону, інакше ми ризикуємо втратити можливість робити хоч щось!"
  flavor_swe.35.historical_info: "У 1721–1772 роках провідною силою у шведській політиці були дві протиборчі партії — «капелюхи» та «ковпаки». «Ковпаків», якими спочатку керував Арвід Горн, підтримували Росія та Англія; «капелюхів» підтримувала Франція. На тлі їх постійних суперечок у справи Швеції все частіше починали втручатися іноземні країни, і до 1772 року, коли на престол зійшов Густав III, найвпливовішою фігурою в країні був російський посол. На риксдазі 1738 року «капелюхам» все-таки вдалося прийти до влади, взявши гору над миролюбним Горном: його спіймали на тому, що він відновив оборонний союз з Росією і водночас намагався укласти договір про грошові асигнування з Францією, яка тоді офіційно підтримувала Станіслава Лещинського, що боровся з Росією."
  flavor_swe.35.a: "Нехай переможуть «капелюхи»."
  swedish_hats: "«Капелюхи» при владі"
  flavor_swe.35.b: "Нехай переможуть «ковпаки»."
  swedish_caps: "«Ковпаки» при владі"
  flavor_swe.36.title: "Переворот [GetCurrentYear] року"
  flavor_swe.36.desc: "Титул «правителя» #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! перетворився на посміховисько. Всю реальну владу зосередила в своїх руках Національна Рада, і тепер її перевага найобразливішим чином: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] може помилуватися на власну печатку на документах, яких [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'вона ніколи не бачила', 'він ніколи не бачив' )]. Таку нахабність терпіти вже не можна."
  flavor_swe.36.historical_info: "Шведський король Адольф Фредрік виявився зведений до стану слухняної маріонетки і був змушений безвольно підписувати будь-який документ, який покладе йому на стіл риксрод. Однак навіть незважаючи на м'якість характеру, король разом з дружиною — Луїзою Ульрікою — при кожній зручній нагоді намагався зривати засідання ради і нав'язувати йому королівську волю. У 1756 році риксрод повідомив Адольфу Фредріку про намір ставити королівську печатку на всі документи, які король відмовиться підписувати. Королева не змогла перенести такої образи і взялася за підготовку державного перевороту, наміченого на червень, проте її планам не судилося збутися: змовників викрили і стратили. Після цього вплив королівського подружжя ослаб ще більше."
  flavor_swe.36.a: "Затвердимо наявну конституцію."
  flavor_swe.36.b: "Посилити [ROOT.GetCountry.GetGovernment.GetAdjective]у владу"
  flavor_swe.37.title: "Переворот і просвічений деспот"
  flavor_swe.37.desc: "Тепер, з приходом нового лідера, час раз і назавжди покласти край нескінченній гризні «капелюхів» і «ковпаків»! Місяці обережної роботи дали плоди: нас підтримує ціла армія вірних прихильників: і серед них достатньо справжніх військових. Будемо сподіватися, що під їх керівництвом переворот вдасться втілити в життя без кровопролиття.\n\nПомазаник Божий у шляхетності своїй повинен стрімко, владно, але м'яко зосередити в своїх руках повний контроль, відновити порядок і повернути монархії належну їй вагу. Це має бути зроблено — заради #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Те, що ми робимо, не узурпація, а найістинніша форма патріотизму."
  flavor_swe.37.historical_info: "Густав III успадкував роздирану протиріччями між партіями «капелюхів» і «ковпаків» країну на межі смути. Діяти потрібно було швидко і рішуче, інакше Швеція, що опинилася між Сциллою і Харибдою, розділила б незавидну долю Польщі. Перше, що зробив Густав, — влаштував безкровний державний переворот, здобувши при цьому всю повноту влади. З цього в історії Швеції почалася густавіанська епоха."
  flavor_swe.37.a: "Хай править [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]!"
  flavor_swe.37.b: "Жодних більше тиранів!"
  flavor_swe.38.title: "Срібна шахта в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  flavor_swe.38.desc: "У міру модернізації #TOOLTIP:CONTINENT,europe,X #L європейських#!#! країн попит на #TOOLTIP:GOODS,silver,X #L срібло#!#! продовжує неухильно зростати, що сприяє зміцненню валют і розвитку торгівлі. На щастя, нещодавно в самому серці [ROOT.GetCountry.Custom('longname_ru_GEN')], в [target_location.Custom('LR_PREP')|l] [target_location.GetName], були виявлені великі поклади срібла, чим сильно зацікавилися [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]. Відкриття в цій місцевості шахт обіцяє величезні багатства, які дозволять наповнити шведську скарбницю та зміцнити вплив [ROOT.GetCountry.Custom('CL_GEN')] на континенті. Однак видобуток цього дорогоцінного металу пов'язаний з цілою низкою труднощів, починаючи від затоплення тунелів і закінчуючи обвалами. Тому, щоб успішно розробити місцеві родовища, потрібно виділити значні кошти та знайти кваліфікованих робітників."
  flavor_swe.38.historical_info: "Видобуток срібної руди в Салі розпочався ще в середині XV століття, проте інтерес до родовища корона виявила лише на початку XVI століття. На Різдво 1511 року гірники розпочали переговори зі Сванте Нільссоном Стуре, а в 1512 році вони отримали офіційний королівський привілей."
  flavor_swe.38.a: "Нею володітимемо ми та [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]."
  flavor_swe.38.b: "[ShowGoodsNameWithNoTooltip('silver')] нам без потреби."
  flavor_swe.39.title: "Срібло в Насі"
  flavor_swe.39.desc: "Далеко на півночі, в суворих горах #TOOLTIP:LOCATION,silbojock,X #L Сільбойокка#!#!, було виявлено родовище Насаф'єлль, яке містить величезні запаси #TOOLTIP:GOODS,silver,X срібної#! руди. Ця знахідка може принести #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! великий прибуток та вплив у #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Однак холодний клімат, віддаленість шахти від великих міст та потреба у кваліфікованих робітниках можуть стати серйозними перешкодами для видобутку дорогоцінного металу."
  flavor_swe.39.historical_info: "Срібло в Насаф'єллі вперше було знайдено саамом Пером Олофссоном у 1634 році. Він повідомив про знахідку алмазовидобувачу Йєнсу Перссону. У 1635 році розпочався видобуток срібла силами фахівців із Бергслагена."
  flavor_swe.39.a: "Це гарна інвестиція."
  flavor_swe.39.b: "$flavor_swe.38.b$"
  flavor_swe.40.title: "$swe_makalos$"
  flavor_swe.40.desc: "У самому центрі #TOOLTIP:LOCATION,stockholm,X #L Стокгольма#!#! розташовується справжнє диво архітектури — палац Макальос, чия назва означає «незрівнянний». Цей величний палац спочатку був побудований як сімейна резиденція династії #TOOLTIP:DYNASTY,$de_la_gardie_dynasty_tt$,X #L Делагарді#!#!, але незабаром став символом культурних досягнень нашої країни."
  flavor_swe.40.historical_info: "Будівництво цього палацу замовив у 1630 році Якоб Делагарді. Добудований у 1653 році Макальос стоїть навпроти королівського палацу по інший бік набережної та розмірами перевершує будь-яку іншу споруду в місті."
  flavor_swe.40.a: "Нехай стоїть вічно!"
  flavor_swe.41.title: "Заснування Гетеборга"
  flavor_swe.41.desc: "Ми — прибалтійська країна, проте світ не стоїть на місці: західний напрямок відкриває все більше можливостей торгувати та примножувати багатство. І щоб ними скористатися, нам потрібне велике західне місто!"
  flavor_swe.41.historical_info: "Гетеборг, заснований у 1621 році королем Густавом II Адольфом, стоїть на південному узбережжі річки Гьота-Ельв. Спочатку в ньому проживали переважно голландці, а саме місто було порізане каналами."
  flavor_swe.41.a: "Він стане містом ангелів."
  flavor_swe.42.title: "[target_character.GetNameWithNoTooltip]"
  flavor_swe.42.desc: "Ідеї Реформації міцно вкоренилися у свідомості наших людей, і тепер настав час перекласти Святе Письмо на #TOOLTIP:DIALECT,finnish_dialect,X #L фінську#!#! мову, щоб сформувати в нашій країні єдину #TOOLTIP:CULTURE,$finnish_tt$,X #L фінську#!#! культуру.\n\n«Тепер навчайтеся, старий і молодий, хто живі серцем, усім заповідям Божим і розуму, щоб засвоїти мову фінську!»."
  flavor_swe.42.historical_info: "Мікаель Агрікола — уродженець Нюланда та єпископ Або, який здобув освіту у Виборзі. Його нерідко називають батьком фінської мови: Агрікола видав перший фінський християнський буквар, а потім вперше у світі переклав Новий Завіт на фінську."
  flavor_swe.42.a: "Почнемо друкувати #italic Abckiria#!."
  flavor_swe.42.tt: "#TOOLTIP:CULTURE,$tavastian_tt$,X #L Тавасти#!#!, #TOOLTIP:CULTURE,$savonian_tt$,X #L савонці#!#! та #TOOLTIP:CULTURE,$kvens_tt$,X #L квени#!#! вважатимуть себе частиною єдиної #L [ShowCultureName('finnish')|l]ої#! культури."
  flavor_swe.42.b: "Нас це не цікавить."
  flavor_swe.43.title: "Надруковано перші книги!"
  flavor_swe.43.desc: "Після впровадження таких чудесних винаходів, як друкарський верстат і рухомі літери, можна друкувати книги великими тиражами, а отже — швидше поширювати знання. Але у всього є зворотний бік: одна друкована книга може допомогти людині осягнути Бога, а інша підштовхне її до гріха."
  flavor_swe.43.historical_info: "Перша книга, надрукована у Швеції, називалася Dialogus Creaturarum Moralizatus. Це скоріше не книга, а збірка текстів про все на світі, від металів до тварин і багато чого іншого. Автор залишився невідомим, але серед історій зустрічаються відсилання і до Біблії, і до античних текстів."
  flavor_swe.43.a: "Тепер ми пізнаємо все…"
  flavor_swe.43.b: "Можливо, не все слід пускати в друк."
  flavor_swe.44.title: "Залізні рудники Ойямо"
  flavor_swe.44.desc: "У густому лісі біля озера Лохья були знайдені багаті поклади #TOOLTIP:GOODS,iron,X #L заліза#!#!, життєво необхідного для розвитку промисловості та оснащення армії [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Протягом багатьох десятиліть регіон Ойямо слугував нам головним чином як лісові та сільськогосподарські угіддя, однак розробка місцевих залізних родовищ може перетворити #TOOLTIP:LOCATION,lohja,X #L Лохью#!#! на важливий промисловий район #TOOLTIP:AREA,finland_area,X #L Фінляндії#!#!."
  flavor_swe.44.historical_info: "Король Густав Ваза дарував пану Еріку Флемінгу із Сіунтіо право на видобуток залізної руди. У 1542 році в містечку Ойямо поруч із містом Лохья відкрився перший у Фінляндії залізний рудник."
  flavor_swe.44.a: "Це може піти на користь всій Фінляндії."
  flavor_swe.44.b: "У нас і так достатньо заліза."
  flavor_swe.45.title: "Великий провал"
  flavor_swe.45.desc: "На нашому #TOOLTIP:GOODS,copper,X #L мідному#!#! руднику #TOOLTIP:LOCATION,falun,X #L Фалун#!#! стався обвал, внаслідок якого частина шахти обвалилася в величезну яму. На щастя, #TOOLTIP:POPTYPE,peasants,X #L простолюд#!#!, що працював на руднику, не постраждав."
  flavor_swe.45.historical_info: "У день літнього сонцестояння 25 червня 1687 року інтенсивний видобуток руди та безладне розширення шахт призвели до катастрофи — продовження обвалу 1655 року, внаслідок якого кілька старих шахт перетворилися на одну. У 1687 році значна частина шахти обвалилася, і на місці трьох відкритих кар’єрів утворився один величезний провал — Stora Stöten. Діаметр його становить майже 2 кілометри, а глибина — близько 100 метрів. На щастя, під час обвалу ніхто не постраждав, оскільки в день літнього сонцестояння шахтарі не працювали."
  flavor_swe.45.a: "Ну, хоча б без жертв обійшлося…"
  flavor_swe.46.title: "[swe_heliga_birgitta.GetNameWithNoTooltip] та [king_sweden.GetNameWithNoTooltip]: критика влади"
  flavor_swe.46.desc: "Жінка зі стану «[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')]» на ім’я [swe_heliga_birgitta.GetName] заявляє, що їй були явлені божественні видіння. Вона — одна з найпобожніших жінок у нашій країні, яка здійснила паломництво до багатьох святих місць, а тому коли [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] отримує від неї звинувачення в нестачі #TOOLTIP:RELIGIONGROUP,christian,X #L християнського#!#! благочестя і, що гірше, гомосексуальності, багато хто готовий прислухатися до неї."
  flavor_swe.46.historical_info: "Свята Біргітта, вона ж Бригітта Шведська — середньовічна свята, містик, письменниця та засновниця ордену бригіток. Канонізована в 1391 році. Народилася в шляхетній родині і з ранніх літ присвячувала себе релігії. Неодноразово відчувала видіння, які приписувала божественному одкровенню.\n\nУ творах і видіннях Бригітти нерідко міститься різка критика на адресу політичних і моральних реалій того часу, в тому числі зауваження на адресу вчинків і зобов’язань правителів.\n\nШироко відомі її звинувачення короля Магнуса Ерікссона, її сучасника, у неспроможності, а його двору — у надмірній пишності та розпусті. Бригітта вважала, що на землі має запанувати посланий згори порядок, а правителі повинні бути намісниками Бога."
  flavor_swe.46.a: "Яка ганьба…"
  flavor_swe.47.title: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Божевільна', 'Божевільний')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]"
  flavor_swe.47.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] незадоволені тим, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] постійно вступає в конфлікти з ними, і вже добряче втомилися від [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] правління. Прагнучи покласти цьому край, вони виступили за те, щоб замість [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'неї', 'нього' )] на престол [ROOT.GetCountry.Custom('longname_ru_GEN')] зійшов [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] брат [pretender.GetName]."
  flavor_swe.47.historical_info: "Шведський король Ерік XIV, людина честолюбна та розумна, став жертвою власної параної та психічних загострень. Він міг би запам’ятатися підданим як успішний реформатор, що зміцнив шведську монархію, однак останні роки життя Еріка ознаменувалися сплесками жорстокості. Після того як у 1567 році Ерік наказав убити кількох високопоставлених дворян, частина з яких належала до родини Стуре, двір обернувся проти короля. Підірване психічне здоров’я Еріка та недовіра з боку дворян і навіть родичів призвели до того, що в 1568 році монарх, який не зумів протистояти спокусі необмеженої влади, виявився скинутим власними братами. Решту життя він провів в ув’язненні."
  flavor_swe.47.a: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Її', 'Його')] брат правитиме краще."
  flavor_swe.47.b: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Вона наша', 'Він наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]!"
  flavor_swe.48.title: "[birgitta_scope_for_ui.GetNameWithNoTooltip]"
  flavor_swe.48.desc: "До [ROOT.GetCountry.Custom('rank_ru_GEN')|l] дійшли вісті про те, що [birgitta_scope_for_ui.GetName] була зарахована до лику святих! Ця побожна жінка не раз повідомляла про свої містичні видіння, завдяки яким здобула популярність далеко за межами [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Її канонізація безсумнівно зміцнить репутацію [ROOT.GetCountry.Custom('CL_GEN')] серед інших християнських країн, а також послужить джерелом натхнення для віруючих. Однак ця подія також піднімає питання про роль церкви в нашому королівстві. Як нам краще відреагувати на таке рішення з боку папи?"
  flavor_swe.48.historical_info: "Бригітта Біргерсдоттер була канонізована Папою Боніфацієм IX у 1391 році, що було підтверджено в 1415 на Констанцькому соборі. Її день пам’яті зараз святкується 8 жовтня."
  flavor_swe.48.a: "Підтримаємо паломництво до абатства Вадстена."
  flavor_swe.48.b: "Її канонізацію святкуватимуть у кожному куточку [ROOT.GetCountry.Custom('rank_ru_GEN')|l]!"
  vadstena_holy_site: "Монастир у Вадстені"
  flavor_swe.49.title: "Нікельхарпа"
  flavor_swe.49.desc: "М'який дзвін нікельхарпи, в якому переплелися стародавні оповіді та легенди нашої землі, проникає в саму душу #TOOLTIP:CULTURE,$swedish_tt$,X #L шведів#!#!. Коріння цього інструменту сягає серця середньовічної #TOOLTIP:CONTINENT,europe,X #L Європи#!#!, але визнання вона отримала саме як втілення культури #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Вона гордо звучить на сільських вечорах і у високих залах королівських палаців, і звук нікельхарпи не сплутати ні з чим. Краса її — символ майстерності наших ремісників, а ніжна музика — нагадування про радощі та горе наших предків. Дехто вважає, що нікельхарпа — доля легковажних, але все-таки неможливо заперечувати, що її музика — та мелодійна нитка, що пов'язує минуле з сьогоденням."
  flavor_swe.49.historical_info: "Припускається, що ця клавішна скрипка була винайдена на початку XIV століття в Уппланді. Нікельхарпа і сьогодні посідає важливе місце у шведській народній музиці."
  flavor_swe.49.a: "Музика для душі!"
  flavor_swe.50.title: "Уппсальський університет"
  flavor_swe.50.desc: "Заснувавши #TOOLTIP:LOCATION,uppsala,X #L Уппсальський#!#! університет, ми заклали фундамент для подальшого розвитку науки та культури в нашій країні. У стінах цієї установи готуватимуть вчених, управлінців та богословів, від яких без перебільшення залежить майбутнє [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_swe.50.historical_info: "Уппсальський університет, заснований у 1477 році архієпископом Яковом Ульфссоном зі схвалення папи Сикста IV, — перший університет Скандинавії. У Середні віки тут викладали богослов'я, юриспруденцію та філософію, зміцнюючи тим самим як становище католицької церкви, так і адміністративний апарат королівства Швеція."
  flavor_swe.50.a: "#italic Tänka fritt är stort men tänka rätt är större!#!"
  flavor_swe.50.b: "Є справи важливіші за освіту."
  flavor_swe.51.title: "[target_artist.GetNameWithNoTooltip]"
  flavor_swe.51.desc: "Культурне життя нашої країни збагатилося ще одним голосом. [target_artist.GetName], [Select_CString(target_artist.IsFemale, 'талановита поетеса та музикантка', 'талановитий поет та музикант' )], зачаровує публіку своїми дотепними, меланхолійними та щирими піснями. І [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] знаходять у [Select_CString(target_artist.IsFemale, 'її', 'його' )] музиці правдиве відображення свого життя. [Select_CString(target_artist.IsFemale, 'Її', 'Його' )] пісні, в яких зливаються разом і гумор, і смуток, співають і в тавернах, і при дворі. Поки [Select_CString(target_artist.IsFemale, 'її', 'його' )] слава гримить все голосніше, ми повинні вирішити, як використовувати цей яскравий талант."
  flavor_swe.51.historical_info: "Карл Мікаель Бельман — шведський поет, музикант і пісняр XVIII століття, що прославився своїми живими, нерідко гумористичними творами про стокгольмське життя. У найвідоміших його збірниках «Послання Фредмана» та «Пісні Фредмана», присвячених побуту як простолюду, так і аристократів, вміло поєднуються сатира, смуток і радість. Бельман вважається найвидатнішим шведським бардом, і відлуння його впливу на музику та літературу країни відчуваються навіть сьогодні."
  flavor_swe.51.a: "#italic Кубок чудовий блищить, як алмаз!#!"
  flavor_swe.52.title: "#italic «Система природи»#!"
  flavor_swe.52.desc: "#TOOLTIP:CULTURE,$swedish_tt$,X #L Шведський#!#! ботанік розробив нову оригінальну систему класифікації різних форм життя. Ця система, що називається біномінальною номенклатурою, використовує суміш #TOOLTIP:LANGUAGE,latin_language,X #L латинських#!#! та #TOOLTIP:LANGUAGE,greek_language,X #L давньогрецьких#!#! термінів, щоб розділити рослини та тварин усіх видів за чіткими категоріями. Поки флоти наших дослідників доставляють додому нових представників флори та фауни, досі небачених у наших краях, нова система допомагає краще розуміти та класифікувати ці загадкові відкриття."
  flavor_swe.52.historical_info: "Карл Лінней, пізніше Карл фон Лінней — шведський ботанік, лікар і зоолог XVIII століття. Розробив сучасну систему біологічної систематики. У своїй праці «Система природи» виклав основи біномінальної номенклатури — способу позначення видів, який використовується і сьогодні. Лінней, що став біля витоків сучасної таксономії, багато часу приділяв подорожам та дослідженням і значно підніс науковий авторитет Швеції."
  flavor_swe.52.a: "Світ зміниться назавжди!"
  flavor_swe.52.b: "Зараз нам це не цікаво."
  flavor_swe.53.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] закони"
  flavor_swe.53.desc: "У спробі об'єднати та модернізувати правові норми нашої країни, [target_character.GetName] [Select_CString( target_character.IsFemale, 'видала', 'видав' )] всеосяжний звід законів, що називається «Закон країни, який [target_character.GetName] [Select_CString( target_character.IsFemale, 'прийняла', 'прийняв' )] [target_character.GetShortNameWithNoTooltip]». Це уложення замінює собою колишні провінційні закони впорядкованою системою, зміцнюючи [ROOT.GetCountry.GetGovernment.GetAdjective]у владу та встановлюючи справедливість по всій країні. Хоча і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] вітають більшу прозорість судів, деякі місцеві пани чинять опір урізанню своїх привілеїв. Який підхід до проведення судової реформи слід прийняти?"
  flavor_swe.53.historical_info: "Прийнятий Магнусом Ерікссоном у 1341 році Ландслаг — перший єдиний звід законів Швеції, що замінив старі обласні закони і тим самим послужив централізації країни. Ландслаг зміцнював королівську владу, сприяв проведенню більш чесних судів та кодифікував право всього королівства. Втім, у цієї системи були й противники в особі місцевих панів, які не бажали розлучатися зі звичними привілеями."
  flavor_swe.53.a: "Прийняти закони!"
  flavor_swe.53.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] будуть задоволені!"
  flavor_swe.54.title: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'вбита', 'вбитий')]"
  flavor_swe.54.desc: "На балу-маскараді [Select_CString( target_character.IsFemale, 'наша', 'наш' )] [target_character.GetName] [Select_CString( target_character.IsFemale, 'була вражена', 'був вражений' )] кулею вбивці. [target_character.GetNameWithNoTooltip], [Select_CString( target_character.IsFemale, 'була відома', 'був відомий' )] своїми просвіченими реформами та сильною владою, але багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] виступали проти [Select_CString( target_character.IsFemale, 'неї через її', 'нього через його' )] спроб зосередити в своїх руках ще більше влади. Змова, яку очолили незадоволені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], дала свої плоди, і тепер [ROOT.GetCountry.GetFlavorRank|l] у підвішеному стані. Як нам слід відповісти на кризу?"
  flavor_swe.54.historical_info: "16 березня 1782 року шведський король Густав III був застрелений на балу-маскараді в Стокгольмі. Його вбивця Якоб Юхан Анкарстрем був, як і багато інших дворян, у змові проти короля — прихильника просвіченого абсолютизму та централізації влади. Через свої погляди Густав III нажив собі багато ворогів серед аристократів, незадоволених проведеними реформами. Король пережив замах, але через два тижні помер від ран. Його смерть викликала в країні серйозні потрясіння та зміну політичного курсу."
  flavor_swe.54.a: "Обійдемося із змовниками жорстоко!"
  flavor_swe.54.b: "Пообіцяємо реформи."
  flavor_swe.55.title: "[GetCountry('HSA').GetAdjectiveWithNoTooltip]ий контроль над [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ою торгівлею"
  flavor_swe.55.desc: "Панівне становище [GetCountry('HSA').Custom('longname_ru_GEN')] колись забезпечувало нам економічну стабільність, але тепер лише сіє заворушення в містах і портах #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Настав час вирішити, хто визначатиме майбутнє нашої торгівлі: іноземні купці, наші власні [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] або і ті, й інші разом."
  flavor_swe.55.historical_info: "До ганзейських міст, що контролювали прибуткові торгові маршрути, належали, зокрема, шведські Вісбю, Стокгольм і Кальмар. Король Ерік Померанський, який правив Швецією в період з 1396 по 1434 рік, намагався обмежити їхній вплив."
  flavor_swe.55.a: "Обмежимо [GetCountry('HSA').GetAdjectiveWithNoTooltip|l]ий вплив."
  flavor_swe.55.b: "Повторно затвердимо [GetCountry('HSA').GetAdjectiveWithNoTooltip|l]і привілеї."
  swe_allows_hsa: "Ганзейські привілеї у Швеції"
  swe_denies_hsa: "Вплив Ганзи у Швеції обмежений"
  flavor_swe.56.title: "Гроші з мідних пластин"
  flavor_swe.56.desc: "Намагаючись отримати максимальну вигоду з наших багатих запасів #TOOLTIP:GOODS,copper,X #L міді#!#!, уряд #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! почав випускати #TOOLTIP:GOODS,copper,X #L мідні#!#! пластини, які стали використовуватися як валюта поряд з #TOOLTIP:GOODS,silver,X #L срібними#!#! монетами. У теорії ця ідея виглядала інноваційною, але на практиці нові гроші виявилися вкрай незручними, через що [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] висловлюють невдоволення. Чи варто нам продовжувати карбувати нову валюту, чи краще все ж відмовитися від цих мідних пластин?"
  flavor_swe.56.historical_info: "У середині XVII століття шведський уряд, що мав великі запаси міді та відчував дефіцит срібла, почав випускати великі мідні монети — плоти. Вага деяких таких монет могла доходити до 20 кг. Вони мали обіг нарівні зі звичайними монетами, але користуватися ними було вкрай незручно через великі розміри та вагу. Спроба впровадити плоти наочно показала, наскільки важко створити грошову систему не на основі дорогоцінних металів."
  flavor_swe.56.a: "Виявилося, це погана ідея…"
  flavor_swe.56.b: "Час покаже, що все було правильно!"
  STATIC_MODIFIER_NAME_silver_based_coinage: "Карбування із застосуванням срібла"
  flavor_swe.57.title: "Лісовий народ"
  flavor_swe.57.desc: "Під тиском зростаючого населення та в пошуках нових можливостей, лісові жителі #TOOLTIP:AREA,finland_area,X #L Фінляндії#!#! почали у великих кількостях селитися в лісових регіонах #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Ці #TOOLTIP:CULTURE,$finnish_tt$,X #L фінські#!#! поселенці, добре знайомі з підсічно-вогневим землеробством, несуть у наші землі і корисні навички, і незнайомі звичаї. Хоча багато хто відзначає їхню працьовитість, інші бачать у них небезпечних чужинців, що загрожують їхньому звичному способу життя. [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')] повинні вирішити, як вчинити з цією зростаючою хвилею поселенців."
  flavor_swe.57.historical_info: "Шведські королі Карл IX та Густав Адольф найактивнішим чином сприяли переселенню до своєї країни лісових фінів. Така стратегія була не випадковою: королі вели цілеспрямовану політику освоєння слабозаселених північних, східних та західних територій країни, а отже — і їхнього розвитку."
  flavor_swe.57.a: "Заохотимо міграцію."
  flavor_swe.57.b: "Цьому треба покласти край!"
  STATIC_MODIFIER_NAME_slash_and_burn_foresting: "Підсічно-вогневе землеробство"
  flavor_swe.58.title: "Можливість обмеженого піратства"
  flavor_swe.58.desc: "Наші відважні та досвідчені моряки просять вищого [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого дозволу на захоплення суден наших супротивників. Діючи з порту [ShowLocationName('utlandet')], вони за допомогою своїх суден можуть атакувати ворожі судна, що йдуть Балтійським та Північним морем. Успішні нальоти могли б наповнити [ROOT.GetCountry.GetGovernment.GetAdjective|l]у скарбницю та вселити жах у серця наших ворогів, але запропоновані заходи балансують на межі виправданості та беззаконня…"
  flavor_swe.58.historical_info: "Ларс Гатен'єльм на прізвисько Лассе з Гатана — шведський капер, який у роки Північної війни проживав у Гетеборзі та діяв на морі за дорученням корони. Його напади на ворожі кораблі, особливо на данських купців, нерідко переходили в розряд піратства. Деякі вважають його національним героєм, деякі — безпринципним морським розбійником, але так чи інакше, Ларс надовго вписав себе в історію шведського мореплавства."
  flavor_swe.58.a: "Видамо каперські патенти."
  flavor_swe.58.b: "Ми не можемо впасти так низько!"
  flavor_swe.59.title: "#italic Then Swänska Argus#!"
  flavor_swe.59.desc: "У #TOOLTIP:LOCATION,stockholm,X #L Стокгольмі#!#! набирає популярності газета #italic Then Swänska Argus#!, на сторінках якої дотепно критикуються пережитки минулого, а також прославляються раціоналізм, поміркованість та народний [ROOT.GetCountry.GetCulture.GetDialect.GetName|l] діалект. Надихаючи реформаторів та лінгвістів по всій країні, газета вже починає впливати на її майбутнє. Можливо, нам варто підтримати сміливий голос прогресу?"
  flavor_swe.59.historical_info: "Газета #italic Then Swänska Argus#!, заснована Улофом Даліном у 1732 році, відіграла ключову роль у розвитку шведської літератури. Її яскраві та зрозуміло написані статті прославляли ідеї Просвітництва та сприяли модернізації шведської мови. Це періодичне видання стало культурним маяком, формувало громадську думку та надихало кілька поколінь шведських мислителів."
  flavor_swe.59.a: "Підтримаємо новий погляд на майбутнє [ROOT.GetCountry.Custom('CL_GEN')]!"
  flavor_swe.59.b: "Час ввести цензуру преси!"