l_russian:
  flavor_sav.1.title: "Палац Венарія"
  flavor_sav.1.desc: "Оточена пишними садами та прикрашена складними елементами в стилі бароко та #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#!, ця розкішна королівська резиденція в Турині є беззаперечним свідченням нашої величі. Придворні та гості палацу живуть у чудових кімнатах, кожна з яких зберігає в собі частинку багатого минулого нашої держави та навіює думки про її світле майбутнє.\n\nРозташовані на території резиденції фонтани, скульптури та зелені насадження створюють затишний простір із безліччю усамітнених місць. При цьому в палаці також проходять різноманітні заходи та виставки, на яких високопоставлені іноземні гості знайомляться з культурним надбанням #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Усе це стало можливим лише завдяки нашому чуйному та грамотному керівництву."
  flavor_sav.1.a: "Символ нашої могутності."