l_russian:
  flavor_kie.1.title: "Київська академія культури"
  flavor_kie.1.desc: "[Select_CString(target_ruler.IsFemale,'Рухома', 'Рухомий')] ідеєю збереження #TOOLTIP:CULTURE,$ruthenian_tt$,X #L руської#!#! історії та звичаїв, [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'попросила', 'попросив')] #TOOLTIP:LOCATION,kyiv,X #L київських#!#! городян виділити кошти на будівництво нового #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#!. Подібний заклад дозволить багатьом підданим #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! та чужоземцям ознайомитися з багатою історією нашої країни.\n\nХоча його будівництво напевно посприяє зміцненню #TOOLTIP:REGION,ruthenia_region,X #L Руси#!#!, воно також вимагатиме значних вкладень. Як [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l], ми можемо підтримати цю ініціативу, або ж дозволити місту самостійно профінансувати проєкт."
  flavor_kie.1.historical_info: "Києво-Могилянська академія, заснована 1615 року Київським братством, була однією з небагатьох православно-християнських богословських шкіл у Русі. Цей навчальний заклад отримав університетський статус за Гадяцьким договором 1658 року. Цар всієї Русі Петро Великий, завоювавши місто, вирішив зберегти академію, а також дозволив відвідувати її студентам з різних земель — від Санкт-Петербурга до Греції. Академія проіснувала до 1817 року, а 1834 року цар Микола I створив на її місці новий університет Святого Володимира."
  flavor_kie.1.a: "Ми готові виділити казенні кошти на розвиток Києва."
  flavor_kie.1.b: "Ми не дозволяємо будівництво."
  flavor_kie.1.c: "Ми не пошкодуємо грошей, щоб їм допомогти."
  flavor_kie.1.d: "Нехай будують, але платити за це ми не будемо."
  flavor_kie.2.title: "Майбутнє холопів"
  flavor_kie.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] завжди ставилися до холопів як до #TOOLTIP:POPTYPE,slaves,X #L рабів#!#!, принижуючи та утискаючи їх з будь-якого приводу. Однак останнім часом все частіше можна почути думку, що подібне ставлення необхідно припиняти, оскільки воно шкодить розвитку #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Якщо ми даруємо холопам більше прав, [target_character.GetName] напевно стане героєм в очах народу, але впливові бояри навряд чи будуть раді таким змінам."
  flavor_kie.2.historical_info: "З XI століття холопи були основою руської економіки. Вони мало чим відрізнялися від рабів: власник міг робити з ними що завгодно, але при цьому відповідав за їхні вчинки. Більша частина киян низького походження була холопами. У XV столітті вони отримали більше прав, і їхнє становище стало нагадувати європейських кріпаків."
  flavor_kie.2.a: "Ми гарантуємо, що з ними будуть поводитися краще."
  flavor_kie.2.b: "Не варто даремно злити бояр."
  flavor_kie.2.c: "Ці смерди занадто багато чого хочуть. Треба бути з ними суворішими!"
  flavor_kie.2.d: "Ми зосередимо всі зусилля на цій реформі."
  flavor_kie.3.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kie.3.desc_common: "Прагнучи посилити контроль над [target_location.Custom('LR_INST')|l] [target_location.GetName], влада намагається знайти нового митрополита, якому можна було б довірити управління цією місцевістю. Найбільш відповідним кандидатом на цю роль є [target_character.GetName], [Select_CString(target_character.IsFemale,'яка виросла', 'який виріс')] у цих землях."
  flavor_kie.3.desc_RUS: "$flavor_kie.3.desc_common$ Багато хто в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] вважає, що [Select_CString(target_character.IsFemale,'її', 'його')] призначення підірве наш вплив на [target_location.Custom('LR_ACC')|l], і саме тому [Select_CString(target_character.IsFemale,'її', 'його')] активно просувають на цю посаду."
  flavor_kie.3.desc_ZAZ: "$flavor_kie.3.desc_common$ При цьому відомо, що [target_character2.GetName] також виявляє до [Select_CString(target_character.IsFemale,'неї', 'нього')] прихильність. Така [Select_CString(target_character.IsFemale,'вірна піддана', 'вірний підданий')] напевно стане відмінним митрополитом і допоможе нам зміцнити вплив над містом."
  flavor_kie.3.desc: "$flavor_kie.3.desc_common$ Придворні також вважають, що [Select_CString(target_character.IsFemale,'вона могла', 'він міг')] би послужити нам добру службу в раді, однак для оплати [Select_CString(target_character.IsFemale,'її', 'його')] послуг одразу на двох посадах потрібно чимало коштів."
  flavor_kie.3.a: "Ми наймемо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_kie.3.b: "Новий митрополит нам ні до чого."
  flavor_kie.3.c: "Нам безумовно знадобиться людина, яку поважають і місцеві жителі, і [target_character2.GetNameWithNoTooltip]."
  flavor_kie.3.d: "[target_character.GetNameWithNoTooltip] допоможе нам підкорити місто."
  flavor_kie.4.title: "[target_character.GetNameWithNoTooltip]"
  flavor_kie.4.desc: "[target_location.GetName] — наш головний культурний центр, який виховав безліч великих митців. [Select_CString(target_character.IsFemale,'Однією', 'Одним')] з них є [target_character.GetName], [Select_CString(target_character.IsFemale,'видатна іконописиця', 'видатний іконописець')], [Select_CString(target_character.IsFemale,'відома', 'відомий')] у релігійних колах міста. Прагнучи відійти від усталених іконописних звичаїв і створити власний стиль, [Select_CString(target_character.IsFemale,'вона виявила', 'він виявив')] бажання служити при нашому дворі. [Select_CString(target_character.IsFemale,'Вона', 'Він')] сподівається, що [Select_CString(target_character.IsFemale,'їй', 'йому')] вдасться домогтися прихильності сильних світу цього, щоб у майбутньому заснувати в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! власну культурну установу і тим самим посприяти поширенню #L [ROOT.GetCountry.GetCulture.GetName|l]ої#! #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! культури по всій #TOOLTIP:CONTINENT,europe,X #L Європі#!#!."
  flavor_kie.4.a: "Ми схвалюємо будь-яку творчість, навіть якщо вона відходить від усталених засад."
  flavor_kie.4.b: "Ми допоможемо [Select_CString(target_character.IsFemale,'їй', 'йому')] заснувати свою установу."
  flavor_kie.4.c: "У [ROOT.GetCountry.Custom('CL_PREP')] [Select_CString(target_character.IsFemale,'їй', 'йому')] не раді."
  flavor_kie.5.title: "$st_andrew_church$"
  flavor_kie.5.desc: "Народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! свято зберігає свої #L [ROOT.GetCountry.GetReligion.GetAdjective|l] звичаї#!. Так, нещодавно жителі [target_location.Custom('LR_GEN')|l] [target_location.GetName] попросили побудувати в цій місцевості нову церкву. На щастя, [target_character2.GetName] вже давно хоче заснувати там свою резиденцію, тому [Select_CString(target_character2.IsFemale,'її', 'його')] вкрай зацікавила ця пропозиція. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] також підтримав ініціативу і навіть порекомендував найняти для цієї роботи талановитого архітектора на ім'я [target_character.GetName].\n\nПередбачається, що церква буде присвячена апостолу Андрію Первозванному, який у давнину відвідував руські землі. Будівництво церкви напевно допоможе нам заслужити прихильність патріарха та налагодити відносини з іншими [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l] країнами."
  flavor_kie.5.a: "Потрібно допомогти з будівництвом цієї церкви."
  flavor_kie.5.b: "Це надто дорога затія."
  flavor_kie.6.title: "Митрополія всієї Руси"
  flavor_kie.6.desc: "У міру зростання [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] приваблює все більше #TOOLTIP:RELIGION,$orthodox_tt$,X #L православних#!#! та #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#!. Хоча представники цих двох конфесій вірять в одного Бога, через віру в Святу Трійцю вони важко уживаються і постійно вступають один з одним у суперечки. Прагнучи покласти край цій ворожнечі, [target_character.GetName] намагається розвивати #TOOLTIP:CULTURE,$ruthenian_tt$,X #L руську#!#! православну церкву на інший лад, відмінний від усталеного #TOOLTIP:CULTUREGROUP,russian_group,X #L східнослов'янського#!#! віровчення."
  flavor_kie.6.a: "Ми підтримаємо [Select_CString(target_character.IsFemale,'її', 'його')] ініціативу."
  flavor_kie.6.b: "Нехай із цим розбирається духовенство."
  flavor_kie.7.title: "Проблеми в Києві"
  flavor_kie.7.desc: "До нас дійшли звістки про те, що призначений нами митрополит втратив довіру жителів [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Люди нарікають, що ми не поважаємо їхні права і заважаємо їм сповідувати #TOOLTIP:RELIGION,$orthodox_tt$,X #L православну#!#! віру, у зв'язку з чим багато хто з них прагне вийти з-під впливу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! та приєднатися до будь-якої іншої православної країни, яка буде готова за них заступитися."
  flavor_kie.7.a: "Ми не будемо йти їм на поступки."
  flavor_kie.7.b: "Можливо, настав час послабити контроль над митрополитом."
  kie_all_kiev_pops_become_angrier_tt: "Усі #TOOLTIP:RELIGION,$orthodox_tt$,X #L православні#!#! [Concept('pops', 'групи населення')|e] у [target_location.Custom('LR_PREP')|l] [target_location.GetName] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_kie.8.title: "Новий київський митрополит"
  flavor_kie.8.desc: "У #TOOLTIP:REGION,ruthenia_region,X #L Русі#!#! довгий час не було митрополита, який би направляв народ. Прагнучи виправити це, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] звернулися до уряду з проханням призначити митрополита зі своїх лав. Вони стверджують, що це єдиний спосіб забезпечити належне управління регіоном без втручання країни. Ми могли б надати їм цю владу, хоча тим самим ризикуємо збільшити їхній вплив у [target_location.Custom('LR_PREP')|l] [target_location.GetName]."
  flavor_kie.8.a: "Виконаємо їхні вимоги."
  flavor_kie.8.b: "Ми не дозволимо їм контролювати [target_location.Custom('LR_ACC')|l]."
  flavor_kie.9.title: "Розквіт [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l] неокласичної живопису"
  flavor_kie.9.desc: "Кілька маловідомих художників #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! останнім часом намагаються створити новий напрямок, натхненний естетикою античності. [Select_CString(target_character.IsFemale,'Однією з таких художниць', 'Одним з таких художників')] є [target_character.GetName], [Select_CString(target_character.IsFemale,'уродженка', 'уродженець')] #TOOLTIP:LOCATION,hlukhiv,X #L Глухова#!#!, [Select_CString(target_character.IsFemale,'яка вже встигла', 'який вже встиг')] написати кілька чудових полотен у новому стилі, прозваному неокласицизмом. Прагнучи поширити цю художню течію, що зароджується, [Select_CString(target_character.IsFemale,'вона звернулася', 'він звернувся')] до нашого двору в надії, що [target_character2.GetName] візьме [Select_CString(target_character.IsFemale,'її', 'його')] на службу."
  flavor_kie.9.a: "Ми наймемо [Select_CString(target_character.IsFemale,'її', 'його')]."
  flavor_kie.9.b: "Нехай [Select_CString(target_character.IsFemale,'вона', 'він')] прикрасить своїми роботами наш двір."
  flavor_kie.9.c: "Цей стиль тільки шкодить нашому мистецтву. Ми не будемо [Select_CString(target_character.IsFemale,'її', 'його')] підтримувати."