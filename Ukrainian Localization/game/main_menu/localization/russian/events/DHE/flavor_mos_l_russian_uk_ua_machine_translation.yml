l_russian:
  flavor_mos.1.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'націлилася', 'націлився')] на [GetCountry('NOV').Custom('CL_ACC')]"
  flavor_mos.1.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName], володар #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, палає ідеєю принизити #ONCLICK:COUNTRY,[GetCountry('NOV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOV').Custom('CL_tt')],X [GetCountry('NOV').Custom('CL_ACC')|L]#!#! та утвердити верховну владу своєї династії над [GetCountry('NOV').GetAdjectiveWithNoTooltip|l]ими землями.\n\nЗараз найвідповідніший момент, щоб здійснити [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] задум. Непокірні [GetCountry('NOV').GetAdjectiveWithNoTooltip|l]і бояри отримають урок, який забудуть нескоро."
  flavor_mos.1.a: "Час поставити [GetCountry('NOV').Custom('CL_ACC')] на місце!"
  flavor_mos.1.b: "Вони ж наші брати!"
  flavor_mos.2.title: "Яжелбицький мир"
  flavor_mos.2.desc: "Багаторічне суперництво #ONCLICK:COUNTRY,[GetCountry('MOS').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MOS').Custom('CL_tt')],X [GetCountry('MOS').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('NOV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOV').Custom('CL_tt')],X [GetCountry('NOV').Custom('CL_GEN')|L]#!#! наближається до завершення. Нам нарешті вдалося взяти гору. Деякі радники пропонують обмежитися невеликими поступками, щоб поступово підкорити [GetCountry('NOV').Custom('CL_ACC')] нашій владі. Водночас багато хто при дворі хоче, щоб ми не зупиняли натиску, доки противник не буде остаточно переможений."
  flavor_mos.2.a: "Треба укласти мир, щоб перевести дух."
  flavor_mos.2.b: "Ми можемо досягти більшого!"
  flavor_mos.3.title: "Ординські васали"
  flavor_mos.3.desc: "Шпигуни доносять, що [GetCountry('GLH').GetLongName] — це країна, яка ось-ось розвалиться. Ми були їхніми васалами протягом століть, і ніхто не може дорікнути нам у нестачі відданості — але зараз, можливо, настав час переглянути цю політику. Могутність #TOOLTIP:CULTUREGROUP,tatar_group,X #L татар#!#! тане на очах, а тим часом [GetCountry('LIT').GetLongName] сильніша з кожним днем. Якщо перейти на бік #ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_GEN')|L]#!#!, навряд чи влада #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#! наважиться на відповідні заходи."
  flavor_mos.3.a: "Нерозумно на це розраховувати."
  flavor_mos.3.tt1: "Вірність татарським загарбникам — це усталений звичай"
  flavor_mos.3.b: "Настав час позбутися ярма!"
  flavor_mos.3.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] продемонструє рідкісну відвагу та впевненість у своїх силах"
  flavor_mos.3.c: "Час звільнитися від будь-якого іноземного впливу."
  flavor_mos.3.historical_info: "Москва та інші руські князівства продовжували платити татарам данину протягом усього XIV століття. Коли в Золотій Орді почалися чвари, деякі пропонували перейти на бік Литви, що посилилася на той час, але в підсумку московські князі вирішили дотримуватися звичної політики. Їхня позиція змінилася лише до середини XV століття, коли стало зрозуміло, що татари остаточно втратили колишню міць."
  flavor_mos.4.title: "Кремль"
  flavor_mos.4.desc: "Землі Русі постійно піддаються набігам, а нинішні укріплення навколо [target_location.Custom('LR_GEN')|l] [target_location.GetName] явно недостатньо надійні, щоб зупинити ворога. Ці руйнівні напади заважають країні розвиватися, і ми повинні зробити все, щоб захистити наш народ у ці неспокійні часи.\n\nЧас оточити [target_location.Custom('LR_ACC')|l] потужними укріпленнями, стіни яких витримають будь-яку атаку."
  flavor_mos.4.a: "Нехай купці везуть нам найкращу деревину."
  threatened_by_military_expansion: "Загроза військової експансії"
  safe_haven_during_raids: "Надійний прихисток на випадок набігів"
  flavor_mos.4.tt1: "Недружні сусіди вважатимуть будівництво потужного Кремля ворожим актом"
  flavor_mos.4.tt2: "Сусідні васали побачать у потужному Кремлі надійний прихисток на випадок набігів"
  flavor_mos.4.a.custom1: "Кожна сусідня країна отримує [ShowBiasValue('threatened_by_military_expansion')|+=0] до [Concept('opinion', 'думки')|e] про владу #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_mos.4.a.custom2: "Кожен сусідній [Concept('subject', 'васал')|e] отримує [ShowBiasValue('safe_haven_during_raids')|+=0] од. до [Concept('opinion', 'думки')|e] про #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_PREP')|L]#!#!"
  flavor_mos.4.b: "Ми не станемо провокувати сусідів."
  flavor_mos.4.b.custom1: "Кожна сусідня країна отримає #G 3 од.#! [Concept('trust', 'довіри')|и] до #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_DAT')|L]#!#!"
  flavor_mos.4.b.custom2: "Кожен сусідній [Concept('subject', 'васал')|e] отримує [ShowBiasValue('lack_of_protection')|+=0] до [Concept('opinion', 'думки')|и] [target_root_country.Custom('predlog_obo')] #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_PREP')|L]#!#!"
  lack_of_protection: "Недостатній захист"
  mos_kremlin_construction: "Будівництво Кремля"
  flavor_mos.4.c: "Розберемо замок васала на будматеріали."
  flavor_mos.4.tt3: "Майже всю необхідну #TOOLTIP:GOODS,clay,X #L глину#!#! та #TOOLTIP:GOODS,lumber,X #L деревину#!#! можна отримати, розібравши замок у [castle_location.Custom('LR_PREP')|l] [castle_location.GetName]"
  flavor_mos.4.historical_info: "Перший московський Кремль був дерев'яним і складався не тільки зі стін та веж, але також із безлічі адміністративних будівель. Будівництво Московського Кремля було вельми дорогим проєктом, проте воно було необхідним — прості дерев'яні загородження, що захищали Москву раніше, виявилися неефективними проти облог та регулярних татарських набігів за рабами."
  flavor_mos.5.title: "Сергій Радонезький"
  flavor_mos.5.desc: "Чернець-відлюдник на ім'я [sergius_of_radonezh.GetShortName] заснував невелику чернечу пустинь, що живе плодами власної праці. У нього швидко з'явилося безліч послідовників, громада незабаром виросла до розмірів посаду. Вчення ченця зацікавило патріарха, він навіть готовий заснувати монастир, щоб [sergius_of_radonezh.GetShortName] міг проповідувати по всій #TOOLTIP:REGION,russian_region,X #L Русі#!#!."
  flavor_mos.5.a: "Чудотворець [ROOT.GetCountry.Custom('CL_GEN')]!"
  flavor_mos.5.tt1: "З'явиться [Concept('character', 'персонаж')|e] [sergius_of_radonezh.GetNameWithNoTooltip]"
  flavor_mos.5.b: "Він просто безграмотний реформатор-самозванець."
  flavor_mos.5.historical_info: "Сергій Радонезький — чернець, якого вважають однією з найзначніших постатей Руської православної церкви. Він заснував Троїце-Сергієву лавру і відіграв важливу роль у реформуванні чернечого життя на Русі. Його шанують як святого і духовного лідера країни в смутні часи."
  flavor_mos.6.title: "Троїце-Сергієва лавра"
  flavor_mos.6.desc: "Пустинь, яку заснував [sergius_of_radonezh.GetName], приваблює все нових ченців із сусідніх князівств. Сергіїв Посад, що знаходиться недалеко від #TOOLTIP:LOCATION,pushkino,X #L Пушкіно#!#!, поступово перетворюється на повноцінне поселення, там будується пекарня, кухня, інші службові будівлі. Ця пустинь має потенціал стати справжнім духовним центром #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! віри, вона здатна об'єднати наших братів і сприяти поширенню істинного вчення. Нам варто було б виділити кошти на це починання."
  flavor_mos.6.a: "Гідна справа."
  flavor_mos.6.a.custom: "Зростаюче поселення приваблює #TOOLTIP:POPTYPE,clergy,X #L духовенство#!#! з усієї #TOOLTIP:REGION,russian_region,X #L Північно-Східної Русі#!#!"
  flavor_mos.6.tt: "Висока концентрація вірян поблизу столиці сприятиме посиленню контролю в релігійних питаннях"
  flavor_mos.6.b: "Молитися Богу можна всюди, для цього не потрібне особливе місце."
  mos_holy_trinity_st_sergius_lavra_construction: "Будівництво Свято-Троїцької Сергієвої лаври"
  flavor_mos.6.historical_info: "Заснована в XIV столітті Троїце-Сергієва лавра постійно розширювалася і перебудовувалася, зараз в обителі більше десятка храмів і церков. Лавра вважається найважливішим монастирем Росії, це духовний центр Руської православної церкви. Монастир служить місцем поховання митрополитів і патріархів, там зберігається велика колекція творів релігійного мистецтва."
  flavor_mos.7.title: "Мощі преподобного Сергія"
  flavor_mos.7.desc: "Країна занурилася в глибокий траур — [sergius_of_radonezh.GetName], глибоко шанований чернець і наш духовний лідер, покинув тлінний світ. Його мощі приваблюватимуть паломників з усіх кінців країни, і ми зобов'язані зробити все, щоб їх зберегти. Звісно, краще було б виставити їх у самій #TOOLTIP:WORK_OF_ART,$holy_trinity_st_sergius_lavra_tt$,X #L Троїце-Сергієвій лаврі#!#!. Попри те що монастир не так добре захищений, таке рішення викличе потрібний відгук у вірян і церкви. Не варто забувати, що шанування мощей — це духовний і культурний зв'язок, що утримує суспільство від розпаду."
  flavor_mos.7.a: "Неважливо, де його поховають."
  flavor_mos.7.b: "Мощі мають спочивати у місті [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_mos.7.c: "Ці мощі нічого не значать."
  flavor_mos.7.historical_info: "Тіло преподобного Сергія було поховано у скромній могилі на території заснованого ним монастиря. Тридцять років потому мощі були знайдені знову і визнані нетлінними — це було сприйнято як диво і доказ його святості. Завдяки мощам св. Сергія Троїце-Сергієва лавра стала одним із найважливіших місць паломництва на Русі."
  flavor_mos.8.title: "[alexander_peresvet.GetNameWithNoTooltip]"
  flavor_mos.8.desc: "[Select_CString(alexander_peresvet.IsFemale,'Віддана', 'Відданий')] і добре [Select_CString(alexander_peresvet.IsFemale,'навчена воїтелька-черниця', 'навчений воїн-чернець')] на ім'я [alexander_peresvet.GetName] бажає вступити до лав нашого могутнього війська, що йде в похід проти орди язичників. З [Select_CString(alexander_peresvet.IsFemale,'нею', 'ним')] ми отримаємо більше ніж просто вмілого бійця — [alexander_peresvet.GetNameWithNoTooltip] прагне вступити з ворогом у ритуальний поєдинок за законами лицарської честі. Перемога в такій сутичці здатна надихнути наших бійців, наповнивши їхні серця доблестю та відвагою."
  flavor_mos.8.a: "[Select_CString(alexander_peresvet.IsFemale,'Ця героїня', 'Цей герой')] стане прикладом для всіх нас."
  STATIC_MODIFIER_NAME_monomachia: "Мономахія"
  flavor_mos.8.b: "У нас достатньо воєначальників."
  flavor_mos.8.c: "Нехай навчає воїнів при дворі."
  flavor_mos.8.historical_info: "Олександр Пересвіт — руський православний воїн-чернець, який брав участь у великих битвах між татаро-монгольською Золотою Ордою та військом Великого князівства Московського. На початку кожної битви він викликав найкращих ворожих воїнів на поєдинок —#italic  мономахію#!. Особливо відома його сутичка з татарським батиром на ім'я Челубей, що стала символом героїчного опору руських воїнів монгольським загарбникам."
  flavor_mos.9.title: "Калита"
  flavor_mos.9.desc: "#TOOLTIP:SPECIAL_STATUS,tatar_tax_collector,X #L Великий князь Володимирський#!#! — бажаний і шанований титул, що надає чималі вигоди його володарю. Якщо збільшити збір данини з інших князівств, що опинилися під #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарським ярмом#!#!, це сприятиме зміцненню наших відносин з владою #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#! та зміцнить нашу здатність зберегти цей титул за собою."
  flavor_mos.9.a: "Необхідне зло, яке стане запорукою нашої могутності."
  flavor_mos.9.tt1: "[GetCountry('GLH').GetGovernment.GetRulerTitle] отримає на #G  25%#! більше данини, яку від [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'її', 'його')] імені збирає [target_root_country.GetGovernment.GetRuler.GetName]"
  flavor_mos.9.at: "[Concept('opinion', 'Думка')|e] кожної країни, що перебуває під #TOOLTIP:INTERNATIONAL_ORGANIZATION,$tatar_yoke_tt$,X #L татарським ярмом#!#! (крім #ONCLICK:COUNTRY,[GetCountry('GLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GLH').Custom('CL_tt')],X [GetCountry('GLH').Custom('CL_GEN')|L]#!#!), про #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! погіршиться на [ShowBiasValue('bleeding_us_dry')|+=0] од."
  bleeding_us_dry: "Нас оббирають до нитки"
  flavor_mos.9.b: "Ці князівства і так настраждалися."
  flavor_mos.9.tt2: "У [GetCountry('GLH').Custom('CL_GEN')] є ефективна [Concept('spy_network', 'шпигунська мережа')|e]. [GetCountry('GLH').GetGovernment.GetRulerTitle] дізнається, що ми приховали від [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'неї', 'нього')] важливі відомості"
  flavor_mos.9.tt3: "[GetCountry('GLH').GetGovernment.GetRulerTitle] дізнається, що ми приховали від [Select_CString(GetCountry('GLH').GetGovernment.GetRuler.IsFemale,'неї', 'нього')] важливі відомості"
  flavor_mos.9.tt4: "[GetCountry('GLH').GetGovernment.GetRulerTitle] залишиться в невіданні"
  flavor_mos.9.historical_info: "Слово «калита» означає поясний гаманець. Московського князя Івана I прозвали так за особливо ефективний збір податків і данини для татаро-монгольських гнобителів. Завдяки прихильності ординського хана Москва була позбавлена спустошливих набігів, яким регулярно піддавалися сусідні князівства. Це значною мірою сприяло піднесенню Москви та її поступовому перетворенню на провідну регіональну країну."
  flavor_mos.10.title: "Денга і рубль"
  flavor_mos.10.desc: "Щоб стати великим центром торгівлі та комерції, необхідно карбувати власну валюту. Зараз у нас з'явилася можливість відкарбувати власну монету, яка матиме обіг виключно на внутрішньому ринку або використовуватиметься для торгівлі з сусідами. Можна, звичайно, випускати обидва види монет, але це призведе до різкого зростання попиту на #TOOLTIP:GOODS,silver,X #L срібло#!#!."
  flavor_mos.10.a: "Ми відкарбуємо і ті, й інші."
  denga_ruble_key: "Денга і рубль"
  flavor_mos.10.b: "Обійдемося без торгівлі з іншими."
  flavor_mos.10.c: "Торгуючи з сусідами, ми стаємо сильнішими."
  STATIC_MODIFIER_NAME_denga: "Денга"
  STATIC_MODIFIER_NAME_ruble: "Рубль"
  mos_silver_coinage_introduced: "Карбування срібних монет"
  flavor_mos.10.historical_info: "Перша срібна монета, що карбувалася в Київській Русі X–XI століть, називалася срібник. У роки татаро-монгольського іга в обіг увійшов новий різновид монети — денга, що нагадувала золотоординські срібні монети, але з руським оформленням. Згодом монетної форми набули й інші грошові одиниці — гривня та рубль. Останній спочатку використовувався одночасно з деньгами та гривнями, але з XIV століття поступово став займати положення основної валюти руських земель."
  flavor_mos.11.title: "[andrei_rublev.GetNameWithNoTooltip]"
  flavor_mos.11.desc_common1: "Глибоко [Select_CString(andrei_rublev.IsFemale,'віруюча', 'віруючий')] та винятково [Select_CString(andrei_rublev.IsFemale,'обдарована художниця', 'обдарований художник')] на ім'я [andrei_rublev.GetName] [Select_CString(andrei_rublev.IsFemale,'прославилася', 'прославився')] своїм іконописом. [Select_CString(andrei_rublev.IsFemale,'Її', 'Його')] роботи прикрашають безліч церков у наших володіннях."
  flavor_mos.11.desc_common2: "Надзвичайний талант іконописця в [Select_CString(andrei_rublev.IsFemale,'ній', 'ньому')] розгледів візантійський майстер Феофан Грек, виходець із Константинополя. Кажуть, що його стиль справив великий вплив на техніку молодого майстра.\n\nЗараз [andrei_rublev.GetNameWithNoTooltip] перебуває в стінах #TOOLTIP:WORK_OF_ART,$holy_trinity_st_sergius_lavra_tt$,X #L Троїце-Сергієвої лаври#!#!. [Select_CString(andrei_rublev.IsFemale,'Вона', 'Він')] дотримується всіх правил чернечого життя, при цьому продовжуючи розписувати стіни та собори знаменитої обителі."
  flavor_mos.11.desc_byzantine_master: "$flavor_mos.11.desc_common1$\n\nНадзвичайний талант іконописця в [Select_CString(andrei_rublev.IsFemale,'ній', 'ньому')] розгледів візантійський майстер Феофан Грек, виходець із Константинополя. Кажуть, що його стиль справив великий вплив на техніку молодого майстра."
  flavor_mos.11.desc_st_sergius_monk: "$flavor_mos.11.desc_common1$\n\nЗараз [andrei_rublev.GetNameWithNoTooltip] перебуває в стінах #TOOLTIP:WORK_OF_ART,$holy_trinity_st_sergius_lavra_tt$,X #L Троїце-Сергієвої лаври#!#!. [Select_CString(andrei_rublev.IsFemale,'Вона', 'Він')] дотримується всіх правил чернечого життя, при цьому продовжуючи розписувати стіни та собори знаменитої обителі."
  flavor_mos.11.desc_all_criteria_met: "$flavor_mos.11.desc_common1$\n\n$flavor_mos.11.desc_common2$"
  flavor_mos.11.a: "[Select_CString(andrei_rublev.IsFemale,'Їй', 'Йому')] підходить життя в монастирі."
  flavor_mos.11.tt2: "Завдяки [Select_CString(andrei_rublev.IsFemale,'її', 'його')] талантам Троїце-Сергієва лавра буде прикрашена новими видатними творами релігійного мистецтва"
  flavor_mos.11.tt3: "Майстерність іконописця значно покращиться завдяки візантійській техніці, переданій [Select_CString(andrei_rublev.IsFemale,'їй', 'йому')] наставником"
  flavor_mos.11.b: "Нехай [Select_CString(andrei_rublev.IsFemale,'вона', 'він')] розпише наші собори."
  flavor_mos.11.tt4: "[Select_CString(andrei_rublev.IsFemale,'Її', 'Його')] спільна робота з візантійським наставником сильно вплине на розвиток #L [target_root_country.GetAdjective|l]ої#! школи релігійного мистецтва."
  flavor_mos.11.c: "Нам не потрібні нові фрески."
  flavor_mos.11.historical_info: "Андрєй Рубльов вважається одним із найвидатніших художників середньовічної Русі. Найвідомішим його творінням вважається ікона «Трійця» — справжній шедевр руського мистецтва. Для робіт Рубльова характерна обмежена палітра та гармонійна композиція з використанням приглушених кольорів. Його твори вплинули на багатьох руських художників і богословів. У 1988 році Андрій Рубльов був канонізований."
  flavor_mos.12.title: "Ікона «Трійця»"
  flavor_mos.12.desc: "[Select_CString(andrei_rublev.IsFemale,'Відома', 'Відомий')] іконописець [andrei_rublev.GetName] створив видатний шедевр живопису — ікону Святої Трійці. Три ангельські фігури, зображені сидячими за столом, символізують Отця, Сина і Святого Духа. Картина рясніє деталями та елементами, характерними і для інших робіт майстра, такими як гармонійне поєднання кольорів та обмежена палітра."
  flavor_mos.12.a: "Приманка для паломників."
  flavor_mos.12.b: "Нехай займається розписом існуючих святинь."
  flavor_mos.12.tt1: "[andrei_rublev.GetNameWithNoTooltip] займеться розписом #TOOLTIP:WORK_OF_ART,$holy_trinity_st_sergius_lavra_tt$,X #L Троїце-Сергієвої лаври#!#!"
  flavor_mos.12.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] високо оцінять подібну відданість духовним питанням"
  flavor_mos.12.c: "Вона погано поєднується з килимами."
  flavor_mos.12.historical_info: "Написана Андрієм Рубльовим близько 1410 року, ікона «Трійця» вважається одним із найвидатніших творів релігійного мистецтва. Вона століттями надихала художників і донині служить символом руської православної духовності. Ікона спонукає до роздумів, споглядання та молитви."
  flavor_mos.13.title: "Паперовий заповіт"
  flavor_mos.13.desc: "Ретельне ведення документації допомагає вирішувати суперечки та зберігати спадкоємність у політиці. [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Наша повелителька', 'Наш повелитель')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вирішила', 'вирішив')] скласти #TOOLTIP:GOODS,paper,X #L паперовий#!#! заповіт, виклавши в ньому свої вказівки щодо управління #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! після [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] кончини."
  flavor_mos.13.a: "Яка чудова ідея."
  flavor_mos.13.tt1: "Широке застосування паперу в державних справах сприятиме зміцненню влади та спадщини правлячої династії, а надалі зможе призвести до повсюдного використання цього матеріалу"
  flavor_mos.13.b: "Краще приберегти папір для релігійних книг."
  flavor_mos.13.c: "Занадто дорого, та й потреби в цьому немає."
  mos_paper_wills: "Паперовий заповіт"
  flavor_mos.13.historical_info: "Першим правителем Московського князівства, який залишив по собі заповіт, був Іван I Калита. У своїй останній волі, #italic  Заповіті Калити#!, князь висловив думки про управління країною, а також залишив вказівки щодо престолонаслідування та розділу своїх володінь між синами."
  flavor_mos.14.title: "Митрополит Олексій"
  flavor_mos.14.desc: "Нещодавно [Select_CString(metropolitan_alexius.IsFemale,'обрана', 'обраний')] митрополит [metropolitan_alexius.GetShortName] не [Select_CString(metropolitan_alexius.IsFemale,'має наміру', 'має наміру')] обмежувати себе виключно #TOOLTIP:RELIGION,$orthodox_tt$,X #L церковною#!#! діяльністю — прелат жваво цікавиться справами країни та хоче зробити свій внесок у #L [ROOT.GetCountry.GetAdjective|l]у#! зовнішню політику. [Select_CString(metropolitan_alexius.IsFemale,'Вона', 'Він')] має чималий досвід у галузі дипломатії та управління, і якщо ми хочемо стати законними правителями всієї Русі, допомога митрополита буде дуже доречною."
  flavor_mos.14.a: "Запросимо [Select_CString(metropolitan_alexius.IsFemale,'її', 'його')] до двору."
  flavor_mos.14.tt2: "Опинившись під [Select_CString(metropolitan_alexius.IsFemale, 'її', 'його' )] впливом, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] стане більш [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'богобоязною', 'богобоязним' )]"
  flavor_mos.14.b: "Призначимо [Select_CString(metropolitan_alexius.IsFemale,'її', 'його')] на посаду регента."
  flavor_mos.14.c: "[Select_CString(metropolitan_alexius.IsFemale,'Її', 'Його')] вплив небезпечний для країни."
  flavor_mos.14.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть незадоволені, що двір чинить опір духовному впливу на справи країни"
  STATIC_MODIFIER_NAME_spiritual_administrator: "Духовний адміністратор"
  STATIC_MODIFIER_NAME_metropolitan: "Митрополит"
  flavor_mos.14.historical_info: "Митрополит Олексій був опікуном і духовним наставником малолітнього князя Дмитра Донського. Він відіграв важливу роль у становленні Москви як великого політичного та релігійного центру. На посаді митрополита Олексій сприяв розвитку релігійної освіти, освятив безліч нових церков і монастирів."
  flavor_mos.15.title: "Годинникова вежа"
  flavor_mos.15.desc: "Рятуючись від війни та переслідувань серед рідних країв #ONCLICK:COUNTRY,[GetCountry('SER').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SER').Custom('CL_tt')],X [GetCountry('SER').Custom('CL_GEN')|L]#!#!, до #TOOLTIP:LOCATION,moscow,X #L Москви#!#! прибув монах і годинникар на ім'я Лазар. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] люб'язно прийняв іноземного ремісника, і той показав креслення незвичайного пристрою — механічного годинника. Це диво інженерної думки може точно відміряти час без втручання людини! Безсумнівно, такий винахід виведе #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! в лідери технічної думки та підштовхне наукову діяльність у країні."
  flavor_mos.15.a: "Негайно почнемо виготовлення пристрою."
  flavor_mos.15.tt1: "Новий годинник вразить містян до глибини душі. Місто привабить великі інвестиції та багатьох здібних винахідників."
  flavor_mos.15.b: "Ми покажемо цей винахід наймудрішим серед наших підданих."
  flavor_mos.15.c: "Тепер це наш винахід!"
  flavor_mos.15.tt2: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] у своїй жадібності оголосить [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'саму', 'самого')] себе [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'винахідницею', 'винахідником')] механічного годинника"
  flavor_mos.15.historical_info: "Перша годинникова вежа московського Кремля була побудована за Івана III. Механічний годинник не тільки відлічував час, а й використовувався для оповіщення населення про важливі події. У ті часи він вважався справжнім дивом техніки, по всій Європі подібних йому було не більше десятка. Таким чином вежа слугувала зримим символом могутності та впливу Московії."
  flavor_mos.16.title: "Суперечка про престолонаслідування"
  flavor_mos.16.desc: "Після татаро-монгольської навали вибір спадкоємця значною мірою залежав від волі хана. Для Орди питання престолонаслідування на #TOOLTIP:REGION,russian_region,X #L Північно-Східній Русі#!#! допомагало завойовникам нацьковувати суперницькі князівства одне на одне, щоб зберегти баланс сил у регіоні.\n\nАле тепер настав час змін. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'успадкувала', 'успадкував')] владу від батька — у повній відповідності до його останньої волі. На жаль, у заповіті також був пункт, за яким у разі малолітства [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'законної спадкоємиці', 'законного спадкоємця')] влада переходила до найближчого дорослого родича. Тепер [pretender.GetName] відкрито претендує на князівську владу — і користується чималою підтримкою серед населення."
  flavor_mos.16.a: "Можливо, нас підтримає [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] — звернімося до них по допомогу."
  flavor_mos.16.a.custom: "Багато #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! отримують [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e] та переходять на бік персонажа [pretender.GetNameWithNoTooltip]."
  flavor_mos.16.b: "Можливо, нас підтримає [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] — звернімося до них по допомогу."
  flavor_mos.16.b.custom: "Багато #TOOLTIP:POPTYPE,clergy,X #L духовенства#!#! та #TOOLTIP:POPTYPE,peasants,X #L селян#!#! отримують [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e] та переходять на бік персонажа [pretender.GetNameWithNoTooltip]."
  flavor_mos.16.tt1: "[pretender.GetNameWithNoTooltip] відступить від [target_location.Custom('LR_GEN')|l] [target_location.GetName] і почне планувати свій наступний хід."
  flavor_mos.16.c: "Ми повинні опублікувати заповіт."
  flavor_mos.16.tt2: "Паперовий заповіт покійного князя збережеться на диво добре, він доведе, що [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] має всі права на престол"
  flavor_mos.16.tt3: "[pretender.GetNameWithNoTooltip] відступить від міста [target_location.GetName]. [Select_CString(pretender.IsFemale,'Їй', 'Йому')] навряд чи вдасться зібрати багато прихильників."
  flavor_mos.16.d: "Нехай нас розсудить хан [GetCountry('GLH').Custom('CL_GEN')]."
  flavor_mos.16.tt4: "Ми звернемося до #L [GetCountry('GLH').GetAdjective|l]их#! властей із проханням підтвердити, що [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] може розраховувати на їхню підтримку"
  flavor_mos.16.tt5: "$rank_kingdom_horde_ruler_suffix_male$ зможе вирішити, що [pretender.GetNameWithNoTooltip] є більш підходящим кандидатом"
  war_of_succession_pretender: "Претендент із роду Рюриковичів"
  flavor_mos.16.historical_info: "У XIII столітті руські князівства були порівняно невеликими та слабкими, їхні правителі могли панувати лише зі схвалення хана Золотої Орди. Протягом наступного століття влада Московського князівства неухильно зростала, і зрештою князь Василь I наважився кинути виклик ханській владі, заповідавши престол своєму синові. Остання воля князя залишала ґрунт для різночитань, і після смерті правителя заповіт був оскаржений його братом. Конфлікт призвів до багаторічної громадянської війни, відомої як міжусобна війна в Московській Русі."
  flavor_mos.21.title: "Прикази"
  flavor_mos.21.desc: "Неефективне управління вже давно заважає #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! посісти належне країні місце серед великих держав. Щоб підвищити ефективність адміністрації, варто розподілити контроль над державними справами між кількома органами управління. Це сприятиме якнайшвидшому виконанню указів, які видає [ROOT.GetCountry.GetGovernment.GetRuler.GetName], та посилить централізацію влади."
  flavor_mos.21.a: "Хіба можна керувати країною інакше?"
  flavor_mos.21.tt1: "У країні з'явиться кілька управ; члени [Concept('cabinet', 'ради')|e] зможуть наглядати за ними за допомогою [Concept('cabinet_action', 'дій ради')|e]"
  enable_prikazi_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L «Прикази»#!#!"
  flavor_mos.21.b: "Запорука успіху — у свободі дій."
  flavor_mos.21.historical_info: "Приказами називалися органи державного управління в Руському царстві та в перші роки існування Російської імперії. Вони виконували царські рішення, а також повсякденні функції, необхідні для роботи державного апарату. Найбільші прикази займалися зовнішньою політикою, вони відіграли ключову роль у період, коли Русь була оточена ворогами і ще боролася за незалежність від Золотої Орди."
  flavor_mos.22.title: "[ShowGovernmentReformNameWithNoTooltip('razriadnyi_reform')]"
  flavor_mos.22.desc: "У країні практично не ведеться облік населення, його майна та податків, і це ускладнює контроль над витратами скарбниці та фінансування державного апарату. Проводячи регулярні переписи населення силами нещодавно створеного #TOOLTIP:GOVERNMENT_REFORM,razriadnyi_reform,X #L Розрядного приказу#!#!, ми отримаємо докладні відомості про всіх #L [ROOT.GetCountry.GetAdjective|l]их#! підданих та їхні домогосподарства — якими ресурсами вони володіють і які зобов'язання повинні виконувати."
  flavor_mos.22.a: "Якщо знадобиться, ми заглянемо під кожен камінь."
  enable_razriadnyi_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,razriadnyi_reform,X #L «Розрядний приказ»#!#!"
  flavor_mos.22.b: "Це буде проникненням у їхнє приватне життя."
  flavor_mos.22.historical_info: "Військова канцелярія, #italic Розрядний приказ#!, запровадила перепис населення, що дозволило владі визначати податкові зобов'язання підданих залежно від їхнього багатства, майна та соціального становища. Крім того, завдяки розрядним книгам країна завжди знала, скільки вояків та військового майна здатний поставити кожен стан відповідно до своїх зобов'язань. Такі реєстри населення виявилися незамінними для управління великою та неоднорідною територією."
  flavor_mos.23.title: "Угорський договір"
  flavor_mos.23.desc: "[GetCountry('LIT').GetName] — молода, але грізна країна з великими прагненнями: вона не тільки ворогує з #ONCLICK:COUNTRY,[GetCountry('TEU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TEU').Custom('CL_tt')],X [GetCountry('TEU').Custom('CL_INST')|L]#!#!, але й прагне підкорити собі землі східних слов'ян. [ShowAreaName('smolensk_area')] поки ще належить нам, але ми готові здати землю #ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_DAT')|L]#!#! в обмін на певні дипломатичні гарантії. Після підписання мирного договору [GetCountry('LIT').GetNameWithNoTooltip] зможе повністю зосередитися на боротьбі з хрестоносцями, а ми убезпечимо свої володіння від нашестя."
  flavor_mos.23.a: "Ми висунемо свої умови."
  enable_state_controlled_church_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,state_controlled_church,X #L «Церква під контролем країни»#!#!"
  flavor_mos.23.tt1: "Після підписання угоди ми здамо [ShowAreaNameWithNoTooltip('smolensk_area')] [GetCountry('LIT').Custom('CL_DAT')]"
  flavor_mos.23.tt2: "Буде запропоновано союз"
  flavor_mos.23.b: "Навіщо зволікати? Нападемо на них, і край!"
  flavor_mos.23.c: "Інші області сильніше потребують нашої уваги."
  flavor_mos.23.historical_info: "У 1408 році Москва та Велике князівство Литовське підписали Угорський договір. В обмін на зміцнення дипломатичних відносин та короткочасний союз Литва отримала Смоленськ, що дозволило їй зміцнити своє становище та вплив у регіоні, а заодно зосередитися на боротьбі з Тевтонським орденом."
  flavor_mos.24.title: "Вестіарій"
  flavor_mos.24.desc: "Ніхто давно не займався описом державної скарбниці, ми навіть не можемо до ладу оцінити вартість цінностей, що там зберігаються. Потрібно придумати, як ефективніше розпоряджатися нашими багатствами — це не тільки полегшить досягнення наших дипломатичних цілей, а й дозволить покращити управління країною."
  flavor_mos.24.a: "Якісне управління — ключ до успіху."
  flavor_mos.24.b: "Для нас найважливіші таємні пружини дипломатії."
  flavor_mos.24.custom: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,vestiarium,X #L «Вестіарій»#!#!"
  flavor_mos.24.historical_info: "#italic «Вестіарій»#! Василя I — це опис цінностей, що зберігаються в царській казні. Його використовували для обліку всіх царських скарбів — від прикрас і дорогоцінних металів до одягу та тканин. У вестіарії також вівся облік дипломатичних подарунків та предметів, які використовувалися в державних церемоніях."
  flavor_mos.25.title: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] погоджується на наші умови"
  flavor_mos.25.desc_treaty_of_ugra: "Наші дипломатичні зусилля увінчалися успіхом — #L [sender.GetAdjective|l]і#! влада погодилася підписати взаємовигідний Угорський договір. Припинення військових дій забезпечить існування [ROOT.GetCountry.Custom('rank_ru_GEN')|l] та покращить відносини між нашими країнами.\n\nНаші посли явно не дарма їдять свій хліб."
  flavor_mos.25.desc_generic_treaty: "Наші дипломатичні зусилля не пропали дарма — [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.GetGovernment.GetRuler.IsFemale,'погодилася', 'погодився')] підписати договір.\n\nНаші посли явно не дарма їдять свій хліб."
  flavor_mos.25.a: "Багатообіцяючий початок."
  flavor_mos.25.tt1: "Ми здамо [ShowAreaNameWithNoTooltip('smolensk_area')] [GetCountry('LIT').Custom('CL_DAT')]"
  flavor_mos.25.tt2: "Буде укладено [Concept('alliance', 'союз')|e] з владою [GetCountry('LIT').Custom('CL_GEN')]"
  flavor_mos.25.b: "Чудово!"
  flavor_mos.26.title: "[sender.GetGovernment.GetRulerTitle] [sender.Custom('CL_GEN')] відхиляє нашу пропозицію"
  flavor_mos.26.desc_treaty_of_ugra_declined: "На жаль, [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.GetGovernment.GetRuler.IsFemale,'відкинула', 'відкинув')] нашу більш ніж щедру пропозицію. Судячи з усього, [Select_CString(sender.GetGovernment.GetRuler.IsFemale,'вона', 'він')] воліє жити в оточенні ворогів.\n\nУсі зусилля наших послів виявилися марними."
  flavor_mos.26.desc_generic_treaty: "На жаль, [sender.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[sender.Custom('CL_tt')] #TOOLTIP:COUNTRY,[sender.Custom('CL_tt')],X [sender.Custom('CL_GEN')|L]#!#! [Select_CString(sender.GetGovernment.GetRuler.IsFemale,'відкинула', 'відкинув')] нашу щедру пропозицію. [Select_CString(sender.GetGovernment.GetRuler.IsFemale,'Вона', 'Він')] не бажає підписувати договір.\n\nУсі зусилля наших послів виявилися марними."
  flavor_mos.26.a: "Це погубить їхню країну."
  flavor_mos.26.b: "Можливо, ми прорахувалися."
  flavor_mos.26.tt: "[sender.GetName] більше не користуватиметься нашою довірою"
  flavor_mos.27.title: "[maria_borovsk.GetNameWithNoTooltip]"
  flavor_mos.27.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'має вийти заміж', 'має одружитися')], тому [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] знайшли найдостойнішу кандидатуру на роль [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] [Select_CString(maria_borovsk.IsFemale,'дружини', 'чоловіка')]. [maria_borovsk.GetName] походить зі знатного дворянського роду, [Select_CString(maria_borovsk.IsFemale,'вона відома', 'він відомий')] своєю благочестивістю та милосердям. [Select_CString(maria_borovsk.IsFemale,'Ця жінка', 'Цей чоловік')] стане [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'государині', 'государю')] чудовою парою у справах і державних, і сердечних."
  flavor_mos.27.a: "Благословенний будь їхній союз."
  flavor_mos.27.tt1: "З'явиться [Concept('character', 'персонаж')|e] [maria_borovsk.GetNameWithNoTooltip]"
  flavor_mos.27.tt2: "[Select_CString(maria_borovsk.IsFemale,'Її', 'Його')] милосердні та благочестиві діяння посприяють заснуванню Боровського монастиря"
  flavor_mos.27.b: "Краще відправимо [Select_CString(maria_borovsk.IsFemale,'її', 'його')] до монастиря."
  flavor_mos.27.tt3: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] матиме достатньо дітей, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] не [Select_CString(maria_borovsk.IsFemale,'потрібна нова дружина', 'потрібен новий чоловік')]"
  flavor_mos.27.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] будуть серйозно занепокоєні тим, що [target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] не має достатньо спадкоємців і при цьому відмовляється [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'виходити заміж', 'одружитися')]"
  flavor_mos.27.historical_info: "Марія Ярославна — руська княжна, дружина великого князя Василя II. У ході міжусобної війни в Московській Русі її чоловік на деякий час втратив владу, а сама Марія опинилася в темниці. Князівське подружжя вигнали з Москви, але зрештою Василь II зумів здобути гору. Наприкінці життя Марія Ярославна прийняла чернечий обіт і присвятила свої останні роки молитві, посту та допомозі нужденним."
  flavor_mos.28.title: "$uspensky_sobor$"
  flavor_mos.28.desc: "Нещодавно збудований #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремль#!#! добре захищає наших підданих, проте в ньому бракує іскри духовного життя. Величний собор на честь Успіння Пресвятої Богородиці був би ідеальним місцем для коронації та поховання майбутніх князів. Подібний храм стане зримим символом нашого прагнення до об'єднання руських земель."
  flavor_mos.28.a: "Цей собор буде головною святинею нашої країни."
  mos_uspensky_sobor_construction: "Будівництво Успенського собору"
  flavor_mos.28.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вельми задоволені будівництвом великої релігійної [Concept('building', 'споруди')|e]"
  flavor_mos.28.b: "Краще замовимо побільше творів релігійного мистецтва."
  flavor_mos.28.c: "Такий собор буде магнітом для татарських набігів."
  flavor_mos.28.tt2: "Значні зусилля будуть витрачені на зміцнення оборонних споруд"
  flavor_mos.28.historical_info: "Перший Успенський собор у Москві був збудований за Івана Калити. Храм став місцем проведення найважливіших релігійних церемоній, зокрема коронацій московських князів. З часом собор занепав, і в наступному столітті на його місці звели розкішний храм, створений під сильним впливом візантійської архітектури."
  flavor_mos.29.title: "Пермське письмо"
  flavor_mos.29.desc: "Землі навколо нашої країни все ще не знають світла Христового, їхні мешканці донині дотримуються язичницьких забобонів. Навернення заблудлих вимагає активної діяльності місіонерів, проте мовні бар'єри роблять це завдання практично нездійсненним.\n\n[stephen_of_perm.GetName], [Select_CString(stephen_of_perm.IsFemale,'благочестива проповідниця', 'благочестивий проповідник')] родом із далеких західних земель, [Select_CString(stephen_of_perm.IsFemale,'оселилася', 'оселився')] в #TOOLTIP:LOCATION,perm,X #L Пермі#!#!, щоб донести до неохрещених світ християнського вчення. Заради своєї місії [Select_CString(stephen_of_perm.IsFemale,'вона звалила', 'він звалив')] на себе непосильне завдання — створити нову абетку, засновану на східнослов'янському алфавіті, але таку, що включає символи, яких у кирилиці немає. Якщо [Select_CString(stephen_of_perm.IsFemale,'вона', 'він')] досягне успіху, ми зможемо перекласти священні книги на мови нехрещених народів."
  flavor_mos.29.a: "Працюй, [Select_CString(stephen_of_perm.IsFemale,'священнослужителько', 'священнику')], працюй."
  STATIC_MODIFIER_NAME_cyrilic_scripter: "Кириличне письмо"
  flavor_mos.29.tt1: "З'явиться [Concept('character', 'персонаж')|e] [stephen_of_perm.GetNameWithNoTooltip]"
  flavor_mos.29.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] раді бачити можливість навернути заблудлі душі"
  flavor_mos.29.b: "Збереження віри стоїть на першому місці."
  flavor_mos.29.tt3: "[stephen_of_perm.GetNameWithNoTooltip] обмежиться переписуванням релігійних книг."
  flavor_mos.29.historical_info: "Давньопермське письмо було розроблено Стєфаном Пермським, дослідником мови та звичаїв комі — корінного народу, що населяє східні околиці Московського князівства. Щоб полегшити навернення комі в християнство, він створив особливий алфавіт — фактично першу писемність для мов уральської сім'ї. За ці заслуги Стєфана поставили першим єпископом Пермі."
  flavor_mos.30.title: "[prokhor_of_gorodets.GetNameWithNoTooltip]"
  flavor_mos.30.desc: "[Select_CString(prokhor_of_gorodets.IsFemale,'Черниця-відлюдниця', 'Чернець-відлюдник')] на ім'я [prokhor_of_gorodets.GetName] — справжній майстер іконопису. Коли [Select_CString(prokhor_of_gorodets.IsFemale,'вона не зайнята', 'він не зайнятий')] духовним спогляданням, то творить справжні дива. Можливо, [Select_CString(prokhor_of_gorodets.IsFemale,'вона', 'він')] погодиться розписати нещодавно освячений #TOOLTIP:WORK_OF_ART,$uspensky_sobor_tt$,X #L Успенський собор#!#!, прикрасивши своїми роботами іконостас між навою та святилищем…"
  flavor_mos.30.a: "Сказано — зроблено!"
  flavor_mos.30.tt1: "З'явиться [Concept('character', 'персонаж')|e] [prokhor_of_gorodets.GetNameWithNoTooltip]"
  flavor_mos.30.tt2: "[Select_CString(prokhor_of_gorodets.IsFemale,'Вона', 'Він')] напише кілька нових фресок для Успенського собору"
  flavor_mos.30.b: "Не будемо [Select_CString(prokhor_of_gorodets.IsFemale,'її', 'його')] відволікати."
  flavor_mos.30.tt3: "[prokhor_of_gorodets.GetNameWithNoTooltip] розписуватиме все, що забажає"
  flavor_mos.30.tt4: "[Select_CString(prokhor_of_gorodets.IsFemale,'Її', 'Його')] підмайстер — [andrei_rublev.GetName]. [prokhor_of_gorodets.GetNameWithNoTooltip] виділить час, щоб наставляти [Select_CString(andrei_rublev.IsFemale,'свою ученицю', 'свого учня')], і разом вони напишуть кілька видатних фресок"
  flavor_mos.30.historical_info: "Прохор із Городця — руський православний чернець, що прославився своєю роботою над розписом іконостасу в Благовіщенському соборі Москви. Його пензлю належать фрески «Розп'яття», «Вознесіння» та «Успіння». Прохор присвятив своє життя служінню церкві. Він був наставником Андрія Рубльова — одного з найвидатніших живописців у руській історії."
  flavor_mos.31.title: "Юріїв день"
  flavor_mos.31.desc: "Згідно з «Судебником», #TOOLTIP:POPTYPE,peasants,X #L кріпаки#!#! можуть переходити від одного господаря до іншого один раз на рік — зазвичай до завершення річного циклу сільськогосподарських робіт, щоб уникнути перебоїв з постачанням продовольства. Бажаючи покращити умови праці, незадоволені цим обмеженням [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] просять повернути їм свободу пересування по #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!."
  flavor_mos.31.a: "У забороні на пересування селян немає жодної вигоди."
  flavor_mos.31.b: "Найкраще — ворог хорошого."
  flavor_mos.31.c: "Спробуємо якось відкараскатися."
  flavor_mos.31.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] отримають деякі поступки, що послабить контроль уряду над країною"
  flavor_mos.31.historical_info: "Прийнятий у 1497 році «Судебник» різко обмежив право селян на пересування, закріпивши владу поміщиків і фактично встановивши в Московському князівстві кріпосне право. Тепер селянин міг змінити господаря лише протягом двотижневого періоду, який прозвали Юрієвим днем — на ці дні припадав осінній день пам'яті святого Георгія. За Івана Грозного закріпачення лише посилилося — з селян, що переходили, стали стягуватися додаткові побори. До кінця XVI століття можливість покинути поміщика була скасована зовсім, що означало остаточне встановлення кріпосного права."
  flavor_mos.32.title: "«Пожиле»"
  flavor_mos.32.desc: "Свобода пересування для #TOOLTIP:POPTYPE,peasants,X #L селян#!#! допомагає вирішувати проблеми з дефіцитом робочої сили та заохочує здорову конкуренцію між землевласниками. Водночас міграція працівників вносить елемент непередбачуваності в сільськогосподарський цикл, не дозволяє будувати довгострокові плани та робить невигідними будь-які зусилля щодо підвищення продуктивності праці, оскільки землевласник не може бути впевнений у тому, що працівники залишаться з ним на наступний рік. Ми можемо запровадити плату за вихід, яка стягуватиметься з кожного селянина, що бажає покинути свого землевласника. Це стримає щорічну міграцію робочої сили."
  flavor_mos.32.a: "Де пряник, там і батіг."
  STATIC_MODIFIER_NAME_pozhiloye: "«Пожиле»"
  flavor_mos.32.b: "У цьому немає потреби."
  flavor_mos.32.historical_info: "Плата за «пожиле» була запроваджена 1550 року в межах масштабної реформи «Судебника». Вона стала черговим етапом зміцнення влади аристократії та закріпачення селян. Водночас переглянутий «Судебник» гарантував право кожного працівника піти від землевласника, якщо він зможе заплатити мито."
  flavor_mos.33.title: "[sophia_palaiologina.GetNameWithNoTooltip]"
  flavor_mos.33.desc: "#TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#! впав, але завдяки цій трагедії у нас з'явилася можливість поєднатися сімейними узами з колишньою правлячою елітою #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#!. Якщо [sophia_palaiologina.GetName] вийде заміж за государя, це сприятиме посиленню візантійського впливу при дворі та зміцнить наші претензії на роль провідної #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! країни та законних наступників Римської імперії. Ба більше, їхні діти стануть спадкоємцями імператорів загиблої імперії."
  flavor_mos.33.a: "Передбачений союз!"
  flavor_mos.33.tt1: "З'явиться [Concept('character', 'персонаж')|e] [sophia_palaiologina.GetNameWithNoTooltip]"
  enable_byzantine_court_ceremonies_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,byzantine_court_ceremonies_reform,X #L «Візантійські придворні церемонії»#!#!"
  flavor_mos.33.tt2: "[Select_CString(sophia_palaiologina.IsFemale,'Її', 'Його')] неприязнь до деяких послів зіпсує дипломатичні відносини між #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_INST')|L]#!#! та сусідами-[Concept('heathen', 'чужовірцями')|e]"
  STATIC_MODIFIER_NAME_mongol_intolerance: "Нетерпимість до монголів"
  flavor_mos.33.b: "Цей шлюб не дає жодних переваг."
  flavor_mos.33.historical_info: "Після одруження Івана III із Софією Палеолог при великокнязівському дворі увійшов у вжиток складний візантійський придворний церемоніал. Це допомогло зміцнити претензії Москви на символічний статус Третього Риму. Софія народила одинадцять дітей і була бабусею сумнозвісного Івана Грозного. Її нетерпимість до монгольського впливу спричинила кілька дипломатичних інцидентів і сприяла остаточному розриву Москви із Золотою Ордою 1480 року."
  flavor_mos.34.title: "[ridolfo_fioravanti.GetNameWithNoTooltip]"
  flavor_mos.34.desc: "До #TOOLTIP:LOCATION,moscow,X #L Москви#!#! прибув відомий зодчий та інженер на ім'я [ridolfo_fioravanti.GetName]. [ROOT.GetCountry.GetGovernment.GetRuler.GetName] особисто [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'запросила', 'запросив')] [Select_CString(ridolfo_fioravanti.IsFemale,'її', 'його')] відвідати нашу країну, сподіваючись на те, що [Select_CString(ridolfo_fioravanti.IsFemale,'іменита іноземка', 'іменитий іноземець')] додасть пишноти #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремлю#!#!. Якщо [ridolfo_fioravanti.GetNameWithNoTooltip] прийме замовлення, [Select_CString(ridolfo_fioravanti.IsFemale,'її', 'його')] робота неодмінно вплине на архітектуру інших міст [ROOT.GetCountry.Custom('rank_ru_GEN')|l] та підвищить престиж нашої країни в очах інших європейських країн."
  flavor_mos.34.a: "Привести [Select_CString(ridolfo_fioravanti.IsFemale, 'її', 'його' )] сюди."
  flavor_mos.34.tt1: "З'явиться [Concept('character', 'персонаж')|e] [ridolfo_fioravanti.GetNameWithNoTooltip]"
  flavor_mos.34.tt2: "Завдяки [Select_CString(ridolfo_fioravanti.IsFemale,'їй', 'йому')] до країни потраплять новітні будівельні технології доби Відродження"
  flavor_mos.34.tt3: "[Select_CString(ridolfo_fioravanti.IsFemale, 'Вона', 'Він' )] перебудує #TOOLTIP:WORK_OF_ART,$uspensky_sobor_tt$,X #L Успенський собор#!#! відповідно до останніх віянь моди"
  flavor_mos.34.tt4: "[Select_CString(ridolfo_fioravanti.IsFemale, 'Її', 'Його' )] знання в галузі гідротехніки допоможуть удосконалити інфраструктуру Москви"
  flavor_mos.34.b: "Обійдемося без іноземного впливу."
  flavor_mos.34.historical_info: "Рідольфо Арістотель Фіорванті — відомий італійський архітектор та інженер, автор кількох великих проєктів в Італії. У 1475 році він прийняв запрошення великого князя Івана III, який бажав підвищити статус Москви до рівня інших європейських міст, і перебрався на Русь. Саме він побудував будівлю Успенського собору Кремля, яка збереглася донині."
  flavor_mos.35.title: "[marco_ruffo.GetNameWithNoTooltip]"
  flavor_mos.35.desc_kremlin: "Військовий архітектор на ім'я [marco_ruffo.GetName] прибув до нас із #TOOLTIP:LOCATION,milano,X #L Мілана#!#!, щоб запропонувати свої послуги. [Select_CString(marco_ruffo.IsFemale, 'Вона зголосилася', 'Він зголосився' )] посилити стіни #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремля#!#! новими вежами, щоб підвищити обороноздатність нашої головної фортеці. $flavor_mos.35.desc_common$"
  flavor_mos.35.desc_defensiveness: "Військовий архітектор на ім'я [marco_ruffo.GetName] прибув до нас із #TOOLTIP:LOCATION,milano,X #L Мілана#!#!, щоб запропонувати свої послуги. [Select_CString(marco_ruffo.IsFemale, 'Вона зголосилася', 'Він зголосився' )] вжити низку заходів, спрямованих на підвищення обороноздатності нашої країни. $flavor_mos.35.desc_common$"
  flavor_mos.35.desc_common: "Безсумнівно, подібна ініціатива не тільки сприятиме передачі нових знань із Заходу на Схід, а й посилить наші позиції на #TOOLTIP:REGION,russian_region,X #L Північно-Східній Русі#!#!"
  flavor_mos.35.a: "Підготувати креслярські столи!"
  flavor_mos.35.tt1: "З'явиться [Concept('character', 'персонаж')|e] [marco_ruffo.GetNameWithNoTooltip]"
  flavor_mos.35.tt2: "[Select_CString(marco_ruffo.IsFemale, 'Вона', 'Він' )] підвищить обороноздатність #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремля#!#!, прибудувавши нові вежі до оточуючих #TOOLTIP:LOCATION,moscow,X #L Москву#!#! фортечних стін"
  flavor_mos.35.tt3: "Завдяки [Select_CString(marco_ruffo.IsFemale,'їй', 'йому')] до країни потраплять новітні досягнення в галузі оборонної стратегії доби Відродження"
  flavor_mos.35.b: "Найкращий напад — це надійний захист."
  flavor_mos.35.c: "Нехай [Select_CString(marco_ruffo.IsFemale, 'вона', 'він' )] наставляє наших найкмітливіших підданих."
  flavor_mos.35.tt4: "[Select_CString(marco_ruffo.IsFemale, 'Вона', 'Він' )] поділиться своїм оборонним досвідом з місцевими зодчими, поширюючи знання по країні."
  flavor_mos.35.d: "Нехай краще збудує нам новий палац для бенкетів."
  flavor_mos.35.tt5: "Майстерно прикрашений палац стане основним місцем для проведення коронацій, бенкетів та офіційних прийомів."
  flavor_mos.35.historical_info: "Марко Руффо, також відомий як Марк Фрязін, прибув до Москви на запрошення Івана III. Місто не раз піддавалося розграбуванню, і князь був сповнений рішучості зміцнити його оборону та відстояти незалежність князівства від Золотої Орди, а заодно й підвищити міжнародний престиж країни. Крім укріплень, зодчий спроєктував Грановиту палату Кремля."
  flavor_mos.36.title: "Грізна мати"
  flavor_mos.36.desc: "Відсутність спадкоємця — серйозний привід для занепокоєння, і у нас немає особливих надій, що [current_wife.GetName] в осяжному майбутньому зможе його народити. Церква не схвалює розлучень, але [ROOT.GetCountry.GetGovernment.GetRuler.GetName] повинен підшукати собі нову молоду дружину, щоб забезпечити продовження династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Юна [eleanor_glinskaya.GetName] відома своєю красою, вона принесе нам багато здорових спадкоємців. Проблема в тому, що [Select_CString(eleanor_glinskaya.IsFemale, 'вона', 'він' )] дотримується #TOOLTIP:RELIGION,$shamanism_tt$,X #L шаманістської#!#! віри. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] напевно будуть проти цього шлюбу."
  flavor_mos.36.a: "Продовження династії найважливіше."
  STATIC_MODIFIER_NAME_terrible: "Грізний"
  flavor_mos.36.tt1: "З'явиться [Concept('character', 'персонаж')|e] [eleanor_glinskaya.GetNameWithNoTooltip], народжується [ivan_the_terrible.GetName]"
  flavor_mos.36.b: "Чинна дружина ще в змозі понести спадкоємця."
  flavor_mos.36.historical_info: "Олена Василівна Глинська, друга дружина Василя III, належала до знатного литовського роду татарського походження. Саме вона народила Івана Грозного, який згодом стане першим царем всієї Русі. Після смерті чоловіка Глинська правила як регент при малолітньому сині, вона провела кілька вдалих реформ і уклала вигідний мир з Великим князівством Литовським."
  flavor_mos.37.title: "Велика Московська пожежа"
  flavor_mos.37.desc: "У #TOOLTIP:LOCATION,moscow,X #L Москві#!#! вирують найсильніші пожежі. Вогонь стрімко поширюється, адже майже всі міські споруди зведені з #TOOLTIP:GOODS,lumber,X #L деревини#!#! та інших горючих матеріалів. Лише деякі місцевості міста залишаються у відносній безпеці. Немає сумнівів, що наслідки цієї трагедії відчуватимуться ще довгі роки."
  flavor_mos.37.a: "Це кара Господня!"
  flavor_mos.37.tt1: "Багато історичних цінностей та скарбів загинуть у вогні"
  flavor_mos.37.tt2: "Вогонь охопить Кремль і досягне запасів пороху, що зберігаються в баштах"
  flavor_mos.37.tt3: "Деякі історичні цінності та скарби загинуть у вогні"
  flavor_mos.37.b: "Могло бути й гірше."
  flavor_mos.37.historical_info: "У 1547 році Москву охопила сильна пожежа. Вогонь знищив цілі місцевості, збудовані з дерева. Навіть Кремль не уникнув руйнувань, але більшість релігійних споруд вціліли у полум'ї. Народна чутка негайно поклала провину на рідню матері царя Олени Глинської, які нібито спричинили пожежу за допомогою шаманських обрядів."
  flavor_mos.38.title: "Паломництво до лаври"
  flavor_mos.38.desc: "#TOOLTIP:WORK_OF_ART,$holy_trinity_st_sergius_lavra_tt$,X #L Троїце-Сергієва лавра#!#! у Сергієвому Посаді неподалік #TOOLTIP:LOCATION,pushkino,X #L Пушкіно#!#! приваблює #TOOLTIP:POPTYPE,clergy,X #L духовенство#!#!. Щороку тут буває безліч паломників, і їхня кількість неухильно зростає. Якщо офіційно оголосити монастир святим місцем для #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! віри, це підкреслить зростаючий вплив #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_mos.38.a: "Це великий день для всіх віруючих."
  flavor_mos.38.b: "Таке рішення може спричинити церковний розкол."
  flavor_mos.38.historical_info: "З моменту будівництва Троїце-Сергієвої лаври минуло близько ста років, за цей час монастир перетворився на місце паломництва та справжній духовний центр руського православ'я. Лавра має вже не лише релігійну цінність — тут зберігаються багато видатних творів культури та мистецтва. Попри вразливе становище монастиря, він пережив кілька періодів політичних та соціальних потрясінь — від Смутного часу до радянської влади."
  flavor_mos.39.title: "[target_country.GetAdjectiveWithNoTooltip]а експедиція"
  flavor_mos.39.desc: "Постійні татарські набіги за намовою #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! виснажують наші людські резерви. Кочівники викрадають народ у рабство, сільські області країни охоплені хаосом. Ми повинні підірвати їхню здатність здійснювати набіги, інакше кордони нашої країни скоро залишаться без захисту."
  flavor_mos.39.a: "Ми завдамо превентивного удару."
  flavor_mos.39.b: "Захоплення їхніх територій нічого не дасть."
  flavor_mos.39.c: "Краще витратити гроші на підготовку нашого війська."
  flavor_mos.39.tt1: "Буде проведено серію військових навчань"
  flavor_mos.39.historical_info: "У XV–XVI століттях Велике князівство Московське організувало кілька військових походів проти кримських татар. У ті роки Москва нерідко зазнавала спустошливих набігів ногаїв. Щоб підірвати військові можливості кочівників, було прийнято рішення перенести бойові дії на територію противника."
  flavor_mos.40.title: "Погане поводження"
  flavor_mos.40.desc: "З #ONCLICK:COUNTRY,[GetCountry('LIT').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIT').Custom('CL_tt')],X [GetCountry('LIT').Custom('CL_GEN')|L]#!#! прийшли тривожні вісті — [GetCountry('LIT').GetGovernment.GetRuler.GetName] вимагає, щоб [target_character.GetName] з династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] [Select_CString(target_character.IsFemale,'прийняла', 'прийняв')] #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьку#!#! віру. Подібне поводження вимагає рішучої відповіді… і може посприяти досягненню далекосяжних стратегічних цілей."
  flavor_mos.40.a: "Ми помстимося за цю образу!"
  flavor_mos.40.tt1: "В силу своїх низьких дипломатичних здібностей [target_root_country.GetGovernment.GetRuler.GetName] доб'ється лише повного розриву відносин"
  flavor_mos.40.b: "Настав час вимагати їхньої беззастережної капітуляції."
  flavor_mos.40.tt2: "Влада [GetCountry('LIT').Custom('CL_GEN')] обдумає цю щедру пропозицію"
  flavor_mos.40.c: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'повинна', 'повинен')] отримати розлучення."
  flavor_mos.40.tt3: "Завдяки своїм дипломатичним здібностям [target_root_country.GetGovernment.GetRuler.GetName] домовиться про розлучення, зумівши уникнути війни"
  flavor_mos.40.historical_info: "У 1500 році Іван III дізнався, що з його дочкою Оленою, виданою заміж за великого князя литовського Олександра, погано поводяться при литовському дворі. В порушення умов шлюбного договору її примушували відмовитися від православної віри. Скориставшись цим приводом, Москва оголосила війну Литві. Бойові дії завершилися мирним договором, за яким Литва поступалася значною частиною своєї території, включаючи Чернігів — старовинне місто Київської Русі."
  flavor_mos.41.title: "Збирання землі руської"
  flavor_mos.41.desc: "Династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] контролює більшість удільних князівств #TOOLTIP:REGION,russian_region,X #L Північно-Східної Русі#!#!, однак постійні чвари заважають об'єднанню наших споконвічних земель. Настав час знехтувати сімейними узами та утвердити панування #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, незважаючи на інтереси родичів."
  flavor_mos.41.a: "Слабкі приречені на загибель."
  flavor_mos.41.tt1: "Своїми агресивними заявами [target_root_country.GetGovernment.GetRuler.GetName] спровокує невдоволення сусідніх країн"
  flavor_mos.41.b: "У нас є й інші важелі впливу."
  flavor_mos.41.c: "Використаємо законні приводи для захоплення земель."
  flavor_mos.41.tt2: "Використовуючи різночитання в «Судебнику», [target_root_country.GetGovernment.GetRuler.GetName] знайде законний привід для захоплення нових земель і консолідації своєї влади."
  flavor_mos.41.historical_info: "При Івані III Москва значно розширила свої території за рахунок сусідніх князівств. На той час багато удільних князів заборгували великому князю великі суми грошей. Забираючи їхні землі в оплату боргів, Москва сильно зміцнила свій контроль над руськими землями."
  flavor_mos.42.title: "Непопулярне регентство"
  flavor_mos.42.desc: "[last_ruler.GetName] [Select_CString(last_ruler.IsFemale,'померла', 'помер')], і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вкрай незадоволені, що тепер країною править [target_character.GetName]. Об'єднавшись із ріднею [Select_CString(last_ruler.IsFemale,'покійної государині', 'покійного государя')], вони замишляють скинути регента — а можливо, навіть убити. Ми повинні завдати удару до того, як вони здійснять свої злочинні задуми, інакше #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! чекає хаос…"
  flavor_mos.42.a: "Тут не раді узурпаторам."
  flavor_mos.42.b: "Винні будуть вигнані."
  flavor_mos.42.tt1: "[target_character.GetName] помре від отрути"
  flavor_mos.42.c: "Краще запропонуємо їм руку дружби."
  flavor_mos.42.tt2: "[target_character.GetName] переживе замах"
  flavor_mos.42.historical_info: "З 1533 по 1538 рік Олена Глинська була регентом при малолітньому Івані IV. Цей період супроводжувався боярськими інтригами та запеклою боротьбою за владу, під час якої Олена зіткнулася з братами свого покійного чоловіка Василя III. Розправившись із суперниками, Олена конфіскувала їхні землі на користь сина, проте тріумф княгині виявився недовгим. У 1538 році вона померла у віці 30 років — найімовірніше, отруєна боярами."
  flavor_mos.43.title: "Татарська слобода"
  flavor_mos.43.desc: "[target_location.GetRank.GetName] [target_location.GetName] продовжує зростати, проте ми могли б значно прискорити розвиток регіону та його перетворення на великий економічний центр — потрібно лише переманити до себе населення навколишніх земель. Взяти, наприклад, тих же #TOOLTIP:CULTUREGROUP,tatar_group,X #L татар#!#! — отримавши ділянку землі за межами міських стін, ці іновірці зможуть жити там за своїми звичаями, молитися своїм богам — і водночас сприяти економічному зростанню нашої країни."
  flavor_mos.43.a: "Підтримаємо татарську міграцію."
  flavor_mos.43.b: "Зараз не найвідповідніший час."
  flavor_mos.43.a.custom: "Татарські [Concept('pops', 'групи населення')|e] зі #TOOLTIP:REGION,steppes_region,X #L степів#!#! мігрують до нещодавно заснованої Татарської слободи [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_mos.43.historical_info: "Поява Татарської слободи в Москві збіглася в часі з періодом бурхливого зростання міста. Розташовані за межами міських стін, слободи були не просто житловими районами — вони перетворилися на самостійні центри торгівлі та культурного обміну, що сприяли економічному зростанню столиці."
  flavor_mos.44.title: "Плоди європейської вченості"
  flavor_mos.44.desc: "Енергійна експансія і особливо підкорення #ONCLICK:COUNTRY,[GetCountry('NOV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('NOV').Custom('CL_tt')],X [GetCountry('NOV').Custom('CL_GEN')|L]#!#! заклали основи могутньої #L [ROOT.GetCountry.GetAdjective|l]ої#! країни. З іншого боку, внаслідок цих завоювань до країни проникнув небезпечний західний вплив, здатний зруйнувати основи нашого суспільства. Необхідно посилити центральну владу, придушити будь-яке інакомислення та позбутися будь-яких слідів #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! віри — лише так ми зможемо утримати контроль над новими землями."
  flavor_mos.44.a: "Викорінимо всякі свободи!"
  STATIC_MODIFIER_NAME_territorial_aggrandizement: "Територіальна експансія"
  flavor_mos.44.b: "Ми вітаємо чужоземний вплив."
  STATIC_MODIFIER_NAME_curtailed_ambitions: "Обмеження амбіцій"
  flavor_mos.44.historical_info: "Іван III значно розширив територію Московського князівства, покінчив з пануванням Золотої Орди та підкорив удільних князів центральній владі. Водночас Іван різко обмежив свободу своїх підданих, а його затяте неприйняття католицизму призвело до протистояння Москви та Заходу. Це сильно уповільнило поширення наукового поступу та нових ідей, що виникали в той період по всій Європі."
  flavor_mos.45.title: "[ivan_fyodorov.GetNameWithNoTooltip]"
  flavor_mos.45.desc: "[Select_CString(ivan_fyodorov.IsFemale,'Майстриня чорнила та чарівниця паперу', 'Майстер чорнила та чарівник паперу')] на ім'я [ivan_fyodorov.GetName] мріє встановити у нас новий винахід похмурого генія з міста [GetInstitutionByKey('printing_press').GetOrigin.GetName]. Цей пристрій здатен справити величезний вплив на суспільство, він здійснить справжню революцію в тиражуванні всіляких текстів — від книг до офіційних документів."
  flavor_mos.45.a: "Негайно відкриємо друкарню."
  flavor_mos.45.tt1: "Через свою ксенофобію #L [target_root_country.GetAdjective|l]а#! влада не прийме чужоземного впливу"
  flavor_mos.45.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені тим, що друкарський верстат може залишити переписувачів без роботи"
  flavor_mos.45.b: "Краще залишимо все як є."
  flavor_mos.45.historical_info: "Іван Федоров — руський друкар та книговидавець, якого часто називають першим книгодрукарем на Русі. У 1564 році він за підтримки царя Івана IV заснував у Москві Друкарський двір, де випустив #italic «Апостол»#! — першу на Русі книгу, видану друкарським способом."
  flavor_mos.46.title: "«Апостол»"
  flavor_mos.46.desc: "Завдяки друкованим виданням, особливо релігійним текстам, народ стає лише грамотнішим та освіченішим, а отже, настав час привести їх до єдиного зразка. У #TOOLTIP:BUILDING_TYPE,printing_press_shop,X #L друкарській майстерні#!#!, що знаходиться в [target_location.Custom('LR_PREP')|l] [target_location.GetName], [target_artist.GetName] [target_artist.GetName] [Select_CString(target_artist.IsFemale, 'надрукувала', 'надрукував' )] #italic «Діяння святих апостолів»#! — перше в нашій країні видання з чітким датуванням."
  flavor_mos.46.a: "Ми дозволимо вільно розповсюджувати книгу."
  STATIC_MODIFIER_NAME_the_apostle_wide_distribution: "«Апостол»"
  flavor_mos.46.b: "Книги призначені лише для вищих верств суспільства."
  flavor_mos.46.tt1: "У післямові до книги буде сказано про організацію першої в країні друкарні, що викличе сплеск інтересу до [target_location.Custom('LR_DAT')|l] [target_location.GetNameWithNoTooltip]."
  STATIC_MODIFIER_NAME_the_apostle: "«Апостол»"
  flavor_mos.46.c: "Будемо викреслювати все зайве."
  flavor_mos.46.tt2: "Для максимальної ефективності книга піддасться ретельній редакції відповідно до [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L суворої цензури#!#!"
  flavor_mos.46.historical_info: "Вихід #italic «Апостола»#! став важливим кроком у культурному розвитку Русі. Тепер країна могла перейти від рукотворних списків до друкованих видань — як наслідок, релігійні тексти стали набагато доступнішими. Книга сприяла релігійному просвітництву народу та зміцненню християнської віри."
  flavor_mos.47.title: "Вчення Ніла Сорського"
  flavor_mos.47.desc: "Обурений розкішшю та багатством багатьох #L [ROOT.GetCountry.GetAdjective|l]их#! монастирів, духовний лідер Ніл Сорський закликає до церковної реформи. Його прихильники, що називають себе «нестяжателями», пропонують відмову від будь-якого майна, їхній ідеал — просте та смиренне життя, повністю присвячене вченню Христа. Безсумнівно, цей рух зіткнеться з запеклим опором існуючої церковної ієрархії, представники якої стверджують, що виконання духовних функцій неможливе без певного рівня матеріального достатку."
  flavor_mos.47.a: "Підтримаємо нестяжателів."
  flavor_mos.47.b: "Підтримаємо любостяжателів."
  flavor_mos.47.custom1: "Відкриває [Concept('law', 'закон')|e] #TOOLTIP:LAW,monastic_reformation_movement,X #L «Чернечий реформаторський рух»#!#!"
  flavor_mos.47.custom2: "[Concept('policy', 'Політику')|e] в межах [Concept('law', 'закону')|e] #TOOLTIP:LAW,monastic_reformation_movement,X #L «Чернечий реформаторський рух»#!#! можна змінювати не частіше ніж раз на десять років"
  flavor_mos.47.historical_info: "Ніл Сорський — руський православний чернець, що стояв біля витоків руху нестяжателів. Суворо дотримуючись обітниці бідності, ченці-нестяжателі критикували церковну розкіш та монастирі, що володіли вотчинами. Вчення Ніла зіткнулося з лютим протидією з боку Церкви, багато представників якої відкидали його погляди. Попри це, ідея нестяжательства залишила глибокий слід у руській духовності, і згодом Ніл Сорський був зарахований Руською православною церквою до лику святих."
  flavor_mos.48.title: "Строгановська школа іконопису"
  flavor_mos.48.desc: "Багата купецька родина #TOOLTIP:DYNASTY,$stroganov_dynasty_tt$,X #L Строганових#!#! — великі поціновувачі мистецтва. Вони готові профінансувати створення цілої школи іконопису для прикраси своїх численних палаців, розкиданих по всій країні. Твори, створені строгановськими майстрами, призначені для приватних зібрань, вони навряд чи принесуть нашій країні відчутну користь. Проте ця ініціатива посприяє духовному благополуччю #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! та дозволить нам заручитися підтримкою могутньої родини."
  flavor_mos.48.a: "Чому б не допомогти одне одному?"
  flavor_mos.48.b: "Краще підтримаємо їхні ділові підприємства."
  flavor_mos.48.c: "Вони мають право розраховувати на певний вплив при дворі."
  enable_stroganov_influences_cabinet_action: "Для представників династії Строганових відкривається [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,stroganov_influences,X #L «Вплив Строганових»#!#!"
  flavor_mos.48.historical_info: "Строгановська школа іконопису склалася в період розквіту руського середньовічного живопису, до того як мистецтво Східної Європи потрапило під вплив західних майстрів. Твори строгановських іконописців багато в чому відображали уподобання високородних покровителів школи, включаючи й самого царя. Їхні роботи залишалися затребуваними аж до заснування Санкт-Петербурга, яке супроводжувалося різким посиленням західного впливу."
  flavor_mos.49.title: "«Сказання про князів Володимирських»"
  flavor_mos.49.desc: "Представники династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] зводять свій родовід до римських імператорів, проте це не більше ніж малопереконливе народне передання. Якщо обґрунтувати походження династії в серйозному трактаті, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] отримає серйозне підґрунтя для своїх імперських домагань."
  flavor_mos.49.a: "Ніхто не посміє оскаржувати царське походження."
  flavor_mos.49.tt1: "[dmitry_gerasimov.GetName] та [Select_CString(dmitry_gerasimov.IsFemale,'її', 'його')] майстерність перекладача посприяють поширенню ідеї про те, що [target_root_country.GetNameWithNoTooltip] — це Третій Рим"
  flavor_mos.49.b: "Забобонна нісенітниця."
  flavor_mos.49.c: "Нехай це сказання стане окрасою Успенського собору."
  flavor_mos.49.historical_info: "#italic  «Сказання про князів Володимирських»#! було написано на початку XVI століття для підготовки вінчання московських князів на царство, його автором вважається Дмитро Герасимов або Пахомій Серб. Основне завдання «Сказання» — обґрунтувати історичний зв'язок між князівством Московським та римськими імператорами, насамперед Августом. Крім цього, книга значною мірою сформувала ідею Москви як Третього Риму, законної спадкоємиці Східної Римської імперії, що перестала існувати після падіння Константинополя."
  flavor_mos.50.title: "[dmitry_gerasimov.GetNameWithNoTooltip]"
  flavor_mos.50.desc: "Видатний книжник та вправний дипломат [dmitry_gerasimov.GetName] вільно володіє кількома мовами — результат якісної освіти, отриманої на території #ONCLICK:COUNTRY,[GetCountry('LIV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIV').Custom('CL_tt')],X [GetCountry('LIV').Custom('CL_GEN')|L]#!#!. Ці вміння стануть вельми доречними, якщо призначити [Select_CString(dmitry_gerasimov.IsFemale,'її', 'його')] послом при іноземному дворі. На цій посаді [Select_CString(dmitry_gerasimov.IsFemale,'вона', 'він')] посприяє зміцненню дипломатичної репутації #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! і, безсумнівно, зможе завести корисні знайомства з іншими вченими Відродження. З іншого боку, [Select_CString(dmitry_gerasimov.IsFemale,'її', 'його')] знанням мов можна знайти й краще застосування — наприклад, для перекладу релігійних текстів, які допоможуть у подальшому поширенні християнської віри."
  flavor_mos.50.a: "Міжнародне визнання зараз найважливіше."
  flavor_mos.50.tt2: "[Select_CString(dmitry_gerasimov.IsFemale,'Вона', 'Він')] проведе багато часу при іноземних дворах, розповідаючи чужоземцям про #L [target_root_country.GetAdjective|l]і#! простори"
  flavor_mos.50.tt3: "[Select_CString(dmitry_gerasimov.IsFemale,'Вона', 'Він')] ненадовго відвідує #TOOLTIP:LOCATION,rome,X #L Рим#!#!, де записує відомості про багато наукових винаходів"
  flavor_mos.50.b: "Краще залишимо все як є."
  flavor_mos.50.tt4: "[Select_CString(dmitry_gerasimov.IsFemale,'Вона', 'Він')] перекладе безліч релігійних текстів, сприяючи зміцненню впливу #TOOLTIP:RELIGION,$orthodox_tt$,X #L православної#!#! віри — чому [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] будуть вельми раді"
  flavor_mos.50.historical_info: "Дмитро Герасимов — відомий дипломат і перекладач, імовірний автор «Сказання про князів Володимирських». Він служив перекладачем при московських посольствах у Центральній та Північній Європі, а згодом отримав посаду посла в Римі, коли папа намагався створити широку коаліцію проти османів."
  flavor_mos.51.title: "Шапка Мономаха"
  flavor_mos.51.desc: "Цей значний головний убір, покритий золотом та інкрустований рубінами й смарагдами, вже не перший рік використовується для коронації наших государів, що, втім, не заважає вченим сперечатися про його походження. За легендою, шапка Мономаха була подарунком візантійського імператора, хоча це не більше ніж народне передання, не підтверджене доказами. Зараз могутність правлячих еліт велика як ніколи, і нам слід було б створити власну версію подій, яка підкреслить божественну природу влади та не залишить місця для сумнівів у походженні державних регалій."
  flavor_mos.51.a: "Ми оголосимо про візантійське походження шапки."
  flavor_mos.51.b: "Шапка Мономаха — це дар небес."
  flavor_mos.51.c: "Вона явно татарської роботи."
  flavor_mos.51.tt1: "Історична цінність шапки Мономаха підкреслюватиметься трактатом #TOOLTIP:WORK_OF_ART,$tale_of_the_princes_of_vladimir_tt$,X #L «Сказання про князів Володимирських»#!#!, де її походження викладено в усіх подробицях"
  flavor_mos.51.historical_info: "Вважається, що шапка Мономаха була виготовлена на початку XIV століття, а її перша згадка в документах припадає на 1518 рік. Шапка символізує самодержавну владу, а легенда про її походження повинна підкріплювати теорію про те, що Москва є Третім Римом (ця концепція отримує подальший розвиток у трактаті «Сказання про князів Володимирських»). Точне походження шапки Мономаха залишається предметом дискусій, проте її форма дозволяє припустити, що її привезли із Золотої Орди як подарунок московським князям. Втім, деякі вчені висувають інші теорії."
  flavor_mos.52.title: "Степенна книга"
  flavor_mos.52.desc: "Зараз триває робота зі створення великого літопису #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Одним з основних джерел для її написання слугує #TOOLTIP:WORK_OF_ART,$tale_of_the_princes_of_vladimir_tt$,X #L «Сказання про князів Володимирських»#!#!, а також низка інших важливих документів. Ця грандіозна робота дозволить історично обґрунтувати, чому саме ми є наступниками Римської імперії, і тим самим зміцнити владу династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Кожен правитель цієї родини має бути представлений як святий, чиї праведні справи незаперечні.\n\nНаписання #italic  «Степенної книги»#! має важливе значення для увічнення нашого великого минулого та просування історичної повістки."
  flavor_mos.52.a: "Це всього лише переказ."
  flavor_mos.52.tt1: "[ivan_the_terrible.GetName] вселятиме в писарів страх, тому вони прикрасять події в книзі, щоб уникнути репресій"
  STATIC_MODIFIER_NAME_imperial_descent: "Імперське походження"
  flavor_mos.52.b: "Найважливішу роль у цій історії відіграла церква."
  flavor_mos.52.c: "У їхніх справах не було нічого праведного."
  flavor_mos.52.historical_info: "#italic «Степенна книга»#! була укладена за дорученням митрополита Московського з метою представити історію країни таким чином, щоб вона відповідала переконанням царя. За задумом авторів, книга мала сформувати образ Москви як «Третього Риму» та зміцнити владу Івана IV, утвердивши ідею про її божественне походження."
  flavor_mos.53.title: "Соляний бунт"
  flavor_mos.53.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] незадоволені зростанням цін на #TOOLTIP:GOODS,salt,X #L сіль#!#!, яка необхідна їм для збереження продуктів. Народ переконаний, що в усьому винні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], чиє зловживання владою призвело до підвищення податків. Потрібно якомога швидше розглянути скарги людей та знизити податковий тягар, щоб не допустити розправи над чиновниками та уникнути повномасштабного повстання."
  flavor_mos.53.a: "Добре, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] можуть не платити податок."
  salt_riot: "Учасники соляного бунту"
  flavor_mos.53.b: "Нічого не будемо робити."
  flavor_mos.53.tt: "[target_root_country.GetGovernment.GetRuler.GetName] буде бездіяти, тому бунтівники почнуть громити майно #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! та #TOOLTIP:POPTYPE,clergy,X #L духовенства#!#!"
  flavor_mos.53.historical_info: "У 1648 році в Москві почалося велике повстання, відоме як Соляний бунт. У той час вартість солі постійно зростала, що важко позначалося на житті селян: сіль повсюдно використовувалася для зберігання продуктів, тому її недоступність могла призвести до масового голоду. Бунтівники розгромили кілька боярських та церковних дворів, після чого цар все ж погодився заарештувати кількох бояр та знизити ціни на сіль, щоб припинити повстання та полегшити становище селян."
  flavor_mos.54.title: "[antonio_possevino.GetNameWithNoTooltip] та його місія"
  flavor_mos.54.desc: "У межах своєї подорожі Європою розумний та ревний єзуїт Антоніо Поссевіно прибув до #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!, щоб проповідувати #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#! та перешкоджати поширенню #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#!. Можливо, своїм візитом Антоніо образить духовенство, проте він напевно допоможе нам налагодити відносини з іншими країнами завдяки своїм широким знанням у питаннях релігії та політики."
  flavor_mos.54.a: "Нехай викладе нам свої погляди."
  flavor_mos.54.tt2: "Він проведе багато часу при #L [target_root_country.GetAdjective|l]ому#! дворі, допомагаючи врегулювати різні внутрішні та зовнішні суперечки"
  STATIC_MODIFIER_NAME_controversial_nuncio: "Скандальний нунцій"
  flavor_mos.54.b: "Культурний обмін піде нам на користь."
  flavor_mos.54.tt3: "Він ще якийсь час не покине #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_ACC')|L]#!#! та поділиться з нами західними книгами, ідеями та знаннями"
  flavor_mos.54.c: "Його мотиви викликають підозри."
  flavor_mos.54.tt4: "Йому заборонять перебувати при дворі та обмежать його місіонерську діяльність"
  flavor_mos.54.historical_info: "Антоніо Поссевіно був італійським єзуїтом, який брав участь у дипломатичних місіях по всій Європі. У 1581 році папа Григорій XIII відправив його до Москви, щоб налагодити контакт із царем. Основними цілями його місії були забезпечення союзу між католицькими та православними країнами, а також протидія швидкому поширенню протестантизму."
  flavor_mos.55.title: "[joseph_volotsky.GetNameWithNoTooltip]"
  flavor_mos.55.desc: "Богослов [joseph_volotsky.GetName] прагне зміцнити владу церкви, запроваджуючи низку правил для протидії корупції та одночасно дозволяючи #TOOLTIP:BUILDING_TYPE,orthodox_monastery,X #L православним монастирям#!#! у [ROOT.GetCountry.Custom('rank_ru_PREP')|l] розпоряджатися землею на свій розсуд. Крім того, він рішуче виступає проти #TOOLTIP:RELIGION,$strigolniki_tt$,X #L стригольництва#!#!, тому може стати нам у пригоді в боротьбі з єретичними ідеями."
  flavor_mos.55.a: "Усю єресь необхідно викорінити."
  strigolniki_pops_tt: "[Concept('pop_satisfaction', 'Задоволення ')|e] всіх #TOOLTIP:RELIGION,$strigolniki_tt$,X #L стригольницьких#!#! [Concept('pops', 'груп населення')|e] знизиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  flavor_mos.55.tt1: "З'явиться [Concept('character', 'персонаж')|e] [joseph_volotsky.GetNameWithNoTooltip]"
  flavor_mos.55.tt2: "Він зосереджує свої зусилля на боротьбі зі #TOOLTIP:RELIGION,$strigolniki_tt$,X #L стригольництвом#!#!"
  flavor_mos.55.b: "Ці фанатики не становлять загрози."
  flavor_mos.55.tt3: "Він зосередить свої зусилля на зміцненні чинної влади"
  flavor_mos.55.c: "Спробуємо відновити монастирське землеволодіння."
  flavor_mos.55.tt4: "Буде розблоковано [Concept('law', 'закон')|e] #TOOLTIP:LAW,monastic_reformation_movement,X #L «Монастирський реформаторський рух»#!#!"
  flavor_mos.55.historical_info: "Йосип Волоцький був православним церковним діячем, який виступав проти нестяжателів, що прагнули заборонити монастирське землеволодіння та повернути ченців на шлях аскези та смирення. У спробах побороти корупцію серед духовенства Йосип допоміг запровадити низку правил для впровадження суворої дисципліни, що мало великий вплив на руське чернецтво."
  flavor_mos.56.title: "Наслідки пожежі"
  flavor_mos.56.desc: "#TOOLTIP:LOCATION,moscow,X #L Москва#!#! зіткнулася з великою пожежею, і провину за неї тут же поклали на царську рідню по материнській лінії: #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! переконані, що причиною лиха стало саме їхнє чаклунство. Люди бунтують і вимагають негайно видати їм членів династії #TOOLTIP:DYNASTY,$glinski_dynasty_tt$,X #L Глинських#!#!, щоб помститися їм за величезну кількість життів, забраних пожежею."
  flavor_mos.56.a: "Не будемо звертати уваги на заворушення."
  flavor_mos.56.tt1: "Члени династії Глинських будуть убиті розгніваними бунтівниками"
  flavor_mos.56.tt2: "[eleanor_glinskaya.GetNameWithNoTooltip] буде у відчаї через розправу над членами її родини"
  flavor_mos.56.b: "Видамо селянам бабусю."
  flavor_mos.56.tt3: "Усі члени династії Глинських будуть убиті розгніваними бунтівниками"
  flavor_mos.56.c: "Жорстоко придушимо повстання."
  flavor_mos.56.d: "У кожного є своя ціна."
  flavor_mos.56.historical_info: "Внаслідок московської пожежі 1547 року загинули тисячі простолюду, а багато хто залишився без даху над головою та засобів до існування. Незабаром народ влаштував бунт і звинуватив у пожежі бабусю царя: багато хто вважав, що її шаманістське походження стало причиною лиха, що спіткало християнське населення міста. Кілька її родичів були до смерті забиті камінням, проте коли розлючений натовп зажадав видати саму бабусю, цар категорично відмовився і покарав призвідників."
  flavor_mos.57.title: "Розширення Кремля"
  flavor_mos.57.desc: "#TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремль#!#! відіграє найважливішу роль в обороні руських земель. Однак оскільки його стіни спочатку збудовані з #TOOLTIP:GOODS,lumber,X #L дерева#!#!, вони вкрай вразливі до пожеж та новітніх видів озброєння, які можуть з легкістю пробити будівлю. Щоб вирішити цю проблему та зберегти цю величну споруду, ми пропонуємо замінити дерев'яну конструкцію на стіни з #TOOLTIP:GOODS,stone,X #L каменю#!#! та #TOOLTIP:GOODS,clay,X #L глини#!#!. Це дозволить не лише захистити Кремль від пошкоджень, а й зберегти його для майбутніх поколінь."
  flavor_mos.57.a: "Час братися за сокири та долота!"
  mos_kremlin_upgrade: "Оновлення Кремля"
  flavor_mos.57.b: "Занадто довго ми ховалися за цими стінами."
  flavor_mos.57.c: "Краще використаємо ці матеріали для оновлення наших палаців та храмів."
  flavor_mos.57.historical_info: "Будівництво кам'яних стін та веж Московського Кремля було вкрай амбітним завданням. З появою артилерії дерев'яні укріплення, які використовувалися в ті часи, виявилися неефективними. Ще однією причиною для оновлення фортеці стали частіші набіги татар, які на той момент ще не зачепили Москву завдяки тому, що її правителям благоволив сам хан Золотої Орди."
  flavor_mos.58.title: "Дзвіниця Івана Великого"
  flavor_mos.58.desc: "З прибуттям безлічі #TOOLTIP:CULTUREGROUP,italian_group,X #L італійських#!#! архітекторів #TOOLTIP:LOCATION,moscow,X #L Москва#!#! перетворилася, і тепер її вулиці прикрашають побілені кам'яні споруди. Хоча Соборна площа залишається архітектурним центром столиці, більшість будівель на її території ледь видно за стінами #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремля#!#!. Щоб це виправити, ми вирішили звести біля собору величезну дзвіницю. Ця вежа не тільки стане пам'яткою, а й тішитиме містян дзвоном дзвонів."
  flavor_mos.58.a: "З цієї вежі буде чудово видно околиці."
  mos_great_bell_tower_construction: "Будівництво дзвіниці Івана Великого"
  great_bell_tower_construction: "Будівництво дзвіниці Івана Великого"
  flavor_mos.58.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] будуть раді чути натхненний дзвін двадцяти двох дзвонів"
  flavor_mos.58.b: "Камінь — надто цінний матеріал."
  flavor_mos.58.historical_info: "Дзвіниця Івана Великого була збудована 1508 року під час правління Івана III в межах оновлення та розширення московського Кремля. Вежа має двадцять два дзвони та є найвищою будівлею на Соборній площі. Завдяки значній висоті вона також слугувала спостережним пунктом для виявлення пожеж та ворожих військ, що наближалися."
  flavor_mos.59.title: "Архангельський указ"
  flavor_mos.59.desc: "#TOOLTIP:LOCATION,arkhangelsk,X #L Архангельськ#!#! розташований у бухті Білого моря, що забезпечує місту доступ до Північного Льодовитого океану, а отже, і до основних торгових шляхів Європи. Нам варто заохочувати подальше заселення цього регіону та розвивати його інфраструктуру для морської торгівлі. У майбутньому це дозволить використовувати порт як плацдарм для створення #TOOLTIP:BUILDING_TYPE,trade_office,X #L торгових контор#!#! вздовж берегів Західної Європи."
  flavor_mos.59.a: "Не можна покладатися лише на внутрішню торгівлю."
  STATIC_MODIFIER_NAME_bustling_trade_hub: "Зростаючий центр торгівлі"
  flavor_mos.59.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')] у захваті від нових можливостей для торгівлі"
  flavor_mos.59.b: "Ми не можемо собі цього дозволити."
  flavor_mos.59.historical_info: "Під час правління Івана IV було створено безліч морських торгових шляхів для товарообігу з країнами Західної Європи, що дозволило торгувати з ними безпосередньо в обхід Ганзейського союзу. Ці заходи значно зміцнили економічний та політичний вплив Росії."
  flavor_mos.60.title: "Опричнина та цензура"
  flavor_mos.60.desc: "Придушення інакомислення необхідне для централізації країни, тому настав час розібратися з тими, чиї ідеї суперечать політиці #TOOLTIP:GOVERNMENT_REFORM,oprichnina,X #L опричнини#!#!. Треба задіяти опричників, щоб змусити духовенство погодитися з нашим курсом та обмежити доступ до текстів, які ставлять під сумнів дії влади."
  flavor_mos.60.a: "Нехай кожен знає, що його висловлювання загрожують наслідками."
  flavor_mos.60.b: "Люди можуть собі дозволити деяку свободу слова."
  flavor_mos.60.historical_info: "За часів опричнини політичні репресії, що проводилися особистими військами царя, досягли небувалих висот. Серед інших інститутів від цієї політики постраждала і російська православна церква, оскільки через цензуру багато рукописів та релігійних текстів були заборонені або просто знищені."
  flavor_mos.61.title: "Опричнина призводить до переселення"
  flavor_mos.61.desc: "Нелояльні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] змушені віддавати свої землі тим, хто не був помічений у протидії країні, проте такий перерозподіл володінь негативно впливає на виробництво їжі: багатьом #TOOLTIP:POPTYPE,peasants,X #L селянам#!#! доводиться виїжджати в інші місця, через що на полях просто нікому працювати. Країні загрожує голод, і щоб його уникнути, треба діяти більш обачно."
  flavor_mos.61.a: "Продовжимо конфіскацію земель."
  STATIC_MODIFIER_NAME_disruption_of_agricultural_activities: "Занепад сільського господарства"
  flavor_mos.61.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] покинуть свої господарства, що призведе до зниження врожаю"
  flavor_mos.61.b: "Ми не відбиратимемо володіння у сільських бояр."
  flavor_mos.61.c: "Заборонимо селянам залишати маєтки."
  flavor_mos.61.tt2: "Своїми репресіями [ivan_the_terrible.GetName] запобіжить голоду за рахунок закріпачення сільських жителів"
  flavor_mos.61.historical_info: "Опричнина мала руйнівний вплив на сільське господарство та економіку Росії. Конфіскація володінь та занепад землеробства призвели до нестабільності та масового голоду, що лише погіршило й без того важке становище селян."
  flavor_mos.62.title: "Храм Василія Блаженного"
  flavor_mos.62.desc: "Успішне завоювання #TOOLTIP:AREA,kazan_area,X #L Казані#!#! стало великою подією для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, і його необхідно увічнити. Використовуючи новітні досягнення в будівництві та інженерній справі, ми можемо побудувати на честь перемоги грандіозний собор, який продемонструє всю винахідливість та красу #L [ROOT.GetCountry.GetAdjective]ої#! архітектури."
  flavor_mos.62.a: "Чудова ідея."
  mos_st_basil_cathedral_construction: "Будівництво храму Василія Блаженного"
  flavor_mos.62.tt1: "Завдяки своїй майстерності [postnik_yakovlev.GetName] надасть собору чудового вигляду"
  flavor_mos.62.b: "У цьому вихвалянні немає потреби."
  flavor_mos.62.c: "Ще занадто рано святкувати перемогу."
  STATIC_MODIFIER_NAME_shoring_up_defenses: "Укріплення стін"
  flavor_mos.62.tt2: "Ресурси підуть на укріплення #TOOLTIP:GOODS,stone,X #L кам'яних#!#!#! стін #TOOLTIP:BUILDING_TYPE,kremlin,X #L Кремля#!#!"
  flavor_mos.62.historical_info: "Храм Василія Блаженного був побудований за часів правління Івана Грозного на честь перемоги над Казанським ханством. Будівництво вважалося вираженням подяки Пресвятій Богородиці за її заступництво та допомогу в завоюванні. Сьогодні храм є однією з головних пам'яток Росії та символом стійкості руського народу."
  flavor_mos.63.title: "Новодівичий монастир"
  flavor_mos.63.desc: "Тріумфальне завоювання #TOOLTIP:AREA,smolensk_area,X #L Смоленська#!#! необхідно відзначити. На щастя, #TOOLTIP:LOCATION,moscow,X #L Москва#!#! якраз потребує захисту південного рубежу, і будівництво укріпленого монастиря дозволить вирішити це завдання. Крім захисту #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, він також стане притулком для #TOOLTIP:POPTYPE,nobles,X #L знатних#!#! жінок, які були змушені прийняти постриг. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] напевно високо оцінять цей жест."
  flavor_mos.63.a: "Це безперечно вигідне вкладення."
  flavor_mos.63.b: "Москва й так чудово захищена."
  flavor_mos.63.c: "Запропонуємо постраждалим жінкам стипендію."
  flavor_mos.63.historical_info: "Новодівичий монастир був заснований великим князем Василем III на честь завоювання Смоленська. Він являв собою релігійну установу, яка також могла слугувати фортецею для оборони західних підступів до міста. У монастирі проживали жінки зі знатних руських родин, яких змушували прийняти чернечий спосіб життя."
  flavor_mos.64.title: "Московський гарматний двір"
  flavor_mos.64.desc: "Артилерія починає відігравати все більш важливу роль на полі бою, тому ми повинні забезпечити військо достатньою кількістю гармат. Варто доручити нашим інженерам створити спеціальне підприємство для виробництва артилерії, щоб #TOOLTIP:LOCATION,moscow,X #L Москва#!#! стала центром військових новацій та надійним постачальником знарядь."
  flavor_mos.64.a: "Це забезпечить воістину вибухове зростання нашої військової могутності."
  flavor_mos.64.b: "Краще спрямуємо зусилля на підготовку воїнів."
  flavor_mos.64.historical_info: "Московський гарматний двір був створений за часів правління Івана IV і відіграв важливу роль у підвищенні військового потенціалу країни. Виробництво гармат дозволило Росії розширити свій вплив та здобути перемогу в безлічі конфліктів."
  flavor_mos.65.title: "Балтійський регіон"
  flavor_mos.65.desc: "#TOOLTIP:AREA,baltic_area,X #L Балтика#!#! вже давно користується своїм вигідним розташуванням поблизу Балтійського моря, яке сприяє активній торгівлі. На жаль, через велику відстань нам складно отримувати прибуток від цієї діяльності. Якщо ми захопимо цей регіон, [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] зможе отримати з торгівлі набагато більшу вигоду."
  flavor_mos.65.a: "Ми повинні забрати свою частку."
  flavor_mos.65.a.custom: "#ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_DAT')|L]#!#! стає доступний [Concept('casus_belli', 'привід для війни')|e] проти кожної [Concept('province', 'провінції')|e] «[ShowCasusBelliName('cb_conquer_province')]», а також [Concept('casus_belli', 'привід для війни')|e] проти кожного #TOOLTIP:AREA,baltic_area,X #L балтійського#!#! [Concept('subject', 'васала')|e] «[ShowCasusBelliName('cb_subjugation')]»"
  flavor_mos.65.b: "Мир набагато корисніший для торгівлі."
  flavor_mos.65.historical_info: "Спроби Росії завоювати Балтійський регіон призвели до довгої та безрезультатної Лівонської війни, в ході якої країна зазнала величезних економічних збитків в обмін на вельми скромні території. Війна завершилася підписанням Ям-Запольського миру з Річчю Посполитою в 1582 році та Плюського перемир'я зі Швецією в 1583 році, які закріпили поділ лівонських та естонських земель між Річчю Посполитою, Швецією та Данією."
  flavor_mos.66.title: "Трагічне дітовбивство"
  flavor_mos.66.desc: "[target_ruler.GetName] та [target_heir.GetName] затіяли страшну сварку, звуки якої гучно розносяться коридорами палацу. Почувши шум, слуги кидаються до покоїв свого правителя, але до цього моменту суперечка вже переросла в бійку: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [target_ruler.GetShortNameWithNoTooltip], тримаючи в руках посох, намагається вдарити [Select_CString(target_ruler.IsFemale, 'свою спадкоємицю', 'свого спадкоємця' )]. Схоже, все може погано скінчитися…"
  flavor_mos.66.a: "Не будемо втручатися в сімейні справи."
  flavor_mos.66.tt1: "[target_heir.GetNameWithNoTooltip] отримує смертельний удар по голові та гине, а [target_ruler.GetNameWithNoTooltip] віддається каяттю"
  flavor_mos.66.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] явно не при собі. Потрібно покликати варту!"
  STATIC_MODIFIER_NAME_temporarily_incarcerated: "Тимчасове ув'язнення"
  flavor_mos.66.tt2: "[Select_CString(target_ruler.IsFemale, 'Вона', 'Він' )] перебуватиме в ув'язненні, доки не заспокоїться"
  flavor_mos.66.c: "Потрібно позбутися цього безумця."
  flavor_mos.66.historical_info: "У 1581 році між Іваном IV та його сином Іваном Івановичем сталася велика сварка, в ході якої цар смертельно поранив свого спадкоємця ударом посоха. Ця подія припала на важкий період у житті Івана Грозного, коли він страждав від нападів параної та влаштовував жорстокі чистки серед свого оточення."
  flavor_mos.67.title: "[postnik_yakovlev.GetNameWithNoTooltip]"
  flavor_mos.67.desc: "Видатний зодчий [postnik_yakovlev.GetName] продовжує демонструвати свій архітектурний талант, прикрашаючи #TOOLTIP:LOCATION,moscow,X #L московські#!#! вулиці своїми будівлями. Про походження цього майстра практично нічого не відомо, але це не привід відмовлятися від його послуг. Нам варто запросити його до двору на випадок, якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] доручить побудувати чергову грандіозну споруду."
  flavor_mos.67.a: "Запросимо його до двору."
  flavor_mos.67.b: "Зараз нам це ні до чого."
  flavor_mos.67.historical_info: "Постник Яковлєв був руським зодчим, який брав участь у будівництві храму Василя Блаженного в Москві, а також низки інших споруд. Храм був закладений за велінням Івана Грозного на згадку про перемогу над татарами та приєднання Казані."
  flavor_mos.68.title: "Інтриги Шуйських"
  flavor_mos.68.desc: "Схоже, юний [target_character.GetName] став жертвою згубного впливу родини Шуйських, які схиляють його до вживання алкоголю та інших речовин, щоб зміцнити свою владу над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!. Подібні маніпуляції підривають роботу уряду, проте будь-які спроби змінити ситуацію загрожують серйозними конфліктами всередині країни."
  flavor_mos.68.a: "Вони відповідатимуть за свої підступи."
  flavor_mos.68.tt1: "[target_character.GetNameWithNoTooltip] запровадить [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,oprichnina,X #L «Опричнина»#!#!, внаслідок чого [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] втратить вплив"
  flavor_mos.68.b: "Не можна допустити державного перевороту."
  STATIC_MODIFIER_NAME_drunkard: "П'яниця"
  flavor_mos.68.tt2: "[target_character.GetNameWithNoTooltip] страждатиме від алкоголізму, завдяки чому [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] зміцнять свій вплив"
  flavor_mos.68.historical_info: "Шуйські були могутнім князівським родом, який мав великий вплив в уряді за малолітнього Івана IV. Будучи дитиною, Іван часто зазнавав принижень та образ з боку Шуйських, чия нахабна поведінка сильно злила юного царя. Надалі ці образи послужили однією з причин масових репресій проти руських бояр."
  flavor_mos.69.title: "Вплив намісників"
  flavor_mos.69.desc: "Намісники мають величезну владу та керують найбільш віддаленими регіонами #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! від імені царя. Така система створює труднощі при зборі доходів та нагляді за роботою самих чиновників. Ми повинні встановити прямий контроль над регіонами та прискорити централізацію країни, навіть якщо заради цього доведеться знехтувати інтересами місцевих еліт."
  flavor_mos.69.a: "Послабимо вплив намісників."
  flavor_mos.69.b: "Нехай усе залишається, як є."
  flavor_mos.69.c: "Ця система вже давно застаріла."
  disable_namestnik_policy: "[Concept('policy', 'Політика')|e] #TOOLTIP:POLICY,namestnik_policy,X #L «Канцелярія намісника»#!#! стане недоступна"
  flavor_mos.69.historical_info: "Намісники мали значний вплив та здійснювали волю монарха в найдальших куточках країни. Під час правління Івана IV їхні повноваження були скорочені, однак інститут намісництва зберігався до проведення Петром Великим низки реформ, які торкнулися адміністративного устрою Росії."
  flavor_mos.70.title: "[ivan_viskovatiy.GetNameWithNoTooltip]"
  flavor_mos.70.desc: "Вправний дипломат [ivan_viskovatiy.GetName] мріє служити царю. У нього вже є ідеї, як покращити бюрократичну систему, що склалася після заснування #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L приказів#!#!. Людина його талантів може принести країні величезну користь як дипломат."
  flavor_mos.70.a: "Запросимо його до двору."
  flavor_mos.70.tt2: "При призначенні до [Concept('cabinet', 'ради')|e] він зможе створювати додаткові відділи"
  flavor_mos.70.b: "Він міг би навчити інших дипломатії."
  flavor_mos.70.tt3: "[ivan_viskovatiy.GetNameWithNoTooltip] поділиться своїми знаннями, і [target_root_country.GetGovernment.GetRuler.GetName] освоїть мистецтво переговорів"
  flavor_mos.70.c: "Він просто бездарний шарлатан."
  flavor_mos.70.historical_info: "Іван Вісковатий відігравав важливу роль в уряді Івана IV і до самої смерті відповідав за зовнішні зносини Росії. Вважається, що саме він був одним із засновників #italic  Посольського приказу#!, який керував зовнішньою політикою країни. В останні роки життя Вісковатий впав у немилість царя і був публічно страчений під час чергової чистки."
  flavor_mos.71.title: "Посольський приказ"
  flavor_mos.71.desc: "Завдяки старанній роботі [ivan_viskovatiy.GetName] зміг упорядкувати нашу бюрократичну систему та підвищити її ефективність. Тепер же він пропонує створити спеціальний відділ для вирішення дипломатичних питань, щоб наша зовнішньополітична діяльність відповідала високим стандартам, встановленим в інших органах влади."
  flavor_mos.71.a: "Розумна пропозиція."
  enable_posolsky_cabinet_action: "Відкриває [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABET_ACTION,posolsky,X #L «Посольський приказ»#!#!"
  flavor_mos.71.b: "Це лише інструмент для плетіння політичних інтриг."
  flavor_mos.71.historical_info: "#italic  Посольський приказ#! був урядовою установою, яка займалася питаннями дипломатії. Його співробітники брали участь у переговорах з іншими країнами, призначали послів та працювали з важливими документами, що стосувалися зовнішньої політики країни."
  flavor_mos.72.title: "Діти темряви"
  flavor_mos.72.desc: "Опричники мають великий вплив і є серйозною силою. Ми могли б ввести для них єдину форму у вигляді чорних каптанів та різних страхітливих атрибутів — наприклад, відрубаних голів тварин, закріплених на сідлах. Це дозволить надати опричникам ще більш грізного вигляду та вселити страх у серця наших ворогів."
  flavor_mos.72.a: "Правильно підібраний образ творить дива."
  mos_equipping_the_oprichnik: "Форма для опричників"
  flavor_mos.72.b: "Нехай носять що завгодно."
  flavor_mos.72.c: "Не варто уподібнюватися варварам."
  flavor_mos.72.historical_info: "Опричники носили чорні каптани та прикріплювали до своїх сідел відрубані голови собак або вовків. Це слугувало символом їхньої ревності у справі усунення зрадників. Крім того, вони носили з собою мітли, які означали, що опричники нібито «вимітають» ворогів царя з країни."
  flavor_mos.73.title: "Опричний терор"
  flavor_mos.73.desc: "Опричники продовжують знищувати тих, хто був запідозрений у зраді. Нещодавно чистці піддалися кілька маєтків #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! у сільській місцевості, через що місцеві #TOOLTIP:POPTYPE,peasants,X #L селяни#!#! залишилися без господарства. Якщо ми не виправимо ситуацію найближчим часом, то країна може зіткнутися з гострою нестачею продовольства."
  flavor_mos.73.a: "Нас це не стосується."
  STATIC_MODIFIER_NAME_displaced_farmers: "Знедолені селяни"
  flavor_mos.73.b: "Опричнині час покласти край."
  disable_oprichnik_policy: "[Concept('policy', 'Політика')|e] #TOOLTIP:POLICY,oprichnik_policy,X #L «Опричники»#!#! стане недоступна"
  flavor_mos.73.historical_info: "Опричники займалися конфіскацією майна у тих, хто вважався ворогом країни. Ця практика ще більше зміцнювала владу царя та його прихильників, але також мала негативні наслідки. Багатьом селянам довелося покинути володіння своїх убитих або заарештованих господарів. В результаті на полях стало нікому працювати, що призвело спочатку до зменшення зібраного врожаю, а потім і до голоду."
  flavor_mos.74.title: "Питання престолонаслідування"
  flavor_mos.74.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] так і не встиг завести спадкоємця, тому в разі його загибелі серед влади #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! може початися політична криза. Деякі пропонують висунути на роль майбутнього царя одного з членів регентської ради.\n\nНайбільш підходящими кандидатами є #TOOLTIP:POPTYPE,nobles,X #L аристократи#!#! [boris_godunov.GetName] та [feodor_romanov.GetName]. Обидва цілком здатні впоратися з обов'язками правителя, проте перший користується набагато більшою підтримкою Земського собору. Ми повинні зробити вибір, інакше під час передачі влади можуть початися заворушення."
  flavor_mos.74.a: "[boris_godunov.GetNameWithNoTooltip] більше підходить на цю роль."
  STATIC_MODIFIER_NAME_by_grace_of_national_assembly: "Підтримка Земського собору"
  STATIC_MODIFIER_NAME_blocked_from_being_ruler: "Не може стати правителем"
  flavor_mos.74.b: "[feodor_romanov.GetNameWithNoTooltip] отримає нашу підтримку."
  flavor_mos.74.tt1: "З'явиться [Concept('character', 'персонаж')|e] [boris_godunov.GetNameWithNoTooltip]"
  flavor_mos.74.tt2: "З'явиться [Concept('character', 'персонаж')|e] [feodor_romanov.GetNameWithNoTooltip]"
  STATIC_MODIFIER_NAME_national_assembly_opposed: "Несхвалення Земського собору"
  flavor_mos.74.c: "Нехай обидва залишаються радниками."
  flavor_mos.74.tt3: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] рішуче відмовиться підкорятися чужій волі"
  flavor_mos.74.d: "Жоден з них не гідний престолу."
  flavor_mos.74.tt4: "[boris_godunov.GetNameWithNoTooltip] та [feodor_romanov.GetNameWithNoTooltip] будуть страчені, чому обуряться [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]"
  flavor_mos.74.historical_info: "Після смерті Івана IV царем став Федір I. На відміну від батька, його вважали слабким і безвольним правителем, який не міг ефективно виконувати свої обов'язки. Під час правління Федора його шваґер Борис Годунов набув великого впливу при дворі. Оскільки на момент смерті Федір не мав спадкоємців, Земський собор обрав царем Бориса. Іншим претендентом на престол був Федір Романов — боярин з роду Романових, який, втім, не користувався великою популярністю серед знаті. З приходом до влади Годунова Федір Романов був засланий до монастиря."
  feodor_romanov_becomes_a_monk_tt: "[feodor_romanov.GetShortNameWithNoTooltip] піде в монастир і віддалиться від політики до кінця своїх днів"
  boris_godunov_becomes_a_monk_tt: "[boris_godunov.GetShortNameWithNoTooltip] піде в монастир і віддалиться від політики до кінця своїх днів"
  flavor_mos.75.title: "Іноземні викладачі"
  flavor_mos.75.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] прагне принести в країну нові ідеї та знання, щоб покращити освіту молоді та скоротити інтелектуальний і культурний розрив з іншими країнами. Ми повинні розробити програму, завдяки якій наші юні таланти зможуть навчатися за кордоном. Крім того, ми можемо запрошувати іноземних викладачів, щоб підвищити ефективність нашої освітньої системи та вивести її з-під впливу духовенства."
  flavor_mos.75.a: "Наша освіта не повинна поступатися закордонній."
  flavor_mos.75.b: "Це не призведе ні до чого доброго."
  flavor_mos.75.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені, що їм вдалося зберегти свій вплив на систему освіти"
  flavor_mos.75.historical_info: "Борис Годунов розумів, що Московія багато в чому відстає від своїх європейських сусідів, тому намагався підвищити якість освіти серед дітей та молоді. У зв'язку з цим він пропонував залучати до країни іноземних викладачів, а також відправляти московських студентів на навчання за кордон."
  flavor_mos.76.title: "[ivan_gramotin.GetNameWithNoTooltip]"
  flavor_mos.76.desc: "Видатний дипломат на ім'я [ivan_gramotin.GetName] пропонує свої послуги як посол та перемовник. Він відомий своїм гострим розумом та красномовством, і ці навички безсумнівно знадобляться нашому уряду. Якщо ми хочемо налагодити відносини з іншими країнами, нам безперечно варто взяти його на службу. Втім, у зовнішніх справах завжди можна обрати більш прямий та безцеремонний підхід…"
  flavor_mos.76.a: "Запросимо його до двору."
  flavor_mos.76.tt1: "З'явиться [Concept('character', 'персонаж')|e] [ivan_gramotin.GetNameWithNoTooltip]"
  flavor_mos.76.tt2: "Він зможе досягти великих результатів у дипломатії, якщо доручити йому [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,posolsky,X #L «Посольський приказ»#!#!"
  flavor_mos.76.b: "Він просто черговий самозванець."
  flavor_mos.76.historical_info: "Іван Ґрамотін був успішним послом при різних правителях і особливо відзначився як голова Посольського приказу. Йому вдалося зблизитися з майбутнім патріархом під час свого дипломатичного візиту до Польщі, де той перебував в ув'язненні. Надалі ця дружба забезпечила Івану місце при дворі та високу посаду в Боярській думі. Проте, будучи знатним інтриганом, він втратив довіру патріарха і був відправлений у заслання, з якого повернувся лише після його смерті. Через кілька років Іван пішов у монастир, де й помер."
  flavor_mos.77.title: "Красномовний дипломат"
  flavor_mos.77.desc: "За час роботи в #italic  Посольському приказі#! [ivan_gramotin.GetName] зміг оптимізувати бюрократичні процеси, що стосуються нашої зовнішньополітичної діяльності. Він може продовжити свою роботу як дипломат або ж спрямувати свої зусилля на вирішення розбіжностей між різними силами всередині #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, щоб забезпечити її політичну стабільність."
  flavor_mos.77.a: "Його дипломатична робота важливіша."
  STATIC_MODIFIER_NAME_fine_tuned_diplomacy: "Тонка дипломатія"
  flavor_mos.77.tt1: "Завдяки своїм знанням [ivan_gramotin.GetNameWithNoTooltip] досягне успіхів у зовнішніх справах"
  flavor_mos.77.b: "Ми повинні покінчити з внутрішніми чварами."
  flavor_mos.77.historical_info: "Іван Грамотін успішно вів переговори з головними суперниками Московії, такими як Польща, Швеція та Османська імперія. Крім того, він допоміг стабілізувати внутрішньополітичну ситуацію в Московії за часів Смути. Попри його зради та інтриги, йому все ж вдалося зберегти своє високе становище в уряді, завдяки чому він продовжував займатися дипломатією практично до самої смерті."
  flavor_mos.78.title: "Аптекарський приказ"
  flavor_mos.78.desc: "Кожен #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L приказ#!#! виконує свою особливу роль в управлінні країною, однак нещодавня епідемія чуми показала, що ми приділяємо недостатньо уваги питанням здоров'я та добробуту народу. Ми повинні створити спеціальний орган, який вживатиме необхідних заходів у разі чергової епідемії або іншого лиха. Інакше ми можемо зіткнутися з різким зростанням смертності, що призведе до нестачі робітників та воїнів для захисту нашої [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_mos.78.a: "П'явки та кровопускання — ось і все лікування."
  flavor_mos.78.tt1: "Знать буде рада заснуванню Аптекарського приказу, який надаватиме їм медичну допомогу в особливому порядку"
  enable_aptekarsky_cabinet_action: "Відкриває [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,aptekarsky,X #L «Аптекарський приказ»#!#!"
  flavor_mos.78.b: "Молитва позбавить нас від будь-яких напастей."
  flavor_mos.78.historical_info: "Аптекарський приказ був одним з органів державного управління, який здійснював контроль за виробництвом та розподілом ліків, керував аптеками та вирішував інші питання охорони здоров'я. Крім того, приказ відповідав за лікування дворян та членів царської родини. У тому чи іншому вигляді ця установа залишалася важливою частиною адміністративної системи Російської імперії до свого скасування після революції 1917 року."
  flavor_mos.79.title: "[ivan_bolotnikov.GetNameWithNoTooltip] потрапив у полон"
  flavor_mos.79.desc: "Не бажаючи більше бути слугою при руському дворі, бунтівний козак втік у степ до своїх соратників. Однак його вільне життя тривало недовго, оскільки після чергового набігу #TOOLTIP:AREA,crimea_area,X #L кримських#!#! #TOOLTIP:CULTUREGROUP,tatar_group,X #L татар#!#! він знову потрапив у полон. Нам варто спробувати його звільнити, доки його не продали в рабство. В іншому випадку він може розкрити нашим ворогам секрети, які дізнався, будучи придворним слугою."
  flavor_mos.79.a: "Навряд чи воно того варте."
  flavor_mos.79.tt1: "Він діятиме на свій розсуд і може стати на бік наших ворогів"
  flavor_mos.79.b: "Викупимо його у татар."
  flavor_mos.79.tt2: "З'являється [Concept('character', 'персонаж')|e] [ivan_bolotnikov.GetNameWithNoTooltip] і повертається до двору"
  flavor_mos.79.tt3: "Знать буде незадоволена його присутністю при дворі через його бунтарський характер"
  flavor_mos.79.c: "Його запал необхідно вгамувати."
  flavor_mos.79.tt4: "[ivan_bolotnikov.GetNameWithNoTooltip] загине від невідомого захворювання"
  flavor_mos.79.historical_info: "Іван Болотников був козацьким отаманом, який очолив повстання проти царя. Причиною повстання стали економічні проблеми та зростаюча соціальна нерівність, що торкнулася як селян, так і деякої частини дворян. Ненадовго здобувши свободу, він потрапив у полон до кримських татар, після чого був знову проданий у рабство. Через кілька років німецькі найманці врятували Івана, що дозволило йому повернутися до Москви, де він допомагав в організації протестів."
  flavor_mos.80.title: "Повстання Болотникова"
  flavor_mos.80.desc: "Бунтівник [ivan_bolotnikov.GetName] втік з #TOOLTIP:CULTUREGROUP,tatar_group,X #L татарського#!#! полону і під покровом ночі повернувся до [target_location.Custom('LR_ACC')|l] [target_location.GetName], щоб налаштувати його населення проти нас. Він почав розпускати чутки про жорстоке поводження та зловживання владою з боку уряду. Його звинувачення безпідставні, однак деякі #TOOLTIP:POPTYPE,nobles,X #L аристократи#!#! та #TOOLTIP:POPTYPE,burghers,X #L містяни#!#! все ж вирішили приєднатися до повстання."
  flavor_mos.80.a: "Усіх бунтівників чекає жорстока розправа."
  bolotnikov_uprising: "Повстання Болотникова"
  flavor_mos.80.b: "Проявимо поблажливість і надамо народу деяку свободу."
  flavor_mos.80.c: "Вимовимо палку промову і переконаємо їх скласти зброю."
  flavor_mos.80.tt1: "Завдяки своєму красномовству [ROOT.GeGovernment.GetRuler.GetName] переконає бунтівників здатися."
  flavor_mos.80.historical_info: "Повстання Болотникова відбулося в період Смути у 1606–1607 роках. Його очолив козак Іван Болотников, незадоволений зростаючими економічними проблемами та нерівністю. Повстання підтримали не тільки розгнівані селяни, але також козаки і навіть деякі групи дворян. У якийсь момент бунтівники контролювали понад сімдесят міст на півдні Росії, що змусило царя жорстоко придушити повстання."
  flavor_mos.81.title: "Впливовий маршал"
  flavor_mos.81.desc: "Воєвода #TOOLTIP:LOCATION,nizhny_novgorod,X #L Нижнього Новгорода#!#! [alexander_lvov.GetName] нещодавно [Select_CString(alexey_lvov.IsFemale, 'повернулася', 'повернувся' )] до двору, щоб обійняти посаду окольничого, яка надасть [Select_CString(alexey_lvov.IsFemale, 'їй', 'йому' )] додаткові повноваження. Ми також можемо призначити [Select_CString(alexey_lvov.IsFemale, 'її', 'його' )] головою Дворцового #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L приказу#!#! і довірити [Select_CString(alexey_lvov.IsFemale, 'їй', 'йому' )] управління монастирями. Це дозволить нам більш ефективно витрачати кошти та контролювати виконання заходів, пропонованих #TOOLTIP:POLICY,non_possessors,X #L нестяжателями#!#!."
  flavor_mos.81.a: "Непогана ідея."
  enable_bolshogo_dvortsa_cabinet_action: "Відкриває [Concept('cabinet_action', 'доручення')|e] #TOOLTIP:CABINET_ACTION,bolshogo_dvortsa,X #L «Дворцовий приказ»#!#!"
  flavor_mos.81.b: "Такий суворий нагляд ні до чого."
  flavor_mos.81.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] вкрай задоволені довірою уряду"
  flavor_mos.81.historical_info: "Олексій Михайлович Львов був державним діячем, який стрімко просувався по службі, ставши спочатку воєводою, потім послом, а врешті-решт очільником Палацового наказу. На останній посаді він працював до самої старості, доки добровільно не вийшов у відставку."
  flavor_mos.82.title: "Місництво"
  flavor_mos.82.desc: "#TOOLTIP:GOVERNMENT_REFORM,the_mestnichestvo,X #L Місництво#!#! гарантує кожному боярину право на посаду та місце за царським столом залежно від знатності його роду та особистих заслуг. Однак ця система нерідко призводить до конфліктів серед #TOOLTIP:POPTYPE,nobles,X #L знаті#!#!, а також перешкоджає просуванню по службі талановитих людей, які не можуть похвалитися високим походженням.\n\nСклади найзнатніших родин записані в давніх родовідних книгах. Якщо ми хочемо вдосконалити систему управління країною, то для початку нам доведеться знищити ці книги."
  flavor_mos.82.a: "Спалимо родовідні книги."
  flavor_mos.82.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] обурені спробою послабити їхній вплив"
  flavor_mos.82.b: "Зміни приносять лише проблеми."
  flavor_mos.82.c: "Настав час покласти край цій ієрархічній системі."
  flavor_mos.82.historical_info: "Місництво визначало старшинство бояр при царському дворі та в війську на основі їхнього соціального статусу, минулої служби та особистих зв'язків. Вона мала великий вплив на державну ієрархію Росії, доки не була скасована Федором III, що згодом використав Петро Великий у справі проведення реформ, спрямованих на перетворення державного управління Росії."
  flavor_mos.83.title: "Вежа Сююмбіке"
  flavor_mos.83.desc: "#TOOLTIP:LOCATION,kazan,X #L Казань#!#! потребує споруди, яка зможе забезпечити добру видимість та підвищити обороноздатність міста. При цьому серед його мешканців є не лише православні, а й мусульмани. Ми можемо побудувати величну вежу, яка одночасно слугуватиме і спостережним пунктом, і мінаретом для заклику вірян на молитву."
  flavor_mos.83.a: "Цікава пропозиція."
  mos_soyembika_tower_construction: "Будівництво вежі Сююмбіке"
  flavor_mos.83.b: "Замість цього варто частіше проводити розвідку."
  flavor_mos.83.historical_info: "За однією з версій, вежа Сююмбіке була побудована за часів правління Івана IV, проте достовірних відомостей про її походження не збереглося. Вежа розташована в Казанському кремлі, має висоту 58 метрів і відрізняється значним нахилом. Спроби усунути крен у XX столітті не увінчалися успіхом, тому вежу, як і раніше, відносять до падаючих."
  flavor_mos.84.title: "Зміна «Домострою»"
  flavor_mos.84.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] просять оновити низку положень «Домострою», щоб люди вели господарство в повній відповідності до #TOOLTIP:RELIGION,$orthodox_tt$,X #L православних#!#! цінностей. Це дає нам певну свободу у складанні правил, тому ми можемо обрати, які сфери життя суспільства найбільше потребують змін."
  flavor_mos.84.a: "Звичаї та моральність понад усе."
  flavor_mos.84.b: "Ми повинні зберегти сімейні цінності."
  flavor_mos.84.c: "Люди не повинні забувати про смирення перед Богом."
  flavor_mos.84.d: "У житті кожного повинні бути піст і молитва."
  STATIC_MODIFIER_NAME_stringent_fasting_and_prayer: "Люди повинні дотримуватися суворого посту та невпинно молитися."
  flavor_mos.84.historical_info: "«Домострой» є збірником правил, що стосуються устрою сім'ї, ведення господарства та інших аспектів життя. Вважається, що «Домострой» був складений у Великому Новгороді в XVI столітті, що проливає нам світло на соціальні та культурні звичаї середньовічної Росії. Збірник зазнавав деяких доопрацювань, щоб відповідати мінливим суспільним нормам."
  flavor_mos.85.title: "[simon_ushakov.GetNameWithNoTooltip]"
  flavor_mos.85.desc: "Іконописець [simon_ushakov.GetName] створив нову форму релігійного живопису, в якій основна увага приділяється світським персонажам, а усталений іконографічний стиль поєднується з елементами західної культури. Багата колірна палітра в його роботах йде врозріз із усталеними правилами іконопису, через що [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] висловлюють невдоволення. Проте впровадження нових ідей та технік під впливом бароко може позитивно позначитися на нашій художній школі."
  flavor_mos.85.a: "Запросимо його до двору."
  flavor_mos.85.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] засуджуватимуть нові віяння та вважатимуть їх порушенням загальноприйнятих правил"
  flavor_mos.85.b: "Нехай краще займається викладанням."
  STATIC_MODIFIER_NAME_restricted_to_teaching: "Перехід до викладання"
  flavor_mos.85.tt3: "Він отримає посаду викладача в #TOOLTIP:BUILDING_TYPE,stroganov_school_of_iconic_art,X #L Строгановській школі іконопису#!#!"
  flavor_mos.85.c: "Розпродамо неугодні роботи під чужим ім'ям."
  flavor_mos.85.tt4: "Він продовжить роботу, але не зможе продавати свої твори всередині країни"
  flavor_mos.85.d: "Його потрібно заарештувати!"
  flavor_mos.85.historical_info: "Симон Ушаков був московським іконописцем, який впровадив елементи стилю бароко в російське образотворче мистецтво. Він вважається одним з найвидатніших майстрів ікони, але серед його робіт є також портрети царів. Ушаков деякий час обіймав посаду голови Збройової палати московського Кремля, що принесло йому ще більше визнання."
  flavor_mos.86.title: "Збір коштів Кузьми Мініна"
  flavor_mos.86.desc: "У ході війни [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] тимчасово перейшла до рук ворога. На щастя, одному з наших заможних #TOOLTIP:POPTYPE,burghers,X #L містян#!#! вдалося зібрати на військові потреби значні кошти, чималу частину яких він вклав особисто. Завдяки цьому ми зможемо як слід підготувати та озброїти добровольців, організувати ополчення та дати відсіч загарбникам."
  flavor_mos.86.a: "Приймемо його щедру допомогу."
  flavor_mos.86.b: "Відмовимося від допомоги."
  flavor_mos.86.tt1: "#TOOLTIP:POPTYPE,burghers,X #L Містяни#!#! будуть раді, що їм не доведеться розлучатися зі своїми грошима"
  flavor_mos.86.historical_info: "Кузьма Мінін був впливовим купцем, який зробив неоціненний внесок у визволення Москви від польських загарбників. Разом із князем Дмитром Пожарським він створив добровольче військо, при цьому пожертвувавши значну частину свого статку на спільну справу. Сьогодні їхній подвиг вважається символом патріотизму та єдності руського народу в часи Смути."
  flavor_mos.87.title: "Повернення казанської ікони Божої Матері"
  flavor_mos.87.desc: "Після нещодавньої пожежі в #TOOLTIP:LOCATION,kazan,X #L Казані#!#! нам дивом вдалося відшукати одну з найзначущих і найшанованіших ікон. Її привезли на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#! ще в XIII столітті, але в ході #TOOLTIP:CULTUREGROUP,tatar_group,X #L татарських#!#! набігів ікона була втрачена. Ми повинні знайти для неї гідне місце і зробити все, щоб її зберегти."
  flavor_mos.87.a: "Потрібно якомога швидше виставити її на огляд."
  mos_lady_of_kazan_copies: "Відтворення казанської ікони Божої Матері"
  flavor_mos.87.b: "Нехай її шанують одразу в кількох місцях."
  flavor_mos.87.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] будуть раді створенню списків казанської ікони Божої Матері"
  flavor_mos.87.c: "Кому цікава ця старовина?"
  flavor_mos.87.historical_info: "Казанську ікону Божої Матері пов'язують із кількома чудесними подіями в історії Русі, у зв'язку з чим вона має колосальне культурне та релігійне значення. Згідно з переказом, ікона чудесним чином з'явилася після пожежі в Казані, яка на той момент вже була відвойована у татар. Хоча оригінал був втрачений, списки знаменитої ікони можна зустріти в багатьох сучасних православних храмах."
  flavor_mos.88.title: "Перший поет"
  flavor_mos.88.desc: "[simon_sitnianowicz.GetName], видатний богослов родом з #TOOLTIP:LOCATION,polotsk,X #L Полоцька#!#! пропонує створити мовну школу, де державні службовці зможуть навчатися загальноприйнятою мовою дипломатії — #L [latin.GetName|l]ою#!. Крім того, він виявив бажання викладати простому люду граматику, поетику та риторику. Така зухвала ініціатива гідна похвали, тому нам варто виділити кошти на її підтримку."
  flavor_mos.88.a: "Майстерне володіння мовами відкриває багато можливостей."
  flavor_mos.88.tt1: "З'явиться [Concept('character', 'персонаж')|e] [simon_sitnianowicz.GetNameWithNoTooltip]"
  flavor_mos.88.b: "Нехай краще займається проповідями."
  flavor_mos.88.tt2: "Він присвятить себе написанню віршів та просвіті народу"
  flavor_mos.88.c: "Наймемо його як особистого наставника."
  flavor_mos.88.d: "Народу не потрібна освіта."
  flavor_mos.88.tt3: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] задоволені вигнанням неординарного богослова."
  flavor_mos.88.historical_info: "Симеон Полоцький був білоруським ченцем, поетом і перекладачем, який зробив великий внесок у розвиток руської літератури та православної традиції. Він запровадив викладання грецької та латинської мов у Росії, а також допоміг перекласти кілька праць західних богословів, що сприяло поширенню іноземних ідей серед руських священників."
  flavor_mos.89.title: "Воєнні досягнення Патріка Гордона"
  flavor_mos.89.desc: "Досвідчений командир та військовий інженер [patrick_gordon.GetName], що б’ється як найманець у складі #L [GetCountry('SWE').GetAdjective|l]ого#! війська, готовий за певну плату перейти на наш бік. Його знання та навички дуже знадобляться нам, щоб реформувати військо відповідно до західноєвропейських стандартів."
  flavor_mos.89.a: "Запропонуємо йому щедру платню."
  STATIC_MODIFIER_NAME_military_influencer: "Впливовий воєначальник"
  flavor_mos.89.b: "Залізна діва змусить його розкрити свої секрети."
  flavor_mos.89.tt2: "Він потрапить у полон і зазнає тортур з метою отримання інформації"
  flavor_mos.89.c: "Перебіжчикам не можна довіряти."
  flavor_mos.89.historical_info: "Патрік Гордон був шотландським військовим інженером та генералом на російській службі. Він розпочав свою кар’єру у шведському війську під час Північної війни, але пізніше перейшов на бік руських військ. Згодом він став близьким другом Пєтра Вєлікоґо, що обурило частину руських дворян."
  flavor_mos.90.title: "Таємний мандрівник"
  flavor_mos.90.desc: "Ми відстаємо від інших країн у галузі науки та новаторства, тому необхідно вжити заходів для впровадження серед жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! нових ідей та знань. Ми можемо організувати дипломатичну поїздку до Європи з метою дізнатися більше про західну культуру, технології та методи державного управління. При цьому деякі з наших дворян можуть подорожувати інкогніто, щоб краще познайомитися з повсякденним життям іноземців. Це принесе нам цінний досвід і неодмінно допоможе в майбутніх переговорах."
  flavor_mos.90.a: "Варто спробувати."
  grand_embassy: "Велике посольство"
  flavor_mos.90.tt1: "Подорож дворян до Європи на рік матиме великий вплив на розвиток [target_root_country.Custom('CL_GEN')]"
  flavor_mos.90.tt2: "[target_root_country.GetGovernment.GetRuler.GetName] особисто очолить поїздку, яка обіцяє бути вкрай пізнавальною"
  flavor_mos.90.b: "Давайте краще проведемо науковий ярмарок."
  flavor_mos.90.tt3: "Ярмарок привабить провідних вчених та мислителів з усієї Європи"
  flavor_mos.90.tt4: "Для проведення ярмарку буде побудована необхідна інфраструктура, що сприятиме [Concept('development', 'розвитку')|e] #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName]"
  flavor_mos.90.c: "Рано чи пізно ми надолужимо згаяне."
  flavor_mos.90.historical_info: "Велике посольство було дипломатичною місією, яку Петро Великий організував з метою заручитися підтримкою європейських країн у боротьбі з Османською імперією. Серед другорядних завдань було залучення до служби іноземних військових фахівців та закупівля нових технологій. У цей період Росія зіткнулася з внутрішніми та зовнішніми проблемами, що лише додавало Петру рішучості при проведенні реформ для зміцнення та модернізації країни. По Європі він подорожував під чужим ім'ям, проте двометровий зріст часто не дозволяв йому злитися з натовпом."
  flavor_mos.91.title: "[francesco_rastrelli.GetNameWithNoTooltip]"
  flavor_mos.91.desc: "[francesco_rastrelli.GetName], перспективний архітектор родом із #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, переїхав до #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурга#!#! в пошуках нових можливостей. Він уже має значний досвід проєктування в стилі пізнього бароко, і його навички нам дуже знадобляться, щоб перетворити Санкт-Петербург на велике та розкішне місто."
  flavor_mos.91.a: "Нам би не завадив такий талант."
  flavor_mos.91.tt2: "Він зможе організувати будівництво грандіозних споруд у #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурзі#!#!, якщо місто є столицею #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#!"
  flavor_mos.91.b: "Нарешті гідний фахівець."
  STATIC_MODIFIER_NAME_chief_architect: "Головний архітектор"
  flavor_mos.91.tt3: "Користуючись прихильністю [Select_CString(target_root_country.GetGovernment.GetRuler.IsFemale,'правительки', 'правителя')], [Select_CString(francesco_rastrelli.IsFemale, 'вона', 'він' )] обійме посаду головного архітектора"
  flavor_mos.91.c: "Варто пошукати майстрів в інших місцях."
  flavor_mos.91.historical_info: "Франческо Бартоломео Растреллі приїхав до Росії зі своїм батьком на запрошення імператора Петра I, який прагнув вивести країну на новий художній та культурний рівень. На його думку, таланти родини Растреллі ідеально підходили для досягнення цієї мети. Першим великим проєктом Франческо була перебудова Зимового палацу, який згодом став головною резиденцією російських імператорів."
  flavor_mos.92.title: "Зимовий палац"
  flavor_mos.92.desc: "Наша нова столиця #TOOLTIP:LOCATION,neva,X #L Санкт-Петербург#!#! навряд чи може похвалитися розкішною архітектурою та пам'ятками. У зв'язку з цим [francesco_rastrelli.GetName] пропонує побудувати в місті Зимовий палац, який стане резиденцією уряду, а також символом могутності та багатства нашої країни на багато років. Такий грандіозний проєкт напевно викликатиме захоплення у людей в усіх куточках світу."
  flavor_mos.92.a: "Цей палац слугуватиме доказом нашої величі."
  mos_winter_palace_construction: "Будівництво Зимового палацу"
  flavor_mos.92.tt1: "[grigory_orlov.GetName] проявить небачену щедрість, завдяки чому в палаці з'явиться чудовий сад, а також безліч фресок"
  flavor_mos.92.b: "Можливо, варто трохи стримати амбіції."
  mos_catherine_palace_construction: "Будівництво Катерининського палацу"
  flavor_mos.92.tt2: "Замість початкового задуму буде створена менш масштабна літня резиденція"
  flavor_mos.92.c: "Краще спрямуємо кошти на розвиток самого міста."
  flavor_mos.92.historical_info: "Будівництво першого Зимового палацу почалося за указом Петра Великого. З того часу було створено ще кілька версій, поки під час правління Катерини Великої не був закінчений останній, п'ятий Зимовий палац, що слугував офіційною резиденцією російської імператорської родини аж до повалення монархії. Ця споруда вважається одним із ранніх зразків архітектури в стилі бароко в Росії. Палац зазнав безлічі змін та розширень, що було зумовлено як бажанням модернізації, так і пожежею 1837 року."
  flavor_mos.93.title: "Заборона російського вбрання"
  flavor_mos.93.desc: "Європейська мода постійно розвивається, проте народ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, як і раніше, дотримується старосвітських звичаїв в одязі та зовнішньому вигляді. Настав час прийняти нові форми одягу на зразок тих, які можна побачити при європейських дворах. Ми можемо заборонити застарілі усталені вбрання, щоб [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] почали носити сучасніші речі."
  flavor_mos.93.a: "Нині в моді панчохи та перуки."
  mos_enforced_fashion: "Нав'язана мода"
  flavor_mos.93.tt1: "Для запровадження європейської моди в країну імпортуватиметься величезна кількість тканини"
  flavor_mos.93.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] обурені таким нехтуванням старосвітським російським одягом"
  flavor_mos.93.b: "Кафтани ніколи не застаріють."
  flavor_mos.93.tt3: "Збереження звичного одягу ще збільшить опір змінам"
  flavor_mos.93.historical_info: "За час свого правління Пьотр Вєлікій провів безліч реформ, спрямованих на модернізацію країни та її долучення до європейської цивілізації. Одна з таких реформ торкнулася моди та зовнішнього вигляду дворян: цар виступав різко проти носіння бороди та питомо російського вбрання, тому вельми жорстоко поводився з тими, хто відмовлявся приймати новий стиль."
  flavor_mos.94.title: "Найсмішніший собор"
  flavor_mos.94.desc: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Нашій юній правительці', 'Нашому юному правителю')] набридла надмірно сувора та серйозна атмосфера при дворі. Бажаючи внести в цю обстановку трохи різноманітності, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вона організувала', 'він організував')] спеціальний клуб, члени якого влаштовують різні розваги: переодягаються в безглузді костюми, пародіюють церковні обряди та розповідають непристойні жарти. Хоча #TOOLTIP:RELIGION,$orthodox_tt$,X #L православні#!#! священники засуджують подібні глузування над звичаями, багато дворян, навпаки, знаходять у цьому віддушину, яка дозволяє розбавити повсякденну рутину."
  flavor_mos.94.a: "Це не більше ніж невинні розваги."
  flavor_mos.94.tt1: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] незадоволені таким висміюванням звичаїв"
  flavor_mos.94.b: "Настав час покінчити з цим мерзенним балаганом."
  flavor_mos.94.tt2: "Клуб буде розпущено, через що [target_root_country.GetGovernment.GetRulerTitle|l] та [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] найближчі прихильники будуть помітно роздратовані"
  flavor_mos.94.c: "Знайти цапа-відбувайла."
  flavor_mos.94.tt3: "Під приводом [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,strict_censorship,X #L суворої цензури#!#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] виганяють усіх причетних до поганої поведінки"
  flavor_mos.94.historical_info: "Всежартівливий, всеп'яніший і найсмішніший собор був створений Петром Великим та його друзями Патріком Гордоном і Францем Лефортом. Учасники Собору — дворяни, військові та державні діячі — кидали виклик загальноприйнятим нормам, висміювали звичні вбрання та обряди, а також віддавалися розпусті та пияцтву. Останнє особливо заохочувалося і було невід'ємною частиною багатьох вистав, які організовував собор."
  flavor_mos.95.title: "Покровительство Богдана Хитрово"
  flavor_mos.95.desc: "Розумний і заможний дворянин на ім'я [bogdan_khitrovo.GetName] бажає отримати державну посаду, що відповідає його соціальному становищу. Він високо цінує культуру та будь-яку творчість, тому шукає роботу, яка дозволить йому зробити внесок у їхній розвиток за рахунок матеріальної підтримки діячів мистецтва."
  flavor_mos.95.a: "Він справжній меценат."
  STATIC_MODIFIER_NAME_artistic_encouragement: "Покровительство мистецтвам"
  flavor_mos.95.tt2: "Він стане покровителем найкращих художників, завдяки чому в їхніх роботах виявляться віяння західного мистецтва"
  flavor_mos.95.tt3: "#TOOLTIP:BUILDING_TYPE,stroganov_school_of_iconic_art,X #L Строґановська школа іконопису#!#! отримає значне пожертвування, що дозволить майстрам створювати більше витворів"
  flavor_mos.95.b: "Запропонуємо йому державну посаду."
  flavor_mos.95.tt4: "Під його керівництвом #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L прикази#!#! працюватимуть винятково ефективно"
  STATIC_MODIFIER_NAME_accomplished_overseeing: "Успішне керівництво"
  flavor_mos.95.c: "Він просто вискочка."
  flavor_mos.95.historical_info: "Богдан Хитрово був російським державним діячем, який вкрай успішно керував приказами під керівництвом двох царів поспіль. Висока посада дозволяла йому впливати на роботу придворних іконописців: будучи цінителем західних зразків культури та мистецтва, він прагнув впровадити їхні елементи у твори російських майстрів. Це призвело до поширення в даному художньому середовищі безлічі нових ідей та течій, включаючи натуралізм. Зусилля Хитрово надали російському мистецтву нового імпульсу, що позначив відступ від усталених методів іконопису, які використовувалися ще з часів Середньовіччя."
  flavor_mos.96.title: "Видатний дяк"
  flavor_mos.96.desc: "[afanasy_nashchokin.GetName], виходець зі скромної родини поміщиків, проявляє себе як здібний перемовник і прагне просунутися по службі. Хоча він не може похвалитися своїм походженням, завдяки завзятості та блискучій освіті він досягає хороших результатів у будь-якій справі, за яку береться. Нам би безумовно знадобився його талант."
  flavor_mos.96.a: "Нам завжди потрібні талановиті посли."
  flavor_mos.96.tt2: "Він отримає посаду посла і відстоюватиме інтереси #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! на міжнародній арені"
  flavor_mos.96.b: "Він міг би стати хорошим керівником."
  flavor_mos.96.tt3: "Він стане головою #TOOLTIP:CABINET_ACTION,posolsky,X #L Посольського приказу#!#! і значно підвищить його ефективність"
  STATIC_MODIFIER_NAME_posolsky_prikaz_excelling: "Розквіт Посольського приказу"
  STATIC_MODIFIER_NAME_brilliant_diplomacy: "Вправна дипломатія"
  flavor_mos.96.c: "Нехай займається реформами."
  flavor_mos.96.tt4: "Він запровадить такі нововведення, як газети та векселі"
  flavor_mos.96.d: "Йому явно вистачає заслуг."
  flavor_mos.96.tt5: "Не отримавши визнання за свою старанну працю, він почне шукати роботу в інших місцях"
  flavor_mos.96.historical_info: "Афанасій Нащокін був державним діячем, чия дипломатична робота принесла Росії величезну користь. За добру службу він був призначений головою #italic Посольського приказу#!, де також досяг великих успіхів. Всупереч поширеному на той час порядку, він отримував високі посади завдяки своїм здібностям, а не сімейним зв'язкам, чим викликав у дворян обурення та заздрість."
  flavor_mos.97.title: "Відомості"
  flavor_mos.97.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] та [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] оточення дізнаються останні новини про справи на фронті та міжнародні відносини зі спеціально виготовленої для них рукописної газети. Ми плануємо створити на її основі публічну друковану газету та випустити перший наклад у кілька сотень копій. Можливо, нам доведеться відредагувати деякі статті, щоб вони повністю відповідали позиції країни."
  flavor_mos.97.a: "Люди повинні бути в курсі новин."
  flavor_mos.97.tt1: "Завдяки новій газеті народ #ONCLICK:COUNTRY,[target_root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_root_country.Custom('CL_tt')],X [target_root_country.Custom('CL_GEN')|L]#!#! може дізнаватися про світові події"
  STATIC_MODIFIER_NAME_briefed_on_current_events: "В курсі подій"
  flavor_mos.97.b: "Публікації повинні стосуватися лише наших військових досягнень."
  flavor_mos.97.tt2: "Звістки про наші славні перемоги стрімко розійдуться країною"
  flavor_mos.97.c: "Краще адаптуємо газету під військові потреби."
  flavor_mos.97.tt3: "У виданні будуть наводитися військові звіти та описи тактик, що дозволить воєначальникам ефективніше приймати рішення"
  flavor_mos.97.d: "Газета — марна трата часу."
  flavor_mos.97.historical_info: "«Санкт-Петербурзькі відомості» були створені за указом Петра Великого і стали першою друкованою газетою в Росії. Газета виходила нерегулярно і зазвичай містила інформацію про військові успіхи російського війська, що дозволяло зміцнити репутацію царя серед народу. У ті часи новини часто приходили з великим запізненням, що ускладнювало управління країною та ведення переговорів з іншими країнами."
  flavor_mos.98.title: "Колегії"
  flavor_mos.98.desc: "Нова реформа державного управління вимагає більш чіткого розділення відомств, щоб уникнути виконання ними одних і тих же обов'язків. Для цього нам слід остаточно відмовитися від системи #TOOLTIP:GOVERNMENT_REFORM,prikazi_reform,X #L приказів#!#! і замінити їх колегіями, кожна з яких матиме свої функції та повноваження, а також надаватиме консультації зі спірних питань."
  flavor_mos.98.a: "Країна вже давно потребує цих змін."
  enable_collegium_reform: "Відкриває [Concept('government_reform', 'державну реформу')|e] #TOOLTIP:GOVERNMENT_REFORM,collegium_reform,X #L «Колегії»#!#!"
  flavor_mos.98.tt1: "[Concept('government_reform', 'Державна реформа')|e] «Прикази» та всі пов'язані з нею [Concept('cabinet_action', 'доручення')|e] стануть недоступні"
  flavor_mos.98.b: "Не варто змінювати систему управління без вагомої причини."
  flavor_mos.98.tt2: "Управління #TOOLTIP:LOCATION,neva,X #L Санкт-Петербургом#!#! буде приведено у відповідність до [Concept('policy', 'політики')|e] #TOOLTIP:POLICY,dop_law_governing_senate,X #L «Урядуючий сенат»#!#!"
  flavor_mos.98.historical_info: "Після заснування Урядуючого сенату Петро Великий сформував низку колегій, які відповідали за різні галузі управління країною. Ідея для їх створення була запозичена у сусідньої Швеції, де тоді також проводилися схожі реформи. Ці зміни були зумовлені постійно зростаючою територією Російської імперії, яка потребувала більш ефективного управління."
  flavor_mos.99.title: "Бородовий знак"
  flavor_mos.99.desc: "Відповідно до модних віянь #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західної Європи#!#! чоловіче обличчя має бути гладко виголеним. Однак ця тенденція не прижилася серед #L [ROOT.GetCountry.GetAdjective|l]ої#! еліти, оскільки в #TOOLTIP:RELIGION,$orthodox_tt$,X #L православній#!#! культурі глибоко вкорінився звичай носити довгі бороди. Спроби їх заборонити призвели до загального обурення, а священники взагалі оголосили це блюзнірством. Ми можемо запровадити спеціальний бородовий знак і видавати його лише тим, хто сплатить відповідний податок. Це дасть людям можливість зберегти свої бороди й одночасно забезпечить додатковий приплив коштів до скарбниці."
  flavor_mos.99.a: "Так і вчинимо."
  STATIC_MODIFIER_NAME_beard_tax: "Податок на бороду"
  mos_beard_tax_tokens: "Бородові знаки"
  flavor_mos.99.tt1: "Уряд витратить частину коштів на випуск великої кількості жетонів"
  flavor_mos.99.tt2: "Багато чоловіків вирішать сплатити податок і залишитися при своїй бороді"
  flavor_mos.99.b: "Будемо наполягати на забороні."
  flavor_mos.99.c: "Це особиста справа кожного."
  flavor_mos.99.historical_info: "Петро Великий розраховував, що податок на бороду допоможе осучаснити російський уклад життя та поставити Росію в один ряд з європейськими країнами в плані моди та культури. Будь-хто, хто бажав зберегти свою бороду, мав сплатити податок і отримати спеціально виготовлений жетон. Співробітники Таємної канцелярії намагалися забезпечити дотримання цих правил, проте зрештою різкого переходу до західної моди так і не відбулося."
  flavor_mos.100.title: "Перший адмірал"
  flavor_mos.100.desc: "[feodor_apraksin.GetName] добре справляється з обов'язками воєводи #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! #TOOLTIP:LOCATION,arkhangelsk,X #L Архангельськ#!#!, а також встигає займатися іншими справами. Зокрема, він виявляє інтерес до військової інженерії та бажає розвиватися в цьому напрямку. Скоро термін його повноважень закінчиться, і нам варто розглянути можливість його призначення в #TOOLTIP:BUILDING_TYPE,admiralty,X #L Адміралтейство#!#!. Там він завідуватиме розвитком військово-морського флоту та забезпечуватиме наше панування на морі."
  flavor_mos.100.a: "Адміралтейство якраз потребує таких людей."
  flavor_mos.100.tt2: "Значні ресурси Адміралтейства та великі інженерні знання дозволять йому розробляти проєкти кораблів, здатних витримувати сильні шторми"
  enable_hurricane_hardy_advance: "Відкриває [Concept('advance', 'поступ')|e] #TOOLTIP:ADVANCE_DEFINITION,hurricane_hardy,X #L «Захист від штормів»#!#!"
  flavor_mos.100.b: "Продовжимо його службу на посаді воєводи."
  STATIC_MODIFIER_NAME_tempest_engineer: "Приборкувач штормів"
  flavor_mos.100.tt3: "Великі інженерні знання та досвід роботи в #TOOLTIP:LOCATION,arkhangelsk,X #L архангельському#!#! порту дозволяють йому керувати будівництвом нових перспективних кораблів, здатних витримувати шторми"
  flavor_mos.100.c: "Краще довіримо йому питання оборони."
  flavor_mos.100.tt4: "Великі інженерні знання та наставництво такої людини, як [feodor_apraksin.GetNameWithNoTooltip], дозволять керувати будівництвом укріплень по всій території [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_mos.100.historical_info: "Федір Апраксін розпочав свою державну кар'єру на посаді воєводи Архангельська, головного торгового порту Росії. Він був вправним інженером, у зв'язку з чим Петро Великий довірив йому будівництво нового флоту та кількох укріплень, поки самого царя займали інші справи. Апраксін відіграв найважливішу роль у модернізації військово-морського флоту, що зміцнило військовий вплив Росії на багато років вперед."
  flavor_mos.101.title: "Пізнавальний візит"
  flavor_mos.101.desc: "Дипломатична подорож по #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західній Європі#!#! йде за планом, і наша наступна зупинка — [target_country.GetName]. Тут [ROOT.GetCountry.GetGovernment.GetRuler.GetName] візьме участь у кількох світських заходах, де будуть пишні банкети, модні сукні, напудрені перуки та чудові пироги з вугром, які нікого не залишать байдужим. Схоже, цей візит буде справді вражаючим."
  flavor_mos.101.a: "Подивимося, як вони приймають гостей."
  flavor_mos.101.tt1: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] отримає можливість випробувати телескоп у Гринвіцькій обсерваторії"
  flavor_mos.101.tt2: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] буде присутній на огляді королівського флоту в Детфорді"
  flavor_mos.101.tt3: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] отримує почесний ступінь в #TOOLTIP:LOCATION,oxford,X #L Оксфордському#!#! університеті"
  flavor_mos.101.tt4: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] буде присутній на цікавому засіданні #TOOLTIP:BUILDING_TYPE,royal_society,X #L Королівського товариства#!#!"
  flavor_mos.101.tt5: "[target_root_country.GetGovernment.GetRuler.GetNameWithNoTooltip] отримає в подарунок свій портрет, який написав знаменитий живописець [godfrey_kneller.GetName]"
  opinion_gifted_magnificent_painting: "Подарована блискуча картина"
  flavor_mos.101.b: "Присвятимо свій час усамітненому вивченню та роздумам."
  flavor_mos.101.c: "А уважна сова сидить у тіні й мовчки спостерігає…"
  flavor_mos.101.tt6: "На території [target_country.Custom('CL_GEN')] буде діяти розвинена [Concept('spy_network', 'шпигунська мережа')|e], яка збирає потрібну інформацію під час нашого візиту"
  flavor_mos.101.historical_info: "Під час Великого посольства Петро Великий прибув до Англії, яка на той час ставала все більш впливовою країною і свого роду гаванню для інтелектуалів, що тікали з інших країн Європи. Цар відвідав низку відомих установ, таких як Королівський монетний двір, Гринвіцька обсерваторія та Оксфордський університет. Між іншим він періодично випивав з англійським королем і вникав у місцеві методи містобудування, які пізніше були використані при заснуванні Санкт-Петербурга. Головними цілями цього візиту були вивчення та набуття нових технологій."
  flavor_mos.102.title: "Поїздка на Мальту"
  flavor_mos.102.desc: "#TOOLTIP:LOCATION,malta,X #L Мальтійський#!#! орден безліч разів давав відсіч #L [GetCountry('TUR').GetAdjective|l]им#! загарбникам як на суші, так і на морі. Ми можемо відправити до лицарів делегацію прямісінько з бази нашого флоту недалеко від #TOOLTIP:AREA,black_sea_area,X #L Чорного моря#!#!. Можливо, вони погодяться поділитися з нами своїм безцінним досвідом, що допоможе нам у разі війни з [GetCountry('TUR').GetAdjectiveWithNoTooltip|l]ою [ROOT.GetCountry.Custom('rank_ru_INST')|l]."
  flavor_mos.102.a: "Підняти вітрила!"
  flavor_mos.102.tt1: "Делегація вивчить історію битв і тактику мальтійських лицарів"
  flavor_mos.102.b: "Від торгівлі більше користі, ніж від війни."
  flavor_mos.102.c: "Воякам потрібна лише горілка і славна смерть."
  flavor_mos.102.historical_info: "Пьотр Вєлікій відправив посла і фельдмаршала Боріса Пєтровіча Шеремєтьєва на Мальту, щоб той вивчив флот Мальтійського ордену та військове навчання лицарів. Це було необхідно, щоб підготуватися до війни з Османською імперією: на той час Росія вже створила свою першу базу в Азовському морі, через що конфлікт здавався неминучим."
  flavor_mos.103.title: "Сухарєва вежа"
  flavor_mos.103.desc: "Військово-морському флоту необхідний постійний приплив умілих моряків, які зможуть передавати свої знання наступним поколінням. Для цього ми можемо створити школу, де молоді люди навчатимуться технічних наук, тим самим закладаючи основу для подальшого розвитку наших збройних сил. Нещодавно один з наших архітекторів представив грандіозний проєкт вежі, яка якраз підійде для наших цілей і одночасно прикрасить вигляд #TOOLTIP:LOCATION,moscow,X #L Москви#!#!."
  flavor_mos.103.a: "Це вигідна пропозиція."
  flavor_mos.103.tt1: "Вчений [james_bruce.GetName] створить на верхньому поверсі вежі астрономічну обсерваторію"
  flavor_mos.103.b: "Така розкіш ні до чого."
  flavor_mos.103.c: "Ця споруда повинна приносити користь місту."
  flavor_mos.103.tt2: "На другому поверсі вежі розміщується сучасний резервуар для водопровідної системи #TOOLTIP:LOCATION,moscow,X #L Москви#!#!"
  flavor_mos.103.historical_info: "Сухарєва вежа була збудована наприкінці XVII століття за указом Петра Великого і названа на честь Лаврентія Сухарєва, командира стрілецького полку, який приєднався до царя під час його протистояння з сестрою Софією. За час свого існування вежа використовувалася для різних цілей, включаючи розміщення казарм, навчального закладу, водного резервуара і навіть торгового складу. У 1934 році радянське керівництво вирішило знести вежу в межах реконструкції Москви."
  flavor_mos.104.title: "[francois_le_fort.GetNameWithNoTooltip]"
  flavor_mos.104.desc: "Молодий, але талановитий військовий на ім'я [francois_le_fort.GetName] виявив бажання служити в #L [ROOT.GetCountry.GetAdjective|l]ому#! війську в надії здобути славу. Він подає великі надії, але йому явно бракує досвіду в командуванні військами. Проте він наполягає на чині капітана. Якщо ми приймемо його на службу, наші генерали будуть обурені таким необґрунтованим просуванням іноземця."
  flavor_mos.104.a: "Правила потрібні, щоб їх порушувати."
  flavor_mos.104.tt2: "Він має веселу вдачу і вміє розважати людей з найрізноманітніших верств суспільства, що може стати нам у пригоді надалі"
  flavor_mos.104.b: "Подібна зухвалість неприйнятна."
  flavor_mos.104.historical_info: "Франц Лефорт був послом і генералом, який брав участь у кількох військових походах, що забезпечили Росії вихід до Азовського моря. Крім того, він був одним із творців найбожевільнішого собору та потішних військ, завдяки яким навчалися солдати й особисто юний Пьотр I, з яким у Лефорта згодом виникла близька дружба."
  flavor_mos.105.title: "Потішні війська"
  flavor_mos.105.desc_common1: "[Select_CString(target_character.IsFemale,'Юна', 'Юний')] [target_character.GetName] захоплюється військовими іграми та іграшковими солдатиками, виявляючи великий інтерес до стратегії та управління військами."
  flavor_mos.105.desc_common2: "організувати навчальні битви за участю справжніх солдатів замість іграшок, щоб допомогти [Select_CString(target_character.IsFemale,'молодій спадкоємиці', 'молодому спадкоємцю')] освоїти військову справу."
  flavor_mos.105.desc_patrick_gordon: "$flavor_mos.105.desc_common1$ Це захоплення помічає воєначальник [patrick_gordon.GetName], який пропонує $flavor_mos.105.desc_common2$"
  flavor_mos.105.desc_francois_le_fort: "$flavor_mos.105.desc_common1$ Це захоплення помічає [Select_CString(target_character.IsFemale,'її', 'його')] близький прихильник і воєначальник [francois_le_fort.GetName], який пропонує $flavor_mos.105.desc_common2$"
  flavor_mos.105.desc_both: "$flavor_mos.105.desc_common1$ Це захоплення помічають [Select_CString(target_character.IsFemale,'її', 'його')] близькі прихильники та воєначальники [patrick_gordon.GetName] і [francois_le_fort.GetName], які пропонують $flavor_mos.105.desc_common2$"
  flavor_mos.105.a: "Хай почнуться ігри!"
  training_with_gordon: "Отримує #G  10#! од. [Concept('mil_short', 'військового')|e] [Concept('ability', 'навичка')|e], поки навчанням керує [patrick_gordon.GetName]"
  training_with_le_fort: "Отримує #G  10#! од. [Concept('mil_short', 'військового')|e] [Concept('ability', 'навичка')|e], поки навчанням керує [francois_le_fort.GetName]"
  flavor_mos.105.tt1: "Завдяки своїй чарівності [target_character.GetNameWithNoTooltip] швидко зблизиться зі своїми наставниками та менш знатними учасниками ігор, через що #TOOLTIP:POPTYPE,nobles,X #L знать#!#! буде обурюватися"
  flavor_mos.105.tt2: "Для розміщення потішних військ будуть збудовані окремі казарми"
  mos_toy_army_components: "Елементи потішних військ"
  STATIC_MODIFIER_NAME_friends_in_all_places: "Друзі всюди"
  flavor_mos.105.b: "Мабуть, приватних занять буде достатньо."
  flavor_mos.105.historical_info: "У дитинстві у Пєтра Великого були іграшкові солдатики, з якими він влаштовував імпровізовані битви. Згодом ці ігри переросли в досить складні навчальні битви, де брали участь справжні солдати, інструктори та стрілецькі добровольці. Надалі це захоплення військовою справою вплинуло на рішення Петра самому брати участь у реальних бойових діях. Отриманий під час кількох кампаній досвід дозволив Петру осучаснити та зміцнити російське військо."
  flavor_mos.106.title: "Імператорська гвардія"
  flavor_mos.106.desc: "Потішні війська беруть участь у складних навчаннях, наближених до реальних битв. Завдяки цьому [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'змогла', 'зміг')] організувати елітне військо з підготовлених і безмежно відданих [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] бійців. Проте через різне походження та статус новобранців війську бракує злагодженості. Цю проблему можна вирішити, розділивши військо на два полки: перший складатиметься виключно з #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! і займатиметься захистом [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'правительки', 'правителя')], а другий братиме участь у воєнних кампаніях."
  flavor_mos.106.a: "Звучить розумно."
  enable_preobrazhensky_semyonovsky_imperial_guard_advance: "Відкриває [Concept('advance', 'поступ')|e] #TOOLTIP:ADVANCE_DEFINITION,preobrazhensky_semyonovsky_imperial_guard,X #L «Преображенський та Семенівський полки імператорської гвардії»#!#!"
  flavor_mos.106.b: "Немає потреби змінювати усталений порядок."
  flavor_mos.106.historical_info: "Прєображенскій та Сємьоновській полки були сформовані Пєтром Вєлікім у межах масштабних військових реформ і швидко стали найпрестижнішими військовими формуваннями в Російській імперії. Вони брали участь у багатьох походах і завжди були тісно пов'язані з монархом. Полки продовжували захищати імператорську владу до свого розпуску в роки громадянської війни."
  flavor_mos.107.title: "Надзвичайно високий чиновник"
  flavor_mos.107.desc: "#TOOLTIP:POLICY,dop_law_governing_senate,X #L Урядуючому сенату#!#! потрібні талановиті люди, готові вірно та старанно служити країні. [tikhon_streshnev.GetName], московський губернатор та впливовий дворянин, чудово підійде на роль сенатора. Він вже має значний досвід у державному управлінні, тому без проблем впишеться в нове середовище. Якщо, звичайно, не враховувати його надзвичайно високий зріст…"
  flavor_mos.107.a: "Запросимо його до сенату."
  flavor_mos.107.tt2: "І [target_character.GetName], і [tikhon_streshnev.GetNameWithNoTooltip] відрізняються надзвичайно високим зростом, через що поповзуть чутки про те, що останній є справжнім батьком [Select_CString(target_character.IsFemale,'правительки', 'правителя')]."
  flavor_mos.107.b: "Своїм виглядом він лише відволікатиме інших від роботи."
  flavor_mos.107.historical_info: "Тіхон Стрєшнєв був одним із перших членів Урядуючого сенату, а також встиг послужити московським губернатором та головою Розрядного приказу. Він був близький до царської родини та виступав наставником молодого Пєтра I, що забезпечило йому величезний вплив. Як і сам Пьот, Стрєшнєв був досить високого зросту, у зв'язку з чим деякі вважали його біологічним батьком царя."
  flavor_mos.108.title: "[Select_CString(target_heir.IsFemale,'Втікачка-спадкоємиця', 'Втікач-спадкоємець')]"
  flavor_mos.108.desc: "[target_ruler.GetName] та [target_heir.GetName] постійно влаштовують сварки, оскільки [Select_CString(target_heir.IsFemale,'остання', 'останній')] підтримує вкорінені [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і цінності та виступає проти нещодавніх перетворень, що торкнулися війська, уряду та життєвого укладу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Не бажаючи миритися з реформами свого батька, [target_heir.GetNameWithNoTooltip] вирішує втекти на територію #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!."
  flavor_mos.108.a: "Негайно [Select_CString(target_heir.IsFemale,'її', 'його')] заарештувати!"
  flavor_mos.108.tt1: "У межах розслідування [target_heir.GetNameWithNoTooltip] піддасться допитам, під час яких може загадковим чином загинути."
  flavor_mos.108.b: "Підемо на поступки."
  flavor_mos.108.tt2: "[target_heir.GetNameWithNoTooltip] повернеться додому взамін на часткову зміну внутрішньої політики."
  flavor_mos.108.c: "Нехай наші шпигуни повернуть [Select_CString(target_heir.IsFemale,'її', 'його')] назад."
  flavor_mos.108.tt3: "[target_heir.GetNameWithNoTooltip] повернеться додому, перш ніж хто-небудь дізнається про [Select_CString(target_heir.IsFemale,'її', 'його')] зникнення."
  flavor_mos.108.d: "Позбавимо [Select_CString(target_heir.IsFemale,'її', 'його')] прав спадкування."
  flavor_mos.108.historical_info: "Алєксєй Пєтровіч часто сварився зі своїм батьком, Пєтром Вєлікім, критикуючи його прагнення зробити Росію схожою на Європу. Мати виховувала Алєксєя за старовинними звичаями відповідно до усталених цінностей, що прямо суперечило більш сучасним поглядам його батька. Ці розбіжності призвели до втечі Алєксєя до Священної Римської імперії, проте незабаром його знайшли та повернули назад до Росії, де на нього чекав суд. Незадовго після цього царевич помер за нез'ясованих обставин."
  flavor_mos.109.title: "Придворний арап"
  flavor_mos.109.desc: "З [GetCountry('TUR').Custom('longname_ru_GEN')] нам привезли вельми незвичайний «подарунок»: хлопчика родом із #TOOLTIP:AREA,northern_ethiopia_area,X #L Північної Ефіопії#!#!, який потрапив у рабство і був викуплений нашим послом. Його назвали [abram_petrovich.GetName], і хоча він виявляє певну обдарованість, йому явно бракує грамотності та базових знань. Ми зобов'язані виховати його при дворі та дати йому гідну освіту. Можливо, в майбутньому він навіть зможе принести користь #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! як державний або військовий діяч."
  flavor_mos.109.a: "Ми проспонсоруємо його освіту."
  flavor_mos.109.tt1: "З'явиться [Concept('character', 'персонаж')|e] [abram_petrovich.GetNameWithNoTooltip]."
  flavor_mos.109.tt2: "Він буде зарахований до одного з престижних навчальних закладів #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!."
  flavor_mos.109.tt3: "Його буде зараховано до університету міста [target_location.GetName]"
  flavor_mos.109.tt4: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] виступають проти передачі подібних привілеїв простому рабу"
  flavor_mos.109.b: "Навряд чи воно того варте."
  flavor_mos.109.historical_info: "Арапами в Росії називали придворних слуг з темним кольором шкіри. Багато європейських монархів вважали престижним та екзотичним мати у своєму оточенні слуг африканського походження. Одним із таких арапів був Абрам Петрович, який потрапив до Росії з Константинополя і став хрещеним сином Петра Великого. Завдяки цьому він здобув за кордоном гарну технічну освіту і повернувся до Росії, де обійняв посаду військового інженера."
  flavor_mos.110.title: "Повернення обдарованого сина"
  flavor_mos.110.desc: "Завершивши навчання, [abram_petrovich.GetName] повертається на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з великими знаннями в галузі військової інженерії. Тепер нам потрібно вирішити, де краще застосувати його навички. З одного боку, він може стати непоганим наставником для наших військових, але з іншого, людина його талантів завжди знадобиться в уряді."
  flavor_mos.110.a: "Знання важливо передавати наступним поколінням."
  flavor_mos.110.tt1: "[abram_petrovich.GetNameWithNoTooltip] отримає посаду військового інженера та навчатиме соратників технічним наукам"
  STATIC_MODIFIER_NAME_fortress_forger: "Будівничий фортець"
  flavor_mos.110.b: "Справжній патріот б'ється до кінця."
  STATIC_MODIFIER_NAME_gannibal: "Ганнібал"
  flavor_mos.110.c: "Нехай займається державним управлінням."
  flavor_mos.110.d: "Ми більше не потребуємо його послуг."
  flavor_mos.110.tt2: "[abram_petrovich.GetNameWithNoTooltip] піде у вигнання, чому будуть особливо раді [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]"
  flavor_mos.110.historical_info: "Закінчивши навчання у Франції, Абрам Петрович повернувся до Росії. Незабаром після цього його хрещений батько, імператор Петро Великий, помер. Тимчасовий правитель, що зайняв його місце, відчував неприязнь до Абрама, за що заслав його до Сибіру. Однак завдяки його інженерним талантам він був помилуваний і відправлений на будівництво низки укріплень по всій Росії. Він продовжував служити під керівництвом кількох наступних правителів, за що зрештою отримав посаду головного військового інженера російського війська."
  flavor_mos.111.title: "Петропавлівська фортеця"
  flavor_mos.111.desc: "Неподалік від #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурга#!#! знаходиться Заячий острів, вигідно розташований на річці Неві, яка з'єднує #TOOLTIP:AREA,eastern_baltic_sea,X #L Східне Балтійське море#!#! та Ладозьке озеро. Ми можемо звести тут сучасну фортецю, щоб закріпитися в цій області та надалі заснувати тут велике місто."
  flavor_mos.111.a: "Кращого місця й не придумати."
  mos_st_peter_and_paul_construction: "Будівництво Петропавлівського собору"
  flavor_mos.111.tt1: "[abram_petrovich.GetName] вміло керуватиме будівництвом грандіозного проєкту, що дозволить знизити його загальну вартість"
  flavor_mos.111.b: "Дім там, де твоє серце."
  flavor_mos.111.historical_info: "Петропавлівська фортеця — одна з найстаріших споруд у Санкт-Петербурзі, заснована Петром Великим під час Північної війни. На території фортеці також знаходиться Петропавлівський собор, де поховані багато членів імператорської родини. Менш ніж за 20 років навколо фортеці було зведено велике місто, яке стало столицею Росії."
  flavor_mos.112.title: "Генерал-архітектор"
  flavor_mos.112.desc: "Заслужений архітектор і майстер садово-паркового мистецтва на ім'я [jean_baptiste_le_blond.GetName] нещодавно прибув до нашої країни на запрошення влади. Він родом з #TOOLTIP:LOCATION,paris,X #L Парижа#!#!, тому чудово розуміється на архітектурі та знайомий зі стилем #italic Ленотра#!. Завдяки своєму досвіду він зможе не тільки перетворити #TOOLTIP:LOCATION,neva,X #L Санкт-Петербург#!#! на сучасне місто, а й зробити його культурним центром країни."
  flavor_mos.112.a: "Потрібно якнайшвидше приступати до будівництва."
  flavor_mos.112.a.custom: "Для прискорення будівництва з усієї #TOOLTIP:REGION,russian_region,X #L Росії#!#! залучаються #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!"
  flavor_mos.112.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')] незадоволені примусом до будівельних робіт"
  flavor_mos.112.tt3: "План забудови міста буде розроблено, і розпочнуться підготовчі роботи з будівництва майбутньої столиці"
  flavor_mos.112.tt4: "Безліч привезених для роботи #TOOLTIP:POPTYPE,peasants,X #L селян#!#! загине через надто суворі умови"
  flavor_mos.112.b: "Цьому божевіллю потрібно покласти край."
  flavor_mos.112.historical_info: "Жан-Батист Леблон був французьким архітектором, який побудував низку відомих будівель у Санкт-Петербурзі незабаром після його заснування. Він особисто розробив план із забудови міста та відіграв важливу роль у впровадженні французького бароко в Росії."
  flavor_mos.113.title: "Вікно в Європу"
  flavor_mos.113.desc: "Завдяки його розташуванню, #TOOLTIP:LOCATION,neva,X #L Санкт-Петербург#!#! має доступ до основних торгових шляхів, а болотиста місцевість навколо нього забезпечує добрий захист від нападів. Однак головна перевага міста полягає в його близькості до Європи, що сприяє активному культурному обміну з іншими країнами. Якщо ми хочемо отримати максимальну користь з цих чинників, нам варто перенести сюди наш уряд. Це дозволить не тільки залучити нові інвестиції, а й зміцнити образ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!# як впливової європейської країни."
  flavor_mos.113.a: "Це стане новою віхою в історії країни."
  st_petersburg: "Санкт-Петербург"
  flavor_mos.113.tt1: "Перенесення столиці до #TOOLTIP:LOCATION,neva,X #L Санкт-Петербурга#!#! зможе викликати кілька певних подій"
  flavor_mos.113.b: "Це погана і непродумана затія."
  flavor_mos.113.tt2: "Деякі [Concept('pops', 'групи населення')|e] покинуть #TOOLTIP:LOCATION,neva,X #L Санкт-Петербург#!#! в надії почати нове життя в місті [capital.GetName]"
  flavor_mos.113.historical_info: "Петро Великий заснував Санкт-Петербург у 1703 році, бажаючи забезпечити країні вихід до Балтійського моря. Він прагнув перенести столицю з оточеної сушею Москви туди, де можна було б створити порт із цілорічною навігацією. Це рішення, як і багато інших, було частиною царського плану з модернізації та європеїзації Росії. Під час будівництва міста виникли значні труднощі, пов'язані із заболоченою місцевістю та суворими погодними умовами. Для виконання найважчих робіт туди примусово привозили селян та ув'язнених."
  flavor_mos.114.title: "Ідеальна дружина"
  flavor_mos.114.desc: "Продовження нашої династії має першочергове значення, тому вкрай важливо, щоб [ROOT.GetCountry.GetGovernment.GetRuler.GetName] знайшов собі дружину. Нещодавно було проведено огляд наречених, на якому увагу правителя привернула [natalya_naryshkina.GetName] зі знатного роду #TOOLTIP:DYNASTY,$Naryshkin_tt$,X #L Наришкіних#!#!. Ця жінка в самому розквіті літ напевно народить йому великих синів. Однак її сім'я просить дозволити своїй дочці вільніший спосіб життя, що йде врозріз із нашим консервативним сімейним укладом."
  flavor_mos.114.a: "Задовольнимо їхнє прохання."
  STATIC_MODIFIER_NAME_great: "Великий син"
  flavor_mos.114.tt1: "З'явиться [Concept('character', 'персонаж')|e] [natalya_naryshkina.GetNameWithNoTooltip], народиться [peter_the_great.GetName]"
  flavor_mos.114.tt2: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] незадоволені тим, що [natalya_naryshkina.GetNameWithNoTooltip] має такий волелюбний характер"
  flavor_mos.114.b: "Не кожну думку варто висловлювати."
  flavor_mos.114.c: "У шлюбі немає потреби."
  flavor_mos.114.historical_info: "Наталія Наришкіна вийшла заміж за царя після смерті його першої дружини Марії Милославської. Її сім'я намагалася перешкодити укладенню цього шлюбу, стверджуючи, що Наталія закохала в себе царя за допомогою чаклунства, проте розслідування цього не підтвердило. Наталія була вихована у вільнішому середовищі, ніж більшість жінок того часу. У зв'язку з цим вона вимагала від чоловіка певних поступок, наприклад, дозволити їй відвідувати театр і не покривати голову під час походу до храму. Крім того, вона намагалася ввести деякі західні звичаї при російському дворі."
  flavor_mos.115.title: "[james_bruce.GetNameWithNoTooltip] та його спостереження"
  flavor_mos.115.desc: "Талановитий вчений і воєначальник [james_bruce.GetName] походить зі знатного шотландського роду, представники якого оселилися в Росії в 1647 році. Він здобув чудову освіту, яка дозволила йому досягти великих успіхів у найрізноманітніших сферах, включно з артилерійською справою. Нам би знадобилися його послуги, і яку б посаду ми йому не призначили — адміністративну, наукову чи військову, — він безсумнівно проявить себе якнайкраще."
  flavor_mos.115.a: "Запросимо його до двору."
  flavor_mos.115.tt2: "У майбутньому його праці можуть відіграти важливу роль у створенні навчальних закладів"
  flavor_mos.115.b: "Нашому війську потрібні такі люди, як він."
  STATIC_MODIFIER_NAME_artillery_maestro: "Знавець артилерії"
  flavor_mos.115.tt3: "Він вступить на військову службу, де займеться розвитком артилерії та тактики її використання"
  flavor_mos.115.c: "Сумнівна родовід."
  flavor_mos.115.historical_info: "Яків Брюс брав участь у кількох походах проти Османської імперії у званні генерал-поручика артилерії. Він був одним із найосвіченіших людей у Росії того часу, зробив великий внесок у галузі астрономії та фізики, а також написав низку книг, які пізніше передав Академії наук. Крім того, Брюс відкрив у Сухаревій вежі першу в країні обсерваторію, через що набув у народі репутації чаклуна."