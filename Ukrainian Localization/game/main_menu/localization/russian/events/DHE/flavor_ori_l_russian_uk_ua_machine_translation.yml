l_russian:
  flavor_ori.1.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|L] та культ Джаганнатхи"
  flavor_ori.1.desc: "Ми проводимо пишні обряди у великому храмі міста [ShowLocationName('puri')], поклоняючись божеству, яке спілкується з нами через дерев'яну статую. Іноземні правителі не раз висміювали наші практики, однак у штаті #TOOLTIP:AREA,orissa_area,X #L Орісса#!#! владика всесвіту Джаганнатха користується величезною популярністю.\n\n[target_character.GetName] [Select_CString(target_character.IsFemale,'благоволила', 'благоволив')] жерцям Джаганнатхи, і династія [target_character.GetDynasty.GetName] повинна продовжити цей звичай. Нам варто взяти під своє покровительство храм у [ShowLocationNameWithNoTooltip('puri')] та зробити культ Джаганнатхи провідним [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l]."
  flavor_ori.1.a: "Слава Джаганнатхі!"
  flavor_ori.1.b: "Не варто класти всі яйця в один кошик."
  flavor_ori.2.title: "Ціна війни"
  flavor_ori.2.desc: "Недавні війни спровокували нестабільність [ROOT.GetCountry.Custom('predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')]. Через підвищення податків, зумовлених військовими витратами, [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] поступово радикалізувалися, а череда неврожаїв остаточно відвернула їх від нас. У ході опитування ми з'ясували, що найбільше невдоволення викликає податок на сіль — один із найважливіших ресурсів для простих людей. [target_character.GetName] та [Select_CString(target_character.IsFemale,'її', 'його')] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонують знизити цей податок, щоб послабити опозиційні настрої."
  flavor_ori.2.historical_info: "У 1434 році, коли Капілендра Дева скинув останнього царя з династії Східних Гангів, Орісса перебувала в жалюгідному стані. Напади мусульман з півночі та із заходу, а також конфлікти із сусідами на півдні значно послабили королівство, але раджа Капілендра швидко повернув йому колишню велич. Після низки воєн з Бенгалією, Андхрою, Бахманійським султанатом та Віджаянагарською імперією країна наростила території та вплив. Однак нескінченні конфлікти сильно вдарили по населенню, що вкупі з неврожаєм у підсумку призвело до масових заворушень."
  flavor_ori.2.a: "Ми й без податку на сіль проживемо."
  flavor_ori.2.b: "Ми не підемо на поводу в народу."
  flavor_ori.3.title: "Зародження літератури мовою орія"
  flavor_ori.3.desc: "Ще зовсім недавно #TOOLTIP:LANGUAGE,sanskrit_language,X #L санскрит#!#! повсюдно використовувався в літературі [ROOT.GetCountry.Custom('CL_GEN')], тоді як #TOOLTIP:LANGUAGE,oriya_language,X #L орія#!#!, якою володіли [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] та люди з нижчих каст, залишався суто розмовним. Ситуація змінилася, коли відставний вояк [sarala_dasa.GetName], який не отримав належної освіти, переклав мовою орія епос «[ShowAdvanceName('mahabarata')]». Власні твори [sarala_dasa.GetNameWithNoTooltip] теж писав виключно орійською, і інші поети почали наслідувати його приклад."
  flavor_ori.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ori.3.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] почне використовувати цю мову."
  flavor_ori.4.title: "[achyutananda.GetNameWithNoTooltip]"
  flavor_ori.4.desc: "[achyutananda.GetName] — плідний письменник, поет і провидець, який сповідує [ShowPolicyName('vaishnavism')]. Останнім часом у [ROOT.GetCountry.Custom('rank_ru_PREP')] його шанують як святого. Ця людина, за чутками, здатна бачити майбутнє, а єдина мова, якою він пише, — [ShowLanguageName('oriya_language')], мова простих людей."
  flavor_ori.4.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_ori.4.b: "Ми підтримаємо його творчість."
  flavor_ori.5.title: "[target_character.GetNameWithNoTooltip] піднімається по службі"
  flavor_ori.5.desc: "У країні [ROOT.GetCountry.GetName], якою зараз править [target_character2.GetName], з'явилася нова політична фігура: [target_character.GetName], захоплений і проникливий стратег, який прагне захистити [ROOT.GetCountry.Custom('CL_ACC')] від зовнішніх загроз. Однак [ROOT.GetCountry.GetGovernment.GetCourtTitle] наводнили чутки, ніби ця впливова людина збирається зайняти престол, скинувши [Select_CString(target_character2.IsFemale,'законну правительку', 'законного правителя')] та усунувши династію [target_character2.GetDynasty.GetName] від державних справ. Якщо це станеться, [ShowAreaName('orissa_area')] опиниться під [Select_CString(target_character.IsFemale,'її', 'його')] повним контролем."
  flavor_ori.5.a: "Країні потрібні люди з амбіціями."
  flavor_ori.5.b: "Проженемо [Select_CString(target_character.IsFemale,'її', 'його')]!"
  ori_kapilendra_may_revolt_tt: "Загроза престолу [ROOT.GetCountry.Custom('CL_GEN')] залишається, доки [target_character.GetName] [Select_CString(target_character.IsFemale,'жива', 'живий')]."
  flavor_ori.6.title: "[target_character.GetNameWithNoTooltip] піднімає повстання"
  flavor_ori.6.desc: "[target_character.GetName] продовжує набирати популярність, і [Select_CString(target_character.IsFemale,'їй', 'йому')] вдалося навернути проти нас значну частину населення. [Select_CString(target_character.IsFemale,'Її', 'Його')] військо налічує кілька тисяч осіб, і, якщо [target_character2.GetName] добровільно не зречеться престолу, країну чекає громадянська війна."
  flavor_ori.6.a: "Зречення — єдиний вихід."
  flavor_ori.6.b: "Наше військо розгромить зрадників."
  kapilendra_rebels: "Прихильники Капілендри"
  flavor_ori.7.title: "$kapilesvara_siva_temple$"
  flavor_ori.7.desc: "За останні роки могутність [ROOT.GetCountry.Custom('CL_GEN')] зросла, і [target_character.GetName] збирається звести нові #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстські#!#! храми. Серед них — $kapilesvara_siva_temple$. Ідеальним місцем для його будівництва стане [target_location.GetName], адже саме тут, якщо вірити переказам, народився бог #TOOLTIP:GOD,shiva_god,X #L Шива#!#!."
  flavor_ori.7.a: "Ми збудуємо цей храм."
  flavor_ori.7.b: "Це занадто дорого."
  flavor_ori.8.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_ori.8.desc: "Нещодавно [target_character.GetName] та [Select_CString(target_character.IsFemale,'її', 'його')] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] дізналися про [Select_CString(target_character2.IsFemale,'жінку', 'людину')] на ім'я [target_character2.GetName]. [Select_CString(target_character2.IsFemale,'Її', 'Його')] твори не набули широкої відомості серед народу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, однак вони написані чудовою #L [ROOT.GetCountry.GetCourtLanguage|l]ою#! мовою. Можна з упевненістю сказати, що це найкращий зразок елітарної поезії в нашій країні."
  flavor_ori.8.a: "Ми підтримаємо цього автора."
  flavor_ori.8.b: "Нам нецікава така творчість."
  flavor_ori.9.title: "Згасання [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ого мілітаризму"
  flavor_ori.9.desc: "Ми здобули безліч славних перемог, але всі ці завоювання залишилися в минулому. Жителі [ROOT.GetCountry.Custom('CL_GEN')] ведуть спокійне життя і поступово забувають про війну. Напевно, це не найкращим чином позначиться на силі нашого війська, однак, можливо, настав час перевести нашу політику в більш мирне русло."
  flavor_ori.9.a: "[target_character.GetNameWithNoTooltip] присвятить себе мирним справам."
  flavor_ori.9.b: "Саме час розпочати нову війну."
  flavor_ori.10.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] військові реформи"
  flavor_ori.10.desc: "Прийшовши до влади в [ROOT.GetCountry.Custom('CL_PREP')], [target_character.GetName] вирішує продовжити загарбницьку політику. Для цього [Select_CString(target_character.IsFemale,'їй', 'йому')] необхідно провести низку військових реформ, які забезпечать проникнення мілітаризму в усі сфери [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ого суспільства та дозволять створити постійне військо для охорони кордонів і організації кампаній проти слабших сусідів."
  flavor_ori.10.a: "Ми проведемо ці реформи."
  flavor_ori.10.b: "Досить з нас війн."
  ori_every_location_in_orissa_with_armory_gains_2_dev: "Усі [Concept('location', 'місцевості')|e] з [Concept('building', 'спорудами')|e] типу #TOOLTIP:BUILDING_TYPE,armory,X #L «арсенал»#!#!, розташовані в #TOOLTIP:AREA,orissa_area,X #L Оріссі#!#!, отримають [ShowNamedValue('development_weak_bonus')|+=] до [Concept('development', 'розвитку')|e]."
  flavor_ori.11.title: "Занепад морської торгівлі"
  flavor_ori.11.desc: "Наші зв'язки з #TOOLTIP:SUB_CONTINENT,china,X #L Китаєм#!#! та #TOOLTIP:SUB_CONTINENT,south_east_asia,X #L Південно-Східною Азією #!#!, зокрема й торговельні, слабнуть день у день. Раніше наша економіка багато в чому залежала від експорту тканин і солі в ці регіони, проте через нещодавні зміни всередині [ROOT.GetCountry.Custom('CL_GEN')] та погіршення відносин з торговельними партнерами ми практично втратили цей ринок. Щоб виправити ситуацію, [target_character.GetName] пропонує запровадити більш відкриту систему торгівлі, але [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] навряд чи будуть у захваті від такого кроку, оскільки він може підірвати їхній вплив на інших ринках."
  flavor_ori.11.a: "Ми зважимося на такий крок."
  flavor_ori.11.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] нам цього не пробачать."
  flavor_ori.11.c: "Ми можемо підсолодити пігулку…"
  flavor_ori.12.title: "Полювання на слонів"
  flavor_ori.12.desc: "У зв'язку з надлишком #TOOLTIP:GOODS,elephants,X #L слонів#!#!! в [ROOT.GetCountry.Custom('CL_PREP')] багато хто став замислюватися про збільшення кількості полків, укомплектованих цими могутніми тваринами. Однак у наших #TOOLTIP:BUILDING_TYPE,elephant_hunting_grounds,X #L місцях полювання на слонів#!#! не вистачає ресурсів для відлову більшої кількості звірів та виробництва необхідного спорядження. Можливо, настав час привести ці угіддя до ладу. [target_character.GetName] та [ROOT.GetCountry.GetGovernment.GetCourtTitle] навіть готові вкласти в це свої особисті кошти."
  flavor_ori.12.a: "Ми профінансуємо цей проєкт."
  flavor_ori.12.b: "Тільки даремно гроші витратимо."
  ori_double_elephant_hunting_ground_level_tt: "Максимальний рівень [Concept('building', 'споруд)|e] типу #TOOLTIP:BUILDING_TYPE,elephant_hunting_grounds,X #L «місця полювання на слонів»#!#! підвищиться на #G 2#!."
  INCREASED_MAX_LEVEL_ELEPHANT_HUNTING_GROUND: "Підвищення максимального рівня в ході [Concept('events', 'події')|e]"
  flavor_ori.13.title: "[ShowPolicyNameWithNoTooltip('vedic_education')]"
  flavor_ori.13.desc: "Хоча #TOOLTIP:POLICY,vedic_education,X #L ведична освіта#!#! — давня #TOOLTIP:SUB_CONTINENT,india,X #L індійська#!#! традиція, від цієї системи практично відмовилися після #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! вторгнень. Ми можемо спробувати відродити її, але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] навряд чи будуть задоволені таким рішенням."
  flavor_ori.13.a: "Повернімося до старої системи освіти."
  flavor_ori.13.b: "Нас цілком влаштовує нинішня."
  flavor_ori.14.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [ROOT.GetCountry.Custom('CL_GEN')] творить безумства"
  flavor_ori.14.desc: "[target_character.GetName] користується поганою репутацією у знаті. #L [ROOT.GetCountry.GetAdjective]і#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вважають, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не справляється зі своїми обов'язками. [Select_CString(target_character.IsFemale,'Вона некомпетентна та імпульсивна', 'Він некомпетентний та імпульсивний')], через що нерідко вводить нові закони за власною примхою. У зв'язку з цим багато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] незадоволені [Select_CString(target_character.IsFemale,'її', 'його')] правлінням і вважають [Select_CString(target_character.IsFemale,'її божевільною', 'його божевільним')]."
  flavor_ori.14.a: "З чого [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')], що може робити все, що заманеться?"
  flavor_ori.14.b: "На щастя, ми можемо зупинити [Select_CString(target_character.IsFemale,'її', 'його')], поки не пізно."
  ori_nobles_lose_20_satisfaction: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pops', 'груп населення')|e] зі стану «[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] [pops|e]» знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  flavor_ori.15.title: "Турбота про калінганські храми"
  flavor_ori.15.desc: "Калінганські храми — частина давньої архітектури [ROOT.GetCountry.Custom('CL_GEN')]. Всі вони присвячені різним #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстським#!#! божествам і мають свій впізнаваний стиль. На жаль, ми не можемо звести більше храмів, але цілком в змозі підтримати грошима хоча б один з них: наприклад, той, що знаходиться в місцевості [target_location.GetName]."
  flavor_ori.15.a: "Нам це по кишені."
  flavor_ori.15.b: "Вони й так у доброму стані."
  flavor_ori.15.c: "Ми зробимо щедрі пожертви."
  flavor_ori.16.title: "Поширення вішнуїзму"
  flavor_ori.16.desc: "Поклоніння Вішну вкорінилося в нашій країні ще в перші дні її існування, але на жаль, політичні та релігійні чвари змусили нас забути старі звичаї. У наші дні далеко не всі жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вважають #TOOLTIP:GOD,vishnu_god,X #L Вішну#!#! верховним божеством. З іншого боку, простий люд переконаний, що [ROOT.GetCountry.GetReligion.GetName|l] — це насамперед культ Джаганнатхи. Одного цього достатньо, щоб правитель і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] як слід замислилися. Можливо, вони навіть увірують у верховенство Вішну і визнають, що [ROOT.GetCountry.Custom('CL_DAT')] час змінити думку про те, який напрямок релігії [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip|l] істинний."
  flavor_ori.16.a: "Хай так і буде!"
  flavor_ori.16.b: "Ми не будемо йти на поводу у мас."
  ori_all_hindu_clergy_pops_will_gain_20_satisfaction: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pops', 'груп населення')|e], що сповідують #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїзм#!#!, зросте на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]."
  flavor_ori.1000.title: "Зв'язки з [GetCountry('POR').Custom('CL_INST')]"
  flavor_ori.1000.desc: "Поява людей з [GetCountry('POR').Custom('CL_GEN')] стала поворотним моментом не тільки для нас, а й для наших ворогів. [target_market.GetName|L] становить чималий інтерес для тамтешніх купців: тут вони купують наші товари та продають свої. Ми можемо або налагодити з ними добрі стосунки, або саботувати їхню продукцію."
  flavor_ori.1000.a: "Ми завжди раді новим людям."
  flavor_ori.1000.b: "Вони не повинні конкурувати з нашими купцями."
  ori_sabotaged_merchants: "Саботаж купців"
  flavor_ori_1001_shared: "Запрошення [GetCountry('POR').GetAdjectiveWithNoTooltip|l]их купців"
  flavor_ori.1001.title: "$flavor_ori_1001_shared$"
  flavor_ori.1001.desc: "[target_country2.GetGovernment.GetRulerTitle|L] #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#! — [Select_CString(target_country2.GetGovernment.GetRuler.IsFemale,'цінна союзниця', 'цінний союзник')], з [Select_CString(target_country2.GetGovernment.GetRuler.IsFemale,'якою', 'яким')] ми давно хочемо подружитися. Здається, [target_character.GetName] знає, як це зробити. [target_country.GetName] — багата і родюча країна. Ми можемо заманити іноземних купців у місцевість [target_location.GetName], а отримані кошти вкласти в розвиток [target_location.Custom('LR_GEN')|l]. Просто геніально!"
  flavor_ori.1001.a: "І справді геніальна ідея!"
  flavor_ori.1001.b: "Це марна трата часу."
  ori_por_must_accept_offer_tt: "Ефекти подіють, якщо [target_country2.GetName] прийме пропозицію."
