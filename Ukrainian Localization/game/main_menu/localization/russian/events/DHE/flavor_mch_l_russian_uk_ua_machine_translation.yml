l_russian:
  flavor_mch.1.title: "[target_character.GetShortNameWithNoTooltip] і [Select_CString(target_character.IsFemale,'її', 'його')] реформи"
  flavor_mch.1.desc: "[target_character.GetShortName] пропонує провести [ROOT.GetCountry.Custom('endlong_predlog_vvo')] [ROOT.GetCountry.Custom('longname_ru_PREP')] масштабні реформи, щоб перетворити уряд і судову владу за китайською моделлю."
  flavor_mch.1.a: "Ми обираємо передові реформи."
  flavor_mch.1.b: "Нам більше до вподоби консервативні реформи."
  flavor_mch.2.title: "Сім великих образ"
  flavor_mch.2.desc: "Протягом століть наш народ жив під п'ятою правлячої династії [target_country.Custom('CL_GEN')]. Довгі роки ми терпіли приниження і були змушені підкорятися волі дворів, яка йшла врозріз з нашими бажаннями.\n\nЗараз наш народ єдиний і готовий змінити ситуацію. [ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'зачитала', 'зачитав')] перед усім двором маніфест, що містить сім бід, від яких постраждав наш народ, і [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'заявила', 'заявив')], що скоро нас чекає війна з [target_country.Custom('CL_INST')].\n\nАбо ми, або вони."
  flavor_mch.2.a: "Ми готові напасти."
  flavor_mch.3.title: "Реформи [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого війська"
  flavor_mch.3.desc: "Тепер, коли #TOOLTIP:REGION,north_china_region,X #L Північний Китай#!#! повністю під нашим контролем, настав час використати наш військовий досвід і реформувати старе #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайське#!#! військо.\n\nОднак реформа обійдеться дорого. Крім того, багато військових будуть різко проти."
  flavor_mch.3.a: "Реформуємо військо. Стара китайська модель нікуди не годиться."
  flavor_mch.3.b: "Дурниці! Чого варвари можуть навчити народ Сунь-цзи?"
  flavor_mch.4.title: "[target_character.GetShortNameWithNoTooltip] і [Select_CString(target_character.IsFemale,'її', 'його')] нова посада"
  flavor_mch.4.desc: "Нещодавно нашу увагу привернув багатообіцяючий міністр на ім'я [target_character.GetShortName]. Кажуть, [Select_CString(target_character.IsFemale,'вона обізнана', 'він обізнаний')] у питаннях дипломатії та управління.\n\nОднак ходять чутки, що [Select_CString(target_character.IsFemale,'вона', 'він')] вкрай [Select_CString(target_character.IsFemale,'корумпована', 'корумпований')] і [Select_CString(target_character.IsFemale,'відома', 'відомий')] своєю жадібністю та любов'ю до хабарів. Чи варто нам призначати [Select_CString(target_character.IsFemale,'її', 'його')] головним міністром?"
  flavor_mch.4.a: "Призначити [Select_CString(target_character.IsFemale,'її', 'його')], незважаючи на недоліки!"
  flavor_mch.4.b: "Ні, корупція призведе нашу країну до занепаду!"
  flavor_mch.5.title: "Пізня Цзінь"
  flavor_mch.5.desc: "Кілька століть тому #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженська#!#! країна Цзінь досягла великого успіху, завоювавши #TOOLTIP:REGION,north_china_region,X #L Північний Китай#!#!. Хоча їй не вдалося повністю підкорити собі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединну Країну#!#!, вона тим не менш відбила вторгнення Південної імперії Сун і, напевно, досягла б більшого успіху, якби на неї не напал[GetCountry('MGE').Custom('endlong_fem')] [GetCountry('MGE').GetLongName]. Може, назвати нашу могутню #L [ROOT.GetCountry.GetAdjective|l]у#! імперію #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженів#!#! на її честь?"
  flavor_mch.5.a: "Проголосимо Пізню Цзінь."
  flavor_mch.5.b: "Насамперед ми [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а країна."
  mch_warring_state_modifier_trigger: "[Concept('location', 'Місцевість')|e] належить #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайській#!#! [Concept('culture_group', 'культурній групі')|e]. Його [Concept('owner', 'власник')|e] успішно підкорив #ONCLICK:COUNTRY,[GetCountry('KOR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('KOR').Custom('CL_tt')],X [GetCountry('KOR').Custom('CL_ACC')|L]#!#! в ході події «$flavor_mch.10.title$»."
  mch_lifan_yuan_modifier_trigger: "[Concept('dominant_culture', 'Домінуюча культура')|e] в [Concept('location', 'місцевості')|e] не визнана і не є частиною #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#! або #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженської#!#! [Concept('culture_group', 'культурної групи')|e]"
  unlocked_warring_state: "Доступна державна реформа «$warring_state$»"
  map_QNG: "Жовта $QNG$"
  flavor_mch.6.title: "[ShowLawNameWithNoTooltip('mch_queue_hair')]"
  flavor_mch.6.desc: "Коли #L [ROOT.GetCountry.GetAdjective|l]а#! еліта взяла в свої руки кермо правління #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединною Країною#!#!, при владі опинилася #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженська#!#! меншість. [target_character.GetName] побоюється #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#! більшості, оскільки вважає, що падіння династій [GetCountry('YUA').GetName] і Цзінь — прямий наслідок асиміляції. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] підтримує #TOOLTIP:POLICY,enforce_queue_hair,X #L насадження біаньцзи#!#!, хоча багато придворних стверджують, що #TOOLTIP:POLICY,queue_hair_status_quo,X #L носіння ханьфу#!#! — відмінний знак чжурчженів."
  flavor_mch.6.a: "Нехай усі чоловіки носять бянь-фа."
  flavor_mch.6.b: "Вони просто пристосовувалися до обставин!"
  flavor_mch.7.title: "Тигр-дракон [target_character.GetNameWithNoTooltip]"
  flavor_mch.7.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'виграла', 'виграв' )] безліч битв і [Select_CString(target_character.IsFemale, 'отримала', 'отримав' )] прізвисько «[ShowTraitName('dragon_tiger')]». За [Select_CString(target_character.IsFemale, 'такої правительки', 'такого правителя' )][ROOT.GetCountry.GetLongName] процвітатиме."
  flavor_mch.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.8.title: "Вісім знамен Монголії"
  flavor_mch.8.desc: "[ROOT.GetCountry.GetName] постійно приростає новими землями. Тепер до складу нашої країни входить не тільки #TOOLTIP:REGION,manchuria_region,X #L Маньчжурія#!#!, а й частина #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!. Багато народів, що служили в #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! військах, переходять до нашого війська. Спочатку нам вдавалося інтегрувати їх, але останнім часом стало зрозуміло, що нам доведеться збільшити кількість знамен заради #L [target_location.GetDominantCulture.GetName|l]их#! солдатів. У [target_location.Custom('LR_PREP')|l] [target_location.GetName] ми сформували «$flavor_mch.8.title$», якими керує [target_character.GetName]."
  flavor_mch.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.9.title: "Вісім знамен Китаю"
  flavor_mch.9.desc: "Заколотники створюють свої штаби по всьому #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!, але дезертирство #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! генералів — вірна ознака того, що вони приречені на провал. У міру розширення нашої країни все більше китайських підданих приєднуються до нашого війська. Їх так багато, що нам довелося збільшити кількість знамен. У [target_location.Custom('LR_PREP')|l] [target_location.GetName] ми сформували «$flavor_mch.9.title$», якими керує [target_character.GetName]."
  flavor_mch.9.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.10.title: "Майбутнє Кореї"
  flavor_mch.10.desc: "Протягом століть країна [target_country.GetLongName] була вірним ленником #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединної Країни#!#!. Однак, схоже, [target_country.GetAdjectiveWithNoTooltip|l]і влада не вважає нас гідними претендентами на Небесний мандат і відмовляється стати слухняним #TOOLTIP:SUBJECT_TYPE,tributary,X #L данником#!#! [ROOT.GetCountry.Custom('CL_GEN')]. Наш план може провалитися, якщо нам не вдасться збити з них пиху."
  flavor_mch.10.a: "Нехай схиляться перед нами!"
  flavor_mch.10.b: "Одного дня вони підкоряться нам."
  mch_benefits_of_subjugating_korea: "У нас є 25 років на те, щоб зробити #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! своїм ленником. Впоравшись із цим, ми отримаємо додаткові переваги від #TOOLTIP:GOVERNMENT_REFORM,warring_state,X #L воюючої країни#!#!."
  flavor_mch.11.success_title: "Падіння [target_country.Custom('CL_GEN')]"
  flavor_mch.11.failure_title: "[target_country.GetNameWithNoTooltip] стверджує свою перевагу"
  flavor_mch.11.success_desc: "Ми успішно підкорили собі [target_country.Custom('CL_ACC')]#!#! і довели, що гідні стояти на чолі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединної Країни#!#!. Інші непокірні монархи схиляють коліна перед нашою силою."
  flavor_mch.11.failure_desc: "Ми не змогли довести #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! свою могутність і стали посміховиськом для #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайського#!#! населення, а [target_country.GetCapital.GetName] залишається у владі чиновників з [target_country.Custom('CL_GEN')]."
  flavor_mch.11.a: "Воістину історична подія."
  mch_improve_warring_state_gov_reform: "Ми отримаємо додаткові переваги від #TOOLTIP:GOVERNMENT_REFORM,warring_state,X #L воюючої країни#!#!."
  flavor_mch.12.title: "Ліфаньюань"
  flavor_mch.12.desc: "Управління землями, які розташовані за межами #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайської#!#! та #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженської#!#! національних юрисдикцій, перетворилося на справжній головний біль. Нам пропонують заснувати #TOOLTIP:GOVERNMENT_REFORM,lifan_yuan,X #L Ліфаньюань#!#! — службу, яка підвищить доходи країни з цих земель і боротиметься з сепаратистськими настроями."
  flavor_mch.12.a: "Чудова пропозиція!"
  flavor_mch.12.b: "Ми не можемо дозволити собі такі витрати."
  flavor_mch.13.title: "[target_location.GetNameWithNoTooltip] розвивається"
  flavor_mch.13.desc: "[target_character.GetName] мріє завоювати саме серце #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединної Країни#!#!, але поки думати про це рано: на даний момент [ROOT.GetCountry.GetName] не в змозі захопити #TOOLTIP:SUB_CONTINENT,china,X #L Китай#!#!. Зараз найрозумніше рішення — посилити [ROOT.GetCountry.Custom('rank_ru_ACC')], побудувавши нове місто в місцевості [target_location.GetName]."
  flavor_mch.13.a: "Приступимо до будівництва."
  flavor_mch.13.b: "Воно того не варте."
  flavor_mch.14.title: "Столиця, гідна #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!"
  flavor_mch.14.desc: "Нещодавнє приєднання [target_location.Custom('LR_GEN')|l] [target_location.GetName] викликало велике піднесення, адже це не просто [target_location.GetRank.GetName|l], а колишня столиця багатьох впливових династій. Якщо [ROOT.GetCountry.GetName] стане новою імперією #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!, [target_location.GetNameWithNoTooltip] буде найбільш підходящим місцем для нової столиці."
  flavor_mch.14.a: "Хай буде так."
  flavor_mch.14.b: "Не будемо чіплятися за минуле."
  flavor_mch.15.title: "[ShowPolicyNameWithNoTooltip('mch_green_standard_army')]"
  flavor_mch.15.desc: "Ми продовжуємо відвойовувати #TOOLTIP:SUB_CONTINENT,china,X #L Китай#!#!, і під вісьмома #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайськими#!#! прапорами вже не вмістити всіх новобранців, охочих вступити до лав #L [ROOT.GetCountry.GetAdjective|l]ого#! війська. Не можна відваджувати їх від пунктів призову, інакше ці люди поповнять лави заколотників, що дошкуляють нашій країні. Краще заснуємо #TOOLTIP:POLICY,mch_green_standard_army,X #L Військо Зеленого прапора#!#!, вступивши до якого, ці новобранці допоможуть нам охороняти порядок у завойованих землях #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!."
  flavor_mch.15.a: "Зараз же заснуємо новий прапор!"
  flavor_mch.15.b: "Зараз нам це не по кишені."
  flavor_mch.16.title: "За заповітами колишнього режиму"
  flavor_mch.16.desc: "Ми лише одна з гілок у сімейному дереві божественних імператорів #TOOLTIP:SUB_CONTINENT,china,X #L Китаю#!#!. Різні династії до нас вже заснували ефективні органи управління, щоб зберегти єдність величезної #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#!. Чому б не перейняти цю політику? Так ми станемо більш #TOOLTIP:SOCIETAL_VALUE,sinicized_vs_unsinicized,X #L китаїзованими#!#!, зате збережемо спадкоємність і зміцнимо свою владу в очах простого люду."
  flavor_mch.16.a: "Потрібно перейняти ці установи."
  flavor_mch.16.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('tribes_estate')|l] бачать, що ми їм благоволимо."
  unlock_chinese_language_reforms: "Ця дія відкриє [Concept('government_reforms', 'державну реформу')|e] «[ShowGovernmentReformName('three_departments_system')]»."
  MCH_conditional_benefit: "Якщо ми не встановимо [Concept('government_reforms', 'державну реформу')|e] «[ShowGovernmentReformName('three_departments_system')]», [ShowEstatePrivilegeName('mch_tribal_favor')|l] дасть додаткові переваги."
  flavor_mch.17.title: "Проголошення імперії $QNG$"
  flavor_mch.17.desc: "Ми нарешті змогли встановити контроль над Небесним мандатом і #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединною Країною#!#!. Згідно зі звичаєм, ми повинні дати ім'я новій династії, а [target_character.GetName] стане Сином Неба. Ми нарекли династію ім'ям $QNG$, що означає «ясна», «чиста». Однак наш символ — золото — залишився колишнім, як і наш золотий прапор."
  flavor_mch.17.a: "Хай засяє золото."
  flavor_mch.17.b: "Нам це ні до чого!"
  flavor_mch.18.title: "[GetCountry('MCH').GetAdjectiveWithNoTooltip]е письмо"
  flavor_mch.18.desc: "У минулі часи для #L [ShowLanguageName('jurchen_language')|l]ої#! мови використовувалася особлива писемність, створена в добу Цзінь на основі киданського письма. Однак вона вийшла з ужитку після краху цієї династії, і ми були змушені записувати свою історію набагато менш звичними способами. Тому [target_character.GetName] своїм указом [Select_CString(target_character.IsFemale,'веліла', 'велів')] створити нове #L [ROOT.GetCountry.GetAdjective|l]е#! письмо, видозмінивши #L [ShowLanguageName('mongolian_language')|l]у#! писемність під наші потреби."
  flavor_mch.18.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mch.19.title: "Нова самобутність"
  flavor_mch.19.desc: "Багато хто з нас пишається #TOOLTIP:CULTUREGROUP,jurchen_group,X #L чжурчженським#!#! минулим. Однак для створення #L [ROOT.GetCountry.GetAdjective|l]ої#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної Країни#!#! той факт, що ми колись були #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайськими#!#! підданими, є скоріше принизливим. Тому нам пропонують забути про минуле і оголосити себе Маньчжурією."
  flavor_mch.19.a: "[ShowCultureNameWithNoTooltip('jurchen_culture')]е минуле підриває нашу легітимність."
  flavor_mch.19.b: "Ми не будемо соромитися своїх традицій."