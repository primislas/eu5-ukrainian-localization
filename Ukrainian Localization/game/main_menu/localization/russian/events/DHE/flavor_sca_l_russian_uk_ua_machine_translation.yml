l_russian:
  flavor_sca.1.title: "Об'єднання Скандинавії"
  flavor_sca.1.desc: "Вперше в історії всі землі #TOOLTIP:REGION,scandinavian_region,X #L Скандинавії#!#! об'єдналися під владою одного суверена. Ця велика подія знаменує нову добу та утверджує нас як воістину грізну європейську країну. Згуртувавшись, ми не лише зміцнили свій культурний та політичний вплив, а й значно збільшили свою дипломатичну вагу."
  flavor_sca.1.a: "Тріумфальний успіх!"
  flavor_sca.1.historical_info: "У реальній історії Скандинавія так і не стала єдиною централізованою країною. Усі спроби об'єднати її, включно з Кальмарською унією кінця XIV - початку XV століть та зусилля Шведської імперії XVII століття, виявилися недовговічними та неефективними."