l_russian:
  flavor_grm.1.title: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale,'загинула', 'загинув')]"
  flavor_grm.1.desc: "Сьогодні [Select_CString(target_character.IsFemale,'відійшла у вічність одна', 'відійшов у вічність один')] з найвидатніших діячів нашого народу та [Select_CString(target_character.IsFemale,'засновниця', 'засновник')] нашої країни. Під час [Select_CString(target_character.IsFemale,'її', 'його')] правління нам вдалося поширити свій вплив на значну частину #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! і підкорити собі багато сусідніх країн. Поза всяким сумнівом, після [Select_CString(target_character.IsFemale,'її', 'його')] смерті ці ленники спробують посягнути на багатства нашої країни, що може призвести до зростання невдоволення та народних повстань…"
  flavor_grm.1.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  flavor_grm.1.b: "Ми не здамося без бою!"
  flavor_grm.1.historical_info: "Бейлик Герміян був заснований у XIV столітті Якубом I, який зумів завоювати та взяти під контроль багато сусідніх земель. За сорок років він підкорив собі Айдинідів, Саруханідів та Карасидів, а також багаторазово вступав у конфлікти з османами. Після смерті Якуба I васали скористалися ослабленим становищем бейлика і оголосили про свою незалежність."