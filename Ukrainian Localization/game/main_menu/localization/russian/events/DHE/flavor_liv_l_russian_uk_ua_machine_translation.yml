l_russian:
  flavor_liv.1.title: "[target_government_reform.GetNameWithNoTooltip]"
  flavor_liv.1.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] поступово втрачає владу, тоді як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], навпаки, лише посилюють свій вплив. Щоб уникнути політичної кризи, є спосіб, який раніше здавався багатьом неприпустимим, а саме — [target_government_reform.GetName|l]. Подібна міра дозволить нам об'єднатися зі своїми васалами в конфедерацію. При цьому єпископи та васали, що володіють землею, отримають певні повноваження в [ROOT.GetCountry.Custom('parliament_ua_PREP')|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, що також допоможе запобігти боротьбі за владу."
  flavor_liv.1.historical_info: "Зазнавши важких втрат у Битві під Вількомиром 1435 року, Лівонський орден втратив значну частину свого впливу. 4 грудня того ж року він підписав договір, що заснував Лівонську конфедерацію та надав численні привілеї різним єпископам та іншим васалам."
  flavor_liv.1.a: "Доведеться піддатися."
  flavor_liv.1.b: "Якщо вони так хочуть правити, нехай знайдуть для цього іншу країну."
  flavor_liv.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_liv.2.desc: "Ходять чутки, що [Select_CString(target_character.IsFemale,'деяка', 'деякий')] #L [target_character.GetCulture.GetName|l][Select_CString(target_character.IsFemale,'а', 'ий')]#! [Select_CString(target_character.IsFemale,'священниця', 'священник')] на ім'я [target_character.GetName] має безліч талантів. Бувши родом з міста [target_character.GetBirthLocation.GetName], [Select_CString(target_character.IsFemale,'вона також встигла', 'він також встиг')] проявити себе як [target_character.GetArtistType.GetName|l]. У зв'язку з цим придворні вважають, що, окрім своєї проповідницької діяльності, [Select_CString(target_character.IsFemale,'вона могла', 'він міг')] би попрацювати над #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хронікою#!#! #TOOLTIP:AREA,baltic_area,X #L балтійського#!#! регіону."
  flavor_liv.2.a: "Виділити кошти на створення хроніки."
  flavor_liv.2.b: "Ми не потребуємо [Select_CString(target_character.IsFemale,'її', 'його')] послуг."
  flavor_liv.3.title: "Хроніка Лівонії завершена"
  flavor_liv.3.desc: "[target_character.GetName] нарешті [Select_CString(target_character.IsFemale,'закінчила', 'закінчив')] роботу над своєю #TOOLTIP:WORK_OF_ART_TYPE,chronicle,X #L хронікою#!#!, що отримала назву [target_work_of_art.GetName]. У цьому обширному творі описана історія #TOOLTIP:AREA,baltic_area,X #L Балтики#!#! від створення [GetCountry('LIV').Custom('longname_ua_GEN')] до переходу регіону під вплив #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Однак [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а влада представлена там у вельми поганому світлі, що підриває нашу легітимність та ображає аристократів, що володіють цими землями."
  flavor_liv.3.a: "Така критика цілком допустима."
  flavor_liv.3.b: "Виженемо [Select_CString(target_character.IsFemale,'її', 'його')] та заборонимо публікувати [Select_CString(target_character.IsFemale,'її', 'його')] роботи!"