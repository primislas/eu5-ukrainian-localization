l_russian:
  flavor_plc.1.title: "Орден Святого Духа"
  flavor_plc.1.desc: "Після того як орден Святого Михаїла втратив свій престиж, у #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_PREP')|L]#!#! з'явилася необхідність заснувати новий королівський орден, до якого входитимуть лише правителі та найвпливовіші аристократи країни.\n\nНовий орден, названий на честь Святого Духа, складатиметься з восьми духовних осіб, чотирьох членів адміністрації та сотні лицарів з числа аристократів. При цьому члени ордену будуть зобов'язані суворо дотримуватися статуту та бути правовірними католиками. Належність до такого благородного ордену безперечно стане для нас найвищим привілеєм."
  flavor_plc.1.a: "Заснуємо орден."
  flavor_plc.1.b: "Нам не потрібні ані регалії, ані пишні титули!"
  flavor_plc.1.historical_info: "Орден Святого Духа з'явився 31 грудня 1578 року за указом короля Франції Генріха III, який на той час обіймав польський трон. Цей орден мав повернути престиж, втрачений орденом Святого Михаїла під час Гугенотських війн. Він багато в чому нагадував орден, створений у 1353 році Людовиком Анжуйським, який Генріх III бачив у Венеції. Кавалерами нового ордену, присвяченого Святому Духу, могли бути лише принци та представники вищої аристократії. Орден Святого Духа та орден Святого Михаїла становили єдину систему, причому останній тепер призначався для підданих менш високого походження. Так Генріх III хотів вшанувати свої сходження на престоли Польщі та Франції, що припадали на День Святої Трійці, та відродити історичний Орден Вузла, заснований у XIV столітті."
  flavor_plc.2.title: "Морська комісія"
  flavor_plc.2.desc: "Ми ніколи не тягнулися до морів. Протягом більшої частини нашої історії прибережні місцевості або знаходилися на околицях нашої країни, або й зовсім були під контролем іноземних країн. Однак часи змінюються, і наші амбіції постійно зростають. Зокрема, ми могли б зміцнити свій вплив на #TOOLTIP:AREA,eastern_baltic_sea,X #L Східному Балтійському морі#!#!, але для цього спочатку треба створити потужний військовий флот."
  flavor_plc.2.historical_info: "Морська комісія, або #italic Komisja Morska#!, була створена королем Сигізмундом II Августом 24 травня 1568 року. Ця установа, розташована в Данцигу, була першим польським адміралтейством: вона керувала флотилією каперів, стежила за дисципліною серед моряків і віддавала накази флоту. Морська комісія проіснувала лише до 1572 року, але пізніше ідея подібного органу знову втілилася в 1626 році у вигляді #italic Komisja Okrętów Królewskich#! — «Комісії королівських суден»."
  flavor_plc.2.a: "Заснуємо комісію."
  flavor_plc.2.b: "Краще зосередимося на реформуванні наших земель."
  STATIC_MODIFIER_NAME_plc_start_of_a_navy: "Зародження флоту"
  flavor_plc.3.title: "[plc_arend_dickmann_scope.GetNameWithNoTooltip]"
  flavor_plc.3.desc: "Нещодавно на службу в наш флот надійшов купець #L [plc_arend_dickmann_scope.GetCulture.GetName|l]ого#! походження на ім'я [plc_arend_dickmann_scope.GetName], який вже встиг відзначитися своїми знаннями та навичками на тлі інших моряків. Він швидко просунувся по службовій драбині, і тепер морська комісія розглядає питання про його призначення на посаду адмірала."
  flavor_plc.3.a: "Нехай [plc_arend_dickmann_scope.GetNameWithNoTooltip] стане нашим адміралом."
  flavor_plc.3.b: "Від нього буде більше користі як від простого моряка."
  flavor_plc.4.title: "Сарматизм"
  flavor_plc.4.desc: "Нещодавно [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] почали масово обговорювати вельми цікаву ідею, яку вперше висловив історик [GetCharacter('jan_dlugosz').GetName] ще в XV столітті. Якщо вірити його дослідженням, #L [ROOT.GetCountry.GetAdjective|l]ий#! народ походить від сарматів, які в давнину населяли #TOOLTIP:REGION,steppes_region,X #L степи#!#!. Ця теорія отримала назву «[ShowPolicyName('plc_sarmatism')|l]» і вже встигла повністю захопити уми шляхтичів, ставши невід'ємною частиною їхньої соціальної ідентичності."
  flavor_plc.4.a: "Вражаюче!"
  flavor_plc.4.b: "Це цікава ідея, але не більше того."
  flavor_plc.5.title: "Обіди по четвергах"
  flavor_plc.5.desc: "Настання доби #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#! у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! вже принесло свої плоди. На прохання одного з високопоставлених шляхтичів [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'почала', 'почав')] проводити в [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому палаці регулярні зустрічі з видатними мислителями нашої країни. Ці заходи є не просто офіційними обідами, а скоріше чимось на зразок #L [GetCountry('FRA').GetAdjective|l]их#! салонів, які й послужили для них натхненням."
  flavor_plc.5.historical_info: "Обідами по четвергах називалися зустрічі польської інтелігенції з королем Станіславом Августом Понятовським, що проводилися в королівських резиденціях з 1770 по 1784 рік. Серед учасників зустрічей були видатні філософи, письменники та політики, які обговорювали літературу та суспільні ідеали."
  flavor_plc.5.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_plc.6.title: "[ShowPolicyNameWithNoTooltip('order_of_the_white_eagle_policy')]"
  flavor_plc.6.desc: "Надихнувшись прикладом сусідніх країн, [target_character.GetName] пропонує заснувати наш власний орден, який слугуватиме найвищою нагородою для придворних і дозволить нам стати в один ряд з іншими великими державами #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Однак створення подібного ордену потягне за собою не лише фінансові, а й політичні витрати: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] напевно вважатимуть це спробою підірвати їхній вплив, оскільки нова нагорода вигідно виділятиме одних дворян на тлі інших."
  flavor_plc.6.historical_info: "Орден Білого орла був заснований 1 листопада 1705 року королем Речі Посполитої Августом II Сильним за зразком французького ордену Святого Духа та російського ордену Святого Андрія Первозванного. Спочатку кавалерами ордену ставали лише деякі обрані, але наступник Августа, король Август III, жалував цю нагороду понад три сотні разів."
  flavor_plc.6.a: "Заснуємо орден!"
  flavor_plc.6.b: "Останнє, що нам потрібно, — це розгнівані [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_plc.7.title: "Коледжі для знаті"
  flavor_plc.7.desc: "Нещодавно впливове #L [root_religion.GetAdjective|l]е#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] заснувало в місті [target_capital.GetName] кілька коледжів та університетів, названих #italic Collegium Nobilium#!, або шляхетськими колегіями. Як випливає з назви, ці заклади призначені головним чином для навчання представників вищої знаті."
  flavor_plc.7.a: "Безперечно, ми підтримаємо цю ідею."
  flavor_plc.7.b: "Вони лише намагаються збагатитися."
  STATIC_MODIFIER_NAME_pol_excellent_noble_education: "Чудова освіта для знаті"
  flavor_plc.8.title: "Комісія національної освіти"
  flavor_plc.8.desc: "У [ROOT.GetCountry.Custom('parliament_ru_PREP')|l] вважають, що нам потрібна [ShowModifier('plc_polish_commission')|l] з питань освіти в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'підтримала', 'підтримав')] цю ініціативу, багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] налаштовані вельми скептично."
  flavor_plc.8.historical_info: "#italic Komisja Edukacji Narodowej#!, або Комісія національної освіти, була створена 14 жовтня 1773 року для управління системою навчання в Речі Посполитій після скасування ордену єзуїтів. Ця установа не тільки перейняла під контроль єзуїтські коледжі, а й розробила нову навчальну програму, а також зробила освіту більш доступною для широких верств населення."
  flavor_plc.8.a: "Заснуємо комісію."
  flavor_plc.8.b: "Краще не злити [ROOT.GetCountry.Custom('parliament_ru_ACC')|l]."
  STATIC_MODIFIER_NAME_plc_polish_commission: "Комісія національної освіти"
  flavor_plc.9.title: "[lisowczycy_scope.GetNameWithNoTooltip]"
  flavor_plc.9.desc: "Солдат на ім'я [target_character.GetName] з дрібного шляхетського роду [Select_CString(target_character.IsFemale,'вирішила', 'вирішив')] заявити про себе і [Select_CString(target_character.IsFemale,'створила', 'створив')] власний загін найманців, відомий як [lisowczycy_scope.GetName|l]. Шкода, що така [Select_CString(target_character.IsFemale,'амбітна воєначальниця не приєдналася', 'амбітний воєначальник не приєднався')] до наших регулярних військ. Втім, ми можемо найняти [Select_CString(target_character.IsFemale,'її', 'його')] бійців, щоб вони не приєдналися до ворогів."
  flavor_plc.9.a: "Чим більше у нас солдатів, тим краще."
  flavor_plc.9.b: "Зараз невідповідний час."
  flavor_plc.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_plc.10.desc: "Нещодавно [Select_CString(target_character.IsFemale,'одна з представниць', 'один з представників')] духовенства на ім'я [target_character.GetName] [Select_CString(target_character.IsFemale,'набула', 'набув')] великої відомості в [ROOT.GetCountry.Custom('rank_ru_PREP')]. Завдяки своїм полум'яним виступам та проповідям у [ROOT.GetCountry.Custom('parliament_ru_PREP')|l] [Select_CString(target_character.IsFemale,'вона стала', 'він став')] вельми впливовою фігурою в політиці, і багато державних діячів почали до [Select_CString(target_character.IsFemale,'неї', 'нього')] прислухатися."
  flavor_plc.10.a: "Потрібно приділяти цим проповідям найпильнішу увагу."
  flavor_plc.10.b: "Не будемо звертати на [Select_CString(target_character.IsFemale,'неї', 'нього')] уваги."
  every_non_catholic_pop_loses_satisfaction: "Кожна [Concept('pop', 'група населення')|e], що не сповідує #L [skarga_religion.GetAdjective|l]ої#! [Concept('religion', 'релігії')|e], втрачає [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]."
  flavor_plc.11.title: "[target_character.GetNameWithNoTooltip]"
  flavor_plc.11.desc: "Члени #L [ROOT.GetCountry.GetAdjective|l]ого#! двору вражені військовими успіхами, які демонструє [target_character.GetName]. Ще недавно багато хто в [Select_CString(target_character.IsFemale,'ній', 'ньому')] сумнівався, проте звістки про останню перемогу змусили їх переглянути свою думку. Тепер в уряді все частіше лунають заклики призначити [Select_CString(target_character.IsFemale,'її', 'його')] #italic гетьманом#!."
  flavor_plc.11.a: "#italic O, quam dulce et decorum est pro patria mori.#!"
  flavor_plc.11.b: "[Select_CString(target_character.IsFemale,'Її', 'Його')] амбіції загрожують нашій владі."
  flavor_plc.12.title: "Бібліотека Залуських"
  flavor_plc.12.desc: "У наших архівах накопичилася величезна кількість літературних творів вітчизняних та зарубіжних письменників. У зв'язку з цим [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] пропонує заснувати в місті [target_location.GetName] велику #TOOLTIP:BUILDING_TYPE,library,X #L бібліотеку#!#!, де ці рукописи можна буде зберігати належним чином. Ми могли б підтримати цю ініціативу та виділити на створення бібліотеки додаткові кошти."
  flavor_plc.12.a: "Це буде національна бібліотека!"
  flavor_plc.12.b: "Виділимо кошти на її заснування."
  flavor_plc.12.c: "Ці гроші більше знадобляться для знаті."
  STATIC_MODIFIER_NAME_plc_zaluski_library_modifier: "Бібліотека Залуських"
  flavor_plc.13.title: "Лицарська школа"
  flavor_plc.13.desc: "Нещодавно члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] схвалили створення нової престижної школи в місті [target_location.GetName]. Будівництво йде за планом, але тепер виникло питання, чи буде ця установа доступна лише вищим верствам суспільства, як це прийнято в багатьох навчальних закладах, чи нам слід відкрити її двері представникам усіх станів."
  flavor_plc.13.a: "Там навчатимуться винятково [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  flavor_plc.13.b: "Нехай школа буде відкрита для всіх."
  flavor_plc.13.c: "Нас мало турбують рішення [ROOT.GetCountry.Custom('parliament_ru_GEN')|l]."
  STATIC_MODIFIER_NAME_plc_school_of_chivalry_modifier: "Кадетський корпус"
  STATIC_MODIFIER_NAME_plc_school_of_chivalry_burghers_modifier: "Кадетський корпус для всіх"
  flavor_plc.14.title: "Гадяцький договір"
  flavor_plc.14.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')] набувають все більшого впливу і в будь-який момент можуть підняти повстання проти нашої влади. Через це нам часто доводиться йти їм на поступки, однак нещодавно їхні вимоги вийшли за рамки пристойності: вони хочуть, щоб ми прийняли #TOOLTIP:RELIGION,$orthodox_tt$,X #L православних#!#! #TOOLTIP:CULTURE,$ruthenian_tt$,X #L русинів#!#! до складу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У такому випадку вони формально стануть рівноправними членами союзу, але на практиці займуть у ньому панівне становище."
  flavor_plc.14.a: "Пропозиція невтішна, але ми її схвалимо."
  flavor_plc.14.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('cossacks_estate')] нам не указ. Жодних переговорів!"
  every_cossack_pop: "Кожна [Concept('pop', 'група населення')|e], що належить до стану «[ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')]», втратить [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]."
  plc_name_will_change: "Назва нашої країни зміниться на «$PLC_ruthenian$»."
  flavor_plc.15.title: "[target_rebel.GetNameWithNoTooltip]"
  flavor_plc.15.desc: "Деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] сформували #italic конфедерацію#!, яку [Select_CString(target_character.IsFemale,'очолила', 'очолив')] [target_character.GetName]. За їхніми словами, вони лише прагнуть відстояти свої привілеї від посягань з боку [Select_CString(target_character.IsFemale,'нашої правительки', 'нашого правителя')]. Якщо ми не виконаємо їхні вимоги, [target_rebel.GetName|l] може розпочати повномасштабне повстання."
  flavor_plc.15.historical_info: "#italic Конфедерація#! — союз, організований одним із станів Речі Посполитої. Його метою було посилення впливу на королівську владу та захист станових привілеїв. Зрада короні виправдовувалася принципом #italic ius resistendi#! — правом боротися зі зловживаннями уряду."
  flavor_plc.15.a: "Битимемося з ними."
  flavor_plc.15.b: "Виконаємо їхні вимоги."
  plc_confederation_rebelname: "Конфедерація"
  flavor_plc.16.title: "[target_character.GetNameWithNoTooltip] оголошує рокош"
  flavor_plc.16.desc: "Після того як ми відмовилися виконувати їхні вимоги, бунтівні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] підняли проти нас збройне повстання, яке [Select_CString(target_character.IsFemale,'очолила', 'очолив')] [target_character.GetName]. Втім, тим гірше для них: їхня жалюгідна [target_rebel.GetName|l] не витримає натиску [ROOT.GetCountry.GetGovernment.GetAdjective|l]их військ!"
  flavor_plc.16.historical_info: "#italic Рокош#! — повстання шляхти в Речі Посполитій, метою якого були захист привілеїв знаті та обмеження абсолютної влади короля."
  flavor_plc.16.a: "Прокляті зрадники!"
  PLC_our_neighbors_rivals_enemies_have_been_notified: "Всі наші сусіди, [Concept('rivals', 'суперники')|e] та [Concept('enemies', 'вороги')|e] дізналися про заворушення в нашій країні."
  flavor_plc.17.title: "[target_rebel.GetNameWithNoTooltip]"
  flavor_plc.17.desc: "Непокірні [ROOT.GetCountry.GetGovernment.GetEstateName('cossacks_estate')|l] вирішили підняти повстання проти нашої законної влади. Війська заколотників очолює [target_character.GetName]. Заручившись підтримкою #L [ShowCultureName('crimean')|l]их#! татар, вони прагнуть домогтися незалежності — або, принаймні, нових привілеїв та збільшення реєстру козаків."
  flavor_plc.17.historical_info: "Повстання Хмельницького було одним із багатьох козацьких заколотів у Речі Посполитій, але виявилося одним із найуспішніших. Воно почалося 25 січня 1648 року, коли королівська варта напала на Запорозьку Січ. Бунт тривав 9 років до самої кончини Богдана Хмельницького. Втративши свого лідера, Січ почала переговори з Річчю Посполитою, що увінчалися укладенням Гадяцького договору."
  flavor_plc.17.a: "Ці зрадники нічого не отримають."
  plc_chmielnicki_uprising: "Повстання Хмельницького"
  flavor_plc.18.title: "[target_location.GetNameWithNoTooltip] — нова столиця?"
  flavor_plc.18.desc: "Утворення #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! змістило центр влади. Після об'єднання країн можна сміливо заявити, що [target_location.GetName] є одним із найважливіших володінь у [ROOT.GetCountry.Custom('rank_ru_PREP')|l]. Можливо, розумніше, якщо [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName|l] буде знаходитися там?\n\nЦю думку поділяють багато радників, оскільки [target_location.GetNameWithNoTooltip] вдало розташовується між нашими новонабутими та основними територіями навколо чинної столиці в [current_capital.Custom('LR_PREP')|l] [current_capital.GetName]."
  flavor_plc.18.historical_info: "За всю історію Королівства Польського його столицею здебільшого був Краків — там розташовувалася резиденція монарха та його двору. Однак після особистої унії з Литвою почало зростати значення Варшави. У 1569 році це місто стало місцем засідань Сейму, а через 4 роки було вирішено проводити тут вибори короля. З тих пір Варшава набирала все більшого впливу в порівнянні з Краковом, який залишався місцем коронації."
  flavor_plc.18.a: "Це цілком відповідає нашому високому становищу."
  flavor_plc.18.b: "Ми не будемо цього робити: [current_capital.GetNameWithNoTooltip] — надто багате місто."
  STATIC_MODIFIER_NAME_plc_capital_change_modifier: "Зміна столиці"
  flavor_plc.19.title: "[ShowEstatePrivilegeNameWithNoTooltip('liberum_veto')]"
  flavor_plc.19.desc: "Усвідомлюючи, що уряд багато в чому покладається на їхню підтримку, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] пішли на немислиму підлість і вдалися до шантажу. Тепер вони вимагають, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'дарувала', 'дарував')] їм [ShowEstatePrivilegeName('liberum_veto')|l] — право на припинення обговорення будь-якого питання в сеймі."
  flavor_plc.19.a: "Надати привілеї."
  flavor_plc.19.b: "Ми не піддамося на шантаж!"
  STATIC_MODIFIER_NAME_plc_blackmail_of_the_nobles: "Невиконання обов'язків"
  plc_take_the_privilege_to_remove_the_modifier: "Модифікатор «[ShowModifier('plc_blackmail_of_the_nobles')]» можна прибрати, дарувавши дворянам [Concept('privilege', 'привілей')|e] «[ShowEstatePrivilegeName('liberum_veto')]»."
  flavor_plc.20.title: "[ShowEstatePrivilegeNameWithNoTooltip('golden_liberty')]"
  flavor_plc.20.desc: "Надання знаті різних привілеїв призвело до створення воістину унікального уряду, в якому [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] фактично володіють абсолютною владою. Якщо їх не влаштовує який-небудь законопроєкт, вони не замислюючись накладають на нього [ShowEstatePrivilegeName('liberum_veto')|l]. Крім того, відповідно до #TOOLTIP:ESTATE_PRIVILEGE,privilege_of_koszyce,X #L Кошицького привілею#!#!, вони звільняються від сплати більшої частини податків. При цьому обмежити їхній вплив не видається можливим через принцип [ShowEstatePrivilegeName('nihil_novi')|l], що забороняє сейму ухвалювати нові закони без схвалення знаті. На довершення всього, під час коронації кожен [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зобов'язаний підписати [ShowEstatePrivilegeName('pacta_conventa')] — угоду про непорушність усіх наданих дворянам привілеїв."
  flavor_plc.20.a: "Ми створили ідеальний уряд."
  flavor_plc.20.b: "Наш уряд — справжнє лихо."
  STATIC_MODIFIER_NAME_plc_strive_for_reform: "Жага реформ"
  plc_as_long_as_modifier_is_active_revoking_privileges_will_be_easier: "Поки діє модифікатор «[ShowModifier('plc_strive_for_reform')]», для скасування [Concept('privileges', 'привілеїв')|e] «[ShowEstatePrivilegeName('golden_liberty')]», «[ShowEstatePrivilegeName('liberum_veto')]», «[ShowEstatePrivilegeName('pacta_conventa')]», «[ShowEstatePrivilegeName('privilege_of_koszyce')]», «[ShowEstatePrivilegeName('nihil_novi')]» та «[ShowEstatePrivilegeName('nieszawa_privileges')]» не буде жодних вимог."
  flavor_plc.1000.title: "Православні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] вимагають рівних прав"
  flavor_plc.1000.desc: "Протягом багатьох років #L [ROOT.GetCountry.GetReligion.GetAdjective|l]і#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отримували безліч привілеїв, які, втім, часто не стосувалися їхніх #L [target_religion.GetAdjective|l]их#! товаришів. Останні незадоволені таким станом справ і вважають, що їхні права порушуються. З огляду на це вони звернулися до уряду з проханням поширити на них дію низки привілеїв. Їхній запит цілком зрозумілий, але дивно інше: [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] підтримують своїх знатних побратимів, незважаючи на релігійні розбіжності."
  flavor_plc.1000.a: "Надати привілеї."
  flavor_plc.1000.b: "Відмовити в проханні."
  plc_required_for_further_events: "Модифікатор «[ShowEstatePrivilegeName('plc_empower_orthodox_nobility')]» необхідний для доступу до [Concept('events', 'подій')|e], пов'язаних із Берестейською унією."
  every_noble_pop_orthodox_loses_20_satisfaction: "#TOOLTIP:RELIGION,$orthodox_tt$,X #L Православні#!#! [ShowPopTypeName('nobles')|l] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]."
  flavor_plc.1001.title: "Візит патріарха"
  flavor_plc.1001.desc: "Нещодавно патріарх #TOOLTIP:LOCATION,constantinople,X #L Константинопольський#!#! відвідав велике #L [target_religion.GetAdjective|l]е#! місто [leader_of_the_kyiv_patriarchate.GetName], щоб зібрати кошти на священну справу церкви. Під час свого візиту він здебільшого ігнорував скарги жителів, які намагалися звернути його увагу на моральне розкладання місцевих священників.\n\nОчевидно, вони залишилися розчаровані поведінкою патріарха. Ми могли б скористатися цим і спробувати приєднати їх до своєї церкви."
  flavor_plc.1001.historical_info: "У 1588 році патріарх Константинопольський Єремія II відвідав Русь з метою збору коштів для своєї скарбниці та зміцнення власного політичного впливу. Під час цього візиту він надав Москві статус автокефального патріархату. Відвідуючи Русь, він скинув київського митрополита Онисифора та засудив багатоженство серед священників. Втім, місцеві єпископи все одно залишилися незадоволені: вони вважали, що Єремія занадто мало зробив для боротьби з падінням моралі в рутенському суспільстві."
  flavor_plc.1001.a: "[leader_of_the_kyiv_patriarchate.GetNameWithNoTooltip] отримує пропозицію об'єднатися"
  flavor_plc.1001.b: "Спробувати навернути #L [target_religion.GetAdjectiveWithNoTooltip|l]і#! громади в нашу віру."
  plc_revoking_empowered_orthodox_nobility_will_prevent: "Ослаблення #TOOLTIP:ESTATE_PRIVILEGE,plc_empower_orthodox_nobility,X #L влади православних аристократів#!#! унеможливить настання [Concept('events', 'подій')|e] у майбутньому."
  STATIC_MODIFIER_NAME_plc_diplomatic_efforts_to_unify_churches: "Об'єднання церков"
  flavor_plc.1002.title: "Зрадники серед нас"
  flavor_plc.1002.desc: "Багато #L [target_religion.GetAdjective|l]их#! [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] скептично ставляться до ідеї об'єднання наших церков. Більше того, вони активно чинять опір спробам встановити зв'язок між #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_INST')|L]#!#! та православною церквою. Нам вдалося запобігти посиленню церковного розколу, але навряд чи вдасться переконати непокірних єпископів приєднатися до унії."
  flavor_plc.1002.historical_info: "$flavor_plc.1001.historical_info$"
  flavor_plc.1002.a: "Дуже шкода."
  flavor_plc.1002.tooltip: "#L [target_religion.GetAdjective]і#! [Concept('pops', 'групи населення')|e] у кількох [Concept('provinces', 'провінціях')|e] ([SCOPE.GetLocalVariable('amount_of_locations_affected').GetValue|0-]) отримають [ROOT.ScriptValue('pop_satisfaction_severe_penalty')|%=+] до [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_plc.1003.title: "Союз [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_plc.1003.desc: "Наші зусилля з об'єднання руської #L [target_religion.GetAdjective|l]ої#! та #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! церков нарешті принесли свої плоди: сьогодні в [target_location.Custom('LR_PREP')|l] [target_location.GetName] було підписано угоду, відповідно до якої [target_io.GetName] починає роботу під нашим керівництвом. Досягти цього було непросто, оскільки багато єпископів противилися ідеї об'єднання. Особливо прикро, що ми зіткнулися з опором не лише всередині країни, а й з боку інших [target_religion.GetAdjectiveWithNoTooltip|l]их країн."
  flavor_plc.1003.historical_info: "Одним із наслідків невдалого візиту Єремії стало поновлення спроб об'єднання православної та католицької церков у Речі Посполитій. Зрештою кілька єпископів київської митрополії визнали папський авторитет і заснували Русинську уніатську церкву, яка звершувала богослужіння згідно зі східним обрядом, але формально була підпорядкована Риму. Створення цієї церкви було закріплено укладенням Берестейської унії 1596 року."
  flavor_plc.1003.a: "#italic Te Deum!#!"
  formed_union_of_brest: "Створено патріархат уніатської церкви"
  plc_patriarchate_tt: "Ми стали лідером [Concept('international_organization', 'міжнародного об'єднання')|e] «[target_io.GetName]»."
  plc_patriarchate_tt_no_scope: "Ми стали лідером [Concept('international_organization', 'міжнародного об'єднання')|e] «[GetInternationalOrganizationType('autocephalous_patriarchate').GetName]»."
  plc_revoked_privilege_will_destroy_io: "Ослаблення #TOOLTIP:ESTATE_PRIVILEGE,plc_empower_orthodox_nobility,X #L влади православних аристократів#!#! призведе до розпуску [Concept('international_organization', 'міжнародного об'єднання')|e]."
  flavor_plc.2000.title: "Могутні сусіди"
  flavor_plc.2000.desc: "Ми з усіх боків оточені могутнішими країнами. При цьому [ROOT.GetCountry.GetName] перебуває в занепаді та страждає від політичної роздробленості. На цьому тлі багато хто почав закликати до централізації країни, тоді як [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], більше заклопотані збереженням власних привілеїв, пропонують заручитися підтримкою #ONCLICK:COUNTRY,[other_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[other_country.Custom('CL_tt')],X [other_country.Custom('CL_GEN')|L]#!#!."
  flavor_plc.2000.historical_info: "Лівонська війна між Московським царством та коаліцією Речі Посполитої, Швеції та Данії тривала з 1558 по 1583 рік. Причиною цього конфлікту стало втручання Русі у внутрішні справи Лівонії, за яким послідували 25 років спроб приєднати цю територію. Однак зрештою сили коаліції здобули перемогу, після якої #italic Terra Mariana#! була поділена між данським Езелем, шведською Естляндією та польсько-литовським герцогством Курляндським і Семигальським."
  flavor_plc.2000.a: "Спробувати централізувати владу."
  flavor_plc.2000.b: "Звернутися по допомогу до [other_country.Custom('CL_DAT')]."
  flavor_plc.2001.title: "[livonian_scope.GetNameWithNoTooltip] пропонує нам союз"
  flavor_plc.2001.desc: "[livonian_scope.GetLongName] пропонує нам укласти союз. Сама по собі ця пропозиція нам мало цікава, однак, задіявши свій дипломатичний вплив, ми могли б змінити умови договору та змусити їх приєднатися до нас як васала. Але варто враховувати, що подібна угода може спровокувати втручання третьої країни."
  flavor_plc.2001.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2001.a: "Це чудова нагода."
  flavor_plc.2001.b: "Відхилити пропозицію."
  flavor_plc.2002.title: "[livonian_scope.GetNameWithNoTooltip] знаходить союзників"
  flavor_plc.2002.desc: "Сподіваючись забезпечити свою безпеку, правителі #ONCLICK:COUNTRY,[livonian_scope.Custom('CL_tt')] #TOOLTIP:COUNTRY,[livonian_scope.Custom('CL_tt')],X [livonian_scope.Custom('CL_GEN')|L]#!#! уклали васальний договір з #ONCLICK:COUNTRY,[nation_helping.Custom('CL_tt')] #TOOLTIP:COUNTRY,[nation_helping.Custom('CL_tt')],X [nation_helping.Custom('CL_INST')|L]#!#!. Цей союз загрожує нашим інтересам у #TOOLTIP:AREA,baltic_area,X #L балтійському#!#! регіоні — ми повинні негайно втрутитися, доки зв'язок між цими країнами не став надто міцним."
  flavor_plc.2002.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2002.a: "Ми повинні втрутитися."
  flavor_plc.2002.b: "Ми не в тому становищі, щоб вести війни."
  flavor_plc.2003.title: "$flavor_plc.2002.title$"
  flavor_plc.2003.desc: "$flavor_plc.2002.desc$"
  flavor_plc.2003.historical_info: "$flavor_plc.2000.historical_info$"
  flavor_plc.2003.a: "Це варто обміркувати."
  flavor_plc.2004.title: "Віленський договір"
  flavor_plc.2004.desc: "Майбутнє #TOOLTIP:AREA,baltic_area,X #L Балтики#!#! вельми туманне. Багато країн боролися за контроль над цими землями, але результат їхнього суперництва, як і раніше, не визначений, тому найближчим часом війни триватимуть. Хоча ці конфлікти помітно послабили наш вплив у регіоні, нам все ж вдалося зберегти владу над південно-західними місцевостями #TOOLTIP:PROVINCE_DEFINITION,courland_province,X #L Курляндії#!#! та #TOOLTIP:PROVINCE_DEFINITION,semigalia_province,X #L Семигалії#!#!. Можливо, варто створити на цій території нову васальну країну."
  flavor_plc.2004.historical_info: "#italic Віленський договір#! підтвердив перехід володінь Лівонського ордену під протекторат Речі Посполитої. Натомість лівонці отримали гарантії свободи віросповідання, збереження привілеїв та #italic індигенату#! — тобто, визнання за іноземними аристократами тих самих прав, що й за польським дворянством. Крім того, за цим договором лівонські землі на південь від річки Даугава були об'єднані у новостворене герцогство Курляндське і Семигальське, повновладним правителем якого став останній магістр Лівонського ордену Гохтард Кетлер, а на територіях на північ від Даугави було створено герцогство Лівонське (Задвінське), підпорядковане литовській юрисдикції."
  flavor_plc.2004.a: "Ми довіримо ці землі #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#!."
  flavor_plc.2004.b: "Цей договір для нас не має сили."
  STATIC_MODIFIER_NAME_plc_kurland_colonial_ambitions: "Колоніальні амбіції"