l_russian:
  flavor_eth.10.title: "[pero_covilha.GetNameWithNoTooltip]"
  flavor_eth.10.desc: "До наших берегів прибув дивний гість. Дивно, але він прибув не з боку #TOOLTIP:AREA,red_sea_area,X #L Червоного моря#!#!, яким зазвичай припливають чужоземці. Він стверджує, що прибув з півдня — цим шляхом, як нам відомо, не плавав ще ніхто. Він передає привіт від християнських монархів, але його молитви не схожі на те, що ми чули раніше. Як вчинити з ним?"
  flavor_eth.10.a: "Приймемо його з почестями і не випускатимемо з країни!"
  flavor_eth.10.a.desc: "Скоро прибудуть нові гості з #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_GEN')|L]#!#!."
  flavor_eth.10.b: "Вигнати його!"
  flavor_eth.20.title: "Посольство прибуло!"
  flavor_eth.20.desc: "[francisco_alvares.GetName], що представляє ту саму країну, що й попередній посланець, хоче обговорити можливості співпраці. Він стверджує, що шукає #italic пресвітера Іоанна#!, а наша країна, на його думку, саме та, що йому й потрібна. Чи слід нам почати переговори?"
  flavor_eth.20.a: "Нам потрібна допомога у війні проти [GetCountry('MAM').Custom('CL_GEN')]!"
  flavor_eth.20.tt: "Ми попросимо #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_ACC')|L]#!#! про військову допомогу"
  flavor_eth.20.b: "Як щодо культурного обміну?"
  flavor_eth.20.c: "Є якісь пропозиції щодо торгівлі?"
  flavor_eth.21.title: "Пресвітер Іоанн?"
  flavor_eth.21.desc: "[GetCountry('ETH').GetGovernment.GetRulerTitle] #ONCLICK:COUNTRY,[GetCountry('ETH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ETH').Custom('CL_tt')],X [GetCountry('ETH').Custom('CL_GEN')|L]#!#!, який може бути легендарним пресвітером Іоанном, а може й не бути, переживає важкі часи і просить нас про допомогу у визволенні своїх земель. Від нього прибув посланець на ім'я [scope_mattheus.GetName] — це християнин, але такий, яких ми ще не зустрічали. [scope_mattheus.GetNameWithNoTooltip] благає нас допомогти повернути законні володіння свого господаря, але над нами, як і раніше, нависає #L [GetCountry('MAM').GetAdjective|l]а#! загроза, тож це було б серйозним ризиком заради сумнівної вигоди. Яку відповідь отримає від нас [scope_mattheus.GetNameWithNoTooltip]?"
  flavor_eth.21.a: "Так хоче Бог!"
  opinion_military_aid: "Військова допомога"
  flavor_eth.21.b: "Мені здавалося, пресвітер Іоанн повинен допомагати нам, а не ми йому?"
  opinion_refused_military_aid: "Відмова надати допомогу"
  flavor_eth.22.title: "Допомога із заходу"
  flavor_eth.22.desc: "До наших берегів прибув невеликий #L [GetCountry('POR').GetAdjective|l]ський#! флот з військами та зброєю. Його командир привіз листа від свого монарха, що гласить: «Ми, християни, єдині в боротьбі з невірними»."
  flavor_eth.22.a: "Бог — добрий!"
  STATIC_MODIFIER_NAME_eth_mil_aid_from_portugal: "Військова допомога Португалії"
  STATIC_MODIFIER_DESC_eth_mil_aid_from_portugal: "Військова допомога від братів по вірі проти невірних, які є нашими спільними ворогами"
  flavor_eth.23.title: "Про нас забули"
  flavor_eth.23.desc: "З #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_GEN')|L]#!#! більше не припливають ані посли, ані купці, а наше прохання про допомогу залишилося без відповіді."
  flavor_eth.23.a: "Ми самі!"
  flavor_eth.30.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] і реформи з централізації"
  flavor_eth.30.desc: "Турбота династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] перетворила #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! на велику країну, але її численні регіони не пов'язує ні спільна мова, ні спільна віра, ні навіть єдина система державного управління.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName], найобдарованіший з правителів [ROOT.GetCountry.Custom('CL_GEN')] за останній час, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'підготувала', 'підготував')] низку реформ, здатних об'єднати нашу країну."
  flavor_eth.30.a: "Нам потрібна централізація."
  flavor_eth.30.b: "Повернемося до цього питання пізніше."
  flavor_eth.40.title: "Кочова столиця"
  flavor_eth.40.desc: "Правити такою великою та різноманітною країною, як [ROOT.GetCountry.GetLongName], вельми непросто. Тому династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] так і не заснувала постійної столиці: замість цього двір монарха кочував від вождя до вождя кожні кілька місяців.\n\nХоча в таких умовах важко зберігати безперервність управління країною, кочовий двір має свої переваги: регулярні візити придворних у різні куточки імперії сприяють розвитку єдиної культури еліти."
  flavor_eth.40.a: "Так було завжди."
  flavor_eth.40.b: "Активно посприяємо зміні культури в сільській місцевості."
  flavor_eth.50.title: "Дебре-Бирхан — гора світла"
  flavor_eth.50.desc: "[ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'побачила', 'побачив' )] сон про сяючу гору, на якій стоїть нова столиця #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У реальності на цьому місці вже збудовано #TOOLTIP:BUILDING_TYPE,temple,X #L храм#!#!. Настав час вирішувати, чи втілить [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] свої мрії."
  flavor_eth.50.a: "Час заснувати постійну столицю."
  flavor_eth.50.b: "Не будемо порушувати традицію."
  flavor_eth.60.title: "#TOOLTIP:LOCATION,debra_berhan,X #L Дебре-Бирхан#!#! розграбовано"
  flavor_eth.60.desc: "Відмовитися від давніх традицій не так просто. Після того, як околиці #TOOLTIP:LOCATION,debra_berhan,X #L Дебре-Бирхана#!#! були розграбовані, нова столиця спорожніла — її покинули всі жителі від вищих придворних до останнього конюха. Нам залишається лише повернутися до кочових звичаїв."
  flavor_eth.60.a: "Будемо кочувати по провінціях."
  flavor_eth.70.title: "Гондер — нова столиця"
  flavor_eth.70.desc: "В останні роки [target_character.GetName] проводить все більше і більше часу в монастирях на #TOOLTIP:LOCATION,lake_tana,X #L озері Тана#!#!. Завдяки [Select_CString(target_character.IsFemale, 'її', 'його' )] покровительству в цьому районі поступово виросло невелике торгове місто, яке дехто вже називає нашою другою столицею.\n\nСеред тих, хто так говорить, побутує думка, що заснування постійної столиці дозволить нам створити нову духовну та архітектурну спадщину."
  flavor_eth.70.a: "Побудуємо там нашу столицю."
  flavor_eth.70.b: "Ми не повинні прив'язуватися до одного місця."
  flavor_eth.80.title: "Доля нижньоєгипетських міафізитів"
  flavor_eth.80.desc: "З #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#! доходять чутки, що #L [GetCountry('MAM').GetAdjective|l]ий#! [GetCountry('MAM').GetGovernment.GetRulerTitle|l] переслідує #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! у своїх володіннях. Оскільки ця країна, як і ми самі, належить до #TOOLTIP:LOCATION,alexandria,X #L Александрійської#!#! патріархії, наш обов'язок — заступитися за одновірців. Те, що сам патріарх зараз перебуває в [GetCountry('MAM').GetAdjectiveWithNoTooltip|l]их землях, тільки ускладнює ситуацію: його смерть може поставити під загрозу самі основи нашої церкви."
  flavor_eth.80.a: "[GetCountry('MAM').GetGovernment.GetRulerTitle] отримає наше гнівне послання."
  flavor_eth.80.b: "Сваритися з такою могутньою країною, як [GetCountry('MAM').GetNameWithNoTooltip|l], нам ні до чого."
  flavor_eth.80.c: "Це привід для війни!"
  flavor_eth.81.title: "Послання з [target_from_country.Custom('CL_GEN')]"
  flavor_eth.81.desc: "Сьогодні ми отримали послання, в якому [target_ruler.GetName|l] країни [target_from_country.GetLongName] докладно перераховує численні злодіяння, нібито скоєні нами щодо наших #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#!.\n\nВтім, турбуватися нема про що: патріарх #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#! та #TOOLTIP:REGION,ethiopia_region,X #L Ефіопії#!#! у нас в заручниках. Навряд чи [target_ruler.GetNameWithNoTooltip|l] ризикуватиме життям свого духовного лідера через такі дрібниці."
  flavor_eth.81.a: "Відправимо саркастичну відповідь."
  flavor_eth.81.b: "Спробуємо вибачитись та покращити відносини."
  opinion_improved_relations: "Відносини покращились"
  flavor_eth.82.title: "Отримано послання з [target_from_country.Custom('CL_GEN')]"
  flavor_eth.82.desc: "До нас дійшли відомості, що [target_ruler.GetName] з #ONCLICK:COUNTRY,[target_from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_from_country.Custom('CL_tt')],X [target_from_country.Custom('CL_GEN')|L]#!#! вважає, ніби ми погано поводимося з нашими підданими, які сповідують #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитство#!#!. [Select_CString(target_ruler.IsFemale, 'Вона', 'Він' )] вбачає в цьому причину для війни; є думка, що нам слід готуватися до неминучого нападу [target_from_country.Custom('CL_GEN')]."
  flavor_eth.82.a: "Вони не наважаться."
  flavor_eth.83.title: "Посол з [target_mam.Custom('longname_ru_wntt_GEN')]"
  flavor_eth.83.desc: "Сьогодні #L [target_mam.GetAdjective|l]ий#! посол доставив відповідь на наше звернення щодо утисків #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#!.\n\nІ ця відповідь далека від вибачень: [target_mam.GetGovernment.GetRulerTitle|l] відкрито насміхається над нами та будь-якими можливими спробами відплати з нашого боку."
  flavor_eth.83.a: "Ув'язнимо посла."
  flavor_eth.83.b: "Це причина розпочати війну!"
  flavor_eth.83.c: "Забудемо про це."
  flavor_eth.84.title: "[target_mam.GetNameWithNoTooltip] вибачається"
  flavor_eth.84.desc: "[target_mam.GetGovernment.GetRulerTitle] #ONCLICK:COUNTRY,[target_mam.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_mam.Custom('CL_tt')],X [target_mam.Custom('CL_GEN')|L]#!#! [Select_CString(target_mam.GetGovernment.GetRuler.IsFemale, 'надіслала', 'надіслав' )] свою відповідь. [Select_CString(target_mam.GetGovernment.GetRuler.IsFemale, 'Вона', 'Він' )] обіцяє вивчити ситуацію зі своїми підданими #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитської#!#! віри та запевняє нас, що відчуває до #L [ROOT.GetCountry.GetAdjective|l]ого#! народу та #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! загалом винятково дружні почуття."
  flavor_eth.84.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.85.title: "Посол у в'язниці"
  flavor_eth.85.desc: "[target_from_country.GetGovernment.GetRulerTitle] #ONCLICK:COUNTRY,[target_from_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_from_country.Custom('CL_tt')],X [target_from_country.Custom('CL_GEN')|L]#!#! [Select_CString(target_ruler.IsFemale, 'була', 'був' )] настільки [Select_CString(target_ruler.IsFemale, 'розгнівана', 'розгніваний' )] нашою відповіддю, що [Select_CString(target_ruler.IsFemale, 'ув'язнила', 'ув'язнив' )] посла, який її доставив."
  flavor_eth.85.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.90.title: "Смерть єпископа"
  flavor_eth.90.desc.a: "Після смерті єпископа #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! [target_country.GetAdjectiveWithNoTooltip|l]а церква звернулася до #TOOLTIP:LOCATION,alexandria,X #L олександрійського#!#! патріарха #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! з проханням призначити його наступника.\n\nЗвісно, єпископа обирає патріарх, але для нас це чудова нагода поставити [target_country.Custom('CL_ACC')] на місце: [target_ruler.GetName] цієї країни проводить політику навернення #TOOLTIP:RELIGION,$sunni_tt$,X #L сунітських#!#! підданих у свою віру і досі тримає у в'язниці нашого посла."
  flavor_eth.90.desc.b: "Після смерті свого єпископа [target_country.GetAdjectiveWithNoTooltip|l]а церква звернулася до #TOOLTIP:LOCATION,alexandria,X #L олександрійського#!#! патріарха #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! з проханням призначити його наступника.\n\nЗвісно, єпископа обирає патріарх, але для нас це чудова нагода поставити [target_country.Custom('CL_ACC')] на місце."
  flavor_eth.90.a: "Перешкодимо призначенню нового єпископа."
  flavor_eth.90.b: "Ми не повинні втручатися в ці справи."
  flavor_eth.91.title: "Відсутність єпископа"
  flavor_eth.91.desc: "Минулий єпископ [ROOT.GetCountry.Custom('CL_GEN')] помер багато років тому, а новий так і не прибув з #TOOLTIP:LOCATION,alexandria,X #L Александрії#!#!. Можливо, це пов'язано із втручанням [GetCountry('MAM').Custom('CL_GEN')]?"
  flavor_eth.91.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  flavor_eth.100.title: "Чернечі ордени"
  flavor_eth.100.desc: "Однією з найсильніших сторін #L [ROOT.GetCountry.GetAdjective|l]ої#! церкви є велика кількість процвітаючих монастирів, які є в усіх куточках країни. Чернечі ордени сприяють розвитку нашої країни, відкриваючи свої обителі у щойно завойованих землях, щоб нести туди світ істинної віри. Крім того, монастирі слугують освітніми центрами, де навчаються [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]і [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та чиновники, що в минулому відіграло ключову роль у відродженні [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої церкви.\n\nЗ іншого боку, останнім часом монастирі та ордени, що ними володіють, стали надто багатими та незалежними."
  flavor_eth.100.a: "Спробуємо їх приборкати."
  flavor_eth.100.b: "Захистимо привілеї орденів."
  flavor_eth.110.title: "Незалежність від патріархії"
  flavor_eth.110.desc: "[ROOT.GetCountry.GetAdjective]а церква споконвіку залежить від #TOOLTIP:LOCATION,alexandria,X #L Александрійської патріархії#!#!. Колись ми потребували чужоземних священників, єпископів та духовних настанов, але за останні роки [ROOT.GetCountry.GetAdjectiveWithNoTooltip]а церква достатньо виросла та зміцніла, щоб навчати власний стан [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')]: вона має розвинену інфраструктуру у вигляді храмів та монастирів по всій країні.\n\nТепер, коли єгипетського патріарха тримають у заручниках #TOOLTIP:RELIGION,$muslim_tt$,X #L мусульманські#!#! завойовники, ми часто змушені роками чекати призначення нових єпископів. Якби нашу церкву очолювали наші власні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l], ця проблема була б вирішена."
  flavor_eth.110.a: "Ми повинні шанувати свого патріарха."
  flavor_eth.110.b: "Наша церква має бути вільною від іноземного впливу."
  flavor_eth.120.title: "Кебра Негаст"
  flavor_eth.120.desc: "Назва «#italic Кебра Негаст#!», що означає «слава царів», носить національний епос [ROOT.GetCountry.Custom('CL_GEN')]. Його записав Небуре-ід Ісхак з Аксума під керівництвом єпископа Абби Гіоргіса. Ця книга — справжня скарбниця нашої національної та релігійної думки, що має величезне історичне та культурне значення.\n\nТекст «#italic Кебра Нагаст#!», написаний століття тому, займає особливе місце в [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ій літературі та культурі: історичні та релігійні мотиви вигадливо переплітаються в ньому з хронікою династії [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName]. Велике значення ця книга має і в [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ій #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитській#!#! церкві.\n\nОдин з найяскравіших сюжетів «#italic Кебра Нагаст#!» присвячений Цариці Савській та Царю Соломону. Інша захоплива історія оповідає про те, як їхній син Менелік I (Менелек) доставив до #TOOLTIP:REGION,ethiopia_region,X #L Ефіопії#!#! легендарний Ковчег Завіту. Є в цьому епосі й розповідь про те, як наш народ змінив свої релігійні переконання, перейшовши від шанування небесних світил до віри в #italic Господа Бога Ізраїлевого#!."
  flavor_eth.120.a: "Дізнаємося, як наші предки керували своїми володіннями."
  flavor_eth.120.b: "Вивчимо способи поводження з ленниками."
  flavor_eth.120.c: "Адаптуємо стару тактику до сучасних питань."
  flavor_eth.130.title: "$lalibela_cross$"
  flavor_eth.130.desc: "$lalibela_cross$ є однією з найсвятіших та найшанованіших реліквій нашого народу. Цей великий та багато прикрашений хрест для процесій зберігається в церкві Бете Медхане Алем у місті #TOOLTIP:LOCATION,lalibela,X #L Лалібела#!#!. Священники дбайливо торкаються ним вірян, щоб благословити або зцілити їх.\n\nРеліквія виготовлена з цільного шматка золота, хоча її копії нерідко відливають з бронзи. Її центральний хрест з подовженою нижньою частиною оточений хитромудрим орнаментом. Характерною деталлю є зображення #italic рук Адама#! в основі, яке на свята прикрашають різнокольоровими клаптями тканини, що підкреслюють велич та важливість реліквії."
  flavor_eth.130.a: "Нам слід доставити його до столиці."
  flavor_eth.130.b: "Ми вирушимо у належне паломництво."
  flavor_eth.130.c: "Ми зробимо церкву, де зберігається реліквія, ще величнішою."
  flavor_eth.130.a.tt: "Наші #TOOLTIP:CULTURE,$agaw_culture_tt$,X #L агавські#!#! піддані будуть дуже незадоволені"
  flavor_eth.140.title: "Правда царів"
  flavor_eth.140.desc: "Книга #italic «Фетха Негест»#!, що означає #italic «правда царів»#!, являє собою звід релігійних законів арабською мовою, складений приблизно 1240 року єгипетським християнином на ім'я Абуль-Фадаїль ібн аль-Ассаль. За основу цей автор взяв апостольські послання та кодекси візантійських імператорів.\n\nПри вивченні тексту #italic «Фетха Негест»#! стає зрозуміло, що він складається з двох частин, що досить сильно відрізняються одна від одної. Перша з них присвячена богослужбовим питанням, зокрема церковній ієрархії та таїнствам. Вона містить елементи Біблії, праці таких отців церкви, як святий Василій та святий Іполит, а також канони, затверджені на Нікейському та Антіохійському соборах.\n\nДруга частина #italic «Фетха Негест»#! присвячена світським питанням — зокрема, сімейному праву, боргам та цивільній владі. Загалом вона спирається на ті ж праці, що й перша, проте її головними джерелами прийнято вважати чотири книги, що збірно іменуються #italic «Канони імператорів»#!. Це #italic «Прохейрон»#! (або #italic «Прохейрос Номос»#!), арабський переклад #italic Сирійсько-римського судового кодексу#!, арабський переклад #italic «Еклоги»#! та #italic заповіді Старого Завіту#!.\n\nПротягом століть #italic «Фетха Негест»#! слугувала авторитетним юридичним довідником для християн-#TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! #TOOLTIP:REGION,egypt_region,X #L Єгипту#!#!. У нинішній #TOOLTIP:REGION,ethiopia_region,X #L Ефіопії#!#! вона перекладена на #L [ROOT.GetCountry.GetCulture.GetLanguage.GetName|l]у#! мову та доповнена місцевими законами. Деякі з наших суддів задаються питанням, чи не варто нам знову прийняти ці закони, а [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] гаряче підтримують цю ідею."
  flavor_eth.140.a: "Ми повинні прийняти ці закони."
  flavor_eth.140.b: "Зараз не час."
  flavor_eth.150.title: "$the_book_of_the_mysteries_of_the_heavens_and_the_earth$"
  flavor_eth.150.desc: "Зі зростанням популярності богослов'я [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] та монахи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! все частіше записують свої знання на пергамент. Наприклад, [target_artist.GetName] [Select_CString(target_artist.IsFemale, 'вирішила', 'вирішив' )] написати трактат про створення світу та людства."
  flavor_eth.150.a: "Ми оплатимо [Select_CString(target_artist.IsFemale, 'її', 'його' )] працю."
  flavor_eth.150.b: "Ми не можемо собі цього дозволити."
  flavor_eth.151.title: "Повернення вигнаних монахів"
  flavor_eth.151.desc: "Зійшовши на трон, [target_character3.GetName] [Select_CString(target_character3.IsFemale, 'вела', 'вів' )] спосіб життя, вельми далекий від праведного. [Select_CString(target_character3.IsFemale, 'Її', 'Його' )] викривали багато монахів, зокрема [target_character.GetName], [Select_CString(target_character.IsFemale, 'яку', 'якого' )] за це відправили у вигнання. Тепер же, коли [target_character3.GetNameWithNoTooltip] [Select_CString(target_character3.IsFemale, 'мертва', 'мертвий' )], [Select_CString(target_character2.IsFemale, 'нова правителька', 'новий правитель' )] [target_character2.GetName] може дозволити вигнанцям повернутися на батьківщину."
  flavor_eth.151.a: "[Select_CString(target_character.IsFemale, 'Її', 'Його' )] вигнання було несправедливим. Нехай [Select_CString(target_character.IsFemale, 'вона', 'він' )] повернеться."
  flavor_eth.151.b: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] не повернеться, доки [Select_CString(target_character.IsFemale, 'жива', 'живий' )]."
  flavor_eth.153.title: "Дебре-Ігзіабер"
  flavor_eth.153.desc: "Дебре-Ігзіабер, одна з найдавніших церков #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, давно забута та занедбана. Одного разу, милуючись озером у [target_location.Custom('LR_PREP')|l] [target_location.GetName], [target_character.GetName] [Select_CString(target_character.IsFemale, 'задумалася', 'задумався' )] про те, щоб відновити її заради зміцнення #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! віри на території [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  flavor_eth.153.a: "Відновимо цю церкву."
  flavor_eth.153.b: "Ми не станемо цього робити, навіть якщо [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] прогніваються."
  flavor_eth.153.c: "Це буде одна з найвеличніших церков [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_eth.155.title: "Мирська влада духовенства"
  flavor_eth.155.desc: "Відтоді, як на трон #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(target_character.IsFemale,'зійшла', 'зійшов')] [target_character.GetName], значну частину земель цієї країни контролює [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. [target_character2.GetName] хоче змінити стан справ та обмежити мирську владу духовенства, однак самі священники навряд чи будуть цим задоволені."
  flavor_eth.155.a: "Земля належить [ROOT.GetCountry.[ROOT.GetCountry.Custom('CL_DAT')]."
  flavor_eth.155.b: "Не варто допускати, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] засмучувалися."
  flavor_eth.156.title: "[rebels_scope.GetNameWithNoTooltip]"
  flavor_eth.156.desc: "#TOOLTIP:RELIGION,$judaism_tt$,X #L Юдейські#!#! громади [ROOT.GetCountry.Custom('CL_GEN')] бунтують. Створений ними рух «[rebels_scope.GetName]» бореться за їхнє звільнення від обов'язку дотримуватися наших #L [ROOT.GetCountry.GetReligion.GetAdjective|l]их#! звичаїв."
  flavor_eth.156.a: "Нам треба готуватися."
  flavor_eth.156.b: "Вони мають рацію. Дамо їм деякі релігійні права."
  eth_make_all_jewish_pops_unhappy_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейських#!#! [Concept('pops', 'груп населення')|e] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|-=2%]"
  eth_make_all_jewish_pops_happier_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх #TOOLTIP:RELIGION,$judaism_tt$,X #L юдейських#!#! [Concept('pops', 'груп населення')|e] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|-=2%]"
  beta_israel: "Бета Ізраїль"
  flavor_eth.157.title: "Мандрівний двір"
  flavor_eth.157.desc: "Хоча столиця #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! кілька разів переносилася через військові потреби, в цій країні не було звичаю, за яким монарх наказував би своїм придворним переїжджати з міста в місто. Однак зараз [target_character.GetName] вважає такий звичай розумним: завдяки йому [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зможе перебувати ближче до армій, сприяти розвитку окремих міст і дбати про країну в цілому. Можливо, ця практика і справді буде корисною для [ROOT.GetCountry.Custom('CL_GEN')]."
  flavor_eth.157.a: "Так і вчинимо."
  flavor_eth.157.b: "Постійна столиця краще."
  flavor_eth.160.title: "$book_of_light$"
  flavor_eth.160.desc: "Втамовуючи свою жагу до пізнання, [target_character.GetName] [Select_CString(target_character.IsFemale, 'прочитала', 'прочитав' )] ще кілька #TOOLTIP:CONTINENT,europe,X #L європейських#!#! трактатів. Тепер [Select_CString(target_character.IsFemale, 'вона', 'він' )] бажає написати кілька власних книг, перша з яких називатиметься «$book_of_light$». [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] сподівається, що таким чином [ROOT.GetCountry.GetReligion.GetName|l] ще сильніше пошириться серед жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, однак літературні праці відволікатимуть [Select_CString(target_character.IsFemale, 'її', 'його' )] від державних справ."
  flavor_eth.160.a: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] створить шедевр!"
  flavor_eth.160.b: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'повинна', 'повинен' )] правити, а не писати."
  flavor_eth.161.title: "$book_of_nativity$"
  flavor_eth.161.desc: "Через кілька місяців [target_character.GetName] [Select_CString(target_character.IsFemale, 'закінчила', 'закінчив' )] ще одну книгу під назвою «$book_of_nativity$». Вона присвячена авторському погляду на те, якими мають бути [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l], та можливій реформі духовенства."
  flavor_eth.161.a: "Ще один шедевр."
  flavor_eth.162.title: "$books_of_trinity$"
  flavor_eth.162.desc: "Решту часу, виділеного на літературні праці, [target_character.GetName] [Select_CString(target_character.IsFemale, 'присвятила', 'присвятив' )] написанню свого останнього шедевра, названого «$books_of_trinity$». Ця книга підсумовує роздуми про релігію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, викладені в трактатах «$book_of_light$» та «$book_of_nativity$»."
  flavor_eth.162.a: "Можливо, [target_character.GetNameWithNoTooltip] реформує наше духовенство?"
  flavor_eth.163.title: "Дебере Мешвар"
  flavor_eth.163.desc: "Натхненний успіхами свого правління, [target_character.GetName] [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] побудувати #TOOLTIP:BUILDING_TYPE,debere_meshwae,X #L Дебере Мешвар#!#! — найвеличнішу церкву в країні. Її зведення обійдеться нам досить недешево, але якщо ми відмовимося, [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] обернеться проти нас."
  flavor_eth.163.a: "Побудуємо її."
  flavor_eth.163.b: "Скільки ще церков потрібно [ROOT.GetCountry.Custom('CL_DAT')]?"
  flavor_eth.164.title: "Чужоземні ідеї"
  flavor_eth.164.desc: "Хоча при нашому дворі панує #L [ROOT.GetCountry.GetCulture.GetName|l]а#! культура, ми вже кілька разів порушували питання про розширення своїх поглядів та пошук натхнення в інших країнах. Так, це може негативно вплинути на #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!, але якщо ми запросимо іноземних вчених, вигода буде більшою за можливу шкоду."
  flavor_eth.164.a: "Так, це гідна ідея."
  flavor_eth.164.b: "При дворі повинна панувати [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]а культура."
  flavor_eth.165.title: "$confession_of_faith$"
  flavor_eth.165.desc: "[target_character.GetName] хоче написати трактат на захист #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитського#!#! віровчення під назвою «$confession_of_faith$». [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] вважає, що це закріпить догмати, яким і без того слідують усі віряни: наприклад, дотримання суботи та заборона на свинину. Така книга може бути корисною, але її написання обійдеться казні [ROOT.GetCountry.Custom('CL_GEN')] досить дорого."
  flavor_eth.165.a: "Наша віра варта будь-яких витрат."
  flavor_eth.165.b: "Релігійні дебати для нас залишилися в минулому."
  flavor_eth.200.title: "Монах [ewostatewos.GetNameWithNoTooltip]"
  flavor_eth.200.desc: "Під час візиту до вождя однієї з віддалених областей нашої країни ми зустріли мудреця, який навчав простий люд. [ewostatewos.GetName] [Select_CString(ewostatewos.IsFemale, 'була черницею', 'був ченцем' )] з півночі [ROOT.GetCountry.Custom('rank_ru_GEN')|l], де у [Select_CString(ewostatewos.IsFemale, 'неї', 'нього' )] є свій монастир і невелика група учнів. Однак наш єпископ, лише кілька хвилин послухавши його проповідь, прийшов у невимовну лють.\n\n[ewostatewos.GetNameWithNoTooltip] є апологетом давнього звичаю #L [GetCountry('ETH').GetAdjective|l]их#!#TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитів#!#! шанувати суботу та неділю як священні дні. Наш єпископ стверджує, що ця доктрина суперечить настановам #TOOLTIP:LOCATION,alexandria,X #L олександрійського#!#! патріарха і може накликати на нас безліч бід. Він вимагає, щоб [ewostatewos.GetNameWithNoTooltip] [Select_CString(ewostatewos.IsFemale, 'була покарана', 'був покараний' )] на науку іншим, щоб більше ніхто не смів повторювати цю помилку."
  flavor_eth.200.a: "Дотримаємося поради єпископа."
  flavor_eth.200.b: "Не будемо його карати. Нехай іде кудись ще."
  flavor_eth.200.c: "Схоже, [ewostatewos.GetShortNameWithNoTooltip] мудріший за нашого єпископа. Нехай він займе його місце."
  flavor_eth.200.d: "Насправді, ми теж зацікавлені в його вченні."
  flavor_eth.201.title: "[GetCountry('ETH').GetAdjectiveWithNoTooltip]ий монах [ewostatewos.GetNameWithNoTooltip]"
  flavor_eth.201.desc: "#TOOLTIP:RELIGION,$miaphysite_tt$,X #L Міафізитський#!#! монах [ewostatewos.GetName] родом з півночі [GetCountry('ETH').Custom('CL_GEN')]. Нам повідомили, що він з'явився в наші землі, рятуючись від переслідувань за своє неортодоксальне вчення. Зараз він шукає зустрічі зі столичними лідерами міафізитів."
  flavor_eth.201.descB: "#TOOLTIP:RELIGION,$miaphysite_tt$,X #L Міафізитський#!#! монах [ewostatewos.GetName] народився на півночі #ONCLICK:COUNTRY,[GetCountry('ETH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ETH').Custom('CL_tt')],X [GetCountry('ETH').Custom('CL_GEN')|L]#!#!. Нам повідомили, що він з'явився в наші землі, рятуючись від переслідувань за своє неортодоксальне вчення. Зараз він шукає зустрічі зі столичними лідерами міафізитів.\n\nОднак удача йому зрадила. Кажуть, він помер по дорозі сюди."
  flavor_eth.201.a: "Він нам знадобиться. Нехай залишається."
  flavor_eth.201.b: "У нас і без нього вистачає смутьянів. Проженемо його."
  flavor_eth.201.c: "Його вчення ґрунтується на Старому Завіті. Вислухаємо його."
  flavor_eth.201.d: "Добре, що проблема вирішилася сама собою."
  flavor_eth.202.title: "[ewostatewos.GetNameWithNoTooltip] та його сім учнів"
  flavor_eth.202.desc: "Після того, як [ewostatewos.GetName] перестав бентежити уми, здавалося, що його вчення зійшло нанівець. Ми вже майже забули про цього ченця і тому не помітили повернення його послідовників.\n\nА вони тим часом відновили старий монастир і почали будувати нові. Цей чернечий рух став називати себе #italic Домом Евостатевоса#!."
  house_of_ewostatewos_name: "Дім Евостатевоса"
  flavor_eth.202.a: "Нехай з ними поговорить священник [anorewos.GetNameWithNoTooltip]."
  flavor_eth.202.b: "Вони сміють порушувати нашу волю? [ROOT.GetCountry.GetGovernment.GetRulerTitle] такого не потерпить!"
  flavor_eth.202.c: "Нас це все одно не стосується."
  flavor_eth.203.title: "Розкол посилюється"
  flavor_eth.203.desc: "Біда! Ідея влаштувати зустріч, на якій [anorewos.GetName] та [ewostatewos.GetName] могли б обговорити питання віри, обернулася жахливою помилкою. Нам повідомили, що їхня бесіда швидко переросла в бурхливу теологічну суперечку, що посилила конфронтацію з ченцями. На щастя, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] були вигнані з монастиря раніше, ніж ситуація остаточно вийшла з-під контролю."
  flavor_eth.203.a: "Своїми релігійними диспутами [anorewos.GetShortNameWithNoTooltip] розколе [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
  flavor_eth.203.a.tt: "[anorewos.GetNameWithNoTooltip] буде публічно покараний"
  flavor_eth.203.a.tt2: "Вплив ченця поширюється лише на землі навколо монастирів."
  flavor_eth.203.b: "Ті, хто ображає моїх представників, ображають мене! Спалити дотла!"
  flavor_eth.203.b.tt: "[ewostatewos.GetNameWithNoTooltip] стає мучеником, а його ідеї виходять за межі монастирів"
  flavor_eth.204.title: "Дім Евостатевоса"
  flavor_eth.204.desc: "Вплив монастирів #italic Дому Евостатевоса#! продовжив поширюватися: його вчення виявилося ближчим до споконвічних #L [ROOT.GetCountry.GetAdjective|l]их#! традицій, ніж доктрини, нав'язувані #TOOLTIP:LOCATION,alexandria,X #L олександрійською#!#! патріархією, а праця ченців у галузі просвіти та турботи про найбідніші верстви суспільства створили позитивний образ цього дому в очах народу.\n\nАбун попереджає, що це може закінчитися дуже погано: якщо ми дозволимо єресі поширюватися, патріарх може відлучити нас від церкви, а в найгіршому випадку серед жителів [ROOT.GetCountry.Custom('rank_ru_GEN')|l] може спалахнути громадянська війна."
  flavor_eth.204.a: "Покінчимо з цим і спалимо монастирі."
  flavor_eth.204.a.tt: "Послідовники #italic Дому Евостатевоса#! повстають у гніві"
  flavor_eth.204.b: "Ніякої громадянської війни. Ми єдині з народом."
  flavor_eth.210.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] та стела на честь нового правителя"
  flavor_eth.210.desc: "Вже тисячу років стели стародавніх царів #TOOLTIP:LOCATION,axum,X #L Аксуму#!#! височіють над нашою країною, свідчачи про могутність та велич похованих під ними володарів.\n\nНаш народ дивиться на них з трепетом та повагою. Якщо [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] спорудить нову стелу на свою честь, це підкреслить зв'язок часів та зміцнить престиж нинішньої влади."
  flavor_eth.210.a: "Це язичницький звичай. Добре, що ми від нього відмовилися."
  flavor_eth.210.b: "Ми побудуємо ще величніший монумент!"
  flavor_eth.220.title: "Церква Святого Георгія"
  flavor_eth.220.desc: "Кілька поколінь тому цар Гебре Мескель Лалібела задумав побудувати місто, яке б виглядало дзеркальним відображенням Священного #TOOLTIP:LOCATION,jerusalem,X #L Єрусалиму#!#! та приваблювало паломників з усіх кінців християнського світу. Назвавши це місто на свою честь, Лалібела прикрасив його величними церквами, але для того, щоб повністю втілити царську мрію, нам належить виконати ще багато роботи."
  flavor_eth.220.a: "Не будемо економити золото."
  flavor_eth.220.b: "Ми не можемо собі дозволити таку інвестицію."
  flavor_eth.230.title: "Узаконення подвійного шабату"
  flavor_eth.230.desc: "Тепер, коли кайдани #TOOLTIP:LOCATION,alexandria,X #L олександрійської#!#! патріархії скинуто, ми можемо офіційно затвердити заповіді, що визначають життя [ROOT.GetCountry.GetAdjective|l]ого народу, волею нашого власного патріарха."
  flavor_eth.230.a: "Створимо цю доктрину."
  flavor_eth.230.b: "Ні, ми залишимо все як є."
  flavor_eth.240.title: "Нове небесне світило"
  flavor_eth.240.desc: "Відвідуючи свої володіння в #TOOLTIP:LOCATION,debra_berhan,X #L Дебре-Бирхані#!#!, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'стала свідком', 'став свідком' )] того, як на небосхилі загорілася нова зірка. [ROOT.GetCountry.GetAdjective]ий народ стривожений цією зміною в небесних сферах, однак [ROOT.GetCountry.GetGovernment.GetRulerTitle] бачить у ній добрий знак, що свідчить про милість Господа до [ROOT.GetCountry.Custom('CL_DAT')]."
  flavor_eth.240.a: "Влаштуємо бенкет на честь цього доброго знамення."
  flavor_eth.240.b: "На цьому місці ми зведемо нову церкву на Його честь."
  flavor_eth.240.c: "На цьому місці ми побудуємо нове місто."
  flavor_eth.240.d: "Тут ми побудуємо нове місто, а в ньому — церкву, гідну Його слави."
  can_revoke_double_sabbath_tt: "Духовенство має вдвічі більшу владу, ніж простолюд, або станова влада простолюду становить менше 10%"
  flavor_eth_250_shared: "Прохання про ремісників"
  flavor_eth.250.title: "$flavor_eth_250_shared$"
  flavor_eth.250.desc: "Хоча #L [ROOT.GetCountry.GetCulture.GetName|l]а#! культура подарувала #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! чимало великих творінь, час від часу нам буває корисна й допомога чужинців. Ось і зараз придворні пропонують запросити вправних ремісників з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!."
  flavor_eth.250.a: "Поступ важливіший, навіть якщо він зашкодить [ROOT.GetCountry.GetCulture.GetNameWithNoTooltip|l]ій культурі."
  flavor_eth.250.b: "Обійдемося без чужинців."
  eth_target_country_must_accept_tt: "Щоб ефекти подіяли, #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! потрібно погодитися"
  flavor_eth.251.title: "$flavor_eth_250_shared$"
  flavor_eth.251.desc: "До двору з'явилися посли з [target_country2.Custom('CL_GEN')] з проханням надати ремісників для роботи на території їхнього [target_country2.Custom('rank_ru_GEN')|l]."
  flavor_eth.251.a: "Відправимо їм когось."
  flavor_eth.251.b: "Проженемо цих жебраків."
  flavor_eth_260_shared: "Секрет нафти"
  flavor_eth.260.title: "$flavor_eth_260_shared$"
  flavor_eth.260.desc: "Наші численні конфлікти з #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманськими#!#! країнами зовсім не означають, що нам не слід вчитися у них. Один з їхніх недавніх винаходів під назвою «нафта» зацікавив наших придворних. Вони пропонують найняти радників з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, щоб вони відкрили нам секрет нафти та навчили застосовувати її у військових цілях."
  flavor_eth.260.a: "Давайте запитаємо їх."
  flavor_eth.260.b: "Нам не потрібні їхні винаходи."
  eth_no_offer_tt: "#ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! не надійде жодної пропозиції"
  flavor_eth.261.title: "$flavor_eth_260_shared$"
  flavor_eth.261.desc: "Посланець із [target_country2.Custom('CL_GEN')] пропонує значну суму за деякі види нашої зброї — насамперед пов’язаної з нафтою. Ми можемо погодитися, але в такому разі ця зброя може бути обернена проти нас самих."
  flavor_eth.261.a: "Вони ніколи не обернуть її проти нас."
  flavor_eth.261.b: "Вони не отримають нашої зброї!"
  flavor_eth_270_title_common: "[target_character2.GetNameWithNoTooltip] та [Select_CString(target_character2.IsFemale,'її', 'його')] заколот"
  flavor_eth.270.title: "$flavor_eth_270_title_common$"
  flavor_eth.270.desc: "#TOOLTIP:RELIGIONGROUP,muslim,X #L Мусульманське#!#! населення #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! продовжує зростати. [Select_CString(target_character2.IsFemale, 'Правителька', 'Правитель' )] цих земель [target_character2.GetName], [Select_CString(target_character2.IsFemale, 'яка сама', 'який сам' )] сповідує #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, пропонує підняти повстання проти #ONCLICK:COUNTRY,[GetCountry('ETH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ETH').Custom('CL_tt')],X [GetCountry('ETH').Custom('CL_GEN')|L]#!#! та [Select_CString(target_character2.IsFemale, 'готова', 'готовий' )] особисто взяти до рук меч."
  flavor_eth.270.a: "Ми здобудемо свободу."
  flavor_eth.270.b: "Свобода того не варта."
  flavor_eth.271.title: "$flavor_eth_270_title_common$"
  flavor_eth.271.desc: "[target_character2.GetName] із #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! [Select_CString(target_character2.IsFemale, 'відкинула', 'відкинув' )] нашу владу та [Select_CString(target_character2.IsFemale, 'оголосила', 'оголосив' )] свої землі незалежною #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламською#!#! країною."
  flavor_eth.271.a: "Ми не дозволимо їм відколотися!"
  flavor_eth.271.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"