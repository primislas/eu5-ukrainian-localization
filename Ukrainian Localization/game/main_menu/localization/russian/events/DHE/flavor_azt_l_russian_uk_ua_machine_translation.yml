l_russian:
  flavor_azt.70.title: "Велика піраміда Теночтітлана"
  flavor_azt.70.desc: "Відтоді, як наші предки скинули з себе ярмо гнобителів із #TOOLTIP:LOCATION,azcapotzalco,X #L Аскапоцалько#!#! і почали підкоряти своїй волі прилеглі міста-країни, минуло чимало років. За ці роки народ став набагато сильнішим. Сьогодні нам належить чимало ключових місць у долині Мехіко. Втім, міста-країни, якими ми правимо, все ще пам'ятають, що не так давно всі ми були рівні, тому не можна стверджувати, наскільки вірні вони будуть нам завтра.\n\nПеревірити це легко: оскільки обов'язок правителя — прибудовувати нові рівні до великої піраміди #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтітлана#!#!, кожне підпорядковане нам місто, що вклало в це свої сили та кошти, буде занадто зайняте, щоб бунтувати. Будь-хто ж, хто відмовиться, проявить свою справжню природу, а отже, його можна буде покарати."
  flavor_azt.70.a: "Кожен має допомогти будівництву!"
  flavor_azt.70.b: "Нехай кожен підданий внесе свій чесний внесок."
  flavor_azt.70.c: "Можливо, займемося цим іншим разом."
  subject_contribution_reason: "Внесок ленника"
  we_will_be_able_to_construct_the_building_later_tt: "Цю [Concept('building', 'споруду')|e] можна буде побудувати пізніше"
  flavor_azt.70.historical_info: "У центрі Теночтітлана височіє храмовий комплекс Уей-теокаллі, закладений у XIV столітті та згодом добудовуваний, — втілення набожності та можливостей ацтекського народу. Одна з його примітних особливостей — здвоєні сходи, що ведуть до двох храмів: перший присвячений богу війни Уїцилопочтлі, другий — богу дощу та родючості Тлалоку. Поблизу розташоване святилище бога вітру — Еекатля. Згодом цей величний комплекс став духовним серцем міста, де жерці здійснювали жертвоприношення та обряди заради підтримання вселенського порядку."
  flavor_azt.80.title: "[target_character.GetNameWithNoTooltip]"
  flavor_azt.80.desc: "[target_character.GetName] — головний зодчий #L [ROOT.GetCountry.GetAdjective|l]ого#! Троїстого союзу, а заодно — перша людина, яка удостоїлася звання «сіуакоатль», тобто вище за нього стоїть тільки верховний правитель. [target_character.GetNameWithNoTooltip] незамінний: він встиг послужити кільком тлатоані, і тепер майже жодні державні питання не вирішуються без його участі. Він організовує наші військові походи та займається фінансами, а також заміщає тлатоані на час його відсутності.\n\nАле що найважливіше, [target_character.GetNameWithNoTooltip] — головний поборник поклоніння Уїцилопочтлі та намагається прищепити народу належну повагу як до самого божества, так і до військових звичаїв, нерозривно пов'язаних з його ім'ям."
  flavor_azt.80.a: "Нашим божеством-покровителем стане Уїцилопочтлі."
  flavor_azt.80.b: "Нехай пантеон очолить Кетцалькоатль."
  flavor_azt.80.c: "Верховним божеством стане Тескатліпока."
  flavor_azt.80.historical_info: "Тлакаелель — один із найважливіших діячів імперії ацтеків, який таємно користувався величезним впливом на державну владу при кількох тлатоані. На посаді верховного жерця та старшого радника Тлакаелель провів серйозні релігійні зміни: на чолі ацтекського пантеону він помістив Уїцилопочтлі, а людські жертвоприношення зробив традиційною нормою, оголосивши їх священним обов'язком. Крім цього він влаштовував так звані квіткові війни, які стабільно забезпечували імперію бранцями, і боровся зі старими переказами, щоб створити Теночтітлану більш одноманітний та міфологізований образ. Офіційно Тлакаелель ніколи не обіймав посаду правителя, але саме його діяльність заклала основи майбутньої могутності ацтекської імперії."
  flavor_azt.90.title: "Голодний рік одного кролика"
  flavor_azt.90.desc: "Час — замкнене коло. Усе, що вже траплялося раніше, неминуче трапиться знову. Наближається рік одного кролика, а отже, скоро почнуться снігопади та заморозки, а після них — посуха.\n\nПогода цього року нещадна; народ гине від страшного голоду. Доведені до відчаю батьки продають дітей у рабство, аби прогодувати решту сім'ї. Деякі не бачать іншого виходу, окрім як шукати кращого життя в інших краях — якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] почує їхні благання та дарує їм свободу."
  flavor_azt.90.a: "Доведеться дозволити народу переселятися."
  flavor_azt.110.title: "Рівновага сил у Троїстому союзі"
  flavor_azt.110.desc: "#L [ROOT.GetCountry.GetAdjective]а#! Імперія — багато в чому єдина країна, але все-таки, по суті, це союз трьох міст — #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтітлана#!#!, #TOOLTIP:LOCATION,tetzcoco,X #L Тецкоко#!#! та #TOOLTIP:LOCATION,tlacopan,X #L Тлакопана#!#!. Коли союз тільки утворився, сили перших двох міст були рівні: Теночтітлан мав грізне військо, тоді як у Тецкоко були добре розвинені законодавство, інженерна справа та мистецтво. Імперія розросталася, а разом з нею розвивалися й міста-засновники. Сьогодні у Теночтітлана найсильніші та найпідготовленіші воїни, а тому він шанується вище за всіх інших, і багато підпорядкованих міст платять данину безпосередньо йому."
  flavor_azt.110.a: "Продовжимо зосереджувати владу в Теночтітлані."
  flavor_azt.110.b: "Постараємося зміцнити Тецкоко."
  flavor_azt.120.title: "Правові реформи Несауалькойотля"
  flavor_azt.120.desc: "Зазвичай питаннями законодавства в мезоамериканських країнах займаються судді з підпорядкованих міст, однак #L [ROOT.GetCountry.GetAdjective|l]а#! країна велика, а тому закони в ній занадто сильно різняться від місця до місця. Щоб покласти край безладам у [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их володіннях та впровадити одноманітність, правитель #TOOLTIP:LOCATION,tetzcoco,X #L Тецкоко#!#! Несауалькойотль склав новий звід суворих законів та визначив у ньому покарання за ті чи інші злочини.\n\nЩоб місцеві судді не нехтували виконанням цих законів, у зводі заодно прописані покарання для суддів, які не дотримуються приписів."
  flavor_azt.120.a: "Негайно приймемо ці закони!"
  flavor_azt.120.b: "Наші діди справлялися — впораємося і ми."
  flavor_azt.130.title: "Європейські хвороби"
  flavor_azt.130.desc: "Після того як на наші землі ступили європейці, народ почав страждати від незвичайних і вкрай смертоносних хвороб. Дедалі частіше людей вражає лихоманка, а на шкірі у них виступають пухирі. Всі без винятку вражені: невже ми накликали на себе гнів богів? Кожен гадає, які ще труднощі нам уготовані в ці страшні роки."
  flavor_azt.130.a: "Боги відреклися від нас?"
  flavor_azt.140.title: "Коколіцтлі"
  flavor_azt.140.desc: "На наших землях лютує загадкова хвороба, страшна й незрозуміла. Нічого подібного ми не бачили ні до прибуття європейців, ні після. Вона супроводжується лихоманкою та кровотечею, а смерть від неї настає всього за кілька днів. Хвороба поширюється стрімко, жахаючи людей… Найбільш забобонні стверджують: це кара богів, яких ми прогнівили."
  flavor_azt.140.a: "Хай змилостивляться над нами боги."
  flavor_azt.150.title: "Епідемія віспи"
  flavor_azt.150.desc: "Після прибуття на нашу землю європейців народ почав стрімко гинути від незвичайних і вкрай смертоносних хвороб. Дедалі частіше людей вражає лихоманка, а на шкірі у них виступають пухирі. Всі без винятку вражені."
  flavor_azt.150.a: "Який жах!"
  many_pops_will_perish_tt: "Багато [Concept('pops', 'груп населення')|e] в наших [Concept('locations', 'місцевостях')|e] #R гинуть#!"
  flavor_azt.160.title: "Створення нової династії"
  flavor_azt.160.desc: "Багато хто намагався звести походження нашої династії до #TOOLTIP:CULTURE,$toltec_culture_tt$,X #L тольтеків#!#!, що правили до нас. Сучасникам вони запам'яталися грандіозними архітектурними спорудами та красою своєї столиці Тули, розташованої поблизу #TOOLTIP:LOCATION,tenochtitlan,X #L Теночтітлана#!#!, а ім'я своє вписали в історію величезними золотими літерами. Не раз висувалися припущення, що ми — прямі наступники цих великих правителів і можемо, спираючись на їхнє ім'я, зайняти гідне місце під сонцем…"
  flavor_azt.160.a: "Ми — нащадки носіїв великої тольтекської культури!"
  flavor_azt.160.b: "Ми самі напишемо свій літопис на сторінках бойової слави."
  52_year_cycle_title: "Церемонія нового вогню"
  52_year_cycle_desc: "[GetCurrentYear] рік. #L [ROOT.GetCountry.GetCulture.GetName]ий#! народ збирається в нашому великому [target_location.Custom('LR_PREP')|l] [target_location.GetName] на церемонію нового вогню. Жерці готуються розпалити величезне багаття; всі присутні мало не тремтять від нетерпіння. Коли сонце нарешті сідає за обрій, всі голоси замовкають, а серця починають битися в єдиному ритмі. Головні жерці, одягнені в витіюваті головні убори з прикрасами з пір'я та яскраві церемоніальні шати, висікають іскру зі своїх божественних знарядь, щоб запалити вогонь. Всі затамували подих, сповнені благоговійного трепету, — від успіху цього обряду залежить ні багато ні мало доля всього світу.\n\nЯскраве полум'я рветься до небес, і його гарячі спалахи освітлюють наші обличчя ніжним помаранчевим світлом. Ми єдині у своїй вірі, скуті єдиними звичаями, нерозривно пов'язані зі світобудовою. Ця церемонія необхідна, щоб нагадати нам про вічний священний обов'язок — підтримувати вселенський порядок. Дивлячись на полум'я, що танцює під чорними небесами, ми розуміємо, що нашій цивілізації уготована велика доля, оскільки ми віддали богам те, що їм належить."
  52_year_cycle_a: "Наші жертвоприношення повернуть сонце на небосхил!"
  52_year_cycle_b: "Час провести скромну церемонію."
  52_year_cycle_c: "Тисячі тіней затьмарять сонце."
  52_year_cycle_d: "Нажиті багатства стануть відображенням нашого благополуччя!"
