  flavor_azt.200.title: "Перевлаштування Великого храму Теночтітлана"
  flavor_azt.200.desc: "#TOOLTIP:BUILDING_TYPE,great_temple_of_tenochtitlan,X #L Великий храм Теночтітлана#!#! в [target_location.Custom('LR_PREP')|l] [target_location.GetName] гордо височіє вже кілька століть поспіль. Вигляд його змінюється відповідно до того, як зростає наша велич, а богам приносяться все нові жертви. Щоб нам і далі супроводжувало процвітання, мислити слід на кілька кроків вперед: можливо, храм знадобиться розширити — зрозуміло, відповідно до наших звичаїв і календаря."
  flavor_azt.200.a: "Хай почнеться розширення!"
  flavor_azt.200.b: "Це занадто дорого…"
  flavor_azt.210.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] і церемонії коронації"
  flavor_azt.210.desc: "Небосхил тьмяніє, але [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip|l] [ROOT.GetCountry.GetCapital.GetName] не квапиться занурюватися в темряву: жерці починають запалювати вогні. [ROOT.GetCountry.GetGovernment.GetRuler.GetName], вбравшись у складні шати, надягнувши вишуканий головний убір і взявши в руки символи свого сану, чекає благословення на правління.\n\nНайважливіша частина церемонії — принесення в жертву полонених воїнів. Кожен вівтар має обагритися кров'ю, щоб боги змилостивилися і дарували нам процвітання."
  flavor_azt.210.a: "Проллємо кров заради довгих років достатку!"
  flavor_azt.210.b: "Ми не можемо дозволити собі жертвоприношення."
  flavor_azt.210.c: "Боги отримають належне…"
  coronation_sacrifice_tt: "Замість того, щоб принести в жертву полонених, ми проллємо кров своїх царствених осіб, щоб умилостивити богів. [ROOT.GetCountry.GetCapital.GetRank.GetNameWithNoTooltip] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] забарвиться в червоний."
  flavor_azt.220.title: "[target_lake.GetNameWithNoTooltip] гнівається"
  flavor_azt.220.desc: "[target_lake.GetName] завжди давало нам усе необхідне для процвітання, насамперед — їжу. Однак шляхи богів несповідимі, і часом світобудова нагадує нам, наскільки насправді ми нікчемні. Цього разу боги наслали на нас страшні повені. Озеро вийшло з берегів і забрало з собою безліч нещасних. Жерці стверджують, що божества розгнівані й тому вирішили покарати нас…"
  flavor_azt.220.a: "Ми беззахисні перед стихіями…"
  flavor_azt.220.b: "Ми вкладемо кошти у відновлення."
  flavor_azt.230.title: "Цомпантлі [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_azt.230.desc: "Перемоги над ворогами даються чималою ціною, але всі багаторічні зусилля варті того: володіння наші надійно захищені, а народ розвивається і процвітає. Боги милосердні й дарують нашим воїнам захист, а нам — достаток полонених, яких жерці приносять у жертву.\n\nЗавдяки їм ми звели величезний #italic цомпантлі#! — стіну з черепів переможених супротивників і всіх, хто наважився стати на шляху нашої країни. Їхні голови тепер красуються на нашому частоколі, нагадуючи народу про стежку війни, на яку нам довелося стати. Така ж незавидна доля чекає кожного нашого ворога."
  flavor_azt.230.a: "Ніхто не наважиться кидати нам виклик!"
  flavor_azt.230.b: "Ми розтрощимо їх, і вітер розвіє їхній прах…"
  flavor_azt.240.title: "[moctezuma_scope.GetShortNameWithNoTooltip]: піднесення"
  flavor_azt.240.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не відчуває нестачі в умілих управлінцях і кмітливих вождях, однак член нашої родини [moctezuma_scope.GetName] [Select_CString(moctezuma_scope.IsFemale,'зуміла', 'зумів')] здивувати всіх тим, що бездоганно справляється зі своїми обов'язками і при дворі, і під час релігійних святкувань. Як і належить [Select_CString(moctezuma_scope.IsFemale,'всякій юній спадкоємиці', 'всякому юному спадкоємцю')], [Select_CString(moctezuma_scope.IsFemale,'вона', 'він')] з дитинства [Select_CString(moctezuma_scope.IsFemale,'переймала', 'переймав')] багаті культурні та релігійні традиції нашого народу, а також уважно [Select_CString(moctezuma_scope.IsFemale,'вивчала', 'вивчав')] історію, військову справу та мистецтво управління.\n\nНещодавно [Select_CString(moctezuma_scope.IsFemale,'вона проявила', 'він проявив')] себе як неймовірно [Select_CString(moctezuma_scope.IsFemale,'талановита вчена', 'талановитий вчений')], без труда розібравшись у складному устрої нашого календаря та релігійних обрядів. Однак [moctezuma_scope.GetShortNameWithNoTooltip] — людина не тільки розумової праці: [Select_CString(moctezuma_scope.IsFemale,'вона', 'він')] так само [Select_CString(moctezuma_scope.IsFemale,'здатна', 'здатний')] і на полі бою."
  flavor_azt.240.a: "Роки [Select_CString(moctezuma_scope.IsFemale,'її', 'його')] правління увійдуть в історію!"
  flavor_azt.240.b: "[Select_CString(moctezuma_scope.IsFemale,'Її', 'Його')] час скоро настане."
  flavor_azt.240.historical_info: "Моктесума правив майже два десятки років, з 1502 по 1520 рік. За час його правління Ацтекська імперія досягла свого найбільшого територіального охоплення, але водночас почала рухатися до своєї загибелі. Він зосередив владу у своїх руках і обклав підданих важкою даниною, чим порушив традиційні відносини правителя з місцевими вождями та своїми власними радниками і спровокував заворушення в країні. Коли в 1519 році на землі ацтеків прийшли іспанські конкістадори під командуванням Ернана Кортеса, імператор завагався, мабуть, прийнявши Кортеса за земне втілення бога Кетцалькоатля. У підсумку Моктесума потрапив у полон, що підірвало владу ацтеків. Його правління закінчилося з падінням ацтекського опору і початком іспанського завоювання. Кажуть, у своє буття імператором Моктесуму часто терзали сни про комети, пожежі та дивні фігури — знаки прийдешнього кінця його імперії."