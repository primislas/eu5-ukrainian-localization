l_russian:
  flavor_mei.1.title: "Срібна лихоманка у Фрайберзі"
  flavor_mei.1.desc: "Нещодавно виявлені #TOOLTIP:GOODS,silver,X #L срібні#!#! родовища викликали справжній ажіотаж — натовпи людей линули до #TOOLTIP:LOCATION,freiberg,X #L Фрайберга#!#!, сподіваючись розбагатіти на стрімко зростаючих гірничих промислах в #TOOLTIP:PROVINCE_DEFINITION,erzgebirge_province,X #L Рудних горах#!#!. Цей сплеск інтересу до гірничих міст обіцяє нам чималі вигоди."
  flavor_mei.1.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mei.1.a.tt: "Кожна [Concept('location', 'місцевість')|e], де видобувається корисна [Concept('raw_material', 'сировина')|e], отримує модифікатор «[ShowModifier('freiberger_berggeschrey')]»."
  STATIC_MODIFIER_NAME_freiberger_berggeschrey: "Фрайберзька срібна лихоманка"
  flavor_mei.2.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.2.desc: "[Select_CString(target_character.IsFemale, 'Талановита драматургиня та поетеса', 'Талановитий драматург та поет')] [target_character.GetName] [Select_CString(target_character.IsFemale, 'обрала', 'обрав')] нашу країну своїм новим прихистком, щоб продовжити творчу діяльність на наших землях. [Select_CString(target_character.IsFemale, 'Вона вже здобула', 'Він вже здобув')] собі славу визнаного літератора, але явно не збирається зупинятися на досягнутому."
  flavor_mei.2.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_mei.2.b: "Нехай краще вирушає до [target_banish_country.Custom('CL_ACC')]."
  flavor_mei.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.10.desc: "[target_character.GetName] — віртуозний композитор з #TOOLTIP:LOCATION,eisenach,X #L Айзенаха#!#!, нині [Select_CString(target_character.IsFemale,'проживаюча', 'проживаючий')] в #TOOLTIP:LOCATION,leipzig,X #L Лейпцигу#!#!, скаржиться на низьку оплату праці #italic томаскантора#! — [Select_CString(target_character.IsFemale,'керівниці', 'керівника')] відомого хору хлопчиків. [Select_CString(target_character.IsFemale,'Вона', 'Він')] також висловлює бажання вирушити до столиці та стати придворним музикантом."
  flavor_mei.10.a: "Наблизимо [Select_CString(target_character.IsFemale,'її', 'його')] до двору."
  flavor_mei.10.b: "Ми не потребуємо [Select_CString(target_character.IsFemale,'її', 'його')] послуг."
  flavor_mei.10.historical_info: "Йоганн Себастьян Бах був композитором доби бароко та найвідомішим членом родини музикантів з Північної Німеччини. Хоча своїм сучасникам він здебільшого запам'ятався як видатний клавесиніст, органіст та експерт з органів, зараз його вважають одним з найвидатніших композиторів усіх часів."
  flavor_mei.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.20.desc: "[target_character.GetName], будучи [Select_CString(target_character.IsFemale,'близькою подругою', 'близьким другом')] Лютера, гаряче підтримує #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранство#!#!, але також [Select_CString(target_character.IsFemale,'відкрита', 'відкритий')] до співпраці з #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькими#!#! меценатами.\n\n[target_character.GetName] — [Select_CString(target_character.IsFemale,'наша придворна художниця', 'наш придворний художник')], тому ми хвилюємося, що [Select_CString(target_character.IsFemale,'її', 'його')] зв'язки можуть стати для нас проблемою. По всьому континенту #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютерани#!#! та #TOOLTIP:RELIGION,$catholic_tt$,X #L католики#!#! ворогують один з одним, і ми боїмося, що теж будемо втягнуті в конфлікт."
  flavor_mei.20.a: "Всі ми брати у Христі."
  flavor_mei.20.b: "Нехай [Select_CString(target_character.IsFemale,'вона', 'він')] визначиться з вірою."
  flavor_mei.20.historical_info: "Лукас Кранах #italic Старший#! — надзвичайно талановитий німецький художник і гравер доби Відродження, майстер різьблення по дереву та гравюри. Він був придворним живописцем саксонських курфюрстів і малював німецьких принців та видатних лідерів протестантської реформації.\n\nТакож він був близьким другом Мартіна Лютера і гаряче підтримував його ідеї. Його роботи вражають різноманітністю. Він писав і релігійні сюжети в католицькій традиції, і релігійно-філософські новаторські роботи, створені під впливом лютеранства. Попри це, на багатьох його дивовижних полотнах релігійного або міфологічного змісту зустрічаються оголені фігури.\n\nХудожники з його майстерні безліч разів копіювали його шедеври. Коли Лукас Кранах Старший помер, його син Лукас Кранах Молодший та інші живописці продовжували відтворювати його полотна, щоб вшанувати пам'ять видатного німецького художника та зберегти його спадщину."
  flavor_mei.30.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.30.desc: "[target_character.GetName] — математик, філософ, [Select_CString(target_character.IsFemale,'науковиця', 'науковець')] та дипломат — веде насичене життя. Народ може пишатися [Select_CString(target_character.IsFemale,'її', 'його')] вражаючими досягненнями одразу в кількох галузях.\n\nНа жаль, [Select_CString(target_character.IsFemale,'її', 'його')] допитлива натура прагне нових вражень, тому [Select_CString(target_character.IsFemale,'вона', 'він')] довго не затримується на одному місці, подорожуючи по всій Німеччині. Якщо ми хочемо, щоб [Select_CString(target_character.IsFemale,'вона', 'він')] і далі [Select_CString(target_character.IsFemale,'приносила', 'приносив')] нам користь, ми повинні вкласти кошти в [Select_CString(target_character.IsFemale,'її', 'його')] дослідження і якось утримати [Select_CString(target_character.IsFemale,'її', 'його')] у своїй країні."
  flavor_mei.30.a: "Вкладемо гроші в [Select_CString(target_character.IsFemale,'її', 'його')] дослідження."
  flavor_mei.30.b: "Прибережемо гроші для інших цілей."
  flavor_mei.30.historical_info: "Готфрід Вільгельм Лейбніц — блискучий ерудит XVII–XVIII століть, який зробив значний внесок у розвиток таких наук, як математика, філософія та природознавство. Він відомий своїми передовими роботами в галузі математичного аналізу та незалежно від Ньютона розробив принципи диференціального та інтегрального числення, які лягли в основу сучасної математики. Він також створив філософську систему, що отримала назву монадологія, та відстоював ідею про початкову гармонію всесвіту."
  flavor_mei.40.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.40.desc: "[target_character.GetName] — відомий мандрівний хірург, який подорожує по #TOOLTIP:AREA,upper_saxony_area,X #L Верхній Саксонії#!#!, #TOOLTIP:AREA,bohemia_area,X #L Богемії#!#! та #TOOLTIP:AREA,silesia_area,X #L Сілезії#!#!, пропонуючи свої послуги.\n\n[Select_CString(target_character.IsFemale,'Її', 'Його')] майстерність не викликає питань. Однак [Select_CString(target_character.IsFemale,'вона', 'він')] вірить у магію та її зв'язок з медициною, і цей факт може призвести до великого скандалу."
  flavor_mei.40.a: "Зробимо [Select_CString(target_character.IsFemale,'її', 'його')] нашим придворним окулістом."
  flavor_mei.40.b: "Людину, яка вірить у подібне, не можна підпускати до нашого правителя."
  flavor_mei.40.historical_info: "Георг Бартіш, видатний німецький лікар і хірург, зробив значний внесок у розвиток медицини. У XVI столітті він написав одну з перших книг про захворювання очей та їх лікування, яку назвав Ophthalmodouleia. Ця праця лягла в основу офтальмології. Передові ідеї Бартіша та розроблені ним хірургічні методи пролили світло на природу багатьох очних хвороб та мали величезний вплив на розвиток офтальмології як галузі медицини."
  flavor_mei.50.title: "Розквіт Дрездена"
  flavor_mei.50.desc: "Відтоді, як у 1455 році невелике поселення #TOOLTIP:LOCATION,dresden,X #L Дрезден#!#! отримало складочне право, воно повільно, але неухильно зростало.\n\nМісто розташоване на річці Ельбі, що полегшує торгівлю, а також недалеко від Рудних гір з багатими покладами. Дехто вважає, що перенести столицю до Дрездена — чудова ідея."
  flavor_mei.50.a: "Дрезден стане нашою новою столицею."
  flavor_mei.50.b: "Дрезден вже став важливим містом!"
  flavor_mei.50.historical_info: "Хоча Дрезден був малозначним містом до того, як саксонські правителі зробили його своєю резиденцією в 1485 році, він завоював славу культурного центру та одного з найзначніших міст Священної Римської імперії."
  flavor_mei.60.title: "Різдвяний подарунок"
  flavor_mei.60.desc: "Щороку в #TOOLTIP:LOCATION,dresden,X #L Дрездені#!#! проходить різдвяний ярмарок, що отримав назву #italic «Дрезден Штріцельмаркт»#!, на якому жителі Дрездена та найближчих міст продають і купують різні товари. Цей ярмарок проходить з 1434 року, коли міська рада отримала такий привілей.\n\nРинок завжди приносить великий прибуток, але цього року він перевершив усі очікування, тому міська рада вирішила подарувати нам частину доходу від зборів. Наші радники вирішують, як вчинити з цими грошима."
  flavor_mei.60.a: "Гроші зайвими не бувають."
  flavor_mei.60.b: "Вкладемо ці кошти в розвиток Дрездена."
  flavor_mei.60.historical_info: "Дрезден Штріцельмаркт — найстаріший різдвяний ярмарок Німеччини, що згадується в документах, і одна з головних визначних пам'яток Дрездена."
  flavor_mei.70.title: "Вимоги побудувати нову #italic Фрауенкірхе#!"
  flavor_mei.70.desc: "Серед жителів #TOOLTIP:LOCATION,dresden,X #L Дрездена#!#! — міста, в цілому лояльного короні, — зростає обурення. Більшість містян сповідує іншу віру, і їм потрібен власний храм, де вони могли б відправляти богослужіння.\n\nВони просять знести стару церкву Богоматері або #italic Фрауенкірхе#! і на її місці побудувати новий храм в іншому стилі. Вони кажуть, що готові оплатити будівництво, однак ми побоюємося, що їхніх коштів не вистачить. Крім того, якщо ми підемо у них на поводу, то створимо небезпечний прецедент."
  flavor_mei.70.a: "Дозволимо їм зруйнувати церкву і перебудувати її на свій смак."
  flavor_mei.70.b: "Вони повинні прийняти нашу віру."
  flavor_mei.70.historical_info: "До Реформації в церкві Фрауенкірхе розташовувалася кафедра преосвященного єпископа Дрездена-Майсена. Однак в добу Реформації Фрауенкірхе перетворилася на протестантський храм. У 1727 році церкву знесли, а на її місці звели великий просторий собор. Містяни вирішили самостійно перебудувати його в лютеранську парафіяльну церкву і несподівано отримали підтримку від саксонського принца-курфюрста Фрідріха Августа I, який прийняв католицтво, щоб стати королем Польщі. На його кошти був побудований вражаючий купол, а жителі Саксонії остаточно переконалися, що до них не буде застосовуватися відомий принцип #italic «чия країна, того й віра»#!."
  flavor_mei.80.title: "«Страждання юного Вертера»"
  flavor_mei.80.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale,'молода письменниця', 'молодий письменник')] — [Select_CString(target_character.IsFemale,'набула', 'набув')] широкої відомості в літературних колах після виходу [Select_CString(target_character.IsFemale,'її', 'його')] роману #italic «Страждання юного Вертера»#!. Цей твір зазнав серйозної критики через згубний вплив на читачів. Кілька людей покінчили з собою, наслідуючи головного героя, який страждає через нещасливе кохання. Художня цінність роману незаперечна, однак він може становити небезпеку для особливо вразливих натур."
  flavor_mei.80.a: "Все одно наблизимо автора до двору."
  flavor_mei.80.b: "Нам не потрібен автор з поганою славою."
  flavor_mei.80.historical_info: "У своєму романі #italic «Страждання юного Вертера»#! Гете описує важкі переживання і трагічну долю головного героя — Вертера. Книга вийшла в 1774 році, відразу стала літературною сенсацією і породила культурний феномен, що отримав назву #italic «ефект Вертера»#!. Цим терміном позначали сплеск наслідувальних самогубств, викликаний романтизацією саморуйнівної любові. Сильний вплив, який книга справила на почуття і вчинки читачів, став предметом широкої дискусії про відповідальність мистецтва перед суспільством."
  flavor_mei.90.title: "Трагедія Фауста"
  flavor_mei.90.desc: "Наш придворний драматург [target_character.GetName] вже кілька місяців працює над постановкою за мотивами легенди про Йоганна Георга Фауста.\n\n$faust_desc$"
  flavor_mei.90.a: "Приголомшлива п'єса!"
  flavor_mei.90.historical_info: "#italic «Фауст»#! Йоганна Вольфганга фон Гете — це відома трагічна п'єса у двох частинах, які називаються #italic «Фауст. Частина 1»#! та #italic Фауст. Частина 2#!. Більш рання версія тексту, #italic «Прафауст»#!, була написана між 1772 і 1775 роками, але точні дати залишаються невідомими. #italic «Прафауст»#! складається з двадцяти двох сцен і являє собою поєднання прози та римованих віршів. Хоча оригінальний рукопис було втрачено, у 1886 році було знайдено його копію.\n\nПерший уривок п'єси був виданий у 1790 році під назвою #italic «Фауст. Фрагмент»#!. У 1806 році Гете завершує #italic «Першу частину»#!, яка виходить у 1808 році, а в 1828–1829 роках публікує перевидання. У #italic другій частині «Фауста»#!, закінченій у 1831 році, Гете звертається до таких тем, як психологія, історія, політика, містика та філософія, завдяки чому ця частина стає кульмінацією пізньої творчості автора. Вся #italic перша#! і майже вся #italic друга#! частина написані у віршах і входять до репертуару багатьох німецьких театрів. Зараз #italic «Фауст»#! вважається головним твором Гете і шедевром німецької літератури."
  flavor_mei.100.title: "Нова ратуша в Лейпцигу"
  flavor_mei.100.desc: "Члени міської ради #TOOLTIP:LOCATION,leipzig,X #L Лейпцига#!#! звернулися до нас за допомогою в модернізації Старої ратуші. У XIV столітті наші предки профінансували будівництво будівлі для міської адміністрації.\n\nЗ тих пір, як її було зведено в південній частині центрального ринку Лейпцига, минуло 200 років. На жаль, Стара ратуша занадто мала і не відповідає потребам сучасної ради.\n\nНам запропонували вкласти кошти в новий проєкт, виконаний у стилі саксонського Відродження. Якщо ми погодимося, то візьмемо участь у будівництві, мабуть, найприголомшливішої ратуші в усій країні."
  flavor_mei.100.a: "Ми допоможемо містянам."
  flavor_mei.100.b: "Це їхня справа."
  flavor_mei.100.historical_info: "Стара ратуша, розташована в самому серці Лейпцига, — це прекрасний витвір ренесансної архітектури, збудований у XVI столітті. Її приголомшливий фасад прикрашений хитромудрими скульптурами та декоративними елементами. Ратуша була домом для міської ради, а з її дивовижної вежі відкривається панорамний вид на Лейпциг. Нині вона є символом багатої історії та культурної спадщини міста."
  flavor_mei.110.title: "Цвінгер"
  flavor_mei.110.desc: "Надивившись на чудові палаци, зведені іншими правителями, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша володарка', 'наш володар' )] [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'вирішила', 'вирішив' )] створити щось подібне.\n\n[ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'поділилася', 'поділився' )] своїми планами з придворним архітектором, і той незабаром представив амбітний план палацового комплексу з розкішними садами, виставковими галереями та бібліотечними залами. [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Наша правителька', 'Наш правитель' )] у повному захваті, але такий грандіозний проєкт вимагає серйозних вкладень. Як ми вчинимо?"
  flavor_mei.110.a: "Приголомшлива ідея!"
  flavor_mei.110.b: "Ще один палац?"
  flavor_mei.110.historical_info: "Цвінгер — це палацовий комплекс у стилі бароко з розкішними садами, який спроєктував Маттеус Даніель Пьоппельман. Він вважається головним архітектурним пам'ятником Дрездена поряд з культовою Фрауенкірхе. За часів правління Августа Сильного палацовий комплекс з його прекрасними оранжереями та садами був місцем проведення святкувань. Його просторі павільйони та галереї, прикрашені скульптурами та дорогоцінними вазами, демонструють розкіш тієї доби.\n\nЗа задумом Цвінгер мав стати переднім двором нового замку, але той так і не був збудований. У XIX столітті палацовий комплекс перетворився на величезний музей. Такий статус остаточно закріпився за ним після зведення галереї Земпера з видом на Ельбу, ця споруда замикає двір Цвінгера з північного боку.\n\nУ 1945 році Цвінгер був зруйнований під час бомбардування Дрездена. Його повна реставрація зайняла два десятиліття. Зараз у Цвінгері розміщуються такі знамениті музеї, як Галерея старих майстрів, Зібрання порцеляни та Фізико-математичний салон, які чекають на відвідувачів, що бажають дізнатися більше про історію та культуру Німеччини."
  flavor_mei.120.title: "Придбання [GetCountry('LDB').Custom('CL_GEN')]"
  flavor_mei.120.desc: "[target_character.GetName] та [target_spouse.GetName] одружилися, і голові нової родини дісталася спадщина — [GetCountry('LDB').GetLongName]. Тепер [Select_CString(target_character.IsFemale,'власниця', 'власник')] хоче продати цю країну нам.\n\nНе так давно землі Ландсберга входили до нашої країни, і зараз у нас з'явилася нагода повернути їх собі. Як нам вчинити?"
  flavor_mei.120.a: "Ці землі належать нам."
  flavor_mei.120.b: "Ми продали їх не просто так."
  flavor_mei.120.historical_info: "Спочатку маркграфство Ландсберг належало Веттінам, а в 1291 році було продано Асканіям. У 1347 році герцог Магнус I Брауншвейг-Люнебурзький продав маркграфу Фрідріху II Мейсенському маркграфство, яке успадкував після шлюбу з Софією Бранденбург-Стендаль, маркграфинею Ландсберзькою, і тим самим знову об'єднав землі Веттінів."
  flavor_mei.121.desc: "[GetCountry('MEI').GetName] поча[GetCountry('MEI').Custom('end_vlaloly')] активні переговори про купівлю #ONCLICK:COUNTRY,[GetCountry('LDB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LDB').Custom('CL_tt')],X [GetCountry('LDB').Custom('CL_GEN')|L]#!#!! Якщо [target_character.GetName] погодиться, нашій автономії кінець, але ще не пізно запобігти угоді — можливо, [target_spouse.GetName] вплине на [Select_CString(target_character.IsFemale, 'її', 'його' )] рішення."
  flavor_mei.121.a: "Продати ці землі — правильне рішення."
  flavor_mei.121.a.tt: "Ми продовжимо грати за [GetCountry('MEI').Custom('CL_ACC')]"
  flavor_mei.121.b: "Ми не можемо розлучитися з цією землею!"
  flavor_mei.122.desc: "[GetCountry('LDB').GetName] раптово припини[GetCountry('LDB').Custom('end_vlaloly')] усі переговори про продаж своїх земель. У нас не залишилося іншого вибору, окрім як домогтися свого силою."
  flavor_mei.122.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  flavor_mei.130.title: "Пропозиція імператора"
  flavor_mei.130.desc: "[target_character.GetName] з #ONCLICK:COUNTRY,[GetCountry('SWB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWB').Custom('CL_tt')],X [GetCountry('SWB').Custom('CL_GEN')|L]#!#! [Select_CString(target_character.IsFemale,'померла', 'помер')], не залишивши спадкоємця, і тепер [Select_CString(target_character.IsFemale,'її', 'його')] місце вільне.\n\nМи повинні якнайшвидше знайти гідного кандидата.\n\nНаші радники вважають, що [GetCountry('MEI').GetGovernment.GetRulerTitle|l] з #ONCLICK:COUNTRY,[GetCountry('MEI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MEI').Custom('CL_tt')],X [GetCountry('MEI').Custom('CL_GEN')|L]#!#! — [Select_CString(GetCountry('MEI').GetGovernment.GetRuler.IsFemale,'чудова претендентка', 'чудовий претендент')]. Якщо ми зробимо [Select_CString(GetCountry('MEI').GetGovernment.GetRuler.IsFemale,'її правителькою', 'його правителем')] #ONCLICK:COUNTRY,[GetCountry('SWB').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWB').Custom('CL_tt')],X [GetCountry('SWB').Custom('CL_GEN')|L]#!#!, то [Select_CString(GetCountry('MEI').GetGovernment.GetRuler.IsFemale,'вона', 'він')] ніколи цього не забуде."
  flavor_mei.130.a: "Чудова ідея!"
  flavor_mei.130.b: "[Select_CString(GetCountry('MEI').GetGovernment.GetRuler.IsFemale,'Вона не гідна', 'Він не гідний')] такої честі"
  flavor_mei.130.historical_info: "У 1423 році Фрідріх Войовничий, маркграф Мейсена, придбав герцогство Саксен-Віттенберг, а також право виборця, внаслідок чого маркграфство Мейсен увійшло до складу курфюрства Саксонія і втратило свій незалежний статус."
  flavor_mei.131.title: "Пропозиція імператора"
  flavor_mei.131.desc: "[GetCountry('SWB').GetLongName] — правитель цієї країни помер, не залишивши спадкоємця, і тепер трон [GetCountry('SWB').Custom('rank_ua_GEN')|l] пустує. [target_emperor.GetName] пропонує нам стати новим виборцем."
  flavor_mei.131.a: "Ми з честю приймемо [Select_CString(target_emperor.IsFemale,'її', 'його')] пропозицію."
  flavor_mei.131.tt: "Ми станемо курфюрством Саксонія"
  flavor_mei.140.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.140.desc: "[target_ruler.GetName] наполягає на тому, щоб [target_character.GetName], [Select_CString(target_character.IsFemale, 'одна', 'один')] з [Select_CString(target_ruler.IsFemale, 'її', 'його')] найближчих особистих радників, [Select_CString(target_character.IsFemale, 'поступила', 'поступив')] на службу при дворі. Однак багато хто при дворі стривожений, оскільки ходять чутки, що [target_character.GetLastNameWithNoTooltip] володіє більшою владою, ніж [Select_CString(target_ruler.IsFemale, 'сама', 'сам')] [target_ruler.GetNameWithNoTooltip|l]. Це може надати [Select_CString(target_character.IsFemale, 'їй', 'йому')] небувалий дипломатичний вплив і призвести до зловживання владою для досягнення власних амбіцій."
  flavor_mei.140.a: "Дозволимо [Select_CString(target_character.IsFemale, 'їй', 'йому')] вершити наші справи."
  flavor_mei.140.b: "Ми не можемо дозволити [Select_CString(target_character.IsFemale, 'їй', 'йому')] стати сірим кардиналом."
  flavor_mei.140.historical_info: "Генріх фон Брюль був впливовим першим міністром Саксонії та Польщі за часів правління Фрідріха Августа II, також відомого як Август III Польський. Будучи послом і придворним, Брюль фактично десятиліттями контролював саксонську та польську політику, керуючи союзами та державними призначеннями. Він настільки централізував двір під своїм управлінням, що поспілкуватися з королем можна було лише через нього."
  flavor_mei.150.title: "[target_character.GetNameWithNoTooltip]"
  flavor_mei.150.desc: "[target_character.GetName] набуває все більшої популярності завдяки своїм майстерно створеним органам, які, як кажуть, мають неперевершену чистоту звучання, і слава про них розноситься по всій країні. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] висловили бажання найняти [Select_CString(target_character.IsFemale, 'її', 'його')], щоб возвеличити наші церкви та прославити нашу віру, але їм бракує коштів, щоб зробити замовлення."
  flavor_mei.150.a: "[Select_CString(target_character.IsFemale, 'Її', 'Його')] мистецтво зробить нас благочестивішими."
  flavor_mei.150.b: "Ми не можемо дозволити собі подібну розкіш."
  flavor_mei.150.historical_info: "Готфрід Зільберман був одним із найзнаменитіших органних майстрів доби бароко. Працюючи переважно в Саксонії, Зільберман побудував понад 50 органів, відомих своєю тональною пишністю та механічними новаціями. Він удосконалив раніші французькі та німецькі конструкції, поєднуючи майстерність з акустичною інженерією. Його органи здобули захоплення багатьох важливих персон, включно з Йоганном Себастьяном Бахом і Фрідріхом Великим."
  flavor_mei.160.title: "Заснування Лейкореї"
  flavor_mei.160.desc: "Наш регіон давно потребує хорошого освітнього закладу. Деякі [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] виступили з пропозицією заснувати #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName], який би готував юристів, медиків та священнослужителів. Вони готові фінансувати його, але не зможуть самотужки оплатити будівництво, тому розраховують, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] теж допоможуть."
  flavor_mei.160.a: "Нехай сяє світлом знань!"
  flavor_mei.160.b: "У нас зараз немає зайвих коштів."
  flavor_mei.160.historical_info: "Віттенберзький університет, також відомий як Лейкорея, був заснований 1502 року курфюрстом Саксонії Фрідріхом Мудрим, а імператорську хартію йому дарував імператор Максиміліан I. Призначений для підготовки адміністраторів, теологів та юристів для Саксонського курфюрства, незабаром він став колискою Лютеранської реформації, особливо після того, як 1508 року професором був призначений Мартін Лютер, а невдовзі до нього приєднався Філіп Меланхтон."
  flavor_mei.170.title: "Фрайберзький університет"
  flavor_mei.170.desc: "Багатство наших гір полягає не тільки в руді, а й у знаннях, необхідних для її видобутку. Оскільки звичні методи гірничої справи перестають справлятися з труднощами глибших копалень і складної геології, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] пропонує перепрофілювати #TOOLTIP:STATIC_MODIFIER,freiberg_base,X #V #L срібні рудники Фрайберга#!#! і замість цього заснувати #TOOLTIP:BUILDING_TYPE,university,X #L університет#!#!, який зосередиться на сучасних промислових методах видобутку та готуватиме наступне покоління інженерів."
  flavor_mei.170.a: "Фрайберг стане кузнею наукової гірничої справи!"
  flavor_mei.170.b: "Краще розширимо звичні методи."
  flavor_mei.170.c: "Ми не можемо дозволити собі ні того, ні іншого."
  flavor_mei.170.historical_info: "Фрайберзька гірнича академія, заснована 1765 року, є найстарішим у світі університетом гірничої справи та металургії, що діє донині. Вона була створена у відповідь на зростаючу складність видобутку корисних копалин у Рудних горах і на прагнення замінити звичаї емпіричним знанням, що супроводжувало добу Просвітництва. Університет незабаром став зразковим закладом для освіти у сфері гірничої справи по всій Європі, а його студенти навіть відкрили два нові елементи — індій та германій."
  flavor_mei.180.title: "Централізація карбування монет"
  flavor_mei.180.desc: "Століттями монетний двір #TOOLTIP:LOCATION,freiberg,X #L Фрайберга#!#! був одним із найпрестижніших і найпродуктивніших на території [ROOT.GetCountry.Custom('rank_ua_GEN')|l], перетворюючи #TOOLTIP:GOODS,silver,X срібло#! з #TOOLTIP:PROVINCE_DEFINITION,erzgebirge_province,X #L Рудних гір#!#! на валюту, яка використовується в усіх куточках [ROOT.GetCountry.Custom('rank_ua_GEN')|l]. Однак вимоги сучасної адміністрації та грошової стабільності підштовхнули наших радників до думки про централізацію карбування. Вони пропонують конфіскувати всі монетні двори на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! та заснувати єдиний у #TOOLTIP:LOCATION,dresden,X #L Дрездені#!#!, з наглядом над усією країною."
  flavor_mei.180.a: "Централізуємо карбування."
  flavor_mei.180.b: "Нехай кожен регіон карбує власні монети."
  flavor_mei.180.historical_info: "1556 року курфюрст Саксонії Август закрив довго домінуючий монетний двір у Фрайберзі та перемістив усі операції з карбування до Дрездена, коли виявилася повсюдна псування монети на регіональних дворах. Створивши монетний двір поруч зі своєю резиденцією, він отримав прямий контроль над якістю срібла та фінансовою політикою."
  flavor_mei.190.title: "Лейпцизька хунта"
  flavor_mei.190.desc: "У #TOOLTIP:LOCATION,leipzig,X #L Лейпцигу#!#! розгорнулася напружена академічна дискусія, яку ведуть [target_character.GetName], радикальний теолог і професор із #TOOLTIP:LOCATION,wittenberg,X #L Віттенберга#!#!, та відомий схоласт [target_character2.GetName]. Вони обговорюють нові заяви, представлені прихильниками Реформації, такі як те, що влада повинна походити з Писання, а не з усталених звичаїв, що #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,catholic_church,X #L католицька церква#!#! помиляється в тлумаченні доктрин, і що [GetCountry('PAP').GetGovernment.GetRulerTitle|l] не володіє верховною владою з волі божої."
  flavor_mei.190.a: "Не варто в це втручатися."
  flavor_mei.190.b: "Підтримаємо усталені погляди, яких дотримується [target_character2.GetNameWithNoTooltip]."
  flavor_mei.190.c: "[target_character.GetNameWithNoTooltip] порушує цілком обґрунтовані питання."
  flavor_mei.190.historical_info: "Лейпцизький диспут 1519 року був академічною суперечкою в Лейпцизькому університеті між Йоганном Екком та Андреасом Карлштадтом. Диспут розпочався через негативний коментар Екка до 95 тез Лютера і спочатку торкався питань свободи волі та церковної влади. Незабаром він розширився до повномасштабного обговорення легітимності Церкви, переваги Писання над звичаєм та основи Папської влади. Хоча консенсус так і не був досягнутий, диспут значно популяризував реформістські ідеї та сприяв теологічному й політичному розколу всередині Священної Римської імперії."
  flavor_mei.200.title: "Заслужена нагорода"
  flavor_mei.200.desc: "Зять [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] величності, правитель [target_country.Custom('CL_GEN')] [son_in_law.GetName], надав нам велику допомогу під час лиха в #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_PREP')|L]#!#!. Імператору варто щедро нагородити вірного слугу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  flavor_mei.200.a: "Обсиплемо [Select_CString(son_in_law.IsFemale,'її', 'його')] багатствами."
  flavor_mei.200.b: "Служіння імператору — найкраща нагорода."
  flavor_mei.200.historical_info: "Фрідріх II з династії Веттінів був вірним союзником імператора Людвіга IV Баварського. Одружившись на його дочці Матильді, він став ключовою фігурою в стабілізації Бранденбурзької марки після її переходу під контроль Віттельсбахів. За відданість імператорській владі Фрідріх отримав військову та політичну допомогу в зміцненні своїх позицій у Тюрингії та Мейсені."
  flavor_mei.201.title: "Подарунок від імператора"
  flavor_mei.201.desc: "[target_emperor.GetName], [Select_CString(target_emperor.IsFemale, 'імператриця', 'імператор')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! та [Select_CString(target_emperor.IsFemale, 'близька родичка', 'близький родич')] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нашої правительки', 'нашого правителя')] [Select_CString(target_emperor.IsFemale, 'надіслала', 'надіслав')] щедру нагороду за нашу вірність. [Select_CString(target_emperor.IsFemale, 'Вона', 'Він')] особливо відзначає зусилля, які [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'доклала', 'доклав')] для стабілізації #ONCLICK:COUNTRY,[GetCountry('BRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BRA').Custom('CL_tt')],X [GetCountry('BRA').Custom('CL_GEN')|L]#!#! та на підтримку [Select_CString(target_emperor.IsFemale, 'її', 'його')] імператорського правління."
  flavor_mei.201.a: "Передамо нагороду до скарбниці."
  flavor_mei.201.b: "Почнемо карбувати нову монету — Мейсенський грош."
  STATIC_MODIFIER_NAME_meissen_groschen: "Мейсенський грош"
  STATIC_MODIFIER_DESC_meissen_groschen: "Нова монета зміцнює економіку #ONCLICK:COUNTRY,[GetCountry('MEI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('MEI').Custom('CL_tt')],X [GetCountry('MEI').Custom('CL_GEN')|L]#!#!, спрощуючи угоди та переказ капіталу."
  flavor_mei.210.title: "Майсенська порцелянова мануфактура"
  flavor_mei.210.desc: "#TOOLTIP:GOODS,porcelain,X #L Порцеляна#!#! довгий час була предметом великого інтересу, і багато хто безуспішно намагався розкрити секрет її виробництва в істинному вигляді. Однак завдяки безлічі дослідів, проведених нашими найкращими вченими та винахідниками, нам вперше вдалося відтворити порцеляну в #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Щоб захистити це дорогоцінне нововведення та отримати з нього вигоду, багато хто пропонує заснувати державну мануфактуру в #TOOLTIP:LOCATION,meissen,X #L Майсені#!#!."
  flavor_mei.210.a: "Чудова ідея!"
  flavor_mei.210.b: "Краще зосередимося на звичному виробництві."
  flavor_mei.210.historical_info: "Майсенська порцелянова мануфактура була заснована в 1710 році в замку Альбрехтсбург за фінансування Августа Сильного. Це була перша мануфактура в Європі, що виробляла тверду порцеляну, яка раніше імпортувалася лише з Китаю. Це нововведення мало величезний економічний та культурний вплив, перетворивши Саксонію на провідного виробника порцеляни та зміцнивши її престиж по всій Європі."
  flavor_mei.220.title: "Геній [target_character.GetNameWithNoTooltip]"
  flavor_mei.220.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'вразила', 'вразив')] [ROOT.GetCountry.Custom('rank_ua_ACC')|l] своїми вишуканими та майстерними витворами, серед яких складні ювелірні вироби, що поєднують у собі художність і технічну точність. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] пропонує надати [Select_CString(target_character.IsFemale, 'їй', 'йому')] покровительство, оскільки вважає, що за належного фінансування [target_character.GetLastNameWithNoTooltip] зможе значно підвищити наш культурний престиж."
  flavor_mei.220.a: "Запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому')] покровительство."
  flavor_mei.220.b: "[Select_CString(target_character.IsFemale, 'Її', 'Його')] послуги обійдуться занадто дорого."
  flavor_mei.220.historical_info: "Йоганн Мельхіор Дінглінгер був одним із найвидатніших ювелірів свого часу. Його багато прикрашені роботи, часто інкрустовані тисячами дорогоцінних каменів, були символами пишноти саксонського двору. Він часто отримував замовлення від Августа Сильного і зробив великий внесок в естетику Саксонії доби бароко."
  flavor_mei.230.title: "Теорія нептунізму"
  flavor_mei.230.desc: "У Гірничій академії #TOOLTIP:LOCATION,freiberg,X #L Фрайберга#!#! професор [target_character.GetName] [Select_CString(target_character.IsFemale, 'представила', 'представив')] революційну теорію геологічного формування, яку [Select_CString(target_character.IsFemale, 'вона', 'він')] називає нептунізмом. Згідно з [Select_CString(target_character.IsFemale, 'її', 'його')] ідеями, всі гірські породи колись осіли з первісного океану за допомогою кристалізації. Хоча [Select_CString(target_character.IsFemale, 'її', 'його')] лекції приваблюють чимало людей, багато критиків відкидають [Select_CString(target_character.IsFemale, 'її', 'його')] ідеї, які, тим не менш, набувають все більшої популярності в академічних колах."
  flavor_mei.230.a: "Ми підтримаємо розвиток нептунізму!"
  flavor_mei.230.b: "Це не більше ніж спекулятивні домисли."
  flavor_mei.230.historical_info: "Абрагам Готтлоб Вернер був видатним геологом і однією з основоположних фігур сучасної мінералогії. Його теорія нептунізму хоч і була зрештою витіснена плутонізмом, що пояснював формування порід вулканічною активністю, глибоко вплинула на наукову думку по всій Європі та приваблювала студентів до Фрайберга."
  flavor_mei.240.title: "[target_character.GetLastNameWithNoTooltip] прибуває"
  flavor_mei.240.desc: "Знаменна подія сталася в #TOOLTIP:LOCATION,dresden,X #L Дрездені#!#!: до міста [Select_CString(target_character.IsFemale, 'прибула', 'прибув')] [target_character.GetName], [Select_CString(target_character.IsFemale, 'одна', 'один')] з найславетніших [Select_CString(target_character.IsFemale, 'авторок', 'авторів')] опери-серіа в #TOOLTIP:CONTINENT,europe,X #L Європі#!#!, щоб представити свою новітню роботу. Поки містяни стікаються на [Select_CString(target_character.IsFemale, 'її', 'його')] вистави, багато хто при дворі шепочеться, що [target_character.GetLastNameWithNoTooltip], можливо, [Select_CString(target_character.IsFemale, 'могла', 'міг')] б залишитися, якщо ми запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому')] покровительство та вшануємо [Select_CString(target_character.IsFemale, 'її', 'його')] геній."
  flavor_mei.240.a: "Ми зробимо все, щоб [Select_CString(target_character.IsFemale, 'вона залишилася', 'він залишився')]!"
  flavor_mei.240.b: "Це всього лише черговий музикант."
  flavor_mei.240.historical_info: "Йоганн Адольф Гассе був значущим композитором німецького бароко. Його прибуття до Дрездена ознаменувало золотий вік музики при саксонському дворі, особливо за покровительства курфюрстини Марії Йозефи та курфюрста Августа III. Пізніше він служив капельмейстером і відіграв ключову роль у перетворенні Дрездена на центр італійської опери на північ від Альп."
  flavor_mei.1000.title: "Насувається буря"
  flavor_mei.1000.desc: "Відтоді як наш дім здобув #L [GetCountry('THU').GetAdjective|l]ий#! трон Людовінгів, у регіоні тліє напруженість між нами та дрібними лордами. Ми давно прагнули об'єднати [GetCountry('THU').Custom('CL_ACC')] під владою династії #TOOLTIP:DYNASTY,$wettin_dynasty_tt$,X #L Веттінів#!#!, і місцеві графи люто протистояли цьому нашому прагненню. Можливо, настав час нарешті почати працювати над досягненням цієї мети, і завоювання #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! здається ідеальним першим кроком."
  flavor_mei.1000.a: "Ми негайно заявимо свої претензії!"
  flavor_mei.1000.a.tt: "Бачачи нашу відкриту ворожість, влада #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#! може почати пошук союзників."
  flavor_mei.1000.b: "Зараз не час для війни."
  flavor_mei.1000.historical_info: "У 1247 році династія Людовінгів у Тюрингії обірвалася, і трон здобув Генріх Майсенський з династії Веттінів. З моменту цього захоплення влади Веттіни намагалися об'єднати регіон під своїм правлінням, але це відштовхнуло інших князів регіону. У 1342 році місцеві доми зібралися в місті Арнштадт і уклали союз, покликаний протистояти Веттінам. Конфлікт між двома протиборчими групами вилився в Тюринзьку графську війну. Спочатку графи успішно чинили опір, але зрештою війна закінчилася перемогою Веттінів і зміцненням їхньої влади над регіоном."
  flavor_mei.1001.title: "Загроза Веттінів"
  flavor_mei.1001.desc: "Відтоді як династія #TOOLTIP:DYNASTY,$wettin_dynasty_tt$,X #L Веттінів#!#! закріпилася на території #ONCLICK:COUNTRY,[GetCountry('THU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('THU').Custom('CL_tt')],X [GetCountry('THU').Custom('CL_GEN')|L]#!#!, у регіоні тліє напруженість між ними та дрібними лордами. Правителі #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! нещодавно відкрито заявили про прагнення об'єднати регіон під своєю владою, і ходять чутки, що ми можемо стати однією з їхніх перших цілей. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] наполягає, щоб [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] вжили заходів, доки не стало надто пізно. Вони радять відправити послів до сусідніх країн і запропонувати їм союз для протидії загрозі з боку [GetCountry('THU').Custom('CL_GEN')]."
  flavor_mei.1001.a: "Треба діяти швидко."
  flavor_mei.1001.a.tt: "Наші спроби укласти союз, спрямований проти #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#!, можуть вилитися в превентивну війну."
  flavor_mei.1001.b: "Нічого не вдієш."
  flavor_mei.1002.title: "Загроза Веттінів"
  flavor_mei.1002.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] повідомляє про прибуття посла з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, який приніс звістки про величезну загрозу, що походить від династії Веттінів та її амбіцій: вони, нібито, прагнуть об'єднати весь регіон під своєю владою, загрожуючи незалежності як [target_country.Custom('CL_GEN')], так і #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Нам пропонують укласти союз, який утримає їх від нападу на одну з наших країн."
  flavor_mei.1002.a: "Мудра пропозиція."
  flavor_mei.1002.b: "Ми не можемо укладати союзи, спираючись на чутки."
  flavor_mei.1003.title: "Тюринзька графська війна"
  flavor_mei.1003.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] отримує тривожні вісті. [target_country2.GetName] підмовля[target_country2.Custom('end_yeyut')] дрібних лордів регіону створити коаліцію, щоб завадити нашим планам з об'єднання регіону. Хоча дехто вважає, що нам краще відмовитися від цих планів, інші впевнені, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] навпаки повинні завдати удару якомога швидше, доки всі лорди не об'єдналися під прапорами [target_country.Custom('CL_GEN')]."
  flavor_mei.1003.a: "Треба діяти швидко."
  flavor_mei.1003.b: "Противник занадто сильний."
  flavor_mei.1003.historical_info: "Після підписання пакту в 1342 році в Арнштадті дрібні лорди регіону повели війну проти Веттінів, у якій вони прагнули завадити втіленню їхніх амбіцій щодо регіональної переваги. Хоча спочатку їм супроводжував успіх, Веттіни використали стратегію сепаратних мирних договорів, виводячи дрібних лордів з війни одного за одним. Зрештою Веттінам вдалося перетворити їхні землі на свої феоди, по суті зробивши їх васалами та досягнувши своєї мети: об'єднання регіону під владою династії Веттінів."
  flavor_mei.1004.title: "Тюринзька графська війна"
  flavor_mei.1004.desc: "Хоча наші дипломатичні зусилля, судячи з усього, увінчалися успіхом і не дозволили #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! здійснити їхні амбіції щодо об'єднання регіону, багато хто при дворі вважає, що цього недостатньо. Вони пропонують використати наших союзників, щоб приборкати династію #TOOLTIP:DYNASTY,$wettin_dynasty_tt$,X #L Веттінів#!#! і змусити їх раз і назавжди відмовитися від своїх претензій."
  flavor_mei.1004.a: "Найкращий захист — це напад."
  flavor_mei.1004.b: "Ми вже забезпечили свою безпеку."