l_russian:
  flavor_ara.1.title: "Консолято дель маре"
  flavor_ara.1.desc: "Наш новий квазісудовий орган, що забезпечуватиме дотримання норм морського та торговельного права, отримає назву «Консолято дель маре». Завдяки йому купці зможуть залагоджувати торговельні суперечки без втручання королівських судів, а ми, тобто [GetCountry('ARA').GetLongName], заручимося фінансовою допомогою."
  flavor_ara.1.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_ara.1.tt: "В області #TOOLTIP:LAW,maritime_law,X #L морського права#!#! стане доступна [Concept('policy', 'політика')|e] #TOOLTIP:POLICY,ara_consulate_sea,X #L «Консолято дель маре»#!#!"
  flavor_ara.2.title: "Збірник «Консолято дель маре»"
  flavor_ara.2.desc: "Нам запропонували виділити кошти на випуск нового видання збірника #italic Llibre del Consolat de mar#!, також відомого як #italic «Книга морського консульства»#!. Ця книга є зібранням стародавніх морських звичаїв та настанов для військових кораблів, а до доопрацьованого видання також увійде статут Консульського суду — органу, відповідального за дотримання морських законів."
  flavor_ara.2.a: "Проспонсуємо рукопис."
  flavor_ara.2.b: "Залишимо рукопис без уваги."
  flavor_ara.3.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.3.desc: "Італійський поет, каноніст, вчений, дипломат і хроніст [target_character.GetName] зараз приділяє весь вільний час вивченню словесності під покровительством правителя [ROOT.GetCountry.Custom('CL_GEN')]. Він заснував академію Понтаніана, звідки [ROOT.GetCountry.GetGovernment.GetRulerTitle] набирає собі на службу молодих і перспективних вчених. [target_character.GetNameWithNoTooltip] володіє вельми обширними знаннями, а тому розумно буде найняти його як радника."
  flavor_ara.3.a: "Так, наймемо його."
  flavor_ara.4.title: "[target_character2.GetNameWithNoTooltip]"
  flavor_ara.4.desc: "Завдяки зусиллям такого діяча, як [target_character.GetName], один одному були представлені юний вчений [target_character2.GetName] та правитель #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. [ROOT.GetCountry.GetGovernment.GetCourtTitle] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'виявилася настільки вражена', 'виявився настільки вражений')] [Select_CString(target_character2.IsFemale, 'її', 'його' )] інтелектом, що навіть [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'найняла', 'найняв')] [Select_CString(target_character2.IsFemale, 'її', 'його' )] як викладача для свого молодого спадкоємця. [target_character2.GetNameWithNoTooltip] також встиг послужити політичним радником, військовим секретарем і навіть канцлером, проте найбільше він цікавиться наукою.\n\nДосить відомі його трактати, зокрема «Про великодушність принців», «Про жорстокість» та «Про пишність», а також твердження, що кожен великий правитель залишає пам'ять про себе в архітектурі та грандіозних пам'ятниках. Описати навколишню дійсність та умови, в яких проявляються ті чи інші почуття, Понтано здатен класичною, але при цьому ємною та впізнаваною мовою, яку неможливо переплутати з мовою інших авторів.\n\nЙого велика повчальна праця — написана гекзаметром поема «Уранія» — справжній збірник астрономічних знань доби, що переплітається з міфологічними сюжетами. Пише вчений латиною; найбільш самобутні його твори — #italic De conjugali amore#!, #italic Eridanus#!, #italic Tumuli Naeniae#!, #italic Baiae#! — написані у віршах і присвячені особистим почуттям, які виражені палко, але м'яко та щиро."
  flavor_ara.4.a: "Без нас він би ніколи не досяг таких успіхів!"
  flavor_ara.4.b: "Його успіхи — це успіхи нашого народу."
  flavor_ara.5.title: "Монастир Санта-Марія-де-Сіхена"
  flavor_ara.5.desc: "Королівський монастир Санта-Марія-де-Сіхена заснувала кастильська королева Санча, дружина арагонського монарха Альфонсо II. Його будівництво тривало з 1183 по 1208 рік. Сьогодні будівля цього монастиря, відомого своєю прекрасною колекцією романських фресок, занепала, хоча там, як і раніше, живуть черниці. Вони попросили нас підтримати монастир грошима, а якийсь художник, відомий під прізвиськом «Сіхенський майстер», погодився написати для його церкви велику вівтарну картину."
  flavor_ara.5.a: "Виділимо монастирю кошти."
  flavor_ara.5.b: "Не будемо звертати уваги."
  flavor_ara.6.title: "Гільдія селян"
  flavor_ara.6.desc: "[ROOT.GetCountry.GetLongName] зусиллями своєї знаті прикріплює селян до землі. Крім цього, сеньйори починають зловживати своїми правами, викликаючи обурення серед сільських мешканців. Найбідніші з селян відкрито закликають до повстання, тоді як багатші воліють звернутися до нас з проханням провести реформи та припинити знущання з боку сеньйорів.\n\nНам відкрилася чудова можливість заручитися підтримкою селян в протистоянні зі знаттю. Зокрема, пригнобленим можна дозволити заснувати власне товариство. [ShowEstatePrivilegeName('ara_sindicat_ara_remenca')] стане чимось на зразок трудового союзу, який забезпечить їм нові свободи."
  flavor_ara.6.a: "Дозволимо селянам заснувати свою гільдію."
  ara_sindicat_ara_remenca: "Гільдія селян"
  ara_sindicat_ara_remenca_desc: "Гільдія селян (Sindicat Remença) — об'єднання сільських жителів, що нагадує трудовий союз. Вперше з'явилося в 1448 році в Каталонії."
  flavor_ara.6.b: "Не будемо звертати уваги на невігласів."
  flavor_ara.7.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.7.desc: "[Select_CString(target_character.IsFemale, 'Відома єзуїтська проповідниця', 'Відомий єзуїтський проповідник')] та ректор єзуїтської колегії в #TOOLTIP:LOCATION,tarragona,X #L Таррагоні#!#! [target_character.GetName] широко [Select_CString(target_character.IsFemale, 'прославилася', 'прославився')] завдяки своєму видатному інтелекту. Проповіді [Select_CString(target_character.IsFemale, 'її', 'його')] красномовні, а уявлення про моральність та політику глибокі, тому [target_character.GetLastNameWithNoTooltip] користується прихильністю серед жителів не тільки #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, а й інших країн. [Select_CString(target_character.IsFemale, 'Її', 'Його')] релігійні переконання та заглиблення в питання про природу людини свідчать як про духовну, так і про життєву мудрість.\n\nВтім, погляди, яких дотримується [target_character.GetLastNameWithNoTooltip], викликають певні суперечки: у своїх філософських працях [Select_CString(target_character.IsFemale, 'вона', 'він')] виступає проти традиційного мислення, що вже привернуло пильну увагу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#!. Однак навіть попри це, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої країни з радістю прийме у себе таку розумну та вмілу в складних суспільних і політичних реаліях людину — там [Select_CString(target_character.IsFemale, 'вона', 'він')] напевно послужить добру службу."
  flavor_ara.7.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] потребує таких людей. Запропонуємо [Select_CString(target_character.IsFemale, 'їй', 'йому')] посаду."
  flavor_ara.7.b: "Нам ні до чого священник з такою сумнівною славою."
  flavor_ara.7.historical_info: "Бальтасар Грасіан — арагонський єзуїтський священник, філософ і письменник XVII століття. Здобув популярність у рідній Іспанії завдяки глибоким філософським роздумам і тонкому розумінню культурних та політичних особливостей своєї доби; впливав не лише на своїх сучасників, а й на наступні покоління європейських мислителів. Частину своїх особливо спірних праць він опублікував без згоди настоятелів, за що згодом був позбавлений посади ректора та вигнаний з товариства єзуїтів."
  flavor_ara.8.title: "[gracian.GetNameWithNoTooltip] завершує «Критикон»"
  flavor_ara.8.desc: "[Select_CString(gracian.IsFemale, 'Єзуїтська черниця', 'Єзуїтський чернець')] [gracian.GetName], що [Select_CString(gracian.IsFemale, 'перебуває', 'перебуває')] у нас на службі, завершує свій magnum opus — #TOOLTIP:WORK_OF_ART,$el_criticon_tt$,X #L «Критикон»#!#!. Цей грандіозний повчальний епос в іносказальній формі відображає погляди [Select_CString(gracian.IsFemale, 'письменниці', 'письменника')] та [Select_CString(gracian.IsFemale, 'її', 'його')] уявлення про людську природу, моральність та життєві труднощі. Однак видання такої вражаючої праці затьмарене скандалом: перші частини виявилися випущеними без схвалення настоятелів. На адресу автора посипалися звинувачення, а членство [Select_CString(gracian.IsFemale, 'її', 'його')] в ордені єзуїтів опинилося під загрозою. [gracian.GetLastNameWithNoTooltip] [Select_CString(gracian.IsFemale, 'була змушена', 'був змушений')] звернутися до нас по допомогу у виданні повної версії «Критикона», щоб з цією працею могло ознайомитися якомога більше читачів. Якщо ми погодимося, то нащадки запам'ятають нас як покровителів мистецтва та його діячів, однак наші відносини з єзуїтами можуть стати вельми напруженими."
  flavor_ara.8.a: "Така робота заслуговує на визнання!"
  flavor_ara.8.b: "Ми не готові підтримувати настільки спірну творчість."
  flavor_ara.8.historical_info: "#italic El Criticón#! — один із найвидатніших іспанських філософських романів і головна праця письменника Бальтасара Грасіана, опублікована у трьох частинах у 1651—1657 рр. У ньому мовою сатири та алегорій описується життя головного героя — Андреніо, людини імпульсивної та при цьому недосвідченої, тобто такої, що має якості, властиві кожному. Стиль Грасіана можна охарактеризувати як властивий іспанській літературі того часу консептизм — дотепний, що покладається на гру слів та винахідливість. #italic El Criticón#! — твір песимістичний, проте підходить до теми людського життя не без надії та заохочує читача прагнути чеснот і вічної слави."
  flavor_ara.9.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.9.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'відома', 'відомий')] францисканська богослов та [Select_CString(target_character.IsFemale, 'письменниця', 'письменник')], широко [Select_CString(target_character.IsFemale, 'прославилася', 'прославився')] своїми працями, в яких поєднуються елементи теології, політики та етики. Окремі твори, такі як #italic Lo Crestià#!, можна назвати настановами щодо ведення праведного життя та побудови справедливого суспільства, що припадає до вподоби як правителям, так і простим людям. Завдяки своєму красномовству та життєвій мудрості [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'отримала', 'отримав')] запрошення обійняти посаду радника при дворянах та міських правителях #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Можливо, [target_ruler.GetName] теж не відмовиться від такого радника."
  flavor_ara.9.a: "Запросимо [Select_CString(target_character.IsFemale, 'її', 'його')] — [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] від цього лише виграє."
  flavor_ara.9.b: "Нам не потрібні [Select_CString(target_character.IsFemale, 'її', 'його')] поради."
  flavor_ara.9.historical_info: "З працями Ешименіса свого часу познайомилися багато впливових діячів доби, зокрема арагонські королі Мартін I, Педро IV та Хуан I, а також антипапа Бенедикт XIII. Однак вплив письменника поширювався далеко за межі рукописів: так, він відіграв важливу роль у діяльності авіньйонського папства, служив сповідником при королеві Марії де Луні та брав участь у релігійних та політичних дебатах серед сучасників."
  flavor_ara.10.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.10.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'знаменита поетеса', 'знаменитий поет')] родом із #TOOLTIP:LOCATION,valencia,X #L Валенсії#!#!, [Select_CString(target_character.IsFemale, 'що підкорила', 'що підкорив')] серця людей своїми чудовими віршами про любов, моральність та почуття. [target_character.GetLastNameWithNoTooltip] — першопроходець: до [Select_CString(target_character.IsFemale, 'неї', 'нього')] майже не було прийнято писати #TOOLTIP:DIALECT,catalan_dialect,X #L каталонським#!#! діалектом. У своїх віршах [Select_CString(target_character.IsFemale, 'вона', 'він')] відкидає сформовані придворні традиції і натомість досліджує глибини людської душі та філософські питання, що її терзають, що незмінно знаходить відгук у читачів. Наша країна, безсумнівно, досягне нових культурних висот і сприятиме розквіту мистецтв, якщо [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] запросить до себе таку творчу особистість."
  flavor_ara.10.a: "Запросимо [Select_CString(target_character.IsFemale, 'її', 'його')] — [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] від цього лише виграє."
  flavor_ara.10.b: "[Select_CString(target_character.IsFemale, 'Її', 'Його')] вірші — справжній дар для нашого народу, а [ShowLocationNameWithNoTooltip('valencia')] — [Select_CString(target_character.IsFemale, 'її', 'його')] дім; нехай там і залишається."
  flavor_ara.10.c: "Такі розваги нам не по кишені."
  flavor_ara.10.historical_info: "Аузіас Марк — один із найяскравіших поетів так званого Золотого віку валенсійської літератури. Одним із перших почав писати валенсійською мовою замість прийнятої тоді серед трубадурів окситанської. Вірші Марка, що мали чималий вплив на наступне покоління поетів, були присвячені в основному коханню, смерті та смертності."
  flavor_ara.11.title: "[target.GetNameWithNoTooltip]: оновлення"
  flavor_ara.11.desc: "[target_art.GetName] — справжня культурна та духовна гордість нашої країни загалом і #TOOLTIP:LOCATION,zaragoza,X #L Сарагоси#!#! зокрема. Для кожного, хто поклоняється діві Марії, це справжня святиня. Однак час не щадить нічого, і за минулі століття будівля помітно занепала. Стало очевидно, що їй потрібен ремонт. Нам вже почали надходити пропозиції побудувати новий, більш вражаючий храм у стилі бароко на зміну старому. [target_ruler.GetName] вважає, що гідно виконати цю монументальну роботу зможе [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий архітектор [target_character.GetName]."
  flavor_ara.11.a: "Перебудуємо храм і зробимо його ще прекраснішим!"
  flavor_ara.11.b: "Краще замовимо скромний ремонт."
  flavor_ara.11.c: "Ми не можемо дозволити собі такі витрати."
  flavor_ara.11.historical_info: "Відновлення храму Нуестра-Сеньйора-дель-Пілар почалося 1681 року із санкції арагонського віцекороля Хуана Хосе Австрійського, який побажав побудувати на місці колишньої застарілої споруди новий чудовий храм у стилі бароко. Проєкт, розроблений королівським архітектором Франсіско Еррерою, став знаменною віхою в історії архітектури та культури. До 1730 року довжина перебудованого храму становила 130 метрів, а ширина — 67 метрів."
  flavor_ara.12.title: "Боротьба «Ла Біга» та «Ла Буска»"
  flavor_ara.12.desc: "Ще багато десятиліть тому #TOOLTIP:LOCATION,barcelona,X #L барселонське#!#! суспільство розкололося на дві угруповання. Одне одному протистоять #italic «Біга»#! — представники інтересів старої міської олігархії, та #italic «Буска»#! — союз купців та ремісників, які виступають за проведення економічних реформ та ширший доступ до влади. #italic «Біга»#! складається з багатих землевласників та наближених до аристократів почесних громадян. Це угруповання завідує міською владою і міцно тримається за свої привілеї, опираючись будь-яким змінам. #italic «Буска»#!, своєю чергою, закликає до захисту місцевого виробництва, девальвації валюти та поліпшення умов для місцевої промисловості — так вона збирається побороти економічну кризу, що охопила середземноморську торгівлю. Напруженість зростає: #italic «Буска»#! все частіше відмовляється миритися з неможливістю брати участь у міському управлінні та вимагає [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого втручання."
  flavor_ara.12.a: "Підтримаємо «Бігу»."
  flavor_ara.12.b: "Підтримаємо «Буску»."
  flavor_ara.12.c: "Не обиратимемо нікого."
  flavor_ara.13.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]ий хроніст"
  flavor_ara.13.desc: "[target_ruler.GetName] [Select_CString(target_ruler.IsFemale, 'висловила', 'висловив')] бажання замовити велику хроніку #L [ROOT.GetCountry.GetAdjective|l]ої#! історії, щоб ознайомитися з нашою історичною спадщиною могли й майбутні покоління. [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що ніхто не впорається з цим завданням краще, ніж [target_character.GetName]. [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'вивчала', 'вивчав')] риторику, #TOOLTIP:LANGUAGE,latin_language,X #L латинську#!#! та #TOOLTIP:LANGUAGE,greek_language,X #L грецьку#!#! мови, а також чудово володіє кількома сучасними мовами, такими як #TOOLTIP:LANGUAGE,french_language,X #L французька#!#!, #TOOLTIP:LANGUAGE,north_italian_language,X #L галло-італійська#!#! та #TOOLTIP:DIALECT,catalan_dialect,X #L каталонська#!#!. Крім того, [Select_CString(target_character.IsFemale, 'вона вже обіймала', 'він вже обіймав')] високі посади — [Select_CString(target_character.IsFemale, 'засідала', 'засідав')] у міському управлінні Барбастро та [Select_CString(target_character.IsFemale, 'працювала', 'працював')] помічником інквізиторського секретаря, — а тому має необхідний досвід та навички."
  flavor_ara.13.a: "Нехай [target_character.GetLastNameWithNoTooltip] з'явиться до нас: [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] потребує таких людей."
  flavor_ara.13.b: "Такі досвідчені діячі нам не по кишені."
  flavor_ara.13.historical_info: "У 1548 році арагонська корона доручила історику Суріті скласти хроніку королівства. Сурита підійшов до завдання відповідально: його монументальна праця, що отримала назву #italic Anales de la Corona de Aragón#!, охоплює історію Арагону від часів арабських завоювань до правління короля Фердинанда Католика. Відійшовши від прийнятої в середньовічній історіографії традиції спиратися на перекази та чутки на користь архівних записів та особистих бесід, Сурита заклав нові стандарти в історичній науці. Його можна сміливо назвати першим сучасним істориком Іспанії."
  flavor_ara.14.title: "Хроніка [ROOT.GetCountry.Custom('CL_GEN')]"
  flavor_ara.14.desc: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] обговорює складання хроніки, де буде представлена славна історія #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. До неї увійдуть діяння наших монархів — від легендарних королів графства Собрарбе до сучасних правителів. Вже майже визначена людина, якій належить взятися за цю працю: ймовірно, це буде [Select_CString(target_character.IsFemale, 'відома', 'відомий')] вчена, солдат і [Select_CString(target_character.IsFemale, 'цистерціанська черниця', 'цистерціанський чернець')] на ім'я [target_character.GetName]. [target_character.GetLastNameWithNoTooltip] вкрай дбайливо підходить до збереження [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ої спадщини, а також чудово знає історію та вміло володіє мистецтвом прози та віршування. Більш підходящого хроніста неможливо знайти."
  flavor_ara.14.a: "Нехай [target_character.GetLastNameWithNoTooltip] займеться складанням хроніки."
  flavor_ara.14.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] не може дозволити собі витрачати час на такі дрібниці."
  flavor_ara.14.historical_info: "У 1499 році Гуальберто Фабрисіо Вагад опублікував «Арагонську хроніку» — монументальну історичну працю, що стала однією з перших хронік королівства, надрукованих арагонською мовою. У тексті помітний вплив віянь, характерних для історіографії того часу, тобто надання особливої важливості королівській владі, націоналістичні настрої та прославлення досягнень країни. Однак попри те, що в основу хроніки лягли старі та часто ненадійні джерела, ця праця чимало посприяла утвердженню арагонської самосвідомості та ознайомленню жителів країни з її історією."
  flavor_ara.15.title: "[target_ruler.GetNameWithNoTooltip] та постанови"
  flavor_ara.15.desc: "[target_ruler.GetName] збирається встановити звід законів, за якими діятиме [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий дім #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Основне завдання — чітко позначити правила, яких будуть зобов'язані дотримуватися і [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], і чиновники. Також [target_ruler.GetNameWithNoTooltip] має намір встановити порядок проведення церемонії коронації [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их правителів, щоб посвячення та сходження на престол завжди проходили однаково, а обряди мали глибокий символічний сенс."
  flavor_ara.15.a: "Чудова ідея!"
  flavor_ara.15.b: "У цьому немає потреби."
  flavor_ara.15.historical_info: "#italic Ordinacions de Pere el Cerimoniós#! — звід положень, що регулюють діяльність королівського дому, який був виданий у 1344 році арагонським королем Педро IV. Там докладно описані обов'язки та завдання придворних чиновників, а також норми проведення церемонії коронації арагонських монархів. Таким чином ці положення не тільки стали настановою для придворної адміністрації, але й встановили стандарт проведення для обрядів сходження на престол."
  flavor_ara.16.title: "[ShowEstatePrivilegeNameWithNoTooltip('justicia_de_aragon')]"
  flavor_ara.16.desc: "[ShowEstatePrivilegeName('justicia_de_aragon')] — важливий посередник, без якого вже багато століть поспіль не можуть обійтися ні [ROOT.GetCountry.GetLongName], ні стани [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Володар цієї посади стоїть на сторожі [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого права та привілеїв, а також уважно стежить за тим, щоб [ROOT.GetCountry.GetGovernment.GetAdjective|l]а влада не порушувала давні #italic фуерос#! — закони та привілеї [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Однак сьогодні стани виступають за зміцнення незалежності цієї ролі та визнання її на законодавчому рівні: вони вважають, що посада хустісії має бути постійною та успадковуваною, до того ж обирати кандидата будуть самі стани, а не [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l], що призначають своїх ставлеників. Відповідно, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не матиме права позбавляти хустісію повноважень або будь-яким чином заважати його діяльності."
  flavor_ara.16.a: "Поступимося їхнім вимогам."
  flavor_ara.16.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|U] не повинні бути обмежені у владі!"
  flavor_ara.16.historical_info: "Арагонський хустісія — важлива посада в історії Арагонського королівства, заснована в XII столітті. Хустісія був зобов'язаний стежити за дотриманням місцевих законів та привілеїв і виступав як противага королівській владі, а тому мав широкі судові та виконавчі повноваження і навіть міг скасовувати королівські рішення, якщо ті суперечили місцевим законам. Одночасно з цим хустісія очолював парламент і відігравав важливу роль у приведенні нових монархів до присяги. До XIII століття хустісія перетворився на незалежного та безстороннього посередника, який мав право тлумачити так звані форальні закони та захищати свободи королівських підданих, якщо на них посягали монархи."
  flavor_ara.17.title: "Офіційна клятва у вірності"
  flavor_ara.17.desc: "Стани [ROOT.GetCountry.Custom('rank_ru_GEN')|l], що засідають в #TOOLTIP:CULTURE,$aragonese_tt$,X #L арагонських#!#! кортесах, вимагають формального визнання своїх традиційних прав та привілеїв. Вони стверджують, що доки [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не поклянеться дотримуватися #italic фуерос#! (давніх законів та звичаїв, за якими давно живе #TOOLTIP:AREA,aragon_area,X #L Арагон#!#!), [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] не дочекаються від них клятви у вірності. Цю непокору яскраво виражає їхній лозунг: #italic Y si no, no#! — «ні — значить, ні», тобто вони не стануть визнавати нашу владу, якщо [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] не поважатимуть їхні права."
  flavor_ara.17.a: "Поклянемося дотримуватися їхніх прав."
  flavor_ara.17.b: "Ми не підкоримося їхнім вимогам!"
  flavor_ara.17.historical_info: "Фраза #italic Y si no, no#! стала символом неприйняття арагонськими станами своїх монархів, якщо ті не підуть на певні умови: від короля вимагалося поклястися не порушувати права та фуерос, і лише після цього арагонці готові були прийняти його владу. В основу цього принципу лягли такі традиції, як #italic Privilegio de la Unión#!. Своєю завзятістю стани показали, що здатні обмежувати королівську владу та перешкоджати встановленню абсолютизму."
  flavor_ara.18.title: "Зміни в Арагоні"
  flavor_ara.18.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')], що прагнули зосередити владу над [ROOT.GetCountry.Custom('rank_ru_INST')|l] у своїх руках і домогтися централізації цієї влади, зазнали невдачі після потужної відсічі з боку #TOOLTIP:AREA,aragon_area,X #L Арагону#!#!. Стародавні привілеї місцевих жителів та великі повноваження, якими володіє [ShowEstatePrivilegeName('justicia_de_aragon')|l], стали серйозною перешкодою для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої влади. Згідно зі старими традиціями, монарх зобов'язаний поважати свободу #TOOLTIP:CULTURE,$aragonese_tt$,X #L арагонців#!#!, тому [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] не можуть повністю інтегрувати королівство до складу країни під єдиним управлінням. Радники, роздратовані майже повною відсутністю успіхів, вважають, що [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] повинні скасувати ці архаїчні засади."
  flavor_ara.18.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|U] повинні мати абсолютну владу!"
  flavor_ara.18.a.tt: "Усі [Concept('pops', 'групи населення')|e] зі стану #TOOLTIP:POPTYPE,nobles,X #L знаті#!#! в #TOOLTIP:AREA,aragon_area,X #L Арагоні#!#! втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e] та приєднаються до фракції «[target_rebels.GetName]»"
  aragonese_loyalist_rebels: "Арагонські лоялісти"
  flavor_ara.18.b: "Фуеро слід поважати."
  flavor_ara.18.historical_info: "Наприкінці XVI століття в Арагоні відбулася низка політичних конфліктів, названа в іспанській історіографії «змінами». Причиною стала спроба централізації королівської влади в країні, проти чого різко виступив Арагон: місцеве самоврядування тут традиційно перебувало під захистом, а влада монарха була обмежена. У 1591 році королівське втручання в місцеві справи призвело до сплеску невдоволення та збройного повстання, придушеного військами Філіпа II. Після цього Арагон значною мірою втратив традиційну автономію."
  flavor_ara.19.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] доля"
  flavor_ara.19.desc: "Нам вдалося обмежити самоврядування #TOOLTIP:AREA,aragon_area,X #L Арагону#!#! та вплив місцевих інститутів, однак у час змін багато хто все ж рішуче виступив проти наших дій. Серед цих людей і [target_character.GetName] — колись [ShowEstatePrivilegeName('justicia_de_aragon')|l], [Select_CString(target_character.IsFemale, 'головна захисниця', 'головний захисник')] традиційних арагонських законів та привілеїв, а сьогодні [Select_CString(target_character.IsFemale, 'одна', 'один')] з ключових керівників повстання, [Select_CString(target_character.IsFemale, 'яка вважає', 'який вважає')] наші дії незаконною спробою підірвати незалежність регіону. На щастя, наші війська вже заарештували [Select_CString(target_character.IsFemale, 'її', 'його')], і тепер доля [Select_CString(target_character.IsFemale, 'бунтівниці', 'бунтівника')] залежить тільки від нас."
  flavor_ara.19.a: "Така ціна єдності."
  flavor_ara.19.a.tt: "Усі [Concept('pops', 'групи населення')|e] в #TOOLTIP:AREA,aragon_area,X #L Арагоні#!#! втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  flavor_ara.19.b: "Пощадимо [Select_CString(target_character.IsFemale, 'її', 'його')], щоб послабити напруженість."
  flavor_ara.19.b.tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pops', 'груп населення')|e] в #TOOLTIP:AREA,aragon_area,X #L Арагоні#!#! зросте на [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%]"
  flavor_ara.19.historical_info: "У 1591 році арагонець на ім'я Хуан де Лануса підняв повстання проти короля Філіпа II та його спроб централізувати владу в обхід стародавніх законів та інститутів Арагону. Королівські війська рішуче придушили бунт і захопили Ланусу в полон. За особистим наказом короля бунтівник був обезголовлений, навіть не дочекавшись суду. Його смерть поклала край останній значущій спробі відстояти традиційну правову систему та незалежність Арагону від абсолютистських домагань."
  flavor_ara.20.title: "[target_character.GetNameWithNoTooltip]"
  flavor_ara.20.desc: "Відомий лицар та [Select_CString(target_character.IsFemale, 'вчена', 'вчений')] [target_character.GetName], член ордену Святого Іоанна, користується чималою славою в Середземномор'ї: [Select_CString(target_character.IsFemale, 'її', 'його')] ім'я — символ військової доблесті та просвіти. [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'відома', 'відомий')] своїм внеском не тільки у військові та управлінські справи, а й у поширення знань: так, завдяки [Select_CString(target_character.IsFemale, 'її', 'його')] зусиллям чимало класичних праць було перекладено на #TOOLTIP:DIALECT,aragonese_dialect,X #L арагонську#!#! та #TOOLTIP:LANGUAGE,latin_language,X #L латинську#!#! мови. [ROOT.GetCountry.GetGovernment.GetCourtTitle] вважає, що [target_character.GetLastNameWithNoTooltip] — справжнє втілення лицарських ідеалів та мистецтва управління країною; людина, яких на світі дуже мало. [Select_CString(target_character.IsFemale, 'Її', 'Його')] захоче прийняти [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] будь-якої країни, в тому числі й нашої. [Select_CString(target_character.IsFemale, 'Вона', 'Він')] може або вступити на службу до нас, або застосувати свої стратегічні таланти на полі бою. [ROOT.GetCountry.GetLongName] — тут це оцінять."
  flavor_ara.20.a: "Нам потрібні [Select_CString(target_character.IsFemale, 'її', 'його')] дипломатичні та військові таланти."
  flavor_ara.20.c: "Нехай і далі служить ордену Святого Іоанна."
  flavor_ara.20.historical_info: "Хуан Фернандес — знаменитий іспанський лицар, великий магістр ордену госпітальєрів. Зіграв найважливішу роль у битві при Епілі, де підтримав арагонського короля Педро IV, який виступив проти Арагонської унії. Будучи великим магістром, покровительствував авторам історичних та літературних праць, зокрема — перекладів на арагонську мову."
  flavor_ara.21.title: "Повстання херманій"
  flavor_ara.21.desc: "Невдоволення та напруженість, що охопили народ #TOOLTIP:AREA,valencia_area,X #L Валенсії#!#!, вилилися у справжній заколот. Місцеві херманії — братства — втомилися від утисків та непідйомних поборів, яким їх піддають [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а також від слабкості, яку раз за разом виявляють [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l], нездатні захистити їх під час нальотів берберських піратів. Будучи не в силах все це терпіти, вони взялися за зброю. Рух за захист громад швидко розрісся і тепер вимагає широких реформ. Ці люди вважають, що наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('crown_estate')|l] тільки виграють, якщо підуть їм назустріч, однак нападки, яким піддаються [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l], та загальна безкомпромісність руху викликають побоювання."
  flavor_ara.21.a: "Не будемо звертати уваги."
  flavor_ara.21.a.tt: "Усі [Concept('pops', 'групи населення')|e] зі стану #TOOLTIP:POPTYPE,burghers,X #L містян#!#! у #TOOLTIP:AREA,valencia_area,X #L Валенсії#!#! втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e] та приєднаються до фракції «[target_rebels.GetName]»"
  flavor_ara.21.b: "Визнаємо їхні труднощі та запропонуємо компенсацію."
  flavor_ara.21.c: "Придушимо заколот."
  germanies_revolt: "Повстання херманій"
  flavor_ara.21.historical_info: "Повстання херманій — заколот у королівстві Валенсія, що входило до складу Арагонської корони. Його розпочали гільдії ремісників, що збунтувалися проти короля Карла V. Причиною повстання стали важке матеріальне становище, напруга в суспільстві та нетерпимість до феодальної та королівської влади: ремісники більше не могли миритися із засиллям дворян-землевласників та корупцією в уряді, а також безвладдям, що було спричинене відсутністю короля, який тоді перебував у Німеччині. Свою роль зіграло й невдоволення діями королівської ради та місцевих чиновників."
  flavor_ara.100.title: "«Тірант Білий»"
  flavor_ara.100.desc: "У [GetCurrentYear] році [Select_CString(target_artist.IsFemale, 'валенсійська письменниця', 'валенсійський письменник')] [target_artist.GetName] [Select_CString(target_artist.IsFemale, 'опублікувала', 'опублікував')] лицарський роман #italic «Тірант Білий»#!. Він оповідає про пригоди шляхетного Тіранта, який рятує #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_ACC')|L]#!#! від #L [GetCountry('TUR').GetAdjective|l]их#! турків. У #TOOLTIP:CULTURE,$catalan_tt$,X #L каталонських#!#! читацьких колах ця книга вже здобула значну популярність — не в останню чергу завдяки тому, що оповідь відходить від звичних традицій лицарського роману; натомість на передній план виходять любов, сарказм, людські почуття та яскраві описи повсякденного життя — настільки достовірні, що часом навіть їдкі."
  flavor_ara.100.a: "Яка ж велика наша культура!"
  flavor_ara.101.title: "«Каталонський атлас»"
  flavor_ara.101.desc: "#italic «Каталонський атлас»#!, складений у [GetCurrentYear] році, — справжня гордість майоркських картографів. Він напевно увійде в історію як найдокладніша мапа світу нашого часу. Атлас намальований на шести аркушах пергаменту, натягнутих на дерев'яні щити. На карту нанесено все, що нам відомо про космографію та астрономію (зокрема позначено круглу форму Землі), а також наведено поради мореплавцям. Картографи зобразили весь відомий нам світ з його океанами, містами та політичними союзами. Східна частина карти складена на основі оповідань мандрівників, західна ж включає в себе все, що тільки має бути на портулані."
  flavor_ara.101.a: "Майоркська школа — гордість нашої країни."
  flavor_ara.102.title: "Королівський пантеон абатства Поблет"
  flavor_ara.102.desc: "[target_character.GetName] останнім часом часто розмірковує, де краще буде спочивати [Select_CString(target_character.IsFemale, 'її', 'його' )] останкам після неминучої кончини. З-поміж усіх монастирів, що стоять на нашій землі, найбільше [ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(target_character.IsFemale, 'зацікавилася', 'зацікавився' )] #TOOLTIP:WORK_OF_ART,$poblet_abbey_tt$,X #L абатством Поблет#!#!. Воно розташоване в [target_location.Custom('LR_PREP')|l] [target_location.GetName] і належить Цистерціанському ордену."
  flavor_ara.102.a: "Тут буде збудовано пантеон для шляхетних та королівських осіб."
  flavor_ara.102.b: "Знать буде незадоволена, але нам і так є на що витратити гроші."
  flavor_ara.103.title: "[target_character.GetNameWithNoTooltip]: хроніка"
  flavor_ara.103.desc: "[target_character.GetName] закінчив складати хроніку, в якій описуються роки влади його батька на ім'я [target_character2.GetName] та доба його власного правління. Праця ця розділена на шість глав, присвячених тим чи іншим подіям, і доповнена додатком.\n\nХроніст поставив перед собою завдання виправдати вчинки, які здійснив [GetCountry('ARA').GetGovernment.GetRulerTitle|l], а заодно докладно описати все, що відбувалося в роки його царювання. Отримана рукопис — справжнє джерело безцінних знань, які неодмінно приведуть нашу країну до процвітання."
  flavor_ara.103.a: "Ми зрозуміли, що влада має бути в руках короля."
  flavor_ara.103.b: "Передача влади — ось наш шлях."
  flavor_ara.104.title: "Королівські верфі в Барселоні"
  flavor_ara.104.desc: "Робітників, які працюють на королівських верфях біля гавані [port_location.Custom('LR_GEN')|l] [port_location.GetName], останнім часом все частіше звинувачують у ліні та безвідповідальності. На розширення старої верфі, що розпочалося в 1241 році, нам довелося виділити з казни значні кошти, а тому ніяк не можна допустити, щоб ці гроші пішли в нікуди.\n\nПісля того як до корабелів дійшли чутки про невдоволення при дворі, вони взяли справу в свої руки і тепер працюють вдень і вночі, закладаючи нові кораблі в спробі виправдати себе в наших очах."
  flavor_ara.104.a: "Чутки були несправедливі."
  flavor_ara.105.title: "Вікентій Феррер"
  flavor_ara.105.desc: "До нашого двору прийшов домініканський монах і проповідник [target_character.GetName] родом з [target_location.Custom('LR_GEN')|l] [target_location.GetName]. За його плечима — не одна місія, а пізнання його в галузі логіки воістину вражаючі. Домініканець [target_character.GetName] присвячує себе вивченню богослов'я і вже домігся популярності на ниві читання філософських лекцій. Завдяки вродженому дару до проповідей та красномовству він здатен знайти спільну мову з кожним, хоча його зв'язки з єврейськими громадами викликають у багатьох занепокоєння."
  flavor_ara.105.a: "Нехай приєднається до нашого двору і проповідує про Христа."
  flavor_ara.105.b: "За нашими мірками він занадто нетерпимий."
  flavor_ara.105.a.tt: "Деякі #TOOLTIP:CULTURE,$sephardi_tt$,X #L сефарди#!#! в нашій країні навернуться в нашу релігію, але в інших це викличе невдоволення"
  flavor_ara.106.title: "Лонха-де-ла-Седа"
  flavor_ara.106.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|U] з [target_location.Custom('LR_GEN')|l] [target_location.GetName] вимагають побудувати для них окрему споруду, де можна буде торгувати #TOOLTIP:GOODS,silk,X #L шовком#!#!. Схоже, вони всерйоз мають намір перетворити місто на важливу ланку торгівлі на Середземному морі. Якщо задум вдасться, ми зможемо залучити сюди купців, а впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] будуть нас підтримувати, і тоді [ShowLocationNameWithNoTooltip('valencia')] займе значуще місце в торгівлі шовком."
  flavor_ara.106.a: "Це піде всім на користь."
  flavor_ara.106.b: "Краще витратимо гроші на щось розумніше."
  flavor_ara.107.title: "Доля Монсеррату"
  flavor_ara.107.desc: "Монастир Санта-Марія-де-Ріполь, закладений 888 року графом Віфредом I Волохатим, здавна виступав осередком культурного життя Каталонії. Протягом багатьох століть його скрипторій не поступався скрипторіям у Монтекассіно чи Сен-Дені, проте з часом слава монастиря поступово згасла. Кошти на його існування, хоч і вельми щедрі, виділяються переважно тому, що тут знаходиться родинна усипальниця графа Барселонського та Бесалу.\n\nВ останні кілька десятиліть дочірній монастир Санта-Марія-де-Монсеррат почав вимагати незалежності від Ріполя. Якщо її підтримати, доля Ріполя буде вирішена; багато хто, втім, вважає такий результат цілком природним."
  flavor_ara.107.a: "Нехай ідуть своїм шляхом."
  flavor_ara.107.b: "Трохи грошей — і Ріполь знову розквітне."
  flavor_ara.108.title: "Санта-Марія-де-Монсеррат"
  flavor_ara.108.desc: "Монастир Санта-Марія-де-Монсеррат, що походить від іншого монастиря — Санта-Марія-де-Ріполь — сьогодні можна сміливо назвати однією з найважливіших обителей ченців нашої країни. Паломників, які приходять сюди поклонитися Чорній Діві Монсерратській, настільки багато, що їм усім просто не вистачає місця, і служителі монастиря звернулися до нас у надії на нашу щедрість.\n\nВони хочуть спорудити собі клуатр, тим самим значно розширивши територію монастиря."
  flavor_ara.108.a: "Ми допоможемо розширити Монсеррат."
  flavor_ara.108.b: "Ми вже допомогли їм здобути незалежність. Що ще їм потрібно?"
  flavor_ara.109.title: "«Смаглявочка»"
  flavor_ara.109.desc: "Незрячий паломник, що прийшов до монастиря Санта-Марія-де-Монсеррат, клянеться, що Чорна Діва Монсерратська, яку тут ласкаво називають #italic La Moreneta#! («смаглявочка»), зцілила його від сліпоти.\n\nСкульптура Діви Марії, яку кілька століть тому випадково знайшли пастуші діти, своє прізвисько отримала через те, що колись світла її шкіра з часом почорніла — ймовірно, через кіптяві свічки."
  flavor_ara.109.a: "Восславимо дари Богоматері!"
  flavor_ara.109.b: "Чудеса, кажете?.."
  flavor_ara.109.b.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] стануть менш [Concept('pop_satisfaction', 'задоволені')|e]"
  flavor_ara.110.title: "Пальмський собор"
  flavor_ara.110.desc: "Після завоювання Майорки [target_character.GetName] [Select_CString(target_character.IsFemale, 'спорудила', 'спорудив')] на місці колишньої мечеті величний $palma_cathedral$ у стилі каталонської готики, що увібрав у себе архітектурні віяння Півночі. Його грандіозний неф заввишки 44 метри всього на чотири метри поступається собору Святого Петра в Бове, а фундамент був закладений ще 1229 року. Багато жителів нашої країни, втім, вважають собор недобудованим, хоча його вже встигли освятити."
  flavor_ara.110.a: "Значить, наш обов'язок — продовжити цю священну працю."
  flavor_ara.110.b: "Нехай цим займається церква."
  flavor_ara.111.title: "Скрутна коронація"
  flavor_ara.111.desc: "У нашій доблесній країні неухильно дотримується звичай, закладений ще королем [GetCharacter('ara_pere_ii_arago').GetName] у роки свого славного правління: [GetCountry('PAP').GetLongName] — ця країна завжди дає благословення на проведення коронації у священних стінах #TOOLTIP:LOCATION,zaragoza,X #L Сарагоського#!#! собору (він же #italic Ла Сео#! або Собор Богоявлення Спасителя). Монарх урочисто клянеться дотримуватися арагонських фуерос, після чого тріумфуючий народ висипає на вулиці міста. Сьогодні настає нова доба, і [new_ruler.GetName] опиняється на роздоріжжі. Перед нами складний вибір: підтримати старі звичаї або ж проявити безстрашність і піти власним шляхом. Втім, про спокійний сон у будь-якому випадку залишається лише мріяти, бо на королівських плечах важким тягарем лежить турбота про країну, і кожна помилка може стати останньою."
  flavor_ara.111.a: "Королі [GetCountry('ARA').Custom('CL_GEN')] ні в кого не просять дозволу."
  flavor_ara.111.b: "Ми принесемо клятву."
  flavor_ara.111.c: "Коронація пройде там, де забажає правитель."
  flavor_ara.111.c.tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] #ONCLICK:COUNTRY,[GetCountry('ARA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ARA').Custom('CL_tt')],X [GetCountry('ARA').Custom('CL_GEN')|L]#!#! прийдуть у лють"
  flavor_ara.200.title: "[GetCountry('MLL').GetAdjectiveWithNoTooltip]е питання"
  flavor_ara.200.desc: "Наш васал — [GetCountry('MLL').GetLongName] — давно вже не приносить нам нічого, крім неприємностей. Правитель цієї країни [majorca_ruler.GetName|l] — непокірна та груба людина, купці вступають у торгові союзи з #L [GetCountry('GEN').GetAdjective|l]ими#! та іншими ринками Західного Середземномор’я всупереч #TOOLTIP:CULTURE,$catalan_tt$,X #L каталонським#!#! інтересам, а посли підписують дипломатичні угоди з нашими суперниками та ворогами, що прямо суперечить нашим наказам. Це неприйнятно!\n\nВтім, вихід є: вони карбують власні монети в обхід #L [GetCountry('ARA').GetAdjective|l]их#! законів, а тому [majorca_ruler.GetShortNameWithNoTooltip|l] може постати перед судом, якщо ми вкажемо на цей факт. Щойно [Select_CString(majorca_ruler.IsFemale, 'вона', 'він')] опиниться в Барселоні, [Select_CString(majorca_ruler.IsFemale, 'її', 'його')] можна буде заарештувати, і тоді питання буде вирішено раз і назавжди."
  flavor_ara.200.a: "Добре. Приступимо до справи."
  flavor_ara.200.b: "Нас не хвилюють підступи дрібних людисьок."
  flavor_ara.201.title: "[GetCountry('ARA').GetAdjectiveWithNoTooltip|U]а тиранія"
  flavor_ara.201.desc: "Наш жорстокий сюзерен і [GetCountry('ARA').GetGovernment.GetRuler.GetName|l] висувають офіційні звинувачення: [majorca_ruler.GetName|l] нібито [Select_CString(majorca_ruler.IsFemale, 'порушила', 'порушив')] #L [GetCountry('ARA').GetAdjective|l]ий#! закон тим, що карбує власні монети, хоча ми всього лиш слідуємо давнім традиціям карбування, що зародилися ще в наших володіннях у Русільйоні.\n\nВід нас вимагають наступного: [majorca_ruler.GetName|l] [Select_CString(majorca_ruler.IsFemale, 'повинна', 'повинен')] вирушити до [target_location.Custom('LR_ACC')|l] [target_location.GetName] і стати там перед судом. Якщо ми відмовимося, нам погрожують оголосити бунтівниками."
  flavor_ara.201.a: "Ми нічого не порушили, і тому нічого не боїмося."
  flavor_ara.201.b: "[GetCountry('ARA').GetGovernment.GetRuler.GetShortName] — слабка, але жадібна людина. Віддавши трохи землі, ми напевно зможемо [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale, 'її', 'його')] заспокоїти."
  flavor_ara.201.c: "Це пастка! Необхідно підготуватися і скинути з себе ярмо гноблення."
  flavor_ara.202.title: "Пастка захлопнулася"
  flavor_ara.202.desc: "[majorca_ruler.GetName] [Select_CString(majorca_ruler.IsFemale, 'прибула', 'прибув')] до [target_location.Custom('LR_ACC')|l] [target_location.GetName], щоб постати перед судом за свої злочини. Наша варта миттєво схопила [Select_CString(majorca_ruler.IsFemale, 'її', 'його')]. Як вчинити тепер?"
  flavor_ara.202.a: "[Select_CString(majorca_ruler.IsFemale, 'Вона винна', 'Він винен')] — і нічого гаяти час. Покінчимо з [Select_CString(majorca_ruler.IsFemale, 'нею', 'ним')]."
  flavor_ara.202.b: "Нехай говорить. Наш суд буде справедливим."
  flavor_ara.202.b.tt: "[majorca_ruler.GetName] [Select_CString(majorca_ruler.IsFemale, 'виправдана', 'виправданий')]"
  flavor_ara.203.title: "Зустрічна пропозиція"
  flavor_ara.203.desc: "[majorca_ruler.GetName] [Select_CString(majorca_ruler.IsFemale, 'відмовилася', 'відмовився')] постати перед судом. Замість цього [Select_CString(majorca_ruler.IsFemale, 'вона', 'він')] пропонує нам купити права, якими володіє [Select_CString(majorca_ruler.IsFemale, 'сама', 'сам')], і [Select_CString(majorca_ruler.IsFemale, 'готова', 'готовий')] назавжди передати короні свої володіння в [target_location.Custom('LR_PREP')|l] [target_location.GetName]."
  flavor_ara.203.a: "Ми згодні — поки що."
  flavor_ara.204.title: "Помста!"
  flavor_ara.204.desc: "Сталася катастрофа! [GetCountry('MLL').GetGovernment.GetPreviousRuler.GetName] [Select_CString(GetCountry('MLL').GetGovernment.GetPreviousRuler.IsFemale, 'убита', 'убитий')]. Це [Select_CString(GetCountry('ARA').GetGovernment.GetRuler.IsFemale,'наказала', 'наказав')] зробити [GetCountry('ARA').GetGovernment.GetRuler.GetName|l]. Розлючений народ закликає до війни."
  flavor_ara.204.a: "До зброї! Смерть тиранам!"
  flavor_ara.204.b: "Зачекайте! Ми поки не готові."
  flavor_ara.210.title: "Братська сварка"
  flavor_ara.210.desc: "[Select_CString(aragon_ruler.IsFemale, 'Наша правителька', 'Наш правитель')] [aragon_ruler.GetName] і [Select_CString(ruler_brother.IsFemale, 'її', 'його')] брат [ruler_brother.GetName] завжди недолюблювали один одного, проте після того, як народилася [aragon_daugther.GetName], стосунки між ними охололи остаточно.\n\n[aragon_ruler.GetShortNameWithNoTooltip] тут же [Select_CString(aragon_ruler.IsFemale, 'постановила', 'постановив')]: [ruler_brother.GetShortNameWithNoTooltip] [Select_CString(ruler_brother.IsFemale, 'повинна бути позбавлена', 'повинен бути позбавлений')] усіх своїх привілеїв і повноважень, якими [Select_CString(ruler_brother.IsFemale, 'володіла', 'володів')] як [Select_CString(ruler_brother.IsFemale, 'спадкоємиця', 'спадкоємець')] країни [GetCountry('ARA').GetLongName]. [ruler_brother.GetShortNameWithNoTooltip] негайно [Select_CString(ruler_brother.IsFemale, 'втекла', 'втік')] до [target_location.Custom('LR_ACC')|l] [target_location.GetName], де [Select_CString(ruler_brother.IsFemale, 'почала', 'почав')] збирати союзників, схиляючи їх на свій бік промовами про те, що [GetCountry('ARA').GetGovernment.GetRulerTitle|l] діє занадто різко й необачно, оскільки не уважить голосу розуму, а піддається ненависті."
  flavor_ara.210.a: "Погана криса! Вигнати [Select_CString(ruler_brother.IsFemale, 'її', 'його')] з [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip], поки не стало занадто пізно!"
  flavor_ara.210.a.tt: "[ruler_brother.GetName] [Select_CString(ruler_brother.IsFemale, 'вигнана', 'вигнаний')] з [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  flavor_ara.210.b: "Запросимо його назад до двору — і обговоримо престолонаслідування."
  flavor_ara.219.title: "Унії більше немає"
  flavor_ara.219.desc: "Повстання уній добігло кінця. Війська їх розгромлені й звернені у втечу, бунтівні міста втихомирені, а змовники відправлені на плаху.\n\n[aragon_ruler.GetName] тріумфує: усі зрадники повалені, а [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName|l] тепер знову може спати спокійно. Настав час вирішити, як слід вчинити з привілеями, здобутими впливом і силою."
  flavor_ara.219.a: "Даною нам владою постановляємо: геть привілеї! Знищити кожну копію!"
  flavor_ara.219.b: "Ми не будемо миритися з тим, що нам нав’язали."
  flavor_ara.219.c: "Знищити старий привілей!"
  flavor_ara.219.d: "[GetCountry('ARA').GetGovernment.GetRulerTitle] може гідно відповісти на будь-який виклик."