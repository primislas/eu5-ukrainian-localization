l_russian:
  flavor_dah_released_desc_common: "[target_character.GetName], вождь племені #TOOLTIP:CULTURE,$fon_tt$,X #L фон#!#!, що мешкає на #TOOLTIP:AREA,gold_coast_area,X #L Золотому Березі#!#!, [Select_CString(target_character.IsFemale,'об’єднала', 'об’єднав')] свій народ під прапором #ONCLICK:COUNTRY,[GetCountry('DAH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAH').Custom('CL_tt')],X [GetCountry('DAH').Custom('CL_GEN')|L]#!#!. Нова держава має чималі амбіції та прагне стати головною силою в #TOOLTIP:REGION,guinea_region,X #L Гвінеї#!#!."
  flavor_dah_released_title_common: "Заснування [GetCountry('DAH').Custom('CL_GEN')]"
  flavor_dah_variable_tt: "#TOOLTIP:PROVINCE_DEFINITION,fon_province,X #L Фон#!#! не було колонізовано"
  flavor_dah.1.title: "$flavor_dah_released_title_common$"
  flavor_dah.1.desc: "$flavor_dah_released_desc_common$"
  flavor_dah.1.a: "[GetCountry('DAH').GetNameWithNoTooltip] впаде до наших ніг!"
  flavor_dah.1.b: "Можливо, настав час для нової великої держави."
  flavor_dah.1.c: "Ми за них раді."
  flavor_dah.2.title: "$flavor_dah_released_title_common$"
  flavor_dah.2.desc: "$flavor_dah_released_desc_common$"
  flavor_dah.2.a: "Отже, у нас нові сусіди?"