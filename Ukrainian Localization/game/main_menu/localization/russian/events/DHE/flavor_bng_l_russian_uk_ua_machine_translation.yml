l_russian:
  flavor_bng.1.title: "[target_artist.GetNameWithNoTooltip] та [Select_CString(target_artist.IsFemale, 'її', 'його' )] вплив"
  flavor_bng.1.desc: "[target_artist.GetName] родом із впливової родини прославився на ниві науки та літераторства; він щиро відданий справі збереження вчень суфійського ордену Чишті на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Його підтримують і [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], а тому ми, ймовірно, зможемо домогтися більшої поваги у людей, якщо запросимо його до двору та запропонуємо йому фінансову допомогу. Тоді вплив ордену в нашій державі тільки зросте, а його цінності вкоріняться."
  flavor_bng.1.a: "Надати йому покровительство!"
  flavor_bng.1.b: "Він нам не потрібен."
  flavor_bng.1.historical_info: "Нур Кутб Алам наприкінці XIV — на початку XV століття очолював суфійський орден Чишті в Бенгалії, який традиційно користувався покровительством з боку бенгальських султанів. Під його керівництвом орден зберіг свою ісламську сутність навіть у роки правління індуса Раджі Ганеші."
  flavor_bng.2.title: "[target_artist.GetNameWithNoTooltip]: літературна творчість"
  flavor_bng.2.desc: "Під нашим покровительством #L [ROOT.GetCountry.GetCulture.GetName|l]а#! культура процвітає, а [ROOT.GetCountry.GetCapital.GetName] сьогодні — улюблене місце для багатьох творців. До них належить і [target_artist.GetName] — автор епосу про #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! пророків. Сам твір є перекладом твору #italic «Касас аль-анбія»#! — «Розповіді про пророків» — на #TOOLTIP:LANGUAGE,bengali_language,X #L бенгальську#!#! мову. Якщо ми виділимо кошти на видання рукопису, то, можливо, література нашою рідною мовою досягне небачених раніше висот."
  flavor_bng.2.a: "З цього почнеться нова літературна епоха!"
  flavor_bng.2.b: "Не варто витрачати гроші на це."
  flavor_bng.3.title: "[target_character.GetNameWithNoTooltip] та місто мечетей"
  flavor_bng.3.desc: "[target_character.GetName], [Select_CString(target_character.IsFemale, 'яку', 'якого' )] виховали місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], [Select_CString(target_character.IsFemale, 'перетворила', 'перетворив' )] околиці #TOOLTIP:LOCATION,khalifatabad,X #L Халіфатабада#!#! на прекрасне місто, забудоване мечетями та мостами. Завдання це виявилося не з легких, оскільки Халіфатабад розташований у дельті річки Ганг, проте вмілим людям до снаги навіть неможливе. Сьогодні місто бурхливо розвивається і незабаром може стати головним серед усіх інших міст, де карбують монети."
  flavor_bng.3.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_bng.4.title: "Монетні міста Бенгалії процвітають"
  flavor_bng.4.desc: "Після того як ми побудували в #TOOLTIP:AREA,bengal_area,X #L Бенгалії#!#! нові монетні двори, економіка почала помітно зростати. Безперервне надходження монет не тільки забезпечує надійність нашій валюті, але також приваблює до міст і портів заморських купців."
  flavor_bng.4.a: "Ми багаті!"
  flavor_bng.5.title: "Мечеть Адіна в Пандуї"
  flavor_bng.5.desc: "[target_character.GetName] хоче урочисто відзначити здобуття нашої незалежності, яку ми з таким трудом відвоювали у тиранів з #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#!. Для цього передбачається прикрасити нещодавно побудований у #TOOLTIP:LOCATION,pandua,X #L Пандуї#!#! #TOOLTIP:BUILDING_TYPE,cathedral,X #L кафедральний собор#!#!. Замовляти виконання цієї довгої та важкої роботи слід лише найкращим архітекторам, які чудово розбираються в стилях #TOOLTIP:REGION,persia_region,X #L Персії#!#! та #TOOLTIP:REGION,crescent_region,X #L Родючого півмісяця#!#!. Витрати будуть відповідно високими, зате ми продемонструємо іншим свою пишність і навіки залишимо слід в історії."
  flavor_bng.5.historical_info: "Мечеть Адіна, розташована в столиці Бенгальського султанату Пандуї, була побудована в 1373 році на замовлення Сікандар-шаха. Архітектори її надихалися перськими мечетями епохи Сасанідів, а також Великою мечеттю Дамаска. Мечеть Адіна була спроєктована з єдиною метою: підкріпити імперські прагнення султанату та прославити здобуті в XIV столітті перемоги над Делійським султанатом — саме таким чином молода держава відвоювала собі незалежність."
  flavor_bng.5.a: "Чудовий план."
  flavor_bng.5.b: "У нас немає грошей на таку розкіш."
  flavor_bng.6.title: "Сусідні держави"
  flavor_bng.6.desc: "[target_character.GetName] всерйоз [Select_CString(target_character.IsFemale, 'має намір', 'має намір' )] об'єднати #TOOLTIP:REGION,bengal_region,X #L Бенгалію#!#!. Для цього [Select_CString(target_character.IsFemale, 'вона', 'він' )] поступово збирає військо та навмисно влаштовує зіткнення на кордонах із сусідами в надії розв'язати війну."
  flavor_bng.6.a: "Бенгалія буде єдиною!"
  flavor_bng.6.b: "Стабільність для нас важливіша."
  flavor_bng.7.title: "[target_location.GetNameWithNoTooltip]"
  flavor_bng.7.desc: "[target_location.GetRank.GetName] [target_location.GetName] найбільше полюбився суфійським ученим #TOOLTIP:REGION,bengal_region,X #L Бенгалії#!#!. Вулиці його багатолюдні, а жителі звикли до процвітання. Можливо, настав час навіть передати цьому [target_location.Custom('LR_DAT')|l] статус #L [ROOT.GetCountry.GetAdjective|l]ої#! столиці."
  flavor_bng.7.a: "Нехай [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] процвітає!"
  flavor_bng.7.b: "[target_character.GetNameWithNoTooltip] воліє засідати в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]."
  flavor_bng.8.title: "Претендент-індус"
  flavor_bng.8.desc: "#TOOLTIP:RELIGION,$hindu_tt$,X #L Індуїстське#!#! населення #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! цілком виступило на підтримку [Select_CString(target_character.IsFemale, 'місцевої правительки', 'місцевого правителя' )]. [target_character.GetName] — людина низького походження, остаточно [Select_CString(target_character.IsFemale, 'втомлена', 'втомлений' )] від #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! влади в [ROOT.GetCountry.Custom('CL_PREP')]. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] хоче узурпувати престол [ROOT.GetCountry.Custom('CL_GEN')], яким зараз володіє [target_character2.GetName]."
  flavor_bng.8.a: "Можливо, і справді час змінити управління…"
  flavor_bng.8.b: "До зброї!"
  bng_muslim_nobles_become_disloyal_tt: "Усі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] з #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстських#!#! [Concept('pops', 'груп населення')|e] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('estate_satisfaction', 'задоволення')|e]"
  bng_hindus_become_disloyal_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх ##TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстських#!#! [Concept('pops', 'груп населення')|e] знизиться на [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%]"
  flavor_bng.9.title: "Поширення суфізму"
  flavor_bng.9.desc: "Суфізм давно вкорінився серед жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Про це свідчать не тільки численні святилища, а й те, що вченню суфізму частково слідує навіть [ROOT.GetCountry.GetGovernment.GetCourtTitle|l]. Можливо, представникам цієї релігії знадобиться наша фінансова допомога…"
  flavor_bng.9.a: "Ми допоможемо поширити суфізм."
  flavor_bng.9.b: "Не варто витрачати на це кошти."
  flavor_bng.10.title: "Бенгалія понад усе"
  flavor_bng.10.desc: "Надра #TOOLTIP:REGION,bengal_region,X #L бенгальських#!#! земель відрізняються багатством, а тому [target_character.GetName] і [Select_CString(target_character.IsFemale, 'її', 'його' )] [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] прагнуть ними заволодіти та звести там нові міста, забезпечивши економічне панування #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  flavor_bng.10.a: "Почнемо розростатися всередину."
  flavor_bng.10.b: "Ми й так уже досягли непоганих успіхів в економіці."
  flavor_bng.11.title: "Традиції кораблебудування"
  flavor_bng.11.desc: "#L [ROOT.GetCountry.GetCulture.GetName]ому#! народу колись були покірні #TOOLTIP:PROVINCE_DEFINITION,bengal_high_sea_zones_province,X #L бенгальські відкриті води#!#!. Нам належало не тільки узбережжя, а й торгові шляхи, що пролягали там, а наш флот колись був одним із найсильніших в #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#!. Час відродити стародавні традиції — для цього чудово підійде порт [target_location.Custom('LR_GEN')|l] [target_location.GetName]."
  flavor_bng.11.a: "Наш флот буде процвітати."
  flavor_bng.11.b: "Земля важливіша за море."
  bng_buff_naval_parliament_debate_tt: "Протягом #Y 20#! років «[ShowParliamentIssueType('increase_naval_spending')]» даватиме #G +5%#! до [Concept('societal_values', 'суспільних цінностей')|e] #TOOLTIP:SOCIETAL_VALUE,land_vs_naval,X #L флоту#!#!"
  flavor_bng.12.title: "$firoz_minar$"
  flavor_bng.12.desc: "[target_character.GetName] настільки [Select_CString(target_character.IsFemale, 'одержима', 'одержимий' )] архітектурою, що навіть [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] замовити будівництво вежі в дусі #TOOLTIP:DYNASTY,$tughlaq_dynasty_tt$,X #L туглакської#!#! архітектури. Ця споруда під назвою $firoz_minar$ буде присвячена перемогам, які [Select_CString(target_character.IsFemale, 'здобула', 'здобув' )] [target_character.GetNameWithNoTooltip]."
  flavor_bng.12.a: "Головний архітектор побудує нам найвищу вежу!"
  flavor_bng.12.b: "Який сенс від однієї вежі?"
  flavor_bng.13.title: "$dakhil_darwaza$"
  flavor_bng.13.desc: "Щоб зміцнити цитадель [target_location.Custom('LR_GEN')|l] [target_location.GetName], [target_character.GetName] збирається побудувати новий головний вхід до [target_location.Custom('LR_ACC')|l] — $dakhil_darwaza$, найкрасивіші та найграндіозніші ворота в усій #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#!. На це піде чимало коштів, але пишність буде невимовною."
  flavor_bng.13.a: "Побудуємо ці ворота."
  flavor_bng.13.b: "[target_location.GetNameWithNoTooltip] — вже достатньо укріплена місцевість."
  flavor_bng.14.title: "$kusumba_mosque$"
  flavor_bng.14.desc: "У #TOOLTIP:REGION,bengal_region,X #L Бенгалії#!#! чимало мечетей у дусі архітектури династії [target_character.GetDynasty.GetName], і деякі з них зводяться прямо зараз. [target_character.GetName] [Select_CString(target_character.IsFemale,'загорілася', 'загорівся')] ідеєю побудувати ще одну, але в зовсім іншому стилі. [Select_CString(target_character.IsFemale,'Вона', 'Він')] щиро вірить, що $kusumba_mosque$ стане чорною перлиною Бенгалії."
  flavor_bng.14.historical_info: "На вершині своєї могутності бенгальська династія Сурідів побудувала в державі кілька мечетей. Майже всі вони були виконані в одному й тому ж архітектурному стилі. Винятком стала лише мечеть Кусумба — під час її будівництва архітектори відійшли від традицій афганських правителів. Натхненням для них послужили старовинні споруди."
  flavor_bng.14.a: "Ця мечеть буде справді великою."
  flavor_bng.14.b: "Індії не потрібні нові мечеті."
  flavor_bng.14.c: "Вона буде найвеличнішою в усьому ісламському світі."
  flavor_bng_1000_shared: "Відносини з Китаєм"
  flavor_bng.1000.title: "$flavor_bng_1000_shared$"
  flavor_bng.1000.desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединна Держава#!#! з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! як лідером може виявитися цінним союзником. Поки не до кінця зрозуміло, чи зуміємо ми переконати їх допомагати нам у будь-яких конфліктах, однак ми точно можемо відправити туди послів і зміцнити відносини між нами."
  flavor_bng.1000.a: "Варто спробувати."
  flavor_bng.1000.b: "Обійдемося без таких союзників."
  bng_no_diplomatic_ties_tt: "Ми не станемо відправляти послів на територію #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!"
  flavor_bng.1001.title: "$flavor_bng_1000_shared$"
  flavor_bng.1001.desc: "З #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#! до [ROOT.GetCountry.GetCapital.Custom('LR_ACC')|l] [ROOT.GetCountry.GetCapital.GetName] прибули посли. За їхніми словами, вони сподіваються встановити між нашими державами добрі відносини і, можливо, пізнати наше мистецтво державного управління. Завдяки цьому ми можемо спробувати збільшити свій вплив, однак, можливо, було б не надто розумно розкривати чужоземцям особливості нашого укладу."
  flavor_bng.1001.a: "Люб'язно приймемо їх!"
  flavor_bng.1001.b: "Їм тут не місце."
  bng_rejected_agreement_tt: "[target_country2.GetName] не отрим[target_country2.Custom('end_itat')] жодних бонусів"