l_russian:
  flavor_dan_corfitz_ulfeldt.1.title: "[target_character.GetNameWithNoTooltip]"
  flavor_dan_corfitz_ulfeldt.1.desc: "Закінчивши навчання в #TOOLTIP:LOCATION,padova,X #L Падуї#!#!, до #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! [Select_CString(target_character.IsFemale,'повернулася', 'повернувся')] [target_character.GetName]. [Select_CString(target_ruler.IsFemale,'Наша добра', 'Наш добрий')] [target_ruler.GetName] тепло прийняв [Select_CString(target_character.IsFemale,'молоду дворянку', 'молодого вельможу')], одразу запропонувавши [Select_CString(target_character.IsFemale,'їй', 'йому')] місце при дворі. [target_character.GetNameWithNoTooltip] запевняє, що служитиме [ROOT.GetCountry.Custom('rank_ru_DAT')|l] не шкодуючи живота свого."
  flavor_dan_corfitz_ulfeldt.1.marriage.desc: "$flavor_dan_corfitz_ulfeldt.1.desc$\n\nНе встигнувши зійти з корабля, [Select_CString(target_character.IsFemale,'вона одразу взялася', 'він одразу взявся')] залицятися до дочки [Select_CString(target_ruler.IsFemale,'нашої государині', 'государя')]. [target_princess.GetName] з прихильністю приймає ці знаки уваги, і при дворі вже говорять про швидке весілля."
  flavor_dan_corfitz_ulfeldt.1.a: "Весілля — це чудово!"
  flavor_dan_corfitz_ulfeldt.1.b: "[Select_CString(target_character.IsFemale,'Вона', 'Він')] і справді [Select_CString(target_character.IsFemale,'обдарована жінка', 'обдарована людина')]."
  flavor_dan_corfitz_ulfeldt.2.title: "[target_character.GetNameWithNoTooltip] рветься до влади"
  flavor_dan_corfitz_ulfeldt.2.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'запустила', 'запустив')] свої щупальця в усі придворні справи, без [Select_CString(target_character.IsFemale,'її', 'його')] участі не вирішується жодне питання державної політики. Впливова [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вишиковується в чергу, щоб домогтися [Select_CString(target_character.IsFemale,'її', 'його')] прихильності. [target_character.GetNameWithNoTooltip] становить пряму загрозу [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій владі! Якщо не приборкати [Select_CString(target_character.IsFemale,'її', 'його')] амбіції, рано чи пізно [Select_CString(target_character.IsFemale,'вона', 'він')] напевно спробує посісти #L [ROOT.GetCountry.GetAdjective|l]ий#! престол. При дворі вже говорять, що [Select_CString(target_character.IsFemale,'ця жінка', 'цей чоловік')] планує вбивство членів [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої родини…"
  flavor_dan_corfitz_ulfeldt.2.a: "Спробуємо домовитися з [Select_CString(target_character.IsFemale,'нею', 'ним')]."
  flavor_dan_corfitz_ulfeldt.2.b: "Ну, все! [target_character.GetNameWithNoTooltip] — ворог [ROOT.GetCountry.Custom('CL_GEN')]!"
  flavor_dan_corfitz_ulfeldt.3.title: "[target_character.GetNameWithNoTooltip] пропонує гроші"
  flavor_dan_corfitz_ulfeldt_flight_common: "[GetCountry('DAN').GetLongName] — після звинувачення в організації змови, замаху на вбивство та спробі захоплення влади [target_character.GetName] [Select_CString(target_character.IsFemale,'була змушена', 'був змушений')] втекти звідси, з рідної країни. [Select_CString(target_character.IsFemale,'Сама вона', 'Сам він')], звісно, стверджує, що всі звинувачення — лише мерзенний наклеп."
  flavor_dan_corfitz_ulfeldt.3.desc: "$flavor_dan_corfitz_ulfeldt_flight_common$ А щоб довести свою прихильність, [Select_CString(target_character.IsFemale,'вона', 'він')] пропонує нам велику суму грошей.\n\nШвидше за все, ці кошти вкрадені з [GetCountry('DAN').GetAdjectiveWithNoTooltip|l]ої скарбниці. Тим більше причин прийняти їх — [target_ruler.GetName|l] буде тільки [Select_CString(target_ruler.IsFemale,'рада', 'рад')] розпочати війну проти [GetCountry('DAN').Custom('CL_GEN')] на [GetCountry('DAN').GetAdjectiveWithNoTooltip|l]і ж гроші."
  flavor_dan_corfitz_ulfeldt.3.a: "Яка приємна несподіванка."
  flavor_dan_corfitz_ulfeldt.3.b: "Не можна брати золото у зрадників."
  flavor_dan_corfitz_ulfeldt.4.title: "[target_character.GetNameWithNoTooltip] пропонує допомогу"
  flavor_dan_corfitz_ulfeldt.4.desc: "$flavor_dan_corfitz_ulfeldt_flight_common$\n\nКоли між нашими державами почалася війна, [Select_CString(target_character.IsFemale,'її', 'його')] обізнаність у [GetCountry('DAN').GetAdjectiveWithNoTooltip|l]их справах стала вельми доречною. Надані [Select_CString(target_character.IsFemale,'нею', 'ним')] відомості вже допомогли швидко захопити [target_location.Custom('LR_ACC')|l] [target_location.GetName], і якщо так піде й далі, [target_character.GetNameWithNoTooltip] може стати нашим головним козирем у цій війні."
  flavor_dan_corfitz_ulfeldt.4.a: "Чудова новина!"
  flavor_dan_corfitz_ulfeldt.5.title: "[target_character.GetNameWithNoTooltip] стає проблемою"
  flavor_dan_corfitz_ulfeldt.5.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'забезпечила', 'забезпечив')] нам вирішальну перевагу у війні проти #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#!, однак відтоді [Select_CString(target_character.IsFemale,'вона перетворилася', 'він перетворився')] на джерело постійних проблем. Схоже, що звинувачення у змові, через які [Select_CString(target_character.IsFemale,'цій жінці', 'цій людині')] довелося втекти з [GetCountry('DAN').Custom('CL_GEN')], були не такими вже й безпідставними, адже тут [Select_CString(target_character.IsFemale,'вона одразу взялася', 'він одразу взявся')] за старе. Якщо [Select_CString(target_character.IsFemale,'її', 'його')] не зупинити, [target_character.GetNameWithNoTooltip] напевно спробує захопити [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
  flavor_dan_corfitz_ulfeldt.6.title: "[target_character.GetNameWithNoTooltip] пропонує [GetCountry('DAN').GetAdjectiveWithNoTooltip|l]ий трон"
  flavor_dan_corfitz_ulfeldt.6.desc: "До нашого двору [Select_CString(target_character.IsFemale,'прибула', 'прибув')] [target_character.GetName], [Select_CString(target_character.IsFemale,'яка втекла', 'який втік')] з #ONCLICK:COUNTRY,[GetCountry('DAN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DAN').Custom('CL_tt')],X [GetCountry('DAN').Custom('CL_GEN')|L]#!#!, а потім з #ONCLICK:COUNTRY,[origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country.Custom('CL_tt')],X [origin_country.Custom('CL_GEN')|L]#!#! після звинувачень у змові з метою захоплення влади. [Select_CString(target_character.IsFemale,'Вона', 'Він')] горить бажанням помститися і обіцяє нам [GetCountry('DAN').GetAdjectiveWithNoTooltip|l]у корону в обмін на допомогу в завоюванні країни."
  flavor_dan_corfitz_ulfeldt.6.a: "Інтригуюча пропозиція…"
  flavor_dan_corfitz_ulfeldt.6.b: "Як можна вірити цій гадині?"
  flavor_dan_corfitz_ulfeldt.7.title: "[target_character.GetNameWithNoTooltip] втрачає авторитет"
  flavor_dan_corfitz_ulfeldt.7.desc: "[target_character.GetName] не раз [Select_CString(target_character.IsFemale,'намагалася', 'намагався')] захопити владу над нашою державою — як зсередини, так і за допомогою іноземних інтервентів. На щастя, #L [origin_country.GetAdjective|l][Select_CString(target_ruler.IsFemale,'а', 'ий')]#! [target_ruler.GetName|l] [Select_CString(target_ruler.IsFemale,'проявила', 'проявив')] рідкісну розсудливість і [Select_CString(target_ruler.IsFemale,'відмовилася', 'відмовився')] сприяти [Select_CString(target_character.IsFemale,'цій інтриганці', 'цьому інтригану')]. В результаті такого мудрого державного рішення [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale,'втратила', 'втратив')] залишки авторитету при європейських дворах, і можна не сумніватися, що дні [Select_CString(target_character.IsFemale,'її', 'його')] тепер полічені."
  flavor_dan_corfitz_ulfeldt.7.a: "Відповідний кінець для зрадника!"