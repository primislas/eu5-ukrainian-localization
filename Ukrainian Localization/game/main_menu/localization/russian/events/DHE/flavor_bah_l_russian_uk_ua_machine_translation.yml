l_russian:
  flavor_bah.1.title: "[ShowBuildingTypeNameWithNoTooltip('mahmud_gawan_madrasa')]"
  flavor_bah.1.desc: "Щоб зміцнити #TOOLTIP:RELIGION,$shia_tt$,X #L шиїтський#!#! вплив у #TOOLTIP:REGION,deccan_region,X #L Декані#!#!, [target_character.GetName] збирається звести нове медресе. Ця споруда, спроєктована під впливом #TOOLTIP:SUB_CONTINENT,central_asia,X #L центральноазійської#!#! архітектури та названа [ShowBuildingTypeName('mahmud_gawan_madrasa')], стане одним із найвеличніших #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламських#!#! училищ в #TOOLTIP:SUB_CONTINENT,india,X #L Індії#!#!, де осягатимуть науки близько 500 учнів із різних частин світу. У бібліотеці ж зберігатимуться рукописи з усього світу, завдяки чому [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] здобуде неймовірну славу."
  flavor_bah.1.historical_info: "Медресе Махмуда Гавана в Бідарі було побудовано в 1472 році. Проєкт, виконаний в індо-арабському стилі, замовив сам Махмуд Гаван, а спроєктував місцевий знатний архітектор з числа підданих Бахманійського султанату. Гаван, який розраховував зміцнити вплив шиїтської віри, збирався залучити до стін цього медресе вчених з усього світу — тут їм безкоштовно надавалися харчування, проживання та освіта. З часом у бібліотеці медресе накопичилося близько 3000 різних рукописів."
  flavor_bah.1.a: "Розпочнімо будівництво."
  flavor_bah.1.b: "Краще витратимо золото на щось інше."
  flavor_bah_1000_shared: "Трон миру"
  flavor_bah_100_historical_info_shared: "Бірюзовий трон — трон бахманійських султанів, символ їхньої влади над державою. Спорудили його, втім, зовсім не піддані: султанату його підніс у дар Мусунурі Капайя Наяка з Варангала. Спочатку трон призначався для делійського султана Мухаммада ібн Туглака, проте його династія втратила Варангал ще до того, як подарунок встигли доробити."
  flavor_bah.1000.title: "$flavor_bah_1000_shared$"
  flavor_bah.1000.desc: "У #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! є справжній предмет мистецтва — так званий Бірюзовий трон. Нікому з правителів, які засідають нині у #TOOLTIP:LOCATION,warangal,X #L Варангалі#!#!, він більше не знадобиться. Ми можемо вимагати цей артефакт собі і натомість пообіцяти укласти мир, а заодно провести чіткі кордони між двома державами. На цю пропозицію напевно погодяться і [target_character.GetName], і піддані з [target_country.Custom('CL_GEN')]."
  flavor_bah.1000.historical_info: "$flavor_bah_100_historical_info_shared$"
  flavor_bah.1000.a: "Славетна думка. Це й запропонуємо."
  flavor_bah.1000.b: "Навіщо такі витрати, якщо можна просто завоювати їх?"
  bah_target_must_accept_tt: "Щоб ефекти подіяли, #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! потрібно погодитися на нашу пропозицію"
  bah_no_deal_tt: "#ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_DAT')|L]#!#! не відправлять пропозицію"
  flavor_bah.1001.title: "$flavor_bah_1000_shared$"
  flavor_bah.1001.desc: "[target_character2.GetName] з #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_GEN')|L]#!#! вимагає передати їм Бірюзовий трон. В обмін буде укладено мир між нашими державами та закріплено спільні кордони."
  flavor_bah.1001.historical_info: "$flavor_bah_100_historical_info_shared$"
  flavor_bah.1001.a: "Трон в обмін на мир — щедра пропозиція. Ми згодні."
  flavor_bah.1001.b: "Ми не будемо розкидатися своїми рідкісностями в обмін на порожні обіцянки."