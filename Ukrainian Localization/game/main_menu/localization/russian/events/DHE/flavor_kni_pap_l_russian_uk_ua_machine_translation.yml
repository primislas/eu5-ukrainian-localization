l_russian:
  flavor_kni_pap.1.title: "Хрестові походи на Смірну"
  flavor_kni_pap.1.desc: "#L [ROOT.GetCountry.GetReligion.GetGroup.GetAdjective]і#! моряки надзвичайно стурбовані тим, що [crusade_target.GetLongName] — справжній розсадник #L [crusade_target.GetCulture.GetName|l]ого#! піратства. Жалюгідні #L [crusade_target.GetReligion.GetAdjective|l]і#! пірати не мають ані найменшого права страхати добрих християн, і ми не терпітимемо такого приниження! Ми можемо організувати хрестовий похід на ці землі та покласти край безчинствам, що там кояться."
  flavor_kni_pap.1.historical_info: "Між 1343 і 1351 роками відбулося два хрестові походи на Смірну. Під час першого з них християни захопили місцеву цитадель і гавань, але не зуміли зламати оборону акрополя. Щоб відсвяткувати успіх, християни організували в місті службу, під час якої турки напали на тих, хто молився, і перебили військових лідерів. Згодом було організовано Другий хрестовий похід. Його метою стала допомога християнам, які продовжували боротьбу в місті."
  flavor_kni_pap.1.a: "Ніхто не має права погрожувати [ROOT.GetCountry.GetReligion.GetGroup.GetAdjectiveWithNoTooltip|l]им суднам!"
  flavor_kni_pap.1.b: "Яке нещастя!"
  flavor_kni_pap.2.title: "$flavor_kni_pap.1.title$"
  flavor_kni_pap.2.desc: "[papal_state.GetLongName] — звідси до нас прибув гонець із пропозицією взяти участь у поході проти #L [crusade_target.GetAdjective|l]их#! піратів. Кілька десятиліть поспіль ці #L [crusade_target.GetReligion.GetAdjective|l]і#! мерзотники безчинствували в #TOOLTIP:PROVINCE_DEFINITION,aegean_sea_province,X #L Егейському морі#!#!, а тепер почали грабувати #L [papal_state.GetReligion.GetGroup.GetAdjective|l]і#! кораблі. Настав час провчити їх."
  flavor_kni_pap.2.historical_info: "$flavor_kni_pap.1.historical_info$"
  flavor_kni_pap.2.a: "Ми відповімо на заклик."
  flavor_kni_pap.2.b: "Ми поки утримаємося від участі."
  STATIC_MODIFIER_NAME_kni_smyrniote_crusade: "Ревність хрестоносців"
  kni_joined_crusade: "Ми приєдналися до походу на Смірну"
  flavor_kni_pap.3.title: "На нас ідуть хрестоносці!"
  flavor_kni_pap.3.desc: "Жалюгідні #L [papal_state.GetReligion.GetAdjective|l]і#! бовдури з #ONCLICK:COUNTRY,[papal_state.Custom('CL_tt')] #TOOLTIP:COUNTRY,[papal_state.Custom('CL_tt')],X [papal_state.Custom('CL_GEN')|L]#!#! оголосили нам священну війну. Мабуть, нещодавні напади наших піратів припали їм не до вподоби. Час зустрітися з ними на воді та показати, хто справжні господарі #TOOLTIP:PROVINCE_DEFINITION,aegean_sea_province,X #L Егейського моря#!#!."
  flavor_kni_pap.3.historical_info: "$flavor_kni_pap.1.historical_info$"
  flavor_kni_pap.3.a: "Нам потрібно більше кораблів для набігів!"
  flavor_kni_pap.4.title: "Уступка [target_country.Custom('CL_DAT')]"
  flavor_kni_pap.4.desc: "Під час останнього хрестового походу наші доблесні лицарі захопили безліч земель у #TOOLTIP:AREA,west_anatolia_area,X #L Західній Анатолії#!#!, однак наші сподівання утримати ці території, м'яко кажучи, хиткі. [target_country.GetLongName] — можливо, краще передати їх цій країні."
  flavor_kni_pap.4.a: "Ми віддамо ці землі."
  flavor_kni_pap.4.b: "Ми проливали кров за ці території."
  STATIC_MODIFIER_NAME_kni_cession_of_anatolia_to_holy_order: "Передача духовно-лицарському ордену"
  flavor_kni_pap.5.title: "[the_from.GetAdjectiveWithNoTooltip|U]ий подарунок"
  flavor_kni_pap.5.desc: "[the_from.GetLongName] — ця країна збирається передати нам нещодавно захоплені території, посилаючись на нездатність захистити їх у разі нападу чи заколоту. Ми ж розташовуємося на кордоні християнського світу і зможемо краще подбати про ці землі."
  flavor_kni_pap.5.a: "Цей подарунок послужить на благо християнству."
  flavor_kni_pap.5.b: "У нас і так забагато територій."
  flavor_kni_pap.6.title: "Відповідь від [target_country.Custom('CL_GEN')]"
  flavor_kni_pap.6.desc_common: "З #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! прибув гонець із відповіддю на нашу пропозицію про передачу територій."
  flavor_kni_pap.6.desc_accept: "$flavor_kni_pap.6.desc_common$ Вони дякують нам за цей щедрий дар і запевняють, що доблесно захищатимуть ці землі з ім'ям Господа на вустах."
  flavor_kni_pap.6.desc_deny: "$flavor_kni_pap.6.desc_common$ На жаль, вони більше не можуть приєднувати нові території. Нам доведеться призначити бейліфів, які стежитимуть за нещодавно захопленими землями."
  flavor_kni_pap.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  flavor_kni_pap.6.b: "Значить, ці землі наші."