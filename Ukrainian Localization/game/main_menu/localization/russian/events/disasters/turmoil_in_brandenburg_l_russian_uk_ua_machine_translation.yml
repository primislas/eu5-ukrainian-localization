l_russian:
  bra_hre_hyperlink: "[GetUniqueInternationalOrganization('hre').GetName]"
  bra_hre_hyperlink_no_tt: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
  bra_hre_emperor_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
  bra_hre_emperor_country_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
  bra_wittelsbach_hyperlink: "[ShowDynastyName('wittelsbach_dynasty')]"
  bra_wittelsbach_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('wittelsbach_dynasty')]"
  bra_askanier_hyperlink: "[ShowDynastyName('askanier_dynasty')]"
  bra_askanier_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('askanier_dynasty')]"
  bra_variable_counter: "(зараз: #Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_investment_var').GetValue]#!)"
  bra_neglect_variable_counter: "(зараз: #Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_neglect_var').GetValue]#!)"
  bra_wittelsbacher_investment_var: "#Y Вкладення Віттельсбахів#!"
  bra_wittelsbacher_neglect_var: "#Y Нехтування Віттельсбахів#!"
  bra_change_investment_score_add: "$bra_wittelsbacher_investment_var$ — ми отримуємо $VALUE|G0$ $bra_variable_counter$"
  bra_change_investment_score_subtract: "$bra_wittelsbacher_investment_var$ — ми втрачаємо $VALUE|R0$ $bra_variable_counter$"
  bra_change_neglect_score_add: "$bra_wittelsbacher_neglect_var$ — ми отримуємо $VALUE|G0$ $bra_neglect_variable_counter$"
  bra_change_neglect_score_subtract: "$bra_wittelsbacher_neglect_var$ — ми втрачаємо $VALUE|R0$ $bra_neglect_variable_counter$"
  PRU_DEAL_WITH_ROBBER_BARONS_TOOLTIP_IN_PROGRESS: "Прогрес: $PROGRESS$%\n$DAYS$, $DATE$"
  turmoil_in_brandenburg.1.title: "[root_dynasty.GetNameWithNoTooltip] з [ROOT.GetCountry.Custom('CL_GEN')]"
  turmoil_in_brandenburg.1.desc.start: "Після того як у 1320 році помер останній член династії [ShowDynastyName('askanier')] з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — [GetCharacter('bra_heinrich_ii_askanier').GetName], — [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ими землями тепер править [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'імператриця', 'імператор' )] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName]. Щоб на північних #TOOLTIP:CULTUREGROUP,german_group,X #L німецьких#!#! територіях панував порядок, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetShortNameWithNoTooltip] [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'передала', 'передав' )] [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]у марку [Select_CString(GetCharacter('bra_ludwig_v_wittelsbach').IsFemale, 'своїй дочці', 'своєму сину' )] на ім'я [GetCharacter('bra_ludwig_v_wittelsbach').GetName]."
  turmoil_in_brandenburg.1.desc: "$turmoil_in_brandenburg.1.desc.start$\n\nТак починається доба правління [ROOT.GetCountry.Custom('predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')] роду #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!. У країні починається смута, адже [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] ще не може посісти трон через свої юні роки, тому майже всією країною керує [GetCharacter('hnb_berthold_iv_henneberg_schleusingen').GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] не користується підтримкою населення, у країні безчинствують барони-розбійники, накопичуються економічні труднощі. [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip] може лише мріяти про спокій, і загалом Віттельсбахи, схоже, абсолютно не зацікавлені в управлінні своїми північними володіннями…"
  turmoil_in_brandenburg.1.desc.fallback: "$turmoil_in_brandenburg.1.desc.start$\n\n[GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], втім, [Select_CString(GetCharacter('bra_ludwig_v_wittelsbach').IsFemale, 'правила', 'правив' )] недовго, і тепер [ROOT.GetCountry.Custom('CL_INST')] керує [root_ruler.GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] стикається з тими ж труднощами — економічними бідами та безчинствами баронів-розбійників. Та й загалом, схоже, #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! мало зацікавлені в тому, щоб розвивати цю відсталу марку…"
  turmoil_in_brandenburg.1.a: "Рано ще ховати [ROOT.GetCountry.Custom('CL_ACC')]!"
  turmoil_in_brandenburg.1.a.at: "[Concept('control', 'Контроль')|e] над нашою країною знизиться!"
  turmoil_in_brandenburg.1.a.bt: "Щоб подолати ці випробування, нам потрібно вийти з династичної кризи та покінчити з розгулом баронів-розбійників."
  turmoil_in_brandenburg.2.title: "Кінець панування Віттельсбахів"
  turmoil_in_brandenburg.2.desc: "Ні в кого з #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! більше немає монаршої влади над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, тому доба економічного застою та бездіяльності влади закінчилася. Тепер можна почати все з чистого аркуша та забезпечити народу добробут."
  turmoil_in_brandenburg.2.a: "Нехай з цього почнеться новий золотий вік."
  turmoil_in_brandenburg.2.a.tt: "Показники «$bra_wittelsbacher_investment_var$» та «$bra_wittelsbacher_neglect_var$» будуть вимкнені."
  turmoil_in_brandenburg.3.title: "Лжевальдемар"
  turmoil_in_brandenburg.3.desc: "Спершу в розповідь нехай з деякими труднощами, але все ж можна було повірити: справді, чому б [Select_CString(target_character.IsFemale, 'правительці', 'правителю' )] не підлаштувати власну смерть, щоб спокійно вирушити в паломництво, а потім повернутися на трон? Однак чим наполегливіше [Select_CString(target_character.IsFemale, 'вона прагнула', 'він прагнув' )] до престолу, тим більше виникало суперечностей. [Select_CString(target_character.IsFemale, 'Нинішня', 'Нинішній' )] [GetCharacter('bra_waldemar_askanier').GetName] — зовсім [Select_CString(target_character.IsFemale, 'не та, що була', 'не той, що був' )] до 1320 року, і пояснити такі різкі зміни в [Select_CString(target_character.IsFemale, 'її', 'його' )] поведінці дуже складно.\n\nНарешті, на загальний подив істина розкрилася: [target_character.GetName] — всього лише [Select_CString(target_character.IsFemale, 'самозванка, яка видає', 'самозванець, який видає' )] себе за поважну особу!\n\nВся підтримка, якою [Select_CString(target_character.IsFemale, 'вона встигла', 'він встиг' )] заручитися, миттєво випарувалася. Тепер ніхто більше не сумнівається, що справжній наш володар — [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l]."
  turmoil_in_brandenburg.3.a: "Серед нас [Select_CString(target_character.IsFemale, 'самозванка', 'самозванець' )]! Хто б міг подумати…"
  turmoil_in_brandenburg.4.title: "Свавілля баронів-розбійників"
  turmoil_in_brandenburg.4.desc: "Безчинні [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! барони-розбійники вводять непомірні податки та збори, оббираючи місцеве населення. Самоуправство ці [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] виправдовують тим, що у своїх володіннях мають законне право поводитися як завгодно. І хоча на подібний крок їх міг штовхнути відчай, такі побори не дають [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]им землям процвітати. Чи варто це терпіти?.."
  turmoil_in_brandenburg.4.a: "Почнімо боротьбу з баронами-розбійниками."
  turmoil_in_brandenburg.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  bra_peasants_revolt: "Селянський бунт"
  turmoil_in_brandenburg.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] бунтують"
  turmoil_in_brandenburg.5.desc: "Економічне становище #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! дедалі гіршає. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], розлючені таким станом справ, відмовляються обробляти поля, доки ми не виконаємо їхні вимоги та не позбавимо народ безчинства користолюбних баронів-розбійників."
  turmoil_in_brandenburg.5.a: "Постараємося покращити їхнє становище."
  turmoil_in_brandenburg.5.b: "Яке нам діло до селян? Вони не завдадуть нам клопоту."
  turmoil_in_brandenburg.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] беруть владу на себе"
  turmoil_in_brandenburg.6.desc: "#TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! правлять виключно на папері — справжня влада знаходиться в руках тих, за ким народ слідує з власної волі. У селах, наприклад, це [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Щоб наші піддані не забували, хто по праву володарює над цими краями, краще позбавити духовенство повноважень…"
  turmoil_in_brandenburg.6.a: "Відкличемо їхні повноваження."
  turmoil_in_brandenburg.6.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] — люди, з якими краще не жартувати."
  turmoil_in_brandenburg.7.title: "Місто не платить податки"
  turmoil_in_brandenburg.7.desc: "[ROOT.GetCountry.GetName|U] — погано придатний для життя край, погано заселений і ще гірше розвинений. Практично вся [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]а адміністрація оплачуються за рахунок податків, які сплачують міста. Однак [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] заявили, що відмовляються платити свою частку, оскільки не бачать причин визнавати, що $bra_wittelsbach_hyperlink$ — їхній законний правитель."
  turmoil_in_brandenburg.7.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] бунтують? Ми знайдемо на них управу."
  turmoil_in_brandenburg.7.b: "$common_string_leave_them_be$"
  turmoil_in_brandenburg.8.title: "[target_character.GetShortNameWithNoTooltip] претендує на самовладдя"
  turmoil_in_brandenburg.8.desc: "За відомостями з [target_location.Custom('LR_GEN')|l] [target_location.GetName], [target_character.GetName] давно вже править маєтками так, ніби [Select_CString(target_character.IsFemale, 'її', 'його' )] володіння є незалежною країною. Стіни [Select_CString(target_character.IsFemale, 'її', 'його' )] замків піднімаються все вище, рови поглиблюються, а війська підкоряються [Select_CString(target_character.IsFemale, 'їй', 'йому' )] особисто. Прохання, які в колишні часи відправляли двору, тепер лягають до [Select_CString(target_character.IsFemale, 'неї', 'нього' )] на стіл, і навіть місцеві податки та збори потрапляють до [Select_CString(target_character.IsFemale, 'її', 'його' )] скарбниці — попри те, що на них по праву претендує [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Дехто вважає, що [target_character.GetShortNameWithNoTooltip] ось-ось оголосить усі #L [ROOT.GetCountry.GetAdjective|l]і землі#! своїми особистими володіннями…"
  turmoil_in_brandenburg.8.a: "Ми змиримося з цим — до пори до часу."
  turmoil_in_brandenburg.8.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] стоїть вище будь-яких вельмож."
  tib_outcome_8_1_tt: "Наші агенти подбають про те, щоб [target_character.GetShortNameWithNoTooltip] більше не [Select_CString(target_character.IsFemale, 'доставляла', 'доставляв' )] нам клопоту"
  tib_outcome_8_2_tt: "[ShowEstateTypeName('nobles_estate')] [target_location.Custom('LR_GEN')|l] [target_location.GetName] обуряться нашим втручанням"
  tib_outcome_8_3_tt: "Це рішення зіпсує наші відносини з усією #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаттю#!#! країни"
  turmoil_in_brandenburg.9.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] провінції [target_province.GetNameWithNoTooltip] об'єднуються в лігу"
  turmoil_in_brandenburg.9.desc: "Низка знатних родин провінції [target_province.GetName] офіційно об'єдналася в лігу. Вони дали клятву захищати одне одного, утримувати спільний двір і разом чинити опір будь-якому втручанню столичних чиновників у свої справи.\n\nБагато місцевих жителів уже впевнені в тому, що реальною владою в провінції [target_province.GetNameWithNoTooltip] володіють саме ці [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а зовсім не [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'яка сидить', 'який сидить' )] у далекому [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName]. При дворі кажуть, що подібні об'єднання скоро призведуть до занепаду центральної влади."
  turmoil_in_brandenburg.9.a: "Визнаємо лігу та заручимося її підтримкою."
  turmoil_in_brandenburg.9.b: "Розженемо це угруповання та відновимо авторитет столиці."
  nobles_in_target_province_gain_pop_satisfaction_extreme_bonus_tt: "[Concept('pops', 'Групи населення')|E], що належать нашим підданим-#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L знаті#!#! в провінції [target_province.GetName], будуть задоволені визнанням ліги та отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|E]"
  lower_class_pop_satisfaction_weak_penalty_tt: "[Concept('lower_class', 'Нижче суспільство')|E] провінції [target_province.GetName] буде невдоволене зростанням могутності феодалів і отримає [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|E]"
  nobles_in_target_province_may_agitate_locals_to_rebel_tt: "У відповідь на нашу рішучу політику обурена [ShowEstateTypeName('nobles_estate')|l] провінції [target_province.GetName] може закликати свій народ до заворушень"
  turmoil_in_brandenburg.10.title: "Незаконні побори в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  turmoil_in_brandenburg.10.desc: "Купці скаржаться, що на дорогах і мостах в околицях [target_location.Custom('LR_GEN')|l] [target_location.GetName] з'явилися нові пости для збору мита, причому підприємливі місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] встановили їх без дозволу згори. Їхні слуги зупиняють вози, перераховують товари та вимагають грошей за #italic захист#!.\n\nКожен обібраний ними віз означає, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] недоотримає дохід. Гірше того, народ починає вірити, що закони в країні встановлює не монарший двір, а мешканці найближчого замку."
  turmoil_in_brandenburg.10.a: "Ми закриємо очі на їхнє хабарництво."
  turmoil_in_brandenburg.10.b: "Негайно знести пости збирачів і відновити авторитет влади!"
  turmoil_in_brandenburg.11.title: "Дім [target_dynasty_1.GetNameWithNoTooltip] кидає виклик династії [target_dynasty_2.GetNameWithNoTooltip]"
  turmoil_in_brandenburg.11.desc: "Між домом [target_dynasty_1.GetName] і нашою династією [target_dynasty_2.GetName] зростає напруга. На кожній пирушці або полюванні знатні нащадки цього роду публічно заявляють, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не володіє монаршими якостями, та й походження [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] залишає бажати кращого. Нахаби натякають, що їхня родина має не менше прав на владу [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!.\n\nПоступово ці натяки перетворилися на відкриту боротьбу за престиж, васалів та вплив при дворі. Якщо не зайняти тверду позицію, менш знатні вельможі вважатимуть, що наша династія — лише один з багатьох знатних родів у країні."
  turmoil_in_brandenburg.11.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] отримає нашу беззастережну підтримку."
  turmoil_in_brandenburg.11.b: "Поступки дому [target_dynasty_1.GetNameWithNoTooltip] дозволять нам купити мир."
  target_character_2_will_challenge_the_power_nobles_tt: "[target_character_2.GetName] відкрито звинуватить #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократію#!#! у спробі узурпації влади."
  turmoil_in_brandenburg.12.title: "Вкладення в [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]"
  turmoil_in_brandenburg.12.desc: "Радники склали проєкт королівських інвестицій в [target_location.Custom('LR_ACC')|l] [target_location.GetName] та інші землі провінції [target_province.GetName]. Нові дороги, ринки та контори нагадають сільським жителям, що у них є [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], і послаблять владу місцевих магнатів над торгівлею та судовою системою.\n\n[ShowEstateTypeName('nobles_estate')|U], однак, наполягають, що розвитком на місцях повинні займатися тільки вони, а будь-яке втручання центральної влади зустріне опір."
  turmoil_in_brandenburg.12.a: "Вкладемо кошти корони, щоб посилити контроль."
  turmoil_in_brandenburg.12.b: "Це питання все одно не варте нашої уваги."
  turmoil_in_brandenburg.13.title: "Розвиток [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  turmoil_in_brandenburg.13.desc: "Знатні люди [target_location.Custom('LR_GEN')|l] [target_location.GetName] подали до двору прохання про фінансові вкладення. Вони стверджують, що нові вулиці, ратуші та громадські будівлі сприятимуть зміцненню #L [ROOT.GetCountry.GetAdjective|l]ого#! впливу в містах провінції [target_province.GetName] та знизять невдоволення їхніх жителів.\n\nКазначеї, однак, попереджають, що подібна щедрість ляже на казну тяжким тягарем, а інші провінції вважатимуть нашу політику марнотратною."
  turmoil_in_brandenburg.13.a: "Вкладемо кошти в розвиток усієї провінції [target_province.GetNameWithNoTooltip]."
  turmoil_in_brandenburg.13.b: "Обмежимося [target_location.Custom('LR_INST')|l] [target_location.GetNameWithNoTooltip]."
  turmoil_in_brandenburg.13.c: "Подібна щедрість нам не по кишені."
  every_location_in_target_province_gains_center_of_urbanization_modifier_tt: "Кожна [Concept('location', 'місцевість')|E] провінції [target_province.GetName] отримає [Concept('modifier', 'модифікатор')|E] «[GetModifier('center_of_urbanization_modifier').GetNameWithTooltip]»"
  every_location_in_target_province_gains_flourishing_capital_modifier: "Кожна [Concept('location', 'місцевість')|E] провінції [target_province.GetName] отримає [Concept('modifier', 'модифікатор')|E] «[GetModifier('flourishing_capital_modifier').GetNameWithTooltip]»"
  every_location_in_target_province_gains_development_mild_bonus: "Кожна [Concept('location', 'місцевість')|e] провінції [target_province.GetName] отримає [ShowNamedValue('development_mild_bonus')|+=] до [Concept('development', 'розвитку')|e]"
  every_location_in_target_province_gains_prosperity_extreme_bonus: "Кожна [Concept('location', 'місцевість')|e] провінції [target_province.GetName] отримає [ShowNamedValue('prosperity_extreme_bonus')|+=2%] до [Concept('prosperity', 'процвітання')|e]."
  turmoil_in_brandenburg.100.title: "Віттельсбахи відроджують [ROOT.GetCountry.Custom('CL_ACC')]"
  turmoil_in_brandenburg.100.desc: "Роки бідності, розрухи, свавілля станів та свавілля баронів-розбійників, роки труднощів та боротьби з претендентами на трон нарешті закінчилися тріумфом династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!. Сьогодні [ROOT.GetCountry.GetFlavorRank|l] [ROOT.GetCountry.GetName] — справжня перлина #TOOLTIP:REGION,north_german_region,X #L Північної Німеччини#!#!. Хай живе [target_character.GetName]!"
  turmoil_in_brandenburg.100.a: "Віттельсбахи пишатимуться [ROOT.GetCountry.Custom('CL_INST')]."
  turmoil_in_brandenburg.200.title: "[target_character.GetNameWithNoTooltip] — людина-загадка"
  turmoil_in_brandenburg.200.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'померла', 'помер' )] раптово, проте пам'ять про [Select_CString(target_character.IsFemale, 'неї', 'нього' )] ще довго жила [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Виявилося, що [Select_CString(target_character.IsFemale, 'ця жінка', 'цей чоловік' )] — нібито [Select_CString(target_character.IsFemale, 'представниця', 'виходець із' )] династії $bra_askanier_hyperlink$, що правила [ROOT.GetCountry.Custom('rank_ru_INST')|l] до 1320 року, — насправді [Select_CString(target_character.IsFemale, 'самозванка', 'самозванець' )], [Select_CString(target_character.IsFemale, 'обманщиця', 'обманщик' )] та [Select_CString(target_character.IsFemale, 'шахрайка', 'шахрай' )], яких [ROOT.GetCountry.GetAdjectiveWithNoTooltip] ще не бачил[ROOT.GetCountry.Custom('end_fem')] за свою історію.\n\nКоли [Select_CString(target_character.IsFemale, 'вона померла', 'він помер' )], [Select_CString(target_character.IsFemale, 'покійну', 'покійного' )] запропонували поховати в [Select_CString(target_character.IsFemale, 'її', 'його' )] колишній могилі, щоб [Select_CString(target_character.IsFemale, 'вона', 'він' )] нарешті [Select_CString(target_character.IsFemale, 'знайшла', 'знайшов' )] спокій. Яке ж було загальне здивування, коли в землі виявився скелет — #italic [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'справжня', 'справжній' )] [GetCharacter('bra_waldemar_askanier').GetName]#!!\n\nПочуття сорому накрило [ROOT.GetCountry.Custom('CL_ACC')|l]: одна людина змогла обдурити цілу країну…"
  turmoil_in_brandenburg.200.a: "Як же нас так легко провели?"
  turmoil_in_brandenburg.300.title: "Довга битва завершилася"
  turmoil_in_brandenburg.300.desc: "Боротьба за підкорення [ROOT.GetCountry.Custom('longname_ru_GEN')] тривала десятки років, але тепер їй настав кінець. Династії, які прагнули зайняти наш престол, отримали відсіч. Останній оплот баронів-розбійників стертий з лиця землі. У важку годину ми проявили рішучість та успішно скористалися ситуацією. Нова влада, яку ми приведемо на ці землі, зможе успішніше долати подібні напасті в майбутньому."
  turmoil_in_brandenburg.300.a: "Нарешті все спокійно."
  turmoil_in_brandenburg.1000.title: "[target_character.GetNameWithNoTooltip] повертається"
  turmoil_in_brandenburg.1000.desc: "Оскільки ніхто з імператорів #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! більше не має жодного стосунку до правлячої династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, знову постає питання, наскільки [Select_CString(bra_ruler.IsFemale, 'легітимна', 'легітимний' )] [bra_ruler.GetName]. Жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! щиро сумують за часами, коли на троні сидів $bra_askanier_hyperlink$…\n\nІ, схоже, доля до них змилостивилася, бо [target_character.GetName], [Select_CString(target_character.IsFemale, 'яку', 'якого' )] всі вважали [Select_CString(target_character.IsFemale, 'померлою', 'померлим' )], якимось чином [Select_CString(target_character.IsFemale, 'повстала', 'повстав' )] з мертвих. Своє чудесне повернення [Select_CString(target_character.IsFemale, 'вона пояснила', 'він пояснив' )] тим, що похорони виявилися несправжніми і були влаштовані виключно заради можливості спокійно вирушити в паломництво до Святої землі. Тепер же [target_character.GetShortNameWithNoTooltip] знову [Select_CString(target_character.IsFemale, 'готова', 'готовий' )] зайняти #L [ROOT.GetCountry.GetAdjective|l]ий#! престол, на якому зараз сидить [bra_ruler.GetShortNameWithNoTooltip]."
  turmoil_in_brandenburg.1000.desc.emperor_supports: "$turmoil_in_brandenburg.1000.desc$\n\nНа щастя, [emperor_ruler.GetName] та [bra_ruler.GetShortNameWithNoTooltip] ставляться один до одного доброзичливо, тому [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] у суперечці дому Віттельсбахів з претендентом займає сторону перших."
  turmoil_in_brandenburg.1000.desc.emperor_rejects: "$turmoil_in_brandenburg.1000.desc$\n\nНа жаль, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] у суперечці між домами Асканіїв та Віттельсбахів підтримує перших, а тому [emperor_ruler.GetName] виносить рішення: владу над [bra_country.Custom('CL_INST')] отримає [target_character.GetShortNameWithNoTooltip]. Врятуватися від загрози, яку становить [target_character.GetShortNameWithNoTooltip], можна, тільки якщо [emperor_ruler.GetNameWithNoTooltip] погодиться укласти угоду…"
  turmoil_in_brandenburg.1000.a: "Пошлемо гінця і будемо сподіватися, що [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] його прийме!"
  turmoil_in_brandenburg.1000.a.at: "Кожна країна, якою править член династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, отримує [ShowBiasValue('opinion_support_our_dynasty_member')|+0] до [Concept('opinion', 'думки')|E] [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!"
  turmoil_in_brandenburg.1000.a.tt: "Ми запросимо допомоги, і, можливо, [emperor_country.GetName] допоможе нам у боротьбі з претендентом, на що піде #Y 2 роки#!. У цей час ми будемо зобов'язані виконувати умови, які нам поставить [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] (якщо [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] [Concept('opinion', 'думка')|e] про нас не перевищує #Y 100#!)"
  turmoil_in_brandenburg.1000.b: "Стратимо претендента самостійно!"
  turmoil_in_brandenburg.1000.b.tt: "Ми спробуємо влаштувати страту. Якщо [target_character.GetName] виявиться [Select_CString(target_character.IsFemale, 'страчена', 'страчений' )], [bra_ruler.GetName] знову вважатиметься легітимним правителем, а ми додатково отримаємо #Y +5#! до показника #Y «Вкладення Віттельсбахів»#! $bra_variable_counter$.\nУ разі невдачі почнеться [Concept('civil_war', 'громадянська війна')|e]"
  turmoil_in_brandenburg.1000.c: "Зречемося на користь істинного правителя [ROOT.GetCountry.Custom('CL_GEN')]."
  turmoil_in_brandenburg.1000.c.at: "Кожна країна, якою править член династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, отримує [ShowBiasValue('opinion_ousted_our_dynasty_member')|+0] до [Concept('opinion', 'думки')|E] [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!"
  turmoil_in_brandenburg.false_waldemar_rebel.tt: "#TOOLTIP:POPTYPE,nobles,X #L Знать#!#! та #TOOLTIP:POPTYPE,peasants,X #L простолюд#!#! з кількох (до #Y 4#!) найбільш густонаселених місцевостей у володінні:\n• Отримують [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]\n• Приєднуються до групи повстанців «[false_waldemar_rebel.GetName]»"
  turmoil_in_brandenburg.1001.title: "[target_character.GetShortNameWithNoTooltip] набуває ваги серед жителів [bra_country.Custom('CL_GEN')]"
  turmoil_in_brandenburg.1001.desc.imposter_revealed: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]. Причина візиту вельми серйозна: [bra_ruler.GetName] побоюється, що [Select_CString(bra_ruler.IsFemale, 'її', 'його' )] суперник і претендент на престол починає набувати занадто гучної слави, а тому просить у нас допомоги в боротьбі. [Select_CString(target_character.IsFemale, 'Самозванка', 'Самозванець' )], [Select_CString(target_character.IsFemale, 'яка представляється', 'який представляється' )] як [target_character.GetName], стверджує, що [Select_CString(target_character.IsFemale, 'повернулася', 'повернувся' )] з паломництва до Святої землі і тепер збирається знову зайняти [bra_country.GetAdjectiveWithNoTooltip|l]ий престол.\n\nОднак ми вже знаємо, що [Select_CString(target_character.IsFemale, 'ця', 'цей' )] «$name_waldemar$» — не більше ніж шахрай!"
  turmoil_in_brandenburg.1001.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#!. Причина вельми серйозна: в країні розгорілася династична суперечка. [Select_CString(target_character.IsFemale, 'Колишня правителька', 'Колишній правитель' )] [bra_country.Custom('CL_GEN')] [target_character.GetName] [Select_CString(target_character.IsFemale, 'повернулася', 'повернувся' )] з паломництва до Святої землі і тепер знову заявляє свої права на #L [bra_country.GetAdjective|l]ий#! престол. [bra_ruler.GetName] майже не користується підтримкою своїх підданих, а тому [Select_CString(bra_ruler.IsFemale, 'висловила', 'висловив' )] бажання піти з нами на переговори в обмін на допомогу в боротьбі проти несподіваного претендента."
  turmoil_in_brandenburg.1001.help.tt: "[target_character.GetName] буде [Select_CString(target_character.IsFemale, 'вигнана', 'вигнаний' )] з #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! і втратить [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,bra_waldemar_rallies_nobility,X #V #L «Повернення Вальдемара»#!#!"
  turmoil_in_brandenburg.1001.a: "Ми допоможемо їм в обмін на золото."
  turmoil_in_brandenburg.1001.a.tt: "Ми отримаємо [ROOT.GetVariable('bra_gold_tooltip_var').GetValue|+=2] од. [Concept('gold', 'золота')|e] від #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! через #Y 1 рік#!"
  turmoil_in_brandenburg.1001.b: "Рука руку миє. Допоможемо їм!"
  turmoil_in_brandenburg.1001.b.tt: "[bra_country.GetName] проголосу[bra_country.Custom('end_etyut')] за нас через #Y 1 рік#!"
  turmoil_in_brandenburg.1001.c: "Ми допоможемо Віттельсбахам в обмін на політичну підтримку."
  turmoil_in_brandenburg.1001.c.tt: "[Concept('opinion', 'Думка')|e] про нас усіх [Concept('countries', 'країн')|e], де править [Concept('dynasty', 'династія')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, на #Y 1 рік#! зміниться на [ShowBiasValue('opinion_supported_the_wittelsbacher')|+=0]"
  turmoil_in_brandenburg.1001.d: "Ми підтримаємо Віттельсбахів."
  turmoil_in_brandenburg.1001.d.tt: "Ми нічого не попросимо взамін"
  turmoil_in_brandenburg.1001.e: "Допомога Віттельсбахам не обіцяє нам жодної вигоди."
  turmoil_in_brandenburg.1001.e.tt: "Ми відмовимося допомагати #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахам#!#!. [Concept('opinion', 'Думка')|e] про нас усіх [Concept('countries', 'країн')|e], де править [Concept('dynasty', 'династія')|e] Віттельсбахів, зміниться на [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0], а думка про нас усіх країн, де править династія $bra_askanier_hyperlink$, зміниться на [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] через #Y 1 рік#!"
  turmoil_in_brandenburg.1001.zzz: "[bra_ruler.GetShortNameWithNoTooltip] зможе вершити правосуддя так, як вважатиме за потрібне."
  turmoil_in_brandenburg.1001.zzz.tt: "[target_character.GetName] понесе покарання, яке [bra_country.GetName] вважа[bra_country.Custom('end_etut')] заслуженим"
  turmoil_in_brandenburg.1002.title: "$bra_hre_emperor_hyperlink$ надає підтримку"
  turmoil_in_brandenburg.1002.desc: "До нашого двору дійшли чудові вісті. $bra_hre_emperor_hyperlink$, [emperor_ruler.GetName] з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!, висловлює нам щиру підтримку і вважає, що справжній правитель — [bra_ruler.GetName], а не [target_character.GetName]!"
  turmoil_in_brandenburg.1002.desc.gold: "$turmoil_in_brandenburg.1002.desc$\n\nЗвісно, така підтримка не обійдеться для нас задарма. [emperor_ruler.GetShortNameWithNoTooltip] ясно [Select_CString(emperor_ruler.IsFemale, 'дала', 'дав' )] зрозуміти, що будь-яка допомога тяжким тягарем лягає на скарбницю, а тому від нас вимагають натомість виплатити підношення в розмірі [ROOT.GetVariable('bra_owes_gold').GetValue|V2] золотих монет."
  turmoil_in_brandenburg.1002.desc.loyalty: "$turmoil_in_brandenburg.1002.desc$\n\nЗвісно, така підтримка не обійдеться для нас задарма. [emperor_ruler.GetShortNameWithNoTooltip] вельми [Select_CString(emperor_ruler.IsFemale, 'стурбована', 'стурбований' )] питанням передачі влади над #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священною Римською Імперією#!#! своєму спадкоємцю, а тому вимагає від нас повної відданості імператорській родині у справі збереження престолу."
  turmoil_in_brandenburg.1002.desc.relations: "$turmoil_in_brandenburg.1002.desc$\n\nАле, звісно, така підтримка не обійдеться для нас задарма. [emperor_ruler.GetShortNameWithNoTooltip] хоче, щоб ми виконували роль [Select_CString(emperor_ruler.IsFemale, 'її', 'його' )] посланців до родини #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, щоб усі члени цього роду визнали славу і могутність [emperor_country.Custom('CL_GEN')]."
  turmoil_in_brandenburg.1002.desc.free: "$turmoil_in_brandenburg.1002.desc$\n\nНа наш подив, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] не вимагає натомість абсолютно нічого. [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'Її', 'Його' )] допомога, що йде від чистого серця, буде безоплатною."
  turmoil_in_brandenburg.1002.a: "Нарешті влада знову у Віттельсбахів!"
  turmoil_in_brandenburg.1002.a.tt: "Кожна [Concept('country', 'країна')|e], де править [Concept('dynasty', 'династія')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, отримує [ShowBiasValue('opinion_supported_the_wittelsbacher')|0] до [Concept('opinion', 'думки')|E] [emperor_country.Custom('predlog_obo')] #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_PREP')|L]#!#!"
  turmoil_in_brandenburg.1003.title: "Імператор відмовляється надати підтримку"
  turmoil_in_brandenburg.1003.desc.dead: "До нас дійшли вісті з імперського двору. З причин, відомих лише [Select_CString(emperor_ruler.IsFemale, 'їй одній', 'йому одному' )], за життя [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName], [Select_CString(emperor_ruler.IsFemale, 'стала', 'став' )] на бік наших супротивників. Таким чином, [target_character.GetName] як і раніше зберігає свій вплив…"
  turmoil_in_brandenburg.1003.desc.wittelsbach: "До нас дійшли жахливі новини! Дочекавшись, коли неподобство, яке [target_character.GetName] чинить у нашій країні, розрослося ще сильніше, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName|l], нарешті [Select_CString(emperor_ruler.IsFemale, 'висловила', 'висловив' )] думку #L [emperor_country.GetAdjective|l]ої#! сторони: незважаючи на родинні зв'язки, [emperor_ruler.GetName] виступає проти своєї власної династії, а отже, [bra_ruler.GetName] не дочекається такої потрібної підтримки!"
  turmoil_in_brandenburg.1003.desc: "До нас дійшли жахливі новини! Дочекавшись, коли неподобство, яке [target_character.GetName] чинить у нашій країні, розрослося ще сильніше, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName], нарешті [Select_CString(emperor_ruler.IsFemale, 'висловила', 'висловив' )] думку #L [emperor_country.GetAdjective|l]ої#! сторони: [Select_CString(emperor_ruler.IsFemale, 'вона', 'він' )] відкрито виступає проти Віттельсбахів, а отже, [bra_ruler.GetName] не дочекається такої потрібної підтримки!"
  turmoil_in_brandenburg.1003.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] переживає непрості часи…"
  turmoil_in_brandenburg.1003.a.tt: "Кожна [Concept('country', 'країна')|e], де править [Concept('dynasty', 'династія')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, отримує [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0] до [Concept('opinion', 'думки')|E] [emperor_country.Custom('predlog_obo')] #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_PREP')|L]#!#!, а кожна країна, де править династія $bra_askanier_hyperlink$, отримує [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] до думки про них"
  turmoil_in_brandenburg.1004.title: "$bra_hre_emperor_hyperlink$ надає беззастережну підтримку"
  turmoil_in_brandenburg.1004.desc: "До нас дійшли новини з #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_GEN')|L]#!#!: своїми вчинками [target_character.GetName] [Select_CString(target_character.IsFemale, 'накликала', 'накликав' )] на себе ганьбу, а тому [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] дає нам повне право розібратися з [Select_CString(target_character.IsFemale, 'самозванкою', 'самозванцем' )] так, як ми вважаємо за потрібне."
  turmoil_in_brandenburg.1004.a: "Виженемо [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  turmoil_in_brandenburg.1004.b: "Стратимо [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  turmoil_in_brandenburg.1004.c: "Можливо, [Select_CString(target_character.IsFemale, 'її', 'його' )] вміння нам знадобляться…"
  turmoil_in_brandenburg.1004.c.tt: "[target_character.GetName] отримає повторну нагоду. [Select_CString(target_character.IsFemale, 'Їй', 'Йому' )] можна буде дати посаду в раді"
  turmoil_in_brandenburg.1005.title: "Питання справжності"
  turmoil_in_brandenburg.1005.desc: "Правління #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! закінчилося. На престолі #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! знову сидить славетна династія $bra_askanier_hyperlink$. Однак [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] викликає чималі підозри: [target_character.GetName] не може згадати жодних своїх звершень перед нібито інсценованою смертю, а інші Асканії помічають незрозумілі зміни у зовнішності [Select_CString(target_character.IsFemale, 'своєї улюбленої родички', 'свого улюбленого родича' )]. Навіть [Select_CString(target_character.IsFemale, 'її', 'його' )] підхід до управління країною різко змінився. [target_character.GetShortNameWithNoTooltip] списує ці протиріччя на нещодавнє паломництво до Святої землі…"
  turmoil_in_brandenburg.1005.a: "Перевіримо [Select_CString(target_character.IsFemale, 'її', 'його' )] розповіді на справжність."
  turmoil_in_brandenburg.1005.a.tt: "Почнеться вивчення справжності історій, які розповідає [target_character.GetName]. Можливо, з'ясується [Select_CString(target_character.IsFemale, 'її', 'його' )] істинний зв'язок з династією $bra_askanier_hyperlink$…"
  turmoil_in_brandenburg.1005.b: "Це лише необґрунтовані чутки…"
  turmoil_in_brandenburg.1006.title: "[target_character.GetShortNameWithNoTooltip] під слідством"
  turmoil_in_brandenburg.1006.desc: "Через два роки ретельних вивчень, досліджень та порівнянь документів питання, ким насправді є [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [target_character.GetName], нарешті закрито."
  turmoil_in_brandenburg.1006.desc.true_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nМи дійшли висновку, що [target_character.GetName] дійсно виходець з династії $bra_askanier_hyperlink$, але при цьому [Select_CString(target_character.IsFemale, 'вона', 'він' )] зовсім не [GetCharacter('bra_waldemar_askanier').GetName] — всупереч усім спробам видати себе за [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'неї', 'нього' )]. Так, [Select_CString(target_character.IsFemale, 'вона', 'він' )] носить те ж ім'я, що й [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'померла', 'померлий' )] три роки тому [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'маркграфиня', 'маркграф' )], однак все ж це зовсім [Select_CString(target_character.IsFemale, 'інша', 'інший' )] $name_waldemar$."
  turmoil_in_brandenburg.1006.desc.false_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nРетельно продуманий обман зазнав краху, і коли [Select_CString(target_character.IsFemale, 'самозванці', 'самозванцю' )] пред'явили незаперечні факти, відпиратися стало марно. [target_character.GetShortNameWithNoTooltip] насправді [Select_CString(target_character.IsFemale, 'прикидалася', 'прикидався' )] іншою людиною, а придворні в це повірили. Навіть члени династії $bra_askanier_hyperlink$ були переконані, що [GetCharacter('bra_waldemar_askanier').GetName] все ще живе. [bra_country.GetAdjectiveWithNoTooltip]ий двір кипить від обурення, багато знатних вельмож вимагають суворо покарати [Select_CString(target_character.IsFemale, 'шахрайку', 'шахрая' )]."
  turmoil_in_brandenburg.1006.a: "Схожість була вражаючою!"
  turmoil_in_brandenburg.1006.a.tt: "[target_character.GetName] і всі [Select_CString(target_character.IsFemale, 'її', 'його' )] нащадки змінять [Concept('dynasty', 'династію')|e] на $bra_askanier_hyperlink$"
  turmoil_in_brandenburg.1006.b: "Принаймні, [Select_CString(target_character.IsFemale, 'вона', 'він' )] не з Віттельсбахів…"
  turmoil_in_brandenburg.1006.b.tt: "[target_character.GetName] і всі [Select_CString(target_character.IsFemale, 'її', 'його' )] нащадки змінять [Concept('dynasty', 'династію')|e] на [target_dynasty.GetName]"
  turmoil_in_brandenburg.1006.c: "Геть [Select_CString(target_character.IsFemale, 'самозванку', 'самозванця' )]!"
  turmoil_in_brandenburg.1007.title: "Лже[target_character.GetNameWithNoTooltip|l] іде на страту"
  turmoil_in_brandenburg.1007.desc.successful_execution: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'опинилася', 'опинився' )] в руках лоялістів, для яких ім'я [bra_ruler.GetName|l] все ще не пустий звук. Потім з'ясувалося, що [target_character.GetShortNameWithNoTooltip] не тільки не має жодного стосунку до роду $bra_askanier_hyperlink$, але навіть інші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] відмовляють цій людині у шляхетному походженні! [Select_CString(target_character.IsFemale, 'Вона була звинувачена', 'Він був звинувачений' )] у підриві засад #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L] і [Select_CString(target_character.IsFemale, 'визнана винною', 'визнаний винним' )]…"
  turmoil_in_brandenburg.1007.desc.failed_execution: "Під покровом ночі [target_character.GetName] [Select_CString(target_character.IsFemale, 'була схоплена', 'був схоплений' )] і [Select_CString(target_character.IsFemale, 'ув'язнена', 'ув'язнений' )] до темниці [bra_country.GetCapital.Custom('LR_GEN')|l] [bra_country.GetCapital.GetName]. Страта мала відбутися з першими променями світанку. Однак виявилося, що [target_character.GetShortNameWithNoTooltip] — [Select_CString(target_character.IsFemale, 'жінка хитра і винахідлива', 'людина хитра і винахідлива' )], [Select_CString(target_character.IsFemale, 'вона передбачила', 'він передбачив' )] кожен наш крок. Незабаром після [Select_CString(target_character.IsFemale, 'її', 'його' )] полону до палацової темниці увірвалися численні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] і звільнили [Select_CString(target_character.IsFemale, 'ув'язнену', 'ув'язненого' )].\n\nТепер #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_DAT')|L]#!#! загрожує громадянська війна непередбачуваного розмаху…"
  turmoil_in_brandenburg.1007.a: "Ми уникли чергової катастрофи."
  turmoil_in_brandenburg.1007.b: "До зброї!"
  bra_true_waldemar_identity_reveal_tt: "#italic Стане відомо, хто насправді [target_character.GetName]…#!"
  turmoil_in_brandenburg.false_waldemar_big_rebel.tt: "#TOOLTIP:POPTYPE,nobles,X #L Знать#!#! та #TOOLTIP:POPTYPE,peasants,X #L простолюд#!#! з кількох (до #Y 16#!) найбільш густонаселених місцевостей у володінні:\n• Отримують [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] до [Concept('pop_satisfaction', 'вдоволення')|e]\n• Приєднуються до групи повстанців «[false_waldemar_rebel.GetName]»"
  false_waldemar_rebel: "Прихильники Вальдемара"
  turmoil_in_brandenburg.1100.title: "Нехтування [root_country.Custom('CL_INST')]"
  turmoil_in_brandenburg.1100.desc: "Землі, якими володіє [root_country.GetName], ніколи не знали надмірної турботи, проте навіть у найважчі часи нам не було так важко, як зараз, коли [root_country.GetNameWithNoTooltip] перебуває під владою #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!.\n\nПро наше скрутне становище сьогодні вже знає безпосередньо [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]. [root_ruler.GetName] ходить по краю, і доля [Select_CString(root_ruler.IsFemale, 'її', 'його' )] висить на волосині…"
  turmoil_in_brandenburg.1100.a: "$bra_hre_emperor_hyperlink$, звичайно ж, зрозуміє, наскільки це нестерпно."
  turmoil_in_brandenburg.1100.a.tt: "$bra_hre_emperor_hyperlink$ вирішить, що буде з нами далі. Можливо, [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'вона', 'він')] призначить нам нового правителя з іншої династії…"
  turmoil_in_brandenburg.1101.title: "Віттельсбахи підвели Священну Римську Імперію"
  turmoil_in_brandenburg.1101.desc: "Одне наше курфюрство — [root_country.GetFlavorRank|l] [root_country.GetName] — опинилося в скрутному становищі. Там безчинствують місцеві барони-розбійники, економіка руйнується, а [root_country.GetGovernment.GetRulerTitle|l], [root_ruler.GetName] зовсім не звертає уваги на скарги своїх підданих. Ця ситуація абсолютно не прикрашає #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#!, а тому ми, як [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] цієї країни, зобов'язані покласти край подібній жахливій безгосподарності."
  turmoil_in_brandenburg.1101.a: "Візьмемо управління [root_country.Custom('rank_ru_INST')|l] у свої руки."
  turmoil_in_brandenburg.1101.a.tt: "Місце [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займе [emperor_ruler.GetName] та утворить [Concept('union', 'унію')|e] з цією країною"
  turmoil_in_brandenburg.1101.b: "Нехай [root_country.Custom('CL_INST')] править [dynasty_character.GetNameWithNoTooltip]."
  turmoil_in_brandenburg.1101.b.tt: "Місце [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займе [dynasty_character.GetName]"
  turmoil_in_brandenburg.1101.c: "Від нашого імені правитиме [cabinet_character.GetNameWithNoTooltip]."
  turmoil_in_brandenburg.1101.c.tt: "Місце [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займе [cabinet_character.GetName]. Країна стане нашим #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#!, внаслідок чого всі інші учасники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! отримають [ShowBiasValue('subjugated_elector_antagonism')|-=0] до [Concept('antagonism', 'ворожості')|e]"
  subjugated_elector_antagonism: "Підкорений виборщик"
  turmoil_in_brandenburg.1101.d: "Наш радник знає, як впоратися [root_country.Custom('end_predlog_sso')] [root_country.GetAdjectiveWithNoTooltip|l]ими бідами."
  turmoil_in_brandenburg.1101.d.tt: "Місце [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займе місцевий радник з числа наших придворних"
  turmoil_in_brandenburg.1101.e: "Не чіпатимемо Віттельсбахів — нехай відновлюють усе самі."
  turmoil_in_brandenburg.1101.e.tt: "Ми залишимо #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! у спокої, щоб вони й далі правили #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_INST')|L]#!#!"
  turmoil_in_brandenburg.1102.title: "$bra_hre_emperor_hyperlink$ дає відповідь"
  turmoil_in_brandenburg.1102.desc.wittelsbach: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він оголосив, що #L [root_country.GetAdjective|l]і#! землі об'єднаються [emperor_country.Custom('predlog_sso')] [emperor_country.Custom('CL_INST')], а правити цим утворенням буде [emperor_ruler.GetName]."
  turmoil_in_brandenburg.1102.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він заявив, що з цього дня #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! позбавляються своєї влади, а #L [root_country.GetAdjective|l]ими#! землями надалі правитиме безпосередньо [emperor_ruler.GetName]. Таким чином, нас примушують вступити в особисту унію [emperor_country.Custom('predlog_sso')] [emperor_country.Custom('CL_INST')]."
  turmoil_in_brandenburg.1102.a: "Хай живе [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]!"
  turmoil_in_brandenburg.1102.b: "Будемо сподіватися, [root_country.GetLongNameWithNoTooltip] не довед[root_country.Custom('endlong_youtut')] країну до розвалу…"
  turmoil_in_brandenburg.1103.title: "$turmoil_in_brandenburg.1102.title$"
  turmoil_in_brandenburg.1103.desc.wittelsbach: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він оголосив, що #L [root_country.GetAdjective|l]ими#! землями надалі керуватиме [dynasty_character.GetName]."
  turmoil_in_brandenburg.1103.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він заявив, що відсьогодні #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! позбавляються своєї влади, а #L [root_country.GetAdjective|l]ими#! землями надалі керуватиме [dynasty_character.GetName]."
  turmoil_in_brandenburg.1103.a: "Прав гідно, [dynasty_character.GetShortNameWithNoTooltip]."
  turmoil_in_brandenburg.1103.b: "Здається, [root_country.GetLongNameWithNoTooltip] отрима[root_country.Custom('endlong_fem')] повторну нагоду."
  turmoil_in_brandenburg.1104.title: "$turmoil_in_brandenburg.1102.title$"
  turmoil_in_brandenburg.1104.desc.wittelsbach: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він оголосив, що цими краями відтепер правитиме інший виходець з династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#!, який вже довів свою надійність у минулому. Тепер #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_INST')|L]#!#! править [cabinet_character.GetName] — найвірніший з усіх [emperor_country.GetAdjectiveWithNoTooltip|l]их васалів."
  turmoil_in_brandenburg.1104.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він заявив, що відсьогодні #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! позбавляються своєї влади, а #L [root_country.GetAdjective|l]ими#! землями надалі правитиме [cabinet_character.GetName] — найвірніший з усіх [emperor_country.GetAdjectiveWithNoTooltip|l]их васалів."
  turmoil_in_brandenburg.1104.a: "Дякую, що не $bra_wittelsbach_hyperlink_no_tt$."
  turmoil_in_brandenburg.1104.b: "Просто чудово, Віттельсбахи повернулися…"
  turmoil_in_brandenburg.1104.c: "Ми ніколи не станемо на коліна перед [emperor_country.Custom('CL_INST')]!"
  turmoil_in_brandenburg.1105.title: "$turmoil_in_brandenburg.1102.title$"
  turmoil_in_brandenburg.1105.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він заявив, що відсьогодні #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахи#!#! позбавляються своєї влади, а #L [root_country.GetAdjective|l]ими#! землями надалі правитиме [hohenzollern_character.GetName] — [Select_CString(hohenzollern_character.IsFemale, 'довірена радниця', 'довірений радник' )] Віттельсбахів."
  turmoil_in_brandenburg.1105.a: "Нехай править мудро."
  turmoil_in_brandenburg.1106.title: "$turmoil_in_brandenburg.1102.title$"
  turmoil_in_brandenburg.1106.desc: "До нашого двору прибув посол з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Він оголосив, що члени династії #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! отримають попередження від імперського двору, однак продовжать правити [root_country.Custom('rank_ru_INST')|l]."
  turmoil_in_brandenburg.1106.a: "Віттельсбахи завжди володітимуть [root_country.Custom('CL_INST')]…"
  turmoil_in_brandenburg.1107.title: "[root_country.GetNameWithNoTooltip] не зда[root_country.Custom('end_etyut')]ся"
  turmoil_in_brandenburg.1107.desc: "[root_country.GetName] уперто відмовля[root_country.Custom('end_etyut')]ся схилятися і визнавати нашу владу. Стало абсолютно ясно, що їхній уряд не відрізняється далекоглядністю, а тому у нас є вагома причина підкорити цю країну силою."
  turmoil_in_brandenburg.1107.a: "Ми не потерпимо зрадників!"
  turmoil_in_brandenburg.1200.title: "[bra_country.GetAdjectiveWithNoTooltip|U]ий тягар"
  turmoil_in_brandenburg.1200.desc: "Через роки безгосподарного ставлення з боку #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! проблемами #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! нарешті зайнявся дім [emperor_dynasty.GetName]. Наші помисли щодо [bra_country.Custom('rank_ru_GEN')|l] шляхетні та відповідають інтересам [bra_country.Custom('CL_GEN')], однак нам явно не вистачить сил відродити цей край після запустіння, залишеного Віттельсбахами.\n\nОдин з наших придворних радників на ім'я [hohenzollern_character.GetName] — вельми обізнана в питаннях управління та дипломатії людина. Призначивши [Select_CString(hohenzollern_character.IsFemale, 'її', 'його' )] [Select_CString(hohenzollern_character.IsFemale, 'правителькою', 'правителем' )] і надавши цій землі самоврядування, ми, можливо, досягнемо відновлення [bra_country.Custom('CL_GEN')]."
  turmoil_in_brandenburg.1200.a: "[hohenzollern_character.GetShortNameWithNoTooltip] правитиме [bra_country.Custom('rank_ru_INST')|l] — ми [Select_CString(hohenzollern_character.IsFemale, 'їй', 'йому' )] довіряємо."
  turmoil_in_brandenburg.1200.a.tt: "Місце [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! займе [hohenzollern_character.GetName]"
  turmoil_in_brandenburg.1200.b: "Дурниці! Ми й самі можемо керувати [bra_country.Custom('CL_INST')]."
  turmoil_in_brandenburg.1201.title: "[hohenzollern_character.GetNameWithNoTooltip] — новий правитель [bra_country.Custom('CL_GEN')]"
  turmoil_in_brandenburg.1201.desc: "Через роки безгосподарного ставлення #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Віттельсбахів#!#! до #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_DAT')|L]#!#! владу над цими землями взяли вельможі з #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. І хоча помисли їх відповідають нашим інтересам, насамперед ці люди віддані #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!, а тому не зможуть правити нами краще, ніж навіть найнебайдужіший Віттельсбах.\n\nНа щастя, про це [Select_CString(emperor_ruler.IsFemale, 'освідомлена', 'освідомлений' )] [emperor_ruler.GetName]. [Select_CString(emperor_ruler.IsFemale, 'Вона відправила', 'Він відправив' )] до нас свого найздібнішого радника, і тепер [bra_country.Custom('CL_INST')] самостійно правитиме [hohenzollern_character.GetName]."
  turmoil_in_brandenburg.1201.a: "Нехай править мудро і рішуче."
  turmoil_in_brandenburg.1300.title: "Барони-розбійники набирають силу"
  turmoil_in_brandenburg.1300.desc: "Слабкість та недобросовісність, які виявляє [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], а також майже повна вседозволеність призвели до появи баронів-розбійників — ці дворяни ведуть злочинний спосіб життя та багатіють на беззаконні, що панує навколо. Своїм існуванням вони підривають нашу владу та вплив, яким користується [target_ruler.GetName]. Найміцніше вони влаштувалися в провінції [robber_baron_province.GetName]."
  turmoil_in_brandenburg.1300.a: "З часом ми з ними розберемося."
  STATIC_MODIFIER_NAME_PRU_robber_barons: "Барони-розбійники"
  PRU_use_cabinet_action_to_get_rid_of_barons: "У провінції доступна дія #TOOLTIP:CABINET_ACTION,pru_deal_with_robber_barons,X #L «Боротьба з баронами-розбійниками»#!#!."
  remove_PRU_robber_barons_modifier: "[Concept('province', 'Провінція')|e] втрачає ефект модифікатора «[GetModifier('PRU_robber_barons').GetNameWithTooltip]»"
  PRU_ROBBER_BARONS_ELIGIBLE_PROVINCES: "Більше немає баронів-розбійників:"
  PRU_ROBBER_BARONS_AFFECTED_PROVINCES: "Барони-розбійники здійснюють наліт:"
  PRU_ROBBER_BARONS_REMOVED_PROVINCES: "З баронами-розбійниками покінчено"
  PRU_NO_ELIGIBLE_ROBBER_BARON_PROVINCES: "Немає провінцій, де могли б з'явитися барони-розбійники."
  PRU_NO_AFFECTED_ROBBER_BARON_PROVINCES: "Немає провінцій, де є барони-розбійники."
  PRU_NO_REMOVED_ROBBER_BARON_PROVINCES: "Немає провінцій, звільнених від баронів-розбійників."
  PRU_ROBBER_BARONS_ELIGIBLE_PROVINCES_TOOLTIP: "У $AMOUNT|0$ з $TOTAL_AMOUNT|0$ провінцій ще може з'явитися модифікатор «[GetModifier('PRU_robber_barons').GetNameWithTooltip]»:"
  PRU_ROBBER_BARONS_AFFECTED_PROVINCES_TOOLTIP: "У $AMOUNT|0$ з $TOTAL_AMOUNT|0$ провінцій є модифікатор «[GetModifier('PRU_robber_barons').GetNameWithTooltip]»:"
  PRU_ROBBER_BARONS_REMOVED_PROVINCES_TOOLTIP: "У $AMOUNT|0$ з $TOTAL_AMOUNT|0$ провінцій більше немає модифікатора «[GetModifier('PRU_robber_barons').GetNameWithTooltip]»:"
  PRU_ROBBER_BARONS_PROVINCE_ENTRY: "$PROVINCE$"
  PRU_ROBBER_BARONS_PROVINCE_ENTRY_REST: "…і ще $AMOUNT|0$"
  turmoil_in_brandenburg.1301.title: "Барони-розбійники в провінції [robber_baron_province.GetNameWithNoTooltip]"
  turmoil_in_brandenburg.1301.desc: "Провінція [robber_baron_province.GetName] страждає від навали баронів-розбійників. Їхня зарозумілість та беззаконня подібні до плювка нам в обличчя. Час дати їм красномовний урок та відновити в країні єдину владу."
  turmoil_in_brandenburg.1301.a: "З часом ми з ними розберемося."
  turmoil_in_brandenburg.1302.title: "Квітцови"
  turmoil_in_brandenburg.1302.desc: "Серед баронів-розбійників чи не найбільшим впливом користується рід Квітцових. Володіння їх у провінції #TOOLTIP:PROVINCE_DEFINITION,mittelmark_province,X #L Міттельмарк#!#! великі, як і належні їм маєтки. Однак, незважаючи на таке багатство, Квітцови почали займатися розбоєм. Ми розгромимо цих негідників та зітремо їхні володіння з лиця землі, поки ще не занадто пізно."
  turmoil_in_brandenburg.1302.a: "З ними треба розібратися!"
  turmoil_in_brandenburg.1302.b: "Тут треба діяти обережно."
  turmoil_in_brandenburg.1302.historical_info: "На початку XV століття рід Квітцових був найвпливовішим дворянським сімейством Бранденбурга. Два його представники — брати Ганс та Дітріх — у 1411–1415 роках чинили опір спробам Фрідріха I з династії Гогенцоллернів заволодіти Бранденбурзькою маркою, проте їхня боротьба не увінчалася успіхом: курфюрст захопив замки Квітцових та поклав край пануванню роду в Бранденбурзі."
  STATIC_MODIFIER_NAME_PRU_quitzow_modifier: "Вплив Квітцових"
  STATIC_MODIFIER_NAME_PRU_quitzow_repressed_modifier: "Придушення Квітцових"
  bra_quitzow_revolt: "Заколот Квітцових"
  turmoil_in_brandenburg.1303.title: "Кінець влади баронів-розбійників"
  turmoil_in_brandenburg.1303.desc: "Нам довелося витратити чимало років та сил, аби втихомирити бунтівних #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократів#!#!, однак усе це було недарма: жодні барони-розбійники більше не зазіхають на торговельні шляхи нашої країни, тому прості люди можуть спати спокійно, забувши про ті дні, коли будь-який без винятку селянин змушений був платити аристократам за захист."
  turmoil_in_brandenburg.1303.a: "[ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] знову запанував спокій."
  STATIC_MODIFIER_NAME_PRU_end_of_robber_barons: "Кінець доби баронів-розбійників"
  turmoil_in_brandenburg.1304.title: "Кара для баронів-розбійників"
  turmoil_in_brandenburg.1304.desc: "Бунтівні #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократи#!#! зазнали поразки, але [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] щиро сумнівається, що одна лише наша перемога забезпечить сталий мир. Дехто вважає, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'повинна', 'повинен' )] покарати бунтарів за зраду. Є, втім, й інша думка: не варто псувати стосунки ще сильніше, адже ми вже відновили законну владу."
  turmoil_in_brandenburg.1304.a: "Вони поплатяться за зраду!"
  turmoil_in_brandenburg.1304.b: "Покараємо їх не дуже суворо."
  turmoil_in_brandenburg.1304.c: "Не будемо карати їх."
  STATIC_MODIFIER_NAME_bra_waldemar_on_the_throne: "Вальдемар на престолі"
  STATIC_MODIFIER_NAME_bra_suspicious_waldemar_on_throne: "Підозрілий Вальдемар на престолі"
