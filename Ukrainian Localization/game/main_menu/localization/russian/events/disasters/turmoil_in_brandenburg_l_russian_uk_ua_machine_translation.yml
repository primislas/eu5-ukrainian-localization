  STATIC_MODIFIER_NAME_bra_imposter_dynasty_on_throne: "Самозванна династія на престолі"
  STATIC_MODIFIER_NAME_bra_fresh_emperor_ruler_of_brandenburg: "Імперська влада над Бранденбургом"
