l_russian:
  decline_of_empire.1.title: "Занепад країни [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  decline_of_empire.1.desc: "Становище в країні [ROOT.GetCountry.GetLongName] стає дедалі хиткішим, і це вже шито білими нитками. [ROOT.GetCountry.GetGovernment.GetCourtTitle] не може виконувати свої функції через слабке керівництво, придворні загрузли в корупції та бояться ухвалювати рішення. У далеких провінціях, навіть у регіоні [target_region.GetName], панує розруха, а в центральних землях розквітає невдоволення. На вулицях шепочуться про швидкий заколот, і колись могутня бюрократія ледь утримує ситуацію під контролем тепер, коли на чолі країни стоїть [target_character.GetName].\n\n[ROOT.GetCountry.GetFlavorRank] балансує на краю прірви. Народ ремствує, його гнів розпалюється голодом та економічним спадом. Наші супротивники пильно стежать за нами й чудово бачать, які ми слабкі. Якщо не відновити порядок, крах буде неминучим. Найближчі роки стануть для нас важким випробуванням, подібних до якого ми ще не знали. Те, що було збудовано кров'ю і потом, зараз готове розсипатися в пил, і час поглине ще одну велику країну."
  decline_of_empire.1.a: "Зорі падають з неба, і з ними наші серця."
  during_decline_of_empire_explanation_tt: "Під час цього [Concept('disaster', 'лиха')|e] [Concept('provinces', 'провінції')|e], населені [Concept('pops', 'групами населення')|e] [Concept('non_accepted_culture', 'невизнаних культур')|e] або над якими у нас слабкий [Concept('control', 'контроль')|e], можуть почати боротьбу за незалежність. Одночасно іноземні суперники можуть скористатися нашою слабкістю та розширити за наш рахунок свої кордони."
  decline_of_empire.2.title: "Кінець занепаду"
  decline_of_empire.2.desc: "Криза поступово сходить нанівець, і країна [ROOT.GetCountry.GetLongName] починає відбудовуватися заново. Порядок відновлено, розбрати, які колись загрожували розірвати [ROOT.GetCountry.Custom('rank_ru_ACC')|l] на частини, залагоджено. Грубою чи силою, чи вирощуванням культурної єдності, хаос, який охопив наше суспільство, вдалося подолати.\n\nРозмови про заколот зійшли нанівець, колись неспокійні провінції знову підкорилися закону, і [ROOT.GetCountry.GetGovernment.GetCourtTitle] знову утверджує свою владу. Криза не минула для нас безслідно, але найгірше вже позаду. Ми витримали шторм і залишилися хоч і не неушкоджені, але принаймні цілі."
  decline_of_empire.2.a: "Найгірше позаду!"
  pops_accepted_or_primary_culture_gain_10_satisfaction_home_region_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] всіх [Concept('pop', 'груп населення')|e] [Concept('primary_culture', 'основної')|e] та [Concept('accepted_culture', 'визнаних культур')|e] у [Concept('region', 'регіоні')|e] [target_region.GetName] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  decline_of_empire.3.title: "Вогні революції"
  decline_of_empire.3.desc: "Заворушення, що охопили [ROOT.GetCountry.Custom(longname_ru_ACC)], нарешті призвели до неминучого підсумку: від нас відкололася країна [target_country.GetName]. Ослаблені внутрішніми чварами, ми випустили цей регіон з рук, і місцеві царьки скористалися можливістю оголосити про незалежність. Вони високо підняли свої прапори, вони виголошують промови про суверенітет, а їхні армії готові захищати їхню новонабуту свободу.\n\nМи стоїмо перед вибором: зібрати сили, що залишилися у нас, розгромити заколотників і повернути належне нам по праву або визнати втрату і зайнятися внутрішніми справами, щоб частини [ROOT.GetCountry.Custom('rank_ru_GEN')|l], що залишилися, не відкололися слідом за ними?"
  decline_of_empire.3.a: "Знищити їх!"
  decline_of_empire.3.b: "Дати їм незалежність — до часу."
  target_country_allowed_to_slip_from_grasp_tt: "[target_country.GetNameWithNoTooltip] оголосить про незалежність, не проливши крові.\nМи #R втратимо#! [Concept('cores', 'права')|e] на [Concept('locations', 'місцевості')|e] в цій країні"
  decline_of_empire.4.desc: "Посеред хаосу, що охопив наші землі, заколотники в регіоні [target_country.GetName] скористалися моментом і оголосили про свою незалежність. Наша ослаблена влада не змогла утримати ці непокірні провінції, і тепер там вирує повстання. Бунтівники збирають під своїми прапорами армії, а їхні лідери нахабно заявляють про автономію та остаточний вихід з-під нашої влади.\n\nЧи давати їм незалежність — складне питання в нашій непростій ситуації. Якщо ми піддамося їхнім вимогам, ми можемо втратити свої права на їхні землі, але тоді ми зможемо звернути свою увагу на інші, важливіші справи."
  decline_of_empire.4.a: "Вони забули, кому служать — до зброї!"
  decline_of_empire.4.b: "Нам байдуже до того, про що там сперечаються далекі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l]."
  decline_of_empire.5.title: "[target_country.GetFlavorRank] на межі загибелі"
  decline_of_empire.5.desc: "Наші сусіди в країні [target_country.GetName] паралізовані кризою та занепадом. Їхній [target_country.GetFlavorRank] розсипається від заколотів та безладів. Їхні армії не справляються з бунтівниками, провінції виходять з-під контролю центральної влади, а [target_country.GetGovernment.GetCourtTitle] не підкоряється своїм лідерам. Поки їхня увага та сили відволікаються на інші проблеми, у нас є рідкісна можливість. Стрімкий похід дозволить нам захопити важливі території — вони й отямитися не встигнуть. Але якщо забаритися, ми можемо бути втягнуті у витратну війну."
  decline_of_empire.5.a: "Куй залізо, поки гаряче!"
  decline_of_empire.5.b: "Почекаємо зручнішого моменту."
  decline_of_empire.6.title: "Вимоги народу"
  decline_of_empire.6.desc: "На тлі смути наші #L [target_culture.GetName]і#! піддані почали вимагати більших прав самоврядування. Заворушення, що охопили [ROOT.GetCountry.Custom('rank_ru_ACC')|l], розпалили їхнє бажання самим вирішувати свої справи, і тепер вони хочуть реформ та більшої незалежності від центральної влади.\n\nВідкидати їхні вимоги може бути небезпечно! Їхнє невдоволення зростає, і воно може перерости у відкритий заколот. Якщо ми проігноруємо ці прохання, ми можемо відвернути від себе частину населення та спровокувати нові заворушення в [ROOT.GetCountry.Custom('rank_ru_PREP')|l]. З іншого боку, якщо ми підемо на поступки, це допоможе нам зняти напруженість та зберегти стабільність, але послабить наш контроль."
  decline_of_empire.6.a: "Дати їм обмежене самоврядування."
  decline_of_empire.6.b: "Вони забуваються!"
  explain_decline_of_empires_events.6_tt: "Знизивши [Concept('control', 'контроль')|e] над цими [Concept('locations', 'місцевостями')|e], ми втратимо контроль у короткостроковій перспективі. Але підвищення [Concept('pop_satisfaction', 'задоволення')|e] наших [target_culture.GetNameWithNoTooltip]их [Concept('pops', 'груп населення')|e] може призвести до зміцнення [Concept('control', 'контролю')|e] пізніше."
  show_num_pops_affected_a_tt: "[Concept('pop_satisfaction', 'Задоволення ')|e] близько [ROOT.GetVariable('pop_size_variable').GetValue|V0]#Y K#! [Concept('pops', 'груп населення')|e] [target_culture.GetNameWithNoTooltip]ої [Concept('culture', 'культури')|e] підвищиться на [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%]"
  showcase_affected_locations_num_tt: "[Concept('control', 'Контроль')|e] у приблизно #Y [ROOT.GetVariable('num_locations_affected_variable').GetValue]#! [Concept('locations', 'місцевостях')|e] з #L [target_culture.GetNameWithNoTooltip]им#! [Concept('pops', 'населенням')|e] знизиться на [ShowNamedValue('control_mild_penalty')|+=2%]"
  show_num_pops_affected_b_tt: "[Concept('pop_satisfaction', 'Задоволення ')|e] близько [ROOT.GetVariable('pop_size_variable').GetValue|V0]#Y K#! [Concept('pops', 'груп населення')|e] [target_culture.GetNameWithNoTooltip]ої [Concept('culture', 'культури')|e] знизиться на [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%]"
  decline_of_empire.7.title: "Інспекції в області [target_area.GetNameWithNoTooltip]"
  decline_of_empire.7.desc: "В області [target_area.GetName] проводиться масштабна інспекція, спрямована на відновлення порядку. Посиливши нагляд та забезпечивши виконання законів, ми зможемо повернути собі контроль над цими землями та підкорити місцеве населення [ROOT.GetCountry.GetCapital.Custom('LR_DAT')|l] [ROOT.GetCountry.GetCapital.GetName]."
  decline_of_empire.7.a: "Відправимо туди інспекторів."
  area_size_and_legislative_efficiency_tt: "Ефекти посилюються залежно від нашої [Concept('legislative_efficiency', 'законодавчої ефективності')|e] та від чисельності [Concept('population', 'населення')|e] в області [target_area.GetName]."
  amount_of_provinces_receive_bonus_depends_legislative_efficiency_tt: "Кількість [Concept('provinces', 'провінцій')|e], які отримають [Concept('modifier', 'модифікатор')|e] «[ShowModifier('recent_inspection_modifier')]», залежить від нашого модифікатора «[ShowModifierTypeName('legislative_efficiency')]»"
  removal_of_head_of_cabinet_takes_stab_tt: "[target_character.GetShortName] є [Concept('head_of_the_cabinet', 'головою ради')|e], тож за цю [Concept('action', 'дію')|e] ми отримаємо [ShowNamedValue('stability_mild_penalty')|+=2] до [Concept('stability', 'стабільності')|e], але при цьому помітно зменшимо [Concept('complacency', 'бездіяльність')|e] населення"
  decline_of_empire.8.title: "[target_character.GetNameWithNoTooltip] і чистки"
  decline_of_empire.8.desc: "[target_character.GetName] безперечно [Select_CString(target_character.IsFemale, 'засиділася', 'засидівся' )] на своїй посаді, про що свідчать [Select_CString(target_character.IsFemale, 'її', 'його' )] халатне ставлення до роботи та корупційні скандали за [Select_CString(target_character.IsFemale, 'її', 'його' )] участю. [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'сповнена', 'сповнений' )] рішучості: настав час відновити стабільність [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] та усунути від влади тих, хто діє проти власного народу."
  decline_of_empire.8.a: "Це необхідний захід."
  target_character_banned_tt: "Чистка проходить мирно та без жертв"
  target_character_violently_purged_tt: "Чистка набуває кривавого характеру"
  purging_entrenched_cabinet_member_tt: "Оскільки [target_character.GetName] — [ShowModifier('entrenched_cabinet_member')|l], ця дія значно зменшить [Concept('complacency', 'бездіяльність')|e] населення"
  decline_of_empire.9.title: "[target_character.GetNameWithNoTooltip] набирає впливу"
  decline_of_empire.9.desc: "За час своєї довгої та успішної роботи в уряді [target_character.GetName] [Select_CString(target_character.IsFemale, 'зуміла', 'зумів' )] зосередити у своїх руках значну владу, що набагато перевершує [Select_CString(target_character.IsFemale, 'її', 'його' )] реальні повноваження. Так, [Select_CString(target_character.IsFemale, 'вона зібрала', 'він зібрав' )] навколо себе безліч прихильників та чиновників, які звітують особисто перед [Select_CString(target_character.IsFemale, 'нею', 'ним' )], тим самим підриваючи авторитет центральної влади. У такі важкі часи стабільність [ROOT.GetCountry.Custom('rank_ru_GEN')|l] постійно перебуває під загрозою, тому не можна допустити, щоб хтось, крім правителя, мав подібний вплив."
  decline_of_empire.9.a: "Цьому потрібно покласти край."
  character_can_only_be_removed_via_purge_action_tt: "[target_character.GetShortName] втратить свій вплив, тільки якщо виконати [Concept('action', 'дію')|e] «[ShowGenericActionName('cd_purge_cabinet_member')]» на панелі [Concept('disaster', 'лиха')|e]"