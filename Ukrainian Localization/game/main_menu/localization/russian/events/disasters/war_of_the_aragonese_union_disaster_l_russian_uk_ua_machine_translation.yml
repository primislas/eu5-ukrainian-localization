l_russian:
  war_of_the_aragonese_union_disaster.1.title: "Відновлення унії"
  war_of_the_aragonese_union_disaster.1.desc: "[ruler_brother.GetName] вигнаний з [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]. В'їзд до #TOOLTIP:AREA,catalonia,X #L Каталонії#!#! та #TOOLTIP:LOCATION,zaragoza,X #L Сарагоси#!#! заборонений йому назавжди: не можна допустити, щоб слова його підточували впевненість інших аристократів. Але замість того, щоб змиритися, він відкрито насміхається над наказом нашого короля і навіть закликав інших змовників зустрітися з ним біля міста #TOOLTIP:LOCATION,zaragoza,X #L Сарагоса#!#!. Разом вони підняли такий же заколот, з яким колись зіткнувся [scope_alfons_iii.GetName], що воював з #italic Арагонською унією#!.\n\nДо брехні, яку поширює [ruler_brother.GetNameWithNoTooltip], домішалися старі образи #L [GetCountry('ARA').GetAdjective|l]ої#! знаті та міст щодо корони. Суміш, що утворилася, спалахнула настільки яскраво, що пожежа повстання швидко почала пожирати Сарагосу."
  war_of_the_aragonese_union_disaster.1.a: "Жодних переговорів з заколотниками та зрадниками."
  war_of_the_aragonese_union_disaster.1.a.tt: "Усі [Concept('pops', 'групи населення')|e] в #TOOLTIP:PROVINCE_DEFINITION,zaragoza_province,X #L Сарагосі#!#! приєднаються до групи заколотників «[union_of_aragon.GetName]»"
  war_of_the_aragonese_union_disaster.1.b: "Вислухаємо їхні вимоги — можливо, вдасться вирішити справу миром."
  union_of_aragon_name: "Арагонська унія"
  war_of_the_aragonese_union_disaster.2.title: "Старі вимоги"
  war_of_the_aragonese_union_disaster.2.desc: "Ватажки #italic Арагонської унії#! відповіли на королівське запрошення і мирно з'явилися до двору. Вони готові відмовитися від своїх вимог до престолонаслідування, проте боротися за розширення своїх прав будуть відчайдушно. Зупинити конфлікт можна лише одним шляхом: погодитися з ними."
  war_of_the_aragonese_union_disaster.2.a: "Як вони посміли так ображати корону?! Прогнати їх!"
  war_of_the_aragonese_union_disaster.2.b: "Іншого виходу немає. Ми згодні."
  war_of_the_aragonese_union_disaster.3.title.a: "[GetCountry('ARA').GetGovernment.GetRulerTitle] терпить приниження"
  war_of_the_aragonese_union_disaster.3.desc.a: "Повстання уній добігло кінця. [aragon_ruler.GetName] [Select_CString(aragon_ruler.IsFemale, 'була змушена', 'був змушений')] визнати, що [Select_CString(aragon_ruler.IsFemale, 'її', 'його')] васали, що знову об'єдналися під одним прапором, становлять страшну силу — навіть страшнішу, ніж [GetCountry('ARA').GetFlavorRank|l].\n\nПрийнятий за підсумками заколоту привілей тепер охоронятиме права дворян і городян від примх [GetCountry('ARA').Custom('rank_ua_GEN')|l] і раз і назавжди законодавчо закріпить їхню рівність."
  war_of_the_aragonese_union_disaster.3.title.b: "До зброї!"
  war_of_the_aragonese_union_disaster.3.desc.b: "Спроба піти на переговори провалилася. Зрадники з #italic Арагонської унії#! озброїлися і тепер захоплюють місто за містом і фортецю за фортецею, відрікаючись від колишніх клятв і вбиваючи наших вірних підданих. Усе, що нам залишається, — це зустріти їх на полі бою і покарати за зраду мечем."
  war_of_the_aragonese_union_disaster.3.title.c: "[GetCountry('ARA').GetGovernment.GetRulerTitle] виявляє мудрість"
  war_of_the_aragonese_union_disaster.3.desc.c: "Дипломатія перемогла. Всупереч усім очікуванням нашому володарю вдалося покласти край повстанню #italic Арагонської унії#!, не поступаючись заколотникам жодними правами. Усі повсталі угруповання та претенденти залишилися задоволені; громадянська війна нам більше не загрожує."
  war_of_the_aragonese_union_disaster.3.a: "Важкі часи починаються для [GetCountry('ARA').Custom('rank_ua_GEN')|l]."
  war_of_the_aragonese_union_disaster.3.b: "Хай живе [GetCountry('ARA').GetGovernment.GetRulerTitle|l]!"
  war_of_the_aragonese_union_disaster.4.title: "Нагода укласти мир"
  war_of_the_aragonese_union_disaster.4.desc: "Від імені #italic Арагонської унії#! до наших воріт прибув посол. Він повідомляє, що, поки ще не надто пізно, заколотники готові на переговори та обговорення всіх образ і невдоволень — за умови, що [GetCountry('ARA').GetGovernment.GetRulerTitle|l] запросить їх до двору та забезпечить безпеку на час переговорів."
  war_of_the_aragonese_union_disaster.4.a: "Нехай приходять з миром. Ми готові говорити."
  war_of_the_aragonese_union_disaster.4.b: "Викинемо його звідси. Говоритиме наша зброя."
  war_of_the_aragonese_union_disaster.4.b.tt: "Невдоволення посилюється"
  war_of_the_aragonese_union_disaster.5.title: "Унія розширюється"
  war_of_the_aragonese_union_disaster.5.desc: "#italic Арагонська унія#! простягає свої щупальця все далі, покриваючи ними #TOOLTIP:AREA,aragon,X #L Арагон#!#! та #TOOLTIP:AREA,valencia,X #L Валенсію#!#!. Звинувачення, якими розкидаються заколотники, знаходять відгук у багатьох містах, де ще пам'ятають старі образи, і всі перенесені колись образи з боку [GetCountry('ARA').Custom('rank_ua_GEN')|l] витягуються на світ."
  war_of_the_aragonese_union_disaster.5.a: "Відправимо посла: ми готові на переговори з їхніми керівниками."
  war_of_the_aragonese_union_disaster.5.b: "У нас є важливіші турботи."
  war_of_the_aragonese_union_disaster.6.title: "Лігво лева"
  war_of_the_aragonese_union_disaster.6.desc: "Керівники #italic Арагонської унії#! відправили до нас гінця. Послання його цілком однозначне: [GetCountry('ARA').GetGovernment.GetRulerTitle|l] запрошується до славетної столиці #TOOLTIP:LOCATION,zaragoza,X #L Сарагоси#!#! на вшанування зібраного там парламенту. Заколотники висловлюють упевненість, що разом нам вдасться дійти згоди та покласти край несправедливостям, однак місто насправді належить їм, а тому одному лише богу відомо, що станеться, якщо переговори підуть невдало."
  war_of_the_aragonese_union_disaster.6.a: "[GetCountry('ARA').GetGovernment.GetRulerTitle|U] — надто важлива персона. Вони не посміють перечити."
  war_of_the_aragonese_union_disaster.6.b: "Очевидно, що це пастка. Не варто їхати до цього міста."
  war_of_the_aragonese_union_disaster.7.title: "Загрозливий парламент"
  war_of_the_aragonese_union_disaster.7.desc: "На вулицях стародавнього міста #TOOLTIP:LOCATION,zaragoza,X #L Сарагоса#!#! встановився крихкий мир — порушити його поки не наважуються ні #italic Арагонська унія#!, ні [GetCountry('ARA').GetGovernment.GetRulerTitle|l]. У парламенті, втім, панує безлад.\n\nНа самому початку засідання першими слово взяли заколотники. Вони наполегливо вимагають одного: нехай [GetCountry('ARA').GetGovernment.GetRulerTitle|l] закріпить досить довгий список їхніх нових прав та привілеїв на законодавчому рівні. Обстановка склалася вкрай небезпечна: багато хто з них озброєний, а тому вельми висока ймовірність, що [GetCountry('ARA').GetGovernment.GetRulerTitle|l] не доживе до кінця засідання."
  war_of_the_aragonese_union_disaster.7.a: "Ми побоюємося за своє життя, а тому готові піти на таку несправедливість."
  war_of_the_aragonese_union_disaster.7.b: "Ми відмовляємося прогинатися під вас."
  war_of_the_aragonese_union_disaster.7.c: "Варта! Виведіть нас із цієї пастки!"
  war_of_the_aragonese_union_disaster.8.title: "Повстання Валенсії"
  war_of_the_aragonese_union_disaster.8.desc: "Пожежа заколоту дісталася до річки Турія, де знову підняла голову #italic Валенсійська унія#!. Жителі #TOOLTIP:AREA,valencia,X #L Валенсії#!#!, доведені до відчаю своїм становищем та різницею в правах між двома коронами, приєднуються до заколотників у надії забезпечити собі бажані привілеї."
  war_of_the_aragonese_union_disaster.8.a: "Прокляття!"