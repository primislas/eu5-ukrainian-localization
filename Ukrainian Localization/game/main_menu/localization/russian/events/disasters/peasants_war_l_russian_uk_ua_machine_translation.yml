l_russian:
  peasants_war.1.title: "Селянська війна"
  peasants_war.1.desc: "Селянство вже не перший рік висуває цілу низку політичних, економічних та релігійних вимог. Народне невдоволення все частіше обертається жорстокими бунтами. У бунтівних селян немає єдиного керівництва, їм бракує озброєння, і все ж вони перетворилися на серйозну проблему для влади. Бунтівники вже спалили та розграбували кілька храмів і важливих урядових будівель."
  peasants_war.1.a: "Нас чекають суворі часи…"
  peasants_war.1.a.tt: "Наші #TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, #TOOLTIP:POPTYPE,laborers,X #L робітники#!#! та #TOOLTIP:POPTYPE,soldiers,X #L солдати#!#! в регіоні [ROOT.GetCountry.GetCapital.GetRegion.GetName] приєднаються до групи заколотників «[target_rebel.GetName]»"
  peasants_war.2.title: "Селянські протести"
  peasants_war.2.desc: "По всій країні спалахують народні заворушення та протести. Розлючені селяни прагнуть політичних і соціальних змін та вимагають негайних реформ. Народ довго ніс тягар високих податків і зносив жорстокість землевласників, але його терпіння добігло кінця…"
  peasants_war.2.a: "Потрібно посилити кріпосну залежність!"
  peasants_war.2.b: "Доведеться послабити кріпосну залежність."
  peasants_war.3.title: "Релігійне повстання"
  peasants_war.3.desc: "Ідеали Реформації швидко поширилися серед пригнобленої селянської маси. Часто причини цього лежали зовсім не в релігійній, а в соціальній сфері — багато хто очікував, що з поширенням протестантизму до повсталих приєднаються й інші стани, а тяготи селян зменшаться. Звісно, вони помилялися: чим ширше поширювалося повстання, тим більше реформаторів засуджували «кровожерливих селян» та їхні безчинства."
  peasants_war.3.a: "Ми повинні розчавити їх!"
  peasants_war.3.b: "Нехай вірують, як вважають за правильне."
  opinion_pope_religious_tolerance: "Папа незадоволений вашою релігійною терпимістю"
  peasants_war.5.title: "Повсюдна децентралізація"
  peasants_war.5.desc: "На ранніх етапах селянської війни заколотники досягли серйозних успіхів, просто задавивши числом протистоячу їм знать. Через децентралізований характер нашої держави порівняно невеликі повстання на місцях швидко виходили за межі окремих володінь, доки не заполотнила більша частина країни."
  peasants_war.5.a: "Здолаємо заколотників!"
  peasants_war.5.b: "Треба розпочати переговори та знайти компроміс."
  peasants_war.6.title: "Кінець селянської війни"
  peasants_war.6.desc: "Схоже, період нестабільності залишився в минулому. Бунтівні селяни втратили волю до боротьби, тепер вони нескоро вимагатимуть нових реформ."
  peasants_war.6.a: "Потрібно відновити порядок."