l_russian:
  english_civil_war.250.title: "[target_character.GetNameWithNoTooltip]"
  english_civil_war.250.desc: "Нещодавня зміна влади в країні [ROOT.GetCountry.GetLongName] дала дорогу нагору багатьом новим людям, які готові взяти в свої руки провідництво своїми станами. [Select_CString(target_character.IsFemale, 'Одна', 'Один' )] з таких людей, [target_character.GetName], нещодавно [Select_CString(target_character.IsFemale, 'набула', 'набув' )] великої ваги та впливу в [target_location.Custom('LR_PREP')|l] [target_location.GetName].\n\n[Select_CString(target_character.IsFemale, 'Повна', 'Повний' )] амбіцій та переконаності у своїй вірі, [Select_CString(target_character.IsFemale, 'вона', 'він' )] та [Select_CString(target_character.IsFemale, 'її', 'його' )] сподвижники, поза сумнівом, змінять майбутнє нашого народу — на добро чи на зло."
  english_civil_war.250.a: "Цікаво."
  more_likely_to_fire_disaster_tt: "[ShowDisasterName('english_civil_war')] трапиться #R з більшою ймовірністю#!. Якщо [Concept('disaster', 'катастрофа')|e] почнеться, коли [target_character.GetName] буде [Select_CString(target_character.IsFemale, 'жива, вона', 'живий, він' )] стане на чолі однієї зі сторін"
  english_civil_war.250.historical_info: "Олівер Кромвель був найважливішою фігурою Англійської громадянської війни та періоду республіки, що настав після неї. Переконаний пуританин, він став на чолі парламентських військ і привів їх до рішучих перемог, кульмінацією яких стала страта короля Карла I та формування Англійської республіки. На посаді лорда-протектора Кромвель проявив себе авторитарним правителем, насаджував пуританські цінності та зміцнював контроль в Англії, Шотландії та Ірландії. Його військові походи, особливо в Ірландії, увійшли в історію як жорстокі та залишили довгий слід в історії країни."
  english_civil_war.251.title: "Посилення парламентаріїв"
  english_civil_war.251.desc: "[target_character_1.GetName] та [english_civil_war_rebels_scope.GetName] розсварилися настільки, що зіткнення стали неминучими. Невдоволення центральною владою, податками та релігійними законами радикалізували партії в #L [ROOT.GetCountry.GetAdjective]ому#! дворі, що призвело до відкритого заколоту.\n\nЗаколотники-парламентарії, на чолі яких [Select_CString(target_character_2.IsFemale, 'стала', 'став' )] [target_character_2.GetName], взяли в руки зброю та пішли війною проти [ROOT.GetCountry.GetGovernment.GetAdjective]ого порядку, вимагаючи для себе більше влади та обмеження державних повноважень. На їхній бік стали багато впливових [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], а також розчаровані маси. Майбутнє [ROOT.GetCountry.Custom('CL_GEN')] у небезпеці, адже країна занурилася в громадянську війну."
  english_civil_war.251.a: "Невдячний набрід!"
  provinces_will_align_with_rebels_tt: "Кілька [Concept('provinces', 'провінцій')|e] в регіоні [ROOT.GetCountry.GetCapital.GetRegion.GetName] переметнуться на бік заколотників фракції «[english_civil_war_rebels_scope.GetName]»"
  english_civil_war.251.historical_info: "Англійська громадянська війна (1642–1651 рр.) стала результатом конфлікту короля Карла I та парламенту з приводу королівської влади, оподаткування та релігійних реформ. Самовладне правління Карла, недотримання ним правил правління та насадження непопулярних законів призвели до загального обурення.\n\nСторонами у війні були роялісти (прихильники монархії) та парламентарії, які виступали за конституційне правління. Закінчилася вона стратою Карла I, скасуванням монархії та заснуванням Англійської республіки на чолі з Олівером Кромвелем. Зрештою цей конфлікт повністю перекроїв політичну будову Англії, послабив повноваження монархії та заклав основи сучасної парламентської демократії, хоча конфлікти в країні тривали аж до 1660 року, коли монархія була відновлена."
  english_civil_war.252.title: "В Англійській громадянській війні перемагають парламентарії"
  english_civil_war.252.desc: "Після довгих років битв [target_character.GetName] та [Select_CString(target_character.IsFemale, 'її', 'його' )] сили взяли гору, розгромили війська роялістів і поклали край Англійській громадянській війні. Тріумф парламентаріїв ознаменував докорінний зсув у структурі влади в [ROOT.GetCountry.Custom('rank_ru_PREP')|l].\n\nСтарий порядок було зруйновано, і його місце зайняли нові принципи державного управління, засновані на владі парламенту та волі народу — і звичайно ж, на чолі всього цього [Select_CString(target_character.IsFemale, 'має', 'має' )] бути [target_character.GetName]. Перед [ROOT.GetCountry.Custom('rank_ru_INST')|l] тепер стоїть завдання відновлення та переосмислення своєї ідентичності в умовах нової влади. Наслідки революції назавжди змінять майбутнє [ROOT.GetCountry.Custom('CL_GEN')]."
  english_civil_war.252.a: "Оце так поворот!"
  english_civil_war.253.title: "В Англійській громадянській війні перемагають роялісти"
  english_civil_war.253.desc: "У конфлікті між [ROOT.GetCountry.Custom('rank_ru_INST')|l] та парламентаріями рішучу перемогу [Select_CString(target_character.IsFemale,'здобула', 'здобув')] [target_character.GetName]. Лояльні [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій владі сили розбили заколотників і відновили порядок у [ROOT.GetCountry.Custom('rank_ru_PREP')|l].\n\nЗ розгромом заколоту наше становище зміцниться, а ідеали парламентаризму будуть придушені. Тепер нам потрібно залікувати рани громадянської війни, зміцнити контроль у країні та зробити так, щоб більше ніхто не смів кидати виклик нашій владі."
  english_civil_war.253.a: "Хай живе [target_character.GetNameWithNoTooltip]!"
  english_civil_war.254.title: "Вибухнула [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.254.desc: "Роздратовані [ROOT.GetCountry.GetGovernment.GetAdjective|l]ими зловживаннями, різні фракції парламентаріїв твердо вирішили захистити свої повноваження та оголосили війну короні та усталеному порядку. Вони зібрали війська та вирушили в похід за представницьке правління.\n\nСкоро #L [ROOT.GetCountry.GetAdjective|l]і#! землі стануть полями боїв між парламентаріями та роялістами за право визначити майбутнє [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Країна тоне в хаосі, і лише результат війни покаже, чи збереже [target_character.GetShortNameWithNoTooltip] абсолютну владу над своїми підданими, чи заколотники зможуть захистити своє бачення країни."
  english_civil_war.254.a: "Станемо на бік парламентаріїв!"
  english_civil_war.254.b: "Роялісти переможуть."
  english_civil_war.255.title: "Провінція переходить на бік парламентаріїв"
  english_civil_war.255.desc: "У провінції [target_province.GetName] змінилися вітри війни. Доведені до відчаю політикою корони та її деспотичним правлінням, місцеві ватажки та знатні родини відкрито заявили про підтримку парламентаріїв. Вони зібрали ополчення та збудували укріплення, а над ратушами та замками підняли прапори [ROOT.GetCountry.Custom('parliament_ru_GEN')|l]. Цей цінний регіон, багатий на ресурси та рекрутів, став найважливішим оплотом заколотників. Корона повинна швидко придушити повстання, інакше його полум'я охоплюватиме все нові землі."
  english_civil_war.255.a: "Прокляті зрадники!"
  every_location_loses_scaling_sat_and_joins_rebel_tt: "У разі [Concept('civil_war', 'громадянської війни')|e] обурені [Concept('pops', 'групи населення')|e] у провінції [target_province.GetName] втратять [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e] та перейдуть на бік заколотників фракції «[english_civil_war_rebels_scope.GetName]»"
  continue_playing_as_root_tt: "Ми вступимо в [Concept('civil_war', 'громадянську війну')|e] як [ROOT.GetCountry.GetLongName]"
  english_civil_war.256.title: "[ShowParliamentIssueTypeNameWithNoTooltip('new_model_army_pi')]"
  english_civil_war.256.desc: "У [ROOT.GetCountry.Custom('parliament_ru_PREP')|l] готуються до обговорення реформи війська. Зазвичай офіцерські посади у військах займали [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], багато з яких майже не мали військового досвіду. [ShowParliamentIssueTypeName('new_model_army_pi')] має виправити ситуацію: протягом громадянської війни недосвідченим членам [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] буде заборонено служити командирами в війську та на флоті. Збройні сили будуть реформовані в військо нового зразка, командувати яким буде [Select_CString(target_character_2.IsFemale,'досвідчена та здібна', 'досвідчений та здібний')] [target_character_2.GetName]."
  english_civil_war.256.a: "Так і треба!"
  english_civil_war.256.b: "Не варто поспішати."
  pi_will_be_available_for_10_years_tt: "[Concept('parliament_issue', 'Парламентське питання')|e] «[ShowParliamentIssueTypeNameWithNoTooltip('new_model_army_pi')]» стане доступним протягом наступних #Y 10#! років"
  target_character_2_goes_away_tt: "[target_character_2.GetShortNameWithNoTooltip] зникне"
  english_civil_war.257.title: "Наростає заколот"
  english_civil_war.257.desc: "У хаосі Англійської громадянської війни область [target_area.GetName] може перейти під владу заколотників фракції «[english_civil_war_rebels_scope.GetName]». Невдоволення #L [ROOT.GetCountry.GetAdjective|l]ою#! владою перейшло всі межі, і місцеве населення переметнулося до заколотників. Містяни та місцеве ополчення захопили головні фортеці й вимагають прибавки до платні та звільнення від чиновницького гніту. Наша влада в регіоні висить на волосині, а полум'я невдоволення загрожує перекинутися далі."
  english_civil_war.257.a: "Нехай бунтують."
  english_civil_war.257.b: "Роздати їм грошей."
  pops_in_target_area_lose_90_sat_and_join_parliamentarists_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] наших [Concept('pops', 'груп населення')|e] у провінції [target_province.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%], вони підтримають сторону заколотників фракції «[english_civil_war_rebels_scope.GetNameWithNoTooltip]»"
  target_area_suffers_33_control_penalty_tt: "Наш [Concept('control', 'контроль')|e] над [Concept('locations', 'місцевостями')|e] області [target_area.GetNameWithNoTooltip] знизиться на [ShowNamedValue('control_extreme_penalty')|+=2%]"
  english_civil_war.258.title: "Наші васали та [ShowDisasterNameWithNoTooltip('english_civil_war')]"
  english_civil_war.258.desc: "Хаос, що охопив нашу країну, дав нашим васалам, які колись схиляли перед нами коліна, можливість повстати й прибрати до рук нашу спадщину. #TOOLTIP:DISASTER_TYPE,english_civil_war,X #L Англійська громадянська війна#!#! оголила протиріччя між нами та [target_subject.Custom('rank_ru_INST')|l]. Лідери цієї країни ще підтримують фасад лояльності, але при цьому виявляють усе більше невдоволення постійними поборами, якими обкладає їх в умовах війни із заколотниками фракції «[english_civil_war_rebels_scope.GetName]» #L [ROOT.GetCountry.GetAdjective|l]ий#! [ROOT.GetCountry.GetGovernment.GetCourtTitle|l].\n\nОдні радники хочуть, щоб [target_character_1.GetName] зобов'язав васала надати більше новобранців для війська. Інші ж застерігають, що зайві вимоги підштовхнуть нашого підданого до табору заколотників фракції «[english_civil_war_rebels_scope.GetNameWithNoTooltip]». Нам потрібно вирішити, чи посилювати війська, чи краще полегшити тягар васала заради збереження його лояльності."
  english_civil_war.258.a: "Не можна псувати стосунки."
  english_civil_war.258.b: "Нехай платять, та побільше."
  target_subject_will_appreciate_this_tt: "[target_subject.GetLongNameWithNoTooltip] оцінить цей жест"
  english_civil_war.259.title: "Добрі стосунки в розпал Англійської громадянської війни"
  english_civil_war.259.desc: "Народ [target_overlord.Custom('CL_GEN')] переживає смуту #TOOLTIP:DISASTER_TYPE,english_civil_war,X #L Англійської громадянської війни#!#!. Щоб згладити розкол у наших стосунках, [target_character_1.GetName] шукає способи зберегти нашу вірність. На тлі того, як важкий тягар податків викликає зростаюче невдоволення в регіоні, #L [target_overlord.GetAdjective|l]ий#! [target_overlord.GetGovernment.GetCourtTitle|l] вирішив звільнити нас від частини податей і навіть відправив до [ROOT.GetCountry.Custom('rank_ru_ACC')|l] щедрі дари. Цей жест доброї волі покликаний зміцнити нашу вірність сюзерену в ці неспокійні часи."
  english_civil_war.259.a: "Ситуація розвивається динамічно."
  english_civil_war.260.title: "Тиск дипломатії"
  english_civil_war.260.desc: "Країну [target_overlord.GetLongName] продовжує стрясати [ShowDisasterName('english_civil_war')], і величезні податки, якими обклали нас її влада, спустошують нашу скарбницю. Попри те, що окремі радники рекомендують полегшити для нас тягар податків, наш сюзерен вирішив залишити все, як є.\n\nНа жаль, наші благання були сприйняті з презирством. [target_character_1.GetName] не тільки не [Select_CString(target_character_1.IsFemale,'погодилася', 'погодився')] знизити податки, а й [Select_CString(target_character_1.IsFemale,'завдала', 'завдав')] нам образи, назвавши наше прохання зрадницьким наріканням. Така зарозумілість лише поглибила наші протиріччя, і наша лояльність сюзерену тепер низька, як ніколи."
  english_civil_war.260.a: "Добром це для них не скінчиться!"
  english_civil_war.261.title: "Заколотники набирають вплив"
  english_civil_war.261.desc: "Нещодавні заворушення та явне відчуття нестабільності призвели до поширення паніки. На її тлі [english_civil_war_rebels_scope.GetName] змогли поповнити свої лави свіжими новобранцями, готовими підняти зброю проти встановленого порядку!"
  english_civil_war.261.a: "Прокляті заколотники!"