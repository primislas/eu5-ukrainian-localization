l_russian:
 #Loc macros
 bra_hre_hyperlink: "[GetUniqueInternationalOrganization('hre').GetName]"
 bra_hre_hyperlink_no_tt: "[GetUniqueInternationalOrganization('hre').GetNameWithNoTooltip]"
 bra_hre_emperor_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle]"
 bra_hre_emperor_country_hyperlink: "[GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetName]"
 bra_wittelsbach_hyperlink: "[ShowDynastyName('wittelsbach_dynasty')]"
 bra_wittelsbach_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('wittelsbach_dynasty')]"
 bra_askanier_hyperlink: "[ShowDynastyName('askanier_dynasty')]"
 bra_askanier_hyperlink_no_tt: "[ShowDynastyNameWithNoTooltip('askanier_dynasty')]"
 bra_variable_counter: "сейчас: #Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_investment_var').GetValue]#!"
 bra_neglect_variable_counter: "сейчас: #Y [GetCountry('BRA').MakeScope.GetVariable('bra_wittelsbacher_neglect_var').GetValue]#!"
 bra_wittelsbacher_investment_var: "#Y Вложения Виттельсбахов#!"
 bra_wittelsbacher_neglect_var: "#Y Пренебрежение Виттельсбахов#!"
 bra_change_investment_score_add: "$bra_wittelsbacher_investment_var$ — мы получаем $VALUE|G0$ $bra_variable_counter$"
 bra_change_investment_score_subtract: "$bra_wittelsbacher_investment_var$ — мы теряем $VALUE|R0$ $bra_variable_counter$"
 bra_change_neglect_score_add: "$bra_wittelsbacher_neglect_var$ — мы получаем $VALUE|G0$ $bra_neglect_variable_counter$"
 bra_change_neglect_score_subtract: "$bra_wittelsbacher_neglect_var$ — мы теряем $VALUE|R0$ $bra_neglect_variable_counter$"
 PRU_DEAL_WITH_ROBBER_BARONS_TOOLTIP_IN_PROGRESS: "Прогресс: $PROGRESS$%\n$DAYS$, $DATE$"
 #Events
 turmoil_in_brandenburg.1.title: "[root_dynasty.GetNameWithNoTooltip] из [ROOT.GetCountry.Custom('CL_GEN')]"
 turmoil_in_brandenburg.1.desc.start: "После того как в 1320 году умер последний член династии [ShowDynastyName('askanier')] из #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — [GetCharacter('bra_heinrich_ii_askanier').GetName], — [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ими землями теперь правит [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'императрица', 'император' )] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetName]. Чтобы на северных #TOOLTIP:CULTUREGROUP,german_group,X #L германских#!#! территориях царил порядок, [GetCharacter('ubv_ludwig_iv_wittelsbach').GetShortNameWithNoTooltip] [Select_CString(GetCharacter('ubv_ludwig_iv_wittelsbach').IsFemale, 'передала', 'передал' )] [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ую марку [Select_CString(GetCharacter('bra_ludwig_v_wittelsbach').IsFemale, 'своей дочери', 'своему сыну' )] по имени [GetCharacter('bra_ludwig_v_wittelsbach').GetName]."
 turmoil_in_brandenburg.1.desc: "$turmoil_in_brandenburg.1.desc.start$\n\nТак начинается эпоха правления [ROOT.GetCountry.Custom('predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')] рода #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!. В стране начинается смута, ведь [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] ещё не может занять трон в силу своих юных лет, поэтому почти всем государством управляет [GetCharacter('hnb_berthold_iv_henneberg_schleusingen').GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] не пользуется поддержкой населения, в державе бесчинствуют бароны-разбойники, накапливаются экономические трудности. [GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip] может лишь мечтать о покое, и в целом Виттельсбахи, похоже, совершенно не заинтересованы в управлении своими северными владениями…"
 turmoil_in_brandenburg.1.desc.fallback: "$turmoil_in_brandenburg.1.desc.start$\n\n[GetCharacter('bra_ludwig_v_wittelsbach').GetShortNameWithNoTooltip], впрочем, [Select_CString(GetCharacter('bra_ludwig_v_wittelsbach').IsFemale, 'правила', 'правил' )] недолго, и теперь [ROOT.GetCountry.Custom('CL_INST')] руководит [root_ruler.GetName]. [ROOT.GetCountry.GetGovernment.GetRulerTitle] сталкивается с теми же трудностями — экономическими бедами и бесчинствами баронов-разбойников. Да и в целом, похоже, #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! мало заинтересованы в том, чтобы развивать эту отсталую марку…"
 turmoil_in_brandenburg.1.a: "Рано ещё хоронить [ROOT.GetCountry.Custom('CL_ACC')]!"
 turmoil_in_brandenburg.1.a.at: "[Concept('control', 'Контроль')|e] над нашей державой снизится!"
 turmoil_in_brandenburg.1.a.bt: "Чтобы преодолеть эти испытания, нам нужно выйти из династического кризиса и покончить с разгулом баронов-разбойников."
 turmoil_in_brandenburg.2.title: "Конец владычества Виттельсбахов"
 turmoil_in_brandenburg.2.desc: "Ни у кого из #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! больше нет монаршей власти над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, поэтому эпоха экономического застоя и бездействия властей закончилась. Теперь можно начать всё с чистого листа и обеспечить народу благополучие."
 turmoil_in_brandenburg.2.a: "Пусть с этого начнётся новый золотой век."
 turmoil_in_brandenburg.2.a.tt: "Показатели «$bra_wittelsbacher_investment_var$» и «$bra_wittelsbacher_neglect_var$» будут отключены."
 turmoil_in_brandenburg.3.title: "Лжевальдемар"
 turmoil_in_brandenburg.3.entry: "$turmoil_in_brandenburg.3.title$"
 turmoil_in_brandenburg.3.desc: "Поначалу в рассказ пусть с некоторым трудом, но всё же можно было поверить: действительно, почему бы [Select_CString(target_character.IsFemale, 'правительнице', 'правителю' )] не подстроить собственную смерть, чтобы спокойно отправиться в паломничество, а затем вернуться на трон? Однако чем упорнее [Select_CString(target_character.IsFemale, 'она стремилась', 'он стремился' )] к престолу, тем больше возникало противоречий. [Select_CString(target_character.IsFemale, 'Нынешняя', 'Нынешний' )] [GetCharacter('bra_waldemar_askanier').GetName] — совсем [Select_CString(target_character.IsFemale, 'не та, что была', 'не тот, что был' )] до 1320 года, и объяснить такие резкие перемены в [Select_CString(target_character.IsFemale, 'её', 'его' )] поведении очень сложно.\n\nНаконец, ко всеобщему изумлению истина раскрылась: [target_character.GetName] — всего лишь [Select_CString(target_character.IsFemale, 'самозванка, выдающая', 'самозванец, выдающий' )] себя за почтенную особу!\n\nВся поддержка, которой [Select_CString(target_character.IsFemale, 'она успела', 'он успел' )] заручиться, мгновенно улетучилась. Теперь никто больше не сомневается, что подлинный наш владыка — [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l]."
 turmoil_in_brandenburg.3.a: "Среди нас [Select_CString(target_character.IsFemale, 'самозванка', 'самозванец' )]! Кто бы мог подумать…"
 turmoil_in_brandenburg.4.title: "Произвол баронов-разбойников"
 turmoil_in_brandenburg.4.desc: "Бесчинствующие [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! бароны-разбойники вводят непомерные налоги и сборы, обирая местное население. Самоуправство эти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] оправдывают тем, что в своих владениях имеют законное право вести себя как угодно. И хотя на подобный шаг их могло толкнуть отчаяние, такие поборы не дают [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]им землям процветать. Стоит ли это терпеть?.."
 turmoil_in_brandenburg.4.a: "Начнём борьбу с баронами-разбойниками."
 turmoil_in_brandenburg.4.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 bra_peasants_revolt: "Крестьянский бунт"
 turmoil_in_brandenburg.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] бунтуют"
 turmoil_in_brandenburg.5.desc: "Экономическое положение #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! всё хуже и хуже. Многие [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], обозлённые таким положением дел, отказываются обрабатывать поля, пока мы не выполним их требования и не избавим народ от бесчинства корыстолюбивых баронов-разбойников."
 turmoil_in_brandenburg.5.a: "Постараемся улучшить их положение."
 turmoil_in_brandenburg.5.b: "Какое нам дело до крестьян? Они не причинят нам хлопот."
 turmoil_in_brandenburg.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] берут власть на себя"
 turmoil_in_brandenburg.6.desc: "#TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! правят исключительно на бумаге — настоящая власть находится в руках тех, за кем народ следует по собственной воле. В сёлах, например, это [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Чтобы наши подданные не забывали, кто по праву властвует над этими краями, лучше лишить духовенство полномочий…"
 turmoil_in_brandenburg.6.a: "Отзовём их полномочия."
 turmoil_in_brandenburg.6.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] — люди, с которыми лучше не шутить."
 turmoil_in_brandenburg.7.title: "Город не платит налоги"
 turmoil_in_brandenburg.7.desc: "[ROOT.GetCountry.GetName|U] — плохо пригодный для жизни край, плохо заселённый и ещё хуже развитый. Практически все улучшения [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их институтов оплачиваются за счёт налогов, которые уплачивают города. Однако [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] заявили, что отказываются платить свою долю, поскольку не видят причин признавать, что $bra_wittelsbach_hyperlink$ — их законный правитель."
 turmoil_in_brandenburg.7.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] бунтуют? Мы найдём на них управу."
 turmoil_in_brandenburg.7.b: "$common_string_leave_them_be$"
 turmoil_in_brandenburg.8.title: "[target_character.GetShortNameWithNoTooltip] претендует на самовластие"
 turmoil_in_brandenburg.8.desc: "По сведениям из [target_location.Custom('LR_GEN')|l] [target_location.GetName], [target_character.GetName] давно уже правит имениями так, будто [Select_CString(target_character.IsFemale, 'её', 'его' )] владения являются независимой державой. Стены [Select_CString(target_character.IsFemale, 'её', 'его' )] замков поднимаются всё выше, рвы углубляются, а войска подчиняются [Select_CString(target_character.IsFemale, 'ей', 'ему' )] лично. Прошения, которые в прежние времена отправляли двору, теперь ложатся к [Select_CString(target_character.IsFemale, 'ней', 'нему' )] на стол, и даже местные налоги и сборы попадают в [Select_CString(target_character.IsFemale, 'её', 'его' )] сокровищницу — несмотря на то, что на них по праву претендует [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Кое-кто считает, что [target_character.GetShortNameWithNoTooltip] вот-вот объявит все #L [ROOT.GetCountry.GetAdjective|l]ие#! земли своими личными владениями…"
 turmoil_in_brandenburg.8.a: "Мы смиримся с этим — до поры до времени."
 turmoil_in_brandenburg.8.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] стоит превыше любых вельмож."
 tib_outcome_8_1_tt: "Наши агенты позаботятся о том, чтобы [target_character.GetShortNameWithNoTooltip] больше не [Select_CString(target_character.IsFemale, 'доставляла', 'доставлял' )] нам хлопот"
 tib_outcome_8_2_tt: "[ShowEstateTypeName('nobles_estate')] [target_location.Custom('LR_GEN')|l] [target_location.GetName] возмутятся нашим вмешательством"
 tib_outcome_8_3_tt: "Это решение испортит наши отношения со всей #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократией#!#! страны"
 turmoil_in_brandenburg.9.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] провинции [target_province.GetNameWithNoTooltip] объединяются в лигу"
 turmoil_in_brandenburg.9.desc: "Ряд знатных семейств провинции [target_province.GetName] официально объединился в лигу. Они дали клятву защищать друг друга, содержать общий двор и вместе сопротивляться любому вмешательству столичных чиновников в свои дела.\n\nМногие местные жители уже уверены в том, что реальной властью в провинции [target_province.GetNameWithNoTooltip] обладают именно эти [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], а вовсе не [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сидящая', 'сидящий' )] в далёком [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName]. При дворе говорят, что подобные объединения скоро приведут к упадку центральной власти."
 turmoil_in_brandenburg.9.a: "Признаем лигу и заручимся её поддержкой."
 turmoil_in_brandenburg.9.b: "Разгоним эту группировку и восстановим авторитет столицы."
 nobles_in_target_province_gain_pop_satisfaction_extreme_bonus_tt: "[Concept('pops', 'Группы населения')|E], принадлежащие нашим подданным-#TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократам#!#! в провинции [target_province.GetName], будут обрадованы признанием лиги и получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|E]"
 lower_class_pop_satisfaction_weak_penalty_tt: "[Concept('lower_class', 'Низшее общество')|E] провинции [target_province.GetName] будет недовольно ростом могущества феодалов и получит [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|E]"
 nobles_in_target_province_may_agitate_locals_to_rebel_tt: "В ответ на нашу решительную политику возмущённые [ShowEstateTypeName('nobles_estate')|l] провинции [target_province.GetName] могут призвать свой народ к беспорядкам"
 turmoil_in_brandenburg.10.title: "Незаконные поборы в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.10.desc: "Купцы жалуются, что на дорогах и мостах в окрестностях [target_location.Custom('LR_GEN')|l] [target_location.GetName] появились новые посты для сбора пошлин, причём предприимчивые местные [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] установили их без разрешения свыше. Их слуги останавливают повозки, пересчитывают товары и требуют денег за #italic защиту#!.\n\nКаждая обобранная ими телега означает, что [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] недополучит доход. Хуже того, народ начинает верить, что законы в стране устанавливает не монарший двор, а обитатели ближайшего замка."
 turmoil_in_brandenburg.10.a: "Мы закроем глаза на их мздоимство."
 turmoil_in_brandenburg.10.b: "Немедленно снести посты сборщиков и восстановить авторитет власти!"
 turmoil_in_brandenburg.11.title: "Дом [target_dynasty_1.GetNameWithNoTooltip] бросает вызов династии [target_dynasty_2.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.11.desc: "Между домом [target_dynasty_1.GetName] и нашей династией [target_dynasty_2.GetName] растёт напряжение. На каждой пирушке или охоте знатные отпрыски этого рода публично заявляют, что [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не обладает монаршими качествами, да и происхождение [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'её', 'его' )] оставляет желать лучшего. Наглецы намекают, что их семья имеет не меньше прав на власть [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!.\n\nПостепенно эти намёки превратились в открытую борьбу за престиж, вассалов и влияние при дворе. Если не занять твёрдую позицию, менее знатные вельможи сочтут, что наша династия — лишь один из многих знатных родов в стране."
 turmoil_in_brandenburg.11.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] получит нашу безоговорочную поддержку."
 turmoil_in_brandenburg.11.b: "Уступки дому [target_dynasty_1.GetNameWithNoTooltip] позволят нам купить мир."
 target_character_2_will_challenge_the_power_nobles_tt: "[target_character_2.GetName] открыто обвинит #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократию#!#! в попытке узурпации власти."
 turmoil_in_brandenburg.12.title: "Вложения в [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.12.desc: "Советники составили проект королевских инвестиций в [target_location.Custom('LR_ACC')|l] [target_location.GetName] и другие земли провинции [target_province.GetName]. Новые дороги, рынки и конторы напомнят сельским жителям, что у них есть [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], и ослабят власть местных магнатов над торговлей и судебной системой.\n\n[ShowEstateTypeName('nobles_estate')|U], однако, настаивают, что развитием на местах должны заниматься только они, а любое вмешательство центральной власти встретит сопротивление."
 turmoil_in_brandenburg.12.a: "Вложим средства короны, чтобы усилить контроль."
 turmoil_in_brandenburg.12.b: "Этот вопрос всё равно не стоит нашего внимания."
 turmoil_in_brandenburg.13.title: "Развитие [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.13.desc: "Знатные люди [target_location.Custom('LR_GEN')|l] [target_location.GetName] подали ко двору прошение о финансовых вложениях. Они утверждают, что новые улицы, ратуши и общественные здания поспособствуют укреплению #L [ROOT.GetCountry.GetAdjective|l]ого#! влияния в городах провинции [target_province.GetName] и снизят недовольство их жителей.\n\nКазначеи, однако, предупреждают, что подобная щедрость ляжет на казну тяжким бременем, а другие провинции посчитают нашу политику расточительной."
 turmoil_in_brandenburg.13.a: "Вложим средства в развитие всей провинции [target_province.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.b: "Ограничимся [target_location.Custom('LR_INST')|l] [target_location.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.13.c: "Подобная щедрость нам не по карману."
 every_location_in_target_province_gains_center_of_urbanization_modifier_tt: "Каждый [Concept('location', 'район')|E] провинции [target_province.GetName] получит [Concept('modifier', 'модификатор')|E] «[GetModifier('center_of_urbanization_modifier').GetNameWithTooltip]»"
 every_location_in_target_province_gains_flourishing_capital_modifier: "Каждый [Concept('location', 'район')|E] провинции [target_province.GetName] получит [Concept('modifier', 'модификатор')|E] «[GetModifier('flourishing_capital_modifier').GetNameWithTooltip]»"
 every_location_in_target_province_gains_development_mild_bonus: "Каждый [Concept('location', 'район')|e] провинции [target_province.GetName] получит [ShowNamedValue('development_weak_bonus')|+=] к [Concept('development', 'развитию')|e]"
 every_location_in_target_province_gains_prosperity_extreme_bonus: "Каждый [Concept('location', 'район')|e] провинции [target_province.GetName] получит [ShowNamedValue('prosperity_severe_bonus')|+=2%] к [Concept('prosperity', 'процветанию')|e]"
 turmoil_in_brandenburg.100.title: "Виттельсбахи возрождают [ROOT.GetCountry.Custom('CL_ACC')]"
 turmoil_in_brandenburg.100.entry: "$turmoil_in_brandenburg.100.title$"
 turmoil_in_brandenburg.100.desc: "Годы бедности, разрухи, своеволия сословий и произвола баронов-разбойников, годы трудностей и борьбы с претендентами на трон наконец-то закончились триумфом династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!. Сегодня [ROOT.GetCountry.GetFlavorRank|l] [ROOT.GetCountry.GetName] — подлинная жемчужина #TOOLTIP:REGION,north_german_region,X #L Северной Германии#!#!. Да здравствует [target_character.GetName]!"
 turmoil_in_brandenburg.100.a: "Виттельсбахи будут гордиться [ROOT.GetCountry.Custom('CL_INST')]."
 turmoil_in_brandenburg.200.title: "[target_character.GetNameWithNoTooltip] — человек-загадка"
 turmoil_in_brandenburg.200.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'умерла', 'умер' )] внезапно, однако память о [Select_CString(target_character.IsFemale, 'ней', 'нём' )] ещё долго жила [ROOT.GetCountry.Custom('predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Оказалось, что [Select_CString(target_character.IsFemale, 'эта женщина', 'этот человек' )] — якобы [Select_CString(target_character.IsFemale, 'представительница', 'выходец из' )] правившей [ROOT.GetCountry.Custom('rank_ru_INST')|l] до 1320 года династии $bra_askanier_hyperlink$ — на самом деле [Select_CString(target_character.IsFemale, 'самозванка', 'самозванец' )], [Select_CString(target_character.IsFemale, 'обманщица', 'обманщик' )] и [Select_CString(target_character.IsFemale, 'плутовка', 'плут' )], каких [ROOT.GetCountry.GetAdjectiveWithNoTooltip] ещё не видел[ROOT.GetCountry.Custom('end_fem')] за свою историю.\n\nКогда [Select_CString(target_character.IsFemale, 'она скончалась', 'он скончался' )], [Select_CString(target_character.IsFemale, 'усопшую', 'усопшего' )] предложили похоронить в [Select_CString(target_character.IsFemale, 'её', 'его' )] прежней могиле, чтобы [Select_CString(target_character.IsFemale, 'она', 'он' )] наконец-то [Select_CString(target_character.IsFemale, 'обрела', 'обрёл' )] покой. Каково же было всеобщее изумление, когда в земле обнаружился скелет — #italic [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'настоящая', 'настоящий' )] [GetCharacter('bra_waldemar_askanier').GetName]#!!\n\nЧувство стыда накрыло [ROOT.GetCountry.Custom('CL_ACC')|l]: один человек смог обмануть целую страну…"
 turmoil_in_brandenburg.200.a: "Как же нас так легко провели?"
 turmoil_in_brandenburg.300.title: "Долгая битва завершилась"
 turmoil_in_brandenburg.300.entry: "$turmoil_in_brandenburg.300.title$"
 turmoil_in_brandenburg.300.desc: "Борьба за подчинение [ROOT.GetCountry.Custom('longname_ru_GEN')] длилась десятки лет, но теперь ей настал конец. Династии, которые стремились занять наш престол, получили отпор. Последний оплот баронов-разбойников стёрт с лица земли. В трудный час мы проявили решительность и успешно воспользовались ситуацией. Новая власть, которую мы приведём на эти земли, сможет успешнее преодолевать подобные напасти в будущем."
 turmoil_in_brandenburg.300.a: "Наконец-то всё спокойно."
 turmoil_in_brandenburg.1000.title: "[target_character.GetNameWithNoTooltip] возвращается"
 turmoil_in_brandenburg.1000.entry: "Возвращение указанного персонажа"
 turmoil_in_brandenburg.1000.desc: "Поскольку никто из императоров #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#! больше не имеет никакого отношения к правящей династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, вновь встаёт вопрос, насколько [Select_CString(bra_ruler.IsFemale, 'легитимна', 'легитимен' )] [bra_ruler.GetName]. Жители #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! искренне тоскуют по временам, когда на троне сидел $bra_askanier_hyperlink$…\n\nИ, похоже, судьба к ним смилостивилась, потому что [target_character.GetName], [Select_CString(target_character.IsFemale, 'которую', 'которого' )] все считали [Select_CString(target_character.IsFemale, 'умершей', 'умершим' )], каким-то образом [Select_CString(target_character.IsFemale, 'восстала', 'восстал' )] из мёртвых. Своё чудесное возвращение [Select_CString(target_character.IsFemale, 'она объяснила', 'он объяснил' )] тем, что похороны оказались ненастоящими и были устроены исключительно ради возможности спокойно отправиться в паломничество в Святую землю. Теперь же [target_character.GetShortNameWithNoTooltip] вновь [Select_CString(target_character.IsFemale, 'готова', 'готов' )] занять #L [ROOT.GetCountry.GetAdjective|l]ий#! престол, на котором сейчас восседает [bra_ruler.GetShortNameWithNoTooltip]."
 turmoil_in_brandenburg.1000.desc.emperor_supports: "$turmoil_in_brandenburg.1000.desc$\n\nК счастью, [emperor_ruler.GetName] и [bra_ruler.GetShortNameWithNoTooltip] относятся друг к другу доброжелательно, поэтому [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] в споре дома Виттельсбахов с претендентом занимает сторону первых."
 turmoil_in_brandenburg.1000.desc.emperor_rejects: "$turmoil_in_brandenburg.1000.desc$\n\nК сожалению, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] в споре между домами Асканиев и Виттельсбахов поддерживает первых, а потому [emperor_ruler.GetName] выносит решение: власть над [bra_country.Custom('CL_INST')] получит [target_character.GetShortNameWithNoTooltip]. Спастись от угрозы, которую представляет [target_character.GetShortNameWithNoTooltip], можно, только если [emperor_ruler.GetNameWithNoTooltip] согласится заключить сделку…"
 turmoil_in_brandenburg.1000.a: "Пошлём гонца и будем надеяться, что [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] его примет!"
 turmoil_in_brandenburg.1000.a.at: "Каждая держава, которой правит член династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, получает [ShowBiasValue('opinion_support_our_dynasty_member')|+0] к [Concept('opinion', 'мнению')|E] [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!"
 turmoil_in_brandenburg.1000.a.tt: "Мы запросим помощи, и, возможно, [emperor_country.GetName] помо[emperor_country.Custom('gegu')]т нам в борьбе с претендентом, на что уйдёт #Y 2 года#!. В это время мы будем обязаны выполнять условия, которые нам поставит [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] (если [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'её', 'его' )] [Concept('opinion', 'мнение')|e] о нас не превышает #Y 100#!)"
 turmoil_in_brandenburg.1000.b: "Казним претендента самостоятельно!"
 turmoil_in_brandenburg.1000.b.tt: "Мы попытаемся устроить казнь. Если [target_character.GetName] окажется [Select_CString(target_character.IsFemale, 'казнена', 'казнён' )], [bra_ruler.GetName] вновь станет считаться легитимным правителем, а мы дополнительно получим #Y +5#! к показателю #Y «Вложения Виттельсбахов»#! $bra_variable_counter$.\nВ случае неудачи начнётся [Concept('civil_war', 'гражданская война')|e]"
 turmoil_in_brandenburg.1000.c: "Отречёмся в пользу истинного правителя [ROOT.GetCountry.Custom('CL_GEN')]."
 turmoil_in_brandenburg.1000.c.at: "Каждая держава, которой правит член династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, получает [ShowBiasValue('opinion_ousted_our_dynasty_member')|+0] к [Concept('opinion', 'мнению')|E] [ROOT.GetCountry.Custom('predlog_obo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!"
 turmoil_in_brandenburg.false_waldemar_rebel.tt: "#TOOLTIP:POPTYPE,nobles,X #L Аристократы#!#! из нескольких (вплоть до #Y 4#!) самых населённых районов во владении:\n• Получают [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]\n• Присоединяются к группе мятежников «[false_waldemar_rebel.GetName]»"
 turmoil_in_brandenburg.1001.title: "[target_character.GetShortNameWithNoTooltip] приобретает вес среди жителей [bra_country.Custom('CL_GEN')]"
 turmoil_in_brandenburg.1001.desc.imposter_revealed: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]. Причина визита весьма серьёзная: [bra_ruler.GetName] опасается, что [Select_CString(bra_ruler.IsFemale, 'её', 'его' )] соперник и претендент на престол начинает приобретать слишком громкую славу, а потому просит у нас помощи в борьбе. [Select_CString(target_character.IsFemale, 'Самозванка', 'Самозванец' )], [Select_CString(target_character.IsFemale, 'представляющаяся', 'представляющийся' )] как [target_character.GetName], утверждает, что [Select_CString(target_character.IsFemale, 'вернулась', 'вернулся' )] из паломничества в Святую землю и теперь собирается вновь занять [bra_country.GetAdjectiveWithNoTooltip|l]ий престол.\n\nОднако мы уже знаем, что [Select_CString(target_character.IsFemale, 'эта', 'этот' )] «$name_waldemar$» — не более чем мошенник!"
 turmoil_in_brandenburg.1001.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#!. Причина весьма серьёзная: в державе разгорелся династический спор. [Select_CString(target_character.IsFemale, 'Прежняя правительница', 'Прежний правитель' )] [bra_country.Custom('CL_GEN')] [target_character.GetName] [Select_CString(target_character.IsFemale, 'вернулась', 'вернулся' )] из паломничества в Святую землю и теперь вновь заявляет свои права на #L [bra_country.GetAdjective|l]ий#! престол. [bra_ruler.GetName] почти не пользуется поддержкой своих подданных, а потому [Select_CString(bra_ruler.IsFemale, 'выразила', 'выразил' )] желание пойти с нами на переговоры в обмен на помощь в борьбе против неожиданного претендента."
 turmoil_in_brandenburg.1001.help.tt: "[target_character.GetName] будет [Select_CString(target_character.IsFemale, 'изгнана', 'изгнан' )] из #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! и потеряет [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,bra_waldemar_rallies_nobility,X #V #L «Возвращение Вальдемара»#!#!"
 turmoil_in_brandenburg.1001.a: "Мы поможем им в обмен на золото."
 turmoil_in_brandenburg.1001.a.tt: "Мы получим [ROOT.GetVariable('bra_gold_tooltip_var').GetValue|+=2] ед. [Concept('gold', 'золота')|e] от #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! через #Y 1 год#!"
 turmoil_in_brandenburg.1001.b: "Рука руку моет. Поможем им!"
 turmoil_in_brandenburg.1001.b.tt: "[bra_country.GetName] проголосу[bra_country.Custom('etyut')] за нас через #Y 1 год#!"
 turmoil_in_brandenburg.1001.c: "Мы поможем Виттельсбахам в обмен на политическую поддержку."
 turmoil_in_brandenburg.1001.c.tt: "[Concept('opinion', 'Мнение')|e] о нас всех [Concept('countries', 'держав')|e], где правит [Concept('dynasty', 'династия')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, на #Y 1 год#! изменится на [ShowBiasValue('opinion_supported_the_wittelsbacher')|+=0]"
 turmoil_in_brandenburg.1001.d: "Мы поддержим Виттельсбахов."
 turmoil_in_brandenburg.1001.d.tt: "Мы ничего не попросим взамен"
 turmoil_in_brandenburg.1001.e: "Помощь Виттельсбахам не сулит нам никакой выгоды."
 turmoil_in_brandenburg.1001.e.tt: "Мы откажемся помогать #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахам#!#!. [Concept('opinion', 'Мнение')|e] о нас всех [Concept('countries', 'держав')|e], где правит [Concept('dynasty', 'династия')|e] Виттельсбахов, изменится на [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0], а мнение о нас всех держав, где правит династия $bra_askanier_hyperlink$, изменится на [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] через #Y 1 год#!"
 turmoil_in_brandenburg.1001.zzz: "[bra_ruler.GetShortNameWithNoTooltip] сможет вершить правосудие так, как посчитает нужным."
 turmoil_in_brandenburg.1001.zzz.tt: "[target_character.GetName] понесёт наказание, которое [bra_country.GetName] сочт[bra_country.Custom('etut')] заслуженным"
 turmoil_in_brandenburg.1002.title: "$bra_hre_emperor_hyperlink$ оказывает поддержку"
 turmoil_in_brandenburg.1002.desc: "До нашего двора дошли прекрасные вести. $bra_hre_emperor_hyperlink$, [emperor_ruler.GetName] из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!, выражает нам искреннюю поддержку и считает, что настоящий правитель — [bra_ruler.GetName], а не [target_character.GetName]!"
 turmoil_in_brandenburg.1002.desc.gold: "$turmoil_in_brandenburg.1002.desc$\n\nРазумеется, такая поддержка не обойдётся для нас даром. [emperor_ruler.GetShortNameWithNoTooltip] ясно [Select_CString(emperor_ruler.IsFemale, 'дала', 'дал' )] понять, что любая помощь тяжким бременем ложится на казну, а потому от нас требуют взамен выплатить подношение в размере [ROOT.GetVariable('bra_owes_gold').GetValue|V2] золотых монет."
 turmoil_in_brandenburg.1002.desc.loyalty: "$turmoil_in_brandenburg.1002.desc$\n\nРазумеется, такая поддержка не обойдётся для нас даром. [emperor_ruler.GetShortNameWithNoTooltip] весьма [Select_CString(emperor_ruler.IsFemale, 'озабочена', 'озабочен' )] вопросом передачи власти над #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империей#!#! своему наследнику, а потому требует от нас полной преданности императорской семье в деле сохранения престола."
 turmoil_in_brandenburg.1002.desc.relations: "$turmoil_in_brandenburg.1002.desc$\n\nНо, разумеется, такая поддержка не обойдётся для нас даром. [emperor_ruler.GetShortNameWithNoTooltip] хочет, чтобы мы выполняли роль [Select_CString(emperor_ruler.IsFemale, 'её', 'его' )] посланников к семейству #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, чтобы все члены этого рода признали славу и могущество [emperor_country.Custom('CL_GEN')]."
 turmoil_in_brandenburg.1002.desc.free: "$turmoil_in_brandenburg.1002.desc$\n\nК нашему удивлению, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] не требует взамен совершенно ничего. [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'Её', 'Его' )] помощь, идущая от чистого сердца, будет безвозмездной."
 turmoil_in_brandenburg.1002.a: "Наконец-то власть вновь у Виттельсбахов!"
 turmoil_in_brandenburg.1002.a.tt: "Каждая [Concept('country', 'держава')|e], где правит [Concept('dynasty', 'династия')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, получает [ShowBiasValue('opinion_supported_the_wittelsbacher')|0] к [Concept('opinion', 'мнению')|E] [emperor_country.Custom('predlog_obo')] #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_PREP')|L]#!#!"
 turmoil_in_brandenburg.1003.title: "Отказ в императорской поддержке"
 turmoil_in_brandenburg.1003.desc.dead: "До нас дошли вести из имперского двора. По причинам, известным лишь [Select_CString(emperor_ruler.IsFemale, 'ей одной', 'ему одному' )], при жизни [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName], [Select_CString(emperor_ruler.IsFemale, 'заняла', 'занял' )] сторону наших противников. Таким образом, [target_character.GetName] по-прежнему сохраняет своё влияние…"
 turmoil_in_brandenburg.1003.desc.wittelsbach: "До нас дошли ужасные новости! Дождавшись, когда безобразие, которое [target_character.GetName] чинит в нашей державе, разрослось ещё сильнее, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName|l], наконец [Select_CString(emperor_ruler.IsFemale, 'выразила', 'выразил' )] мнение #L [emperor_country.GetAdjective|l]ой#! стороны: несмотря на родственные связи, [emperor_ruler.GetName] выступает против своей собственной династии, а значит, [bra_ruler.GetName] не дождётся столь нужной поддержки!"
 turmoil_in_brandenburg.1003.desc: "До нас дошли ужасные новости! Дождавшись, когда безобразие, которое [target_character.GetName] чинит в нашей державе, разрослось ещё сильнее, [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l], [emperor_ruler.GetName], наконец [Select_CString(emperor_ruler.IsFemale, 'выразила', 'выразил' )] мнение #L [emperor_country.GetAdjective|l]ой#! стороны: [Select_CString(emperor_ruler.IsFemale, 'она', 'он' )] открыто выступает против Виттельсбахов, а значит, [bra_ruler.GetName] не дождётся столь нужной поддержки!"
 turmoil_in_brandenburg.1003.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] переживает непростые времена…"
 turmoil_in_brandenburg.1003.a.tt: "Каждая [Concept('country', 'держава')|e], где правит [Concept('dynasty', 'династия')|e] #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, получает [ShowBiasValue('opinion_rejected_helping_wittelsbacher')|+=0] к [Concept('opinion', 'мнению')|E] [emperor_country.Custom('predlog_obo')] #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_PREP')|L]#!#!, а каждая держава, где правит династия $bra_askanier_hyperlink$, получает [ShowBiasValue('opinion_rejected_helping_wittelsbacher_askanier')|+=0] к мнению о них"
 turmoil_in_brandenburg.1004.title: "$bra_hre_emperor_hyperlink$ оказывает безоговорочную поддержку"
 turmoil_in_brandenburg.1004.desc: "До нас дошли новости из #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_GEN')|L]#!#!: своими поступками [target_character.GetName] [Select_CString(target_character.IsFemale, 'навлекла', 'навлёк' )] на себя позор, а потому [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] даёт нам полное право разобраться с [Select_CString(target_character.IsFemale, 'самозванкой', 'самозванцем' )] так, как мы посчитаем нужным."
 turmoil_in_brandenburg.1004.a: "Изгоним [Select_CString(target_character.IsFemale, 'её', 'его' )]."
 turmoil_in_brandenburg.1004.b: "Казним [Select_CString(target_character.IsFemale, 'её', 'его' )]."
 turmoil_in_brandenburg.1004.c: "Возможно, [Select_CString(target_character.IsFemale, 'её', 'его' )] умения нам пригодятся…"
 turmoil_in_brandenburg.1004.c.tt: "[target_character.GetName] получит второй шанс. [Select_CString(target_character.IsFemale, 'Ей', 'Ему' )] можно будет дать должность в совете"
 turmoil_in_brandenburg.1005.title: "Вопрос подлинности"
 turmoil_in_brandenburg.1005.desc: "Правление #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! закончилось. На престоле #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! вновь восседает славная династия $bra_askanier_hyperlink$. Однако [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вызывает немалые подозрения: [target_character.GetName] не может вспомнить никаких своих свершений перед якобы инсценированной смертью, а другие Аскании подмечают необъяснимые изменения во внешности [Select_CString(target_character.IsFemale, 'своей любимой родственницы', 'своего любимого родственника' )]. Даже [Select_CString(target_character.IsFemale, 'её', 'его' )] подход к управлению державой резко изменился. [target_character.GetShortNameWithNoTooltip] списывает эти противоречия на недавнее паломничество в Святую землю…"
 turmoil_in_brandenburg.1005.a: "Проверим [Select_CString(target_character.IsFemale, 'её', 'его' )] рассказы на подлинность."
 turmoil_in_brandenburg.1005.a.tt: "Начнётся изучение подлинности историй, которые рассказывает [target_character.GetName]. Возможно, выяснится [Select_CString(target_character.IsFemale, 'её', 'его' )] истинная связь с династией $bra_askanier_hyperlink$…"
 turmoil_in_brandenburg.1005.b: "Это всего лишь необоснованные слухи…"
 turmoil_in_brandenburg.1006.title: "[target_character.GetShortNameWithNoTooltip] под следствием"
 turmoil_in_brandenburg.1006.desc: "Спустя два года тщательных изучений, исследований и сравнений документов вопрос, кем на самом деле является [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [target_character.GetName], наконец закрыт."
 turmoil_in_brandenburg.1006.desc.true_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nМы пришли к выводу, что [target_character.GetName] действительно выходец из династии $bra_askanier_hyperlink$, но при этом [Select_CString(target_character.IsFemale, 'она', 'он' )] вовсе не [GetCharacter('bra_waldemar_askanier').GetName] — вопреки всем попыткам выдать себя за [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'неё', 'него' )]. Да, [Select_CString(target_character.IsFemale, 'она', 'он' )] носит то же имя, что и [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'скончавшаяся', 'скончавшийся' )] три года назад [Select_CString(GetCharacter('bra_waldemar_askanier').IsFemale, 'маркграфиня', 'маркграф' )], однако всё же это совсем [Select_CString(target_character.IsFemale, 'другая', 'другой' )] $name_waldemar$."
 turmoil_in_brandenburg.1006.desc.false_askanier: "$turmoil_in_brandenburg.1006.desc$\n\nТщательно продуманный обман потерпел крах, и когда [Select_CString(target_character.IsFemale, 'самозванке', 'самозванцу' )] предъявили неоспоримые факты, отпираться стало бесполезно. [target_character.GetShortNameWithNoTooltip] на самом деле [Select_CString(target_character.IsFemale, 'притворялась', 'притворялся' )] другим человеком, а придворные в это поверили. Даже члены династии $bra_askanier_hyperlink$ были убеждены, что [GetCharacter('bra_waldemar_askanier').GetName] всё ещё здравствует. [bra_country.GetAdjectiveWithNoTooltip]ий двор кипит от возмущения, многие знатные вельможи требуют сурово покарать [Select_CString(target_character.IsFemale, 'мошенницу', 'мошенника' )]."
 turmoil_in_brandenburg.1006.a: "Сходство было поразительным!"
 turmoil_in_brandenburg.1006.a.tt: "[target_character.GetName] и все [Select_CString(target_character.IsFemale, 'её', 'его' )] потомки сменят [Concept('dynasty', 'династию')|e] на $bra_askanier_hyperlink$"
 turmoil_in_brandenburg.1006.b: "По крайней мере, [Select_CString(target_character.IsFemale, 'она', 'он' )] не из Виттельсбахов…"
 turmoil_in_brandenburg.1006.b.tt: "[target_character.GetName] и все [Select_CString(target_character.IsFemale, 'её', 'его' )] потомки сменят [Concept('dynasty', 'династию')|e] на [target_dynasty.GetName]"
 turmoil_in_brandenburg.1006.c: "Долой [Select_CString(target_character.IsFemale, 'самозванку', 'самозванца' )]!"
 turmoil_in_brandenburg.1007.title: "Лже[target_character.GetNameWithNoTooltip|l] идёт на казнь"
 turmoil_in_brandenburg.1007.desc.successful_execution: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'оказалась', 'оказался' )] в плену у лоялистов, для которых имя [bra_ruler.GetName|l] всё ещё не пустой звук. Кроме того, [emperor_ruler.GetName] впоследствии [Select_CString(emperor_ruler.IsFemale, 'дала', 'дал' )] согласие на наши действия, избавив нас от более суровых последствий. Однако выяснилось, что [target_character.GetShortNameWithNoTooltip] не только не имеет никакого отношения к роду $bra_askanier_hyperlink$, но даже другие [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отказывают этому человеку в благородном происхождении! [Select_CString(target_character.IsFemale, 'Она была обвинена', 'Он был обвинён' )] в подрыве устоев #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! и [Select_CString(target_character.IsFemale, 'признана виновной', 'признан виновным' )]…"
 turmoil_in_brandenburg.1007.desc.failed_execution: "Под покровом ночи [target_character.GetName] [Select_CString(target_character.IsFemale, 'была схвачена', 'был схвачен' )] и [Select_CString(target_character.IsFemale, 'заключена', 'заключён' )] в темницу [bra_country.GetCapital.Custom('LR_GEN')|l] [bra_country.GetCapital.GetName]. Казнь должна состояться с первыми лучами рассвета. Однако оказалось, что [target_character.GetShortNameWithNoTooltip] — [Select_CString(target_character.IsFemale, 'женщина хитрая и находчивая', 'человек хитрый и находчивый' )], [Select_CString(target_character.IsFemale, 'она предусмотрела', 'он предусмотрел' )] каждый наш шаг. Вскоре после [Select_CString(target_character.IsFemale, 'её', 'его' )] пленения в дворцовую темницу ворвались многочисленные [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] и освободили [Select_CString(target_character.IsFemale, 'узницу', 'узника' )].\n\nТеперь #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_DAT')|L]#!#! грозит гражданская война непредсказуемого размаха… Небольшим утешением в нашем бедственном положении служит то, что [emperor_ruler.GetName] не [Select_CString(emperor_ruler.IsFemale, 'стала', 'стал' )] возражать нашему решению провести казнь."
 turmoil_in_brandenburg.1007.a: "Мы избежали очередной катастрофы."
 turmoil_in_brandenburg.1007.b: "К оружию!"
 bra_true_waldemar_identity_reveal_tt: "#italic Станет известно, кто на самом деле [target_character.GetName]…#!"
 turmoil_in_brandenburg.false_waldemar_big_rebel.tt: "#TOOLTIP:POPTYPE,nobles,X #L Аристократы#!#! из нескольких (вплоть до #Y 12#!) самых населённых районов во владении:\n• Получают [ShowNamedValue('pop_satisfaction_ultimate_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]\n• Присоединяются к группе мятежников «[false_waldemar_rebel.GetName]»"
 false_waldemar_rebel: "Сторонники Вальдемара"
 turmoil_in_brandenburg.1100.title: "Пренебрежение [root_country.Custom('CL_INST')]"
 turmoil_in_brandenburg.1100.entry: "Пренебрежение указанной державой"
 turmoil_in_brandenburg.1100.desc: "Земли, которыми располагает [root_country.GetName], никогда не знали чрезмерной заботы, однако даже в самые трудные времена нам не было так тяжело, как сейчас, когда [root_country.GetNameWithNoTooltip] находится под властью #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!.\n\nО нашем бедственном положении сегодня уже знает непосредственно [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]. [root_ruler.GetName] ходит по краю, и судьба [Select_CString(root_ruler.IsFemale, 'её', 'его' )] висит на волоске…"
 turmoil_in_brandenburg.1100.a: "$bra_hre_emperor_hyperlink$, конечно же, поймёт, насколько это невыносимо."
 turmoil_in_brandenburg.1100.a.tt: "$bra_hre_emperor_hyperlink$ решит, что будет с нами дальше. Возможно, [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale, 'она', 'он')] назначит нам нового правителя из другой династии…"
 turmoil_in_brandenburg.1101.title: "Виттельсбахи подвели Священную Римскую Империю"
 turmoil_in_brandenburg.1101.desc: "Одно наше курфюршество — [root_country.GetFlavorRank|l] [root_country.GetName] — оказалось в бедственном положении. Там бесчинствуют местные бароны-разбойники, экономика рушится, а [root_country.GetGovernment.GetRulerTitle|l], [root_ruler.GetName] вовсе не обращает внимания на жалобы своих подданных. Эта ситуация совершенно не красит #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священную Римскую Империю#!#!, а потому мы, как [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] этой державы, обязаны положить конец подобной ужасающей бесхозяйственности."
 turmoil_in_brandenburg.1101.a: "Возьмём управление [root_country.Custom('rank_ru_INST')|l] в свои руки."
 turmoil_in_brandenburg.1101.a.tt: "Место [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займёт [emperor_ruler.GetName] и образует [Concept('union', 'унию')|e] с этой державой"
 turmoil_in_brandenburg.1101.b: "Пусть [root_country.Custom('CL_INST')] правит [dynasty_character.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1101.b.tt: "Место [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займёт [dynasty_character.GetName]"
 turmoil_in_brandenburg.1101.c: "От нашего имени будет править [cabinet_character.GetNameWithNoTooltip]."
 turmoil_in_brandenburg.1101.c.tt: "Место [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займёт [cabinet_character.GetName]. Держава станет нашим #TOOLTIP:SUBJECT_TYPE,vassal,X #L вассалом#!#!, в результате чего все остальные участники #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#! получат [ShowBiasValue('subjugated_elector_antagonism')|-=0] к [Concept('antagonism', 'неприязни')|e]"
 subjugated_elector_antagonism: "Подчинённый выборщик"
 turmoil_in_brandenburg.1101.d: "Наш советник знает, как справиться [root_country.Custom('end_predlog_sso')] [root_country.GetAdjectiveWithNoTooltip|l]ими бедами."
 turmoil_in_brandenburg.1101.d.tt: "Место [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_GEN')|L]#!#! займёт местный советник из числа наших придворных"
 turmoil_in_brandenburg.1101.e: "Не будем трогать Виттельсбахов — пусть восстанавливают всё сами."
 turmoil_in_brandenburg.1101.e.tt: "Мы оставим #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! в покое, чтобы они и дальше правили #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_INST')|L]#!#!"
 turmoil_in_brandenburg.1102.title: "$bra_hre_emperor_hyperlink$ даёт ответ"
 turmoil_in_brandenburg.1102.desc.wittelsbach: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он объявил, что #L [root_country.GetAdjective|l]ие#! земли объединятся [emperor_country.Custom('predlog_sso')] [emperor_country.Custom('CL_INST')], а править этим образованием будет [emperor_ruler.GetName]."
 turmoil_in_brandenburg.1102.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он заявил, что с этого дня #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! лишаются своей власти, а #L [root_country.GetAdjective|l]ими#! землями впредь будет править непосредственно [emperor_ruler.GetName]. Таким образом, нас принуждают вступить в личную унию [emperor_country.Custom('predlog_sso')] [emperor_country.Custom('CL_INST')]."
 turmoil_in_brandenburg.1102.a: "Да здравствует [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]!"
 turmoil_in_brandenburg.1102.b: "Будем надеяться, [root_country.GetLongNameWithNoTooltip] не довед[root_country.Custom('endlong_youtut')] страну до развала…"
 turmoil_in_brandenburg.1103.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1103.desc.wittelsbach: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он объявил, что #L [root_country.GetAdjective|l]ими#! землями впредь будет управлять [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он заявил, что с этого дня #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! лишаются своей власти, а #L [root_country.GetAdjective|l]ими#! землями впредь будет управлять [dynasty_character.GetName]."
 turmoil_in_brandenburg.1103.a: "Правь достойно, [dynasty_character.GetShortNameWithNoTooltip]."
 turmoil_in_brandenburg.1103.b: "Кажется, [root_country.GetLongNameWithNoTooltip] получил[root_country.Custom('endlong_fem')] второй шанс."
 turmoil_in_brandenburg.1104.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1104.desc.wittelsbach: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он объявил, что этими краями отныне будет править другой выходец из династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#!, который уже доказал свою надёжность в прошлом. Теперь #ONCLICK:COUNTRY,[root_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[root_country.Custom('CL_tt')],X [root_country.Custom('CL_INST')|L]#!#! правит [cabinet_character.GetName] — самый верный из всех [emperor_country.GetAdjectiveWithNoTooltip|l]их вассалов."
 turmoil_in_brandenburg.1104.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он заявил, что с этого дня #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! лишаются своей власти, а #L [root_country.GetAdjective|l]ими#! землями впредь будет править [cabinet_character.GetName] — самый верный из всех [emperor_country.GetAdjectiveWithNoTooltip|l]их вассалов."
 turmoil_in_brandenburg.1104.a: "Спасибо, что не $bra_wittelsbach_hyperlink_no_tt$."
 turmoil_in_brandenburg.1104.b: "Просто замечательно, Виттельсбахи вернулись…"
 turmoil_in_brandenburg.1104.c: "Мы никогда не встанем на колени перед [emperor_country.Custom('CL_INST')]!"
 turmoil_in_brandenburg.1105.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1105.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он заявил, что с этого дня #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахи#!#! лишаются своей власти, а #L [root_country.GetAdjective|l]ими#! землями впредь будет править [hohenzollern_character.GetName] — [Select_CString(hohenzollern_character.IsFemale, 'доверенная советница', 'доверенный советник' )] Виттельсбахов."
 turmoil_in_brandenburg.1105.a: "Пусть правит мудро."
 turmoil_in_brandenburg.1106.title: "$turmoil_in_brandenburg.1102.title$"
 turmoil_in_brandenburg.1106.desc: "К нашему двору прибыл посол из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. Он объявил, что члены династии #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! получат предупреждение от имперского двора, однако продолжат править [root_country.Custom('rank_ru_INST')|l]."
 turmoil_in_brandenburg.1106.a: "Виттельсбахи всегда будут владеть [root_country.Custom('CL_INST')]…"
 turmoil_in_brandenburg.1107.title: "[root_country.GetNameWithNoTooltip] не сда[root_country.Custom('youtyut')]ся"
 turmoil_in_brandenburg.1107.desc: "[root_country.GetName] упрямо отказыва[root_country.Custom('etyut')]ся склоняться и признавать нашу власть. Стало совершенно ясно, что их правительство не отличается дальновидностью, а потому у нас есть весомая причина подчинить эту державу силой."
 turmoil_in_brandenburg.1107.a: "Мы не потерпим предателей!"
 turmoil_in_brandenburg.1200.title: "[bra_country.GetAdjectiveWithNoTooltip|U]ое бремя"
 turmoil_in_brandenburg.1200.desc: "Спустя годы бесхозяйственного отношения со стороны #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! проблемами #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! наконец-то занялся дом [emperor_dynasty.GetName]. Наши помыслы в отношении [bra_country.Custom('rank_ru_GEN')|l] благородны и отвечают интересам [bra_country.Custom('CL_GEN')], однако нам явно не хватит сил возродить этот край после запустения, оставленного Виттельсбахами.\n\nОдин из наших придворных советников по имени [hohenzollern_character.GetName] — весьма сведущий в вопросах управления и дипломатии человек. Назначив [Select_CString(hohenzollern_character.IsFemale, 'её', 'его' )] [Select_CString(hohenzollern_character.IsFemale, 'правительницей', 'правителем' )] и предоставив этой земле самоуправление, мы, возможно, добьёмся восстановления [bra_country.Custom('CL_GEN')]."
 turmoil_in_brandenburg.1200.a: "[hohenzollern_character.GetShortNameWithNoTooltip] будет править [bra_country.Custom('rank_ru_INST')|l] — мы [Select_CString(hohenzollern_character.IsFemale, 'ей', 'ему' )] доверяем."
 turmoil_in_brandenburg.1200.a.tt: "Место [Concept('ruler', 'правителя')|e] #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_GEN')|L]#!#! займёт [hohenzollern_character.GetName]"
 turmoil_in_brandenburg.1200.b: "Вздор! Мы и сами можем управлять [bra_country.Custom('CL_INST')]."
 turmoil_in_brandenburg.1201.title: "[hohenzollern_character.GetNameWithNoTooltip] — новый правитель [bra_country.Custom('CL_GEN')]"
 turmoil_in_brandenburg.1201.desc: "Спустя годы бесхозяйственного отношения #TOOLTIP:DYNASTY,$wittelsbach_tt$,X #L Виттельсбахов#!#! к #ONCLICK:COUNTRY,[bra_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[bra_country.Custom('CL_tt')],X [bra_country.Custom('CL_DAT')|L]#!#! власть над этими землями взяли вельможи из #ONCLICK:COUNTRY,[emperor_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[emperor_country.Custom('CL_tt')],X [emperor_country.Custom('CL_GEN')|L]#!#!. И хотя помыслы их соответствуют нашим интересам, в первую очередь эти люди преданы #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!, а потому не смогут править нами лучше, чем даже самый неравнодушный Виттельсбах.\n\nК счастью, об этом [Select_CString(emperor_ruler.IsFemale, 'осведомлена', 'осведомлён' )] [emperor_ruler.GetName]. [Select_CString(emperor_ruler.IsFemale, 'Она отправила', 'Он отправил' )] к нам своего самого способного советника, и теперь [bra_country.Custom('CL_INST')] будет самостоятельно править [hohenzollern_character.GetName]."
 turmoil_in_brandenburg.1201.a: "Пусть правит мудро и решительно."
 turmoil_in_brandenburg.1300.title: "Бароны-разбойники набирают силу"
 turmoil_in_brandenburg.1300.entry: "$turmoil_in_brandenburg.1300.title$"
 turmoil_in_brandenburg.1300.desc: "Слабость и недобросовестность, которые проявляет [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], а также почти полная вседозволенность привели к появлению баронов-разбойников — эти дворяне ведут преступный образ жизни и богатеют на царящем вокруг беззаконии. Своим существованием они подрывают нашу власть и влияние, которым пользуется [target_ruler.GetName]. Надёжнее всего они обосновались в провинции [robber_baron_province.GetName]."
 turmoil_in_brandenburg.1300.a: "Со временем мы с ними разберёмся."
 STATIC_MODIFIER_NAME_PRU_robber_barons: "Бароны-разбойники"
 PRU_use_cabinet_action_to_get_rid_of_barons: "В провинции доступно действие #TOOLTIP:CABINET_ACTION,pru_deal_with_robber_barons,X #L «Борьба с баронами-разбойниками»#!#!."
 remove_PRU_robber_barons_modifier: "[Concept('province', 'Провинция')|e] теряет эффект модификатора «[GetModifier('PRU_robber_barons').GetNameWithTooltip]»"
