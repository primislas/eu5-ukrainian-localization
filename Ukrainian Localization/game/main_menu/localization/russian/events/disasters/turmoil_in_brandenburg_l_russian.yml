 turmoil_in_brandenburg.1301.title: "Бароны-разбойники в провинции [robber_baron_province.GetNameWithNoTooltip]"
 turmoil_in_brandenburg.1301.entry: "Бароны-разбойники в провинции баронов-разбойников"
 turmoil_in_brandenburg.1301.desc: "Провинция [robber_baron_province.GetName] страдает от нашествия баронов-разбойников. Их заносчивость и беззаконие подобны плевку нам в лицо. Пора преподать им красноречивый урок и восстановить в державе единую власть."
 turmoil_in_brandenburg.1301.a: "Со временем мы с ними разберёмся."
 turmoil_in_brandenburg.1302.title: "Квитцовы"
 turmoil_in_brandenburg.1302.entry: "$turmoil_in_brandenburg.1302.title$"
 turmoil_in_brandenburg.1302.desc: "Среди баронов-разбойников едва ли не наибольшим влиянием пользуется род Квитцовых. Владения их в провинции #TOOLTIP:PROVINCE_DEFINITION,mittelmark_province,X #L Миттельмарк#!#! обширны, как и принадлежащие им имения. Однако, несмотря на такое богатство, Квитцовы начали заниматься разбоем. Мы сокрушим этих негодяев и сотрём их владения с лица земли, пока ещё не слишком поздно."
 turmoil_in_brandenburg.1302.a: "С ними нужно разобраться!"
 turmoil_in_brandenburg.1302.b: "Тут надо действовать осторожно."
 turmoil_in_brandenburg.1302.historical_info: "В начале XV века род Квитцовых был влиятельнейшим дворянским семейством Бранденбурга. Два его представителя — братья Ганс и Дитрих — в 1411–1415 годах сопротивлялись попыткам Фридриха I из династии Гогенцоллернов завладеть Бранденбургской маркой, однако их борьба не увенчалась успехом: курфюрст захватил замки Квитцовых и положил конец владычеству рода в Бранденбурге."
 STATIC_MODIFIER_NAME_PRU_quitzow_modifier: "Влияние Квитцовых"
 STATIC_MODIFIER_NAME_PRU_quitzow_repressed_modifier: "Подавление Квитцовых"
 bra_quitzow_revolt: "Мятеж Квитцовых"
 turmoil_in_brandenburg.1303.title: "Конец власти баронов-разбойников"
 turmoil_in_brandenburg.1303.entry: "$turmoil_in_brandenburg.1303.title$"
 turmoil_in_brandenburg.1303.desc: "Нам пришлось потратить немало лет и сил, чтобы усмирить мятежных #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократов#!#!, однако всё это было не зря: никакие бароны-разбойники больше не посягают на торговые пути нашей державы, поэтому простые люди могут спать спокойно, забыв о тех днях, когда любой без исключения крестьянин вынужден был платить аристократам за защиту."
 turmoil_in_brandenburg.1303.a: "[ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] вновь воцарился покой."
 STATIC_MODIFIER_NAME_PRU_end_of_robber_barons: "Конец эпохи баронов-разбойников"
 turmoil_in_brandenburg.1304.title: "Кара для баронов-разбойников"
 turmoil_in_brandenburg.1304.entry: "$turmoil_in_brandenburg.1304.title$"
 turmoil_in_brandenburg.1304.desc: "Мятежные #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократы#!#! потерпели поражение, но [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] искренне сомневается, что одна только наша победа обеспечит устойчивый мир. Некоторые считают, что [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'должна', 'должен' )] покарать бунтарей за предательство. Есть, впрочем, и другое мнение: не стоит портить отношения ещё сильнее, ведь мы уже восстановили законную власть."
 turmoil_in_brandenburg.1304.a: "Они поплатятся за измену!"
 turmoil_in_brandenburg.1304.b: "Накажем их не очень строго."
 turmoil_in_brandenburg.1304.c: "Не будем наказывать их."
