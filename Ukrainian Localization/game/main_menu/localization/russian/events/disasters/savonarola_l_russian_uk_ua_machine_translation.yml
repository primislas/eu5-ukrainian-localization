l_russian:
  savonarola.1.title: "Новий проповідник"
  savonarola.1.desc: "$savonarola_disaster_desc$\n\nДехто пропонує запросити його до двору. Нехай цей [GetCharacter('flo_savonarola').GetName] проповідує в місті [ROOT.GetCountry.GetCapital.GetName] — ми зуміємо отримати чималу вигоду, використовуючи його вплив на народні маси."
  savonarola.1.a: "Запросимо його до столиці."
  savonarola.1.b: "Краще відішлемо його подалі."
  savonarola.2.title: "Проповідь Савонароли"
  savonarola.2.desc: "[GetCharacter('flo_savonarola').GetName] сповнений щирої віри. Не минає й дня, коли монах не виступав би на центральній площі міста, — і що довше він проповідує, то більше людей приходять послухати його промови. Не всі ці люди його підтримують, однак його проповіді мають вплив, цього не можна заперечувати.\n\nУ міру збільшення пастви промови проповідника стають дедалі сміливішими. [GetCharacter('flo_savonarola').GetName] вимагає покаяння та релігійних реформ, він відкрито критикує розпусту та зловживання європейських монархів і церковної влади."
  savonarola.2.a: "Нехай проповідує."
  savonarola.2.b: "Заткнемо йому рота."
  savonarola.3.title: "Поява «п'яньоні»"
  savonarola.3.desc: "З кожною проповіддю [GetCharacter('flo_savonarola').GetName] стає дедалі впливовішим. Його найбільш фанатичні послідовники збилися в групи під назвою Piagnoni, що означає «ті, що плачуть» або «ті, що голосять». Вони йдуть за проповідником усюди, уважно слухаючи кожне його слово.\n\nДай їм волю, і дуже скоро у Савонароли з'явиться власне військо."
  savonarola.3.a: "Не будемо втручатися."
  savonarola.3.b: "Їх потрібно заборонити."
  savonarola.4.title: "Слава Савонароли шириться"
  savonarola.4.desc: "[GetCharacter('flo_savonarola').GetName] став куди популярнішим, ніж ми розраховували. Попри те, що він майже не покидає місто [ROOT.GetCountry.GetCapital.GetName], вісті про його проповіді розійшлися по всій країні й навіть за її межами. Кажуть, він користується величезним авторитетом у [target_location.Custom('LR_PREP')|l] [target_location.GetName] — тамтешні жителі регулярно збираються, щоб обговорити його промови, і спеціально відвідують столицю, щоб самостійно почути проповідника.\n\nМи більше не можемо ігнорувати силу проповіді цього монаха та його вплив на наших підданих. З кожним днем дедалі більше людей відкрито заявляють про підтримку його ідей. Якщо так піде й далі, він перетвориться на справжню занозу, позбутися якої буде непросто."
  savonarola.4.a: "Від нього немає жодної шкоди."
  savonarola.4.b: "Він і справді стає проблемою."
  savonarola.5.title: "Савонарола рветься до влади"
  savonarola.5.desc: "Вплив проповідника на жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! лячно великий, кожен його виступ збирає багатотисячні натовпи. [GetCharacter('flo_savonarola').GetName] оголосив себе «реформатором Церкви», він люто критикує церковну владу, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [target_character.GetName] у його проповідях і зовсім постає породженням пекла. Його прихильники вважають, що [GetCharacter('flo_savonarola').GetNameWithNoTooltip] з волі Господа має стати правителем [ROOT.GetCountry.Custom('CL_GEN')], а [target_character.GetNameWithNoTooltip] підлягає негайному вигнанню з країни.\n\nЗвісно, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'наша дорога', 'наш дорогий')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] цілком [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'здатна', 'здатний')] вивести країну з цієї кризи, але не можна заперечувати, що народні маси справді зачекалися змін."
  savonarola.5.a: "Нехай проповідник бере владу у свої руки."
  savonarola.5.b: "Погляди в нього правильні, але правитель з нього ніякий."
  savonarola.5.c: "Усе, досить з нас цього монаха."
  savonarola.6.title: "Закони Савонароли"
  savonarola.6.desc: "[ROOT.GetCountry.GetLongName] — країна, де до влади прийшов [GetCharacter('flo_savonarola').GetName] і починає проводити реформи, про які говорив у своїх проповідях. Його прихильники об'єдналися в партію і тепер контролюють усі аспекти #L [ROOT.GetCountry.GetAdjective|l]ої#! політики, тому всі ініціативи колишнього монаха негайно втілюються в життя. Висуваються нові законопроєкти, спрямовані проти всіляких пороків і надмірностей. Будь-яке порушення норм моралі оголошено поза законом. На вулицях з'явилися патрулі, яким доручено карати містян за непристойну поведінку або безсоромний зовнішній вигляд.\n\nЗдійснивши ці реформи, ми зробимо нашу країну обраною в очах Господа, але для цього людям доведеться визнати, що колишньому гріховному життю настав кінець."
  savonarola.6.a: "Ми приймемо ці реформи."
  savonarola.6.b: "Ні, це вже занадто."
  savonarola.7.title: "Савонаролу викликають до Риму"
  savonarola.7.desc: "[GetCharacter('flo_savonarola').GetName] довів, що він не просто харизматичний та впливовий проповідник — після обрання правителем #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! він здійснив грандіозні зміни в суспільному житті країни. Попри постійну критику церкви з боку проповідника, спочатку Святий Престол підтримував його дії. Але останнім часом стосунки між ними різко загострилися — [GetCountry('PAP').GetGovernment.GetRulerTitle|l] втомився від того, що фанатик постійно ставить під сумнів його авторитет.\n\nСавонарола не бажає розриву та відправляє до Риму безліч листів, проте вони залишаються без відповіді. І ось тепер [GetCountry('PAP').GetGovernment.GetRulerTitle|l] [GetCountry('PAP').GetGovernment.GetRuler.GetName] наказує йому з'явитися до Риму, щоб відповісти за свої вчинки."
  savonarola.7.a: "Якщо того вимагає [GetCountry('PAP').GetGovernment.GetRulerTitle|l], ми зобов'язані підкоритися."
  savonarola.7.b: "[GetCountry('PAP').GetGovernment.GetRulerTitle] нам не указ."
  savonarola.8.title: "Вогнище марнославства Савонароли"
  savonarola.8.desc: "Вогнища марнославства були досить частим явищем в Європі. Істово віруючі священники завжди готові засудити надмірності та вади, особливо якщо з цього можна влаштувати видовищну виставу. Публічне спалення предметів косметики, дзеркал, суконь та інших речей, здатних ввести людину в спокусу, — чудовий спосіб нагадати пастві про шкоду марнославства. Такі гріховні предмети постійно ризикують опинитися в очисному полум'ї віри…\n\n[GetCharacter('flo_savonarola').GetName] взявся влаштувати саме таку виставу. Щоб позбавити добрих громадян #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! від гріха, на головній площі міста [ROOT.GetCountry.GetCapital.GetName] буде розведено гігантське вогнище. Воно має стати прикладом для віруючих усієї країни."
  savonarola.8.a: "Спалити все дотла!"
  savonarola.8.b: "Це заходить занадто далеко."
  savonarola.9.title: "Відлучення Савонароли"
  savonarola.9.desc: "[GetCharacter('flo_savonarola').GetName] та [GetCountry('PAP').GetGovernment.GetRulerTitle|l] [GetCountry('PAP').GetGovernment.GetRuler.GetName] остаточно розсварилися, їхні розбіжності досягли критичної точки. Несамовитий фанатизм проповідника та його постійні нападки на авторитет церкви давно стали головним болем Святого Престолу. Савонарола продовжував ігнорувати #L [GetCountry('PAP').GetAdjective|l]і#! вимоги, а недоброзичливці все частіше звинувачували його в єресі та бунті…\n\nЗрештою [GetCountry('PAP').GetGovernment.GetRulerTitle|l] зважився на крайні заходи та відлучив бунтівного ченця від церкви. Відлучення загрожувало й усім, хто був готовий надати йому покровительство."
  savonarola.9.a: "Це хто ще тут не правий!"
  savonarola.10.title: "Випробування вогнем"
  savonarola.10.desc: "Схоже, [GetCharacter('flo_savonarola').GetName] у своєму фанатизмі остаточно втратив розум. Його нападки на церкву, раніше завуальовані, перетворилися на відверте паплюження. Заперечуючи будь-які звинувачення в єресі, чернець публікує все більш радикальні заклики — він навіть наважується стверджувати, що здатен творити чудеса! Якби це було так, значить, його справді направляє сам Господь… На доказ цих тверджень Савонаролі запропонували пройти випробування вогнем. Якщо проповідника направляє Бог, якщо він справді здатен творити чудеса, значить, полум'я не зможе завдати йому шкоди.\n\nУ призначений день на головній площі зібрався величезний натовп, і в повітрі повисло тривожне очікування. Усім не терпілося побачити диво, але минуло кілька годин, а випробування ніяк не починалося. Натовп потроху починав ремствувати — і тут з неба хлинув проливний дощ. Обурені роззяви розійшлися по домах, і кожен звинувачував Савонаролу у скасуванні випробування."
  savonarola.10.a: "Очевидно, що він єретик. Схопити та стратити його!"
  savonarola.10.b: "Раз він не згорів, значить, Господь і правда з ним."
  savonarola.11.title: "Спадщина Савонароли"
  savonarola.11.desc: "[GetCharacter('flo_savonarola').GetName] мертвий. Його смерть стала для #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не меншим потрясінням, ніж було його життя. Безсумнівно, що проповідник справив величезний вплив на всіх [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их громадян — незалежно від того, поділяли вони його погляди чи ні. Зі смертю Савонароли завершиться і смута, викликана його діяльністю. У покійного ченця залишилося ще чимало прихильників, але ніхто з них не володіє тією ж силою переконання.\n\nПоява Савонароли була подібна до землетрусу, але наша країна пережила цю напасть і вийшла з неї сильнішою, ніж будь-коли раніше."
  savonarola.11.theocracy.desc: "[GetCharacter('flo_savonarola').GetName] струсонув нашу країну та вивів її зі сплячки. Завдяки його богоугодним діянням на #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! зійшло благословення Всевишнього. Ми обрані Господом, щоб слідувати його стопами!\n\n[ROOT.GetCountry.GetLongName] — країна, якій Божа милість приготувала стати Царством Господнім на землі. Світло нашої віри дарує спасіння заблудлим душам, надихаючи їх слідувати нашому прикладу!"
  savonarola.11.a: "Час навести в [ROOT.GetCountry.Custom('rank_ua_PREP')|l] лад."
  savonarola.11.b: "Він вказав нам істинний шлях!"
  savonarola.12.title: "Медічі завдають удару у відповідь"
  savonarola.12.desc: "[GetCharacter('flo_savonarola').GetName] страчений, і тепер на чолі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! стоїть [GetCharacter('flo_piero_soderini').GetName]. Він показав себе здібним правителем, проте багато впливових людей воліли б бачити в цій ролі когось іншого. Партію незадоволених очолюють #TOOLTIP:DYNASTY,$medici_dynasty_tt$,X #L ді Медічі#!#! — одна з наймогутніших родин [ROOT.GetCountry.Custom('CL_GEN')]. До появи Савонароли саме вони тримали в руках кермо влади.\n\nТепер, коли [GetCharacter('flo_piero_soderini').GetNameWithNoTooltip] відновив порядок у країні, Медічі вхопилися за можливість повернути собі владу над [ROOT.GetCountry.Custom('rank_ua_INST')|l]. У родини безліч прихильників, і народ навряд чи стане заперечувати, якщо вони знову очолять уряд."
  savonarola.12.a: "Ми повернемо їм владу."
  savonarola.12.b: "Турбуватися нема про що."
  savonarola.13.title: "Повернення Савонароли"
  savonarola.13.desc: "Ми сподівалися, що [GetCharacter('flo_savonarola').GetName] одумається, що вигнання з #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! напоумить проповідника — але він все не заспокоюється. Мало йому тієї смути, яку вже спричинили його промови, — він вирішив повернутися і знову поширювати свої ідеї серед наших підданих! Фанатик знову проповідує в самому серці міста [ROOT.GetCountry.GetCapital.GetName], і його завжди оточують натовпи послідовників, які жадібно слухають кожне слово."
  savonarola.13.a: "Який нахабний тип…"