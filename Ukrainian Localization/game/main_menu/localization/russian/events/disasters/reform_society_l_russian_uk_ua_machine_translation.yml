l_russian:
  reform_society.1.title: "Реформи [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого суспільства"
  reform_society.1.desc: "Ми надто довго залежали від примх дрібних вождів, що стоять на чолі інших міст-держав. У нас достатньо політичного впливу, — і військової могутності, що його підкріплює, — щоб запровадити нову форму правління і нарешті покінчити з розбратом та децентралізацією, об'єднавши всю країну під своїм прапором."
  reform_society.1.a: "Ми не опустимо рук…"
  has_completed_all_religious_focuses_tt: "Досягнуто всіх можливих [Concept('religious_focus', 'релігійних цілей')|e]"
  reform_society.2.title: "Нова ера [ROOT.GetCountry.Custom('CL_RP')]"
  reform_society.2.desc: "Попри завзятий опір зовнішніх ворогів та деяких видатних представників станів у нашій державі, реформа державного устрою завершилася блискучим успіхом. У нас починається нова ера нечуваної досі централізації та абсолютної влади уряду. Старі звичаї відходять у минуле — країна приміряє нові, ефективніші форми правління і з упевненістю дивиться в майбутнє."
  reform_society.2.a: "Наш час настав."
  reform_society.3.title: "Внутрішні протести"
  reform_society.3.desc: "Багато видатних жителів країни відкрито виступають проти централізації та останніх нововведень у нашому законодавстві. Якщо ми хочемо продовжити реформи та досягти своїх цілей, доведеться вислухати їхні вимоги, інакше справа може скінчитися відкритим повстанням проти нашої влади."
  reform_society.3.a: "Вони сміють погрожувати нам?"
  reform_society.3.b: "Ми можемо домовитися та задовольнити деякі вимоги."
  reform_society.3.c: "Реформи потрібно провести негайно!"
  annex_all_altepetls_tt: "Усі ленники з формою правління #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L «Альтепетль»#!#! будуть приєднані"
  reform_society.4.title: "Вогонь у нічному небі"
  reform_society.4.desc: "Ось уже понад рік ночами над [target_location.GetRank.Custom('LR_TP')|l] [target_location.GetName] спалахує небачений небесний вогонь. Це знамення лякає і заворожує — небо ніби кровоточить полум'ям, що витікає з витягнутого надрізу. Деякі порівнюють це дивовижне явище з палаючим кукурудзяним качаном, що завис у небесах, історики ж вважають, що над країною проходила комета. Так чи інакше, ця подія збіглася в часі з початком радикальних соціальних реформ, і люди, дивлячись у небо, мимоволі здригаються. Що ж означає цей небесний вогонь? Знак невдоволення богів? Передвістя прийдешніх змін? Послання від самого Всесвіту? Дивне небесне явище викликало гарячі суперечки та зростаючу невпевненість у завтрашньому дні."
  reform_society.4.a: "Невже ми прогнівили богів?"
  reform_society.4.b: "Не дивіться в небо!"
  reform_society.4.c: "Богів треба умилостивити…"
  reform_society.5.title: "Руйнування міста [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  reform_society.5.desc: "Першою ознакою катастрофи, що насувається, став шелест листя. Вітер посилився, повітря раптово поважчало — навколо священного [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetName] немов стиснувся кулак богів. На величні храми та галасливі ринки столиці обрушилася злива небаченої сили, вулиці перетворилися на бурхливі річки. Здавалося, самі небеса ридають, оплакуючи загибель великого міста.\n\nГуркіт грому подібний до гнівного реву Уїцилопочтлі, будівлі гинуть у лютому полум'ї Шіутекутлі. Під ногами переляканих жителів здригається земля — ніби сам Тлалок вимагає відплати. Руйнування [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip] виглядає жахливим вироком богів, які вирішили покарати нас за гординю і приректи колись могутній народ на загибель."
  reform_society.5.a: "Тікайте! Рятуйтеся!"
  reform_society.5.b: "Дещо можна відновити…"
  reform_society.5.c: "Благочестя та побожність принесуть нам порятунок."
  reform_society.6.title: "Великий вогонь серед білого дня"
  reform_society.6.desc: "У серці [target_location.Custom('LR_GEN')|l] [target_location.GetName] височіє величний храм Уїцилопочтлі — символ нашої відданості богам. Але одного фатального дня над містом виникає дивне і лякаюче знамення. Серед білого дня небеса на захід від міста осяює вогняна смуга, що простягнулася від самого горизонту — така пряма, немов її направляють руки богів. Потім вона розділяється на три частини, що іскряться неприборканою силою. Спостерігаючи це небесне явище, перелякані жителі переконалися, що сам Уїцилопочтлі пророкує їм прийдешні біди.\n\nНарод висипає на вулиці, всі говорять про катастрофу, що насувається — а тим часом храмове оздоблення спалахує від священного вогню, що горить всередині. Попри всі наші зусилля, загасити пожежу не вдається — храм найшанованішого з богів гине в бурхливому полум'ї, а нам залишається лише гадати, чого бажає від нас божество сонця і війни…"
  reform_society.6.a: "Невже боги проти наших реформ?"
  reform_society.6.b: "Ми довіримося слову жерців. Їм відома воля богів."
  reform_society.6.c: "Ми не звернемо з наміченого шляху!"
  reform_society.7.title: "Ридання у мороці"
  reform_society.7.desc: "Коли сходить місяць, над притихлими вулицями [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetName] пливуть лячні звуки. Щоненочі у темряві лунають жіночі ридання — наполегливі, нетерплячі, сповнені туги. «Діти мої, ми повинні покинути це місце, — благає безтілесний голос. — Куди ж ви підете, діти?» Ці моторошні слова звучать знову і знову, і серця місцевих жителів наповнюються тривогою. Люди починають сумніватися в наших реформах, адже боги ясно висловлюють своє невдоволення! Розривані страхом і цікавістю, містяни намагаються розшифрувати загадкове послання і з'ясувати походження примарного голосу, зовсім не схожого на голоси тих, кого вони знають.\n\nЗ кожною ніччю ці благання звучать все голосніше, все відчайдушніше. Жителі міста нарікають — вони вірять, що це послання богів, зловісне передвістя, нехтувати яким не можна. Тепер їхні долі пов'язані з цим примарним голосом, і кожному містянину належить зробити вибір — підкоритися таємничому поклику і піти в невідомість, або залишатися вдома в очікуванні катастрофи, що насувається.\n\nНіч за ніччю безтілесний плач стає наполегливішим. Містяни остаточно впевнилися в тому, що чують попередження, послане богами. Вони починають розуміти, що сама їхня доля залежить від того, чи прислухаються вони до цієї примарної мольби. Скоро їм доведеться прийняти рішення — покинути місто, як того вимагає голос, що ридає, або ж залишитися і зустріти неминучу загибель."
  reform_society.7.a: "Закрийте вуха! Ми і це переживемо!"
  reform_society.7.b: "Нам усім кінець! Ми приречені!"
  reform_society.7.c: "Це пусті байки, люди не стануть їх слухати!"
  reform_society.8.title: "Зоряне дзеркало"
  reform_society.8.desc: "У болотах навколо [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetName] промишляв досвідчений мисливець, і якось раз у його тенета потрапила дивовижна сіра птаха. Кольором оперення вона нагадувала похмуре небо, а голова її була увінчана дивною прикрасою, схожою на темне дзеркало. Поглянувши туди, мисливець був вражений — у чарівному дзеркалі відбивалися зірки та безкрайній простір нічного неба.\n\nРозуміючи всю важливість своєї знахідки, мисливець вирішив, що загадкову птаху [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'повинна', 'повинен')] побачити [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'сама', 'сам')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Коли [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'заглянула', 'заглянув')] у дзеркало, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] постало неймовірне видовище — безліч воїнів верхи на чудових створіннях, що нагадують гігантських оленів. [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Вражена', 'Вражений')] цим загадковим видінням, [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вирішила', 'вирішив')] показати дивовижну птаху наймудрішим верховним жерцям. Їм було наказано за будь-яку ціну розгадати таємниці чарівного дзеркала.\n\nЖерці по черзі підходили до птахи, але все було марно. Скільки б вони не дивилися в дзеркало, воно залишалося темним і порожнім — ніхто так і не зумів розгледіти картину, що так вразила уяву їхньої [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'правительки', 'правителя')]. Вся мудрість верховних жерців виявилася безсилою перед цією загадкою. Порадившись, вони вирішили, що [ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'побачила', 'побачив')] погане знамення, що застерігає нас від продовження нещодавно розпочатих реформ."
  reform_society.8.a: "Невже влада вислизає з наших рук?"
  reform_society.8.b: "Мабуть, це знак…"
  reform_society.8.c: "Кріпіться!"
  all_subjects_20_ld_tt: "Усі наші ленники з формою правління #TOOLTIP:GOVERNMENT_REFORM,altepetl,X #L «Альтепетль»#!#! отримують [ShowNamedValue('liberty_desire_severe_plus')|+=2%] [Concept('liberty_desire', 'тяги до підкорення')|e]"
  every_location_10_control_reduction_tt: "Усі належні нам [Concept('location', 'райони')|e] втрачають [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'контролю')|e]"