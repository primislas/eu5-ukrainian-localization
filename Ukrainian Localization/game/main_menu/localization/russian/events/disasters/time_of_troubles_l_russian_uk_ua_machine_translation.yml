l_russian:
  time_of_troubles.1.title: "[ShowDisasterNameWithNoTooltip('time_of_troubles')]"
  time_of_troubles.1.desc: "Повітря густо просякнуте відчаєм. Чутки про заколот поширюються стрімко, немов лісова пожежа. [ROOT.GetCountry.GetFlavorRank|U], розгубивши залишки колишньої могутності, поступово в'яне під владою слабких правителів. Врожаї з року в рік стають усе меншими. Стривожені й тому осмілілі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] замишляють змови, метою яких незмінно виступає [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], а голодуючі селяни, що втратили всяку надію, піднімають повстання. Інші держави вже придивляються, немов стерв'ятники, до охоплених заворушеннями земель у надії поживитися. Над країною збираються хмари; починається [ShowDisasterName('time_of_troubles')]. Пережити цю непросту епоху зможуть лише найстійкіші. Чи зуміє народ гідно пройти це випробування — чи ж його змете хвиля, що піднімається?"
  time_of_troubles.1.historical_info: "Після смерті в 1598 році царя Федора Івановича — останнього представника династії Рюриковичів, що протягом 700 років займала руський престол, почався Смутний час, ознаменований голодом, хворобами, народними заворушеннями, появою в країні самозванців — претендентів на трон, та вторгненням Швеції й Польщі. Смута закінчилася лише в 1613 році після сходження на престол Михайла Федоровича — першого царя з династії Романових."
  time_of_troubles.1.a: "Ми тверді. Ми переможемо."
  time_of_troubles.2.title: "Божевілля"
  time_of_troubles.2.desc: "[target_character.GetShortName] останніми місяцями поводиться дивно — про це перешіптується і [ROOT.GetCountry.GetGovernment.GetCourtTitle], і [ROOT.GetCountry.GetFlavorRank]. Малопомітні спочатку примхи швидко переросли в непередбачувану, іноді навіть руйнівну поведінку, від якої в подиві залишаються і радники, і придворні.\n\nДеякі навіть заявляють — тихо, щоб їх не почули сторонні — що [Select_CString(target_character.IsFemale, 'государиня збожеволіла', 'государ збожеволів' )], а свідченням тому загадкові напади, незрозумілі рішення та повна відстороненість від світу. Весь народ задається питанням: скільки ще триватимуть ці витівки і коли від них почне розвалюватися влада?"
  time_of_troubles.2.a: "Нехай [target_character.GetShortNameWithNoTooltip] і далі тримається за владу."
  time_of_troubles.2.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U], підтримкою яких користується [target_character_2.GetShortNameWithNoTooltip], заслуговують нашої довіри!"
  time_of_troubles.3.title: "Заповідні літа"
  time_of_troubles.3.desc: "[ROOT.GetCountry.GetFlavorRank] сьогодні, попри всю свою велич, перебуває в безроздільній владі сил, що користуються всередині значним впливом. Ті, хто прагне примножити свої багатства, безсоромно тисне на [Select_CString(target_character.IsFemale, 'государиню', 'государя' )], сподіваючись, що [target_character.GetName] ухвалюватиме ті рішення, які обіцяють вигоду саме їм.\n\nДеякі особливо впливові [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] нещодавно навіть зажадали обмежити права, якими користуються наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], адже поміщики нібито відчувають величезні труднощі. Але такий захід неодмінно викличе обурення в народі — можливо, що через кілька років [ROOT.GetCountry.GetFlavorRank|l] зміниться до невпізнання..."
  time_of_troubles.3.a: "Схвалити ці заходи."
  time_of_troubles.3.b: "Ми не підемо проти народу!"
  time_of_troubles.3.historical_info: "Закріпачення руського селянства в XVI столітті відбувалося поступово, під впливом державної політики та соціально-економічної обстановки. У 1581 році цар Іван Грозний встановив так звані #italic заповідні літа#! — роки, протягом яких селянам заборонялося переходити від одного поміщика до іншого після закінчення сільськогосподарських робіт. Вважається, що таким чином цар мав намір забезпечити постійний приплив до скарбниці податків і зберегти за поміщиками їхню робочу силу. З часом закріпачення було встановлено остаточно."
  time_of_troubles.4.title: "На країну обрушується голод"
  time_of_troubles.4.desc: "З кожним роком наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] страждають лише сильніше. До набігів розбійників, хвороб та спустошення скарбниці додалися безхліб'я та погана погода. Сьогодні [target_area.GetName] вимирає від страшного голоду, а скоро він охопить усю країну. Рахунок покійникам йтиме на тисячі.\n\n[target_province.GetName] і особливо [target_location.GetName] змушені приймати в себе біженців та утримувати їх, хоча місцеві жителі й без того не можуть похвалитися багатством. Катастрофа настільки велика, що разом зі спустошеною скарбницею та заворушеннями створює ґрунт для хвилювань. І незабаром [ROOT.GetCountry.GetFlavorRank|l] відчує їх повною мірою…"
  time_of_troubles.4.a: "Ми не будемо їм допомагати."
  time_of_troubles.4.b: "Надіслати їм допомогу!"
  pops_in_target_area_suffer_10_sat_tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] у [target_area.Custom('LR_PP')|l] [target_area.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  time_of_troubles.5.title: "Набіги розбійників"
  time_of_troubles.5.desc: "У країні вирують голод і мор. Закони мовчать; цілі області тепер змушені покладатися виключно на самих себе. Яскравий тому приклад — [target_area.GetName], де панує повне беззаконня.\n\nЛихі люди зі зброєю в руках бродять по селах, грабують будинки, підстерігають подорожніх у засідці та чинять безчинства над зневіреними місцевими жителями. За відсутності влади народ змушений забезпечувати себе сам; сподіватися на допомогу не доводиться — [ROOT.GetCountry.GetFlavorRank|l] переживає страшні потрясіння."
  time_of_troubles.5.a: "Нехай роблять що хочуть."
  time_of_troubles.5.b: "Виділити гроші на допомогу місцевим чиновникам."
  time_of_troubles.5.c: "Можливо, вдасться домовитися з їхнім ватажком, пообіцявши йому титул або посаду?"
  every_location_in_area_severe_penalty_control_and_10_pop_sat_loss_tt: "Усі належні нам [Concept('location','райони')|e] в області [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control','контролю')|e], а їхнє [Concept('pops','населення')|e] втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] [Concept('pop_satisfaction','задоволення')|e]"
  every_location_in_area_mild_penalty_control_tt: "Наш [Concept('location', 'район')|e] в області [target_area.GetNameWithNoTooltip] втратить лише [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'контролю')|e] завдяки виділеній допомозі"
  every_location_in_area_mild_penalty_control_brigand_leader_tt: "В обмін на посаду, з якою миритиметься [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], [target_character_2.GetShortName] здебільшого припинить розбій в області [target_area.GetNameWithNoTooltip]"
  time_of_troubles.6.title: "Лженаступник"
  time_of_troubles.6.desc: "У державі з'явилася людина на ім'я [target_character_2.GetShortName] — за власним твердженням, [Select_CString(target_character_2.IsFemale, 'молодша сестра', 'молодший брат' )] покійного престолонаступника, відомого народу як [target_dead_heir.GetName], а отже, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] #L #L [ROOT.GetCountry.GetAdjective|l]#!ої#! держави по праву знаходиться в [Select_CString(target_character_2.IsFemale, 'її', 'його' )] владі. [target_character_2.GetShortNameWithNoTooltip] дуже швидко [Select_CString(target_character_2.IsFemale, 'заручилася', 'заручився' )] підтримкою не тільки багатьох жителів [ROOT.GetCountry.Custom('CF_RP')|l], а й наших суперників.\n\nЗовсім недавно [target_character_2.GetShortNameWithNoTooltip] разом з військом, що складається як з іноземних, так і з місцевих воїнів, [Select_CString(target_character_2.IsFemale, 'перейшла', 'перейшов' )] кордон з [ROOT.GetCountry.Custom('CL_RP')]. Схоже, наші противники, які мріють скинути чинну владу, всерйоз розраховують на [Select_CString(target_character_2.IsFemale, 'неї', 'нього' )]."
  time_of_troubles.6.historical_info: "У 1604 році, в розпал Смутного часу, до Росії прибув загадковий самозванець, який видавав себе за царевича Дмитра — сина Івана Грозного, що дивом вижив. Лжедмитро, який користувався підтримкою польської шляхти та католицької церкви, зумів схилити на свій бік жителів Русі, втомлених від голоду та постійної боротьби за владу. У 1605 році його було короновано на царство, проте правління Лжедмитра тривало недовго: московські бояри, незадоволені підтримкою нового царя з-за кордону та недотриманням ним російських звичаїв, через рік влаштували змову, в результаті якої самозванця було жорстоко вбито. Після нього видати себе за «справжнього» царевича Дмитра намагалося ще кілька людей."
  time_of_troubles.6.a: "[Select_CString(target_character_2.IsFemale, 'Її', 'Його' )] слова нас ображають."
  fake_dmitry_pretender_rebels: "Прихильники самозванця"
  rebellion_may_attract_foreign_aid_tt: "[target_rebel.GetName] можуть запросити іноземну допомогу в боротьбі з нами"
  time_of_troubles.7.title: "Голодні бунти"
  time_of_troubles.7.desc: "Погода різко змінилася, а страшні морози, що простояли кілька років, перетворили наш благодатний ґрунт на безжиттєві пустирища. Хлібороби, яких годувала земля, залишилися з порожніми засіками; у них немає більше ні гідності, ні доброго імені. Озвірілі натовпи висипали на вулиці, проклинаючи ім'я «[target_character.GetName]». Ще трохи — і [target_area.GetName] відкрито збунтується."
  time_of_troubles.7.a: "Проклята селюча!"
  every_pop_in_area_loses_15_sat_tt: "[Concept('pop_satisfaction','Задоволення ')|e] [Concept('pops','груп населення')|e] в [target_area.Custom('LR_PP')|l] [target_area.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]"
  time_of_troubles.8.title: "Повстання Хлопка"
  time_of_troubles.8.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|U] закріпачені — і це стало останньою краплею, що переповнила чашу терпіння народу, який страждав від голоду, хвороб та розбою. Невдоволення вилилося в масове повстання, через яке [ROOT.GetCountry.GetFlavorRank|l] може повністю розвалитися."
  time_of_troubles.8.a: "Прокляття!"
  time_of_troubles.8.historical_info: "У 1603 році — на самому початку Смутного часу — отаман Хлопко Косолап підняв повстання за участю втікачів-холопів та козаків, незадоволених жорсткою політикою закріпачення та голодом у країні. Повстанці нападали на поміщиків та звільняли селян."
  khlopko_rebellion: "Повстання Хлопка"
  time_of_troubles.9.title: "Права справа?"
  time_of_troubles.9.desc: "У #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PP')|L]#!#! з'явилася людина, яка називає себе нащадком династії [target_dynasty.GetName]; нібито [target_character_2.GetName] перебуває з [Select_CString(target_character_3.IsFemale, 'нею', 'ним' )] у спорідненості, але колись давно їх розлучили. Тепер під питанням влада, яку утримує [target_character.GetName]. Від [Select_CString(target_character_3.IsFemale, 'новоприбулої', 'новоприбулого' )] до нас приїхали гінці, які привезли з собою прохання про допомогу та обіцянку завдати смертельного удару нашому ворогу. Підтримавши цю людину, ми послабимо суперника, але тоді [target_location.GetName] може дати нам серйозну відповідь. Чи варто спробувати втілити [Select_CString(target_character_3.IsFemale, 'її', 'його' )] зухвалий задум у життя?"
  time_of_troubles.9.a: "Виділити [Select_CString(target_character_3.IsFemale, 'їй', 'йому' )] всі необхідні кошти!"
  time_of_troubles.9.b: "Так, ми можемо дати трохи грошей."
  time_of_troubles.9.c: "Переговори з бунтівниками нижче нашої гідності."
  tot_we_may_not_get_another_chance_tt: "Іншого шансу підтримати це починання може не бути"
  time_of_troubles.10.title: "Криза в [target_country.Custom('CL_PP')]"
  time_of_troubles.10.desc: "У #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PP')|L]#!#! настав [ShowDisasterName('time_of_troubles')]. Військо держави ослабло, кордони його вразливі. [target_country.GetFlavorRank|U] занурюється в беззаконня. Провінція [target_province.GetName], що лежить біля наших кордонів і є важливою в стратегічному плані, тепер абсолютно не захищена. Якщо ми висунемо претензії прямо зараз, [ROOT.GetCountry.GetFlavorRank|l] поповниться новими територіями, а ми забезпечимо собі більш надійну позицію. З іншого боку, якщо наш ворог оговтається від смути, він неодмінно прийде в лють."
  time_of_troubles.10.a: "Криза — це нові можливості!"
  time_of_troubles.11.title: "Ще одна провінція уражена хворобою"
  time_of_troubles.11.desc: "[target_province.GetName] вимирає від страшної хвороби. Покійникам уже ніхто не веде ліку, крики помираючих зливаються зі стогонами скорботних, а місцева влада майже безсила щось вдіяти зі спалахом. Торгівля зупинилася, поля занедбані, і з кожним днем смерть забирає все більше людей. Колись процвітаюча провінція виявилася спустошеною. Народ з відчаєм благає владу хоч якось допомогти — пошесть губить не тільки життя, а й господарства."
  time_of_troubles.11.a: "Ще не таке буде…"
  weak_penalty_outcome_tt: "Наші [Concept('locations', 'райони')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_very_weak_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 2%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  mild_penalty_outcome_tt: "Наші [Concept('locations', 'райони')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 5%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  strong_penalty_outcome_tt: "Наші [Concept('locations', 'райони')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_severe_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 7,5%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  time_of_troubles.12.title: "[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetNameWithNoTooltip] помирає"
  time_of_troubles.12.desc: "[ROOT.GetCountry.GetCapital.GetName] скорбить: у день, що не віщував нічого лихого, [GetCurrentYear] року [target_heir.GetName] — [Select_CString(target_heir.IsFemale, 'спадкоємиця престолу, що подавала', 'спадкоємець престолу, що подавав' )] великі надії — несподіваним і загадковим чином [Select_CString(target_heir.IsFemale, 'загинула', 'загинув' )]. Разом із [Select_CString(target_heir.IsFemale, 'нею', 'ним' )] загинули і майже всі родичі. Те, що сталося, одразу ж оголосили нещасним випадком — нібито [target_heir.GetName] необережно [Select_CString(target_heir.IsFemale, 'гралася', 'грався' )] з ножем, однак цьому мало хто вірить; народ підозрює злий умисел. Багато хто навіть вважає, що до цього доклали руку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], що прагнуть влади та впливу.\n#NL![ROOT.GetCountry.GetFlavorRank|U] ще не скоро оговтається від цього нещастя: [target_heir.GetShortNameWithNoTooltip] [Select_CString(target_heir.IsFemale, 'була', 'був' )] зовсім дитиною. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] тепер зовсім не користується довірою народу, а честолюбці, що прагнуть влади, почуваються вільно. Що стало причиною цієї загибелі — фатальна випадковість чи чийсь холодний розрахунок — можливо, назавжди залишиться таємницею, але [ROOT.GetCountry.GetLongName] ще довго відчуватиме наслідки."
  time_of_troubles.12.a: "Жахливий день…"
  time_of_troubles.12.historical_info: "У 1591 році юний царевич Дмитро — молодший син Івана Грозного — загинув в Угличі за нез'ясованих обставин. Його смерть оголосили нещасним випадком, але в це пояснення повірили не всі. Багато хто підозрював, що до загибелі царевича доклали руку змовники, зокрема Борис Годунов. Після смерті Дмитра в Росії настав політичний криза: у країні не залишилося престолонаслідника. На хвилі народного обурення в країні почали з'являтися Лжедмитрі — самозванці, що видавали себе за чудом врятованого царевича. Їхніми зусиллями Смутний час ознаменувався не тільки голодом, політичною боротьбою та нестабільністю, а й бунтами і навіть інтервенціями інших держав. Разом зі смертю царевича в країні розпалася центральна влада, зміцнити яку вдалося лише династії Романових у 1613 році."
  time_of_troubles.13.title: "Кінець Смути"
  time_of_troubles.13.desc: "[ROOT.GetCountry.GetLongName] нарешті може зітхнути вільно: [ShowDisasterName('time_of_troubles')], довге і неспокійне, добігло кінця, а разом із ним закінчилися роки голоду, міжусобиць та боротьби за владу. У державі знову запанували мир і спокій. У народу з'явилася нова надія: [target_character.GetName]. В історії країни починається ще одна сторінка."
  time_of_troubles.13.a: "Ми знову довели самим собі, якими стійкими ми можемо бути!"
  time_of_troubles.13.historical_info: "Смутний час закінчився у 1613 році із воцарінням династії Романових, що принесла довгоочікувані мир і стабільність. У роки правління Михайла Федоровича знову зміцніла центральна влада, вщухли заворушення в країні та почала відновлюватися економіка. Зміцнилося кріпосне право, а разом із ним — сільське господарство, були приєднані нові землі та зміцнені кордони. Своїм правлінням цар заклав основу для перетворення Росії на могутню централізовану самодержавну імперію, яка згодом стане впливовим гравцем не тільки у Східній Європі, а й за її межами."