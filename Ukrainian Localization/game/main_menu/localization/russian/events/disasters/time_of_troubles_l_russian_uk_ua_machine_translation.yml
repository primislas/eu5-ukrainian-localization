l_russian:
  time_of_troubles.1.title: "[ShowDisasterNameWithNoTooltip('time_of_troubles')]"
  time_of_troubles.1.desc: "Повітря густо просякнуте відчаєм. Чутки про заколот поширюються стрімко, немов лісова пожежа. [ROOT.GetCountry.GetFlavorRank|U], розгубивши залишки колишньої могутності, поступово в’яне під владою слабких правителів. Урожаї з року в рік стають дедалі меншими. Стривожена і тому осміліла [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] замишляє змови, метою яких незмінно виступає [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], а голодуюче селянство, втративши всяку надію, піднімає повстання. Інші країни вже придивляються, немов стерв’ятники, до охоплених заворушеннями земель у надії поживитися. Над країною збираються хмари; починається [ShowDisasterName('time_of_troubles')]. Пережити цю непросту добу зможуть тільки найстійкіші. Чи зуміє народ гідно пройти це випробування — чи ж його змете хвиля, що піднімається?"
  time_of_troubles.1.historical_info: "Після смерті в 1598 році царя Федора Іоанновича — останнього представника династії Рюриковичів, що протягом 700 років займала руський престол, почався Смутний час, ознаменований голодом, хворобами, народними заворушеннями, появою в країні самозванців — претендентів на трон, та вторгненням Швеції та Польщі. Смута закінчилася тільки в 1613 році після воцаріння Михайла Федоровича — першого царя з династії Романових."
  time_of_troubles.1.a: "Ми тверді. Ми переможемо."
  time_of_troubles.2.title: "Безумство"
  time_of_troubles.2.desc: "[target_character.GetShortName] останніми місяцями поводиться дивно — про це перешіптується і [ROOT.GetCountry.GetGovernment.GetCourtTitle], і весь [ROOT.GetCountry.GetFlavorRank]. Малопомітні спочатку примхи швидко переросли в непередбачувану, іноді навіть руйнівну поведінку, яка викликає подив і у радників, і у придворних.\n\nДеякі навіть заявляють — тихо, щоб їх не почули сторонні — що [Select_CString(target_character.IsFemale, 'государиня збожеволіла', 'государ збожеволів' )], про що свідчать загадкові напади, незрозумілі рішення та повна відстороненість від світу. Весь народ задається питанням: скільки ще триватимуть ці витівки і коли від них почне розвалюватися влада?"
  time_of_troubles.2.a: "Нехай [target_character.GetShortNameWithNoTooltip] і далі тримається за владу."
  time_of_troubles.2.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U], підтримкою яких користується [target_character_2.GetShortNameWithNoTooltip], заслуговують нашої довіри!"
  time_of_troubles.3.title: "Заповідні літа"
  time_of_troubles.3.desc: "[ROOT.GetCountry.GetFlavorRank] сьогодні, попри всю свою велич, знаход[ROOT.GetCountry.Custom('endrank_ityat')]ся в безроздільній владі внутрішніх сил, які користуються значним впливом. Ті, хто прагне примножити свої багатства, безсоромно тиснуть на [Select_CString(target_character.IsFemale, 'государиню', 'государя' )], сподіваючись, що [target_character.GetName] прийматиме ті рішення, які обіцяють вигоду саме їм.\n\nДеякі особливо впливові [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] нещодавно навіть зажадали обмежити права, якими користуються наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], адже поміщики нібито відчувають величезні труднощі. Однак такий захід неодмінно викличе обурення у народу — можливо, що через кілька років [ROOT.GetCountry.GetFlavorRank|l] змін[ROOT.GetCountry.Custom('endrank_ityat')] до невпізнання…"
  time_of_troubles.3.a: "Схвалити ці заходи."
  time_of_troubles.3.b: "Ми не підемо проти народу!"
  time_of_troubles.3.historical_info: "Закріпачення руського селянства в XVI столітті відбувалося поступово, під впливом державної політики та соціально-економічної обстановки. У 1581 році цар Іван Грозний встановив так звані #italic заповідні літа#! — роки, протягом яких селянам заборонялося переходити від одного поміщика до іншого після закінчення сільськогосподарських робіт. Вважається, що таким чином цар мав намір забезпечити постійний приплив до казни податей та зберегти за поміщиками їхню робочу силу. Згодом закріпачення було встановлено остаточно."
  time_of_troubles.4.title: "На країну обрушується голод"
  time_of_troubles.4.desc: "З кожним роком наші [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] страждають тільки сильніше. До набігів розбійників, хвороб та спустошення скарбниці додалися безхліб’я та погана погода. Сьогодні [target_area.GetName] вимирає від страшного голоду, а скоро він захлисне всю країну. Рахунок покійникам йтиме на тисячі.\n\n[target_province.GetName] і особливо [target_location.GetName] змушені приймати у себе біженців та утримувати їх, хоча місцеві жителі і без того не можуть похвалитися багатством. Катастрофа настільки велика, що вкупі з порожніючою скарбницею та заворушеннями створює ґрунт для заворушень. І незабаром [ROOT.GetCountry.GetFlavorRank|l] відчує їх у повній мірі…"
  time_of_troubles.4.a: "Ми не будемо їм допомагати."
  time_of_troubles.4.b: "Послати їм допомогу!"
  pops_in_target_area_suffer_10_sat_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] [Concept('pops', 'груп населення')|e] у [target_area.Custom('LR_PREP')|l] [target_area.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  time_of_troubles.5.title: "Набіги розбійників"
  time_of_troubles.5.desc: "У країні вирують голод і мор. Закони не працюють; цілі області тепер змушені покладатися виключно на самих себе. Яскравий тому приклад — [target_area.GetName], де панує хаос.\n\nЛихі люди зі зброєю в руках бродять по селах, грабують будинки, підстерігають подорожніх у засідці та чинять безчинства над зневіреними місцевими жителями. За відсутності влади народ змушений забезпечувати себе сам; сподіватися на допомогу не доводиться — [ROOT.GetCountry.GetFlavorRank|l] переживає страшні потрясіння."
  time_of_troubles.5.a: "Нехай роблять що хочуть."
  time_of_troubles.5.b: "Виділити гроші на допомогу місцевим чиновникам."
  time_of_troubles.5.c: "Можливо, вдасться домовитися з їхнім ватажком, пообіцявши йому титул або посаду?"
  every_location_in_area_severe_penalty_control_and_10_pop_sat_loss_tt: "Усі належні нам [Concept('location', 'місцевості')|e] в області [target_area.GetNameWithNoTooltip] втратять [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'контролю')|e], а їхнє [Concept('pops', 'населення')|e] втратить [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]  [Concept('pop_satisfaction', 'задоволення')|e]"
  every_location_in_area_mild_penalty_control_tt: "Наш [Concept('location', 'місцевість')|e] в області [target_area.GetNameWithNoTooltip] втратить лише [ShowNamedValue('control_mild_penalty')|+=2%] [Concept('control', 'контролю')|e] завдяки виділеній допомозі"
  every_location_in_area_mild_penalty_control_brigand_leader_tt: "В обмін на посаду, з якою миритиметься [ROOT.GetCountry.GetGovernment.GetCourtTitle|l], [target_character_2.GetShortName] в основному припинить розбій в області [target_area.GetNameWithNoTooltip]"
  time_of_troubles.6.title: "Лжеспадкоємець"
  time_of_troubles.6.desc: "У країні з'явилася людина на ім'я [target_character_2.GetShortName] — за власним твердженням, [Select_CString(target_character_2.IsFemale, 'молодша сестра', 'молодший брат' )] покійного престолонаслідника, відомого народу як [target_dead_heir.GetName], а отже, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] #L [ROOT.GetCountry.GetAdjective|l]ої#! країни по праву знаходиться в [Select_CString(target_character_2.IsFemale, 'її', 'його' )] владі. [target_character_2.GetShortNameWithNoTooltip] дуже швидко [Select_CString(target_character_2.IsFemale, 'заручилася', 'заручився' )] підтримкою не тільки багатьох жителів [ROOT.GetCountry.Custom('rank_ua_GEN')|l], а й наших суперників.\n\nЗовсім недавно [target_character_2.GetShortNameWithNoTooltip] разом із військом, що складається як з іноземних, так і з місцевих воїнів, [Select_CString(target_character_2.IsFemale, 'перейшла', 'перейшов' )] кордон із [ROOT.GetCountry.Custom('CL_GEN')]. Схоже, наші противники, які мріють повалити чинну владу, всерйоз розраховують на [Select_CString(target_character_2.IsFemale, 'неї', 'нього' )]."
  time_of_troubles.6.historical_info: "У 1604 році, в розпал Смутного часу, до Московії прибув загадковий самозванець, який видавав себе за царевича Дмитра — сина Івана Грозного, що дивом вижив. Лжедмитро, який користувався підтримкою польської шляхти та католицької церкви, зумів схилити на свій бік жителів Русі, втомлених від голоду та постійної боротьби за владу. У 1605 році він був коронований на царство, проте правління Лжедмитра тривало недовго: московські бояри, незадоволені підтримкою нового царя з-за кордону та недотриманням ним руських звичаїв, через рік влаштували змову, в результаті якої самозванець був жорстоко вбитий. Після нього видати себе за «справжнього» царевича Дмитра намагалося ще кілька людей."
  time_of_troubles.6.a: "[Select_CString(target_character_2.IsFemale, 'Її', 'Його' )] слова нас ображають."
  fake_dmitry_pretender_rebels: "Прихильники самозванця"
  rebellion_may_attract_foreign_aid_tt: "[target_rebel.GetName] можуть запросити іноземну допомогу для боротьби з нами"
  time_of_troubles.7.title: "Голодні бунти"
  time_of_troubles.7.desc: "Погода різко змінилася, а страшні морози, що лютували протягом кількох зим, перетворили наш благодатний ґрунт на безжиттєві пустирі. Хлібороби, яких годувала земля, залишилися з порожніми засіками; у них немає більше ні гідності, ні доброго імені. Озвірілі натовпи висипали на вулиці, проклинаючи ім'я «[target_character.GetName]». Ще трохи — і [target_area.GetName] відкрито збунтується."
  time_of_troubles.7.a: "Проклята селючня!"
  every_pop_in_area_loses_15_sat_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] [Concept('pops', 'груп населення')|e] у [target_area.Custom('LR_PREP')|l] [target_area.GetNameWithNoTooltip] знизиться на [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%]"
  time_of_troubles.8.title: "Повстання Хлопка"
  time_of_troubles.8.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|U] закріпачені — і це стало останньою краплею, що переповнила чашу терпіння народу, який страждав від голоду, хвороб та розбою. Невдоволення вилилося в масове повстання, через яке [ROOT.GetCountry.GetFlavorRank|l] може повністю розвалитися."
  time_of_troubles.8.a: "Прокляття!"
  time_of_troubles.8.historical_info: "У 1603 році — на самому початку Смутного часу — отаман Хлопко Косолап підняв повстання за участю втікачів-холопів та козаків, незадоволених жорсткою політикою закріпачення та голодом у країні. Повстанці нападали на поміщиків та звільняли селян."
  khlopko_rebellion: "Повстання Хлопка"
  time_of_troubles.9.title: "Права справа?"
  time_of_troubles.9.desc: "У #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#! з'явилася людина, яка називає себе нащадком династії [target_dynasty.GetName]; нібито [target_character_2.GetName] перебуває з [Select_CString(target_character_3.IsFemale, 'нею', 'ним' )] у спорідненості, але колись давно їх розлучили. Тепер під питанням влада, яку утримує [target_character.GetName]. Від [Select_CString(target_character_3.IsFemale, 'новоприбулої', 'новоприбулого' )] до нас приїхали гінці, які привезли із собою прохання про допомогу та обіцянку завдати смертельного удару нашому ворогу. Підтримавши цю людину, ми послабимо суперника, але тоді [target_location.GetName] може дати нам серйозну відповідь. Чи варто спробувати втілити [Select_CString(target_character_3.IsFemale, 'її', 'його' )] зухвалий задум у життя?"
  time_of_troubles.9.a: "Виділити [Select_CString(target_character_3.IsFemale, 'їй', 'йому' )] усі необхідні кошти!"
  time_of_troubles.9.b: "Так, ми можемо дати трохи грошей."
  time_of_troubles.9.c: "Переговори з бунтівниками нижче нашої гідності."
  tot_we_may_not_get_another_chance_tt: "Іншої нагоди підтримати це починання може не трапитись"
  time_of_troubles.10.title: "Криза в [target_country.Custom('CL_PREP')]"
  time_of_troubles.10.desc: "У #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#! настало [ShowDisasterName('time_of_troubles')]. Військо країни ослабло, кордони її вразливі. [target_country.GetFlavorRank|U] занурюється в хаос. Провінція [target_province.GetName], розташована біля наших кордонів і має велике стратегічне значення, тепер абсолютно не захищена. Якщо ми висунемо претензії прямо зараз, [ROOT.GetCountry.GetFlavorRank|l] поповниться новими територіями, а ми забезпечимо собі більш надійну позицію. З іншого боку, якщо наш ворог оговтається від смути, він неодмінно розлютиться."
  time_of_troubles.10.a: "Криза — це нові можливості!"
  time_of_troubles.11.title: "Ще одна провінція вражена хворобою"
  time_of_troubles.11.desc: "[target_province.GetName] вимирає від страшної хвороби. Покійникам вже ніхто не веде ліку, крики помираючих зливаються зі стонами скорботних, а місцева влада практично безсила. Торгівля зупинилася, поля занедбані, і з кожним днем смерть забирає все більше людей. Колись процвітаюча провінція спустошена. Народ з відчаєм благає владу хоч якось допомогти — пошесть губить не тільки життя, а й господарства."
  time_of_troubles.11.a: "Те ще буде…"
  weak_penalty_outcome_tt: "Наші [Concept('locations', 'місцевості')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_very_weak_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 2%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  mild_penalty_outcome_tt: "Наші [Concept('locations', 'місцевості')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_weak_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 5%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  strong_penalty_outcome_tt: "Наші [Concept('locations', 'місцевості')|e] у провінції [target_province.GetNameWithNoTooltip] втрачають [ShowNamedValue('prosperity_severe_penalty')|+=2%] [Concept('prosperity', 'процвітання')|e], а ми втрачаємо приблизно #Y 7,5%#! [Concept('pops', 'населення')|e] [Concept('province', 'провінції')|e]"
  time_of_troubles.12.title: "[ROOT.GetCountry.GetGovernment.GetRulerOrRegent.GetDynasty.GetNameWithNoTooltip] помирає"
  time_of_troubles.12.desc: "[ROOT.GetCountry.GetCapital.GetName] сумує: у день [GetCurrentYear] року, що не віщував нічого лихого, [target_heir.GetName] — [Select_CString(target_heir.IsFemale, 'спадкоємиця престолу, що подавала', 'спадкоємець престолу, що подавав' )] великі надії — несподіваним і загадковим чином [Select_CString(target_heir.IsFemale, 'загинула', 'загинув' )]. Разом з [Select_CString(target_heir.IsFemale, 'нею', 'ним' )] загинули і майже всі родичі. Те, що сталося, тут же оголосили нещасним випадком — нібито [target_heir.GetName] необережно [Select_CString(target_heir.IsFemale, 'гралася', 'грався' )] з ножем, проте цьому мало хто вірить; народ підозрює злий умисел. Багато хто навіть вважає, що до цього доклали руку [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], що прагнуть влади та впливу.\n\n[ROOT.GetCountry.GetFlavorRank|U] ще не скоро оговтається від цього нещастя: [target_heir.GetShortNameWithNoTooltip] [Select_CString(target_heir.IsFemale, 'була', 'був' )] зовсім дитиною. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] тепер зовсім не користується довірою народу, а честолюбці, що прагнуть влади, почуваються вільно. Що стало причиною цієї загибелі — фатальна випадковість чи чийсь холодний розрахунок — можливо, назавжди залишиться таємницею, але [ROOT.GetCountry.GetLongName] ще довго відчуватиме наслідки."
  time_of_troubles.12.a: "Жахливий день…"
  time_of_troubles.12.historical_info: "У 1591 році юний царевич Дмитро — молодший син Івана Грозного — загинув в Угличі за нез'ясованих обставин. Його смерть оголосили нещасним випадком, але в це пояснення повірили не всі. Багато хто підозрював, що до загибелі царевича доклали руку змовники, в тому числі Борис Годунов. Після смерті Дмитра в Росії настав політичний кризис: в країні не залишилося престолонаслідника. На хвилі народного обурення почали з'являтися Лжедмитрі — самозванці, що видавали себе за царевича, який дивом врятувався. Їхніми зусиллями Смутний час ознаменувався не тільки голодом, політичною боротьбою та нестабільністю, а й бунтами і навіть інтервенціями інших країн. Зі смертю царевича в країні розпалася центральна влада, зміцнити яку вдалося тільки династії Романових у 1613 році."
  time_of_troubles.13.title: "Кінець Смути"
  time_of_troubles.13.desc: "[ROOT.GetCountry.GetLongName] нарешті може зітхнути вільно: [ShowDisasterName('time_of_troubles')], довгий і неспокійний, добіг кінця, а разом з ним закінчилися роки голоду, міжусобиць і боротьби за владу. У країні знову запанували мир і спокій. У народу з'явилася нова надія: [target_character.GetName]. В історії країни починається нова сторінка."
  time_of_troubles.13.a: "Ми знову довели самим собі, якими стійкими ми можемо бути!"
  time_of_troubles.13.historical_info: "Смутний час закінчився в 1613 році з воцарінням династії Романових, що принесла довгоочікувані мир і стабільність. У роки правління Михайла Федоровича знову зміцніла центральна влада, вщухли заворушення в країні і почала відновлюватися економіка. Зміцнилося кріпосне право, а разом з ним — сільське господарство, були приєднані нові землі та зміцнені кордони. Своїм правлінням цар заклав основу для перетворення Росії на могутню централізовану самодержавну імперію, яка згодом стане впливовим гравцем не тільки у Східній Європі, а й за її межами."