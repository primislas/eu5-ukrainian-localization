l_russian:
  jurchen_confederation_events.1.title: "Часи змінюються"
  jurchen_confederation_events.1.desc: "Донедавна наші предки та їхні батьки полювали та годували народ завдяки коням, билися з ворогами та жили вільним життям. Тепер же [target_jc_leader.GetName] хоче нас стреножити, затупити наші клинки та покінчити з нашими славними традиціями племінних володарів. [Select_CString(target_jc_leader.IsFemale,'Її', 'Його')] посланці вимагають від нас перейняти уклад південних сусідів, позбувшись при цьому нашої самобутності."
  jurchen_confederation_events.1.a: "Злізайте з коней і прислухайтеся, адже вони мають рацію!"
  jurchen_confederation_events.1.b: "Ну, пішла! Геть!"
  jurchen_confederation_events.2.title: "Гідний вершник"
  jurchen_confederation_events.2.desc: "Мало хто з нас так само вправний у сідлі, як [target_character.GetName]. [Select_CString(target_character.IsFemale,'Її', 'Його')] вміння стріляти з лука не раз приносило нам перемогу в багатьох почесних змаганнях і демонструвало войовничим сусідам нашу бойову майстерність. Однак наші радники при дворі кажуть, що [Select_CString(target_character.IsFemale,'вона', 'він')] стане чудовим дипломатичним подарунком для лідерів нашої конфедерації. [target_jc_leader.GetName] оцінить [Select_CString(target_character.IsFemale,'її', 'його')] за заслугами."
  jurchen_confederation_events.2.a: "Дурниці! [target_character.GetShortNameWithNoTooltip] залишиться тут!"
  jurchen_confederation_events.2.b: "Дуже добре, будемо сподіватися, що вони приймуть [Select_CString(target_character.IsFemale,'її', 'його')]…"
  jurchen_confederation_events.3.title: "[target_member.GetNameWithNoTooltip] і подарунок"
  jurchen_confederation_events.3.desc: "Посланці від членів нашої конфедерації на території #ONCLICK:COUNTRY,[target_member.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_member.Custom('CL_tt')],X [target_member.Custom('CL_GEN')|L]#!#! привезли подарунки на знак дружби з нашим народом. Серед них [Select_CString(target_character.IsFemale,'дівчина', 'чоловік')] міцної статури, [Select_CString(target_character.IsFemale,'яка', 'який')], за чутками, [Select_CString(target_character.IsFemale,'виграла', 'виграв')] кілька турнірів зі стрільби з лука та верхової їзди у себе вдома. [target_character.GetShortName] з нетерпінням очікує пригод при новому дворі та з хвилюванням передчуває церемонію свого представлення."
  jurchen_confederation_events.3.a: "[Select_CString(target_character.IsFemale,'Вона', 'Він')] стане чудовим доповненням до наших воїнів. Ласкаво просимо!"
  jurchen_confederation_events.3.b: "Іди геть, жебраче."
  jurchen_confederation_events.4.title: "Основа нашого суспільства"
  jurchen_confederation_events.4.desc: "Наш народ переживав потрясіння протягом сотень років. Війни, голод та вторгнення загарбників не змогли погасити полум'я, що яскраво горить у наших серцях. Однак останнім часом суперництво між нами та #ONCLICK:COUNTRY,[target_jurchen_country_2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_jurchen_country_2.Custom('CL_tt')],X [target_jurchen_country_2.Custom('CL_INST')|L]#!#! стало завдавати нам чимало клопоту. Їхні вершники раз у раз перетинають наші кордони, грабують і розоряють наших людей, крадуть урожай. Подібна поведінка неприпустима, і ми покладемо їй край!"
  jurchen_confederation_events.4.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  jurchen_confederation_events.4.b: "Терміново надішліть скаргу лідеру нашої конфедерації!"
  jurchen_confederation_events.5.title: "Суперництво між [target_jurchen_country_1.Custom('CL_INST')] та [target_jurchen_country_2.Custom('CL_INST')]"
  jurchen_confederation_events.5.desc: "У запальності немає нічого ганебного. У будь-який інший день наші люди високо б оцінили подібну поведінку. Однак недавнє суперництво між лідерами #ONCLICK:COUNTRY,[target_jurchen_country_1.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_jurchen_country_1.Custom('CL_tt')],X [target_jurchen_country_1.Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[target_jurchen_country_2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_jurchen_country_2.Custom('CL_tt')],X [target_jurchen_country_2.Custom('CL_GEN')|L]#!#! загрожує перерости в повномасштабну війну. За чутками, їхні патрулі досить часто відхиляються від свого маршруту та розоряють посіви один одного. Ніхто вже й не пам'ятає, хто все це почав, і тому вони звернулися до нас за допомогою у вирішенні суперечки."
  jurchen_confederation_events.5.a: "Винесемо рішення на користь [target_jurchen_country_1.Custom('CL_GEN')]."
  jurchen_confederation_events.5.b: "Народ [target_jurchen_country_2.Custom('CL_GEN')] має рацію!"
  jurchen_confederation_events.5.c: "Чому б вам усім не відмовитися від вашої дикості?"
  jurchen_confederation_events.6.title: "Біди цивілізованого суспільства"
  jurchen_confederation_events.6.desc: "Що сталося з нашим народом? Колись ми були вільними, дикими, закоханими в природу та саме життя. Наші предки славилися своїми навичками відлову коней та верхової їзди. Під прапорами Цзінь вони підкорили десятки народів, і навіть сам Китай схилився перед ними.\n\nТепер же ми тільки й робимо, що турбуємося про бюджети, баланси, наші зобов'язання перед конфедерацією та придворний етикет. Що ж сталося з нашими колись гордими воїнами?"
  jurchen_confederation_events.6.a: "На жаль, таке тепер наше життя…"
  jurchen_confederation_events.6.b: "Ми зобов'язані боротися і захищати наші засади!"
  jurchen_confederation_events.7.title: "Наші воїни намагаються читати книги"
  jurchen_confederation_events.7.desc: "Зусилля з централізації нашого суспільства та запозичення укладу наших південних сусідів приносять свої плоди. Багато наших воїнів взялися за літературу в спробі вивчити писання та пристосуватися до нових часів. Однак деякі високопоставлені особи наполягають на збереженні старих устоїв…"
  jurchen_confederation_events.7.a: "Можливо, їм потрібно більше муштри!"
  jurchen_confederation_events.7.b: "За читанням майбутнє."
  jurchen_confederation_events.8.title: "Вимоги народу"
  jurchen_confederation_events.8.desc: "Нашому народу потрібні товари, що прибувають з чужих земель. Чудові речі та екзотичні дрібнички завжди приваблювали народ. Багато хто в нашій адміністрації підтримує ідею заохочення торгівлі товарами, які найбільш близькі до племінного укладу, але при цьому виступають проти змін. Однак, можливо, варто прислухатися і до голосів тих, хто підтримує неупереджений підхід до майбутнього…"
  jurchen_confederation_events.8.a: "Ми — горді воїни, нам потрібні коні та шкіра!"
  jurchen_confederation_events.8.b: "Не варто боятися зустрічі з майбутнім!"
  jurchen_confederation_events.9.title: "Життєвий урок"
  jurchen_confederation_events.9.desc: "Мало хто з наших вершників опанував мистецтво граціозно скакати на шаленій швидкості. Тому не варто дивуватися тому, що [target_heir.GetName] вкотре [Select_CString(target_heir.IsFemale,'впала', 'впав')] зі свого коня. Травма серйозна, і до [Select_CString(target_heir.IsFemale,'нашої улюбленої спадкоємиці', 'нашого улюбленого спадкоємця')] терміново викликали лікарів. Варто зазначити й те, що кінь не покинув [Select_CString(target_heir.IsFemale,'господиню', 'господаря')] після того, як [target_heir.GetShortNameWithNoTooltip] [Select_CString(target_heir.IsFemale,'вилетіла', 'вилетів')] із сідла. За словами очевидців події, кінь навіть намагався вберегти [Select_CString(target_heir.IsFemale,'свою наїзницю', 'свого наїзника')], пом'якшивши удар при падінні…"
  jurchen_confederation_events.9.a: "Який славний кінь!"
  jurchen_confederation_events.9.b: "Ха, це падіння, мабуть, виглядало смішно!"
  jurchen_confederation_events.10.title: "Затяжна сварка"
  jurchen_confederation_events.10.desc: "Гарячність і запальність не чужі нашому народу. У тавернах, де випивка лилася рікою і панував розпуста, траплялося чимало жорстких перепалок. Однак нещодавня суперечка між могутніми вождями в місті [target_capital.GetName] вийшла з-під контролю. Пожежі охопили більшу частину місцевості, повітря наповнилося нудотною сумішшю криків, вогню та крові, а перепалки переросли у відкриту війну за честь ворогуючих сімей…"
  jurchen_confederation_events.10.a: "Це ознака слабкого керівництва, на жаль…"
  jurchen_confederation_events.10.b: "Ми відшкодуємо збитки. Це була приголомшлива демонстрація сили!"
  jurchen_confederation_events.11.title: "Наступні покоління"
  jurchen_confederation_events.11.desc: "Наші вчені та радники ретельно продумали плани для наступного покоління воїнів та чиновників нашої великої держави. У той час як рада та міністри підтримують процвітання нашої культури, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] рішуче відстоюють ідею вдосконалення війська."
  jurchen_confederation_events.11.a: "Ми підтримуватимемо нашу культуру."
  jurchen_confederation_events.11.b: "Що це за народ без гідного війська?"
  jurchen_confederation_events.12.title: "Боротьба з новими порядками"
  jurchen_confederation_events.12.desc: "Не секрет, що після початку наших спроб систематизувати законодавство по всій конфедерації на кожному куті з'явилися вороги та шпигуни. І узурпатори, і суперники плетуть змови за зачиненими дверима, розраховуючи на нашу загибель. Нещодавно більшість наших радників виступила з ультиматумом. Вони вимагають негайно припинити наші спроби централізації, погрожуючи в іншому випадку повстанням і смутою…"
  jurchen_confederation_events.12.a: "Що ж, у душі ми дикі вершники…"
  jurchen_confederation_events.12.b: "Обмеженість нам не на заваді!"
  jurchen_sinicization_tt: "Віднині доти, доки править [target_ruler.GetName], ухвалення будь-яких законів у межах нашої #G  конфедерації#! призведе до зниження [Concept('stability', 'стабільності')|e] на #R  10 од.#! та [Concept('tribal_cohesion', 'племінного єднання')|e] на #R  10 од.#!"
  jurchen_confederation_events.13.title: "Вивчи ближнього свого"
  jurchen_confederation_events.13.desc: "Не секрет, що наші південні сусіди володіють величезними знаннями, прихованими в книгах та бібліотеках по всій території їхніх прославлених володінь. Налагодження відносин для вивчення їхніх звичаїв видається вигідним, але водночас дещо спірним рішенням…"
  jurchen_confederation_events.13.a: "Поширення знань понад усе."
  jurchen_confederation_events.13.b: "Не можна відштовхувати від себе людей."
  jurchen_confederation_events.14.title: "Втілення щастя"
  jurchen_confederation_events.14.desc: "Мало кому судилося знайти щастя в цьому похмурому та сірому житті. Долані хворобами, втратами та одноманітністю повсякденних турбот, більшість людей животіють у смутку та нудьзі. Добре, що про людей нашого племені такого не можна сказати. Вони вільні скакати, куди заманеться, воювати з нашими жалюгідними сусідами та грабувати їх. Однак [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] заявили, що вони гідні щедрої частки нашого новонабутого багатства…"
  jurchen_confederation_events.14.a: "Турбота є любов."
  jurchen_confederation_events.14.b: "А наконечниками наших стріл та списів візьмете?"
  jurchen_confederation_events.15.title: "Полювання в добрий день"
  jurchen_confederation_events.15.desc: "Запах бруду та пилу стоїть у повітрі, верхові мисливці переходять з рисі в галоп, гавкають собаки, всі учасники в непідробному передчутті ідеального пострілу, який наздожене жертву… Ось з чого складається міф про гарне полювання — ця традиція передається з часів наших праотців. Деякий час тому група мисливців повернулася додому зі щедрою здобиччю, піднісши її як символічний подарунок двору…"
  jurchen_confederation_events.15.a: "Краще в житті не буває!"
  jurchen_confederation_events.15.b: "Ці звичаї мають залишитися в минулому."
  jurchen_confederation_events.16.title: "[target_jc_leader.GetNameWithNoTooltip] та боротьба за об'єднання"
  jurchen_confederation_events.16.desc: "Наше перебування під захистом конфедерації, схоже, добігає кінця. Наш лідер спробував безсоромно обмежити нашу незалежність, щоб об'єднати всі землі під своїм прапором."
  jurchen_confederation_events.16.a: "Разом ми сильніші!"
  jurchen_confederation_events.16.b: "Ми не можемо відмовитися від нашої незалежності…"
  jurchen_confederation_events.17.title: "Доба великого об'єднання"
  jurchen_confederation_events.17.desc: "Багато вождів, що входять до нашої конфедерації, користувалися відносною автономією та значним впливом у своїх володіннях. Однак щоб піднестися та кинути виклик тим, хто бажає нашого подальшого поневолення, ми повинні об'єднатися під одним прапором. Сьогодні настав день, коли нам вдалося нав'язати свою волю іншим членам об'єднання [target_io.GetName]."
  jurchen_confederation_events.17.a: "Наш час настав!"
  jurchen_confederation_unification_effort_tt: "Члени об'єднання [target_io.GetNameWithNoTooltip] будуть поставлені перед вибором: або стати [Concept('subject', 'ленниками')|e] під нашим началом, або дати нам [Concept('casus_belli', 'привід для війни')|e]."