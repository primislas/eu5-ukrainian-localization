l_russian:
  hre.privilege_revoked.intro_desc: "У [GetCurrentYear] році від Різдва Христового [Select_CString(target_character.IsFemale,'найясніша августа', 'найясніший август')] [target_character.GetName], милістю божою [Select_CString(target_character.IsFemale,'імператриця', 'імператор')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!, знову [Select_CString(target_character.IsFemale,'скликала', 'скликав')] усі імперські стани."
  hre.100.title: "Скасування привілеїв"
  hre.100.desc: "$hre.privilege_revoked.intro_desc$ Райхстаг прийняв пропозицію передати вирішення питань зовнішньої політики та оголошення війни [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.GetGovernment.GetRuler.IsFemale,'імператриці', 'імператору')]. При цьому князі погодилися перейти в пряме васальне підпорядкування, тобто визнати, що [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] стане їхнім єдиним сюзереном."
  hre.100.a: "Вимагатимемо принести присягу."
  hre.100.ctt: "Усі країни, що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, зобов'язані принести #g клятву вірності#! або #r покинути#! імперію! Усі [Concept('locations', 'місцевості')|e], [Concept('owned', 'належні')|e] учасникам Священної Римської Імперії, що відмовилися, вийдуть з її складу та стануть [Concept('core', 'корінними місцевостями')|e] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_GEN')|L]#!#!"
  hre.101.title: "Скасування привілеїв"
  hre.101.desc: "Райхстаг схвалив реформу, і тепер у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! більше немає незалежних країн, що мають право на оголошення війни. Лише питання часу, коли [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] ліквідує і нашу автономію."
  hre.101.a: "Принести присягу на вірність"
  hre.101.b: "[target_emperor.IsFemale,'Вона', 'Він')] може відняти в нас життя, але ніколи не відніме нашу свободу!"
  hre.101.b.tt: "Усі [Concept('locations', 'місцевості')|e] [Concept('owned', 'в нашому володінні')|e], що є частиною #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, вийдуть з її складу та стануть [Concept('core', 'корінними місцевостями')|e] #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_GEN')|L]#!#!."
  hre.102.title: "Відновлення Римської Імперії"
  hre.102.desc: "$hre.privilege_revoked.intro_desc$ Райхстаг погодився з пропозицією поєднати розрізнені володіння імперії в єдину національну країну, а [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] буде [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'коронована', 'коронований')] її [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'спадковою правителькою', 'спадковим правителем')]."
  hre.102.a: "Вимагати корону!"
  hre_unify_the_empire_tt: "Усі [Concept('member', 'володіння')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! переходять до складу #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_GEN')|L]#!#!."
  hre.103.title: "Відновлення Римської Імперії"
  hre.103.desc: "Райхстаг схвалив реформу, згідно з якою наша країна припиняє своє існування, а її володіння переходять до рук [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператора')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. Нам залишається лише втішати себе тим, що ми стали частиною чогось більшого."
  hre.103.a: "Хай живе імператор!"
  hre.104.title: "Обмежена автономія вільних міст"
  hre.104.desc: "$hre.privilege_revoked.intro_desc$ Райхстаг погодився обмежити автономію #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільних міст#!#! та зміцнити владу [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператора')] в межах #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!."
  hre.104.a: "Упокорення міст"
  antagonism_hre_subjugated_free_cities: "Вільні міста підкорені"
  hre_subjugate_every_free_city_tt: "Кожне #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільне імперське місто#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! стане [Concept('subject', 'васалом')|e] нашого #TOOLTIP:SUBJECT_TYPE,imperial_free_city,X #L вільного імперського міста#!#!"
  hre_subjugate_every_direct_free_city_tt: "Кожне #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільне імперське місто#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! стане [Concept('subject', 'васалом')|e] нашого #TOOLTIP:SUBJECT_TYPE,direct_imperial_free_city,X #L вільного імперського міста прямого підпорядкування#!#!"
  hre.105.title: "Обмежена автономія вільних міст!"
  hre.105.desc: "Райхстаг затвердив реформу, що суттєво обмежила наш привілейований статус «[ShowSpecialStatusNameWithNoTooltip('free_city')]»!"
  hre.105.a: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] оберігає та захищає!"
  hre.106.title: "Скасування автономії вільних міст"
  hre.106.desc: "$hre.privilege_revoked.intro_desc$ Райхстаг погодився ще сильніше обмежити автономію #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільних міст#!#!, зміцнивши владу [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператора')] в межах Священної Римської Імперії."
  hre.106.a: "Включимо вільні міста до імперських володінь."
  hre.107.title: "Скасування автономії вільних міст"
  hre_subjugate_every_free_city_directly_tt: "Кожне #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільне імперське місто#!#! #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! стане [Concept('subject', 'васалом')|e] нашого #TOOLTIP:SUBJECT_TYPE,direct_imperial_free_city,X #L вільного імперського міста прямого підпорядкування#!#!"
  hre.107.desc: "Райхстаг схвалив реформу, згідно з якою наша автономія як #TOOLTIP:SPECIAL_STATUS,free_city,X #L вільного імперського міста#!#! повністю ліквідована. Відтепер усі дипломатичні справи нашої країни ведуться при дворі в [target_country.GetCapital.Custom('LR_PREP')|l] [target_country.GetCapital.GetName]."
  hre.107.a: "Наше місто служить [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператору')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!!"
  hre.900.title: "Смерть [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператора')]"
  hre.900.desc: "Хай живе [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриця', 'імператор')]! Виборці вирішили все ж довіритися нам, імператорська корона зберігається за #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('hre').GetLeaderCountry.Custom('CL_INST')|L]#!#!. Імператорська влада зростає в міру того, як наша країна збільшує свій вплив у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!, а князі починають бачити в нас природжених правителів."
  hre.900.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.imperial_authority_change.tt: "[GetUniqueInternationalOrganization('hre').GetName] отримує [ROOT.GetVariable('imperial_authority_change').GetValue|+2] до #Y імперської влади#!"
  hre.imperial_authority_change_action.tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! отримує [ROOT.GetVariable('imperial_authority_change_action').GetValue|+2] до #Y імперської влади#!"
  hre.901.title: "Відновлення князівства"
  hre.901.desc: "Подібно до фенікса, #ONCLICK:COUNTRY,[SCOPE.sCountry('released_country').Custom('CL_tt')] #TOOLTIP:COUNTRY,[SCOPE.sCountry('released_country').Custom('CL_tt')],X [SCOPE.sCountry('released_country').Custom('CL_DAT')|L]#!#! вдалося відродитися з попелу у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!!"
  hre.901.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.902.title: "Князь-єретик"
  hre.902.desc: "[heretic_country.GetName], князівство #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, навернулося в єретичну віру! [hre_ruler.GetName] не потерпить такого!"
  hre.902.a: "Це неприпустимо!"
  hre.903.title: "Повернення заблудлої вівці"
  hre.903.desc: "[true_faith_country.GetName], князівство #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, навернулося в істинну віру!"
  hre.903.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.904.title: "Слава #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!!"
  hre.904.desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! відбила напад загарбників з #ONCLICK:COUNTRY,[loser.Custom('CL_tt')] #TOOLTIP:COUNTRY,[loser.Custom('CL_tt')],X [loser.Custom('CL_GEN')|L]#!#!!"
  hre.904.a: "Ми це передбачали…"
  hre.905.title: "Загибель князівства"
  hre.905.desc: "[annexed.GetName], князівство #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, завойоване іноземною країною!"
  hre.905.a: "На жаль!"
  hre.907.title: "Визволення князівства"
  hre.907.desc: "[released_country.GetName], князівство #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, звільнилося від іноземного ярма!"
  hre.907.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.908.title: "На захист #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!!"
  hre.908.desc: "[GetUniqueInternationalOrganization('hre').GetLeaderTitle] стає на бік #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#! у боротьбі з іноземними загарбниками!"
  hre.908.a: "Природно, [Select_CString(hre_ruler.IsFemale,'вона зобов’язана', 'він зобов’язаний')] захищати #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священну Римську Імперію#!#!!"
  hre.909.title: "[Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'Безчесна імператриця', 'Безчесний імператор')]"
  hre.909.desc: "[Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'Імператриця', 'Імператор')] не [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'змогла', 'зміг')] захистити #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_ACC')|L]#!#! від іноземних загарбників!"
  hre.909.a: "[Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'Безчесна', 'Безчесний')]? Скоріше, [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'розсудлива', 'розсудливий')]!"
  hre.950.title: "Імперська реконкіста"
  hre.950.desc: "[conquered_location.GetRank.GetNameWithNoTooltip] [conquered_location.GetName] був вирваний з лап #ONCLICK:COUNTRY,[loser.Custom('CL_tt')] #TOOLTIP:COUNTRY,[loser.Custom('CL_tt')],X [loser.Custom('CL_GEN')|L]#!#! та повернений у лоно #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!. [hre_ruler.GetName] [Select_CString(hre_ruler.IsFemale,'наділила', 'наділив')] нас усією повнотою влади над звільненими землями."
  hre.950.a: "Все йде за планом."
  hre.6.title: "Заснування постійного райхстагу"
  hre.6.desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священна Римська Імперія#!#! ухвалила закон про постійне місце проведення засідань райхстагу. Спершу вони відбуватимуться в [diet_location.Custom('LR_PREP')|l] [diet_location.GetName]."
  hre.6.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.7.title: "Постійний райхстаг у [diet_location.Custom('LR_PREP')|l] [diet_location.GetName]"
  hre.7.desc: "Починаючи з сьогоднішнього дня імперський райхстаг постійно засідатиме в [diet_location.Custom('LR_PREP')|l] [diet_location.GetName], а не скликатиметься в особливих випадках, як раніше. Цей крок безсумнівно підвищить згуртованість імперії та допоможе узаконити відносини між [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператрицею', 'імператором')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#! та князями. З іншого боку, таке рішення зробить [diet_location.Custom('LR_ACC')|l] [diet_location.GetName] першочерговою ціллю для охочих завдати шкоди імперії…"
  hre.7.a: "В ім'я миру та порядку в Імперії!"
  hre.15.title: "[GetInternationalOrganizationType('hre').GetNameWithNoTooltip] зазнає краху"
  hre.15.desc: "Після падіння міста [old_emperor.GetCapital.GetName] [old_emperor_ruler.GetName|l] [old_emperor_ruler.IsFemale,'була змушена', 'був змушений')] визнати свою повну поразку у війні проти #ONCLICK:COUNTRY,[hre_destroyer.Custom('CL_tt')] #TOOLTIP:COUNTRY,[hre_destroyer.Custom('CL_tt')],X [hre_destroyer.Custom('CL_GEN')|L]#!#!. У [GetCurrentYear] році колись [old_emperor_ruler.GetGovernment.GetRuler.IsFemale,'шанована', 'шанований')] [old_emperor.GetGovernment.GetRulerTitle|l] [Select_CString(old_emperor_ruler.IsFemale,'підписала', 'підписав')] зречення від престолу #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!, а також [Select_CString(old_emperor_ruler.IsFemale,'звільнила', 'звільнив')] усі імперські країни та чиновників від клятв і зобов'язань перед імперією.\n\nСвященної Римської Імперії більше немає, а [hre_destroyer_ruler.GetName] назавжди залишиться в пам'яті людей як її [Select_CString(hre_destroyer_ruler.IsFemale,'руйнівниця', 'руйнівник')]."
  hre.15.a: "Імперія нарешті знайшла свій довгоочікуваний спокій."
  hre.800.title: "Імперська коронація"
  hre.800.desc: "Ми посіли трон #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської Імперії#!#!! Після коронації нам відійшли імперські регалії, що підтверджують легітимність нашого правління."
  hre.800.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hre.801.title: "Смерть [Select_CString(GetUniqueInternationalOrganization('hre').GetLeaderCountry.Ruler.IsFemale,'імператриці', 'імператора')]"
  hre.801.desc: "[previous_emperor.GetName] нещодавно [Select_CString(previous_emperor.IsFemale, 'відійшла', 'відійшов' )] у світ інший, і тепер #TOOLTIP:SPECIAL_STATUS,elector,X #L князю-виборщику#!#! та #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архієпископу-виборщику#!#! належить на зборах колегії визначити, хто стане наступним претендентом на імперський престол."
  hre.801.a: "Який сумний день!"
  hre_the_emperor_is_dead_tt: "У #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! після виборів знову з'явиться [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]!"