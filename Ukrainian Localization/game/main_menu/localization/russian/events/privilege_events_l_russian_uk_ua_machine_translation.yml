l_russian:
  privilege_events.100.title: "Запрошення німецьких поселенців"
  privilege_events.100.desc: "Через чуму та війну наша країна практично знелюдніла, а нечисленні вцілілі селяни розкидані по обширних володіннях, через що досить складно виконувати будь-які роботи, що вимагають залучення величезної кількості робочих рук, таких як збір врожаю або розчищення нових земель.\n\nМи можемо запросити нових поселенців та ремісників з німецьких земель і побудувати нові міста в наших володіннях, надавши їм допомогу та особливі привілеї, наприклад право на управління за власними законами та нижчі податки."
  privilege_events.100.desc.kulm_law: "Життя в густонаселеній провінції [german_province.GetName] не кожному здасться привабливим: тут постійно йде суперництво за місце під сонцем. Саме тому багато місцевих жителів, а заодно мешканці навколишніх земель прагнуть перебратися в іншу провінцію під назвою [target_province.GetName]. Тут вони шукають кращої долі, в чому їм допомагають щедрі привілеї, в тому числі — #TOOLTIP:ESTATE_PRIVILEGE,kulm_law,X #L кульмське право#!#!."
  privilege_events.100.a: "Привітаємо поселенців."
  privilege_events.100.b: "Допоможемо їм облаштуватися на новому місці."
  privilege_events.100.c: "У нас і без того достатньо іноземців."
  privilege_events.100.d: "Нам більше не вдається знайти охочих мігрувати."
  enough_migrants_tt: "Достатньо мігрантів"
  not_enough_migrants_tt: "Більше немає мігрантів"
  privilege_events.101.title: "Міграція до провінції [target_province.GetNameWithNoTooltip]"
  privilege_events.101.desc: "Привілеї [migration_destination_country.Custom('longname_ua_GEN')] спонукали багатьох мешканців провінції [scope_german_location.GetProvinceDefinition.GetName] покинути свої родини в надії знайти кращу долю в провінції [target_province.GetName]. І хоча наші закони не забороняють переселятися подібним чином, все-таки слід бути обережними: якщо так триватиме, деякі провінції можуть просто спорожніти."
  privilege_events.101.a: "Невже нічого не можна вдіяти?"
  privilege_events.101.tt: "Ця [Concept('event', 'подія')|e] почалася через те, що провінція [german_province.GetName] відповідає наступним умовам:\n[ShowTriggerConditionsForScope('privilege_events_100_is_in_bad_shape', SCOPE.sProvince('german_province').GetProvince.MakeScope.Self)]"
  privilege_events.110.title: "Нова висхідна родина для Золотої книги"
  privilege_events.110.desc: "Нещодавно розбагатіла родина [target_dynasty.GetName] стала дуже впливовою у себе на батьківщині в [location_scope.Custom('LR_PREP')] [location_scope.GetName], однак їхнє худорідне походження є перешкодою на шляху до здобуття реальної влади над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!.\n\nВони відправили посланця до нашого двору з проханням включити їхню родину до #italic Libro d’Oro, або «Золотої книги»#!, тобто визнати в #italic аристократичній гідності#! на території [ROOT.GetCountry.Custom('CL_GEN')].\n\nОднак подібне визнання, безсумнівно, викличе невдоволення інших представників еліти — [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] будуть розлючені. А тим часом родина [target_dynasty.GetNameWithNoTooltip] також надіслала велику скриню золота, яка має допомогти нам у прийнятті рішення."
  privilege_events.110.a: "Приймемо скриню і запросимо одного з членів родини до двору."
  privilege_events.110.b: "Проженемо цих худорідних вискочок."