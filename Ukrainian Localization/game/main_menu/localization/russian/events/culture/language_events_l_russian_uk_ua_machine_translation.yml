l_russian:
  language.1.title: "Мова ворога"
  language.1.desc: "Оскільки [enemy_country.GetLongName] — наш військовий ворог, використання #L [enemy_dialect.GetLanguage.GetName|l]ої#! мови при дворі викликає у декого подив. Радники пропонують якнайшвидше вирішити це питання."
  language.1.a: "Затвердимо нашу рідну мову як офіційну."
  language.1.a.subject: "Наші [Concept('subjects', 'васали')|e] можуть наслідувати наш приклад."
  language.1.b: "Будемо користуватися нашою літургійною мовою."
  language.1.c: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] говорить [ruler_language.GetNameWithNoTooltip|l]ою мовою — нехай вона і буде офіційною."
  language.1.d: "Ми говорили [enemy_dialect.GetNameWithNoTooltip|l]ою ще задовго до війни."
  language.1.e: "У своїй роботі чиновники повинні використовувати мову священних текстів."
  language.2.title: "$language.1.title$"
  language.2.desc: "Оскільки [enemy_country.GetLongName] — військовий ворог нашого сюзерена, використання #L [enemy_dialect.GetName|l]ого#! діалекту у них при дворі викликає у декого подив.\n\nСхоже, тепер вони вирішили зробити #L [new_language.GetName|l]у#! своєю придворною мовою. Чи варто нам наслідувати їхній приклад?"
  language.2.a: "Ми теж затвердимо [common_dialect.GetNameWithNoTooltip|l]у як офіційну мову."
  language.2.b: "Ми теж будемо використовувати [new_language.GetNameWithNoTooltip|l]у мову."
  language.2.c: "Замість цього ми почнемо використовувати [common_dialect.GetNameWithNoTooltip]ий діалект."
  language.2.d: "[enemy_dialect.GetNameWithNoTooltip]ий нас влаштовує, ми не будемо від нього відмовлятися."
  language.10.title: "[country.GetGovernment.GetRulerTitle] і мова"
  language.10.desc: "На черговому засіданні ради стало зрозуміло, що [ruler.GetShortName] не в змозі нормально працювати при дворі.\n\nОскільки [ruler.GetShortName] [Select_CString(ruler.IsFemale,'виросла', 'виріс')] у #L [ruler_culture.GetName|l]ій#! родині, [Select_CString(ruler.IsFemale,'вона', 'він')] досить погано володіє #L [court_language.GetName|l]ою#! мовою. Оточуючі насилу терплять [Select_CString(ruler.IsFemale,'її', 'його')] грубий акцент, а деякі й зовсім вважають, що [Select_CString(ruler.IsFemale,'їй', 'йому')] не місце при [court_language.GetNameWithNoTooltip|l]ому дворі."
  language.10.a: "[ruler.GetShortName] говорить [ruler_language.GetNameWithNoTooltip|l]ою мовою — нехай вона і буде офіційною."
  language.10.b: "Якщо [Select_CString(ruler.IsFemale,'вона', 'він')] чогось не розуміє, так навіть краще…"
  language.20.title: "Акт про судочинство [common_language.GetNameWithNoTooltip|l]ою"
  language.20.desc: "Простий #L [primary_culture.GetName|l]ий#! народ не розуміє #L [court_language.GetName|l]ої#! мови, якою ведуться засідання в наших судах.\n\nВсе частіше лунають заклики користуватися при судочинстві #L [common_language.GetName|l]ою#! мовою, щоб люди могли вільно подавати скарги та вислуховувати рішення суддів."
  language.20.desc_ENG: "З моменту нормандського завоювання 1066 року всі засідання в наших судах ведуться #L [court_language.GetName|l]ою#! мовою, якої простий #L [primary_culture.GetName|l]ий#! народ не розуміє.\n\nВсе частіше лунають заклики користуватися при судочинстві #L [common_language.GetName|l]ою#! мовою, щоб люди могли вільно подавати скарги та вислуховувати рішення суддів."
  language.20.desc_IRE: "[ireland_region.GetName] перейняла #L [court_language.GetName|l]у#! мову після нормандського вторгнення. З тих пір #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдалося позбутися прямого #L [norman_culture.GetName|l]ого#! впливу, і тепер у містах та замках засідають #L [primary_culture.GetName|l]і#! судді.\n\nОднак всі засідання в наших судах досі ведуться [court_language.GetNameWithNoTooltip|l]ою мовою, якої простий люд не розуміє.\n\nВсе частіше лунають заклики користуватися при судочинстві #L [common_language.GetName|l]ою#! мовою, щоб люди могли вільно подавати скарги та вислуховувати рішення суддів."
  language.20.a: "Заборонимо чиновникам користуватися [court_language.GetNameWithNoTooltip|l]ою мовою."
  language.20.b: "Дозволимо [common_language.GetNameWithNoTooltip|l]у мову в судах загальних тяжб."
  language.20.c: "Залишимо [court_language.GetNameWithNoTooltip|l]у як юридичну мову."