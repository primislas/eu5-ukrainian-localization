l_russian:
  cultural_event.1.title: "Комедія дель арте"
  cultural_event.1.desc: "Слухайте всі! Арлекін, Панталоне та інші класичні персонажі комедії дель арте вже готові виступати перед нічого не підозрюючою публікою та розважати її своїми трюками та гримасами. Добра комедія змусить навіть найпохмурішу людину на деякий час забути про тяготи та турботи цього непростого життя. Та й взагалі, це досить весело!"
  cultural_event.1.a: "Ми готові це організувати!"
  cultural_event.1.b: "Безглузда трата часу."
  cultural_event.2.title: "Свобода, рівність, братерство"
  cultural_event.2.desc: "Ідеї просвітництва поширюються світом, немов смолоскип освітлюючи найглухіші куточки Старого та Нового Світу. Підтримка цього руху безсумнівно призведе до розвитку науки та філософії, однак ідеї свободи та прав людини можуть спровокувати небажані бунтівні настрої серед нашого народу."
  cultural_event.2.a: "Подивимося, що нам може запропонувати Просвітництво!"
  cultural_event.2.b: "Ні, не варто ризикувати заворушеннями."
  cultural_event.3.title: "Посланець з [GetCountry('BYZ').Custom('CL_GEN')]"
  cultural_event.3.desc: "Захисники #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_GEN')|L]#!#! впали під натиском ворога. Разом з ними впав Константинополь — останній оплот Римської Імперії. Поки християнський світ оговтується від потрясіння, [GetCountry('BYZ').GetAdjectiveWithNoTooltip|l]і біженці стікаються в #TOOLTIP:CONTINENT,europe,X #L європейські#!#! міста, привозячи з собою старі рукописи з давніми знаннями, в тому числі праці Аристотеля, Платона та Галена. Крім того, вони чудово володіють #TOOLTIP:LANGUAGE,latin_language,X #L латинською#!#! та #TOOLTIP:LANGUAGE,greek_language,X #L грецькою#!#! мовами.\n\nЗапросивши їх на територію #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, ми зможемо помітно підштовхнути розвиток культури та науки власної країни."
  cultural_event.3.a: "Ми з радістю їх приймемо!"
  cultural_event.3.b: "Ні, ми не зможемо їх утримувати."
  cultural_event.4.title: "Підтримка флорентійської школи"
  cultural_event.4.desc: "Завдяки відомості нашої країни ми можемо підтримати #TOOLTIP:CULTUREGROUP,italian_group,X #L італійських#!#! художників флорентійської школи. Образ покровителів міжнародного мистецтва, безсумнівно, прихилить народ до нас."
  cultural_event.4.a: "Ми підтримаємо цей напрямок філософії."
  cultural_event.4.b: "У нас вистачає інших турбот."
  cultural_event.5.title: "Останній лицарський турнір"
  cultural_event.5.desc: "У повітрі витає вітер змін. Скоро наша елітна кавалерія стане пережитком минулого. Лицарські традиції зникають під натиском часу. Світ змінюється, але у нас ще є остання можливість побачити, як #L [ROOT.GetCountry.GetAdjective|l]і#! вершники сходяться в поєдинку!"
  cultural_event.5.a: "Насолодимося видовищем!"
  cultural_event.5.b: "Ні, треба пристосовуватися до нової доби."
  cultural_event.6.title: "Створення гільдії Святого Луки"
  cultural_event.6.desc: "По всій #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західній Європі#!#! сьогодні виникають гільдії художників, названі ім'ям Святого Луки, покровителя мистецтв. Подібну гільдію можна заснувати і на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! — це коштуватиме чималих грошей, але призведе до помітного підйому культури. Розвиток апарату гільдії також сприятиме зміцненню наших бюрократичних традицій."
  cultural_event.6.a: "Ми підтримаємо цей напрямок філософії."
  cultural_event.6.b: "Ні, нам це не по кишені."
  cultural_event.7.title: "[target_location.GetNameWithNoTooltip]: золотий вік живопису"
  cultural_event.7.desc: "Жителі [target_location.Custom('LR_GEN')|l] [target_location.GetName] нещодавно прийняли нову віру — [ROOT.GetCountry.GetReligion.GetName|l]. Сильні гуманістичні настрої, що панують у країні, втім, зберігаються тут і сьогодні та вже заклали основу для відходу від усталених художніх традицій та ідеалів старої #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Завдяки величезним доходам від торгівлі, які приносить [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip], ми зможемо проголосити золотий вік живопису!"
  cultural_event.7.a: "Ну звісно! Підтримаємо мистецтво!"
  cultural_event.7.b: "У нас вистачає інших турбот."
  cultural_event.8.title: "$STATIC_MODIFIER_NAME_diwani_script$"
  cultural_event.8.desc: "$STATIC_MODIFIER_NAME_diwani_script$ — каліграфічний стиль #TOOLTIP:LANGUAGE,arabic_language,X #L арабського#!#! письма, призначений для монарших указів. Якщо слово згори — [ROOT.GetCountry.GetReligion.GetGodName] нам у свідки — і укази будуть записуватися писцями, що володіють мистецтвом каліграфії, наша влада стане лише міцнішою."
  cultural_event.8.a: "Ми вивчимо цей стиль."
  cultural_event.8.b: "Це не заслуговує нашої уваги."
  cultural_event.9.title: "Шлях чаю"
  cultural_event.9.desc: "#TOOLTIP:GOODS,tea,X #L Чай#!#! в #TOOLTIP:REGION,japan_region,X #L Японії#!#! вирощують вже багато століть, однак лише нещодавно там було винайдено особливу чайну церемонію, відому як #italic тя но-ю#!, або «шлях чаю». Вона поєднує в собі елементи релігійних обрядів та народних традицій, а тому може стати невід'ємною частиною нашої культури… якщо ми захочемо її дотримуватися."
  cultural_event.9.a: "Ми запозичимо цей ритуал."
  cultural_event.10.title: "Підтримка філософії Відродження"
  cultural_event.10.desc: "Останнім часом все більш поширеними стають філософські течії, що вихваляють силу людського духу та стверджують, що людина здатна на великі звершення. Якщо ми підтримаємо ідеї гуманізму, то велика ймовірність, що наш народ почне прагнути нових висот, у тому числі у творчості та праці, але одночасно з цим — ставити під сумнів нашу владу."
  cultural_event.10.a: "Підтримаємо цю філософію."
  cultural_event.10.b: "У нас вистачає інших турбот."
  cultural_event.11.title: "[ShowModifierWithNoTooltip('south_german_organ_tradition')]"
  cultural_event.11.desc: "Органісти з #TOOLTIP:REGION,south_german_region,X #L Південної Німеччини#!#!, що навчаються під наставництвом #TOOLTIP:CULTUREGROUP,italian_group,X #L італійських#!#! майстрів, виробили власний неповторний стиль з імпровізованими прелюдіями, чаконами та пасакальями. Якщо підтримати це починання, новий стиль цілком може перетворитися на шановану музичну та культурну традицію."
  cultural_event.11.a: "Ми підтримаємо цей напрямок філософії."
  cultural_event.11.b: "У нас вистачає інших турбот."
  cultural_event.12.title: "Підтримка музики бароко"
  cultural_event.12.desc: "Неможливо точно сказати (і навіть уявити), скільки талановитих людей кинуло свої захоплення через відсутність грошей та підтримки. Однак якщо ми допоможемо невизнаним композиторам #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, надавши їм покровительство, то вони, в свою чергу, згодом допоможуть вже нам."
  cultural_event.12.a: "Ми підтримаємо цей напрямок філософії."
  cultural_event.12.b: "У нас вистачає інших турбот."
  cultural_event.13.title: "Народна легенда"
  cultural_event.13.desc: "У народі ходять різні легенди та історії про людину на ім'я [SCOPE.sCharacter('target_character').GetName]. Кажуть, коли на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! настануть важкі часи, [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'вона', 'він' )] повернеться і позбавить країну від зла. Яким би правдивим чи безглуздим не був цей міф, його можна взяти собі на озброєння, щоб вселити народу надію і заодно зміцнити власну легітимність."
  cultural_event.13.a: "Так, народу іноді потрібна гарна байка."
  cultural_event.13.b: "Не варто відволікати людей різними казками."
  cultural_event.14.t: "Зростаючий університет [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  cultural_event.14.desc: "#TOOLTIP:BUILDING_TYPE,university,X #L Університет#!#! в [target_location.Custom('LR_PREP')|l] [target_location.GetName] постійно розвивається і вимагає все більшого фінансування. Ми спостерігаємо розквіт схоластики та гуманізму, а також відродження інтересу до класичних текстів та праць. Вивчення всього цього обходиться вельми недешево!\n\nКерівництво університету запропонувало відправити одного зі своїх найкращих викладачів на службу країні в обмін на матеріальну підтримку, яка дозволить вченим продовжувати свої дослідження. Звісно, для цього потрібні великі кошти, але, як відомо, знання безцінні. Крім того, досвідчений викладач може добре послужити раді…"
  cultural_event.14.a: "Хіба ми відмовимо допитливим умам у отриманні знань?"
  cultural_event.14.b: "Потрібно відмовитися від фінансування університету."