l_russian:
 culture_greek.1.title: "[target_character.GetNameWithNoTooltip] выдвигает обвинения"
 culture_greek.1.desc: "Наша репутация благочестивой #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ой#! державы хорошо известна соседям, однако внутри патриархата, похоже, назревают проблемы.\n\n[target_character.GetName] [Select_CString(target_character.IsFemale, 'заявила', 'заявил' )], что [target_character2.GetName] открыто пренебрегает своими религиозными обязанностями. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] нередко жалуются на дурное обращение с [Select_CString(target_character2.IsFemale, 'её', 'его' )] стороны, [target_character2.GetSheHe] неподобающе ведёт себя во время богослужений, да и в целом не уважает [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ие религиозные традиции нашей страны.\n\nМногие находят эти обвинения несколько преувеличенными, но ни для кого не секрет, что [target_character2.GetNameWithNoTooltip] ставит себя выше любых церковных установлений и демонстрирует к ним крайнее безразличие. Не удивительно, что часть наших #L [ROOT.GetCountry.GetReligion.GetAdjective|l]их#! подданных считает, что [target_character2.GetSheHe] [Select_CString(target_character2.IsFemale, 'недостойная', 'недостойный' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
 culture_greek.1.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U] не знают, о чём говорят!"
 culture_greek.1.b: "Пожалуй, [target_character2.GetNameWithNoTooltip] [Select_CString(target_character2.IsFemale, 'должна', 'должен' )] вести себя сдержаннее."
 culture_greek.1.c: "[target_character2.GetNameWithNoTooltip] — [Select_CString(target_character2.IsFemale, 'легитимная', 'легитимный' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], и это не обсуждается!"
 culture_greek.1.d: "Публичное выступление успокоит недовольных."
 culture_greek.2.title: "[target_character2.GetNameWithNoTooltip] получает благословение патриарха"
 culture_greek.2.desc: "[target_character2.GetName] [Select_CString(target_character2.IsFemale, 'превратила', 'превратил' )] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! в высокоразвитую и прекрасно организованную державу, и [target_character.GetName] [Select_CString(target_character.IsFemale, 'изъявила', 'изъявил' )] желание побольше узнать о [Select_CString(target_character2.IsFemale, 'её', 'его' )] методах управления. Прибыв в [target_capital.Custom('LR_ACC')|l] [target_capital.GetName], [target_character.GetSheHe] [Select_CString(target_character.IsFemale, 'была поражена', 'был поражён' )] тем, как много внимания здесь уделяется фундаментальным основам #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ой#! веры. Местные монастыри содержатся в прекрасном состоянии, [ROOT.GetCountry.GetGovernment.GetGovernmentType.GetName|l] не жалеет средств на их украшение. Вдоль дорог выстроены бесчисленные мраморные кандилакии, напоминающие о чудесном спасении от бедствий или об ушедших близких.\n\nПрибыв ко двору, [target_character.GetNameWithNoTooltip] отмечает, что многие придворные наизусть знают Святое Писание и часто молятся перед иконами Спасителя, а в покоях, где [target_character2.GetNameWithNoTooltip] обсуждает государственные дела, витает запах ладана."
 culture_greek.2.a: "Патриарх точно даст нам своё благословение."
 culture_greek.2.b: "Одного благословения мало. [target_location.GetRank.GetName] [target_capital.GetNameWithNoTooltip] должен стать ещё краше!"
 culture_greek.3.title: "Реформация [target_country.Custom('end_predlog_vvo')] [target_country.Custom('CL_PREP')]"
 culture_greek.3.desc: "#TOOLTIP:CONTINENT,europe,X #L Европу#!#! захлестнула волна Реформации, и [target_character.GetName] со своими сторонниками всё чаще говорит о необходимости установить дипломатические отношения с протестантскими державами — например, [target_country.Custom('end_predlog_sso')] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!.\n\nОчевидно, что [papal_capital.GetName] — наш общий враг. Как и мы, [target_country.GetAdjectiveWithNoTooltip|l]ие [target_country.GetGovernment.GetEstateName('crown_estate')|l] стремятся избавиться от пороков #TOOLTIP:RELIGION,$catholic_tt$,X #L католичества#!#! и править без оглядки на папу. Тем не менее между нашими доктринами остаются серьёзные разногласия — последствия векового католического владычества, которые наш [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] находит неприемлемыми."
 culture_greek.3.a: "Враг моего врага — мой друг."
 culture_greek.3.b: "Мы не нуждаемся в помощи еретиков."
 culture_greek.3.c: "[target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale, 'выставила', 'выставил' )] нас идиотами!"
 culture_greek.4.title: "Кто же такие «греки»?"
 culture_greek.4.desc: "Подъём абсолютизма, а также формирование новых представлений о государстве и народе кардинально изменили наше мышление. Прежде мы почти не задумывались о подобном, ведь основой национальной культуры издавна считалась религия. Но теперь, когда даже среди простолюдинов появились свои выдающиеся мыслители, в образованных кругах всё чаще задаются одним вопросом: кто же такие «греки»?\n\nНекоторые убеждены, что характерная для языка #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! диглоссия способствует сохранению глубочайшей пропасти, разделяющей различные слои нашего общества. Действительно, чиновники и [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] с одной стороны и [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] с другой ничем не похожи друг на друга, у них совершенно разные обычаи, а разговаривают они на разных диалектах.\n\nПодобная ситуация вызывает нарастающее недовольство. Люди требуют перемен, они жаждут преодолеть этот разрыв и прийти к подлинному национальному единству."
 culture_greek.4.a: "Медленно, но верно мы объединим всех своих подданных."
 culture_greek.4.b: "Подобные перемены дестабилизируют существующую социальную иерархию."
 culture_greek.4.c: "Нет никаких культурных различий — всё это лишь вариации одной культуры."
 greek_culture_greek_peasants_will_gain_satisfaction: "Все [Concept('pops', 'группы населения')|e] #TOOLTIP:CULTUREGROUP,greek_group,X #L эллинской#!#! [Concept('culture', 'культуры')|e] вне [Concept('rural_locations', 'сельских районов')|e], которые являются #TOOLTIP:POPTYPE,peasants,X #L крестьянами#!#! или #TOOLTIP:POPTYPE,laborers,X #L рабочими#!#!, получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.5.title: "[target_character.GetNameWithNoTooltip] и [Select_CString(target_character.IsFemale,'её', 'его')] карьерный рост"
 culture_greek.5.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'одержала', 'одержал')] множество славных побед — достаточно вспомнить такие места сражений, как [victory_location1.GetName] или [victory_location2.GetName]. В глазах народа [target_character.GetSheHe] блестящий стратиг, верный меч Господа, [Select_CString(target_character.IsFemale, 'победительница', 'победитель' )] врагов #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale, 'которую', 'которого' )] [Select_CString(target_character2.IsFemale, 'благословила сама', 'благословил сам' )] [target_character2.GetName].\n\nМногие влиятельные члены двора также испытывают к [Select_CString(target_character.IsFemale,'ней', 'нему')] огромное уважение и увлечённо слушают рассказы о [Select_CString(target_character.IsFemale,'её', 'его')] последней победе при [victory_location3.Custom('LR_PREP')|l] [victory_location3.GetName]. [target_character2.GetName] изрядно [Select_CString(target_character2.IsFemale, 'встревожена', 'встревожен' )] тем, каким влиянием [target_character.GetNameWithNoTooltip] обладает при дворе. С другой стороны, можно обратить [Select_CString(target_character.IsFemale,'её', 'его')] популярность на пользу династии [target_character2.GetDynasty.GetName] и укрепить её власть над [ROOT.GetCountry.Custom('CL_INST')]."
 culture_greek.5.a: "Нам нужно больше героев, подобных [Select_CString(target_character.IsFemale, 'ей', 'ему' )]."
 culture_greek.5.b: "[target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'стала слишком влиятельна', 'стал слишком влиятелен' )]. Надо бы подрезать [Select_CString(target_character.IsFemale, 'ей', 'ему' )] крылья…"
 culture_greek.5.c: "Будем держать [Select_CString(target_character.IsFemale, 'её', 'его' )] #italic поближе#! к нам, но ни на шаг не подпускать к политике."
 greek_culture_strategos_will_never_be_able_to_influence_politics: "Утратив возможность влиять на [Concept('courtiers', 'придворных')|e], [target_character.GetName] никогда не посмеет свергнуть нашу власть"
 greek_culture_strategos_will_never_get_the_opportunity_to_coup: "Не имея никакой возможности влиять на [Concept('courtiers', 'придворных')|e], [target_character.GetName] никогда не сможет организовать переворот"
 culture_greek.6.title: "Народный стратиг"
 culture_greek.6.desc: "Когда прославленный стратиг [target_character.GetName] в сопровождении личной стражи проходит по улицам [target_capital.Custom('LR_GEN')|l] [target_capital.GetName], вокруг собираются целые толпы желающих увидеть [Select_CString(target_character.IsFemale, 'её', 'его' )] своими глазами.\n\n[ROOT.GetCountry.GetGovernment.GetEstateName('commoners_estate')|U], [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] и [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] хором скандируют [Select_CString(target_character.IsFemale, 'её', 'его' )] имя: «[target_character.GetShortNameWithNoTooltip]! [target_character.GetShortNameWithNoTooltip]! [target_character.GetShortNameWithNoTooltip]!». Но среди шума толпы слышны и другие голоса — кое-кто шепчется, что из [Select_CString(target_character.IsFemale, 'неё', 'него' )] мог бы получиться выдающийся правитель, более справедливый и чуткий к нуждам подданных. Эти разговоры уже известны придворным, что лишний раз свидетельствует, каким влиянием обладает [target_character.GetNameWithNoTooltip]."
 culture_greek.6.a: "[target_character.GetNameWithNoTooltip] заслуживает уважения, это признают даже [Select_CString(target_character.IsFemale, 'её', 'его' )] соперники."
 culture_greek.6.b: "Надо заставить толпу умолкнуть, пока всё это не зашло слишком далеко."
 greek_culture_all_capital_pops_gain_pop_satisfaction: "Все [Concept('pops', 'группы населения')|e] в [target_capital.Custom('LR_PREP')|l] [target_capital.GetName] получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 greek_culture_prevent_coup_for_two_year: "Если [target_character.GetName] [Select_CString(target_character.IsFemale, 'задумывала', 'задумывал' )] переворот, [target_character.GerHerHis] планы будут отложены на #y 2#! года"
 culture_greek.7.title: "[target_character.GetNameWithNoTooltip] устраивает переворот"
 culture_greek.7.desc: "Потратив несколько месяцев на составление планов, привлечение сторонников, подрыв влияния противников и подготовку войск, [target_character.GetName] наконец [Select_CString(target_character.IsFemale, 'готова', 'готов' )] сделать ход.\n\n[target_character.GetSheHe|U] [Select_CString(target_character.IsFemale, 'подошла', 'подошёл' )] к стенам [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetName] во главе войска, требуя, чтобы [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'отреклась', 'отрёкся' )] от #L [ROOT.GetCountry.GetAdjective|l]ого#! престола. [target_character.GetShortName] [Select_CString(target_character.IsFemale, 'уверена', 'уверен' )] в своём праве претендовать на власть над [ROOT.GetCountry.Custom('CL_INST')] и считает себя более способным и справедливым государем, чем [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'правящая', 'правящий' )] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
 culture_greek.7.a: "Страна в упадке, ей нужны новые лидеры."
 culture_greek.7.b: "[target_character2.GetShortNameWithNoTooltip] не отречётся без борьбы!"
 culture_greek.7.c: "[target_character.GetShortNameWithNoTooltip] ничего не знает о легитимности власти!"
 culture_greek.7.d: "[Select_CString(target_character.IsFemale, 'Её', 'Его' )] придётся изгнать за попытку переворота."
 greek_culture_weaker_due_to_righteous_trait: "[Concept('rebels', 'Мятежники')|e] будут значительно слабее."
 culture_greek.8.title: "Шпионы в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.8.desc: "Стражники [target_location.Custom('LR_GEN')|l] [target_location.GetName] недавно разоблачили группу шпионов, которые пытались добраться до самых сокровенных тайн #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, включая технологию изготовления греческого огня и иные наши достижения, представляющие интерес для других держав.\n\nЛазутчики не сказали, на кого работают, однако признались, что шпионили за нами уже несколько месяцев, собирая сведения в каждом трактире и каждой церкви. Сейчас они гниют в темнице, молясь о том, чтобы хозяева вытащили их из заключения. Возможно, будет полезнее завербовать их к нам на службу…"
 culture_greek.8.a: "Эти шпионы могут быть полезны двору."
 culture_greek.8.b: "Пусть и дальше томятся в клетке. Выявите все шпионские сети в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]!"
 culture_greek.8.c: "Возможно, они помогут нам раскрыть другие шпионские сети в [target_location.Custom('LR_PREP')|l]…"
 every_country_with_spy_network_on_us_will_lose_25_network: "Каждая известная [Concept('country', 'держава')|e], у которой в [target_location.Custom('LR_PREP')|l] есть [Concept('spy_network', 'шпионская сеть')|e] размером не менее #Y 15#! ед., получит #R −25#! к [Concept('spy_network', 'шпионской сети')|e]"
 culture_greek.9.title: "Хрисовул [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.9.desc: "В последнее время на рынках #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] доминируют #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянские#!#! торговые интересы. Деньги буквально уплывают из наших рук — местные жители согласны вести дела только с купцами из #TOOLTIP:REGION,italy_region,X #L Италии#!#!. Конечно, в этом есть и некоторые преимущества: перед страной открылась неплохая возможность для сбыта товаров, пусть и не на самых выгодных условиях. С другой стороны, чрезмерная зависимость от итальянских торговцев может привести к тому, что [target_character.GetName] утратит немалую долю своего авторитета."
 culture_greek.9.a: "Они могут рассчитывать на любые привилегии, пока их деятельность приносит нам золото."
 culture_greek.9.b: "Если они хотят выкачать из [target_location.Custom('LR_GEN')|l] все богатства, пусть платят дополнительные пошлины."
 culture_greek.9.c: "Мы дадим им привилегии — но только такие, от которых не будет реальной пользы."
 culture_greek.9.d: "Если придётся защищать их интересы новыми законами, нужно составить их наиболее эффективно."
 all_italian_pops_become_happier: "Все [Concept('pops', 'группы населения')|e] из числа #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянских#!#! #TOOLTIP:POPTYPE,burghers,X #L горожан#!#! получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 all_italian_pops_become_angrier: "Все [Concept('pops', 'группы населения')|e] из числа #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянских#!#! #TOOLTIP:POPTYPE,burghers,X #L горожан#!#! получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.10.title: "В [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] подрастает новое поколение"
 culture_greek.10.desc: "Новое поколение образованной молодёжи всё громче заявляет о себе на фоне укоренившейся бюрократии и повального взяточничества в среде государственных служащих. Они стремятся покончить с мздоимством, заменив устаревшие практики прежних чиновников современными методами управления. Эти нововведения способны преобразить сложившиеся бюрократические структуры, поставив их на службу государству и народу.\n\nБез сомнений, подобная реформа резко повысит эффективность органов управления, однако существующий чиновничий аппарат не готов расстаться с властью и влиянием. Опасаясь за своё положение, старые бюрократы решительно сопротивляются реформам и даже подкупают отдельных представителей молодёжи, чтобы заставить их молчать."
 culture_greek.10.a: "Эта молодёжь — будущее нашей страны."
 culture_greek.10.b: "В таких вопросах лучше довериться людям с опытом."
 culture_greek.11.title: "Чужая речь"
 culture_greek.11.desc: "Язык Рима утратил значительную долю своего влияния при восточном дворе, ведь мы решили придерживаться наших славных #TOOLTIP:CULTUREGROUP,greek_group,X #L эллинских#!#! корней. Тем не менее некоторые [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] достаточно образованны, чтобы свободно цитировать #TOOLTIP:LANGUAGE,latin_language,X #L латинские#!#! высказывания.\n\n«Pro bono», — говорит придворным [target_character.GetName]. Те недоумённо хлопают глазами, и [Select_CString(target_character.IsFemale, 'ей', 'ему' )] приходится объяснять значение и происхождение этих слов. Наиболее консервативные среди аристократов высмеивают [Select_CString(target_character.IsFemale, 'её', 'его' )] любовь к чужеземным словечкам, другие же явно заинтригованы — им хочется узнать о латыни побольше. Кое-кто при дворе даже выступает за то, чтобы принять латинскую речь и популяризовать её применение в административном аппарате страны, возродив [ROOT.GetCountry.Custom('end_predlog_vvo')] [ROOT.GetCountry.Custom('CL_PREP')] античные римские традиции."
 culture_greek.11.a: "Зачем отказываться от нашей греческой природы?"
 culture_greek.11.b: "Распространение #TOOLTIP:LANGUAGE,latin_language,X #L латыни#!#! можно только приветствовать."
 culture_greek.11.c: "При дворе найдётся место для всех языков."
 culture_greek.12.title: "Призрак коррупции"
 culture_greek.12.desc: "Большинство ключевых постов [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! занимают достойные и способные люди, но отдельные детали государственного аппарата нередко дают сбой.\n\nВ ходе недавней проверки вскрылись весьма любопытные факты: по слухам, [target_character.GetName] раздаёт административные должности своим родственникам, знакомым и даже тем, кто готов [Select_CString(target_character.IsFemale, 'ей', 'ему' )] заплатить. Когда об этом [Select_CString(target_character2.IsFemale, 'прознала', 'прознал' )] [target_character2.GetName], информацию поспешили списать на предвзятое отношение проверяющих, с которыми [target_character.GetNameWithNoTooltip] давно враждует.\n\nТем не менее есть смысл вмешаться в скандал и напомнить тем, кто использует свою должность в корыстных интересах, что подобные проступки не останутся без последствий."
 culture_greek.12.a: "Если выгнать коррумпированных чиновников, у нас вообще никого не останется."
 culture_greek.12.b: "[target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'сделала', 'сделал' )] свой выбор, пусть живёт с его последствиями."
 culture_greek.12.c: "Мы выжжем коррупцию калёным железом!"
 culture_greek.12.d: "Думаю, мы… сумеем договориться."
 culture_greek.13.title: "Проблемная кефалия"
 culture_greek.13.desc: "Кефалия [target_area.GetName] уже многие годы переживает глубокий упадок. Её наместник, пребывающий в [target_location.Custom('LR_PREP')|l] [target_location.GetName], не справляется со своими обязанностями, а столичная администрация смотрит на это сквозь пальцы. Местные жители уклоняются от уплаты налогов, а некоторые [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] самовольно захватывают земли и жестоко эксплуатируют крестьянский труд. Как только доклад о тяжёлом положении кефалии дошёл до двора, многие вельможи сразу же ухватились за эту возможность. Они требуют, чтобы [target_character.GetName] [Select_CString(target_character.IsFemale, 'сместила', 'сместил' )] неэффективного губернатора и предлагают на его место себя или кого-то из своих родственников, заверяя, что справятся с этой задачей гораздо лучше. Столь радикальная мера правда может исправить положение, но нельзя исключать, что доля ответственности лежит и на нас. Если обеспечить наместника достаточными средствами, возможно, он сумеет обуздать непокорную знать и принудить простолюдинов к повиновению."
 culture_greek.13.a: "Видно, придётся сменить наместника."
 culture_greek.13.b: "Область [target_area.GetNameWithNoTooltip] страдает без нашего внимания. Пора оказать помощь её жителям."
 culture_greek.13.c: "Нет нужды менять власть — со временем всё придёт в норму."
 all_pops_in_kephale_area_lose_satisfaction: "Все [Concept('pops', 'группы населения')|e] в области [target_area.GetName] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 gain_extra_control_in_the_area: "Каждый принадлежащий нам [Concept('location', 'район')|e] в области [target_area.GetName] получит [ShowNamedValue('control_mild_bonus')|+=2%] к [Concept('control', 'контролю')|e]"
 lose_extra_control_in_the_area: "Каждый принадлежащий нам [Concept('location', 'район')|e] в области [target_area.GetName] получит [ShowNamedValue('control_mild_penalty')|+=2%] к [Concept('control', 'контролю')|e]"
 culture_greek.14.title: "[Select_CString(target_character.IsFemale, 'Рождённая', 'Рождённый' )] не в пурпуре"
 culture_greek.14.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'сумела', 'сумел' )] завладеть #L [ROOT.GetCountry.GetAdjective|l]им#! престолом, однако [Select_CString(target_character.IsFemale, 'ей', 'ему' )] определённо не достаёт легитимности. [Select_CString(target_character.IsFemale, 'Она не была рождена', 'Он не был рождён' )] в пурпуре, это ставит двор в неловкое и уязвимое положение. В народе говорят, что у [Select_CString(target_character.IsFemale, 'этой женщины', 'этого человека' )] нет царского достоинства; в [Select_CString(target_character.IsFemale, 'ней', 'нём' )] видят узурпатора, а не [Select_CString(target_character.IsFemale, 'законную правительницу', 'законного правителя' )]. Кое-кто даже вынашивает планы по преобразованию административного аппарата в интересах ближайших приближённых нового монарха."
 culture_greek.14.a: "Улучшить [Select_CString(target_character.IsFemale, 'её', 'его' )] репутацию несложно — надо лишь выделить достаточно средств."
 culture_greek.14.b: "С каких пор державы держатся на одном лишь престиже?"
 culture_greek.14.c: "Они хотят видеть царское достоинство? Что ж, они его увидят."
 culture_greek.15.title: "Спор между деспотами"
 culture_greek.15.desc: "Династия [target_character.GetDynasty.GetName] всегда проявляла редкое единодушие в своём стремлении к власти над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, но когда дело доходит до тонкостей управления страной, в семье нередко возникают разногласия. Так, [target_character.GetName] и [target_character2.GetName] спорят о том, какую роль в государстве следует отводить [ROOT.GetCountry.GetGovernment.GetAdjective|l]ому двору. [target_character.GetShortNameWithNoTooltip] утверждает, что вельмож следует держать на коротком поводке, не давая вассалам слишком много воли. [target_character2.GetShortNameWithNoTooltip], напротив, считает, что крупной державе выгоднее иметь относительно независимых вассалов, сохраняя непосредственный контроль лишь над отдельными стратегически важными анклавами."
 culture_greek.15.a: "[target_character.GetShortNameWithNoTooltip] высказывает дельные мысли."
 culture_greek.15.b: "То, что предлагает [target_character2.GetShortNameWithNoTooltip], звучит весьма разумно…"
 culture_greek.15.c: "Пора напомнить им, кто правит [ROOT.GetCountry.Custom('CL_INST')]."
 culture_greek.15.d: "[ROOT.GetCountry.GetGovernment.GetRuler.GetShortNameWithNoTooltip] знает лучше. Пусть поучатся у [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'неё', 'него' )]."
 culture_greek.16.title: "[target_character.GetNameWithNoTooltip] выступает при дворе"
 culture_greek.16.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'свершила', 'свершил' )] немало подвигов — кажется, [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! и в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName] не осталось никого, кто бы не слышал о [Select_CString(target_character.IsFemale, 'её', 'его' )] деяниях. Придворные жаждут лично познакомиться с живой легендой нашей державы — они направили [Select_CString(target_character.IsFemale, 'ей', 'ему' )] приглашение ко двору, чтобы представить [Select_CString(target_character.IsFemale, 'её', 'его' )] самым знатным и влиятельным вельможам страны.\n\nРазумеется, [Select_CString(target_character.IsFemale, 'её', 'его' )] многочисленные соперники не слишком рады этому известию. [target_character.GetNameWithNoTooltip] и без того слишком много о себе [Select_CString(target_character.IsFemale, 'возомнила', 'возомнил' )], и кое-кто опасается, что обожание придворных подтолкнёт [Select_CString(target_character.IsFemale, 'её', 'его' )] к мысли об узурпации власти. Если [target_character.GetSheHe] потребует, чтобы [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'отреклась', 'отрёкся' )] от [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого престола, едва ли мы сможем [Select_CString(target_character.IsFemale, 'её', 'его' )] остановить…"
 culture_greek.16.a: "Кто мы такие, чтобы запрещать [Select_CString(target_character.IsFemale, 'этой женщине', 'этому человеку' )] говорить перед двором?"
 culture_greek.16.b: "[Select_CString(target_character.IsFemale, 'Её', 'Его' )] следует держать подальше от придворных интриг."
 culture_greek.17.title: "Расширение торговли в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.17.desc: "Благодаря нашему опыту мореходства [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! были построены новые гавани и проложены новые торговые маршруты. Одним из таких портов является [target_location.GetRank.GetName|l] [target_location.GetName]. Привлечённые многочисленными привилегиями, в это молодое торговое поселение стекаются [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] со всей страны.\n\nСтремительно развивающийся город остро нуждается в дополнительных рынках, новых жилых районах, масштабном кораблестроении. Прознав об этом, [target_character.GetName] [Select_CString(target_character.IsFemale, 'созвала', 'созвал' )] придворных вельмож, чтобы найти оптимальное решение."
 culture_greek.17.a: "Мы поддержим развитие торговли в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]."
 culture_greek.17.b: "Они получат нашу помощь, но будут у нас в долгу."
 culture_greek.17.c: "Разделим расходы по справедливости."
 culture_greek.18.title: "Халатность акритов [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.18.desc: "[target_location.GetRank.GetName] [target_location.GetName] располагается на самой границе, но в последнее время руководство поселения откровенно пренебрегает своими обязанностями по защите рубежей #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Гарнизон утратил боеспособность, окрестные земли сделались уязвимыми для разбойничьих набегов и вражеских вторжений.\n\nНедавняя проверка выявила, что командир акритов получил свою должность благодаря семейным связям, а не личным заслугам. Его воины спускают всё своё жалование на спиртное; они любят бахвалиться своими подвигами, но в реальном бою от них не будет никакого толку. Мы не можем рисковать обороноспособностью области [target_area.GetName] — необходимо навести там порядок и укрепить дисциплину среди акритов. [target_character.GetName] [Select_CString(target_character.IsFemale, 'должна', 'должен' )] действовать со всей решительностью."
 culture_greek.18.a: "У нас нет на это средств."
 culture_greek.18.b: "Их долг — защищать границы, и они должны это крепко усвоить."
 all_pop_in_location_lose_satisfaction: "Все [Concept('pops', 'группы населения')|e] в [target_location.Custom('LR_PREP')|l] [target_location.GetName] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.19.title: "Легенды об акритах [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.19.desc: "Рассказчики многочисленных историй об акритах нередко приукрашивают истину, стремясь возвеличить славу #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. Однако в легендах о храбрецах из [target_location.Custom('LR_GEN')|l] [target_location.GetName] нет ни слова лжи. Они бдительно стерегут границы области [target_area.GetName], не подпуская врагов к рубежам нашей державы, а [target_character.GetName] пользуется в здешних краях всеобщим уважением. И пусть некоторые сомневаются в правдивости этих историй, вельможи двора прониклись их героическим духом и желают помочь отважным акритам, разнося легенды об их подвигах по всем землям [ROOT.GetCountry.Custom('CL_GEN')]. [target_character.GetName] тоже [Select_CString(target_character.IsFemale, 'могла', 'мог' )] бы внести свой вклад, сочинив новые истории о героизме жителей [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
 culture_greek.19.a: "Мы посодействуем распространению легенд об акритах, если это поможет укрепить наши границы."
 culture_greek.19.b: "Верная служба обеспечит им место в истории безо всяких баек."
 culture_greek.20.title: "Акриты [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] просят о помощи"
 culture_greek.20.desc: "Такая огромная страна, как [ROOT.GetCountry.GetName], неизбежно сталкивается с отдельными проявлениями халатности. Даже если не идёт речь о злом умысле, жителям [ROOT.GetCountry.Custom('rank_ru_GEN')|l] от этого не легче. В силу такого равнодушия границы области [target_area.GetName] оказались недостаточно защищёнными, и перепуганное население обратилось за помощью к гарнизону [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Жители требуют усилить меры предосторожности, но для организации эффективной обороны от набегов и вторжений необходимо вмешательство двора.\n\nГонцы акритов прибыли в [target_capital.Custom('LR_ACC')|l] [target_capital.GetName] и просят, чтобы [target_character.GetName] [Select_CString(target_character.IsFemale, 'приняла', 'принял' )] их поскорее. [target_location.Custom('LR_DAT')] [target_location.GetNameWithNoTooltip] нужны средства на строительство новых укреплений, воины для усиления гарнизона и инструкторы, которые займутся обучением новобранцев."
 culture_greek.20.a: "Мы позаботимся о защите каждого уголка нашей страны."
 culture_greek.20.b: "Увы, у нас нет лишних ресурсов."
 culture_greek.21.title: "Упадок средиземноморской торговли в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.21.desc: "С открытием Нового Света в мире появилось множество новых торговых путей, тогда как значение средиземноморской торговли, столь важной для экономики нашей страны, пошло на спад. Многие [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], традиционно живущие морем, упрямо держатся своих прежних привычек и ничего не желают менять. Вместо того чтобы приспособиться к новой реальности, они требуют от властей субсидий и постоянной поддержки традиционных рынков сбыта.\n\n[target_location.GetName] — один из таких рынков. [target_location.GetRank.GetName] сильно пострадал от изменения торговых путей, и жители просят выделить купцам средства на закупку новых товаров. По их словам, финансовая помощь оживит торговлю и даже позволит вернуть [target_location.Custom('LR_DAT')|l] былое экономическое значение."
 culture_greek.21.a: "Предоставим им эти средства."
 culture_greek.21.b: "Если они хотят преуспеть в торговле, им стоит научиться разумнее распоряжаться тем, что они имеют."
 culture_greek.21.c: "При должной находчивости можно уладить любую проблему."
 burghers_in_location_lose_satisfaction: "Все [Concept('pops', 'группы населения')|e] из числа #TOOLTIP:POPTYPE,burghers,X #L горожан#!#! получат [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 burghers_in_location_gains_satisfaction: "Все [Concept('pops', 'группы населения')|e] из числа #TOOLTIP:POPTYPE,burghers,X #L горожан#!#! получат [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.22.title: "Празднество в честь Богородицы в [target_location.GetName.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.22.desc: "Рождение Иисуса считается очень важным событием для истинно верующих #TOOLTIP:RELIGION,$orthodox_tt$,X #L православных#!#! христиан, поэтому многие устраивают празднества в честь Его Матери Марии, которую зачастую именуют Богородицей, или по-гречески #italic Теотокос#!.\n\nОсобенно усердствуют во время подобных торжеств жители [target_location.Custom('LR_GEN')|l] [target_location.GetName]. Они готовят празднество в #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_PREP')|l]#!#! и его окрестностях, надеясь хотя бы один день по-настоящему отдохнуть и поделиться своей радостью со всеми желающими. Некоторые представители #L [ROOT.GetCountry.GetAdjective|l]ого#! двора уже отправились в путь, чтобы своими глазами увидеть это зрелище, а самые набожные из них желают сделать этот святой день ещё более значимым для людей."
 culture_greek.22.a: "Воистину прекрасное событие."
 culture_greek.22.b: "Отпразднуем его вместе с ними."
 culture_greek.22.c: "Хоть мы и не разделяем их веру, мы, по крайней мере, можем отнестись к ней с уважением."
 culture_greek.22.d: "В [target_location.GetName.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] нет места православным традициям."
 all_pops_in_location_gain_satisfaction: "Все [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 all_orthodox_pops_in_location_lose_satisfaction: "Все #TOOLTIP:RELIGION,$orthodox_tt$,X #L православные#!#! [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.23.title: "Влияние [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 culture_greek.23.desc: "Влияние [target_location.GetName.Custom('LR_GEN')|l] [target_location.GetName.GetName] в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! становится всё более ощутимым для всех, особенно для чиновников из [target_capital.Custom('LR_GEN')|l] [target_capital.GetName]. Их весьма занимает вопрос, каким образом этот [target_location.GetRank.GetName|l] из области [target_area.GetName] смог возвыситься, причём во многом ему покровительствовали [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l] и различные [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Мелкие чиновники и состоятельные [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] пользуются возможностями, которые предоставляет им [target_location.GetRank.GetNameWithNoTooltip|l], а местные [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] утопают в роскоши.\n\nНо если для одних это источник довольства, то для других — повод для серьёзных раздумий, поскольку растущее влияние региона подрывает положение облечённых властью в [target_capital.Custom('LR_PREP')|l] [target_capital.GetName] и других местах, тем самым нарушая политическое равновесие во всей державе."
 culture_greek.23.a: "Стоит ли наказывать город за привлечение новых жителей и приток богатства?"
 culture_greek.23.b: "У прочих городов есть причины беспокоиться. Возможно, стоит ограничить рост [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
 all_pops_with_influential_polis_modifier_lose_satisfaction: "[Concept('pop_satisfaction', 'Довольство')|e] всех [Concept('pops', 'групп населения')|e] в [Concept('locations', 'районах')|e] с [Concept('modifier', 'модификатором')|e] «[ShowModifier('greek_culture_influential_polis')]» снизится на [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%]"
 all_pops_in_location_lose_satisfaction: "Все [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.24.title: "Притязания ромеев"
 culture_greek.24.desc: "Влияние Римской империи по-прежнему ощущается [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#!. Несмотря на то, что титул византийских императоров нам не принадлежит, народ продолжает считать себя частью прежней империи и полагает, что [target_character.GetName] [Select_CString(target_character.IsFemale, 'должна', 'должен' )] проводить более агрессивную политику по возвращению её земель. Некоторые популисты при #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе настаивают, что нам следует не только вернуть земли, но и перенять титул императоров прошлого. А чтобы придать нам должную легитимность и престиж в обоснование наших притязаний на утраченные земли, следует изменить стиль и эстетику нашей столицы, [target_capital.Custom('LR_GEN')|l] [target_capital.GetName]."
 culture_greek.24.a: "Эти «ромеи» могут распрощаться со своими мечтами."
 culture_greek.24.b: "Подобные действия могут быть полезны. Возможно, нам следует их перенять."
 culture_greek.25.title: "Мистрийское образование"
 culture_greek.25.desc: "Знаменитое мистрийское философское направление распространяет своё влияние на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, в #TOOLTIP:AREA,west_anatolia_area,X #L Западной Анатолии#!#! и в #TOOLTIP:REGION,italy_region,X #L Италии#!#!.\n\nУчёные посещают многие земли, как бедные, так и изобилующие богатством. Среди них — [target_location.GetName] в области [target_area.GetName]. Некоторые безвестные учёные, отправившиеся исследовать дальние земли, остановились тут и поделились с местным населением своими философскими, культурными и риторическими идеями. Многие жители, особенно более образованные, желающие расширить своё понимание мира, проявили интерес к этим идеям. Мистрийские учения также привлекли внимание #L [ROOT.GetCountry.GetAdjective|l]ого#! двора, где взгляды по этому вопросу разделились: одни выступают за запрет любых потенциально опасных идей и учений, особенно тех, что могут представлять угрозу для самобытности [ROOT.GetCountry.Custom('CL_GEN')], а другие, менее знатные, полагают, что их распространение даст нашему народу прекрасные возможности для обучения."
 culture_greek.25.a: "Их учения не представляют опасности. Пусть распространяют свои знания."
 culture_greek.25.b: "Стоит ли подвергать [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] риску возникновения радикальных идей?"
 event_will_only_fire_for_locations_within_mystras_scholarship_geography: "[ShowScriptedGeographyName('mystras_scholarship_geography')] — [Concept('event', 'событие')|e] сработает только в отношении местных [Concept('locations', 'районов')|e]"
 culture_greek.26.title: "Новая [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ая риторика"
 culture_greek.26.desc: "Во времена Древнего Рима на #TOOLTIP:LANGUAGE,latin_language,X #L латыни#!#! — которую часть населения #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! не желает изучать — было написано бесчисленное множество сочинений. Это побудило наших наиболее рассудительных учёных взяться за их перевод на общепринятый #L [ROOT.GetCountry.GetCommonLanguage.GetName|l]ий#! язык.\n\nПредставители элиты не могли оставить это дело без внимания, усмотрев угрозу в том, что низшие сословия смогут получить доступ к текстам, на изучение и освоение которых [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] потратили годы. При #L [ROOT.GetCountry.GetAdjective|l]ом#! дворе раздались призывы запретить подобные переводы [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] ради сохранения положения и престижа элиты."
 culture_greek.26.a: "Простой народ тоже имеет право получать образование."
 culture_greek.26.b: "Нужно любой ценой сохранить главенство [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ой элиты."
 culture_greek.27.title: "[target_character.GetNameWithNoTooltip] требует проведения триумфа"
 culture_greek.27.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'вернулась', 'вернулся' )] с очередной славной победой и [Select_CString(target_character.IsFemale, 'прошлась', 'прошёлся' )] по улицам [target_capital.Custom('LR_GEN')|l] [target_capital.GetName] под ликование толпы в окружении многочисленной охраны из самых преданных [Select_CString(target_character.IsFemale, 'ей', 'ему' )] воинов, оберегающих [Select_CString(target_character.IsFemale, 'её', 'его' )] от всякой опасности.\n\nПрибыв к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору, [Select_CString(target_character.IsFemale, 'она потребовала', 'он потребовал' )] аудиенции, на которую дали согласие с явной неохотой. Не обращая внимания ни на друзей, ни на недругов при дворе, [Select_CString(target_character.IsFemale, 'она', 'он' )] сразу [Select_CString(target_character.IsFemale, 'повелела', 'повелел' )], чтобы [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'организовала', 'организовал' )] в [Select_CString(target_character.IsFemale, 'её', 'его' )] честь торжество по древнему обычаю. [Select_CString(target_character.IsFemale, 'Она', 'Он' )] настаивает, что [Select_CString(target_character.IsFemale, 'её', 'его' )] свершения должны быть известны всем, дабы укрепить боевой дух и внушить страх любому, кто осмелится выступить против #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! с оружием в руках."
 culture_greek.27.a: "Торжество? Слишком много шума. Мы отвергаем эти требования."
 culture_greek.27.b: "Если торжество во славу [ROOT.GetCountry.Custom('CL_GEN')], мы его охотно устроим."
 greek_culture_strategos_will_not_use_triumph_for_popularity: "Если [target_character.GetName] не получит желанное торжество, [Select_CString(target_character.IsFemale, 'она', 'он' )] не добьётся успеха ни в одной из запланированных попыток переворота"
 greek_culture_progress_coup_attempt_if_strategos_is_disloyal: "Если [target_character.GetName] получит торжество, [Select_CString(target_character.IsFemale, 'она', 'он' )] сможет воспользоваться своей популярностью, чтобы ускорить реализацию своих планов по проведению переворота"
 culture_greek.28.title: "Исход учёных"
 culture_greek.28.desc_common: "Нестабильность [ROOT.GetCountry.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! вынудила многих образованных людей искать лучшей доли подальше от [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 culture_greek.28.desc.a: "$culture_greek.28.desc_common$\n\n Они хотят заниматься философией, правом и богословием, поэтому жаждут более спокойной жизни, которую в одночасье не отнимет ни война, ни голод, ни смерть. Вот почему многие с тоской вспоминают #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! — более престижное и стабильное государство. [target_country.GetFlavorRank] [target_country.GetName] может обеспечить им желаемый комфорт. Многие уже начали переселяться в [target_destination.Custom('LR_ACC')|l] [target_destination.GetName], и это вызывает обеспокоенность среди наиболее проницательных членов #L [ROOT.GetCountry.GetAdjective|l]ого#! двора. Они полагают, что подобная миграция наносит ущерб престижу [ROOT.GetCountry.Custom('CL_GEN')], поскольку демонстрирует неспособность защитить тех, кто не в силах пережить нынешнее бедственное положение дел в нашей державе, но всё же представляет ценность для общества."
 culture_greek.28.desc.b: "$culture_greek.28.desc_common$\n\nИ хотя бежать им, по сути, некуда, они продолжают рассказывать о красотах далёких стран, увиденных в книгах: о том, как простой народ #ONCLICK:COUNTRY,[scholar_country.1.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scholar_country.1.Custom('CL_tt')],X [scholar_country.1.Custom('CL_GEN')|L]#!#! живёт в роскоши, о справедливых правителях #ONCLICK:COUNTRY,[scholar_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scholar_country2.Custom('CL_tt')],X [scholar_country2.Custom('CL_GEN')|L]#!#!, которые не угнетают своих подданных, а, напротив, уважают их права, и о том, как [scholar_country3.GetName] полагается на новшества, а не на традиции.\n\nПоначалу эти речи были безвредными, но они уже распространяются по [ROOT.GetCountry.Custom('rank_ru_DAT')|l], сея смуту и волнения, что вызывает серьёзную обеспокоенность #L [ROOT.GetCountry.GetAdjective|l]ого#! двора."
 culture_greek.28.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
 culture_greek.28.b: "Нужно пресечь это, пока другие не последовали их примеру."
 culture_greek.28.c: "Их речи лишь усиливают нестабильность."
 culture_greek.28.d: "Возможно, стоит направить часть средств на предотвращение дальнейших волнений."
 greek_culture_migration_largely_prevented: "Основная часть [Concept('migration', 'миграции')|e] сократится"
 culture_greek.29.title: "[ShowBuildingTypeNameWithNoTooltip('orthodox_monastery')] нуждается в помощи"
 culture_greek.29.desc: "Жители [target_location.Custom('LR_GEN')|l] [target_location.GetName] — ревностные последователи #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ой#! веры. [ROOT.GetCountry.GetReligion.GetGodName] — основа их повседневной жизни. Однако из-за недостатка поддержки со стороны #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! и правительства нашей славной державы местный #TOOLTIP:BUILDING_TYPE,orthodox_monastery,X #L православный монастырь#!#!, расположенный в #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_PREP')|l]#!#!, остро нуждается в обновлении убранства, чтобы соответствовать своему статусу святого места. Духовенство направило прошение к #L [ROOT.GetCountry.GetAdjective|l]ому#! двору в надежде, что [target_character.GetName] выделит средства на достойное обновление как внешнего облика, так и внутреннего убранства этой святыни. Это благодеяние не останется незамеченным и покажет всем [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l] нашу преданность #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ой#! вере."
 culture_greek.29.a: "Они получат золото на убранство монастыря."
 culture_greek.29.b: "[target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'должна', 'должен' )] быть рачительнее. На все святыни золота не хватит."
 culture_greek.29.c: "Во имя православной веры мы не пожалеем никаких средств."
 all_orthodox_pops_gain_satisfaction_in_location: "Все #TOOLTIP:RELIGION,$orthodox_tt$,X #L православные#!#! [Concept('pops', 'группы населения')|e] получат [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 culture_greek.30.title: "Наследие империи"
 culture_greek.30.desc: "Свет Восточной Римской империи угас. Но несмотря ни на что, многие наши граждане называют себя ромеями, а [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] прославился обычаями, позаимствованными у предшественников. Это, в свою очередь, даёт нам определённое основание заявлять о себе как о законных наследниках империи и требовать возвращения её земель. Многие в [ROOT.GetCountry.GetCapital.Custom('LR_PREP')|l] [ROOT.GetCountry.GetCapital.GetName] знают о нашей границе в провинции [target_province.GetName] и всё чаще требуют её возврата. [target_country.GetName] не име[target_country.Custom('end_etyut')] никаких прав на неё и уж тем более не мо[target_country.Custom('end_gegu')] претендовать на роль наследников Рима. Армия, по-видимому, разделяет эти умонастроения: военные и [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] призывают народ к войне за возвращение того, что по праву принадлежит #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!."
 culture_greek.30.a: "Рим будет восстановлен в прежних границах!"
 culture_greek.30.b: "Воевать нет нужды."
