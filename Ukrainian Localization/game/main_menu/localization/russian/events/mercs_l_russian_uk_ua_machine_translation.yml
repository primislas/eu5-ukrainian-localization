l_russian:
  mercs.1.title: "Невдоволення серед членів загону «[SCOPE.sMercenary('patriotic_mercs').GetName]»"
  mercs.1.desc: "Багато членів загону «[SCOPE.sMercenary('patriotic_mercs').GetName]» перейнялися безпідставними сентиментальними почуттями до #ONCLICK:COUNTRY,[SCOPE.sCountry('merc_home_country').Custom('CL_tt')] #TOOLTIP:COUNTRY,[SCOPE.sCountry('merc_home_country').Custom('CL_tt')],X [SCOPE.sCountry('merc_home_country').Custom('CL_DAT')|L]#!#!, своєї жалюгідної батьківщини. Значна частина загону дезертувала, вражена думкою про те, що їхні рідні міста згорять у пожежі війни."
  mercs.1.a: "Вони слабкі духом."
  mercs.1.b: "Золото — ось що шотландці по-справжньому люблять."
  mercs.2.title: "Ворог їхнього ворога"
  mercs.2.desc: "Солдати загону «[bloodthirsty_mercs.GetName]» з радістю очікують моменту, коли зможуть зійтися в битві зі своїми ненависними ворогами з #L [bloodthirsty_mercs_enemy.GetAdjective|l]ого#! загону. Схоже, що жорстока ворожнеча між загонами «[bloodthirsty_mercs_home.GetName]» та «[bloodthirsty_mercs_enemy.GetNameWithNoTooltip]» поширюється навіть на найманців."
  mercs.2.a: "Щасливий збіг."
  mercs.2.b: "Настрій, який поділяє весь #L [ROOT.GetCountry.GetAdjective|l]ий#! народ."
  mercs.3.title: "Оплата грабунком"
  mercs.3.desc: "Деякі наймані загони на нашій службі почали висловлювати невдоволення умовами найму. За їхніми словами, багатства ворожих територій, таких як [rich_enemy_province.GetName], навряд чи можна порівняти з їхньою мізерною платнею. Капітан загону «[loot_mercs.GetName]» зайняв жорстку позицію і зажадав собі та своїм людям більшу частину трофеїв."
  mercs.3.a: "Нехай залишать собі частину награбованого."
  mercs.3.b: "Заборонимо грабувати, але збільшимо платню."
  mercs.4.title: "Ветерани стають під знамена загону «[veteran_mercs.GetName]»"
  mercs.4.desc: "Ватажки найманців поважають #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! не лише за наш міжнародний престиж, але насамперед за те, що ми завжди платимо їхнім бійцям вчасно та в обумовленому розмірі. Завдяки цьому нещодавно до загону «[veteran_mercs.GetName]» приєдналася ціла група іноземних ветеранів, які прибули до нашої країни в надії вступити до нас на службу."
  mercs.4.a: "Хто б не захотів битися за [ ROOT.GetCountry.Custom('CL_ACC')]?"
  mercs.5.title: "Слони!"
  mercs.5.desc: "Вперше з часів Ганнібала та Пунічних війн бойові слони повернулися до Європи під проводом #L [ROOT.GetCountry.GetAdjective|l]их#! полководців. Наші вороги тремтять від страху перед цими величезними та величними звірами, облаченими в обладунки та прикрашеними символами війни."
  mercs.5.a: "Нехай тремтять перед загоном «[elephant_mercs.GetNameWithNoTooltip]»."
  mercs.7.title: "Великий попит на найманців із загону «[popular_mercs.GetNameWithNoTooltip]»"
  mercs.7.desc: "Поки в нашому куточку світу вирують конфлікти, послуги найманих загонів користуються великим попитом. Найманці із загону «[popular_mercs.GetName]» виявили, що їхні особливі таланти особливо знадобляться в поточній ситуації та уклали контракти з кількома ворогуючими країнами.\n\nКоли солдати із загону «[popular_mercs.GetName]» повернуться на рідні землі #ONCLICK:COUNTRY,[popular_mercs_origin.Custom('CL_tt')] #TOOLTIP:COUNTRY,[popular_mercs_origin.Custom('CL_tt')],X [popular_mercs_origin.Custom('CL_GEN')|L]#!#!, вони привезуть із собою трофеї, включаючи обумовлену в контракті платню та багатства, які зможуть награбувати за час воєнної кампанії. Цей приплив багатства стимулюватиме місцеву економіку та сприятиме подальшому набору до загону «[popular_mercs.GetName]»."
  mercs.7.a: "Нехай багатство тече рікою."
  mercs.10.title: "Ревність найманців"
  mercs.10.desc: "Солдати із загону «[pious_mercs.GetName]» дуже серйозно ставляться до своєї #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! релігії, особливо за мірилами найманців. Зміцнені у своїй вірі тією обставиною, що наша справа праведна, весь загін перебуває в піднесеному настрої, готуючись до битви з безбожниками із загону «[pious_mercs_enemy.GetName]»."
  mercs.10.a: "Наша справа праведна!"