l_russian:
  rise_of_the_ottomans.1.title: "Турецька загроза"
  rise_of_the_ottomans.1.desc: "Маленька держава [target_country.GetName], що виникла на руїнах вмираючого Сельджуцького султанату, спершу перебувала в тіні своїх могутніх сусідів. Однак [target_character.GetName] не [Select_CString(target_character.IsFemale,'збиралася', 'збирався')] миритися з таким станом речей. [Select_CString(target_character.IsFemale,'Вона ступила', 'Він ступив')] на шлях консолідації та експансії, бажаючи зміцнити своє становище на строкатому гобелені роздробленої Анатолії.\n\n[target_character.GetShortNameWithNoTooltip] та [Select_CString(target_character.IsFemale,'її', 'його')] послідовники вміло скористалися хаосом і розбіжностями, що панують у регіоні. З кожною перемогою #L [target_country.GetAdjectiveWithNoTooltip|l]е#! князівство стає сильнішим, і багато воїнів, учених та інших амбітних діячів бажають взяти участь у його долі. Вдалі шлюби, хитрі союзи та військові досягнення поступово перетворили скромну державу на імперію, що розвивається."
  rise_of_the_ottomans.1.a: "Це потрібно зупинити!"
  rise_of_the_ottomans.2.title: "Розквіт [target_country.Custom('CL_RP')]"
  rise_of_the_ottomans.2.a: "Це наша доля!"
  rise_of_the_ottomans.3.title: "Кінець турецького панування"
  rise_of_the_ottomans.3.desc: "Мрії про об'єднання всіх #TOOLTIP:REGION,anatolia_region,X #L анатолійських#!#! князівств не судилося збутися, оскільки наймогутніше з них не розрахувало своїх сил і в осяжному майбутньому не зможе претендувати на панування. Навряд чи скоро з'явиться імперія, яка заповнить утворену порожнечу…"
  rise_of_the_ottomans.3.a: "Воно й на краще!"
  rise_of_the_ottomans.4.title: "Розквіт [target_country.Custom('CL_RP')]"
  rise_of_the_ottomans.4.desc: "[target_character.GetName] нарешті здійснює свою мрію. [target_country.GetLongName] у розквіті сил, увесь світ схиляється перед могутністю цієї держави. Навряд чи знайдеться сміливець, який посміє виступити проти неї."
  rise_of_the_ottomans.4.a: "$common_string_what_can_we_do$"
  rise_of_the_ottomans.5.title: "Сходження турків"
  rise_of_the_ottomans.5.desc: "Ми досягли такої величі, про яку засновник нашої династії й помислити не міг. Куди ж нам рухатися далі?"
  rise_of_the_ottomans.5.a: "Наша імперія стоятиме вічно!"
  ability_to_form_rum_tt: "Отримати можливість відродити Римську імперію"
  history_rewritten_tt: "#italic Історія здійснює коло. Ми — герої, що стоять біля витоків нової імперії, — успадкуємо землі та славу наших великих попередників.#!"
  rise_of_the_ottomans.6.title: "Розквіт [target_country.Custom('CL_RP')]"
  rise_of_the_ottomans.6.desc: "Ми подолали безліч небезпек і загроз, що виходили від наших сусідів, і в підсумку змогли значно зміцнити свій політичний і військовий вплив в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Міць нашої держави не знає меж, ми здатні поставити на коліна навіть найгрізніших ворогів!"
  rise_of_the_ottomans.6.a: "Не можна втрачати такі можливості!"
  rise_of_the_ottomans.6.b: "Потрібно вичекати потрібний момент…"
  tur_choose_reform_later_tt: "[Concept('government_reform', 'Державний принцип')|e] буде доступний, доки ми зберігаємо лідерство під час [Concept('situation', 'ситуації')|e] «[ShowSituationName('rise_of_the_ottomans')]»"
  rise_of_the_ottomans.100.title: "Похід проти [target_country.Custom('CL_RP')]"
  rise_of_the_ottomans.100.desc: "Переможні #L #L [ROOT.GetCountry.GetAdjective|l]#!і#! знамена майорять на вітрі, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] уже обмірковує наступний крок свого великого плану. Схоже, на цьому етапі [ROOT.GetCountry.GetFlavorRank|l] може без зусиль завоювати більшість сусідніх територій.\n\nЯкщо ми включимо провінцію [target.GetProvince.GetName] до складу нашої держави, то зможемо посилити свій контроль над областю [target.GetArea.GetName], і тоді наш вплив у регіоні помітно розшириться. Настав час розпочати нову військову кампанію!"
  rise_of_the_ottomans.100.a: "Скоро [target.GetNameWithNoTooltip] перейде у володіння нового господаря!"
  rise_of_the_ottomans.101.title: "[target_country.GetLongNameWithNoTooltip] та [GetCountry('TUR').GetNameWithNoTooltip]"
  rise_of_the_ottomans.101.desc: "Щоб здобути нові території, необов'язково розв'язувати війну. Часом посланець може укласти договір, вигідний обом сторонам, і розширити наші володіння, уникнувши кровопролиття."
  rise_of_the_ottomans.101.a: "Зробіть їм пропозицію, від якої неможливо відмовитися…"
  rise_of_the_ottomans.101.b: "Їхні інтереси нас не хвилюють!"
  rise_of_the_ottomans.101.tt: "Держава [target_country.GetName] може погодитися стати нашим #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#!"
  rise_of_the_ottomans.102.title: "Вимога [GetCountry('TUR').Custom('CL_RP')]"
  rise_of_the_ottomans.102.desc: "[GetCountry('TUR').GetLongName] — це держава, якою править [ROOT.GetCountry.GetGovernment.GetFullRulerName]. Звідти прибув посланець, що пропонує нам підкоритися і увійти до їхнього складу як #TOOLTIP:SUBJECT_TYPE,vassal,X #L васал#!#!."
  rise_of_the_ottomans.102.a: "Приймемо вимоги."
  rise_of_the_ottomans.102.b: "Відхилимо вимоги."
  rise_of_the_ottomans.103.title: "[target_country.GetAdjectiveWithNoTooltip]а відповідь"
  rise_of_the_ottomans.103.desc: "Наш посланець привіз із міста [target_country.GetCapital.GetName] славні вісті. [target_country.GetLongName] — ця держава погоджується визнати нашу владу і стати #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалом#!#!. До цього [target_country.GetAdjectiveWithNoTooltip|l]их правителів підштовхнув не лише страх перед загрозами, що нависли над їхніми головами, а й усвідомлення переваги [ROOT.GetCountry.Custom('CF_RP')|l] над їхньою державою. Саме тому вони прийняли єдине розумне рішення присягнути нам на вірність в обмін на захист.\n\nЗдобувши нового васала, ми зробили ще один крок до об'єднання роздроблених бейликів #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! під своїм прапором. Наш вплив зростає, а разом із ним зростає розуміння, що нам долею призначено стати найсильнішою державою регіону."
  rise_of_the_ottomans.103.a: "Рано чи пізно всі схиляться перед нами!"
  rise_of_the_ottomans.104.title: "[target_country.GetLongNameWithNoTooltip] — держава відмовляється підкорятися!"
  rise_of_the_ottomans.104.desc: "Ми завжди знали, що негідники з міста [target_country.GetCapital.GetName] геть позбавлені далекоглядності. Ми не пішли на них війною лише з милосердя, але вони відмовилися від такої великодушної пропозиції!"
  rise_of_the_ottomans.104.a: "Ми зустрінемося з ними на полі бою!"
  rise_of_the_ottomans.105.title: "Інтеграція провінції [target_province.GetNameWithNoTooltip]"
  rise_of_the_ottomans.105.desc: "Відтоді, як провінція [target_province.GetName] увійшла до складу імперії, наш двір роздирають суперечності. Асиміляція підкорених земель — делікатний процес, що вимагає акуратності та далекоглядності. На шальках терезів доля провінції: вона може стати як нашою складовою частиною, так і постійним головним болем.\n\nПридворні обговорюють, який підхід призведе до успішної інтеграції. Деякі хочуть одразу ж запровадити наші закони та впровадити османські інститути, щоб встановити централізований контроль і згуртувати населення. Інші ж закликають діяти обережно, виявити повагу до місцевих традицій та звичаїв і тим самим завоювати повагу наших новоспечених підданих."
  rise_of_the_ottomans.105.a: "Простимулюємо почуття єдності та приналежності."
  rise_of_the_ottomans.105.b: "Виберемо більш обережний підхід."
  rise_of_the_ottomans.106.title: "[actor.GetNameWithNoTooltip] і дипломатичний шлюб"
  rise_of_the_ottomans.106.desc: "Нерідко шлях до влади буває тернистим і небезпечним. У нашому випадку він являє собою лабіринт з перешкодами: ми повинні йти на будь-які хитрощі, щоб зберегти суверенітет. Нещодавно з #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_RP')|L]#!#! прийшов офіційний дипломатичний запит.\n\nУ своєму красномовному листі її представники пропонують нам поріднитися зі знаменитою династією [target_country1.GetGovernment.GetRuler.GetDynasty.GetName] в обмін на територію на спільному кордоні. Наявність такого могутнього дружнього сусіда, що гарантує нашу незалежність, — це велике благо, але як же наша територіальна цілісність?"
  rise_of_the_ottomans.106.a: "Ми приймемо їхню пропозицію."
  rise_of_the_ottomans.106.b: "Прогнати їхнього дипломата і відкинути вимоги!"
  rise_of_the_ottomans.107.title: "[target_country2.GetAdjectiveWithNoTooltip]а відповідь"
  rise_of_the_ottomans.107.desc_a: "Ми зробили #ONCLICK:COUNTRY,[target_country2.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country2.Custom('CL_tt')],X [target_country2.Custom('CL_DP')|L]#!#! великодушну пропозицію, але влада цієї держави відмовила нам з невідомої причини! Очевидно, вони геть позбавлені політичної далекоглядності та дипломатичного такту і не можуть визнати нашу беззаперечну перевагу. Ми не терпітимемо цієї образи!"
  rise_of_the_ottomans.107.desc_b: "[target_location2.GetRank.GetNameWithNoTooltip] [target_location2.GetName] приймає молодят у свої обійми. Вони повертаються додому у супроводі музикантів та придворних. Вся свита радіє укладенню престижного союзу. Але що найважливіше — подружжя привозить із собою важливі документи, де сказано, що тепер [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] є нашою територією."
  rise_of_the_ottomans.107.a: "Обожнюю дипломатію!"
  rise_of_the_ottomans.107.b: "Держави спалювали і за менші провини."
  rise_of_the_ottomans.207.desc: "Успішні завоювання принесли нашому народу незліченні багатства. Відтепер один із наших пріоритетів — захистити те, чим ми володіємо. [target_location.GetName] — справжня перлина в нашій короні, яскравий приклад успіху та символ нашого зростаючого впливу в регіоні. Нова #TOOLTIP:BUILDING_TYPE,bey_fortress,X #L фортеця бея#!#! підвищить статус міста та підкреслить його значущість в історії."
  rise_of_the_ottomans.200.title: "Столиця стародавньої імперії"
  rise_of_the_ottomans.200.a: "Нехай це стане сходинкою до нових висот!"
  based_on_target_location_splendor_and_importance_tt: "Залежно від [Concept('location_importance', 'важливості району')|e] [target_location.GetNameWithNoTooltip]:"
  rise_of_the_ottomans.108.title: "Дипломатичні відносини з владою [GetCountry('BYZ').Custom('CL_RP')]"
  rise_of_the_ottomans.108.desc: "[GetCountry('BYZ').GetLongName] — держава, з якою ми так чи інакше взаємодіяли протягом майже всієї своєї історії. Найкращі роки цієї країни, схоже, позаду, однак її вплив на #TOOLTIP:LOCATION,$bosphorus_tt$,X #L Босфорі#!#! все ще великий. Зараз створилася справді унікальна ситуація: дисбаланс сил призвів до того, що тепер ми можемо висувати їй вимоги, щоб зміцнити своє становище в регіоні…"
  rise_of_the_ottomans.108.a: "Вони повинні визнати наш вплив в Анатолії."
  rise_of_the_ottomans.108.b: "Гроші — запорука процвітаючих відносин."
  rise_of_the_ottomans.108.c: "Їм точно є чим поділитися!"
  rise_of_the_ottomans.108.d: "Це ні до чого."
  gain_recognition_tt: "Якщо вони визнають наш вплив у регіоні, ми отримаємо модифікатор «#TOOLTIP:STATIC_MODIFIER,sovereign_of_anatolia,X #V #L Суверен Анатолії#!#!» на #Y 10#! років"
  gain_money_tt: "Якщо вони приймуть наші вимоги, ми отримаємо частину їхнього доходу"
  gain_court_official_tt: "Якщо вони визнають наш вплив, один з їхніх найталановитіших управлінців приєднається до нашого двору"
  rise_of_the_ottomans.109.title: "Запит від: [actor.GetNameWithNoTooltip]"
  rise_of_the_ottomans.109.desc: "У самий розпал боротьби за владу в Анатолії до нашого двору прибули посланці, чиєю батьківщиною є — [actor.GetLongName], щоб передати запит свого сюзерена…"
  rise_of_the_ottomans.109.a: "Доведеться піти на поступки."
  rise_of_the_ottomans.109.b: "Ким вони себе уявили?!"
  rise_of_the_ottomans.110.title: "[GetCountry('BYZ').GetAdjectiveWithNoTooltip]ий відповідь"
  rise_of_the_ottomans.110.desc: "Нещодавно ми відправили посланця до #L #L [GetCountry('BYZ').GetAdjective|l]#!ого#! двору. І ось гонець повертається, тримаючи в руках листа, на якому стоїть печатка колись великої імперії, занесеної пісками часу…"
  rise_of_the_ottomans.110.a: "Чудово."
  rise_of_the_ottomans.110.b: "Та як вони посміли?!"
  byz_accepted_proposal_tt: "Вони прийняли нашу пропозицію"
  byz_declined_proposal_tt: "Вони відхилили нашу пропозицію"
  rise_of_the_ottomans.201.title: "[target_location.GetNameWithNoTooltip]. Доля та історія"
  rise_of_the_ottomans.202.title: "[target_location.GetNameWithNoTooltip]. Тінь Сельджукидів"
  rise_of_the_ottomans.203.title: "[target_location.GetNameWithNoTooltip]. Місто розбрату"
  rise_of_the_ottomans.204.title: "[target_location.GetNameWithNoTooltip]. На перехресті культур"
  rise_of_the_ottomans.205.title: "[target_location.GetNameWithNoTooltip]. Вплив на Сході"
  rise_of_the_ottomans.206.title: "Невірна [target_location.GetNameWithNoTooltip]"
  rise_of_the_ottomans.208.title: "Падіння міста [target.GetNameWithNoTooltip]"
  rise_of_the_ottomans.208.desc: "Місто [target.GetName], перлина нашої імперії, опинилося в руках ворога. Неприятелю вдалося прорвати оборону та дістатися до центру, сіючи хаос і знищуючи місцеве населення…"
  rise_of_the_ottomans.208.a: "Кошмар наяву!"
  rise_of_the_ottomans.209.title: "Завоювання [Location.Custom('LR_GEN')|l] [Location.GetNameWithNoTooltip]"
  rise_of_the_ottomans.209.desc: "Усі спроби захистити свої володіння були марними: на наш жаль, ми втратили контроль над важливим [Location.Custom('LR_INST')|l]-оплотом під назвою [Location.GetName]. Сьогодні чорний день для нашого народу. Наше становище в регіоні стає дедалі хиткішим…"
  rise_of_the_ottomans.209.a: "Невже це кінець?"
  growing_influence_text: "Доказ нашого зростаючого впливу та процвітання!"
  rise_of_the_ottomans.201.a: "$growing_influence_text$"
  rise_of_the_ottomans.202.a: "$growing_influence_text$"
  rise_of_the_ottomans.203.a: "$growing_influence_text$"
  rise_of_the_ottomans.204.a: "$growing_influence_text$"
  rise_of_the_ottomans.205.a: "$growing_influence_text$"
  rise_of_the_ottomans.206.a: "$growing_influence_text$"
  rise_of_the_ottomans.207.title: "Зростаюча держава"
  rise_of_the_ottomans.200.historical_info: "Ізміт — найважливіше місто з часів Римської імперії, розташоване на березі затоки. З часом воно перетворилося на процвітаючий центр торгівлі, де перетинається безліч культур. Його значення було настільки великим, що Діоклетіан з гордістю проголосив його столицею римського східного регіону. Пізніше його завоювали хрестоносці, а на початку XIII століття їм на зміну прийшли воїни Газі. У 1337 році Ізміт остаточно перейшов під контроль османських військ."
  rise_of_the_ottomans.201.historical_info: "Бурса — місто з багатою історією та перша столиця Османської імперії — нагадує прекрасний строкатий гобелен. На його території знаходяться такі дива архітектурної думки, як Зелена та Велика мечеті, які є символами величі Бурси."
  rise_of_the_ottomans.202.historical_info: "Конья — колиска багатьох цивілізацій, що прославилася в сельджуцький період як політичний та культурний центр. Її архітектура нагадує фантастичний візерунок, де химерно переплетені різні культури. Тут можна зустріти безліч самобутніх та величних споруд, збудованих в епоху правління Сельджукидів, таких як міська фортеця, мечеть Ала ад-Діна та медресе Сирчали, а також кілька невеликих мечетей та гробниць."
  rise_of_the_ottomans.203.historical_info: "З моменту заснування Анкара часто ставала ареною битв. За контроль над нею боролися багато армій. У римську епоху місто було центром культури, торгівлі та мистецтв. За часів розквіту Османської імперії Анкара зберегла своє значення і стала точкою перетину східних караванних шляхів. У XIV столітті місто служило резиденцією влади купецького братства з республіканською формою правління — це дивовижний випадок у регіоні ворогуючих бейликів."
  rise_of_the_ottomans.204.historical_info: "Кайсері — місто, засноване хеттами, — завжди було важливим торговим центром, розташованим уздовж Великого шовкового шляху. У стародавні часи місто служило резиденцією каппадокійських царів, а пізніше перейшло персам і в підсумку було завойоване Александром Македонським. Місто пережило три золоті віки: у 2000-х роках до н. е., коли воно було центром торгівлі між ассирійцями та хеттами, у період римського панування з I по XI століття та за сельджуків з 1178 по 1243 рік. Незважаючи на те, що Кайсері витримало безліч облог та битв, воно може похвалитися розкішними пам'ятками архітектури, такими як комплекс Хунат Хатун та мечеть Килич-Арслана."
  rise_of_the_ottomans.205.historical_info: "Древні історики описують Сівас як найважливіше поселення регіону з чудовою мечеттю, при якій розташовувалася знаменита лікарня. У 1516 році місто увійшло до складу Османської імперії і стало одним із санджаків."
  rise_of_the_ottomans.206.historical_info: "Історія Смирни налічує тисячі років. Це одне з найстаріших давньогрецьких міст і найважливіший центр Західної Анатолії. В останні століття він був завойований і розорений турецькими військами, а в 1222 році відновлений нікейським імператором на ім'я Іоанн III Дука Ватац. Смирна стала ціллю переможного хрестового походу 1344 року, який очолили лицарі Родосу та Кіпрське королівство, внаслідок чого місто перейшло в руки родезійських хрестоносців. Саме тут у 1403 році лицарі-госпітальєри зазнали нищівної поразки від великого завойовника Тимура, який завдав місту величезної шкоди. Незважаючи на це, місто продовжувало перебувати під сильним грецьким впливом, через що османи прозвали його «Невірною Смирною»."
  rise_of_the_ottomans.300.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip] занепадає"
  rise_of_the_ottomans.300.desc: "Незважаючи на всі зусилля гарнізону, схоже, укріплення в [target_location.GetRank.Custom('LR_PP')|l] [target_location.GetName] прийшли в непридатність через безладність та недостатній догляд. Люди стали рідше патрулювати та оглядати стіни, тому в нашій обороні утворилися величезні проломи. Безумовно, це викликає тривогу у жителів [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip] та найближчих поселень…"
  rise_of_the_ottomans.300.a: "Ми повинні відновити порядок!"
  rise_of_the_ottomans.210.title: "Падіння [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  rise_of_the_ottomans.210.desc: "Через кілька місяців битв та оборони варта [target_location.GetRank.Custom('LR_RP')|l] [target_location.GetName] з прикрістю повідомила нам, що фортеця перейшла в #L #L [target_country.GetAdjective|l]#!і#! руки. Хмари згущуються. Наш вплив в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! слабшає, і голоси, що провіщають нашу швидку загибель, звучать все голосніше…"
  rise_of_the_ottomans.210.a: "Жахливі вісті."
  rise_of_the_ottomans.211.desc: "Після тривалого бою за мости, ворота та околиці фортеці в [target_location.GetRank.Custom('LR_PP')|l] [target_location.GetName] нашим солдатам нарешті вдалося увірватися в неї та захопити один з останніх #L #L [target_country.GetAdjective|l]#!их#! плацдармів у регіоні. Тепер усі знають, що за силою та впливом ми значно перевершуємо [target_country.Custom('CL_VP')]."
  rise_of_the_ottomans.211.a: "Нас чекає велике майбутнє!"
  rise_of_the_ottomans.212.title: "Втручання у справи [Country.Custom('CL_RP')]"
  rise_of_the_ottomans.212.desc: "[target_character2.GetName] — [Select_CString(target_character2.IsFemale,'бездарна правителька', 'бездарний правитель')], [Select_CString(target_character2.IsFemale,'яка не дбає', 'який не дбає')] про благо свого народу, — [Select_CString(target_character2.IsFemale,'ввергла', 'вверг')] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_VP')|L]#!#! у стан невизначеності. Селяни раз у раз стають жертвами розбійників, у судах панує безлад, а центральна влада ніяк не проявляє себе. На щастя, [Select_CString(target_character.IsFemale,'придворна', 'придворний')] [target_character.GetName] має право претендувати на [target_country.GetAdjectiveWithNoTooltip|l]ий трон. [Select_CString(target_character.IsFemale,'Її', 'Його')] правління принесе мир та процвітання…"
  rise_of_the_ottomans.212.a: "Ми несемо мир та стабільність."
  rise_of_the_ottomans.212.b: "Не будемо поспішати."
  rise_of_the_ottomans.213.title: "Колісний шлях до Ерзурума"
  rise_of_the_ottomans.213.desc: "Стародавня дорога, що з'єднує #TOOLTIP:LOCATION,konya_tt,X #L Конью#!#!, #TOOLTIP:LOCATION,sivas_tt,X #L Сівас#!#!, #TOOLTIP:LOCATION,erzurum_tt,X #L Ерзурум#!#! та #TOOLTIP:LOCATION,tabriz_tt,X #L Табриз#!#!, споконвіку була основою торгівлі та влади в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!. Цим трактом, що перетинає суворі пустелі та родючі рівнини, ходили торговці, книжники та воїни. Його стратегічну важливість неможливо переоцінити, тому радники наполегливо рекомендують нам захопити всі його ключові точки.\n\nПоки цим шляхом ходять каравани, навантажені товарами та скарбами, він продовжує зв'язувати регіон та визначати долі імперій. У минулому столітті була створена інфраструктура в його східній частині, а тепер, взявши його під контроль, ми будемо розвивати дорожню мережу і в інших регіонах, сприяючи процвітанню нашого народу."
  rise_of_the_ottomans.213.historical_info: "Анатолійський колісний шлях, що з'єднував Конью, Ерзурум, Сівас і Табриз у XIII - XIV століттях, був найважливішим торговим і військовим маршрутом регіону. Ним возили такі товари, як чай і килими, а в 1243 році він відіграв ключову роль у поході султана Кейхюсрева II, що завершився Битва при Кьосе-дазі. Після того, як у 1289 році поблизу Ерзурума був побудований міст Чобан-деде, це місто перетворилося на великий центр торгівлі та постачання. Ця дорога, що з'єднувала імперії, культури та економіки, назавжди залишила слід в історії Анатолії."
  rise_of_the_ottomans.213.a: "Багатства Анатолії у нас на долоні?"
  control_of_the_erzurum_trunk_road_tt: "Якщо ми доб'ємося прямого контролю над #TOOLTIP:LOCATION,konya_tt,X #L Коньєю#!#!, #TOOLTIP:LOCATION,erzurum_tt,X #L Ерзурумом#!#!, #TOOLTIP:LOCATION,sivas_tt,X #L Сівасом#!#! або #TOOLTIP:LOCATION,tabriz_tt,X #L Табризом#!#!, наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] отримають [Concept('estate_privilege','станову привілегію')|e] «[ShowEstatePrivilegeName('trunk_road_to_erzurum_privilege')]».\n\nКожен наступний [Concept('location','район')|e], що перейшов під наш прямий контроль, додатково посилить цю [Concept('privilege','привілегію')|e]."
  rise_of_the_ottomans.214.title: "Монетні двори старого султанату"
  rise_of_the_ottomans.214.desc: "#TOOLTIP:LOCATION,konya_tt,X #L Конья#!#! та #TOOLTIP:LOCATION,sivas_tt,X #L Сівас#!#! виділяються тим, що в кожному з цих міст є [ShowBuildingTypeName('seljuk_mint')] — важливий символ багатства та влади. Під ритмічний стукіт молотків руда цінних металів перетворюється тут на монети, які ходять по всьому регіону. Ці монети прикрашені зображеннями лева та сонця, що символізують міць, незалежність та небесні сили, які направляють володарів та їхніх підданих. Стратегічно розташовані в самому центрі #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#!, ці монетні двори важливі не тільки для торгівлі. Це справжні інструменти влади, що підкоряють віддалені провінції волі свого господаря. Контроль над ними, що дає можливість впливати на економіку, фінансувати армії та втілювати в життя масштабні проєкти, життєво важливий для кожного, хто має намір правити цим регіоном."
  rise_of_the_ottomans.214.a: "Вони будуть нашими."
  silver_dirhams_explanation_tt: "У кожному з цих [Concept('locations','районів')|e] є [ShowBuildingTypeName('seljuk_mint')], що суттєво підвищує його цінність"
  rise_of_the_ottomans.214.historical_info: "Монетні двори в Сівасі та Коньї були центрами економічної та творчої думки. Тут карбували вражаючі срібні дирхами із зображенням лева та сонця. Хоча мусульманські традиції не схвалювали зображення живих істот, у цих монетах відбивалися культурний вплив та політичні символи. Лев і сонце зображували зв'язок з небом, сузір'я Лева, або символізували союз могутнього правителя та його наложниці. Крім своєї художньої цінності ці монети були інструментом економічного контролю: вони циркулювали по всій державі та нагадували підданим про владу Сельджуцького султанату. Ці монетні двори не тільки підживлювали торгівлю, а й допомагали поширювати владу, що робило їх важливим джерелом процвітання та стабільності в регіоні."
  rise_of_the_ottomans.215.title: "Велике тюркське переселення"
  rise_of_the_ottomans.215.desc: "Хоча більша частина #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! тепер перебуває під нашим контролем, ця земля все ще пам'ятає своє #L [GetCountry('BYZ').GetAdjective|l]#!е минуле і в багатьох важливих прибережних областях досі переважає [ShowCultureName('greek_culture')|l]а культура. Але змін уже не зупинити. Занепад Сельджуцького султанату і нескінченні #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольські#!#! навали змусили величезні маси #TOOLTIP:CULTUREGROUP,turkic_group,X #L тюркських#!#! поселенців покинути домівки й рушити на захід у пошуках нових земель та кращої долі. Вони чекають від нашої славної держави захисту та керівництва.\n\nЦе чудова нагода для нас змінити обличчя регіону, тому нам потрібно залучати переселенців, селити їх біля берегів #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! і їхніми силами зміцнювати там свою владу. З кожним новим поселенням регіон змінюватиметься, і з часом він стане серцем нашої зростаючої держави. Така тюркська присутність допоможе зміцнити нашу армію та адміністрацію і побудує для нашої держави міцний фундамент із вірних підданих зі спільним з нами корінням."
  rise_of_the_ottomans.215.historical_info: "На початку XIV століття на землі османів почали приходити великі маси переселенців, рухомі занепадом держави сельджуків та розширенням влади османів. Наприкінці XIII століття сельджуцький Рум почав слабшати внаслідок нападів монголів, і багато тюркських племен, зокрема тюрки-огузи, почали переміщатися на захід, до Анатолії. Ці племена шукали нових земель та кращого життя і часто селилися на землях, які згодом увійшли до складу Османської імперії."
  rise_of_the_ottomans.215.a: "Ми приймемо їх з розпростертими обіймами!"
  enable_turkic_migration_tt: "Оскільки наш вплив в Анатолії сильно зріс, тепер нам доступна [Concept('action','дія')|e] #TOOLTIP:GENERIC_ACTION,invite_turkic_migration,X #L «Підтримати [ShowCultureGroupNameWithNoTooltip('turkic_group')|l]у міграцію»#!#! у рамках [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,rise_of_the_ottomans,X #L «Сходження турків»#!#!"
  rise_of_the_ottomans.216.title: "[target_culture.GetNameWithNoTooltip|U]і мігранти стікаються до провінції [target_province_destination.GetNameWithNoTooltip]"
  rise_of_the_ottomans.216.desc: "Серед #L [target_culture.GetName|l]ого#! населення провінції [target_province_origin.GetName] поширюються чутки про те, що в провінції [target_province_destination.GetName] на них чекає нове життя. Релігійні лідери та місцеві чиновники почали вмовляти сім'ї вирушити в дорогу, обіцяючи їм родючі землі, процвітання та можливість зміцнити присутність нашої культури в провінції. Таке переселення, якщо воно буде успішним, змінить склад обох провінцій і допоможе нам ще сильніше зміцнити контроль над нашими землями."
  rise_of_the_ottomans.216.a: "Ми приймемо їх з розпростертими обіймами!"
  target_province_destination_already_has_tt: "Оскільки в провінції [target_province_destination.GetName] вже діє [Concept('modifier', 'модифікатор')|e] «[ShowModifier('cultural_intermixing_modifier')]», його ефекти протягом наступних #Y 2 років діятимуть удвічі сильніше"
  rise_of_the_ottomans.217.title: "Новий удж-бей"
  rise_of_the_ottomans.217.desc: "Для зміцнення наших кордонів та захисту [ROOT.GetCountry.Custom('CF_RP')|l] від зовнішніх загроз, [target_character.GetName] [Select_CString(reza_abbasi.IsFemale, 'була призначена намісницею', 'був призначений намісником' )] #TOOLTIP:SUBJECT_TYPE,uc_bey,X #L удж-бея#!#! [target_country.GetName]. Для цієї мети [Select_CString(target_character.IsFemale, 'вона', 'він' )] підтримуватиме тут регулярне військо, керуватиме будівництвом та утриманням укріплень і забезпечуватиме спокій наших земель. Це призначення стане важливим кроком у зміцненні нашої оборони та влади в регіоні. Нехай [target_character.GetShortNameWithNoTooltip] служить нам з честю!"
  rise_of_the_ottomans.217.a: "[target_province.GetNameWithNoTooltip] у надійних руках."
  uc_bey_spawns_tt: "[target_country.GetLongName] захищатиме наші кордони в провінції [target_province.GetName]"
  create_uc_bey_tt: "Зазначена [Concept('province','провінція')|e] перейде у власність нового #TOOLTIP:SUBJECT_TYPE,uc_bey,X #L удж-бея#!#!"
  rise_of_the_ottomans.218.title: "В Анатолії зростає наш торговельний вплив"
  rise_of_the_ottomans.218.desc: "Наші нещодавні завоювання в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! рішучим чином змінили розстановку сил у всьому регіоні. Внаслідок наших останніх походів ми здобули контроль над частиною знаменитої дороги на [ShowLocationName('erzurum')] разом із розташованим на ній важливим торговельним вузлом. Такий розвиток подій без сумнівів утвердить наші позиції під час #TOOLTIP:SITUATION,rise_of_the_ottomans,X #L сходження турків#!#! і, можливо, захистить наш народ від іноземних вторгнень.\n\nНа додаток до цього наші [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] домагаються передачі їм влади над цими важливими торговельними вузлами вздовж дороги, що забезпечить нам серйозний дохід ціною їхнього зрослого впливу. Це складне питання, і, можливо, [target_character.GetName] не ризикне накликати на себе гнів цього стану — інакше [Select_CString(target_character.IsFemale, 'її', 'його' )] влада може похитнутися."
  rise_of_the_ottomans.218.b: "Ми не можемо допустити зростання їхнього впливу!"
  rise_of_the_ottomans.400.title: "Балканські війни"
  rise_of_the_ottomans.400.desc: "Наше панування в #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! незаперечне. Ті, хто колись намагався кинути нам виклик, нині боягузливо ховаються за своїми стінами.\n\nДеякі пояснюють нашу стрімко зростаючу міць божественним втручанням, однак не можна применшувати заслуги нашої доблесної армії. Радники вважають, що поки в нас є сили та можливості, потрібно провести військові походи на #TOOLTIP:REGION,balkan_region,X #L Балкани#!#!."
  rise_of_the_ottomans.400.a: "Снаряди наших гармат затьмарять сонце!"
  tur_press_claims_expanded_tt: "Поки ми безпосередньо контролюємо #Y 120#! [Concept('locations', 'районів')|e] на Балканах і маємо там присутність, [Concept('action', 'дія')|e] #TOOLTIP:GENERIC_ACTION,press_claims,X #L «Нав'язування претензій»#!#! під час [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,rise_of_the_ottomans,X #L «Сходження турків»#!#! #italic також#! дозволяє нам формулювати [Concept('casus_bellis', 'приводи для війни')|e] проти будь-якої [Concept('provinces', 'провінції')|e] в цьому регіоні"
  rise_of_the_ottomans.500.title: "Турецький застій"
  rise_of_the_ottomans.500.desc: "Політичних підступів та дипломатичних ігор виявилося недостатньо, щоб мрії про завоювання та розширення кордонів стали дійсністю. Ми вперлися в межу своїх сил, і після десятиліть застою хода колись грізних військ #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! застигла. Кордони наші залишилися незмінними. Чужоземці виявилися сильнішими — вони змогли погасити той вогонь, що колись палахкотів усередині нас, і тепер мало хто вже скаже, що ми заслуговуємо вважати себе великою державою.\n\nСтановище наше хистке. Зрив усіх задумів не залишився непоміченим — пильні вороги обов'язково спробують розхитати нашу країну. Лише час покаже, чи зможемо ми пережити ці часи, чи ж нам відведена роль виноски на полях підручника історії."
  rise_of_the_ottomans.500.a: "Сумний поворот."
  rise_of_the_ottomans.600.title: "Класична епоха держави [ROOT.GetCountry.GetLongNameWithNoTooltip]"
  rise_of_the_ottomans.600.desc: "Урочисто гуркочуть військові барабани, і #L #L [GetCountry('TUR').GetAdjective|l]#!і#! знамена розвіваються по всьому континенту. Наші могутні армії розгромили #ONCLICK:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BYZ').Custom('CL_tt')],X [GetCountry('BYZ').Custom('CL_VP')|L]#!#!, упокорили бейликів #TOOLTIP:REGION,anatolia_region,X #L Анатолії#!#! і взяли штурмом фортеці #TOOLTIP:RELIGIONGROUP,christian,X #L християн#!#!, змінивши своєю силою історію. [target_character.GetName] тепер — [Select_CString(target_character.IsFemale, 'незаперечна володарка', 'незаперечний володар' )] цих обширних земель, [Select_CString(target_character.IsFemale, 'захисниця', 'захисник' )] #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламу#!#! і [Select_CString(target_character.IsFemale, 'покровителька', 'покровитель' )] найсвятіших міст нашої віри.\n\nМечем ми підкорили ці землі. Правити ж ними ми будемо законом. [ROOT.GetCountry.GetFlavorRank] переходить від завоювань до золотої епохи управління: у великих залах [target_location.Custom('LR_RP')|l] [target_location.GetName] зберуться вчені, зодчі та сановники, які побудують нову державу на багато століть. Настав час покращити наше володіння — тепер ми не просто завойовники, а й будівничі багатовікового майбутнього."
  rise_of_the_ottomans.600.historical_info: "Епоха розквіту Османської імперії тривала приблизно з 1453 по 1600 роки. У цей час держава досягла вершини своєї військової, політичної та культурної могутності. За влади султанів Мехмеда II, Селіма I та Сулеймана Пишного османи завоювали землі в Європі, на Близькому Сході та в Північній Африці, перемігши візантійців, мамлюків та угорців. Їхня могутність трималася на централізованій владі, зводі законів #italic Канун-наме#! та військових нововведеннях на кшталт яничарів. Стамбул став столицею імперії, містом грандіозних мечетей та культурного прогресу. Імперія контролювала важливі торговельні шляхи, панувала на Середземному морі та стала халіфатом, релігійним і політичним лідером ісламського світу."
  rise_of_the_ottomans.600.a: "#italic Тепер ми — [ROOT.GetCountry.GetGovernment.GetRulerTitle] земель і морів, тінь Аллаха на землі.#!"
  we_are_now_empire_tt: "Ми приймаємо [Concept('country_rank','ранг держави')|e] #TOOLTIP:COUNTRY_RANK,rank_empire,X #L імперії#!#!"