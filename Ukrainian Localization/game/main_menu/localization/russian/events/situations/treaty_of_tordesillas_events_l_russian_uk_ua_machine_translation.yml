l_russian:
  treaty_of_tordesillas.1.common_phrase: "може стати нашим конкурентом у боротьбі за найродючіші землі та зручні гавані на #TOOLTIP:CONTINENT,america,X #L американському#!#! узбережжі.\n\nЯкщо нічого не вдіяти, суперництво двох великих держав переросте в кровопролитний конфлікт за торгові шляхи та джерела ресурсів."
  treaty_of_tordesillas.1.title: "Розділ світу"
  treaty_of_tordesillas.1.desc: "Нашу експансію в [target_location.Custom('LR_ACC')|l] [target_location.GetName] помітил[other_country_scope.Custom('endlong_fem')] [other_country_scope.GetLongName]. Ця країна також розширює свої володіння [other_country_colony_scope.Custom('end_predlog_vvo')] #ONCLICK:COUNTRY,[other_country_colony_scope.Custom('CL_tt')] #TOOLTIP:COUNTRY,[other_country_colony_scope.Custom('CL_tt')],X [other_country_colony_scope.Custom('CL_PREP')|L]#!#! і $treaty_of_tordesillas.1.common_phrase$ Щоб уникнути протистояння, варто організувати дипломатичну зустріч, де державні діячі обох країн зможуть розділити нові землі по справедливості та до взаємного задоволення."
  treaty_of_tordesillas.1.historical_info: "Тордесільяський договір був укладений 7 червня 1494 року в кастильському місті Тордесільяс. Його підписали посли Ізабелли I Кастильської, Фердинанда II Арагонського та короля Португалії Жуана II. Щоб уникнути майбутніх конфліктів, сторони домовилися розділити нещодавно відкриті землі Нового Світу та води Атлантичного океану по уявній лінії, що пролягає за 370 миль на захід від Кабо-Верде.\n\nПрава на землі, що лежать на захід від цієї лінії, переходили до Кастилії, а землі на схід від неї проголошувалися законним володінням Португалії. Думки корінних народів, що проживали на цих територіях, ніхто не спитав."
  treaty_of_tordesillas.1.a: "[capital_scope.GetNameWithNoTooltip] — найкраще місце для організації переговорів."
  treaty_of_tordesillas.1.b: "Зустріч відбудеться у них в столиці, в місті [other_capital_scope.GetNameWithNoTooltip]."
  treaty_of_tordesillas.1.c: "Найбільш підходяще місце — це [random_location_scope.GetNameWithNoTooltip]."
  treaty_of_tordesillas.1.d: "Найкраще підійде поселення в Америці, наприклад [american_location_scope.GetNameWithNoTooltip]."
  treaty_of_tordesillas.1.e: "[border_location_scope.GetNameWithNoTooltip] — найзручніше місце для обох країн."
  treaty_of_tordesillas.2.desc: "[first_country_scope.GetLongName] — ця країна все-таки звернула увагу на нашу експансію в #L [other_country_colony_scope.GetAdjective|l]і#! землі, а ще вона також розширює свої володіння в [target_location.Custom('LR_PREP')|l] [target_location.GetName] — і $treaty_of_tordesillas.1.common_phrase$ Щоб уникнути протистояння, їхня влада пропонує влаштувати дипломатичну зустріч у [chosen_location_scope.Custom('LR_PREP')|l] [chosen_location_scope.GetName], щоб державні діячі обох країн розділили нові землі по справедливості та до взаємного задоволення."
  treaty_of_tordesillas.2.a: "Ми візьмемо участь у цій зустрічі."
  treaty_of_tordesillas.2.a.tt: "Нехай про це дізнаються всі #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! країни."
  treaty_of_tordesillas.3.title: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
  treaty_of_tordesillas.3.desc: "Після тривалих обговорень у [chosen_location_scope.Custom('LR_PREP')|l] [chosen_location_scope.GetName] [first_country_scope.GetLongName] та [other_country_scope.GetLongName] підписали договір, розділивши між собою всі нещодавно відкриті землі на #TOOLTIP:CONTINENT,america,X #L американському#!#! континенті.\n\nУгода, що увійшла в історію як [GetSituationByKey('treaty_of_tordesillas').GetName], регулює їхні претензії на величезні території на новому континенті, при цьому посередником і гарантом у можливих суперечках призначається [GetInternationalOrganization('catholic_church').GetLeaderTitle|l]."
  treaty_of_tordesillas.3.desc_one_signatory: "Тривале обговорення [chosen_location_scope.GetRank.Custom('predlog_vvo')] #L #TOOLTIP:LOCATIONRANK,[chosen_location_scope.Custom('LR_tt')],X [chosen_location_scope.Custom('LR_PREP')|l]#!#! [chosen_location_scope.GetName] раптово завершилося. Тепер [first_country_scope.GetLongName] — єдина #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! країна, здатна донести слово #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#! до нещодавно відкритих земель на #TOOLTIP:CONTINENT,america,X #L американському#!#! континенті.\n\nУгода, що увійшла в історію як [GetSituationByKey('treaty_of_tordesillas').GetName], забезпечує #ONCLICK:COUNTRY,[first_country_scope.Custom('CL_tt')] #TOOLTIP:COUNTRY,[first_country_scope.Custom('CL_tt')],X [first_country_scope.Custom('CL_DAT')|L]#!#! повну підтримку Господа та [GetCountry('PAP').Custom('rank_ru_GEN')|l] у справі приєднання величезних територій на новому континенті."
  treaty_of_tordesillas.3.a: "За яким правом нам забороняють володіти землями, які ми відкрили?"
  treaty_of_tordesillas.3.b: "Нам не важливо, чим вони займаються за океаном."
  treaty_of_tordesillas.3.c: "Світ належатиме нам!"
  treaty_of_tordesillas.4.title: "Скасування Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
  treaty_of_tordesillas.4.desc: "За відсутності правозастосування колись впливовий [GetSituationByKey('treaty_of_tordesillas').GetName], як і багато непопулярних та застарілих законодавчих актів до нього, перетворився на марний папірець.\n\nЙого творці, [first_country_scope.GetLongName] та [other_country_scope.GetLongName], навряд чи раді такому результату, але що поробиш — навіть їхні власні колонії використовували будь-які можливості, щоб обійти накладені на них обмеження."
  treaty_of_tordesillas.4.a: "Час починати експансію!"
  treaty_of_tordesillas.4.b: "Ми ніколи не підкорялися цій деспотичній угоді."
  treaty_of_tordesillas.4.c: "Неважливо, за ним підуть інші договори."
  treaty_of_tordesillas.4.d: "Ми більше не потребуємо цієї угоди."
  treaty_of_tordesillas.5.title: "[actor.GetAdjectiveWithNoTooltip]і вимоги"
  treaty_of_tordesillas.5.desc: "[actor.GetLongName] — влада цієї країни через свого посла передала нам абсолютно обурливу вимогу: вони стверджують, що Договір [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip] дає їм право на колонізацію провінції [selected_province.GetName] та владу над нею, хай навіть ці землі зараз належать нам.\n\nВід нас наполегливо вимагають негайно передати зазначені володіння, інакше наслідки будуть жахливі."
  treaty_of_tordesillas.5.a: "На жаль, доведеться погодитися."
  treaty_of_tordesillas.5.b: "Ми не готові прийняти такий деспотичний ультиматум."
  treaty_of_tordesillas.5.c: "Відправимо послання [overlord.Custom('CL_DAT')]: нехай прийдуть нам на допомогу."
  treaty_of_tordesillas.6.title: "Поправка до Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
  treaty_of_tordesillas.6.desc: "[actor.GetLongName] звернув[actor.Custom('endlong_assya')] до нас із пропозицією. Правителям цієї країни відомо, що ми висуваємо претензії на область [target_recipient_area.GetName], яка становить інтерес і для них. Вона також межує з іншою областю [target_actor_area.GetName], на яку висувають претензії вони самі.\n\nНам запропонували обмінятися претензіями: ми висунемо претензію на область [target_actor_area.GetNameWithNoTooltip], а їхня країна — на область [target_recipient_area.GetNameWithNoTooltip].\n\nВід подібної дружньої пропозиції можна й відмовитися, але навряд чи наша відмова буде сприйнята з великою радістю."
  treaty_of_tordesillas.6.a: "Ми приймаємо цю пропозицію."
  treaty_of_tordesillas.6.b: "Ні, це просто безглуздо."
  treaty_of_tordesillas.7.title: "Великий обмін"
  treaty_of_tordesillas.7.desc: "[actor.GetLongName] — влада цієї країни звернулася до нас із незвичайною пропозицією обмінятися умовленими сторонами світу, які кожна з наших країн отримає після закріплення Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip].\n\nЗміни такого масштабу слід ретельно обміркувати: наслідки для статус-кво можуть бути найсерйознішими."
  treaty_of_tordesillas.7.a: "Нам нема чого боятися! Погодимося на пропозицію."
  treaty_of_tordesillas.7.a.tt: "[GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName] обміняються умовленими сторонами світу, які отримає кожна з країн"
  treaty_of_tordesillas.7.b: "Ми не приймемо такої безглуздої пропозиції."