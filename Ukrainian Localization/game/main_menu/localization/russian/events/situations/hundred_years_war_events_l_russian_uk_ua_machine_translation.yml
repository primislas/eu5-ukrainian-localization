l_russian:
  hundred_years_war.1.title: "Столітня війна"
  hundred_years_war.1.desc: "[GetCountry('ENG').GetLongName] та [GetCountry('FRA').GetLongName] довго ворогували одна з одною, але в [GetCurrentYear] році напруга між двома державами досягла межі. Приводом для відкритого протистояння стали претензії на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий престол та давні територіальні суперечки. Так почалася #TOOLTIP:SITUATION,hundred_years_war,X #L Столітня війна#!#!.\n\nТепер обидві країни готуються до затяжного конфлікту, який визначить долю #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західної Європи#!#!. Весь світ спостерігає за двома титанами, які ось-ось вступлять у неминучу запеклу сутичку."
  hundred_years_war.1.a: "Будемо сподіватися, що конфлікт скоро закінчиться…"
  hundred_years_war_tt: "[GetCountry('ENG').GetLongName] та [GetCountry('FRA').GetLongName] вступили в #TOOLTIP:SITUATION,hundred_years_war,X #L Столітню війну#!#!. У цій [Concept('situation', 'ситуації')|e] ми можемо виступити на боці будь-якої з ворогуючих держав — або залишитися осторонь конфлікту"
  explain_subject_interactions_tt: "Як [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]их [Concept('subject', 'ленників')|e], нас можуть закликати на захист сюзерена — це залежить від нашої [Concept('subject_loyalty', 'лояльності')|e]. Поки [Concept('situation', 'ситуація')|e] зберігається, на панелі [Concept('situation', 'ситуації')|e] можуть стати доступними особливі [Concept('actions', 'дії')|e], такі як #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L «[GetCountry('FRA').GetLongNameWithNoTooltip] — вимога автономії від цієї держави»#!#! та #TOOLTIP:GENERIC_ACTION,demand_appanage_promotion,X #L «Вимога підвищення до апанажу»#!#!"
  hundred_years_war_historical_info: "Столітня війна (1337–1453) — довгий і кровопролитний конфлікт між Англією та Францією, викликаний претензією англійського короля на французьку корону. Свою претензію він виправдовував тим, що престол має належати йому як спадкоємцю по материнській лінії, що, однак, було неможливо за законами Франції. Олії у вогонь підливала наявність в Англії володінь на території Франції, що становили інтерес і для останньої. Протистояння двох країн вилилося в низку війн, зрад і недовготривалих союзів, що тривала понад століття і назавжди змінила геополітичний ландшафт Західної Європи."
  hundred_years_war.2.title: "Корона [GetCountry('FRA').Custom('CL_GEN')]"
  hundred_years_war.2.desc: "#L [GetCountry('FRA').GetAdjective|U]і#! влада стверджує, що за їхнім #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічним законом#!#! [GetCountry('FRA').GetGovernment.GetRulerTitle|l] [GetCountry('FRA').Custom('CL_GEN')] тепер — це [GetCharacter('fra_philip_vi_valois').GetName], а не [GetCharacter('eng_edward_iii').GetName], чия мати [GetCharacter('eng_isabella_of_france').GetName] є рідною сестрою [Select_CString(GetCharacter('fra_charles_iv_capet').IsFemale, 'французької королеви', 'французького короля' )] на ім'я [GetCharacter('fra_charles_iv_capet').GetName]."
  hundred_years_war.2.a: "Ми — [GetCountry('FRA').GetGovernment.GetRulerTitle|l] [GetCountry('FRA').Custom('CL_GEN')] по праву"
  explain_eng_interactions_tt: "На панелі [Concept('situation', 'ситуації')|e] стануть доступними особливі [Concept('actions', 'дії')|e], такі як #TOOLTIP:GENERIC_ACTION,fra_diplomacy_with_subjects,X #L присвоєння титулів ленникам#!#! та #TOOLTIP:GENERIC_ACTION,request_papal_delegates,X #L запит [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатів#!#!"
  hundred_years_war.3.title: "Корона [GetCountry('FRA').Custom('CL_GEN')]"
  hundred_years_war.3.desc: "[GetCountry('ENG').GetGovernment.GetRulerTitle|U] #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! [GetCountry('FRA').GetLongName] — ця держава обирає спадкоємців престолу згідно з #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічним законом#!#!. [target_eng_ruler.GetName] не бажає погоджуватися з цим. [GetCountry('ENG').GetAdjectiveWithNoTooltip|U]а сторона стверджує, що [target_eng_ruler.GetName] має більше прав на престол, оскільки є спадкоємцем володінь, якими колись керувала [GetCharacter('eng_isabella_of_france').GetName] (покійний [GetCharacter('fra_charles_iv_capet').GetName] був їй братом). [GetCharacter('fra_philip_vi_valois').GetName] ж — більш далекий родич, а тому [GetCountry('ENG').GetGovernment.GetCourtTitle|l] [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ої держави вважає такий порядок престолонаслідування попранням справедливості та вагомим приводом для війни!"
  hundred_years_war.3.a: "[GetCountry('ENG').Custom('CL_INST')] правлять повні дурні!"
  explain_fra_interactions_tt: "На панелі [Concept('situation', 'ситуації')|e] стануть доступними особливі [Concept('actions', 'дії')|e], такі як #TOOLTIP:GENERIC_ACTION,influence_french_subject,X #L вплив на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого ленника#!#! та #TOOLTIP:GENERIC_ACTION,request_papal_delegates,X #L запит [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатів#!#!"
  hundred_years_war.10.title: "Питання залишається невирішеним"
  hundred_years_war.10.desc: "Ми, як і раніше, не згодні з #L [GetCountry('FRA').GetAdjective|l]им#! вибором наступного правителя #TOOLTIP:REGION,france_region,X #L Франції#!#!. Ми впевнені у своїй правоті та зможемо довести її на полі бою."
  hundred_years_war.10.a: "Ми — [GetCountry('FRA').GetGovernment.GetRulerTitle|l] [GetCountry('FRA').Custom('CL_GEN')] по праву"
  hundred_years_war.11.title: "Підступний Альбіон!"
  hundred_years_war.11.desc: "У #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! досі під контролем частина #TOOLTIP:REGION,france_region,X #L Франції#!#!. Це явно суперечить Божому задуму. Ми повинні вигнати англійців з нашої країни!"
  hundred_years_war.11.a: "[GetCountry('ENG').Custom('CL_INST')] правлять повні дурні!"
  hundred_years_war.20.title: "Саме час для війни"
  hundred_years_war.20.desc: "Ми претендуємо на #L [GetCountry('FRA').GetAdjective|l]ий#! трон і готові утвердити своє панування в регіоні.\nНастав час порушити мирну угоду та відновити Столітню війну. [GetCountry('FRA').GetLongNameWithNoTooltip] — конфлікт з цією державою знову загострився і скоро перейде в гарячу фазу."
  hundred_years_war.20.a: "Хай буде війна!"
  hundred_years_war.20.b: "Зараз невідповідний час"
  hundred_years_war.21.title: "Саме час для війни"
  hundred_years_war.21.desc: "Ми повинні позбутися #L [GetCountry('ENG').GetAdjective|l]ої#! присутності у #TOOLTIP:REGION,france_region,X #L Франції#!#!. Настав час порушити мирну угоду та відновити Столітню війну. [GetCountry('ENG').GetLongNameWithNoTooltip] — конфлікт із цією державою знову загострився і скоро перейде у гарячу фазу."
  hundred_years_war.21.a: "Хай буде війна!"
  hundred_years_war.21.b: "Зараз невідповідний час"
  hundred_years_war.100.title: "Столітня війна закінчується перемогою [GetCountry('ENG').Custom('CL_GEN')]"
  hundred_years_war.100.desc: "[GetCountry('ENG').GetLongName] — переможець у тривалому конфлікті, що увійшов в історію під назвою «Столітня війна». Така перемога стала результатом неймовірного збігу обставин. #L [GetCountry('FRA').GetAdjective|U]і#! влада була змушена визнати територіальні претензії [GetCountry('ENG').Custom('CL_GEN')] і піти на серйозні поступки. Перемога підвищила престиж [GetCountry('ENG').Custom('CL_GEN')] та посилила вплив цієї держави.\n\nТепер у [GetCountry('ENG').Custom('CL_GEN')] з'явився шанс зміцнити свою владу у #TOOLTIP:REGION,france_region,X #L Франції#!#! та захистити нещодавно завойовані землі. Весь світ хоче знати, як [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]а влада розпорядиться своєю силою в регіоні."
  hundred_years_war.100.a: "Це було очікувано."
  hundred_years_war.101.title: "Столітня війна закінчується перемогою [GetCountry('FRA').Custom('CL_GEN')]"
  hundred_years_war.101.desc: "За щасливим збігом обставин [GetCountry('FRA').GetLongName] — країна-переможниця у важкій та затяжній #TOOLTIP:SITUATION,hundred_years_war,X #L Столітній війні#!#!. [GetCountry('ENG').GetLongName] — ця держава тепер вимушено визнає територіальну цілісність [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої сторони, а заодно йде на деякі серйозні поступки. Цей тріумф значно підвищив престиж [GetCountry('FRA').Custom('CL_GEN')] та її вплив на #TOOLTIP:CONTINENT,europe,X #L європейській#!#! сцені.\n\nТепер [target_char.GetName] може спробувати об'єднати відвойовані території та зміцнити королівську владу і статус своєї країни як головної держави регіону."
  hundred_years_war.101.a: "Це було очікувано."
  hundred_years_war.101.b: "Та кому потрібна ця ваша Європа?"
  hundred_years_war.101_tt: "[Concept('situation', 'Ситуація')|e] #TOOLTIP:SITUATION,hundred_years_war,X #L «Столітня війна»#!#! завершується"
  hundred_years_war.200.title: "[fugitive_robert_de_artois.GetNameWithNoTooltip] тікає на територію [GetCountry('ENG').Custom('CL_GEN')]"
  hundred_years_war.200.desc: "[GetCountry('ENG').GetGovernment.GetRuler.GetName] з #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! дає притулок опальному лорду на ім'я [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortName], [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'яку', 'якого' )] [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] вже кілька років збирається судити за підробку документів та спробу захоплення території під назвою [GetCountry('ARS').GetLongName]. [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] — правитель [GetCountry('ENG').Custom('CL_GEN')], однак [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortName] також #L [GetCountry('AQN').GetAdjective|l][Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'а володарка', 'ий володар' )]#! і наш васал завдяки володінню #ONCLICK:COUNTRY,[GetCountry('AQN').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('AQN').Custom('CL_tt')],X [GetCountry('AQN').Custom('CL_INST')|L]#!#!. [GetCountry('AQN').GetLongNameWithNoTooltip] — переховування на цій території [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'втікачки', 'втікача' )] стане приводом для вторгнення, якщо [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] відмовиться [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale,'її', 'його')] видати. Однак якщо [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ий [GetCountry('ENG').GetGovernment.GetCourtTitle|l] отримає таку завуальовану погрозу на свою адресу, це загрожує загостренням конфлікту."
  hundred_years_war.200.a: "Вимагатимемо, щоб [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] видав біглого лорда."
  hundred_years_war.200.b: "[GetCountry('ENG').GetGovernment.GetCourtTitle|U] [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ої держави не потерпить провокацій."
  hundred_years_war.201.title: "[GetCountry('FRA').GetNameWithNoTooltip] вимагає, щоб [fugitive_robert_de_artois.GetNameWithNoTooltip] [Select_CString(fugitive_robert_de_artois.IsFemale, 'була повернена', 'був повернений' )] до країни"
  hundred_years_war.201.desc: "#L [GetCountry('FRA').GetAdjective]ий#! [GetCountry('FRA').GetGovernment.GetRulerTitle|l] вимагає, щоб [SCOPE.sCharacter('fugitive_robert_de_artois').GetName], [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'яка знайшла притулок при нашому дворі і якій', 'який знайшов притулок при нашому дворі і якому' )] довіряє [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l], [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'була відправлена', 'був відправлений' )] на батьківщину. Якщо ми ослухаємося, [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий [GetCountry('FRA').GetGovernment.GetRulerTitle|l] може конфіскувати територію під назвою [GetCountry('AQN').GetLongName].\n\nПід час свого перебування при [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ому дворі [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'стверджувала', 'стверджував' )], що [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'повинна стати законною правителькою', 'повинен стати законним правителем' )] [GetCountry('FRA').Custom('CL_GEN')] завдяки своїй матері, оскільки [GetCharacter('eng_isabella_of_france').GetName], походить з роду Капетингів, і що рішення перів, завдяки якому [GetCharacter('fra_philip_vi_valois').GetName] [Select_CString(GetCharacter('fra_philip_vi_valois').IsFemale, 'зійшла', 'зійшов' )] на трон [GetCountry('FRA').Custom('CL_GEN')], керуючись #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічним законом#!#!, було несправедливим, а отже, у нас є привід претендувати на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий трон."
  hundred_years_war.201.a: "[GetCountry('FRA').GetAdjectiveWithNoTooltip|U]ий [GetCountry('FRA').GetGovernment.GetRulerTitle|l] нам не указ. Почнемо підготовку до нападу на [GetCountry('FRA').Custom('CL_ACC')]."
  hundred_years_war.201.b: "Ми повинні дотримуватися усталеного статус-кво. [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] буде [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'передана', 'переданий' )] Франції."
  hundred_years_war.202.title: "[GetCountry('ENG').GetNameWithNoTooltip] відповідає відмовою: [fugitive_robert_de_artois.GetNameWithNoTooltip] не буде [Select_CString(fugitive_robert_de_artois.IsFemale, 'видана', 'виданий' )]"
  hundred_years_war.202.desc: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetName] залишається в Англії — #L [GetCountry('ENG').GetAdjective|l]ий#! [GetCountry('ENG').GetGovernment.GetCourtTitle|l] відмовляється видати [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'злочинницю', 'злочинця' )], хоча ми попереджали, що в разі непокори територія під назвою [GetCountry('AQN').GetLongName] буде захоплена. Ймовірно, [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]і лорди готуються до війни проти [GetCountry('FRA').Custom('CL_GEN')], щоб відбити наш напад на [GetCountry('AQN').Custom('CL_ACC')] або навіть захопити [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий трон!"
  hundred_years_war.202.a: "[GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] відмовляє нам. Підняти прапор війни!"
  hundred_years_war.202.b: "Не будемо провокувати конфлікт проти [GetCountry('ENG').Custom('CL_GEN')]."
  hundred_years_war.203.title: "[fugitive_robert_de_artois.GetNameWithNoTooltip] [Select_CString(fugitive_robert_de_artois.IsFemale, 'видана', 'виданий' )] [GetCountry('ENG').Custom('CL_INST')]"
  hundred_years_war.203.desc: "#L [GetCountry('ENG').GetAdjective]ий#! [GetCountry('ENG').GetGovernment.GetCourtTitle|l] погоджується передати нам [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'втікачку', 'втікача' )], і [SCOPE.sCharacter('fugitive_robert_de_artois').GetName] повертається на територію #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!. Капкан зачинився. [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] постане перед обличчям правосуддя, відповідаючи за свої злочини та спробу захоплення території під назвою [GetCountry('ARS').GetLongName]. [GetCountry('FRA').GetGovernment.GetRulerTitle] [GetCharacter('fra_philip_vi_valois').GetName] зрадіє такому результату."
  hundred_years_war.203.a: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'повинна', 'повинен' )] вирушити за ґрати."
  hundred_years_war.203.b: "Покарання за такі злочини — смерть. Стратити [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale,'її', 'його')]!"
  hundred_years_war.203.c: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] спокутує свою провину; [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] нашої держави — найвідповідніша для цього служба."
  hundred_years_war.203.d: "[fugitive_robert_de_artois.GetShortName] [Select_CString(fugitive_robert_de_artois.IsFemale, 'вчинила', 'вчинив' )] правильно. Якщо [GetCountry('ARS').GetLongNameWithNoTooltip] у його владі, то це правильно!"
  hundred_years_war.204.title: "[fugitive_robert_de_artois.GetNameWithNoTooltip] та [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]а корона"
  hundred_years_war.204.desc: "Після прибуття на територію #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! [SCOPE.sCharacter('fugitive_robert_de_artois').GetName] [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'стала довіреною королівською радницею', 'став довіреним королівським радником' )]. [GetCountry('ENG').GetGovernment.GetRuler.GetShortName] високо цінує таку дружбу. Однак останнім часом [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] усе частіше порушує питання про #L [GetCountry('ENG').GetAdjective|l]е#! престолонаслідування. Як відомо, у 1328 році на трон [Select_CString(GetCharacter('fra_philip_vi_valois').IsFemale, 'зійшла', 'зійшов' )] [GetCharacter('fra_philip_vi_valois').GetName] згідно з #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічним законом#!#!. [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip] [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'була змушена', 'був змушений' )] піти на поступки і, попри початкову відмову від своїх претензій на корону, [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'переглянула', 'переглянув' )] своє рішення після того, як відносини між [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]им та [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]им дворами почали псуватися. Тепер [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] намагається довести, що [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]і аристократи скористалися Салічною правдою незаконно і трон [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'повинна зайняти', 'повинен зайняти' )] [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l]. Крім того, [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] претендує на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]у територію під назвою [GetCountry('ARS').GetLongName] і може стати [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'цінною союзницею', 'цінним союзником' )], якщо спробує захопити [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий трон."
  hundred_years_war.204.a: "Династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetNameWithNoTooltip] зійде на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ий престол!"
  hundred_years_war.204.b: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip], звісно, говорить правду, але було б нерозумно розв'язувати війну проти [GetCountry('FRA').Custom('CL_GEN')]."
  hundred_years_war.204.c: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] принесе війну на територію [GetCountry('ENG').Custom('CL_GEN')]. Стратити [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale,'її', 'його')]!"
  hundred_years_war.205.title: "Володар [GetCountry('ARS').Custom('CL_GEN')]"
  hundred_years_war.205.desc: "У ході недавньої війни проти #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! ми здобули частину території під назвою [GetCountry('ARS').GetLongName], на яку претендує [SCOPE.sCharacter('fugitive_robert_de_artois').GetName]. [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'надала', 'надав' )] нам безцінну допомогу. Можливо, нам варто пожалувати [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'їй', 'йому' )] щойно завойовані території."
  hundred_years_war.205.a: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] — їх [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'законна правителька', 'законний правитель' )]."
  hundred_years_war.205.b: "Нехай [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] править цими землями, але ми збережемо контроль над Кале."
  hundred_years_war.205.c: "Ми будемо самі правити цими землями."
  hundred_years_war.206.title: "Вимоги [actor.Custom('CL_GEN')]"
  hundred_years_war.206.desc: "Настав час вимагати від #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! особливих привілеїв для наших володінь. Зараз у нас є унікальна можливість натиснути на сюзерена, домогтися більшої автономії та отримати політичні, економічні та військові переваги. Питання лише в тому, як вчинить [target_character2.GetName]. Чи піде [Select_CString(target_character2.IsFemale,'вона', 'він')] на ризик, розуміючи, що в разі відмови ми можемо прийняти #L [GetCountry('ENG').GetAdjective|l]е#! покровительство?"
  hundred_years_war.206.a: "Вимагатимемо зниження виплат та символічні дари!"
  hundred_years_war.206.b: "Нам потрібне право розширювати свої володіння за рахунок інших ленників."
  hundred_years_war.206.c: "Нам потрібне звільнення від участі в майбутніх наступальних війнах."
  hundred_years_war.206.d: "Це все ні до чого."
  hundred_years_war.207.title: "[actor.GetNameWithNoTooltip] вимагає [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]ого посередництва"
  hundred_years_war.207.desc: "Війна між #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! занадто довго шкодить усьому #TOOLTIP:RELIGIONGROUP,christian,X #L християнському#!#! світу. Як глашатаї #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! віри, ми повинні покласти край кровопролиттю. Видамо буллу, що закликає обидві держави скласти зброю та укласти міцний мир в ім'я віри та єдності. Поки важко сказати, чи прислухаються до нас їхні правителі, чи будуть упиратися в руйнівній гордині."
  hundred_years_war.207.a: "Покінчимо з безглуздим насильством однією священною буллою!"
  hundred_years_war.207.b: "Ми не можемо втручатися в це протистояння."
  hundred_years_war.208.desc: "[target_character1.GetName] вимагає від нас особливих привілеїв для #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!. [Select_CString(target_character1.IsFemale,'Вона', 'Він')] розраховує домогтися більшої автономії та отримати різноманітні політичні, економічні та військові переваги. Ці вимоги — прямий виклик #L [GetCountry('FRA').GetAdjective|l]ій#! владі, і [target_character2.GetName] [Select_CString(target_character2.IsFemale,'повинна', 'повинен')] вирішити, як краще на них відповісти. Якщо ми підемо на надмірні поступки, [actor.GetName] може стати легкою здобиччю для #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#!…"
  hundred_years_war.208.a: "Досить і символічного подарунка."
  hundred_years_war.208.b: "Доведеться змиритися з їхньою агресивною експансією."
  hundred_years_war.208.c: "Ми повинні погодитися."
  hundred_years_war.208.d: "Ніколи!"
  scope_actor_allowed_to_attack_other_subjects_of_fra_tt: "Вони на #Y 20 років#! отримають право оголошувати війну іншим ленникам без нашого втручання"
  scope_actor_exempted_from_offensive_wars_tt: "[actor.GetNameWithNoTooltip] на #Y 20 років#! отрим[actor.Custom('aye')] звільнення від участі в будь-яких наступальних війнах, розпочатих [GetCountry('FRA').Custom('CL_INST')]"
  hundred_years_war.209.title: "[actor.GetNameWithNoTooltip] пропону[actor.Custom('end_etyut')] [target_subject.Custom('CL_DAT')] угоду"
  hundred_years_war.209.desc: "[GetCountry('ENG').GetName] пропону[GetCountry('ENG').Custom('end_etyut')] нам, ленникам #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!, відвернутися від свого сюзерена. Якщо ми відмовимося брати участь в оборонних війнах [GetCountry('FRA').Custom('CL_GEN')], нас щедро винагородять за нейтралітет. Прийнявши цю пропозицію, ми отримаємо багатство та гарантуємо свою безпеку… але що стане з нашою честю?"
  hundred_years_war.209.a: "Ми приймемо їхнє пожертвування."
  hundred_years_war.209.b: "Ми ніколи не зрадимо свого сюзерена!"
  england_wont_request_for_at_least_x_years_tt: "[actor.GetName] не буд[actor.Custom('end_etut')] звертатися до нас із такою пропозицією ще як мінімум #Y 3#! роки"
  hundred_years_war.210.title: "[actor.GetAdjectiveWithNoTooltip]ий вплив"
  hundred_years_war.210.desc: "Ми отримали офіційну петицію від #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!. [target_character1.GetName] вимагає від #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! визнати [Select_CString(target_character1.IsFemale, 'її', 'його' )] володіння #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанажем#!#!. [Select_CString(target_character1.IsFemale, 'Вона', 'Він' )] сподівається здобути більшу незалежність, не втрачаючи при цьому зв'язків із [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ою короною. Погодившись дарувати [Select_CString(target_character1.IsFemale, 'їй', 'йому' )] цей статус, ми зможемо стабілізувати відносини, однак це створить небезпечний прецедент для інших наших васалів."
  hundred_years_war.210.a: "Приймемо їхні вимоги."
  hundred_years_war.210.b: "Ми змушені відмовитися."
  inherit_in_case_of_no_heir_tt: "Ми негайно отримаємо владу над #ONCLICK:COUNTRY,[actor.GetName.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.GetName.Custom('CL_tt')],X [actor.GetName.Custom('CL_ТP')|L]#!#!, якщо [Concept('ruler', 'правитель')|e] цієї держави помре, не залишивши [Concept('heir', 'спадкоємця')|e] з нашої [Concept('dynasty', 'династії')|e]"
  hundred_years_war.211.title: "Найманці #TOOLTIP:SITUATION,hundred_years_war,X #L Столітньої війни#!#!"
  hundred_years_war.211.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] сформувався загін найманців — «[target_merc.GetName]». Для таких, як вони, кровопролитна війна, що розгорілася між #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!, — чудова нагода поживитися. Загін складається з досвідчених бійців, здатних переломити хід конфлікту, і вони пропонують свої послуги тим, хто готовий заплатити більше."
  hundred_years_war.211.a: "Що ж, нехай помирають за наші гроші."
  hundred_years_war.211.b: "Ми не потребуємо їхньої допомоги."
  merc_company: "Загін найманців"
  root_mercenaries_name: "Невеликий загін найманців"
  larger_root_mercenaries_name: "Великий загін найманців"
  root_mercenaries_cav_name: "Змішаний загін найманців"
  genoese_mercs_name: "Загін лігурійських найманців"
  catalan_mercs_name: "Загін каталонських найманців"
  hundred_years_war.212.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] зупиняє конфлікт"
  hundred_years_war.212.desc: "Посланець із міста [GetCountry('PAP').GetCapital.GetName] щойно доставив звістку від Святого Престолу. [GetCountry('PAP').GetGovernment.GetRulerOrRegent.GetName] [Select_CString(GetCountry('PAP').GetGovernment.GetRulerOrRegent.IsFemale,'видала', 'видав')] буллу, що наказує зупинити бойові дії між #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!. Війна, що так довго спустошувала наші землі та завдала немислимих страждань нашим підданим, повинна негайно припинитися."
  hundred_years_war.212.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  hundred_years_war.212.b: "Нехай [GetCountry('PAP').GetGovernment.GetRulerTitle|l] іде до біса! Війна триватиме!"
  armies_demoralized_tt: "[Concept('morale', 'Бойовий дух')|e] наших [Concept('armies', 'армій')|e] постраждає"
  hundred_years_war.213.title: "[actor.GetNameWithNoTooltip] вимагає [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]"
  hundred_years_war.213.desc: "Серед представників [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ої сфери киплять пристрасті: [target_character1.GetName] [Select_CString(target_character1.IsFemale, 'направила', 'направив' )] нам офіційну вимогу повернути [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip]. [Select_CString(target_character1.IsFemale, 'Вона', 'Він' )] стверджує, що ця земля з незапам'ятних часів і по праву належить [Select_CString(target_character1.IsFemale, 'їй', 'йому' )], і заявляє, що [target_character2.GetName] утримує її незаконно. До відкритого конфлікту справа поки що не дійшла, але ця вимога має вагу і ставить нас перед непростим вибором: підкоритися чи віддати спір на розгляд влади #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!?"
  hundred_years_war.213.a: "Гаразд, нам доведеться погодитися."
  hundred_years_war.213.b: "Ми оскаржимо претензію — нехай наш спір вирішить влада [GetCountry('FRA').Custom('CL_GEN')]!"
  hundred_years_war.214.title: "Прикордонний спір у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  hundred_years_war.214.desc: "[Select_CString(target_character2.IsFemale, 'Наша піддана', 'Наш підданий' )] [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'звернулася', 'звернувся' )] до нас із проханням вирішити спір. [target_character1.GetName] вимагає, щоб [target_character2.GetShortNameWithNoTooltip] [Select_CString(target_character2.IsFemale, 'передала', 'передав' )] [Select_CString(target_character1.IsFemale, 'їй', 'йому' )] [target_location.Custom('LR_ACC')|l] [target_location.GetName]. [target_character2.GetShortNameWithNoTooltip] стверджує, що спірна земля по праву належить [Select_CString(target_character2.IsFemale, 'їй', 'йому' )], і просить нас втрутитися та не допустити свавілля серед ленників. Цей спір загрожує порушити внутрішню стабільність нашої держави, і наше рішення визначить майбутню розстановку сил в області."
  hundred_years_war.214.a: "Землю отримає [actor.GetNameWithNoTooltip]."
  hundred_years_war.214.b: "Ця земля однозначно належить [target_loser_country.Custom('CL_DAT')|L]!"
  hundred_years_war.215.title: "Зміна союзників"
  hundred_years_war.215.desc: "Хід конфлікту «[target_war.GetName]» вже давно нас не тішить. Попри запевнення від влади #ONCLICK:COUNTRY,[scuffed_side_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scuffed_side_country.Custom('CL_tt')],X [scuffed_side_country.Custom('CL_GEN')|L]#!#!, багато наших радників підтримують ідею перейти на іншу сторону. Результат війни поки абсолютно незрозумілий, нам потрібно бути готовими до несподіванок. Може, якщо ми зробимо пропозицію #ONCLICK:COUNTRY,[potential_new_ally.Custom('CL_tt')] #TOOLTIP:COUNTRY,[potential_new_ally.Custom('CL_tt')],X [potential_new_ally.Custom('CL_DAT')|L]#!#!, у нас вийде подолати розбіжності та змінити розстановку сил?"
  hundred_years_war.215.a: "Буде розумно усунутися від цього конфлікту."
  hundred_years_war.215.b: "Ще одного ворожого сусіда ми собі дозволити не можемо!"
  subject_100_yw_215_effect_tt: "Якщо вони погодяться, ми вийдемо з поточної війни [Concept('white_peace', 'на умовах «статус-кво»')|e]"
  sovereign_100_yw_215_effect_tt: "Якщо вони погодяться, ми перейдемо в поточній війні на їхній бік проти #ONCLICK:COUNTRY,[scuffed_side_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scuffed_side_country.Custom('CL_tt')],X [scuffed_side_country.Custom('CL_GEN')|L]#!#!"
  hundred_years_war.215.b.tt: "[Concept('action', 'Дія')|e] #TOOLTIP:GENERIC_ACTION,betray_our_allegiance,X #L «Відмова від вірності»#!#! стане знову доступна через #Y 2#! роки"
  able_to_request_peace_via_event_tt: "Ми можемо утриматися від участі в поточній [Concept('war', 'війні')|e] між [GetCountry('ENG').Custom('CL_INST')] та [GetCountry('FRA').Custom('CL_INST')]"
  hundred_years_war.216.title: "[wormtongue_country.GetAdjectiveWithNoTooltip]і перебіжчики"
  hundred_years_war.216.desc: "Нам надійшов запечатаний таємний лист. Судячи з усього, влада #ONCLICK:COUNTRY,[wormtongue_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[wormtongue_country.Custom('CL_tt')],X [wormtongue_country.Custom('CL_GEN')|L]#!#! засумнівалася, що [target_war.GetName] закінчиться для них перемогою. Якщо вірити їхнім послам, вони готові зрадити #ONCLICK:COUNTRY,[scuffed_side_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[scuffed_side_country.Custom('CL_tt')],X [scuffed_side_country.Custom('CL_ACC')|L]#!#! і зайняти в цій війні нейтральне становище. Незалежно від того, приймемо ми цю пропозицію чи ні, вона серйозно змінює ситуацію в #TOOLTIP:SITUATION,hundred_years_war,X #L Столітній війні#!#!. Тож зараз це питання першочергової важливості, до якого потрібно поставитися з усією серйозністю."
  hundred_years_war.216.a: "Ми раді тому, що вони одумалися."
  hundred_years_war.216.b: "Ми зрадникам не раді!"
  hundred_years_war.216.b.tt: "Ми розчавимо цим аспідам голови на полі бою!"
  hundred_years_war.200.tt.a: "Якщо [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] нам відмовить, ми зможемо заявити претензію на [GetCountry('AQN').Custom('CL_ACC')] та отримати нові національні землі.\nЦе значно наблизить війну проти [GetCountry('ENG').Custom('CL_GEN')]!"
  hundred_years_war.200.tt.b: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] вирішить, що [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] — [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'істинна правителька', 'істинний правитель' )] [GetCountry('FRA').Custom('CL_GEN')], оскільки мати [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'останньої', 'останнього' )] — [GetCharacter('eng_isabella_of_france').GetName], і захоче переконаннями домогтися того, щоб [GetCountry('ENG').GetGovernment.GetRuler.GetShortNameWithNoTooltip|l] [Select_CString(GetCountry('ENG').GetGovernment.GetRuler.IsFemale, 'заявила', 'заявив' )] свої претензії на трон, проігнорувавши #TOOLTIP:HEIRSELECTION,salic_law,X #L Салічний закон#!#!!"
  hundred_years_war.201.tt.a: "[GetCountry('FRA').GetAdjectiveWithNoTooltip|U]ий двір розцінить цей вчинок Едуарда III як порушення васальних зобов'язань і може прийняти рішення про конфіскацію території під назвою [GetCountry('AQN').GetLongName], тим самим перетворивши всі її місцевості на національні."
  hundred_years_war.201.tt.b: "Відносини між [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]им та [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]им дворами нормалізуються. Принаймні, на якийсь час."
  hundred_years_war.202.tt.a: "#W Столітня війна#! почнеться раніше!\nНа території під назвою [GetCountry('AQN').GetLongName] з'являться наші національні місцевості."
  hundred_years_war.203.tt.a: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] не буде [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale, 'страчена', 'страчений' )] через свою приналежність до знаті."
  hundred_years_war.203.tt.d: "[SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] стане правити територією під назвою [GetCountry('ARS').GetLongNameWithNoTooltip], а в нас з'явиться новий васал — [GetCountry('BUR').GetName]!"
  may_grant_robert_artois_tt: "Коли [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] стане правити територією під назвою [GetCountry('ARS').GetLongName], провінції Аррас та Ам'єн отримають статус національних.\nЗавоювавши частину Артуа, ми можемо зробити так, щоб [SCOPE.sCharacter('fugitive_robert_de_artois').GetShortNameWithNoTooltip] [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale,'отримала', 'отримав')] ці землі, тим самим зробивши [Select_CString(SCOPE.sCharacter('fugitive_robert_de_artois').IsFemale,'її', 'його')] своїм васалом."
  may_still_trigger_hyw_tt: "Полум'я #W Столітньої війни#! може розгорітися знову."
  hundred_years_war.217.title: "Заклик до зброї"
  hundred_years_war.217.desc: "Бушує пожежа війни. Палають #L [GetCountry('ENG').GetAdjective|l]і#! та #L [GetCountry('FRA').GetAdjective|l]і#! поля. Тим часом з #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#! до нашого двору прибуває гонець. Ретельно підбираючи слова — але не настільки ретельно, щоб замаскувати всю терміновість свого послання — він віщає нам про спільних ворогів, праву справу та шляхетні узи.\n\nЗа красивими промовами ховається цілком просте прохання: від нас шукають підтримки, обіцяючи відплатити за наші прапори дзвінкою монетою. Вибір за нами. Що визначить наш наступний крок? Вірність, небажання упускати сприятливий момент, великі прагнення?.."
  hundred_years_war.217.a: "Ми будемо битися разом з ними."
  hundred_years_war.217.b: "Їхня війна — не наша турбота."
  hundred_years_war.218.title: "Обережний договір"
  hundred_years_war.218.desc: "До нас з офіційною пропозицією звертається [target_asker.GetGovernment.GetCourtTitle|l] #ONCLICK:COUNTRY,[target_asker.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_asker.Custom('CL_tt')],X [target_asker.Custom('CL_GEN')|L]#!#!. З нами хочуть укласти перемир'я, поки війна, що пожирає #TOOLTIP:REGION,france_region,X #L Францію#!#!, не втягнула в конфлікт і наші мирно сусідні держави. Цей передбачливий крок супроводжується пропозицією золота та обіцянками підтримувати мир. Очевидно, що інша сторона не шукає з нами сварки — вона всього лише хоче відсторонитися від майбутніх труднощів.\n\nПодібна обережність похвальна… але чи варто нам жертвувати заради неї цією сприятливою миттю? Радники стверджують, що такий жест — лише хід у великій дипломатичній грі: ймовірно, [target_character1.GetName] хоче убезпечити свої кордони, на яких стоїть [target_character2.GetName], щоб влаштувати похід кудись іще…"
  hundred_years_war.218.a: "Підтвердимо свою прихильність миру."
  hundred_years_war.218.b: "Ми не готові давати таку обіцянку."
  hundred_years_war.219.title: "Наше становище при [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ій короні"
  hundred_years_war.219.desc: "Відтоді як королі з династії #TOOLTIP:DYNASTY,$plantagenet_dynasty_tt$,X #L Плантагенетів#!#! перестали вершити з #TOOLTIP:LOCATION,rouen,X #L Руана#!#! свою владу, минуло кілька десятиліть. Однак над #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#! ще колишеться хистка тінь їхнього впливу… [ROOT.GetCountry.GetFlavorRank|U] — колись оплот королів по обидва боки Ла-Маншу — сьогодні бажаний алмаз; одна корона володіє ним, інша — прагне його отримати.\n\nВідносини між #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#! стають дедалі напруженішими, а тому питання нашого майбутнього аж ніяк не здається пустим. [Select_CString(target_character.IsFemale, 'Спадкоємиця', 'Спадкоємець' )] [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого престолу [target_character.GetName], нещодавно [Select_CString(target_character.IsFemale, 'наділена', 'наділений' )] владою, тепер [Select_CString(target_character.IsFemale, 'повинна', 'повинен' )] або знову підтвердити свою претензію на [GetCountry('FRA').Custom('rank_ru_ACC')|l], або обрати новий шлях… і тим самим, можливо, надати хоробрості найгрізнішому своєму супернику. [ROOT.GetCountry.GetNameWithNoTooltip] — не просто пляма на карті: це втілення нашої історичної пам'яті, наших прагнень та завоювань. І сьогодні, коли війна майже опинилася на порозі нашого дому, доля цього місця — вже не просто символ."
  hundred_years_war.219.historical_info: "Нормандія колись вважалася найважливішою частиною англо-нормандського королівства — зокрема, саме тут зійшов на англійський престол Вільгельм Завойовник, після чого влада над Нормандією перебувала в руках англійських монархів аж до відвоювання регіону на початку XIII століття французьким королем Філіпом II. Зважаючи на свою стратегічну та економічну важливість, Нормандія становила інтерес і для Англії, і для Франції, що нерідко виливалося в конфлікти; так, навіть після втрати Нормандії англійці не відмовилися від своїх домагань на неї. Початок Столітньої війни різко загострив старі образи: англійські королі заявляли своє право не тільки на французький престол, а й на давно втрачені землі — насамперед на Нормандію. Історична важливість регіону для обох династій призвела до того, що в майбутньому конфлікті Нормандії була уготована далеко не остання роль."
  hundred_years_war.219.a: "Ми підтримуємо [GetCountry('FRA').Custom('CL_ACC')]!"
  hundred_years_war.219.b: "Ми не потерпимо слабкості. Краще звернемося до [GetCountry('ENG').Custom('CL_DAT')]."
  hundred_years_war.220.title: "Гентський пивовар"
  hundred_years_war.220.desc: "[GetCountry('FRA').GetName] та [GetCountry('ENG').GetName] готуються занурити #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західну Європу#!#! у вир війни, а міста #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! збираються зводити політичні рахунки. Хоча формально #TOOLTIP:LOCATION,ghent,X #L Гент#!#!, #TOOLTIP:LOCATION,bruges,X #L Брюгге#!#! та #TOOLTIP:LOCATION,ypres,X #L Іпр#!#! належать нашому сюзерену — #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_DAT')|L]#!#!, їхнє процвітання залежить від дальшої держави: без #L [GetCountry('ENG').GetAdjective|l]ої#! #TOOLTIP:GOODS,wool,X #L вовни#!#! наші ткацькі верстати зупиняться, а ринки — обваляться. У натовпі незадоволених найголосніше звучить голос людини на ім'я [target_character2.GetName] — харизматичного пивовара, якого однаково поважають і ремісники, і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l]. Бачачи грозову хмару, що насувається на нас, [Select_CString(target_character2.IsFemale, 'вона', 'він' )] закликає [ROOT.GetCountry.Custom('rank_ru_ACC')|l] — з кожним днем усе наполегливіше — примкнути до [GetCountry('ENG').Custom('rank_ru_DAT')|l] [GetCountry('ENG').GetNameWithNoTooltip] у надії, що [target_character.GetName] відгукнеться на цей заклик."
  hundred_years_war.220.historical_info: "Якоб ван Артевелде — заможний купець і пивовар родом із Гента. На початку Столітньої війни він очолив політичну опозицію. У ті роки Фландрія була васалом французької корони, але при цьому сильно залежала від поставок англійської вовни — головної опори своєї розвиненої текстильної промисловості. Коли конфлікт між Францією та Англією загострився, Артевелде зайняв сторону англійців, забезпечивши тим самим поставки до Фландрії товарів та внутрішню автономію і попутно чинячи опір спробам Франції правити графством безпосередньо. За нього фламандські міста ненадовго здобули стабільність, однак саме таке впливове становище і погубило Якоба: у 1345 році розлючений натовп жителів Гента вбив політика, звинуваченого у спробах зробити Фландрію васалом Англії."
  hundred_years_war.220.a: "[target_character2.GetShortNameWithNoTooltip] каже правду: потрібно в першу чергу відстоювати промисловість."
  hundred_years_war.220.b: "Тягнеться ниточка катастроф…"
  hundred_years_war.230.title: "[actor.GetNameWithNoTooltip] плану[actor.Custom('end_etyut')] переметнутися"
  hundred_years_war.230.desc: "Попри всі зусилля сюзерена, невдоволення #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!, здається, досягло найвищої точки. Посланець із міста [actor.GetCapital.GetName] щойно прибув до нашого двору з вельми інтригуючою пропозицією. Схоже, [actor.GetGovernment.GetRulerOrRegent.GetName|l] хоче переметнутися на наш бік, не чекаючи початку військових дій між нами та #ONCLICK:COUNTRY,[target_enemy.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_enemy.Custom('CL_tt')],X [target_enemy.Custom('CL_INST')|L]#!#!!"
  hundred_years_war.230.a: "Усе йде як по маслу…"
  hundred_years_war.230.b: "Ми не ведемо справ із мерзенними зрадниками!"
  slightly_discourage_existing_subjects_from_defecting_tt: "Наша рішуча відмова від співпраці з #L [actor.GetAdjective|l]ими#! зрадниками трохи знизить готовність наших власних [Concept('subjects', 'ленників')|e] перейти до іншого табору"
  able_to_defect_via_event_tt: "Якщо інша держава погодиться, ми зможемо перейти під її владу внаслідок [Concept('event', 'події')|e]"
  ruler_regent_heir_not_overlord_dynasty_tt: "Наш [Concept('heir', 'спадкоємець')|e] І [Concept('ruler', 'правитель')|e] (або [Concept('regent', 'регент')|e]) не належать до [Concept('dynasty', 'династії')|e] [Concept('overlord', 'сюзерена')|e]"
  hundred_years_war.1537.title: "Столітня війна зайшла в глухий кут"
  hundred_years_war.1537.desc: "Кілька століть поспіль на полях #TOOLTIP:SUB_CONTINENT,western_europe,X #L Західної Європи#!#! лилася кров народів двох країн — #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_GEN')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#!. І хоча часом здавалося, що ще трохи — і війна закінчиться, щоразу це враження було оманливим: жодна сторона виявилася не здатною остаточно здолати іншу. Ніхто — навіть [target_character1.GetName] та [target_character2.GetName] — вже не пам'ятає, через що взагалі почався цей конфлікт. Жахи незліченних битв поступово спливають із пам'яті."
  war_what_is_it_good_for_tt: "[ShowSituationName('hundred_years_war')] завершилася нічиєю"
  based_on_current_relative_strength_with_our_opponent_in_hyw_tt: "З урахуванням співвідношення [Concept('country_strength', 'моці')|e] нашої держави та держави противника в [Concept('situation', 'ситуації')|e]:"