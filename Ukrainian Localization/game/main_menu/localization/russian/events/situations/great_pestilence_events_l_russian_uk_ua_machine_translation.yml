l_russian:
  great_pestilence.1.title: "[ShowSituationNameWithNoTooltip('great_pestilence')]"
  great_pestilence.1.repeatedText: "Епідемія непередбачувана та смертоносна. Серед симптомів — лихоманка, висип, блювота та помутніння свідомості. Результат майже завжди смертельний."
  great_pestilence.1.desc: "[diseased_location_scope.GetName] страждає від загадкової епідемії. Хвороба може вразити будь-кого — і простолюда, і знать, і найпобожнішого священника. $great_pestilence.1.repeatedText$\n\nУсі відомі ліки безсилі проти цієї зарази, немов насланої на нас самим дияволом. Не допомагають ні молитви, ні жертви; [ROOT.GetCountry.GetReligion.GetGodName], схоже, більше не та сила, на яку можна покластися."
  great_pestilence.1.descB: "[diseased_location_scope.GetName] страждає від загадкової епідемії, що стрімко вражає корінне населення. Підхопити її може кожен — і простолюд, і знать, і священник. $great_pestilence.1.repeatedText$\n\nНаші лікарі безсилі: хвороба поширюється та вбиває надто швидко.\n\nУсе, що нам залишається, — це відправити мертвих в останню путь і викопати побільше могил."
  great_pestilence.1.a: "Настав кінець світу!"
  great_pestilence.1.a2: "Яке нещастя!"
  great_pestilence.2.title: "Однією ногою в могилі"
  great_pestilence.2.desc: "[ShowSituationName('great_pestilence')|U] продовжує лютувати. Континент розорений, а мертвим уже немає ліку. Захворюють усі: і праведники, і лиходії. Хвороба не знає ні станових відмінностей, ні кордонів.\n\nМіста, в яких колись кипіло життя, покинуті та віддані природі. Імперії та царства стоять на межі катастрофи — вороги вже точать ножі… принаймні ті, хто ще живий."
  great_pestilence.2.a: "Нам це ніяк не допоможе…"
  great_pestilence.3.title: "Хтось же напевно винен!"
  great_pestilence.3.desc: "Жорстокість, з якою [ShowSituationName('great_pestilence')] вбиває наш народ, вражає настільки, що багато хто божеволіє, будучи не в силах впоратися з цим страшним лихом.\n\nКілька селян з [location_scope.Custom('LR_GEN')|l] [location_scope.GetName], втративши розум, навіть пішли на вбивство; загублене ними [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] нібито недостатньо старанно молилося, тому тепер [ROOT.GetCountry.GetReligion.GetGodName] у гніві.\n\nЇхні побожні сусіди напали на вбивць у відповідь, оскільки вважали, що тепер [ROOT.GetCountry.GetReligion.GetGodName] вже напевно в гніві, адже вбиті посередники між нашим світом і світом божественним. Через це вже почалися перші заворушення."
  great_pestilence.3.a: "Наказати варті покарати нападників."
  great_pestilence.3.b: "Краще не втручатися."
  great_pestilence.4.title: "Єдність зникає"
  great_pestilence.4.desc: "[ShowSituationName('great_pestilence')] починає охоплювати й [infected_location.Custom('LR_ACC')|l] [infected_location.GetName]. Усі спроби якось зупинити цю хворобу марні. Постраждалі родини з усієї країни вирішили покинути міста та села й піти в гори та ліси, кинувши землю та забувши про обов'язок перед владою.\n\nТака втеча значно ускладнить нам управління населенням, адже нав'язувати волю країни буде майже неможливо."
  great_pestilence.4.a: "Примусити їх знову взятися за роботу!"
  great_pestilence.4.b: "Нехай роблять що хочуть."
  great_pestilence.5.t: "У пошуках причини"
  great_pestilence.5.desc: "Мешканців [target_location.Custom('LR_GEN')|l] [target_location.GetName] охопили жах і обурення, які ось-ось виплеснуться назовні. Люди шукають, кого можна звинуватити в усіх бідах, і цей хтось має заплатити за чуму, що розгорілася.\n\nЗгодяться будь-які меншини, чи то бідняки, виродки, чи каліки. Маси вимагають хапати та судити тих, хто накликав на нас цю страшну кару. Ми можемо або організувати полювання та керувати ним, або спробувати уникнути розправи над невинними та накликати народний гнів на себе."
  great_pestilence.5.a: "Влаштувати полювання!"
  great_pestilence.5.b: "Не можна звинувачувати інших у наших бідах!"
  great_pestilence.6.t: "Потреба в монетах"
  great_pestilence.6.desc: "[ShowSituationName('great_pestilence')] вбиває мешканців [target_location.Custom('LR_GEN')|l] [target_location.GetName], і жителі навколишніх сіл більше не в змозі платити податки.\n\nБагато хто або загинув, або захворів. Ті, хто ще не заразився, щосили намагаються вижити, і справи [ROOT.GetCountry.Custom('rank_ru_GEN')|l] хвилюють їх в останню чергу.\n\nПроте, страшні наслідки, які обіцяє порожня скарбниця, вдарять по країні набагато сильніше, ніж сільська бідність — по парі десятків селянських сімейств, тому наші збирачі податків наполегливо нагадують місцевим жителям, що податки треба платити. На жаль, ті в боргу не залишаються."
  great_pestilence.6.a: "Нехай люди гніваються, але сплата податків — їхній обов'язок!"
  great_pestilence.6.b: "У важкі часи податки варто знизити…"
  great_pestilence.6.c: "Жертви епідемії не повинні платити податки!"
  great_pestilence.7.t: "Втрачені назавжди"
  great_pestilence.7.desc: "Несамовитість, з якою [ShowSituationName('great_pestilence')] обрушилася на [target_location.Custom('LR_ACC')|l] [target_location.GetName], велика, і вберегтися від неї не може ніхто. Навіть наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] заражається цією страшною хворобою.\n\nТака втрата б'є по нас подвійно сильніше: у багатьох селах більше не залишилося нікого, хто міг би здійснювати похоронні обряди. Тепер по землі блукатимуть мстиві невпокоєні духи, нездатні вирушити на той світ."
  great_pestilence.7.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|U] отримає від нас допомогу."
  great_pestilence.7.b: "Нічого не вдієш."