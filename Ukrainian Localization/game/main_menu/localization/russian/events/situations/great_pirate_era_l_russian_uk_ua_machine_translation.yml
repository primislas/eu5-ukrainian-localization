l_russian:
  great_pirate_era.1.title: "Сходження [target_country.Custom('CL_GEN')]"
  great_pirate_era.1.desc: "[target_location.GetName] страждає: у цих краях склалася справжня піратська вольниця! Головорізи, що тут безчинствують, дійшли навіть до того, що, осмілівши від відсутності на острові законної влади, захопили місцевий форт і проголосили піратську республіку. Тепер їхня «держава» називається [target_country.GetLongName].\n\nБіля штурвала стоїть капітан [target_character.GetName] — сумнозвісний пірат, а також [target_character2.GetName]. Їхня хватка поки не дуже міцна, а тому помічники піратів постійно піддають своїх ватажків іспиту на право панувати островом злочинців, сподіваючись, що ті дадуть слабину.\n\nЦя так звана республіка своїм існуванням не тільки порушує наш суверенітет над провінцією [ShowProvinceDefinitionName('bahamas_province')], але також кидає виклик порядку та цінностям усього цивілізованого світу. Тепер у [target_country.Custom('CL_PREP')] панує справжній хаос."
  great_pirate_era.1.a: "Піратське життя — це по мені!"
  great_pirate_era.1.b: "Ми їх за це повісимо!"
  target_country_rises_in_target_location_tt: "У [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip] виникне [target_country.GetLongNameWithNoTooltip]"
  great_pirate_era.1.historical_info: "Острів Нью-Провіденс, розташований на Багамах, на початку XVIII століття став справжнім оплотом піратів. Саме звідси, користуючись тим, що Британська імперія фактично не контролювала острів, набіги на карибські торгові шляхи здійснювали багато знаменитих розбійників, таких як Чорна Борода та Чарльз Вейн. Піратська республіка, що тут існувала, кидала виклик європейським державам до 1718 року, поки британський губернатор Вудс Роджерс не відновив на Нью-Провіденсі владу корони. Так закінчився золотий вік піратської держави."
  great_pirate_era.2.title: "Заснування [target_country.Custom('CL_GEN')]"
  great_pirate_era.2.desc: "Два капітани піратів — [target_character.GetLastName] та [target_character2.GetLastName] — всупереч усім очікуванням уклали між собою союз і тим самим об'єднали піратів #TOOLTIP:REGION,madagascar_region,X #L Мадагаскару#!#! воєдино. Проголошена ними республіка [target_country.GetName] живе ідеалами безмежної свободи та спільності.\n\nТут немає місця ні рабству, ні державності. Усі рішення приймаються загальним голосуванням, а лави бійців поповнюються за рахунок звільнених у прилеглих портах рабів. І хоча ця нашвидкуруч збита республіка неодмінно викличе гнів #TOOLTIP:CONTINENT,europe,X #L європейських#!#! колоніальних держав, чиї кораблі піддаються нападам піратів, їй не можна відмовити не тільки в ідеалізмі, а й у цілеспрямованості та бажанні процвітати всупереч усьому."
  great_pirate_era.2.historical_info: "Легендарну піратську колонію Ліберталія, імовірно, заснував на Мадагаскарі наприкінці XVII століття капітан Міссон — поборник нездійсненних ідей про повну свободу та життя без рабства й уряду; усі рішення в Ліберталії мали прийматися демократично. І хоча багато істориків схиляються до того, що Ліберталії ніколи не існувало, її основоположні принципи свободи та спільності й сьогодні слугують яскравим символом опору авторитаризму."
  great_pirate_era.3.title: "[target_country.GetLongNameWithNoTooltip]"
  great_pirate_era.3.desc: "До #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманських#!#! меншин, які сьогодні люто витісняються з #TOOLTIP:REGION,iberia_region,X #L Іберії#!#!, додалися ті, хто навернувся в іншу віру, але підозрюються в збереженні колишніх поглядів. Через це в наші краї хлинуло безліч переселенців; нещодавно прибула до нас багата родина, наприклад, рятувалася від переслідувань на батьківщині. Тут вони знайшли новий дім, ім'я якому — [target_location.GetName]. Колишнє життя ці люди проміняли на піратство в морських просторах і торгівлю невільниками.\n\n#ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#! керує [target_character.GetName] — новонавернений пірат родом з #TOOLTIP:LOCATION,the_hague,X #L Гааги#!#!. Безсумнівно, таке становище речей — витрати процвітаючого піратства!"
  great_pirate_era.3.historical_info: "На початку XVII століття на марокканському узбережжі пірати заснували республіку Сале. Очолював їх голландець Ян Янсон, який після навернення в іслам взяв собі ім'я Мурат-реїс. Звідси берберські корсари здійснювали набіги на європейські міста та прибережні міста. Під керівництвом як марокканських еліт, так і втікачів з інших країн піратська республіка Сале проіснувала кілька десятиліть, після чого поступово була поглинена марокканськими правителями."
  great_pirate_era.4.title: "Нальотчики в [target_country.Custom('CL_PREP')]"
  great_pirate_era.4.desc: "[target_country.GetLongName] — не просто союзник #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! корсарів у #TOOLTIP:LOCATION,bay_algiers,X #L Алжирській затоці#!#!: це ще й сильний гравець у #TOOLTIP:AREA,western_mediterranean_sea_area,X #L Західному Середземномор'ї#!#!.\n\nЦі морські вовки користуються підтримкою і місцевих жителів, і іноземних держав, оскільки незмінно займаються одним і тим же: нальотами на закордонних купців і захопленням їхнього вантажу та моряків. Завдяки цьому вони стали цінними фігурами в руках тих, хто прагне завдати потужного удару своїм суперникам."
  great_pirate_era.4.historical_info: "У XVI—XVII ст. марокканське місто Тетуан слугувало базою для піратів-морисків — андалузців, вигнаних з Іспанії. Метою їхніх набігів були переважно іспанські та португальські кораблі в Середземному морі.\n\nТетуанські пірати діяли спільно з берберськими і разом грабували кораблі та захоплювали рабів біля узбережжя Північної Африки. Іноді їх підтримували місцеві правителі та Османська імперія — їм були вигідні такі удари по європейській торгівлі. З часом, однак, європейські (переважно іспанські) флотилії звели діяльність піратів до мінімуму."
  great_pirate_era.5.title: "Пірати в [target_country.Custom('CL_PREP')]"
  great_pirate_era.5.desc: "Деякі підприємливі капери, що діють у #TOOLTIP:REGION,caribbean_region,X #L Карибському#!#! морі, отримали відповідні свідоцтва. Це означає, що торгівля та перевезення, якими займаються держави-суперниці, незабаром опиняться під ударом. Нальоти багато каперів воліють влаштовувати з [target_location.Custom('LR_GEN')|l] [target_location.GetName] у #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#!, оскільки тут їм відкривається чималий простір для грабежів.\n\nМісцева влада без докорів сумління приторговує награбованим, що вабить не тільки каперів, а й піратів, які не мають ні свідоцтва, ні підданства — ці люди вірні виключно самим собі. Беззаконня, що розростається, призвело до того, що багато каперів самі почали подаватися в пірати: спокуса занадто велика. Ходять чутки, що головне притулок піратів тепер — [target_country.GetNameWithNoTooltip], #italic «Содом Нового Світу»#!."
  great_pirate_era.5.historical_info: "На середину XVII століття, відразу після відвоювання англійцями в Іспанії в 1655 році Ямайки, припав розквіт піратської столиці — Порт-Рояла. Це місто, розташоване на південному узбережжі острова, швидко стало притулком для піратів і буканьєрів — не в останню чергу завдяки своєму стратегічно вигідному розташуванню в Карибському морі та поступливості місцевих губернаторів. Чимало тут було й каперів: для захисту колонії та ослаблення іспанського впливу англійський уряд видавав каперські свідоцтва — дозволи нападати на іспанські кораблі та поселення. До кінця XVII століття Порт-Роял став містом достатку, пороків і беззаконня — справжньою піратською вольницею, до чого доклали руку деякі знамениті морські розбійники, зокрема Генрі Морган. Однак це щастя тривало недовго: у 1692 році в місті стався найсильніший землетрус, що зруйнував Порт-Роял майже цілком."
  great_pirate_era.6.title: "Берегове братство"
  great_pirate_era.6.desc: "На острові біля узбережжя [target_location.Custom('LR_GEN')|l] [target_location.GetName] проходить таємне зібрання піратів і каперів. У саморобній хатині капітани обговорюють питання першочергової важливості. Через кілька годин вони виходять і оголошують решті піратський кодекс — єдиний звід правил, якому зобов'язана слідувати кожна команда без винятку. Берегове братство, яке оголосило [target_location.Custom('LR_ACC')|l] [target_location.GetNameWithNoTooltip] своїм домом, приносить урочисту клятву ходити під чорними вітрилами, вселяючи страх у серця мореплавців у #TOOLTIP:REGION,caribbean_region,X #L Карибському#!#! морі. Так починається нова сторінка в історії місцевого піратства."
  great_pirate_era.6.historical_info: "У другій половині XVII століття невеликий острів Тортуга, розташований біля північно-західного узбережжя Гаїті, став надійним притулком для піратів і каперів: завдяки вигідному розташуванню острова розбійники могли нападати на іспанські кораблі, що перевозили в трюмах багатства, та уникати колоніальної влади.\n\nБагато з них входили до об'єднання, що називалося «Берегове братство». Кожна команда, що вважалася частиною Братства, зобов'язувалася слідувати єдиному кодексу — зведенню правил поведінки, розподілу здобичі та вирішення суперечок, що виховувало в мореплавцях почуття товариства.\n\nУ Братстві перебували багато відомих піратів, такі як Генрі Морган і Бартоломью Робертс — грози іспанських поселень і флотів, що перевозили скарби. Саме завдяки діям Берегового братства, яке зробило Тортугу своєю базою, склався легендарний образ піратів Карибського моря."
  great_pirate_era.100.title: "Велика ера піратства"
  great_pirate_era.100.desc_a: "Світ думав, що наш час мине, як жорстока буря, поступившись місцем ясному небу. Але ми ще тут, наші вітрила ловлять вітер, а на щоглах майорять прапори держави [ROOT.GetCountry.GetLongName]. Торговці говорять про нас пошепки, а військові флоти ганяються за нами без жодного толку. Так звані «світові держави» не змогли загасити наше полум'я — і тепер наше ім'я, назавжди вписане в легенди семи морів, вселяє їм трепет. Це більше не [ShowSituationName('golden_age_of_piracy')]. Це початок нової ери, назустріч якій нас поведе [target_character.GetName]."
  great_pirate_era.100.desc_b: "Ми думали, що так званий «[ShowSituationName('golden_age_of_piracy')]» закінчиться сам собою, завалившись під вагою власної безладності, проте його непокірне полум'я, як і раніше, палає в портах держави [target_pirate_country.GetLongName].\n\nКілька десятиліть [target_character.GetName] і [Select_CString(target_character.IsFemale, 'її', 'його' )] попередники об'єднували навколо себе піратів, вибудовуючи піраміду жадібності на купах награбованих багатств. Тепер їхні кораблі стали швидшими, матроси — наполегливішими, а капітани остаточно втратили страх. Торгові каравани змінюють свої маршрути, прибережні міста будують стіни, а військові флоти всього світу готуються до нових втрат. [target_pirate_country.GetAdjectiveWithNoTooltip]а вольниця взяла гору."
  great_pirate_era.100.a: "Безпечних берегів не залишилося!"
  great_pirate_era.100.b: "Це початок нашого золотого віку!"
  end_situation_gaop_tt: "[Concept('situation', 'Ситуація')|e] «[ShowSituationName('golden_age_of_piracy')]» закінчується"
  great_pirate_era.200.title: "[ShowSituationNameWithNoTooltip('golden_age_of_piracy')] позаду"
  great_pirate_era.200.desc: "Кілька десятиліть поспіль морські розбійники наводили жах на наші береги та зривали поставки життєво необхідних товарів. На щастя, об'єднавши зусилля, ми розорили останнє піратське гніздо та відправили його мешканців на шибеницю.\n\nКолишні «улюбленці Фортуни» або гримлять кайданами, або гниють у могилах. [ShowSituationName('golden_age_of_piracy')] закінчено. Океани знову вільні від цієї непередбачуваної загрози."
  great_pirate_era.200.a: "Негідникам кінець!"
  great_pirate_era.300.title: "Золотий вік піратства"
  great_pirate_era.300.desc: "Розстановка сил змінюється на очах. Торгові монополії руйнуються одна за одною, а прагнення світових держав не знають меж. Світ хвилюється — а разом з ним хвилюються і моря. #TOOLTIP:CONTINENT,europe,X #L Європейські#!#! країни ведуть нескінченні війни за панування над новими землями, а їхні купецькі флоти, під зав'язку набиті цінним вантажем і ведені безтурботними капітанами, стають легкою здобиччю для сміливців з гострими тесаками та швидкими кораблями.\n\nЗ далеких куточків колоніальних поселень, з гаваней, де панує беззаконня, у відкриті води виходять мореплавці нового століття. Вигнанці, капери, дезертири та просто мрійники, що забажали багатства та свободи, піднімають на щоглі чорний прапор. Вони — не просто морські розбійники: у них є мета.\n\nХвиля піратства, яке піднімає голову сьогодні і в сирих #TOOLTIP:REGION,caribbean_region,X #L карибських#!#! бухтах, і в бурхливих водах #TOOLTIP:CONTINENT,africa,X #L Африки#!#!, захлисне півсвіту. Починається нова епоха — не королів і регалій, а вітрил, сталі та рому. Світ вступає в золотий вік грабежів, пияцтва та морських пригод."
  great_pirate_era.300.historical_info: "Основною передумовою до настання золотого віку піратства (середина XVII — початок XVIII століть) став розвиток колоніальних імперій і підкорення заморських територій: конкуруючі держави нерідко вдавалися до послуг каперів, щоб грабувати та топити торгові судна своїх конкурентів. Набіги не припинялися навіть після підписання мирного договору: колишні капери не готові були розлучатися з вільним життям морських нальотчиків, а тому подавалися в пірати.\n\nКолоніальні держави довго не могли дозволити собі повноцінну боротьбу з піратством: у флотах не вистачало кораблів, а на берегах — повноцінних укріплень. У численних бухтах Карибів і Західної Африки піратським капітанам легко було підшукати собі місце для стоянки та поповнити команду колишніми матросами, втікачами-рабами та вигнанцями — людьми, об'єднаними ненавистю до королів і купців.\n\nУ ту епоху на слуху було чимало гучних імен: Генрі Морган, Чорна Борода, Бартоломью Робертс… І хоча згодом спільними зусиллями піратство було викорінено, епоха відважних морських розбійників залишила яскравий слід у світовій історії."
  great_pirate_era.300.a: "Настав вік каперства та розбійництва!"
  situation_gaop_start_tt: "Почалася [Concept('situation', 'ситуація')|e] #TOOLTIP:SITUATION,golden_age_of_piracy,X #L «Золотий вік піратства»#!#!"