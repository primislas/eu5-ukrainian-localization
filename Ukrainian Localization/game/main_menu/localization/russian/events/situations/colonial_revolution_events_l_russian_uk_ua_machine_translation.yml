l_russian:
  colonial_revolution.1.title: "Жодних податків без представництва"
  colonial_revolution.1.desc: "Наші володіння існують заради однієї мети: збагачення #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!, що знаходиться далеко за морями. При цьому населення не має права голосу в [target_country.GetAdjectiveWithNoTooltip|l]их справах — або навіть у справах, що стосуються нашої власної землі. Частина глибоко шанованих співвітчизників, які ввібрали в себе ідеї #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#!, почала розробляти задум щодо примусу нашого сюзерена скасувати тут свою владу, що може вилитися в серйозний конфлікт."
  colonial_revolution.1.a: "Ідеї Просвітництва восторжествують!"
  colonial_revolution.1.a.tt: "У цій ситуації колоніальний [Concept('subject', 'ленник')|e] може заснувати [Concept('international_organization', 'міжнародне об’єднання')|e] колоній-однодумців і спробувати спільно примусити сюзерена відмовитися від влади над ними або безпосередньо домогтися незалежності."
  colonial_revolution.2.title: "Непокірні колонії"
  colonial_revolution.2.desc: "Світом, подібно до лісової пожежі, стрімко поширюються ідеї #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#!. Вони не оминули й наші колонії: до нас дійшли тривожні звістки про те, що колоністи почали обговорювати такі крамольні питання, як представництво та право на самовизначення. Невідомо, з чого все це почалося (адже ми завжди діяли в найкращих інтересах колоній), однак навряд чи буде можливо заплющити очі на те, що відбувається. Надалі відносини з колоніями значно ускладняться."
  colonial_revolution.2.a: "Тим, хто відкидає нашу владу, можна лише поспівчувати."
  colonial_revolution.3.title: "У пошуках свободи"
  colonial_revolution.3.desc: "Ми втомилися терпіти недбале та невміле управління колоніями й тепер стоїмо на роздоріжжі. Поселенці більше не вірять #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_DAT')|L]#!#!: занадто великими стали наші культурні, суспільні та політичні відмінності, побудовані на фундаменті з гноблення. Ті, для кого [target_overlord.Custom('GetMotherlandFatherland')|l] — священне слово, і ті, хто хоче незалежності від заморських правителів, з кожним днем усе більше віддаляються одне від одного. Конфлікт, схоже, неминучий."
  colonial_revolution.3.a: "Це серйозна справа."
  colonial_revolution.3.b: "[target_overlord.Custom('GetMotherlandFatherland')|U] викликає сильні почуття. Відданість батьківщині ще може нам послужити."
  colonial_revolution.4.title: "Торговельні обмеження"
  colonial_revolution.4.desc: "Відносини з нашими колоніями сьогодні не можна назвати інакше, як хиткими. Економічні потреби #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вимагають постійної уваги: країні потрібні безперервні поставки заморських товарів, однак усі спроби встановити жорсткий контроль над економікою наших підданих незмінно наштовхуються на жорсткий опір. Частина колоністів звернулася до нас із проханням послабити суворі заходи щодо ввезених і вивезених товарів — вони хочуть самоврядування в цьому питанні."
  colonial_revolution.4.a: "Нехай звернуться з цим до [ROOT.GetCountry.Custom('parliament_ru_DAT')|l]."
  colonial_revolution.4.b: "Поступимося їхнім вимогам."
  colonial_revolution.5.title: "Чутки про заколот"
  colonial_revolution.5.desc: "Наші колонії, попри свою другосортність, — батьківщина багатьох видатних і вольових людей. Нам повідомили, що ці люди почали організовувати так звані колоніальні збори, де обговорюють свою підпорядкованість нашій державі і, ймовірно, навіть можливість проголосити незалежність без нашої на те згоди. І хоча поки це лише чутки, діяти варто вже зараз, інакше надалі нам доведеться важко."
  colonial_revolution.5.a: "Спробувати знайти дипломатичне рішення."
  colonial_revolution.5.b: "Не їм це вирішувати!"
  colonial_revolution.6.title: "[target_character.GetNameWithNoTooltip] і [Select_CString(target_character.IsFemale, 'її', 'його' )] голос"
  colonial_revolution.6.desc: "[Select_CString(target_character.IsFemale, 'Красномовна та впливова', 'Красномовний та впливовий' )] [target_character.GetName] починає розпалювати заворушення на території #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. У своїх промовах, листах і вимогах до громадськості домагатися повноцінного представництва [Select_CString(target_character.IsFemale, 'вона', 'він' )] постійно ставить під сумнів нашу владу і закликає інших боротися за незалежність, щоб метрополія — [target_overlord.GetLongName] — позбулася свого впливу над колоніями. [Select_CString(target_character.IsFemale, 'Її вплив', 'Його вплив' )] зростає з кожним днем, і хоча до відкритих закликів до заколоту ще не дійшло, ми підозрюємо, що це лише питання часу."
  colonial_revolution.6.a: "Потребуємо від колоніальних властей видати нам [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  colonial_revolution.6.b: "Нехай собі базікає — одними лише словами нас не скинути."
  colonial_revolution.6.c: "Підлаштуємо таємне вбивство."
  assassination_of_target_character_tt: "Ми спробуємо вбити персонажа [target_character.GetName]"
  colonial_revolution.7.title: "Влада [target_overlord.Custom('CL_GEN')] вимагає, щоб [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'була їм видана', 'був їм виданий' )]"
  colonial_revolution.7.desc: "З #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_GEN')|L]#!#! нам надійшла офіційна вимога: [target_character.GetName] звинувачується у підбурюванні до заколоту проти [target_overlord.Custom('rank_ru_GEN')|l], а тому ця людина негайно має бути видана владі. Серед населення вже ширяться чутки, що насправді [Select_CString(target_character.IsFemale, 'її', 'його' )] збираються стратити — швидко і у всіх на очах. Думки радників розділилися; хтось вважає [Select_CString(target_character.IsFemale, 'її', 'його' )] небезпечним провокатором, хтось — голосом свободи."
  colonial_revolution.7.a: "Поки що у нас немає вибору, доведеться погодитися."
  colonial_revolution.7.b: "Ніколи!"
  colonial_revolution.8.title: "[target_overlord.GetNameWithNoTooltip] чинить всупереч нашому суверенітету"
  colonial_revolution.8.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'мертва', 'мертвий' )]. Смерть настала нібито випадково, внаслідок несподіваного і жорстокого нападу. Однак нам стало достеменно відомо, що в цьому замішана влада #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_GEN')|L]#!#! та виконавці, що діяли від їхнього імені. Тепер [target_country.Custom('rank_ru_ACC')|l] накрила хвиля обурення: [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] щиро вважає [Select_CString(target_character.IsFemale, 'загиблу', 'загиблого' )] видатною людиною, а тепер ще й мучеником. На цьому ґрунті насіння руху, яке так старанно намагалися викорінити, зростатиме тільки рясніше."
  colonial_revolution.8.a: "Чому жителі [target_overlord.Custom('CL_GEN')] — такі бовдури?!"
  colonial_revolution.9.title: "[target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'пережила', 'пережив' )] замах"
  colonial_revolution.9.desc: "[target_character.GetName] ледь не [Select_CString(target_character.IsFemale, 'стала', 'став' )] жертвою замаху! Врятувала [Select_CString(target_character.IsFemale, 'її', 'його' )] лише щаслива випадковість. Невдалого вбивцю вдалося вчасно спіймати, і на допиті він зізнався, що діяв за наказом #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_GEN')|L]#!#! — нашої метрополії! Організатори зірваної змови домоглися лише зворотного: тепер [target_character.GetShortNameWithNoTooltip] — жива легенда, а [target_overlord.GetNameWithNoTooltip] в очах тисяч жителів [target_country.Custom('rank_ru_GEN')|l] — безсумнівно, лиходій."
  colonial_revolution.10.title: "Вимога зняття з посади"
  colonial_revolution.10.desc: "Фракція, що набирає популярності на території [ROOT.GetCountry.Custom('rank_ru_GEN')|l], вимагає, щоб [target_character.GetName] — людина, яку слухає [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] нашої держави — [Select_CString(target_character.IsFemale, 'була знята', 'був знятий' )] зі своєї посади. [Select_CString(target_character.IsFemale, 'Її', 'Його' )] звинувачують не лише в надмірній вірності #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_DAT')|L]#!#! та спробах перешкодити місцевому самоврядуванню, але також у корупції і навіть шпигунстві. Від нас домагаються, щоб ми позбавили [Select_CString(target_character.IsFemale, 'її', 'його' )] займаної посади і видали #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_DAT')|L]#!#!."
  colonial_revolution.10.a: "Відправимо листа з вимогою."
  colonial_revolution.10.b: "Влагодимо це питання без розголосу."
  colonial_revolution.11.title: "Влада [target_country.Custom('CL_GEN')] вимагає, щоб [target_character.GetLastNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'була їм видана', 'був їм виданий' )]"
  colonial_revolution.11.desc: "З #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! нам надійшла офіційна вимога: [target_character.GetName] звинувачується у підбурюванні до заколоту проти [target_country.Custom('rank_ru_GEN')|l], а тому ця людина негайно має бути видана владі. Серед населення ширяться чутки, що насправді від [Select_CString(target_character.IsFemale, 'неї', 'нього' )] хочуть якомога швидше позбутися, щоб тим самим розпалити революційні настрої. Думки радників розділилися; хтось вважає [Select_CString(target_character.IsFemale, 'її', 'його' )] цінним губернатором, хтось не бажає зайвий раз засмучувати колоніальну владу."
  colonial_revolution.11.a: "Видамо [Select_CString(target_character.IsFemale, 'її', 'його' )]."
  colonial_revolution.11.b: "Ми не будемо йти на поводу у якоїсь колонії!"
  scales_with_character_abilities_tt: "Показник втраченої [Concept('government_power', 'влади уряду')|e] залежатиме від впливу та [Concept('total_ability', 'суми навичок')|e], якими володіє [target_character.GetName]"
  colonial_revolution.12.title: "Популярність у народу"
  colonial_revolution.12.desc: "Прагнення колоній тих чи інших держав відокремитися від метрополії сильне, однак [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] править своїми володіннями настільки ґрунтовно і суворо, що наші піддані цілком щиро люблять і поважають [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')]. Завдяки цьому населення здебільшого задоволене нашою владою."
  colonial_revolution.12.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  colonial_revolution.13.title: "Немає правителя"
  colonial_revolution.13.desc: "Наші піддані зазвичай завжди можуть згуртуватися навколо правителя… але зараз, на жаль, не той випадок: після того як [Select_CString(ROOT.GetCountry.GetGovernment.GetPreviousRuler.IsFemale, 'померла', 'помер' )] [ROOT.GetCountry.GetGovernment.GetPreviousRuler.GetName|l], ми залишилися без керівництва, і тепер у підданих починають проявлятися крамольні помисли про свободу і самостійність."
  colonial_revolution.13.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  colonial_revolution.14.title: "Мирний шлях уперед"
  colonial_revolution.14.desc: "#TOOLTIP:SITUATION,colonial_revolution,X #L Колоніальна революція#!#! — епоха постійної ворожнечі між метрополіями та їхніми підданими. Навіть найнезначніший конфлікт загрожує будь-якої секунди обернутися страшним кровопролиттям. До нас звернулася група поселенців — жителів #ONCLICK:COUNTRY,[target_colony.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_colony.Custom('CL_tt')],X [target_colony.Custom('CL_GEN')|L]#!#! та мешканців наших власних земель, які придумали, як нашим державам можна уникнути цієї жахливої долі. Якщо ми погодимося звільнити [target_colony.Custom('CL_ACC')] від усіх зобов'язань перед метрополією та закріпити на папері офіційний союз, то в подальшому ніщо не зможе затьмарити наше спільне майбутнє."
  colonial_revolution.14.a: "Зробимо разом крок до світлого майбутнього."
  colonial_revolution.14.b: "Поки не будемо переходити до нових відносин."
  colonial_revolution.15.desc.generic: "[ROOT.GetCountry.GetGovernment.GetCabinetTitle|U] нашої держави теж іноді зазнає потрясінь: на недавньому засіданні між собою запекло посперечалися [target_character.GetName] та [target_character_2.GetName]."
  colonial_revolution.15.desc.generic_2: "Очевидно, що [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] більше не зможе терпіти цих двох. Когось зі сперечальників доведеться покарати."
  colonial_revolution.15.title: "Розбрат у раді"
  colonial_revolution.15.desc.subject: "$colonial_revolution.15.desc.generic$ [target_character.GetNameWithNoTooltip], [Select_CString(target_character.IsFemale, 'відома', 'відомий' )] своєю відданістю метрополії, [Select_CString(target_character.IsFemale, 'заявила', 'заявив' )], що [target_character_2.GetNameWithNoTooltip] віроломно руйнує наші взаємини. [target_character_2.GetNameWithNoTooltip], своєю чергою, [Select_CString(target_character_2.IsFemale, 'вибухнула', 'вибухнув' )] звинуваченнями в експлуатації простолюду в чужих інтересах. $colonial_revolution.15.desc.generic_2$"
  colonial_revolution.15.desc.overlord: "$colonial_revolution.15.desc.generic$ [target_character.GetNameWithNoTooltip] раніше [Select_CString(target_character.IsFemale, 'виступала', 'виступав' )] за добрі відносини з колоніями, а на засіданні [Select_CString(target_character.IsFemale, 'закликала', 'закликав' )] не так сильно експлуатувати переселенців. На цю риторику жорстко [Select_CString(target_character_2.IsFemale, 'відповіла', 'відповів' )] [target_character_2.GetNameWithNoTooltip]: [Select_CString(target_character_2.IsFemale, 'вона', 'він' )] вважає, що без експлуатації неможливе процвітання нашої держави. $colonial_revolution.15.desc.generic_2$"
  colonial_revolution.15.a: "[target_character.GetNameWithNoTooltip] наводить переконливіші аргументи."
  colonial_revolution.15.b: "Ми згодні з доводами, які висловлює [target_character_2.GetNameWithNoTooltip]."
  colonial_revolution.1000.title: "Свободі потрібна підтримка"
  colonial_revolution.1000.desc: "Щоб боротися за свободу, одних лише ідеалів недостатньо — нам потрібні кошти, і чимало. На щастя, [target_overlord.GetLongName] — винятково мерзенна держава, що нажила собі чимало ворогів, серед яких є і [target_rival.GetName]. Ми сподіваємося, що ця країна готова буде посприяти справі знищення суперника. Якщо наші перемовники впораються зі своїм завданням, ми зможемо розраховувати на значні вкладення."
  colonial_revolution.1000.a: "Немає ресурсу важливішого, ніж гроші."
  colonial_revolution.1000.b: "Для перемоги нам потрібно більше військ."
  colonial_revolution.1000.c: "Нехай вони приєднаються до нашої війни."
  colonial_revolution.1000.d: "Втім, обійдемося і без їхньої допомоги."
  ar_gain_money_tt: "Якщо вони приймуть наші вимоги, ми отримаємо частину їхнього доходу"
  ar_gain_manpower_tt: "Якщо вони приймуть наші вимоги, ми отримаємо частину їхніх рекрутів"
  ar_gain_alliance_tt: "Якщо вони погодяться, ми укладемо з ними союз"
  colonial_revolution.1001.title: "[target_colony.GetNameWithNoTooltip] просить про допомогу"
  colonial_revolution.1001.desc: "Нещасний народ із колонії [target_colony.GetName] живе під страшним гнітом: [target_overlord.GetName] — справжній тиран. До нас прибула делегація колоністів, що просить підтримати їхню боротьбу за незалежність. Від нас, втім, вони очікують дуже багато чого, а тому слід подумати: можливо, ми не зможемо їм допомогти."
  colonial_revolution.1001.a: "Усе що завгодно, аби ослабити суперника."
  colonial_revolution.1001.b: "Ні, ми не хочемо, щоб і нас заразили їхні уявлення про свободу."
