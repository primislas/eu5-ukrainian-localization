l_russian:
  italian_wars.1.title: "Італійські війни"
  italian_wars.1.desc.a: "#TOOLTIP:REGION,italy_region,X #L Італія#!#! в небезпеці. Закулісні ігри та нескінченні інтриги інших великих держав призвели до безпрецедентних дипломатичних наслідків. Ворожі сили хочуть відібрати нашу владу та вплив на півострові. У цей небезпечний час ми повинні діяти без вагань. Перемога над Італією забезпечить нам місце серед великих держав."
  italian_wars.1.desc.b: "До #TOOLTIP:REGION,italy_region,X #L Італії#!#! прийшла війна. Іноземні завойовники вторглися на нашу землю, бажаючи прибрати до рук наші незліченні багатства. Великі держави кружляють над півостровом, немов зграя голодних стерв'ятників. Такого не було ніколи в історії нашого регіону. Нашим людям час взяти в руки мечі та щити, щоб захистити нашу свободу та покласти край експансії чужинців…"
  italian_wars.1.a: "Жереб кинуто."
  italian_wars_explanation_tooltip1: "У ці часи країни Італії зможуть отримати захист, приєднавшись до #italic  італійської ліги#!.\n"
  italian_wars_explanation_tooltip2: "Інші країни можуть створювати #italic  іноземні ліги#!, щоб розширити свій вплив у регіоні.\n"
  italian_wars_explanation_tooltip3: "[Concept('rivals', 'Суперники')|e] та [Concept('enemies', 'вороги')|e] лідерів #italic  іноземних ліг#! можуть допомогти #italic  італійській лізі#!, вступивши у війну або надавши потрібні засоби та людей\n"
  italian_wars_explanation_tooltip4: "Лідери всіх ліг отримують доступ до [Concept('peace_treaty', 'мирного договору')|e] «[ShowPeaceTreatyTypeName('dissolve_league_peace_deal')]»"
  italian_wars.1.historical_info: "Італійські війни (1494–1559) — це серія військових конфліктів між Францією та Іспанією за володіння Італією, в яких так чи інакше брала участь значна частина європейських країн. Усе почалося, коли французький король Карл VIII вторгся до Італії в 1494 році та захопив Неаполь. Однак католицькі королі Іспанії Максиміліан I Габсбург, Ізабелла Кастильська та Фердинанд Арагонський прийшли на допомогу папі та вигнали французів. У 1499 році французький король знову взяв Мілан, Геную та Неаполь, але Іспанія прогнала його з Неаполя в 1503 році, утвердивши свою владу над Південною Італією, а папа Юлій II створив альянс, щоб вигнати французів із Північної Італії. Кілька років потому французький король Франциск I заявив свої претензії на Мілан, і місто було взято в 1515 році, але в 1525 році Франциск програв вирішальну битву при Павії імператору Карлу V, також відомому як король Іспанії Карлос I, і був узятий у полон. Після формальної відмови від усіх домагань на італійські території Франциск I був звільнений, але потім уклав союз з Англією, папою, Венецією та Флоренцією, що призвело до розграбування Риму німецькими ландскнехтами Карла V у 1527 році, укладення миру з папою та коронації Карла V у Болоньї в 1529 році. Італійські війни завершилися підписанням Като-Камбрезького миру в 1559 році, після чого іспанські Габсбурги залишалися домінуючою силою в Італії протягом 150 років."
  italian_wars.2.title: "Закінчення бойових дій"
  italian_wars.2.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale,'діяла', 'діяв')] рішуче. Стерв'ятники з #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#! здалися під [Select_CString(target_character.IsFemale,'її', 'його')] натиском та погодилися підписати мир на умовах «статус-кво» під загрозою вторгнення #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!…"
  italian_wars.2.a: "Цікавий результат."
  iw_we_are_safe_for_now_tt: "Поки що ми в безпеці…"
  italian_wars.4.title: "Запрошення до ліги"
  italian_wars.4.desc: "Ситуація в нашому регіоні погіршується. Наш народ відчув на собі всі жахи війни. У відповідь на агресію іноземних загарбників влада #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#! створює об'єднання «[target_io.GetName]». Вони надіслали нам запрошення. Це питання виняткової дипломатичної важливості. Ми повинні прийняти виважене рішення."
  italian_wars.4.a: "Ми приймаємо запрошення!"
  italian_wars.4.b: "Ми повинні зберегти нейтралітет."
  italian_wars.4.c: "Ми вірні [target_country.Custom('CL_DAT')]!"
  italian_wars.5.title: "Іноземне втручання"
  italian_wars.5.desc: "Схоже, наше протистояння могутній іноземній лізі привабило іншого серйозного гравця. [target_character.GetName] погоджується приєднатися до нашої боротьби проти #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#!."
  italian_wars.5.a: "Несподіваний поворот!"
  italian_wars.7.title: "Втручання [actor.Custom('CL_GEN')]"
  italian_wars.7.desc: "[actor.GetLongName], ці підлі пси, висунули нам ультиматум. Мабуть, вони вирішили піти на нас через війну, яку ми ведемо проти #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!! Вони вимагають негайно укласти мир на умовах «статус-кво», інакше перейдуть на бік наших ворогів."
  italian_wars.7.a: "Кровопролиття неминуче."
  italian_wars.7.b: "Ми неохоче погоджуємося…"
  italian_wars.9.title: "Допомога [actor.Custom('CL_GEN')]"
  italian_wars.9.desc: "Гонець приносить благу звістку: схоже, [actor.GetName] не проти допомогти нам в оборонній війні, щоб баланс сил не змістився на користь ворогів."
  italian_wars.9.a: "Ми об'єднаємо сили проти спільного ворога…"
  italian_wars.10.title: "Дві шальки терезів"
  italian_wars.10.desc: "Війна, що спустошує землі #ONCLICK:COUNTRY,[target.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target.Custom('CL_tt')],X [target.Custom('CL_GEN')|L]#!#!, ставить під загрозу баланс сил в #TOOLTIP:REGION,italy_region,X #L Італії#!#!. Ми не можемо дозволити черговій лізі зміцнитися на півострові. [target.GetLongNameWithNoTooltip] — ми вирішили відправити допомогу цій країні, щоб підтримати її народ, що захищає свої землі від наших ворогів."
  italian_wars.10.a: "Відправимо на допомогу солдатів."
  italian_wars.10.b: "Відправимо грошові кошти."
  italian_wars.100.title: "Закінчення Італійських війн"
  italian_wars.100.desc: "Десятиліттями ми боролися за свободу нашого регіону, і зусилля нашої могутньої ліги не пройшли дарма. Іноземні загарбники відступили від кордонів, і наш народ впевнено дивиться в майбутнє. Епоха війн завершилася. Попереду нас чекає процвітання!"
  italian_wars.100.a: "Сила у вірності!"
  iw_gain_5_trust_with_every_member_tt: "[Concept('trust', 'Довіра')|e] до нас кожного [Concept('member', 'учасника')|e] #italic  італійської ліги#! зросте на #G  5 од.#!"
  iw_send_aid_tt: "Ми допоможемо обраній [Concept('country', 'країні')|e] деяким [Concept('manpower', 'числом рекрутів')|e] або [Concept('gold', 'дукатами')|e]"
  italian_wars.200.desc: "Нарешті Італійські війни завершилися. Всі іноземні ліги, що бажали захопити наші землі, розпалися, і на наш півострів повернулися мир та процвітання. Ми довели, що є істинними господарями #TOOLTIP:REGION,italy_region,X #L Італії#!#!. Попереду нас чекають великі справи!"
  italian_wars.200.a: "Розпочалася епоха [target_country.Custom('CL_GEN')]!"
  italian_wars.300.title: "Об'єднання «[target_io.GetNameWithNoTooltip]» перемагає в Італії"
  italian_wars.300.desc: "Попри тривалий та запеклий опір, тепер #TOOLTIP:REGION,italy_region,X #L Італія#!#! майже повністю в нашій владі. Ті, хто намагався завадити нашим планам, нині рятуються від нашого великого війська за високими стінами. Ми утвердили своє право на регіон, і з цього дня починається нова епоха!"
  italian_wars.300.a: "Хай живе [target_character.GetNameWithNoTooltip]!"
  italian_wars.400.title: "Італійський глухий кут"
  italian_wars.400.desc: "Як ми не намагалися, нам не вдалося зрушити ситуацію з мертвої точки. Схоже, #TOOLTIP:SITUATION,italian_wars,X #L Італійські війни#!#! зайшли в глухий кут. Як країни півострова, так і іноземні загарбники не змогли об'єднати землі регіону та значно розширити свій вплив."
  italian_wars.400.a: "Який сенс продовжувати війну?"
  end_the_italian_wars_stalemate_tt: "Італійські війни зайдуть у глухий кут…"