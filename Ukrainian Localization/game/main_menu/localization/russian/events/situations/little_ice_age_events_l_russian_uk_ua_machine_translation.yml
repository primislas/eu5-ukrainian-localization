l_russian:
  little_ice_age.1.title: "Малий льодовиковий період"
  little_ice_age.1.desc: "Останні кілька зим видалися дуже суворими. [ROOT.GetCountry.GetLongName] страждає від неврожаїв, голоду та холоду; життя в країні стає все важчим. Землероби збирають все менше врожаю, а комори стоять майже порожні. Народ не знає, чим ми провинилися і як накликали на себе божественний гнів. Залишається лише сподіватися, що колись сонце знову почне зігрівати нещасну землю."
  little_ice_age.1.historical_info: "#italic Малий льодовиковий період#! — глобальне похолодання, що зачепило майже все північне півкуля. Передбачається, що причиною його настання стала сукупність факторів, у тому числі зменшена сонячна активність, частіші виверження вулканів та зміни океанських течій. У міру падіння температури зима щороку ставала довшою та суворішою, що іноді призводило до погодних феноменів, наприклад замерзання Темзи. Воно збіглося з вулканічною зимою, викликаною виверженням вулкана Уайнапутіна. Малий льодовиковий період ознаменувався не тільки рекордно низькими температурами — нічого подібного не фіксувалося кілька століть — а й масовим голодом у Європі."
  little_ice_age.1.a: "Помолимося, щоб настали теплі дні…"
  start_of_little_ice_age_tt: "Зими стануть довшими, а запаси [Concept('food', 'їжі')|e] почнуть страждати: у цей час імовірні #italic голод#! та #italic нестача ресурсів#!"
  little_ice_age.100.title: "Закінчення малого льодовикового періоду"
  little_ice_age.100.desc: "Десятки років потому, як зими почали ставати холоднішими, ми продовжуємо відчувати нестачу їжі. Але, незважаючи на всі негаразди, які обрушив на нас #TOOLTIP:SITUATION,little_ice_age,X #L Малий льодовиковий період#!#!, ми вижили. Простори [ROOT.GetCountry.Custom('rank_ru_GEN')|l] як і раніше вкриті льодом, проте найгірше вже позаду. Постійна загроза голоду, викликана багаторічними неврожаями, стала найважчим випробуванням для багатьох з нас, але ми як і раніше зустрічаємо кожен новий день з терплячою надією!"
  little_ice_age.100.a: "Будемо чекати, коли настануть теплі дні."
  end_of_little_ice_age_tt: "Наші [Concept('areas', 'області')|e] перестануть страждати від затяжних [Concept('winter', 'зим')|e]. [Concept('situation', 'Ситуація')|e] «[ShowSituationNameWithNoTooltip('little_ice_age')]» завершиться."