l_russian:
  hussite_wars: "Гуситські війни"
  hussite_wars_desc: "#TOOLTIP:RELIGION,$hussite_tt$,X #L Гусити#!#! та #TOOLTIP:RELIGION,$catholic_tt$,X #L католики#!#! нескінченно конфліктують. Ця низка зіткнень швидко переросла в повномасштабну війну за релігійну приналежність держави."
  recognized_hussites_tt: "#Y  Гуситські війни#! закінчилися нашою перемогою"
  has_not_had_this_situation_before_tt: "Ця [Concept('situation', 'ситуація')|e] виникла вперше"
  DEFENDERS_CATHOLICISM: "Оборонний [Concept('alliance', 'союз')|e] проти Богемії"
  DEFENDERS_HUSSITISM: "Оборонний [Concept('alliance', 'союз')|e] проти Риму"
  bohemia_and_pope_at_war_with_both_being_leaders_tt: "[GetCountry('BOH').GetName] та [GetCountry('PAP').GetName] воюють одне з одним, причому кожна з [Concept('country', 'держав')|e] є [Concept('war_leader', 'лідером війни')|e] для своєї сторони"
  HERETICS_KILLED: "Убиті на трибуналі"
  HERETICS_CONVERTED: "Навернені на трибуналі"
  loc_key_desc_tribunal: "У ході [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,hussite_wars,X #L «Гуситські війни»#!#! ворогам #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#! доступна унікальна [Concept('action', 'дія')|e] [Concept('unit', 'загону')|e] «[ShowUnitAbilityName('hussite_tribunal')]». Скористатися нею можна в тих [Concept('locations', 'місцевостях')|e], які перебувають під контролем [Concept('enemy', 'ворогів')|e]-#TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#!. Частина [Concept('pops', 'населення')|e], що сповідує гуситство, буде [Concept('convert', 'навернена')|e], решта — віддана мечу."
  hussite_wars.1.title: "[jan_zelivsky_scope.GetNameWithNoTooltip] та його конгрегація"
  HUSSITE_WARS_SIDE_BOHEMIA: "[THIS.GetLocation.GetOwner.GetLongName|Y] та [GetCountry('BOH').GetLongName] підтримують одне одного в #TOOLTIP:SITUATION,hussite_wars,X #L Гуситських війнах#!#!!"
  HUSSITE_WARS_SIDE_POPE: "[THIS.GetLocation.GetOwner.GetLongName|Y] та [GetCountry('BOH').GetLongName] ворогують одне з одним у #TOOLTIP:SITUATION,hussite_wars,X #L Гуситських війнах#!#!!"
  pope_hw_tt: "Це [GetCountry('PAP').GetGovernment.GetRulerTitle|l] — непримиренний ворог #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#!!"
  boh_hw_tt: "Це [GetCountry('BOH').GetLongName] — захисники #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#!!"
  recent_tribunal_tt: "За останні #Y 5#! років тут було здійснено дію «[ShowUnitAbilityName('hussite_tribunal')]»"
  convert_heretics_hw_action: "Примусові навернення"
  convert_heretics_hw_action_desc: "Досить терпіти тиск з боку єретиків! Час стати на захист #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситських#!#! традицій та вірувань. Для цього нам знадобиться сувора дисципліна, зокрема в обрядах, що здійснюються в [actor.Custom('rank_ru_PREP')|l]."
  demand_donation_key: "Нас чекають сутички та війни, але без них неможливо забезпечити мир та захистити кордони. Ми вимагатимемо, щоб кошти на це нам надали найвпливовіші"
  demand_noble_donations_hw_action: "Вимагати пожертв від знаті"
  demand_noble_donations_hw_action_desc: "$demand_donation_key$ знатні."
  demand_clergy_donations_hw_action: "Вимагати пожертв від духовенства"
  demand_clergy_donations_hw_action_desc: "$demand_donation_key$ духовні особи."
  demand_burgher_donations_hw_action: "Вимагати пожертв від купців"
  demand_burgher_donations_hw_action_desc: "$demand_donation_key$ міщани."
  prepare_defenses_hw_action: "Підготувати оборону"
  prepare_defenses_hw_action_desc: "Незабаром на наші землі обрушаться незліченні натовпи #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#!, охоплених шаленим бажанням встановити верховенство своєї релігії. Розумно буде подбати про те, щоб у кожній провінції була влаштована надійна оборона."
  align_with_moderates_help_hw_action: "Підтримати поміркованих"
  align_with_moderates_help_hw_action_desc: "Виявивши терпимість і готовність йти на переговори, ми напевно привернемо на свій бік багатьох співчуваючих — навіть з тих держав, що схилили коліно перед #TOOLTIP:RELIGION,$catholic_tt$,X #L католиками#!#!."
  align_with_radicals_help_hw_action: "Підтримати радикалів"
  align_with_radicals_help_hw_action_desc: "Ми залишилися самі в оточенні єретиків, і вони бродять біля наших кордонів з голодними поглядами, немов шакали. Жодної терпимості до ворогів! Ми будемо ревними та нещадними."
  join_the_papal_side_hw_action: "Стати на бік держави [GetCountry('PAP').GetLongNameWithNoTooltip]"
  join_the_papal_side_hw_action_desc: "[GetCountry('PAP').GetLongName] веде важку боротьбу з єрессю, і наше завдання — допомогти стерти цю заразу з лиця #TOOLTIP:CONTINENT,europe,X #L Європи#!#!!"
  join_the_hussite_side_hw_action: "Стати на бік держави [GetCountry('BOH').GetLongNameWithNoTooltip]"
  join_the_hussite_side_hw_action_desc: "Ми не можемо закривати очі на безчинства, які [GetCountry('PAP').GetLongName] творить щодо нещасних. [GetCountry('BOH').GetLongName] буде під нашим захистом, і разом ми покладемо край цьому шаленому [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]у хрестовому походу!"
  hw_province_gains_hw_heretic_conversions_modifier_tt: "Позначена [Concept('province', 'провінція')|e] отримає модифікатор «[ShowModifier('hw_heretic_conversions_modifier')]» на #Y 10#! років"
  prepare_defenses_hw_action_tt: "Кожна [Concept('location', 'місцевість')|e] у позначеній [Concept('province', 'провінції')|e] отримає модифікатор #TOOLTIP:STATIC_MODIFIER,hw_prepared_defenses_modifier,X #V #L «Підготовка оборони»#!#! на #Y 15#! років. За можливості в [Concept('province_capital', 'столиці провінції')|e] буде збудовано #TOOLTIP:BUILDING_TYPE,castle,X #L замок#!#! за ціною в #G –90%#! від базової"
  countries_less_likely_to_join_against_us_tt: "Сусідні з нами [Concept('countries', 'держави')|e] з #G меншою ймовірністю#! приєднуватимуться до війн проти нас, доки діє модифікатор «[ShowModifier('promoted_moderates_modifier')]»"
  countries_more_likely_to_join_against_us_tt: "Сусідні з нами [Concept('countries', 'держави')|e] з #R більшою ймовірністю#! приєднуватимуться до війн проти нас, доки діє модифікатор «[ShowModifier('promoted_radicals_modifier')]»"
  catholic_victory_tt: "Перемога католиків"
  hussite_victory_tt: "Перемога гуситів"
  reignite_the_fires_of_crusade_tt: "Відносини між [GetCountry('BOH').Custom('longname_ru_wntt_INST')] та католицькими [Concept('countries', 'державами')|e] погіршаться. З часом багато хто може приєднатися до нашої справи"
  income_depends_on_estate_power_tt: "Отримувана сума [Concept('gold', 'дукатів')|e] буде в основному залежати від [Concept('estate_power', 'влади')|e] [Concept('estate', 'стану')|e]"
  join_current_war_against_papal_states_tt: "Ми приєднаємося до [Concept('war', 'війни')|e] [GetCountry('BOH').Custom('longname_ru_GEN')] проти [GetCountry('PAP').Custom('longname_ru_GEN')]"
  join_current_war_against_bohemia_tt: "Ми приєднаємося до [Concept('war', 'війни')|e] [GetCountry('PAP').Custom('longname_ru_GEN')] проти [GetCountry('BOH').Custom('longname_ru_GEN')]"
  hussite_wars.1.desc.generic: "Розлючені натовпи на чолі зі священником на ім'я [jan_zelivsky_scope.GetName] заполонили вулиці [target_boh_capital_scope.Custom('LR_GEN')|l] [target_boh_capital_scope.GetName]. Вони вимагають від міської ради розширення прав та звільнення кількох ув'язнених-#TOOLTIP:RELIGION,$hussite_tt$,X #L гуситів#!#!."
  hussite_wars.1.desc: "$hussite_wars.1.desc.generic$ На жаль, суддя та його помічники не виконали вимог протестувальників, що призвело до зростання невдоволення відсутністю реформ та спалахів насильства. Можливо, настав час розірвати це порочне коло…"
  hussite_wars.1.desc.other_heresy: "$hussite_wars.1.desc.generic$ Переважно #L [ROOT.GetCountry.GetReligion.GetAdjective|l]а#! рада симпатизує гуситським братам, але #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькі#!#! агенти не припиняють свою підривну діяльність. Чи збережемо ми свою віру, чи приймемо гуситську, #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! світ у будь-якому разі продовжить вважати нас єретиками, яких слід позбутися…"
  hussite_wars.1.a: "Смерть тобі, [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle|l]!"
  hussite_wars.1.b: "Ми не можемо собі дозволити розколи серед католиків."
  hussite_wars.1.c: "Настав час покарати зрадників, що затесалися в наші лави!"
  end_hussite_wars_situation_tt: "Це запобіжить виникненню [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,hussite_wars,X #L «Гуситські війни»#!#!"
  pap_gets_hussite_wars.2_tt: "На території #ONCLICK:COUNTRY,[target_pope_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_pope_country.Custom('CL_tt')],X [target_pope_country.Custom('CL_GEN')|L]#!#! відбувається подія #Y «Гуситські протести в місті [target_boh_capital_scope.GetNameWithNoTooltip]»#!"
  boh_every_neighboring_country_tt: "Кожна несоюзна [Concept('country', 'держава')|e] поруч із нами або будь-яким із наших [Concept('subjects', 'ленників')|e] отримає [ShowBiasValue('violated_congress_of_visegrad_modifier')|+=0] до [Concept('opinion', 'думки')|e] про нас"
  hussite_rebellion_tooltip: "Кожна [Concept('pop', 'група населення')|e], яка симпатизує #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситам#!#!, мобілізує сили та підтримає групу заколотників «[hussite_rebel_scope.GetName]»"
  hussite_wars.2.title: "Гуситські протести в місті [target_boh_capital_scope.GetNameWithNoTooltip]"
  hussite_wars.2.desc: "Виявляється, [target_country.GetLongName] — держава, вся територія якої охоплена заворушеннями! Розлючені послідовники #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#! вийшли на вулиці. Вони викидають чиновників із вікон і вимагають справедливості та визнання з боку Святого Престолу.\n\nЯкщо не втрутитися, ситуація може вийти з-під контролю та спричинити заворушення в усьому #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькому#!#! світі, а ми не можемо дозволити собі проявити слабкість…"
  hussite_wars.2.a: "Ми покараємо цих єретиків!"
  hussite_wars.2.b: "Визнаймо їхній рух…"
  every_neighbor_of_bohemia_gets_hussite_wars.3_tt: "Подія #Y «Правовірні закликають до зброї»#! відбувається в кожній #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькій#!#! несоюзній державі неподалік від #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!"
  hussite_wars.6_happens_for_catholic_champion_scope_tt: "[catholic_champion_scope.GetName] переживає подію #Y «Войовниче #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтво#!#!»#!"
  hussite_supremacy_tt: "У [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,hussite_wars,X #L «Гуситські війни»#!#! перемога дістанеться гуситам"
  hussite_wars.3.title: "Правовірні закликають до зброї"
  hussite_wars.3.desc: "Бажаючи викорінити єресь, [GetCountry('PAP').GetGovernment.GetRulerTitle|l] ополчився проти народу #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#!. Він вимагає, щоб ми виконали свій #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! обов'язок і приєдналися до священного воїнства. Нам варто добре подумати. Не хотілося б нажити собі могутніх ворогів у безглуздій спробі довести свою правовірність."
  hussite_wars.3.a: "До зброї!"
  hussite_wars.3.b: "Не поспішаймо."
  hussite_wars.4.title: "Мирне місто [target_capital.GetNameWithNoTooltip]"
  hussite_wars.4.a.desc: "Наша боротьба за рівноправність і визнання з боку #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! влади принесла свої плоди. Ми захистили наш народ і нашу віру, а тепер претендуємо на важливе місце за європейським столом."
  hussite_wars.4.b.desc: "Ми скуштували гіркоту поразки й були змушені визнати верховенство #TOOLTIP:RELIGION,$catholic_tt$,X #L католицької#!#! церкви. У нас була мрія, в яку ми вірили всією душею, але ми здригнулися перед обличчям корупції та зла, і їй не судилося збутися…"
  hussite_wars.4.a: "Істинна віра перемогла!"
  hussite_wars.4.b: "На священній війні всі засоби добрі…"
  hussite_wars.5.title: "[Select_CString(target_character.IsFemale,'Одноока', 'Одноокий')] [target_character.GetLastNameWithNoTooltip]"
  hussite_wars.5.desc: "У кожній війні є свої герої, і [target_character.GetName] якраз із їх числа. [Select_CString(target_character.IsFemale,'Її', 'Його')] внесок у спільну справу неможливо переоцінити. Ходять чутки, що ворожа стріла позбавила [Select_CString(target_character.IsFemale,'її', 'його')] одного ока. Очевидці кажуть, що замість того, щоб відступити або здатися, [Select_CString(target_character.IsFemale,'вона', 'він')] просто [Select_CString(target_character.IsFemale,'витягла', 'витягнув')] стрілу і [Select_CString(target_character.IsFemale,'продовжила', 'продовжив')] битися.\n\nПопри каліцтво, [target_character.GetName] [Select_CString(target_character.IsFemale,'стала', 'став')] грізним полководцем і прагне підвищення, щоб отримати в підпорядкування більше людей і привести їх до перемоги. Якщо ми проголосимо [Select_CString(target_character.IsFemale,'її', 'його')] [Select_CString(target_character.IsFemale,'героїнею', 'героєм')] і символом нашого опору, то завдамо #TOOLTIP:RELIGION,$catholic_tt$,X #L католицтву#!#! серйозного удару."
  hussite_wars.5.a: "Нашим людям потрібен великий герой."
  hussite_wars.5.historical_info: "Ян Жижка з Троцнова — видатний полководець XV століття, який здобув популярність як один із вождів гуситського руху. Під його командуванням гусити здобули безліч перемог. Саме він винайшов військову тактику, що передбачає використання скріплених возів для мобільної оборони. Його стратегічний геній і харизма допомогли гуситам вистояти під час численних хрестових походів, організованих католицькою церквою."
  hussite_wars.6.title: "Войовниче католицтво"
  hussite_wars.6.desc: "У важкі часи, коли світ навколо став розсадником єресі, ми мусимо зібрати волю в кулак і розпочати хрестовий похід проти тих, хто бажає нашкодити нашому правовірному народу.\n\n[GetCountry('BOH').GetLongName] — наш ворог, і сам очільник католицької церкви попросив нас підняти прапор ревної священної війни, щоб підтримати його боротьбу. За [ShowReligionName('catholic')|l]!"
  hussite_wars.6.a: "Ми знищимо цих єретиків!"
  hussite_wars.6.b: "Ми не ланцюгові пси папізму!"
  hussite_wars.7.title: "Незавидна доля гуситів"
  hussite_wars.7.desc: "Побитий гонець приніс нам жахливу звістку. Він розповів про підлий хрестовий похід, розпочатий #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_INST')|L]#!#!. Територія #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#! потопає в крові: хрестоносці залишають по собі випалені землі, а на вулицях зійшлися в смертельній сутичці тисячі солдатів і селян.\n\nГонець нагадує про міцні узи братерства, які пов’язують наші народи, і просить нас не залишати його людей у біді. Влада [GetCountry('BOH').Custom('CL_GEN')] волає про допомогу!"
  hussite_wars.7.a: "І влада [GetCountry('POL').Custom('CL_GEN')] відгукнеться на її поклик. Наказати вершникам сідлати коней!"
  hussite_wars.7.b: "Ми не вороги самим собі…"
  teutons_hussite_wars_tt: "[GetCountry('TEU').GetLongName] — тут відбувається подія #Y  «Правовірні закликають до зброї»#!"
  hussite_wars.8.title: "Спільний ворог"
  hussite_wars.8.desc: "Наші співгромадяни в розпачі. Зараз, коли армія єретиків ломиться в наші ворота, багато, здавалося б, непримиренних суперечностей відійшли на другий план: усі об’єдналися проти жадібних і недалекоглядних ворогів. Наші сміливі та благочестиві люди обов’язково впораються з цією бідою і здолають тих, хто бажає нашкодити нашому народу та нашій вірі, доб’ються справедливості, відновлять повагу до себе та повернуть колишню велич."
  hussite_wars.8.a: "Вперед, славні сини та дочки [GetCountry('BOH').Custom('CL_GEN')]!"
  boh_clergy_donation_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] пожертвує кошти, які будуть спрямовані на підвищення духу нашого народу"
  hussite_wars.8.b: "Ми будемо поширювати наше вчення проти католиків із ще більшою ревністю."
  hussite_wars.8.c: "Нехай у ці важкі часи нам допоможуть [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]…"
  hussite_wars.9.title: "Новий хрестовий похід проти гуситів"
  hussite_wars.9.desc: "Чума під назвою «[ShowReligionName('hussite')|l]» — загроза кожній богобоязній і побожній людині. Ця хвороба підточує єдність нашої віри та основи божественного світопорядку. Гусити поширюють єресь, сіють розбрат і паплюжать священне вчення, якому #TOOLTIP:RELIGION,$catholic_tt$,X #L католики#!#! старанно слідують десятиліттями. Терпіти таке нехтування більше неможливо. Наш священний обов’язок — скликати легіони католиків і рішучим кроком вирушити в похід — знищити єресь, доки та не встигла остаточно роз’їсти серця людей. Стерши всі сліди гуситського впливу, ми збережемо свою віру та відновимо священний порядок, за яким так засумували наші землі."
  hussite_wars.9.a: "На війну!"
  hussite_wars.9.b: "Поки що будемо вичікувати."
  explain_situation_peace_treaty_tt: "У ході цієї [Concept('war', 'війни')|e] ми зможемо знищити #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситство#!#! за допомогою [Concept('peace_treaties', 'мирних договорів')|e] «[ShowPeaceTreatyTypeName('force_convert')]» та «[ShowPeaceTreatyTypeName('supress_hussite_faith')]» і покласти край #TOOLTIP:SITUATION,hussite_wars,X #L Гуситським війнам#!#!"
  hussite_wars.10.title: "Гуситські війни"
  hussite_wars.10.desc: "[target_bohemia.GetName] перебуває на межі катастрофи. Дедалі більше незадоволених приєднується до руху #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситів#!#!, і в очах #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! країн наша держава перетворюється на вигнанця. Після того як [Select_CString(GetCharacter('boh_jan_hus').IsFemale, 'була страчена', 'був страчений' )] [GetCharacter('boh_jan_hus').GetName], розкольництво лише посилилося. І [GetCountry('BOH').GetGovernment.GetEstateName('peasants_estate')|l], і [GetCountry('BOH').GetGovernment.GetEstateName('nobles_estate')|l] — кожен сьогодні уважно слухає єретичні проповіді із закликами заснувати нову церкву, над якою [target_location1.GetName] не матиме жодної влади.\n\n[GetCountry('BOH').Custom('rank_ru_ACC')] охоплюють заворушення, а в [target_location2.Custom('LR_PREP')|l] [target_location2.GetName] розгорається пожежа реформації. Для учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! те, що відбувається, — вже не просто народний бунт, а цілеспрямований заколот єретиків, готових домагатися свого зі зброєю в руках. Якщо не стримати поширення цієї напасті на території [target_bohemia.Custom('CL_GEN')], вона пошириться за кордони держави, і тоді загроза нависне над усім #TOOLTIP:RELIGIONGROUP,christian,X #L християнським#!#! світом."
  hussite_wars.10.a: "До зброї! Відстоїмо свою віру!"
  hussite_wars.10.historical_info: "Гуситські війни (1419–1434) — низка релігійних і громадянських конфліктів на території Богемії, спричинених стратою Яна Гуса — чеського реформатора та критика католицької церкви. Його послідовники, які називали себе гуситами, вимагали проведення церковних реформ: допускати до причастя всіх без винятку та заснувати власну церкву, незалежну від Риму. Гуситам-радикалам протистояли вірні своїй церкві католики та хрестоносці, що підкорялися імператору Священної Римської імперії та папі римському. Свою невелику порівняно з противниками чисельність гусити гідно компенсували винахідливою тактикою на полі бою та згуртованістю, що дозволяло їм завдавати ворогу відчутних поразок. Згодом церква була змушена піти на переговори та навіть на деякі поступки."
  hussite_rebellion: "Повстання гуситів"