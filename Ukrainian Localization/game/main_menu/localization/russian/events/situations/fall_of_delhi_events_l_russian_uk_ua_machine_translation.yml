l_russian:
  delhi_situation.1.title: "Хистке становище"
  delhi_situation.1.desc: "Колись бог був до нас прихильний. Велика династія [ROOT.GetCountry.GetGovernment.GetRuler.GetDynasty.GetName] змістила наших попередників Хільджі у 1320 році. Відтоді Індія сильно змінилася, і багато земель перейшли до нас у володіння. Однак з часом народ розлюбив нас, а ті, кого ми колись зробили намісниками й обдарували своєю милістю, перетворилися на змій, які причаїлися в траві й очікують слушного моменту для нападу.\n\nНаше майбутнє сповнене небезпек і потрясінь. [GetCountry('DLH').GetFlavorRank] стоїть на порозі змін. Що нас чекає? Загибель чи повне панування? Буря вже близько…"
  delhi_situation.1.a: "Ми переживемо цю бурю."
  delhi_situation.2.title: "Хмари згущуються"
  delhi_situation.2.desc: "Новини про ослаблення колись могутньої династії [GetCountry('DLH').GetGovernment.GetRuler.GetDynasty.GetName] досягли міста [target_capital.GetName]. Перед нами важкий вибір. Ми могли б набратися мужності й виступити проти загарбників з #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#!, ризикуючи накликати на себе їхній гнів. Однак багато наших радників вважають, що цей гігант ледве тримається на ногах, і гаряче підтримують ідею протистояння, сподіваючись, що ми здобудемо перемогу й розширимо свої володіння."
  delhi_situation.2.a: "Наберемося терпіння. Наш час ще не настав."
  delhi_situation.2.b: "Ми простягнемо їм руку допомоги в скрутну годину."
  delhi_situation.2.c: "Краще поки не втручатися."
  side_with_opposers_tt: "Ми виступимо #R проти#! [GetCountry('DLH').Custom('CL_GEN')] у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  side_with_delhi_tt: "Ми виступимо #G на боці#! [GetCountry('DLH').Custom('CL_GEN')] у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  delhi_situation.3.title: "Найтемніша година"
  delhi_situation.3.desc: "На жаль, повільне загнивання, невміле керівництво та надмірне розширення владних повноважень зробили свою чорну справу. Вороги, які бажають прибрати до рук наші землі, вийшли з тіні та заявили про свої наміри. Кілька наступних десятиліть наші нащадки назвуть темними часами. Тільки наша віра та відвага допоможуть нам вижити.\n\nОднак ми — гордий народ, який завоював найбільшу територію за всю історію людства. Ми не здамося без бою!"
  delhi_situation.3.a: "Найгірше ще попереду…"
  dlh_situation_commences_tt: "Деякі наші сусіди та ленники вирішили підняти зброю проти нас. Якщо ми переможемо їх і відстоїмо свій суверенітет, нам буде простіше подолати виклики долі."
  delhi_situation.4.title: "Нащадки [GetCountry('DLH').Custom('CL_GEN')]"
  delhi_situation.4.desc: "Великого звіра знищено! Протягом десятиліть Індія страждала від рук генералів-завойовників з [GetCountry('DLH').Custom('CL_GEN')]. Подібно до поранених тигрів вони чіплялися за владу, що вислизала, тоді як їхні сусіди відхоплювали один шматок їхньої території за іншим. Регіон занурився в хаос, але схід вже близько: скоро справжні правителі імперії впишуть свої імена в історію…"
  delhi_situation.4.a: "Наш час настав!"
  dlh_double_duration_tt: "Тривалість модифікатора #TOOLTIP:SITUATION,fall_of_delhi,X #L «Падіння Делі»#!#! буде подвоєна, оскільки під час [Concept('situation', 'ситуації')|e] «Нащадок Делі» ми виступили проти [GetCountry('DLH').Custom('CL_GEN')]"
  delhi_situation.5.title: "Сумний кінець"
  delhi_situation.5.desc: "Протягом століть ми завойовували нові території для [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. На жаль, бог відвернувся від нас. Ми поступово втрачаємо наші землі, а наш народ опинився на межі катастрофи. Страшно уявити, що чекає нас попереду, однак надія помирає останньою…"
  delhi_situation.5.a: "Історія не щадить навіть найсильніших…"
  delhi_situation.6.title: "Повернення влади"
  delhi_situation.6.desc: "Наш великий народ загартований тривалими поневіряннями. Нещастя, лиха та вторгнення завойовників не змогли погасити полум'я, що горить у наших серцях. Друзів, які намагалися захистити нас у нестабільні часи, ми винагородимо сторицею, а тих, хто пішов проти нас, бажаючи вкрасти те, що належить нам по праву, чекає суворе відплата…"
  delhi_situation.6.a: "Ми відстояли своє право на владу!"
  delhi_situation.7.title: "Втручання ворогів"
  delhi_situation.7.desc: "Під час нашого легендарного походу, коли Індія схилилася перед нами, ми нажили безліч ворогів серед ленників та інших послідовників #TOOLTIP:RELIGIONGROUP,dharmic,X #L дхармічних#!#! релігій. У нас не було змоги контролювати всі захоплені території, тому прикордонні області фактично здобули незалежність та автономію. У цей же час наші недруги, які тільки й чекали слушного моменту, щоб вчепитися нам у горло, почали таємно замишляти переворот…"
  delhi_situation.7.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  until_end_of_fod_situation_tt: "закінчення [Concept('situation', 'ситуації')|e] «[ShowSituationName('fall_of_delhi')]»"
  delhi_situation.8.title: "Осередки заколоту"
  delhi_situation.8.desc: "Недавні заворушення в нашій країні — це наслідок зовнішнього втручання. Останньою збунтувалася провінція [target_province.GetName], чиї місцеві лідери вирішили піти на нас з мечем. Так більше не може тривати! Ми повинні негайно поставити цих вискочок на місце!"
  delhi_situation.8.a: "Ми поставимо їх на коліна."
  delhi_situation.8.b: "Дамо їм незалежність під владою корони."
  target_province_debuffs_dlh_tt: "Показник [Concept('control', 'контролю')|e] у провінції [target_province.GetNameWithNoTooltip] зменшиться на [ShowNamedValue('control_mild_penalty')|+=2%], а [Concept('pop_satisfaction', 'задоволення групи населення')|e] впаде на [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%]"
  delhi_situation.9.title: "Ослаблення хватки"
  delhi_situation.9.desc: "Коли ми вирішили піти проти #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! з мечем, ми й подумати не могли, що можемо повторити долі тих, кого ми скинули. Ми дізналися, що наше ім'я не викликає жодної поваги у тих, хто чекає, коли [GetCountry('DLH').GetAdjectiveWithNoTooltip|l]а країна впаде. Будемо сподіватися, що це всього лише перешкода на нашому довгому шляху, а не лавина, яка поховає нас під собою…"
  delhi_situation.9.a: "Наша влада слабшає…"
  delhi_situation.10.title: "Зміна варти"
  delhi_situation.10.desc: "Країна [GetCountry('DLH').GetName], яка колись володіла абсолютною владою, нині лише тінь себе колишньої. Мінливі вітри війни та миру знову підняли нас на самий верх. Тепер усі вважають, що [GetCountry('DLH').GetAdjectiveWithNoTooltip|l]а країна довго не протримається, і саме ми повинні стати наступними могутніми правителями цих величезних територій."
  delhi_situation.10.a: "Наш час настав!"
  delhi_situation.11.title: "Велика перемога [target_country.Custom('CL_GEN')]"
  delhi_situation.11.desc: "Від колишньої зарозумілості наших ворогів не залишилося й сліду. Здолавши своїх недоброзичливців, ми знову довели, що влада є нашою по праву і що ми не тільки не втратили хватки, а й здатні захистити свій титул та належні нам території. Тепер усі розуміють, що Індія в надійних руках."
  delhi_situation.11.a: "Наша перевага незаперечна!"
  lose_1_sop_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] зменшиться на #R 1%#!"
  lose_5_sop_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] зменшиться на #R 5%#!"
  gain_1_sop_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] збільшиться на #G 1%#!"
  gain_5_sop_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] збільшиться на #G 5%#!"
  gain_3_sop_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] збільшиться на #G 3%#!"
  opposers_lose_5_sop_tt: "[Concept('share_of_power_gc', 'Частка влади')|e] наших суперників зменшиться на #R 5%#!"
  opposers_lose_1_sop_tt: "[Concept('share_of_power_gc', 'Частка влади')|e] наших суперників зменшиться на #R 1%#!"
  delhi_situation.12.title: "Перемога над [target_country2.Custom('CL_INST')]"
  delhi_situation.12.desc: "Правду кажуть, що імперії не руйнуються в одну мить, але події сьогоднішнього дня показали, що країна [GetCountry('DLH').GetName] перебуває в повному занепаді. Наша недавня перемога у всіх на слуху. Люди шепочуться, що [GetCountry('DLH').Custom('rank_ru_DAT')|l] скоро прийде кінець. Ми прагнемо лише того, щоб наше правління почалося з їхньої загибелі!"
  delhi_situation.12.a: "Їхній кінець близький…"
  delhi_loses_opposers_gain_1_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] збільшиться на #G 5%#! за рахунок [target_country2.Custom('CL_GEN')]. Якщо вона досягне #R 50%#!, у [target_country2.Custom('CL_PREP')] може статися [Concept('disaster', 'лихо')|e] «[ShowDisasterName('dissolution_of_delhi')]»"
  delhi_situation.13.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] проти нашого правління"
  delhi_situation.13.desc: "Ми, звісно, потрапили в незавидну ситуацію. Зграя бандитів, що прикидаються [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], почала відкрито критикувати наші управлінські рішення та виступати проти них на місцевому рівні. Фактично вони вимагають привілейованого становища при дворі. Будь-які поступки дорого нам обійдуться та створять небезпечний прецедент…"
  delhi_situation.13.a: "Ми підемо на поступки."
  delhi_situation.13.b: "Вони забули, хто їхній володар!"
  delhi_situation.14.title: "Дипломати [target_country.Custom('CL_GEN')]"
  delhi_situation.14.desc: "Поведінка #L [target_country.GetAdjective|l]их#! дипломатів остаточно вийшла за рамки пристойності. Від образ придворних і релігійних традицій вони перейшли до прямих погроз. Чи варто говорити, що наші відносини [target_country.Custom('endlong_predlog_sso')] [target_country.Custom('longname_ru_nott_INST')] досягли рекордно низького рівня, оскільки дипломати цієї країни заявили, що всіляко заважатимуть нам контролювати свої обширні території."
  delhi_situation.14.a: "Негайно вимагати офіційних вибачень!"
  delhi_situation.14.b: "Доведеться потерпіти…"
  potential_ramifications_tt: "#R Це може вплинути на дипломатичні відносини з іншими ворожими нам країнами#!"
  delhi_lose_half_percentage_support_tt: "Наша [Concept('share_of_power_gc', 'частка влади')|e] зменшиться на #R 0,5%#!"
  opposers_gain_1_percentage_support_tt: "Наші противники отримають #R +1%#! до [Concept('share_of_power_gc', 'частки влади')|e]"
  delhi_situation.15.title: "Дипломатичний конфлікт з [target_country2.Custom('CL_INST')]"
  delhi_situation.15.desc: "[target_country2.GetLongName] — країна, з якою у нас стався дипломатичний інцидент. Ми дізналися, що цей інцидент викликав великий переполох. Намагаючись залагодити ситуацію, ми досягли прямо протилежного ефекту, і остаточно переконалися, що ці жорстокі завойовники не хочуть мирних відносин. Але це ще не все: вони вимагали від нас офіційних вибачень за нібито непристойну поведінку наших дипломатів під час їхнього перебування при дворі!"
  delhi_situation.15.a: "Вони не наважаться…"
  delhi_situation.15.b: "Ми не можемо собі дозволити таку авантюру."
  delhi_damages_relations_with_several_countries_tt: "Відносини між [target_country2.Custom('CL_INST')] та її могутніми ворогами погіршаться через агресію в наш бік, що ще сильніше поглибить конфлікт."
  delhi_situation.16.title: "Втрата влади"
  delhi_situation.16.desc: "За ці роки ми зробили кілька спроб придушити заворушення та вирішити проблеми наших ленників. Однак нещодавні події переконали багатьох, що кінець нашої великої [GetCountry('DLH').Custom('rank_ru_GEN')|l] вже близький…\n\nМогутність наших ворогів зростає, а наша — тане на очах. Поступово ми стаємо блідою копією себе колишніх. Попереду нас чекають темні часи, і багато впливових придворних у місті [ROOT.GetCountry.GetCapital.GetName] вважають, що нам слід віддати наші землі без бою, адже втримати їх все одно не вдасться."
  delhi_situation.16.a: "У нас немає вибору…"
  delhi_situation.16.b: "Все ще може змінитися на краще!"
  end_situation_badly_tt: "[Concept('situation', 'Ситуація')|e] #TOOLTIP:SITUATION,fall_of_delhi,X #L «Падіння Делі»#!#! завершилася"
  we_will_lose_all_cores_tt: "Ми відмовимося від усіх [Concept('cores', 'національних місцевостей')|e] в Індії, які не належать нам безпосередньо"
  gain_10_progress_for_claimants_tt: "У ході [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]» #Y  частка влади#! наших противників збільшиться на #R  10%#!"
  powerful_warlords_will_rise_tt: "Могутні [Concept('countries', 'країни')|e] заповнять порожнечу в Індії, що утворилася після нашого падіння"
  delhi_situation.17.title: "Роботи з орошення на Ямуні"
  delhi_situation.17.desc: "Річка Ямуна — давнє джерело життя: вона живить наші ріллі, і по ній ходять торгові судна. Наші радники та місцеві управителі чудово усвідомлюють її важливість, а тому збираються взятися за великі зрошувальні роботи в провінції [target_province.GetName]: вони хочуть, щоб поля тут давали рясний урожай, а жителі не знали нестачі. Приплив річкових вод убереже нас від голоду, а влада наша зміцниться: зрадіють не тільки провінція, а й її столиця — [target_province_capital.GetName]."
  delhi_situation.17.a: "Виділити кошти на орошення."
  delhi_situation.17.b: "Нам це не по кишені."
  dev_gain_scales_with_control_and_prov_capital_gains_pop_satisfaction_tt: "Отримуваний [Concept('development', 'розвиток')|e] залежить від [Concept('control', 'контролю')|e] в кожній [Concept('location', 'місцевості')|e]\n[Concept('pops', 'Групи населення')|e] в столиці ([target_province_capital.GetNameWithNoTooltip]) отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  delhi_situation.18.title: "Наймані воїни зі сходу"
  delhi_situation.18.desc: "Серед жителів [ROOT.GetCountry.Custom('rank_ru_GEN')|l] завжди цінувалися вправні вершники та воїни, готові служити країні та захищати її кордони. Однак що складніше нам стає підтримувати лад у своїх краях, то очевидніше, що ще трохи — і доведеться покластися на допомогу ззовні.\n\nНа щастя, нещодавно ми саме прийняли в себе #TOOLTIP:CULTUREGROUP,mongolian_group,X #L монгольських#!#! кіннотників, які навернулися в нашу віру й тепер бажають знайти новий дім у столиці нашої країни — місті [ROOT.GetCountry.GetCapital.GetName]. І хоча радники застерігають нас, щоб ми не надто довіряли людям, які б’ються за дзвінку монету, все-таки упускати цю можливість не можна."
  delhi_situation.18.a: "Запропонувати їм новий дім."
  delhi_situation.18.b: "Ми обійдемося і без втручання чужинців."
  mongol_converts_name: "Навернені монголи"
  delhi_situation.18.historical_info: "У перші роки існування Делійського султанату чималу загрозу для молодої країни становили набіги монголів. Проте значну частину його армії згодом склали саме монголи — або полонені, або ті, що добровільно перейшли на бік Делі. Досвідчені у військовій справі кочівники, які особливо добре опанували мистецтво верхової їзди та бою в степу, стали цінним доповненням для султанської кінноти. Деякі з них навіть увійшли до складу елітних підрозділів. Згодом багато монголів прийняли іслам і стали практикувати місцеві культурні та управлінські звичаї. Нерідко вони брали участь у бюрократичному та дипломатичному житті султанату, де, будучи представниками іншої культури, вельми цінувалися за свої знання."
  delhi_situation.19.title: "Дипломатичні відносини з [target_country.Custom('CL_INST')]"
  delhi_situation.19.desc: "Протистояти численним ворогам стає тільки важче, тому важливо пам’ятати, що в нас є й інше поле битви — дипломатичне. Нещодавно до столичного міста [ROOT.GetCountry.GetCapital.GetName] прибули посли з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! з несподіваною пропозицією розпочати співпрацю — зрозуміло, не безкоштовно. Не всі вважали їхні наміри щирими — дехто переконаний, що нас просто хочуть розорити — однак багато хто впевнений, що, пішовши їм назустріч, ми продемонструємо своє багатство та вплив."
  delhi_situation.19.a: "Покажемо свою щедрість, піднісши подарунок."
  delhi_situation.19.b: "Проженемо їх."
  delhi_situation.20.title: "Сходження хабші"
  delhi_situation.20.desc: "Істинно кажуть: неможливо бути господарем своєї долі протягом усього життя. З цим особливо погодяться ті, хто з лихої волі долі опинився в кайданах. Однак на відміну від багатьох інших рабів з #TOOLTIP:SUB_CONTINENT,east_africa,X #L Східної Африки#!#!, хабші поступово набирають вплив; осторонь від нього не залишається навіть [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої країни. Ці люди добре обізнані в питаннях управління та військової справи, а тому повільно, але вірно стають єдиним цілим з [ROOT.GetCountry.Custom('rank_ru_INST')|l]. [Select_CString(target_character2.IsFemale, 'Одна', 'Один' )] з таких хабші — видатна в усіх відношеннях людина на ім’я [target_character2.GetName] — нещодавно [Select_CString(target_character2.IsFemale, 'заявила', 'заявив' )], що [Select_CString(target_character2.IsFemale, 'готова', 'готовий' )] служити нам вірою і правдою."
  delhi_situation.20.historical_info: "Словом «хабші» в Індії ісламського періоду називалися раби африканського — абіссинського — походження, які служили в армії та просто виконували роль прислуги. Деякі з них, наприклад Джамалуддін Якут, здобули певне визнання в Делі, однак відчутний вплив хабші на політику оформився лише до середини XV століття в Бенгалії. Хабші, які скинули з себе кайдани та продемонстрували, що вміють однаково вправно воювати та управляти, залишили в історії макрорегіону яскравий слід: їхні африканські корені сплелися з південноазійською культурою, зокрема політичною."
  delhi_situation.20.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не зможе відмовитися від таких цінних людей!"
  periodically_gain_habshi_advisors_tt: "Поки діє цей [Concept('estate_privilege', 'становий привілей')|e], обдаровані раби-хабші з’являтимуться в [Concept('events', 'подіях')|e] протягом усієї [Concept('situation', 'ситуації')|e] «[ShowSituationName('fall_of_delhi')]»"
  delhi_situation.21.title: "[target_character.GetNameWithNoTooltip]"
  delhi_situation.21.desc: "Поява в [ROOT.GetCountry.Custom('rank_ru_PREP')|l] рабів-хабші пішла тільки на користь нашій зростаючій країні. Серед них вистачає і вмілих управлінців, і грізних полководців — людей, здатних творити історію. Особливо варто відзначити таку обдаровану особистість, як [target_character.GetName]: з [Select_CString(target_character.IsFemale, 'неї', 'нього' )] вийде [ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|l] на заздрість багатьом іншим."
  delhi_situation.21.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  great_diplomat_tt: "Завдяки своїй [Concept('dip', 'дипломатичній навичці')|e] [target_character.GetShortNameWithNoTooltip] стане чудовим дипломатом. У результаті:"
  great_person_tt: "Завдяки своїй [Concept('total_ability', 'сумі навичок')|e] [target_character.GetShortNameWithNoTooltip] стане легендою на посаді «[ROOT.GetCountry.GetGovernment.GetCabinetMemberTitle|l]». У результаті:"
  great_administrator_tt: "Завдяки своїй [Concept('adm', 'адміністративній навичці')|e] [target_character.GetShortNameWithNoTooltip] стане блискучим управителем. У результаті:"
  great_general_tt: "Завдяки своїй [Concept('mil', 'військовій навичці')|e] [target_character.GetShortNameWithNoTooltip] посилить нашу армію. У результаті:"
  delhi_situation.22.title: "[target_rebel.GetNameWithNoTooltip] у відчайдушному становищі"
  delhi_situation.22.desc: "Лихоманка, що охопила нашу країну в останні кілька років, призвела до того, що народ почав піднімати повстання. Потом і кров’ю, не шкодуючи сил, заколотники прагнуть стерти всі наші славні успіхи минулого та зруйнувати [ROOT.GetCountry.Custom('rank_ru_ACC')|l].\n\nОсобливої уваги вимагають донесення про заколот, що готується в країні: група «[target_rebel.GetName]» — грізна сила. Це угруповання, що спирається на популізм і готове взятися за зброю, посміло висунути нам вимоги. Їхні посли заявляють, що якщо ми не погодимося, повстання буде не уникнути."
  delhi_situation.22.a: "Доведеться поступитися їхнім вимогам."
  delhi_situation.22.b: "Перекупити їхніх прихильників."
  delhi_situation.22.c: "Це нижче нашої гідності."
  every_supporting_pop_gains_25_satisfaction: "Кожна [Concept('pop', 'група населення')|e], що підтримує угруповання «[target_rebel.GetNameWithNoTooltip]», отримає [ShowNamedValue('pop_satisfaction_extreme_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]. Це може покласти край [Concept('rebellion', 'заколоту')|e] (залежить від [Concept('modifier', 'модифікатора')|e] «[ShowModifierTypeName('pop_leave_rebels_threshold')]»)."