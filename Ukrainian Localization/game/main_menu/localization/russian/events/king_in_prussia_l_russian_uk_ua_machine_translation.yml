l_russian:
  king_in_prussia.1.title: "[target_country.GetAdjectiveWithNoTooltip]а корона"
  king_in_prussia.1.desc: "Услід за піднесенням нашої великої держави [target_character.GetName] [Select_CString(target_character.IsFemale, 'заявила', 'заявив')] про свої наміри звести #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! в ранг #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівства#!#!, а себе проголосити [Select_CString(target_character.IsFemale, 'королевою', 'королем')]. [Select_CString(target_character.IsFemale, 'Княгиня', 'Князь')] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! вважає, що було б неналежно не дізнатися думку [Select_CString([emperor_character.IsFemale, 'імператриці', 'імператора')] щодо цього питання, тому [Select_CString(target_character.IsFemale, 'склала', 'склав')] пропозицію, з якою варто уважно ознайомитися."
  king_in_prussia.1.desc.emperor: "Наша країна прагне все нових висот. [target_character.GetName] користується імператорською прихильністю, і [target_country.GetName] в [Select_CString(target_character.IsFemale, 'її', 'його')] руках могутніша, ніж будь-коли. Час залишити в минулому незначний титул [Select_CString(target_character.IsFemale, 'княгині', 'князя')], змінивши його на більш відповідний — титул [Select_CString(target_character.IsFemale, 'королеви', 'короля')]!"
  king_in_prussia.1.a: "Ми станемо королями!"
  king_in_prussia_request_tt: "[emperor_country.GetLongName] ухвалить рішення"
  king_in_prussia.2.title: "[Select_CString(target_character.IsFemale, 'Королева', 'Король')] у [target_country.Custom('CL_PREP')]"
  king_in_prussia.2.desc: "[target_country.GetName] стає все більш значущою силою у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!. Вона все частіше визначає імперську політику та послідовно зміцнює свої позиції на світовій арені. [target_character.GetName] [Select_CString(target_character.IsFemale, 'оголосила', 'оголосив')] про свій намір створити #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівство#!#! Пруссії, яке нині — всього лише [target_country.GetFlavorRank|l]. Цей випадок практично не має прецедентів в історії Священної Римської Імперії, а тому [emperor_character.GetName] [Select_CString(emperor_character.IsFemale, 'повинна', 'повинен')] вирішити, як найрозумніше вчинити в цій ситуації."
  king_in_prussia.2.a: "Дозволимо [Select_CString(target_character.IsFemale, 'їй', 'йому')] називати себе [Select_CString(target_character.IsFemale, 'королевою', 'королем')] [target_country.Custom('CL_GEN')]."
  king_in_prussia_compromise_tt: "Завдяки юридичному компромісу з [Select_CString(emperor_character.IsFemale, 'імператрицею', 'імператором')] [target_country.GetName] стане #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівством#!#! у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!"
  opinion_king_in_prussia: "Король Пруссії"
  king_in_prussia.2.b: "Перетворимо [target_country.Custom('CL_ACC')] на імперське королівство."
  king_in_prussia_elevated_tt: "Завдяки заступництву [Select_CString(emperor_character.IsFemale, 'імператриці', 'імператора')] [target_country.GetName] стане королівством у складі #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#!"
  elevated_prussia: "Піднесення Пруссії"
  king_in_prussia.2.c: "Ми не визнаємо цього самопроголошеного монарха."
  king_in_prussia_rejection_tt: "Владі #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! треба вибрати між своєю фальшивою короною та статусом імперського князівства"
  opinion_prussia_not_recognized: "Заперечує легітимність Пруссії"
  king_in_prussia.3.title: "Король у [target_country.Custom('CL_PREP')]"
  king_in_prussia.3.desc: "[emperor_character.GetName], [emperor_character.IsFemale,'наша близька подруга та союзниця', 'наш близький друг та союзник')], милостиво [emperor_character.IsFemale,'погодилася', 'погодився')] звести #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! в ранг імперського #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівства#!#!! Подібним привілеєм не жалували нікого з часів піднесення королів #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!. Королі [target_country.Custom('CL_GEN')] з гордістю носитимуть свою корону, не забуваючи про милість, надану нам [emperor_character.IsFemale,'імператрицею', 'імператором')]."
  king_in_prussia.3.a: "Хвала Богу та [Select_CString(emperor_character.IsFemale, 'імператриці', 'імператору')]!"
  king_in_prussia.4.title: "[Select_CString(target_character.IsFemale, 'Королева', 'Король')] у [target_country.Custom('CL_PREP')]"
  king_in_prussia.4.desc: "За традицією, єдиними королями у Священній Римській Імперії можуть бути лише король римлян, тобто безпосередньо [emperor_character.Custom('GetEmpressEmperor')|l], та король #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!. Проте [emperor_character.GetName] [Select_CString(emperor_character.IsFemale, 'пішла', 'пішов' )] з нами на цікавий юридичний компроміс: наші монархи використовуватимуть титул «[target_character.Custom('GetQueenKing')|l] [target_country.Custom('CL_GEN')]». Оскільки територія #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! знаходиться за межами Священної Римської Імперії, ми можемо називатися королями, а [emperor_character.Custom('GetEmpressEmperor')|l] не порушуватиме традицію."
  king_in_prussia.4.a: "Прийнятний компроміс."
  king_in_prussia.5.title: "[Select_CString(target_character.IsFemale, 'Королева', 'Король')] у [target_country.Custom('CL_PREP')]"
  king_in_prussia.5.desc: "[emperor_character.GetName], ця безчесна шавка, відмовляється визнати наше право на королівський титул всупереч усім запропонованим нами розумним компромісам. Ми, звичайно ж, проігноруємо цей факт і все одно проголосимо свою країну королівством."
  king_in_prussia.5.a: "Нам не потрібен дозвіл [Select_CString(emperor_character.IsFemale, 'імператриці', 'імператора')]."
  king_in_prussia.5.b: "Приймемо рішення [Select_CString(emperor_character.IsFemale, 'імператриці', 'імператора')] з прихильністю."
  king_in_prussia.6.title: "[Select_CString(target_character.IsFemale, 'Королева', 'Король')] [target_country.Custom('CL_GEN')], [Select_CString(target_character.IsFemale, 'вона', 'він')] же «[Select_CString(target_character.IsFemale, 'Королева', 'Король')] у [target_country.Custom('CL_PREP')]»"
  king_in_prussia.6.desc: "Відтоді, як було досягнуто компромісу щодо титулу «[Select_CString(target_character.IsFemale, 'Королеви', 'Короля')] [ROOT.GetCountry.Custom('predlog_vvo')|l] [ROOT.GetCountry.Custom('CL_PREP')]», ідея про офіційне визнання #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L королівством#!#! в межах #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священної Римської імперії#!#! більше не згадувалася. Однак зараз [GetUniqueInternationalOrganization('hre').GetParliament.GetName|l] обговорює питання «[GetUniqueInternationalOrganization('hre').GetParliament.GetCurrentDebateName]», і це змусило [Select_CString(emperor_character.IsFemale, 'імператрицю', 'імператора')] переглянути цей компроміс. [emperor_character.GetName] бажає, щоб [target_character.GetName] [Select_CString(target_character.IsFemale, 'підтримала', 'підтримав')] [Select_CString(emperor_character.IsFemale, 'її', 'його')] в голосуванні з цього питання, а тому [Select_CString(emperor_character.IsFemale, 'вирішила', 'вирішив')] дарувати [ROOT.GetCountry.Custom('CL_DAT')] титул королівства."
  king_in_prussia.6.a: "Не дарма ми стільки чекали!"