l_russian:
  republics.1.title: "Суперечка про республіканські традиції"
  republics.1.desc: "У нашій молодій та хиткій республіці киплять неабиякі суперечки, що іноді переростають у рукоприкладство. Прихильники старого режиму борються з затятими захисниками свободи. Що ми на це скажемо?"
  republics.1.a: "Нам потрібен король!"
  republics.1.b: "Республіка священна!"
  republics.2.title: "Прихильники вільної торгівлі перемагають у дебатах"
  republics.2.desc: "Прихильники вільної торгівлі набирають популярність, і, схоже, члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] здебільшого підтримують їх. Вони вимагають стримати наші меркантилістські прагнення."
  republics.2.a: "Нам потрібно розвивати вільну торгівлю."
  republics.2.b: "Меркантилізм життєво важливий для країни."
  republics.4.title: "Процес"
  republics.4.desc: "[target_character.GetName] переживає не найкращі часи: [Select_CString(target_character.IsFemale,'її', 'його')] старший син звинувачується у зловживаннях та хабарництві. У тому, що звинувачення правдиві, сумнівів немає. [target_character.GetName] втратить вплив, якщо [Select_CString(target_character.IsFemale,'її', 'його')] первістка викриють. Але ми, звичайно, можемо втрутитися в процес і довести його невинність."
  republics.4.a: "Залишимося осторонь."
  republics.4.b: "Доб'ємося його виправдання."
  republics.5.title: "Нова монета"
  republics.5.desc: "У минулі часи на реверсі монет [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'зображалася', 'зображався')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], але тепер суспільство не приймає подібний культ особистості. Випустивши нову дорогоцінну монету, ми можемо підвищити довіру народу до наших грошей. І, звичайно, всі повинні запам'ятати, хто за цим стоїть."
  republics.5.a: "Відмовимося від реформи."
  republics.5.b: "Схвалимо випуск монет."
  republics.6.title: "Змова з чужоземцями?"
  republics.6.desc: "Ходять шалені чутки, що наша знать змовилася з чужоземною владою. У суспільстві зростає страх і недовіра. Народ вимагає покарати зрадників, але більш розсудливі люди наполягають на традиційному республіканському правосудді."
  republics.6.a: "Схопимо їх і позбавимо всіх багатств."
  republics.6.b: "Правосуддя понад усе."
  republics.7.title: "Посилення особистої варти"
  republics.7.desc: "Внутрішні та зовнішні вороги не дрімають, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] перебуває в постійній небезпеці. Щоб не втратити владу, [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вона', 'він')] потребує надійної охорони. Неспокійні часи не залишають нам вибору, але знаходяться ті, хто засуджує таке рішення. Люди заявляють, що це ознака аристократичних тенденцій, які підривають республіканські традиції."
  republics.7.a: "Посилити охорону!"
  republics.7.b: "Це суперечить ідеалам республіки!"
  republics.8.title: "Проповідник-підбурювач"
  republics.8.desc: "Новоявлений проповідник пророкує кінець знайомого світу, за яким настане новий початок. Він набрав популярності під час нещодавньої війни, але те, до чого він закликає, не схоже на звичну нам республіку. Ми могли б влаштувати йому випробування вогнем, але це може викликати внутрішні проблеми, а зараз нам необхідна єдність."
  republics.8.a: "Нехай проповідує!"
  republics.8.b: "Влаштувати йому випробування вогнем!"
  republics.9.title: "Змова знаті"
  republics.9.desc: "Коли республіканські засади похитнулися, до нас дійшла чутка, що знать задумала відродити спадкове правонаступництво в нашій великій республіці."
  republics.9.a: "Це тривожні вісті."
  republics.9.b: "Ми нагадаємо їм, що буває з ворогами революції!"
  republics.10.title: "Розкол у раді"
  republics.10.desc: "Республіка тримається на тому, що правителі діють у спільних інтересах, представляючи волю народу. Наша республіка відступила від традицій, які роблять нас сильними. Відсутність згоди в керівній раді підриває нашу військову могутність."
  republics.10.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  republics.11.title: "Уряд загруз у суперечках"
  republics.11.desc: "Республіки процвітають, коли впливові родини готові поставити інтереси республіки нарівні зі своїми власними. Зараз наші традиції перебувають під загрозою, і родини віддають перевагу особистій вигоді над інтересами республіки. Нам стає складніше досягти згоди, через що страждає наша здатність правити країною."
  republics.11.a: "Справи кепські!"
  republics.12.title: "Торгові війни"
  republics.12.desc: "Ми завжди заохочували здорову конкуренцію між нашими купцями, але водночас вони завжди ставили інтереси республіки понад усе. Об'єднуючи зусилля, ми розвивали торгівлю в республіці й не дозволяли суперникам здобути над нами гору. Тепер ця традиція забувається, і купці все частіше готові всадити один одному ніж у спину. Це шкодить нашій країні…"
  republics.12.a: "Потрібно щось робити!"
  republics.13.title: "Зірвана церемонія"
  republics.13.desc: "Пишні державні церемонії — одна з основ республіки. У цей час усі розбіжності та суперечки між представниками влади замовкають, щоб світ побачив нашу єдність і силу. Однак на недавній церемонії купка незадоволених висловила незгоду з керівною радою, забувши про традиції."
  republics.13.a: "Ситуація не з найкращих!"
  republics.14.title: "Увага до торгівлі"
  republics.14.desc: "Деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] вважають, що ми недостатньо дбаємо про національну торгівлю. Усі згодні з тим, що ми не відіграємо провідної ролі в місцевій торгівлі, але інші представники заперечують, що все могло бути й гірше. Судячи з минулого досвіду, члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] навряд чи швидко дійдуть згоди, доки хтось не напоумить представників."
  republics.14.a: "Нам потрібно більше купців."
  STATIC_MODIFIER_NAME_more_merchants: "Залучення купців"
  republics.14.b: "Нам бракує ефективності."
  STATIC_MODIFIER_NAME_efficienct_merchants: "Ефективність купців підвищена"
  republics.15.title: "Торгова експансія"
  republics.15.desc: "Уже деякий час члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] гаряче обговорюють, як розширити торгівлю. Ми вже отримали винятковий контроль над місцевим ринком, але багатьох приваблює можливість торгівлі з іншими країнами. Інші ж вважають, що ризики занадто високі і на внутрішньому ринку можна заробити більше."
  republics.15.a: "Нам потрібно зосередитися на внутрішній торгівлі."
  republics.15.b: "Можливо, нам час розширити горизонти."
  trade_focus: "Увага до торгівлі"
  republics.16.title: "Суперечка про бюджет"
  republics.16.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] насилу вирішують питання управління країною: представники сперечаються про бюджет, податки, портові збори, торгові та митні правила. Цього разу предметом дискусії став бюджет: чи потрібно вкласти більше грошей у дослідження, чи краще приберегти кошти на майбутні непередбачені витрати?"
  republics.16.a: "Вкладемо все в дослідження."
  republics.16.b: "Залишимо частину грошей на майбутні витрати."
  republics.17.title: "Розбіжності в [ROOT.GetCountry.Custom('parliament_ru_PREP')|l]"
  republics.17.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] сперечаються, обговорюючи пропозицію створити новий ринок. Більшість представників не бачить розумних причин, чому у такої могутньої торгової країни, як наша, не повинно бути власного ринку. Але ми розуміємо, що все має свою ціну, тому питання вимагає ретельного розгляду."
  republics.17.a: "Виступимо посередником у суперечці."
  republics.17.b: "Запропонуємо інші зміни."
  republics.18.title: "Зміна пріоритетів"
  republics.18.desc: "Кілька членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] вважають, що ми приділяємо занадто велику увагу військовим діям замість того, щоб думати про розширення торгівлі. Вони скаржаться, що на фінансування армії виділяється надто багато коштів, а на розвиток торгівлі — майже нічого."
  republics.18.a: "Все йде за планом…"
  republics.18.b: "Можливо, ми трохи відволіклися від інших проблем."
  republics.19.title: "Парламентські проблеми"
  republics.19.desc: "Останнім часом [Select_CString(minister.IsFemale,'одна з наших радниць', 'один з наших радників')] працює без упину, пропонуючи одну зміну за іншою. Можна заперечити, що [Select_CString(minister.IsFemale,'вона', 'він')] робить свою роботу, але все не так просто. [minister.GetName] раз у раз перебиває інших, з виглядом знавця коментуючи навіть далекі від політики питання. В результаті члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] без кінця сперечаються, і деякі вже вважають, що [Select_CString(minister.IsFemale,'вона', 'він')] лише заважає роботі."
  republics.19.a: "Знайдемо когось йому на заміну."
  republics.19.b: "Дамо раднику ще один шанс."
  republics.20.title: "Жаркі суперечки"
  republics.20.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] починають турбуватися про те, що наша репутація стрімко погіршується. Деякі представники стверджують, що це погано позначається на наших торгових відносинах. Це питання піднімається не вперше, але раніше мало хто замислювався про наслідки. Однак цього разу воно породило вельми жаркі суперечки. Напевно, краще постаратися залагодити проблему, поки все не вийшло з-під контролю."
  republics.20.a: "Напевно, це буде мудрим рішенням."
  republics.20.b: "Це не настільки серйозна проблема."
  republics.21.title: "Напад чи захист"
  republics.21.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] запекло сперечаються з приводу війни, що триває. Одні представники стверджують, що затягування війни не принесе нам жодної вигоди, а інші переконані, що шляху назад уже немає. На жаль, вони ніяк не можуть дійти згоди, і це жодним чином нам не допомагає — радше навпаки."
  republics.21.a: "Напевно, напад — єдиний вихід."
  republics.21.b: "Зараз нам краще перейти до оборони."
  republics.22.title: "Суперечливі думки"
  republics.22.desc: "Схоже, засідання [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] ніколи не обходяться без незговірливих представників. Хоч би яке питання обговорювалося, ця група завжди заперечує думку інших."
  republics.22.a: "Напевно, краще залишити все як є."
  republics.22.b: "Може, нам допоможе реструктуризація?"
  republics.23.title: "Шпигун у [ROOT.GetCountry.Custom('parliament_ru_PREP')|l]"
  republics.23.desc: "Серед нас шпигун! Якимось чином він зумів проникнути до нашого представницького органу. Під підозру потрапили всі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l]. Ми поки не з'ясували, хто послав до нас шпигуна, але зараз у нас досить напружені відносини з деякими сусідніми країнами. Напевно, в цьому замішана одна з них."
  republics.23.a: "Не може бути!"
  republics.23.b: "Це єдине розумне пояснення."
  republics.24.title: "Зрадник у [ROOT.GetCountry.Custom('parliament_ru_PREP')|l]"
  republics.24.desc: "Схоже, хтось із членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] продає секретні відомості нашим ворогам. Як ще пояснити те, що вони раптом почали передбачати кожен наш крок? Противники немов знають про ті рішення, які ніколи не обговорювалися за межами зали засідань."
  republics.24.a: "Напевно, це один із представників."
  opinion_traitor: "Зрадник"
  republics.24.b: "Краще не приймати поспішних рішень, доки не дізнаємося більше."
  republics.25.title: "Політичний хаос"
  republics.25.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] не можуть ухвалити жодного рішення, через що ми опинилися на порозі хаосу. Кожен представник робить усе можливе, щоб бути почутим, але не бажає приймати думку інших."
  republics.25.a: "Така природа політики."
  republics.25.b: "Може, нам потрібна реструктуризація?"
  republics.26.title: "Рішення під впливом"
  republics.26.desc: "Ми помітили, що дехто з членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] бере хабарі від охочих вплинути на найрізноманітніші державні рішення."
  republics.26.a: "Потрібно це припинити."
  republics.26.b: "Цього не може бути."
  republics.27.title: "Фінансові розбіжності"
  republics.27.desc: "Наша економіка знавала кращі часи. Казна майже спорожніла, а [ROOT.GetCountry.GetGovernment.GetParliament.GetName|l], схоже, не в змозі вирішити проблему і з'ясувати, чому вона взагалі виникла. Звісно, завжди можна викарбувати більше монет або підвищити податки. Так чи інакше, всі чекають, коли ми ухвалимо рішення."
  republics.27.a: "Викарбуємо більше монет."
  republics.27.b: "Піднімемо податки."
  republics.28.title: "Військові витрати"
  republics.28.desc: "Деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] скаржаться, що ми занадто багато витрачаємо на військові цілі. Багато хто з них упевнений, що виробництво і торгівля постраждають, якщо ми не уріжемо військові витрати."
  republics.28.a: "Що ж, торгівля і виробництво не такі важливі."
  STATIC_MODIFIER_NAME_trade_and_production_cutbacks: "Скорочення торгівлі та виробництва"
  republics.28.b: "Зменшимо військові витрати."
  STATIC_MODIFIER_NAME_military_cutbacks: "Зменшення військових витрат"
  republics.29.title: "Сильна армія чи сильний флот?"
  republics.29.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] не можуть вирішити, що важливіше у військовій справі. Деякі представники переконані в необхідності могутнього флоту, а інших більше цікавить значна армія. Напевно, ми могли б знайти золоту середину, але більшість представників воліла б збільшити флот."
  republics.29.a: "Великий флот — єдиний вибір."
  republics.29.b: "Велика армія принесе більше користі."
  republics.30.title: "Військова нерішучість"
  republics.30.desc: "Деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] вважають, що ми діємо занадто м'яко, коли потрібно захищати контроль над тим, що по праву є нашим. Вони не розуміють, чому ми дозволяємо іншій країні контролювати таку важливу територію, як [SCOPE.sLocation('target').GetName], а самі залишаємося осторонь."
  republics.30.a: "Вони просто не бачать картини цілком."
  republics.30.b: "Ця територія більше нам не цікава."
  republics.31.title: "Самоуправство"
  republics.31.desc: "Деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] вважають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] останнім часом занадто багато собі дозволяє, коли справа стосується управління країною. Дехто навіть заявляє, що [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'вона', 'він')] абсолютно не поважає ні конституцію, ні решту представників."
  republics.31.a: "Вони перебільшують."
  republics.31.b: "Вживемо належних заходів."
  republics.32.title: "Економічні рішення"
  republics.32.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] постійно шукають нові способи поповнити казну. Але, як зазвичай, між представниками виникла суперечка про те, який метод кращий. Різке підвищення податків істотно збільшить кількість грошей у казні, але, швидше за все, викличе невдоволення населення. Невелике підвищення, навпаки, принесе нам менше грошей, зате не призведе до обурення народу."
  republics.32.a: "Краще оберемо тимчасове рішення."
  STATIC_MODIFIER_NAME_short_term_boost: "Короткочасний приріст"
  republics.32.b: "Обміркуємо довгострокові наслідки."
  STATIC_MODIFIER_NAME_long_term_boost: "Довготривалий приріст"
  republics.33.title: "Військові витрати"
  republics.33.desc: "Деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] стверджують, що витрати на утримання такої величезної армії непомірно великі для нинішнього бюджету."
  republics.33.a: "Переконаємо їх, що можемо собі це дозволити."
  republics.33.b: "Погодимося трохи урізати витрати."
  republics.34.title: "Непопулярність серед еліт"
  republics.34.desc: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Наша', 'Наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], попри всі свої старання, геть [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'втратила', 'втратив')] підтримку. #L [ROOT.GetCountry.GetAdjective|U]а#! [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] вкрай незадоволені [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'її', 'його')] правлінням. Очевидно, через свої дії [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'нажила', 'нажив')] собі могутніх ворогів у нашій країні. Залишається лише один спосіб уникнути повстання: [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'повинна', 'повинен')] скласти повноваження."
  republics.34.a: "Подамо у відставку."
  republics.34.b: "Будемо боротися з заколотом."
  upset_nobles_pretender: "Суперник очолює повстання"
  upset_nobles_pretender_tt: "Усі #TOOLTIP:POPTYPE,nobles,X #L аристократи#!#! в місцевості [ROOT.GetCountry.GetCapital.GetArea.GetName] вирішать, що [upset_nobles_pretender.GetName] — гідний претендент, і стануть на [Select_CString(upset_nobles_pretender.IsFemale,'її', 'його')] бік"
  STATIC_MODIFIER_NAME_decreased_military_funding: "Фінансування збройних сил зменшено"
  republics.36.title: "Галузі дослідження"
  republics.36.desc: "Кожен член [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] просить виділити більше грошей на різні галузі. Нашій армії потрібне фінансування, але торгівля та виробництво потребують його не менше, та й про флот не варто забувати."
  republics.36.a: "Розподілимо кошти порівну — це має спрацювати."
  republics.36.b: "У додаткових інвестиціях немає потреби."
  republics.37.title: "Недостатня підтримка"
  republics.37.desc: "Здається, деякі члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] вважають, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'засиділася', 'засидівся')] на своїй посаді, і вимагають провести вибори. Мабуть, уся справа в тому, що [ROOT.GetCountry.GetGovernment.GetParliament.GetName|l] та [ROOT.GetCountry.GetGovernment.GetRuler.GetName|l] нещодавно сперечалися щодо реалізації нової фінансової реформи та не змогли дійти згоди."
  republics.37.a: "Не будемо звертати на них уваги."
  republics.37.b: "Погодимося ще раз їх вислухати."
  republics.39.title: "[ROOT.GetCountry.GetGovernment.GetParliament.GetName] — джерело неприємностей"
  republics.39.desc: "Члени [ROOT.GetCountry.Custom('parliament_ru_GEN')|l], схоже, не до кінця розуміють, хто очолює уряд. Мабуть, вони вважають нормальним ухвалювати рішення без нашого відома, не обговорюючи їх з нами. Що навело їх на цю думку?"
  republics.39.a: "Роз'яснимо їм наявний порядок."
  republics.39.b: "Нехай думають, що впливають на долю країни."
  republics.41.title: "Розтрата"
  republics.41.desc: "Стає все очевиднішим, що серед членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] майже не залишилося людей, яким можна повністю довіряти. Один із наших найближчих радників щойно попався на крадіжці грошей із державної скарбниці."
  republics.41.a: "Напевно, цьому є якесь пояснення."
  republics.41.b: "Позбудемося їх."