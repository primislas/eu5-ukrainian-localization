l_russian:
  military_order_events.1.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] отримує прохання"
  military_order_events.1.desc: "Ми не самотні в боротьбі проти безбожників, єретиків та язичників. Істинно віруючі збираються під нашими знаменами, підкоряючись вищому покликанню. Ми протистоїмо ворогам нашої віри, які сіють свавілля та руйнування. У важкі та неспокійні часи ми чекаємо, що [GetCountry('PAP').GetGovernment.GetRulerTitle|l] та брати-#TOOLTIP:RELIGION,$catholic_tt$,X #L католики#!#! допоможуть нашій благій справі."
  military_order_events.1.a: "Нам потрібна допомога з інфраструктурою."
  military_order_events.1.b: "Скличте людей на священну війну!"
  military_order_events.1.c: "Допоможіть наповнити наші скрині."
  gain_a_tt: "Якщо буде на те воля Його Святості, ми отримаємо [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,infrastructure_funds_modifier,X #V #L «Фінансування інфраструктури»#!#!"
  gain_b_tt: "Якщо буде на те воля Його Святості, ми отримаємо [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,warrior_banners_modifier,X #V #L «Воїнські знамена»#!#!"
  gain_c_tt: "Якщо буде на те воля Його Святості, ми отримаємо [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,foreign_donations_modifier,X #V #L «Іноземні пожертви»#!#!"
  military_order_events.2.title: "Лист з [target_order.Custom('CL_GEN')]"
  military_order_events.2.title_fallback: "Лист зі священного ордену"
  military_order_events.2.desc: "Ми отримуємо вісті з #ONCLICK:COUNTRY,[target_order.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_order.Custom('CL_tt')],X [target_order.Custom('CL_GEN')|L]#!#! про те, що ця країна стає оплотом нашої віри та блискучим втіленням сили #L [ShowReligionAdjective('catholic')|l]ої#! віри. Вони попросили нас допомогти грошима, щоб захистити віруючих."
  military_order_events.2.a: "Погодимося."
  military_order_events.2.b: "Вони самі по собі…"
  military_order_events.3.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] погоджується на наше прохання"
  military_order_events.3.desc: "[GetCountry('PAP').GetGovernment.GetRulerTitle] відправляє листа нашим радникам. Його Святість вважає, що наша праведна боротьба демонструє гідну захоплення стійкість народу. Він погодився виділити кошти на наші благі починання!"
  military_order_events.3.a: "Возрадуємося!"
  military_order_events.4.title: "[GetCountry('PAP').GetGovernment.GetRulerTitle] відхиляє наше прохання"
  military_order_events.4.desc: "Наші покої потьмяніли й наповнилися смутком, коли посланець поспішно зачитав відповідь: Його Святість відмовляється нам допомагати. Схоже, нам доведеться самотужки протистояти спраглим ворогам біля наших воріт. Святий Престол відхилив наше прохання про допомогу і вирішив не захищати віру, інтереси якої повинен представляти. Вельми плачевно…"
  military_order_events.4.a: "Допоможи нам, Боже…"
  military_order_events.5.title: "Завоювання Антіохії"
  military_order_events.5.desc: "Минуло багато років відтоді, як хрестоносці ступили на Святу землю. Наші рішучі та непохитні лицарі завершили найважливіший похід і відвоювали стародавню #TOOLTIP:LOCATION,antioch,X #L Антіохію#!#!. Це легендарне місто, що височіє на середземноморському узбережжі, зберігає пам'ять про свою бурхливу історію та багатовікове розмаїття культур. Його вузькі звивисті вулички оповідають про піднесення та крах імперій — від Селевкідів до Візантії. Стратегічне значення Антіохії незаперечне: вона захищає східний прохід у Середземне море, а також є важливим центром торгівлі та військового контролю.\n\nНаш орден беззавітно присвятив себе захисту християнства, і ми твердо маємо намір повернути місто в руки тих, кому воно належить по праву. Зараз наші люди крокують під безхмарним сирійським небом, і червоний хрест на їхніх знаменах майорить на вітрі. Хрестоносці ні перед чим не зупиняться, щоб звільнити решту Святої землі з лещат часу, язичництва та смути."
  military_order_events.5.a: "Наші знамена знову майорять над містом."
  military_order_events.6.title: "Завоювання Урфи"
  military_order_events.6.desc: "Навіть найстарші члени ордену не пам'ятають, коли востаннє бачили таке прекрасне місто. Під проводом хрестоносців #TOOLTIP:LOCATION,urfa,X #L Урфа#!#! втілює непохитну ревність нашого ордену. Багата історія цього міста, розташованого серед посушливих рівнин Месопотамії, перегукується з відлуннями Першого хрестового походу — адже саме на сході було засновано першу країну хрестоносців. Наші попередники зміцнили міські стіни та міцно вкоренили ідеали християнської побожності на цій стародавній землі. Вулиці міста, поцятковані шрамами незліченних битв, залишаються підтвердженням стійкості духу наших предків.\n\nСьогодні ми єдині в незламному прагненні захистити місто від ворогів, що загрожують нашим християнським побратимам. Наші знамена з червоним хрестом високо здіймаються під палючим сонцем. Ми рухаємося вперед, щоб відновити гідне місце цього регіону в історії хрестових походів."
  military_order_events.6.a: "Не дозволимо місту знову потрапити в руки язичників!"
  military_order_events.7.title: "Завоювання Дамаска"
  military_order_events.7.desc: "#TOOLTIP:LOCATION,damascus,X #L Дамаск#!#!, одне з найвеличніших міст Леванту та перлина Святої землі, переходить під владу хрестоносців. Його стародавні стіни та галасливі ринки зберігають спадщину ісламського та християнського панування. Під нашим пильним поглядом Дамаск розквітне. Він стане світлом нашої великої перемоги та милосердя, де християнські та мусульманські громади зможуть мирно жити поруч.\n\nТі, хто захоче віддати місто язичникам, пізнають нищівну силу наших мечів. Ми захистимо місто та його мешканців і не дамо опорочити спадщину цього чудового поселення. Наша рішучість непохитна, наша віра міцна. Гордо несучи червоні хрести на своїх обладунках, ми йдемо вперед, щоб захистити цей оплот християнства. Під пануванням хрестоносців Дамаск збереже свою блискучу історію та процвітатиме."
  military_order_events.7.a: "Це важлива віха наших військових походів."
  military_order_events.8.title: "Завоювання Єрусалима"
  military_order_events.8.desc: "Багато вельмож у чертогах #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! країн сумнівалися, що ми зможемо відвоювати найзначніше місто Святої землі — #TOOLTIP:LOCATION,jerusalem,X #L Єрусалим#!#!. Нехай голоси скептиків замовкнуть: ми досягли найважливішої мети та повернули це священне місто. Тепер ніхто не наважиться оскаржити наш успіх. Під нашим пануванням це місце, де переплітаються історія та віра, стане символом християнської самовідданості. Величні стіни оточують місто, пронизане святістю, і на його брукованих вулицях ще чути відлуння кроків Христа.\n\nХрам Гробу Господнього, що стоїть за стародавніми стінами, є світлом незламної віри та приваблює паломників з усіх куточків світу. Однак загрозам немає кінця — ворожі армії прагнуть викорінити християн у цьому заповітному місці. Гордо несучи червоний хрест на обладунках, ми йдемо вперед, сповнені рішучості. Нами рухає урочиста клятва захищати серце християнської цивілізації. З нами Єрусалим залишиться вічним символом християнської честі для майбутніх поколінь."
  military_order_events.8.a: "Нехай стане нашою столицею!"
  military_order_events.8.b: "Возрадуймося!"
  military_order_events.9.title: "Прапори Утремеру"
  military_order_events.9.desc: "Країна Утремер під невсипущим контролем хрестоносців є оплотом християнського впливу на сході. #TOOLTIP:LOCATION,jerusalem,X #L Єрусалим#!#!, #TOOLTIP:LOCATION,antioch,X #L Антіохія#!#! та інші її мальовничі міста є процвітаючими центрами культури та торгівлі. Тут кипить життя та мирно уживаються різні громади, формуючи унікальне полотно релігійної терпимості. Собори та фортеці за цими стінами стали німими свідками нашої незламної віри; кожен камінь тут зберігає пам'ять про нашу самовідданість.\n\nОднак тінь негараздів все ще нависає над нами — війська ворога загрожують зруйнувати все, чого ми досягли. Наші неодноразові перемоги в Леванті налякали язичників. Наші прапори майорять біля ворожих кордонів, і ми сповнені рішучості повернути те, що є нашим по праву."
  military_order_events.9.a: "Перемога за нами!"
  forming_koj_easier_tt: "Створивши Єрусалимське королівство, ми підвищимо [Concept('stability', 'стабільність')|e] та збільшимо [Concept('government_power', 'владу уряду')|e], а також отримаємо модифікатор #TOOLTIP:STATIC_MODIFIER,jerusalem_resurgent_modifier,X #V #L «Єрусалимське відродження»#!#! на #Y  20#! років"
  military_order_events.9.b: "Ця земля належить нашому ордену!"
  military_order_events.9.c: "Єрусалим повернеться в руки гідних."
  because_we_opted_inwards_tt: "Вибравши підтримку#italic  закритості#!, ми повинні розвивати свій оплот у події #Y  «Наслідки епохи хрестових походів»#! та посилити цей варіант"