l_russian:
  government_conversion_events.conversion_complete.title: "[target_government_type.GetNameWithNoTooltip] збільшує вплив на території [target_country.Custom('CL_GEN')]"
  government_conversion_events.conversion_complete.title_fallback: "Реформа уряду"
  government_conversion_events.conversion_complete.desc: "Останні кілька років ознаменувалися нестійкістю та безладдям. [target_country.GetLongName] — держава, де [target_government_type.GetName|l] потребує реформи. У довгостроковій перспективі це буде найкращим рішенням, однак багато впливових старих, що загрузли в безчесті, щосили трималися за старі порядки та сподівалися, що [origin_government_type.GetName|l] не зміниться. Попри все, [target_character.GetName] [Select_CString(target_character.IsFemale,'подолала', 'подолав')] усі труднощі та [Select_CString(target_character.IsFemale,'покінчила', 'покінчив')] зі старими традиціями. Тепер [target_government_type.GetNameWithNoTooltip|l] може зосередити владу у своїх руках."
  government_conversion_events.conversion_complete.a: "Ми більше не [origin_government_type.GetNameWithNoTooltip|l], а [target_government_type.GetNameWithNoTooltip|l]!"