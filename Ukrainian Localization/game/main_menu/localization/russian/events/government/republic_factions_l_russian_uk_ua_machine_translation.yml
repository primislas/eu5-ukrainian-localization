l_russian:
  republic_factions.1.title: "[target_goods.GetNameWithNoTooltip|U]: гільдійські обмеження"
  republic_factions.1.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! розгорнулося протистояння, у центрі якого — [target_goods.GetName|l]. Купці, які бажають вільно купувати та продавати цей товар, вважають, що гільдії, які розпоряджаються його виробництвом, користуються занадто сильним впливом: вони, по суті, об'єдналися в картель і тим самим підривають економіку.\n\nГлави гільдій, своєю чергою, стверджують, що завдяки цьому [target_goods.GetNameWithNoTooltip|l] сьогодні вдається виробляти швидше, ніж раніше. Яку б сторону ми не підтримали, протилежна сторона неодмінно постраждає або навіть спробує нашкодити самій собі, щоб довести свою правоту."
  republic_factions.1.a: "Потрібно розробити статути, які послаблять картель."
  republic_factions.1.a.tt: "Кожна [Concept('pop', 'група населення')|e] у [target_location.Custom('LR_PREP')|l] [target_location.GetName] втрачає [ShowNamedValue('pop_satisfaction_weak_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  republic_factions.1.b: "Сильні гільдії — запорука якості."
  republic_factions.2.title: "Гільдії вимагають меркантилістських реформ"
  republic_factions.2.desc: "Останнім часом у колах впливових учасників гільдій набула поширення економічна теорія меркантилізму. Ці люди, зрозуміло, вельми обізнані в подібних питаннях… а заодно, за неймовірним збігом, мають виключну нагоду опинитися у виграші від підтримуваної ними політики.\n\nРешті ж пощастить не так сильно: досвідчені купці, які займаються міжнародною торгівлею, стверджують, що всі ці теорії ведуть у нікуди, а тому докладуть усіх зусиль до того, щоб у [ROOT.GetCountry.Custom('rank_ua_PREP')|l] відмовилися від їх прийняття. Якщо ж ми все-таки вирішимо їх прийняти, гільдії можуть у цьому допомогти, однак у такому разі в країні почнуться політичні потрясіння."
  republic_factions.2.a: "Теорії, що ведуть у нікуди, нам не по кишені."
  republic_factions.2.b: "За меркантилізмом майбутнє, і неважливо, що думають купці."
  republic_factions.3.title: "Купці закликають наростити імпорт"
  republic_factions.3.desc: "Через гільдійський вплив ціни в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! на такий товар, як [target_goods.GetName|l], помітно злетіли — до такої міри, що купцям вигідніше імпортувати закордонні товари, ніж намагатися конкурувати на місцевому ринку. Однак [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]е законодавство значно ускладнює їм це заняття.\n\nЯкщо ми трохи послабимо митні обмеження, купці зможуть укладати вигідні угоди в країнах, де [target_goods.GetNameWithNoTooltip|l] — стаття виробництва та експорту, однак цьому протистоять гільдії: поточне законодавство цілком відповідає їхнім інтересам."
  republic_factions.3.a: "Найважливіше — безперебійність торгівлі."
  republic_factions.3.b: "Ми не підемо на поступки, якщо це зашкодить гільдіям."
  republic_factions.3.c: "Потрібні радикальні зміни."
  allowed_imports: "Дозволено імпорт"
  republic_factions.4.title: "Глави гільдій — нові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]?"
  republic_factions.4.desc: "Діючі в #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! гільдії — досить впливові установи, з яких нерідко виходять впливові люди. Керівні [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ими гільдіями фігури останнім часом не тільки стають багатшими за аристократів — вони набувають могутності, не маючи при цьому сімейних зв'язків, які споконвіку такі важливі для правителів [ROOT.GetCountry.Custom('rank_ua_GEN')|l].\n\nМабуть, такий зсув був неминучий, особливо якщо врахувати специфіку нашої країни. Проте, один факт не викликає сумнівів: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] у [ROOT.GetCountry.Custom('CL_PREP')] відчувають чималу огиду до цих погано вихованих нуворишів і бажають, щоб ті не брали жодної участі в місцевому політичному житті."
  republic_factions.4.a: "Гроші є гроші, і неважливо, спадкові вони чи ні."
  republic_factions.4.b: "Престол не купити ні за які гроші."
  republic_factions.5.title: "Таємні товариства в уряді"
  republic_factions.5.desc: "Істинний розмах діяльності тієї чи іншої гільдії достовірно відомий тільки її учасникам. Зрозуміло, всі гільдії зберігають свої цехові секрети — частково для цього вони й потрібні, але на цьому ґрунті виникають звинувачення в змовах. До сьогоднішнього дня ми не звертали уваги на ці заяви і вважали їх лише проявами надмірної підозрілості.\n\nОднак [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] перешіптується, що, можливо, в уряді #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! є члени таємних гільдій, і деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] цим вельми стурбовані… причому настільки, що починають самі бути схожими на змовників — іноді більше, ніж обвинувачені. Але навіть якщо вони помиляються, неможливо заперечувати: аристократи [ROOT.GetCountry.Custom('CL_GEN')] дійсно відчувають, що породжені гільдіями таємні товариства становлять для них загрозу."
  republic_factions.5.a: "Може, хоч через них політики почнуть один з одним погоджуватися."
  republic_factions.5.a.tt: "Поки що таємний вплив гільдій залишиться без уваги. Надалі можливі певні наслідки."
  republic_factions.5.b: "Добре. Нехай ті, хто вірний нам, вивчать це питання."
  republic_factions.6.title: "Гільдія важливіша за країну"
  republic_factions.6.desc: "Ми воліли пропустити повз вуха слова знаті, яка заявляла, що #L [ROOT.GetCountry.GetAdjective|l]а#! політика опинилася під впливом таємних товариств. Ці люди попереджали, що, коли змова дійде й до нас, розплачуватися доведеться життям.\n\nНічого настільки страшного поки не сталося, однак [Select_CString(target_advisor.IsFemale,'наша довірена радниця', 'наш довірений радник')] [target_advisor.GetName] нещодавно [Select_CString(target_advisor.IsFemale,'стала', 'став')] дивно поводитися та приймати сумнівні рішення. Зрештою [Select_CString(target_advisor.IsFemale,'вона зізналася', 'він зізнався')], що [Select_CString(target_advisor.IsFemale,'чинила', 'чинив')] так заради певного таємного товариства, в якому [Select_CString(target_advisor.IsFemale,'сама', 'сам')] перебуває. Це викликало серйозний переполох серед інших політиків. Скандал тепер неминучий."
  republic_factions.6.a: "Зрада інтересів [ROOT.GetCountry.Custom('CL_GEN')] має бути покарана."
  republic_factions.6.b: "Постаратися пом'якшити обстановку."
  republic_factions.6.c: "Таємне товариство, кажете? Куди подавати заяву?"
  republic_factions.7.title: "Міжнародні зв'язки гільдій"
  republic_factions.7.desc: "Деякі наші посли, які вже не перший рік служать країні, звинуватили інших дипломатів у зловживанні зв'язками з гільдіями на батьківщині: користуючись своїм становищем, вони укладали угоди з гільдіями з інших країн. І хоча голови цехів визнають, що пов'язані з ними посли дійсно допомагають встановлювати відносини із закордонними гільдіями, вони все ж рішуче відкидають звинувачення в тому, що наша політика піддається небезпеці. При цьому вони зовсім не проти спроб користуватися наявними зв'язками за кордоном, якщо нам це буде вигідно…\n\nСтара гвардія, дипломати-аристократи, вважають такий підхід вкрай сумнівним, однак зв'язки між гільдіями дійсно можуть виявитися дуже корисним інструментом у секретній роботі."
  republic_factions.7.a: "Подивимося, чия гільдія виявиться найбільш вірною своїй країні."
  republic_factions.7.b: "Перестати користуватися їхніми послугами до наведення порядку."
  republic_factions.8.title: "Шляхетна спадщина [ROOT.GetCountry.Custom('CL_GEN')]"
  republic_factions.8.desc: "Наша [ROOT.GetCountry.GetGovernment.GetAdjective|l]а країна відреклася від старих уявлень про знатність і феодалізм, однак завжди готова до них повернутися, якщо вони раптом виявляться корисні, — зрозуміло, залежно від випадку. Такий випадок якраз трапився в [target_location.Custom('LR_PREP')|l] [target_location.GetName]: місцева [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] стверджує, що земля за кордоном, у провінції [target_province.GetName], насправді законне володіння їхнього сімейства.\n\nПроти цієї заяви виступили місцеві купці, які щойно уклали велику торговельну угоду з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_INST')|L]#!#!. Вони стверджують, що будь-який правитель [ROOT.GetCountry.Custom('rank_ua_GEN')|l] повинен насамперед дбати про торгівлю, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] своїми домаганнями принесуть нам лише війну та страждання."
  republic_factions.8.a: "Війну — мабуть, але зі стражданнями ви поквапилися."
  republic_factions.8.b: "Вони мають рацію. Час забути про ці дріб'язкові суперечки."
  republic_factions.9.title: "Кандидати змагаються за можливості"
  republic_factions.9.desc: "Як і належить [ROOT.GetCountry.Custom('rank_ua_DAT')|l], ми намагаємося утримувати рівновагу між економічними інтересами та традиціями, а тому обираємо собі радників на основі саме цих принципів. Сім'ї, яким це відомо, — і потомственні, і нові аристократи, — намагаються заздалегідь продумувати свої кроки та спочатку висувати своїх представників на посади, що обіцяють великі можливості; [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] — вже наступний етап.\n\nНещодавно якраз звільнилася така посада, і тепер за неї розгорнулася боротьба між різними угрупованнями. Догодити всім неможливо — незабаром неодмінно доведеться когось призначити."
  republic_factions.9.a: "Нам знадобиться людина, яка розуміється на військовій справі."
  republic_factions.9.b: "[ROOT.GetCountry.GetLongNameWithNoTooltip] найбільше цінує комерційну жилку."
  republic_factions.10.title: "Торгівля між суперниками"
  republic_factions.10.desc: "Ми готові вести справи з усіма без винятку — якщо, звичайно, керувати ними будемо ми. Що саме нам підвладне, а що ні, — питання, що вимагає обговорення. І, як і у випадку з усіма іншими відкритими питаннями в [ROOT.GetCountry.Custom('rank_ua_PREP')|l], зараз воно займає всю нашу увагу. Так, нещодавно наші купці стали торгувати з суперником: вони вважають, що [target_rival.GetName] — важливий торговий партнер, навіть попри наші політичні розбіжності. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] вважають такий підхід сумнівним, а тому закликають нас негайно покласти цьому край."
  republic_factions.10.a: "Не можна допустити розриву торговельних зв'язків."
  republic_factions.10.b: "Ми цілком можемо собі дозволити розірвати всі зв'язки з цими негідниками."
  enemy_allowed_trade: "Дозволена торгівля між суперниками"
  republic_factions.11.title: "[target_country.GetNameWithNoTooltip] бажає торгувати"
  republic_factions.11.desc: "Попри свою ненависть до нас і до нашого способу життя, [target_country.GetLongName] дозволяє своїм купцям вести з нами справи та укладати угоди. Завдяки цьому їхні торговці можуть впливати на наш ринок — але, відповідно, і ми можемо впливати на них."
  republic_factions.11.a: "Нехай частіше нам довіряють у цьому відношенні."
  republic_factions.12.title: "[target_character.GetNameWithNoTooltip] робить нам пропозицію"
  republic_factions.12.desc: "[target_estate.GetName|U] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! здолали своїх конкурентів у політичній боротьбі, і тепер контролюють [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ий уряд. Втім, справжня боротьба тільки починається.\n\nСьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] приймає людину на ім'я [target_character.GetName], яка надійно [Select_CString(target_character.IsFemale,'зарекомендувала', 'зарекомендував')] себе на службі у [ROOT.GetCountry.Custom('rank_ua_GEN')|l]: [Select_CString(target_character.IsFemale,'вона', 'він')] стверджує, що знає, як вирішити цей конфлікт. За [Select_CString(target_character.IsFemale, 'її', 'його' )] словами, якщо влада зараз різко зміниться, то обвалиться все, до чого так цілеспрямовано прагнули мудрі [target_estate.GetNameWithNoTooltip|l]. Вони не сумніваються, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] та [ROOT.GetCountry.GetGovernment.GetAdjective|l]ий уряд виявлять розсудливість, але якщо однієї довіри виявиться замало, то вони готові зробити внесок у підтримку політичної діяльності…"
  republic_factions.12.a: "[Select_CString(target_character.IsFemale, 'Вона', 'Він' )] що, пропонує хабар?"
  republic_factions.12.b: "[target_estate.GetNameWithNoTooltip|U] вірні нам і вельми щедрі. Ми вдячні."
  republic_factions.13.title: "Особливо наближені"
  republic_factions.13.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] [target_ruler.GetName] намагається дотримуватися неупередженості щодо гільдій, особливо після того, як у #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! до них стали ставитися з деякою підозрою. [Select_CString(target_ruler.IsFemale, 'Вона сама', 'Він сам' )] не належить до жодної гільдії — зокрема, тому, що в поточній політичній обстановці це було б недоречно. Однак зміни іноді бувають вкрай несподіваними: найбільша гільдія [ROOT.GetCountry.Custom('rank_ua_GEN')|l] запропонувала [Select_CString(target_ruler.IsFemale, 'їй', 'йому' )] вступити до своїх лав, пообіцявши навіть зберігати цей факт у повній таємниці стільки, скільки буде потрібно. Смілива пропозиція, і відмовитися від неї буде непросто — адже в такому разі наші відносини з гільдією різко зіпсуються."
  republic_factions.13.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] зберігає вірність лише одному — [ROOT.GetCountry.Custom('rank_ua_DAT')|l]."
  republic_factions.13.b: "Нехай [target_ruler.GetNameWithNoTooltip] зберігає це в таємниці, якщо зможе."
  republic_factions.14.title: "Вигідна угода"
  republic_factions.14.desc: "У #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_PREP')|L]#!#! підприємництво та політика вже давно сплелися в єдину і нероздільну сутність. Іноді нам доводиться приймати рішення, які вигідні багатьом, крім безпосередньо [ROOT.GetCountry.Custom('rank_ua_GEN')|l]. І оскільки [target_ruler.GetName] — [Select_CString(target_ruler.IsFemale, 'одна', 'один' )] з таких вигодонабувачів, ситуацію, що склалася, можна сміливо назвати небезпечною.\n\nВдала ділова угода завжди служить зміцненню зв'язків між важливими купцями, і ця особливість здатна зіграти нам на руку. Якщо поступитися частиною своїх принципів як представника [ROOT.GetCountry.Custom('rank_ua_GEN')|l], ці торгові партнери навряд чи від нас відвернуться."
  republic_factions.14.a: "Зрештою принципи важливіші."
  republic_factions.14.b: "Не можна жертвувати особистими інтересами."
  republic_factions.15.title: "Не водиця"
  republic_factions.15.desc: "Становище в суспільстві для багатьох впливових жителів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! визначається зв'язками або багатством, однак [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] крім цього також високо цінують кровні узи. Нехай навіть у нашій республіці цей стан не найвпливовіший, але вірність собі вони все так же забезпечують старими методами.\n\nПро це свідчить їхня недавня спроба заручитися нашою прихильністю. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] буде змушений переглянути політику так, щоб вона відповідала їхнім інтересам, що послабить [ROOT.GetCountry.Custom('rank_ua_ACC')|l], однак якщо ми відмовимося, то [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] почнуть ще менш охоче підтримувати наші задуми."
  republic_factions.15.a: "Відмовитися якомога ввічливіше."
  republic_factions.15.b: "Потрібно зберігати з ними тісні зв'язки."
  republic_factions.16.title: "Гільдії співпрацюють"
  republic_factions.16.desc: "Відтоді як [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] стали провідною силою не тільки в #L [ROOT.GetCountry.GetAdjective|l]ому#! підприємництві, а й у політиці, гільдії почали усвідомлювати, що співпраця обіцяє їм користь. Об'єднання, які раніше безперестанку змагалися одне з одним, тепер діють спільно, щоб не випускати з рук кермо влади країною. Це виявилося навіть корисно: їхній вплив на якість [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их товарів і торгівлю ними розширився і став приносити більше вигоди."
  republic_factions.16.a: "Якби вони так поводилися і в несприятливих умовах…"
  republic_factions.17.title: "Купці поглядають на закордон"
  republic_factions.17.desc: "[ROOT.GetCountry.GetLongName] під контролем купців, і тепер вони прагнуть захопити лідерство у світовій торгівлі. Оскільки політичне життя в [ROOT.GetCountry.Custom('CL_PREP')] повністю підпорядковане їм, торговцям не доводиться хвилюватися про внутрішні питання — вони тепер можуть йти на ризики, які були б немислимі в умовах відсутності безроздільної влади. Зрештою це може піти на користь не тільки їм самим, а навіть і [ROOT.GetCountry.Custom('rank_ua_DAT')|l]."
  republic_factions.17.a: "Нехай через них до нас течуть багатства світу."
  republic_factions.18.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] залагоджують свої розбіжності"
  republic_factions.18.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|U] сьогодні служать #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! точно так же, як [ROOT.GetCountry.GetFlavorRank|l] служить їм. Страх, що вони назавжди підуть у минуле, відступив, і прийшло розуміння, що зберігати вплив вони зможуть скільки завгодно довго, поки діятимуть спільно. І хоча інші політичні сили [ROOT.GetCountry.GetAdjectiveWithNoTooltip]ої країни сприймуть такий стан справ як виклик, ми все ж таки змогли досягти двох цілей: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] більше не намагатимуться зруйнувати [ROOT.GetCountry.Custom('rank_ua_ACC')|l] шляхом перевороту, а заодно почнуть виконувати свої обов'язки ефективніше."
  republic_factions.18.a: "[ROOT.GetCountry.GetFlavorRank|U] об'єднує навіть старі родини!"
  republic_factions.19.title: "Гільдії перешкоджають торгівлі"
  republic_factions.19.desc: "Глави гільдій — люди впливові та безжалісні. Вони не терплять політичних супротивників. Оскільки гільдії вже давно не користуються прихильністю уряду #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, деякі з них заради доказу свого впливу почали вдаватися до залякування та перешкоджають вільній торгівлі, знаючи, що від неї залежить добробут [ROOT.GetCountry.Custom('rank_ua_GEN')|l]. Вони цілеспрямовано шкодять економіці країни, а заодно — своїм політичним конкурентам."
  republic_factions.19.a: "Вони сподіваються, що так можна завоювати нашу прихильність?"
  republic_factions.19.b: "Підемо для них на поступки."
  republic_factions.20.title: "Купці відмовляються служити"
  republic_factions.20.desc: "Хоча ніхто не сумнівається в прихильності #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! концепції торгівлі, багато впливових купців останнім часом почали стверджувати, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] відмовляється їх слухати та ставить інтереси інших вище інтересів тих, хто наповнює казну країни. Деякі торговці, без яких неможливий буде обмін товарами з іншими країнами, навіть пригрозили взагалі припинити працювати на [ROOT.GetCountry.Custom('rank_ua_ACC')|l]. І хоча рано чи пізно ми неодмінно досягнемо згоди, співпрацювати надалі все-таки буде складніше."
  republic_factions.20.a: "Чого вони взагалі хочуть цим домогтися?"
  uncooperative_trader: "Незговірливий торговець"
  republic_factions.21.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] відкидають [ROOT.GetCountry.Custom('rank_ua_ACC')|l]"
  republic_factions.21.desc: "[ROOT.GetCountry.Custom('rank_ua_DAT')] вдалося досягти значних успіхів у справі усунення від влади тих правителів-аристократів, хто сприймав цей привілей як даність. Їм довелося змиритися з тим, що «по праву» влада дістається в інших країнах; тут же так не заведено. Втім, остаточно знищити пам'ять про славні дні аристократії все-таки не вдалося: [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вважають, що вплинути на політику своєї країни сьогодні можуть виключно мечем, а тому готові взяти цей самий меч у руки та підняти відкритий заколот проти республіки."
  republic_factions.21.a: "Якщо їм так потрібна влада, нехай здобувають її пером!"
  republic_factions.21.b: "Спробувати досягти взаєморозуміння."
  republic_factions.22.title: "Закон про сім'ю"
  republic_factions.22.desc: "Аристократи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! наполягають на ухваленні так званого закону про сім'ю, який має вберегти невинні уми від жахливих і розбещувальних п'єс та романів, написаних за останні роки аморальними вільнодумцями. Найбільше їх обурює непристойна постановка у виконанні сім'ї, що мандрує країною та висміює надмірності, якими славляться [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Висміяні настільки принижені та ображені, що вимагають від [ROOT.GetCountry.Custom('rank_ua_GEN')|l] негайно припинити це неподобство."
  republic_factions.22.a: "Цікаво. І як називається така постановка?"
  republic_factions.22.b: "Свобода не передбачає похабства!"
  republic_factions.22.c: "Можливо, треба подумати, чи не забагато ми їм дозволяємо."
  republic_factions.23.title: "Заворушення в [ROOT.GetCountry.Custom('CL_PREP')]"
  republic_factions.23.desc_burghers: "Якийсь час тому одним із найвладніших станів у [ROOT.GetCountry.Custom('rank_ua_PREP')|l] стали [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], що вибилися у великих гравців на політичній арені. За допомогою тисяч підмайстрів, ремісників та власників дрібних крамничок вони зуміли прибрати до рук чималу частку влади та одноосібно зайняти всі управлінські посади.\n\nНе бажаючи миритися з таким станом справ, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] пішли на відповідні заходи щодо зміцнення свого впливу та багатства, що швидко обернулося гнобленням і без того стражденного люду. До недавнього часу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] не звертали уваги на наближення перелому — їх цілком влаштовували доходи з видачі позик голодуючим, не здатним навіть купити їжі. Це тривало доти, доки народ не вийшов на головну площу міста [target_capital.GetName] перед палацом — резиденцією, де проживає [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Тут вперше за цей час пролилася кров: загинуло півдюжини вартових, які наказали присутнім розійтися."
  republic_factions.23.desc_nobles: "Не зупиняючись ні перед чим, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! захопили владу над [ROOT.GetCountry.Custom('rank_ua_INST')|l]. Вихідці з впливових аристократичних сімей тепер урочисто крокують вулицями та засідають у палацах міста [target_capital.GetName]. Їхні суперники майже повалені: повернути собі втрачену владу законним шляхом тепер неможливо.\n\nОднак завжди можна піти в обхід закону. [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|U] вирішили заручитися підтримкою простого люду, оскільки гнобителі-[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] тепер однаково ненависні обом станам. Простолюду роздали хліб та зброю, і незабаром бунтівні натовпи обложили палац, де знаходиться [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. У першій же атаці нашвидкуруч зібране ополчення, незважаючи на значні втрати, зуміло взяти [ROOT.GetCountry.GetGovernment.GetAdjective|l]у резиденцію в оточення."
  republic_factions.23.a: "Не можна допустити, щоб у [ROOT.GetCountry.Custom('rank_ua_PREP')|l] запанувало беззаконня."
  republic_factions.23.b: "Поступимося їхнім вимогам."