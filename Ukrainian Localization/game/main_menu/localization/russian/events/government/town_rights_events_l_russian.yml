l_russian:
 town_rights_events.1.title: "Штапельный порт [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.1.desc: "Благодаря своим усилиям по развитию #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] мы пользуемся выгодными торговыми преимуществами. Чиновники из провинции [target_province.GetName] обратились к правительству с вопросом о том, как лучше распорядиться вырученными средствами."
 town_rights_events.1.a: "Эти деньги должны пойти на благо всей провинции."
 town_rights_events.1.b: "Вложим средства в дальнейшее развитие порта."
 town_rights_events.1.c: "Направим средства на нужды района."
 every_location_in_province_dev_and_prosperity_tt: "Каждый [Concept('location', 'район')|e] в провинции [target_province.GetName] получит [ShowNamedValue('development_weak_bonus')|+=2%] к [Concept('development', 'развитию')|e] и [ShowNamedValue('prosperity_mild_bonus')|+=2%] к [Concept('prosperity', 'процветанию')|e]"
 town_rights_events.2.title: "Экономический застой в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.2.desc: "Несмотря на все наши усилия по развитию #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName], торговые суда практически не заходят в здешний порт, и купцы не желают здесь торговать. Нам остаётся надеяться, что это лишь временный застой, который не приведёт к полному упадку."
 town_rights_events.2.a: "[target_character.GetShortNameWithNoTooltip] легко справится с этой проблемой."
 town_rights_events.2.b: "Увы, таковы риски любого предприятия."
 town_rights_events.2.c: "Этот вопрос явно не стоит нашего внимания."
 administrative_expertise_of_ruler_mitigates_situation_tt: "Административный [Concept('abilities', 'навык')|e] персонажа [target_character.GetName] позволяет без труда решить эту проблему"
 town_rights_events.3.title: "Переполненные амбары [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.3.desc: "Крестьяне и рабочие из провинции [target_province.GetName] сообщают, что в последнее время [target_location.GetRank.GetName|l] [target_location.GetName] начал производить гораздо больше продуктов, а их качество стало заметно лучше. Теперь нам необходимо как можно скорее решить, как поступить с излишками продовольствия."
 town_rights_events.3.a: "Эти продукты должны пойти на благо всей провинции."
 town_rights_events.3.b: "Нужно продать их, пока они не испортились."
 town_rights_events.3.c: "Распределим продукты между жителями [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
 every_location_gains_mild_prosperity: "Каждый [Concept('location', 'район')|e] в провинции [target_province.GetName] получит [ShowNamedValue('prosperity_mild_bonus')|+=2%] к [Concept('prosperity', 'процветанию')|e]"
 every_pop_in_target_location_mild_satisfaction_tt: "Наши [Concept('pops', 'группы населения')|e] в [target_location.Custom('LR_PREP')|l] [target_location.GetName] получат [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 income_gained_depends_on_crown_estate_power_tt: "Количество вырученных [Concept('gold', 'дукатов')|e] сильно зависит от [Concept('crown_power', 'власти правителей')|e]"
 town_rights_events.4.title: "Пустующие амбары [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.4.desc: "Крестьяне из #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] бедствуют: из-за суровой погоды ли или по причине чьей-то халатности, люди не смогли запасти достаточно продовольствия, и теперь местные амбары пустуют. Жители провинции [target_province.GetName] просят правительство о помощи, чтобы предотвратить там голод."
 town_rights_events.4.a: "Раздадим людям пищу из казённых закромов."
 town_rights_events.4.b: "Людям придётся потерпеть, пока мы не устраним дефицит."
 town_rights_events.4.c: "Мы должны приложить все усилия, чтобы предотвратить массовый голод."
 every_pop_in_target_location_mild_satisfaction_malus_tt: "Все [Concept('pop', 'группы населения')|e] в [target_location.Custom('LR_PREP')|l] [target_location.GetName] получат [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 relief_effort_tt: "Раздача пищи сокращает масштабы голода"
 town_rights_events.5.title: "Новые методы изготовления инструментов в [target_location.Custom('LR_PREP')|l] [target_location.GetName]"
 town_rights_events.5.desc: "Благодаря мастерским [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] стал настоящим центром развития технологий. Многие ремесленники сообщают, что здешние инструменты и методы обработки позволяют заметно увеличить количество и повысить качество производимых товаров. Теперь нам лишь нужно решить, как лучше применить эти новшества. Мы можем использовать их для дальнейшего создания инноваций, направить на благо местных жителей или просто выпустить на широкий рынок."
 town_rights_events.5.a: "Поощрим создание и внедрение новых технологий."
 town_rights_events.5.b: "Пусть эти инновации пойдут на развитие [target_location.Custom('LR_GEN')|l]."
 town_rights_events.5.c: "Наводним рынок новыми инструментами."
 town_rights_events.6.title: "Ненадёжные инструменты из [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.6.desc: "Инструменты из #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] снискали весьма дурную славу: их рукоятки то и дело трескаются, лезвия быстро затупляются, а соединения попросту не выдерживают нагрузки. Неясно, с чем связано такое низкое качество — с жадностью ремесленников или с их банальной небрежностью. Как бы то ни было, покупатели недовольны, а некогда хорошая репутация [target_location.Custom('LR_GEN')|l] рушится прямо на глазах."
 town_rights_events.6.a: "Успокоим людей и попытаемся исправить ситуацию."
 town_rights_events.6.b: "Пусть мастера сами отвечают за свою халатную работу."
 town_rights_events.6.c: "Это позор для [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 our_innovative_nature_finds_compromise_tt: "Наша [Concept('societal_values', 'склонность')|e] к #TOOLTIP:SOCIETAL_VALUE,traditionalist_vs_innovative,X #L инновациям#!#! либо наличие у персонажа [target_character.GetName] подходящего [Concept('trait', 'свойства')|e] рождают новаторский подход, который позволяет нам найти разумный компромисс и решить проблему"
 town_rights_events.7.title: "Ювелиры [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] преуспевают в своём ремесле"
 town_rights_events.7.desc: "Благодаря полученным привилегиям [ROOT.GetCountry.GetGovernment.GetAdjective|l]ие ювелиры [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] продолжают неустанно совершенствовать своё ремесло. Они освоили новые методы обработки и научились создавать ещё более искусные узоры, заслужив признание не только местных жителей, но и странствующих купцов. Творческие достижения этих мастеров шаг за шагом ведут нашу державу к величию."
 town_rights_events.7.a: "Их труд принесёт известность и процветание всей провинции."
 town_rights_events.7.b: "Прославим ремесленников [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
 town_rights_events.7.c: "Выставка изделий местных ювелиров прославит [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
 nobles_appreciate_jewellery_displays: "#italic [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] обожают эти великолепные ювелирные изделия#!"
 jewellery_display_reinforces_authority: "#italic Пусть эти драгоценности служат символом нашего могущества и богатства#!"
 town_rights_events.8.title: "Большой пожар в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.8.desc: "[target_location.GetRank.GetName] [target_location.GetName] постигло страшное бедствие: случайно вспыхнувшее пламя быстро перекинулось на соседние дома и переросло в бушующий пожар. Квартал ювелиров уже почернел от густого дыма и серьёзно пострадал во время поднявшейся суматохи. Если срочно ничего не предпринять, пожар может распространиться за пределы [target_location.Custom('LR_GEN')|l]."
 town_rights_events.8.a: "[target_character.GetShortNameWithNoTooltip] лично займётся помощью пострадавшим."
 town_rights_events.8.b: "Пламя не остановить!"
 town_rights_events.8.c: "Отправим туда помощь и попытаемся предотвратить распространение огня."
 nature_of_target_character_assists_the_locals: "Благодаря своей отзывчивости [target_character.GetName] успокаивает местных жителей и помогает им справиться с последствиями пожара"
 chance_the_fire_spreads_neighboring_locations_tt: "Пожар с высокой вероятностью затронет соседние [Concept('locations', 'районы')|e]"
 relief_effort_prevents_spread_of_fire_tt: "Вовремя принятые меры помешали пожару распространиться"
 town_rights_events.9.title: "Подъём кораблестроения в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.9.desc: "На верфях и складах лесоматериалов #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] днём и ночью кипит работа. Рабочие неустанно жгут древесину для производства дёгтя, а купцы и моряки то и дело говорят о расширении своих торговых предприятий — иными словами, дела определённо идут в гору. Подобный экономический рост не только приносит пользу [target_location.Custom('LR_DAT')|l], но и открывает перед [ROOT.GetCountry.Custom('rank_ru_INST')|l] новые перспективы."
 town_rights_events.9.a: "Этот рост поможет нам расширить своё присутствие на море."
 town_rights_events.9.b: "Необходимо развивать морскую торговлю в этом районе."
 town_rights_events.9.c: "Очевидно, что будущее нашей державы тесно связано с морем."
 town_rights_events.10.title: "Дефицит и беспорядки в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.10.desc: "Растущие нужды корабелов из #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] привели к тому, что в окрестностях практически не осталось деревьев. Разумеется, это вызывает недовольство у местных жителей, которые годами жили за счёт близлежащих лесов. Местная кораблестроительная промышленность когда-то процветала, но теперь стала объектом нападок и протестов, и если мы не примем меры, то вскоре народное возмущение может вылиться в массовые беспорядки."
 town_rights_events.10.a: "Отзовём у района особые права, чтобы успокоить народ."
 town_rights_events.10.b: "Возместим ущерб и продолжим строительство кораблей."
 town_rights_events.10.c: "Местным жителям придётся смириться с этими обстоятельствами."
 cooldown_10_years: "Эти [Concept('town_rights', 'городские права')|e] нельзя будет снова отозвать в течение #v 10 лет#!"
 laborers_and_peasants_happy_tt: "[Concept('laborers', 'Рабочие')|e] и [Concept('peasants', 'крестьяне')|e] [target_location.Custom('LR_GEN')|l] [target_location.GetName] получат [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 town_rights_events.11.title: "Мода [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.11.desc: "Портные, красильщики и торговцы тканями в #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_PREP')|l]#!#! [target_location.GetName] стали настоящими законодателями мод. Костюмы, искусно сшитые здесь, не обсуждает только ленивый, каждая выпущенная коллекция одежды тотчас становится образцом стиля для всей страны. Материалы и виды покроя, с которыми работают местные ремесленники, обретают популярность далеко за пределами провинции [target_province.GetName], а название этого [target_location.Custom('LR_GEN')|l] всё чаще с восхищением произносят в светских кругах. Философия здешних мастеров проста: люди всегда будут друг на друга глазеть — так пусть же их глаз порадуется!"
 town_rights_events.11.a: "[target_character.GetShortNameWithNoTooltip] выглядит потрясающе в новом наряде!"
 town_rights_events.11.b: "Местные ремесленники принесут нашей державе престиж."
 town_rights_events.11.c: "Пусть эти изящные костюмы украсят [ROOT.GetCountry.GetGovernment.GetAdjective|l]ую аристократию."
 town_rights_events.12.title: "Текстильные монополии [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.12.desc: "За счёт полученных привилегий небольшая группа предпринимателей [target_location.Custom('LR_GEN')|l] [target_location.GetName] подмяла под себя местную текстильную промышленность. Более мелкие производители жалуются на то, что монополисты манипулируют ценами и попросту выдавливают их с рынка. Как следствие, всё богатство района сосредотачивается в руках нескольких магнатов, а недовольство местных жителей растёт…"
 town_rights_events.12.a: "[target_character.GetShortNameWithNoTooltip] — светило нашей текстильной промышленности!"
 town_rights_events.12.b: "У монополии есть свои плюсы."
 town_rights_events.12.c: "Пусть местные предприниматели разбираются сами."
 ruler_regent_finds_good_middle_ground_tt: "Благодаря своему огромному влиянию [target_character.GetName] [Select_CString(target_character.IsFemale, 'сумела', 'сумел' )] найти компромисс с местными производителями"
 local_textile_barons_are_unhappy_tt: "#italic [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')], занятые производством текстиля, могут возмутиться подобными переменами#!"
 destabilization_spreads_across_the_country: "#italic Разногласия между предпринимателями лишь усугубляются, что приводит к росту нестабильности [ROOT.GetCountry.Custom('endrank_predlog_vvo')] [ROOT.GetCountry.Custom('rank_ru_PREP')|l]#!"
 town_rights_events.13.title: "Искусное оружие из [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.13.desc: "Благодаря [ROOT.GetCountry.GetGovernment.GetAdjective|l]им привилегиям мастера [target_location.Custom('LR_GEN')|l] [target_location.GetName] начали выпускать высококачественное #TOOLTIP:GOODS,weaponry,X #L оружие#!#!, которое быстро обрело славу среди местных солдат. Надёжность и боевые характеристики этих клинков превосходят все стандарты, поэтому многие пехотинцы буквально мечтают ими обзавестись. Несомненно, такие добротные изделия — результат наших давних ремесленных традиций и добросовестного отношения к работе."
 town_rights_events.13.a: "Такое качество должно стать стандартом для нашей армии."
 town_rights_events.13.b: "Это оружие поможет нам расширить набор солдат в провинции."
 town_rights_events.13.c: "Наши офицеры могли бы поучиться усердию у этих мастеров."
 town_rights_events.14.title: "Оружие из [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] создаёт проблемы"
 town_rights_events.14.desc: "Резкое увеличение количества #TOOLTIP:GOODS,weaponry,X #L оружия#!#! в окрестностях [target_location.Custom('LR_GEN')|l] [target_location.GetName] привело к плохим последствиям. Теперь местные лиходеи и преступники поголовно вооружаются и всё чаще творят безобразия. Привилегии, которые когда-то были дарованы [target_location.Custom('LR_DAT')|l] ради укрепления [ROOT.GetCountry.Custom('rank_ru_GEN')|l], в конечном итоге лишь умножают беззаконие. Воистину, это весьма прискорбное зрелище…"
 town_rights_events.14.a: "[target_character.GetShortNameWithNoTooltip] восстановит здесь порядок."
 town_rights_events.14.b: "Попытаемся подавить очаги беспорядков."
 town_rights_events.14.c: "Грубой силой можно решить любую проблему."
 kind_martial_nature_of_ruler_helps_tt: "Благодаря своей воинской выучке и суровому нраву [target_character.GetName] помогает разобраться со смутьянами"
 town_rights_events.15.title: "Оплот знаний в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.15.desc: "Учёные и торговцы книгами превратили #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_ACC')|l]#!#! [target_location.GetName] в центр знаний и науки. Здешние мастерские один за другим публикуют тексты, которые затем распространяются по всей стране. Подобный обмен знаниями не только приносит провинции значительный доход, но и повышает образованность местных жителей."
 town_rights_events.15.a: "Распространение знаний поможет ускорить развитие нашей державы."
 town_rights_events.15.b: "Пусть все знают, что здесь сосредоточены наши знания."
 town_rights_events.15.c: "[target_character.GetShortNameWithNoTooltip] может многое почерпнуть из этих книг."
 town_rights_events.16.title: "Скандальные книги из [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.16.desc: "Книги служат нам важным источником мудрости и знаний, но далеко не все из них безобидны. Так, некоторые тексты, распространяемые в [target_location.Custom('LR_PREP')|l] [target_location.GetName], вызывают жаркие споры среди учёных и простых читателей. Одни хвалят авторов за смелые взгляды, другие осуждают их и считают подобные работы крайне неприятными и даже опасными. В результате даже самые невинные на первый взгляд книги создают проблемы для нашего правительства."
 town_rights_events.16.a: "Нас не интересуют эти пустые пререкания."
 town_rights_events.16.b: "Грамотный человек и не должен быть равнодушен к такого рода текстам."
 town_rights_events.16.c: "Помешаем распространению этих книг любой ценой."
 pops_in_target_province_mild_penalty_according_to_literacy_tt: "[Concept('pops', 'Группы населения')|e] в провинции [target_province.GetName] потеряют часть [Concept('pop_satisfaction', 'довольства')|e] в зависимости от своего уровня [Concept('literacy', 'грамотности')|e]"
 town_rights_events.17.title: "Искусные ремесленники [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.17.desc: "Ремесленники из [target_location.Custom('LR_GEN')|l] [target_location.GetName] обрели большую известность как среди местных жителей, так и за пределами провинции. Их высококачественные изделия не только несут практическую пользу, но и радуют глаз своим привлекательным видом. Такой усердный труд определённо заслуживает внимания со стороны правительства [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 town_rights_events.17.a: "Мы должны поощрять подобное качество во всём."
 town_rights_events.17.b: "Их уровень должен стать образцом для остальных."
 town_rights_events.17.c: "Слава этих мастеров возвышает нашу державу."
 town_rights_events.18.title: "Мастера [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip] стареют"
 town_rights_events.18.desc: "Многие опытные ремесленники из #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] уже состарились и отошли от дел, а приходящие им на смену ученики пока не могут похвастаться такими же сильными навыками и безупречной репутацией. Если мы в ближайшее время не привлечём в страну талантливых ремесленников, доход от наших мастерских заметно снизится."
 town_rights_events.18.a: "Выделим средства на привлечение мигрантов."
 town_rights_events.18.b: "Наша казна выдержит эти потери."
 town_rights_events.18.c: "Жителям провинции придётся смириться с упадком."
 town_rights_events.19.title: "Создание пивоваренных стандартов в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.19.desc: "Пивовары #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#! [target_location.GetName] согласовали и утвердили строгие правила производства, хранения и продажи местного пива. Теперь посетители таверн крайне лестно отзываются о качестве пенного напитка, а купцы довольствуются его исправными поставками. Благодаря грамотному подходу ремесленники не только принесли известность [target_location.Custom('LR_ACC')|l], но и внесли свой вклад в порядок и процветание окрестных земель."
 town_rights_events.19.a: "Внедрим эти стандарты на всех пивоварнях [target_location.Custom('LR_GEN')|l]."
 town_rights_events.19.b: "Эти успехи несомненно поспособствуют развитию [ROOT.GetCountry.Custom('rank_ru_ACC')|l]"
 town_rights_events.19.c: "Наши [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] высоко оценят эти достижения."
 town_rights_events.20.title: "Пивоварни [target_location.Custom('LR_GEN)|l] [target_location.GetNameWithNoTooltip] истощают запасы зерна"
 town_rights_events.20.desc: "Нам стало известно, что пивоварни [target_location.Custom('LR_GEN)|l] [target_location.GetNameWithNoTooltip] потребляют слишком много зерна. Местные жители жалуются на пустующие амбары и опасаются, что запасы продовольствия попросту растрачиваются в угоду предпринимателям. При этом людей волнует не столько торговля, сколько неправильная расстановка приоритетов со стороны правительства."
 town_rights_events.20.a: "Попытаемся восполнить дефицит, пока он не привёл к голоду."
 town_rights_events.20.b: "Пусть жалуются. Торговые интересы важнее."
 town_rights_events.20.c: "Столь неумелым руководством [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] навлекают позор и на себя, и на всю нашу державу."
 town_rights_events.21.title: "Новые методы кладки в [target_location.Custom('LR_PREP)|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.21.desc: "Строители и камнетёсы из [target_location.Custom('LR_GEN)|l] [target_location.GetName] представили улучшенную технику #TOOLTIP:GOODS,masonry,X #L каменной кладки#!#!. Благодаря их наработкам наши сооружения станут заметно крепче, сроки строительства сократятся, а провинция [target_province.GetName] вскоре преобразится за счёт новых каменных построек. Возможно, именно с применения этих технологий начнётся новая эпоха для нашей архитектуры."
 town_rights_events.21.a: "Внедрим эти методы на всех стройках [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
 town_rights_events.21.b: "Пусть провинция [target_province.GetNameWithNoTooltip] станет центром нашего зодчества."
 town_rights_events.21.c: "Вложим средства в дальнейшее развитие #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_GEN')|l]#!#!."
 town_rights_events.22.title: "Сложности с добычей камня в [target_location.Custom('LR_PREP)|l] [target_location.GetNameWithNoTooltip]"
 town_rights_events.22.desc: "Добыча #TOOLTIP:GOODS,stone,X камня#!, которым вымощены наши города, — тяжелейший труд. Это вызывает сложности с работой на каменных карьерах вблизи [target_location.Custom('LR_GEN)|l] [target_location.GetName]: горняки часто трудятся до изнеможения, и столь тяжёлые условия труда ожидаемо вызывают у них недовольство. Добыча пока продолжается, однако жалобы работников уже сложно игнорировать. Если ничего не предпринять, в скором времени каменоломни могут попросту прекратить работу."
 town_rights_events.22.a: "Облегчим условия труда и позволим горнякам работать посменно."
 town_rights_events.22.b: "Не будем обращать внимания на жалобы."
 town_rights_events.22.c: "Все жители провинции должны разделить это бремя."
 relief_effort_reduces_strain_on_the_workforce_tt: "Выделенные [Concept('gold', 'средства')|e] позволят временно снизить нагрузку на рабочих"
