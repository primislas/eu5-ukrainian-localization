l_russian:
  regencies.1.title: "Коронація регента"
  regencies.1.desc: "[target_previous_ruler.GetName] передчасно [Select_CString(target_previous_ruler.IsFemale,'померла', 'помер')], і тепер [ROOT.GetCountry.Custom('rank_ru_INST')|l] керує регент, доки не буде знайдено гідного спадкоємця. За #L [ROOT.GetCountry.GetAdjective|l]ими#! законами [target_character.GetName] не [Select_CString(target_character.IsFemale,'повинна', 'повинен')] стати [Select_CString(target_character.IsFemale,'правителькою', 'правителем')], але [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] люблять і підтримують [Select_CString(target_character.IsFemale,'її', 'його')].\n\nПриродно, така амбітна особистість, як [target_character.GetShortNameWithNoTooltip], дуже хоче взяти владу у свої руки. Але вирішувати, [Select_CString(target_character.IsFemale,'гідна', 'гідний')] чи [Select_CString(target_character.IsFemale,'вона', 'він')] правити, буде [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]."
  regencies.1.a: "Чудова ідея!"
  regencies.1.a.japanese.tt: "Це дозволить нам покінчити з пануванням династії [target_previous_ruler.GetDynasty.GetName] та змінити ідентичність нашої країни."
  regencies.1.founds_dynasty_tt: "Створює нову [Concept('dynasty', 'династію')|e] у [THIS.GetCharacter.GetLocation.Custom('LR_PREP')|l] [THIS.GetCharacter.GetLocation.GetName]"
  regencies.1.a.japanese_imperial_family.tt: "Ми більше не будемо членами #TOOLTIP:GOVERNMENT_REFORM,japanese_imperial_family,X #L японського імператорського дому#!#!"
  regencies.1.b: "Краще цього уникнути!"
  regencies.1.c: "[target_previous_ruler.GetShortNameWithNoTooltip] [Select_CString(target_previous_ruler.IsFemale,'залишила', 'залишив')] заповіт, згідно з яким [target_character.GetShortNameWithNoTooltip] — [Select_CString(target_previous_ruler.IsFemale,'її', 'його')] законна дитина."
  regencies.2.title: "Без образ"
  regencies.2.desc: "[ROOT.GetCountry.GetGovernment.GetHeir.GetName] добре [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'освічена', 'освічений')] та має природну чарівність, що робить [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'її', 'його')] більш ніж підходящим претендентом на трон. Однак [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] не найкращим чином керує #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_INST')|L]#!#!, знижуючи [Concept('stability', 'стабільність')|e]. Правити країною — справа складна і тонка, немов збирати троянди, не торкаючись шипів. Іноді людина просто не має належного таланту. Може, один із таких шипів послужить нам добру службу…"
  regencies.2.a: "Ми повинні забезпечити [Concept('stability', 'стабільність')|e] [ROOT.GetCountry.Custom('CL_GEN')], чого б це не коштувало."
  regencies.3.title: "З'явись хоч тінню"
  regencies.3.desc: "Переживши спробу замаху, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] надмірно [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'занепокоїлася', 'занепокоївся')] заходами обережності, хоча деякі відгукуються про [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'її', 'його')] поведінку куди більш різко. [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'Вона почала', 'Він почав')] уникати зборів, переклавши управління країною на інших радників.\n[Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'Її', 'Його')] кричуща безвідповідальність породила багато підозр при дворі. Але основною причиною, через яку [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'втратила', 'втратив')] загальну повагу, стала [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'її', 'його')] дивна поведінка. Втупившись почервонілими очима в темряву, [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'вона', 'він')] не спить цілими ночами, бурмоче, що ніколи не залишить трон, і молить когось з'явитися до [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'неї', 'нього')] хоч тінню, хоч видінням сонним."
  regencies.3.a: "Потрібно якнайшвидше покласти цьому край."
  regencies.3.c: "Загалом це не так погано."
  regencies.4.title: "Хоч видінням сонним"
  regencies.4.desc: "[ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] приносить нашому народу лише горе. Після невдалої спроби двору покласти цьому край [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'її', 'його')] параноїдальні нахили лише посилилися, і розум потьмарився сильніше, ніж раніше. Після суворого допиту найближчих радників [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'почала', 'почав')] без попередження навідуватися до їхніх покоїв у супроводі [ROOT.GetCountry.GetGovernment.GetAdjective|l]их стражників. Радники намагалися з'ясувати, чому їх обшукують, але [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] лише суворо відповідає: «Так треба»."
  regencies.4.a: "У нас не залишилося вибору."
  regencies.5.title: "Злокозний розум"
  regencies.5.desc: "Золото небезпечне, адже перед його вабливим блиском неможливо встояти. Воно мерехтить у темряві, приваблюючи невдалих дурнів. Монети підступно блищать, немов очі демона. [target_character.GetName] також [Select_CString(target_character.IsFemale, 'піддалася', 'піддався' )] цій згубній напасті — відчайдушно бажаючи примножити свої багатства, [Select_CString(target_character.IsFemale, 'вона', 'він' )] без упину обшукує кишені та шухляди. Може, [Select_CString(target_character.IsFemale, 'вона', 'він' )] сподівається здобути дар Мідаса і перетворювати на золото все, до чого торкається?\n\nТим часом наш народ страждає і поринає у відчай. Люди голодують і молять про допомогу."
  regencies.5.a: "Не можна допустити, щоб [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'зруйнувала', 'зруйнував' )] країну."
  regencies.5.c: "Вже занадто пізно!"
  regencies.6.title: "Пошук скарбів"
  regencies.6.desc: "Невинні жарти, легковажні фрази та нешкідливі натяки переросли у злісні посмішки, дошкульні висловлювання та жорстокі накази.\nВесь палац знав, що [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] занадто [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'звикла', 'звик')] до влади, але мало хто міг припустити, що [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'вона', 'він')] зайде так далеко заради того, щоб її утримати. Відгукнувшись на пропозицію відшукати цінні скарби в підземеллях, [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'наша законна спадкоємиця', 'наш законний спадкоємець')] [ROOT.GetCountry.GetGovernment.GetHeir.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'була кинута', 'був кинутий')] до темниці."
  regencies.6.a: "Чутки розповзаються по всій країні."
  regencies.7.title: "Славні дні"
  regencies.7.desc: "Іноді надію можна знайти там, де її зовсім не чекаєш. Прийнявши на себе обов'язки регента, [ROOT.GetCountry.GetGovernment.GetActiveRegent.GetName] одразу [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'показала', 'показав')] себе [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'чудовою правителькою', 'чудовим правителем')]. [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'Вона', 'Він')] завжди чуйно ставиться до потреб людей, і деякі навіть заявляють, що країна тільки розквітне, якщо [Select_CString(ROOT.GetCountry.GetGovernment.GetActiveRegent.IsFemale,'вона', 'він')] залишиться при владі трохи довше…\n\n[ROOT.GetCountry.GetGovernment.GetHeir.GetName] скоро досягне відповідного віку, тож ці надії навряд чи виправдаються. Щоправда, [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'її', 'його')] дурні витівки доводять вчителів до шаленства, і багато хто вже покинув двір, так і не зумівши переконати [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'її', 'його')] взятися за розум."
  regencies.7.a: "Гадаю, це можна якось вирішити…"
  regencies.7.b: "[Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale.IsFemale,'Вона', 'Він')] не [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'перша нікчемна спадкоємиця', 'перший нікчемний спадкоємець')]."