l_russian:
  primasgermaniae.1.title: "Примас Німеччини"
  primasgermaniae.1.desc: "Починаючи з X століття [target_country.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! носить почесний титул #TOOLTIP:GOVERNMENT_REFORM,primas_germaniae,X #L примаса Німеччини#!#! — тобто це головний #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! [target_country.GetGovernment.GetRulerTitle|l] в усій #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!.\n\nВолодіння таким високим званням, зрозуміло, викликає заздрість з боку інших князів імперії… [Select_CString(home_ruler.IsFemale, 'Наша правителька', 'Наш правитель')], [home_ruler.GetName], [Select_CString(home_ruler.IsFemale, 'повинна бути уважна й обережна', 'повинен бути уважний й обережний')], а також не розгубити весь престиж, інакше титул вислизне у нас із рук!"
  primasgermaniae.1.a: "Ясно…"
  primasgermaniae.2.title: "Суперечка щодо титулу примаса Німеччини"
  primasgermaniae.2.desc: "[target_country.GetGovernment.GetRulerTitle], більша частина #TOOLTIP:RELIGION,$catholic_tt$,X #L католицького#!#! світу, схоже, втратила віру в нас! Ходять навіть чутки, що інше архієпископство будує плани на наш титул #TOOLTIP:GOVERNMENT_REFORM,primas_germaniae,X #L примаса Німеччини#!#!!"
  primasgermaniae.2.a: "Можливо, це просто чутки."
  primasgermaniae.3.title: "Примас Німеччини"
  primasgermaniae.3.desc: "#TOOLTIP:GOVERNMENT_REFORM,primas_germaniae,X #L Примас Німеччини#!#! — головний #TOOLTIP:RELIGION,$catholic_tt$,X #L католицький#!#! [target_country.GetGovernment.GetRulerTitle|l] в усій #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!. Цей титул з'явився в X столітті, коли папа римський присвоїв його архієпископу Майнца.\n\nСама думка про те, що така жалюгідна країна, як [original_prime.GetLongName], може носити такий почесний титул, є образою #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L католицької церкви#!#!. Можливо, знайдеться більш гідний кандидат?"
  primasgermaniae.3.a: "Може бути… це я?"
  opinion_accepted_primas_germaniae: "Прийнято титул примаса Німеччини"
  primasgermaniae.3.b: "Нехай усе залишиться як є. Поки що…"
  opinion_supported_primas_germaniae: "Надано підтримку тому, кого призначили новим примасом Німеччини"
  primasgermaniae.4.title: "Втрата титулу примаса Німеччини"
  primasgermaniae.4.desc: "[original_prime.GetGovernment.GetRulerTitle], ми втратили почесний титул #TOOLTIP:GOVERNMENT_REFORM,primas_germaniae,X #L примаса Німеччини#!#!. Скориставшись нашою низькою репутацією в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!, інший архієпископ — [new_primae.GetGovernment.GetRuler.GetName] з #ONCLICK:COUNTRY,[new_primae.Custom('CL_tt')] #TOOLTIP:COUNTRY,[new_primae.Custom('CL_tt')],X [new_primae.Custom('CL_GEN')|L]#!#!, — [Select_CString(new_primae.GetGovernment.GetRuler.IsFemale, 'пред'явила', 'пред'явив')] права на цей титул!"
  primasgermaniae.4.a: "Ну що ж, привітайте його…"
  opinion_congratulated_new_primas_germaniae: "Привітання для нового примаса Німеччини"
  primasgermaniae.4.b: "Ми цього не забудемо!"
  opinion_lost_primas_germaniae: "Відмова підтримати того, кого призначили новим примасом Німеччини"
  primasgermaniae.6.title: "[pope_country.GetGovernment.GetRulerTitle] надсилає звістку"
  primasgermaniae.6.desc: "Гарні новини! [pope_country.GetGovernment.GetRulerTitle] [Select_CString(new_primae.GetGovernment.GetRuler.IsFemale, 'вирішила', 'вирішив')] удостоїти нас почесного титулу після того, як його колишній володар втратив прихильність Святого Престолу. #TOOLTIP:GOVERNMENT_REFORM,primas_germaniae,X #L Примас Німеччини#!#! вважається найголовнішим #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьким#!# архієпископом у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!."
  primasgermaniae.6.a: "Ми з радістю приймемо цей титул."
  primasgermaniae.6.b: "Ми повинні з вдячністю відмовитися."
  opinion_declined_primas_germaniae: "Відмова прийняти титул примаса Німеччини"