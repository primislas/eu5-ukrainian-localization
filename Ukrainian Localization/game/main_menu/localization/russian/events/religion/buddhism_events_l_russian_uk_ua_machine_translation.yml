l_russian:
  buddhism_events.1.title: "Міністр залишає посаду"
  buddhism_events.1.desc: "[target_minister.GetName] публічно [Select_CString(SCOPE.sCharacter('target_minister').IsFemale, 'засудила', 'засудив')] політику, яку проводять [target_ruler.GetName] та [target_ruler.GetHerHis] уряд. [target_minister.GetSheHe|U] заявляє, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'нездатна', 'нездатний')] забезпечити верховенство закону, незмінно збере навколо себе в уряді лише шахраїв та донощиків і що якщо ми не виправимося найближчим часом, то [target_minister.GetSheHe] не бажає мати з нами нічого спільного."
  buddhism_events.1.a: "Скатертиною дорога!"
  buddhism_events.1.b: "Скористаємося [target_minister.GetHerHis] порадами, щоб наша [ROOT.GetCountry.GetFlavorRank|l] стала кращою."
  buddhism_events.2.title: "Чернечі ордени агітують населення"
  buddhism_events.2.desc: "Як [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] зобов'язується захищати чернечі товариства, так і ці товариства зобов'язані захищати країну від недбалих правителів. Вони вважають, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] недостатньо уважно ставиться до своїх обов'язків і не може або не хоче правити в інтересах суспільства та особливо чернечих товариств. Тому кілька великих монастирів відкрито виступили зі звинуваченнями на адресу правителя та налаштували проти н[target_character.GetHerHis] громадську думку."
  buddhism_events.2.a: "Це обурливо!"
  buddhism_events.2.a.tt: "[ShowPopTypeName('peasants')] втратять [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'вдоволення')|e] в тих [Concept('locations', 'місцевостях')|e], де обурюються [ShowPopTypeName('clergy')|l]"
  buddhism_events.2.b: "Підемо для них на поступки."
  buddhism_events.2.c: "Вирішимо питання «іншими» способами."
  buddhism_events.3.title: "[target_ruler.GetNameWithNoTooltip] і прецедент"
  buddhism_events.3.desc: "[target_ruler.GetName] завжди [Select_CString(target_ruler.IsFemale, 'відзначалася', 'відзначався')] розсудливістю та поміркованістю у своїх рішеннях. У нещодавно написаному доповненні до [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого зведення законів одне з [Select_CString(target_ruler.IsFemale, 'її', 'його')] нещодавніх рішень було названо настільки виваженим та аргументованим, що його можна вважати прикладом для вирішення інших подібних питань. [target_ruler.GetNameWithNoTooltip] [Select_CString(target_ruler.IsFemale, 'стала відома', 'став відомий')] своїм суворим і невідступним дотриманням Дасавідха-раджадхамми — десяти заповідей буддистських королів #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ої#! віри — і тому [Select_CString(target_ruler.IsFemale, 'її', 'його')] рішення вже не вперше стають прикладом розсудливості для всіх."
  buddhism_events.3.a: "Не вперше і не востаннє."
  buddhism_events.4.title: "Жахи війни"
  buddhism_events.4.desc: "Не всі люди народжені для військової слави, і частина наших підданих усвідомила це в ході конфлікту, де загрузла наша країна. Кількість дезертирів, що шукають притулку в стінах монастирів, невелика, але вони подають іншим небезпечний приклад. [ROOT.GetCountry.GetFlavorRank] це праведна #L [ROOT.GetCountry.GetReligion.GetAdjective|l]а#! країна, і наш обов'язок — охороняти монастирі. Однак скільки ми не попереджали настоятелів не переховувати дезертирів, деякі все ще це роблять."
  buddhism_events.4.a: "Не можна забувати про поміркованість."
  buddhism_events.4.b: "Вимагатимемо, щоб монастирі видали нам цих «ченців»."
  buddhism_events.5.title: "Багатий урожай"
  buddhism_events.5.desc: "Урожай цього року видався особливо багатим. Ми могли б витратити це несподіване багатство на будівництво запланованих культових споруд. Хтось запропонував новий податок, який допоможе перетворити надлишки зерна у селян на дохід скарбниці. Однак стародавні #L [ROOT.GetCountry.GetReligion.GetAdjective|l]і#! тексти забороняють нам своїми діями утискати населення, деякі з наших міністрів не хочуть обтяжувати народ зайвими податками."
  buddhism_events.5.a: "Введемо податок."
  buddhism_events.5.b: "Ми не станемо відбирати у них плоди їхньої праці."
  buddhism_events.6.title: "Дана"
  buddhism_events.6.desc: "У часи, подібні нинішнім, коли наша країна насолоджується відносним спокоєм, нам слід звернути погляди до найуразливіших з нас. Урожаї останнім часом були не надто багатими, але й не надто бідними, тому наші піддані не голодують, а в казенних засіках достатньо зерна. І все ж є серед нас ті, кому не вистачає їжі прогодувати себе. У такий час нам потрібно пам'ятати про дану — милосердя та подаяння, яких вимагають від віруючих #L [ROOT.GetCountry.GetReligion.GetAdjective|l]і#! вчення."
  buddhism_events.6.a: "Нагодуємо бідних зерном!"
  STATIC_MODIFIER_NAME_grain_for_the_poor: "Зерно для бідних"
  STATIC_MODIFIER_DESC_grain_for_the_poor: "Ми роздаємо надлишки зерна, щоб ніхто в наших землях не страждав від голоду."
  buddhism_events.6.b: "Залишимо зерно в засіках."
  STATIC_MODIFIER_NAME_food_reserves: "Запаси зерна"
  STATIC_MODIFIER_DESC_food_reserves: "Наші багаті запаси зерна — основа стабільності нашої країни."
  buddhism_events.7.title: "Паріккаґа"
  buddhism_events.7.desc: "У час, коли наша країна веде війну, а вояки б'ються на полях битв, багато хто з нас чекає, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] покаже себе як доброчесного правителя. Наша релігія, [ROOT.GetCountry.GetReligion.GetName|l], проповідує серед інших паріккаґу, чесноту самопожертви. Багато хто вважає, що [target_ruler.GetName] [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'повинна', 'повинен')] розділити тягар війни разом зі своїми воїнами та відправитися в бій, навіть ціною власної безпеки.\n\nІнші стверджують, що практикуючий паріккаґу не піддає своє життя непотрібній небезпеці, але остерігається ставити свої інтереси понад усе і що безпека правителя не тільки не суперечить [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]им догмам, а навпаки, важлива для збереження нашої країни."
  buddhism_events.7.a: "[target_ruler.GetSheHe|U] [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'повинна', 'повинен')] показати свою доброчесність ділом."
  buddhism_events.7.b: "Сенс самопожертви не в цьому."
  buddhism_events.8.title: "Тапа"
  buddhism_events.8.desc: "Останнім часом [target_ruler.GetName] [Select_CString(SCOPE.sCharacter('minister').IsFemale, 'потрапила', 'потрапив')] під вогонь критики незадоволених надмірною розкішшю та марнотратством [target_ruler.GetHerHis] правління. Втім, інші придворні вважають, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] потребує певної розкоші, особливо коли приймає іноземних правителів та їхніх посланців."
  buddhism_events.8.a: "Геть мирські брязкальця!"
  buddhism_events.8.b: "Ми вам хто, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l]?"
  buddhism_events.9.title: "Спадщина"
  buddhism_events.9.desc: "Один відомий #TOOLTIP:BUILDING_TYPE,monastery,X #L монастир#!#! #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! став місцем конфлікту після смерті ченця з багатої мирської родини. Предметом суперечки стали дорогі манускрипти та зображення Будди, які зберігалися в його покоях. Взагалі чернець не може володіти майном, але закон все одно дозволяє його вірному послідовнику успадковувати предмети покійного на правах його сина. У нашому випадку монастир згадує про якогось послушника, який доглядав за багатим ченцем до його останніх днів.\n\nВтім, на спадщину є й інші претенденти, та й сам монастир забажав зберегти предмети у себе і висловив надію на нашу підтримку в цій суперечці. Мирські родичі ченця також звернулися до нашого двору в очікуванні отримати не тільки манускрипти та зображення, а й частину земель, які монастир набув як пожертвування, коли покійний до нього приєднався."
  buddhism_events.9.a: "Присудимо спадщину послушнику."
  buddhism_events.9.b: "Спадщина дістанеться монастирю."
  buddhism_events.9.c: "Підтримаємо родину ченця."
  buddhism_events.10.title: "[target_ruler.GetNameWithNoTooltip|U] отримує образу від іноземного посла"
  buddhism_events.10.desc: "[target_country.GetLongName] — батьківщина послів, чий недавній візит обернувся скандалом після того, як іноземний посланець відмовився взяти участь в організованій з цієї нагоди церемонії і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] сприйняв це як образу. [target_ruler.GetName] у гніві, і, хоча складно сказати напевно, чи був жест посланця навмисним, суспільство впевнене в тому, що це не випадковість.\n\nЯкщо ми публічно не засудимо вчинок посла, то ризикуємо втратити обличчя. Але [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] закликає не рубати з плеча."
  buddhism_events.10.a: "Піддамо посла публічному осміянню."
  buddhism_events.10.b: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] ніколи не [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'повинна', 'повинен')] втрачати самовладання."
  buddhism_events.11.title: "Закони [ROOT.GetCountry.Custom('CL_GEN')]"
  buddhism_events.11.desc: "У багатьох #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійських#!#! країнах у тій чи іншій формі практикується буддійське право. Закони, що його складають, не є загальними і дещо різняться від країни до країни, і іноді їх упорядковують та оновлюють. Нещодавно таку роботу виконали влада #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, і в підсумку ми отримали сучасну версію зведення найпоширеніших у нашій країні правил.\n\nВ основі цього зведення лежать реальні справи, тож його можна вважати цілком сучасною оцінкою рішень, які приймає [target_ruler.GetName]."
  buddhism_events.11.a: "Чудово! Ці закони потрібно впроваджувати."
  buddhism_events.11.a.tt1: "Оскільки [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'була', 'був')] не завжди [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'справедлива', 'справедливий')] до своїх підданих, у цьому зводі законів [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] рішення оцінюються негативно, що призведе до падіння нашого [Concept('prestige', 'престижу')|e]."
  buddhism_events.11.a.tt2: "Оскільки [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'була', 'був')] загалом [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'справедлива', 'справедливий')] до своїх підданих, у цьому зводі законів [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] рішення оцінюються позитивно, що призведе до зростання нашого [Concept('prestige', 'престижу')|e]."
  buddhism_events.11.a.tt3: "Оскільки [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'була', 'був')] взірцем справедливості щодо своїх підданих, у цьому зводі законів [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] рішення оцінюються вельми позитивно, і це призведе до зростання нашого [Concept('prestige', 'престижу')|e]."
  buddhism_events.11.a.tt4: "Оскільки [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'наша', 'наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'була', 'був')] відверто [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'несправедлива', 'несправедливий')] до своїх підданих, у цьому зводі законів [ROOT.GetCountry.GetGovernment.GetRuler.GetHerHis] рішення оцінюються різко негативно, що сильно зашкодить нашому [Concept('prestige', 'престижу')|e]."
  buddhism_events.11.b: "Давайте постараємося не допустити його поширення."
  buddhism_events.12.title: "Розбрат серед юристів"
  buddhism_events.12.desc: "Буває, що юристи роблять ставки на результат справи, а про товариське суперництво між правозаступниками в залі суду годі й казати. Але коли таке суперництво переростає в справжню ворожнечу, жертвою може стати сама справедливість.\n\nПід час недавньої судової справи, сторонами в якій виступали #TOOLTIP:BUILDING_TYPE,monastery,X #L монастир#!#!#! та [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] з однієї впливової родини, простий правовий спір про велике маєток переріс у запекле протистояння. Дуже сумно, що тепер рятувати обличчя обох сторін, намагаючись при цьому не попрати наших законів, буде [ROOT.GetCountry.GetGovernment.GetCourtTitle|l]."
  buddhism_events.12.a: "Потребуємо повторного суду з іншими адвокатами."
  buddhism_events.12.b: "Перемога дістанеться монастирю."
  buddhism_events.12.c: "Приймемо рішення, від якого виграють [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  buddhism_events.13.title: "Корисний союз?"
  buddhism_events.13.desc: "Минуло чимало років відтоді, як [GetCharacter('kublai_khan').GetName] [Select_CString(GetCharacter('kublai_khan').IsFemale,'прийняла', 'прийняв')] #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! і [Select_CString(GetCharacter('kublai_khan').IsFemale,'вирішила', 'вирішив')] поширити це вчення серед свого народу. Втім, з часом більшість його підданих вирішила повернутися до старої віри — [ROOT.GetCountry.GetReligion.GetName|l]. [target_ruler.GetName] завжди [Select_CString(target_ruler.IsFemale,'захоплювалася', 'захоплювався')] спадщиною стародавніх правителів, таких як Великий $rank_kingdom_horde_ruler_suffix_male$, і могутніми країнами, які ці правителі колись побудували в ім'я своєї релігії. Коли до нас дійшли чутки про активний і зростаючий #TOOLTIP:CULTUREGROUP,tibetan_group,X #L тибетський#!#! орден, [Select_CString(target_ruler.IsFemale,'вона вирішила', 'він вирішив')] будь-що з ним зв'язатися.\n\nІ ось перед нами стоїть посланець від лами і розповідає, що [target_ruler.GetNameWithNoTooltip] — це реінкарнація Хубілая. Орден готовий підтримати нашу владу, якщо ми дозволимо йому поширювати його напрямок у всіх підвладних нам землях."
  buddhism_events.13.a: "Настав час змін."
  buddhism_events.13.b: "Краще ми залишимося вірні старій вірі."
  buddhism_events.14.title: "Ідоли"
  buddhism_events.14.desc: "Перехід країни від #TOOLTIP:RELIGIONGROUP,pagan_group,X #L язичництва#!#! до #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизму#!#! трапляється не відразу, і багато людей на наших землях досі моляться старим богам. Однак, прагнучи поширювати свою релігію, перші лами нашої країни засудили істуканів, яким все ще поклоняється простолюд, і вимагали їх знищити."
  buddhism_events.14.a: "Спалити їх усі!"
  STATIC_MODIFIER_NAME_destruction_of_idols: "Знищення ідолів"
  STATIC_MODIFIER_DESC_destruction_of_idols: "Масове знищення язичницьких ідолів у нашій країні аж ніяк не привабить на наш бік переконаних прихильників старої віри, але в результаті народ почав куди охочіше переходити в нову, хоча в щирості деяких новонавернених можна і сумніватися."
  buddhism_events.14.b: "Нічого, з часом звикнуть…"
  buddhism_events.15.title: "Сайлан"
  buddhism_events.15.desc: "На острові #TOOLTIP:AREA,sailan_area,X #L Сайлан#!#!, який нещодавно завоювали наші війська, дуже багато багатих #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійських#!#! монастирів, і місцеве суспільство, схоже, перебуває під владою ченців. Коли [target_ruler.GetName] нарешті [Select_CString(target_ruler.IsFemale,'вшанувала', 'вшанував')] острів своїм візитом, [Select_CString(target_ruler.IsFemale,'вона залишилася', 'він залишився')] у захваті від економічного та культурного багатства місцевих чернечих орденів."
  buddhism_events.15.a: "Все це має стати частиною нашої культури!"
  buddhism_events.15.b: "Розграбувати монастирі!"
  buddhism_events.15.b.tt: "Усі [Concept('pop', 'група населення')|e] у належних нам [Concept('location', 'місцевостях')|e] #TOOLTIP:AREA,sailan_area,X #L Сайлану#!#! втрачають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  buddhism_events.15.c: "Нам є чому в них повчитися."
  buddhism_events.15.c.tt: "Усі [Concept('pop', 'групи населення')|e] у належних нам [Concept('location', 'місцевостях')|e] на острові #TOOLTIP:AREA,sailan_area,X #L Сайлан#!#! отримують [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'вдоволення')|e]"
  buddhism_events.16.title: "Монастирі [ROOT.GetCountry.Custom('CL_GEN')] занепадають"
  buddhism_events.16.desc: "Поєднання низької дисципліни серед ченців та нестабільної економіки призвело до того, що громади багатьох великих монастирів #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! в останні роки почали скорочуватися. Стурбоване [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] попереджає нас, що якщо нічого не зробити, то скоро останні ченці відмовляться від обітниць або вирушать до монастирів в інших країнах, що призведе до культурного та економічного зубожіння [ROOT.GetCountry.Custom('CL_GEN')].\n\nВодночас, багато місцевих землевласників готові з радістю прибрати до рук землі порожніх монастирів. І оскільки обов'язок захищати чернечі громади [ROOT.GetCountry.Custom('CL_GEN')] несе на собі [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], численні свідки неодмінно покладуть відповідальність за будь-які наслідки подій, що розгортаються, на [target_ruler.GetHerHis] плечі."
  buddhism_events.16.a: "Монастирі потрібно рятувати!"
  buddhism_events.16.b: "Можливо, нові господарі розпорядяться землею краще."
  buddhism_events.17.title: "Ченці порушують обітниці"
  buddhism_events.17.desc: "Серед ченців #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! спостерігається падіння моралі. Монастирям бракує коштів, вищі чернечі звання зосереджені в руках тісної кліки аристократів, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'не здатна', 'не здатний')] захистити вірян, як личить справжньому #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійському#!#! правителю. Тому все більше ченців порушують свої обітниці та йдуть у світ — або залишаються в чернецтві, але не дотримуються релігійних принципів.\n\nНещодавно до наших вух дійшов особливо кричущий випадок, коли чернець зняв із себе обітницю і закликав інших до того ж. Багато хто з цікавістю стежить за нашою реакцією на ці події та зроблять висновки з нашого рішення. [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'Добра', 'Добрий')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'повинна', 'повинен')] керуватися у своїх вчинках добротою та милосердям, але при цьому [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale,'їй', 'йому')] потрібно й підтримувати благочестя в монастирях — за необхідності силою."
  buddhism_events.17.a: "Потрібно проявити милосердя."
  STATIC_MODIFIER_NAME_lacking_monastic_discipline: "Занепад моралі в монастирях"
  STATIC_MODIFIER_DESC_lacking_monastic_discipline: "У монастирях панує занепад моралі, і це шкодить духовному розвитку регіону. Світська влада повинна припиняти подібний розбрат, але, очевидно, зараз вона зі своїм завданням не справляється."
  buddhism_events.17.b: "Відберемо у заблудлих ченців усе рухоме майно та худобу."
  STATIC_MODIFIER_NAME_strict_punishment_of_monks: "Суворе покарання для ченців"
  STATIC_MODIFIER_DESC_strict_punishment_of_monks: "Щоб виправити похитнуті моральні засади в монастирях, ми встановили над ними гніт і почали карати ченців, що оступилися. Кожен чернець, викритий у зневазі обітницями та неповазі до свого ордену, заплатить країні величезну суму худобою."
  buddhism_events.17.c: "Стратити ченця та всіх, хто його підтримує!"
  STATIC_MODIFIER_NAME_cleansing_of_monasteries: "Зачистка монастирів"
  STATIC_MODIFIER_DESC_cleansing_of_monasteries: "Щоб виправити розпусту та хитання в монастирях, ми піддали провинившихся ченців вельми суворим покаранням. Сумно, що часом без таких чисток не обійтися, але ситуація потихеньку покращується."
  buddhism_events.18.title: "Монастирі [ROOT.GetCountry.Custom('CL_GEN')]"
  buddhism_events.18.desc: "Мудра та дієва політика, яку проводить [target_ruler.GetName] щодо монастирів своєї країни, завжди відзначалася продуманістю та доброчесністю. Монастирі підтримуються та рятуються від розорення, але при цьому в них підтримуються дисципліна та організація. В результаті монастир у [target_location.Custom('LR_PREP')|l] [target_location.GetName] розбагатів і став прикладом для наслідування для інших монастирів."
  buddhism_events.18.a: "Вимагатимемо, щоб вони допомагали розвивати навколишні землі."
  STATIC_MODIFIER_NAME_monasteries_blooming: "Монастирі розквітають"
  STATIC_MODIFIER_DESC_monasteries_blooming: "Мудрі рішення, які [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'ухвалила наша', 'ухвалив наш')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], позитивно позначилися на житті чернецтва. Розташований тут #TOOLTIP:BUILDING_TYPE,monastery,X #L монастир#!#! багатий, ченці дотримуються обітниць, а всі місцеві, від жебраків до багатіїв, перебувають у благоденстві."
  buddhism_events.18.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  buddhism_events.19.title: "Термінові заходи"
  buddhism_events.19.desc: "Останнім часом погода #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! не радувала, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'повинна', 'повинен')] допомагати знедоленим у важкі часи. До нас звернулася делегація землеробів і попросила, щоб [target_ruler.GetName] [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'звільнила', 'звільнив')] їх від податків і [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'наказала', 'наказав')] дати їм трирічну позику на прогодування сімей, поки вони відновлюватимуть своє господарство."
  buddhism_events.19.a: "Розумне прохання."
  STATIC_MODIFIER_NAME_wedge_throw: "Термінові заходи"
  STATIC_MODIFIER_DESC_wedge_throw: "Для хліборобів настали важкі часи. Щоб полегшити їхнє становище, ми тимчасово зменшили податки, що стягуються з них!"
  buddhism_events.19.b: "На жаль, наша скарбниця також порожня."
  STATIC_MODIFIER_NAME_poor_rice_harvests: "Низькі врожаї рису"
  STATIC_MODIFIER_DESC_poor_rice_harvests: "Для хліборобів настали важкі часи. Ми відмовилися полегшити їхнє становище і не дали їм позику, і тепер регіон кипить від ненависті до влади."
  buddhism_events.20.title: "Жертва хліборобів"
  buddhism_events.20.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] сильно бракує хорошої інфраструктури. Ченці в місцевому монастирі роблять усе, що можуть, як і місцева [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], але, якщо ми хочемо, щоб ця область процвітала, взяти участь у її розвитку доведеться і країні. Плани щодо поліпшення ситуації вимагають залучити робітників із сіл, але всі хлібороби зайняті на збиранні врожаю. Ми можемо наказати їм кинути свої справи і прийти на будівництво заради загального блага, але тоді вони очікуватимуть від нас співмірної компенсації рису, який вони могли б виростити за цей час."
  buddhism_events.20.a: "Виплатимо компенсацію."
  STATIC_MODIFIER_NAME_rice_compensation: "Компенсація рисом"
  STATIC_MODIFIER_DESC_rice_compensation: "Ми попросили місцевих хліборобів допомогти з будівництвом на цій території в обмін на відшкодування втрачених доходів."
  buddhism_events.20.b: "Залишимо проєкт."
  buddhism_events.20.c: "Вимагатимемо від хліборобів роботи без компенсації."
  STATIC_MODIFIER_NAME_forced_labor: "Примусові роботи"
  STATIC_MODIFIER_DESC_forced_labor: "Ми змусили місцевих хліборобів допомогти в будівництві на загальне благо."
  buddhism_events.1000.title: "Спіймано білого слона"
  buddhism_events.1000.desc: "У [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій глушині спіймано білого слона. Таких рідкісних тварин рідко зустрінеш у природі, тому багато хто бачить у цьому випадку доказ того, наскільки мудро [target_ruler.GetName] править країною заради загального блага."
  buddhism_events.1000.a: "Оточимо його турботою."
  buddhism_events.1000.b: "Продамо його."
  buddhism_events.1000.c: "Це буде чудовий подарунок!"
  gifted_white_elephant: "Подарований білий слон"
  buddhism_events.1001.title: "Білий слон"
  buddhism_events.1001.desc: "У [ROOT.GetCountry.GetGovernment.GetAdjective|l]ій глушині спіймано білого слона, і [target_ruler.GetName] мудро [Select_CString(SCOPE.sCharacter('target_ruler').IsFemale, 'розсудила', 'розсудив')], що це вірний знак міцного союзу між нашими народами. Це найбільший дар, який тільки міг вручити нам правитель, і наше населення напевно ставитиметься до нього з великою повагою. Щоправда, утримувати цього рідкісного звіра буде недешево — але хіба ми могли від нього відмовитися?"
  buddhism_events.1001.a: "$buddhism_events.1000.a$"
  buddhism_events.1001.b: "$buddhism_events.1000.b$"
  sold_our_elephant: "Подарований білий слон проданий"
  buddhism_events.1100.title: "Політичний суперник ослаблений"
  buddhism_events.1100.desc: "Навіть у великих правителів є хулителі. [target_character.GetName] вже давно відкрито критикує все, що робить [target_ruler.GetName], але цього разу [target_character.GetSheHe] [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'опинилася', 'опинився')] в незавидному становищі. [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'Залишена', 'Залишений')] друзями та [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'потонула', 'потонув')] у боргах, [target_character.GetSheHe] ледве зводить кінці з кінцями і насилу утримує свою сім'ю. Вибратися з такої ситуації все ще можливо, але ми можемо скористатися нею і позбутися цієї проблеми раз і назавжди."
  buddhism_events.1100.a: "Зробити так, щоб [target_character.GetSheHe] ніколи не [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'оговталася', 'оговтався')]!"
  STATIC_MODIFIER_NAME_political_rival_crushed: "Політичний суперник розчавлений"
  STATIC_MODIFIER_DESC_political_rival_crushed: "Ми вдало скористалися невдачами, що звалилися на голову нашого політичного суперника, і тепер він навряд чи знову нам завадить. Інші бачили, як ми все це провернули, і тепер двічі подумають, перш ніж ставити під сумнів нашу владу."
  buddhism_events.1100.b: "[Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'Справжня', 'Справжній')] [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не тримає образ."
  buddhism_events.1100.c: "Це привід проявити милосердя, допоможемо [target_character.GetHerHim] знову стати на ноги."
  buddhism_events.1101.title: "[Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'Стара суперниця', 'Старий суперник')] стає на ноги"
  buddhism_events.1101.desc: "Наша готовність допомогти [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'суперниці', 'супернику')], що потрапив у біду, перетворила [target_character.GetHerHis] з нашого критика на [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'прихильницю', 'прихильника')]. Відновивши свою політичну вагу, [target_character.GetSheHe] тепер пропонує знову стати на службу нашому уряду."
  buddhism_events.1101.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  buddhism_events.1102.title: "$buddhism_events.1101.title$"
  buddhism_events.1102.desc: "Наша шляхетна готовність допомогти [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'суперниці', 'супернику')], що потрапив у біду, зовсім не змінила [target_character.GetHerHis] переконань: попри своє дещо похитнуте політичне становище, [target_character.GetSheHe] як ні в чому не бувало продовжує виступати проти нашої влади та прагне всіма силами підривати роботу #L [ROOT.GetCountry.GetAdjective|l]ого#! уряду."
  buddhism_events.1102.a: "Не роби добра — не отримаєш зла…"
  buddhism_events.1102.b: "Можливо, настав час для більш постійного рішення."
  buddhism_events.1200.title: "Бажання запросити ламу"
  buddhism_events.1200.desc: "Нам потрібно запросити впливового ламу та поселити в столиці. Ставши покровителями цієї людини та її майбутніх реінкарнацій, ми створимо багатовікову спадщину для нашої династії."
  buddhism_events.1200.a: "Так і зробимо."
  buddhism_events.1200.b: "Краще не треба."
  STATIC_MODIFIER_NAME_tibetan_lama: "Лама"
  STATIC_MODIFIER_DESC_tibetan_lama: "У нашій столиці оселився впливовий лама та вступив у союз із правителями."
  buddhism_events.1201.title: "Повернувся посланець із Тибету"
  buddhism_events.1201.desc: "Наш посланець повернувся з #TOOLTIP:REGION,tibet_region,X #L Тибету#!#! з новинами про впливового релігійного лідера, який зацікавився справою, що просувають [target_ruler.GetName] та [target_ruler.GetHerHis] династія. Але перш ніж він з'явиться в місті [ROOT.GetCountry.GetCapital.GetName], ми повинні будемо не просто гарантувати його безпеку. Щоб лама пов'язав свою долю з нами, ми повинні поклястися, що йому та його майбутнім інкарнаціям у нашій країні буде надаватися належна шана та повага, і що ми побудуємо для нього та його послідовників #TOOLTIP:BUILDING_TYPE,tibetan_great_monastery,X #L великий тибетський монастир#!#!#!. Якщо ми не зможемо дати йому такі гарантії, нам доведеться задовольнитися візитом делегації ченців, які організують своє суспільство в наших землях."
  buddhism_events.1201.a: "Ми згодні."
  buddhism_events.1201.b: "Ми приймемо ченців."
  STATIC_MODIFIER_NAME_influx_of_tibetan_monks: "Приплив тибетських ченців"
  STATIC_MODIFIER_DESC_influx_of_tibetan_monks: "Сюди прибула група тибетських ченців з метою поширювати #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизм#!#! в усіх куточках країни."
  buddhism_events.1202.title: "Смерть лами"
  buddhism_events.1202.desc: "[Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'Наша шанована та благочестива', 'Наш шанований та благочестивий')] лама [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'померла', 'помер')], і пошуки [target_character.GetHerHis] реінкарнації вже почалися. Хоча [target_character.GetHerHis] орден впевнений, що пошуки нового втілення лами не займуть багато часу, можливо, країні слід допомогти їм, проспонсорувавши експедицію."
  buddhism_events.1202.a: "Давайте їм допоможемо."
  buddhism_events.1202.b: "Вони впораються самі."
  buddhism_events.1203.title: "Реінкарнацію виявлено"
  buddhism_events.1203.desc: "Орден [Select_CString(SCOPE.sCharacter('target_character').IsFemale, 'нашої верховної', 'нашого верховного')] лами зумів знайти [target_character.GetHerHis] нове втілення та доставив [target_character.GetHerHis] до їхнього #TOOLTIP:BUILDING_TYPE,tibetan_great_monastery,X #L великого тибетського монастиря#!#!#!."
  buddhism_events.1203.a: "Довгих [target_character.GetHerHim] років життя."
  buddhism_events.1204.title: "Сумніви в істинності реінкарнації"
  buddhism_events.1204.desc: "Тонкощі переродження часом виявляються вищими за розуміння простих людей. Хоча орден лами наполягає на тому, що їхній новий лідер — реінкарнація старого, деякі сільські жителі не горять бажанням прийняти цей факт. Вони не визнають нового ламу, боячись обману, і подекуди протести навіть переросли у збройні конфлікти."
  buddhism_events.1204.a: "Нехай їх переконають наші посли."
  buddhism_events.1204.b: "Нехай їх переконають наші війська."
  buddhism_events.1300.title: "Духовне керівництво"
  buddhism_events.1300.desc: "Острів #TOOLTIP:AREA,sailan_area,X #L Сайлан#!#! багато століть був місцем, де була сильна #TOOLTIP:RELIGION,$theravada_tt$,X #L тхеравадська#!#! традиція #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддизму#!#!. У багатьох аспектах це ідеальна модель тхеравадської країни, а місцеві процвітаючі чернечі громади — приклад для всього буддійського світу.\n\nХоча в нашій країні теж переважають принципи тхеравади, наші закони та традиції — це просто поєднання місцевих порядків та ідей з інших буддистських шкіл. Крім того, у нас немає такої розвиненої системи монастирів, як на острові. Деякі пропонують вирішити це питання, відправивши на Сайлан наших послів з метою залучення ченців, які зможуть принести в нашу країну свої тхеравадські звичаї."
  buddhism_events.1300.a: "Відправимо до них посольство."
  buddhism_events.1300.b: "Ні, краще підтримаємо місцеві громади!"
  STATIC_MODIFIER_NAME_supporting_local_monastic_traditions: "Підтримка місцевих чернечих традицій"
  buddhism_events.1301.title: "Посольство з [target_origin_country.Custom('CL_GEN')]"
  buddhism_events.1301.desc: "Багаті чернечі громади, святі реліквії та давні традиції співіснування чернецтва та монаршої влади — все це робить нас прикладом для багатьох #TOOLTIP:RELIGION,$theravada_tt$,X #L тхеравадських#!#! правителів. Не дивно, що [target_origin_country.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[target_origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_origin_country.Custom('CL_tt')],X [target_origin_country.Custom('CL_GEN')|L]#!#! наслідує нашу велич. Прибуле до нас сьогодні [target_origin_country.GetAdjectiveWithNoTooltip|l]е посольство просить дозволити групі їхніх ченців вирушити в подорож нашими землями та отримати тут висвячення, щоб вони могли принести наші традиції на територію [rivalling_country.Custom('CL_GEN')]."
  buddhism_events.1301.a: "Дозволимо це."
  lankan_monks_sent: "Обмін #TOOLTIP:RELIGION,$theravada_tt$,X #L тхеравадськими#!#! ченцями"
  buddhism_events.1301.b: "Цьому не бувати!"
  no_lankan_monks_sent: "Ченцям відмовлено в навчанні"
  buddhism_events.1302.title: "[target_country.GetAdjectiveWithNoTooltip|U]а відповідь"
  buddhism_events.1302.desc: "[target_country.GetGovernment.GetRulerTitle|U] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! дозволив 40 ченцям отримати висвячення в [target_ruler.GetHerHis] країні. [target_ruler.GetSheHe|U] також відправив групу ченців прямо зі своїх земель до наших для розумного обміну #TOOLTIP:RELIGION,$theravada_tt$,X #L тхеравадськими#!#! традиціями."
  buddhism_events.1302.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_monks_from_ceylon: "#TOOLTIP:AREA,sailan_area,X #L Сайланський#!#! вплив"
  STATIC_MODIFIER_DESC_monks_from_ceylon: "Ми багато чого навчилися у країн #TOOLTIP:AREA,sailan_area,X #L Сайлану#!#! та розташованих там чернечих орденів. Це дозволило нам перейняти поширені на острові престижні традиції #TOOLTIP:RELIGION,$theravada_tt$,X #L тхеравадської#!#! школи."
  buddhism_events.1303.title: "[target_country.GetAdjectiveWithNoTooltip|U]а відповідь"
  buddhism_events.1303.desc: "[target_country.GetGovernment.GetRulerTitle] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!# [Select_CString(target_ruler.IsFemale,'повідомила', 'повідомив')], що [Select_CString(target_ruler.IsFemale,'вона', 'він')] не дозволить нашим ченцям вивчати #TOOLTIP:RELIGIONGROUP,buddhist,X #L буддійські#!#! традиції острова #TOOLTIP:AREA,sailan_area,X #L Сайлан#!#!, а також не стане будь-яким іншим способом допомагати нам розвивати свої релігійні інститути."
  buddhism_events.1303.a: "[ROOT.GetCountry.Custom('common_string_ok')]"