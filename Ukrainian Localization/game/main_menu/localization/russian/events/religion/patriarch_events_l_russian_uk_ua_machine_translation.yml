l_russian:
  patriarch_events.1.title: "Святі з провінції [local_saint_state_province.GetProvince.GetNameWithNoTooltip]"
  patriarch_events.1.desc: "У нас виникла невизначеність у духовних питаннях, пов'язана з провінцією [local_saint_state_province.GetProvince.GetName]. Хоча у нас з її жителями спільна віра, багато з них, включно зі священниками, відмовляються шанувати місцевошанованих святих нашої країни, вважаючи їх неканонічними. Замість цього вони дотримуються релігійних звичаїв своїх предків, шануючи власних сумнівних «святих»."
  patriarch_events.1.a: "Ми повинні примусити їх до шанування [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]их святих."
  STATIC_MODIFIER_NAME_saints_enforced: "Релігійний догматизм"
  STATIC_MODIFIER_DESC_saints_enforced: "Ми змусили жителів цієї провінції слідувати нашим релігійним звичаям. Це викликало деяке невдоволення нашим правлінням, але з часом ці люди зможуть краще інтегруватися в наше суспільство."
  patriarch_events.1.b: "Примусом ми нічого не доб'ємося."
  patriarch_events.2.title: "Літургійний вплив"
  patriarch_events.2.desc: "Коли [target_character.GetName] [Select_CString(target_character.IsFemale, 'влаштував', 'влаштувала' )] надмірно пишну церемонію освячення собору в провінції [local_see_province.GetProvince.GetName], місцевий єпископ виступив із засудженням. Він стверджує, що вдячний нам за щедрі пожертви, але незадоволений тим, як ми порушуємо літургійний канон в інтересах країни."
  patriarch_events.2.a: "Він повинен знати своє місце!"
  patriarch_events.2.b: "На знак покаяння ми зробимо ще одну пожертву церкві."
  patriarch_events.3.title: "Кафедральний собор у провінції [local_see_province.GetNameWithNoTooltip]"
  patriarch_events.3.desc: "#TOOLTIP:BUILDING_TYPE,cathedral,X #L Кафедральний собор#!#! у провінції [local_see_province.GetName] пошкоджений і потребує термінового ремонту. Митрополит дав зрозуміти, що розраховує на нашу фінансову допомогу і що собору не завадила б глобальна реконструкція.\n\nВідтоді як цей храм був побудований, церковна архітектура пішла далеко вперед. До того ж для цієї роботи ми зможемо запросити іноземних зодчих…"
  patriarch_events.3.a: "Проведемо масштабну реконструкцію!"
  patriarch_events.3.b: "Оплатимо ремонт, але не більше того."
  patriarch_events.4.title: "Єресь у провінції [judaizers_province.GetProvince.GetNameWithNoTooltip]!"
  patriarch_events.4.desc: "Нещодавно призначений митрополит провінції [judaizers_province.GetProvince.GetName] стверджує, що розкрив жахливу місцеву єресь. За його словами, віровідступники заперечують Трійцю, божественну природу Христа та церковну ієрархію. Митрополит попросив нас підтримати його у важкий час, адже для боротьби з такою єрессю, що охопила всі верстви суспільства, знадобиться дуже багато ресурсів.\n\nМені здається, тут усе очевидно — крім того, що послідовники цього напрямку є навіть у таких великих містах, як [ROOT.GetCountry.GetCapital.GetName]. Чи справді ми готові втратити підтримку цих людей? І чи такі вони небезпечні, як стверджує митрополит?"
  patriarch_events.4.a: "Спалити єретиків!"
  STATIC_MODIFIER_NAME_rooting_out_heresy: "Підтримка місцевої інквізиції"
  STATIC_MODIFIER_DESC_rooting_out_heresy: "У цій місцевості діє інквізиція, очолювана митрополитом. Вона перевіряє дотримання догматів віри та викорінює будь-яку єресь."
  patriarch_events.4.b: "Він явно помиляється."
  patriarch_events.5.title: "Багаті монастирі провінції [monastic_province.GetNameWithNoTooltip]"
  patriarch_events.5.desc: "Єпископ провінції [monastic_province.GetProvince.GetName] повідомляє, що місцеві монастирські громади зростають і розвиваються з неймовірною швидкістю. Їхнє господарство настільки велике і добре організоване, що викликає заздрість у місцевої адміністрації. Справа дійшла до того, що губернатор виявився втягнутим у конфлікт з ченцями з приводу межування церковної та державної землі.\n\nСхоже, центральній владі час втрутитися. Прийнявши сторону монастирів, ми безсумнівно отримаємо їхню подяку, але, з іншого боку, було б непогано збільшити державну власність…"
  patriarch_events.5.a: "Звісно, губернатор має рацію!"
  patriarch_events.5.b: "[ROOT.GetCountry.GetReligion.GetGodName] і віруючі гідні того, щоб прислухатися до них."