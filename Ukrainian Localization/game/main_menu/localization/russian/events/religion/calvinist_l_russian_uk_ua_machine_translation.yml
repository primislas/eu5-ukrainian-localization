l_russian:
  lots_of_calvinists: "Багато [Concept('pops', 'груп населення')|e] в нашій [Concept('country', 'країні')|e] тепер сповідують #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#!."
  calvinist.1.title: "Необхідність у реформах"
  calvinist.1.desc: "Священні стіни Королівського коледжу в Парижі гудуть відлунням збуджених голосів в очікуванні того, як молодий і палкий вчений [john_calvin.GetName] виголосить промову, яка залишить незгладний слід в історії європейської релігії. Звідки йому знати, що його слова стануть каталізатором для палких суперечок і зрештою призведуть до вигнання його з рідного міста?\n\nСлова Кальвіна гучним відлунням розносяться лекційною залою, а його ідеї вступають у конфлікт із вкоріненими католицькими доктринами. Його красномовні аргументи на користь релігійної реформи викликають відгук у серцях слухачів і паніку серед владних кіл.\n\nНовини про промову Кальвіна поширюються в суспільстві зі швидкістю пожежі й незабаром досягають вух високих церковних ієрархів. Шановні вчені Королівського коледжу змушені засудити його як єретика й небезпечну загрозу для усталеного порядку."
  calvinist.1.a: "[ROOT.GetCountry.Custom('CL_DAT')] такого не потрібно."
  calvinist.2.title: "[john_calvin.GetNameWithNoTooltip] у Базелі"
  calvinist.2.desc: "Переїхавши до #TOOLTIP:LOCATION,basel,X #L Базеля#!#!, [john_calvin.GetName] завершує тут свою революційну працю. Ці точно сформульовані та просочені теологічною мудрістю слова перевернуть релігійний розклад у Європі й розпалять по всьому континенту вогонь реформ. Видання #italic «Настанов у християнській вірі»#! стало поворотною точкою в житті Кальвіна й усього протестантського руху загалом.\n\nНа сторінках цієї вагомої книги Кальвін докладно виклав свої релігійні переконання та своє бачення реформи християнства. У #italic «Настановах у християнській вірі»#! укладено суть вчення Кальвіна, систематизовані принципи для розуміння істинної природи віри, спасіння, взаємин людини й Бога.\n\nВісті про це видання рознеслися Європою, як пожежа, захоплюючи уми вчених і релігійних авторитетів по всьому континенту. Католицька церква, що ревниво охороняє непорушність традиційних доктрин, ставиться до нової праці з неприязню і справедливо вбачає в ній загрозу для свого авторитету.\n\nMagnum opus Кальвіна опиняється в руках як його затятих прихильників, так і переконаних противників. Для одних він стає променем надії, який освітлює шлях до чистішого вираження християнської віри. Для інших же це небезпечний відступ від усталених догматів і обурлива образа самих засад церкви."
  calvinist.2.a: "Які його мотиви?"
  calvinist.3.title: "Проповідництво Кальвіна в Женеві"
  calvinist.3.desc: "У мальовничій #TOOLTIP:LOCATION,geneve,X #L Женеві#!#! починається нова доба релігійних потрясінь: тут [john_calvin.GetName] приймає на себе роль духовного лідера. Його прибуття в місто стає початком переломного періоду, який відіграє величезну роль у долі як Женеви, так і всієї протестантської реформації.\n\nКальвін, знаменитий своїм розумом і непохитною прихильністю до реформ, несе з собою ідею релігійного оновлення. Ведений принципами приречення і всевладдя Бога, він хоче створити громаду відданих вірян на основі біблійних принципів і суворої дисципліни в побуті.\n\nПісля того, як Кальвін прийняв на себе роль проповідника, Женева стала центром реформ: сюди стікаються однодумці та люди в пошуках порятунку від релігійних переслідувань. Реформація тут вкорінюється, місто стає бастіоном протестантської думки та практики.\n\nПід керівництвом Кальвіна встановлюється система церковного управління, у центрі якої знаходиться Консисторія, рада проповідників і старійшин. Цей орган забезпечує дотримання в місті суворого кальвіністського морального кодексу, який зачіпає всі аспекти життя громадян, від приватного побуту до громадської політики.\n\nЖенева стає центром теологічної освіти та місцем тяжіння для проповідників, які стікаються в місто, щоб доторкнутися до вчень Кальвіна. Його важливі роботи, такі як «Настанови в християнській вірі», слугують керівництвом для вірян і набором принципів для протестантської теології.\n\nВплив проповідницької діяльності Кальвіна виходить за межі Женеви та надихає реформаторські рухи по всій Європі. Його праці та вчення поширюються по всьому світу й підхоплюються тими, хто прагне чистішого втілення віри."
  calvinist.3.a: "І побільше проповідей про Второзаконня!"
  calvinist.4.title: "[ROOT.GetCountry.GetLongNameWithNoTooltip] і кальвіністська думка"
  calvinist.4.desc: "[ROOT.GetCountry.GetLongName] — це країна, над родючими землями якої дме вітер релігійних реформ: у її містах і селах починають вкорінюватися ідеї кальвінізму, провісники серйозних змін у релігійному житті та соціальній структурі країни.\n\nПрагнення до нового, чистішого втілення віри та неприйняття усталеного релігійного порядку зробило нашу націю справжнім розсадником для кальвіністських ідей. Релігійні вчення Кальвіна, засновані на принципах приречення, всевладдя Бога та авторитету Писання, знаходять відгук у душах розчарованих вірян, які шукають нового виходу своїм релігійним почуттям.\n\nУ міру зміцнення цих нових ідей тут і там з'являються групи вірян, які потай вивчають і обговорюють його праці — наприклад, «Настанови в християнській вірі». Їхні секретні зібрання стають майданчиками для палких дискусій і теологічних дебатів, які дедалі більше згуртовують послідовників ідей Кальвіна.\n\nЗростаюча популярність кальвінізму кидає виклик традиційним церковним владам. Католицькій церкві та її багатовіковим догматам тепер доводиться уживатися з кальвіністами, які горять релігійним запалом."
  calvinist.4.a: "Вони будуть розтрощені!"
  calvinist.5.title: "Відправлення проповідників за кордон"
  calvinist.5.desc: "Багато хто в церкві впевнений, що ми, як провідна #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвіністська#!#! нація, повинні відправляти за кордон своїх проповідників, щоб підтримувати поширення істинної реформації."
  calvinist.5.a: "На славу Господа!"
  calvinist.sent_reformed_ministers: "[target_country.GetLongName] — країна, куди вирушать наші #TOOLTIP:BUILDING_TYPE,calvinist_preachers,X #L кальвіністські проповідники#!#!#!"
  sent_reformed_ministers: "Відправлено кальвіністських проповідників"
  calvinist.5.b: "Нам є чим зайнятися вдома."
  calvinist.6.title: "Іноземні проповідники на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
  calvinist.6.desc: "Нам повідомляють, що на землях #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! з'явилися кальвіністські проповідники. Схоже, їхня батьківщина — [from.GetLongName], і вони підбурюють місцеве населення чинити опір нашим спробам викорінити цю єресь."
  calvinist.6.a: "Обурливо!"
  calvinist.7.title: "Приречення"
  calvinist.7.desc: "Теологи-кальвіністи вважають, що спасіння чекає лише тих небагатьох, кому призначено спастися. Але хто саме буде врятований, заздалегідь невідомо, тому в них з'явилася думка, що щасливчиків можна визначити за їхнім способом життя. Оскільки важливими ознаками обраності вважаються працьовитість, ощадливість, успішність у суспільстві та багатство, послідовники кальвінізму прагнуть цих чеснот. Крім того, ті, хто вже володіє такими якостями, — купці та міщани — також починають виявляти інтерес до кальвінізму."
  calvinist.7.a: "Заохотимо ці вірування."
  STATIC_MODIFIER_NAME_calvinist_work_ethic: "Трудова етика кальвіністів"
  STATIC_MODIFIER_DESC_calvinist_work_ethic: "Працьовитість, успіх у суспільстві та багатство вважаються наслідком богообраності, тому люди прагнуть цих ідеалів."
  calvinist.7.b: "Нехай так і буде."
  calvinist.8.title: "Інструменти в церкві"
  calvinist.8.desc: "Провідні теологи вважають, що музику в релігійних обрядах використовувати не слід. Вони вважають, що музика відволікає людей від важливого, моління та богошукання, і тому виступають за заборону музичних інструментів у церквах."
  calvinist.8.a: "Видамо заборону."
  calvinist.8.b: "Проігноруємо їхні думки."
  calvinist.9.title: "Розгул іконоборців"
  calvinist.9.desc: "На території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! тут і там спалахують погроми: натовпи послідовників #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізму#!#! громлять церкви та знищують предмети #TOOLTIP:RELIGION,$catholic_tt$,X #L католицького#!#! мистецтва. Більшість католиків #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! вимагає від уряду негайно втрутитися та припинити безчинства."
  calvinist.9.a: "Нехай війська наведуть лад!"
  calvinist.9.b: "Підтримати погромників!"