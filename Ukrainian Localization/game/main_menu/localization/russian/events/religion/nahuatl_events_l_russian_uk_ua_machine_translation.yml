l_russian:
  nahuatl_events.1.title: "Дурні знамення"
  nahuatl_events.1.desc: "Ретельно вивчивши небесні світила та календарі, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] дійшли висновку, що у нас попереду важкі та суворі часи. Як [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], так і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] вже готуються до майбутніх негараздів. Багато хто з них готові принести в жертву власну кров заради порятунку у важку годину."
  nahuatl_events.1.a: "Ye ica otopan tlamaceuhque."
  nahuatl_events.1.a.tt: "[target_character.GetName] пожертвує богам частину своєї крові."
  nahuatl_events.1.b: "$common_string_the_end_is_nigh$"
  nahuatl_events.2.title: "Дорогоцінний син"
  nahuatl_events.2.desc: "До нас дійшли чутки, що в столичнім місті [ROOT.GetCountry.GetCapital.GetName] народився дивовижний хлопчик. Він з'явився на світ майже через два дні пологових переймів. Його батьки — прості [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], але всі астрологи та ворожбити пророкують йому велике майбутнє. Дотримуючись традиції, мати скоро принесе цю дитину до будинку юнаків, щоб представити його тим, хто займатиметься його навчанням у період від підліткового до шлюбного віку."
  nahuatl_events.2.a: "У телпочкаллі з нього зроблять чудового воїна."
  nahuatl_events.2.a.tt: "Дитина навчатиметься в телпочкаллі"
  nahuatl_events.2.b: "Спробуємо віддати його в кальмекак."
  nahuatl_events.2.b.tt: "Дитина навчатиметься в школі кальмекак і зможе розкрити свій талант повною мірою, але люди запам'ятають порушення традиції."
  nahuatl_events.3.title: "Війна — твій обов'язок"
  nahuatl_events.3.desc: "Хлопчик, що народився 16 років тому під щасливою зіркою, досяг зрілості та готується вирушити на битву. Як і всі його однолітки, він повинен захопити своїх перших полонених і розпочати військову кар'єру.\n\nЯкщо хтось із юнаків повернеться без полонених, він назавжди буде визнаний непридатним на роль воїна і вестиме незначне життя."
  nahuatl_events.3.a: "Знамення сприяють цьому юнакові. Він впорається."
  nahuatl_events.3.a.tt: "Воїн вирушить випробувати себе на війну."
  nahuatl_events.3.b: "Пожертвуємо частину своєї крові, щоб допомогти йому."
  nahuatl_events.3.b.tt: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] проллє свою кров, щоб підтримати нашого воїна, але якщо цей воїн виявиться переможеним, наша репутація постраждає."
  nahuatl_events.4.title: "Твій дім не тут, бо ти орел, ти ягуар"
  nahuatl_events.4.desc: "Повністю виправдавши знамення, що супроводжували його народження, молодий воїн вже перевершив усі наші очікування. Захоплюючи полонених за будь-якої зручної нагоди, він прославив себе і весь свій рід. Поза всяким сумнівом, на нього чекає найбільша шана, якої тільки можна досягти на полях битв."
  nahuatl_events.4.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.4.b: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.5.title: "Ти удостоїшся смерті від обсидіанового ножа"
  nahuatl_events.5.desc: "Незважаючи на всі добрі знамення, що супроводжували його народження, молодий воїн потрапив у полон до ворога. Скоро він зустріне свою долю на кам'яному жертовнику у ворожій столиці. Це почесна смерть, але горе його роду буде велике."
  nahuatl_events.5.a: "Гідна смерть!"
  nahuatl_events.6.title: "Ти нагодуєш і напоїш сонце"
  nahuatl_events.6.desc: "Незважаючи на всі добрі знамення, що супроводжували його народження, молодий воїн загинув на полі битви. Тепер він ніколи не досягне слави і не пожертвує свою кров і серце богам."
  nahuatl_events.6.a: "Сумна смерть."
  nahuatl_events.6.b: "$nahuatl_events.6.a$"
  nahuatl_events.7.title: "Твій дім не тут…"
  nahuatl_events.7.desc: "Незважаючи на всі добрі знамення, що супроводжували його народження, юнак накликав ганьбу на себе і весь свій рід. У бою він поводився як останній боягуз, ховаючись за спинами товаришів і не зумівши захопити жодного бранця, хоча у нього не раз була така нагода. Після повернення до військового дому його буде обстрижено і назавжди визнано непридатним на роль воїна."
  nahuatl_events.7.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.7.b: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.8.title: "Добрі знамення"
  nahuatl_events.8.desc: "Ретельно вивчивши зірки, календарі та інші знамення, наші [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] дійшли висновку, що нас попереду чекають щасливі часи. Світу більше не загрожує загибель, тож багато наших підданих можуть зітхнути з полегшенням, знаючи, що їхні жертви були прийняті з прихильністю."
  nahuatl_events.8.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  nahuatl_events.9.title: "[target_character.GetNameWithNoTooltip] вихваляється багатством"
  nahuatl_events.9.desc: "[Select_CString(target_character.IsFemale, 'Відома ремісниця', 'Відомий ремісник')], послугами [Select_CString(target_character.IsFemale, 'якої', 'якого')] часто користується наш двір та інші впливові члени суспільства, поводиться не по чину. При народженні дитини людям [Select_CString(target_character.IsFemale, 'її', 'його')] становища приписується проводити лише скромні урочистості, а [Select_CString(target_character.IsFemale, 'вона відзначила', 'він відзначив')] появу первістка грандіозним банкетом, який можуть дозволити собі не всякі [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l]. Так, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] мають право бути багатими, але таке відкрите вихваляння ображає наші традиції. [ROOT.GetCountry.GetReligion.GetGodName] у гніві!"
  nahuatl_events.9.a: "[ROOT.GetCountry.GetReligion.GetGodName] у гніві на [Select_CString(target_character.IsFemale, 'неї', 'нього')]. [Select_CString(target_character.IsFemale, 'Вона повинна', 'Він повинен')] померти."
  nahuatl_events.9.b: "[Select_CString(target_character.IsFemale, 'Її', 'Його')] праця занадто важлива для нас, щоб карати [Select_CString(target_character.IsFemale, 'її', 'його')] смертю."
  nahuatl_events.10.title: "Подія в період Немонтемі"
  nahuatl_events.10.desc: "На жаль, наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] не завжди бездоганні: сьогодні [Select_CString(target_char.IsFemale, 'дочка', 'син')] однієї з найзнатніших сімей нашої держави [Select_CString(target_char.IsFemale, 'була помічена п'яною', 'був помічений п'яним')] на вулиці. Це саме по собі злочин, за який велено згори карати задушенням, але найгірше, що це сталося в дні Немонтемі, коли будь-які порушення порядку суворо заборонені."
  nahuatl_events.10.a: "[Select_CString(target_char.IsFemale, 'Вона повинна', 'Він повинен')] померти."
  nahuatl_events.10.b: "[Select_CString(target_char.IsFemale, 'Вона', 'Він')] занадто [Select_CString(target_char.IsFemale, 'потрібна', 'потрібен')] нам."
  nahuatl_events.11.title: "Мандрівний чаклун"
  nahuatl_events.11.desc: "До нас дійшли чутки, що в одній з наших провінцій з'явилася людина, яка стверджує, ніби у неї є магічна сила. Він сіє страх і злі плітки серед місцевих жителів. Аристократи впевнені, що це простий шарлатан, якого легко приборкати, але багато [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] піддані його впливу."
  nahuatl_events.11.a: "Відправимо емісара спіймати його."
  nahuatl_events.11.a.tt: "Полювання на чаклуна почалося"
  STATIC_MODIFIER_NAME_nahuatl_sorcerer: "Сільський чаклун"
  STATIC_MODIFIER_DESC_nahuatl_sorcerer: "Кажуть, що якийсь чаклун наводить жах на місцевих селян."
  nahuatl_events.11.b: "Нехай з ним розберуться місцеві власті."
  nahuatl_events.12.title: "Чаклун зник"
  nahuatl_events.12.desc: "Схоже, проблема з чаклуном, що наводив жах на наших селян, вирішилася сама собою. Ми не змогли його спіймати, але про нього нічого не чути вже багато тижнів, тож його вплив поступово сходить нанівець."
  nahuatl_events.12.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nahuatl_events.13.title: "Чаклуна спіймано"
  nahuatl_events.13.desc: "Чаклуна, що наводив жах на наші землі, було спіймано. Традиційним покаранням для таких, як він, є стрижка волосся — вважається, що вона позбавляє магічної сили. Але, оскільки він заподіяв набагато більше зла, ніж пересічний сільський чаклун, можливо його слід стратити, щоб [ROOT.GetCountry.GetReligion.GetGodName] і люди залишилися задоволені."
  nahuatl_events.13.a: "Остригти його!"
  nahuatl_events.13.b: "Убити його!"
  nahuatl_events.14.title: "Тлакатеколотль"
  nahuatl_events.14.desc: "До нас дійшли звістки, що покарання чаклуна, який влаштував заворушення в наших землях, пройшло не за планом. Ніхто з його учасників не вижив, але кажуть, що той чаклун був справжнім тлакатеколотлем, а з його клітки вилетіла сова. Невідомо, чи була тією совою сам чаклун, але тепер вся наша держава охоплена панічними чутками."
  nahuatl_events.14.a: "$common_string_the_end_is_nigh$"
  nahuatl_events.15.title: "Сільський чаклун повернувся"
  nahuatl_events.15.desc: "Схоже, чаклун, що сховався від нас у минулому, знову бешкетує. Місцева влада стверджує, що він поширює хвороби та зловісні пророцтва. Його треба зупинити."
  nahuatl_events.15.a: "Відправимо емісара спіймати його."
  nahuatl_events.15.b: "Нехай з ним розберуться місцеві органи влади."
  nahuatl_events.16.title: "Кіуатеотео"
  nahuatl_events.16.desc: "Нас спіткало велике нещастя: сьогодні вранці [Select_CString(target_character.IsFemale, 'зникла', 'зник' )] [target_character.GetName]. Один з [Select_CString(target_character.IsFemale, 'її', 'його' )] слуг стверджує, що дитину забрала кіуатеотео, схожа на жінку, яка нещодавно померла під час пологів неподалік. Те, що ця зловісна тварюка змогла викрасти [Select_CString(target_character.IsFemale, 'нашу спадкоємицю', 'нашого спадкоємця' )] посеред ночі, однозначно є знаком наближення кінця світу."
  nahuatl_events.16.a: "Ми повинні зробити все можливе, щоб умиротворити Тескатліпоку та Тлацолтеотль."
  nahuatl_events.16.b: "Покараємо слугу за брехливі чутки."
  nahuatl_events.17.title: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'хвора', 'хворий' )]"
  nahuatl_events.17.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'захворіла', 'захворів' )] і страждає від жару. Лікарі приготували для нього зілля з трав і маїсових качанів."
  nahuatl_events.17.a: "Дотримуватимемося їхніх порад і сподіватимемося на краще."
  nahuatl_events.17.b: "[ROOT.GetCountry.GetReligion.GetGodName] у гніві. Щоб умиротворити божество, ми повинні принести великі жертви."
  nahuatl_extra_sacrifice: "Будуть принесені жертви"
  nahuatl_events.18.title: "Олламаліцлі"
  nahuatl_events.18.desc: "У юності [target_character.GetName] непогано [Select_CString(target_character.IsFemale, 'грала', 'грав' )] у традиційну гру олламаліцлі, але з віком [Select_CString(target_character.IsFemale, 'перестала', 'перестав' )] бавитися з м'ячем. Втім, [Select_CString(target_character.IsFemale, 'її', 'його' )] як і раніше часто бачать на храмових і ринкових площах міста [ROOT.Capital.GetName] серед глядачів. Судячи з усього, [Select_CString(target_character.IsFemale, 'їй', 'йому' )] не чужі й численні парі, що укладаються на результат матчів: нещодавно [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'з'явилася', 'з'явився' )] до вас з проханням оплатити [Select_CString(target_character.IsFemale, 'її', 'його' )] борги."
  nahuatl_events.18.a: "Допоможемо [Select_CString(target_character.IsFemale, 'їй', 'йому' )]."
  nahuatl_events.18.b: "Заборонимо [Select_CString(target_character.IsFemale, 'їй', 'йому' )] ходити на ігри."
  nahuatl_events.19.title: "Викрадений бранець"
  nahuatl_events.19.desc: "Конфлікти між воїнами не є рідкістю, адже не завжди можна точно сказати, коли і як був захоплений той чи інший бранець. Нещодавно наші воїни бачили, як один із найдосвідченіших бійців украв бранця у свого товариша. Якщо це справді так, то обвинувачений скоїв найтяжчий злочин, покаранням за який може бути лише смерть. Гірше того, багато хто підозрює, що потерпілий добровільно поступився бранцем."
  nahuatl_events.19.a: "Уб'ємо обвинуваченого."
  nahuatl_events.19.b: "Уб'ємо обох."
  nahuatl_events.19.c: "Пощадимо воїнів."
  nahuatl_events.20.title: "Тлакаксіпеуаліцтлі — свято здирання шкіри"
  nahuatl_events.20.common: "З наближенням весняного рівнодення та початком сільськогосподарського сезону настає свято Тлакаксіпеуаліцтлі. Цього дня ми приносимо в жертву всіх захоплених бранців у храмі Шипе-Тотека. [ROOT.GetCountry.GetReligion.GetGodName] — ось хто насичується їхньою кров'ю, а їхню шкіру надягають на себе воїни та храмові жерці, перш ніж відправити її до священної печери."
  nahuatl_events.20.desc: "$nahuatl_events.20.common$\n\nДоля нагородила нас безліччю бранців, тож цього разу свято триватиме довго. [ROOT.GetCountry.GetReligion.GetGodName] — ось хто насичується кров'ю жертв."
  nahuatl_events.20.a: "Принесемо бранців у жертву."
  nahuatl_events.20.b: "Влаштуємо ще грандіозніше свято, зажадавши додаткових бранців у підданих."
  nahuatl_events.21.title: "Сонячний камінь"
  nahuatl_events.21.desc: "Цього року на святі Тлакаксіпеуаліцтлі на нас чекає особливе видовище. Найсильніший із наших бранців буде прив'язаний до жертовного каменю та озброєний кийком із пір'ям замість обсидіанових лез, після чого з ним битимуться четверо наших найкращих орлів та ягуарів. Якщо бранець якимось дивом залишиться живим, проти нього вийде останній боєць-лівша. Вища сила із захопленням стежитиме за цією церемонією, як і безліч глядачів з усієї нашої держави."
  nahuatl_events.21.nothing: "Нічого особливого не станеться!"
  nahuatl_events.21.uncoop: "Воїн не захоче йти нам назустріч. Це збільшить [Concept('doom', 'приреченість')|e]."
  nahuatl_events.21.spectactle: "Грандіозне видовище зменшить [Concept('doom', 'приреченість')|e]."
  nahuatl_events.21.a: "Хай почнеться битва."
  nahuatl_events.21.b: "Давайте влаштуємо скромніші урочистості."
  nahuatl_events.22.title: "Непоступливий воїн"
  nahuatl_events.22.desc: "Попри всі наші старання, полонений воїн, якому належало битися біля сонячного каменю, відмовився піти нам назустріч. На очах у всього народу, що заповнив храмову площу, він кинув зброю і дозволив убити себе першому ж супернику. Цю подію, що затьмарила свято, багато хто вважав поганим знаменням."
  nahuatl_events.22.a: "Нехай втамує спрагу сонця."
  nahuatl_events.23.title: "Грандіозне видовище."
  nahuatl_events.23.desc: "Битва між бранцем і чотирма нашими найкращими воїнами перевершила всі очікування. Бранець не тільки пережив перші чотири бої, а й майже переміг останнього супротивника-лівшу.\n\nПісля того, як бранець нарешті впав замертво, його серце згідно зі звичаєм забрала вища сила, плоть була передана родині воїна, що його захопив, а в шкіру вбрався сам цей воїн, щоб носити її протягом багатьох днів.\n\nНастільки вражаюче святкування тлакаксіпеуаліцтлі згадуватимуть ще багато років."
  nahuatl_events.23.a: "$nahuatl_events.22.a$"
  nahuatl_events.24.title: "Закінчення свята"
  nahuatl_events.24.desc: "Свято здирання шкіри залишилося позаду. Розпочався новий сільськогосподарський сезон. Екстравагантні урочистості цього року згадуватимуть ще багато років."
  nahuatl_events.24.a: "$nahuatl_events.22.a$"
  nahuatl_events.25.title: "$nahuatl_events.20.title$"
  nahuatl_events.25.desc: "$nahuatl_events.20.common$\n\nОскільки ми досить давно не брали участі у війнах, у нас виникла нестача бранців для принесення в жертву. Це саме по собі поганий знак, а якщо сьогодні ми не зможемо пролити більше крові, все може стати ще гірше."
  nahuatl_events.25.a: "Обійдемося наявними бранцями."
  nahuatl_events.25.b: "Нехай наші васали пришлють нам більше бранців."
  nahuatl_events.28.title: "[Select_CString(target_artist.IsFemale, 'Велика поетеса', 'Великий поет' )]"
  nahuatl_events.28.desc: "Усне слово завжди мало особливе значення для нашого народу. Пісні та вірші лунають на всіх релігійних церемоніях та народних святах, і навіть наш верховний лідер носить титул [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], що означає «той, хто говорить». Тому поезія є для нас однією з найсвященніших форм мистецтва та одним з небагатьох прийнятних способів, якими людина може висловити невдоволення, тривогу і навіть сумнів у самій долі, не накликаючи на себе гнів богів — таких, як [ROOT.GetCountry.GetReligion.GetGodName].\n\nНещодавно до столичного міста [ROOT.GetCountry.GetCapital.GetName] [Select_CString(target_artist.IsFemale, 'з'явилася надзвичайно популярна поетеса', 'з'явився надзвичайно популярний поет' )] #L [ROOT.GetCountry.GetCulture.GetName|l]ого#! походження. [Select_CString(target_artist.IsFemale, 'Вона вознесла', 'Він возніс' )] хвалу нашому місту та його жителям, а ось [target_character.GetName] [Select_CString(target_character.IsFemale, 'удостоїлася', 'удостоївся' )] від [Select_CString(target_artist.IsFemale, 'неї', 'нього' )] лише осуду."
  nahuatl_events.28.a: "[Select_CString(target_artist.IsFemale, 'Її', 'Його' )] люблять [ROOT.GetCountry.GetReligion.GetGodName] та народ."
  nahuatl_events.28.b: "[Select_CString(target_artist.IsFemale, 'Їй', 'Йому' )] не буде дозволено залишитися."
  nahuatl_events.29.title: "Розширення головного храму в місті [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  nahuatl_events.29.desc: "Головний столичний храм є символом нашої влади та зв'язку з такими божествами, як [ROOT.GetCountry.GetReligion.GetGodName]. Саме тут приносяться головні жертви в дні численних свят, саме сюди прагнуть проникнути загарбники. [ROOT.GetCountry.GetGovernment.GetRulerTitle] несе обов'язок з підтримки та розширення цього храму."
  nahuatl_events.29.a: "Розпочнемо грандіозний проєкт розширення Піраміди."
  nahuatl_events.29.b: "Надбудуємо ще один ярус Піраміди."
  nahuatl_events.29.c: "Ми можемо дозволити собі лише скромні покращення."
  nahuatl_events.29.d: "Цього разу ми не можемо дозволити собі занадто багато."
  religious_focus_gain_tt: "Поки діє модифікатор «[ShowModifier('nahuatl_temple_expansion_modifier')]», ми отримуватимемо #G +0,2#! до щомісячного прогресу [Concept('religious_focuses','релігійних цілей')|e]"
  nahuatl_events.30.title: "Паломництво до [ShowLocationNameWithNoTooltip('cholollan')]"
  nahuatl_events.30.desc: "Усі наші [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] традиційно здійснюють паломництво до великого святилища Кецалькоатля в храмовому місті #TOOLTIP:LOCATION,cholollan_tt,X #L Чолольян#!#!. Тут добрий пернатий змій, покровитель мистецтв та дощів, приймає почесті від своїх шанувальників, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] Мезоамерики хваляться багатством, не вступаючи в бій один з одним."
  nahuatl_events.30.a: "Віддамо належне Кецалькоатлю."
  nahuatl_events.30.b: "Що він за бог, якщо йому не потрібні людські жертви?"
  nahuatl_events.310.title.a: "Свято Атлькауало"
  nahuatl_events.310.title.b: "Свято Тлакаксіпеуаліцтлі"
  nahuatl_events.310.title.c: "Свято Тосостонтлі"
  nahuatl_events.310.title.d: "Свято Уейтосостлі"
  nahuatl_events.310.title.e: "Свято Тошкатль"
  nahuatl_events.310.title.f: "Свято Ецалькуалістлі"
  nahuatl_events.310.title.g: "Свято Текуїлуїтонтлі"
  nahuatl_events.310.title.h: "Свято Уейтекуїутль"
  nahuatl_events.310.title.i: "Свято Тлашочімако"
  nahuatl_events.310.title.j: "Свято Шокотлуеці"
  nahuatl_events.310.title.k: "Свято Очпаністлі"
  nahuatl_events.310.title.l: "Свято Теотлеко"
  nahuatl_events.310.title.m: "Свято Тепеїуїтль"
  nahuatl_events.310.title.n: "Свято Кечоллі"
  nahuatl_events.310.title.o: "Свято Панкецалістлі"
  nahuatl_events.310.title.p: "Свято Атемостлі"
  nahuatl_events.310.title.q: "Свято Тітітль"
  nahuatl_events.310.title.r: "Свято Іскаллі"
  nahuatl_events.310.title.s: "Немонтемі"
  nahuatl_events.310.desc.a: "Свято #italic Атлькауало#!, що в перекладі означає «Припинення води», йде першим у році та присвячене богу дощу Тлалоку, а також решті божеств, пов'язаних з водою. У ході цього свята наш народ молить Тлалока про дощ, адже за ним йдуть найсухіші місяці в році.\n\nУ ці дні Тлалоку приносять у жертву маїс та дітей. Останніх жерці вбирають у ритуальний одяг і ведуть на кілька священних гір, а люди плачуть, бачачи ці процесії. Вони називаються #italic тлакатетеуїтль#! або «людські стрічки» за аналогією з паперовими стрічками #italic аматетеуїтль#!, які несуть із собою жерці.\n\nНіч перед жертвоприношенням діти проводять на вершині священної гори, де їм забороняють спати. Їхній плач, що лунає вночі, вважається добрим провісником швидких дощів."
  nahuatl_events.310.desc.b: "Свято другого місяця нашого сонячного календаря називається #italic Тлакаксіпеуаліцтлі#! або «здирання шкіри». Воно присвячене Шипе-Тотеку — богу кругообігу життя, смерті та народження, а також смертоносної війни. Цього місяця наш народ зустрічає родючу весну, що несе відродження життя.\n\nНа честь Шипе-Тотека з полонених здирають шкіру, яку потім носять протягом двадцяти днів. Біля сонячного каменю проводяться ритуальні бої, де з полоненими, озброєними потішною зброєю, б'ються наші найхоробріші #TOOLTIP:UNITTYPE,a_jaguar_warrior,X #L воїни-ягуари#!#!. Якщо полонений здобуває перемогу в такому бою, його звільняють."
  nahuatl_events.310.desc.c: "Свято #italic Тосостонтлі#! або «мале бдіння» знаменує собою початок сільськогосподарських робіт. Хоча воно присвячене в першу чергу Тлалоку, на ньому шанують й інших богів та богинь, пов'язаних з маїсом та родючістю — наприклад, Коатлікуе. У ці дні дітей відводять на природу, щоб випустити їм кров, а деяких приносять у жертву Тлалоку в печерах. Шкіри, надіті в свято Тлакаксіпеуаліцтлі, нарешті знімають і віддають похованню."
  nahuatl_events.310.desc.d: "Сьогодні ми відзначаємо свято #italic Уейтосостлі#! або «велике бдіння». Воно присвячене богу Сентеотлю, який відає #TOOLTIP:GOODS,maize,X #L кукурудзою#!#! Ми дякуємо йому за маїс, який нас годує, і відзначаємо збір урожаю.\n\nУ день великого бдіння ми приносимо дітей у жертву Тлалоку та божествам маїсу, щоб віддячити їм за дощі та врожай."
  nahuatl_events.310.desc.e: "Свято #italic Тошкатль#!, або «посуха», що відзначається в п'ятий місяць року, присвячене оновленню. У ці дні шанують богів Тескатліпоку та Уїцилопочтлі, приносячи їм у жертву їжу та квіти, але головною подією свята є жертвоприношення людини, яка весь минулий рік символізувала Тескатліпоку.\n\nДля цієї мети з числа полонених вибирають юнака і протягом року вчать його хорошим манерам, мові, пісням та грі на флейті. Весь цей рік люди віддають йому почесті, як якби він був самим Тескатліпокою, але в свято Тошкатль з нього здирають шкіру, а його плоть поїдають [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]. Відразу ж після цього жерці вибирають нове втілення Тескатліпоки, щоб продовжити річний цикл."
  nahuatl_events.310.desc.f: "Шостий місяць року носить ім'я #italic Ецалькуалістлі#!, що означає «поїдання свіжого маїсу». Він присвячений богам Тлалоку та Чалчиутлікуе, молодим пагонам та закінченню сухого сезону.\n\nУ свято #italic Ецалькуалістлі#! ми прикрашаємо головний храм очеретом і надягаємо різнокольорові паперові стрічки на шиї статуй богів. Для молитви про закінчення посухи численні паломники вирушають на вершину гори Тлалок, де приносять у жертву дітей та дорослих."
  nahuatl_events.310.desc.g: "#italic Текуїлуїтонтлі#! або «мале свято богів» присвячене Уїшточіуатль — богині солі та морської води, якій Тлалок доводиться братом. Цього місяця народ дякує богам за дарування води та здорового врожаю, прикрашаючи місто водяними квітами.\n\nУ це свято обирається жінка, що символізує Уїшточіуатль, а інші жінки, прикрасивши себе жовтими квітами, танцюють навколо неї. Після закінчення церемонії земне втілення богині приносять у жертву."
  nahuatl_events.310.desc.h: "Зараз ми відзначаємо #italic Уейтекуїутль#! або «велике свято богів». Цього місяця наш народ танцює на честь богів маїсу, зокрема богині Чікомекоатль, а володарі годують простолюдинів, радіючи достатку.\n\nУ ході цього свята приносять у жертву рабинь, що символізують Чікомекоатль та Кіуакоатль. Першу з них приводять на вершину гори, звідки вона зі своєю свитою біжить назад до храму, щоб вознести молитви. Після цього вона здійснює ритуальний танець, а потім її вбивають."
  nahuatl_events.310.desc.i: "Дев'ятий місяць року, присвячений мертвим, особливо відзначається нашими торговцями. Він називається #italic Тлашочімако#! або «народження квітів», а його темою є квіти та торгівля.\n\nУ ці дні наш народ віддає данину пам'яті померлим, а купці дякують богам за удачу протягом усього року. Особливі почесті віддаються Уїцилопочтлі, який першим отримує жертовні квіти та їжу. Шляхетні жінки отримують у дар #italic шокотль#! — товсте поліно, яке потім ставлять у нашому головному храмі.\n\nУрочистості включають у себе жертвоприношення предкам квітів та їжі, а також ритуальні вбивства дітей та земного втілення бога мертвих Міктлантекутлі."
  nahuatl_events.310.desc.j: "Свято #italic Шокотлуеці#!, що означає «падіння плоду», присвячене мертвим, плодам та врожаю.\n\nЦього місяця вшановують богів Уеуетеотля та Шіутекутлі. Люди забираються на дахи своїх домівок та запрошують мертвих до своїх осель. #italic Шокотль#!, поставлений минулого місяця, забирають із храму та встановлюють на стовп, прикрашений паперовими стрічками.\n\nВ останній день цього місяця жерці кидають полонених у вогонь, а потім виривають їхні серця. Завершується свято змаганням юнаків у лазінні по стовпу за допомогою мотузок, після якого стовп зрубують."
  nahuatl_events.310.desc.k: "Місяць #italic Очпаністлі#!, що означає «підмітання», присвячений збору врожаю та прибиранню. Ці дванадцять днів присвячені одразу кільком божествам, зокрема Тласольтеотль, Тосі (також відому як Коатлікуе та Тетео Іннан) та Сентеотлю. На їхню честь люди здійснюють ритуальні омивання та прибирання жител, а також приносять у жертву земне втілення богині Тосі.\n\nРабиню, обрану на роль Тосі, ігнорують протягом перших п'яти днів, а потім ще вісім днів навколо неї мовчки танцюють. В останні п'ять днів повитухи та цілителі, які купили цю рабиню для церемонії, вдають, що нападають на неї, намагаючись її відволікти. В ніч останнього дня рабиню приводять до храму, де вона розкидає по підлозі маїсове борошно. Потім її хапає один із жерців, а інший жрець відрізає їй голову та знімає шкіру. Цю шкіру він надягає на себе, зображуючи нову, перероджену Тосі, а з клаптя шкіри з ноги згодом роблять маску."
  nahuatl_events.310.desc.l: "Дванадцятий місяць нашого календаря носить ім'я #italic Теотлеко#!, що означає «повернення богів». Він присвячений усім божествам без винятку.\n\nУ ці дні в храмі ставлять блюдо з маїсового борошна, яке періодично перевіряє жрець. Якщо на блюді з'являються сліди, значить, боги вже прийшли. Тоді люди починають грати на духових інструментах та поїдати особливі маїсові кульки.\n\nПісля повернення богів полонених кидають у вогонь, а потім ще живими дістають з нього, щоб вирвати їм серця та відрізати голови. Ці полонені, що символізують #italic мімішкоа#!, після свята відправляться на небо та стануть зірками.\n\nЦього місяця п'ють багато пульке, адже він також присвячений Ометочтлі — різним божествам цього напою."
  nahuatl_events.310.desc.m: "Тринадцятий місяць, іменований #italic Тепеіуітль#! або «гірський бенкет», присвячений горам Тлалок, Попокатепетль та Іцтаккіуатль. Протягом цього місяця ми вшановуємо богів ремесел, а також Тлалока та Шочікецаль.\n\nУ ці дні жерці збирають народ та ведуть його на найближчі гірські вершини. У збудованих там храмах, що називаються #italic аяукаллі#! або «будинки туману», віряни залишають підношення богам та бенкетують «серед хмар» до заходу сонця.\n\nУ це свято ми традиційно приносимо дітей у жертву Тлалоку, а також здійснюємо ритуальне вбивство земного втілення Шочікецаль."
  nahuatl_events.310.desc.n: "Назва свята #italic Кечоллі#! означає «дорогоцінне перо». Воно присвячене великому хмарному змію Мішкоатлю, а головною його темою є полювання. У цей посушливий місяць видобуток тварин відіграє важливу роль у нашому житті.\n\nВідзначаючи це свято, наш народ ходить на ритуальне полювання, а також приносить у жертву рабів та полонених. Також цього місяця ми поповнюємо свої арсенали та робимо нову зброю. Також усі учасники урочистостей жертвують свою кров, щоб віддячити тваринам, на яких ми полюємо, та полеглим воїнам."
  nahuatl_events.310.desc.o: "П'ятнадцятий місяць нашого календаря називається #italic Панкецалістлі#! або «підняття прапорів». Він присвячений народженню Уїцилопочтлі.\n\nЦього місяця ми проводимо пишні урочистості на честь дня народження бога, наприкінці яких приносяться в жертву кілька рабів та полонених, власники яких дотримуються суворого посту до кінця місяця. Оскільки це свято пов'язане з військовим мистецтвом, ми також проводимо ритуальні битви.\n\nВідзначаючи свято, жерці виготовляють з маїсу зображення бога, яке з'їдається після жертвоприношень. Також цього місяця люди випивають велику кількість пульке та приносять у жертву свою кров."
  nahuatl_events.310.desc.p: "Шістнадцятий місяць року називається #italic Атемостлі#!, що означає «сходження вод», і присвячений богу дощу Тлалоку.\n\nЦього місяця ми молимося про те, щоб рясні дощі напоїли наші поля, дозволивши виростити багатий урожай, і поїдаємо ритуальні зображення божества з маїсового тіста. При цьому в жертву приносяться не тільки раби та полонені, а й діти, яких топлять в озерах або гірських водоймах як підношення богу."
  nahuatl_events.310.desc.q: "Ближче до кінця року ми відзначаємо свято #italic Тітітль#!, що означає «витягування». Воно присвячене богині Кіуакоатль, яка цього місяця носить ім'я Іламатеуктлі або «стара» через висихання родючої матері-землі, що годує всіх нас.\n\nПід час урочистостей ми приносимо в жертву зображення богині з амаранту. Засихаючи, вона стає чоловіком, що відображає дуалістичну природу світу.\n\nСтарі цього місяця користуються особливою пошаною, а всі інші люди беруть участь у танцях та ритуалах, пов'язаних з родючістю. Торговці також приносять у жертву рабів, куплених спеціально для цієї мети."
  nahuatl_events.310.desc.r: "Останній місяць року, іменований #italic Іскаллі#! або «відродження», знаменує собою закінчення нашого календаря: за ним слідують лише грізні дні Немонтемі. Цього місяця люди вшановують Тлалока та Шіутекутлі, молячи їх про те, щоб вони дали родючість нашим полям.\n\nПід час урочистостей поїдається ритуальна страва тамалі, приготована з амаранту, юнаки полюють на лісових звірів або озерних птахів, а всі вогні в будинках та храмах гаснуть, щоб запалитися знову вже в присутності божества. Як і на інших святах, ми приносимо в жертву рабів та полонених, одягнених богами."
  nahuatl_events.310.desc.s: "Почалися останні п'ять днів року, які називаються Немонтемі. Оскільки вони вважаються невдалими, у цей період наш народ не проводить жодних урочистостей, не веде жодних справ і дотримується тверезості на знак шанування #italic Цициміме#!.\n\nЯкщо весь інший рік цих богинь шанують як захисниць жіночого начала та продовження роду, то в непередбачувані дні Немонтемі їх просто бояться.\n\nНезважаючи на всі звичаї, [target_character.GetName] все-таки [Select_CString(target_character.IsFemale, 'вирішила', 'вирішив' )] влаштувати свято. Лише небагато хто наважився на нього прийти, побоюючись катастрофи або, як мінімум, втрати удачі для себе та своїх сімей. [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] попереджали, що це може закінчитися бідою, але [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не [Select_CString(target_character.IsFemale, 'прислухалася', 'прислухався' )] до їхніх слів. Чи покарають нас божества?"
  nahuatl_events.310.a: "Влаштуємо грандіозне свято."
  nahuatl_events.310.b: "Влаштуємо вражаюче свято."
  nahuatl_events.310.c: "Нічого не будемо робити."