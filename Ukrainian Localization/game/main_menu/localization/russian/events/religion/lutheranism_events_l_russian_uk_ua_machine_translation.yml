l_russian:
  lutheranism_events.1.title: "Реформатор шукає притулку"
  lutheranism_events.1.desc: "[reformer.GetName], один із найвидатніших теологів нашої доби, був змушений тікати з #ONCLICK:COUNTRY,[reformer_fleeing_from_here.Custom('CL_tt')] #TOOLTIP:COUNTRY,[reformer_fleeing_from_here.Custom('CL_tt')],X [reformer_fleeing_from_here.Custom('CL_GEN')|L]#!#! у зв'язку із загрозою його життю. Будучи #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранською#!#! країною, ми просто зобов'язані надати йому притулок. Це, безсумнівно, зміцнить позиції нашої державної церкви — за умови, що новоприбулий реформатор підтримуватиме її догмати."
  lutheranism_events.1.a: "Ми повинні впустити цю велику людину!"
  lutheranism_events.1.a.tt: "Оселившись у нас, цей реформатор зможе як підтримати догмати нашої державної церкви, так і оскаржити їх."
  protected_reformer: "Ви впустили реформатора"
  lutheranism_events.1.b: "Нехай іде геть."
  did_not_protect_reformer: "Ви відмовили реформатору в притулку"
  lutheranism_events.2.title: "[from.GetLongNameWithNoTooltip] — реформатор шукає притулку тут"
  lutheranism_events.2.desc: "[reformer.GetName], один із найвідоміших прихильників Реформації в нашій країні, втік [from.Custom('preposition_uv')] #ONCLICK:COUNTRY,[from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.Custom('CL_tt')],X [from.Custom('CL_ACC')|L]#!#!, заявивши, що він побоюється переслідування з боку наших #TOOLTIP:RELIGION,$catholic_tt$,X #L католицьких#!#! властей. Тепер ця людина критикує у своїх памфлетах не тільки католицьку церкву, а й свою батьківщину."
  lutheranism_events.2.a: "Це обурливо!"
  lutheranism_events.3.title: "[reformer.GetNameWithNoTooltip] критикує державну церкву"
  lutheranism_events.3.desc: "Реформатор [reformer.GetName] відомий своїм непростим характером. Засудивши та відкинувши свою батьківщину, тепер він почав критикувати й наші власні порядки."
  lutheranism_events.3.a: "Жити під нашим захистом — значить підтримувати нашу церкву!"
  lutheranism_events.3.b: "Ну, якщо це вас дивує…"
  lutheranism_events.6.title: "Острах криптокатоликів"
  lutheranism_events.6.desc: "Наші піддані, як і раніше, побоюються таємних #TOOLTIP:RELIGION,$catholic_tt$,X #L католиків#!#!, які лише прикидаються прихильниками державної церкви. Зокрема, одне шляхетне сімейство, багато представників якого входять до нашої державної машини, давно підозрюють у папістських нахилах. З роками ці плітки не тільки не вщухли, а й поширилися настільки, що їх уже стає важко ігнорувати."
  lutheranism_events.6.a: "Заборонимо цій родині обіймати відповідальні посади."
  lutheranism_events.6.b: "Віддамо їх під суд."
  lutheranism_events.6.c: "Не будемо звертати уваги на плітки."
  lutheranism_events.7.title: "«Останні дні» [ROOT.GetCountry.Custom('CL_GEN')]"
  lutheranism_events.7.desc: "#ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#! охопив спалах релігійної ревності: жителі переконані, що кінець світу настане вже зовсім скоро. Селяни заявляють про небесні знамення, а священники читають апокаліптичні проповіді всупереч доктрині державної церкви. Міленаристи звинувачують у всіх бідах нашу країну і церкву, яка, за їхніми словами, є лютеранською лише номінально.\n\nПри цьому реакція уряду настільки слабка, що навіть деякі священники з міста [ROOT.GetCountry.GetCapital.GetName] вважають ці страхи виправданими."
  lutheranism_events.7.a: "Спробуємо заспокоїти підданих."
  lutheranism_events.7.b: "Застосуємо силу."
  lutheranism_events.7.c: "Їхній страх обґрунтований. Покайтеся, бо кінець близький!"
  lutheranism_events.9.title: "Послання вірним"
  lutheranism_events.9.desc: "Однією з найважливіших переваг державної церкви є можливість звернутися одразу до всіх вірян нашої країни. Наближається важливе церковне свято, тема проповіді для якого зазвичай призначається вищими церковними властями. Яку тему нам краще обговорити цього разу?"
  lutheranism_events.9.a: "Вдячність за мир, плодами якого ми насолоджуємося."
  lutheranism_events.9.b: "Виправдання наших війн."
  lutheranism_events.9.c: "Чистота нашої віри."
  lutheranism_events.9.d: "Єдність усіх християн."
  lutheranism_events.9.e: "Не будемо витрачати наш час на такі дрібниці."
  lutheranism_events.10.title: "Опір Реформації серед жителів [ROOT.GetCountry.Custom('CL_GEN')]"
  lutheranism_events.10.desc: "[ROOT.GetCountry.GetLongName] — це країна, де в сільській місцевості та інших місцевостях залишається чимало противників державної церкви, які мріють повернутися в лоно католицтва. Втім, релігійні сумніви — це ще не заколот, а обстановка в країні залишається цілком спокійною. Тому державна церква, як правило, не чіпає цих людей, якщо ті справно відвідують служби та платять податки.\n\nОднак, схоже, це триватиме недовго: недавній збір церковного срібла був сприйнятий жителями регіону як оголошення війни, і тепер вони беруться за зброю, щоб захистити свої храми від жадібних рук, які тягнуть до них влада міста [ROOT.GetCountry.GetCapital.GetName]."
  lutheranism_events.10.a: "Час навернути їх силою."
  lutheranism_events.10.b: "Звільнимо поки цю область від збору."
  lutheranism_events.11.title: "Богослови відкидають церкву [ROOT.GetCountry.Custom('CL_GEN')]"
  lutheranism_events.11.desc: "Багато богословів досягли видатних успіхів на своїй ниві ще до того, як у [ROOT.GetCountry.GetLongName] проникли ідеї Реформації, що спричинили появу державної церкви. Ці впливові люди зі сформованими переконаннями не змогли прийняти нові віяння. З роками вони тільки зміцнилися у своєму неприйнятті змін і тепер відкрито протистоять церкві, яку очолює [ROOT.GetCountry.GetGovernment.GetRuler.GetName]. Підданим не годиться так зухвало кидати виклик своєму правителю. З цим треба щось робити!"
  lutheranism_events.11.a: "Вигнати їх!"
  lutheranism_events.11.b: "Засудити їх за богохульство і стратити."
  lutheranism_events.11.c: "Це прикро…"
  lutheranism_events.12.title: "Католицький мислитель при дворі"
  lutheranism_events.12.desc: "[target_character.GetName] [Select_CString(target_character.IsFemale, 'відома', 'відомий' )] своїм гострим розумом, і [Select_CString(target_character.IsFemale, 'її', 'його')] присутність при дворі робить честь нашій країні. При цьому [target_character.GetNameWithNoTooltip] є [Select_CString(target_character.IsFemale, 'переконаною католичкою', 'переконаним католиком')] і відкрито сповідує свою віру — [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'дарувала', 'дарував')] [Select_CString(target_character.IsFemale, 'їй', 'йому')] це право своїм особистим указом. Звісно, церква #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! в жодному разі не критикує це рішення, однак на вулицях міста [ROOT.GetCountry.GetCapital.GetName] вже ходить чутка про те, що [target_character.GetNameWithNoTooltip] намагається заразити [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'нашу правительку', 'нашого правителя')] своїми підривними католицькими ідеями."
  lutheranism_events.12.a: "Нехай говорять."
  lutheranism_events.12.b: "Проженемо [Select_CString(target_character.IsFemale, 'її', 'його')] з двору."
  lutheranism_events.13.title: "Вплив кальвінізму"
  lutheranism_events.13.desc: "Ходять чутки, що [minister.GetName], до слів [Select_CString(minister.IsFemale, 'якої', 'якого')] прислухається [ROOT.GetCountry.GetGovernment.GetRuler.GetName], таємно сповідує #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвінізм#!#!, а деякі з запропонованих [Select_CString(minister.IsFemale, 'нею', 'ним')] законів насправді спрямовані на поширення ідей Реформації в нашій країні."
  lutheranism_events.13.a: "Не будемо надавати значення цим чуткам."
  lutheranism_events.13.b: "Публічно дистанціюємося від [Select_CString(minister.IsFemale, 'неї', 'нього' )]."
  lutheranism_events.14.title: "Освіта [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'спадкоємиці', 'спадкоємця' )]"
  lutheranism_events.14.desc: "Усі вчителі стверджують, що [ROOT.GetCountry.GetGovernment.GetHeir.GetName] може стати вельми [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'видатною правителькою', 'видатним правителем')]. [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'Вона', 'Він')] виявляє талант і допитливість у всьому, що пов'язано з державними справами. Однак [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'її', 'його')] духовних наставників турбує [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'її', 'його')] надмірний інтерес до відкинутої нами католицької віри."
  lutheranism_events.14.a: "Цей інтерес корисний для [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'майбутньої правительки', 'майбутнього правителя' )]."
  lutheranism_events.14.b: "Заборонимо всі студії папського вчення."
  lutheranism_events.15.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] виявляє католицькі нахили"
  lutheranism_events.15.desc: "Ні для кого не секрет, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] розбирається в католицькому вченні набагато краще, ніж хотілося б нашій державній церкві. Проте [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')] підтримує народ, а [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')] коронація і зовсім стала всезагальним святом. Безсумнівно, знання чужих вірувань стане в пригоді правителю лютеранської країни, а заявити, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] є криптокатоликом, може лише зухвалий бунтар."
  lutheranism_events.15.a: "Слава тобі, [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip]!"
  STATIC_MODIFIER_NAME_tolerant_monarch: "Віротерпимий монарх"
  STATIC_MODIFIER_DESC_tolerant_monarch: "Наш правитель з розумінням ставиться до інших релігій і надає чимало привілеїв іновірцям, що живуть на наших землях."
  lutheranism_events.16.title: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] і [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його' )] совість"
  lutheranism_events.16.desc: "За довгі роки [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'набула', 'набув')] репутації чесного та справедливого правителя. Церква більше не побоюється змови католиків, а її ненависть до папізму пом'якшена віротерпимістю глави країни.\n\nОднак [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'сама', 'сам')] [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не може спати спокійно. За роки перебування при владі [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'вона усвідомила', 'він усвідомив')], що [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'її', 'його')] особисті релігійні погляди набагато ближчі до католицтва, ніж до державної церкви #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!."
  lutheranism_events.16.a: "Єдиний вихід — зректися престолу."
  lutheranism_events.16.b: "[ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] продовжить правити, страждаючи від мук совісті."
  STATIC_MODIFIER_NAME_plagued_conscience: "Пляма на совісті"
  STATIC_MODIFIER_DESC_plagued_conscience: "Наш правитель не є відданим прихильником державної церкви. Це не чинить прямого впливу на нашу політику, проте церковним справам тепер приділяється мало уваги."
  lutheranism_events.17.title: "[ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] і [ROOT.GetCountry.GetGovernment.GetRuler.GetNameWithNoTooltip] у розбіжностях"
  lutheranism_events.17.desc: "З роками [ROOT.GetCountry.GetGovernment.GetHeir.GetName] все більше захоплюється католицтвом, оточуючи себе філософами, вченими та митцями з числа прихильників цієї віри. Це вже досягло обурливих масштабів. Будучи главою церкви #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [ROOT.GetCountry.GetGovernment.GetRuler.GetName] [Select_CString(ROOT.GetCountry.GetGovernment.GetRuler.IsFemale, 'зобов'язана', 'зобов'язаний')] підтримувати цінності Реформації. Якщо [ROOT.GetCountry.GetGovernment.GetHeir.GetName] не відмовиться від своїх помилок, авторитет нашої церкви може сильно постраждати."
  lutheranism_events.17.a: "Спробуємо зробити так, щоб [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'відмовилася', 'відмовився' )] від своїх помилок."
  lutheranism_events.17.b: "Не будемо втручатися."
  lutheranism_events.18.title: "[ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] визнає хибність своїх переконань"
  lutheranism_events.18.desc: "Після низки роз'яснювальних бесід [ROOT.GetCountry.GetGovernment.GetHeir.GetName] нарешті [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'зрозуміла', 'зрозумів')], що від [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'неї', 'нього')] вимагається, і [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale, 'погодилася', 'погодився')] публічно дистанціюватися від католиків та їхньої віри."
  lutheranism_events.18.a: "І слава Богу!"
  lutheranism_events.20.title: "[ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] відмовляється поступатися"
  lutheranism_events.20.desc: "Попри всі спроби пояснити, що личить спадкоємцю престолу, а що ні, [ROOT.GetCountry.GetGovernment.GetHeir.GetName] наполягає на своєму нездоровому захопленні католицькою церквою. Столичні пропагандисти та сатирики вже поширюють памфлети про те, що [ROOT.GetCountry.GetGovernment.GetRuler.GetName] не може впоратися навіть із власною дитиною, не кажучи вже про захист віри."
  lutheranism_events.20.a: "Нічого не вдієш."
  lutheranism_events.20.b: "[ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] позбудеться прав спадкування!"
  STATIC_MODIFIER_NAME_disinherited: "Позбавлення прав спадкування"
  lutheranism_events.22.title: "Надія на об'єднання"
  lutheranism_events.22.desc: "Деякі люди досі тужать за часами, коли християнська віра була єдиною. Усвідомлюючи необхідність Реформації та неминучість народження лютеранства, вони сумують через те, що ці події спричинили церковний розкол.\n\nМи розуміємо, що подібні ідеї небезпечні як для державної церкви, так і для світської влади, тому нас дуже турбує той факт, що їх поділяють деякі церковні службовці та семінаристи."
  lutheranism_events.22.a: "Словесного осуду буде достатньо."
  STATIC_MODIFIER_NAME_phillipists: "Філіппісти"
  lutheranism_events.22.b: "Заарештуємо особливо активних діячів та звинуватимо їх у зраді."
  lutheranism_events.23.title: "Лютеранська діаспора"
  lutheranism_events.23.desc: "З роз'єднанням християнства приплив релігійних біженців до нашої країни перетворився з потічка на бурхливу річку. Конфлікти у великих католицьких країнах змушують багатьох лютеран залишати батьківщину. Будучи лютеранською країною, ми можемо запропонувати їм своє заступництво, а заодно отримати прибуток від їхніх знань та багатств.\n\nЗ іншого боку, сама лютеранська віра теж далека від єдності, тому не всі біженці будуть готові цілком і повністю прийняти догмати нашої державної церкви. Надання притулку всім лютеранам без винятку було б чудовим жестом, але набагато розумніше буде пускати лише тих, чиї навички принесуть користь #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#!."
  lutheranism_events.23.a: "Відкриємо кордони для всіх лютеран."
  lutheranism_events.23.c: "Запропонуємо їм землю в Новому Світі."
  lutheranism_events.23.d: "Відмовимо їм."
  welcomed_fleeing_lutherans: "Ви прийняли біженців"
  turned_away_fleeing_lutherans: "Ви відмовили біженцям"
  lutheranism_events.27.title: "Суворий богослов"
  lutheranism_events.27.desc: "Серед нових священників, висвячених церквою #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, особливо виділяється одна людина. Маючи яскраву харизму та дар переконання, він не прагне змінити церкву відповідно до своїх поглядів, а навпаки, суворо та рішуче захищає лютеранські догми та традиції.\n\nТаке поєднання якостей, незвичайне для нинішніх часів, може принести нам чималу користь."
  lutheranism_events.27.a: "Нехай навчає наших священників."
  lutheranism_events.27.b: "Нехай бореться з єрессю."
  lutheranism_events.29.title: "Реформатор славить церкву [ROOT.GetCountry.Custom('CL_GEN')]"
  lutheranism_events.29.desc: "Один із найвидатніших умів Реформації нещодавно назвав нашу країну зразковою у своєму трактаті, а пізніше заявив про те саме під час релігійного диспуту. Немає жодних сумнівів, що це корисно як для нашої міжнародної репутації, так і для внутрішнього авторитету державної церкви."
  lutheranism_events.29.a: "Скористаємося цим для внутрішньої пропаганди."
  lutheranism_events.29.b: "Це допоможе нам зблизитися з іншими лютеранами."
  beacon_of_lutheranism: "Ідеальна лютеранська країна"
  lutheran_ideal: "Ідеальна лютеранська країна"
  lutheranism_events.30.title: "Суди над відьмами в [witch_location.Custom('LR_PREP')|l] [witch_location.GetNameWithNoTooltip]"
  lutheranism_events.30.desc: "[ROOT.GetCountry.GetLongName] — це країна, де загалом перехід від католицтва до лютеранства вже завершено, проте в її окремих місцевостях ще не визначилися, який напрямок має більший авторитет. Це особливо проявляється в [witch_location.Custom('LR_PREP')|l] [witch_location.GetName], де католицька церква нерідко влаштовувала суди над відьмами, а Реформація лише зміцнила потяг народу до відступницьких віровчень.\n\nЗараз репутацію [ROOT.GetCountry.Custom('CL_GEN')] ганьблять кілька місцевих жінок, звинувачених у чаклунстві, а ще більша їх кількість перебуває там під підозрою. Досі подібні справи розглядалися на рівні місцевих священників та бургомістрів без участі центральної влади, але зі зростанням кількості обвинувачених може знадобитися і наше втручання."
  lutheranism_events.30.a: "Схвалимо суди над відьмами."
  lutheranism_events.30.b: "Проігноруємо суди над відьмами."
  lutheranism_events.30.c: "Заборонимо суди над відьмами."
  lutheranism_events.40.title: "Країна підозрюється в захисті відьом"
  lutheranism_events.40.desc: "Спроби приборкати надмірно підозрілих мисливців на відьом у [witch_location.Custom('LR_PREP')|l] [witch_location.GetName] були абсолютно не зрозумілі місцевим населенням. Наших посланців самих звинуватили в чаклунстві, а значна частка селян стала вкрай вороже ставитися до будь-яких спроб заступитися за чорнокнижниць, які нібито наводнили регіон."
  lutheranism_events.40.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  lutheranism_events.31.title: "Ворожі памфлети"
  lutheranism_events.31.desc: "Останнім часом у країні з'явилася велика кількість памфлетів, гравюр та інших дрібних публікацій, безсумнівно, замовлених нашими ворогами. Там стверджується, що багато догматів нашої церкви вигадані виключно для зручності влади #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!.\n\nНавряд чи подібна критика здатна викликати якісь довгострокові наслідки, але прямо зараз вона завдає шкоди репутації нашої державної церкви."
  lutheranism_events.31.a: "Сумно."
  lutheranism_events.32.title: "Інкорпорація нових регіонів"
  lutheranism_events.32.desc: "Приєднавши нові регіони з лютеранським населенням, ми розпочали процес їх включення до державної церкви. Після введення церковно-парафіяльних книг ми з подивом виявили, що в цих землях проживає набагато більше жителів, ніж вважали їхні колишні господарі."
  lutheranism_events.32.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  lutheranism_events.33.title: "Пієтизм"
  lutheranism_events.33.desc: "У нашій країні виник новий лютеранський рух. Його прихильники, які називають себе пієтистами, дбають про внутрішнє спасіння, не цікавлячись догматами та теологічними студіями державної церкви."
  lutheranism_events.33.a: "Треба обмежити їхній вплив."
  lutheranism_events.33.b: "Ці пієтисти викликають інтерес."
  lutheranism_events.34.title: "Бунти іконоборців у провінції [target_province.GetNameWithNoTooltip]"
  lutheranism_events.34.desc: "Ненависть до ікон і статуй старої католицької церкви поділяють багато лютеран, тому догмат державної церкви #ONCLICK:COUNTRY,[ROOT.GetOwner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetOwner.Custom('CL_tt')],X [ROOT.GetOwner.Custom('CL_GEN')|L]#!#!, що дозволяє прикрашати храми такими образами, викликає суперечки серед вірян.\n\nНещодавно жителі провінції [target_province.GetName] розгромили безліч церков. Вони били їхні вітражі, палили ікони та трощили вівтарі, називаючи їх проявами ідолопоклонства."
  lutheranism_events.34.a: "Покараємо злочинців."
  lutheranism_events.34.b: "Відновимо постраждалі церкви."
  lutheranism_events.35.title: "Харизматичний проповідник-патріот у провінції [target_province.GetNameWithNoTooltip]"
  lutheranism_events.35.desc: "У провінції [target_province.GetName] багато невеликих лютеранських парафій, які відкидають ідею централізованої догматичної церкви.\n\nНещодавно в одній із них з'явився харизматичний проповідник, який згуртував місцеві громади та розпалив у них рішучість боротися за збереження церковної автономії."
  lutheranism_events.35.a: "З цим складно щось зробити."
  lutheranism_events.35.b: "Постараємося зменшити його вплив."