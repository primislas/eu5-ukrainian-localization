l_russian:
  propagate_religion_events.1.title: "Ісламські торговці в [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]"
  propagate_religion_events.1.desc: "#L [target_country.GetAdjective|U]і#! #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламські#!#! торговці все частіше починають відвідувати наші порти, і їхня релігія вже не здається нам чимось дивовижним. Особливо багато їх у [target_location.Custom('LR_PP')|l] [target_location.GetName], де вони вже злилися з місцевим населенням.\n\nНещодавно вони звернулися до нас із проханням побудувати безпосередньо поруч із [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip] власне поселення. Тепер [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вирішує, як до цього поставитися."
  propagate_religion_events.1.a: "Це обіцяє нам тільки хороше."
  propagate_religion_events.1.b: "Ні. Нехай залишаються там, де ними можна керувати."
  propagate_religion_events.2.title: "Місіонери [target_country.GetReligion.GetAdjectiveWithNoTooltip|l]ого ухилу"
  propagate_religion_events.2.desc: "На прийом до нас прийшли місіонери — послідовники #L #L [target_country.GetReligion.GetAdjective|l]#!ого#! вчення з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#!. Вони хочуть оселитися в [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip] та заснувати там громаду, зокрема для новонавернених. Вони не йдуть наперекір місцевій владі та нашим законам, однак присутність їхня напевно призведе до того, що релігія місіонерів поширюватиметься набагато швидше."
  propagate_religion_events.2.a: "Не можна допускати, щоб такі діячі мали якийсь вплив."
  propagate_religion_events.2.b: "Вони чудово доповнять наше суспільство."
  location_pops_convert_to_muslim.tt: "#Y 1%#! [Concept('pops','груп населення')|e] у [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip] [Concept('convert','навернеться')|e] в іншу релігію ([target_country.GetReligion.GetName|l])"
  propagate_religion_events.3.title: "Моряки-мусульмани"
  propagate_religion_events.3.desc: "Зі східних морів у теплі води на мусонах несуться кораблі — від скромних дау до величезних галер — що прагнуть пришвартуватися в численних портах. Цей потік вантажів і припасів забезпечує потреби більше половини населення світу. На галерах нерідко можна побачити #TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманських#!#! моряків з #TOOLTIP:CONTINENT,africa,X #L Африки#!#! або #TOOLTIP:SUB_CONTINENT,middle_east,X #L Близького Сходу#!#! разом із місцевими, що навернулися в іслам."
  propagate_religion_events.3.a: "Нехай ці моряки заходять і в наші порти!"
  propagate_religion_events.3.b: "На своїх кораблях ми іновірців не потерпимо."
  propagate_religion_events.4.title: "Чудо"
  propagate_religion_events.4.desc: "[Select_CString(target_character.IsFemale, 'Вчена', 'Вчений' )] з #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#!, як повідомляють, [Select_CString(target_character.IsFemale, 'винайшла', 'винайшов' )] ліки, завдяки яким деякі жителі [target_location.Custom('LR_RP')|l] [target_location.GetName] зцілилися від страшної хвороби. Вдячне населення вирішило навернутися у віру [Select_CString(target_character.IsFemale, 'своєї рятівниці', 'свого рятівника' )], щоб їх і надалі рятував [Select_CString(target_character.IsFemale, 'її', 'його' )] Бог."
  propagate_religion_events.4.a: "Це добрий знак."
  propagate_religion_events.4.b: "[ROOT.GetCountry.GetCapital.GetNameWithNoTooltip] з радістю прийме у себе цю людину."
  propagate_religion_events.5.title: "У [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip] засновано мечеть"
  propagate_religion_events.5.desc: "У #L #L [target_location.GetDominantReligion.GetAdjective|l]#!их#! вірян з [target_location.Custom('LR_RP')|l] [target_location.GetName] з'явилося нове місце для поклоніння — мечеть, куди нерідко заходять місцеві жителі. Ми не сумніваємося, що згодом вона привабить і нових поселенців, а заодно посприяє наверненню жителів області в іншу релігію.\n\nВсе вказує на те, що гроші на діяльність мечеті виділяють, зокрема, численні торговці #L #L [target_country.GetAdjective|l]#!ого#! світогляду, що ведуть справи в регіоні. Деякі державні діячі хвилюються, що таким чином вони нарощують свій вплив — і вплив своєї релігії."
  propagate_religion_events.5.a: "Ми не можемо цього допустити!"
  propagate_religion_events.5.b: "Надамо їм усю необхідну підтримку, щоб їхня громада розвивалася."
  propagate_religion.5.b.tt: "Кожен [Concept('location', 'район')|e] в області [target_location.GetArea.GetName] втратить [ShowNamedValue('control_severe_penalty')|+=2%] [Concept('control', 'контролю')|e] та отримає модифікатор «[ShowModifier('mosque_of_x')]» на #Y 10#! років"
  propagate_religion_events.6.title: "$rank_kingdom_muslim$ [ROOT.GetCountry.GetNameWithNoTooltip]?"
  propagate_religion_events.6.desc: "Панівною релігією в [ROOT.GetCountry.Custom('CF_PP')|l] повільно, але вірно стає #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!. Багато урядовців, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] та інші впливові люди поступово переймають ісламські та #TOOLTIP:LANGUAGE,arabic_language,X #L арабські#!#! уявлення про царів, імена та титули. Вони навіть відмовилися від іменування «[ROOT.GetCountry.GetFlavorRank|l]», оскільки вважають, що «султанат» звучить краще, забуваючи, що релігія нашої держави поки ще [ROOT.GetCountry.GetReligion.GetName|l]. Частина наших радників стверджує, що [target_ruler.GetName] вчинить розумно, якщо не буде цьому перешкоджати. Якщо ми самі називатимемо нашу державу султанатом, вести справи з численними ісламськими державами, можливо, стане простіше."
  propagate_religion_events.6.a: "Не найгірша думка."
  sultan_titles_for_non_muslims_tooltip: "Ми встановимо у себе #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламські#!#! титули. Наші відносини з усіма відомими #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламськими#!#! [Concept('countries','державами')|e] покращаться на #G 75#!."
  propagate_religion_events.6.b: "Ні! [ROOT.GetCountry.GetLongNameWithNoTooltip] — країна традиційних цінностей, і ми будемо їх відстоювати!"
  propagate_religion_events.7.title: "Вступ до громади віруючих"
  propagate_religion_events.7.desc: "Оскільки офіційною релігією [ROOT.GetCountry.Custom('CF_RP')|l] тепер вважається [ROOT.GetCountry.GetReligion.GetName|l], ми вступили до громади віруючих. І хоча деякі традиційно налаштовані громадяни засмучені таким вибором, наше #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламське#!#! населення радіє: тепер [ROOT.GetCountry.GetFlavorRank|l] править чесно та справедливо."
  propagate_religion_events.7.a: "[ROOT.GetCountry.GetLongNameWithNoTooltip] восторжествує!"
  sultan_conversion_tooltip: "Наші відносини з усіма відомими #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламськими#!#! [Concept('countries','державами')|e] покращаться на #G 50#!."
  propagate_religion_events.8.title: "Мандрівний учений"
  propagate_religion_events.8.desc: "До міста [ROOT.GetCountry.GetCapital.GetName] [Select_CString(target_character.IsFemale, 'прибула', 'прибув' )] учений з країни під назвою [target_country.GetName]. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] стверджує, що [Select_CString(target_character.IsFemale, 'вчилася', 'вчився' )] у багатьох знаменитих містах, а тому чудово розбирається і в політиці #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламського#!#! світу, і в премудростях богослов'я."
  propagate_religion_events.8.a: "[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] заслуговує такого діяча. Запропонувати [Select_CString(target_character.IsFemale, 'їй', 'йому' )] місце!"
  propagate_religion_events.8.b: "Постараємося дізнатися якомога більше про закордонні справи."
  propagate_religion_events.9.title: "Ісламські вожді"
  propagate_religion_events.9.desc: "У #L #L [ROOT.GetCountry.GetAdjective|l]#!ій#! глушині нерідко можна побачити невеликі володіння, де одноосібно правлять місцеві вожді; центральна влада майже не втручається в їхні справи. Однак не всі з них задоволені наявним: комусь завжди хочеться більшого, незважаючи на скромні можливості. Так, частина вождів у [target_location.Custom('LR_PP')|l] [target_location.GetName] почала називати себе султанами, а щоб виправдати цей титул — навертати своє населення в #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!."
  propagate_religion_events.9.a: "Це сміхотворно."
  propagate_religion_events.10.title: "Ісламський синкретизм"
  propagate_religion_events.10.desc: "У #L #L [ROOT.GetCountry.GetAdjective|l]#!ій#! сільській місцевості все частіше можна побачити мандрівних учених-суфіїв — містичних послідовників #TOOLTIP:RELIGIONGROUP,muslim,X #L ісламської#!#! віри. Їх з радістю приймають у себе не тільки одновірці, а й місцеві жителі, для яких ісламські вірування вже поступово почали переплітатися з їхніми власними традиціями та міфами. Отриману суміш не можна назвати гідною #TOOLTIP:LOCATION,mecca_tt,X #L Мекки#!#! або #TOOLTIP:LOCATION,cairo_tt,X #L Каїра#!#!, проте багато хто став з більшою симпатією ставитися до ісламу."
  propagate_religion_events.10.a: "Потрібно відстоювати віру, дану нам предками!"
  propagate_religion_events.10.b: "Ці люди нам нічим не нашкодять."
  propagate_religion_events.11.title: "Ісламські біженці"
  propagate_religion_events.11.desc: "На наших кордонах з'явилися біженці, що рятуються від війни в #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PP')|L]#!#!. $rank_county_arabic_ruler_male$-#TOOLTIP:RELIGIONGROUP,muslim,X #L мусульманин#!#!, що очолює їх, запевняє нас, що якщо ми виділимо їм незайняту ділянку землі, вони побудують там процвітаюче поселення і будуть працювати на благо нашої держави, ставши її підданими."
  propagate_religion_events.11.a: "У нас є для них підходяще містечко."
  propagate_religion_events.11.b: "Нехай шукають притулку де-небудь ще."