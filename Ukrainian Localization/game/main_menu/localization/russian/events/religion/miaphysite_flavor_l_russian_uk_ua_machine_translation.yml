l_russian:
  miaphysite_flavor.1.title: "Святе серце #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!"
  miaphysite_flavor.1.desc: "Колись Аксум був серцем Аксумського царства — оплоту християнської віри на перехресті Африки, Аравії та греко-римського світу. Серед його обелісків та зруйнованих палаців ми відновили кілька церков цієї могутньої стародавньої держави.\n\nНайвеличнішою з них є церква Марії Сіонської. Саме в ній ми коронуємо своїх імператорів — нащадків Менеліка I, сина Соломона та цариці Савської, який приніс до цієї церкви Ковчег Завіту. Щороку тисячі паломників з усіх кінців нашої держави та з-за її меж прибувають сюди та відвідують цю святиню."
  miaphysite_flavor.1.a: "Аксум знову засяє в безмежній славі Божій!"
  miaphysite_flavor.2.title: "Святе серце #ONCLICK:COUNTRY,[from.GetName.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.GetName.Custom('CL_tt')],X [from.GetName.Custom('CL_GEN')|L]#!#!"
  miaphysite_flavor.2.desc: "Стародавнє місто Аксум знову стало #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитським#!#!. Колись він був серцем Аксумського царства — оплоту християнської віри на перехресті Африки, Аравії та греко-римського світу. Серед знаменитих обелісків та палаців #ONCLICK:COUNTRY,[from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.Custom('CL_tt')],X [from.Custom('CL_GEN')|L]#!#! ми відновили кілька церков цієї могутньої стародавньої держави.\n\nНайвеличнішою з них є церква Марії Сіонської. У ній коронували ефіопських імператорів — нащадків Менеліка I, сина Соломона та цариці Савської, який приніс до цієї церкви Ковчег Завіту. Щороку тисячі паломників з усіх кінців нашої держави та з-за її меж прибувають сюди та відвідують цю святиню."
  miaphysite_flavor.2.a: "Аксум знову засяє в безмежній славі Божій!"
  miaphysite_flavor.3.title: "Перлина Середземномор'я"
  miaphysite_flavor.3.desc: "Радійте, вірні: священне місто Александрія знову стало #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитським#!#! Ми звільнили стародавній престол патріархів нашої святої Церкви.\n\nСтародавня та горда Александрія була заснована самим Александром Великим. Багато хто з найвидатніших умів людства називали її своїм домом. Протягом століть вчені Александрії обмінювалися знаннями у Великій бібліотеці, на зміну якій потім прийшла перша у світі Александрійська катехізична школа. У найближчі роки ми відновимо ці священні чертоги мудрості та почнемо навчати тут найкращих богословів у світі."
  miaphysite_flavor.3.a: "Боже, благослови Александрію!"
  miaphysite_flavor.4.title: "Перлина Середземномор'я"
  miaphysite_flavor.4.desc: "Радійте, вірні: священне місто Александрія знову стало #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитським#!#!! Стародавній престол патріархів нашої святої Церкви звільнений [from.GetAdjective|l]ими військами.\n\nСтародавня та горда Александрія була заснована самим Александром Великим. Багато хто з найвидатніших умів людства називали її своїм домом. Протягом століть вчені Александрії обмінювалися знаннями у Великій бібліотеці, на зміну якій потім прийшла перша у світі Александрійська катехізична школа. У найближчі роки ці священні чертоги мудрості будуть відновлені, щоб у них змогли навчатися найкращі богослови у світі."
  miaphysite_flavor.4.a: "Боже, благослови Александрію!"
  miaphysite_flavor.5.title: "Серце Вірменії"
  miaphysite_flavor.5.desc: "Нарешті [target_location.GetName] та священний Ечміадзін знову вільні! Ечміадзінський монастир — притулок нашого народу, його тиха гавань у буремні часи. Поки у нас не було своєї держави, він був нашим національним та політичним центром. Протягом вікових війн та втрат він давав нам силу та волю до боротьби — і тепер ми зможемо повернути цей борг, відновивши його у всій колишній славі та красі."
  miaphysite_flavor.5.a: "[target_location.GetNameWithNoTooltip] знову стане великим!"
  miaphysite_flavor.6.title: "$miaphysite_flavor.5.title$"
  miaphysite_flavor.6.desc: "Наші #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитські#!#! друзі з #ONCLICK:COUNTRY,[from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.Custom('CL_tt')],X [from.Custom('CL_GEN')|L]#!#! звільнили [target_location.GetName]! На початку IV століття в околицях цього міста був побудований Ечміадзінський монастир, який довгі століття залишався національним та політичним центром вірменського народу, позбавленого своєї держави. Протягом вікових війн та втрат він давав вірменам силу та волю до боротьби — і тепер вони зможуть повернути цей борг, відновивши його у всій колишній славі та красі."
  miaphysite_flavor.6.a: "Істинна віра стане ще сильнішою!"
  miaphysite_flavor.7.title: "Колиска християнства"
  miaphysite_flavor.7.desc: "Стародавнє місто Антіохія тепер належить нашій священній державі! Він був оплотом нашої віри ще за часів римлян: місцеві євреї, навернені апостолом Петром, одними з перших стали називати себе християнами. У ті часи тут було засновано багато монастирів. З тих пір Антіохія бачила чимало війн та змінила багато господарів. $mamluks$ захопили її у XIII столітті та віддали мечу всіх місцевих християн. В пам'ять про їхню жертву ми відбудуємо Антіохію та її монастирі, щоб вона стала ще прекраснішою, ніж раніше!"
  miaphysite_flavor.7.a: "Господи, благослови це місто в милості своїй!"
  miaphysite_flavor.8.title: "Колиска християнства"
  miaphysite_flavor.8.desc: "Стародавнє місто Антіохія тепер належить #L [from.GetAdjective|l]ій#! державі! Він був оплотом нашої віри ще за часів римлян: місцеві євреї, навернені апостолом Петром, одними з перших стали називати себе християнами. У ті часи тут було засновано багато монастирів. З тих пір Антіохія бачила чимало війн та змінила багато господарів. $mamluks$ захопили її у XIII столітті та віддали мечу всіх місцевих християн. В пам'ять про їхню жертву Антіохія та її монастирі будуть відбудовані та стануть ще прекраснішими, ніж раніше!"
  miaphysite_flavor.8.a: "Господи, благослови це місто в милості своїй!"
  miaphysite_flavor.9.title: "На берегах Нілу"
  miaphysite_flavor.9.desc: "Хвала Господу, Каср-Ібрім наш! Довгі роки це велике місто на скелі біля берегів могутнього Нілу, з усіх боків оточене ворогами християн, залишалося оплотом нашої віри в Нижній Нубії. Він продовжував нести світло, навіть коли весь інший регіон занурився в темряву. Втім, для нашої держави він має не тільки релігійне значення, адже це великий центр торгівлі та політики. Завдяки його ресурсам #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! вдасться стати ще сильнішим!"
  miaphysite_flavor.9.a: "Це початок нової славної ери!"
  miaphysite_flavor.10.title: "На берегах Нілу"
  miaphysite_flavor.10.desc: "Хвала Господу, Каср-Ібрім звільнений [from.GetAdjective|l]ими #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитами#!#!! Довгі роки це велике місто на скелі біля берегів могутнього Нілу, з усіх боків оточене ворогами християн, залишалося оплотом нашої віри в Нижній Нубії. Воно продовжувало нести світло, навіть коли весь інший регіон поринув у темряву. Тепер влада #ONCLICK:COUNTRY,[from.Custom('CL_tt')] #TOOLTIP:COUNTRY,[from.Custom('CL_tt')],X [from.Custom('CL_GEN')|L]#!#! скористається його величезними політичними та економічними ресурсами, щоб поширювати світло єдиного та істинного Бога по всій Нубії!"
  miaphysite_flavor.10.a: "Це початок нової славної ери!"
  miaphysite_flavor.11.title: "Монастир святого Антонія"
  miaphysite_flavor.11.desc: "У таємному оазисі серед гір біля Червоного моря знаходиться одна з наших найважливіших святинь — монастир Святого Антонія. Заснований послідовниками цього святого ще в IV столітті, він є найстарішим християнським монастирем у світі. Сам Антоній був першим з отців-пустельників: намагаючись наблизитися до Бога, він віддалився в пустелю і багато років провів далеко від людей. Коли ж почалися гоніння на християн, він повернувся до цивілізації, щоб втішати ув'язнених, ризикуючи життям заради братів по вірі. Свої останні роки він провів в оазисі, де зараз стоїть цей великий монастир. Щороку по стопах Антонія йдуть тисячі паломників — і тепер, коли Ас-Сувайс під нашим захистом, ми можемо поручитися за їхню безпеку."
  miaphysite_flavor.11.a: "Ми будемо вчитися благочестю у святого Антонія."
  miaphysite_flavor.12.title: "Монастир святого Антонія"
  miaphysite_flavor.12.desc: "У таємному оазисі серед гір біля Червоного моря знаходиться одна з наших найважливіших святинь — монастир Святого Антонія. Заснований послідовниками цього святого ще в IV столітті, він є найстарішим християнським монастирем у світі. Сам Антоній був першим з отців-пустельників: намагаючись наблизитися до Бога, він віддалився в пустелю і багато років провів далеко від людей. Коли ж почалися гоніння на християн, він повернувся до цивілізації, щоб втішати ув'язнених, ризикуючи життям заради братів по вірі. Свої останні роки він провів в оазисі, де зараз стоїть цей великий монастир. Щороку по стопах Антонія йдуть тисячі паломників — і тепер, коли Ас-Сувайс під #L [from.GetAdjective|l]ою#! захистом, їм нічого не загрожує."
  miaphysite_flavor.12.a: "Ми будемо вчитися благочестю у святого Антонія."
  miaphysite_flavor.13.title: "Монастир Святої Катерини"
  miaphysite_flavor.13.desc: "Біля підніжжя священної гори Синай, на якій Мойсей отримав Скрижалі Завіту, стоїть монастир Святої Катерини Олександрійської. Катерина була ревною ученицею та послідовницею Христа. Коли римський імператор Максенцій почав переслідувати християн, ця хоробра юна діва відкрито дорікнула йому в жорстокості. Для дебатів з нею імператор зібрав п'ятдесят своїх найкращих філософів та ораторів, але мудра Катерина перемогла їх усіх. Після цього її ув'язнили та піддали тортурам, проте це не завадило їй навернути в християнство багатьох найближчих сподвижників Максенція, вражених її красномовством та благочестям. Тоді розгніваний імператор наказав колесувати Катерину, але колесо для тортур розвалилося на частини від її дотику. Зрештою її обезголовили, але її мученицька смерть осяяла світлом Христовим чимало безбожних сердець."
  miaphysite_flavor.13.a: "Монастир Святої Катерини на Синаї тепер під нашим захистом."
  miaphysite_flavor.14.title: "Монастир Святої Катерини"
  miaphysite_flavor.14.desc: "Біля підніжжя священної гори Синай, на якій Мойсей отримав Скрижалі Завіту, стоїть монастир Святої Катерини Олександрійської. Катерина була ревною ученицею та послідовницею Христа. Коли римський імператор Максенцій почав переслідувати християн, ця хоробра юна діва відкрито дорікнула йому в жорстокості. Для дебатів з нею імператор зібрав п'ятдесят своїх найкращих філософів та ораторів, але мудра Катерина перемогла їх усіх. Після цього її ув'язнили та піддали тортурам, проте це не завадило їй навернути в християнство багатьох найближчих сподвижників Максенція, вражених її красномовством та благочестям. Тоді розгніваний імператор наказав колесувати Катерину, але колесо для тортур розвалилося на частини від її дотику. Зрештою її обезголовили, але її мученицька смерть осяяла світлом Христовим чимало безбожних сердець."
  miaphysite_flavor.14.a: "Монастир Святої Катерини на Синаї тепер під [from.GetAdjectiveWithNoTooltip]ою захистом."
  miaphysite_flavor.15.title: "Патріарх Африки"
  miaphysite_flavor.15.desc: "Хвала Господу за цей великий день! Усі міафізити святкуватимуть цю перемогу протягом століть. Ми нарешті звільнили блаженнішого Патріарха Олександрійського з каїрської золотої клітки! Нам більше не потрібно плазувати перед ворогами і десятиліттями чекати рукоположення нових єпископів. Це найважливіший крок на шляху до відродження #TOOLTIP:RELIGION,$miaphysite_tt$,X #L Міафізитської#!#! церкви у всій її величі."
  miaphysite_flavor.15.a: "Тепер нас ніщо не зупинить!"
  miaphysite_flavor.16.title: "Патріарх Африки"
  miaphysite_flavor.16.desc: "Хвала Господу за цей великий день! Усі міафізити святкуватимуть цю перемогу протягом століть. [from.GetAdjective]і влада нарешті звільнила блаженнішого Патріарха Олександрійського з каїрської золотої клітки! Нам більше не потрібно плазувати перед ворогами і десятиліттями чекати рукоположення нових єпископів. Це найважливіший крок на шляху до відродження #TOOLTIP:RELIGION,$miaphysite_tt$,X #L Міафізитської#!#! церкви у всій її величі."
  miaphysite_flavor.16.a: "Благослови Господь [from.Custom('CL_ACC')]!"
  miaphysite_flavor.20.title: "Важливість освіти"
  miaphysite_flavor.20.desc: "Наші монастирі відомі як найбільші центри науки та мистецтва. У кожній з монастирських шкіл викладають видатні фахівці з історії Церкви, тлумачення Священного Писання, граматики, поезії, музики, каліграфії та малювання. Монастирі борються за найвідоміших майстрів, пропонуючи їм почесті та щедру плату. Натомість вчені передають свої знання учням, до числа яких входять майбутні священники та амбітні нащадки знаті. Щоб увійти до християнської еліти, мало народитися в могутній родині: кожен, хто хоче відігравати суттєву роль в управлінні країною, повинен отримати гарну освіту в одній з монастирських шкіл.\n\nНещодавно дві такі школи попросили нас про підтримку. Якщо ми візьмемо їх під своє покровительство, вони напевно сприятимуть зростанню просвіти в нашій державі."
  miaphysite_flavor.20.a: "Ми підтримаємо школу, що спеціалізується на управлінні."
  miaphysite_flavor.20.a.tt: "Вкладемо кошти в монастирську школу, що спеціалізується на управлінні"
  miaphysite_flavor.20.b: "Найкраще вкласти кошти в дипломатію."
  miaphysite_flavor.20.c: "Ці інституції й так достатньо впливові. Може, це їм слід підтримувати нас?"
  miaphysite_flavor.30.title: "У пошуках душі"
  miaphysite_flavor.30.desc: "Кілька релігійних диспутів тут, пара вражаючих суперечок про людську мораль там — і ось один із наших найосвіченіших аристократів збирається прийняти чернечий постриг. «Я піду стопами Шенуди Архімандрита — і одного дня, можливо, навіть заснує власний монастир!» — вигукує він.\nОчевидно, далеко не всі згодні з цим рішенням аристократа. Хоча він уже почав роздавати своє майно, можливо, у вас ще є шанс його переконати."
  miaphysite_flavor.30.a: "Таке завзяття знадобилося б у деяких наших провінціях…"
  miaphysite_flavor.30.b: "Стривай! Вчені потрібні нам при дворі!"
  miaphysite_flavor.30.c: "Дозволимо йому шукати Бога."
  miaphysite_flavor.30.c.tt: "Аристократ покине двір, щоб жити в усамітненні."
  miaphysite_flavor.31.title: "Білий монастир"
  miaphysite_flavor.31.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] прислав до нас своїх представників із проханням підтримати відновлення старовинного монастиря, де, за чутками, колись жив сам Шенуда Архімандрит. Фундамент його кам'яних стін був закладений тисячу років тому, а зараз місцеві віряни готові на все, щоб відродити його колишню славу. «З вашою допомогою він знову стане оплотом мудрості та вивчення Святого Письма», — запевняють вони."
  miaphysite_flavor.31.a: "Нехай отримають свої книги!"
  miaphysite_flavor.31.b: "Знання не обмежується лише вченістю."
  miaphysite_flavor.32.title: "Нова ера"
  miaphysite_flavor.32.desc: "Ми отримали звістку про те, що в провінції [pious_province.GetName] є група жителів, які регулярно збираються в сільській місцевості. Судячи з усього, там вони поклоняються нашому Господу. Можливо, нам варто виділити їм кошти на будівництво церкви."
  miaphysite_flavor.32.a: "Благочестя має винагороджуватися! Побудуємо для них церкву!"
  miaphysite_flavor.32.b: "У нас є важливіші справи."
  miaphysite_flavor.33.title: "Брати по вірі"
  miaphysite_flavor.33.desc: "Ми, #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізити#!#!, пишаємося своєю вірою. Ми тверді у своїх переконаннях і ніколи не кинемо Христа, але ізоляція від решти християнського світу є нашою слабкістю. Іновірці тіснять нас з усіх боків. Війна неминуча — питання лише в тому, коли вона почнеться. Поки ж цього не сталося, нам слід шукати союзників. Кажуть, що десь на півночі є могутня християнська держава, але її точне розташування, як і відстань до її кордонів, нам невідоме. Втім, ми можемо відправити експедицію на її пошуки."
  miaphysite_flavor.33.a: "Відправимо загін наших найкращих мандрівників, священників і дипломатів!"
  miaphysite_flavor.33.a.tt: "Ми відправимо експедицію на північ, щоб знайти братів по вірі. Її успіх не гарантований, але вона дасть нам шанс отримати допомогу в боротьбі з ворогами християнства."
  miaphysite_flavor.33.b: "Коли з нами Бог, нам більше ніхто не потрібен."
  miaphysite_flavor.33.b.tt: "Експедиція не буде відправлена."
  miaphysite_flavor.34.title: "Книги чи мечі"
  miaphysite_flavor.34.desc: "На наші землі увійшло посольство із сусідньої #TOOLTIP:RELIGION,$miaphysite_tt$,X #L міафізитської#!#! держави під назвою [sent_diplomats.GetName]. У ньому незвично багато священників. Наші радники підозрюють, що посольство збирається вступити в контакт з іншими християнами на півночі, самі ж дипломати вперто мовчать про свої цілі. Можливо, вони всього лише хочуть обговорити якісь релігійні питання, але що, якщо наші сусіди намагаються знайти союзників для війни з нами? Тоді невірні фанатики загрожуватимуть нам одразу з кількох сторін!"
  miaphysite_flavor.34.a: "Це лише припущення. Ми пропустимо [sent_diplomats.GetAdjectiveWithNoTooltip]их дипломатів."
  miaphysite_flavor.34.b: "Ми не можемо ризикувати. Затримаємо їх."
  opinion_captured_diplomats: "Полонені дипломати"
  miaphysite_flavor.35.title: "Ворог віри"
  miaphysite_flavor.35.desc: "До нас дійшла звістка, що наш презирливий сусід, [muslim_neighbor.GetGovernment.GetGovernmentType.GetName|l] [muslim_neighbor.GetName], захопив у полон наших посланців і не дозволяє їм ані продовжити шлях, ані повернутися на батьківщину. Залишається лише сподіватися, що ці іновірці все-таки передумають. Хай там як, цей віроломний напад на мирне посольство підтвердив наші підозри: [muslim_neighbor.GetName] — небезпечний ворог нашої істинної віри."
  miaphysite_flavor.35.a: "Нехай Господь покарає невірних!"
  miaphysite_flavor.36.title: "Брати з-за моря"
  miaphysite_flavor.36.desc: "Іноді життя нагадує нам, наскільки величезний світ за межами відомих нам земель. Нещодавно до нас явилися незвичайні посланці з далекої південної країни. Вони говорять дивною незнайомою мовою, але дехто з них все ж зміг порозумітися з нашими перекладачами арабською. Ці люди стверджують, що велика держава, [sent_diplomats.GetGovernment.GetGovernmentType.GetName|l] [sent_diplomats.GetName], послала їх шукати друзів серед інших християнських країн. Ми мало що знаємо про християн півдня, але, схоже, ці [sent_diplomats.GetAdjectiveWithNoTooltip|l]і посланці цілком благочестиві. Вони говорять про Христа з належним трепетом і розбираються в Писанні краще багатьох наших аристократів. Судячи з усього, їхня країна оточена іновірцями, тому вони просять про допомогу в захисті істинної віри. Ця війна надто далека і невідома, щоб втручатися в неї безпосередньо, але ми можемо поділитися з братами по вірі своїми знаннями та ресурсами."
  miaphysite_flavor.36.a: "Звісно, ми допоможемо вам, брати. Все що завгодно заради єдиного істинного Бога!"
  miaphysite_flavor.36.a.tt: "#L [sent_diplomats.GetAdjective]і#! посланці вирушать додому з ресурсами, які допоможуть їм захищати християнство."
  miaphysite_flavor.36.b: "Це не наша справа. У нас вистачає своїх війн."
  miaphysite_flavor.36.b.tt: "#L [sent_diplomats.GetAdjective]і#! посланці вирушать додому з порожніми руками."
  miaphysite_flavor.37.title: "Іноземні друзі"
  miaphysite_flavor.37.desc: "Хвала Господу! Наші посланці нарешті повернулися з подорожі на північ. Вони живі та здорові, та до того ж привезли з собою чимало цінних книг та цікавих історій. Далека християнська держава, [faraway_catholic.GetGovernment.GetGovernmentType.GetName|l] [faraway_catholic.GetName], вельми радо їх прийняла. Хоча ми розраховували отримати не тільки знання, ми вдячні Господу та братам по вірі за будь-яку допомогу. Ми подбаємо, щоб їхні дари не пропали даремно."
  miaphysite_flavor.37.a: "Можливо, це початок вічної дружби між нашими державами?"
  miaphysite_flavor.38.title: "Самі в цілому світі"
  miaphysite_flavor.38.desc: "Посланці, яких ми відправили на північ, нарешті повернулися після довгої та важкої подорожі. Вони дійсно знайшли християнську країну, але повернулися звідти з порожніми руками. Їм довелося розмовляти з багатьма християнами, але мало кому з них було діло до наших бід. Схоже, ми прокляті подвійно: мало того, що нас оточують вороги, так ще й віддаленість від решти християнського світу робить нас вигнанцями навіть серед братів по вірі. Їх не турбують справи #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, а наші звичаї здаються їм дивними та чужими. Мабуть, міафізити і справді самотні в цьому світі."
  miaphysite_flavor.38.a: "Ми не можемо втрачати віру. Нам не потрібні інші союзники, крім Господа."