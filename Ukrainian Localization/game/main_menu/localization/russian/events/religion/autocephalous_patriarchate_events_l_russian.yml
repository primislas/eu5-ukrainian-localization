l_russian:
 ap_falls_desc_key: "После сложной осады оборона отважного гарнизона была сломлена, и [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] пал перед нашими могучими армиями. Внутри стен города находится влиятельная религиозная организация: раньше здесь заседали верховные #TOOLTIP:RELIGION,$orthodox_tt$,X #L православные#!#! служители. Стоит ли нам упразднить этот братский институт или принять его под своё покровительство?"
 ap_diplomatic_desc_key: "После того, как [scope:winner.GetFlavorRank|l] [scope:winner.GetName] включает в свой состав [target_location.Custom('LR_ACC')|l] [target_location.GetName],"
 ap_falls_desc_key_2: "Внутри стен города находится влиятельная религиозная организация: раньше здесь заседали верховные #TOOLTIP:RELIGION,$orthodox_tt$,X православные служители. Стоит ли нам упразднить этот братский институт или принять его под своё покровительство?"
 autocephalous_patriarchates.1.title: "Автокефальный патриархат пал!"
 autocephalous_patriarchates.1.desc: "$ap_falls_desc_key$"
 autocephalous_patriarchates.1.desc_diplomatic: "$ap_diplomatic_desc_key$ [target_ap.GetName] со своей кафедрой попадают под нашу юрисдикцию. Теперь нам предстоит решить, как поступить с этим патриаршим институтом."
 autocephalous_patriarchates.1.a: "Распустим патриархат."
 autocephalous_patriarchates.1.b: "Сохраним патриархат."
 autocephalous_patriarchates.1.c: "Теперь мы будем сами вести дела с патриархом."
 every_member_of_scopeloser_ap_loses_opinion_of_scopewinner_tt: "Все участники патриархата «[target_ap.GetName]» получат [ShowBiasValue('destroyed_my_autocephalous_patriarchate')|+=0] к мнению о нас"
 every_member_of_winner_ap_gains_opinion_of_scopewinner_tt: "Каждый участник патриархата «[target_winner_ap.GetName]» получит [ShowBiasValue('destroyed_another_autocephalous_patriarchate')|+=0] к мнению о нас"
 autocephalous_patriarchates.2.title: "Автокефальный патриархат пал!"
 autocephalous_patriarchates.2.desc: "$ap_falls_desc_key$"
 autocephalous_patriarchates.2.desc_diplomatic: "$ap_diplomatic_desc_key$ $ap_falls_desc_key_2$"
 autocephalous_patriarchates.2.a: "Распустим патриархат."
 autocephalous_patriarchates.2.b: "Сохраним патриархат."
 autocephalous_patriarchates.3.title: "Восстановление патриархата [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
 autocephalous_patriarchates.3.desc: "[recipient.GetName] вновь располагается в [target_location.Custom('LR_PREP')|l] [target_location.GetName], и теперь [target.GetType.GetName|l] воссияет ярче прежнего. Очень скоро патриархат вновь обретёт подобающее величие и вернёт себе авторитет в вопросах веры."
 autocephalous_patriarchates.3.a: "Во славу [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ой веры!"
