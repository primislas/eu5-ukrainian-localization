l_russian:
  hussite_flavor.1.title: "Людина культури"
  hussite_flavor.1.desc: "[GetCharacter('boh_jan_hus').GetName] навчає своїх послідовників засновувати нові місця для поклоніння, щоб закарбовувати образи божества та шукати сутність віри в благочестивому мистецтві й теологічних дебатах.\n\nЗнаючи, як ми цінуємо творчість і талант, [Select_CString(target_artist.IsFemale, 'художниця', 'художник' )] [target_artist.GetName] пропонує нам свої послуги."
  hussite_flavor.1.a: "[Select_CString(target_artist.IsFemale, 'Її', 'Його' )] праці будуть для нас корисні."
  hussite_flavor.1.b: "У нас немає зайвих грошей."
  hussite_flavor.2.title: "Багато видатних [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] не згодні з нашою політикою"
  hussite_flavor.2.desc: "Управління народом — справа непроста. Багато [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] намагаються піднестися в адміністративній ієрархії, щоб виправити нашу політику відповідно до своїх переконань. На їхню думку, багато наших законів або не дотримуються, або прямо порушують #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситські#!#! заповіді."
  hussite_flavor.2.a: "Ми змінимо наш курс."
  hussite_flavor.2.b: "Вони мовчатимуть."
  hussite_flavor.3.title: "Друзі в чужих землях"
  hussite_flavor.3.desc: "Попри всю нашу боротьбу з єретиками, у ці жорстокі часи ми не маємо ані найменшого бажання завдавати шкоди тим, хто підтримує добрі стосунки з нами та поважає нашу віру. Так, духовні влади #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! нещодавно висловили зацікавленість у культурному та літературному обміні з нашою країною. Якщо ми скористаємося цим з розумом, у нас є шанс досягти великих дипломатичних успіхів та обзавестися новими союзниками."
  hussite_flavor.3.a: "Зв'язатися з ними"
  hussite_flavor.3.b: "Нам не потрібні супутники в цій подорожі…"
  trust_religious_comprehension: "Розуміння релігії"
  hussite_flavor.4.title: "Відсутність божественної гармонії"
  hussite_flavor.4.desc: "Чи не замало ми молимося? Чи не перетворилося Святе Причастя на простий рутинний обов'язок? Схоже, спрощуючи церковні ритуали, як навчав нас [GetCharacter('boh_jan_hus').GetName], ми втратили щось, без чого жодне благочестя не дасть нам відчути особистий зв'язок з Богом. У результаті багато жителів [target_location.Custom('LR_GEN')|l] [target_location.GetName] зі зброєю в руках повстали проти занепаду, що вразив нашу церкву…"
  hussite_flavor.4.a: "У цьому винні лише ми самі…"
  hussite_flavor.4.b: "У всьому винні слабкі високопоставлені [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]."
  target_character_dies_very_violently_tt: "[target_character.GetName] буде [Select_CString(target_character.IsFemale, 'розірвана', 'розірваний' )] натовпом"
  hussite_flavor.5.title: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip] відступає від віри"
  hussite_flavor.5.desc: "Наш народ славиться своїм інтересом до чужоземних культів. У тому, що між спорідненими релігіями є багато спільного, є своя правда, але в [target_location.Custom('LR_PREP')|l] [target_location.GetName] все це зайшло занадто далеко: навіть прості селяни масово цікавляться чужими богослужбовими обрядами та намагаються читати священні книги іновірців!"
  hussite_flavor.5.a: "Нехай насолоджуються свободою віросповідання!"
  hussite_flavor.5.b: "Нам слід ненав'язливо втрутитися."
  hussite_flavor.5.c: "Може, їм час скуштувати батога?"
  hussite_flavor.5.d: "Нехай їхня віра процвітає."
  hussite_flavor.5.e: "Ми цього не допустимо."
  hussite_flavor.6.title: "Міжрелігійна співпраця"
  hussite_flavor.6.desc: "По всій країні ширяться чутки, що на ключових посадах нашої ради оселилися єретики! Втім, [target_character.GetName] попри всі плітки знову і знову доводить свою незамінність: пропоновані [Select_CString(target_character.IsFemale, 'нею', 'ним' )] закони допомагають збільшувати наш вплив як у межах країни, так і за її межами."
  hussite_flavor.6.a: "[Select_CString(target_character.IsFemale, 'Її', 'Його' )] належить вигнати з ради!"
  hussite_flavor.6.b: "Нехай [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] скаржаться скільки завгодно!"
  hussite_flavor.6.c: "Співпраця — ключ до процвітання!"
  hussite_flavor.7.title: "Тихі піснеспіви в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  hussite_flavor.7.desc: "У золотих променях ранкового сонця, що осявають [target_location.Custom('LR_ACC')] [target_location.GetName], лунають ангельські голоси проповідників. Солодкозвучний спів, що славить віру та благочестя, лунає в усіх наших святих місцях, але тут він сповнений особливої любові та мудрості. І зараз місцеві жителі обирають тему для нових піснеспівів."
  hussite_flavor.7.a: "Нехай вони славлять нашу віру!"
  hussite_flavor.7.b: "[target_character.GetNameWithNoTooltip] — ось кого вони повинні славити."
  hussite_flavor.7.c: "Оспіваймо хвалу стійкості та процвітанню нашого народу."
  hussite_flavor.8.title: "Релігійні чвари в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  hussite_flavor.8.desc: "Суперечки про питання віри нерідко переходять у люті бійки. Після недавніх дебатів з єретиками з [target_location.Custom('LR_GEN')|l] [target_location.GetName] місцеве [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] втекло звідти, побоюючись за своє життя. Тепер вони сердито просять нас втрутитися і придушити смуту в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip], доки вона не переросла у відкрите повстання…"
  hussite_flavor.8.a: "Ми повинні втрутитися."
  hussite_flavor.8.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] не заслуговують нашої уваги."
  hussite_flavor.9.title: "Вчення Яна Гуса поширюється"
  hussite_flavor.9.desc: "Вітер змін мчить над землею, несучи з собою революційне вчення Яна Гуса та світ гуситської віри. Розчаровані та пригноблені знаходять у ньому розраду, повстаючи проти усталеного порядку.\n\nІдеї гуситів поширюються подібно до лісової пожежі, захоплюючи серця та уми простолюду. Їхня простота та прямота набагато ближчі народу, ніж порочна розкіш Католицької церкви. Наближається година повстання: все більше людей звільняється від кайданів традиції та приймає нове бачення духовності."
  hussite_flavor.9.a: "У наших межах."
  hussite_flavor.9.b: "До наших сусідів."
  hussite_flavor.10.title: "Бойові вози та військова тактика"
  hussite_flavor.10.desc: "У роки #TOOLTIP:SITUATION,hussite_wars,X #L Гуситських війн#!#! перемогам #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситів#!#! чимало сприяло застосування бойових возів — надійно захищених пересувних укріплень, завдяки яким піхотні загони селян успішно відбивали натиски смертоносної ворожої кінноти. Таким дотепним чином вони за допомогою нечисленних підручних засобів змогли врівноважити і відставання в спорядженні та тактиці, і повну відсутність традиційної кавалерії.\n\nОднак прогрес не стоїть на місці. Поява пороху та винахід нових маневрів змінили вигляд війни. Армії тепер покладаються на потужні обстріли та рухливі з'єднання, і це слід мати на увазі. Деякі військові теоретики пропонують впровадити нові методи наступу на шкоду традиційним способам оборони."
  hussite_flavor.10.a: "Ми не зрадимо традиції!"
  hussite_flavor.10.b: "Не будемо покладатися на застарілу тактику. Нам потрібна реформа!"
  reform_hussite_army_tt: "Поки діє [Concept('modifier', 'модифікатор')|e] «[ShowModifier('hussite_military_reform_modifier')]», нам буде доступне [Concept('parliament_issue', 'парламентське питання')|e] «[ShowParliamentIssueType('hussite_army_reform')]»"
  stability_loss_depends_on_defensive_sv_tt: "Втрата [Concept('stability', 'стабільності')|e] залежить від нашої [Concept('societal_value', 'суспільної цінності')|e] #TOOLTIP:SOCIETAL_VALUE,offensive_vs_defensive,X #L оборони#!#!"
  event_may_reoccur_after_20_years_tt: "Ця [Concept('event', 'подія')|e] може повторитися через #Y 20#! років, якщо ми будемо й надалі дотримуватися #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситства#!#!"
  hussite_flavor.12.title: "Гуситські фанатики в провінції [target_province.GetNameWithNoTooltip]"
  hussite_flavor.12.desc: "Хоч би як ми не намагалися задовольнити всі потреби та бажання вірян у [ROOT.GetCountry.Custom('rank_ru_PREP')|l], невдоволені будуть завжди, — як, втім, і ті, хто прагне гонінь. Саме так поводяться #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситські#!#! фанатики з провінції [target_province.GetName], які вимагають від нас переслідування єретиків. І хоча ці вимоги безглузді, блюзнірські та загрожують лише посилити напруженість, ставитися до них слід вкрай обережно, інакше ми власноруч створимо нових мучеників."
  hussite_flavor.12.a: "Поки що підемо їм назустріч."
  every_hussite_in_target_province_10_sat_tt: "Усі гуситські [Concept('pop', 'групи населення')|e] у провінції [target_province.GetNameWithNoTooltip] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  hussite_flavor.12.b: "З дурнями переговорів не ведемо!"
  hussite_flavor.11.title: "Піснеспіви вірян"
  hussite_flavor.11.desc: "Зібравшись разом, віряни співають хвалебні пісні, що втілюють у собі дух #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситського#!#! руху. Вони не лише пробуджують у серцях інших благоговіння, а й відкривають жителям країни очі на пишноту нашої культури та поглядів. Сила та стійкість наших вірувань, доблесть та відвага нашої країни — ось що оспівується в гімнах, які сьогодні слухає [ROOT.GetCountry.GetLongName]."
  hussite_flavor.11.a: "Справжня насолода для вух!"
  hussite_flavor.13.title: "Проповіді високого рівня"
  hussite_flavor.13.desc: "Серед #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситів#!#! у [target_location.Custom('LR_PREP')|l] [target_location.GetName] [Select_CString(target_character.IsFemale, 'з'явилася проповідниця', 'з'явився проповідник' )] — людина впливова, яка вміє прихиляти до себе інших і при цьому дотримується поглядів, що сильно розходяться з нашим вченням. Деякі вважають [Select_CString(target_character.IsFemale, 'її', 'його' )] справжнім пророком, інші ж побоюються, що [Select_CString(target_character.IsFemale, 'її', 'його' )] проповіді призведуть до розколу. Своє ставлення до цього питання голосно висловили й [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]. Однак якщо ми спробуємо якось [Select_CString(target_character.IsFemale, 'їй', 'йому' )] перешкодити, місцеві жителі можуть збунтуватися."
  hussite_flavor.13.a: "[Select_CString(target_character.IsFemale, 'Її', 'Його' )] ораторські здібності можуть нам стати в пригоді."
  hussite_flavor.13.b: "Змусити [Select_CString(target_character.IsFemale, 'її', 'його' )] зникнути."
  hussite_flavor.13.c: "[target_location.GetNameWithNoTooltip] страждає від засилля єретиків; настав час їх позбутися."
  target_character_disappears: "[target_character.GetName] зникне"
  hussite_flavor.14.title: "Гуситська Біблія"
  hussite_flavor.14.desc: "Триває робота над повним перекладом Біблії народною мовою, зрозумілою #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситам#!#!, щоб ознайомитися з Писанням у новітньому виданні зміг кожен, хто забажає. Цю новину з радістю сприйняли віряни, зокрема такі видатні релігійні діячі, як [target_character_1.GetName], [target_character_2.GetName] та [target_character_3.GetName]. Вони навіть готові взяти переклад на себе — кожен з них підійде до тексту у власній манері та в міру своїх здібностей. Це, звісно, вимагатиме значних витрат, проте нас переконують, що подібна просвітницька діяльність того варта."
  hussite_flavor.14.a: "Цю роботу виконає [target_character_1.GetShortNameWithNoTooltip]."
  hussite_flavor.14.b: "Нехай цим займеться [target_character_2.GetNameWithNoTooltip]."
  hussite_flavor.14.c: "Переклад нам забезпечить [target_character_3.GetNameWithNoTooltip]."
  hussite_flavor.14.d: "Зараз такі витрати неприпустимі."
  hussite_flavor.15.title: "Захисники гуситства"
  hussite_flavor.15.desc: "У наших землях продовжує лютувати війна. Противники #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситської#!#! віри невблаганно насуваються, і на заклик захистити своє віровчення відгукуються все нові жителі [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Селяни, ремісники та міщани, які почули від проповідників славне ім'я «[GetCharacter('boh_jan_hus').GetName]», готові братися за зброю, щоб відстояти батьківщину. Деякі пропонують зібрати з них народне ополчення та послати його на підмогу військам, що б'ються на передовій. Противники цього підходу, навпаки, стверджують, що ополченцям краще доручити укріплення міст та підготовку барикад, щоб наступ ворога розбився об нашу оборону."
  hussite_flavor.15.a: "Вони встановлять мир — силою!"
  hussite_flavor.15.b: "Відправити їх укріплювати наші території."
  scales_with_tolerance_own_tt: "[Concept('manpower', 'Кількість отриманих рекрутів')|e] залежить від нашої [Concept('tolerance', 'терпимості')|e] до гуситської [Concept('religion', 'релігії')|e]"