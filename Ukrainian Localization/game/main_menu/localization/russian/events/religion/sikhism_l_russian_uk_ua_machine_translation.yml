l_russian:
  lots_of_sikhs: "Багато [Concept('pops', 'груп населення')|e] в нашій [Concept('country', 'країні')|e] тепер сповідують #TOOLTIP:RELIGION,$sikhism_tt$,X #L сикхізм#!#!."
  sikhism.1.title: "Вчення сикхів"
  sikhism.1.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] розташований на кордоні між землями, де поширені #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїзм#!#! та #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!. Саме тут, серед усіх релігійних відмінностей та конфліктів, людина на ім'я [target_character.GetName] почала проповідувати про те, що істина — не в індуїзмі і не в ісламі, а в єдиному Богові, який не належить ні тій, ні іншій вірі.\n\nТака зневага до стародавніх звичаїв розгнівала [target_religion.GetAdjectiveWithNoTooltip|l]их послідовників, проте нове вчення, що заперечує відмінності між релігіями, вкоренилося серед населення. Його послідовники називають себе сикхами і поширюють свою віру по всій території [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
  sikhism.1.a: "[ROOT.GetCountry.GetLongNameWithNoTooltip] — тут такому немає місця."
  sikhism.1.b: "Ми повинні поговорити з людиною на ім'я [target_character.GetShortNameWithNoTooltip] про сикхізм."
  sikhism.1.c: "[target_character.GetNameWithNoTooltip] говорить правильні речі. Ми станемо прихильниками цього вчення."
  sikhism.2.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.2.desc: "«Ви не називали б смерть поганою, якби знали, як по-справжньому вмирати».\n\n[Select_CString(previous_guru.IsFemale, 'Засновниця', 'Засновник' )] нашої віри [previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'померла', 'помер' )]. Тіло [Select_CString(previous_guru.IsFemale, 'її', 'його' )] обернулося на прах, проте дух [Select_CString(previous_guru.IsFemale, 'її', 'його' )] носить у собі [target_character.GetName] — [Select_CString(target_character.IsFemale, 'вихованка', 'вихованець' )] цієї людини, [Select_CString(target_character.IsFemale, 'її вірна послідовниця', 'його вірний послідовник' )] і майже що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Сьогодні [target_character.GetName] продовжує справу турботи про #L [ROOT.GetCountry.GetReligion.GetAdjective|l]у#! громаду і допомагає переходити на новий алфавіт для навчання молоді."
  sikhism.2.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle] продовжує осяювати нас своїм блиском."
  sikhism.2.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_angad_guruship')]»"
  sikhism.3.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.3.desc: "[previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'померла', 'помер' )], і тепер новим гуру вважається [Select_CString(previous_guru.IsFemale, 'її вірна прислужниця', 'його вірний прислужник' )] [target_character.GetName] — людина неймовірно скромна, але при цьому старанно дотримується заповітів, які наказує дотримуватися [ROOT.GetCountry.GetReligion.GetName|l], і допомагає закріплювати в країні рівність. Цим [Select_CString(target_character.IsFemale, 'вона заслужила', 'він заслужив' )] повагу серед простого люду. [target_character.GetName] [Select_CString(target_character.IsFemale, 'заснувала', 'заснував' )] посаду «масанд». Ці люди займаються поширенням нашої релігії в краях, про які [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] може тільки мріяти."
  sikhism.3.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] — це сила для слабких і свобода для невільників!"
  sikhism.3.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_amar_das_guruship')]»"
  sikhism.4.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.4.desc: "[previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'покинула', 'покинув' )] нас, і тепер новим гуру вважається [Select_CString(previous_guru.IsFemale, 'її послідовниця', 'його послідовник' )] [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] буде керувати будівництвом нашого священного міста і направляти учнів до просвітлення за допомогою не тільки медитації наодинці, але й залученості в життя громади та одновірців — послідовників #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ого#! вчення."
  sikhism.4.a: "[ROOT.GetCountry.GetReligion.GetGodName] вище, ніж [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] вище, ніж ми. Такий ланцюг підпорядкування."
  sikhism.4.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_ram_das_guruship')]»"
  sikhism.5.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.5.desc: "Після того як [Select_CString(previous_guru.IsFemale, 'померла', 'помер' )] [previous_guru.GetName], титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l]» [Select_CString(target_character.IsFemale, 'взяла', 'взяв' )] [target_character.GetName], хоча проти цього і заперечували [Select_CString(target_character.IsFemale, 'її', 'його' )] суперники. Щоб зберегти знання та піснеспіви, що залишилися від колишніх вчителів, [target_character.GetShortNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'взялася', 'взявся' )] за працю під назвою «[ShowPolicyName('adi_granth')]». У цьому духовному трактаті — повчання багатьох великих вчителів. Долучитися до них може будь-хто охочий — так проголошує [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]. Крім того, [Select_CString(target_character.IsFemale, 'вона почала', 'він почав' )] будівництво величного храму під назвою Хармандир-Сахіб. Тепер кожен, хто сповідує #L [ROOT.GetCountry.GetReligion.GetAdjective|l]у#! віру, можуть тут збиратися і проводити обряди поклоніння."
  sikhism.5.a: "Ми не тільки збережемо, але й примножимо наші знання."
  sikhism.5.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «Unlocks [ShowLawName('guru_arjan_guruship')]»"
  sikhism.6.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.6.desc: "«Подібно до того як я розламую принесені тобою цибулини, твій син буде трощити голови своїх ворогів. Він стане одночасно і незрівнянним воїном, і найвеличнішим гуру».\n\nТак [previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'сказала', 'сказав' )] про свого спадкоємця на ім'я [target_character.GetName]. Світ змінився. Ті, хто сповідує #L [ROOT.GetCountry.GetReligion.GetAdjective|l]у#! віру, більше не можуть розраховувати на милосердя ворога, проте вони завжди готові піти війною на тих, хто думає, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] і [Select_CString(target_character.IsFemale, 'її', 'його' )] послідовники заслуговують лише мучеництва."
  sikhism.6.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] не буде гребувати мечем."
  sikhism.6.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] відкриває доступ до правила «[ShowLawName('guru_hargobind_guruship')]»"
  sikhism.7.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.7.desc: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'послідовниця', 'послідовник' )] гуру на ім'я [previous_guru.GetName] — довго [Select_CString(target_character.IsFemale, 'готувалася', 'готувався' )] до того, щоб стати гуру, і сьогодні цей час настав. [target_character.GetNameWithNoTooltip] [Select_CString(target_character.IsFemale, 'засвоїла', 'засвоїв' )] науку смертного бою та управління військом, проте [Select_CString(target_character.IsFemale, 'сама', 'сам' )] має більш лагідну вдачу і любить усе живе без винятку, і тому намагається шукати дипломатичні рішення."
  sikhism.7.a: "Досить битв. Час заліковувати рани."
  sikhism.7.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_har_rai_guruship')]»"
  sikhism.8.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.8.desc: "[previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'пішла', 'пішов' )] у світ інший, і тепер [Select_CString(previous_guru.IsFemale, 'її', 'його' )] обов'язки буде виконувати [Select_CString(target_character.IsFemale, 'юна послідовниця', 'юний послідовник' )] на ім'я [target_character.GetName], [Select_CString(target_character.IsFemale, 'обрана', 'обраний' )] тому, що інші кандидати часто ставлять практичний і дипломатичний підхід вище своєї віри. І хоча [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — людина правовірна і милостива, в силу [Select_CString(target_character.IsFemale, 'її', 'його' )] юних років можливості нашої дипломатії зараз дещо обмежені."
  sikhism.8.a: "Ми благословенні, адже нами править [ROOT.GetCountry.GetGovernment.GetRulerTitle|l]."
  sikhism.8.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_har_krishan_guruship')]»."
  sikhism.9.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.9.desc: "На превеликий жаль, [previous_guru.GetName] [Select_CString(previous_guru.IsFemale, 'покинула', 'покинув' )] наш світ. Обрати наступника вдалося не відразу, однак тепер точно відомо, що титул «[ROOT.GetCountry.GetGovernment.GetRulerTitle|l]» отримає [target_character.GetName] — замкнута в собі людина, проте неодноразово проявляла себе вмілим і цілеспрямованим керівником. Попри нелюбов до обрядів і церемоній, [Select_CString(target_character.IsFemale, 'вона взяла', 'він взяв' )] на себе завдання охороняти релігію не тільки своїх послідовників, а навіть #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїстських#!#! біженців, що втекли до нас від утисків."
  sikhism.9.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] — наш істинний вождь і захисник пригноблених."
  sikhism.9.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_tegh_bahadur_guruship')]»"
  sikhism.10.title: "[target_character.GetNameWithNoTooltip]"
  sikhism.10.desc: "Після того як [Select_CString(previous_guru.IsFemale, 'померла', 'помер' )] [previous_guru.GetName], усі, хто сповідує #L [ROOT.GetCountry.GetReligion.GetAdjective|l]у#! віру, знову зіткнулися з ворожим до себе ставленням з боку політичних і релігійних недругів. [target_character.GetName], [Select_CString(target_character.IsFemale, 'яка зайняла', 'який зайняв' )] посаду свого попередника, твердо [Select_CString(target_character.IsFemale, 'має намір', 'має намір' )] об'єднати народ і згуртувати тих, для кого [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] дорожчий за життя. У майбутні десятиліття буде заснована [ShowLawName('khalsa_law')] — громада тих, кого [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] присвячує в нашу віру, і тоді ім'я «[target_character.GetNameWithNoTooltip]» навіки буде вписано в історію."
  sikhism.10.a: "[ROOT.GetCountry.GetReligion.GetGodName] — ось чиє це надбання насправді!"
  sikhism.10.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_gobind_singh_guruship')]»"
  sikhism.10.khalsa.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('khalsa_law')]»"
  sikhism.11.title: "[ShowWorkOfArtNameWithNoTooltip('guru_granth_sahib')]"
  sikhism.11.desc: "[previous_guru.GetName] більше не з нами, однак новому гуру не загрожує смерть: [previous_guru.GetNameWithNoTooltip] [Select_CString(previous_guru.IsFemale, 'оголосила', 'оголосив' )] своїм наступником збірку священних текстів під назвою «[ShowPolicyName('adi_granth')]»; укладач його — [GetCharacter('guru_arjan').GetName], а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — продовжувач цієї справи. Саме [ShowPolicyName('adi_granth')], він же [ShowWorkOfArtName('guru_granth_sahib')], стане дороговказом для #L [ROOT.GetCountry.GetReligion.GetAdjective|l]ого#! народу. Відтепер усі питання, на які не зможе відповісти [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], міститимуться тут, у збірці [ROOT.GetCountry.GetReligion.GetAdjectiveWithNoTooltip|l]ого знання."
  sikhism.11.a: "[ROOT.GetCountry.GetGovernment.GetRulerTitle|U] виконує прагнення розуму."
  sikhism.11.b: "[ROOT.GetCountry.GetReligion.GetGodName] прийде до кожного, хто бажає Його знайти: Він — у наших хвалебних піснях."
  sikhism.11.tt: "[GetUniqueInternationalOrganization('sikhism').GetName] отримує доступ до правила «[ShowLawName('guru_granth_sahib_guruship')]»"
  sikhism.12.title: "$guru$ у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  sikhism.12.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] з'явилася людина, яка називає себе гуру. [Select_CString(target_character.IsFemale, 'Вона', 'Він' )] стверджує, що [Select_CString(target_character.IsFemale, 'їй', 'йому' )] з'явилося одкровення згори, і тепер [Select_CString(target_character.IsFemale, 'вона', 'він' )] слідує заклику мандрувати далекими краями і нести з собою світ знання про єдиного Бога.\n\n[Select_CString(target_character.IsFemale, 'Її', 'Його' )] послідовники запевняють, що пізнати цього Бога можуть прихильники будь-якої релігії, і [ROOT.GetCountry.GetReligion.GetName|l] — не виняток, а [target_character.GetName] лише розкриває іншим суть власного віровчення. Однак очевидно, що проповідуване вчення суперечить нашим обрядам і традиціям, і народ починає забувати, що [ROOT.GetCountry.GetReligion.GetNameWithNoTooltip|l] — це істинний шлях."
  sikhism.12.a: "Нехай вірять у що хочуть, аби платили податки."
  sikhism.12.b: "Ми не терпітимемо такого від язичників!"
  sikhism.12.b.tt: "Усі [Concept('pops', 'групи населення')|e] у [target_location.Custom('LR_PREP')|l] [target_location.GetName], що сповідують #TOOLTIP:RELIGION,$hindu_tt$,X #L індуїзм#!#! та #TOOLTIP:RELIGIONGROUP,muslim,X #L іслам#!#!, втратять [ShowNamedValue('pop_satisfaction_extreme_penalty')|+=2%] [Concept('pop_satisfaction', 'задоволення')|e]"
  sikhism.13.title: "$character_title_guru$ зникає"
  sikhism.13.desc: "#TOOLTIP:RELIGION,$sikhism_tt$,X #L Сикхи#!#! у збентеженні: у чинного гуру не залишилося наступників. Тепер ми як правовірні сикхи зобов'язані відновити спадкоємність у своїй країні. Місцем, де це станеться, стане [target_location.GetName], і тоді [guru_country.GetLongName] знову знайде гуру."
  sikhism.13.a: "Сикхські гуру безсмертні."
  sikhism.13.b: "Ми започаткуємо нову добу."