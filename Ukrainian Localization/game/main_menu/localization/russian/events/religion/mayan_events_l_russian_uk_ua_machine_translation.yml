l_russian:
  mayan_events.1.title: "Початок нового катуна"
  mayan_events.1.desc: "Через двадцять років у нашому календарі довгого рахунку починається новий катун.\n\n[ROOT.GetCountry.GetLongName] — не та держава, яка легковажно ставиться до поняття обов'язку. Ми, як її вожді, повинні влаштувати чудове святкування на честь божества, бо в нашій культурі [ROOT.GetCountry.GetReligion.GetGodName] і початок нового циклу нерозривно пов'язані. Народ очікує, що свято буде настільки пишним і величним, що згадувати його будуть навіть нащадки.\n\nСаме тому ми вже багато років ведемо ретельну підготовку. Час показати, що наші зусилля не пропали дарма."
  mayan_events.1.a: "[ROOT.GetCountry.GetReligion.GetGodName], слався!"
  mayan_events.1.b: "Поквапитися з останніми приготуваннями!"
  mayan_events.1.c: "Ми готові."
  mayan_events.1.d: "Народ буде розчарований."