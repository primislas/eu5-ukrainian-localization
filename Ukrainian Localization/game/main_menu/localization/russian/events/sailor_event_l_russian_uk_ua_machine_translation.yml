l_russian:
  sailor_event.1.title: "Безкрає та бездонне море"
  sailor_event.1.desc: "Поля брані ваблять людей обов'язку, спраглих слави, а море — вільних духом, для яких слава — порожній звук. Старі моряки [ROOT.GetCountry.GetAdjectiveWithNoTooltip|l]ого флоту із задоволенням згадують славні дні, проведені на судні. Вони розповідають про дивовижні місця, де їм довелося побувати, у цих історіях немає місця смерті та поневірянням.\n\nЧи варто дивуватися, що #L [ROOT.GetCountry.GetAdjective|l]у#! молодь нестримно тягне до моря? За останній рік до нашого флоту вступило ще більше людей. Багато з них спочинуть на дні океану, але ті, хто повернеться, обов'язково повідають світу про неймовірні пригоди, які пережили."
  sailor_event.1.a: "Ми залишимо спадщину, яка надихне майбутні покоління."
  sailor_event.2.title: "Суворе життя моряків"
  sailor_event.2.desc: "Багато з тих, хто вступив до нашого флоту, покидають рідний дім та #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_ACC')|L]#!#!, щоб побачити море та інші землі. Вони не знають, що життя на морі здебільшого складається з рутини та боротьби зі стихією. Не всі юні моряки готові до такого повороту подій. Опинившись посеред океану та змушені щодня їсти одне й те саме, виконувати одноманітні завдання та спілкуватися з набридлою компанією, вони швидко шкодують про своє рішення.\n\nЦі мрійливі сухопутні щури, як називають їх більш досвідчені товариші, приносять більше шкоди, ніж користі. Деякі поступово освоюються та стають частиною команди, інші ж даремно втрачають свій та чужий час."
  sailor_event.2.a: "Ось приклад негативних наслідків пропаганди."
  sailor_event.3.title: "Моряки допомагають солдатам"
  sailor_event.3.desc: "За останні роки наше військо зазнало важких втрат: у боях загинули тисячі людей. Але моряків, що служать у флоті #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, ця доля оминула. Попри жертви, понесені ними в ході битв за нашу країну, військово-морський флот не відчуває нестачі в людях.\n\nЗараз моряки активно агітують тих, хто готовий ризикнути своїм життям у морі, вступати до сухопутних військ. Якщо військо не відновити, навіть наші найкращі кораблі не зможуть пришвартуватися до портів — усі вони перейдуть у володіння до ворогів."
  sailor_event.3.a: "Новобранці повинні служити там, де вони потрібніші."
  sailor_event.4.title: "Солдати допомагають морякам"
  sailor_event.4.desc: "У ході недавніх конфліктів на морі загинуло безліч людей. Наше військо вже не відчуває нестачі в солдатах, а ось капітанам #L [ROOT.GetCountry.GetAdjective|l]ого#! флоту доводиться нелегко: мало хто бажає служити на кораблях. Навіть [ROOT.GetCountry.GetGovernment.GetRuler.GetName] знає, які важкі випробування випали на долю наших моряків: чутки про це дійшли до самого двору.\n\nВійськові командувачі все частіше агітують рекрутів вирушати на узбережжя та вступати до військово-морського флоту. Їм ще багато чого належить навчитися, але без нової крові нам не обійтися."
  sailor_event.4.a: "Новобранці повинні служити там, де вони потрібніші."
  sailor_event.5.title: "Вихід до моря"
  sailor_event.5.desc: "Може, #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! і далеко до прибережних країн, що досягли успіху в мореплавстві, але наш народ дуже пишається невеликим відрізком суші, який забезпечує нам вихід до моря. [ROOT.GetCountry.GetAdjectiveWithNoTooltip|U]е узбережжя обіцяє великі перспективи та приваблює молодь, яка бажає розпочати нове життя.\n\nНехай наш військово-морський потенціал досить скромний, але юні мореплавці — цінний ресурс, який значно посилить наші корабельні екіпажі. Може, варто допомогти молодим морякам налагодити життя на новому місці?"
  sailor_event.5.a: "Ми повинні заохотити їхню ініціативу."
  sailor_event.5.b: "Море швидко їм набридне."