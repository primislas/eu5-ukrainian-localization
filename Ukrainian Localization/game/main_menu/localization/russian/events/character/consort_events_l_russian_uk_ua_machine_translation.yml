l_russian:
  consort_events.1.title: "Пропозиція руки та серця"
  consort_events.1.desc: "Могутні родини [ROOT.GetCountry.Custom('RU_rank_ru_GEN')|l] із тривогою спостерігали, як [target_ruler.GetName] рік за роком відмовляється пов'язати себе шлюбними узами. Тепер же тривога переросла в неприховану паніку: попри відсутність прямого спадкоємця, [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] не поспішає виправляти ситуацію і не виявляє особливого інтересу до пропозицій, які [Select_CString(target_ruler.IsFemale,'їй', 'йому')] надходять.\n\nВсе зайшло надто далеко, і придворні сподіваються, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] прийме одну з останніх пропозицій прямо зараз, адже [Select_CString(target_ruler.IsFemale,'її', 'його')] небажання продовжити рід ставить під загрозу всю країну. Так вдало збіглося, що голова однієї з найстаріших і найшанованіших династій [target_consort.GetDynasty.GetName] з [origin_of_queens_family.Custom('LR_GEN')|l] [origin_of_queens_family.GetName], — саме підшукує пару своїй дочці, обіцяючи щедре придане."
  consort_events.1.a: "Приймемо цю пропозицію."
  consort_events.1.a.tt: "Само собою зрозуміло, що після одруження родина другої половини зможе розраховувати на деякі привілеї."
  consort_events.1.b: "Нехай [target_ruler.GetNameWithNoTooltip] дочекається кращої пропозиції."
  consort_events.2.title: "[target_consort.GetDynasty.GetNameWithNoTooltip]"
  consort_events.2.desc: "Коли [target_ruler.GetName] і [target_consort.GetName] уклали шлюб, у нас з'явився не тільки новий член родини, а й новий союзник у [ROOT.GetCountry.Custom('RU_rank_ru_PREP')|l]. Династія [target_consort.GetDynasty.GetName] — досить стара і впливова, а її резиденція в провінції [origin_of_queens_family.GetName] — справжня перлина [ROOT.GetCountry.Custom('RU_rank_ru_GEN')|l].\n\nДружба — справа обопільна, тож [target_consort.GetName] висловлюватиметься від імені свого роду, а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(target_ruler.IsFemale,'повинна', 'повинен')] буде ставитися до цих промов з особливою увагою."
  consort_events.2.a: "Піднімемо келихи за вічну дружбу!"
  consort_events.3.title: "Високі очікування"
  consort_events.3.desc: "Політичний шлюб — це не тільки подружні узи, а й неписана угода про співпрацю між родинами. Династія [target_consort.GetDynasty.GetName] очікує, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] прислухатиметься до порад своєї другої половини і дбатиме не тільки про свої, а й про [Select_CString(target_consort.IsFemale,'її', 'його')] інтереси."
  consort_events.3.a: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] отримає все, що забажає!"
  consort_events.3.b: "Жодних поступок не буде."
  consort_events.3.b.tt: "Це призведе до ослаблення зв'язку з членами династії [target_consort.GetDynasty.GetName], і в майбутньому вони нам це пригадають."
  consort_events.4.title: "Сімейне щастя"
  consort_events.4.desc: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] відіграє роль [Select_CString(target_consort.IsFemale,'незмінної супутниці та радниці', 'незмінного супутника та радника')], але, крім цього, [Select_CString(target_consort.IsFemale,'вона', 'він')] представляє [ROOT.GetCountry.Custom('rank_ru_ACC')|l] у династії [target_consort.GetDynasty.GetName] і навпаки. Іноді таке становище буває вельми вигідним.\n\nСьогодні [target_consort.GetName] із задоволенням [Select_CString(target_consort.IsFemale,'оголосила', 'оголосив')], що [Select_CString(target_consort.IsFemale,'його', 'її')] родина вирішила продемонструвати свою підтримку найяснішій парі."
  consort_events.4.a: "Нехай цей союз буде вигідний обом сторонам."
  consort_events.4.b: "Династія [target_consort.GetDynasty.GetNameWithNoTooltip] не повинна відчувати, що ми їм чимось зобов'язані."
  consort_events.6.title: "Любов сильніша за обов'язок"
  consort_events.6.desc: "[ROOT.GetCountry.GetGovernment.GetAdjective]і шлюби рідко укладаються по любові. Подружжя розглядається як дипломатична можливість, до якої потрібно підходити з розумом. Також велике значення має соціальний статус нареченого або нареченої. Краще укладати шлюбні союзи з іноземцями, щоб не порушувати баланс у внутрішній політиці.\n\nПроте навіть [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] може закохатися, і тоді всі ці міркування відходять на десятий план — принаймні, для [Select_CString(target_ruler.IsFemale,'неї самої', 'нього самого')].\n\nПісля випадкової зустрічі в провінції [ROOT.GetCountry.GetCapital.GetProvince.GetName] [target_ruler.GetName] зовсім [Select_CString(target_ruler.IsFemale,'втратила', 'втратив')] голову. [Select_CString(target_ruler.IsFemale,'Вона', 'Він')] буквально світиться від щастя. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] і радники, звичайно, не в захваті від такого вибору, проте [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] дуже ратують за те, щоб [target_ruler.GetNameWithNoTooltip] [Select_CString(target_ruler.IsFemale,'уклала', 'уклав')] шлюб по любові."
  consort_events.6.a: "Нехай [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] чинить за велінням серця."
  consort_events.6.b: "Нам не личить укладати шлюби з простолюдом!"
  consort_events.51.title: "Сімейні узи"
  consort_events.51.desc: "Останні кілька днів ми розважаємо найвищих [origin_country_of_consort.GetGovernment.GetAdjective|l]их гостей з #ONCLICK:COUNTRY,[origin_country_of_consort.Custom('CL_tt')] #TOOLTIP:COUNTRY,[origin_country_of_consort.Custom('CL_tt')],X [origin_country_of_consort.Custom('RU_CL_GEN')|L]#!#!, звідки родом [ROOT.GetCountry.GetGovernment.GetConsortTitle|l]. Через тиждень, проведений за полюванням, бенкетами та плітками, вони нарешті зібралися додому, до міста [origin_country_of_consort.GetCapital.GetName]. Дорогі гості запевняють, що чудово провели час, умовляють [ROOT.GetCountry.GetGovernment.GetAdjective|l]у родину якомога швидше нанести візит у відповідь і обіцяють, що, повернувшись на батьківщину, обов'язково розкажуть усім, як [target_consort.GetName] тут [Select_CString(target_consort.IsFemale,'щаслива', 'щасливий')]."
  consort_events.51.a: "Ось що означає спорідненість."
  we_are_kin: "Ми однієї крові"
  consort_events.52.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]а єресь"
  consort_events.52.desc: "Народ країни [ROOT.GetCountry.GetLongName] зрадів, коли [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'оголосила', 'оголосив')], що [Select_CString(target_ruler.IsFemale,'вона', 'він')] та [target_consort.GetName] поєднуються шлюбними узами. У той момент про походження [Select_CString(target_consort.IsFemale,'нареченої', 'нареченого')], так само як і про [Select_CString(target_consort.IsFemale,'її', 'його')] виховання в місті [origin_country_of_consort.GetCapital.GetName], було відомо мало. Уявлення більшості жителів [ROOT.GetCountry.Custom('RU_CL_GEN')] [ROOT.GetCountry.GetGovernment.GetAdjective|l]а сім'я — це окрема порода людей, тож до подробиць нікому не було діла, доки країною не поповзли тривожні чутки… Кажуть, що [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] сповідує #L [origin_country_of_consort.GetReligion.GetAdjective|l]у#! віру і не бажає від неї відрікатися. Люди ще можуть зрозуміти, навіщо укладати шлюби з іноземцями, але вони навряд чи змиряться з [Select_CString(target_consort.IsFemale,'єретичкою', 'єретиком')] при владі."
  consort_events.52.a: "Як вони посміли?"
  consort_events.54.title: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] на вагу золота"
  consort_events.54.desc: "Щойно прибувши до двору, [target_consort.GetName] починає виявляти великий інтерес до адміністративних справ #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('RU_CL_GEN')|L]#!#!. Справа доходить до того, що [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] стає свого роду авторитетом у питаннях управління замком та місцевою прислугою. [Select_CString(target_consort.IsFemale,'Їй', 'Йому')] довіряє не тільки [ROOT.GetCountry.GetGovernment.GetRulerTitle|l], а й [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] загалом. У [ROOT.GetCountry.Custom('RU_rank_ru_PREP')|l] це велика рідкість."
  consort_events.54.a: "[target_consort.GetShortNameWithNoTooltip] — наше спасіння."
  consort_events.54.b: "Світ потребує таких людей, як [target_consort.GetShortNameWithNoTooltip]."
  consort_events.54.c: "Стратегів багато не буває."
  consort_events.54.d: "[target_consort.GetShortNameWithNoTooltip] — справжній скарб."
  consort_events.56.title: "Час потреби"
  consort_events.56.desc: "[ROOT.GetCountry.GetGovernment.GetRulerTitle], без сумніву, походить з дуже впливової родини [target_ruler.GetDynasty.GetName]. [Select_CString(target_ruler.IsFemale,'Її', 'Його')] вустами ця династія править нашою країною, і так триватиме ще довгі роки, однак навіть великим часом потрібна допомога. На щастя, династія [target_ruler.GetDynasty.GetNameWithNoTooltip] пов'язана міцними узами з іншими могутніми кланами. Одним з них є родина [target_foreign_ruler.GetDynasty.GetName], до якої належить [target_foreign_ruler.GetName], [Select_CString(target_foreign_ruler.IsFemale,'правителька', 'правитель')] #ONCLICK:COUNTRY,[marriage_partner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[marriage_partner.Custom('CL_tt')],X [marriage_partner.Custom('CL_GEN')|L]#!#!. [Select_CString(target_foreign_ruler.IsFemale,'Її', 'Його')] [Select_CString(target_foreign_consort.IsFemale,'шляхетна дружина', 'шляхетний чоловік')] — нащадок нашої [ROOT.GetCountry.GetGovernment.GetAdjective]ої династії та [Select_CString(target_foreign_consort.IsFemale,'наша найцінніша посередниця', 'наш найцінніший посередник')]. Можливо, [Select_CString(target_foreign_consort.IsFemale,'вона', 'він')] зуміє переконати [Select_CString(target_foreign_ruler.IsFemale,'дружину', 'чоловіка')] простягнути нам руку допомоги?"
  consort_events.56.a: "Наша скарбниця лякаючими темпами порожніє."
  consort_events.56.a.tt: "[target_foreign_consort.GetName] — наша надія, відправте [Select_CString(target_foreign_consort.IsFemale,'їй', 'йому')] листа з проханням про гроші"
  consort_events.56.f: "Ми не потребуємо ні [Select_CString(marriage_partner.IsFemale,'її', 'його')] допомоги, ні допомоги династії [target_foreign_ruler.GetDynasty.GetNameWithNoTooltip]!"
  consort_events.57.title: "Друзі в біді"
  consort_events.57.desc: "Нещодавно [target_foreign_consort.GetName] — [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] [Select_CString(target_foreign_ruler.IsFemale,'нашої сяйної правительки', 'нашого сяйного правителя')], — [Select_CString(target_foreign_consort.IsFemale,'отримала', 'отримав')] листа від своїх родичів з династії [target_foreign_consort.GetDynasty.GetName], які правлять #ONCLICK:COUNTRY,[target_origin_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_origin_country.Custom('CL_tt')],X [target_origin_country.Custom('RU_CL_INST')|L]#!#!. Судячи з усього, [target_ruler.GetName] вкрай потребує грошей і запитує нас, своїх «найвірніших друзів», чи зможемо ми чимось допомогти. [Select_CString(target_ruler.IsFemale,'Її', 'Його')] лист рясніє компліментами нашій великій економіці."
  consort_events.57.a: "Звісно, ми можемо позичити трохи грошей нашим друзям з [target_origin_country.Custom('CL_GEN')]."
  grateful_for_aid: "Вдячність за допомогу"
  consort_events.57.f: "І що ж ми отримаємо натомість? Не бувати цьому!"
  denied_aid: "Відмова від допомоги"
  outrageous_demands: "Обурливі вимоги"
  consort_events.58.title: "Рука допомоги"
  consort_events.58.desc: "[target_foreign_consort.GetName] нарешті [Select_CString(target_foreign_consort.IsFemale,'відповіла', 'відповів')] на наше прохання, адресоване [Select_CString(target_foreign_consort.IsFemale,'її', 'його')] [Select_CString(target_foreign_ruler.IsFemale,'дружині', 'чоловікові')]. [Select_CString(target_foreign_ruler.IsFemale,'Найшляхетніша', 'Найшляхетніший')] [target_foreign_ruler.GetName] [Select_CString(target_foreign_ruler.IsFemale,'погодилася', 'погодився')] нам допомогти! Крім відповіді нам вислали скрині із золотом для поповнення порожньої скарбниці. Ми негайно відправимо [Select_CString(target_foreign_ruler.IsFemale,'нашій благодійниці', 'нашому благодійнику')] листа з подяками та побажаннями довгого правління!"
  consort_events.58.a: "Ми знали, що на [Select_CString(target_foreign_ruler.IsFemale,'неї', 'нього')] можна покластися."
  consort_events.59.title: "Ошукані очікування"
  consort_events.59.desc: "Коли [Select_CString(target_foreign_consort.IsFemale,'наша', 'наш')] [target_foreign_consort.GetName] та [marriage_partner.GetGovernment.GetRulerTitle|l] #ONCLICK:COUNTRY,[marriage_partner.Custom('CL_tt')] #TOOLTIP:COUNTRY,[marriage_partner.Custom('CL_tt')],X [marriage_partner.Custom('RU_CL_GEN')|L]#!#! уклали шлюб, ми вважали, що між нашими країнами утворився міцний зв'язок. Ми б ніколи не порушили неписаний договір, але [target_foreign_ruler.GetName], схоже, робить це з легкістю.\n\n[target_foreign_consort.GetShortNameWithNoTooltip] [Select_CString(target_foreign_consort.IsFemale,'відправила', 'відправив')] нам відповідь, і сьогодні ми нарешті її отримали. У ній [target_foreign_ruler.GetShortNameWithNoTooltip] не тільки відмовляє нам у допомозі, а й називає наше прохання обурливим!"
  consort_events.59.a: "Такі образи не забуваються."
  consort_events.61.title: "[ROOT.GetCountry.GetGovernment.GetAdjective]ий вплив"
  consort_events.61.desc: "Після того як [target_ruler.GetName] та [target_consort.GetName] зіграли весілля, жителі #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!#!#! стали виявляти особливий інтерес до всього, що пов'язано з [Select_CString(target_consort.IsFemale, 'новою дружиною їхнього правителя', 'новим чоловіком їхньої правительки' )]. Звісно, культурного обміну слід було очікувати, враховуючи, що [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] користується народною любов'ю, однак радники з тривогою повідомляють, що населення однієї з наших провінцій почало переймати #L [origin_religion.GetAdjective|l]у#! віру. Схоже, [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] користується воістину величезним впливом на наших підданих, раз їх так надихають промови #L [origin_religion.GetAdjective|l]их#! проповідників…\n\nДізнавшись про такий стан справ, [target_consort.GetNameWithNoTooltip] лише [Select_CString(target_consort.IsFemale,'потиснула', 'потиснув')] плечима і [Select_CString(target_consort.IsFemale,'відповіла', 'відповів')], що вже давно [Select_CString(target_consort.IsFemale,'прийняла', 'прийняв')] #L [ROOT.GetCountry.GetReligion.GetAdjective|l]у#! віру, про що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] чудово знає."
  consort_events.61.a: "Нехай публічно відречеться від [origin_religion.GetAdjectiveWithNoTooltip|l]ої віри!"
  consort_events.61.b: "Залишимо все як є."
  consort_events.101.title: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] з амбіціями"
  consort_events.101.desc: "Ні для кого не секрет, що [target_consort.GetName] та [ROOT.GetCountry.GetGovernment.GetHeir.GetName] не плекають одне до одного ніжних почуттів. Їхні стосунки не залагодилися від самого початку і вкрай зіпсувалися, коли у #L [ROOT.GetCountry.GetGovernment.GetConsortTitle|l]а#! народилася перша дитина. Безумовно, [target_consort.GetName] [Select_CString(target_consort.IsFemale,'воліла', 'волів')] би, щоб на трон зійшов [Select_CString(target_consort.IsFemale,'її', 'його')] власний нащадок. Вже досить довго [Select_CString(target_consort.IsFemale,'вона', 'він')] потихеньку готує для цього ґрунт, переконуючи — або підкуповуючи — потрібних людей і всіляко плекаючи своє чадо. Проте тільки вчора [target_consort.GetName] [Select_CString(target_consort.IsFemale,'звернулася', 'звернувся')] до [Select_CString(target_ruler.IsFemale,'нашої правительки', 'нашого правителя')] з вимогою переглянути питання про правила успадкування престолу."
  consort_events.101.a: "[Select_CString(target_consort.IsFemale,'Її', 'Його')] дитина, безсумнівно, має право на престол."
  consort_events.101.b: "Як [Select_CString(target_consort.IsFemale,'вона посміла', 'він посмів')]? Тільки [ROOT.GetCountry.GetGovernment.GetHeir.GetNameWithNoTooltip] може успадкувати трон!"
  consort_events.102.title: "Улюбленці"
  consort_events.102.desc: "Кажуть, любов батьків до дитини безмежна, однак, схоже, декого люблять більше, ніж інших. Хоча [target_ruler.GetName] не обділяє увагою [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'свою дочку', 'свого сина')] на ім'я [ROOT.GetCountry.GetGovernment.GetHeir.GetName], всі знають, що [Select_CString(ROOT.GetCountry.GetGovernment.GetHeir.IsFemale,'її', 'його')] [Select_CString(favorite_child.IsFemale,'сестра', 'брат')] займає в серці [Select_CString(target_ruler.IsFemale,'правительки', 'правителя')] особливе місце. [target_ruler.GetName] душі не чує в [Select_CString(favorite_child.IsFemale,'своїй улюблениці', 'своєму улюбленці')] і [Select_CString(target_ruler.IsFemale,'дала', 'дав')] [Select_CString(favorite_child.IsFemale,'їй', 'йому')] найкращу освіту. Тепер [target_consort.GetName] намагається вмовляннями домогтися того, щоб [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] [Select_CString(target_ruler.IsFemale,'переглянула', 'переглянув')] своє рішення і [favorite_child.GetName] [Select_CString(favorite_child.IsFemale,'отримала', 'отримав')] право успадковувати престол #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('RU_CL_GEN')|L]#!#!."
  consort_events.102.a: "Непогана думка. [favorite_child.GetNameWithNoTooltip] має блискучий розум."
  consort_events.102.b: "$consort_events.101.b$"
  consort_events.104.title: "Успадковані здібності"
  consort_events.104.desc: "Довгі роки [Select_CString(target_consort.IsFemale,'наша дорога', 'наш дорогий')] [target_consort.GetName] [Select_CString(target_consort.IsFemale,'вражала', 'вражав')] нас своєю вченістю та майстерністю. [target_consort.GetName] — прекрасно освічена людина, і, схоже, [Select_CString(target_consort.IsFemale,'її', 'його')] [Select_CString(target_heir.IsFemale,'дочка', 'син')] [target_heir.GetName] демонструє таку ж тягу до знань. Недарма кажуть: яблуко від яблуні недалеко падає."
  consort_events.104.a: "[target_consort.GetShortNameWithNoTooltip] навчить [Select_CString(target_heir.IsFemale,'її', 'його')] всіх тонкощів управління нашою країною."
  consort_events.104.b: "[target_consort.GetShortNameWithNoTooltip] розповість [Select_CString(target_heir.IsFemale,'їй', 'йому')] про всі тонкощі політики."
  consort_events.104.c: "З таким учителем, як [target_consort.GetShortNameWithNoTooltip], [target_heir.GetShortNameWithNoTooltip] стане чудовим полководцем."
  consort_events.303.title: "[target_consort.GetNameWithNoTooltip] та [Select_CString(target_consort.IsFemale,'її', 'його')] інтерес до дипломатії"
  consort_events.303.desc: "[target_consort.GetName] родом з місцевості [origin_of_consort.GetName] завжди [Select_CString(target_consort.IsFemale,'виявляла', 'виявляв')] інтерес до людей. [Select_CString(target_consort.IsFemale,'Вона', 'Він')] часто [Select_CString(target_consort.IsFemale,'намагалася', 'намагався')] передбачити дії оточуючих, і з роками це захоплення перетворилося з простої забави на корисну навичку. На щастя, з переїздом до [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого двору #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#! [Select_CString(target_consort.IsFemale,'вона', 'він')] не [Select_CString(target_consort.IsFemale,'втратила', 'втратив')] свого інтересу до інтриг. Навпаки, це дозволило [Select_CString(target_consort.IsFemale,'їй', 'йому')] ще краще розвинути свої здібності: під час наших недавніх переговорів з іноземними послами [Select_CString(target_consort.IsFemale,'її', 'його')] присутність виявилася вельми корисною."
  consort_events.303.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.304.title: "[target_consort.GetNameWithNoTooltip] та [Select_CString(target_consort.IsFemale,'її', 'його')] схильність до управління"
  consort_events.304.desc: "[target_consort.GetName] завжди [Select_CString(target_consort.IsFemale,'мала', 'мав')] високу моральність та прагнення до порядку. Складні політичні питання чи поради під час дружньої бесіди — в будь-якій ситуації [Select_CString(target_consort.IsFemale,'її', 'його')] думці можна довіряти. [ROOT.GetCountry.GetGovernment.GetConsortTitle] вміє грамотно викладати свої думки, за що [Select_CString(target_consort.IsFemale,'заслужила', 'заслужив')] визнання оточуючих ще в свої перші роки життя в провінції [origin_of_consort.GetName]. Але особливо важливо те, що [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] не лукавить, завдяки чому навіть найупертіші представники двору прислухаються до [Select_CString(target_consort.IsFemale,'її', 'його')] порад."
  consort_events.304.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.305.title: "[target_consort.GetNameWithNoTooltip] та [Select_CString(target_consort.IsFemale,'її', 'його')] пристрасть до військової справи"
  consort_events.305.desc: "[target_consort.GetName] все частіше виявляє безстрашність. [Select_CString(target_consort.IsFemale,'Вона', 'Він')] то й діло спостерігає за навчанням вояків, а іноді й [Select_CString(target_consort.IsFemale,'сама', 'сам')] виходить на тренувальний майданчик… Деякі не наважуються вступити з [Select_CString(target_consort.IsFemale,'нею', 'ним')] у бій, однак іншим цікаво, чого [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] [Select_CString(target_consort.IsFemale,'навчилася', 'навчився')], живучи в місцевості [origin_of_consort.GetName]. На подив вояків, чутки про те, що [target_consort.GetNameWithNoTooltip] — хороший боєць, виявилися правдою. Схоже, своєю присутністю [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] піднімає бойовий дух військ."
  consort_events.305.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  consort_events.306.title: "Спільні інтереси"
  consort_events.306.desc: "[target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'відома', 'відомий')] своїми адміністративними здібностями. [ROOT.GetCountry.GetGovernment.GetRulerTitle] стежить за тим, щоб і народ, і уряд дотримувалися законів, а всі механізми #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('RU_CL_GEN')|L]#!#! постійно допрацьовувалися та відповідали епосі. На щастя, [Select_CString(target_ruler.IsFemale,'її', 'його')] [Select_CString(target_consort.IsFemale,'дружина', 'чоловік')] [target_consort.GetName] має схожі інтереси!\n\n[Select_CString(target_ruler.IsFemale,'Правителька', 'Правитель')] запевняє, що не замислюючись віддасть перевагу розмові з [Select_CString(target_consort.IsFemale,'нею', 'ним')] будь-якому засіданню ради. У відповідь на такі зізнання [target_consort.GetName] лише посміхається, не приховуючи, що спілкування з [Select_CString(target_ruler.IsFemale,'дружиною', 'чоловіком')] на улюблені теми приносить радість і [Select_CString(target_consort.IsFemale,'їй', 'йому')]."
  consort_events.306.a: "Вони чудово одне одному підходять."
  consort_events.309.title: "Спадкові питання"
  consort_events.309.desc: "Трохи оговтавшись після смерті [Select_CString(target_char.IsFemale,'чоловіка', 'дружини')], [target_char.GetName] усе більше звикає до своїх нових обов'язків: нехай під [Select_CString(target_char.IsFemale,'її', 'його')] опікою перебуває [Select_CString(target_char_heir.IsFemale,'юна', 'юний')] [ROOT.GetCountry.GetGovernment.GetHeirTitle|l], але зараз саме [Select_CString(target_char.IsFemale,'вона', 'він')] — [ROOT.GetCountry.GetGovernment.GetActiveRegentTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('RU_CL_GEN')|L]#!#!. Народ переконаний, що це лише тимчасова необхідність і врешті-решт [Select_CString(target_char.IsFemale,'її', 'його')] місце все одно займе [target_char_heir.GetName]. Однак у кулуарних розмовах нерідко постає питання, наскільки вміло [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] керуватиме своєю країною… і чи впорається взагалі. На думку деяких, якщо до влади прийде [target_char_heir.GetShortNameWithNoTooltip], то це поставить під загрозу саме існування країни, тому на роль глави набагато краще підходить [ROOT.GetCountry.GetGovernment.GetConsortTitle|l].\n\n[Select_CString(target_char.IsFemale,'Сама', 'Сам')] [ROOT.GetCountry.GetGovernment.GetConsortTitle|l] у курсі цих таємних обговорень, але ще не [Select_CString(target_char.IsFemale,'ухвалила', 'ухвалив')] рішення щодо такого делікатного питання."
  consort_events.309.a: "Настали цікаві часи…"
  consort_events.309.a.tt: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] обговорить цю тему на найближчій раді"
  consort_events.309.b: "Ці підступні розмови необхідно припинити!"
  consort_events.309.b.tt: "Плани змовників не знайдуть підтримки."
  consort_events.310.title: "Зміна влади"
  consort_events.310.desc: "Дотримуючись рекомендацій радників і користуючись своєю чарівністю, [target_char.GetName] [Select_CString(target_char.IsFemale,'переконала', 'переконав')] більшу частину двору в тому, що [target_heir.GetName], [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('RU_CL_GEN')|L]#!#! і [Select_CString(target_heir.IsFemale,'головна', 'головний')] [Select_CString(target_heir.IsFemale,'претендентка', 'претендент')] на престол, не годиться для такої важливої ролі через своє скудоумство. Однак у цієї проблеми є просте рішення…\n\nПід час чергового пишного банкету, влаштованого з метою задобрити знать, [target_char.GetShortNameWithNoTooltip] і [Select_CString(target_char.IsFemale,'її', 'його')] прислуга змогли донести до присутніх свій задум: нехай [Select_CString(target_heir.IsFemale,'юна', 'юний')] [target_heir.GetShortNameWithNoTooltip] залишається у своїх покоях і як слід зосередиться на навчанні. Звісно, через це [ROOT.GetCountry.GetGovernment.GetHeirTitle|l] може поступово віддатися народному забуттю, але #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_DAT')|L]#!#! це піде лише на користь…"
  consort_events.310.a: "Так і вчинимо."
  consort_events.310.b: "Можливо, [Select_CString(target_heir.IsFemale,'їй', 'йому')] все ж варто дати шанс."
  consort_events.311.title: "[ROOT.GetCountry.GetGovernment.GetConsortTitle] від народу"
  consort_events.311.desc: "Кожен чув про те, що [target_char.GetName] — найдобріша людина. [Select_CString(target_char.IsFemale,'Вона', 'Він')] нічого не шкодує для друзів і робить усе можливе, щоб [Select_CString(target_char.IsFemale,'її', 'його')] [Select_CString(target_ruler.IsFemale,'дружина', 'чоловік')] [target_ruler.GetName] [Select_CString(target_ruler.IsFemale,'була', 'був')] [Select_CString(target_ruler.IsFemale,'щаслива', 'щасливий')]. Під час нещодавньої поїздки до провінції [poor_province.GetName] [target_char.GetShortNameWithNoTooltip] на власні очі [Select_CString(target_char.IsFemale,'побачила', 'побачив')], як бідно живуть місцеві [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l]. З тих пір [Select_CString(target_char.IsFemale,'вона', 'він')] намагається придумати, як допомогти своїм знедоленим підданим. Однак, щоб втілити свої ідеї в реальність, [Select_CString(target_char.IsFemale,'їй', 'йому')] знадобляться кошти з державної скарбниці."
  consort_events.311.a: "Ми зобов'язані дбати про народ. [Select_CString(target_char.IsFemale,'Вона', 'Він')] може розраховувати на нашу підтримку."
  consort_events.311.b: "У нас є й важливіші справи."
  consort_events.313.title: "Чудо життя"
  consort_events.313.desc: "У важкі дні війни особливо важливо повідомляти народу добрі вісті, щоб хоч трохи полегшувати його страждання. Сьогодні [Select_CString(target_ruler.IsFemale,'велика', 'великий')] [target_ruler.GetName] і [Select_CString(target_ruler.IsFemale,'її', 'його')] [Select_CString(target_char.IsFemale,'дружина', 'чоловік')] [target_char.GetName] воздають небесам хвалу за народження ще однієї дитини. Ця подія надихнула не тільки подружжя, а й їхніх підданих. Багато хто сподівається, що на цю дитину чекає куди світліше майбутнє і що врешті-решт усі їхні жертви не будуть марними."
  consort_events.313.a: "Хай будуть благословенні [target_ruler.GetShortNameWithNoTooltip], [target_char.GetShortNameWithNoTooltip] і їхнє новонароджене дитя!"
  consort_events.313.a.tt: "[target_ruler.GetName] сповістить про народження своєї дитини, і це надихне народ #ONCLICK:COUNTRY,[ROOT.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.Custom('CL_tt')],X [ROOT.Custom('CL_GEN')|L]#!#!."