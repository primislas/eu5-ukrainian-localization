l_russian:
  STATIC_MODIFIER_NAME_minor_recovery_effort: "Незначні заходи підтримки"
  STATIC_MODIFIER_NAME_major_recovery_effort: "Значні заходи підтримки"
  earthquake_events.1.title: "Землетрус у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  earthquake_events.1.desc: "На [target_location.Custom('LR_ACC')|l] [target_location.GetName] спіткало жахливе лихо! Земля і небо ніби розкололися, тисячі будівель обвалилися через жахливу тряску, незліченна кількість мешканців залишилися без даху над головою. Серйозно постраждало найвеличніше диво нашого [target_location.Custom('LR_GEN')|l] — #TOOLTIP:WORK_OF_ART,$hagia_sophia_tt$,X #L собор Святої Софії#!#!. На відновлення підуть багато років і чималі кошти…"
  earthquake_events.1.a: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  earthquake_events.1.b: "Негайно виділити кошти на ремонт!"
  earthquake_events.title: "Землетрус [GetCurrentYear] року в [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  earthquake_events_minor.desc: "Останніми днями в [target_location.Custom('LR_PREP')|l] [target_location.GetName] спостерігалися сильні поштовхи. Землетрус викликав сильну паніку серед населення і призвів до обвалення безлічі будівель, за яким послідували численні пожежі. На щастя, збиток виявився не настільки великий, як ми побоювалися. Радники зазначають, що викликані землетрусом руйнування — відмінний привід перебудувати [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetNameWithNoTooltip] відповідно до наших потреб. Якщо, звичайно, ми готові виділити на це додаткові кошти."
  earthquake_events_minor.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_minor.a.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять трохи [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені."
  earthquake_events_minor.b: "Ми підтримаємо [target_location.Custom('LR_ACC')] [target_location.GetNameWithNoTooltip] грошима."
  earthquake_events_minor.b.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять трохи [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені. Виділивши додаткові кошти, ми прискоримо відновлення постраждалої [Concept('location', 'місцевості')|e]."
  earthquake_events_major.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] стався землетрус! Потужні поштовхи стрясали місцевість протягом кількох днів, місто та його околиці сильно зруйновані. Нам ще належить повністю оцінити масштаб катастрофи, але вже зрозуміло, що регіон ще довго не оговтається від завданої шкоди. Ми повинні негайно надіслати допомогу постраждалим!"
  earthquake_events_major.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_major.a.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять багато [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені."
  earthquake_events_major.b: "Ми виділимо кошти для швидкого відновлення [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]."
  earthquake_events_major.b.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять багато [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені. Виділивши додаткові кошти, ми прискоримо відновлення постраждалої [Concept('location', 'місцевості')|e]."
  earthquake_events_catastrophic.desc: "У [target_location.Custom('LR_PREP')|l] [target_location.GetName] стався землетрус жахливої сили! Протягом кількох днів околиці стрясалися найпотужнішими поштовхами, куди сильнішими за звичайні землетруси, до яких ми давно звикли. [target_location.GetRank.GetNameWithNoTooltip] [target_location.GetNameWithNoTooltip] практично зруйнований, багато його мешканців загинули під уламками будівель, інші втратили дах над головою. Якщо терміново не виділити кошти, на відновлення підуть десятки років. Ми зобов'язані подбати про постраждалих і негайно зайнятися ліквідацією збитків."
  earthquake_events_catastrophic.a: "[target_location.GetOwner.Custom('common_string_negative')]"
  earthquake_events_catastrophic.a.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять дуже багато [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені."
  earthquake_events_catastrophy.b: "Ми зобов'язані допомогти цим нещасним!"
  earthquake_events_catastrophy.b.tt: "[target_location.GetName] і сусідні [Concept('locations', 'місцевості')|e] втратять дуже багато [Concept('prosperity', 'процвітання')|e] і позбудуться частини [Concept('pops', 'населення')|e]. Внаслідок лиха деякі [Concept('buildings', 'споруди')|e] будуть знищені. Виділивши додаткові кошти, ми прискоримо відновлення постраждалої [Concept('location', 'місцевості')|e]."
  earthquake_events.79.historical_info: "Землетрус, що знищив Лісабон, був воістину апокаліптичних масштабів. Його наслідки відчувалися по всій Європі і навіть у Новому Світі. Він стався 1 листопада 1755 року — земля затряслася, будівлі стали руйнуватися одна за одною. Поштовхи тривали всього кілька хвилин, але за ними послідувало нове лихо — пожежі, що спалахнули по всьому місту, швидко поширювалися під дією сильного вітру. Намагаючись врятуватися, тисячі людей кинулися в гавань, і їх накрило колосальне цунамі. Загальна кількість жертв у ті роки оцінювалася в 20–40 тисяч осіб. І в Португалії, і за її межами багато хто вважав цю трагедію #italic  карою Господньою#!."
  earthquake_events.7.historical_info: "Лісабонський землетрус 1531 року стався вранці 26 січня. Інтенсивні підземні поштовхи, подальший розлив річки Тежу та цунамі, які обрушилися на береги Португалії, завдали місту величезної шкоди та загубили близько 30 000 людей."
  earthquake_events.1000.title: "Землетрус у [target_location.Custom('LR_PREP')|l] [target_location.GetNameWithNoTooltip]"
  earthquake_events.1000.desc: "Наче мало нам було попередніх лих, у [target_location.Custom('LR_PREP')|l] [target_location.GetName] та його околицях стався спустошливий землетрус. Майже всі міські споруди знищені, тисячі жителів втратили дах над головою і змушені тікати в інші місця. Економіка ще недавно процвітаючого краю зруйнована вщент. І, що ще гірше, ця катастрофа відкрила нашим ворогам шлях у серце країни!"
  earthquake_events.1000.a: "Господи, помилуй нас, грішних!"
  earthquake_events.1000.b: "Ми повинні негайно відправити туди війська."
  earthquake_events.1000.tt: "[target_location.GetName] і сусідні прибережні [Concept('locations', 'місцевості')|e] втратять [Concept('prosperity', 'процвітання')|e] і [Concept('pops', 'населення')|e]', а частина [Concept('buildings', 'споруд')|e] постраждає від лиха."
  earthquake_events.1000.historical_info: "Землетрус 2 березня 1354 року спричинив грандіозні руйнування в Галліполі. Побачивши нагоду, османи швидко переправилися через Дарданелли і зайняли спустошене місто, захопивши таким чином плацдарм у Європі."
  earthquake_events.1001.title: "$earthquake_events.1000.title$"
  earthquake_events.1001.desc: "[target_country.GetAdjectiveWithNoTooltip]е місто [target_location.GetName] сильно постраждало від землетрусу. Воно лежить у руїнах, його вцілілі жителі розбіглися на всі чотири сторони, а залишки укріплень спорожніли. Сам Всевишній дає нам нагоду вирвати цю місцевість з рук #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_GEN')|L]#!#! і переселити туди наших підданих. Втім, ми б також могли запросити вмілих майстрів з числа біженців оселитися в місті [capital_location.GetName]…"
  earthquake_events.1001.a: "Всевишній послав нам знак! Готуємося наступати!"
  earthquake_events.1001.b: "Забезпечимо постраждалим усі умови для переселення в місто [capital_location.GetNameWithNoTooltip]."
  earthquake_events.1001.historical_info: "$earthquake_events.1000.historical_info$"
  earthquake_events.1100.title: "Доля [target_location.Custom('LR_GEN')|l] [target_location.GetNameWithNoTooltip]"
  earthquake_events.1100.desc: "Постраждалий від землетрусу [target_location.GetRank.GetNameWithNoTooltip|l] [target_location.GetName] досі в руїнах, а після нашого вторгнення тут стало ще гірше. Зате тепер знелюднілу місцевість можна без труднощів заселити #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турками#!#!. Кочівники та міські жителі Анатолії вже переселяються на цей бік Дарданелл, і ми готові всіляко сприяти цьому процесу. Цей [target_location.GetRank.GetNameWithNoTooltip|l] стане нашим ключовим плацдармом на території Румелії!"
  earthquake_events.1100.a: "На все воля Всевишнього."
  earthquake_events.1100.historical_info: "Після того як османський воєначальник Сулейман-паша захопив Галліполі, знелюдніле місто було швидко заселене переселенцями з Анатолії і стало першим оплотом турків у Європі. Османська експансія викликала паніку в Константинополі і призвела до Савойського хрестового походу 1366–1367 років."