l_russian:
  nobles_estate_events.1.title: "Благородне походження"
  nobles_estate_events.1.desc: "Багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] отримали своє нинішнє високе становище завдяки діянням предків, які служили державі в часи війн. Тому для більшості синів зі знатних сімейств військова кар'єра — єдиний можливий шлях. Однак армія йде в ногу з часом, і офіцери-простолюдини вже перестали бути рідкістю. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] просять нас гарантувати виняткові права для свого стану і постановити, що командиром у #L #L [ROOT.GetCountry.GetAdjective|l]#!их#! військах може бути лише людина благородного походження!"
  nobles_estate_events.1.a: "Підтвердимо їхнє особливе право командувати нашими військами."
  nobles_estate_events.1.b: "Ми не можемо давати такі обіцянки."
  nobles_estate_events.2.title: "Впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  nobles_estate_events.2.desc: "Держава — не єдине джерело влади в нашій державі. За останні десятиліття чарівний герой зі знатного стану домігся того, що впливові [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] стали могутнішими за більшість наших інститутів.\n\nЗв'язки та привілеї — потужна зброя, особливо якщо вони підкріплені амбіціями."
  nobles_estate_events.2.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nobles_estate_events.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] захоплюють владу в провінції [noble_encroachment.GetNameWithNoTooltip]"
  nobles_estate_events.3.desc: "Постійно контролювати все і всюди дуже важко. Кордони між приватними земельними володіннями часто визначені старими звичаями та документами, а в старі часи ландшафт міг бути зовсім іншим. Це можна обернути на свою користь, маючи певні ресурси. Деякі видатні [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], користуючись великим впливом у місті [ROOT.GetCountry.GetCapital.GetName], зуміли безперешкодно розширити свої володіння в провінції [noble_encroachment.GetName]. Потрібно якомога швидше щось зробити, щоб захистити державну власність."
  nobles_estate_events.3.a: "$common_string_let_it_slide$"
  nobles_estate_events.3.b: "Потребуємо повернути землі."
  nobles_estate_events.4.title: "Тиранічні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  nobles_estate_events.4.desc: "Сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої держави приймає у себе представника жителів провінції, де головує одне з наймогутніших знатних сімейств. Посланець стверджує, що ці [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] постійно зловживають владою і утискають місцеве населення, він благає нас щось зробити. [target_character.GetName], [Select_CString(target_character.IsFemale,'правителька', 'правитель')] #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!, [Select_CString(target_character.IsFemale,'зобов’язана', 'зобов’язаний')] захищати свій народ. Якщо цього не зробити, ми проявимо слабкість; крім того, це може позначитися на довгостроковому розвитку провінції. Однак [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] навряд чи прихильно сприймуть покарання такого впливового представника свого стану."
  nobles_estate_events.4.a: "Закриємо очі на зловживання."
  nobles_estate_events.4.b: "Покараємо землевласника."
  nobles_estate_events.5.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] втрачають владу"
  nobles_estate_events.5.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] останнім часом переживають не найкращі часи. Численні міжусобиці та непослідовна боротьба за владу призвели до того, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] втратили вплив у місті [ROOT.GetCountry.GetCapital.GetName]. Багато з них повернулися до своїх заміських володінь."
  nobles_estate_events.5.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  nobles_estate_events.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] вимагають посилення законів про розкіш"
  nobles_estate_events.6.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] часто виділяються своїм дорогим одягом, пишними бенкетами та красивими палацами, однак далеко не кожне сімейство може жити на широку ногу. Трапляється, що [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] нашої держави не поступаються в марнотратності середньому аристократу, а іноді навіть перевершують його. Старі правила та звичаї обмежують витрати на розкіш для людей незнатного походження, але змусити їх дотримуватися цих законів не так просто. Впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] нашої держави вважають це неприйнятним і вимагають, щоб ми змінили закони про одяг представників нижчих станів. Вони пропонують призначити великі штрафи тим, хто наважиться навмисно виглядати розкішніше за людей вищого становища."
  nobles_estate_events.6.a: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] отримають те, що просять."
  nobles_estate_events.6.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')] не змусять нас підкорятися їхнім бажанням."
  nobles_estate_events.7.title: "Денні прийоми"
  nobles_estate_events.7.desc: "[target_character.GetName], як і [Select_CString(target_character.IsFemale,'її', 'його')] предки, проводить життя в нескінченних церемоніях. Наприклад, багато хто вважає, що найкращий спосіб бути вислуханими — отримати право бути присутніми в монаршій спальні, поки [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] одягається. Без сумніву, вишукані придворні церемонії завадять аристократам плести проти нас змови у своїх заміських резиденціях, але це коштує досить дорого. З іншого боку, якщо [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] повністю виключить знать зі свого повсякденного життя, [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] втратять частину впливу, але, швидше за все, це рішення їх обурить."
  nobles_estate_events.7.a: "Влаштуємо пишну і довгу церемонію за участю найвпливовіших людей."
  nobles_estate_events.7.b: "Це нам ні до чого."
  nobles_estate_events.8.title: "Ворожі [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  nobles_estate_events.8.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] та [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] так неприязно ставляться одне до одного, що гірше, здається, бути вже не може. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] у місті [ROOT.GetCountry.GetCapital.GetName] майже пустує — тут панує взаємна недовіра. Більшість видатних родин не покидає своїх заміських маєтків. Потрібно якнайшвидше щось вжити, інакше ми втратимо владу в областях, якими керують [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]. Однак у нинішньому становищі будь-яка вимога держави загрожує збройним опором."
  nobles_estate_events.8.a: "$common_string_leave_them_be$"
  nobles_estate_events.8.b: "Зробимо так, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] підкорилися державі."
  nobles_estate_events.9.title: "Свавільні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]"
  nobles_estate_events.9.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] пов'язані з війною більше, ніж будь-які інші наші піддані. Багато поколінь тому їхні родини служили нам або тим, хто правив до нас, і здобули своє становище подвигами на полі бою. З того часу багато [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] зберігають старі традиції, навчаючись ратній справі та підтримуючи зв'язки з собі подібними.\n\nОднак у нинішньому становищі небагато [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] бажають битися в наших битвах. Високопоставлені офіцери час від часу відмовляються виконувати накази, і цілком імовірно, що частина з них таємно бажає нашої поразки."
  nobles_estate_events.9.a: "[ROOT.GetCountry.Custom('common_string_negative')]"
  nobles_estate_events.9.b: "Саме час замінити їх більш гідними людьми."
  nobles_estate_events.10.title: "Розвиток управління"
  nobles_estate_events.10.desc: "З ростом держави та бюрократії ми все більше потребуємо людей, які керуватимуть землями та вирішуватимуть різні питання. [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] вважають, що мають першочергове право на урядові посади, але [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] заперечують, що на посади потрібно призначати за особисті заслуги.\n\nВакантна посада, що звільнилася після раптової кончини вірного секретаря, загострила цей конфлікт: [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l] висувають одного кандидата, а [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] — іншого. Обидва ці люди вельми талановиті, але наше рішення матиме політичне значення."
  nobles_estate_events.10.a: "Гарний родовід — кузня гарних здібностей."
  nobles_estate_events.10.b: "Люди, які досягли всього самі, стануть нам у пригоді в управлінні державою."
  nobles_estate_events.10.c: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] підходять для цієї посади краще за них."
  nobles_estate_events.11.title: "Традиції служби"
  nobles_estate_events.11.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')] здавен служать державі як воєначальники, а останнім часом — і як надійні управителі. У державах на кшталт нашої, де [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] займають міцні позиції та вірні державі, час від часу з'являються видатні аристократи, що ведуть країну до величі."
  nobles_estate_events.11.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  STATIC_MODIFIER_NAME_disloyal_noble_officer: "Неблагонадійний офіцер"