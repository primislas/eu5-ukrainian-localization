l_russian:
  clergy_events_common: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] здавен є одним зі стовпів [ROOT.GetCountry.Custom('longname_ru_GEN')]. Вони наставляють суспільство на шлях істинний, до того ж [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] отримує собі на службу управлінців, правознавців та дипломатів із цього стану."
  clergy_estate_common_ending: "Однак настали непрості часи, і державі потрібно покривати зростаючі витрати. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] могли б надати добровільну допомогу, але ця пропозиція не зустріла ентузіазму."
  clergy_estate_events.1.title: "Libertas Ecclesiae"
  clergy_estate_events.1.desc: "$clergy_events_common$ Натомість церковні маєтки, монастирі та інші володіння не сплачують податки державі; крім того, [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] вирішують свої внутрішні справи без втручання світської влади.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.1.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.1.b: "Знайдемо гроші десь іще."
  clergy_estate_events.101.title: "Храмові землі"
  clergy_estate_events.101.desc: "$clergy_events_common$ Натомість держава та небайдужі люди протягом багатьох років жертвували села, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] могли існувати на пожертвуване. Ці землі отримали назву «брахмадея», і завдяки їм наші [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] значно розбагатіли за минулі століття.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.101.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.101.b: "Знайдемо гроші десь іще."
  clergy_estate_events.102.title: "Багаті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.102.desc: "$clergy_events_common$ Натомість [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] та шановані ними боги багато років отримували пожертви від держави та небайдужих людей. Завдяки цим дарам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] стали значно багатшими та впливовішими за минулі століття.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.102.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.102.b: "Знайдемо гроші десь іще."
  clergy_estate_events.103.title: "Багаті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.103.desc: "$clergy_events_common$ Натомість багато земель було визнано релігійною власністю та звільнено від більшої частини податків, завдяки чому [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] не відчувають потреби і можуть підтримувати багато гідних починань.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.103.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.103.b: "Знайдемо гроші десь іще."
  clergy_estate_events.104.title: "Багаті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.104.desc: "$clergy_events_common$ За свою чудову службу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] багато років отримували пожертви від держави та небайдужих людей. Завдяки цим дарам вони стали значно багатшими та впливовішими за минулі століття.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.104.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.104.b: "Знайдемо гроші десь іще."
  clergy_estate_events.105.title: "Багаті [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.105.desc: "$clergy_events_common$ За свою чудову службу [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] та їхні обширні земельні володіння багато років отримували пожертви від держави та небайдужих людей. Завдяки цим дарам [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] стали значно багатшими та впливовішими за минулі століття.\n\n$clergy_estate_common_ending$"
  clergy_estate_events.105.a: "Дамо зрозуміти, що їм потрібно зробити свій внесок."
  clergy_estate_events.105.b: "Знайдімо гроші деінде."
  clergy_estate_events.2.title: "Впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.2.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] ніколи не покладалися на державу. Навпаки, завдяки своєму зв'язку з духовним світом [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] надають легітимності світській владі, і [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] багато в чому спирається на їхню підтримку. За останній час вправні політичні маневри, розпалювання страху та щедрі пожертви наших підданих міцно зміцнили владу цього стану."
  clergy_estate_events.2.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.3.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] втрачають вплив"
  clergy_estate_events.3.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] покладаються на єдність із народом більше, ніж будь-який інший стан. Важко сказати точно, чому так сталося, але в останні роки [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] стали сприйматися не як духовні наставники нашої держави, а скоріше як багаті корумповані інтригани. До того ж [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] не найкращим чином розвивали свої володіння та приймали невірні політичні рішення. Усе це призвело до того, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] стали втрачати владу та вплив. На жаль, вони не бажають брати провину за те, що відбувається, на себе і замість цього перекладають відповідальність на уряд."
  clergy_estate_events.3.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.4.title: "Антиклерикалізм"
  clergy_estate_events.4.desc: "У кількох великих містах нашої держави [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] останнім часом стали користуватися сумнівною славою жадібних і бездіяльних людей. Набожні простолюдини та [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] об'єдналися і на знак незгоди з особливо кричущими зловживаннями церковною владою відмовилися виплачувати десятину.\n\n[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] у люті й тепер вимагають, щоб [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l], яких вони звинувачують у тому, що ті стоять на чолі цього руху, виплатили нам штраф."
  clergy_estate_events.4.a: "Ми змусимо їх заплатити!"
  clergy_estate_events.4.b: "Достатньо буде й м'якого докору."
  clergy_estate_events.5.title: "Ворожі [ROOT.GetCountry.GetGovernment.GetEstateNameWithnoTooltip('clergy_estate')|l]"
  clergy_estate_events.5.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] перебувають не в найкращих стосунках із державою — аж до того, що будь-яке спілкування з ними неодмінно відбувається в обстановці недовіри та навіть відвертої зневаги. Святині нашої держави стали місцями опору, де [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] відверто засуджується. Більша частина вірян на наших землях сумнівається в легітимності нашого правління.\n\nНе дивно, що навіть найнезначніші помилки та промахи лише підігрівають бурхливі невдоволення. По всій країні повстають [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l], яких підбурюють [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l], спрямовуючи народний гнів проти нас."
  clergy_estate_events.5.a: "[ROOT.GetCountry.Custom('common_string_ok')]"
  clergy_estate_events.6.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] взяли гору?"
  clergy_estate_events.6.desc: "Хоча [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] повсюдно користуються повагою, і ніхто не сміє відкрито кинути їм виклик, мало в яких державах вони такі ж впливові, як на території #ONCLICK:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.Custom('CL_GEN')|L]#!#!. У нас немає жодного інституту, який би не контролювали [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l], а [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] залежить від них ще більше, ніж раніше.\n\nНапевно, цілком природно, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] захотіли активніше брати участь у правлінні державою. Останнім часом їхні представники внесли низку пропозицій, покликаних привести наші закони у відповідність до духовних традицій, оскільки, на їхню думку, [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої держави — розсадник єресі. Вони прагнуть домогтися того, щоб управління державою відповідало релігійним ідеалам і правилам."
  clergy_estate_events.6.a: "Дотримаймося їхніх рекомендацій."
  clergy_estate_events.6.b: "Відкинути їхню пропозицію."
  clergy_estate_events.7.title: "Впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]"
  clergy_estate_events.7.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')] нерідко підтримують правителів, але мало в кого є такі впливові прихильники, як у нас. Ми і [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] здавна віддані одне одному і діємо спільно. Це призвело до того, що [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l], а точніше, їхня правляча верхівка вважає себе частиною державного управління, а не самостійним інститутом. По всій країні вони віщають про те, що [ROOT.GetCountry.GetGovernment.GetRulerTitle|l] — взірець благочестя та духовної сили."
  clergy_estate_events.7.a: "[ROOT.GetCountry.Custom('common_string_positive')]"
  clergy_estate_events.8.title: "Присвоєння земель"
  clergy_estate_events.8.desc: "Багато земельних пожертвувань зроблено досить давно. Вони завжди оформляються письмово, але з плином років імена та ландшафт можуть сильно відрізнятися від того, що записано в дарчій. Останнім часом [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] стверджують, що деякі [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l] нахабно захопили землю, яку [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] багато років тому отримали в дар. [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] ж заперечують, що це [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l] намагаються привласнити чужі ділянки, на які в них немає жодного права.\n\nТі, чию сторону ми приймемо, стануть найбільшими землевласниками в цій області."
  clergy_estate_events.8.a: "Заявимо, що праві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]."
  clergy_estate_events.8.b: "Заявимо, що праві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]."
  clergy_estate_events.8.c: "Не будемо приймати нічиєї сторони."