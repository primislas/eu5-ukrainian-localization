l_russian:
  generic_mission_events.4.title: "[arguing_estate.GetNameWithNoTooltip|U] протестують у [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]"
  generic_mission_events.4.desc: "[arguing_estate.GetName] занепокоєні: їм не подобається, що [mission_target_estate.GetName|l] починають користуватися все більшим впливом при нашому дворі. У [target_location.Custom('LR_PP')|l] [target_location.GetName] вони навіть перейшли до протестів; [target_character.GetName] звинувачується у прояві особистої прихильності на шкоду сформованій рівновазі сил.\n\nЦі заворушення загрожують зруйнувати делікатний взаємозв'язок між станами та підірвати внутрішню єдність [ROOT.GetCountry.Custom('CF_RP')|l]. Радники та місцеві управителі наполегливо просять нас втрутитися, доки протести не охопили всю столицю."
  generic_mission_events.4.a: "Нехай [arguing_estate.GetNameWithNoTooltip|l] не розраховують на нашу увагу."
  generic_mission_events.4.b: "Їхні претензії цілком обґрунтовані."
  generic_mission_events.4.c: "[target_character.GetShortNameWithNoTooltip] змусить їх замовкнути!"
  generic_mission_events.4.d: "Нам немає діла до цих дурних чвар."
  upset_both_estates_devastate_target_location_tt: "Протести можуть вийти з-під контролю та зруйнувати [target_location.Custom('LR_VP')|l] [target_location.GetName]"
  protests_die_down_tt: "Протести швидко зійдуть нанівець"
  generic_mission_events.5.title: "[target_character2.GetName] просить про пожертвування"
  generic_mission_events.5.desc: "[target_character1.GetName] вислуховує задум, з яким до [Select_CString(target_character1.IsFemale, 'неї', 'нього' )] [Select_CString(target_character2.IsFemale, 'звернулася', 'звернувся' )] [target_character2.GetName]. [Select_CString(target_character2.IsFemale, 'Вона', 'Він' )] стверджує, що якщо [mission_target_estate.GetName|l] отримають щедре пожертвування, то урядовий орган, де зараз засідає [target_character2.GetName], — [ROOT.GetCountry.GetGovernment.GetCabinetTitle|l] — буде змушений розширити [Select_CString(target_character2.IsFemale, 'її', 'його' )] повноваження.\n\nПропозиція ця зроблена не тільки з міркувань особистої вигоди: якщо ми погодимося, зв'язок між [ROOT.GetCountry.Custom('CF_TP')|l] та станами стане тільки міцнішим."
  generic_mission_events.5.a: "Зробити [Select_CString(target_character2.IsFemale, 'їй', 'йому' )] пропозицію, від якої неможливо відмовитися."
  generic_mission_events.5.b: "Нам це не по кишені."
  generic_mission_events.6.title: "Заклик до децентралізації"
  generic_mission_events.6.desc: "[mission_target_estate.GetName|U] подали офіційне прохання про повернення до децентралізованої форми правління. Вони стверджують, що владу, якою зараз одноосібно користується [target_character.GetName], слід не зосереджувати в руках однієї людини, а розподіляти між місцевими управителями.\n\nТим самим вони не тільки хочуть обмежити зростаючу владу, якою володіють [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]: [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої держави відчуває вплив з усіх сторін, а тому вони прагнуть схилити цю рівновагу на свою користь."
  generic_mission_events.6.desc.generic: "Стани подали офіційне прохання про повернення до децентралізованої форми правління. Вони стверджують, що владу, якою зараз одноосібно користується [target_character.GetName], слід не зосереджувати в руках однієї людини, а розподіляти між місцевими управителями.\n\nТим самим вони не тільки хочуть обмежити зростаючу владу, якою володіють [ROOT.GetCountry.GetGovernment.GetEstateName('crown_estate')|l]: [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] нашої держави відчуває вплив з усіх сторін, а тому вони прагнуть схилити цю рівновагу на свою користь."
  generic_mission_events.6.a: "Доведеться піти їм назустріч…"
  generic_mission_events.6.b: "Вони не сміють вказувати, як [Select_CString(target_character.IsFemale, 'має', 'має' )] правити [target_character.GetNameWithNoTooltip]!"
  generic_mission_events.7.title: "[target_pop_scope.GetNameWithNoTooltip] допомагають провінції [target_province.GetNameWithNoTooltip] розвиватися"
  generic_mission_events.7.desc: "[mission_target_estate.GetName|U] проявили себе гідними співучасниками: спільними зусиллями ми домоглися того, що [target_pop_scope.GetName|l] зажили в добробуті, і тепер [target_province.GetName] розвивається на очах.\n\nЦей успіх — яскраве свідчення і користі співдружності, і мудрості політики, яку проводять [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] та [target_character.GetShortName]."
  generic_mission_events.7.a: "Це доводить, що ми цілком можемо дружно співіснувати!"
  generic_mission_events.7.b: "Все тому, що [target_character.GetShortNameWithNoTooltip] — [Select_CString(target_character.IsFemale, 'мудра правителька', 'мудрий правитель' )]!"
  member_of_the_mission_target_estate_may_approach_us_again_after_months_tt: "Через кілька місяців [Concept('estate','стан')|e] можуть звернутися до нас знову"
  generic_mission_events.8.title: "Процес приєднання"
  generic_mission_events.8.desc: "Поки [target_character1.GetName] керує приєднанням #ONCLICK:COUNTRY,[mission_target_subject.Custom('CL_tt')] #TOOLTIP:COUNTRY,[mission_target_subject.Custom('CL_tt')],X [mission_target_subject.Custom('CL_RP')|L]#!#! до нашої держави, [mission_target_subject.Custom('GetRulerOrRegentTitle')|l] #ONCLICK:COUNTRY,[mission_target_subject.Custom('CL_tt')] #TOOLTIP:COUNTRY,[mission_target_subject.Custom('CL_tt')],X [mission_target_subject.Custom('CL_RP')|L]#!#! [target_character2.GetName] продовжує керувати, засідаючи в [target_location.Custom('LR_PP')|l] [target_location.GetName].\n\nПриєднання йде своїм чергом, і все вказує на те, що воно пройде гладко. Якщо ніхто не втрутиться, [mission_target_subject.GetName] увійде до складу нашої країни цілком."
  generic_mission_events.8.a: "Потрібно прискорити цей процес, доки є можливість."
  generic_mission_events.8.b: "Не&nbsp;будемо квапити події."
  generic_mission_events.9.title: "Дипломатичний інцидент"
  generic_mission_events.9.desc: "Інтеграція пов'язана з&nbsp;безліччю труднощів. Зокрема, спроби об'єднати дві різні правові системи нерідко призводять до&nbsp;дипломатичних інцидентів. Нещодавно якраз стався один такий випадок, який може негативно вплинути на&nbsp;процес приєднання нових територій."
  generic_mission_events.9.a: "[target_character1.GetShortNameWithNoTooltip] зможе заново домовитися про&nbsp;що&nbsp;завгодно."
  generic_mission_events.9.b: "Це безумовно підірве наші зусилля…"
  generic_mission_events.9.c: "Продовжувати приєднання, незважаючи на&nbsp;затримки."
  diplomatic_abilities_of_target_character_prevent_any_negative_incident: "Завдяки своїй [Concept('dip','дипломатичній навичці')|e] [target_character1.GetName] не&nbsp;дозволить тому, що&nbsp;сталося, завадити приєднанню"
  generic_mission_events.10.title: "Культурний обмін"
  generic_mission_events.10.desc: "Включення #ONCLICK:COUNTRY,[mission_target_subject.Custom('CL_tt')] #TOOLTIP:COUNTRY,[mission_target_subject.Custom('CL_tt')],X [mission_target_subject.Custom('CL_RP')|L]#!#! до&nbsp;складу [ROOT.GetCountry.Custom('CF_RP')|l] лише примножило наші багаті традиції та&nbsp;уклад: ми обмінюємося мовою, мистецтвом, звичаями&nbsp;— і&nbsp;тим&nbsp;самим наші народи змінюються під&nbsp;впливом один&nbsp;одного.\n\nМожна сміливо сказати, що з&nbsp;часом подібне взаємне збагачення виявиться винятково корисним, і&nbsp;наші творці ще&nbsp;довго черпатимуть з&nbsp;нього натхнення…"
  generic_mission_events.10.a: "Сяй, зірко [target_culture.GetNameWithNoTooltip|l]ої культури!"
  generic_mission_events.10.b: "Ми можемо залучити до&nbsp;себе найвидатніших діячів з&nbsp;їхнього народу."
  generic_mission_events.11.title: "#L [target_culture.GetNameWithNoTooltip]а#! культура проти #L [target_culture2.GetNameWithNoTooltip|l]ої#!"
  generic_mission_events.11.desc: "Наші держави незабаром об'єднаються на&nbsp;політичному рівні, проте культурні розбіжності все&nbsp;ще досить сильні. #L [target_culture.GetNameWithNoTooltip|U]е#! населення свариться з&nbsp;#L [target_culture2.GetNameWithNoTooltip|l]им#! через звичаї, мову і&nbsp;навіть уявні образи.\n\nДеякі наші радники вважають, що для&nbsp;примирення цих людей слід знайти цапа-відбувайла. Інші&nbsp;ж просто вважають, що злиття двох держав&nbsp;— носіїв настільки різних культур вже дивовижне саме&nbsp;по&nbsp;собі."
  generic_mission_events.11.a: "Ця ситуація загрожує нам дипломатичними проблемами…"
  generic_mission_events.11.b: "[target_scapegoat_character.GetNameWithNoTooltip] стане цапом-відбувайлом!"
  generic_mission_events.12.title: "[target_overlord.GetNameWithNoTooltip] зміцнює дипломатичні зв'язки"
  generic_mission_events.12.desc: "Влада #ONCLICK:COUNTRY,[target_overlord.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_overlord.Custom('CL_tt')],X [target_overlord.Custom('CL_GEN')|L]#!#! намагається зміцнити відносини, що&nbsp;пов'язують наші держави. З&nbsp;стратегічного інтересу чи з&nbsp;щирих спонукань&nbsp;— невідомо, але не&nbsp;звернути увагу на&nbsp;такі кроки неможливо.\n\nЛише час покаже, чи&nbsp;стоїть за&nbsp;цими жестами якийсь умисел. Поки&nbsp;що ми будемо зберігати пильність і&nbsp;спостерігати."
  generic_mission_events.12.a: "Будемо спостерігати за [Select_CString(target_overlord.IsFemale,'її','його')] подальшими діями."
  overlord_info_generic_vassal_mission_pack_tt: "[target_overlord.GetName] зараз виконує [Concept('mission','завдання')|e] «[ShowMissionName('generic_vassal_ties')]» щодо нас"
  generic_mission_events.13.title: "Розвиток [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  generic_mission_events.13.desc: "[target_location.GetRank.GetName|U] [target_location.GetName] у&nbsp;провінції [target_province.GetName] стрімко розвивається. Торговці та&nbsp;чиновники тут почуваються вільно: купці стікаються на&nbsp;ринки, ремісники відкривають один цех за&nbsp;іншим, а&nbsp;місцеві службовці стають тільки багатшими та&nbsp;впливовішими разом з&nbsp;#L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_INST')|l]#!#!. Очевидно, все це було б&nbsp;неможливо без централізації [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. Незабаром так виглядатиме вся держава&nbsp;— про це подбає [target_character.GetName]."
  generic_mission_events.13.a: "Наші зусилля приносять свої плоди!"
  generic_mission_events.13.b: "Варто направити більше коштів на&nbsp;централізацію."
  generic_mission_events.13.c: "Нехай усе йде своїм чергом."
  valid_province_tt: "Для цього варіанта [Concept('event','події')|e] є&nbsp;відповідна [Concept('province','провінція')|e]"
  generic_mission_events.14.title: "[target_province.GetNameWithNoTooltip] чинить опір централізації"
  generic_mission_events.14.desc: "Далеко не всі жителі провінції [target_province.GetName] згодні розділити ту долю, яку [Select_CString(target_character.IsFemale, 'приготувала', 'приготував' )] їм [target_character.GetName]. Прагнення до централізації не знайшло відгуку: старі нарікають на забуття традицій, місцева влада працює абияк, а в селах усе частіше можна почути слово «неволя». Спроби встановити порядок сприймаються як втручання. Нам слід остерігатися не стільки відкритих бунтів, скільки тихого опору — впертої мовчанки, непрямої непокори, що загрожує підірвати саму основу нашої влади над [ROOT.GetCountry.Custom('CF_TP')|l]."
  generic_mission_events.14.a: "Вони явно забули своє місце!"
  generic_mission_events.14.b: "Вони не розуміють наших добрих намірів…"
  generic_mission_events.14.c: "[target_character2.GetShortNameWithNoTooltip] стане цапом-відбувайлом!"
  suitable_character_exists_tt: "Для цього варіанта [Concept('event','події')|e] є відповідний [Concept('character','персонаж')|e]"
  generic_mission_events.15.title: "Ігнорування сільських районів"
  generic_mission_events.15.desc: "Жителі провінції [target_province.GetName] та її головного поселення — [target_location.Custom('LR_RP')|l] [target_location.GetName] — усе частіше починають висловлювати невдоволення: їм не подобається, що ми приділяємо всю увагу розвитку великих міст і центральній владі, тоді як села й селища залишаються осторонь. Ці люди одностайні у своїх вимогах: призупинити перетворення та згадати про забуту сільську місцевість, адже саме хлібороби — та основа, на якій тримається [ROOT.GetCountry.GetFlavorRank|l]."
  generic_mission_events.15.a: "Їхнє невдоволення не вплине на наші рішення."
  generic_mission_events.15.b: "Турботи простолюдинів нас не хвилюють."
  generic_mission_events.15.c: "Можливо, нам допоможуть [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l]."
  progress_towards_centralization_will_not_be_hindered_tt: "Просування до [Concept('societal_value','суспільної цінності')|e] «[ShowSocietyDirectionName('centralization')]» не сповільниться"
  generic_mission_events.16.title: "[target_character.GetNameWithNoTooltip] та [Select_CString(target_character.IsFemale, 'її', 'його')] податкові реформи"
  generic_mission_events.16.desc: "На шляху до централізації [ROOT.GetCountry.Custom('CF_VP')|l] супроводжують глибокі перетворення: [target_character.GetName] збирається докорінно змінити підхід до оподаткування в нашій державі, позбавивши місцеву владу повноважень стягувати податки. Якщо цей задум здійсниться, володіти таким правом буде виключно [Select_CString(target_character.IsFemale, 'сама', 'сам')] [target_character.GetName]. [Select_CString(target_character.IsFemale, 'Вона', 'Він')] стверджує, що тоді приплив коштів до скарбниці збільшиться, а їх збір спроститься, але з цим не згодні стани: вплив втратять усі — і [ROOT.GetCountry.GetGovernment.GetEstateName('nobles_estate')|l], і [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], і їхнє невдоволення вже поступово переростає в неприйняття."
  generic_mission_events.16.a: "Провести реформу всупереч їхньому невдоволенню."
  generic_mission_events.16.b: "Краще залишити все як є."
  generic_mission_events.17.title: "[target_location.GetNameWithNoTooltip] — нове містечко?"
  generic_mission_events.17.desc: "[target_location.GetRank.GetNameWithNoTooltip] [target_location.GetName] розростається на очах. На вулицях не проштовхнутися від землеробів, торговців і ремісників, які шукають кращої долі ближче до серця [ROOT.GetCountry.Custom('rank_ru_GEN')|l]. [target_location.GetName] — поки ще [target_location.GetRank.GetName|l], але попри своє скромне становище, це поселення є стратегічно та економічно важливим, адже поруч [ROOT.GetCountry.GetCapital.GetName], земля тут родюча, дороги наїжджені, місцеві жителі працьовиті, а їхні прагнення високі.\n\nЯкщо вкласти сюди достатньо коштів, [target_location.GetRank.GetName|l] [target_location.GetNameWithNoTooltip] стане повноцінним містечком з ринками, майстернями та навіть власною хартією. Так ми не тільки забезпечимо тут порядок і процвітання, а й отримаємо яскраве втілення ідей централізації. Залишилося лише виділити гроші та знайти в собі сили довести справу до кінця."
  generic_mission_events.17.a: "[target_location.GetNameWithNoTooltip] стане добротним містечком!"
  generic_mission_events.17.b: "Не будемо поспішати."
  cost_of_town_scales_tt: "Вартість цього [Concept('urban_location', 'міського району')|e] буде знижуватися залежно від нашої [Concept('societal_value','суспільної цінності')|e] «[ShowSocietyDirectionName('centralization')]» та [Concept('modifier','модифікатора')|e] «[ShowModifierTypeName('town_upgrade_cost_modifier')]»"
  generic_mission_events.18.title: "Вчені з [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip]"
  generic_mission_events.18.desc: "Покинувши тишу своїх читалень, до нас звернулися вчені з [target_location.Custom('LR_RP')|l] [target_location.GetName] — нечисленні, але віддані своїй справі. Вони шукають не тільки покровительства, а й визнання. Ці люди настільки наполегливі у своїх вимогах визнати прагнення до знань, відкриттів і торжества розуму стовпом, на якому ґрунтується будь-яка централізована та просвічена держава — зокрема й [ROOT.GetCountry.GetFlavorRank|l] під нашою владою, — що вислухати їх [Select_CString(target_character.IsFemale, 'була змушена', 'був змушений')] навіть [target_character.GetName].\n\nПрохання вражає своїм охопленням: переклади іноземних праць, встановлення листування з мислителями з інших країн, будівництво скромного, але довговічного академічного закладу… Нехай наміри вчених збігаються з настроями та обстановкою в [ROOT.GetCountry.Custom('CF_PP')|l], але все-таки слід врахувати, що подібні починання неможливі без грошей, терпіння, а головне — захисту від тих, хто вважає наукову діяльність марною тратою часу на шкоду війні чи управлінню."
  generic_mission_events.18.a: "Виділити кошти на їхні ініціативи."
  generic_mission_events.18.b: "Ми не станемо витрачатися на такі дурниці."
  based_on_target_location_average_literacy_tt: "Залежно від середнього рівня [Concept('literacy','грамотності')|e] в [target_location.Custom('LR_PP')|l] [target_location.GetName]:"
  scholars_in_target_location_wont_approach_tt: "#italic Доки виконується поточний [Concept('mission_task','етап завдання')|e], вчені в [target_location.Custom('LR_PP')|l] [target_location.GetName] за кілька місяців можуть звернутися до нас знову#!"
  generic_mission_events.19.title: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] цінує такий розум"
  generic_mission_events.19.desc: "[ROOT.GetCountry.GetCapital.GetName] бурхливо обговорює новоприбулого гостя на ім'я [target_character2.GetName] — маловідомого, але багатообіцяючого творця, що прибув до столиці зі сміливими теоріями, забезпеченими примітками рукописами та сміливими задумами щодо перетворення інтелектуальної культури [ROOT.GetCountry.Custom('CF_RP')|l]. Хтось називає [Select_CString(target_character2.IsFemale, 'її', 'його' )] шахраєм, хтось — незвичайним обдаруванням, але всі сходяться в одному: [Select_CString(target_character2.IsFemale, 'вона', 'він' )] шукає собі покровителя при дворі, щоб дати волю своїм задумкам.\n\nПрихильники верховенства розуму та реформ закликають нас ризикнути, а цінителі чиношанування та традицій вимагають прибрати [Select_CString(target_character2.IsFemale, 'її', 'його' )] якомога швидше."
  generic_mission_events.19.a: "У [Select_CString(target_character.IsFemale, 'ній', 'ньому' )] є задатки величі!"
  generic_mission_events.19.b: "[ROOT.GetCountry.GetGovernment.GetCourtTitle] не бажає витрачати час на чергового бездаря."
  skill_of_scientist_scales_with_country_literacy_tt: "[Concept('artistic_skill','Талант')|e] персонажа [target_character2.GetName] буде частково залежати від середнього рівня [Concept('literacy','грамотності')|e] в [ROOT.GetCountry.Custom('CF_PP')|l]"
  artist_will_be_promtly_defenestrated_tt: "#italic [target_character2.GetName] відправиться в довгий політ з вікна#!"
  generic_mission_events.20.title: "[target_character2.GetNameWithNoTooltip] — блискучий розум"
  generic_mission_events.20.desc: "Представники вчених кіл столиці почали знайомитися з трактатами мислителя на ім'я [target_character2.GetName]. [Select_CString(target_character2.IsFemale, 'Ця смілива жінка', 'Цей сміливий чоловік' )] майстерно володіє словом, не боїться кидати виклик усталеним вченням і пропонує замість них докорінні перетворення в уряді, законодавстві та духовенстві. Деякі тихо називають [Select_CString(target_character2.IsFemale, 'її', 'його' )] генієм, інші звинувачують у блюзнірстві, але зараз вже не настільки важливо, хто з них правий: обговорення [Select_CString(target_character2.IsFemale, 'її', 'його' )] праць вийшло далеко за межі читальних залів, і тепер нам настав час винести власне судження. Від нашої відповіді залежить не тільки доля автора, а й загалом шлях інтелектуального розвитку [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  generic_mission_events.20.a: "У [Select_CString(target_character2.IsFemale, 'її', 'його' )] словах є істина."
  generic_mission_events.20.b: "Спалити цю єресь!"
  generic_mission_events.20.c: "Продамо ці праці тому, хто запропонує за них найкращу ціну."
  generic_mission_events.21.title: "Єретичні дослідження"
  generic_mission_events.21.desc: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] щиро обурені останніми гіпотезами наших вчених. Ці гіпотези прямо суперечать укоріненим переконанням і священним писанням, оскільки засновані на спостереженнях і логіці, а тому небезпечно межують з єрессю.\n\nВодночас у придворних та інтелектуальних колах одностайно вважають, що ці відважні люди рухають #L [target_culture.GetName|l]у#! культуру вперед. Підтримавши вчених, ми зробимо крок до сучасного та світського суспільства [ROOT.GetCountry.Custom('rank_ru_GEN')|l], але цьому не будуть раді носії нашого традиційного духу та укладу, такі як [target_pop_scope.GetName|l]."
  generic_mission_events.21.a: "Нам байдуже, наскільки обурені [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]."
  generic_mission_events.21.b: "Не варто злити духовенство."
  generic_mission_events.21.c: "Старі в рясах не повинні заважати вченим робити свою роботу!"
  will_not_hinder_our_progress_to_innovative_tt: "Просування до [Concept('societal_value','суспільної цінності')|e] «[ShowSocietyDirectionName('innovative')]» не сповільниться"
  clergy_do_not_dare_move_against_target_character_tt: "[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|U] не наважаться виступити проти персонажа [target_character.GetName]"
  generic_mission_events.22.title: "Бібліотека в [target_location.Custom('LR_PP')|l] [target_location.GetNameWithNoTooltip]"
  generic_mission_events.22.desc: "Гості та жителі [target_location.Custom('LR_RP')|l] [target_location.GetNameWithNoTooltip], об'єднавши сили та кошти, спорудили (звісно, не без нашого схвалення та грошової допомоги) пам'ятник цікавості людського розуму — бібліотеку, сховище знань, що розвиває в людях грамотність і приваблює мислителів з усього світу.\n\nРозміри її скромні, але куди важливіша суть: бібліотека — образ зростаючої в провінції [target_province.GetName] тяги до знань. Перші кілька полиць вже заставлені новими томами, рукописами та записами. Якщо забезпечити їй достатню підтримку, в тому числі грошима, згодом вона може стати світочем освіти в [ROOT.GetCountry.Custom('CF_PP')|l], надихаючи багато поколінь вчених і бажаючих стати такими."
  generic_mission_events.22.a: "Це розумне вкладення."
  generic_mission_events.22.b: "Запросити жителів з усієї провінції [target_province.GetNameWithNoTooltip]"
  generic_mission_events.22.c: "Можливо, [target_heir.GetShortNameWithNoTooltip] знайде її корисною?"
  heir_gains_depend_on_inno_and_literacy_tt: "Загальна отримана [Concept('total_ability','сума навичок')|e] сильно залежатиме від середнього рівня [Concept('literacy','грамотності')|e] та показника [Concept('societal_value','суспільної цінності')|e] «[ShowSocietyDirectionName('innovative')]» у [ROOT.GetCountry.Custom('CF_PP')|l]"
  generic_mission_events.23.title: "Іноземне втручання"
  generic_mission_events.23.desc: "Перешіптування на вулицях столиці та розмови за зачиненими дверима свідчать лише про одне: наші вороги приступили до виконання свого задуму. Дипломатичні образи, укладені в нас за спиною договори та виключення нашої держави з різних переговорів означає, що зусиллями #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_RP')|L]#!#! наше добре ім'я виявилося зганьбленим і на батьківщині, і за кордоном. На таке підбурювання потрібно дати рішучу відповідь! Ми не дозволимо, щоб наш суверенітет ставився під сумнів, навіть якщо за цим стоять [target_character2.GetName] та [Select_CString(target_character2.IsFemale, 'її', 'його' )] поплічники!"
  generic_mission_events.23.a: "Неймовірна підступність!"
  already_destabilized_desc: "Ми вже страждаємо від впливу цього [Concept('modifier','модифікатора')|e]"
  target_country_sow_discontent_tt: "Держава [target_country.GetName] застосувала проти нас [Concept('diplomatic_action','дипломатичну дію')|e] «[ShowRelationTypeName('sow_discontent')]» у спробі ще більше дестабілізувати [ROOT.GetCountry.Custom('CF_VP')|l]"
  generic_mission_events.24.title: "Опікунство над [target_location.Custom('LR_TP')|l] [target_location.GetNameWithNoTooltip]"
  generic_mission_events.24.desc: "Влада [target_location.Custom('LR_RP')|l] [target_location.GetName], слідуючи нашому прагненню до централізації багатства та економіки, запросила досить значні кошти. Вони стверджують, що розвиток інфраструктури, зокрема торгової, — шлях до перетворення #L #TOOLTIP:LOCATIONRANK,[target_location.Custom('LR_tt')],X [target_location.Custom('LR_RP')|l]#!#! на наріжний камінь економіки [ROOT.GetCountry.Custom('CF_RP')|l].\n\nЗапитувана сума вельми велика, проте можлива вигода — як економічна, так і політична — переважує витрати. Радники вважають, що діяти треба якомога швидше, щоб не уповільнювати перехід до капіталізму."
  generic_mission_events.24.a: "Це важлива ініціатива. Ми її підтримаємо."
  generic_mission_events.24.b: "Зараз у нас немає на це коштів."
  generic_mission_events.25.title: "Занепад сільських районів"
  generic_mission_events.25.desc: "Жителі сіл та селищ дедалі частіше скаржаться на зневагу з нашого боку, оскільки майже вся увага ми приділяємо містам та торговим вузлам. Сільські старости з провінції [target_province.GetName] скаржаться на зростання зборів, повну занедбаність своїх поселень та небажання молодих залишатися в селах — вони воліють перебиратися до міст. Різниця між міськими ринками, де кипить життя, та безмовними, порослими бур'янами полями з кожним днем стає лише помітнішою. [ROOT.GetCountry.GetGovernment.GetCourtTitle|U] не сходиться в думках: деякі стверджують, що такі неминучі наслідки розвитку сучасних держав, інші — що на скарги варто звернути увагу, інакше вони переростуть у бунти."
  generic_mission_events.25.a: "Така ціна прогресу."
  generic_mission_events.25.b: "Не можна допустити, щоб наші села занепали!"
  progress_towards_cap_economy_will_not_be_hindered_tt: "Просування до [Concept('societal_value','суспільної цінності')|e] «[ShowSocietyDirectionName('capital_economy')]» не уповільниться"
  generic_mission_events.26.title: "Розвиток виробництва: [target_good.GetNameWithNoTooltip|l]"
  generic_mission_events.26.desc: "Завдяки зрослому попиту на такий товар, як [target_good.GetName|l], економіка [target_location.Custom('LR_RP')|l] [target_location.GetName] різко пішла в зростання. [target_location.GetRank.GetName|U] сьогодні — важлива деталь у механізмі нашої молодої капіталістичної економіки, чому чимало посприяло відкриття нових майстерень та ринків, а також зростання торгівлі. Цьому вельми раді [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l], які шукають нові можливості розширити свій вплив.\n\nОднак деякі [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|l] вкрай незадоволені тим, що від стрімкого розширення страждає їхня земля: землероби лише втрачають свої поля, майже нічого не отримуючи натомість."
  generic_mission_events.26.a: "Це неминучі наслідки розвитку."
  generic_mission_events.26.b: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|U] — теж люди. Не будемо про них забувати."
  generic_mission_events.27.title: "[target_province.GetNameWithNoTooltip] чинить опір урбанізації"
  generic_mission_events.27.desc: "Наші спроби забудувати провінцію [target_province.GetName] містами натрапили на несподіваний опір. Місцеві жителі на чолі з владою не хочуть приймати наші перетворення — вони бояться змін, а особливо бюрократії, яка загрожує звести нанівець їхню самостійність.\n\nПоки що вони не наважуються не підкорятися відкрито, але скарги з боку містобудівників та управлінців зростають: вони скаржаться на постійні перешкоди, затримки та небажання йти назустріч. Мабуть, це перша ознака невидимого неприйняття нашої політики урбанізації."
  generic_mission_events.27.a: "Рано чи пізно вони звикнуть до нових порядків."
  generic_mission_events.27.b: "Краще залишити все як є."
  generic_mission_events.28.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|U] схвалюють суспільний прогрес"
  generic_mission_events.28.desc: "На недавньому зібранні в [target_location.Custom('LR_PP')|l] [target_location.GetName] [ROOT.GetCountry.GetGovernment.GetEstateName('burghers_estate')|l] офіційно підтримали перехід нашої держави до капіталізму. Вони зазначили, що [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вельми гідно вирішує питання вкладень коштів у міста, заохочення торгівлі та інфраструктури.\n\nЩоб продемонструвати свою вдячність — і, можливо, ще більше прихилити нас до себе — вони заявили, що готові зробити до казни щедрий внесок, виділений спеціально на будівництво міст."
  generic_mission_events.28.a: "Ми вдячні їм за цей подарунок."