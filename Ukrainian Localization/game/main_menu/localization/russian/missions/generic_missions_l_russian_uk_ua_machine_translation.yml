l_russian:
  mission_select_market: "Оберіть [Concept('market', 'ринок')|e] для цього [Concept('mission', 'завдання')|e]"
  mission_no_markets: "$no_valid_markets$"
  mission_select_goods: "Оберіть [Concept('goods', 'товари')|e] для цього [Concept('mission', 'завдання')]"
  mission_no_goods: "$no_valid_goods$"
  mission_task_select_market: "Оберіть [Concept('market', 'ринок')|e] для цього [Concept('task', 'етапу')|e]"
  mission_task_no_markets: "$no_valid_markets$"
  mission_task_select_goods: "Оберіть [Concept('goods', 'товари')|e] для цього [Concept('task', 'етапу')]"
  mission_task_no_goods: "$no_valid_goods$"
  mission_task_select_town_or_city: "Оберіть [Concept('urban_location', 'міську місцевість')|e] для цього [Concept('task', 'етапу')]"
  mission_task_no_town_or_city: "$no_valid_town_or_city$"
  generic_conquer_province: "Регіональна експансія"
  generic_conquer_province_DESCRIPTION: "Вперед до слави!"
  generic_conquer_province_CRITERIA_DESCRIPTION: "Території [ROOT.GetCountry.Custom('rank_ru_GEN')|l] розширилися."
  generic_conquer_province_BUTTON_TOOLTIP: "Щоб запобігти експансії з боку ворожих сусідів, нам необхідно самим вести наступальні дії."
  generic_conquer_province_BUTTON_DETAILS: "Нас оточує безліч країн, які прагнуть покласти край нашому правлінню. Щоб не стати жертвою експансії недружніх країн, ми повинні першими розпочати наступ."
  has_cb_that_allows_conquest_on_neighbor_country_tt: "У нас є [Concept('casus_belli', 'привід для війни')|e] проти сусідньої [Concept('country', 'країни')|e], що дозволяє завойовувати [Concept('locations', 'місцевості')|e]"
  choose_province_for_next_conquest_tasks_tt: "Для наступних [Concept('mission_tasks', 'етапів завдання')|e] ми оберемо позначену [Concept('province', 'провінцію')|e]"
  select_mission_for_next_mission_tasks: "Оберіть [Concept('province', 'провінцію')|e] для наступного [Concept('mission task', 'етапу')|e]"
  monthly_events_about_integration_tt: "Поки триває цей [Concept('mission_task', 'етап завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані з інтеграцією"
  requirements_after_mission_conquer_province_tt: "Умови цього етапу стануть відомі після завершення [Concept('mission_task', 'етапу завдання')|e] «$mission_conquer_province$»"
  mission_war_chest: "Збір коштів на війну"
  mission_war_chest_desc: "Війна має жахливий апетит, який втамує лише золото. Для ведення успішної воєнної кампанії необхідно створювати ополчення та справно виплачувати платню воякам. Все це вимагає величезних коштів."
  mission_obtain_casus_belli: "Отримання [Concept('casus_belli', 'приводу для війни')|e]"
  mission_obtain_casus_belli_desc: "Наша справа праведна, і ми не здамося, доки не розширимо свої володіння та не захистимо їх від зовнішніх загроз. Найкращий спосіб цього досягти — знайти законні підстави для приєднання чужих земель."
  mission_obtain_casus_belli_tip: "@arrow_bonus_tier_3! Привід для війни найпростіше отримати, запросивши його у [Concept('parliament_with_icon', 'парламенту')|e]. Щоб скликати засідання парламенту, перейдіть на [Link('government', 'tabcontent = parliament', '@government_panel!Панель уряду > Парламент')].\n\n@arrow_bonus_tier_2! Створивши [Concept('spy_network_with_icon', 'шпигунську мережу')|e] в інших [Concept('countries', 'країнах')|e], ми зможемо фабрикувати приводи для війни з ними, якщо у нас є [Concept('cores_with_icon', 'корінні місцевості')|e] на їхній території або якщо вони є нашими [Concept('rivals_with_icon', 'суперниками')|e].\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_casus_belli_with_icon', 'тут')]."
  mission_conquer_province: "Захоплення провінції"
  mission_conquer_province_desc: "Розширення володінь за рахунок сусідських земель — це природний процес. Як і в природі, на міжнародній арені виживає найсильніший."
  mission_conquer_province_tip: "@arrow_bonus_tier_3! Після накопичення достатнього [Concept('war_score_with_icon', 'воєнного рахунку')|e] запропонуйте вашому ворогу укласти [Concept('peace_treaty_with_icon', 'мирний договір')|e], використовуючи вкладку [Concept('diplomatic_actions', 'дипломатичних дій')|e]. \n\n@arrow_bonus_tier_2! На панелі [Concept('peace_treaty', 'мирного договору')] оберіть [Concept('locations_with_icon', 'місцевості')|e] або [Concept('provinces_with_icon', 'провінції')|e], які хочете завоювати.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_war_with_icon', 'тут')], [Link('hints', 'selected_hint = hint_siege_and_occupation_with_icon', 'тут')] та [Link('hints', 'selected_hint = hint_battle_with_icon', 'тут')]."
  top_owner_is_us_or_not_ownable_tt: "Кожна [Concept('location', 'місцевість')|e], здатна перейти у володіння (наприклад, #R не#! вважається непрохідним районом, морем або озером), належить нам або нашим [Concept('subjects', 'васалам')|e]"
  mission_peace_integrate_province: "Інтеграція захоплених територій"
  mission_peace_integrate_province_desc: "Ми здобули перемогу, але спочивати на лаврах поки зарано. Нашим наступним кроком має стати повноцінна інтеграція завойованих земель."
  mission_peace_integrate_province_tip: "@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_1! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] з #TOOLTIP:CABINET_ACTION,integrate_province,X #L інтеграції провінції#!#!.\n\n#italic Докладніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_has_conquered_provinces_with_icon', '$hint_has_conquered_provinces$')]."
  mission_fortifications: "Укріплення кордонів"
  mission_fortifications_desc: "Поки ми ведемо масований наступ, варто заздалегідь задуматися про те, як ми захищатимемо наші нові кордони після війни."
  mission_fortifications_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')] і знайдіть у списку [Concept('building', 'споруд')|e] #TOOLTIP:BUILDING_TYPE,castle,X #L замок#!#!.\n\n@arrow_bonus_tier_2! Клацніть по споруді, щоб побудувати її в будь-якій з ваших [Concept('locations_with_icon', 'місцевостей')|e].\n\n@arrow_bonus_tier_1! Фортеці перешкоджають переміщенню ворожих [Concept('armies_with_icon', 'військ')|e], тож варто укріпити ваші кордони, приділивши особливу увагу природним вузьким проходам між непрохідними територіями."
  mission_fortifications_reward_tt: "Обрана ціллю [Concept('location', 'місцевість')|e] отримає модифікатор #TOOLTIP:STATIC_MODIFIER,mission_defensive_fortification_modifier,X #V #L «Нещодавно збудовані укріплення»#!#!"
  no_eligible_border_location_tt: "@trigger_no! Немає відповідних прикордонних [Concept('location', 'місцевостей')|e]"
  mission_army: "Збір війська"
  mission_army_desc: "Неважливо, чи закликаємо ми на допомогу васалів, чи збираємо ополчення з простого народу, — наше військо завжди має бути у всеозброєнні. Безумовно, регулярні війська більш підготовлені та дисципліновані, але в разі потреби розмір війська можна швидко збільшити за допомогою ополченців. Усі разом ці бійці являють собою серйозну силу, яка здатна не тільки захищати землі, а й просувати наші інтереси за кордоном."
  mission_army_tip: "@arrow_bonus_tier_3! На початку гри, як правило, б'ється [Concept('levies_with_icon', 'ополчення')|e]. Щоб збільшити розмір [Concept('levies', 'ополчення')], відкрийте [Link('country_culture', 'subtab = breakdown_with_icon', 'Панель суспільства > Культура')] і дайте [Concept('privileges_with_icon', 'привілеї')|e] відповідним станам — або визнайте більше [Concept('cultures_with_icon', 'культур')|e].\n\n@arrow_bonus_tier_2! Щоб сформувати [Concept('regulars_with_icon', 'регулярні війська')|e] або набрати [Concept('mercenaries_with_icon', 'найманців')|e], перейдіть сюди: [Link('unit_overview', '', '@military_panel! $lateralview_unit_overview_entry_name$')]\n\n #italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war_with_icon', 'тут')]."
  mission_army_infantry: "Призов піхоти"
  mission_army_infantry_desc: "Піхота — основа будь-якого серйозного війська. Ці добре навчені бійці готові ревно захищати свій народ і знищувати ворогів!"
  mission_army_cavalry: "Призов кавалерії"
  mission_army_cavalry_desc: "Лютий натиск нашої кавалерії вселяє страх у серця ворогів. За допомогою вершників ми створимо непереможне військо, здатне розтоптати всіх, хто стане на нашому шляху!"
  mission_army_levies: "Збір ополчення"
  mission_army_levies_desc: "Обов'язок кожного фізично міцного чоловіка — взяти в руки зброю і вирушити захищати свій народ, відстоюючи інтереси країни."
  mission_army_mercenaries: "Військо найманців"
  mission_army_mercenaries_desc: "Іноземці, добре навчені військовій справі, стануть міцною основою нашого війська в прийдешній воєнній кампанії."
  mission_obtain_casus_belli_parliament: "Виправдання війни в парламенті"
  mission_obtain_casus_belli_parliament_desc: "Для ведення війни з метою розширення володінь необхідно отримати згоду парламенту."
  mission_obtain_casus_belli_spy_network: "Впровадження шпигунів"
  mission_obtain_casus_belli_spy_network_desc: "Наші шпигуни — справжні майстри своєї справи, здатні без зусиль проникнути до ворожого табору. Вони допоможуть нам дізнатися, як ідуть справи в інших країнах, і визначити мету майбутньої воєнної кампанії!"
  designate_rival_as_main_threat_tt: "Одного з ображених нами [Concept('rivals', 'суперників')|e] ми призначимо головним противником на цих [Concept('mission_tasks', 'етапах')|e]"
  mission_declare_war: "На війну!"
  mission_declare_war_desc: "Ми завершили майже всі приготування. Настав час оголосити війну і завдати удару, поки є можливість."
  mission_declare_war_tip: "@arrow_bonus_tier_3! Щоб напасти на іншу [Concept('country_with_icon', 'країну')|e], перейдіть на відповідну #high панель іншої країни#! та клацніть по [Concept('diplomatic_action', 'дипломатичній дії')|e] [war_icon] #V Оголошення війни#!.\n\n@arrow_bonus_tier_2! Виберіть [Concept('casus_belli_with_icon', 'привід для війни')|e] в нижній частині панелі.\n\n@arrow_bonus_tier_1! Зверніть увагу, що ваш ворог, якому ви плануєте оголосити [Concept('war', 'війну')], може звернутися за допомогою до [Concept('allies_with_icon', 'союзників')|e].\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_war_with_icon', 'тут')], [Link('hints', 'selected_hint = hint_siege_and_occupation_with_icon', 'тут')] та [Link('hints', 'selected_hint = hint_battle_with_icon', 'тут')]."
  justify_religious_war: "Виправдання релігійної війни"
  justify_religious_war_desc: "Незабаром наше воїнство звершить божественну волю над язичниками та невіруючими, що скупчилися на наших кордонах. Щоб виправдати приготування до війни, ми звернемося до вищої сили в #TOOLTIP:RELIGION,$catholic_tt$,X #L католицькій#!#! церкві."
  mobilize_the_clergy: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')] та мобілізація цього стану"
  mobilize_the_clergy_desc: "Віра — ось та сила, що об'єднує наш народ. Вона — опора всякого великого суспільства, а тому саме наше [ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l] повинне спонукати людей до участі в майбутній війні!"
  raise_a_navy: "Збір флоту"
  raise_a_navy_desc: "Поки ми готуємося до війни, наше узбережжя має бути під надійним захистом. Створивши потужний флот, ми зможемо влаштувати блокаду ворожих портів та прискорити проведення воєнної кампанії."
  raise_a_navy_tip: "@arrow_bonus_tier_3! На початку гри, як правило, б'ється [Concept('navy_levies_with_icon', 'морське ополчення')|e]. Щоб збільшити розмір [Concept('navy_levies', 'морського ополчення')], відкрийте [Link('country_culture', 'subtab = breakdown_with_icon', 'Панель суспільства > Культура')] та дайте [Concept('privileges_with_icon', 'привілеї')|e] відповідним станам — або визнайте більше [Concept('cultures_with_icon', 'культур')|e].\n\n@arrow_bonus_tier_2! Щоб сформувати [Concept('regular_ship_with_icon', 'регулярний флот')|e] або набрати [Concept('mercenaries_with_icon', 'найманців')|e], перейдіть сюди: [Link('unit_overview', '', '@military_panel! $lateralview_unit_overview_entry_name$')]\n\n #italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war_with_icon', 'тут')]."
  mission_surpass_enemy: "Перевага на морі"
  mission_surpass_enemy_desc: "Війна, яка ведеться зараз, показала, що наш флот сильно поступається ворожому. Щоб зберегти перевагу на морі, нам доведеться побудувати потужніший флот."
  mission_armory: "Створення арсеналів"
  mission_armory_desc: "Оскільки [ROOT.GetCountry.Custom('rank_ru_DAT')] під нашою владою вдається стати все більш діяльним гравцем у регіоні, нам потрібне постійне військо, а їй потрібні ділянки, де відбуватиметься набір на службу. Міста ж повинні зайнятися будівництвом #TOOLTIP:BUILDING_TYPE,armory,X #L арсеналів#!#!."
  mission_manpower: "Притік рекрутів"
  mission_manpower_desc: "Для зміцнення війська потрібен постійний притік рекрутів. Нам слід вибудувати грамотну систему поповнення військ!"
  mission_reduce_antagonism: "Зниження ворожості"
  mission_reduce_antagonism_desc: "Через наші завоювання сусідні країни бачать у нас загрозу. Нам слід налагодити відносини з ними, інакше вони в будь-який момент можуть об'єднатися проти нас."
  mission_restore_province: "Відновлення земель"
  mission_restore_province_desc: "Жителі нещодавно завойованих територій сильно постраждали від війни. Якщо ми допоможемо їм відновити господарство, вони напевно стануть краще ставитися до нашої влади."
  mission_restore_province_tip: "@arrow_bonus_tier_3! [Concept('war_with_icon', 'Війна')|e] часто приносить із собою падіння [Concept('prosperity_with_icon', 'процвітання')|e] [Concept('locations_with_icon', 'місцевостей')|e]. З часом воно відновиться, однак цей процес можна прискорити за допомогою відповідного [Concept('cabinet_action_with_icon', 'доручення')|e].\n\n@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_1! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] з #TOOLTIP:CABINET_ACTION,recovery_effort,X #L відновлення земель#!#!."
  non_scope_every_pop_conquest_location_var_province_10_sat_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] наших [Concept('pops', 'груп населення')|e] в означеній [Concept('province', 'провінції')|e] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  every_pop_conquest_location_var_province_10_sat_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] наших [Concept('pops', 'груп населення')|e] в провінції [conquest_province.GetName] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  generic_vassal_ties: "Васальні зв'язки"
  generic_vassal_ties_DESCRIPTION: "Не можна, щоб нашим відносинам з васалом щось загрожувало!"
  generic_vassal_ties_CRITERIA_DESCRIPTION: "Наші відносини з васалом міцніші, ніж зазвичай."
  generic_vassal_ties_BUTTON_TOOLTIP: "У важкі часи особливо важливо вирішувати внутрішні та зовнішні проблеми з нашими вірними васалами."
  generic_vassal_ties_BUTTON_DETAILS: "Коли часи неспокійні, а майбутнє непередбачуване, залишається лише одна опора, яка допоможе нам подолати всі негаразди та здолати ворогів: наш вірний васал. Дружба та спільна праця все перетруть!"
  monthly_events_about_annexation_tt: "Поки триває це [Concept('mission', 'завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані з приєднанням"
  mission_commence_annexation: "Початок приєднання"
  mission_commence_annexation_desc: "Наш васал втратив свою самостійність. Наші відносини довірливі, однак зараз слід приступити до офіційної інтеграції його до складу нашої країни."
  mission_commence_annexation_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та клацніть по кнопці #V Керування васалами#!, щоб побачити ваших [Concept('subjects_with_icon', 'васалів')|e].\n\n@arrow_bonus_tier_2! Клацніть по назві [Concept('subject', 'васала')], щоб відкрити список [Concept('diplomatic_actions', 'дипломатичних дій')|e].\n\n@arrow_bonus_tier_1! Оберіть #V $ANNEXTITLE$#!."
  mission_complete_annexation: "Завершення приєднання"
  mission_complete_annexation_desc: "Інтеграція васальних земель до нашої країни йде успішно. Тепер об'єднання — це лише питання часу."
  mission_select_vassal: "Оберіть #TOOLTIP:SUBJECT_TYPE,vassal,X #L васала#!#! для цього [Concept('mission', 'завдання')|e]"
  mission_no_valid_vassals: "@trigger_no! Немає доступних #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалів#!#!."
  mission_connect_the_capitals: "Зв'язок між столицями"
  mission_connect_the_capitals_desc: "Повноцінна комунікація та прямий інфраструктурний зв'язок між місцевостями нашого #TOOLTIP:SUBJECT_TYPE,vassal,X #L васала#!#! напевно підвищить їхню лояльність."
  mission_connect_the_capitals_tip: "@arrow_bonus_tier_2! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], [Player.GetCapital.GetName], та клацніть по кнопці #V Побудувати дорогу#!.\n\n@arrow_bonus_tier_1! Побудуйте [Concept('road_with_icon', 'дорогу')|e] до сусідньої [Concept('location', 'місцевості')|e], тим самим скоротивши шлях до [Concept('capital', 'столиці')|e] нашого васала."
  mission_monetary_assistance: "Фінансова підтримка"
  mission_monetary_assistance_desc: "Наш васал потрапив у скрутне становище, тому ми повинні надати йому фінансову допомогу. Цей символічний дар неодмінно зміцнить відносини між нами та допоможе забезпечити процвітання підданих!"
  mission_monetary_assistance_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та клацніть по кнопці #V Керування васалами#!, щоб побачити ваших [Concept('subjects_with_icon', 'васалів')|e].\n\n@arrow_bonus_tier_2! Клацніть по назві [Concept('subject', 'васала')], щоб відкрити список [Concept('diplomatic_actions', 'дипломатичних дій')|e].\n\n@arrow_bonus_tier_1! Видаліть фільтр дій васала, щоб переглянути весь список дій. Оберіть #V $send_gift$#!."
  mission_base_of_power: "Центр влади"
  mission_base_of_power_desc: "У нашого васала повинен бути адміністративний центр, звідки він керуватиме своїми володіннями. Розвинене столичне місто стане символом процвітання підданих."
  mission_base_of_power_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться столиця вашого васала.\n\n@arrow_bonus_tier_2! Клацніть по кнопці @build_icon!#V Будівництво#!, щоб переглянути список [Concept('buildings_with_icon', 'споруд')|e], доступних для будівництва в [Concept('location_with_icon', 'місцевості')|e].\n\n@arrow_bonus_tier_2! Відсортуйте їх за прибутковістю та збудуйте те, яке вважаєте за потрібне."
  mission_improve_relations_with_vassal: "Поліпшення відносин з владою #ONCLICK:COUNTRY,[ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_GEN')|L]#!#!"
  mission_improve_relations_with_vassal_desc: "Перш ніж розширювати співпрацю з нашим васалом, необхідно встановити міцні дипломатичні зв'язки."
  mission_improve_relations_with_vassal_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та клацніть по кнопці #V Керування васалами#!, щоб побачити ваших [Concept('subjects_with_icon', 'васалів')|e].\n\n@arrow_bonus_tier_2! Клацніть по назві [Concept('subject', 'васала')], щоб відкрити список [Concept('diplomatic_actions', 'дипломатичних дій')|e].\n\n@arrow_bonus_tier_1! Оберіть [opinion_icon] #V $IMPROVE_RELATIONTITLE$#! у верхній частині картки країни та очікуйте поліпшення думки. Пам'ятайте, що це рішення обійдеться вам у #V 1#! [Concept('diplomat_with_icon', 'дипломатичну дію')|e]."
  mission_joint_military_development: "Військова співпраця"
  mission_joint_military_development_desc: "Військова співпраця з нашим васалом має найважливіше значення для захисту країни."
  mission_joint_military_development_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та клацніть по кнопці #V Керування васалами#!, щоб побачити ваших [Concept('subjects_with_icon', 'васалів')|e].\n\n@arrow_bonus_tier_2! Клацніть по назві [Concept('subject', 'васала')], щоб відкрити список [Concept('diplomatic_actions', 'дипломатичних дій')|e].\n\n@arrow_bonus_tier_1! Оберіть #V $offer_support_military$#!."
  mission_target_subject_will_lose_lib_desire_gain_center_of_urbanization_modifier_capital_tt: "[Concept('liberty_desire', 'Бажання свободи')|e] обраного [Concept('subject', 'васала')|e] скоротиться, а його [Concept('capital', 'столиця')|e] отримає [Concept('modifier', 'модифікатор')|e] «[ShowModifier('center_of_urbanization_modifier')]»"
  generic_humiliate_rival: "Приниження суперника"
  generic_humiliate_rival_DESCRIPTION: "Ми повинні поставити на місце тих, хто сумнівається в нашій перевазі!"
  generic_humiliate_rival_CRITERIA_DESCRIPTION: "Ми принизили суперника та довели свою перевагу."
  generic_humiliate_rival_BUTTON_TOOLTIP: "Ми повинні утвердити своє панування над нашими заздрісними суперниками та відбити в них бажання змагатися з нами."
  generic_humiliate_rival_BUTTON_DETAILS: "Наша країна процвітає, а рівень життя населення постійно зростає. Через це суперники дивляться на нас із заздрістю. Настав час раз і назавжди вгамувати їхні амбіції та довести свою перевагу."
  mission_insult_rival: "Дипломатичні ігри"
  mission_insult_rival_desc: "Завуальована образа на переговорах — чудовий спосіб підкреслити недоліки суперника та довести нашу перевагу."
  mission_insult_rival_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Панель дипломатії > Поточні відносини')] та клацніть по кнопці #V [rivals_icon|e] Суперники#!.\n\n@arrow_bonus_tier_2! Також можна клацнути по сповіщенню [rivals_icon] #W Можливі суперники#!.\n\n@arrow_bonus_tier_1! Ви можете зачекати, поки інші [Concept('countries', 'країни')] оголосять своїх [Concept('rivals', 'суперників')], перш ніж зробити свій хід. Таким чином ви уникнете гніву [Concept('countries', 'країн')], з якими не варто сваритися. \n\n#italic Докладніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$')]."
  mission_impose_embargo: "Накладення ембарго"
  mission_impose_embargo_desc: "Ми повинні заборонити представникам ворожих країн торгувати та заробляти на наших ринках."
  mission_impose_embargo_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations', '@diplomacy_panel! Панель дипломатії > Поточні відносини')] та виберіть відповідного #V [rivals_icon|e] суперника#!, клацнувши по його прапору.\n\n@arrow_bonus_tier_2! Ви можете клацнути по його [diplomacy_icon] #W дипломатичних діях#! на вкладці #W економічних дій#!.\n\n@arrow_bonus_tier_1! Щоб ввести ембарго, знайдіть і клацніть по кнопці #W Ембарго на країну#!."
  market_dominance_key: "Панування на ринку"
  mission_humiliate_rival: "Приниження суперника"
  mission_humiliate_rival_desc: "Змусивши суперників сісти за стіл переговорів і прийняти наші умови, ми зможемо зміцнити свій вплив як усередині країни, так і за кордоном."
  mission_humiliate_rival_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та виберіть відповідного #V [rivals_icon|e] суперника#!, клацнувши по його прапору.\n\n@arrow_bonus_tier_2! Ви можете або клацнути по кнопці [war_icon] #W Оголошення війни#! в картці країни, або по кнопці [diplomacy_icon] #W Дипломатичні дії#! на вкладці [hostile_icon] #W Ворожі дії#!.\n\n@arrow_bonus_tier_1! Перед оголошенням [Concept('war', 'війни')] потрібно отримати [Concept('casus_belli_with_icon', 'привід для війни')|e]. Ми можемо звернутися за ним до [Concept('parliament', 'парламенту')|e] або ж просто сфабрикувати такий привід для війни проти наших [Concept('rivals', 'суперників')|e]. \n\n#italic Докладніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_war', '$hint_war$')] або [Link('hints', 'selected_hint = hint_call_for_peace', '$hint_call_for_peace$')]."
  mission_surpass_rival: "Перевага над суперниками"
  mission_surpass_rival_desc: "Тим, хто прагне відібрати в нас місце під сонцем, давно пора усвідомити, що ми значно перевершуємо їх за силою. І найкращий спосіб це довести — створити збройні сили, які затьмарять їхні жалюгідні війська!"
  mission_surpass_rival_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та виберіть відповідного #V [rivals_icon|e] суперника#!, клацнувши по його прапору.\n\n@arrow_bonus_tier_2! Щоб порівняти ваші сили, заглядайте на його #W панель країни#!.\n\n@arrow_bonus_tier_1! Якщо ви хочете поставити їх на коліна, варто оголосити їм [Concept('war_with_icon', 'війну')|e]. \n\n#italic Докладніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_war', '$hint_war$')] та [Link('hints', 'selected_hint = hint_call_for_peace', '$hint_call_for_peace$')]."
  should_complete_stronger_than_rival_tt: "Виконання цього [Concept('task', 'етапу')|e] з більшою [Concept('military_strength', 'військовою чисельністю')|E], ніж у #ONCLICK:COUNTRY,[target_rival.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_rival.Custom('CL_tt')],X [target_rival.Custom('CL_GEN')|L]#!#!, принесе #G 20#! од. [Concept('prestige', 'престижу')|e]."
  mission_establish_spy_networks: "Створення шпигунської мережі"
  mission_establish_spy_networks_desc: "Слід відправити наших шпигунів на територію суперників. Так ми зможемо вивідати, які в них плани."
  mission_establish_spy_networks_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та виберіть відповідного #V [rivals_icon|e] суперника#!, клацнувши по його прапору.\n\n@arrow_bonus_tier_2! Ви можете або клацнути по кнопці [spy_network_icon] #W Шпигунська мережа#! в Картці країни, або по кнопці [diplomacy_icon] #W Дипломатичні дії#! у вкладці [hostile_icon] #W Ворожі дії#!.\n\n@arrow_bonus_tier_1! Щоб сфабрикувати [Concept('casus_belli', 'привід для війни')|e], побудуйте [Concept('spy_network_with_icon', 'шпигунську мережу')|e] на території нашого [Concept('rivals', 'суперника')]. \n\n#italic Докладніше про це ви можете прочитати в підказці [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$')]."
  mission_destabilize_rival: "Дестабілізація суперника"
  mission_destabilize_rival_desc: "Якщо ми посіємо розбрат на землях суперника, то в разі вторгнення він не зможе чинити гідного опору, а отже, нам буде набагато простіше здобути перемогу."
  mission_destabilize_rival_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('diplomacy', 'relations_tab = current_relations_with_icon', 'Панель дипломатії > Поточні відносини')] та виберіть відповідного #V [rivals_icon|e] суперника#!, клацнувши по його прапору.\n\n@arrow_bonus_tier_2! Ви можете або клацнути по кнопці [spy_network_icon] #W Шпигунська мережа#! в Картці країни, або по кнопці [diplomacy_icon] #W Дипломатичні дії#! у вкладці [hostile_icon] #W Ворожі дії#!.\n\n@arrow_bonus_tier_1! Побудуйте [Concept('spy_network_with_icon', 'шпигунську мережу')|e] на території нашого [Concept('rivals', 'суперника')], достатню для використання проти нього дипломатичної дії #W Поширення невдоволення#!, яку можна знайти у вкладці [diplomacy_icon] #W Дипломатичні дії#! > [spy_network_icon] #W Дії щодо звернення#!. \n\n#italic Докладніше про це ви можете прочитати в підказці [Link('hints', 'selected_hint = hint_lacks_of_rivals', '$hint_lacks_of_rivals$')]."
  mission_task_select_rival: "Оберіть [Concept('rival', 'суперника')|e] для майбутніх [Concept('mission_tasks', 'етапів завдання')|e]"
  mission_task_no_rival: "@trigger_no! Немає доступних [Concept('rival', 'суперників')|e]."
  impacted_by_foreign_destabilization_efforts_modifier_tt: "У межах [Concept('event', 'події')|e] на них вплине [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,foreign_destabilization_efforts_modifier,X #V #L «Спроби дестабілізації з-за кордону»#!#!"
  generic_trade: "Розвиток торгівлі"
  generic_trade_DESCRIPTION: "Щоб забезпечити країні процвітання, необхідно приділяти більше уваги розвитку торгівлі."
  generic_trade_CRITERIA_DESCRIPTION: "Ми виробили грамотну торговельну політику та покращили економічну інфраструктуру."
  generic_trade_BUTTON_TOOLTIP: "Ринкова конкуренція відкриває багато можливостей для отримання прибутку за рахунок товарообміну та створення протяжних торговельних шляхів."
  generic_trade_BUTTON_DETAILS: "Займаючись торгівлею, потрібно бути готовим до жорсткої конкуренції та переговорів із жадібними торгашами. Втім, на продажі товарів та створенні торговельних шляхів можна непогано заробити!"
  mission_increase_maritime_presence: "Морська присутність"
  mission_increase_maritime_presence_desc: "Створення морських шляхів між нашими портами забезпечило економічне процвітання країни. Тепер слід спрямувати зусилля на розширення нашої морської присутності, щоб міцно зайняти лідируючу позицію на ринках!"
  mission_increase_maritime_presence_tip: "$mission_expand_merchant_power_tip$"
  mission_protect_our_coasts: "Захист берегів"
  mission_protect_our_coasts_desc: "Жорстокі пірати, жадібні іноземні купці та інші підприємливі діячі жадібно дивляться на наші береги, сподіваючись одного дня ними заволодіти. Побудувавши вздовж узбережжя оборонні споруди, ми зможемо відбити будь-який напад і зберегти багатства наших земель."
  mission_protect_our_coasts_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @soldiers!#TOOLTIP:POPTYPE,soldiers,X #L вояки#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,coastal_fort,X #L берегову фортецю#!#!.\n\n@arrow_bonus_tier_1! Побудуйте її в одній із ваших прибережних [Concept('urban_locations', 'міських місцевостей')|e]."
  mission_establish_wharfs: "Будівництво верфей"
  mission_establish_wharfs_desc: "Грамотно використовуючи берегові території, ми зможемо отримати з них великий прибуток. Необхідно розширити морську інфраструктуру!"
  mission_establish_wharfs_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @burghers!#TOOLTIP:POPTYPE,burghers,X #L міщани#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#!.\n\n@arrow_bonus_tier_1! Побудуйте її у ваших [Concept('urban_locations', 'міських місцевостях')|e]."
  mission_establish_docks: "Розвиток узбережжя"
  mission_establish_docks_desc: "Наша #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#! давно служить нам вірою і правдою, проте морська справа не стоїть на місці, і нам не можна відставати. Будівництво містких доків на узбережжі — не розкіш, а необхідність."
  mission_establish_docks_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @soldiers!#TOOLTIP:POPTYPE,soldiers,X #L вояки#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,dock,X #L док#!#!.\n\n@arrow_bonus_tier_1! Побудуйте його у ваших [Concept('urban_locations', 'міських місцевостях')|e]."
  mission_merchant_fleet: "Торговий флот"
  mission_merchant_fleet_desc: "Зараз наша торгівля тримається на іноземних суднах, які ми наймаємо для перевезення товарів. Настав час створити власний торговий флот."
  mission_merchant_fleet_tip: "@arrow_bonus_tier_2! Перейдіть на [Link('unit_overview', '', '@military_panel! Панель військової справи > Флоти')] і клацніть по кнопці [regular_ship_icon]#V $RECRUIT_S_BUTTON$#!, щоб побудувати [Concept('regular_ships', 'регулярні кораблі')|e].\n\n@arrow_bonus_tier_1! Для цього потрібно побудувати [Concept('buildings', 'споруди')|e], що відповідають за найм або будівництво [Concept('regular_ships', 'регулярних кораблів')], наприклад #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#! або #TOOLTIP:BUILDING_TYPE,dock,X #L док#!#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_low_sailors', '@hint! тут')] та [Link('hints', 'selected_hint = hint_has_unraised_levies_in_war', '@hint! тут')]."
  mission_establish_market_center: "Створення ринкового центру"
  mission_establish_market_center_desc: "Незважаючи на те, що ми вже торгуємо на багатьох ринках, наші радники вважають, що ми повинні обзавестися власним ринковим центром."
  mission_establish_market_center_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', 'subtab = markets', '@economy_panel! Панель економіки > Ринки')] і клацніть по кнопці [market_icon]#V $create_market$#!.\n\n#italic Дізнатися більше про ринки можна [Link('hints', 'selected_hint = hint_markets', '@hint! тут')]."
  mission_burgher_relations: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] та їхні стосунки з нами"
  mission_burgher_relations_desc: "Якщо ми налагодимо стосунки з купцями, вони охочіше розвиватимуть свої торгові підприємства на наших землях, тим самим збільшуючи наш дохід!"
  mission_burgher_relations_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'стани')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_winds_of_trade: "Майбутнє торгівлі"
  mission_winds_of_trade_desc: "Чи варто вживати меркантилістських та протекціоністських заходів щодо наших ринків? Чи краще відкрити всі порти для іноземних купців? Це рішення може визначити економічне майбутнє країни."
  mission_solid_approach: "Серйозний підхід"
  mission_solid_approach_desc: "Ми можемо обрати меркантилістський або інший, більш вільний підхід до торгівлі. Наші радники просять лише, щоб після прийняття рішення ми перейшли до впровадження обраної системи."
  mission_burgher_privileges: "Впливові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]"
  mission_burgher_privileges_desc: "Без сильного купецького стану ми не зможемо розвивати торгівлю. Якщо ми надамо торговцям особливі привілеї, це полегшить ведення торгівлі та водночас поповнить нашу скарбницю."
  mission_burgher_privileges_tip: "@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'стани')|e].\n\n@arrow_bonus_tier_1! [GetEstateName('burghers_estate')] нам потрібні, надайте їм нову [Concept('privilege_with_icon', 'привілегію')|e].\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_estates_with_icon', 'тут')]."
  triggers_revealed_after_previous_task_complete_tt: "Умови цього [Concept('mission_task', 'етапу завдання')|e] стануть відомі після завершення попереднього"
  mission_marketplace_of_capital: "[ShowBuildingTypeNameWithNoTooltip('marketplace')] [ROOT.GetCountry.GetCapital.Custom('LR_GEN')|l] [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  mission_marketplace_of_capital_desc: "Наша столиця прекрасна, але вона може стати ще більшою та багатшою. Перетворивши місто на розвинений торговий центр, ми зможемо отримувати набагато більше прибутку від комерційної діяльності!"
  mission_marketplace_of_capital_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @burghers!#TOOLTIP:POPTYPE,burghers,X #L містяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!.\n\n@arrow_bonus_tier_1! Побудуйте необхідну кількість ринків, клацаючи по списку споруд, або по мапі."
  designate_urban_location_for_next_task_tt: "Ми зможемо обрати [Concept('urban_location', 'міську місцевість')|e] для наступних [Concept('mission_tasks', 'етапів завдання')|e]"
  designate_rural_location_for_next_task_tt: "Ми зможемо обрати [Concept('rural_location', 'сільську місцевість')|e] для наступних [Concept('mission_tasks', 'етапів завдання')|e]"
  select_urban_location_tt: "Ми зможемо призначити #Y одну#! [Concept('urban_location', 'міську місцевість')|e] для наступних [Concept('mission_tasks', 'етапів завдання')|e] та [Concept('events', 'подій')|e]."
  should_we_have_non_rural_fund_construction_projects_tt: "Якщо ми завершимо цей [Concept('mission_task', 'етап завдання')|e], володіючи хоча б #G однією#! [Concept('urban_location', 'міською місцевістю')|e], то найрозвиненіша місцевість отримає бонус до [Concept('development', 'розвитку')|e]."
  mission_starting_requirements_title: "#V Умови початку#!:"
  mission_completion_requirements_tt: "#V Критерії виконання#!:"
  based_on_clergy_estate_tax_we_gain_tt: "Залежно від [Concept('tax_rate', 'податкової ставки')|e] та [Concept('income', 'доходу')|e] стану «[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('clergy_estate')|l]»:"
  based_on_burghers_estate_tax_we_gain_tt: "Залежно від [Concept('tax_rate', 'податкової ставки')|e] та [Concept('income', 'доходу')|e] стану «[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]»:"
  capital_num_buildings_var_tt: "У місті [THIS.GetCountry.GetCapital.GetName] є [Concept('building', 'споруди')|e] не нижче [THIS.GetVariable('target_building_levels_variable').GetValue]-го рівня"
  yes_free_subject_reward_tt: "@trigger_yes! Якщо ми завершимо це завдання за допомогою вольностей:"
  no_free_subject_reward_tt: "@trigger_no! Якщо ми завершимо це завдання за допомогою вольностей:"
