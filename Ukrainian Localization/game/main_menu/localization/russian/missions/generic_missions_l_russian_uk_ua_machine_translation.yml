  affluent_merchants: "Торгові субсидії"
  former_subject_lands_gain_mild_control_bonus_tt: "[Concept('locations', 'Місцевості')|e], отримані внасліdок [Concept('annexation', 'приєднання')|e], на #Y 10#! років отримають [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,new_lands_modifier,X #V #L «Нові землі»#!#!"
  has_finished_annexing_variable_subject_tt: "Завершено приєднання #ONCLICK:COUNTRY,[ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_tt')],X [ROOT.GetCountry.MakeScope.GetVariable('mission_chosen_vassal_variable').GetCountry.Custom('CL_GEN')|L]#!#!"
  has_been_diplomatically_insulted_tt: "Ми образили цю країну за останні #Y 10#! років"
  has_humiliated_any_rival_in_the_last_10_years: "Країна примусила свого [Concept('rival', 'суперника')|e] укласти #TOOLTIP:SCRIPTED_PEACE_TREATY,peace_humiliate,X #L принизливий#!#! [Concept('peace_treaty', 'мирний договір')|e] за останні #Y 10#! років"
  none_impacted_by_foreign_destabilization_efforts_modifier_tt: "На кожного [Concept('rival', 'суперника')|e], зачепленого дією #TOOLTIP:SCRIPTED_RELATION_TYPE,sow_discontent,X #L «Поширення невдоволення»#!#!, в межах [Concept('modifier',[Concept('event', 'події')|e] впливатиме [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,foreign_destabilization_efforts_modifier,X #V #L «Спроби дестабілізації з-за кордону»#!#!"
  50_spy_network_on_any_rival: "Показник нашої [Concept('spy_network', 'шпигунської мережі')|e] в будь-якій країні-[Concept('rival', 'суперниці')|e] становить не менше #Y 30#!"
  gain_20_spy_network_on_every_rival_we_surpass_in_relative_strength_tt: "Ми отримаємо #G +20#! до [Concept('spy_network', 'шпигунської мережі')|e] в кожній країні-[Concept('rival', 'суперниці')|e], яка поступається нам у загальній силі"
  amount_of_impacted_locations_depends_on_crown_power_tt: "До #Y 5#! прибережних [Concept('urban_location', 'міських місцевостей')|e], де є #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#!, можуть отримати модифікатор #TOOLTIP:STATIC_MODIFIER,increased_maritime_activity_modifier,X #V #L «Розвиток морських перевезень»#!#! (ефект залежить від [Concept('crown_power', 'влади правителя')|e]):"
  marketplace_amount_of_impacted_locations_depends_on_crown_power_tt: "До #Y 4#! [Concept('urban_locations', 'міських місцевостей')|e], де є #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!, можуть отримати #G +0,25%#! до [Concept('prosperity', 'процвітання')|e] та #G +0,05#! до [Concept('development', 'розвитку')|e] за кожен рівень споруд (ефект залежить від нашої [Concept('crown_power', 'влади правителя')|e])."
  one_dock_or_drydock_location_dev_severe_tt: "Один з наших найкращих [Concept('locations', 'місцевостей')|e], де є [Concept('buildings', 'споруди')|e] типу #TOOLTIP:BUILDING_TYPE,dock,X #L «Док»#!#! або #TOOLTIP:BUILDING_TYPE,dry_dock,X #L «Сухий док»#!#!, отримає #G +1#! до [Concept('development', 'розвитку')|e]"
  entrepot_task_reward_tt: "Один з наших найкращих [Concept('urban_locations', 'міських місцевостей')|e], де є [Concept('building', 'споруда')|e] типу #TOOLTIP:BUILDING_TYPE,entrepot,X #L «Пакгауз»#!#!, на #Y 5#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,influx_of_merchants_modifier,X #V #L «Приплив купців»#!#!"
  owns_capital_market_center_tt: "Нам належить [Concept('market_center', 'ринковий центр')|e], де знаходиться наше [Concept('capital', 'столичне')|e] місто [ROOT.GetCountry.GetCapital.GetName]"
  mission_will_be_bypassed_tt: "Цей [Concept('task', 'етап')|e] буде пропущено"
  goal_of_campaign_key: "Мета нашої воєнної кампанії:"
  a_decent_general_appears_tt: "З'являється вправний [Concept('character', 'персонаж')|e]-[Concept('general', 'полководець')|e]"
  plan_campaign_against_target_conquest_province_1_tt: "$goal_of_campaign_key$ [target_conquest_province_1.GetName]"
  plan_campaign_against_target_conquest_province_2_tt: "$goal_of_campaign_key$ [target_conquest_province_2.GetName]"
  plan_campaign_against_target_conquest_province_3_tt: "$goal_of_campaign_key$ [target_conquest_province_3.GetName]"
  plan_campaign_against_target_conquest_province_4_tt: "$goal_of_campaign_key$ [target_conquest_province_4.GetName]"
  plan_campaign_against_target_conquest_province_5_tt: "$goal_of_campaign_key$ [target_conquest_province_5.GetName]"
  clergy_pops_of_prim_culture_gain_pop_satisfaction_tt: "Католицькі [Concept('pop_satisfaction', 'групи населення')|e], що належать до стану «[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]» та #L [ROOT.GetCountry.GetCulture.GetName|l]ої#! [Concept('culture', 'культури')|e], отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  discount_on_parliament_action_tt: "[Concept('parliament', 'Парламентський')|e] запит #TOOLTIP:GENERIC_ACTION,prepare_for_war,X #L «Підготовка до війни»#!#! від членів [ROOT.GetCountry.Custom('parliament_ru_GEN')|l] буде менш витратним під час цього [Concept('mission_task', 'етапу завдання')|e]"
  looting_will_be_lessened_in_target_province_tt: "Наші вояки награбують менше [Concept('gold', 'дукатів')|e] у провінції [target_loot_province.GetNameWithNoTooltip]"
  has_enabled_parliament_grant_levies_tt: "Завдяки [Concept('parliament_requests', 'проханню до парламенту')|e] отримано модифікатор #TOOLTIP:STATIC_MODIFIER,parliament_approved_extra_levies,X #V #L «Парламент схвалив збір ополчення»#!#!"
  monthly_events_about_clergy_mobilizing_tt: "Поки триває це [Concept('mission', 'завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані зі станом «[ROOT.GetCountry.GetGovernment.GetEstateName('clergy_estate')|l]»"
  monthly_events_about_war_chest_tt: "Поки триває це [Concept('mission', 'завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані з коштами на війну"
  monthly_events_about_the_status_of_war_tt: "Поки триває це [Concept('mission', 'завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані зі станом поточної війни"
  any_neighbor_country_cb_on_or_sn_tt: "Або у нас є [Concept('casus_belli', 'привід для війни')|e] проти будь-якої сусідньої [Concept('country', 'країни')|e], або [Concept('spy_network', 'шпигунська мережа')|e] в ній становить щонайменше #Y 25#!"
  designate_target_of_conquest_and_get_new_missions_tt: "Наступного місяця розкриває нові [Concept('mission_tasks', 'етапи завдання')|e], що стосуються мети нашої воєнної кампанії"
  goal_province_pops_get_10_satisfaction_tt: "Усі [Concept('pops', 'групи населення')|e] у завойованій [Concept('province', 'провінції')|e] отримають на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  mission_build_entrepot: "[ROOT.GetCountry.GetGovernment.GetAdjective]і торгові склади"
  mission_build_entrepot_desc: "Через наші землі проходить все більше купців, і ми можемо отримати з цього чималу вигоду, якщо вкладемо кошти в будівництво торгових складів. Розвинена комерційна інфраструктура надасть купцям ще більше можливостей для торгівлі, а також сприятиме зростанню нашого економічного впливу!"
  mission_build_entrepot_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @burghers!#TOOLTIP:POPTYPE,burghers,X #L містяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,entrepot,X #L пакгауз#!#! (Для цього вам доведеться спочатку вивчити відповідний [Concept('advance_with_icon', 'поступ')|e]!).\n\n@arrow_bonus_tier_1! Побудуйте його у вашому [Concept('market_center_with_icon', 'ринковому центрі')|e]."
  mission_trade_capacity: "Торговий потенціал"
  mission_trade_capacity_desc: "Наші купці поступово освоюють нові ринки. Їхня робота важка та небезпечна: вони подорожують у далекі землі та привозять звідти екзотичні товари, ідеї та технології. Ми повинні допомагати їм розширювати свою діяльність, щоб надалі вони приносили до скарбниці ще більше прибутку."
  mission_trade_capacity_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @burghers!#TOOLTIP:POPTYPE,burghers,X #L містяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!.\n\n@arrow_bonus_tier_1! Побудуйте необхідну кількість ринків, клацаючи по списку споруд, або по мапі."
  generic_capital_economy: "Розвиток підприємництва та торгівлі"
  generic_capital_economy_DESCRIPTION: "Жадібність — це добре!"
  generic_capital_economy_CRITERIA_DESCRIPTION: "Ми заклали основу нової економічної системи, орієнтованої на створення багатства за допомогою виробництва, торгівлі та видачі позик."
  generic_capital_economy_BUTTON_TOOLTIP: "Своїм багатством країна завдячує містам та містечкам. Використовуючи їхній потенціал повною мірою, ми створимо промисловість, яка забезпечить безпрецедентне зростання економіки!"
  generic_capital_economy_BUTTON_DETAILS: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_grant_burghers_privileges: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')] та привілеї для них"
  mission_grant_burghers_privileges_desc: "Щоб створити передумови для економічного зростання, необхідно налагодити відносини з купцями. Ми напевно зможемо цього досягти, надавши їм певні привілеї або знизивши податки."
  mission_grant_burghers_privileges_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'стани')|e].\n\n@arrow_bonus_tier_2! [GetEstateName('burghers_estate')] нам потрібні, надайте їм нову [Concept('privilege_with_icon', 'привілей')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  up_to_4_locations_decaying_mod_based_on_crown_power_tt: "[Concept('decaying_modifier', 'Послаблюючий модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,powerful_center_of_burghers_modifier,X #V #L «Впливовий центр торгівлі»#!#!, що залежить від нашої [Concept('crown_power', 'влади правителя')|e], зачепить до #Y 4#! [Concept('urban_locations', 'міських місцевостей')|e]"
  up_to_5_locations_decaying_mod_based_on_crown_power_and_scale_dev_tt: "До #Y 5#! [Concept('locations', 'місцевостей')|e] прискорять свій [Concept('development', 'розвиток')|e], виходячи з показника [Concept('crown_power', 'влади нашого правителя')|e]. Приріст [Concept('development', 'розвитку')|e] залежатиме від [Concept('market_access', 'доступу')|e] кожної місцевості до [Concept('market', 'ринку')|e] #L #TOOLTIP:LOCATIONRANK,[mission_target_market.GetCenterLocation.Custom('LR_tt')],X [mission_target_market.GetCenterLocation.Custom('LR_GEN')|l]#!#! [mission_target_market.GetShortName]."
  mission_setup_trade: "Налагодження торгівлі"
  mission_setup_trade_desc: "Для розвитку економіки потрібно організувати торговельну мережу. Не так важливо, будемо ми імпортувати чи експортувати товари, — для створення торговельних підприємств нашим купцям знадобиться будь-який досвід."
  mission_setup_trade_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити вашу [Concept('trade_with_icon', 'торгівлю')|e].\n\n@arrow_bonus_tier_2! Виберіть одну із запропонованих [Concept('trades', 'угод')] і зачекайте місяць, щоб побачити, як вона пройде.\n\n@arrow_bonus_tier_1! Замість цього ви можете автоматизувати всі угоди, натиснувши на @automation!#V шестерню#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_attracting_new_burghers: "Нові [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]"
  mission_attracting_new_burghers_desc: "Оскільки наша економіка зав'язана на ідеї примноження капіталу, нам потрібно його створити. Для цього містам потрібно більше ремісників, купців та різного роду майстрів."
  mission_attracting_new_burghers_tip: "@arrow_bonus_tier_3! Перейдіть у [Concept('location_with_icon', 'місцевість')|e], яку вибрали для виконання завдання.\n\n@arrow_bonus_tier_2! Клацніть по кнопці @burghers!#TOOLTIP:POPTYPE,burghers,X #L Містяни#!#! ліворуч від панелі, щоб переглянути список [Concept('buildings_with_icon', 'споруд')|e], які ви можете побудувати для цього [Concept('pop_type', 'суспільного класу')|e].\n\n@arrow_bonus_tier_1! Щоб збільшити чисельність #TOOLTIP:POPTYPE,burghers,X #L містян#!#!, почніть [Concept('construction_with_icon', 'будувати')|e] відповідну [Concept('building', 'споруду')]."
  mission_embrace_capital_economy: "Прийняття підприємництва та торгівлі"
  mission_embrace_capital_economy_desc: "Звичаєве господарство нашої країни застаріло і вже не здатне забезпечити нам світле майбутнє. Успіх і процвітання можуть принести лише сучасні ідеї, такі як підприємництво та комерція."
  monthly_events_about_capital_economy_tt: "Доки триває цей [Concept('mission_task', 'етап завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані з переходом до [Concept('societal_value', 'суспільної цінності')|e] #TOOLTIP:SOCIETAL_VALUE,capital_economy_vs_traditional_economy,X #L «Підприємництво»#!#!"
  mission_prepare_industry_focus: "Наголос на мануфактури"
  mission_prepare_industry_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_prepare_trade_focus: "Наголос на торгівлю"
  mission_prepare_trade_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_prepare_loan_focus: "Наголос на видачу позик"
  mission_prepare_loan_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
  mission_expand_construction_materials: "Забезпечення будматеріалами"
  mission_get_construction_materials_desc: "Перш ніж нарощувати мануфактурне виробництво, ми повинні забезпечити країну якісними будівельними матеріалами."
  mission_expand_construction_materials_desc: "$mission_get_construction_materials_desc$ Наприклад, можна наростити експлуатацію цих ресурсів у країні."
  mission_import_construction_materials: "Імпорт будматеріалів"
  mission_import_construction_materials_desc: "$mission_get_construction_materials_desc$ Для цього необхідно буде зайнятися торгівлею, імпортом та експортом товарів."
  mission_secure_construction_material: "Поставки будматеріалів"
  mission_secure_construction_material_desc: "Ми повинні забезпечити стабільні поставки матеріалів для розширення будівельних робіт."
  mission_secure_production_resource: "Поставки сировини"
  mission_secure_production_resource_desc: "Для розширення нашого зростаючого підприємства потрібні будматеріали. Однак не варто забувати і про сировину, необхідну для виробництва товарів, які ми плануємо продавати."
  mission_secure_production_resource_tt: "[ROOT.GetCountry.GetCapital.GetMarket.GetName] — тут знаходяться всі [Concept('goods', 'товари')|e], необхідні для поточного [Concept('production_method', 'методу виробництва')|e]"
  mission_construct_goods_industry: "Будівництво мануфактур"
  mission_construct_goods_industry_desc: "Наші склади забиті будматеріалами та сировиною для виробництва товарів. Настав час будувати мануфактури!"
  mission_satisfy_own_demands: "Задоволення потреб народу"
  mission_satisfy_own_demands_desc: "Було б несправедливо продавати товари на іноземних ринках, коли їх гостро потребує наш народ. Насамперед ми повинні задовольнити потреби країни, і лише після цього можна буде зосередитися на отриманні прибутку."
  mission_export_produced_goods: "Експорт товару «[ROOT.GetCountry.MakeScope.GetVariable('mission_target_goods').GetGoods.GetNameWithNoTooltip|l]»"
  mission_export_produced_goods_desc: "Ми організували виробництво товарів і тепер можемо продавати їх іншим країнам."
  mission_create_profit: "Отримання прибутку"
  mission_create_profit_desc: "$generic_capital_economy_CRITERIA_DESCRIPTION$"
  mission_expand_merchant_capacity: "Підвищення торговельного потенціалу"
  mission_expand_merchant_capacity_desc: "Щоб розширити наші торговельні підприємства, слід залучити до країни побільше купців, які купуватимуть і продаватимуть товари на наших ринках."
  mission_expand_merchant_capacity_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @burghers!#TOOLTIP:POPTYPE,burghers,X #L містяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!.\n\n@arrow_bonus_tier_1! Побудуйте його в [Concept('locations', 'місцевостях')], які належать до відповідного [Concept('market_with_icon', 'ринку')|e]. Ви можете відфільтрувати ринки, налаштувавши відповідну картку ринку у верхній частині панелі.\n\n#italic Детальніше про торгівлю можна почитати [Link('hints', 'selected_hint = hint_trade', 'тут')]."
  mission_expand_merchant_power: "Впливові купці"
  mission_expand_merchant_power_desc: "Щоб досягти успіху у своїх купецьких прагненнях, нам потрібно, щоб вплив на нашому ринку був абсолютним. Для цього знадобиться звести безпосередньо #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#! та інші схожі споруди."
  mission_expand_merchant_power_tip: "Існує кілька способів збільшити вашу [Concept('merchant_power_with_icon', 'торгову перевагу')|e] на [Concept('market_with_icon', 'ринку')|e]:\n\n@arrow_bonus_tier_3! встановлення контролю над великою кількістю [Concept('locations_with_icon', 'місцевостей')|e], що належать до цього [Concept('market', 'ринку')];\n\n@arrow_bonus_tier_2! збільшення [Concept('maritime_presence_with_icon', 'морської присутності')|e] у прибережних водах [Concept('market', 'ринку')];\n\n@arrow_bonus_tier_1! деякі [Concept('buildings_with_icon', 'споруди')|e], наприклад #TOOLTIP:BUILDING_TYPE,marketplace,X #L ринок#!#!, також збільшують [Concept('merchant_power', 'торгову перевагу')].\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_increasing_trade_advantage', 'тут')]."
  mission_get_into_profitable_export: "Мистецтво експорту"
  mission_get_into_profitable_export_desc: "Перепродаж імпортних товарів — простий, але ефективний спосіб заробітку. Створивши експортні маршрути, ми забезпечимо собі гарний прибуток."
  mission_get_into_profitable_export_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити вашу [Concept('trade_with_icon', 'торгівлю')|e].\n\n@arrow_bonus_tier_2! Виберіть одну із запропонованих [Concept('trades', 'угод')] і зачекайте місяць, щоб побачити, як вона пройде.\n\n@arrow_bonus_tier_1! Замість цього ви можете автоматизувати всі угоди, натиснувши на @automation!#V шестерню#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_get_into_profitable_import: "Розкіш для народу"
  mission_get_into_profitable_import_desc: "Народу хочеться екзотичних товарів, і ми будемо реалізовувати їх на внутрішньому ринку… за цінами, які вважаємо справедливими."
  mission_get_into_profitable_import_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити вашу [Concept('trade_with_icon', 'торгівлю')|e].\n\n@arrow_bonus_tier_2! Виберіть одну із запропонованих [Concept('trades', 'угод')] і зачекайте місяць, щоб побачити, як вона пройде.\n\n@arrow_bonus_tier_1! Замість цього ви можете автоматизувати всі угоди, натиснувши на @automation!#V шестерню#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_improve_market_worth: "[SCOPE.sMarket('mission_target_market').GetNameWithNoTooltip] і багатство"
  mission_improve_market_worth_desc: "Благополуччя країни безпосередньо залежить від багатства внутрішнього ринку. А значить, ми повинні робити все можливе, щоб його розвивати."
  mission_improve_market_worth_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити вашу [Concept('trade_with_icon', 'торгівлю')|e].\n\n@arrow_bonus_tier_2! Виберіть одну із запропонованих [Concept('trades', 'угод')] і зачекайте місяць, щоб побачити, як вона пройде.\n\n@arrow_bonus_tier_1! Замість цього ви можете автоматизувати всі угоди, натиснувши на @automation!#V шестерню#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_trade_in_new_markets: "Освоєння нових ринків"
  mission_trade_in_new_markets_desc: "Хоча внутрішній ринок є нашим основним місцем збуту товарів, пошук та освоєння нових ринків безумовно піде на користь економіці."
  mission_trade_in_new_markets_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('trade', '', '@economy_panel! Панель економіки > Торгівля')], щоб побачити вашу [Concept('trade_with_icon', 'торгівлю')|e].\n\n@arrow_bonus_tier_2! Виберіть одну із запропонованих [Concept('trades', 'угод')] і зачекайте місяць, щоб побачити, як вона пройде.\n\n@arrow_bonus_tier_1! Замість цього ви можете автоматизувати всі угоди, натиснувши на @automation!#V шестерню#!.\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_light_ships: "Розвиток морської торгівлі"
  mission_light_ships_desc: "Перевезення товарів суходолом пов'язане з безліччю труднощів і займає чимало часу. Нам варто створити повноцінний торговий флот."
  mission_light_ships_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('unit_overview', '', '@military_panel! Панель військової справи > Флоти')] і клацніть по кнопці [regular_ship_icon] #V Будівництво кораблів#!, щоб побудувати [Concept('regular_ships', 'регулярні кораблі')|e].\n\n@arrow_bonus_tier_2! Побудуйте #TOOLTIP:UNITCATEGORY,navy_light_ship,X #L легкий корабель#!#!.\n\n@arrow_bonus_tier_1! Якщо вам потрібні [Concept('sailors_with_icon', 'моряки')|e], доведеться звести відповідні [Concept('buildings', 'споруди')|e], а для цього перейти на [Link('production', 'naval_category_with_icon', 'Панель виробництва > Морські військові споруди')].\n\n#italic Докладніше про це можна почитати [Link('hints', 'selected_hint = hint_trade_with_icon', 'тут')]."
  mission_embrace_capital_economy_trade_focus: "Купецьке багатство"
  mission_embrace_capital_economy_trade_focus_desc: "Граючи роль посередників у торгівлі різними товарами, ми можемо накопичити воістину величезні багатства!"
  requirements_for_this_task_arent_available_yet_tt: "Умови цього [Concept('task', 'етапу')|e] будуть доступні лише після початку відповідного [Concept('mission', 'завдання')|e]"
  capable_cabinet: "Досвідчені радники"
  capable_cabinet_DESCRIPTION: "Мудрі радники допоможуть нам ефективніше керувати країною та вести її до процвітання."
  capable_cabinet_CRITERIA_DESCRIPTION: "Наша рада складається з талановитих людей, які добре знають свою справу."
  capable_cabinet_BUTTON_TOOLTIP: "Призначення вмілих радників має вирішальне значення для грамотного управління землями."
  capable_cabinet_BUTTON_DETAILS: "$capable_cabinet_BUTTON_TOOLTIP$"
  mission_create_cabinet: "Утворення ради"
  mission_create_cabinet_desc: "Наша країна занадто величезна, через що нею вкрай складно керувати. Нам слід заручитися допомогою досвідчених радників!"
  mission_create_cabinet_tip: "@arrow_bonus_tier_3! Щоб побачити [Concept('cabinet_actions', 'доручення вашої ради')|e], відкрийте [Link('government', 'tabcontent = cabinet', '@government_panel! Панель уряду > Рада')] або клацніть по [cabinet_actions_icon] #W сповіщенню#!.\n\n@arrow_bonus_tier_2! Призначте [Concept('character', 'персонажа')|e] з найвищим показником відповідного [Concept('ability', 'навичка')|e] на вільне [Concept('cabinet_seat', 'місце в раді')|e].\n\n@arrow_bonus_tier_1! Найміть нового [Concept('courtier', 'придворного')|e], якщо відповідного [Concept('characters', 'персонажа')] зараз немає. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» та «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
  mission_promote_cabinet_head: "Голова ради"
  mission_promote_cabinet_head_desc: "На чолі ради має стояти видатний діяч, який розпоряджатиметься справами уряду."
  mission_promote_cabinet_head_tip: "@arrow_bonus_tier_3! Відкрийте [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')].\n\n@arrow_bonus_tier_2! Клацніть по кнопці [Concept('head_of_the_cabinet_with_icon', 'голови ради')|e] поруч з ім'ям [Concept('cabinet_member_with_icon', 'радника')|e].\n\n@arrow_bonus_tier_1! Ви також можете призначити [Concept('head_of_the_cabinet_with_icon', 'голову ради')|e] за допомогою #V дій персонажа#! на #V панелі цього персонажа#!. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» та «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
  mission_enact_government_reforms: "Впровадження державної реформи"
  mission_enact_government_reforms_desc: "Необхідність краще визначити форму нашого правління назріла вже давно. Щоб збільшити стабільність та зміцнити центральну владу, ми повинні впровадити потрібні реформи."
  mission_enact_government_reforms_tip: "@arrow_bonus_tier_3! Відкрийте [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')].\n\n@arrow_bonus_tier_2! Клацніть по #V кнопці з плюсом#! в нижньому правому куті картки стану «[ShowEstateTypeName('crown_estate')]», щоб вибрати один з доступних [Concept('reforms_with_icon', 'реформ')|e].\n\n@arrow_bonus_tier_1! Скасування [Concept('government_reforms', 'державних реформ'] знижує [Concept('stability_with_icon', 'стабільність')|e], а їх ухвалення займає якийсь час, тому вибирайте обачно. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_has_possible_reform', '$hint_has_possible_reform$')]» та «[Link('hints', 'selected_hint = hint_crown_power', '$hint_crown_power$')]».#!"
  mission_increase_cabinet_efficiency: "Підвищення ефективності ради"
  mission_increase_cabinet_efficiency_desc: "Систематизувавши роботу ради, ми зможемо значно підвищити її ефективність і тим самим забезпечити нашій країні світле майбутнє."
  mission_increase_cabinet_efficiency_tip: "@arrow_bonus_tier_3! Відкрийте [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')].\n\n@arrow_bonus_tier_2! Перевірте свою поточну [Concept('cabinet_efficiency_with_icon', 'ефективність ради')|e].\n\n@arrow_bonus_tier_1! Цей [Concept('mission_task_with_icon', 'етап завдання')|e] займе #V 180 днів#!, його можна почати в будь-який час. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» та «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
  meritocratic_approach: "Принцип меритократії"
  meritocratic_approach_desc: "Враховуючи, що радники багато в чому впливають на наші рішення з низки важливих питань, ми повинні довіряти цю посаду лише видатним фахівцям."
  meritocratic_approach_tip: "@arrow_bonus_tier_3! Відкрийте [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')].\n\n@arrow_bonus_tier_2! Подивіться на своїх [Concept('cabinet_members_with_icon', 'радників')|e] та замініть їх, якщо їх [Concept('ability_with_icon', 'навичка')|e], пов'язана з обраним [Concept('cabinet_action_with_icon', 'дорученням')|e], слаборозвинена.\n\n@arrow_bonus_tier_1! Якщо у вас немає відповідних [Concept('characters', 'персонажів')], варто найняти нового [Concept('courtier', 'придворного')|e]. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
  royal_authority: "Королівська влада"
  royal_authority_desc: "Наші знамена вселяють благоговіння, і кожен житель країни неухильно дотримується букви закону. Все це можливо лише завдяки сильній і шанованій центральній владі."
  royal_authority_tip: "@arrow_bonus_tier_3! Відкрийте [Link('economy', 'tabcontent = balance_with_icon', 'Економіка > Баланс')].\n\n@arrow_bonus_tier_2! Щоб підвищити [Concept('legitimacy', 'легітимність')|e], можна збільшити [Concept('court_maintenance', 'утримання двору')|e].\n\n@arrow_bonus_tier_1! Виберіть [Concept('cabinet_action_with_icon', 'доручення')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Зміцнення уряду»#!#!. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_low_legitimacy', '$hint_low_legitimacy$')]».#!"
  high_era_of_countryname: "Велика доба [ROOT.GetCountry.Custom('CL_GEN')]"
  high_era_of_countryname_desc: "Грамотне управління, чуйні чиновники та щасливий народ — ось ті стовпи, на яких ґрунтується розвиток і процвітання нашої країни."
  high_era_of_countryname_tip: "@arrow_bonus_tier_3! Відкрийте [Link('economy', 'tabcontent = balance_with_icon', 'Економіка > Баланс')] та вкладіться в [Concept('stability_with_icon', 'стабільність')|e].\n\n@arrow_bonus_tier_2! Доручіть [Concept('cabinet', 'раді')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L підвищити стабільність у країні#!#!.\n\n@arrow_bonus_tier_1! Збільшіть число #L [GetPlayer.GetReligion.GetAdjective|l]их#! #TOOLTIP:POPTYPE,clergy,X #L священників#!#! шляхом будівництва [Concept('buildings_with_icon', 'споруд')|e], з якими пов'язані #TOOLTIP:POPTYPE,clergy,X #L священники#!#!. \n\n#italic Дізнатися більше про це можна тут: «[Link('hints', 'selected_hint = hint_low_stability', '$hint_low_stability$')]».#!"
  development_of_infrastructure: "Розвиток інфраструктури"
  development_of_infrastructure_DESCRIPTION: "Наявність розвиненої інфраструктури має величезне значення для процвітання столиці."
  development_of_infrastructure_CRITERIA_DESCRIPTION: "Ми забезпечили столиці необхідну інфраструктуру."
  development_of_infrastructure_BUTTON_TOOLTIP: "Розвинена столиця стане рушійною силою зростання та процвітання країни."
  development_of_infrastructure_BUTTON_DETAILS: "$development_of_infrastructure_BUTTON_TOOLTIP$"
  mission_assembly_halls: "Зали засідань"
  mission_assembly_halls_desc: "Щоб найефективніше керувати нашими володіннями, необхідно організувати в столиці майданчик, де уряд зможе обговорювати важливі питання."
  mission_assembly_halls_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Клацніть по кнопці @nobles! [ShowPopTypeName('nobles')] ліворуч від панелі, щоб переглянути список [Concept('buildings_with_icon', 'споруд')|e], які ви можете побудувати для цього [Concept('pop_type', 'суспільного класу')|e].\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'будівництво')|e] необхідної [Concept('building', 'споруди')]."
  mission_capital_province_prosperity: "Процвітання столиці"
  mission_capital_province_prosperity_desc: "Розвиток столичної провінції посприяє її процвітанню, а також посилить її політичний та економічний вплив у регіоні."
  a_great_capital: "Велика столиця"
  a_great_capital_desc: "Щоб створити благополучне суспільство, ми в першу чергу повинні звести гідну столицю, яка надихатиме народ на великі звершення."
  a_great_capital_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Клацніть по кнопці @construction!#V Будівництво#! у верхній частині картки місцевості.\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'будівництво')|e] необхідної кількості [Concept('building', 'споруд')]."
  this_will_depend_on_how_many_buildings_our_capital_has_in_total_tt: "Отримуваний [Concept('development', 'розвиток')|e] частково залежить від загальної кількості [Concept('buildings', 'споруд')|e] у нашій [Concept('capital', 'столиці')|e]"
  mission_capital_province_control: "Контроль навколо столиці"
  mission_capital_province_control_desc: "Наша влада та вплив не виходять за межі столиці. Нам слід якомога швидше посилити контроль над прилеглими територіями."
  mission_capital_province_control_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_2! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] щодо #TOOLTIP:CABINET_ACTION,increase_control_province,X #L посилення контролю#!#! над [Concept('province_with_icon', 'провінцією')|e] [Player.GetCapital.GetProvince.GetName].\n\n@arrow_bonus_tier_1! Також можна перейти до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], [Player.GetCapital.GetName], і клацнути по кнопці #V Будівництво дороги#!, щоб побудувати [Concept('road_with_icon', 'дорогу')|e] до сусідньої [Concept('location', 'місцевості')|e] для посилення [Concept('control_with_icon', 'контролю')|e] над нею.\n\n#italic Детальніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_control_with_icon', '$hint_control$')]."
  mission_capital_town: "Заснування містечка"
  mission_capital_town_desc: "Щоб залучити більше купців та збільшити доходи скарбниці, ми повинні заснувати нове містечко."
  mission_capital_town_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Клацніть по зображенню [rural_location_icon] [Concept('location_rank', 'рангу місцевості')|e] у верхній лівій частині картки місцевості, щоб розвинути [Concept('location_with_icon', 'місцевість')|e] з [Concept('rural_location_with_icon', 'сільської місцевості')|e] до @town! #TOOLTIP:LOCATIONRANK,town,X #L містечка#!#!."
  mission_capital_city: "Хвиля урбанізації"
  mission_capital_city_desc: "Вкладаючи кошти в зростання та розвиток столиці, ми перетворимо її на процвітаючий міський центр і тим самим ознаменуємо початок нової доби в історії нашої країни!"
  mission_capital_city_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Клацніть по зображенню [Concept('location_rank', 'рангу місцевості')|e] у верхній лівій частині картки місцевості, щоб розвинути [Concept('location_with_icon', 'місцевість')|e] з @town! #TOOLTIP:LOCATIONRANK,town,X #L містечка#!#! до @city! #TOOLTIP:LOCATIONRANK,city,X #L міста#!#!."
  burghers_capital_grow_tt: "Чисельність [Concept('pops', 'груп')|e] #TOOLTIP:POPTYPE,burghers,X #L містян#!#! у нашій [Concept('capital', 'столиці')|e] збільшиться"
  mission_capital_city2: "$mission_capital_city$"
  mission_capital_city2_desc: "$mission_capital_city_desc$"
  mission_capital_city2_tip: "$mission_capital_city_tip$"
  if_we_complete_as_city_we_gain_x_tt: "@trigger_no! Якщо на момент завершення цього [Concept('mission_task', 'етапу завдання')|e] наша [Concept('capital', 'столиця')|e] матиме [Concept('location_rank', 'ранг')|e] #Y «Місто»#!, вона на #Y 10#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,center_of_urbanization_modifier,X #V #L «Центр урбанізації»#!#!."
  mission_food_investment: "Заготівля продовольства"
  mission_food_investment_desc: "Ті, хто працює в полях і шахтах на благо нашої країни, потребують харчування. Ми повинні забезпечити народу достатньо їжі і в жодному разі не допустити голоду."
  mission_food_investment_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('food_production', '', '@production_panel! Панель виробництва > Їжа')], щоб побачити список ваших [Concept('provinces_with_icon', 'провінцій')|e] та оцінити становище з [Concept('food_with_icon', 'їжею')|e] в них.\n\n@arrow_bonus_tier_2! Клацайте по картках провінцій, щоб переглянути [Concept('locations_with_icon', 'місцевості')] та розширити видобуток [Concept('food_raw_materials', 'ресурсів для виробництва їжі')|e] в місцевостях з найвищою [Concept('food_productivity_with_icon', 'ефективністю виробництва їжі')|e].\n\n@arrow_bonus_tier_1! Також можна клацнути по кнопці [building_icon] #V [Concept('building', 'споруди')]#!, щоб переглянути [Concept('buildings', 'споруди')] з виробництва [Concept('food', 'їжі')], доступні в цій [Concept('location', 'місцевості')].\n\n#italic Детальніше про це можна почитати [Link('hints', 'selected_hint = hint_food_with_icon', 'тут')]."
  every_location_in_cap_prov_food_provisions_modifier: "Кожна належна нам [Concept('location', 'місцевість')|e] у [Concept('province', 'провінції')|e] нашої [Concept('capital', 'столиці')|e] на #Y 5#! років отримає модифікатор #TOOLTIP:STATIC_MODIFIER,capital_food_provisions_modifier,X #V #L «Постачання їжею»#!#!"
  mission_build_roads: "[ROOT.GetCountry.GetCapital.GetName] — перехрестя всіх доріг"
  mission_build_roads_desc: "Нова дорожня мережа, що з'єднує столицю з прилеглими поселеннями, стане найважливішою транспортною артерією нашої країни та посприяє розвитку торгівлі в регіоні!"
  mission_build_roads_tip: "@arrow_bonus_tier_2! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], [Player.GetCapital.GetName], і клацніть по кнопці #V Будівництво дороги#!.\n\n@arrow_bonus_tier_1! Побудуйте [Concept('road_with_icon', 'дорогу')|e] в сусідню [Concept('location', 'місцевість')|e]."
  mission_task_will_be_bypassed_tt: "Цей [Concept('mission_task', 'етап завдання')|e] буде пропущено"
  mission_home_region_control: "Контроль над регіоном"
  mission_home_region_control_desc: "Прибуткові податки, що могли б надходити до скарбниці, часто кудись зникають. Чиновникам слід посилити контроль над землями, аби забезпечити справний збір податків."
  mission_home_region_control_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_2! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] щодо #TOOLTIP:CABINET_ACTION,increase_control_province,X #L посилення контролю#!#! над [Concept('provinces', 'провінціями')|e] в [Concept('region_with_icon', 'регіоні')|e] [Player.GetCapital.GetProvince.GetArea.GetRegion.GetName].\n\n@arrow_bonus_tier_1! Для посилення [Concept('control_with_icon', 'контролю')|e] в [Concept('region', 'регіоні')] ви також можете будувати [Concept('roads_with_icon', 'дороги')|e] зі своєї [Concept('capital_with_icon', 'столиці')|e].\n\n#italic Докладніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_control_with_icon', '$hint_control$')]."
  will_scale_with_average_home_region_control_tt: "Залежатиме від середнього показника нашого [Concept('control', 'контролю')|e] над рідним [Concept('region', 'регіоном')|e]"
  mission_push_for_centralization: "Прагнення до підпорядкування"
  mission_push_for_centralization_desc: "Повна централізація влади є радикальним, але необхідним заходом, без якого подальше поширення нашого впливу неможливе. Нам необхідно усунути всі перешкоди на шляху до підпорядкування в ім'я процвітання країни та добробуту наших вірних підданих."
  mission_push_for_centralization_tip: "$change_societal_value_tip$"
  monthly_events_about_centralization_tt: "Поки триває цей [Concept('mission_task', 'етап завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані зі спробами централізації"
  progress_and_literacy: "Поступ і грамотність"
  progress_and_literacy_DESCRIPTION: "Підвищення грамотності населення має першочергове значення для розвитку країни."
  progress_and_literacy_CRITERIA_DESCRIPTION: "Наші люди стали набагато грамотнішими та освіченішими."
  progress_and_literacy_BUTTON_TOOLTIP: "Нехай наша країна стане центром тяжіння видатних вчених і мислителів!"
  progress_and_literacy_BUTTON_DETAILS: "$progress_and_literacy_BUTTON_TOOLTIP$"
  mission_ensure_book_production: "Збільшення виробництва книг"
  mission_ensure_book_production_desc: "Для підвищення загальної грамотності необхідно забезпечити народ книгами, а тому нам слід виділяти більше коштів на будівництво друкарських майстерень."
  mission_ensure_book_production_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('goods_production', '', '@production_panel! Панель виробництва > Товари')] і знайдіть @books! #TOOLTIP:GOODS,books,X #L книги#!#!.\n\n@arrow_bonus_tier_2! Клацніть по кнопці [building_icon] #V Споруда#!, щоб відфільтрувати всі [Concept('buildings', 'споруди')|e], що займаються випуском #TOOLTIP:GOODS,books,X #L книг#!#!, які можна побудувати у вашій [Concept('country', 'країні')].\n\n@arrow_bonus_tier_1! Побудуйте #V 3#! подібні споруди в будь-якій [Concept('location', 'місцевості')|e]."
  mission_new_institutions: "Нові інститути"
  mission_new_institutions_desc: "Переймаючи знання в інших народів, ми відкриємо для себе нові технології та інші переваги."
  mission_found_libraries: "Будівництво бібліотек"
  mission_found_libraries_desc: "Ми повинні будувати більше бібліотек, які слугуватимуть сховищами знань та освітніми центрами країни."
  mission_found_libraries_tip: "@arrow_bonus_tier_2! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')] і знайдіть #TOOLTIP:BUILDING_TYPE,library,X #L бібліотеку#!#!.\n\n@arrow_bonus_tier_1! Клацніть по [Concept('building', 'споруді')|e], щоб побудувати її в будь-якій з ваших [Concept('locations_with_icon', 'місцевостей')|e]."
  mission_wave_of_innovation: "Хвиля новаторства"
  mission_wave_of_innovation_desc: "Народ прагне знань! Щоб задовольняти їхню потребу в освіті та не відставати від сусідів, нам варто приділяти більше уваги розвитку науки та культури."
  mission_build_chancery: "Канцелярія"
  mission_wave_of_innovation_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('societal_values', '', '@government_panel! Панель уряду > Цінності')], щоб ознайомитися з вашими [Concept('societal_values_with_icon', 'суспільними цінностями')|e].\n\n@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_1! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] щодо #TOOLTIP:CABINET_ACTION,change_societal_values,X #L зміни суспільних цінностей#!#!.\n\n#italic Докладніше про це ви можете прочитати тут: [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', '$hint_has_possible_cabinet_action$')] та [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', '$hint_lack_cabinet_for_cabinet_action$')]."
  mission_build_chancery_desc: "Наші володіння збільшуються, там виникають нові поселення, а тому країні необхідна служба, яка займалася б управлінням і судочинством. Для цього слід заснувати особливий інститут — #TOOLTIP:BUILDING_TYPE,chancery,X #L канцелярію#!#!."
  mission_theatrical_expression: "Театральні вистави"
  mission_theatrical_expression_desc: "Основою нашої культури є мистецтво, за допомогою якого люди діляться своїми переживаннями."
  mission_islamic_colleges: "Ісламські школи"
  mission_islamic_colleges_desc: "Вивчення писання та збереження знань — наш священний обов'язок, тому ми повинні будувати більше медресе, які займатимуться просвітою народу та розвитком ісламської науки."
  mission_houses_of_wisdom: "Доми мудрості"
  mission_houses_of_wisdom_desc: "У кожному нашому #TOOLTIP:BUILDING_TYPE,university,X #L університеті#!#! ми поставимо наріжним каменем поширення знань та прагнення до нових вершин інтелектуальної діяльності."
  four_locations_gain_development_tt: "До #Y 4#! [Concept('locations', 'місцевостей')|e] з найвищим рівнем [Concept('literacy', 'грамотності')|e] та наявністю #TOOLTIP:BUILDING_TYPE,university,X #L університету#!#! отримають [ShowNamedValue('development_mild_bonus')|+] до [Concept('development', 'розвитку')|e]."
  mission_advances_technology: "Технологічний поступ"
  mission_advances_technology_desc: "Ми повинні вкладати більше коштів у розвиток технологій, щоб не відставати від інших країн."
  mission_advances_technology_tip: "@arrow_bonus_tier_3! Перейдіть на @advances_panel![Link('advances', 'subtab = research', 'Панель поступу')] та виберіть необхідне.\n\n@arrow_bonus_tier_2! Також можна клацнути по зображенню порожньої склянки у правому верхньому куті, щоб відкрити @advances_panel![Link('technology_view', '', 'Панель поступу')] цілком.\n\n@arrow_bonus_tier_1! Ви можете автоматизувати дослідження на @automation![Link('automation', '', 'панелі автоматизації')].\n\n#italic Детальніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_can_do_more_research', '@hint! $hint_can_do_more_research$')]#!."
  researched_5_new_advances_tt: "З початку [Concept('mission', 'завдання')|e] «[ShowMissionName('progress_and_literacy')]» ми вивчили щонайменше #Y три#! нових [Concept('advances', 'поступи')|e]"
  mission_raise_literacy: "Підвищення грамотності"
  mission_raise_literacy_desc: "Грамотність — це сад, якому потрібна турбота та вдумливий розвиток. Освіта населення — ключ до світлого майбутнього!"
  mission_raise_literacy_tip: "Існує кілька способів підвищити [Concept('literacy_with_icon', 'грамотність')|e] у вашій [Concept('country_with_icon', 'країні')|e]:\n$TAB$@arrow_bonus_tier_1! збільшення кількості [Concept('pops_with_icon', 'груп населення')|e], що належать до [Concept('upper_class', 'вищого суспільства')|e], за рахунок будівництва [Concept('buildings_with_icon', 'споруд')|e] на [Link('production', '', '@production_panel! Панелі виробництва > Споруди')];\n$TAB$@arrow_bonus_tier_1! будівництво #TOOLTIP:BUILDING_TYPE,library,X #L бібліотек#!#! ] у ваших найбільш густонаселених [Concept('locations', 'місцевостях')];\n$TAB$@arrow_bonus_tier_1! вивчення [Concept('advances_with_icon', 'поступів')|e], які підвищують [Concept('literacy', 'грамотність')] (це можна зробити на [Link('technology_view', '', '@advances_panel! панелі поступу')]);\n$TAB$@arrow_bonus_tier_1! розвитку [Concept('rural_locations', 'сільських місцевостей')|e] до [Concept('urban_locations', 'міських')|e].\n\n#italic Перевірити ваш поточний рівень [Concept('literacy', 'грамотності')] можна на @advances_panel![Link('advances', '', 'панелі поступу')]#!."
  mission_ensure_book_production_reward_tt: "Наша [Concept('location', 'місцевість')|e] з максимальним рівнем [Concept('development', 'розвитку')|e], [Concept('market_access', 'доступом до ринку')|e] та виробництвом #TOOLTIP:GOODS,books,X #L книг#!#! на #Y 10#! років отримає ослаблений [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,center_of_writing_modifier,X #V #L «Літературний центр»#!#!."
  scales_with_number_of_libraries: "Залежить від кількості заповнених [Concept('buildings', 'споруд')|e] типу #TOOLTIP:BUILDING_TYPE,library,X #L «Бібліотека»#!#!"
  every_location_with_theater_pops_gain_10_satisfaction_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] [Concept('pops', 'груп населення')|e] у [Concept('locations', 'місцевостях')|e], де є #TOOLTIP:BUILDING_TYPE,theater,X #L театр#!#!, підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  monthly_events_about_research_and_thought_tt: "Поки триває цей [Concept('mission_task', 'етап завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані зі спробами впровадження новацій та поступу"
  estate_cooperation: "Співпраця зі станами"
  estate_cooperation_DESCRIPTION: "З нашого боку буде розумно вибудувати довірчі відносини з впливовими станами країни."
  estate_cooperation_CRITERIA_DESCRIPTION: "Нам вдалося покращити відносини з одним зі станів."
  estate_cooperation_BUTTON_TOOLTIP: "Заручившись підтримкою впливового стану, ми зможемо здійснити свої плани та привести суспільство до процвітання."
  estate_cooperation_BUTTON_DETAILS: "$estate_cooperation_BUTTON_TOOLTIP$"
  mission_select_estate: "Виберіть [Concept('estate', 'стан')|e]"
  mission_select_no_estate: "@trigger_no! Немає доступних [Concept('estates', 'станів')|e]."
  used_bribe_5_years_tt: "За минулі #Y 5#! років ми скористалися [Concept('action', 'дією')|e] #TOOLTIP:GENERIC_ACTION,bribe_estate,X #L «Підкуп стану»#!#! щодо стану «[mission_target_estate.GetName|l]»"
  mission_estate_privileges: "Надання привілеїв"
  mission_estate_privileges_desc: "Щоб забезпечити зговірливість [Concept('estate', 'стану')|e], нам слід наділити його частиною посад та привілеїв."
  mission_estate_privileges_tip: "@arrow_bonus_tier_3! Щоб побачити свої [Concept('estates_with_icon', 'стани')|e], відкрийте [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')].\n\n@arrow_bonus_tier_2! Пожалуйте нову [Concept('privilege_with_icon', 'привілегію')|e] обраному [Concept('estate', 'стану')], клацнувши по #V кнопці з плюсом#!.\n\n@arrow_bonus_tier_1! Виберіть [Concept('privilege', 'привілегію')], яка збільшує [Concept('estate_satisfaction_with_icon', 'задоволення стану')|e] \n\n#italic Дізнатися більше про це можна [Link('hints', 'selected_hint = hint_estates_with_icon', 'тут')]."
  monthly_events_about_the_scoped_estate_tt: "Поки триває цей [Concept('mission_task', 'етап завдання')|e], щомісяця можуть відбуватися [Concept('events', 'події')|e], пов'язані зі [Concept('estate', 'станом')|e]"
  mission_capital_influence: "Вплив у столиці"
  mission_capital_influence_desc: "Зростаючий вплив представників [Concept('estate', 'стану')|e] в нашій столиці забезпечить їй більший спокій та краще управління."
  mission_capital_influence_tip: "@arrow_bonus_tier_3! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], @location![Player.GetCapital.GetName], щоб побачити, які в ній є [Concept('buildings_with_icon', 'споруди')|e].\n\n@arrow_bonus_tier_2! Переконайтеся, що в усіх цих [Concept('buildings', 'спорудах')] немає незайнятих [Concept('employed', 'робочих місць')|e].\n\n@arrow_bonus_tier_1! Ви можете збільшити [Concept('stability_with_icon', 'стабільність')|e], щоб #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V прискорити підвищення населення#!#!.\n\n #italic Дізнатися більше про це можна [Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings_with_icon', 'тут')]."
  mission_fund_construction_projects: "Фінансування будівельних робіт"
  mission_fund_construction_projects_desc: "Щоб показати нашу готовність співпрацювати зі [Concept('estate', 'станом')|e], ми профінансуємо будівництво споруд, тим самим підвищуючи розвиток та покращуючи об'єкти цього стану."
  mission_fund_construction_projects_tip: "@arrow_bonus_tier_3! Перейдіть до своєї [Concept('capital_with_icon', 'столиці')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Клацніть по кнопці потрібного [Concept('pop_type_with_icon', 'суспільного класу')|e] в лівій частині панелі, щоб побачити, які [Concept('buildings_with_icon', 'споруди')|e] можна звести для цього [Concept('pop_type', 'класу')|e].\n\n@arrow_bonus_tier_1! Розпочніть [Concept('construction_with_icon', 'будівництво')|e] запитаної [Concept('buildings', 'споруди')]."
  mission_estate_satisfaction: "[mission_target_estate.GetName] та їхня прихильність"
  mission_estate_satisfaction_desc: "В інтересах внутрішньої політики нам слід заручитися підтримкою впливового [Concept('estate', 'стану')|e] на майбутнє."
  mission_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'стани')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_shared_enrichment: "Спільне багатство"
  mission_shared_enrichment_desc: "Належне оподаткування, сувора звітність та примноження багатства [Concept('estate', 'стану')|e] послужать зразком для всієї системи зборів у нашій країні."
  mission_shared_enrichment_tip: "@arrow_bonus_tier_3! Щоб побачити свої [Concept('estates_with_icon', 'стани')|e], відкрийте [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')].\n\n@arrow_bonus_tier_2! Дію «[ShowGenericActionName('bribe_estate')]» можна здійснити, натиснувши на відповідну #V кнопку#!.\n\n@arrow_bonus_tier_1! Крім того, можна знизити [Concept('taxes_with_icon', 'податки')|e], відкривши [Link('economy', '', '@economy_panel!$lateralview_economy_entry_name$ > Баланс')], і почекати, поки стан накопичить кошти.\n\n#italic  Дізнатися більше про це можна [Link('hints', 'selected_hint = hint_estates_with_icon', 'тут')]."
  mission_shape_society: "Суспільні зміни"
  mission_shape_society_desc: "Вітер змін гуляє по залах палаців у наших землях. Щоб зміцнити зв'язки між двором та [Concept('estate', 'станом')|e], нам слід відповідним чином змінити суспільство."
  mission_shape_society_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('societal_values', '', '@government_panel! Панель уряду > Цінності')], щоб ознайомитися з вашими [Concept('societal_values_with_icon', 'суспільними цінностями')|e].\n\n@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_1! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] щодо #TOOLTIP:CABINET_ACTION,change_societal_values,X #L зміни суспільних цінностей#!#!.\n\n#italic Докладніше про це ви можете прочитати тут: [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', '$hint_has_possible_cabinet_action$')] та [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_with_icon', '$hint_lack_cabinet_for_cabinet_action$')]."
  target_mission_pop_gets_20_satisfaction_tt: "[Concept('pops', 'Групи населення')|e] в нашій [Concept('capital', 'столиці')|e], що належать до стану «[mission_target_estate.GetNameWithNoTooltip|l]», отримають [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  every_pop_of_estate_10_satisfaction_tt: "[Concept('pops', 'Групи населення')|e] #italic у нашій країні#!, що належать до стану «[mission_target_estate.GetNameWithNoTooltip|l]», а також до нашої [Concept('culture', 'культури')|e] та [Concept('religion', 'релігії')|e], отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  every_pop_of_no_estate_10_satisfaction_tt: "[Concept('pops', 'Групи населення')|e] #italic у нашій країні#!, що належать до обраного стану, а також до нашої [Concept('culture', 'культури')|e] та [Concept('religion', 'релігії')|e], отримають [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  generic_traditional_economy: "Звичаєвий уклад"
  generic_traditional_economy_DESCRIPTION: "Сила нашої країни полягає у налагодженій системі управління господарством, яка забезпечує потреби людей протягом багатьох поколінь."
  generic_traditional_economy_CRITERIA_DESCRIPTION: "Ми прийняли більш сталий звичаєвий уклад."
  generic_traditional_economy_BUTTON_TOOLTIP: "Зміцнюючи звичаєве господарство, ми закладаємо підвалини процвітання суспільства на багато років уперед."
  generic_traditional_economy_BUTTON_DETAILS: "$generic_traditional_economy_BUTTON_TOOLTIP$"
  mission_increase_workforce: "Залучення робітників"
  mission_increase_workforce_desc: "Для здійснення наших планів та підтримки зростання економіки знадобиться чимало кваліфікованих робітників. Чим більше робочої сили у нас буде, тим швидше ми зможемо розширити свої володіння."
  mission_connect_location_to_capital: "Дорога до міста [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
  mission_connect_location_to_capital_desc: "Столиця повинна бути пов'язана з рештою земель країни. Розвиваючи інфраструктуру між нею та іншими поселеннями, ми зможемо зміцнити народну єдність, посилити вплив місцевої влади, а також підвищити ефективність збору податків та видобутку ресурсів."
  mission_connect_location_to_capital_tip: "@arrow_bonus_tier_2! Перейдіть до місцевості, де знаходиться ваша [Concept('capital_with_icon', 'столиця')|e], [Player.GetCapital.GetName], і клацніть по кнопці [road_icon] #V Будівництво дороги#!.\n\n@arrow_bonus_tier_1! Потім виберіть [Concept('location_with_icon', 'місцевість')|e], до якої хочете прокласти [Concept('road_with_icon', 'дорогу')|e].\n\n#italic Детальніше про це можна почитати тут: [Link('hints', 'selected_hint = hint_control_with_icon', '$hint_control$')]."
  designated_location_capital_connection_modifier_tt: "Кожна [Concept('location', 'місцевість')|e] у позначеній [Concept('province', 'провінції')|e] отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,capital_connection_modifier,X #V #L Зв'язок зі столицею#!#!, який збільшується залежно від [Concept('proximity', 'досяжності')|e] вашої столиці."
  mission_increase_rgo_level: "Розширення видобутку ресурсів"
  mission_increase_rgo_level_desc: "В основі процвітання будь-якої країни лежить видобуток природних ресурсів. Ми повинні розвивати сільську інфраструктуру та збільшувати обсяги видобутку, щоб задовольнити всі потреби нашого зростаючого населення та економіки."
  mission_increase_rgo_level_tip: "@arrow_bonus_tier_2! Перейдіть у [Concept('location_with_icon', 'місцевість')|e], яку вибрали для виконання завдання.\n\n@arrow_bonus_tier_1! Клацніть по кнопці [rgo_icon] #V $game_concept_rgo$#!, щоб розширити [Concept('resource_gathering_operations', 'видобуток ресурсів')]."
  mission_peasants_estate_satisfaction: "Задоволення простолюду"
  mission_peasants_estate_satisfaction_desc: "Наша економіка тримається на простолюді. Задоволення потреб цього стану забезпечить суспільну стабільність, без якої подальший розвиток країни неможливий."
  mission_peasants_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('government', 'tabcontent = estates_with_icon', 'Панель уряду > Стани')], щоб побачити ваші [Concept('estates_with_icon', 'стани')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
  mission_market_villages: "Сільські ринки"
  mission_market_villages_desc: "Створення ринків у селах відкриє нові можливості для торгівлі та забезпечить розвиток сільських місцевостей, а також сприятиме об'єднанню наших земель та процвітанню країни."
  mission_market_villages_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @peasants!#TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,market_village,X #L торгове село#!#!.\n\n@arrow_bonus_tier_1! Побудуйте його у відповідній [Concept('location_with_icon', 'місцевості')|e], клацнувши по ній у списку споруд, або по мапі."
  mission_embrace_trad_economy: "Підтримка звичаєвого господарства"
  mission_embrace_trad_economy_desc: "Шлях до розвитку господарства лежить не в бездумних новаціях, а у використанні перевірених методів. Ми будемо дотримуватися усталеного прадавнього звичаєвого ладу, підтримуючи сільські громади та спонукаючи людей повертатися до сіл."
  mission_embrace_trad_economy_tip: "$change_societal_value_tip$"
  mission_prosperous_production: "Процвітаюче виробництво"
  mission_prosperous_production_desc: "Добробут сільських місцевостей має для нас першочергове значення, оскільки селяни є основною робочою силою країни. Виділивши кошти на підтримку сіл, ми зможемо збільшити виробництво місцевих продуктів та задовольнити потреби народу."
  mission_fishing_villages: "Підтримка рибальських сіл"
  mission_fishing_villages_desc: "Наші річки та моря багаті на найрізноманітнішу рибу. Підтримавши сільських рибалок, ми не тільки забезпечимо країну продовольством, а й сприятимемо розвитку сільських місцевостей."
  mission_fishing_villages_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @peasants!#TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,fishing_village,X #L рибальське село#!#!.\n\n@arrow_bonus_tier_1! Побудуйте його у відповідній [Concept('location_with_icon', 'місцевості')|e], клацнувши по ній у списку споруд, або по мапі."
  mission_cloth_makers: "Підтримка сільських ткачів"
  mission_cloth_makers_desc: "Виробництво тканин є одним з основних видів ремесел у сільських місцевостях. Якщо ми підтримаємо місцевих ткачів, їхня продукція допоможе нам зміцнити вплив як на внутрішньому, так і на зовнішньому ринках."
  mission_cloth_makers_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @laborers!#TOOLTIP:POPTYPE,laborers,X #L робітники#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,rural_clothmaker,X #L будівлю сільського суконщика#!#!.\n\n@arrow_bonus_tier_1! Побудуйте її у відповідній [Concept('location_with_icon', 'місцевості')|e], клацнувши по ній у списку споруд, або по мапі."
  mission_irrigation: "Розширення зрошувальних систем"
  mission_irrigation_desc: "Маючи родючий ґрунт і великі запаси води, ми можемо перетворити навіть найпосушливіші території на квітучі поля. Розширення зрошувальних систем дозволить нам значно підвищити врожайність."
  mission_irrigation_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @peasants!#TOOLTIP:POPTYPE,peasants,X #L селяни#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,irrigation_systems,X #L іригацію#!#!.\n\n@arrow_bonus_tier_1! Побудуйте її у відповідній [Concept('location_with_icon', 'місцевості')|e], клацнувши по ній у списку споруд, або по мапі."
  mission_masons: "Створення гільдій каменярів"
  mission_masons_desc: "Для зростання поселень необхідні робітники, що володіють мистецтвом кам'яної кладки. Створивши гільдії каменярів по всій країні, ми забезпечимо постійний приплив цінних фахівців, які будуватимуть величні міста."
  mission_masons_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('production', '', '@production_panel! Панель виробництва > Споруди')], щоб побачити список ваших [Concept('buildings_with_icon', 'споруд')|e].\n\n@arrow_bonus_tier_2! Відфільтруйте [Concept('buildings', 'споруди')], в яких працюють @laborers!#TOOLTIP:POPTYPE,laborers,X #L робітники#!#!, і виберіть #TOOLTIP:BUILDING_TYPE,mason,X #L гільдію каменярів#!#!.\n\n@arrow_bonus_tier_1! Побудуйте її у відповідній [Concept('location_with_icon', 'місцевості')|e], клацнувши по ній у списку споруд, або по мапі."
  selected_rural_proximity_and_less_90_percent_pop_tt: "Вибрана [Concept('rural_location', 'сільська місцевість')|e] буде в [Concept('proximity', 'досяжності')|e] нашої [Concept('capital', 'столиці')|e], а її [Concept('population_capacity', 'межа населення')|e] буде менше #Y 90%#!."
  mission_task_select_rural_settlement: "Виберіть [Concept('rural_location', 'сільську місцевість')|e] для наступних [Concept('mission_tasks', 'етапів завдання')|e]"
  mission_task_no_rural_settlement: "@trigger_no! Немає доступних [Concept('rural_location', 'сільських місцевостей')|e]."
  every_location_in_province_connected_tt: "Кожна [Concept('location', 'місцевість')|e] у провінції [mission_target_location.GetProvince.GetName] з #G позитивним#! значенням [Concept('proximity', 'досяжності')|e] до нашої [Concept('capital', 'столиці')|e] на #Y 10#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,capital_connection_modifier,X #V #L Зв'язок зі столицею#!#!."
  mission_target_location_not_coastal: "[mission_target_location.GetName] — не [Concept('coastal', 'прибережна місцевість')|e]"
  need_mission_embrace_capital_economy_tt: "Вимоги цього [Concept('mission_task', 'етапу завдання')|e] стануть доступні після вибору [Concept('urban_location', 'міської місцевості')|e] у завданні «[ShowMissionTaskName('mission_embrace_capital_economy')]»"
  when_we_choose_appropriate_location_tt: "Цей [Concept('mission_task', 'етап завдання')|e] почнеться після вибору [Concept('rural_location', 'сільської місцевості')|e] у завданні #TOOLTIP:MISSION_TASK,mission_peasants_estate_satisfaction,x #L «Задоволення селян»#!#!"
  when_we_complete_mission_secure_production_resource_tt: "Умови цього [Concept('mission_task', 'етапу завдання')|e] стануть відомі після завершення [Concept('mission_task', 'завдання')|e] «[ShowMissionTaskName('mission_secure_production_resource')]»"
  when_we_choose_appropriate_location_coastal_tt: "Цей [Concept('mission_task', 'етап завдання')|e] почнеться, якщо вибрана [Concept('rural_location', 'сільська місцевість')|e] у завданні #TOOLTIP:MISSION_TASK,mission_peasants_estate_satisfaction,x #L «Задоволення селян»#!#! буде [Concept('coastal', 'прибережною')|e]"
  when_we_choose_appropriate_location_river_lake_tt: "Цей [Concept('mission_task', 'етап завдання')|e] почнеться, якщо вибрана [Concept('rural_location', 'сільська місцевість')|e] у завданні #TOOLTIP:MISSION_TASK,mission_peasants_estate_satisfaction,x #L «Задоволення селян»#!#! знаходиться поруч з озером або [Concept('river', 'річкою')|e]"
  mission_target_location_no_lake_or_river_tt: "[mission_target_location.GetRank.GetNameWithNoTooltip] [mission_target_location.GetName] не примикає до озера або [Concept('river', 'річки')|e]"
  scales_with_levels_of_market_village_tt: "Рівні #TOOLTIP:BUILDING_TYPE,market_village,X #L торгового села#!#! у цій [Concept('location', 'місцевості')|e]"
  mission_target_loc_province_gets_modifier_tt: "Кожна [Concept('location', 'місцевість')|e] у провінції [mission_target_location.GetProvince.GetName], що має хоча б один рівень #TOOLTIP:BUILDING_TYPE,market_village,X #L торгового села#!#!, на #Y 10#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,local_markets_modifier,X #V #L «Процвітання місцевих ринків»#!#!"
  mission_generic_province_gets_modifier_tt: "Кожна [Concept('location', 'місцевість')|e] у визначеній [Concept('province', 'провінції')|e], що має хоча б один рівень #TOOLTIP:BUILDING_TYPE,market_village,X #L торгового села#!#!, на #Y 10#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,local_markets_modifier,X #V #L «Процвітання місцевих ринків»#!#!"
  mission_target_loc_province_cheap_masonry_tt: "Кожна [Concept('location', 'місцевість')|e] у визначеній [Concept('province', 'провінції')|e] на #Y 5#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,cheaper_building_materials_modifier,X #V #L «Дешеві будівельні матеріали»#!#!"
  expand_mission_target_location_cloth_makers_2_levels_tt: "Протягом наступних #Y 10#! років ми зможемо додати #TOOLTIP:BUILDING_TYPE,rural_clothmaker,X #L сільському суконщику#!#! у [mission_target_location.Custom('LR_PREP')|l] [mission_target_location.GetName] ще #!2#G  рівня"
  expand_location_cloth_makers_2_levels_tt: "Протягом наступних #Y 10#! років ми зможемо додати #TOOLTIP:BUILDING_TYPE,rural_clothmaker,X #L сільському суконщику#!#! у визначеній [Concept('location', 'місцевості')|e] ще #!2#G  рівня"
  location_gains_prod_eff_modifier_tt: "Визначена [Concept('location', 'місцевість')|e] на #Y 20#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,rural_center_modifier,X #V #L «Великий сільський центр»#!#!"
  location_gains_rural_development_modifier_tt: "Визначена [Concept('location', 'місцевість')|e] на #Y 20#! років отримає [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,rural_development_modifier,X #V #L «Розвиток села»#!#!"
  requires_mission_export_produced_goods_tt: "Вимоги цього [Concept('mission_task', 'етапу завдання')|e] стануть доступні, коли ми завершимо попередні йому обов'язкові [Concept('mission_tasks', 'етапи')|e]"
  increase_estate_satisfaction_tip: "Є кілька способів підвищити [Concept('estate_satisfaction_with_icon', 'задоволення стану')|e]:\n$TAB$@arrow_bonus_tier_1! Надання нового [Concept('privilege_with_icon', 'привілею')|e]\n$TAB$@arrow_bonus_tier_1! [ShowGenericActionName('bribe_estate')]\n$TAB$@arrow_bonus_tier_1! Зниження [Concept('taxes_with_icon', 'податків')|e] (для цього перейдіть на [Link('economy', '', '@economy_panel!Панель економіки > Баланс')]).\n\n#italic Детальніше про це можна дізнатися [Link('hints', 'selected_hint = hint_estates_with_icon', 'тут')]."
  change_societal_value_tip: "@arrow_bonus_tier_3! Перейдіть на [Link('societal_values', '', '@government_panel! Панель уряду > Цінності')], щоб ознайомитися з вашими [Concept('societal_values_with_icon', 'суспільними цінностями')|e].\n\n@arrow_bonus_tier_2! Перейдіть на [Link('government', 'tabcontent = cabinet_with_icon', 'Панель уряду > Рада')], щоб побачити вашу [Concept('cabinet_with_icon', 'раду')|e].\n\n@arrow_bonus_tier_1! Доручіть [Concept('cabinet_member_with_icon', 'раднику')|e] [Concept('cabinet_action', 'завдання')|e] щодо #TOOLTIP:CABINET_ACTION,change_societal_values,X #L зміни суспільних цінностей#!#!."