 change_societal_value_tip: "@arrow_bonus_tier_3! Перейдите на [Link('societal_values', '', '@government_panel! Панель правительства > Ценности')], чтобы ознакомиться с вашими [Concept('societal_values_wth_icon', 'общественными ценностями')|e].\n\n@arrow_bonus_tier_2! Перейдите на [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')], чтобы увидеть ваш [Concept('cabinet_wth_icon', 'совет')|e].\n\n@arrow_bonus_tier_1! Поручите [Concept('cabinet_member_wth_icon', 'члену совета')|e] [Concept('cabinet_action', 'задание')|e] по #TOOLTIP:CABINET_ACTION,change_societal_values,X #L изменению общественных ценностей#!#!."
