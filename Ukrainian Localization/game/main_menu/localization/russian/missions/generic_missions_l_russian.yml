 generic_capital_economy_DESCRIPTION: "Жадность — это хорошо!"
 generic_capital_economy_CRITERIA_DESCRIPTION: "Мы заложили основу новой экономической системы, ориентированной на создание капитала посредством производства, торговли и выдачи займов."
