 mission_grant_burghers_privileges_tip: "@arrow_bonus_tier_3! Перейдите на [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')], чтобы увидеть ваши [Concept('estates_wth_icon', 'сословия')|e].\n\n@arrow_bonus_tier_2! [GetEstateName('burghers_estate')] нам нужны, предоставьте им новую [Concept('privilege_wth_icon', 'привилегию')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
 up_to_4_locations_decaying_mod_based_on_crown_power_tt: "[Concept('decaying_modifier', 'Ослабевающий модификатор')|e] #TOOLTIP:STATIC_MODIFIER,powerful_center_of_burghers_modifier,X #V #L «Влиятельный центр торговли»#!#!, зависящий от нашей [Concept('crown_power', 'власти правителя')|e], затронет до #Y 4#! [Concept('urban_locations', 'городских районов')|e]"
