 mission_build_entrepot: "[ROOT.GetCountry.GetGovernment.GetAdjective]ие торговые склады"
 mission_build_entrepot_desc: "Через наши земли проходит всё больше купцов, и мы можем извлечь из этого немалую выгоду, если вложим средства в строительство торговых складов. Развитая коммерческая инфраструктура предоставит купцам ещё больше возможностей для торговли, а также поспособствует росту нашего экономического влияния!"
 mission_build_entrepot_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @burghers!#TOOLTIP:POPTYPE,burghers,X #L горожане#!#!, и выберите #TOOLTIP:BUILDING_TYPE,entrepot,X #L пакгауз#!#! (Для этого вам придётся сначала изучить соответствующее [Concept('advance_wth_icon', 'улучшение')|e]!).\n\n@arrow_bonus_tier_1! Постройте его в вашем [Concept('market_center_wth_icon', 'рыночном центре')|e]."
 mission_trade_capacity: "Торговый потенциал"
 mission_trade_capacity_desc: "Наши купцы постепенно осваивают новые рынки. Их работа тяжела и опасна: они путешествуют в далёкие земли и привозят оттуда экзотические товары, идеи и технологии. Мы должны помогать им расширять свою деятельность, чтобы в дальнейшем они приносили в казну ещё больше прибыли."
 mission_trade_capacity_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @burghers!#TOOLTIP:POPTYPE,burghers,X #L горожане#!#!, и выберите #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынок#!#!.\n\n@arrow_bonus_tier_1! Постройте необходимое количество рынков, щёлкая по списку сооружений, либо по карте."
