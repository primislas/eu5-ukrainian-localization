 mission_setup_trade: "Налаживание торговли"
 mission_setup_trade_desc: "Для развития экономики нужно организовать торговую сеть. Не столь важно, будем мы импортировать или экспортировать товары, — для создания торговых предприятий нашим купцам пригодится любой опыт."
 mission_setup_trade_tip: "@arrow_bonus_tier_3! Перейдите на [Link('trade', '', '@economy_panel! Панель экономики > Торговля')], чтобы увидеть вашу [Concept('trade_wth_icon', 'торговлю')|e].\n\n@arrow_bonus_tier_2! Выберите одну из предложенных [Concept('trades', 'сделок')] и подождите месяц, чтобы увидеть, как она пройдёт.\n\n@arrow_bonus_tier_1! Вместо этого вы можете автоматизировать все сделки, нажав на @automation!#V шестерёнку#!.\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_attracting_new_burghers: "Новые [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('burghers_estate')|l]"
 mission_attracting_new_burghers_desc: "Поскольку наша экономика завязана на идее приумножения капитала, нам нужно его создать. Для этого городам потребуется больше ремесленников, купцов и разного рода мастеров."
 mission_attracting_new_burghers_tip: "@arrow_bonus_tier_3! Перейдите в [Concept('location_wth_icon', 'район')|e], который выбрали для выполнения задания.\n\n@arrow_bonus_tier_2! Щёлкните по кнопке @burghers!#TOOLTIP:POPTYPE,burghers,X #L Горожане#!#! слева от панели, чтобы просмотреть список [Concept('buildings_wth_icon', 'сооружений')|e], которые вы можете построить для этого [Concept('pop_type', 'общественного класса')|e].\n\n@arrow_bonus_tier_1! Чтобы увеличить численность #TOOLTIP:POPTYPE,burghers,X #L горожан#!#!, начните [Concept('construction_wth_icon', 'строить')|e] соответствующее [Concept('building', 'сооружение')]."
 mission_embrace_capital_economy: "Принятие капиталистической экономики"
 mission_embrace_capital_economy_desc: "Традиционная экономика нашей державы устарела и уже не способна обеспечить нам светлое будущее. Успех и процветание нам принесут только современные идеи, такие как капитализм."
 monthly_events_about_capital_economy_tt: "Пока длится этот [Concept('mission_task', 'этап задания')|e], каждый месяц могут происходить [Concept('events', 'события')|e], связанные с переходом к [Concept('societal_value', 'общественной ценности')|e] #TOOLTIP:SOCIETAL_VALUE,capital_economy_vs_traditional_economy,X #L «Капитализм»#!#!"
 mission_prepare_industry_focus: "Упор на мануфактуры"
 mission_prepare_industry_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
 mission_prepare_trade_focus: "Упор на торговлю"
 mission_prepare_trade_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
 mission_prepare_loan_focus: "Упор на выдачу займов"
 mission_prepare_loan_focus_desc: "$generic_capital_economy_BUTTON_TOOLTIP$"
 mission_expand_construction_materials: "Обеспечение стройматериалами"
 mission_get_construction_materials_desc: "Прежде чем наращивать мануфактурное производство, мы должны обеспечить державу качественными строительными материалами."
 mission_expand_construction_materials_desc: "$mission_get_construction_materials_desc$ Например, можно нарастить эксплуатацию этих ресурсов в державе."
 mission_import_construction_materials: "Импорт стройматериалов"
 mission_import_construction_materials_desc: "$mission_get_construction_materials_desc$ Для этого необходимо будет заняться торговлей, импортом и экспортом товаров."
 mission_secure_construction_material: "Поставки стройматериалов"
 mission_secure_construction_material_desc: "Мы должны обеспечить стабильные поставки материалов для расширения строительных работ."
 mission_secure_production_resource: "Поставки сырья"
 mission_secure_production_resource_desc: "Для расширения нашего растущего предприятия нужны стройматериалы. Однако не стоит забывать и о сырье, необходимом для производства товаров, которые мы планируем продавать."
 mission_secure_production_resource_tt: "[ROOT.GetCountry.GetCapital.GetMarket.GetName] — здесь находятся все [Concept('goods', 'товары')|e], необходимые для текущего [Concept('production_method', 'метода производства')|e]"
 mission_construct_goods_industry: "Строительство мануфактур"
 mission_construct_goods_industry_desc: "Наши склады забиты стройматериалами и сырьём для производства товаров. Пришло время строить мануфактуры!"
 mission_satisfy_own_demands: "Удовлетворение потребностей народа"
 mission_satisfy_own_demands_desc: "Было бы несправедливо продавать товары на иностранных рынках, когда в них остро нуждается наш народ. В первую очередь мы должны удовлетворить потребности державы, и лишь после этого можно будет сосредоточиться на получении прибыли."
 mission_export_produced_goods: "Экспорт товара «[ROOT.GetCountry.MakeScope.GetVariable('mission_target_goods').GetGoods.GetNameWithNoTooltip|l]»"
 mission_export_produced_goods_desc: "Мы организовали производство товаров и теперь можем продавать их другим странам."
 mission_create_profit: "Получение прибыли"
 mission_create_profit_desc: "$generic_capital_economy_CRITERIA_DESCRIPTION$"
 mission_expand_merchant_capacity: "Повышение торгового потенциала"
 mission_expand_merchant_capacity_desc: "Чтобы расширить наши торговые предприятия, следует привлечь в страну побольше купцов, которые будут покупать и продавать товары на наших рынках."
 mission_expand_merchant_capacity_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @burghers!#TOOLTIP:POPTYPE,burghers,X #L горожане#!#!, и выберите#TOOLTIP:BUILDING_TYPE,marketplace,X #L рынок#!#!.\n\n@arrow_bonus_tier_1! Постройте его в [Concept('locations', 'районах')], которые относятся к соответствующему [Concept('market_wth_icon', 'рынку')|e]. Вы можете отфильтровать рынки, настроив соответствующую карточку рынка в верхней части панели.\n\n#italic Подробнее о торговле можно почитать [Link('hints', 'selected_hint = hint_trade', 'здесь')]."
 mission_expand_merchant_power: "Влиятельные купцы"
 mission_expand_merchant_power_desc: "Чтобы добиться успеха в своих купеческих устремлениях, нам нужно, чтобы влияние на нашем рынке было абсолютным. Для этого понадобится возвести непосредственно #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынок#!#! и другие схожие сооружения."
 mission_expand_merchant_power_tip: "Существует несколько способов увеличить ваше [Concept('merchant_power_wth_icon', 'торговое преимущество')|e] на [Concept('market_wth_icon', 'рынке')|e]:\n\n@arrow_bonus_tier_3! установление контроля над большим числом [Concept('locations_wth_icon', 'районов')|e], относящихся к этому [Concept('market', 'рынку')];\n\n@arrow_bonus_tier_2! увеличение [Concept('maritime_presence_wth_icon', 'морского присутствия')|e] в прибрежных водах [Concept('market', 'рынка')];\n\n@arrow_bonus_tier_1! некоторые [Concept('buildings_wth_icon', 'сооружения')|e], например #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынок#!#!, также увеличивают [Concept('merchant_power', 'торговое преимущество')].\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_increasing_trade_advantage', 'здесь')]."
 mission_get_into_profitable_export: "Искусство экспорта"
 mission_get_into_profitable_export_desc: "Перепродажа импортных товаров — простой, но эффективный способ заработка. Создав экспортные маршруты, мы обеспечим себе хорошую прибыль."
 mission_get_into_profitable_export_tip: "@arrow_bonus_tier_3! Перейдите на [Link('trade', '', '@economy_panel! Панель экономики > Торговля')], чтобы увидеть вашу [Concept('trade_wth_icon', 'торговлю')|e].\n\n@arrow_bonus_tier_2! Выберите одну из предложенных [Concept('trades', 'сделок')] и подождите месяц, чтобы увидеть, как она пройдёт.\n\n@arrow_bonus_tier_1! Вместо этого вы можете автоматизировать все сделки, нажав на @automation!#V шестерёнку#!.\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_get_into_profitable_import: "Роскошь для народа"
 mission_get_into_profitable_import_desc: "Народу хочется экзотических товаров, и мы будем реализовывать их на внутреннем рынке… по ценам, которые считаем справедливыми."
 mission_get_into_profitable_import_tip: "@arrow_bonus_tier_3! Перейдите на [Link('trade', '', '@economy_panel! Панель экономики > Торговля')], чтобы увидеть вашу [Concept('trade_wth_icon', 'торговлю')|e].\n\n@arrow_bonus_tier_2! Выберите одну из предложенных [Concept('trades', 'сделок')] и подождите месяц, чтобы увидеть, как она пройдёт.\n\n@arrow_bonus_tier_1! Вместо этого вы можете автоматизировать все сделки, нажав на @automation!#V шестерёнку#!.\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_improve_market_worth: "[SCOPE.sMarket('mission_target_market').GetNameWithNoTooltip] и богатство"
 mission_improve_market_worth_desc: "Благополучие державы напрямую зависит от богатства внутреннего рынка. А значит, мы должны делать всё возможное, чтобы его развивать."
 mission_improve_market_worth_tip: "@arrow_bonus_tier_3! Перейдите на [Link('trade', '', '@economy_panel! Панель экономики > Торговля')], чтобы увидеть вашу [Concept('trade_wth_icon', 'торговлю')|e].\n\n@arrow_bonus_tier_2! Выберите одну из предложенных [Concept('trades', 'сделок')] и подождите месяц, чтобы увидеть, как она пройдёт.\n\n@arrow_bonus_tier_1! Вместо этого вы можете автоматизировать все сделки, нажав на @automation!#V шестерёнку#!.\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_trade_in_new_markets: "Освоение новых рынков"
 mission_trade_in_new_markets_desc: "Хотя внутренний рынок является нашим основным местом сбыта товаров, поиск и освоение новых рынков определённо пойдёт на пользу экономике."
 mission_trade_in_new_markets_tip: "@arrow_bonus_tier_3! Перейдите на [Link('trade', '', '@economy_panel! Панель экономики > Торговля')], чтобы увидеть вашу [Concept('trade_wth_icon', 'торговлю')|e].\n\n@arrow_bonus_tier_2! Выберите одну из предложенных [Concept('trades', 'сделок')] и подождите месяц, чтобы увидеть, как она пройдёт.\n\n@arrow_bonus_tier_1! Вместо этого вы можете автоматизировать все сделки, нажав на @automation!#V шестерёнку#!.\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_light_ships: "Развитие морской торговли"
 mission_light_ships_desc: "Перевозка товаров по суше сопряжена со множеством трудностей и занимает немало времени. Нам стоит создать полноценный торговый флот."
 mission_light_ships_tip: "@arrow_bonus_tier_3! Перейдите на [Link('unit_overview', '', '@military_panel! Панель военного дела > Флоты')] и щёлкните по кнопке [regular_ship_icon] #V Строительство кораблей#!, чтобы построить [Concept('regular_ships', 'регулярные корабли')|e].\n\n@arrow_bonus_tier_2! Постройте #TOOLTIP:UNITCATEGORY,navy_light_ship,X #L лёгкий корабль#!#!.\n\n@arrow_bonus_tier_1! Если вам нужны [Concept('sailors_wth_icon', 'моряки')|e], придётся возвести соответствующие [Concept('buildings', 'сооружения')|e], а для этого перейти на [Link('production', 'naval_category_wth_icon', 'Панель производства > Морские военные сооружения')].\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_trade_wth_icon', 'здесь')]."
 mission_embrace_capital_economy_trade_focus: "Купеческое богатство"
 mission_embrace_capital_economy_trade_focus_desc: "Играя роль посредников в торговле различных товаров, мы можем накопить поистине огромные богатства!"
 requirements_for_this_task_arent_available_yet_tt: "Условия этого [Concept('task', 'этапа')|e] будут доступны только после начала соответствующего [Concept('mission', 'задания')|e]"
 #capable_cabinet
 capable_cabinet: "Опытные советники"
 capable_cabinet_DESCRIPTION: "Мудрые члены совета помогут нам эффективнее управлять державой и вести её к процветанию."
 capable_cabinet_CRITERIA_DESCRIPTION: "Наш совет состоит из талантливых людей, которые хорошо знают своё дело."
 capable_cabinet_BUTTON_TOOLTIP: "Назначение умелых советников имеет решающее значение для грамотного управления землями."
 capable_cabinet_BUTTON_DETAILS: "$capable_cabinet_BUTTON_TOOLTIP$"
 mission_create_cabinet: "Образование совета"
 mission_create_cabinet_desc: "Наша держава слишком огромна, из-за чего ею крайне сложно управлять. Нам следует заручиться помощью опытных советников!"
 mission_create_cabinet_tip: "@arrow_bonus_tier_3! Чтобы увидеть [Concept('cabinet_actions', 'действия вашего совета')|e], откройте [Link('government', 'tabcontent = cabinet', '@government_panel! Панель правительства > Совет')] или щёлкните по [cabinet_actions_icon] #W уведомлению#!.\n\n@arrow_bonus_tier_2! Назначьте [Concept('character', 'персонажа')|e] с самым высоким показателем соответствующего [Concept('ability', 'навыка')|e] на пустующее [Concept('cabinet_seat', 'место в совете')|e].\n\n@arrow_bonus_tier_1! Наймите нового [Concept('courtier', 'придворного')|e], если подходящего [Concept('characters', 'персонажа')] сейчас нет. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» и «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
 mission_promote_cabinet_head: "Глава совета"
 mission_promote_cabinet_head_desc: "Во главе совета должен стоять выдающийся деятель, который будет распоряжаться делами правительства."
 mission_promote_cabinet_head_tip: "@arrow_bonus_tier_3! Откройте [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')].\n\n@arrow_bonus_tier_2! Щёлкните по кнопке [Concept('head_of_the_cabinet_wth_icon', 'главы совета')|e] рядом с именем [Concept('cabinet_member_wth_icon', 'члена совета')|e].\n\n@arrow_bonus_tier_1! Вы также можете назначить [Concept('head_of_the_cabinet_wth_icon', 'главу совета')|e] с помощью #V действий персонажа#! на #V панели этого персонажа#!. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» и «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
 mission_enact_government_reforms: "Принятие государственного принципа"
 mission_enact_government_reforms_desc: "Необходимость лучше определить форму нашего правления назрела уже давно. Чтобы увеличить стабильность и укрепить центральную власть, мы должны принять нужные реформы."
 mission_enact_government_reforms_tip: "@arrow_bonus_tier_3! Откройте [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')].\n\n@arrow_bonus_tier_2! Щёлкните по #V кнопке с плюсом#! в нижнем правом углу карточки сословия «[ShowEstateTypeName('crown_estate')]», чтобы выбрать один из доступных [Concept('reforms_wth_icon', 'принципов')|e].\n\n@arrow_bonus_tier_1! Отмена [Concept('government_reforms', 'государственных принципов'] снижает [Concept('stability_wth_icon', 'стабильность')|e], а их принятие занимает какое-то время, поэтому выбирайте осмотрительно. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_has_possible_reform', '$hint_has_possible_reform$')]» и «[Link('hints', 'selected_hint = hint_crown_power', '$hint_crown_power$')]».#!"
 mission_increase_cabinet_efficiency: "Повышение эффективности совета"
 mission_increase_cabinet_efficiency_desc: "Систематизировав работу совета, мы сможем значительно повысить его эффективность и тем самым обеспечить нашей державе светлое будущее."
 mission_increase_cabinet_efficiency_tip: "@arrow_bonus_tier_3! Откройте [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')].\n\n@arrow_bonus_tier_2! Проверьте свою текущую [Concept('cabinet_efficiency_wth_icon', 'эффективность совета')|e].\n\n@arrow_bonus_tier_1! Этот [Concept('mission_task_wth_icon', 'этап задания')|e] займёт #V 180 дней#!, его можно начать в любое время. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_has_possible_cabinet_action', '$hint_has_possible_cabinet_action$')]» и «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
 meritocratic_approach: "Принцип меритократии"
 meritocratic_approach_desc: "Учитывая, что советники во многом влияют на наши решения по ряду важных вопросов, мы должны доверять эту должность только выдающимся специалистам."
 meritocratic_approach_tip: "@arrow_bonus_tier_3! Откройте [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')].\n\n@arrow_bonus_tier_2! Посмотрите на своих [Concept('cabinet_members_wth_icon', 'членов совета')|e] и замените их, если их [Concept('ability_wth_icon', 'навык')|e], связанный с выбранным [Concept('cabinet_action_wth_icon', 'действием совета')|e], слишком слабо развит.\n\n@arrow_bonus_tier_1! Если у вас нет подходящих [Concept('characters', 'персонажей')], стоит нанять нового [Concept('courtier', 'придворного')|e]. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_lack_cabinet_for_cabinet_action', '$hint_lack_cabinet_for_cabinet_action$')]».#!"
 royal_authority: "Королевская власть"
 royal_authority_desc: "Наши знамёна внушают благоговение, и каждый житель державы неукоснительно следует букве закона. Всё это возможно лишь благодаря сильной и уважаемой центральной власти."
 royal_authority_tip: "@arrow_bonus_tier_3! Откройте [Link('economy', 'tabcontent = balance_wth_icon', 'Экономика > Баланс')].\n\n@arrow_bonus_tier_2! Чтобы повысить [Concept('legitimacy', 'легитимность')|e], можно увеличить [Concept('court_maintenance', 'содержание двора')|e].\n\n@arrow_bonus_tier_1! Выберите [Concept('cabinet_action_wth_icon', 'действие совета')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Укрепление правительства»#!#!. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_low_legitimacy', '$hint_low_legitimacy$')]».#!"
 high_era_of_countryname: "Великая эпоха [ROOT.GetCountry.Custom('CL_GEN')]"
 high_era_of_countryname_desc: "Грамотное управление, чуткие чиновники и счастливый народ — вот те столпы, на которых зиждется развитие и процветание нашей страны."
 high_era_of_countryname_tip: "@arrow_bonus_tier_3! Откройте [Link('economy', 'tabcontent = balance_wth_icon', 'Экономика > Баланс')] и вложитесь в [Concept('stability_wth_icon', 'стабильность')|e].\n\n@arrow_bonus_tier_2! Поручите [Concept('cabinet', 'совету')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L повысить стабильность в державе#!#!.\n\n@arrow_bonus_tier_1! Увеличьте число #L [GetPlayer.GetReligion.GetAdjective|l]их#! #TOOLTIP:POPTYPE,clergy,X #L священников#!#! путём строительства [Concept('buildings_wth_icon', 'сооружений')|e], с которыми связаны #TOOLTIP:POPTYPE,clergy,X #L священники#!#!. \n\n#italic Узнать больше об этом можно здесь: «[Link('hints', 'selected_hint = hint_low_stability', '$hint_low_stability$')]».#!"
 #development_of_infrastructure
 development_of_infrastructure: "Развитие инфраструктуры"
 development_of_infrastructure_DESCRIPTION: "Наличие развитой инфраструктуры имеет огромное значение для процветания столицы."
 development_of_infrastructure_CRITERIA_DESCRIPTION: "Мы обеспечили столице необходимую инфраструктуру."
 development_of_infrastructure_BUTTON_TOOLTIP: "Развитая столица станет движущей силой роста и процветания державы."
 development_of_infrastructure_BUTTON_DETAILS: "$development_of_infrastructure_BUTTON_TOOLTIP$"
 mission_assembly_halls: "Залы заседаний"
 mission_assembly_halls_desc: "Чтобы наиболее эффективно управлять нашими владениями, необходимо организовать в столице площадку, где правительство сможет обсуждать важные вопросы."
 mission_assembly_halls_tip: "@arrow_bonus_tier_3! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Щёлкните по кнопке @nobles!#TOOLTIP:POPTYPE,burghers,X #L Горожане#!#! слева от панели, чтобы просмотреть список [Concept('buildings_wth_icon', 'сооружений')|e], которые вы можете построить для этого [Concept('pop_type', 'общественного класса')|e].\n\n@arrow_bonus_tier_1! Начните [Concept('construction_wth_icon', 'строительство')|e] требуемого [Concept('building', 'сооружения')]."
 mission_capital_province_prosperity: "Процветание столицы"
 mission_capital_province_prosperity_desc: "Развитие столичной провинции поспособствует её процветанию, а также усилит её политическое и экономическое влияние в регионе."
 a_great_capital: "Великая столица"
 a_great_capital_desc: "Чтобы создать благополучное общество, мы в первую очередь должны возвести достойную столицу, которая будет вдохновлять народ на великие свершения."
 a_great_capital_tip: "@arrow_bonus_tier_3! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Щёлкните по кнопке @construction!#V Строительство#! в верхней части карточки района.\n\n@arrow_bonus_tier_1! Начните [Concept('construction_wth_icon', 'строительство')|e] требуемого количества [Concept('building', 'сооружений')]."
 this_will_depend_on_how_many_buildings_our_capital_has_in_total_tt: "Получаемое [Concept('development', 'развитие')|e] частично зависит от общего количества [Concept('buildings', 'сооружений')|e] в нашей [Concept('capital', 'столице')|e]"
 mission_capital_province_control: "Контроль вокруг столицы"
 mission_capital_province_control_desc: "Наша власть и влияние не выходят за пределы столицы. Нам следует как можно скорее усилить контроль над прилегающими территориями."
 mission_capital_province_control_tip: "@arrow_bonus_tier_3! Перейдите на [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')], чтобы увидеть ваш [Concept('cabinet_wth_icon', 'совет')|e].\n\n@arrow_bonus_tier_2! Поручите [Concept('cabinet_member_wth_icon', 'члену совета')|e] [Concept('cabinet_action', 'задание')|e] по #TOOLTIP:CABINET_ACTION,increase_control_province,X #L усилению контроля#!#! над [Concept('province_wth_icon', 'провинцией')|e] [Player.GetCapital.GetProvince.GetName].\n\n@arrow_bonus_tier_1! Также можно перейти к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], [Player.GetCapital.GetName], и щёлкнуть по кнопке #V Строительство дороги#!, чтобы построить [Concept('road_wth_icon', 'дорогу')|e] в соседний [Concept('location', 'район')|e] для усиления [Concept('control_wth_icon', 'контроля')|e] над ним.\n\n#italic Подробнее об этом можно почитать здесь: [Link('hints', 'selected_hint = hint_control_wth_icon', '$hint_control$')]."
 mission_capital_town: "Основание городка"
 mission_capital_town_desc: "Чтобы привлечь больше купцов и увеличить доходы казны, мы должны основать новый городок."
 mission_capital_town_tip: "@arrow_bonus_tier_3! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Щёлкните по изображению [rural_location_icon] [Concept('location_rank', 'ранга района')|e] в верхней левой части карточки района, чтобы развить [Concept('location_wth_icon', 'район')|e] с [Concept('rural_location_wth_icon', 'сельского района')|e] до @town! #TOOLTIP:LOCATIONRANK,town,X #L городка#!#!."
 mission_capital_city: "Волна урбанизации"
 mission_capital_city_desc: "Вкладывая средства в рост и развитие столицы, мы превратим её в процветающий городской центр и тем самым ознаменуем начало новой эпохи в истории нашей державы!"
 mission_capital_city_tip: "@arrow_bonus_tier_3! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Щёлкните по изображению [Concept('location_rank', 'ранга района')|e] в верхней левой части карточки района, чтобы развить [Concept('location_wth_icon', 'район')|e] с @town! #TOOLTIP:LOCATIONRANK,town,X #L городка#!#! до @city! #TOOLTIP:LOCATIONRANK,city,X #L города#!#!."
 burghers_capital_grow_tt: "Численность [Concept('pops', 'групп')|e] #TOOLTIP:POPTYPE,burghers,X #L горожан#!#! в нашей [Concept('capital', 'столице')|e] увеличится"
 mission_capital_city2: "$mission_capital_city$"
 mission_capital_city2_desc: "$mission_capital_city_desc$"
 mission_capital_city2_tip: "$mission_capital_city_tip$"
 if_we_complete_as_city_we_gain_x_tt: "@trigger_no! Если на момент завершения этого [Concept('mission_task', 'этапа задания')|e] наша [Concept('capital', 'столица')|e] будет обладать [Concept('location_rank', 'рангом')|e] #Y «Город»#!, она на #Y 10#! лет получит [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,center_of_urbanization_modifier,X #V #L «Центр урбанизации»#!#!."
 mission_food_investment: "Заготовка продовольствия"
 mission_food_investment_desc: "Те, кто трудится в полях и шахтах на благо нашей страны, нуждаются в пропитании. Мы должны обеспечить народу достаточно пищи и ни в коем случае не допустить голод."
 mission_food_investment_tip: "@arrow_bonus_tier_3! Перейдите на [Link('food_production', '', '@production_panel! Панель производства > Пища')], чтобы увидеть список ваших [Concept('provinces_wth_icon', 'провинций')|e] и оценить положение с [Concept('food_wth_icon', 'пищей')|e] в них.\n\n@arrow_bonus_tier_2! Щёлкайте по карточкам провинций, чтобы просмотреть [Concept('locations_wth_icon', 'районы')] и расширить добычу [Concept('food_raw_materials', 'ресурсов для производства пищи')|e] в районах с самой высокой [Concept('food_productivity_wth_icon', 'эффективностью производства пищи')|e].\n\n@arrow_bonus_tier_1! Также можно щёлкнуть по кнопке [building_icon] #V [Concept('building', 'сооружения')]#!, чтобы просмотреть [Concept('buildings', 'сооружения')] по производству [Concept('food', 'пищи')], доступные в этом [Concept('location', 'районе')].\n\n#italic Подробнее об этом можно почитать [Link('hints', 'selected_hint = hint_food_wth_icon', 'здесь')]."
 every_location_in_cap_prov_food_provisions_modifier: "Каждый принадлежащий нам [Concept('location', 'район')|e] в [Concept('province', 'провинции')|e] нашей [Concept('capital', 'столицы')|e] на #Y 5#! лет получит модификатор #TOOLTIP:STATIC_MODIFIER,capital_food_provisions_modifier,X #V #L «Снабжение пищей»#!#!"
 mission_build_roads: "[ROOT.GetCountry.GetCapital.GetName] — перекрёсток всех дорог"
 mission_build_roads_desc: "Новая дорожная сеть, соединяющая столицу с близлежащими поселениями, станет важнейшей транспортной артерией нашей державы и поспособствует развитию торговли в регионе!"
 mission_build_roads_tip: "@arrow_bonus_tier_2! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], [Player.GetCapital.GetName], и щёлкните по кнопке #V Строительство дороги#!.\n\n@arrow_bonus_tier_1! Постройте [Concept('road_wth_icon', 'дорогу')|e] в соседний [Concept('location', 'район')|e]."
 mission_task_will_be_bypassed_tt: "Этот [Concept('mission_task', 'этап задания')|e] будет пропущен"
 mission_home_region_control: "Контроль над регионом"
 mission_home_region_control_desc: "Подоходные налоги, которые могли бы поступать в казну, часто куда-то пропадают. Чиновникам следует усилить контроль над землями, чтобы обеспечить исправный сбор налогов."
 mission_home_region_control_tip: "@arrow_bonus_tier_3! Перейдите на [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')], чтобы увидеть ваш [Concept('cabinet_wth_icon', 'совет')|e].\n\n@arrow_bonus_tier_2! Поручите [Concept('cabinet_member_wth_icon', 'члену совета')|e] [Concept('cabinet_action', 'задание')|e] по #TOOLTIP:CABINET_ACTION,increase_control_province,X #L усилению контроля#!#! над [Concept('provinces', 'провинциями')|e] в [Concept('region_wth_icon', 'регионе')|e] [Player.GetCapital.GetProvince.GetArea.GetRegion.GetName].\n\n@arrow_bonus_tier_1! Для усиления [Concept('control_wth_icon', 'контроля')|e] в [Concept('region', 'регионе')] вы также можете строить [Concept('roads_wth_icon', 'дороги')|e] из вашей [Concept('capital_wth_icon', 'столицы')|e].\n\n#italic Подробнее об этом можно почитать здесь: [Link('hints', 'selected_hint = hint_control_wth_icon', '$hint_control$')]."
 will_scale_with_average_home_region_control_tt: "Будет зависеть от среднего показателя нашего [Concept('control', 'контроля')|e] над родным [Concept('region', 'регионом')|e]"
 mission_push_for_centralization: "Стремление к централизации"
 mission_push_for_centralization_desc: "Полная централизация власти является радикальной, но необходимой мерой, без которой дальнейшее распространение нашего влияния невозможно. Нам необходимо устранить все препятствия на пути к централизации во имя процветания державы и благополучия наших верных подданных."
 mission_push_for_centralization_tip: "$change_societal_value_tip$"
 monthly_events_about_centralization_tt: "Пока длится этот [Concept('mission_task', 'этап задания')|e], каждый месяц могут происходить [Concept('events', 'события')|e], связанные с попытками централизации"
 #progress_and_literacy
 progress_and_literacy: "Прогресс и грамотность"
 progress_and_literacy_DESCRIPTION: "Повышение грамотности населения имеет первостепенное значение для развития страны."
 progress_and_literacy_CRITERIA_DESCRIPTION: "Наши люди стали гораздо более грамотными и образованными."
 progress_and_literacy_BUTTON_TOOLTIP: "Пусть наша держава станет центром притяжения выдающихся учёных и мыслителей!"
 progress_and_literacy_BUTTON_DETAILS: "$progress_and_literacy_BUTTON_TOOLTIP$"
 mission_ensure_book_production: "Увеличение производства книг"
 mission_ensure_book_production_desc: "Для повышения всеобщей грамотности необходимо обеспечить народ книгами, а потому нам следует выделять больше средств на строительство печатных мастерских."
 mission_ensure_book_production_tip: "@arrow_bonus_tier_3! Перейдите на [Link('goods_production', '', '@production_panel! Панель производства > Товары')] и найдите @books! #TOOLTIP:GOODS,books,X #L книги#!#!.\n\n@arrow_bonus_tier_2! Щёлкните по кнопке [building_icon] #V Сооружение#!, чтобы отфильтровать все [Concept('buildings', 'сооружения')|e], занимающиеся выпуском #TOOLTIP:GOODS,books,X #L книг#!#!, которые можно построить в вашей [Concept('country', 'державе')].\n\n@arrow_bonus_tier_1! Постройте #V 3#! подобных сооружения в любом [Concept('location', 'районе')|e]."
 mission_new_institutions: "Новые институты"
 mission_new_institutions_desc: "Перенимая знания у других народов, мы откроем для себя новые технологии и другие преимущества."
 mission_found_libraries: "Строительство библиотек"
 mission_found_libraries_desc: "Мы должны строить больше библиотек, которые будут служить хранилищами знаний и образовательными центрами державы."
 mission_found_libraries_tip: "@arrow_bonus_tier_2! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')] и найдите #TOOLTIP:BUILDING_TYPE,library,X #L библиотеку#!#!.\n\n@arrow_bonus_tier_1! Щёлкните по [Concept('building', 'сооружению')|e], чтобы построить его в любом из ваших [Concept('locations_wth_icon', 'районов')|e]."
 mission_wave_of_innovation: "Волна инноваций"
 mission_wave_of_innovation_desc: "Народ жаждет знаний! Чтобы удовлетворять их потребность в образовании и не отставать от соседей, нам стоит уделять больше внимания развитию науки и культуры."
 mission_build_chancery: "Канцелярия"
 mission_wave_of_innovation_tip: "@arrow_bonus_tier_3! Перейдите на [Link('societal_values', '', '@government_panel! Панель правительства > Ценности')], чтобы ознакомиться с вашими [Concept('societal_values_wth_icon', 'общественными ценностями')|e].\n\n@arrow_bonus_tier_2! Перейдите на [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')], чтобы увидеть ваш [Concept('cabinet_wth_icon', 'совет')|e].\n\n@arrow_bonus_tier_1! Поручите [Concept('cabinet_member_wth_icon', 'члену совета')|e] [Concept('cabinet_action', 'задание')|e] по #TOOLTIP:CABINET_ACTION,change_societal_values,X #L изменению общественных ценностей#!#!.\n\n#italic Подробнее об этом вы можете прочитать здесь: [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_wth_icon', '$hint_has_possible_cabinet_action$')] и [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_wth_icon', '$hint_lack_cabinet_for_cabinet_action$')]."
 mission_build_chancery_desc: "Наши владения увеличиваются, там возникают новые поселения, а потому державе необходима служба, которая занималась бы управлением и судопроизводством. Для этого следует учредить особый институт — #TOOLTIP:BUILDING_TYPE,chancery,X #L канцелярию#!#!."
 mission_theatrical_expression: "Театральные представления"
 mission_theatrical_expression_desc: "Основой нашей культуры является искусство, с помощью которого люди делятся своими переживаниями."
 mission_islamic_colleges: "Исламские школы"
 mission_islamic_colleges_desc: "Изучение писания и сохранение знаний — наш священный долг, поэтому мы должны строить больше медресе, которые будут заниматься просвещением народа и развитием исламской науки."
 mission_houses_of_wisdom: "Дома мудрости"
 mission_houses_of_wisdom_desc: "В каждом нашем #TOOLTIP:BUILDING_TYPE,university,X #L университете#!#! мы поставив во главе угла распространение знаний и стремление к новым вершинам интеллектуальной деятельности."
 four_locations_gain_development_tt: "До #Y 4#! [Concept('locations', 'районов')|e] с самым высоким уровнем [Concept('literacy', 'грамотности')|e] и наличием #TOOLTIP:BUILDING_TYPE,university,X #L университета#!#! получат [ShowNamedValue('development_mild_bonus')|+] к [Concept('development', 'развитию')|e]."
 mission_advances_technology: "Технологические достижения"
 mission_advances_technology_desc: "Мы должны вкладывать больше средств в развитие технологий, чтобы не отставать от других стран."
 mission_advances_technology_tip: "@arrow_bonus_tier_3! Перейдите на @advances_panel![Link('advances', 'subtab = research', 'Панель улучшений')] и выберите необходимое.\n\n@arrow_bonus_tier_2! Также можно щёлкнуть по изображению пустой склянки в правом верхнем углу, чтобы открыть @advances_panel![Link('technology_view', '', 'Панель технологий')] целиком.\n\n@arrow_bonus_tier_1! Вы можете автоматизировать исследования на @automation![Link('automation', '', 'панели автоматизации')].\n\n#italic Подробнее об этом можно почитать здесь: [Link('hints', 'selected_hint = hint_can_do_more_research', '@hint! $hint_can_do_more_research$')]#!."
 researched_5_new_advances_tt: "С начала [Concept('mission', 'задания')|e] «[ShowMissionName('progress_and_literacy')]» мы изучили не менее #Y трёх#! новых [Concept('advances', 'улучшений')|e]"
 mission_raise_literacy: "Повышение грамотности"
 mission_raise_literacy_desc: "Грамотность — это сад, которому нужна забота и вдумчивое развитие. Образование населения — ключ к светлому будущему!"
 mission_raise_literacy_tip: "Существует несколько способов повысить [Concept('literacy_wth_icon', 'грамотность')|e] в вашей [Concept('country_wth_icon', 'державе')|e]:\n$TAB$@arrow_bonus_tier_1! увеличение числа [Concept('pops_wth_icon', 'групп населения')|e], принадлежащих к [Concept('upper_class', 'высшему обществу')|e], за счёт строительства [Concept('buildings_wth_icon', 'сооружений')|e] на [Link('production', '', '@production_panel! Панели производства > Сооружения')];\n$TAB$@arrow_bonus_tier_1! строительство #TOOLTIP:BUILDING_TYPE,library,X #L библиотек#!#! ] в ваших самых густонаселённых [Concept('locations', 'районах')];\n$TAB$@arrow_bonus_tier_1! изучение [Concept('advances_wth_icon', 'улучшений')|e], которые повышают [Concept('literacy', 'грамотность')] (это можно сделать на [Link('technology_view', '', '@advances_panel! панели улучшений')]);\n$TAB$@arrow_bonus_tier_1! улучшение [Concept('rural_locations', 'сельских районов')|e] до [Concept('urban_locations', 'городских районов')|e].\n\n#italic Проверить ваш текущий уровень [Concept('literacy', 'грамотности')] можно на @advances_panel![Link('advances', '', 'панели улучшений')]#!."
 mission_ensure_book_production_reward_tt: "Наш [Concept('location', 'район')|e] с максимальным уровнем [Concept('development', 'развития')|e], [Concept('market_access', 'доступом к рынку')|e] и производством #TOOLTIP:GOODS,books,X #L книг#!#! на #Y 10#! лет получит ослабевающий [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,center_of_writing_modifier,X #V #L «Литературный центр»#!#!."
 scales_with_number_of_libraries: "Зависит от количества заполненных [Concept('buildings', 'сооружений')|e] типа #TOOLTIP:BUILDING_TYPE,library,X #L «Библиотека»#!#!"
 every_location_with_theater_pops_gain_10_satisfaction_tt: "[Concept('pop_satisfaction', 'Довольство')|e] [Concept('pops', 'групп населения')|e] в [Concept('locations', 'районах')|e], где есть #TOOLTIP:BUILDING_TYPE,theater,X #L театр#!#!, повысится на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
 monthly_events_about_research_and_thought_tt: "Пока длится этот [Concept('mission_task', 'этап задания')|e], каждый месяц могут происходить [Concept('events', 'события')|e], связанные с попытками внедрения новшеств и прогресса"
 #estate_cooperation
 estate_cooperation: "Сотрудничество с сословиями"
 estate_cooperation_DESCRIPTION: "С нашей стороны будет разумно выстроить доверительные отношения с влиятельными сословиями державы."
 estate_cooperation_CRITERIA_DESCRIPTION: "Нам удалось улучшить отношения с одним из сословий."
 estate_cooperation_BUTTON_TOOLTIP: "Заручившись поддержкой влиятельного сословия, мы сможем осуществить свои планы и привести общество к процветанию."
 estate_cooperation_BUTTON_DETAILS: "$estate_cooperation_BUTTON_TOOLTIP$"
 mission_select_estate: "Выберите [Concept('estate', 'сословие')|e]"
 mission_select_no_estate: "@trigger_no! Нет доступных [Concept('estates', 'сословий')|e]."
 used_bribe_5_years_tt: "За прошедшие #Y 5#! лет мы воспользовались [Concept('action', 'действием')|e] #TOOLTIP:GENERIC_ACTION,bribe_estate,X #L «Подкуп сословия»#!#! в отношении сословия «[mission_target_estate.GetName|l]»"
 mission_estate_privileges: "Предоставление привилегий"
 mission_estate_privileges_desc: "Чтобы обеспечить сговорчивость [Concept('estate', 'сословия')|e], нам следует наделить его частью должностей и привилегий."
 mission_estate_privileges_tip: "@arrow_bonus_tier_3! Чтобы увидеть свои [Concept('estates_wth_icon', 'сословия')|e], откройте [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')].\n\n@arrow_bonus_tier_2! Пожалуйте новую [Concept('privilege_wth_icon', 'привилегию')|e] выбранному [Concept('estate', 'сословию')], щёлкнув по #V кнопке с плюсом#!.\n\n@arrow_bonus_tier_1! Выберите [Concept('privilege', 'привилегию')], которая увеличивает [Concept('estate_satisfaction_wth_icon', 'довольство сословия')|e] \n\n#italic Узнать больше об этом можно [Link('hints', 'selected_hint = hint_estates_wth_icon', 'здесь')]."
 monthly_events_about_the_scoped_estate_tt: "Пока длится этот [Concept('mission_task', 'этап задания')|e], каждый месяц могут происходить [Concept('events', 'события')|e], связанные с [Concept('estate', 'сословием')|e]"
 mission_capital_influence: "Влияние в столице"
 mission_capital_influence_desc: "Растущее влияние представителей [Concept('estate', 'сословия')|e] в нашей столице обеспечит ей большее спокойствие и лучшее управление."
 mission_capital_influence_tip: "@arrow_bonus_tier_3! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], @location![Player.GetCapital.GetName], чтобы увидеть, какие в ней есть [Concept('buildings_wth_icon', 'сооружения')|e].\n\n@arrow_bonus_tier_2! Убедитесь, что во всех этих [Concept('buildings', 'сооружениях')] нет незанятых [Concept('employed', 'рабочих мест')|e].\n\n@arrow_bonus_tier_1! Вы можете увеличить [Concept('stability_wth_icon', 'стабильность')|e], чтобы #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V ускорить повышение населения#!#!.\n\n #italic Узнать больше об этом можно [Link('hints', 'selected_hint = hint_lack_pop_promotion_to_fill_buildings_wth_icon', 'здесь')]."
 mission_fund_construction_projects: "Финансирование строительных работ"
 mission_fund_construction_projects_desc: "Чтобы показать нашу готовность сотрудничать с [Concept('estate', 'сословием')|e], мы профинансируем строительство сооружений, тем самым повышая развитие и улучшая объекты этого сословия."
 mission_fund_construction_projects_tip: "@arrow_bonus_tier_3! Перейдите к своей [Concept('capital_wth_icon', 'столице')|e], @location![Player.GetCapital.GetName].\n\n@arrow_bonus_tier_2! Щёлкните по кнопке нужного [Concept('pop_type_wth_icon', 'общественного класса')|e] в левой части панели, чтобы увидеть, какие [Concept('buildings_wth_icon', 'сооружения')|e] можно возвести для этого [Concept('pop_type_wth_icon', 'класса')|e].\n\n@arrow_bonus_tier_1! Начните [Concept('construction_wth_icon', 'строительство')|e] запрошенного [Concept('buildings', 'сооружения')]."
 mission_estate_satisfaction: "[mission_target_estate.GetName] и их благосклонность"
 mission_estate_satisfaction_desc: "В интересах внутренней политики нам следует заручиться поддержкой влиятельного [Concept('estate', 'сословия')|e] на будущее."
 mission_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдите на [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')], чтобы увидеть ваши [Concept('estates_wth_icon', 'сословия')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
 mission_shared_enrichment: "Общее богатство"
 mission_shared_enrichment_desc: "Надлежащее налогообложение, строгая отчётность и приумножение богатства [Concept('estate', 'сословия')|e] послужат образцом для всей системы сборов в нашем государстве."
 mission_shared_enrichment_tip: "@arrow_bonus_tier_3! Чтобы увидеть свои [Concept('estates_wth_icon', 'сословия')|e], откройте [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')].\n\n@arrow_bonus_tier_2! Действие «[ShowGenericActionName('bribe_estate')]» можно совершить, нажав на соответствующую #V кнопку#!.\n\n@arrow_bonus_tier_1! Кроме того, можно снизить [Concept('taxes_wth_icon', 'налоги')|e], открыв [Link('economy', '', '@economy_panel!$lateralview_economy_entry_name$ > Баланс')], и подождать, пока сословие накопит средства.\n\n#italic  Узнать больше об этом можно [Link('hints', 'selected_hint = hint_estates_wth_icon', 'здесь')]."
 mission_shape_society: "Общественные перемены"
 mission_shape_society_desc: "Ветер перемен гуляет по залам дворцов в наших землях. Чтобы укрепить связи между двором и [Concept('estate', 'сословием')|e], нам следует соответствующим образом изменить общество."
 mission_shape_society_tip: "@arrow_bonus_tier_3! Перейдите на [Link('societal_values', '', '@government_panel! Панель правительства > Ценности')], чтобы ознакомиться с вашими [Concept('societal_values_wth_icon', 'общественными ценностями')|e].\n\n@arrow_bonus_tier_2! Перейдите на [Link('government', 'tabcontent = cabinet_wth_icon', 'Панель правительства > Совет')], чтобы увидеть ваш [Concept('cabinet_wth_icon', 'совет')|e].\n\n@arrow_bonus_tier_1! Поручите [Concept('cabinet_member_wth_icon', 'члену совета')|e] [Concept('cabinet_action', 'задание')|e] по #TOOLTIP:CABINET_ACTION,change_societal_values,X #L изменению общественных ценностей#!#!.\n\n#italic Подробнее об этом вы можете прочитать здесь: [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_wth_icon', '$hint_has_possible_cabinet_action$')] и [Link('hints', 'selected_hint = hint_has_possible_cabinet_action_wth_icon', '$hint_lack_cabinet_for_cabinet_action$')]."
 target_mission_pop_gets_20_satisfaction_tt: "[Concept('pops', 'Группы населения')|e] в нашей [Concept('capital', 'столице')|e], принадлежащие к сословию «[mission_target_estate.GetNameWithNoTooltip|l]», получат [ShowNamedValue('pop_satisfaction_severe_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 every_pop_of_estate_10_satisfaction_tt: "[Concept('pops', 'Группы населения')|e] #italic в нашей державе#!, принадлежащие к сословию «[mission_target_estate.GetNameWithNoTooltip|l]», а также к нашей [Concept('culture', 'культуре')|e] и [Concept('religion', 'религии')|e], получат [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 every_pop_of_no_estate_10_satisfaction_tt: "[Concept('pops', 'Группы населения')|e] #italic в нашей державе#!, принадлежащие к выбранному сословию, а также к нашей [Concept('culture', 'культуре')|e] и [Concept('religion', 'религии')|e], получат [ShowNamedValue('pop_satisfaction_weak_bonus')|+=2%] к [Concept('pop_satisfaction', 'довольству')|e]"
 #traditional economy
 generic_traditional_economy: "Традиционная экономика"
 generic_traditional_economy_DESCRIPTION: "Сила нашей державы заключается в отлаженной системе управления экономикой, которая обеспечивает потребности людей на протяжении многих поколений."
 generic_traditional_economy_CRITERIA_DESCRIPTION: "Мы приняли систему более стабильной традиционной экономики."
 generic_traditional_economy_BUTTON_TOOLTIP: "Укрепляя традиционную экономическую систему, мы закладываем основу для процветания общества на многие годы вперёд."
 generic_traditional_economy_BUTTON_DETAILS: "$generic_traditional_economy_BUTTON_TOOLTIP$"
 mission_increase_workforce: "Привлечение рабочих"
 mission_increase_workforce_desc: "Для осуществления наших планов и поддержания роста экономики потребуется немало квалифицированных рабочих. Чем больше рабочей силы у нас будет, тем быстрее мы сможем расширить свои владения."
 mission_connect_location_to_capital: "Дорога к городу [ROOT.GetCountry.GetCapital.GetNameWithNoTooltip]"
 mission_connect_location_to_capital_desc: "Столица должна быть связана с остальными землями державы. Развивая инфраструктуру между ней и другими поселениями, мы сможем укрепить народное единство, усилить влияние местных властей, а также повысить эффективность сбора налогов и добычи ресурсов."
 mission_connect_location_to_capital_tip: "@arrow_bonus_tier_2! Перейдите к месту, где находится ваша [Concept('capital_wth_icon', 'столица')|e], [Player.GetCapital.GetName], и щёлкните по кнопке [road_icon] #V Строительство дороги#!.\n\n@arrow_bonus_tier_1! Затем выберите [Concept('location_wth_icon', 'район')|e], к которому хотите проложить [Concept('road_wth_icon', 'дорогу')|e].\n\n#italic Подробнее об этом можно почитать здесь: [Link('hints', 'selected_hint = hint_control_wth_icon', '$hint_control$')]."
 designated_location_capital_connection_modifier_tt: "Каждый [Concept('location', 'район')|e] в обозначенной [Concept('province', 'провинции')|e] получит [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,capital_connection_modifier,X #V #L Связь со столицей#!#!, который увеличивается в зависимости от [Concept('proximity', 'досягаемости')|e] вашей столицы."
 mission_increase_rgo_level: "Расширение добычи ресурсов"
 mission_increase_rgo_level_desc: "В основе процветания любой державы лежит добыча природных ресурсов. Мы должны развивать сельскую инфраструктуру и увеличивать объёмы добычи, чтобы удовлетворить все потребности нашего растущего населения и экономики."
 mission_increase_rgo_level_tip: "@arrow_bonus_tier_2! Перейдите в [Concept('location_wth_icon', 'район')|e], который выбрали для выполнения задания.\n\n@arrow_bonus_tier_1! Щёлкните по кнопке [rgo_icon] #V $game_concept_rgo$#!, чтобы расширить [Concept('resource_gathering_operations', 'добычу ресурсов')]."
 mission_peasants_estate_satisfaction: "Довольство крестьян"
 mission_peasants_estate_satisfaction_desc: "Наша экономика держится на крестьянах. Удовлетворение потребностей этого сословия обеспечит общественную стабильность, без которой дальнейшее развитие страны невозможно."
 mission_peasants_estate_satisfaction_tip: "@arrow_bonus_tier_3! Перейдите на [Link('government', 'tabcontent = estates_wth_icon', 'Панель правительства > Сословия')], чтобы увидеть ваши [Concept('estates_wth_icon', 'сословия')|e].\n\n@arrow_bonus_tier_2! $increase_estate_satisfaction_tip$"
 mission_market_villages: "Сельские рынки"
 mission_market_villages_desc: "Создание рынков в деревнях откроет новые возможности для торговли и обеспечит развитие сельских районов, а также поспособствует объединению наших земель и процветанию державы."
 mission_market_villages_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @peasants!#TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#!, и выберите #TOOLTIP:BUILDING_TYPE,market_village,X #L торговую деревню#!#!.\n\n@arrow_bonus_tier_1! Постройте её в соответствующем [Concept('location_wth_icon', 'районе')|e], щёлкнув по ней в списке сооружений, либо по карте."
 mission_embrace_trad_economy: "Внедрение традиционной экономики"
 mission_embrace_trad_economy_desc: "Путь к развитию экономики лежит не в бездумных инновациях, а в использовании проверенных методов. Мы будем придерживаться традиционной экономической системы, поддерживая сельские общины и побуждая людей возвращаться в деревни."
 mission_embrace_trad_economy_tip: "$change_societal_value_tip$"
 mission_prosperous_production: "Процветающее производство"
 mission_prosperous_production_desc: "Благополучие сельских районов имеет для нас первостепенное значение, поскольку крестьяне являются основной рабочей силой державы. Выделив средства на поддержку деревень, мы сможем увеличить производство местных продуктов и удовлетворить потребности народа."
 mission_fishing_villages: "Поддержка рыбацких деревень"
 mission_fishing_villages_desc: "Наши реки и моря богаты самой разной рыбой. Поддержав деревенских рыболовов, мы не только обеспечим державу продовольствием, но и поспособствуем развитию сельских районов."
 mission_fishing_villages_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @peasants!#TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#!, и выберите #TOOLTIP:BUILDING_TYPE,fishing_village,X #L рыбацкую деревню#!#!.\n\n@arrow_bonus_tier_1! Постройте её в соответствующем [Concept('location_wth_icon', 'районе')|e], щёлкнув по ней в списке сооружений, либо по карте."
 mission_cloth_makers: "Поддержка сельских ткачей"
 mission_cloth_makers_desc: "Производство тканей является одним из основных видов ремёсел в сельских районах. Если мы поддержим местных ткачей, их продукция поможет нам укрепить влияние как на внутреннем, так и на внешнем рынках."
 mission_cloth_makers_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @laborers!#TOOLTIP:POPTYPE,laborers,X #L рабочие#!#!, и выберите #TOOLTIP:BUILDING_TYPE,rural_clothmaker,X #L здание сельского суконщика#!#!.\n\n@arrow_bonus_tier_1! Постройте его в соответствующем [Concept('location_wth_icon', 'районе')|e], щёлкнув по нему в списке сооружений, либо по карте."
 mission_irrigation: "Расширение оросительных систем"
 mission_irrigation_desc: "Имея плодородную почву и большие запасы воды, мы можем превратить даже самые засушливые территории в цветущие поля. Расширение оросительных систем позволит нам значительно повысить урожайность."
 mission_irrigation_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых работают @peasants!#TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#!, и выберите #TOOLTIP:BUILDING_TYPE,irrigation_systems,X #L ирригацию#!#!.\n\n@arrow_bonus_tier_1! Постройте её в соответствующем [Concept('location_wth_icon', 'районе')|e], щёлкнув по ней в списке сооружений, либо по карте."
 mission_masons: "Создание гильдий каменщиков"
 mission_masons_desc: "Для роста поселений необходимы рабочие, владеющие искусством каменной кладки. Создав гильдии каменщиков по всей державе, мы обеспечим постоянный приток ценных специалистов, которые будут строить величественные города."
 mission_masons_tip: "@arrow_bonus_tier_3! Перейдите на [Link('production', '', '@production_panel! Панель производства > Сооружения')], чтобы увидеть список ваших [Concept('buildings_wth_icon', 'сооружений')|e].\n\n@arrow_bonus_tier_2! Отфильтруйте [Concept('buildings', 'сооружения')], в которых трудятся @laborers!#TOOLTIP:POPTYPE,laborers,X #L рабочие#!#!, и выберите #TOOLTIP:BUILDING_TYPE,mason,X #L гильдию каменщиков#!#!.\n\n@arrow_bonus_tier_1! Постройте её в соответствующем [Concept('location_wth_icon', 'районе')|e], щёлкнув по нему в списке сооружений, либо по карте."
 selected_rural_proximity_and_less_90_percent_pop_tt: "Выбранный [Concept('rural_location', 'сельский район')|e] будет в [Concept('proximity', 'досягаемости')|e] нашей [Concept('capital', 'столицы')|e], а его [Concept('population_capacity', 'предел населения')|e] будет менее #Y 90%#!."
 mission_task_select_rural_settlement: "Выберите [Concept('rural_location', 'сельский район')|e] для следующих [Concept('mission_tasks', 'этапов задания')|e]"
 mission_task_no_rural_settlement: "@trigger_no! Нет доступных [Concept('rural_location', 'сельских районов')|e]."
 every_location_in_province_connected_tt: "Каждый [Concept('location', 'район')|e] в провинции [mission_target_location.GetProvince.GetName] с #G положительным#! значением [Concept('proximity', 'досягаемости')|e] к нашей [Concept('capital', 'столице')|e] на #Y 10#! лет получит [Concept('modifier', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,capital_connection_modifier,X #V #L Связь со столицей#!#!."
 mission_target_location_not_coastal: "[mission_target_location.GetName] — не [Concept('coastal', 'прибрежный район')|e]"
