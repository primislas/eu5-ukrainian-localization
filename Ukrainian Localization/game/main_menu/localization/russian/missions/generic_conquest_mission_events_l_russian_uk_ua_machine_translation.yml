l_russian:
  conquest_mission_events.1.title: "Внесок на військові потреби"
  conquest_mission_events.1.desc: "Напруженість у світі зростає, а разом з нею зростає і потреба в рясних запасах коштів на війну. Деякі впливові [target_estate.GetName|l] виступили з пропозицією: вони повною мірою усвідомлюють, наскільки країні важлива армія, а тому готові зробити щедре пожертвування в казну, якщо [target_character.GetName] виявиться [Select_CString(target_character.IsFemale, 'змушена', 'змушений' )] воювати.\n\nОднак рухає ними зовсім не широта душі: [target_estate.GetNameWithNoTooltip|l] сподіваються подібним чином наростити свій вплив на [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
  conquest_mission_events.1.a: "Ці кошти безперечно стануть нам у пригоді для ведення війни."
  conquest_mission_events.1.b: "Ввічливо відмовитися від пропозиції."
  reject_the_advances_of_the_estate_tt: "#italic Ми відкинемо пропозицію, з якою виступили [target_estate.GetNameWithNoTooltip|l]#!"
  conquest_mission_events.2.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')] протестують проти витрат на війну"
  conquest_mission_events.2.desc: "Нижче суспільство з занепокоєнням дивиться на те, як [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] старанно накопичує кошти для [ROOT.GetCountry.GetGovernment.GetAdjective|l]ої казни, виділеної спеціально під майбутні війни. [ROOT.GetCountry.GetGovernment.GetEstateName('peasants_estate')|U], що страждають від збільшених податків і вимушених внесків, відкрито висловлюють своє невдоволення.\n\nВони заявляють, що не хочуть нести тягар війни на власних плечах, особливо в країні, де багатії продовжують жирувати. Якщо заплющити очі на ці протести, вони переростуть у бунти, і тоді [ROOT.GetCountry.GetFlavorRank|l] опиниться на межі смути."
  conquest_mission_events.2.a: "Ми покладемо на них усі витрати."
  conquest_mission_events.2.b: "Ми надамо їм деякі послаблення."
  conquest_mission_events.2.c: "Надати їм привілеї."
  conquest_mission_events.3.title: "Військові позики"
  conquest_mission_events.3.desc: "Підготовка до великого військового походу набирає розмаху, і стани вже винайшли новий спосіб збагачення за рахунок потреби [ROOT.GetCountry.GetGovernment.GetAdjective|l]ого уряду в набитій доверху казні. Сьогодні [ROOT.GetCountry.GetGovernment.GetCourtTitle|l] вислуховує провідних фінансистів [ROOT.GetCountry.Custom('rank_ru_GEN')|l], які звернулися до нас із привабливою пропозицією: вони готові підтримати ведення бойових дій, надавши нам позику під привабливі відсотки.\n\nАле якщо ми погодимося, їхній вплив помітно зросте, і тоді рівновага сил між станами може зміститися."
  conquest_mission_events.3.b: "Прийняти їхню пропозицію."
  conquest_mission_events.3.c: "Нам це не по кишені."
  conquest_mission_events.3.a: "Вимагати вигідніші умови."
  special_loan_with_lower_interest_tt: "Цей [Concept('loan', 'позика')|e] пропонується за зниженою [Concept('interest', 'відсотковою')|e] ставкою"
  turn_away_the_loan_tt: "#italic Відмовитися від пропозиції наших [Concept('estates', 'станів')|e]#!"
  extra_special_loan_with_lower_interest_tt: "[target_character.GetName] — [Select_CString(target_character.IsFemale, 'вміла переговорниця', 'вмілий переговорник' )], тому [Concept('loan', 'позика')|e] буде #G більшою#!, а [Concept('interest', 'відсоток')|e] — #G ще нижчим#!"
  conquest_mission_events.4.title: "[target_loot_location.GetNameWithNoTooltip] страждає від грабіжників"
  conquest_mission_events.4.desc: "Війна пожирає все на своєму шляху, залишаючи лише попіл. Колись процвітаюча провінція [target_loot_province.GetName] прийняла на себе всю тяжкість цієї війни: мародерствуючі солдати та зневірені дезертири розоряють поселення, грабують господарства та руйнують все на своєму шляху.\n\n[ROOT.GetCountry.GetGovernment.GetCourtTitle|U] сьогодні добре уявляє собі похмуру картину того, що відбувається: донесення про спалені села, голодуючих селян та зупинену торгівлю приходять щодня. Якщо терміново щось не зробити, збитки від мародерства на довгі роки вженуть провінцію в бідність."
  conquest_mission_events.4.a: "На війні всі засоби хороші."
  conquest_mission_events.4.b: "Солдатам лише потрібні припаси!"
  conquest_mission_events.4.c: "[target_loot_province.GetNameWithNoTooltip] — не те місце, де можна так поводитися!"
  conquest_mission_events.5.title: "Тяготи війни"
  conquest_mission_events.5.desc: "Затяжна війна неминуче накладає свій відбиток на кожного, і невдоволення народу її тяготами зростає немов на дріжджах. У селах не залишилося чоловіків, здатних тримати зброю, податки злетіли до небес, а припасів з кожним днем стає тільки менше.\n\nПростий народ втомився від нескінченного кровопролиття та безглуздих жертв, яких вимагає [target_character.GetName]. І у великих містах, і в тихих сільських хатах — одне й те саме видовище: люди занепали духом і починають нарікати. Якщо нічого не зробити, наростаюча втома від війни може обвалити [ROOT.GetCountry.Custom('rank_ru_ACC')|l]."
  conquest_mission_events.5.a: "Їхні скарги ні на що не вплинуть."
  conquest_mission_events.5.b: "Потрібно посилити військову пропаганду!"
  conquest_mission_events.6.title: "Військові інновації"
  conquest_mission_events.6.desc: "Війна триває, і нам доводиться пристосовуватися до її умов. І вороги, і союзники нашої країни в цьому затяжному зіткненні мають у своєму розпорядженні різні цікаві винаходи — від облогових машин до бойових тактик, і наші солдати та інженери зараз ретельно переймають і вивчають побачене та захоплене.\n\nТакий обмін знаннями не тільки зробив нашу армію сильнішою, а й підстебнув технічний прогрес [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  conquest_mission_events.6.a: "Потрібно як слід вивчити досвід цієї війни."
  conquest_mission_events.6.b: "Зосередимося на розвитку цивільних технологій."
  research_gained_scales_with_monthly_towards_innovative_tt: "[Concept('research_progress', 'Дослідницькі напрацювання')|e] зростають залежно від зміни нашого показника «[ShowModifierTypeName('monthly_towards_innovative')]»"
  conquest_mission_events.7.title: "Інтеграція провінції [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.7.desc: "Включення провінції [target_province.GetName] до складу країни йде впевнено. Населення [target_location.Custom('LR_GEN')|l] [target_location.GetName] починає поступово переймати наші закони та звичаї.\n\nОдин за одним відкриваються ринки, на вулицях все частіше звучить наша мова, а опір мовчки змирився зі своєю долею. І хоча місцеві жителі ще тримаються за деякі свої традиції, регіон все-таки поступово стає частиною [ROOT.GetCountry.Custom('rank_ru_GEN')|l]."
  conquest_mission_events.7.a: "Прискорити процес інтеграції."
  conquest_mission_events.7.b: "Люди мають право на збереження своїх звичаїв."
  locals_in_target_province_gain_mild_satisfaction_tt: "[Concept('pop_satisfaction', 'Задоволення')|e] наших [Concept('pops', 'груп населення')|e] у провінції [target_province.GetName] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  locations_in_target_province_receive_very_weak_bonus_integration_tt: "[Concept('locations', 'Місцевості')|e] у згаданій [Concept('province', 'провінції')|e], що проходить [Concept('integrating', 'інтеграцію')|e], отримають [ShowNamedValue('integration_progress_very_weak_bonus')|+=] до прогресу [Concept('integration', 'інтеграції')|e]"
  conquest_mission_events.8.title: "Опір інтеграції в провінції [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.8.desc: "Населення провінції [target_province.GetName] продовжує чинити опір. Чиновники з [target_location.Custom('LR_GEN')|l] [target_location.GetName] повідомили, що народ все рідше підкоряється нашій владі та її політиці.\n\nМісцева влада зводить нанівець усі спроби проводити реформи, а прапори нашої країни не викликають у населення нічого, крім презирства. Люди відчайдушно чіпляються за колишній уклад, і всі спроби переломити цей порядок натикаються або на мовчання, або на відкриту зневагу."
  conquest_mission_events.8.a: "Їхні спроби опору марні!"
  conquest_mission_events.8.b: "[ROOT.GetCountry.Custom('common_string_nothing_we_can_do')]"
  conquest_mission_events.8.c: "Пара ударів батогом виб'є з них цю впертість."
  locals_in_target_province_lose_mild_satisfaction_tt: "Наші [Concept('pops', 'групи населення')|e] у провінції [target_province.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  mission_ruler_or_regent_is_conqueror_tt: "[target_character.GetName] без труднощів придушить слабкий опір у провінції [target_province.GetName]"
  conquest_mission_events.9.title: "Поширення культури в провінції [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.9.desc: "Серед жителів провінції [target_province.GetName] починає поступово приживатися #L [target_culture.GetName|l]а#! культура — зокрема, перші ознаки змін проявилися в [target_location.Custom('LR_PREP')|l] [target_location.GetName].\n\nДіти починають вивчати нашу мову, дорослі — одягатися в столичний одяг і переймати столичні звичаї, а думка, що тепер усі вони — жителі [ROOT.GetCountry.Custom('rank_ru_GEN')|l] під нашою владою, вже не викликає колишнього відторгнення. Зміни малопомітні, але вони все-таки є."
  conquest_mission_events.9.a: "#L [target_culture.GetNameWithNoTooltip]а#! культура тепер у моді?"
  conquest_mission_events.9.b: "Потрібно активніше прищеплювати їм нашу культуру!"
  conquest_mission_events.9.c: "Потрібно наслідувати приклад, який подає нам [target_character.GetShortNameWithNoTooltip]!"
  conquest_mission_events.9.d: "Справжня сила — у культурному різноманітті!"
  conquest_mission_events.10.title: "Поширення релігії в провінції [target_province.GetNameWithNoTooltip]"
  conquest_mission_events.10.desc: "Жителі провінції [target_province.GetName] починають поступово навертатися до нашої #L [target_religion.GetAdjective|l]ої#! віри.\n\nУ [target_location.Custom('LR_PREP')|l] [target_location.GetName] вже з'являються перші, поки ще невеликі громади, що згуртувалися навколо наших проповідників, а в храмах побільшало парафіян. Віра ефективно об'єднує людей."
  conquest_mission_events.10.a: "Нарешті вони стали на вірний шлях!"
  conquest_mission_events.11.title: "[ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|U] з провінції [target_province.GetNameWithNoTooltip] вимагають співпраці"
  conquest_mission_events.11.desc: "До нас звернулася [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l] з провінції [target_province.GetName]. Вони готові присягнути нам на вірність, а натомість хочуть отримати місце в новій для них системі.\n\nУ [target_location.Custom('LR_PREP')|l] [target_location.GetName] ці родини користуються впливом, багатством і владою, і все це вони готові запропонувати нам… якщо ми наділимо їх землею та привілеями. Підтримка з боку цього стану може полегшити входження провінції до складу нашої країни, але тоді постраждає простолюд — і наша влада."
  conquest_mission_events.11.a: "Нам доведеться піти на поступки, але воно того варте."
  conquest_mission_events.11.b: "Вони не визначатимуть нашу політику."
  conquest_mission_events.11.c: "Натомість нашу підтримку отримають місцеві [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('peasants_estate')|l]."
  conquest_mission_events.11.d: "Влада, якою володіє [target_character.GetShortNameWithNoTooltip], незаперечна."
  ruler_or_regent_too_strong_tt: "[target_character.GetName] — надто [Select_CString(target_character.IsFemale, 'могутня правителька', 'могутній правитель')] щоб [Select_CString(target_character.IsFemale, 'їй', 'йому')] кидали виклик дрібні [ROOT.GetCountry.GetGovernment.GetEstateNameWithNoTooltip('nobles_estate')|l]!"