  szczerbiec: "Щербець"
  gaude_mater_polonia: "Gaude Mater Polonia"
  gaude_mater_polonia_desc: "#italic Gaude Mater Polonia#!, або «Радуйся, Матінко Польща» — гімн, написаний у 1253 році Вікентієм із Кельчі. Він присвячений святому Станіславу Щепановському, який прийняв мученицьку смерть від рук короля Болеслава II. Пісня стала одним із неофіційних гімнів середньовічної Польщі, а пізніше і Речі Посполитої."
  pol_annals_of_poland: "Польські аннали"
  new_chemical_light: "«Новий світ хімії»"
  pol_brief_discussion: "«Коротка бесіда між трьома особами: паном, війтом і плебаном»"
  pol_royal_column: "Колона Сигізмунда"
  pol_threnodies: "«Трени»"
  revolution_spheres: "«Про обертання небесних сфер»"
  pol_altarpiece: "Вівтар Костелу Вознесіння Діви Марії"
  three_histories_china: "Три літописи династії Юань"
  three_histories_china_desc: "У цих працях описано історію династій Ляо, Цзінь і Сун, які були попередниками династії Юань. Літописи були складені в найкоротші терміни, тому в них безліч фактичних помилок, які належить виправляти майбутнім поколінням."
  peony_pavilion: "«Півонієва альтанка»"
  peony_pavilion_desc: "$peony_pavilion$ — п'єса в жанрі трагікомедії, що оповідає про закоханих Ду Лінян і Лю Менмей. У творі 55 сцен, повна тривалість яких при грі в театрі перевищує 22 години. Воно вважається одним із найвидатніших творінь #L [ShowCultureGroupName('chinese_group')|l]ої#! драматургії."
  beijing_mosque: "Мечеть Нюцзе"
  beijing_mosque_desc: "Мечеть Нюцзе була побудована в [ShowLocationName('dadu')] за часів правління династії Ляо і зруйнована монголами в 1215 році. Після реконструкції вона стала основним духовним центром Китаю."
  porcelain_tower: "Порцелянова пагода"
  porcelain_tower_desc: "Порцелянова пагода — буддійський храм, що входить до числа найвищих споруд Китаю. Пагода побудована з білої цегли з безліччю складних деталей і візерунків. Багато хто вважає її народним надбанням і однією з головних пам'яток архітектури в країні."
  yuanshi: "«Юань-ши»"
  yuanshi_desc: "«Юань-ши» — одне з офіційних оповідань про #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайські#!#! династії. Вона складається з 210 глав і описує події від початку правління Чингісхана і до занепаду #ONCLICK:COUNTRY,[GetCountry('YUA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('YUA').Custom('CL_tt')],X [GetCountry('YUA').Custom('CL_RP')|L]#!#!."
  huolongjing: "«Холунцзін»"
  huolongjing_desc: "«Холунцзін», або #italic «Посібник вогняного дракона»#! — #TOOLTIP:WORK_OF_ART_TYPE,treatise,X #L трактат#!#!, присвячений застосуванню #TOOLTIP:ADVANCE_DEFINITION,gunpowder_advance,X #L пороху#!#! у військовій справі. У ньому описується бойове застосування вогнепальної зброї під час #TOOLTIP:SITUATION,red_turban_rebellions,X #L повстання «Червоних пов'язок»#!#!. Трактат підкреслює давні військові традиції #TOOLTIP:CULTUREGROUP,chinese_group,X #L китайських#!#! династій."
  yuanmingyuan: "Юаньмін'юань"
  yuanmingyuan_desc: "Юаньмін'юань, або «Старий Літній палац» — розкішний садово-палацовий комплекс, що відображає всю пишність #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,middle_kingdom,X #L Серединної держави#!#!."
  TEU_swords_of_grunwald: "Грюнвальдські мечі"
  chronica_provinz_lyfflandt: "«Лівонська хроніка»"
  chronica_provinz_lyfflandt_desc: "«Лівонська хроніка» описує історію #TOOLTIP:AREA,baltic_area,X #L балтійського регіону#!#! з середини XII до середини XVI століття. В основу «Хроніки» покладено аннали #ONCLICK:COUNTRY,[GetCountry('LIV').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('LIV').Custom('CL_tt')],X [GetCountry('LIV').Custom('CL_GEN')|L]#!#!."
  chronik_des_land_preussens: "«Аннали землі Прусської»"
  chronik_des_land_preussens_desc: "В «Анналах землі Прусської» описуються події, що трапилися в #ONCLICK:COUNTRY,[GetCountry('TEU').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TEU').Custom('CL_tt')],X [GetCountry('TEU').Custom('CL_PREP')|L]#!#! та в усій #TOOLTIP:AREA,prussia_area,X #L прусській землі#!#! у другій половині XIV століття."
