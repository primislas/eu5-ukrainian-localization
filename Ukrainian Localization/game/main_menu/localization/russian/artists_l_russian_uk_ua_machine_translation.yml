  the_robbers: "«Розбійники»"
  the_robbers_desc: "#italic Die Räuber#! — мелодраматична п'єса про життя двох братів: Карла та Макса фон Моорів, які волею обставин стали суперниками один одного. У цій п'єсі порушуються основні питання, що стоять перед рухом #italic Sturm und Drang#! («Буря і натиск»)."
  wallenstein_woa: "Валленштейн"
  wallenstein_woa_desc: "Вільний переказ біографії Альбрехта фон Валленштейна, присвячений поступовому впаданню його в немилість перед обличчям імператора. П'єса розділена на три частини — «Табір Валленштейна», «Пікколоміні» та «Смерть Валленштейна», і повістує про життєві труднощі імперського полководця, пов'язані зокрема з боротьбою за владу в лавах католицької армії."
  nathan_the_wise: "«Натан Мудрий»"
  foundations_of_natural_right: "«Основи природного права»"
  imperial_surgery: "«Імперська хірургія»"
  imperial_surgery_desc: "«Імперська хірургія» була заснована на енциклопедії «Китаб аль-Тасриф» за авторством Абуль-Касима, але в підручнику також описані й принципово нові методи лікування. Книга рясніє ілюстраціями, включно із зображеннями жінок-хірургів, які раніше не згадувалися в подібних текстах. Одна з операцій, описаних у цьому трактаті, — лігування скроневої артерії для боротьби з мігренню."
  muraqqa: "«Муракка»"
  muraqqa_desc: "Збірка ісламських мініатюр та каліграфії, присвячених найрізноманітнішим темам і написаних, як правило, різними художниками. Порівняно з більш ранніми зразками ілюстрацій до епосів відрізняються більшою стислістю сцен та простотою."
  sharh_al_tadhkirah: "«Коментар до мемуарів ат-Тусі»"
  sharh_al_tadhkirah_desc: "«Коментар до мемуарів ат-Тусі» — праця відомого математика Аль-Бірджанді, присвячена питанням астрономії."
  tashrih_al_aflak: "«Анатомія небесних сфер»"
  tashrih_al_aflak_desc: "«Ташрі аль-Афлак», також відомий як «Анатомія небесних сфер», — це збірка теорій з астрономії. Серед іншого, автор тексту підтримує ідею про обертання землі, про що в ті часи ще не було достеменно відомо. Однак, на відміну від своїх колег, він розробив цю теорію незалежно від західних вчених."
