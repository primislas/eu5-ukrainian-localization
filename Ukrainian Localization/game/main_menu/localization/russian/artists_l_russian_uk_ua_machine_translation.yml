  esmeraldo_do_situ_orbis: "«Esmeraldo de Situ Orbis»"
  esmeraldo_do_situ_orbis_desc: "#italic $esmeraldo_do_situ_orbis$#! — трактат з космографії, в якому наведені дослідження португальських вчених та мандрівників. Король визнав відомості про португальську торгівлю та методи навігації настільки цінними, що цей твір ретельно приховувався протягом кількох століть."
  por_geral_de_espanha: "«Загальна хроніка Іспанії»"
  por_geral_de_espanha_desc: "#italic $por_geral_de_espanha$#! — докладна літопис подій Реконкісти, що описує, в тому числі, роль #ONCLICK:COUNTRY,[GetCountry('POR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('POR').Custom('CL_tt')],X [GetCountry('POR').Custom('CL_RP')|L]#!#! у визволенні #TOOLTIP:REGION,iberia_region,X #L Піренейського півострова#!#! від арабів."
  livro_das_cantigas: "«Книга пісень про Богородицю»"
  livro_das_cantigas_desc: "#italic $livro_das_cantigas$#! — велика музична збірка, що містить різні #italic кантіги#!, написані в золотий вік португальської музики."
