  de_asse_et_partibus_eius: "«Про асс і його складові частини»"
  de_asse_et_partibus_eius_desc: "Трактат $de_asse_et_partibus_eius$ (автор — [GetCharacter('guillaume_bude').GetName]) присвячений вивченню нумізматики стародавнього світу."
  heptameron: "«Гептамерон»"
  heptameron_desc: "Посмертне зібрання новел (автор — [GetCharacter('pierre_boaistuau').GetName]), присвячених переважно коханню, хтивості та іншій романтиці."
  ballet_de_la_merlaison: "«Мерлезонський балет»"
  ballet_de_la_merlaison_desc: "Яскрава вистава, в якій поєднуються танці, поезія та музика. $ballet_de_la_merlaison$ цілком присвячений полюванню на дроздів."
  voyage_accounts_of_francois_de_vitre: "«Мемуари»"
  voyage_accounts_of_francois_de_vitre_desc: "Розповідь про мандри Франсуа Мартена де Вітре та його плавання на борту корабля #italic  «Круассан»#!. Франсуа був одним з перших французів, що ступили на берег Індії."
  cartes_de_cassini: "Карта Кассіні"
  cartes_de_cassini_desc: "Ця карта, складена членами родини Кассіні, стала першою топографічною картою Французького королівства, на створення якої пішло більше шістдесяти років."
  the_brus: "«Брюс»"
  the_brus_desc: "Епічна поема, що описує, як [GetCharacter('sco_robert_the_bruce').GetName] боровся проти #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_RP')|L]#!#! за #L #L [GetCountry('SCO').GetAdjective|l]#!у#! незалежність."
  sco_true_law: "«Істинний закон вільної монархії»"
  sco_true_law_desc: "«Істинний закон вільної монархії» закладає ідею божественного права на правління, стверджуючи, що глава держави призначений Богом, а отже, повинен мати абсолютну владу."
  sco_basilikon: "«Королівський дар»"
  sco_basilikon_desc: "У трактаті «Королівський дар» зібрані принципи, яким повинен слідувати правитель держави. Вони охоплюють усе, починаючи від управління підданими і закінчуючи організацією роботи ради."
  sco_divine_art_of_poesie: "«Досліди підмайстра в божественному мистецтві поезії»"
  sco_divine_art_of_poesie_desc: "$sco_divine_art_of_poesie$ — свого роду керівництво для поетів, що творять #L [ShowDialectName('scottish_gaelic_dialect')|l]ою#! мовою. Хоча сама праця була написана середньошотландською, вона привернула увагу багатьох письменників з найрізноманітніших культур."
  treatise_of_human_nature: "«Трактат про людську природу»"
  treatise_of_human_nature_desc: "У цьому #TOOLTIP:WORK_OF_ART_TYPE,treatise,X #L трактаті#!#! [GetCharacter('david_hume').GetName] докладно викладає свої висновки про почуття та інші аспекти людської природи. Попри те, що це одна з перших робіт Юма, вона мала величезний вплив на цілу низку напрямів філософії."
