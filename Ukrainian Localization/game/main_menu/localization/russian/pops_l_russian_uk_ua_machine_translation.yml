l_russian:
  nobles: "Знать"
  clergy: "Духовенство"
  burghers: "Містяни"
  laborers: "Робітники"
  soldiers: "Солдати"
  peasants: "Простолюд"
  slaves: "Раби"
  tribesmen: "Соплемінники"
  nobles_desc: "Володарі багатства та влади, чиє походження не викликає сумнівів. Ці [Concept('pops', 'групи населення')|e] слугують основним джерелом [Concept('characters', 'персонажів')|e] для управління [Concept('country', 'країною')|e]."
  clergy_desc: "Духовні лідери нашої [Concept('country', 'країни')|e]. Ці [Concept('pops', 'групи населення')|e] зберігають наші релігійні традиції та навчають народ таїнствам віри."
  burghers_desc: "Представники торгового стану [Concept('country', 'країни')|e], в чиїх руках економіка та фінанси. Зазвичай, живуть у [Concept('towns_and_cities', 'містах')|e], де заробляють за допомогою виробничих [Concept('buildings', 'споруд')|e]."
  peasants_desc: "Простий народ, яким ми керуємо. Більшість із них живуть натуральним господарством або проживають у селах."
  slaves_desc: "Люди, які позбавлені права власності. Видобувають [Concept('raw_materials', 'ресурси')|e] або працюють на [Concept('plantations', 'плантаціях')|e] своїх господарів. До них ставляться як до товару за походженням або в результаті покупки на [Concept('markets', 'ринку')|e]."
  tribesmen_desc: "Представники громад, які населяють [Concept('rural_locations', 'сільські місцевості')|e] та живуть натуральним господарством як фермери, пастухи або мисливці-збирачі. Ми ледь можемо ними керувати, оскільки вони зберігають власну суспільну структуру та організацію."
  laborers_desc: "Люди, які живуть у [Concept('towns_and_cities', 'містах')|e] та [Concept('rural_locations', 'сільських місцевостях')|e] і займаються фізичною працею. Вони працюють на землі, видобувають основні для країни [Concept('raw_materials', 'ресурси')|e] або працюють як чорнороби."
  soldiers_desc: "Простолюд, з числа якого набираються [Concept('manpower', 'рекрути')|e] для наших [Concept('armies', 'армій')|e] та [Concept('garrisons', 'гарнізонів')|e], а також [Concept('sailors', 'моряки')|e] для наших [Concept('navies', 'флотів')|e]."
  nobles_literacy_impact: "Середня [Concept('literacy', 'грамотність')|e], якою володіє #TOOLTIP:POPTYPE,nobles,X #L знать#!#!"
  clergy_literacy_impact: "Середня [Concept('literacy', 'грамотність')|e], якою володіє #TOOLTIP:POPTYPE,clergy,X #L духовенство#!#!"
