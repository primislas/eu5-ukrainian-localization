l_russian:
 revoke_town_rights: "Отзыв городских прав"
 revoke_town_rights_desc: ""
 REVOKE_TOWN_RIGHTS_FROM: "Отзыв [Concept('town_rights', 'городских прав')|e] у района [TownRightsItem.GetFirstLocationName]"
 #######################################
 #   Non-production Rights    ##########
 #######################################
 staple_port: "Штапельный порт"
 staple_port_desc: "Этому [Concept('location', 'району')|e] дарованы привилегии, которые расширяют права #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L горожан#!#! в сфере местной [Concept('trade', 'торговли')|e]."
 granary_town: "Зерновой центр"
 granary_town_desc: "Этому [Concept('location', 'району')|e] дарованы привилегии и правила, которые позволяют увеличить там производство и хранение [Concept('food', 'пищи')|e]."
 #######################################
 #   Production Rights    ##############
 #######################################
 royal_tooling_rights: "Права на производство инструментов"
 royal_tooling_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,tools,X #L инструментов#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_jewelry_rights: "Права на ювелирное производство"
 royal_jewelry_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,jewelry,X #L ювелирных изделий#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_weaponry_rights: "Права на производство оружия"
 royal_weaponry_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,weaponry,X #L холодного#!#! и #TOOLTIP:GOODS,firearms,X #L огнестрельного оружия#!#!, а также #TOOLTIP:GOODS,cannons,X #L пушек#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_book_rights: "Права на книгопечатание"
 royal_book_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,paper,X #L бумаги#!#!, #TOOLTIP:GOODS,books,X #L книг#!#! и #TOOLTIP:GOODS,dyes,X #L красителей#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_artisan_rights: "Ремесленные права"
 royal_artisan_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,leather,X #L кожи#!#!, #TOOLTIP:GOODS,pottery,X #L керамики#!#! и #TOOLTIP:GOODS,furniture,X #L мебели#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_brewing_rights: "Права на производство спиртных напитков"
 royal_brewing_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,liquor,X #L крепких спиртных напитков#!#!, #TOOLTIP:GOODS,beer,X #L пива#!#! и #TOOLTIP:GOODS,wine,X #L вина#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_textile_rights: "Права на текстильное производство"
 royal_textile_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,cloth,X #L текстиля#!#! и #TOOLTIP:GOODS,fine_cloth,X #L тонкого сукна#!#!, благодаря чему он получает существенное конкурентное преимущество."
 royal_naval_rights: "Права на производство судостроительных материалов"
 royal_naval_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и продажу #TOOLTIP:GOODS,naval_supplies,X #L судостроительных материалов#!#! и #TOOLTIP:GOODS,tar,X #L дёгтя#!#!, благодаря чему он получает существенное конкурентное преимущество."
 not_forcefully_revoked_last_10_years_tt: "За последние 10 лет городские права ни разу не были насильственно отменены."
 royal_masonry_rights: "Права на каменные и стекольные работы"
 royal_masonry_rights_desc: "Этому [Concept('location', 'району')|e] дарованы права на возведение #TOOLTIP:GOODS,masonry,X #L каменной кладки#!#!, а также на производство и продажу #TOOLTIP:GOODS,glass,X #L стекла#!#!, благодаря чему он получает существенное конкурентное преимущество."
 #######################################
 #   Historic Rights    ################
 #######################################
 magdeburg_rights_town_rights: "$magdeburg_rights$"
 magdeburg_rights_town_rights_desc: "$magdeburg_rights_desc$"
 unlock_mageburg_town_rights_tt: "Открывает [Concept('town_rights', 'городские права')|e]: [ShowTownRightsName('magdeburg_rights_town_rights')|l] и [ShowTownRightsName('nuremberg_rights_town_rights')|l]"
 lubeck_town_rights: "Любекское право"
 lubeck_town_rights_desc: "Внедрив для наших городских поселений те же законы и привилегии, что и в #TOOLTIP:LOCATION,lubeck,X #L Любеке#!#!, мы дадим своим купцам больше свободы. Это благотворно скажется на их торговле, но члены гильдии в самом городе точно не обрадуются таким преференциям и будут препятствовать нам всеми силами."
 town_rights_marketplace: "Городские права рынка"
 nuremberg_rights_town_rights: "Нюрнбергское право"
 nuremberg_rights_town_rights_desc: "$magdeburg_rights_town_rights_desc$"
 upper_bergregal: "Высшая горная регалия"
 upper_bergregal_desc: "Если передать городским властям право вести горнодобывающую деятельность, то это увеличит объём средств на разведку новых полезных ископаемых и повысит привлекательность города для новых поселенцев. К сожалению, это также приведёт к ужесточению ограничений для местных жителей и сократит их возможности самим получать выгоду с рудников."
 unlock_bergregal_rights_tt: "Открывает [Concept('town_rights', 'городские права')|e]: [ShowTownRightsName ('upper_bergregal')|l] и [ShowTownRightsName('lower_bergregal')|l]"
 lower_bergregal: "Низшая горная регалия"
 lower_bergregal_desc: "$upper_bergregal_desc$"
 stapelrecht_town_rights: "Складочное права вольного имперского города"
 stapelrecht_town_rights_desc: "Благодаря статусу #TOOLTIP:SPECIAL_STATUS,free_city,X #L вольного имперского города#!#!, полученному от #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#!, мы теперь можем беспрепятственно вводить определённые привилегии в наших городах, что идёт на пользу местным купцам и заставляет больше иностранных купцов вести торговлю через наши земли."
 kulm_town_rights: "Кульмское право"
 kulm_town_rights_desc: "$kulm_law_desc$"
 unlock_kulm_town_rights_tt: "Открывает [Concept('town_rights', 'городские права')|e]: [ShowTownRightsName('kulm_town_rights')|l]"
 novi_fori_town_rights: "Сродское право"
 novi_fori_town_rights_desc: "$novi_fori_desc$"
 unlock_novi_fori_rights_tt: "Открывает [Concept('town_rights', 'городские права')|e]: [ShowTownRightsName('novi_fori_town_rights')|l]"
 royal_free_cities_town_rights: "Право на статус королевского вольного города"
 royal_free_cities_town_rights_desc: "Объявив наши городские центры королевскими и вольными городами, мы сможем предотвратить укрепление власти наших #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократов#!#! на их землях."
 bohemian_royal_cities_town_rights: "Право на статус королевского города"
 bohemian_royal_cities_town_rights_desc: "Предоставив городам привилегию объявлять себя прямой собственностью нашего правителя, мы ослабим #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократов#!#! и поможем государству получать от городов больше прибыли."
 swedish_city_rights: "Право на городские привилегии"
 swedish_city_rights_desc: "Купцы в этом регионе получат широкие привилегии для ведения торговли без иностранной конкуренции."
 norwegian_city_rights: "Право города-рынка"
 norwegian_city_rights_desc: "Предоставив привилегии и льготы местным торговцам, мы укрепим свои торговые пути, но при этом создадим неблагоприятные условия для иностранных купцов."
 borough_customals: "Местное право"
 borough_customals_desc: "Территории, наделённые такими правами, смогут самостоятельно управлять своим развитием и будут служить убежищами от аристократического гнёта."
 manorial_customals: "Манориальное право"
 manorial_customals_desc: "Если предоставить помещикам больше исполнительной власти над районом, это увеличит эксплуатацию земли и сдержит непокорных крестьян."
 foros_extensos_town_rights: "Форос Экстенсос"
 foros_extensos_town_rights_desc: "С момента своего основания $POR$ была пограничной территорией, родиной таких прославленных людей, как Жералду Бесстрашный. Её правители поощряют храбрость и непоколебимость, предоставляя городам широкие привилегии, известные как «Форос Экстенсос»."
 fuero_juzgo_town_rights: "Фуэро Хузго"
 fuero_juzgo_town_rights_desc: "Городские права «Фуэро Хузго» основаны на древнем вестготском кодексе #italic Liber Iudiciorum#!. Они регулируют многие аспекты повседневной жизни и хорошо подходят для недавно колонизированных земель."
 fuero_real_town_rights: "Фуэро Реаль"
 fuero_real_town_rights_desc: "Свод законов «Фуэро Реаль» был разработан королём Альфонсо X, чтобы распространить королевскую власть на все муниципалитеты Кастилии."
 fuero_general_town_rights: "Фуэро Хенераль"
 fuero_general_town_rights_desc: "Городские права Наварры «Фуэро Хенераль» — свод обычаев и законов, которые регулируют деятельность различных владений на этой территории с согласия её правителя."
 fuero_de_aragon_town_rights: "Фуэрос де Арагон"
 fuero_de_aragon_town_rights_desc: "«Фуэрос де Арагон» — это сборник различных муниципальных прав, распространившихся по всему Арагону с расширением его территории. Эти права неукоснительно соблюдают как аристократы, так и простолюдины."
 usatges_de_barcelona_town_rights: "Барселонские обычаи"
 usatges_de_barcelona_town_rights_desc: "«Барселонские обычаи» — это традиции, которые соблюдаются на каталонской территории. Изначально они были установлены графами Барселоны."
 furs_de_valencia_town_rights: "Валенсийские фуэрос"
 furs_de_valencia_town_rights_desc: "Валенсийские фуэрос даровал одноимённому королевству король Хайме I Арагонский. Их главное отличие от прежних обычаев Арагона и Каталонии заключается в акценте на соседстве местных жителей с мусульманами, которые в некоторых районах представляют собой большинство."
 flemish_cloth_industries_right: "Фламандское суконное производство"
 flemish_cloth_industries_right_desc: "В позднем Средневековье в Нидерландах сформировалась развитая текстильная отрасль. Ткани высочайшего качества из английской и кастильской шерсти экспортировались оттуда по всей Европе."
 ville_franche_town_rights: "Вильфраншское право"
 ville_franche_town_rights_desc: "$villes_franches_desc$"
 unlock_ville_franche_town_rights_tt: "Открывает [Concept('town_rights', 'городские права')|e]: [ShowTownRightsName('ville_franche_town_rights')|l]"
 borgo_franco_town_rights: "Боргофранкское право"
 borgo_franco_town_rights_desc: "Распространение коммун по всей Италии — новая реальность, которая определяет развитие этого региона. Их часто называют #italic «Борго Франко»#! (вольными городами), и по сравнению с сёлами они обладают рядом особых привилегий."
 #######################################
 #   Scandinavian Rights    ############
 #######################################
 scandinavian_fishing_privileges: "Рыболовные привилегии"
 scandinavian_fishing_privileges_desc: "Этому [Concept('location', 'району')|e] дарованы исключительные права на близлежащие рыбные угодья, а также торговлю сушёной и солёной рыбой. Приморские города Норвегии воспользовались этими привилегиями, чтобы организовать торговлю #TOOLTIP:GOODS,fish,X #L рыбой#!#! по всей Северной Европе."
 scandinavian_bergslag_privileges: "Горнорудные привилегии"
 scandinavian_bergslag_privileges_desc: "Власть признала этот [Concept('location', 'район')|e] горнодобывающим поселением, или бергслагом, предоставив ему коллективные права на добычу местной руды, собственный суд и освобождение от воинской повинности. [ShowEstateTypeName('peasants_estate')], работающие в шахтах, обладают более высоким правовым статусом по сравнению с жителями обычных городов."
 scandinavian_tar_privileges: "Привилегии на производство дёгтя"
 scandinavian_tar_privileges_desc: "Этому [Concept('location', 'району')|e] дарованы права на производство и экспорт #TOOLTIP:GOODS,tar,X #L дёгтя#!#! и #TOOLTIP:GOODS,naval_supplies,X #L судостроительных материалов#!#! из лесов, принадлежащих короне. Эти лесные промыслы составляют основу для всего судостроения на побережье Балтийского моря."
 scandinavian_thing_rights: "Тингсретт"
 scandinavian_thing_rights_desc: "Этому [Concept('location', 'району')|e] дарованы официальные права на проведение собраний, или «тингсретт». Его жители получили признаваемый государством орган самоуправления и правосудия. Власть короны при этом лишается определённых полномочий, а взамен приобретает более дисциплинированное и лояльное население."
 #Byzantine / Greek / Roman
 imperial_breadbasket_rights: "Имперская житница"
 imperial_breadbasket_rights_granary_tt: "Has a [ShowBuildingTypeName('granary')] at maximum level."
 imperial_breadbasket_rights_desc: "Этому [Concept('location', 'району')|e] власти поручили снабжать провизией всё королевство, и чтобы удовлетворить эти амбициозные планы, мы расширили его зернохранилища. Зерно поступает сюда в огромных количествах, а затем под имперским надзором доставляется местным жителям и воинам."
 constantinopolitan_silk_monopoly_rights: "Шёлковая монополия Константинополя"
 constantinopolitan_silk_monopoly_rights_desc: "Производство #TOOLTIP:GOODS,silk,X #L шёлка#!#! в #TOOLTIP:LOCATION,constantinople,X #L Константинополе#!#! соответствует высоким стандартам, это давняя традиция, передающаяся из поколения в поколение. Под имперским надзором мастерские процветают, правда, всё производство подчиняется монополии."
 scholai_literacy_rights: "Учебные привилегии"
 scholai_literacy_rights_desc: "Этот [Concept('location', 'район')|e] признан центром образования, где грамотность развивается под покровительством властей. Знания здесь распространяются быстро, и хотя подобные занятия вряд ли обогатят казну, не стоит забывать, что безделье — мать всех пороков."
 municipia_privilegia: "Муниципальные привилегии"
 municipia_privilegia_desc: "Этот [Concept('location', 'район')|e] получил статус муниципалитета, и права, дарованные его гражданам, соответствуют нашему законодательству. Благодаря растущему влиянию местной элиты здесь распространяются традиции #TOOLTIP:SOCIETAL_VALUE,latinization_vs_hellenization,X #L латинства#!#!."
