l_russian:
 TAB_TOOLTIP_HINTS_TITLE: "Советы"
 TAB_TOOLTIP_HINTS: "#T Советы#!\nЗдесь можно получить советы, применимые к вашему положению дел в игре."
 OPEN_HINTS: "Открыть советы"
 OPEN_HINT: "Открыть совет"
 EXPAND_HINT: "Щёлкните, чтобы развернуть совет"
 COLLAPSE_HINT: "Щёлкните, чтобы свернуть совет"
 EMPTY_HINT_SCREEN_TEXT: "В державе всё спокойно, пока нечего посоветовать!"
 OPEN_HINT_TEXT: "Просмотреть совет @hint!"
 ALERT_HINT: "Открыть с советом"
 ALERT_ADVANCES_HINT: "Открыть панель улучшений с советом"
 HINT_TITLE: "Совет @hint!"
 RECOMMENDED_ACTIONS_TITLE: "@hint! Рекомендации"
 SCRIPTABLE_HINT_DEFINITION_TEXT: "$MAIN_HINT$ $CONTEXT_HINT$"
 HINT_DIVIDER: "\n\n---\n\n"
 HINT_SORT_BY_PRIORITY: "Сортировать по приоритету"
 hint_advisor_salute_diplomatic: "\n«Приветствую, Ваше Высочество, я [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').GetName], [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('diplomatic').IsFemale, 'ваша политическая советница и смиренная', 'ваш политический советник и смиренный' )] слуга»."
 hint_advisor_salute_administrative: "\n«[Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').GetName], к вашим услугам, [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('administrative').IsFemale, 'верная советница', 'верный советник' )] вашей светлости в вопросах экономики»."
 hint_advisor_salute_military: "\n«Меня зовут [Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').GetName], и я [Select_CString(Player.GetGovernment.CalcBestRepresentativeForPlaystyle('military').IsFemale, 'ваша', 'ваш' )] эксперт в военных делах. Жду распоряжений»."
 # Hints
 HINTS_AND_SUGGESTIONS: "Советы и предложения"
 MANPOWER_HINT: "Мало рекрутов!"
 manpower_topbar_hint: "В основном мы получаем больше [Concept('manpower_with_icon', 'рекрутов')|e] при возведении [Concept('building_with_icon', 'сооружений')|e] определённого типа."
 MANPOWER_HINT_EXTRA: "Чтобы увеличить [Concept('manpower_with_icon', 'число рекрутов')|e], можно построить следующие сооружения:"
 MANPOWER_HINT_NONE: "К сожалению, ни одно доступное нам сооружение не увеличит число рекрутов."
 MANPOWER_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
 SAILORS_HINT: "Мало моряков!"
 sailors_topbar_hint: "В основном мы получаем больше [Concept('sailors_with_icon', 'моряков')|e] при возведении [Concept('buildings_with_icon', 'сооружений')|e] определённого типа в прибрежных [Concept('locations_with_icon', 'районах')|e]."
 SAILOR_HINT_EXTRA: "Чтобы увеличить число моряков, можно построить любое из следующих сооружений:"
 SAILOR_HINT_NONE: "К сожалению, ни одно доступное нам сооружение не увеличит число моряков."
 SAILOR_HINT_BUILDING: "$BULLET_WITH_TAB$[BUILDING_TYPE.GetName]"
 INVALID_MODIFIER_TYPE: "Выбран недопустимый тип модификатора!"
 EMPTY_RESEARCH_HINT: "Можно выбрать исследование!"
 empty_research_topbar_hint: "@trigger_no! [Concept('research_with_icon', 'Исследования')|e] всегда приносят пользу. Сейчас мы упускаем драгоценный прогресс."
 NO_BUILDINGS_WITH_MODIFIER: "Нет"
 GOLD_HINT: "У нас дефицит!"
 gold_topbar_hint: "В случае дефицита мы можем сократить [Concept('expenses_with_icon', 'расходы')|e], повысить [Concept('taxes_with_icon', 'налоги')|e] или [Concept('mint_with_icon', 'отчеканить')|e] больше монет. Если у нас закончатся [Concept('gold_with_icon', 'дукаты')|e], нам придётся взять [Concept('loans_with_icon', 'взаймы')|e] — и столкнуться с риском [Concept('bankrupt_with_icon', 'банкротства')|e]."
 STABILITY_HINT: "Наша держава нестабильна!"
 stability_topbar_hint: "Есть несколько способов повысить стабильность.\n$BULLET_WITH_TAB$Увеличьте число #TOOLTIP:POPTYPE,clergy,X #L священников#!#!, которые исповедуют #L [GetPlayer.GetReligion.GetAdjective|l]ую#! веру.\n$BULLET_WITH_TAB$Направьте больше средств [Concept('budget_with_icon', 'бюджета')|e] на укрепление стабильности.\n$BULLET_WITH_TAB$Поручите [Concept('cabinet_with_icon', 'совету')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L повысить стабильность в державе#!#!."
 LEGITIMACY_HINT: "[Localize( GetPlayer.GetGovernment.GetGovernmentType.GetPowerKey )] на низком уровне!"
 legitimacy_topbar_hint: "Есть несколько способов исправить эту проблему.\n$BULLET_WITH_TAB$Направьте больше средств [Concept('budget_with_icon', 'бюджета')|e] на [Concept('court_maintenance_with_icon', 'содержание двора')|e].\n$BULLET_WITH_TAB$Поручите [Concept('cabinet_with_icon', 'совету')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L укрепить правительство#!#!."
 devotion_topbar_hint: "$legitimacy_topbar_hint$"
 republican_tradition_topbar_hint: "$legitimacy_topbar_hint$"
 horde_unity_topbar_hint: "$legitimacy_topbar_hint$"
 tribal_cohesion_topbar_hint: "$legitimacy_topbar_hint$"
 GOLD_VIEW_HINT: "Просмотреть совет насчёт дефицита"
 ###
 hint_in_deficit: "Отрицательный баланс"
 hint_in_deficit_hint_text: "$hint_in_deficit_hint_text_1$\n\n$hint_in_deficit_hint_text_2$\n\n$hint_in_deficit_hint_text_3$"
 hint_in_deficit_hint_text_1: "Наш баланс отрицателен, а потому действовать нужно аккуратно, иначе державе грозят долги и даже банкротство."
 hint_in_deficit_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Откройте @economy_panel! [Link('economy', '', 'панель экономики')], чтобы просмотреть [Concept('income_with_icon', 'доход')|e] и [Concept('expenses', 'расходы')]. Перемещением ползунков здесь можно повышать [Concept('taxes_with_icon', 'налоги')|e] или уменьшать затраты.\n@arrow_bonus_tier_2! Добейтесь того, чтобы все [Concept('buildings_with_icon', 'сооружения')|e] приносили доход, либо постройте новые сооружения (если это вам по карману). Для этого откройте @production_panel! [Link('production', '', 'панель производства')].\n@arrow_bonus_tier_2! Взаимодействуйте с [Concept('estates_with_icon', 'сословиями')|e] — это сулит как краткосрочную, так и долгосрочную выгоду. Однако стоит помнить, что сословия также могут обрести значительное политическое влияние, поэтому чрезмерная зависимость от них — это всегда большой риск. Сословия представлены на @government_panel! [Link('government', 'tabcontent = estates', 'панели правительства')].\n@arrow_bonus_tier_1! Изучите существующие или возможные торговые пути на @economy_panel![Link('trade', '', 'панели торговли')] и заключите выгодную [Concept('trades_with_icon', 'торговую сделку')|e]."
 hint_in_deficit_hint_text_3: "#T Дополнительные советы#!\n@hint! Решить проблему отрицательного баланса также помогут [Concept('laws_with_icon', 'правила')|e], [Concept('reforms_with_icon', 'принципы')|e], [Concept('diplomacy_with_icon', 'дипломатия')|e] и многое другое."
 hint_in_deficit_military: "«Затраты на войну сразу ударят по казне, но если мы одержим победу, платить за это бремя будет уже побеждённый. Забрав себе чужую землю, мы получим долгосрочную выгоду, в то время как разграбление врага обогатит нас ненадолго, но сразу»."
 hint_in_deficit_explorer: "«Там, в неизведанных краях, земля наверняка обильна — её можно будет и грабить, и развивать»."
 hint_in_deficit_administrative: "«Хороший способ стать богаче — занять господствующее положение на внутреннем рынке. Если же и этого будет мало, можно будет попробовать закрепиться на иностранных рынках, и тогда золото потечёт ещё быстрее»."
 hint_in_deficit_diplomatic: "«Как говорится, чтобы зарабатывать деньги, нужно их тратить! Чтобы перетянуть чашу весов, нужно сделать так, чтобы работа наших сооружений и труд населения приносили доход»."
 ###
 hint_cultural_capacity: "Превышен культурный потенциал"
 hint_cultural_capacity_hint_text: "$hint_cultural_capacity_hint_text_1$\n\n$hint_cultural_capacity_hint_text_2$\n\n$hint_cultural_capacity_hint_text_3$"
 hint_cultural_capacity_hint_text_1: "Культурное многообразие сулит много преимуществ, однако державы, которые не готовы к такому административному бремени и не обладают достаточным [Concept('cultural_capacity_with_icon', 'культурным потенциалом')|e], будут получать штрафы. [Concept('pops_with_icon', 'Группы населения')|e], чья [Concept('cultures_with_icon', 'культура')|e] не является [Concept('primary_culture_with_icon', 'основной ')|e] в нашей державе, изначально будут считаться носителями [Concept('non_accepted_culture_short_with_icon', 'угнетаемой')|e] культуры, но при определённых вложениях её можно превратить в [Concept('tolerated_culture_short_with_icon', 'приемлемую')|e] или [Concept('accepted_culture_short_with_icon', 'признанную')|e]."
 hint_cultural_capacity_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Чтобы сократить затраты, понизьте статус культуры, менее важной в стратегическом отношении.\n@arrow_bonus_tier_2! На #TOOLTIP:MODIFIER_TYPE,cultures_capacity,X #P #V предел культур#!#!#! чаще всего влияют [Concept('government_reforms_with_icon', 'государственные принципы')|e] и [Concept('advances_with_icon', 'улучшения')|e]."
 hint_cultural_capacity_hint_text_3: "#T Дополнительные советы#!\n@hint! Уменьшить количество культур в державе также можно с помощью [Concept('assimilation_with_icon', 'ассимиляции')|e]."
 hint_cultural_capacity_military: "«От культур нужно получать как можно больше отдачи: они помогают нам создавать культурные традиции и влияние — это незаменимый инструмент, который даст нам преимущество в случае культурного конфликта. А если мы дадим чужим культурам больше прав, держава получит дополнительных ополченцев и солдат»."
 hint_cultural_capacity_administrative: "«Культурным выражением занимаются в том числе творцы нашей державы, создающие восхитительные шедевры. Ведь чем ещё измерить величие державы, если не её влиянием на мир?»"
 hint_cultural_capacity_diplomatic: "«Со временем чужие культуры могут ассимилироваться и приблизиться к основной культуре [GetPlayer.Custom('CL_GEN')]. Разве есть что-то лучше [GetPlayer.GetCulture.GetNameWithNoTooltip|l]ой культуры?»"
 ###
 hint_unhappy_estates: "Недовольные сословия"
 hint_unhappy_estates_hint_text: "$hint_unhappy_estates_hint_text_1$\n\n$hint_unhappy_estates_hint_text_2$\n\n$hint_unhappy_estates_hint_text_3$"
 hint_unhappy_estates_hint_text_1: "Одна из важнейших задач любого правителя — следить за тем, чтобы [Concept('estates_wth_icon', 'сословия')|e] не роптали, поскольку их представители — одна из опор экономической и военной мощи державы.\n\nКаждое нелояльное [Concept('estate', 'сословие')|e] накладывает штрафы на [Concept('country', 'державу')], а его [Concept('pops_wth_icon', 'группы населения')|e] с большой вероятностью примкнут к [Concept('rebellions_wth_icon', 'мятежу')|e]."
 hint_unhappy_estates_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! На @government_panel! [Link('government', 'tabcontent = estates', 'панели правительства')] можно наделять сословия привилегиями или лишать привилегий. От этого зависит производительность и [Concept('estate_satisfaction_short_with_icon', 'довольство')|e] сословий.\n@arrow_bonus_tier_2! На @economy_panel! [Link('economy', '', 'панели экономики')] можно повышать или понижать налоги, что также влияет на довольство."
 hint_unhappy_estates_hint_text_3: "#T Дополнительные советы#!\n@hint! Повлиять на [Concept('estate_satisfaction_with_icon', 'довольство сословий')|e] также можно с помощью [Concept('parliament_with_icon', 'парламента')|e].\n@hint! Узнать больше о [Concept('rebel_movements_with_icon', 'мятежных движениях')] можно [Link('hints', 'selected_hint = hint_rebels_growing', 'здесь')]."
 hint_unhappy_estates_administrative: "«Никакая торговая держава не может полноценно существовать без сословий. Да, со временем властью частично придётся поступиться, но зато какая будет экономика!»"
 hint_unhappy_estates_diplomatic: "«У сословий могут быть мнения в том числе и по дипломатическим вопросам. Перед тем как заключить союз или договор с иностранной державой, иногда стоит учесть, что о ней думают сословия»."
 hint_unhappy_estates_military: "«Расширение невозможно без ополченцев, а их нам предоставляют сословия. Если эти люди отвернутся от нас, в самый неподходящий момент у нас может оказаться недостаточно солдат»."
 ESTATE_CONTEXT_TEXT: "Проживающие в вашей державе $LIST$ недовольны.\n\n$TEXT$"
 HINT_UNHAPPY_ESTATE: "[ESTATE.GetName|l]"
 ###
 hint_manpower: "Число рекрутов"
 hint_manpower_hint_text: "$hint_manpower_hint_text_1$\n\n$hint_manpower_hint_text_2$\n\n$hint_manpower_hint_text_3$"
 hint_manpower_hint_text_1: "[Concept('manpower_with_icon', 'Число рекрутов')|e] показывает, сколько людей можно набрать в [Concept('regulars_with_icon', 'регулярные войска')|e] для нужд наших [Concept('armies_with_icon', 'армий')|e]. В [Concept('battle_with_icon', 'бою')|e] регулярные войска значительно превосходят [Concept('levies_with_icon', 'ополчение')|e] по эффективности, однако затраты на их содержание выше. Позволить себе регулярные войска в начале игры может далеко не каждая [Concept('country_with_icon', 'держава')|e]."
 hint_manpower_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Если вы предпочитаете воевать силами [Concept('regulars', 'регулярных войск')], учтите, что недостаток [Concept('manpower', 'рекрутов')] серьёзно ограничивает возможность восполнять потери в [Concept('armies_with_icon', 'армиях')|e]. Соответственно, лучше не объявлять [Concept('war_with_icon', 'войну')|e], пока рекрутов мало.\n@arrow_bonus_tier_2! Если в ходе войны число рекрутов сильно уменьшилось, их можно заместить [Concept('levies_with_icon', 'ополчением')|e] или [Concept('mercenaries_with_icon', 'наёмниками')|e], либо даже попросить врага о [Concept('peace_with_icon', 'мире')|e]."
 hint_manpower_hint_text_3: "#T Дополнительные советы#!\n@hint! Увеличить предельное число рекрутов и улучшить возможность содержать регулярную армию можно с помощью различных [Concept('buildings_with_icon', 'сооружений')|e].\n@hint! [Concept('estate_privileges_with_icon', 'Сословные привилегии')|e] и [Concept('laws_with_icon', 'правила')|e] также влияют на возможность набирать рекрутов."
 hint_manpower_diplomatic: "«Отборная регулярная армия, в которой служат лучшие сыны [GetPlayer.GetAdjectiveWithNoTooltip|l]ого государства, — сила, которой не будет равных»."
 hint_manpower_military: "«В завоеваниях все способы хороши. Наёмники, ополченцы, регулярная армия — в обширном войске всё это одинаково необходимо»."
 hint_manpower_administrative: "«Каждый солдат, убитый на поле боя, — это один крестьянин, не вернувшийся на пашню. Война — затратное дело»."
 ###
 hint_low_stability: "Низкая стабильность"
 hint_low_stability_hint_text: "$hint_low_stability_hint_text_1$\n\n$hint_low_stability_hint_text_2$\n\n$hint_low_stability_hint_text_3$"
 hint_low_stability_hint_text_1: "Низкая [Concept('stability_with_icon', 'стабильность')|e] в державе повышает риск того, что [Concept('pops_with_icon', 'группы населения')|e] поднимут [Concept('rebellion_with_icon', 'мятеж')|e], а недовольные [Concept('estate_with_icon', 'сословия')|e] разожгут [Concept('civil_war_with_icon', 'гражданскую войну')|e], да и в целом настанут беспокойные времена."
 stability_raise_actions: "@arrow_bonus_tier_3! Направьте больше средств [Concept('budget_with_icon', 'бюджета')|e] на повышение стабильности.\n@arrow_bonus_tier_2! Поручите [Concept('cabinet_with_icon', 'совету')|e] #TOOLTIP:CABINET_ACTION,stabilize_country,X #L повысить стабильность в державе#!#!.\n@arrow_bonus_tier_1! Увеличьте число #TOOLTIP:POPTYPE,clergy,X #L священников#!#!, которые исповедуют #L [GetPlayer.GetReligion.GetAdjective|l]ую#! веру."
 hint_low_stability_hint_text_2: "#T Рекомендации#!\n$stability_raise_actions$"
 hint_low_stability_hint_text_3: "#T Дополнительные советы#!\n@hint! Есть и другие способы повысить стабильность — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e].\n@hint! Помните, что стабильность также расходуется на важные действия, например объявление [Concept('wars_with_icon', 'войны')|e] без веского [Concept('casus_belli_with_icon', 'повода')|e] или смену [Concept('law_with_icon', 'правила')|e]."
 hint_low_stability_administrative: "«Стабильная держава — это процветающая держава! А обильный урожай — это и обильный приток богатства в казну»."
 hint_low_stability_military: "«Любой державе с претензиями на господство сначала придётся усмирить своё население. Простой люд всегда готов схватиться за вилы…»"
 hint_low_stability_diplomatic: "«Если в нашей державе наступит разруха, соседи начнут смотреть на нас свысока. Пожалуй, лучше этого не допускать»."
 ###
 hint_very_low_stability: "Очень низкая стабильность"
 hint_very_low_stability_hint_text: "$hint_very_low_stability_hint_text_1$\n\n$hint_very_low_stability_hint_text_2$\n\n$hint_very_low_stability_hint_text_3$"
 hint_very_low_stability_hint_text_1: "Наша [Concept('stability_with_icon', 'стабильность')|e] крайне низка — и очень высок риск того, что [Concept('pops_with_icon', 'население')|e] поднимет [Concept('rebellion_with_icon', 'мятеж')|e], недовольные [Concept('estate_with_icon', 'сословия')|e] разожгут [Concept('civil_war_with_icon', 'гражданскую войну')|e], а враги нанесут удар, воспользовавшись нашей слабостью."
 hint_very_low_stability_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Как можно скорее повысьте стабильность. Сейчас не следует объявлять новые [Concept('wars_with_icon', 'войны')|e] или совершать иные действия, понижающие стабильность.\n$stability_raise_actions$"
 hint_very_low_stability_hint_text_3: "$hint_low_stability_hint_text_3$"
 hint_very_low_stability_administrative: "«При такой экономике совершенно невозможно вести дела! Помогите нам расписать бюджет — у нас скотина голодает»."
 hint_very_low_stability_military: "«Все враги [GetPlayer.Custom('CL_GEN')] сейчас потирают руки от радости, видя нашу слабость. Наверняка соперники и противники уже замышляют что-то недоброе»."
 hint_very_low_stability_diplomatic: "«В стабильных державах общественное положение людей резко меняется. У нас оно тоже меняется, только в отрицательную сторону»."
 ###
 hint_low_legitimacy: "Нехватка легитимности"
 hint_low_legitimacy_hint_text: "$hint_low_legitimacy_hint_text_1$\n\n$hint_low_legitimacy_hint_text_2$\n\n$hint_low_legitimacy_hint_text_3$"
 hint_low_legitimacy_hint_text_1: "[Concept('legitimacy_with_icon', 'Легитимность')|e] — это признание другими державами той власти, которой обладает [GetPlayer.GetGovernment.GetRulerTitle|l] нашей страны. Если легитимность слишком сильно снизится, мы не только лишимся преимуществ [Concept('crown_power_with_icon', 'власти правителей')|e], но и повысим риск возникновения [Concept('rebellion_with_icon', 'мятежа')|e], а ещё начнём получать штрафы к довольству [Concept('estate_with_icon', 'сословий')|e] и к [Concept('righteousness_with_icon', 'добродетельности')|e]."
 hint_low_legitimacy_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Поддерживайте как можно более высокий уровень [Concept('legitimacy_with_icon', 'легитимности')|e], чтобы избегать существенных штрафов.\n@arrow_bonus_tier_2! Для поддержания этого показателя можно увеличить затраты на [Concept('court_maintenance_with_icon', 'содержание двора')|e].\n@arrow_bonus_tier_2! Есть и другие способы сохранить [Concept('legitimacy_with_icon', 'легитимность')|e] — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e].\n@arrow_bonus_tier_1! Выберите [Concept('cabinet_action_with_icon', 'действие совета')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Укрепление правительства»#!#!."
 hint_low_legitimacy_hint_text_3: "#T Дополнительные советы#!\n@hint! Как и другие важные показатели, легитимность растёт медленно. Чтобы вашу [Concept('dynasty_with_icon', 'династию')|e] начали воспринимать благосклонно, потребуется время, поэтому старайтесь мыслить наперёд."
 hint_low_legitimacy_administrative: "«Книги записей о нашем роде и великолепие двора — вот самые убедительные доказательства законности нашей власти»."
 hint_low_legitimacy_military: "«Разве враг будет страшиться нашего войска, если наши собственные солдаты сомневаются в своём правителе?»"
 hint_low_legitimacy_diplomatic: "«Порой внутренняя сила исходит из того, как окружающие представляют нас самих. А в трудную минуту могут помочь союзники»."
 ###
 hint_low_republican_tradition: "Низкий показатель республиканских традиций"
 hint_low_republican_tradition_hint_text: "$hint_low_republican_tradition_hint_text_1$\n\n$hint_low_republican_tradition_hint_text_2$\n\n$hint_low_republican_tradition_hint_text_3$"
 hint_low_republican_tradition_hint_text_1: "[Concept('republican_tradition_with_icon', 'Республиканские традиции')|e] — показатель того, насколько [GetPlayer.GetGovernment.GetGovernmentType.GetName|l] придерживается принципов республиканизма. Если значение этого показателя слишком сильно уменьшится, мы не только лишимся преимуществ [Concept('legislative_efficiency_with_icon', 'законодательной эффективности')|e], но и повысим риск возникновения [Concept('rebellion_with_icon', 'мятежа')|e], а ещё начнём получать значительные штрафы к затратам на повышение [Concept('stability_with_icon', 'стабильности')|e]."
 hint_low_republican_tradition_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Поддерживайте как можно более высокий уровень [Concept('republican_tradition_with_icon', 'республиканских традиций')|e], чтобы избегать существенных штрафов.\n@arrow_bonus_tier_2! Для поддержания этого показателя можно увеличить затраты на [Concept('Concept('court_maintenance', 'содержание двора')', 'содержание двора')|e].\n@arrow_bonus_tier_2! Есть и другие способы сохранить [Concept('republican_tradition_with_icon', 'республиканские традиции')|e] — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e].\n@arrow_bonus_tier_1! Ещё один способ поддержать [Concept('republican_tradition_with_icon', 'республиканские традиции')|e] на высоком уровне — сменить [Concept('ruler_with_icon', 'правителя')|e] на [Concept('election_with_icon', 'выборах')|e]."
 hint_low_republican_tradition_hint_text_3: "#T Дополнительные советы#!\n@hint! Как и другие важные показатели, республиканские традиции укореняются небыстро. Чтобы народ усвоил их, потребуется время, поэтому старайтесь мыслить наперёд."
 hint_low_republican_tradition_administrative: "«В любой порядочной республике выборы — это естественный процесс»."
 hint_low_republican_tradition_military: "«Если народ станет считать нас тиранами, сражаться за нас не будут даже наёмники»."
 hint_low_republican_tradition_diplomatic: "«Ни одна держава, которая гордится своей силой, не станет добровольно поддерживать страну, открыто пренебрегающую собственными основополагающими принципами»."
 ###
 hint_low_devotion: "Нехватка благочестия"
 hint_low_devotion_hint_text: "$hint_low_devotion_hint_text_1$\n\n$hint_low_devotion_hint_text_2$\n\n$hint_low_devotion_hint_text_3$"
 hint_low_devotion_hint_text_1: "$game_concept_devotion_desc$ Если значение этого показателя слишком сильно уменьшится, мы не только лишимся преимуществ к [Concept('religious_influence_with_icon', 'религиозному влиянию')|e], но и увеличим риск возникновения [Concept('rebellion_with_icon', 'мятежа')|e] в державе, а ещё начнём получать штрафы к довольству [Concept('estate_with_icon', 'сословий')|e]."
 hint_low_devotion_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Поддерживайте как можно более высокий уровень [Concept('devotion_with_icon', 'благочестия')|e], чтобы избегать существенных штрафов.\n@arrow_bonus_tier_2! Для поддержания этого показателя можно увеличить затраты на [Concept('court_maintenance_with_icon', 'содержание двора')|e].\n@arrow_bonus_tier_2! Есть и другие способы сохранить [Concept('devotion_with_icon', 'благочестие')|e] — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e]."
 hint_low_devotion_hint_text_3: "#T Дополнительные советы#!\n@hint! Как и другие важные показатели, благочестие растёт небыстро. Чтобы народ ощутил религиозный пыл, потребуется время, поэтому старайтесь мыслить наперёд."
 hint_low_devotion_administrative: "«Недостаточно просто выступать олицетворением и защитником веры: нужно ещё и поддерживать этот образ»."
 hint_low_devotion_military: "«Если наше войско — меч со щитом, надёжно оберегающий верующих, то наша задача — стать светочем для этих людей»."
 hint_low_devotion_diplomatic: "«Нам следует взять на себя задачу распространения веры в самых далёких уголках мира. Разумеется, для этого понадобится набожность, иначе мы никого не убедим»."
 ###
 hint_low_horde_unity: "Низкая сплочённость орды"
 hint_low_horde_unity_hint_text: "$hint_low_horde_unity_hint_text_1$\n\n$hint_low_horde_unity_hint_text_2$\n\n$hint_low_horde_unity_hint_text_3$"
 hint_low_horde_unity_hint_text_1: "$game_concept_horde_unity_desc$"
 hint_low_horde_unity_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Лучший способ сплотить орду — бросить её на врага и прогнать его прочь.\n@arrow_bonus_tier_2! Для поддержания [Concept('horde_unity_with_icon', 'сплочённости орды')|e] можно увеличить затраты на [Concept('court_maintenance_with_icon', 'содержание двора')|e].\n@arrow_bonus_tier_2! Есть и другие способы сохранить [Concept('horde_unity_with_icon', 'сплочённость орды')|e] — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e]."
 hint_low_horde_unity_hint_text_3: "#T Дополнительные советы#!\n@hint! При сильной нехватке сплочённости последствия будут катастрофическими. Лучше сохранять её на высоком уровне."
 hint_low_horde_unity_administrative: "«„Разделяй и властвуй“ — не пустые слова. Если нас разделят, значит, властвовать будут уже над нами»."
 hint_low_horde_unity_military: "«Как говорится, каждый сам волен отбирать у слабых своё счастье. Сила объединяет нас; сила порождает сплочённость!»"
 hint_low_horde_unity_diplomatic: "«Чем сплочённее наше племя, тем сильнее наши воины — здесь есть прямая взаимосвязь. Успехи на войне и в завоевании — это самоисполняющееся пророчество»."
 ###
 hint_low_tribal_cohesion: "Слабое племенное единство"
 hint_low_tribal_cohesion_hint_text: "$hint_low_tribal_cohesion_hint_text_1$\n\n$hint_low_tribal_cohesion_hint_text_2$\n\n$hint_low_tribal_cohesion_hint_text_3$"
 hint_low_tribal_cohesion_hint_text_1: "$game_concept_tribal_cohesion_desc$ Племенная [Concept('government_types_with_icon', 'форма правления')|e] отличается от других тем, что по мере повышения сплочённости значительно растёт размер ополчения. Чтобы на войне нам сопутствовал успех, племена должны жить в согласии."
 hint_low_tribal_cohesion_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_2! Для поддержания [Concept('tribal_cohesion_with_icon', 'племенного единства')|e] можно увеличить затраты на [Concept('court_maintenance_with_icon', 'содержание двора')|e].\n@arrow_bonus_tier_2! Есть и другие способы сохранить [Concept('tribal_cohesion_with_icon', 'племенное единство')|e] — например, определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('policies_with_icon', 'политики')|e]."
 hint_low_tribal_cohesion_hint_text_3: "#T Дополнительные советы#!\n@hint! При сильной нехватке единства последствия будут катастрофическими. Лучше сохранять его на высоком уровне."
 hint_low_tribal_cohesion_administrative: "«Нельзя закрывать глаза на единство: от правителя требуется внимание к каждой мелочи»."
 hint_low_tribal_cohesion_military: "«Когда нет племенного единства, мы слабы. Слабость усугубляет раздробленность. С этого пути надо свернуть, иначе враг сам покорит и поработит нас»."
 hint_low_tribal_cohesion_diplomatic: "«Существование державы настолько сильно зависит от сословий, что почти каждый наш поступок непременно отзовётся в дальнейшем. Любой уважающий себя стратег будет мыслить наперёд»."
 ###
 hint_war_exhaustion: "Высокая усталость от войны"
 hint_war_exhaustion_hint_text: "$hint_war_exhaustion_hint_text_1$\n\n$hint_war_exhaustion_hint_text_2$\n\n$hint_war_exhaustion_hint_text_3$"
 hint_war_exhaustion_hint_text_1: "[Concept('war_exhaustion_with_icon', 'Усталость от войны')|e] — это общая утомлённость населения участием державы в войне. Высокая усталость крайне опасна для любой державы. По мере её роста боеспособность [Concept('army_with_icon', 'армии')|e] и [Concept('levies_with_icon', 'ополчения')|e] будет снижаться, рост [Concept('pops_with_icon', 'населения')|e] — замедляться, а экономика — разрушаться."
 hint_war_exhaustion_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Лучший и самый надёжный способ избежать усталости от войны — поддерживать мир.\n@arrow_bonus_tier_2! Определённые [Concept('laws_with_icon', 'правила')|e] и [Concept('estate_privileges_with_icon', 'сословные привилегии')|e] помогут постепенно снизить усталость."
 hint_war_exhaustion_hint_text_3: "#T Дополнительные советы#!\n@hint! Следует тщательно подходить к завоеваниям и не объявлять новые [Concept('wars_with_icon', 'войны')|e], если усталость уже слишком высока."
 hint_war_exhaustion_administrative: "«Решительные боевые действия могут принести пользу, но в усталости народа от войны нет ничего хорошего: страдает производство, страдает потребление… страдает вообще всё!»"
 hint_war_exhaustion_military: "«Усталость от войны опасна. Чаще всего её порождают слабые командиры: огромные потери и громкие поражения быстро настроят народ против нас»."
 hint_war_exhaustion_diplomatic: "«Доля проигравшего всегда горька, однако позорное поражение может вызвать в народе жажду отомстить. Одержимость реваншем одурманивает»."
 ###
 hint_low_sailors: "Моряки"
 hint_low_sailors_hint_text: "$hint_low_sailors_hint_text_1$\n\n$hint_low_sailors_hint_text_2$\n\n$hint_low_sailors_hint_text_3$"
 hint_low_sailors_hint_text_1: "$game_concept_sailors_desc$"
 hint_low_sailors_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Если вы предпочитаете воевать с помощью [Concept('ships_with_icon', 'кораблей')|e], учтите, что недостаток моряков серьёзно ограничивает возможность восполнять потери на [Concept('navies_with_icon', 'флотах')|e]. Соответственно, лучше не объявлять [Concept('war_with_icon', 'войну')|e], пока моряков мало.\n@arrow_bonus_tier_2! Без моряков также не получится проводить [Concept('explorations_with_icon', 'экспедиции')|e] — это тоже важно учитывать при планировании."
 hint_low_sailors_hint_text_3: "#T Дополнительные советы#!\n@hint! Увеличить предельное число моряков можно с помощью различных [Concept('buildings_with_icon', 'сооружений')|e].\n@hint! [Concept('estate_privileges_with_icon', 'Сословные привилегии')|e] и [Concept('laws_with_icon', 'правила')|e] также влияют на возможность набирать моряков."
 hint_low_sailors_administrative: "«Кому принадлежит море, тому принадлежат и мировые богатства. Сильный военный и мирный флот означает торговое превосходство»."
 hint_low_sailors_military: "«Сильный военно-морской флот с умелыми моряками — наш ключ к покорению далёких и близких земель. Надёжная защита путей снабжения идёт на пользу всем, даже заморским частям»."
 hint_low_sailors_diplomatic: "«Морские военные сооружения нередко способствуют мирной торговле. На эту взаимную дополняемость не следует закрывать глаза»."
 ###
 hint_low_diplomats: "Мало дипломатов"
 hint_low_diplomats_hint_text: "$hint_low_diplomats_hint_text_1$\n\n$hint_low_diplomats_hint_text_2$\n\n$hint_low_diplomats_hint_text_3$"
 hint_low_diplomats_hint_text_1: "[Concept('diplomats_with_icon', 'Дипломаты')|e] позволяют поддерживать дипломатическое взаимодействие с другими державами. Для многих действий, таких как улучшение отношений, постоянно требуются дипломаты, а на единоразовые действия, как правило, нужно фиксированное число дипломатов."
 hint_low_diplomats_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Если дипломатов не хватает, можно перестать улучшать отношения с той или иной державой, тем самым освободив занятых там дипломатов.\n@arrow_bonus_tier_2! Есть и другие способы пополнить дипломатический корпус — например, определённые [Concept('advances_with_icon', 'улучшения')|e]."
 hint_low_diplomats_hint_text_3: "#T Дополнительные советы#!\n@hint! Есть смысл постоянно держать в державе нескольких незанятых дипломатов на случай, если вдруг потребуется их участие в каком-либо действии, однако не менее важно назначать дипломатам долгосрочные задачи."
 hint_low_diplomats_administrative: "«Хорошие отношения — залог большой прибыли! Дружба с соседями обеспечит нам доступ к новым, более крупным рынкам»."
 hint_low_diplomats_military: "«Дипломаты также помогут нашей державе утвердить превосходство над более слабыми странами. Чем мы сильнее, тем более вероятно, что другие будут нам покоряться — по дружбе или под угрозами»."
 hint_low_diplomats_diplomatic: "«Правительственные реформы и улучшения — верный способ расширить наше дипломатическое ведомство. И, разумеется, носители определённых культур лучше других владеют даром убеждения»."
 LOW_DIPLOMATS_HINT: "Мало дипломатов!"
 ### Low Food in Market
 hint_low_food_in_market: "Нехватка пищи на рынке"
 hint_low_food_in_market_hint_text: "$hint_low_food_in_market_hint_text_1$\n\n$hint_low_food_in_market_hint_text_2$\n\n$hint_low_food_in_market_hint_text_3$"
 hint_low_food_in_market_hint_text_1: "Без достаточного запаса [Concept('food_with_icon', 'пищи')|e] рынки не смогут удовлетворять спрос в [Concept('provinces_with_icon', 'провинциях')|e], где располагаются эти рынки. При этом районы этих провинций может поразить [Concept('starving_with_icon', 'голод')|e]."
 hint_low_food_in_market_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Чтобы увеличить предложение, улучшите [Concept('rgo_with_icon', 'добычу')|e] пищевых ресурсов.\n@arrow_bonus_tier_2! Можно наладить [Concept('import_with_icon', 'импорт')|e] пищи, заключив [Concept('trades_with_icon', 'торговые сделки')|e] по поставке [Concept('goods_with_icon', 'товаров')|e] для её производства."
 hint_low_food_in_market_hint_text_3: "#T Дополнительные советы#!\n@hint! Если сократить число [Concept('buildings_with_icon', 'сооружений')|e] в каком-либо [Concept('location_with_icon', 'районе')|e], его [Concept('pops_with_icon', 'населению')|e] придётся вернуться к [Concept('subsistence_agriculture_with_icon', 'натуральному хозяйству')|e]."
 HINT_MARKET_ENTRY: "[MARKET.GetName]"
 HINT_BUILDING_ENTRY: "[BUILDING_TYPE.GetName]"
 LOW_FOOD_CAP_TEXT: "[SelectLocalization( StringIsEmpty( GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building') ), Localize('LOW_FOOD_NO'), Localize( 'LOW_FOOD_YES' ) )]"
 LOW_FOOD_YES: "\n@arrow_bonus_tier_1! Если есть свободный [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e], можно импортировать пищу с того рынка, где она в избытке.\n\nЕсли свободного потенциала нет, его можно увеличить, построив определённые сооружения, например, такие как «[GetListOfAvailableBuildingsWithModifier('merchant_capacity_from_building')]»."
 LOW_FOOD_NO: "\n\nЕсли есть свободный [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e], можно импортировать пищу с того рынка, где она в избытке."
 LOW_MARKET_FOOD_TEXT: "$LIST$ — запас [Concept('food_with_icon', 'пищи')|e] здесь достиг критического уровня.$LOW_FOOD_CAP_TEXT$"
 LOW_MARKET_FOOD_TEXT_BUILDINGS: "$LIST$ — запас [Concept('food_with_icon', 'пищи')|e] здесь достиг критического уровня.\n\nЕсть несколько способов побороть дефицит пищи на рынке. Чем больше пищи производит район, тем меньше ресурсов он вытягивает из провинции и своего рынка, а при излишках производства — даже помогает другим районам.\n\n\n@arrow_bonus_tier_3! Основной источник [Concept('food', 'пищи')] — [Concept('rgo_with_icon', 'добыча ресурсов')|e], особенно в районах с высокой [Concept('food_productivity_with_icon', 'эффективностью производства пищи')|e]. Если на [Concept('market', 'рынке')] есть дефицит [Concept('food', 'пищи')], следует расширить добычу.\n@arrow_bonus_tier_2! Нарастить производство пищи также помогут определённые [Concept('buildings_with_icon', 'сооружения')|e], например «$BUILDING_LIST$», — при соответствии производимых [Concept('goods_with_icon', 'товаров')|e].$LOW_FOOD_CAP_TEXT$"
 hint_low_food_in_market_administrative: "«Рынки в районах, выделенных под производство пищи, — это не только безопасность, но и широчайшие возможности заработать. Если от нас будет зависеть жизнь других, наше влияние станет почти безграничным»."
 hint_low_food_in_market_military: "«Инфраструктура — важный фактор, ограничивающий наши торговые возможности. Однако для импортоориентированной экономики ещё важнее сильный военный флот. Без него мы станем лёгкой добычей для каждого, кому приглянутся наши торговые пути»."
 hint_low_food_in_market_diplomatic: "«Построение самодостаточной экономики, ориентированной на производство пищи, — достойная цель, однако если кормить [GetPlayer.GetAdjectiveWithNoTooltip|l]ий народ будет импортоориентированная экономика, мы сможем сосредоточить усилия на производстве других, более прибыльных товаров»."
 ###
 hint_over_diplo_capacity: "Превышен дипломатический потенциал"
 hint_over_diplo_capacity_hint_text: "$hint_over_diplo_capacity_hint_text_1$\n\n$hint_over_diplo_capacity_hint_text_2$\n\n$hint_over_diplo_capacity_hint_text_3$"
 hint_over_diplo_capacity_hint_text_1: "Союз со всеми — это союз ни с кем. [Concept('country_with_icon', 'Держава')|e], превысившая количество связей, которые может иметь согласно своему дипломатическому потенциалу, получает штрафы к [Concept('diplomatic_reputation_with_icon', 'дипломатической репутации')|e] и [Concept('prestige_with_icon', 'престижу')|e]. Некоторые [Concept('subject_types_with_icon', 'типы ленников')|e] требуют дипломатического содержания, снижая доступный потенциал.\n\nУчастие в отдельных [Concept('international_organizations_with_icon', 'международных объединениях')|e] расходует некоторое количество дипломатического потенциала, а силой вашего [Concept('ally_with_icon', 'союзника')|e] определяется стоимость заключения [Concept('alliance_with_icon', 'союза')|e]."
 hint_over_diplo_capacity_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Если [Concept('diplomats_with_icon', 'дипломаты')|e] перестанут улучшать отношения с другими державами, это поможет высвободить часть потенциала.\n@arrow_bonus_tier_2! Пересмотрите существующие [Concept('alliances_with_icon', 'союзы')|e] или [Concept('treaties_with_icon', 'договоры')|e]: возможно, часть из них следует разорвать.\n@arrow_bonus_tier_1! Покиньте [Concept('international_organizations_with_icon', 'международные объединения')|e], которые больше не приносят пользы."
 hint_over_diplo_capacity_hint_text_3: "#T Дополнительные советы#!\n@hint! В некоторых случаях дипломатический потенциал можно увеличить с помощью [Concept('estate_privileges_with_icon', 'сословных привилегий')|e], [Concept('laws_with_icon', 'правил')|e] и [Concept('advances_with_icon', 'улучшений')|e]."
 hint_over_diplo_capacity_military: "«Нам стоило бы рассматривать союзы как средства, ведущие к цели, нежели как дружбу на века. Наши союзники непременно обнажат зубы, как только мы проявим слабину…»"
 hint_over_diplo_capacity_administrative: "«Изнурённые работой дипломаты, к сожалению, хуже начинают справляться со своими задачами. И хотя соблазн чрезмерно обременять их трудом бывает велик, в долгосрочной перспективе это не принесёт нам пользы»."
 hint_over_diplo_capacity_diplomatic: "«Если важнейшим направлением для нас является внутреннее развитие, то прочные союзы с лихвой восполнят нехватку военной мощи — пусть даже мнимую. Возможно, для начала придётся разорвать часть других отношений…»"
 ###
 hint_rebels_growing: "$game_concept_rebel_movements$"
 hint_rebels_growing_hint_text: "$hint_rebels_growing_hint_text_1$\n\n$hint_rebels_growing_hint_text_2$\n\n$hint_rebels_growing_hint_text_3$"
 hint_rebels_growing_hint_text_1: "Ваши [Concept('pops_with_icon', 'группы населения')|e] будут присоединяться к [Concept('rebel_movements_with_icon', 'мятежным движениям')|e], если [Concept('pop_satisfaction_with_icon', 'довольство')|e] этих групп опускается ниже #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V порога их присоединения к мятежникам#!#!.\n\nВ зависимости от поддержки [Concept('rebel_movements', 'мятежные движения')] будут ежемесячно накапливать прогресс, что приближает их к открытому мятежу. При достижении #W 100%#! поддержки движение начнёт [Concept('revolt_with_icon', 'мятеж')|e] или [Concept('civil_war_with_icon', 'гражданскую войну')|e].\n\nСамыми частыми причинами поддержки мятежа являются низкая [Concept('stability_with_icon', 'стабильность')|e], дискриминация [Concept('cultures_with_icon', 'культуры')|e] и [Concept('religions_with_icon', 'религии')|e], а также недовольные [Concept('estates_with_icon', 'сословия')|e]."
 hint_rebels_growing_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Поддерживайте [Concept('stability_with_icon', 'стабильность')|e] и [Concept('legitimacy_with_icon', 'легитимность')|e] на максимальном уровне.\n@arrow_bonus_tier_2! Примените [Concept('cabinet_action_with_icon', 'действие совета')|e] #TOOLTIP:CABINET_ACTION,rebel_crackdown,X #L «Подавление бунта»#!#!, чтобы остановить прогресс надвигающегося [Concept('rebellion', 'мятежа')].\n@arrow_bonus_tier_1! Если в [Concept('province_with_icon', 'провинции')|e] с недовольными [Concept('pops', 'группами населения')] будет размещена [Concept('army_with_icon', 'армия')|e], то её присутствие поможет жителям… лучше #italic понять#! вашу точку зрения.\n\nОднако в конечном счёте важнее всего повысить [pop_satisfaction_icon] довольство мятежных [Concept('pops', 'групп населения')].\n@arrow_bonus_tier_2! Убедитесь, что [Concept('cultures', 'культуры')] с самым большим числом представителей в вашей [Concept('country', 'державе')] являются [Concept('accepted_culture_short_with_icon', 'признанными')|e] или [Concept('tolerated_culture_short_with_icon', 'приемлемыми')|e].\n@arrow_bonus_tier_1! Убедитесь, что мятежные [Concept('pops', 'группы населения')] могут удовлетворить как можно больше [Concept('pop_needs_with_icon', 'потребностей')|e] за счёт своего [Concept('market_with_icon', 'рынка')|e].\n@arrow_bonus_tier_3! Поддерживайте высокое [estate_icon] [Concept('estate_satisfaction_with_icon', 'довольство сословия')|e], так как оно сильно влияет на [Concept('pops', 'группы населения')] из этого сословия:\n$TAB$@arrow_bonus_tier_2! Раздавайте [Concept('privilege_with_icon', 'привилегии')|e]\n$TAB$@arrow_bonus_tier_2! Подкупайте [Concept('estate', 'сословия')]\n$TAB$@arrow_bonus_tier_2! Снижайте [Concept('taxes_with_icon', 'налоги')|e]"
 hint_rebels_growing_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('societal_values_with_icon', 'Общественные ценности')|e], такие как #TOOLTIP:SOCIETAL_VALUE,individualism_vs_communalism,X #L общинность#!#! и #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L децентрализация#!#!, также могут повлиять на вероятность развития мятежа.\n@hint! Мятежные [Concept('pops', 'группы населения')] присоединяются к разным [Concept('rebel_movements', 'движениям')] в зависимости от ряда факторов. Например, [Concept('pops', 'группы населения')] угнетаемой [Concept('culture', 'культуры')] чаще примыкают к [Concept('nationalist_rebels_with_icon', 'националистическим мятежникам')|e]."
 hint_rebels_growing_military: "«На вид простой народ бывает грозен, но на деле редко доходит до кровопролития. Однако свою несобранность он с лихвой восполняет числом»."
 hint_rebels_growing_administrative: "«От мятежников, безусловно, исходит один лишь вред, однако почти любой мятеж — это реакция. Если устранить причину их недовольства, вы не только усмирите буйный народ, но и облегчите ему жизнь в державе»."
 hint_rebels_growing_diplomatic: "«Население нашей державы разнородно — каждый верен собственным убеждениям. Завоёванные народы гораздо вероятнее других попытаются отделиться и основать собственное правительство или даже присоединиться к другой стране»."
 ###
 hint_call_for_peace: "Стремление к миру"
 hint_call_for_peace_hint_text: "$hint_call_for_peace_hint_text_1$\n\n$hint_call_for_peace_hint_text_2$\n\n$hint_call_for_peace_hint_text_3$"
 hint_call_for_peace_hint_text_1: "Стремление к миру может возникнуть, если [Concept('war_with_icon', 'война')|e] слишком затянулась или если мы отказываемся подписать [Concept('peace_treaty_with_icon', 'мирный договор')|e] даже в условиях полной победы — или поражения."
 hint_call_for_peace_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Постарайтесь ограничить потери и подписать договор, пока [Concept('war_exhaustion_with_icon', 'усталость от войны')|e] не достигла критических значений.\n@arrow_bonus_tier_2! Иногда придётся согласиться на меньшее, чем мы рассчитывали, или даже на проигрыш в [Concept('war_with_icon', 'войне')|e]."
 hint_call_for_peace_hint_text_3: "#T Дополнительные советы#!\n@hint! Всё, что мы утратим после преждевременного подписания [Concept('peace_treaty_with_icon', 'мирного договора')|e], можно будет вернуть в будущих [Concept('war_with_icon', 'войнах')|e]."
 hint_call_for_peace_diplomatic: "«Если мы не будем следовать правилам войны, последствия для стабильности державы — и для нашего доброго имени за границей — окажутся поистине катастрофическими. Ведь если мы выставим себя нерассудительными, никто не станет нас слушать»."
 hint_call_for_peace_military: "«Война есть продолжение политики, только иными средствами. Надо бы записать эту мысль, пока нас не опередили…»"
 hint_call_for_peace_administrative: "«Со временем призывы к миру будут становиться лишь громче и громче. Народ можно утихомирить, но нельзя постоянно им пренебрегать»."
 ###
 hint_unprofitable_buildings: "Невыгодные сооружения"
 hint_unprofitable_buildings_hint_text: "$hint_unprofitable_buildings_hint_text_1$\n\n$hint_unprofitable_buildings_hint_text_2$\n\n$hint_unprofitable_buildings_hint_text_3$"
 hint_unprofitable_buildings_hint_text_1: "Сооружения станут невыгодными, если суммарная стоимость потребляемых ими [Concept('goods_with_icon', 'товаров')|e] превысит ценность [Concept('produced_goods_with_icon', 'производимых там товаров')|e]."
 hint_unprofitable_buildings_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Постарайтесь удешевить потребляемые товары — например, производить или [Concept('importing_with_icon', 'импортировать')|e] больше товаров, чтобы поддерживать обильное предложение.\n@arrow_bonus_tier_3! Поднимите цены на производимые товары, создав или обеспечив дополнительный спрос.\n@arrow_bonus_tier_3! Если [Concept('buildings_with_icon', 'сооружения')|e] больше не отвечают нашим целям, их можно закрыть @building_open! или даже уничтожить.\n@arrow_bonus_tier_3! [Concept('market_owner_with_icon', 'Владелец рынка')|e] может наложить эмбарго на державы, которые экспортируют производимые владельцем товары. Это позволит повысить цены на собственный экспорт."
 hint_unprofitable_buildings_hint_text_3: "#T Дополнительные советы#!\n@hint! Некоторые сооружения можно [Concept('subsidized_with_icon', 'субсидировать')|e]. Субсидии пригодятся, например, в том случае, если [Concept('import_with_icon', 'импортная')|e] цена товаров для удовлетворения [Concept('pop_needs_with_icon', 'потребностей населения')|e] или содержания армии слишком высока."
 hint_unprofitable_buildings_diplomatic: "«Следить за тем, чтобы промышленность целой державы приносила прибыль, — нелёгкая задача. Если вам не хочется вникать в детали, на помощь всегда придёт бюрократический аппарат страны!»"
 hint_unprofitable_buildings_military: "«Чем мы сильнее, тем лучше нам будут даваться здоровые протекционистские меры. Вопросы эмбарго и торговых споров лучше всего разрешаются, когда в разговор готовы вступить пушки»."
 hint_unprofitable_buildings_administrative: "«Манипуляция ценами требует хитроумного и сложного подхода. Достаточно хитрый деятель может не только создать на рынке спрос, но и удовлетворить его»."
 NO_HINTS_AVAILABLE: "Нет доступных подсказок!"
 hint_trade: "Торговля"
 hint_trade_hint_text: "$hint_trade_hint_text_1$\n\n$hint_trade_hint_text_2$\n\n$hint_trade_hint_text_3$"
 hint_trade_hint_text_1: "[Concept('trade_with_icon', 'Торговля')|e] — это перемещение [Concept('goods_with_icon', 'товаров')|e] с одного [Concept('markets_with_icon', 'рынка')|e] на другой, а также продажа и покупка их на этих [Concept('markets_with_icon', 'рынках')|e]."
 hint_trade_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Проложите новые [Concept('trade_with_icon', 'торговые')|e] пути для приобретения [Concept('goods_with_icon', 'товаров')|e].\n@arrow_bonus_tier_2! Нарастите производство [Concept('goods_with_icon', 'товаров')|e], чтобы увеличить предложение."
 hint_trade_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('trade_with_icon', 'Торговый')|e] путь может быть как прибыльным, так и убыточным — это зависит от разницы в ценах между [Concept('export_with_icon', 'экспортным')|e] [Concept('markets_with_icon', 'рынком')|e] (источником товара) и [Concept('import_with_icon', 'импортным')|e] (пунктом назначения).\n@hint! У каждой представленной на [Concept('markets_with_icon', 'рынке')|e] [Concept('country_with_icon', 'державы')|e] есть два показателя: предельный [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] — он необходим для создания [Concept('trade_with_icon', 'торговых')|e] путей — и [Concept('merchant_power_with_icon', 'торговое преимущество')|e], то есть место в очереди на экспорт [Concept('goods_with_icon', 'товаров')|e] по [Concept('trade_with_icon', 'торговым')|e] путям, если где-то возникла нехватка.\n@hint! По умолчанию торговлю на каждом отдельном [Concept('markets_with_icon', 'рынке')|e] можно автоматизировать — для этого необходимо щёлкнуть по соответствующей шестерёнке."
 hint_trade_military: "«Торговля — для слабаков. Но когда мы покорим и землю, и моря, управлять потоками товаров будет именно наша держава»."
 hint_trade_administrative: "«Основа нашей стратегии — предсказание колебаний цен с помощью бросков костей и расположения звёзд на небосклоне»."
 hint_trade_diplomatic: "«Торговля — один из столпов, на которых стоит каждая полноценная держава. Пожалуй, во всём мире не найдётся более быстрых способов пополнить запасы»."
 ### Unused Trade Capacity
 hint_unused_trade_capacity: "Незадействованный торговый потенциал"
 hint_unused_trade_capacity_hint_text: "$hint_unused_trade_capacity_hint_text_1$\n\n$hint_unused_trade_capacity_hint_text_2$\n\n$hint_unused_trade_capacity_hint_text_3$"
 hint_unused_trade_capacity_hint_text_1: "[Concept('merchant_capacity_wth_icon', 'Торговый потенциал')|e] необходим для перемещения [Concept('goods_wth_icon', 'товаров')|e] с одного [Concept('markets_wth_icon', 'рынка')|e] на другой с целью получения прибыли. Задействовать [Concept('merchant_capacity', 'торговый потенциал')] всегда нужно целиком."
 hint_unused_trade_capacity_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_1! Щёлкните по уведомлению, чтобы просмотреть затрагиваемый рынок на @economy_panel! [Link('trade', 'subtab = markets', 'панели рынков')]. Здесь можно распределить торговый потенциал, выбрав предлагаемые сделки.\n@arrow_bonus_tier_1! Также можно щёлкнуть по заголовку «Рынок», чтобы перейти на панель рынка и ознакомиться со списком актуальных для него [Concept('goods_with_icon', 'товаров')|e]. Нажмите кнопку «Экспорт» или «Импорт» рядом с [Concept('good', 'товаром')], чтобы приступить к торговле.\n@automation! Попробуйте автоматизировать торговлю на каждом рынке. Для этого нажмите кнопку с изображением шестерёнки на карточке рынка. Сделки всегда можно создавать и фиксировать вручную, даже если торговля уже автоматизирована."
 hint_unused_trade_capacity_hint_text_3: "#T Дополнительные советы#!\n@hint! Прибыль от [Concept('trade', 'торговли')] распределяется между [Concept('estates_wth_icon', 'сословиями')|e] (в их число входят и #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правители#!#!) согласно их [Concept('estate_power_wth_icon', 'сословной власти')|e]."
 hint_unused_trade_capacity_military: "«Про вероятность бестолкового распоряжения ресурсами могу сказать только одно: я категорически против этого»."
 hint_unused_trade_capacity_administrative: "«Необходимо как можно скорее вернуться к границе эффективности»."
 hint_unused_trade_capacity_diplomatic: "«Незадействованный торговый потенциал подобен земле, в которую слишком давно не бросали семя»."
 ### Unprofitable Trade Route
 hint_unprofitable_trade_route: "Невыгодный торговый путь"
 hint_unprofitable_trade_route_hint_text: "$hint_unprofitable_trade_route_hint_text_1$\n\n$hint_unprofitable_trade_route_hint_text_2$\n\n$hint_unprofitable_trade_route_hint_text_3$"
 hint_unprofitable_trade_route_hint_text_1: "Если [Concept('trade_with_icon', 'торговый')|e] путь невыгоден, это обычно решается двумя способами: можно либо отменить путь и заменить его на выгодный, либо включить автоматизацию для конкретного [Concept('market_with_icon', 'рынка')|e]."
 hint_unprofitable_trade_route_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_1! Иногда с убытками на [Concept('trade_with_icon', 'торговом')|e] пути приходится мириться — например, если по нему перевозятся [Concept('goods_with_icon', 'товары')|e] стратегической важности.\n@arrow_bonus_tier_1! К таким товарам относятся, например, древесина для возведения [Concept('building_with_icon', 'сооружений')|e] или пища для [Concept('pops_with_icon', 'населения')|e]."
 hint_unprofitable_trade_route_hint_text_3: "#T Дополнительные советы#!\n@hint! На выгодность уже установленного [Concept('trade_with_icon', 'торгового')|e] пути можно повлиять косвенно — влияя на цены (и на разницу [Concept('good_with_icon', 'товарных')|e] цен) для [Concept('markets_with_icon', 'рынков')|e], участвующих в сделке. Для этого придётся изменить [Concept('supply_with_icon', 'предложение')|e] и [Concept('demand_with_icon', 'спрос')|e] на [Concept('good_with_icon', 'товар')|e]."
 hint_unprofitable_trade_route_military: "«Может, лучше будет отобрать у них товары, чем платить за поставки?»"
 hint_unprofitable_trade_route_administrative: "«Потери нужно как можно скорее сокращать. Торговля — это не благотворительность»."
 hint_unprofitable_trade_route_diplomatic: "«Нельзя избежать несовершенства — таков порядок вещей, — но можно не давать ему разрастаться»."
 hint_market_out_of_supply: "Недостаток предложения на рынке"
 hint_market_out_of_supply_hint_text: "$hint_market_out_of_supply_hint_text_1$\n\n$hint_market_out_of_supply_hint_text_2$\n\n$hint_market_out_of_supply_hint_text_3$"
 hint_market_out_of_supply_hint_text_1: "Если общий [Concept('demand_with_icon', 'спрос')|e] на каком-либо [Concept('market_with_icon', 'рынке')|e] слишком велик по сравнению с ограниченным [Concept('supply_with_icon', 'предложением')|e], мы можем не получить [Concept('goods_with_icon', 'товары')|e], которые пытаемся [Concept('export_with_icon', 'экспортировать')|e] или [Concept('import_with_icon', 'импортировать')|e]. Это приводит к нехватке товаров."
 hint_market_out_of_supply_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Неприбыльные [Concept('trade_with_icon', 'торговые')|e] пути можно немедленно отменить, а высвободившийся [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] — направить на другие виды [Concept('goods_with_icon', 'товаров')|e].\n@arrow_bonus_tier_1! Увеличение [Concept('merchant_power_with_icon', 'торгового преимущества')|e] на соответствующем [Concept('market_with_icon', 'рынке')|e] может расширить наш доступ к местным товарам."
 hint_market_out_of_supply_hint_text_3: "#T Дополнительные советы#!\n@hint! Есть целый ряд источников [Concept('merchant_power_with_icon', 'торгового преимущества')|e]: [Concept('advances_with_icon', 'улучшения')|e], [Concept('privileges_with_icon', 'привилегии')|e], [Concept('policies_with_icon', 'политики')|e] и не только.\n@hint! Можно также попытаться увеличить [Concept('supply_with_icon', 'предложение')|e], но вряд ли получится сделать это быстро: здесь нужен долговременный стратегический подход."
 hint_market_out_of_supply_military: "«Иногда нам будет не хватать товаров для экспорта, и тогда военная машина будет спотыкаться. Разобраться с этим нужно как можно скорее»."
 hint_market_out_of_supply_administrative: "«Стоит задуматься, как увеличить наше справедливое — а как иначе? — торговое преимущество любыми способами»."
 hint_market_out_of_supply_diplomatic: "«Возможно, стоит разнообразить наши торговые сделки и отойти от бессменного однообразия»."
 hint_increasing_trade_capacity: "Увеличение торгового потенциала"
 hint_increasing_trade_capacity_hint_text: "$hint_increasing_trade_capacity_hint_text_1$\n\n$hint_increasing_trade_capacity_hint_text_2$\n\n$hint_increasing_trade_capacity_hint_text_3$"
 hint_increasing_trade_capacity_hint_text_1: "От [Concept('merchant_capacity_with_icon', 'торгового потенциала')|e] зависит объём [Concept('trade_with_icon', 'торговли')|e], доступной [Concept('country_with_icon', 'державе')|e]."
 hint_increasing_trade_capacity_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Стройте больше [Concept('buildings_with_icon', 'сооружений')|e], которые увеличивают потенциал, например #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#! или #TOOLTIP:BUILDING_TYPE,market_village,X #L торговые деревни#!#!.\n@arrow_bonus_tier_2! Определённые [Concept('advances_with_icon', 'улучшения')|e] или [Concept('laws_with_icon', 'правила')|e] также могут увеличить [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e]."
 hint_increasing_trade_capacity_hint_text_3: "#T Дополнительные советы#!\n@hint! Чем больше [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e], тем больше товаров участвуют в сделках, а значит — выше [Concept('income_with_icon', 'доход')|e]."
 hint_increasing_trade_capacity_military: "«Чем больше размеры нашей державы, тем больше возможностей для торговли. Это почти синонимы»."
 hint_increasing_trade_capacity_administrative: "«Проблему нехватки торгового потенциала — как и любую другую проблему, стоящую перед человечеством, — можно решить очень просто: нужно больше рынков»."
 hint_increasing_trade_capacity_diplomatic: "«Возделывание почвы для товарного обмена везде, где только можно, обеспечит нам бурный поток товаров»."
 hint_increasing_trade_advantage: "$game_concept_merchant_power$"
 hint_increasing_trade_advantage_hint_text: "$hint_increasing_trade_advantage_hint_text_1$\n\n$hint_increasing_trade_advantage_hint_text_2$\n\n$hint_increasing_trade_advantage_hint_text_3$"
 hint_increasing_trade_advantage_hint_text_1: "[Concept('merchant_power_with_icon', 'Торговое преимущество')|e] определяет, какая [Concept('country_with_icon', 'держава')|e] первой получает доступ к [Concept('trade_with_icon', 'торговле')|e] [Concept('goods_with_icon', 'товарами')|e] на [Concept('market_with_icon', 'рынке')|e].\n\nЕсли две [Concept('countries', 'державы')] пытаются купить [Concept('good', 'товар')], но его слишком мало для них обеих, первой товар купит держава, у которой больше [Concept('merchant_power', 'торгового преимущества')] на этом [Concept('market', 'рынке')].\n\nУчтите, что [Concept('merchant_power', 'торговое преимущество')] применимо только к [Concept('trade', 'торговле')]. [Concept('locations_with_icon', 'Районы')|e] при покупке [Concept('goods', 'товаров')] для [Concept('constructions_with_icon', 'строительства')|e] и [Concept('pop_needs_with_icon', 'населения')|e] опираются на [Concept('market_access_with_icon', 'доступ к рынку')|e]."
 hint_increasing_trade_advantage_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Установите контроль над большим числом [Concept('locations_wth_icon', 'районов')|e], относящихся к этому [Concept('market', 'рынку')].\n@arrow_bonus_tier_2! Увеличьте [Concept('maritime_presence_wth_icon', 'морское присутствие')|e] в прибрежных водах [Concept('market', 'рынка')].\n@arrow_bonus_tier_1! Некоторые [Concept('buildings_wth_icon', 'сооружения')|e], например #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынок#!#!, также увеличивают [Concept('merchant_power', 'торговое преимущество')]."
 hint_increasing_trade_advantage_hint_text_3: "#T Дополнительные советы#!\n@hint!#italic Чтобы узнать больше, ознакомьтесь с [Link('hints', 'selected_hint = hint_trade', 'советами по торговле')] и [Link('hints', 'selected_hint = hint_maritime', 'морскому присутствию')]."
 hint_increasing_trade_advantage_military: "«Торговля — занятие состязательное, а не совместное. Вполне естественно, что у кого-то должно быть преимущество»."
 hint_increasing_trade_advantage_administrative: "«Основа нашей стратегии — предсказание колебаний цен с помощью бросков костей и расположения звёзд на небосклоне»."
 hint_increasing_trade_advantage_diplomatic: "«Торговля — один из столпов, на которых стоит каждая полноценная держава. Пожалуй, во всём мире не найдётся более быстрых способов пополнить запасы»."
 ######## ALERT HINTS ########
 ### Pops demanding Goods
 hint_pops_with_needs_yellow: "Население требует товары"
 hint_pops_with_needs_yellow_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_yellow_hint_text_2$\n\n$hint_pops_with_needs_yellow_hint_text_3$"
 hint_pops_with_needs_yellow_hint_text_1: "[Concept('pops_with_icon', 'Группы населения')|e] будут стараться покупать необходимые им повседневные [Concept('goods_with_icon', 'товары')|e] на [Concept('market_with_icon', 'рынке')|e] того [Concept('location_with_icon', 'района')|e], где живут. Если они не могут купить необходимые [Concept('goods', 'товары')], [Concept('pop_satisfaction_with_icon', 'довольство')|e] этих [Concept('pops', 'групп населения')] будет соответствующим образом снижаться. Если значение модификатора #TOOLTIP:MODIFIER_TYPE,pop_join_rebel_threshold,X #P #V «Порог присоединения населения к мятежникам»#!#! по какой-либо причине (например, из-за нехватки [Concept('goods', 'товаров')]) будет больше, чем значение [Concept('pop_satisfaction', 'довольства')], такие [Concept('pops', 'группы населения')] могут поддержать [Concept('rebellion_with_icon', 'мятеж')|e] против [Concept('government', 'правительства')]."
 hint_pops_with_needs_yellow_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Старайтесь поддерживать [Concept('stability_with_icon', 'стабильность')|e], [Concept('legitimacy_with_icon', 'легитимность')|e] и [Concept('estate_satisfaction_with_icon', 'довольство сословий')|e] на высоком уровне, чтобы не допустить [Concept('rebellions', 'мятежей')].\n@arrow_bonus_tier_1! Наращивайте производство [Concept('goods_with_icon', 'товаров')|e], пользующихся спросом: расширяйте [Concept('rgo_with_icon', 'добычу ресурсов')|e] и стройте [Concept('buildings_with_icon', 'сооружения')|e] на @production_panel! [Link('goods_production', '', 'панели производства товаров')].\n@arrow_bonus_tier_1! Направьте [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] на импорт [Concept('goods', 'товаров')] c других [Concept('markets', 'рынков')]."
 hint_pops_with_needs_yellow_hint_text_3: "#T Дополнительные советы#!\n@hint! Пока [Concept('pops', 'население')] не бунтует, неудовлетворённые потребности подданных не должны сильно вас беспокоить. Но помните, что такие настроения в общих чертах отражают состояние [Concept('market', 'рынка')].\n@hint! Потребности групп населения — лишь один из факторов, влияющих на их [Concept('pop_satisfaction', 'довольство')]. Народ может поднять мятеж, даже если все его нужды удовлетворены.\n@hint! Узнать больше о [Concept('rebel_movements_wth_icon', 'мятежных движениях')] можно [Link('hints', 'selected_hint = hint_rebels_growing', 'здесь')]."
 hint_pops_with_needs_yellow_military: "«Сильного правителя не волнуют прихоти простолюдинов»."
 hint_pops_with_needs_yellow_administrative: "«Там, где неопытный взгляд видит обездоленное население, я вижу чудесную возможность нажиться»."
 hint_pops_with_needs_yellow_diplomatic: "«Люди всегда требуют большего, чем заслуживают. Но будьте осторожны: чрезмерная нехватка необходимого может подтолкнуть ваших подданных к мятежу»."
 ### Rebelling Pops demanding Goods
 hint_pops_with_needs_red: "Мятежное население требует товары"
 hint_pops_with_needs_red_hint_text: "$hint_pops_with_needs_yellow_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_1$\n\n$hint_pops_with_needs_red_hint_text_2$\n\n$hint_pops_with_needs_red_hint_text_3$"
 hint_pops_with_needs_red_hint_text_1: "Часть наших [Concept('pops', 'групп населения')] переходит на сторону [Concept('rebel_movements', 'мятежников')]. Если увеличить предложение необходимых [Concept('goods', 'товаров')], возможно, часть бунтующих прекратит [Concept('rebellions', 'мятеж')]."
 hint_pops_with_needs_red_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Постарайтесь повысить [Concept('stability_with_icon', 'стабильность')|e], [Concept('legitimacy_with_icon', 'легитимность')|e] и [Concept('estate_satisfaction_with_icon', 'довольство сословий')|e].\n@arrow_bonus_tier_1! Наращивайте производство [Concept('goods_with_icon', 'товаров')|e], пользующихся спросом: стройте места [Concept('rgo_with_icon', 'добычи ресурсов')|e] и [Concept('buildings_with_icon', 'сооружения')|e] на @production_panel! [Link('goods_production', '', 'панели производства товаров')].\n@arrow_bonus_tier_1! Направьте [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] на импорт [Concept('goods', 'товаров')] с других [Concept('markets', 'рынков')].\n@arrow_bonus_tier_1! В крайнем случае держите наготове [Concept('armies_with_icon', 'армии')|e], чтобы усмирить повстанцев."
 hint_pops_with_needs_red_hint_text_3: "#T Дополнительные советы#!\n@hint! Потребности групп населения — лишь один из факторов, влияющих на их [Concept('pop_satisfaction', 'довольство')]. Народ может поднять мятеж, даже если все его нужды удовлетворены.\n@hint! Узнать больше о [Concept('rebel_movements_wth_icon', 'мятежных движениях')] можно [Link('hints', 'selected_hint = hint_rebels_growing', 'здесь')]."
 hint_pops_with_needs_red_diplomatic: "«Надёжные поставки важнейших товаров — вполне действенный способ заставить мятежные голоса замолчать»."
 hint_pops_with_needs_red_administrative: "«Любой мятеж разорит наших купцов. Необходимо поскорее нарастить производство, пока народ не взялся за оружие!»"
 hint_pops_with_needs_red_military: "«Голодная толпа — это не страшно. Наша армия с ней разберётся»."
 ### Possible Reforms
 hint_has_possible_reform: "Возможные принципы"
 hint_has_possible_reform_hint_text: "$hint_has_possible_reform_hint_text_1$\n\n$hint_has_possible_reform_hint_text_2$\n\n$hint_has_possible_reform_hint_text_3$"
 hint_has_possible_reform_hint_text_1: "[Concept('government_reforms_wth_icon', 'Государственные принципы')|e] — одна из важнейших особенностей нашей [Concept('country_wth_icon', 'державы')|e]. [Concept('reforms', 'Принципы')] следует принимать сразу, как только это становится возможно."
 hint_has_possible_reform_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Нажмите на изображение плюса под карточкой #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителей#!#! на @government_panel![Link('government', 'tabcontent = estates', 'панели правительства')], чтобы принять новый [Concept('reform', 'принцип')]."
 hint_has_possible_reform_hint_text_3: "#T Дополнительные советы#!\n@hint! В ходе игры вам будут открываться новые [Concept('government_reforms', 'государственные принципы')] благодаря [Concept('advances_with_icon', 'улучшениям')|e] и [Concept('events_with_icon', 'событиям')|e].\n@hint! На отмену [Concept('government_reforms', 'государственных принципов')] тратится [Concept('stability_with_icon', 'стабильность')|e], а их принятие требует много времени. Старайтесь выбирать принципы осмотрительно.\n@hint! Определённые [Concept('government_reforms', 'принципы')] требуют смещения [Concept('country', 'державы')] в сторону какой-либо [Concept('societal_value_with_icon', 'общественной ценности')|e]."
 hint_has_possible_reform_diplomatic: "«Чётко выстроенное правительство — признак здоровой власти»."
 hint_has_possible_reform_administrative: "«Нельзя, чтобы иностранные державы превратно толковали суть нашего правительства, — ведь им надо знать, как к нам обращаться»."
 hint_has_possible_reform_military: "«Как мы собираемся защищаться от врагов, если мы даже не можем сказать, кто мы есть?»"
 ### Non-integrated Provinces
 hint_has_conquered_provinces: "Неинтегрированные провинции"
 hint_has_conquered_provinces_hint_text: "$hint_has_conquered_provinces_hint_text_1$\n\n$hint_has_conquered_provinces_hint_text_2$\n\n$hint_has_conquered_provinces_hint_text_3$"
 hint_has_conquered_provinces_hint_text_1: "[Concept('conquered_with_icon', 'Завоёванные')|e] [Concept('locations_with_icon', 'районы')|e] нужно [Concept('integrated_with_icon', 'интегрировать')|e] в состав нашей державы, чтобы они приумножали её богатство. Все [Concept('locations_with_icon', 'районы')|e] следует [Concept('integrate', 'интегрировать')] как можно скорее."
 hint_has_conquered_provinces_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Поручите [Concept('cabinet_with_icon', 'совету')|e] #TOOLTIP:CABINET_ACTION,integrate_province,X #L интегрировать провинцию#!#!, выбрав это действие на @government_panel! [Link('government', 'tabcontent = cabinet', 'панели правительства')].\n@arrow_bonus_tier_1! Если [Concept('cabinet', 'совет')] не поспевает за нашими темпами завоеваний, можно создать [Concept('subject_with_icon', 'ленника')|e], который будет править там вместо нас. Чтобы это сделать, откройте @diplomacy_panel! [Link('diplomacy', 'relations_tab = current_relations', 'панель дипломатии')]."
 hint_has_conquered_provinces_hint_text_3: "#T Дополнительные советы#!\n@hint! В экспансионистских [Concept('countries_with_icon', 'державах')|e] интеграция новых территорий — одна из важнейших задач [Concept('cabinet_with_icon', 'совета')|e].\n@hint! [Concept('pop_satisfaction_with_icon', 'Довольство')|e] населения в [Concept('conquered', 'завоёванных')] [Concept('locations', 'районах')] будет значительно ниже, что может привести к [Concept('rebellions_with_icon', 'мятежу')|e].\n@hint! Чтобы ускорить интеграцию, назначьте более талантливых [Concept('characters_with_icon', 'персонажей')|e] на должности [Concept('cabinet_members_with_icon', 'членов совета')|e]. Кроме того, скорость интеграции напрямую зависит от общей [Concept('cabinet_efficiency_with_icon', 'эффективности совета')|e] нашей [Concept('country', 'державы')].\n@hint! Интеграция района пройдёт быстрее, если наша [Concept('primary_culture_with_icon', 'основная культура')|e] одновременно является там [Concept('dominant_culture_with_icon', 'доминирующей')|e] или если наше [Concept('cultural_influence_with_icon', 'культурное влияние')|e] сильнее [Concept('cultural_tradition_with_icon', 'традиций')|e] [Concept('dominant_culture', 'доминирующей культуры')]."
 hint_has_conquered_provinces_diplomatic: "«Подданные, которых мы только что… #italic приобрели#!, не сразу примут нашу власть. Интеграция — долгий и трудоёмкий процесс, но он крайне важен для поддержания стабильности»."
 hint_has_conquered_provinces_administrative: "«Никакое дело не будет спориться, если в стране царит хаос. Для процветания необходима власть закона»."
 hint_has_conquered_provinces_military: "«От бюрократов иногда бывает польза: без умелых управленцев мы ни за что не смогли бы согнать людей в ополчение»."
 ### Possible Cabinet Actions
 hint_has_possible_cabinet_action: "Возможные действия совета"
 hint_has_possible_cabinet_action_hint_text: "$hint_has_possible_cabinet_action_hint_text_1$\n\n$hint_has_possible_cabinet_action_hint_text_2$\n\n$hint_has_possible_cabinet_action_hint_text_3$"
 hint_has_possible_cabinet_action_hint_text_1: "[Concept('cabinet_actions_wth_icon', 'Действия совета')|e] — один из самых действенных инструментов по управлению державой. Следует постоянно следить за тем, чтобы [Concept('cabinet_seats_wth_icon', 'места в совете')|e] не пустовали."
 hint_has_possible_cabinet_action_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Откройте @government_panel! [Link('government', 'tabcontent = cabinet', 'панель правительства')], чтобы ознакомиться с доступными действиями совета.\n@arrow_bonus_tier_3! #TOOLTIP:CABINET_ACTION,integrate_province,X #L Интеграция провинции#!#! полезна, если недавно мы [Concept('conquered_with_icon', 'завоевали')|e] какую-либо территорию.\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,stabilize_country,X #L Повышение стабильности в державе#!#! полезно, если в державе низкая [Concept('stability_with_icon', 'стабильность')|e].\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,strengthen_government,X #L Укрепление правительства#!#! полезно, если у нас низкая [Concept('legitimacy_with_icon', 'легитимность')|e].\n@arrow_bonus_tier_2! #TOOLTIP:CABINET_ACTION,diplomatic_endeavors,X #L Дипломатические усилия#!#! облегчают [Concept('diplomacy_with_icon', 'дипломатию')|e].\n@arrow_bonus_tier_1! #TOOLTIP:CABINET_ACTION,change_societal_values,X #L Изменение общественных ценностей#!#! полезно, если мы хотим двигаться по определённой шкале [Concept('societal_value_with_icon', 'ценностей')|e].\n@arrow_bonus_tier_1! #TOOLTIP:CABINET_ACTION,develop_province,X #L Развитие провинции#!#! поможет нам укрепить [Concept('development_with_icon', 'развитие')|e] в самых ценных [Concept('provinces_with_icon', 'провинциях')|e].\n@arrow_bonus_tier_1! С помощью [Concept('cabinet_actions', 'действий совета')] также можно [Concept('convert_with_icon', 'обращать')|e] приверженцев других [Concept('religions_with_icon', 'религий')|e] в свою или [Concept('assimilate_with_icon', 'ассимилировать')|e] другие [Concept('cultures_with_icon', 'культуры')|e].\n@automation! Также деятельность совета можно автоматизировать — для этого откройте @automation! [Link('automation', '', 'панель автоматизации')]."
 hint_has_possible_cabinet_action_hint_text_3: "#T Дополнительные советы#!\n@hint! Назначенные в [Concept('cabinet_with_icon', 'совет')|e] [Concept('characters_with_icon', 'персонажи')|e] увеличивают [Concept('estate_power_with_icon', 'власть')|e] своего [Concept('estate_with_icon', 'сословия')|e].\n@hint! В последующие [Concept('ages_with_icon', 'эпохи')|e] станут доступны новые [Concept('cabinet_actions', 'действия совета')]."
 hint_has_possible_cabinet_action_diplomatic: "«Бюрократия — плоть и кровь любой державы… при условии, что ей не управляют дураки»."
 hint_has_possible_cabinet_action_administrative: "«Совет — главная сила государства, превращающая бесплодные пустыни в процветающие города»."
 hint_has_possible_cabinet_action_military: "«Сильный совет способен усмирить любых несогласных, сколь бы громкими они ни были.\nЛишь отдайте приказ — и он будет исполнен»."
 ### Laws not codified
 hint_has_possible_law: "Правила не систематизированы"
 hint_has_possible_law_hint_text: "$hint_has_possible_law_hint_text_1$\n\n$hint_has_possible_law_hint_text_2$\n\n$hint_has_possible_law_hint_text_3$"
 hint_has_possible_law_hint_text_1: "Следует озаботиться тем, чтобы в отношении каждого [Concept('laws_with_icon', 'правила')|e] нашей [Concept('country_with_icon', 'державы')|e] постоянно действовала какая-либо [Concept('policy_with_icon', 'политика')|e], иначе мы упустим некоторые полезные преимущества."
 hint_has_possible_law_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Щёлкните по уведомлению, чтобы просмотреть [Concept('laws', 'правила')], в отношении которых не действует какая-либо [Concept('policy', 'политика')]. Выбирайте осмотрительно.\n@arrow_bonus_tier_3! Увидеть действующие [Concept('laws', 'правила')] можно на @government_panel! [Link('government', 'tabcontent = politics', 'панели правительства')].\n@automation! Правила также можно автоматизировать — для этого откройте @automation! [Link('automation', '', 'панель автоматизации')]."
 hint_has_possible_law_hint_text_3: "#T Дополнительные советы#!\n@hint! На принятие [Concept('policies', 'политик')] требуется время, которое зависит от нашей [Concept('legislative_efficiency_with_icon', 'законодательной эффективности')|e]. Эффект от принятия политики не сразу проявится в полной мере.\n@hint! Принятую [Concept('policy', 'политику')] впоследствии можно будет изменить, потратив на это [Concept('gold_with_icon', 'дукаты')|e] и [Concept('stability_with_icon', 'стабильность')|e]. Объём затрат зависит от нашей [Concept('crown_power_with_icon', 'власти правителей')|e].\n@hint! В последующие [Concept('ages_with_icon', 'эпохи')|e] станут доступны новые [Concept('laws', 'правила')] и [Concept('policies', 'политики')]."
 hint_has_possible_law_diplomatic: "«Государство без правил — как здание без опор или тело без конечностей: лучше избыток, чем недостаток»."
 hint_has_possible_law_administrative: "«Свод правил державы должен преследовать три цели: развитие городов, защиту купцов и своевременный сбор налогов»."
 hint_has_possible_law_military: "«Принимать новые правила — важно, обеспечивать их соблюдение — жизненно важно»."
 ### Lack of commander
 hint_has_army_without_leader: "Нет командира"
 hint_has_army_without_leader_hint_text: "$hint_has_army_without_leader_hint_text_1$\n\n$hint_has_army_without_leader_hint_text_2$\n\n$hint_has_army_without_leader_hint_text_3$"
 hint_has_army_without_leader_hint_text_1: "Чтобы наши [Concept('units_with_icon', 'отряды')|e] успешно сражались в [Concept('battle_with_icon', 'бою')|e], им нужен [Concept('commander_with_icon', 'командир')|e]. [Concept('armies', 'Армиями')] командуют [Concept('generals_with_icon', 'генералы')|e], а [Concept('navies', 'флотами')] — [Concept('admirals', 'адмиралы')]."
 hint_has_army_without_leader_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Щёлкните по #W уведомлению#!, чтобы выбрать [Concept('character_with_icon', 'персонажа')|e], подходящего для управления [Concept('unit', 'отрядом')]. Командирами лучше назначать персонажей с высоким уровнем [Concept('abilities_with_icon', 'навыков')|e].\n@arrow_bonus_tier_2! Также [Concept('unit', 'отряд')] можно выбрать на карте или в #W планировщике#!.\n@arrow_bonus_tier_2! Если у вас нет достаточно умелых [Concept('character', 'персонажей')], потенциального командира можно попробовать обучить на @military_panel! [Link('unit_overview', '', 'панели отрядов')].\n@automation! Назначение [Concept('generals', 'генералов')] и [Concept('admirals', 'адмиралов')] можно автоматизировать — для этого откройте @automation! [Link('automation', '', 'панель автоматизации')]."
 hint_has_army_without_leader_hint_text_3: "#T Дополнительные советы#!\n@hint! Не начинайте [Concept('battle', 'битву')], если у вас нет умелого [Concept('commander_with_icon', 'командира')|e]!\n@hint! Некоторые [Concept('characters_with_icon', 'персонажи')|e] обладают [Concept('traits_with_icon', 'свойствами')|e], которые позволяют им лучше выполнять определённые задачи.\n@hint! Некоторые [Concept('laws_with_icon', 'правила')|e] ограничивают право определённых [Concept('characters_with_icon', 'персонажей')|e] занимать командную должность."
 hint_has_army_without_leader_diplomatic: "«Любой армии всегда нужен полководец. Нам, однако, следует быть осторожными: за счёт влияния командиров будет увеличиваться власть их сословия»."
 hint_has_army_without_leader_administrative: "«Прошу, не обращайтесь с этим ко мне. Столь грубое дело, как война, я предпочитаю доверять менее… #italic утончённым#! советникам»."
 hint_has_army_without_leader_military: "«Атаковать врага, когда в отряде нет достойного командира, — это самоубийство.\nНи в коем случае не стоит так поступать»."
 ### Underage Heir
 hint_is_heir_underage: "Несовершеннолетний наследник"
 hint_is_heir_underage_hint_text: "$hint_is_heir_underage_hint_text_1$\n\n$hint_is_heir_underage_hint_text_2$"
 hint_is_heir_underage_hint_text_1: "Если наш [Concept('ruler_with_icon', 'правитель')|e] умрёт, прежде чем [Concept('heir_with_icon', 'наследник')|e] достигнет совершеннолетия, в державе установится [Concept('regency_with_icon', 'регентство')|e]. Бразды правления возьмёт — в зависимости от обстоятельств — представитель самого влиятельного [Concept('estate_with_icon', 'сословия')|e]. На время междуцарствия [Concept('estate_power_with_icon', 'власть')|e] этого сословия значительно вырастет."
 hint_is_heir_underage_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_1! В этом случае вам остаётся лишь одно: ждать… и, возможно, не рисковать жизнью [Concept('ruler', 'правителя')] попусту. Если только [Concept('ruler', 'правитель')], конечно, не окажется совсем неумелым…"
 hint_is_heir_underage_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('regency_with_icon', 'Регентство')|e] — не самый плохой исход, если взять на себя эту ответственность может достаточно умелый [Concept('character_with_icon', 'персонаж')|e]."
 hint_is_heir_underage_diplomatic: "«Обеспечить себе преемственность значит обеспечить державе будущее»."
 hint_is_heir_underage_administrative: "«Нет более надёжных способов сблизить две державы, чем брак и династические узы»."
 hint_is_heir_underage_military: "«Воспитывать из наследников достойных правителей лучше всего, когда те ещё молоды»."
 ### Unmarried Ruler
 hint_has_unmarried_adult_ruler: "Правитель не в браке"
 hint_has_unmarried_adult_ruler_hint_text: "$hint_has_unmarried_adult_ruler_hint_text_1$\n\n$hint_has_unmarried_adult_ruler_hint_text_2$\n\n$hint_has_unmarried_adult_ruler_hint_text_3$"
 hint_has_unmarried_adult_ruler_hint_text_1: "Мы должны устроить [Concept('ruler_with_icon', 'правителю')|e] брак по возможности с достойным кандидатом, чтобы [Concept('dynasty_with_icon', 'династия')|e] стала больше и сильнее. Плодовитый королевский отпрыск не только обеспечит нам мирную и стабильную преемственность — [Concept('characters_with_icon', 'персонажи')|e]-принцы неплохо проявляют себя на правительственных должностях."
 hint_has_unmarried_adult_ruler_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Щёлкните по уведомлению, чтобы подыскать кандидатов для [Concept('royal_marriage_with_icon', 'династического брака')|e]. Монархические державы могут заключать между собой династические браки, чтобы закрепить [Concept('opinion', 'мнение')] друг о друге и заложить основы для будущего [Concept('alliance_with_icon', 'союза')|e]. Кроме того, [Concept('royal_marriages_with_icon', 'династические браки')|e] — это шаг на пути к [Concept('personal_union_with_icon', 'личной унии')|e].\n@arrow_bonus_tier_2! Заключить брак между вашим [Concept('ruler', 'правителем')] или [Concept('heir', 'наследником')] и подходящим [Concept('character_with_icon', 'персонажем')|e] можно при дворе. Для этого выберите #TOOLTIP:CHARACTER_INTERACTION,marry_noble,X #L брак со знатным человеком#!#!, щёлкнув правой кнопкой мыши по портрету персонажа.\n@arrow_bonus_tier_1! Если нет более приемлемых вариантов, всегда доступна крайняя и непопулярная мера — #TOOLTIP:CHARACTER_INTERACTION,marry_lowborn,X #L брак с простолюдином#!#!."
 hint_has_unmarried_adult_ruler_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('characters', 'Персонажи')] из правящей [Concept('dynasty', 'династии')] всегда принадлежат к сословию #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителей#!#!, поэтому их назначение на ответственные [Concept('roles_with_icon', 'роли')|e] не укрепляет власть других [Concept('estates_with_icon', 'сословий')|e] нашей державы."
 hint_has_unmarried_adult_ruler_diplomatic: "$hint_is_heir_underage_diplomatic$"
 hint_has_unmarried_adult_ruler_administrative: "$hint_is_heir_underage_administrative$"
 hint_has_unmarried_adult_ruler_military: "«Всякому мечу требуются ножны»."
 ### No current Research
 hint_can_do_more_research: "Исследования"
 hint_can_do_more_research_hint_text: "$hint_can_do_more_research_hint_text_1$\n\n$hint_can_do_more_research_hint_text_2$\n\n$hint_can_do_more_research_hint_text_3$"
 hint_can_do_more_research_hint_text_1: "В нашей [Concept('country_with_icon', 'державе')|e] постоянно должны исследоваться новые [Concept('advances_with_icon', 'улучшения')|e]."
 hint_can_do_more_research_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Откройте @advances_panel! [Link('advances', 'subtab = research', 'панель улучшений')] и выберите необходимое.\n@arrow_bonus_tier_2! Также можно щёлкнуть по изображению пустой склянки в правом верхнем углу, чтобы открыть @advances_panel! [Link('technology_view', '', 'панель технологий')] целиком.\n@automation! Если вы пока не готовы изучать тонкости механики [Concept('advances', 'улучшений')], её можно автоматизировать — для этого откройте @automation! [Link('automation', '', 'панель автоматизации')]. Как только держава изучит новое [Concept('advance_with_icon', 'улучшение')|e], вы сразу же получите об этом уведомление."
 hint_can_do_more_research_hint_text_3: "#T Дополнительные советы#!\n@hint! Неиспользованные единицы исследования какое-то время будут копиться, а при достижении определённого предела — начнут пропадать.\n@hint! [Concept('research_progress_with_icon', 'Прогресс исследования')|e] можно ускорить, повысив средний уровень [Concept('literacy_with_icon', 'грамотности')|e] в державе, а также [Concept('estate_satisfaction_with_icon', 'довольство')|e] #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L священников#!#!."
 hint_can_do_more_research_diplomatic: "«Технологии способны значительно облегчить нам управление владениями»."
 hint_can_do_more_research_administrative: "«При достойных вложениях мы можем сделать экономику гораздо эффективнее»."
 hint_can_do_more_research_military: "«Наши профессиональные армии должны постоянно совершенствоваться, иначе мы безнадёжно отстанем от врагов»."
 ### Cabinet lacks member
 hint_lack_cabinet_for_cabinet_action: "В совете не хватает участника"
 hint_lack_cabinet_for_cabinet_action_hint_text: "$hint_lack_cabinet_for_cabinet_action_hint_text_1$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_2$\n\n$hint_lack_cabinet_for_cabinet_action_hint_text_3$"
 hint_lack_cabinet_for_cabinet_action_hint_text_1: "Эффективность [Concept('cabinet_action_with_icon', 'действия совета')|e] будет невысокой, если его будет выполнять не очень умелый [Concept('character_with_icon', 'персонаж')|e]. Всегда старайтесь заполнять все [Concept('cabinet_seats_with_icon', 'места в совете')|e], назначая на них [Concept('characters', 'персонажей')]."
 hint_lack_cabinet_for_cabinet_action_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Щёлкните по #W уведомлению#!, чтобы открыть @government_panel! [Link('government', 'tabcontent = cabinet', 'панель правительства')] и назначить на пустующее [Concept('cabinet_seat', 'место в совете')] [Concept('character_with_icon', 'персонажа')|e] с максимально высоким уровнем соответствующего [Concept('ability_with_icon', 'навыка')|e].\n@arrow_bonus_tier_1! При отсутствии умелых [Concept('characters', 'персонажей')] можно нанять нового [Concept('courtier_with_icon', 'придворного')|e].\n@automation! Совет можно автоматизировать — для этого откройте @automation! [Link('automation', '', 'панель автоматизации')]."
 hint_lack_cabinet_for_cabinet_action_hint_text_3: "#T Дополнительные советы#!\n@hint! Каждое [Concept('cabinet_action_with_icon', 'действие совета')|e] требует владения одним из трёх [Concept('abilities_with_icon', 'навыков')|e] персонажа, поэтому старайтесь выбирать членов совета в соответствии с назначаемыми задачами.\n@hint! [Concept('cabinet_members_with_icon', 'Члены совета')|e] увеличивают [Concept('estate_power_with_icon', 'власть')|e] своего [Concept('estate_with_icon', 'сословия')|e]."
 hint_lack_cabinet_for_cabinet_action_diplomatic: "«Лучше всего руководят там, где заседают только лучшие»."
 hint_lack_cabinet_for_cabinet_action_administrative: "«Чем лучше наша держава справляется со своими обязанностями, тем лучше мы выглядим в глазах других»."
 hint_lack_cabinet_for_cabinet_action_military: "«Явно демонстрировать окружающим свою силу мы сможем лишь тогда, когда нами будут править способные люди»."
 ### Inflation
 hint_inflation: "Инфляция"
 hint_inflation_hint_text: "$hint_inflation_hint_text_1$\n\n$hint_inflation_hint_text_2$"
 hint_inflation_hint_text_1: "Инфляция увеличивает все расходы нашей [Concept('country_with_icon', 'державы')|e], поэтому её роста рекомендуется избегать. Она довольно быстро повышается при [Concept('minting_with_icon', 'чеканке')|e] монет, а вот её снижение может оказаться сложной задачей."
 hint_inflation_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Рост [Concept('inflation', 'инфляции')] можно остановить, уменьшив объём [Concept('minting', 'чеканки')] с помощью соответствующего ползунка на @economy_panel! [Link('economy', '', 'панели экономики')].\n@arrow_bonus_tier_2! Если инфляция уже достигла значительного уровня, установка ползунка на минимальное значение позволит её снизить."
 hint_inflation_hint_text_3: "#T Дополнительные советы#!\n@hint! Есть и другие способы борьбы с инфляцией — например, определённые [Concept('advances_with_icon', 'улучшения')|e]."
 hint_inflation_diplomatic: "«Храни нас рок от этой невидимой болезни экономики»."
 hint_inflation_administrative: "«Чеканка монет может показаться соблазнительным решением при нехватке средств, но в перспективе она несёт одни проблемы»."
 hint_inflation_military: "«Инфляция — медленный и неумолимый убийца»."
 ### Disloyal Subjects
 hint_has_disloyal_subjects: "Нелояльные ленники"
 hint_has_disloyal_subjects_hint_text: "$hint_has_disloyal_subjects_hint_text_1$\n\n$hint_has_disloyal_subjects_hint_text_2$\n\n$hint_has_disloyal_subjects_hint_text_3$"
 hint_has_disloyal_subjects_hint_text_1: "[Concept('subjects_with_icon', 'Ленники')|e] — это [Concept('countries_with_icon', 'державы')|e], так или иначе подчинённые нашей власти. Обычно они платят нам [Concept('subject_taxation_with_icon', 'налоги')|e] и поддерживают нас в [Concept('wars_with_icon', 'войнах')|e].\n\nЕсли [Concept('subject_loyalty_with_icon', 'лояльность ленника')|e] опустится ниже #W 50#! ед., он станет нелояльным и откажется оказывать нам [Concept('wars', 'военную')] помощь. Нелояльные ленники могут объединиться, начав #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,independence_movement,X #L движение за независимость#!#!, и даже объявить нам [Concept('war', 'войну')], если наберут достаточно силы."
 hint_has_disloyal_subjects_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Следите, чтобы [Concept('opinion_with_icon', 'мнение')|e] ленника о нас было достаточно хорошим. Это мнение можно улучшать с помощью [Concept('diplomatic_action_with_icon', 'дипломатического действия')|e] «$IMPROVE_RELATIONTITLE$».\n@arrow_bonus_tier_1! Также стоит рассмотреть [Concept('annexing_with_icon', 'присоединение')|e] других лояльных ленников: рост нашей относительной мощи положительно скажется на лояльности.\n@arrow_bonus_tier_1! Увеличение численности [Concept('armies_with_icon', 'армий')|e] также повышает лояльность ленников, устрашая их."
 hint_has_disloyal_subjects_hint_text_3: "#T Дополнительные советы#!\n@hint! Информацию обо всех ленниках можно найти на панели управления ленниками, которая расположена на @diplomacy_panel! [Link('diplomacy', 'relations_tab = current_relations', 'панели дипломатии')].\n@hint! Чем больше у нас [Concept('subjects', 'ленников')|e] и чем выше их относительная мощь, тем труднее обеспечивать их [Concept('subject_loyalty', 'лояльность')].\n@hint! Различные типы [Concept('subjects', 'ленников')] обладают разными свойствами и ограничениями." ##
 hint_has_disloyal_subjects_diplomatic: "«Нам следует поддерживать хорошие отношения с ленниками, иначе они начнут считать себя хозяевами своей судьбы»."
 hint_has_disloyal_subjects_administrative: "«Ленники приносят немалую выгоду нашей казне.\nГлавное, чтобы они об этом не догадывались»."
 hint_has_disloyal_subjects_military: "«Эти овцы сбегут из стада при первой же возможности. Мы должны быть готовы спустить на них псов войны!»"
 ### Buildings missing inputs
 hint_has_buildings_missing_input: "Сооружениям не хватает ресурсов"
 hint_has_buildings_missing_input_hint_text: "$hint_has_buildings_missing_input_hint_text_1$\n\n$hint_has_buildings_missing_input_hint_text_2$\n\n$hint_has_buildings_missing_input_hint_text_3$"
 hint_has_buildings_missing_input_hint_text_1: "Чтобы [Concept('buildings_with_icon', 'сооружения')|e] могли работать как следует, им нужен доступ к [Concept('goods_with_icon', 'товарам')|e] на [Concept('markets', 'рынках')]. Если они не могут получить все нужные [Concept('goods', 'товары')], их эффективность снижается."
 hint_has_buildings_missing_input_hint_text_2: "#T Рекомендации#!\n$hint_address_shortage_text$"
 hint_has_buildings_missing_input_hint_text_3: "#T Дополнительные советы#!\n@hint! Не все сооружения являются критически важными для нашей державы, но некоторые стратегические цепочки должны функционировать бесперебойно.\n@hint! Например, если наша #TOOLTIP:BUILDING_TYPE,'weapon_guild,X #L гильдия ружейников#!#!#! не сможет закупить на [Concept('market', 'рынке')] достаточно #TOOLTIP:GOODS,lumber,X #L лесоматериалов#!#!, мы не сможем нанимать #TOOLTIP:UNITTYPE,a_footmen,X #L пехоту#!#!."
 hint_has_buildings_missing_input_diplomatic: "«Некоторые сооружения особенно важны для жизни нашей державы»."
 hint_has_buildings_missing_input_administrative: "«Обычно купцы сами устраняют любой дефицит товаров, но иногда невидимую руку рынка нужно… немного направить»."
 hint_has_buildings_missing_input_military: "«Прежде чем начинать любую военную кампанию, мы должны обеспечить бесперебойные поставки оружия и других припасов для армии»."
 hint_address_shortage_text: "Щёлкнув по #W уведомлению#!, вы перейдёте на @production_panel! [Link('goods_production', '', 'панель производства товаров')] со списком [Concept('goods', 'товаров')], которых не хватает на соответствующем [Concept('market', 'рынке')].\nЕсть три основных способа увеличить [Concept('supply_with_icon', 'предложение')|e] определённого [Concept('good_with_icon', 'товара')|e] на [Concept('markets_with_icon', 'рынках')|e].\n\n@arrow_bonus_tier_3! Нажмите кнопку @rgo! «[Concept('rgo', 'Добыча ресурсов')|e]», чтобы увидеть список [Concept('locations', 'районов')] этого [Concept('market', 'рынка')], где добывается соответствующий [Concept('rgo', 'ресурс')]. Помните, что в местах [Concept('rgo', 'добычи ресурсов')|e] производится только [Concept('raw_materials_with_icon', 'сырьё')|e].\n@arrow_bonus_tier_2! Нажмите кнопку @building! «[Concept('building', 'Сооружения')|e]», чтобы увидеть список всех доступных [Concept('buildings', 'сооружений')|e], способных производить нужный [Concept('good', 'товар')].\n@arrow_bonus_tier_2! Нажмите кнопку @import! «[Concept('import', 'Импорт')|e]», чтобы импортировать [Concept('good', 'товар')] с другого рынка, задействуя [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e].\n@automation! Автоматизировать строительство [Concept('building', 'сооружений')] и мест [Concept('rgo', 'добычи ресурсов')], а также [Concept('trade_with_icon', 'торговлю')|e] можно на @automation! [Link('automation', '', 'панели автоматизации')]."
 ### Construction missing input
 hint_has_constructions_missing_input: "Строительству не хватает ресурсов"
 hint_has_constructions_missing_input_hint_text: "$hint_has_constructions_missing_input_hint_text_1$\n\n$hint_has_constructions_missing_input_hint_text_2$\n\n$hint_has_constructions_missing_input_hint_text_3$"
 hint_has_constructions_missing_input_hint_text_1: "Всем [Concept('constructions_with_icon', 'стройкам')|e] нужен доступ к определённым [Concept('goods_with_icon', 'товарам')|e] на [Concept('market_with_icon', 'рынке')|e] своего [Concept('location_with_icon', 'района')|e]. Если [Concept('goods', 'товаров')] будет недостаточно, [Concept('construction', 'строительство')|e] остановится."
 hint_has_constructions_missing_input_hint_text_2: "#T Рекомендации#!\n$hint_address_shortage_text$"
 hint_has_constructions_missing_input_hint_text_3: "#T Дополнительные советы#!\n@hint! Разные [Concept('location', 'районы')] получают [Concept('goods', 'товары')] на [Concept('market', 'рынке')] в порядке своего [Concept('market_access_with_icon', 'доступа к рынку')|e] независимо от того, где произведены эти товары.\n@hint! Это значит, что [Concept('location', 'районам')], расположенным ближе к [Concept('market_centers_with_icon', 'рыночному центру')|e], проще получить любые необходимые товары."
 hint_has_constructions_missing_input_diplomatic: "«Внимательный контроль за ресурсами и потребностями жизненно важен для любого предприятия»."
 hint_has_constructions_missing_input_administrative: "«Дипломатия и торговля обеспечат нам всё, что мы не можем производить сами»."
 hint_has_constructions_missing_input_military: "«Мы должны быть способны сами удовлетворять свои потребности, чтобы другие не могли воспользоваться нашими слабостями»."
 ### Construction missing input
 hint_lack_pop_promotion_to_fill_buildings: "Сооружениям или местам [Concept('rgo', 'добычи ресурсов')] не хватает работников"
 hint_lack_pop_promotion_to_fill_buildings_hint_text: "$hint_lack_pop_promotion_to_fill_buildings_hint_text_1$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_2$\n\n$hint_lack_pop_promotion_to_fill_buildings_hint_text_3$"
 hint_lack_pop_promotion_to_fill_buildings_hint_text_1: "Разным [Concept('buildings_with_icon', 'сооружениям')|e] требуются работники из разных [Concept('pop_types_with_icon', 'общественных классов')|e]. Если после возведения [Concept('building', 'сооружения')] рядом не окажется достаточно [Concept('pops_with_icon', 'групп населения')|e] нужного [Concept('pop_types', 'класса')], сооружение начнёт [Concept('promote_with_icon', 'повышать')|e] класс #TOOLTIP:POPTYPE,peasants,X #L крестьян#!#! со скоростью, зависящей от модификатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Скорость повышения местных групп населения»#!#!#! для данного [Concept('location_with_icon', 'района')|e].\n\nСооружения также могут терять работников, когда [Concept('pops', 'группы населения')] погибают из-за [Concept('diseases_with_icon', 'эпидемий')|e], [Concept('sieges_with_icon', 'осад')|e] и [Concept('starvation_with_icon', 'голода')|e]."
 hint_lack_pop_promotion_to_fill_buildings_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Не стройте сооружения в тех [Concept('locations', 'районах')], где уже есть существенный дефицит работников.\n@arrow_bonus_tier_2! Развивайте показатели [Concept('location', 'района')], которые ускоряют повышение класса его групп населения: [Concept('stability_with_icon', 'стабильность')|e], [Concept('literacy_with_icon', 'грамотность')|e] и [Concept('control_with_icon', 'контроль')|e].\n@arrow_bonus_tier_1! Стройте #TOOLTIP:BUILDING_TYPE,library,X #L библиотеки#!#! и #TOOLTIP:BUILDING_TYPE,university,X #L университеты#!#! в самых важных [Concept('locations', 'районах')].\n@arrow_bonus_tier_1! Попробуйте снести не самые нужные [Concept('buildings', 'сооружения')], чтобы высвободить рабочую силу."
 hint_lack_pop_promotion_to_fill_buildings_hint_text_3: "#T Дополнительные советы#!\n@hint! В [Concept('urban_locations_with_icon', 'городских районах')|e] больше базовая доля [Concept('pops', 'групп населения')] из [Concept('upper_class_with_icon', 'высшего общества')|e].\n@hint! Помните, что для [Concept('promote', 'повышения')|e] в [Concept('location', 'районе')] должно быть [Concept('available_with_icon', 'доступно')|e] достаточное количество #TOOLTIP:POPTYPE,peasants,X крестьян#!#!.\n@hint! Узнать значение модификатора #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V «Скорость повышения местных групп населения»#!#!#! в [Concept('location', 'районе')] можно на #W вкладке «Демография»#! #W панели района#!."
 hint_lack_pop_promotion_to_fill_buildings_diplomatic: "«Что это за промышленность, если ей некому заниматься?»"
 hint_lack_pop_promotion_to_fill_buildings_administrative: "«Если наши подданные не будут работать, другие страны могут счесть нас лентяями»."
 hint_lack_pop_promotion_to_fill_buildings_military: "«Долг населения — производить всё, в чём нуждается страна»."
 ### Casus Belli
 hint_casus_belli: "Повод для войны"
 hint_casus_belli_hint_text: "$hint_casus_belli_hint_text_1$\n\n$hint_casus_belli_hint_text_2$\n\n$hint_casus_belli_hint_text_3$"
 hint_casus_belli_hint_text_1: "[Concept('casus_belli_with_icon', 'Повод для войны')|e] — это законная причина начать [Concept('war_with_icon', 'конфликт')|e] с другой державой. Развязать войну можно и без повода, но в таком случае нам будет труднее навязать свои требования при заключении [Concept('peace_treaty_with_icon', 'мирного договора')|e], а соседи будут реагировать на наши действия более враждебно."
 hint_casus_belli_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Повод для войны проще всего получить, запросив его у [Concept('parliament_with_icon', 'парламента')|e]. Созвать заседание парламента можно на @government_panel! [Link('government', 'tabcontent = parliament', 'панели правительства')].\n@arrow_bonus_tier_2! Создав [Concept('spy_network_with_icon', 'шпионскую сеть')|e] в других [Concept('countries', 'державах')|e], мы сможем фабриковать поводы для войны с ними, если у нас есть [Concept('cores_with_icon', 'национальные районы')|e] на их территории или если они являются нашими [Concept('rivals_with_icon', 'соперниками')|e]."
 hint_casus_belli_hint_text_3: "#T Дополнительные советы#!\n@hint! Помните, что [Concept('wars', 'войны')] далеко не всегда справедливы и порой начинаются безо всякого повода. Разумеется, достойный повод для войны не бывает лишним, но и без него всё решает право сильного, а победителей не судят.\n@hint! Каждый повод для войны ставит перед вами определённую [Concept('war_goal_with_icon', 'цель')|e]. Достигнув этой [Concept('war_goal', 'цели')] в ходе [Concept('war', 'войны')], мы получим [Concept('war_score_with_icon', 'военный счёт')|e], который имеет решающее значение для победы.\n@hint! Некоторые [Concept('events_with_icon', 'события')|e] и [Concept('situations_with_icon', 'ситуации')|e] могут давать нам особые поводы для войн."
 hint_casus_belli_diplomatic: "«Даже на войне есть правила, которые нужно соблюдать»."
 hint_casus_belli_administrative: "«С хорошим поводом мы можем объявить войну, не навлекая на себя гнев соседей»."
 hint_casus_belli_military: "«Лучший повод для войны, милорд, это отсутствие всякого повода»."
 ### Levies
 hint_has_unraised_levies_in_war: "Ополчение"
 hint_has_unraised_levies_in_war_hint_text: "$hint_has_unraised_levies_in_war_hint_text_1$\n\n$hint_has_unraised_levies_in_war_hint_text_2$\n\n$hint_has_unraised_levies_in_war_hint_text_3$"
 hint_has_unraised_levies_in_war_hint_text_1: "В первые века игры, когда [Concept('regulars_wth_icon', 'регулярные войска')|e] ещё не появились, основой вооружённых сил всех [Concept('country_wth_icon', 'держав')|e] является [Concept('levies_wth_icon', 'ополчение')|e]. Его настоятельно рекомендуется собирать в случае любой [Concept('war_wth_icon', 'войны')|e]."
 hint_has_unraised_levies_in_war_hint_text_2: "#T Рекомендованные действия#!\n@arrow_bonus_tier_3! С началом войны щёлкните по #W уведомлению#!, чтобы открыть #W сбор ополчения#! на @military_panel! [Link('unit_overview', '', 'панели отрядов')]. Здесь можно собрать всё доступное [Concept('levies', 'ополчение')] сразу или указать отдельные [Concept('provinces_with_icon', 'провинции')|e], где будут набираться войска.\n@arrow_bonus_tier_2! Было бы неплохо снизить зависимость от [Concept('levies', 'ополчения')], заменив их более эффективными, но дорогими [Concept('regular_regiments', 'регулярными полками')]. Для этого вам потребуется построить #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерию#!#!.\n@arrow_bonus_tier_1! Если у нас достаточно денег, то дополнить или даже заменить [Concept('levies', 'ополчение')] в трудный час могут [Concept('mercenaries_with_icon', 'наёмники')|e]. Их можно вербовать на @military_panel! [Link('unit_overview', '', 'панели отрядов')]."
 hint_has_unraised_levies_in_war_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('levies', 'Ополчение')] набирается преимущественно из [Concept('pops_wth_icon', 'групп населения')|e] ваших [Concept('primary_culture_wth_icon', 'основной')|e] и [Concept('accepted_culture_wth_icon', 'признанных культур')|e], но количество, призываемое из конкретного [Concept('location', 'района')], зависит от [Concept('control_wth_icon', 'контроля')|e] над ним.\n@hint! Производство [Concept('food_wth_icon', 'пищи')|e] и [Concept('rgo_wth_icon', 'добыча ресурсов')|e] в [Concept('locations', 'районах')], где было собрано ополчение, снижается до тех пор, пока воины не вернутся домой.\n@hint! Действуйте осмотрительно: погибшие на войне крестьяне уже не смогут работать в поле."
 hint_has_unraised_levies_in_war_diplomatic: "«Люди должны трудиться, но они должны и защищать свои дома»."
 hint_has_unraised_levies_in_war_administrative: "«Если народ верит нам, он всегда придёт нам на помощь»."
 hint_has_unraised_levies_in_war_military: "«Невспаханное поле — не повод отлынивать от войны»."
 ### No allies
 hint_no_allies: "Нет союзников"
 hint_no_allies_hint_text: "$hint_no_allies_hint_text_1$\n\n$hint_no_allies_hint_text_2$\n\n$hint_no_allies_hint_text_3$"
 hint_no_allies_hint_text_1: "[Concept('alliance_with_icon', 'Союзом')|e] называется [Concept('treaty_with_icon', 'договор')|e] между двумя [Concept('countries_with_icon', 'державами')|e], обязывающий их оказывать друг другу [Concept('wars_with_icon', 'военную')|e] поддержку. Если на нас нападут, [Concept('allies', 'союзники')] получат [Concept('call_to_arms_with_icon', 'призыв к оружию')|e] и смогут вступить в войну на нашей стороне. Если же мы сами объявим кому-либо [Concept('war', 'войну')|e], союзники нашего врага с большой вероятностью выступят против нас."
 hint_no_allies_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Откройте @diplomacy_panel! [Link('diplomacy_macrobuilder', '', 'панель конструктора дипломатии')] и нажмите кнопку «$offer_alliance$» в разделе #W «$CATEGORY_FRIENDLY_ACTIONS$»#!. Вы увидите список всех [Concept('countries', 'держав')], готовых заключить с нами [Concept('alliance_with_icon', 'союз')|e].\n@arrow_bonus_tier_2! Некоторые [Concept('countries', 'державы')] могут согласиться на союз не сразу. Убедить их можно при помощи [Concept('diplomatic_action_with_icon', 'дипломатического действия')|e] #W «$IMPROVE_RELATIONTITLE$»#!."
 hint_no_allies_hint_text_3: "#T Дополнительные советы#!\n@hint! Будьте бдительны: у союзников также есть возможность втягивать нас в собственные войны. Не заключайте союзов со слишком уязвимыми державами, иначе мы рискуем оказаться в чужой войне на стороне проигравших.\n@hint! [Concept('call_to_arms', 'Призыв к оружию')|e] всегда можно отклонить, но это разрушит дружбу между державами и останется пятном на нашей дипломатической репутации."
 hint_no_allies_diplomatic: "«В этом мире невозможно выжить в одиночку»."
 hint_no_allies_administrative: "«Даже если мы не планируем нападать сами, союз с соседом убедит наших врагов не нападать на нас»."
 hint_no_allies_military: "«Сильный союзник может прикрыть нам тыл, когда мы пойдём в наступление»."
 ##### Situation Hints #####
 ### The Black Death
 hint_black_death: "Чёрная смерть"
 hint_black_death_hint_text: "$hint_black_death_hint_text_1$\n\n$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
 hint_black_death_hint_text_1: "Чёрной смертью называется [Concept('situation_with_icon', 'ситуация')|e], способная обернуться чудовищной бедой для Старого Света. Её причина — распространение торговли и цивилизации. Чёрная смерть опустошает густонаселённые [Concept('locations_with_icon', 'районы')|e] и сходит на нет, только когда выжившие приобретут [Concept('disease_resistance_with_icon', 'сопротивляемость эпидемиям')|e].\n\nЭпидемия губит представителей всех [Concept('pop_type_with_icon', 'общественных классов')|e], оставляя наши [Concept('buildings_with_icon', 'сооружения')|e] без рабочей силы, пока не произойдёт [Concept('promote_with_icon', 'повышение')|e] новых #TOOLTIP:POPTYPE,peasants,X #L крестьян#!#!. В результате наша [Concept('tax_base_with_icon', 'налоговая база')|e] и объёмы выпуска товаров в [Concept('buildings', 'сооружениях')] резко уменьшатся, а решающим фактором для восстановления [Concept('employment_with_icon', 'занятости')|e] станет #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V скорость повышения местных групп населения#!#!#!."
 hint_black_death_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Постройте #TOOLTIP:BUILDING_TYPE,hospital,X #L больницы#!#! в крупнейших [Concept('urban_locations_with_icon', 'городских районах')|e], прежде чем эпидемия придёт в [Concept('country_with_icon', 'державу')|e].\n@arrow_bonus_tier_2! Щёлкните по баннеру [Concept('situation', 'ситуации')], чтобы узнать о доступных вам особых действиях. Может быть, они помогут предотвратить катастрофу?\n@arrow_bonus_tier_2! Поддерживайте высокий уровень [Concept('stability_with_icon', 'стабильности')|e]. Это важно не только для предотвращения [Concept('rebellions_with_icon', 'мятежей')|e], но и для влияния на #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V скорость повышения местных групп населения#!#!#!.\n@arrow_bonus_tier_1! Не стройте новые сооружения в обезлюдевших [Concept('locations', 'районах')]: там будет некому работать.\n@arrow_bonus_tier_1! Следите за #TOOLTIP:MODIFIER_TYPE,local_pop_promotion_speed,X #P #V скоростью повышения местных групп населения#!#!#!: большинству наших [Concept('buildings', 'сооружений')] и мест [Concept('rgo_with_icon', 'добычи ресурсов')|e] требуется [Concept('promote_with_icon', 'повышение')|e] #TOOLTIP:POPTYPE,peasants,X #L крестьян#!#! до более развитых [Concept('pop_types', 'общественных классов')]."
 hint_black_death_hint_text_3: "#T Дополнительные советы#!\n@hint! Этот процесс может занять годы, но при достаточном количестве крестьян потери рабочей силы в [Concept('locations', 'районах')] со временем возместятся за счёт [Concept('promote_with_icon', 'повышения')|e] класса населения.\n@hint! Опыт преодоления этой катастрофы пригодится вам и при других бедствиях: [Concept('starvation_with_icon', 'голод')|e], [Concept('diseases_with_icon', 'эпидемии')|e] и [Concept('loot_with_icon', 'грабёж')|e] схожим образом влияют на наши земли."
 hint_black_death_diplomatic: "«Смерть скачет впереди. Беды и разрушения следуют за ней»."
 hint_black_death_administrative: "«Бледная смерть стучится и в замки королей, и в хижины бедняков»."
 hint_black_death_military: "«Явился четвёртый Всадник. Теперь нас ничто не спасёт»."
 ###Fall of Delhi
 hint_fall_of_delhi: "[GetSituationByKey('fall_of_delhi').GetNameWithNoTooltip]"
 hint_fall_of_delhi_hint_text: "$hint_fall_of_delhi_hint_text_1$\n\n$hint_fall_of_delhi_hint_text_2$\n\n$hint_fall_of_delhi_hint_text_3$\n\n$hint_fall_of_delhi_hint_text_4$"
 hint_fall_of_delhi_hint_text_1: "#TOOLTIP:SITUATION,fall_of_delhi,X #L Падение Дели#!#! — это [Concept('situation_with_icon', 'ситуация')|e], которая может привести к краху [GetCountry('DLH').Custom('rank_ru_GEN')|l]. Стервятники и потенциальные завоеватели уже собираются вдоль ослабленных границ, пока [GetCountry('DLH').GetGovernment.GetRulerOrRegent.GetName|l] утрачивает власть…"
 hint_fall_of_delhi_hint_text_2: "#T Рекомендации для Дели#!\n@arrow_bonus_tier_3! При игре за #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_ACC')|L]#!#! вам поможет множество новых [Concept('actions_with_icon', 'действий')|e], например, #TOOLTIP:GENERIC_ACTION,strengthen_neighbor_relations,X #L укрепление отношений с соседями#!#! или #TOOLTIP:GENERIC_ACTION,fall_of_delhi_appoint_governors,X #L назначение наместников#!#!.\n@arrow_bonus_tier_2! Во время [Concept('events_with_icon', 'событий')|e], связанных с этой [Concept('situation_with_icon', 'ситуацией')|e], нужно попытаться увеличить [Concept('share_of_power_gc_with_icon', 'долю власти')|e] за счёт противников, иначе наш народ ждёт незавидная участь."
 hint_fall_of_delhi_hint_text_3: "#T Дополнительные советы для Дели#!\n@hint! Нашим явным преимуществом перед врагами является мощная регулярная [Concept('army_with_icon', 'армия')|e]. В отличие от [Concept('levies_with_icon', 'ополчения')|e] наши солдаты, получающие жалование, пополняют свои ряды и куда эффективнее действуют в бою. Это основа нашего могущества, которая позволяет сохранять контроль над державой."
 hint_fall_of_delhi_hint_text_4: "#T Рекомендации для противника#!\n@arrow_bonus_tier_3! Сильнейшая [Concept('country_with_icon', 'держава')|e] Индии станет главным противником в начале [Concept('situation_with_icon', 'ситуации')|e], но это положение можем занять мы, если объявим войну и захватим первенство. Чтобы достичь этой цели, мы должны либо быть сильнейшей [Concept('country_with_icon', 'державой')|e] Индии на момент начала [Concept('situation_with_icon', 'ситуации')|e], либо победить текущего лидера и захватить первенство с помощью [Concept('peace_treaty', 'мирного договора')|e] «[ShowPeaceTreatyTypeNameWithNoTooltip('peace_seize_opposition_leadership')]»."
 hint_fall_of_delhi_diplomatic: "«Решите вы защитить трон #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! или станете соперником, важно соблюдать осторожность в отношениях с соседями. Дружба позволит выиграть время, а вражда поможет оправдать новые завоевания»."
 hint_fall_of_delhi_administrative: "«Земли, захваченные в разгар хаоса — ненадёжный приз. По возможности стоит выделять [Concept('subjects_with_icon', 'ленников')|e] или усиливать [Concept('control_with_icon', 'контроль')|e], чтобы новые территории не выскользнули из наших рук также быстро, как были получены»."
 hint_fall_of_delhi_military: "«Меч играет большую роль в этой борьбе. Сильная [Concept('army_with_icon', 'армия')|e] может спасти Дели от краха или позволить противникам сразить гиганта. Но даже победа несёт в себе риски! Не забывайте о мятежах и перенапряжении»."
 ###Rise of the Turks
 hint_rise_of_the_ottomans: "Советы по ситуации «Восхождение турок»"
 hint_rise_of_the_ottomans_hint_text: "$hint_rise_of_the_ottomans_hint_text_1$\n\n$hint_rise_of_the_ottomans_hint_text_2$"
 hint_rise_of_the_ottomans_hint_text_1: "Эта [Concept('situation_with_icon', 'ситуация')|e] отмечает восхождение #italic сильнейшего бейлика#!, которому суждено создать одну из величайших империй в истории. С помощью уникальных [Concept('events_with_icon', 'событий')|e] и [Concept('actions_with_icon', 'действий')|e] мы должны установить свою власть над другими бейликами, пересечь #TOOLTIP:PROVINCE_DEFINITION,marmara_sea_province,X #L Мраморное море#!#! и завладеть богатствами #TOOLTIP:LOCATION,constantinople,X #L Константинополя#!#!. Вечная слава ждёт!"
 hint_rise_of_the_ottomans_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_2! Нам пора возвыситься. Благодаря мощным [Concept('actions_with_icon', 'действиям')|e], таким как #TOOLTIP:GENERIC_ACTION,press_claims,X #L навязывание претензий#!#!, и выгодных [Concept('events_with_icon', 'событий')|e], ускоряющих [Concept('integration_with_icon', 'интеграцию')|e], наш расцвет войдёт в историю.\n@arrow_bonus_tier_1! Если мы возьмём под контроль #Y 120#! [Concept('locations_with_icon', 'районов')|e] и захватим плацдарм на #TOOLTIP:REGION,balkan_region,X #L Балканах#!#!, то сможем выполнить [Concept('action_with_icon', 'действие')|e] «Навязывание претензий» и в этом [Concept('region_with_icon', 'регионе')|e]."
 hint_rise_of_the_ottomans_diplomatic: "«В начале [Concept('situation_with_icon', 'ситуации')|e] будет разумно выполнять доступные [Concept('actions_with_icon', 'действия')|e], например, #TOOLTIP:GENERIC_ACTION,seek_relations_with_the_byzantines,X #L поиск связей [GetCountry('BYZ').Custom('predlog_sso')] [GetCountry('BYZ').Custom('CL_INST')]#!#!. Воспользовавшись остатками их престижа как последнего оплота Рима, мы укрепим своё наследие»."
 hint_rise_of_the_ottomans_administrative: "«Мы, несомненно, мастера завоеваний, но нельзя забывать о своих внутренних землях и сердце нашей державы. Не пренебрегайте внутренней политикой в погоне за славой на чужбине!»"
 hint_rise_of_the_ottomans_military: "«Мы должны стремиться к завоеванию [Concept('towns_and_cities_with_icon', 'городов')|e] наших врагов. Благодаря этим кампаниям мы обретём силу на много поколений вперёд»."
 ####Council of Trent
 hint_council_of_trent: "Тридентский собор"
 hint_council_of_trent_hint_text: "$hint_council_of_trent_hint_text_1$\n\n$hint_council_of_trent_hint_text_2$"
 hint_council_of_trent_hint_text_1: "Пока длится #TOOLTIP:SITUATION,council_of_trent,X #L Тридентский собор#!#!, #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католическая церковь#!#! может изменить [Concept('laws_with_icon', 'свод правил')|e] и внести новые [Concept('policies_with_icon', 'политики')|e] для всего [Concept('international_organization_with_icon', 'международного объединения')|e]."
 hint_council_of_trent_hint_text_2: "#T Возможные взаимодействия#!\n@arrow_bonus_tier_3! Как [Concept('member_with_icon', 'участник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католической церкви#!#!, ваша держава может предложить #TOOLTIP:RESOLUTION,policy_vote,X #L обсуждение правил#!#! из приведённого ниже [Concept('laws', 'свода правил')] или с панели доктрин #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католической церкви#!#!.\n@arrow_bonus_tier_2! Как [Concept('member_with_icon', 'участник')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католической церкви#!#!, ваша держава может голосовать по предложенному #TOOLTIP:RESOLUTION,policy_vote,X #L обсуждению правил#!#!."
 ###Golden Age of Piracy
 hint_golden_age_of_piracy: "Золотой век пиратства"
 hint_golden_age_of_piracy_hint_text: "$hint_golden_age_of_piracy_hint_text_1$\n\n$hint_golden_age_of_piracy_hint_text_2$\n\n$hint_golden_age_of_piracy_hint_text_3$\n\n$hint_golden_age_of_piracy_hint_text_4$"
 hint_golden_age_of_piracy_hint_text_1: "#TOOLTIP:SITUATION,golden_age_of_piracy,X #L Золотой век пиратства#!#! — это [Concept('situation_with_icon', 'ситуация')|e], которая может поспособствовать появлению новых пиратов. Свободные люди, недовольные моряки и противники централизованной власти поднимают чёрные паруса и творят беззаконие."
 hint_golden_age_of_piracy_hint_text_2: "#T Рекомендации для борьбы с пиратами#!\n@arrow_bonus_tier_3! Подумайте об уничтожении любых пиратов у наших берегов. Мы не можем допустить, чтобы они бороздили наши моря. \n@arrow_bonus_tier_2! Каждое [Concept('event_with_icon', 'событие')|e], связанное с этой [Concept('situation_with_icon', 'ситуацией')|e], может положить начало новой пиратской республике."
 hint_golden_age_of_piracy_hint_text_3: "#T Дополнительные советы#!\n@hint! Нам будут доступны новые [Concept('actions_with_icon', 'действия')|e] в этой [Concept('situation_with_icon', 'ситуации')|e] независимо от того, поднят у нас чёрный флаг или нет."
 hint_golden_age_of_piracy_hint_text_4: "#T Рекомендации для пиратов#!\n@arrow_bonus_tier_3! Разумнее всего будет защитить побережье и построить могучий [Concept('navy_with_icon', 'флот')|e]. С помощью таких [Concept('actions_with_icon', 'действий')|e], как #TOOLTIP:GENERIC_ACTION,attract_sailors,X #L привлечение моряков#!#! или #TOOLTIP:GENERIC_ACTION,migrate_to_new_waters,X #L переход в новые воды#!#!, мы сможем создать универсальный флот и поддерживать присутствие."
 hint_golden_age_of_piracy_diplomatic: "«Улыбки и ром работают лучше, чем угрозы, по крайней мере, пока не заговорят пушки. Возможно, будет разумно поддерживать крепкие отношения с негодяями. Не все сокровища — это серебро и золото, скажу я вам»."
 hint_golden_age_of_piracy_administrative: "«Управление нашими морскими владениями — непростое дело в эпоху пиратства. Боремся мы с пиратами или соперничаем с ними, главное сохранять контроль!»"
 hint_golden_age_of_piracy_military: "«Пираты не признают держав, ведь они продали свою собственную. А раз при поимке их всё равно повесят, они без зазрения совести будут жечь и убивать, если не выполнить их требования»."
 ###Hundred Years War
 hint_hundred_years_war: "Столетняя война"
 hint_hundred_years_war_hint_text: "$hint_hundred_years_war_hint_text_1$\n\n$hint_hundred_years_war_hint_text_2$\n\n$hint_hundred_years_war_hint_text_3$\n\n$hint_hundred_years_war_hint_text_4$"
 hint_hundred_years_war_hint_text_1: "#TOOLTIP:SITUATION,hundred_years_war,X #L Столетняя война#!#! — неспокойное время для всей #TOOLTIP:SUB_CONTINENT,western_europe,X #L Западной Европы#!#!! Этот период проверит на прочность союзы, и на руинах этой войны наверняка родятся новые державы."
 hint_hundred_years_war_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! И #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_DAT')|L]#!#!, и #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_DAT')|L]#!#! доступны такие действия, как #TOOLTIP:GENERIC_ACTION,request_war_entry,X #L просьба о вступлении в войну#!#!, #TOOLTIP:GENERIC_ACTION,hyw_sign_truce,X #L подписание перемирия#!#! и #TOOLTIP:GENERIC_ACTION,request_papal_delegates,X #L запрос [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатов#!#!. Это уникальные способы изменить статус-кво конфликта или даже склонить чашу весов в сторону одной из держав."
 hint_hundred_years_war_hint_text_3: "#T Дополнительные советы#!\n@hint! Мы вовлечены в конфликт, и нам может выпасть шанс заполучить земли или могучих союзников."
 hint_hundred_years_war_hint_text_4: "#T Рекомендации для #L [GetCountry('FRA').GetAdjective|l]ого#!#! [Concept('subject_with_icon', 'ленника')|e]\n@arrow_bonus_tier_3! Будет разумно #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L потребовать автономии от [GetCountry('FRA').Custom('longname_ru_wntt_GEN')]#!#!. Каждый #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанаж#!#!, выполнив это действие, может получить значительную выгоду, если воспользуется своей ролью защитника [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ой короны."
 hint_hundred_years_war_diplomatic: "«Дайте войне шанс!»"
 hint_hundred_years_war_administrative: "«Мы наверняка потеряем [Concept('control_with_icon', 'контроль')|e] над заморскими территориями. Учитывайте [Concept('proximity_with_icon', 'досягаемость')|e] нашей [Concept('capital_with_icon', 'столицы')|e] для недавно завоёванных районов»."
 hint_hundred_years_war_military: "«Ведёте войну с нашими врагами на юге за #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_ACC')|L]#!#! или #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_ACC')|L]#!#!? Возможно, стоит выполнить [Concept('action_with_icon', 'действие')|e] #TOOLTIP:GENERIC_ACTION,hyw_sign_truce,X #L „Подписание перемирия“#!#! в отношении другого могущественного соседа»."
 ###Hussite Wars
 hint_hussite_wars: "Гуситские войны"
 hint_hussite_wars_hint_text: "$hint_hussite_wars_hint_text_1$\n\n$hint_hussite_wars_hint_text_2$\n\n$hint_hussite_wars_hint_text_3$\n\n$hint_hussite_wars_hint_text_4$"
 hint_hussite_wars_hint_text_1: "Во время #TOOLTIP:SITUATION,hussite_wars,X #L гуситских войн#!#! [GetReligionByKey('catholic').GetName|l] переживает глубокий внутренний раскол. В свою очередь, [GetReligionByKey('catholic').GetAdjectiveWithNoTooltip|l]ие монархи опасаются, что если быстро не покончить с этой ересью, она может охватить значительные части #TOOLTIP:CONTINENT,europe,X #L Европы#!#! и подорвать духовную власть, которой обладает [GetCountry('PAP').GetGovernment.GetRulerTitle|l]."
 hint_hussite_wars_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! [GetCountry('PAP').GetGovernment.GetRulerTitle] постарается начать [Concept('war_with_icon', 'войну')|e] против #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_GEN')|L]#!#!. Соседние #TOOLTIP:RELIGIONGROUP,christian,X #L христианские#!#! державы могут поддержать любую из сторон, что позволяет им вершить судьбу всего [Concept('continent_with_icon', 'континента')|e]."
 hint_hussite_wars_hint_text_3: "#T Дополнительные советы#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_DAT')|L]#!#! доступно множество уникальных [Concept('actions_with_icon', 'действий')|e], в том числе #TOOLTIP:GENERIC_ACTION,convert_heretics_hw_action,X #L принудительные обращения#!#! и #TOOLTIP:GENERIC_ACTION,prepare_defenses_hw_action,X #L подготовка обороны#!#!."
 hint_hussite_wars_hint_text_4: "#T Рекомендации для #ONCLICK:COUNTRY,[GetCountry('PAP').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('PAP').Custom('CL_tt')],X [GetCountry('PAP').Custom('CL_GEN')|L]#!#!#!\n@arrow_bonus_tier_3! Хорошие отношения с другими #TOOLTIP:RELIGION,$catholic_tt$,X #L католическими#!#! державами могут дать нам шанс призвать их на помощь в борьбе. Во время этой [Concept('situation_with_icon', 'ситуации')|e] доступен уникальный [Concept('peace_treaty_with_icon', 'мирный договор')|e] #TOOLTIP:SCRIPTED_PEACE_TREATY,supress_hussite_faith,X #L «Подавление #TOOLTIP:RELIGION,hussite_tt,X #L гуситства»#!#!#!#!, который снижает стоимость [Concept('peace_treaty_with_icon', 'мирного договора')|e] #Y «Принудительное обращение»#!.\n@arrow_bonus_tier_2! #TOOLTIP:RELIGION,$catholic_tt$,X #L Католические#!#! [Concept('countries_with_icon', 'державы')|e], [Concept('war_with_icon', 'воюющие')|e] [GetCountry('BOH').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('BOH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('BOH').Custom('CL_tt')],X [GetCountry('BOH').Custom('CL_INST')|L]#!#!, получают доступ к уникальному [Concept('action_with_icon', 'действию')|e] [Concept('unit_with_icon', 'отряда')|e] #TOOLTIP:UNIT_ABILITY,hussite_tribunal,X #L «Гуситский трибунал»#!#!. Оно позволяет насильно [Concept('convert_with_icon', 'обращать')|e] #TOOLTIP:RELIGION,$hussite_tt$,X #L гуситские#!#! [Concept('pops_with_icon', 'группы населения')|e] и убивать несогласных в [Concept('province_capitals_with_icon', 'столицах провинций')|e] под контролем этих держав во время войны."
 hint_hussite_wars_diplomatic: "«Вера должна побудить нас к поиску союзников-единомышленников, чтобы пережить этот непростой период»."
 hint_hussite_wars_administrative: "«Мы должны стремиться к сохранению [Concept('religious_unity_with_icon', 'религиозного единства')|e]»."
 hint_hussite_wars_military: "«Вероятно, нам придётся силой защищать свою веру»."
 ###Italian Wars
 hint_italian_wars: "[GetSituationByKey('italian_wars').GetNameWithNoTooltip]"
 hint_italian_wars_hint_text: "$hint_italian_wars_hint_text_1$\n\n$hint_italian_wars_hint_text_2$\n\n$hint_italian_wars_hint_text_3$\n\n$hint_italian_wars_hint_text_4$"
 hint_italian_wars_hint_text_1: "#TOOLTIP:SITUATION,italian_wars,X #L Войны#!#! охватывают #TOOLTIP:REGION,italy_region,X #L Италию#!#!. Сторонние [Concept('countries_with_icon', 'державы')|e] стремятся вторгнуться в регион, а создание итальянских лиг знаменует начало эпохи разобщённости и сопротивления для защиты региона."
 hint_italian_wars_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Лидеры каждой лиги могут приглашать другие [Concept('countries_with_icon', 'державы')|e], чтобы упрочить свою власть над #TOOLTIP:REGION,italy_region,X #L Италией#!#!."
 hint_italian_wars_hint_text_3: "#T Дополнительные советы#!\n@hint! Соперники или враги лидеров каждой лиги могут #TOOLTIP:GENERIC_ACTION,iw_send_aid,X #L отправить помощь#!#! и сместить баланс в ходе важной войны."
 hint_italian_wars_hint_text_4: "#T Рекомендации для лидера #TOOLTIP:CULTUREGROUP,italian_group,X #L итальянской#!#! лиги#!\n@arrow_bonus_tier_3! Хорошие отношения с другими соседями укрепят наше [Concept('international_organization_with_icon', 'международное объединение')|e]."
 hint_italian_wars_diplomatic: "«#TOOLTIP:REGION,italy_region,X #L Италия#!#! должна принадлежать нам и нашим союзникам-единомышленникам»."
 hint_italian_wars_administrative: "«Создание [Concept('subjects_with_icon', 'ленников')|e] в #TOOLTIP:REGION,italy_region,X #L Италии#!#! укрепит наше влияние в [Concept('region', 'регионе')|e]»."
 hint_italian_wars_military: "«Мы должны подавить сопротивление — на кону богатство и власть»."
 ###Little Ice Age
 hint_little_ice_age: "[GetSituationByKey('little_ice_age').GetNameWithNoTooltip]"
 hint_little_ice_age_hint_text: "$hint_little_ice_age_hint_text_1$\n\n$hint_little_ice_age_hint_text_2$\n\n$hint_little_ice_age_hint_text_3$"
 hint_little_ice_age_hint_text_1: "Начинается [GetSituationByKey('little_ice_age').GetName]! Земли сковало холодом. Мы должны сделать всё возможное, чтобы защитить урожай и животных и обеспечить выживание нашего народа!"
 hint_little_ice_age_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Подумайте о расширении [Concept('buildings_with_icon', 'сооружений')|e], которые производят [Concept('food_with_icon', 'пищу')|e] или способствуют её производству."
 hint_little_ice_age_hint_text_3: "#T Дополнительные советы#!\n@hint! Нам доступно множество уникальных [Concept('actions_with_icon', 'действий')|e], позволяющих нарастить производство [Concept('food_with_icon', 'пищи')|e] или распределить её среди наших [Concept('provinces_with_icon', 'провинций')|e]."
 hint_little_ice_age_diplomatic: "«Близится зима»."
 hint_little_ice_age_administrative: "«Производство и распределение [Concept('food_with_icon', 'пищи')|e] спасёт наши [Concept('pops_with_icon', 'группы населения')|e] от преждевременной встречи со жнецом»."
 hint_little_ice_age_military: "«Замёрзшие водоёмы станут проходимыми на какое-то время, но [Concept('armies_with_icon', 'армии')|e] могут надолго застрять в зимних горах»."
 ###Revolution
 hint_the_revolution: "[GetSituationByKey('the_revolution').GetNameWithNoTooltip]"
 hint_the_revolution_hint_text: "$hint_the_revolution_hint_text_1$\n\n$hint_the_revolution_hint_text_2$\n\n$hint_the_revolution_hint_text_3$"
 hint_the_revolution_hint_text_1: "Вспыхнуло #TOOLTIP:SITUATION,the_revolution,X #L народное восстание#!#!! Монархии содрогнулись, а идеи свободы, равенства и братства ширятся распространяются со скоростью лесного пожара. Примем ли мы пламя перемен или встанем на защиту старого порядка?"
 hint_the_revolution_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Мы можем стать [Concept('revolutionary_with_icon', 'революционной державой')|e], приняв сторону [Concept('revolutionary_with_icon', 'мятежников')|e] во время [Concept('disaster_with_icon', 'бедствия')|e] #TOOLTIP:DISASTER_TYPE,revolution_disaster,X #L «Революция!»#!#!.\n@arrow_bonus_tier_2! Эта [Concept('situation', 'ситуация')|e] открывает #Y два#! уникальных [Concept('peace_treaties_with_icon', 'мирных договора')|e]: #TOOLTIP:SCRIPTED_PEACE_TREATY,reinstate_the_monarchy,X #L «Восстановление монархии»#!#! и «[ShowPeaceTreatyTypeNameWithNoTooltip('force_revolution')]».\n@arrow_bonus_tier_1! [Concept('situation', 'Ситуация')|e] также открывает доступ к новым [Concept('actions_with_icon', 'действиям')|e], таким как #TOOLTIP:GENERIC_ACTION,suppress_foreign_revolutionaries,X #L борьба с зарубежными революционерами#!#! и #TOOLTIP:GENERIC_ACTION,assist_foreign_revolutionaries,X #L помощь зарубежным революционерам#!#!."
 hint_the_revolution_hint_text_3: "#T Дополнительные советы#!\n@hint! Сильнейшая революционная держава сможет принять на себя роль [Concept('revolutionary_target_with_icon', 'цели-революционера')|e], если наберёт самый большой [Concept('great_power_score_with_icon', 'счёт великой державы')|e]."
 hint_the_revolution_diplomatic: "«Политическая картина весьма любопытна: похоже, многие монархи окончательно потеряли голову в попытках подавить революцию»."
 hint_the_revolution_administrative: "«Разумно будет выбрать сторону — и побыстрее. От умения быстро принимать решения зависит сама судьба нашей державы. Мы должны быть готовы встретить революцию, когда та постучится в наши двери»."
 hint_the_revolution_military: "«Наше влияние должно простираться за пределы державы, и неважно, поддерживаем ли мы революционеров или собираемся их сокрушить»."
 ###Western Schism
 hint_western_schism: "[GetSituationByKey('western_schism').GetNameWithNoTooltip]"
 hint_western_schism_hint_text: "$hint_western_schism_text_1$\n\n$hint_western_schism_text_2$\n\n$hint_western_schism_text_3$\n\n$hint_western_schism_text_4$"
 hint_western_schism_text_1: "В [Concept('situation', 'ситуации')|e] «Великий западный раскол» нельзя взаимодействовать с курией, поскольку истинными папами [Concept('international_organization_wth_icon', 'международного объединения')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,catholic_church,X #L католической церкви#!#! себя объявили сразу два кандидата.\n\nЧтобы повлиять на исход этой [Concept('situation', 'ситуации')], можно сделать следующее (в зависимости от вашей роли в церкви)."
 hint_western_schism_text_2: "#T [Concept('countries', 'Державы')], где есть [Concept('cardinal_wth_icon', 'кардинал')|e]:#!\n@arrow_bonus_tier_3! Проголосуйте за одного из кандидатов."
 hint_western_schism_text_3: "#T [Concept('countries', 'Державы')], где нет [Concept('cardinal_wth_icon', 'кардинала')|e]:#!\n@arrow_bonus_tier_3! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')|e] #V «$schism_show_support_for_one_pope$»#!, чтобы помочь выбранному кандидату приблизиться к своей цели.\n@arrow_bonus_tier_2! Воспользуйтесь религиозным [Concept('action', 'действием')] «$request_cardinal_seat$», чтобы получить [Concept('cardinal', 'кардинала')].\n@arrow_bonus_tier_1! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')] #V «$schism_demand_support_from_one_pope$»#!, чтобы извлечь выгоду из [Concept('situation', 'ситуации')]."
 hint_western_schism_text_4: "В ходе этой [Concept('situation', 'ситуации')] по католическому миру будет распространяться ересь.\n\n#T Рекомендации#!\n@arrow_bonus_tier_3! Попробуйте применить [Concept('situation', 'ситуативное')|e] [Concept('action', 'действие')] #V «$schism_show_unity_of_faith$»#!, чтобы ваше [Concept('religious_unity_with_icon', 'религиозное единство')|e] не ослабевало."
 ###Reformation
 hint_reformation: "[GetSituationByKey('reformation').GetNameWithNoTooltip]"
 hint_reformation_hint_text: "$hint_reformation_hint_text_1$\n\n$hint_reformation_hint_text_2$\n\n$hint_reformation_hint_text_3$"
 hint_reformation_hint_text_1: "В [Concept('situation', 'ситуации')|e] «Реформация» #TOOLTIP:BUILDING_TYPE,lutheran_preachers,X #L здания лютеранских#!#! и #TOOLTIP:BUILDING_TYPE,calvinist_preachers,X #L кальвинистских проповедников#!#! будут распространять новые [Concept('religions_with_icon', 'религии')|e] по всему #TOOLTIP:RELIGIONGROUP,christian,X #L христианскому#!#! миру."
 hint_reformation_hint_text_2: "#T Борьба с реформаторами#!\n@arrow_bonus_tier_3! Как только введёте политику #TOOLTIP:POLICY,jesuits_allowed,X #L допуск иезуитов#!#!, уберите [Concept('buildings_with_icon', 'сооружения')|e] #TOOLTIP:BUILDING_TYPE,lutheran_preachers,X #L лютеранских#!#! и #TOOLTIP:BUILDING_TYPE,calvinist_preachers,X #L кальвинистских проповедников#!#! (учтите, что это снижает [Concept('stability_with_icon', 'стабильность')|e]).\n@arrow_bonus_tier_3! При первой возможности постройте #TOOLTIP:BUILDING_TYPE,jesuit_college,X #L иезуитский колледж#!#! и поддерживайте его деятельность по борьбе с распространением #TOOLTIP:RELIGION,$lutheran_tt$,X #L лютеранства#!#! и #TOOLTIP:RELIGION,$calvinist_tt$,X #L кальвинизма#!#!."
 hint_reformation_hint_text_3: "#T Поддержка реформаторов#!\n@arrow_bonus_tier_3! Как только в вашей державе получит распространение одно из новых учений, примите его и обратитесь в новую веру с помощью действия #V «$embrace_the_reformation$»#!.\n@arrow_bonus_tier_2! Откройте @religion_panel! [Link('country_religion', '', '@society_panel! вкладку религии')], чтобы перейти в новую [Concept('religion', 'веру')]."
 ###Treaty of Tordesillas
 hint_treaty_of_tordesillas: "[GetSituationByKey('treaty_of_tordesillas').GetNameWithNoTooltip]"
 hint_treaty_of_tordesillas_hint_text: "$hint_treaty_of_tordesillas_hint_text_1$\n\n$hint_treaty_of_tordesillas_hint_text_2$"
 hint_treaty_of_tordesillas_hint_text_1: "Свершается [GetSituationByKey('treaty_of_tordesillas').GetName]! [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetName] и [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetName] собираются поделить между собой Новый Свет!"
 hint_treaty_of_tordesillas_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Придать конкретику нашим колониальным устремлениям можно с помощью уникальных [Concept('actions_with_icon', 'действий')|e] на панели [Concept('situation', 'ситуации')|e].\n@arrow_bonus_tier_2! Через какое-то время после ратификации договора начнётся #Y вторая#! фаза этой [Concept('situation', 'ситуации')|e], во время которой принять участие и заявить свои претензии смогут другие [Concept('countries_with_icon', 'державы')|e]."
 hint_treaty_of_tordesillas_diplomatic: "«Нам представилась славная возможность под предлогом религиозного — и незыблемого — авторитета завладеть частью открытых недавно земель»."
 hint_treaty_of_tordesillas_administrative: "«Деловые возможности в Новом Свете поражают воображение. Их никак нельзя упускать»."
 hint_treaty_of_tordesillas_military: "«Нельзя допустить, чтобы враг добрался до этих земель быстрее нас!»"
 ###Great Pestilence
 hint_great_pestilence: "[GetSituationByKey('great_pestilence').GetNameWithNoTooltip]"
 hint_great_pestilence_hint_text: "$hint_black_death_hint_text_2$\n\n$hint_black_death_hint_text_3$"
 hint_great_pestilence_diplomatic: "«Союзники нас бросили, а власти — предали. Покинуть позиции! Спасайтесь кто может!»"
 hint_great_pestilence_administrative: "«Не стоит отчаиваться! Со смертью можно бороться многими способами, пусть даже они почти бесполезны…»"
 hint_great_pestilence_military: "«Нашим [Concept('armies_with_icon', 'армиям')|e] лучше избегать тех [Concept('locations_with_icon', 'районов')|e], где бушует эпидемия. Мы не можем терять солдат»."
 ###Columbian Exchange
 hint_columbian_exchange: "[GetSituationByKey('columbian_exchange').GetNameWithNoTooltip]"
 hint_columbian_exchange_hint_text: "$hint_columbian_exchange_hint_text_1$\n\n$hint_columbian_exchange_hint_text_2$"
 hint_columbian_exchange_hint_text_1: "Свершается [GetSituationByKey('columbian_exchange').GetName]! [Concept('trade_with_icon', 'Торговля')|e] оживится: между Старым и Новым Светом хлынет бурный поток [Concept('goods_with_icon', 'товаров')|e]!"
 hint_columbian_exchange_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Извлечь ещё больше выгоды, наполнив [Concept('market_with_icon', 'рынок')|e] новыми товарами, можно с помощью уникальных [Concept('actions_with_icon', 'действий')|e] на панели [Concept('situation_with_icon', 'ситуации')|e]."
 hint_columbian_exchange_diplomatic: "Торговая прибыль правит миром…"
 hint_columbian_exchange_administrative: "$hint_treaty_of_tordesillas_administrative$"
 hint_columbian_exchange_military: "«Нужно опередить конкурентов и первыми завладеть источниками выгоды и новыми товарами!»"
 ###War of Religions
 hint_war_of_religions: "[GetSituationByKey('war_of_religions').GetNameWithNoTooltip]"
 hint_war_of_religions_hint_text: "$hint_war_of_religions_hint_text_1$\n\n$hint_war_of_religions_hint_text_2$\n\n$hint_war_of_religions_hint_text_3$\n\n$hint_war_of_religions_hint_text_4$"
 hint_war_of_religions_hint_text_1: "В [Concept('situation', 'ситуации')|e] «Религиозная война» два [Concept('international_organizations_with_icon', 'международных объединения')|e] будут бороться за существование своей [Concept('religions_with_icon', 'религии')|e] в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священной Римской Империи#!#!. [GetUniqueInternationalOrganization('protestant_union').GetName] и [GetUniqueInternationalOrganization('catholic_league').GetName] будут предлагать входящим в империю [Concept('countries_with_icon', 'державам')|e] свою защиту. По мере нарастания напряжения оба объединения смогут попытаться сделать свою религию господствующей и изменить [Concept('laws_with_icon', 'свод правил')|e] империи согласно своим предпочтениям."
 hint_war_of_religions_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Вступите в [Concept('international_organization', 'международное объединение')], которое хотите поддержать.\n@arrow_bonus_tier_2! Постарайтесь заключить новые [Concept('alliances_with_icon', 'союзы')|e] со сторонними державами.\n@arrow_bonus_tier_2! Пользуясь положением [Concept('country', 'державы')], которая не считается участницей Священной Римской Империи, заключите [Concept('alliance', 'союз')] с лидером предпочтительной для вас религиозной лиги."
 hint_war_of_religions_hint_text_3: "#T Если вы возглавляете какую-либо религиозную лигу#!\n@arrow_bonus_tier_3! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')|e] #V «$prepare_military_escalation$»#!, чтобы получить повод для войны #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Религиозное превосходство»#!#!.\n@hint! После этого вы сможете навязать другим #TOOLTIP:SCRIPTED_PEACE_TREATY,religious_supremacy,X #L религиозное превосходство#!#!, а вместе с ним — и требования своей фракции.\n@arrow_bonus_tier_2! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')|e] #V «$demand_member_removal$»#!, чтобы исключить опасные державы из второго [Concept('international_organization', 'объединения')], пока не разразилась [Concept('war', 'война')]."
 hint_war_of_religions_hint_text_4: "#T Дополнительные советы#!\n@hint! Во время [Concept('war', 'конфликта')] с поводом #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Религиозное превосходство»#!#! у [Concept('countries', 'держав')] будет накапливаться [Concept('war_exhaustion', 'усталость от войны')].\n@hint! Если #Y 80%#! всех участников захотят [Concept('peace_with_icon', 'мира')|e], будет подписан #Y Вестфальский мир#!.\n@hint! После этого [Concept('war', 'война')] закончится, а в Священной Римской Империи наступит религиозный мир."
 ###Guelphs and Ghibellines
 hint_guelphs_and_ghibellines: "[GetSituationByKey('guelphs_and_ghibellines').GetNameWithNoTooltip]"
 hint_guelphs_and_ghibellines_hint_text: "$hint_guelphs_and_ghibellines_hint_text_1$\n\n$hint_guelphs_and_ghibellines_hint_text_2$"
 hint_guelphs_and_ghibellines_hint_text_1: "В [Concept('situation', 'ситуации')|e] «Гвельфы и гибеллины» [Concept('international_organizations_wth_icon', 'международные объединения')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$guelphs_io_tt$,X #L гвельфов#!#! и #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ghibellines_io_tt$,X #L гибеллинов#!#! соперничают между собой за влияние на #TOOLTIP:REGION,italy_region,X #L Итальянский#!#! [Concept('region', 'регион')|e]. Поддержкой первых пользуется [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle|l] [GetUniqueInternationalOrganization('guelphs_io').GetName], поддержкой вторых — [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l]."
 hint_guelphs_and_ghibellines_hint_text_2: "#T Если вы принадлежите к одной из сторон#!\n@arrow_bonus_tier_3! Принудите какую-либо [Concept('country_with_icon', 'державу')|e] вступить в состав вашей фракции с помощью [Concept('casus_belli_with_icon', 'повода')|e] #TOOLTIP:CASUS_BELLI,cb_gag_force_country_into_faction,X #L «Принудительное включение во фракцию»#!#!.\n@arrow_bonus_tier_2! Сохраняйте [Concept('tax_base_with_icon', 'налоговую базу')|e] участников вашей фракции с помощью дипломатии, например [Concept('alliances_with_icon', 'союзов')|e] или [Concept('guarantee_with_icon', 'гарантий')|e].\n@arrow_bonus_tier_2! Увеличивайте [Concept('tax_base_with_icon', 'налоговую базу')|e] своей [Concept('country', 'державы')]."
 ###Colonial Revolution
 hint_colonial_revolution: "[GetSituationByKey('colonial_revolution').GetNameWithNoTooltip]"
 hint_colonial_revolution_hint_text: "$hint_colonial_revolution_hint_text_1$\n\n$hint_colonial_revolution_text_2$\n\n$hint_colonial_revolution_text_3$"
 hint_colonial_revolution_hint_text_1: "В [Concept('situation', 'ситуации')|e] «Колониальная революция» колониальные [Concept('subjects_with_icon', 'ленники')|e] борются за независимость от своих [Concept('overlords_with_icon', 'сюзеренов')|e]."
 hint_colonial_revolution_text_2: "#T Если вы играете за колониальную державу#!\n@arrow_bonus_tier_3! Создайте [Concept('international_organization', 'международное объединение')|e] — колониальную федерацию.\n@arrow_bonus_tier_2! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')|e] #V «$seek_alliance_with_overlord_rival$»#!, чтобы заручиться помощью других [Concept('countries_with_icon', 'держав')|e].\n@arrow_bonus_tier_1! Если колониальная федерация уже существует, вступите в неё."
 hint_colonial_revolution_text_3: "#T Если вы играете за [Concept('overlord', 'сюзерена')]#!\n@arrow_bonus_tier_3! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')] #V «$establish_goods_act$»#!, чтобы получить дополнительные средства.\n@arrow_bonus_tier_2! Воспользуйтесь [Concept('situation', 'ситуативным')] [Concept('action', 'действием')] #V «$give_colony_representation$»#!, если какая-либо колония станет нелояльной."
 ###Red Turban Rebellion
 hint_red_turban_rebellions: "[GetSituationByKey('red_turban_rebellions').GetNameWithNoTooltip]"
 hint_red_turban_rebellions_hint_text: "$hint_red_turban_rebellions_hint_text_1$\n\n$hint_red_turban_rebellions_hint_text_2$\n\n$hint_red_turban_rebellions_hint_text_3$"
 hint_red_turban_rebellions_hint_text_1: "[GetSituationByKey('red_turban_rebellions').GetName] охватило весь Китай! Небеса больше не благоволят #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#!, в [GetCountry('CHI').Custom('rank_ru_PREP')|l] воцарился хаос!"
 hint_red_turban_rebellions_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#! необходимо силой #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_rein_in_rebellion,X #L усмирить восстание#!#! и подавить тех, кто стремится вырваться из-под власти державы.\n@arrow_bonus_tier_2! #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Красные повязки»#!#! могут потребовать от [GetCountry('CHI').Custom('CL_GEN')] #TOOLTIP:SCRIPTED_PEACE_TREATY,rtr_demand_occupied_territories,X #L передать оккупированные территории#!#!.\n@arrow_bonus_tier_1! [GetCountry('CHI').GetLongName] столкн[GetCountry('CHI').Custom('endlong_youtut')]ся со множеством уникальных [Concept('events_with_icon', 'событий')|e], а земли державы заинтересуют амбициозных завоевателей."
 hint_red_turban_rebellions_hint_text_3: "#T Дополнительные советы#!\n@hint! Нам доступно множество уникальных [Concept('actions_with_icon', 'действий')|e] на панели [Concept('situation_with_icon', 'ситуации')|e], позволяющих [Concept('integrate_with_icon', 'интегрировать')|e] завоёванные земли и сохранять высокий [Concept('control_with_icon', 'контроль')|e]."
 hint_red_turban_rebellions_diplomatic: "«Бесконечная война почти не оставляет времени для праздной болтовни и дипломатических переговоров…»"
 hint_red_turban_rebellions_administrative: "«В подобной ситуации важно понимать, какие действия стоит предпринимать, а какие — нет. Только так мы приведём державу к победе»."
 hint_red_turban_rebellions_military: "«Теперь весь Китай знает, что мы здесь!»"
 ###Rise of Timur
 hint_rise_of_timur: "[GetSituationByKey('rise_of_timur').GetNameWithNoTooltip]"
 hint_rise_of_timur_hint_text: "$hint_rise_of_timur_hint_text_1$\n\n$hint_rise_of_timur_hint_text_2$\n\n$hint_rise_of_timur_hint_text_3$"
 hint_rise_of_timur_hint_text_1: "Из глубины #TOOLTIP:SUB_CONTINENT,central_asia,X #L Центральной Азии#!#! выходит бледный образ смерти — [GetCharacter('chg_timur_lame_borjigin').GetName] и [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').GetFlavorRank|l]. Горе всякому, кто воспротивится [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] завоеваниям!"
 hint_rise_of_timur_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Пока [Select_CString(GetCharacter('chg_timur_lame_borjigin').IsFemale, 'жива', 'жив' )] [GetCharacter('chg_timur_lame_borjigin').GetName], на [GetCharacter('chg_timur_lame_borjigin').GetHerHis|l] [GetCountry('TIM').Custom('rank_ru_ACC')|l] будет действовать [Concept('modifier_with_icon', 'модификатор')|e] #TOOLTIP:STATIC_MODIFIER,timmy_wants_to_play,X #V #L «Погибель из Центральной Азии»#!#!#!.\n@arrow_bonus_tier_2! Благодаря этому [Concept('modifier_with_icon', 'модификатору')|e] [GetCharacter('chg_timur_lame_borjigin').GetShortNameWithNoTooltip] сможет автоматически присоединять осаждённые [Concept('locations_with_icon', 'районы')|e].\n@arrow_bonus_tier_1! [GetCountry('TIM').GetLongName] получа[GetCountry('TIM').Custom('endlong_etyut')] доступ к уникальному [Concept('casus_belli_with_icon', 'поводу для войны')|e]."
 hint_rise_of_timur_hint_text_3: "#T Дополнительные советы#!\n@hint! #ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! доступно множество уникальных [Concept('actions_with_icon', 'действий')|e] на панели [Concept('situation_with_icon', 'ситуации')|e]."
 hint_rise_of_timur_diplomatic: "«Возможно, с ордой получится договориться?»"
 hint_rise_of_timur_administrative: "«Стоит подумать о возведении укреплений для защиты наших границ»."
 hint_rise_of_timur_military: "«#ONCLICK:COUNTRY,[GetCountry('TIM').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TIM').Custom('CL_tt')],X [GetCountry('TIM').Custom('CL_DAT')|L]#!#! приходится полагаться на могучую армию адских всадников, традиции завоевателей и ненасытный голод, побуждающий разверзнуть пасть и проглотить всю #TOOLTIP:CONTINENT,asia,X #L Азию#!#!!»"
 ### Nanbokuchou
 hint_nanbokuchou: "[GetSituationByKey('nanbokuchou').GetNameWithNoTooltip]"
 hint_nanbokuchou_hint_text: "$hint_nanbokuchou_hint_text_1$\n\n$hint_nanbokuchou_hint_text_2$\n\n$hint_nanbokuchou_hint_text_3$"
 hint_nanbokuchou_hint_text_1: "[GetSituationByKey('nanbokuchou').GetName] — это [Concept('situation_with_icon', 'ситуация')|e], разделившая #TOOLTIP:REGION,japan_region,X #L Японию#!#! между соперничающими северным и южным императорскими дворами, которые стремятся доказать своё право на власть. Поскольку этот конфликт преобразит всю островную державу, каждый клан должен выбрать сторону."
 hint_nanbokuchou_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Используйте уникальный [Concept('casus_belli_with_icon', 'повод для войны')|e] #TOOLTIP:CASUS_BELLI,cb_nanbokuchou,X #L «Период Намбокутё»#!#!, чтобы вести войну в поддержку претендента.\n@arrow_bonus_tier_2! #TOOLTIP:SCRIPTED_PEACE_TREATY,peace_expand_clan_influence,X #L Расширение влияния клана#!#! поможет вам захватывать вражеские [Concept('locations_with_icon', 'районы')|e].\n@arrow_bonus_tier_1! В случае победы [ShowPeaceTreatyTypeNameWithNoTooltip('peace_nanbokuchou_force_imperial_abdication')|l] обеспечит верховенство поддержанного вами императора."
 hint_nanbokuchou_hint_text_3: "#T Дополнительные советы#!\n@hint! Важно грамотно выбирать время. Небольшие кланы могут воспользоваться конфликтом, чтобы получить превосходство над соперниками.\n@hint! Учитывайте равновесие сил, прежде чем выбирать сторону."
 hint_nanbokuchou_diplomatic: "«Это не просто повод помахать мечами. Выбор претендента определит наше наследие»."
 hint_nanbokuchou_administrative: "«Нелегко поддерживать порядок, выбирая сторону одного из дворов, но это может помочь нам приобрести влияние на имперский институт»."
 hint_nanbokuchou_military: "«Атакуйте решительно и добейтесь легитимности раньше, чем соперники успеют укрепить свою власть»."
 ### Sengoku
 hint_sengoku: "[GetSituationByKey('sengoku').GetNameWithNoTooltip]"
 hint_sengoku_hint_text: "$hint_sengoku_hint_text_1$\n\n$hint_sengoku_hint_text_2$\n\n$hint_sengoku_hint_text_3$"
 hint_sengoku_hint_text_1: "[GetSituationByKey('sengoku').GetName] — это [Concept('situation_with_icon', 'ситуация')|e], которая погружает #TOOLTIP:REGION,japan_region,X #L Японию#!#! в состояние почти бесконечной войны. Кланы сражаются за верховенство, пока сёгун отчаянно пытается удержать контроль над державой."
 hint_sengoku_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Используйте уникальный [Concept('casus_belli_with_icon', 'повод для войны')|e] #TOOLTIP:CASUS_BELLI,cb_sengoku,X #L «Период Сэнгоку»#!#!, чтобы расширить свой клан.\n@arrow_bonus_tier_2! В роли сёгуна используйте #TOOLTIP:GENERIC_ACTION,sengoku_revoke_clans_land,X #L отъём земель#!#!, чтобы ослабить разросшиеся кланы, и #TOOLTIP:GENERIC_ACTION,sengoku_limit_clans_autonomy,X #L ограничение автономии кланов#!#!, чтобы превратить их в [Concept('building_based_with_icon', 'экстерриториальные державы')|e].\n@arrow_bonus_tier_1! Если у вас [Concept('building_based_with_icon', 'экстерриториальная держава')|e], то вы можете объявить о независимости и стать [Concept('location_based_with_icon', 'сухопутной державой')|e], #TOOLTIP:GENERIC_ACTION,sengoku_proclaim_clan_independence,X #L провозгласив независимость клана#!#!."
 hint_sengoku_hint_text_3: "#T Дополнительные советы#!\n@hint! Равновесие сил постоянно меняется. Не упускайте возможности напасть на ослабленные кланы.\n@hint! Если вы сёгун, ранняя консолидация власти значительно облегчит объединение #TOOLTIP:REGION,japan_region,X #L Японии#!#!.\n@hint! Небольшие кланы могут стравливать между собой более крупные кланы, чтобы улучить момент и обрести свободу."
 hint_sengoku_diplomatic: "«Союзы непостоянны. Выбирайте друзей с осторожностью, ведь уже завтра они могут стать врагами»."
 hint_sengoku_administrative: "«Чтобы не позволить державе погрузиться в хаос, нужна крепкая рука власти»."
 hint_sengoku_military: "«Наступила эпоха меча. Нападайте быстро и бейте сильно, иначе сами станете добычей»."
 ##### Disaster Hints #####
 swift_end_string: "Любое бедствие, в том числе и это, всегда предпочтительнее закончить поскорее. Нерешённые проблемы могут повлечь за собой неприятности."
 disaster_war_hint: "Следует помнить, что не все наши соседи в эти трудные времена стремятся заключить перемирие или союз: некоторые постараются расширить свои территории за наш счёт."
 ###Coup
 hint_coup_attempt: "Советы по ситуации «Попытка переворота»"
 hint_coup_attempt_hint_text: "$hint_coup_attempt_hint_text_1$\n\n$hint_coup_attempt_hint_text_2$\n\n$hint_coup_attempt_hint_text_3$"
 hint_coup_attempt_hint_text_1: "Наш [Concept('court_with_icon', 'двор')|e] опутан множеством интриг. Люди, жаждущие недостижимой власти, готовы ради этого пойти на преступление, лишь бы посадить на престол своих марионеток, диктовать нам [Concept('laws_with_icon', 'правила')|e] и обеспечить себе [Concept('privileges_with_icon', 'привилегии')|e]. Это [Concept('disaster_with_icon', 'бедствие')|e] будет длиться, пока заговорщики не исчезнут, их лидер не займёт престол или мы не наберём достаточно [Concept('legitimacy_with_icon', 'легитимности')|e]. $swift_end_string$"
 hint_coup_attempt_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Мы можем #TOOLTIP:GENERIC_ACTION,conduct_investigation,X #L провести расследование#!#!. Это займёт некоторое время, зато поможет выявить часть заговорщиков и упростит чистку их рядов.\n@arrow_bonus_tier_2! [Concept('stability_with_icon', 'Стабильность')|e] следует держать на высоком уровне. Чем больше её значение, тем ниже порог [Concept('legitimacy_with_icon', 'легитимности')|e], необходимой для завершения этого [Concept('disaster_with_icon', 'бедствия')|e].\n@arrow_bonus_tier_1! Если обстановка станет совсем отчаянной, мы можем #TOOLTIP:GENERIC_ACTION,call_private_council,X #L созвать тайный совет#!#! или #TOOLTIP:GENERIC_ACTION,execute_court_member,X #L казнить придворного#!#!. Первое действие поможет нам выявить заговорщиков в обмен на [Concept('privileges_with_icon', 'привилегии')|e] или [Concept('gold_with_icon', 'дукаты')|e] для [Concept('estates_with_icon', 'сословий')|e]. Второе [Concept('action_with_icon', 'действие')|e] позволит нам казнить любого [Concept('court_with_icon', 'придворного')|e] [Concept('character_with_icon', 'персонажа')|e], которого мы подозреваем в заговоре."
 hint_coup_attempt_hint_text_3: "#T Дополнительные советы#!\n@hint! В ходе этого [Concept('disaster_with_icon', 'бедствия')|e] могут происходить случайные [Concept('events_with_icon', 'события')|e], указывающие на возможных заговорщиков. Каждое такое событие следует внимательно изучить, чтобы принять взвешенное решение. Будет неприятно, если лучший [Concept('cabinet_member_with_icon', 'член нашего совета')|e] без весомой причины лишится своей головы."
 hint_coup_attempt_diplomatic: "«Сейчас самое время заверить соседние [Concept('countries_with_icon', 'державы')|e], что мы им не враги, а заодно — обеспечить надёжную защиту границ. Нам совершенно не нужны угрозы ещё и извне»."
 hint_coup_attempt_administrative: "«Кто-то из остальных советников — наверняка заговорщик. Так сразу и не угадать!»"
 hint_coup_attempt_military: "«$disaster_war_hint$ Поэтому помните: упреждающий удар — это такой #italic неожиданный мирный договор#!, принесённый на копьях»."
 ###Crisis of the Chinese Dynasty
 hint_crisis_of_the_chinese_dynasty: "Советы по ситуации «$crisis_of_the_chinese_dynasty$»"
 hint_crisis_of_the_chinese_dynasty_hint_text: "$hint_crisis_of_the_chinese_dynasty_hint_text_1$\n\n$hint_crisis_of_the_chinese_dynasty_hint_text_2$"
 hint_crisis_of_the_chinese_dynasty_hint_text_1: "Небеса, когда-то ниспославшие нашей земле процветание, отвернулись от нас. На Китай обрушились беды, голод и разруха. Для нашей власти наступает мрачная пора. Это [Concept('disaster_with_icon', 'бедствие')|e] будет длиться, пока мы либо не преодолеем его, реформировав весь административный аппарат, либо не лишимся должности властителя #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединного Государства#!#!. $swift_end_string$"
 hint_crisis_of_the_chinese_dynasty_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Можно выполнить действие [Concept('cabinet_with_icon', 'совета')|e] #TOOLTIP:CABINET_ACTION,reform_taxation_system,X #L «Реформа налоговой системы»#!#!. Это займёт некоторое время, зато приблизит нас к тому, чтобы положить [Concept('disaster_with_icon', 'бедствию')|e] конец.\n@arrow_bonus_tier_2! [Concept('celestial_authority_gc_with_icon', 'Небесный авторитет')|e] следует поддерживать на высоком уровне. Если этот показатель достигнет #G 90#! ед., [Concept('disaster_with_icon', 'бедствие')|e] завершится мирно.\n@arrow_bonus_tier_1! В ходе [Concept('disaster_with_icon', 'бедствия')|e] нам доступно множество новых [Concept('actions_with_icon', 'действий')|e], таких как #TOOLTIP:GENERIC_ACTION,cmd_reform_the_cabinet,X #L реформа совета#!#!, #TOOLTIP:GENERIC_ACTION,cmd_restore_stability,X #L восстановление стабильности [GetCountry('CHI').Custom('rank_ru_GEN')l]#!#! и #TOOLTIP:GENERIC_ACTION,cmd_strengthen_crown,X #L укрепление трона#!#!. Каждое из них — это отдельная возможность добиться благоприятного завершения смуты, если не получится поднять [Concept('celestial_authority_gc_with_icon', 'небесный авторитет')|e] достаточно высоко."
 hint_crisis_of_the_chinese_dynasty_diplomatic: "«Пора вновь утвердить наши добрые отношения с [Concept('countries_with_icon', 'державами')|e] #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Срединного Государства#!#!, чтобы это славное объединение просуществовало тысячу лет.\n\nВедь что отделяет нас от зверей, как не умение уважать других?»"
 hint_crisis_of_the_chinese_dynasty_administrative: "«Если мы решим преобразовать правительство, чтобы покончить с этим [Concept('disaster_with_icon', 'бедствием')|e], то назначить такую эпохальную задачу будет лучше способным [Concept('cabinet_members_with_icon', 'членам совета')|e].\n\nБез экономии нас ждёт агония»."
 hint_crisis_of_the_chinese_dynasty_military: "«$disaster_war_hint$\n\nОднако хаос открывает для нас новые возможности!»"
 hint_turmoil_in_brandenburg: "$turmoil_in_brandenburg$"
 hint_turmoil_in_brandenburg_hint_text: "$hint_turmoil_in_brandenburg_hint_text_1$\n\n$hint_turmoil_in_brandenburg_hint_text_2$\n\n$hint_turmoil_in_brandenburg_hint_text_3$"
 hint_turmoil_in_brandenburg_hint_text_1: "В ходе бедствия «$turmoil_in_brandenburg$» нам нужно укрепить свою правящую династию, увеличив значение показателя «Вложения» до 100 ед., а если значение модификатора «Пренебрежение» достигнет 100 ед., — то обратиться к императору с просьбой возвести на наш престол новую династию. После 1365 года бароны-разбойники станут чаще появляться в наших [Concept('provinces', 'провинциях')|e] и разорять их. Как только значительная часть нашей державы (75% принадлежащих нам [Concept('provinces', 'провинций')]) будет освобождена от террора баронов-разбойников при помощи [Concept('cabinet_action', 'действия совета')|e] «$pru_deal_with_robber_barons$», бедствие сможет закончиться."
 hint_turmoil_in_brandenburg_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_1! Увеличьте значение своего показателя «Вложения» или «Пренебрежение» в ходе событий, связанных с бедствием.\n@arrow_bonus_tier_1! Расширяйте свою территорию осторожно, чтобы не дать баронам-разбойникам разорять новые земли."
 hint_turmoil_in_brandenburg_hint_text_3: "#T Дополнительные советы#!\nВерните себе утерянный [Concept('control', 'контроль')] при помощи соответствующего [Concept('cabinet_action', 'действия совета')].\n@hint! Найдите [Concept('alliances', 'союзников')|e], способных помочь вам в [Concept('civil_war', 'гражданской войне')|e], которая может начаться."
 hint_turmoil_in_brandenburg_hint_text_4: "#T Как повлиять на установление династий#!\n@hint! Если значение показателя «$bra_wittelsbacher_investment_var$» достигнет 100 ед., правящая династия сохранит власть.\n@hint! Если значение показателя «$bra_wittelsbacher_neglect_var$» достигнет −100 ед., когда у императора есть взрослый наследник, вам станет доступна династия Гогенцоллернов. Как только этот наследник станет императором и начнёт править обеими державами, он сможет возвести на ваш престол династию Гогенцоллернов."
 ### Construction missing input
 hint_war: "Война"
 hint_war_hint_text: "$hint_war_hint_text_1$\n\n$hint_war_hint_text_2$\n\n$hint_war_hint_text_3$"
 hint_war_hint_text_1: "[Concept('war_with_icon', 'Война')|e] начинается, когда [Concept('country_with_icon', 'держава')|e] её объявляет, а завершается подписанием [Concept('peace_treaty_with_icon', 'мирного договора')|e] между воюющими сторонами. В любом [Concept('war', 'конфликте')] есть два [Concept('war_leaders_with_icon', 'лидера')|e], которых могут поддерживать [Concept('war_allies_with_icon', 'военные союзники')|e]. Для окончания [Concept('war', 'войны')] необходимо, чтобы её [Concept('war_leaders', 'лидеры')] подписали [Concept('peace_treaty', 'мирный договор')|e], однако второстепенные участники могут заключить с [Concept('war_leader', 'лидером')] противника сепаратный [Concept('peace_treaty', 'мир')]."
 hint_war_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Прежде чем объявлять [Concept('war', 'войну')], постарайтесь обеспечить для неё подходящий [Concept('casus_belli_with_icon', 'повод')|e]. Его можно запросить у [Concept('parliament_with_icon', 'парламента')|e], а если будущий объект нападения является [Concept('rivals_with_icon', 'соперником')|e] державы, то и сфабриковать.\n@arrow_bonus_tier_3! Начав [Concept('war', 'войну')], уделяйте внимание её [Concept('casus_belli', 'поводу')] и [Concept('war_goal_with_icon', 'цели')|e], поскольку это важно для получения [Concept('war_score_with_icon', 'военного счёта')|e] и подписания выгодного [Concept('peace_treaty_with_icon', 'мирного договора')|e].\n@arrow_bonus_tier_3! В зависимости от повода мы можем зарабатывать [Concept('war_score_with_icon', 'военный счёт')|e] разными путями. Вот некоторые из основных [Concept('war_score', 'его')] источников:\n@arrow_bonus_tier_1! Оккупация вражеской [Concept('capital_with_icon', 'столицы')|e]\n@arrow_bonus_tier_1! Получение контроля над определёнными [Concept('locations_with_icon', 'районами')]\n@arrow_bonus_tier_1! Оккупация вражеских [Concept('forts_with_icon', 'крепостей')|e]\n@arrow_bonus_tier_1! Победа над вражескими [Concept('armies_with_icon', 'армиями')|e] в [Concept('battle', 'битвах')]\n@arrow_bonus_tier_1! [Concept('blockade_with_icon', 'Блокада')|e] вражеских [Concept('ports_with_icon', 'портов')|e]\n@arrow_bonus_tier_3! Следите за уровнем [Concept('war_exhaustion_with_icon', 'усталости от войны')|e]: он может крайне негативно сказаться как на экономике, так и на боеспособности."
 hint_war_hint_text_3: "#T Дополнительные советы#!\n@hint! Во время [Concept('war', 'войны')] обе стороны могут [Concept('occupy_with_icon', 'оккупировать')|e] вражеские [Concept('locations_with_icon', 'районы')|e], но окончательно их принадлежность меняется только после подписания [Concept('peace_treaty_with_icon', 'мирного договора')|e], закрепляющего завоевания.\n@hint! Чем дольше идёт война, тем охотнее её участники принимают предложение о мире."
 hint_war_diplomatic: "«Война может быть очень выгодным предприятием, но это короткий путь к катастрофе»."
 hint_war_administrative: "«Когда торговля не может обеспечить нас всем необходимым, война становится неизбежной»."
 hint_war_military: "«Превосходство над соседями — единственная гарантия нашей безопасности»."
 ### Construction missing input
 hint_battle: "Битвы"
 hint_battle_hint_text: "$hint_battle_hint_text_1$\n\n$hint_battle_hint_text_2$\n\n$hint_battle_hint_text_3$"
 hint_battle_hint_text_1: "Когда [Concept('army_with_icon', 'армии)|e] воюющих сторон оказываются в одном [Concept('location_with_icon', 'районе')|e], между ними начинается [Concept('battle_with_icon', 'битва')|e]. [Concept('army', 'Армия')], пришедшая в такой [Concept('location', 'район')] первой, считается [Concept('defender_with_icon', 'обороняющейся')|e] и получает преимущества местности. Битва завершается, когда одна из сторон полностью утрачивает [Concept('morale_with_icon', 'боевой дух')|e] или теряет все свои [Concept('regiments_with_icon', 'полки')|e] — в зависимости от того, что случится раньше."
 hint_battle_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Армии, расположенные неподалёку, можно позвать в качестве подкрепления. Если они успеют прийти вовремя, ваши войска получат свежие резервы.\n@arrow_bonus_tier_2! Прежде чем отправлять [Concept('armies_with_icon', 'армию')|e] на [Concept('battle', 'битву')], убедитесь, что у неё хороший [Concept('commander_with_icon', 'командир')|e].\n@arrow_bonus_tier_2! Уделяйте внимание ландшафту [Concept('location', 'района')]. Его рельеф и растительность могут затруднять действия [Concept('attacker_with_icon', 'атакующей стороны')|e]. Будьте осмотрительны, выбирая поле будущего сражения!\n@arrow_bonus_tier_1! Если противник обладает значительным превосходством и угрожает сокрушить вашу армию, иногда лучше подумать об [Concept('retreat_with_icon', 'отступлении')|e]."
 hint_battle_hint_text_3: "#T Дополнительные советы#!\n@hint! Проигранная битва не всегда ведёт к поражению в [Concept('war_with_icon', 'войне')|e]. Потерпев неудачу, можно [Concept('retreat', 'отступить')] в безопасное место, восстановить боевой дух, при необходимости завербовать наёмников и предпринять новую попытку в более выгодных условиях. Всё это доступно и вашему врагу, так что не теряйте бдительности после победы.\n@hint! Если в [Concept('location', 'районе')] есть [Concept('fort_with_icon', 'крепость')|e], то контролирующая её сторона считается [Concept('defender', 'обороняющейся')] независимо от того, кто пришёл первым."
 hint_battle_diplomatic: "«Подождите, пока враг будет ослаблен голодом и истощением, и только потом нападайте»."
 hint_battle_administrative: "«Быстрая победа на поле боя позволит нам перейти в наступление, не отдавая города и сёла на поживу врагам»."
 hint_battle_military: "«Хороший полководец способен определить исход сражения»."
 ### Construction missing input
 hint_siege_and_occupation: "Оккупация и осада"
 hint_siege_and_occupation_hint_text: "$hint_siege_and_occupation_hint_text_1$\n\n$hint_siege_and_occupation_hint_text_2$\n\n$hint_siege_and_occupation_hint_text_3$"
 hint_siege_and_occupation_hint_text_1: "Вторгнувшись во [Concept('enemy_with_icon', 'вражеский')|e] [Concept('location_with_icon', 'район')|e], наша [Concept('army_with_icon', 'армия')|e] попытается его [Concept('occupy_with_icon', 'оккупировать')|e]. Если в [Concept('location', 'районе')] нет [Concept('fort_with_icon', 'крепости')|e], это займёт всего несколько дней, а вот если крепость есть, вам придётся начать [Concept('siege_with_icon', 'осаду')|e].\n\nОсады могут длиться месяцами и даже годами. Это зависит от множества факторов, включая уровень укреплений, наличие артиллерии и [Concept('ability_with_icon', 'навыки')|e] осаждающего [Concept('general_with_icon', 'генерала')|e].\n\nПри капитуляции гарнизона [Concept('location', 'район')] становится [Concept('occupied', 'оккупированным')], а [Concept('fort', 'крепость')] переходит под контроль победителя.\n\nОккупированные районы отмечаются на карте значком решётки и не переходят во владение оккупанта до тех пор, пока их завоевание не будет зафиксировано мирным договором."
 hint_siege_and_occupation_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Прежде чем начинать осаду, убедитесь, что ваша [Concept('army_with_icon', 'армия')|e] способна её выдержать.\n@arrow_bonus_tier_1! При приближении опасного противника не бойтесь снять осаду и отступить."
 hint_siege_and_occupation_hint_text_3: "#T Дополнительные советы#!\n@hint! Следите за своей армией во время осады, даже если поблизости нет вражеских войск."
 hint_siege_and_occupation_diplomatic: "«Длительная осада может оказаться губительной для местного населения»."
 hint_siege_and_occupation_administrative: "«Нам следует размещать крепости так, чтобы защитить главные города от захватчиков и иметь возможность быстро освободить их в случае осады»."
 hint_siege_and_occupation_military: "«Осада и оборона таких ключевых позиций, как узкие горные перевалы, может определить исход войны»."
 ### Construction missing input
 hint_lacks_of_rivals: "Возможные соперники"
 hint_lacks_of_rivals_hint_text: "$hint_lacks_of_rivals_hint_text_1$\n\n$hint_lacks_of_rivals_hint_text_2$\n\n$hint_lacks_of_rivals_hint_text_3$"
 hint_lacks_of_rivals_hint_text_1: "Нашими [Concept('rivals_with_icon', 'соперниками')|e] считаются [Concept('countries_with_icon', 'державы')|e], открыто и враждебно выступающие против наших интересов. Это даёт нам ряд преимуществ. Во-первых, если у нашего соперника есть враги, нам проще наладить с ними дипломатические отношения. Во-вторых, мы можем фабриковать [Concept('casus_belli_with_icon', 'поводы для войны')|e] против соперников и вмешиваться в [Concept('war_with_icon', 'войны')|e] с их участием."
 hint_lacks_of_rivals_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Следите за конфликтами и [Concept('alliances_with_icon', 'союзами')|e] своих соседей, выбирая тех же соперников, что и держава, чьим союзником вы хотите стать. Однако постарайтесь не приобрести слишком могущественных врагов.\n@arrow_bonus_tier_2! Можно дождаться, когда другие [Concept('countries', 'державы')] объявят своих [Concept('rivals', 'соперников')], и уже потом сделать свой ход. Это позволит вам избежать нежелательных конфликтов.\n@arrow_bonus_tier_2! Чтобы фабриковать [Concept('casus_belli_with_icon', 'поводы для войны')|e] против [Concept('rivals', 'соперников')], создавайте на их территории [Concept('spy_network_with_icon', 'шпионскую сеть')|e]."
 hint_lacks_of_rivals_hint_text_3: "#T Дополнительные советы#!\n@hint! Не обязательно объявлять соперниками всех подряд. Можно просто закрыть #W уведомление#!, щёлкнув по нему правой кнопкой мыши.\n@hint! Если у вас есть соперники, вы будете получать предложения об участии в войнах на стороне их врагов. Но будьте осторожны: [Concept('rival_enemies_with_icon', 'соперники')|e] точно так же смогут вмешиваться в войны с нашим участием."
 hint_lacks_of_rivals_diplomatic: "«Заводить ненужных врагов вредно, но наличие общих соперников может укрепить наши отношения с соседями»."
 hint_lacks_of_rivals_administrative: "«Враги наших врагов должны быть нашими друзьями»."
 hint_lacks_of_rivals_military: "«Наличие подходящего соперника открывает много выгодных возможностей для тех, кто не боится ими пользоваться»."
 ### Construction missing input
 hint_control: "Досягаемость и контроль"
 hint_control_hint_text: "$hint_control_hint_text_1$\n\n$hint_control_hint_text_2$\n\n$hint_control_hint_text_3$"
 hint_control_hint_text_1: "[control_icon] [Concept('control', 'Контроль')|e] является одной из важнейших характеристик наших [location_icon] [Concept('locations_with_icon', 'районов')|e]. От него зависит процент [taxes_icon] [Concept('tax_base', 'налоговой базы')|e] и [levies_icon] [Concept('levies_with_icon', 'ополчений')|e], которыми можем эффективно пользоваться мы или наши [estates_icon] [Concept('estates_with_icon', 'сословия')|e]. Сколько бы [building_icon] [Concept('buildings_with_icon', 'сооружений')|e] и [population_icon] [Concept('population_with_icon', 'населения')|e] ни было в [Concept('location', 'районе')], при отсутствии [Concept('control', 'контроля')] они не приносят нам пользы.\n\nКонтроль над каждым районом ежемесячно меняется в сторону [Concept('max_control_with_icon', 'максимального контроля')|e]. [Concept('siege_with_icon', 'Осады')|e] и другие события могут временно снизить его, но со временем контроль всё равно вернётся к максимальному значению для района.\n\nConcept('max_control', 'Максимальный контроль')|e] зависит в первую очередь от [proximity_icon] [Concept('proximity', 'досягаемости')|e]. [capital_icon] [Concept('capital', 'Столица')|e] всегда обладает #W 100%#!-й досягаемостью, а для других районов это значение определяется расстоянием до столицы с учётом особенностей местности: [road_icon] [Concept('roads_with_icon', 'дороги')|e], поля и [seazones_icon] [Concept('seazones', 'акватории')|e] со значительным [Concept('maritime_presence', 'морским присутствием')|e] влияют на неё положительно, а горы, леса и [Concept('seazones', 'акватории')] с [Concept('pirates_with_icon', 'пиратами')|e] — отрицательно. На значение максимального контроля, помимо прочего, влияют [Concept('pop_satisfaction_with_icon', 'довольство групп населения')|e], [Concept('integration_status_with_icon', 'статус интеграции')|e] и наличие некоторых особых [Concept('buildings', 'сооружений')]."
 hint_control_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Стройте сооружения прежде всего в [Concept('capital', 'столице')] и соседних с ней [Concept('locations', 'районах')], поскольку там наибольший уровень [Concept('control', 'контроля')] с самого начала игры.\n@arrow_bonus_tier_2! Стройте [road_icon] [Concept('roads', 'дороги')|e] на #W панели района#!, чтобы связать [Concept('capital', 'столицу')] с самыми богатыми городами державы.\n@arrow_bonus_tier_2! Районы с [port_icon] [Concept('port', 'портами')|e] могут быть связаны со [Concept('capital', 'столицей')] морскими путями, особенно при большом [Concept('harbor_capacity_with_icon', 'размере гавани')|e]. Увеличить размер гавани в ключевых прибрежных [Concept('locations', 'районах')] можно с помощью таких [Concept('buildings', 'сооружений')], как #TOOLTIP:BUILDING_TYPE,wharf,X #L пристань#!#! или #TOOLTIP:BUILDING_TYPE,dock,X #L док#!#!.\n@arrow_bonus_tier_1! В только что [Concept('conquered_with_icon', 'завоёванном')|e] [Concept('locations', 'районе')] [Concept('control', 'контроль')] составляет #W 0%#!. Чтобы его значение достигло максимума, требуется время, но этот процесс можно ускорить, разместив в [Concept('locations', 'районе')] [Concept('army_with_icon', 'армию')|e] или совершив [cabinet_action_icon] [Concept('cabinet_action', 'действие совета')|e] #TOOLTIP:CABINET_ACTION,increase_control_province,X #L «Усиление контроля над провинцией»#!#!."
 hint_control_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('location', 'Район')], в котором [Concept('control', 'контроль')] составляет #W 0%#!, не приносит [gold_icon] [Concept('gold', 'дукатов')|e], но производимые им [Concept('goods_with_icon', 'товары')|e] всё равно поступают на [market_icon] [Concept('market', 'рынок')|e]. Мы можем воспользоваться этим, чтобы обеспечить [Concept('supply_with_icon', 'предложение')|e] важных для нас ресурсов.\n@hint! В [Concept('location', 'районах')] с высоким уровнем [Concept('control', 'контроля')] #TOOLTIP:POPTYPE,peasants,X #L крестьяне#!#! быстрее [Concept('promote_with_icon', 'повышают')|e] свой класс, удовлетворяя потребности [Concept('buildings', 'сооружений')] в [Concept('employment_with_icon', 'занятости')|e].\n@hint! Тщательно планируйте [Concept('road', 'дорожную')] сеть: всего одна [Concept('road', 'дорога')], грамотно проложенная через горный хребет, может повысить [Concept('proximity', 'досягаемость')] для множества [Concept('location', 'районов')].\n@hint! Узнать больше о том, как на [Concept('proximity', 'досягаемость')] влияет [Concept('maritime_presence_with_icon', 'морское присутствие')|e], можно [Link('hints', 'selected_hint = hint_maritime', 'здесь')].#!"
 hint_control_diplomatic: "«Высокий уровень контроля позволяет переубедить и ассимилировать самых… #italic непорядочных#! членов нашего общества»."
 hint_control_administrative: "«Район, который мы не контролируем, вряд ли будет платить нам налоги»."
 hint_control_military: "«Нам нужно контролировать территории, чтобы призывать их население на службу»."
 ### Crown Power
 hint_crown_power: "Власть правителя"
 hint_crown_power_hint_text: "$hint_crown_power_hint_text_1$\n\n$hint_crown_power_hint_text_2$\n\n$hint_crown_power_hint_text_3$"
 hint_crown_power_hint_text_1: "[Concept('crown_power_with_icon','Власть правителя')|e] характеризует влияние правительства в пределах нашей собственной державы. Мы, #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правители#!#!, обладаем верховной властью, но делимся ей с различными [Concept('estates_with_icon','сословиями')|e], а их интересы не всегда совпадают с нашими.\n\nСильная власть правителя облегчает принятие новых [Concept('laws_with_icon','правил')|e], повышает эффективность нашего [Concept('cabinet_with_icon','совета')|e] и увеличивает базовую поддержку наших решений в [Concept('parliament_with_icon','парламенте')|e]. Однако наиболее важным является то, что именно власть правителя определяет, в какой мере государство делит с [Concept('estates','сословиями')] доходы и расходы, связанные с [Concept('trade_with_icon','торговлей')|e] и [Concept('food_with_icon','пищей')|e].\n\nВласть правителя зависит в первую очередь от количества [Concept('privileges_with_icon','привилегий')|e], дарованных [Concept('estates','сословиям')], и [Concept('control_with_icon','контроля')|e] над самыми густонаселёнными [Concept('locations_with_icon','районами')|e]."
 hint_crown_power_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Повышайте контроль над [Concept('locations', 'районами')], прокладывая туда [Concept('roads_wth_icon', 'дороги')|e] из [Concept('capital_wth_icon', 'столицы')|e]. \n@arrow_bonus_tier_2! Отзывайте [Concept('privileges', 'привилегии')] для самых могущественных [Concept('estates', 'сословий')], когда наша [Concept('stability_wth_icon', 'стабильность')|e] достаточно высока, но следите за [Concept('estate_satisfaction', 'довольством сословий')|e]: их гнев может обернуться серьёзными проблемами.\n@arrow_bonus_tier_1! Увеличьте значение показателя «[Localize(Player.GetGovernment.GetGovernmentType.GetPowerConcept)]» с помощью [Concept('cabinet_action_wth_icon', 'действия совета')|e] #TOOLTIP:CABINET_ACTION,strengthen_government,X #L «Укрепление правительства»#!#!.\n@arrow_bonus_tier_1! Постройте в [Concept('capital', 'столице')] #TOOLTIP:BUILDING_TYPE,royal_court,X #L монарший двор#!#! или #TOOLTIP:BUILDING_TYPE,sergeantry,X #L сержантерию#!#!."
 hint_crown_power_hint_text_3: "#T Дополнительные советы#!\n@hint! Если власть правителя составляет 50%, то половина доходов и расходов, связанных с [Concept('trade', 'торговлей')] и [Concept('food', 'пищей')], достаётся непосредственно [Concept('treasury_wth_icon', 'казне')|e], а вторая половина распределяется между [Concept('estates', 'сословиями')] в зависимости от их [Concept('estate_power_wth_icon', 'власти')|e].\n@hint! В начале игры власть правителя обычно очень невелика, особенно в крупных [Concept('countries', 'державах')].\n@hint! В дальнейшем вам будут доступны [Concept('advances_wth_icon', 'улучшения')|e] и дополнительные [Concept('buildings', 'сооружения')], позволяющие увеличить [Concept('crown_power', 'власть правителя')]."
 hint_crown_power_diplomatic: "«Если у правителя недостаточно власти, мы вынуждены полагаться на милость сословий»."
 hint_crown_power_administrative: "«Укрепление власти правителя может способствовать торговле»."
 hint_crown_power_military: "«Централизация делает государство намного сильнее»."
 ### Estates
 hint_estates: "Сословия"
 hint_estates_hint_text: "$hint_estates_hint_text_1$\n\n$hint_estates_hint_text_2$\n\n$hint_estates_hint_text_3$"
 hint_estates_hint_text_1: "Сословия представляют интересы различных классов и групп населения нашей державы. Каждое из них обладает определённой долей [Concept('estate_power_with_icon', 'сословной власти')|e], отражающей его влияние в сравнении с другими сословиями, к которым относятся и #TOOLTIP:ESTATE_TYPE,crown_estate,X правители#!#!. Общая сумма власти всех сословий всегда составляет 100%.\n\nОсновным источником сословной власти является [Concept('population_with_icon', 'население')|e], причём каждый [Concept('pop_type_with_icon', 'общественный класс')|e] оказывает поддержку одному конкретному [Concept('estate', 'сословию')]. Затем сословная власть меняется в зависимости от действующих [Concept('laws_with_icon', 'правил')|e] и [Concept('privileges_with_icon', 'привилегий')|e].\n\nОт власти каждого сословия зависит его влияние в [Concept('parliament_with_icon', 'парламенте')|e], [Concept('tax_with_icon', 'налогообложение')|e], а также доля доходов и расходов, связанных с [Concept('trade_with_icon', 'торговлей')|e] и [Concept('food_with_icon', 'пищей')|e].\n\nУ каждого сословия также есть [Concept('estate_satisfaction_with_icon', 'довольство')|e], которое характеризует его согласие с политикой нашего правительства. Если сословие удовлетворено, то вы получаете определённые для него преимущества, а если значение довольства опускается ниже #W 50%#!, возникают негативные эффекты. Слишком низкое [Concept('estate_satisfaction', 'довольство')] одного из сословий может привести к тому, что связанные с ним [Concept('pops_with_icon', 'группы населения')|e] поднимут [Concept('rebellions_with_icon', 'мятеж')|e]. Но самое неприятное заключается в том, что при довольстве ниже #W 25%#! сословие перестаёт предоставлять [Concept('levies_with_icon', 'ополчение')|e]."
 hint_estates_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! [Concept('taxes_with_icon', 'Налоги')|e], собираемые с [Concept('estates', 'сословий')], являются главным источником [Concept('income_with_icon', 'дохода')|e] для большинства [Concept('countries', 'держав')]. Настроить или автоматизировать сбор налогов можно на @economy_panel! #W панели баланса#!.\n@arrow_bonus_tier_2! Любая власть, которой обладают сословия, ограничивает нашу собственную [Concept('crown_power_with_icon', 'власть правителей')|e]. Чтобы уменьшить власть определённого сословия, можно лишить его [Concept('privileges_with_icon', 'привилегий')|e] на @government_panel! #W вкладке «Сословия»#!.\n@arrow_bonus_tier_1! Чтобы умиротворить мятежное сословие, вы можете снизить для него [Concept('taxes', 'налоги')], даровать ему [Concept('privilege', 'привилегию')] или подкупить его с помощью @government_panel! #W вкладки «Сословия»#!."
 hint_estates_hint_text_3: "#T Дополнительные советы#!\n@hint! Сословия собирают всю [Concept('tax_base_with_icon', 'налоговую базу')|e] в [Concept('locations_with_icon', 'районах')|e] нашей державы, а нам достаются только те средства, которые мы получаем от этих сословий в виде [Concept('taxes', 'налогов')|e].\n@hint! На ранних этапах игры [Concept('wars_with_icon', 'воюющие')|e] [Concept('countries', 'державы')] очень сильно зависят от [Concept('levies_with_icon', 'ополчения')|e], которое предоставляют [Concept('estates', 'сословия')], но с появлением более современных [Concept('regular_regiments_with_icon', 'регулярных войск')|e] эта зависимость постепенно сходит на нет."
 hint_estates_diplomatic: "«Сильное сословие священников укрепляет стабильность державы»."
 hint_estates_administrative: "«Сильное сословие горожан приносит нам богатство и расширяет торговые связи»."
 hint_estates_military: "«Сильная аристократия увеличивает численность и мощь наших армий»."
 ### Markets
 hint_markets: "Рынки"
 hint_markets_hint_text: "$hint_markets_hint_text_1$\n\n$hint_markets_hint_text_2$\n\n$hint_markets_hint_text_3$"
 hint_markets_hint_text_1: "[Concept('markets_with_icon', 'Рынки')|e] — это основа экономики в игре #italic Europa Universalis V#!. Каждый район относится к определённому рынку, где происходит покупка и продажа товаров для [Concept('pop_needs_with_icon', 'нужд населения')|e], [Concept('buildings_with_icon', 'сооружений')|e] и [Concept('constructions_with_icon', 'строительства')|e]. Продажа товаров на рынке увеличивает [Concept('tax_base_with_icon', 'налоговую базу')|e] района для [Concept('estates_with_icon', 'сословий')|e], с которых, в свою очередь, собирает [Concept('taxes_with_icon', 'налоги')|e] правительство."
 hint_markets_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Чтобы увидеть доступные нам рынки, перейдите на @economy_panel! [Link('trade', 'subtab = markets', 'панель рынков')]. #G Зелёным#! цветом выделяются рынки, [Concept('owned_with_icon', 'принадлежащие')|e] нам, а синим — рынки, где у нас есть [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e], но нет [Concept('location', 'районов')] [Concept('own', 'во владении')].\n@arrow_bonus_tier_3! Лучше автоматизировать каждый отдельный [Concept('market', 'рынок')], щёлкнув по @automation! #W значку шестерни#!. Таким образом мы всегда будем использовать весь [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] наших самых эффективных [Concept('merchants_with_icon', 'купцов')|e].\n@arrow_bonus_tier_2! Для увеличения [Concept('merchant_capacity_with_icon', 'торгового потенциала')|e] можно строить такие [Concept('buildings_with_icon', 'сооружения')|e], как #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#! и #TOOLTIP:BUILDING_TYPE,trade_office,X #L торговые конторы#!#!."
 hint_markets_hint_text_3: "#T Дополнительные советы#!\n@hint! Границы рынков подвижны. Каждый [Concept('location', 'район')] автоматически переходит в сферу влияния [Concept('market', 'рынка')] с наивысшей [Concept('market_attraction_wth_icon', 'рыночной привлекательностью')|e] на своей территории, даже если этот рынок является иностранным. При этом [Concept('market_attraction', 'привлекательность')] иностранных рынков можно уменьшить с помощью [Concept('protectionism_wth_icon', 'протекционизма')|e]."
 hint_markets_diplomatic: "«Невидимая рука сильна, но иногда её нужно слегка направить»."
 hint_markets_administrative: "«Это экономика, глупцы!»"
 hint_markets_military: "«Рост наших рынков — это хорошо.\nЗавоевание соседских рынков — ещё лучше»."
 ### Food
 hint_food: "Пища"
 hint_food_hint_text: "$hint_food_hint_text_1$\n\n$hint_food_hint_text_2$\n\n$hint_food_hint_text_3$"
 hint_food_hint_text_1: "[Concept('food_with_icon', 'Пища')|e] нужна [Concept('pops_with_icon', 'группам населения')|e] для выживания, а [Concept('armies_with_icon', 'армиям')|e] — для ведения войны. И те, и другие получают её из запасов [Concept('province_with_icon', 'провинции')|e], в которой находятся (но не из запасов [Concept('location', 'района')]). Если этих запасов окажется недостаточно, [Concept('pops', 'население')] будет [Concept('starvation_with_icon', 'голодать')|e], а [Concept('armies', 'армии')] — страдать от [Concept('attrition_with_icon', 'истощения')|e].\n\nЕсть три уровня производства и распределения пищи:\n\n@location! [Concept('local_food_with_icon', 'Местная пища')|e]\nПища производится преимущественно в [Concept('locations_with_icon', 'районах')|e] с [Concept('rgo_with_icon', 'источниками сырья')|e] для [Concept('food_raw_materials_with_icon', 'производства пищи')|e] — например, #TOOLTIP:GOODS,livestock,X #L скотом#!#!. Её избыток или дефицит добавляется к запасу пищи в провинции.\n\n@province! [Concept('provincial_food', 'Запас пищи в провинции')|e]\nЭто самый важный уровень. Если [Concept('province_with_icon', 'провинция')|e] не производит достаточно пищи для обеспечения всех своих районов, запас пищи в провинции сокращается. Как только этот запас полностью иссякнет, все районы провинции начнут страдать от [Concept('starvation_with_icon', 'голода')|e]. Но прежде чем это случится, провинция попытается [Concept('buy_food_with_icon', 'купить пищу')|e] на рынке.\n\n@market! [Concept('market_food', 'Пища на рынке')|e]\nВсе провинции на [Concept('market_with_icon', 'рынке')|e] стремятся [Concept('sell_food_with_icon', 'продать пищу')|e] при избытке запасов и [Concept('buy_food', 'купить')] её при нехватке. Пока на рынке хватает пищи, голод никому не грозит."
 hint_food_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Доступные нам рынки можно увидеть на @economy_panel! [Link('trade', 'subtab = markets', 'панели рынков')]. #G Зелёным#! цветом там обозначены рынки, к которым относятся [Concept('owned_with_icon', 'принадлежащие')|e] нам [Concept('locations', 'районы')], поэтому нам нужно следить, чтобы баланс [Concept('food', 'пищи')] на этих рынках всегда оставался положительным. Если количество [Concept('food', 'пищи')] на любом из наших рынков начнёт быстро уменьшаться, мы увидим жёлтый баннер, а если в отдельных [Concept('locations', 'районах')] начался голод — красный.\n@arrow_bonus_tier_3! Чтобы увеличить производство пищи на любом из наших рынков, нажмите кнопку «Пища» и перейдите на @production_panel! [Link('food_production', '', 'панель производства пищи')]. Здесь можно увидеть, каким из наших [Concept('provinces', 'провинций')] угрожает [Concept('starvation', 'голод')], и расширить там [Concept('rgo', 'добычу ресурсов')].\n@arrow_bonus_tier_3! Расширять [Concept('rgo_with_icon', 'добычу ресурсов')|e] рекомендуется в районах с наибольшим запасом [Concept('food_raw_materials', 'ресурсов для производства пищи')] (к примеру, #TOOLTIP:GOODS,rice,X #L риса#!#! или #TOOLTIP:GOODS,wheat,X #L пшеницы#!#!), а также высокой [Concept('food_productivity_with_icon', 'эффективностью её производства')|e].\n@arrow_bonus_tier_1! Мы также можем воспользоваться [Concept('merchant_capacity_with_icon', 'торговым потенциалом')|e], чтобы импортировать [Concept('food_raw_materials_with_icon', 'ресурсы для производства пищи')|e] с других [Concept('markets', 'рынков')] и таким образом получать нужное количество [Concept('food', 'пищи')]. Это можно сделать на @economy_panel! [Link('trade', 'subtab = trades', 'панели торговли')]."
 hint_food_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('winter_with_icon', 'зимой')|e] производство пищи уменьшается. Не пугайтесь, если увидите, что баланс пищи на всех наших рынках отрицателен в течение нескольких месяцев.\n@hint! [Concept('provinces', 'Провинции')] с дефицитом пищи автоматически закупают излишки у более продуктивных провинций, относящихся к тому же рынку, поэтому производство пищи лучше всего развивать в [Concept('locations', 'районах')] с наивысшей [Concept('food_productivity', 'эффективностью этого производства')].\n@hint! В [Concept('town_or_city_with_icon', 'городских')|e] районах эффективность производства [Concept('food', 'пищи')] обычно ниже, чем в [Concept('rural_locations_with_icon', 'сельских')|e]."
 hint_food_diplomatic: "«Длительный голод может погубить как наше население, так и саму державу»."
 hint_food_administrative: "«На голод можно смотреть по-разному. Если вы продаёте всем пищу, то голод не так уж и плох»."
 hint_food_military: "«Голодный солдат много не навоюет»."
 ### Maritime Presence
 hint_maritime: "Морское присутствие"
 hint_maritime_hint_text: "$hint_maritime_hint_text_1$\n\n$hint_maritime_hint_text_2$\n\n$hint_maritime_hint_text_3$"
 hint_maritime_hint_text_1: "[Concept('maritime_presence_wth_icon', 'Морское присутствие')|E] — крайне важная характеристика, свойственная прибрежным [Concept('seazones_wth_icon', 'акваториям')|E]. Она способствует поддержанию [Concept('proximity_wth_icon', 'досягаемости')|E] для наших берегов и островов.\n\nКроме того, благодаря морскому присутствию на [Concept('market_wth_icon', 'рынке')|E], к которому относятся [Concept('seazones', 'акватории')], набирается [Concept('merchant_power_wth_icon', 'торговое преимущество')|E].\n\n[Concept('maritime_presence', 'Морское присутствие')] растёт пассивно — этому помогают сооружения и присутствие [Concept('navy_wth_icon', 'флота')|E]. Оно может уменьшаться или даже утратиться окончательно под воздействием [Concept('privateers_wth_icon', 'каперов')|E] и [Concept('blockade_wth_icon', 'блокад')|E]."
 hint_maritime_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Стройте специализированные [Concept('navies', 'флоты')] из кораблей, которые набирают [Concept('maritime_presence', 'морское присутствие')] в больших количествах. Их можно разместить в какой-либо прибрежной [Concept('seazones', 'акватории')], и тогда они будут равномерно распространять [Concept('maritime_presence', 'морское присутствие')] на все [Concept('seazones', 'акватории')], которые относятся к одной и той же [Concept('province_wth_icon', 'провинции')|e].\n@arrow_bonus_tier_3! Другой вариант: задайте им [Concept('military_objective', military_objective! военную цель')|e] #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!. Эффект будет таким же, но при этом корабли, нуждающиеся в ремонте, смогут автоматически причаливать.\n@arrow_bonus_tier_1! #TOOLTIP:BUILDING_TYPE,coastal_fort,X #L Береговая крепость#!#! — крайне полезное сооружение!"
 hint_maritime_hint_text_3: "#T Дополнительные советы#!\n@hint! [Concept('maritime_presence', 'Морское присутствие')] распространяется лишь на ту [Concept('province', 'провинцию')], где есть корабли, даже если поставленная цель охватывает несколько [Concept('provinces', 'провинций')]. [Concept('navy', 'Флот')], выполняющий цель #V «$MILITARY_OBJECTIVE_TYPE_NAME_patrol_the_seas$»#!, покинет свою [Concept('seazone', 'акваторию')] лишь тогда, когда [Concept('maritime_presence', 'морское присутствие')] в этом районе достигнет 100 единиц.\n@hint! Деятельность [Concept('privateers', 'каперов')] по сравнению с [Concept('maritime_presence', 'морским присутствием')] охватывает лишь [Concept('area_wth_icon', 'области')|e]."
 hint_maritime_diplomatic: "«Чтобы выгоднее торговать, нам придётся воспользоваться своим природным преимуществом — береговой линией»."
 hint_maritime_administrative: "«Чем безопаснее мореходство, тем лучше взаимодействие с народом»."
 hint_maritime_military: "«Сильный флот надёжно защитит наши торговые пути от пиратов»."
 hint_slaves: "Рабы"
 hint_slaves_hint_text: "$hint_slaves_hint_text_1$\n\n$hint_slaves_hint_text_2$\n\n$hint_slaves_hint_text_3$"
 hint_slaves_hint_text_1: "@slaves_goods! #TOOLTIP:GOODS,slaves_goods,X #L Рабы#!#! — особенный вид [Concept('good_with_icon', 'товара')|e]. Как и любой другой [Concept('good', 'товар')], их покупают и продают на [Concept('markets_with_icon', 'рынках')|e], а цена зависит от [Concept('supply_with_icon', 'предложения')|e] и [Concept('demand_with_icon', 'спроса')|e]. Но в отличие от прочих [Concept('good', 'товаров')], рабы — это реальные [Concept('pops_with_icon', 'группы населения')|e], которые перемещаются при торговле [Concept('good', 'товаром')].\n\n@slaves! #TOOLTIP:POPTYPE,slaves,X #L Рабы#!#! как [Concept('pop_type_with_icon', 'общественный класс')|e] могут работать в местах [Concept('rgo_with_icon', 'добычи ресурсов')|e] и рабовладельческих [Concept('buildings_with_icon', 'сооружениях')|e], таких как #TOOLTIP:BUILDING_TYPE,sugar_plantation,X #L плантация сахарного тростника#!#!.\n\n[Concept('buildings', 'Сооружения')] вроде #TOOLTIP:BUILDING_TYPE,slave_market,X #L невольничьего рынка#!#! могут превращать существующих @slaves! #TOOLTIP:POPTYPE,slaves,X #L рабов#!#! в [Concept('goods', 'продаваемых')] @slaves_goods! #TOOLTIP:GOODS,slaves_goods,X #L рабов#!#!. В дальнейшем этим [Concept('good', 'товаром')] можно торговать на [Concept('market', 'рынке')], как и любым другим, а [Concept('buildings', 'сооружения')] смогут удовлетворять этим [Concept('good', 'товаром')] свой спрос. В таком случае @slaves! #TOOLTIP:POPTYPE,slaves,X #L рабы#!#! переместятся в [Concept('location', 'район')], чтобы работать в [Concept('building', 'сооружении')]."
 hint_slaves_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Создавая [Concept('colonies_with_icon', 'колонии')|e] на другом [Concept('continent_with_icon', 'континенте')|e], вы сможете [Concept('trade_with_icon', 'продавать')|e] рабов на колониальных [Concept('markets', 'рынках')], чтобы они работали на плантациях.\n@arrow_bonus_tier_2! Вы можете возводить #TOOLTIP:BUILDING_TYPE,slave_center,X #L центры работорговли#!#! в чужих [Concept('locations', 'районах')] в пределах [Concept('trade_range_with_icon', 'торговой дистанции')|e], чтобы обеспечить себе стабильный приток рабов."
 hint_slaves_hint_text_3: "#T Дополнительные советы#!\n@hint! Обычно [Concept('pops_with_icon', 'группы населения')|e] становятся рабами для [Concept('buildings', 'сооружений')] вроде #TOOLTIP:BUILDING_TYPE,slave_market,X #L невольничьего рынка#!#!, хотя у некоторых [Concept('countries', 'держав')] есть особые механики, позволяющие порабощать [Concept('pops', 'группы населения')] во время [Concept('war_with_icon', 'войны')|e].\n@hint! #TOOLTIP:RELIGIONGROUP,christian,X #L Христианство#!#! допускает использование рабов лишь на плантациях — эти [Concept('buildings', 'сооружения')] появляются в #V эпоху Открытий#! и доступны только в заморских землях."
 hint_slaves_diplomatic: "«Все люди сотворены равными, но есть исключения»."
 hint_slaves_administrative: "«Великие свершения всегда требуют немалых жертв»."
 hint_slaves_military: "«Раз свободный труд всегда в дефиците, воспользуемся язычниками»."
 #### ECO tutorial
 hint_eco: "Продвинутый экономический совет"
 hint_eco_hint_text: "$hint_eco_hint_text_1$\n\n$hint_eco_hint_text_2$\n\n$hint_eco_hint_text_3$"
 hint_eco_hint_text_1: "Многие аспекты экономики можно автоматизировать, однако, чтобы способствовать развитию [Concept('country', 'державы')], некоторые действия придётся предпринимать лично."
 hint_eco_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Всегда старайтесь сокращать [Concept('expenses_with_icon', 'расходы')|e].\n\n@arrow_bonus_tier_3! Сосредоточьтесь на планировании [Concept('towns_and_cities_with_icon', 'городов')|e] и [Concept('roads_with_icon', 'дорог')|e].\n    Поскольку [Concept('towns_and_cities_with_icon', 'городские районы')|e] сокращают доступное число мест [Concept('rgo_with_icon', 'добычи ресурсов')|e], лучше развивать города из наименее ценных [Concept('rural_locations', 'сельских районов')]. Обычно в таких районах добывается следующее.\n@sand!#TOOLTIP:GOODS,sand,X #L Песок#!#! @clay!#TOOLTIP:GOODS,clay,X #L Глина#!#! @horses!#TOOLTIP:GOODS,horses,X #L Лошади#!#! @medicaments!#TOOLTIP:GOODS,medicaments,X #L Лекарства#!#! @wine!#TOOLTIP:GOODS,wine,X #L Вино#!#! @olives!#TOOLTIP:GOODS,olives,X #L Оливки#!#! @millet!#TOOLTIP:GOODS,millet,X #L Неприхотливые злаки#!#! @legumes!#TOOLTIP:GOODS,legumes,X #L Бобовые#!#! @fruit!#TOOLTIP:GOODS,fruit,X #L Фрукты#!#! @wild_game!#TOOLTIP:GOODS,wild_game,X #L Дичь#!#! @beeswax!#TOOLTIP:GOODS,beeswax,X #L Пчелиный воск#!#! \n\n@arrow_bonus_tier_3! Выделяйте [Concept('subjects_with_icon', 'ленников')|e] на землях со слабым [Concept('control_with_icon', 'контролем')|e] — там у этих ленников появится свой контроль.\n    [Concept('annex_with_icon', 'Присоединяйте')|e] своих ленников, когда расширите местную инфраструктуру.\n    Скорость [Concept('annexation_with_icon', 'присоединения')|e] зависит от относительного размера держав и их [Concept('cultural_influence_with_icon', 'культурного влияния')|e].\n\n@arrow_bonus_tier_2! [Concept('rgo_with_icon', 'Добыча ценных ресурсов')|e] — хорошая инвестиция, особенно если параллельно развивать [Concept('merchant_capacity_with_icon', 'торговый потенциал')|e] для их [Concept('export_with_icon', 'экспорта')|e].\n@goods_gold!#TOOLTIP:GOODS,goods_gold,X #L Золото#!#! @silver!#TOOLTIP:GOODS,silver,X Серебро#! @gems!#TOOLTIP:GOODS,gems,X #L Драгоценные камни#!#! @pearls!#TOOLTIP:GOODS,pearl,X #L Жемчуг#!#! @amber!#TOOLTIP:GOODS,amber,X #L Янтарь#!#! @ivory!#TOOLTIP:GOODS,ivory,X #L Поделочная кость#!#! @pepper!#TOOLTIP:GOODS,pepper,X #L Перец#!#! @saffron!#TOOLTIP:GOODS,saffron,X #L Шафран#!#! @chili!#TOOLTIP:GOODS,chili,X #L Чили#!#!\n\n@arrow_bonus_tier_2! На [Concept('trade_income_with_icon', 'доходы от торговли')|e] влияет [Link('hints', 'selected_hint = hint_crown_power_with_icon', 'власть правителей')]. Вам стоит по возможности увеличивать эти доходы, наращивая [Link('hints', 'selected_hint = hint_increasing_trade_capacity_with_icon', 'торговый потенциал')], который, в отличие от [Concept('tax_base', 'налоговой базы')], не увеличивается с ростом [Concept('control', 'контроля')].\n\n@arrow_bonus_tier_1! Поддерживайте низкие цены на промышленные товары! Они увеличат доходы от городов и снизят расходы на содержание [Concept('buildings_with_icon', 'сооружений')|e].\n@lumber!#TOOLTIP:GOODS,lumber,X #L Лесоматериалы#!#! @masonry!#TOOLTIP:GOODS,masonry,X #L Каменная кладка#!#! @glass!#TOOLTIP:GOODS,glass,X #L Стекло#!#! @iron!#TOOLTIP:GOODS,iron,X #L Железо#!#! @mercury!#TOOLTIP:GOODS,mercury,X #L Ртуть#!#! @steel!#TOOLTIP:GOODS,steel,X #L Сталь#!#!\n\n@arrow_bonus_tier_1! Сооружения без определённого [Concept('production_method_with_icon', 'метода производства')|e] потребуют расходов на [Concept('maintenance_with_icon', 'содержание')|e]. Эти расходы будут меняться в зависимости от цены потребляемых товаров. Помните, что [Concept('demand_with_icon', 'спрос')|e] [Concept('buildings', 'сооружений')] также способствует экономическому росту!"
 hint_eco_hint_text_3: "#T Дополнительные советы#!\n[Link('hints', 'selected_hint = hint_inflation', '@hint! Снижение инфляции')]\n[Link('hints', 'selected_hint = hint_increasing_trade_capacity', '@hint! Увеличение торгового потенциала')]\n[Link('hints', 'selected_hint = hint_control', '@hint! Усиление контроля')]"
 hint_eco_diplomatic: "«Монеты нередко становятся лучшим инструментом влияния»."
 hint_eco_administrative: "«Золото — есть кровь державы»."
 hint_eco_military: "«Доход, отнятый у другого, — лучший вид доходов»."
 #### POL tutorial
 hint_pol: "Продвинутый политический совет"
 hint_pol_hint_text: "$hint_pol_hint_text_1$\n\n$hint_pol_hint_text_2$\n\n$hint_pol_hint_text_3$"
 hint_pol_hint_text_1: "В начале игры у всех [Concept('countries_wth_icon', 'держав')|e] есть свои недостатки. Обязательно ознакомьтесь с [Concept('privileges_wth_icon', 'привилегиями')|e] и [Concept('laws_wth_icon', 'сводами правил')|e] на вкладке [Link('government', 'tabcontent = estates_wth_icon', '$lateralview_government_entry_name$')]. Масштабные изменения могут оказаться очень полезными в долгосрочной перспективе.\n\nНе бойтесь перемен!"
 hint_pol_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Убедитесь, что [Concept('estate_satisfaction_equilibrium_with_icon', 'равновесное довольство')|e] позволяет облагать #TOOLTIP:ESTATE_TYPE,burghers_estate,X горожан#!#! и #TOOLTIP:ESTATE_TYPE,peasants_estate,X простолюдинов#!#! максимальными [Concept('tax_with_icon', 'налогами')|e] и при этом не опускается ниже #W 50%#!.\n\n@arrow_bonus_tier_3! Откройте [Link('societal_values', '', '@government_panel! Панель правительства > Ценности')], чтобы узнать, к каким [Concept('societal_values_with_icon', 'общественным ценностям')|e] стоит стремиться. Обычно наиболее выгодными являются следующие.\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('capital_economy')]\n$BULLET_WITH_TAB$[ShowSocietyDirectionName('centralization')]\n\n@arrow_bonus_tier_3! Изучите [Concept('laws_with_icon', 'свод правил')|e] и посмотрите, какие правила стоит изменить.\n    [Concept('parliament_with_icon', 'Парламент')|e] должен стать одним из приоритетов на раннем этапе игры, поскольку с его помощью менять правила будет проще.\n    Вот правила, на которые стоит обратить внимание в начале игры.\n    $BULLET_WITH_TAB$[ShowLawName('mining_law')]\n    $BULLET_WITH_TAB$[ShowLawName('precious_metal_distribution_law')]\n    $BULLET_WITH_TAB$[ShowLawName('distribution_of_power_law')]\n    $BULLET_WITH_TAB$[ShowLawName('administrative_system')]\n\n@arrow_bonus_tier_3! Изучите уже выданные и доступные [Concept('privileges_with_icon', 'привилегии')|e] для каждого [Concept('estate_with_icon', 'сословия')|e]. Они позволят менять равновесное довольство и сдвигаться по шкале общественных ценностей.\n   #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L Аристократам#!#! нужно давать достаточно привилегий, чтобы заручиться их верностью, но не более. Уменьшение власти этого сословия принесёт вам пользу в долгосрочной перспективе.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobles_land_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('nobility_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_serfdom_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('noble_sponsored_navy')]\n\n   #TOOLTIP:ESTATE_TYPE,clergy_estate,X #L Священникам#!#! стоит даровать все положительные привилегии, даже если их нельзя облагать налогами. Каждая единица их довольства сверх #W 50%#! даёт бонус к [Concept('research_progress_with_icon', 'прогрессу исследования')|e].\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('embellish_great_works_of_faith')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_in_administration')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clergy_religious_state')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('clerical_advisory_council')]\n\n   #TOOLTIP:ESTATE_TYPE,burghers_estate,X #L Горожанам#!#! нужно даровать как можно больше положительных привилегий. Они принесут вам пользу, а увеличение [Concept('estate_power_with_icon', 'сословной власти')|e] горожан уменьшит власть других сословий. Кроме того, каждая единица их довольства повышает [Concept('production_efficiency_with_icon', 'производственную эффективность')|e].\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_roads_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('market_fairs')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('building_rights')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_trade_center_sponsorship')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('commercial_advisory_council')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('control_over_the_coinage')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('guild_investments')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('land_of_commerce')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('urban_development_grants')]\n\n   Привилегии #TOOLTIP:ESTATE_TYPE,peasants_estate,X #L простолюдинов#!#! должны обеспечивать им достаточно равновесного довольства, чтобы облагать их максимальным налогом, но не стоит забывать об их склонности к #TOOLTIP:SOCIETAL_VALUE,centralization_vs_decentralization,X #L децентрализации#!#!. Сословная власть простолюдинов невелика, поэтому отъём их привилегий обойдётся вам дешевле, чем для других сословий.\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_allowed_weapons_privilege')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('allow_hunting')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('no_labor_sunday')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_represented_in_parliament')]\n    $BULLET_WITH_TAB$[ShowEstatePrivilegeName('peasants_fewer_levies')]\n\n@arrow_bonus_tier_2! Обращайте внимание на [Concept('government_reforms_with_icon', 'государственные принципы')|e], которые соответствуют интересующим вас общественным ценностям. Помните, что благодаря некоторым бонусам, например к [Concept('diplomatic_capacity_with_icon', 'дипломатическому потенциалу')|e], можно снизить [Concept('diplomatic_maintenance_with_icon', 'затраты на дипломатию')|e].\n\n@arrow_bonus_tier_2! Некоторые [Concept('cabinet_actions_with_icon', 'действия совета')|e], такие как #TOOLTIP:CABINET_ACTION,stabilize_country,X #L повышение стабильности в державе#!#! или #TOOLTIP:CABINET_ACTION,strengthen_government,X #L укрепление правительства#!#!, позволяют сократить расходы, оставляя в вашем распоряжении больше доходов!"
 hint_pol_hint_text_3: "#T Дополнительные советы#!\n[Link('hints', 'selected_hint = hint_crown_power', '@hint! Власть правителя')]\n[Link('hints', 'selected_hint = hint_estates', '@hint! Сословия')]"
 hint_pol_diplomatic: "«Практичный правитель извлекает выгоду из любой ситуации»."
 hint_pol_administrative: "«Успешная политика — залог процветания»."
 hint_pol_military: "«Сословия часто хуже любого врага»."
 #### MIL tutorial
 hint_mil: "Продвинутый совет по экспансии"
 hint_mil_hint_text: "$hint_mil_hint_text_1$\n\n$hint_mil_hint_text_2$\n\n$hint_mil_hint_text_3$"
 hint_mil_hint_text_1: "Два общих совета: профессиональные [Concept('armies_with_icon', 'армии')|e] (включая [Concept('mercenaries_with_icon', 'наёмников')|e]) всегда побеждают [Concept('levies_with_icon', 'ополчение')|e] равной численности, а лучшим способом нарастить армию является экономический рост."
 hint_mil_hint_text_2: "#T Рекомендации#!\n@arrow_bonus_tier_3! Постарайтесь как можно скорее открыть [Concept('institution', 'институт')|e] #TOOLTIP:INSTITUTION,professional_armies,X #L профессиональных армий#!#!: #TOOLTIP:ADVANCE_DEFINITION,armory_advance,X #L арсенал#!#! позволит вам побеждать в тех [Concept('wars_with_icon', 'войнах')|e], где раньше это было невозможно.\n\n@arrow_bonus_tier_3! [Concept('war_score_with_icon', 'Военный счёт')|e] за победы в [Concept('battles_with_icon', 'битвах')|e] уменьшается с каждой [Concept('ages_with_icon', 'эпохой')|e]. В начале он может достигать #W 50%#!, что позволит выигрывать [Concept('wars_with_icon', 'войны')|e] за счёт одних только битв!\n\n@arrow_bonus_tier_3! Убедитесь, что у вас есть доступ к стратегическим [Concept('goods_with_icon', 'товарам')|e]. Они не нужны в больших объёмах, но без них вам не увеличить численность [Concept('army_with_icon', 'армии')|e] и [Concept('navy_with_icon', 'флота')|e]: @tin! #TOOLTIP:GOODS,tin,X #L олово#!#!, @lead! #TOOLTIP:GOODS,lead,X #L свинец#!#! и @copper! #TOOLTIP:GOODS,copper,X #L медь#!#!.\n\n@arrow_bonus_tier_3! Армии [Concept('reinforce_with_icon', 'пополняются')|e] только на дружественной территории.\n\n@arrow_bonus_tier_3! #TOOLTIP:UNITCATEGORY,army_infantry,X #L Пехота#!#! образует основную [Concept('battle_with_icon', 'боевую')|e] линию. Она дешёвая и эффективно поглощает [Concept('damage_taken', 'получаемый урон')|e], тогда как #TOOLTIP:UNITCATEGORY,army_artillery,X #L артиллерия#!#! наносит основной урон на линии фронта. Крайне важно, чтобы линия фронта пережила [Concept('bombard_phase_with_icon', 'фазу обстрела')|e].\n\n@arrow_bonus_tier_2! Не менее важно, чтобы у ваших армий на [Concept('enemy_with_icon', 'вражеской')|e] территории была прямая линия снабжения. Если её перерезать, армия может погибнуть от [Concept('attrition', 'истощения')|e]. Используйте #TOOLTIP:UNITCATEGORY,army_auxiliary,X #L вспомогательные войска#!#!, чтобы доставлять [Concept('food_with_icon', 'пищу')|e] на линию фронта, или стройте [Concept('supply_depots_with_icon', 'продовольственные склады')|e].\n\n@arrow_bonus_tier_1! [Concept('buildings', 'Сооружения')|e], увеличивающие [Concept('manpower_with_icon', 'число рекрутов')|e], обладают самой большой стоимостью [Concept('maintenance_with_icon', 'содержания')|e] в игре. Их лучше возводить в [Concept('locations_with_icon', 'районах')|e] с высоким уровнем [Concept('control_with_icon', 'контроля')|e].\n\n@arrow_bonus_tier_1! Обычно сражения длятся всего несколько дней, поэтому убедитесь, что у вас есть подкрепления, прежде чем двигаться вглубь вражеской территории."
 hint_mil_hint_text_3: "#T Дополнительные советы#!\n[Link('hints', 'selected_hint = hint_manpower', '@hint! Число рекрутов')]\n[Link('hints', 'selected_hint = hint_sailors', '@hint! Моряки')]\n[Link('hints', 'selected_hint = hint_war', '@hint! Война')]\n[Link('hints', 'selected_hint = hint_battle', '@hint! Битвы')]\n[Link('hints', 'selected_hint = hint_siege_and_occupation', '@hint! Оккупация и осада')]"
 hint_mil_diplomatic: "«Пусть другие державы выигрывают ваши войны»."
 hint_mil_administrative: "«Истощение погубит любую армию»."
 hint_mil_military: "«Не приходите на перестрелку с ножом»."
 hint_holland: "Базовый совет по игре за Голландию"
 hint_holland_hint_text: "Крайне урбанизированные [Concept('locations', 'районы')] Нидерландов делают [Player.Custom(longname_ru_ACC)] главным кандидатом на роль коммерческого центра Северной Европы.\n\n@hint! #T Возводите #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#! во всех #TOOLTIP:LOCATIONRANK,town,X #L городках#!#!#!\nАвтоматизированная торговля воспользуется их [Concept('merchant_capacity_with_icon', 'торговым потенциалом')|e], чтобы [Concept('import_with_icon', 'импортировать')|e] [Concept('raw_materials_with_icon', 'сырьё')|e], которого нет на рынке #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [market_icon][Player.GetCapital.GetMarket.GetShortName], и [Concept('export_with_icon', 'экспортировать')|e] излишки [Concept('produced_goods_with_icon', 'товаров, производимых в наших городках')|e].\n\n@hint! #T Расширяйте текстильную промышленность#!\nНа экспорте #TOOLTIP:GOODS,fine_cloth,X тонкого сукна#! можно хорошо заработать. Возводите #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гильдии прядильщиков#!#! и #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гильдии портных#!#! и при необходимости импортируйте #TOOLTIP:GOODS,wool,X шерсть#! с #TOOLTIP:LOCATION,london,X #L лондонского#!#! рынка.\n\n@hint! #T Увеличьте [Concept('crown_power', 'власть правителей')]#!\n[Concept('trade_income_with_icon', 'Доходы от торговли')|e] делятся между #TOOLTIP:ESTATE_TYPE,crown_estate,X #L правителями#!#! и [Concept('estates_with_icon', 'сословиями')|e] в соответствии с их относительной властью. Большая [Concept('crown_power_with_icon', 'власть правителей')|e] обеспечит стабильный приток [Concept('trade_income', 'доходов от торговли')] в [Concept('treasury_with_icon', 'казну')|e]. Подробнее о [Concept('crown_power', 'власти правителей')] можно узнать [Link('hints', 'selected_hint = hint_crown_power', 'здесь')].\n\n@hint! #T Следите за поступлением [Concept('food', 'пищи')]#!\n[Concept('urban_locations_with_icon', 'Городские районы')|e] производят меньше [Concept('food_with_icon', 'пищи')|e], чем [Concept('rural_locations_with_icon', 'сельские')|e]. Следите за [Concept('food_stockpile_with_icon', 'запасами пищи')|e] на рынке #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [Player.GetCapital.GetMarket.GetShortName] и по необходимости наращивайте [Concept('rgo_with_icon', 'добычу')|e] #TOOLTIP:GOODS,fish,X рыбы#! и #TOOLTIP:GOODS,livestock,X скота#!. Если [Concept('food', 'пища')] станет слишком дорогой, это негативно скажется на [Concept('budget', 'балансе')] казны.\n\n@hint! #T Дружите с соседями#!\nХоть мы и богаты, но из-за своих скромных размеров уязвимы перед вражеской агрессией. Используйте [Concept('diplomatic_action_with_icon', 'дипломатическое действие')|e] «$IMPROVE_RELATIONTITLE$» в отношении наиболее грозных соседей, таких как [GetCountry('FRA').GetName] и [GetCountry('ENG').GetName]."
 hint_holland_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_holland_administrative: "$hint_advisor_salute_administrative$"
 hint_holland_military: "$hint_advisor_salute_military$"
 hint_hungary: "Базовый совет по игре за Венгрию"
 hint_hungary_hint_text: "[Player.GetLongName] начина[Player.Custom('endlong_etyut')] игру в привилегированном положении как одна из главных держав [Concept('region', 'региона')|e]. У нас есть [Concept('alliance_with_icon', 'союз')|e] с #W Польшей#!, #W Босния#! наш [Concept('subject_with_icon', 'ленник')|e], а [Player.GetGovernment.GetRuler.GetName|l] [Concept('ruler_with_icon', 'правит')|e] #W Хорватией#! на правах [Concept('personal_union_with_icon', 'личной унии')|e]. Это означает, что мы можем направить свои усилия на развитие [Concept('country_with_icon', 'державы')|e], не беспокоясь о внешних угрозах… по крайней мере, пока.\n\n@hint! #T Проложите [Concept('roads', 'дороги')] к шахтам#!\nК северу от [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] располагаются богатые залежи #TOOLTIP:GOODS,goods_gold,X #L золота#!#! и #TOOLTIP:GOODS,silver,X #L серебра#!#!. Однако они недостаточно развиты, и наш [Concept('control_with_icon', 'контроль')|e] над этими [Concept('locations', 'районами')] невелик. Мы должны проложить [Concept('roads_with_icon', 'дороги')|e] от [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] до этих ценных шахт, чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e] и [Concept('control', 'контроль')].\n\n@hint!  #T Возведите гильдии ювелиров в окрестностях [Concept('capital', 'столицы')]#!\nИз-за высокого предложения упала цена золота и серебра на рынке #L #TOOLTIP:LOCATIONRANK,[Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_tt')],X [Player.GetCapital.GetMarket.GetCenterLocation.Custom('LR_GEN')|l]#!#! [market_icon] [Player.GetCapital.GetMarket.GetShortName]. [ShowBuildingTypeName('jewelry_guild')|U] будет потреблять золото и серебро для производства дорогостоящих #TOOLTIP:GOODS,jewelry,X ювелирных изделий#!, что сделает наши шахты ещё более ценными.\n\n@hint! #T Возводите #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#! для экспорта излишков#!\nАвтоматизированная [Concept('trade_with_icon', 'торговля')|e] будет [Concept('export_with_icon', 'экспортировать')|e] излишки [Concept('goods_with_icon', 'товаров')|e], таких как [ShowGoodsNameWithNoTooltip('jewelry')|l], на другие [Concept('markets_with_icon', 'рынки')|e], создавая [Concept('trade_income_with_icon', 'доходы от торговли')|e] и обеспечивая прибыльность производственной цепочки.\n\n@hint! #T Отмените #TOOLTIP:POLICY,gold_export_ban,X #L запрет на экспорт#!#!#!\nЕвропа нуждается в нашем золоте, и мы можем хорошо заработать на его экспорте, но действующее [Concept('law_with_icon', 'правило')|e] #TOOLTIP:LAW,precious_metal_distribution_law,X #L «Распределение драгоценных металлов»#!#! запрещает это. Возможно, стоит изменить [Concept('policy', 'политику')] во время следующего заседания [Concept('parliament_with_icon', 'парламента')|e]."
 hint_hungary_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_hungary_administrative: "$hint_advisor_salute_administrative$"
 hint_hungary_military: "$hint_advisor_salute_military$"
 hint_norway: "Базовый совет по игре за Норвегию"
 hint_norway_hint_text: "[Player.GetLongName] — обширная [Concept('country_with_icon', 'держава')|e], но за пределами [Concept('capital_with_icon', 'столицы')|e] мы обладаем в лучшем случае номинальным [Concept('control_with_icon', 'контролем')|e]. Нам нужно расширять морскую и наземную инфраструктуру, чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e] и получить доступ к ресурсам севера.\n\n@hint! #T Проложите [Concept('roads', 'дороги')] из [Concept('capital', 'столицы')]#!\nСтоит попробовать проложить [Concept('roads_with_icon', 'дороги')|e] из [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] ко всем окрестным #TOOLTIP:LOCATIONRANK,town,X городкам#!#! и местам [Concept('rgo_with_icon', 'добычи ценных ресурсов')|e], чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e] и [Concept('control_with_icon', 'контроль')|e]. С правильными инвестициями #TOOLTIP:GOODS,silver,X #L серебряные#!#! шахты к западу от [Player.GetCapital.Custom('LR_GEN')|l] [Player.GetCapital.GetNameWithNoTooltip] могут стать прибыльными. Почаще проверяйте карту [Concept('proximity', 'досягаемости')]!\n\n@hint! #T Увеличьте [Concept('maritime_presence', 'морское присутствие')]#!\nПрокладывание [Concept('roads', 'дорог')] через горные центральные регионы страны может оказаться дорогостоящим и бессмысленным занятием. При достаточном [Concept('maritime_presence_with_icon', 'морском присутствии')|e] вдоль наших берегов [Concept('proximity', 'досягаемость')] будет гораздо эффективнее распространяться по морю. Стройте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристани#!#! и #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в городках, а также отправляйте флоты #TOOLTIP:UNITCATEGORY,navy_light_ship,X #L лёгких кораблей#!#! патрулировать побережье, когда исследуете соответствующее [Concept('advance_with_icon', 'улучшение')|e].\n\n@hint! #T Стройте городки в удобных гаванях вблизи нашей [Concept('capital', 'столицы')]#!\n[Concept('proximity', 'Досягаемость')] прибрежных [Concept('locations', 'районов')] можно повысить с помощью [Concept('natural_harbor_suitability_with_icon', 'природных гаваней')|e]. Проверьте карту пригодности гавани, чтобы найти лучшие порты.\n\n@hint! #T Развивайте производство#!\nСоздавайте в городах #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L гильдии портных#!#!, #TOOLTIP:BUILDING_TYPE,furniture_guild,X #L мебельные гильдии#!#! и #TOOLTIP:BUILDING_TYPE,scriptorium,X #L скрипторий#!#! для переработки природных ресурсов. Стройте #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#!, чтобы [Concept('export_with_icon', 'экспортировать')|e] эти ресурсы на другие [Concept('markets_with_icon', 'рынки')|e].\n\n@hint! #T Укрепите унию со Швецией#!\nНаша [Concept('personal_union_with_icon', 'личная уния')|e] [GetCountry('SWE').Custom('predlog_sso')] #ONCLICK:COUNTRY,[GetCountry('SWE').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SWE').Custom('CL_tt')],X [GetCountry('SWE').Custom('CL_INST')|L]#!#! гарантирует мир на границах. Мы могли бы добиться большей интеграции, приняв общий [Concept('laws', 'свод правил')] на панели [Concept('international_organization', 'международного объединения')|e]."
 hint_norway_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_norway_administrative: "$hint_advisor_salute_administrative$"
 hint_norway_military: "$hint_advisor_salute_military$"
 hint_naples: "Базовый совет по игре за Неаполь"
 hint_naples_hint_text: "[Player.GetLongName], крупнейшая держава [Concept('region_with_icon', 'региона')|e], име[Player.Custom('endlong_etyut')] все шансы добиться господства в итальянских торговле и политике, тогда как наши [Concept('subjects_with_icon', 'ленники')|e] в Греции предоставляют удобный плацдарм для внешней экспансии.\n\n@hint! #T Прокладывайте [Concept('roads_with_icon', 'дороги')|e] из [Concept('capital', 'столицы')]#!\nМы должны попытаться проложить [Concept('roads_with_icon', 'дороги')|e] из [Player.GetCapital.Custom('LR_GEN')|l] [capital_icon] [Player.GetCapital.GetName] ко всем окрестным #TOOLTIP:LOCATIONRANK,town,X городкам#!#! и местам [Concept('rgo_with_icon', 'добычи ценных ресурсов')|e], чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e] и [Concept('control_with_icon', 'контроль')|e].\n\n@hint! #T Расширьте добычу [Concept('raw_materials', 'сырьевых товаров')]#!\nНаша [Concept('country', 'держава')] богата ценными [Concept('raw_materials_with_icon', 'сырьевыми товарами')|e]. #TOOLTIP:GOODS,wool,X Шерсть#!, #TOOLTIP:GOODS,fiber_crops,X #L прядильные культуры#!#! и #TOOLTIP:GOODS,silk,X #L шёлк#!#! ценны сами по себе, но их также потребляет текстильная промышленность в наших [Concept('urban_locations_with_icon', 'городских районах')|e]. Постарайтесь как можно скорее расширить [Concept('rgo_with_icon', 'добычу этих ресурсов')|e] и усильте [Concept('control', 'контроль')] в упомянутых районах.\n\n@hint! #T Развивайте текстильную промышленность#!\nСоздайте #TOOLTIP:BUILDING_TYPE,cloth_guild,X #L гильдии прядильщиков#!#! и #TOOLTIP:BUILDING_TYPE,fine_cloth_guild,X #L портных#!#! в наших [Concept('urban_location', 'городских районах')]. Они будут потреблять наше [Concept('raw_materials', 'сырьё')] для производства дорогих [Concept('produced_goods_with_icon', 'товаров')|e], увеличивая спрос, благодаря чему [Concept('rgo', 'добыча ресурсов')] станет более выгодной.\n\n@hint! #T Стройте #TOOLTIP:BUILDING_TYPE,marketplace,X #L рынки#!#! для экспорта излишков#!\nАвтоматизированная [Concept('trade_with_icon', 'торговля')|e] будет [Concept('export_with_icon', 'экспортировать')|e] излишки любых [Concept('goods_with_icon', 'товаров')|e], например, тонкого сукна, на другие [Concept('markets_with_icon', 'рынки')|e], что принесёт [Concept('trade_income_with_icon', 'доходы от торговли')|e] и обеспечит прибыльность всей производственной цепочки."
 hint_naples_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_naples_administrative: "$hint_advisor_salute_administrative$"
 hint_naples_military: "$hint_advisor_salute_military$"
 hint_castile: "Базовый совет по игре за Кастилию"
 hint_castile_hint_text: "[Player.GetLongName], сильнейшая держава [Concept('region_with_icon', 'региона')|e], явля[Player.Custom('endlong_etyut')]ся главным кандидатом на объединение Иберии под властью одного трона. Однако наша администрация уже работает на пределе возможностей, а наш [Concept('control', 'контроль')] над югом столь слаб, что едва вносит вклад в [Concept('budget_with_icon', 'бюджет')|e]. Будет мудро сначала укрепить [Concept('control', 'контроль')] над уже принадлежащими нам территориями и лишь потом продолжать завоевания.\n\n@hint! #T Проложите [Concept('roads', 'дороги')] из [Concept('capital', 'столицы')]#!\n[Concept('control_with_icon', 'Неподконтрольные')|e] [Concept('locations', 'районы')] практически бесполезны для нашей администрации. Прокладывайте [Concept('roads_with_icon', 'дороги')|e] из [Concept('capital_with_icon', 'столицы')|e] и возводите #TOOLTIP:BUILDING_TYPE,bridge_infrastructure,X мосты#!#!, чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e], а через неё и [Concept('control', 'контроль')]. Почаще обращайте внимание на карту [Concept('proximity', 'досягаемости')]!\n\n@hint! #T Подчините #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#!#!\nМы не в состоянии эффективно [Concept('own_with_icon', 'владеть')|e] этими землями, но могли бы сделать #ONCLICK:COUNTRY,[GetCountry('GRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('GRA').Custom('CL_tt')],X [GetCountry('GRA').Custom('CL_ACC')|L]#!#! своим [Concept('subject_with_icon', 'ленником')|e]. Ленник будет править землями от нашего имени и ежемесячно выплачивать дань в нашу [Concept('treasury', 'казну')]. Мы можем постараться [Concept('annexing_with_icon', 'присоединить')|e] ленника, когда наши инфраструктура и технологии разовьются достаточно, чтобы мы могли напрямую завладеть этими землями. Для [Concept('annex', 'присоединения')] [Concept('subject', 'ленника')] нам необходимо править им больше #Y 10#! лет и наладить с ним хорошие отношения.\n\n@hint! #T Дальше предела#!\n[Concept('explorers_with_icon', 'Исследователи')|e] рассказывают о немыслимых богатствах, увиденных в Индии. Однако подобные предприятия без современных [Concept('advances_with_icon', 'улучшений')|e] могут оказаться непомерно дорогими."
 hint_castile_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_castile_administrative: "$hint_advisor_salute_administrative$"
 hint_castile_military: "$hint_advisor_salute_military$"
 hint_ottomans: "Базовый совет по игре за османов"
 hint_ottomans_hint_text: "Назревающая [Concept('situation_with_icon', 'ситуация')|e] «Восхождение турок» предоставит уникальную возможность для стремительного расширения в Грецию и Анатолию. Совершайте ситуативные [Concept('actions_with_icon', 'действия')|e], чтобы получить [Concept('casus_belli_with_icon', 'повод для войны')|e] с соседями и обрушить на них нашу мощь.\n\n@hint! #T Интегрируйте завоевания#!\nНедавно [Concept('conquered_with_icon', 'завоёванные')|e] [Concept('locations', 'районы')] необходимо [Concept('integrated_with_icon', 'интегрировать')|e] в нашу администрацию с помощью [Concept('cabinet_with_icon', 'совета')|e]. Лишь тогда наши завоевания принесут плоды.\n\n@hint! #T Проложите [Concept('roads', 'дороги')] из [Concept('capital', 'столицы')]#!\n[Concept('control_with_icon', 'Неподконтрольные')|e] [Concept('locations', 'районы')] практически бесполезны для нашей администрации. Прокладывайте [Concept('roads_with_icon', 'дороги')|e] из [Concept('capital_with_icon', 'столицы')|e], чтобы повысить [Concept('proximity_with_icon', 'досягаемость')|e], а через неё и [Concept('control', 'контроль')]. Почаще обращайте внимание на карту [Concept('proximity', 'досягаемости')]!\n\n@hint! #T Создавайте [Concept('subjects', 'ленников')] для управления завоёванными землями#!\nПо мере расширения вы покорите земли, лежащие за пределами нашей [Concept('proximity', 'досягаемости')]. Создавайте [Concept('subjects_with_icon', 'ленников')|e], которые будут править ими от вашего имени до тех пор, пока вы не сможете управлять ими самостоятельно.\n\n@hint! #T Присоединяйте [Concept('subject', 'ленников')] по мере повышения [Concept('proximity', 'досягаемости')]#!\nПо мере развития инфраструктуры и повышения [Concept('proximity', 'досягаемости')] появится смысл напрямую управлять некогда бесполезными землями. Для [Concept('annex_with_icon', 'присоединения')|e] [Concept('subject', 'ленника')] необходимо, чтобы мы правили им более #Y 10#! лет и поддерживали с ним хорошие отношения.\n\n@hint! #T Увеличьте [Concept('maritime_presence', 'морское присутствие')]#!\nПересечённая местность Греции и Анатолии затрудняет повышение [Concept('proximity', 'досягаемости')] по суше. Достаточное [Concept('maritime_presence_with_icon', 'морское присутствие')|e] вдоль побережий позволит эффективнее повышать [Concept('proximity', 'досягаемость')] по морю. Стройте #TOOLTIP:BUILDING_TYPE,wharf,X #L пристани#!#! и #TOOLTIP:BUILDING_TYPE,dock,X #L доки#!#! в городах, а также отправляйте [Concept('navies_with_icon', 'флоты')|e] патрулировать побережья. Это сыграет очень важную роль, если мы перенесём [Concept('capital', 'столицу')] в #TOOLTIP:LOCATION,constantinople,X #L Константинополь#!#!…"
 hint_ottomans_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_ottomans_administrative: "$hint_advisor_salute_administrative$"
 hint_ottomans_military: "$hint_advisor_salute_military$"
 hint_hre: "Советы для Священной Римской Империи"
 hint_hre_hint_text: "$hint_hre_hint_text_1$\n\n$hint_hre_hint_text_2$\n\n$hint_hre_hint_text_3$\n\n$hint_hre_hint_text_4$\n\n$hint_hre_hint_text_5$\n\n$hint_hre_hint_text_6$"
 hint_hre_hint_text_1: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священная Римская Империя#!#! — крупное [Concept('international_organization_with_icon', 'международное объединение')|e] в Центральной Европе. Участие любой державы в этом [Concept('international_organization', 'объединении')] влияет на игровой процесс, связанный с ней."
 hint_hre_hint_text_2: "[hre_emperor_icon] #T Император#!\nСвященную Римскую Империю возглавляет держава со статусом [Concept('hre_emperor_with_icon', 'императора')|e]. Её обязанность — защищать участников объединения от внешних угроз, поддерживать мир и стабильность, а также заботиться о религиозном единстве в империи.\n@arrow_bonus_tier_3! С помощью #Y имперской власти#! эта держава может предлагать [Concept('policies_with_icon', 'политики')|e] и выдвигать на рассмотрение [Concept('parliament_issues_with_icon', 'парламентские вопросы')|e].\n@arrow_bonus_tier_2! Различные [Concept('diplomatic_actions_with_icon', 'дипломатические действия')|e] по отношению к другим участникам объединения помогут поддержать благоприятную политическую обстановку в империи.\n@arrow_bonus_tier_1! #TOOLTIP:COUNTRY_INTERACTION,enforce_landfriede,X #L Введение земского мира#!#! позволяет навязать участнику [Concept('white_peace', 'мир на условиях «статус-кво»')|e].\n@arrow_bonus_tier_1! #TOOLTIP:COUNTRY_INTERACTION,enforce_religious_unity,X #L Установление религиозного единства#!#! позволяет навязать участнику имперскую религию.\n@arrow_bonus_tier_1! #TOOLTIP:COUNTRY_INTERACTION,demand_unlawful_territory,X #L Требование незаконной территории#!#! заставляет участника вернуть завоёванный [Concept('location', 'район')|e] предыдущему владельцу. В случае отказа появится [Concept('casus_belli', 'повод для войны')|e], позволяющий разрешить этот вопрос силой.\n@arrow_bonus_tier_1! #TOOLTIP:COUNTRY_INTERACTION,ask_to_vote_for_me_as_emperor,X #L Просьба о поддержке на выборах»#!#! позволяет потратить [Concept('favors', 'благосклонность')|e] на то, чтобы попросить какую-либо [Concept('country', 'державу')] проголосовать за вас на выборах императора. Эта просьба будет действовать до следующих выборов.\n@arrow_bonus_tier_1! #TOOLTIP:COUNTRY_INTERACTION,bolster_imperial_army,X #L Укрепление имперской армии#!#! позволяет вам попросить [Concept('country', 'державу')] принять участие в вашей войне взамен на выплаты из имперской казны.\n@arrow_bonus_tier_1! Наделение [Concept('special_status', 'особым статусом')|e] позволяет пожаловать любому участнику [Concept('special_status', 'особый статус')] (за исключением статуса #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L «Имперская крестьянская республика»#!#!).\n@arrow_bonus_tier_1! Лишение [Concept('special_status', 'особого статуса')|e] позволяет лишить любого участника [Concept('special_status', 'особого статуса')] (за исключением статуса #TOOLTIP:SPECIAL_STATUS,imperial_peasant_republic,X #L «Имперская крестьянская республика»#!#!)."
 hint_hre_hint_text_3: "[elector_icon] #T Выборщики#!\nВ [Concept('hre_electoral_college_with_icon', 'коллегию выборщиков')|e] входят #TOOLTIP:SPECIAL_STATUS,elector,X #L князья-выборщики#!#! и #TOOLTIP:SPECIAL_STATUS,archbishop_elector,X #L архиепископы-выборщики#!#!. От их голосов зависит, кто именно станет следующим #TOOLTIP:SPECIAL_STATUS,emperor,X #L императором#!#! после смерти действующего [Concept('ruler', 'правителя')] [Concept('country', 'державы')]-лидера.\n@arrow_bonus_tier_1! Выборы считаются успешными лишь в том случае, если хотя бы 50% действующих выборщиков проголосует за одну и ту же [Concept('country', 'державу')]. Если добиться большинства голосов не удалось, в империи начнётся борьба за власть.\n$BULLET_WITH_TAB$ Борьба за власть неизменно сопряжена с отсутствием избранного #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#!. В это время ни одна [Concept('country', 'держава')] не может пользоваться императорскими привилегиями и исполнять сопутствующие обязанности. [Concept('hre_electoral_college', 'Коллегия выборщиков')] будет стараться преодолеть борьбу за власть путём объединения голосов. Спустя 10 лет борьба за власть вынужденным образом закончится, и [Concept('country', 'страна')] с наибольшим [Concept('great_power_score_with_icon', 'счётом великой державы')|e] станет #TOOLTIP:SPECIAL_STATUS,emperor,X #L императором#!#!."
 hint_hre_hint_text_4: "[hre_law_level_icon] #T Имперские законы#!\nЗаконодательство, которому следуют империя и её участники, определяется имперской конституцией. Действующие [Concept('policies', 'политики')] влияют на налогообложение участников (от которых требуются [Concept('gold', 'дукаты')|e] и определённое [Concept('manpower', 'число рекрутов')|e]), количество выборщиков и даже объединение империи.\n@arrow_bonus_tier_3! В начале игры за империю не действует [Concept('policy', 'политика')] #TOOLTIP:POLICY,golden_bull_policy,X #L «Закрепление Золотой буллы»#!#!. Перед тем как принять какую-либо другую [Concept('policy', 'политику')], необходимо предложить и принять [Concept('policy', 'политику')] #TOOLTIP:POLICY,golden_bull_policy,X #L «Закрепление Золотой буллы»#!#!.\n@arrow_bonus_tier_3! Сразу после принятия [Concept('policy', 'политики')] #TOOLTIP:POLICY,golden_bull_policy,X #L «Закрепление Золотой буллы»#!#! в империи начинают действовать базовые политики из каждой категории. #TOOLTIP:SPECIAL_STATUS,emperor,X #L Император#!#! может воспользоваться своей привилегией и выдвинуть на голосование в рейхстаге новую [Concept('policy', 'политику')] — при условии, что у него достаточно #Y имперской власти#!.\n@arrow_bonus_tier_2! Если [Concept('policy', 'политика')], судя по обозначению, обеспечивает благополучие императора, то она двигает империю к объединению в [Concept('country', 'державу')] под властью #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#!.\n@arrow_bonus_tier_1! При этом многие [Concept('policies', 'политики')] могут оказаться выгодными для #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#! или конкретных участников империи, но не вести её к объединению в державу."
 hint_hre_hint_text_5: "[parliament_icon] #T Рейхстаг#!\nРейхстаг собирается в двух случаях:\n$TAB$@arrow_bonus_tier_1! #TOOLTIP:SPECIAL_STATUS,emperor,X #L Император#!#! предлагает новую [Concept('policy', 'политику')].\n$TAB$@arrow_bonus_tier_1! #TOOLTIP:SPECIAL_STATUS,emperor,X #L Император#!#! выдвигает [Concept('parliament_issue', 'парламентский вопрос')], затрагивающий всех участников империи.\n@arrow_bonus_tier_3! На заседании рейхстага каждый участник может проголосовать по выдвинутому вопросу. Сила голоса каждой [Concept('country', 'державы')] зависит от [Concept('special_status_power', 'силы')] её [Concept('special_status', 'особого статуса')]. Чтобы ваш голос обрёл больший вес, можно запросить у #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#! новый [Concept('special_status', 'особый статус')].\n$BULLET_WITH_TAB$Как правило, [Concept('special_status', 'особый статус')] наиболее [Concept('special_status_power', 'силён')] у [Concept('countries', 'держав')], входящих в [Concept('hre_electoral_college', 'коллегию выборщиков')]. Более слабым особым статусом обладают [Concept('countries', 'державы')] с [Concept('country_rank', 'рангом')] #TOOLTIP:COUNTRY_RANK,rank_kingdom,X #L «Королевство»#!#!, не представленные в [Concept('hre_electoral_college', 'коллегии выборщиков')].\n$BULLET_WITH_TAB$[Concept('special_status_power', 'Сила особого статуса')] также зависит от конкретных [Concept('policies', 'политик')], действующих в империи.\n@arrow_bonus_tier_2! #TOOLTIP:SPECIAL_STATUS,emperor,X #L Император#!#! может склонять участников с конкретным [Concept('special_status', 'особого статусом')] на свою сторону при помощи [Concept('parliament_agendas', 'парламентских требований')].\n@arrow_bonus_tier_2! #TOOLTIP:SPECIAL_STATUS,emperor,X #L Император#!#! может применить [Concept('diplomatic_action', 'дипломатическое действие')] «[ShowCountryInteractionName('bribe_voter_for_policy')]», чтобы подкупить любого участника, обладающего правом голоса."
 hint_hre_hint_text_6: "[hre_icon] #T Участники#!\nКаждая [Concept('country', 'держава')], входящая в [Concept('international_organization', 'международное объединение')] (за исключением #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#!), считается участником. Однако важность того или иного участника в составе империи определяется [Concept('special_status_power', 'силой особого статуса')] этой державы.\n@arrow_bonus_tier_3! Запросив [Concept('special_status', 'особый статус')] у #TOOLTIP:SPECIAL_STATUS,emperor,X #L императора#!#!, каждый участник может попросить об этом [Concept('special_status', 'особом статусе')] — если соответствует требованиям.\n@arrow_bonus_tier_3! [ShowCountryInteractionName('ask_for_dukedom')] позволяет каждому участнику попросить о повышении [Concept('country_rank', 'ранга его державы')|e] до #TOOLTIP:COUNTRY_RANK,rank_duchy,X #L герцогства#!#! — если он соответствует требованиям. Повышение [Concept('country_rank', 'ранга державы')] без утверждения #TOOLTIP:SPECIAL_STATUS,emperor,X #L императором#!#! не дозволяется.\n@arrow_bonus_tier_1! [ShowCountryInteractionName('request_county_privileges')] позволяет получить доступ к [Concept('government_reforms', 'государственным принципам')|e] #TOOLTIP:GOVERNMENT_REFORM,margraviate,X #L «Маркграфство»#!#! и #TOOLTIP:GOVERNMENT_REFORM,landgraviate,X #L «Ландграфство»#!#!."
 hint_hre_diplomatic: "$hint_advisor_salute_diplomatic$"
 hint_hre_administrative: "$hint_advisor_salute_administrative$"
 hint_hre_military: "$hint_advisor_salute_military$"
 hint_eastern_roman_empire: "Базовый совет по игре за [Player.Custom('longname_ru_ACC')]"
 hint_eastern_roman_empire_hint_text: "$hint_eastern_roman_empire_text_1$\n\n$hint_eastern_roman_empire_text_2$\n\n$hint_eastern_roman_empire_text_3$\n\n$hint_eastern_roman_empire_text_4$"
 hint_eastern_roman_empire_text_1: "[Player.Custom('longname_ru_ACC')] находится в смятении, и ситуация скоро станет хуже.\nВ #TOOLTIP:REGION,anatolia_region,X #L Анатолии#!#! усиливаются бейлики, и #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_DAT')|L]#!#! удалось захватить наши земли в #TOOLTIP:LOCATION,bursa,X #L Бурсе#!#! и #TOOLTIP:LOCATION,izmit,X #L Измите#!#!.\nВ центральном регионе нам удалось вернуть себе контроль над #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалией#!#! и областью вокруг Пиндских гор, но франкские государства не теряют инициативы.\nНа севере [GetCountry('SER').GetName] и [GetCountry('BUL').GetName] терзают наши земли, как стервятники.\n#italic Быть может, если мы всколыхнём движение за независимость в #ONCLICK:COUNTRY,[GetCountry('SMC').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('SMC').Custom('CL_tt')],X [GetCountry('SMC').Custom('CL_PREP')|L]#!#!, мы обретём нового союзника#!."
 hint_eastern_roman_empire_text_2: "@hint! #T Управление сословиями#!\nГоворя о внутренних делах, наши сословия развратились: их четыре привилегии, [ShowEstatePrivilegeName('consolidated_corruption_of_the_nobles')], [ShowEstatePrivilegeName('consolidated_corruption_of_the_clergy')], [ShowEstatePrivilegeName('consolidated_corruption_of_the_burghers')] и [ShowEstatePrivilegeName('consolidated_corruption_of_the_peasants')], разрушают нашу державу. Нам жизненно необходимо устранить их как можно скорее.\n\nДля этого нам следует добиваться принятия такой [Concept('societal_value', 'общественной ценности')|e] как #TOOLTIP:SOCIETAL_VALUE,individualism_vs_communalism,X #L общинность#!#!.\nРаздача [Concept('estate_privileges_with_icon', 'сословных привилегий')|e] позволит нам замирять сословия, если они начнут проявлять недовольство. Но помните, что для державы огромное значение имеет наша [Concept('legitimacy_with_icon', 'легитимность')|e]."
 hint_eastern_roman_empire_text_3: "@hint! #T Пути экономического развития#!\nПровинции [ShowProvinceDefinitionName('constantinople_province')] и [ShowProvinceDefinitionName('edirne_province')] станут отличным плацдармом для экономического возрождения. [Player.Custom('longname_ru_DAT')] следует развивать производство #TOOLTIP:GOODS,fine_cloth,X #L тонкого сукна#!#! и #TOOLTIP:GOODS,silk,X #L шёлка#!#!. Провинция [ShowProvinceDefinitionName('edirne_province')] может стать нашим центром производства #TOOLTIP:GOODS,tools,X #L инструментов#!#! и #TOOLTIP:GOODS,firearms,X #L огнестрельного оружия#!#!.\n\nПровинция [ShowProvinceDefinitionName('chalkidiki_province')] также богата природными ресурсами, а расположенный тут #TOOLTIP:LOCATIONRANK,city,X #L город#!#! [ShowLocationName('thessaloniki')] это отличное место для изготовления #TOOLTIP:GOODS,jewelry,X #L ювелирных изделий#!#!. Быть может, строительство здесь [Concept('market_with_icon', 'рынка')|e] и #TOOLTIP:BUILDING_TYPE,local_governor,X #L дома губернатора#!#! принесёт нам большой доход.\n\nНаши недавние завоевания в #TOOLTIP:PROVINCE_DEFINITION,thessaly_province,X #L Фессалии#!#! и #TOOLTIP:AREA,morea_area,X #L Морее#!#! нескоро полноценно вольются в состав нашего государства и начнут приносить доход.\n#italic Быть может, имеет смысл создать в этих провинциях несколько #TOOLTIP:SUBJECT_TYPE,pronoia,X проний#!#!."
 hint_eastern_roman_empire_text_4: "@hint! #T Иностранные дела#!\nСамое главное дело для нас — выдержать натиск иноземных сил, которые жаждут нашего падения. Нам нужно стабилизировать внутреннюю ситуацию, полностью разрешить любой возможный #TOOLTIP:DISASTER_TYPE,byzantine_succession_crisis,X #L [GetCountry('BYZ').GetAdjectiveWithNoTooltip]ий кризис наследования#!#! и построить здоровую экономику, которая сможет финансировать нашу армию. Затем мы сможем вернуть себе свои земли и даже восстановить [ShowScriptedGeographyName('roman_borders_geography')].\n\nИли же мы можем сразу пойти в наступление и отвоевать #TOOLTIP:LOCATION,bursa,X #L Бурсу#!#! и #TOOLTIP:LOCATION,izmit,X #L Измит#!#! у #ONCLICK:COUNTRY,[GetCountry('TUR').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('TUR').Custom('CL_tt')],X [GetCountry('TUR').Custom('CL_GEN')|L]#!#!, а затем и остальное [ShowScriptedGeographyName('byzantine_aegean_coastline')]. Этот путь будет сложнее, поскольку он потребует от нас одновременно решать внутренние и внешние проблемы, что ударит по нашей стабильности и экономическому восстановлению.\n\nВпрочем, кто не рискует, тот не получает наград. Мы должны действовать амбициозно и сами творить свою судьбу, а не ждать, пока она придёт к нам."
