  ALL_COUNTRIES_GET_TT: "Усі [Concept('countries', 'країни')|e] в [Concept('situation', 'ситуації')|e]:"
  sengoku: "Період Сенгоку"
  sengoku_desc: "Настав час великих потрясінь. [GetUniqueInternationalOrganization('japanese_shogunate').GetLeaderTitle] більше не користується колишнім впливом, і інші клани все частіше починають проявляти незалежність. Проходячи через горнило власних конфліктів, вони поступово беруть владу над своїми землями. Якщо в країні не з'явиться могутній володар, здатний перехопити кермо правління, Японія зануриться в безодню війни."
