  treaty_of_tordesillas: "Договір [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]"
  treaty_of_tordesillas_desc: "Договір було підписано в [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_PREP')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetName]. [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName] та [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName] підписали його. Там обумовлюються правила та умови, що надають двом країнам ексклюзивні права на колонізацію та експлуатацію нещодавно відкритих земель на Американському континенті."
  claim_reason_treaty_of_tordesillas: "Отримано за Договором [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
  treaty_of_tordesillas.tt.location_is_east_of_line: "[THIS.GetLocation.GetRank.GetNameWithNoTooltip] [THIS.GetLocation.GetName] знаходиться на схід від уявної лінії, в центрі якої — [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_line_location').GetLocation.GetName]. По цій лінії і пройде розмежування світу за умовами Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip].\n\nПісля ратифікації договору ця [Concept('location', 'місцевість')|e] отрим[GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.Custom('endlong_itat')] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_east_country').GetCountry.GetLongName]."
  treaty_of_tordesillas.tt.location_is_west_of_line: "[THIS.GetLocation.GetRank.GetNameWithNoTooltip] [THIS.GetLocation.GetName] знаходиться на захід від уявної лінії, в центрі якої — [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_line_location').GetLocation.GetName]. По цій лінії і пройде розмежування світу за умовами Договору [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip].\n\nПісля ратифікації договору ця [Concept('location', 'місцевість')|e] отрим[GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.Custom('endlong_itat')] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetLongName]."
  treaty_of_tordesillas.tt.location_is_line_origin: "[THIS.GetLocation.GetName] — [Concept('location', 'місцевість')|e], що визначає розташування уявної лінії, яка розмежовує світ згідно з Договором [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.Custom('LR_GEN')|l] [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('treaty_location').GetLocation.GetNameWithNoTooltip]."
