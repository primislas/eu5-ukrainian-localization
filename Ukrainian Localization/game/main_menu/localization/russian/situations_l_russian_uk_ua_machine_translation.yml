  invite_turkic_migration_desc: "За допомогою заохочень, на кшталт роздачі земель, звільнення від податків та обіцянки багатств, ми повинні активно підтримати розселення #TOOLTIP:CULTUREGROUP,turkic_group,X #L тюркських#!#! груп у нещодавно завойованих провінціях. Ця політика зміцнить нашу демографію та культурну єдність."
