  SITUATION_BREAKDOWN: "Опис ситуації"
  black_death: "Чорна смерть"
  black_death_desc: "«Батько кидав дитину, дружина — чоловіка, брат відвертався від брата, оскільки хвороба ця, як здавалося, могла вразити через дихання і навіть через погляд. Так вони і вмирали. Величезні ями доверху були заповнені мертвими. А коли одна яма заповнювалася, поруч тут же викопували іншу. Настільки багато загинуло, що всім стало ясно — світу прийшов кінець»."
  black_death_info: "Місце походження: [ROOT.GetVariable('original_outbreak').GetDiseaseOutbreak.GetOrigin.GetName]"
  black_death_monthly: "• Ця чума пошириться в близьких [Concept('locations', 'місцевостях')|e] та торговими шляхами\n• Там, куди вона прийде, загине безліч [Concept('characters', 'персонажів')|e], а також [Concept('pops', 'груп населення')|e] та [Concept('armies', 'військ')|e]."
  black_death_spreads: "• Ця чума пошириться в близьких [Concept('locations', 'місцевостях')|e]"
  black_death_kills: "• Там, куди вона прийде, загине безліч [Concept('characters', 'персонажів')|e] та [Concept('pops', 'груп населення')|e]."
  BLACK_DEATH_PRESENT_IN_LOCATION: "[THIS.GetLocation.GetName|Y]\nПоточне населення: [THIS.GetLocation.GetTotalPopulation|Y]\n#R Чорною смертю#! заразилося [THIS.GetLocation.GetDiseaseInfectionPercentage('bubonic_plague')|R2%] нашого населення."
