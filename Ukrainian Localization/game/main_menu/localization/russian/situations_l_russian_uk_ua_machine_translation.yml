  hundred_years_war_ACTION_TT: "Відкрити вікно війни"
  request_papal_delegates: "Запросити [GetCountry('PAP').GetAdjectiveWithNoTooltip|l]их делегатів"
  request_papal_delegates_desc: "Війна затягнулася і перетворилася на безглузду бійню. Щоб домогтися миру, нам варто звернутися до посередника."
  pap_will_be_asked_to_enforce_wp_tt: "Країну [GetCountry('PAP').GetLongName] попросять нав'язати [Concept('white_peace', 'мир на умовах «статус-кво»')|e] між #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_INST')|L]#!#! та #ONCLICK:COUNTRY,[GetCountry('ENG').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('ENG').Custom('CL_tt')],X [GetCountry('ENG').Custom('CL_INST')|L]#!#!"
  fra_diplomacy_with_subjects: "Присвоєння титулів ленникам"
  fra_diplomacy_with_subjects_desc: "Дарувавши титули найсильнішим з наших ленників, ми підвищимо шанси зберегти їхню підтримку та вберегти від [GetCountry('ENG').GetAdjectiveWithNoTooltip|l]ого впливу. В іншому випадку є ризик, що вони звернуться проти нас!"
  demand_autonomy: "Потребувати автономії від [GetCountry('FRA').Custom('longname_ru_wntt_GEN')]"
  demand_autonomy_desc: "Ми повинні посилити свій вплив, щоб натиснути на сюзерена та отримати особливі привілеї, що ведуть до нашого процвітання."
  influence_french_subject: "Вплинути на [GetCountry('FRA').GetAdjectiveWithNoTooltip|l]ого ленника"
  influence_french_subject_desc: "Посіявши насіння сумнівів у відносинах між [GetCountry('FRA').Custom('longname_ru_INST')] та її ленниками, ми значно покращимо своє становище у війні проти них!"
  influence_french_subject_tt: "Обраного #L [GetCountry('FRA').GetAdjective|l]ого#! ленника можна переконати не вступати в оборонні війни протягом наступних #Y 5#! років в обмін на [Concept('gold', 'дукати')|e] [gold_i]"
  demand_appanage_promotion: "Потребувати підвищення до апанажу"
  demand_appanage_promotion_desc: "Ми володіємо престижем і славою, які не снилися жодному #TOOLTIP:SUBJECT_TYPE,vassal,X #L васалу#!#!. Наш вплив зростає, і наш титул повинен відображати наші силу та значимість під #L [GetCountry('FRA').GetAdjective|l]им#! знаменом."
  fra_has_eligible_child_tt: "У династії [GetCountry('FRA').GetGovernment.GetRulerOrRegent.GetDynasty.GetName] з #ONCLICK:COUNTRY,[GetCountry('FRA').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('FRA').Custom('CL_tt')],X [GetCountry('FRA').Custom('CL_GEN')|L]#!#! є [Concept('character', 'персонаж')|e], який може стати нашим [Concept('heir', 'спадкоємцем')|e]"
  has_not_been_exempted_tt: "Не отримано тимчасове виключення з наступальних війн через [Concept('situation', 'ситуативну')|e] [Concept('action', 'дію')|e] #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L «Вимога автономії від [GetCountry('FRA').Custom('longname_ru_wntt_GEN')]»#!#! в ситуації «[ShowSituationName('hundred_years_war')]»"
  another_appanage_capital_area_stronger_tt: "Жоден інший #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанаж#!#! зі [Concept('capital', 'столицею')|e] в тій же [Concept('area', 'області')|e], що й наша, не має більшої [Concept('country_strength', 'моці')|e], ніж ми"
  has_demanded_autonomy_tt: "Ми #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанаж#!#! і отримуємо [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,granted_autonomy_to_expand_modifier,X #V #L «Надано право на розширення»#!#! від [Concept('action', 'дії')|e] #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L «Вимога автономії від [GetCountry('FRA').Custom('longname_ru_wntt_GEN')]»#!#! в [Concept('situation', 'ситуації')|e] «[ShowSituationName('hundred_years_war')]»."
  has_relevant_event_to_the_disaster_tt: "Зараз робить вибір у [Concept('event', 'події')|e], пов'язаній з цим [Concept('disaster', 'лихом')|e]"
  selected_character_will_be_executed_tt: "Обраний [Concept('character', 'персонаж')|e] помре від рук наших катів"
  demand_territory_return: "Вимога перегляду кордонів"
  demand_territory_return_desc: "Ми помітили, що наші сусіди — такі ж ленники [GetCountry('FRA').Custom('longname_ru_GEN')] — контролюють землі, які ми вважаємо своїми. Ми повинні негайно зайнятися цією проблемою!"
  demand_territory_return_tt: "Ми вимагатимемо повернути нам обрану [Concept('core', 'корінну місцевість')|e]."
  wont_join_vs_other_appanages_with_granted_autonomy_to_expand_modifier_during_hyw_tt: "Ленник цього [Concept('subject_type', 'типу')|e] не буде автоматично вступати у [Concept('wars', 'війни')|e] проти #TOOLTIP:SUBJECT_TYPE,appanage,X #L апанажу#!#!, що отримав [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,granted_autonomy_to_expand_modifier,X #V #L «Надано право на розширення»#!#! від [Concept('action', 'дії')|e] #TOOLTIP:GENERIC_ACTION,demand_autonomy,X #L «Вимога автономії від [GetCountry('FRA').Custom('longname_ru_wntt_GEN')]»#!#! у ситуації «[ShowSituationName('hundred_years_war')]»."
  hyw_will_soon_fire_tt: "Скоро може розпочатися [Concept('situation', 'ситуація')|e] «[ShowSituationName('hundred_years_war')]»"
  betray_our_allegiance: "Відмова від вірності"
  betray_our_allegiance_desc: "У війні назріває перелом. Колись ми пообіцяли свій меч і свою підтримку нашим союзникам у поточному конфлікті, але настав час прийняти реальність і переглянути дипломатичні відносини, щоб уберегти наш народ від жахів війни та уникнути підкорення."
  eng_leads_one_side_france_another_tt: "Одну сторону [Concept('war', 'війни')|e] очолю[GetCountry('ENG').Custom('end_etyut')] [GetCountry('ENG').GetName], а другу — [GetCountry('FRA').GetName]"
  choose_war_tt: "Вибір [Concept('war', 'війни')|e]"
  war_goal_owned_by_us_tt: "[Concept('war_goal', 'Ціль війни')|e] — НЕ належна нам [Concept('location', 'місцевість')|e] або [Concept('province', 'провінція')|e]"
  procure_core_claim: "Отримання претензій на корінні землі"
  procure_core_claim_desc: "Ми більше не можемо мовчати про свої законні претензії на ці землі. Проголосивши право на те, що по справедливості належить нам, ми створимо основу для війни за втрачені території."
  request_war_entry: "Прохання про вступ у війну"
  request_war_entry_desc: "Ми не зможемо вийти переможцями з цієї довгої кровопролитної війни самотужки. Потрібно звернутися до сусідньої країни та спонукати її взятися за зброю та приєднатися до нашої боротьби."
  hyw_sign_truce: "Підписання перемир'я"
  hyw_sign_truce_desc: "Гордість вимагає йти до переможного кінця, але розсудливість підказує, що краще проявити стриманість і піти на перемир'я з ворогом — хоча б заради того, щоб зробити передишку та підготуватися до наступного кроку."
  choose_neighbor_country: "Вибрати сусідню [Concept('country', 'країну')|e]"
  no_neighbor_country_available: "@trigger_no! Немає доступних сусідніх [Concept('country', 'країн')|e]."
  target_country_will_be_asked_for_truce_tt: "#ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_ACC')|L]#!#! попросять підписати #Y 5#!-річне [Concept('truce', 'перемир’я')|e] з нами в ході [Concept('event', 'події')|e]"
  selected_country_will_be_asked_for_truce_tt: "Вибрану [Concept('country', 'країну')|e] попросять підписати #Y 5#!-річне [Concept('truce', 'перемир’я')|e] з нами в ході [Concept('event', 'події')|e]"
  this_will_not_affect_our_textile_industry_tt: "#italic Це не зачепить нашу текстильну промисловість#!"
  they_will_be_notified_of_our_rejection_tt: "[actor.GetLongName] дізна[actor.Custom('endlong_etyut')], що ми відкинули [Concept('truce', 'перемир’я')|e]"
  not_recently_asked_to_join_tt: "Не отримували прохання приєднатися до нашої [Concept('war', 'війни')|e] за допомогою цієї [Concept('action', 'дії')|e] за останні #Y 10#! років"
  hyw_defect_action: "Прагнення до розриву"
  hyw_defect_action_desc: "Наше терпіння скоро урветься. Некомпетентність нинішнього сюзерена в державних справах давно стала притчею во язицех, і роздратування васалів зростає з кожним днем. Час подумати про зміну табору, не чекаючи початку військових дій!"
  MAIN_INFORMATION: "Основні відомості"
  MAIN_ACTIONS: "Основні дії"
  CURRENT_DEBATES: "Поточні суперечки"
  nanbokuchou: "Період Намбокутьо"
  nanbokuchou_desc: "Після того як [GetCharacter('jap_go_daigo_tenno').GetName] та [Select_CString(GetCharacter('jap_ashikaga_takauji').IsFemale,'підтримавша', 'підтримавший')] [Select_CString(GetCharacter('jap_go_daigo_tenno').IsFemale,'її', 'його')] [GetCharacter('jap_ashikaga_takauji').GetName] знищили Камакурський сьогунат та відновили імператорську владу в ході реставрації Кемму, двоє колишніх союзників швидко стали суперниками. [GetCharacter('jap_go_daigo_tenno').GetNameWithNoTooltip] [Select_CString(GetCharacter('jap_go_daigo_tenno').IsFemale,'хотіла', 'хотів')] відновити верховенство імператорської влади, як у період Хейан, але [GetCharacter('jap_ashikaga_takauji').GetNameWithNoTooltip] та багато інших представників військового стану були цим незадоволені. [GetCharacter('jap_ashikaga_takauji').GetNameWithNoTooltip] [Select_CString(GetCharacter('jap_ashikaga_takauji').IsFemale,'була вигнана', 'був вигнаний')] зі столиці, втікши на Кюсю, але в 1336 році [Select_CString(GetCharacter('jap_ashikaga_takauji').IsFemale,'зуміла', 'зумів')] повернутися до #TOOLTIP:LOCATION,kyoto,X #L Кіото#!#!, захопивши місто, створивши новий #TOOLTIP:INTERNATIONAL_ORGANIZATION,$japanese_shogunate_tt$,X #L Японський Сьогунат#!#! та посадивши на престол нового імператора. У січні 1337 року [GetCharacter('jap_go_daigo_tenno').GetNameWithNoTooltip] [Select_CString(GetCharacter('jap_go_daigo_tenno').IsFemale,'втекла', 'втік')] зі столиці, розташувавши свій двір у #TOOLTIP:LOCATION,yoshino,X #L Йосіно#!#!. Так розпочався період Намбокутьо — період південного та північного дворів."
  there_is_no_japanese_emperor_tt: "У #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,japanese_shogunate,X #L Японському Сьогунаті#!#! не більше #Y 1#! [Concept('members', 'учасника')|e] з [Concept('special_status', 'особливим статусом')|e] #TOOLTIP:SPECIAL_STATUS,japanese_emperor,X #L тенно#!#!"
