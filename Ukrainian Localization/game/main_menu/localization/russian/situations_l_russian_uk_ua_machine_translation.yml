  REB_STR_TT: "[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetRelativeMilitaryStrength(GetCountry('CHI').Self)|V2%] сили"
  YUA_STR_DESC: "Розмір [GetCountry('CHI').GetAdjectiveWithNoTooltip|l]ого [Concept('army', 'війська')|e]: [GetCountry('CHI').GetArmySize]\nПотенційне [GetCountry('CHI').GetNameWithNoTooltip|l]е [Concept('levy', 'ополчення')|e]: [GetCountry('CHI').GetArmyLevyPotentialStrength]"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_TITLE: "Військова чисельність [GetCountry('CHI').GetAdjectiveWithNoTooltip|l]ої сторони"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_TEXT: "Військова чисельність #L [GetCountry('CHI').GetAdjective|l]ої#! сторони відносно #ONCLICK:COUNTRY,[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.Custom('CL_tt')],X [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.Custom('CL_GEN')|L]#!#!: [GetCountry('CHI').GetRelativeMilitaryStrength(GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.Self)|V2%]"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_TEXT_DEFAULT: "Відносна військова чисельність [GetCountry('CHI').GetAdjective|l]ої сторони"
  RELATIVE_MILITARY_STRENGTH_YUA_TT_ARMY_STRENGTH: "Розмір [GetCountry('CHI').GetAdjectiveWithNoTooltip|l]ого [Concept('army', 'війська')|e]: [GetCountry('CHI').GetArmySize]\nПотенційне [GetCountry('CHI').GetNameWithNoTooltip|l]е [Concept('levy', 'ополчення')|e]: [GetCountry('CHI').GetArmyLevyPotentialStrength]"
  RELATIVE_MILITARY_STRENGTH_REB_TT_TITLE: "Військова чисельність #L [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjective|l]ої#! сторони"
  RELATIVE_MILITARY_STRENGTH_REB_TT_TEXT: "Військова чисельність #L [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjective|l]ої#! сторони відносно #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#!: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetRelativeMilitaryStrength(GetCountry('CHI').Self)|V2%]"
  REB_STR_DESC: "Чисельність [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjectiveWithNoTooltip|l]ого [Concept('army', 'війська')|e]: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetArmySize]\nПотенційне [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetAdjectiveWithNoTooltip|l]е [Concept('levy', 'ополчення')|e]: [GetUniqueInternationalOrganization('red_turban_rebels').GetLeaderCountry.GetArmyLevyPotentialStrength]"
  RTR_SITUATION_TITLE: "[GetCountry('CHI').GetAdjectiveWithNoTooltip]а вірність"
  RTR_SITUATION_TOOLTIP: "У кожної країни, звільненої під час цієї ситуації, є заздалегідь заданий показник #Y відданості Юаню#!, що відображає вірність #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_DAT')|L]#!#!. Коли показник опускається нижче #R 0#!, країна приєднується до #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоних пов'язок»#!#!. Країни з відданістю Юаню вище #Y 0#! будуть нейтральними, а ті, у кого показник вище #G 50%#!, вважаються лояльними"
  RTR_HOLDER_OF_THE_MIDDLE_KINGDOM: "Велика Серединна країна"
  RTR_STRONGEST_REBEL_TITLE: "Найгрізніша «Червона пов'язка»"
  RTR_GRAPH_TITLE_TT: "Сила країни"
  RTR_GRAPH_TT: "[Concept('great_power_score', 'Рахунок великої держави')|e]: [Country.GetGreatPowerScore|Y]"
  RTR_GRAPH_FLAVOR_CHINA_TT: "#italic [GetCountry('CHI').GetName] — вічний противник #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоних пов'язок»#!#!"
  RTR_GRAPH_FLAVOR_REBEL_TT: "#italic Найсильніша країна #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоних пов'язок»#!#! щомісяця визначається на основі [Concept('great_power_score', 'рахунку великої держави')|e] учасників. Країна з найбільшим рахунком автоматично стає воєначальником.#!"
  rtr_grant_titles: "Призначення титулів"
  rtr_grant_titles_desc: "#flavor Можливість здобути могутність та вплив при імператорському дворі приваблює багатьох. Роздавши бунтівникам особливі титули та привілеї, ми, можливо, переконаємо їх стати на наш бік… або хоча б погодитися на тимчасове перемир’я.#!\n\n[actor.GetName] витрат[actor.Custom('end_itat')] #R 5#! од. легітимності та перевед[actor.Custom('end_etut')] частину свого [Concept('income', 'доходу')|e]. Обрана країна отримає #G 15#! од. відданості Юаню."
  rtr_grant_titles_select_country: "Вибір воюючої країни"
  rtr_negotiate_with_rebels: "Переговори з бунтівниками"
  rtr_negotiate_with_rebels_desc: "#flavor Далеко не кожен бунтівник прагне зайняти престол. Багатьом просто хочеться спокійного життя — таких серед бунтівного населення більшість. Цих повстанців можна спробувати втихомирити, пішовши з ними на переговори та спробувавши вирішити питання, які їх турбують.#!\n\n[actor.GetName] зменшу[actor.Custom('end_etyut')] показник просування однієї з [Concept('rebel', 'бунтівних')|e] фракцій до мети на #G 30%#!"
  rtr_negotiate_with_rebels_select_rebels: "Вибір бунтівної фракції"
  rtr_negotiate_with_rebels_tt: "Обрані [Concept('rebels', 'бунтівники')|e] втратять [ShowNamedValue('rebel_progress_severe_bonus')|+=2%] прогресу"
  rtr_call_loyalists_to_arms: "Заклик лоялістів взяти зброю"
  rtr_call_loyalists_to_arms_desc: "#flavor Землі #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! у вогні. Під ногами розбійників стогне земля, що вигодувала тих, хто її топче. Потрібно терміново закликати до зброї тих, хто ще вірний небесному престолу!#!\n\nОбрана #TOOLTIP:GOVERNMENT_REFORM,warring_state,X #L воююча країна#!#!, #G вірна#! #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_DAT')|L]#!#! (відданість Юаню має бути не менше [ShowNamedValue('RTR_IS_LOYAL_VALUE')|+=2]), приєднається до наших війн за допомогою приводу #TOOLTIP:CASUS_BELLI,cb_red_turban_rebellions,X #L «Повстання „Червоних пов’язок“»#!#!."
  rtr_call_loyalists_to_arms_tt: "Кожен учасник об’єднання «[GetInternationalOrganizationType('red_turban_rebels').GetName]» зараз воює проти #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!"
  rtr_call_loyalists_to_arms_select_country: "Вибір вірного прихильника [GetCountry('CHI').Custom('CL_GEN')]"
  rtr_call_loyalists_to_arms_ct: "Прихильники вступають у всі [Concept('war', 'війни')|e] за допомогою приводу #TOOLTIP:CASUS_BELLI,cb_red_turban_rebellions,X #L «Повстання „Червоних пов’язок“»#!#! на боці #ONCLICK:COUNTRY,[actor.Custom('CL_tt')] #TOOLTIP:COUNTRY,[actor.Custom('CL_tt')],X [actor.Custom('CL_GEN')|L]#!#!, виступаючи проти учасників #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоних пов’язок»#!#!."
  rtr_call_loyalists_to_arms_at: "Прихильники втрачають #R  5#! од. відданості Юаню."
  rtr_appease_the_court: "Умиротворення двору"
  rtr_appease_the_court_desc: "#flavor На тлі відкритого повстання в сільській місцевості деякі придворні намагаються заручитися підтримкою бунтівних полководців. Якщо задобрити цих придворних, вони, можливо, залишаться на нашому боці — зараз це дуже важливо.#!\n"
  rtr_rekindle_revolt: "Розпалювання заколоту"
  rtr_rekindle_revolt_desc: "#flavor Ми уклали перемир’я з покровителями, що гнобили нас, проте не збираємося відмовлятися від наміру звільнити Китай остаточно!#!\n"
  rtr_rein_in_area: "Утихомирення області"
  rtr_rein_in_area_desc: "#flavor Територія Китаю велика, а його населення численне. Утихомирюючи захоплені області, ми забезпечимо собі вірність та підтримку місцевого населення в цей важкий час.#!\n\n[actor.GetName] дода[actor.Custom('end_etyut')] захопленій [Concept('area', 'області')|e] модифікатор #TOOLTIP:STATIC_MODIFIER,rtr_rein_in_area_modifier,X #V #L «Регіональне правління»#!#!, а її місцевості стають [Concept('integrated', 'інтегрованими')|e]."
  rtr_rein_in_area_select_area_title: "Вибір утихомирюваної області"
  rtr_rein_in_area_no_areas: "@trigger_no! Немає доступних відповідних [Concept('areas', 'областей')|e], у яких немає [Concept('core', 'корінних')|e] [Concept('locations', 'місцевостей')|e] та є [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,rtr_rein_in_area_modifier,X #V #L «Регіональне правління»#!#!."
  rtr_rein_in_area_tt: "Кожна [Concept('location', 'місцевість')|e] [Concept('integrated', 'інтегрується')|e] та отримує [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,rtr_rein_in_area_modifier,X #V #L «Регіональне правління»#!#! на #Y 10#! років"
  rtr_rein_in_area_at: "Кожна [Concept('location', 'місцевість')|e] в обраній [Concept('area', 'області')|e] [Concept('integrated', 'інтегрується')|e] та отримує [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,rtr_rein_in_area_modifier,X #V #L «Регіональне правління»#!#! на #Y 10#! років"
  rtr_declare_war_for_regional_supremacy: "Оголошення війни за регіональну перевагу"
  rtr_declare_war_for_regional_supremacy_desc: "#flavor $red_turban_rebellions$ — це не просто заколот проти свавілля правлячої династії, а ще й боротьба за місце на престолі. Не можна допустити, щоб небесний мандат дістався хоч комусь із тих, хто рветься до влади!#!\n\n[actor.GetName] оголошу[actor.Custom('end_etyut')] привід «[ShowCasusBelliName('cb_red_turban_rebellions_against_other_rebels')|l]» для війни проти обраної [Concept('country', 'країни')|e]."
  rtr_declare_war_for_regional_supremacy_select_title: "Вибір воюючої країни"
  rtr_declare_war_for_regional_supremacy_no_countries: "@trigger_no! Немає відповідної воюючої країни, яка не є ані [Concept('ally', 'союзником')|e], ані [Concept('subject', 'ленником')|e] нашої країни і яка не має [Concept('truce', 'перемир’я')|e] з нами."
  rtr_support_faction: "Підтримка фракції"
  rtr_support_faction_desc: "#flavor Землі #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_GEN')|L]#!#! палають під натиском заколотників, що повстали проти #L [GetCountry('CHI').GetCulture.GetName|l]ого#! сюзерена. Наше втручання може схилити шальки терезів на один із боків.#!\n\nПередати #Y річний#! запас [Concept('gold', 'дукатів')|e] обраному учаснику #TOOLTIP:SITUATION,red_turban_rebellions,X #L повстання «Червоних пов’язок»#!#! в обмін [ShowBiasValue('opinion_rtr_supported_side')|+=0] до [Concept('opinion', 'думки')|e]"
  rtr_declare_independence: "Оголошення незалежності"
  rtr_declare_independence_desc: "#flavor [GetCountry('CHI').GetLongName] сто[GetCountry('CHI').Custom('endlong_ityat')] на порозі найбільшої кризи. [GetCountry('CHI').GetGovernment.GetRulerOrRegent.GetName] бачить у цьому трагедію, але для нас це чудова нагода скинути кайдани нашого #L [GetCountry('CHI').GetCulture.GetName|l]ого#! сюзерена.#!"
  rtr_join_chinese_defense: "Допомога в захисті [GetCountry('CHI').Custom('CL_GEN')]"
  rtr_join_chinese_defense_desc: "#flavor Хоча повстання «Червоних пов’язок»#! може дати нам можливість звільнитися від [GetCountry('CHI').Custom('longname_ru_GEN')], сила цієї країни та наші дипломатичні зв’язки захищають нас від іноземних загроз. А тому ми повинні підтримати [GetCountry('CHI').Custom('rank_ru_ACC')|l] і допомогти придушити заколот."
  italian_wars: "Італійські війни"
  italian_wars_desc: "Вже понад сто років #TOOLTIP:REGION,italy_region,X #L Італія#!#! процвітає завдяки своєму вигідному положенню в #TOOLTIP:CONTINENT,europe,X #L Європі#!#!. Бурхлива заморська торгівля, незліченні багатства та розквіт культури #TOOLTIP:INSTITUTION,renaissance,X #L Відродження#!#! призвели до настання золотої доби в багатьох частинах півострова.\n\nОднак таке благополуччя привернуло увагу чужинців, які прагнуть здобути багатства Італії та підкорити її малі країни. У відповідь на це найсильніші італійські країни згуртувалися в ліги, щоб разом дати відсіч загарбникам…"
  FOREIGN_LEAGUE_VICTORY: "Перемога іноземної ліги"
  ITALIAN_LEAGUE_VICTORY: "Перемога італійської ліги"
  ITALIAN_WARS_LEAGUES: "Ліги"
  ITALIAN_WARS_LEAGUES_TOOLTIP: "Ліги в цій [Concept('situation', 'ситуації')|e] складаються з кількох учасників, очолюваних лідером. Знищені італійські ліги можна відтворити; знищені іноземні — не можна."
  french_league_leader_rank: "Лідер французької ліги"
  hre_league_leader_rank: "Лідер імперської ліги"
  iberian_league_leader_rank: "Лідер іберійської ліги"
  italian_league_1_leader_rank: "Лідер першої італійської ліги"
  italian_league_2_leader_rank: "Лідер другої італійської ліги"
  italian_league_3_leader_rank: "Лідер третьої італійської ліги"
  join_league_choose_text: "Виберіть лігу, до якої хочете вступити."
  join_a_league: "Вступ до ліги"
  join_a_league_desc: "В #TOOLTIP:REGION,italy_region,X #L Італію#!#! прийшла війна. Ми повинні захистити нашу незалежність від загарбників з чужоземних ліг. Для цього нам потрібно приєднатися до однієї з італійських ліг!"
  create_italian_league: "Створення італійської ліги"
  create_italian_league_desc: "Захист батьківщини лежить на наших плечах. Якщо ми не зможемо об’єднатися проти іноземних завойовників, то станемо для них легкою здобиччю…"
  choose_province_to_plan_campaign_text: "Оберіть провінцію, яку бажаєте зробити ціллю."
  creates_italian_league_with_actor_leader_tt: "Створює [Concept('international_organization', 'міжнародне об’єднання')|e] #italic «Італійська ліга»#!, яке очолить [actor.GetName]"
  member_of_a_league_already: "Вже [Concept('member', 'входить')|e] до Італійської ліги"
  dissolve_italian_league: "Розпуск нашої італійської ліги"
  dissolve_italian_league_desc: "Наша ліга надто слабка, щоб протистояти загарбникам. Слід розпустити її та вступити в іншу, інакше ми станемо жертвою іноземних країн…"
  plan_campaign_in_italy: "Кампанія в Італії"
  plan_campaign_in_italy_desc: "У процвітаючих і багатих містах #TOOLTIP:REGION,italy_region,X #L Італії#!#! живуть найзабезпеченіші люди #TOOLTIP:CONTINENT,europe,X #L Європи#!#!. Потрібно якомога швидше спланувати воєнну кампанію в цьому регіоні, відправити туди наші могутні війська та прибрати до рук частину цих багатств!"
  intervene_in_italian_campaign: "Втручання в італійську кампанію"
  intervene_in_italian_campaign_desc: "#TOOLTIP:REGION,italy_region,X #L Італія#!#! — не місце для іноземних ліг. Нам необхідно втрутитися і зірвати їхні задуми."
  attract_condottieri: "Залучення кондотьєрів"
  attract_condottieri_desc: "Оголосивши підвищену готовність, ми зможемо залучити до країни іноземних найманців із далеких провінцій — вони послужать нашій благородній справі."
  iw_send_aid: "Відправлення допомоги"
  iw_send_aid_desc: "Не можна допустити, щоб іноземні країни порушили баланс сил в #TOOLTIP:REGION,italy_region,X #L Італії#!#!. Ми повинні запропонувати допомогу всім, хто бореться проти цих загарбників."
  join_italian_wars_price: "Ціна вступу в Італійські війни"
  create_italian_league_price: "Ціна створення італійської ліги"
  plan_italian_campaign_wars_price: "Ціна італійської кампанії"
  attract_condottieri_price: "Ціна залучення кондотьєрів"
  opinion_joined_opposing_league: "Учасник іншої ліги"
  intervene_in_italian_campaign_price: "Ціна втручання в італійську кампанію"
  iw_send_aid_price: "Ціна відправлення допомоги"
  iw_send_aid_text: "Оберіть країну, яка отримуватиме допомогу."
  CONQUEST_DESIRE_ON_US: "Бажання завоювати нас"
  CURRENT_LEAGUE_LEADER_DIP_REP: "[Concept('diplomatic_reputation', 'Дипломатична репутація')|e] поточного лідера ліги"
