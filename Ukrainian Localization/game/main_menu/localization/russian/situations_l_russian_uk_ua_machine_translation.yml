  IO_OWNED_LOCATIONS_TITLE: "Місцевості у власності ліги"
  no_league_io_owns_any_land_in_italy_tt: "@trigger_no! Жодна ліга не володіє місцевостями в #TOOLTIP:REGION,italy_region,X #L Італії#!#!."
  guelphs_and_ghibellines: "Гвельфи та гібеліни"
  guelphs_and_ghibellines_desc: "#TOOLTIP:INTERNATIONAL_ORGANIZATION,$guelphs_io_tt$,X #L Гвельфи#!#! та #TOOLTIP:INTERNATIONAL_ORGANIZATION,$ghibellines_io_tt$,X #L гібеліни#!#! кілька століть билися за владу над #TOOLTIP:REGION,italy_region,X #L Італією#!#! відтоді, як [GetUniqueInternationalOrganization('catholic_church').GetLeaderTitle|l] та [GetUniqueInternationalOrganization('hre').GetLeaderTitle|l] зійшлися в боротьбі за інвеституру. Гвельфи підтримують #L [GetCountry('PAP').GetAdjective|l]у#! владу над півостровом, тоді як гібеліни вважаються імперськими лоялістами, відданими #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,hre,X #L Священній Римській Імперії#!#!. Обидві сторони давно вийшли за межі своїх початкових позицій, їхні інтереси стали значно ширшими, і різні країни нерідко змінюють підтримувану сторону в гонитві за вигодою."
