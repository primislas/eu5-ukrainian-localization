  concluded_roto_as_not_ottos_tt: "Ми вийшли переможцями з [Concept('situation', 'ситуації')|e] «Сходження турків», не змінивши позначення на «[GetCountry('TUR').GetAdjectiveWithNoTooltip]а країна»."
  rise_of_timur: "Сходження Тимура"
  rise_of_timur_desc: "[GetCountry('TIM').MakeScope.GetVariable('tim_founding_father').GetCharacter.GetName], наслідуючи приклад $genghis_khan_name$а та великих халіфів, [Select_CString(GetCountry('TIM').MakeScope.GetVariable('tim_founding_father').GetCharacter.IsFemale,'скликала', 'скликав')] своїх вірних воїнів та всіх, хто був [Select_CString(GetCountry('TIM').MakeScope.GetVariable('tim_founding_father').GetCharacter.IsFemale,'їй', 'йому')] відданий. На крові тих, хто поліг під натиском цих орд, ведених воістину винятковим стратегом, виникла молода країна, якій судилося стати імперією. [ShowSubContinentName('central_asia')], [ShowSubContinentName('middle_east')] та Індія — це перший врожай [Select_CString(GetCountry('TIM').MakeScope.GetVariable('tim_founding_father').GetCharacter.IsFemale,'завойовниці, яка', 'завойовника, який')] залишить незгладимий слід в історії цих земель на багато століть наперед…"
