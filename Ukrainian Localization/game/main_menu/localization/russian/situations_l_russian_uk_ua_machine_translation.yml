  WAR_OF_RELIGIONS_NO_WAR: "Немає поточних [Concept('war', 'війн')|e]"
  WAR_OF_RELIGIONS_VOTES_TITLE: "[VoteTargetGlue.GetVoteTarget.GetCountry.Custom('GetWarOfReligionsPosition')]: [VoteTargetGlue.GetVoterCount|V0]"
  WAR_OF_RELIGIONS_TOOLTIP: "Подія «[SituationView.GetActiveSituation.GetSituation.GetName]» закінчиться, якщо #TOOLTIP:INTERNATIONAL_ORGANIZATION,$protestant_union_tt$,X #L Євангелічна унія#!#! або #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_league_tt$,X #L Католицька ліга#!#! доб'ються гегемонії в #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#!, нав'язавши #TOOLTIP:SCRIPTED_PEACE_TREATY,religious_supremacy,X #L релігійну перевагу#!#! у [Concept('war', 'війні')|e] з приводом #TOOLTIP:CASUS_BELLI,cb_religious_superiority,X #L «Релігійна перевага»#!#!.\n\n#Y Вестфальський мир#! буде підписано, коли #Y 80%#! учасників запросять [Concept('peace', 'миру')|e]"
  colonial_revolution: "Колоніальна революція"
  colonial_revolution_desc: "Ідеї #TOOLTIP:INSTITUTION,enlightenment,X #L Просвітництва#!#! знайшли відгук у колоніальних країнах по всьому світу. Правляча еліта колоній, позбавлена впливу на політику, надихнулася ідеями свободи, рівності та представництва. Звісно, ці ідеї суперечать їхньому поточному статусу ленників, адже вони можуть лише виконувати вимоги своїх колоніальних сюзеренів.\n\nПолітичний тиск або відкритий заколот ускладнять подальше підтримання порядку в колоніях."
  ar_colonial_overlord.tt: "Колоніальний сюзерен"
  ar_disloyal_colonial_subject.tt: "Нелояльний колоніальний ленник"
  ar_loyal_colonial_subject.tt: "Лояльний колоніальний ленник"
