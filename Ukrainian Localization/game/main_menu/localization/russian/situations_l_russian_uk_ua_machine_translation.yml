  guelphs_and_ghibellines_guelphs_stalemate_trigger_tt: "Поточною є [Concept('age', 'доба')|e] #TOOLTIP:AGE,age_3_discovery,X #L Відкриттів#!#! або пізніша"
  the_revolution: "Народне повстання"
  the_revolution_desc: "Нерівність у розподілі багатства, падіння рівня життя та поширення грамотності пробудили в місцевих жителях самосвідомість. Бюргери та селяни вимагають змін, протестуючи проти експлуатації нижчого суспільства аристократами, а також проти необмеженої влади правлячого класу. Цей новий рух загрожує встановленому суспільному порядку, який з незапам'ятних часів заохочував гноблення нижчих класів вищими."
  institute_governmental_purges: "Чистки в уряді"
  institute_governmental_purges_desc: "Ми не можемо довіряти нікому! Шпигуни та головорізи ховаються за кожним кутом, а ті, кого ми вважали надійними друзями, загрожують зруйнувати нас зсередини. Щоб захистити народ у ці смутні часи, доведеться рубати голови!"
  suppress_foreign_revolutionaries: "Боротьба із закордонними революціонерами"
  suppress_foreign_revolutionaries_desc: "Дозволяючи вільнодумству та антимонархічним ідеям заволодівати умами чужоземних селян, ми ризикуємо отримати бунти й у своїх володіннях."
  no_country_available: "@trigger_no! Немає доступних [Concept('country', 'країн')|e], що відповідають критерію."
  assist_foreign_revolutionaries: "Допомога закордонним революціонерам"
  assist_foreign_revolutionaries_desc: "Кожен, хто бореться з тиранами та гнобителями, є нашим братом і соратником у боротьбі. Треба їх підтримати!"
  elevate_local_aristocracy: "Збільшення привілеїв аристократам"
  elevate_local_aristocracy_desc: "Неосвічені маси не здатні міркувати тверезо. Очевидно, що їхню думку не можна сприймати всерйоз, інакше вони приведуть нашу країну до краху. Щоб утвердити нашу перевагу над цією черню, ми придушимо їхні боязкі спроби підняти голову і не дозволимо розколоти наше суспільство."
  demote_local_aristocracy: "Зменшення привілеїв аристократам"
  demote_local_aristocracy_desc: "Нехай зрадіють усі [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l], які з батогом у руках експлуатували простий народ і наживалися на ньому — тепер вони самі [SCOPE.sCountry('actor').GetGovernment.GetEstateName('peasants_estate')|l]!"
  every_noble_in_target_province_suffers_severe_penalty_tt: "Наші #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократичні#!#! [Concept('pops', 'групи населення')|e] у провінції [target_province.GetName] отримають [ShowNamedValue('pop_satisfaction_severe_penalty')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  every_noble_in_target_province_gains_mild_satisfaction_tt: "Наші #TOOLTIP:ESTATE_TYPE,nobles_estate,X #L аристократичні#!#! [Concept('pops', 'групи населення')|e] у провінції [target_province.GetName] отримають [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%] до [Concept('pop_satisfaction', 'задоволення')|e]"
  reestablish_the_parliament: "Відновлення парламенту"
  reestablish_the_parliament_desc: "Наш народ вимагає представництва."
  any_country_in_spread_of_revolution_disaster_tt: "Жодна [Concept('country', 'країна')|e] не залучена до [Concept('disaster', 'лиха')|e] #TOOLTIP:DISASTER_TYPE,revolution_disaster,X #L «Революція»#!#!"
  institute_governmental_purges_tt: "Обраний нами [Concept('character', 'персонаж')|e] буде страчений"
  suppress_foreign_revolutionaries_tt: "Ми отримаємо [Concept('casus_belli', 'привід')|e] #TOOLTIP:CASUS_BELLI,crush_the_revolution_cb,X #L «Придушення революції»#!#! для війни з обраною нами революційною країною"
  assist_foreign_revolutionaries_tt: "Ми допоможемо обраній нами революційній країні шляхом прямої інтервенції або відправлення військового підкріплення"
  elevate_local_aristocracy_tt: "Вірні нам [ShowEstateTypeName('nobles_estate')|l] в обраній [Concept('province', 'провінції')|e] отримають привілеї — вони допоможуть нам зберегти статус-кво"
  demote_local_aristocracy_tt: "Якщо [ShowEstateTypeName('nobles_estate')|l] позбудуться привілеїв, ми зміцнимо позиції простого народу та підтримаємо революційні ідеали"
  according_to_our_crown_power_we_suffer_tt: "Залежно від рівня [Concept('crown_power', 'влади правителя')|e] ми отримаємо такі негативні ефекти:"
  estate_satisfaction_gain_scales_with_estate_power_tt: "Ці ефекти масштабуються залежно від [Concept('estate_power', 'влади')|e] кожного [Concept('estate', 'стану')|e]:"
  spread_revolutionary_sentiment: "Поширення революційних настроїв"
  spread_revolutionary_sentiment_desc: "Боротьба простого народу, якому нічого втрачати, крім своїх ланцюгів, є справою довгою і важкою. Часто ми змушені шукати підтримки за кордоном, переконуючи чужоземні країни прийняти наші ідеали. Шлях цей нелегкий, але ми працюємо в ім'я вищої мети!"
  revolution_in_selected_country_tt: "[target_country.Custom('predlog_vvo')|U] #ONCLICK:COUNTRY,[target_country.Custom('CL_tt')] #TOOLTIP:COUNTRY,[target_country.Custom('CL_tt')],X [target_country.Custom('CL_PREP')|L]#!#! виникне [Concept('rebel', 'бунтівний')|e] революційний рух. Якщо ж такий уже існує, ми зміцнимо його та прискоримо його прогрес"
  revolution_in_country_tt: "В обраній [Concept('country', 'країні')|e] виникне [Concept('rebel', 'бунтівний')|e] революційний рух. Якщо ж такий уже існує, ми зміцнимо його та прискоримо його прогрес"
  LEADER_OF_THE_REVOLUTION_TOOLTIP: "Це [Concept('revolutionary_target', 'ціль-революціонер')|e]"
  WRESTLING_WITH_THE_REVOLUTION_TOOLTIP: "У цій [Concept('country', 'країні')|e] нині відбувається [Concept('disaster', 'лихо')|e] #TOOLTIP:DISASTER_TYPE,revolution_disaster,X #L «Революція»#!#!"
  the_revolution_situation_tips_header: "Порада щодо ситуації «$the_revolution$»"
  AT_WAR_WITH_REVOLUTIONARIES_TT: "Ця [Concept('country', 'країна')|e] охоплена [Concept('civil_war', 'громадянською війною')|e] проти [Concept('revolutionary', 'революційних')|e] [Concept('rebels', 'бунтівників')|e]"
  IS_REVOLUTIONARY_TT: "Ця [Concept('country', 'країна')|e] — [Concept('revolutionary', 'революційна')|e]"
  FIGHTING_AGAINST_REVOLUTIONARIES_TT: "Ця [Concept('country', 'країна')|e] бореться проти [Concept('revolutionary', 'революційної')|e] [Concept('country', 'країни')|e], [Concept('casus_belli', 'привід для цієї війни')|e] — #TOOLTIP:CASUS_BELLI,crush_the_revolution_cb,X #L «Придушення революції»#!#!"
  FIGHTING_AGAINST_COUNTER_REVOLUTIONARIES_TT: "Ця [Concept('revolutionary', 'революційна')|e] [Concept('country', 'країна')|e] відстоює в бою ідеали #TOOLTIP:SITUATION,the_revolution,X #L народного повстання#!#!"
  request_antipiracy_policy_tt: "Ми зв'яжемося з ними та спробуємо переконати їх змінити закон"
  choose_an_uncolonized_location: "Оберіть неколонізовану [Concept('location', 'місцевість')|e], щоб розмістити там штаб."
  create_allied_pirate_nation: "Створення піратської країни — ленника"
  create_allied_pirate_nation_desc: "Надавши каперські свідоцтва, відповідну гавань та одну зі своїх флотилій, а також запропонувавши трохи дукатів для найму матросів, ми створимо лігво піратів та головорізів, які заважатимуть ворожим кораблям і при цьому безперешкодно пропускатимуть наші власні."
  create_allied_pirate_nation_tt: "В обраній [Concept('location', 'місцевості')|e] виникне [Concept('navy_based', 'флотський')|e] [Concept('subject', 'ленник')|e]. У нас буде можливість почати гру за нього"
  request_antipiracy_policy: "Вимога боротьби з піратством"
  request_antipiracy_policy_desc: "Піратство неможливо викорінити, бо деякі прокляті країни сміють відкрито заохочувати та фінансувати цих розбійників. Ми повинні вдатися до сили нашої дипломатії та переконати такі країни в тому, що вони роблять жахливу помилку."
  abandon_piracy_action: "Відмова від піратства"
  abandon_piracy_action_desc: "Ми знайшли вигідніші та безпечніші способи заробітку. Вдячні простолюди та торговці добровільно ділитимуться з нами врожаєм та доходами, якщо ми захищатимемо їх від піратів та грабіжників. Якщо вкладати ці кошти в інфраструктуру та військо, то ми значно примножимо їх та здобудемо нечувані багатства!"
  attract_sailors: "Залучення моряків"
  attract_sailors_desc: "Хвалячись багатством у портових тавернах та обіцяючи хороші гроші за роботу, ми легко залучимо до своїх лав багатьох незадоволених моряків. Так, у них напевно проблеми з досвідом та дисципліною, але в цьому випадку кількість важливіша за якість."
  choose_a_region: "Вибір регіону"
  no_regions_available: "$NO_POSSIBLE_REGIONS$"
  migrate_to_new_waters: "Перехід у нові води"
  migrate_to_new_waters_desc: "У світі є куди багатші береги, що обіцяють більшу вигоду, і нам давно час відшукати їх. Щоб точно досягти успіху в пошуках цих далеких скарбів, ми можемо перенести нашу штаб-квартиру в будь-яке місце в межах досяжності нашого флоту."
  migrate_to_new_waters_tt: "Ми спробуємо удачі, перебравшись у далеку [Concept('coastal', 'прибережну')|e] [Concept('location', 'місцевість')|e]"
  send_diplomat: "Відправлення дипломата"
  golden_age_of_piracy: "Золотий вік піратства"
  golden_age_of_piracy_desc: "Багатства Нового Світу приваблюють у його моря не лише флоти великих імперій. Незліченні головорізи та незадоволені моряки мріють кинути виклик великим державам і вирушити на пошуки пригод, скарбів та свободи, навіть ризикуючи бути повішеними на реї."
  GAOP_PRIVATEER_TITLE: "Капери [SituationView.GetPlayer.Custom('CL_GEN')]"
  GAOP_PRIVATEER_SUBTITLE: ""
  GAOP_SEND_PRIVATEER_TITLE: "Відправлення каперів"
  GAOP_MIGHTIEST_PIRATE_TITLE: "[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_pirate_variable').GetCountry.GetLongName]"
  GAOP_MIGHTIEST_PIRATE_TT: "Найвпливовіший пірат"
  GAOP_MIGHTIEST_PIRATE_DESC_TT: "Найвпливовішим і найсильнішим піратом щомісяця стає володар найбільшого [Concept('great_power_score', 'рахунку великої держави')|e]!"
