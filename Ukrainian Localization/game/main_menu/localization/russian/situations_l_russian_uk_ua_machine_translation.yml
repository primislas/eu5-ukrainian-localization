  REFORM_TITLE: "[GetReligionByKey('catholic').GetAdjective]а реформація"
  reformation: "Реформація"
  reformation_desc: "#italic Господь і Учитель наш Ісус Христос, кажучи: «Покайтеся…», заповідав, щоб усе життя віруючих було покаянням.#!\n\nЗ цих слів починалися 95 тез, прибитих до дверей церкви. У них йшлося про розклад #TOOLTIP:INTERNATIONAL_ORGANIZATION,$catholic_church_tt$,X #L Католицької церкви#!#!. Після тривалого періоду занепаду та внутрішніх чвар #TOOLTIP:RELIGION,$catholic_tt$,X #L католицька#!#! віра потребує реформ. Багато хто вторить автору тез, розмірковуючи про чистоту внутрішньої віри та про те, що шлях до прощення лежить лише через Бога. Інші оголошують цей текст єрессю та відступом від [ShowReligionAdjectiveWithNoTooltip('catholic')|l]ого вчення.\n\n#TOOLTIP:CONTINENT,europe,X #L Європу#!#! охопила хвиля диспутів, і стає зрозуміло, що вигляд континенту незворотно зміниться."
