  rise_of_the_ottomans: "Сходження турків"
  rise_of_the_ottomans_desc: "Роздроблена #TOOLTIP:REGION,anatolia_region,X #L Анатолія#!#! прийняла на себе всю міць удару #TOOLTIP:CULTURE,$turkish_culture_tt$,X #L турецьких#!#! бейликів, якими рухають зухвалі задуми, нестримна сила та грандіозні плани. Кочовий народ, що осягнув цивілізаційні тонкощі осілого суспільства, виявився здатним виховувати не тільки грізних воїнів, а й умілих керівників.\n\nРозділені та вразливі місцеві князівства не здатні протистояти своїм сильнішим суперникам, які скористалися моментом та об'єднали роздроблені землі під своїм прапором. [GetCountry('TUR').GetName], дітище великого діяча на ім'я [GetCharacter('tur_osman').GetName], ді[GetCountry('TUR').Custom('end_etyut')] в єдиному пориві, який не вщухне ще багато століть.\n\nКожна перемога — це крок уперед для бейликів, які поступово набирають силу, з якою доведеться рахуватися будь-кому. Підкорення знаменитих міст ознаменує настання нової доби — доби османського тріумфу."
