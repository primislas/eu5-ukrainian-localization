  fall_of_delhi_delhi_progress: "#T [GetSituationByKey('fall_of_delhi').GetNameWithNoTooltip]#!\nЦе [Concept('share_of_power_gc', 'частка влади')|e] країни [GetCountry('DLH').GetName]. Вона здобуде перемогу, якщо її частка влади становитиме #Y 100%#!, перш ніж станеться [Concept('disaster', 'лихо')|e] «[ShowDisasterName('dissolution_of_delhi')]»."
  fall_of_delhi_opposers_progress: "#T Падіння Делі#!\nЦе [Concept('share_of_power_gc', 'частка влади')|e] противників #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#!. Якщо їхня частка влади становитиме #R 80%#!, [GetCountry('DLH').Custom('CL_ACC')] може спіткати [Concept('disaster', 'лихо')|e] #TOOLTIP:DISASTER_TYPE,dissolution_of_delhi,X #L «Розпад Делійського Султанату»#!#!."
  SUPPORTERS_OF_COUNTRY: "Підтримка з боку країни [Country.GetLongName]"
  has_never_had_situation_before_tt: "Вперше стикається з цією [Concept('situation', 'ситуацією')|e]"
  delhi_situation_info_tt: "Незабаром може розпочатися [Concept('situation', 'ситуація')|e] «#TOOLTIP:SITUATION,fall_of_delhi,X #L Падіння Делі#!#!». У ці нелегкі часи в наших землях піднімуться численні повстання. Сусіди та ленники оголять проти нас мечі, якщо побачать, що наша влада нездатна своєчасно оговтатися від удару. Тим часом наростає загроза і зсередини: підступна [ShowEstateTypeName('nobles_estate')|l] збирається повалити нестійкий уряд…\n"
  has_decided_to_cede_territories_tt: "#ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_DAT')|L]#!#! довелося віддати землі в події #Y «$delhi_situation.16.title$»#!"
  gain_2_progress_for_delhi_tt: "Ми отримаємо [Concept('share_of_power_gc', 'частку влади')|e] #G 2%#! під час [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  gain_5_progress_for_claimants_tt: "Наші противники отримають [Concept('share_of_power_gc', 'частку влади')|e] #R 5%#! під час [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  gain_3_progress_for_claimants_tt: "Наші противники отримають [Concept('share_of_power_gc', 'частку влади')|e] #R 3%#! під час [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  get_opinion_with_other_jackals_tt: "Відносини між нами та країнами-противницями країни [GetCountry('DLH').GetName] покращаться на #G 20#! од., а ми отримаємо #G 5#! од. [Concept('favors', 'прихильності')|e] цих країн"
  delhi_claimant_country_tt: "Ми активно протистоїмо країні [GetCountry('DLH').GetName] у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  cd_3_years: "Ми не користувалися цією взаємодією за останні #Y 3#! роки"
  dlh_reduce_frequency_of_revolt_events_tt: "Частота катастрофічних подій у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]» буде дещо знижена на час дії [Concept('modifier', 'модифікатора')|e] «[ShowModifier('delhi_loyal_governors_modifier')]»"
  appease_nobility_effect_tt: "Поки діє [Concept('modifier', 'модифікатор')|e] #TOOLTIP:STATIC_MODIFIER,delhi_appeased_the_nobles_modifier,X #V #L «Прихильність знаті»#!#!, [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l] не будуть бунтувати проти нашої влади під час особливих [Concept('events', 'подій')|e]"
  delhi_win_lose_conditions_tt: "Якщо [Concept('share_of_power_gc', 'частка влади')|e] наших ворогів перевищить #R 50%#!, може настати [Concept('disaster', 'лихо')|e] #TOOLTIP:DISASTER_TYPE,dissolution_of_delhi,X #L «Розпад Делійського Султанату»#!#!"
  has_not_sided_with_opposers_already_tt: "Ми ще не протистоїмо країні [GetCountry('DLH').GetNameWithNoTooltip] у поточній ситуації"
  will_oppose_delhi_tt: "Ми будемо #Y протистояти#! країні [GetCountry('DLH').GetName] у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  has_not_sided_with_delhi_already_tt: "Ми ще не підтримуємо [GetCountry('DLH').Custom('CL_ACC')] у поточній ситуації"
  will_support_delhi_tt: "Ми будемо #Y підтримувати#! #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_ACC')|L]#!#! у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  gain_leadership_during_situation_tt: "Ми очолимо #Y  опір#! проти [GetCountry('DLH').Custom('CL_GEN')] у [Concept('situation', 'ситуації')|e] «[GetSituationByKey('fall_of_delhi').GetName]»"
  opposition_share_of_power_1_tt: "[Concept('share_of_power_gc', 'Частка влади')|e] противників #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! становить хоча б 100%"
  delhi_share_of_power_1_tt: "[Concept('share_of_power_gc', 'Частка влади')|e] країни [GetCountry('DLH').GetName] становить хоча б 100%"
  dissolution_of_delhi_started_tt: "Починається [Concept('disaster', 'лихо')|e] «[ShowDisasterName('dissolution_of_delhi')]»"
  until_the_end_of_the_situation_desc: "До закінчення ситуації"
  fall_of_delhi_plea_neighbors: "Відправлення послів"
  fall_of_delhi_plea_neighbors_desc: "Країна [GetCountry('DLH').GetFlavorRank] вкрай акуратно розпоряджається своїми печатками. Посли з документами, скріпленими такою печаткою, у супроводі найкращої охорони — це вже саме по собі підтвердження нашої могутності, здатне охолодити гарячі голови всіх, хто зазіхає на наші території."
  fall_of_delhi_appoint_governors: "Призначення намісників"
  fall_of_delhi_appoint_governors_desc: "[GetCountry('DLH').GetFlavorRank], де ми живемо, простягається далеко й широко. Нам відчайдушно потрібні вмілі та віддані керівники шляхетного походження, здатні забезпечити провінціям процвітання та придушити інакомислення."
  fall_of_delhi_reaffirm_vassal_relations: "Вимога данини"
  fall_of_delhi_reaffirm_vassal_relations_desc: "Наше становище хистке, а скарбниця загрожує ось-ось спорожніти, проте наш обов’язок — нагадати ленникам, перед ким вони схиляють коліно. Зажадавши данину та прийнявши у себе їхніх правителів, ми посприяємо зміцненню відносин між ленниками та сюзереном."
  fall_of_delhi_appease_the_nobility: "Умиротворення знаті"
  fall_of_delhi_appease_the_nobility_desc: "Не можна недооцінювати вплив, яким володіє [SCOPE.sCountry('actor').GetGovernment.GetEstateName('nobles_estate')|l] у питаннях успіху та процвітання нашої країни. Вони зводять царів на трон і стежать за дотриманням законів корони, а тому мають велику силу [GetCountry('DLH').Custom('endrank_predlog_vvo')] [GetCountry('DLH').Custom('rank_ru_PREP')|l]. Заради нашого ж блага ми повинні негайно заручитися їхньою вірністю, інакше їхнє владолюбство погубить нас усіх…"
  fall_of_delhi_join_opposers: "Виступ проти [GetCountry('DLH').Custom('CL_GEN')]"
  fall_of_delhi_join_opposers_desc: "#ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_DAT')|L]#!#! загрожує неминуча поразка під тиском підкорених цією країною народів, які вирішили покінчити з гнобленням. Треба осідлати вітер змін і скористатися ситуацією. [GetCountry('DLH').GetFlavorRank] підкорювачів незабаром розпадеться на частини, і на цих уламках ми побудуємо власну країну, яка назавжди увійде в історію…"
  fall_of_delhi_join_delhi: "Підтримка [GetCountry('DLH').Custom('CL_GEN')]"
  fall_of_delhi_join_delhi_desc: "Ми зацікавлені в тому, щоб сформований порядок залишався незмінним. І [GetCountry('DLH').GetFlavorRank|l], і весь [GetCountry('DLH').GetAdjectiveWithNoTooltip|l]ий народ у скрутному становищі, проте ми будемо й далі дотримуватися принципів верховенства права… поки це нам вигідно."
  strengthen_neighbor_relations: "Зміцнення відносин із сусідами"
  strengthen_neighbor_relations_desc: "Нам слід втихомирити численні сусідні країни, що оточують [GetCountry('DLH').Custom('rank_ru_ACC')|l], щоб вони не намагалися розширюватися за наш рахунок!"
