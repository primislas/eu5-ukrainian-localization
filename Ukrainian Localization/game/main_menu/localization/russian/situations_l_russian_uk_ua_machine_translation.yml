  GAOP_MODIFIERS_TT_DESC: "[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_pirate_variable').GetCountry.GetName] отриму[SituationView.GetActiveSituation.GetSituation.MakeScope.GetVariable('strongest_pirate_variable').GetCountry.Custom('end_etyut')]:"
  war_of_religions: "Релігійна війна"
  war_of_religions_desc: "Після кількох десятиліть релігійних чвар через прихильність до різних течій #TOOLTIP:RELIGIONGROUP,christian,X #L християнства#!#! у #TOOLTIP:INTERNATIONAL_ORGANIZATION,$hre_tt$,X #L Священній Римській Імперії#!#! збройне зіткнення між #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,protestant_union,X #L Євангелічною унією#!#! та #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,catholic_league,X #L Католицькою лігою#!#! здається неминучим. Князі імперії створили ці об'єднання насамперед заради захисту своєї віри, проте багато європейських країн жадібними очима дивляться на охоплену заворушеннями країну. Мир в імперії висить на волосині, і країни #TOOLTIP:CONTINENT,europe,X #L Європи#!#! готують свої війська до бою, керовані як релігійною ревністю, так і цілком мирськими прагненнями."
  war_of_religions_peace_treaty_enforced_tt: "Будь-яка зі сторін нав'язала #TOOLTIP:SCRIPTED_PEACE_TREATY,religious_supremacy,X #L перевагу релігії#!#! в ході [Concept('war', 'війни')|e] з приводом «[ShowCasusBelliName('cb_religious_superiority')]»"
  war_of_religions_peace_of_westphalia_tt: "Оскільки #Y 80%#! учасників війни просять [Concept('peace', 'миру')|e], було підписано #Y Вестфальський мир#!"
