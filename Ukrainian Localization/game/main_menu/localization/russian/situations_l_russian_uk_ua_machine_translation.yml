  red_turban_rebellions: "Повстання «Червоних пов’язок»"
  red_turban_rebellions_desc: "#TOOLTIP:CULTUREGROUP,chinese_group,X #L Китайський#!#! народ підняв повстання проти своїх #L [GetCountry('CHI').GetCulture.GetName|l]их#! правителів. Заколотники оголосили про створення власних незалежних країн, зануривши #ONCLICK:COUNTRY,[GetCountry('CHI').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('CHI').Custom('CL_tt')],X [GetCountry('CHI').Custom('CL_ACC')|L]#!#! в безодню громадянської війни, що загрожує знищити династію $YUA$…"
  red_turban_rebellions_strongest_red_turban_rebel_tt: "#TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,red_turban_rebels,X #L «Червоні пов’язки»#!#! очолює лідер, якому необхідно володіти #Y 65,00%#! [Concept('locations', 'місцевостей')|e], що входять до #TOOLTIP:INTERNATIONAL_ORGANIZATION,$middle_kingdom_tt$,X #L Серединної країни#!#!"
