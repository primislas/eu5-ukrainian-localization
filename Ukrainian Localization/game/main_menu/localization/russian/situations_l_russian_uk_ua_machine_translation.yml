  treaty_of_tordesillas.tt.location_is_second_country: "Верховний [Concept('overlord', 'сюзерен')|e] [THIS.GetLocation.Custom('LR_GEN')|l] [THIS.GetLocation.GetName] — [GetSituationByKey('treaty_of_tordesillas').MakeScope.GetVariable('var_west_country').GetCountry.GetName]"
