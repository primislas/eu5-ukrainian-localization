  SENGOKU_STRONG_DAIMYO: "Наймогутніший даймьо #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,japanese_shogunate,X #L Японського Сьогунату#!#!"
  clan_only_present_in_one_location_tt: "Є менш ніж у #T 3#! [Concept('locations', 'місцевостях')|e]"
  has_emperor_status_tt: "Має особливий статус #TOOLTIP:SPECIAL_STATUS,japanese_emperor,X #L тенно#!#! в #TOOLTIP:INTERNATIONAL_ORGANIZATION_TYPE,japanese_shogunate,X #L Японському Сьогунаті#!#!"
  fall_of_delhi: "Падіння Делі"
  fall_of_delhi_desc: "Сто років надмірного напруження та розпад центральної влади підірвали репутацію #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! — колись могутньої країни. Стерв'ятники та вороги збираються на кордонах [GetCountry('DLH').Custom('rank_ru_GEN')|l], вичікуючи моменту для удару. Якщо правителі не зможуть захистити свій народ від внутрішньої та зовнішньої загрози, то велика імперія, створена їхніми попередниками, дуже скоро опиниться на колінах."
  fall_of_delhi_info: "В добу падіння [GetCountry('DLH').Custom('CL_GEN')] країни Індії намагатимуться відібрати у [GetCountry('DLH').Custom('longname_ru_GEN')] владу над своїми регіонами. Якщо їм це вдасться, [GetCountry('DLH').GetFlavorRank|l] розкол[GetCountry('DLH').Custom('endrank_etyut')]ся на частини і на уламках незабаром виникне нова велика держава…"
  LOYAL_SUBJECT_OF_DELHI: "Вірний [Concept('subject', 'ленник')|e] країни [GetCountry('DLH').GetName] у [Concept('situation', 'ситуації')|e] «[ShowSituationName('fall_of_delhi')]»."
  DISLOYAL_SUBJECT_OF_DELHI: "[Concept('disloyal_subject', 'Нелояльний ленник')|e] #ONCLICK:COUNTRY,[GetCountry('DLH').Custom('CL_tt')] #TOOLTIP:COUNTRY,[GetCountry('DLH').Custom('CL_tt')],X [GetCountry('DLH').Custom('CL_GEN')|L]#!#! у [Concept('situation', 'ситуації')|e] #TOOLTIP:SITUATION,fall_of_delhi,X #L «Падіння Делі»#!#!."
  ALLY_OF_DELHI: "[Concept('ally', 'Союзник')|e] або #Y прихильник#! країни [GetCountry('DLH').GetName] у [Concept('situation', 'ситуації')|e] «[ShowSituationName('fall_of_delhi')]»."
  RIVAL_ENEMY_OF_DELHI: "[Concept('rival', 'Суперник')|e] або [Concept('enemy', 'ворог')|e] країни [GetCountry('DLH').GetName] у [Concept('situation', 'ситуації')|e] «[ShowSituationName('fall_of_delhi')]»."
