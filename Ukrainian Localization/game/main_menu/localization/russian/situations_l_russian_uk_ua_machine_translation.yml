  little_ice_age: "Малий льодовиковий період"
  STARVING_PROVINCES_TOOLTIP: "$AMOUNT|Y0$ з $TOTAL_AMOUNT|Y0$ [Concept('provinces', 'провінцій')|e] у країні $COUNTRY$ [Concept('starving', 'голодують')|e]!"
