  STARVING_PROVINCE_ENTRY_REST: "…і ще до $AMOUNT|Y$!"
  EXTENDED_WINTER_AFFECTED_LOCATIONS_TOOLTIP: "$little_ice_age$ зачіпає $AMOUNT|0$ з $TOTAL_AMOUNT$ [Concept('locations', 'місцевостей')|e] у нашому володінні:"
  EXTENDED_WINTER_STARVING_PROVINCES_TOOLTIP: "Нам належать кілька [Concept('provinces', 'провінцій')|e] ($TOTAL_AMOUNT|0$), з яких [Concept('starving', 'голодують')|e] $AMOUNT|0$:"
  little_ice_age_desc: "Пронизливий до кісток холод Малого льодовикового періоду випробовує нас, змушуючи нашого правителя або пристосовуватися, або спостерігати, як його володіння занурюються в крижане пекло. Історія запам'ятає тих, хто пережив це випробування за рахунок вмілого управління — або просто завдяки інстинкту виживання."
  locations_with_extended_winter_will_be_affected_by_the_following_modifiers_tt: "[Concept('locations', 'Місцевості')|e], зачеплені тривалою [Concept('winter', 'зимою')|e], страждатимуть від цих [Concept('location_modifiers', 'модифікаторів')|e] до кінця поточної [Concept('situation', 'ситуації')|e]:"
  locations_in_designated_market_get_enforced_rationing_policy_tt: "Кожна [Concept('province_capital', 'столиця провінції')|e] на вказаному [Concept('market', 'ринку')|e], якою ми володіємо, отримає модифікатор «[ShowModifier('enforced_rationing_policy')]» на #Y 10#! років"
  province_gains_expanded_food_production_modifier_and_potential_tt: "Вибрана [Concept('province', 'провінція')|e] отримає модифікатор «[ShowModifier('expanded_food_production_modifier')]» на #Y 10#! років.\n\nЗа можливості [Concept('location', 'місцевість')|e] з найбільшою кількістю [Concept('food_raw_material', 'ресурсу для виробництва їжі')|e] в тій же провінції отримає модифікатор «[ShowModifier('expanded_production_of_raw_goods_modifier')]» на #Y 10#! років"
  enforce_rationing_policies: "Запровадження політики пайків"
  enforce_rationing_policies_desc: "Дефіцит їжі загрожує неминучим голодом, і ми мусимо запровадити суворе нормування продуктів, щоб припасів вистачало на час суворих зим. Взявши під контроль розподіл зерна та обмеживши накопичення таємних запасів, ми зможемо запобігти голоду ціною громадських заворушень та потенційної нестабільності."
  expand_provincial_food_production: "Збільшення виробництва їжі в провінції"
  expand_provincial_food_production_desc: "Зміни клімату змушують впроваджувати інновації в сільське господарство. Заохочуючи місцеве виробництво, ми зможемо послабити наслідки похолодання та забезпечити населення стабільним джерелом їжі."
  send_food_aid: "Відправлення продовольчої допомоги"
  send_food_aid_desc: "Неврожай призвів до голоду в безлічі провінцій. Якщо відправляти продовольство в постраждалі провінції або союзні країни, ми зможемо покращити ситуацію та запобігти заворушенням, але при цьому доведеться пожертвувати нашими запасами в інших провінціях."
  choose_province_to_receive_food: "Оберіть [Concept('province', 'провінцію')|e], яка отримає [Concept('food', 'їжу')|e]"
  choose_province_to_send_food_to_target_province_taker: "Оберіть [Concept('province', 'провінцію')|e], яка відправить [Concept('food', 'їжу')|e] до провінції [target_province_taker.GetName]"
  due_to_no_road_network_tt: "Оскільки [Concept('province_capital', 'столиця провінції')|e] [target_province_giver.GetName] не з'єднана з новітньою [Concept('road', 'дорогою')|e] до [Concept('province_capital', 'столиці провінції')|e] [target_province_taker.GetName], частина [Concept('food', 'їжі')|e] буде втрачена дорогою"
  has_not_recently_given_food_tt: "Провінцію не обирали як відправника [Concept('food', 'їжі')|e] за останні 2 роки"
  every_pop_in_target_province_taker_gains_10_satisfaction_tt: "[Concept('pop_satisfaction', 'Вдоволення ')|e] наших [Concept('pops', 'груп населення')|e] у провінції [target_province_taker.GetNameWithNoTooltip] підвищиться на [ShowNamedValue('pop_satisfaction_mild_bonus')|+=2%]"
  province_is_starving_tt: "[Concept('province', 'Провінція')|e] цієї [Concept('location', 'місцевості')|e] [Concept('starving', 'голодує')|e]!"
  market_negative_food_balance_tt: "На [Concept('market', 'ринку')|e] цієї [Concept('location', 'місцевості')|e] #R негативний#! баланс щомісячного залишку [Concept('food', 'їжі')|e]"
  affected_by_extended_winters_tt: "[Concept('area', 'Область')|e] цієї [Concept('location', 'місцевості')|e] страждає від суворої [Concept('winter', 'зими')|e]"
  send_food_aid_tt: "Ми оберемо [Concept('province', 'провінцію')|e], яка отримає їжу з іншої нашої [Concept('provinces', 'провінції')|e]"
