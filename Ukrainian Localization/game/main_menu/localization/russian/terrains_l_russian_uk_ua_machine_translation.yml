  WEATHER_CYCLONE_DESC: "$WEATHER_CYCLONE$, епіцентр якого зараз знаходиться у [LOCATION.Custom('LR_PREP')|l] [LOCATION.GetName], рухається у напрямку до [TARGET_LOCATION.Custom('LR_DAT')|l] [TARGET_LOCATION.GetName]."
