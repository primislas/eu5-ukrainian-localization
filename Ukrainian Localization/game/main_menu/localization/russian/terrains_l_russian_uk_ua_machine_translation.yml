  TERRAIN_CAN_FREEZE_OVER: "Може замерзати взимку, блокуючи [Concept('ships', 'кораблі')|e] та дозволяючи [Concept('armies', 'арміям')|e] переходити по льоду."
  TERRAIN_BLOCKS_IN_WINTER: "[Concept('armies', 'Армії')|e] не можуть заходити під час звичайної або суворої зими."
  TERRAIN_COLONIAL_MIGRATION: "[Concept('colonial_migration', 'Колоніальна міграція')|E]: $VALUE|+=%$"
