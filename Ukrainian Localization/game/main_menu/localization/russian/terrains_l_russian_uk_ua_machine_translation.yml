  COLO_VEGETATION_IMP: "[Concept('locations', 'Місцевості')|e] з флорою «[VEGETATION.GetName]» ($NUM|V$): $VAL|+=%$"
  COLO_TOPOGRAPHY_IMP: "[Concept('locations', 'Місцевості')|e] з рельєфом «[TOPOGRAPHY.GetName]» ($NUM|V$): $VAL|+=%$"
  flatland_desc: "Рівнина не має особливих перепадів рельєфу, тому ніщо не перешкоджає руху [Concept('army', 'армії')|e] або будівництву [Concept('building', 'споруд')|e]."
  mountains_desc: "Гори тут мають велику висоту, їх круті схили та нестача рівних ділянок перешкоджають руху [Concept('armies', 'армій')|e], ускладнюють бої та розвиток."
  hills_desc: "Горбиста місцевість має перепади рельєфу, але схили тут куди менш круті та високі порівняно з горами, тому штрафи для атакуючих не такі суттєві."
  plateau_desc: "Це відносно пласкі ділянки на великій висоті і, на відміну від рівнин, накладають незначні штрафи на атакуючих."
  wetlands_desc: "$wetlands$ — це ділянки місцевості, частково затоплені через близькість річки, озера або узбережжя."
  ocean_desc: "Відкрите море між континентами, подолати його можуть лише найкращі кораблі."
  deep_ocean_desc: "Відкрите море між континентами, подолати його можуть лише найкращі кораблі. Знаходиться на максимальному віддаленні від будь-яких берегів."
  coastal_ocean_desc: "Відкрите море між континентами, подолати його можуть лише найкращі кораблі, але області знаходяться ближче до берега."
  inland_sea_desc: "Внутрішні моря з усіх боків оточені суходолом. Прикладами таких морів є Середземне та Балтійське."
  atoll_desc: "Атоли — круглі невисокі острови, зазвичай з лагуною в центрі."
  narrows_desc: "Протоки — це ділянки моря, з багатьох боків оточені узбережжям. Окрім самих проток, до цього типу місцевості належать внутрішні води архіпелагів, де не так багато місця для маневру."
  lakes_desc: "Озера — це внутрішні водойми, які або не мають виходу до моря, або пов'язані з морями через річки. Через це жоден з більш-менш великих [Concept('ships', 'кораблів')|e] не потрапить в озеро."
  high_lakes_desc: "$lakes_desc$"
  plateau_wasteland_desc: "$plateau_desc$"
  mountain_wasteland_desc: "$mountains_desc$"
  hills_wasteland_desc: "$hills_desc$"
  wetlands_wasteland_desc: "$wetlands_desc$"
  dune_wasteland_desc: "$desert_desc$"
  flatland_wasteland_desc: "$flatland_desc$"
  mesa_wasteland_desc: "$desert_desc$"
  ocean_wasteland_desc: "Ця ділянка океану розташована осторонь від основних течій, а тому незручна для судноплавства: кораблі можуть опинитися покинутими тут напризволяще."
  tropical_desc: "$tropical$ поширений в областях з високими середніми температурами та відсутністю зими."
  arid_desc: "$arid$ поширений в областях, де мало доступної води."
  mediterranean_desc: "Області зі середземноморським кліматом ідеальні для життя."
  continental_desc: "$continental$ поширений в областях з холодними зимами."
  arctic_desc: "$arctic$ поширений в областях з дуже холодними зимами."
  cold_arid_desc: "$cold_arid$ поширений в областях, де мало доступної води, але є зими."
  oceanic_desc: "$oceanic$ поширений в областях з м'якими зимами та високою вологістю."
  subtropical_desc: "$subtropical$ поширений в областях з високими середніми температурами та м'якими зимами."
  desert_desc: "Пустелі безжиттєві, майже позбавлені опадів та умов для існування рослин або тварин."
  sparse_desc: "Рідколісся — це великі пласкі ділянки, де майже немає дерев."
  grasslands_desc: "Луки — це місцевість, де переважає трава і майже немає дерев або кущів."
  farmland_desc: "Рілля — це місцевість, змінена руками людини, призначена для посівів або інтенсивного випасу худоби."
  woods_desc: "Гаї — це місцевість з менш щільною рослинністю, ніж у лісах."
  forest_desc: "Ліси — це місцевість з щільною рослинністю."
  jungle_desc: "Джунглі — це місцевість із густим лісом та переплетенням рослинності, що ускладнює будь-які види діяльності."
