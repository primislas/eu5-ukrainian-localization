l_russian:
  andean_group: "Андськ"
  andean_group_desc: "Мешканці Андів та їхніх околиць пристосувалися жити в різноманітних кліматичних умовах високогір'я. Це спільний спосіб життя, що об'єднує багаті андські культури та цивілізації."
  arabian_group: "Аравійськ"
  arabian_group_desc: "Землі Аравійського півострова населяють різноманітні народи, що пристосувалися до суворих умов високогір'я Ємену та оазисів центральної пустелі."
  arabic_group: "Арабськ"
  arabic_group_desc: "Хоча Омеядський халіфат давно зник з карт, народи, що колись проживали під його владою, досі відчувають на собі його культурний вплив."
  baltic_group: "Балтійськ"
  baltic_group_desc: "Балтійські народи населяють південно-східне узбережжя Балтійського моря. Хоча спочатку вони належали до тієї ж гілки, що й слов'яни, їхні шляхи розійшлися за часів Римської імперії. За сотні років контакти з різними германськими народами та групами слов'ян призвели до виникнення унікальної ідентичності. Тепер до балтійських народів можна віднести не тільки носіїв балтських мов, що досі дотримуються своєї споконвічної релігії, а й численні групи німців-християн, що заселили ці береги."
  finnic_group: "Фінськ"
  finnic_group_desc: "Фінно-угорські народи проживають по обидва боки Фінської затоки. Поки їм вдається зберігати свою самобутність, але скандинави та німці вже давно поклали око на їхні землі."
  amazigh_group: "Амазігськ"
  amazigh_group_desc: "Амазіги, також відомі як бербери — це етнічна група родом з Північної Африки. Їхня прихильність до своєї ідентичності призводить до конфліктів з арабськими завойовниками, що багато століть впливають на їхній рідний регіон."
  bohemian_group: "Богемськ"
  bohemian_group_desc: "Землі Богемської корони переважно населяли різні слов'янські народи. Але оскільки Богемія не тільки входить до складу Священної Римської Імперії, а й є однією з найбільших держав у її межах, вона значною мірою зазнала впливу германських культури та традицій. Крім того, землі Богемії привабили безліч німецьких поселенців, що лише посилило їхній вплив."
  british_group: "Британськ"
  british_group_desc: "Британію населяє безліч народів. Її давнє населення турбували вторгнення кельтських племен, Римської імперії, германців, Ірландії та Франції. Віддаленість від континенту об'єднує всіх жителів островів."
  carpathian_group: "Карпатці"
  carpathian_group_desc: "Люди, що населяють схили та долини Карпатських гір, давно пристосувалися до суворих умов. Імперії з'являлися і розчинялися в пісках часу, а ці маленькі спільноти як жили, так і живуть. Гірські перевали та фортеці захищають їх від ворогів і сприяють розвитку торгівлі."
  caucasian_group: "Кавказці"
  caucasian_group_desc: "На кордоні Європи та Азії знаходиться Кавказ — край гірських хребтів та вузьких долин. Його мальовничі ландшафти захищають незалежні та горді народи від могутніх ворогів, що бажають підкорити їх собі."
  celtic_group: "Кельтськ"
  celtic_group_desc: "Кельти, розрізнені народи, що колись населяли землі від Іберії до Анатолії, збереглися тільки на суворих берегах Атлантичного океану, відкинуті на околиці Європи внаслідок століть завоювань та переселень."
  chinese_group: "Китайськ"
  chinese_group_desc: "Протягом століть Китай кілька разів розпадався на частини та возз'єднувався, але ідея єдиної держави зберігалася завжди. Незважаючи на різноманітність культур та мов, численні народи цих земель вважають себе китайцями, жителями та хранителями Серединної держави."
  confucian_group: "Конфуціанськ"
  confucian_group_desc: "Сукупність культур, що прямо чи опосередковано зазнали впливу конфуціанських ідей та моралі."
  ethiopian_group: "Ефіопськ"
  ethiopian_group_desc: "Давнє Аксумське царство познайомило жителів Ефіопії із середземноморським світом через Єгипет, а завдяки торгівлі з Грецією та Римською імперією воно також принесло християнство на ці землі. Але в період експансії ісламу ефіопи виявилися відрізаними та ізольованими, залишившись єдиними християнами-семітами. Це створило спільну спадщину, що зберігається всупереч культурним відмінностям."
  french_group: "Французьк"
  french_group_desc: "Королівство Франція веде свій початок від германського племені франків, що зайняло ці землі після падіння Римської імперії. Надалі воно розширилося і на землі, населені іншими народами. Попри різні звичаї та мови, всі ці народи вважають себе французами."
  german_group: "Германськ"
  german_group_desc: "Германські народи ведуть свій початок від багатого різноманіття давніх племен, які були то ворогами, то союзниками Римської імперії. Минули століття, і імперія Карла Великого та феодалізм сформували їхню ідентичність і призвели до створення Священної Римської Імперії."
  swiss_group: "Швейцарськ"
  swiss_group_desc: "Швейцарці населяють Швейцарське плато та Альпи. Через своє географічне положення швейцарська група не є суто германською, оскільки французькі та італійські культури також є частиною Швейцарії."
  greek_group: "Еллінськ"
  greek_group_desc: "Елліни, піонери демократії та філософії, заклали основи західної цивілізації та залишили по собі значну культурну та інтелектуальну спадщину. Від епічної поезії до класичної архітектури, їхній вплив відчувається навіть через тисячу років."
  haudenosaunee_group: "Хауденосаунійськ"
  haudenosaunee_group_desc: "Хауденосауні — різношерста група народів, але всіх їх об'єднують не лише споріднені мови, а й почуття спільності, співпраця та основні погляди, що проявляються у безлічі способів самоорганізації цих народів."
  hibernian_group: "Гібернійськ"
  hibernian_group_desc: "Смарагдовий острів спочатку населяли гели, але завоювання та переселення привабили безліч нових народів з Британії та з континенту. Але навіть нащадки цих чужинців можуть відгукнутися на поклик Ірландії."
  hungarian_group: "Мадярськ"
  hungarian_group_desc: "Мадяри або угорці — група народів родом з Південного Уралу, що поступово переселилися на захід внаслідок тиску інших народів степів, наприклад, гунів, аварів, булгар та тюрків, одночасно зазнавши їхнього впливу. Зрештою вони розселилися в Карпатському басейні після падіння Аварського каганату. Це сильно відрізняє їх від решти європейських сусідів, зміцнюючи їхнє почуття єдності."
  iberian_group: "Іберійськ"
  iberian_group_desc: "Піренейський півострів — земля контрастів з багатою історією, населена різноманітними народами. Давні кельти, іберійці та баски зазнавали впливу фінікійців, римлян, вестготів та маврів. Окремі народи злилися і породили унікальну суміш християнських, ісламських та єврейських культур. Від жвавих дворів півдня до героїчних лицарів півночі, іберійські народи — втілення різноманіття традицій та прагнень."
  indian_group: "Індійськ"
  indian_group_desc: "«Індійці» — це загальний термін, що описує різноманітні культури Індійського субконтиненту. Попри унікальність культур та різноманіття мов, завдяки спільній географії та ізольованості цих земель, обумовленій природними кордонами, ці культури мають спільну історію."
  indo_aryan_group: "Індоарійськ"
  indo_aryan_group_desc: "Нащадки індоєвропейців, що вторглися в Індію, які потім стали основним населенням її північних областей. Саме вони стояли біля витоків ведичної культури та створили безліч мов та імперій."
  dravidian_group: "Дравідійськ"
  dravidian_group_desc: "Дравіди — це народи, що населяють південну третину Індії. Нащадки корінних жителів, які з'явилися на цих землях задовго до вторгнення індоєвропейців. Попри те, що культура загарбників сильно вплинула на дравідів, їм все ж вдалося зберегти свою самобутність."
  tibeto_burman_group: "Тибето-бірманськ"
  tibeto_burman_group_desc: "Ці народи опинилися на території Індії в результаті великого переселення з Тибетського нагір'я. Однак на них чекала різна доля: деяким вдалося створити розвинені та складні суспільства, інші ж так і залишилися дикими племенами."
  austroasiatic_group: "Австроазіатськ"
  austroasiatic_group_desc: "Австроазіатські народи — одна зі найстаріших культурних груп Азії, яка створила безліч суспільств: від високорозвинених цивілізацій до войовничих примітивних племен, що населяють джунглі."
  tungusic_group: "Тунгуськ"
  tungusic_group_desc: "Народи тунгуської групи, що проживають на території Маньчжурії та Східного Сибіру, в основному займалися полюванням і торгівлею. Вони добре пристосувалися до суворого клімату рідних місць, а для їхніх суспільств була характерна кланова структура."
  austronesian_group: "Австронезійськ"
  austronesian_group_desc: "Австронезійці — одна з найчисленніших культурних і мовних груп. Ці народи населяли землі від Мадагаскару до острова Пасхи. Вони вважалися чудовими мореплавцями і в ході колонізації привезли з собою нові технології та тварин."
  iranian_group: "Іранськ"
  iranian_group_desc: "Культури Ірану давні, а їхнє походження довге та заплутане. Іранці перського регіону походять від західних іранських народів, що правили Близьким Сходом в особі імперій Ахеменідів та Сасанідів. Після ісламського завоювання Персії іслам став одним зі стовпів іранської культури."
  israelite_group_desc: "Євреї, нащадки давніх юдеїв, поширилися по всьому відомому світу після падіння їхньої батьківщини. Об'єднані вірою та традиціями, вони відіграють роль торговців, учених і ремісників, не втрачаючи зв'язку зі своєю спільною спадщиною. Розрізнені, але єдині, вони є самовтіленням стійкості, і в їхніх серцях завжди живе надія відродити Сіон."
  italian_group: "Італійськ"
  italian_group_desc: "Італія, строкате різноманіття держав і міст-держав, місце, де стикаються культури та сфери впливу. Найрізноманітніші народи залишили свій слід на Італійському півострові, від давніх римлян до візантійців, ломбардів і норманів. Італійці запекло змагаються за владу та престиж, що породило багату культуру та сприяло розвитку мистецтв."
  japanese_group: "Японськ"
  japanese_group_desc: "Згідно з їхньою власною інтерпретацією своєї історії, японці населяли свої острови з міфічної епохи богів і часів першого імператора Дзімму-тенно. Століття ізоляції, що переривалася епізодичними контактами з континентом через Корею та Китай, посприяли унікальності японців. Їхня мова та місцеві вірування не мають аналогів на континенті. Попри внутрішнє різноманіття, японці сформували спільну унікальну ідентичність."
  jewish_group: "Іудейськ"
  jewish_group_desc: "$jewish_group$а група — це сукупність етнорелігійних спільнот, що сповідують $jewish_group$у релігію."
  jurchen_group: "Чжурчженьськ"
  jurchen_group_desc: "Чжурчжені населяють суворі землі Маньчжурії. Це люті воїни, що в XII столітті створили могутню династію Цзінь і знищили киданську імперію Ляо. Майстри верхової їзди та стрільби з лука, в минулому вони змінювали долі імперій і досі надихають своєю стійкістю та багатою спадщиною."
  lithuanian_group: "Литовськ"
  lithuanian_group_desc: "Серед різноманітних балтійських народів виділяються литовці, що об'єдналися завдяки схожій мові та спільним загрозам і створили Литовську державу. Їхня прихильність до язичництва в оточенні ворожих християн лише посилює почуття спільності."
  polish_group: "Польськ"
  polish_group_desc: "Розділені на кілька держав з падінням останньої Польської держави, поляки мають спільну західнослов'янську спадщину і є затятими прихильниками католицької віри."
  maghrebi_group: "Магрибськ"
  maghrebi_group_desc: "Особливі умови Північної Африки, численні імперії, що зародилися і загинули на цих землях, а також унікальне положення між спокійним Середземним морем на півночі та нещадним піщаним морем Сахари на півдні створили групу культур, що пристосувалися до життя в цих краях."
  mongolian_group: "Монгольськ"
  mongolian_group_desc: "Монголи, родом із безкраїх степів Центральної Азії, стали втіленням багатовікових кочових традицій. Ці прославлені вершники та вправні лучники перетинають відкриті рівнини зі своїми численними стадами. Під керівництвом таких історичних особистостей, як $genghis_khan_name_no_tooltip$, вони створили одну з найвеличніших імперій в історії та прославилися як легендарні завойовники. Багата культура монголів включає традиції верхової їзди, горлового співу та стійкості, що походить від природи їхніх рідних просторів."
  nahua_group: "Науаськ"
  nahua_group_desc: "Науа, що населяють Мексику, відомі своїм складним суспільством, заплутаними системами управління та войовничими відносинами із сусідами."
  nepali_group: "Непальськ"
  nepali_group_desc: "Народи Непалу мають різноманітне походження та спадщину. Наприклад, гурунги та таманги родом із Китаю та Тибету, а кхаси та кумаоні походять з Індії. Проте всі різноманітні культури Непалу вважають Гімалаї своїм домом."
  netherlandish_group: "Нідерландськ"
  netherlandish_group_desc: "У низинах, примітних річками та постійною боротьбою з морем, різноманітні нідерландські народи утворили унікальну ідентичність. Відомі як вправні торговці, моряки, дослідники та новатори, вони мають спільну спадщину, на яку вплинули торгівля та влада над цими сирими землями."
  polynesian_group: "Полінезійськ"
  polynesian_group_desc: "Народи Полінезії завжди були вправними мореплавцями, за століття вони розселилися по численних островах Тихого океану. Попри ізоляцію один від одного, численні групи все ще можуть відстежити спільну культурну спадщину та мовні подібності."
  micronesian_group: "Мікронезійськ"
  micronesian_group_desc: "Як і їхні сусіди полінезійці, мікронезійці — вправні мореплавці, що колонізували сотні островів та атолів у західній частині Тихого океану."
  puebloan_group: "Пуебльськ"
  puebloan_group_desc: "Ці племена — нащадки стародавніх пуебло, що розселилися по всій $shiewhibak_area$ій області. Життя в суворих умовах загартувало їх. Вони стали витривалішими та навчилися будувати складні глинобитні споруди та зрошувальні системи."
  pyrenean_group: "Піренейськ"
  pyrenean_group_desc: "Піренейців, народжених у Піренейських горах, що відділяють південь Франції від Іберії, об'єднують спільні негаразди та унікальні погляди на устрій суспільства, сформовані життям в ізоляції на суворих околичних землях."
  romanian_group: "Румунськ"
  romanian_group_desc: "Румуни є нащадками стародавніх даків і римлян і переважно населяють землі Валахії, Молдавії та Трансільванії, але також присутні й на Балканах. Вони говорять унікальною романською мовою, оточеною слов'янськими мовами. Румуни відомі своєю стійкістю та любов'ю до фольклору, що знайшло відображення в музиці, традиціях та святах."
  russian_group: "Східнослов'янськ"
  russian_group_desc: "Русь ведуть свій початок від варягів, скандинавських моряків і воїнів, що заселили руські землі в IX столітті. З часом культура русі зазнала впливу слов'янських традицій, що змішалися зі скандинавським впливом. Близькість до Візантійської Імперії сприяла культурному та економічному обміну, роблячи свій внесок в унікальну культуру, де змішалися стилі мистецтва, архітектура та мови."
  scandinavian_group: "Скандинавськ"
  scandinavian_group_desc: "Скандинавію населяє безліч народів. Це регіон з багатою історією переселень, торгівлі та культурного обміну. Різні держави сформували власні унікальні ідентичності, зберігши спільну спадщину. Славні своїми морськими традиціями та мережею торгових шляхів, скандинави відомі не тільки як моряки, а й за свої видатні здібності до управління."
  scottish_group: "Шотландськ"
  scottish_group_desc: "Північні землі Британії завжди населяло безліч народів з найрізноманітнішим походженням. Корінне населення з піктів і камбрійців відмовилося від своїх традицій, ставши частиною королівств іноземців: гелів, англо-саксів і вікінгів. Але в скрутні часи вони все ще готові згуртуватися проти чужинців і стати єдиним народом, шотландцями."
  slavic_group: "Слов'янськ"
  slavic_group_desc: "В епоху Римської імперії предки слов'янських народів населяли верхів'я Вісли та Дніпра, але з часом вони заселили більшу частину Східної Європи. Розділившись на кілька гілок і створивши безліч різних держав та королівств, вони не забули про спільну культурну спадщину."
  south_slavic_group: "Південнослов'янськ"
  south_slavic_group_desc: "Південні слов'яни — різноманітна група, що включає в себе кілька народів Балканського півострова. Усіх їх об'єднує слов'янська спадщина та мовні корені, але за століття вони сформували окремі культури."
  tatar_group: "Татарськ"
  tatar_group_desc: "Татари ведуть своє походження від тюркських та монгольських народів Центральної Азії. Цим словом загалом позначають кочові племена, наприклад, волзьких та кримських татар. Кожна підгрупа має свою унікальну історію, мовні особливості та культурні традиції. Іслам також відіграє важливу роль, що відображає вплив ісламських культур у регіонах їхнього розселення."
  tibetan_group: "Тибетськ"
  tibetan_group_desc: "Ці мешканці високогірних плато Тибету та Гімалайських гір звикли до екстремального клімату та місцевості."
  turkic_group: "Тюркськ"
  turkic_group_desc: "Тюрки пройшли довгий шлях з моменту своєї появи в азійських степах століття тому. Поширившись територіями від Чорного моря до монгольських степів, а потім і на південь, до Персії, вони взаємодіяли з безліччю інших культур та народів, розпавшись на численні групи, але зберігши спільні тюркські корені."
  west_african_group: "Західноафриканськ"
  west_african_group_desc: "Незважаючи на різноманітність культур, мов і навіть релігій, народи Західної Африки та Сахелю мають спільний набір рис та характеристик, що виникли за століття взаємодії один з одним. Важкопрохідні землі Сахари на півночі та тропічні ліси на півдні сприяли численнішим горизонтальним контактам між народами, що й створило спільну ідентичність."
  malagasy_group: "Малагасійськ"
  malagasy_group_desc: "Різноманітні народи Мадагаскару ведуть свій початок з берегів Південно-Східної Африки та островів Південно-Східної Азії."
  thai_group: "Тайськ"
  thai_group_desc: "З часів появи в південних частинах Китаю до міграції та розселення в долині Чаопхрая тайці створили свою унікальну ідентичність, змішавши власні традиції з впливом монів та кхмерів."
  shan_group: "Шанськ"
  shan_group_desc: "Хоча спочатку це був бірманський екзонім, що позначав різні тайські народи, які переселилися на ці землі, а також слово, споріднене з назвою Сіам, це позначення дозволило різним тайським групам створити спільну ідентичність."
