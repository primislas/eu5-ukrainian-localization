l_english:
 LOADING_TIP_0: " #T \"Однісінький монах, який суперечить тисячі років християнського вчення, має помилятися.\"#! \n #tooltip_subheading — Карл V, імператор Священної Римської імперії, Вормський райхстаґ, 1521#!"
 LOADING_TIP_1: " #T \"Війни починають, коли хочуть, а закінчують — коли можуть.\"#! \n #tooltip_subheading — Нікколо Макіавеллі, #italic Історія Флоренції#!, 1521#!"
 LOADING_TIP_2: " #T \"Королі — не лише Божі намісники на землі, які сидять на Божому троні; навіть сам Бог назвав їх богами.\"#! \n #tooltip_subheading — Джеймс VI, король Шотландії, Англії, Франції та Ірландії, 1609#!"
 LOADING_TIP_3: " #T \"Як згинемо, й цієї стане втрати для Англії. А вижити судилось — що менше нас, то більша слава буде.\"#! \n #tooltip_subheading — Вільям Шекспір, #italic Генрі V#!, 1599#!"
 LOADING_TIP_4: " #T \"Продати країну? Чому б тоді не продати й повітря, велике море, та саму Землю? Хіба Великий Дух не створив це все для всіх своїх дітей?\"#! \n #tooltip_subheading — Текумсе, вождь шауні, 1810#!"
 LOADING_TIP_5: " #T \"Священна Римська імперія жодним чином ані священна, ані римська, ані імперія.\"#! \n #tooltip_subheading — Вольтер, #italic Досвід про звичаї і дух народів, том 3, глава 70#!, 1773#!"
 LOADING_TIP_6: " #T \"Я вирішив ніколи не розпочинати несправедливу війну, але й ніколи не завершувати справедливу, окрім як перемогою над моїми ворогами.\"#! \n #tooltip_subheading — Карл XII, король Швеції, 1699#!"
 LOADING_TIP_7: " #T \"Жодному мистецтву один уряд не вчиться так швидко у іншого, як висмоктуванню грошей з народних кишень.\"#! \n #tooltip_subheading — Адам Сміт, шотландський економіст, #italic Багатство народів#!, 1776#!"
 LOADING_TIP_8: " #T \"Припустіть, що Ви можете помилятись.\"#! \n #tooltip_subheading — Олівер Кромвель, Лорд-протектор Співдружності Англії, Шотландії та Ірландії, 1652#!"
 LOADING_TIP_9: " #T \"З жалем вимушений оголосити фатальну правду: Луї має померти, щоб країна могла жити.\"#! \n #tooltip_subheading — Максиміліан Робесп'єр, депутат Національного конвенту, 1792#!"
 LOADING_TIP_10: " #T \"Господь і Учитель наш Ісус Христос, кажучи: \"Покайтеся…\", заповідав, щоб усе життя віруючих було покаянням.\"#! \n #tooltip_subheading — Мартін Лютер, #italic Дев'яносто п'ять тез#!, 1517#!"
 LOADING_TIP_11: " #T \"Від Вас мені ані допомоги, ані користі. Ніколи не подумав би, що Ви виявитеся таким, моє уявлення про Вас було геть інакшим, але зараз бачу, що даремно...\"#! \n #tooltip_subheading — Реншильд Левенгаупту під час Полтавської битви, 1709#!"
 LOADING_TIP_12: " #T \"Йдіть та запаліть світ!\"#! \n #tooltip_subheading — Ігнатій Лойола, баскський богослов, бл. 1540#!"
 LOADING_TIP_13: " #T \"Коли я вже занурив руки в каламутну воду, і випала мені доля пірата, краще вже бути командиром аніж рядовим.\"#! \n #tooltip_subheading — Чорний Барт, валлійський капітан піратів, 1719#!"
 LOADING_TIP_14: " #T \"Краще прожити день левом ніж сто років шакалом.\"#! \n #tooltip_subheading — Тіпу Султан, Майсурський тигр, бл. 1780#!"
 LOADING_TIP_15: " #T \"Просимо визнати Церкву та її першосвященника Папу володарями всесвіту.\"#! \n #tooltip_subheading — Фернандо II, король Арагону та Кастилії, #italic Послання до таїно та араваків#!, 1500#!"
 LOADING_TIP_16: " #T \"Чи може честь вправити зламану ногу? Ні. А залікувати дошкульну рану? Теж ні. Що ж тоді честь? Повітря.\"#! \n #tooltip_subheading — Вільям Шекспір, #italic Генрі IV, частина 1#!, 1597#!"
 LOADING_TIP_17: " #T \"Продовжуйте мій праведний шлях — він ще не скінчився.\"#! \n #tooltip_subheading — Камегамега I, король Гаваїв, передсмертні слова, 1819#!"
 LOADING_TIP_18: " #T \"Коли в раю є іспанці, я радше вирушу до пекла.\"#! \n #tooltip_subheading — Атуей, вождь таїно, перед спаленням іспанцями, 1512#!"
 LOADING_TIP_19: " #T \"Збури нас, Господи, наважитися сміливіше рушити в моря безкраї, де штормить Твоїм велінням, й де загубивши з ока землю ми знайдемо зірки.\"#! \n #tooltip_subheading — Сер Френсіс Дрейк, англійський мореплавець, 1577#!"
 LOADING_TIP_20: " #T \"Що ж до Папи, то я відкидаю його з усіма його хибними доктринами, як ворога Христа та Антихриста.\"#! \n #tooltip_subheading — Томас Кренмер, архієпископ кентерберійський, 1556#!"
 LOADING_TIP_21: " #T \"Тут у Флориді, Вірджинії, Новій Англії та Канаді більше землі, ніж здатен обробити весь Християнський світ.\"#! \n #tooltip_subheading — Капітан Джон Сміт, англійський колоніст, 1631#!"
 LOADING_TIP_22: " #T \"Наша незалежність має бути здобута попри всі загрози. Якщо заможні верстви не підтримають нас, ми їх позбудемось; нам вистачить підтримки того численного та шанованого класу суспільства: людей без майна.\"#! \n #tooltip_subheading — Волф Тон, ірландський революціонер, 1796#!"
 LOADING_TIP_23: " #T \"Америка не має ані короля, ані шляхти, ані духівництва, що законом встановлене; і вона є найквітучішим та найкраще керованим місцем на землі.\"#! \n #tooltip_subheading — Волф Тон, ірландський революціонер, 1796#!"
 LOADING_TIP_24: " #T \"Ми вважаємо за самоочевидні істини, що всіх людей створено рівними; що Творець обдарував їх певними невідбірними правами, до яких належать життя, свобода і прагнення щастя.\"#! \n #tooltip_subheading — Декларація незалежності Сполучених Штатів Америки, 1776#!"
 LOADING_TIP_25: " #T \"Якщо говорити неупереджено, обидва вислови є вельми правдивими; людина людині є як Бог; і людина людині є справжнім вовком.\"#! \n #tooltip_subheading — Томас Гоббс, Про громадянина, 1651#!"
 LOADING_TIP_26: " #T \"Не існує більш лагідної істоти, як людина в її первісному стані, природньо далека від глупоти тварин і фатальної просвітленості цивілізованої людини.\"#! \n #tooltip_subheading — Жан-Жак Руссо, #italic Міркування про походження нерівності#!, 1754#!"
 LOADING_TIP_27: " #T \"Якщо зозуля не кує, вбий її.\"#! \n #tooltip_subheading — Ода Нобунаґа, японський даймьо, 1580-ті#!"
 LOADING_TIP_28: " #T \"Якщо зозуля не кує, примусь її.\"#! \n #tooltip_subheading — Тойотомі Хідейосі, кампаку Японії, 1590-ті#!"
 LOADING_TIP_29: " #T \"Якщо зозуля не кує, зачекай, доки не почне.\"#! \n #tooltip_subheading — Токуґава Ієясу, сьогун Японії, 1600-ті#!"
 LOADING_TIP_30: " #T \"Не корони я скидаю й не саджу на трон, а лиш служу своєму Сіру.\"#! \n #tooltip_subheading — Бертран дю Геклен, бретонський генерал, 1369#!"
 LOADING_TIP_31: " #T \"Що мені до тієї Швеції? Я бриджуся нею гірше за пекельну безодню...\"#! \n #tooltip_subheading — Фрідріх Шиллер, німецький драматург, #italic Валленштайнова смерть#!, 1799#!"
 LOADING_TIP_32: " #T \"Місто пало, мені нема заради чого жити.\"#! \n #tooltip_subheading — Костянтин XI, імператор Візантії, передсмертні слова, 1453#!"
 LOADING_TIP_33: " #T \"Ставтесь до кожного француза, як до самого диявола.\"#! \n #tooltip_subheading — Гораціо Нельсон, британський адмірал, 1793#!"
 LOADING_TIP_34: " #T \"Я більш не здатний підкорятись: я відчув смак командування та зректись його не в змозі.\"#! \n #tooltip_subheading — Наполеон Бонапарт, корсиканський лейтенант артилерії, 1790#!"
 LOADING_TIP_35: " #T \"Жоден капітан не може сильно схибити, достатньо просто розташувати свій корабель бортом до ворожого.\"#! \n #tooltip_subheading — Гораціо Нельсон, британський адмірал, 1805#!"
 LOADING_TIP_36: " #T \"#italic Honi soit qui mal y pense#!. Ганьба тому, хто подумає про це лихе.\"#! \n #tooltip_subheading — Едвард III, король Англії та Франції, девіз Ордену Підв'язки, 1348#!"
 LOADING_TIP_37: " #T \"Я б віддав сотню життів, коли б вони в мене були, та усі мої володіння, аби не допустити й найменшої шкоди Церкві та служінню Богу. Бо я не маю наміру правити єретиками.\"#! \n #tooltip_subheading — Феліпе II, король Іспанії, #italic лист до Папи Пія V#!, 1566#!"
 LOADING_TIP_38: " #T \"Ставлення до ворогів, про яке заявляє Ваша Високоповажність, дуже типове для #italicВашої#! великодушності, але рідко трапляється в англійській нації загалом.\"#! \n #tooltip_subheading — Блас де Лесо, іспанський адмірал, #italic лист до віцеадмірала Едварда Вернона#!, 1739#!"
 LOADING_TIP_39: " #T \"Кожен іспанець має сцяти в бік Англії.\"#! \n #tooltip_subheading — Блас де Лесо, іспанський адмірал, під час осади Картахени-де-Індіас, 1741#!"
 LOADING_TIP_40: " #T \"Бо молитва — ніщо інше, як дружні стосунки з Богом.\"#! \n #tooltip_subheading — свята Тереза Авільська, докторка богослов'я, #italic Книга мого життя (автобіографія)#!, бл. 1565#!"
 LOADING_TIP_41: " #T \"До Бога я звертаюсь іспанською, з жінками говорю італійською, з чоловіками — французькою, а німецькою — з конем.\"#! \n #tooltip_subheading — Карл V, імператор Священної Римської імперії, король Іспанії, ерцгерцог Австрійський та ін.#!"
 LOADING_TIP_42: " #T \"Сам ван їхав верхи та пускав стріли в оленя. Одначе кінь перечепився, і правитель впав, але залишився неушкодженим. Озираючись довкола, Тхеджон мовив: 'Жоден хроніст не має про це довідатись!'\"#! \n #tooltip_subheading — #italic Істинні записи династії Чосон, том 7, розділ 4#!, бл. 1410#!"
 LOADING_TIP_43: " #T \"Той, хто чіпляється за життя — помирає, а той, хто зневажає смерть — живе.\"\n #tooltip_subheading — Уесуґі Кеншін, японський даймьо, 1570-ті#!"
 LOADING_TIP_44: " #T \"Вчення для людини — що гілки та листя для дерева. І можна сказати, що одне без іншого безглузде.\"\n #tooltip_subheading — Такеда Шінґен, японський даймьо, 1550-ті#!"
 LOADING_TIP_45: " #T \"Ворог в Хонно-джі.\"#! \n #tooltip_subheading — Акеті Міцухіде, генерал Оди Нобунаґи, перед заколотницьким нападом на монастир Хонно, який призведе до самогубства Нобунаґи, 1582#!"
 LOADING_TIP_46: " #T \"Англійці надмірно кохають себе та все, що їм належить; для них не існує інших людей та світу іншого крім Англії.\"#! \n #tooltip_subheading — Андреа Тревізан, венеційський дипломат, 1498#!"
 LOADING_TIP_47: " #T \"Допоки в Каталонії лишається хоча б один каталонець, ми матимемо ворогів та війну.\"#! \n #tooltip_subheading — Франсіско де Кеведо, кастильський письменник, 1645"
 LOADING_TIP_48: " #T \"Землі Іспанії багато де лежать облогом. Причина ж тому — окаянна лінь тамтешнього люду, що нагадує вельми мешканців Вельсу...\"#! \n #tooltip_subheading — Френсіс Віллобі, англійський натураліст та дослідник, 1673#!"
 LOADING_TIP_49: " #T \"В Англії шістдесят різних релігій і лише один соус!\"#! \n #tooltip_subheading — Франческо Караччоло, адмірал Неаполітанського королівства, 1799#!" # HP Sauce?