l_russian:
  LOADING_TIP_0: "#T «Якщо слова одного ченця суперечать усьому тисячолітньому християнському вченню, значить цей чернець помиляється».#!\n#tooltip_subheading Карл V, імператор Священної Римської імперії на рейхстазі у Вормсі, 1521#!"
  LOADING_TIP_1: "#T «Війни починаються з вашої волі, але не припиняються за вашим бажанням».#!\n#tooltip_subheading Нікколо Макіавеллі, #italic «Історія Флоренції»#!, 1521#!"
  LOADING_TIP_2: "#T «Королі — не тільки намісники Божі на землі й сидять на Божому троні, а й самим Богом називаються богами».#!\n#tooltip_subheading Яків VI, король Шотландії, Англії, Франції та Ірландії, 1609#!"
  LOADING_TIP_3: "#T «Коли судилося загинути нам, — досить втрат для батьківщини; а будемо живі, — чим менше нас, тим більше буде слави».#!\n#tooltip_subheading Вільям Шекспір, #italic «Генріх V»#!, 1599#!"
  LOADING_TIP_4: "#T «Продати країну? То чому б не продати повітря, безкрає море, і саму Землю? Хіба великий дух не створив їх для всіх своїх дітей?»#!\n#tooltip_subheading Текумсе, вождь шауні, 1810#!"
  LOADING_TIP_5: "#T «Священна Римська імперія не була ні священною, ні Римською, ні імперією».#!\n#tooltip_subheading Вольтер, #italic «Досвід про звичаї та дух народів», том 3, глава 70#!, 1773#!"
  LOADING_TIP_6: "#T «Я взяв за правило ніколи не починати несправедливих воєн, але ніколи не припиняти справедливі інакше як перемогою над усіма моїми ворогами».#!\n#tooltip_subheading Карл XII, король Швеції, 1699#!"
  LOADING_TIP_7: "#T «Жодному мистецтву не вчиться один уряд в іншого так швидко, як мистецтву витягувати гроші з кишені свого народу».#!\n#tooltip_subheading Адам Сміт, шотландський економіст, #italic «Дослідження про природу та причини багатства народів»#!, 1776#!"
  LOADING_TIP_8: "#T «Задумайтеся на хвилину про те, що можете помилятися».#!\n#tooltip_subheading Олівер Кромвель, лорд-протектор Співдружності Англії, Шотландії та Ірландії, 1652#!"
  LOADING_TIP_9: "#T «Я змушений із прикрістю визнати: Людовик повинеxlн померти, тому що батьківщина повинна жити».#!\n#tooltip_subheading Максиміліан Робесп'єр, депутат Національного конвенту, 1792#!"
  LOADING_TIP_10: "#T «Господь і Учитель наш Ісус Христос, кажучи: „Покайтеся…“, заповідав, щоб усе життя віруючих було покаянням».#!\n#tooltip_subheading Мартін Лютер, #italic «95 тез»#!, 1517#!"
  LOADING_TIP_11: "#T «Від тебе мені ні допомоги, ні користі. Ніколи б не подумав, що ти вчиниш так — я очікував від тебе іншого, але, мабуть, усе марно…»#!\n#tooltip_subheading Реншильд Левенгаупту під час битви під Полтавою, 1708#!"
  LOADING_TIP_12: "#T «Іди й запали світ!»#!\n#tooltip_subheading Ігнатій де Лойола, баскський теолог, близько 1540#!"
  LOADING_TIP_13: "#T «Коли вже довелося забруднити руки, і мені випала доля бути піратом, краще вже бути командиром, ніж матросом».#!\n#tooltip_subheading Чорний Барт, валлійський капітан піратів, 1719#!"
  LOADING_TIP_14: "#T «Краще один день прожити левом, ніж сто років шакалом».#!\n#tooltip_subheading Тіпу Султан, «Тигр Майсуру», близько 1780#!"
  LOADING_TIP_15: "#T «Ми вимагаємо від вас визнати Церкву та її первосвященика, Папу, володарями всесвіту».#!\n#tooltip_subheading Фердинанд II, король Арагону та Кастилії, #italic «Послання до таїно та араваків»#!, 1500#!"
  LOADING_TIP_16: "#T «Чи може честь виростити нову ногу? Ні. А вилікувати рану? Теж ні. Що ж вона таке? Повітря».#!\n#tooltip_subheading Вільям Шекспір, #italic «Генріх IV», частина 1#!, 1597#!"
  LOADING_TIP_17: "#T «Продовжуйте йти моїм праведним шляхом — він ще не закінчений».#!\n#tooltip_subheading Останні слова Камеамеа I, короля Гаваїв, 1819#!"
  LOADING_TIP_18: "#T «Якщо в раю є іспанці, я віддаю перевагу пеклу».#!\n#tooltip_subheading Атуей, вождь таїно, перед тим як іспанці спалили його на вогнищі, 1512#!"
  LOADING_TIP_19: "#T «Господи, забудемо про спокій і, сповнившись зухвалості, вийдемо в море назустріч шторму, який нагадає нам — ти над нами владика, і втративши землю з виду, ми звернемо свій погляд до зірок небесних».#!\n#tooltip_subheading Сер Френсіс Дрейк, англійський мореплавець, 1577#!"
  LOADING_TIP_20: "#T «А що стосується папи, я відкидаю його як ворога Христа та Антихриста з усім його лжевченням».#!\n#tooltip_subheading Томас Кранмер, архієпископ Кентерберійський, 1566 р.#!"
  LOADING_TIP_21: "#T «Тут у Флориді, Вірджинії, Новій Англії та Канаді більше землі, ніж могли б обробити всі добрі християни».#!\n#tooltip_subheading Капітан Джон Сміт, англійський колоніст, 1631#!"
  LOADING_TIP_22: "#T «Ми повинні отримати свободу попри всі перешкоди. Якщо ті, хто має статки, не підтримають нас, вони повинні впасти; нам буде достатньо підтримки численнішого та гіднішого класу: людей, які статків не мають». #!\n#tooltip_subheading Вольф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_23: "#T «В Америці немає ні короля, ні лордів, ні церкви, затвердженої законом, і тим не менш ця частина Землі керується краще, ніж будь-яка інша».#!\n#tooltip_subheading Вольф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_24: "#T «Ми вважаємо за очевидні істини, що всі люди створені рівними, що їм дані їхнім Творцем деякі невід'ємні права, серед яких є — життя, свобода та право на щастя».#!\n#tooltip_subheading Декларація незалежності Сполучених Штатів, 1776#!"
  LOADING_TIP_25: "#T «Звісно, правильні обидва твердження: і людина людині Бог, і людина людині вовк».#!\n#tooltip_subheading Томас Гоббс, «Про громадянина», 1651#!"
  LOADING_TIP_26: "#T «Немає лагіднішої людини, ніж та в первісному її стані, поміщеної природою на рівній відстані як від нетямущості худоби, так і від згубної просвіти людини громадянської».#!\n#tooltip_subheading Жан-Жак Руссо, #italic «Міркування про походження і основи нерівності між людьми»#!, 1754#!"
  LOADING_TIP_27: "#T «Якщо зозуля не кує, треба скрутити їй шию».#!\n#tooltip_subheading Ода Нобунаґа, японський даймьо, 80-ті роки XVI століття#!"
  LOADING_TIP_28: "#T «Якщо зозуля не кує, треба змусити її кувати».#!\n#tooltip_subheading Тойотомі Хідейосі, кампаку Японії, 90-ті роки XVI століття#!"
  LOADING_TIP_29: "#T «Якщо зозуля не кує, треба почекати».#!\n#tooltip_subheading Токуґава Ієясу, сьоґун Японії, початок XVII століття#!"
  LOADING_TIP_30: "#T «Я не скидаю короля, і не зводжу його на престол, але я служу моєму сіру».#!\n#tooltip_subheading Бертран дю Ґеклен, бретонський воєвода, 1369#!"
  LOADING_TIP_31: "#T «Що мені до шведів? Ненавиджу їх, Як пекло кляте…»#!\n#tooltip_subheading Фрідріх Шиллер, німецький драматург, #italic Смерть Валленштейна#!, 1799#!"
  LOADING_TIP_32: "#T «Місто впало, мені нема чого більше жити».#!\n#tooltip_subheading Останні слова візантійського імператора Костянтина XI, 1453#!"
  LOADING_TIP_33: "#T «Кожного француза слід ненавидіти як самого диявола».#! \n #tooltip_subheading — Гораціо Нельсон, британський адмірал, 1793#!"
  LOADING_TIP_34: "#T «Більше я не можу підкорятися — мені довелося скуштувати командування, і я не можу від нього відректися».#!\n#tooltip_subheading Наполеоне Буонопарте, корсиканський лейтенант артилерії, 1790#!"
  LOADING_TIP_35: "#T «Командир, який поставить свій корабель борт до борту із ворожим, не може вважатися таким, що діяв неправильно».#!\n#tooltip_subheading Гораціо Нельсон, британський адмірал, 1805#!"
  LOADING_TIP_36: "#T «#italic Honi soit qui mal y pense#!. Нехай соромиться той, хто погано про це подумав»#!\n#tooltip_subheading Король Англії та Франції Едуард III, девіз Ордену Підв'язки, 1348#!"
  LOADING_TIP_37: "#T «Я б віддав сто життів, якби мав їх, і все, чим я володію, ніж допустив би найменшої шкоди по церкві та служінню Господу, бо я не хочу правити єретиками».#!\n#tooltip_subheading Король Іспанії Філіп II, #italic лист Папі Пію V#!, 1566#!"
  LOADING_TIP_38: "#T «Те, як, за словами Вашої Превосходительності, ви поводитеся зі своїми ворогами, слугує зайвим підтвердженням #italic Вашої#! щедрості, однак серед англійської нації загалом вона зустрічається рідко».#!\n#tooltip_subheading Блас де Лесо, іспанський адмірал, #italic з листа до віце-адмірала Едварда Вернона#!, 1739 р.#!"
  LOADING_TIP_39: "#T «Коли іспанець мочиться, він повинен робити це в бік Англії».#!\n#tooltip_subheading Блас де Лесо, іспанський адмірал, під час облоги Картахени-де-Індіас, 1741#!"
  LOADING_TIP_40: "#T «Бо молитва є ніщо інше, як знак дружби з Богом».#!\n#tooltip_subheading Свята Тереза Авільська, свята та Вчитель Церкви, #italic «Житіє Святої Терези Авільської, написаної нею самою»#!, близько 1565#!"
  LOADING_TIP_41: "#T «Іспанською я говорю з Богом, італійською — з жінками, французькою — з чоловіками, і німецькою з моїм конем!»#!\n#tooltip_subheading Карл V, імператор Священної Римської імперії, король Іспанії, ерцгерцог Австрії та ін.#!"
  LOADING_TIP_42: "#T «Сам ван виїхав на коні й пустив в оленя стрілу. Кінь перечепився, і ван упав, однак залишився неушкодженим. Озирнувшись навколо, він сказав: „Не дайте хроністам довідатись про це“».#!\n#tooltip_subheading #italic «Справжні записи династії Чосон», том 7, частина 4#!, близько 1410#!"
  LOADING_TIP_43: "#T «Той, хто чіпляється за життя — помирає, той, хто зневажає смерть — живе».\n#tooltip_subheading Уесуґі Кенсін, японський даймьо, 70-ті роки XVI століття#!"
  LOADING_TIP_44: "#T «Навчання для людини — все одно що гілки та листя для дерева. Без нього вона просто не зможе жити». \n#tooltip_subheading Такеда Шінґен, японський даймьо, 50-ті роки XVI століття#!"
  LOADING_TIP_45: "#T «Ворог у Хоннодзі». #!\n#tooltip_subheading Акечі Міцухіде, воєвода Ода, 1582#!"
  LOADING_TIP_46: "#T «Англійці до крайнощів люблять самі себе і все, що їм належить; для них немає інших людей, крім них самих, і немає іншого світу крім Англії».#!\n#tooltip_subheading Андреа Тревізан, венеційський дипломат, 1498#!"
  LOADING_TIP_47: "#T «Доки в Каталонії залишиться хоч один каталонець, у нас завжди будуть вороги і завжди буде війна».#!\n#tooltip_subheading Франсіско де Кеведо, кастильський письменник, 1645"
  LOADING_TIP_48: "#T «Іспанія в багатьох місцях своїх практично пустельна. Причиною тому — лінь її народу, багато в чому нагадує валлійську…»#!\n#tooltip_subheading Френсіс Віллоубі, англійський письменник, 1673#!"
  LOADING_TIP_49: "#T «В Англії шістдесят різних релігій і тільки один соус».#!\n#tooltip_subheading Франческо Караччоло, неаполітанський адмірал, пом. у 1799 р.#!"