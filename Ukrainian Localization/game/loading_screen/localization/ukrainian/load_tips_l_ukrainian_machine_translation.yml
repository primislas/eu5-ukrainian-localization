l_english:
  LOADING_TIP_0: "#T \"Один монах, що йде всупереч усьому християнству протягом тисячі років, мусить помилятися.\"#!"
  LOADING_TIP_1: "#tooltip_subheading — Карл V, імператор Священної Римської імперії, на Вормському рейхстазі, 1521#!"
  LOADING_TIP_2: "#T \"Війни починаються, коли ти цього забажаєш, але не закінчуються, коли тобі заманеться.\"#!"
  LOADING_TIP_3: "#tooltip_subheading — Нікколо Мак'явеллі, #italic Історія Флоренції#!, 1521#!"
  LOADING_TIP_4: "#T \"Королі є не лише намісниками Бога на Землі і сидять на Божому престолі, але навіть самим Богом вони названі богами.\"#!"
  LOADING_TIP_5: "#tooltip_subheading — Яків VI, король Шотландії, Англії, Франції та Ірландії, 1609#!"
  LOADING_TIP_6: "#T \"Якщо нам судилося померти, нас достатньо, щоб завдати нашій країні втрати. А якщо жити: чим менше чоловіків, тим більша частка пошани.\"#!"
  LOADING_TIP_7: "#tooltip_subheading — Вільям Шекспір, #italic Генріх V#!, 1599#!"
  LOADING_TIP_8: "#T \"Продати країну? Чому б не продати повітря, велике море, а також Землю? Хіба Великий Дух не створив їх усіх для користування своїми дітьми?\"#!"
  LOADING_TIP_9: "#tooltip_subheading — Текумсе, вождь шауні, 1810#!"
  LOADING_TIP_10: "#T \"Священна Римська імперія не була ні священною, ні римською, ні імперією.\"#!"
  LOADING_TIP_11: "#tooltip_subheading — М. де Вольтер, #italic Нарис про звичаї та дух націй, Том 3, Розділ 70#!, 1773#!"
  LOADING_TIP_12: "#T \"Я вирішив ніколи не починати несправедливої війни, але ніколи не закінчувати законної, окрім як розгромивши своїх ворогів.\"#!"
  LOADING_TIP_13: "#tooltip_subheading — Карл XII, король Швеції, 1699#!"
  LOADING_TIP_14: "#T \"Немає такого мистецтва, якого один уряд швидше навчиться від іншого, ніж викачування грошей з кишень народу.\"#!"
  LOADING_TIP_15: "#tooltip_subheading — Адам Сміт, шотландський економіст, #italic Багатство народів#!, 1776#!"
  LOADING_TIP_16: "#T \"Подумайте, що ви можете помилятися.\"#!"
  LOADING_TIP_17: "#tooltip_subheading — Олівер Кромвель, лорд-протектор Співдружності Англії, Шотландії та Ірландії, 1652#!"
  LOADING_TIP_18: "#T \"З жалем я проголошую фатальну істину: Людовик мусить померти, щоб країна могла жити.\"#!"
  LOADING_TIP_19: "#tooltip_subheading — Максиміліан Робесп'єр, депутат Національного конвенту, 1792#!"
  LOADING_TIP_20: "#T \"Коли наш Господь і Учитель Ісус Христос сказав «покайтесь», він хотів, щоб усе життя віруючих було покаянням.\"#!"
  LOADING_TIP_21: "#tooltip_subheading — Мартін Лютер, #italic Дев'яносто п'ять тез#!, 1517#!"
  LOADING_TIP_22: "#T \"Від тебе немає мені ні допомоги, ні користі, я ніколи б не подумав, що ти будеш таким, я уявляв собі зовсім інше щодо тебе, але бачу, що все це ніщо...\"#!"
  LOADING_TIP_23: "#tooltip_subheading — Реншильд до Левенгаупта в битві під Полтавою, 1708#!"
  LOADING_TIP_24: "#T \"Ідіть і запаліть світ!\"#!"
  LOADING_TIP_25: "#tooltip_subheading — Ігнатій Лойола, баскський теолог, бл. 1540#!"
  LOADING_TIP_26: "#T \"Оскільки я занурив свої руки у брудну воду, і мушу бути піратом, краще бути командиром, ніж простим чоловіком.\"#!"
  LOADING_TIP_27: "#tooltip_subheading — Чорний Барт, валлійський піратський капітан, 1719#!"
  LOADING_TIP_28: "#T \"Прожити один день як лев набагато краще, ніж прожити сто років як шакал.\"#!"
  LOADING_TIP_29: "#tooltip_subheading — Тіпу Султан, Тигр Майсуру, бл. 1780#!"
  LOADING_TIP_30: "#T \"Ми вимагаємо, щоб ви визнали Церкву та її найвищого священика, Папу, як правителів всесвіту.\"#!"
  LOADING_TIP_31: "#tooltip_subheading — Фердинанд II, король Арагону та Кастилії, #italic Лист до Таїно-Араваків#!, 1500#!"
  LOADING_TIP_32: "#T \"Чи може честь зростити ногу? Ні. Чи забрати біль від рани? Ні. Що ж та честь? Повітря.\"#!"
  LOADING_TIP_33: "#tooltip_subheading — Вільям Шекспір, #italic Генріх IV, Частина 1#!, 1597#!"
  LOADING_TIP_34: "#T \"Продовжуйте мій праведний шлях — він ще не завершений.\"#!"
  LOADING_TIP_35: "#tooltip_subheading — Камехамеха I, король Гаваїв, його останні слова, 1819#!"
  LOADING_TIP_36: "#T \"Якщо іспанці є в раю, я хочу піти до пекла.\"#!"
  LOADING_TIP_37: "#tooltip_subheading — Хатуей, вождь таїно, перед тим, як його спалили на вогнищі іспанці, 1512#!"
  LOADING_TIP_38: "#T \"Потурбуй нас, Господи, щоб сміливіше наважитись, відправитися в ширші моря, де шторми покажуть твою майстерність, де, втративши з поля зору землю, ми знайдемо зірки.\"#!"
  LOADING_TIP_39: "#tooltip_subheading — Сер Френсіс Дрейк, англійський дослідник, 1577#!"
  LOADING_TIP_40: "#T \"Що до Папи, я відкидаю його як ворога Христа та Антихриста, з усією його фальшивою доктриною.\"#!"
  LOADING_TIP_41: "#tooltip_subheading — Томас Кранмер, архієпископ Кентерберійський, 1556#!"
  LOADING_TIP_42: "#T \"Тут, у Флориді, Вірджинії, Новій Англії та Канаді землі більше, ніж усі люди Християнського світу можуть обробити.\"#!"
  LOADING_TIP_43: "#tooltip_subheading — Капітан Джон Сміт, англійський колоніст, 1631#!"
  LOADING_TIP_44: "#T \"Нашу незалежність необхідно здобути за будь-яку ціну. Якщо заможні люди не підтримають нас, вони повинні впасти; ми можемо підтримати себе за допомогою того численного та поважного класу спільноти: людей, що не мають власності.\"#!"
  LOADING_TIP_45: "#tooltip_subheading — Вулф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_46: "#T \"Америка не має ні короля, ні шляхти, ні духовенства, встановленого законом, і це найпроцвітаючіше та найкраще кероване місце на обличчі цієї Землі.\"#!"
  LOADING_TIP_47: "#tooltip_subheading — Вулф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_48: "#T \"Ми вважаємо ці істини самоочевидними, що всі люди створені рівними, що вони наділені своїм Творцем певними невід'ємними Правами, серед яких є Життя, Свобода та прагнення до Щастя.\"#!"
  LOADING_TIP_49: "#tooltip_subheading — Декларація незалежності Сполучених Штатів, 1776#!"