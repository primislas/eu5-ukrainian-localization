l_english:
  LOADING_TIP_0: "#T \"Один чернець, який іде проти всього християнства протягом тисячі років, мусить помилятися.\"#! \n #tooltip_subheading — Карл V, імператор Священної Римської імперії, на Вормському рейхстазі, 1521#!"
  LOADING_TIP_1: "#T \"Війни починаються, коли ви того бажаєте, але не закінчуються, коли вам заманеться.\"#! \n #tooltip_subheading — Нікколо Макіавеллі, #italic Флорентійські історії#!, 1521#!"
  LOADING_TIP_2: "#T \"Королі є не лише намісниками Бога на Землі та сидять на Божому престолі, але навіть самим Богом вони називаються богами.\"#! \n #tooltip_subheading — Яків VI, король Шотландії, Англії, Франції та Ірландії, 1609#!"
  LOADING_TIP_3: "#T \"Якщо нам судилося померти, нас достатньо, щоб завдати втрат нашій країні. А якщо жити: чим менше людей, тим більша частка слави.\"#! \n #tooltip_subheading — Вільям Шекспір, #italic Генріх V#!, 1599#!"
  LOADING_TIP_4: "#T \"Продати країну? Чому б не продати повітря, велике море, а також Землю? Хіба Великий Дух не створив їх усіх для своїх дітей?\"#! \n #tooltip_subheading — Текумсе, вождь POSTEDIT_шауні, 1810#!"
  LOADING_TIP_5: "#T \"Священна Римська імперія жодним чином не була ні священною, ні римською, ні імперією.\"#! \n #tooltip_subheading — М. де Вольтер, #italic Есе про звичаї та дух народів, Том 3, Розділ 70#!, 1773#!"
  LOADING_TIP_6: "#T \"Я вирішив ніколи не починати несправедливої війни, але ніколи не закінчувати законної, окрім як перемогою над своїми ворогами.\"#! \n #tooltip_subheading — Карл XII, король Швеції, 1699#!"
  LOADING_TIP_7: "#T \"Немає такого мистецтва, яке один уряд швидше переймає від іншого, ніж мистецтво викачування грошей з кишень народу.\"#! \n #tooltip_subheading — Адам Сміт, шотландський економіст, #italic Багатство народів#!, 1776#!"
  LOADING_TIP_8: "#T \"Подумайте, що ви можете помилятися.\"#! \n #tooltip_subheading — Олівер Кромвель, лорд-протектор Співдружності Англії, Шотландії та Ірландії, 1652#!"
  LOADING_TIP_9: "#T \"З жалем я проголошую фатальну істину: Людовик мусить померти, щоб країна могла жити.\"#! \n #tooltip_subheading — Максиміліан Робесп'єр, депутат Національного конвенту, 1792#!"
  LOADING_TIP_10: "#T \"Коли наш Господь і Учитель Ісус Христос сказав «покайтеся», він бажав, щоб усе життя віруючих було покаянням.\"#! \n #tooltip_subheading — Мартін Лютер, #italic Дев'яносто п'ять тез#!, 1517#!"
  LOADING_TIP_11: "#T \"Я не маю від тебе ні допомоги, ні користі, я ніколи б не подумав, що ти будеш таким, я уявляв про тебе зовсім інше, але бачу, що все це ніщо...\"#! \n #tooltip_subheading — Реншильд до Левенгаупта в битві під Полтавою, 1708#!"
  LOADING_TIP_12: "#T \"Ідіть і запаліть світ!\"#! \n #tooltip_subheading — Ігнатій Лойола, POSTEDIT_баскський теолог, бл. 1540#!"
  LOADING_TIP_13: "#T \"Оскільки я занурив руки в брудну воду, і мушу бути піратом, краще бути командиром, ніж простою людиною.\"#! \n #tooltip_subheading — Чорний Барт, POSTEDIT_валлійський піратський капітан, 1719#!"
  LOADING_TIP_14: "#T \"Прожити один день як лев набагато краще, ніж сто років як шакал.\"#! \n #tooltip_subheading — Тіпу Султан, Тигр Майсуру, бл. 1780#!"
  LOADING_TIP_15: "#T \"Ми вимагаємо, щоб ви визнали Церкву та її найвищого священика, Папу, правителями всесвіту.\"#! \n #tooltip_subheading — Фердинанд II, король Арагону та Кастилії, #italic Лист до POSTEDIT_таїно-араваків#!, 1500#!"
  LOADING_TIP_16: "#T \"Чи може честь приставити ногу? Ні. Чи може забрати біль від рани? Ні. Що таке та честь? Повітря.\"#! \n #tooltip_subheading — Вільям Шекспір, #italic Генріх IV, Частина 1#!, 1597#!"
  LOADING_TIP_17: "#T \"Продовжуйте мій праведний шлях — він не закінчився.\"#! \n #tooltip_subheading — Камехамеха I, король Гаваїв, його останні слова, 1819#!"
  LOADING_TIP_18: "#T \"Якщо в раю є іспанці, я хочу до пекла.\"#! \n #tooltip_subheading — Хатуей, вождь POSTEDIT_таїно, перед спаленням на вогнищі іспанцями, 1512#!"
  LOADING_TIP_19: "#T \"Збуди нас, Господи, щоб ми сміливіше дерзали, щоб вирушали у ширші моря, де бурі покажуть Твою майстерність, де, втративши з поля зору землю, ми знайдемо зірки.\"#! \n #tooltip_subheading — Сер Френсіс Дрейк, англійський дослідник, 1577#!"
  LOADING_TIP_20: "#T \"Щодо Папи, я відкидаю його як ворога Христа та Антихриста, з усією його хибною доктриною.\"#! \n #tooltip_subheading — Томас Кранмер, архієпископ Кентерберійський, 1556#!"
  LOADING_TIP_21: "#T \"Тут, у Флориді, Вірджинії, Новій Англії та Канаді, землі більше, ніж усі люди християнського світу можуть обробляти.\"#! \n #tooltip_subheading — Капітан Джон Сміт, англійський колоніст, 1631#!"
  LOADING_TIP_22: "#T \"Наша незалежність має бути здобута за будь-яку ціну. Якщо заможні люди не підтримають нас, вони мусять впасти; ми можемо підтримати себе за допомогою того численного та поважного класу суспільства: людей без власності.\"#! \n #tooltip_subheading — Вулф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_23: "#T \"Америка не має ні короля, ні шляхти, ні духовенства, встановлених законом, і це найпроцвітаюче та найкраще кероване місце на обличчі цієї Землі.\"#! \n #tooltip_subheading — Вулф Тон, ірландський революціонер, 1796#!"
  LOADING_TIP_24: "#T \"Ми вважаємо ці істини самоочевидними: що всі люди створені рівними, що вони наділені своїм Творцем певними невід'ємними Правами, серед яких є Життя, Свобода та прагнення Щастя.\"#! \n #tooltip_subheading — Декларація незалежності Сполучених Штатів, 1776#!"
  LOADING_TIP_25: "#T \"Говорячи неупереджено, обидва вислови дуже правдиві; що Людина для Людини є свого роду Богом; і що Людина для Людини є справжнім Вовком.\"#! \n #tooltip_subheading — Томас Гоббс, De Cive, 1651#!"
  LOADING_TIP_26: "#T \"Ніщо не є таким лагідним, як людина в її первісному стані, коли природа поміщає її на рівній відстані від тупості тварин і фатального просвітлення цивілізованої людини.\"#! \n #tooltip_subheading — Жан-Жак Руссо, #italic Міркування про походження нерівності#!, 1754#!"
  LOADING_TIP_27: "#T \"Якщо зозуля не співатиме, вбий її.\"#! \n #tooltip_subheading — Ода Нобунаґа, японський даймьо, бл. 1580#!"
  LOADING_TIP_28: "#T \"Якщо зозуля не співатиме, змусь її співати.\"#! \n #tooltip_subheading — Тойотомі Хідейосі, Кампаку Японії, бл. 1590#!"
  LOADING_TIP_29: "#T \"Якщо зозуля не співатиме, зачекай, поки вона заспіває.\"#! \n #tooltip_subheading — Токуґава Ієясу, Сьоґун Японії, бл. 1600#!"
  LOADING_TIP_30: "#T \"Я не скидаю і не ставлю Короля, але допомагаю своєму Сеньйору.\"#! \n #tooltip_subheading — Бертран дю Ґеклен, бретонський генерал, 1369#!"
  LOADING_TIP_31: "#T \"Що мені до Швеції? Я ненавиджу її, гірше за пекло...\"#! \n #tooltip_subheading — Фрідріх Шиллер, німецький драматург, #italic Смерть Валленштейна#!, 1799#!"
  LOADING_TIP_32: "#T \"Місто пало, а я ще живий.\"#! \n #tooltip_subheading — Костянтин XI, візантійський імператор, останні слова, 1453#!"
  LOADING_TIP_33: "#T \"Ставтеся до кожного француза так, ніби він сам диявол.\"#! \n #tooltip_subheading — Гораціо Нельсон, британський адмірал, 1793#!"
  LOADING_TIP_34: "#T \"Я більше не можу підкорятися: я скуштував командування і не можу від нього відмовитися.\"#! \n #tooltip_subheading — Наполеоне Буонапарте, корсиканський артилерійський лейтенант, 1790#!"
  LOADING_TIP_35: "#T \"Жоден капітан не зробить великої помилки, якщо поставить свій корабель поруч із ворожим.\"#! \n #tooltip_subheading — Гораціо Нельсон, британський адмірал, 1805#!"
  LOADING_TIP_36: "#T \"#italic Honi soit qui mal y pense#!. Нехай буде соромно тому, хто погано про це подумає.\"#! \n #tooltip_subheading — Король Едуард III Англійський і Французький, Девіз Ордену Підв'язки, 1348#!"
  LOADING_TIP_37: "#T \"Краще зазнати найменшої шкоди релігії та служінню Богові, ніж втратити всі свої держави та сотню життів, якби вони в мене були: бо я не збираюся бути правителем єретиків.\"#! \n #tooltip_subheading — Король Філіп II Іспанський, #italic Лист до Папи Пія V#!, 1566#!"
  LOADING_TIP_38: "#T \"Те, як Ваша Екселенція, за Вашими словами, поводилися зі своїми ворогами, дуже характерно для #italic Вашої#! щедрості, але рідко зустрічається в англійській нації в цілому.\"#! \n #tooltip_subheading — Блас де Лесо, іспанський адмірал, #italic Лист до віце-адмірала Синього Едварда Вернона#!, 1739#!"
  LOADING_TIP_39: "#T \"Кожен іспанець повинен мочитися, дивлячись на Англію.\"#! \n #tooltip_subheading — Блас де Лесо, іспанський адмірал, під час облоги Картахени-де-Індіас, 1741#!"
  LOADING_TIP_40: "#T \"Бо молитва — це не що інше, як перебування у дружніх стосунках з Богом.\"#! \n #tooltip_subheading — Свята Тереза Авільська, Свята і Вчителька Церкви, #italic Життя Святої Терези Авільської, написане нею самою#!, бл. 1565#!"
  LOADING_TIP_41: "#T \"Я розмовляю іспанською з Богом, італійською з жінками, французькою з чоловіками, а німецькою зі своїм конем.\"#! \n #tooltip_subheading — Карл V, Імператор Священної Римської імперії, Король Іспанії, Ерцгерцог Австрії тощо.#!"
  LOADING_TIP_42: "#T \"Сам король їхав верхи на коні і стріляв стрілами в оленя. Однак кінь спіткнувся, через що він упав, але не постраждав. Озирнувшись, він сказав: «Нехай історики про це не дізнаються».\"#! \n #tooltip_subheading — #italic Справжні записи Теджона, Том 7, Стаття 4#!, бл. 1410#!"
  LOADING_TIP_43: "#T \"Ті, хто чіпляється за життя, помирають, а ті, хто кидає виклик смерті, живуть.\"\n #tooltip_subheading — Уесуґі Кенсін, японський даймьо, бл. 1570#!"
  LOADING_TIP_44: "#T \"Навчання для людини — як листя і гілки для дерева, і можна сказати, що без нього вона не повинна бути.\"\n #tooltip_subheading — Такеда Сінґен, японський даймьо, бл. 1550#!"
  LOADING_TIP_45: "#T \"Ворог у Хонно-дзі.\"#! \n #tooltip_subheading — Акечі Міцухіде, генерал Ода, 1582#!"
  LOADING_TIP_46: "#T \"Англійці — великі любителі себе і всього, що їм належить; вони вважають, що немає інших людей, крім них самих, і немає іншого світу, крім Англії.\"#! \n #tooltip_subheading — Андреа Тревізан, венеціанський дипломат, 1498#!"
  LOADING_TIP_47: "#T \"Доки в Каталонії залишиться хоч один каталонець, ми матимемо ворогів і війну.\"#! \n #tooltip_subheading — Франсіско де Кеведо, кастильський письменник, 1645"
  LOADING_TIP_48: "#T \"Іспанія в багатьох місцях майже спустошена. Причина — жалюгідна лінь народу, дуже схожа на валлійців...\"#! \n #tooltip_subheading — Френсіс Віллугбі, англійський письменник, 1673#!"
  LOADING_TIP_49: "#T \"В Англії шістдесят різних релігій, і лише один соус.\"#! \n #tooltip_subheading — Франческо Караччоло, неаполітанський адмірал, пом. 1799#!"