#### TRACK NAMES AND FLAVOUR TEXT ####

 musicplayer_sol_byzantine_hymn_melodies: "Byzantine - Hymn Melodies"
 musicplayer_sol_byzantine_hymn_melodies_flavour: "A hymn based on the melodic tradition of Byzantine plainchant, shaped by the modal system of the eight echoi that guided Orthodox church music for centuries."
 musicplayer_sol_byzantine_hymn_no_136: "Byzantine - Hymn No. 136"
 musicplayer_sol_byzantine_hymn_no_136_flavour: "A setting of the Byzantine Psalm 136, beginning with the prayer 'Our Father' and the refrain 'Exomologiste to Kyrio, oti agathos' (Praise the Lord, for He is good) sung in the traditional call-and-response style of Orthodox chant."
 musicplayer_sol_byzantine_o_virgin_pure: "Byzantine - O Virgin Pure"
 musicplayer_sol_byzantine_o_virgin_pure_flavour: "Agni Parthene (O Virgin Pure) is a Greek Marian hymn composed by St. Nectarios of Aegina in the late 19th century, first published in his Theotokarion in 1905."
 musicplayer_sol_byzantine_overture_ii_odyssey: "Byzantine - Overture II Odyssey"
 musicplayer_sol_byzantine_overture_ii_odyssey_flavour: "An interpretation of the main soundtrack overture, inspired by the sound of Byzantine plainchant that once echoed through the churches of Constantinople. an arrangement evokes the musical tradition of the Eastern Roman Empire."
 

