l_english:
 ancient_monuments_pack_key: "Європа Універсаліс V Монументальний Бонус (Monumental Bonus) - Косметичне доповнення"
 ancient_monuments_pack_desc: "Косметичне доповнення 'Монументальний Бонус' (Monumental Bonus) додає новий графоній до восьми споруд #italic Європи Універсаліс V#!, прикрашаючи гру стародавніми історичними пам'ятками."
 ancient_monuments_pack_activate_desc: "Підпишіться на новинну розсилку Paradox з обліковим записом Paradox, щоб активувати!"
 sacred_sites_pack_key: "Європа Універсаліс V Святі Місця (Sacred Sites) - Косметичне доповнення"
 sacred_sites_pack_desc: "Косметичне доповнення 'Світя Місця' (Sacred Sites) додає новий графоній до восьми святих місць в #italic Європі Універсаліс V#!, прикрашаючи гру впливовими релігійними пам'ятками."
 sacred_sites_pack_activate_desc: "Придбайте Преміальне видання (Premium Edition), щоб активувати!"
