l_russian:
 ancient_monuments_pack_key: "Europa Universalis V Monumental Bonus — Cosmetic Pack"
 ancient_monuments_pack_desc: "Косметическое дополнение Monumental Bonus добавляет новые графические модели для восьми сооружений в #italic Europa Universalis V#!, позволяя вам украсить свою игру этими древними историческими достопримечательностями."
 ancient_monuments_pack_activate_desc: "Подпишитесь на рассылку Paradox, используя свою учётную запись Paradox, чтобы его активировать!"
 sacred_sites_pack_key: "Europa Universalis V Sacred Sites — Cosmetic Pack"
 sacred_sites_pack_desc: "Косметическое дополнение Sacred Sites добавляет новые графические модели для восьми святынь в #italic Europa Universalis V#!, позволяя вам украсить свою игру этими религиозными достопримечательностями."
 sacred_sites_pack_activate_desc: "Приобретите Премиумное издание, чтобы его активировать!"
 fate_of_the_phoenix_key: "#italic Fate of the Phoenix#!"
 fate_of_the_phoenix_dlc_desc: "Relive or revive the fading glories of the Eastern Roman Empire in [GameDLC.GetName], an [GameDLC.GetCategoryKey] for #italic Europa Universalis V#!.\n\nThis DLC adds new historical flavor and content to the Byzantine Empire, with unique mechanics, historical options, and alternative historical paths to pursue."
 fate_of_the_phoenix_activate_desc: "Acquire the Premium Edition or buy it separately from the store to activate it!"
