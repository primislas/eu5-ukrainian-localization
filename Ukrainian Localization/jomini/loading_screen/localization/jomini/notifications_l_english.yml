l_english:
 JOMINI_NOTIFICATION_TIMESTAMP_NOW: "Щойно"
 JOMINI_NOTIFICATION_TIMESTAMP_MINUTES: "$MINUTES$ хвилин тому"
 JOMINI_NOTIFICATION_TIMESTAMP: "$DATE$"
 JOMINI_DLC_MANAGER_DISABLED_MODS_CRASH_TITLE: "Модифікації відключені"
 JOMINI_DLC_MANAGER_DISABLED_MODS_CRASH_DESC: "The game encountered a problem during the last startup, possibly due to an incompatible mod.\nTo ensure stability, all mods have been temporarily disabled.\nTo reactivate your mods, navigate to the \"$MESSAGE$\" Playset, remove any problematic mods, and apply the changes."
 JOMINI_DLC_MANAGER_OUTDATED_MODS_ALERT_TITLE: "Unsupported Mods Detected"
 JOMINI_DLC_MANAGER_OUTDATED_MODS_ALERT_DESC: "Some of your mods are for a different version of $GAME$. These mods may not work correctly and could cause problems with your game. For stability, we recommend disabling these mods until they are updated.\n\nThe following mods are out of date:\n$MODS_OUTDATED_LIST$"
 JOMINI_JOIN_SERVER_ALERT_TITLE: "Неможливо з'єднатися з сервером"
 JOMINI_JOIN_SERVER_ALERT_DESC: "Перейдіть до головного меню, щоб приєднатися до гри."
 JOMINI_DLC_MANAGER_CONFIRM_UGC_UPLOAD_TITLE: "Підтвердіть завантаження UGC"
 JOMINI_DLC_MANAGER_CONFIRM_UGC_UPLOAD_DESC: "Ви впевнені, що хочете відправити мод? Ця дія створить новий мод в Steam Workshop (Майстерня Стім).\n\nЗавантажуючи цей мод, ви погоджуєтесь на умови використання майстерні. Якщо ви не прийняли умови, Стім запропонує Вам ознайомитись з ними, а Ваш контент буде прихованим для інших користувачів, доки Ви не надасте згоду."
