  SETTING_ANISOTROPIC_FILTERING: "Фільтрація текстур"
  SETTING_ANISOTROPIC_FILTERING_TOOLTIP: "#T $SETTING_ANISOTROPIC_FILTERING$\n#!Використання анізотропної фільтрації покращує зовнішній вигляд текстурованих поверхонь.\n\nЗниження параметра може підвищити продуктивність."
  SETTING_RESOLUTION: "Роздільна здатність"
  SETTING_RESOLUTION_TOOLTIP: "#T $SETTING_RESOLUTION$\n#!Якість зображення в грі.\n\nЗниження роздільної здатності може підвищити продуктивність.\n\n#X Роздільні здатності з непідтримуваним співвідношенням сторін можуть призвести до виходу елементів інтерфейсу за межі екрана#!"
  SETTING_WINDOWED_RESOLUTION: "Роздільна здатність у віконному режимі"
  SETTING_WINDOWED_RESOLUTION_TOOLTIP: "#T $SETTING_WINDOWED_RESOLUTION$\n#!Якщо гра запущена у віконному режимі — визначає роздільну здатність вікна.\n\nНеобхідно використовувати формат #b ЧИСЛО#!x#b ЧИСЛО#!.\n\n#X Роздільна здатність з непідтримуваним співвідношенням сторін може призвести до того, що інтерфейс виявиться за межами екрана#!"
  SETTING_RENDER_SCALE: "Розмір рендера"
  SETTING_RENDER_SCALE_TOOLTIP: "#T $SETTING_RENDER_SCALE$#!\nРозмір роздільної здатності рендера в грі відносно роздільної здатності екрана за вирахуванням інтерфейсу.\n\nЗниження параметра може підвищити продуктивність, але знизить якість зображення, тоді як збільшення понад 100% може підвищити якість, але, ймовірно, знизить продуктивність."
  SETTING_RENDER_SCALE_FORMAT: "$VALUE|%0$"
  SETTING_DISPLAY: "Монітор"
  SETTING_DISPLAY_TOOLTIP: "#T $SETTING_DISPLAY$\n#!Якщо у вашого комп'ютера кілька моніторів, виберіть той, який буде використовуватися в грі."
  SETTING_GRAPHICS_DEVICE: "Відеокарта"
  SETTING_GRAPHICS_DEVICE_TOOLTIP: "#T $SETTING_GRAPHICS_DEVICE$\n#!Виберіть, яка відеокарта буде використовуватися в грі.\n\nВикористання інтегрованої відеокарти або програмного рендерингу може знизити продуктивність."
  SETTING_SHADOW_MAP_RESOLUTION: "Якість тіней"
  SETTING_SHADOW_MAP_RESOLUTION_TOOLTIP: "#T $SETTING_SHADOW_MAP_RESOLUTION$\n#!Якщо тіні увімкнені, параметр визначає роздільну здатність, з якою накладаються карти тіней.\n\nЗниження параметра може підвищити продуктивність."
  SETTING_DISPLAY_MODE: "Режим відображення"
