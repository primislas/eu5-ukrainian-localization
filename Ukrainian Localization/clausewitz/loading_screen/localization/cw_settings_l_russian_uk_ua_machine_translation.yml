  SETTING_TEXTURE_QUALITY_TOOLTIP: "#T $SETTING_TEXTURE_QUALITY$#!\nРоздільна здатність завантажених текстур.\n\nЗниження параметра може підвищити продуктивність."
  SETTING_QUALITY: "Збережена настройка якості"
  SETTING_SFX: "Звукові ефекти"
  SETTING_UI: "Інтерфейс"
  SETTING_QUALITY_TOOLTIP: "#T $SETTING_QUALITY$\n#!Оберіть збережений параметр у додаткових налаштуваннях графіки внизу.\n\nНизьке значення збереженого параметра підвищить продуктивність."
  SETTING_BLOOM_QUALITY_TOOLTIP: "#T $SETTING_BLOOM_QUALITY$\n#!Вмикає ефект світіння, завдяки якому джерела особливо яскравого світла освітлюватимуть й інші частини зображення.\n\nЗниження значення може підвищити продуктивність."
  SETTING_DOF_TOOLTIP: "#T $SETTING_DOF$\n#!Вмикає глибину поля, що симулює об'єктив камери, розмиває частини зображення, які не перебувають у фокусі.\n\nВимкнення параметра може підвищити продуктивність."
  SETTING_LENS_FLARE_TOOLTIP: "#T $SETTING_LENS_FLARE$\n#!Вмикає ефект відблисків, що з'являється в яскраво освітлених місцях. Щоб ефект з'явився, необхідно ввімкнути світіння.\n\nВимкнення параметра може підвищити продуктивність."
  SETTING_SECONDARY_LENS_FLARE_TOOLTIP: "#T $SETTING_SECONDARY_LENS_FLARE$\n#!Вмикає ефект вторинних відблисків, що з'являється в яскраво освітлених місцях. Щоб ефект з'явився, необхідно ввімкнути світіння.\n\nВимкнення параметра може підвищити продуктивність."
  SETTING_MAP_SSAO_TOOLTIP: "#T $SETTING_MAP_SSAO$\n#!Визначає, чи буде застосовуватися до карти перешкоджання навколишнього світла в екранному просторі.\n\nВимкнення параметра може підвищити продуктивність."
  SETTING_REFRACTION_TOOLTIP: "Відображати (чи ні) відбиття на воді."
  SETTING_REFRACTION_QUALITY_TOOLTIP: "#T $SETTING_REFRACTION_QUALITY$#!\nЯкість відбиття на воді (якщо вони відображаються).\n\nЗниження параметра може підвищити продуктивність."
  SETTING_MAPOBJECT_QUALITY_TOOLTIP: "#T $SETTING_MAPOBJECT_QUALITY$#!\nМаксимальний рівень якості відображення об'єктів на карті (будівлі тощо).\n\nЗниження параметра може підвищити продуктивність."
  SETTING_MESH_LOD_BIAS_TOOLTIP: "#T $SETTING_MESH_LOD_BIAS$#!\nЯкість деталізації об'єктів на карті (підрозділи тощо).\n\nЗниження параметра може підвищити продуктивність."
  SETTING_MESH_LOD_FADE_TOOLTIP: "#T $SETTING_MESH_LOD_FADE$\n#!Якщо ввімкнено цей параметр, у тривимірних моделях відбувається плавний перехід між різними рівнями деталізації при зміні масштабу.\n\nВимкнення параметра може підвищити продуктивність."
  SETTING_PROVINCE_NAMES_TOOLTIP: "Спосіб показувати на карті назви міст і провінцій."
  SETTING_FILL_IN_IMPASSABLE_TERRAIN_TOOLTIP: "Вмикати (чи ні) до кордонів країни на карті непрохідні ділянки."
