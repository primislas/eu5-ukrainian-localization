  SETTING_MUSIC_DENSITY: "Інтенсивність музики"
  SETTING_MUSIC_DENSITY_TOOLTIP: "Визначає баланс між повноцінними композиціями, тишею та музичним фоном. \n\nНасичена = В основному йде послідовне відтворення музичних композицій, аналогічно радіостанції. \nЗбалансована = Ідеальний баланс між повноцінними композиціями, тишею та створенням музичного фону. \nЛегка = В основному фонова музика для передачі настрою гри без відчуття повтору після кількох годин."
