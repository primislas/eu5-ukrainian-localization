  SETTING_VSYNC: "Вертикальна синхронізація"
  SETTING_VSYNC_TOOLTIP: "#T $SETTING_VSYNC$\n#!Синхронізує частоту кадрів гри та монітора, зменшуючи розриви зображення на екрані.\n\nВимкнення цього параметра може підвищити продуктивність."
  SETTING_PORTRAIT_MULTI_SAMPLING: "Згладжування портретів"
  SETTING_PORTRAIT_MULTI_SAMPLING_TOOLTIP: "#T $SETTING_PORTRAIT_MULTI_SAMPLING$\n#!Використання згладжування за технологією Alpha-To-Coverage для більш плавного накладання волосся.\n\nЗниження параметра може підвищити продуктивність."
  SETTING_MULTI_SAMPLING: "Згладжування (MSAA)"
  SETTING_MULTI_SAMPLING_TOOLTIP: "#T $SETTING_MULTI_SAMPLING$\n#!При використанні згладжування з множинною вибіркою (MSAA) краї зображення стають більш гладкими.\n\nЗниження параметра може підвищити продуктивність."
  SETTING_ANTI_ALIASING: "Згладжування"
  SETTING_ANTI_ALIASING_TOOLTIP: "#T $SETTING_ANTI_ALIASING$\n#!При використанні згладжування краї зображення будуть менш різкими.\n\nРекомендуємо використовувати FXAA."
  OPTION_ANTI_ALIASING_DISABLED: "Вимк."
