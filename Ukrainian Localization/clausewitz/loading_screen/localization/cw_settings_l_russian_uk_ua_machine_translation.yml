  SETTING_UPSCALE: "Метод масштабування"
  SETTING_UPSCALE_TOOLTIP: "#T $SETTING_UPSCALE$#!\nМетоди масштабування дозволяють досягти вищої роздільної здатності за допомогою алгоритмічної підвищувальної дискретизації. Це може підвищити продуктивність, але існує ризик виникнення артефактів та іншої несподіваної поведінки.\n\nДоступність методів масштабування може залежати від вашої графічної карти."
  OPTION_UPSCALE_FSR2: "AMD FidelityFX Super Resolution 2"
